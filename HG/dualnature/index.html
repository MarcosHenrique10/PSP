      *goto headback\n            *else\n             You forget about the corpses and decide to leave this place. You casually walk back downstairs, loaded with supplies. \n             *goto headback\n           #Take the opportunity to run\n            *goto runlikehell\n       *selectable_if (gun) #Draw my revolver and start shooting\n        *set good -5\n        You silently pull your revolver out of your trenchcoat. No one notices. You quickly take aim and pull the trigger, hitting one of the survivors in the back of the neck. By the time they get over the shock you've already shot dead\n        another one. The other three, the two guys with the crossbows and the leader with the fancy revovler, retaliate, firing bolts and bullets at you. You dive to the left and take cover behind an aisle. The other survivors begin\n        manuvering, you can hear their frantic footsteps around the floor. You exchange fire with the leader for a bit but neither of you manage to hit your marks.\n        *choice\n         #See if I can flank him\n          *set good -10\n          You run down the aisle until you emerge from the opposite end of it. There you come face to face with one of the crossbow weilders. Evidently he was trying to flank you as well. You pull the trigger at just the same time he \n          does. The bullet from your revolver goes into his diaphragm while the bolt from his crossbow hits you in the stomach. He drops to the floor, bleeding out. You hide back behind the aisle and pull the bolt out of your body. \n          This wound will heal. You move forward, taking cover in the next aisle. Once again you hear frantic footsteps, betraying the enemies' position. You begin manuvering yourself around as well, running away from the sounds of the\n          survivors. You get out of the aisle and into the open. There's no one around. You quietly creep closer to the aisle from which you heard the footsteps and find the last two survivors. You've flanked them and caught them\n          completely unawares. You take aim and fire, once, twice, three times and both survivors drop dead.\n          *page_break\n          *set suppliesmarket true\n          You take a few deep breaths and absorb the feeling of safety and victory. You take a thorough look around the floor and then focus on looting the place as much as you can. You grab as many cans of food and bottles of water as \n          you can. Looting the bodies yields no valuable things however. You briefly consider taking their weapons but decide against it. The crossbows are far too big to carry around comfortably and you already have a revolver.\n          *if ((haseaten = false) and (hassteak = false))\n           *set haseaten true\n           You forget about the corpses and decide to eat. You crack open one can of beef with your knife and empty its contents into your mouth. The beef tastes pretty much the way you remember it tasting. It's nice to find\n           something from your old life that still hasn't changed. Eventually you finish your food and go back downstairs.\n           *goto headback\n          *elseif ((haseaten = false) and (hassteak = true))\n           *set haseaten true\n           *set hassteak false\n           You forget about the corpses and decide to eat. You decide to toss away the pork chops, there are more cans of meat here than you can carry back, and instead crack open one can of beef with your knife and empty its contents\n           into your mouth. The beef tastes pretty much the way you remember it tasting. It's nice to find something from your old life that still hasn't changed. Eventually you finish your food and go back downstairs.\n           *goto headback\n          *else\n           You forget about the corpses and decide to leave this place. You casually walk back downstairs, loaded with supplies. \n           *goto headback\n         #Keep exchanging fire\n          You dig in your heels and continue exchanging fire with their leader. Though you try your best you seem to be unable to score a good hit on the guy. You begin to contemplate moving forward or perhaps even giving up on this\n          whole thing and running off. The leader then pulls the trigger again only for his weapon to make a relatively soft clicking noise instead of firing. You jump out of cover ready to fire which, unfortunately, is just what the guy\n          wanted. While you're busy trying to attack the leader, one of the crossbow wielders moved around the aisles and flanked you. He fires a bolt that goes through your head and everything goes dark once more.\n          *ending\n    #\"Yeah I see you.\" Best be upfront with them, that way they might trust me\n      \"Is that so? Well what exactly is wrong with your eyes then? It doesn't look to me like you're wearing contacts.\"\n\n      Well, there goes that excuse. You may as well tell them what actually happened to you. It's not like you can plead the fifth here and lying to them may make things worse than they already are.\n\n      \"Alright. Let me preface what I'm about to tell you by saying this: I have no ill will towards any of you. Or towards any other person in general. I... came back from the dead this morning.\"\n      *if (civilized > 90)\n\n       One of the two men with crossbows slightly lowers his weapon and frantically looks around before shouting. \"The hell?! This guy's infected?\" He then quickly levels the crossbow at you again.\n       The man with the revolver quickly interjects. \"Keep that finger off the trigger son.\"\n\n       \"He's a zombie he'll kill us all!\"\n\n       \"I see no such indication. He's been nothing but honest with us.\"\n\n       \"I don't care, I'm not risking it.\"\n\n       Suddenly the second crossbowman yells. \"Hey! Seth, come on man, lower the crossbow. Julian's right, we have no reason to believe that this guy's hostile.\"\n\n       \"He's a zombie, Bill. What more proof do you want?\"\n\n       \"Well I'm sorry but I have to step over the metaphorical line here and go over to Julian's side.\". He does so quite literally, going over and standing next to the guy with the revolver, Julian.\n\n       \"I'm with you too.\", says the man with the metal pipe, as he goes and stands next to Julian and the other guy as well.\n\n       Seth then speaks again. \"So is that it then, Arthur? You and Bill are willing to trust a fucking zombie over me?\"\n\n       \"Hey, I am still with you my friend.\", responds the guy with the bowie knife.\n\n       Julian then speaks, seemingly addressing everyone in the room, including you. \"Well then gentlemen, it seems we have arrived at an impasse. No one leaves here until we resolve this. I don't want to pull this trigger but if\n       any of you try to go off and do as you please... I may not have a choice.\"\n       \n       Well great. Now what? The door to the stairs is right behind you, albeit shut, and Julian's attention isn't on you right now. Seth may be unwilling to listen to reason so you could make a dash for downstairs.\n       *choice\n        #Yeah, I'm not staying here and dealing with Seth or the fallout of this intergang skirmish.\n         You psych up yourself as much as you can, then quickly throw Julian out of the way, fling open the door and run like the wind downstairs. You hear Julian shouting and cursing and everyone else start running after you. You leap\n         over the trash barricade and turn around momenterally, to see Julian ready to shoot. You dive out of the way and the bullet strikes the floor.\n         *goto stairstandoff\n\n        #No. If Seth is unwilling to listen I'll have to deal with him and bowie knife. If I run I'll have Julian on my ass too.\n         *set good +10\n         You stay put, hoping that everything goes smoothly. Julian speaks once more, addressing you in particular this time. \"Now then, what exactly is the reason for your presence here, friend?\"\n\n         \"I came here just to find some meat to eat. It's the only thing I can eat due to my condition.\"\n\n         \"Hmm... of course you do not mean human meat, correct?\"\n\n         \"Of course. I wouldn't ever eat another human.\"\n\n         \"[b]Another[/b] human?\" He cracks an amused smile as he says this. He clears his throat and then he continues. \"Now gentlemen, you've all heard this man's case. What do you say?\"\n\n         Seth responds first. \"I don't think any of this matters, I'm still defending my original position.\". \n\n         Julian then makes an objection. \"We don't kill innocent people, Seth. This man may be undead but he's proven that he's still his own person. Anyone else want to challenge me on this?\".\n         Arthur and Bill both shake their heads. The man with the bowie knife remains silent.\n\n         \"It's settled then.\", concludes Julian. \"Now then, you, my undead friend, can go. Before you do however, you can take some supplies with you. But this only happens one time; so you're not coming back once you step out \n         of this building and you don't tell anyone else about us.\"\n\n         \"Understood. And thank you.\" you reply.\n         *page_break\n         *set suppliesmarket true\n         *set haseaten true\n         *if hassteak = true\n          *set hassteak false\n          You move away from the group, go to the big pile of resources at the end of the first aisle and take a few cans of meat and some bottled water with you, though there's still plenty left here for these guys. You\n          then go downstairs, loaded with supplies. Before you exit the supermarket you decide to eat. First you toss away the pork chops as they're no longer of any use to you, there's better food to eat now. You then use your knife to\n          crack open a can of meat and empty it's contents into your mouth. The meat tastes just like you remember. It's nice finding something from your old life that still hasn't changed.\n          *goto headback\n         *else\n          You move away from the group, go to the big pile of resources at the end of the first aisle and take quite a few cans of meat and bottled water with you, though there's still plenty left here for these guys. You\n          then go downstairs, loaded with supplies. Before you exit the supermarket you decide to eat. You use your knife to\n          crack open a can of meat and empty it's contents into your mouth. The meat tastes just like you remember. It's nice finding something from your old life that still hasn't changed.\n          *goto headback\n      *else\n       One of the two men with crossbows slightly lowers his weapon and frantically looks around before shouting. \"The hell?! This guy's infected?\" He then quickly levels the crossbow at you again.\n       The second crossbowman slightly loosens his grip and turns his head to the first one. \"Come on Seth, calm down.\"\n\n       \"No way, this guy's a zombie he could attack at any moment.\"\n\n       \"Indeed he could...\" Responds the man with the revolver.\n\n       \"Julian, come on buddy. This man hasn't done anything to us. He's been nothing but honest.\"\n\n       The man with the revolver, Julian, responds, \"That doesn't mean he's not dangerous. And his... condition could very well be degenerative. He could turn any minute now.\"\n\n       \"You don't know that. He trusted us and you're contemplating repaying him with a bullet. That's straight up murder!\"\n\n       \"I'm afraid it may be the best solution here, Bill.\", says the man with the bowie knife.\n\n       \"No it's not, Michael. I stand with Bill here.\", responds the man with the metal pipe.\n       *page_break\n       \"Be that as it may I make the decisions here Arthur, not you and not Bill. This is for the best of our group.\"\n\n       You get a sinking feeling as you realize that Julian may very well be ready to shoot.\n       *choice\n        #I look over to Bill and the guy with the pipe, Arthur.\n         As soon as Bill notices you looking towards him he turns to Julian once more. \"No, no, no Julian, I insist. We can't just kill him like it's nothing. When we forged this group we made it clear that we're not raiders or\n         bandits.\" Julian turns to Bill.\n         *if civilized \u003c 81\n          \n          You then hear the hammer of Julian's revolver slamming forward, accompanied by the explosion of gunfire. At the same exact time your vision goes dark yet again.\n          *ending\n         *else\n          *set good +10\n\n          \"Oh you '[b]insist[/b]' do you? And you propose that we let a potential threat get out of here. A potential threat that now knows where we are and how many supplies we have.\n          \n          Bill lets out a somewhat exasperated sigh and continues. \"Look I understand that it's a risky thing to do but I dislike the idea of killing someone who hasn't done anything even more.\n\n          Arthur interjects before Julian can respond. \"I agree. Besides, I think if he wanted to harm us he would have done it by now. But he hasn't. He's been cooperative with us, he told us the truth about his condition, he really\n          hasn't given us reason to think he could be hostile.\"\n\n          Julian pauses for a bit, then finally responds. \"Very well then.\"\n          \n          He then turns to you and continues. \"You can leave. However, if you come back or if you tell anyone about us... we will have to take more drastic measures next time. Am I making myself clear?\".\n\n          \"Crystal clear.\", you reply and go on your way, into the staircase, over the barricade and back to the ground floor.\n          *if ((haseaten) or (hassteak))\n           *goto headback\n          *else\n           You still haven't found any food though and since the survivors upstairs are content with staying upstairs you decide to take a look around the ground floor.\n           *goto sounds\n        #I turn around and fight Julian off.\n         You quickly turn, grab the gun by the barrel and push it aside and simultaneously headbutt Julian as hard as you can. He pulls the trigger, and the bullet that flies out of the barrel strikes Seth in the chest, dropping him like\n         a stone. As the other survivors swear and get ready to attack, you get behind Julian and hook your arm around his neck, taking him hostage and using him as a human shield.\n         *if gun\n          You pull your own revolver out of your trenchcoat pocket and aim it at the group, especially Arthur and the guy with the bowie knife, Michael, who seemed to be ready to charge forward. Bill yells \"Everybody just take it \n          easy! We can sort this thing out, no one else has to die!\". \n          \n          Michael responds \"No fucking way! He killed Seth, I'm not going to negotiate with this asshole!\". \n\n          What's your response?\n          *choice\n           #\"Yes you will negotiate with me!\"\n            *set suppliesmarket true\n            \"Alright, ignore Michael. What are your terms?\" Bill asks. Michael shoots Bill an incredulous look and seems ready to say something but changes his mind at the last minute. \"My terms are very simple,\" you begin,\n            \"I get to walk out of here and I get to take some food and water with me. That's it.\" Bill seems to contemplate your terms for a bit before finally responding. \"Alright. You just let go of Julian, we'll lower our\n            weapons. Hear that Michael? We'll lower our weapons.\". Michael hesitantly puts his knife on the floor, Arthur does the same thing with his pipe and Bill slightly lowers the crossbow. You let go of Julian but continue to \n            aim your revovler at them all.\n\n            You back away from the group, go to the big pile of resources at the end of the first aisle and take a some canned meat and bottled water with you, though there's still plenty left here for these guys. You\n            then move towards the stairs, start walking downstairs while still facing the group, until you finally reach the barricade which you jump over. \n            *if ((haseaten = false) and (hassteak = false))\n             *set haseaten true\n             You move towards the supermarket's exit before stopping to eat. You take one of\n             the cans of meat, crack it open with your knife and empty it's contents into your mouth. The meat tastes pretty much the way you remember it tasting like. It's kind of nice, finding something from your old life that still\n             hasn't changed.\n             *goto headback\n            *elseif ((haseaten = false) and (hassteak = true))\n             *set haseaten true\n             *set hassteak false\n             You move towards the supermarket's exit before stopping to eat. You decide to toss away the pork chops as you now have enough food to last you. You take one of\n             the cans of meat, crack it open with your knife and empty it's contents into your mouth. The meat tastes pretty much the way you remember it tasting like. It's kind of nice, finding something from your old life that still\n             hasn't changed.\n             *goto headback\n            *else\n             *goto headback\n           #No response, just shoot them all.\n            *set good -15\n            *set suppliesmarket true\n            You take aim and blast Michael's brains all over the floor. Bill fires his crossbow at you and you bend to the right, narrowly avoiding the bolt that was going to go through your head. Arthur runs at you with the pipe \n            raised over his head but you manage to kill him with a bullet to the heart. As Bill desperately tries to reload his crossbow you pull the gun's hammer back and take aim. By the time Bill decides to stop trying and instead\n            just surrender, it's already too late. Julian is now the only one left. But not for long. You put the revolver back in your trenchcoat and start choking him. You increase the pressure on his throat more and more until you\n            feel his neck break. You take a deep breath and try to absorb the feeling of safety and victory. You take a thorough look around the floor and then focus on looting the place as much as you can. You grab as many cans of food \n            and bottles of water as you can. Looting the bodies yields no valuable things however. You briefly consider taking their weapons but decide against it. The crossbows are far too big to carry around comfortably and you already\n            have a revolver.\n            *if ((haseaten = false) and (hassteak = false))\n             *set haseaten true\n             You forget about the corpses and decide to eat. You crack open one can of beef with your knife and empty its contents into your mouth. The beef tastes pretty much the way you remember it tasting. It's nice to find\n             something from your old life that still hasn't changed. Eventually you finish your food and go back downstairs.\n             *goto headback\n            *elseif ((haseaten = false) and (hassteak = true))\n             *set haseaten true\n             *set hassteak false\n             You forget about the corpses and decide to eat. You decide to toss away the pork chops, there are more cans of meat here than you can carry back, and instead crack open one can of beef with your knife and empty its contents\n             into your mouth. The beef tastes pretty much the way you remember it tasting. It's nice to find something from your old life that still hasn't changed. Eventually you finish your food and go back downstairs.\n             *goto headback\n            *else\n             You forget about the corpses and decide to leave this place. You casually walk back downstairs, loaded with supplies. \n             *goto headback\n         *else\n          Arthur and Michael decide to charge forward and take their chances with you in melee. As they get within range you shove Julian into Michael as hard as you can, knocking them both down. Arthur swings the\n          pipe at you but you manage to grab it and counter attack with a kick to the groin. As Arthur bends over you pull the pipe out of his hands and grab hold of him, using him as a human shield just like you had done with Julian\n          before. Michael and Julian both get back up and seem to contemplate attacking you again. As soon as they take a step forward you scream at the top of your lungs \"Take another step and I'll beat this guy's brains\n          out I swear it!\". Julian then responds \"Alright son, we thought you were dangerous and you've proved more than that. Let him go, we'll lay down our weapons and you'll walk out of here.\"\n\n          Michael turns to Julian and gives him an incredulous look, as if he's too surprised by his leader's change of heart to protest. You on the other hand see no other choice but to comply with Julian. But you're not just\n          letting Arthur go right now. You step back towards the stairs, still holding Arthur hostage. When you finally reach the stairs, you open up the door, push Arthur away and run back down the stairs, leaping over the barricade.\n          Somewhat to your surprise, no one chases after you. It seems Julian kept his word about letting you go.\n          *if ((haseaten) or (hassteak))\n           *goto headback\n          *else\n           You still haven't found any food though and since the survivors upstairs are content with staying upstairs you decide to take a look around the ground floor.\n           *goto sounds\n*label backtoEleanor\nYou finally reach the store you've camped out behind. The alley is just as you left it, dumpster blocking it and all. You climb over it and walk inside the empty lot.\n*page_break\nEleanor nearly stabs you\n*if stab\n again\nas she was hiding right at the corner of the lot, ready to attack the would be intruder. When she realizes it's only you she hugs you with a smile. \"Johnny! Did you find any food?\".\n*line_break\n*if eatsraw\n \"Yeah I did.\" you say. \"I ran into a couple of snags but I managed to find myself a couple of pork chops at the supermarket.\"\n\n \"Good good ...and?\"\n\n \"I ate them. As I found them... raw.\"\n\n \"Oh... will you be alright after eating them like that?\"\n\n \"Yeah, I'm certain my undead body can handle it. What about you though? Are you good?\"\n *set RelEleanor -5\n *goto areyougood\n*elseif haseaten\n \"Yeah I did.\" you say. \"Wasn't easy but I did manage to find and eat a can of beef.\"\n\n \"Oh good, was it enough?\"\n\n \"It'll do for now. What about you though? Are you good?\"\n *goto areyougood\n*elseif hassteak\n \"Yeah I did.\" you say. \"Managed to find myself a couple of pork chops at the supermarket.\"\n\n \"Good good ...and?\"\n\n \"Well I figured I could try and cook them over a fire, maybe using that small tree over there. What about you though? Are you good?\"\n *goto areyougood\n*else\n \"No. I did manage to reach the supermarket but there were other survivors holed up in there and they weren't in the mood to share their supplies.\"\n\n \"Was it impossible to get food some other way?\"\n\n \"I don't know. It doesn't even matter now though, what's done is done. What about you, are you good?\"\n *goto areyougood\n*label areyougood\n\n\"I'll be fine. Ate the chips you couldn't eat and a few crackers. It's far from a full day's worth of food but I have to somehow make it last until tomorrow.\" Responds Eleanor in a breathy tone.\n*if supplieskid\n \"By the way, what's with the load you're carrying? Found that at the supermarket as well?\"\n\n \"Oh the backpack and the bedroll? No I got that from another survivor...\"\n\n Eleanor seems to study your expression and tone of voice for a moment before finally asking \"Were they hostile?\"\n\n \"He was, yeah.\" you respond.\n\n \"Did you... kill him?\"\n *fake_choice\n  #\"Yes\"\n   \"I... I see. I know you must have had a good reason to do such a thing.\"\n\n  #\"No\"\n   Eleanor smiles as she hears your answer. \"I'm glad you didn't. I knew you wouldn't do such a thing unless it was absolutely necessary.\"\n\n \"So, what's in the bag?\" she asks. You open it up and show her the contents. \"Hm, cell phone's probably useless, the instant noodles are a nice touch and we could use the lighter and paper to light a fire I suppose.\"\n *if suppliesmarket\n  *set haseatenextra true\n  \"And that's not all I got either.\" you say. \"I managed to score some more food at the supermarket. Take a look.\"\n\n  You empty out your pockets and show her everything you got from the supermarket. It's not exactly a feast, being a few cans and three of bottles of water but you simply couldn't fit anymore in your, admitedly large, coat pockets.\n\n  \"Okay, these will definitely come in handy. I figure we could probably eat a bit more and still have enough for tommorow.\" say's Eleanor. \n  *line_break\n  You agree with her as you're still pretty hungry yourself. So you both eat some more, you\n  eat another can of meat while Eleanor decides to eat the vegetable soup.\n  *goto sleep\n *else \n  *goto sleep\n*elseif suppliesmarket\n *set haseatenextra true\n\n \"Well I managed to score some more food at the supermarket. Take a look.\"\n\n You empty out your pockets and show her everything you got from the supermarket. It's not exactly a feast, being a few cans and three of bottles of water but you simply couldn't fit anymore in your, admitedly large, coat pockets.\n\n \"Okay, these will definitely come in handy. I figure we could probably eat a bit more and still have enough for tommorow.\" say's Eleanor. \n\n You agree with her as you're still pretty hungry yourself. So you both eat some more, you\n eat another can of meat while Eleanor decides to eat the vegetable soup.\n *goto sleep\n\n*label sleep\n*if hassteak\n \"Well\", you begin, \"I'm going to try and cook these porkchops now. So uh- you do have a lighter on you right?\".\n\n \"Um... no, I do not.\"\n\n \"Eleanor, you're not serious.\"\n\n \"But I am. Look it didn't cross my mind that we'd need to start a fire when I was packing up, getting ready to leave my home.\"\n\n \"Hold up a moment. You're a smoker, how did you plan on lighting up your cigarettes without a lighter?\"\n\n \"I got no smokes on me Johnny. Couldn't get any this morning. Besides I got more important things to worry about.\"\n\n *if supplieskid\n  *set fire true\n  \"Well good thing that guy had a lighter in his bag then.\", you say. You then go to the small tree and rip off a few branches and some smaller twigs. You gather the twigs and branches in the center of the lot, take out the guy's\n  lighter and light up a fire. Once you get a fire of respectable strength going you skewer the pork chops on another branch and cook them over the fire. It takes longer than you would like, and there are quite a few moments when you felt\n  like digging in right then and there. But you manage to control your impulses until the pork chops are cooked fully. Well 'fully' is a relative term, the outside is black in places while you're fairly certain that the center is still\n  pink. But it's the best you've got.\n  *set haseaten true\n  *goto realsleep\n *else\n  *set civilized -25\n  *set haseaten true\n  *set eatsraw true\n  You take a deep breath and take a long look at the pork chops. \"Forget it.\" you mutter and dig in right then and there. The taste is amazing. Much, much better than you imagined. It's so good, in fact, that you already know one\n  thing. You'll be eating your food raw if you can help it for the foreseeable future. Eleanor watches you with a shocked expression on her face. Once you finally finish up she speaks. \"Johnny,\n  are you sure that was a good idea?\"\n\n  *if good \u003c 11\n   *set wasadick true\n   *set RelEleanor -15\n   \"I wasn't going to let myself starve just because you don't approve.\", you respond. Eleanor seems somewhat taken aback by your statement.\n\n   \"It's not about me approving. I'm worried about you.\", she finally replies.\n\n   \"How about you worry about yourself instead? I did this out of necessity, because [b]you[/b] did not take a lighter with you and now you want to bitch and moan about it? Leave me alone...\"\n   *goto realsleep\n  *elseif good \u003c 31\n   *set RelEleanor -10\n   \"What did you want me to do? I didn't have much choice here did I?\" you respond.\n\n   \"I know but... I'm worried about you.\", she finally replies.\n\n   \"Yeah, ok I appreciate that. But I would also appreciate it if you didn't ask me meaningless questions.\"\n   *goto realsleep\n  *elseif good \u003c 50\n   *set RelEleanor -5\n   \"Probably not but who's fault is that hmm?\"\n\n   \"Look I understand where you're coming from but I'm worried about you. The way you act it's...\"\n\n   \"And I appreciate that. But what's done is done. Sometimes things we don't like have to happen you know?\"\n   *goto realsleep\n  *else\n   \"Probably not. I didn't like having to do that either but... I couldn't help myself.\"\n\n   \"I guess... I'm just worried about you is all.\"\n\n   \"Thanks Eleanor. It'll be fine though, really.\"\n   *goto realsleep\n*else\n *goto realsleep\n\n*label realsleep\nYou finally finish up everything you've been doing and decide to go to sleep. You don't exactly feel tired but you still feel as though you must sleep, though now it's more of a chore that you have to do, rather than a necessity. Or at\nleast that's how you feel. You're not sure if sleep deprivation could still affect you negatively or kill you. It doesn't really matter though.\n*if wasadick\n You tell Eleanor that you'll sleep first, while she keeps watch, then she can wake you up and you'll keep watch for the rest of the night. She gives you a dry and cold \"fine\" in response.\n *goto watch\n*else\n You and Eleanor talk for a bit and agree that she can take first watch while you sleep, then she'll wake you up and you'll keep watch for the rest of the night.\n *goto watch\n\n*label watch\nYou lie down and shut your eyes. Before you know it you've fallen asleep...\n*page_break\nYou're driving your bike down the post-apocalyptic wasteland, going after the bastard who shot you and stole your coat. Eventually you reach his hideout, the old goldmine. You get inside, finding numerous bandits in there, laughing and\ndrinking moonshine. One of them spots you, spits out his moonshine and screams \"Holy fuck! It's Deadeye! He's back for revenge!\". You take cover behind a wooden support and shout out \"Surrender now, or you're gonna wear a wooden\novercoat.\". Gunfire erupts inside the goldmine as the bandits start shooting. You fire back hitting most of them and taking no bullets yourself. Suddenly one of the bandits start talking to you. His voice is far too high-pitched to\nbelong to a man.\n\"Johnny! Johnny!\"\n*page_break\n\"Johnny wake up!\". You open your eyes and realize Eleanor is shaking you awake.\n*if fire\n \"What is it?\" you ask her.\n\n \"Someone's coming, multiple people actually. I heard them talking earlier, I think they saw the smoke from our fire.\"\n\n As you wake up completely you manage to make out a couple of voices talking. You can't quite understand what they're saying but they are close by and they're coming even closer. You get up and grab your weapon, then move closer to the\n alleyway leading out of the empty lot. The guys that were coming this way have stopped talking now. As you press up against the corner you hear them talking once more.\n\n \"Hold up man. The dumpster. Someone's intentionally put it there.\" Says the one of the two men.\n\n \"Yeah no shit pal. Zombies can't start fires, whoever is back there is clearly alive.\"\n\n \"Man are you sure it's a good idea to try and rob these guys? I mean, what if they're armed?\"\n\n \"Well that's why we got our knives with us smart guy. Now come on, let's climb over this here dumpster and see what goodies are waiting for us back there.\"\n\n You roll your eyes at the stupidity of these two wannabe bandits.\n *if gun\n  Seeing as you have a gun and they only have knives you decide to take a step forward and actually get into the alleyway before they climb over the dumpster. That way you'll be able to shoot them if needed and they won't be able to do\n  anything about it. You do just that, stepping into the alley and taking aim at the two bandits. They're two non-descript guys in their twenties, one of them is dressed up in a white hoodie and black dress pants and the other one is \n  wearing a black tracksuit. They both freeze in their tracks as soon as they see you.\n  *choice\n   #Just yell at them to leave this place.\n    *set good +5\n    *set RelEleanor +5\n    \"Get out of here!\" you yell out at the top of your lungs. The one in the white hoodie had already started climbing over the dumpster when you revealed yourself. He falls backwards in fear and runs off, his friend following\n    close behind. You turn to Eleanor, to see her standing a few steps away from you. You walk over to her. \"Another crisis averted.\" you say.\n\n    Eleanor responds. \"Yeah, I guess so. I'm glad it shook out this way. For a moment there I thought you were going to kill them.\"\n\n    \"You know I'd never hurt someone I don't have to. Now, why don't you try to get some sleep? I'll keep watch.\"\n\n    Eleanor lays down inside the sleeping bag you got from the man and goes to sleep pretty quickly. She must have been exhausted. You keep watch for the rest of the night.\n    *goto morning\n   #Start shooting.\n    *set good -10\n    *set relEleanor -10\n    You pull the trigger and blast white hoodie's brains all over the alleyway. His friend cries out \"Jeff! Fuck!!!\". He then raises his eyes from his dead buddy and looks at you once again.\n    *choice\n     #Kill him too.\n      *set good -10\n      *set relEleanor -20\n      Once again you pull the trigger. The bullet strikes the guy in the neck, killing him instantly. You turn to Eleanor, to see her standing a few steps away from you, covering her shocked face with her hands. You walk over to her.\n      \"Another crisis averted.\" you say. \n\n      Eleanor lowers her hands and finally speaks. Her voice is cracking. \"Wh- what the fuck? Why? They were hardly a threat! They only had knives and you had a gun. You could have at least tried to resolve this without killing \n      them!\"\n\n      \"They would have taken everything from us, possibly our lives as well, if they could. They deserved nothing better. Now why don't you go to sleep? I'll keep watch for the rest of the night.\"\n\n      Eleanor goes over to a corner and sits down, arms resting on her knees and her head hung low. You think you can hear her sobbing softly. Eventually she stops, seemingly passed out. You stay up, keeping watch for the rest of the\n      night.\n      *goto morning\n     #Yell at him to leave.\n      \"Get out of here!\" you yell out at the top of your lungs. The guy starts shaking and hyperventilating, then trips as he tries to run away. You turn to Eleanor, to see her standing a few steps away from you, a shocked\n      expression on her face. You walk over to her. \"Crisis averted.\" you say.\n\n      Eleanor finally speaks. Her voice is somewhat shaky. \"Why? Why did you kill him? He was hardly a threat. He only had a knife, you had a gun. You didn't even try to threaten him first!\"\n\n      \"I had to make sure. This is the apocalypse. We don't have the luxury of half-measures here. Now why don't you go to sleep? I'll keep watch for the rest of the night.\"\n\n      Eleanor lays down inside the sleeping bag you got from the man and tries to sleep. She rolls around for quite sometime before she finally sleeps. You stay up, keeping watch for the rest of the night.\n      *goto morning\n *else\n  You and Eleanor both stand right at the corner of the alleyway, just out of sight. You hear the two bandits climb over the dumpster. As soon as they enter the empty lot you grab the first guy by the face and press your knife up against\n  his throat. His friend, a non-descript guy in his twenties dressed in a black tracksuit, seems to consider charging at you but changes his mind when he sees Eleanor is also holding a knife.\n\n  \"Get the hell out of here! Both of you!\" She yells at the two guys. The man in the tracksuit seems unsure of what to do, stuttering and nervously looking around. The one you're holding, a guy in a white hoodie stabs you in the \n  left side of your chest.\n  *choice\n   #Slit his throat.\n    You cut his juggular open with your knife and the guy drops down, chocking on his blood. The one in the tracksuit mutters \"Shit! Jeff...\".\n\n    \"Just leave! Leave or we'll kill you too!\" says Eleanor. The guy decides that this ain't worth it and books it out of the empty lot. You pull the knife out of your body and toss it to the ground. Eleanor turns to you.\n\n    \"You okay?\"\n\n    \"Yeah, I'm fine.\"\n\n    \"You sure that was necessary?\"\n\n    \"I got stabbed didn't I?\"\n\n    \"I guess you're right. Well I'm glad you're okay.\"\n\n    \"Why don't you try to get some sleep? I'll keep watch.\"\n\n    Eleanor lays down inside the sleeping bag you got from the man and tries to sleep. She rolls around for quite sometime before she finally sleeps. You stay up, keeping watch for the rest of the night.\n    *goto morning\n   #Throw him into his friend.\n    *set good +5\n    *set relEleanor +5\n    You grip the guy by the neck and partially shove, partially throw him into the his buddy, which knocks them both down. You then pull the knife out of your ribs and walk towards the two bandits. \"You stabbed me. You know I was\n    hoping that things wouldn't get violent. But now, I'm gonna make sure you two rot here.\" You say in the most intimidating voice you can manage. It doesn't take any more than that to make both of the guys practically shit\n    themselves in fear. They both take off before you can actually carry out your threat. You put the knife back in your pocket and turn to Eleanor. \"Crisis averted.\" you say.\n\n    \"Are you okay Johnny?\"\n\n    \"Right as rain, love.\"\n    \n    \"Good. I'm glad things shook out this way. For a moment there I thought you were actually going to kill them.\"\n\n    \"You know I'd never hurt someone I don't have to. Now, why don't you try to get some sleep? I'll keep watch.\"\n\n    Eleanor lays down inside the sleeping bag you got from the man and goes to sleep pretty quickly. She must have been exhausted. You keep watch for the rest of the night.\n    *goto morning\n*else\n \"What is it?\" you ask her.\n\n \"It's your turn to take watch. I cannot stay awake a minute longer.\"\n\n \"Oh, yeah sure thing. You just go to sleep, leave the rest to me.\"\n\n You get up and stand at the alleyway while Eleanor lies down and sleeps. After a while waiting you see a couple of zombies wandering in front of the building but they don't seem interested in you, neither do they want to check if there's\n anyone actually alive with you. The time passes by peacefully as it turns out that this was naught but a nice, quiet night.\n *goto morning\n\n*label morning\n*page_break\n*if haseatenextra\n You give Eleanor a little nudge as she sleeps. She stirs a bit, but doesn't wake up. You gently shake her arm and quietly say, \"Hey Eleanor, wake up.\". She finally opens her eyes and looks at you. She yawns as she asks you for the\n time. \"Damned if I know, I don't have a cell or a watch on me remember?\" you respond.\n\n \"Oh yeah. Hold on a minute let me check.\" She says as she looks around in her pockets for her phone, eventually finding it and taking a look at the time. \"Seven-fifty. Hmm... we move quickly enough and we might make it to my\n uncle's place by nighttime.\"\n\n \"Shall we get going then?\"\n\n \"Yeah, of course.\"\n *goto onthemove\n*elseif haseaten\n *if eatspeople\n  *set haseatenextra true\n  You tap Eleanor on the shoulder a little as she sleeps. She stirs a bit, but doesn't wake up. You gently shake her arm and quietly say, \"Hey Eleanor, wake up.\". She finally opens her eyes and looks at you. She yawns as she asks you for the\n  time. \"Damned if I know, I don't have a cell or a watch on me remember?\" you respond.\n\n  \"Oh yeah. Hold on a minute let me check.\" She says as she looks around in her pockets for her phone, eventually finding it and taking a look at the time. \"Seven-fifty. Hmm... we move quickly enough and we might make it to my\n  uncle's place by nighttime.\"\n\n  \"Shall we get going then?\"\n\n  \"Let me have a bite first Johnny, I feel as though starvation is starting to kick in.\"\n\n  \"Alright, sure thing.\" Eleanor stays silent for a moment, then responds.\n\n  \"You're okay?\"\n\n  \"Yeah, yeah, the chicken I ate yesterday was more than enough. Go ahead, eat up.\"\n\n  You see Eleanor taking out the can of vegetable soup from the bag. She cracks the can open and starts eating. Eventually she finishes.\n\n  \"Was it nice? Shall we be off now?\" You ask.\n\n  \"Yeah, of course.\"\n  *goto onthemove\n *else\n  *if hasbeef\n   *set hasbeef false\n   You tap Eleanor on the shoulder a little as she sleeps. She stirs a bit, but doesn't wake up. You gently grab her arm. As soon as you touch her soft skin your mouth waters. You pull your hand back in shock and try to force the hideous\n   thought away. The hunger must be catching up to you, you didn't eat nearly enough to satisfy yourself yesterday. You decide to open up the can of beef you got from the supermarket and eat that. Once you finish you go and wake up\n   Eleanor again. \"Hey Eleanor, wake up.\" you say. \n   She finally opens her eyes and looks at you. She yawns as she asks you for the time. \"Damned if I know, I don't have a cell or a watch on me remember?\" you respond.\n\n   \"Oh yeah. Hold on a minute let me check.\" She says as she looks around in her pockets for her phone, eventually finding it and taking a look at the time. \"Seven-fifty. Hmm... we move quickly enough and we might make it to my\n   uncle's place by nighttime.\"\n\n   \"Shall we get going then?\"\n\n   \"Let me have a bite first Johnny, I feel as though starvation is starting to kick in.\"\n\n   \"Alright, you do what you gotta.\" Eleanor stays silent for a moment, then responds.\n\n   \"You good?\"\n\n   \"Yeah, I'm ok.\"\n\n   You see Eleanor taking out the can of vegetable soup from the bag. She cracks the can open and starts eating. Eventually she finishes.\n\n   \"Okay, I'm done.\" She finally says.\n\n   \"Shall we be off?\"\n\n   \"Yeah, of course.\"\n   *goto onthemove\n  *else\n   You tap Eleanor on the shoulder a little as she sleeps. She stirs a bit, but doesn't wake up. You gently grab her arm. As soon as you touch her soft skin your mouth waters. You pull your hand back in shock and try to force the hideous\n   thought away. The hunger must be catching up to you, you didn't eat nearly enough to satisfy yourself yesterday. After taking a few deep breaths you think you finally have it under control. \"Hey Eleanor, wake up.\" you say, your\n   voice slightly shaky. She finally opens her eyes and looks at you. She yawns as she asks you for the time. \"Damned if I know, I don't have a cell or a watch on me remember?\" you respond.\n\n   \"Oh yeah. Hold on a minute let me check.\" She says as she looks around in her pockets for her phone, eventually finding it and taking a look at the time. \"Seven-fifty. Hmm... we move quickly enough and we might make it to my\n   uncle's place by nighttime.\"\n\n   \"Shall we get going then?\"\n\n   \"Let me have a bite first Johnny, I feel as though starvation is starting to kick in.\"\n\n   \"You do what you gotta. Just let me turn away first.\" Eleanor stays silent for a moment, then responds.\n\n   \"I'm sorry there's nothing for you Johnny.\"\n\n   \"I appreciate it. Now could you please eat, preferably fast?\"\n\n   You hear Eleanor taking out a can from the bag, the vegetable soup. She opens it. You can hear her take the spoon and insert it into the can, then putting the food in her mouth. Her lips moving, her teeth chewing. Her tongue forcing it \n   all down. It happens more times than you can count. But it finally and mercifully ends.\n\n   \"I'm done.\" She finally says.\n\n   \"Thank God. Now shall we be off?\"\n\n   \"Yeah, of course.\"\n   *goto onthemove\n*else\n *temp notfalse false\n You tap Eleanor on the shoulder a little as she sleeps. She stirs a bit but doesn't wake up. You gently grab her arm. As soon as you touch her soft skin your mouth waters. You pull your hand back in shock and try to force the hideous\n thought away. And yet no matter how hard you try all you can think of is eating something. Your undead nature is telling you that there is something to eat, right in front of you. You pace back and forth, shake your head, try to take\n deep breaths and focus but it doesn't work. You can think of nothing but how hungry you are and how you'll surely persih from this hunger. Maybe you could just take a quick little bite.\n *choice\n  *selectable_if (notfalse = true) #Eat her!\n   *set RelEleanor -80\n   *set Civilized -50\n   *set good 0\n   *ending\n  #Focus!\n   You continue pacing back and forth trying your best to keep a lid on your primal urges. But no matter how hard you try you find it impossible to control yourself. Eventually you run out of the empty lot, so as to not be a danger to\n   Eleanor. You're not going to go too far. Just far enough to find something to eat. Then you'll come back.\n\n   You wander around, hoping to find something edible. The supermarket is too far away, you can't go there now. There are no other stores that sell meat anywhere close by. But eventually, as luck would have it, you hear a little squeak.\n   You turn towards the sound and find a rat scurrying around on the pavement. It's not a small rat by any means, about half the size of your forearm, without counting the tail. It could make for a... decent meal at least.\n   *choice\n    #Eat the rat.\n     *set haseaten true\n     *set eatsraw true\n     *set civilized -25\n     You forget about any taboos you may have once had about eating rodents. You dart towards it, grab it by the back of the neck and lift it up. You don't exactly feel good about killing a small animal but you're far too hungry to let\n     that bother you right now. You bite its head off and chew. Either rats have brittle bones or your jaws are strengthened by your condition, because you chew through it's skull quite effortlessly. The brain feels pretty\n     disgusting but you don't stop eating. After swallowing the head you start eating the body as well. It's not too bad actually. The meat is stringy and kind of gamey but there were worse things to eat for sure. After finally taking\n     the final bite you feel much better. Not sated, not quite, but you think you can control yourself better now. You go back to the empty lot.\n     *page_break\n     *goto backtolot\n    #I'm not eating a rat.\n     *set haseaten true\n     *set haseatenextra true\n     *set eatsraw true\n     *set eatszombies true\n     *set civilized -45\n     Whether it's the guilt of killing and eating a small animal or a taboo you can't let go of just yet, you don't eat the rat. A few seconds later you regret your decision, but by then the rat has scurried down a drain, out of reach.\n     You begin feeling dizzy. Doesn't it take two weeks on average for a human being to starve to death? Did the unpleasant effects of starvation kick in like this after only one day or are they intensified by your condition? As you\n     think it over you suddenly spot a very pleasant sight. It's a goddamn disabled truck, one that was delivering meat. You charge towards it and dig into the disgusting pile of raw flesh, alongside the rats and the cockroaches. Under\n     normal circumstances this is something\n     no human would ever\n     do. But what's happened to you is far from normal. You're pretty sure you swallowed plenty of insects and rodents alongside the raw meat. It doesn't matter though. After taking the final bite you realize you feel great. Sated and\n     full. You go back to the empty lot.\n     *page_break\n     *goto backtolot\n\n*label backtolot\nYou finally reach the empty lot, to find Eleanor still peacefully sleeping. Phew. No one snuck in here and Eleanor did not wake up either. Like you never left her to begin with.\n*if haseatenextra\n You again tap Eleanor on the shoulder as she sleeps. Still, she doesn't wake up. You gently shake her arm and quietly say, \"Hey Eleanor, wake up.\". She finally opens her eyes and looks at you. She yawns as she asks you for the\n time. \"Damned if I know, I don't have a cell or a watch on me remember?\" you respond.\n \n \"Oh yeah. Hold on a minute let me check.\" She says as she looks around in her pockets for her phone, eventually finding it and taking a look at the time. \"Eight o' clock. Hmm... we move quickly enough and we might make it to my\n uncle's place by nighttime.\"\n\n \"Shall we get going then?\"\n\n \"Let me have a bite first Johnny, I feel as though starvation is starting to kick in.\"\n\n \"Alright, sure thing.\" \n\n Eleanor stays silent for a moment, then responds. \"You're okay?\"\n\n \"Yeah, yeah, I'm uh, I'm good.\"\n\n You see Eleanor taking out the can of vegetable soup from the bag. She cracks the can open and starts eating. Eventually she finishes.\n\n \"Shall we be off now?\" You ask.\n\n \"Yeah, of course.\"\n *goto onthemove\n*elseif haseaten\n You again tap Eleanor on the shoulder as she sleeps. Still, she doesn't wake up. You gently grab her arm. As soon as you touch her skin your mouth waters yet again. This time, you force the hideous\n thought away. After taking a few deep breaths you think you finally have it under control. \"Hey Eleanor, wake up.\" you say, your\n voice slightly shaky. She finally opens her eyes and looks at you. She yawns as she asks you for the time. \"Damned if I know, I don't have a cell or a watch on me remember?\" you respond.\n\n \"Oh yeah. Hold on a minute let me check.\" She says as she looks around in her pockets for her phone, eventually finding it and taking a look at the time. \"Eight o' clock. Hmm... we move quickly enough and we might make it to my\n uncle's place by nighttime.\"\n\n \"Shall we get going then?\"\n\n \"Let me have a bite first Johnny, I feel as though starvation is starting to kick in.\"\n\n \"You do what you gotta. Just let me turn away first.\" Eleanor stays silent for a moment, then responds.\n\n \"I'm sorry there's nothing for you Johnny.\"\n\n \"I appreciate it. Now could you please eat, preferably fast?\"\n\n You hear Eleanor taking out a can from the bag, the vegetable soup. She opens it. You can hear her take the spoon and insert it into the can, then putting the food in her mouth. Her lips moving, her teeth chewing. Her tongue forcing it \n all down. It happens more times than you can count. But it finally and mercifully ends.\n\n \"I'm done.\" She finally says.\n\n \"Thank God. Now shall we be off?\"\n\n \"Yeah, of course.\"\n *goto onthemove\n\n*label onthemove\n*page_break\n*temp bit false\nYou and Eleanor are moving through the city at a nice brisk pace. It seems as though today is going to be quiet, just like yesterday. You're almost at the city limits when you run into an absolute warzone. There are numerous survivors\nand undead here, all fighting each other. You're not sure but you think some survivors are attacking other humans as well. So much for it being a quiet day. \"There's no way to walk through that mess.\" says Eleanor.\n\n\"Too right you are. Let's get out of here. We'll move around the perimeter of the city, try to find a place that's not a battlefield.\" You move away from the city limits and start going through alleys and streets until you find\na better location to exit the city from. Once you finally arrive at another exit point you encounter yet another problem. Though this place isn't teeming with survivors and undead there are still quite a few zombies wandering about.\nYou're gonna have to get past them somehow.\n*label distraction\n*choice\n *hide_reuse #I'll try my best to distract them so Eleanor can sneak through, then follow her.\n  You tell Eleanor to wait where she is while you approach the zombie infestation. They completely ignore you. You move slightly farther away from them, trying to draw them away from the road. Once you arrive at the right spot you start\n  yelling curses at the them. When that doesn't work you approach them again and pretend to be a zombie that just spotted a survivor. Your moaning and running away seems to attract their attention but only for a little bit.\n  Now what?\n  *choice\n   #I'll try dragging them away one by one.\n    *set bit true\n    Frustrated, you move back towards the zombie infestation, grab one of the undead and start forcefully dragging it away. The zombie seems startled by this as it starts screaming and thrasing about. Suddenly it manages to break out of\n    your grip. It then turns around and bites you. \"You son of a bitch!\" you yell out as you get your knife and jam it in the zombie's skull. Every other zombie around suddenly turns and runs at you. So it seems they will still\n    attack if they feel threatened. You have no idea if the fact that you got bit means that you will turn back into a full zombie or if you'll stay as you are. Either way you've got more immediate concerns. One zombie likely can't kill\n    you, not directly at least. But a horde of them might manage to rip you to pieces. Even you won't survive that.\n    *choice\n     #Run!\n      You turn around and start running as fast as you can away from the zombies. For a moment you think that it will be easy to outrun them, given that you cannot get fatigued. Then you realize that the same thing applies to regular\n      zombies as well. You keep running for a long time. Eventually you manage to lose them. It takes you even longer to find an alternate route back to where you were and when you finally do arrive you don't see Eleanor anywhere. You\n      don't find any indication that she was attacked or got hurt in any way either though. You check the area on your body where the zombie bit you, finding no wound or bite mark. You hope that's the end of that and decide to continue\n      to move towards George's house on your own, hoping to find Eleanor there.\n      *goto walkalone \n     #Stab them all to death!\n      You plant your feet and get ready to fight the horde of zombies charging towards you. As soon as the first zombie comes within reach you kick it as hard as you can, then stab it in the eye. Your knife becomes stuck inside the\n      zombie's head though. As you try to pull it out the other zombies catch up, running into you and knocking you down. You try to fight back but it quickly becomes evident that you've bitten off more than you could chew. The undead do\n      precisely what you were afraid they might do. Using teeth and claws, they manage to literally rip you apart. Your last thoughts are of Eleanor. You hope that your death was at least a suitable distraction, enough that she could\n      sneak through and reach her uncle's place safely.\n      *ending\n     *selectable_if (gun) #Get out my revolver and blow their brains out!\n      You quickly whip out your revolver, take aim and start firing. Most of your shots strike true, hitting the undead in the head or face and putting them down for good. A couple of them manage to reach you but you dispatch them with\n      your knife relatively easily. One of them managed to bite you again though. You get back to Eleanor. \"Best we get going, the noise is likely to attract more of them.\" You say.\n\n      \"Johnny are you... will you be okay? You're bit...\" She sounds very concerned for you.\n\n      \"I don't know. I don't feel any different. And...\" You check for any wounds or bite marks, finding nothing. \"The wounds did heal. But I guess time will tell.\"\n\n      *if (RelEleanor \u003c 70)\n       \"I really hope nothing happens to you.\" She says. \"Let's go.\"\n       *goto walkwithEleanor\n      *else\n       Eleanor takes a deep breath before responding. \"Just... I want you to remember that I love you. Now come on, let's go.\"\n       *goto walkwithEleanor\n   #Try something different.\n    Very well. What are you going to do?\n    *goto distraction\n *hide_reuse #See if covering Eleanor in zombie guts will let us both sneak through.\n  \"Hmm... I have an idea, Eleanor. You might not like it though.\"\n\n  *if (RelEleanor > 89)\n   \"I trust you Johnny. What is it?\" She asks.\n   *goto idea\n  *elseif (RelEleanor > 69)\n   \"Okay, what is it?\" She asks.\n   *goto idea\n  *elseif (RelEleanor > 60)\n   \"Oh great... what?\" She asks.\n   *goto idea\n  *elseif (RelEleanor > 55)\n   \"So it'll be just like every other idea of yours then. What is it?\" She asks.\n   *goto idea\n  *else\n   \"As if you care... what is it?\" She muttters.\n   *goto idea\n\n  *label idea\n\n  \"Now, I already know that they ignore me, they likely think I'm still undead. So what I'm gonna do is walk on over to one of them, disembowel it, cover you in its guts and hope that that's enough to let you sneak through alongside\n  me. I mean it works in the movies doesn't it? What do you think?\"\n\n  \"What the- no. No, we're not doing that. First of all we don't even know if it'll work and secondly we don't know if it's safe. What if whatever's turned them can pass through the skin?\"\n\n  \"You sure about this, Eleanor?\"\n\n  \"Dead certain Johnny.\"\n\n  You slightly grin at her choice of words. But regardless, you have to find a way through. So, now what?\n  *goto distraction\n *hide_reuse #Kill them all.\n  How do you plan on doing that?\n  *choice\n   #Quietly, with my knife.\n    You take out your knife and walk over to the zombie horde. You approach the closest zombie, take a deep breath and stab the knife through it's forehead. The zombie goes limp in your grip and you pull the knife out. Another zombie\n    turns and looks at you, then growls and begins approaching you. You turn your attention to it and quickly stab it through the eye. The rest of the zombies turn to you, making confused but aggresive sounding growls. You get the\n    feeling that they will attack very soon. While an individual zombie likely couldn't kill you, not directly at least, all the zombies gathered here might manage to rip you into pieces. Even you won't survive that.\n    *choice\n     #Run.\n      You dart in between the zombies and start running as fast as you can away from them. You look behind you and find the zombies chasing after you. For a moment you think that it will be easy to outrun them, given that you\n      cannot get fatigued. Then you realize that the same thing applies to regular\n      zombies as well. You keep running for a long time. Eventually you manage to lose them. It takes you even longer to find an alternate route back to where you were and when you finally do arrive you don't see Eleanor anywhere. You\n      don't find any indication that she was attacked or got hurt in any way either though. You decide to continue to move towards George's house on your own, hoping to find Eleanor there.\n      *goto walkalone \n     #Keep stabbing.\n      You keep your grip firm on your knife as you approach the third zombie, ready to kill. The zombie, however, charges right at you instead. You kick him back and then leap forward, stabbing it in the head as well. Almost immediately\n      you feel another zombie grab your back and pull you. Then another one bites your arm. As you struggle to escape a third zombie rushes you, knocking you down. With a sinking feeling you realize that you've bit off more than you\n      could chew. They do\n      precisely what you were afraid they might do. Using teeth and claws, they manage to literally rip you apart. Your last thoughts are of Eleanor. You hope that your death was at least a suitable distraction, enough that she could\n      sneak through and reach her uncle's place safely.\n      *ending\n     *selectable_if (gun) #Get out my revolver and shoot as well as stab.\n      *set bit true\n      You pull out your revolver and keep your grip firm on your knife. You approach the third zombie, ready to kill. The zombie, however, charges right at you instead. You kick him back and then leap forward, stabbing it in the head as\n      well. Almost immediately\n      you feel another zombie grab your back and pull you. Then another one bites your arm. You press your revolver into the forehead of the one biting your arm and pull the trigger. A third zombie rushes at you and you kick it away also,\n      then throw a backwards headbutt to the one that's grabbed you from behind, knocking it off of you. You turn around, stab the one that had you grabbed and also shoot the one you had kicked away. The final zombie approaches you and,\n      to your surprise, sidesteps your knife thrust while at the same time grabbing hold and biting your other arm. You bring the knife around and stab it in the back of the head. Eleanor approaches you as you stand there, zombie blood\n      all over you and taking deep breaths, mostly to calm down since you can't get tired. You turn to her. \"Best we get going right now, all that noise will undoubtebly draw more of them.\"\n\n      \"Johnny are you... will you be okay? You're bit...\" She sounds very concerned for you.\n\n      \"I don't know. I don't feel any different. And...\" You check for any wounds or bite marks, finding nothing. \"The wounds did heal. But I guess time will tell.\"\n\n      *if (RelEleanor \u003c 70)\n       \"I really hope nothing happens to you.\" She says. \"Let's go.\"\n       *goto walkwithEleanor\n      *else\n       Eleanor takes a deep breath before responding. \"Just... I want you to remember that I love you. Now come on, let's go.\"\n       *goto walkwithEleanor\n   *selectable_if (gun) #With my revolver.\n    You take out your revolver, take aim and start firing. Your shot strikes true, hitting the first zombie in the face and putting it down for good. The other zombies turn around and look at you as you put another bullet through the\n    second zombie's head. As you get ready to shoot the third one the zombies roar and charge at you. So it seems they'll still attack you if they perceive you as a threat. You continue shooting, hitting the third zombie as well. And so\n    on and so on. A couple of zombies manage to reach you so you take out your knife and jam it in the first zombie's eye. You then sidestep around it and roundhouse kick the second zombie in the gut, knocking it backwards. You manage to\n    pull your knife out of the first zombie's eye and move over to the second one. You finish it off by sticking your blade through its skull.\n\n    You turn back to Eleanor. \"Best we get out of here right now, the noise will likely attract more of them.\"\n\n    \"Let's go\" She responds.\n    *goto walkwithEleanor\n\n*label walkwithEleanor\n*page_break\nThe rest of the way to George's place is actually relatively quiet. Once you got out of the city proper there were no more confrontations with either humans or zombies. You assume that almost everyone that tried to leave either had\nalready left or they were in that warzone you encountered at the first exit point. George's house comes into view as the night falls. You continue walking, eyes peeled, given that this is usually the part where something pops up and\nscrews everything up. But nothing of that sort happens and you reach the house peacefully. Eleanor turns to you as you both stand outside the wooden gate leading into the yard. \"Well, we made it.\"\n\n\"Looks like we did.\"\n\n*if bit\n \"How do you feel Johnny?\" She asks you.\n\n \"Fine. I feel completely fine.\"\n\n \"I guess I can stop worrying then. If you've made it this far with no symptoms of any kind then their bites likely don't affect you.\"\n\n \"I guess so. Although... well we don't really know how long it takes or what symptoms there are, assuming there are any.\"\n\n \"Maybe. But I really do think that if something was going to happen it would have already done so. Call it instinct.\"\n\nEleanor then puts her arm in between the wooden beams of the gate and reaches for the handle on the other side. She unlocks it and you both enter the yard, closing the gate behind you. You then walk up the steps and reach the front\ndoor. The door opens and George appears just before Eleanor knocks on the it. He's wearing all denim. Denim jacket with a white shirt, denim pants and black combat boots. He pulls Eleanor into a hug. \"Hey there girl, glad you made it.\nJohnny it's um, well it's good to see you again I guess. Come on inside.\"\n\n*page_break\n*set knowsGeorge true\n\nYou both enter the house and get inside the first room, which is a kitchen and living room combined, with a couch and a tv closer to the door and the actual kitchen deeper inside the room. George turns to you once more. \"So do you two\nneed anything? You look pretty well done in if you don't mind my saying so.\"\n\n\"Yeah, walking for two days straight will do that to you. Anyways we're starving, you got anything to eat?\" Says Eleanor.\n\n\"I could cook up some dinner for you two, sure.\"\n\n\"Hope meat's on the menu.\" You say.\n\n\"I don't remember you being a meat eater, when did that happen?\" Asks George.\n\n\"When I came back from the dead. My condition prevents me from eating anything but meat.\"\n\n\"Oh, I see. Well I've got some chicken breasts in the freezer and plenty of cans so, no need to worry.\"\n\n*if eatsraw\n \"Alright, just defrost the chicken and then bring it here. I'll eat it raw, no need to cook it up or anything.\"\n\n Eleanor shoots you a weird look but doesn't say anything. George looks at you for a bit before asking you if you're sure. You inform him that you are absolutely sure. Eventually everything is ready and you and Eleanor both enjoy a nice,\n hearty meal.\n *goto mealover\n*else\n \"Ah, good. Well I'd really appreciate a nice meal right about now. Thank you.\" George takes the meat out of the freezer and starts preparing the food. Eventually everything is ready and you and Eleanor both enjoy a nice\n meal.\n *goto mealover\n\n*label mealover\nAfter you finish your food George speaks to Eleanor. \"I got some news for you by the way. I've gotten into contact with Hank, Alexandra and Billy. They'll be coming over to stay here as well. They should arrive tomorrow.\"\n\nEleanor responds, \"Great, the more people we got the better our chances of surviving this thing are.\"\n\n\"Indeed. I just hope they make it here alright. I mean I know Hank will since he doesn't live that far, it's the other two I'm worried about.\"\n\n\"Well Alexandra has a car so, if we could make it out of the city on foot I'm sure she and Billy will be fine.\"\n\nYou interject. \"Excuse me but, could you two bring me up to speed?\" Eleanor turns to you.\n\n\"Alexandra and Billy are two of my cousins, twins, they were there when you met my family just like George was. Hank's a cousin of mine too but I don't think you've ever met him.\"\n\nYou start digging through your memory and eventually you do manage to remember Alexandra and Billy. Two blonde kids in their early twenty's, Alexandra was the skinny one and Billy was somewhat muscular. They're not identical twins, obviously,\nbut their faces do look very much alike. As for Hank, you have absolutely no recollection of having ever met him.\n\n\"I see,\" you begin, \"by the way, did I ever tell you anything about my family? Because I for the life of me cannot remember anything.\"\n\nE
