<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dual Nature — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "dualnature", "title": "Dual Nature", "scenes": {"choicescript_description": "Struggle between your undead and human side whilst trying to survive in this post apocalyptic horror game. Would you save what's left or rule among the dead?\n\n[i]Dual Nature[/i] is a 55,000-word interactive novel by Nikos Nikolakopoulos, where your choices control the story. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\nThe whole world is dying. Hordes of zombies plague the earth and civilization has collapsed. You don’t know how this happened. The only thing you do know is that you’ve just crawled out of your grave. Yet unlike the other zombies, you’re still sentient.\n\nWill you try to convince mankind that you’re still one of them? Will you protect the living? Or embrace your undead nature and succumb to darkness? Is it possible to find a way to undo the apocalypse? What are you willing to sacrifice?\n\n• Play as Johnny, a man trapped between life and death.\n• Fight to keep your humanity intact.\n• Struggle between good and evil.\n• Make allies or enemies.\n• Seek power or justice.\n\nIn this post-apocalyptic horror game there is no peace for the dead, no rest for the wicked and no hope for humanity. Could you be the one to undo the apocalypse?\n\n[b]Content Warning:[/b] In this game you play as a sentient zombie. It contains scenes of a graphic nature that can't be described as cannibalism because the PC is no longer human. It also contains suicide, torture, mutilation, and sexual assault. Reader discretion is advised.", "choicescript_stats": "*if Good \u003c 0\n *set good 0\n*if Good > 100\n *set Good 100\n*if civilized \u003c 0\n *set civilized 0\n*if RelEleanor \u003c 0\n *set RelEleanor 0\n*if RelEleanor > 100\n *set RelEleanor 100\n*if RelGeorge > 100\n *set RelGeorge 100\n*if RelGeorge \u003c 0\n *set RelGeorge 0\n*if RelHank > 100\n *set RelHank 100\n*if RelHank \u003c 0\n *set RelHank 0\n*if RelAlexandra > 100\n *set RelAlexandra 100\n*if RelAlexandra \u003c 0\n *set RelAlexandra 0\n*if RelBilly > 100\n *set RelBilly 100\n*if RelBilly \u003c 0\n *set RelBilly 0\n\n*stat_chart\n\n percent Civilized Humanity\n opposed_pair Good\n  Evil\n\n\n\nRelationships:\n*if knowsEleanor\n *stat_chart\n  percent RelEleanor Eleanor\n*if knowsGeorge\n *stat_chart\n  percent RelGeorge George\n*if knowsHank\n *stat_chart\n  percent RelHank Hank\n*if knowsAlexandra\n *stat_chart\n  percent RelAlexandra Alexandra\n*if knowsBilly\n *stat_chart\n  percent RelBilly Billy", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n  \n  Permanently remove all advertising and delays.\n  \n  *purchase_discount adfree 2022-09-08 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n  \n  You've paid to permanently remove all advertising and delays.\n", "country": "*advertisement 60\nYou stir and wake up from your slumber. As you turn around you see Eleanor, eyes half closed, sleepily staring at you. \"Wakey wakey Johnny, time to get up.\" she says. You get up out of bed alongside Eleanor and move back to the\nkitchen/living room area. There you find George sitting on the couch, cup of coffee in hand, watching the news. From what you manage to make out it seems the apocalypse is a global event. The reporter then rattles off a long list of\npublic and private services that are being shut down as a result of the apocalypse and advises everyone to remain in their homes and avoid confrontation with the undead. She also informs everyone that a bite from a zombie will result in\ndeath in one to two days, with symptoms being headaches, delirium and aggression which occur anywhere from three to seven hours after being bit. Reanimation can occur regardless of the cause of death, assuming\nthe brain isn't destroyed. Well that's good to know. You and Eleanor both grab a cup of coffee and sit down. George gives you a weird look and asks you if you can even drink coffee.\n\n\"I'm... not sure actually. I guess we'll see.\" you respond and carefully take a sip. The coffee tastes and feels just like you remember it. \"Well, I guess liquids aren't affected by my condition after all. So uh, what is it\nthat we'll do today?\" you ask.\n\n\"Well, I'm thinking we reinforce the door to the yard while we wait for the others to come. Nothing too fancy, just nail a couple of boards on the beams so that no one can reach in between the gaps and open the door. You two can\nhave your coffee first, then we'll start with the reinforcing.\"\n*page_break\nYou all do just that. After finishing up all your morning rituals you get out in the yard, cutting up wood and nailing it on to the gate. It's pretty sunny out, you imagine it's quite hot. Both Eleanor and George are sweating\nlike hell. You're actually feeling somewhat grateful that you cannot feel the heat or get tired, at least right now. After a couple of hours you all finish the job. The front gate looks... well not particularly sturdy. And it's fairly\nugly now, with all the boards nailed on it. But at least it should provide some protection from possible intruders. \"Now what?\" you ask.\n\n\"Well, we'll rest up a bit. Johnny I want you to stand guard, make yourself comfortable on top of the stairs so you can see over the gate. Call us over if you see anyone coming this way.\"\n\n\"Alright George.\"\n\n*if (RelGeorge > 49)\n \"Let me bring you a gun, you might need it.\"\n\n *if gun\n  \"That won't be necessary, I already have this here revolver.\" you say as you pull back your trenchcoat to reveal the revolver you got tucked in your belt.\n\n  \"I see. Well let me just get you a proper holster then.\" George then leaves and comes back with a nice, dark leather holster. You wear it and put the revolver inside the holster instead of your belt. \"Now remember, if you're\n  not in immediate danger you are not drawing that firearm until I say so. You got that?\"\n\n  \"Yeah, yeah.\"\n  *goto standguard\n *set gun true\n With that George leaves and comes back with a revolver and a nice, dark leather holster. You wear it and put the revolver inside the holster. \"Now remember, if you're\n not in immediate danger you are not drawing that firearm until I say so. You got that?\"\n\n \"Yeah, yeah.\"\n *goto standguard\n*else\n George and Eleanor then leave, going back inside the house.\n *if gun\n  Good thing you already have your revolver, cause George doesn't bring you a gun. You sigh internally. Him not liking you is one thing but not giving you a gun is another. People could get hurt because of that kind of bullshit.\n  *goto standguard\n *else\n  You're not sure what good you can do as a guard without a gun of some kind, all you got is your knife. So what, you just scream for help? You sigh internally. Him not liking you is one thing but not giving you a gun is another. People\n  could get hurt because of that kind of bullshit.\n  *goto standguard\n\n*label standguard\n*page_break\nYou spend quite a bit of time out here. Watching and waiting. It gets extremely boring after a while. You also think that you could get a better vantage point through the stairs leading to the ground floor, there's a window there, just high\nenough that it's out of reach, but it looks out over the narrow road that leads to the front gate. Better than sitting here, where the concrete wall surrounding the yard prevents you from seeing the entire road.\n\nJust when you were thinking of asking for a break or something along those lines you begin to hear what sounds like crying and moaning.\nA few moments later the source of the noise comes into view. It's two men, one dressed up like a cowboy, with a black and red plaid shirt, jeans, cowboy boots, a black ten gallon hat and shoulder length dark blonde, almost brown hair,\nforcing another man with pale skin, cool brown short hair, a green t-shirt, black track pants and grey running shoes, forward at knifepoint. This is all irrelevant of course. What actually matters is why this guy is coming up to the\nhouse.\n\nYou're also not certain why the hostage is only moaning and crying and not screaming for help. He does sport multiple injuries but none that would impede his ability to speak.\nYou\n*if gun\n place your hand on your revolver and\ncall out for George and Eleanor to come outside right now. They do just that and you see their features twist in shock as they see the dreadful sight in front of them. Then George screams \"Hank! What in the hell do you think you're\ndoing?!\"\n\nWait a moment... Hank? As in Eleanor's cousin? He's the cowboy? Well they failed to mention that the guy was a psychopath. Eleanor and George both run down the stairs to the yard and open up the gate. The cowboy greets them with an\nunfittingly cheerful tone of voice. \"Hey there uncle, cousin, it's good to see you both!\"\n\nEleanor stutters as she says this next sentence. \"Hank wh- what the fuck?! What is this?\"\n\n\"Oh this? It's just a servant I figured I'd bring along for the ride.\" Responds Hank in his ever cheerful tone.\n\n\"Damn it, give me that fucking knife!\" Responds George as he practically wrestles the knife out of Hanks hand. It's a real nice knife too, not a kitchen one like you have, this one's a proper combat knife. Or a survival knife,\nyou're not too sure actually. Hank's cheerful demeanor completely vanishes as soon as he loses his knife. George tells the hostage to get out of here and Hank completely freaks out as he sees his \"servant\" running away, screaming\nat him that if he finds him again he's gonna make him wish he died here. George turns to Hank.\n\n\"[b]Hank![/b] We don't kidnap people for no reason. We are [b]not[/b] psychopaths nor murderers.\"\n\n\"Oh I had a damn good reason for doing what I did.\"\n\n\"I don't even want to know. Just get inside the house.\"\n\n\"...may I have my knife back?\"\n\nGeorge sighs and gives him back the knife. Before Hank grabs it George tells him that, should he fall out of line once more, he'll be surviving the apocalypse with his fists. You then all get back inside the house. George stands guard\nthis time.\n*page_break\n*set knowsHank true\nHank takes off his backpack and crashes down on the couch alongside you and Eleanor.\nAs the three of you are sitting on the couch in the living room/kitchen Eleanor turns to Hank. \"Just what got into you, Hank?\" she asks him.\n\n\"I don't want to talk about it, okay? I'm pissed off, ...fucking asshole let him get away.\" Hank stays in thought for a bit before suddenly flicking back to life again. \"Oh by the way, Eleanor, I got something for you.\" Hank\npulls a pack of cigarettes out of his pocket. \"Here you go.\"\n\n\"Oh... thanks. You got a light?\" Eleanor asks as she opens the pack and puts a cigarette on her lips. Hank takes out a weird looking lighter and lights up the cigarette. He then smacks his right knee with his hand and turns to you.\n\"And you must be the infamous Johnny.\" His cheerful demeanor seems to have somewhat returned. \"Yes, Eleanor here has told me all about you.\"\n\n\"Really? Did she now?\"\n\n\"Well actually, no. She did talk about you somewhat pre-apocalypse but I don't know much about you. Other than what... George told me. You came back from the dead?\"\n\n\"Yeah, I did.\"\n\n\"Huh that sounds... pretty cool actually.\"\n\nHank and Eleanor don't say anything else so it seems you've got the opportunity to change the subject. What do you want to talk about?\n*choice\n #I'll ask Hank what he did before the apocalypse.\n  *set RelHank +10\n  \"I didn't have a steady job if that's what you mean. I did some odd jobs here and there. You know, help out the old man with the bad back with some manual labor, take care the house while the family is away,\n  that kind of thing. My life was paycheck to paycheck for the majority of the time since my parents were... out of the picture.\"\n\n  \"Damn, that's brutal man. So what else did you do?\"\n\n  \"During what little free time I had you mean? I kept myself busy writing fanfiction and playing video games. You play any video games Johnny?\"\n  *fake_choice\n   #No.\n   #Yes.\n\n  The conversation continues for a while. Hank talks about his video games, his fanfics and eventually the conversation shifts back to his life before the apocalypse. He talks about his childhood, it's clear that he liked those years of\n  his life. He doesn't really get into detail about his teen years though, just says that they were \"the worst experience\" of his life. Then the conversation more or less ends. You turn on the TV but most channels seem to be down. The\n  few ones that are up are still showing \"urgent\" news.\n  *goto arrived\n #Music. Ask Hank what kind of music he likes.\n  *set RelHank +5\n  Hank thinks for a second before responding \"I'm a motor oil rock and dark country fan for the most part, Johnny. How about you? Metalhead I take it?\"\n\n  \"Yeah, pretty much. Although there really is no music genre that I actively dislike so, I'm open to listening to whatever.\"\n\n  \"Really? You don't dislike anything?\"\n\n  \"Well, there are certain types of music that I dislike such as tween pop and that godawful ghetto-rap, but I don't dislike rap or pop in general.\"\n\n  \"Heh, I see. Well, anyone that dislikes tween pop and ghetto-rap is good in my book.\"\n\n  The conversation continues. You make small talk about music, art and movies for quite a while. Eventually however, the conversation ends. You turn on the TV but most channels seem to be down. The\n  few ones that are up are still showing \"urgent\" news.\n  *goto arrived\n #Nothing, I don't want much to do with Hank. Turn on the TV.\n  You turn on the TV but most channels seem to be down. The few ones that are up are still showing \"urgent\" news. You hear Hank moan in frustration. \"Goddamnit, is stupid and boring news all they got? Seriously now, since yesterday\n  and the day before its been nothing but fucking news all day. And they don't even tell you anything useful. Just shit that anyone who's ever watched a zombie movie or played a zombie game in the past ten years will know.\n\n  Hank continues to complain for a while. You feel like complaining yourself, the news aren't actually telling you anything new, they're a repeat of the news you saw this morning, just with a different reporter.\n  *goto arrived\n\n*label arrived\n*page_break\n*set knowsBilly true\n*set knowsAlexandra true\n*if (civilized > 94)\n *goto realarrived\n*elseif (civilized > 79)\n *set RelAlexandra -5\n *goto realarrived\n*elseif (civilized > 69)\n *set RelBilly -5\n *set RelAlexandra -10\n *goto realarrived\n*else\n *set RelBilly -10\n *set RelAlexandra -15\n *goto realarrived\n\n*label realarrived\nEventually you hear talking from outside and a little later George comes in alongside Billy and Alexandra. Billy looks a bit different than you remember, he was clean shaven, with short hair and in a suit when you first met him. Now his\nhair is somewhat longer, he has a goatee and wears a simple white T-shirt, baggy jeans and grey and black sneakers. Alexandra is just like you remember her, long hair, skinny physique and wearing a beige crop top, tight low-waist pants\nand high-heeled boots. They both lay down a large duffel bag each. \"Hey there you guys, how you all doing?\" asks Billy.\n\n\"Eh, we're alright, we're alright.\" Responds Hank. George then speaks up, telling everyone to find a room to settle in since there are no more actual bedrooms in the house. Hank announces that he can sleep on the couch, claiming\nthat it's a \"damn comfy couch\" and Alexandra and Billy both decide to sleep in the empty ground floor, given that it's the only other room where there's enough space to lay down a mattress without everything getting all cramped. George then helps\nthe twins unpack and get a couple of spare mattresses from the storage down to the ground floor. After that George tells everyone to sit down at the table while he prepares some food.\n\nYou all talk about random inconsequential things while waiting, with the exception of Hank, who remains silent. Eventually dinner is served.\n*if eatsraw\n Billy, Hank and Alexandra look at you a bit funny when they notice that you'll be eating raw meat but seem to forget all about it after Eleanor explains things to them.\n*page_break\n*temp talkwithBilly false\n*temp talkwithAlexandra false\n*temp talkwithEleanor false\n*temp talkwithHank false\nYou all eat your food mostly in silence, given that everyone in here was quite hungry, including you. You notice Hank finish his portion relatively quickly. He then takes out a pouch and black pipe and starts stuffing tobacco inside\nit. George notices that Hank's finished a moment later and asks him to go stand guard outside until nine PM. Hank asks if that means that he'll get a gun but George replies \"Not after the stunt you pulled this morning.\".\n\n\"Well thank you for your trust in me, uncle.\"\n\n\"Trust is earned son, and you've a long way to go until you earn mine again.\"\n\nHank storms off. Eventually everyone else finishes their food too and begin leaving the table. George says that he's off to read, Alexandra starts playing around on her phone, Billy lights up a cigar and Eleanor starts aimlessly flipping\nthrough the TV channels (still nothing but news on TV it seems). How about you, what are you going to do?\n*choice\n *selectable_if (RelGeorge > 49) #Go talk with George.\n  You go to the room right next to the living room/kitchen, to find George sitting on a rocking chair, reading a leatherbound book. You can't see the title because of the way George is holding the book, but it doesn't look like the kind\n  of thing you'd choose for some light reading. \"Looks like a good book.\" you say.\n\n  \"Very enjoyable. Is there something you'd like to ask me?\" Seems he's not in the mood for idle talk right now. Best talk to him about something important.\n  *choice\n   #\"I'd just like to know what our plan of action is.\"\n    *set RelGeorge +10\n    \"We'll wait this thing out while we can. I don't think there's any need to endanger ourselves while supplies last. Should things still be bad once we start to run low, well, we'll start organizing supply runs. We have a working\n    vehicle now so we can go back to the city if we need anything that we can't procure out here. But I don't think we'll need to make a lot of those trips, the woods here are full of game and there is a water pump in the back yard.\"\n\n    \"All the better, it's crazy back in the city.\"\n\n    \"I bet it is. Well I'm glad you took the time to ask me about this, Johnny.\"\n\n    George then turns his attention back to his book. You decide to leave him be and go back to the living room.\n    *goto backin\n   #\"Do you think it's safe here?\"\n    *set RelGeorge +5\n    \"Safer than anywhere else. For now at least. But we will have problems sooner or later I'm afraid.\"\n\n    \"What do you mean?\"\n\n    George takes a deep breath. \"Like it or not them people in the cities are going to start coming this way. The fact that the country is safer ain't a secret. We'll have to deal with all them looters and bandits, not\n    to mention the zombies that will surely follow the fleeing mob. Also, people can do some strange things when they're scared. Folk we call neighbor today could turn on us tommorow. But... we're survivors Johnny. We'll make it. Have\n    faith.\"\n\n    George turns his attention back to his book. You let him be and go back to the living room.\n    *goto backin\n #Spend some more time with Eleanor.\n  *set talkwithEleanor true\n  You sit down on the couch beside Eleanor. \"Hey.\" You say.\n\n  \"Hey there. What is it?\"\n\n  \"I'd just like to talk to you...\"\n  *choice\n   #\"Do you feel safe here?\"\n    *set RelEleanor +10\n    \"As safe as I can be. We're far away from zombies as well as looters, so I don't think there's much reason for concern right now.\"\n\n    \"Right now? So what about later? Do you think we should be worried?\"\n\n    \"Look, I'm certain that this kind of safety cannot last. Not in this world. But we'll deal with things as they come, Johnny.\"\n\n    \"I see. What do you think our plan of action should be then?\"\n\n    \"I trust whatever plan George has in mind. But if I was the one in charge? I'd say we should try and wait out the worst of it. Like I said before, we're far away from both zombies and other people, so we should be okay.\"\n\n    \"And what about the people that live here?\"\n\n    \"I don't think we should be worried. They've been our neighbors for a long time now. I highly doubt that they would turn on us. In fact, I think it's a good thing that there are others living close by.\"\n\n    \"Yeah, why's that?\"\n\n    \"Because it means that we might be able to establish a new community. You know, a settlement. A post-apocalyptic town of law and order. A haven from the lawless wastelands outside.\"\n\n    \"Hmm... I see. Well I hope things do go according to plan.\"\n\n    \"They will Johnny, don't worry.\"\n\n    You decide to cut your talk here and get back up.\n    *goto backin\n   #\"About us, our relationship I mean.\"\n    \"What is there to say?\"\n\n    \"Well, how do you feel?\"\n\n    \"Oof, is that a trick question?\"\n\n    \"No it's not. And I'd like it if you gave me an honest answer.\"\n\n    *if (RelEleanor > 89)\n     *set RelEleanor +5\n     Eleanor fails to hide an amused smirk. \"I don't know what you're so worried about, we're good. Better than that, actually, we're great.\"\n\n     \"You don't know how happy I am to hear you say that. I was thinking that, perhaps I wasn't the same person you fell for before all this. I mean situations such as these tend to change a person, that goes double for me given that\n     I came back from the dead with much of my memory lost.\"\n\n     \"Johnny, you're exactly the same person I fell for. You've proven that already.\"\n\n     You and Eleanor continue talking for a while. You talk about a lot of different topics, Eleanor's life after your death, your past life, how you both feel about everyone else living here with you, what you'll be doing in the future\n     and how you feel about the way things are right now. Eventually you finish your little heart-to-heart conversation.\n     *goto backin2\n    *elseif (RelEleanor > 74)\n     *set RelEleanor +5\n     \"We're good Johnny. You don't have anything to be worried about.\"\n\n     \"I'm glad to hear it, because to tell you the truth, I was worried that perhaps I was... changed somehow after coming back.\"\n\n     \"No Johnny, our relationship feels just like it did before all this. I don't think you've changed at all.\"\n\n     You and Eleanor continue talking for a while. You talk about a lot of different topics, Eleanor's life after your death, your past life, how you both feel about everyone else living here with you, what you'll be doing in the future\n     and how you feel about the way things are right now. Eventually you finish your little heart-to-heart conversation.\n     *goto backin2\n    *elseif (RelEleanor > 69)\n     \"Well... you haven't been acting entirely like yourself. I just hope this isn't the start of something serious.\"\n\n     How do you respond to that?\n     *choice\n      #\"It's not, Eleanor. I'm just having a tough time adjusting, I guess.\"\n       *set RelEleanor +10\n       \"I understand, Johnny. I know you don't have it easy.\"\n\n       \"You can say that again. I mean, waking up with most of my memories lost, struggling to control my second nature, having had the world I knew gone... although I suppose that last part is something we all have to face now.\"\n\n       \"Yeah... well just so you know, I am e. Eventually the argument is over, both of you unconvinced by the others words.\n       *goto backin2\n      #\"I know, I know, I haven't really been acting like myself ever since I woke up.\"\n       *set RelEleanor +10\n       \"So you know. Then why? Why have you been acting like this, Johnny?\"\n\n       \"Sorry, it's just... I have difficulty adjusting, I guess. Trying to control my second nature, having had most of my memories lost and the world I knew gone... I guess it's taken its toll on me.\"\n\n       \"I see. Well, I appreciate it. You're not going to make this right with words alone but I appreciate you telling me nonetheless.\"\n\n       \"Thank you. For understanding.\"\n\n       You and Eleanor continue talking for a while. You talk about a lot of different topics, Eleanor's life after your death, your past life, how you both feel about everyone else living here with you, what you'll be doing in the future\n       and how you feel about the way things are right now. Eventually you finish your little heart-to-heart conversation.\n       *goto backin2\n    *else\n     \"Alright Johnny. The honest answer is... I don't know. You haven't been acting at all like the man I thought you were.\"\n\n     Well things have gone downhill then. What's your response?\n     *choice\n      #\"How can you mean that? You have been my top priority since the moment I came back.\"\n       *set RelEleanor -10\n       \"Is that so? Is that why you've been acting like a complete maniac, antagonizing me and going against what I want at every turn? Because I am your top priority?\"\n\n       \"If I've acted crazy it's only been to protect you and if I've antagonized you it's only because agreeing with you would have put us in even more danger. Can you not see that?\"\n\n       \"No I guess I cannot. You know why? Because it's simply false. You've been looking after number one all this time. I can only hope that this was caused when you came back, and that it wasn't just hiding in there this whole time.\"\n\n       You and Eleanor continue to go back and forth for a while. In the end however, you feel like you've just angered her even more. Eventually the argument is over, both of you unconvinced by the others words.\n       *goto backin2\n      #\"I'm sorry, I'll try and do better.\"\n       \"I appreciate it but you won't make this right with words alone. You have to change. Otherwise... I'm afraid that perhaps we should just call the whole thing quits.\"\n\n       \"No, I don't accept that. If you want me to change then so be it.\"\n\n       Eleanor sighs. \"I really hope you do.\"\n\n       You and Eleanor continue talking for a while. You avoid making her any angrier although at the same time, you feel like you haven't really convinced her of anything. Looks like you're going to have to try and do better.\n       *goto backin2\n      #\"I get it. I've just been overwhelmed by all of this.\"\n       *set RelEleanor +10\n       \"So have I, Johnny. But acting like a psychopath isn't the answer.\"\n\n       \"I just don't know what to do anymore. I've been feeling so... disoriented and lost ever since I came back.\"\n\n       \"Talk to me. Tell me everything. Nothing would please me more than lightening whatever mental burdens you are carrying.\"\n\n       \"It's just so difficult. It's difficult coping with my lost memories, difficult to control my second nature, difficult to figure out how to live in this world. I don't know what I'm supposed to do. I guess that's the reason for\n       my behavior. It has caused me a lot of anger I suppose. So I lash out.\"\n\n       You continue talking with Eleanor for a while. In the end, you feel as though she understands you a bit more, and it seems that has helped in mending your relationship at least a bit. You'll have to follow on through with your\n       actions as well though. Eventually you finish up.\n       *goto backin2\n #See what Alexandra is doing.\n  *set talkwithAlexandra true\n  You go and sit down beside Alexandra and take a look at her phone screen. She seems to be playing some sort of vampire RPG, judging by the visuals. \"What are you playing there, Alexandra?\"\n\n  \"I'm playing Midnight Terror, Johnny.\"\n\n  \"Looks like a fun game. So uh...\"\n  *choice\n   #\"What was your life like? Before all this.\"\n    *set RelAlexandra +5\n    \"I had just been accepted in a veterinary school and planned to focus entirely on my studies. Before that, I just sort of went through the motions to be honest. I didn't know what I wanted to do up until the final year of high\n    school, nor did I like thinking about it. Besides, I was pretty much on top of the world back then and I guess I wanted to keep the illusion that it would last forever.\"\n\n    \"I can sympathize with that. I don't remember much from my life but I do remember thinking that lovely high point after I and Eleanor decided to make our relationship serious would also last forever. Then I crashed my bike and woke\n    up in this world.\"\n\n    Alexandra just looks at you, seemingly uncertain of what to say. \"But I'm sorry, I didn't mean to get all melancholic on you.\" You try to backpedal a bit.\n\n    \"It's alright, Johnny.\" She finally says.\n\n    \"Thanks. Well, good talk.\" You get up. God that was awkward.\n    *goto backin\n   #\"Did you and Billy make it here alright?\"\n    \"Alright? That's a pretty subjective thing. I suppose things could have been worse. I mean we did get out of that warzone without either of us getting hurt. Though there were a couple of times where I genuinely thought we'd die.\"\n\n    \"Yeah... I had a couple of those myself.\"\n\n    \"That so? I'm interested to know. If it's okay with you.\"\n\n    *choice\n     #Sure, I'll tell her all about how I made it here.\n      You begin telling her your story, starting from the very beginning, that is, the part where you wake up inside your coffin.\n      *if ((eatspeople) or (eatszombies))\n else\n        \"Hmm... you know what? You made a pretty good impression on me when I first met you, before all of this. And I'd just like to tell you that, I'm glad it wasn't all smoke and mirrors.\"\n\n        \"What do you mean?\"\n\n        \"I mean that what you told me confirms, in my mind, that you're not a bad person.\"\n\n        \"Oh well, thanks.\"\n\n        \"You're welcome.\" You figure there's not much more to say, so you get up.\n        *goto backin2\n      *else\n       *set RelAlexandra -20\n       Alexandra takes a deep breath as you finish your story. \"Hmm... you know, sometimes you try to get to know a person a bit better and you end up learning a lot more than you were hoping for. And that is not always a good thing.\"\n       she finally says.\n\n       \"What do you mean by that?\" you ask her.\n\n       \"Nothing, forget it.\" She goes back to her mobile game and doesn't pay anymore attention to you. Yep, you've freaked her out. Maybe you shouldn't have told her your story after all.\n       You get up.\n       *goto backin2\n     #I'd rather not talk about it actually.\n      *set RelAlexandra +5\n      She doesn't pressure you anymore, but neither does she make any effort to change the topic. She just wordlessly gets back to her game. You stand back up.\n      *goto backin\n #Sit down beside Billy.\n  *set talkwithBilly true\n  \"Hey there Billy, how you doing?\" you ask.\n\n  \"Pretty good, considering the circumstances. How about you?\"\n\n  \"Pretty good myself.\"\n  *choice\n   #\"So, what were you doing, before all this?\"\n    *set RelBilly +5\n    \"I was studying to become a gymnastics instructor, though what I really liked doing was shooting.\"\n\n    \"Shooting huh? Well there's a skill that will come in handy.\"\n\n    \"I guess so. I was a member of a gun club for quite a while and I had just started getting into the professional scene. I even took part in a real tournament. Got eighth place, which was pretty good given that there were thirty\n    competitors in all.\"\n\n    \"Damn, you're a very good shot then.\"\n\n    \"Yeah, I am pretty accurate with a pistol as well as a rifle. I would have actually gotten a higher place if I was faster, the time limit was what got me.\"\n\n    \"I see. Well glad to have with us then, Billy.\"\n\n    \"Thanks man, good talk.\" Billy says and then re-lights his cigar.\n\n    You leave him alone and stand back up.\n    *goto backin\n   #\"Did you and Alexandra make it here alright?\"\n    \"More or less, yeah. It's a goddamn warzone back in the city though.\"\n\n    \"Yeah, tell me about it.\"\n\n    \"Not much to tell to be honest. We just drove and drove. Had a few close calls. Ran over quite a few zombies too. No humans though, thankfully. How about you, how'd you get out?\"\n\n    \"Oh well...\"\n    *choice\n     #\"I'd rather not talk about it.\"\n      *set RelBilly +5\n      \"Suit yourself man.\" he says and goes back to smoking his cigar. You decide to leave him alone and get back up.\n      *goto backin\n     #\"Let me tell you how...\"\n      You begin telling your story, starting from the very beginning, that is, the part where you wake up in your coffin.\n\n      *if ((eatspeople) or (eatszombies))\n       Of course you leave out certain details concerning your... diet. You don't think anyone would take kindly to you feasting alongside bugs and rats.\n\n      *if (good \u003c 30)\n       You try to sugarcoat and sometimes even skip the awful things you did on your way here as best you can, given that you don't expect him to approve of any of them.\n\n      Eventually you reach the ending, having told your story and answered Billy's questions to the best of your ability.\n      *if (good > 69)\n       *set RelBilly +20\n       \"Huh, nice. You know they say that hardship brings out either the worst or the best in people. I'd say it definitely brought out the best in you, Johnny.\"\n\n       \"Really?\"\n\n       \"Yeah. I mean, it's times like these when it becomes really easy to just take advantage of others and try to solve problems with violence. But it's clear that you try to be fair to others and that you don't rush into using\n       violence as a solution. I really admire that.\"\n\n       \"Thanks Billy.\"\n\n       \"You got it man.\"\n\n       Billy re-lights his cigar and begins smoking again. You leave him alone and get back up.\n       *goto backin2\n      *elseif (good > 30)\n       *set RelBilly +5\n       \"Right... well I have to say, I'm glad you haven't jumped off the slippery slope just because you now can.\"\n\n       \"What do you mean?\"\n\n       \"I mean that in times like these it becomes easy to start solving problems with violence or take advantage of others. But even now, we gotta remember our better nature. Go too far down the path of a killer and...\n       well you'll eventually cross a line that cannot be uncrossed without even realizing it.\"\n\n       \"I see. You've got a point there, Billy.\"\n\n       \"I always do.\"\n\n       Billy re-lights his cigar and begins smoking again. You leave him alone and get back up.\n       *goto backin2\n      *else\n       *set RelBilly -15\n       \"Jesus... what the fuck happened to you that made you flip out like that? I mean I didn't figure you for a person who'd do something like that.\"\n\n       \"I don't know. Maybe it's a side effect of me coming back from the dead.\"\n\n       \"You gotta work on that man, you can't just hurt people like that. Because sooner or later, there will be consequences.\"\n\n       You sigh. \"I'll try.\"\n\n       \"You do that man.\"\n\n       Billy re-lights and goes back to smoking his cigar. You leave him alone and get back up.\n       *goto backin2\n #Go outside and talk with Hank.\n  *set talkwithHank true\n  You step outside, expecting to find Hank sitting on the top step of the stairs leading down to the yard. Hank, however, is actually sitting on a chair a little to the right of the front door, on the balcony overlooking the yard, feet\n  up on a metal table and smoking his pipe. You pull up a chair and sit down beside him. What did you want to talk about?\n  *choice\n   #I want to know what was up with that hostage of his.\n    \"That piece of shit... well like I told uncle, I had a very good reason for doing what I did. You see, that asshole once boasted about killing a pregnant cat. So... I decided that justice needed to be served.\"\n\n    Hmm, you're pretty sure that Hank is being honest here. How do you respond?\n    *choice\n     #\"Are you certain that he wasn't lying just to look like an evil, tough man?\"\n      \"No, I'm not. But it doesn't matter, boasting about commiting a crime is just as bad as actually doing it. Therefore the punishment should be the same.\"\n\n      Okay, that's... one way of looking at things.\n      *choice\n       #\"Sounds to me like he got what was coming to him.\"\n        *goto right\n       #\"What the- no. That's not how this works.\"\n        \"Oh my friend, this is exactly how this works. An ounce of prevention is worth a kiloton of cure or however the saying goes.\"\n\n        \"You can't just punish someone for a thought-crime!\"\n\n        \"I can, and I did. Now fuck off.\"\n\n        Well, seems there's not much more to be said. You get up and go back inside.\n        *set RelHank -15\n        *goto backin\n       #\"That's still not a good reason to kidnap and attempt to use and abuse someone.\"\n        *goto wrong\n     #\"Sounds to me like he got what was coming to him.\"\n      *label right\n      *set RelHank +10\n      Hank smiles as you say this. \"No my friend. [b]It[/b] got what was coming to it.\"\n\n      Oof! He's already on the dehumanizing warpath it seems.\n\n      *if (RelHank > 65)\n       Hank takes another puff of his pipe and turns to you. \"Want a taste?\" he asks as he offers you the pipe.\n\n       *fake_choice\n        #\"Sure thing.\"\n         You grab the pipe, bring it up to your lips and inhale. It's a pretty pleasant and complex taste. Good thing too, you were half scared that it was gonna taste like mud, given that it is a plant.\n        #\"Nah I'm good, thanks.\"\n         Hank looks slightly disappointed. \"Suit yourself. he says and turns his attention back to the yard.\n       You and Hank stay outside for a while, talking sometimes but also remaining silent as well. Generally, you two are getting along pretty well. And to think, you took him for an enemy when you first met him. Eventually you get back\n       inside.\n       *goto backin2\n      *else\n       You and Hank stay outside for a while, talking sometimes but also remaining silent as well. Generally, you two are getting along relatively well. And to think, you took him for an enemy when you first met him. Eventually you get back\n       inside.\n       *goto backin2\n     #\"That... really isn't a good reason to kidnap and attempt to use and abuse someone.\" \n      *label wrong\n      *set RelHank -15\n\n      \"Oh really? And who made you the arbiter of morality anyways?\"\n\n      \"No one. But this isn't me saying it's wrong, it's everyone. There are certain things that we, as a society, don't stoop to. Otherwise we become the very monsters we sought to destroy.\"\n\n      \"Yeah well you can call me ubermensch because I got my own code of ethics, not the one society tried to force on to me.\"\n\n      You're pretty sure Hank's code of ethics has nothing to do with Nietzsche or his philosophy. Regardless, there's nothing more to say. You don't want to start a shouting match with Hank. You go back inside.\n      *goto backin\n   *selectable_if (RelHank \u003c 60) #Ask him about his life before the apocalypse.\n    *set RelHank +10\n    \"I didn't have a steady job if that's what you mean. I did some odd jobs here and there. You know, help out the old man with the bad back with some manual labor, take care the house while the family is away,\n    that kind of thing. My life was paycheck to paycheck for the majority of the time since my parents were... out of the picture.\"\n\n    \"Damn, that's brutal man. So what else did you do?\"\n\n    \"During what little free time I had you mean? I kept myself busy writing fanfiction and playing video games. You play any video games Johnny?\"\n    *fake_choice\n     #No.\n     #Yes.\n\n    The conversation continues for a while. Hank talks about his video games, his fanfics and eventually the conversation shifts back to his life before the apocalypse. He talks about his childhood, it's clear that he liked those years of\n    his life. He doesn't really get into detail about his teen years though, just says that they were \"the worst experience\" of his life. Then the conversation more or less ends. Eventually you go back inside.\n    *goto backin2\n   *selectable_if (RelHank > 50) #I'll ask him if he made it here alright.\n    \"Yeah I made it fine, this area is still pretty safe it seems, although I think most of the local cops aren't here, they've gone off to support the others in the city. I'm more interested in what you did on your way here though.\n    I'm certain it must have been quite the adventure.\"\n\n    \"I'm not sure if my journey here really was some [b]adventure[/b] I could just tell you about by the fireside, Hank.\"\n\n    \"Come on man, tell me what happened on your way here.\"\n\n    \"Fine...\"\n\n    And so you go on to tell Hank about everything that happened and everything that you did the two days it took you to get out of the city. Hank listens intently, or at least you think he does.\n\n    *if (good > 60)\n     *set RelHank -10\n     Eventually you finish and ask Hank what he thinks.\n\n     \"I don't know man, my brain mentally checked out about ten minutes in.\"\n\n     \"Seriously?\"\n\n     \"I'm sorry okay? I expected it to be some awesome tale of violence and death not... whatever that was.\"\n\n     You sigh and leave, going back inside.\n     *goto backin2\n    *elseif (good > 34)\n     Hank stays in thought for a moment before responding. \"Well I have to admit I am disappointed, Johnny.\"\n\n     \"...why?\"\n\n     \"I just expected it to be something more exciting than that. Ah well.\"\n\n     Hank turns his attention back to the yard. You leave him to it, going back inside.\n     *goto backin2\n    *else\n     Hank smiles as you finish your story. \"Holy shit man, you are hardcore.\"\n\n     \"I'm... not sure that's the appropriate reaction to what you just heard, Hank.\"\n\n     \"No man that was totally the appropriate reaction. You're a badass and this story was more than I could have hoped for. You gotta tell it to me again someday.\"\n\n     \"...okay. Thanks I guess.\"\n\n     Hank then turns his attention back to the yard. You decide to go back inside.\n     *set RelHank +15\n     *goto backin2\n\n*label backin\n*page_break\nYou take a look at the clock on the wall. Eight-fifty PM. Seems you've got just enough time to make some small talk with someone else before Hank's shift is over. Then you're gonna have to see who will be the next to stand guard.\n*choice\n *if (talkwithBilly = false) #Have a chat with Billy.\n  *set RelBilly +5\n  You sit down beside Billy. He takes one final drag of his cigar and then drops the tiny little stub inside the ashtray sitting on the table and turns to you. \"What's up, Johnny?\"\n\n  \"Not a whole lot... just glad to be safe, you know?\"\n\n  \"Yeah, tell me about it.\"\n\n  You and Billy talk a bit about the close calls you've both had without getting into too much detail.\n  *label walksin\n  Hank walks in and announces to everyone that his shift is over just as the conversation is getting interesting. George comes over from\n  the room right next to this one. \"You are not abandoning your post again without my say so is that clear?\" he says.\n\n  \"You said stand guard until nine and that's exactly what I did. What you gonna blame me for following your orders to the letter now?\"\n\n  George sighs and seems to be about to say something but changes his mind at the last moment. Instead he turns to you and tells you to go stand guard instead, specifying that he will come to relieve you when the time comes and that you\n  are not to move from your post before that happens. You cut your conversation short and go stand guard outside. Nothing much happens. Eventually George comes over to relieve you. You get back inside, to find that everyone else has\n  already fallen asleep. Come to think of it, you could use some sleep yourself. You go to the spare room and lie down next to Eleanor.\n  *goto nextday\n *if (talkwithAlexandra = false) #Speak to Alexandra.\n  *set RelAlexandra +5\n  You sit down beside Alexadra and take a look at the game she's playing on her phone. Looks to be some sort of vampire RPG, judging by the visuals. She looks over to you. \"Hey Johnny.\"\n\n  \"Looks like a good game there. What's it called?\"\n\n  \"Midnight terror. And yeah, it's pretty good.\"\n\n  You and Alexandra talk a bit about the game, she explains the mechanics and gameplay to you as well as the storyline.\n  *goto walksin\n *if (talkwithEleanor = false) #Talk with Eleanor.\n  *set RelEleanor +5\n  You notice Eleanor has given up trying to find something that's not news on TV. You make eye contact and you go sit down beside her. \"Nothing good on TV huh?\"\n\n  \"Guess not. How do you feel, Johnny?\"\n\n  \"I'm good. How are you? Been a rough couple of days.\"\n\n  \"You can say that again. But I'll survive. Things could have been much worse.\"\n\n  You and Eleanor talk a bit about what you've been through, recaping basically.\n  *goto walksin\n *if (talkwithHank = false) #Go outside and spend some time with Hank.\n  *set RelHank +5\n  You step outside and find Hank sitting on a chair a little to the right of the entrance, on the balcony overlooking the yard, smoking his pipe, feet up on a metal table. He notices you approach him through the thick cloud of smoke surrounding\n  his head. \"Oh, hey there Johnny.\"\n\n  \"Hey Hank, what's that tobacco you're smoking there?\"\n\n  \"This here is my favorite. Only pipe tobacco I know of that's coffee flavored.\"\n\n  \"Really? There's no other pipe tobacco with that kind of flavor?\"\n\n  \"Nope, I've searched high and low. There are some coffee flavored cigars though.\"\n\n  You briefly wonder what kind of flavor Billy's cigar was before continuing on with your conversation. You talk with Hank for a bit about the fine joys of tobacco. Eventually he pulls out his phone and takes a look at the\n  time. \"Oh look at that, it's two past nine already! Well time to head on back inside, my shift is over.\"\n\n  You and Hank get back inside and Hank loudly announces that his shift is over. George comes in from the room that's right beside this one. \"You are not abandoning your post again without my say so is that clear?\" he says.\n\n  \"You said stand guard until nine and that's exactly what I did. What you gonna blame me for following your orders to the letter now?\"\n\n  George sighs and seems to be about to say something but changes his mind at the last moment. Instead he turns to you and tells you to go stand guard instead, specifying that he will come to relieve you when the time comes and that you\n  are not to move from your post before that happens. You go and stand guard outside. Nothing much happens. Eventually George comes over to relieve you. You get back inside, to find that everyone else has\n  already fallen asleep. Come to think of it, you could use some sleep yourself. You go to the spare room and lie down next to Eleanor.\n  *goto nextday\n\n*label backin2\nYou take a look at the time and notice it's nine o'clock. Almost as if on cue, Hank walks inside the room and loudly announces that his shift is over. George comes in from the room that's right beside this one. \"You are not abandoning\nyour post again without my say so is that clear?\" he says.\n\n\"You said stand guard until nine and that's exactly what I did. What you gonna blame me for following your orders to the letter now?\"\n\nGeorge sighs and seems to be about to say something but changes his mind at the last moment. Instead he turns to you and tells you to go stand guard instead, specifying that he will come to relieve you when the time comes and that you\nare not to move from your post before that happens. You go and stand guard outside. Nothing much happens. Eventually George comes over to relieve you. You get back inside, to find that everyone else has\nalready fallen asleep. Come to think of it, you could use some sleep yourself. You go to the spare room and lie down next to Eleanor.\n*goto nextday\n\n*label nextday\n*page_break\nAfter waking up you go to the kitchen/living room area, to find a note on the coffee machine. \"They've cut the power and water, if I'm not in the house then I'm in the back yard.\" You decide to go to the back yard and talk things\nover with George. As you enter the back yard you find George filling up a bucket of water with an old but still functional water pump. You notice there's no entrance to the back yard from the outside, only a tall metal fence topped with\nrazor wire. \"Hey, George.\" you say.\n\n\"Hi Johnny, glad to see you're awake.\" he responds.\n\n\"What are you doing out here?\"\n\n\"Filling up that water trough you see over there.\"\n\n\"We're gonna start drinking out of a trough now?\"\n\n\"What? No, we're gonna start washing up in a trough. We have bottled water inside remember?\"\n\n\"And what do we do once that water is all drank?\"\n\n\"Then we'll start drinking out of the pump. The water's clean enough so boiling it should make it safe to drink. Hopefully things will have gotten better by then, although to be honest with you, I doubt it.\" George takes the\nbucket of water and tops off the trough at the\nedge of the yard. He then turns to you once more. \"Well, I'm going to wake up the others. Wash up if you want but make it quick, I'll need you inside the house soon. Oh, and replace the water if you do wash, otherwise there's not much\npoint to it.\" George then walks off, going back inside the house.\n*choice\n #Guess I may as well clean myself up.\n  You go and wash yourself (as much as you can in a trough), feeling better once you're finished. Sooner or later you'll have to wash your clothes as well. Not right now though. You then spill the water out and refill the trough. The\n  water pump takes a bit more force than you expected but it was nothing you couldn't handle. After that you go back inside the house, to find everyone else already woken up by George, who then gathers you all up around the table.\n  *goto afterwash\n #I'll just go back inside the house.\n  *set civilized -15\n  You decide not to waste time trying to clean yourself in a trough. It's desperate times that call for desperate measures after all, and you're not desperately filthy, yet. You get back inside the house, to find George waking everyone\n  else up. Eventually everyone is awake and you're all gathered up around the table.\n  *goto afterwash\n\n*label afterwash\nGeorge starts delegating responsibilities to everyone as well as arranging the guard shifts. You're up third it seems, first up will be Hank, followed by George, then you, Billy, Alexandra and finally Eleanor. In the meantime you are to do\nsome meaningless chores around the house. Time goes by rather peacefully. Eventually George comes by and asks for Billy to help him maintain the guns he has in storage. After that, George goes outside to relieve Hank, holding a bolt action\nrifle in his hands.\n*page_break\nAs you're taking a break from the chores in the living room alongside Eleanor you suddenly become aware of someone talking from outside. You can make out George's voice among a couple other voices, though you cannot quite understand what they're saying.\nEventually the talking escalates to yelling. Should you go check it out?\n*choice\n #I'm sure George has it all under control. I'm staying right here.\n  You try to shake off the feeling of unease that you got and remain sitting on the couch. The yelling stops in a bit and George comes running inside. \"Eleanor, Johnny! Where's everyone else?\"\n\n  *label prep\n  \"Billy and Alexandra are cleaning the ground floor and Hank is tidying up the spare room. What happened?\"\n\n  \"Go and bring them here right now. We may have a very big problem. You too Johnny!\"\n\n  Eleanor gets up and runs off to get Hank, while you go down to the ground floor and get Billy and Alexandra. Once you're all upstairs, George explains what is wrong.\n\n  \"Listen very closely, Clint and Joe have panicked now that there's no power and water. They both took their families and asked us to stay here. I tried explaining to them that we don't have the supplies or the space to support anymore\n  people but they didn't listen to me. I'm afraid they're going to come back and try to take this place over for themselves.\"\n\n  Eleanor speaks up. \"What the fuck? They were our friends, I remember we used to throw barbeques with them. Can we really not help them?\"\n\n  \"Eleanor, the supplies we have here will last us about two months, without rationing, and I don't expect things will be better by then. We simply cannot spare anything. Which is why I want every single one of you to go grab a gun from the\n  cabinet in my room, including you Hank. We may have to defend ourselves.\"\n\n  *if gun\n   You wait as everyone else goes and arms themselves. They come back very quickly, Alexandra with a semi auto pistol, Hank having a repeating shotgun slung over his shoulder, Billy has another rifle, bolt action just like George's and\n   Eleanor has a machine pistol in a police style holster.\n   *goto nowwhat\n  *else\n   You go alongside everyone else and arm yourself. Alexandra picks out a semi auto pistol, Hank slings a repeating shotgun over his shoulder, Billy grabs another rifle, bolt action just like George's and Eleanor gets a machine pistol.\n   You pick up a revolver alongside a dark leather holster. You then all get back to George very quickly.\n   *goto nowwhat\n #I guess I may as well. Don't want anything ugly to happen after all.\n  You get up off the couch and step outside, to see a group of about eight people walking away from the house. Four of them seem to be middle aged and the other four are younger, about Eleanor's age. Two different families? One of them\n  yells out \"This ain't over!\" as he walks away. George swears under his breath and turns around, runs past you and enters the house. You follow him back inside. He turns to Eleanor.\n\n  \"Eleanor! Where's everyone else?\"\n\n  *goto prep\n\n*label nowwhat\n*page_break\n\"Okay, now what?\" you ask George.\n\n\"Now we wait. Hopefully they'll come to their senses. I want the rest of you to come with me outside, we'll get set up in our positions, stand guard for a while. If it seems like they're not attacking we'll double the guards outside\nand go about our day.\"\n\nAnd so you all go outside in the yard and George sets you up in your positions. You and Hank will be taking cover behind the metal table on the balcony overlooking the yard. George, Billy and Eleanor will be underneath the balcony, behind\nthe concrete supports and Alexandra will be taking cover behind the smaller table at the corner of the balcony. Alexandra seems to be exposed to an attack from the back yard though. You point this out to George but he reassures you that\nthere's no way they'll be able to get in through the back yard thanks to the razor topped fence. George gives you all some more insturctions, mainly how you're not to fire the first shot unless he says so, as he still hopes to negotiate his way\nout. But if they pull the trigger first, it's anyone's game then. So you wait.\n\nAnd wait. It seems the attack will never come after all.\n*page_break\nUntil you actually see eight of them marching up to the house. They seem to hesitate when they see you all waiting for them armed to the teeth. George yells out \"Just get out of here, go back home. It's not worth getting killed over\nthis.\"\n\n\"How could you just leave us to die? We were friends, George!\"\n\n\"If I had anything to spare you guys would have been the first ones I'd help. But I simply have no choice.\"\n\nThen another one of them shouts \"To hell with this!\", aims towards you and pulls the trigger.\n*page_break\nYou instantly drop to the floor and so does Hank. A plethora of bullets fill the air as the gunfight begins. You're fairly certain that the bullet didn't hit you. Taking a look at Hank you see that he's unharmed as well, though he's\nshaking like hell. You're not sure if he's in any shape to fight right now. You pop out of cover and start firing back, though it's difficult to hit your mark as you can't see them very well. The boards you nailed to the front gate\nprevent you from getting a clear shot, even when the enemy gets out from behind the wall surrounding the yard. The only good thing is that the same thing applies to them as well.\n\n*temp hankfought false\n\n*choice\n #I'll get back inside the house, try and reach that window in the staircase leading to the ground floor and sort-of flank them from there.\n  You turn to Hank and shout at him, \"I'll try to flank them! You just hold the line okay?\". He doesn't respond, just turns his head and looks at you. You give him some final words, hopefully enough to get him out of his state.\n  \"The others need you right now! Get it together!\"\n  *if (RelHank > 60)\n   *set hankfought true\n   Hank screams at the top of his lungs, gets up out of cover and starts firing his shotgun. You have no idea if he'll manage to hit anything but at least he's no longer practically comatose.\n   *goto getaroundhim\n  *else\n   Hank doesn't give you any indication that he's even listening. You don't have the knowledge or the time needed to get him to snap out of this, so you continue on with your plan.\n   *goto getaroundhim\n\n  *label getaroundhim\n  You get inside the house and start running as fast as you can towards the staircase. You finally arrive, open up the window and start firing. You manage to hit the two older men, clearly they weren't expecting to get\n  attacked from the side. Three of them, all of them being the younger looking ones, run farther up the road, going around the house, while the other three try to divert their attention to both you and the others inside the yard. They start laying down suppressing fire, forcing you to\n  duck inside. You wait until there is a lull in the fighting before popping back out again and shooting. Another enemy goes down. As you aim at your next target, a bullet hits you and you fall back. You notice your silvery blood seeping\n  out of a wound on the right side of your chest. You wait a few seconds to ensure the wound has healed. That's when the gunfire stops just as abrubtly as it began.\n\n  You get up and take a look outside, to see the last two enemies splayed out on the ground, blood quickly pooling beneath them.\n  *page_break\n  *set knowsAlexandra false\n  Suddenly you hear a couple more gunshots ring out and, a few seconds later, hear a male voice screaming \"No!\", quickly followed by more gunshots. You run upstairs and keep running until you reach the front door but by then the gunfire has\n  once again stopped.\n  *if hankfought\n   As you get back out on the balcony overlooking the yard you notice Hank is standing in the spot Alexandra was. There's blood all over the railing and, at Hank's feet, lies Alexandra. They flanked you from the back yard. The bullet\n   must have hit her in the back of the head and then went straight through. Her right eye is completely gone, in it's place a gaping bullet hole. Hank notices you standing there. \"Johnny, we...\"\n\n   Billy pushes past you and runs towards his sister, then drops to his knees.\n   *goto mourning\n  *else\n   As you get back out on the balcony overlooking the yard you see Billy, kneeling down on the spot Alexandra was. There's blood all over the railing and, in front of Billy, lies Alexandra. They flanked you from the back yard. The bullet\n   must have hit her in the back of the head and then went straight through. Her right eye is completely gone, in it's place a gaping bullet hole.\n   *goto mourning\n #I'll yell at Alexandra to get to the back portion of the balcony and watch out for anyone trying to flank us from the back yard.\n  \"Get back there! Watch out for anyone trying to flank us! I'll cover you!\" You get up and start laying down some suppresing fire (as best you can with a six-shooter).\n\n  Alexandra looks uncertain for a moment, but then seems to decide against what you ordered. She stays right where she is and turns her attention to the ones at the front gate. Well shit. Now what?\n  *choice\n   #I'll get back inside the house, try and reach that window in the staircase leading to the ground floor and sort-of flank them from there.\n    You turn to Hank and shout at him, \"I'll try to flank them! You just hold the line okay?\". He doesn't respond, just turns his head and looks at you. You give him some final words, hopefully enough to get him out of this state.\n    \"The others need you right now! Get it together!\"\n    *if (RelHank > 60)\n     *set hankfought true\n     Hank screams at the top of his lungs, gets up out of cover and starts firing his shotgun. You have no idea if he'll manage to hit anything but at least he's no longer practically comatose.\n     *goto getaroundhim\n    *else\n     Hank doesn't give you any indication that he's even listening. You don't have the knowledge or the time needed to get him to snap out of this, so you continue on with your plan.\n     *goto getaroundhim\n\n   #I'll try to get Hank to snap out of it and help us out.\n    You turn to Hank and gently grab him by the shoulder. He suddenly turns his head towards you, looking you right in the eyes. \"Hank, come on buddy, we need your help here!\". He continues shaking, but gives you no other response.\n    \"Come on man, things could turn ugly without your help! There's nothing to be afraid of, I'm here with you!\"\n    *if (RelHank > 60)\n     *set RelHank +10\n     *set hankfought true\n     Something in Hank's eyes changes and you can tell that you've managed to snap him out of it. He waits for a lull in the shooting, then gets up out of cover and starts firing. You're not sure if he'll hit anything as he's still pretty\n     panicked but at least he's actually fighting. As you get back up and start firing, you notice the enemy's numbers have seriously dwindled. There's only three of them left, two girls and a guy. There are a couple of corpses at the front gate\n     but that's all. The other three have simply disappeared. Maybe they ran away? It doesn't matter right now though, you continue exchanging fire.\n     *page_break\n     You manage to hit and drop the two women left and a split second later the last one drops dead too. You're not sure but you think it was Hank that managed to score the final shot. Seems you did good getting him to come to his senses.\n     George, Eleanor and Billy get out from behind the pillars and start climbing up the stairs to where you, Hank and Alexandra are. You take a deep breath to calm yourself down and absorb the feeling of victory. You've won.\n     *page_break\n     Or so you thought. A couple of gunshots ring out, and as you turn to the side you see Alexandra, dead on the floor. The railing in front of her is splattered with blood. The bullet seems to have hit her in the back of the head, and it\n     came out through her right eye. You quickly turn the corner and see the two guys and the girl that had disappeared in the middle of the fight in the back yard. They must have climbed over the railing, got cut up on the razor wire and\n     entered the back yard that way. Without any cover back there however, you finish them all off rather easily. You turn back, to see Billy kneeling over his sister.\n     *goto mourning\n\n    *else\n     *set RelHank +5\n     You continue trying to get through to him but no matter what you do or say he just sits there, shaking and looking at you. In the end you give up. Can't say you didn't try though. As you get back up and start firing, you notice the\n     enemy's numbers have seriously dwindled. There's only three of them left, two girls and a guy. There are a couple of corpses at the front gate\n     but that's all. The other three have simply disappeared. Maybe they ran away? It doesn't matter right now though, you continue exchanging fire.\n     *page_break\n     You manage to hit and drop the two women left and a split second later the last one drops dead too. You're not who it was that managed to score the final shot.\n     George, Eleanor and Billy get out from behind the pillars and start climbing up the stairs to where you, Hank and Alexandra are. You take a deep breath to calm yourself down and absorb the feeling of victory. You've won.\n     *page_break\n     Or so you thought. A couple of gunshots ring out, and as you turn to the side you see Alexandra, dead on the floor. The railing in front of her is splattered with blood. The bullet seems to have hit her in the back of the head, and it\n     came out through her right eye. You quickly turn the corner and see the two guys and the girl that had disappeared in the middle of the fight in the back yard. They must have climbed over the railing, got cut up on the razor wire and\n     entered the back yard that way. Without any cover back there however, you finish them all off rather easily. You turn back, to see Billy kneeling over his sister.\n     *goto mourning\n\n   #I'll see if I can hit any of the older guys in the group, they seem to be the ones giving the orders.\n    You dig in
