ying to get through to him but no matter what you do or say he just sits there, shaking and looking at you. In the end you give up. Can't say you didn't try though. As you get back up and start firing, you notice the\n   enemy's numbers have seriously dwindled. There's only three of them left, two girls and a guy. There are a couple of corpses at the front gate\n   but that's all. The other three have simply disappeared. Maybe they ran away? It doesn't matter right now though, you continue exchanging fire.\n   *page_break\n   You manage to hit and drop the two women left and a split second later the last one drops dead too. You're not who it was that managed to score the final shot.\n   George, Eleanor and Billy get out from behind the pillars and start climbing up the stairs to where you, Hank and Alexandra are. You take a deep breath to calm yourself down and absorb the feeling of victory. You've won.\n   *page_break\n   Or so you thought. A couple of gunshots ring out, and as you turn to the side you see Alexandra, dead on the floor. The railing in front of her is splattered with blood. The bullet seems to have hit her in the back of the head, and\n   it came out through her right eye. You quickly turn the corner and see the two guys and the girl that had disappeared in the middle of the fight in the back yard. They must have climbed over the railing, got cut up on the razor wire and\n   entered the back yard that way. Without any cover back there however, you finish them all off rather easily. You turn back, to see Billy kneeling over his sister.\n   *goto mourning\n\n #I'll see if I can hit any of the older guys in the group, they seem to be the ones giving the orders.\n  You dig in and try your best, popping out of cover, taking aim and pulling the trigger. You waste a lot of bullets but you finally manage to hit one of the two older men in the group. He screams and falls back, then writhes on the ground\n  for a bit before dying. Suddenly, three of the younger enemies, a woman and two men, run past the gate and dive into the trees surrounding the front yard. It's impossible to get a clear shot from here, but you're fairly certain that they can't shoot you\n  either. You continue exchanging fire, eventually hitting the second man as well. Now there's only three of them left, all female.\n  *page_break\n  After a lengthy firefight you manage to kill all three of them. You personally took out one more, for a total of three kills. You're not certain who got the rest. It doesn't really matter now though, you've won. Billy, George and Eleanor\n  all come out from behind the supports and come up to the balcony. You take a look at Hank and notice that he's still in a state of panic.\n  *page_break\n  Just as you were about to try and calm him down you hear two more gunshots ring out. You turn around and see Alexandra, dead on the floor. The railing in front of her is splattered with blood. The bullet must have hit her in the back\n  of the head and it came out through her right eye. You quickly turn the corner and see the ones that run around the house during the firefight. They must have climbed up over the railing, got cut up on the razor wire and entered the\n  back yard. Without any cover back there however, you manage to finish them off easily. You turn back, to see Billy kneeling over his sister.\n  *goto mourning\n\n\n\n*label mourning\n*page_break\n*set knowsAlexandra false\nYou approach him, uncertain of what to say. Everyone else reaches you in a couple of seconds and you all stay there, shocked. Billy is nearly crying. None of you say anything.\n*if (hankfought = false)\n You suddenly hear a very faint \"no...\". It's Hank. He's snapped out of his panic crisis it seems. His eyes are red and his voice is cracking. He gets up and walks closer, trying to control his far too erratic breathing.\nEventually George places his hand on Billy's shoulder. \"Come on son...\"\n\nBilly slowly gets up and follows George inside the house. The rest of you do the same. You all sit down at the table. George gives Billy a glass of water from the bottles in the now non-functional fridge. Billy doesn't acknowledge it.\nGeorge simply asks \"Anyone else?\". Most of you nod. You could use some water. You all sit in silence for a few minutes. Eleanor asks \"What do we do?\"\n\n\"We'll bury her, nothing more we can do.\" responds George.\n\nAfter a bit of silent mourning you all get out, take Alexandra's body and bury her. Billy finally breaks down completely, any cultural taboos he may have had about men crying are completely gone. Eventually it all ends and you try\nto return to normal. At some point it's your turn to stand guard. You spend a lot of time thinking how you could have saved her, had you done things differently. Or perhaps you couldn't save her, no matter what. In the end, you'll never\nknow for sure if there was something you could have done. You had to do a longer shift, as Billy was in no shape to stand guard. Despite that you still feel as though time went by in a heartbeat when Eleanor shows up to relieve you.\n\n*if (RelEleanor > 65)\n As you're about to re-enter the house you hear Eleanor's voice behind you. \"Johnny... know that I love you and I always will.\"\n\n \"Me too Eleanor.\"\n\nYou eat some dinner and go to bed. This time, you're thinking of something else. Your own death. Seeing how suddenly Alexandra died, it makes you wonder when your time will come. You finally manage to sleep.\n*goto_scene dead", "dead": "*page_break_advertisement\nIt's been a little over two months since the attack. Supplies are running low. You most likely would have already ran out if it weren't for George rationing things out. You're not sure if that's any better though. Meals are meager,\ntobacco and alcohol are almost gone and morale has plummeted. Billy seems to have lost the will to live. George and Hank have both taken to looking for the answers at the bottom of a bottle, causing them to butt heads\nalmost every day. You're not sure but you suspect that they both blame themselves for Alexandra's death. You don't think Billy blames anyone of them, thank God. You have enough interpersonal conflicts as it is.\n*if ((RelGeorge \u003c 60) and (RelGeorge > 49))\n *set RelGeorge 30\n George tries to hide it but it's clear that he has grown distrustful and resentful towards you. Seems your relationship with him got a push in the wrong direction because of what happened.\n*if (RelHank \u003c 65)\n *set RelHank 10\n Hank is almost openly hostile towards you. You haven't been getting along since the attack and him getting drunk every day has only worsened things.\n*if ((RelGeorge = 30) and (RelHank = 10))\n *if (RelEleanor \u003c 66)\n  Even Eleanor has been acting more and more distant lately. You're not sure if your relationship with any of your fellow survivors can be salvaged at this point.\n  *goto plan\n *else\n  Thankfully you still have Eleanor at your side. Good thing too, because you're not sure if your relationship with the rest of your fellow survivors can be salvaged at this point.\n  *goto plan\n\n*label plan\nYou're all sitting around the kitchen table. George has taken out a crude map and is trying to coordinate a supply run into the city. The idea is to gather up both food as well as stuff that cannot be procured out here.\nIt will be you and Hank going out once more. Everyone else will stay here and guard the house. George has been rather evasive on why he's mostly sending you and Hank to do field work while he, Eleanor and Billy get to stay back in the\nrelative safety of the house.\n*if (RelGeorge \u003c 50)\n But then again, you think you already know why. He's hoping that either you or Hank will die out there.\n *goto onourway\n*else\n Maybe you're the only one he trusts to keep Hank in check.\n *goto onourway\n\n*label onourway\nEither way there's not much point in contemplating George's motives right now. You finish up planning, pick up your guns and leave the house. You've pretty much become the designated driver during these trips to the city so you had to\nfigure out how to drive a car as well. Luckily you haven't crashed into anything yet.\n*page_break\nYou finally reach the city limits. You park the car a little ways off the main road, then you and Hank both pick up a large backpack each and get going. Eventually you reach an abandoned cafe-bar that you haven't looted yet. The\npossibility that there's still stuff inside is slim but you may as well take it. Besides, Hank would never let a chance to find booze pass him by. You motion for Hank to stop. \"We're going in there.\" you say. You cautiously\napproach the door, throw it open and enter the building, guns drawn. There's nothing inside though. You then check the bathrooms, to find them empty as well. Hank then starts searching around behind the counter while you stand guard at\nthe door. At some point you hear Hank utter \"...yes!\". You turn around and see him holding a full bottle of whiskey in hand.\n*if (RelHank > 59)\n *set hankwill true\n He then takes two glasses out from under the counter and looks at you. \"Gonna join me here Johnny?\" he asks you.\n *choice\n  #\"Sure thing.\"\n   You walk over and sit down on one of the bar stools while Hank begins pouring whiskey inside the glass. You let him pour you a little less than a couple fingers worth of whiskey. \"That's enough for me. I'm driving, remember?\"\n\n   \"Yeah, and what are you afraid of? That you'll get your licence, which you don't even have, taken?\"\n\n   \"No, I'm afraid that I'll crash the car and kill us both.\" you respond.\n\n   \"The roads are practically empty brother. There's very little to crash into.\" Hank says as he starts pouring whiskey in his own glass. He pours and pours. By the time he stops the glass is almost halfway full. You're no\n   bartender but you think there's got to be at least five shots worth of whiskey in there. Hank raises his glass. \"To our health!\" he says as you clink your glass against his. You take a sip of your drink and Hank takes a\n   large gulp of his. You mostly stay and drink in silence, Hank makes a couple of comments on how lucky he feels to have found this bottle. It takes almost half an hour for Hank to start talking again, and by that time he's already\n   fairly drunk, having consumed almost half his drink.\n\n   \"Speaking of health and death... do you... have any requests in case something happens to you, Johnny?\"\n\n   \"I don't want to even think about that, Hank.\"\n\n   \"I see... well I personally don't care what happens after. So, if I die, you guys don't have to bother. Just toss me in the nearest ditch. Oh but... you can have my hat, in case things go that way.\" He says that last sentence\n   with a faint smile. You're not certain if he's joking or not.\n   *goto angel1\n  #\"I'd rather not.\"\n   \"You sure Johnny?\"\n\n   \"Yeah, I'd like to keep a clear head. And I'm driving besides.\"\n\n   Hank takes a deep breath. \"Suit yourself brother.\" he says as he starts pouring whiskey inside his glass. He continues pouring, until his glass is almost halfway full. You're no bartender but you think there's got to be at\n   least five shots worth of whiskey in there. Hank calls you over to the bar. \"What is it Hank?\"\n\n   \"Let's at least have a toast, even if you have to do it with an empty glass.\"\n\n   You give him a little smile and raise your glass. \"Cheers!\" you say.\n\n   \"To our health!\" responds Hank. You decide to stay at the bar and keep Hank company while he drinks, always keeping one eye on the door of course. He mostly drinks in silence though he makes a couple of comments on how lucky he\n   feels to have found this bottle. After about half an hour, Hank is fairly drunk, having consumed half of his drink. He then starts talking again.\n\n   \"Speaking of health... do you... have any requests in case something happens to you, Johnny?\"\n\n   \"I don't want to even think about that, Hank.\"\n\n   \"I see... well I personally don't care what happens after. So, if I die, you guys don't have to bother. Just toss me in the nearest ditch. Oh but... you can have my hat, in case things go that way.\" He says that last sentence\n   with a faint smile. You're not certain if he's joking or not.\n   *goto angel1\n*else\n He then takes a glass out from under the counter and starts filling it up with whiskey. \"What seriously? You're going to get wasted right now?\" you say.\n\n \"My God can you just... not? May I please have a moment's peace without you needling me about something?\"\n\n \"Hank, I don't know if you realize this but this kind of bullshit could get us both killed.\"\n\n \"Yeah sure, as if I'll ever be that lucky.\"\n\n After the glass is halfway full Hank starts drinking and remains silent for the most part. There are a couple of times where you hear him murmuring something under his breath but you don't give him the satisfaction of asking him what\n he's saying. Instead you stay by the front door, vigilantly guarding the place. And Hank.\n *page_break\n After a while you notice two figures approaching the bar. You can't see them very well due to the blurry glass pane set in the door but they seem to be dressed in all white, with pale skin. \"Hank. A couple of guys are coming this way,\n get ready.\" Hank downs the rest of his drink in one gulp, dry heaves for a moment but then fights off the urge to puke the drink back up, grabs his shotgun and stands by you beside the door. Once the figures come closer Hank opens up\n the front door and you both step outside to confront them. You forget what you were going to say as soon as you notice their features. That milk white skin with the faint golden undertone, the completely white eyes. They are just like\n you. They're both barefoot and dressed in thin white robes that almost make them resemble ghosts. They seem somewhat shocked to see you as well. Eventually one of them breaks the silence with a single word. \"Angel?\"\n\n \"Wh- what?\" you respond.\n\n \"Johnny, what the hell is this?\" Hank asks you.\n\n \"Don't ask me Hank, I have no idea.\"\n\n \"Angel, I am so happy we found you. We'd love to have you join our family.\" Continues the man.\n\n \"What do you mean, what family?\" You say.\n\n \"We will tell you everything you want to know angel. But let's talk inside.\"\n\n You all re-enter the abandoned bar and sit down at a table.\n *page_break\n *label talkwiththeangels\n Hank refills his glass as the two men begin talking. They talk at length about a man they call \"the patriarch\". He is the spiritual father of their \"family\" and it is thanks to him that these two have found purpose in their new life as\n undead. Or angels as they call themselves. \"You and your friend should both join us.\" He concludes.\n\n *if (RelHank > 59)\n  \"Wait, I can come too?\" Asks Hank.\n\n  \"Of course. Salvation will be given freely to those who ask for it.\" Responds the angel.\n\n  Hank turns to you. \"Johnny, that thing we were talking about... I think this is our chance. You, I and Eleanor, we can start over with these guys.\"\n  *choice\n   #\"I'm not so sure Hank.\"\n    Hank looks like he is about to say something but one of the angels interrupts.\n\n    \"I understand your hesitation. But if you can't believe us then you can believe yourself. Come with us, with or without your friends, and see what we\n    can offer you. I'm certain that once you hear the patriarch speak, your mind will change.\"\n\n    Hmm... that's not such a bad offer. You can scope them out without putting anyone else in danger and see if these guys are actually legit. And should they turn out to be a threat, you'll have gotten a good look at their defences first.\n    *choice\n     #I suppose I can go, alone.\n      *set willgoalone true\n      *set wontgo false\n      \"Alright, I'll come with you, on my own. I can't really abandon everything and go with you right now though.\"\n\n      \"Very well. We will return here tommorow, at the same time as today. Come to us then.\" Says the angel. Then he and his companion leave.\n\n      \"You sure you wanna go there alone Johnny?\"\n\n      \"Yeah, I want to make sure that these guys are as friendly as they say they are. If they turn out to be alright, I'll return for you and Eleanor. If not, well at least we'll know who the enemy is.\"\n\n      \"Okay Johnny. So... shall we continue our search?\" Hank asks as he gets up. You nod affirmatively and Hank puts the bottle of whiskey in his backpack.\n      You continue scavenging for a while. The search doesn't turn up much, just some bottles of water, a few cans and some snacks. You look through a couple of\n      cafes and tobacco shops but they were all cleaned out. Eventually you get back in the car and drive back home.\n      *goto backhome\n     #I'll go but I'm taking Hank with me.\n      *set willgowithhank true\n      *set wontgo false\n      \"Alright, we'll come with you. We can't really abandon everything and go right now though.\"\n\n      \"Very well. We will return here tommorow, at the same time as today. Come to us then.\" Says the angel. Then he and his companion leave.\n\n      \"Glad you're giving them a chance Johnny. You'll see, it'll be fine.\"\n\n      \"Let's make sure that these guys are as friendly as they say they are before patting ourselves on the back yeah? Now, if they turn out to be alright, we'll return for Eleanor. If not, well at least we'll know who the enemy is.\"\n\n      \"Sure thing Johnny. So... shall we continue our search?\" Hank asks as he gets up. You nod affirmatively and Hank puts the bottle of whiskey in his backpack.\n      You continue scavenging for a while. The search doesn't turn up much, just some bottles of water, a few cans and some snacks. You look through a couple of\n      cafes and tobacco shops but they were all cleaned out. Eventually you get back in the car and drive back home.\n      *goto backhome\n     #Oh no, I'm not going.\n      \"Sorry you guys, but that's impossible.\"\n\n      \"Oh come on Johnny, this could be our chance.\" Says Hank.\n\n      \"We're in no position to go wandering off with a couple of strangers buddy.\"\n\n      The angel responds \"Very well. We will be here tommorow at the same time as today should you change your mind. You will always be welcome.\" then he and his friend leave.\n\n      Hank sighs. \"You absolutely certain about this Johnny?\"\n\n      \"Yeah. We can't risk it, not unless something seriously changes back home. Now come on, let's continue scanvenging.\"\n      Hank gets up, puts the bottle of whiskey in the bag and follows you outside. You continue scavenging for a while. The search doesn't turn up much, just some bottles of water, a few cans and some snacks. You look through a couple of\n      cafes and tobacco shops but they were all cleaned out. Eventually you get back in the car and drive back home.\n      *goto backhome\n   #\"We could give it a chance I suppose\"\n    *set willgowitheveryone true\n    *set wontgo false\n    Hank smiles as he hears your answer.\n\n    \"Excellent. You've made the right choice, you'll see. Where is this Eleanor then?\" says one of the angels.\n\n    \"She's not with us right now.\" you tell them.\n\n    \"Very well. We cannot tell you the location of our haven for now. We can, however, return here tommorow. So, take all of your friends and return to us tommorow morning. We will eagerly await your arrival.\" The angels then get\n    up and leave the bar.\n\n    Hank takes a look at you. \"I'm so happy. Feels like we crossed a threshold, you know? Like this is it, we're starting our post-apocalyptic lives anew!\"\n\n    \"Well I hope this thing meets your expectations Hank. Now come on, let's continue scavenging.\"\n\n    Hank gets up, puts the bottle of whiskey in the bag and follows you outside. You continue scavenging for a while. The search doesn't turn up much, just some bottles of water, a few cans and some snacks. You look through a couple of\n    cafes and tobacco shops but they were all cleaned out. Eventually you get back in the car and drive back home.\n    *goto backhome\n *else\n  \"He's not my friend.\" Responds Hank.\n\n  The angel smiles. \"Whatever interpersonal issues you may have, they will be easier to solve in an enviroment of love and compassion.\"\n\n  \"Right... well what do you say Johnny? Wanna take Eleanor and go with the angels?\"\n\n  *choice\n   #\"Maybe, why?\"\n    \"Hmph... well in that case, I may just take these guys up on their offer and come with you.\" says Hank.\n\n    \"Really? Why the sudden change of heart?\" you ask him.\n\n    \"No change of heart, I'd just rather deal with only you than you and George. And the only one that's actually reliable in this group is Eleanor, so...\"\n\n    So it seems that you will not be rid of Hank even if you do go with these guys. So what do you think, will you take Eleanor and join these guys instead?\n    *choice\n     #I changed my mind, I don't want to join these guys after all.\n      \"...no. Thinking it over some more, I don't think I will join after all.\"\n\n      \"Your answer wounds me.\" The angel sighs. \"However, we will be here tomorrow as well. Should you change your mind, you may return here and we shall welcome you with open arms.\"\n\n      Then both the angels leave. \"You certain you want to stay in this group Johnny? Things aren't exactly sunshine and rainbows you know.\" Hank tells you.\n\n      \"Let's just finish this scavenging operation Hank.\" You get up, Hank gets up as well and shoves the bottle of whiskey inside his backpack and follows you outside. You continue scavenging for a while. The search doesn't \n      turn up much, just some bottles of water, a few cans and some snacks. You look through a couple of cafes and tobacco shops but they were all cleaned out. Eventually you get back in the car and drive back home.\n      *goto backhome\n     #I want to go with them on my own first, to see if they really are as friendly as they say.\n      *set willgoalone true\n      *set wontgo false\n      You turn to the angel and respond to his proposal. \"May I think about it some more? Is there any way I could find you guys again?\"\n\n      \"Of course. We will be here again tommorow, same time. Return to us then.\" the angels then get up and leave the bar.\n\n      \"You gonna try to run away without me Johnny?\" asks Hank.\n\n      \"Let's just finish this scavenging operation Hank.\" You get up, Hank gets up as well and shoves the bottle of whiskey inside his backpack and follows you outside. You continue scavenging for a while. The search doesn't \n      turn up much, just some bottles of water, a few cans and some snacks. You look through a couple of cafes and tobacco shops but they were all cleaned out. Eventually you get back in the car and drive back home.\n      *goto backhome\n     #Yes, this group is falling apart. I and Eleanor will be better off with these guys, even if I have to put up with Hank.\n      *set willgowitheveryone true\n      *set wontgo false\n      \"Very well. We will come with you. But not on our own. There's Eleanor, I want her to come with us as well.\"\n\n      \"Of course angel. Come here tomorrow, same time as today. We will be here.\" The angels then get up and leave.\n\n      \"Well... at least we won't have to deal with George anymore.\" says Hank.\n\n      \"Right. So let's finish up this scavenging operation shall we?\" You get up, Hank gets up as well and shoves the bottle of whiskey inside his backpack and follows you outside. You continue scavenging for a while. The search doesn't \n      turn up much, just some bottles of water, a few cans and some snacks. You look through a couple of cafes and tobacco shops but they were all cleaned out. Eventually you get back in the car and drive back home.\n      *goto backhome\n  point?\"\n\n  \"I don't like it either Johnny. But... well... not a day goes by that I don't worry that we'll find him with his wrists slit inside the water trough. He's... not reliable anymore.\"\n #\"I think we're better off together than apart.\"\n  \"Yeah but together with reliable folk. Not... some paranoid and hostile old fart and a guy who perpetually seems to be one second away from slitting his wrists.\"\n\n\"Jesus, Hank.\"\n\nSuddenly the door opens and in walk two men, both barefoot and dressed in simple white robes. Their attire is the second thing you notice about them though. The first thing is their skin. Milk white, with a golden undertone. And their\neyes, completely white. They are just like you. You are momentarily shocked into silence and so are they. Eventually one of them breaks the silence with a single word. \"Angel?\"\n\n\"Wh- what?\" you respond.\n\n\"Uh, friends of yours Johnny?\" Asks Hank.\n\n\"No? Obviously.\" You respond.\n\n\"Angel, I am so happy we found you. We'd love to have you join our family.\" Continues the man.\n\n\"What do you mean, what family?\" You say.\n\nThe two men sit down at a table and invite you to join them. Both you and Hank sit down at the table with them.\n*goto talkwiththeangels\n\n\n*label backhome\n*page_break\nArriving at the house, you find things are more or less the way you left them.\n*if willgowitheveryone\n After showing George everything you found you take Eleanor to a different room and explain to her what happened at the bar. She listens to you intently, then asks you if you're really certain that this group of \"angels\" is any\n better than this group. \"I think so.\" you respond.\n\n Eleanor exhales out of her mouth. \"Fine. But if these guys turn out to be legit we'll take George and Billy with us.\"\n\n \"I'm not sure how Hank will react to that.\"\n\n \"Guess I'll have to talk with him as well then.\"\n\n \"You do that Eleanor.\"\n\n The rest of the day is as pleasant as can be these days. El fully. George sets up the guard shifts\n with a glass of whiskey in hand and Billy just sort of goes through the motions, not talking to anyone.\n *goto suicide\n*if wontgo\n After showing George everything you found you take Eleanor to a different room and explain to her what happened at the bar. She listens to you intently, then asks you what you thought of that group of \"angels\". \"I wasn't certain what\n to think to be honest. For right now though, we're staying here. All of us.\"\n\n \"I see. Very well then. Glad to know that even with everything that's happening over here, you're not willing to just up and leave.\"\n\n The rest of the day is predictably unpleasant. Eleanor tries and fails to smooth over yet another argument between Hank and George. George sets up the guard shifts with a glass of whiskey in hand and Billy just sort of goes through the\n motions, not talking to anyone.\n *goto suicide\n\n*label suicide\n*page_break\n*set knowsBilly false\nEventually night falls and you all go to sleep. Well, apart from Billy, he gets the midnight shift. You wake up to the sound of George cursing loudly enough that he could probably be heard all the way from the city. As you\nand Eleanor get out of bed and out of your room you find Hank approaching you. \"Ah you guys are awake, good. I didn't want to have to check on the drunken madman on my own.\" says Hank. You all get out of the house and into the yard,\nthen run around and into the back yard to find George hunched over the water trough. Eleanor gasps as you all notice what's inside the trough. It's Billy. He's dead. George turns around, a demented expression on his face.\n\n\"George... please calm down.\" says Eleanor.\n\n\"Calm down?! ...of all the people that could have died... moron went and slit his wrists. I'll take charge of my own fate now! I'll decide who lives and who dies!\" George takes aim at Hank with his\nbolt-action rifle and Hank quickly draws on George with his repeating shotgun.\n*choice\n t and fire back with your revolver. The shot must have gone through his heart, as George drops to the ground and bleeds out very quickly. You get up and check on Hank, finding out that he's still\n    alive, albeit unconscious. You and Eleanor quickly take him into the house and fix up his wound. He'll probably live. You turn to Eleanor.\n\n    \"So... now what do we do?\"\n\n    *if RelEleanor \u003c 36\n     *set knowsHank false\n     \"We aren't doing anything. You are. Leaving, right now.\"\n\n     *goto kickedout\n    *else\n     \"I... I no longer know. Find another group? Or... maybe we shouldn't bother.\"\n\n     \"No I don't accept that. We have to find another group. And... well there's only one other group I know of that would take us in.\"\n\n     \"Who?\" asks Eleanor.\n\n     \"The angels I told you about yesterday.\"\n\n     \"...great.\"\n\n     Eleanor then remains silent and so do you. You wait a while for Hank to recover, then get inside the car and drive all the way to the abandoned cafe-bar at the outskirts of the city. You get inside the building and wait.\n     *goto bar\n   *else\n    *set knowsGeorge false\n    *set RelEleanor -30\n    Eventually Hank smiles and lowers his shotgun. George mutters \"Finally...\" and shoots. The bullet hits Hank in the upper left side of his chest, knocking him down. It seems that it wasn't enough to stop him however, as Hank\n    manages to return fire, his shot hitting George square in the heart, causing him to drop to the ground and bleed out in a manner of seconds. Hank is bleeding quite a bit too though, and by the time you and Eleanor take him inside the\n    house and fix up his wound, he's already lost conciousness. But you're pretty sure he'll live. You turn to\n    Eleanor.\n\n    \"So... now what do we do?\"\n\n    *if RelEleanor \u003c 36\n     *set knowsHank false\n     \"We aren't doing anything. You are. Leaving, right now.\"\n\n     *goto kickedout\n    *else\n     \"I... I no longer know. Find o you mean by that? You can't stay here alone, you'll get chewed up! If you're staying here then so am I.\" says Hank.\n\n    \"I don't think you understood me cousin. You can either fuck off with Johnny or you can fuck off alone. But try to stay here, and by God, I'll put you down.\"\n\n    Hank sighs and lowers his eyes. \"Why are you acting like this Eleanor?\" he finally asks.\n\n    \"You fucking alcoholic piece of... you're putting the blame on me?! It's you who has been acting like a psycho since the very beginning! And now you're suddenly wondering why you're being left alone? Try taking a good look at\n    yourself in a mirror.\"\n\n    Hank stays silent for a while, then responds \"I did not want this to happen. He drew on me! What was I supposed to do, just stand there and hope I wouldn't get shot?\"\n\n    \"If you hadn't been antagonizing him at every turn this wouldn't have happened. And you know what? I think it would have been better if you did exactly that, stood there and hoped you didn't get shot, because then you'd be dead\n    and George would be alive.\" Eleanor's voice completely breaks and tears start rolling down her cheeks as she finishes that last sentence.\n\n    Hank seems taken aback by Eleanor's statement. You put your hand on Hank's shoulder. \"Just leave it. There's no point in this anymore.\" you tell him.\n    *page_break\n    *if RelHank \u003c 60\n     *set knowsHank false\n     Hank, somewhat predictably, throws off your hand and cries out in a rage \"Don't you fucking touch me!\"\n\n     \"I saved your life Hank. Doesn't that mean anything to you?\"\n\n     \"Maybe you did, but like Eleanor said, I'm a psycho. So no, this doesn't change anything between us. Fuck you both.\" And with that Hank storms off. You hear the front gate open and then slam shut again.\n\n     Eleanor looks at you. \"I don't know why you're still here Johnny. There's nothing more to say, we're done you and I. Get out of here. Go to your angels, hopefully  you. Billy rises up out of the water trough and bites into George's throat. Hank and Eleanor both scream in terror as they see this. You quickly draw your revolver and\n   shoot Billy in the head, putting him down for good. George stumbles towards you, hand at his throat injury with torrents of blood coming out from underneath. For a moment you're not certain if he's still alive or if he turned\n   into a zombie that quickly. He then drops to his knees, and finally down on the ground. He is dead.\n   *if RelEleanor > 65\n    Eleanor hugs you and starts crying into your shoulder. You stay there and just hold her for a while. Eventually you give your revolver to Hank. \"Make sure he doesn't come back.\" you say quietly. Hank takes the revolver and\n    fires off a round into George's head, then gives you the gun back.\n\n    *label anew\n    \"Fuck... what do we do now Johnny?\" Hank asks you.\n\n    \"We're leaving this place. There is no group for us to be with anymore. We're going to those... angels. See what's what over there... and hopefully start anew.\"\n\n    Once Eleanor somewhat composes herself you all get inside the car and you drive it all the way to the abandoned cafe-bar where you met those angels. You get comfortable inside the building and wait for them to come back.\n    *label bar\n    *page_break\n    Just as you were thinking that maybe they will not come back after all the door opens and in walk the angels. It's the same guys from yesterday. They smile broadly at you. The taller of the two angels speaks. \"We are so glad to see\n    that our return here wasn't in vain. Are you willing to come join our family?\"\n\n    \"We are.\" you respond.\n\n    \"Then come with us, back to our haven.\"\n\n    \"Did you guys come back just for us?\" you ask them.\n\n    \"No angel. But you take priority.\"\n\n    You follow them outside, and begin the long walk to the haven.\n    *goto_scene haven\n   *else\n    Eleanor hugs Hank and starts crying into his shoulder. Hank just stays there and awkwardly holds her for a while. Eventually you walk over to George's body and fire off a round into his skull. \"Making sure he doesn't come back.\"\n    you say quietly.\n\n    *goto anew\n  *elseif RelGeorge \u003c 60\n   \"No. You're no leader, you're nothing but a fucking monster!\" George responds and turns his rifle to you. He pulls the trigger just as you're drawing your revolver and the bullet slams into you, knocking you down.\n   *if RelHank > 59\n    *set knowsGeorge false\n    Another gunshot rings out, this time it's Hank's shotgun. His shot strikes George in the head, killing him instantly. Thankfully George\n    didn't shoot you in a vital spot so you get back up with only your pride hurt. \"You alright brother?\" asks Hank.\n\n    \"Just fine thanks.\" you respond.\n\n    Eleanor comes a little closer to you and Hank. \"Fuck... what do we do now?\" she asks.\n\n    \"There's no point in staying here any longer. We're three people, this is no group. We need to band together with others. And right now there's only one other group. The angels. We'll go to them, see what's what and hopefully\n    start anew.\"\n\n    \"Goddamn it... goddamn it!\" Eleanor sounds ready to cry.\n\n    In the end you all get inside the car and you drive it all the way to the abandoned cafe-bar where you met those angels. You get inside the building, wait for them to come back.\n    *goto bar\n   *else\n    *set knowsGeorge false\n    Thankfully he didn't manage to hit anything vital so you are able to fire back with your revolver. Your shot strikes George in the head, killing him instantly. \"Are you alright Johnny\" asks Eleanor.\n\n    \"Just fine thanks.\" you respond.\n\n    \"Fuck... what do we do now?\" she asks.\n\n    \"There's no point in staying here any longer. We're three people, this is no group. We need to band together with others. And right now there's only one other group. The angels. We'll go to them, see what's what and hopefully\n    start anew.\"\n\n    \"Goddamn it... goddamn it!\" Eleanor sounds ready to cry.\n\n    In the end you all get inside the car and you drive it all the way to the abandoned cafe-bar where you met those angels. You get wait inside the building, wait for them to come back.\n    *goto bar\n  *elseif RelHank \u003c 60\n   *set knowsHank false\n   *set knowsGeorge false\n   \"Fuck that! You keep trying to tell me what to do and how to act, well here's a little something for you!\" Hank shouts out and pulls the trigger, shooting George in the chest. You quickly draw your revolver but just before you\n   pull the trigger Hank manages to shoot you as well. The power of the shotgun blast throws you to the ground. He didn't manage to hit anything vital on you though, allowing you to retaliate. Your shot strikes true, hitting Hank in the\n   head. His hat flies off and Hank drops to the ground like a puppet that just had its strings cut.\n\n   \"My God... are you alright Johnny?\" asks Eleanor.\n\n   \"Yeah, I'm okay.\" you respond.\n\n   \"Fuck... what do we do now?\"\n\n   \"There's no point in staying here. Two people are hardly a group. We must find another group. And I know of only one. The angels I told you about. We'll go to them, see what's what and hopefully start anew.\"\n\n   \"I... I don't know.... I don't know if there's any point anymore.\" says Eleanor.\n\n   \"No, we can't give up, not now Eleanor!\"\n\n   In the end Eleanor silently follows you inside the car and you drive it all the way to the abandoned cafe-bar where you met those angels. You get inside the building and wait for them to come back.\n   *goto bar", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Dual Nature.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n*delay_ending 60 $4.99 $0.99", "haven": "*page_break_advertisement\nAfter a very long walk you finally arrive at this haven. It's already late in the afternoon. You're in a field, with a large church and a few houses scattered here and there. You notice a small group of others like you standing a little\nways off, closer\nto the church, alongside a couple of humans. The angels escorting you here tell you that you can wait alongside the group of \"new bloods\" until Heather comes out to properly induct you all. When you ask them who Heather is they\ntell you that she is the most respected member of the family, right after the patriarch of course. Her job is to ease new members into the family.\n*if (knowsEleanor) and (knowsHank)\n So you all go and stand next to everyone else waiting here.\n *goto induction\n*elseif (knowsEleanor) or (knowsHank)\n So you both go and stand next to everyone else waiting here.\n *goto induction\n*else\n So you go and stand next to everone else waiting here.\n *goto induction\n\n*label induction\n*temp armedup false\n*temp disguised false\n\nEventually a woman, Heather you presume, exits the church and walks toward you. She's barefoot, much like every other member of this family, but she's not wearing the white robes that, you assume, are issued to everyone. Instead she's\nwearing a black, white and blue dress with a singular flower pinned a little under her left clavicle. Yet all of that seems rather unimportant. What's far stranger and rather alarming are the claws she's got on her hands and feet, thick,\nlong and sharp. Almost like a lioness. Her veins and arteries are engorged and easilly visible through her skin as well. You wonder how she came to look like this.\n\nYour thoughts are interrupted however, as she begins to speak. \"Hello everyone. My name is Heather, I'm very happy to meet you all!\" Her voice sounds awfully young. She can't be older than eighteen, hell maybe she's younger.\n\"It's always a pleasure to welcome new angels into our family.\" She then turns to the few humans that are here with you. \"But it's an even greater pleasure to see so many of you taking such a brave step forward into a life that\nis unknown to you. I understand that it may be difficult and scary for you at first, the unknown is always scary. But we will always be here for you, to help you whenever you need it.\" Some of the humans in the group seem reassured.\nOthers, not so much. \"You will all begin to walk a new path very soon. And\nthrough it, you shall help others do the same. The patriarch will tell you more. For now however, let's get you to cast off the things that shackle you to the past. We will help you embrace your true nature. Follow me.\"\n\nShe leads you all into the church and then to a confession booth. It's pretty large, by confession booth standards at least. Heather tells you all that you will find your robes inside the booth. You will wear your robes and only your\nrobes. Eventually it's your turn. You enter the booth, strip down to your skin and put on a white robe.\n*if barefoot = false\n *set civilized -5\n *set barefoot true\n It's strange walking around without your combat boots. On one hand you feel a bizzare sort of relief, mostly because you can actually sort of feel the ground now. On the other hand though, you feel odd, wandering around like a literal\n angel. You exit the confession booth with newfound grace, trying to suppress your other feelings,\n *goto waiting\n*else\n You then exit the confession booth\n *goto waiting\n\n*label waiting\nand join everyone else. You notice the humans in this group don't go into the confession booth yet. Heather says that there's no point in getting them to go through this for now. You also notice that they're all unarmed right now,\n*if ((knowsEleanor) and (knowsHank))\n even Eleanor and Hank,\n *goto stripped\n*elseif (knowsEleanor)\n even Eleanor,\n *goto stripped\n*elseif (knowsHank)\n even Hank,\n *goto stripped\n\n*label stripped\nyet they were all armed before. Seems their guns were also confiscated, though you don't know where they took them. Your revolver and knife are inside the confession booth right now, but surely someone will take them someplace else soon.\n*page_break\nOnce every angel is done \"casting off the things that shackle them to the past\", Heather begins to tell you a little more about how things work around here. You, alongside every other \"angel\", will stay at one of the houses you saw\nsurrounding the church. They will only serve as places for rest and relaxation, as you will be spending most of your time inside the church. She then leads you deeper into the church, telling you that it's finally time to join the rest\nof your family and listen to the words of the patriarch. You eventually arrive in the biggest room of the church. It seems to have been turned into something of a dining room, judging by the three large tables with plates on them.\n\nYou and every other angel gets seated at the leftmost table, while the ones that are not angels yet remain standing. The rest of the tables remain empty for a couple of minutes, then the rest of the \"family\" arrives and sits down, all of\nthem staring at the elevated platform at the far end of the room. Aside from the ones sitting down, there are also quite a few angels wielding assault rifles, watching over everyone.\n\nYou notice the pictures hung up on the walls. They all depict one man, the patriarch you presume. Then he walks in, coming in from the back of the church. The patriarch.\nHe hasn't introduced himself but he couldn't possibly be anyone else. Heather joins him on the platform. He looks like Heather as well. As in, he too has the claws and the engorged arteries. He also isn't wearing the robes, he's just\nwearing dark dress pants, not quite navy blue but not quite black either. He begins speaking.\n\n\"Hello my children. First of all, I would like to welcome our new angels into this family. It is a beautiful thing to see, men and women crossing this threshold and coming with us into the new world. I am touched that you have all\naccepted our invitation and entered this sacred sanctuary. We welcome you with open arms.\" His voice has an odd quality to it. Maybe it's just the accoustics of the room but there is a little too much echo to it. He continues\nspeaking, talking about what you'll all do here. How it's your duty to \"elevate\" humanity and to help them past their innate failings. To save everyone from this plague. He then proceeds to welcome the humans as well, telling them that,\nvery soon, they shall feel the loving embrace of this family.\n*if knowsEleanor\n You notice Eleanor nervously looking around.\n *if (good > 49) and (civilized \u003c 71)\n  You don't understand what could be bothering her though. You feel very safe in here, in the patriarch's fold. Perhaps it's just that fear of the unknown that Heather mentioned.\n  *if knowsHank\n   Hank on the other hand, seems eager for what's to come.\n   *goto turnthem\n  *else\n   *goto turnthem\n *else\n  Seems she's unconvinced by the patriarch's words. So are you as a matter of fact.\n  *if knowsHank\n   Not Hank though. He actually seems eager to turn into an angel. So you have a problem. You don't want your friend to become one of these misguided fools. You're not certain what you could do about that right now though.\n   *goto turnthem\n  *else\n   *goto turnthem\n*if knowsHank\n You notice Hank looks rather eager to turn himself into an angel.\n *if (good > 49) and (civilized \u003c 71)\n  You're so happy to see your friend taking the patriarch's words to heart, just like you have.\n  *goto turnthem\n *else\n  You're uncertain why he seems so happy to turn himself into one of these fools. It's clear to you that the patriarch is a liar. You're not certain what you could do about it right now though.\n  *goto turnthem\n\n*label turnthem\nEventually a group of other angels arrive. These ones are wearing black robes with hoods instead of white, hoodless ones. They all approach the few non-angels in this room. Suddenly they all take out syringes and jam them into the\nthroats of every single human here\n*if (knowsEleanor) and (knowsHank)\n ,including Eleanor and Hank.\n *goto rollback\n*elseif (knowsEleanor)\n ,including Eleanor.\n *goto rollback\n*elseif (knowsHank)\n ,including Hank.\n *goto rollback\n*else\n .\n *goto rollback\n\n*label rollback\nTheir eyes roll back and they drop to the floor, dead.\n\n*if ((good > 49) and (civilized \u003c 71))\n The hooded figures then all take out bottles of holy water in unison. You wait in anticipation of the glorious outcome. Sure, some of the other angels get up and try to run towards their friends, not understanding that this is for their\n own good but the patriarch, alongside the loyal angels quickly calm them down. They then begin to reanimate. As they all get back up, the angels hand them the holy water. They begin drinking it and, one by one, start turning into\n angels themselves.\n *if ((knowsEleanor) and (knowsHank))\n  You turn to look at Eleanor and Hank. They've just drank the water, very soon they will transform.\n  *page_break\n  Right as the transformation begins however, they both combust into blue flames. You hear the most horrifying and disturbing screams of agony and anguish as the flames quickly strip them of their flesh, until only their charred bones\n  remain.\n\n  You just stay there, too devastated to do anything. Suddenly you realize the patriarch's hand is on your shoulder. \"I am sorry for this my son. Some are simply not pure enough to become like we are. I understand how you must feel right\n  now, for I had to suffer through the same cruel events as well. Take solace my son. Take solace with your brothers and sisters, for they will always be here for you, when others will leave you.\"\n\n  You turn to face him. \"Y-yes father.\" you respond. You do just that. Whether you managed to find love again within your new family and what happened to you after that, only you know. And yet sometimes, during the faint moments\n  between sleep and wakefulness, you wonder if it were ever possible to resist the patriarch's influence, had you held on to your humanity.\n  *goto_scene ending\n *elseif (knowsEleanor)\n  You turn to look at Eleanor. She's just drank the water, very soon she will transform.\n  *page_break\n  Right as the transformation begins however, she combusts into blue flames. You hear the most horrifying and disturbing screams of agony and anguish as the flames quickly strip her of her flesh, until only her charred bones\n  remain.\n\n  You just stay there, too devastated to do anything. Suddenly you realize the patriarch's hand is on your shoulder. \"I am sorry for this my son. Some are simply not pure enough to become like we are. I understand how you must feel right\n  now, for I had to suffer through the same cruel events as well. Take solace my son. Take solace with your brothers and sisters, for they will always be here for you, when others will leave you.\"\n\n  You turn to face him. \"Y-yes father.\" you respond. You do just that. Whether you managed to find love again within your new family and what happened to you after that, only you know. And yet sometimes, during the faint moments\n  between sleep and wakefulness, you wonder if it were ever possible to resist the patriarch's influence, had you held on to your humanity.\n  *goto_scene ending\n *elseif (knowsHank)\n  You turn to look at Hank. He's just drank the water, very soon he will transform.\n  *page_break\n  Right as the transformation begins however, he combusts into blue flames. You hear the most horrifying and disturbing screams of agony and anguish as the flames quickly strip him of his flesh, until only his charred bones\n  remain.\n\n  You just stay there, too devastated to do anything. Suddenly you realize the patriarch's hand is on your shoulder. \"I am sorry for this my son. Some are simply not pure enough to become like we are. I understand how you must feel right\n  now, for I had to suffer through the same cruel events as well. Take solace my son. Take solace with your brothers and sisters, for they will always be here for you, when others will leave you.\"\n\n  You turn to face him. \"Y-yes father.\" you respond. You do just that. Whether you managed to find friendship again within your new family and what happened to you after that, only you know. And yet sometimes, during the faint moments\n  between sleep and wakefulness, you wonder if it were ever possible to resist the patriarch's influence, had you held on to your humanity.\n  *goto_scene ending\n *else\n  Just as you were getting complacent with the process a couple of them burst into blue flames as they are transforming. You stay there, too shocked to do anything. Some of the angels around you look particularly devastated. The patriarch\n  approaches one of them. \"I am sorry for this my son.\" he says. \"Some are simply not pure enough to become like we are. I understand how you must feel right\n  now, for I had to suffer through the same cruel events as well. Take solace my son. Take solace with your brothers and sisters, for they will always be here for you, when others will leave you.\"\n\n  Indeed, they do just that. You provide support whenever and wherever you can. Whatever happened after that, whether you found love or friendship within your new family, only you know. And yet sometimes, during the faint moments between\n  sleep and wakefulness, you wonder if it were ever possible to resist the patriarch's influence, had you held on to your humanity.\n  *goto_scene ending\n*elseif ((good > 49) and (civilized > 70))\n You get up in shock as the hooded figures all take out bottles of holy water in unison. The other angels as well as the patriarch tell you to calm down, that this is for their own good. You know full well that that's bullshit but you're\n not certain what you can do here. The zombification process is nearly finished, and the newly created zombies begin standing up. The hooded ones hand them the water and they all begin drinking it, turning into angels.\n *if ((knowsEleanor) and (knowsHank))\n  You turn to look at Eleanor and Hank. They've just drank the water, very soon they will transform.\n  *page_break\n  Right as the transformation begins however, they both combust into blue flames. You hear the most horrifying and disturbing screams of agony and anguish as the flames quickly strip them of their flesh, until only their charred bones\n  remain.\n\n  You just stay there, too devastated to do anything. Suddenly you realize the patriarch's hand is on your shoulder. \"I am sorry for this my son. Some are simply not pure enough to become like we are. I understand how you must feel right\n  now, for I had to suffer through the same cruel events as well. Take solace my son. Take solace with your brothers and sisters, for they will always be here for you, when others will leave you.\"\n\n  Enough of this. You will send this whole cult to hell if it's the last thing you do.\n  *goto enough\n *elseif (knowsEleanor)\n  You turn to Eleanor. She's just drank the water, she'll transform very soon.\n  *page_break\n  Right as the transformation begins however, she combusts into blue flames. You hear the most horrifying and disturbing screams of agony and anguish as the flames quickly strip her of her flesh, until only her charred bones\n  remain.\n\n  You just stay there, too devastated to do anything. Suddenly you realize the patriarch's hand is on your shoulder. \"I am sorry for this my son. Some are simply not pure enough to become like we are. I understand how you must feel right\n  now, for I had to suffer through the same cruel events as well. Take solace my son. Take solace with your brothers and sisters, for they will always be here for you, when others will leave you.\"\n\n  Enough of this. You will send this whole cult to hell if it's the last thing you do.\n  *goto enough\n *elseif (knowsHank)\n  You turn to Hank. He's just drank the water, he'll transform very soon.\n  *page_break\n  Right as the transformation begins however, he combusts into blue flames. You hear the most horrifying and disturbing screams of agony and anguish as the flames quickly strip him of his flesh, until only his charred bones\n  remain.\n\n  You just stay there, too devastated to do anything. Suddenly you realize the patriarch's hand is on your shoulder. \"I am sorry for this my son. Some are simply not pure enough to become like we are. I understand how you must feel right\n  now, for I had to suffer through the same cruel events as well. Take solace my son. Take solace with your brothers and sisters, for they will always be here for you, when others will leave you.\"\n\n  Enough of this. You will send this whole cult to hell if it's the last thing you do.\n  *goto enough\n *else\n  Just as you were beginning to think that perhaps this is indeed some form of redemption for these people, a couple of them burst into blue flames. You stay there, too shocked to do anything. Some of the angels around you look\n  particularly devastated. The patriarch approaches one of them. \"I am sorry for this my son.\" he says. \"Some are simply not pure enough to become like we are. I understand how you must feel right\n  now, for I had to suffer through the same cruel events as well. Take solace my son. Take solace with your brothers and sisters, for they will always be here for you, when others will leave you.\"\n\n  Enough of this. You can't let them keep on like so. You will send this whole cult to hell if it's the last thing you do.\n  *goto enough\n*elseif (good \u003c 50)\n You get up as the hooded figures all take out bottles of holy water in unison. The other angels as well as the patriarch tell you to calm down, that this is for their own good. You know full well that that's not true, given\n that these people didn't ask for this, but you're\n not certain what you can do here. The zombification process is nearly finished, and the newly created zombies begin standing up. The hooded ones hand them the water and they all begin drinking it, turning into angels.\n *if ((knowsEleanor) and (knowsHank))\n  You turn to look at Eleanor and Hank. They've just drank the water, very soon they will transform.\n  *page_break\n  Right as the transformation begins however, they both combust into blue flames. You hear the most horrifying and disturbing screams of agony and anguish as the flames quickly strip them of their flesh, until only their charred bones\n  remain.\n\n  You just stay there, too devastated to do anything. Suddenly you realize the patriarch's hand is on your shoulder. \"I am sorry for this my son. Some are simply not pure enough to become like we are. I understand how you must feel right\n  now, for I had to suffer through the same cruel events as well. Take solace my son. Take solace with your brothers and sisters, for they will always be here for you, when others will leave you.\"\n\n  Enough of this. You will send this whole cult to hell if it's the last thing you do.\n  *goto enough\n *elseif (knowsEleanor)\n  You turn to Eleanor. She's just drank the water, she'll transform very soon.\n  *page_break\n  Right as the transformation begins however, she combusts into blue flames. You hear the most horrifying and disturbing screams of agony and anguish as the flames quickly strip her of her flesh, until only her charred bones\n  remain.\n\n  You just stay there, too devastated to do anything. Suddenly you realize the patriarch's hand is on your shoulder. \"I am sorry for this my son. Some are simply not pure enough to become like we are. I understand how you must feel right\n  now, for I had to suffer through the same cruel events as well. Take solace my son. Take solace with your brothers and sisters, for they will always be here for you, when others will leave you.\"\n\n  Enough of this. You will send this whole cult to hell if it's the last thing you do.\n  *goto enough\n *elseif (knowsHank)\n  You turn to Hank. He's just drank the water, he'll transform very soon.\n  *page_break\n  Right as the transformation begins however, he combusts into blue flames. You hear the most horrifying and disturbing screams of agony and anguish as the flames quickly strip him of his flesh, until only his charred bones\n  remain.\n\n  You just stay there, too devastated to do anything. Suddenly you realize the patriarch's hand is on your shoulder. \"I am sorry for this my son. Some are simply not pure enough to become like we are. I understand how you must feel right\n  now, for I had to suffer through the same cruel events as well. Take solace my son. Take solace with your brothers and sisters, for they will always be here for you, when others will leave you.\"\n\n  Enough of this. You will send this whole cult to hell if it's the last thing you do.\n  *goto enough\n *else\n  Just as the confusion and uncertainty of the situation begins to settle, a couple of the zombies burst into blue flames. The sight wouldn't have been nearly as awful if it weren't for the fact that they're screaming in agony, as the\n  flames quickly strip them of their flesh. You stay there, too shocked to do anything. Some of the angels around you look\n  particularly devastated. The patriarch approaches one of them. \"I am sorry for this my son.\" he says. \"Some are simply not pure enough to become like we are. I understand how you must feel right\n  now, for I had to suffer through the same cruel events as well. Take solace my son. Take solace with your brothers and sisters, for they will always be here for you, when others will leave you.\"\n\n  Enough of this. You can't let them keep on like so. You will send this whole cult to hell if it's the last thing you do.\n  *goto enough\n*label enough\n*page_break\nThings return to \"normal\" quite quickly. The bodies are removed, and the hooded figures eventually bring and place generous portions of raw meat on the tables. You all begin eating, some with more hesitation than others. The taste is\nsomewhat familiar. So, thankfully, it's not human meat.\n*if eatsraw\n *goto feastover\n*else\n *set civilized -15\n You certainly don't like it at first, but, after a while, you begin to appreciate the flavor of raw meat quite a bit. You then try to remind yourself that you're not here for this. You're here to kill.\n *goto feastover\n\n*label feastover\nThe feast ends at some point and one of the hooded angels comes to your table. She lowers her hood to reveal her rather angular face. She introduces herself as Rachel and describes her role in relation to yours. You get the picture.\nShe'll basically be your team's supervisor, responsible for everyone's well-being as well as the planning of any expeditions outside the sanctuary. As well as serving you food, apparently. It makes sense you suppose, she is\nintented to be a mother figure after all. So after getting sorted into different teams, you are all led to the house you will sleep in. Everyone moves to the sleeping bag assigned to them and lies down to sleep. You do the same thing,\nlying down inside the sleeping bag and pretending to go to sleep. After a while you become reasonably certain that everyone is out.\n\nYou slowly get back up. \"Psst! You awake?\" you whisper. No response from anyone. Good. First\nthings first, you're going to have to clear out this entire house before moving on. You search through the house, eventually finding a rack filled with little equipment, yours among others. You grab your revolver, knife and holster and\nproceed, though you do wonder where the rest of the weapons are hidden. There must be an armory of some sort. Regardless, it's time to clean out this place.\n\nYou apporach and crouch down beside the sleeping figure of the cultist closest to you. You cover his mouth and, at the same exact time, stick\nyour knife in through his ear. The stabbing sound is short and quiet and the cultist convulses only for a moment before going limp. You continue like this, killing everyone inside the house. You finally kill the last one. Now you need\nto decide how to exit the building.\n*choice\n #Through the front door.\n  *goto frontdoor\n #Through a side window.\n  *goto window\n\n*label frontdoor\nYou hardly have time to take note of your surroundings before you hear a voice call out, \"You there, angel, what are you doing outside?\". You saw some guards when you arrived here, but it seems there's a night watch as well. The\nguard that noticed you is standing too far away for you to stab her. You also notice a walkie talkie, tied to her robe. Seems they're in constant communication with each other.\n*choice\n #Bluff.\n  \"I need your help, there's someone inside the house!\" you say with urgency in your voice, yet quietly enough so that the other guards don't hear you.\n\n  \"What are you talking about?\" she asks as she approaches slightly. Suddenly, her eyes widen. \"Traitorous cur!\" she shouts as she raises her rifle at you. You're briefly puzzled, before realizing that your knife is still\n  covered in silver blood.\n  *choice\n   #Shoot back!\n    Your arm snaps forward and your index finger pulls on the trigger. But she was already aiming her rifle at you. A fraction of a second before you pull the trigger back enough, her rifle fires, its bullet going between your eyes.\n    Everything turns dark once more.\n    *goto_scene ending\n   #Dive to the side!\n    You leap to your right, avoiding the bullet that was meant to go through your skull and fire back with your revolver. You manage to hit her in the shoulder, which spoils her aim for just long enough for you to take another shot, this\n    time hitting her right between the eyes.\n    *goto notime\n #Shoot.\n  You snap your arm forward, pointing the gun right between her eyes and pull the trigger. She only has time to change her expression to one of shock before she is struck dead by your shot.\n  *label notime\n  There's no time for you to plan out your next move though. The gunfire will definitely attract more guards to your position. So whatever you do, you have to do it fast.\n  *choice\n   #Book it for the church.\n    You begin running as fast as your legs will allow towards the church. You hear someone shout \"You! Stop!\". You simply turn around and shoot him. More guards begin approaching from all sides. You fire again and again, putting\n    more of them down. You begin reloading your gun after shooting down the final guard. You look up from your weapon, to see even more of them approaching. You finish reloading. Before you can aim at them however, they begin firing.\n    Multiple bullets maim your body, and a final one goes through your skull.\n    Everything turns dark once more.\n    *goto_scene ending\n   #Get back inside.\n    You run back inside the building and take position next to a window, waiting and watching. After a few minutes you see numerous guards approaching. It's too dark inside for them to see you. Eventually they get within range. You take\n    careful aim and begin firing, taking down guard after guard. They begin firing back and you dive down, safely behind cover. You begin exchanging gunfire and manage to take down quite a few of them. You then hear what you correctly\n    assume to be the backdoor breaking open. Angels swarm the building. You turn around and try to fight back, but that was short lived without cover. One of them manages to shoot you in the head.\n    Everything goes dark once more.\n    *goto_scene ending\n\n*label window\nYou quietly exit out of the window, finding yourself alone in the field. Good, because the white robes you're wearing would make you stick out like a sore thumb in the night. You creep towards the back of the house and take a look around.\nThere\nare a few guards a fair distance away. You did see some armed angels when you arrived, but it seems they've got a night watch as well. There's something black tied to their robes, you can't tell what it is at this distance though. There\nare the houses that you saw on your way here as well. Most of the guards are close to the houses\nbut they don't seem to be specifically guarding the buildings themselves. With one exception.\n\nThere is one building, smaller than the houses the angels sleep in, resembling some sort of small warehouse. A singular guard is posted at the\nentrance and doesn't move at all from his position. There's a good chance that there's something of use in there, possibly weapons.\n*choice\n #Forget the weapons, I'm going for the church.\n  *set disguised true\n  You begin moving away from the back and towards the front of the house, slowly. Once you reach the front you see yet another guard. You also finally see what the black object tied to their robes was. A walkie talkie. Seems they're in\n  communication with each other. You silently move up behind her and stab your knife into the base of the guard's skull, grabbing her before she falls down so as to minimise the noise. After gently placing her on the ground you take the\n  walkie talkie for yourself, alongside her rifle. You then drag her body inside the house. Hopefully that should give you enough time to get to the church before they realize something's wrong.\n\n  You then begin walking towards the church. The other guards probably won't realize who you are, so long as they don't get too close. So, after carefully avoiding the patrols, you finally reach the church. You're at the side of the\n  building, close to the windows, which are too narrow and high for you to squeeze through. There are two\n  guards at the front of the church, guarding the only entrance. You wonder how many are inside. As you're pondering what's the best way in, you hear one of the guards at the gate speak.\n\n  \"Reporting no problems at the entrance.\"\n\n  Damn, these guys are in constant communication with some kind of commander who may or may not be in the church. Taking them out will surely alert everyone else to your presence, especially since doing so silently is nigh-impossible.\n  *choice\n   #Kill them both, then run inside.\n    You turn the corner and put a bullet through the skull of the guard closest to you. His friend screams in shock as he levels his rifle at you, but you had the element of surprise. You manage to shoot the second guard as well, the\n    bullet going in through his mouth and out the back of his skull. You then run at the door and kick it open. You barely have time to realize that you're staring down the angels with the assault rifles that were guarding the church.\n    A massive wall of bullets hits you, completely mutilating your body. Multiple rounds go through your head, turning everything dark.\n    *goto_scene ending\n   #Change of plans, I'm going for the warehouse.\n    You back away from the church, find a spot with tall grass, drop down and begin crawling towards the warehouse, hoping that you'll be harder to spot like this.\n    *goto thinnedout\n #I'll sneak to the warehouse then.\n  You drop down and begin crawling your way towards the warehouse, hoping that the grass will conceal you well enough to prevent them from seeing you.\n  *label thinnedout\n  You decide to take a slightly roundabout way towards the building so as to have the\n  option to take the guard out silently. Unfortunately, the grass has thinned out and cannot hide you anymore.\n  *choice\n   #Stand up and casually walk towards the warehouse, pretending I'm a guard.\n    *set armedup true\n    You begin walking to the warehouse, taking such a route so as to avoid coming into close contact with any patrols. Surprisingly enough, it seems no one noticed you, as you managed to get pretty close to the warehouse with no fuss.\n    *if disguised\n     You suppose the walkie talkie and the rifle you got from the female angel helped in making you blend in.\n    You manage to approach the guard in front of the building from behind and to his left, and then stab your knife into the base of his skull,\n    killing him instantly.\n    *if (disguised = false)\n     You now finally notice what that black object that was tied to their robes was. A walkie talkie. You take it for yourself.\n    You take a keyring that was also tied to the thin rope around the guard's waist. You\n    then quickly turn around and try the door. Locked. You grab the keys you looted off of the guard and try those. The door opens up. You drag the body inside and then take a look around. There are multiple different weapons in here,\n    assault rifles, explosives, the works. You grab a rifle and as many remote detonated bombs, plastic explosives and grenades as you can.\n    *choice\n     #Get out and begin booby-trapping the houses.\n      Now that you look even more like a guard you are much more comfortable in moving around the compound. So you exit the warehouse and start moving to the nearest house. Avoiding the guard patrolling close by you manage to silently\n      open a window and enter the building from there. You then place some plastic explosives at the entrance and hook them up to a motion detector. Now anyone entering or exiting the house will receive a nasty surprise. You exit the\n      house the same way you entered and repeat this process for the other few houses around here.\n      *page_break\n      Almost as if on cue, you hear noise coming from your walkie, right as you exit the final house. You pick up and hear a female voice on the other end. \"Where have you gone to, brother Thomas?\". Huh, seems they realized the\n      guy that was guarding the armory is gone. You decide that now is the time to alert them all. You begin walking towards the church, approaching it from the back, then speak into the walkie.\n      *fake_choice\n       #\"The patriarch can't save you now.\"\n       #\"I will destroy everything you are and everything you hold dear.\"\n       #\"You believed you were on a righteous path. You were wrong.\"\n\n      There's nothing but silence on the other end for a bit. Then you hear the voice of a different angel entirely. \"This is Rooke, towards all patrols, brother Thomas has been taken by a wolf in sheep's clothing. Shake the flock from\n      their sleep, face check all angels, then herd them to the church.\". Hmm, seems they use the same frequency when they want a message from HQ to reach everyone. Anyway that doesn't matter much now. If \"shake the flock from their\n      sleep\" means what you think it does, then they've fallen right into your trap. You wait a while, until you hear and see the houses go up in flames. The trap worked and now most of the night watch as well as the ones that were\n      sleeping are most likely dead. Time to enter the church. There are a couple of guards at the front door, possibly more inside.\n      *choice\n       #No need to enter, I'll wrap the building with my remaining explosives and bring it down.\n        You begin packing the wall with bombs.\n        After you've pretty much wrapped the sides and the back of the building with both the remote triggered explosives as well as your grenades, you walk away. You turn back to face the church one last time, before hitting the\n        switch. A massive series of explosions shake the very earth, as you see the church collapse in front of your eyes.\n\n        Once the dust settles you approach the ruins and execute any remaining guards that were trapped under the debris or were still alive but disabled after the explosion. Eventually you see the patriarch himself, a rod of rebar\n        sticking out of his chest and nailing him to the ground. You take your revolver, press it up against his temple and pull the trigger. A splatter of silver blood comes out. As you investigate further, you find no one else\n        that's still alive. The only thing to catch your attention is a small, torn and burned up page. You can hardly make out the letters. It's something about \"blood from a willing sacrifice\", that's all you were able to make out.\n\n        You stand up. There's nothing for it now. Whatever secrets the patriarch had, they died with him. You begin walking away from the smouldering ruin, trying to figure out what fate has in store for you next. You watch the\n        sunrise, as your body is bathed in orange light.\n        *goto_scene ending\n       #Blow a hole in the back of the church and enter through that.\n        You pack the wall with bombs, walk away, and hit the switch. A massive explosion\n        shakes the very earth as the wall of the church comes crashing down. You run forward, jumping into the fray and firing at everything that moves. The explosion took down quite a few enemies, and the bullets from your rifle\n        take down just as many. There simply weren't that many angels inside, as most of the night watch was killed trying to alert everyone else, so it was just the small force that guarded the patriarch. And through the dust and dirt,\n        you see that you've accomplished what you wanted. The patriarch is dead, so is Heather. You continue shooting. Some of the guards no longer try to shoot back and are instead clutching\n        their heads, screaming. It is simplicity itself to mow them down.\n\n        You exit the ruined church and scan the area. There's no one in sight. You've won. You get back inside the church and look around, wanting to make sure there's no one trapped under the debris. \n        *label book\n        Instead of finding a person however,\n        you find something a lot more interesting. A thin leatherbound tome, lying open on the floor. Taking a closer look makes your silver blood freeze. This book contains instructions. Instructions on how to resurrect and control the\n        dead. Reading through it you see that performing a specific ritual can bring the deceased back to life. Once the undead consume holy water, the necromancer can control them, as long as they drank the water\n        while in his presence. That\n        must be the reason why most of the remaining angels couldn't fight you after you killed the patriarch. It also says that the victim will die if they manage to resist the necromancer's influence, which explains why\n        *if ((knowsEleanor) and (knowsHank))\n         Hank and Eleanor burst into flames.\n         *goto reversed\n        *elseif (knowsEleanor)\n         Eleanor burst into flames.\n         *goto reversed\n        *elseif (knowsHank)\n         Hank burst into flames.\n         *goto reversed\n        *else\n         those two burst into flames.\n         *label reversed\n         You keep reading. Eventually you find a particularly shocking page. One that states that the process can be reversed. You can actually undo the apocalypse. The passage is clear though. All who were brought back, will die again.\n         *choice\n          #I'll do it. I'll destroy this book, then sacrifice myself to end this madness.\n           *set good 100\n           You gather up all the necessary tools and read through the passage again and again. After making sure that you've got it down to the last detail, you rip the book to shreds and begin the ritual. It takes a while, and there are\n           many moments when you think of simply giving up. But you manage to overcome them and press on. Eventually comes time for the final step. You grab your knife and slit your left wrist, watching as your silver blood drips down\n           on the symbols. The wound closes almost immediately. For a moment you worry that something went wrong. But then you begin to feel an overwhelming desire to sleep. You cannot stay upright anymore. You lie down. Your eyelids are\n           getting heavy. You turn your head to the side, and watch the sunrise for one last time, before everything goes dark once more.\n           *goto_scene ending\n          #I can't. The book will be destroyed. But I'm not about to kill myself.\n           You decide that you cannot allow a cult such as this to form again. You pick the book up and shred it without hesitation. Once it is nothing more than tiny paper flakes you exit the church. You're not certain how you feel.\n           Fulfilled? Lost? Guilty? Proud? In time you will know. For right now however, you begin walking away from the ruin that was the church, trying to figure out what fate has in store for you next. You watch the\n           sunrise, as your body is bathed in orange light.\n           *goto_scene ending\n          #Reverse the process? I have a better idea. Take the patriarch's place for myself.\n           *set good 0\n           You read through the rest of the passages. Yes! You've found a way to aquire the patriarch's powers for yourself. You gather up the necessary tools and begin. The ritual takes a while but it will all be worth it in the end. Eventually\n           comes time for the final step. You grab your knife and drive it deep into your heart. For a moment you fear that something went wrong, as you realize that you feel pain for the first time since you woke up, back at that\n           cemetery. But then, you feel the power course through you. A smile spreads across your face and you look up at the rising sun, bathing your body in orange light. This is the begining of your era.\n           *goto_scene ending\n       #Kill the guards and go in through the front.\n        You suddenly turn the corner and fire off a quick burst from your rifle, killing both guards before they have time to react. You then run to the door, getting ready to kick it open and mow everyone and everything that's on the\n        other side down. As soon as you lift your leg up from the ground however, a wall of bullets rips through the door, maiming your body. The patriarch's personal guards. They were waiting for you behind the door. Multiple rounds go\n        through your head, turning everything dark once more.\n        *goto_scene ending\n     #Head for the churc
