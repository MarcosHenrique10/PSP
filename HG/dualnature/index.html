h.\n      You exit the warehouse and begin moving towards the church, approaching it from behind. Now it's time to figure out how you're\n      going to enter. There are a couple of guards at the front door, possibly more inside.\n      *choice\n       #No need to enter. I'll wrap the building with bombs and bring the entire church down.\n        You begin packing the walls with explosives. You hear movement behind you once you're about halfway done. You quickly turn around, to see a guard, a woman, pointing her weapon right at your head. \"Drop your weapon.\" she\n        says in a commanding voice.\n        *choice\n         #Try to shoot her before she shoots me.\n          You firmly grasp your rifle and begin lowering it a bit, while at the same time turning it towards her. Suddenly, you stand up and pull the trigger, firing off a burst of bullets that decimate her, going through her body and\n          head. You only have time to turn around however, before the guard at the front of the church sees you. You move to shoot him but he is just a touch faster. His bullet finds its mark, going right through your forehead.\n          Everything goes dark.\n          *goto_scene ending\n         #Kill her quietly, with my knife.\n          You slowly begin lowering your rifle. After placing it gently down on the ground, you raise your hands up, until they are hovering over your knife. You then pull it out and charge. Sadly, her rifle was still pointed at your\n          head. You hear an explosion of gunfire right before everything goes dark.\n          *goto_scene ending\n         #Comply with her demands.\n          You toss your rifle to the ground and raise your hands up above your head. She focuses on the explosives behind you, still keeping her rifle trained on you. \"Hmph. You steal from us and attempt to destroy all we have built.\n          You are beyond redemption.\"\n\n          Your eyes widen as you realize she's about to shoot. That's all you manage to do, before the the blinding light of muzzle flash takes over your vision and then everything goes dark.\n          *goto_scene ending\n       #Blow a hole in the back of the church and enter through that.\n        You pack the wall with explosives, walk away, and hit the switch. A massive explosion\n        shakes the very earth as the wall of the church comes crashing down. You run forward, jumping into the fray and firing at everything that moves. The explosion took down quite a few enemies, and the bullets from your rifle\n        take down just as many. There simply weren't that many angels inside, besides the patriarch's small personal guard. And through the dust and dirt,\n        you see that you've accomplished what you wanted. The patriarch is dead, so is Heather. You continue shooting. Some of the guards no longer try to shoot back and are instead clutching\n        their heads, screaming. It is simplicity itself to mow them down.\n\n        You exit the ruined church and scan the area. You hear screaming, and see that some of the night watch is coming for you. The rest are in the same condition as the ones you executed in the church, screaming, clutching their heads.\n        You dig in, using the debris as cover, and engage in a gunfight with the ones that seem to be holding it together. You manage to kill most of them, before a bullet hits you in the shoulder, spoiling your aim. Another one strikes\n        you in the chest. You drop down behind cover, until your wounds heal. Peeking out of cover once more, you see there are very few enemies remaining. The ones that were screaming after you killed the patriarch seem to have recovered,\n        but they don't try to fight you, opting to retreat instead. This distracts the few angels still in combat, allowing you to finish them off with relative ease.\n\n        You stand up and look around. There's no one in sight. You've won. You decide to check the church again, to make sure everyone is really dead.\n        *goto book\n       #Kill the guards and go in through the front.\n        You suddenly turn the corner and fire off a quick burst from your rifle, killing both guards before they have time to react. You then run to the door, getting ready to kick it open and mow everyone and everything that's on the\n        other side down. As soon as you lift your leg up from the ground however, a wall of bullets rips through the door, maiming your body. The patriarch's personal guards. They were waiting for you behind the door. Multiple rounds go\n        through your head, turning everything dark once more.\n        *goto_scene ending\n   #Keep crawling.\n    You continue crawling towards the small building, hoping no one notices you. Sadly and inevitably though, you hear the voice of a guard ring out. \"Hey, you! What do you think you're doing?\"\n\n    Now what?\n    *choice\n     #Shoot him.\n      You turn your body to the side, take aim and fire. Your first shot hits him in the upper chest. But your second shot goes straight through his head. You hear gunfire, followed by bullets striking the dirt around you. Seems you've\n      managed to alert everyone else to your presence. You get up and run, firing back. But with the spot you were in, you get surrounded very quickly. A bullet hits you in the back, another in the leg. Finally they manage to hit you in\n      the head. Everything goes dark once more.\n      *goto_scene ending\n     #Wait for him to come close, then kill him with my knife.\n      You hold completely still. The guard continues to shout at you, but you remain unresponsive. Eventually he walks close to you. As soon as he grabs you, you lunge at him, sticking your knife in through his eye. The blade goes in so\n      deep that you struggle to pull it out. After you finally manage to extract the knife, you take his walkie talkie for yourself, tying to your robe. You also pick up his rifle and holster your revolver.\n      *if (disguised = false)\n       Now that you look like a guard, it should be much easier for you to get to the warehouse.\n      It doesn't seem like anyone else was alerted by the shouting. Thank goodness.\n\n      You begin walking towards the small building, taking care to avoid the other patrols. Suddenly, your walkie comes on. You pick it up and listen. \"This is Rooke, towards all patrols, brother Jacob has been taken by a wolf in\n      sheep's clothing. Shake the flock from their sleep, face check all angels, then herd them to the church.\"\n\n      Well that complicates things. Seems they found the guy you killed. Very soon they will find out about everyone you killed inside the house as well. They'll probably notice you're not among the dead too, then they'll definitely know\n      you're the one they're looking for.\n      *choice\n       #Keep going for the warehouse.\n        You ignore the issue and continue towards the warehouse. Eventually you reach it. Thankfully the guard that stood in front of the building seems to have left, likely to go wake everyone else up and take them to the church. So,\n        you're completely free to enter. You try the door. It's unlocked. Inside you see multiple different weapons. Explosives, assault rifles, the works.\n        *choice\n         #Enter the building, there's not time to lose.\n          You walk inside the dark building only to hear an ear-bursting explosion. Plastic explosives, rigged to blow up if anyone disturbed a thin string stretched across the floor. They booby-traped the\n          place, knowing the intruder would try to steal their weapons. All of that took about a fraction of a second to happen, because you were then blown to pieces, and everything went dark once more.\n          *goto_scene ending\n         #No, this is way too easy. It will waste time, and possibly lead to me getting discovered, but I want to examine the door frame first.\n          *set armedup true\n          You carefully examine the door frame. There doesn't seem to be anything out of the ordinary. But then, you notice it. A thin string stretched across the floor. Likely linked to an explosive mechanism or maybe a gun. You step\n          over the line and get inside the building, very cautiously, so as to avoid any further traps. Your eyes adapt to the darkness after a moment, and you see what the line of string was connected to. Plastic explosives.\n          You're not exactly an EOD specialist so you figure it's best you don't try to disarm the bombs. Instead you turn your attention to all the gear in here. There's plenty to choose from. You decide to ditch the semi-auto rifle\n          you're carrying in favor of a fully-automatic assault rifle. You grab some remote triggered bombs and some grenades as well.\n\n          Now you're pretty much ready for anything.\n          *page_break\n          Exiting the warehouse, you find that most of the \"flock\" is being taken towards the church. Although you can't be sure from this distance, you think most of them are unarmed, with only the night watch carrying weapons. You were\n          hoping to booby-trap the houses the angels slept in, in order to blow up both the guards entering and the ones already inside. But it seems you don't have the time for that right now. Instead, you head for the church, approaching\n          it from an angle, so as to avoid the guards that will surely be at the entrance.\n\n          Once you're close enough you see that your prediction was right. Most of the night watch is now guarding the entrance to the church. You're pretty sure they haven't spotted you yet.\n          *fake_choice\n           #Go around the back of the church and create an entrance with my bombs, then jump in and kill everything and everyone I see.\n            You drop back and approach from an angle, taking care no one notices you, until you finally arrive at the back of the building. You pack the wall with bombs, walk away, and hit the switch. A massive explosion\n            shakes the very earth as the wall of the church comes crashing down. You run forward, jumping into the fray and firing at everything that moves. The explosion took down quite a few enemies, and the bullets from your rifle\n            take down just as many. Through the dust and dirt, you see that you've accomplished what you wanted. The patriarch is dead, so is Heather. You continue shooting. Some of the guards no longer try to fight and are instead clutching\n            their heads, screaming. You don't have much time to ponder why however, as one of the few enemies that are still shooting back manages to find his target. A bullet goes through your head and everything turns dark once more.\n           #Mow the bastards down with my assault rifle.\n            You take aim and begin firing in full auto. It's difficult to keep the gun on target but, for a while, you manage it. Of course they spot you and return fire back very quickly. You notice the ones you killed get replaced by\n            guards that were waiting inside the building. You kill them as well. For a moment it seems like you will make it. But alas, one of the enemies managed to find their mark. That one bullet through your head was all it took.\n            Everything goes dark once more.\n           #Place explosives all around the perimiter of the church, bring the whole building down.\n            You drop back and approach at an angle, taking care no one notices you, until you finally arrive at the side of the building. You begin packing the wall with bombs, slowly making your way towards the back.\n            After you've pretty much wrapped the sides and the back of the building with both the remote triggered explosives as well as your grenades, you walk away. You turn back to face the church one last time, before hitting the\n            switch. A massive series of explosions shake the very earth, as you see the church collapse in front of your eyes.\n\n            Once the dust settles you approach the ruins and execute any remaining guards that were trapped under the debris or were still alive but disabled after the explosion. Eventually you see the patriarch himself, a rod of rebar\n            sticking out of his chest and nailing him to the ground. You take your revolver, press it up against his temple and pull the trigger. A splatter of silver blood comes out. As you investigate further, you find no one else\n            that's still alive. The only thing to catch your attention is a small, torn and burned up page. You can hardly make out the letters. It's something about \"blood from a willing sacrifice\", that's all you were able to make out.\n\n            You stand up. There's nothing for it now. Whatever secrets the patriarch had, they died with him. You begin walking away from the smouldering ruin, trying to figure out what fate has in store for you next. You watch the\n            sunrise, as your body is bathed in orange light.\n          *goto_scene ending\n       #Book it for the church.\n        You decide not to waste anymore time on something that may or may not work, and instead run for the church. Once you approach it you see two guards posted at the entrance. They haven't noticed you yet so you have the\n        element of surprise. You take careful aim and fire, hitting one of them in the head and killing him instantly. You pull the trigger again, shooting the other one before he can react. You then sprint towards the front door, getting\n        ready to bash it open and shoot everyone and everything inside. Before you do however, an almost literal wall of bullets annihilates the door and maims your body. They were waiting for you behind the door. Multiple rounds go\n        through your head, and everything turns\n        dark once more.\n        *goto_scene ending\n   #Run as fast as I can towards the warehouse.\n    You stand up and begin full on sprinting towards the warehouse, desperately hoping no one notices you. But alas, a white figure running in the dark is far too obvious. You hear the voice of a guard, screaming \"Hey you! Stop right\n    there!\"\n    *fake_choice\n     #Mock surrender and kill him with my knife.\n      You stop running and turn around to face the guard. He begins approaching you, cautiously. He stops just outside your knife's range. \"What do you think you're-\" Suddenly, his eyes widen. \"You snake!\". Any hope to bluff\n      your way out of this is lost. For a moment you're not sure what it was that gave you away. Then you realize. Your knife is still stained with the silver blood of the angels you've killed. He raises his rifle.\n\n      Without warning, you rush at him, tackling him to the ground. You hear a gunshot echo into the night as his rifle goes off. You wrestle with the guard for a bit, until you manage to stab him through the right eye. As you stand back\n      up, you hear yet another gunshot. At the same time, your vision goes dark once more.\n     #Shoot him.\n      You turn, revolver firmly in your grip, aim, and pull the trigger. The guard goes down but you hear more gunfire. You quickly scan the area around you, spotting a few more angels converging on your position. You start running and\n      gunning, taking down angel after angel. Eventually a bullet finds its mark, hitting you in the shoulder. Then another one gets you in the knee. A final one goes through your skull, and everything turns dark.\n     #Ignore him.\n      You ignore him and continue running. The guard keeps screaming orders at you. Suddenly, you hear a gunshot as a bullet strikes you in the left side of your ribcage. You stagger, the round must have been a large-caliber one. The\n      guard shoots again, this time hitting you in the head. Everything goes dark.\n    *goto_scene ending", "screenshots": "*set Civilized 100\n*set good 30\n*set RelEleanor 80\n*set knowsEleanor true\n\nAs you're entering the rooftop you hear a metallic \"CLANG!\" and feel a slight bit of pressure around your left calf. You look down and notice that your left leg has been caught in a bear trap. You bend down, pry the trap open and\nrelease your leg from the iron grip.\nYou notice your blood has a silvery-chrome colour now.\nAs you get back up you are greeted by a revolver pointed right at your face. Some guy, probably in his early twenties, with bad acne and short hair is \npointing the gun at you. As soon as he notices your more... unnatural features he backs away slightly. \"What the fuck are you- what are you doing here?\", he asks in a shaky, nasally voice.\n*fake_choice\n #Tell him the truth and hope he doesn't fire\n #Tell him to stop waving that gun in your face\n #Tackle him to the ground\n\n*set knowsGeorge true\n*set knowsBilly true\n*set knowsAlexandra true\n*set knowsHank true\n*set Civilized 75\n*set good 60\n*set RelEleanor 70\n*set RelGeorge 60\n*set RelBilly 50\n*set RelAlexandra 50\n*set RelHank 80\n\nYou instantly drop to the floor and so does Hank. A plethora of bullets fill the air as the gunfight begins. You're fairly certain that the bullet didn't hit you. Taking a look at Hank you see that he's unharmed as well, though he's\nshaking like hell. You're not sure if he's in any shape to fight right now. You pop out of cover and start firing back, though it's difficult to hit your mark as you can't see them very well. The boards you nailed to the front gate\nprevent you from getting a clear shot, even when the enemy gets out from behind the wall surrounding the yard. The only good thing is that the same thing applies to them as well.\n\n*fake_choice\n #I'll get back inside the house, try and reach that window in the staircase leading to the ground floor and sort-of flank them from there.\n #I'll yell at Alexandra to get to the back portion of the balcony and watch out for anyone trying to flank us from the back yard.\n #I'll try to get Hank to snap out of it and help us out.\n #I'll see if I can hit any of the older guys in the group, they seem to be the ones giving the orders.\n\n\n*set knowsGeorge false\n*set knowsBilly false\n*set knowsAlexandra false\n*set knowsHank false\n*set RelEleanor 90\n\nYou and Eleanor are moving through the city at a nice brisk pace. It seems as though today is going to be quiet, just like yesterday. You're almost at the city limits when you run into an absolute warzone. There are numerous survivors\nand undead here, all fighting each other. You're not sure but you think some survivors are attacking other humans as well. So much for it being a quiet day. \"There's no way to walk through that mess.\" says Eleanor.\n\n\"Too right you are. Let's get out of here. We'll move around the perimeter of the city, try to find a place that's not a battlefield.\" You move away from the city limits and start going through alleys and streets until you find\na better location to exit the city from. Once you finally arrive at another exit point you encounter yet another problem. Though this place isn't teeming with survivors and undead there are still quite a few zombies wandering about.\nYou're gonna have to get past them somehow.\n\n*fake_choice\n #I'll try my best to distract them so Eleanor can sneak through, then follow her.\n #See if covering Eleanor in zombie guts will let us both sneak through.\n #Kill them all.\n\n*set knowsEleanor false\n\nOne of the hooded angels comes to your table. She lowers her hood to reveal her rather angular face. She introduces herself as Rachel and describes her role in relation to yours. She'll basically be your team's supervisor.\nSo after getting sorted into different teams, you are all led to the house you will sleep\nin. Everyone moves to the sleeping bag assigned to them and lies down to sleep. You do the same thing,\nlying down inside the sleeping bag and pretending to go to sleep. After a while you become reasonably certain that everyone is out.\n\nYou slowly get back up. \"Psst! You awake?\" you whisper. No response from anyone. Good. First\nthings first, you're going to have to clear out this entire house before moving on. You search through the house, eventually finding a rack filled with little equipment, yours among others. You grab your revolver, knife and holster and\nproceed, though you do wonder where the rest of the weapons are hidden. There must be an armory of some sort.\n\nYou apporach and crouch down beside the sleeping figure of the cultist closest to you. You cover his mouth and, at the same exact time, stick\nyour knife in through his ear. You continue like this, killing everyone inside the house. You finally kill the last one. Now you need\nto decide how to exit the building.\n*fake_choice\n #Through the front door.\n #Through a side window.\n\n\n*set knowsEleanor true\n*set RelEleanor 80\n\n\"Johnny wake up!\". You open your eyes and realize Eleanor is shaking you awake.\n\"What is it?\" you ask her.\n\n\"Someone's coming, multiple people actually. I heard them talking earlier, I think they saw the smoke from our fire.\"\n\nAs you wake up completely you manage to make out a couple of voices talking. You can't quite understand what they're saying but they are close by and they're coming even closer. You get up and grab your weapon, then move closer to the\nalleyway leading out of the empty lot. The guys that were coming this way have stopped talking now. As you press up against the corner you hear them talking once more.\n\n\"Hold up man. The dumpster. Someone's intentionally put it there.\" Says the one of the two men.\n\n\"Yeah no shit pal. Zombies can't start fires, whoever is back there is clearly alive.\"\n\n\"Man are you sure it's a good idea to try and rob these guys? I mean, what if they're armed?\"\n\n\"Well that's why we got our knives with us smart guy. Now come on, let's climb over this here dumpster and see what goodies are waiting for us back there.\"\n\nYou roll your eyes at the stupidity of these two wannabe bandits.\nSeeing as you have a gun and they only have knives you decide to take a step forward and actually get into the alleyway before they climb over the dumpster. That way you'll be able to shoot them if needed and they won't be able to do\nanything about it. You do just that, stepping into the alley and taking aim at the two bandits. They're two non-descript guys in their twenties, one of them is dressed up in a white hoodie and black dress pants and the other one is \nwearing a black tracksuit. They both freeze in their tracks as soon as they see you.\n*fake_choice\n #Just yell at them to leave this place.\n #Start shooting.", "startup": "*title Dual Nature\n*author Nikos Nikolakopoulos\n*scene_list\n  startup\n  country\n  dead\n  haven\n\n*create civilized 100\n*create good 50\n*create barefoot false\n*create gun false\n*create eatspeople false\n*create eatsraw false\n*create RelGeorge 60\n*create RelEleanor 90\n*create RelHank 50\n*create RelAlexandra 60\n*create RelBilly 60\n*create eatszombies false\n*create knowsGeorge false\n*create knowsHank false\n*create knowsEleanor false\n*create knowsAlexandra false\n*create knowsBilly false\n*create willgoalone false\n*create willgowithhank false\n*create willgowitheveryone false\n*create hankwill false\n*create wontgo true\n*create willtakeitover false\n\n*temp stab false\n*temp supplieskid false\n*temp suppliesmarket false\n*temp knowsaboutkid false\n*temp hassteak false\n*temp wenttomarket false\n*temp hasbeef false\n*temp haseatenextra false\n*temp fire false\n*temp wasadick false\n\n*if not(choice_is_web or choice_is_steam)\n *temp skip_description\n *config skip_description false\n *if skip_description\n\n  *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n Struggle between your undead and human side whilst trying to survive in this post apocalyptic horror game. Would you save what's left or rule among the dead?\n \n [i]Dual Nature[/i] is a 55,000-word interactive novel by Nikos Nikolakopoulos, where your choices control the story. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\n The whole world is dying. Hordes of zombies plague the earth and civilization has collapsed. You don’t know how this happened. The only thing you do know is that you’ve just crawled out of your grave. Yet unlike the other zombies, you’re still sentient.\n\n Will you try to convince mankind that you’re still one of them? Will you protect the living? Or embrace your undead nature and succumb to darkness? Is it possible to find a way to undo the apocalypse? What are you willing to sacrifice?\n\n • Play as Johnny, a man trapped between life and death.\n • Fight to keep your humanity intact.\n • Struggle between good and evil.\n • Make allies or enemies.\n • Seek power or justice.\n\n In this post-apocalyptic horror game there is no peace for the dead, no rest for the wicked and no hope for humanity. Could you be the one to undo the apocalypse?\n\n [b]Content Warning:[/b] In this game you play as a sentient zombie. It contains scenes of a graphic nature that can't be described as cannibalism because the PC is no longer human. It also contains suicide, torture, mutilation, and sexual assault. Reader discretion is advised.\n\n *if choice_is_advertising_supported\n  [i]Dual Nature[/i] is supported by advertisements, but you can buy the unlimited version to turn off ads forever.\n  \n  *purchase_discount adfree 2022-09-08 $4.99 $2.99 purchased\n  *page_break_advertisement\n\n  *goto purchased\n *else\n  [i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n  *purchase_discount adfree 2022-09-08 $4.99 $2.99 purchased\n  *page_break Play Now for Free\n\n*label purchased\n\nYou open up your eyes. You're not sure where you are, somewhere pitch dark. In some kind of box. You have to get out of here somehow. Opening the box is impossible, as there's some kind of weight holding it closed.\nYou begin to punch the lid as hard as you can. Eventually it breaks and dirt pours inside. Pushing the dirt aside, you widen the hole as much as you can. Finally there's a hole large enough to sqeeze\nthrough. Why the hell were you buried alive? Digging your way up, you finally reach the surface. Looking around, your suspicions are confirmed. This is a graveyard. The skin on \nyour hands is missing. You can see the muscle wrapped tightly around your bones, your exposed knuckles, all glimmering in the morning light. There's another thing to consider. You're extremely thirsty and hungry.\nChecking the \npocket on the inside of your jacket, you find a small bottle of water. You pop it open and down it all in one gulp. Suddenly you feel much better. You notice the skin on your arms growing back.\nEven your hair grows back to just the length you remember it being. The colour of your skin seems a little off though. It's pale and has an odd golden undertone.\n\nOther people begin digging themselves out of their graves as well. Most are the way you used to be, with their skin withered and rotten, although there are some that seem... fresher. It then dawns on you. This is a zombie apocalypse.\nWhere does that leave you though? Clearly you're one of them. Or at\nleast you used to be. It seems the holy water did something. Turned you into something in between most likely, considering that the other zombies are not paying any attention to you. A man approaches but he runs away as \nsoon as he sees the other undead. A zombie notices and runs after him. All the others notice as well and begin runnning after the man too. You feel a certain need to get that man and eat him yourself. You block the thought out however.\n\n*choice\n #I'll run after the zombies and try to save the man\n  *set good +5\n  You begin running after the other zombies but find it somewhat difficult to keep up. Though you don't feel tired at all you are struggling to balance, mostly because you cannot feel the ground beneath your feet. The formal shoes you're\n  wearing aren't doing you any favors either as they feel slippery, even on the dirt. Still, the bigger problem is that you cannot feel much of anything, as if your sense of touch has been lost. It's like your entire body is under the \n  effects of local anesthesia, only you can still move freely.\n\n  *choice\n   #Remove my shoes and socks and see if I can feel the ground any easier barefoot\n    *set civilized -5\n    *set barefoot true\n    You completely remove your footwear and try to run after those undead again. It actually is somewhat easier to walk and run barefoot as you can feel the ground slightly better. You don't feel any difference in \n    temperature either. Unfortunately you've lost the other undead as well as the running man. You lean against a nearby tree and try to remember how it was before your death. Eventually you remember one woman. Eleanor, your girlfriend \n    or ex-girlfriend more like. A gothic creature of tight corsets and excessive makeup. You remember where she lives and decide to make your way towards her home.\n    *goto home\n   #Try to adjust to moving without my sense of touch\n    You do your best to run after the other undead without your sense of touch. Eventually you get into a rythm and manage to pick up some speed. Unfortunately it wasn't enough; you've lost the other undead as well as the\n    running man. You lean against a nearby tree and try to remember how it was before your death. Eventually you remember one woman. Eleanor, your girlfriend or ex-girlfriend more like. A gothic creature of tight corsets and excessive\n    makeup. You remember where she lives and decide to make your way towards her home.\n    *goto home\n #Ignore them all and try to remember my life before my death\n  *set good -5\n  You ignore the other undead as well as the man they were chasing and try your best to remember your life before your death. You finally manage to remember one woman. Eleanor. She is or was your girlfriend. A gothic creature of tight\n  corsets and excessive makeup. You remember where she lives and begin to make your way towards her home but find it somewhat difficult to move. Though you don't feel tired at all you are struggling to balance, mostly because you cannot \n  feel the ground beneath your feet. The formal shoes you're wearing aren't doing you any favors either as they feel slippery, even on the dirt. Still, the bigger problem is that you cannot feel much of anything, as if your sense of \n  touch has been lost. It's like your entire body is under the effects of local anesthesia, only you can still move freely.\n\n  *choice\n   #Remove my shoes and socks and see if I can feel the ground any easier barefoot\n    *set civilized -5\n    *set barefoot true\n    You completely remove your footwear and try to walk again. It actually is somewhat easier to walk and run barefoot as you can feel the ground slightly easier. You don't feel any difference in temperature either. \n    You continue walking towards Eleanors' house though it's going to take some time until you arrive as she didn't live right next to the graveyard.\n    *goto home\n   #Try to adjust to moving without my sense of touch\n    You do your best to continue walking without your sense of touch. Eventually you manage to get into a rythm and pick up some speed though still not as much as you would like. You continue moving towards Eleanor's house though it's \n    going to take some time until you arrive as she didn't live right next to the graveyard.\n    *goto home\n\n*label home\n*temp asks1 0\n\nYou're about to reach Eleanor's appartment when you notice some more undead around the neighborhood. There are some more people running away from them, it seems the area is pretty badly infested with zombies. You hurry inside the\nappartment, climb up the stairs and try the door. It's locked.\n*choice\n #Break it down\n  *set knowsEleanor true\n  You give the door a solid kick right beside the handle. It budges somewhat but it doesn't open. You give it another kick and this time the door opens up. You enter the appartment and start looking for Eleanor. You move towards\n  her bedroom and find her packing a duffel back. You almost didn't recognize her. The excessive eyeshadow and black lipstick may be there but her hair, normally wild and tangled to the point where one might imagine bats nesting in it,\n  is now tied back in a messy ponytail. Not to mention her clothes which aren't even her own, they're actually yours, a pair of black leather pants and a shirt with a skeleton in a cowboy hat holding two revolvers. The boots she's\n  wearing are her own though. You speak up.\n\n  \"Eleanor.\"\n\n  She quickly turns around and yelps as she notices you standing there. She then grabs a long kitchen knife that she had hanging from her belt and brandishes it at you.\n\n  \"Calm down, I'm not going to hurt you.\", you tell her.\n\n  \"Don't come any closer or I'll... wait... Johnny? How the hell...?\"\n\n  \"I came back just like everyone else but I drank some holy water. I think that's the reason I look and act like a human still.\"\n\n  Eleanor slowly approaches you and then pulls you in an impulsive embrace. You hug her back. There are a few things you'd like to ask her about.\n  *label questions\n  *choice\n   *hide_reuse #\"How did you get a hold of my clothes and why are you wearing them?\"\n    \"They were here already. Wait you don't remember? We were in the process of moving in together, most of your stuff had already been brought over here. As for the second question, well, a dress isn't exactly practical.\"\n\n    \"Oh I see. Do you know what... happened to me?\"\n\n    \"I don't know the details but you crashed your bike into a truck. The official diagnosis was death by cardiac arrest.\"\n\n    \"After crashing into a truck? Wow... normally there shouldn't have even been enough of me to come back to life, even now. I guess I got lucky, in a twisted kind of way.\"\n    *set asks1 +1\n    *goto questions\n   *hide_reuse #\"What's your plan?\"\n    \"I'm going to my uncle's house, outside the city.\"\n\n    \"Which uncle?\"\n\n    \"Uncle George. You remember him? We were at his house when you came to meet my family. Big country man in his 60s?\"\n\n    You finally manage to remember him. Only him though. He's a friendly enough guy, at least going by the one time you met him at the family gathering. You're not sure how he'll take to the fact that you came back from the dead though.\n\n    \"Yeah, yeah I remember him.\"\n\n    \"It's a pretty rural area over there. Less people hopefully means less zombies.\"\n\n    \"They come out of the graveyards. So I'm not sure if the country is any safer than the city.\"\n\n    \"There are no graveyards out there, their dead were all buried at the graveyard closest to the city limits. Besides everyone out there has a gun, not to mention strong bonds between each other which means less criminals as well.\"\n    *set asks1 +1\n    *goto questions\n   *hide_reuse #\"Are you alright?\"\n    \"Yeah I'm fine. I um, I ran into a zombie out on the streets when I went out to buy a pack of smokes. They seem to have crawled out of nowhere. I witnessed a few attacks and almost fell victim to one. But some guy saved me. He\n    had a gun and he shot the zombie dead.\"\n\n    \"What happened to him?\"\n\n    \"I don't know. I forgot all about him as I ran all the way back here.\"\n  \n    \"Oh.\"\n    *set asks1 +1\n    *goto questions\n   *selectable_if (asks1 = 3) #No more questions!\n    \"Alright then Eleanor, look we should get out of here as quickly as possible.\"\n\n    \"Umm, sure but I'd appreciate it if you went and changed clothes first.\"\n\n    \"Why? What's wrong with my suit?\"\n\n    \"Well it kind of smells like it was worn by a rotting body for three months. No offence.\"\n\n    \"Oh. Yeah, I guess that makes sense. I can't really smell anymore.\"\n\n    \"You can't...?\"\n\n    \"Yeah, I lost my sense of smell alongside my sense of touch.\"\n\n    \"But you can see just fine right?\"\n\n    \"Yeah, why?\"\n\n    \"Well your eyes are... all white. I don't mean that your irises and pupils have turned white. I mean they're completely gone.\"\n\n    \"Huh, I don't know why I'm not surprised. Well, I'm off to change.\"\n\n    \"Alright, I'm going to try to call my uncle and tell him that we're going over there and explain your situation so he doesn't shoot you as soon as he sees you.\"\n\n    You go and open up one of the two wardrobes in Eleanor's bedroom, the one on the left hand side, and find your clothes.\n    *if barefoot\n     You put on a pair of black jeans, a shirt with a zombie clown on it and a black leather trenchcoat. You then get out of the bedroom and find Eleanor again.\n     *goto ready\n    *else\n     You put on a pair of combat boots, black jeans, a shirt with a zombie clown on it and a black leather trenchcoat. You then get out of the bedroom and find Eleanor again.\n     *goto ready\n #Ring the bell\n  *set stab true\n  *set knowsEleanor true\n  You ring the doorbell a couple of times and wait for a response. Eventually you hear footsteps behind the door and then a female voice, Eleanor's voice, yell out \"Get out of here! I'm not opening the door to anyone!\".\n  You're not entirely certain how to respond to that. Should you just tell her who you really are? She'll most likely not believe you. But you can't really think of anything else to say, you can't remember the names of any friends or\n  relatives that she might have had.\n  *choice\n   #Just tell her to open the door without mentioning my name\n    \"Eleanor please open up. I'm not here to hurt you.\" There's a pause and then you hear Eleanor's voice again. \"Who are you?\"\n\n    You sigh and respond to her, \"You won't believe me if I tell you.\".\n\n    \"I won't believe you if you don't.\"\n\n    Well it seems there's no other choice. Time to tell her the truth.\n\n    \"It's- it's Johnny.\".\n\n    There's a long pause. You then hear Eleanor's voice again.\n\n    \"You must think I'm stupid or something. Now get out of here or I swear to god I'll put you down.\"\n\n    \"Eleanor I swear it's-\" You're suddenly interrupted by the door opening and Eleanor jumping out at you and jamming a knife in your gut. You feel a slight bit of pressure as the blade sticks into you but nothing more. You're\n    more surprised to see that Eleanor looks very different than you remember. The excessive eyeshadow and black lipstick may be there but her hair, normally wild and tangled to the point where one might imagine bats nesting in it,\n    is now tied back in a messy ponytail. Not to mention her clothes which aren't even her own, they're actually yours, a pair of black leather pants and a shirt with a skeleton in a cowboy hat holding two revolvers. The boots \n    she's wearing are her own though.\n\n    As she realizes who you are she screams and falls back.\n\n    \"Calm down, I'm not going to hurt you.\", you tell her.\n\n    \"What the fuck? J-Johnny? How the hell are you... alive?\"\n\n    \"I came back just like everyone else but I drank some holy water. I think that's the reason I look and act like a human still.\"\n\n    You pull the knife out of your stomach and take a look at the blade. It's covered in a silvery-chrome liquid that's slightly thinner than blood. You wipe the fluid away from your stomach and take a look at the wound. You're not too\n    surprised to find that the wound's already healed.\n \n    Eleanor slowly walks towards you and pulls you in an impulsive embrace. You hug her back. There are a few things you'd like to ask her.\n    *goto questions\n   #Tell her who I really am and hope she believes me\n    Well it seems there's no other choice.\n\n    \"It's- it's Johnny.\".\n\n    There's a long pause. You then hear Eleanor's voice again.\n\n    \"You must think I'm stupid or something. Now get out of here or I swear to god I'll put you down.\"\n\n    \"Eleanor I swear it's-\" You're suddenly interrupted by the door opening and Eleanor jumping out at you and jamming a knife in your gut. You feel a slight bit of pressure as the blade sticks into you but nothing more. You're\n    more surprised to see that Eleanor looks very different than you remember. The excessive eyeshadow and black lipstick may be there but her hair, normally wild and tangled to the point where one might imagine bats nesting in it,\n    is now tied back in a messy ponytail. Not to mention her clothes which aren't even her own, they're actually yours, a pair of black leather pants and a shirt with a skeleton in a cowboy hat holding two revolvers. The boots \n    she's wearing are her own though.\n\n    As she realizes who you are she screams and falls back.\n\n    \"Calm down, I'm not going to hurt you.\", you tell her.\n\n    \"What the fuck? J-Johnny? How the hell are you... alive?\"\n\n    \"I came back just like everyone else but I drank some holy water. I think that's the reason I look and act like a human still.\"\n\n    You pull the knife out of your stomach and take a look at the blade. It's covered in a silvery-chrome liquid that's slightly thinner than blood. You wipe the fluid away from your stomach and take a look at the wound. You're not too\n    surprised to find that the wound's already healed.\n\n    Eleanor slowly walks towards you and pulls you in an impulsive embrace. You hug her back. There are a few things you'd like to ask her.\n    *goto questions\n\n\n\n*label ready\n*set knowsGeorge true\n\nEleanor turns to you. \"It's settled. George will be waiting for us.\"\n\n\"Great, let's get out of here before things get any worse. Before we do, let me grab a knife as well, we might need it.\"\n\nYou move to the drawer with the knifes and pick out the largest and sharpest-looking one. You then turn to Eleanor.\n\n\"Alright, I'm all set.\"\n\n*if barefoot\n \"You're... not going to wear boots?\"\n\n \"Oh no, it's more comfortable for me like this. I can't feel the ground with shoes on so.\"\n\n \"What if you step on something sharp though?\"\n\n *if stab\n  \"What if? It's not like I can feel any pain and you've seen how quickly I heal.\"\n\n  *goto fair\n \"What if? It's not like I can feel any pain and it would probably heal pretty quickly anyways.\"\n\n *label fair\n *set RelEleanor -5\n \"Ah... well... fair enough I guess. Let's go.\"\n *goto outside\n*else\n \"Let's go.\"\n *goto outside\n\n\n*label outside\n*page_break\nYou and Eleanor both step outside the building and onto the pavement. Screams and gunfire can be heard in the distance. You turn and ask Eleanor \"So how do we get to your uncle's place?\".\n\n\"I was thinking on foot, since I can't drive a vehicle, but now that you're here we might be able to drive there on a bike. You remember the way right?\"\n\n\"I do but I'm not sure if I can remember how to drive. Besides, even if I could, I don't know how to hotwire a bike.\"\n\n\"So we're going on foot then.\"\n\n\"Yeah. So... how long do you think it will take us to get there? Couple of days?\"\n\n\"Most likely.\"\n\n\"No time to waste then.\"\n\nYou both start briskly walking towards the city limits, stopping for a bit every couple of hours so Eleanor can rest. You manage to avoid confrontation with looters and zombies, thankfully. Eventually night falls and you start searching\nfor a good place to sleep.\n*page_break\nYou find a likely looking place behind an abandoned store. You're not sure what the empty lot was once used for, it definitely wasn't a parking lot as the only way in here was through a narrow alley, too narrow for a car to sqeeze\nthrough. But now that narrow alleyway is a blessing, as it was easy enough to block it with a dumpster and therfore secure the only way in here. You and Eleanor sit down beside each other, as Eleanor takes a few deep breaths. The lot is\nmostly dirt and there's even a small tree at one corner.\n\nYou suddenly become aware of a deep hunger inside you. You haven't eaten since you woke up and while the holy water might have made it so that you're not consumed by perpetual hunger like the other undead, it seems you still need to eat.\nThankfully you don't view Eleanor as a potential meal.\n\n\"Hey Eleanor, do you have any food on you? I could really do with a bite to eat right now.\"\n\n\"You and me both Johnny. I got crackers, a can of vegetable soup, chocolate and a couple bags of chips. The only non-perishable items that I had home.\"\n\n\"Pass me the chips.\"\n\n\"Here you go.\"\n\nYou open up the bag, grab a handful of chips and stuff them in your mouth...\n*page_break\n...only to immediately spit them back out again. Or rather, spit out mud and sand. Eleanor rushes over to you. \"What the hell? You alright Johnny? What happened?\"\n\n\"I'm- I'm fine. I got a pretty good idea of what happened though. I'm undead. I must eat meat. It's the only thing I can eat.\"\n\nEleanor backs away from you slightly. \"What do you mean by meat? You're not talking about human meat right?\"\n\nShe seems scared of you. What do you say to her?\n\n*fake_choice\n #I'd never ever hurt you\n  \"You're not... afraid of me are you? You shouldn't be. Not even for a second. I'd never hurt you, you know how much I love you. That hasn't changed.\"\n\n  \"I know. Look just... you know what, forget it. We'll find some kind of meat for you to eat yeah?\"\n #No, definitely not human meat\n  \"No, of course not. I would never view another human being as food. I may be undead but that doesn't mean I'd ever do something like that.\"\n\n  \"Right, okay. Look we'll find some kind of meat for you yeah?\n\n\"No. I'll find it myself. I cannot put you in danger for that. You stay here where it's relatively safe. I'll go to the nearest supermarket and hope there's a steak left or something.\"\n\n\"Be careful.\"\n*page_break\nYou're on your way to the nearest supermarket when you find a roadblock. It's a couple of pickup trucks and a jeep blocking the road. Around the roadblock are corpses, both undead and human. You notice the human corpses sport far more\ninjuries than the zombie ones. Coincidence? Or were they intentionally mutilated so severely to prevent reanimation? Surely a shot to the head would have done the job just as well. But it doesn't matter, right now the roadblock is the problem. It seems to be manned\nby a couple of middle aged men, a woman and a young guy. They all hold weapons, shotguns or rifles, you can't tell from this distance. You decide that going through the roadblock is a bad idea. They're all liable to shoot you and even if\nthey don't, you have nothing to pay them with to entice them to leave you alone. Instead you decide to go into one of the apartment buildings, get up to the roof and climb over the half-wall seperating one rooftop from the other, until\nyou bypass the roadblock completely. You get inside the building and climb up to the top.\n*page_break\nAs you're entering the rooftop you hear a metallic \"CLANG!\" and feel a slight bit of pressure around your left calf. You look down and notice that your left leg has been caught in a bear trap. You bend down, pry the trap open and\nrelease your leg from the iron grip.\n*if stab != true\n You notice your blood has a silvery-chrome colour now.\n*temp asks2 0\nAs you get back up you are greeted by a revolver pointed right at your face. Some guy, probably in his early twenties, with bad acne and short hair is \npointing the gun at you. As soon as he notices your more... unnatural features he backs away slightly. \"What the fuck are you- what are you doing here?\", he asks in a shaky, nasally voice.\n*choice\n #Tell him the truth and hope he doesn't fire\n  \"Relax. I just came up here to get around the roadblock that's all.\"\n\n  \"Yeah I bet. What's up with your eyes? Side effects of the drugs, huh?\"\n\n  What drugs is he talking about?\n  *choice\n   #Just go along with it\n    *label bluff\n    \"Oh, yeah. I um, I am on drugs right now. What you're seeing isn't the most commonly documented side effect but it is a side effect none the less.\"\n\n    \"What are you on exactly?\"\n\n    Well this is getting harder and harder. Now what do you say?\n    *choice\n     #Say a random drug name and hope he doesn't know what it actually does.\n      \"I'm on... PCP.\"\n\n      \"How- bullshit! You wouldn't be this calm if you really were on PCP. Nor does it turn your eyes white. Now, I'm giving you one last chance, tell the truth or I'll blow your brains out.\"\n\n      Great. Now what?\n      *choice\n       #He wants the truth? Well I'll give him the truth\n        *goto truth\n       #Double down on the bluff and insist it's PCP\n        \"It's a new type of PCP that was released in the market just recently, I'm not surprised that you don't know about it.\n\n        \"Wrong answer freak.\"\n\n        *goto tackle\n       #Tackle him to the ground\n        *goto tackle\n     #Say a fake drug name and hope he doesn't realize I'm bluffing.\n      \"I'm on... psyliocaine.\"\n\n      \"The fuck is that? I never heard of it before. You better not be bullshiting me pal.\"\n\n      \"I'm not. The drug is still pretty new though, I'm not surprised you haven't heard of it.\"\n\n      \"I see. Very well, I'll- I'll believe you, for now. Not like I got much choice I suppose. So, why did you want to get around the roadblock anyway?\"\n\n      \"I'm trying to go to the supermarket to try and find some supplies.\"\n\n      \"Well it's probably already been looted thoroughly you know. But whatever, I guess it's my turn to answer questions now right?\"\n      *goto questions2\n   #Ask him what he means\n    \"Wha, what drugs are you talking about?\"\n\n    \"Oh don't play dumb with me junkie. You stepped in a bear trap and showed no reaction, obviously you're on something. Or perhaps you think I'm some kind of idiot?\"\n\n    Oh right... your inability to feel pain made him think you're on drugs. And he just assumed that your other features were side effects. So now what?\n    *choice\n     #Try to tell him the truth\n      *label truth\n      \"Alright. I'll give you the truth, the whole truth and nothing but the truth.\"\n\n      \"I'm listening.\"\n\n      \"I'm... not alive in the traditional sense. When I woke up this morning I was just like every other zombie you've seen. But I ended up drinking a bottle of holy water. And it turned me into this.\"\n\n      \"Uh... wow. That's insane. Well I- I believe you, for now. Not like I got much choice. So, why did you want to get around the roadblock anyway?\"\n\n      \"I'm trying to go to the supermarket to try and find some supplies.\"\n\n      \"Well it's probably already been looted thoroughly you know. But whatever, I guess it's my turn to answer questions now right?\"\n      *label questions2\n      *hide_reuse\n      *choice\n       #\"What are you doing up here?\"\n        \"Camping out. I figured a rooftop was the safest bet since almost no one comes up here. And the few people that do, well, that's what the bear trap is for.\"\n\n        You take a look around. Sure enough, there is a bedroll and a backpack here. So he's not lying about this.\n        *set asks2 +1\n        *goto questions2\n       #\"You completely alone?\"\n        *set knowsaboutkid true\n        \"Well my parents aren't around anymore. I found them this morning. They're both dead now.\"\n\n        \"Oh, I'm sorry.\"\n\n        He looks at you straight in the eyes as he says this next sentence.\n\n        \"Don't be. I killed them both myself and before you judge me let me tell you this. Dad was a stinking good-for-nothing lowlife that took his filthy anger out on me and mom was a pathetic coward that just sat by and watched.\n        They both deserved worse than getting shot to death. You know I wanted something like this to happen for a long time. Dad wasn't the only person to treat me like shit. Pretty much everyone did. \n        We'll see who's laughing now that there are no laws to protect anyone.\"\n\n        Huh. You try your best to not show any strong reaction to what he just told you.\n        *set asks2 +1\n        *goto questions2\n       #\"Where did you get the gun and bear trap?\"\n        \"I got the gun from a fallen survivor, alongside all his ammo. The bear trap I found in a broken in hunting store. Guess no one had thought of taking it. Probably because it's big and heavy and those idiots out there cannot\n        think long term.\"\n        *set asks2 +1\n        *goto questions2\n       *selectable_if (asks2 = 3) #No questions\n        You tell the guy that you have no more time to talk and that you should really get going to the supermarket now. As you turn to leave you hear his voice again.\n\n        \"Hold up a moment. I got another thing I want to ask you. This is really important. Do you think we deserved this? As a species I mean.\"\n\n        That's an odd question. You're not too sure how to answer to that. Seems like a delicate matter though so you should choose your words carefully.\n        *choice\n         #\"Are you a madman?\"\n          \"No. But I have my eyes open. I see how fucked up things are, something that human-loving garbage like you would never understand! You'd willingly gouge your own eyes out if it meant not seeing how disgusting our kind is!\n          Vile bastard! I'll put your worthless ass down here and now!\"\n\n          He raises his revolver at you and get's ready to fire. You quickly grab the gun by the barrel and wrench it away from you. The guy pulls the trigger and the gun goes off, sending a bullet flying into the building across the\n          street. You punch him in the face with your free hand and he releases his grip on the revolver, which you immediately use to pistol whip him in the temple. The man falls back and you point the gun at him.\n          Now all that's left is to decide what to do with him.\n          *goto decidekid\n         #\"Yes, I believe this is some form of attonement for mankind's sins.\"\n          *set good +5\n          \"Yeah... good answer. You can go on your way now.\"\n\n          What the hell was that all about? Eh, it's irrelevant. And so is whether or not you meant what you told him. You've avoided violence and that's what matters.\n          You hop over the half wall seperating this rooftop from the next and do the same thing again and again, jumping over the walls until you're finally confident that you've bypassed the roadblock. You then go down to street level\n          once more and continue walking towards the supermarket which is actually quite close now.\n          *goto supermarket\n     #Go along with his drug theory\n      *goto bluff\n #Tell him to stop waving that gun in your face\n  \"You point a gun to everyone you meet? Get this thing out of my face.\"\n\n  \"Or you'll do what? You goddamn freak.\"\n\n  \"Listen here pal, I'm giving you a choice. Either put away the gun or I'll stick it up your ass and fire.\"\n\n  \"Hah, yeah sure you will. Say goodbye freak.\"\n\n  *goto tackle\n #Tackle him to the ground\n  *label tackle\n  You suddenly charge forward and low, managing to grab the man by the waist and pull him down. You grab hold of the arm that's holding the weapon and start slamming it into the floor repeatedly. Eventually he releases his grip on\n  the weapon, which you prompty pick up and point at him. The man raises his hands above his head and screams \"Hold it man! I'm-I'm sorry! Please don't shoot!\".\n\n  Well then, it seems it's your turn to interogate this little shit.\n  *label interogation\n  *hide_reuse\n  *choice\n   #\"What are you doing up here?\"\n    \"I was just camping out, I swear! I figured that no one would come up to the roof and even if someone did, I had the bear trap ready.\"\n\n    You take a look around. Sure enough, there is a bedroll and a backpack here. So he's not lying about this.\n    *set asks2 +1\n    *goto interogation\n   #\"You alone up here?\"\n    *set asks2 +1\n    \"I had no friends before all this and the only family was my parents. They're- they're both dead now. I don't know what happened to them exactly, our whole house had caught on fire and as I tried to get out I saw my mom and dad shot\n    to death out on the street. That's the\n    truth I swear!\"\n\n    That's odd. If their entire house was on fire you should have been able to see the smoke. Unless of course he lived somewhere farther away but if that's the case then why did he walk all the way over here? It's not as if this part of the\n    city is any safer. Something's not right with his story. Do you want to press him?\n    *choice\n     #Yes\n      *set knowsaboutkid true\n      \"Tell the truth! Where are they now?\"\n\n      \"Please don't hurt me! They're both dead okay?! I killed them myself is that what you wanted to hear?! They were both horrible people that treated me like trash... and so did everyone else for that matter...\"\n\n      You take in this new information and try not to show any kind of strong reaction to it. Then you focus\n      your attention on him again.\n      *goto interogation\n     #No\n      Very well. What else did you want to ask him?\n      *goto interogation\n   #\"Where did you get the gun and bear trap?\"\n    *set asks2 +1\n    \"I got the gun from a dead survivor, alongside his ammo. And the bear trap I got from a hunting store that was broken in and looted. The trap was just left there, I don't know why.\"\n    *goto interogation\n   *selectable_if (asks2 = 3) #No more questions\n    Well then, you've asked him everything you wanted to know. Now the only question left is this: What are you gonna do with this guy?\n    *label decidekid\n    *choice\n     #Just take the gun and ammo and let him keep his other supplies\n      *set gun true\n      You strip search the man and find a couple boxes of ammo for the revolver on him. You then order him to dump out the contents of his backpack, which he does without protest. There are no weapons or ammo inside the backpack however\n      so you leave those supplies be. You tell him to lie face down with his hands behind his head and look away from you. After that you leave, hopping over the half walls seperating the rooftops until you're confident that you've\n      bypassed the roadblock.\n      *goto supermarket\n     #Take everything useful around his little campsite and leave this guy here\n      *set supplieskid true\n      *set gun true\n      You strip search the guy and find a couple boxes of ammo for the revolver on him. You then grab the bedroll and tie it on the top of the backpack which you then sling over your shoulder. The bedroll is too small for two people but\n      it's better than nothing. You tell him to lie face down with his \n      hands behind his head and look away from you. After that you leave, hopping over the half walls seperating the rooftops until you're confident that you've bypassed the roadblock. You then take off the backpack and take a look\n      inside. There's a lighter, some papers, a few instant noodles and an old cell phone, one of those flip phones.\n      \n      So still no food for you. Well, off to the supermarket you go. It's not too far now.\n      *goto supermarket\n     #Shoot him dead, then loot the place\n      *set good -30\n      *set gun true\n      *set supplieskid true\n      You aim the gun at his head and pull the trigger. The gun fires, sending a bullet straight through the man's skull and blowing blood and brain all over the place. You then search the corpse and find a couple of boxes of ammo\n      on him. Taking a look inside his backpack you find a lighter, some blank papers, a few instant noodles and an old cell phone, one of those flip phones. So still no food for you. You sling the backpack over your shoulder and tie the\n      bedroll on top of it as well. It's way too small for two people but still, better than nothing. Once more, cannibalistic thoughts begin to bubble up in your mind. You do your best to block them out. You leave, hopping over the half\n      walls seperating the rooftops until you're confident that you've bypassed the roadblock.\n      *goto supermarket\n\n*label supermarket\n*page_break\nFinally the supermarket comes into view. You see zombies and mutilated corpses inside. The lights are still on. You carefully enter the supermarket and take a look around. You can't see the butcher shop from where you are right now. You\ncan hear a general hullabaloo coming from deeper into the supermarket. Sounds like... vomiting and eating? You can't quite understand. All of the aisles are empty, someone's looted the entire place.\n\n\n*set wenttomarket true\n*temp haseaten\n*set haseaten false\n*temp checkedout false\n\nMoving a little further into the supermarket you notice the stairs to the upper floors have been blocked off with piles and piles of trash, although you think you could climb over it to get to the second floor. Taking a look at the\nelevator, you find it has been disabled.\n*choice\n #Move towards the sounds\n  *label sounds\n  You make your way towards the sounds coming from deeper inside. Eventually you find yourself the butcher shop. Zombies have swarmed the place, broken the thick glass protecting the meat and some of them are feasting on it. Others are\n  splayed out on the floor, vomiting. Evidently they ate too much. So it seems even normal undead can overeat. You unconsciously wonder if they're still hungry or if they actually feel sated after gorging themselves on so much food.\n  Regardless of all that though, there's the more important matter of whether there's any food left for you. You make your way through the crowd and look around. At first you don't see anything that's not already being eaten. After a\n  more careful look however you notice two pork chops left on the floor just beside the door leading behind the counter.\n\n  You forget about going through the door and giving the other zombies a way behind there and instead climb over the counter and broken in display and grab the pork chops off the floor. They look pretty bad, a day more at most and\n  they'll rot for sure. Good thing you found them now. You're fairly certain that you can eat them though,\n  your undead body won't suffer any negative effects by eating raw or dirty meat. I'd probably be more practical too, though you could use that small tree to start a fire back at the empty lot, the smoke is definitely going to \n  give away your position.\n  *choice\n   #I'll take them back and try to cook them\n    *set hassteak true\n    You grab the pork chops and stuff them in your trenchcoat. You then exit out from behind the counter and move closer to the exit.\n    *if (checkedout = false)\n     You take one last look at the stairs. Do you want to check out the second floor still?\n     *choice\n      #Sure\n       *goto secondfloor\n      #No, I'll head back now\n       *goto headback\n    *else\n     *goto headback\n   #I'll eat them raw, right now\n    *set civilized -25\n    *set eatsraw true\n    *set haseaten true\n    You dig into the pork chops here and now. They taste much better than you would have expected a raw pork chop that you found on the floor to taste like. Side effects of being undead you guess. Once you're done with your food you exit\n    out from behind the counter and move closer to the exit of the supermarket.\n    *if (checkedout = false)\n     You take one last look at the stairs. Do you want to check out the second floor still?\n     *choice\n      #Sure\n       *goto secondfloor\n      #No, I'll head back now\n       *label headback\n       You exit the supermarket and start making your way back. Eventually you get back up onto the rooftops, make your way past the roadblock and find your way to Eleanor again.\n       *goto backtoEleanor\n    *else\n     *goto headback\n #Climb over the barricade and go to the second floor\n  *label secondfloor\n  *set checkedout true\n  You move over to the stairway and take a close look at the barricade. It seems to have been set up in such a way that someone could climb over it if they could balance on certain pieces of junk that protrude out from the main pile. So\n  you carefully start climbing up the trash pile, stepping from plank to sheet metal until you finally make your way over it.\n\n  *if barefoot\n   You begin making your way up the stairs, slowly and quietly, until you finally arrive on the second floor. You creep inside and silently close the door behind you. You find the aisles fully stocked and even a large pile of resources\n   piled up against the farthest wall. To your right are two survivors playing texas hold em poker, with two crossbows laid down beside them. They're paying full attention to their game so they haven't seen you yet. There may be more \n   survivors around but you cannot see them right now.\n   *choice\n    #Speak up\n     \"Hello?\"\n\n     The two survivors playing poker turn to you and quickly grab their crossbows.\n\n     \"What the fu- Guys! We got somebody up here!\"\n\n     Two more survivors come out from between the aisles. One of them carries a metal pipe and the other one a large knife, a bowie knife. They are quickly joined by a third survivor who aims a revolver at you.\n     He's dressed up to the nines, with a black vest and pants and a white pinstripe shirt. No jacket though. \n     His revolver is equally fancy, with a black frame, pearl grip and gold engravings. It's one of those top-break revolvers. You swear you've seen the same kind of a revolver before in a musuem though you can't remember what it was \n     called.\n\n     The man with the revolver approaches you and so do the other survivors. He comes closer until he's just out of arms reach.\n     *goto talkwithDutch\n    #Sneak back to the ground floor\n     You step back, turn around and quietly make your way back down the stairs, climb over the trash barricade and get back down on the ground floor.\n     *if haseaten or hassteak\n      *goto headback\n     *else\n      *goto sounds\n    #See if I can snatch anything from the aisles\n     You take a look at the closest aisle. It's mostly meatless cans of food, lined up in a haphazard fashion. Just your luck. However once you take a closer look you notice a can of corned beef just behind a can of beans. You gently \n     and quitely take the can from the aisle and then step back into the staircase. You continue going down, climb over the trash barricade and find yourself back to the ground floor.\n     *if hassteak\n      Well now you got some food you can eat without a problem. Thing is, what are you going to do with the pork chops? You really ought to either eat them right now or throw them away, they're gonna spoil otherwise and you really don't\n      want to be carrying around rotten meat, or eating it of course.\n      *choice\n       #I'll cook the pork chops back at camp and save the can for later.\n        *set hasbeef true\n        You store the can on your person and move towards the exit doors.\n        *goto headback\n       #I'll eat the canned beef now and toss the pork chops.\n        *set hassteak false\n        *set haseaten true\n        You take out the pork chops and toss them aside. They land just beside a pile of baskets. You then use your knife to crack open the can and start emptying it's contents into your mouth. The corned beef tastes much like you\n        remember it tasting like. It's good to finally find something from your old life that hasn't changed yet. Finally you finish eating and toss the, now empty, can aside.\n        *goto headback\n     *elseif haseaten\n      *set hasbeef true\n      Well now you've got even more food you could eat. Better yet, you can eat this in front of Eleanor (or anyone else for that matter) without worry, as it's ready to eat.\n      *goto headback\n     *else\n      *set haseaten true\n      Well now you got some food that you can eat without a problem. You use your knife to crack open the can and start emptying it's contents into your mouth. The corned beef tastes much like you\n      remember it tasting like. It's good to finally find something from your old life that hasn't changed yet. Finally you finish eating and toss the can aside. You've got no reason to stay here anymore so you decide to head back.\n      *goto headback\n    *selectable_if (gun) #Draw my revolver and start shooting\n     *set good -40\n     You silently pull your revolver out from the inside of your trenchcoat, take aim and pull the trigger. You hit the man on the right side of the poker table dead in the head. By the time the other man has realized what's going on you\n     have already adjusted your aim accordingly. You pull the trigger again, killing him instantly. Suddenly you hear and see movement from your left side. You turn just in time to see a man holding a bowie knife charging at you. You\n     back away as you pump him full of lead. Unfortunately that left you completely out of cover. You just barely have time to realize that another survivor has emerged from the farthest aisle and is pointing his own revolver at you.\n\n     He pulls the trigger and sends a bullet straight through your skull. Everything goes dark once more.\n     *ending\n  *else\n   You begin making your way up the stairs, your combat boots echoing throughout the staircase, until you finally arrive on the second floor. You find the aisles up here are fully stocked. Before you can better appreciate your\n   surroundings you hear the staircase door behind you shut and someone mutter \"Stick em up cowboy.\" accompanied by the cocking of a revolver.\n\n   \"Not again\" you think to yourself as you raise your hands up above your head. You notice a few other survivors coming out from between the aisles on your right. One of them is armed with a metal pipe, the other two with\n   crossbows and the forth one has a large knife, a bowie knife. That alongside the guy with the revolver behind you makes for five people in here.\n\n   The guy behind you slowly steps around and stands in front of you. He's dressed up to the nines, with a black vest and pants and a white pinstripe shirt. No jacket though. \n   His revolver is equally fancy, with a black frame, pearl grip and gold engravings. It's one of those top-break revolvers. You swear you've seen the same kind of a revolver before in a musuem though you can't remember what it was \n   called.\n   *label talkwithDutch\n   He begins speaking, slowly. His teeth are slightly crooked and \n   yellowed. \"Now then... huh? What's with the white eyes? You okay fella, can you see me?\". The guy waves his free hand in front of your eyes slightly, expecting a response. How do you respond?\n   *choice\n    #\"Not really, it's all far too blurry.\" I could gain an advantage if they think I'm (partially) blind\n      \"That so? And just what exactly were you thinking of doing when you climbed over our barricade?\n\n      \"I was only looking for supplies.\"\n\n      \"Supplies for whom? How many people are there in your group?\"\n      *fake_choice\n       #\"I'm by myself\"\n        \"Hmm... and you've manage to survive all on your own despite being nearly blind?\"\n\n        \"What can I say? I got good instincts.\"\n\n        \"Right... stay right where you are. We have to talk this thing over as a group.\"\n\n        Revolver guy then joins the other survivors and they begin talking in what they think is a quiet voice. You manage to hear several things including:\n\n        -[b]\"Good instincts my ass. There's no way this guy is telling the truth.\"[/b]\n\n        -[b]\"How did he even make it up here without stumbling all over the barricade?\"[/b]\n\n        -[b]\"Yeah, there's no way he's blind. Maybe he's some kind of demon? What, we didn't believe in zombies until yesterday!\"[/b]\n\n        -[b]\"Like a vampire or a werewolf or something? Come on...\"[/b]\n\n       #\"Just me and a friend of mine\"\n        \"And is this friend of yours... disabled, so to speak, like you are?\n\n        \"Worse. He's got a heart condition so he cannot do any kind of tiring activity. That's why I'm out here and he is back home.\"\n\n        \"Right... stay right where you are. We have to talk this thing over as a group.\"\n\n        Revolver guy then joins the other survivors and they begin talking in what they think is a quiet voice. You manage to hear several things including:\n\n        -[b]\"An almost blind man and a guy with a heart condition. Somehow still alive?\"[/b]\n\n        -[b]\"How did he even make it up here without stumbling all over the barricade if he can't see?\"[/b]\n\n        -[b]\"Yeah, there's no way he's blind. And I bet his 'friend' is just fine as well.\"[/b]\n\n        -[b]\"So what is wrong with him then?\"[/b]\n\n        -[b]\"Maybe he's some kind of demon? What, we didn't believe in zombies until yesterday!\"[/b]\n\n        -[b]\"Like a vampire or a werewolf or something? Come on...\"[/b]\n\n       #\"Six people, including me\"\n        \"And where are they now?\"\n\n        \"They're back home. We were getting ready to leave the city so we needed to gather supplies. That's why I'm here.\"\n\n        \"Right... stay right where you are. We have to talk this thing over as a group.\"\n\n        Revolver guy then joins the other survivors and they begin talking in what they think is a quiet voice. You manage to hear several things including:\n\n        -[b]\"Out of six people they chose the blind man for a supply run?\"[/b]\n\n        -[b]\"How did he even make it up here without stumbling all over the barricade?\"[/b]\n\n        -[b]\"He can't be blind. Maybe he's some kind of demon? What, we didn't believe in zombies until yesterday!\"[/b]\n\n        -[b]\"Like a vampire or a werewolf or something? Come on...\"[/b]\n\n      Revolver guy speaks again.\n\n      \"Gentlemen, this speculation is getting us off track. Let's focus on what we know. What we do know is that whatever he is and whatever his background, he is not trustworthy. If he was willing to lie to us then he most likely\n      views us as enemies, folk to be robbed or ripped off. Letting him go may be the most humane thing to do but it is also the riskiest. We need to decide if we should take such a risk here.\"\n\n      They begin talking in much quieter tones now, you can't make out what they're saying. Either way your situation here doesn't seem to be all that favorable. Perhaps you should leave. You are right beside the stairs after all, albeit\n      with the door closed.\n      *choice\n       #I'd rather wait it out a bit longer.\n        You stay put, waiting to hear the group's decision. Eventually they stop talking and the leader of the group approaches you again.\n        *if (civilized = 100)\n         *set good +10\n         \"We've made our decision, friend. You will leave this place right now and you will tell no one about us. If you come back here or if you tell anyone else about us... we will have to take more drastic measures. Am I making\n         myself clear?\n\n         \"Crystal clear.\", you respond.\n\n         \"On your way then.\".\n\n         You nod and walk back down to the ground floor.\n         *if ((haseaten) or (hassteak))\n          *goto headback\n         *else\n          *goto sounds\n        *else\n         \"We've made our decision, friend. The fact of the matter is... we simply cannot trust that you will not try to come back with others and try to take this place over.\n\n         He levels his revolver at you.\n         *page_break\n         You push the revolver aside and respond with a fast and hard punch to his throat. He drops the gun and starts backing away, choking. The crossbow men both level their weapons at you. A bolt slams into you as you turn and open\n         the door to the stairs. It must have missed your heart however. You throw yourself into the staircase, run like hell downstairs and leap over the barricade. You can hear the survivors chasing after you. You grab the crossbow\n         bolt and quickly rip it out of your body. The wound will heal.\n         *goto stairstandoff\n       #Screw it. I'm bolting for downstairs.\n        You slowly and quietly turn around. No one notices. You grip the door handle, take a deep breath, fling open the door and run like hell down the stairs. The survivors start cursing and yelling as soon as they realize you've\n        escaped. You can hear them follow you as you leap over the trash barricade. You take one look behind you and find yourself looking at the leader of the group aiming his revolver at you. You leap to the side right as he pulls the\n        trigger, narrowly avoiding getting shot.\n\n        *label stairstandoff\n        *choice\n         #Run like hell\n          *label runlikehell\n          You start running without looking back, get out of the supermarket and into the closest apartment building. You run all the way up to the rooftop and take a look at the street. No one gets out of the supermarket. You try to\n          calm yourself and begin making your way back to Eleanor.\n          *goto backtoEleanor\n         *selectable_if (gun) #Fight back with my own revolver\n          *set good -5\n          You draw your revolver and take cover just beside the stairs. As soon as you start hearing the survivors moving up to your position you peek out of cover and fire. Your bullet strikes the man with the bowie knife in the \n          shoulderblade. He falls backwards, screaming and moaning. The other survivors start yelling. You make out the phrase \"Shit he has a gun! Back up!\".\n\n          *choice\n           #Keep fighting until either they or I lie dead\n            *set good -10\n            *set suppliesmarket true\n            You continue exchanging fire with the three survivors that actually have ranged weapons. You can only assume that the guy with the metal pipe has retreated to the second floor. Eventually you manage to kill the two crossbow\n            men and fatally wound the guy with the fancy revolver.\n\n            You carefully make your way upstairs again, kick the door to the second floor open and burst inside, ready to fight. The man with the metal pipe is nowhere to be seen though. You decide to leave it be for now and instead\n            focus on looting the place as much as you can. You grab as many cans of food and bottles of water as you can. Looting the bodies yields no valuable things however. You briefly consider taking their weapons but decide against\n            it. The crossbows are far too big to carry around comfortably and you already have a revolver.\n            *if ((haseaten = false) and (hassteak = false))\n             *set haseaten true\n             You forget about the corpses and decide to eat. You crack open one can of beef with your knife and empty its contents into your mouth. The beef tastes pretty much the way you remember it tasting. It's nice to find\n             something from your old life that still hasn't changed. Eventually you finish your food and go back downstairs.\n             *goto headback\n            *elseif ((haseaten = false) and (hassteak = true))\n             *set haseaten true\n             *set hassteak false\n             You forget about the corpses and decide to eat. You decide to toss away the pork chops, there are more cans of meat here than you can carry back, and instead crack open one can of beef with your knife and empty its contents\n             into your mouth. The beef tastes pretty much the way you remember it tasting. It's nice to find something from your old life that still hasn't changed. Eventually you finish your food and go back downstairs.\n
