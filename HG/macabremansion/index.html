• Solve puzzles, avoid traps, and escape your undead captors.\n • Encounter the tormented souls that haunt every corridor.\n • Discover the secrets that hide behind the house’s walls.\n • Survive the night and change the fate of the mansion.\n\n*label purchased", "crossroads": "*page_break\nYou wait a moment in silence, testing to see if the demonic woman is coming back to further torture you. Another moment. She's gone. Now is your chance. \nIf you wish to escape, you have to do it now.\n*Choice\n #Find a way out\n  You begin to struggle against your restraints to no avail. \n  You then begin to rock yourself back and forth, \n  building momentum until eventually you fall over to your left side. \n  The left chair arm snaps from the force and your arm is freed. \n  You use your free arm to loosen the restraints on your other arm, then eventually you free your legs. \n  You stand up quickly and examine your options. There’s only one. \n  A pair of doors on the far side of the theatre parallel to the center of the stage. \n  You run towards the doors, \n  hoping whatever is on the other side is safer than whatever is about to happen here.\n  *Goto statuehall\n #Stay where you are\n  You sit in your chair, the silence of the theatre seeping into your thoughts. You see on the other side of the theatre a set of doors directly in front of you. You think about what horrors could be behind those doors and begin to quiver. Let whatever is about to happen just happen already.\n  *Page_break\n  That’s when the lights shut off again and suddenly come back on, a figure wearing a tattered tuxedo and a strange metal helmet that  is suddenly standing in front of you, \"Good evening\" A raspy voice says from behind the cage like mask. They take a step closer and you instinctively sit back, \"How is my lovely guest?\" The scarring voice says from underneath the mask. You stammer for a moment, unsure what to say, \"I understand,\" They say, slowly walking around you, \"It’s not everyday you are welcomed to a magnificent kingdom such as this.\" They creep around to the opposite of you, sending a shiver down your spine as they touch your shoulder, \"However, I encourage you to enjoy your stay. After all, you could be a permanent resident of our lovely abode.\" \n  An ominous feeling sends the hair on the back of your neck on end. You squirm, realizing how dangerous the situation actually is.\n  *page_break\n  The steel masked person notices your squirming and begins to walk directly toward you until they are standing only a few feet away, standing over your chair while staring at you from behind the iron helmet, \"Do you wish to leave?\" The raspy voice asks. You quake as you slowly nod your head. The figure nods, \"Then you may do so.\" They say turning away from you, \"Simply walk out the front door, and you’re free to go.\" They instruct you plainly. A moment of confusion slips in between your bouts of fear and mania as the metal masked person turns back to you, \"If you make it through the festivities we have planned for you, you no longer need to stay.\" That’s when the truth settles into your mind. The room that nearly crushed you was only one of these festivities they are talking about, and from the sound of it, there are many more to come.\n  *Page_break\n  As you come to the end of the realization, you hear the sound of something unlocking behind you. \n  You turn around and see a section of the stage has opened up only a few inches away from your chair. You turn back to the figure, who is now standing beside you with his hand on your shoulder, \"Best of luck, ${name}, and may whichever God you pray to be by your side.\" With that, they push you backward in the chair and you fall into the stage, hurdling into total darkness.\n  *goto_scene ironmaidenroom\n  *label statuehall\n  *page_break\n  Next Scene: Judgement Day\n  *page_break\n  You run out of the theater doors, \n  finding nothing but a dark hallway in front of you. \n  You take a moment to think about what you want to do next. \n  There's no way you can go back to where you came from, \n  so you test your luck and run further into the void. \n  You stumble around in the dark, leaning against the walls as you feel your way through nothingness. \n  Eerie, haunting noises follow you through the seemingly endless cavern. \n  The sound of the foundations settling, \n  the creeks and moans of wood and nails fill your mind with unpleasant thoughts.\n  *page_break\n  You go on like this for what feels like hours, a left here, take a right there, \n  you become so disarrayed, you are not even sure which way you came from. \n  All you know is you need to find a way out.\n  *page_break\n  That's when you see a light, a small flickering in the distance. \n  You push yourself away from the wall and run towards it.\n  it's the only glimmer of light you've seen since you left the \n  theater and at the moment is a shining  beacon in a sea of darkness. \n  You get closer and closer with every breath until final your reach the light.\n  *page_break \n  Then you are reminded of where you are, and the tread of hopelessness settles in again. \n  On the wall in front of you was a candle, \n  and on either side of the candle were two small sybols leading out towards to doors on opposite sides of you. \n  The one on the left was a bronze cross, \n  rusted from being pinned to the wall for so many years and the feint smell of blood coming from it.\n  *page_break\n  to the lieft was a hieroglyph of Anubis painted black,\n  sucking the air from your lungs whenver you went near it.\n  *page_break\n  An ominous aura flowed through these symbols as they did through every brick of this house,\n  every inch filled with malicious intent. Even so, you know you can't stay here.\n  You know they are not far behind.\n  *choice\n   #Go towards The Cross\n    You start your walk towards the left door depicted by the blood stained cross and reach for the doorknob, \n    hoping that whatever is behind this door is far less horrific than what might happen if you are caught again. \n    You have a feeling deep in your stomach, that it is much worse.\n    *goto angelstatueroom\n    *label angelstatueroom\n    *page_break\n    Next scene: As Above, so Below\n    *page_break\n    You enter into a candlelit room, grey stones line the wall in masonry fashion. You look to both sides to see tapestries of people being cut down and beheaded by a powerful stone angel. Ahead of you in the center of the room is a statue of an angel wielding a steel sword below it’s chest, the blade facing upwards and edges facing to either side. The angel has both hands on the hilt and is facing you, its stone gaze staring into your soul. You know there's only one way out of this room, and it’s past that statue.\n    *Choice \n     #run past the statue\n      You take off towards the statue, trusting your speed to get past whatever secret is hiding in this room.\n      *page_break\n      It’s not. In a matter of seconds you see a flash of light and suddenly feel a sharp pain in your stomach. You look down and see a cut clean into your abdomen, you intenstinces beginning to peak out as blood gushes from the wound. You fall to your knees in pain and shock, using the last bit of strength you have left to turn to the angel statue. You almost can’t believe it, despite the fresh wound causing your slow but imminent death. The sword the angel is wielding is covered in blood, your blood. You try to make sense of it all before darkness and cold slowly close in on you. As you fall over onto your back you look at the ceiling you see the words “The penitent man” before you fall into the last sleep you will ever experience.\n      *page_break\n      *goto retry1\n     #crawl past the statue\n      You get onto your hands and knees slowly, making sure not to have any sudden movements. You begin to crawl towards the statue, staying as low to the ground as you possibly can. As you get closer and chill crawls down your spine, something is going to happen very soon.\n      *page_break\n      Just as you are under the statue, the sound of gears turning can be heard from beneath you and the angel begins to spin rapidly, the blade in its hands suddenly facing outward from the statue, creating a vortex of steel and death only a few inches away from where you’re laying. You’re jolted by the sight of the blades incredible speed, the thought of a blade slicing you into pieces rushing through your brain. You harden your already tested nerves and continue to crawl, a saw-like rotation happening just above you. Just a little further, you tell yourself, just a little further. You crawl a few more feet to be absolutely sure, facing the floor so you don’t have the image of being struck down by the menacing archangel is not cemented into your mind. Another couple of crawls and you hear the sound of gears slowing, something stopping in place then locking into place. You turn around to see that the statue has stopped and is back in the position it was earlier, silent and unmoving. \n      You take a deep breath as you turn over and see a scripture on the ceiling surrounding a picture of someone kneeling before the angel. The scripture read “The penitent man kneels before the righteous.” You chuckle, not sure what to believe at the moment. What you know, on the other hand, is that you’re still alive. You stand up, dust yourself off, and walk out the door on the opposite side, grateful for surviving, but terrified of what can happen next.\n      *goto_scene galleryhallway\n     #look for clues in the room\n      You search the room for anything to get you past whatever dangerous secret is hidden in here. You search for clues on the walls only to see memento’s to those who have been taken by this terrible place. You search the floor and find strange circular markings around the statue as if something had been scraping the stone tiles beneath. Strange, sure, but nothing that will help you get out. That's when you look up in a final attempt to find the way out. (3)\n      *page_break\n      You find it. Above you on the ceiling was a painting of someone kneeling before an angel surrounded by light. The scripture circling the painting were aged but still legible,  “Only the penitent may pass and avoid the angels wrath.” you look back at the painting and noticed that the person in the painting wasn't just kneeling, but they were on their hands and knees, their face looking down as the angel stood over them. Penitent. Low. Maybe. You ponder to yourself, maybe the way out is to go under the angel. (3)\n      *page_break\n      At the very least, it's better than staying here. So you begin to get onto your hands and knees, hoping, wishing that you're not wrong. You start your crawl towards the statue and just as you're about to pass it you hear the sound of gears turning and soon the sound of something saw-like spinning just overhead. You look up just enough to see that the statue is spinning in place, the steel sword in its hands pointing outwards creating a circumference of death only a few feet away from where you're crawling. You pull your body lower in instinct and fear then begin to crawl faster, the blade above you increasing in revolutions as you grovel beneath. When you are out of the statues range, you hear the gears slow to a halt and the statue stop in place. You rise to your feet, gasping for air and relieved that this nightmare is over. You swallow hard as you reach for the door in front of you, unprepared and terrified at what nightmare might come next.\n      *goto_scene galleryhallway\n     #sneak past the statue\n      You slowly creep towards the statue, watching it carefully as you tiptoe towards it. You take every movement into consideration as you step one foot after the other. You’re nearly around it, closer than you thought you would get, when suddenly it spins with incredible speed. You guard your face in instinct, hoping to protect yourself from whatever horrors are in store. A moment passes and you put your arms back down, the statue is again in the place you remember it standing. \n      You chuckle slightly, thinking the worst is over, when you feel a sharp pain in your abdomen. That’s when you look down to see your stomach had been split open horizontally, the blade the angel is wielding now covered in blood, your blood. Shock sets in and you stand there, grabbing at the open wound attempting to stop the bleeding to no avail. Eventually your legs give from the pain setting in on your body and you fall to your knees. \n      Another quick spin of the statue and the last image you see is your head falling from your lifeless body, watching your corpse topple over.\n      *page_break\n      *goto retry1\n      *label retry1\n      Retry?\n      *choice\n       #Yes\n        *goto angelstatueroom\n       #No\n        *ending\n\n   #Go towards Anubis\n    You turn towards the door with the Anubis hieroglyph,\n    Taking a deep breath as you consider everything that could be behind this door.\n    It could be a fate worse than death. It could be your salvation.\n    One thing you know for certain is that if you stay here, they will find you.\n    *goto anubisstatueroom\n    *label anubisstatueroom\n    *page_break\n    Next scene: An Offering to Anubis\n    *page_break\n    You pass through the entryway with the picture of a pyramid above it and enter a small room, dark like the rest, except much different. There are torches on the left and right walls, illuminating several hieroglyphs that lines the entirety of the room. In the center of this small room stood a statue of a tall but lanky creature with the head of a dog and the body of a human with his palms facing upwards and his arms to his sides. This creature gives you an ominous feeling, it dark, almost pitch black color with the red, searing light from its glare is enough to spend shivers down your spine.\n    *page_Break\n    You reluctantly inch closer, against your better instinct which is causing every inch of your body to tense up. As soon as you’re in the room, a stone wall falls behind you, closing the entry way you came through and trapping you inside. You slam your hand against the wall in a half attempt to open the door. You know it’s not opening again. You turn back to the statue with the dog’s head and notice a table with a small scale in front of it. You slowly trot towards it, the smell of blood and flesh creeping into your nostrils with every step you take. That’s when you see where the smell is coming from.\n    *page_Break\n    You immediately wished you had not.\n    *page_Break\n    You look down at the contents of the table to see from left to right, a stomach, a heart, and a brain, all on golden plates sitting in front of the scale. You reel back in disgust and disbelief. What kind of game is this? You think to yourself as you look back to the scale and see something odd. The scale is unbalanced, and on the side that is weighed down you see a single golden feather. You look back to the organs on the table and take a deep breath as you think about what your next move is. One thing you know is certain. You have to get out of here.\n    *Choice\n     #Put the stomach on the scale\n      You reach down for the stomach, gagging as you reach your hands down for the rancid smelling digestive organ. You carefully pick it up, the blood and mucus draining from it slipping through your fingers,leaving a slimy solution on your hands as you gently place it on the empty side of the scale. The scale quickly drops from the weight along with your own as it begins to teeder up and down for what feels like a eternity. It begins to even out slowly, and you begin to breathe quickly, waiting for the moment of truth. Just as the scale was about to be completely balanced... The stomach weighs down. The scale is unbalanced, and a feeling of dread comes over your body. You look back up to the statue with the dog head which sounds like it’s growling and unearthly growl, it’s read eyes glowing brighter and brighter as the growling grows louder and louder. \n      That’s when you see gas seeping in from corners of the room. You try not to breathe in but it is too late. \n      The gas has reached your lungs and you feel your body begin to stiffen. You’re paralyzed where you stand. Soon you fall backwards unable to move, hitting your head on the stone floor. Even though you can’t move, the pain of the fall trembles all through your body. You feel blood begin to seep out the back of your skull as everything slowly begins to fade to black. This is where you die, alone, scared, and unable to scream.\n      *page_Break\n      *goto retry2\n     #Put the heart on the scale\n      You reach down to the table and in a moment of disbelief and disgust you grab the heart and quickly but carefully place it on the scale. It teeters for a moment, you own heart pounding so hard you can't hear yourself think. It rock gently for what felt and eternity until finally,\n      *Page_break\n      The scale is balanced. A moment of ominous since passes before the dog headed statue growled quietly, it's eyes glowing a bright red.you guard your body, feebly protecting yourself against an inevitable end. The bright light shining from the dogs eyes filled the room with blinding rays, then suddenly stopped. Your vision clears and you come to see that the table and the statue have both vanished from the room and on the opposite side from where you entered is a new doorway. You smile, knowing you have survived another room of terror.\n      *goto_scene galleryhallway\n    #Put the brain on the scale\n      You reluctantly reach down for the thinking organ on the table. You feel the slime protruding from the grey matter, making it difficult to keep a grip of. The organ sloshes in your hands, the thick goo seeping through your fingers. You slowly place the brain on the scale, almost slipping off the plate from the liquid covering the organ. The scale drops and rises on either side, fluctuating for what felt like an eternity.\n      *page_break\n      Until the scale stops, and the brain is lifted high above the feather. Your mind goes blank as the statue in front of you begins to growl, it's eyes glowing a bright red. You try to move but something is holding you in place, perhaps the fear and hesitation take you body. That’s when you see the gas seeping upwards from the floor. Your racing heart begins to slow down, but you know that you are still terrified, and it should be beating furiously. Your body becomes numb as your heart rate slows. Your heart begins to beat slower and slower with every second until eventually, it’s not beating at all. Everything begins to fade to black as your brain is starved of oxygen. You were once a great thinker, now you’re not thinking at all.\n      *page_break\n      *goto retry2\n      *label retry2\n      Retry?\n      *choice\n       #Yes\n        *goto anubisstatueroom\n       #No\n        *ending\n     #Explore the rest of the room\n      You turn away from the dog headed statue and begin exploring the pictures on the wall. You start on the left side of the room and closely examine every hieroglyph. Most seem meaningless, depictions of violence, people being beheaded, drowning in blood, lit on fire in boxes. They all seem pointless and horrifying, as if their sole purpose was to spread death and fear. You begin to skim over the pictures, trying not to let too many imagine infect your mind. That is until you see one picture that sticks out.\n      *page_break\n      It is you. A hieroglyph of you, from the clothes you are wearing to your hair color, down to the room you are standing in. You are holding a heart and offering it to a humanoid creature with a dogs' head. You take a moment to process what you are looking at, a sense of dread seeping into your thoughts. \n      You don not try to dwell on it too long. Your first priority is leaving this nightmare. \n      You turn to the statue standing in front of the table and take a deep breath.\n      *page_break\n      You know what comes next. You walk back to the table covered in internal organs. \n      You reach down for the blood covered heart. You wrap your fingers around the blood pumper, the hemoglobin secreting from the ventricles making it difficult to keep a sturdy grip on. You manage it nonetheless and place it on the scale opposite of the feather. It rocks slowly, flowing up and down in an almost rhythmic motion. You turn to the hieroglyph depicting you and hold your breath as the scale slowly comes to a stop. Completely balanced. The statue begins to growl as a bright light that fills the room fires from its eyes and just as quickly dissipates, the statute and table nowhere in sight, a new doorway in front of you. Another room passed, another nightmare awaits.\n      *goto_scene galleryhallway\n\n    \n", "death": "\nYou have died.\n\n*goto_scene ending", "deathgallery": "*page_break Next scene: A painting to die for\nYou take a moment to catch your breath, letting your heart rate slow and allowing the fear of what had just happened to pass. Once you calm down, you stand up then look around to see that you are in an art gallery... devoted to infamous mass murderers and increments of torture. On the walls are paintings of the Zodiac Killer, Adolf Hitler, Hernan Cortes, and many more responsible for unforgivable bloodshed.  In the far left corner is a miniature guillotine with a small wooden doll in it that’s about to be beheaded. On the other side was a metal statue of a confederate soldier holding a long rifle standing at attention. Near the entryway you came in was a large blood wooden pike with what you hope is a very realistic mannequin. The smell of rotting flesh tells you that it’s not. You look on the opposite side facing you are three paintings. From left to right the paintings show Vlad Dracula, Dr. Joseph-Ignace Guillotin, and Oliver Winchester, a plaque of their names above them. \nAbove the plaques showing the names was another plaque and engraved on that one is a riddle, \n\n*page_break\nIf the rules of death you wish to bend, stand near the maker of the quickest end.\n*page_break\n\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n Come back in a few minutes to play the next part of [i]Macabre Mansion[/i]!\n\n Or, you can buy the game now to skip the wait.\n\n *purchase_discount adfree 2020-08-06 $4.99 $2.99 purchased\n *delay_break 1200\n\n*label purchased\n\n*Choice\n #Stand in front of Dracula\n  You stand in front of Vlad the impaler. You wait for a moment, examining the painting in great detail. That’s when you hear a distinctive click come from the floor. Before you can react, the panel beneath you falls and you along with it. You drop for what feels like an eternity before your suddenly overwhelmed with a stabbing pain shooting from your nether regions. You look down to see that you’ve been impaled by a large wooden pike. You attempt to scream from the pain but blood filled your throat quickly and all you can manage to do is bubble up blood. As the life leaves your body, you sink further down onto the pike,dripping blood like a half cooked kabob. A painful death, but not a quick one.\n  *page_break\n  *goto retry\n  *label retry\n  Retry?\n  *Choice\n   #Yes\n    *Goto_scene deathgallery\n   #No\n    *goto_scene ending\n\n #Stand in front of Winchester\n  You step in front of the painting of Winchester, holding your breath as you wait for something to happen. \n  it is then that you hear it. A loud familiar bang, followed by pain in your abdomen. \n  You look down to see a new hole in your side. \n  You turn to see the statue holding the rifle was now pointing the rifle at you, the barrel smoking. \n  You fall over to your side onto the floor and land on the pressure plate in front of Guilliton. \n  You look at the painting of guilliton slowly ascend to reveal a doorway. \n  As you bleed out, you attempt to crawl towards it in a final attempt to escape. \n  That is when a figure wearing an iron mask walked through the door on the other side of the painting, \n  looked at you on the floor and pointed a revolver at you, \"Game over.\" A distorted voice said behind the mask before they pulled the trigger.\n\n  *Page_Break\n\n  Bang\n  *Page_break\n  *goto retry\n\n #Stand in front of Guillton\n  You stand in front of the painting of Guilliton, taking a deep breath as you look at the painting and wait for something to happen. Then something does. The section of the wall with his painting begins to slowly move upward, showing a long hallway with a door on the other side. You go to move forward when you notice something shimmering above the new walkway. You look up and see a large blade, similar to the one found on a guillotine hanging down above the hallway entrance.\n\n  *goto parttwo\n  *label parttwo\n  *Choice\n   #Walk through the entryway.\n    You begin to walk through the entryway when you hear another click. \n    Then everything goes black for a moment. \n    In your brains’ last cognitive moments,\n    you see that the pathway closed the moment you took your foot off the panel in front of it, \n    and now your body is on the oppoiste side of the wall from where you head is. \n    You suddenly begin to float and are turned around to see a figure in a dark suit wearing an iron mask holding you at eye level, \"It seems you’ve lost.\"\n    A disfigured voice came from the mask, \"And you had such a good head on your shoulders.\"\n    *goto retry\n\n   #Find something to prop the entryway open\n    You search the room for something sturdy enough to hold the door open. You see the rifle that the statue is holding and think to yourself, ‘perfect.’ you walk over to the statue and as your feet leave the pressure plate in front of Guillotin, the blade beneath the painting swiftly falls downward and the entryway is closed off once again. You grab your neck in a moment of realization for your own mortality. \n\n    *Page_Break\n\n    Turning back to the task at hand, you carefully begin to remove the rifle from the statues hands, being sure not to stand in front of the barrel. Just as you almost have the rifle loose, the rifle fires with a sounds that shakes the room and makes your ears ring. You look to the opposite side of the room to see a large hole in the far wall. You breathe a sigh of relief, happy that you weren’t on the other side of that bullet. You pry the rifle out of the statues hands and stand back onto the pressure plate in front of Guillotin. The painting slowly begins to rise again, the shimmering blade beneath it still there. Once the painting is fully positioned you place the rifle standing with the arm rest facing upward against the right of the entryway. You then position yourself to leap through the doorway, low and fast. You pause for a moment, making sure everything is just right...\n\n    *Page_Break\n\n    One.\n\n    *Page_Break\n\n    Two.\n\n    *Page_Break\n\n    Three!\n\n    *Page_break\n\n    You lunge forward through the doorway, keeping your body low as you sweep across the floor. You hear the blade swing down and get caught on the end of the rifle, the sound of wood being hacked by metal. You turn over to see the rifle holding strong against the pressure of the blade pushing down. You fall onto your back and laugh, grateful you made it through another nightmare. After a moment of rest you quickly stand up and walk through the door on the other side, fully prepared for what may come next.\n    *achieve historian\n    *goto_scene portraitgallery\n\n   #Find something to put onto the pressure plate.\n    You search the room for something heavy to put onto the pressure plate. You turn to your right to see a statue and look down. It’s bolted to the floor. Damn. You turn to your left and see the miniature guillotine, freely able to move. You move from the pressure plate and the entryway quickly falls shut, the blade slipping down into the hidden sheath below. You take a moment to appreciate your instinct. You walk to the opposite side, being careful to avoid the plate in front of Dracula and maneuver the guillotine in front of the painting of Guillotin. The painting slides upwards once more and you walk through, cautious of the blade inches above your head, but happy to be alive.\n    *achieve historian\n    *goto_scene portraitgallery\n", "diningroom": "*page_break Next scene: Dinner is Severed\nAs you walk through the door, You enter a room dimly lit with candles along the walls in decorative candlesticks. \nDown the center of this elongated room is a table that stretches the length of the room and seems like \nit’s four feet wide covered in a red silk cloth. In front of you is the only chair in the room, \nfacing a bell. On the other side of the room is a door, \nbarely visible thanks to two candles on either side of it. \nEven in this dim light you can see an iron gate in front of the door, blocking it off. \nAlready you can tell what kind of game is going on here. Time for dinner.\n\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n Come back in a few minutes to play the next part of [i]Macabre Mansion[/i]!\n\n Or, you can buy the game now to skip the wait.\n\n *purchase_discount adfree 2020-08-06 $4.99 $2.99 purchased\n *delay_break 1200\n\n*label purchased\n\n*choice\n #Sit down and ring the bell\n  You sit down and ring the bell on the table.\n  You hear a loud click below you followed by a sensation around your ankles, \n  so you look to your feet to see metal constraints have sprung from the chair legs and wrapped around your ankles. \n  You try to release yourself but they are unmovable. You go to tip the chair over but it’s been bolted to the floor. As you struggle with your constraints, a strange shadow engulfs the room and vanishes just as quickly. You look up from your shackles and look to the other side of the table. \n  Sitting on the opposite side was a figure wearing an iron mask with a glass of wine in hand, \"Bon appetit, my dear friend.\" They said in a voice that was clearly scarred and broken. \n  You try desperately to escape, the shackles around your ankles showing no signs of loosening. \n  Soon after, you hear a door open to the left of you. You turn to see another haunting woman in a tattered maids dress pushing a small metal cart with a cloche. You watch in horror and confusion as she came up to the table and placed the cloche covered plate onto the table. You hear something scurrying underneath, the sound of something small trying to escape. The haunting figure meticulously removed the close, and now in front of you is a tarantula that is stuck in place by some kind of thick, transparent glue.\n  The ghastly woman places a small wooden mallet on the table before grabbing the cart and scurrying away back into the mysterious door she entered from, “Now my friend,” The figure at the other side of the table, “Let’s eat.”\n  *goto appetizer\n  *label appetizer\n  *choice\n   #Crush the tarantula\n    *set sanity +10\n    You grab the tenderizer and lift it high, the arachnid in front of you squirming and wiggling even more than it was before.\n    You take a moment to process your decision before finally slamming the mallet down and crushing the creature, organic fluid squirting out in all directions, some of it landing on you. You put the hammer down and take a deep breath, hoping that’s the end of whatever sick game is going on here. The person on the other side of the table slowly begins to clap slowly, “Very impressive,” The cheered, “I wasn’t sure if you had it in you to do what you need to survive. You are a very interesting individual, ${name}.” they picked up the small bell next to them and rang it twice, “However,” they said as another ghoulish maid came from behind and removed the plate with the crushed arachnid, “This was simply the appetizer. I hope you’re prepared for the main course.”\n    *goto firstcourse\n   #Spare the tarantula\n    You reach for the hammer, trying to summon the courage to crush this creature. \n    You simply can’t. This weird eight legged being has done nothing to you, so you have no reason to kill it. \n    You put your arms on the armrests and sit back, knowing that some strange punishment awaits you. \n    The masked figure on the other side sighed in defeat, \"Perhaps you are not the guest we have waited so long for.\" \n    They said as they rang a small dinner bell thrice. At the sound of the third ring, The floor beneath you began to sink, with you along with it. You reach for the shackles around your ankles to free yourself but to no avail. You look up as the dinner table you were sitting at slowly shrinks from view, further and further, until eventually you are surrounded by darkness.\n    *set enterbasementthroughdiningroom +1\n    *goto_scene basement\n    *label coursetwo \n    Just as one maid disappeared from view with her cart, a male server, just as dead as the last, \n    in a black suit and tie riddled with what you can only describe as bullet holes. \n    On his cart was a slightly larger plate and cloche, \n    the sound of something whining and scurrying coming from underneath. \n    He placed it in front of you without a word, slowly backing away. \n    It is in that moment that for some reason your lungs decide to cough. \n    You cover your mouth quickly but it is too late. The walking corpse turns to you quickly, a deafening silence passing for a moment, before he burst into maniacal laughter in your face. At least it sounded similar to laughing. It was a mix of wailing and snorting, a twisted grin spread across his face as blood slowly seeped from his eye sockets. He continued to cackle as he slowly walked away from you backwards, his ghastly image now instilled into your mind. You turn away from him as he disappeared from view, hoping what is under this broche is more pleasant that what had just happened.\n    *page_break \n    You lift up the broche and find that it’s just as terrible. \n    There on the plate in front of you was a white rabbit, it’s legs visibly broken, \n    caught in a bear trap of sorts. In front of this small mammal was a large cleaver, \n    freshly sharpened. You look up to the figure in the iron mask who raises a wine glass to you. Upon closer examination you realize it isn’t wine at all. You could smell the strength of the iron from the other side. It was blood, “Don’t tell me you’ve never had rabbit before.” The figure chuckled menacingly. It was obvious what was going on here. This haunted decrepit place is forcing you to make a decision, the animal’s, or your own? \n   \n    *label firstcourse\n    *Choice \n     #Kill the rabbit\n      *set sanity -10\n      You reach for the blade and raise it high above your head as the small mammal squirms and wriggles, \n      it’s broken legs unable to take it anywhere. \n      You close your eyes as your instinct to survive does the rest. \n      You hear a high pitched cry just before the sound of bone being crushed and skin being split. \n      You try to avoid opening your eyes but you know you can’t do that forever. So you open your eyes, and you discover that you missed.\n      *page_break\n      Or rather, you failed to kill the creature. Instead you landed a blow right into its stomach. It’s entrails pour out and blood gushes from the wound, but it’s still breathing, panting, giving small squeals and screeches as it trembles in pain,  it’s eyes now wide with fear. You have no choice, You need to aim, and you need to watch. You carefully aim the cleaver over the animals neck. You cringe at your decision but you know you have to get out of here. With that, you swing the blade down on the rabbit skull. You watch as the animals head comes clean off from its body, blood squirting from the wound as the body twitched violently from the sudden and shocking death. Blood dispersed in several directions, spraying all over your clothes and face. You raise your arms to prevent the blood from spraying on you, but instead it covers your arms and hands, soaking you in the small rodents blood. The moment of chaos passes as the body slowly stopped moving, \n      the blood flow slowing down to a slight drip, the lifeess carcass giving one weak kick before going completely still. You sit there stunned at what had taken place, what you had just done, at what you’re willing to do.\n      *page_break             \n      You hear clapping from the other side of the table, \"Now that,\" \n      The masked fiend called out with a raspy voice, “Is what I call a show.”\n      *page_break\n      A few moments later, as the shock begins to leave your body, Another decomposing servant came into view and removed the rodent plate from in front of you, “You come as quite a surprise to me, ${pronoun} ${name}, there are very view who can withstand the chaos and bloodshed this place can bring upon them.” They leaned over the table towards you, “However, one must also be careful to keep their humanity intact. Or be lost in this place forever.” \n      *page_break\n      It was then that two undead servers came around to your left, \n      pushing a large glass box full of steam that sat upon something that looked like a large square engine, \n      \"Now it’s time for you to decide,\" The metal mask maniac said leaning back in his chair,\n      \"Do you belong to humanity, or do you belong here?\"\n      *goto secondcourse\n     #Spare the rabbit\n      You cross your arms and sit back away from the rabbit sitting on the table. \n      This is a line that you can’t come back from and you refuse to cross it. \n      You leave the rabbit as it is, unable to help it but unable to bring yourself to kill it, \n      so you sit here and wait for whatever dark future awaits you. \n      The masked fiend on the other side lets out a small chuckle, \"I suppose you are human after all.\"\n      They said quietly as they ring the small bell near them twice. That’s when the floor beneath you begins to sink, with you and the chair you’re pinned to along with it. Now you begin to question yourself, if the life of a rodent is worth whatever agony you are about to endure. Whether you’re ready or not, you’re about to find out. \n      *set sanity +10\n      *set enterbasementthroughdiningroom +1\n      *goto_scene basement\n\n      *label secondcourse\n      You sit in your chair, staring at the strange object, \n      You look around frantically, unsure what is about to happen. \n      As your mind begins to race and wander, you hear slamming coming from the box. You look upwards to see a hand, a human hand, covered in burns and boils, pounding on the glass. As you lean in for a closer look,\n      *page_break \n      A woman inside the box slams into it with full force. \n      She looks at you with fear in her hazel eyes, her pale skin covered in burns, \n      her brunette hair soaked and steaming from boiling water. \n      She took one finger and began to draw in the steam facing you, spelling out the words 'help me'. \n      With that she looked at you as tears streamed down her face.You look down at the large machine carrying the glass box and in the front facing you was a button labeled PUSH. You turn to the strange host who looks back and lifts their glass.\n      *page_break\n      The woman slams the edge of the box, her face and chest covered in red, scabbing skin, her eyes bloodshot from crying. You sit there in shock as you look at her, nightmares filling your mind as you see tears rolling down her cheeks. She lets out a scream, a powerful scream that could shake someone to their core. All you hear is silence, not even an echo of the woman’s plea for mercy and freedom. You know that you have to make a decision, here and now, otherwise you’re not leaving here at all.\n      *choice\n       #Kill the woman \n        *set sanity -20\n        You take a deep breath, preparing your mind for what you are about to do. \n        You apprehensively reach for the button in front of you,\n        the woman inside screaming and bangsing on the glass trying to break it to no avail. \n        The glass is soundproof, all you hear are your own tormented thoughts. \n        You look up toward this person who has been staring at you the entire time with a face soaked in blood and tears, \n        her eyes dilated from pure terror. It’s not fair, her eyes tell you, it’s just not fair. \n        This is how it has to be, you tell yourself, this is just how the world inside these walls works. \n        *page_break \n        She bangs at the glass as you feel hot tears stream down your face as you reach for the button, \n        your hand only a few inches away from the button.\n        You’re not ready for what’s going to happen, every minute is an eternity. \n        You can’t even look, so you press the button turn away, \n        your mind already scarred with images unforgivable. \n        A moment of silence passes, and then You here a familiar hiss. \n        That's when hot steam bursts into the glass box,  \n        the girl inside trying to put her hand over the funnel only to have them get burned. In an instant, hot, burning steam rushed into the small box directly onto the woman. You watch her writhe and scream in pain as the boiling water vapors burn and welt her skin. She fumbles and slams into the glass to no avail. She’s going to suffer, and you’re going to watch. \n        *page_break \n        This agony continued for only ten minutes, in your mind it lasted an eternity. \n        Her slams and kicks become less frequent, less powerful, less alive, until finally. Silence. \n        It was in that moment your ankle shackles unlock, but you can’t seem to move a muscle. The horror of the fate you delivered keeping you immobilized from anguish. You have to turn away, turn away from the terrible fate you bestowed on this stranger. You continue to hear the hot water vapors fill the small area ever faster by the second, then slowly begin to dissipate. You look up, the glass box impossible to see into because of the clouds of steam. That's when you see a burned, boiled face slams into the glass, eyes devoid of life, flesh melted and warped.\n        *page_break\n        From the other side of the dining room you hear applause as the ghoulish host stands to their feet, \"Bravo! Bravo!\" They chuckle in glee, \"I wasn’t sure if you had it in you, yet here you are!\" The undead servers that surround you also begin to clap, a call of approval for your deed, “Yes, ${name}, there is darkness in you. Welcome home.” With that, the lights began to flicker again, a moment of darkness passed, and when the lights came back, the host disappeared along with the servants, leaving you alone in a room with a boiled corpse. The shackles around your ankles unlock, but you didn’t notice. You just sat there, stunned in disbelief.\n        *page_break\n        Slowly, you pull yourself up from the chair and began to walk to the other side of the dining room, avoiding looking at the body in the box. It feels like it’s miles away, with every step you take you see the woman’s last face of fear all around you. Eventually, you reach the door on the other side, and with your shaky, murderous hand, you turn the doorknob, leaving the body in this room, but the nightmare fresh in your mind. \n        *set Karendies +1\n        *goto_scene entertainmenthall\n       #Spare the woman \n        *set sanity +10\n        You reach for the button, the fear and protest in her eyes.  \n        You see the desire to live in her eyes and make your decision.  \n        You can't do this. You pull your hand back and accept whatever very cruel fate is waiting for you, \n        sure that something terrible is in your future. \n        The host let out a sigh, putting their wine glass down, \n        \"I suppose there may be a speck of hope in your soul after all.\" They snapped their fingers and the glass box opened, releasing the steam as well as the young woman from inside. She wheezes and gasps for a moment before frantically falling to the floor near you, “It doesn’t matter.” The ghoulish masked figure scoffed, “One way or another, you’ll call this place home.” With those final words the lights shut off quickly and came back on, the figure as well as the haunting ghouls simultaneously vanishing into thin air.\n        *page_break\n        She wrapped her arms around you, weeping into your shoulder, \n        \"Thank you. Thank you thank you thank you.\" \n        She cried over and over again as you both rocked back and forth. \n        Your embrace lasts for a moment longer before you both take a deep breath and make it to your feet. \n        As you stand the gate blocking the door on the other side slowly crept open and you both begin \n        making your way towards it, \"I can't say it enought.\n        If you hadn't come along, I probably would have been dead.\" \n        You smile and reach for the door, \n        happy to know that you saved someone's life and that your humanity is still with you. \n        No matter what nightmare comes next, you'll always have that.\n        *achieve saviour\n        *set karenlives +1\n        *goto_scene entertainmenthall\n", "electricgallery": "*page_break Next scene: Shocking Revelations\nYou stumble into the dark room, the inky blackness is so engulfing you cannot even see your own hand in front of you. \nYou’re not even sure your hand is there anymore. You continue to walk forward when you hear the sound of a door closing behind you and locking. \nThat was your way out, now you need to find a new one. You walk around aimlessly, hoping to find some clue as to how to get out.\n*page_break\nThat’s when a light bulb glows, not in your head, but directly behind you, a faint pale yellow illumination calls your attention. You turn around to see a podium that you assume is in the center of the room. On the podum is a lantern, instead of a flickering flame inside, there was a lumid light bulb, producing a low hum you could barely hear but was somehow very audible. \nYou walk towards the lantern, keeping an eye on it as you also watch your footing, trying to avoid anything that might look like a trap.\nAfter careful trekking, you get to the lantern and cautiously pick it up. On the bottom of the lantern you see engraved letters, a message to all who have entered this room, “To escape this room and survive the night, you must find the inventor of this traveling light.”\n*page_break\nWhile reading this, you notice something about this strange lantern; Whenever you move, it glows brighter or dimmer. This must be the key to finding the way out of this never ending darkness.\n*goto center\n *label center\n There you stood in the middle of the room, behind you is the door that you entered, ahead of you in the dim light you see a wooden door, unmarked and average. in the far corners of the dark space you can barely see small portraits on the walls. \n You notice that as you step closer or further from any corner of the room, the light projecting from the lantern either grows brighter or dimmer, as if some sort of energy was emitting from each corner. Maybe, just maybe, the key to escaping the darkness is to follow the light. \n *choice\n  #Walk towards the upper left corner\n   You walk to the left corner of the room opposite of where you are standing, the light beginning to glow dimmer with every step you take. When you reach the corner of the room you have to hold up the lantern to see the portrait hiding in the corner. \n   It’s an image of an elderly man, with a powdered wig and glasses. \n   He’s wearing a brown suit and is sitting near an old fashioned newspaper machine. \n   You are certain you have seen this face before. \n   You look down at the small plaque underneath the painting and read his name out loud “Benjamin Franklin”. \n   Beneath the plaque was a copper lever  positioned upright. \n   Your instinct tells you that something will happen if you pull it.\n   The question you ask yourself is will you survive?\n   *goto Franklin\n   *label Franklin\n   *Choice\n    #Pull the Lever\n     You reach for the lever, confident but wary. \n     You wrap your fingers around the handle and take a moment to breathe. You’re sure you want to do this. \n     With that you pull down on the lever hard, hoping for salvation.\n     *page_break\n     What you find is punishment, punishment in the form of electricity shooting from the steel bar and through your entire body. Your muscles spasm, your teeth clench and your hair fries as every volt passes through your being. Just as quickly as the shock came, it passed, leaving your body a fried husk of who you once were. Your last moments of consciousness reflect on the pain of having your muscles being ripped apart by electric stimulation and the blood spilling out of your mouth from your organs bursting outwards. A quick and painful death. (8)\n     *page_Break\n     *goto retry\n     *label retry\n     Retry?\n     *choice\n      #Yes\n       *goto_scene electricgallery\n      #No\n       *goto_scene ending\n    #Go back to the middle of the room\n     Something tells you that this is not the way you want to go\n     *goto center\n  #Walk towards the upper right corner\n   You walk into the shadowy right corner of the room, following the haunting light of the light bulb lantern.\n   As you walk closer to the corner of the room, the light began to glow brighter. \n   With every step you take, the lightbulb grew more luminous. Suddenly, the light turned into a small glow, then into an overwhelming brightness, and eventually into a low flicker. \n   The light was just barely bright enough to show you a painting of a man with black hair and a handlebar mustache. \n   The plaque beneath the painting had the name Nikola Tesla inscribed onto it. \n   Beneath the plaque was a bronze lever facing upward. You wonder what it all means.\n   Unfortunately, you don't have time to find out\n   *goto Tesla\n    *label Tesla\n    *choice\n     #Pull the lever\n      You reluctantly reach for the handle, thinking of everything that might happen if you pull this lever, when another thought races through your mind,\n      *page_break\n      What will happen if you don't?\n      *page_break\n      So you pull down on the lever, accepting that anything you do is better than waiting here to die. For a moment there is silence, the only audible sound being the low buzz of electricity coming from the lightbulb. You hold your breath, fear and anticipation pump fresh adrenaline through every fiber of your being.\n      *page_break\n      That's when the light goes out. The flickering light bulb goes dark and you are engulfed in darkness once more. And then there was light. The room is flooded with light from ceiling, blinding you for a moment, a flood of bright white invades your vision. When your eyes adjust, you find yourself in a colorful room with vibrant colors along the four walls that surround you. Several paintings fill the small room, paintings of thunderstorms and lighting. Each corner of the room was a painting of a person with a lever beneath it. This was some sort of test, and you're grateful you passed. You turn around from the corner to see an oak door to your right, directly across from the door you came through earlier. \n      You walk towards the door and cautiously reach for the handle, hoping the worst is over. \n      You turn the handle and open the door. Just the answer you needed.\n      *achieve electrician\n      *goto_scene blueprintgallery\n     #Go back to the middle of the room\n      Something tells you that this is not the way you want to go\n      *goto center\n  #Walk towards the lower left corner\n   you turn around and walk towards the left corner behind you. \n   You carefully examine the lanterns bulb, watching it flicker and flutter. \n   With every step you take, the light bulb glows a little brighter, then brighter, then brighter, then suddenly,\n   *page_break\n   It stops illuminating. It neither glows bright or dim, it simply glows. \n   You lift the lantern slightly to see the portrait of a man at eye level. \n   *page_break \n   the image in front of you was an elderly man sitting in a library,\n   in front of him a small box with a lightbulb on it. Beneath the painting was a plaque that read Thomas Edison.\n   Beneath that was a metallic lever that was upright. You wonder for a moment what would happen if you pull the lever. Will it be death or salvation? There's only one way to find out.\n   *goto Edison\n   *label Edison\n   *Choice\n    #Pull the lever\n     You reach for the lever, confident but wary. \n     You wrap your fingers around the handle and take a moment to breathe. \n     You are sure you want to do this. With that you pull down on the lever hard, hoping for salvation.\n     *page_break\n     What you find is punishment, punishment in the form of electricity shooting from the steel bar and through your entire body. \n     Your muscles spasm, your teeth clench and your hair fries as every volt passes through your being.\n     Just as quickly as the shock came, it passed, leaving your body a fried husk of who you once were. \n     Your last moments of consciousness reflect on the pain of having your muscles being ripped apart by electric stimulation and the blood spilling out of your mouth from your organs bursting outwards. A quick and painful death.\n     *goto retry\n  #Go back to the middle of the room\n   Something tells you that this is not the way you want to go\n   *goto center\n  #Walk towards the lower right corner\n   You turn around and walk to the right corner of the room near the door you came from. \n   As you walk closer, you see the light slowly but surely begin to dim, dimmer and dimmer, until you could barely make out what was in front of you.\n   *page_break\n   In the eerie darkness you see a portrait of a man with wild white hair and a thick white mustache. \n   Underneath the portrait was a plaque that read Albert Einstein. Beneath the plaque was an iron lever. \n   You can feel energy emanating from the handle, electricity coursing through the handle. Question is, where does it go?\n   *goto Einstein\n   *label Einstein\n   *Choice\n    #Pull the lever\n     You reach for the lever, confident but wary. \n     You wrap your fingers around the handle and take a moment to breathe. \n     You are sure you want to do this. \n     With that you pull down on the lever.\n     *page_break\n     Darkness. The electric lamp you're holding completely shuts off and shadows quickly close in on you.\n     You stand with baited breath as you wait for what's coming next.\n     *page_break\n     That's when the room is flooded with light. \n     The sheer brightness coming from all around floods your eyes, making it impossible to see.\n     You reach your hands up to protect your vision and as your hands touch your face, you feel something wet.\n     *page_break\n     It's coming from your nose,some is coming from your eyes, \n     and then you realize some is coming from your mouth\n     *page_break\n     That is when you begin vomiting. \n     An uncontrollable stream of bile fires from your body as you crumple to the floor.\n     As you lay on the floor, blinded, bleeding, and dying, you remember one of the events Einstein was famous for.\n     *page_break\n     Nuclear energy.\n     *goto retry\n    #Go back to the middle of the room\n     Something tells you that this is not the way you want to go\n     *goto center\n  #Walk directly ahead\n   You walk ahead towards the door on the opposite side of the room. You see the wooden door, plain, unsuspecting, just there. You get to the door, your lantern still bright enough to see the wooden structure in detail. A plain wooden door, with a bronze round door knob. It could be this simple. \n   Just walking through a door, no tricks, no puzzles, just walking through a door, you think to yourself. \n   Just walking through a door.\n   *goto door\n   *label door\n   *choice\n    #Turn the doorknob\n     You reach for the doorknob, hoping this will be the end of the night eternal.\n     You grip your fingers around the knob, a good sign so far, and slowly turn it. Maybe this is the end.\n     Maybe you can finally go home. \n     *page_break\n     That's when the latern you left in the center of the room begins to glow brighter and brighter from behind you.\n     Your adrenline spikes as a sense of dread over takes you.\n     *page_break\n     Something bad is about to happen.\n     *page_break.\n     You push and pull at the door in front of you but it refuses to budge,\n     the lantern behind you rapidly getting brighter.\n     You back turn to the lantern, bracing yourself against the door for whatever is about to happen next.\n     *page_break\n     Boom. The lantern explodes with light and concusive sound, \n     smashing you into the door and shaking the room with tremendous force.\n     *page_break\n     Your eyes are blurred and your ears are ringing. You are on the floor, struggling to breath,\n     your lungs filling with blood.\n     You look down to see that your left calf is missing from your body, torn from you.\n     You look for it in the darkness of the room and find nothing.\n     You soon turn your attention to a sharp pain in your chest.\n     *page_break\n     It's a large shard of glass embedded into your ribcage, stabbing into your heart.\n     You try to move your right arm to take it out.\n     *page_break\n     It's not there anymore. Helpless you lay there, waiting to die. \n     page_break\n     That's when the glass shard launches from your chest, causing you to writhe in agony.\n     You watch as the shard goes to join levitating glass and metal that twist back into shape.\n     As the floating debris sprials, it begins to connect and fuse, \n     until it eventually is formed into that cause of the destruction.\n     *page_break\n     The lantern. You chuckle at the irony as you slowly drift off into the eternal slumber.\n     *goto retry\n    #Go back to the middle of the room\n     Something tells you that this is not the way you want to go\n     *goto center\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Macabre Mansion.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99 $1.99\n", "entertainmenthall": "*page_break Next scene: Eye of the beholder\n*if karendies > 0\n You walk into another dark ominous hallway, the quiet loneliness in the air whispering dark thoughts into your mind. All your fault, all your fault, all your fault, the twisted voice in the back of your mind. It is your fault that woman is dead. It is your fault she will never leave this place. As you continue to walk down this dark hall, you think about the darkness entrapped in these walls and the horrors in this dark place. You come to realize that it is not you who killed that poor woman, it is the madness that this mansion brings.\n *page_break\n As you explore this dark hall, you come to an ominous corner of the mansion.  It’s the end of the hall, with no doors or windows. On the wall in front of you is a candle, gently lighting two three foot tall pillars with glass boxes that were occupied by peculiar items: One is an antique photo camera with a cracked lense, the other an early film recorder, covered in dust and cobwebs. The recorder had an original film reel and a broken lense, its antique status becoming more evident the longer you look at it. On the pillars that the items were presented, there were small brass buttons. They had no labels, no arrow or obvious gears, simply brass buttons on wooden pedestals. What happens next is up to you.\n *choice\n  #press the camera button\n   You press the button beneath the small puppet and hold your breath in anticipation of what may happen next. That is when you hear the familiar sound of gears grinding behind you. You turn around and see a stone wall quickly rising from the floor. You run to try and escape down the hallway but the wall has already enclosed you into the tiny space. You slam your fists into the wall in a desperate attempt to get out but all you accomplish is bruised knuckles. You sink to your knee, unsure what to do next. It is in that moment that the room you are in begins to turn, gears clicking behind the walls as the room continues to rotate before grinding to a halt. When the spinning ceases, the wall in front of you begins to sink back into the floor, and a few feet in front of where you kneel is a wooden door. When you come to your feet, the door slowly creaked open, and a sudden chill crawls down your spine. You are not sure where this new nightmare may lead you, \n   but you know that if you want to leave this terrible place, you need to keep moving.\n   *goto mausoleum\n   *label mausoleum\n   *page_break\n   Next scene: Orphan Unknown\n   *page_break\n   You leave the small room and walk through the door ahead of you. The door quickly slams shut after you enter, and once again you are surrounded in darkness. That is until you hear the sharp snap of a spark and see candles light the edges of the room to reveal stone walls all around you and in the center of the room a small glass box. You are uncertain of what is inside until you inch closer to discover it’s contents. \n   *page_break\n   It is the body of a small child. A girl, with brown curly hair in a flowing white gown,her hands tucked neatly at her sides, her eyes closed as her expression of grief is frozen in time. You explore the outer workings of this room to discover stone masonry, and on these stone walls were black and white pictures in oak frames.\n   *page_break\n   You immediately notice two things about these pictures. The first is that each of them is of the girl lying in the glass box when she was alive, showing the stages of her life as the unfolded. \n   *page_break\n   More importantly, you notice that with every passing moment, each picture was moving, telling a story all its own as if they were moments forever repeating inside these small photos. Each one had a small label on its frame with a date of when it was taken.\n   *page_break\n   The first one leading back to over a hundred years ago\n   *page_break July 21th, 1839\n   A woman holds her newborn baby in her bedroom. It’s raining outside, the only light coming from a small, dim candle in the corner of the room. The woman is weeping. She looks at the small babe, a sneer of disgust across her face. Between weeps you see her screaming at the small child, rage on her face. Another woman comes in and takes the baby from her, and the woman in the bed turns over, disappearing under the covers as lightning blots out the room. You move to see the next picture, only dated a few years afterward.\n   *page_break October 17th, 1849\n   A young girl stands in a room with a shotgun pointed at a sleeping woman. The girl has a gash across her face, blood dripping down from the wound covering her cheek. Around her ankle, bruises and torn skin hide under a broken shackle. The woman in bed sleeps soundly, a bloody pair of scissors in her hand and a satisfied look on her face. The girl has her finger on the trigger but is holding completely still, not even flinching as the woman opens her eyes and sits up. The woman pauses for a moment then begins to laugh. A loud, proud and malicious laugh. The young girl let’s out a single, powerful screech before pulling the trigger. The flash from the shotgun swallows e of the photo until nothing but a black screen remained. You soon move on to the next picture.\n   *page_break March 17th, 1852\n   A young child stands amidst a forest at dusk, covered in blood, hiding behind a tree while a wall of foam comes from the horizon. It’s men and women carrying torches along with weapons; blades, clubs, guns, and all other tool of death and torture. They are not advancing on her though, but rather away from her, towards a large, ancient house far in the distance. The Macabre Mansion. The girl waits patiently, for what is unsure. Then it comes into view. A push detonator for dynamite. She waits patiently, her hands wrapped around the steel bar, waiting for the mob to become closer to the mansion. She hesitates for a moment, reaching into her pocket and taking out the dagger gifted to her then smiling at it. She quickly puts it back into its sheath and pushes down on the detonator. An explosion claims the picture in a flash of light, the young girl smiling being the last image showing before you move onto the next photo.\n   page_break\n   March 18th, 1852\n   The young girl is shown limping back towards the mansion, a wound on her leg taking its toll as she bleeds. There’s a bruise under her left eye, dark and swollen from how fresh the impact was. She was disoriented, her step pattern disorganized and haphazard. Even through all of this, she was smiling. One of the truest smiles she had ever worn, it seemed. Her eye was swollen shut and her legs were covered in gashes and even still, she was smiling. She looked up at the mansion, old, decrepit, but still tall and intact. The peace emanating from her eyes was apparent even through this black and white photo. That was until a figure in cloak came from the shadows and swallowed her in the folds of the dark cape. When the figure disappeared and the girl reemerged, her dagger, given to her by the only woman she had ever trusted, was buried in her chest. At first, the feeling was shock, then she winced at the pain of having six inches of steel cut into her, \n   then for some reason, she chuckled, \n   slowly going to the ground as the sun began to rise. \n   She laid there in the early morning sun, perched against the door of the only home she ever knew. It was not long before the bright star that shimmered in her eyes soon took over the picture in brilliant light.\n   *page_break\n   Then, from all corners of the house, came a blood curdling, heart breaking scream of agony. You shutter where you stand, gathering your nerve. Soon after you hear the all too familiar click of something opening in the room. You turn to the source of the sound and see that the wall on the far side of the room had shifted out of the way to reveal a dark hallway. You quickly make your way in that direction, pausing before you leave the room. You wonder what compelled you to stop when you hear a voice from behind you, “You actually listened. Thank you.” You turn around and find nobody, just a small, cold child in a child in a glass box. You take a breath before continuing on your way, hoping to make your way out of this house of tragedy. \n   *achieve mourner\n   *set entergrandhallthroughmausoleum +1\n   *goto_scene grandhall\n\n  #press the recorder button\n   You press the button beneath the small puppet and hold your breath in anticipation of what may happen next. That is when you hear the familiar sound of gears grinding behind you. You turn around and see a stone wall quickly rising from the floor. You run to try and escape down the hallway but the wall has already enclosed you into the tiny space. You slam your fists into the wall in a desperate attempt to get out but all you accomplish is bruised knuckles. You sink to your knee, unsure what to do next. It is in that moment that the room you are in begins to turn, gears clicking behind the walls as the room continues to rotate before grinding to a halt. When the spinning ceases, the wall in front of you begins to sink back into the floor, and a few feet in front of where you kneel is a wooden door. When you come to your feet, the door slowly creaked open, and a sudden chill crawls down your spine. You are not sure where this new nightmare may lead you, \n   but you know that if you want to leave this terrible place, you need to keep moving.\n   *goto_scene filmroom\n   *if karenlives > 0\n    You exit from the dining room, Karen following close behind as you enter a dimly lit hallway. \n   The two of you quietly explore the eerie corridor, trying your best not to make a sound, \n   not to set off whatever nightmarish mechanism may be waiting for you somewhere in the endless abyss behind these walls. As you walk down the hall, you turn to Karen occasionally to find her looking back at you. You exchange glances, smiles sometimes, a brief glimpse of hope in the never ending darkness. You continue down the dark hall until you reach the end, no doors, no passages, no paintings. All that stands in front of you are two pillars standing three feet tall, glass boxes covering strange objects sit atop each of them. On one pillar, was a wooden puppet, painted red and dangling from strings. On the other pillar was a classic film reel camera, the dust and broken lense serving as evidence of its age. Below the glass boxes on the pillars themselves were brass buttons with no clear indication of their function, their dull   surface emanating an importance all their own.\n   *page_break\n   There you stood, observing the fascinating objects that were displayed before you. As you interpret the meaning of the peculiar items, you see Karen walking toward the glass box holding the camera, a trance like look in her eye. You call out her name and receive no response, her dilated pupils staring at the brass button in front of her, “This seems familiar.” She mutters as she continues to tilt her head back and forth. A sense of dread sinks into your bones as you watch Karen reach her finger up to the button. at causes your skin to crawl away from your bones. \n Karen and your former self stand completely still, terror holding them in place.\n *page_break\n Run, you try to tell your past self. You try to scream but all that comes out is the sound of static. \n You watch as the fool wearing your face stands horrified and confused. \n It was Karen who made the next move, throwing the camera to the ground and attempting to run for the door. \n The ghoul in the maids outfit raised her right hand and snapped her fingers. \n In that moment, a large panel of glass rose upwards from the floor in front of Karen, \n causing her to crash into it head first. Karen dropped to the floor, \n her face covered in blood as more glass panels rose up and entrapped her in a solid clear box, \n My, my, that won't do.\" The undead woman sang, \"We'll have to give you a steam bath post haste.\" \n With that, The box holding Karen began to levitate in the air, \n eventually disappearing into the inky darkness of the ballrooms' ceiling. \n *page_break\n The ghastly woman slowly turned to you with a twisted grin on her face, \"And as for you,\" She growled at you. \n You stand helplessly as you watch the maid move in on the former you. The room begins to grow dark, \n shadows following the ominous maid walked closer to the shadow of who you used to be. \n That is when she looms over your shadow self, \n and you feel the inky blackness behind her empty eye sockets pulling your mind into a dark, terrible place.\n *page_break\n\n You try to resist, but the more you pull away, the further you get pushed in, deeper and deeper into the void until,\n *page_break\n\n Nothing. Nothingness all around you, even in your own mind. \n A nothingness that swallows your every conscience thought. Nothing all around.\n *page_break\n Nothing.\n *goto endroll\n\n *label endroll\n *if karenlives >0\n   A light slowly begins to come into view, your vision returning to you in strange blurs and shapes. \n   You blink repe  of a candle and the smell of iron in the air. You feel something soft on your skin and look down to see you are wrapped in velvet sheets stained with a familiar red liquid.\nIt is blood. Blood that seems like it has permanently stained into the velvet sheets.\nYou try to remember where you are, but all you come across are painful headaches that leave you powerless. In the far corner you hear an old telephone ring. You cautiously turn to see a golden handled turn dial phone in the far left side of the room. In front of you is a door, bloodstains leading towards it as if someone had crawled from outside to the bed.\n*Choice\n #Walk out of the door \n  You slowly get out of the bed, the phone still ringing in the dead silent room. \n  You look down at the bloodstains on the floor, the handprints and drag marks becoming more evident as you walk over them. \n  You feel your heart racing as the phone continues to ring in the corner, \n  a sound that crawls up your spine and sends shivers through every muscle.\n  Just as you reach for the doorknob, the phone suddenly stops ringing. \n  You take a deep breath and let out a sigh of relief. That is when you hear a knock at the door.\n  *page_break KNOCK KNOCK\n  The sound nearly gives you a heart attack. You pause for a moment, hoping whatever is on the other side will simply go away. Then another knock. \n  You feel your muscles stiffen as the door handle shakes and slowly opens outwards. \n  On the other side of the door, \n  in an ominous dark hallway was a nightstand with a single candle a note labeled \n  TAKE ME The candle is the only source of light in the empty hall and against your better judgement you grab the small plate the candle was sitting on and begin your journey into the abyss.\n  *goto hall\n\n #Answer the phone\n  You walk over to the rotary phone as it continues to ring, breaking the eerie silence of the room. You stop in front of the phone in a moment of hesitation. You take a deep breath before you pick up the receiver and put it up to your ear;\n  *page_break Hello?\n  “Hello, this is your wake up call.” Says a haunting womans' voice in monotone, \n  “Before we begin, we will need to collect some information. \n  By what title would you like to be addressed?\"\n  *choice\n   #talk to her\n    One way or another, you feel you are not leaving anytime soon, so you stay on the phone.\n    If that helps you get answers, and get out faster, then it can only work in your favor\n    *goto gender\n   #hang up\n    *set sanity -5\n    You hold the reciever to your ear, confused and scared, wondering who this strange person is\n    You don't want to find out. You attempt to put the reciever down.\n    *page_break \"Excuse me?\"\n    you attempt to put the reciever down again.\n    *page_break \"ANSWER ME.\"\n    You hear a shriek from the other end of the line, causing you wince as your ear rings,\n    your head throbbing from having it shaken by her violent voice, \n    \"Now, would you please give me the honor of the title you would like to be addressed?\"\n    *goto gender\n  \n    *label gender\n    *Choice\n     #sir \n      *set gender \"male\"\n      *set pronoun \"sir\"\n      “Thank you, ${pronoun}. Now by what name would you like to be called?”\n      *goto name\n     #miss\n      *set gender \"female\"\n      *set pronoun \"miss\"\n      “Very good, ${pronoun}. Now what name shall you be addressed by?\n      *goto name\n     #guest\n      *set gender \"non-binary\"\n      *set pronoun \"guest\"\n      “Due gratitude, ${pronoun}. And Finally, what name will you be going by?”\n      *goto name\n\n      *label name\n      *Input_text name\n      *page_break\n      “Thank you ${pronoun} ${name},” The ghastly voice continued, \n      “Please join us in the main theatre down the hall from your room for tonight’s festivities.” \n      Afterwards the strange voice quickly hung up. \n      You turn to the door, looking down at the bloodstains on the floor, \n      thinking to yourself how you could have possibly ended up here. \n      One thing is for certain. You needed to get out. \n      You walk out of the blood stained door to find a candle sitting on a small plate on top nightstand with a note saying “Take me”. You pick up the candle in the completely dark hallway and do the only thing you can; start walking.\n      *set phonecall +1\n      *goto hall\n      *label hall\n      *page_break Scene: Down the Hall and to the...\n      You head out towards the darkness of the hall, the silence and shadows slowly surrounding you.\n      As soon as you step out of the door, it quickly slams behind you almost knocking you over. \n      You look out towards the inky blackness and see what appears to be a never ending hallway. \n      You take a deep breath before you begin to slowly trot into the seemingly infinite darkness. \n      As you walk you look on either side of you, seeing tall walls with intricate wooden carvings stained with blood and hand prints. \n      You see on your left side the words HELP ME written in blood before the trail travels down the wall \n      and down the center of the hall, \n      as if the person that wrote it was pulled from the wall and dragged across the floor. \n      As you walk, you come across two doors in front of you. \n      The door to the left has the word UP engraved in the plaque above it and the door to the right had the word CLIMB engraved above it.\n      *Choice\n       #Go though the left door\n        You reach your hand out toward the handle of the door to the left, hoping that whatever is behind it leads you out of this nightmare soon.\n        *Goto storage\n        *label storage\n        *page_break Next scene: Broken Room, Crushed Hopes and Dreams\n        You walk through the door on the left and find yourself in a dark, small square room.\n        The only light is a small candle in the far left corner of the room.\n        The rest of the room is completely dark, an abyss that seems almost endless on either side of you. \n        You take a step into the room, and in that moment the door slammed behind you, knocking you off balance. \n        Suddenly you feel the floor beneath you begin to rise, like an elevator that cannot and will not stop. \n        That is when you look to the floor and see something that sends shivers down your spine.\n        All across the floor are splatters of blood, brain matter, and broken bones. \n        You put together that this is where others before you have died, and if you do not do something soon, you will die here too.\n        *Choice\n         #search the ceiling\n          You turn your eyes to the ceiling slowly descending and notice something out of place.\n          In a room filled with guts and gore, there is one tile on the ceiling that is has something spelled on it. UNDER HERE is written in bright red letters, as if it had been written in blood. You quickly run to place yourself under that tile, looking at it with your arms up in the sky. As the floor beneath you rises towards the ceiling, you see the stone slab begin to lift into your hands as you pass through the roof of the room and find yourself on the level above. It is at that moment you hear the sound of a door unlocking and when you turn to look, it begins to creak open. A moment of relief passes over you but is quickly taken when you hear a strange but familiar sound. The sound of applause.\n          *achieve pusher\n          *goto secondhall\n         #Look to the floor\n          You look down at the floor that is bringing you to your death, seeing multiple bloodstains in the limited light the candle in your hand has to offer. You searched the entire floor for salvation, some key to getting out of here. You find it in a single slab of stone on the floor that has STAND HERE written in bright red letters. You quickly position yourself over, your arms in the air, looking upwards as you ascend towards the ceiling. \n
