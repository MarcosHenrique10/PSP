<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Macabre Mansion — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>

    <button id="btn-menu" class="btn small">&larr; Games</button>

    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>

        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

window.__CS_OFFLINE__ = {"game": "macabremansion", "title": "Macabre Mansion", "scenes": {"amphitheater": "*page_break Next scene: Welcoming Commitee\nYou awaken to the sensation of something cold on your face. \nYou slowly open your eyes and see a pale, clammy hand touching your cheek,\n\"Oh good, you're awake.\" the whispering, ghost-like voice you heard before sings to you \n\"I am relieved to see you are alright,\" she says gleefully, her clammy hand gently grasps your chin and begins to raise your head so that you see the same strange masquerade mask you saw before, \n\"Hello, and welcome!\" she says in excitement, stepping backward and performing a plié, \n*line_break\n\"To the wonderful Mansion de Massacre!\"\n*line_break\nYou look around to see that you are tied to a chair on a brightstage in an empty opera theatre with the stage lights pointed on you. \nShe leans over towards you, and you can see into the inky emptiness of her eye sockets, the smell of death on her skin,\n\"And you,\" She said with a spin turning towards you again before stopping to stare at you.You shiver at the very sight of the woman before you, shocked and terrified. \nShe continues to stare at you with empty holes where her eyes should be.\"You look a bit pale.\" \nShe says calmly with her eerie voice,  \"Whatever is the matter?\"\n\n*Choice\n #What the hell are you?\n  \"Well,\" She said standing up straight and giving a slight bow while elegantly grasping her dress,\n  *page_break\n  \"I am one of your humble hosts! Of course, I am nothing compared to the Master, \n  who will be very pleased to meet you.\"\n  *goto call\n\n #where the hell am I? \n  She tilts her head slightly and giggles, \n  *page_break\n  \"Why, I already told you.\" She stands up and throws her arms up gracefully,\n  \"You are inside a mechanical and architectural marvel, the one and only Macabre Mansion! Where every room is carefully designed to test your skill, wit, and most importantly, your will to survive!\" sked her next question,\n     *goto name   \n     *label name\n     \"Now, may I have the honor of knowing your name?\"\n     *Choice\n      #Tell her to go to hell\n       She shook her head and walked to your left side, \"No no, that simply won’t do. \n       We need a name for our newest guest\" She rose her right hand and back hands you, sending a newfound pain that stings your skin and send your mind into a spiral. \n       Her very touch brings on visions and hallucinations of suffering and death, \"Now then\" You hear her voice become monstrous and terrifying, a demon in human flesh;\n       *page_break\n       \"WHAT IS YOUR NAME, MORTAL?\"\n       *line_break\n       you struggle for a moment, your mind spinning from the pain of the powerful blow and the migraine brought on by being forced to remember.\n       After moments of anguish, you manage to stammer out,\n       *line_break\n       My name is,\n       *input_text name\n       \"Ah, very good.\" She says sweetly in the eerie voice she had before, \n       \"My apologies, ${Pronoun} ${name} but my master has strict policies for our guests. After all, what will we put on your tombstone if you fail?\" She suddenly stops talking and then begins to giggle, \"Oops. Seems I’ve said too much.\" She gave another bow and looks you in the eye, \"ENJOY YOUR STAY.\" She said in a deep monstrous voice before the stage lights shut off and flicker back on, the ghoulish maid no longer in sight. There’s no question. You need to do something.\n       *set sanity -10\n       *goto_scene crossroads\n      #Give her your name\n       *input_text name\n       \"What a splendid name! Thank you, ${pronoun} ${name}!\n       She exclaimed, \"The master will be very excited!\" She said with a tilted head, \"Very excited.\" She whispered in a mischievous voice as the stage lights began to flicker before they completely shut off. Once your heartbeat regulates, you think to yourself, if you want to do something, this is your chance.\n       *goto_scene crossroads\n", "basement": "*page_break Next scene: belly of the beast\n\n*if enterbasementthroughbathroom > 0\n you slide into an ethereal of darkness, blood lubricating the tunnel you’re cascading down. \n The smell of iron is all around you as the dark tube makes turn after turn in an endless whirlpool. \n Just when you start to believe this blood soaked nightmare will never end, \n this slide suddenly ends and you land in a pool of unseen liquid. You swim to the surface, \n desperate for your first breath of fresh air. When you break through the liquid, \n all you taste in the air is dead flesh. \n The smell of the blood and rotten meat immediately causes you to gag as you try to swim to solid ground. \n Despite the blood in your eyes, you manage to make out a light only a few feet from you, \n flickering in the distance. You begin to swim towards the light, wishing for any chance to escape. \n That’s when you touch stone. You pull yourself up onto the platform and wipe the red elixir from your eyes, \n you vision slowly returning to you. \n As you look around you notice a lightbulb is the source of light that you saw, \n a few feet away from it was a lever, and beneath both was a drain. You cautiously walk over,\n curious as to what this is  meant to be.\n \n You reach for the lever, and in one swift movement pull it down while jumping away from the drain and torch. \n A moment of silent passes. \n\n Then suddenly the sound of liquid rushing through pipes. Not again, you tell yourself, please not again.\n That’s when water began to pour from the ceiling. You put one finger under it, weary as to what would happen to your haphazard digit. The water is cold, but it’s just water. You slowly inch your way into the icy liquid, allowing it to was off the essence of life soaked into your clothes and hair. Even though the cold it leaves stays in your bones, you can’t help but be grateful that the stench of iron is off your skin. You leave the free orative golden carving is on the left side near a golden toilet. The floor was a carefully designed marble with golden grout that majestically offset the white tile. Everything in the room is within two or three feat of each other, making the bathroom no bigger than five feet on each side. You reluctantly walk into the room and like all the other rooms the door snaps behind you, the sound of gears locking into place coming from the other side. \n\nYou study the bathroom for a moment, searching for an exit when a strange odor passes through you nostrils. It's faint but alarming, the way it lingers in the air. You begin investigating the area, searching for the smell. You start with the shower above the tub, the smell was strongest there. Next was the faucet, where the smell concentrated as well. Out of curiosity you go over to the sink and again, the smell was prevalent. Finally, you wander to the toilet. The seat was down, but you know the odor was seeping from beneath. There's something in the pipes, and you're sure it's not water.\n*choice\n #Open the toilet\n  Against your better judgement, you begin to lift up the toilet seat slowly, \n  the smell growing stronger as you begin to peak underneath. \n  You lift the seat up and begin to gag at the mere sight of what was inside the bowl.\n\n  Blood. Blood filled to the very rim. \n  The smell of blood began to fill the room when the toilet began making a gurgling sound. \n  That’s when you see the toilet begin to flood and pour over. \n  You hear the sound of pipes opening behind you.\n  You look around to see that every faucet was pouring out blood at full power. \n  You look at the walls and see that there are now holes in the walls that pour in \n  gallon upon gallon of blood by the minute. If you don’t act fast, this is where you’ll drown\n  *goto bloodbath\n #Turn the shower on\n  You walk away from the golden porcelain throne and go to investigate the shower head. You examine the shower in great detail, taking it off as you begin to remember that this place is swarming with monsters and every room could be a death trap, so you begin to think of a way out. You look around the inconspicuous room from the tub, searching for anything that could be a clue, a strange knob, a misshapen tile, something on the mirror, and come to find nothing. WIth that you take a deep breath,  ‘if I’m going to die, I’m going to die relaxing in a fancy tub’ you tell yourself as you reach for the faucet and turning it on.\n  *page_break\n  That’s when the regularly scheduled nightmare continued. From the tub faucet, blood began to gush out and fill the bottom. You let out a shriek as blood began seeping in from the walls, pour forth from the toilet, welling from the sink, and pouring from the shower head. You try to squirm out of the tub, but the sides have become slick from the washing of life elixir, causing you to fall deeper into it. As the tube began to fill and you continued to struggle escaping, you hear from beneath you a strange sound. It’s similar to the sound of a funnel, liquid gushing downward into someplace below. That’s when you look down and the tub floor opened, transforming into a slide that you clumsily slip down, a cascade of rich red nectar guiding you down into a lightless, wet, murky horizontal tunnel with no idea of where you’ll end up.\n  *achieve bloodbath\n  *set enterbasementthroughbathroom +1 \n  *goto_scene basement\n #Turn on the sink\n  You walk away from the toilet and towards the sink. You apprehensively reach for one of the handles, unsure of what will come next once you turn that handle.Nevertheless, you need to get out of here. So you turn the sink handle, and what you see next causes you to jump back onto the tub and let out a scream.\n  *page_break  \n  It’s blood. Blood that began to gush out of the sink and fill the basin until it eventually poured over onto the floor. That’s when you hear the sound of a pipe opening behind you. You turn around and look up into the shower just in time to have blood splashed onto your face, the smell of iron flooding your nostrils as it seeped into your nose. You gag and spit, nearly throwing up in your mouth before wiping the blood from you face and noticing that there are now holes in the wall that were also pouring in gallons of blood every passing moment. There has to be a way out of here, you tell yourself, this is not how I die.\n  *goto bloodbath\n  *label bloodbath\n  *Choice\n   #Turn the sink off \n    You slush through the nectar of life over to the sink, hoping that if you turn it off it will at least slow the flow down. You reach for the handle and turn it,\n    *page_break\n    Snap. Not only does the handle break off in your hand, but the blood coming from the sink intensifies, the basin shaking furiously as more blood begins to spout out at thrice the rate it was before. Now you are up to your waist in the rich liquid as it climbs faster and faster, the ceiling not far from your head meaning that once it reaches the top, there’s nowhere to go. Before you can react, the blood has run out of room\n    *page_break\n    And you have run out of air.\n    *goto retry\n   #Turn off the shower\n    You trot through the thick fluid towards the shower which was spewing out blood overhead. You reach over into the tub and turn the handle for the shower, hoping that it will end this disgusting madness.\n    *page_break\n    When the shower head flew off from the pressure of dozens of gallons of blood suddenly pushing forward. Blood splashed everywhere and lands in your nose and eyes. You scream in terror and revulsion as you wipe the liquid from your face. You look down and see that the liquid is seeping upward with every second. Eventually it reaches up to your neck, and you struggle to take your last few breaths, you struggle to think what could have saved you from this. Nothing comes to mind as you’re finally consumed by the red warm goopy fluid now filling your lungs and nostrils. A final bath in a mansion of death        \n    *page_break\n    *goto retry\n    *label retry\n    Retry?\n    *choice          \n     #Yes\n      *goto_scene bathroom\n     #No\n      *goto_scene ending\n   #Turn off tub faucet\n    Desperate to escape, you slush through the thick crimson flood towards the tub. \n    You reach for the faucet and turn it furiously, not sure what will happen but finding no other options. \n    For a moment, nothing happens, the bathroom continues to fill with blood with every passing moment. \n    A sensation of hopelessness pass over you and you begin to sink to your knees in defeat. \n    Just as you accepted your fate, you see something strange begin to happen inside at the bottom of the tub. The sound of liquid cascading downward is followed by the bottom of the tub opening horizontally into some sort of slide. The slide was quickly lubricated with blood and lead into a deep, murky darkness. Finding no other route to safety, You take a deep breath and slip down slide into an unknown abyss.\n    *achieve bloodbath\n    *set enterbasementthroughbathroom +1  \n    *goto_scene basement\n   #Flush the toilet\n    You march through the ever tiding ocean of blood towards the toilet, \n    hoping maybe that this is the key to your escape. \n    As you walk with full determination, you lose your footing and slip forward. \n    You hit your head on the toilet tank and your head lands in the toilet, \n    your face now ear deep in a throne of blood. \n    As you struggle to get up, your hands now slick with blood, you slip again, \n    this time flushing the toilet as your face is still inside. Instead of the red thick liquid going down, the toilet instead begins to pour over, filling your lungs and nostrils with blood. You attempt to stand again, the blood flooding all around you making the floor slick and slippery, flooding the room with every second. After what felt like an eternity, you finally get to your feet, and before you can appreciate your survival of the ordeal, you begin to vomit profusely, your body’s natural reaction to evacuating your stomach, your minds natural reaction to swallowing someone else's blood.\n    *page_break\n    You vomit until your stomach's contents are completely drained, your body’s energy spent from the action, the shock of it all taking its toll. Against your own will you fall into the life elixir, no strength left to keep you standing upright. There you lay as your body begins to be filled with blood, the oxygen left in you body begins to deplete, and all you see before everything goes dark is never ending sea of red.\n    *goto retry\n   #Turn the Shower on\n    You march through the crimson tide as wave after wave of noxious hemoglobin fill the room. It’s nearly to your waist, the tub has already been submerged with nothing but the shower and the handles still in view. You reach for the handle and turn desperately, hoping that this will be the end of the literal bloodbath. A moment passes, the sound of gushing blood the only sound, when you hear something coming from the shower head.\n    *page_break  \n    You look up to the shower head and listen to the sound of immense pressure building up, and before you have time to react, the shower head flies off and smashes into your skull. A moment of shock passes as you stumble backwards in the rich, warm fluid all around you, then the pain set in as you fall backwards and become engulfed in the dense soup, and lastly, panic as you struggle for air and try to pull yourself above the red tide.\n    *page_break\n    You immediately get up but are still submerged. \n    That’s when you push yourself to stand, and still, you can’t seem to find your way back to air. \n    Finally you do what you hadn’t expected and try to swim to the top, so you propel your body upward, further and further until,\n    *page_break\n    You reach the ceiling. The room is now filled to the brim with blood. You push against the metal ceiling to no avail, punching the top as blood fills your nostrils. You let out a scream and blood begins to invade your lungs, causing you to gag and drown all at once. Finally your body loses strength as you use your energy to escape,  your body losing oxygen and your mind repulsed and terrified. Then what was once red begins to fade to black.\n    *goto retry\n\n", "blueprintgallery": "*page_break Next Scene: The Journal of a lost soul\n\nYou walk into a dimly lit room from the ominous darkness. It’s illuminated by dim, buzzing light bulbs, the sound of electricity funnels through the air. On the walls are blueprints stacked one on top of another, images of hallways that circle forever and stairs that lead nowhere. A desk sits across from you with scatter documents, notes and drawings from many years ago. You recognize some of these designs, instruments of the torture you’ve had to endure. Others evade your knowledge, but their design frightens your inner instinct. You know every sketch here is a part of this house. You examine the blueprints in more detail, and as tattered as they are you notice something about some of them; they’re covered in blood. Fingerprints of red iron stain some of the parchment, others have scrambled notes in different languages or illiterate handwriting. \nOne message sticks out to you with large, red frantic writing. \n*page_break\nGET OUT\n*page_break\nYou shutter at the words as a chill crawls up your spine and tingles the back of your neck. There’s pain in this room. You can feel it ebbing from the walls and onto your skin. You’ve stayed too long in this terrible place, and all you can think about is getting out. You search the room desperately trying to find a way out. A lever, a button, anything. Nothing. All this room has to offer is structured of death and souls lost in writing. You go over to the desk and I’m a frustrated hopelessness shove the papers to the floor, slamming your fist into the table. \n*page_break\nThat’s when you hear a distinctive click from below you. You look down and see an open drawer, a small journal is it’s only content. Out of everything here, this may have the only clues you need to escape. At the very least, you were able to read a book before you die. So you pick up the journal, and begin to read:\n*page_break\nFourth day of the month of  April, year 1890\nI have finally done it. I have finished my perfect home. The Malyce Mansion, a beauty in its own right. It took five painstaking long years to get everything right. The perfect wood, metal, stone, all were need to create this masterpiece. Every room in this house an oasis and as a whole it is a paradise. I’ve grown older these past years, spending the fortunes I collected to ensure that I have the perfect place to retire too, but it was all worth it to know so will have peace in the luxurious place. \n*page_break\nFifteenth day of June, 1890\nIt’s been raining for the last two weeks. The pouring water gives me comfort as I know I will not be disturbed. That did not, however, prevent the riff raff from stumbling upon my door this evening. A filthy hag covered in muck and grime did dare to show up on my doorstep, asking to wash and spend the night. Of course I turned her away, not letting a drop of mud into my beautiful home. Like the urchin she was, she cussed me and bellowed out some hogwash curse, saying that my soul will be bound to eternity or something or other. I quickly closed the door and went about my night. No one in their right mind believes in such foolishness. \n*page_break\nTwentieth day of June, year 1890\nThe rain has ceased since I last wrote, yet I still feel as if I have contracted some sort of ailment. My bones ache and I am beginning to have shortness of breath. Perhaps something contracted from the harlot that assumed she would step foot in my home. Indeed, the witch did curse me. She cursed me with a mild cold that a serving of whiskey and a good night's rest could cure. I’ll be sending for a doctor if need be. \n*page_break\nTwenty-fifth day of June, year 1890\nIn my recent illness, I have had no energy to keep my glorious home up to standards. It has recently fallen into a state of disrepair, the wood begins to rot and the stone begins to mold. It also seems that the more my home seems to fall apart, the more my health deteriorates. Perhaps the hag that visited so many nights ago did something to my glorious mansion, and by extension something to me. I sincerely doubt anything regarding witchcraft is at play, however she most likely contracted me with some bug or disease crawling from her seeping skin. I’ll contact a doctor first thing in the morrow to see what can be done about my ailment.\n*page_break\nTwenty-sixth day of June, 1890\nThis fool of a medical practitioner should have his license revoked. The imbecile claims there is nothing physically wrong with me, despite the fact that I am clearly in agony. Does he belief that I am making this up? That my symptoms are a figment of my imagination? Preposterous. The moron, the fool. My agony is as clear as day. Regardless of his prognosis, I must find a way to end this suffering. Maybe it’s time to contact an force outside natural means. Maybe there’s other forces at play that must be explored.\n*page_break\nTwenty-seventh day of June, 1890\nI went into the nearby town and requested consultation from a self-proclaimed fortune teller. I hold no beliefs in the supernatural, but after everything I have experienced these last few days, I am willing to take a step of faith. What the woman had to say was enough to cause my skin to crawl. I explained my predicament with very little detail, telling her I believe someone has wished ill fortune on me. As if she was there, she told me the exact words of the hag who had cursed my name. She explained that the witch had bound my soul to my mansion, and that the further the mansion fell into decay, so my health would follow. I still don’t know what to make of the situation. Without another word, I left immediately, I needed to get back to my home, to repair my crumbling kingdom, and hopefully, by extension, myself.\n*page_break\nThirtieth day of June, 1890\nIt’s been three days since I began nonstop repairs. I hired a group to complete around the clock repair through the day and night, until I was satisfied with my home. The contractors seemed to have a grudge against me for having them work so hard, but they were well compensated so they have nothing to gripe about. My health has also increased greatly since making the repairs and my home is now as immaculate as ever. If this proclaimed curse has even the slightest ounce of credibility, then all I have to do is keep my home in top shape, a priority of my life long before interruptions of certain characters. It seems I have nothing to fear.\n*page_break\nSecond day of July, 1890\nDespite all the repairs and the countless additions I have made to the mansion, my health has continued to decline. The constant visits to the practitioner in town are also of no avail. Whatever damned cursed or unknown illness is causing this, it is certain that this is the end for me. Before I leave this mortal plane, I must take this dark mansion with me. Tonight, at the stroke of midnight, I shall burn my prized possession to the ground. As so no one will think I have simply gone mad, I will explain here in my journal why this house must face destruction. Simply put, I do not wish for my home to be vandalized by whomever may take it next, since this is my life’s work. Moreover, I do not wish the terrible fate bestowed on me on anyone, and if this deadly omen is a product of this place, then it must be destroyed as well. May God have mercy on our souls.\n*page_break\nThe last two pages of the journal were torn out from the spine, your mind wonders as to what secrets could be written on those two missing pages. Before your imagination takes the better of you, you hear the sound of gears twisting behind the wall in front of you. A slow creaking shakes the room as the wall in front of you begins to rise, revealing a dimly lit hallway on the other side. You pause for a moment, suspense and fear freezing your body in place as an ominous breeze flows into the room from the dark corridor. You look behind you to see if you can leave the way you came in but all you find is a door completely sealed shut. It becomes clear there is only one thing to do. You need to keep moving forward\n*achieve architect\n*set entergrandhallthroughblueprintgallery +1\n*goto_scene grandhall\n", "choicescript_description": "You wake up, confused, in a strange place. A place determined to kill you. A haunted house. Will you leave with your life, or be trapped in undead servitude?\n\nMacabre Mansion is a 43,000-word interactive horror novel by Billy Towers, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\nWhen you find yourself in a strange room, in a strange house, with blood splattered across the walls and on the floor...you try to recall how you got there. But you remember nothing. There is an ominous aura here, the smell of death lingering in the air.\n\nThere is one thing you now know; you need to leave if you want to stay alive.\n\n• Play as male, female, or non-binary.\n• Travel through a cursed mansion that wants your soul.\n• Solve puzzles, avoid traps, and escape your undead captors.\n• Encounter the tormented souls that haunt every corridor.\n• Discover the secrets that hide behind the house’s walls.\n• Survive the night and change the fate of the mansion.", "choicescript_stats": "*stat_chart\n text name\n text gender\n text sanity", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n [b]Macabre Mansion[/b]\n\n You wake up, confused, in a strange place. A place determined to kill you. A haunted house. Will you leave wit
