*page_break\n          As the ceiling slowly reaches you, you look down and close your eyes and hope you were not wrong, hoping with all your mental strength you were not wrong. That when you feel something heavy in your hands and hear the sound of something crashing to the floor. You hear the sound of objects being crushed all around. The fact that you are still standing means it was not you. You open your eyes and see that you have gone straight through the ceiling the bloodless slab sitting comfortably in your hands. You hear the sound of a door unlock and slowly open, the sound of roaring applause from the other side. That is when an eerie truth hits you. You are not alone.\n          *achieve pusher\n          *goto secondhall\n\n       #Go through the right door\n        You reach your hand for the door to the right, your heart racing in anticipation of what horror waits behind that door.\n        *Goto library\n        *label library\n        *page_break Scene: Abandoned Library, a Chapter Closed\n        You walk through the door to the right to see a wide room with shelves filled with dust covered books aligned along the bottom half of the walls going up halfway to the ceiling. \n        On the other side of the barely visible room was a single door,\n        a candle above it. As you skeptically take a few more steps in,\n        the door behind you slams shut and the sound of gears can be heard \n        from behind the shelves as they slowly inch toward you. You turn to push open the door you came through but it will not budge. You need to find another way out.\n        *Choice\n         #Run for the door on the opposite side\n          You run towards the door in a full sprint, candle still in hand the walls on either side of you still coming closer by the moment. When you reach the door, you hit your head on what feels like stone. \n          *page_break\n          You fall to the ground in pain before looking up and see the door for what is actually is; A very well painted portrait on a stone canvas. You go to let out a scream of anger, but before you do you see something strange about this painting that you could not see before. It is a bright white arrow, now illuminated in the light of the candle, pointing up. You look up to see that only the bottom half of the wall with the shelves is coming closer, the upper half unchanged. Maybe that is your way out. Seeing this, you climb the shelves as they close in on you, trying desperately to reach the top as quickly as you can. You push yourself as you feel the room around you shrinking. You reach the top of the shelves, gasping for breath at your perilous ordeal. Between your long deep inhales, you hear a sound coming from a door that seems to have light coming from the other side. You have heard this sound before, the sound of thunderous applause.\n          *check_achievements\n          *achieve librarian\n          *goto secondhall\n\n         #Climb the shelves\n          You look in both directions and see the shelves on both sides are filled edge to edge with dust covered literatue. Afterwards you look up And notice the shelves do not reach the ceiling. Instinctively you begin to climb the shelves, going further and further up the seemingly endless bookcase. You climb fiercely to the top, your goal only a few inches away. Finally you reach the ledge and pull yourself up onto the top of the enclosing shelves just as they slam together with terrible force. You catch your breath for a moment, taking in how grateful you are to be alive when a door on the far side of the room opens, a bright light shining from behind it. From behind the door your hear the roar of an excited crowd, claps and praises from somewhere both here and far beyond. That is when the truth settles in. You are not alone, and this is the start of the longest night of your life.\n          *check_achievements\n          *achieve librarian\n          *goto secondhall\n\n         #Push the shelves\n          You shove your body against the shelves, pushing with all your might. The shelves refuse to budge, constantly moving closer to the center of the room. You take a breath, looking up and hoping for an answer to come from above. \n          *page_break\n          You find it. The ceiling goes much further up than the shelves closing in. You begin your climb over the shelves, both coming closer together with each passing moment. You reach desperately for shelf after shelf trying to reach the very top, trying to avoid being crushed by literature of centuries passed. After sore arms and tired legs, you reach the top of the shelves, the wood beneath you crashing into each other with a force strong enough to knock you off balance. You manage to keep your footing, steadying yourself from the shock of the collision. As you take a moment to assess what happened, you hear the sound of cheers and clapping coming from behind you. You turn around to see a door slightly open with a bright light coming from behind it, the source of the commotion you hear. Whatev  er is behind that door, two things are certain; it cannot be good, and you cannot avoid it.\n          *check_achievements\n          *achieve librarian\n          *goto secondhall\n          *label secondhall\n          *page_break Scene: Fright or Flight Down the Hall of Night\n          You walk out of the room that you were nearly crushed in, the shock and horror of the experience still fresh in your mind as you wander down the dark hallway in front of you. \n          Your way is barely lit by candles on dark iron fixtures high above the floor that spread out further and further with each step. \n          You search the hallway for the source of the applause and cheering you heard earlier. There is nothing here except the paintings hanging from the walls. In the dim light you see portraits of people lining the burgundy wall; some old, some young, Caucasian, Black, Asian, men, women, all with one thing in common.\n\n          They were all dead. Covered in blood, some missing limbs, others engulfed in flames, \n          some were frozen blue, covered in insects, several stab wounds, \n          bodies drained of blood, each one suffering a terrible death, the next worse than the last. \n          It never seems to end. you keep track of their faces and any other features. \n          One face you see is a young fair skinned woman with black hair, green eyes, \n          a small beauty mark under her left eye. She was wearing an old dress, something straight out of the renaissance fair. There was one more distinguishing feature that truly stood out to you... \n          She had a dagger in her chest. It was the sorrow in her eyes that catches your attention. The rest of the faces in the portraits had horror, anguish, anger, resentment, regret: her face, her face was full of sorrow as blood seeped into her Victorian style dress.\n          You could not bear to look anymore,the image of so many tortured faces forever imprinted in your brain as the hall you traverse grows dimmer and dimmer, the candles lighting your path growing further apart. Two every few steps, then one, then,\n          Darkness. You stumble through the darkness, keeping forward as you cautiously track every footstep you take into the void. The silence is haunting, all you hear is your own breathing, footsteps and your heart. Although your heart is pounding, your breath and footsteps remain steady, as voice inside you tells you to relax, and to not be afraid of the dark.\n          Until you hear another set of footsteps from behind you. You turn around to see in the distance far behind you, the dim light of a candle racing toward you.\n          *choice\n           #Call out to whoever is holding the candle\n            You call out to the person in the darkness...\n  \n            No response. You call out again, take an apprehensive step back as the candle seems to float closer to you. Again no response. You go to call out once more as the candle floats towards you at an almost inhuman rate. As the candle closes in, you begin to make out a face. It is at that moment, the candle is suddenly snuffed out. You are engulfed in darkness once more, your heart beating hard, your breathing accelerated and your body shaking. You break into a cold sweat as a realization sweeps over you.\n  \n            You're being hunted. Terror grips your body and you are unable to move. It is as if something is holding you in place. You look down at your hand and you see your fears encarniated. A cold hand grasping your wrist in a tight embrace. You look up with widened eyes as a candle sparks to life in front of you and the sight that greets you comes straight from nightmares.\n   \n            In front of you was a woman in a maids outfit, long flowing black hair, her skin as pale as a ghost, a strange white mask with blood splatters covering her face and a bloodless gash splitting her chest, \n  \n            \"Oh, there you are.\"\n            *page_break\n            She said gleefully in an otherworldly voice that sent shivers down your spine. You go to let out a scream, but all that comes out is a low gasp. She lets go of your wrist and puts her finger over her lips and whispers with a chill inducing giggle;\n            *page_break\n            \"Save that part for later, dear. The fun is just getting started...\"\n            *page_break Sleep now...\n            Before you can think of your next move she blew out the candle and you fall into a deep slumber. You are not sure if you will  ever wake up from it.\n            *set sanity -10\n            *goto_scene amphitheater\n           #Run\n            You turn away from the candle and dash head first into the darkness in front of you. You run, run, and keep running deeper into the seemingly endless darkness, occasionally turning back to see if your pursuer is still after you.\n            *page_break\n            They are. The mysterious candle is closing in on you, \n            enshrouded in shadows as it grows brighter with every second. \n            Your heart is pounding, your legs are beginning to tense, but your mind has only one thought; \n            escape. Get away at all costs. \n            With that thought you pull through and continue to sprint further and further away from the light. \n            It is almost out of view when,\n            *goto stairway\n            *label stairway\n            You miss the first step. Or rather, You now know there are stairs in front of you. \n            You tumble down them wooden steps at an incredible speed, \n            momentum from running away from the holder of the candle. \n            As you fall you hit every stair, slamming your arms, legs, knees, and head \n            as you crash into the landing at the bottom, your head spinning from the constant barrel roll and the \n            concussion you probably have. You lay on the floor for a moment, waiting for your vision to align with \n            the hallway that seems to be rocking from side to side in the dim candlelight. \n            You slowly get to your feet and see in front of you a wall with arrows pointing \n            down either direction of the hall. \n            Above the left arrow is a painting of a man standing over a pile of skulls with a golden label \n            beneath it inscribed Bean. \n            above the right arrow is the painting of a woman in a golden bathtub filled with blood. \n            Beneath the painting was a plaque labeled The Countess. \n            You stand bewildered for a moment, trying to shake off the anguish caused by jumping down a flight of stairs. \n            That’s when you hear footsteps coming from the staircase, slowly but steadily making their way towards you. If you want to get away, you have to act now.\n            *choice\n             #Go left\n              You run down the hall with the painting of Bean, \n              hoping to make your escape from whatever horrors that candle was about to bear.\n              *goto_scene diningroom\n       \n             #Go right \n              You begin your journey down the hall with the painting of the Countess, \n              dashing forward in an attempt to escape the nightmares far behind you\n              *goto_scene bathroom\n\n\n\n", "galleryhallway": "*page_break Next Scene: A Painting Worth One Thousand Screams\n*If entergalleryhallwaythroughironmaidenroom >0\n You push the iron maiden open to find yourself in a dimly lit hallway. \n The light flicking around you is from small candles below portraits of decomposing corpses. You quickly avert your eyes and begin to walk down the hall, keeping your glare on the floor beneath you. You’re so focused on the blood stained carpet that you almost didn’t notice the sensation of someone breathing down your neck. \n *page_break\n Almost. it is then that you freeze, frozen in fear of what is going to happen next. The breathing continues, slow and heavy, for what feels like an eternity, until the raspy, unearthly voice whispers into your ear only one word,\n *page_break\n \"Run.\"\n *goto artshow\n*else\n You pass through the room with the strange statue to find yourself in a long corridor, dimly lit with candles. Near each candle were paintings eerily similar to the ones you had passed in the hallways before. Monuments to terrible and gruesome deaths. As you walk down the shadowy hallway, trying to avoid looking at the portraits of mangled faces and burned flesh, you cannot explain this sensation that consumes your existence. That ever too familiar feeling that someone is watching you. You keep your eyes to the floor, hoping that you can avoid whatever is following you in this dark and forsaken place. You begin to walk faster, your heart racing as you try to remain calm, the sensation of something whispering just behind you creepily sneaking up on you. \n *page_break\n Don't turn around, you tell yourself, don't turn around. Don't turn around to whatever is behind you, \n whatever is breathing down your neck, whatever cold, forgotten creature is just behind you. Do not turn to it.\n *page_break\n That is when you hear a clear but utterance just in your ear, \"Run.\" A silent voice whispered in your ear. The chilling, decrepit voice sends a shiver down your spine, your nerves tingle on every inch of your skin and your hairs stand on end. Against your instinct tells you to turn around, your mind is telling you to follow what the disturbing voice told you to do. There you stand, unsure what to do next, but sure that your had to do something.\n *goto artshow\n\n*label artshow\n*Choice\n  #Run\n   You summon what nerve you have and push your legs forward, dashing forward with all your might. You run as fast as your legs can carry you, getting as much space between you and the voice following close behind, “Run, run!” the voice wails as it became fainter and fainter in the distance. Ahead of you is a wall with a mural  of a mangled corpse pile that stretched from the floor to the ceiling. You begin to slow down, wondering where to go to next, when the voice from before began to close in again, growing closer with every second.\n   *page_break\n   No other choice, if you want to get away from the horrors behind you, you have to keep running. So you dash at full speed, hoping that something about this painting a few feet in front of you has the answer to surviving. You slow down as you reach the woman’s portrait and place your hands out in front of you, trying to reach for a secret handle or button or something to let you through.\n   *page_break\n   Instead, you fall right through the parchment, landing on a hardwood floor on the other side. Behind you, you hear the sound of something large coming down and locking into place. You turn around to see a large metal wall where the hole you made used to be. You lay on the ground, trying not to think about what terrible creature could have been behind you, or possibly worse, what horrors are waiting for you in this room.\n   *goto_scene deathgallery\n  #Turn around.\n   You slowly begin to turn, trying to prepare yourself for the source of the ghostly noises. You eventually turn around,\n   *page_break\n   And let out a horror filled shriek.\n   *page_break\n   Standing behind you, in a blood and dirt stained suit, stood an elderly man, pale as the dead, with bleeding sockets where his eyes should be, “You should have ran.” He said with a haunting, otherworldly voice.\n   *page_break\n   He reached out and put his hand on your shoulder, and the moment he does your mind fills with images of death and torture, humans being ripped limb from limb, burned alive, impaled on pikes, bones twisted and flesh crushed, devoured by rabid animals, dosed with acid, and many more gruesome executions. The images continued for what felt like hours, each new one more demented than the last. You scream from the horror of it all when,\n   *page_break\n   It stopped, and as your senses return to you all you see is darkness all around. A few feet in front of you, you see a small flickering light. You hope this is what will lead you from the darkness\n   *set sanity -10\n   *goto_scene electricgallery\n", "grandfinale": "*page_break\nCongratulations!\n*page_break\nYou open the door to be greeted by thunderous applause. As your eyes adjust to the light, you see several undead servants lined up on either side of you, clapping their clammy pale hands in celebration.\n*page_break\nCelebration of you.\n*page_break\nYou hesitate for a moment, fear holding you in place as you receive praise and adoration. It continues on like this, clapping and cheers from the lost souls, then suddenly.\n*page_break step, step, step\nThey all go silent, arms at their sides as the sound of heavy footsteps fills the air. The look on their rotted faces says it all.\n*page_break\nAt the end of those footsteps, on the other end of the undead legion, stood a figure with an iron cage over their head wearing a tattered and worn black suit, “Welcome.” They announced, their voice screeching and breaking as if their vocal cords had been ripped to shreds. The figure walked towards you calmly, every step with their leather shoes shaking the foundation of the house. You are stunned, whether it be in fear or some supernatural force you are uncertain, all you know is that you cannot move.\n*page_break\nSoon, they are standing right next to you, hand on your shoulder, and suddenly your legs have feeling again. They gently guide you through the lined crowd of walking corpses towards large red oak double doors that now come into view. You look around to see large granite pillars holding the ceiling, a polished floor beneath you. This is the way home.\n*page_break\nThe ghastly figure stops you five feet before you reach the exit, a moment of silence fills the air between you before they begin to reach into their pocket, “You have reached the end of our glorious tour, thank you for visiting.” They say plainly as a large dagger with a red handle is produced from their jacket. You tense your body, taking a defensive step back. The figure chuckles, looking towards the door, “The item I hold in my hand is the key to leaving this beautiful mansion.” They put their hand on the center where the double doors meet. When they remove their hand, a small diamond shaped hole appears, where something thin and smooth looks like it can be placed.\n*page_break\nSomething like the dagger the iron masked figure now handed to you. You stand in confused horror, looking at the pristine blade presented to you, apprehensive with what steps to take next. You feel the pressure of several soulless eyes staring at you, and realize your decision must be swift. It must be now.\n\n*if sanity >0\n *choice\n  #Unlock the door\n   You take a moment to decide what to do next, holding the daggers’ handle tight in your hand. You know one thing for sure. You just want to go home. You turn back to the door and slide the dagger into the slot before you. Before you can make your next move, the figure in the mask grabs you by the wrist. You turn to them in shock, feeling their body tremble from the grip on your arm, “Please, help me.” They muttered silently. Not a moment later, another hand reached out and grabbed the figure by the arm, “My, my, that won’t do.”\n   *page_break\n   Both the masked figure and yourself turn to see a woman with a deep gash in her chest gripping the tattered suit, “You know the rules.” You felt her squeeze tight onto the figures wrist, hearing the bone shatter in his arms down to his fingers. The figure shrieked in agony, falling to their knees. At that moment, the blade in the door twisted and behind you the sound of wood creaking fills the air. You turn around to see the door wide open, a wooded area waiting just beyond its borders. You felt the fresh air from a breeze enter inside, the smell of fresh rain filling your senses, “you are free to leave.” the ghoulish woman chuckled. You don’t bother turning back, knowing that you will most likely be ensued in some other form of torture or cruelty, so you march out, one foot after another, until you are no longer near the mansion, “Come back soon.” You hear a dark, cruel voice cackle right before the sound of doors closing. You wait for your body to stop shaking, which feels like an eternity. When you even    tually regain some sense of calm, you turn around, just to confirm to yourself that everything you saw, everything you did, was real.\n   *page_break\n   All you see is an open field covered in black soil where even the grass refuses to grow. You sigh deeply, panic flowing away as you breathe out and relief flowing toward you as you breathe in.\n   *page_break\n   This night is finally over.\n   *page_break\n\n   *if karenlives >0\n    A few moments later you hear the sound of footsteps behind you. Your heart beats so fast you can feel it in your throat, fear taking over your senses again, “Hey,” you hear a familiar voice call out to you. You turn around in joy to see Karen smiling at you, “Let’s go home.” \n    *achieve survivor\n    *goto_scene ending\n\n   *else\n    You turn away from the dark place, knowing you are safe now. Knowing it is time to go home.\n    *achieve survivor\n    *goto_scene ending\n  #Stab the master\n   You hold the cold steel in your hand, feeling the wait of the dagger in your palms.\n   *page_break\n   This ends here, this has to end here.\n   *page_break\n   You grab the figure by their shoulder and thrust the blade deep into their stomach.\n   you push the blade deep, making sure that the job is done. you here them gasp for\n   their last breath, surprised to hear at the end of it, a long, relieved sigh,\n   *page_break \"Thank you\"\n   It's then you see them fall to the ground backwards, their arms open wide for deaths embrace\n   before they hit the floor in a conclusive crash. This nightmare is over.\n   *page_break\n   At least for them. You watch the steel cage that encompassed the figures' head open horizontal\n   to reveal a face mutilated with scars and burns. You try to let out a scream but something has\n   you by the throat.\n   *page_break\n   As you chocke for air you look down to see a dead pale hand wrapped firmly against your throat,\n   \"How exciting.\" You hear a chillng voice cheer as a maid with a large gash in her chest\n   walked over to the previously masked figures body, \"We haven't had a new master in such a long time.\"\n   She picked up the cage-like helmet and began to walk toward you, taking slow and meaningful steps.\n   *page_break\n   You try to break free from the grasp around your neck but all you feel are twisted nails dig into your skin.\n   It's not long after you see the helmet from the inside, iron spikes rusted and bloodied,\n   *page_break\n   now digging into your face as the gashed woman clamps the steel cage onto your head.\n   *page_break\n   You are released from the dead hand, and you feel the flesh in your neck\n   twist back together, allowing you one agony induced scream before you hear the final words of the night.\n   *page_break\n   \"Welcome home.\"\n   *achieve househead\n   *goto_scene ending\n*else\n *page_break\n You ponder for a moment, thinking of what to do next. That’s when a thought occurred to you. A thought of the malice in this place, the pain it caused you, the pain it caused others, the pain it will continue to cause if this horror stands. If this person stands. In the spiraling thought process of pain and agony, something in you,\n *page_break\n Snaps.\n *page_break\n You lift the dagger with your hand pointing downward and thrust it into the masked figures’ chest. You hear them give a shocked gasp as blood soon filled their throat and mouth. Between the gagging and gurgling of the iron masks’ final moments, you hear something that shakes you to your core. Laughing. From the coughing, bleeding creature now on the floor dying, you could hear laughing.\n *page_break\n It doesn’t matter anymore. They are dead, and it is over. You turn back to the doors that lead out of the mansion.\n *page_break.\n Only to find that there are no doors. Just a brick wall in front of you with a small, hand painted sign that reads “Welcome home.”\n *page_break\n You turn back around to see a woman in a maids outfit with a gash in her chest, the dagger that was in your hand now firmly in her grasp. Before you can react she swipes the blade across your throat, blood spurts from your neck as you fall to your knees in pain and horror, “Yes, yes I knew I saw potential in you.” She gave a confident chuckle as she walked toward the masked figure. As you try to cover your neck to stop the bleeding, you watch her remove the iron helmet from the figure, seeing it split in half to unlock, “It’s been so long since we’ve had a new master, this is quite exciting.” You try to scream but all you get is bubbles of blood. You watch the pale skinned woman walk towards you with a smile, the two halves of the cage-like helmet in her hands. On the inner workings of the helm, you see iron spikes that were rusted and covered in blood. You give one final gasp for air before the dead maid locks the helmet around your head, tiny needles stabbing into your flesh as you feel the skin from your   slit throat pulls back together, allowing you to take in hollow breaths. \n *page_break\n You are finally to release a pain-filled shriek, your voice scarred and deformed. You weep in defeated sorrow, the dead woman smiling gently down at you, “Thank you for becoming a part of our wonderful estate.” She said sweetly, a twisted grin spread across her face,\n *page_break\n “Welcome home.”\n *achieve househead\n *goto_scene ending", "grandhall": "*page_break Last scene: Home\n*if entergrandhallthroughblueprintgallery >0\n You walk calmly through the shadow canvassed hall, noticing hastily spelled words carved into the wood of the walls. You slow your pace to get a closer look and see there is one phrase that circulated the perimeter of this corridor; don’t eat me.\n *page_break\n It repeats, over and over again, carved into the wood on the floors, walls and ceiling. Some appear to be carved from a sharp object, others were clearly made by fingertips. The phrase spiraled in all directions down the never ending chasm, until finally you arrive at door, the words don’t eat me no longer sliced neatly into wood, but now stained crimson into centuries old oak. You reach your hand out and grab the handle, the rot from the waterlogged entryway.\n *goto_scene grandfinale\n\n*if entergrandhallthroughcourtroom >0\n As you make your way down the dark hall, using your hands to guide your way against an adjacent wall. You travel a few feet before a warm breeze begins creeping up from behind you. You pause in reluctance, wondering where this heated air could be coming from.\n *page_break\n Not long after you find out. A bright light soon illuminated the hall behind you, growing brighter with every passing second. You turn around to see the source of this illumination. A figure running towards you, fully ablaze, a bright ball of burning silence as the words, FIRE, SCREAM, and BURN fly off of the surface into the air. You put yourself against the wall as the figure hurries past you, flames and letter scattering about. One of those fiery words lands on a torch anchored to the wall, causing it to light the small portion of hallway you occupied. \n *page_break\n You carefully reach for the torch on the wall and manage to pull it down, using it to light your way through the inky black hall. The walls that surround you catch your attention, so you bring the torch closer. There on the parchment white walls were black letters scrambling about, moving incoherently around each other. They focus around the flame, scrambling into a heaped mess of ink on the wall. Soon after words jump from the ink blot and form the sentence KEEP GOING on the tattered wallpaper. You move back slowly, taking a moment to think about what you want to do next. The strange wallpaper is right you tell yourself. You have to keep going.\n *page_break\n You continue walking through the dark corridor, watching the letters on the wall scramble and dance around you. It doesn’t take you long to reach the end of the hall and find a large door waiting for you. You bring the flame closer to the door and see that the letters on the wall have come together to repeat one phrase over and over again;\n *page_break\n WelcomeHome\n *goto_scene grandfinale\n\n*if entergrandhallthroughfilmroom >0\n *if karendies >0\n  You enter through the door from the small room and come into a hallway illuminated with black and white footage on small screens down the hallway walls. You look left and right to find projections of families, businessmen, and friends being shown on each screen. One scene depicts a trial of some sort in order, a well dressed man stands in the center of the courtroom waving his arms dramatically as he points from one person to another. Another reel shows a young girl unwrapping Christmas presents with a woman sitting happily in a chair next to her. \n  *page_break\n  It only takes a few moments of analyzing to realize these are not films. These are memories. Something tells you this is the house's memories, going back all the way to the beginning. You look at each one as you walk down, before coming to the very one you were dreading to see.\n  *page_break\n  You watch again as you sentence your partner, your friend Karen to death. You watch as you boil her alive, steam melting the skin from her as she flails about in the glass prison. You did that, you tell yourself. You ended her life, “My, that was dramatic.” You hear a ghastly yet familiar voice say from behind you. You turn around quickly to see an image that makes your heart sink.\n  *page_break\n  Karen. A very dead Karen, her skin distorted and pale gray, wearing a maiden skirt, “Hey, ${name}” she says with a gentle smile. You open your mouth to say something, but no words come to mind, the air leaving your body, “I understand. It’s okay. This place,” She paused and turned to the memory of her death, “Can make you do terrible things. Just do me one favor.” She turned back to you with a stern face, “Please leave this place. Before it claims you too.”\n  *page_break\n  You give a nod to your fallen friend, who smiles in response. \n  She snaps her fingers and in that instant you are standing before a large door of black oak, “Until we meet again.” She said quietly, her body fading away in flashes of black and white, her film coming to an end. She vanishes, and you turn your attention to the door. Do it for Karen, you tell yourself. Leave this place.\n  *goto_scene grandfinale\n\n *if karenlives >0\n  You chase after the distraught Karen, paying no attention to the flashing lights from the screens anchored to the walls. All you know is you need to catch up to her. Catch her before the house does. You continue chasing until finally you see her, slumped up against a wall, her face buried in her knees. You approach carefully, stepping slowly to avoid making any sound.\n  *page_break\n  After your fourth step, a floorboard betrays you and lets out an ancient groan. You look up at Karen, who seems unfazed by the sound, “I looked at the walls.” She whispered, still not showing her face. You sit down opposite of her and look up at the flashing of black and white on the wall. They were old films rolling on loop. No, more than that, there was something familiar about them. Memories of this mansion. Above Karen was a very specific memory. The memory of her crying in the glass box at the dinner table, “You could have done it.” She muttered, “You could have saved yourself and walked away.” She stood up, wiping the tears from her face, “No matter whose fault it is, we need to get out of here.” Karen began to take a step toward you, still red in the face. You begin to relax, ready to make your path away from this hall.\n  *page_break\n  It is at that moment that a pair of dead, tattered arms reached out from the screen and wrapped themselves around Karen. She let out a scream that is muffled by a rotting hand covering her mouth as she is pulled into the cinematic horror. An eyeless face looked up at you from the movie, holding tight onto Karen and putting a finger over her lips. In an instant, the black and white screen holding Karen prisoner goes black, vanishing from the hall. Not a moment later, a light flickers on five feet away from you. Wherever she is now, Karen is gone, and you have to move forward.\n  *goto_scene grandfinale\n *else\n  You walk through the unlocked door and find yourself in a hallway with films reeling on the walls.\n  Black and white movies flicker on the screens lined the hall, showing every corner of the mansion.\n  *page_break\n  As if it was the house itself that was the one filming.\n  *page_break\n  It is not long until you find a memory of Karen, your lost friend.\n  You watch her weep in a glass box, a woman in a maidens' dress standing near her.\n  Your almost positive she will not survive the night.\n  *page_break\n  In that very instant, the woman in the maidens; dress turns to you, directly at you, \n  Her eyeless sockets staring into your soul. You pause in fear, \n  staring back, watching her closely, as if she was going to jump out of the screen.\n  *page_break\n  instead, she points to her right, ushering you to keep going down the hall.\n  *page_break\n  You heed her silent advice and continue down the dark corridor,\n  avoiding the screens on the wall until you reach the end,\n  a dark oak door that has been waiting patiently for you.\n  *page_break\n  You make sure it no longer needs to wait. You reach for the door handle and turn,\n  an instinct telling you that this is your final door.\n  *page_break\n  You are almost out.\n  *goto_scene grandfinale\n*if entergrandhallthroughmausoleum >0\n You leave the resting place of the small child and continue down the newly presented hall. It’s eerie and unsettling, like each hall before and the hall before that. There is something different about this particular hall, something that might have put you at ease if you had forgotten where you were. \n *page_break\n Humming. Gentle, rhythmic, soothful humming. You follow the hymn, listening carefully as it guided you down the infinite darkness. With every step you take it grows louder and louder until,\n *page_break\n It stops. You wait in your steps with baited breath, looking and listening for a sign of what you should do next. \n *page_break\n You soon find it. In the form of a lightbulb turning on at the end of the hallway. You skeptically take a step forward, then another skeptical step, until you eventually begin walking. As you grow closer you begin to notice something in the light. Someone sitting in a chair facing you, looking at something in their hands. With every step, they come into focus until you see them clear as day. \n *page_break\n The young girl from the glass coffin, in a white nightgown playing with a camera, “You finally made it.” She said with a smile, not looking up from her camera, “I was really rooting for you, honestly.” She looked up at you, her dead eyes glimmering in the dim candlelight, “Thanks for visiting me” with that she picked up the camera and snapped a picture of you, the flash from the bulb momentarily blinding your sight. \n *page_break\n As the flash begins to fade and your vision returns, you find that the girl and her camera are gone, replaced instead by a black oak door. Something deep inside tells you that this is the end. Your night is over. Once you walk through that door.\n *goto_scene grandfinale\n\n*if entergrandhallthroughoccultroom >0\n You continue to run down the dark hallway, unable to see ahead, your only goal being to distance yourself from the strange, terrifying woman. You run for what feels like an eternity, the addrenline pushing your every step. After a few difficult movements, you notice something beneath you is pushing back. You try to pick your feet up and are greeted with resistance, thicker than water, thinner than mud, it slows down every step as you slosh through the fluid hidden in shadows. You avoid thinking about what it could be, only knowing that it will most likely be another nightmare brought on by this terrible place.\n *page_break\n The constriction of muck around your ankles is not the only sensation this hallway offers. Orbs of light form from the air around you, revealing the floor to be drenched in thick, sludge-like swamp water. You continue your march through the marsh, the orbs of flickering light guiding you down the seemingly endless hall. With every step you take, another ball of light appears, until eventually you are completely surrounded by swirling lanterns formed from thin air. You are able to take a few more strides before the orbs break away from you, spinning into a blinding vortex before you very eyes before vanishing into the mucky swamp water.\n *page_break\n Again, you are left in the darkness. You wait a moment, knowing that every strange happening in this place comes with an even stranger reaction. You are not disappointed. You hear the water beneath you begin to bubble as a strange glow emerges deep beneath the foggy surface. You quickly take a step back as the bubbling grew more rapid. Bathed in light, a large rectangular structure slowly rose from the water. As quickly as the light came it faded to reveal a black oak door in your path. You hesitate for a moment, unsure of where this door may lead. Not long after, a sense of calm travels through your body, and you reach for the doorknob. You know this night is coming to an end.\n *goto_scene grandfinale\n\n*if entergrandhallthroughportraitgallery >0\n As you peer into the dark abyss of the hall, you become aware of an all too familiar feeling.\n *page_break\n The abyss is looking back at you. You wait a moment in the darkness, holding your breath for what might happen next. The response to your apprehension is the flick of a match that burns into a bright flame which is used to light a candle. You’ve been here before, and this time you would not be cut off guard. You ready yourself to turn around and in that moment the flame vanishes.\n *page_break\n You don’t wait for it to reappear. You spin on your heel as fast as you can to make your way from whence you came. Unfortunately it is not fast enough. You turn around to be greeted by a woman with a deep gash in her chest, a look of sorrow on her pale face, and bloody tears coming down from her eye sockets “Why,” she stutters “Why did you have to come this way?” She wipes the blood from her eyes, sniffling pitifully, “I never wanted to see that room again” she continued, walking past you down the hall, “Come on, you’re almost out.” She barked, still facing away from you.\n *page_break\n She guides you down the hall in silence, her feet almost floating across the floor, not a sound coming from her body.\n\n*if entergrandhallthroughsoulroom >0\n The hall you escape down is lit by the glass tubes filled with tortured souls, a low blue tint guiding your way. You keep going forward, avoiding the images displayed above you. As you walk further, the sound and smell of water fill your senses. Soon, the light emanating from the trapped souls begins to funnel downward, and the source of the trickling stream begins dm to funnel downward. \n *page_break\n A river. A small river underneath the mansion, illuminated by the souls that make up its content. You stop on a stone dock, where you see a figure standing on a small rowboat wearing a dark cloak covering their face. They reach their hand out towards you with the palm up and usher you with a single, pale thin finger. You apprehensively walk towards the shadowy humanoid, watching it closely with every step you take. They are unmoving, simply flexing their finger to summon you closer. You keep your eyes on the hood as you carefully take a step onto the small boat they were standing on. As soon as you are seated, the ferryman shoves off from the dock and begins to traverse the river of souls. You sit quietly on the small boat, observing the light gleaming from the river you were floating on. You keep your body as close to the center of the boat as possible, trying not to imagine what unfortunate fate waited for a living soul that would fall in. Luckily, you don’t have to find out.\n *page_break\n You reach the end of the river and soon dock at another dark port far from where you started. On the port was a large door made of black oak. You watch your step as you begin to get off the boat and a strange sense overcomes you. Something is beckoning you, almost forcing you to turn around. You do not fight the feeling, or rather you can not, and you come face to hood with the mysterious figure who brought you on the boat, holding out  their pale thin hand toward you with their palm up. You hesitate for a moment, unsure of what to do next. You clench your hands and teeth tight in apprehension, the tension of the situation growing with every passing moment.\n *page_break\n In grasping your fists, you feel something in your hand, something that appeared from nowhere. \n You don’t dare look, not knowing what it is, all you know is the ferryman is waiting. \n You put your hand out over the hooded figures palm, holding your breath as you release your grip. \n Two gold coins fall from your hand and into the ferrymans’. \n They take the coins into their hand and push off from the port, \n disappearing into the darkness down the river of souls. \n You turn your attention to the door behind you, taking a deep breath as you reach for the doorknob.\n *page_break\n You know you are almost out\n*goto_scene grandfinale\n", "ironmaidenroom": "*page_break Next scene: Fair Maiden's Room\n*achieve maiden\nYou fall onto a stone floor, the chair you’re tied to shatters under your weight, shooting a pain down your back. \nYou groan and wheeze as you see the trap door that you fell from slowly shut, the iron masked psychopath waving at you as the ceiling closes. Now you’re in the dark once again, another silent tomb swallowing you whole. You stay on the ground, wondering how it could have possibly come to this. Why am I here, you ask yourself over and over again. Why, why, why?\nIt’s in this moment you begin to feel a strange sensation wrap around you. It’s familiar. It feels like warmth. You sit up and see six torches lit, three on either side of you, near them were iron maidens, steel coffins with eye holes and a letter forged on them. \nOn the left of the room the iron maiden’s letters were A, Y and O, to the right, the letters E, I and U were placed on their centers.\nYou stand up and begin to search the room for a means to escape, a trap door, a false wall, anything to get you out. \nYou find nothing, just six iron maidens staring at you in your hopelessness. You sit back on the floor, curious as to the meaning of these strange cages that surround you. That’s when You see the light of another torch in front of you. \nYou look up to see in the light of the flame a strange riddle on the wall,\n\"Find the maiden that is the beginning of the end, who ends time and space, but if you choose the poorly, this will be your resting place\"\n*line_break\nSo there it is, you tell yourself. The only way out of this place, for better or for worse, is through one of these maidens.\n\n*page_break \n\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n Come back in a few minutes to play the next part of [i]Macabre Mansion[/i]!\n\n Or, you can buy the game now to skip the wait.\n\n *purchase_discount adfree 2020-08-06 $4.99 $2.99 purchased\n *delay_break 1200\n\n*label purchased\n\n*page_break \n\n*Choice\n #Maiden A\n  You walk towards the Maiden with the Iron A on its chest and open its door. You step inside and turn to close the door. A moment of silence passes as you expect something to happen.\n  It does, but you don’t like it. You hear the sound of something locking. You push the door of the maiden but it doesn’t budge. You slam your hands against it with all your might to no help. \n  That’s when you hear the sound of something opening near your ear. You turn to see a small spout has opened near your head. You lean back as you hear something funnel toward you, liquid, gas, air, water?\n  *line_break\n  Acid. Acid sprays on your face and you scream in agony as your nose and lips begin to melt, the acid showing no signs of stopping. Soon the acid fills the small space you are inhabiting, your wails of torture fill the room as you’re slowly melted into a soup of bodily fluids.\n  *page_break\n  *goto retry\n  *label retry\n  Retry?\n  *Choice\n   #Yes\n    *goto_scene ironmaidenroom\n   #No\n    *finish\n #Maiden Y\n  You apprehensively open the door to the iron maiden, a chill crawling down your spine as you take a step into the vacant space. \n  You close the iron door behind you, the sound of gears locking into place fills the empty space. Then you wait. \n  For a while nothing happens and you fear for the worst. \n  What unholy mechanism is waiting for me in here, you think to yourself. \n  *page_break\n  That's when the sound of gears turning fills the void again, \n  and suddenly the small space you're occupying begins to shift backwards, \n  away from the iron maiden room. You begin to panic, \n  unsure of what's to come next as a steel grid falls in front of you, creating a shaft. \n  You look up and see above you to see another steel grid above you attached to a chain. \n  This is an elevator. You feel the shift of weight as the elevator begins going up, \n  uncertainty taking hold of you as you rise to the next challenge and you ask yourself again, \n  why me, why am I here?\n  *set enterfilmroomthroughironmaidenroom +1\n  *goto_scene filmroom \n #Maiden O\n  You open the door to the Iron Maiden with the O engraved into it and take a deep breath as you step into it. You turn around inside it and close the door behind you, your heart racing as you wait for something to happen.\n  That's when you feel it. Something in the air has changed. The eye holes in the iron maiden are sealed off as you hear the sound of a funnel sucking something out. That's when you realize exactly what was going on. Your life was being taken from you. You slam on the iron maiden door as your struggle for breath, the oxygen in your lungs being sucked out at a staggering rate, you claw and punch at the iron door to no avail as everything begins to go black, the last thing you hear is the sound of your own wheezing as you pass out and eventually,\n  *line_break \n  You're dead.\n  *goto retry\n #Maiden E\n  You open the door to the iron maiden with the E etched into it. You take a moment to think about your answer, this has to be right, you tell yourself, please let me be right. With those final thoughts you step into the iron maiden and close the door behind you. You wait for a moment, hoping that this was the safest route, or at the very least, your death will be a quick one. That’s when you feel something strange. You feel the space you’re occupying begin to shift as the sound of gears turning fills the air. That’s when the room you’re in begins to turn. You hold on to the walls as you begin to shift around, unsure of what will come next, when the room stops shifting and you are facing the opposite of where you had started, light trickling in from what seems to be an opening. You reach your hand out, hoping whatever is on the other side leads to salvation.\n  *set entergalleryhallwaythroughironmaidenroom +1\n  *goto_scene galleryhallway\n #Maiden I\n  You reach for the iron maiden with the I carved into its chest, the heart in your own chest beating erratically as you open the door of the enclosed space and close it behind you. There you stand to a moment, a sense of fear causing you to break into a cold sweat. That's when you touch your skin and realize it isn't sweat at all. You put the strange clear liquid up to your nose and smell a light, sweet scent. You touch the walls and feel that they are wet with the same substance you are covered in. Nectar, you think to yourself as you hear the sound of buzzing coming from over hear you look up to see a small hole above you, the buzzing growing. That's when they come,and they come in the thousands. Hornets, wasps, locusts, and all other manner of stinging and biting insects fall from the hole, you scream in terror and agony as the tiny invaders devour you piece by piece their stingers digging into your flesh. You cry out for someone to rescue you from the creatures but no one is coming to save you. \n  Here, you will die, a banquet for the small things that fly and crawl.\n  *page_break\n  *goto retry\n #Maiden U\n  You take a breath before opening the door to the iron maiden with the U carved into its chest, taking another moment to think about what horrors may lie beyond here. You decide whatever is waiting for me can't be worse than waiting here for something else to happen. So you step inside and close the door behind you. Inside it is complete darkness, you feel around for anything that could lead to a possible way out. That's When you discover something, a small round button on the side of the small enclosure. You breathe for another moment, unsure of what's to come if you decide to take that risk. You take it anyways, and the sound of gears turning is heard not far from where you stand. Suddenly the floor beneath you gives way and you begin to fall, You scream in confusion, surprise and panic as you plummet downwards into the unknown, lost and afraid, hoping to find a way out soon.\n  *set enterbasementthroughironmaidenroom +1\n  *goto_scene basement\n", "occultroom": "*page_break Next scene: The Word of the Witch\nYou leave the torture chamber to find yourself in a dark circular room with books scattered across the floor. The walls are lined with shelves that stored strange vials that contain cloudy, mysterious liquids of all colors. In the center of the room was a pentagram drawn in chalk and a candle at each point of the star. In the center of the pentagram was a rectangular piece of wood with letters of the alphabet arranged across it, the words yes and no inscribed on either side of the board. In the bottom center of the board was a small triangular piece of metal with a hole in it. Etched on the top of the board in ominous letters was the word \"Ouija\". You observe the room as you walk in, taking into account the strange symbols drawn on the walls in red and the green bubbling concoctions in a black kettle on the floor near the far side of the room. The very air in this place was ominous.\n*page_break\nBut that didn’t change the fact that you had to go through here. You avoid the pentagram on the floor, tiptoeing around the strange circle towards the door on the other side. You creep further and further, getting past the center of the room to eventually get to the other side. You keep your eye on the bubbling cauldron near the door before trying the knob. It won’t budge. The knob won’t even turn. Something wants you in this room.\n*page_break\nThat’s when you hear the sound of flames flickering behind you, a sudden light filling the room with a warm orange hue. You turn your attention to the center of the room and see the small piece of metal quickly scattering across the board faster than your eyes can read. You look to the walls and see words being burned into the walls, an enchanting bright red light about them. In the warm lull of the light, you hear a voice whisper in your ear, and begin to tell you the story that circles the room. \n*page_break\nA story of pain and heartbreak. \n*page_break\nLong ago, before this wretched mansion was built, there was a mighty forest that stretched up to the sky. The sunlight was almost blocked by the dense foliage supplied by the massive trees. in this dense forest lived a coven of wiccans, peaceful women who used their craft of nature to heal and feed all who traveled through their home. That is until the Conquerors came. \n*page_break\nDetermined to claim the land for themselves, greedy, self concerned men accused the coven of witchcraft, and saw to it that their forest was burnt all but to cinders, some members perishing in the flames while others were forced to flee. The bloodlust of the fearful and confused did not end there. The coven members were tracked down and sent to the pire. Before being burned, the last of the coven spit a vengeful curse upon the land they once called home, claiming all who dare to build on it will know nothing but agony.\n*page_break\nThese words rang out through what remained of the forest as the ash from their burning bodies spread through the sky and was embedded into the very soil. It wasn’t long until the witch hunters realized how true the words of the coven were. \n*page_break\nSoon, those involved in the covens demise began to have terrible nightmares, suffering from fits of madness. Flesh melted from their bodies as their minds were warped from pain and horrible visions. Those who remained unaffected turned their attention to the remains of the forest, believing that if it was destroyed, the curse of the coven would be as well. \n*page_break\nThey would soon come to realize that it was no simple task. When the Conquerors returned to the covens forest, they failed to find a forest at all. Instead in its wake was a treacherous swamp, filled with noxious fumes, rancid water, and rotted trees that were covered from stump to branch in toxic fungus. Every flame they lit was soon snuffed out by the moisture in the air. Every swing of an ax that cut into a tree released spores that filled the lungs and blinded the eyes. For years, men were sent in to destroy the swamp, only to come back on the verge of death, or in some cases never return at all. \n*page_break\nMany years later, after the Conquerors had all gone, a foolish man with wicked ambition dared to embark upon the land. He sacrificed dozens of workers lives to the swamp, watching them perish as they attempted to build the selfish man a large home. A mansion of disrespect and despair. A phantom of the coven did warn him to leave this place or be forever cursed by its malice. The man did not heed this warning, and the spirits of the coven unleashed their full wrath onto him and his tasteless structure, cursing the mansion to forever be a tomb to any soul unwise enough to trespass on this land ever again. Or so we hoped. \n*page_break\nThe whispers went silent, tears streaming down your eyes as the pain of the coven women seeps into your heart and mind. The flame still dimly lit the room revealing a figure facing away from you, kneeling in the center of the pentagram all dressed in black, “ It’s for all these reasons we ask you to leave.” You hear the voice whisper in your ear, the sound of stone sliding behind you. \n*page_break\nYou turn around to see the wall that was on the far side of the room was no longer there, revealing a dark hallway that seemed to go on forever. Something is telling you to walk down the hall and keep walking. Even still, you have a moment of indecision. \n*choice\n #Turn around to the figure\n  You fight your bodys’ urge to start running and find yourself turning around towards the black cloaked figure.\n  *page_break\n  Allowing you a glimpse at a face covered in rotting flesh, sunken in mold green eyes, and an odor that reeked of maggot infested meat, “I said leave!” Her ghastly voice demanded, causing you to shriek in terror and flee down the dark corridor as fast as your legs could carry you to get away from the horrible vision.\n  *set sanity -10\n  *achieve occultist\n  *set entergrandhallthroughoccultroom +1\n  *goto_scene grandhall\n #Start walking\n  You follow your better judgement, heeding the hooded figures advice and beginning to make you way out from the ominous room as quickly as you can. As you leave, you begin to wonder how close you are to getting out, what other horrors await you, and eventually the cruelty that allowed such a nightmarish place to be created. In the end, most of those didn’t matter. The only thing that matters was getting out of here alive. So you keep running. \n  *achieve occultist\n  *set entergrandhallthroughoccultroom +1\n  *goto_scene grandhall\n", "portraitgallery": "*page_break Next scene: The Tale of Madame Marionet\nYou open the door from the murderous gala into a large space lit with candles on the walls. You look around to find portraits on every inch of every wall, some smaller than others, some that take most of the space. Images of men and women in gorgeous garments, fine silk ball dresses and freshly pressed suits. Some wore pompadours and lavish jewelry, others wore golden wrist cuffs and extravagant timepieces. Three key features ties all the portraits together; they were all very rich, very tortured, and very dead.\n*page_break\nOne man was hung with elegant fabrics from a spiral staircase, their faces purple and their lips blue from the lack of oxygen. Next to the hanging man was a painting of a woman in a white dress stained red, her cheek muscles and nose bone bleeding onto it from having her face peeled off. Even still, she seemed to be smiling. On the other wall was a picture of an elderly man in a sharp suit standing at attention, his eyes gouged out, his sockets bleeding downwards, almost as if he was crying blood. Images of blood and death surround you, until you look in front of you, and see something just a bit different.\n*page_break\nOnly a few feet ahead of you, taking up the entire wall, was a portrait of a woman with dark brown hair that twirled down past her elbows. She was facing away to the left, sitting in a delicately designed oak chair. She was donned in a burgundy dress with long lace gloves, her right hand holding a dagger, her left hand guiding it’s path. You take a step forward to see her hazel brown eyes and feel a strange sense about them. You sense somehow, that even surrounded by all this death and even ready to take her own life, the woman in this painting is at peace with what is about to happen.\n*page_break\nAs you move further into the dimly lit room, walking up to the painting of the woman, when you noticed at the foot of the painting is a small book on a stand. You take a closer look and discover the title of the book, “The tale of Miss Marionet”\n*page_break\nReluctantly you reach for the book, unsure what might happen, what horrors await you as you turn the page. Even with that sensation of dread gnawing at your conscious, you know you only have one course of action. \n*page_break\nYou need to keep moving forward.\n*page_break\nSo you open the Tale of Marion, hoping it won’t be the end of your story.\n*page_break\nThe Tale of Margaret Marion\n*page_break\nMargaret Marionet grew up in a small village near Devonshire, raised by sheep farmers on the open plains. Margaret was content with her simple life for the most part, but always felt as if something were missing. As she tended to the fields and sheared the wool, a longing pulled at her soul from beneath her flesh, a desire that followed her wherever she went. That was, until one fateful morning, at the age of twelve, when she was in the field and found a small mouse caught in one of her family’s home made traps. Normally, she was supposed to bring it to the cat or dispose of it far away from the farm, but a different urge overtook her,\n*page_break\nThe urge to crush it.\n*page_break\nSo, as the story goes, Margaret lifted her foot,\n*page_break\nAnd crushed the tiny rodent, a pitiful squeak coming from its body just before organs and blood projectiled from its mouth and nose.\n*page_break\nIt was in that moment, a surge of energy rushed through Margarets’ body. \nShe felt elated and overjoyed, \na sense of ecstasy flowing through her body. \nShe couldn’t contain her excitement, \nnot even after she disposed of the rodent corpse and went home. \nShe was still giggling and chuckling, \ntaking pleasure from ending the small life. This continued for months, \nMargaret going out into the meadows and finding small unfortunate creatures to kill. \nEventually, she got bored with that, and began to experiment with her desires. \nShe began taking the mice and other small rodents home, \nhiding them away in the shed not too far from the house. \nThere, she would torture them in every manner she could possibly think of; \nShe burned them alive, drowned them, fried them in oil, ripped their limbs off, and performed many other experiments to feed her twisted desires.\n*page_break\nUntil one day she was caught five years later.\n*page_break\nIn the early morning, Mary, Margaret's’ sister, awoke to the sounds of giggling. Her sister’s giggling. She followed the laughter out of the house and into the shed where Margaret was mutilating an innocent defenseless rabbit with a large knife. When Mary saw what her sister was doing, she reacted the way most sane people would.\n*page_break\nShe let out a scream.\n*page_break\nPanicked, the young Margaret tried to calm her younger sister, who flailed and shrieked with every step Margaret took towards her, reaching her blood stained hands towards Mary. Mary turned to run and Margaret dreaded the thought of what would happen if anyone else were to find out. So, finding no other options she took the blade in her hand and threw it at Mary with all her might.\n*page_break\nLanding it directly in Mary’s back.\n*page_break\nDistraught and confused, Margaret did the only thing she thought she could do.\n*page_break\nShe ran. She ran far and she ran fast. She ran for days and weeks, she ran as far as her legs would take her. She ran until she couldn’t run anymore, which got her as far as London, when she was found by authorities in a search party.\n*page_break\nBeing forced to confront her crimes, Margaret was sentenced to mandatory therapy in order to control her violent tendencies. After thirty-six months of intensive therapy, Margaret was showing signs of improvement. In reality, she was getting better.\n*page_break\nShe was becoming better at hiding her urges.\n*page_break\nShe became so skilled at suppressing her inner urges, she began to express her desires through violent expressive poetry and gruesome detailed paintings. Her taste in the macabre expanded as she got older, discovering dark literature that discussed mutilations and massacres as well as paintings depicting wars, weapons and blood. Margaret made it her mission to collect all things dark and twisted.\n*page_break\nIt was on this same quest that Margaret found the crowned jewel in which to keep her massive collection.\n*page_break \nMacabre Mansion. A structure known for dangerous contraptions and a legacy of death. A home for which her heart had always longed for, and because of that she purchased the mansion post haste and soon began to renovate. It was in this luxurious mansion that she lived out her dark fantasies, luring in unsuspecting victims with dinner parties and galas that lead to deaths and torture. This continued for many years, the bodies piling behind the oak walls and being burned in the furnace, one after another.\n*page_break\nThat was, until a strange set of events befell her. One day, while roaming her dark and treacherous domain, she found a child that had snuck in somehow. As she prepared to dispatch the child, she saw that the small girl was ripping the wings off of a dragonfly while humming a pleasant tune. Margaret knew in this moment she had found a kindred spirit, Someone to share violent ecstasy with.\n*page_break\nSo Margaret took the small girl under her wing, teaching her the history of death, the mechanics of destruction, and the glory of desecration. For a time Margaret was filled with a joy unknown to her for decades. The joy of companionship.\n*page_break\nUntil tragedy came to Margaret's doorstep once more. On a gloomy, quiet day, the child went missing from the mansion. Margaret searched the mansion in its entirety to find the child, hoping that she hadn’t stumbled into one of the mansion’s terrible contraptions.\n*page_break\nThe girls fate was far worse. After hours of frantic searching, the doorbell of the mansion rang, and Margaret rushed to see who was there. When she opened the door,\n*page_break\nShe saw the corpse of the child she cared for laid out before her, the girls favorite dagger in her chest. This was the first time Margaret had looked at a corpse and didn’t feel glee or excitement, all she felt,\n*page_break\nWas pain. Pain, agony and heartbreak. She held the child in her arms and weeped at the doorstep for hours before bringing the child in and laying her in a mausoleum near her room. Margaret took the dagger from the girls chest, shock enveloping her senses as she stumbled out of the room into an empty space in her expansive gallery.\n*page_break\nShe kneeled down on the floor, aimed the dagger at her heart, and with one last breath, she cursed those responsible for the death of the only one she ever cared about before plunging the dagger into her chest, the end of a murderous reign.\n*page_break\nSo goes the tale of Margaret Marion\n*page_break\nAs you close the blood stained saga, you hear the distinctive sound of gears twisting and the wall displaying the portrait slowly began to raise, revealing a corridor that ended with a door. You walked towards the far door, a single candle illuminating your way. As you walked towards the door, you relive the life of Margaret Marion and the pain she brought. You think of what devices she built that caused you anguish. Most importantly, you're thinking about how close you are to leaving this horror house. So you open the door, and walk into the ominous darkness.\n*achieve biographer\n*set entergrandhallthroughportraitgallery +1\n*goto_scene grandhall\n", "screenshots": "*set sanity +50\n\nMalyce Mansion, a marvel of ingenuity constructed in a forest infamous for witchcraft, murder,and madness.\nThought to be haunted by countless souls, and mysteries surrounding \nthe mansion have enticed many ghost hunters and adventure seekers to search for the elusive structure.\nMany returned unsuccessful in their journey, \nothers claimed to have found it only to be revealed as frauds and charlatans, \nsome never made it back at all. \nAfter a century of remaining undiscovered, \nthere is a new tall tale to add to the ever growing history of the horror wonder that is known as...\n\nMacabre Mansion\n\n*page_break\n\nYou are awakened by the dull light of a candle and the smell of iron in the air. You feel something soft on your skin and look down to see you are wrapped in velvet sheets stained with a familiar red liquid.\nIt is blood. Blood that seems like it has permanently stained into the velvet sheets.\nYou try to remember where you are, but all you come across are painful headaches that leave you powerless.\nIn the far corner you hear an old telephone ring. \nYou cautiously turn to see a golden handled turn dial phone in the far left side of the room. \nIn front of you is a door, bloodstains leading towards it as if someone had crawled from outside to the bed.\n\n*page_break\nAs you walk through the door, You enter a room dimly lit with candles along the walls in decorative candlesticks. \nDown the center of this elongated room is a table that stretches the length of the room and seems like \nit’s four feet wide covered in a red silk cloth. In front of you is the only chair in the room, \nfacing a bell. On the other side of the room is a door, \nbarely visible thanks to two candles on either side of it. \nEven in this dim light you can see an iron gate in front of the door, blocking it off. \nAlready you can tell what kind of game is going on here. Time for dinner.\n\n*page_break\n\nNext scene: Welcoming Commitee\n\nYou awaken to the sensation of something cold on your face. \nYou slowly open your eyes and see a pale, clammy hand touching your cheek,\n\"Oh good, you're awake.\" the whispering, ghost-like voice you heard before sings to you \n\"I am relieved to see you are alright,\" she says gleefully,\nher clammy hand gently grasps your chin and begins to raise your head so that you see the same strange masquerade mask you saw before, \n\"Hello, and welcome!\" she says in excitement, stepping backward and performing a plié, \n\n\"To the wonderful Mansion de Massacre!\"\n\nYou look around to see that you are tied to a chair on a brightstage in an empty opera theatre with the stage lights pointed on you. \nShe leans over towards you, and you can see into the inky emptiness of her eye sockets, \nthe smell of death on her skin,\n\"And you,\" She said with a spin turning towards you again before stopping to stare at you.\nYou shiver at the very sight of the woman before you, shocked and terrified. \nShe continues to stare at you with empty holes where her eyes should be.\"You look a bit pale.\" \nShe says calmly with her eerie voice,  \"Whatever is the matter?\"\n\n*fake_choice\n #What the hell are you?\n  \"Well,\" She said standing up straight and giving a slight bow while elegantly grasping her dress,\n  \"I am one of your humble hosts! Of course, I am nothing compared to the Master, \n  who will be very pleased to meet you.\"\n  *goto bath\n\n #where the hell am I? \n  She tilts her head slightly and giggles, \n  \"Why, I already told you.\" She stands up and throws her arms up gracefully,\n  \"You are inside a mechanical and architectural marvel, the one and only Macabre Mansion! Where every room is carefully designed to test your skill, wit, and most importantly, your will to survive!\"\n  She bowed slightly, \"And you my friend, are our honored guest.\"\n  *goto bath\n\n #Why the hell am I here?\n  She giggles as she begins to sidestep around you,\n  \"Well, kind guest, you were the one who came to us, so of course we had to let you in for our festivities.\n  We’ve been waiting so very long for another guest to join us.”\n  She said as she twirled around in front of you.\n  *goto bath\n\n  *label bath\n  *page_break\n  Next scene: Blood Bath\n\n  You enter a small bathroom with golden fixtures; \n  a golden tub with a shower in the center of the room, \n  a golden sink beneath a mirror with decorative golden carving is on the left side near a golden toilet. \n  The floor was a carefully designed marble with golden grout that majestically offset the white tile. \n  Everything in the room is within two or three feat of each other, \n  making the bathroom no bigger than five feet on each side. \n  You reluctantly walk into the room and like all the other rooms the door snaps behind you, \n  the sound of gears locking into place coming from the other side. \n\n  You study the bathroom for a moment, searching for an exit when a strange odor passes through you nostrils. It's faint but alarming, the way it lingers in the air. You begin investigating the area, searching for the smell. You start with the shower above the tub, the smell was strongest there. Next was the faucet, where the smell concentrated as well. Out of curiosity you go over to the sink and again, the smell was prevalent. Finally, you wander to the toilet. The seat was down, but you know the odor was seeping from beneath. There's something in the pipes, and you're sure it's not water.\n  *fake_choice\n   #Open the toilet\n    Against your better judgement, you begin to lift up the toilet seat slowly, \n    the smell growing stronger as you begin to peak underneath. \n    You lift the seat up and begin to gag at the mere sight of what was inside the bowl.\n    Blood. Blood filled to the very rim. \n    The smell of blood began to fill the room when the toilet began making a gurgling sound. \n    That’s when you see the toilet begin to flood and pour over. \n    You hear the sound of pipes opening behind you.\n    You look around to see that every faucet was pouring out blood at full power. \n    You look at the walls and see that there are now holes in the walls that pour in \n    gallon upon gallon of blood by the minute. If you don’t act fast, this is where you’ll drown\n    *finish\n\n   #Turn the shower on\n    You walk away from the golden porcelain throne and go to investigate the shower head. You examine the shower in great detail, taking notice of the individual spouts and the attention give to the design. This is no time to critique metal work, though. You need to find a way out of here. You take another couple of minutes to monitor your surroundings before you make a final decision. You’re going to turn on this shower. Every room in this house has a trick, you remind yourself. Maybe, hopefully, this is the way out of this one.\n    And so you turn on the shower. \n    For a moment nothing happened, just the sound of pipes aching and moaning from out of sight. \n    Then you hear the sound of pipes filling with liquid begin to get closer with every passing second. You take a step back from the shower, cautious of what is going to come next. \n    It was in that moment that the shower head bursts from the shower,\n    shooting off from the pressure of several gallons of blood propelling it forward. \n    Blood begins to seep into the room, not just from the shower pipe; \n    blood seeped in from the tub, the toilet, the sink, and even holes in the wall that had just opened. \n    Within moments, you were up to your knees in thick, noxious fluid.\n    *finish\n\n   #Turn the tub faucet on\n    You step away from the toilet and begin to make your way to the tub. \n    You examine it for a moment. At first glance it seems like and average tub, albeit that it’s gold. A rather luxurious tub, in a way. The feet were carefully designed to look like human hands for whatever reason, giving the tub an ominous aura. Even still, in a place like this, it’s to be expecting. Yet for some reason something about this tub is alluring, almost beckoning, as if something wants you to sit inside. Amongst all the chaos of this place, even a tub could be dangerous, you tell yourself. That doesn’t stop you from getting in, one food after another.\n    You sit there, taking in the oddity of this room, how the ceiling is so short and how everything seems almost crammed together. Such a strangely small space for such a large abode. You shrug it off as you begin to remember that this place is swarming with monsters and every room could be a death trap, so you begin to think of a way out. You look around the inconspicuous room from the tub, searching for anything that could be a clue, a strange knob, a misshapen tile, something on the mirror, and come to find nothing. WIth that you take a deep breath,  ‘if I’m going to die, I’m going to die relaxing in a fancy tub’ you tell yourself as you reach for the faucet and turning it on.\n    That is when the regularly scheduled nightmare continued. From the tub faucet, blood began to gush out and fill the bottom. You let out a shriek as blood began seeping in from the walls, pour forth from the toilet, welling from the sink, and pouring from the shower head. You try to squirm out of the tub, but the sides have become slick from the washing of life elixir, causing you to fall deeper into it. As the tube began to fill and you continued to struggle escaping, you hear from beneath you a strange sound. It’s similar to the sound of a funnel, liquid gushing downward into someplace below. That’s when you look down and the tub floor opened, transforming into a slide that you clumsily slip down, a cascade of rich red nectar guiding you down into a lightless, wet, murky horizontal tunnel with no idea of where you’ll end up.\n    *finish\n", "secondhall": "*page_break\nScene: Fright or Flight Down the Hall of Night\n*page_break\nYou walk out of the room that you were nearly crushed in, the shock and horror of the experience still fresh in your mind as you wander down the dark hallway in front of you. \nYour way is barely lit by candles on dark iron fixtures high above the floor that spread out further and further with each step. \nYou search the hallway for the source of the applause and cheering you heard earlier. There is nothing here except the paintings hanging from the walls. In the dim light you see portraits of people lining the burgundy wall; some old, some young, Caucasian, Black, Asian, men, women, all with one thing in common.\n*line_break\nThey were all dead. Covered in blood, some missing limbs, others engulfed in flames, \nsome were frozen blue, covered in insects, several stab wounds, \nbodies drained of blood, each one suffering a terrible death, the next worse than the last. \nIt never seems to end. you keep track of their faces and any other features. \nOne face you see is a young fair skinned woman with black hair, green eyes, \na small beauty mark under her left eye. She was wearing an old dress, something straight out of the renaissance fair. There was one more distinguishing feature that truly stood out to you... \n*line_break\nShe had a dagger in her chest. It was the sorrow in her eyes that catches your attention. The rest of the faces in the portraits had horror, anguish, anger, resentment, regret: her face, her face was full of sorrow as blood seeped into her Victorian style dress.\nYou could not bear to look anymore,the image of so many tortured faces forever imprinted in your brain as the hall you traverse grows dimmer and dimmer, the candles lighting your path growing further apart. Two every few steps, then one, then,\n*page_break\nDarkness. You stumble through the darkness, keeping forward as you cautiously track every footstep you take into the void. The silence is haunting, all you hear is your own breathing, footsteps and your heart. Although your heart is pounding, your breath and footsteps remain steady, as voice inside you tells you to relax, and to not be afraid of the dark.\n*page_break\nUntil you hear another set of footsteps from behind you. You turn around to see in the distance far behind you, the dim light of a candle racing toward you.\n*choice\n #Call out to whoever is holding the candle\n  You call out to the person in the darkness...\n  *page_Break\n  No response. You call out again, take an apprehensive step back as the candle seems to float closer to you. Again no response. You go to call out once more as the candle floats towards you at an almost inhuman rate. As the candle closes in, you begin to make out a face. It is at that moment, the candle is suddenly snuffed out. You are engulfed in darkness once more, your heart beating hard, your
