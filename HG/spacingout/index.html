ll reach you before the insectoid warriors reach them, but your fears prove futile. It seems they have no fear. About two dozens of them berserk at the centipedes, bathing them in acid, but it seems the chitinous armour is impervious to it. However, the insides of their mouths is and you see them \n\t\tvirtually disintegrates before your eyes.\n\t\t\n\t\tThe insectoids, however, suffer many casualties. There are piles of dead and dying warriors scattered next to the centipedes. Some of them still make chaotic moves despite having lost their heads.\n\t\t\n\t\tWhat do you do?\n\t\t*choice\t\n\t\t\t#Shoot at the centipedes\n\t\t\t\t*if (shotgun>0)\n\t\t\t\t\t*set shotgun +1\n\t\t\t\t\t(Your expertise with the fan mode of your gun increases)\n\t\t\t\t\t\n\t\t\t\t\tYour role is a major one. Having set your weapon to concentrated short range rays, you single handedly finish one of the centipedes and save at least three insectoids from almost certain death.\n\t\t\t\t\t*goto battle_success\n\t\t\t\n\t\t\t\t*else\n\t\t\t\t\t\n\t\t\t\t\tYour role in the strife is almost imperceivable. Your weapon does not have the concentrated fire capabilities and is simply not good for attacking targets with such a heavy armour. As you understand that, you starts aiming at the \n\t\t\t\t\tunprotected areas or breaches, but the centipedes twist and turns constantly and it is difficult to do so. Luckily, the insectoids seem more prepared and manage to defeat the invaders.\n\t\t\t\t\t*goto battle_participate\n\t\t\t\n\t\t\t#Heal the wounded insectoids\t\t\t\t \n\t\t\t\t*goto healingzz\n\t\t\t\t\t\n\t#Take cover behind the big rock next to you and fire at the centipedes\n\t\tAs you reach behind the rock, a couple of dozens of insectoids arrive from the depths of the chamber. It seems they have no fear, berserking at the centipedes, bathing them in acid, but it seems the chitinous armour is impervious to it. However, the insides of their mouths is and you see them \n\t\tvirtually disintegrates before your eyes.\n\t\t\n\t\tIt is very hard to shoot in the crown and be sure you will not hurt an insectoid.\n\t\t*if (aim>0)\n\t\t\t*set aim +1\n\t\t\t(Aiming increases)\n\t\t\t\n\t\t\tYour aiming device, however, is designed to help you in such situation, giving you the precision required. Despite the insectoid bodies between you and the target and the fact that they keep twisting and turning, you still manage to score a few very hard hits in the mouth and even the eye of a centipede, virtually knocking it out.\n\t\t\t\n\t\t\tThe insectoids, suffer many casualties. There are piles of dead and dying warriors scattered next to the centipedes. Some of them still make chaotic moves despite having lost their heads.\n\t\t\tBut, after a while, both invaders lie dead on the ground.\n\t\t\t*goto battle_success\n\t\t\n\t\t*else\n\t\t\tYou don't have an aiming divice and so your contribution is very limited. You manage to score a few hits of the constantly wriggling centipedes without killing any insectoid in friendly fire, but the armour of the invaders negates most of the damage. Luckily, \n\t\t\tthe insectoids prove to be better in dealing with such creatures. \n\t\t\t\n\t\t\tThey, however, suffer many casualties. There are piles of dead and dying warriors scattered next to the centipedes. Some of them still make chaotic moves despite having lost their heads.Soon, however, both the invaders lie dead on the \n\t\t\tground.\n\t\t\t*goto battle_participate\n\t\t\t\n*label tank_battle\nA couple of dozens of insectoids arrive from the depths of the chamber. It seems they have no fear, berserking at the centipedes, bathing them in acid, but it seems the chitinous armour is impervious to it. However, the insides of their mouths is and you see them \nvirtually disintegrates before your eyes.\n\nThe insectoids, suffer many casualties. There are piles of dead and dying warriors scattered next to the centipedes. Some of them still make chaotic moves despite having lost their heads.\nBut, after a while, both invaders lie dead on the ground.\n*goto battle_success\n\n*label battle_success\nQueen Shiera also appears.\nShe looks even more beautiful in the stronger light out in the open despite the worried expression on her face. You guess her heart bleeds for all the death and the suffering her children went through.\nShiera motions to you to come closer to her. There seem to be a myriad of stars shining in her black eyes.\n\n\"I understood that you participated in the battle, defending my eggs. I will be forever grateful for what you did. You also proved before me that you are a skillful warrior who knows how to use the best of your abilities.\"\n\nShe comes closer to her and you find her fruit scent and the sweetness of her feminine presence to be intoxicating. She puts her hands on your shoulders and gives you a chance to examine her multicoloured manicure. Then, she plants a soft kiss on your cheek, the sensation making you \nblush like a teenager on a first date.\n\n\"Now, please excuse me, I need to attend the casualties.\" She then joins the team of medics binding the wounds and the craftsmen replacing damaged chitinous cover with sheets of metal.\n*set rel_shiera +3\n\n(Your relations with Queen Shiera increase by 3)\t\t\n\n*if (blood\u003c5)\n\t\tOne insectoid medic approaches you and attends to your bruises.\n\t\t\n\t\tYou then spot Nomo and approach her.\n\t\t*goto hive\n\t\t\n*else\n\t\tA medic examines you but since you come out of the battle unscathed, she quickly loses interest in you.\t\n\t\t\n\t\tYou then spot Nomo and approach her.\n\t\t*goto hive\n\t\t\n*label battle_participate\nQueen Shiera also appears.\nShe looks even more beautiful in the stronger light out in the open despite the worried expression on her face. You guess her heart bleeds for all the death and the suffering her children went through.\nShiera motions to you to come closer to her. There seem to be a myriad of stars shining in her black eyes.\n\n\"I understood that you participated in the battle, defending my eggs. I will be forever grateful for what you did.\"\n\nShe comes closer to her and you find her fruit scent and the sweetness of her feminine presence to be intoxicating. She puts her hands on your shoulders and gives you a chance to examine her multicoloured manicure. \n\n\"Now, please excuse me, I need to attend the casualties.\"  She then joins the team of medics binding the wounds and the craftsmen replacing damaged chitinous cover with sheets of metal.\n*set rel_shiera +2\n\n(Your relations with Queen Shiera increase by 2)\t\t\n\n*if (blood\u003c5)\n\t\tOne insectoid medic approaches you and attends to your bruises.\n\t\t\t\n\t\tYou then spot Nomo and approach her.\n\t\t*goto hive\n\t\t\n*else\n\t\tA medic examines you but since you come out of the battle unscathed, she quickly loses interest in you.\t\n\t\t\n\t\tYou then spot Nomo and approach her.\n\t\t*goto hive\n\t\t\n*label infirmary\nThe infirmary is also located above ground but a winding ramp suggests there are underground floors. There is a smell of chemicals that makes you slightly uncomfortable. Nomo, however, shows no signs of anxiety.\n\n\"Nomo used to often work here. I like healing.\"\n\nThere are six big chambers as well as a dozen of small ones.\n\n\"We usually put patients with similar ailments in the same room for convenience, We also found out that their souls tend to heal better this way, being around their kin suffering from the same cause.\"\n\nThe last comment makes you smile, remembering that early in the history, the priests who tried to heal paid more efforts to comfort the soul than the body.\n\n\"Nomo, can we catch anything contagious here?\" you remember one of your worries about visiting a hospital.\n\n\"No, the contagious cases are treated in another building. Here reside only those suffering from wounds and bruises. We also have the genetic experimentation research chamber.\"\n\n\"Wow, genetic experimentation!\"\tthat strikes you as odd.\n\n\"I can take you there if you require,\" Nomo offers.\n*if (hatchery=1)\t\n\n\tYou nod, still unsure if you'd like to do that. Looking around in the chambers, which is easy as they have no doors and see that the number of wounded is much more\n\tthan the ones from the battle at the hatchery, so you ask Nomo how those insectoids suffered their injuries.\n\t\n\t\"There was an explosion at the tin ore deposits situated at the brim of our hive. We still don't know the cause.\" Nomo says and looks at the ground, just like a human would do when wanting to disconnect from a topic that makes them uncomfortable.\n\t\n\t\"Yeah, sadly incidents do happen,\" you remark and scratch at a place that is not itching.\n\t*goto infirmary2\n\t\n*else\n\tYou nod, still unsure if you'd like to do that. Looking around in the chambers, which is easy as they have no doors and see that the number of wounded is rather large, so you ask Nomo how those insectoids suffered their injuries.\n\t\n\t\"There was an explosion at the tin ore deposits situated at the brim of our hive. We still don't know the cause.\" Nomo says and looks at the ground, just like a human would do when wanting to disconnect from a topic that makes them uncomfortable.\n\t\n\t\"Yeah, sadly incidents do happen,\" you remark and scratch at a place that is not itching.\n\t*goto infirmary2\t\n\t\n*label infirmary2\n*page_break\nWhat would you like to do now?\n*choice\n\t*selectable_if (blood\u003c5) #Ask for healing\n\t\t\"Oh, sure!\" says Nomo and motions for another insectoid to come closer and instructs her something you fail to understand. The medic takes you to a small room and asks you to remove your battle armour. When you do, she insists that you doff your\n\t\tcostume as well. That makes you feel awkward but you guess that might be the only way for her to examine you properly. Besides, undressing in front of a representative of a race bearing very little resemblance to should not be such a big deal, right?\n\t\t\n\t\tThe medic finishes her examination quickly, probably having e lot of experience. Well, you don't suppose she has it with humans... you make a mental note to ask Nomo when the procedures finish.\n\t\t\n\t\tThe insectoid leaves the room but returns shortly with a couple of bottles in her pincers. She then applies them to your wounds and you instantly feel soothing. After adding some bondage, she says you are good to go. She doesn't respond to your thanks and you suppose that \n\t\tshe regards that there is nothing to thank you for.\n\t\t\n\t\tReturning to the vestibule, you are quick to ask Nomo the question.\n\t\t\n\t\t\"No, we've never actually had a human patient. There were cases when Astra was wounded but she seemed to be able to take care of herself. She, however, taught a few volunteers of our kind basic \n\t\tinformation about your anatomy and physiology. Gigi, the one you just met, is one of those.\"\n\t\n\t\tYou nod.\n\t\t*goto infirmary2\n\t*hide_reuse #Ask to see the genetic experimentation programme\n\t\t*set genetic 1\n\t\tNomo takes you to the biggest door and as you open it, you enter a chamber of nightmares. Your military training included preparation for the horrors of war but what you behold in front of you id a way outside of your comfort zone.\n\t\t\n\t\tThere are tens of centipedes in translucent containers. Judging from the size of the eggs scattered around, these must be babies. There are insectoids cutting parts of them and implanting insectoid legs.\n\t\t\n\t\tNomo sees what you are looking at. \"We are trying to make use of the enemy eggs we have captured. One of our aims is to allow our organs to grow on a centipede so that it can later be transplanted to our warriors.\"\n\t\t\n\t\t\"But... there is so much pain...\" you whisper.\n\t\t\n\t\t\"The pain of our enemies means little to us.\"\n\t\t\n\t\tYou look in the big black eyes of Nomo as your perception of the insectoids as life loving creatures falls to pieces. It is not completely incorrect, but their mutual respect only extends to their own kind. All right, their kind and probably humans. Some humans.\n\t\t\n\t\t\"We are also testing their pain threshold and what chemicals block their nervous system,\" Nomo continues her explanation with the lack of empathy more suited for a conversation about weather.\n\t\t\"Would you like to participate in some of the experiments yourself?\"\n\t\t\n\t\tHow would you respond?\n\t\t*choice\n\t\t\t#Simply refuse and leave the room without any explanations.\n\t\t\t\t\"No, thank you, Nomo. I've really seen enough. There is much more out there worth showing me, right?\"\n\t\t\t\n\t\t\t\tNomo seems surprised by your reaction but follows you out anyway.\n\t\t\t\t*goto infirmary2\n\t\t\t\t\n\t\t\t#Tell her that what they are doing is sick beyond the telling.\n\t\t\t\tNomo listens to your explanation attentively but fails to understand your feelings. \"Centipedes are our natural enemies. I am pretty sure they are doing the same to our kind as we speak. This is war and under its unwritten rules, what we do is perfectly acceptible.\"\n\t\t\t\t\n\t\t\t\t\"But... what if you were in the place of those little centipedes. Would you still believe it is right to be tortured?\" you insist.\n\t\t\t\t\n\t\t\t\t\"I find that hypothesis irrelevant. I can feel for a fellow insectoid, but not for a centipede.\"\n\t\t\t\t\n\t\t\t\tYou facepalm and give up explaining your point of view.\n\t\t\t\t*set rel_shiera -2\n\t\t\t\t*set light +5\n\t\t\t\t\n\t\t\t\t(Your relations with Queen Shiera decrease by 2)\n\t\t\t\t*goto infirmary2\n\t\t\t\t\n\t\t\t#Only observe.\n\t\t\t\tAfter your tour in the experimentation room, you are a little bit more willing to accept Nomo's point of view. Seeing the suffering of so many centipedes dulls your \n\t\t\t\tempathy a little bit.\n\t\t\t\t*set light -3\n\t\t\t\t*set rel_shiera +1\n\t\t\t\t\n\t\t\t\t(Your relations with Queen Shiera increase by 1)\n\t\t\t\t*goto infirmary2\n\t\t\t\t\n\t\t\t#Accept Nomo's offer.\n\t\t\t\tYou pressure yourself to adopt the point of view of Nomo and actually manage to do so. Seeing the suffering of so many centipedes dulls your \n\t\t\t\tempathy and you find yourself spraying them with toxic chemicals to see how long they last and conducting a vivisection. Nomo seems to like your involvement and you bet she is going to \n\t\t\t\tpraise you in front of her Queen\n\t\t\t\t*set light -5\n\t\t\t\t*set rel_shiera +3 \n\t\t\t\t\n\t\t\t\t(Your relations with Queen Shiera increase by 3, but your alignment with the light decreases by 5)\n\t\t\t\t*goto infirmary2\n\t\t\t\t\n\t*hide_reuse #Offer to help healing the wounded \n\t\t\"I can see that the medical stuff is quite busy. I'd like to help,\" you explain.\n\t\t\n\t\tNomo seems surprised to at first, but then shows her appreciation with a delicate curtsy.\n\t\t*if (healing=0)\n\t\t\n\t\t\tYou don't have the healing gear attached to your armour, so there is little you can actually do to help the wounded, but when there is will, there is a way, as you like to say. You ask where the medical supplies are and try to remember their names. The decision you take is to simply fetch what is needed to \n\t\t\tthe medics. After observing their procedures, you even try yourself.\n\t\t\t\n\t\t\tDespite your internal doubt of the actual help you were able to provide, the medics seem to be happy.\n\t\t\t*set rel_shiera +1\n\t\t\t*set light +1\n\t\t\t\n\t\t\t(Your relations with Queen Shiera increase by 1)\n\t\t\t*goto infirmary2\n\t\t\t\n\t\t*else\n\t\t\tNomo takes you to the emergency room where there are several insectoids in critical condition. You aim your left forearm at one of them and release the nanobots. At first, you have your doubts as they are designed to heal humans, but \n\t\t\tyou see that the marks of an operation that must have taken place recently simply vanish. The patient wakes from the slumber she was in and almost jumps off the bed. A medic explains that she should still stay in bed for further examination, no matter how hard it is for a \n\t\t\tprobably healthy warrior to remain lying for so long.\n\t\t\t\n\t\t\tYou use your equipment on a couple of other patients and confirm that it simply can't recreate missing limbs and jaws.\n\t\t\t\n\t\t\tWhen you get a warning that the battery of the healing gear is low, you are forced to stop. The medics give you a lot of thanks, which only adds on your content on \n\t\t\thaving a job well done and alleviating a lot of suffering.\n\t\t\t*set rel_shiera +3\n\t\t\t*set light +1\n\n\t\t\t(Your relations with Queen Shiera increase by 3)\n\t\t\t*goto infirmary2\n\t\t\t\n\t#Finished with the options you want and can make\n\t\t*goto hive\n\t\t\n*label done\nYou realize that you spent quite a lot of time in the hive and you are beginning to get worried about your teammates you left in a helpless condition. What if something happened to them while you are exploring?\nYou left the door open. It would be stupid to assume that Astra has no defense system of any kind to protect her base against intruders, but you don't know for sure.\n\nYou tell Nomo that you need to go and she decides to escort you just to be on the safe side.\n\n*if (insect_forcefield>0)\n\tAs you walk outside the hive, another insectoid rushes from behind. She actually uses wings to prolong the jumps she makes every now and then in order to be even faster.\n\t\n\t\"What is it, Carna?\" Nomo asks.\n\t\n\tThe newcomer struggles for her breath, but explains that she's carrying the forcefield creation divice. \n\t\n\t\"I am surprised you managed to do what you needed that quickly,\" you tell her as you take the small box and insert it into the slot on the sleeve of your battle armour.\n\t\n\t\"Oh, no we couldn't. That would be beyond the capabilities of our engineers,\" says Carna.\n\t\n\t\"Then why do you bring it back?\"\n\t\n\t\"We made a duplicate. Now we have all the time we need to reverse engineer it or do whatever we need. And you can use it yourself.\"\n\t\n\tHer comment makes you smile.\n\t*goto done2\n\t\n*else\n\t*goto done2\n\t\n*label done2\nNomo takes you to the door of Astra's base. You open the door and wave the insectoid goodbye.\n*page_break\n\nAs you enter the corridor, Astra appears from the room where Valkyrie and Meatwall are. She seems happy to see you again, her radiance intoxicating you more that a bottle of booze could, especially when she \nembraces you and kisses your cheeks. \"I am so glad you are safe, ${name}. There are only a few dangers out there, but I worried you can be harmed,\" she explains.\n\n\"I am fine, don't worry. I just wanted to say hello to the neighbours.\"\n\nHer laughter ripples as she takes you into the room, her hand still on your waist. \"The insectoids. They are cool.\"\n\n\"Their Queen seems to be quite fond of you,\" you remark.\n\n\"Shiera is my best friend here. She helps me deal with the insanity of loneliness I sometimes fall into. I have the need to connect... you understand me, right?\"\n\nYou nod and look at the cases.\n\n\"They are better, but I recommend they stay one more day in this condition.\"\n\nThey seem fully recovered. \"I can't wait to see them again alive and kicking,\" you remark.\n\n\"Oh, they are pretty much alive. I think I get what you mean but what do you want them to kick?\"\n\nYou laugh out loud. Being lost in translation can be funny.\n\nAstra invites you to sit at a table you didn't notice the last time you were in the room. A couple of smoothies adorned with sparkling straws await you there. You sit and take a sip. \nIt is quite tasty.\n*if (wardrobe=1)\n\t\"I watched the video footage of your awakening and the few minutes after that. I find it lovely that you enjoyed playing with my stuff.\"\n\t\n\t\"Wait, you watched... me...\"\n\t\n\tAstra opens her big blue eyes even further, expecting your reply.\n\t*choice\n\t\t#\"That is a violation of my privacy!\"\n\t\t\t*set rel_astra -1\n\t\t\t\n\t\t\t\"You must understand that it was because I was worried about you. When I came back here, I saw your bed empty and you were nowhere to be found. Checking up the \n\t\t\tcamera footage was the natural thing for me to do.\" Her voice sounds so soothing even when she is supposed to be angry, that it is hard for you to be mad at her. \"I must understand, however,\n\t\t\tthat despite our physical similarities, we come from different cultures and what makes sense to me may be incompatible with your beliefs.\"\n\t\t\t\n\t\t\t(Your relations with Astra decrease by 1)\n\t\t\t*goto done3\n\t\t\t\t\t\n\t\t\n\t\t#\"I understand that it is because of security reasons.\"\n\t\t\t*set rel_astra +1\n\t\t\t\n\t\t\t\"Thank you for your understanding. I have the feeling that our similarities don't end with the physical similarities. Our frequencies might be closer than I initially thought.\"\n\t\t\t\n\t\t\tThat comment makes you blush slightly.\n\t\t\t\n\t\t\t(Your relations with Astra increase by 1)\n\t\t\t*goto done3\n\t\t\t\n*else\n\t*goto done3\n\t\n*label done3\n*page_break\n*if (weapon=1)\n\t\"The security camera showed me that you took my handgun. That is all my mistake, I did not perceive the situation correctly. I've been taught that all weapons should be locked away because accidents happen,\" says Astra with a sad hint in her voice.\n\t\n\t\"No incident happened, actually,\" you explain. \"I wanted to take it as a means of self-defense. Nobody is hurt.\"\n\t\n\t\"I acknowledge that. It is just that not conforming to security protocol is something I am not proud of. I assumed that I wouldn't take it and that did not correspond to what really happened. This one is dangerous. It belonged to a race \n\tthat almost brought themselves to extinction.\"\n\t\n\t\"Will it save my life if it is the only weapon I have and I am facing an enemy?\" you ask bluntly.\n\t\n\t\"It could do that.\" Astra nods. \"But it will no longer be a life worth living. I am sorry, but it will be very difficult to give you a better explanation based on the scientific paradigm your \n\tpeople have come to.\"\n\t\n\t\"I can return it to you if you require it.\"\n\t\n\tAstra pauses. \"No, I will not make you do that, require it or even insist. I told you enough. There are important decisions we make each day and it is one of those.\"\n\t\n\tYou scratch your chin. \"I don't agree I've heard enough, but you made it perfectly clear you are not telling me more.\"\n\t*choice\n\t\t#Keep the pistol\n\t\t\t\"Astra, when I took the decision to pick it up from where it was, I took a decision. You are not giving me a reason to change my mind. I'd like to keep it.\"\n\t\t\t\n\t\t\t\"You are free to do so, even though it fills me with sadness.\"\n\t\t\t*set rel_astra -3\n\t\t\t\n\t\t\t(Your relations with Astra decrease by 3)\n\t\t\t*goto done4\n\t\t\t\n\t\t#Give it back\n\t\t\t\"Alright, Astra. It was wrong of me to take something that is not mine. Here it is.\" You handle her the weapon. She smiles and mods, then she \n\t\t\tleaves the room, probably to take it back to its place. \"Can we just forget about this?\"\n\t\t\t\n\t\t\tThe blonde laughs. \"I an not even sure what you are talking about.\"\n\t\t\t\n\t\t\t\"Now this is a good attitude.\" You make the thumbs up gesture.\n\t\t\t\n\t\t\t\"It is not the same as rising a middle finger, I guess,\" says Astra with a slight confusion written on her face. You quickly explain her what it meant to convey.\n\t\t\t*goto done4\n\t\t\t\n*else\n\t*goto done4\n\n*label done4\n*if (skeleton=1)\n\tYou remember what you found in the other room and decide to ask her what that creature is.\n\t*goto done_explain\n\t\n*else\n\t\"I think I should show you something you haven't discovered so far.\" Astra stands up and leads you to the corridor and then to the other room. It is an exact replica of the one you woke up in. One of the cases is empty. The remains of Innovation are put on the table and there are cables attached to it. You guess that she is \n\tundergoing a procedure aimed at restoring her software. You hope you will be able to recreate the missing parts of her body. You know she does not feel pain, but she will \n\tdefinitely happy by the state she is in. Your heart really breaks, knowing what acrobatic feats this metal girls can achieve. \n\n\tYou take your eyes off Innovation and it is only then that you see that there is actually... someone in the second transparent.\n\n\tThe creature is a humanoid, but unlike Astra, it is not human. The skin is green and it is covered in scales and its eyes are big and black. \n\n\tThis one looks a bit darker than the ones of your teammates. You can't tell for sure, but the body seems intact. What if the nano healing technology is off and he is just \n\theld a prisoner, in a comma state?\n\n\tWait, how do you know it is he... Who is putting there thoughts in your mind?\n\t\n\t\"Come on, let's get back to the other room, I will explain,\" says Astra.\n\t*goto done_explain\n\t\n*label done_explain\n*page_break\n\"This is a creature of an advanced non-human species our kind has known for such a long time, creatures we call scaled ones. I met this one a few days ago and decided to stun him and bring it here until I find out more about who he is and what he wants. My plan was to create a telepathic link to him.\nI guess the measures I took could be seen as drastic, but you have no idea how dangerous and vicious their kind can be. Well this is a poor excuse, actually.\"\n\n*if (insect_hurt=1)\n\t\"For one thing, insectoids would have acted differently,\" you say. \"I... I am not proud of what I did, but when I went there and one of them approached me, I was so sure that she was going to attack me\n\tthat I sot her. And, she explained she still had no reason to attack back.\"\n\t\n\t\"I can sense Shiera's frequencies and I bet you had quite an experience in there and I would like you to tell me more about it. You are partly right, ${name}, they would take \n\textensive measures not to harm a human mainly because of my relationship with them. But, if you were a centipede, they would engage in a fight first and then ask questions. Well, actually, that was a good point. I once knew a scaly one who was\n\tone of my teachers. Anyway, what prompted you to shoot the insectoid?\" \n\t\n\tYour explanations makes her roar with laughter. \"I shouldn't have taught them my greeting gestures. They certainly look weird, besides, they were never meant to be performed by somebody with pincers.\"\n\t*goto done5\n\n*else\n\t*goto done5\n\t\n*label done5\n*page_break\n\"It is one of those moments when, despite your experience and knowledge, you still don't know what to do,\" says Astra. \"Should I listen to my heart, telling me to let the scaled one go, or my mind saying that I should be cautious.\"\n\nWhat would you answer?\n*choice\n\t#The heart\n\t\t\"The heart is what makes us human right. It may not always give us the right advise, but listening to it is the right thing to do, isn't it?\" you reply, suddenly becoming\n\t\teloquent about matters you seldom talk about.\n\n\t\tAstra touches your hand for a second. \"It is a pleasure to have somebody with the right attunement around. I fear, however, that it is also important to make the best decision because if I let him go, that may be \n\t\tvery bad for the whole planet. I will continue my exploration of his mind, ensuring he is not harmed in the process.\"\n\t\t*set light +1\n\t\t*set rel_astra +1\n\t\t\n\t\t(Your relations with Astra increase by 1)\n\t\t*goto done6 \n\t\n\t#The mind\n\t\t\"I agree that it is important to listen to your heart, but when it comes to decisions, the mind is the one to listen to,\" you say coldly.\n\t\t\n\t\tAstra sighs. \"It is the way of the science. Well, this is what I plan to do anyway. It is very important to make the best decision because if I let him go, that may be \n\t\tvery bad for the whole planet. I will continue my exploration of his mind, ensuring he is not harmed in the process.\"\n\t\t*goto done6\n\t\t\n*label done6\n\"Now, tell me about what happened to you in the hive,\" Astra asks.\n\nSo, you summarize your story. \"Their Queen Shiera seems to be impressed by you,\" you add.\n\n\"She is a beatiful child and a good friend. I believe that every ruler in the universe should share her commitment to the well-being of their subjects.\"\n*choice\n\t*selectable_if (hatchery=1) #Tell her about the battle with the centipedes\n\t\t\"The relations with the centipedes are something I need to work on, it is one of the biggest challenges I am currently facing in the planet. The centipedes are just too aggressive and they tend to try to hit the insectoids where it hurts the most - their eggs. My intuition\n\t\tactually tells me that it is something you may help me with while doing that mission of yours,\" says Astra.\n\t\t*goto done7\n\t\t\n\t*selectable_if (genetic=1) #Tell her about the genetic experimentation\n\t\tAstra's eyes become visibly darker. \"I asked Queeen Shiera to stop it. I should have checked if she did it or not. I never even enquired about it. It is just that spending time with her is so much fun\n\t\tthat I simply forget to talk to her about painful topic unless it is absolutely necessary.\"\n\t\t*goto done7\n\t\t\n\t#Say nothing\n\t\t*goto done7\n\t\t\n*label done7\n*page_break\n\"I believe that you should rest more. You may think you are fully recovered, but if you continue pushing yourself, you will find your powers fully drained,\" Astra warns you.\n\t\t\n\"I guess you are right, but there is so much I want to ask you about. We haven't even had the time to ask you about any clues you could give me.\"\n\t\t\nAstra runs her fingers over her mane, a serious expression on her face. \"You must understand that knowledge is a burden. I may have told you that I know quite a lot about your mission and how it stands withing a \nlarger frame of events and people. Allow me to tell you as much as I see fit for the time being. You already know that there are parts of the way you need to walk yourself. Does that sound right?\"\n*choice\n\t#\"This is bullshit. I need all the necessary information. This could be the difference that may ensure the survival of my squad and me.\"\n\t\t\"I can see your logic, but I assure you that I would hide nothing that would endanger you or any of your team members. I also understand that your rudeness comes from feeling weak and helpless, not from being bad. I hope that in the end of your mission, you will be slightly more elevated.\"\n\t\t*set rel_astra -1\n\t\t\t\t\n\t\t(Your relations with Astra decrease by 1)\n\t\t*goto done8\n\t\t\t\t\n\t#\"It is very hard to understand, but so far you've demonstrated that you are an ally and I have no reason not to trust you.\"\n\t\t\"I am glad that I was able to establish trust with you. And, I hope that this won't change. There may be times when you may doubt me. If that is the case, look into your heart, let that \n\t\tbe your guide.\"\n\t\t*set rel_astra +1\n\t\t\t\t\n\t\t(Your relations with Astra increase by 1)\n\t\t*goto done8\n\t\t\t\t\n\t#\"I understand\"\n\t\t\"I hope you really do. Those two words are easy to say, but it is a big claim to make. There may be times when you fail to do so as regarding my actions. If that is the case, look into your heart, let that \n\t\tbe your guide.\"\n\t\t*set rel_astra +1\n\t\t\t\t\n\t\t(Your relations with Astra increase by 1)\n\t\t*goto done8\n\n*label done8\n*page_break\n\"Now, I believe you should rest. Tomorrow will be a big day for you. Your friends will wake up and you will be able to continue your explorations.\"\n\n\"Wait, what about Innovation?\"\n\n\"I feel that you care for her as much as any of your other friends and teammates. I fear her recovery will take longer. I may have to replace he whole of her metallic body. This will take some time. You don't need to worry, her core\nsoftware is unscathed. She will be able to join you in a couple of days. Until then, think about her with love.\"\n\nThe smile on Astra's face doesn't make it clear whether she is joking or her last sentence is aimed at delivering a message to you.\n\nYou finish your beverage and Astra leaves you to rest. You get in the translucent case again. The sleep comes quickly.\n*page_break\n*if (blood\u003c5)\n\tWhile you are asleep, your wounds are healed.\n\t\n\t*goto done9\n\t\n*else\n\t*goto done9\n\t\n*label done9\nIt feels as if your dream lasted only for a few seconds, but you wake up fully recovered, ready to kick some ass.\n\nAstra is in the room, putting the finishing touches of a table full of mysterious food.\n\n\"Is it morning already?\" you ask.\n\n\"Goof morning to you, ${name}. I know how you feel. These cases are designed to spend very long periods of time in, this is why one of their features is changing the \nperception of time for the one who's occupying it.\"\n\n\"Being inside feel marvelous, thank you, Astra. You've brought a lot of food. Do you think we could handle it?\"\n\n\"I don't know. The darker-skinned friend of yours seems like he needs a lot of protein to maintain what he's got.\"\n\nYou looking at Meatwall's case, but you need no assurance for admitting that Astra is right. Then, your eyes glide to Valkyrie, she sleeping northern beauty.\n\n\"Astra, is there any reason for you to look like Valkyrie?\" you ask at the sudden realisation that somehow eluded you until now.\n\n\"Was that supposed to be a compliment? I've heard I looked young for my age, but this young flower is beauty embodied,\" Astra laughs. \"I guess I owe you a serious answer. There is a genetic strain that is considered \nto be favourable for healers and it often manifests iiself in something I can definitely feel in your aura. This is not a reliable source for judgement since there are other hereditary reasons, but I would go as far as\nsuggest that it is the reason for it.\"\n\nYou nod. \"Valkyrie lives to heal, indeed.\"\n*page_break\n\"It is time,\" Astra says and looks at Meatwall's case.\n\n\"So be it,\" you reply.\n\nThe light coming through the lid vanish and it opens. Meatwall sits up and curses.\n\n\"Damn it, it feels as if I was in a coffin made for dwarfs.\"\n\nYou are more than happy to see him so full of life again, so much being himself, however, you are beginning to fear that his typical language may make a bad impression on Astra.\n\n\"I am sorry for the inconvenience, I just don't have your size,\" the tall blonde replies.\n\nMeatwall suddenly realizes he is not alone. He establishes eye contact with you and nods, then his eyes slide on Astra.\n\n\"Cap, who's that hell of a hottie?\" he asks, elevating your fears.\n\nHow would you reply?\n*choice\n\t#Scold him\n\t\t\"Meatwall, would you please stop disgracing me in front of that woman. She is not part of the army and is in no way supposed to endure the customs you reffer to when talking about\n\t\tthe female soldiers from other teams.\"\n\t\t\n\t\tThe tanks frowns. \"Yes, Sir!\"\n\t\t\n\t\t\"There is no need for such formality. Just be nice to the lady, this is what I will ask of you,\" you elucidate. \n\t\t\n\t\t\"Being less formal, I'd like to ask you to stop being a three-letter word, ${name}.\"\n\t\t\n\t\t\"You can count on that.\" You step up and offer him your hand, which he squeezes very hard.\n\t\t*set rel_meat -1\n\t\t\n\t\t(Your relations with Meatwall decrease by 1)\n\t\t*goto done10\n\t\t\n\t#Say that she is hot indeed\n\t\t\"Thank you, guys for complimenting me. ${name}, I can sense your discomfort at the exact way your friend's words can be decoded. I understand the positive feeling his words are supposed to convey\n\t\tdespite the dubious connotation of the very words. This means I am not a bimbo!\" She turns and shakes her finger at Meatwall.\n\t\t\n\t\tThe tank rises his hands. You step up and give him a brief hug. \"It is good to have you online again, friend.\"\n\t\t*set rel_astra +1\n\t\t*set rel_meat +1\n\t\t\n\t\t(Your relations with Astra and Meatwall increase by 1)\n\t\t*goto done10\n\t\t\n\t#Apologize to Astra for your friend's behaviour\n\t\t\"You must excuse my friend. He has a brave heart but is incapable of treating a lady the way he should.\"\n\t\t\n\t\t\"I understand the positive feeling his words are supposed to convey\n\t\tdespite the dubious connotation of the very words. This means I am not a bimbo!\" She turns and shakes her finger at Meatwall.\n\t\t\n\t\tThe tank rises his hands. You step up and offer him your hand, which he squeezes very hard.\n\t\t*set rel_astra +1\n\t\t*set rel_meat -1\n\t\t\n\t\t(Your relations with Astra increase by 1 but those with Meatwall decrease by 1)\n\t\t*goto done10\n\t\t\n\t\t\n\t#Calmly, explain to him that she deserves more respect for what she did\n\t\t\"I understand the positive feeling his words are supposed to convey\n\t\tdespite the dubious connotation of the very words. This means I am not a bimbo!\" She turns and shakes her finger at Meatwall, after you finished with your explanation.\n\t\t\n\t\t\"This is how I express my maximum respect towards a woman. This is how we in the army act,\" Meatwall explains.\n\t\t\n\t\t\"I appreciate it. We come from different cultures and this is something that may be expected,\" Astra replies.\n\t\t\n\t\tThe tank nods. You step up and give him a brief hug. \"It is good to have you online again, friend.\"\n\t\t*set rel_astra +1\n\t\t\n\t\t(Your relations with Astra increase by 1)\n\t\t*goto done10\n\t\t\n*label done10\n*page_break\nValkyrie is the next to wake up from her slumber. She steps out gracefully, as if having invisible wings that help her maintain balance.\n\n\"Welcome to my home, healer,\" Astra says. Without any other words, the women embrace each other and kiss their cheeks. You wonder if they exchange any telepathic waves. In any way, you\ncan feel that there is more going on below what you are able to see.\n\n\"You must be Astra. I dreamt about you.\"\n\n\"I can sense you are beginning to open your eyes to understanding what it really means to heal one's soul. I take we will have the opportunity to talk about it later.\"\n\n\"It would be a pleasure.\"\n\nMeatwall coughs. \"I am sorry to spoil the moment, er, miladies, but I see a table full of mysteriously looking food and my stomach feels kind of empty.\"\n\n\"I prepared the food and you are welcome to enjoy it. I am not aware of your preferences, but I hope you will like it,\" says Astra and gestures an invitation to sit at the table.\"\n\n\"I am sure everyone else is going to love it too. You bring the culinary art to a whole new level,\" you say.\n\nMeatwall takes a bite at the first delicacy he sees. \"Name's Astra, right? Can I marry you, please?\"\n\nEveryone laughs.\n\n\"Should I take this proposition seriously?\" Astra inquires.\n\nMeatwall tries to say something, but his mouth is too full to utter anything comprehensible.  \n*page_break\n\nDuring the next half an hour, Astra carefully explains what happened while Valkyrie and Meatwall were recovering. She also explains the situation regarding Innovation's state right now.\n\nYou, on the other side, you have a juicy story to tell about your experience in the hive.\n\n\"So, what do we do, captain? I hope I can get this mission over and away with in time to get to the tournament.\"\n\n\"We know where the artifact was when it was found, right?\" you ask Astra. \"Maybe if we get there, we will be able to find clues about its location.\"\n\n\"The artifact is stil there,\" she answers calmly.\n\n\"But how?\" your jaw drops.\n\n\"Remember I told you we are in a parallel reality? In this one, there are two artifacts with identical attributes. One of them is still there, the other is in possession of the soldier \nyou are informed about. Your aim is to get to that artifact, this is why I wanted to help you a little. I believe you may not be ready to meet him.\"\n\n\"Then why didn't you just give it to us?\" asks Meatwall.\n\n\"There are unique ways in which the artifact will interact with you. They require a more secluded location.\"\n\n\"Is it going to be dangerous?\" asks Valkyrie.\n\n\"Yes, dear one, but I believe that you will be able to survive and learn a valuable lesson about yourselves. You came here looking for an experience and it will be unwise of me to \ndeny you that.\"\n\n\"Bullshit, the army sent us here. We had no choice!\" Meatwall protests.\n\n\"Then whose choice was to join the army? And whose choice is to proceed with this mission. What if I told you could play dead and actually stay with me here on this planet? Would you \nstray from your army path?\"\n\n\"No, the army is all I know. I grumble about it, but I feel good as a part of it.\"\n\nValkyrie says nothing, but you know what hides behind her silence. \n\nYou remain silent as well. Astra's words take you by surprise.You know you don't have to yet, but you guess that may be one of the most important choices in your life.\n*page_break\n\"I want to see Innovation,\" says Meatwall.\n\n\"Sure,\" Astra says. \"She resides in the room down the corridor.\" She points at the door leading to it.\n\nHe looks at Valkyrie and you, a silent question of whether anyone of you will join him. You nod and stand and the healer follows you. Meatwall, just as he always does, steps ahead and you temporarily lose sight of him. It is then that you feel something is wrong. And, you can hear his thoughts in your mind.\n\nMeatwall:[i] What's that ugly lizard in the corridor. Those jarred muzzle and claws. I'd better attack first, I have backup and healing behind my back.[/i]\n\nIt seems that the fact that he is not in his battle armour doesn't worry him too much. He is a fearless warrior and you respect him for that. \n\nHiss:[i]Stand back! I want to just leave, but come any closer and I won't hesitate a second to rip you to shreds.[/i]\n\nApparently, you are the only one hearing the thoughts of the reptilian ans Meatwall just fails to read his body language.\n\nWhat do you do now?\n*choice\n\t#Rush into the corridor and stop Meatwall from attacking\n\t\tYou get to Meatwall just in time, virtually jumping on his back and almost bringing him down. The tank is so powerful that it takes him only a couple of seconds to bring you down. This, however, is enough for \n\t\tthe reptilian to go away.\n\n\t\tHiss:[i] You made the right choice, human. I appreciate it.[/i]\n\t\t\n\t\t\"What the hell is wrong with you,\" Meatwall shouts at you, an arm ready to punch you in the face if necessary.\n\t\t\n\t\t\"You were about to make a big mistake. That creature was dangerous and it was not trying to attack you,\" you explain and he lowers his fist.\n\t\t\n\t\t\"How do you know? It didn't seem so.\"\n\t\t\n\t\t\"I knew it. Please, acknowledge that I may currently have more information than you.\"\n\t\t\n\t\tMeatwall nods. \"I acted stupidly, didn't I?\"\n\t\t\n\t\t\"Not really. I know that in another situation that would have been the right decision, but it was not that situation.\"\n\t\t\n\t\tAstra comes from the room. \"${name}, I am impressed by your actions. Good warriors know that the best way to win a battle is to prevent it from occurring.\"\n\t\t*set rel_hiss +1\n\t\t*set rel_astra +2\n\t\t*set rel_meat +2\n\t\t\n\t\t(Your relations with Astra, Hisz and Meatwall increase)\n\t\t*goto done11\n\t\n\t#Rush into the corridor and help Meatwall fight the reptilian\n\t\tYou jump out of your chair, nearly knocking the table over. This sends a signal to Valkyrie to follow you.\n\t\t\n\t\tWhen you reach Meatwall, he is already brawling with the reptilian. Hiss possesses unexpected strength for such a slim creature. He crouches to grasp Meatwall's midsection, then lifts him up and bumps him unconscious into the wall, even though you try to stop him.\n\t\t\n\t\tFear overwhelms you when your eyes meet.\n\t\t\n\t\tHiss:[i]I expected more from you, puny human than attack me. Here is a little present from me to remind you how to treat those of my kind.[/i]\n\t\t\n\t\tA pair of very long claws comes out of his hands and he claws. You try to dodge, but his speed is unmatched. You understand something is wrong when you feel a warm liquid pouring down your torso and \n\t\tgathering in a puddle on the floor.\n\t\t\n\t\tHiss:[i]Now, if you would excuse me, I'd like to leave you alone to fully enjoy the present I just gave you.[/i]\n\t\t\n\t\tHe leaves and then comes the pain burning not only in the lacerated places but throughout your body. You fall on the floor, on the verge of losing consciousness. It seems that Valkyrie managed to get to her healing device, because \n\t\tyou feel the soothing touch of the healing bots. You see Astra's face close to you. \"Dear ${name}!\" she exclaims and then takes you in her arms as if you are a toy and brings you to the case.\n\t\t*page_break\n\t\tAs you may expect, you wake up feeling much better. The only trace of the incident that happened with you is your ragged outfit and the nail marks on your torso.\n\t\t\n\t\tStepping out of the case, you see Meatwall coming out of his, massaging the back of his head.\n\t\t\n\t\t\"${name}, didn't I tell you this creature is dangerous?\" Astra asks.\n\t\t\n\t\t\"What exactly happened to me? One second I was okay, despite being wounded and then I was paralyzed with pain,\" you ask.\n\t\t\n\t\t\"The reptilians have exocrine glands under their nails that produce smart poisons with various effects that can be activated by the brain waves of the reptilians themselves.\"\n\t\t*set rel_hiss -1\n\t\t*set rel_meat +3\n\t\t\n\t\t(Your relations with Hiss decrease by 1, but your relations with Meatwall increase by 3)\n\t\t*goto done11\n\t\t\n\t#Order Valkyrie to take the healing gear from her armour and prepare to use it\n\t\tValkyrie doesn't hesitate for a second and rushes towards her battle gear. Removing the healing device is quicker than actually putting it on, but is still hard for a one guy to do, so you help her.\n\t\t\n\t\tWhen you reach Meatwall, he is already brawling with the reptilian. Hiss possesses unexpected strength for such a slim creature. He crouches to grasp Meatwall's midsection, then lifts him up and bumps him almost unconscious into the wall.\n\t\t\n\t\tHiss:[i]I expected more from you, humans. ${name}, if you want to attack me, at least be a man about it and face me? No? Then I will give the present I had for you to your friend. [/i]\n\t\tA pair of very long claws comes out of his hands and he claws at Meatwall, who is trying to get up. He can't dodge, but even if he could try, he'd probably fail as the speed of the reptilian is unmatched.  \n\t\tYou see his blood gathering in a puddle on the floor. The wounds don't stop Meatwall, as if the nails of the reptilian are covered with anaesthetic.\n\t\t\n\t\tHiss:[i] See what awaits you if you cross mu path again![/i]\n\t\t\n\t\tHiss leaves the building and Meatwall collapses on the floor in agony. For a second, you fear that you may still lose him, despite Valkyrie being so close to him.\n\t\t\n\t\tThe blonde needs no invitation to use her healing device on the tank. The nano bots bind his wounds, but he continues wriggling. The painkilling effect of theirs comes a lot later than usually, which makes\n\t\tyour heart ache for the pain the tank is going through. He is a tough guy, but still it is a sick sight.\n\t\t\n\t\tHe finally stops shivering. Valkyrie helps you get him to a case so that he can recover.\n\t\t\n\t\t\"What exactly happened to him? One second he was okay, despite being wounded and then he was as if paralyzed with pain,\" you ask Astra.\n\t\t\n\t\t\"The reptilians have exocrine glands under their nails that produce smart poisons with various effects that can be activated by the brain waves of the reptilians themselves.\"\n\t\t*set rel_hiss -1\n\t\t*set rel_meat +1\n\t\t\n\t\t(Your relations with Hiss decrease by 1, but your relations with Meatwall increase by 1)\n\t\t*if (healing>1)\n\t\t\t*goto a_heal\n\t\t\n\t\t*else\t\n\t\t\t*goto done11\n\t\t\t\n\t#Remove your weapon from your battle armour and rush to help \n\t\tWasting no time, you rush to your battle gear and take the implanted weapon from the sleeve. It takes more time to do so than you really want, especially having in mind that your hands get \n\t\ta little shaky. Fighting is not supposed to be conducted without battle gear.\t\n\n\t\tWhen you reach Meatwall, he is already brawling with the reptilian nad you fear that if you shoot, you may hit the tank. Hiss possesses unexpected strength for such a slim creature. He crouches to grasp Meatwall's midsection, then lifts him up and bumps him almost unconscious into the wall.\n\t\t\n\t\tYou fire. The reptilian sees it but makes no attempt to get out of its way. Then the beam is about to reach it, it connects with an invisible wall and ends in a fury of sparks.\n\t\t\n\t\tHiss:[i]I expected more from you, puny human than attack me. Here is a little present from me to remind you how to treat those of my kind.[/i]\n\t\t\n\t\tA pair of very long claws comes out of his hands, he leaps towards you and claws. You try to dodge, but his speed is unmatched. You understand something is wrong when you feel a warm liquid pouring down your torso and \n\t\tgathering in a puddle on the floor.\n\t\t\n\t\tHiss:[i]Now, if you would excuse me, I'd like to leave you alone to fully enjoy the present I just gave you.[/i]\n\t\t\n\t\tHe leaves and then comes the pain burning not only in the lacerated places but throughout your body. You fall on the floor, on the verge of losing consciousness. It seems that Valkyrie managed to get to her healing device, because \n\t\tyou feel the soothing touch of the healing bots. You see Astra's face close to you. \"Dear ${name}!\" she exclaims and then takes you in her arms as if you are a toy and brings you to the case.\n\t\t*page_break\n\t\tAs you may expect, you wake up feeling much better. The only trace of the incident that happened with you is your ragged outfit and the nail marks on your torso.\n\t\t\n\t\tStepping out of the case, you see Meatwall coming out of his, massaging the back of his head.\n\t\t\n\t\t\"${name}, didn't I tell you this creature is dangerous?\" Astra asks.\n\t\t\n\t\t\"What exactly happened to me? One second I was okay, despite being wounded and then I was paralyzed with pain,\" you ask.\n\t\t\n\t\t\"The reptilians have exocrine glands under their nails that produce smart poisons with various effects that can be activated by the brain waves of the reptilians themselves. By the way, ${name}, I see you have an appetite for using arms and this is understandable.\n\t\tKnow that the invisible shield reptilians use have tiny cracks. You may find a way to see them later, this is why I am considering upgrading your aiming device, just in case.\"\n\t\t*set rel_hiss -1\n\t\t*set rel_meat +2\n\t\t*set aim +1\n\t\t(Your relations with Hisz decrease by 1, but your relations with Meatwall increase by 2. Your aiming improves.)\n\t\t*goto done11\n\t\t\n*label a_heal\n*page_break\nAstra examines your battle gear.\n\t\t\n\"I like your concern for preservation and healing that you demonstrated in this battle. I see that you even have a healing device installed.\"\n\t\t\n\"Yes, it is important for me to make sure my team is in good health.\"\n\t\t\n\"That is wise. Hm, I think I recognize this model. What is even better, I guess I can make a small improvement to it so that the nanobots are a little more effective.\"\n\t\t\n\"I would really appreciate that.\" You smile.\n*set healing +1\n*goto done11\n\t\t\n*label done11\n*page_break\n\n\"What the hell was that creature?\" asks Valkyrie.\n\n\"Just a representative of a race that exhibit tendencies leaning towards extreme violence. I don't know him, I came across him a few days ago and decided to keep him in a stasis in a resting case just like the ones I used to heal you. I needed more time to decide what to do with him. Apparently, he \"\t\t\nhas plans on his own. It is sad I had little time to find out more about him, but I was busy taking care of you and my main mission here,\" Astra explains.\n\n\"I am sorry,\" says Valkyrie.\n\nAstra laughs. \"I don't want you to be sorry, dear. Saving you is one of the most rewarding experience in my three centuries of conscientious life.\"\n\n\"There what? You look in your early 30s,\" Meatwall exclaims.\n\n\"I can take that as a compliment, can't I? Our human genes have been slightly modified to allow improved longevity.\"\n\nThe moments of silence flag the inability of the whole team of your currently online to grasp what Astra is telling you. And, you guess you have to be the one to break it.\n*goto done12\n\n*label done12\nWhat would you say?\n*choice\n\t#Ask if anybody heard Hiss talking in their minds\n\t\tMeatwall and Valkyrie shake heads.\n\t\t\n\t\t\"What I am more interested in is whether you can hear the thoughts of your teammates,\" says Astra.\n\t\t\n\t\t\"Actually, now that you mentioned it, yes. I forgot about it, but I clearly knew what Meatwall saw in the corridor and that he's about to attack him.\"\n\t\t\n\t\t\"Yes, it is not only thoughts as they appear on the conscious level of thought, but subconscious thinking patterns as well, right?\"\n\t\t\n\t\t\"You are quite right, Astra, but what does it mean?\" you ask.\n\t\t\n\t\t\"Something beautiful is happening to you. You are unlocking a bit more of the human potential. I am not sure what the trigger is, though.\"\n\t\t\n\t\t\"But I don't do so now. Whatever it was, it was just temporary.\"\n\t\t\n\t\t\"It is always like that in the beginning, otherwise you will fell completely drained of energy in a couple of hours. Trust the divine in you. That ability will appear again in times of dire need.\"\n\t\t\n\t\t*goto done12\n\t\n\t#Ask to see Innovation\n\t\t\"Of course, please, come with me,\" says Astra and leads you to the other room.\n\t\t\n\t\t\"Oh, my... The Tin girl looks bad!\" Meatwall explains. \"Astra, don't tell me she is beyond repair.\"\n\t\t\n\t\t\"She kind of is, but don't worry, a new metallic body is being prepared for her. My hope is that you will be able to have it ready soon.\"\n\t\t\n\t\tYour eyes lay on the open case where the reptilian was. It looks as if the inside of it was burned.\n\t\t\n\t\t\"It takes a lot of psyonic effort to destroy the mechanisms that keep the one inside in stasis. Honestly, I did not believe it was a feat achievable by the reptilians. It may \n\t\tvery well turn out that this Hiss is someone special.\"\n\t\t\n\t\tMeatwall runs his hands through his short hair. \"What do we do, ${name}? Shall we wait for Innovation to come online or should we proceed with our mission?\"\n\t\t*goto done12\n\t\t\n\t#Ask Astra why she didn't intervene\n\t\t\"Astra, having in mind you are in possession of advance technology, I wonder why you didn't intervene,\" you say. Then, it dawns on you. \"You actually had that one coming, didn't you?\"\n\t\t\n\t\tThe woman takes a deep breath. \"Yes, I felt Hisz when he entered the corridor. I didn't let him out, neither did I know in advance that it would happen and I only learned about it as it happened. I felt, however, that is was a battle\n\t\tyou could face on your own, of course, with me being closely nearby, ready to step in if needed.\"\n\t\t\n\t\t\"Why would you want to just stay besides and watch?\" This time, it is Valkyrie who asks the question.\n\t\t\n\t\t\"Understand, dear ones, that power is directly linked to responsibility. Our experience shows that if you tend to step in and solve their problems, people fail to learn, develop and grow.\n\t\tDenying people of their experience may look like the right thing to do, especially when you cherish love and life, but when you look under the core, the situation seems quite different.\"\n\t\t*goto done12\n\n\t#Ask Astra about her mission here\n\t\tAstra smiles widely, showing a perfect set of teeth. \"That is a secret for now. I wouldn't be surprised if you find out, or if I decide to tell you more about it. You see, I am used to...\" she vanishes \"...operate form the shadows.\"\n\t\t\n\t\tYou turn back, since the voice is now coming from behind you. The shadow the strange apparatus casts can't hide the tall blonde, but her display does illustrate her point.\n\t\t\n\t\t\"That was amazing! I dare not think what other tricks you have up your sleeve,\" says Meatwall.\n\t\t\n\t\tAstra sighs. \"Why do boys need to be so naughty most of the time?\"\n\t\t\n\t\t\"Hey, how do you know what I mean? Oh, you can read my mind, can't you?\"\n\t\t\n\t\t\"Loud and clear! No, I'm joking, I can just sense the general direction but it is often enough.\"\n\t\t\n\t\t\"Well, thanks for telling me. I'll try to tame what can't be restrained.\"\n\t\t*goto done12\n\t\t\n\t#You want to get to the topic of your mission\n\t\t*goto done13\n\n*label done13 \t\n*page_break\n\"I understand you want to continue with your quest for the artifact, despite temporarily being a teammate down,\" says Astra.\n\n\"True,\" you remark.\n\n\"Okay, let me recap what is important to know about its location. This may be knowledge you have already obtained, but I want to make sure you have it.\" She looks in your eyes.\n\"The artifact is in the remains of a hive of insectoids just like the ones you saw in the hive. Now it lays in ruins, this is what the squad of Kachinski caused while trying to obtain it. You may have \nto go deeply underground and face dangers even I may not be able to predict.\"\n\nAstra makes a pause and you get it is up to you ti start with the questions.\n*goto done14\n\n*label done14\nWhat would you ask Astra?\n*choice\n\t*hide_reuse #Are you going to help us?\n\t\t\"No... and yes.I won't come with you. I won't be with you physically during your quest, this is an experience, a problem you should go through on your own. While this may sound rude to you, this is \n\t\tby no means its true meaning. Understand that I wouldn't send you there if I didn't think you were able in handling the situation on your own. Yes, you will encounter hardships but you have the power inside of you to come out triumphant. \n\t\tYou are humans, each of you have a piece of divinity within.\"\n\t\t\n\t\t\"These are beautiful words, Astra,\" you say.\n\t\t\n\t\t\"What about the 'yes' part?\" Meatwall asks.\n\t\t\n\t\t\"${name}, you will find a small crystal toy embedded in your battle gear with the number nine engraved on it. It will allow me to keep track of your progress. One time, it may\n\t\tallow me to teleport next to you and help you deal with a predicament. I may decide to do so in case the situation gets out of control. But remember, that could happen only once. My powers are limited when\n\t\tclose to that artifact.\"\n\t\t\n\t\t\"Why nine?\" asks Valkyrie.\n\t\t\n\t\t\"Because it rhymes with divine,\" Astra laughs. \"This is my message to you. I may happen to be one tiny step closer to it than you and my hope is that I can show you the way to it.\"\n\t\t*goto done14\n\t\n\t*hide_reuse #What kind of dangers can we expect there?\n\t\t\"I already mentioned that I may not be having a full understanding of what awaits you there. That artifact is like a portable black hole, sucking in most of the light I sent to it. If there was more of a reflection, I would know better. But let me share what I know for sure. There will be \n\t\tinsectoids whose mind is broken by being separated from the hive. You may have illusions that may summon surreal images to your mind, use them as opportunities for self-exploration. You may also have to embrace creatures of pure darkness and show them the way to the light... or burn them with your guns, it is your choice.\n\t\tOne person I am sure you will not meet there is Kachinski, but I think there is a large chance of you encountering some of his crew.\"\n\t\t*goto done14\n\t\t\n\t*hide_reuse #What is the artifact?\n\t\t\"What you are looking for is an armband of almost pure darkness. It is dangerous, but it is not something that will try to destroy you physically. On the opposite, it will appeal to your\n\t\tdarkest desires. However, our civilization has grown to understand that even in the deepest darkness can be used to get understanding, to gain something positive. Of course, if that is what you decide to do. Many\n\t\twould desire its power that they can use to fulfill goals of theirs... or be used by the artifact. It depends on the point of view, dear ones.\"\n\t\t*goto done14\n\t\t\n\t*hide_reuse #Will we meet Hisz again?\n\t\t\"I have very little understanding of what the aim of this creature is, but my intuition tells me that it may be related to this artifacts you seek. I don't know what part he will play in the setting, however.\n\t\tWell, I may be wrong. There can be quite a few reasons to be on this planet that have nothing to do with the artifact and it is possible that your paths never cross again.\"\n\t\t*goto done14\n\t\t\n\t#You have no more question\n\t\t*goto done15\n\n*label healingzz\n*if (healing=0)\n\tYou realize that you don't have a healing device attached to your battle gear, but you quickly get over the shock and start shooting at the invaders. The insectoids do an excellent job and defeat the centipedes.\n\t*goto battle_participate\n\t\n*elseif (healing=1)\n\tYou do your best to heal, choosing the ones that the most heavily wounded or those about to receive additional punishment, but you soon find out that your equipment is not good enough to negate the heavy damage the centipedes deal.\n\tYou manage to save one or two insectoids from certain death, which is a decent participation from your side, but you are still not content.\n\t\t\t\t\t\n\tFinally, the two invaders are slain.\n\t*goto battle_participate\n\t\t\t\t\t\n*else\n\tYou do your best to heal,choosing the ones that the most heavily wounded or those about to receive additional punishment. The centipedes do a lot of damage but your enhanced healing gear makes it very hard for them to manage to score kills. There are a lot of casualties, but after the centipedes lie motionless on the ground,\n\tyou realize that at least five or six insectoids are alive as a result of your actions.\n\t*goto battle_success\n\t\n*label done15\n*page_break\n\"Oh, I was about to forget,\" Astra says with a theatrical gesture. \"I am not going to send you alone in an environment you know nothing about. Now, 'nothing' may not be the right word sine ${name} paid a visit to a hive, but it is definitely not enough. There is \nsomebody that kept telling me that the derelict hive needs further exploration.\"\n\n\"Are you talking about Queen Shiera?\" you ask.\n\n\"Exactly. The matter regarding the destruction of her sister hive tolls its weigh on her. She believes that there might still be some of her brethren there, or at least some eggs. I've been delaying that and now there probably is the perfect\nopportunity to combine your military strength with her terrain knowledge. I believe she is coming.\"\n\nYou hear the front door open.\n\n\"Can I just suggest locking the door from time to time, please?\" asks Meatwall.\n\nThe Queen enters and is seems as if everyone (but Astra) stops breathing for a couple of seconds. Her majesty looks so beautiful in a human way, despite the chitinous \narmour that covers most of her body.\n\n\"Hello, it is nice to meet you,\" she greets you.\n\n\"Why do I always have to meet beautiful women?\" Meatwall protests. \"As if Valkyrie\n*if (gender=\"female\")\n\tand ${name} was not enough\"\n\t*goto done16\n\t\n*else\n\twas not enough\"\n\t*goto done16\n\t\n*label done16\n*page_break\n\"You think that I am beautiful?\" Valkyrie asks. \"You never showed me that in any way.\"\n\n\"Just look at a mirror, sugar,\" Meatwall replies.\n\n\"Wow, guys, I am happy that the Queen's appearance leads to such heart-melting confessions,\" says Astra. \"I want to tell you about her way of making war. Her chitinous layer \noffers some protection, but it is nowhere near what your armour provides. She tried a couple of models that I have and simply couldn't get used to them. I am working on something \nspecial for her but it is not ready yet.\"\n\n\"My anatomy is slightly different from yours,\" Shiera explains. \"I need my joints not to be covered by anything so that I can make sophisticated movements I like to make why fighting.\"\n\n\"When fighting, Shiera is a deadly poetry in action. All of her joints have the ability to rotate 360 degrees in all plains and the likes using almost all of them. About her weapons, she has retractable chitinous blades and \nexocrine glands that release acid situated next to them.\"\n\nShiera lets the blades out. They look hard and sharp.\n\n\"So, the lady is what we would call a highly mobile melee assassin. There are very few of them in our ranks,\" says Meatwall. \"I think that it is an unnatural role to play for a human. You need to have animalistic features to \nbe fit for it. It is the very opposite of what I do, being a heavily armoured ranged tank. I can almost imagine her leaping from behind my back, spraying the enemy with acid to remove their armour and then connecting her \nblades to the exposed flesh.\"\n\nShiera thumbs up, which makes Meatwall's jaw drop a bit.\n\n\"There are some signs most humans agree on and Shiera was keen on learning. I am sure she will be glad to spend time with other humans.\"\n\n\"We share a big portion of DNA and I want to get to know more about the other part of my roots,\" Shiera explains.\n\nAstra chuckles:\"If she does that in the tunnels, you would need to basically crouch lest she hits the ceiling with her head, even though the corridors at the hive of Hasj are bigger. What I want you to remember that Shiera's strength is not in her \nfighting skills even though she is quite good at it but in what she can tell you about the surroundings bellow.\"\n*page_break\n\"${name}, I have something to tell you,\" Astra continues. \"I've made some improvements in your battle armour. I've checked the archives of your model and made some improvements. You can now \nuse all of the implanted devices. I added extra slots and used minimized versions so that you won't feel your hands extra heavy.\"\n\nYou go to your battle armour and examine it carefully. \"Thank you, Astra. I believe that will be very important in our mission.\"\n\n\"That is not all, however. The more you use each of the devices, the more its performance will improve. It is an experimental self-teaching software. I've \nparticipated in the tests and I can assure you that it works. What would be important is not to overrely of a device you are not very good at when the situational is critical. For example, if it is the first \ntime with the healing device, don't expect to be able to save someone in a critical condition.\"\n\nYou nod.\n\n\"Now, let me have the attention of the other guys too.\" Astra sits at the table and you do the same. \"There is something I should explain to you. Remember I told\nyou we are now in a parallel reality that exists out of the timeline you were in before you came to the planet. This parallel reality is supported by pillars, and that pillars are you, dear ones. Know that if any of you dies, it will be the end.\"\n\n\"You mean we all die?\" Meatwall asks.\n\n\"Hopefully not. I have attached a small time travelling device in ${name}'s armour. It will bring you back to next morning. This is all I can do to help you.\"\n*set aim +1\n*set shotgun +1\n*set knife +1\n*set healing +1\n*set forcefield +1\n\n*set cp_rel_val rel_val\n*set cp_rel_meat rel_meat\n*set cp_rel_astra rel_astra\n*set cp_rel_insects rel_insects\n*set cp_rel_hiss rel_hiss\n*set cp_rel_shiera rel_shiera\n\n*set cp_name name\n*set cp_gender gender\n*set cp_att2males att2males\n*set cp_att2females att2females\n*set cp_aim aim\n*set cp_shotgun shotgun\n*set cp_knife knife\n*set cp_healing healing\n*set cp_forcefield forcefield\n*set cp_rebel rebel \n*set cp_val_blaster val_blaster\n*set cp_blood blood\n*set cp_look look\n*set cp_meat_rested meat_rested\n*set cp_wardrobe wardrobe\n*set cp_weapon weapon\n*set cp_skeleton skeleton\n*set cp_light light\n*set cp_insect_hurt insect_hurt\n*set cp_astra_hive astra_hive\n*set cp_insect_forcefield insect_forcefield\n*set cp_insect_participate insect_participate\n*set cp_insect_win insect_win\n*set cp_hatchery hatchery\n*set cp_genetic genetic\n\n*page_break\nEven though you are as eager to dive into the mission as any of your teammates, you decide to delay it so that you all get to know Queen Shiera and what may be even more important - to give her\nthe opportunity to get an understanding of how your team fights. At one point, you even go outside and make something distantly resembling a fighting simulation.\n\nYou find yourself having a lot of fun. You even are tempted into forgetting that warfare awaits you in the morning.\n\nAstra comes to remind you it is time to go to sleep. Meatwall jokes that she is in the role of the mother hen, which the blonde doesn't understand but still appreciates the effort\nto be funny. Your team and you go into the resting cases, while Queen Shiera decides to return to her hive for the night.\n*goto_scene hive ", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Slayer\"\n*set gender \"female\"\n*set aim 1\n*set shotgun 2\n*set knife 0  \n*set healing 1  \n*set forcefield 2 \n*set black_dots 2\n*set red_dots 1 \n\n... someone in the second transparent case.\n\nThe creature is a humanoid, but unlike Astra, it is not human. The skin is green and it is covered in scales and its eyes are big and black. \n\n\n[i]I am Hisz. Please, help me. I want to be free. Just press the yellow button twice. If you don't like\ndoing that, please, make my bodily functions come to an end. Kill me. Press the red button.[/i]\n\nWhat is your choice?\n*fake_choice\n\t#Press the yellow button\n\t\t\n\t#Press the red one  \n\t\n\t#Just leave the room\n\n*script changeBackgroundColor(\"black\")\n\n*set name \"Reaper\"\n*set gender \"female\"\n*set aim 1\n*set shotgun 2\n*set knife 0  \n*set healing 1  \n*set forcefield 2 \n*set black_dots 3\n*set red_dots 1 \n\n\"Welcome to my hive, stranger,\" she greets you. \"My name is Shiera and I am the queen of the colony of insectoids.I can see that Nomo is hurt, why is it?\" she asks with a hint of anxiety.\n\t\nWould you like to admit that you did the wound?\n*fake_choice\n\t#Yes\n\t\n\t#No\n\n\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Howler\"\n*set gender \"female\"\n*set aim 2\n*set shotgun 2\n*set knife 0  \n*set healing 1  \n*set forcefield 2 \n*set black_dots 4\n*set red_dots 2\n\nThe morning comes and you feel your stomach tied in a seaman knot. It will be the first real military operation of you and your team.\n\nYou are nervous because...\n*fake_choice\n\t#You fear you won't be able to look yourself in the mirror after all the atrocities you may have to commit today \n\t\t\n\t#You fear you may not lie up to the expectations of your team\n\t\t\n\t#You fear one of your team members may get hurt\n\t\t\n\t#You fear nothing, you are ready to kill whoever stands in your way\n\n\n\n*set name \"Mayday\"\n*set gender \"male\"\n*set aim 1\n*set shotgun 2\n*set knife 1  \n*set healing 1  \n*set forcefield 2 \n*set black_dots 5\n*set red_dots 2 \n\nA couple of imps reach Valkyrie and the frantic movements she makes suggest that she is in panic. \n\nYou want to aid her and have to decide how. You can shoot at the imps immediately, or run to her and attack them with your blade.\n*fake_choice\n\t#Shoot at them\n\t\t\n\t\t\n\t#Charge them with your melee weapon\n\t\t\n\n\n*set name \"Shadow\"\n*set gender \"male\"\n*set aim 2\n*set shotgun 2\n*set knife 1  \n*set healing 2  \n*set forcefield 2 \n*set black_dots 7\n*set red_dots 3 \n\n\"Would it not be better if you are free to do what you want, to be the master of your own destiny? It was not very easy for me to throw away all the laywers \nof the slave's psychology and embrace the power that the technology I discovered could offer me. I could make the next step in the evolution, to be the meta human.\"\n\nWhat would you reply?\n*fake_choice\n\t#\"I want to be on the side of the good guys.\"\n\n\t\t\t\t\n\t#\"You are a monster, Desert, I have seen the horrors you created in the hive.\"\n\n\t\t\n\t#\"Your offer is most generate and I want to accept it.\"\n\t\n\t\n\t#Nothing, just look at Astra for a recommendation \n", "startup": "*title Spacing Out\n*author Ivailo Daskalov\n\n*scene_list\n\tstartup\n\tintro\n\thive\n\tfacility \n\tdeath\n\n*create checkpoint 0\t\n\n*create rel_val 3\n*create rel_meat 3\n*create rel_astra 3\n*create rel_insects 3\n*create rel_hiss 1\n*create rel_shiera 3\n\n*create name \"\"\n*create gender \"\"\n*create att2males 0\n*create att2females 0\n*create aim 0\n*create shotgun 0\n*create knife 0\n*create healing 0\n*create forcefield 0\n*create rebel 50 \n*create val_blaster 0\n*create blood 5\n*create look 0\n*create meat_rested 0\n*create wardrobe 0\n*create weapon 0\n*create skeleton 0\n*create light 50\n*create insect_hurt 0\n*create astra_hive 0\n*create insect_forcefield 0\n*create insect_participate 0\n*create insect_win 0\n*create hatchery 0\n*create genetic 0\n\n*comment cps part 1\n\n*create cp_rel_val 3\n*create cp_rel_meat 3\n*create cp_rel_astra 3\n*create cp_rel_insects 3\n*create cp_rel_hiss 1\n*create cp_rel_shiera 3\n\n*create cp_name \"\"\n*create cp_gender \"\"\n*create cp_att2males 0\n*create cp_att2females 0\n*create cp_aim 0\n*create cp_shotgun 0\n*create cp_knife 0\n*create cp_healing 0\n*create cp_forcefield 0\n*create cp_rebel 50 \n*create cp_val_blaster 0\n*create cp_blood 5\n*create cp_look 0\n*create cp_meat_rested 0\n*create cp_wardrobe 0\n*create cp_weapon 0\n*create cp_skeleton 0\n*create cp_light 50\n*create cp_insect_hurt 0\n*create cp_astra_hive 0\n*create cp_insect_forcefield 0\n*create cp_insect_participate 0\n*create cp_insect_win 0\n*create cp_hatchery 0\n*create cp_genetic 0\n\n*comment cps part 2\n\n*create rusty_aggression 5\n*create ash \"\"\n\n*create dmg false \n*create key_armory false\n*create key_infirmary false \n*create key_black false \n*create lemon false \n*create red_dots 0\n*create black_dots 0\n*create eye false \n*create software false \n*achievement carnage visible 1 The carnage\n\tParticipate in a slaughter of insectoids.\n\tYou participated in a slaughter of insectoids ! \n\n*achievement denial visible 1 Heartbroken   \n\tAttempt to capture the heart of the Pleiadian lady.\n\tYour attempt to capture Astra's heart ens with a denial.\n\n*achievement val visible 1 Love and light \n\tNeed medical attention for a matter of the heart.\n\tYou romanced Valkyrie!\n\n*achievement meat visible 1 Strong love\n\tEnjoy the love of a man of strength.\n\tYou romanced Meatwall !\n\n*achievement shiera visible 2 Long live the Queen!\n\tOpen your heart to Queen Shiera\n\tYou romanced Queen Shiera!\n\n*achievement space visible 1 Exploring the deep space\n\tBecome a space explorer.\n\tYou became a space explorer \n\n*achievement colonel visible 3 Stars and medals\t\n\tFulfill your mission\n\tYou became a Colonel!  \n\t\n*achievement meta visible 1 A meta human\n\tBecome a meta human.\n\tYou became a meta human \n\t\n*achievement rebel visible 1 Rebel\n\tStick out as a rebel when you get to the positive endings\n\tYou are a true rebel at heart... And you got to the good endings too\n\t\n*achievement conformist visible 1 Conformist\n\tStick out as a conformist when you get to the positive endings\n\tYou are a true conformist at heart... And you got to the good endings too\t\n\n*achievement light visible 1 Champion of the Light\n\tLet the light guide your decisions\n\tYou let the light guide you\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\
