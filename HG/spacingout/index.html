<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spacing Out — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "spacingout", "title": "Spacing Out", "scenes": {"choicescript_description": "Explore the planet of nightmares with your small team of warriors. Retrieve a powerful artifact from the claws of adversaries or die trying. Meet an enigmatic race of insectoid beings and befriend their hybrid queen, helping her bring peace to a captured hatchery. Get assisted by a powerful Pleiadian woman who mingles with the structure of time itself. Claim the artifact and embrace the options it gives you to forge a future of your desire.\n\n\"Spacing Out\" is a 50,000 word interactive fantasy novel by Ivailo Daskalov, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n• Enjoy a personal tale of exploration, intense battles and reestablishing yourself in a world of your choice.[n/]\n• Lead a small team of futuristic warriors.[n/]\n• Evolve your expertise at sniping, close-range combat, melee combat, healing and forcefield generation.[n/]\n• Get saved by a beautiful Pleiadian woman.[n/]\n• Meet the enigmatic race of the insectoids and befriend their queen.[n/]\n• Claim a powerful artifact and decide what to do with it.[n/]\n• Play as male or female, gay or straight.[n/]\n• Choose between 3 optional romances.\n\n", "choicescript_stats": "*stat_chart\n\ttext name Name\n\ttext gender Sex\n\n\ttext aim Aiming\n\ttext shotgun Fan mode\n\ttext knife Laser sword \n\ttext healing Healing \n\ttext forcefield Forcefield\n\n\ttext black_dots Black dots\n\ttext red_dots Red dots\n\n\t\n*line_break\n\n\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n  \n  Remove in-game advertisements and delay timers.\n  \n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n  \n  You've paid to remove in-game advertisements and delay timers.\n", "death": "*allow_reuse\nYou came to a sad end of your adventure\n*goto_scene ending", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Spacing Out.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99", "facility": "*page_break\nYou lay your hands on the artifact and feel its energies crawling up your hands, engulfing you in a psyonic storm that challenges your sanity. You look around and you see the ripples engulf Meatwall and Valkyrie too.\n\nReality shifts and when you make contact with it again, you are in Astra’s base. Having taken enough of the energy of the object, you put it in the ground next to you while you still can, fearing that you may want to drink from it again.\n\n“You have done well, dear ones,” says Astra. “Now, you are ready to meet the one you were instructed to. Don’t you feel your powers grown and your machinery upgraded from base to risen?”\n\nYou nod, still not wanting to break the silence, as if worried that if you speak all the magic that experienced would be long lost.\n\n\"Are you alright, blondie?\" the tank asks, his voice muted by the clanking of metal.\n\nValkyrie stumbles and only Meatwall’s quick reaction saves her from hitting the floor. Your team is still in battle armours, so she wouldn’t get hurt, but nevertheless this is not a good sign.\n\nAstra steps closer to her and touches her metal-clap hand.“You have taken too much empathetic damage because of the sufferings your eyes witnessed, am I right my dear?\"\nValkyrie’s visor is up and you can see her being very pale.\n\n\"You don’t need to worry, dear Val, what you are experiencing is known as the healer’s syndrome. You need to take back the energy you wasted by subconsciously connecting with the suffering your team caused. Just close your eyes and breath while you imagine that energy flowing back into you. Do that until you feel better.\"\n\nYou just watch as the scene unfolds. Meatwall seems to be very impressed by the improvised meditation. In fact, too much to even make any of his trademark remarks.\n\nValkyrie gives a sign that she is feeling better and that gives you the opportunity to ask how the other patient is.\n\n\"Innovation’s repair is taking more than expected. Worry not, she won’t be lost, I am just making sure she receives the best metallic body she can.\" Astra picks up the trophy and immediately drops it. You hope it is not broken and from your position it seems it is not.\n\n\"Oh, what was that blasphemy I felt!\" she cries. \"That artifact is powered by the suffering of so many souls locked in the abandoned science facility. They are stored in boxes and treated horribly.\"\n\n\"You said that in this reality there are two identical copies of it,\" you say.\n\n\"Yes, the other copy is in Desert and he is in that facility. Oh, how I wish I knew about it before that, I was busy with other tasks and didn’t properly scab that are,\" comments Astra.\n\n\"Please, don’t be too hard on yourself,\" you ask her.\n\nShe shakes her head, \"I won’t because it won’t improve anything, but I know what would.\" Astra extends her hand and a long sword appears in her hand. \"I am going to come with you in the facility and help you.\"\n\n\"What happened to your principle of non-intervention?\" you wonder.\n\nAstra sighs. \"I really wanted to let you learn your own lessons and I still will, however, setting trapped souls free can qualify as my mission too. I will join you and fight by your side.\"\n\n\"I would appreciate it, we really need someone to take the place of Innovation while her body is finished,\" you reply. \"I only need to establish who is in charge of the team.\"\n\n\"It is you, ${name},\" the Pleiadian says without hesitation. \"I don't have Innovations sniping skills, but I can make up for that with the stealth technology I use. I think I have some information about the place where we are going and about the enemies we can meet there.\"\n\n\"Boss, can't we just go back to the Colonel? I mean, we have the artifact, We can say we couldn't find Desert and call it a day,\" Meatwall proposes.\n\n\"I have a bad feeling about this,\" Astra says.\n\nYou think about it for a moment, but then you shake your head, \"No, Meatwall, this is not going to work, I know the attitude of the big shots. You either hit all objectives or it is as if nothing is done. It is stupid, but we can do nothing to change that. Astra, can I have that sword of your for a moment?\"\n\nThe Pleiadian nods. \"Yes, just be careful. Despite it looking solid, it is made of energy, just like your laser one. It can do even more damage and is virtually indestructible as long as I am conscious.\"\n\nYou take it in your arm. \"And it is quite light, it feels like a trinket.\"\n\n\"I designed it myself, I really wanted it to be comfortable,\" says Astra while retrieving it. \"Do you need rest or are you ready to… rock?\"\n\nYou shake your head. \"We have been through a lot today, but strangely enough I am not tired in the very least.\"\n\nMeatwall nods in agreement, while it seems something is tormenting Valkyrie and it is not tiredness.\n\nHow would you react?\n*choice\n\t#Say that you understand how she feels and ask her to continue supporting your team\n\t\t*goto 2\n\n\t#Be rude and order her to get herself together\n\t\t*goto 3\n\n*label 2\nValkyrie's fearful look doesn't change as you take her armoured hand.\n\n\"Healer, you have seen a lot of suffering today, and a gentle soul like yours is bound to feel the pain of those we had to eliminate in order to ensure the success of our mission. I want to thank you for the role you played today and remind you that you are an invaluable asset to our team, and so I kindly ask you to continue in our next endeavor. As once a brave warrior said, an army is only as good as its healers. Is it not the time to heal yourself, Val, to let go of everything limiting your expansion, of your inner evolution? Isn't what you are experiencing today a big step closer to your dream of becoming a real paramedic as opposed to being excellent it training simulation?\"\n\n\"It is, ${name}, it is just that everything is happening so quickly, I have a hard time adapting to it.\" She starts crying.\n\n\"It is okay to weep, dear one. Let those tears wash your pain away,\" you tell her.\n\n\"I will be alright, just give me a couple of minutes,\" she assures you.\n\nMeatwall rises his eyebrows, probably impressed by your speech and you catch Astra cracking a smile.\n*set red_dots +1\n*set rel_val +3\n\n(You receive a red dot. Your relations with Valkyrie incease)\n*goto 4\n\n*label 3\n\"What do you think you are doing, miss?\" you start shouting at her, making her shiver. \"You need to pull yourself together if you want to be able to do something. Look at yourself, in the state you allowed yourself to be right now, you can hardly be of any use to yourself, let alone us. We are not going to carry your ass in the next mission, you have to pull yourself together or I am going to return you to the team I took you from!\"\n\nShe starts crying, barely able to whisper. \"Please, don't, I will be fine, just don't do that. \"\n\nMeatwall gives you a menacing look, which suggests that you went too far. It may have been a good way to motivate the tank to perform better, but it seems you just crushed the far more delicate healer.\n\nAstra turns back, but you can swear you saw a tear in her eyes.\n\nSuddenly, the silence feels rather heavy.\n*set black_dots +1\n\n(You receive a black dot.)\n*goto 4\n\n*label 4\n*page_break\nAstra projects a holographic image of an ugly building. \"This is the research facility used by the company that was supposed to be terraforming the planet but the public tender it won was just a ticket to explore the resources of the planet. I have passed over it a few times with my beamship but there were no signs of any activity there and honestly I didn't suppose there was a big chance of anyone left in. I used the time during which Mayday was speaking to Valkyrie to make a quick scan.\" The image zooms in. \"I sense the soul prisons and the artifact somewhere right in the middle of the building. There is an oval vestibule with 12 doors, each of them denoted by a colour. Unfortunately, I sense a defense mechanism that does not allow me to find out more,\" she explains.\n\n\"What kind of enemies we can expect there?\" You ask.\n\n\"A large variety of malign beings ranging from xenoforms, mutants, semi-mechanical entities, soulless beings, even demons. I wouldn't discard the possibility of encountering potential allies there as well. Are you ready to go?\"\n\nAll you of you confirm.\n\n\"Allright, initiating spacing in!\" Astra announces and the world around you swirls clockwise and then the vortex unfolds, spitting you out in another place.\n\nYou can hear Meatwall's thoughts, cursing the heavy silence in the round corridor you appear to be in. Valkyrie feels as if she is inside an empty egg shell and you really admire her sense of humor. Astra is concentrated, trying to use her psychic abilities to sense what lies beyond the doors. She shakes her hand in silent frustration. You ask her telepathically if there is a problem. She looks in your eyes and replies without uttering a word that she is not used to being so restricted in her remote perception abilities, despite her still being able to gather some information. She wants you to choose a door and start the exploration. According to her, you most likely will have to go through most of them in the very least.\n*goto 5\n\n*label 5\n*page_break \nThe doors are made of heavy metal and coloured differently. Which one would you like to explore?\n*choice\n\t#The orange one\n\t\t*goto 6\n\t\t\n\t#The cyan one\n\t\t*goto 7\n\t\t\n\t#The brown one\n\t\t*goto 8 \n\t\t\n\t#The white one\n\t\t*goto 9\n\n\t#The metallic one\n\t\t*goto 10\n\n\t#The grey one\n\t\t*goto 11\n\n\t#The purple one\n\t\t*goto 13\n\n\t#The red one\n\t\t*goto 14 \n\t\t\n\t#The yellow one\n\t\t*goto 15 \n\t\t\n\t#The black one\n\t\t*goto 17\n\n*label 6\n\"I see negative energy behind that door,\" says Astra. \"There will be a battle with creatures using fire in a way natural to them to cause pain and suffering.\"\n\nYou ask her if she thinks it would be a good idea to enter and she replies that there is likely something valuable there that you may use in the final battle, however, she insists that you take the decision of whether to enter or not without influencing you.\n*choice\n\t*disable_reuse #Enter\n\t\t*goto orange\n\n\t#Approach another door\n\t\t*goto 5\n*label 7\nAstra warns you that a nasty surprise probably awaits you behind that door.\n\nShe can also sense a multitude of malicious beings, most likely very small in size, adding that inside rests a piece of information that can be very useful in a future situation.\n*choice\t\n\t*disable_reuse #Enter\n\t\t*goto cyan \n\t\t\n\t#Approach another door\n\t\t*goto 5\n\n*label 8\nYou can feel Astra's laugh in your mind. She answers the confused expression on your face by saying that it is a water closet room. \n\n\"Do you need to use that?\" she jokes.\n\n\"No,\" you answer. \"What about you, I know ladies need to visit that more often?\" you ask telepathically.\n\n\"That may not be exactly true about my human race,\" she says.\n\nYou shrugs and as you can't really feel a sign of any of the other two members of your team needing to refresh themselves, you ponder on the next door to go through.\n*goto 5\n\n*label 9\nAstra smiles widely when you get near that door, saying that the place beyond it is probably the holiest place in this cursed building. She adds that if there is a person in the team that is close to the light, that would be of even greater benefit for what lies beyond.\n\n\"Aren't you such a person?\" you mentally ask.\n\nThe Pleiadian shakes her head. \"I am not sure, there is a lot of blood on my hands, even though I have been searching for the light for such a long time. I was thinking of Valkyrie.\"\n\nYou agree that the healer is a good girl.\n*choice\n\t*disable_reuse #Enter\n\t\t*goto white \n\t\t\n\t#Approach another door\n\t\t*goto 5\n\n*label 10\nAstra says she sees her life endangered if she enters the room but assures you that she feels no fear related to that prospect because she is a warrior and she believes she can take it.\n\nShe believes there are some abominations made of flesh and metal guarding a piece of software that can be valuable to you.\n*choice\n\t*disable_reuse #Enter\n\t\t*goto metal\n\t\t\n\t#Approach another door\n\t\t*goto 5\n\n*label 11\n\"My stomach turns as I feel the energies coming from beyond the door,\" says Astra without uttering a word. \"What we would encounter there would not attack us physically and that worries me a bit since we are all equipped to fight fire with fire and even got armour to protect us from burns, but will we be shielded enough from the burdens of the soul? I can sense that the timeline in which we pass through the orange door before we enter this one works better for us and that the latter is a perquisite for restoring some of our physical health.\"\n*choice\n\t*disable_reuse #Enter\n\t\t*goto grey \n\t\t\n\t#Approach another door\n\t\t*goto 5\n\n\n*label 13\n\"This is the armory,\" Astra sends you a telepathic message. \"It would be a great place to visit when the armour you are wearing starts falling apart. It is currently locked and the key to opening it is the metalic room. I am sorry if I am telling you something you may already know, I am mentally jumping from timeline to timeline and that often leaves me temporarily confused and with a headache.\"\n*choice\n\t*selectable_if (key_armory) #Enter\n\t\t*goto armory \n\t\t\n\t#Approach another door\n\t\t*goto 5\n\n*label 14\n\"This must be the infirmary, the perfect place to revisit wounds. I fear that it has been used for ungodly acts and there may be something dark residing inside, or I may be feeling the leftovers of negative energies, I am not sure, as I said, my abilities are very limited here. It is currently locked and the key to opening it is the grey room. I am sorry if I am telling you something you may already know, I am mentally jumping from timeline to timeline and that often leaves me temporarily confused and with a headache.\"\n*choice\n\t*selectable_if (key_infirmary) #Enter\n\t\t*goto infirmary \n\t\t\n\t#Approach another door\n\t\t*goto 5\n\n*label 15\nAstra concentrates very hard and then puts her hands on her head. You can almost feel the aching inside.\n\n\"In the name of the Light, I can't figure out what awaits us on the other side, I am sorry. I only get the feeling that visiting the cyan room beforehand is a wise choice.\"\n*choice\n\t#disable_reuse #Enter\n\t\t*goto yellow \n\t\t\n\t#Approach another door\n\t\t*goto 5\n\n*label 17\nAstra closes her eyes and involuntarily steps back. She says she senses a high concentration of darkness there, which would mean that Desert is there. She recommends visiting all other places available before endeavoring beyond this door. \n*choice \n\t#Enter\n\t\t*goto black\n\t\t\n\t#Approach another door\n\t\t*goto 5\n\n\n*label orange\nYou open the door and immediately feel a wave of heat filling the corridor. You are not sure if it is a very well made illusion or reality, but you see a river of molten lava\nrunning just 50 metres of black rocks away from the entrance to the room. But that is not all.\n\nThere are small creatures actually bathing in the lava, screaming with joy as they dive in and then appear on top. The horns on their heads remind you of the imps you have seen in \nsome video games. But those guys may very well be real!\n\n\"Holy mother...\" Meatwall curses. You can barely hear him and you guess there may be another reason for the imps to suddenly notice you and run in your direction, throwing chunks of molten lava at you.\n\nMeatwall runs ahead, as usual. Astra steps to the side and prepares her sword. The stealth technology glisters as she becomes invisible for their eyes. Her blade soon finds the \nfirst victim - too busy throwing smoking pieces of lava at Meatwall.\n\nValkyrie prepares her healing gear. Her time has not come yet but she is careful not to miss the moment, as the numerous enemies can most likely take down any of the team members.\n\nWhat would you do meanwhile?\n*choice\n\t#Snipe them one by one \n\t\t*set aim +1\n\t\t(Aiming increases)\n\t\t\n\t\tThe small targets appear to hit and their quick movement doesn't help you either. Many of them reach Meatwall and even jump at his neck having run out of ammo. But what worries you more is that \n\t\ta few just pass around him and run straight for Valkyrie.\n\t\t*goto orange1\n\t\n\t#Use the forcefield on the tank \n\t\t*set forcefield +1\n\t\t(Your forcefield mastery increases)\n\t\t\n\t\tThe imps come closer. Some of them, having run out of ammo, jump on the neck of the tank, but they bump at the forcefield and fall to the sides confused.\n\t\tBecause of your help, Meatwall is doing fine, occasionally using some exotic fighting techniques, including treading over the enemies.\n\t\t\n\t\tBut what worries you is that \n\t\ta few just pass around him and run straight for Valkyrie.\n\t\t*goto orange1\n\t\t\n\t#Use the fan mode\n\t\t*set shotgun +1\n\t\t\n\t\t(Your mastery with the fan mode increases)\n\t\t\n\t\tThe burst mode of your weapon appears to be perfect for situations like this. You are still extremely careful not to hurt Meatwall or Astra. Luckily, a display in your helmet shows you the dangerous zone.\n\t\t*if (shotgun>3)\n\t\t\n\t\t\tJust a few blasts later all that is left from the imps are smoldering bodies.\n\t\t\t*goto orange_end\n\t\t\t\n\t\t*else\n\t\t\t\n\t\t\tUnfortunately, while you make sure you take a position that would allow you to shoot the imps and not your team members, many of the enemies reach Meatwall. The \n\t\t\theavily armoured tank is doing fine, occasionally using some exotic fighting techniques, including treading over the enemies.\n\t\t\n\t\t\tBut what worries you is that \n\t\t\ta few just pass around him and run straight for Valkyrie.\n\t\t\t*goto orange1 \n\t\t\t\n*label orange1\n*page_break\nA couple of imps reach Valkyrie and the frantic movements she makes suggest that she is in panic. Unlike Meatwall's armour, the one of the healer would most likely not be able to \nsave her from the sharp claws and teeth of the little monsters.\n\nYou want to aid her and have to decide how. You can shoot at the imps immediately, or run to her and attack them with your blade.\n*choice\n\t#Shoot at them\n\t\tYou give your best, but both Valkyrie and the imps are moving a way too quickly fro your plan to work properly. You take both enemies down, but one of your shots ends up damaging Val's hand.\n\t\t*set black_dots +2\n\t\t*goto orange_end\n\t\t\n\t#Charge them with your melee weapon.\n\t\t*set knife +1\n\t\t(Your mastery with the laser sword increases)\n\t\t\n\t\tYou don't want to risk the life of Valkyrie. The imps look like a formidable enemies and they may do some damage to her until you manage to reach her \n\t\tbut still you think it is better that having her take a shot from your weapon. \n\t\t\n\t\tThe one you find sinking its teeth in her calf ends up being cut in half by your blade. Meanwhile, Valkyrie smashes the head of the other with her healing gear.\n\t\t\n\t\tA quick inspection reveals that the healer has not suffered major damage, just a few scratches. In other words, very little her technology can not immediately repair.\n\t\t*set black_dots +1\n\t\t*goto orange_end\n\n*label orange_end\nAstra is bent over a body of a deceased imp, studying it.\n\n\"Those creatures do belong to the kind you would refer to as devils. Well, at least one of the types known to by this name. Not the most intelligent ones for sure. So the name you gave then, ${name},\nwas actually correct.\"\n\nYou nod. \"What is this place?\" you ask her staring at the horizon.\n\nAstra stands up. \"This is a shard, a peace of space that has been brought here carrying the characteristics of another place and the connections with the other elements \ncomprising the particular planetary system too. Do you see the cliff over there? It seems to be just a kilometre away from here but you can't really reach it by foot because it is somewhere \nfar away, probably light years away from here. And yet this lava river flows, coming for a short time in our reality and then disappearing back to where it came from. I have no idea why the imps were\nkept here but whoever imprisoned them wanted them to be in their natural environment.\"\n\n\"What if they didn't really attach us? Maybe they just rushed for the door, trying to escape. Nobody wants to be imprisoned,\" says Valkyrie.\n\nAstra gets up and gently touches hers forearm.\n\nYou see that Meatwall is about to say something and you bet that it would not be the nicest thing he could communicate to the healer.\n\nWhat would you do?\n*choice\n\t#Kindly explain her that this scenario was unlikely\n\t\t\"I am sure they would have just gone past us if they really wanted. Instead, they started throwing molten rocks at us as soon as they realized I was there,\" you kindly remind her.\n\t\t\n\t\t\"I guess you are right,\" says Val. \"It is just hard to accept that there are creatures who would act like this. Maybe they were abused or something.\"\n\t\t\n\t\t\"My feelings told me they were fine and enjoying their natural environment,\" says Astra.\n\t\t\n\t\tValkyrie sighs. \"Thank you for explaining these things to me. I really don't want to feel guilty for what we did to those little fellows.\"\n\t\t\n\t\t\"I am glad you are closer to your inner peace,\" you remark.\n\t\t\n\t\t\"Little does not always equal benevolent,\" says Astra and brings and end to the conversation.\n\t\t*set rel_val +1\n\t\t\n\t\t(Your relations with Valkyrie increase)\n\t\t*goto orange_end2\n\t\t\n\t#Tell her that what is important is that the team members are okay\n\t\tShe gapes when she hears that. \"Don't you know that all life matters, not only ours?\"\n\t\t\n\t\t\"Val, the imps started throwing molten rocks at us as soon as they realized I was there,\" you kindly remind her.\n\t\t\n\t\t\"I guess you are right,\" says Val. \"It is just hard to accept that there are creatures who would act like this. Maybe they were abused or something.\"\n\t\t\n\t\t\"My feelings told me they were fine and enjoying their natural environment,\" says Astra.\n\t\t\n\t\tValkyrie sighs. \"Thank you for explaining these things to me. I really don't want to feel guilty for what we did to those little fellows.\"\n\t\t\n\t\t\"Little does not always equal benevolent,\" says Astra.\n\t\t\n\t\t\"I know, but so often I think nobody understands me. That makes me feel sad and out of place.\"\n\t\t*set rel_val -1\n\t\t\n\t\t(Your relations with Valkyrie decrease)\n\t\t*goto orange_end2 \n\t\n\t#Allow Meatwall to speak\n\t\tMeatwall starts to preach her the principles of survival and it turns into a noisy quarrel that you soon need to stop before things escalate even further.\n\t\t\n\t\tThe tank is happy that you allowed him to speak and you know that he is not rude to the healer because she wants to be the bad guy but rather because he wants to make her better accept\n\t\twhat he believes to be the meaning of a warrior.\n\t\t\n\t\tHowever, it seems the message fails to be sent through to her. \"So often I think nobody understands me. That makes me feel sad and out of place,\" she says.\n\t\t*set rel_val -1\n\t\t*set rel_meat +1\n\t\t\n\t\t(Your relations with Meatwall increase at the expense of those with the healer)\n\t\t*goto orange_end2\n\t\t\n*label orange_end2\n*page_break\n\n\"Look at that!\" Astra yells with excitement. She removes a necklace from one of the imps.\n\n\"What does the eye stand for?\" you ask her, examining the symbol on it.\n\n\"It is the Eye of Horus and was very famous in the ancient Egyptian civilization of your planet. It stands for seeing things as they are and not falling victim to illusions.\"\n\n\"You seem to be better informed about the history of my planet than me,\" you remark.\n\n\"It is because there were several times when our people communicated with yours, our histories temporarily melted. Here you are, captain.\" She handles it to you.\n*set eye true\n\nWhat would you do?\n*choice\n\t#Take it\n\t\tYou nod and put it on your neck.\n\t\t\n\t\tRealizing there is no more point at staying there, you return to where you came from.\n\t\t*goto 5\n\t\n\t#Allow her to have it\n\t\t*set rel_astra +1\n\t\t(Your relations with Astra increase)\n\t\t\n\t\tAstra beams as she puts it around her neck. \"Thank you very much, it feels good to have it on me. I really have to tell him where I found it next time I speak with him.\"\n\t\t\n\t\tThat comment leaves a surprised look on your face, but you decide to leave the questions for another time.\n\t\t\n\t\tRealizing there is no more point at staying there, you return to where you came from.\n\t\t*goto 5\n\t\t\n*label cyan\n\"I don't like this place,\" says Meatwall as he enters. You look around, trying to figure out a potential source of danger. It is rare to see the tank that nervous and you \nguess that it is not because of Astra's warning. It must be given to him that he follows his own judgement in just about anything he does... Which sometimes gets him in trouble.\n\nThe room looks like an empty warehouse, full of shelves with nothing to be found on them. At the other end there is a door, probably leading to another room.\n\nYou are about to ask the others if they feel like checking out what there is on the other side when an automatic turret gets out of a tile on the wall and opens fire at Meatwall. \n\nWhat do you do?\n*choice\n\t#Use your forcefield on him\n\t\tLuckily, the fire power of the turret is not substantial. The strong forcefield of the tank when boosted by yours prevent his armour from being even scratched.\n\t\tMeanwhile, Astra gets close enough to slice it into two with her sword.\n\t\t*set forcefield +1\n\t\t(Your forcefield mastery increases)\n\t\t*goto cyan2\n\t\n\t#Push him out of the way\n\t\tPushing the big tank away is not a very easy task. It is definitely a painful one when you collide with Meatwall's hard armour. The next problem is that after you move him away, you get in the \n\t\tline of fire, and your battle gear is far less suitable for accommodating bullets that the one worn by the tank.\n\t\t\n\t\tLuckily, meanwhile, Astra gets close enough to slice it into two with her sword.\n\t\t*set black_dots +1\n\t\t\n\t\t(You receive a black dot)\n\t\t*set dmg true\n\t\t*goto cyan2\n\t\t\n\t#Ready your healing gear\n\t\tThe turret uses a lot of its ammunition before it can get through the forcefield of the tank and a bit of the armor. It is only then that the healing gear becomes useful.\n\t\t\n\t\tMeanwhile, Astra gets close enough to slice it into two with her sword.\n\t\t*set black_dots +1\n\t\t*set healing +1\n\t\t*set dmg true\n\t\t(Your healing increases but you gain a black dot)\n\t\t*goto cyan2\n\t\t\n*label cyan2\nAstra touches the remains of the turret and remains still for a couple of minutes.\n\n\"Are you okay?\" Valkyrie starts to worry.\n\n\"Yes, dear one. I just found something big. This turret is directly controlled by an artificial intelligence entity in the room where the strongest dark energy is. That \nwould suggest the location of the one you are searching and it is the black one. What surprised me a lot was that the black room was locked and I managed to get that our struggles are amusing\nand they don't want to spoil their fun by being found too quickly. Anyway, now we can go there. However, I still maintain my point that we have more to gain if we visit each of the other rooms, we have valuable artifacts \nand information to discover. Their arrogance and twisted entertainment will eventually be their undoing.\"\n\n\"Who are they?\"\n\nAstra sighs. \"I am not very sure but I know Desert is not alone in there. Unfortunately, our job there may be harder than previously expected. But I would not despair, just be mentally prepared to take more.\"\n\n\"Yeah, I will not be put off by some challenge,\" says Meatwall.\n\n\"And I hope I will be able to heal you after that.\" Valkyrie sighs.\n\n\"You are doing a good job so far, Val,\" you assure her.\n\n\"That's right,\" Astra remarks. \"What do you say, ${name}, do we enter the room over there or do we return to the oval corridor?\"\n\nWhat would be your choice?\n*choice\n\t#Sure\n\t\t*goto cyan3\n\t\t\n\t#No, I've had enough of this chamber\n\t\t*goto 5\n\t\t\n*label cyan3\n\"Alright, let's see what lurks there,\" says Astra while opening the door, her sword ready in her hand.\n\nThe room doesn't seem very different. Except for one little detail.\n\n\"The screen over there.\" Astra points at distant wall. \"It is some kind of a terminal. Do you see the flashing crystal next to it? I bet it is important.\"\n\n\"Do you suggest us just going there and taking it?\" you inquire.\n\n\"Not really.\" Astra shakes her head. \"I don't like these energetic signatures.\" She points at the floor.\n\nYou stare down there and you can almost see small leeches phasing in and out. \"What are they?\"\n\n\"They are very simple AI parasites. I am afraid that whoever goes in will be attacked and they can be be nasty. They can do a lot of damage. It is good that they are not \namong the ones who can interfere with the power of will of their victims, but that brings little solace to us.\"\n\n\"What do you suggest, dear Astra?\" you ask.\n\nShe shrugs. \"I don't know. I am sure any piece of information we gather can be invaluable and I definitely suspect this crystal to contain some, but I would not want to risk anybody's life. It is \nnot a responsibility of mine.\"\n\n\"Who do you think will be the most likely to get in and out unharmed?\" you ask.\n\n\"The leeches are known to be quite ineffective against heavy armour, even though the forcefield does little to stop them. So, I would probably say Meatwall. Or maybe you, ${name}, because you will be faster.\"\n\n\"Anything else I need to know before getting in?\" you ask.\n\n\"Those critters seem to thrive very well in areas that are favourable to them. The growth of their numbers is exponential. And yet, they stay here, in this room. I am not sure what the \nreason for this may be. What I am trying to tell is that if anybody gets overwhelmed by them, simply going out of the room may be enough to get rid of them.\n\"\n\n\"This is good,\" you say while thinking the situation over.\n\nWhat would you choose?\n*choice\n\t\t\t#Go in\n\t\t\t\t\"I am going in,\" you announce.\n\t\t\t\t\n\t\t\t\t\"Please, be careful,\" Valkyrie asks you.\n\n\t\t\t\t\"I always am.\" You smile back at her.\n\t\t\t\t\n\t\t\t\tMeatwall pats your shoulder. \"I know that I may be more suited for the job but you are still doing it.\"\n\t\t\t\t*set rel_meat +1\n\t\t\t\t(Your relations with Meatwall increase)\n\t\t\t\t\n\t\t\t\t\"It just feels right this way.\"\n\t\t\t\t\n\t\t\t\tYou take a big breath and get into the room.\n\t\t\t\t*page_break\n\t\t\t\tAs soon as you are in, dozens of sparkling leeches spring from the floor and attach to your armour. Your forcefield glimmers just to acknowledge that\n\t\t\t\tit is still there but, as Astra says, it does nothing to stop them.\n\n\t\t\t\tYou can vaguely feel the electric impulses coming from them and what started as a mere tingling is quickly turning into burning pain. You start running \n\t\t\t\tto the terminal, but every step you take attracts more of those pests.\n\t\t\t\t\n\t\t\t\tYou feel tempted to use the fan mode of your weapon on them. Would you do so?\n\t\t\t\t*choice\n\t\t\t\t\t#Yes\n\t\t\t\t\t\tCovering them with the dispersed laser stream reminds you of spraying cockroaches. But those leeches appear to be even more resistant than the insects you are thinking of.\n\n\t\t\t\t\t\tYour weapon barely slows them. At the same time, the ones who are already munching your armour are in the sanctuary zone that is not reachable by your gun, up until the point at which you \n\t\t\t\t\t\tare absolutely mad and decide to burn yourself. Unfortunately, it seems you are getting close to that point.\n\t\t\t\t\t\t*set black_dots +1\n\t\t\t\t\t\t*set shotgun +1\n\t\t\t\t\t\t(Your mastery with the fan mode increases but you gain a black dot)\n\t\t\t\t\t\t*goto cyan4\n\t\t\t\t\t\t\n\t\t\t\t\t#No\n\t\t\t\t\t\tYour intuition tell you that you should get it over and away with as soon as possible, and using the gun will only slow you down. Even if it is effective \n\t\t\t\t\t\tagainst these critters, you would be unable to use them on the ones already on your battle armour. It acts like a sanctuary zone that is not reachable by your gun, up until the point at which you \n\t\t\t\t\t\tare absolutely mad and decide to burn yourself. Unfortunately, it seems you are getting close to that point.\n\t\t\t\t\t\t*goto cyan4\n\t\t\t\n\t\t\t#Tell Meatwall to enter\n\t\t\t\t\"I think you are better cut out for this task,\" you tell Meatwall.\n\t\t\t\t\n\t\t\t\t\"I am the tank. I should be able to handle it any time.\"\n\t\t\t\t\n\t\t\t\t\"Good luck, bro,\" you tell him.\n\t\t\t\t\n\t\t\t\t\"I will be praying for you,\" says Astra and you can't hide your smile as you realise the situation is getting a little more melodramatic than the current situation require.\n\t\t\t\t*page_break\n\t\t\t\tAs soon as he is in, dozens of sparkling leeches spring from the floor and attach to his heavy armour. His forcefield glimmers just to acknowledge that\n\t\t\t\tit is still there but, as Astra says, it does nothing to stop them.\n\n\t\t\t\tYou see the electric charges flying in the air and you ask yourself when Meatwall will start feeling pain. Maybe he already is as he starts running \n\t\t\t\tto the terminal, but every step he takes attracts more of those pests. At one point you are sure that he would panic and stop so that he could try to shoot them but he seems to realize\n\t\t\t\tthat such an act would be foolish. There is no way he would be able to take the ones that are already on him off, unless he wants to damage himself too.\n\t\t\t\t\n\t\t\t\tThe tank manages to get to the terminal and take the crystal, but on his way back something seems to be getting wrong.\n\t\t\t\t*if dmg\n\t\t\t\t\t(You gain a black dot)\n\t\t\t\t\t\n\t\t\t\t\t*set black_dots +1\n\t\t\t\t\t\"That is not looking good,\" says Astra. \"It seems that when the turret damaged Meatwall's armour, it left traces that made it a better \n\t\t\t\t\tenergetic match to those AI critters. They are delving into it as if it mas made of cheese. Now that I think about it, that would be a good explanation of why \n\t\t\t\t\tthe turret picked him as a target. Maybe somebody out there thought he would be the most likely target to get into the leech infested room.\"\n\t\t\t\t\t\n\t\t\t\t\tOn top of that, it looks as though they are affecting his neural system because he has slowed down and tends to make erroneous movements to the sides.\n\t\t\t\t\t\n\t\t\t\t\tFinally he makes it to your room and all the leeched on his armour disintegrate. Meatwall gives out a cry of accomplishment, handling Astra the crystal. Meanwhile, Valkyrie\n\t\t\t\t\truns a routine check on him and her healing nanobots start doing their work.\n\t\t\t\t\t*goto crystal\n\t\t\t\t\t\n\t\t\t\t*else \n\t\t\t\t\n\t\t\t\t\tIt looks as though the leeches are affecting his neural system because he has slowed down and tends to make erroneous movements to the sides.\n\t\t\t\t\t\n\t\t\t\t\tLuckily, he makes it to your room and all the leeched on his armour disintegrate. Meatwall gives out a cry of accomplishment, handling Astra the crystal.\n\t\t\t\t\t*goto crystal\n\t\t\t\t\n\t\t\t#Decide that it is too risky \n\t\t\t\t\"I don't like the potential risk reward ratio,\" you say while looking at Astra's eyes. \"It seems there are dangerous entities inside and we know nothing about the\n\t\t\t\tpotential information that may or may not be on the crystal.\"\n\t\t\t\t\n\t\t\t\t\"I perfectly understand your point. So be it.\" She turns away and walks back to the round corridor.\n\t\t\t\t*goto 5\n\n*label cyan4\nIt takes a lot of mental power to ignore them for just a couple of seconds so that you can make the ten steps to the terminal, grab the crystal and then dash back. You feel the little guys starting to interfere \nwith your nervous system and your legs appear to be slower than usual, which does in no way prevent them from making erroneous movements in all directions. So, when you \nleave the room, you consider it some sort of a miracle.\n\t\t\t\t\t\t\nYou give out a scream of triumph when the leeches disintegrate. \n*goto crystal\n\n*label crystal\n*page_break\nAstra takes the crystal cautiously, as if afraid that she may let it fall and break into pieces. \"Let's see what it hides inside.\" She closes her eyes and her eyebrows arch.\n\n\"Are you able to read it by just having it in your hands?\" you ask amazed.\n\n\"Actually yes,\" she responds without opening them. \"I push a bit of my energy through it and it starts vibrating at a specified frequency. I then pick it up and allow my brain to interpret the information stored in it. The process is a bit tricky to master but once you get used to it everything happens naturally.\"\n\n\"Sounds nice,\" you say. \"I am sure Innovation would be amazed by that.\"\n\nYou have to admit to yourself that mentioning her name reminds you how much you miss the specialist in your team.\n\n\"Alright, I am ready,\" Astra announces. \"Just as my intuition showed me, this information is related to the yellow room. It is some kind of a warehouse for a gas with explosive properties. There are also holographic projectors. And judging from the name of the engineer involved in this, I bet it is a trap.\"\n\n\"What do you expect?\" you inquire.\n\"I think if we open the yellow room we will see warriors ready to shoot us, but that will be just a holographic illusion aimed at making as shoot at them. That would probably lead to a massive explosion… Getting to this information was a bit tricky but if it prevents us from falling into this trap that would be totally worth it.\" Astra opens her eyes.\n*set lemon true\n\n\"I think so. Do you think we should open the door at all?\"\n\nAstra nods. \"I think it is worth exploring it. I want to have a bit of the gas, and I am also thinking of leaving something for the ones who set the trap.\" She winks at you.\n\nYou go back to the corridor.\n*goto 5 \n\n*label yellow\nAstra opens the yellow room cautiously, expecting to find something dangerous inside, but even those assumptions were not enough to prepare you for the legion of \nreptilian warriors that start shooting at you, as if they had been patiently waiting for you.\n\nWhat do you do?\n*choice\n\t#take cover shoot back\n\t\tYou nod at the tank to open fire but as soon as he does so, a terrible explosion takes place. Members of your team are sent flying in the air amid a ball of fire. You don't need \n\t\tanother proof to know that something went terribly wrong.\n\t\t\n\t\t\"What the hell was that?\" Meatwall tries to get up while Valkyrie, quite injured herself, is shooting healing nanobots at him.\n\n\t\tYour head hurts too much to be able to respond in a coherent way and you really feel a relief when your turn to enjoy the healing rays comes.\n\t\t\n\t\t\"I think one of us hit a bottle of explosive gas,\" says Astra while extinguishing the fire in her hair.\n\t\t\n\t\t\"What about the bastards?\" Meatwall asks.\n\t\t\n\t\tAstra shrugs. \"There were no enemies, just holographic projectors.\"\n\t\t\n\t\t\"I can't believe it, you say. I fell fro the oldest and stupidest trap on earth,\" the tank shouts.\n\t\t\n\t\t\"Don't be too hard on yourself, bro,\" you try to pacify him. \"Don't you remember that it was my order to shoot.\"\n\t\t\n\t\t\"That doesn't make me feel any better and I am sure our physical bodies hurt nevertheless.\"\n\t\t\n\t\tThere is little you can do to argue.\n\t\t*goto 5\n\t\n\t#close the door\n\t\tAstra just extends her hand and then pulls it back to her. She does not touch the door, but it shuts anyway. Suddenly, it becomes quiet in the corridor.\n\n\t\t\"How did you do that? I am sure you felt my desire to have the door closed, but I didn't know you could actually do that without touching it,\" you comment.\n\t\t\n\t\t*if lemon\n\t\t\t\"Okay, we know it is an illusion, don't we?\" Astra asks.\n\t\t\t\n\t\t\t\"Well, that one felt quite real,\" Meatwall remarks.\n\t\t\t\n\t\t\t\"Did it? Did any of us take any damage?\"\n\t\t\t\n\t\t\tValkyrie looks at everybody with the attentive focus of a seasoned healer. \"I don't see even a scratch.\"\n\t\t\t\n\t\t\t\"I know from personal experience that some of them can look very real and I am pretty sure it is the case. Well, I wouldn't have come to this conclusion if I didn't know \n\t\t\tabout the info in the crystal,\" says Astra.\n\t\t\t\n\t\t\t\"So what do you do now?\" You raise your eyebrows.\n\n\t\t\t\"As I said before, I want to have a bit of the gas stored there. As for the rest, I will tell you in a bit.\" She opens the door again and walks in like a model\n\t\t\ton a catwalk, totally ignoring the reptilians shooting at her with the might of a legion...and not doing anything to her.\n\t\t\t\n\t\t\t\"Wow, that was a sight to see,\" Meatwall remarks.\n\t\t\t\n\t\t\tAstra touches a canister with her sword and it changes its colour to golden. \"Now I want to leave a message here,\" she says and your telepathic abilities are the \n\t\t\tonly means of getting the message from her in the noise of the battle.\n\t\t\t\n\t\t\tYou take a second to think about it. You generally trust Astra's decisions, she is your guide in this place. But you are just not sure doing that will be good, especially since you are supposed \n\t\t\tto remain secret...for some time.\n\t\t\t*set red_dots +1\n\t\t\t\n\t\t\tWhat do you do?\n\t\t\t*choice\n\t\t\t\t#Ask her not to do it \n\t\t\t\t\t*set rel_astra -1\n\t\t\t\t\t(Your relations with Astra decrease)\n\t\t\t\t\t\n\t\t\t\t\tAstra looks at you with eyes that hint a slight disappointment, but she says nothing, just takes her sword back into the sheath, returns to you\n\t\t\t\t\tin the corridor and closes the door.\n\n\t\t\t\t\tYou guess it is time to move on.\n\t\t\t\t\t*goto 5\n\t\t\t\t\t\n\t\t\t\t#Say that you hope she has fun\n\t\t\t\t\tYou can mentally feel her pulling a big smile on her face as she engraves something on the walls. It seems that now her sword leaves flamy marks \n\t\t\t\t\ton the wall.\n\t\t\t\t\t\n\t\t\t\t\tAstra comes back to the corridor beaming.\n\t\t\t\t\t*set rel_astra +1\n\t\t\t\t\t*set red_dots +1\n\t\t\t\t\t(Your relations with Astra increase and you get a red dot)\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\"What did you write in there? It looked like ^|L5\"\n\t\t\t\t\t\n\t\t\t\t\t\"Oh, it means In service to the League of Light, the organization I belong to. And I signed it with the asterisk, which is my symbol.\"\n\t\t\t\t\t\n\t\t\t\t\t\"But was it a good idea to do that? Aren't we supposed to leave as few traces as possible?\"\n\t\t\t\t\t\n\t\t\t\t\tAstra shakes her head. \"I think it would be foolish to believe our presence is still unknown. I just wanted to deliver a blow to their overinflated egos.\n\t\t\t\t\tAnd I really loved doing that because it is a blow that did not require me to resort to physical violence.\"\n\t\t\t\t\t\n\t\t\t\t\tYou realize your job of exploring this room is over.\n\t\t\t\t\t*goto 5\n\t\t\n\t\t*else\n\t\t\t\"Can't they just open the door from inside?\" Meatwall asks.\n\t\t\t\n\t\t\tAstra shrugs. \"I have the feeling nobody can get out from any of these room. I am not sure how it is done but I guess it is the point of creating this science facility.\"\n\n\t\t\t\"I guess we are not getting into the room again, are we?\" Valkyrie asks.\n\t\t\t\n\t\t\t\"I don't think we need to fight this battle,\" you reply.\n\t\t\t*goto 5\n\n*label metal \n\"You are not really getting in, are you?\" you mentally ask Astra when she opens the door and you can see the room. \n\nIt looks like a mix between a morgue and a junkyard. There are several creatures consisting of rotten flesh on a metallic skeleton and you are not sure if they are designed to\nfight you with their claws, suffocate you with their stink or terrify you with their terrible look. It seems they are off, if that is the right word for such abominations.\n\n\"How do they heal?\" you catch a though by Val and that makes you smile a bit. Maybe healing is the last thing they need.\n\nMeatwall examines them closely and makes a more audible comment. \"What if they spring back to life. I bet they would be ugly in combat as well.\" \n\n\"I would think that it is unlikely. There is no energy left in them,\" says Astra, barely taking a look at them.\n\n\"But you sensed some kind of danger, right?\" You try to argue.\n\n\"And I told you I could take it because I am a warrior. But maybe I was picking echoes from a different timeline. Anyway, I really want to see that babe.\" She smiles and goes to the desk at the end of the room.\n\n\"Are you looking for the software you mentioned?\" you ask.\n\nShe nods and gets her hands on a device that looks like a tablet. Her hands start to glow. \"It has a decent protection but I believe I can hack it.\"\n\nAnd then she freezes. You get the feeling she is here only physically, while her mind is locked elsewhere.\n*page_break\nAll of a sudden the robot zombies come to live and, ignoring you, march towards Astra. The Pleiadian remains still, as if locked in some form of a stasis.\n\nWhat do you do?\n*choice\n\t#cast forcefield on her \n\t\t*set forcefield +1\n\t\t(Your forcefield mastery increases)\n\t\t\n\t\tHer immobile body is engulfed in the pulsing energy field just before the metallic claws reach her body. Sparks come out when they meet the energetic protection layer.\n\t\t\t\n\t\t\"Fire at will!\" you shout and start shooting at the weird monstrosities, hoping to destroy them before the forcefield gives way. \n\t\t\t\n\t\tYour heart is pounding wildly as you try not to cough from the smell of rotten barbecue that fills the air as you burn and melt the creeps that seem so desperate to tear \n\t\tyour dear friend to pieces.\n\t\t\t\n\t\t*if forcefield>4\n\t\t\tThe last of them falls motionless on the ground just as the forcefield takes the last scratch it can handle before breaking down.\n\t\t\t*goto metal2\n\t\t\n\t\t*else\n\t\t\tA couple of them still remains active as the forcefield takes the last scratch it can handle before breaking down. You fail to comprehend the picture of their \n\t\t\trazor sharp claws sinking into the back of the Pleiadian. Astra doesn't even flinch.\n\t\t\t\t\n\t\t\tMeatwall makes a shot that seems to find a critical zone in one of the robots and makes it shut down. Meanwhile you melt the last remaining shoulder of the second one and while the \n\t\t\tartificial intelligence tries to absorb the information you run to it and slice it into half with the melee weapon you have.\n\t\t\t\t\n\t\t\tValkyrie does her base to heal Astra, but the wounds seem quite ugly.\n\t\t\t*set black_dots +1\n\t\t\t(you gain a black dot)\t\n\t\t\t*goto metal2\n\t\t\t\t\n\t#jump in front of her \n\t\tYou are acting on instinct, trying to save your friend who seems to be absolutely helpless right now. Under other circumstances that may have been a suicide, but the zombie robots seem to be \n\t\tcommanded by an AI that has no interest in you. They try to go past you as if you are coffee table. You try to make the best of the situation by slicing and burning the hell out of them.\n\t\t\n\t\tMeatwall does the same and in the end it is very hard to breathe because the smell of rotten barbecue that fills the air. But, the more important thing is that all the he creeps that seem so desperate to tear \n\t\tyour dear friend to pieces lie immobile on the floor.\n\t\t*goto metal2\n\t\t\n\t#ask Meatwall to shield her\n\t\tAt the time, it seems to be the right decision, however, it doesn't turn out to be so wise. It takes the tank some time to realize why you want him to shield her as \n\t\tshe is not the target nearest to them.\n\t\t\n\t\tUntil he starts to act adequately, one of the creeps reaches Astra. You fail to comprehend the picture of their \n\t\trazor sharp claws sinking into the back of the Pleiadian. She doesn't even flinch.\n\t\t\n\t\tThen, her immobile body is engulfed in the pulsing energy field shielding her from the twisted nails and also slowing down her bleeding. Sparks come out when they meet the energetic protection layer.\n\t\t\t\n\t\t\"Fire at will!\" you shout and start shooting at the weird monstrosities, hoping to destroy them before the forcefield gives way. \n\t\t\t\n\t\tYour heart is pounding wildly as you try not to cough from the smell of rotten barbecue that fills the air as you burn and melt the creeps that seem so desperate to tear \n\t\tyour dear friend to pieces.\n\t\t\n\t\tThe last of them falls motionless on the ground just as the forcefield takes the last scratch it can handle before breaking down.\n\n\t\tAnd then it is the time for Astra to be healed by Valkyrie's gear. The healing ray seems to be helping, but you doubt she would recover completely. The wound seems quite ugly.\n\t\t*set black_dots +1\n\t\t(You receive a black dot)\n\t\t*goto metal2\n\t\t\n*label metal2\n\"Are you alright, dear one?\" you ask Astra.\n\nShe makes a grimace of pain. \"I will be. I promise. Thank you for saving my life. I got the software, so we can go back to the corridor.\"\n\n\"You did the same for us, Astra, but could you please explain what happened?\" you ask her as you get out. \"You knew you were going to be in trouble and yet it seems you ignored it all.\"\n\nShe sighs. \"It is one of the pitfalls that co,es when you have all the advanced tools that are available to me. Sometimes I tend to think that I can handle everything and I just can't.\"\n\n\"Yeah, I know you are talking about. I have myself made quite a few mistakes out of underestimation of the circumstances and it was not because of having advanced psychic abilities or technology. I just\nhope that the software was worth it.\"\n\n\"Oh, I am sure it is important, but I can't decode it. Wait, it seems I am just using the wrong approach. It is the key to the armory, the purple door.\"\n\n\"Sounds good to me. Let's go there,\" you suggest and you all go back to the corridor.\n*set key_armory true \n*goto 5\n\n*label white \n\"Now that must be a joke!\" Valkyrie exclaims as she looks through the door. There is a beautiful orchard with a rippling spring near it. A couple of unicorns\ndance in the background. The air smells of flowers and honey bee.\n\n\"Or maybe a trap,\" Meatwall murmurs under his nose.\n\n\"I would say none of the above.\" Astra smiles and steps inside. Or maybe outside is a better term.\n\n\"What is this place?\" you ask.\n\n\"It is a shard of reality that has deliberately been brought here to provide a place for rest and relaxation. I sense no traps here, although I would be very cautious with the unicorns. They can be vicious if you get them angry, and they\nusually do if you try to get on their backs.\"\n\n\"I wouldn't do in this heavy armour,\" Meatwall chuckles.\n\n\"Can we spend some time here, please,\" Valkyrie ask you.\n\nYou can really expect the healer to want to have a bit of a rest.\n\n\"No, please, can we get it over and away with? Aren't we supposed to be on a stealth mission as opposed to a resort holiday?\" Meatwall protests.\n\n\"Well, it would be quite optimistic to expect to remain undetected for long,\" says Astra. \"I would personally like the idea of spending some time here.\"\n\nWhat would be your choice?\n*choice\n\t#Go back to the corridor\n\t\t\"I would suggest not falling down for unnecessary sentiments. This is a dangerous mission and I think we should not get loose.\"\n\t\t\n\t\tMeatwall smiles widely.\n\t\t*set rel_meat +1\n\t\t(Your relations with Meatwall increase)\n\t\t\n\t\tValkyrie sighs.\n\t\t*goto 5\n\t\t\n\t#Fulfill the request of Valkyrie and Astra\n\t\t\"Okay, I would believe Astra when she says that there is no trap here, so I see no reason why not to explore.\"\n\t\t\n\t\tValkyrie's eyes sparkle as she smiles at you.\n\t\t*set rel_astra +1\n\t\t*set rel_val +2\n\t\t(Your relations with Valkyrie and Astra increase)\n\t\t\n\t\t\"If it was not for the armour, I would be running around like a little child. That place reminds me so much of the vicinity of the village where I grew up,\" says Valkyrie.\n\t\t\n\t\t\"What would you say about picking up a fruit?\" Meatwall asks Astra. She touches something resembling an apple.\n\t\t\n\t\t\"It is not poisonous. However, I am not sure if your stomach can handle it easily. I don't want you to feel aching or even worse.\"\n\t\t\n\t\t\"Okay, I would take that as a no.\"\n\t\t\n\t\tAs you walk around the orchard, you sense serenity soaking into your soul. And, you can definitely tell that even Meatwall is starting to feel more cheerful.\n\t\t*set red_dots +1\n\t\t(You gain a red dot)\n\t\t*page_break\n\t\t\"Hold your fire!\" Astra orders.\n\t\t\n\t\tSomething small and sparkling flies around Valkyrie.\n\t\t\n\t\tYou aim at it, just to be on the safe side. \"What is it.\"\n\t\t\n\t\tValkyrie laughs. \"It is a fairy. She is very beautiful.\"\n\t\t\n\t\tThe fairy then makes a flying swirl around Meatwall.\n\t\t\n\t\t\"Yeah, I know I am a magnet to all kinds of women,\" the tank chuckles.\n\t\t\n\t\tAnd then it is your turn to receive the greetings of the fairy.\n\t\t\n\t\t*if (weapon)>0\n\t\t\tIt doesn't turn out as expected. The moment she sees the pistol you found in Astra's wardrobe she puts her hands on her cheeks, screams and flies away.\n\t\t\t\n\t\t\t\"She didn't like the dark energy of the pistol.\" Astra says sadly.\n\t\t\t\n\t\t\tYou just shrug.\n\t\t\t*goto white2\n\t\t\t\n\t\t*else\n\t\t\tThe playful behaviour of the fairy makes you laugh. However, it is not long before she gets fed up with you. However, before she blows you a kiss and flies away, she sprays some \n\t\t\tshimmering pollen on all of you, the scent of it somehow makes you feel more composed.\n\t\t\t*set red_dots +1\n\t\t\t(You gain a red dot)\n\t\t\t*goto white2\n\t\t\t\n*label white2\nAfter you reach the end of the orchard, you decide that there is nothing interesting to explore nearby, so you return to the corridor.\n*goto 5\n\n*label grey\n\"Argh!\" Meatwall closes the door after taking a peak in.\n\n\"What is up with you? Did you see a ghost or something?\" you ask.\n\n\"I did, actually. Many ghosts!\"\n\n\"Don't be ridiculous,\" you say and walk in. The others follow you. The room resembles a hospital ward with dirty beds and is full of ghosts who seem to be wearing pyjamas.\n\n\"It can't be real, can it?\" Meatwall asks.\n\n\"I have to disappoint you. They are real. It seems they are victims of something terrible,\" Astra explains.\n\n\"But they can't harm us, I guess?\" the tank wonders.\n\n\"That is also not true. They are trapped in between 3d and 4d, so they can still pose some danger, especially in such large numbers.\"\n\nMeanwhile, they start gathering around you. One of them, obviously some kind of a medic steps up.\n\n*if eye\n\tIt seems he is about to attack you, however, when he sees the eye of Horus he wails in sadness and returns to the other ghosts.\n\t*goto grey2\n\t\n*else\n\tHe steps slowly and then leaps at you with unbelievable speed. His nails somehow pass through your armour and scratch you. The feeling causes you more fear than pain. Astra slices him in half, making him disappear.\n\tOne is gone, many remain.\n\t*set black_dots +1\n\t(You receive a black dot)\n\t*goto grey2\n\t\n*label grey2\n*page_break\nThe ghost surround you. It seems you can no longer reach the door without going through them.\n\n\"There are two ways we can deal with it,\" Astra explains. \"The first one is the usual for a warrior, we can just destroy the energetic remains of bodies they have, letting them return to source. However, it is going to be ugly.\nThe other would be to try to bring comfort to them and politely send them away. It is going to take more time, but I am sure Valkyrie is going to like it very much, as I will do too.\nI am afraid we don't have much time to decide on that, so be quick, ${name}.\"\n*choice\n\t#Attack them\n\t\tAs Astra says, it turn out to be ugly. The angry spirits appear to be no match for your military equipment, but the already tormented souls release so much negative energy that at the end you are starting to hate yourself.\n\t\t*set black_dots +1\n\t\t\n\t\t(You receive a black dot)\n\t\t*goto grey3\n\t\t\n\t#Try to comfort them\n\t\tAstra suggests that you and Meatwall remain to the sides and just watch as she and Valkyrie project love outside of their beings and to the ghosts. It seems that it is working because some of them start laughing. \n\t\tOthers would cry a bit, but you know that those are tears of release and joy.\n\t\t\n\t\tThe Pleiadian eventually opens a portal and invites them to go through it, which they gladly do.\n\t\t\n\t\t\"That was wonderful,\" Astra says beaming.\n\t\t\n\t\t\"Yeah, it is probably the happiest time of my life,\" Valkyrie shares.\n\t\t*set red_dots +1\n\t\t*set rel_astra +1\n\t\t*set rel_val +1\n\t\t(Your relations with Astra and Va increase and you get a red dot)\n\t\t*goto grey3\n\t\t\n*label grey3\n*page_break\nJust as you are about to leave, you see a key card.\n\n\"That must have belonged to the doc,\" Astra notes. \"I am taking it, it may allow us to get to the infirmary.\"\n*set key_infirmary true\n*goto 5\n\n*label infirmary\n\"That is great.\" A radiant smile appears on Valkyrie's face.\n\n\"It seems we found the infirmary.\" Meatwall comments. \"Why does it have to be such a mess here?\"\n\nThe tank is right, the floor is covered with broken vials and used syringes. There are several apparatuses with unknown functions that appear to be out of order.\n\n\"I have never seen a cage in the infirmaries I have entered.\" Val starts to realize that it is not such a nice place.\n\nSomething howls in the shadows of the corner and crawls in your direction. To your horror, it is something that barely resembles a human woman under the dirt and bruises, except for the fact that \nshe doesn't have legs. \"Painkillers...please,\" she asks you and extends her hands, begging you.\n\nValkyrie immediately starts searching the pile of medicines on the cupboard.\n\n\"Your healing ray won't help her, will it?\" you ask her.\n\nShe just shakes her head. \"It can't restore lost body parts. It is a pity that I am the healer in such an advanced military unit and I can do little to help in this situation. Here it is.\"\n\n\"You are seriously not going to get close to her, are you?\" argues Meatwall. \"Look at her nails and the muscles on her arms. She is warrior that can rend your hands to pieces.\"\n\nValkyrie looks to you for advice.\n*choice\n\t#Allow Valkyrie to give her the painkillers\n\t\t*set rel_val +2\n\t\t(Your relations with Valkyrie increase)\n\t\t\n\t\tThe healer gets closer and gives her the painkillers with trembling hands, the victim perforates the plastic bottle with her nails and takes a couple of them. An expression of bliss appears on her face. \n\t\t\n\t\t\"What is your name?\" Astra asks her.\n\t\t\n\t\t\"My name is Kyla. Thank you for your loving gesture. It has been years since somebody did that for me without expecting anything in return.\"\n\t\t\n\t\t\"You can read our minds?\" the Pleiadian inquires. \n\t\t\n\t\t\"Almost, just the basic shades. I am a warrior and being able to read the mentality of my enemies.\"\n\t\t\n\t\t\"How did you end up here?\" Meatwall asks.\n\t\t\n\t\t\"I was on my way to becoming the greatest warrior ever but something happened on the way to hell,\" she laughs. \"Now there is only one thing I would like to do and that is take as many of teh bad guys to sources as I can... with me.\"\n\t\t\n\t\t\"There has to be another way,\" Valkyrie says. \"After we are done here, we can take you with us and heal you, give you mechanical legs and let you have a normal life.\"\n\n\t\tKyla laughs manically. \"You have no idea what I have been through in order to become what I am. There is no amount of healing to restore things to the \n\t\tway they were before volunteering for the programme. Anyway, let's talk about something else. I see the weapons you have and I am sure it in the third section of the cupboard there is something that can serve as an upgrade. The medic butchers used it to make very fine incisions.\"\n\t\t\n\t\tAstra checks the section and handles you a small round object which you attack to your weapon. You try it on the operations table and almost manage to write your name on it while cutting it into shreds.\n\t\t*set red_dots +1\n\t\t\n\t\t\"Thank you, Kyla\" you say. \"What are you going to do?\"\n\t\t\n\t\tShe just waves at you with her long nails. \"Just let me enjoy the painkillers at peace. Then, I will go into a killing rampage. This is as simple.\"\n\t\t*goto red2\n\t\t\n\t#Save the woman from her suffering by killing her.\n\t\t\"Valkyrie, do you realize there is little we can do to really help her. Please, looks away.\"\n\t\t\n\t\t\"${name}, you are not going to do this, please.\"\n\t\t\n\t\tYou fire at the woman. Her death is quick.\n\t\t\n\t\tAstra hugs the healer and you are sure she is also using her psychic abilities to make her feel better or even understand. But it would be very hard for Valkyrie to do that.\n\t\t*set rel_astra -2\n\t\t\n\t\t(Your relations with Astra decrease)\n\t\t*goto red2\n\t\t\n\t#Ignore her \n\t\t\"I don't think you should get anywhere near her,\" you tell Valkyrie.\n\n\t\t\"What about just tossing her the bottle?\" she asks, but you have no time to respond. The woman sees the painkillers and mobilizes whatever strength she has left.\n\t\tShe virtually flies in the air, launched by her powerful hands. She lands on Valkyrie and her beastly claws sink in the throat of the killer.\n\n\t\tAstra is the first to react, slicing the attacker in half.\n\n\t\tValkyrie does not lose consciousness, so she uses her healing ray to make the bleeding stop and repair the sensitive tissue.\n\n\t\tThe event, however, leaves her stressed.\n\t\t\n\t\t*set black_dots +1\n\t\t(You gain a black dot)\n\t\t*goto red2\n\n*label red2\n*page_break\n\"I think we should get out of here,\" you say while grabbing a medicine kit.\n\nBack in the corridor, you help Val take care of the wounds of your team.\n*if healing>2\n\t*set black_dots -1\n\t\n\t(A black dot has been removed from the count)\n\t*goto 5\n\n*else\n\t*set black_dots -2\n\t\n\t(Two black dots have been removed from the count)\n\t*goto 5\n\n*label armory \n\"I hope they have nice armour add-ons,\" says Meatwall.\n\n\"I am not very sure if theirs are quite compatible with what we use,\" says Astra\n\n*if software\n\tShe touches the door knob. You can only assume what she is doing and your guess is that she is using the software that almost got her killed.\n\n\t\"That's it, we can now enter,\" she smiles.\n\t*set red_dots +1\n\t\n\t(You gain a red dot)\n\t*goto green2\n\n*else\n\t\"This door looks so fragile. Maybe if I try to ram it we can go through.\"\n\n\t\"I wouldn't recommend that,\" Astra says coldly. \"The door is there to stop intruders, I don't expect it to be so ineffective.\"\n\n\t\"It will not be deformed because it is not effective but because I am strong,\" Meatwall insists.\n\n\tAstar sighs.\n\n\tWhat would you choose?\n\t*choice\n\t\t#Allow Meatwall to give the door a try\n\t\t\tAstra puts her palm on her face and shakes her head as the tank rams the door. There appears to be no damage on it, however, an alarm almost deafens you.\n\n\t\t\tThe Pleiadian womam touches the door knob and you can only imagine what she is doing, but the wailing of the siren stops.\n\n\t\t\t\"Great, now the door is really locked and there is no way it can be opened. No armour upgrades to you, big boy. Maybe next time you will listen to your much elder sister,\" she tells\n\t\t\tMeatwall but you guess that the reprimand should really be directed at you.\n\t\t\t*set black_dots +1\n\t\t\t\n\t\t\t(You receive a black dot)\n\t\t\t*goto 5\n\n\t\t#Ask him not to do anything stupid  \n\t\t\t\"Do you happen to have anything else in mind?\" the tank asks.\n\n\t\t\t\"Yes, and if it was not for your impatience, I would've had the opportunity to explain. I think I will just try to hack the door. You can wish me luck.\n\t\t\t\n\t\t\tShe touches the door knob. You can only assume what she is doing and your guess is that she is using the software that almost got her killed.\n\n\t\t\t\"That's it, we can now enter,\" she smiles.\n\t\t\t*goto green2\n\n*label green2\n*page_break\nMeatwall manages to proove the saying that boys and men differ by the complexity of their toys, and the expression on his face suggests that he is enjoying an \nearly Christmas feast.\n\nHe tries several shoulder pads and forearm protectors and finally sets on pairs that match his armour.\n*set red_dots +1\n\n(You gain a red dot)\n*goto 5\n\n*label black\nYou open the door and your muscles tense. Inside what seems to be a high tech laboratory, Desert waits for you with a cynical smile on his face, taking his eyes off a monitor and staring into yours with very little\nhumanity remaining in them. They look like hollow extensions of the exoskeleton that covers his body.\n\nBut he is not the most important entity in this moment. Something else c
