or four, and any less would be pretty much useless.\n*goto look\n\n*label 2\nThe clock reminds you that it is time for the evening meeting. You leave your room and head for the bridge. Passing by Valkyrie's room, you hear a giggle and that\nmakes you smile. It is good that not all of your team finds space travel depressing.\n\nAs you enter the bridge room, you see the back of Innovation. You greet her and she turns back to give you a metallic smile and a sparkling-eye look, her \ndigital way of expressing gratitude to meet you. However, she turns her back to you again, her pony tail lashing as she does so. There are still a few minutes until\nthe meeting begins and she wants to use it appropriately. You are pretty sure the pilot AI is teaching her how to fly such a ship. That skill would be invaluable\nin case it goes out of order. Innovation said she downloaded the necessary software but she had trouble using it.\n\nYou remember a few guys who like androids make obscene commentaries about how beautiful her model is. Her metal body is sculptured to resemble the one of an elegant woman.\n\nOne day, you asked her if she wanted to look like a human and she just shook her head. With the money she earned from the last tournament, she could afford to. Her answer\nwas that she knows where she stands in the continuum between machine and human and doesn't want to move even an inch.\n\nInnovation plays the role of the specialist in your room. She is adept at sniping and taking control of enemy machines, commanding them for limited periods of time. \nShe is also responsible for researching opponent teams and analysing the terrain where the virtual battles take place. She also makes sure the SAVRs and battle armours \nfunction properly. \n\nShe is so important and many-sided that you considered making her the team captain. But, your guess is that you are best at the role you are playing. With \nthis configuration, you are winning and this is important.\n*page_break\nThe door opens and she comes out, a faint smile on her beautiful, round face. It is Valkyrie. Her white outfit reveals her amazing physique. The proportions of \nher body are immaculate and her legs seem to have no ending. A rebellious lock of long blonde hair sticks to her lips, staining it with scarlet drops as her\neyes smile.\n*if (att2females=1)\n\tSomething inside you fails to remain unimpressed by the beauty you see. How are you going to respond?\n\t*choice\n\t\t#Give her a cold look, hiding your feeling, trying to remain professional\n\t\t\tValkyrie's smile vanishes, but there is no sign of disappointment on her face. She sits at the small table, waiting for Meatwall.\n\t\t\t*goto 3\n\t\t#Smile to her back\n\t\t\t*set rel_val +1\n\t\t\t(Your relations with Valkyrie increase by 1)\n\t\t\t\n\t\t\tThe wordless flirt between the two of you lasts a couple of seconds before she takes her place at the small table, waiting for Meatwall.\n\t\t\t*goto 3\n\t\t#Compliment her\n\t\t\t\"You look beautiful today, Val,\" you remark.\n\t\t\t*set rel_val +2\n\t\t\t(Your relations with Valkyrie increase by 2)\n\t\t\t\n\t\t\t\"Thank you, ${name}!\" Her smile grows even wider and you can swear you see her milk white skin redden a bit as she takes her place at the \n\t\t\tsmall table, waiting for Meatwall.\n\t\t\t*goto 3\n\t\t\t\n*elseif (gender=\"female\")\n\tEver since Valkyrie joined the team, you've had an internal struggle about the way you feel towards her. On one hand, she is a strong and friendly woman\n\tand she could be someone to rely on emotionally. On the other hand, her good looks make you feel jealous.\n\t*choice\n\t\t#Our friendship comes before anything else\n\t\t\tYour silent smiles show how delighted the two of you are to see each other again. You even have a brief hug before taking place at the small table, \n\t\t\twaiting for Meatwall to appear.\n\t\t\t*set rel_val +2\n\t\t\t\n\t\t\t(Your relations with Valkyrie increase by 2.)\n\t\t\t*goto 3\n\t\t\t\n\t\t#You find an inner urge to altercate with her\t\n\t\t\t\"Look at who's late again. What is wrong this time, sleeping beauty?\" you remark.\n\t\t\t\n\t\t\tValkyrie doesn't respond. She just frowns and sits at the table, looking down. You can't say that her reaction is a surprise to you. Valkyrie\n\t\t\twould often do anything to prevent the escalation of a conflict, even if that means not being able to defend herself. While you can't say \n\t\t\tyou understand such behaviour, you are too intelligent to consider it a sign of weakness.\n\t\t\t*goto 3\n\t\t\t\n*else\n\tHer impressive figure has little effect on you.\n\t*choice\n\t\t#She is your best friend\n\t\t\tYour silent smiles show how delighted the two of you are to see each other again. You even have a brief hug before taking place at the small table, \n\t\t\twaiting for Meatwall to appear.\n\t\t\t*set rel_val +2\n\t\t\t\n\t\t\t(Your relations with Valkyrie increase by 2)\n\t\t\t*goto 3\n\n\t\t#She is nice, but you've never been very close\n\t\t\tYou don't respond and Valkyrie's smile vanishes, but there is no sign of disappointment on her face. She sits at the small table, waiting for Meatwall.\n\t\t\t*goto 3\n*label 3\nMeatwall comes in a minute. He is dressed in a costume like you, revealing a sculptured body with more muscles. He is the tank and he is supposed to \ncarry heavier armour, even though his costume helps quite a bit.\n\nHis hair is dyed in silver, which seems to be very modern among the men coming from the place on Earth called Samoa. His natural tan contributes to\nhis healthy look.  \n*if (att2males=1)\n\tSomething inside you fails to remain unimpressed by the charm of the muscles dancing under his shirt. How are you going to respond?\n\t*choice\n\t\t#Give him a cold look, hiding your feeling, trying to remain professional\n\t\t\tMeatwall just nods as a greeting and sits next to Valkyrie\n\t\t\t*goto 4\n\t\t\n\t\t#Smile to him\n\t\t\t*set rel_meat +1\n\t\t\t(Your relations with Meatwall increase by 1)\n\t\t\t\n\t\t\tThe wordless flirt between the two of you lasts a couple of seconds before he takes his place at the small table, near Valkyrie.\n\t\t\t*goto 4\n\t\t\n\t\t#Compliment him\n\t\t\t\"You look terrific, Meat,\" you remark. \"It seems that the new training routine does you well.\"\n\t\t\t*set rel_meat +2\n\t\t\t(Your relations with Meatwall increase by 2)\n\t\t\t\n\t\t\t\"Thank you, ${name}!\" He gives you a wide smiles, showing his perfect teeth that look even shinier on his dark face. He takes his place next to Valkyrie.\n\t\t\t*goto 4\n\t\t\t\n*elseif (gender=\"male\")\n\tEver since Meatwall joined the team, you've had an internal struggle about the way you feel towards him. On one hand, he is a strong and friendly man\n\tand he could be someone to rely on emotionally. On the other hand, his good looks make you feel jealous.\n\t*choice\n\t\t#Our friendship comes before anything else\n\t\t\tYour silent smiles show how delighted the two of you are to see each other again. You even have a brief hug before taking place at the small table, \n\t\t\tnext to Valkyrie.\n\t\t\t*set rel_meat +2\n\t\t\t\n\t\t\t(Your relations with Meatwall increase by 2)\n\t\t\t*goto 4\n\t\t\t\n\t\t#You find an inner urge to altercate with him\t\n\t\t\t\"Look at who's late again. What is wrong this time, sleeping beauty?\" you remark.\n\t\t\t\n\t\t\tYou can see his eyes flashing with anger and you know that a quarrel is about to start. Valkyrie, however, decides to take control. She stands up\n\t\t\tand puts her fingers in front of his mouth. Then, she takes him by the hand and motions him to sit together with her at the table. \n\t\t\t*goto 4\n\t\t\t\n*else\n\tHis impressive figure has little effect on you.\n\t*choice\n\t\t#He is your best friend\n\t\t\tYour silent smiles show how delighted the two of you are to see each other again. You even have a brief hug before taking place at the small table, \n\t\t\tnext to Valkyrie.\n\t\t\t*set rel_meat +2\n\t\t\t\n\t\t\t(Your relations with Meatwall increase by 2.)\n\t\t\t*goto 4\n\n\t\t#She is nice, but you've never been very close\n\t\t\tMeatwall just nods as a greeting and sits next to Valkyrie\n\t\t\t*goto 4\n\n*label 4\n*page_break\nYou are about to start discussing the opponents you suppose to face in the tournament when you hear a beeping sound coming from the bridge. Innovation\nreads the question in your eyes.\n\n\"We are receiving an incoming transmission,\" she explains.\n\nYou nod and turn around in order to be able to see the main screen.\n\n\"This is Colonel Jenkins,\" an old man with a commanding presence appears there. \"Captain ${name}, Lieutenants.\"\n\nYou often forget the military rank you have since most of the time you are pretty much an independent unit. Every once in a while, however, you \nare reminded of the organization you belong to.\n\nDo you salute him according to the statute?\n*choice\n\t#Yes\n\t\t*set rebel -1\n\t\t(Conformity increases)\n\t\t\n\t\tYou stand up and straighten your body, raising your right hand and touching your temples with the tip of your fingers. The other team members do the same, \n\t\tfollowed by the Colonel himself.\n\t\t\n\t\t\"I am glad you haven't forgotten your manners,\" says the high-ranking officer.\n\t\t*goto 5\n\t\t\n\t\t\n\t#No\n\t\t*set rebel +1\n\t\t(Conformity decreases)\n\t\t\n\t\tThe Colonel looks at you expectantly but you really have no intention of wasting time participating in  a stupid ritual. The tournament is so soon.\n\t\tBesides, you wish that he'd speak his mind and leave you alone soon.\n\t\t*goto 5\n\t\t\n*label 5\n*page_break\n\"Soldiers, I am sorry to interrupt your routines, but I have the privilege of assigning you a real mission, not like your virtual fighting fantasy adventures.\"\n\nApparently, the Colonel has some old school beliefs and does not respect your virtual reality achievements.\n\nHow do you reply?\n*choice\n\t#\"I am all ears, Colonel.\"\n\t\t*goto 6\n\t\t\n\t#\"I am glad we'll have new experience that may even help us beat the rival teams in the tournament.\"\n\t\t\"Your internal motivation has little importance to me. You are a military unit and are here to carry out commands. However, I like your spirit.\n\t\tMany of the teams fighting exclusively in SAVR have little respect for the real thing.\"\n\t\t*set rebel -1\n\t\t\n\t\t(Conformity increases)\n\t\t*goto 6\n\t\t\n\t#\"I wonder how good you will be in a SAVR.\"\n\t\tYou see the Colonel grit his teeth in an attempt to hide his anger. \"Your internal motivation has little importance to me. You are a military unit and are here to carry out commands.\"\n\t\t\n\t\t\"Yes, Sir!\" You shout with a vaguely detectable hint of ridicule.\n\t\t*set rebel +1\n\t\t\n\t\t(Conformity decreases)\n\t\t*goto 6\n\t\t\n*label 6\n\"You are physically close to a planet called Zeta 1368. I am sure the AI will be able to update you on the officially known information about it, so \nI will spare sharing it myself.\n\n\"A military group of four, just like you, was sent there with a special mission of retrieving an artifact of supreme importance. The leader, known as Desert or Kochinski,\nis confirmed to have reached it, but we've been unable to contact him. He is supposed to be the only survivor of his team.\"\n\nA picture of a tall, blue-eyed man appears on the screen.\n\n\"I've already sent the coordinates of his expected location on the surface of Zeta 1368. Your mission is to find him and ensure he receives access\nto an extraction point that we will provide. That is all. Questions?\"\n*goto 7\n\n*label 7\n*page_break\nWhat questions do you have?\n*choice \n\t*hide_reuse #\"How do you know he is alive?\"\t\t\n\t\t*goto alive\n\t\n\t*hide_reuse #\"How did the other team members die?\"\n\t\t*goto die\n\n\t*hide_reuse #\"What is this artifact?\"\n\t\t*goto artefact\n\t\n\t*hide_reuse #\"How exactly do we find him?\"\n\t\t*goto findhim\n\t\n\t*hide_reuse #Finished with questions\n\t\t*goto 8\n\n*label alive\n\"The artifact enables us to receive information sufficient to make us believe that he is alive. This is the only thing I can tell you right now,\" says the Colonel.\n*goto 7\n\n*label die\n\"We have very little information regarding the cause of their deaths. What we do know is that they fought native creatures resembling insects but roughly \nas big as human beings. Whether or not this was the cause is yet to be determined.\"\n*goto 7\n\n*label artefact\n\"I am sorry, I am not entitled to tell you anything that is not directly related to the artifact unless it is necessary for the completion of your mission.\"\n*goto 7\n\n*label findhim\n\"The possession of the artifact would make his presence very hard to conceal,\" the Colonel smirks.\n\n\"What exactly do you mean?\" you ask.\n\n\"I can't tell you more right now without exposing top secret information. My advice is to take my words for granted and believe that tracking Desert \nwould not be a fundamental problem.\"\n*goto 7\n\n*label 8\n\"All right, I will keep in contact with you occasionally while you are on your mission. The piloting AI is already on due course. Good luck and bring honour\nto our army.\"\n\nHow do you feel about your assignment?\n*choice\n\t#\"I am not required to feel, just do what is asked of me\"\n\t\t*set rebel -2\n\t\t(Conformity increases by 2)\n\t\t*goto 9\n\t\t\n\t#\"I like the idea and I am anxious to start the adventure\"\n\t\t*set rebel -1\n\t\t(Conformity increases by 1)\n\t\t*goto 9\n\t\t\n\t#[i]I don't like being treated like a puppet[/i]\n\t\t*set rebel +1\n\t\t(Conformity decreases by 1)\n\t\t*goto 9\n\t\n\t#[i]I find the situation disgusting. They want us to risk our lives for a cause that we know nothing about[/i]\n\t\t*set rebel +2\n\t\t(Conformity decreases by 2)\n\t\t*goto 9\n\t\t\n*label 9\n*page_break\nYou try to detach from your emotions by looking at your teammates. Valkyrie shows little emotion. As long as you know her, she's probably accepted her \nfate and would continue along without grumbling. Meatwall is on the other side of the spectrum, cursing the Colonel, and wondering why now. What \nworries him most (as it should worry you as well) is that unless you complete your mission quickly, you simply won't be able to go there on time for the beginning\nof the tournament, let alone have the necessary time to adapt to the gravity of the planet and prepare.\n\nInnovation, just like the other lady, is quiet. You are sure she is surfing the net, looking for information regarding the planet.\n*page_break\nIn a couple of minutes, Innovation is ready with the research.\n\n\"Zeta 1368 is a planet with dimensions comparable with the old Earth. It is 10 % smaller, 65 % of the surface is under water. It was considered \nperfect for terraforming. The company that won the public tender is called Nanoform and it began operations 20 years ago. A couple of years after that,\nthe operations stopped. There is no official information regarding the reasons. Some quote shifting the the company's priorities, other mention the \naggressive fauna. Several of the employees were taken to mental institutions after experiencing \"their most frightening nightmares\" while excavating a \nburial site.\"\n\n\"Since when does terraformation include archaeological activities?\" you murmur under your nose.\n\n\"There is a theory that the company won the bid because of their desire to have access to powerful artifacts. One of the victims mentions a metal sphere that\nseems to have been able to interfere with the intensity of his feelings. After going through joy, he experienced fear and lost control of the device.\" \n\n\"Thank you for the information, Innovation. At least we are somewhat more prepared for what we can expect here,\" you say to the android.\n\n\"Oh, that is nothing. I believe I will be able to dig deeper tonight, but I may need a lot of time to be able to systematise the data into useful information.\"\n*page_break\nYou believe that it is best for he meeting is ready so that everyone is able to prepare on their own, so, you announce the end of it. Innovation takes \nher place in the frontal part of the bridge, while Meatwall and Valkyrie leave for their rooms, the tank letting the healer go through the door first.\n\nThe question is what do you do now? You suddenly feel that you don't want to be alone right now. This is feeling is probably as much a sign of weakness as \nyour intuition telling you that there is something your team members can share with you that could help you in your mission.\n\nWho do you approach? You know that Innovation most likely would want not to be disturbed while she is conducting her research, so the choice remains between Meatwall and Valkyrie.\n*choice\t\t\n\t#Valkyrie\n\t\t*goto visit_v\n\t\t\n\t#Meatwall\t\n\t\t*goto visit_m\n\t\t\n\n*label visit_v\nYou knock on the door. An intelligent mechanism picks up the noise, transfers it inside and amplifies it.\n\n\"Yes, please!\" You hear the gentle voice of Valkyrie.\n\nThe door opens and you see her lying on her bed with a tablet resting on her thighs.\n\n\"How are you doing?\" you ask in a confused manner, slightly uncomfortable for interrupting her rest.\n\n\"I am reading my favourite book. [i]Eternal Peace[/i]. It helps me think of a brighter future.\" She looks at you with her enormous eyes and your \npulse rate increases.\n\n\"You hate war, don't you?\" You enquire while sitting on a chair next to the bed.\n\nShe nods. \"I like soothing the pains of the wounded, bringing them back to life. This is what I live for. I know that the SAVR simulations \nare not real, but I know that I will be the best paramedic once my military adventure is over.\"\n\n\"Are you afraid of tomorrow, Valkyrie?\"\n\nShe sighs. \"I know it may become ugly. Many sanient creatures may die right before my eyes. But, I am not killing anyone,\" she states.\n\n\"What do you mean? Your still have your laser gun equipped to your battle armour, right?\"\n\nShe shakes her head. \"I removed it after our last match. I know offensive healers can be invaluable, but I want to specialise in repairing damage. I hope you understand.\"\n\nWhat would you answer?\n*choice\n\t#\"That is out of the question.\"\n\t\tShe stares at you, not wanting to comprehend.\n\t\t\n\t\t\"But...\"\n\t\t\n\t\t\"No buts! As long as you are a part of my team, you are not allowed to remove your weapon. I don't care if it burdens you physically or psychologically\n\t\t. The might be a situation in which you can save your teammates' life by simply being able to fire. Your actions are irresponsible.\"\n\t\t\n\t\tValkyrie's milk-white cheeks get red as she is seething with anger under her skin. You know her well. She will comply, being the avatar of \n\t\tdiscipline she is.\n\t\t\n\t\t\"I will do that later tonight, I promise,\" she whispers under her nose.\n\t\t\n\t\t\"Very well, Valkyrie.\"\n\t\t*set rel_val -2\n\t\t*set val_blaster 1\n\t\t\n\t\t(Your relations with Valkyrie decrease but she now has a laser gun equipped to her battle armour.)\n\t\t*goto visit_v2\n\t\t\n\t#\"You can do as you want.\"\n\t\t*set rel_val +2\n\t\t(Your relations with Valkyrie increase by 2)\n\t\t\n\t\t\"As a member of our team, you are free to contribute any way you want to. I wouldn't have chosen you if I didn't trust you Valkyrie.\"\n\t\t\n\t\tShe smiles and you can tell that she is about to shed a tear. \"Thank you ${name}, your words mean so much to me.\"\n\t\t\n\t\t\"It is alright, dear. As a team, we stand for each other.\"\n\t\t*goto visit_v2\n\t\t\n\t\t\n\t#\"I approve of your decision.\"\n\t\t*set rel_val +3\n\n\t\t(Your relations with Valkyrie increase by 3)\n\t\t\n\t\t\"As a member of our team, you are free to contribute any way you want to. I wouldn't have chosen you if I didn't trust you Valkyrie. Besides,\n\t\tI think that this decision suits your personality traits best and I know one is most successful when following their own heart.\"\n\t\t\n\t\tShe smiles and you can tell that she is about to shed a tear. She even rises and gives you a brief hug before \n\t\treturning to her bed again. \"Thank you ${name}, your words mean so much to me.\"\n\t\t\n\t\t\"It is alright, dear. As a team, we stand for each other.\"\n\t\t*goto visit_v2\n\t\t\n*label visit_v2\nWhat would you want to talk about with Valkyrie?\n*choice\n\t#Her past \n\t\t*set rel_val +2\n\t\tYou realize you never had the chance to sit with Valkyrie and just talk about what she's been through before joining your team and her dreams.\n\t\t\n\t\tShe says she became vegan when she was a teenager, when she became almost intolerant to violence. This lead her to her desire to make others recover form \n\t\tits effects and ironically join the army. Of course, she was aware most of warfare is virtual reality simulations and she believes she improve her abilities and \n\t\tthen be very successful as an emergency medic.\n\t\t\n\t\tYou enjoy her company and time goes by without you being able to keep track of it. Finally, it is time to say her goodbye and leave for your room.\"\n\t\t*goto night\n\n\t#Her healing gear\n\t\tShe show you her healing gun. It is much bigger than the one you had the option of installing in your battle gear.\n\t\t*if (healing>0)\n\t\t\tValkyrie's eyes sparkle as she explains to you how you can improve the healing capabilities of your gear by making some small adjustments.\n\t\t\n\t\t\tAs soon as you make sure you have understood what you should do, you bid her goodbye and return to your room in order to upgrade it.\n\t\t\t*set healing +1\n\t\t\t*goto night\n\t\t\t\n\t\t*else\n\t\t\tValkyrie's eyes sparkle as she explains to you how she improved her healing gear. Unfortunately, you don't have anything like that installed in \n\t\t\tyour battle suit.\n\t\t\t\n\t\t\tAfter some time passes, you bid her farewell and return to your room.\n\t\t\t*goto night\n\t\t\t\n*label visit_m\nYou knock on the door. An intelligent mechanism picks up the noise, transfers it inside and amplifies it.\n\n\"Yes, please!\" You hear the panting voice of Meatwall.\n\nThe door opens and you see the tank doing push-ups frantically. As he sees you, he stops and picks a towel up and swipes the sweat off his neck.\nFor a moment you feel sorry for interrupting his training routine, but then you realize overstraining before an important mission might not be a good idea after all.\n\n\"What is up, Meatwall?\" you ask him.\n\n\"I don't know, I feel nervous. I know the SAVR tournament are serious, but what tomorrow brings is just more real. I mean, we could actually die there, you know.\nTraining makes me focus on something else. Something I am good at.\"\n\nHis ripped body speaks better than his words.\n\nWhat would you answer?\n*choice\n\t#\"Exhausting yourself may actually decrease the chances of survival.\"\n\t\t\"You see, Meatwall. we are into this together. Some say the role of the tank is the most important in a team and I certainly can see the truth in such a statement.\n\t\tI need to fresh and rested. You may feel uncomfortable for being denied something you like, but the good of the team is more important that the comfort of an individual.\n\t\tAs long as I am in charge, you are not overstraining yourself. Did I make myself crystal clear?\"\n\t\t\n\t\tHis nostrils widen in disagreement with what you say. You can almost \n\t\tread his mind, a four-letter word engraved in his eyes.\n\t\t\n\t\t\"Yes, understood. I am done with my training for tonight.\"\n\t\t*set rel_meat -2\n\t\t*set meat_rested 1\n\t\t\n\t\t(Your relations with Meatwall decrease but at least you will have him well rested tomorrow.)\n\t\t*goto visit_m2\n\t\t\n\t#\"Do what you feel is right.\"\n\t\t*set rel_meat +2\n\t\t\n\t\t\"When I chose you for my team, I was trusting my instincts and I believe I made a good choice. I know you are doing the same now. If you that will make\n\t\tyou feel more comfortable psychologically, then go for it.\"\n\t\t\n\t\tThe tanned man smiles widely. \"Thank you, ${name}, I appreciate your kind words.\n\t\t\n\t\t(Your relations with Meatwall increase by 2)\n\t\t*goto visit_m2\n\t#\"I approve.\"\n\t\t*set rel_meat +3\n\t\t\"When I chose you for my team, I was trusting my instincts and I believe I made a good choice. I know you are doing the same now. If you that will make\n\t\tyou feel more comfortable psychologically, then go for it. I personally believe that a content tank is even better than a fully rested one.\"\n\t\t\n\t\tThe tanned man smiles widely. \"Thank you, ${name}, I appreciate your kind words.\n\t\t\n\t\t(Your relations with Meatwall increase by 3)\n\t\t*goto visit_m2\n\t\t\n*label visit_m2\nWhat would you like to talk with Meatwall about?\n*choice\n\t#His past\n\t\t*set rel_meat +2\n\t\t\n\t\tYou realize that even though Meatwall has been a part of your team for quite a long time now, you know very little of the personal history \n\t\tof the man before he joined your team. You find out he grew up in poverty in a country called Samoa and illegal fights were what seemed to be the \n\t\tway to make ends meet. Despite a few traumas that the advanced military medicine managed to cure, the brawls taught him physical discipline and that \n\t\thelped him become a powerful tank, using heavier gear than many others playing that role.\n\t\t\n\t\tMeatwall seems delighted to have someone listen to him. Time passes quickly and you eventually decide to leave him and return to your chamber.\n\t\t\n\t\t(Your relations with Meatwall increase by 2)\n\t\t*goto night\n\t\n\t#His tank gear\n\t\tYou approach his battle gear hanging on the wall.\n\t\t\n\t\t\"I love that babe. She is my pride,\" says Meatwall.\n\t\t\n\t\tIt is not quite uncommon for soldiers to talk about weapons as if they are living creatures. And, as a tank, his battle armour is the most \n\t\timportant one.\n\t\t\n\t\tIt is massive. You remind yourself you one wanted to be a tank since they are often the big heroes in SARV matches, but the sheer weight of the armour\n\t\tmade you decide against it.\n\t\t\n\t\t\"What are those gadgets?\" you ask pointing at several metal planks located in various parts of the armour.\n\t\t\n\t\t\"These ones? Oh, they help modify the forcefield by concentrating it is the spots where the human body is more fragile at the expense of other areas.\"\n\t\t\n\t\t\"Is it legal in SAVR tournaments?\" you ask, a little worried. Unauthorized gear has resulted in teams losing titles in a few instances.\n\t\t\n\t\t\"Yes, that technology does not make the forcefield stronger. In fact, if the enemy knows you have it, a sniper may actually use it to \n\t\ttheir advantage. This is why I enable or disable it from time to time during matches.\n\t\t*if (forcefield>0)\n\t\t\t\"Is it hard to install?\" you ask, hoping to be able to use the same technology on your gear.\n\t\t\t\n\t\t\t\"Oh, not at all. I watch what the engineer did to mine last season. It only takes a couple of minutes with a welder if you know what you are doing,\" he assures you.\n\t\t\t\n\t\t\t\"And why didn't you tell me about it?\"\n\t\t\t\n\t\t\t\"Well, I didn't know it was important. I mean, everyone has their responsibility and the forcefield of my gear is supposed to be mine, right?\"\n\t\t\t\n\t\t\tYou don't know how to respond, so you change the subject. \"Would you be able to do that to the forcefield of my gear?\"\n\n\t\t\t\"I would love to.\" Meatwall smiles, showing a row of white teeth. \"I may need to use micro tools, you know, I am not used to such small\n\t\t\tforcefield generators.\"\n\t\t\t\n\t\t\t\"Oh, shut up!\" You pat him on his back and lead him to your room, where he does his magic on your gear. He helps you then control it and when you start feeling tired, you \n\t\t\tsend him away and go to bed.\n\t\t\t*set forcefield 2\n\t\t\t*goto night\n\t\t\n\t\t*else \n\t\t\tUnfortunately, you don't have a forcefield installed in your gear, and so you can't benefit from this type of improvement.\n\t\t\t\n\t\t\tAfter some time passes, you bid Meatwall farewell and return to your chamber.\n\t\t\t*goto night\n\t\t\t\n*label night\n*page_break\nYou spend the night in dreams filled with faceless abominations. But as they surround you, the figure of a beautiful woman tears them away and you wake up. You realize your alarm clock is beeping.\n\nYou wash and go to the bridge, where you have a light breakfast with the rest of the team.Everybody is so quiet.\n\nOne hour after breakfast, you all meet at the shuttle dressed in your battle gear. The shuttle is supposed to be an emergency vehicle used for evacuating the crew.\n\nMeatwall manages to hit his head as he walks in, and then his shoulders one after another, which makes him curse loudly. Valkyrie laughs her heart loud, which is indicative of the \npressure inside her. Innovation makes the necessary settings regarding the trajectory. Then everyone sits and puts their seat belts on. You don't remember the last time\nyou've been crammed so tightly. \n\nMeatwall complains about Valkyrie using too much perfume, even though he admits he likes the fragrance.\n\nInnovation announces that the flight is to begin in ten seconds and off you go with a violent jerk. You are sure your neck would have been broken if you hadn't been\nprepared for it. \n\nThe shuttle accelerates to a painful speed that makes everything around you blur as if you are in a desert and experiencing a mirage. It is going to last just 15\nminutes, you remind yourself. That quarter of an hour seems like a couple of eternities, except for it finally ends. Realizing that you survived the hyperspeed, \nyou actually start to enjoy the view of the beautiful planet. It is mostly blue, which is probably water, and you can see strange black clouds here and there.\n*page_break\n\"We are entering the atmosphere. It may get a little rough,\" says Innovation.\n\n\"Bring it on, metal girl. I stand ready!\" Meatwall shouts.\n\n\"Alright, just make sure you 'stay' in your seat,\" replies Innovation.\n\n\"The place does not encourage me to take a walk anyway.\"\n\nThe shuttle changes its course so that it enter the atmosphere in a particular angle so that it doesn't burn into ashes or just bounce off it.\n\nAnd then comes the explosion and everything around you is engulfed in fire for a couple of seconds. You black out.\n*page_break\n\"Are you ready to wake up?\"\n\nYou hear a soft feminine voice. Under other circumstances, you would have joked about being asked such a question, but you are not in the mood. Your body\nhurts in countless places, but there appears to be no serious damage.\n\nThe voice belongs to a beautiful tall blonde dressed in a metallic costume. At first glance, she looks human. It would be later that you'd realize you'd never seen one with \nsuch cheekbones combined with such a delicate jaw.\n\nAs soon as you could take your eyes off her, you look around. You happen to be on a carpet of some strange wide-leaf brown grass that is so soft it is more \ncomfortable than your bed. A few meters away from you, you see Valkyrie and Meatwall, each of them lying in a translucent sparkling case. Most of Innovation\nis also there. It appears she lost the lower half of her body and her left hand.\n\n\"Are they alright?\" you ask with a voice so full of tremble that it is beyond recognition.\n\n\"They will be. They took more damage than you but they will be fine soon.\"\n\nYou look into her big blue eyes and a myriads of questions appear on the tip of your tongue.\n*goto question\n\n*label question\n*page_break\nWhat would you ask?\n*choice\n\t*hide_reuse #What is your name?\n\t\t\"The name I've chosen is Astra. Nice to meet you!\" She extends her hand but instead of going for a handshake she raises it up and then puts it on her chest,\n\t\tprobably a gesture related to the location of her heart.\n\t\t\n\t\tYou try to repeat the motion but your coordination is not as good and your clumsiness makes her smile.\n\t\t\n\t\t\"I am ${name}. This is the nick name I chose when I joined the military five years ago? Is Astra your birth name or a name you chose later?\"\n\t\t\n\t\t\"Well, I chose it before I was born and I sent a telepathic signal to communicate it to my mom and dad.\"\n\t\t\n\t\tYou can only imagine the expression painted on your face, because she adds: \n\t\t\n\t\t\"Oh, dear, I know I shouldn't give you information that may be confusing to you. But I just wanted to answer your question.\"\n\t\t\n\t\t\"Yeah, whatever.\" You scratch your head without feeling it itchy.\n\t\t*goto question\n\t\t\n\t*hide_reuse #Who are you?\n\t\t\"I am a scientist sent here to research the degree of terraformation achieved on this planet and, if possible, to continue the work.\"\n\t\t\n\t\t\"Are you from the Nanoform?\"\n\t\t\n\t\tShe doesn't answer. Instead, she waits for you to clarify.\n\t\t\n\t\t\"The company that got the government contract for terraforming this planet.\"\n\t\t\n\t\t\"No.\" She shakes her head. \"I am in no way related to the Earthly government or a company by that name.\"\n\t\t\n\t\tShe looks away. \"I can pick up your emotion... No, we are not trying to steal what you did. You need not believe in what I am telling you right now,\n\t\tbut there were no terraforming procedures conducted here. Whatever those guys did, it had nothing to do with making this planet inhabitable by a human race.\"\n\t\t\n\t\t\"And yet, it is obviously inhabitable,\" you reply.\n\t\t\n\t\t\"Yes, and it always was.\"\n\t\t\n\t\t\"So what were those guys doing here?\"\n\t\t\n\t\tShe sighs. \"I have my own theories, but I don't want to influence you for the time being. You will have the pleasure... or horror of finding out.\"\n\t\t*goto question\n \n\t*hide_reuse #What really happened?\n\t\t\"Your shuttle was destroyed by a defence mechanism left by the humans you represent before they left the planet. In the reality you know, all of you died.\"\n\t\t\n\t\tYour blood runs cold. The words might have been spoken in a very calm manner by a pair of very beautiful lips, but their meaning strikes you.\n\t\t\n\t\t\"Then, why aren't we dead?\"\n\t\t\n\t\t\"The technology I use allowed me to turn back time and create a temporal parallel reality in which I manage to mitigate some of the damage. Now, I will work \n\t\ttowards creating a bypass in the time-space continuum so that the parallel reality we are in right now joins the one you were born into.\"\n\t\t\n\t\t\"Wow, could you please explain that again?\" you ask bewildered.\n\t\t\n\t\t\"Everything is going to be okay, I promise,\" she says with a Mona Liza smile.\n\t\t*goto question\n\t\t\n\t*hide_reuse #What is the condition of my teammates?\n\t\t\"They suffered major burns and basically all types of injuries.\" She explains as she approaches the translucent cases. Your heart shrinks as you see the damage done\n\t\tto them, but they at least seem to be sleeping, the expression on their faces one of peace.\n\t\t\n\t\t\"They are being take care of by an advanced nano technology. I assure you that they feel absolutely no pain at the moment and that they will recover completely in a few days.\"\n\t\t\n\t\t\"Well, I should thank you. You really saved their asses,\" you say.\n\t\t\n\t\tHer grimace shows she could not get the humour. \"I hope to save more than the asses alone.\"\n\t\t*goto question\n\t\t\n\t*hide_reuse #Do you know of our mission?\n\t\tThe question makes her laugh. \"I know of your mission even more than you. I will try to help you as much as I can, provided the little time free time I have because \n\t\tI have my mission here too. I believe you will find yourself serving a much higher cause on this planet, sooner or later. For the time being, however, you need to rest. I believe I could talk to you \n\t\tand give you more thorough explanations later.\"\n\t\t*goto question\n\t\t\n\t*hide_reuse #What can you tell me about this planet?\n\t\t\"Well, I can give you a lot of information, a large part of it being of little use to you.\"\n\t\t\n\t\t\"Then, maybe about this area?\" you say the first thing that comes to your mind.\n\t\t\n\t\t\"We are about to go to my base. Next to it is the hive of a colony of large insectoids. They are usually peaceful but they still need to be approached \n\t\twith caution. Next to their territory, there is an abandoned science facility left by the people who were here to supposedly terraform the planet. The majority of the land on this\n\t\tplanet, however, is covered by what you would call virgin forest. There are some very interesting flora and fauna species. You should really meet them.\"\n\t\t\n\t\t\"Cool,\" you reply.\n\t\t*goto question\n\t\t\n\t#finished with your questions\n\t\t\"I see that you got the answers to the immediate questions that haunted you. Shall we go to my base of operations?\" Astra asks.\n\t\t\n\t\tYou nod. The events that unfold are so strange that send you to a dreamy state. A flying saucer comes from somewhere and a beam engulfs all of you. Its light is so bright that you need to close your eyes.\n\t\tWhen you open them again, you are in a large white room that appear to be so clean that everything shines. Astra invites you to use a strangely looking bed that actually resembles the cases of Valkyrie and Meatwall.\n\t\tYou suddenly feel very tired and are happy to do so. You remove your battle gear and are left only with your tight elastic costume. Astra compliments your physique and you return the compliment.\n\t\t\n\t\tAs soon as your head touches the pillow, you fall asleep.\n\t\t*page_break \n\t\tYou wake up quite refreshed. Whatever this bed is, you suppose there is some technology that helped you recover more quickly.\n\t\t\n\t\tAstra is nowhere to be found, so what you could do is examine the surroundings.\n\t\t*goto room\n\t\t\n\t\t*label room\n\t\t*page_break\n\t\tWhat do you do?\n\t\t*choice\n\t\t\t*hide_reuse #Examine the cases of Meatwall and Valkyrie\n\t\t\t\tYour teammates continue to be in a state of sleep. For a moment you wonder if they are alive, but you see their chests move in a rhythmical manner. They look better now, some of their wounds and burns have vanished and are now covered by new skin. It still lacks pigmentation, which is very hard to see\n\t\t\t\ton Valkyrie, but is apparent on the darker Meatwall.\n\n\t\t\t\tValkyrie reminds you very much of the story about the sleeping beauty you were told when you were a child. And Meatwall could very well play the \n\t\t\t\trole of the prince were he not in the same situation as her.\n\t\t\t\t*goto room\n\t\t\t\t\n\t\t\t*hide_reuse #Examine the table next to your bed\n\t\t\t\tThere is some food on the table. The sight of it causes massive salivation and you realize you are quite hungry. You believe Astra must have left it. At the same time, you calculate the chance \n\t\t\t\tof her poisoning you after saving you to be bloody close to zero, so you take a bite.\n\t\t\t\t\n\t\t\t\tYou have never tasted anything like that, but you guess it is based on fruits and cheese. And it is very delicious. The food doesn't last long but you get a pleasant feeling in your stomach after it is no more.\n\t\t\t\t*goto room\n\t\t\t\t\n\t\t\t*hide_reuse #Examine the strange apparatus next to your bed\n\t\t\t\tYour observation allows you to find out very little about the apparatus. It has a lot of lights that flash in a seemingly random pattern, and it has a large number of buttons and dials. You can only guess that it is somehow\n\t\t\t\trelated to the cases where your teammates currently reside, which would only make any experiments with it even highly undesirable.\n\t\t\t\t*goto room\n\t\t\t\n\t\t\t#Leave the room\n\t\t\t\t*goto corridor\n\n*label corridor\nThe corridor seems to be leading to a couple of rooms, via the same metallic doors. Only one of them appears to be different - reinforced with additional planks and you decide it must be the one leading outside.\n*goto open\n\n*label open\n*page_break\nSo, which one would you open?\n*choice\n\t*hide_reuse #The one next to you\n\t\t*goto astra_room\n\t\n\t*hide_reuse #The one on the other side of the corridor\n\t\t*goto alien_room\n\n\t#Go outside\n\t\t*goto outside\n\n*label outside\nYou open the door and the air greets you with a playful gust of wind. The adventurer in you takes over. But, you would not want to go there without your battle gear. So, you go back to the room where you woke up and put the armour on before getting out in the open.\n\nIt seems that emotions that took over you before Astra's flying saucer brought you here prevented you from noticing the peculiarities of the world outside. There appears to be no soil but some strange white sand. It crunches under your feet and it makes you uncomfortable \nbecause you know every creature around can hear you... if there is any. You guess that Astra would have warned you about dangerous wild life.\n\nYou ascend a sandy dune and look around. There seems to be some kind of a settlement a couple of kilometres away from you. You can clearly see hexagon buildings and tunnels\ngoing underground. And there are silhouettes of creatures that seem to walk erected, even though they seem to have an extra set of limbs. As Astra informed you, these creatures appear to be insectoids, even \nthough you can't decide which of the species you know they resemble the most.\n\nFor a moment, you wonder what you should do. The beautiful woman told you they were friendly, even though she added that you should treat them with caution. You \nrealize that it would be much safer if you go there together with at least one of your teammates, or even better with Astra herself.\n\nHowever, you just can't stay and wait. As silly as it may sound, you feet take you towards the hatchery of these creatures.\n*page_break\nAs you come closer to the settlement, one of the creatures notices you and approaches you. Suddenly, your blood runs cold. You've never had any fear of insects, but mantises seem to disgust you, especially the bright green ones.\nWell, this one is of the colour of the sand and its pincers are not in a \"praying form\" but rather resemble crab's.\n\nThe specimen in front of you is probably more than two-meters high and is a terrifying sight as it waggles towards you, its pincers raised. Its right is making strange circular motions. You instinctively raise the hand with the imbedded weapon, ready\nto fire.\n\nBut, are you actually going to fire, or not, risking to actually be attacked by the creature?\n*choice\n\t#Yes\n\t\t*set insect_hurt 1\n\t\t*set rel_insects -1\n\t\tYour nerves don't withstand the test of the potentially dangerous creature swinging those big pincers so close to you. In a second, you raise your hand. The distance\n\t\tis so small that you don't even need to fire. The blast hits the insectoid in the chest, removing its chitinous shell. But, other than that, their is no effect on your shooting. \n\t\tThe creature only slows down a little bit before jumping at you. A pair of wings helps it virtually launch in your direction. You try to fire again, knowing that if you hit the same place\n\t\tyou can deal fatal damage, but you simply don't have the time. One of the pincers hits your firing arm, moving it away, while the second touches your throat.\n\t\t\n\t\tYou are stunned with fear for your life. Luckily, the insectoid doesn't continue its attack. Instead, it starts churning something you actually understand.\n\t\n\t\t\"Why did you attack Nomo?\" it asks slanting its head. Its jaws seem frightening.\n\t\t\n\t\t\"I thought you were going to attack me,\" you explain.\n\t\t\n\t\t\"I don't understand. You look human like Astra. Astra taught Nomo human greeting. Nomo wanted to greet human the human way.\"\n\t\t\n\t\tYou remember the gestures Astra made to say hello. What Nomo put was a poor performance by far, but you are now sure his intentions were pure.\n\t\t\n\t\t\"I am sorry, friend, that was a mistake. Do you feel pain?\"\n\t\t\n\t\t\"Nomo is well. A night in the infirmary and Nomo will be like newly hatched.\"\n\t\t*goto nomo\n\n\t#No \n\t\tIt takes a lot of nerves to just watch the monstrosity approach you without doing anything to stop him, but you don't want to start your relations with the native \n\t\tcreatures by actually killing the first one you see.\n\t\t\n\t\tThe insectoid stops a few meters in front of you and starts churning something you actually understand.\n\t\t\n\t\t\"Nomo greets you. You look human like Astra. Astra taught Nomo human greeting. Nomo wanted to greet human the human way. Why didn't you greet Nomo back the way humans do?\" It says slanting its head.\n\t\t\n\t\tYou almost laugh. You recall the gestures Astra made to say hello. What Nomo put was a poor performance by far.\n\t\t\n\t\t\"I am sorry, Nomo, I am new here. Astra and I don't come from the same place, but I would like to greet you too.\"\n\t\t\n\t\t\"Nomo understands.\"\n\t\t*goto nomo\n\n\n\n*label astra_room\nThe room you enter is smaller than the one you woke up in. There is a bed resembling yours on the ship with a white cover on it. You see a single chair and a small table. The \nwardrobe is made of glass and you can see several majestic dresses inside, a hairband and some kind of a pistol. Drawn by curiosity, you open the wardrobe. As you expect, it is not locked. \n*if (gender=\"female\")\n\t*line_break\n\tThe temptation to try one of the dresses becomes very strong. Astra is taller than you, but other than that, she has a fit body similar to yours, so you guess they are your size. The question is \n\twould you dare do so. You are afraid that it may be considered rude.\n\t*choice\n\t\t#Put on one of her dresses\n\t\t\t*set rebel +2\n\t\t\t*set wardrobe 1\n\t\t\t(Conformity decreases)\n\t\t\t\n\t\t\tYou put a big smile on your face as you take her dresses out one by one. There are three of them, all of them long and with a high neck line. The first is white and is made of wrinkled cloth. You can\n\t\t\timagine her looking like a modern angel in it. The second is navy blue, with a rainbow passing from the shoulder to the pelvis. The final one is green. Actually, you've never seen that\n\t\t\tshade of green but it induces a soothing emotion in you when you look at it for more than a few seconds.\n\t\t\t\n\t\t\tYou doff your clothes, hoping that Astra will not decide to go back now. You try the green one and it is only then that you realize there is no mirror in the room. Looking around, desperate to find a replacement, you see a screen.\n\t\t\tIt is off and your reflection on it gives you some idea of how you look like.\n\t\t\t\n\t\t\tThe sensation of the cloth on your skin is very pleasant. It feels as if some of Astra's harmony is somehow transferred to you. \n\t\t\t\n\t\t\tDespite your initial intent, you just can't stop by donning only one dress, you need to try them all. The white one appears to be too long for you. You would trip over it unless you put some \n\t\t\tvery high heels. The rainbow one suits you just fine.\n\t\t\t\n\t\t\tAfter you decide you've had enough fun, you carefully return the dresses to the wardrobe.\n\t\t\t*goto astra_room2\n\t\t\t\n\t\t#Don't \n\t\t\t*set rebel -2\n\t\t\t(Conformity increases)\n\t\t\tYou quickly cast away these thought.\n\t\t\t*page_break\n\t\t\t*goto astra_room2\n\t\t\t\n*else\n\tThe hairband actually reminds you of the one your favourite children hero used to wear. It was a birthday present from your mother and it brought tears to your eyes.\n\tThe desire to put it on is very strong and you guess it will fit. However, would you dare do so. You are afraid that it may be considered rude.\t\n\t*choice\n\t\t#Put it on \n\t\t\t*set rebel +2\n\t\t\t*set wardrobe 1\n\t\t\t(Conformity decreases)\n\t\t\t\n\t\t\tThe hairband fits you perfectly, as if it was made for you. You suddenly feel a pleasant sensation. It is as if some of Astra's harmony transferred to you. You realize there is no mirror in the room. Looking around, desperate to find a replacement, you see a screen.\n\t\t\tIt is off and your reflection on it gives you some idea of how you look like.\n\t\t\t\n\t\t\tAfter you decide you've had enough fun, you return the hairband to the wardrobe. \n\t\t\t*goto astra_room2\n\t\t\n\t\t#Don't \n\t\t\t*set rebel -2\n\t\t\t(Conformity increases)\n\t\t\tYou quickly cast away these thought.\n\t\t\t*page_break\n\t\t\t*goto astra_room2\n\t\t\t\n*label astra_room2\n*page_break\nYou are about to close the door when you are faced with another temptation. The gun. As a soldier, you have a professional interest in weapons. You decide\nthere is nothing bad in just examining it, so you take it in your arms. It is surprisingly light, as if a toy. Its pink colour contributes to the overall impression. You \nsee no magazine or safety. That is why you dare not even touch the trigger.\n\nNext to it, there is a holster. A sudden thought occurs to you. What if you just borrow it? Suppose that you go out and for whatever reason your weapon fails. Would it not be better to have a second one.\nOf course, you are going to return it to Astra as soon as you see her. She obviously has no need for it right now.\n*choice\n\t#Take the weapon\n\t\t*set weapon 1\n\t\t*set rebel +2\n\t\t(Conformity decreases)\n\t\tYou attach the holster to your belt and close the wardrobe.\n\t\t\n\t\tDeciding you have nothing else to do in Astra's room, you return to the corridor \n\t\t*goto corridor \n\t\t\n\t#Don't \n\t\tYou cast away the thought and close the wardrobe.\n\t\t\n\t\tDeciding you have nothing else to do in Astra's room, you return to the corridor \n\t\t*goto corridor \n\t\t\n*label alien_room\n*set skeleton 1\nThat room is an exact replica of the one you woke up in. One of the cases is empty. The remains of Innovation are put on the table and there are cables attached to it. You guess that she is \nundergoing a procedure aimed at restoring her software. You hope you will be able to recreate the missing parts of her body. You know she does not feel pain, but she will \ndefinitely be unhappy by the state she is in. Your heart really breaks, knowing what acrobatic feats this metal girls can achieve. \n\nYou take your eyes off Innovation and it is only then that you see that there is actually... someone in the second transparent case.\n\nThe creature is a humanoid, but unlike Astra, it is not human. The skin is green and it is covered in scales and its eyes are big and black. \n\nThis one looks a bit darker than the ones of your teammates. You can't tell for sure, but the body seems intact. What if the nano healing technology is off and he is just \nheld a prisoner, in a comma state?\n\nWait, how do you know it is he... Who is putting there thoughts in your mind.\n\n[i]I am Hisz. Please, help me. I want to be free, I can stand this prison no longer. Just press the yellow button twice. [/i] You hear a voice in your head. [i]If you don't like\ndoing that, please, make my bodily functions come to an end. Kill me. Press the red button.[/i]\n\nWhat is your choice?\n*choice\n\t#Press the yellow button\n\t\tYou do so and nothing happens.\n\t\t\n\t\t[i]Twice, please![/i] The voice in your head reminds you.\n\t\t\n\t\tThe lid of the case starts opening, but then it closes again with a flash. An override defence mechanism probably too control of the situation.\n\t\t\n\t\t[i]It was a nice try and I thank you for it.[/i]\n\t\t\t\n\t\tFeeling a sudden desire to leave the place and hopefully to escape the cold voice, you return to the corridor.\n\t\t*set rebel -1\n\t\t\n\t\t(Your conformity increases as a result of your decision to fulfil the request of the creature) \n\t\t*goto corridor \n\t\t\n\t#Press the red one\n\t\tAs you do so, an electric field engulfs the case for a second and then vanishes. An override defence mechanism probably too control of the situation.\n\t\t\n\t\t[i]It was a nice try and I thank you for it. I have the feeling I am going to like you more than I initially though.[/i] A cold laughter follows\n\t\t\t\n\t\tFeeling a sudden desire to leave the place and hopefully to escape the cold voice, you return to the corridor.\n\t\t*set rebel -1\n\t\t\n\t\t(Your conformity increases as a result of your decision to fulfil the request of the creature) \n\t\t*goto corridor  \n\t\n\t#Just leave the room\n\t\t*set rebel +1\n\t\t(Conformity decreases)\n\t\t\n\t\tWishing to escape the creature as soon as possible, you leave the room and go back to the corridor.\n\t\t*goto corridor\n\t\t\n*label nomo\n*page_break\n\"Nomo would like to take you to queen. She would be glad to get to know new human,\" the creature announces.\n\nYou hesitate for a moment. The one in charge of the colony of such large insects may be truly dangerous, but she could also provide you with valuable information.\nIt is sometimes best to hear it from the boss' mouth. Besides, it seems that Astra has a good reputation with the insectoids and maybe their association of you with her with work in your favour.\n\nYou nod. Nomo does not understand the gesture, that is why you need to explain your consent verbally.\n*page_break\nNomo walks inside the settlement. You follow him closely, still not trusting the insectoids. There seem to be hundreds of them, each going about their business.\nMost of them carry hexagon containers, but you see blacksmiths working on tools, cooks boiling strange vegetables or even tailors waving delicate silklike cloth. That strikes you as odd since you \nsee nobody wearing any clothes. Some of them ignore you, others take a brief look at you but do nothing else to acknowledge your presence.\n\nSeveral hexagonal tunnels going underground hint that you see above the ground is only a part of the whole city.\n\nNomo leads you down the biggest of them. The insectoids you meet under the surface look a bit different. They are even bigger. Their disproportional jaws seem like \nformidable weapons. A green liquid drips from them, some kind of a weapon, you guess. Above their upper projectiles, they have something that resembles a \nharpoon that shoots spines via muscle contractions. These warriors pay a little more attention to you but still do nothing to stop you.\n\nFluorescent balls attached to the walls provide you with sufficient light. They are really queer, occasionally pulsing like the lights of fireflies, which makes you wonder if they are part of one big organism, together with just about everything else around you.\n\nAfter what seems like a quarter of an hour of walking you reach a majestic chamber. The walls are covered with gold and there are occasional gems sparkling here and there.\n\nBut the most majestic thing is the creature standing in the velvet-coated throne in the centre. She looks humanoid. No, on a second glance, she is a human. Her skin is \njet black and most of her body is covered with chitinous cover, but the features of her face are gentle and beautiful.\n\nShe gets up and makes two steps in your direction, her gate revealing animalistic grace.\n\n\"Welcome to my hive, stranger,\" she greets you. \"My name is Shiera and I am the queen of the colony of hershin, or as you may call them, insectoids.\"\n\nYou introduce yourself to the beautiful queen.\n*if (insect_hurt=1)\n\t\"I can see that Nomo is hurt, why is it?\" she asks with a hint of anxiety.\n\t\n\tNomo is silent. Would you like to admit that you did the wound?\n\t*choice\n\t\t#Yes\n\t\t\t\"I am sorry, Queen Sheera, it was me who hurt Nemo.\"\n\t\t\t\n\t\t\t\"Well, that is not a good beginning of a relationship, is it, ${name}. You come here and immediately assault one of my children. Do you have an explanation?\"\n\t\t\t*goto queen_explanation\n\t\t#No\n\t\t\t\"${name}, know that I am the embodiment of this hive and nothing within it can remain hidden from me. I know that you hurt Nemo. You come here and immediately assault one of my children.\n\t\t\tThen, you don't have the honour to admit what you did.\" The Queen sighs. \"I really want to like you, but your actions so far make it more and more difficult to do so.\"\n\t\t\t*set rel_shiera -1\n\t\t\t\n\t\t\t(Your relations with Queen Shiera decrease by 1)\n\t\t\t*goto queen_explanation\n\n*else\n\t\"I can see that you are getting along just fine with Nomo. If you are harmony with one member of my hive, you will be in harmony with everyone, including me,\" she says \n\twith a smile on her face.\n\t*set rel_shiera +2\n\t\n\t(Your relations with Queen Shiera increase by 2)\n\t\n\tYou remember how close you were to actually shooting Nomo and you realize how big of a mistake that could have been. Would you point out that\n\tNomo's behaviour could possibly be regarded as hostile or remain silent?\n\t*choice\n\t\t#Tell her of the near incident\n\t\t\t\"Dear Queen, I would like to inform you that when Nomo first approached me, I was under the impression I was being attacked. Nomo explained trying to copy Astra's way of \n\t\t\tgreetings, but waving those dangerous pincers in front of my nose was a frightening experience. I am sharing that just for the sake of you knowing the point of you of a human and hoping that \n\t\t\tthis knowledge may potentially prevent future misunderstanding.\"\n\t\t\t\n\t\t\tThe Queen remains pensive for a second, then replies: \"I appreciate that.\"\n\t\t\t*set rel_shiera +1\n\t\t\t\n\t\t\t(Your relations with Queen Shiera increase by 1)\n\t\t\t*goto queen\n\n\t\t#Say nothing \n\t\t\t*goto queen\n\t\t\t\n*label queen_explanation\n*page_break\nYou feel that you start to sweat. Being interrogated by the Queen is not going something enjoyable. So far, she has shown no aggression, but her behaviour remains cold.\n\nHow would you answer?\n*choice\n\t#Apologize \n\t\t\"I am sorry, Queen, it was a mistake from my part. I humbly beg to be forbidden.\"\n\t\t\n\t\tShiera nods. \"Forgiveness shall be granted to you as long as you never do harm to any member of my hive.\"\n\t\t*set rel_shiera +1\n\t\t*set rebel -2\n\t\t\n\t\t(Your relations with Queen Shiera and conformity increase)\n\t\t*goto queen\n\t#Explain that it was self defence \n\t\t\"I was worried about my safety. when Nomo first approached me, I was under the impression I was being attacked. Nomo explained trying to copy Astra's way of \n\t\tgreetings, but waving those dangerous pincers in front of my nose was a frightening experience. I believe that every creature has the right to defend themselves in case of imminent danger.\"\n\t\t\t\n\t\tThe Queen remains pensive for a second, then replies: \"I agree. But know that neither me nor my children mean to do you any harm. Next time you wound a member of my hive, a retaliation will follow. Am I clear?\"\n\t\t\t\n\t\tYou nod, a lump in your throat not allowing you to announce your reply.\n\t\t*set rel_shiera +1\n\t\t\t\n\t\t(Your relations with Queen Shiera increase by 1)\n\t\t*goto queen\n\t\n\t#Say that she has no authority to judge you\n\t\tThe Queen gives you a look that can easily kill you, if possible.\n\t\t\n\t\t\"Know that I am the hive. I am responsible for the hatching of each of its members and I am the one responsible for their protection. I am also the highest authority \n\t\ton any matter regarding the hershin.\"\n\t\t\n\t\tYou give her an equally menacing grimace.\n\t\t\n\t\t\"I don't want any problems with you, human. I owe a lot to Astra and I don't want to spoil my good relations with her by harming someone of her kind,\" Queen Shiera seethes.\n\t\t\n\t\t\"I want no troubles either,\" you say.\n\t\t\n\t\t\"Well, now we have an agreement.\"\n\t\t*set rel_shiera -1\n\t\t*set rebel +2\n\t\t\n\t\t(Nevertheless, your relations with Queen Shiera and conformity decrease)\n\t\t*goto queen\n\t\t\n*label queen\n\"I guess it is the first time you are in a hive. I can sense your awe regarding everything you see around you,\"says the Queen. \"Am I right?\"\n\n\"Yes, I am new to this planet and I've never seen creatures exactly like you,\" you admit.\n\nThe Queen laughs. \"Maybe you are more used to the little creatures that are a little more evolved than plants. Anyway, you will get to know us better. I could\nspend a lot of time talking about our kind, but I don't want to take away yours. If there is anything you'd like to ask me, feel free to do so.\"\n*goto queen_ask\n\n*label queen_ask\nWhat would you ask the Queen?\n*choice\n\t#\"Why do you look more human than your children?\"\n\t\t\"That must be one of the most striking questions you might have. Indeed, my DNA is not the same as the insectoids I call my children. And, they are actually not my children by birth but they are rather my siblings.\"\n\t\tConfusion is written on her face as she talks about it. \"I play the role of their social and spiritual mother, but we are all offspring hatched from a single egg.\"\n\t\t\n\t\t\"Every creature here hatched from the same egg?\" you are not sure you understood her correctly.\n\t\t\n\t\tQueen Shiera nods. \"We don't know for sure how the eggs were produced, but we know they are a finite number and in every hatchery there are hopefully a few left. As time passes and the insectoids start dying of age, the \n\t\tcurrent Queen performs the ritual of awakening on an egg and it hatches. Usually, it contains a new Queen and a varying proportion of workers and warriors.\"\n\t\t\n\t\t\"Does it mean that one day the eggs will end and...\" you stop before saying something that may be uncomfortable to her.\n\t\t\n\t\t\"Yes, ${name}, the logic says that sooner or later we will run out of eggs and then our race will perish.\"\n\t\t\n\t\t\"There must be some other way.\"\n\t\t\n\t\tThe Queen shrugs. \"There might be. When Astra came here, I was little. My mother, the old Queen Sylphia, explained her the situation and Astra offered to try to help. She took me to her camp for a couple of weeks\n\t\tand my body underwent transformation. Astra believed that if she introduce me to strains of human DNA, I will gain the ability to reproduce just as humans do.\"\n\t\t\n\t\t\"Were the procedures stressful?\" you ask.\n\t\t\n\t\t\"No, not at all. I felt loved and taken care of the whole time. She would mainly give me delicious things to eat and take urine samples. She is a good woman.\"\n\t\t\n\t\t\"Was the experiment successful?\"\n\t\t\n\t\tThe Queen laughs nervously. \"How do I know? We don't have any make humans here. Besides, Astra says I should wait a few more years.\"\n\t\t*goto queen_ask\n\t\t\n\t#\"What do you know about Astra?\"\n\t\t\"I've known Astra since I was very little. She's always been very friendly and helpful. I like the positive emotion she brought into my life. The insectoids don't have the spectrum of emotions I've seen her exhibit. They tend to be colder.\n\t\tAstra set an example for me to follow.\"\n\t\t\n\t\t\"What you say makes me wonder how old the two of you are.\"\n\t\t\n\t\t\"Can you quess?\" she smiles.\n\t\t\n\t\t\"In my culture it would be considered impolite to talk about the age of a woman because they want to pretend to be younger.\"\n\t\t\n\t\t\"Oh, that is something I've never thought about. Every age has its charm, advantages and disadvantages. Don't worry, we don't follow such etiquette here.\"\n\t\t\n\t\t\"My guess is that both Astra and you look like the equivalent of 30 earthly years. But I guess you don't know what it is.\"\n\t\t\n\t\tThe Queen nods. It is true that I don't know, but once we talked with Astra about aging. She told me they found a way to extend their life span more than ten fold and their ancestors lived for a slightly shorter time than our species now.\n\t\tShe offered to use that knowledge on us and it is somethng we are currently working on.\n\t\t*goto queen_ask\n\t\t\n\t#\"What are the sights of the hive you'd recommend me to visit?\"\n\t\t\"There are several facilities that might be of interest to you. I will have Nomo show you around. The most impressive is probably the hatchery, where you can see the young being taken care of. The barracks might also interest you, as this is where you can get acquainted \n\t\twith the way out warriors are trained and equipped with weapons. Visiting the infirmary may be unpleasant due to the fact that some of the incidents that happened recently left ugly wounds on the casualties, but I guess you can see the practices we employ to make our kind heal.\"\n\t\t*goto queen_ask\n\t\n\t#Ask her for helpful information regarding your mission\n\t\tYou explain her carefully about the task you've been given by your commander.\n\t\t\n\t\t\"Are you sure this is all you can tell me. I guess you are keeping information away from me and I would understand that,\"\n\t\tsays the Queen.\n\n\t\tYou shake your head. \"Nope, dear Queen, this is all they told me.\"\n\t\t\n\t\tYou look down, feeling embarrassed.\n\t\t\n\t\t\"I am sorry to hear that. I never treat my warriors like that. I always make sure they have all the necessary information so that they can make the best decision in the circumstances they happen to be. But\n\t\tlet me answer your question. I received a call for help coming from another hive about a group of people attacking it. Dear Hisj said they wanted to excavate a part of her settlement to extract something from there.\"\n\t\t\n\t\t\"Did you ask Astra what to do?\" you ask.\n\t\t\n\t\tThe queen nods. \"Yes, the natural thing for me was to ask the only human I knew at the time how to deal with the situation. She took my request to the heart of gold she has\n\t\tand immediately went to investigate. She came back wounded and it was probably the only time I saw her spirit shattered. She said she couldn't stop them right now. Her advice was for Hasj and her hive to evacuate lest risk extinction.\n\t\tBUt even that would be no solution as the artifact they were looking for would make them even stronger and more dangerous. I saw a tear roll down Astra's cheek. At the time, I didn't know what it was, but later I found out.\"\n\t\t\n\t\t\"I should really ask her for more information, thank you queen. But, by the way, what happened to the hive?\"\n\t\t\n\t\t\"Well, what Astra proposed was not a solution typical for my kind. Hasj would consider it as a sign of fear... even treason. So, I sent some of my warriors to help her and after her hive was crushed, I invited the few remaining of her brood into mine and I treat them like my own children.\"\n\t\t\n\t\tThe Queen's eyes fill with tears and you feel bad for being the reason she brought painful memories.\n\t\t\n\t\t\"I am sorry.\"\n\t\t\n\t\tShiera wipes her face. \"That is okay, ${name}, you are not the reason for all this madness.\"\n\t\t*goto queen_ask\n\t\t\t\t\n\t#\"What dangers lurk in the area?\"\n\t\t\"There are not many, actually. Every now and then, we have huturies raid into my hive. They are enormous centipedian creatures that feed on our flesh. I believe they also regard our eggs as delicasies.\n\t\tThat is disgusting. Other than that, there are hardly any beasts that can endanger your life,\" explains the Queen.\n\t\t\n\t\t\"Don't you have big predators here?\" you ask amazed.\n\t\t\n\t\t\"There are big meat eaters, but they are mainly scavengers.\"\n\t\t*goto queen_ask\n\t\t\n\t#\"How are we able to understand each other's language?\"\n\t\tThe Queen smiles. \"I guess Astra didn't explain it to you, did she?\"\n\t\t\n\t\t\"Nope, we didn't have much time to talk yesterday when we first met. Should I ask her?\"\n\t\t\n\t\t\"There is no need. The explanation can be pretty simple. You know that sound is actually a wave, right?\"\n\t\t\n\t\tYou nod.\n\t\t\n\t\t\"There is away to make that wave acquire such a frequency that it is universally understood by just about anyone. It has something to do with the energy field of the planet and its properties.\"\n\t\t\n\t\t\"Well, that sounds weird, but the power of sound is something underresearched.\"\n\t\t*goto queen_ask\n\t\t\n\t#Finished with the questions\n\t\t*goto queen_ask2\n\t\t\n*label queen_ask2\n\"Very well,\" says the queen. \"Now I will summon Nomo and she will walk you around?\"\n\n\"Nomo is female?\" you wonder. \n\n\"Everyone here is female. There are legends of male insectoids but my guess is that they were forever lost.\"\n\nNomo enters the chamber.\n*if (insect_hurt=1) \n\t\n\tYou see that her missing chitinous breast plate has been replaced by a metal sheet.\n\t*goto queen_ask3\n\t\n*else\n\t*goto queen_ask3\n\t\n*label queen_ask3\n*page_break\n\"Of course, my Queen. Where shall I take our guest?\" Nomo asks.\n\n\"Show ${name} the barracks, infirmary and hatchery,\" says the Queen.\n\n\"What about the treasury?\" Nomo suggests.\n\nShiera thinks it over for a few seconds. \"Not yet. The human still has not proven time tested loyalty to us. Leave it for another time.\"\n\n\"Understood.\" Nomo nods and leaves the chamber. You wave Queen Shiera goodbye, hoping that the gesture communicates the message to her. She first puts her hand on her heart \nand then waves back.\n\nThen, you rush out to catch up on Nomo. \n\nAs you walk through the tunnels, you realize you are getting more used to it. Still, you'd easily get lost in the network.\n\n\"We are going on the surface now. I know that you humans may sometimes feel uncomfortable spending too much time underground,\" Nomo mutters.\n\n\"Does Astra feel claustrophobia?\"\n\n\"Yes.\"\n\nYou mean to tell her that you prefer being outside but you've spent much time indoors and you don't feel so bad about it, but then you decide \nyou'd just use the hospitality offered and will just follow the big mantis-like creature.\n\nWould you like to ask Nomo about the treasury?\n*choice\n\t#Yes\n\t\t\"It is a place where we store the knowledge and wisdom of past generations. The Queen says that it is the most important place in the hive but the hatchery and is to be defended\n\t\tat all cost. In that aspect, it is a higher priority than the Queen herself.\"\n\t\t\n\t\t\"I see,\" you say as you come to the surface.\n\t\t\n\t\t*goto hive\n\t#NO\n\t\tYou soon reach the surface.\n\t\t*goto hive\n\t\t\n*label hive\n*page_break\n\"Where would you like me to take you, ${name}?\" asks Nomo.\n*choice\n\t*hide_reuse #The hatchery\n\t\t*goto hatchery\n\t\t\n\t*hide_reuse #The barracks\n\t\t*goto barracks\n\t\t\n\t*hide_reuse #The infirmary\n\t\t*goto infirmary\n\n\t#You are done with the exploration of the hive\n\t\t*goto done\n\t\t\n*label barracks\nThe barracks is one of the biggest buildings on the territory of the hive. Some of the insectoids you see there are really fearsome . You have the feeling they can rip you in half using their \nenormous jaws. However, they pay little attention to you You are not quite sure about the reason for their behaviour. Maybe they are used to seeing a human being (Astra in particular) or maybe it is because \nyou are in the company of another insectoid. You want to know, so you ask Nomo.\n\n\"It is neither,\" says Nomo with a sound that resembles a chuckle. \"The Queen has her ways to communicate with its children, She usually does so by the use of pheromones.\n\"\n\n\"But how does she communicate the object. I mean, how does she tell the message relates to me?\" You wonder.\n\n\"It is easy, my friend. You were down there for a while. There was enough time for the Queen to gather a sample of your scent and then include a hue of it in her aroma message.\"\n\nYou instinctively sniff around your armpits. No, you don't give off a bad smell. \"How is that message spread?\"\n\n\"There are numerous ventilation pipes. Their alternative function is to allow the scent to reach the whole hive,\" she says.\n\nThe construction is a big mound with a couple of storeys above ground and who knows how many below the surface. Nomo shows you various hand weapons and fine chitinous \nand metal armour. What attracts your attention are procedures applied to a younger-looking insectoid.\n\n\"What are they doing to him?\" you ask Nomo.\n\n\"They are implanting him an exocrine gland that produces acid. The muscles of the forearm contract and shoot it out.\"\n\n\"Is there any danger for the insectoid?\"\n\n\"Not really unless the chitinous armour is broken.\"\n\n\"Does the Queen have those?\" you ask out of pure curiosity.\n\n\"Yes, she is born with them. A sample of them was taken from Queen Shiera to the bank of spare organs and put the beginning of the artificial development for each of her children.\"\n\n\"Do you use some military technology?\" you ask Nomo.\n\n\"Yes. Some of our enemies use metal melee weapons,this is why some of our warriors have a system of magnets that reduces their speed when they are close.\"\n\n\"That sound like our forcefield technology.\"\n\nNomo seems quite interested in what you just say and you gladly explain what you know about the subject.\n\n\"Do you have the forcefield generation technology on you?\" she asks.\n*page_break\n*if (forcefield>0)\n\t\"Yes, I do.\"You show him the panel on your left forearm. Nomo examines it carefully and asks you to give leave it here for a while so that their engineers could reverse engineer it.\n\t\n\tAgain, you are sitting on a fence. On one hand, you want to help these guys, on the other, leaving your main protection will make you vulnerable.\n\t*choice\n\t\t#Lend them your forcefield device\n\t\t\t\"Alright, just make sure you don't break it. Also, I'd appreciate if you return it to me as soon as possible. Or at least sooner than I need it.\"\n\t\t\t\n\t\t\tNomo promises that their engineers will do their work swiftly and adds that he Queen will be very happy with your decision.\n\t\t\t*set rel_shiera +3\n\t\t\t*set light +2\n\t\t\t\n\t\t\t(Your relations with Queen Shiera increases)\n\t\t\t*goto end_barracks\n\t\t\t\n\t\t#Don't do it\n\t\t\t\"I am sorry, Nomo, I might need that device soon and I don't want to be left unprepared. Perhaps some other time.\"\n\t\t\t\n\t\t\tNomo says she understands but her body language somehow conveys that she is not happy by your decision.\n\t\t\t*goto end_barracks\n\t\t\t\n*else\n\t\"No, I am sorry, I've chosen another technology to put in that slot.\"\n\t\n\tNomo nods, but you can feel she is let down.\n\t*goto end_barracks\n\t\n*label end_barracks\n*page_break\nAfter spending a few more minutes examining the weapons and armour, you decide it is time to go somewhere else.\n*goto hive\n\n*label hatchery\n*set hatchery 1\nThe hatchery is situated almost exclusively underground. Nomo explains that it is necessary to keep the temperature where the eggs are stored within a certain range.\nAlthough from the inside this building does not look very different, the atmosphere is more jovial. It is as if you can feel the countless lives resting comfortably \nwithin thin walls.\n\n\"My guess is that the queen explained to you the way our kind maintains its numbers. Here are the eggs we have,\" explains Nomo.\n\nYou look back and your jaw drops. There are three gigantic eggs. Each of them is as big as your room. They are green and look as if covered by flesh.\n\n\"And this is the egg we hatched from.\" The insectoid points at another one at the end of the chamber. It is not whole - only about a third of it remains. Several other insectoids are there. It seems that they are taking measures with \nsmall devices. It seems that they are not entirely happy with their readings. One of them applies a spray on them. \n\n\"The big egg is full of small individual egglets, each of them containing a brethren of mine. Not all egglets hatch at the same time even though most of them do when the shell of the egg breaks. Once it is broken, however,\nthe unhatched egglets are vulnerable. This is why several variables such as moisture, acidity and calcium are carefully observed.\"\n\nYou step closer and can't help but smile. The egglets are translucent and you can see the tiny insectoids coiled in a way a human foetus would do. They look cute, each as big as your fist.\n\nThe other insectoids seem nervous. You guess it is not because of you, but rather the parameters they take care of, so you decide to make room for them to do their work.\n\nAs you walk towards the exit, you realize something seems amiss.\n\n\"Nomo, this is supposed to be the most important building in the hive right? Why don't we see any warriors in here?\" \n\nShe explains that the aura of the warriors does not have a good influence on the unhatched and points several holes on the ceiling.\n\n\"If the need arises, our warriors would come through there. Expect them to come here any moment now.\"\n\nYou are about to ask why, but as you look toward the entrance, you see why.\n*page_break \nThere are two enormous centipedes. You gaze in awe as you realize was it not for your armour, they could bite you in two with their massive jaws full of dagger-like teeth. \n\nNomo, not being a fighter, takes a step back. The noise behind you tells you that probably the insectoid warriors are already entering through the holes in ceilings.\n\nYou, however, are a soldier and your instincts tell you to help the insectoids one way or the other.\n*choice\n\t#Don't listen to your inner urges. This is not a battle of yours.\n\t\t*set light -3\n\t\t\n\t\tYou look at Nomo, decising it would be best to follow his example. She runs towards the end of the building and away from the battle. \n\t\t\n\t\tAnd it is a furious one. About two dozens of insectoid warriors berserk at the centipedes, bathing them in acid, but it seems the chitinous armour is impervious to it. However, the insides of their mouths is and you see them \n\t\tvirtually disintegrates before your eyes.\n\t\t\n\t\tThe insectoids, however, suffer many casualties. There piles of dead and dying warriors scattered next to the centipedes. Some of them still make chaotic moves despite having lost their heads.\n\t\t\n\t\tIn a few minutes the battle is over and more insectoids, these time workers, come to take the heavily wounded to the infirmary. Queen Shiera also appears.\n\t\tShe looks even more beautiful in the stronger light out in the open despite the worried expression on her face. You guess her heart bleeds for all the death and the suffering her children went through.\n\t\t\n\t\tYour eyes meet for a second and guilt makes you escape their embrace.\n\t\t*set rel_shiera -2\n\t\t\n\t\t(Your relations with Queen Shiera decreases)\n\t\t\n\t\t\"I thought you were a warrior,\" says Nomo to make you feel even worse. You fail to reply.\n\t\t*goto hive\n\t\t\n\t#Bravely step forward to tank\n\t\tA fierce battlecry escapes your throat as you charge the centipedes. One of them rises up, towering you while the other one continues inside. \n\t\t\n\t\tAs quick as a flash, a set of enormous jaws darts towards you and you realize you have no time to dodge.\n\t\t*if (forcefield=0)\n\t\t\tYou, however, have no forcefield to protect you. The battle armour of yours crunches like chips and then comes the pain. A lot of pain, more than you could imagine you could take. And, you are thankful because it only takes a couple of seconds before you sink in the depths of the abyss.\n\t\t\t*goto_scene death\n\t\t\n\t\t*elseif (forcefield=1)\n\t\t\tThe forcefield activates automatically and decreases the speed of the teeth. Unfortunately, it is not enough to stop them. The battle armour crunches and you could feel the razor sharp teeth sinking an inch into your shoulder but this is all the \n\t\t\tferocious bite manages to do to you before the centipede is forced to rise again and prepare for another attack.\n\t\t\t*set forcefield +1\n\t\t\t*set black_dots +1\n\t\t\t*set blood 4\n\t\t\t\n\t\t\t(You gain a black dot. Your expertise with forcefields increases)\n\t\t\t*goto tank_battle\n\t\t\t\n\t\t*else\n\t\t\tThe forcefield activates automatically and decreases the speed of the teeth. You can hear them scratch your battle armour, but they simply lack the momentum to penetrate it. \n\t\t\tThe centipede is forced to rise again and prepare for another attack.\n\t\t\t*goto tank_battle\n\t\n\t#Wait for the insectoid warriors and support them\n\t\tFor a second, you fear that the centipedes wi
