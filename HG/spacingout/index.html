aptures your attention. There a big blob of raging energy standing between you and him. It has something that barely resembles a \nface and you sense the pure ancient evil radiating from it. The creature tries to move in your direction but is immediately stopped by what appears to be a set of chains. And the fact that it can't physically get to you does not make you\nconfident about your safety, as you expect it to be able to perform some sort of a ranged or psychic attack.\n\nLooking at its red eyes you wonder weather you want to assault the creature?\n*choice\n\t#Yes\n\t\tYour first shot starts a violent reaction within the monster. Explosions happen all over the room, some of them hurt you and your team members.\n\t\t\n\t\t\"Please, stop,\" Astra asks you telepathically.\n\t\t\n\t\t\"But why? I just wanted to remove a threat,\" you argue back.\n\t\t\n\t\t\"This is not how things work. This is a very powerful creature and you are only enraging it. Moreover, you are removing an old-time obligation of it not to attack people unless in self-defense. Besides,\n\t\tdidn't I warn you not to attack anything red-eyed?\"\n\t\t\n\t\tIt is only then that you remember. \"Now I do, dear one. I am really sorry.\"\n\t\t\n\t\tYou try to assess the damage done. You and Astra seem to be unharmed, but Valkyrie is using her healing ray to deal with a wound on her thigh and Meatwall is throwing away a useless broken \n\t\tshoulder plate.\n\t\t\n\t\tAt least the beast no longer causes you trouble.\n\t\t*set black_dots +2\n\t\t\n\t\t(You get 2 black dots)\n\t\t*goto black2\n\t\n\t#No\n\t\tSuddenly, you remember Astra's instructions not to attack any entity with red eyes. As difficult as it is for you to follow that instruction, you realize that trusting her is probably\n\t\tthe wisest course of action.\n\t\t*goto black2\n\t\t\n*label black2\n*page_break\n\"And so you have come, dear guests from the military branch I used to be part of,\" Desert theatrically opens his metal covered arms. \"I must admit that you provided me with \nentertainment that I was getting used to missing. Would you like to tell me why you are here?\"\n\n\"I am just following orders, just as soldiers do,\" you reply.\n\n\"And why do you do so? Would it not be better if you are free to do what you want, to be the master of your own destiny? It was not very easy for me to throw away all the laywers \nof the slave's psychology and embrace the power that the technology I discovered could offer me. I could make the next step in the evolution, to be the meta human. So, why would you follow orders again instead of joining me \nin the future that is our birthright?\"\n\nWhat would you reply?\n*choice\n\t#\"I want to be on the side of the good guys.\"\n\t\n\t\tDesert shakes his head. \"If you really believe the army you belong to to represent the good guys, then you are more stupid than I expected. Think of all the pain it has caused, all the oppression of \n\t\tboth its soldiers and outsiders. Just think for a second about your feelings when you think about the man who sent you on this mission, blatantly disregarding your dreams of defending the tournament \n\t\ttitle of yours. There is little good in the institution that you represent. You may have had dreams and followed lies, but I am sure it is long since you were able to see through them.\"\n\t\t\n\t\tYou remain silent, knowing that he is right. He managed to confuse you, which is not good if you are going to meet him in a battle.\n\t\t*set black_dots -1\n\t\t\n\t\t(A black dot has been removed from the count)\n\t\t\n\t\tWould you like to ask him to join him as a meta human?\n\t\t*choice\n\t\t\t#Yes\n\t\t\t\t*goto meta_end\n\t\t\t\t\n\t\t\t#No\n\t\t\t\t*goto black3\n\t\t\t\t\n\t#\"You are a monster, Desert, I have seen the horrors you created in the hive.\"\n\t\t\"Come on, they are just insects. Do you feel guilt when you step on an ant?\"\n\t\t\n\t\t\"They are sentient beings, Desert. The resemblance to earthly species is not an excuse for you to conduct massacres. You are not the good guy you claim to be. But your \n\t\tempty words will not touch me.\"\n\t\t\n\t\t\"Well, I agree that the hybrid they call Shiera is very pretty. But it is because of the human DNA sequences.\"\n\t\t\n\t\t\"Say no more,\" you cross him.\n\t\t*goto black3\n\t\t\n\t#\"Your offer is most generate and I want to accept it.\"\n\t\t*goto meta_end\n\t\n\t\n\t#Nothing, just look at Astra for a recommendation \n\t\t\"Thank you for searching for my voice in this hour,\" Astra says in your mind. \"I can see that he is trying to distract you from your path by telling you half lies.\n\t\tit is true that the technology he obtained by getting his hands on the artifact allowed him to enhance his physical body in ways hard to disregard, it comes at a great price. His \n\t\tbrain has been enhanced too, into one being stripped of all emotions that make him human. It is true that I also use technological means to get that work done, but our kind has always been cautious not to \n\t\tpush in the direction he does, and those who did caused terrible carnage. Those memories are forever engraved on my mind.\"\n\t\t*set rel_astra +1\n\t\t\n\t\t(Your relations with Astra increase)\n\t\t*goto black3\n\n*label meta_end\n*page_break\n\"I can't believe you are doing that,\" Astra shakes her head and a few tears roll down her cheeks. \"Well, there is nothing for me to do here any more,\" she says and looks at the door.\n\n\"Wait for me, please,\" Valkyrie begs her.\n\n\"I also have no intention of becoming a half robotized freak,\" Meatwall announces.\n\n\"It is okay, ${name}, let them go. They don't understand. They are not ready, not being able to appreciate the treasure I could give them. But the important part is that you are.\"\n\nThen, you realize that your friends are no longer there. Astra has taken them away, back to her base. Suddenly, you feel very lonely.\n\n\"Don't be sad, warrior,\" Desert says. \"It is a feeling native to the lower life forms. We will wash it away, right?\"\n\nYou really don't know what to say.\n*page_break\nDays go by in the laboratory. You are being installed various implants and the painkillers that enable you to go on make you dizzy. The memories of your team mates and \nthe others that you ever loved are still there, but the latest implant is affecting the way your brain works. You see those feelings as a surprise, as a mistake that you would rather forget.\n\nThere is a great future in front of you, you believe. Desert tells you that you will live at least three times more than expected and can withstand nine times more physical damage before\ndying of unnatural causes.\n\nAnd yet it is one of the saddest ends to this story.\n*achieve meta\n*ending\n\n*label black3\nYou realize that the time for talk is over. A small tremor in your hands suggests to Astra that you are about to attack. She also probably senses your thoughts about the \ntactics to be employed.\n\n\"Worry not, ${name}, everything will happen so quickly that there will hardly be any room for thought. What happens next will be much more of a function of your past decisions, of how well you and your team are prepared.\"\n\n*if (black_dots-red_dots)\u003c7\n\tYou shoot at Desert but he dodges, quicker than any being you have seen so far. He tries to shoot Valkyrie, but she is alert enough and takes cover under one of the apparatuses.\n\tDesert moves again and this time the healer has to seek shelter behind the tank. Meatwall takes some damage, but it is immediately repaired by Val's ray. Meanwhile, Astra strikes with her sword.\n\tseveral times in just a couple of seconds. Implants fall down on the floor, exposing you vulnerable places to shoot, which you take advantage of.\n\n\tDesert falls on the floor like a bird that had a heart stroke in mid air. It is all over. You look at Astra. She is panting, her sword still raised for another blow. \n\t*goto finitos\n\t\t\n*else\n\tYou shoot at Desert but he dodges, quicker than any being you have seen so far. He shoots at Valkyrie and the healer just fails to react. The laser bolt catches her in the chest, instantly killing her.\n\n\tMeatwall is the next to fall. You and Astra try to take down the man in the exoskeleton but he keeps moving like a fly around a bear, while shooting at the tank with deadly \n\tprecision until nothing remains of him.\n\t\n\tAnd then it is your turn. At least it is not painful...\n\t*goto_scene death\n\t\n*label finitos\n*if (rebel)>55\n\t*achieve rebel \n\t*goto finitos2\n\t\n*elseif (rebel)\u003c45\n\t*achieve conformist\n\t*goto finitos2\n\t\n*else\n\t*goto finitos2\n\t\n*label finitos2\n*if (light)>57\n\t*achieve light\n\t*goto finitos3\n\t\n*else\n\t*goto finitos3\n\n*label finitos3\t\n*page_break\nAfter you all manage to catch your breath, Astra points at what appears to be a glass over which there is the artifact. It looks exactly the same as the one you retrieved from the hive.\n\n\"Thank you very much for all you did. I am sure there are a lot of obnoxious activities performed in this facility, a lot more souls to be saved. I will ask for reinforcements to do that. I am afraid that \nwhat we may find out is too traumatic even for warriors like you. Besides, you played your role very well, dear ones. You have a reason to be proud of who you are. Now we are going back to my base. Feel free to take a bath and relax. \nMeanwhile, think about what you want to do with your life from now on. I guess there may be some options available that I can make real. While you do that, I will make sure that this timeline becomes permanent. Remember that you all died in the main one?\"\n*page_break\nYou follow Astra's instructions. A table full of delicious food awaits you back in the room and the bath is really relaxing, once you figure out how it operates. Valkyrie goes in first, as a lady. You are the last, so you have more time to spend with the remains of Innovation.\nUnfortunately, she is still not ready to be switched on.\n\nAfter the bath you get into one of the beds and fall asleep very quickly and although your dreams are very vivid, you wake up relaxed. Valkyrie and Meatwall are around the table, discussing if they left enough food for you or not.\nYou engage in small talk, although you know that inside everyone is thinking about what to do in the future. Nobody brings the topic up and you realize that this is a sign of a lack of desire for the team to continue as such.\n*page_break\nIn the morning, Astra appears, looking quite tired. \"I spent the night in the facility and discovered some horrific things going on. Luckily, all the victims of abuse have been sent to receive healing by my people. Things are changing for the better, mostly because of your bravery.\" She gives you a big smile.\n\"Have you decided what to do with your lives?\" She nails the question.\n\nMeatwall and you look at Valkyrie, expecting her to speak first. You are not sure if that is exactly a gesture of chivalry. The healer blushes, but is quick to speak. \"I have always wanted to be a paramedic. I still do and I think the time has come to follow my heart.\nUnfortunately, I don't think the military would just let me go.\"\n\n\"Don't worry about that. I will send you to a timeline where the military knows nothing about you, on another version of the Earth.\"\n\n\"Thank you, Astra.\" The eyes of the healer fill with happy tears.\n\n\"What about you, big boy?\" Astra asks the tank.\n\n\"I have seen you in battle, you are far superior than any I have seen. I want to learn more about your ways of conducting the art of war.\"\n\n\"Okay, my sister is a commander of a military unit. It won't be the first time I send her new recruits.\"\n\nMeatwall remains speechless, unable to express his gratitude.\n\nWhat would be your choice? it may be the time for you to think of the matters of the heart.\n*goto heart\n\n*label heart\n*choice\n\t*selectable_if (rel_astra>10) #Ask Astra to stay with her\n\t\t\"Astra, can we speak in private, please?\" you ask her.\n\n\t\t\"Sure.\" She smiles as you go to the other room.\n\t\t\n\t\t\"It is a bit hard for me to speak about it,\" you say with a trembling voice.\n\t\t\n\t\t\"You can not tell me anything I didn't know,\" she assures you.\n\t\t\n\t\t\"Really?\" you gasp.\n\t\t\n\t\t\"Yes.\" She nods. \"The way you look at me... You thoughts betray you.\"\n\t\t\n\t\t\"So, I have spoken in silence?\"\n\t\t\n\t\tShe nods again. \"You did, dear one, and I am sorry that my answer to that question will not be the one you desire to here and yet it is the one serving your best interest. So this is the one I should give give you. You see, #{name},\n\t\tI am not really what you would call available. I have a twin soul and while our arrangement allows for certain transgressions for the sake of gathering experience, none of them could last long. Even if we have the affair that you are almost \n\t\tproposing, you will get hurt... and I wouldn't like to get to that phase. Do you get what I tell you?\" She looks at you with a worried expression.\n\t\t\n\t\t\"I understand.\"\n\t\t\n\t\t\"You don't, dear one, but you will, eventually. I suggest we got back to the room and you take another course of action. And in case you want to know, you are hot as hell.\"\n\t\t\n\t\tYou laugh.\n\t\t*achieve denial\n\t\t*goto heart\n\t\n\t*selectable_if (rel_val>13) #Offer Valkyrie to go with her\n\t\t\"Valkyrie, can we speak in private, please?\" you ask her.\n\n\t\t\"Sure.\" She smiles as you go to the other room.\n\t\t\n\t\tYou take her hands and look her in the eye. \"Val, I realized that I can't really let you go. I could not tell you, but there were times when the only reason for me to wake up \n\t\twas to see your smile. And now knowing that it is about to end... I can't let you go. I can't.\" You realize that there is a lump in your throat and tears are running free.\n\t\t\n\t\tShe just puts her finger on your lips, as if you could continue speaking. And gives you a kiss to die for...\n\t\t*page_break\n\t\t(6 months later)\n\t\t\n\t\tYou pick up the news paper and the faint smile turns into tears blurring your vision. \"Paramedic saves the lives of at least a dozen of people in a chain crash.\"\n\t\t\n\t\tYou are so proud of her, of everything that she is, of the fact that she is living the dream she had been working on her entire life. You are so happy that you are here with her and able to share her joy.\n\t\t\n\t\tAnd here she is, coming to join you for your lunch break. Her hair looks slightly unkempt, but that does not prevent her from looking very beautiful.\n\n\t\t\"I am sorry my love, we just had an emergency...\"\n\t\t\n\t\t\"Say no more.\" You take her hand and pull her closer to you...\n\t\t*achieve val\n\t\t*ending\n\t\t\n\t*selectable_if (rel_meat>9) #Declare your desire to be with Meatwall\n\t\t\"Meatwall, can we speak in private, please?\" you ask her.\n\n\t\t\"Sure.\" He smiles as you go to the other room.\n\t\t\n\t\tYou take his hands and look her in the eye. \"Meatwall, I realized that I can't really let you go. I could not tell you, but there were times when the only reason for me to wake up \n\t\twas to see your smile. And now knowing that it is about to end... I can't let you go. I can't.\" You realize that there is a lump in your throat and tears are running free.\n\t\t\n\t\tHe just puts his finger on your lips, as if you could continue speaking. And gives you a kiss to die for...\n\t\t*page_break\n\t\t(6 months later)\n\t\t\n\t\tYou run a few meters behind Meatwall, looking around for threats, occasionally having to shoot at the 9-feet tall reptilians who happen to dare show their heads.\n\t\t\n\t\t\"We are within range, assembling the disintegration beam,\" he says and removes the pack from his back. \"Cover me, #{name}.\"\n\t\t\n\t\t\"With pleasure.\"\n\t\t\n\t\tA moment later you hear a series of explosions. You turn around and the expression on Meatwall's face is something you would never forget. That sense of accomplishment, the living of a dream to the fullest.\n\t\tAnd the fact that you are with him, able to share his joy makes you feel amazing.\n\t\t\n\t\tHe walks past you, giving you a quick hug that makes your heart melt even through all the layers of armour that separate you... right now.\n\t\t*achieve meat\n\t\t*ending\n\t\t\n\t*selectable_if (rel_shiera>15) #Decide to join the hive of Queen Shiera \n\t\t\"Astra, can we speak in private, please?\" you ask her.\n\n\t\t\"Sure.\" She smiles as you go to the other room.\n\t\t\n\t\t\"I have feelings for Shiera,\" you say blushing after you close the door.\n\t\t\n\t\t\"This is very good. She is a lovely person and she deserves some loving. It must be pretty lonely to be kind of one of a kind.\"\n\t\t\n\t\t\"Do you think I have my chances with her?\" you ask her, full of hope.\n\t\t\n\t\tShe gives you a big smile. \"I would not speak for her, but I think you should go to her hive and speak to her.\"\n\t\t*page_break\n\t\tThe insectoids pay no attention to you as you go down the tunnels and into the Queen's chambers.\n\t\t\n\t\t\"${name}, what a good surprise! I did not expect to see you again... but I hoped.\"\n\t\t\n\t\t\"You did?\" You take her hand and take it to her lips, gently kissing the finger tips.\n\t\t\n\t\tShe nods, hypnotized by your presence.\n\t\t\n\t\t\"I came to tell you that I want to spend my lifetime with you, loving you.\"\n\t\t\n\t\t\"You do? You want to be among the insectoids? Are you sure.\"\n\t\t\n\t\t\"I want to be with you. It is that simple.\" You pull her close to you and hug you. The sweetness of her aroma makes you slightly dizzy.\n\t\t\n\t\t\"But we may not be biologically compatible...\" she says before you make her shut up with a kiss.\n\t\t\n\t\t\"We will see,\" you mutter during one of the pauses.\n\t\t*achieve shiera\n\t\t*ending\n\t\t\n\t#State that you want to explore the universe\n\t\t\"You have the full starter set,\" Astra announces as she shows you the beam ship. \"It is all yours. You have a navigation system, supplies, a direct com link to me just in case you need my recommendations or just to have a chat.\"\n\t\t\n\t\t\"Thank you very much, dear one.\" You give her a quick hug. \n\t\t\n\t\tVal and Meatwall are there to wish you the best of luck as well.\n\t\t\n\t\tThe flying saucer gets up in the air and the beam teleports you inside.\n\t\t\n\t\tYou take a deep breath and look at the map of the universe. So many places to explore...\n\t\t*achieve space\n\t\t*ending\n\t\n\t#Stick to your mission and return to the army's high commanded\n\t\t(10 years later)\n\n\t\tYou see yourself in the mirror and can barely recognize your own refection. There are many medals on your uniform, but none of it can replace all the love lost. The army calls you a Colonel now, a \n\t\tcommander and yet you feel like a slave of a malevolent will. They expect you to deliver a speech but they don't want the voice of your reason. They require the one of the puppet in their arms.\n\n\t\tYou want to cry but you can't. The only thing that is left for you is the intense feeling of regret for decisions (not) taken back in time.\n\t\t\n\t\t*achieve colonel\n\t\t*ending ", "hive": "The morning comes and you feel your stomach tied in a seaman knot. It will be the first real military operation of you and your team.\n\nYou are nervous because...\n*choice\n\t#You fear you won't be able to look yourself in the mirror after all the atrocities you may have to commit today \n\t\tYou are beginning to question your career as a soldier. You hope that you will somehow be able to make the right decision while incurring the minimum amount of violence.\n\t\t*set light +5\n\t\t\n\n\t\t*goto hive1\n\t\t\n\t#You fear you may not lie up to the expectations of your team\n\t\tYou have to remind yourself that neither Valkyrie nor Meatwall ever expressed open discontent with your decisions as a leader of the team, which is something rare, according to rumours.\n\t\t\n\t\tInnovation... well, she is programmed to be analytical but not critical.\n\t\n\t\tWell, maybe these guys have a reason to trust you. You actually know they do.\n\t\t*goto hive1\n\t\n\t#You fear one of your team members may get hurt\n\t\tYour feelings are induced by your love towards your team mates, which, you tell yourself, is something normal you should be feeling. You even try to tell yourself that it is good that \n\t\tyou have these thoughts.\n\t\t*set light +3\n\t\t\n\t\t\n\t\t*goto hive1\n\t\t\n\t#You fear nothing, you are ready to kill whoever stands in your way\n\t\tYou are a brave bloodthirsty soldier!\n\t\t*set light -5\n\t\t\n\n\t\t*goto hive1\n\t\t\n*label hive1\n*page_break\nGetting out of your case, you see that Astra has already prepared breakfast and is waiting at the table.\n\n\"Morning, Astra,\" you greet her. \"You would make an excellent housewife.\" Of course, you realize the stupidity of that statement the moment it leaves your lips, but you guess you are not \nfully awake. \n\nShe, however, laughs. \"Thank you, ${name}, morning to you as well. Maybe I should tell you how I do this.\" She goes to one of the devices in the room. It resembles a microwave oven.\n\n\"Now, is there something you would like to have?\" She asks.\n\n\"Blackberry muffin,\" you say readily. \"Please,\" you say fighting the rapid salivation.\n\nAstra thinks for a second.\n\n\"I downloaded some recipes from Innovation's software but I am still not confident in trying them out, so I had to scan your mind to get a better understanding of what you want.\"\n\n\"Er, did you see anything else up there?\" you ask confused.\n\n\"Only a couple of good memories related to eating muffins. I sense a strange vibration in you, what is it?\"\n*choice\n\t#\"I feel that these experiences bring us closer together.\"\n\t\t*set rel_astra +2\n\t\t(Your relations with Astra increase by 2)\n\t\t\n\t\t\"That is one of the benefits of telepathy. The people involved get closer together. There was an author in your past that came across a similar notion. His name is Joe Haldeman and \n\t\the won quite a few rewards for his most famous work.\"\n\t\t*goto hive2\n\t\t\n\t#\"I don't want you to ever scan my mind again!\"\n\t\t\"I am sorry, ${name}, I did not want to step into a forbidden zone. All I wanted is to be able to make you the muffin you wanted.\"\n\t\t\n\t\t\"I understand, Astra. So far, you've been so kind and helpful. But still, scanning my mind is something I am not comfortable with and so I kindly ask you to \n\t\tstop doing that. It is not something I am used to,\" you explain.\n\t\t\n\t\t\"Thy wish be done.\"\n\t\t*set rel_astra -2\n\t\t\n\t\t(Your relations with Astra decrease by 2)\n\t\t*goto hive2\n\t\t\n\t#\"Nothing special, let's get to the muffin, please\"\n\t\t\"Sure thing\"\n\t\t*goto hive2\n\t\t\n*label hive2\n\"Astra, dear, that muffin is breathtaking!\" you exclaim with a full mouth.\n\n\"I must warn you, however, that it is not among the healthiest foods I can think of.\"\n\n\"Yeah, otherwise it would have been in Innovation's cooking book. See, the tin lady is much influenced by Valkyrie, and the healer, as you may expect, is quite strict when it comes to healthy nutrition.\"\n\n\"That is why she herself looks so good, doesn't she?\" Astra smiles.\n\nHow do you reply?\n*choice\n\t#\"There is no doubt about it.\"\n\t\tAstra laughs and the sparkles in her blue eyes make you suspect she is going to tell Valkyrie what you just mouthed.\n\t\t* set rel_val +1\n\t\t\n\t\t(Your relations with Valkyrie increase by 1)\n\t\t*goto hive3\n\t\t\n\t#\"Yes, but you look better.\"\n\t\t\"You are such a flatterer,\" Astra replies. \"I didn't really see that statement coming, I just meant to emphasise the importance of quality nutrition.\"\n\t\t\n\t\t\"I thought you were a telepath,\" you remark.\n\t\t\n\t\t\"Apparenty not a good one,\" she winks at you.\n\t\t*set rel_astra +1\n\t\t\n\t\t(Your relations with Astra increase by 1)\n\t\t*goto hive3\n\t\t\n*label hive3\n*page_break\nValkyrie and Meatwall wake up simultaneously and you assume Astra did something to break their dream. They both seem to be quite hungry and happy that the hostess has taken care of their \nbreakfast. The tank seems to be firm and composed. You hope that it is not a mask. But, this is the Meatwall you've always known. Keeping cool is one of the most important tasks for those playing the \nrole he's chosen.\n\nValkyrie, on the other side, seems anxious. Astra sits close to her and plays with her hair while she's having breakfast. You bet that your saviour is virtually programming the thoughts of the healer so that \nshe will be ready for what awaits you.\n\nWhen you finish with the breakfast, you don your battle armours and go out, shortly followed bt Meatwall and Valkyrie. Queen Shiera is already there, her chitinous shell looking so smooth and sparkling in the morning sun. Next to her, you see Nomo, who \nprobably came in to see her majesty off.\n\n\"My beam ship will take you to the hive. Good luck, soldiers,\" says Astra.\n\nThe flying saucer comes from somewhere and you are not sure whether it appears out of thin air or just flew at a lightning speed. It hovers above you and the familiar beam of light engulfs you and teleports you inside. You are surprised that \nit seems so spacious there. The floor is translucent and you can see the landscape below you.\n\nSuddenly, it gets quite dark, probably because you enter an area that is cloudy. The very same beam teleports you back to the surface and flies away.\n*page_break\n\nYou look around. It appears to be the surface of a hive just like Queen Shiera's. However, there are a lot of insectoid bodies lying around.\n\nIt is not long before you are approached by a group of insectoids.\n*page_break\nThere are four of them and they look similar to the subjects of Queen Shiera, but their chitinous armour has an unhealthy rusty colour.\n\n\"Who are you to come here?\" says the largest specimen.\n\n\"My name is Shiera and I am a hive Queen.\"\n\n\"You don't look like one of us,\" the insectoid replies.\n\n\"My genes have been modified prior to my hatching. Can't you feel the presence of a Queen?\" Shiera is getting impatient.\n\n\"The title has little meaning to us now. We serve a master. It is His name that we cherish, not some old traditions.\"\n\n\"You serve? A man? What has happened to you since your Queen perished?\"\n\nMeatwall whispers something in Valkyrie's year and you bet you can hear it too: \"These guys are freaking sexists.\"\n\nValkyrie nudges him in the ribs.\n\nShiera continues:\"I understand that you exercise what may be your free will, but for the sake of mercy, why don't you burn the corpses of our brethren lying about.\"\n\nThe rusty one chuckles. \"You refer to the belief that a part of the soul remains in the chitinous armour. We do share this belief. However, when pleading our services to the master, part of our souls were lost. The \nmaster is working on a method to extract the soul particles from those shells and make our souls complete.\"\n\nQueen Shiera's body language shows extreme discomfort. She shivers and tears make their way down her beautiful face. The blades come out and a few drops of acid drop on the ground with a hiss.\n\n\"You are abominations, an insult to what our race stands for,\" she shrieks.\n\n\"Have you looked yourself in a mirror? If not do so. You might find that the abomination is you. So, what are you going to do? Attack us? We are just emissaries. The traditions say that we should not be touched\nbecause we are ones who bring understanding between parties.\"\n\nYou somehow know that the last words of the emissaries do not get to the Queen's brain. You expect her to attack any time soon. \n\nWould you try to stop her?\n*choice\n\t#Yes, of course\n\t\t\"Shiera, dear, you don't want to do this.\"\n\t\t\n\t\tYou bet she doesn't hear you, so you step up and touch her shoulder. Her reaction is immediate, swiping in your direction but her aim is not to harm you, but only to remove your hand.\n\t\t\n\t\tHer eyes are filled with hatred that prevents her from seeing clearly who you are. Slowly, she returns to her senses.\n\t\t\n\t\t\"You should not direct your anger towards those creatures. They are the victims of what happened here, not the cause of it.\"\n\t\t\n\t\tQueen Shiera sighs. \"You are right, ${name}, I was blind with... pain. I am a Queen and it is hard for me to take this degradation of my kind easily.\"\n\t\t\n\t\tHer blades retract.\n\t\t*set rel_shiera +2\n\t\t\n\t\t(Your relations with Queen Shiera increase by 2)\n\t\t\n\t\t\"That was a wise move of your side, strange one calling yourself a Queen. Your avoidance of violent action may pave the way for a future friendship.\"\n\t\t\n\t\t\"Does it mean we can go down the lower levels of the hive?\" Shiera inquires.\n\t\t\n\t\t\"No, you are still not welcome here. The Master has not given you permission to do so and I highly doubt that you are currently worthy of his time. As I implied \n\t\tearlier, he is busy. You can try next month,\" the emissary says.\n\t\t\n\t\t\"We don't have that time,\" you protest. That would eliminate any hope of you participating in the tournament and defending your title there.\n\t\t\n\t\t\"Then, venture down at your own risk. While we are not fit for fighting, I am sure that you will encounter creatures that will put your lives in grave danger.\"\n\t\t\n\t\t\"I am not willing to wait either,\" says Queen Shiera. \"Now that I know what fate befell my brethren in this hive, I must find a way to repair things.\"\n\t\t\n\t\t\"Then I wish you bad luck,\" says the emissary. \"Now, if you'd excuse us, we have work to do in the name of our Master, glory to his name.\"\n\t\t\n\t\tThe group of rusty insectoids disappears in a tunnel below the ground.\n\t\t*set rusty_aggression -1\n\t\t\n\n\t\t*goto hive4\n\t\t\n\t#No, it is better to help her\n\t\tAs soon as she leaps towards the emissaries you raise you forearm and shoot too. Meatwall steps ahead and turns his forcefield on, ready to absorb some damage.\n\t\t\n\t\tThe head of one of the insectoids falls on the ground (it is not the one who spoke to you). And then time stops, at least for your team and Shiera.\n\t\t\n\t\t\"Oh, you calling yourself a Queen, I hope the understanding of what you just did haunts you until your final hour. My sisters and I will take the body of the fallen one and make sure \n\t\tthe soul contained within is used properly. Know that if any of us was a simple warrior, you would be dead. However, don't assume that us keeping you alive is a sign of weakness.\n\t\tIf you dare come down the tunnels of the hive, you are not likely to survive for long. Also, know that you action today make the potential peace between our hive and yours far less likely.\"\n\t\t*set rusty_aggression +1\n\t\t\n\t\tThe insectoids take the body of their comrade and disappear down into the subterranean part of the hive. You find yourself able to move again and you see your friends do the same.\n\n\t\tQueen Shiera falls on her knees, obviously in shock.\n\t\t\n\t\t\"Oh my... what have I done?\" she whispers. \"She was right, I am going to be sorry for what I did until my very last day. I killed an emissary that would do no harm to me.\" Queen Shiera \n\t\tturns to you. \"You should have stopped me.\"\n\n\t\t\"Why would you say that? You are the one who attacked first,\" you defend yourself.\n\t\t\n\t\t\"It is true but... you are a human. I am so used to having Astra by my side and helping me take control of myself.\"\n\t\t*set rel_shiera -2\n\t\t\n\t\t(Your relations with Queen Shiera decrease by 2)\n\t\t\n\t\tValkyrie hugs Shiera and in a few minutes the Queen is visibly better. It seems that the healer can somehow soothe not only the body but the psyche as well.\n\t\t\n\t\t\"Are we ready to venture down there?\" you ask.\n\t\t\n\t\t\"I am not willing to wait,\" says Queen Shiera. \"Now that I know what fate befell my brethren in this hive, I must find a way to repair things.\"\n\t\t*goto hive4\n\t\t\n*label hive4\nYou venture down the tunnel where you saw the emissaries disappear.\n\n\"Shiera, I like your hive more. It smells so much better,\" you note.\n\nThe Queen doesn't respond, only continues to step ahead. The poisonous green glow coming from the walls of the tunnel make her armour glimmer in a strange way. Suddenly, she stumbles and falls. You take her by the shoulders and lift her up. She feels so fragile, so delicate in \nyour hands covered by the metal of your battle gear.\t\n\n\"Are you alright, Shiera?\" you ask.\n\n\"I need to be,\" she whispers. \"The experience I am going through now is emotionally overwhelming. I can rise a mental shield around me to make me feel better, but I want my senses to be keen in order to be helpful.\"\n\nWhat would you advise her?\n*choice\n\t#Tell her that her safety is more important\n\t\tShe looks you in the eyes, her black pearls going deep inside your soul.\n\t\t\n\t\t\"Do you really care about me?\"\n\t\t*choice\n\t\t\t#\"Don't take it on a personal level. My priority is team survival and completion of the mission.\"\n\t\t\t\t\"Fair enough,\" she says and continues ahead.\n\t\t\t\t\n\t\t\t\t*goto hive5\n\t\t\t\n\t\t\t#\"I care about all members of my team and that seems to currently include you.\"\n\t\t\t\tShe quickly turns around so that you don't manage to see her expression, but you see a hint of a smile. Then, she moves ahead.\n\t\t\t\t*set rel_shiera +1\n\t\t\t\t\n\t\t\t\t(Your relations with Queen Shiera increase by 1)\n\t\t\t\t*goto hive5\n\t\t\t\n\t\t\t#\"I do.\"\n\t\t\t\tThose two words resonate into her eyes and then reflect back at you, making you feel warm inside. She seems unable to envelope her feelings in words, so she just nods and continues.\n\t\t\t\t*set rel_shiera +2\n\t\t\t\t\n\t\t\t\t(Your relations with Queen Shiera increase by 2)\n\t\t\t\t*goto hive5\n\t\t\t\t\n\t\t\t\n\t#Tell her to follow her inner voice\n\t\tShe nods and continues ahead.\n\t\t*goto hive5\n\t\n\t#Tell her to pull the hell of herself together\n\t\tHer eyes glimmer, a silent expression of suppressed rage. Then, she just continues forward.\n\t\t*set rel_shiera -2\n\t\t\n\t\t(Your relations with Queen Shiera decrease by 2)\n\t\t*goto hive5\n\t\t\n*label hive5\n*page_break\nQueen Shiera suddenly stops and rises her hand as if asking for silence.\n\n\"I hear a hatchling calling for help. It is a unique communication protocol that can only be sensed by a Queen. I believe it is coming from that direction,\" she points to the left.\n\n\"There seems to be a junction right ahead, so I guess we can reach it,\" you say.\n\nThe new tunnel is a lot more narrow and you are starting to feel a little bit claustrophobic. Meatwall's armour clinks into yours from time to time, the tank not \nbeing used to being in the rear.\n\nQueen Shiera suddenly stops. \"There is danger ahead.\"\n\nYou look carefully in front of you but you notice nothing suspicious.\n\n\"That crack over there that encompasses the whole floor, it is actually a slot from where the fangs of a blood sucker come out. You see, there is even the slant to allow all the blood spilt in this area to go down the crack.\" Shiera looks at the upper\npart of the tunnel. \"Oh, my dear, this one has two jaws,\" she points at something above.\n\n\"What kind of a creature is that?\" you ask in dismay, unable to even imagine what she is talking about.\n\n\"A very ugly one,\" she answers.\n\n\"Man, how did you detect him?\" asks Meatwall.\n\n\"The hive is a living spirit of a sort. No impostor can remain hidden for long. And, one of my special skills is listening.\"\n\n\"Can we kill him?\" Meatwall asks. \"I guess whatever it is, we can destroy it with our laser guns.\"\n\n\"No, we will attract too much attention. Besides, we can end up covered by rubble,\" says the Queen. \"There should be a weak spot somewhere over there, but I would need to find it.\"\n\nShiera steps forward, carefully edging towards the crack. A total of six swordlike teeth comes out of the crack - four from below and two from above.\n\n\"Shiera!\" Valkyrie grabs her hand. You believe that if she continues to squeeze it she may eventually break it.\n\n\"It is alright, I just needed to make sure how long the teeth are so I can jump between them.\"\n\n\"But if you stick in the middle, you may be cut in half,\" you say.\n\n\"That is right, but it is a risk I should take. I am the lighter one. Nobody else would be able to do that.\"\n\n\"Maybe Meatwall or I should cast a forcefield on you, just in case,\" you offer.\n\n\"No,\" she shakes her head. \"It will make me clumsier and the monster will be able to locate me more easily,\" Queen Shiera seems firm about that.\n\nShe steps back and then launches herself forward rolling herself mid-air just between the cracks. The swords come out with the twisted desire to pierce her armour.\n\nFor a second, you are not sure if she will e able to make it. \n\nWill you cast a forcefield around her?\n*choice\n\t#Yes\n\t\tYou are acting on instinct, not being able to imagine what would happen if the fangs reach Queen Shiera. Her body is encased in a field of dense energy.\n\t\t*set forcefield +1\n\t\t\n\t\t(Your forcefield mastery increases)\n\t\t\n\t\tUnfortunatley, just like she expected, a few more fangs come out of the crack. One of them cuts her thigh. The chitinous cover cracks and the tip of the fang slices below it, \n\t\tcausing a fountain of greenish liquid to spring from it. The monster howls as the blood of the Queen rolls down the crack. It is hard to say if it is filled with pleasure for having tasted it\n\t\tor regret that the lithe woman escaped its reach.\n\t\n\t\tValkyrie doesn't hesitate to send a cloud of nanobots to take care of Shiera's wound. It takes a dozen of seconds to make her flesh and chitin anew. \n\t\t\n\t\tShe looks around, searching for something on the walls. When she discovers that her eyes can't help her much, she runs her fingers on the rocky surface. Her blades come out and she\n\t\tthrusts them deep inside. You awe as they sink as if into yellow cheese.\n\t\t\n\t\tA deafening roar comes from the crack and a dark fluid starts dropping from above. The fangs protrude again, this time lifeless.\n\t\t\n\t\tQueen Shiera walks towards you like a fashion model on a catwalk. Her eyes are set to kill.\n\t\t\n\t\t\"${name}, what the hell was that? Didn't I tell you not to do that?\"\n\t\t\n\t\tYour cheeks get red and you are happy that she can't see that through your helmet.\n\t\t\n\t\t\"Whatever I say now, it would look stupid,\" you reply.\n\t\t\n\t\t\"Look, this time nothing bad happened, but if you are not able to trust me, then there is no sense of all of you being here. You may be of less use to the mission than if you \n\t\tare not here at all. Remember what Astra told you?\"\n\t\t\n\t\t\"Yes, Shiera, I am sorry,\" you mutter.\n\t\t\n\t\tShe says nothing, just walks down the corridor. Behind you, Valkyrie whispers Meatwall that Queen Shiera gives her the creeps.\n\t\t*set rel_shiera -2\n\t\t\n\t\t(Your relations with Queen Shiera decrease by 2)\n\t\t*goto hive6\n\t\n\t#No\n\t\tYour heart nearly sinks as the tips of the fangs almost connect with Queen Shiera's thighs. But, her leaps seems immaculate to the last detail and she easily rolls on the other side of the living contraption.\n\t\t\n\t\tShe looks around, searching for something on the walls. When she discovers that her eyes can't help her much, she runs her fingers on the rocky surface. Her blades come out and she\n\t\tthrusts them deep inside. You awe as they sink as if into yellow cheese.\n\t\t\n\t\tA deafening roar comes from the crack and a dark fluid starts dropping from above. The fangs protrude again, this time lifeless.\n\t\t\n\t\tShiera waves you to follow her down the corridor. You hear Valkyrie whisper Meatwall that Shiera is so bad-ass. You can't deny that the tall blonde is quite right.\n\t\t*goto hive6\n\t\t\n*label hive6\nAs you proceed, the corridor changes. It gets even more narrow but high. Queen Shiera walks ahead and you stick to your choice to be behind her despite Meatwall's protests that \na tank should always be ahead. Instead, you ask him to be behind, explaining that danger can come from that direction as well. He responds that he will be glad to cover Valkyrie's assets. The \nblonde gives him a questioning grimace and he has to explain that he wanted to make an awkward compliment.\n\t\t\n\"Real men like Meatwall are better at being heroes and waving guns than putting words one after another,\" you explain in an effort to reduce the friction. Valkyrie remains silent, but\ncracks a smile. You know that even if those two like to pretend to have a problem, they are good friends.\n*page_break\nA large rock suddenly crumbles from the floor. It is right above Queen Shiera, but outside of her periphery vision. You guess that it will not do too much damage to her, but still you want to \nprevent that from happening.\n\t\t\nWhat do you do?\n*choice\n\t#Push her ahead, risking taking the damage yourself\n\t\tYou leap ahead and push her, hoping that the extra power the battle armour gives you will not hurt her. Queen Shiera virtually flies ahead but manages to spin around and reduce the speed before hitting the floor.\n\t\t\t\t\n\t\tThen comes the rock. It feels like having the epicentre of an earthquake inside of your head. Your legs just refuse to do their job and you find yourself on your fours. Luckily, Valkyrie is ready \n\t\tto send a bunch of nanobots inside you to make sure you heal in no time.\n\t\t\t\t\n\t\t\"I was about to desire to slice you to pieces before I realized what you were actually doing,\" says Queen Shiera. \"Thank you, ${name}. Sometimes you manage to summon the damsel in me\n\t\tand this is something that happens very rarely.\"\n\t\t\t\t\n\t\tYou watch with pleasure the glow in her black eyes as she comes closer and offers you her hand. You grab it and pull it closer, trying to simulate kissing her hand, which is very difficult\n\t\tbecause you have your helmet on.\n\t\t\t\t\n\t\tShe laughs. \"You are so funny. Astra showed me a retro video of guys doing that with women. I just didn't think I would ever have the honour.\"\n\t\t*set rel_shiera +3\n\t\t\t\t\n\t\t(Your relations with Queen Shiera increase by 3)\n\t\t*goto hive7\n\t\t\t\t\n\t\t#Create a forcefield on her in order to absorb the impact\n\t\t\tHer body tenses as the forcefield engulfs her just a second before the rock would touch her. It never happens as it rumbles to pieces when it touches the forcefield.\n\t\t\t\n\t\t\tQueen Shiera looks startled and it takes her some time to realize what just happened. \"Thank you, ${name}. Sometimes you manage to summon the damsel in me\n\t\t\tand this is a rare occurrence.\"\n\t\t\t\n\t\t\tYou watch with pleasure the glow in her black eyes for a while, then she turns her back and continues down the tunnel.\n\t\t\t*set forcefield +1\n\t\t\t*set rel_shiera +1\n\t\t\t\n\t\t\t(Your relations with Queen Shiera and forcefield mastery increase)\n\t\t\t*goto hive7\n\t\t\t\n\t\t#Prepare your healing gear to help her recover from th impending injury\n\t\t\tThe rock hits the back of her head with an ugly thump and knocks her out. She barely manages to get her hand to the place of impact. Your healing gear is already on and her suffering \n\t\t\tcontinues only a couple of seconds.\n\t\t\t\n\t\t\tShiera seems completely taken aback by what just happened but it is not long before she comes back to her senses. \n\t\t\t\n\t\t\t\"Thank you, ${name}!\" She seems unable to say much more, so she continues down the tunnel.\n\t\t\t*set healing +1\n\t\t\t\n\t\t\t(Your healing mastery increases by 1)\n\t\t\t*goto hive7\n\t\t\t\t\t\t\t\t\t\n\t\t#Shoot at the rock with your rifle\n\t\t\t*set shotgun +1\n\t\t\t\n\t\t\t(Your mastery with the fan mode of your gun increases)\n\t\t\t\n\t\t\tQuick as a lightning, you raise your hand, turn the short range device on and fire, making the rock turn into a rain of sand that falls on her hair.\n\t\t\t\n\t\t\tShiera looks startled and it takes her some time to realize what happened.\n\t\t\t\n\t\t\t\"You look so beautiful with that white dust in your hair,\" says Valkyrie. \"It is like a Christmas tree.\"\n\t\t\t\n\t\t\t\"What is a Christmas tree?\" asks the Queen while trying to remove the dust.\n\t\t\t\n\t\t\t\"I will show you when I have the time,\" you promise.\n\t\t\t\n\t\t\t\"Thank you very much for what you just did,\" she says with a warm glow in her beautiful black eyes. \"You saved me from a lot of pain.\"\n\t\t\t\n\t\t\tYou try to make a serious face but simply can't help but smile.\n\t\t\t\n\t\t\tShiera waves her mane in a final effort to make the dust fall, then continues down the tunnel.\n\t\t\t*goto hive7\n\t\t\t\n*label hive7\nThe tunnel suddenly becomes vertical. You look up, trying to figure out what is up there. Your eyes don't see an end.\n\n\"She is up there!\" Queen Shiera points at a crack situated about five meters above you. \"The hatchling seem to be injured and in a state of lethargy but her mind is not \ncompletely dormant.\" She massages her temples. \"This is very strange, she is calling your name, ${name}.\"\n\n\"Wow, why?\"\n\n\"I bet we will find out. Maybe Astra will be able to shed some light when we meet her next. Now the question is how to get to her.\"\n\nYou scratch your helmet near the beard. Valkyrie laughs. You are almost sure Meatwall is about to joke and barely restraining himself.\n\n\"What if we make her come down?\" you suggest.\n\n\"Or maybe if you make a few holes I will be able to put my feet and fingers there and climb up. We will have to make the crack bigger,\" Queen Shiera offers.\n\n\"Maybe we should heal her so that she may be able to go down by herself. I know insects are good at walking on vertical surfaces,\" says Valkyrie.\n\n\"Or, if you manage to wake her, a forcefield around her will prevent her from taking damage.\" The tank makes his suggestion.\n\n\"Whatever you choose, ${name}, I think you should be the one to take the action. That little creature is craving for your attention.\"\n*choice\n\t#Ask Queen Shiera to try to wake her up and make her come down and prepare your forcefield gear\n\t\tThe Queen nods and closes her eyes, trying to concentrate. \"The poor thing does not want to wake up. She says her body is so wasted that she doesn't want to come online.\"\n\t\t\n\t\t\"Should I consider any of the other options?\" you ask.\n\t\t\n\t\t\"No, give me just a minute more, I think I will be able to persuade her. I think the critical point was when I explained to her that I was a real Queen. Now I will tell her that her feeling of your aura coincides with reality and she will come down.\"\n\t\t\n\t\tSoon, you her soft scratching from above. You see the tiny pincers.\n\t\t\n\t\t\"Good girl,\" says Shiera. \"Now show us how brave you are by jumping down. ${name} will make sure you will come to no harm as you go down.\"\n\t\t\n\t\tYou raise your hand and activate the forcefield around the tiny insectoid. She jump head down and you pray that the forcefield doesn't malfunction now because otherwise the little one \n\t\twould be no more than a bit of pate. Luckily it all goes well.\n\t\t*set forcefield +1\n\t\t\n\t\t(Your forcefield mastery increases by 1)\n\t\t*goto hive8\n\t\t\n\t#Send healing nanobots to mend her\n\t\t\"I don't think I will be able to provide a better aim to the healing bots since I have no view of the target.\"\n\t\t\n\t\t\"Let me sort that out,\" says the Queen and grabs your hand. It feels warm even through her chitinous cover and your gear, so you guess it is not a real feeling but a projection of her mind. \"Now, open your eyes wide and allow me to take control.\"\n\t\t\n\t\t\"Can we try that too, please?\" Meatwall says in a longing voice. You disregard him and do as Queen Shiera tells you. Your point of view is somehow raised until you reach the crevice and see the small body of a baby insectoid.\n\t\t\n\t\t\"Is it okay now?\" asks the Queen.\n\t\t\n\t\tYou nod and fire the nanobots. It is a strange feeling to see the flash that you know are nanobots pass close to your point of view and engulfing the insectoid since you know your body \n\t\tis still down there, where the nanobots came from.\n\t\t\n\t\t\"Do you want to come back down or you will wait to see the little one going down?\" Shiera asks.\n\t\t\n\t\t\"I am getting a bit dizzy out there, I'd rather go down before I... I don't know.\"\n\t\t\n\t\t\"As you wish, silly,\" Shiera giggles. \"There is nothing to be afraid of, except for falling into yourself which is going to happen anyway. Well, it can be a little bit traumatic if not done properly but I will help you.\"\n\t\t\n\t\tYour point of view is slowly pushed down until it levels up with where your eyes are. The heaviness of your body strikes you for a second and you think you are about top fall down, but you manage to stay on your feet.\n\t\t\n\t\t\"Anything wrong with you ${name},\" asks Valkyrie.\n\t\t\n\t\t\"No, I am fine, Val,\" you assure her. \"Thanks for asking.\"\n\t\t\n\t\tYou watch as the little insectoid crawls down the vertical wall with small but steady movements of its legs. Your forcefield gear is ready in case she falls, but there appears to be no need for that.\n\t\t*set healing +1\n\t\t\n\t\t(Your healing mastery increases by 1)\n\t\t*goto hive8\n\t\t\n\t#Blast small holes in the wall so that Queen Shiera can go up \n\t\tYou look at the Queen's feet to try to figure out how big the blasts should be, then turn on the short range amplifier.\n\t\t\n\t\t\"You'd better start with making the crevice larger. Be careful not to hurt the little one up there,\" Shiera warns you.\n\t\t\n\t\t\"I'll do my best,\" you promise her.\n\t\t\n\t\tYou start blasting, making sure The angle at which the laser beam touches the entrance is small enough so that that the dangerous ray doesn't get inside. Then, \n\t\tyou make a dozen of random mini craters all the way to the top.\n\t\t\n\t\t\"Is it alright?\" you ask the Queen.\n\t\t\n\t\t\"Yes, I can handle that easily, thank you.\"\n\t\t\n\t\t\"Boss, you should apply for a sport climbing wall designer if we totally mess up with this mission,\" Meatwall laughs.\n\t\t\n\t\t\"Don't even think about it, soldier. We almost never mess,\" you assure him.\n\t\t\n\t\tYou watch with pleasure as Shiera climbs up. She virtually jumps from hole to hole, her feet barely staying in any of them for more than a second. It is a beautiful display of her fitness.\n\t\t\n\t\tShe reaches the crevice and carefully inserts her hand in it and pulls a little insectoid out. She places it in her mouth and carefully descends. You know that sometimes animals do that when \n\t\tthey need to transport their offspring and it is amazing to see someone looking so much like a human display their animalistic side.\n\t\t*goto hive8\n\n*label hive8\n*page_break\n\"Now, if you'd excuse me, I need to feed the young one, so, please, turn around!\" Queen Shiera asks.\n\n\"You mean you are going to breast feed her?\" you ask. \"Do insectoids do that?\"\n\n\"They do something vaguely similar, but as you know my genetic pool is slightly different. I sometimes breast feed the weak ones to increase their chance of survival. This is exactly what \nI am planning to do as soon as you turn around.\"\n\n\"But your nipples are covered by a chitinous shell.\" Meatwall fails to understand but is curious about the procedure.\"\n\n\"This is true but it is not a fullplate. There are areas where the important parts are connected. They open so that I can maintain proper hygiene. Insectoids are not as secretive when \nthey do their thing but being shy about exposing my naked breasts is something I must have inherited from your species, guys.\"\n\n\"Alright, lets do that,\" you insist.\n\nMeatwall gives you a begging look but follows the order. Valkyrie seems more willing to do what she is asked.\n*page_break\nIt takes a couple of minutes before Queen Shiera informs you it is ok to look back. The insectoid looks better. It used to be pale, almost like an albino, but now its chitinous\ncover has a healthy pinkish hue.\n\nA hologram of Astra appears next to it.\n\n\"Peace, dear ones. I am glad your progress is smooth. I felt that you found someone important and decided to tell you more about her,\" the woman says.\n\n\"It is always a pleasure to see you, Astra. We are happy that we came across this little fellow.\"\n\n\"She is an Ashbringer, the rarest of the roles of insectoids.\"\n\n\"An Ashbringer?\" Queen Shiera gasps and instinctively steps back as if she's seeing a ghost.\n\nAstra laughs. \"Don't be afraid, Shiera. How many times have I told you that fear is one of the worst feelings you can experience.\"\n\n\"But Ashbringers are supposed to be tailor made to kill Queens!\"\n\n\"If that is what your folklore says, then know that it is only partially correct. They are not mindless weapons. Instead, they are the ones who are to make a necessary execution if the Queen becomes corrupt \nand her actions jeopardize the well being of the entire hive.\"\n\n\"But how do they decide? What if they are wrong?\" Shiera crossed her arms in front of her torso.\n\n\"It is all in their genes. It seems that Queens have innate fear of Ashbringers, something I should have anticipated. Well, let's just say that this creature can kill you any time she wants by just making a simple signal directed at you. \nBut, as I taught you, death is just a phase we all go through before we are born again.\"\n\n\"I will try to remember it. Is the death painful?\" \n\n\"My guess is not. The Ashbringer is a noble creature. I believe it ends one's life quickly and efficiently. Besides, its mission is to liberate this hive. This is exactly what you are here to do, dear Shiera. This is why I believe you will be able \nto get along just fine, like you already do, and even help each other.\"\n\n\"Astra, Shiera tells me something of that little one asking for me,\" you say.\n\n\"This should come as no surprise. You are the main reason the whole team is here now. It will be mainly because of you and the Ashbringer that this hive restores some of its former being. I don't want to \ndevalue the role of all of the others, but their task is to support you two. Look at this creature. Don't you see the inner power hidden in that frail looking body? She is still a baby and she needs to learn. It is like magic clay. What becomes of her depends on your decisions.\nShe can become a fierce warrior or a creature full of purifying love. Any of them will achieve the current goal but the future of the entire species may differ substantially. I am leaving you now.\"\n\nAns so the hologram disappears.\n*page_break\nYou crouch and take the Ashbringer in your hands.\n\n\"Hello, little feller. How are you doing?\"\n\nIt cuddles in your battle armour. The hardness probably makes her comfortable. \"It is adorable, isn't it?\" you ask Queen Shiera. Her expression shows that she is not so sure.\n\n\"If you had access to the collective memories of all the Queens that were before me, you would probably be able to understand how I feel. Some of them went as far as to destroy an Ashbringer before she hatches.\"\n\n\"Do you approve of that?\" you ask her.\n\nQueen Shiera sighs. \"I don't know what to believe in. It would be a lie to say that I am comfortable being around a creature that can end my life any time she wishes. But, As Astra says, sticking to fear is one of the gravest mistakes we can make.\" \n\nThe idea to give her the Ashbringer to cuddle for a while occurs to you. Would you like to do that?\n*choice\n\t#Yes\n\t\t\"Then embrace her!\" You carefully hand her the little insectoid. \"It is because of you that she is able to be what she is now. Without you, she would probably die.\"\n\t\t\n\t\tIt seems that her motherly instincts take over and she carefully puts her hands below the little creature. Then, she brings it up and kisses her. When she gives her back to you, you can see tears in Shiera's eyes.\n\t\t\n\t\t\"Thank you, ${name}. You helped me fight with my fear.\"\n\t\t\n\t\t\"You are a strong woman, Shiera. I respect you for that,\" you reply.\n\t\t*set rel_shiera +2\n\t\t\n\t\t(Your relations with Queen Shiera increase by 2)\n\t\t*goto hive9\n\t\n\t#No\n\t\t*goto hive9\n\t\t\n*label hive9\n*page_break\n\"I think we should find a good place to put that little fellow,\" Meatwall suggests. \"You can't just carry her like that. You may actually need to use your hands.\"\n\n\"I guess that if you attach it behind the neck of the battle armour it will be most convenient for the carrier and safest for the hatchling. I actually volunteer to be the carrier,\" says Valkyrie.\n\"As a healer, she will be always near me to help her if she gets injured.\"\n\n\"You can't be serious, Val,\" argues Meatwall. \"Look at her, if she gets injured, that will most likely be the end of her. Let's put her on my back. This way she will be under the cover of the \nmost powerful forcefield we have here.\"\n\n\"Yeah and in the front line of fire,\" Valkyrie doesn't give up.\n\n\"Guys, let's stop this. The Ashbringer goes to...\n*choice\n\t#my back\n\t\tBoth Meatwall and Valkyrie pretend to be unhappy with your decision but you know that they are actually content that you didn't take the side of the other.\n\t\tQueen Shiera seems to be the happiest, however.\n\t\t*if gender=\"male\"\n\t\t\t\"I am glad you listened to me when I told you she needed you. You are a wise man, ${name}. We don't have many such men.\"\n\t\t\n\t\t\t\"Do you have men at all,\" you ask her.\n\t\t\n\t\t\t\"Well, actually no, this is why I sometimes find you that impressive.\"\n\t\t\t\n\t\t\t\"Come on, Shiera, don't be funny. Every man can be impressive if there is no competition.\"\n\t\t\t\n\t\t\t\"Well there is.\" Queen Shiera looks at Meatwall.\n\t\t\t\n\t\t\t\"Oh sure. He is part of my team so in a way I consider him a part of me.\"\n\t\t\t\n\t\t\t\"I could certainly see that he has the physique. I mean, when he is not in one of those funny bulging suits.\"\n\t\t\t\n\t\t\tYou laugh. \"We call them battle armours.\"\n\t\t\t\n\t\t\tMeatwall coughs. \"I am happy that the lady appreciates the time I spend in the gym but my ego is too big to like talking about me as if I am not here right next to you.\"\n\t\t\t\n\t\t\tQueen Shiera laughs.\n\t\t\t*set rel_shiera +1\n\t\t\t\n\t\t\t(Your relations with Queen Shiera increase by 1)\n\t\t\t*goto hive10\n\t\t\t\n\t\t*else \n\t\t\t\"I am glad you listened to me when I told you she needed you. You are a wise woman, ${name}. I would be very happy if you were a member of your hive.\"\n\t\t\t\n\t\t\t\"It is a big compliment, Queen Shiera,\" you reply.\n\t\t\t\n\t\t\tQueen Shiera smiles.\n\t\t\t*set rel_shiera +1\n\t\t\t\n\t\t\t(Your relations with Queen Shiera increase by 1)\n\t\t\t*goto hive10\n\t\n\t#Meatwall's back\n\t\t*set rel_meat +2\n\t\t\n\t\t(Your relations with Meatwall increase by 2)\n\t\t\n\t\t\"Thank you for your decision, boss, it means so much to me.\"\n\t\t\n\t\tYou hand him the hatchling and he takes it with gentleness unlike any you've seen from him right now.\n\t\t\n\t\t\"Are you comfortable out there, Ashbringer?\" the tank starts talking to her. \"Uncle Meatwall will give you a good right. Let me put the forcefield on so that you get used to it. Don't be scared,\n\t\tlittle one, it will protect you from any harm that may come to you.\"\n\t\t\n\t\tValkyrie laughs her heart out. \"Meatwall, you surprise me. I didn't know you would make such a good nanny.\"\n\t\t\n\t\t\"Oh, shut up! Nobody asked you to join our conversation!\" Meatwall snaps back.\n\t\t\n\t\t\"No, I really like that part of yours, don't get me wrong,\" Valkyrie explains.\n\t\t\n\t\tQueen Shiera comes closer to you. \"${name}, generally I don't want to question your decisions, but I really know that the Ashbringer should be on somewhere close to you, even if that seems \n\t\tto defy logic. I ask you to trust me.\"\n\t\t\n\t\t\"The Queen is right, Meatwall, let me take her back,\" you say to the tank.Surprisingly, he doesn't protest much and does as he is asked.\n\n\t\t\"Alright, you play the loving parent for now but feel free to give her back to me any time you want to. I'd be glad to have her on my back.\"\n\t\t*goto hive10\n\t\t\n\t#Valkyrie's back\n\t\t*set rel_val +2\n\t\t\n\t\t(Your relations with Valkyrie increase by 2)\n\t\t\n\t\t\"Thank you for your decision, boss, it means so much to me.\"\n\t\t\n\t\tYou hand her the hatchling and she takes it with the gentleness you expect of her.\n\t\t\n\t\t\"Are you comfortable out there, Ashbringer?\" the healer starts talking to her with an endearing voice. Meatwall looks at the scene with interest and even loving care which\n\t\tcomes as a surprise. His role is to be a tough one but it seems he is revealing the softness under the armour.\n\t\t\n\t\tQueen Shiera comes closer to you. \"${name}, generally I don't want to question your decisions, but I really know that the Ashbringer should be on somewhere close to you, even if that seems \n\t\tto defy logic. I ask you to trust me.\"\n\t\t\n\t\t\"The Queen is right, Valkyrie, let me take her back,\" you say. The healer follows your request.\n\n\t\t\"Alright, you play the loving parent for now but feel free to give her back to me any time you want to. I'd be glad to have her on my back.\"\n\t\t*goto hive10\n\t\t\n*label hive10\n*page_break\n\"Okay, let's continue our mission,\" you say after carefully putting the Ashbringer. \"By the way, shouldn't we give her some proper name, Shiera?\"\n\nThe Queen shrugs. \"I believe it is up to you to do so.\"\n\nYou consider your options.\n*choice\n\t#Redemption\n\t\t*set ash \"Redemption\"\n\t\t*goto hive11\n\t\t\n\t#Catalyst\n\t\t*set ash \"Catalyst\"\n\t\t*goto hive11\n\t\t\n\t#Dawn\n\t\t*set ash \"Dawn\"\n\t\t*goto hive11\n\t\t\n\t#Choose a name of your liking\n\t\t*input_text ash\n\t\t*goto hive11\n\t\t\n*label hive11\n\"Sounds like a good name to me,\" says Queen Shiera.\n\n\"So be it. Meatwall, I am getting the idea that you don't want to be so far behind and I know you have a point. The corridor in front is so wide that Queen Shiera can actually almost be next to you.\"\n\n\"Thanks, I really needed that,\" says that tank and walks ahead. His enthusiasm, however vanishes as he reaches around the corner. \"Er, ${name}, can we find another way, I don't really like it here.\"\n\n\"No way,\" says Queen Shiera. \"I don't want us to walk all the way back to the entrance. What is it, Meatwall?\"\n\nBefore he answers, you rush ahead and take a look by yourself. The chamber is full of dead insectoids. There must be a few dozens of them. You quickly turn away since you don't \nwant ${ash} to see the ugly scene.\n\nYou capture Queen Shiera's thoughts. \"There is only death and destruction here.\"\n\n\"Are you okay?\" you ask her.\n\n\"I could say so. I have been scanning the hive and I can tell you that there is little left of what it was. Many of the tunnels are in ruins and scenes like that one. There is only one chamber with survivors, many of which are warrior. Even though the diplomats we met\nspoke about their master, I still feel that there is a Queen of some sort residing there.\"\n\n\"What can we expect of her?\" you ask.\n\n\"Well, a Queen's mentality is one of acting in what is considered the best interest of the hive even if her authority is disrespected. She may be traumatized but still what you would call benevolent.\"\n\n\"I see. Shall we go on?\" You ask and immediately you sense some hesitation on the side of the Queen. And then you understand...\n\nWould you like to ask Meatwall to burn the remains of the insectoids?\n*choice\n\t#Yes\n\t\tThe tank responds without protesting which is a bit unexpected of him but when you think again it comes down to showing respect to the fallen ones and it is something he is inclined to do in general.\n\t\t\n\t\t\"Thank you very much, warrior,\" Queen Shiera whispers and touches your forearm plate in a scratching gesture of affection.\n\t\t*set rel_shiera +2\n\t\t*set black_dots +1\n\t\t\n\t\t(Your relations with Queen Shiera increase but you receive a black dot)\n\t\t\n\t\tUnfortunately, the smoke created in the burning process makes it hard for everybody to breathe and Meatwall is forced to stop before completion and you all continue ahead. Coughing.\n\t\t*goto hive12\n\t\t\n\t#No\n\t\tWithout asking for a response, you signal for your crew to follow you and make your way ahead.\n\t\t*goto hive12\n\t\t\n*label hive12\n*page_break\n\"I told you we were going to meet again,\" you hear a voice coming from around the corner. The figure shows itself and you recognize the reptilian features of Hisz.\n\n*if rel_hiss\u003c0\n\t\tYou remember that the last meeting with him did not go in a very heart-touching way and you expect this one to be alike. Would you like to attack now while you still may have an advantage?\n\t\t*choice\n\t\t\t#Yes \n\t\t\t\t\"Your aggression is abominable. I love it,\" you hear his telepathic voice as you open fire. \n\t\t\t\t\n\t\t\t\tIt is hard for you to understand it, but it seems he is able to foretell every action of your team. He dodges your shot, then moves away to the side when Meatwall charges and tries to press him towards the wall. \n\t\t\t\tQueen Shiera leaps on him but he rolls out the second her feet leave the ground. With everyone concentrated on attacking the reptilian, he finds his way to the uncovered Valkyrie and delivers her a blow\n\t\t\t\tthat knocks her down a few meters away from where she was standing.\n\t\t\t\t\n\t\t\t\tHe roars triumphantly and runs away, probably happy that he has taught you a lesson.\n\t\t\t\t\n\t\t\t\tLuckily, Valkyrie has not taken much damage that can't be repaired by her healing beam.\n\t\t\t\t*set black_dots +1\n\t\t\t\t\n\t\t\t\t(You receive a black dot)\n\t\t\t\t*goto queen_chambers\n\t\t\t\t\n\t\t\t#No\n\t\t\t\t*goto hive13\n\t\t\t\t\n*else\n\t*goto hive13\n\t\n*label hive13\n*page_break\n\"What do you want this time?\" you ask.\n\n\"I want to offer you my services,\" he chuckles. \"You are on a very dangerous mission and I want to help you with it if you are going to do it my way.\"\n\n\"I don't like the idea of following the path you have drawn even before you start speaking, but I will listen to you,\" you reply.\n\n\"That is very wise of you. See what we must do. The first step would be to go to the chamber where the remaining insectoids are and slaughter them. This would be mainly to be able to break the Queen. And then there will be\nonly one being standing on your way and it will be the medic of the team you are looking for.\"\n\n\"That is insane,\" Shiera protests. \"I am not going to participate in this nonsense.\"\n\n\"As you wish. I would gladly take your place as the melee assassin of the team,\" Hisz snaps back.\n\n\"What would you gain from it?\" you inquire.\n\n\"Energy.\" The reptilian licks his lips. \"When somebody dies, they release a large quantity of energy and I can capture and store some of that.\"\n\n\"What about the artifact we are after?\"\n\n\"You are really funny. Back in my home world, this would be considered a cheap trinket. I have access to what you can not even imagine. No, carnage is what I am after and if you follow my path you will get to \nthe artifact safe and sound and then I will leave you and go back to my mission. No, don't ask me, I am not going to tell you.\"\n\nWould you like to accept Hisz's offer?\n*choice\n\t#Yes\n\t\t*set rel_shiera -100\n\t\t*set light -50\n\n\t\tThe next scenes roll like the tape from an old school movie theater... a horror one.\n\n\t\tHisz leads you to the chamber where the remaining insectoids are and he leaps on them like a wolf into a pen, beheading them one after another with the sheer\n\t\tbrute force. Meatwall feels absolutely useless and Valkyrie just turns her back (you know she is crying). \n\n\t\tSome of the insectoids try to show resistance and you shoot them. In the back of your mind, you realize that the embrace of darkness is not really your choice.\n\t\tYou just open a bit to it and it comes into you like a flood.\n\n\t\tAfter all of the insectoids seem to be dead, Hisz leads you to the Queen's Chambers.\n\t\t*achieve carnage\n\t\t*page_break\n\t\tOnce you all enter, Hisz gently takes ${ash} and brings it to the ground. The Ashbringer crawls towards the Queen, who looks around confused, not knowing what is going on.\n\n\t\tAfter seeing so much carnage, ${ash} follows example and uses its power to destroy the Queen.\n\n\t\tNow, there is nothing left to stay between you and the artifact.\n\t\t*page_break\n\t\tThe only one guiding it is a man wearing battle gear similar to Valkyrie's. Another leap of the reptilian and he lies dead in a pool of his own blood. The artifact is yours to claim.\n\n\t\t\"I will now go and leave you to celebrate your victory. I drank so much energy and it was sweet beyond the telling. Now I can just rest and bask at the warmth of the feeling.\" Hisz leaves the room.\n\t\t*goto_scene facility\n\t\n\t#No\n\t\t*set rel_shiera +2\n\t\t\n\t\t\"You've done the right choice,\" Shiera tells you. \"I am sure we can handle things in the gentle way.\"\n\t\t*goto queen_chambers\n\n*label queen_chambers\n*page_break\t\t\nShiera takes the Ashbringer in her hands and enters the chamber of the local Queen. The two ladies exchange pleasantries.\n\nThe Queen of this hive seems amazed by the sight of the little royalty assassin... and all of a sudden something inside her changes. She denounces all the \nrattle about the Master and calls for all of her subjects to revolt against the one who poisoned their minds into slavery.\n\n\"How did you do it?\" you ask Shiera.\n\n\"There was a prophecy about a hybrid wielding an Ashbringer, both guided by serving the best interest of the insectoids. She felt the love projected by ${ash}, which is a \nmultiplication of all the love it received by us. Those beings are majestic. They can not only kill a Queen, but restore her too.\"\n\nAn angry mob of insectoids enters the chamber where the Master is. When you follow them you find only the remains of a man dressed in a battle armour of a medic. And the artifact is yours to claim.\n*goto_scene facility \n\n", "intro": "You wake up and extend your muscles. They still hurt after the extensive training. Your bed is ergonomic and you really appreciate\nbeing able to have an afternoon nap after almost dying from over-training earlier today.\n\nYou get up and try to ignore the pain here and there, confident that your coach knows what he is doing and you will be alright after \nyou have a few rehab drinks and mineral pills.\n\nThe clock reminds you that it is late afternoon. Or kind of. You are in a space ship, so everything related to time is conditional. It is just that\nthe psychologist insists that you keep as close to the schedule you are used to as possible to avoid unnecessary stress.\n\nSeveral objects attract your attention. \n*goto look\n\n*label look\nWhere do you look?\n*choice\n\t*hide_reuse #Your dog tag\n\t\t*set look +1\n\t\t*goto tag\n\t*hide_reuse#Your battle suit \n\t\t*set look +1\n\t\t*goto suit\n\t\t\n\t*hide_reuse #The trophy on the wall\n\t\t*set look +1\n\t\t*goto trophy\n\t\n\t*hide_reuse #A window showing you space \n\t\t*set look +1\n\t\t*goto window\n\n\t*hide_reuse #Your uniform\n\t\t*set look +1\n\t\t*goto uniform\n\t\t\n\t*hide_reuse #A miniature model of your ship \n\t\t*set look +1\n\t\t*goto ship \n\t*selectable_if (look=6) #Finished your observations \t\n\t\t*goto 2\n\t\t\n*label tag\nThe dog tag lies on the night stand next to the bed. There is a single word written on it. It is your battle tag and it is...\n*choice\n\t#Mayday\n\t\t*set name \"Mayday\"\n\t\t*goto tag2\n\t\n\t#Shadow\n\t\t*set name \"Shadow\"\n\t\t*goto tag2\n\t\n\t#Howler\n\t\t*set name \"Howler\"\n\t\t*goto tag2\n\t\n\t#Reaper\n\t\t*set name \"Reaper\"\n\t\t*goto tag2\n\t\n\t#Executioner\n\t\t*set name \"Executioner\"\n\t\t*goto tag2\n\t\t\n\t#Phoenix\n\t\t*set name \"Phoenix\"\n\t\t*goto tag2\n\t\t\n\t#Something else\n\t\t*input_text name\n\t\t*goto tag2\n\t\t\n*label tag2\nThere is also a symbol representing your gender. It is...\n*choice\n\t#The mirror of Venus\n\t\t*set gender \"female\"\n\t\t*goto tag3\n\t\t\n\t#The spear of Mars \n\t\t*set gender \"male\"\n\t\t*goto tag3\n\t\t\n*label tag3\nThe last symbol stands for the genders you are attracted to. While many consider this information to be confidential, the army's policy dictates openness in order\nto \"prevent frustration based on gender based sexual incompatibility.\" One thing is certain, homosexual soldiers are not discriminated in any way. And, romantic relations within the army\nare common.\n\nThe symbol engraved on your tag is:\n*choice\n\t#The mirror of Venus\n\t\t*set att2females 1\n\t\t*goto tag4\n\t\t\n\t#The spear of Mars \n\t\t*set att2males 1\n\t\t*goto tag4 \n\t\t\n\t#A symbol combining both\n\t\t*set att2males 1\n\t\t*set att2females 1\n\t\t*goto tag4\n\t\t\n*label tag4\nYou put your tag on your neck just as the protocol dictates and look around.\n*goto look\n\n*label suit\nYou battle suit is hanged on a stand next to the door. It reminds you of the armour of the knights from the books you read as a teenager, but it is far more effective.\nIt is made of a special alloy that proves it hard to break but still amazingly light. Inbuilt engine systems amplify the speed and power of your movements up to four times. In the back, there is a small\ntank of pain killers that can be injected if you are injured, and an oxygen tank that is invaluable if you are in a poisonous medium.\n\nThere is a laser gun attached to the left forearm armour plate. It is self charging, using whatever little light there is around. You've always marveled at  how quickly it manages\nto fill its battery. You've tested it in almost pitch darkness and the weapon just kept firing without showing any sign of exhaustion.\n\nThe laser produces beams that are effective mid range with a rapid rate of fire. \n\nAt the end of it there is...\n*choice\n\t#An aiming device\n\t\tIt is not as good as the ones the sniper specialists have, but then again, your weapon is not as long-ranged as theirs.\n\t\t*set aim 1\n\t\t*goto suit2\n\t\t\n\t#A dispenser, allowing much wider beams but reducing effective range (it can be switched on and off)\n\t\tThat gadget, when activated, allows you to make a mess of your enemies within 10-15 meters, as if you are using a flame thrower.\n\t\t*set shotgun 1\n\t\t*goto suit2\n\t\t\n\t#A laser sword\n\t\tThe knife is 140 cm long and it made of laser that is so concentrated that when on, it can cut through almost anything. It is often undervalued \n\t\tbecause of its melee range, but there are situations in which it has proven to be the best possible weapon.\n\t\t*set knife 1\n\t\t*goto suit2\n\t\t\n*label suit2\n*page_break\nAs a team captain, you are supposed to be all-around fighter but you still can choose how exactly to support your team mates better. This is why the device attached to the left forearm plate is left to your choice.\n*choice\n\t#Nanobot healing set\n\t\tIt is not as good as the one of the medics, but it can still be invaluable if you or your team mates gets injured. The gadget shoots minute bots that bind \n\t\twounds and repair armour.\n\t\t*set healing 1\n\t\t*goto suit3\n\t\t\n\t#Force field generator \n\t\tThis is a smaller version of the model tanks use. It creates a force field around you (or another nearby target) that absorbs some of the damage the target\n\t\tis about to receive.\n\t\t*set forcefield 1\n\t\t*goto suit3\n\t\t\n*label suit3\n*page_break\nYou leave the battle suit for now since you are not going to put it on in the next couple of hours.\n*goto look\n\n*label uniform\nYour uniform is on a hanger next to your armoured suit. It is made of soft and elastic cloth designed not to hamper your movement. The side effect is that it fits you like a \nsecond skin, revealing your well-shaped muscles. You've seen quite a few civilians who seem to need to give you a second look when they see you wearing your uniform.\n\nThe lower part is jet black. The upper one is adorned in various green patterns, which is courtesy to the camouflage that was relevant on the mother planet. The truth is that despite the development in terraforming, none of the four\nplanets that went through it appear to be as green as the films from the old Earth you've been shown. \n\nThe army itself changed a lot, or so you learned in the classes of Military History. There were times when it was the most important institution. Gradually,\nhowever, due to the rise of consciousness, fewer governments were willing to engage in warfare. Five centuries after the process started, it turned out \nthere was nobody to fight with. There was a common fear that it would not be possible to maintain a trained army. Battle simulations appeared to be rather dangerous.\n\nThis is where a technology called Absolute Virtual Reality (AVR) kicked in. Soldiers were put in a metal frame and their hands and legs strapped with smart bandages. A helm\nprovided them access to a virtual reality in which they could simulate battles.\n\nThe level of realism was phenomenal. If the soldier is hurt, the straps would tightened, making it more difficult for them to move. \n\nThese simulations appeared to be so entertaining that they were marketed as sports.\n\nAnd you happen to be the captain of a team who won a very prestigious tournament.\n\nAVR was great, but its successor, Super Advanced Virtual Reality (SAVR) went one step further, allowing the soldier to actually feel pain up to a preset \nlevel.\n*goto look \n\n*label trophy\nThe trophy is a miniature model of the physical framework the SAVR uses. A golden incrustation reads:\n\nChampion of War 2716\n\n${name}, Captain \n\nValkyrie, Medic\n\nMeatwall, Tank\n\nInnovation, Specialist\n\nWinning that trophy means so much to you and the whole team. It is hard to believe that a whole old world year (OWY) passed since then and now you have to \ndefend the title.\n\nYou take a deep breath, reminding yourself of the pressure to do so.\n*goto look \n\n*label window\nThe so-called window is actually a liquid crystal screen showing you a detailed image of the stars that can actually be seen from the spaceship. The image\nmakes you shudder. You don't really like space travel, even though your ship is as comfortable as possible. Even the gravity is 1.2 g, just like on your\nhome world of New Earth 02.\n\nYou once again curse the organizers of the tournament. It is technically possible for you to play from anywhere in the known galaxy. But, one of the rules against\ncheating requires officials to have direct view of your physical bodies at all times during the battles. \n*goto look \n\n*label ship\nThe model of the ship is designed exclusively for bringing teams of four people, providing the basic comforts for the couple of days space travel between \nthe human inhabited planets usually take. \n\nYour room is in the back of the ship and Meatwall's is next to yours. The lady, Valkyrie, of course, has the largest one and the closest to the bathroom.\nInnovation, as usually, refuses to occupy a room by herself, her android nature urging her to deny the comforts meant for humans and instead decides to spend her time\nin the pilot cabin. You don't fully understand how AIs communicate with each other, but you guess she developed some fancy towards the pilot software. \n\nInnovation's room is now a makeshift under-equipped fitness centre, where you could kind of train. These routines help you mentally much more than physically. \n\nThere is no SAVR on board. There is no room f
