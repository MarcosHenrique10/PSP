\n  Chevalier's strides shorten, slow, stop when he sees you. \"Oh, hey newbie. Guess we're doing this, then?\"\n  \n  He rolls his neck left and then right, slowly. \"You sure you want to go through with this?\"\n  *fake_choice\n    #Blast him immediately.\n      *set power+1\n      \"Absolutely,\" you retort, raising your hands and letting loose with a gout of electricity. A bright blue lance slaps Chevalier aside, and he shouts out something about the pain, but pain is something else to a man who can't actually be injured.\n      \n      He charges through the electric assault, roaring something incoherent, and lays you out with a series of blows, aimed at your joints and other... soft areas.\n      \n      *line_break\n      *line_break\n    #Go hand-to-hand.\n      \"Let's do it, Chevy,\" you retort, raising your fists and advancing.\n      \n      Chevalier smiles, bursting into laughter. \"Sure! Let's do it.\" He raises his fists, squaring off with you like a boxer.\n      \n      He prevails, inevitably. The fist first that slips past your guard quickly becomes two and a leg and you find yourself face down in the sand.\n      *line_break\n      *line_break\n    #Let him past.\n      For whatever reason, it suddenly occurs to you that this is a fight you can't win.\n      \n      You step back, and let Chevalier go past. He gives you a strange, disappointed look, and a sharp jab to the gut as he steps past. \"I'll keep this between you and me,\" he says.\n      *line_break\n      *line_break\n  Even through the haze of pain, Aegis' voice is loud and clear: \"You're dead, ${first_name}!\"\n  *goto ctf_bad_ending\n*else\n  You listen, ears ready for any sign of Chevalier being stopped.\n  \n  It doesn't take long. Al-Jinn's voice rings out, sounding with authority, \"[i]Pain.[/i]\"\n  \n  Chevalier cries out, something incoherent, the kind of sound someone might make if their bones were breaking into splinters. After a few moments, the point is made, and he goes quiet.\n\n  Aegis calls out, \"You're dead, Ryan!\"\n  *goto anima_result\n\n*label anima_result\n*page_break\n*if (jinn_job = \"Anima\")\n  *set flag_guard \"Al-Jinn\"\n  Behind you, back towards the flag, you can hear Al-Jinn talking.\n  \n  \"Let's try this, for the hundredth time: Anima, [i]stop.[/i]\"\n  \n  There's a brief tickling over your brain, like gentle pinpricks, and then the distinct sound of someone being thrown to the ground.\n  \n  \"Attempt unsuccessful,\" Anima states.\n  \n  Damn.\n  *goto ctf_bad_ending\n*elseif (courser_job = \"Anima\")\n  *set flag_guard \"Courser\"\n  Behind you, back towards your flag, there's the brief sound of a struggle. Courser has sprung his ambush.\n  \n  It's hard to tell who has the advantage - all you can hear is someone scrambling for it.\n  \n  Eventually.\n  \n  \"Yield,\" Anima dictates.\n  \n  \"I'm yielding!\" Courser says, in obvious pain, \"I'm yielding!\"\n  \n  Damn.\n  *goto ctf_bad_ending\n*else\n  *set power+1\n  You feel Anima landing behind you more than you hear her, some nigh-imperceptible tremor in the sand.\n  \n  She's half-crouched, ready to spring at you, her dark eyes fixed on the flag and then, as if noticing you for the first time, she sights in on you.\n  \n  You remember what Jinn and Courser said. You don't even have a second.\n  \n  In that split-second, you fire off a bolt of electricity - something that'll sting without putting anyone in actual danger - just as Anima leaps.\n  \n  The moment she's tagged, she drops to one knee, fist crashing against the sand. Her expression neutral, she stares at her fist.\n  \n  \"Well, I'll be damned.\" Aegis sounds just as surprised as you are. \"You're dead, Ada!\"\n  *goto ctf_ending\n  \n*label ctf_ending\n*page_break\n*if ((courser_job = \"Chevalier\") and (player_job = \"Anima\"))\n  Anima remains on her knee, fist half-buried in the sand. She doesn't look at you.\n  \n  There's a sharp pressure, like a fist in the small of your back, and the ground comes rushing up to meet you. You turn onto your back, coughing up sand, and stare up at Chevalier.\n  \n  He smiles down at you. \"Nice effort, rookie, but I'm here for your flag.\"\n  \n  At least he offers you a helping hand up.\n  *goto ctf_bad_ending\n*else\n*achieve ctf_win\n*set ch2_won_ctf True\n*set courser_relationship %+15\n*set aegis_relationship %+20\n*set chevalier_relationship %+10\n*set aljinn_relationship %+15\n\nA short time later, you're standing in the middle of the field again - but this time, you're standing there victorious. You grip the red flag in one hand, the blue one in the other, and are sure to keep them where the other team can see them.\n\n\"Nicely done, ${cape_name},\" Aegis says. \"Congratulations, you've saved the world, that irreplaceable flag didn't fall into the hands of your opponents. Remember, leveraging the abilities of your team where they'll do the most good is the secret to victory.\"\n*goto final_debrief\n\n*label ctf_bad_ending\n*achieve ctf_loss\n*set chevalier_relationship %+10\n*set aegis_relationship %-10\n*set courser_relationship %-15\n*set blueshift_relationship %-20\n*set aljinn_relationship %-10\n*page_break\n\nA short time later, you're standing in the middle of the field again. This time, however, Team Blue is basking in the glow of their victory. For your part, you've got a few new aches.\n\n\"I'm disappointed, ${cape_name},\" Aegis says, arms crossed. \"But luckily for you, the only thing you lost here is a little scrap of cloth. Pride too, I suppose. In the future, listen to the other members of your team and leverage their abilities where they'll be most effective.\"\n\n*fake_choice\n  #You stacked the deck!\n    *set aegis_relationship %-10\n    \"I did,\" Aegis replies, \"And I also gave you the tools you needed to win.\"\n  #I'll do better next time.\n    \"You better,\" Aegis comments, \"I didn't bring aboard someone who gives up because they got sand in their face.\"\n  #Keep your mouth shut.\n    *set aegis_relationship %+10\n    Her comments might sting but there's little point in making a spectacle.\n\n*goto final_debrief\n*label final_debrief\n*line_break\n*line_break\n\"Still,\" Aegis continues, gesturing to her whole squad, \"Win or lose, it's about doing the best you can with the circumstances you had. Maybe today could have gone better, the only thing to do is ensure that you learn from that for tomorrow. You're dismissed.\"\n\n\"Tomorrow?\" you ask.\n\nAegis nods. \"The word just came down from [i]my[/i] boss. Marching orders, ladies and gentlemen - we've got a mission. Take the night off but stay out of trouble because tomorrow we'll be heading to Paradigm City to hunt down a murderer. We've got a capekiller.\"\n\nAt the mention of Paradigm City, a murmur of unease ripples through the squad. No one seems keen on going. It surprises you, Paradigm was said to be a shining jewel, made by empowered individuals to serve as an example for the world going forwards. The capekiller isn't as shocking as the sheer level of antipathy that arrives in its wake.\n\nAs everyone makes ready to head out, Aegis says, \"Not you, ${cape_name} - get your uniform sorted out. There's a set of fabricators in the rooms down here, use Blueshift's lab.\"\n\n*if ch2_won_ctf = True\n  \"Captain, with all due respect-\" \n  \n  Aegis cuts Blueshift off. \"Blueshift, why is it that whenever you say something like that, all I hear is a big 'fuck you, sir'?\"\n\n  He shuts up, staring at some undetermined point ahead.\n  *goto costumetime\n\n*else\n\"I'm sure that I can be magnanimous in victory,\" Blueshift says, smooth as steel.\n*goto costumetime\n\n*label costumetime\n\n\"And remember,\" Aegis tells you, \"No capes.\"\n\n*page_break\n\nThe labs and workshops of SOLAR HQ are just as modern and gleaming as the rest of the place.\n\nBlueshift appears to have one to his own, for whatever reason. You're not sure if that is by design or whether the man was just so caustic as to claim it through lack of opposition.\n\nIt's messy in the haphazard sense of being organised to a standard you can't fathom. Terminals and machines line the walls, including the one you take to be the fabrication unit. There's more things - books, tools of every shape and size, and more than a few things that seem to be half-started experiments and machines, left abandoned by Blueshift for whatever reason.\n\nThe air is tinged with the pungent aroma of cigarette smoke. The culprit becomes clear quickly enough - Blueshift is lighting up and, further to that, multiple cigarettes have been crushed to nothingness in the ashtray on Blueshift's workbench.\n\nHe's been ignoring you since you arrived, hell, for the entire walk over, and you don't imagine he's about to change that now.\n\nBut you don't need his help to work on your costume, anyway.\n\n*label costumechoice\n*if (costumecount = 0)\n  What will you work on first?\n\n*if (costumecount = 1)\n  What will you work on next?\n\n*if (costumecount = 2)\n  And that just leaves...\n\n*if (costumecount = 3)\n  *goto costumetime2\n\n*choice\n  *if (helmetdone = 0)\n    #Helmet.\n      What sort of helmet?\n      *choice\n        #A visored helmet, like Anima and Courser wear.\n          You find plans for something like a motorcycle helmet, replete with a visor that can be raised by hand or with a voice command. Additionally, the visor allows for an extensive head's up display for all the information you could want.\n          *choice\n            #Sounds good.\n              *set helm \"visored\"\n              The machine gets to work, designing something to fit your measurements.\n              *set costumecount +1\n              *set helmetdone +1\n              *goto costumechoice\n            #Something else.\n              *goto costumechoice\n        #A knight's helmet, like Chevalier wears.\n          You browse through a few files and find something like a knight would have worn in the Middle Ages, although built to the standards required by SOLAR. It certainly looks impressive.\n          *choice\n            #Sounds good.\n              *set helm \"knight's\"\n              The machine gets to work, designing something to fit your measurements.\n              *set costumecount +1\n              *set helmetdone +1\n              *goto costumechoice\n            #Something else.\n              *goto costumechoice\n        #A plumed helmet, like Sentinel wore.\n          You remember Sentinel, ${senhis} great plumed hoplite helmet, and draw up plans for something similar. It won't be identical - after all, Aegis insists on full NBC protection - but the plume will be distinctive.\n          *choice\n            #Sounds good.\n              *set helm \"plumed\"\n              The machine gets to work, designing something to fit your measurements.\n              *set costumecount +1\n              *set helmetdone +1\n              *goto costumechoice\n            #Something else.\n              *goto costumechoice\n        #A tactical helmet, like Aegis, Blueshift and Al-Jinn wear.\n          Most of Aegis' unit wear tactical combat helmets, like a soldier would wear - the motorcycle helmet's angular, meaner brother. It has a bit of an imposing edge and an extensive head's up display for all the information one could need on the field.\n          *choice\n            #Sounds good.\n              *set helm \"tactical\"\n              The machine gets to work, designing something to fit your measurements.\n              *set costumecount +1\n              *set helmetdone +1\n              *goto costumechoice\n            #Something else.\n              *goto costumechoice\n  *if (torsodone = 0)\n    #Torso.\n      What kind of uniform?\n      *choice\n        #Armored tactical plating, the default gear for Aegis' team.\n          One lesson a lot of prospective capes learned was that their powers didn't always stop a bullet, or a hail of bullets. Sometimes it wasn't a lesson you got to resit. Aegis seems to have taken that lesson to heart and made such protections the default. While sleeker than you expected, the armor plating and pockets might limit your flexibility.\n          *choice\n            #Sounds good.\n              *set torso \"suit of tactical armor\"\n              The machine gets to work, designing something to fit your measurements.\n              *set costumecount +1\n              *set torsodone +1\n              *goto costumechoice\n            #Something else.\n              *goto costumechoice\n        #A sleek bodysuit, so you can maximise your flexibility.\n          It's a classic image, the cape in the sleek bodysuit that clings to every inch of their body. It isn't something that Aegis will approve of, but wearing something like this will certainly bring back memories of the classic cape. The material is, luckily, some classified thing that makes it more protective than you might assume.\n          *choice\n            #Sounds good.\n              *set torso \"sleek bodysuit\"\n              The machine gets to work, designing something to fit your measurements.\n              *set costumecount +1\n              *set torsodone +1\n              *goto costumechoice\n            #Something else.\n              *goto costumechoice\n  *if (accdone = 0)\n    #Accessory.\n      Any accessories?\n      *choice\n        #A cape.\n          You suspect Aegis won't approve and you know the old rule that almost every cape actually looks bad in a the garment that gives them their distinctive name... but still, it's a choice. Maybe you can pull it off.\n          *choice\n            #I sure can!\n              *set cape true\n              The machine gets to work, designing something to fit your measurements.\n              *set costumecount +1\n              *set accdone +1\n              *goto costumechoice\n            #Maybe not...\n              *goto costumechoice\n        #Blueshift-made capacitors to store 'emergency power'.\n          Glancing through some plans, you find one of Blueshift's designs. It looks like something he uses himself, a form of capacitor that stores the energy generated by abilities, conserving it for when it is needed. It'd be easy enough to create something built into your costume to give you something similar.\n          *choice\n            #That could be handy.\n              *set accessory \"capacitor\"\n              The machine gets to work, designing something to fit your measurements.\n              *set costumecount +1\n              *set accdone +1\n              *goto costumechoice\n            #No, too risky.\n              *goto costumechoice\n        #Actually, I don't need any of these.\n          *set costumecount +1\n          *set accdone +1\n          *goto costumechoice\n\n*label costumetime2\n\nThe machine gets to work. A ${helm} helmet and a ${torso}, created to fit you like a glove, all emblazoned in the blue, white and black livery of SOLAR.\n\n*if cape = true\n  *achieve cape\n  Idly, you wonder what Aegis is going to say about the cape. But what's done is done.\n  *goto costumetime3\n\n*elseif accessory = \"capacitor\"\n  Blueshift glances over. \"I'll make something work for you. I solved electrokinesis before I solved my own power, if you can believe that.\"\n  *goto costumetime3\n\n*else\n  *goto costumetime3\n*label costumetime3\n*if ((helm = \"tactical\") and (torso = \"suit of tactical armor\"))\n  *achieve solararmor\n  *goto ch2_blue_choice\n*else\n   *goto ch2_blue_choice\n*label ch2_blue_choice\nIt's going to take at least a few hours, however.\n\nYou glance over at Blueshift. Maybe here, in his own element, he'll be more open to conversation.\n*choice\n  #Attempt to talk with Blueshift.\n    *goto blueshift_lab_talk\n  #Leave it, he's kind of an asshole.\n    *goto courser_call\n\n*label blueshift_lab_talk\nBlueshift is seated at his desk, scrutinising a holographic image, examining some plans for something you don't recognise. You clear your throat.\n\nHe doesn't look up.\n\nYou ask, \"Blueshift?\"\n\n\"Yes? I'm busy. Do you want something?\"\n\nHe's still not looking up.\n\n*fake_choice\n  #\"I'd like to ensure that we'll work together on the field without issue.\"\n    \"We will,\" Blueshift says.\n    \n    \"It doesn't seem like it.\"\n    \n    \"To you, yes. Not to me.\"\n    \n  #\"I want you to stop being such an ass.\"\n    \"Greater ${men} than you have tried,\" Blueshift says, \"Despite what you believe, I'm not your enemy.\"\n    \n    \"You're not giving me much evidence to the contrary.\"\n\n    \nHe turns the hologram in front of him, looking at it from another angle.\n\n\"What you are,\" Blueshift says, enunciating every syllable clearly, \"is an outlier. I don't dislike you - dislike is active. What I am is indifferent. What I want to know is whether you'll be a liability or an asset, and that will only come with time.\"\n\nHe finally looks up. \"If you hurt this team, you'll be answering to me before the Captain gets to you.\" There's a clear threat there, beneath his words, like a knife hidden in one's palm.\n\n*if ch2_won_ctf = true\n  *set blueshift_relationship %+10\n  \"Still,\" he continues, and the threatening tone vanishes, as if it was never there. \"You did prevail in the exercise today. That's worth something. Maintain that level of success and we'll get along just fine.\"\n  *goto blueshift_lab_talk2\n\n*else\n  *set blueshift_relationship %-10\n  \"You failed today,\" he continues and the threatening tone vanishes, as if it was never there. \"Luckily for you, it was only an exercise. Learn from it. Identify what went wrong.\"\n  *goto blueshift_lab_talk2\n  \n*label blueshift_lab_talk2\nHe returns to his work. \"In this job, there's no room for error. Each variable must be perfectly accounted for, our tolerances exacting. This team must work as a flawless machine in order to make sure that everyone comes home. The Captain understands this. Anima understands this. You will too, given time.\"\n\nOne thing's clear. Once you get him talking, Blueshift sure does like the sound of his own voice.\n\nStill, it gives you something to think about.\n\n*page_break\n*goto courser_call\n\n*label courser_call\n\n*page_break\n\nYour hand tablet chimes once, twice. An incoming call. You fetch it from your pocket.\n\nIt's Courser.\n\n\"Hey, ${cape_name}! Sorry, ${first_name} - are you all done down there? We're about to head out and grab a few drinks. Y'know,\n*if ch2_won_ctf = true\n  bask in our glorious victory. I'm kidding. Like the Captain says, we're heading out tomorrow and who knows what we'll be running into - might as well spend some of our danger pay before we earn it, right? Chevalier knows a place, he says it's pretty intense. Interested?\"\n  *goto first_night\n*else\n  in honor of Blue Team's win. I'm kidding. Like the Captain says, we're heading out tomorrow and who knows what we'll be running into - might as well spend some of our danger pay before we earn it, right? Chevalier knows a place, he says it's pretty intense. Interested?\"\n  *goto first_night\n\n*label first_night\n\n\"Sure,\" you reply. \"If the whole team's going to be there, I suppose I have to come along.\"\n\n\"Great! I'm sending the address to you now. Don't bother with the line. See you soon!\"\n\n*page_break\n\nBack in your room, you hurry around to find clothing that isn't your uniform, something to wear to the club.\n\nYou manage to pull something together quickly enough, thankful that you had the foresight to pack some clothes that were suitable.\n\n*fake_choice\n  *if (Gender = \"Female\")\n    #A cocktail dress - black and stylish.\n  *if (Gender = \"male\")\n    #A sharp black suit, no tie.\n  #Something smart but casual - shirt, stylish jeans.\n  #Something that shows off your work - SOLAR bomber jacket, slacks, boots.\n\nCourser's directions are accurate, as you expected.\n\nIt leads to a club within Geneva proper. Even at this hour, in the early evening, there's already a line. Like Courser said, you skip past the line. The bouncers take a moment or two to verify your identity.\n\nAnd then, you're inside.\n\n*page_break\n\nYou're not surprised that this place came recommended from Chevalier. The strobe lights on the dance floor are disorientating and blinding, even from the door, and the heavy dance music blasts with such volume that you swear your bones are vibrating, like an array of calcium-infused tuning forks.\n\nIntense is putting it lightly. You've got this strange sense of vertigo and... singing. You shake your head, bracing against the assault on every single one of your senses.\n\nYou're acutely aware of heads turning in your direction, appreciative looks and glances. It's strange and unfamiliar. The whole place is strange and unfamiliar, come to think of it.\n\nYou wander for a minute or so, and then head for the central point, following an old Capetown teaching - when lost, head to the landmarks.\n\nIt proves true. Courser and Chevalier are there, clutching a bevy of beverages.\n\n\"There ${phe} is!\" Chevalier crows, \"The ${man} of the hour! If you're drinking, I'm buying.\"\n\n*fake_choice\n  #\"Sure.\"\n    Chevalier grins and, after a moment, is passing a drink to you.\n\n  #\"I'll pass.\"\n    Chevalier shrugs. \"Hey, that's fine, no pressure. But if you change your mind, I'll be happy to help.\"\n    \n\"Thanks, Chevalier.\"\n    \n\"Ryan, please,\" he replies and adds, \"We're off-duty, hey?\"\n\n\"Come on,\" Courser says, \"Let's not leave the rest of them waiting.\"\n\n*page_break\n\nCourser leads the way through the crowds, towards the back of the club. Private rooms, by the look of things. A large bouncer stands at a rope barrier. Funny, you're sure every member of your team would be security enough.\n\nHe lets you past without incident.\n\nInside, your team is scattered around a series of couches, all of them drinking, none of them in uniform but instead clad in a variety of garments that walk the line from stylishly formal to casually stylish. The Captain's there, too, resting against the top of a couch.\n\n*if ch2_won_ctf = \"True\"\n  \"Captain?\"\n  \n  It takes you a second to realise that Lorna is talking to you. \"How about a toast?\"\n  \n  *choice\n    #\"Sure.\"\n      You stand, raising a glass. \"To Red Team, the Captain, and the rest of you all, for giving me one hell of a first day!\"\n      \n      They cheer, raising their glasses. Even Blueshift.\n      \n      With that, the night really begins.\n      *goto club_night\n    #Hesitate - me? Right now?\n      You hesitate. In that split second, Courser comes to your aid.\n      \n      \"Hey, not that I'm wanting to step on your toes, Captain, but let's not overwhelm them too much.\"\n      \n      He makes a toast. The squad cheers.\n      \n      With that, the night really begins.\n      *goto club_night\n\n*else\n  Chevalier - Ryan, you remind yourself - stands in the middle of the room, glass in hand.\n  \n  \"I'd just like to thank the whole squad for a fine effort today - and especially our good friend and general boy scout, Damian, for his generous tribute.\"\n  \n  Damian bows his head, arms wide, playing the part.\n  \n  Ryan raises his glass. \"To the victor, the spoils!\"\n  \n  With that, the night begins. \n  *goto club_night\n\n*label club_night\n*page_break\n\nWhile the Captain and Naomi hold down the private room fort, the rest of the squad disperses through the crowds.\n\nRyan and Damian end up by the bar, supplying the squad with more than enough drinks.\n\nYou catch a glimpse of Ada and Leland on the dance floor, dancing next to each other if not dancing together.\n\nYou wander between each group, making an appearance, finding a little nook to get comfortable in.\n\n*if (ch1_party_animal = \"true\")\n  And it's easy enough for you. You're a natural. As you and Damian point out, the number one skill that Capetown left you with was the ability to party!\n\n  \"Well, at least that ghetto is good enough for something,\" Blueshift - no, Leland - says, and you swear you see him smiling.\n  *goto club_night_2\n  \n*elseif (bravado > brawn) and (bravado > brains) \n  It's not as hard as you think, once you find the rhythm. Soon enough, any thought of being uncomfortable around your new squad is forgotten, and you're lost amidst the jokes, songs and tall tales.\n  *goto club_night_2\n  \n*else\n  Eventually, it even becomes close to natural.\n  *goto club_night_2\n  \n*label club_night_2\nStill, as the night goes on, you always find yourself returning to one person, caught in their irresistible pull.\n  \n*fake_choice\n  #Damian, Courser.\n    *achieve romance\n    *set ch2_solar_romance \"courser\"\n    *set solname \"Damian\"\n    *set solcode \"Courser\"\n    *set solhe \"he\"\n    *set solhim \"him\"\n    *set solhis \"his\"\n    *set solman \"man\"\n    *set soleye \"blue\"\n    *set courser_relationship %+40\n  #Ryan, Chevalier.\n    *achieve romance\n    *set ch2_solar_romance \"chevalier\"\n    *set solname \"Ryan\"\n    *set solcode \"Chevalier\"\n    *set solhe \"he\"\n    *set solhim \"him\"\n    *set solhis \"his\"\n    *set solman \"man\"\n    *set soleye \"brown\"\n    *set chevalier_relationship %+40\n  #Naomi, Al-Jinn.\n    *achieve romance\n    *set ch2_solar_romance \"aljinn\"\n    *set solname \"Naomi\"\n    *set solcode \"Al-Jinn\"\n    *set solhe \"she\"\n    *set solhim \"her\"\n    *set solhis \"her\"\n    *set solman \"woman\"\n    *set soleye \"green\"\n    *set aljinn_relationship %+40\n  #The couch.\n    *set ch2_solar_romance \"none\"\n\n*if ch2_solar_romance = \"none\"\n  You fall into one of the couches, exhausted. You're not sure how long it's been.\n  \n  \"Shots?\" someone asks, probably Ryan.\n  \n  Everyone takes up a glass, even Ada and Leland. The latter slides a glass of some clear liquid in your direction.\n  \n  \"On three,\" says Ryan.\n  \n  \"One. Two. Three!\"\n  \n  You tip your head back and drain the glass. It burns on the way down. You cough and it draws laughter from the rest of the squad.\n  \n  *goto night_end\n  \n*else\n  You fall into one of the couches, exhausted. You're not sure how long it's been.\n\n  \"Shots?\" someone asks, probably Ryan.\n\n  Everyone takes up a glass, even Ada and Leland. ${solname} presses one into your fingers, the glass filled with some clear liquid. $!{solhe} smiles at you.\n\n  \"On three,\" says Ryan.\n\n  \"One. Two. Three!\"\n\n  You tip your head back and drain the glass. It burns on the way down. You cough and it draws laughter from the rest of the squad.\n\n  \"Here,\" says ${solname}, passing you a lemon. \"Suck on this, it'll help.\"\n\n  You do. It's bitter as hell, and the expression on your face only draws further laughter from the squad, but it does help.\n  \n  Some of them - Ada, Ryan, Damian, Leland - make ready to go for a second round.\n\n  \"Never been drunk before, hey?\" asks ${solname}.\n\n  *fake_choice\n    #\"Yes.\"\n    #\"No.\"\n    #\"Not like this.\"\n\n  $!{solname} smiles and laughs and slumps beside you.\n\n  The night continues, and you become quite aware of ${solname}'s arm, draped over your shoulders.\n\n  *goto night_end\n\n*label night_end\n*page_break\n\nLater, past midnight, things are winding down. The Captain had left, a few hours ago, with a final warning for everyone to be ready in the morning.\n\nThat is sobering enough, it seems. The squad files out of the club, \n*if ch2_solar_romance = \"none\"\n  with you and Ryan supporting Damian. \"I love you guys,\" he drawls.\n \n  \"We love you too, buddy,\" Ryan tells him.\n  *goto night_end3\n \n*else\n  with ${solname} at your side.\n  *goto night_end2\n\n*label night_end2\n\nEven so, on the way out, there's songs and jokes, although you're sure that Naomi is out of time and that Ryan is getting his punchlines wrong.\n\nOutside, in the cold night air, Leland lights up a cigarette.\n\nAda reaches out and plucks it from his lips. Without a word, she crushes it beneath her boot.\n\n\"You're right,\" he says, \"It's a disgusting habit. Been meaning to quit for months now...\"\n\n*if ch2_solar_romance = \"aljinn\"\n  \"They're quite a pair, huh?\" says Naomi, smiling slightly, and giving you a little nudge with her elbow.\n  *goto night_end2a\n\n*elseif ch2_solar_romance = \"courser\"\n  \"I'll never understand those two,\" Damian says.\n  *goto night_end2a\n\n*else\n  \"She's the only one who could do that without getting on Shift's bad side,\" Ryan says.\n  *goto night_end2a\n\n*label night_end2a\n*line_break\n\"Someone for everyone, I guess,\" you reply.\n\n\"Yeah. Yeah, that's true. And speaking of someone for everyone, ${first_name}...\" ${solname} lets the rest of the sentence hang in the air.\n\nYou're suddenly aware that you're about to cross some great point of no return, falling into the accretion disk of mutual attraction that surrounds ${solname}. $!{solhis} ${soleye} eyes are so close to your own...\n*choice\n  #Fall into it and see where things go.\n    *goto night_end2aa\n  #Dip into it, but leave with a kiss. Too soon.\n    *goto night_end2ab\n  #No, this is wrong.\n    *set ch2_solar_romance \"none\"\n    *goto night_end2ac\n\n*label night_end2aa\nYou fall into the heady inertia of attraction and let it take you wherever it will.\n\nYou end up back in HQ, outside ${solname}'s quarters, arms around each other. ${solname} fumbles with the biometric lock, and then you're both inside.\n\nYou fall into the bed and know, then and there, even if it's only the alcohol, that you want to know everything about ${solname} - ${solhis} hopes, ${solhis} dreams, ${solhis} fears, everything that makes ${solhim} [i]${solhim}[/i].\n\nFor now, though, you'll settle for what ${solhe}'s like under ${solhis} clothes.\n\nWhat happens next is what happens next. It's awkward - you're maybe both a bit too drunk and a bit too overeager but, soon enough, that ceases to matter.\n\nThe next morning, you awaken next to ${solname}, knowing that you'll be ready for whatever Paradigm City can throw at you.\n*finish Chapter III: A New Paradigm\n\n*label night_end2ab\n*set ch2_romance_delay \"true\"\nYou pull up short, leaning in to kiss ${solname} on the lips, taking ${solhis} hand in your own.\n\n\"This has been fun, really, but I don't want to rush anything... I don't want to think it's just the alcohol...\"\n\n${solname} smiles, seeming to understand. \"I get it. It's only your first day and all. Not the time for inter-office romance just yet.\"\n\n\"Does the Captain frown on it?\"\n\n${solname} points to Blueshift and Anima, in close and wholly intimate conversation. \"Does it look like it?\"\n\nYou suppose not.\n\nYou return to your quarters, stopping only to give ${solname} another goodnight kiss.\n\nThe next morning, you awaken knowing that you're ready for the future - and whatever Paradigm City is going to throw at you.\n*finish Chapter III: A New Paradigm\n\n*label night_end2ac\nYou turn away, turning your eyes to a crack on the concrete that suddenly seems very interesting.\n\n${solname} smiles, seeming to understand. \"I get it. It's only your first day and all. Not the time for inter-office romance just yet.\"\n\n$!{solhe} walks you home, regardless, but it doesn't go any further.\n\nYou sleep soundly. The next morning, you awaken, ready for the future - and whatever Paradigm City is going throw at you.\n*finish Chapter III: A New Paradigm\n  \n*label night_end3\nEven so, on the way out, there's songs and jokes, although you're sure that Naomi is out of tune and that Ryan is getting his punchlines wrong.\n\nOutside, in the cold night air, Blueshift lights up a cigarette.\n\nAnima reaches out and plucks it from his lips. Without a word, she crushes it beneath her boot.\n\n\"You're right,\" he says, \"It's a disgusting habit. Been meaning to quit for months now...\"\n\nThe squad - more of a motley, drunken group at this point - wanders back towards HQ.\n\nYou sleep soundly. The next morning, you awaken, ready for the future - and whatever Paradigm City is going to throw at you.\n*finish Chapter III: A New Paradigm\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n  *label purchased\n  *return\nRemember earlier how we told you that the first chapter is available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n  *subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2017-04-14 $4.99 $2.99 purchased\n*abort", "startup": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n*title Paradigm City\n*author James Rhoden\n*scene_list\n  startup\n  capetown\n  solar\n  $ city\n  $ metamorphosis\n  $ nemesis\n  $ apotheosis\n\n*create cape_name \"?\"\n*create title \"?\"\n*create first_name \"New\"\n*create last_name \"Hero\"\n*create Gender \"?\"\n*create phe \"he\"\n*create phim \"him\"\n*create phis \"his\"\n*create man \"man\"\n*create men \"men\"\n*create sir \"sir\"\n*create guy \"guy\"\n*create Orientation \"?\"\n*create Age \"?\"\n*create parent_status \"?\"\n*create sentinel_relationship 50\n*create oconnell_rela dden 15 O'Connell's Warning\n  hidden\n  Heard the warning from an old friend.\n  \n*achievement vigilante hidden 10 Vigilante Justice\n  hidden\n  Brought in a wanted criminal.\n  \n*achievement romance hidden 10 Workplace Romance\n  hidden\n  Got into a workplace 'entanglement'.\n  \n*achievement sparecourse hidden 20 Love Thy Enemy\n  hidden\n  Let Courser live, despite his treachery.\n  \n*achievement benchanima hidden 10 Benched!\n  hidden\n  Benched Anima due to her volatile nature.\n  \n*achievement teamwork hidden 10 Cheating the System\n  hidden\n  Showed a villain the power of teamwork.\n \n*achievement chevromance hidden 15 All-American\n  hidden\n  Completed the game in a romance with Chevalier.\n  \n*achievement jinnromance hidden 15 Mind Over Matters\n  hidden\n  Completed the game in a romance with Al-Jinn.\n  \n*achievement courseromance hidden 15 Coursing\n  hidden\n  Completed the game in an ill-fated romance with Courser.\n  \n*achievement noromance hidden 20 Pure Professional\n  hidden\n  Completed the game with no romances.\n  \n*achievement noirish hidden 15 Luck Of The Irish\n  hidden\n  Completed the game without romancing one of the O'Connell twins.\n  \n*achievement end hidden 50 The End\n  hidden\n  The End!\n\n*achievement totalfail hidden 10 Destiny Averted\n  hidden\n  Failed at the first possible point - way to go, hero.\n\n*achievement badend hidden 10 Sentinel's Victory\n  hidden\n  You hesitated. Sentinel didn't.\n\n*achievement sentally hidden 35 Sentinel's Ally\n  hidden\n  Formed a working relationship with your nemesis.\n\n*achievement goodend hidden 50 Paradigm Calling\n  hidden\n  Solved the whole case.\n  \n*achievement ch3_firstclue hidden 10 A Golden Clue\n  hidden\n  Found the first clue.\n  \n*achievement ch3_cluetwo hidden 10 A Golden Rat\n  hidden\n  Found the second clue.\n\n*achievement ch3_cluethree hidden 10 A Golden Flag\n  hidden\n  Found the third clue.\n\n*achievement ch1_punch_win hidden 15 KO!\n  hidden\n  Set
