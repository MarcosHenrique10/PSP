 different way to your knuckles. Wounded flesh heals cleaner than wounded pride.\n  *goto postfightfred\n*elseif (ch1_fought_fred_draw = \"true\")\n  but you finished it. In the future, he'll hopefully remember not to run his mouth off. Still, you're going to have a few bruises. Worth it, though, and you'll wear them like war scars for a while.\n  *goto postfightfred\n*elseif (ch1_fought_fred_powered = \"false\")  \n  But you didn't rise to his bait and you know that it is something to be proud of. From a young age, one rule has been clear: you do not use your powers on people without their consent, and certainly not in anger. There's a certain saying about power and responsibility, and another one about power and corruption. Both apply in this instance.\n  *goto postfightfred\n*else \n  but you finished it, with no possibility for any doubt. In the future, he'll hopefully remember not to run his mouth off. That adulation doesn't hurt, either.\n  *goto postfightfred\n  \n*label postfightfred\n\nAs you finish setting up the tent, driving each peg into the ground while imagining it's Frederic's face, you think...\n\n*fake_choice\n  #That you'll always have to worry about bigoted people like him.\n  *if (ch1_fought_fred = \"false\") \n    #That you should have hit him.\n  *if (ch1_fought_fred_powered = \"true\")\n    #That you should have hit him instead.\n  *if (ch1_fought_fred_powered = \"false\") \n    #That you should have taught him a lesson with your powers.\n      *set power+1\n  *if (ch1_fought_fred_powered = \"true\") \n    #That you overreacted by blasting him.\n  *if (ch1_fought_fred_lost = \"true\") \n    #That you're lucky Alan had your back.\n  *if (ch1_fought_fred_lost = \"true\") \n    #That you should have let him go - the pain wasn't worth it.\n  *if (ch1_fought_fred = \"false\") \n    #That you're just glad no one was hurt.\n  #What happened, happened and there's little point worrying about it.\n  \nThe thought settles in the crevices of your brain and refuses to go away. You did what you did and you'll need to live with it - no one's ever heard of an empowered individual with the ability to affect time.\n\n*page_break\n\n*label bythecampfire\n\nLater, you're fending off the cool night's breeze by the campfire.\n\nIt's so much more peaceful out here than it is in the Academy. You can even see the stars, name some of the constellations. You can hear your friends laughing and joking, see them roasting marshmallows. A few of them wave to you, inviting you to come join a particular circle.\n\n*if {bravado = 1}\n  It's strange. You feel strikingly out of place. It's only occurred to you now, now that you're supposed to be spending time with your classmates outside of the walls of Capetown, how little you actually know any of them. You stare into the flames, not so entranced by them - more finding a way to put off that social awkwardness.\n  *goto bythecampfire2\n*else\n  You wave back. You might not know them all as well as you'd like, but you know their names and faces. Some of them, you've known since childhood. And, in a few months, some will be leaving. It's sobering.\n  *goto bythecampfire2\n  \n  \n*label bythecampfire2\n*line_break\n*line_break\nBy now, the memory of the confrontation with Frederic has faded into little more than a dull ache, and only when you prod at it - like a sore tooth. And, much like a sore tooth, there's a certain satisfaction in prodding at it.\n\nSomeone sits down beside you.\n\n\"Hey. Are you okay?\" It's ${ocname}.\n\n*fake_choice\n  #\"Yeah.\"\n    \"Awesome,\" ${ocname} says, grinning. \"I don't want your night to be ruined by your afternoon, y'know?\" ${oche} stretches idly, getting comfortable next to you.\n  #\"Not really - I'm still thinking about that guy, Frederic...\"\n    \"He was a bastard, don't stress about it,\" ${ocname} says as ${oche} gets comfortable beside you. \"No one else is.\" \n\nThe scarlet glow from the fire almost makes ${ochis} face seem the same color as ${ochis} hair. $!{Ochis} green eyes catch your own and ${oche} turns away, focusing on the flames.\n\n\"It's just-\" You shake your head, \"maybe if I wasn't here, it would have gone differently...\"\n\n\"Yeah, maybe. Maybe he would have kicked all of our asses. Come on, don't worry about it.\" ${Oche} waggles a bag of marshmallows at you in a vaguely enticing manner.\n\n\"I just wonder why you invited me, that's all. I didn't think the trip would go this way.\"\n\n*if (ch1_oconnell_romance = \"Alan\")\n ${ocname} laughs. \"What, you think I wouldn't invite you along for a weekend away? Come on, let's crack open these marshmallows and get roasting. It's a camping trip, not a moping trip.\" He catches your eyes again, grinning at his own joke.\n *goto kiss1\n*elseif (ch1_oconnell_romance = \"Dawn\")\n ${ocname} grins, the corners of her lips quirking ever so slightly. \"Well, I could spend my time with someone else, if you'd like. I'll happily take these marshmallows somewhere less mellow.\" That grin on her face tells you she's much too pleased with her own humor. \n *goto kiss1\n*elseif (brawn > bravado) and (brawn > brains)\n ${ocname} looks at you like you've grown a second head. \"Uh, maybe it's because you were the senior boxing champ?\"\n *goto kiss1\n*elseif (bravado > brawn) and (bravado > brains) \n ${ocname} stares at you for a moment. \"What, you didn't think you'd get invited? With all those parties? People want you around.\"{$oche} grins. \"As hard as that can be to believe, I know.\"\n *goto kiss1\n*elseif (brains > brawn) and (brains > bravado) \n ${ocname} lets out a long breath and ${ochis} eyes remain on the fire. Eventually, ${oche} says: \"It's because we worry about you, ${first_name}.\"\n *goto annoyed1\n*elseif (bravado = brains)\n ${ocname} shrugs. \"Even if you're a bit of a nerd sometimes, people still think you're cool.\"\n *goto kiss1\n*elseif (bravado = brawn)\n ${ocname} shrugs. \"You might be a jock, but you're fun to be around.\"\n up, looking incredulous. \"I know I'm not wanted at the Academy but I didn't think you'd be such an asshole about this. Goodnight, ${first_name}.\"\n\n    The rest of the trip feels awkward, like everyone's staring at you. ${ocname} appears to be done even attempting to befriend you and the pair of twins grow silent whenever you approach.\n\n    First the fight and then this. You wonder if it might have been better to stay home.\n   *goto senior_exam\n   \n*label kiss2\n*if (ch1_oconnell_romance = \"none\")\n  You lean in, and ${ocname} turns ${ochis} head so you merely graze ${ochis} cheek.\n\n  \"I'm flattered, really,\" ${ocname} says, giving you a weak smile. \"But I barely know you. I... I think I'm going to go, sorry. Keep the marshmallows.\"\n\n  You do, but they only serve to remind you of your mistake. You give them away and retire to your tent early.\n\n  First the fight and then this. You wonder if it might have been better to stay home.\n  *goto senior_exam\n*elseif (ch1_oconnell_romance = \"Dawn\")\n  *set ch1_kissoconnell \"true\"\n  It's a small, simple thing, really - kissing a friend in the faint light of a campfire and yet it felt like so much more at the time.\n\n  A subtle charge runs over you, from your core to the ends of your fingers - wholly different from your power and yet just as satisfying.\n\n  More so, even.\n\n  You spend the rest of the camping trip holding hands with ${ocname}, gazing into ${ochis} eyes, and thinking about what the future holds. Everything else becomes a blur of stolen glances and stolen time together, whenever you could get away from classes and tests.\n  *goto senior_exam\n*elseif (ch1_oconnell_romance = \"Alan\")\n  *set ch1_kissoconnell \"true\"\n  *set oconnell_relationship 85\n  It's a small, simple thing, really - kissing a friend in the faint light of a campfire and yet it felt like so much more at the time.\n\n  A subtle charge runs over you, from your core to the ends of your fingers - wholly different from t you find there.\n\n  You passed, with flying colors!\n  *goto twinfail\n  \n*label twinfail\n*page_break\n\nNews travels fast around the senior dorm, especially when marks are concerned. It doesn't take you long at all to know about everyone else - who's going, who's not, who's happy, who's indifferent...\n\n${ocname} made it, by the skin of ${ochis} teeth. But ${otherocsib} did not.\n\n\"Them's the breaks,\" ${otherocsib} says when you manage to catch ${otherochim} in one of the courtyards. \"Did my best, took my chances.\" ${otheroche} smiles but it's clearly forced and ${otheroche}'s hoping you don't notice.\n\nYou choose not to notice.\n\n${otherocsib} lets out a long breath. \"But sometimes doing your best doesn't matter when the deck's stacked, y'know?\"\n\nLater, once ${otherocsib} is gone, you realise that almost all of those unable to continue are laters.\n\n*goto nyc_vigilante\n\n*label nyc_vigilante\n*set age 19\n*page_break Time passes\nYou're nineteen. \n\nUsing the newfound freedom given to you by the Cadet Academy, where it feels like you've finally been recognised as an adult, you're walking the streets of New York City, the closest metropolitan center to the Academy. As close as it is, it's like a whole different world. Capetown had always been new and strangely sterile, all glass and steel, all smiling faces in manicured gardens. New York City is anything but.\n\nIn the past, the city had suffered. Urban centers seemed to draw capes like moths to a flame, many of them villains. They'd burn up but, in the process, be sure to drag as many people as they could into their ego-driven immolation.\n\nAs you wander the streets, what strikes you most is how [i]old[/i] the city feels, how the streets still bear witness to hordes of yellow groundcars that, in the near future, would surely be rendered obsolete by their hovering cousins.\n\nAnd the throngs of people, too. Capetown was a small community, close-knit. Here, you could lose yourself in the crowds - be anyone you want to be and no one would know better. You wonder if this is the sort of thing that some Capetown residents claim to miss, the ability to reinvent yourself.\n\nYou wonder if ${otherocsib} took advantage of that.\n\n*page_break\n\nYou cast your eyes over the crowd, wondering about their stories. Two men walking hand in hand, a busker playing a jaunty tune, a couple fighting on the corner but they're smiling at the same time...\n\nAnd then you paused, mid-stride. You caught a glimpse of a figure, someone you recognise from your classes as a wanted person with a warrant out for their arrest - an empowered fugitive and, what's more, they had a body count. Without their costume, they're just as anonymous as you are - or at least that's what they believe. They're one of the villains who had been sloppy during their prime, leaving behind traces of things like skin or hair, telltale things that annihilated any hope of true anonymity.\n\nThey move through the crowds like a shark among fish, only the fish have no idea of the threat in their midst.\n\nBut you do.\n\nYou remember them vividly.\n\n*fake_choice\n  #Manhattan Mike, wanted for a string of empowered robberies - most of which ended in bloodshed.\n    *set ch1_vigilante_target \"mike\"\n    *set vname \"Mike\"\n    *set vhe \"he\"\n    *set vhim \"him\"\n    *set vhis \"his\"\n    *set vman \"man\"\n  #Purgation, a pyrokinetic who saw all other empowered as fit only to be put to the torch - her torch.\n    *set ch1_vigilante_target \"purge\"\n    *set vname \"Purgation\"\n    *set vhe \"she\"\n    *set vhim \"her\"\n    *set vhis \"her\"\n    *set vman \"woman\"\n  #Taurine - an unfortunate portmanteau of taurus and marine, wanted for a string of bloody empowered assaults.\n    *set ch1_vigilante_target \"taurine\"\n    *set vname \"Taurine\"\n    *set vhe \"she\"\n    *set vhim \"her\"\n    *set vhis \"her\"\n    *set vman \"woman\"\n  \nYou'd recognise ${vhim} anywhere.\n\n*if (ch1_vigilante_target = \"mike\") and (ch1_camping_trip = \"true\")\n  Manhattan Mike. Small-time crook, making his living through the abuse of his powers. The kind of everyday person who makes people like Frederic afraid. People might not be able to grasp widespread destruction and chaos, but they can certainly comprehend someone stealing their possessions.\n  \n  That's what Mike did.\n  *goto onthetrail\n*elseif (ch1_vigilante_target = \"mike\") and (ch1_camping_trip = \"false\")\n  Manhattan Mike. Small-time crook, making his living through the abuse of his powers. The kind of everyday person who makes the average citizen afraid. People might not be able to grasp widespread destruction and chaos, but they can certainly comprehend someone stealing their possessions.\n  \n  That's what Mike did.\n  *goto onthetrail\n*elseif (ch1_vigilante_target = \"purge\")\n  Only the most infamous villains get a name like Purgation because only the most infamous would have the ability to retain it. One of the more well-known threats across North America, Purgation uses her pyrokinetic abilities to scourge every other empowered individual she encountered from the face of the earth. Whatever she's doing in New York City, you have no idea - but you're not going to let such a threat escape.\n  *goto onthetrail\n*elseif (ch1_vigilante_target = \"taurine\")\n  Taurine. She used to be part of the US army, a Lieutenant, that's what her file says. She started as a soldier, came into her powers on some Middle Eastern battlefield, and returned a villain. She was a tough one, too, with the combination of military training and her unusual ability - some variety of super-strength and toughness that allowed her to match any foe.\n  \n  She'd grow horns, too, according to the reports.\n  *goto onthetrail\n\n*goto onthetrail\n\n*label onthetrail\n\nYou keep your eyes on ${vhim} as ${vhe} slips through the crowd. $!{vhe} hasn't noticed you yet.\n\nA thought comes to you then, what if you were the one to bring ${vhim} in? You've done enough practice bouts at the Cadet Academy, been through plenty of hand-to-hand drills...\n\nAnd you'd have the drop on ${vhim}.\n\nBut maybe it'd be better to get some back up from the local precinct, just to be sure. ${vname} has killed before, after all.\n\n*choice\n  #Go after ${vhim} - ${vhe} might get away otherwise.\n   *set ch1_vigilante \"true\"\n   *goto vigilante_pursuit\n  #No, it's stupid - go for backup.\n   *goto police_station\n   \n*label vigilante_pursuit\n\n${vname} might be dangerous, but you'll be able to get ${vhim} before ${vhe} has the chance to use ${vhis} powers. You're sure of that.\n\nYou shadow ${vhim} down a few more streets, keeping out of direct sight. $!{vhe} continues doing what ${vhe}'s doing, going about ${vhis} evening, and you begin to wonder if there'll ever be a good opportunity.\n\nThen, ${vhe} slips into an alley, getting off the street.\n\nAs you close on ${vname}, you steel yourself. You'll only have one shot at this.\n\n*fake_choice\n  #You were going to arrest them.\n    *set ch1_vigilante_reason \"arrest\"\n    *set classical %+5\n    Even if ${vname} is a murderer, the law comes first. $!{vhe} must be taken into custody and made to stand trial. Anything else would, really, make you just as much of a threat as ${vhe} is.\n  #You were going to kill them.\n    *set ch1_vigilante_reason \"kill\"\n    *set classical %-10\n    ${vname} is too dangerous to be left alive. And, given ${vhis} body count, there's no doubt that ${vhe} will just make you another statistic if given the opportunity. There's no point in pulling your punches, because you're pretty sure ${vhe} won't.\n\nYou're ready for the prospect of a fight, adrenaline buzzing through your veins, your blood pounding in your ears and little pops of static charge bursting around your fingers.\n\nUnfortunately, it all goes wrong. As you step into the alley, you find yourself staring into ${vhis} eyes.\n\n*if (ch1_vigilante_target = \"mike\")\n  Manhattan Mike isn't that much older than you and he wears an easy smile. \"Shit, kid, you've gotta do better than that to fool me. Hold up, let's talk about this like adults.\"\n  *fake_choice\n    #Hear him out.\n      *set classical %+10\n      \"Sure,\" you say, \"I'm listening.\"\n      \n      \"Look, kid, I get what you're trying to do - bring in the big bad Manhattan Mike and all, but I can tell when someone's shadowing me.\"\n      \n      He pulls something slim and black into his hand, points it at you. It's a strange feeling, realising that you're staring down the barrel of a gun.\n      \n      The realisation allows you to draw out all the energy you need, and send it lashing out at him at the same time he pulls the trigger.\n      \n      Something punches you in the chest and you tumble to the ground.\n      *page_break\n      \n    #Blast him, now's your chance!\n      *set classical %-10\n      \"No deal,\" you reply, and let a torrent of lightning lash out from your fingertips.\n      \n      At the same time that Mike pulls something from his back pocket.\n      \n      The air is filled with the distinct 'pop pop' sound of a handgun.\n      \n      Something punches you in the chest and you hit the ground.\n      *page_break\n\n  You reach for your chest and your hands come away red and slick and warm. You've been shot - the realisation almost makes you laugh but the stabbing pain in your chest cuts it short, turns it into a wheezing gasp.\n    \n  As your vision fades, the last thing you hear is the squealing report of approaching sirens.\n  \n  *goto hospital\n*elseif (ch1_vigilante_target = \"purge\")\n  \"I could smell it on you,\" Purgation remarks, \"The power.\"\n  \n  For someone with such a bloody reputation, it's hard to believe that the thin, middle-aged woman before you is such a threat. And yet, when she brushes her spectacles up her nose and watches you, you're sure that you're a field mouse staring up at an owl, hoping that it won't deign to devour you.\n  \n  You read it in her eyes before she does so, and as fire leaps to her command, brought into existence around her fingertips, you're already summoning up a crackling arc of electricity.\n  \n  She's faster than you, has more control of her powers than you - and she flicks a burning orb into your chest.\n  \n  *page_break\n  \n  The pain is indescribable, but only for a moment. You fall to the ground, yelling, remembering the most useful adage for the situation: stop, drop and roll. The pain vanishes and then, as you glance down, you can clearly see your ribs through your shirt, outlined by blackened, charred flesh.\n  \n  Purgation steps towards you, hands awash in flame, the fire reflected in her spectacles. \"We shouldn't exist,\" she claims. \"We're a cosmic mistake, one that will only end in fire.\"\n  \n  She raises her hand, little more than a shimmering shape amidst a white-hot fiery haze.\n  \n  Without a second thought, you blast her with a powerful burst of electric power. She burns too, as it turns out, although her own blast goes askance. The alley erupts into flames.\n  \n  You manage to stagger clear of the smoke, collapsing to the sidewalk.\n  \n  As your vision fades, the last thing you hear is the squealing report of approaching sirens.\n  \n  *goto hospital\n  \n*elseif (ch1_vigilante_target = \"taurine\")\n  \"Well, well, well,\" Taurine says, her voice deep, each syllable bitten off more than it's enunciated. \"I'm going to give you one chance to explain why you're following me before I break every bone in your body.\"\n  \n  \"I-\" You try to swallow the fear that's suddenly gripped your throat. It's not that she's taller than you, broader than you - it's that you've never seen anyone with eyes so [i]dead[/i].\n  \n  Taurine grins, like a shark. \"Thought so. Time to die, meat.\"\n  \n  As she lowers her head and sprints towards you, charging blindly, it occurs to you that she does, in fact, have a set of impressive horns.\n  *page_break\n  \n  You barely evade being gored on Taurine's horns. You don't evade the fist that finds your jaw, snaps your head around, makes you bite your tongue, blasts static through one of your eyes.\n  \n  She leaps high, driving her knee into your side. Your ribs shudder, some of them break, and each one sends a white-hot lance of pain through your torso. You stagger back, trying to suck in a breath but you're sure she's just punctured a lung, and Taurine howls her victory.\n  \n  She gives you two seconds to run, and then advances.\n  \n  You try to make for the exit of the alley behind you, but end up stumbling into the wall. You fall and a trash can clatters to the ground with you, drawing attention. A voice calls from the street and Taurine snaps to look at them, horns and all, before returning her attention to you.\n  \n  You just need a second to summon up your powers.\n  \n  Unfortunately, as electricity arcs between your fingers, you realise that Taurine isn't going to give you even that.\n  \n  *page_break\n  \"Any last words, little hero?\" Taurine gloats, her boot raised above your head.\n  \n  You slur something out, and use that gloating moment to blast Taurine square in the chest - arcing a phenomenal blast of energy right into her center.\n  \n  She's blown backwards, off her feet, like she'd gripped a transmission line. She crumples to the ground on the other side of the alley, smelling like cooked meat, smoke rising from her hair and horns.\n  \n  You want to rise but your body won't let you. Now, it's time to take it easy, like everything was little more than a pleasant, heady haze.\n  \n  It's so hard to breathe.\n  \n  As your vision fades, the last thing you hear is the squealing report of approaching sirens.\n  \n  *goto hospital\n\n*label hospital\n\n*page_break\n\nYou wake up staring at an unfamiliar ceiling.\n\n*page_break\n*achieve vigilante\n\nIt doesn't take long for you to realise that you're in a hospital. It isn't so much the smell of the place or the fact that you can hear nurses and doctors going about their business, nor is it the pain in your chest, but more the tubes in your arm that clue you in.\n\nYou're there for a few weeks, recovering from the\n*if (ch1_vigilante_target = \"mike\")\n  bullet that Mike put square into one of your lungs, inches from your heart. Even today, sometimes your chest aches, a reminder of how close you came to being nothing more than another statistic.\n  *goto hospital_2\n*elseif (ch1_vigilante_target = \"purge\")\n  fourth-degree burns you received, charred tissue and bone courtesy of Purgation's flames. Even today, sometimes your chest aches, a reminder of how close you came to being nothing more than another statistic.\n  *goto hospital_2\n*elseif (ch1_vigilante_target = \"taurine\")\n  three broken ribs and a punctured lung, dealt out by Taurine's savage blows, to say nothing of the concussion. Even today, sometimes your chest aches, a reminder of how close you came to being nothing more than another statistic.\n  *goto hospital_2\n\n*label hospital_2\n*line_break\n*line_break\nConfined to a bed, it gives you time to think about what happened. The ache in your chest asks you why you ever thought this was a good idea.\n\n*fake_choice\n  #\"I've been trained by the best, I'm ready.\"\n    *set ch1_vigilante_reason \"1\"\n  #\"I've spent so long cooped up, time to prove myself.\"\n    *set ch1_vigilante_reason \"2\"\n  #\"I'll show them all. After this, no one can doubt me.\"\n    *set ch1_vigilante_reason \"3\"\n\nWhether you still believe that now, it's hard to say - near-death experiences have a way of forcing a change in perspective.\n  \nYou even receive a minor commendation for your trouble. \"Your country thanks you for your service,\" a bland man says to you, standing at the foot of your hospital bed, wearing an equally bland uniform you don't recognise.\n\nStrange. Since when did capes get medals - and speeches - like a soldier would?\n\nBut recognition is recognition and, for a time, you don't think more about it.\n\nYou return to Capetown with a hero's welcome.\n\n*goto final_year\n\n*label police_station\n\nYou slip away through the crowds. No, it'd be stupid to go after someone like that without any backup. An experienced villain like ${vname} against an Academy cadet? $!{vhe}'d wipe the floor with you.\n\nThe local police precinct isn't far. Like most major cities these days, New York's capes are lawmen and not lawmakers. Gone are the days of rogue vigilantes, stopping crime without answering to anyone. These days, there's a bit of paperwork involved -  when heroes work within the law, it just makes it easier for everyone to relax.\n\nYou pass through the reinforced doors. Strangely, the local precinct seems far more deserted than you had expected - you don't see a single cape. It's so...\n\n...normal.\n\n*page_break\n\nIn a rush, you explain the situation to the officer on duty at the front desk. The word is passed, officers are gathered, local capes notified. The officers head out immediately, pouring into heavily-armored vans. You step to follow them but a glare - and the heavy weapons some of them are gathering, at that - is enough to bring you up short.\n\n\"Stay here, kid,\" an officer says, \"It might get a bit rough.\"\n\nYou don't get to go along.\n\nYou fall into a seat in the waiting area, and wait.\n\nYou end up counting the leaves on one of the plants.\n\nA brief glance at your watch tells you that an hour has passed.\n\nAnd so you wait.\n\n*page_break\n\nAnd you wait.\n\nOn the television, an evening political show is discussing capes. It draws your attention - after all, it's not like there's anything else to do.\n\n\"Over the past ten years we have seen an increasing militarisation of empowered individuals,\" one individual is saying. \"You've got the law enforcement, reports of national militaries forming up their own empowered units, rumors of those international 'go anywhere' teams. We're looking at a new atomic arms race, if you ask me.\"\n\n\"But you have to admit,\" the host says, \"violence against empowered individuals has decreased, and that's not even mentioning the practical elimination of the Golden Age epic villain for all intents and purposes. Less property damage, less civilian casualties... And the price of spandex is way down!\"\n\n\"Certainly, Kim, but the mortality rate in the incidents that still happen is much higher now. When you got right down to it, the Golden Age was just people in costumes doing some play-fighting. That is, excluding people like Annihilator or groups like The Seven, of course. We traded visible brawls for invisible deaths. Believe it not, capes used to pull their punches. That's one of the biggest changes we've seen over the past decade. Things looked bad then but few people were actually dying.\"\n\nThe host mugs for the camera. \"Well, I don't know about anyone else, but I was getting pretty tired of having to take my car to the shop every week! It's not like the capes ever wanted to foot my repair bill!\"\n\nThe audience laughs. Whatever point the guest is trying to make is drowned out. It gives you something to mull over, though, but not for long. Your eyes are torn to the sound of a commotion outside.\n\nPolice officers. A cape in blue and purple livery. A throng of reporters.\n\nYour quarry in heavy-duty metal cuffs. ${vname}.\n\nBy the looks of ${vhis} clothing, the purple blotches on ${vhis} face, the susurrus that murmurs words like 'casualties' and 'resistance', ${vhe} didn't come quietly.\n\nEventually, they bring the villain in. It's strange, though, because the people apprehending ${vhim} are wearing uniforms that strike you more like a soldier would wear than a cape - dark fatigues, helmets, plated armor.\n\n\"Thanks for the tip, kid,\" one of them grunts, barely in passing.\n\nIt's about all the recognition you get.\n\nIn the end, you go home with nothing to show for it.\n*goto final_year\n\n*label final_year\n*page_break Time passes\n*set age 20\n\nYou're twenty years old and someone is pounding on your door.\n\nIt's late, just around midnight, but it sounds urgent.\n\n*choice\n  #Open it\n    *goto final_chat\n  #Leave it\n    *if (ch1_oconnell_romance = \"Alan\")\n      \"Open up, ${first_name}! Please!\" It's ${ocname}.\n      *goto final_chat\n    *if (ch1_oconnell_romance = \"Dawn\")\n      \"Open up, ${first_name}! Please!\" It's ${ocname}.\n      *goto final_chat\n    *else\n      *set ch1_ignored_oc \"true\"\n      The knocking stops after a moment or two. You wait, but it doesn't return.\n    \n      You don't sleep soundly. \n    \n      *goto morning_after\n    \n*label final_chat\n\nYou pull the door open and ${ocname} enters, looking worried and dishevelled, ${ochis} red hair in disarray.\n\nYou step back and let ${ochim} pass. ${ocname} wanders over to your window, one which overlooks the rest of the Academy, and doesn't say anything.\n\nJust as you're preparing to say something, ${oche} opens ${ochis} mouth.\n\n\"I'm leaving.\"\n\n*fake_choice\n  #\"What?\"\n    \"You heard me - I'm leaving. Right now, before I change my mind.\"\n  #\"You can't just leave the Academy!\"\n    \"Sure I can. We're adults here, even if they don't treat us like that. I'm going to walk out right now, before I change my mind.\"\n  #\"Slow down a second, what's wrong?\"\n    \"All of it - this whole place. I can't stay here!\"\n\n*if (ch1_oconnell_romance = \"none\")\n\n  You have no idea why ${oche} came here, at this hour. You were never exactly close. $!{oche} seem to have the same thought.\n\n  ${ocname} turns to look at you. \"You know, I'm not sure why I even came to see you. Maybe it was because I could see the light under your door.\"\n\n  \"Do you want me to talk you out of it?\"\n\n  \"You can't. I can't go on like this, with the rules and the regs and the responsibility. What's the point? I'll never be on the level as some of the other people here - people like you. You've [i]no[/i] idea what it's like to have a nice little stamp on your file that says 'second-class hero'.\"\n\n  \"You can still be useful-\" There's things ${oche} could do, important things. Sure, ${oche}'d never put on the colorful costume and save the world, but you had to be the best for that.\n\n  ${ocname} stares at you. \"You really don't see it, do you? It's not about being [i]useful[/i], it's about doing what I want.\"\n\n  ${ocname} shakes ${ochis} head, laughing. \"Maybe I should have studied as hard as you did. At the very least it would've kept me from looking over the walls, what with my head in a book. Goodbye, ${first_name} - have a nice life.\"\n  \n  *page_break\n  \n  *goto morning_after\n\n*else\n\n  \"No, come on, let's talk about this...\"\n\n  But you can see ${ochis} green eyes, the resolution ${oche}'s already made. Something cold opens in your chest.\n\n  ${ocname} didn't come here to ask for your opinion, ${oche} came here to tell you ${ochis} plans.\n\n  \"Don't do this,\" you murmur.\n\n  ${ocname} catches your eyes with ${ochis} own. \"Don't make me stay, please. I'm suffocating here. You grew up with this, the rules, the regs, the responsibility... And it suits you, you're powerful, you'll go on to do great things - but not me. There's a big red mark on my record that says 'second-class hero'.\"\n\n  It's funny, really, how quickly a gulf stretches out between you and ${ochim}.\n\n  \"Please,\" ${ocname} says, softly. \"Come with me.\"\n\n  *fake_choice\n    #\"I-\"\n    #\"But-\"\n    #\"Wait-\"\n  \n  Your voice catches in your throat. You'll be graduating in just about a year. You can't leave, not now.\n\n  ${ocname} watches you, like ${oche}'s committing every line of your face to memory. \"No, I'm sorry, I can't ask that of you. Stay. Graduate, be the best damn hero you can be. Do that for me.\"\n\n  The gulf closes as ${oche} wraps you in a warm, tight hug. $!{ochis} lips find your own and the kiss is hungry, nervous, before giving way to a soft reassurance.\n\n  It's not long enough.\n\n  ${ocname} breaks away, giving you one last sad smile as ${oche} steps backwards, towards the door.\n\n  *fake_choice\n    #\"${ocname}...\"\n    #\"Wait, please...\"\n    #\"Be safe, okay?\"\n  \n  ${ocname} stands there, at the final threshold. \"Goodbye, ${first_name}. I love you. Take care of yourself - and thanks for making this place so much more bearable. I'll pay you back someday, promise.\"\n\n  And then ${oche}'s gone.\n\n  *goto morning_after\n\n*label morning_after\n\n*page_break\n\n*if (ch1_ignored_oc = \"true\")\n  The next morning, you find out that ${ocname} has left, like ${oche} just decided to wake up and walk out of the Academy without telling anyone why.\n  \n  You wonder if that was ${ochim}, last night.\n  \n  You wonder if you could have done something to help ${ochim}.\n  \n  Not that it matters, really. $!{ochis} name quickly becomes something of a rumor, with no one person having a single reason why ${oche} abruptly threw everything away.\n  \n  *goto brooding\n  \n*elseif (ch1_ignored_oc = \"false\") and (ch1_oconnell_romance = \"none\")\n  The next morning, the Academy is abuzz with gossip about ${ocname}'s abrupt departure.\n  \n  You're not sure what to say about it. You're still trying to figure out why they came to you, of all people.\n\n  Outwardly, you don't tell anyone a thing. It feels like it'd be wrong to betray ${ocname} like that, when ${oche}'d come to you as ${oche} had.\n  \n  Not that it matters, really. $!{ochis} name quickly becomes something of a rumor, with no one person having a single reason why ${oche} abruptly threw everything away.  \n  \n  *goto brooding\n\n*else \n  The next morning, the Academy is abuzz with gossip about ${ocname}'s abrupt departure.\n  \n  You were close to ${ocname}, that much everyone knew, and so you become everyone's go-to in ${ochis} stead.\n\n  Outwardly, you don't tell anyone a thing. It feels like it'd be wrong to betray ${ocname} like that, when ${oche}'d come to you as ${oche} had.\n  \n  *goto brooding\n  \n*label brooding\n\nInwardly, however, you dwell on it, brooding on the previous evening.\n\n*fake_choice\n  #$!{oche} did ${ochis} best.\n    *set ch1_oconnell_fail \"1\"\n    $!{ocname} did the best ${oche} could, and couldn't make it. There's no shame in that, is there?\n  \n  #$!{oche} should have tried harder.\n    *set ch1_oconnell_fail \"2\"\n    Everyone knew that the O'Connell twins didn't take things that seriously, and ${ocname} exemplified that. Maybe if ${oche}'d put more time into studying or perfecting ${ochis} powers...\n  \n  #$!{oche}'s free - able to do what ${oche} wants.\n    *set ch1_oconnell_fail \"3\"\n    ${ocname}'s words resonate with you, even now. You've never really questioned [i]why[/i] things are how they are, [i]why[/i] you need to be so controlled just because of what you are.\n    \n    Maybe you should have gone with ${ochim}, forced the issue.\n  \n  *if (ch1_oconnelljoke = \"true\")\n    #Screw them. $!{oche} got what ${oche} deserved.\n      *set ch1_oconnell_fail \"4\"\n      Your mind returns to $!{ocname}'s feigned pity, back on the camping trip. Did ${oche} expect the same from you? Some reassurance that things would be 'okay'? $!{oche} got exactly what ${oche} deserved.\n    \nStill, no matter how much you think about it, how many questions you put up with, you never see ${ocname} around the Academy again.\n\n*goto graduation\n\n*label graduation\n\n*page_break Time passes\n*set age 21\n\nYou're 21 and it's a bright, pleasant morning. \n\nAll things have led to this moment.\n\nIt's time to graduate.\n\n*if (((((brains = 1) and (bravado = 1)) and (ch1_vigilante = true)) and (ch1_fought_fred_powered = true)) and (sentreason = 5))\n  *page_break\n  *achieve totalfail\n  Only, you never did.\n  \n  At the final moment, a set of armed individuals in uniforms you never used to recognise took you into a room within the Capetown administrative area. There, others in uniforms that were just as alien set out the facts, and your fate.\n  \n  You weren't smart enough to be a cape. You weren't charismatic enough. Of course, those were just the minor points, the feigned 'failed responsibility' on their part which is nothing more than an attempt to ease the pain of the knife slipping between your ribs. The fact that you had engaged in unauthorised vigilante justice in New York was bad enough, but something that could have been swept under the rug - if the powers that be had wanted it so.\n  \n  But they didn't, because they didn't want you.\n  \n  From a public relations standpoint you were, at the end of the day, a liability.\n  \n  You end up with an administrative position in Capetown, keeping you out of sight and out of mind, somewhere where you're told you're working for 'the greater good' while doing nothing in particular. Your powers, eventually, fade away to nothing.\n  \n  You do meet Sentinel again, however.\n  \n  \"Like I said,\" ${senhe} says, voice dripping with contempt, \"I knew you'd find your place in life.\"\n  *goto_scene ending\n\n*else\n  *goto ch1_graduation\n\n*label ch1_graduation  \n*page_break\n\nIt's a rather boring ceremony, all things considered, and one you'd already seen in almost any college film you'd watched in the years that led up to it. There's a lot of sitting, a lot of photos - your parents don't attend, of course.\n\nYou feel their absence, sitting just to the left of you whenever a camera flashes. And you feel the absence of ${ocname}, too, who should have been to your right.\n\nEventually, the ceremony drags to a close and you're buried with paperwork.\n\nIt's a metaphor, of course. Very few things are done on paper anymore, and this is no exception. Part of you, however, would have liked to sign off on something - make it feel more official.\n\nInstead, you're checking boxes to prove that everything on the electronic form is correct to the best of your understanding. Your whole life, rendered down into keywords, numbers and a record of achievements.\n\nYou check everything and check it again, just to be sure. Finally, you reach the part of the form you've been dreaming of for twenty-one years.\n\nYour cape name, the name that the world will know you by.\n\nIt'll be checked against a computer database, of course, just to make sure there's no issues of trademark infringement. After all, there's clothes, action figures, books to be made from your name and likeness now. People like their heroes and merchandise helps keep the whole system running.\n\nWhat name did you pick?\n\n*goto capename\n\n*label capename\n\n*choice\n  #I entered...\n    *label capenameenter\n    *input_text cape_name\n    *if (((((((((cape_name = \"Blueshift\") or (cape_name = \"Aegis\")) or (cape_name = \"Chevalier\")) or (cape_name = \"Al-Jinn\")) or (cape_name = \"Courser\")) or (cape_name = \"Anima\")) or (cape_name = \"Sentinel\")) or (cape_name = \"Mirage\")) or (cape_name = \"Phaestus\"))\n      [b]NOTICE:[/b] Designation is already in use by a registered cape. Please select another.\n      *goto capenameenter\n    *else\n      ${cape_name}, is that correct?\n      *choice\n        #Yes.\n          *goto endpart\n        #No.\n          *goto capename\n          \n*label endpart\n\nYou submit the paperwork.\n\nFrom there, there's nothing to do but wait.\n\n*page_break\n\nA few days later, you're summoned to a part of Capetown you've never entered before. New, only built in the last few years, You'd always figured it was a new auditorium or dormitory or training hall. But, as you cross the lawn towards it, you realise it's none of those things.\n\nYou wait in an office, the name on the deskplate familiar yet surely impossible. Somehow, this isn't anything like you imagined it, but you remind yourself that there'd have to be a certain level of paperwork involved.\n\nEventually, you're greeted by a man in the blue and grey uniform that makes you think of a soldier or a policeman. It takes you a moment but you glean some measure of recollection in their leathery face. Mr. Matsuda, your old history teacher from the junior academy.\n\n\"Well, isn't this a surprise! ${first_name}! Forgive me, that should be ${title} ${last_name}, of course! I haven't seen you in years!\"\n\n\"Is something wrong?\"\n\n\"Not at all! No, I've been told to inform you that your papers have come in - congratulations, ${cape_name}.\"\n\nHe slides those papers across his desk. You snatch them up, eager to see where you'll go from here. Questions bounce around your brain: what city will you be assigned to; what kind of costume will you get to design; what big names will you be serving with?\n\nYou leaf through it once, thinking that something's missing. Twice, thinking that there's been a mistake.\n\n\"I... don't see anything here about my apprenticeship to a hero or my uniform or even my jurisdiction...\"\n\n\"That,\" Matsuda says, steepling his fingers together, \"Is at the discretion of your new commanding officer, and you'll get the same uniform as anyone else. That's only until you get settled in, of course. You might want to check the third page again.\"\n\nYou do so.\n\n*page_break\n*if brawn >2\n  *achieve ch1_jock\n  *goto ch1_final\n  \n*if bravado >2\n  *achieve ch1_party\n  *goto ch1_final\n\n*if brains >2\n  *achieve ch1_nerd\n  *goto ch1_final\n  \n*label ch1_final\nIt still doesn't make any more sense to you, even if the words are perfectly legible.\n\n\"Captain Lorna Ng-Mae? Ninth Unit? I don't remember signing up for the infantry. I've never heard of this SOLAR group.\"\n\n\"Same business, different managers,\" Matsuda says, sounding apologetic. \"${first_name}, I can see that this isn't what you expected. There's been - ah, how to put this - a fair amount of [i]restructuring[/i] over the past few years. I've been arguing that we should make it more apparent but, well, I'm just one old man.\"\n\nHe shakes his head and, with that movement, suddenly seems tired, old. \"Things have changed,\" he says. \"The wheels of history are being turned one way and if we don't turn [i]with[/i] them we'll be crushed [i]beneath[/i] them. You always wanted to be like Sentinel, I remember when you met ${senhim}. SOLAR is the best of the best - everything you've wanted is still right here. You still get the name, you still get an outfit. But it's the new way of doing it, the politically convenient way of doing it.\"\n\nYou're not sure what to say. Ultimately, there's no choice and nowhere to go but forwards. The rest of the conversation doesn't really come to you in the dream - just flashes of words, fragments of emotions.\n\nBut you remember one thing quite clearly, a thought that sticks to your hindbrain upon waking.\n\nWhile you grew up behind the walls of Capetown, the golden age of epic heroes had ended. \n*achieve chp1\n*finish Chapter II: SOLAR", "choicescript_description": "The Golden Age of heroes is over, but you're just beginning. Will you use your powers to help the world or help yourself? Set on a near-future Earth that has been irrevocably altered by the arrival of superhumans, the world has been dealing with a radical shift in the nature of humanity. For thirty years, those with world-altering powers - referred to as capes - have been at the forefront of the world's media. There's been heroes, there's been villains, and there's been world-shattering confrontations when those two groups came into contact. For a time, those individuals walked the world like modern deities. For a time, it was good.\n\nBut things change. Given time, all things resolve to entropy.\n\nThe Golden Age is over. The player, a member of the newest graduating class of an international academy for powered individuals, needs to find their place in this new world, and whether that place will be determined by their own hand - or by the machinations of others. Assigned to the troubled Paradigm City, it'll be up to the player to determine whether their name becomes a byword for fame or infamy, idealism or pragmatism, and loyalty or ambition.\n\n[i]Paradigm City[/i] is a 110,000 word interactive fantasy novel by James Rhoden, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n• Play as male, female or non-binary, straight, gay or bi![n/]\n• Experience your life from youth to the end of your first big mission![n/]\n• Multiple endings, with differences both big and small! How will your actions affect the future of the world?[n/]\n• Utilise the three precepts of epic heroism - brawn, bravado and brains - to solve challenges![n/]\n• Increase the potency of your electrokinetic superpower to overcome dangerous threats![n/]\n• Work with a team of elite heroes to solve a mystery - your relationships with them will determine their fates, and whether you'll learn their stories.[n/]\n• Uncover and unveil a conspiracy, or work to use it for your own ends![n/]\n• Embrace the traditional values of the classical crusader, or embody the cutting-edge pragmatics of modern powered heroes![n/]\n• Sixty achievements![n/]\n• Three romance options to choose from - or don't, and keep things strictly professional!\n", "choicescript_stats": "*comment This is a stats screen!\n*label statscreen\n[b]///CLASSIFIED FILE[/b]\n*line_break\n[b]UNITED NATIONS INTERNATIONAL POWERED SECURITY AGENCY[/b]\n*line_break\n[b]DATABASE ACCESS: GRANTED[/b]\n*line_break\n*line_break\nWelcome, ${title} ${first_name} ${last_name}.\n\n[b]IDENTITY[/b]\n*line_break\n[b]${cape_name}[/b]\n*line_break\n[b]Ability:[/b] Electrokinesis (Beta-class)\n*stat_chart\n  text Age\n  text Gender\n  opposed_pair Classical\n    Modern\n\n[b]Vital Statistics[/b]\n*stat_chart\n  text Brawn\n  text Brains\n  text Bravado\n  text Power\n*line_break\n[b]Brawn[/b] measures your physical strength and your ability to leverage it over others. A high brawn rating reflects physical strength, endurance and stamina.\n*line_break\n[b]Brains[/b] measures your academic knowledge and your ability to think on your feet. A high brains rating reflects the ability to think quickly on your feet, critical-mindedness and a wide breadth of academic knowledge.\n*line_break\n[b]Bravado[/b] measures your social acumen and your comfort in social situations. A high bravado rating reflects self-confidence, a personable demeanour and honed charisma.\n*line_break\n[b]Power[/b] represents your ability to wield your ability, both in terms of direct output and for fine control that dictates more esoteric or complex uses.\n\n[b]Relationships[/b]\n*if ch1_met_sentinel = \"true\"\n  *stat_chart\n    percent sentinel_relationship Sentinel\n  *if ch1_met_oc = \"true\"\n    *stat_chart\n      percent oconnell_relationship ${ocname}\n  *if ch2_met_solar = \"true\"\n    *stat_chart\n      percent aegis_relationship Aegis (Lorna)\n      percent aljinn_relationship Al-Jinn (Naomi)\n      percent blueshift_relationship Blueshift (Leland)\n      percent chevalier_relationship Chevalier (Ryan)\n      percent courser_relationship Courser (Damian)\n      percent anima_relationship Anima (Ada)\n*line_break\n*if ch2_solar_files = \"true\"\n  [b]SOLAR Personnel Dossiers[/b]\n  *choice\n    #AEGIS - Team Leader\n      Full Name: Lorna Ng-Mae\n      *line_break\n      DOB: 02/03/2009 (Age 51)\n      *line_break\n      Place of Birth: Guangzhou, China\n      *line_break\n      Education: Tertiary\n      *line_break\n      Powers: n/a\n      *line_break\n      IPSA Rating: n/a\n    \n      Additional: Captain Ng-Mae is recognised as a fine commander although ill-suited to diplomacy. Her posting to SOLAR is understood to be a political move to stymie her career following the African Purges of 2039 (cf. Arusha Incident). Since then, she has served dilligently albeit with sarcastic alacrity. On multiple occasions, the capes under her command have complimented her leadership ability.\n      *choice\n        #Back to Statistics.\n          *goto statscreen\n    #AL-JINN - Team Medic\n      Full Name: Naemah al-Fadil\n      *line_break\n      DOB: 06/07/2034(Age 27)\n      *line_break\n      Place of Birth: Cairo, Egypt.\n      *line_break\n      Education: Tertiary\n      *line_break\n      Powers: Neural Strata Manipulation\n      *line_break\n      IPSA Rating: Beta-class.\n    \n      Additional: Al-Jinn's talents make her supremely suited for both field work and behind the scenes investigation. Al-Jinn tends to hew to the latter if only because psychological profiling reveals a deep fear of losing control of her power. She serves as Captain Ng-Mae's adjutant and representative. Adopted the name Naomi following her assingment to SOLAR.\n      *choice\n        #Back to Statistics.\n          *goto statscreen\n    #ANIMA - Team Assault Specialist\n      Full Name: Ada Okoye\n      *line_break\n      DOB: 12/12/2033 (Age 28)\n      *line_break\n      Place of Birth: Arusha, Tanzania\n      *line_break\n      Education: Tertiary\n      *line_break\n      Powers: CLASSIFIED\n      *line_break\n      IPSA Rating: CLASSIFIED\n    \n      Achievements: CLASSIFIED\n    \n      Additional: File is classified under Executive Order 47.\n      *choice\n        #Back to Statistics.\n          *goto statscreen\n    #BLUESHIFT - Team Strategist\n      Full Name: Leland Cross\n      *line_break\n      DOB: 23/04/2029 (Age 32)\n      *line_break\n      Place of Birth: Los Angeles, United States of America\n      *line_break\n      Education: Secondary\n      *line_break\n      Powers: Telekinetic Field Manipulation\n      *line_break\n      IPSA Rating: Beta-class.\n    \n      Additional: Blueshift's caustic personality is matched only by his insight. While a potently adaptive asset on the field with his powers, and as a strategic deterrent when dealing with larger operations, Blueshift's real benefit is the wealth of knowledge he brings to the table on many of the more esoteric topics concerning empowered individuals and their history.\n      *choice\n        #Back to Statistics.\n          *goto statscreen\n    #CHEVALIER - Team Close-Quarters Combat Specialist\n      Full Name: Ryan Blackwood\n      *line_break\n      DOB: 01/03/2035 (Age 26)\n      *line_break\n      Place of Birth: London, England\n      *line_break\n      Education: Secondary\n      *line_break\n      Powers: Enhanced Durability, Invulnerability Factor (class-C), Superior Strength\n      *line_break\n      IPSA Rating: Alpha-class.\n    \n      Additional: Operated as an independent UK-based empowered hero (Alias 'Protectron') prior to joining SOLAR (cf. KINGSMEN). Even prior to joining SOLAR, Chevalier has distinguished himself by bringing in a number of dangerous villains and other threats, including Collider, Lady Stormfist, Vortex and Echopraxic, by defeating and subduing them in one-on-one melee duels.\n      *choice\n        #Back to Statistics.\n          *goto statscreen\n    #COURSER - Team Infiltration Specialist\n      Full Name: Damian Alexander\n      *line_break\n      DOB: 12/06/2037 (Age 24)\n      *line_break\n      Place of Birth: Baltimore, United States of America\n      *line_break\n      Education: Tertiary\n      *line_break\n      Powers: At-Will Insubstantiability\n      *line_break\n      IPSA Rating: Beta-class.\n    \n      Additional: Courser is known as one of the faces of SOLAR, having made a career that has been built upon a foundation good-natured charisma. His public appearances afford him plentiful opportunities to network with SOLAR operatives and independent capes. He is battle-tested and rather experienced with small-unit tactics which suits his general approach of striking from oblique angles. He is a Capetown graduate, having been accepted after being picked up off the streets of Baltimore.\n      *choice\n        #Back to Statistics.\n          *goto statscreen\n    *if ch3_paradigm_files = \"true\"\n      #SENTINEL - Head of Paradigm City's Empowered Law Enforcement\n        Full Name: [b]CLASSIFIED[/b]\n        *line_break\n        DOB: [b]CLASSIFIED[/b]\n        *line_break\n        Place of Birth: [b]CLASSIFIED[/b]\n        *line_break\n        Education: [b]CLASSIFIED[/b]\n        *line_break\n        Powers: Superior strength, speed and agility, invulnerability factor (class-B), flight\n        *line_break\n        IPSA Rating: Alpha-class.\n    \n        Additional: One of the most well-known empowered heroes and cape authorities, Sentinel has defended the world for over twenty years, first as Demigod's apprentice, and now as the de facto head of Paradigm City. Sentinel is an outspoken advocate of relaxing restrictions on empowered individuals and an outspoken critic of IPSA, SOLAR and related organizations. Despite ${senhis} reputation, allegations of brutality surfaced in the aftermath of Sentinel's campaign to dismantle the South American empowered terrorist organisation known as Kukulkan's Hand. Sentinel's lieutenants are said to be Phaestus, a metatech engineer, and Mirage, whose abilities are still to be conclusively determined.\n        *choice\n          #Back to Statistics.\n            *goto statscreen\n    *if ch4_exarch_file = true\n      #THREATFILE - EXARCH\n        Full Name: Santiago Idarraga\n        *line_break\n        DOB: 20/06/2029 (Age 28)\n        *line_break\n        Place of Birth: Monterrey, Colombia\n        *line_break\n        Education: Secondary\n        *line_break\n        Powers: Gravitonic Field Manipulation\n        *line_break\n        IPSA Rating: Alpha-class\n    \n        Threat Analysis: Idarraga (alias 'Exarch') operates a personality cult within the jungles of Mesoamerica based off a loose amalgamation of ancient cultures (Mayan, Aztec, others). While not directly responsible for any acts of empowered violence, Idarraga's cult has been a source of regional unrest and has been linked to numerous criminal activities (cf: KUKULKAN'S HAND). Idarraga is venerated as the embodiment of a feathered serpent deity and instils respect via quasi-spiritual rituals. No known relatives or parents makes indirect compulsion difficult. Direct intervention may be necessary.\n    \n        Additional: Idarraga's apparent work on the genesis and continuing prevalence and abilities of empowered individuals marks him as an ideal recruit under GenOrd-10.\n        *choice\n          #Back to Statistics.\n            *goto statscreen\n    *if ch5_anima_unlocked = true\n      #ANIMA - /UNCLASSIFIED/\n        *achieve shadow\n        Full Name: n/a\n        *line_break\n        DOB: n/a\n        *line_break\n        Place of Birth: n/a\n        *line_break\n        Education: n/a\n        *line_break\n        Powers: Hardened battle chassis (Herald-type, flight-capable), numerous directed energy weapons (estimated yield: [REDACTED]), strength and speed equal to typical cape standards, other capabilities unknown (cf. THREATFILE 47: Seven, The/Engineer, The)\n        *line_break\n        IPSA Rating: n/a (Alpha-class equivalent)\n    \n        Additional: One of The Engineer's technological enigmas, the machine that seemingly holds host to Ada Okoye's consciousness indicates a frighteningly advanced level of firepower, one seemingly built around a mastery of physics that defies contemporary reasoning. In order to learn what we can of the The Engineer and its goals, the machine has been placed under the supervision of SOLAR, although numerous safeguards have been installed to disable its armaments. Reports of similar units have not been substantiated. Unauthorised tampering with the machine's hardware or programming is strictly prohibited. Further information is classified security level Psi.\n        *choice\n          #HERALD CONTACT EXPERIMENT TRANSCRIPT\n            [b]///CLASSIFIED FILE[/b]\n            *line_break\n            [b]Note: Elements redacted as per General Order 47 - full transcript is classified level Psi.[/b]\n            *line_break\n            OKOYE: I look at this thing and I get the feeling that it wants to be used. Sometimes I come down here and I just stare at it. It's amazing.\n            *line_break\n            CROSS: You're being overly romantic. It's just an object. It can't want anything.\n            *line_break\n            OKOYE: Really? Some would say that an object wants to be used for what it was made for.\n            *line_break\n            CROSS: Some would say that such a thing is just anthromopomorphism. Of course, I'd be worried if our resident technopath didn't have such notions about machinery. I'm more curious about who built it, and why. Are you ready?\n            *line_break\n            OKOYE: You know that that's a dangerous line of thinking, Sandy. Quite literally, at that. And, yes - as ready as I'll ever be.\n            *line_break\n            CROSS: Intiate contact in three, two, one.\n            *line_break\n            [b][REDACTED][/b]\n            *line_break\n            OKOYE: You should see this place... non-euclidian geometry, endlessly recursive... There's a presence here. An intelligence. Dormant programming, I think. Ignoring. There's rain on my skin - ignoring. \n            *line_break\n            [b][REDACTED][/b]\n            *line_break\n            CROSS: Ada, you're bleeding-\n            *line_break\n            OKOYE: Slight haemorraging is to be expected...\n            *line_break\n            CROSS: I can't pull you out of there without risking death or psychosis, Ada!\n            *line_break\n            OKOYE: Don't. Do not.\n            *line_break\n            [b][REDACTED][/b]\n            *line_break\n            OKOYE: [i]...katika majaribu, lakini utuokoe na yule muovu e milele...[/i]\n            *line_break\n            [b][REDACTED][/b]\n            *line_break\n            OKOYE: The rain turns to hail. He sees me. He knows my name. I've done this before. Am I dreaming? Where am I? Where is everyone?\n            *line_break\n            CROSS: Ada, if you can hear me, you're too deep. You're becoming unstuck and I'm seeing severe cerebral hemorrhaging! Get out - whatever we can learn, it isn't worth it!\n            *line_break\n            OKOYE: Transcends wavelengths and walks through the dancing mechanism of stars and worlds and the things that lurk in the spaces between suns and molecules to harvest the probabilities of atoms and strings to calculate the accretion of worldlines. Amino acids engineer themselves towards protein chains and bootstrap themselves together over millions of years to call themselves [i]I[/i] in the face of-.\n            *line_break\n            CROSS: Ada? Ada, breathe. Ada, breathe. Hang on, help's coming. You'll be okay - you got through all the hells in Africa, climbed out of that pit when you were just a kid, this is nothing. You'll be fine. Medic! She's bleeding! I can't-! I can't stop the bleeding! Somebody help me! [i]Madre de Dios[i], Ada, [i]breathe[/i]!\n            *line_break\n            [b][REDACTED][/b]\n            *choice\n              #Back to Statistics.\n                *goto statscreen\n          #Back to Statistics.\n            *goto statscreen", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game.\n\n  *purchase adfree $4.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n\n", "city": "*temp newscount 0\n*temp stories false\n*temp reports false\n*temp accounts false\n*temp articles false\n*temp hub 0\n*temp murder false\n*temp bombing false\n*temp criminals false\n*temp met_mirage false\n*temp murder_aj false\n*temp murder_bs false\n*temp murder_mi false\n*temp murder_mu false\n*temp murder_ex false\n*temp murder_fi false\n*temp murder_done 0\n*temp mirage_1 false\n*temp mirage_2 false\n*temp mirage_3 false\n*temp mirage_4 false\n*temp ask_aegis\n*temp jinnhelm false\n*temp maekircount 0\n*achieve chp2\n\n[b]Chapter III[/b]\n*line_break\n[b]A NEW PARADIGM[/b]\n\n[i]'If only there were evil people somewhere insidiously committing evil deeds, and it were necessary only to separate them from the rest of us and destroy them. But the line dividing good and evil cuts through the heart of every human being.'[/i]\n*line_break\n- Aleksandr Solzhenitsyn\n\n*page_break\n\nAs it turns out, even capes have to go through airport security.\n\nThe flight was pleasant enough. Business class has its perks.\n\nHowever, what came afterwards - the security checks - are slightly less pleasant.\n\nThere's plenty of them, too, and they tend to catch one of you for one reason or another. Anima sets off the metal detector until Aegis explains that, like herself, there's shrapnel buried in there, some inoperable place, from old war wounds. Blueshift treats the screening with nothing other than undisguised contempt. People want photos with Courser and the line stops for a time. Chevalier holds up the line, too, when a security guard asks him about the tattoos on his left arm and each one, of course, comes with a story...\n\nSo, there's plenty of waiting, too.\n\nIt's the last checkpoint. You've shuffled to the front of the squad, through luck or circumstance.\n\nUp ahead, a young boy is staring at the team. Eventually, he takes his eyes off you and tugs at his mother's arm.\n\n\"Mom, there's a bunch of empies behind us...\"\n\nWell, welcome to Paradigm City, you suppose. Empy isn't a term you've heard before, but you can guess the meaning. Slur for empowered. Empowered thugs. Almost clever. You wonder if his mother knows that this is Paradigm City, one of the highest concentrations of empowered individuals in the world. You wonder if she knows you heard.\n\n*choice\n  #Just ignore it.\n    You let it go.\n    \n    *if (ch1_fought_fred = \"false\")\n      Just like you let Frederic go when you were sixteen - it's not worth worrying about.\n      *goto 1afinish\n      \n    *else\n      Just like you could have let Frederic go when you were sixteen. It might have been worth it then, maybe, but it certainly isn't worth it here.\n      *goto 1afinish\n\n    *label 1afinish\n    \"Does anyone else feel happy to be here?\" Chevalier asks as you step out onto the concourse proper.\n    *goto ch2_the_ride\n  #Smile at the child's mother - you heard that.\n    You lock eyes with the child's mother and smile at her.\n\n    She immediately blanches, obviously worried about any implications drawn from your eyes. \"I'm sorry, I've got no idea where he picked that word up.\"\n\n    \"I'm sure. Kids these days,\" you comment, and leave it at that.\n\n    \"I'm still not used to it,\" Al-Jinn says as you step out to the concourse proper. \"The casual alienation, the irrational fear.\"\n\n    \"You will, sweetheart,\" Blueshift says. \"Eventually.\"\n    *goto ch2_the_ride\n  #Reassure the child.\n    *set classical %+5\n    *set aegis_relationship %+5\n    You bend down to the child's level, giving the mother a warm smile. \"Well, that's not the best word to use. My name's ${first_name}. What's yours?\"\n\n    \"Tobias.\"\n\n    \"I'm sorry that we've given you a fright,\" you say, \"But we're the good kind of capes.\" You reach inside your shirt for your tags, emblazoned with the symbol of IPSA. \"See? That symbol says that we help the UN. You know about the UN, right?\"\n\n    He nods. \"From school...\"\n\n    \"You must be very smart.\"\n\n    You talk for a few minutes more. His mother blanches as she says, \"I'm sorry, he must have picked that word up at school...\"\n\n    You're not so sure, but you let it stand. That, too, can be reassuring.\n\n    As you step out to the concourse proper, Aegis says, \"Handled that well. Didn't offend me, of course, but Chevalier's been known to be thin-skinned.\"\n\n    Chevalier holds a hand over his heart, as if wounded. \"Ouch, boss.\"\n    *goto ch2_the_ride\n  #Give him a scare, just a little.\n    *set classical %-5\n    You point a forefinger in the boy's direction. \"Zap,\" you say and lightning pops around your finger.\n\n    The boy jumps back and spends the rest of the line hidden behind his mother, keeping her between him and you.\n\n    Aegis and Chevalier shoot you dirty looks, but Blueshift smirks. \"Come on,\" he tells them, as you step out into the concourse proper, \"It's not like ${first_name} actually hurt him.\"\n\n    \"Like you're one to talk about morality,\" Courser fires back.\n    *goto ch2_the_ride\n\n*label ch2_the_ride\n*page_break\n*set ch3_paradigm_files \"true\"\n\nThe conversation follows you into the vehicle that's waiting for you and your team outside. It's a heavy thing, running on some kind of hoverbed as opposed to wheels, emblazoned with the logo of Paradigm City's Empowered Law Enforcement. Aegis sits up front, the rest of the team in the back, alongside the equipment and personal baggage.\n\n\"Hey,\" says Blueshift, \"I always thought I'd end up in one of these sooner or later.\"\n\nYou can see his point - this feels like something that prisoners are transported in. Or a tank. Either option isn't what you'd expect.\n\nStill, the hoverbed provides a rather relaxing ride as the vehicle gets underway. The gentle hum might lull you to sleep, if you didn't have work to do.\n\nIdly, you run through a selection of external cameras. There are no windows, not on a secure vehicle like this, but the cameras allow you to see what's happening outside.\n\nYou're surprised by what you see - derelicts, detritus, debris. Buildings that were once gleaming glass and steel but haven't been repaired, jutting amongst their shining neighbours like rotting, broken teeth. People who have fallen on hard times standing on street corners... people who scatter as the van passes...\n\nIt's a surprise. Paradigm City was the sort of city that some in the Academy said was a utopia. A dream given form by the hands of the African and South American diasporas, protected and guided by the first heroes of the world.\n\nBut now, looking out at it, it seems like the dream has died a long time ago.\n\n*fake_choice\n  #Ask the squad what their opinions are on Paradigm City.\n    *goto ch3_paradigm_talk\n  #Read up on Paradigm City and the city's recent events.\n    *goto ch3_paradigm_read\n\n*label ch3_paradigm_read\n*if newscount = 0\n  The monitors displaying the city double as displays. It's simple enough to bring up reading material - Blueshift was thorough in compiling background material. Newspaper stories, news reports, personal accounts, academic articles...\n\n  It takes you a moment to decide where to begin. Paradigm Tower is far enough away that you could get through most of these without issue.\n  *goto readings\n*elseif newscount = 1\n  All that information sits at your fingertips, waiting to be consumed.\n\n  Paradigm Tower is still some distance away.\n  *goto readings\n*elseif newscount = 2\n  Paradigm Tower is growing in the distance. It might be time to finish up after the next one.\n  *goto readings\n*elseif newscount = 3\n  You're aware of the hoverbed going silent and the vehicle coming to a rest. \"Head out of the books,\" Chevalier says from beside you, \"We're here.\"\n  *goto ch3_paradigm_tower\n  \n*label readings\n*choice\n  *if (stories = \"false\")\n    #The newspaper stories.\n      *set stories true\n      *set newscount +1\n      Sometimes, it is hard to believe that newspapers still exist, almost seeming like some brazen defiance of the steady progress of history - like cockroaches lingering under the remains of a nuke-blasted refrigerator.\n      \n      Crime is on the rise, that much is obvious. People are leaving Paradigm City, including some of the bigger technological think tanks. There's even a piece there, from the day after Demigod - Paradigm's first leader - was assassinated.\n      \n      Marcus Leons, the man who killed the Architect-King, leers at you from the full-color spread of a decade past.\n      \n      'I just wanted to see if our new gods could bleed.' Leons' famous quote, his explanation.\n      \n      You ponder that, and whether that was the catalyst for everything else.\n      *goto ch3_paradigm_read\n  *if (reports = \"false\")\n    #The news reports.\n      *set reports true\n      *set newscount +1\n      News. Talking heads, people talking with furrowed brows about 'the extent of the problem', other people claiming that they have the solution...\n      \n      Blueshift's collated a collection of news stories that paint a pretty dire situation. Crime is getting worse, more and more areas of the island-city are being swallowed up as 'bad places' where 'they' live - whoever they are. A few pieces on empowered gangs, too.\n      \n      And, throughout all of them, a question that sits unanswered: where are the capes?\n      *goto ch3_paradigm_read\n  *if (accounts = \"false\")\n    #The personal accounts.\n      *set accounts true\n      *set newscount +1\n      Paradigm has a colorful history, that's sure, and it is one that is richly detailed through personal accounts and opinion pieces.\n      \n      Most of them say what you can already deduce: things were once good, they're bad now, and people think they're getting worse.\n      \n      There's a lengthy essay by one of Paradigm's unpowered police officers - one Dayo Okoye - who cites a lack of funding and the general impossibility of expecting traditional police work to solve empowered crimes. Most strikingly, he cites a lack of support from Paradigm Tower and the capes there. A brief note from Blueshift indicates that he has since retired and gone elsewhere.\n      \n      Somehow, remembering what you saw out the windows, you don't find Okoye's take on events hard to believe.\n      *goto ch3_paradigm_read\n  *if (articles = \"false\")   \n    #The academic articles.\n      *set articles true\n      *set newscount +1\n      The dry academic pieces aren't the best reading, but you're used to them.\n      \n      The so-called City of Legends has been the subject of dozens of theses and yet more essays. There's the standard list of issues: what does it mean for a new city to be formed out of the ocean, what does it mean for that city to monopolize their hold on a new type of person, what does it mean for them to bring the world cheap energy...\n      \n      And then, what does it mean when it all starts to collapse? Even the halls of academia, those ivory towers like the Academy, seem to have decided that the island-city state is a failed experiment.\n      *goto ch3_paradigm_read\n  *if (((((articles = \"true\")) or (accounts = \"true\")) or (reports = \"true\")) or (stories = \"true\"))\n    #Finish up.\n      *goto journey_finish\n  \n*label ch3_paradigm_talk\n\n\"It's a symbol of everything we could achieve with our abilities,\" Courser says. \"This whole island, dragged from the ocean floor and turned into a metropolis, supplying geothermal energy to a world that needed it. Clean energy. New technologies.\"\n    \n\"Too bad that Demigod bit the bullet. Literally,\" Chevalier comments. One of the first heroes. \n\nYou weren't aware that he was dead.\n\n*page_break\n\n\"What happened to Demigod?\" you ask.\n    \n\"Assassinated,\" Al-Jinn says with a shrug of her shoulders, like it was just a minor inconvenience. Could've happened to anyone. \"He was giving a speech... I want to say ten years ago? Shift, do I have that right?\"\n    \n\"Ten years ago, yes.\"\n\n\"They shot him, ${first_name}. Marcus Leons and a few other criminals who wanted to stake a claim to Paradigm. People had thought that because Demigod was the first, he had to be one of the more powerful ones. Back then, that was just logical. He was, but not in the way that allowed him to take a bullet.\"\n    \n\"So, it's a symbol, yes. But not a good one like Courser thinks.\" That's Blueshift. \"When people think of Paradigm, they think of a crime-ridden hellhole, where the last few costumed heroes cling to their old ways while the city collapses around them. More to the point, SOLAR teams don't go to good places.\"\n    \n\"So, just because we're here, Paradigm's a failure?\" Courser retorts, frowning. \"Real rich, Shift. Real rich.\"\n    \n\"I'm validated by statistics. The fact that they've gone to us for help with a capekiller is more than enough proof that something is wrong here.\"\n\nWith that, the conversation shifts back to other things.\n\n*fake_choice\n  #\"Anima, you didn't say anything - what're your thoughts on the City?\"\n    *set anima_relationship %+10\n    Anima watches you and blinks owlishly. You're just about to assume she's not going to say anything when she speaks.\n    \n    \"City rises, demonstrates ability of individuals with powers to benefit society. High number of individuals with powers promotes safety, encourages development, investment. Convenient sources of geothermal power promotes growth of economy, new technologies. City useful.\"\n    \n    She continues, her deep voice almost musical, like woodwind.\n\n    \"Fusion eclipses geothermal. Leons assassinates Demigod. City no longer useful, no longer safe. City dies.\"\n    \n    It occurs to you that this is the most you've ever heard her speak.\n    \n    \"Not if we can help it,\" Courser says.\n  #\"Blueshift, what's with the cynicism?\"\n    \"It isn't cynicism,\" Blueshift states, \"We're not here for a holiday, we're here to fix someone else's mistake. That's what we do. And there is no shortage of empowered individuals making mistakes, some major, some minor. As far as I'm concerned, this city is one of them.\"\n  #\"Did you know Demigod, Chevalier?\"\n    \"Nah,\" Chevalier says, smiling. \"Before my time and all. I heard he was a great man though, had a way of making everything work correctly. No one else could have dragged this place together. Of course, that's the problem, isn't it? One person drags this city together but it can't survive without him.\"\n  #\"I think Courser's right - this place represented something great and it will again, once we're done with it.\"\n    *set classical %+5\n    \"Thank you,\" Courser says, \"Nice to know that someone appreciates the ideals of what something [i]can be[/i], not what it [i]is[/i]. If people forget that, well, it's no wonder things go bad, right?\"\n    \n*label journey_finish    \nFrom the front of the vehicle, Aegis's voice calls out.\n\n\"We're here.\"\n*goto ch3_paradigm_tower\n\n*label ch3_paradigm_tower\n\n*page_break\n\nYou step out into the cool afternoon breeze.\n\nParadigm Tower is a monolithic thing, all steel and glass, a symbol of the monumental efforts that had been taken to create a new state, a new nation, a new society. The heart of a perfectly calculated society, dragged from beneath the waves.\n\nBut it's also a seat of power, where the capes monitor the city and render their assistance from. A fortress.\n\nAegis leads the way inside, despite glances and looks from some of the caped crusaders in the lobby. A great golden shield is emblazoned on the floor there, someone's symbol. You stare at the men and women, the more traditional heroes of yesteryear.\n\n*fake_choice\n  #That could have been me...\n    *set classical %+5\n    It's hard not to feel jealous. Here they are, capes without the trappings of some quasi-military unit, where law and order is decided by their own feelings on things. It must be liberating.\n    \n  #Why are they in here, not out there helping?\n    The juxtaposition of the shining steel and chrome here when compared to some areas of Paradigm you had just driven through...\n    \n  #This whole building represents nothing more than their failure.\n    *set classical %-5\n    As you walk through the lobby, you can't help but see the building like you would a plinth with nothing more than a pair of feet atop it. A relic of a forgotten age.\n    \n  #Unimportant. Focus on being professional.\n\n\"Aegis,\" your commander says, to the man at the front desk, and produces identification. \"SOLAR, Ninth Unit. Sentinel's expecting us.\"\n\nSentinel... here?\n\nYou're so stunned by that mention that it takes you a a stride or two to catch up to the rest of the squad.\n\nSentinel's office lies near the top of the tower.\n\nThe elevator is rather... tight.\n\n*page_break\n\n*label meetsentinel\n\nSentinel's officer is built like some testament to old nobility, a distinct contrast to everything you've seen in the tower yet.\n\nHomely and sophisticated, with carpet and wood panelling, it seems like an old lounge room more than anything else. It's only on closer inspection, more detailed [i]looking[/i], that you can see the modern technology built into the decor, seeming almost apologetic about its modern instruments. A terminal built into the desk, bookshelves that hold more data storage units than books, windows that double as holographic displays, security cameras that hide within light fixtures...\n\nSentinel stands behind ${senhis} desk, without ${senhis} helmet. $!{senhe} looks up at the group as they enter but doesn't smile.\n\n\"Good afternoon. I wish I could say that we met under better circumstances, Captain Ng-Mae. This city is not what it once was and it pains me that you must see it this way.\"\n\n\"Good afternoon,\" Aegis begins, and promptly rolls her eyes, \"Now, spare me the bullshit. I know feigned melodrama when I see it. Stop wasting my time and tell me what's happening. SOLAR teams aren't counselors.\"\n\nSentinel seems to bristle at that. \"Very well, [i]Captain[/i]. If that still applies.\"\n\n\"I was never technically discharged. The rank stands.\"\n\n\"Just as well as you do, I trust?\"\n\n\"Christ,\" Chevalier murmurs next to you, \"What an ass.\"\n\nAegis' face is flat, hard to read. She says, \"Better, actually. What's the situation, Sentinel?\"\n\n\"I'm sure you've been briefed. You're professionals, after all.\"\n\n\"Perhaps, but I'd like to hear it from you.\"\n\nSentinel gestures to a display on your left, built into the wall of ${senhis} office. It lights up, displaying what you guess to be a map of Paradigm City. Certain sections flare red, bright and angry, briefly taking your attention away from the tension percolating between your commanding officer and your childhood hero.\n\n*fake_choice\n  #Examine the map in more detail.\n    You take a few steps towards the map, wading through the tension. It's the whole city, no doubt about it. Paradigm Tower in the center of it all, visible from any point. Paradigm Park, various districts and blocks... Whatever's been happening, it's widespread. No pattern that you can immediately see.\n\n    \"Can we get a copy of this?\" You ask.\n  #Stay where you are.\n    There's enough tension here that you could cut it with a knife. You remain still.\n\n    \"I trust you'll give us all this data,\" Blueshift says.\n  #Mention that you met Sentinel.\n    \"I met ${senhim} when I was a kid,\" you aside, quietly, to the squad. \"I never thought ${senhe} was so... petty.\"\n\n    \"All those with power fear losing it,\" Blueshift murmurs.\n\n    \"Knock it off,\" hisses Courser, \"Show some respect.\"\n\n    \"I trust you'll give us all this data,\" Blueshift says, louder.\n    \n\"Absolutely,\" Sentinel replies. \"And thank you for speaking up, that leads me to my next point. Captain, your men and women haven't been cleared for the strategic briefing.\"\n\n\"My superiors-\" Aegis begins, only for the gold-and-silver cape to silence her with a movement of ${senhis} hand.\n\n\"Aren't here. Paradigm is my jurisdiction and I want this matter handled properly.\"\n\nAegis' face doesn't betray anything. She nods to the team and your squad files out obediently, off to set up a base of operations.\n\n\
