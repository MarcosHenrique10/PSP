ailing and listen to the waves below.\n      *goto ch4_aegis_hospital_visit\n*else\n  *set ch4_courser_fate \"suicide\"\n\n  Courser weathers your assault, grabs for your wrist - finds it, wrenches you aside so he can hammer his fist into your gut. Once, twice, and he plants his third blow on your chin.\n\n  Your head snaps around, your teeth banging together as stars burst into blurry life behind your eyes.\n\n  You fall.\n\n  *page_break\n\n  Courser stays on you. He kicks you over and then hammers his boot into your unprotected gut.\n\n  *if torso = \"suit of tactical armor\"\n    Even through the plating there, it still whoofs the air from your lungs.\n    *goto courser_kick\n  \n  *else\n    The blow drives the air from your lungs. You think you feel a rib crack.\n    *goto courser_kick\n    \n*label courser_kick\nHe crouches down by you then, gripping you by your collar. You bat weakly at his hands but it's no use - Courser's got you.\n\n\"Listen to me,\" he hisses. \"This way, no one's going to doubt that we fought, that you did everything correctly. They won't suspect you. Back at the precinct, I have a computer. Listen to me! Everything you need is on it.\"\n\n*fake_choice\n  #\"Why are you... doing this...?\"\n  #\"Wait... we can still...\"\n  #\"Computer...\"\n  \nCourser stands up, regarding you calmly. He nods to himself. \"God, I hope you got all that. Going to be terrible if I've undone myself by giving you a concussion.\"\n\nHe steps away, heading toward the barrier that separates tourists from the drop. He hovers there for a second, and then slides through it.\n\nJust as it occurs to you what he's doing, Courser jumps.\n*goto ch4_courser_postjump\n\n*label ch4_courser_fight_power\n\nYou watch Courser ready himself and call your power to the fore before he gets the chance.\n\nAt the sight of lightning arcing around your fingers, Courser charges. You fire once, but he must have read the movement in your eyes or fingers, and the blasts slashes through n\nAnd she makes no move to show that she knows you're there.\n\n\"It's an induced coma,\" Al-Jinn says, stepping up beside you. \"Like that's supposed to make it better. Controls the swelling in the brain.\"\n\n\"For how long?\" you ask.\n\n\"Once the swelling is lessened. And then we play the hoping game.\"\n\n\"Never played that one before.\"\n\n\"That's good, trust me. We hope that she's not suffered any brain damage.\"\n\nIt's a sobering thought, one that Al-Jinn seems to pick up on.\n\n\"I got her one of those little golden cat statues,\" Al-Jinn tells you, forcing a smile. \"For when she wakes up.\"\n\nYou glance to bedside table. There, a small golden cat waves a little paw at you, forever.\n\nYou can't help but think that Aegis is going to hate it.\n\n*fake_choice\n  #\"Good idea.\"\n    Al-Jinn nods. \"I was thinking about a bonsai tree, too. I was in a panic, wasn't thinking straight. But the cat should be fine. I think. Even if she's going to hate it.\"\n  #\"She's going to hate it.\"\n    *set aljinn_relationship %+5\n    Al-Jinn actually laughs. \"She will. But she'll need to wake up to do it. She always likes a challenge.\"\n  #\"Does it mean anything?\"\n    \"Just good luck,\" Al-Jinn replies. She smiles, slightly. \"The Captain's going to hate it.\"\n    \nThat comment is punctuated by the steady beeping report of the heart monitor.\n\n\"You know, I hate hospitals,\" Al-Jinn says, after the third beep. \"It's not anything that's happened to me, it's just the smell. That sterile too-clean smell. I associate that more with death than that actual rotting smell.\n\nShe takes her eyes off the Captain to turn to you. \"Tell me that's not fucked up.\"\n\n*fake_choice\n  #\"It's fucked up.\"\n    Al-Jinn nods. \"But that's the world, isn't it?\"\n    \n    \"It's not something I'd expect from our team doctor...\"\n    \n  #\"It's not fucked up.\"\n    Al-Jinn smiles, but only slightly. \"You don't need to sugarcoat things, ${first_name}.\"\n    \n    \"Hey him brought into be held at Paradigm Tower until we can transport him back to Geneva.\"\n      \n      Al-Jinn just nods. \"Good,\" she says. \"To go from being the guy behind SOLAR's recruiting drive, to this. He fell hard. I wish I knew why.\"\n      \n      \"I intend to find out,\" you reply.\n      *goto ch4_aegis_hospital_finaltalk\n  *if ch4_courser_fate = \"alive\"\n    #Tell Al-Jinn that you let Courser go in exchange for information.\n      \"I did,\" you say. \"It was Courser. We fought and I let him go in exchange for information.\"\n      \n      \"You did what?\" Al-Jinn asks. Her eyes are set on you with enough fire that you, for a split second, worry that she'll set you alight.\n      \n      \"Naomi, this is the start of something big. It's more than just-\"\n      \n      \"Get out,\" Al-Jinn hisses, and that static overtakes your senses.\n      \n      By the time you've found your limbs again, you're halfway to the precinct.\n      *goto ch4_blueshift_lab_recruit\n  #Tell Al-Jinn that Courser was responsible, and that the situation has been resolved.\n    \"I did,\" you say. \"It was Courser, and I've taken care of it. He won't be troubling us again.\"\n      \n    For a moment, Al-Jinn doesn't say anything. She stands there and watches the captain, listens to the machines.\n      \n    \"Good,\" she states.\n    *goto ch4_aegis_hospital_finaltalk\n  #Tell Al-Jinn that Courser was responsible, but you're just getting started.\n    \"I did,\" you say. \"It was Courser, and I've taken care of it. But we've got a long way to go if we're to figure out why he did this.\"\n    \n    \"That we do,\" Al-Jinn says. \"But I'm sure we're in good hands now, with you in charge.\"\n    *goto ch4_aegis_hospital_finaltalk\n  #Tell Al-Jinn that the situation hasn't been resolved yet.\n    \"Not the whole picture,\" you tell her, \"Not yet. If Courser did this, I'd bet someone gave him a good reason. I'm going to figure out what that is and get to the bottom of this.\"\n    \n    \"That's a good plan,\" Al-Jinn says. \"We're in good hands now, with you in charge - or so I hope.\"\n    *goto ch4_aegis_hospital_finaltalk\n  \n*label ch4_aegis_hospital_finaltalk\n\n\"So,\" she says, and lets that moment stretch out, \"What's the plan?\"\n\n\"Courser has a computer. I think that's as good a place as any to begin looking. So, on that note, I think I'll take my leave.\"\n\nYou turn for the door and then turn back, your eyes settling on the Captain.\n\nYou remember something about coma patients being able to hear people. You're not sure of the truth of it, but maybe it'd help.\n\n*fake_choice\n  #Tell Aegis about the current situation.\n    *set aegis_relationship %+5\n    You pull up a seat next to the bed, unsure of what to say.\n    \n    The words come, eventually, and you talk. About the fire, about Blueshift and Anima, about catching up with Courser at the Crown. About what transpired there, in that reckoning between the two of you.\n    \n    She doesn't respond but, just for a second, you swear that her fingers twitch.\n  \n    And then you draw your shoulders up and set your jaw.\n    \n    Time to go to work.\n  #No point in talking to someone in a coma - get to work.\n    You draw your shoulders up and set you jaw.\n\n    Time to go to work.\n  \n*label ch4_blueshift_lab_recruit\n\n*page_break\n\nYou return to the precinct house. Chevalier stands guard outside and gives you a nod but makes no move to follow you or come close.\n\nBut that's fine. You need someone who knows computers, if you're going to have the best chance of cracking the cause of Courser's treachery.\n\nAnd that's Blueshift.\n\n*page_break\n\nAnima - Ada, whoever, whatever she is - lies on the workshop table, like a patient in an operating theatre imagined by a mechanic. Stripped from the waist up, Blueshift has cut away her dark skin to get access to the cybernetic systems underneath. Wires and cables snake in and out of Ada like artificial intestines, linked to a laptop by her head. You can't even begin to make sense of the data on it.\n\nBlueshift has been busy. His hands are stained black, clashing with the blood-bleached look of his face. Anima looks like she's just sleeping - you have no idea if that's good or bad.\n\nYou walk over. As you approach, Blueshift rubs at his face with one hand - tired, all he accomplishes is smearing that black stuff all across his cheek and eyes. His other hand holds a pair of cigarettes. More have been stubbed out against the table.\n\n\"How is she?\" you ask.\n\n\"Stable, I think. Hard to tell. With her, we never got an instruction manual. Patched her up before, but nothing like this. Just have to wait, now. Courser?\"\n\n*if (ch4_courser_fate = \"dead\") or (ch4_courser_fate = \"suicide\")\n\n  \"He's dead,\" you reply.\n\n  \"Good,\" Blueshift says.\n  *goto blueshift_lab_2a\n\n*if (ch4_courser_fate = \"alive\") or (ch4_courser_fate = \"held\")\n  \"He won't be a problem anymore,\" you reply.\n  \n  \"Good,\" Blueshift says, and you can tell he imagined one particular way that problem was solved. You don't feel like correcting him.\n  *goto blueshift_lab_2a\n \n*label blueshift_lab_2a\n\n\"Listen,\" you begin, \"That's why I'm here. I need help. Courser had a computer in his room, something I think will tell us why he did this. If you can just spare a few minutes to help me hack into it-\"\n\nBlueshift's head snaps to you, his walls snapping up immediately. \"No. I can't. Not while Ada's...\"\n\n\"It's okay to admit that you're hurting, Leland,\" you tell him.\n\n\"Wrong, actually. That's the thing, about pain,\" Blueshift says, wiping some oily substance on his pants. \"When you're conscious of it, you're distracted by it. The trick to dealing with pain is not thinking about the pain.\"\n\nHe drags a chair so he can fall into it. His eyes flicker to the laptop and then stare at nothing at all.\n\n*if ch4_courser_password = \"true\"\n  You reflect that you don't need his assistance - after all, you have Courser's password. But it might be a way to get him out of this funk, and maybe ask him about what Courser said.\n  *goto blueshift_lab_choice\n*else\n  *goto blueshift_lab_choice\n \n*label blueshift_lab_choice\n\n*choice\n  #Appeal to Blueshift's logic.\n    \"Shift, listen to me. You've got her stable, now there's nothing to do but wait. That's your own words. You can spend that time in here, hurting, or spend it with me, cracking whatever mystery led Courser to hurt her. Either way, that time is going to pass. Might as well pass it doing something constructive.\"\n    *line_break\n    *line_break\n    *if (blueshift_relationship >75) or (brains >3)\n      *set ch4_blueshift_hacking true\n      You're surprised when Blueshift seems to listen and not immediately try to cut you down with a harsh word or argument.\n      \n      \"You're right,\" he says and, as he does, he reaches out, as if brushing some of Anima's buzzed hair back into place.\n      \n      \"Let's go.\" He rises and heads out, leaving you to follow.\n      *goto courser_room\n  \n    *else\n      \"Then go handle it,\" Blueshift snaps. \"I'm busy. Don't lecture me on loss when you're just a few weeks out of that ghetto, ${cape_name}.\"\n      \n      He pointedly ignores you from then on.\n      *goto courser_room\n  #Appeal to Blueshift's emotions.\n    \"Shift, listen to me. I know you care about Ada and I know that you want her to get a clean bill of health. That's fine, it's normal, it's human - but the only thing that'll fix this will be what's on Courser's computer.\"\n    *line_break\n    *line_break\n    *if (bravado >3) or (blueshift_relationship >75)\n      *set ch4_blueshift_hacking true\n      You're surprised when Blueshift seems to listen and not immediately try to cut you down with a harsh word or argument.\n      \n      \"You're right,\" he says and, as he does, he reaches out, as if brushing some of Anima's buzzed hair back into place.\n      \n      \"Let's go.\" He rises and heads out, leaving you to follow.\n      *goto courser_room\n    *else\n      \"Then go handle it,\" Blueshift snaps. \"I'm busy. Don't lecture me on loss when you're just a few weeks out of that ghetto, ${cape_name}.\"\n      \n      He pointedly ignores you from then on.\n      *goto courser_room\n  #Let him focus on Anima.\n     *set blueshift_relationship %+5\n    \"It's fine, Shift. You focus on Ada, okay? If there's anything I can do to help...\"\n  \n    \"I doubt that,\" Blueshift replies, turning back to Anima.\n  \n    As you go to leave, you hear him say, \"But... thanks.\"\n    *goto courser_room\n  \n*label courser_room\n*page_break\n\nCourser's room has nothing but a desk and a bed. But on that desk is a laptop computer and, within it, lies answers as to why Courser betrayed his team, betrayed you.\n\nOr, at least, that is what you hope.\n\n*if ch4_blueshift_hacking = \"true\"\n  Blueshift looms over the desk, his hands splayed against the top of it. He inserts some kind of small device into a port on the laptop and begins entering commands. He works silently. You note that he wiped his hands off, at least, and therefore isn't smearing blood and dirt and oil over the keys.\n  \n  Courser's words, that Blueshift is really the villain Exarch, run circles in your mind.\n  *choice\n    #Ask Blueshift if he really is Exarch.\n      He doesn't even look up from his work at the question. \"I am.\" He says it without feeling or inflection, like it happened to someone else.\n      \n      He looks up, for a second, as if pondering something. \"I suppose Courser told you. It makes sense.\"\n      *choice\n        #\"Does the Captain know?\"\n          Blueshift gives you that familiar look of contempt. \"Who do you think recruited me, ${cape_name}? She's known from the start.\"\n          *goto courser_room_hack\n        #\"What was it like, being a villain?\"\n          Blueshift gives you that familiar look of contempt. \"It was everything I ever dreamed of. Living in some ruined Mesoamerican temple with a host of idiot cultists who worshipped me like a deity and the perpetual fear of being discovered by some cape who wanted to bash my head in. Yeah, fantastic.\"\n          *goto courser_room_hack\n        #\"Why'd you join SOLAR?\"\n          Blueshift regards you coolly. \"The Captain and Ada put their guns in my face. I happen to enjoy living.\"\n          *goto courser_room_hack\n        #\"How can I know you won't betray us?\"\n          Blueshift gives you that familiar look of contempt. \"Paranoia doesn't suit you, ${first_name}. Courser had the luxury of a positive reputation. People will believe him. Me? If I step out of line, I'll get a comfortable little cell beneath Geneva HQ, if I'm lucky. You should trust me, in defiance of your better nature.\"\n\n          He returns his attention to Courser's computer. \"We can discuss our various paths once we're done here. Let's focus on the task at hand.\"\n          *goto courser_room_hack\n    #Let him work in silence.\n      You ignore them. It'll be something to discuss later, not when he's working.\n      *goto courser_room_hack\n\n*elseif ch4_courser_password = \"true\"\n  You boot up the computer and enter the password as soon as you're able.\n  \n  The computer processes the command. As you wait, you can't help but wonder if this was some final trick from Courser.\n  \n  But then it executes and you're in, with all of his information at your fingertips.\n  *goto courser_room_hack2\n\n*elseif brains >3\n  You boot up the computer. It asks you for a password and, to your chagrin, you realise you don't know it.\n  \n  But all systems can be subverted. Eventually, Courser's system has been and you're in, with all of his information at your fingertips.\n  *goto courser_room_hack2\n\n*else\n  You boot up the computer.\n  \n  In moments, you realise your folly.\n  \n  A cursor blinks in the center of the log-in screen, asking for a password. One you don't know, and have no way of finding.\n  *page_break\n  There's a sound at the door. There, Chevalier stands.\n  \n  You open your mouth to say something but he silences you with a motion of his hand. \"Don't,\" he says. \"I don't want to know. You did what you felt you had to do. Maybe I'll forgive you, God knows I want to. He once told me that, if anything were to happen to him, I was to locate some files on his computer.\"\n  \n  \"And delete them?\" you ask.\n  \n  \"No. Ensure we have them. But I see that you're already on it. The password is orioles four nine.\"\n\n  You enter it and, as the computer processes the command, Chevalier shakes his head. \"He had us all fooled, huh?\"\n  \n  *fake_choice\n    *if ch4_courser_fate = \"alive\"\n      #Tell Chevalier that Courser is alive and free.\n        \"Don't bullshit me,\" Chevalier snaps and, for a moment, you're worried he's going to leap across the room and strangle you.\n        \n        Instead, he stalks out, leaving you alone.\n    #\"I guess he did.\"\n      Chevalier nods. When you look again, he's gone.\n    #\"You really had no idea?\"\n      Chevalier shakes his head. \"No. Don't know why he never told me. It doesn't make any sense. This shit is why I wanted to get out of the indie game. Guess you can't.\"\n      \n      When you look again, he's gone.\n  *goto courser_room_hack2\n\n*label courser_room_hack\n\nMinutes pass.\n\n\"Done,\" Blueshift remarks, stepping away from the desk. \"If you need me, I'll be in the lab.\"\n\n\"Thanks, Shift,\" you tell him.\n\n\"Don't mention it.\"\n\nAnd then he's gone, leaving you alone with the laptop and whatever it contains.\n*goto courser_room_hack2\n  \n*label courser_room_hack2\n*page_break\n\nCourser's laptop is open to you. A cursory glance reveals that there's a fair amount of data to sift through.\n\nYou trawl through it for what feels like hours. All of it encrypted but, luckily, SOLAR has intrusion and decryption programs that combine simplicity with power. It's just a matter of time.\n\nEventually, you have a selection of files before you. You hope some of them are relevant.\n\n*label courserfiles\n\n*choice\n  #Examine the most recent audio files.\n    *set ch4_sentinel_recording \"true\"\n    *achieve courser\n    You find one, a recording of some conversation, just a few days prior.\n    \n    \"I can't do what you're asking me to do,\" Courser says.\n\n    \"I'm not asking you to do anything, Damian,\" the voice croons, \"I'm merely advising you to do what you think is best.\"\n\n    \"Murder.\"\n\n    \"Self-defence. There's no court who would convict a SOLAR operative of [i]murdering[/i] Exarch. The man is a clear and present danger. He makes a mockery of your uniform. I will protect you, Damian. One favour for another.\"\n\n    \"I'll do it. I'll give you Exarch. The rest of them? Don't kill them.\"\n\n    \"I wouldn't dream of it. There's no point in breaking one's tools just because they aren't behaving how I'd like them to. The errant Captain will lead nothing except a desk, the machine can be reprogrammed. Chevalier, Al-Jinn, even ${cape_name} - they may very well thank you, once they see the necessity of it.\"\n\n    \"I don't know if I can buy gratitude with thirty pieces of silver.\"\n\n    \"Damian, we're approaching a crisis point. The world needs direction and unity, which is what we'll provide. Some will be lost along the way and it is, yes, quite regrettable. That is why we need leaders, people like you. I'm proud of you, and of what you represent.\"\n\n    It's only when the recording ends that you realise you are trembling. You had recognised the second voice immediately, as easy to place as it had been all those years ago, when you were only eight years old.\n\n    Sentinel.\n    *choice\n      #Return to the files.\n        *goto courserfiles\n  #Examine Courser's files on Exarch.\n    *set ch4_exarch_file \"true\"\n    *achieve exarch\n    Full Name: Santiago Idarraga\n    *line_break\n    DOB: 20/06/2029 (Age 28)\n    *line_break\n    Place of Birth: Monterrey, Colombia\n    *line_break\n    Education: Secondary\n    *line_break\n    Powers: Gravitonic Field Manipulation\n    *line_break\n    IPSA Rating: Alpha-class\n    \n    Threat Analysis: Idarraga (alias 'Exarch') operates a personality cult within the jungles of Mesoamerica based off a loose amalgamation of ancient cultures (Mayan, Aztec, others). While not directly responsible for any acts of empowered violence, Idarraga's cult has been a source of regional unrest and has been linked to numerous criminal activities (cf: KUKULKAN'S HAND). Idarraga is venerated as the embodiment of a feathered serpent deity and instils respect via quasi-spiritual rituals. No known relatives or parents makes indirect compulsion difficult. Direct intervention may be necessary.\n    \n    Additional: Idarraga's apparent work on the genesis and continuing prevalence and abilities of empowered individuals marks him as an ideal recruit under GenOrd-10.\n    \n    Beneath it, you spy several photos. Even beneath the colorful feathered mantle and serpentine headpiece, you can spy Blueshift. Younger, sure, but there is no doubt about it.\n    *choice\n      #Return to the files.\n        *goto courserfiles\n  #Examine Courser's personal logs.\n    *goto courserlogs\n  *if ch4_sentinel_recording = \"true\"\n    #Finish up.\n      *goto ch4_surgery_prep\n\n*label courserlogs\n*choice\n  #re: this morning\n    i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry i'm sorry\n    *choice\n      #Return to Courser's logs.\n        *goto courserlogs\n  #Exarch and Ada.\n    i don't trust that smug son of a bitch. i don't know where that machine came from but it makes my skin crawl and the fact that they're letting Exarch\n         \n    She came out of there wrong and i don't buy that either of them call it an accident. He's lying and she's not Ada anymore. That piece of shit should be locked up! How long until we all meet with \"accidents\" as well? least we could do is give Ada a proper funeral instead of pretending that she's still here!!\n    *choice\n      #Return to Courser's logs.\n        *goto courserlogs\n  #Arusha\n     i finally found out what happened with the Captain in Africa, back during the Purges. It's no wonder she got sent to SOLAR and it's no wonder that she's so angry about it. i don't know how they can let her lead a team after the shit she pulled. she says she believes in us, always telling us how important our missions are, and how much responsiblity we have but she's the one who'd pull that exact same shit on us if she thought it was necessary\n        \n     why am i the only one who is trying to be an actual hero in this unit?\n     *choice\n       #Return to Courser's logs.\n         *goto courserlogs\n  #I MET SENTINEL!!\n     So, it turns out doing all those meets and greets actually has a point! When you're the face of SOLAR, you get to meet all sorts of people! I met Sentinel today and, wow, let's just say that ${senhe}'s really something else in person. We spoke for what felt like hours, you can just feel the honesty and the convinction in everything ${senhe} says. \n     \n     $!{senhe} said we might work together in the future, or maybe I could see about leaving SOLAR, and I know ${senhe} probably says that to everyone... but I believe it.\n     *choice\n       #Return to Courser's logs.\n         *goto courserlogs\n  #dreams\n    i'm awake. It's 3AM and i'm awake. i don't usually keep a dream journal like this, like some kid. i saw something though. a flash and then something. something big. i think it was singing to me, which is crazy. i couldn't move, which is also strange, because i wanted to run away. but i couldn't. now, when i think about it, i'm not sure if i even saw anything at all even though i feel like i've forgotten something important, like everything's falling into a chasm behind my eyes.\n    \n    i'm going to go back to sleep\n    \n    i hope i don't see it again\n    *choice\n      #Return to Courser's logs.\n        *goto courserlogs\n  #Examine the rest of the files.\n    *goto courserfiles\n         \n*label ch4_surgery_prep\n\nYou lean back from the laptop, shocked.\n\nCourser was operating at Sentinel's behest. That is, unless the recording was faked in some way. But then why would Courser tell you to find it, if it was fake. But then why... the thoughts are endlessly recursive.\n\nIt's too much to ponder. Another piece of a puzzle with an ever-increasing scope.\n\nThe door hisses open and, back-lit, a figure looms in the doorway.\n\n*page_break\n\nBlueshift stands there, looking as haggard and weary as he did when you last saw him.\n\n\"Given my present state, I don't know how to put this delicately, so, I'm just going to say it.\n\n\"I need you.\"\n\n*fake_choice\n  #\"What?!\"\n  #\"Woah, hang on-!\"\n  #\"Hold on!\"\n  #\"About time.\"\n  \nBlueshift stares at you. \"Don't be stupid,\" he snaps, \"I need your electrokinesis.\"\n\nYou immediately ask why.\n\n*if blueshift_relationship >70\n  Blueshift sighs. \"I'm tired, ${first_name}. You know that I wouldn't come to you unless I had a good reason. And I do - this is for Ada.\"\n  *goto ch4_blueshift_anima_choice\n \n*else\n  He stares you down. \"I know we're not friends - we may not ever be friends. But this isn't for me, beyond a rather roundabout way. This is for Ada.\"\n  *goto ch4_blueshift_anima_choice\n \n*label ch4_blueshift_anima_choice\n*choice\n  #Assist him.\n    *goto ch4_anima_surgery\n  #Refuse.\n    *goto ch4_anima_nosurgery\n    \n*label ch4_anima_nosurgery\n\nFor a moment, you think you see his face fall, but you might have imagined it.\n\n\"I see,\" Blueshift says. \"I suppose it was too much to ask for.\"\n\nAnd then, he's gone.\n\n*goto ch4_oc_call\n\n*label ch4_anima_surgery\n\nBack in the workshop, the only way you can tell that Blueshift has been working is the increasing number of cigarettes littering the place.\n\n\"Anima's power core is located behind the sternum armor plate. Courser punched a hole but missed the core. Still, it was enough to shut her down. The core glows green - don't worry, you won't get cancer, it's not radioactive.\"\n\n\"You're sure.\"\n\n\"Only in the sense that I haven't developed any tumors yet,\" Blueshift remarks, in what might be a joke.\n\n*page_break\n\nYou set your hand within Anima's chest. \"How will I know how much power to use? What if I pop a fuse - hell, does she even have any fuses to pop?\"\n\n\"Can't happen. In fact, I need you to use as much as you've got, as quickly as you can bring it to bear.\"\n\n\"Sounds dangerous,\" you reply.\n\n\"Less dangerous than the alternative. If you don't bring the charge up quickly, she might very well break free and kill us all.\"\n\n\"And you didn't tell me this before, why?\"\n\n\"Less chance of you accepting if I did.\"\n\nYou look down at Ada's face.\n\n\"Shift. Leland. What is she, exactly?\"\n\nBlueshift turns his attention to his laptop. \"Maybe she can tell you, when she's back on her feet. On three.\"\n\n\"One. Two. Three!\"\n\n*choice\n  #Bring the charge up quickly.\n    *goto anima_surgery_success\n  #Bring the charge up slowly.\n    *goto anima_surgery_failure\n    \n*label anima_surgery_success\n\n*if power >1\n  *set ch4_ada_awakened \"true\"\n  You don't hesitate for a second.\n  \n  Electricity crackles around your fingers and you direct it down, into the metal at your fingertips. Any thought of worry about Ada vanishes because, if there's one thing Blueshift can be trusted on, it's her welfare.\n  \n  At the moment of contact, Ada lurches to life, something like a spasm running through her shoulders and back. Between your fingers, you can see a bright emerald glow. All you need to to is hold it together for a few more seconds...\n  \n  \"We're good!\" Blueshift shouts.\n  \n  You lurch back, raising a hand to your forehead. Exhaustion sweeps through you, from head to toe. You sniffle and raise a hand to your nose. It comes back red. Pushed yourself too hard, too fast.\n  \n  Ada speaks. \"All systems nominal.\"\n \n  And then she [i]groans[/i]. \"I hope someone got the plates off that truck...\"\n\n  *page_break\n  *achieve animated\n\n  \"Ada?\" Blueshift murmurs.\n\n  \"The one and only,\" she replies, sitting up and swinging her legs off the workbench.\n\n  In a second, Blueshift is across the workshop and has his arms around her. Over his shoulder, Anima smiles at you. It's a bit ghoulish, with half her face missing, but you understand it all the same.\n\n  *if ch3_blueshift_mission = true\n\n    \"It's nice to meet you properly,\" Anima says. \"I remember you from the fight with Maekir Team. I hope this whole thing-\" She points at the exposed metal, \"-wasn't too much of a shock.\"\n    *goto surgery_success\n\n  *else\n\n   \"It's nice to meet you properly. I hope this whole thing-\" she points at the exposed metal, \"-wasn't too much of a shock.\"\n   *goto surgery_success\n   \n*else\n  You don't hesitate for a second.\n  \n  Electricity crackles around your fingers and you direct it down, into the metal at your fingertips. Any thought of worry about Ada vanishes because, if there's one thing Blueshift can be trusted on, it's her welfare.\n  \n  At the moment of contact, Ada lurches to life, something like a spasm running through her shoulders and back. Between your fingers, you can see a bright emerald glow. All you need to to is hold it together for a few more seconds...\n  \n  Your power ebbs and you lurch back, dizzy and sweating. Exhaustion sweeps through you and you collapse to the ground. Something bubbles in your nose - blood, by the fact like acting on some old reflex.\n  \n  Like the tree is [i]breathing[/i].\n  \n  Dawn steps back, releases her grip on the bark, and the tree goes still. The flowers persist.\n  \n  She opens her eyes. \"See? They recruited me. They recruit laters, and tell us that we can be stronger, better, than those like you. They say I can modify anything I touch, just by thinking about it.\"\n\n  You stare at the tree. \"Can you do people?\" you ask.\n\n  \"No. Can't do people.\" And then Dawn smiles. \"Yet.\"\n  \n  *choice\n    #\"So, how are they doing it? Powers and capability can be tested for. How're they overcoming genetics?\"\n      \"I don't think you'd believe me if I told you.\"\n      \n      \"Trust me,\" you say. \"After today, I'm ready to hear just about anything.\"\n      *goto ch4_oc_psychology\n    #\"That's not funny.\"\n      \"Oh, it is,\" Dawn replies. \"Just a little bit.\"\n      \n      \"Regardless, how are they doing it? How're they overcoming genetics?\"\n      *goto ch4_oc_psychology\n    #\"That's an incredible amount of power, Dawn. You should use it.\"\n      \"No,\" Dawn replies, \"I shouldn't. This is too much power.\"\n      \n      \"We live in a world where people has abilities that humanity could only dream of. Nothing's 'too much'.\"\n      \n      \"Some dreams are nightmares, ${first_name}. And trust me, this one is.\"\n      *goto ch4_oc_psychology\n\n*label ch4_oc_psychology\n*page_break\n$!{ocname} props ${ochim}self against the trunk of a tree. \"Think about your average cape, ${first_name}. Think about the theatre of it all. The coded names, the costumes, the big speeches. Do you think our DNA cares about this sort of thing? Think about the first generation of parahumans - half of them came into their powers as adults and they're still the ones we're measured against. They certainly didn't have them from birth.\"\n  \n\"They might have,\" you reply.\n  \n$!{ocname} stares at you. \"No. It's not genetic, ${first_name}, and it never
