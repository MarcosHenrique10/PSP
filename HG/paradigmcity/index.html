long day, and I really don't have the time to spare on catching up.\"\n\n$!{ocname} sighs over the line. \"Fine. Forget it, then. Goodbye, ${first_name}.\"\n\nThe line clicks dead and you can't help but read something ominous into the silence that greets you, nothing but the blood pounding in your ears.\n\nYou return to Courser's room, sit down and concentrate on the data. Slowly, that cold feeling recedes away. $!{oche}'ll be fine. You're just nervous, paranoid, jumping at shadows. Just over-reacting on the dregs of adrenaline, the end result of one hell of a day that's left you with more than enough work to concentrate on.\n\nYes, ${oche}'ll be fine.\n\n*finish Chapter V: Nemesis", "nemesis": "*temp sentinel_hp 20\n*temp goodend 0\n*temp hubcount 0\n*temp jinncheck false\n*temp aegischeck false\n*temp shiftcheck false\n*temp chevcheck false\n\n*achieve chp4\n[b]Chapter V[/b]\n*line_break\n[b]NEMESIS[/b]\n\n[i]'Heroes need monsters to establish their heroic credentials. You need something scary to overcome.'[/i]\n*line_break\n-Margaret Atwood\n\n*page_break\n*label ch5_grave\n\nYou're standing at the foot of a grave. You know the name carved on the headstone.\n\nIt should be raining. It's too bright, too happy for this.\n\n*fake_choice\n  #I'm sorry.\n  #I should have been there.\n  #Whoever did this will pay.\n  \nThere's no response to your words and certainly none to your thoughts.\n\n$!{ocname}'s grave is utterly silent.\n\nYou almost want to laugh at the absurdity of it all, how callously ${ocname} has been left to rot in some grave on some South Pacific island as opposed to back in Ireland with ${ochis} family. But you know that's the point. With both ${ocname} and ${otherocname} gone, the O'Connell line is ended.\n\nYou're the only person who even came. There's no sign of anything left at the grave - no flowers, no anything. Alone and forgotten, like ${ochis} fears have been finally realised.\n\nThe brisk morning breeze cuts to the bone as you try to find something, anything to say.\n\n*fake_choice\n  #\"Rest in peace, ${ocname}.\"\n  *if ch4_met_oc = \"false\"\n    #\"I should have listened to you - I'm sorry.\"\n  *if (ch1_oconnell_romance = \"Dawn\")\n    #\"I love you. Goodbye.\"\n  *if (ch1_oconnell_romance = \"Alan\")\n    #\"I love you. Goodbye.\"\n\nAnima stands a short distance away. Ever since the incident with Courser, no one goes anywhere alone. With Al-Jinn watching over the Captain and Blueshift and Chevalier on security detail, she was the only one who was able to watch your back.\n\n*if ch4_ada_awakened = \"true\"\n  Anima gives you a sympathetic smile. \"I'm sorry,\" she says.\n  \n  *fake_choice\n    #\"Thanks, Ada.\"\n      Anima just says, \"Don't mention it. Do you need anything?\"\n      \n      You nod. \"Notify the team. Tonight, we're going to war.\"\n    #\"I'll live.\"\n      Anima replies, \"There's more to life than living, take it from me.\"\n      \n      \"We'll see,\" you reply. \"But tonight, we're going to war.\"\n    #\"I'm going to fix this.\"\n      Anima nods. \"I take it you have a plan then.\"\n      \n      \"I do,\" you reply. \"Tonight, we're going to war.\"\n      \n  *goto ch5_war_council\n  \n*else\n  She stares at you and doesn't say anything as you approach. Idly, you wonder if she can even comprehend death or if she sees it as something that merely happens to other people.\n  \n  \"Notify the team,\" you tell her. \"Tonight, we're going to war.\"\n  *goto ch5_war_council\n  \n*label ch5_war_council\n*page_break\nIn the meeting room of a burnt-out precinct, you play the recording of Sentinel and Courser for the benefit of your team.\n\nThey listen, and you watch their faces for any telltale signs of recognition.\n\n\"I'm going to beat Sentinel to death with ${senhis} own stupid helmet,\" Chevalier states, breaking the silence.\n\nNot quite the response you expected, but one you can work with.\n\nAs you begin your speech, what point do you stress?\n\n*fake_choice\n  #The recording - Sentinel turned Courser against us.\n    *set chevalier_relationship %+15\n  #Sentinel's interference with the investigation.\n    *set blueshift_relationship %+10\n    *set aljinn_relationship %+10\n  #$!{ocname}'s warnings of a conspiracy, and the loss of ${ochis} life.\n    *set chevalier_relationship %+5\n    *set aljinn_relationship %+5\n    *set blueshift_relationship %+5\n  #The gathered evidence which points at some manner of misconduct in Paradigm Tower.\n    *set chevalier_relationship %+5\n    *set aljinn_relationship %+10\n    *set blueshift_relationship %+5\n  \nYou watch your team closely as you speak. Not one of them seems to betray the slightest bit of apprehension or concern. They'll be with you all the way.\n  \nThe discussion turns to planning shortly after.\n\n*page_break\n\nBlueshift broods over a map of Paradigm City.\n\n\"If we don't eliminate Sentinel's support mechanism - ${senhis} lieutenants - we'll be caught between a rock and a hard place,\" he says. \"We go after them, hard. Sentinel struck at us without warning, which makes returning the favor somewhat more poetic. Give the word and I'll find enough intel so that we can expose their civilian identities.\"\n\n\"That's not on,\" Al-Jinn says sternly, \"The Captain wouldn't want that.\"\n\n\"I'm surprised you're arguing against it,\" Blueshift replies, raising his eyebrows.\n\n\"It's one thing to expose them and only them, but we'll risk their families and friends.\" She lets that point hang there. Al-Jinn continues, \"We can't escalate this, it'll do more damage to our cause than anything else. We can distract them and then slip in and apprehend Sentinel while they're busy.\"\n\n\"With what?\" Chevalier asks. \"I'd bet that I could stand against Sentinel one-on-one but the ${man} is a tank. We're talking super-strength and invulnerability, just like me - but ${senhe} can fly, too. We'll need everyone together and working in concert to do this without turning Paradigm City into a battlefield.\"\n\n*if ch3_maekir_proof = \"false\"\n  \"I'd suggest Maekir Team,\" Blueshift says, \"But we killed Jotun. It's unlikely that they'll listen to anything we have to say. So, that leaves it to us.\"\n  *goto ch5_maekir_choice\n  \n*else\n  *set ch5_maekir_friendly \"true\"\n  \"What about Maekir Team?\" Blueshift suggests. \"They owe us a favor. If we sic them on Sentinel's lieutenants, we can use the chaos to our advantage.\"\n  *goto ch5_maekir_choice\n  \n*label ch5_maekir_choice\n\nOne by one, the team looks to you for a strategy.\n\n*choice\n  #We'll create a distraction.\n    \"We need a distraction and I don't see any other way than us making it. We draw out Phaestus and Mirage, hit them hard, and then go for Sentinel.\"\n    \n    The team nods and begins putting their heads together to figure out a plan.\n    *goto ch5_distraction_plan\n  *if ch5_maekir_friendly = \"true\"\n    #We'll send Maekir Team as a distraction.\n      \"I'm going to call Maekir Team. While they keep the lieutenants busy, we can grab Sentinel.\"\n    \n      The team nods and begin readying themselves to take on Sentinel.\n      *goto ch5_call_maekir\n  #We'll expose the civilian identities of Sentinel's lieutenants.\n    *set anima_relationship %-5\n    *set chevalier_relationship %-10\n    *set aljinn_relationship %-15\n    \"We'll hit their civilian identities. If we keep them busy there, we'll have time to go after Sentinel.\"\n    \n    Blueshift nods. The other members of your team glare at you, and at him, but don't push the issue.\n    *goto ch5_civilian_strike\n    \n*label ch5_distraction_plan\n*page_break\nIt becomes clear that Sentinel will be spoiling for a fight and that it'll be simple enough to give ${senhim} one.\n\nIf the team makes a move en masse, Paradigm's best will be forced to sortie ${senhis} people. Sentinel won't deign to fight somewhere where ${senhe} can't be seen, so, it means there should be a way of splitting the golden cape from ${senhis} lieutenants. All your team needs to do is just dangle the bait.\n\nWith Phaestus and Mirage taken out of the picture, Sentinel will be that much more vulnerable.\n\nOf course, you find yourself wondering just how vulnerable a supposedly invulnerable ${man} might be.\n*goto ch5_hub\n\n*label ch5_call_maekir\n*page_break\n*set ch5_distraction \"maekir\"\n\nYou dial the number given to you by Maekir team. A grim voice answers on the other end of the line.\n\n\"Business?\"\n\nYou relay the objectives as succinctly as possible. You want Sentinel's lieutenants - Phaestus and Mirage - kept busy. You specify nothing further - after all, if Jotun was so willing to sell out his first employer, one can only assume he'd do the same if pressed by Sentinel.\n\n\"Got it,\" he replies. \"Anything else?\"\n\n*fake_choice\n  #Tell Jotun to minimise collateral damage.\n    *set ch5_jotun_minimal \"true\"\n  #Advise Jotun to apply as much pressure as possible.\n  \n\"You've got it, mate,\" Jotun says in reply. \"We'll call you when we're ready to move. After this, we're equal.\"\n\n\"After this,\" you shoot back, \"I hope to never see you again.\"\n\nJotun just laughs.\n*goto ch5_hub\n\n*label ch5_civilian_strike\n*page_break\n*set ch5_distraction \"civilian\"\nYou try not to think about what Blueshift is going to do.\n\nThe sanctity of the demarcation between cape and civilian is something that has existed ever since the first few capes took to the streets. Like a cold war, neither hero nor villain had much interest in escalating things beyond something they could control, and unpowered individuals didn't want to risk becoming a target... or being left out in the cold when they needed assistance.\n\nBut you need Sentinel, and doing it this way will ensure that your team will be at their best for the inevitable fight.\n\nStill, you try not to think about it.\n*goto ch5_hub\n\n*label ch5_hub\n*page_break\n\nYou finish up on the fifth check of your uniform and gear.\n\nThere's little more you can do to make sure that your gear is in working order.\n\nBut it might be worth checking on your team. Strange, that it's almost a natural thought now.\n\n*label ch5_hub_choice\n*choice\n  *if jinncheck = \"false\"\n    #Check on Al-Jinn.\n      *set hubcount+1\n      *set jinncheck \"true\"\n      *goto ch5_jinn_talk\n  *if chevcheck = \"false\"\n      #Check on Chevalier.\n        *set hubcount+1\n        *set chevcheck \"true\"\n        You find Chevalier outside, shooting hoops in the mid-afternoon sun. As you walk over, you can see that he's just doing it out of some kind of mechanical process. Shoot, score, collect, repeat.\n    \n        His eyes wander to you, then back to the 'game'. \"Hey.\"\n        *choice\n          *if ch4_courser_fate = \"alive\"\n            #Tell him that Courser is alive.\n              *if chevalier_relationship >60\n                Chevalier's face is hard to read. He shoots and the basketball slips through the hoop.\n              \n                \"If it were anyone else, I wouldn't believe them, y'know?\" Chevalier says. \"If he's alive, then he's alive... but I still remember him doing everything he did. He never told me a damn thing. Think I'll ever get an answer?\"\n              \n                \"You might,\" you offer. \"In time.\"\n              \n                He gather up the ball and passes it to you. \"Yeah. Let's shoot some hoops.\"\n                *goto ch5_chev_bb\n              *else\n                Chevalier frowns at you and the basketball crashes off the back of the board.\n              \n                \"Fuck you, ${first_name} - don't come here and tell me that shit. I know he's dead, alright?\"\n              \n                He stalks off without another word and, wherever it is he went, you're unable to track him down before it's time to move.\n                *goto ch5_hub_choice\n          #Apologize for what happened with Courser.\n            Chevalier shrugs. \"I'm not too surprised by it.\"\n          \n            \"Why's that?\"\n          \n            \"Shoot a few hoops and find out,\" he says, passing you the ball.\n            *goto ch5_chev_bb \n          #Ask to join his game.\n            Chevalier shrugs. \"Sure,\" he says. \"If you want.\"\n          \n            He passes you the ball.\n            *goto ch5_chev_bb \n          #Check if he's ready for the operation.\n            Chevalier shrugs. \"Yeah. Basically.\"\n          \n            \"Basically?\"\n          \n            He nods and passes you the ball. \"Shoot a few hoops and find out.\"\n            *goto ch5_chev_bb \n  *if aegischeck = \"false\"\n    #Check on Aegis.\n      *set hubcount+1\n      *set aegischeck \"true\"\n      It's easy enough to find a few minutes to slip down to the hospital and check on the Captain.\n    \n      Unchanged. Still unconscious. Still without a clear idea of when she'll wake up, if ever.\n    \n      On the bed, Aegis looks just as old as you remember her, nothing like the fiery veteran who always found some way to keep the team in-line.\n    \n      You'd wonder what she would do now. You'd wonder what she would do if your positions were reversed.\n    \n      The beeping of some hospital monitor somewhere doesn't give you any answers. But at least she's alive.\n      *goto ch5_hub_choice\n  *if shiftcheck = \"false\"\n    #Check on Blueshift and Anima.\n      *set hubcount+1\n      *set shiftcheck \"true\"\n      You find the secretive pair within Blueshift's makeshift lab. Anima is seated on one of the tables, legs dangling over the edge, while Blueshift seems to work on her arms and back. A variety of metal components lie around the tabletop. Whatever it is they are doing, you know they didn't clear it with you.\n    \n      \"Mind telling me what's happening here?\" you ask.\n    \n      Blueshift doesn't look up from his work. \"HQ installed a variety of safeties in Ada's combat hardware. Inhibitor keys, interrupter devices. I'm removing them.\"\n    \n      \"On whose authority?\" you ask.\n      \n      \n      *if ch4_ada_awakened = \"true\"\n        \"Mine,\" Anima says. \"It's my body and I have a right to have access to all of my capabilities.\"\n        *choice\n          #Point out that, as a machine, Anima has no legal rights and order them both to leave the weapons offline.\n            *set anima_relationship %-20\n            *set blueshift_relationship %-10\n            \"If that's how you see it,\" Anima says, voice terse. She places a metal hand over Blueshift's own, a silent command to stop.\n              \n            \"You may leave now,\" Anima continues, and the pair ignore you until it's time to move.\n            *goto ch5_hub_choice\n          #Allow the procedure to proceed.\n            *set anima_relationship %+10\n            *set ch5_anima_unlocked \"true\"\n            \"Thank you,\" Anima says, half-face splitting in a half-smile. She makes a motion which you can only describe as cocking her arm like a shotgun and her fingers shift about into what you assume is some kind of weapon.\n            \n            \"They say one good turn deserves another,\" she continues, \"So, I've passed you a version of my file - the real version. There's little point in keeping secrets now.\"\n              \n            You watch Blueshift work, for a time, despite the strange feeling of two people making pleasant conversation while equipping themselves with weapons of phenomenal firepower.\n            *goto ch5_shift_powers            \n      *else\n        The pair exchange a look.\n        \n        \"My own,\" Blueshift says.\n        *choice\n          #Tell Blueshift to leave Anima's weapons offline.\n            *set blueshift_relationship %-10\n            *set anima_relationship %-10\n            \"You're not really in charge,\" Blueshift replies, voice guttural, bearing dangerous.\n            \n            Anima places her metal hand on his shoulder even as she stares at you. Blueshift slumps, evidently yielding with a nod of his head.\n            \n            But neither of them are happy with it, it seems. You find yourself with the distinct impression that Blueshift has never been calling the shots here, not really. But you don't get any answers - the pair ignore you until it's time to move.\n            *goto ch5_hub_choice\n          #Allow him to proceed.\n            *set ch5_anima_unlocked \"true\"\n            Blueshift grunts out something that might be a thank you as he returns to his work.\n            \n            As he works, he talks quietly with Anima. Eventually, he says: \"You may want to check your files. We've just uploaded something to your hand terminal.\"\n            \n            You watch him, for a time, but eventually decide to find something else to do. He's not much of a conversationalist.\n            *goto ch5_shift_powers\n  *if hubcount = 4\n    #Time to face Sentinel.\n      *goto ch5_sentinel_fight_begin\n  \n*label ch5_shift_powers\n*page_break\nAs you head for the door, Blueshift calls out: \"${cape_name}, a question.\"\n\nYou turn back. Blueshift is standing there, rubbing his hands on a spare cloth. \"I need to ask you something, before we go to take down Sentinel. Have you ever wondered about where our powers come from?\"\n\n*fake_choice\n  #Yes.\n    Blueshift grins broadly. \"Excellent. So, you'll understand me when I get to talking. Listen, because this might be very important.\n  #No.\n    Blueshift raises his eyebrows. \"Just me, then. No problem. Well, listen, this might be very important.\n\n\"The party line is that powers are a result of genetics,\" Blueshift says. \"I spent my time in South America trying to isolate myself, to figure out how and why we exist. My research doesn't correlate with it being simply genetics. Oh, sure, there are markers there, and there's absolutely a genetic component, but I'm not sure of anything beyond that.\"\n\nBehind him, you note that Anima has found what appears to be a small armory of firearms. She's cleaning a shotgun, apparently not interested in the conversation. You imagine she's heard it before.\n\n*if ch4_met_oc = true\n  You remember what ${ocname} said about ${ochis} own powers, about how there's something else to it, a component that depends on self-confidence. ${ocname} really was on to something, it seems - and ${oche} paid for that knowledge with ${ochis} life.\n  *goto shift_power_choice\n*else\n  You really have no idea what he's talking about, and, given his past, you still have no idea if you can trust him.\n  *goto shift_power_choice\n\n*label shift_power_choice  \n*choice\n  *if ch4_met_oc = true\n    #Tell Blueshift about ${ocname}'s information.\n      \"I can do you one better,\" you tell him. \"You're absolutely right, it's not genetic - at least, not totally. A lot of it is mental, emotional, about believing that you can do it.\"\n      \n      Blueshift stares at you. \"You're kidding,\" he says. \"Who told you this?\"\n      \n      \"An old friend. They paid for it with their life, Blueshift. It's good. They said to think about the costumes and the names, the necessity of acting like you're the biggest badass around.\"\n      \n      \"It tracks,\" he replies. \"And they're killing to keep this suppressed. If we can get Sentinel on the backfoot, we'll weaken ${senhis} powers. The will to fight is the weak point. That explains why the genetic factor doesn't always correlate, and how some of the first capes are the strongest on record, despite not being born with their powers... But the initial catalyst...\" He trails off, mind tracking onto another problem.\n      \n      \"Listen, I need to check on the others. When we move, I need you both to be ready for anything.\"\n      \n      \"Abacus, ${first_name},\" Blueshift replies, and adds: \"You can count on it.\"\n      *goto ch5_hub_choice\n  #Accuse Blueshift of being Exarch and that of tainting his findings.\n    \"You're not sure?\" you ask him, throwing your arms out wide. \"I'll tell you about being not sure, Cross - do I call you Exarch? Do you consider yourself Leland Cross or Santiago Idarraga? Why should I assume that any of this research is accurate, and not just from you playing god in some old temple?\"\n    \n    \"You need to roll the ar,\" Blueshift replies. \"You can call me whatever you like. I know what I did and I'm at peace with the things I've done. All I wanted to do was to piece together what was left of my life after the world went mad. Doubt me all you like but don't doubt my results. You are not the only person in the world who's lost something, ${last_name}.\"\n    \n    \"Don't deflect this on to Anima,\" you begin to say, but Blueshift's head snaps up and there's fire in his eyes.\n    \n    \"I'm not talking about her,\" he seethes. \"[i]Madre[/i], [i]padre[/i] - you know those words, don't you?\"\n    \n    Anima loops her arms around his middle. You use the opportunity to collect yourself.\n    *goto shift_power_choice\n  #Enquire about Anima's stash of firearms.\n    *if ch4_ada_awakened = \"true\"\n      \"Oh, these are just the Captain's weapons,\" Anima says, glancing over at you. \"The shotgun was her favorite. I feel like I owe it to her to take it into the field. I think she'd approve, if she were here.\"\n    \n      \"She means a lot to you, doesn't she?\"\n    \n      \"More than you know, ${first_name}.\"\n      *goto shift_power_choice\n    *else\n      \"Captain's weapons,\" Anima says, not looking up. \"Necessary.\"\n    \n      Well, that explains that.\n      *goto shift_power_choice\n  #Ask Blueshift what he thinks it means.\n    \"So,\" you say, \"What do you think? Have you got anything usable here?\"\n    \n    Blueshift taps his fingers against his thigh. \"I have no idea. But, listen. The first capes, the strongest generation on record? They didn't have empowered parents. The genetic factor doesn't always correlate. When we face Sentinel, be ready for anything.\"\n    \n    \"That goes for you, too.\"\n    \n    \"Abacus, ${first_name},\" Blueshift grins, and adds: \"You can count on it.\"\n    *goto ch5_hub_choice\n \n*label ch5_chev_bb\nAfter his fourth point, Chevalier asks, \"Do you know why I gave up being an independent cape?\"\n\n\"It wasn't in your file,\" you reply.\n\n\"Want to take a guess?\"\n\n*fake_choice\n  #\"I've heard those tight suits are uncomfortable as hell.\"\n    Chevalier laughs. \"True - but no, that's not it.\"\n    \n  #\"Was it your name? It really wasn't great.\"\n    Chevalier laughs. \"Come on, I was just a kid when I came up with it and the first three I wanted were taken. Points for trying!\"\n    \n  #\"Did Courser have something to do with it?\"\n    Chevalier shakes his head. \"No, but it was a similar thing.\"\n       \nChevalier collects the ball in the crook of his arm. \"I used to work with a group called the Kingsmen - yeah, I know, hell of a name but it tested better than Kingspeople with focus groups. We had this whole feudal thing going on - Man-At-Arms, Ballista, Danger Damsel, Joust and, well, me... the guy who really wanted to be called Protector but couldn't get it.\n\n\"Anyway, things were good. We were incredibly popular - there are shirts with my mask on it, if you don't believe me. But there was always the personal politics. Man-At-Arms was a hard-ass, had to have things done his way or not at all. Ballista just wanted to build things. Danger Damsel and Joust had issues with women and drugs respectively. The moment the cameras were off us, it was hell.\"\n\nChevalier lets out a breath. \"For all the footage of us saving the world, there sure was a lot of shit behind the scenes that would have made people hate us. But we had a good PR team and, so, no one knew. Or, if they did, they never got the complete picture.\n\n\"Eventually, I just got tired of it. I got tired of only caring about what Man-At-Arms wanted us to care about. So, I just... walked away. I joined SOLAR because, that way, at least I'd be sent to take care of the important things and I thought we'd all be on the same page. I'd be leaving but it'd mean something, y'know?\"\n\nChevalier exhales. \"And then, two weeks later, the Kingsmen were wiped out by the Seven.\"\n\n*fake_choice\n  #\"It's not your fault, Ryan. No one can stop the Seven. One more cape wouldn't have made a difference.\"\n    Chevalier shakes his head. \"Maybe. They fought them to a standstill, after all, and I'm as tough now as I was then. But I guess you're right, when I really think about it. They all died, or were so broken that sometimes I wish they had.\"\n  #\"I'm sorry.\"\n    Chevalier shakes his head. \"Don't be. They fought them to a standstill, bought time for more capes to arrive and send them packing. But they all died, or were so broken that sometimes I wish they had.\"\n  #\"I guess you got out at the right time, hey?\"\n    Chevalier nods, forcing a smile. \"Yeah. I ran away and my friends all died, or were so broken that I sometimes wish they had.\"\n    \n    \n\"And then you meet a new team,\" you reply, \"Make friends with Courser - and it all happens again. The personal politics, the inability to agree on something as simple as saving the world.\"\n\nChevalier nods. \"Yeah. I don't know. Maybe we can't. Maybe I should just go open a car dealership.\"\n\n*choice\n  *if (ch2_solar_romance = \"chevalier\") or (ch2_solar_romance = \"none\")\n    #\"Don't say that.\" And kiss him.\n      *set ch2_solar_romance \"chevalier\"\n      *set chevalier_relationship %+20\n      *if ch2_romance_delay = \"true\"\n        \"Don't say that,\" you tell him. \"Just because we can't solve everything doesn't mean we're not doing good. Every single one of those tattoos you have is a story of someone whose life you've improved - if not now, then in the future. You're a walking monument to the good you've done.\"\n    \n        You've wandered close to him now, close enough that you can feel his breath on your skin. You lean in and kiss him.\n        \n        As you break away, Chevalier stares, grinning widely. \"Now? he asks, \"Really?\"\n        *fake_choice\n          #\"Well, we're not drunk now.\"\n            \"You're absolutely right,\" Chevalier replies.\n          #\"There's no better time.\"\n            \"I think you're right,\" Chevalier replies.\n          #\"Shut up, Chevalier.\"\n            Grinning, Chevalier mimes zipping his lips closed.\n          \n        Despite his size - or perhaps precisely because of it - Chevalier has a gentle nature as you find somewhere quieter to relax, somewhere you can learn more about his tattoos. Each one tells a story and each one lays open some manner of his background - his hopes, his fears, his dreams, everything that makes him [i]him[/i].\n        \n        Time passes in a heady breeze. In the end, the inevitability of time forces the two of you to seperate. Chevalier kisses you on the forehead, softly, \"There's work to be done.\"\n        \n        He's right, as unfortunate as that fact is.\n        *goto ch5_hub_choice\n      *else\n        \"Don't say that,\" you tell him. \"Just because we can't solve everything doesn't mean we're not doing good. Every single one of those tattoos you have is a story of someone whose life you've improved - if not now, then in the future. You're a walking monument to the good you've done.\"\n    \n        You've wandered close to him now, close enough that you can feel his breath on your skin. You lean in and kiss him.\n    \n        Then, you find somewhere quiet where you can find out more about his tattoos...\n        \n        Time passes. In the end, the inevitability of time forces the two of you to seperate. Chevalier kisses you on the forehead, softly, \"There's work to be done.\"\n        \n        He's right, as unfortunate as that fact is.\n        *goto ch5_hub_choice\n  #\"Don't say that.\"\n    *set chevalier_relationship %+10\n    \"Don't say that,\" you tell him. \"Just because we can't solve everything doesn't mean we're not doing good. Every single one of those tattoos you have is a story of someone whose life you've improved - if not now, then in the future. You're a walking monument to the good you've done.\"\n    \n    Chevalier pulls himself up, stands a little bit straighter. You think you even see that familiar gleam return to his eyes.\n    \n    \"Well, thanks for the peptalk, boss,\" Chevalier says. \"Don't worry, I'll be ready to give Sentinel hell.\"\n    *goto ch5_hub_choice\n  #\"It does seem impossible. Maybe things need to change.\"\n    *set chevalier_relationship %+5\n    \"Maybe there's a better way,\" you tell Chevalier, \"Maybe things need to change. Maybe the old ways were wrong but maybe SOLAR's wrong too. Maybe we just need to keep trying until we find out the right way of saving the world. But who do you want saving the world? Sentinel? Or you? Because I know who I'd prefer.\"\n    \n    \"Yeah,\" Chevalier admits, \"Me too.\"\n    \n    Chevalier pulls himself up, stands a little bit straighter. You think you even see that familiar gleam return to his eyes.\n    \n    \"Well, thanks for the peptalk, boss,\" Chevalier says. \"Don't worry, I'll be ready to give Sentinel hell.\"\n    *goto ch5_hub_choice\n  #\"You should do what you think is best. That's all any of us can do.\"\n    *set chevalier_relationship %+10\n    \"...the only time regretted is time spent wasted, Chevalier,\" you say. \"If you're not happy here, then find something that does make you happy. You don't have a responsibility to act any more than anyone else.\n    \n    Chevalier nods. \"Maybe,\" he says. \"But I don't know if I could stand by and do nothing. If I have the capability to save someone, and don't, and they die... then perhaps I do have a responsibility to act.\"\n\n    Chevalier pulls himself up, stands a little bit straighter. You think you even see that familiar gleam return to his eyes.\n    \n    \"Well, thanks for the peptalk, boss,\" Chevalier says. \"Don't worry, I'll be ready to give Sentinel hell.\"\n    *goto ch5_hub_choice\n\n*label ch5_jinn_talk\nYou find Al-Jinn in the kitchen area of the precinct, nursing a glass of amber liquid. It's too early to be drinking, that much is certain.\n  \n\"Hey,\" Al-Jinn says, as you get closer.\n  \n\"A bit earlier to be drinking isn't it, Naomi?\"\n  \nShe smiles, sheepish. \"Well, that's if I'm drinking alone.\" She indicates the bottle.\n  \n*fake_choice\n  #Take a drink.\n  #Pass.\n    \n\"Is something wrong?\" you ask her, finally.\n\nAl-Jinn drains her glass. \"Where do I begin? The Captain's in hospital, Courser's gone, and an old friend is treating this suffering city like her own personal playground. And, soon enough, we're going to go up against one of the most powerful heroes in the world. Sentinel's going to throw everything ${senhe} has at us.\"\n\n\"Our plan will work,\" you tell her. \"This is necessary.\"\n\n\"Is it? We came here to chase a murder, and now we're upending the social order of the place.\"\n\n\"The case leads where it leads.\"\n\n\"No,\" she retorts, \"The case is led.\"\n\n*fake_choice\n  #\"If you want to stay with the Captain while we handle Sentinel, that's your call.\"\n    Al-Jinn shakes her head. \"No, I'll come with you. I owe you all that much. But afterwards? I don't know.\"\n  #\"Did Mirage really get to you that badly?\"\n  \n    Al-Jinn shakes her head. \"No, but she brought up some memories, some thoughts I like to say that I've forgotten but really only repress and ignore. After we do this, I'm not sure what I'll do next.\"\n    \n  #\"You don't need to be so hard on yourself, Naomi.\"\n    Al-Jinn snaps, \"Yes. Yes, I do. When I can reach into someone's mind and screw with their brain, I need to be hard on myself.\"\n    \nShe sighs, examining her empty glass. \"I've never been very good at anything, ${first_name}. I was a terrible Muslim, so, I gave it up. I couldn't handle using my power to cheat people back in Egypt, so, I gave that up. I didn't want to be an independent, so, I joined SOLAR. At least that way, if I'm told to use my power on someone, it's not my responsibility. I didn't grow up, ${first_name}, I just ran away.\"\n\n*fake_choice\n  #\"You always have a responsibility over your own fate, no matter what.\"\n    *set aljinn_relationship %+10\n    Al-Jinn shakes her head vehemently. \"Don't tell me that. If that's true, then I'll never use my powers again. This isn't a power anyone should have.\"\n  #\"You can't abandon the Captain, or the team, now. We need you.\"\n    *set aljinn_relationship %+5\n    Al-Jinn nods. \"I know. I know, I know, I know. And I'll stand on the line, and I'll use my powers, and I'll think about what'll happen in the future at a later time.\"\n  #\"No one can run forever - eventually, everything will catch up to you.\"\n    Al-Jinn smirks. \"I'm very fast, don't forget that. But I'll never have to use my powers again.\"\n\n    \n\"I didn't know your powers weighed on you so heavily,\" you say.\n\n\"It's the ability to reach into someone's mind and make them not them. They'll do anything I say, anything I want, and the only thing that stops them from making them my puppets is that fact that I'll never let myself push my ability so far - and do you know how easy that would be, ${first_name}? It's like holding paper to a candle, getting close enough to heat it and then pulling back before it ignites.\"\n\nShe looks down at her gloved hands. \"I'll burn people if I stay here, if I stay in this job.\"\n\n*fake_choice\n  #Set your hand over her own. \"I trust you.\"\n    *set aljinn_relationship %+10\n    Al-Jinn twitches, fighting down the urge to pull away.\n    \n    \"Where will you go then, if not SOLAR?\"\n    \n    Al-Jinn shrugs, capping the bottle of alcohol. \"I might teach,\" she says. \"The Academy is always looking for instructors. Maybe saving the world with our fists is wrong, maybe education would work better.\"\n    \n    You smile. \"Hey, I'm from Capetown and I know they could use someone like you.\"\n    *goto ch5_hub_choice\n  *if (ch2_solar_romance = \"aljinn\") or (ch2_solar_romance = \"none\")\n    #Set your hand over her own, and kiss her.\n      *set ch2_solar_romance \"aljinn\"\n      *set aljinn_relationship %+20\n      Al-Jinn caps the bottle of alcohol. \"I was thinking, maybe, that I might teach. Maybe saving the world with our fists is wrong, maybe education would work better. If the world's burning, you don't put it out with your fists.\"\n    \n      You smile and whisper, \"How about we let it burn, just for an hour or two?\"\n    \n      \"That,\" Al-Jinn replies, threading her fingers through your own and pulling you close, \"Was a terrible line.\n    \n      \"But I'm okay with that.\"\n      *if ch2_romance_delay = \"true\"\n      \n        Later, you suspect that Al-Jinn cheats, using her power as her fingers wander over your back and she whispers in your ear, but you find yourself not caring. For a while, wrapped in each other's arms, you just talk - about your hopes and fears, your dreams for the future...\n        \n        Time passes by in a heady haze. But eventually, Al-Jinn leans over and kisses your forehead. \"There's work to be done. We can't let things burn forever.\"\n        \n        She's right, as unfortunate as that fact is.\n        *goto ch5_hub_choice\n      *else\n        Time passes, what seems like hours spent too quickly in each other's arms. Eventually, Al-Jinn leans over and kisses your forehead. \"There's work to be done. We can't let things burn forever.\"\n        \n        She's right, as unfortunate as that fact is.\n        *goto ch5_hub_choice\n  #\"Then what will you do if not this?\"\n    Al-Jinn shrugs, capping the bottle of alcohol. \"I might teach,\" she says. \"The Academy is always looking for instructors. Maybe saving the world with our fists is wrong, maybe education would work better.\"\n    \n    You smile. \"Hey, I'm from Capetown and I know they could use someone like you.\"\n    *goto ch5_hub_choice\n\n*label ch5_sentinel_fight_begin\nIt's Sentinel, and it has been from the start.\n\n$!{senhe} called your team here to solve a murder that you're not sure was supposed to be solved, interfering at every step of the way.\n\n$!{senhe} sent a heavily-armed unit of murderers after your team, and then coerced a friend into treachery.\n\nThe saying is that only fools rush in and yet hesitation would invite destruction. Waiting would give Sentinel that same amount of time to prepare, time to gather ${senhis} forces, time to prepare deflections for your accusations and explanations for your evidence.\n\nNo.\n\nThis ends tonight.\n\n*page_break\n*label ch5_sentinel_fight_distraction\n*if ch5_distraction = \"maekir\"\n  *achieve maekirally\n  Your hand tablet chimes.\n\n  Jotun's voice greets you. \"We're ready to move, mate.\"\n\n  You give the order, and your team moves on Paradigm Tower - just as Jotun and his team move on Sentinel's lieutenants.\n  *goto ch5_sentinel_tower\n\n*elseif ch5_distraction = \"civilian\"\n  Your hand tablet chimes.\n  \n  Blueshift's voice greets you. \"I'm ready,\" he says.\n  \n  \"If words gets out, remember, this is all on you,\" you remind him.\n  \n  \"Understood. See you shortly.\"\n  \n  You give the order, and your team moves on Paradigm Tower - just as Blueshift puts his plan into action.\n  *goto ch5_sentinel_tower\n\n*else\n  *goto ch5_confrontation\n\n*label ch5_confrontation\n*page_break\nYou and your team pile into a PCPD transport that Blueshift somehow managed to procure with his ever-increasing affinity for underhanded dealings.\n\nIt's a tight fit but reassuring. It seems like a ridiculous plan - steal a PCPD vehicle and hope that Phaestus and Mirage come running to expose the dreaded over-reach of SOLAR, but you're sure it will work.\n\nBlueshift directs the vehicle into one of the ruined, abandoned parts of Paradigm City. One of the parts where no one voluntarily goes. One of the parts where people pretend not to see. One of the parts where Sentinel failed.\n\nIt's a fitting battleground.\n\nAnd that's when you catch a glimpse of a golden giant stepping on to the street, swinging a massive hammer-\n\nThe roof of the transport becomes the floor as it is pitched end over end by the impact, and the cabin is filled with a terrible cacophony just as your head snaps back against your seat.\n*page_break\n\n*if ch3_blueshift_mission = \"true\"\n  Your head rings. You need to stop letting Blueshift drive, you think.\n  \n  You call to your team, wanting to know if they're okay, and a chorus of acknowledgments come back.\n  *goto confront_body\n  \n*else\n  Your head rings. You call to your team, wanting to know if they're okay, and a chorus of acknowledgments come back.\n  *goto confront_body\n \n*label confront_body\n*set ch5_pcpd_alive \"true\"\n*set ch5_pcpd_status \"active\"\n\nYou pop the hatch and pull yourself out into the glare of the afternoon sun, landing on the asphalt.\n\nLight glints off the giant golden armored form of Phaestus, standing there with his ridiculously overwrought hammer, his whole bearing exuding an arrogant challenge. At his side stands Mirage. And behind them, a whole host of PCPD Empowered Crime Enforcement officers, all wearing sleek carapace armor, all holding high-tech weapons designed to neutralise empowered individuals.\n\nTo neutralise [i]you[/i].\n\nPhaestus' voice rumbles from behind his helmet, grandiose and terrible. \"I've been waiting for this moment.\"\n\nHe begins to monologue and you realise you have an opportunity here.\n  \n*choice\n  #Convince the PCPD officers to stand down.\n    *set classical %+10\n    You call to the PCPD officers, telling them that is a SOLAR mission which is now being interfered with by Phaestus. \"We have authority here, and anyone who supports these two will be in violation of IPSA statutes - this is your chance to leave quietly, before anything happens that can't be undone.\"\n    \n    You only hope you'll be heard over Phaestus' booming voice.\n    *if bravado >2\n      *set ch5_pcpd_status \"down\"\n      They seem to hear you. As Phaestus intones threats and proclamations, you note the PCPD officers quitting the field. Mirage notices, too, and taps Phaestus on the arm.\n      \n      He pauses and turns his helmet in your direction.\n      \n      Sentinel's two lieutenants fade back, calling to the officers, as the rest of your team moves to your side.\n      *goto confront_plan\n    *else\n      If they heard you, however, the PCPD officers give no sign. They'll be standing against you.\n      \n      In seconds, Phaestus gives the order and the officers surge forward as one.\n      *goto confront_plan_b \n  #Use the moment to catch the officers off guard with an incapacitating blast.\n    *set classical %+10\n    Lightning arcs between your fingers and you thrust your hand out, aiming to lash the squad of officers with a burst of power. Not enough to kill but enough to take them out of the fight.\n    *if ((power >2) or (accessory = \"capacitor\"))\n      *set ch5_pcpd_status \"down\"\n      Your power lances outwards, washing over each member of the PCPD unit. They drop into a uniformed heap.\n      \n      Phaestus and Mirage fall back, suddenly bereft of their support.\n      *goto confront_plan\n    *else\n      But your power slips through your fingers, or maybe it's just the countermeasures in the PCPD suits - either way, the tactic fails, and the officers surge forwards as one.\n      *goto confront_plan_b\n  #Hit the officers with a lethal blast.\n    *set classical %-10\n    Lightning arcs between your fingers and you thrust your hand out, aiming to lash the squad of officers with a burst of power, a burst that'll decisively close out their part of the fight.\n    *if ((power >2) or (accessory = \"capacitor\"))\n      *set ch5_pcpd_alive \"false\"\n      Your power lances outwards, washing over each member of the PCPD unit. They drop into a uniformed heap, smoking and shuddering.\n      \n      Phaestus and Mirage fall back, suddenly bereft of their support.\n      *goto confront_plan\n    *else\n      But your power slips through your fingers, or maybe it's just the countermeasures in the PCPD suits - either way, the tactic fails, and the officers surge forwards as one.\n      *goto confront_plan_b\n  #Have Al-Jinn incapacitate them with her power.\n    *set ch5_pcpd_status \"aljinn\"\n    Al-Jinn steps out of the transport, speaking a word of power.\n    \n    You feel that peculiar sense of static clouding your mind and tracing tentacles around each vertebrae but the feeling passes.\n    \n    The PCPD stand at attention, utterly immobile.\n    \n    Phaestus and Mirage fall back, suddenly bereft of their support.\n    *goto confront_plan\n  *if ch5_anima_unlocked = \"true\"\n    #Tell Anima to engage them with her weapons.\n      *if ch4_ada_awakened = \"false\"\n        *set ch5_pcpd_alive \"false\"\n        Anima's response comes back as a clipped affirmative. In that same instant, she's bursting through the side of the stricken transport, green bolts blasting from where her hands should be.\n        \n        Where those bolts land, PCPD officers are blown to pieces.\n        \n        She's among them, then, slipping past their weapons and breaking them with her fists.\n        \n        The PCPD - or what's left of them - falls back, utterly routed in the face of overwhelming firepower. Phaestus and Mirage fall back, too, attempting to rally their troops. You don't imagine they'll have much success.\n        *goto confront_plan\n      \n      *else\n        \"No,\" Anima states. \"I'm not going to fire on those officers unless they make the first move.\"\n        \n        In moments, they do. The PCPD officers surge forwards as one.\n        *goto confront_plan_b\n  #Order your team to engage.\n    *goto confront_plan_b\n    \n*label confront_plan\n*page_break\n\"They're regrouping,\" Blueshift states. \"Phaestus has too much pride to withdraw entirely.\"\n\n\"What's the plan?\" Chevalier asks, rubbing at his knuckles.\n\n*if ((ch5_pcpd_alive = true) and (ch5_pcpd_status = \"active\"))\n  \"We need to be ready for those two when they come back,\" you say. \"They're experienced capes with a team of PCPD officers at their command. We can't underestimate any of them.\"\n  \n  \"We'll need two people to keep an eye on Mirage,\" Al-Jinn says. \"She can't confuse two people at once.\"\n  \n  \"Or we could use Anima for that,\" Chevalier suggests. \"She can't confuse her, right?\"\n  \n  Anima nods.\n  \n  \"But we might need her to crack Phaestus open,\" Blueshift points out. \"And we'll need to ensure that Phaestus can't call for more reinforcements, much less bring Sentinel to the field. If that happens, we won't be going home. So, let's get this right.\"\n \n  *goto pcpd_alive_ctf\n\n*else\n  *page_break\n  \"We need to be ready for those two when they come back,\" you say. \"They're outnumbered now, yes, but they're both experienced capes. We can't underestimate them.\"\n  \n  \"We'll need two people to keep an eye on Mirage,\" Al-Jinn says. \"She can't confuse two people at once.\"\n  \n  \"Or we could use Anima for that,\" Chevalier suggests. \"She can't confuse her, right?\"\n  \n  Anima nods.\n  \n  \"But we might need her to crack Phaestus open,\" Blueshift points out. \"And we'll need to ensure that Phaestus can't call for reinforcements, much less bring Sentinel to the field. If that happens, we won't be going home. So, let's get this right.\"\n  *goto pcpd_gone_ctf\n  \n*label pcpd_alive_ctf\n*if ch2_won_ctf = True\n  You can't help but remember the capture the flag bout, back in Geneva. It feels so long ago. All you need to do is repeat that victory.\n\n  Outside of a practice arena, against two capes and a private army of PCPD officers, all of whom will be trying to kill you.\n\n  No pressure.\n  *goto pcpd_alive_planning\n  \n*else\n  You can't help but remember the capture the flag bout, back in Geneva. It feels so long ago. And, from what you remember, you lost that practice match.\n\n  No pressure.\n  *goto pcpd_alive_planning\n\n*label pcpd_gone_ctf\n*if ch2_won_ctf = true\n  You can't help but remember the capture the flag bout, back in Geneva. It feels so long ago. All you need to do is repeat that victory.\n\n  Outside of a practice arena, against two capes who will be trying to kill you.\n\n  No pressure.\n  *goto pcpd_dead_planning\n\n*else\n  You can't help but remember the capture the flag bout, back in Geneva. It feels so long ago. And, from what you remember, you lost that practice match.\n\n  No pressure.\n  *goto pcpd_dead_planning\n  \n*label pcpd_dead_planning\n*page_break\n*if ch4_courser_fate = \"alive\"\n  *page_break\n  Your hand terminal chimes and you fetch it out. You try to hide your surprise at who the message is from.\n\n  Courser.\n  \n  [i]${first_name}, listen. Phaestus and Mirage are coming for you. They've lost their officers, so, you've got less to worry about. You and Al-Jinn should be able to tangle with Mirage while you leave Phaestus to either Chevalier or Anima. They're trying to call up more units to drop a hammer on you - have Blueshift interdict them. Kick their asses.[/i]\n  \n  You have no idea if it is accurate, but he did seem to know what he was talking about back in Geneva...\n  *goto ch5_battle_choices\n*else\n  *goto ch5_battle_choices\n  \n*label pcpd_alive_planning\n*if ch4_courser_fate = \"alive\"\n  *page_break\n  Your hand terminal chimes and you fetch it out. You try to hide your surprise at who the message is from.\n  \n  Courser.\n  \n  [i]${first_name}, listen. Phaestus and Mirage are coming for you, with all the officers they've been able to rally. You and Al-Jinn should be able to tangle with Mirage while you leave Phaestus to either Chevalier or Anima. They have no other reinforcements coming, so, Blueshift should be able to take care of the ones on the ground. Kick their asses.[/i]\n  \n  You have no idea if it is accurate, but he did seem to know what he was talking about back in Geneva...\n  *goto ch5_battle_choices\n*else\n  *goto ch5_battle_choices\n\n*label ch5_battle_choices\n\"So,\" you say, \"To deal with Mirage, we'll send...\"\n\nShe's a slippery target, this one, you reflect. Firepower isn't a factor, nor is brute strength. You'll need to send Anima, and prevent her from being elsewhere, or devote two other people.\n\n*if brains>2\n  You think about it for a few long moments, considering your team. Yourself and Al-Jinn are probably the best bet, keeping your bigger guns available for more pressing threats.\n  *goto mirage_choice\n  \n*else\n  You think about it for a few long moments, considering your team. It's a tough choice.\n  *goto mirage_choice\n\n*label mirage_choice\n*fake_choice\n  #Anima.\n    *set ch5_anima_assigned \"true\"\n    *set ch5_anima_task \"mirage\"\n    Anima nods.\n  #Al-Jinn and Blueshift.\n    *set ch5_aljinn_assigned \"true\"\n    *set ch5_blueshift_assigned \"true\"\n    *set ch5_aljinn_task \"mirage\"\n    *set ch5_blueshift_task \"mirage\"\n    \"Let's hope this works,\" Al-Jinn says.\n  #Al-Jinn and Chevalier.\n    *set ch5_aljinn_assigned \"true\"\n    *set ch5_chevalier_assigned \"true\"\n    *set ch5_aljinn_task \"mirage\"\n    *set ch5_chevalier_task \"mirage\"\n    \"Let's hope this works,\" Al-Jinn says.\n  #Al-Jinn and yourself.\n    *set ch5_aljinn_assigned \"true\"\n    *set ch5_you_assigned \"true\"\n    *set ch5_aljinn_task \"mirage\"\n    *set ch5_you_task \"mirage\"\n    \"Let's hope this works,\" Al-Jinn says.\n  *if ch4_courser_fate = \"alive\"\n    #Go with Courser's plan.\n      *set ch5_courser_plan \"true\"\n      You elect to go with Courser's plan, and hope for the best.\n      *goto ch5_battle_result\n  \n*if ch5_pcpd_status = \"active\"\n  You continue, \"Handling the PCPD officers that'll be supporting Phaestus and Mirage, that's...\"\n  *goto pcpd_plan_choice\n\n*else\n  You continue, \"Ensuring that Phaestus and Mirage will be cut off from bringing in any reinforcements, that's...\"\n  *goto pcpd_plan_choice\n\n*label pcpd_plan_choice\n*if brains>2\n  You glance at your team, figuring out who might be best here. Someone who can strike from above the street level, keeping the PCPD suppressed, while being able to relay their movements. Blueshift seems like the prime candidate.\n  *goto pcpd_plan_choice2\n\n*else\n  You glance at your team, figuring out who might be best here. Very few of them have anything to fear from a PCPD unit. Really, how hard could it be?\n  *goto pcpd_plan_choice2\n\n*label pcpd_plan_choice2\n*fake_choice\n  *if ch5_anima_assigned = \"false\" \n    #Anima.\n      *set ch5_anima_assigned \"true\"\n      *set ch5_anima_task \"pcpd\"\n      Anima nods.\n  *if ch5_aljinn_assigned = \"false\"\n    #Al-Jinn.\n      *set ch5_aljinn_assigned \"true\"\n      *set ch5_aljinn_task \"pcpd\"\n      \"Got it,\" Al-Jinn says, \"I'll keep anyone from poking their noses into our little arena.\"\n  *if ch5_blueshift_assigned = \"false\" \n    #Blueshift.\n      *set ch5_blueshift_assigned \"true\"\n      *set ch5_blueshift_task \"pcpd\"\n      \"Got it,\" Blueshift says, \"I'll take them down as gently as I can.\"\n  *if ch5_chevalier_assigned = \"false\"\n    #Chevalier.\n      *set ch5_chevalier_assigned \"true\"\n      *set ch5_chevalier_task \"pcpd\"\n      \"Roger that,\" Chevalier comments.\n  *if ch5_you_assigned = \"false\"\n    #Myself.\n      *set ch5_you_assigned \"true\"\n      *set ch5_you_task \"pcpd\"\n      \"My responsibility,\" you finish.\n  *if ch4_courser_fate = \"alive\"\n    #Actually, go with Courser's plan.\n      *set ch5_courser_plan \"true\"\n      You elect to go with Courser's plan, and hope for the best.\n      *goto ch5_battle_result\n\nYou nod to yourself. The plan's all coming together. Hopefully, it'll work.\n\n\"Which leaves, Phaestus and his giant hammer. But I've got faith in...\"\n\n*if brains >2\n  Phaestus. He's got a hammer that is almost as big as he is and a suit of armor that is a tough nut to crack. You'll need your best here, your strongest. The ones who can take a bad hit and keep going. You glance at Anima and Chevalier. Either one of them would be suitable.\n  *goto phaestus_choice\n\n*else\n  Phaestus. He's got a hammer that is almost as big as he is and a suit of armor that is a tough nut to crack. You'll need your best here, your strongest. It's a hard choice.\n  *goto phaestus_choice\n  \n*label phaestus_choice\n*fake_choice\n  *if ch5_anima_assigned = \"false\" \n    #Anima.\n      *set ch5_anima_assigned \"true\"\n      *set ch5_anima_task \"phaestus\"\n      Anima nods.\n      \n  *if ch5_aljinn_assigned = \"false\"\n    #Al-Jinn.\n      *set ch5_aljinn_assigned \"true\"\n      *set ch5_aljinn_task \"phaestus\"\n      \"Me? Against him?\" Al-Jinn splutters. \"Are you crazy? He's almost certainly practiced anti-manip strategies!\"\n      \n  *if ch5_blueshift_assigned = \"false\" \n    #Blueshift.\n      *set ch5_blueshift_assigned \"true\"\n      *set ch5_blueshift_task \"phaestus\"\n      Blueshift nods. \"I'll crack him open like an egg.\"\n      \n  *if ch5_chevalier_assigned = \"false\"\n    #Chevalier.\n      *set ch5_chevalier_assigned \"true\"\n      *set ch5_chevalier_task \"phaestus\"\n      \"You've got it,\" Chevalier says. \"It'll be for Courser, too, when I'm done pulling him out of that suit.\"\n      \n  *if ch5_you_assigned = \"false\"\n    #Myself.\n      *set ch5_you_assigned \"true\"\n      *set ch5_you_task \"phaestus\"\n      \"...my ability to bring him down,\" you say.\n  *if ch4_courser_fate = \"alive\"\n    #Actually, go with Courser's plan.\n      *set ch5_courser_plan \"true\"\n      You elect to go with Courser's plan, and hope for the best.\n      *goto ch5_battle_result\n  \nYou clap your hands together. \"Let's get to it, people. Checkmate time. We take these two, then we take Sentinel.\"\n*page_break\n*label ch5_battle_result\n\nYou don't need to wait very long at all. Phaestus comes stomping up the street, silhouetted against the sun and gleaming like a knight of old, his hammer too-casually held against his shoulder.\n\nYour plan goes into action.\n\n*if (((ch5_aljinn_task = \"mirage\") and (ch5_you_task = \"mirage\")) and (ch5_blueshift_task = \"pcpd\")) or (ch5_courser_plan = \"true\")\n  And it works like a well-oiled machine.\n  \n  Chevalier and Anima catch Phaestus in a pincer and set about disarming him as they pummel him from multiple angles. Between Chevalier's strength and Anima's machine accuracy, they manage to render his armor inoperable. Phaestus goes down. Moments later, Anima wrenches him from his suit and Chevalier slaps nullifiers on him.\n  \n  You and Al-Jinn manage to spot someone who looks different to each one of you. Mirage goes down and Al-Jinn personally slaps her with a set of nullifier cuffs.\n  \n  For all the chaos, the battle is over relatively quickly.\n  \n  But this was only a prelude, and the main event is yet to come.\n  \n  You gather up your team, and move on Sentinel's tower.\n  *achieve forgery\n  *set blueshift_relationship %+10\n  *set chevalier_relationship %+10\n  *set aljinn_relationship %+10\n  *goto ch5_sentinel_choice\n  \n*else\n  *set ch5_mirage_dead \"true\"\n  *set aljinn_relationship %-10\n  And it all goes wrong.\n  \n  You're not sure where exactly the problem is but you misjudged something along the way. Phaestus is amongst your people like a wrecking ball, swinging that hammer with enough force to send a parked sedan through a fourth-story window.\n  \n  You're not even sure where Mirage is, until she goes to leap on Blueshift - who lashes out with a telekinetic burst, sending her tumbling away.\n  \n  Phaestus lands a hit on Chevalier, then one on Anima, and he leaps for you.\n  \n  You catch him mid-leap with a powerful gout of crackling energy. Something explodes on the back of his suit and Phaestus crashes to the ground, just to the left of you.\n  \n  When the dust has finally settled, your team seems okay, all in all. Chevalier's bleeding and Anima is limping and Blueshift is nursing his side... and Al-Jinn cradles Mirage in her arms, openly weeping behind her helmet.\n  \n  Behind his helmet, Phaestus wheezes in pain. His helmet has been half blown off his head, revealing craggy skin and a salt and pepper beard.\n  \n  *choice\n    #Put him out of his misery.\n      *set ch5_phaestus_dead \"true\"\n      *set classical %-10\n      You flick your wrist at Phaestus and something sizzles within his suit. Smoke rises.\n      *goto ch5_sentinel_choice\n    #Arrest him.\n      You yank Phaestus from his armor and slap nullifier cuffs on him. The old man doesn't resist.\n      *goto ch5_sentinel_choice\n\n*label confront_plan_b\n*page_break\nYour team meets Phaestus' charge.\n\nIt becomes a chaotic mess, a furball. You dart here and there, landing blows where you can, and trying to keep track of every member of your team.\n\nYou spy Chevalier going toe-to-toe with Phaestus, ducking under his hammer so he can slam his shoulder into his opponent's cuirass, leaving a sizable dent and driving him back.\n\nTo your left, Al-Jinn commands a number of PCPD officers to turn on each other, and they do so with remarkable alacrity.\n\nIn the middle of an intersection, Blueshift and Anima stand back to back and throw out a punishing amount of firepower, telekinetically or otherwise.\n\nSuddenly, it's quiet - and you're aware that the survivors of the PCPD, along with Phaestus and Mirage, are pulling back.\n*goto confront_plan\n\n*label ch5_sentinel_choice\n*page_break\n\nParadigm Tower looms in the distance and you know, at the top, Sentinel lies waiting. You almost think you can see the golden armored cape standing there, watching you.\n\nYou hope your team will be up to the challenge. You trust them, you believe in their ability - but Phaestus and Mirage were just lieutenants, with neither the powers nor the legend that Sentinel has been able to wield so deftly.\n\n\"How're we going to play this, boss?\" Chevalier asks, as you fall under the shadow of the tower.\n\n*choice\n  #You'll go to Sentinel alone, with your team as nearby backup. Sentinel might come quietly.\n    *set classical %+10\n    \"Are you sure?\" Blueshift asks. \"$!{senhe}'s not going to come quietly.\"\n    \n    \"!${senhe} might,\" you reply, \"It's worth a chance to end this without further violence.\"\n    \n    \"We'll need a code word,\" Chevalier says. \"Some way to know if you think things are going to go bad.\"\n    *choice\n      #Go.\n        Nice and classic. An understated command. No flourishes, no theatrics - if it comes to pass that Sentinel won't come quietly, then it'll need to be handled quick and clean.\n        *goto ch5_sentinel_tower\n      #Scorpion.\n        There's a story, one that seems appropriate now. A frog takes a scorpion across a flooded river, despite his belief that the scorpion will sting him.\n    \n        Halfway across, the scorpion strikes, unable to fight its nature for a second more.\n    \n        If Sentinel can't turn away, then you'll strike. You're not sure which person is the scorpion in this version of the tale.\n    \n        On your way there, you remember one thing.\n    \n        The fable ended with both animals drowning.\n        *goto ch5_sentinel_tower\n      #Hydra.\n        One beast, many heads. It seems appropriate for your team. Sentinel might get one of you but he can't possibly get all of you.\n    \n        At least, that's what you hope.\n        *goto ch5_sentinel_tower\n      #Showtime.\n        A classic line, with enough bravado to get the team hyped up for what could be a daunting battle. If Sentinel doesn't come quietly, it'll be one hell of a show.\n    \n        Hopefully you'll live long enough to see the ending.\n        *goto ch5_sentinel_tower\n      #Downfall.\n        Appropriate enough, really, for a task that some might consider amounting to deicide if it goes right, or something far worse if it goes wrong.\n    \n        In just a few minutes, Sentinel falls, of ${senhis} own volition or at your hands.\n        *goto ch5_sentinel_tower\n  #You'll go to Sentinel with your team as a show of force.\n    *set classical %-10\n    *set ch5_sentinel_strat \"team\"\n    \"Right on,\" says Chevalier, pounding his fist into his palm.\n    \n    And, who knows, perhaps such a display of force will allow you to convince Sentinel to come quietly.\n    \n    You find yourself almost believing it.\n    *goto ch5_sentinel_tower\n    \n*label ch5_sentinel_tower\n*page_break\nYour team sweeps into the tower, making for the elevators. No one tries to stop you, which isn't surprising - Sentinel wouldn't want anyone to get in the way of ${senhis} final showdown.\n\n*if ch5_sentinel_strat = \"team\"\n  You breah ${senhis} sanctum and your team fans out, blocking the door and covering the windows. Sentinel, for ${senhis} part, pushes ${senhim}self out of his chair, in full golden regalia, like this is all a pleasant surprise.\n  \n  \"So, here you all are,\" Sentinel says, a glass in one hand, \"Just as I expected.\"\n  *page_break\n  \n  Sentinel looks to each of your team in turn. \"Chevalier, always a pleasure. Al-Jinn, Anima. Exarch - oh, it's Blueshift now, isn't it? I don't see Courser or the Captain with you. Give them my regards.\"\n  \n  Your team bristles around you. You almost swear under your breath at the energy you feel building.\n  \n  You begin, \"You know why we're here.\"\n  *choice\n    *if ((((ch3_found_cloth = \"true\")) and (ch3_false_flag = \"true\")) and (ch3_misschief_data = \"true\"))\n      #\"It's over, Sentinel. We've got enough evidence to prove what you've been doing here...\"\n        \"...so,\" you finish, \"Come quietly, and let's make this easier on everyone here.\"\n      \n        Sentinel swirls ${senhis} drink, pretending to think it over.\n      \n        \"It was stupid of you to announce how much you know,\" Sentinel states. \"Now, I'm afraid I'll have to kill you all. Unfortunate, really, that you've led them all here to die.\"\n      \n        Sentinel sets ${senhis} glass down, and leaps to attack.\n        *goto ch5_fight_begins\n    #\"Come quietly and you'll get a fair hearing.\"\n      \"You do realise, ${cape_name},\" Sentinel begins, \"That age and experience will always trump youth and enthusiasm?\"\n      \n      \"Care to put it to the test?\" Chevalier asks. You hear him, rather than see him, crack his knuckles.\n      \n      Sentinel swirls ${senhis} drink, pretending to think it over.\n      \n      \"Very well. Take your best shot. But know this, if you do, none of you will get a second.\"\n      \n      Sentinel sets ${senhis} glass down, gives ${senhis} cape a flourish, and assumes a combat stance.\n      *goto ch5_fight_begins\n    #\"You're under arrest, Sentinel.\"\n      \"On what charge?\" Sentinel retorts.\n      \n      \"Aiding and abetting a criminal conspiracy, interfering in a SOLAR investigation,\" Blueshift states. \"Whatever we dream up, really.\"\n      \n      Sentinel swirls ${senhis} drink, pretending to think it over.\n      \n      \"No,\" ${senhe} says. \"Take your best shot. But know this, if you do, none of you will get a second.\"\n      \n      Sentinel sets ${senhis} glass down, gives ${senhis} cape a flourish, and assumes a combat stance.\n      *goto ch5_fight_begins\n    #\"Team, bring ${senhim} down.\"\n      *goto ch5_fight_begins\n\n*else\n  You step into Sentinel's office, into the eye of the storm, utterly alone.\n  \n  Sentinel stands there, in full regalia, a glass in one hand.\n  \n  \"Ah,\" $!{senhe} begins, like it's a pleasant surprise, \"I've been expecting you.\"\n  *page_break\n  Behind the helmet, Sentinel is unreadable. \"Let's not waste our time,\" ${senhe} says. \"I know why you're here and you must know that I won't come quietly. But there's no reason to escalate straight to violence. You came here alone, without your SOLAR team. I do wonder why - an attempt to save my soul, perhaps, or a way for you and I to discuss things as adults?\"\n  \n  Of course, Sentinel is only half-correct. Your team is here, lurking and waiting for your word. Close enough to intervene if things go badly, but not close enough to risk spooking Paradigm's greatest cape.\n  \n  *choice\n    #\"Come quietly, Sentinel. I won't ask again.\"\n      \"So be it,\" Sentinel says, and draws himself up to ${senhis} full height. $!{senhe} places ${senhis} glass down.\n      \n      You say the word, and the room explodes into action.\n      *goto ch5_fight_begins\n    #\"I'm willing to talk.\"\n      \"Good,\" Sentinel says, \"Good.\"\n      \n      Sentinel perches on the corner of ${senhis} desk, looking like the image of a kindly school teacher and less of a towering hero - or villain, depending on your perspective.\n      \n      \"What's happened here in Paradigm is regrettable. You are right, of course. This has been a trap from the start, but also a crucible in which the righteous can flourish. The ends justify the means when the security of the world is at stake.\"\n      \n      \"And you,\" Sentinel continues, pointing both hands at you, \"Are who I wanted to see flourish, to best my lieutenants. And, if I've heard the reports correctly, you have.\"\n\n      \"Why? Is hired help hard to find?\"\n      \n      Sentinel chuckles. \"Phaestus is, at heart, a coward. Mirage is easily bought with promises of power or meaningless displays of wealth. Both of them rely on me to get what they want and, therefore, enact things exactly as I want. They're useful for now, but won't be going forward. For that, I could use someone like you.\"\n  \n      *fake_choice\n        *if (((ch3_found_cloth = \"true\") and (ch3_false_flag = \"true\")) and (ch3_misschief_data = \"true\"))\n          #\"I solved your plot, Sentinel. It was easy. Why do you think I need anything you can offer me?\"\n        *if ((ch5_phaestus_dead = true) and (ch5_mirage_dead = true))\n          #\"They won't be going forward, you're right - [i]they are dead[/i].\"\n        #Spit in ${senhis} face.\n          *achieve spit\n        #\"Fuck you, Sentinel.\"\n          *achieve spit\n        #\"Thank you for the information, Sentinel. You're of no further use to me.\"\n    \n      Even through the helmet, you can feel Sentinel's rage. \"You foolish ${senboy}. Don't even think to cross me. Don't even think that you'll survive my wrath. Fresh out of that pathetic walled ghetto and you think you can do anything to me!?\"\n  \n      That was it. You've pushed Sentinel's buttons, and now ${senhe}'s about to explode.\n  \n      You say the word, and Sentinel's office explodes before ${senhe} does.\n      *goto ch5_fight_begins\n  \n*label ch5_fight_begins\n*page_break\nThe room explodes into action.\n\nWith bright blue wings, Anima blasts toward Sentinel. Her moves are impossibly precise as she slips past Sentinel's guard, pits the mechanical strength and precision of her arms and legs against Sentinel's limbs and sockets.\n\nFor a moment, it even seems like she'll win.\n\nAnd then Sentinel reaches for her left arm, finds it, and with a twist-and-pull and a gout of sparks, rips it free. A strike from ${senhis} palm sends Anima to the ground.\n\nAl-Jinn barks, \"[i]Stop[/i]!\"\n\nThe entire room freezes. On one side of the room, Anima struggles to rise, lacking the grey matter that Al-Jinn is so easily able to scramble.\n\nSentinel staggers. \"A good trick,\" ${senhe} states, jaw jerking awkwardly, but ${senhis} voice takes on a more normal cadence as ${senhe} speaks, \"But do you honestly think I've never faced such powers before?!\"\n\n$!{senhe} batters down Al-Jinn in a second, only for Chevalier to lock ${senhim} in a grapple.\n\nYou can't get a clear shot.\n\nYou maneuver.\n\n*page_break\n\n*label fightoffice2\n\nSentinel's leg comes up, right into Chevalier's groin, crushing the soft organs there.\n\nSentinel drives Chevalier to his knees and kicks him down. \"Not as invulnerable as you think, Chevalier - you still feel pain!\" \n\nImmediately, ${senhe} stomps down on Chevalier's chest and sends him crashing through the floor, and through several floors below.\n\n\"It's just evolution, Chevalier!\" Sentinel shouts, \"Nothing personal!\"\n\nSentinel's own desk slams into ${senhim}, almost pitching ${senhim} out the window. Sentinel leaps it, catches Blueshift by the neck before he can ready another telekinetic attack.\n\n\"Evolution only creates imperfection,\" Blueshift growls out.\n\n\"A fitting epitaph!\" Sentinel crows, taking to the air, and hurls Blueshift back down to earth, breaking him on the floor. He doesn't rise. \n\n\"This time,\" Sentinel tells him, rolling ${senhis} neck, \"Stay dead.\"\n\nBarely thirty seconds had passed, but it was seemingly enough time for Sentinel to conclusively decide the engagement.\n\n*page_break\n\n*label fightoffice3\n\nFloating in the middle of ${senhis} ruined office, Sentinel spreads ${senhis} arms wide, as if making a gesture of supplication. Given the circumstances, you can only see the mockery in it. SOLAR's best hadn't even come close.\n\n*if sentreason = 1\n  \"I remember what you once told me,\" Sentinel begins, \"That you wanted to protect everyone. Well, ${first_name}, do you still want to protect me now? Do I still deserve it?\n  *goto fightoffice4\n  \n*elseif sentreason = 2\n  \"You once said that you wanted to stop the bad guys,\" Sentinel says. \"Well, here I am. A bad guy. Or, at least, your nemesis. Or, at least, you think I am. Haven't you learned by now that it is all a matter of perspective?\n  *goto fightoffice4\n  \n*elseif sentreason = 3\n  \"I remember that you once told me that you just wanted to tell people what to do,\" Sentinel says, \"It's no surprise that we're here now, really.\n  *goto fightoffice4\n \n*elseif sentreason = 4\n  \"I remember you telling me that you wanted to be just like me,\" Sentinel begins. \"But that's impossible. Nothing good will ever come out of the Academy. They're not making heroes, they're making soldiers - and I'm sure they'll reward you well.\n  *goto fightoffice4\n \n*elseif sentreason = 5\n  \"Do you remember when you first met me?\" Sentinel asks. \"Because I do. I remember you saying that you didn't know what you wanted to do with your life. I wonder if you know now, ${cape_name}.\n  *goto fightoffice4\n  \n*label fightoffice4\n\n\"So, here we are, you and I. What, no final words?\"\n\n*fake_choice\n  #\"I will stop you, Sentinel.\"\n  #\"This ends here.\"\n  #\"Only one of us is walking away.\"\n  #\"You're going to pay for everything you've done!\"\n\nSentinel grins, the expression barely visible beneath ${senhis} helmet.\n\n\"You'll certainly try,\" ${senhe} says, and is upon you.\n\nYou've seen ${senhim} dismantle your team - literally, in one case - but it's something else entirely to have that strength and speed bearing down on you with hatred in its eyes. $!{senhis} blows are impossible to block and every blow you land barely seems to register. \n\n\"You think I hate you, don't know, ${cape_name}?\" Sentinel says, slipping away from one of your attacks like it was barely a concern. \"I don't. I hate what you represent. What you are? I pity that. I can take my uniform off and no one will know who I am. But you? That little school has marked you, mind, body and soul.\"\n\n$!{senhe} stalks around you like a plains predator, looking for weaknesses. \"That's why I'm going to bring this charade to an end.\"\n\nSentinel leaps, and you come to a sudden realisation.\n\nThis isn't a fight you can win.\n\nYou're going to lose.\n\nAnd everyone is going to die.\n\n*fake_choice\n  #No-!\n  #I can't-!\n  #I won't-!\n  \nYou're floating and all around you is nothing but an infinite black. No light. No stars.\n\nNo anything.\n\n*page_break\n\nDarkness extends in all directions with all the oppressive weight of the ocean or the existential insignificance of the void.\n\nAnd then the darkness is split with azure light, brilliant and scintillating. Something is the source of it. Something big. Something that resonates with you, behind your eyes.\n\nNot alive. Nothing like this could be alive. But that's irrelevant - a force like gravity isn't alive, and yet it exists. Exerts a pull. \n\nIt is more like that - a universal constant - than any mere causality-bound [i]organism[/i].\n  \nYou stare at its shifting surfaces, all transposing angles and jagged protrusions, caught and unable to look away. Entire civilisations could have grown up around this [i]thing[/i] and not one of them would have ever have managed to escape its shadow.\n  \nAnd the sheer power of it, crawling over your skin and through you like a chemical burn! Every nerve in your body, every neuron-! They all thrum with power, threatening to rip you to pieces! It-\n\n*fake_choice\n  #-is terrifying.\n    *set power+1\n    You turn from the light and from that dreadful resonance, even as it fills your entire being-\n    \n    With even just that brief touch, your powers blaze brighter than they ever have before.\n    \n    It's all so simple.\n  #-is calling to you.\n    *set power+2\n    *set brains+1\n    *set brawn+1\n    *set bravado+1\n    You reach out your hand, and that terrific resonance fills your entire being, shaking you to pieces-\n    \n    You touch that light, and your powers burst to life behind your eyes.\n    \n    It's all so simple.\n  #-is yours, and yours alone.\n    *set ch5_source_embrace true\n    *set power+3\n    *set brains+2\n    *set brawn+2\n    *set bravado+2\n    You embrace it, fall into the deific resonance that threatens to shatter you, and refuse to yield-\n    \n    The intensity is overwhelming, a mindless feeling that threatens to consume you.\n    \n    It's all so simple.\n\n*page_break\n\nThis time, when Sentinel hits you, you catch ${senhis} fist - and the energy bleeds off around it, right back into you. It surges through your arms and up your spine, lighting up each vertebrae with electric intensity.\n\nBehind your eyes, something twitches into awareness.\n\nIt's all so simple. Oh, so [i]that's[/i] what I can do with my power. It's no mere electrokinesis, that's mistaking a lake for an ocean, a torch for a star. \n\nAbsolute energy control.\n\nWhen you hit Sentinel this time, ${senhe} goes flying, all that energy imparted directly back from where it came. Of course, ${senhe} catches ${senhim}self after a few feet but that grin is gone now. Now, ${senhe}'s wearing that familiar frown.\n\nYou've just found your footing, and then you find Sentinel's foot - slamming into your chest like a sledgehammer. The great glass panorama shatters around you, and the cold evening air screams in your ears as you're suddenly airborne.\n\n*label fightskies\n*page_break\n\nWith Sentinel's kick ringing in your ears, it takes a moment for you to arrest your descent - redirecting all that energy into keeping you still. Energy crackles around you, popping and sparking around your fingers, as you look left and right for your opponent. All you spy are helicopters emblazoned with news station logos, all of them coming far too close for comfort.\n\nSentinel rises from beneath you, all too happy to meet you in melee. $!{senhis} blows rip through the air but now you can block and each one heralds a thunderclap. The fight's more equal now, which means Sentinel is that much more desperate and that much more dangerous.\n\nYou wonder how long it's been since ${senhe}'s faced anyone approaching an even footing to ${senhim}.\n\nYou wonder if Sentinel knows that you're aware of ${senhis} trump card, of everyone's trump card - that it's not about powers, it's about will. This battle will be decided by whether you can make Sentinel fold before ${senhe} can do the same to you.\n\n*fake_choice\n  #Smash Sentinel down to earth - with extreme prejudice.\n    *set sentpower+1\n    *set sentinel_hp -Brawn\n    \"You like sayings, Sentinel - so here's one for you! Everything that rises must fall!\"\n\n    \"And pride goes before a-\" Sentinel's words are cut off as ${senhis} jaw twists under your hammer blow. You don't give Sentinel even a second to recover - you lash ${senhim} once, twice, three times, and kick ${senhim} down to the ground below.\n\n    You roar down to meet ${senhim}. $!{senhe} can't get even a second. You don't land on the asphalt as much as you hit it, bleeding off the energy as you set your eyes on your opponent.\n\n  #Play the hero and warn the news helicopters away!\n    *set sentinel_hp -Bravado\n    *set sentbravado+1\n    \"Get out of here!\" You yell, over the roaring wind - you have no idea if they can hear you, so, you punctuate the yell with a flailing gesture. \"Sentinel's gone mad!\"\n\n    They pull back.\n\n    You can [i]feel[/i] the flash of their cameras as Sentinel's fist finds your jaw. If nothing else, the world will know that the great hero punched out someone trying to warn them on live television.\n\n    $!{senhis} arms squeeze you so tightly that it feels like your ribs will burst and the turn ${senhe} pulls has your stomach kicking itself into your chest that, thanks to ${senhis} grip, feels far too crowded as it is.\n\n    At least you did the right thing, right?\n\n    It's only some small comfort as the ground comes rushing up to meet you.\n\n  #Outwit Sentinel at range to evade ${senhis} superior strength and toughness.\n    *set sentinel_hp -Brains\n    *set sentbrains+1\n    You tag Sentinel with a great gout of lightning from your hand, splitting the air with the sound of a thunderclap as it connects. The silver-and-gold cape hovers there for nergy you can muster.\n    *set sentinel_hp -Power\n    You thrust you hands out as Sentinel charges and arc everything you can pull from every car, every sign, every smartphone, everything you can pull from the transformer - and let Sentinel have it.\n\n    You catch Sentinel mid-leap and your energy pours into ${senhis} chest, blasting ${senhim} off-course. Sentinel pitches right, in an uncontrolled fall, and lands amidst the broken glass and marble of an office lobby.\n\n    $!{senhe}'s already getting up.\n*label fightoffice\n*page_break\n\nIdly, you wonder what kind of company would get such a nice lobby as you duck under Sentinel's cross.\n\nDozens of people could fit in here, which allows you to dance around Sentinel - and allows ${senhim} plenty of opportunities to leave ${senhim}self open to a strike. Luckily, the place appears to be deserted, although security cameras provide a silent audience.\n\nBeneath your feet, generators thrum - powerful enough to keep this whole building operating without the grid. You could just reach down and draw on them.\n\nThe feeling is intoxicating.\n\n*fake_choice\n  #Attempt to talk Sentinel down, in vision of the security cameras.\n    *set sentinel_hp -Bravado\n    *set sentbravado+1\n    \"Sentinel, you have to stop this!\" You hold your hands up in front of you, the international symbol for 'I don't want to fight'. Even if the cameras can't pick up on sound, they can see that you're trying to calm things down - not escalate them any further than they've already gone.\n    \n    \"Is this what they taught you!?\" Sentinel snarls, \"To talk?! I've faced down Hesperion, Lady Red, Regicide King! I've never lost! I learned how to win - what the hell did you learn, locked away in that pathetic model town?!\"\n    \n    $!{senhe} strikes you again, putting you through a series of walls. The air is thick with plaster and concrete, but only for a moment - Sentinel slams into you at full speed, hurling you through the air. As eve
