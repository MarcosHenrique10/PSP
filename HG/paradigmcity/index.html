kir_attack\n\n*else\n  You come to a heavy door - a huge metal thing designed to weather fire, fist or fulcrum - bars your path. What looks like a biometric lock - a palm reader - sits in the door. That kind of thing is easy enough to fool with a slight jolt of your power.\n\n  You can hear the unintelligible noise of a voice on the other side of the door.\n\n  *choice\n    #Go in.\n      *goto ch3_club_shift_in\n    #Don't.\n      *goto ch3_club_shift_leave\n    \n*label ch3_club_shift_in\n*set ch3_blueshift_attempt \"true\"\nYou direct a bolt of energy into the lock, shorting it out. Silently, the lock disengages. The door is heavy but slides open without too much effort.\n\nInside, Blueshift stands in the middle of the room, one hand raised before him, fingers turned up like grasping talons.\n\nAnd, beyond him, his legs kicking to find some purchase on a floor that he's not able to reach, must be the person he's here to meet. Around him, the detritus of an office swirls like a languid cyclone, all of it caught in Blueshift's telekinetic power.\n\n\"I thank you for your service,\" Blueshift says.\n\nHe hasn't noticed you yet. Nor has the other occupant of the office.\n\n*choice\n  #Blast Blueshift immediately.\n    *goto shift_club_blast\n  #Slam the door and announce yourself.\n    *goto ch3_shift_club_announce\n  #Turn around and leave.\n    *goto ch3_club_shift_out\n    \n*label ch3_shift_club_announce\n\nThe door slams closed, and Blueshift turns to look at you. \"You,\" he says, the word an accusation, his voice reaching from the eye of his own telekinetic storm.\n\n\"What the hell are you doing in here?\" you retort.\n\n\"Fixing a mistake.\"\n\n*choice\n  #Blast him.\n    *goto shift_club_blast\n  #Ask Blueshift to explain himself.\n    *goto shift_club_explain\n    \n*label shift_club_blast\n*set classical %+15\nLightning leaps from your fingertips, striking Blueshift in the chest. He's flung back, into the wall, and the shock of the blast drops his concentration. His victim tumbles to the ground, gasping for breath.\n\nBlueshift staggers to his feet. If a glare could kill, this one would level a small city.\n\n\"You idiot!\" Blueshift snaps, \"I told you to wait!\"\n\nHe flings a chair at your knees. The impact is hard and you hit the ground harder. You raise your hand and blast him again, matching the intensity with the pain in your legs. Despite his telekinetic defense, this second blast drops Blueshift.\n\nThe three of you lie there on the ground, gasping for air and groaning in pain.\n\n*fake_choice\n  #\"I can't let you kill him, not without knowing why.\"\n    \"It's simple,\" Blueshift states. \"This man was an accessory to an empowered villain, one I knew personally. I let him go, when I really shouldn't have. Call it a mistake of mercy. He reached out for me with the claim that he knew something about the events in Paradigm - which was and is a lie. Luring me here on false pretenses... it doesn't endear me to him.\"\n    \n    \"Is that true?\" you ask.\n    \n    The other man lowers his gaze to the floor, simmering to himself.\n    \n    \"The universe has led us to this point. We both know that there's only one outcome here. I die, or you die. And I plan to be immortal,\" Blueshift says, a smile coming to his face. He raises his hand, a subtle corona of force twisting around his fingers.\n        \n  #\"I'm not going to be an unwitting accessory in a murder.\"\n    \"You would never have known if you hadn't come looking for it,\" Blueshift replies.\n    \n    \"That's not the point.\"\n    \n    \"Isn't it? We're killers, all of us. Some of us acknowledge that more than others. But every single person who works with you has killed someone. The fact that I'm here at all gives me the latitude to do this.\"\n    \n    Blueshift raises his hand, a subtle corona of force twisting around his fingers.\n  #\"Death is not the answer - there must be another way.\"\n    \"Death is the only way that ensures our survival,\" Blueshift replies. \"The only way that guarantees that this one won't stab us in the back.\"\n    \n    \"What if you're wrong?\"\n    \n    \"You haven't known me for very long if you think I'm wrong about things like this. This was inevitable.\"\n    \n    Blueshift raises his hand, a subtle corona of force twisting around his fingers.\n    \n*choice\n  #Tell Blueshift to let him go instead.\n    *set classical %+10\n    \"Let him go,\" you tell Blueshift.\n    \n    He pauses, hand outstretched. \"I'll indulge you. Make your case.\"\n    \n    *choice\n      #\"What would Ada think?\"\n        *set ch3_blueshift_attempt \"true\"\n        With that simple question, it's like something passes over Blueshift's face.\n        \n        The telekinetic nexus around Blueshift's fingers slows, stops. His fingers curl into a fist and he slides his hand into the pocket of his jeans, with all the gravitas of holstering a handgun.\n        \n        \"You're off the hook,\" Blueshift tells his victim. \"We're leaving. And if you tell anyone we were here, I'll find you - and I'll drive the final nail into your coffin. I go my way, you go your way, and never shall the two meet.\"\n        \n        The man nods. \"Never shall we meet.\"\n        \n        \"Come on,\" Blueshift says, heading for the door. \"Let's get out of here, before I change my mind.\"\n        \n        The man mouths 'thank you' to you as you go.\n        *goto shift_club_nomurder\n      #\"I gather that you've come from a dark place - use this as an opportunity to move forwards.\"\n        *set ch3_blueshift_attempt \"true\"\n        Blueshift pauses at your words. His brow furrows.\n        \n        As if in reaction to his thoughts, the telekinetic nexus around his fingers slows, stops. His fingers curl into a fist and he slides his hand into the pocket of his jeans, with all the gravitas of holstering a handgun.\n        \n        \"You're off the hook,\" Blueshift tells his victim. \"We're zzical look that Al-Jinn gives you.\n*goto ch3_club_drinks_2\n\n*label ch3_no_club\n\n\"I can't,\" you tell Blueshift, \"I need to finish this report - it's nothing personal.\"\n\n\"I wouldn't care even if it was.\" He leaves, Anima and Al-Jinn shadowing him.\n\nTrue to your words, you return to the report.\n\n*page_break\n\nYou're not sure how long you remain there, bathed in the blue glow of the laptop monitor, feeling far too like you're back in Cadet School and have procrastinated for too long on some important paper. But, eventually, it is done.\n\nYou're checking over it again when you hear the door open.\n\nYou turn, surprised, and catch sight of Anima lurching into the lobby. The moonlight strikes her face at just the right angle and revulsion squeezes your stomach.\n\nHalf of her face is missing.\n*goto ch3_post_maekir\n\n*label ch3_maekir_attack\nAt the wheel, Blueshift leads the way back to the precinct.\n\n*if ch3_blueshift_murder = \"true\"\n  \"So much for that,\" he says, once the car is well on the way, \"My associate didn't know a thing. I'm sorry to have wasted your evening.\"\n  \n  The fact that he can talk so casually about a murder fills you with something terrible. There's no guilt, no anything - that man died and Blueshift won't even have the honesty to tell his own team what happened.\n  \n  *fake_choice\n    #Say something.\n      *set classical %+5\n      Just as you open your mouth, something slams into the front of the car.\n      \n      There's smoke, tires squealing, and then the jarring impact of your vehicle hitting something at high speed.\n      \n      Everything goes black.\n    #Keep quiet.\n      *set classical %-5\n      No, now's not the time.\n      \n      At that same moment, something slams into the front of the car.\n      \n      There's smoke, tires squealing, and then the jarring impact of your vehicle hitting something at high speed.\n      \n      Everything goes black.\n      \n  *page_break\n\n  Your ears ring and your neck hurts, but you're alive.\n\n  \"Is everyone alright?\" Blueshift says, from the front of the car.\n\n  *fake_choice\n    #\"Yes.\"\n    #\"My neck's killing me.\"\n    #\"Nice driving, Shift.\"\n  \n  You mutter out something that is taken as an affirmative.\n\n  \"Yeah,\" Al-Jinn says. \"Wicked whiplash, though. What the hell happened? Did you hit someone's dog? Have too much to drink in your 'meeting'?\"\n\n  Anima, riding shotgun, answers for him. \"Bullet impacts the engine block.\"\n\n  She's already getting out of the car, like she's ignoring her own words.\n\n  Anima steps outside, ready for anything.\n\n  The moment her foot hits asphalt, everything goes to hell.\n  *goto ch3_maekir_ambush\n\n*else\n  \"So much for that,\" he says, once the car is well on the way, \"My associate didn't know a thing. I'm sorry to have wasted your evening.\"\n  \n  So, that's it. Blueshift's little covert mission comes to such an ignominious end.\n  \n  At that exact moment, something slams into the front of the car.\n  \n  There's smoke, tires squealing, and then the jarring impact of the vehicle hitting something at high speeds.\n  \n  Everything goes black.\n  \n*page_break\n\nYour ears ring and your neck hurts, but you're alive.\n\n\"Is everyone alright?\" Blueshift says, from the front of the car.\n\n*fake_choice\n  #\"Yes.\"\n  #\"My neck's killing me.\"\n  #\"Nice driving, Shift.\"\n  \nYou mutter out something that is taken as an affirmative.\n\n\"Yeah,\" Al-Jinn says. \"Wicked whiplash, though. What the hell happened? Did you hit someone's dog? Have too much to drink in your 'meeting'?\"\n\nAnima, riding shotgun, answers for him. \"Bullet impacts the engine block.\"\n\nShe's already getting out of the car, like she's ignoring her own words.\n\nAnima steps outside, ready for anything.\n\nThe moment her foot hits asphalt, everything goes to hell.\n*goto ch3_maekir_ambush\n\n*label ch3_maekir_ambush\n*page_break\n\nYou're not sure what happened.\n\nA sharp crack and Anima crumpled to the ground, a hole in her chest. You can't help but stare - her eyes open, staring ahead at nothing. Smoke curls around the scorched edges of her uniform.\n\nAl-Jinn's voice snaps you out of it. \"Sniper!\"\n\n*fake_choice\n  #Get to cover immediately!\n    You dive out of the car, scrambling across asphalt and sidewalk to find the rest of your team, hunkered down behind a heavy concrete embankment.\n    \n    \"Anima? She's...\"\n    \n    \"We can't help her, not now,\" Blueshift fires back, \"The only thing we can do is hit back!\"\n  #Try to check on Anima.\n    You scramble across the car seats towards Anima, only for the car to slip beneath your fingers, nails catching on the upholstery, and Blueshift yanks you towards him, sharing cover with him behind a heavy concrete embankment. You land roughly, spine on concrete, and you know he doesn't care.\n    \n    \"You can't help her!\" Blueshift snaps.\n    \n    \"But you-\"\n     \n    \"Neither can I! None of us can! The only thing we can do is hit back!\"    \n    \nYou pause, catching your breath.\n    \nIt takes you a moment or two to realise one thing. You hear something.\n\nNot another gunshot, though.\n\nFootsteps.\n\nHeavy, armored footsteps.\n\n*page_break\n\nBlueshift peeks out, for a split second. He curses under his breath. \n\nHe says to Al-Jinn, \"Maekir.\"\n\n*if brains >2\n  You recognise the name. Maekir Unit. A trio of mercenaries with powered suits, powerful weapons and an affinity for Nordic mythology. Jotun, Ulfr and Valkyrja.\n  \n  And they have a body count.\n  *goto jotunintro\n*else\n  \"Who?\" you ask.\n  \n  \"They're mercenaries,\" Al-Jinn says, \"Powered suits, Viking themed. Their leader is Jotun, with the spear. The other two are Ulfr and Valkyrja. Entropy and terror, respectively.\"\n  *goto jotunintro\n*label jotunintro\n*line_break\n*line_break\n\"Well, g'day.\" Despite the electronic masking on the man's helmet, his Australian accent rings through. \" ests against one shoulder and he carries his shield loose and easy. His armor is without identification or notable design - a bland, simple thing designed for war.\n\n*if (maekircount >1)\n  Without his helmet, you can see the man himself. Pale, brown hair cut like a soldier, cold eyes. Scars.\n  *goto maekir_c_a\n      \n*else\n  His helmet is an impassive thing, a simple glowing horizontal bar across the face where his eyes should be.\n  *goto maekir_c_a\n  \n*label maekir_c_a\n\nYou fling your hands at Jotun and lightning snaps from your fingers to his chest. With a sharp, electric crack, Jotun goes flying backwards.\n\nStill, with armor like that, you know he'll be back in the fight.\n\n\"Anima!\" Blueshift roars, seeing an opportunity, \"[i]Go loud![/i]\"\n\nYou think he's gone crazy - that is, until you spy a a dark blur, the impression of a humanoid figure, riding wings of blue flame.\n*goto maekir_c2\n\n*label maekir_a2\n*page_break\n\nThat blur slams into Jotun, knocking him back. His spear descends in a glowing arc, the glowing blade catching the dark figure on the arm, but that figure hammers him with their fists and sends him into a retreat. He falls back, jumpjets carrying him to a nearby roof, and then out of sight.\n\n\"He'll be back,\" the figure says in her familiar woodwind voice.\n\nAnima, and the flesh on her arm hangs like ribbons, charred and burnt from close contact with Jotun's spear.\n\n*fake_choice\n  #\"What-?\"\n  #\"How-?\"\n  #\"Anima-?\"\n  \n*goto ch3_anima_surprises\n\n*label maekir_b2\n*page_break\nThat blur slams into Jotun before he has a chance to recover, knocking him back. He's quick though, experienced, and swings his spear in a wide arc - more to get some distance than anything else. Still, the blade catches the dark figure on the arm. The blow isn't debilitating and they retaliate, hammering him with their fists.\n\nJotun falls back, engages his jumpjets, and retreats to a nearby roof - and then out of sight.\n\n\"He'll be back,\" the figure says in her familiar woodwind voice.\n\nAnima stands there, a neat hole in her chest. The flesh on her arm hangs like ribbons, charred and burnt from close contact with Jotun's spear.\n\n*fake_choice\n  #\"What-?\"\n  #\"How-?\"\n  #\"Anima-?\"\n  \n*goto ch3_anima_surprises\n\n*label maekir_c2\n*page_break\nThat blur slams into Jotun before he has a chance to recover, knocking him back. He's quick though, experienced, and swings his spear in a wide arc - more to get some distance than anything else. Still, the blade catches the dark figure on the arm. The blow isn't debilitating and they retaliate, hammering him with their fists.\n\nJotun falls back, engages his jumpjets, and retreats to a nearby roof - and then out of sight.\n\n\"He'll be back,\" the figure says in her familiar woodwind voice.\n\nAnima stands there, a neat hole in her chest. The flesh on her arm hangs like ribbons, charred and burnt from close contact with Jotun's spear.\n\n*fake_choice\n  #\"What-?\"\n  #\"How-?\"\n  #\"Anima-?\"\n  \n*goto ch3_anima_surprises\n\n*label ch3_anima_surprises\n\nYou splutter out the question, unable to believe what you're seeing.\n\nIt's Anima - that dark skin, thick black hair, the height and muscles... but there's something missing, the cold arrogance, the calm disdain.\n\nThe meat of her left arm. It takes you a moment to realise what you're seeing - not bone, not flesh, but gleaming metal. Some kind of robotic limb.\n\nAnima grins at you. \"[i]Jambo,[/i]\" she says. \"I wish I could play catch up but Jotun's on his way back. They're going to catch us in a three-way pincer - I'll take care of Ulfr. Shift-\" She spares him a warm hug, despite the situation, \"Work on Valkyrja with Al-Jinn. ${cape_name}, can you slay the giant for me?\"\n\nJotun. By yourself.\n\n*fake_choice\n  #\"I'm not sure-\"\n  #\"Absolutely!\"\n  #\"Wait, wait- What-?\"\n  \nYour response is drowned out by a loud crack and the distinct sound of metal hitting metal. Anima rocks forward on her toes, struck from behind.\n\n\"There he is,\" Anima says, and she takes to the air, bright blue plumes of flame lighting from between her shoulders - engines? Thrusters?\n\nShe's got more than just a robotic limb, that's for sure.\n\nValkyrja lands to your right, looking similar to Jotun in style if not design - her helmet has a beatific, angelic face, neutral in both expression and feeling. One part beauty, one part inhumanity.\n\nThe moment she lands, Blueshift hurls a car in her direction and she vanishes under it.\n\nYou'd watch, but Jotun lands to your left, his spear ready, his helmet off.\n\n\"Didn't know you had that much firepower with you, friend,\" Jotun says.\n\n\"It won't save you, though. Time to die.\"\n\n*goto maekir_fight\n\n*label maekir_fight\n*page_break\n\nJotun stands before you, wearing a vicious sneer instead of his helmet. He turns his spear in a circular arc, the glowing blade leaving a searing after imagine on your retinas.\n\nYou're at a distinct disadvantage. No uniform and your team is busy with their own opponents. Jotun's a professional and, at the end of the day, you're still fresh out of the Academy.\n\nBut Anima obviously believed you could do it, with that sudden personality she'd found at the end of a bullet.\n\nYou flex your hands, and call electricity to your command.\n\nYour look at Jotun's spear as he begins to advance, shield held up. Energy. Electricity. That's the key, isn't it?\n\n*choice\n  #Blast him with as much energy as you can produce.\n    *goto maekir_fight_1\n  #Attempt to use your powers to draw the energy from Jotun's suit and immobilise him.\n    *goto maekir_fight_2\n  #Attempt to use your powers to harness the energy in Jotun's spear - and blast him.\n    *goto maekir_fight_3\n    \n*label maekir_fight_1\n\nThat careful advance on Jotun's part gives you time, time to focus on your power, time to let it build and cascade upon itself, until your hands are so bright that you can't even look at from his own blade and turn it against him.\n    *goto maekir_round2c\n    \n*label maekir_round2a\nYou wait for him to close the gap, as you build that energy in your hands, a self-propagating reaction which builds and builds upon itself, until you can't look at it without blinding yourself.\n\nYou raise your hands and unleash that incandescent nova on Jotun. It collides with his shield, electricity arcing from every edge, leaping to streetlights so that their globes shatter and rain down glass upon the battlefield.\n\nAll you need to do is rip that shield from his grip, and then let the wave of power wash him away.\n*if power >2\n  Something sings behind your eyes.\n  \n  You wrench your hands to one side, and yank Jotun's shield from his hand. Before he can recover, you arc two bolts of lightning into his chest, sending the armored man down for the count, to fall amidst smoking asphalt.\n  *goto maekir_ending_choice\n\n*else\n  *set ch3_maekir_player_lost \"true\"\n  It goes wrong. Jotun charges, breaking into a run, his shield held before him. Lightning crackles in every direction and, as you duck away, he catches you with the end of his spear.\n  \n  You fall, stars bursting to life behind your eyes.\n  *goto maekir_ending_choice\n  \n*label maekir_round2b\nJotun's suit has a critical flaw, if you can just find the opening to exploit it. Without power, it's nothing more than a museum piece.\n\nThis is only a theoretical use of your power. But it's possible. It has to be.\n\nYou focus on Jotun's armor, trying to listen to that strange sound that feels almost like singing, some opera of electrons and excited particles...\n\n*if power >1\n  You find the harmony and bring it forth.\n  \n  Light streams from Jotun's suit, wrapping around your hand, and you quite literally rip the power from it.\n  \n  Jotun freezes, trapped in his own armor.\n  *goto maekir_ending_choice\n\n*else\n  *set ch3_maekir_player_lost \"true\"\n  You touch the harmony, for a brief second, but it slips through your fingers.\n  \n  The singing in your head is replaced by ringing in your ears as Jotun slams you with his shield and spins, catching you with the haft of his spear.\n  \n  You fall, stars bursting to life behind your eyes.\n  *goto maekir_ending_choice \n\n*label maekir_round2c\n\nYou set your eyes on Jotun's energised lance. It's a dangerous thing, able to cut through anything and everything, and one he'd gladly use on you if he could reach you.\n\nBut if you can repurpose all that energy, and use it on him...\n\nYou reach out, letting your power resonate with Jotun's energy blade, listening to that strangely electric song behind your eyes...\n\n*if power >1\n  You find the harmony and let it flow through you.\n  \n  The blade splutters and dies, causing Jotun to stop mid-stride. You envision the blade, this electrical Sword of Damocles, and hurl it at Jotun's chest.\n  \n  It strikes true and bites deep. Jotun collapses, one hand on the asphalt.\n  \n  He falls onto his spear, shattering it. Well, apparently it's not so indestructible.\n  *goto maekir_ending_choice\n\n*else\n  *set ch3_maekir_player_lost \"true\"\n  You touch the song, for a brief second, but it slips through your fingers.\n  \n  The singing in your head is replaced by ringing in your ears as Jotun slams you with his shield and spins, catching you with the haft of his spear.\n  *goto maekir_ending_choice \n\n*label maekir_fight_2\n\nThat careful advance on Jotun's part gives you time, time to focus on your power, time to let it resonate with the power cells and batteries that keep Jotun's armor mobile. Without that energy, his suit is nothing more than an expensive iron maiden.\n\nIt's theoretical, this use of your power, only something you had briefly dabbled with in the Academy halls - but something that should be possible. Theoretically, at least.\n\nYou focus on Jotun's armor, trying to listen to that strange sound that feels almost like singing, some opera of electrons and excited particles...\n\n*if power >2\n  You find the harmony and bring it forth.\n  \n  Light streams from Jotun's suit, wrapping around your hand, and you quite literally rip the power from it.\n  \n  Jotun freezes, trapped in his own armor.\n  *goto maekir_ending_choice \n\n*else\n  You touch the harmony, for a brief second, but it slips through your fingers.\n  \n  The singing in your head is replaced by ringing in your ears as Jotun slams you with his shield and spins, catching you with the haft of his spear.\n  *if brawn >3\n    It hurts, and stars burst into life behind your eyes, but you're tough. You hang on, gritting your teeth, and prepare to go for another round.\n    *goto maekir_round_two\n  *else\n    *set ch3_maekir_player_lost \"true\"\n    You fall, stars bursting to life behind your eyes.\n    *goto maekir_ending_choice \n\n*label maekir_fight_3\n\nThat careful advance on Jotun's part gives you time, time to focus on your power, time to let it resonate with the energised blade that allows Jotun to cleave through any object, any enemy. Someone like you, if you can't stop him in the next few seconds. With that energy repurposed, you can level the field, and take him out of the fight.\n\nIt's theoretical, this use of your power, only something you had briefly dabbled with in the Academy halls - but something that should be possible. Theoretically, at least.\n\nYou focus on Jotun's glowing, crackling blade - trying to listen to that strange sound that feels almost like singing, some opera of electrons and excited particles...\n\n*if power >2\n  You find the harmony and let it flow through you.\n  \n  The blade splutters and dies, causing Jotun to stop mid-stride. You envision the blade, this electrical Sword of Damocles, and hurl it at Jotun's chest.\n  \n  It strikes true and bites deep. Jotun collapses, one hand on the asphalt.\n  \n  He falls onto his spear, shattering it. Well, apparently it's not so indestructible.\n  *goto maekir_ending_choice \n\n*else\n  You touch the song, for a brief singing, but it slips through your fingers.\n  \n  The singing in your head is replaced by ringing in your ears as Jotun slams you with his shield and spins, catching you with the haft of his spear.\n  *if brawn >3\n    It hurts, and stars burst into life behind your eyes, but you're tough. You hang on, gritting your teeth, and prepare to go for another round.\n    *goto maekir_round_two\n  *else\n    *set ch3_maekir_player_lost \"true\"\n    You fall, stars bursting to life behind your eyes.\n    *goto maekir_ending_choice \n\n*label maekir_ending_choice\n*set power+1\n*page_break\n\n*if ch3_maekir_player_lost = \"true\"\n  *set ch3_anima_intervention \"true\"\n\n  You roll onto your back, trying to find your bearings. You left them around here, didn't you? It's so hard to think. Your hands flail to find something, land on cool metal.\n\n  Jotun's powered boot. He lifts it high and settles it on your chest. But he doesn't press downwards, not yet.\n\n  \"Any last words, friend?\" Jotun asks. \"That was a neat trick you pulled, let's be honest here, I can respect that - but trickery's nothing when it comes to technology.\"\n\n  You raise your hand, but Jotun catches your palm with the blunt end of his spear and pins it to the asphalt.\n\n  \"Ain't personal,\" he says. \"Just business.\"\n\n  And that's when Anima hits him like a freight train.\n\n  *page_break\n\n  She's on him like a whirlwind of dark skin, ragged clothing, and gleaming metal. You catch a brief glimpse of her face - or the half of it that is left - twisted with an expression of unbridled fury.\n\n  Her jets carry her into the air with a roundhouse kick, her heel catching Jotun's temple with more force behind the blow than you can imagine, more than you remember ever seeing before.\n\n  She doesn't give him a second to recover. As Jotun falls back, shouting something, his words are cut off by her hand at his throat.\n\n  You force yourself to your knees, then to stand. Your head spins but Blueshift and Al-Jinn are suddenly there and able to steady you.\n\n  \"Anima,\" Blueshift begins, and then more firmly, \"Anima, let him go.\"\n\n  She has Jotun by the neck, her gleaming metal fist at his throat, her fingers crushing the armor there like it was nothing more than a fancy aluminium can. The fury is gone from her expression, replaced by that terrible neutrality.\n\n  Something crimson runs between her fingers.\n\n  *choice\n    #Call for Anima to let go.\n      \"Anima, don't do it! Stop!\"\n    \n      It feels like your words are lost under the sound of something snapping.\n    \n      Anima drops Jotun to the ground, now nothing more than a broken heap.\n      *goto jotun_dead\n    \n    #Try and break Anima's grip with your own hands.\n      You charge Anima, fighting to yank Jotun from her grip. This close, you can hear him gargling something through his helmet, the software having trouble with emitting it as anything but errant noise and static.\n    \n      *if brawn >3\n        Somehow, you manage it. You pry Anima's metal fingers from Jotun's gorget plating and he drops, spluttering for breath, trying to speak.\n        *page_break\n        *goto jotun_dealings\n    \n      *else\n        Something snaps, your blood runs cold, and Anima drops Jotun to the ground in a heap.\n        *goto jotun_dead\n    #Shock Anima with an electrical blast.\n      *if power >1\n        You summon up your power and lance a blast of energy into Anima. She spasms, her hand releasing her grip on Jotun, and he drops to the ground, spluttering for breath, trying to speak.\n        *page_break\n        *goto jotun_dealings\n      \n      *else\n        You try to summon up your power but it's like catching steam. In the panic to need it 'now', it slips away from you.\n      \n        Anima snaps Jotun's neck and she drops him to the ground in a heap. Your blood runs cold.\n        *goto jotun_dead\n    #Stand by and do nothing  \n    \"I see,\" ${senhe} says, once you've explained the situation. \"Thank you for this information. I'll bring this miscreant to justice with extreme prejudice.\"\n    \n    $!{senhe} does. The next morning, there's a special bulletin - replete with images of Sentinel's golden boot on Charr's back.\n    \n    No glory, perhaps, but they've definitely been brought to justice. It's a big victory for Paradigm's law enforcement, the sort of thing people are calling a turning point. That's good enough, in the end.\n    \n    Isn't it?\n    *goto ch3_sentinel_chat\n\n*label ch3_team_charr\n*page_break\n\nAgain, gathered around the meeting table, the team murmurs. You glance to Blueshift and Anima. The former of the pair is vaguely surly, unhappy at being benched but not having the gall to announce it. For once. Anima, for her part, is as inscrutable as always.\n\n\"This is some old school stuff,\" Chevalier says, fingers working a massage into his knuckles. \"Old-fashioned call out. I would've gone by myself.\"\n\n\"You're invulnerable, Chev,\" you tell him. He grins back at you with a 'you got me' smile.\n\nHands on her hips, Aegis asks you: \"${cape_name}, how're we playing this? Charr's your dancing partner.\"\n\n*choice\n  #A show of force - all at once.\n    *set ch3_charr_strat \"force\"\n    \"It's a good strategy,\" Aegis replies. \"If we hit them fast enough, they won't have the chance to run.\"\n    \n    Nods echo their way around the table. Al-Jinn asks, \"What about Shift and Anima?\"\n    \n    \"Not coming,\" Aegis says.\n    \n    Blueshift closes his eyes. \"You're going up against an unknown empowered criminal and you're advocating a strategy around tactically unsound morals.\"\n    \n    *choice\n      #Advocate for them to come.\n        *set ch3_animashiftcharr \"true\"\n        *set blueshift_relationship %+5\n        \"Actually,\" you say. \"I think we should use them. There's no point in letting useful assets sit back here at base.\"\n        \     Just as you're grappling with that realisation, Anima's voice crackles in your helmet. \"Target moves east, heads for gate number four.\"\n    \n    Your team squawks a variety of acknowledgments.\n    \n    The chase is on.\n    *goto ch3_charr_pursuit\n  *else\n    *page_break\n    *goto ch3_post_charr\n  \n*else\n  debug - should not appear in game\n  \n*label ch3_charr_backup\n*page_break\n*set ch3_charr_custody \"true\"\n*achieve teamwork\n\nCharr half-smiles, the scar tissue preventing her from doing anything else.\n\n\"Well, here you are. I'm surprised you showed, ${cape_name}. Not many people would be brave enough, around here.\"\n\n\"You know my name?\" you ask.\n\n\"Absolutely. Everyone does. There's a lot of people watching you - important people.\"\n\nYou remember the strategy - get in a quick shock and the rest of the team will swoop in to apprehend the bomber.\nWithout a second thought, you sling lightning at Charr. The bolt strikes her dead-on, dropping her to the ground. She spasms, snarling out what sounds like a stuttering curse.\n    \nRight on cue, the rest of your team is on the scene. While Courser slaps nullifier cuffs on her, Chevalier is reading Charr her rights.\n*goto ch3_post_charr\n  \n*label ch3_charr_solo\n\nCharr half-smiles, the scar tissue preventing her from doing anything else.\n\n\"Well, here you are. I'm surprised you showed, ${cape_name}. Not many people would be brave enough, around here.\"\n\n\"You know my name?\" you ask.\n\n\"Absolutely. Everyone does. There's a lot of people watching you - important people.\"\n\n\"If you know who I am then you know why I'm here...\"\n\n*choice\n  #\"I'm taking you in.\"\n    *set classical %+15\n    *set ch3_charr_custody \"true\"\n    Charr holds out her hands, as if hoping to be cuffed. \"Please do. That's why I'm here, too. Isn't it nice when paths cross like this?\"\n    \n    Even though you slap the cuffs on her, you can't help but think this is too easy.\n    *goto ch3_post_charr\n  #\"I'm ending your reign of terror.\"\n    Charr's face twists in a terrible expression. \"I have all the power of the atom at my disposal - try something and I'll kill everyone in a six block radius. Unless you can do your trick before I can do mine. Willing to bet their lives on it?\" A subtle glow builds around her form, highlighting her edges, the prelude to some phenomenal fission reaction.\n    *choice\n      #Blast her with a lethal bolt.\n        *set ch3_charr_dead \"true\"\n        *set classical %-15\n        You don't even give her warning. Light, after all, moves faster than anything else.\n        \n        You sling a bolt square into Charr's chest and amp it into startling brightness. Charr drops, like a puppet with her strings cut.\n          \n        So much for her reign of terror, you reflect.\n        *goto ch3_post_charr\n      #Take her in as a prisoner.\n        *set classical %+15\n        *set ch3_charr_custody \"true\"\n        Charr willingly holds out her hands.\n        \n        Even as you slap the cuffs on her, you can't think anything but that this is too easy.\n        *goto ch3_post_charr\n          \n*label ch3_charr_pursuit\n*set ch3_charr_custody \"true\"\n*achieve teamwork\nCharr doesn't get very far.\n  \nYou find her as Anima predicted, just outside gate number 4. Anima's already slapped nullifier cuffs on her, holding her against the sidewalk. With those cuffs on, there's nothing Charr can do - no explosions, no anything.\n  \nChevalier is all too happy to read Charr her rights as she's hauled to her feet.\n*goto ch3_post_charr\n\n*label ch3_post_charr\n*if ((ch3_charr_custody = \"true\") and (ch3_charr_dead = \"false\"))\n  Hours later, Charr is held in the precinct.\n  \n  Even with the nullifier cuffs on, rendering Charr no more dangerous than an unpowered person, you have to remind yourself of that fact as she sits in the makeshift interrogation room.\n\n  With their helmets off, the rest of your team stands with you. \"There she is,\" Aegis says, \"Our mad bomber. Good work, ${cape_name} - more results like this and I might starting seeing you as a useful asset.\"\n  \n  \"What the hell is going on here?!\" Sentinel's voice cuts over everything.\n  \n  *page_break\n  \n  The golden and silver cape storms in, flanked by Phaestus and Mirage. $!{senhe}'s on the warpath. \"I just got a report of an attack in Paradigm Park!\"\n  \n  Aegis rises to meet ${senhis} challenge. \"About time, then. We just brought in your bomber.\"\n  \n  That seems to slow Sentinel. \"You... have?\"\n  \n  \"We believe so.\"\n  \n  $!{senhe} points through the observation window. \"Is that her? Interesting. I want her released into my custody, immediately. This is my city, my jurisdiction.\"\n  \n  *choice\n    #Refuse Sentinel's edict and take Charr into SOLAR custody.\n      Sentinel turns towards you. \"This is my city - this woman will be charged and tried here, where she has caused so much destruction.\"\n      *if bravado >2\n        *set ch3_charr_geneva true\n        *set chevalier_relationship %+10\n        *set aegis_relationship %+10\n        *set aljinn_relationship %+10\n        \"This is a SOLAR operation,\" you tell Sentinel, voice hard. \"She'll be taken to Geneva. If you don't like it, you can file a written complaint. You can't push us around here - we've involved you as a [i]courtesy[/i], and if you try and throw your weight around you'll find where else we can stick our boots.\"\n        \n        You're as surprised as anyone else by that display.\n        \n        Even with the helmet on, you can tell how dark Sentinel turns at that. $!{senhe} steps toward you.\n        \n        Your team steps up beside you. Chevalier to your left, Courser to your right. \"We dare,\" Aegis says, from behind you.\n        \n        One moment becomes two becomes three. You wonder if Sentinel is going to force the issue.\n        \n        And then ${senhe} turns away, gathers up his people, and leaves.\n        \n        You exhale, at long last, and force yourself to relax your fists.\n        *goto ch3_sentinel_chat\n      *else\n        \"This is a SOLAR operation,\" you begin but find your vocal cords frozen as Sentinel looms before you.\n        \n        Your attempted bravado fails. Whatever moment was going to be possible fades.\n        \n        In the end, Aegis supersedes you. She's not happy about it, but she arranges for Charr to be passed to Sentinel's team.\n        *goto ch3_sentinel_chat\n    #Stay quiet.\n      *set courser_relationship %+5\n      *set sentinel_relationship %+5\n      Aegis nods. She doesn't seem happy about it, but she nods.\n      \n      She cants her head for Chevalier to open the door and retrieve Charr. She's passed to Phaestus for safekeeping.\n      \n      \"I want a full report on my desk tomorrow,\" Sentinel snaps, as ${senhe} and ${senhis} entourage depart.\n\n      Aegis rubs at her brow. \"${cape_name},\" is all she says.\n      *goto ch3_sentinel_chat\n\n*elseif ((ch3_charr_dead = \"true\") and (ch3_charr_custody = \"false\"))\n  An hour later, you've giving the news to your team.\n  \n  \"Getting tired of these late night meetings,\" Courser protests.\n  \n  Aegis shakes her head, over and over again. \"First Blueshift and now you, ${cape_name} - God knows why I even bother at this point. We could have used this 'Charr' as a source of information, and you had to go and flex your ego. Well, someone's passed the news to Sentinel. $!{senhe} wants a report on his desk by end of tomorrow. Maybe, ${first_name}, you can even make this not look like a hideous clusterfuck.\"\n  \n  She's stormed out before you can reply.\n  \n  Around you, your team bristles. The only person who seems remotely at ease is Blueshift, and you're not sure if that makes you feel any better.\n  *goto ch3_sentinel_chat\n  \n*else\n  \"Great, team. Just great.\" Aegis sighs, as if to encapsulate the entire situation. \"Our bomber's slipped the trap and we've lost them. Now we're standing here, holding our proverbial dicks with nothing to show for it.\"\n  \n  She presses her knuckles against the tabletop. \"And I need to explain to Sentinel why we were out in force with nothing to show for it. 'Right damn now' - ${senhis} words.\"\n  \n  Around you, your team bristles.\n  \n  \"${cape_name},\" she says, \"${senhe} also wants a full report by the end of tomorrow. Get on that, try and explain this clusterfuck in a way that doesn't make us look hideously inept.\"\n  *goto ch3_sentinel_chat\n  \n*label ch3_sentinel_chat\n*page_break\nLater that day, you're putting together a report summarising the case so far, something to drop to Sentinel tomorrow. Apparently, leading the case means you lead the paperwork, too.\n\nThe next day, as you walk into Paradigm Tower, you reflect on your approach, just how much information you put in your report. This one isn't for your boss, this is one for Sentinel - someone who might use that information in ways you don't intend.\n\nWith everything that's happened, you compiled...\n\n*choice\n  #An exhaustive report to tell Sentinel everything, and delivered it to ${senhim} personally.\n    *goto ch3_sentinel_chat_a\n  #Just the facts, things that don't incriminate your team - or your case.\n    *goto ch3_sentinel_chat_b\n  #A bare-bones report, something you'll drop at the front desk and get out.\n    *goto ch3_sentinel_chat_c\n    \n*label ch3_sentinel_chat_a\nYou end up in Sentinel's office, at the top of the tower.\n\n$!{senhe} greets you in full regalia, helmet on. $!{senhe}'s smiling though, looking like a proud teacher.\n\n\"How good of you to drop by, ${cape_name}\" Sentinel says. \"I take it you have something for me?\"\n\nYou slide the report across ${senhis} desk. $!{senhe} opens it, flips through it, then takes a few minutes to read it.\n\n*page_break\n\nAt last, Sentinel just says: \"I see.\"\n\nThe gold-and-silver cape turns ${senhis} head from the report to talk with you directly. \"You can understand my distress at some of the things that have occurred since your team has arrived in my city. Accusations of corruption in my staff, an 'incident' in a club, a full-blown firefight, a rogue machine with faulty programming and don't get me started on that telekinetic...\" Sentinel closes the report, slaps it down on top of ${senhis} desk.\n\n*if ch3_charr_geneva = \"true\"\n  \"In light of this exhaustive report, I'll overlook your outburst last night. Unfortunately, I'll need to forward this to SOLAR HQ in Geneva,\" ${senhe} says, sounding disappointed. \"Even if you brought in a suspect, I'm not sure if your team is right for the job.\"\n  *goto sentinelquestions\n  \n*else\n  \"Unfortunately, I'll need to forward this to SOLAR HQ in Geneva,\" ${senhe} says, sounding disappointed. \"Even if you brought in a suspect, I'm not sure if your team is right for the job.\"\n  *goto sentinelquestions\n  \n*label sentinelquestions\n\n*fake_choice\n  #\"We're trying out best, Sentinel.\"\n    \"I'm not convinced that it is good enough,\" Sentinel replies. \"Which is a shame, as I had such high hopes for you.\"\n  #\"The investigation isn't complete.\"\n    \"Then complete it or it will be completed for you,\" Sentinel replies. \"I'm sure you will, I have high hopes for you.\"\n  #\"The team has some severe issues, I think.\"\n    *set sentinel_relationship %+5\n    Sentinel smiles, the expression barely reaching ${senhis} cheeks. \"I'm glad that we agree. I have high hopes for you, you realise this, yes?\"\n    \n\"Excuse me?\" you ask.\n\nSentinel nods. \"Absolutely. But let's discuss this in a more relaxed setting, shall we? As friends, not as adversaries.\"\n\n$!{senhe} reaches up and removes ${senhis} golden helmet, setting it on top of ${senhis} desk. The face under it is attractive enough, only just marred by signs of aging.\n\nYou recall your squadmates mentioning some plans, to meet with you after you've dropped off the report... But they'll understand, surely.\n\n*choice\n  #Stay - other plans can wait.\n    *goto ch3_sentinel_chat_a2\n  #Leave - you've made other plans.\n    *goto ch3_sentinel_chat_end1\n    \n*label ch3_sentinel_chat_a2\n\n\"I'd be happy to, Sentinel,\" you reply.\n\n\"Excellent,\" ${senhe} says, clapping ${senhis} hands together. $!{senhe} slides a small case in your direction, emblazoned with Sentinel's familiar heroic icon.\n\n\"Cigar?\" Sentinel asks.\n\n*fake_choice\n  #\"Sure.\"\n  #\"I don't smoke.\"\n\n\"We all have our vices,\" Sentinel says, lighting up. \"For this next hour, my office is your office.\"\n\n$!{senhe} extends a hand in your direction. \"You can call me Alexi.\"\n\n*page_break\n\nThe hour passes in a blur of tales and cigar smoke.\n\nSomehow, you ended up playing chess, Sentinel's suggestion.\n*if (brains >3)\n  *set sentinel_relationship %+25\n  Which, as it turns out, was ${senhis} undoing - ${senhe} doesn't win a single round. You almost think that the gold and silver cape is going to be upset by this turn of events, but ${senhe} just sounds so pleased with your ability to 'think your way around problems'.\n  *goto ch3_sentinel_chat_a3\n\n*elseif (brains = 3)\n  *set sentinel_relationship %+15\n  Luckily, you had been known to dabble in it, back at the Academy, and you manage to hold your own - even winning a round.\n  *goto ch3_sentinel_chat_a3\n\n*elseif (brains = 2)\n  *set sentinel_relationship %+10\n  You know a thing or two about the game - some of the rules and terms - and manage to put up a fight, although Sentinel always finds some way of catching you in some clever trap or strategy.\n  *goto ch3_sentinel_chat_a3\n\n*else\n  $!{senhe} has you clearly outmatched, as it turns out, but is magnanimous in victory.\n  *goto ch3_sentinel_chat_a3\n  \n*label ch3_sentinel_chat_a3\n\n\"I've always liked chess,\" Sentinel says, settling into the seat behind ${senhis} desk and sliding the chessboard to one side. \"Do you know why?\"\n\n*fake_choice\n  #\"Because you win.\"\n    Sentinel laughs. \"Not all the time, but often enough to be sure of my skills.\"\n    \n    $!{senhe} trails off, taps out some cigar ash into the tray.\n\n    \"Yes,\" Sentinel says, \"The fittest prevail, as it's always been.\"\n  #\"Because it is a competition between equals.\"\n    \"Is it?\" Sentinel asks, clearly rhetorical. \"It isn't what I would assume. The pieces might be equal but the minds directing those pieces might be on entirely different levels.\"\n    \n    $!{senhe} trails off, taps out some cigar ash into the tray.\n\n    \"Yes,\" Sentinel says, \"An equal playing field for a battle between minds. The fittest survive, as it's always been.\"\n  #\"Because it is a simulation of battles between capes.\"\n    \"I can see the comparison,\" ${senhe} replies, \"But I disagree - I like the game because it is just that, a game. \n    \n    \"Compare it to the present situation in my city - it is as if the Queen piece was stolen from the board and now the white side is playing without their most powerful asset. There are a number of blue pieces on the board, complicating things and pushing the situation into a new status quo.\"\n    \n    \"Aren't we on the same side?\" you ask.\n    \n    \"Yes,\" Sentinel says, \"Of course. There is an important lesson in chess, however. The fittest survive, as it's always been.\"\n\n\nYou glance at the time. \"I should be heading back to the precinct,\" you say.\n\nSentinel nods, seeming like ${senhe} didn't hear you. \"That might be for the best. Meanwhile, I'll be in meetings for the rest of the afternoon. Between the two of us, I think your one will be worse.\"\n\nThe elevator is halfway to the lobby before Sentinel's words kindle some degree of recognition, as perplexing as it is.\n\nIt occupies you for the walk to the precinct, at least.\n\nThat is, until you realise that something is terribly wrong.\n*goto ch3_end_final\n    \n*label ch3_sentinel_chat_end1\n\nYou shake your head. \"I wish I could,\" you tell Sentinel, \"But I have plans. I'm only here to deliver the report.\"\n\nSentinel nods but that smile has long since wandered from ${senhis} face.\n\n\"I see,\" ${senhe} says. \"Then go - you're dismissed.\"\n\nAs you walk out, you can feel Sentinel's gaze boring into your back and the tension doesn't vanish until you pass through the lobby and into the outside air. You swear you catch a glimpse of ${senhis} gold silhouette, watching you from the top of the tower.\n\n*page_break\n*goto ch3_end_date\n\n*label ch3_sentinel_chat_b\nYou meet Sentinel in a meeting room, about halfway up the tower.\n\n$!{senhe} quizzes you on everything. What you found, who you spoke to, how your team has conducted itself while inside ${senhis} city.\n\nYou answer honestly, if not accurately.\n\n\"I heard there was a bit of an issue two nights ago,\" Sentinel says, eventually. \"Care to explain that?\"\n\n\"We were ambushed by a unit of power armored mercenaries,\" you reply, leaving out the inter-unit drama that followed. \"No casualties, low collateral damage. It's all in the report.\"\n\n\"Yes,\" says Sentinel, slowly. \"I imagine it is. You're dismissed, ${cape_name}. I do hope we can work better together in the future.\"\n\nYou're fine with that.\n\nYou've got plans.\n\n*label ch3_sentinel_chat_c\n*set sentinel_relationship %-10\n*set classical %-5\nYou have no inclination to spend any longer acting as Sentinel's snitch than you absolutely have to.\n\nYou drop the report at the front desk of Paradigm Tower, letting the staff there take it to Sentinel.\n\nYou're sure that ${senhe} won't be happy about you following the letter of your order rather than the intent of it but, right now, you're pretty pleased with yourself.\n\nBesides, you've got plans.\n*goto ch3_end_date\n\n*label ch3_end_date\n*choice\n  #Getting a commemorative tattoo - it was Chevalier's idea.\n    *set chevalier_relationship %+10\n    *goto ch3_end_tattoo\n  #Seeing the sights of Paradigm with Al-Jinn.\n    *set aljinn_relationship %+10\n    *goto ch3_end_sights\n  #Checking out a ball game with Courser.\n    *set courser_relationship %+10\n    *goto ch3_end_courser\n  #Heading back to the precinct to check on some case files.\n    *set aegis_relationship %+5\n    *goto ch3_end_files\n    \n*label ch3_end_tattoo\n\nAt the news of time off, Chevalier's first thing had been to hunt you down like some kind of heat-seeking missile and suggest that the two of you get a matching tattoo. Something to commemorate everything that had happened in Paradigm until this point.\n\nYou had agreed, thinking you'd have some time to decide, but Chevalier had already picked out a parlor.\n\nYou're not sure what Chevalier's criteria were, however, given the wealth of art he has over his body, you're sure that he has a good set of them.\n\nStill, as you step inside the parlor and are assaulted by heavy metal and the stench of tobacco, the place doesn't fill you with confidence.\n\n\"So, what're we getting done?\" Chevalier asks, \"You're the ${man} of the hour, after all.\"\n\n\"I was thinking...\"\n\n*fake_choice\n  #\"...how about a lightning bolt?\"\n    Chevalier says, \"Makes sense for such a shocking display a few nights ago.\"\n  #\"...a blue sunburst.\"\n    Chevalier nods. \"To remember the team, right? Well, I've got plenty like that but, sure, why not?\"\n  #\"...an explosion.\"\n    Chevalier says, \"What, nuclear or what? Whatever, we can think about that later.\"\n  *if ch2_solar_romance = \"chevalier\"\n    #\"...how about our names? With a heart?\"\n      Chevalier smiles, and you think a bit of red comes to his cheeks. \"Well, sure - that's a classic bit of work, I'll just need to find the right place for it...\"\n\nYou're not quite prepared for the pain but, in the end, it isn't doesn't sting as much as you thought it might. By the end of it, you've got a nice tender patch on your arm but so does Chevalier, and he's sure to snap a photo for posterity.\n\n*page_break\n\nLater, with Chevalier off on some errand for the Captain, you walk back towards the precinct.\n\nYou spy a grey haze in the distance. Something cold metastasises in your gut.\n\nYou break into a run.\n\n*goto ch3_end_final\n\n*label ch3_end_sights\nAs you found out from brief discussions and fragments of conversations here and there, Al-Jinn liked to travel.\n\nWhile you couldn't exactly leave Paradigm City on your one day off, you could hit the tourist spots. Al-Jinn had smiled, agreed, and said that it sounded great.\n\nBut now, amidst the trees and lakes of Paradigm Park, one of the more central locations in the city, you wonder if something had come up. You give her a call.\n\n\"Sorry,\" Al-Jinn says, when she picks up. \"I know, I forgot! The Captain wanted me to double-check and triple-check a few things as I was heading out - I just need to deliver a report to her and I'll be right there. Paradigm Park, right?\"\n\n\"That's the one.\"\n\n\"Great! I'll see you in ten.\"\n\n*page_break\n\nTen minutes later, you don't spy Al-Jinn or her severe haircut in the park. Five minutes after that, you check your hand tablet, find no messages, no calls.\n\nYou call her but the number is engaged. You try again, but the only sound that greets you is the steady beeping tone of a busy line.\n\nA strange, creeping feeling settles in the back of your brain - something is wrong. Al-Jinn's professional, punctual. When she says ten, she means ten.\n\nYou leave the park behind, heading for the precinct, something cold metastasising in your gut.\n*goto ch3_end_final\n    \n*label ch3_end_courser\n\nOr, at least, that was the plan.\n\nYou stand there, amidst the crowds of Paradigm's city stadium, and wait for Courser. Ten minutes becomes fifteen becomes twenty, and you try to call him.\n\nHis number dials out.\n\nYou try again, then a third time. Nothing changes.\n\nA strange, creeping feeling in the back of your brain tells you that something is wrong.\n\nYou leave the stadium behind, heading for the precinct, something cold metastasising in your gut.\n*goto ch3_end_final\n\n*label ch3_end_files\nSure, not everyone would use their day off to catch up on their case files, but not everyone is an empowered cape in a critical role within a global organisation.\n\nSome of the team gave you a bit of rough time about it but it's your day and your decision how to spend it. With everything that's happened, going through the data with a fine-tooth comb is probably for the best.\n\nBut, as you get closer to your precinct, something cold metastasises in your gut.\n\nSomething's wrong.\n*goto ch3_end_final\n\n*label ch3_end_final\n*page_break\n\nYou're aware of the smoke first, the acrid stench that stings you eyes, cloys in your nostrils and makes it hard to catch your breath.\n\nStill, you try. Try to catch your breath, try to make sense of the scene before you.\n\nThe precinct is in flames.\n\n*achieve chp3\n*finish Chapter IV: Metamorphosis", "death": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nYou have died.\n\n*goto_scene ending", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Paradigm City.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "metamorphosis": "*temp found_blueshift false\n*temp found_anima false\n*temp found_courser false\n*temp found_chevalier false\n*temp hqcount 0\n\n[b]Chapter IV[/b]\n*line_break\n[b]METAMORPHOSIS[/b]\n\n[i]'Show me a hero, and I'll write for you a tragedy.'[/i]\n*line_break\n-F. Scott Fitzgerald\n\n*page_break\n\nYou brace yourself, mentally more than physically, and push against the flames and heat and smoke to make your way inside. You keep as low as possible, evading the worst of the smoke, but you still cough and hack until your throat is raw.\n\nYou call out but there's no response.\n\nThere's a single question in your mind, though.\n\n*fake_choice\n  #Where's Courser?\n  #Where's Chevalier?\n  #Where's Al-Jinn?\n  #Where's Aegis?\n  #Where's Anima?\n  #Where's Blueshift?\n  \nYou don't know. You don't know where anyone is. The only thing you do know, amidst the conflagration, is that it is a relief when the fire suppression systems kick in. The water soaks through your clothing in seconds and that'd be a problem if you weren't already chilled to the bone.\n\nYou find Al-Jinn first, in casual clothes and crouched close to the floor, cradling someone in her arms. Someone you don't immediately recognise due to her stiff posture, her swollen, purpled features, the spasms wracking her body, the choking sounds coming from the back of her throat...\n\nIt's the Captain.\n\nYou jog over, shoes kicking up water. \"What happened?!\"\n\n*page_break\n\nAl-Jinn shakes her head, her eyes red. \"I don't know! I was in a meeting with the Captain, discussing the day off. She took some of her pills and then she just... fell into this... this seizure! Then gunshots, an explosion - I don't know where anyone else is, ${cape_name}!\" Her gloves are off and she has one hand on Aegis' shoulder.\n\n\"The pills,\" you say. \"Someone spiked her medication.\"\n\nAl-Jinn nods, a short, sharp jab with her chin. \"It wasn't me - I checked it myself when we got this place running, Christ and Allah, I swear!\"\n\n\"It's a very short list of suspects,\" you murmur, refusing to believe it.\n\nAnd yet...\n\n*fake_choice\n  #Someone within the squad has to be responsible.\n    \"Someone did this, and we need to find out who. Whoever it was, I'm going to get to the bottom of it.\"\n  \n    Al-Jinn barely nods. \"I can't believe it. This has to have been a mistake... something random...\"\n  \n    Maybe if it was just the pills, you think, but the gunshots, the explosion...\n  \n    This was planned.\n  #Al-Jinn has a very convenient story.\n    \"It was your job, no one else handles the Captain's affairs.\"\n  \n    \"For your sake,\" she says, very slowly, very deliberately, \"I'm going to pretend to not hear that.\"\n  #Blueshift is at the top of the list.\n    \"I need to find Blueshift, right now. I knew he couldn't be trusted.\"\n  \n    Mirage's warning echoes in your head.\n  \n    \"No,\" Al-Jinn says, \"It couldn't be. He wouldn't, not when he's come so far.\"\n  #Maybe it was Anima - reprogrammed or hacked or something.\n    \"What about Anima? How do we know she didn't do it? Would we even have noticed her going behind our backs?\"\n  \n    Al-Jinn shakes her head. \"No, Anima- Ada- she wouldn't do that, not to the Captain. If she wanted us dead she wouldn't need to do this.\"\n  #Could it have been Courser?\n    \"Courser?\" you suggest. \"Have we heard from him?\"\n  \n    Al-Jinn shakes her head. \"He was here, but I heard he was going out to check out that baseball game.\"\n  #What about Chevalier?\n    \"Could it have been Chevalier?\"\n  \n    Al-Jinn shakes her head. \"I don't know. The last thing I heard, he was out getting a tattoo.\"\n  #Let's not accuse anyone - we're a team.\n    *set aljinn_relationship %+10\n    \"But I'm not going to accuse anyone just yet. There's always the chance that this was a mistake, an accident...\"\n  \n    You're not sure you believe the words coming out of your own mouth. Maybe if it was just the pills, but the gunshots, the explosion...\n  \n    This was someone's plan.\n*line_break\n*line_break  \nAegis hisses and chokes out monosyllables. You don't know if she's trying to say something, or if it is just her brain firing impulses down random neurons.\n\nEither way, Al-Jinn speaks a word of power: \"Calm.\"\n\n\"Find whoever did this,\" Al-Jinn says, once Aegis has stopped twitching, her voice hollow and cold. \"Make them pay.\"\n*goto ch4_hub\n\n*label ch4_hub\n*if hqcount \u003c4\n  *choice\n    *if found_chevalier = \"false\"\n      #Find Chevalier.\n        *goto ch4_chevalier_call\n    *if found_blueshift = \"false\"\n      #Find Blueshift.\n        *goto ch4_blueshift_lab\n    *if found_anima = \"false\"\n      #Find Anima.\n        *goto ch4_find_anima\n    *if found_courser = \"false\"\n      #Find Courser.\n        *goto ch4_courser_call\n    \n*else\n It occurs to you that there are other people in the precinct now, all recognisable as paramedics. The Captain's on a gurney and looks no better than she had when you first found her with Al-Jinn.\n \n Al-Jinn steps away from the Captain and finds you. \"I'm going with them,\" she says. \"Someone needs to keep an eye on Lorna.\"\n \n *choice\n   #\"Good idea.\"\n     *goto ambulance1\n   #\"This all seems suspicious.\"\n     *goto ambulance2\n   #\"I'm coming with you.\"\n     *goto ambulance3\n   #\"What can I do?\"\n     *goto ambulance4\n     \n*label ambulance1\nAl-Jinn nods. \"I have a few, but less than I used to,\" she replies, smiling weakly. \"I'll be at the hospital. Stay here, solve this thing.\"\n*goto ch4_chevalier_return\n\n*label ambulance2\n\"That's exactly what I'm thinking,\" Al-Jinn says, \"And it's why I'm going with the Captain. You have to stay here and harness that suspicion.\"\n*goto ch4_chevalier_return\n\n*label ambulance3\nAl-Jinn shakes her head. \"No, you're not. You have to stay here and solve this thing. It's more important than what I'm doing.\"\n*goto ch4_chevalier_return\n\n*label ambulance4\n\"You really need me to tell you?\" Al-Jinn asks, \"Poor thing. Solve this thing, make someone pay.\"\n*goto ch4_chevalier_return\n\n*label ch4_chevalier_return\n\n*if ch2_solar_romance = \"aljinn\"\n  She plants a quick kiss on your lips. \"I can take care of myself,\" she says. \"You take care of whoever betrayed us.\"\n  \n  And then she's gone, leaving you alone in the hall.\n  *goto ch4_chevalier_return2\n  \n*else\n  And then she's gone, leaving you alone in the hall.\n  *goto ch4_chevalier_return2\n  \n*label ch4_chevalier_return2\n  \nAl-Jinn is barely a few minutes out of the door before Chevalier comes bursting through them, chest heaving with exertion. You can't imagine how hard he had to run to tire out his superior endurance.\n\n\"I saw the Captain out there!\" he explodes, throwing his arms out, \"What the fuck happened, ${first_name}?\"\n\nYou fill him in as best you can. His face darkens, his brow furrowing as something terrible passes through him. \"It was Damian, wasn't it?\"\n\n\"He's the only one not accounted for.\"\n\nChevalier places his hand against the wall, and then hammers it with his fist. The wall breaks around the blow, filling the air with plaster dust and drywall fragments. \"I knew he was pissed off about Blueshift's little evening detective work, but to do this? Nah. He's not that petty.\"\n\nYou're aware of time ticking down. If Courser was responsible, every second you wait here is a second he might be using to slip away.\n\n*fake_choice\n  #Try and track down Courser's hand tablet.\n    You move through the precinct, trying to track down Courser's hand tablet.\n    \n    There's no sign of it, which means he must have it on him. Which means he's either incapacitated, or deliberately didn't answer your call.\n    \n    Either one is equally chilling.\n    \n    As if on cue, your own tablet chimes with an incoming call.\n    \n  #Press Chevalier for information.\n    \"What do you mean, you knew he was pissed off?\" you ask.\n    \n    \"It was all he could talk about after it happened,\" Chevalier says, letting out a long breath. \"Blueshift this, Blueshift that. How the whole experiment was a mistake.\"\n    \n    \"Experiment?\" The word sticks out to you. \"What kind of experiment, what was a mistake?\"\n    \n    Chevalier shakes his head. \"It's a long story, ${cape_name}. Ask the Captain or Shift about it. Me? I'm going to check for any more surprises.\"\n    \n    As he leaves, your hand tablet chimes with an incoming call.\n    \n  #Check Courser's quarters.\n    You head for Courser's room.\n    \n    The precinct - as with all cape facilities - was designed to be an all-in-one home. This one is no exception.\n    \n    Courser's room is spartan. You find nothing of note, just a computer, a set of casual clothes... nothing that proves, one way or the other, his part in it.\n    \n    If he had one, you remind yourself.\n    \n    And then, your hand tablet chimes with an incoming call.\n    \n  #Call Sentinel.\n    You pull your hand tablet from your pocket and dial for Sentinel.\n    \n    There's no response. Might be out on a mission. Maybe.\n    \n    Then, just as you've shoved the hand tablet away, it chimes with an incoming call.\n    \n  *if ch3_charr_geneva = \"true\"\n    #Check on Charr.\n      You head for the holding cells, checking on the one person who hasn't been accounted for.\n      \n      Charr sits at the table, looking remarkably unphased. With the soundproofing, she probably has no idea what has transpired outside. You check the scanners, making sure that there's still a person in the room, and it reports no change from when she had been put in there.\n      \n      So, Charr is accounted for.\n      \n      That just leaves Courser.\n      \n      And then, as if on cue, your hand tablet chimes with an incoming call.\n  \n*goto ch4_courser_calls_player\n  \n*label ch4_courser_call\n*set found_courser \"true\"\n*set hqcount +1\nYou take out your hand tablet and dial for Courser.\n\nIt dials out. Again, and again.\n\n*fake_choice\n  #Leave a message.\n    You don't know what to say when you hear Courser's voicemail message.\n    \n    So, you settle on the facts and an advisory to get in contact ASAP.\n    *goto ch4_hub\n  #Don't.\n    *goto ch4_hub\n    \n*label ch4_chevalier_call\n*set found_chevalier \"true\"\n*set hqcount +1\nYou take out your hand tablet and dial for Chevalier.\n\nHe picks up on the second ring. \"This is Ryan.\"\n\n\"Ryan, listen, the precinct has been attacked. The Captain's in a bad way - you need to get back here ASAP!\"\n\nChevalier listens. When he speaks, you're not sure if the lack of affect in his voice comes from guilt or from anger. \"I'm on my way.\"\n*page_break\n*goto ch4_hub\n\n*label ch4_blueshift_lab\n*set found_blueshift \"true\"\n*set found_anima \"true\"\n*set hqcount +2\n\nYou head for the room that Blueshift had claimed as his 'lab', his workshop, the room that was necessary to his work and for, up until recently, preserving Anima's secret.\n\nThe door is open. You call out for Blueshift but there's no response. Even through the smoky stench that still clings to your nostrils, you can pick up the distinct smell of burnt electronics.\n\nAnima lies on the far side of the room, face down and unmoving.\n\nBlueshift is slumped against the wall to your left, a red smear above him.\n\n*choice\n  #Check on Anima.\n    *goto ch4_blueshift_lab_anima\n  #Check on Blueshift.\n    *goto ch4_blueshift_lab_shift\n    \n*label ch4_blueshift_lab_anima\n\nYou hurry to check on Anima, roll her over. Training makes you check for a pulse before you realise it's pointless, she wouldn't have one - would she?\n\nYou don't know.\n\nShe still bears the obvious damage from the fight against Maekir Team, half her face missing, dark skin contrasted with gleaming metal. On her right arm, her skin missing from the elbow down... Her chest-\n\nYou slump back, realising the reason for the burnt electronic smell.\n\nThere's a hole in Anima's chest, about the size of your fist. Ulfr's shot hadn't penetrated her armor but this damage had, doing grievous damage to her internal structure. You're not an engineer, you're not sure if the damage can even be repaired.\n\nBehind you, Blueshift stirs, groaning something.\n\n*page_break\n\nYou hurry over.\n\nHe turns his head to look at you, eyes bleary and not-quite focused. The blood on the wall behind him, the way it smears downward, informs you that he was shot in the back.\n\n\"Ada,\" he hisses, struggling to rise. \"Ada...\"\n\n\"Shift,\" you say, your voice a warning tone. Suddenly, you get the distinct feeling that Blueshift cannot, should not, [i]must not[/i] get to her.\n\n*choice\n  #Advise him to stay down, he's too injured.\n    *goto ch4_blueshift_lab_end1\n  #Let him check on Ada.\n    *goto ch4_blueshift_lab_check\n\n*label ch4_blueshift_lab_end1\n\n\"Stay down,\" you tell Blueshift, firmly.\n\nHe glowers at you, but seems to elect to listen to you. For once.\n\n\"What happened?\" you ask him.\n\nHe composes himself as you grab a first aid kit.\n\n\"Shot... in the back,\" Blueshift groans. \"Staunched the blood loss with my power... Anima?\" he asks. \"We were performing some repairs...\"\n\n*choice\n  #Tell him Ada's status.\n    *goto ch4_blueshift_lab_status\n  #Keep things ambiguous, distract him.\n    *goto ch4_blueshift_lab_ambig\n  #Ask him if he knew who shot him.\n    *goto ch4_blueshift_lab_shot\n    \n*label ch4_blueshift_lab_status\n\n\"She's unresponsive, with a hole in her chest that I could put my fist through...\"\n\nA series of expressions play over Blueshift's face there, his brow, eyes and lips twisting in a multitude of directions.\n\nHe ignores you, hopping to his feet.\n*goto ch4_blueshift_lab_check\n\n*label ch4_blueshift_lab_ambig\n\"It's fine.\" You force a smile to your face and pray the blood loss on Blueshift's part makes it more believable.\n\nIt seems to. He slumps back, electing to stay down. When he sighs, there's red foam on his lips.\n\n\"She's fine,\" you say. \"Tough as titanium and all that. Listen, the Captain's in bad shape and half the team is missing. Just... stay here. I'll get Al-Jinn to come and patch you up.\"\n\nSlumped against the wall, Blueshift closes his eyes. \"I'll hold together until then.\"\n*goto ch4_hub\n    \n*label ch4_blueshift_lab_shot\n\n\"I have to know, Blueshift - who shot you?\"\n\nBlueshift slides about halfway up the wall, grimacing. \"I don't know. They got me twice from behind. What happened to Ada? Tell me!\" Red-flecked spittle flies from his lips.\n\n*fake_choice\n  #Tell him.\n    \"She's... hurt real bad, Blueshift. I'm sorry.\"\n    \n    His eyes go distant, looking past you, looking past Ada, looking past the walls of the precinct.\n    \n    \"Blueshift?\"\n    \n    A bassy tremor runs through the room, hitting you like a gust of wind, and everything begins to vibrate.\n    \n    As you beat a hasty retreat from Blueshift's telekinetic storm, you realise something.\n    \n    You've never heard Blueshift wail before.\n  #Don't.\n    You stand up and walk away, unsure of what to say.\n    \n    That seems to be enough of a hint for Blueshift's sharp mind to put things together. His eyes go distant, looking past you as you walk away, looking past the walls of the precinct.\n    \n    A bassy tremor runs through the room, hitting you like a gust of wind, and everything begins to vibrate.\n    \n    As you beat a hasty retreat from Blueshift's telekinetic storm, you realise something.\n    \n    You've never heard Blueshift wail before.\n    \n*goto ch4_hub\n\n*label ch4_blueshift_lab_shift\n\nYou hurry to Blueshift's side. Anima can take care of herself and, given her nature, you wouldn't know where to begin if she was injured (damaged?) But Blueshift would.\n\nHe turns his head up to look at you, eyes bleary and not-quite focused. The blood on the wall behind him, the way it smears downward, informs you that he was shot in the back.\n\n\"Ada,\" he hisses, struggles to rise. \"Ada...\"\n\nYou catch sight of her, face down, on the other side of the room. She doesn't respond. Suddenly, you get the distinct feeling that Blueshift cannot, should not, must not get to her.\n\nAnd yet... maybe she's just playing dead, like she did in the Maekir battle...\n\nThat thought prevents you from stopping Blueshift.\n\n*page_break\n*label ch4_blueshift_lab_check\n\nSomehow, he manages to cross the room, through some combination of telekinetics and sheer stubborn ego.\n\nBlueshift collapses to his knees, taking Anima into his arms. You're aware of a low keening sound. You've heard Blueshift groan, shout, snap and sneer - but you've never quite heard him [i]wail[/i].\n\nThe workshop begins to shake, every surface and object vibrating in response to Blueshift's distress.\n\nYou shout to him, but he doesn't hear you.\n\nYou retreat from the telekinetic storm that roars to life, fed by Blueshift's rage and despair.\n*page_break\n*goto ch4_hub\n\n*label ch4_find_anima\nYou try to track down Anima but find no sign of her.\n\nIt takes you a moment to remember she'd probably be in Blueshift's self-designated workshop, with all the recent drama.\n\nYou head there.\n*page_break\n*goto ch4_blueshift_lab\n  \n*label ch4_courser_calls_player\n\n*page_break\n\nThe word COURSER blazes at you from the touchscreen of your tablet.\n\nYou answer.\n\n\"Courser-\"\n\n\"${cape_name}, I'm at the Crown.\"\n\n*fake_choice\n  #\"Good. Wait right there.\"\n  #\"Why'd you do it, Courser?\"\n  #\"Hold on.\"\n\n\"If you want me,\" Courser says, speaking over you, \"Come and get me.\"\n\nThe line clicks dead.\n\n*page_break\n\nYou suit up.\n\n*if torso = \"suit of tactical armor\"\n  By now, the suit of tactical armor is almost like a second skin, not nearly as restrictive as it had once been. The SOLAR crest - a blue sunburst - sits on the left side of your chest plating.\n  *goto ch4_suit_up\n\n*else\n  The blue and silver bodysuit is as warm as you remember it, more of a second skin than an article of clothing. The SOLAR crest - a blue sunburst - sits on your left breast.\n  *goto ch4_suit_up\n  \n*label ch4_suit_up\n\n*if helm = \"plumed\"\n  You slip your helmet over your head, hearing it click into the collar of your ${torso}. You wonder how Sentinel would handle someone who did this to ${senhis} team.\n  *goto ch4_suit_up_end\n  \n*else\n  You slip your helmet over your head, hearing it click into the collar of your ${torso}.\n  *goto ch4_suit_up_end\n \n*label ch4_suit_up_end\n\n*if cape = true\n  You reach up to your collar, taking a moment to adjust your cape so it sits properly. On some level, you're aware that you're just delaying the inevitable.\n  *goto ch4_courser_confrontation\n\n*else\n  And that's it. You're ready. You linger there, caught between thoughts, and aware that you're just delaying the inevitable.\n  *goto ch4_courser_confrontation\n\n*label ch4_courser_confrontation\n\nTime to be a hero.\n\n*page_break\n\nThe Crown. The most northern point of the island, rocky cliffs jutting above the waves. A picturesque location, a tourist hot spot.\n\nIt's easy enough to find.\n\nAt the look-out point, a lone figure stands, eyes cast out over the wide blue expanse - dark-skinned, his hands shoved into the pockets of his jacket.\n\nCourser. Out of uniform and out of time.\n\n*page_break\n\nAs you approach, Courser turns to face you. His eyes are rimmed red. \"I knew it'd be you,\" he says.\n\nBehind and beneath him, the waves crash on the rocks.\n\n*choice\n  #\"Do you have any idea what you've done?\"\n    *goto courser_1a\n  #\"Why? Just tell me [i]why[/i].\"\n    *goto courser_1b\n  #\"How could you do this?\"\n    *goto courser_1c\n  #\"Start explaining, or I'll start shocking.\"\n    *goto courser_1d\n  #Attack him immediately.\n    *goto ch4_courser_fight\n    \n*label courser_1a\n\nCourser nods, looking apologetic - although you can't tell if it is sincere or not. He's a poster boy, after all.\n\n\"I do,\" he says, \"And I wish it could go any other way - but it can't and it hasn't. I know it doesn't count for much but I'm sorry. Really. I can't go back.\"\n\n*choice\n  #\"You're making excuses! This was your fault!\"\n    *goto courser_2a\n  #\"I'm not who you need to apologise to - the Captain, Chevalier, your friends!\"\n    *set courser_relationship %+10\n    *goto courser_2b\n  #\"If you're sorry then it's not too late to fix this.\"\n    *set courser_relationship %+10\n    *goto courser_2c\n  #\"You're right.\" Attack him.\n    *goto ch4_courser_fight\n\n*label courser_1b\n\nCourser shakes his head. \"History is marching ever onwards, ${first_name}. If we're not on the right side, it's going to crush us underfoot. Straight into the trash bin. I was offered a chance to save myself - and I took it. I got angry and stupid and I took it.\"\n\n*choice\n  #\"Congratulations, absolving yourself of responsibility through determinism. Blueshift would be proud.\"\n    *set courser_relationship %-10\n    *goto courser_2b\n  #\"If you took that chance, then take the one I'm offering you now - it's not too late to stop being stupid.\"\n    *set courser_relationship %+10\n    *goto courser_2c\n  #\"Then here I am, to crush you underfoot.\" Attack him.\n    *goto ch4_courser_fight\n\n*label courser_1c\n\n\"Very easily,\" Courser laughs bitterly. \"Very easily. I knew what had to be done, so I did it. With the Captain and Anima out of the picture, everyone else would be too busy to... and I could...\" He shakes his head. \"Come up here and wonder if I'd find absolution in jumping, man.\"\n\n*choice\n  #\"How brave of you. The Captain would have kicked your ass in a straight up fight, so you spiked her meds. Coward.\"\n    Courser's face falls. \"She'll survive. I was careful with the dosage and she's a tough woman.\"\n    \n    \"Casual disregard for human life? Funny, Courser ueshift is one and the same but you're not sure how plausible.\n  *goto courser_2cend\n  \n*elseif brains = 2\n  Exarch. You know the name - some South American villain - but he was dead, or so everyone said. It's possible, sure, that Blueshift is one and the same but you're not sure how plausible.\n  *goto courser_2cend\n  \n*elseif brains = 1\n  Exarch. The name is unfamiliar to you. It's possible, sure, that Blueshift is one and the same but you're not sure how plausible.\n  *goto courser_2cend\n  \n*label courser_2cend\n  \n\"Who the hell's Exarch?\" you ask.\n\n\"You might know him better as Blueshift.\"\n\n\"Any proof of that?\"\n\nCourser shrugs, arms spread. \"It's all there, if you know where to look.\"\n\n*choice\n  #\"So you hurt everyone to get to him?\"\n    *goto courser_3a\n  #\"The Captain believes in second chances. That is, if she hasn't flatlined in a hospital by now.\"\n    *goto courser_3b\n  #\"That's rich coming from a turncoat, Damien.\"\n    *goto courser_3c\n  #\"Yeah, and you hurt the one person he cares about. You think he's going to talk to you?\"\n    *goto courser_3d\n  #\"You're worrying about the wrong person.\" Attack him.\n    *goto ch4_courser_fight\n\n*label courser_3a\n\n\"I'm sure he'd say that the ends justify the means,\" Courser sneers. \"So, we'll see how he likes it, hey?\"\n\nThe wind howls.\n\n*goto ch4_courser_final\n\n*label courser_3b\n\nCourser's face collapses at that. He sucks back something.\n\n\"She's tough,\" he says, at last. \"She'll be fine. She has to be fine.\"\n\nThe wind howls.\n\n*goto ch4_courser_final\n\n*label courser_3c\n\n\"I've betrayed the few to save the many. You can hate me for it all you like, but one of us is doing the right thing here.\"\n\nThe wind howls.\n\n*goto ch4_courser_final\n\n*label courser_3d\n\n\"Anima's not a person. Ada was a person. Anima's a thing, a monster that borrows her face and voice. Christ, it's like caring about a fucking toaster oven!\" Courser shouts it to the waves and turns back to you.\n\n\"Understand this: Blueshift, Exarch, Leland, Santiago - whatever he calls himself, he doesn't care about the people. He only cares about the game. Showing how smart he is. And if we keep playing, he's going to win.\"\n\nThe wind howls.\n\n*goto ch4_courser_final\n\n*label ch4_courser_final\n\n\"So,\" Courser says, forcing a smile to his face. \"Here we are - I don't know what else we've got to talk about. I can't go back and, if I was more of a man, I wouldn't have waited here for you... So, how're we going to play this, ${cape_name}?\"\n\n*choice\n  #\"For keeps.\" Attack him.\n    *goto ch4_courser_fight\n  #\"I see what you're doing here - taking the easy way out. I won't fight you.\"\n    *goto ch4_courser_fight2\n  #\"You could always run away and never come back.\"\n    *goto ch4_courser_run\n    \n*label ch4_courser_run\n\n*if (courser_relationship >75) or (ch2_solar_romance = \"courser\")\n  Courser shakes his head. \"No, I...\" He trails off, turns and rests his arms on the lookout railing behind him. You step up beside him.\n  \n  \"You'd just let me go?\" he asks.\n  \n  You nod.\n  *choice\n    #Because living with what he's done is punishment enough.\n      \"Yeah,\" you say, \"Because death is the easy way out. Capes don't throw themselves off cliffs, Damian and I'm not going to be your suicide-by-cop. You need to live with this. Maybe, one day, you'll make it up to us all.\"\n      \n      Courser nods slowly, considering it.\n      \n      \"I think I can do that right now.\"\n      *goto ch4_courser_help\n    #Because he can find a way to atone for what he's done.\n      \"Yeah,\" you say, \"Because, sooner or later, you'll find a way to make this up to us all.\"\n      \n      Courser nods slowly, considering it.\n      \n      \"I think I can make it up to you right now.\"\n      *goto ch4_courser_help\n    #Because it'll be more interesting to give him a running start before SOLAR catches him.\n      \"Yeah,\" you say
