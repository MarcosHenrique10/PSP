<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paradigm City — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "paradigmcity", "title": "Paradigm City", "scenes": {"apotheosis": "*temp liecount 0\n*temp teamcount 0\n\n[b]Chapter VI[/b]\n*line_break\n[b]APOTHEOSIS[/b]\n\n[i]'Dignity does not consist in possessing honors, but in deserving them.'[/i]\n*line_break\n-Aristotle\n\n*page_break\n*achieve chp5\n*label ch6_opening_news\n\n\"This is Mel Svendsen, reporting live from Paradigm City with the newest updates on the recent truly epic incidents.\n\n\"Two nights ago, Paradigm City was rocked by a display that the world had not seen for a decade - a truly monumental confrontation between empowered individuals. Reports indicate that a team of Special Operations operatives made an attempt to apprehend the leader of Paradigm's Emowered Law Enforcement, the veteran cape known as Sentinel.\n\n\"Rumors of misconduct have long surrounded Sentinel's leadership and sources indicate that ${senhe} had been preparing to openly move against the SOLAR agents who had been attempting to solve the recent capekiller murders within the city.\n\n*if (sentbrains > sentpower) and (sentbrains > sentbravado) \n  \"Paradigm City's skyline was the theatre for a showdown between the golden hero and ${cape_name}, said to be the leader of the SOLAR capes. Eyewitness accounts indicate that ${cape_name} was able to outwit Sentinel and keep the legendary hero at bay, with the latter being compared to a bull in a china shop. What this means of Sentinel's reputation remains to be seen.\"\n  *goto news_report2\n  \n*elseif (sentbravado > sentpower) and (sentbravado > sentbrains)\n  \"Paradigm City's skyline was the theatre for a showdown between the golden hero and ${cape_name}, said to be the leader of the SOLAR capes. Eyewitness accounts indicate that ${cape_name} fought valiantly to defend civilians and bystanders who had been caught in the crossfire. Social media is buzzing with thanks from the people that ${cape_name} saved.\"\n  *goto news_report2\n  \n*else\n  \"Paradigm City's skyline was the theatre for a showdown between the golden hero and ${cape_name}, said to be the leader of the SOLAR capes. Eyewitness accounts indicate that both ${cape_name} and Sentinel unleashed the full extent of their powers in the confrontation. There still is no full account of the damage or the casualties.\"\n  *goto news_report2\n  \n*label news_report2\n*page_break\nOn the television screen, Svendsen continues.\n\n\"Of course, that was only the main event. The showdown between Sentinel and ${cape_name} was the final element of what appeared to be a truly co-ordinated operation.\n\n*if ((ch5_distraction = \"maekir\") and (ch5_jotun_minimal = \"true\"))\n  \"Sources indicate that Sentinel's lieutenants - Phaestus and Mirage, as well as a unit of PCPD officers, were engaged by the Maekir team of mercenaries. However, in a strange break from their usual tactics, Maekir Team left their opponents alive. No explanation for this behavior has been forthcoming.\n  *goto news_report3\n  \n*elseif ((ch5_distraction = \"maekir\") and (ch5_jotun_minimal = \"false\"))\n  \"Sources indicate that Sentinel's lieutenants - Phaestus and Mirage, as well as a unit of PCPD officers, were engaged by the Maekir team of mercenaries. Both Phaestus and Mirage were killed protecting the unpowered officers and a state funeral will be held next week to commemorate the loss.\n  *goto news_report3\n\n*elseif ch5_distraction = \"blueshift\"\n  \"Sources indicate that someone leaked the civilian identities of Phaestus and Mirage, Sentinel's lieutenants, to the Internet, placing their families at risk and keeping them away from Sentinel during the climactic showdown. The individual responsible has not been identified and sources within SOLAR indicate that they are considering all possibilities in their investigation.\n  *goto news_report3\n\n*elseif (((ch5_phaestus_dead = \"true\") and (ch5_mirage_dead = \"true\")) and (ch5_pcpd_alive = \"false\"))\n  \"Prior to engaging Sentinel directly, ${cape_name} led ${phis} team to confront Sentinel's two lieutenants, Phaestus and Mirage. A battle between the two teams took place leading to what can only be described as a bloodbath. Reports indicate that Phaestus and Mirage were both killed, alongside the squad of PCPD officers who responded to the incident. What this means for Paradigm City going forwards remains to be seen.\n  *goto news_report3\n  \n*elseif (((ch5_phaestus_dead = \"true\") and (ch5_mirage_dead = \"true\")) and (ch5_pcpd_alive = \"true\"))\n  \"Prior to engaging Sentinel directly, ${cape_name} led ${phis} team to confront Sentinel's two lieutenants, Phaestus and Mirage. A battle between the two teams took place and reports indicate that both Phaestus and Mirage were killed during the confrontation. What this means for Paradigm City going forwards remains to be seen.\n  *goto news_report3\n  \n*elseif (((ch5_phaestus_dead = \"true\") and (ch5_mirage_dead = \"false\")) and (ch5_pcpd_alive = \"true\"))\n  \"Prior to engaging Sentinel directly, ${cape_name} led ${phis} team to confront Sentinel's two lieutenants, Phaestus and Mirage. A battle between the two teams took place and reports indicate that Phaestus was killed during the confrontation. What this means for Paradigm City going forwards remains to be seen.\n  *goto news_report3\n  \n*elseif (((ch5_mirage_dead = \"true\") and (ch5_pcpd_alive = \"false\")) and (ch5_phaestus_dead = \"false\"))\n  \"Prior to engaging Sentinel directly, ${cape_name} led ${phis} team to confront Sentinel's two lieutenants, Phaestus and Mirage. A battle between the two teams took place and reports indicate that Mirage was killed during the confrontation with the PCPD responders taking significant casualties. What this means for Paradigm City going forwards remains to be seen.\n  *goto news_report3\n  \n*elseif (((ch5_mirage_dead = \"true\") and (ch5_phaestus_dead = \"false\")) and (ch5_pcpd_alive = \"true\"))\n  \"Prior to engaging Sentinel directly, ${cape_name} led ${phis} team to confront Sentinel's two lieutenants, Phaestus and Mirage. A battle between the two teams took place and reports indicate that Mirage was killed during the confrontation. What this means for Paradigm City going forwards remains to be seen.\n  *goto news_report3\n  \n*elseif (((ch5_pcpd_alive = \"false\") and (ch5_phaestus_dead = \"false\")) and (ch5_mirage_dead = \"false\"))\n  \"Prior to engaging Sentinel directly, ${cape_name} led ${phis} team to confront Sentinel's two lieutenants, Phaestus and Mirage. A battle between the two teams took place. We understand that a full unit of Paradigm City police officers were killed during the confrontation and our hearts and well-wishes go out to their families. What this means for Paradigm City going forwards remains to be seen.\n  *goto news_report3\n  \n*else\n  \"Prior to engaging Sentinel directly, ${cape_name} led ${phis} team to confront Sentinel's two lieutenants, Phaestus and Mirage. A battle between the two teams took place. We understand that there were no casualties. However, what this means for Paradigm City going forwards remains to be seen.\n  *goto news_report3\n\n*label news_report3\n\n*if ch5_sentinel_dead = \"true\"\n  \"Here, on the scene, we understand that the SOLAR team involved will be summoned to Geneva to stand before a full enquiry into these events surrounding the death of Sentinel, as well as the rumored accusations of corruption and misconduct within ${senhis} organisation. When we reached out to ${cape_name} for comment, they only had this to say:\"\n  *goto news_choice\n  \n*else\n  \"Here, on the scene, we understand that Sentinel and the SOLAR team involved will be summoned to Geneva to stand before a full enquiry into these events, as well as the rumored accusations of corruption and misconduct. When we reached out to ${cape_name} for comment, they only had this to say:\"\n  *goto news_choice\n\n*label news_choice\n*fake_choice\n  #\"No comment.\"\n  #\"Get that camera out of my face!\"\n  #\"What we did, we did for the good of Paradigm City.\"\n  #\"Sentinel couldn't be allowed to continue running the city as ${senhis} own personal fiefdom.\"\n  #\"Let this be a lesson to all villains out there: if you abuse your power, we will find you.\"\n  \nYou listen to your own words as the report changes to footage of the Director-General of IPSA, clipped from a press conference, where he vows to get to the bottom of the situation and ensure that justice is done and security - both global and personal - is maintained.\n  \nThe news report continues into an opinion piece where talking heads speculate on possibilities. \n\nNext to you, Aegis coughs.\n\n*page_break\n\nThe Captain shakes her head. \"I leave you alone for a few days and you go and topple Sentinel. I never read iconoclast in your file, ${last_name}.\"\n\nStill in her hospital bed, she pushes herself up into a sitting position and presses a button, turning the news feed off.\n\n\"I wake up and I'm about to walk into a fucking hornet's nest. Thanks.\"\n\n*fake_choice\n  #\"I'll take full responsibility.\"\n    *set aegis_relationship %+10\n    \"Maybe you will,\" Aegis replies, \"But they'll still try and pin this on me. Won't be the first time. If we don't make this stick to Sentinel, we're both done.\"\n  #\"It had to be done.\"\n    *set aegis_relationship %-5\n    \"Maybe,\" Aegis admits, \"But did it have to be done like this? That's what they'll be asking. Whether it would have been better to apply soft pressure to Sentinel at a time when it's more [i]convenient[/i].\"\n  #\"Please, you're looking forward to snubbing Sentinel. I know it.\"\n    Aegis grins at that. \"You know it. Let's just hope we can pin this on ${senhim} and make it stick. Otherwise, Sentinel will be doing more than snubbing us in return.\"\n    \nSentinel. Aegis' words stick in your mind.\n\n\"Get some rest, alright? I've got somewhere to be,\" you tell her.\n\nThe Captain grins. \"A date?\"\n\n\"You could say that.\"\n\nAs you make your way out, you hear Aegis wonder: \"And who bought me this goddamn waving cat?\"\n*if ch5_sentinel_dead = \"true\"\n  *goto ch6_geneva_hearing\n\n*else\n  *goto ch6_sentinel_chat\n\n*label ch6_sentinel_chat\n*page_break\nIn the dungeon, the sovereign-in-exile lingers.\n\nSentinel - no, Alexi Castila - sits at a bare metal table in a bare metal room with a bare metal bed. There'll be a hearing once everyone is back in Geneva but, for now, ${senhe} acts like it is only a temporary vacation to ${senhis} own dungeons.\n\nFrom outside, where ${senhe} can't see you but you can see ${senhim}, you watch. You think. You reflect.\n\nHere, with this perspective, it's clear to see that Sentinel - who you once viewed as the epitome of heroism - is nothing more than a ${man}, one with their own beliefs and worldview, something that compels them to act.\n\nYou can't help but wonder about Sentinel's perspective, about what drove the golden cape to do what ${senhe} had done.\n\n*choice\n  #Enter the cell and talk.\n    *goto ch6_sentinel_cell\n  #Leave Sentinel to ${senhis} fate.\n    *goto ch6_geneva_hearing\n\n*label ch6_sentinel_cell\n\nA guard follows you into the cell. After a moment, you tell them it's not necessary - you want to talk with the prisoner alone. More aptly, with the nullifier cuffs around ${senhis} wrists, Sentinel's no more danger than any other normal ${man}.\n\nSentinel looks up but remains seated. Even now, ${senhe} thinks ${senhe} is still in control.\n\n\"I suppose you've come here to gloat,\" Sentinel says, wearing a sick smile.\n\n*fake_choice\n  #Yes.\n    \"Absolutely,\" you say, smiling in reply. \"I think I've earned it - only a few weeks out of the Academy and I've put a stop a conspiracy. I feel pretty good about myself.\"\n    \n    Sentinel eyes you. \"You've stopped nothing.\"\n  #No.\n    \"No, actually,\" you reply. \"I just want to know why you did it. Was it all worth it?\"\n    \n    \"Obviously,\" Sentinel states.\n    \n\"I'll be out of here soon enough,\" ${senhe} says. \"This will be a minor inconvenience. I'll have it cleared. The narrative will change. A SOLAR unit led by a washed up war veteran getting a bit too eager, a bit too opportunistic, in their attempts to crush the last of the Golden Age heroes. You've failed.\"\n\n\"We'll see about that,\" you reply. \"Just between you and me? I think your allies might not want to show their hands just yet. Hence the business with Courser. You always need deniable assets, right? If we've got enough evidence, and I think we do, the legend of Sentinel is going to end in disgrace.\"\n\n\"If you had evidence then I don't think you would be here, trying to put pressure on me. It's an old trick, one I've practiced more times than you've had hot showers. Pathetic!\"\n\n\"That's a lot of talk from someone sitting in a cell.\"\n\n\"For now, for now.\" Sentinel sits up straighter. \"And that's a good comment from someone who never saw the full picture. Tell me, did you ever wonder [i]why?[/i]\"\n\n*fake_choice\n  #Yes.\n    *set sentinel_relationship %+5\n    Sentinel nods. \"Our society only continues to exist because we have enemies to fight. There will come to be a time, dear ${first_name}, that homo sapien no longer tolerates homo superior - and I intend for both sides of that divide to survive.\"\n  #No.\n    Sentinel's lip twists in distaste. \"You should, before it becomes too late. Our society only continues to exist because we have enemies to fight. There will come to be a time, dear ${first_name}, that homo sapien no longer tolerates homo superior - and I intend for both sides of that divide to survive.\"\n \n*fake_choice\n  #It's only inevitable because people like you push it forwards.\n    \"Wrong,\" Sentinel replies. \"Every year, there are more and more empowered individuals coming forwards. Every year, their powers are more dangerous. We are seeing less Gamma-class individuals at the same time that we are seeing more Alpha-class. The Omega-class designation is no longer theoretical - it's inevitable.\n  #It's not inevitable.\n    \"Wrong,\" Sentinel replies. \"Every year, there are more and more empowered individuals coming forwards. Every year, their powers are more dangerous. We are seeing less Gamma-class individuals at the same time that we are seeing more Alpha-class. The Omega-class designation is no longer theoretical - it [i]is[/i] inevitable.\n  #Then how do I join the winning side?\n    *set sentinel_relationship %+10\n    Sentinel just smiles, like a teacher with a pupil who has just asked the winning question. \"It's good that you ask that. Every year, there are more and more empowered individuals coming forwards. Every year, their powers are more dangerous. We are seeing less Gamma-class individuals at the same time that we are seeing more Alpha-class. The Omega-class designation is no longer theoretical - it's inevitable.\n\n    \n\"Yes,\" Sentinel says, \"There's a war coming.\n\n\"IPSA... SOLAR... the Academy...\" ${senhe} punctuates each point with a fingertip against the table. \"Those are just stopgap measures while the rest of the world figures out what to do with us. Designed to keep us content and pliant, future generations of empowered individuals brainwashed to serve their masters while being 'responsible'. We will never be safe while our existence is only tolerated under threat of annihilation. The Golden Age was the only time our people had the freedom to be themselves. The freedom to be safe. My associates and I will restore that order.\"\n\n\"With people like you at the top of the food chain, of course.\"\n\nSentinel shrugs. The gesture says: it can't be helped if people [i]give[/i] me that power. \"It is just evolution. I'm sure the dinosaurs would have put down those tree-dwelling mammals if they knew what was coming.\"\n\n*if sentinel_relationship >75\n  \"I had high hopes for you,\" Sentinel then says. \"And I still do. You could be a great asset. My protege.\"\n  *goto sent_jail_choice\n  \n*else\n  *goto sent_jail_choice\n\n*label sent_jail_choice\n*choice\n  #Side with Sentinel's vision.\n    *set ch6_sent_ally \"true\"\n    *achieve sentally\n    You walk towards the table and take a seat.\n    \n    \"Tell me more,\" you say.\n    \n    Across the table from you, Sentinel smiles.\n    *goto ch6_geneva_hearing\n  #Disagree.\n    \"The mammals didn't take out the dinosaurs,\" you say. \"A hunk of rock did. How does that fit into your metaphor?\"\n    \n    Sentinel straightens up. Despite the lack of any costume, you see the bearing of a great figure there - but in this cell, it seems small. Pathetic.\n    \n    \"You think you're so smart,\" Sentinel hisses. \"You think you can stop what's already in motion. The moment I'm out, I will crush you like an insect! Evolution is inevitable! Progress is inevitable!\"\n    \n    You let ${senhim} rant and rave as you exit the cell.\n    \n    You can still hear ${senhim} from outside.\n    \n    But that's okay - it's only the furious rants of a ${man} with nothing but ${senhis} ego.\n    *goto ch6_geneva_hearing\n \n*label ch6_geneva_hearing\n*page_break\n\nThere's an official hearing and inquest, of course, into the events of Paradigm City. You knew it was coming, after all, but you're rather shocked by how quickly the bureaucratic machine spins up. Someone, you reflect, may be panicking.\n\nEach and every member of your team gives their version of events - Courser excepted, of course - as they're summoned, one by one, into a fortified and secured location within the heart of the Geneva headquarters, somewhere which you've never had the misfortune to see.\n\nEventually, you - the one they call catalyst or instigator or leader or traitor - are called to face the Tribunal.\n\n*if ch2_solar_romance = \"aljinn\"\n  Al-Jinn meets you on the way there. She doesn't stop to talk, doesn't even acknowledge you.\n  \n  \"Be careful,\" she says, as she slips past, \"It smells like a setup.\"\n  *goto ch6_tribunal_begins\n\n*elseif ch2_solar_romance = \"chevalier\"\n  Chevalier meets you on the way there. He doesn't stop to talk, doesn't even acknowledge you.\n  \n  \"Be careful,\" he says, as he slips past, \"I think they're gunning for you.\"\n  *goto ch6_tribunal_begins\n\n*else\n  Aegis meets you on the way there, walking with a cane. She doesn't stop to talk, and doesn't even seem to see you.\n  \n  \"Tell them nothing,\" she says, as she wanders past, \"And we might get out of this in one piece.\"\n  *goto ch6_tribunal_begins\n  \n*label ch6_tribunal_begins\n*page_break\n\nYou're confronted by a host of security measures. A palm reader to check your biometrics, a retina scan, several strange questions that seem to be a test to see if you are you, questions based around things that you could have sworn no one else knew... More things, things you've never heard about before.\n\nEventually, they seem satisfied that you are you and you're guided to a pair of great metal doors. They slide open.\n\nYou step through the double doors and are plunged into darkness as they close behind you.\n\n*page_break\n\nYou step into a single circle of light, a spotlight from above.\n\n\"That's far enough.\"\n\nThe voice is neither masculine nor feminine, thanks to the filter that obscures any trace of gender or age. Even as your eyes adjust to the dazzle of the spotlight, you can't pick out where the voice might be coming from, or to whom it might belong to. Beyond the edge of the light, you think you see figures seated in darkness, or eels slipping through shadows.\n\n\"${first_name} ${last_name}, also known as ${cape_name}, we are the Tribunal. We are attempting to uncover the truth behind the recent incident in Paradigm City. Let it be known that failing to disclose the full extent of your knowledge of the events that directly led to the confrontation between yourself and Sentinel will be assumed as conspiracy, and you will be punished under the full extent of the law. Let it be noted that no participant here is under coercion or mental compulsion and that all identities have been confirmed and screened in accordance with standing IPSA PowInfSec protocols.\"\n\n[i]That is, you all know who you are and who I am,[/i] you brood. [i]But here I am, standing in the dark.[/i]\n\nDespite everything, you can't help but feel like a child within the walls of Capetown again, and that this Tribunal - these mysterious individuals - are looking for a scapegoat.\n\nOr a threat.\n\n*fake_choice\n  #Nod, despite the ominous feeling.\n  #Silently resolve to give them nothing.\n    *set bravado+1\n  \nThe voice continues, unaware of your internal machinations.\n\n\"We understand that you are the newest member of Captain Ng-Mae's unit. Therefore, we are not inclined to hold you as responsible as many of your compatriots. Your unit was sent to Paradigm City in order to bring down a capekiller. Did Captain Ng-Mae instruct you on any other objectives, in confidence or otherwise?\"\n\nShe didn't, but you know she has no love for Sentinel...\n\nIt might be the key to a promotion.\n\n*fake_choice\n  #Lie, and say she did.\n    *set liecount+1\n    You might be able to pull off a lie once, twice. But the more you tell, the easier someone will slip up. You'll need some self-assured bravado to pull it off.\n  #Tell the truth.\n    It's for the best. The more lies you tell, the easier you - or someone else - will slip up. You'll need all of your bravado to get through this.\n  \n\"I see,\" says the voice. \"Ever since Arusha, she has been a person of interest, and our modelling of her behavior suggests that she would be willing to let her morals supersede her responsibilities.\"\n\nAnother voice cuts through, just as filtered as the first. \"That is ancient history. We are here for the truth, not your vendetta.\"\n\n\"When I want your thoughts, Doctor, I will [i]ask[/i] for them.\" The ice of their tone comes through loud and clear. It's strangely refreshing - no matter how many people are part of this Tribunal, they don't all agree.\n\nAnd they're not all equal.\n\n*page_break\n\nThe first voice says, \"There is another member of your team with a troubled history and is of interest to us: Leland Cross, Blueshift. During your time at Paradigm City, did Blueshift perform his duties in accordance with IPSA regulations? We remind you that failure to disclose information will result in harsh penalties.\"\n\n*label tri_shift_questions\n*fake_choice\n  *if ch3_blueshift_murder = \"true\"\n    #Tell them that Blueshift murdered someone.\n      *set ch6_tribunal_blueshift_told_murder \"true\"\n      \"He murdered someone. I believe that he knew this individual from his time as Exarch.\"\n      \n      \"I see,\" the first voice says. \"We'll look into this.\"\n  *if ch3_blueshift_attempt = \"true\"\n    #Tell them that Blueshift attempted to kill someone.\n      *set ch6_tribunal_blueshift_told_attempt \"true\"\n      \"He attempted to murder someone. I believe he knew this individual from his time as Exarch.\"\n      \n      \"I see,\" the first voice says. \"We'll look into this.\"\n  *if ch5_distraction = \"civilian\"\n    #Tell them that Blueshift leaked the identities of Sentinel's lieutenants.\n      *set ch6_tribunal_blueshift_told_identities \"true\"\n      \"Blueshift was the one who leaked the civilian identities of Phaestus and Mirage.\"\n      \n      \"Regardless of the fates of those two, we must not let this become seen as an acceptable tactic - especially from a SOLAR operative,\" the Doctor says.\n      \n      \"Agreed,\" echoes the first voice.\n  *if ((ch3_blueshift_murder = \"true\") or (ch5_distraction = \"civilian\")) or (ch3_blueshift_attempt = \"true\")\n    #Lie, and tell them that Blueshift behaved normally.\n      *set liecount+1\n      \"He's been on his best behavior,\" you say. \"I think he's been trying to turn over a new leaf, to borrow a cliche.\"\n  *if ch5_anima_unlocked = \"true\"\n    #Tell them that Blueshift uninstalled the safeties on Anima's combat hardware.\n      *set ch6_tribunal_anima_told_unlock \"true\"\n      *set ch6_tribunal_blueshift_told_unlock \"true\"\n      \"Blueshift unlocked Anima's weapon systems, I saw it myself. But we did need the firepower.\"\n      \n      \"Tampering with that machine is beyond his authority,\" the first voice says.\n  *if ch4_ada_awakened = \"true\"\n    #Tell them that Blueshift 'awakened' Anima's true personality.\n      *set ch6_tribunal_anima_told_awake \"true\"\n      *set ch6_tribunal_blueshift_told_awake \"true\"\n      \"Blueshift did something to Anima, some kind of procedure - at the end of it, she was far more personable.\"\n      \n      \"Tampering with that machine is beyond his authority,\" the first voice says.\n  #Make baseless accusations, forcing the Tribunal into a corner.\n    *set liecount+1\n    \"Honestly?\" you ask, \"I don't think so. He's a narcissistic tumor and I'm sure he was up to things he wasn't disclosing to the rest of us. Can't we just excise him?\"\n      \n    \"Not without evidence,\" the second voice states, voice like iron.\n      \n    \"Yes,\" the first voice replies, \"Not without suitable evidence. We've tried it before.\"\n  #Play to the division within the Tribunal to defeat their line of questioning.\n    \"Who, Exarch?\" you say, feeling your lips quirk. \"What did the good Doctor say, that we're here for the truth and not the events of the past? We're here for Sentinel, not Cross.\" You let that statement hang in the dark. \"Aren't we?\"\n    \n    A murmur ripples through the Tribunal.\n    *if bravado >3\n      \"I must agree,\" that second voice says. \"Director-General, this is neither the time nor the place.\"\n      *goto tri_anima_questions\n    \n    *else\n      *set liecount+1\n      The first voice says, \"Don't try to tell us what we are here for, ${last_name}. Remember your place. Answer the question.\"\n      *goto tri_shift_questions\n\n*label tri_anima_questions\n*page_break\n\n\"Speaking of Exarch,\" a third voice says, \"The Engineer's war machine. The Anima unit. Some have said that it played an integral part in some of these incidents - the brawl with Maekir team, for example. Director-General?\"\n\n\"Yes,\" the Director-General replies. \"Ada Okoye, Anima. It's an experiment we've allowed to continue, albeit against my personal wishes.\"\n\n\"Because we need all the information on the transcended Seven that we can get.\" The second voice.\n\nSilence reigns. \"Should I speak?\" you eventually ask.\n\n\"Yes, of course,\" the Director-General snaps.\n\n*label tri_anima_choices\n*fake_choice\n  *if (ch4_ada_awakened  = \"true\") or (ch5_anima_unlocked = \"true\")\n    #Lie, and say that Anima is unchanged from when you met her.\n      *set liecount+1\n      \"A lot of this is news to me,\" you say. \"As far as I can tell, she's the same weird woman, or machine, that she was when we first met.\"\n  #Lie, and say that you had no idea she was a machine.\n    *set liecount+1\n    \"Excuse me? You're telling me that Ada is a robot?\" You even think you should pretty convincing.\n    \n    \"Don't make a mockery of this,\" the Director-General states, but the general murmur seems to indicate that it'd be best if all parties just moved on.\n  *if ch3_anima_killed_jotun = \"true\"\n    #Mention that Anima killed Jotun, leader of Maekir Team.\n      *set ch6_tribunal_anima_told_jotun \"true\"\n      \"She did kill Jotun of Maekir Team, although this was to defend the rest of the team during a combat situation,\" you say.\n      \n      The Tribunal seems content with that.\n  *if ch5_anima_unlocked = \"true\"\n    #Mention that Blueshift unlocked her weapons.\n      *set ch6_tribunal_anima_told_unlock \"true\"\n      *set ch6_tribunal_blueshift_told_unlock \"true\"\n      \"Blueshift removed the safeguard in some of Anima's weapon systems. We needed the firepower at the time-\"\n      \n      \"I wasn't aware that you had the authority to make that call, ${last_name}. But this problem is easily enough rectified.\n  *if ch4_ada_awakened = \"true\"\n    #Mention that Anima started showing signs of a personality.\n      *set ch6_tribunal_anima_told_awake \"true\"\n      \"Well, there was something strange. Anima started displaying a personality - she stopped speaking in present-tense, things like that.\"\n      \n      \"Is that something to be concerned about?\" the second voice asks.\n      \n      \"No,\" the third voice replies. \"I don't think so.\"\n      \n      \"And easily enough rectified if it becomes a problem.\n  *if (ch4_ada_awakened = false) and (ch5_anima_unlocked = false)\n    #Tell the truth, that she's unchanged from when you met her.\n      \"A lot of this is news to me,\" you say. \"As far as I can tell, she's the same weird woman, or machine, that she was when we first met.\"\n      \n      \"That does appear to be the case,\" says the third voice.\n  #Play to the need to keep the experiment going, regardless.\n    \"If this is really an experiment, then perhaps it is best to let it continue, wherever it may go? She's no threat by herself, no matter how much she talks. Knowledge is power and I don't feel very powerful with a muzzled robot on my team.\"\n    *if bravado >3\n      *set ch6_anima_experiment_continue \"true\"\n      \"A fair point,\" the third voice states.\n      \n      \"We've wasted far too much time worrying about this machine and its maker,\" says the second voice.\n      *goto tri_courser\n    \n    *else\n      *set liecount+1\n      \"That's above your clearance, ${last_name},\" the Director-General says. \"For the record, let it be known that if you discuss anything you just heard outside of this room, we'll find a dark hole for you to spend the rest of your days in. Answer the question.\"\n      *goto tri_anima_choices\n      \n*label tri_courser\n\n\"Moving on,\" says the Director-General.\n\n*if ch4_courser_fate = \"alive\"\n  \"Damian Alexander AKA Courser. From what we have been able to glean, he attacked three members of your team but he managed to escape after your confrontation with him. This constitutes an unacceptable failure. You are, now, our only source of information on him. What do you understand are his motivations for his betrayal?\"\n  *goto tri_courser_choices\n\n*elseif ch4_courser_fate = \"held\"\n  \"Damian Alexander AKA Courser. From what we have been able to glean, he attacked three members of your team. You went after him and arrested him, whereupon he has been held at a secure location ever since. He is not cooperating with us, and more drastic measures may be required. What do you understand his motivations to have been?\"\n  *goto tri_courser_choices\n\n*else\n  \"Damian Alexander AKA Courser. From what we have been able to glean, he attacked three members of your team. You confronted him whereupon, shortly afterwards, Courser was killed. This is unfortunate, as we would have liked to understand his motivations. What do you understand them to have been?\"\n  *goto tri_courser_choices\n\n*label tri_courser_choices\n*choice\n  #Lie, and mention that you have no idea what caused his betrayal.\n    *set liecount+1\n    \"Honestly, sir?\" you say, bumping your shoulders up. \"I wasn't too concerned with the why of it at the time. I have no concrete idea what might have caused it. And I assume hearsay or speculation would not be acceptable to the Tribunal.\"\n    \n    \"You are correct,\" the Director-General replies, although you can hear a distinct undercurrent of displeasure.\n    *goto sentinel_involvement\n  #Lie, and claim that he acted alone based on pre-existing grudges.\n    *set liecount+1\n    \"Honestly, sir?\" you say, bumping your shoulders up. \"I believe Alexander experienced a moment of weakness and wished to hurt Cross. Even in my short time there, it was clear that the two disliked one and other.\"\n    \n    \"This Tribunal is not the place for speculation,\" the Director-General replies, \"All we want are facts - which you clearly can't give us in this instance.\"\n    *goto sentinel_involvement\n  #Mention that evidence pointed to Sentinel masterminding the attempt.\n    \"It was Sentinel,\" you reply, squaring your shoulders. \"Courser said as much, and we found evidence on his personal computer that confirmed it. Sentinel directly instructed Alexander to attack our unit by incapacitating our strongest members.\"\n    \n    \"It fits,\" the second voice says.\n    \n    \"We will verify this information,\" the Director-General intones.\n    \n    *page_break\n    \n    \"It's interesting that you mention Sentinel.\" It takes you a moment to realise that it's the second voice talking - the one the Director-General called the Doctor, not the Director-General himself.\n    \n    \"$!{senhe} has long been criticised by elements of the global community. Some of your compatriots have mentioned an idea of a conspiracy, some plot by Sentinel to manipulate Paradigm City for ${senhis} own ends.\"\n    \n    \"It's speculation,\" the Director-General snaps.\n    \n    \"Perhaps,\" the third voice says, \"But I would like to hear it.\"\n    \n    \"As would I,\" the Doctor states.\n    \n    A murmur floats through the darkness. It appears that the Director-General is outvoted, here and now.\n    *goto tri_plan\n\n*label sentinel_involvement\n*page_break\n\"Let us dispense with the peripheral details,\" the Director-General states, moving on to another topic. \"Ultimately, we need to uncover the truth of what happened in Paradigm City and whether Sentinel was involved. Some members of your team seem to believe that ${senhe} was a conspirator in some kind of plot. What evidence of this do you have?\"    \n\n*label tri_plan\n*choice\n  #Lay your cards on the table.\n    \"We managed to gather several pieces of evidence that we will be submitting as a full report.\"\n    \n    \"It hasn't been placed before the Tribunal?\" the Director-General snaps.\n    \n    \"This was called suddenly,\" the third voice says. \"We need time to assess the information. This is fine.\"\n    \n    \"We'll see,\" the Director-General says, and it sounds almost like a promise of threats to come. \"You've given us much to think about. You are dismissed, ${cape_name}.\"\n    \n    As you turn to leave, though, the Director-General speaks again.\n    *goto tri_oc\n  #Lie, and admit you found no evidence of anything out of the ordinary.\n    *set liecount+1\n    You swallow.\n    \n    \"Nothing,\" you say. \"Ultimately, we didn't find anything that connected Sentinel to the accusations. Nothing concrete or usable, at least.\"\n    \n    \"I see,\" the Director-General states. \"You've given us much to think about. You are dismissed, ${cape_name}.\"\n    \n    As you turn to leave, though, the Director-General speaks again.\n    *goto tri_oc\n    \n*label tri_oc\n*page_break\n\"There's one more thing, ${last_name}.\"\n\nYou pause mid-stride and turn back to gaze into the darkness.\n\n\"You were contacted by ${ocname} O'Connell during your time in Paradigm City. A fellow member of the Academy, although they did not graduate. We are aware of your relationship with them. What, exactly, did they tell you? Did they ask you to meet with them?\"\n\n*label tri_oc_choice\n*fake_choice\n  *if ch4_met_oc = \"true\"\n    #Claim you met with ${ocname} but nothing was discussed.\n      \"They did,\" you reply, \"But we met as old friends. That's all.\"\n  *if ch4_met_oc = \"true\"\n    #Claim that they mentioned a conspiracy, but you don't really believe in it.\n      \"They did,\" you reply, \"But they seemed a bit paranoid, crazy even. Talking about conspiracies, things like that. I didn't put much stock on it. I guess they never got over falling out of the Academy.\"\n  *if ch4_met_oc = \"true\"\n    #Claim that they mentioned a conspiracy, which you are going to uncover.\n      \"They did,\" you reply, \"And they talked about a conspiracy, something which I think is related to the case with Sentinel. I'm going to follow it up.\"\n  *if ch4_met_oc = \"true\"\n    #Lie, and say that you didn't meet with them.\n      *set liecount+1\n      \"They didn't tell me anything because I didn't meet with them,\" you reply. \"I was too busy with the case work at the time. Taking time out of that to meet with an old friend isn't being true to my responsibilities as a SOLAR operative.\"\n  *if ch4_met_oc = \"false\"\n    #Tell the Tribunal that you didn't meet with them.\n      \"I didn't meet with them,\" you reply. \"Maybe I wish I did, but I was too busy with case work at the time. But my work as a SOLAR operative came first.\"\n  #Accuse the Tribunal of digging for irrelevant information.\n    \"You told me I'm dismissed,\" you retort. \"With all due respect, Director-General, I'm not going to entertain a witch hunt into my past on the basis of your accusation.\"\n    *if bravado >3\n      \"${cape_name} is correct,\" says the third voice. \"This line of questioning tells us nothing.\"\n      \n      A murmur ripples through the dark. It seems like you've made a point.\n      *goto tribunalclosing\n    *else\n      *set liecount+1\n      \"You will answer when I tell you to answer, ${last_name} - or you run the risk of being stripped of your position. I will not ask again. What, exactly, did ${ocname} O'Connell tell you when you last heard from them?\"\n      *goto tri_oc_choice\n      \n*label tribunalclosing\n\n\"I see,\" the Director-General says. \"That will be all for now. This Tribunal is dismissed.\"\n  \n*if liecount > (bravado+1)\n  *set ch6_caught_lies \"true\"\n  As you turn to leave, again, you feel the eyes of the Director-General on your back.\n\n  \"You should not have lied to me,\" the voice says.\n  \n  There's nothing to do but wait, and pass each second wondering what's going to happen.\n  *goto ch6_post_tribunal_results\n  \n*else\n  As ce.\n\n\"Ah,\" she says, face lighting up with a rare smile, \"There you are, ${cape_name} - I was just about to tell Chevalier to get off his ass and drag you here. Glad I didn't have to do it.\"\n\n\"Likewise, Captain - how can I help?\"\n\n\"I've been thinking about the direction of this unit, of this team going forwards...\"\n\nShe's staring at a photo of the team on the far wall, from before you joined.\n\n*choice\n  #Ask Aegis about Arusha.\n    \"Captain,\" you say, trying to break her out of her reverie. \"What happened in Arusha?\"\n    *goto aegis_arusa_story\n  #Ask Aegis about her current situation.\n    You clear your throat. \"You were saying, Captain?\"\n    *goto aegis_fate_2\n    \n*label aegis_arusa_story\n*if aegis_relationship >60\n  *achieve aegis\n  \n  \"You want to hear that old story, huh?\" Aegis asks, tearing her eyes from the picture. \"You want to hear how they put this old warhorse out to pasture before her time?\"\n  \n  \"If you're telling,\" you reply.\n  \n  \"Might as well. I'd bet you've heard bits and pieces of it by now.\n  \n  \"I was thirty years old, leading a unit on the ground during the global response to the African Purges. We were supposed to keep the peace in Arusha - some chance of that happening with a hundred men against a world that had gone fucking mad. We were there for weeks, ${cape_name}, and I still remember the fucking stench of burning bodies, the screams of people being buried alive. Kids crying for their mom, their dad, their pet fucking dog...\"\n  \n  She trails off, and it occurs to you that her knuckles are white, her fingertips digging into her palm.\n  \n  *fake_choice\n    #\"I'm sorry, Lorna.\"\n      She shakes her head. \"For what? It's not like you were my COs, sitting there telling us to keep the peace and hold this position and do not engage.\n      \n    #\"I'm sorry, Captain.\"\n      She shakes her head. \"For what? It's not like you were my COs, sitting there telling us to keep the peace and hold this position and do not engage.\n      \n    #\"What'd you do?\"\n      \"I shot my own career in the head, is what I damn well did,\" Aegis comments. \"The only thing I could do.\n  \n  \"I took the people who wanted to go with me and actually save people as opposed to property and sent them through the city to stop letting people kill each other. People died. I lost people. But I wasn't going to take commendations while people got buried alive because they had the temerity to be in the wrong place at the wrong time.\"\n  \n  She exhales through her teeth. \"I remember staring down into this pit of bodies. Men, women, children. It's raining and that doesn't do anything to stop the stink of shit and mud and blood and fear as I'm pulling these people out of what was going to be another mass grave my superiors could pretend they didn't know about, or didn't have the people to stop.\n  \n  \"Bullshit.\"\n  \n  *page_break\n  \n  \"Well, I pull two kids out of there. Brother and sister. They both don't say a goddamn word I understand until one of the older people we pull out of there says she's going on about hail.\"\n  \n  She catches your eyes. \"Ada and her brother. Don't know if they had powers, don't know if their parents did - didn't have the records we have now.\"\n  \n  *fake_choice\n    #\"Ada has a brother?\"\n      Aegis nods. \"Name of Dayo Okoye. Never found out what happened to him. Hope the kid's okay.\"\n      \n    #\"What happened to them?\"\n      Aegis smiles, but only slightly. \"Ada? Well, you know her well enough. Dayo? No idea. Lost contact with him years ago. Hope the kid's okay.\"\n      \n    #\"What happened next?\"\n  \n  \"I returned to base. Got chewed out for disobeying orders. Got chewed out for losing men and women because of it. 'Empathy is not standard-issue, Lieutenant!'\" She shrugs, again.\n  \n  \"But eventually, word got out. Yours truly became something of a media darling, believe it or not. Can't throw someone to the wolves for saving people, although they pushed for it hard. By the time everyone stopped paying attention, it was too late for people to notice or care that I was shuffled off into what'd become SOLAR, where I've been ever since.\"\n  \n  *choice\n    #\"You did the right thing, Aegis.\"\n      *set aegis_relationship %+5\n      Aegis shakes her head. \"Did I? I don't know. Men and women died under my command because I thought I knew better, because I [i]cared[/i]. I ran the numbers, and I saved more people than I lost... but that's some cold comfort.\"\n      \n      Eventually, she says, \"But that's enough about the past. Let's talk about the future.\"\n      *goto aegis_fate_2\n    #\"You shouldn't have gone against your orders.\"\n      Aegis nods, slowly. \"Maybe. You're right, in a way - men and women died under my command because I thought I knew better, because I [i]cared[/i]. I run the numbers, and I saved more people than I lost... but that's some cold comfort.\"\n      \n      Eventually, she says, \"But that's enough about the past. Let's talk about the future.\"\n      *goto aegis_fate_2\n    #\"I'm sure we're all glad to have you here.\"\n      Aegis holds up a finger. \"Careful what you wish for, ${cape_name}. But that's actually what I wanted to talk about.\"\n      *goto aegis_fate_2\n      \n*else\n  \"Nothing,\" Aegis says, softly. \"Nothing at all. I'm not here to talk about the past, just the future.\"\n  *goto aegis_fate_2\n\n*label aegis_fate_2\n\n\"With all that's happened,\" Aegis says, \"I've been thinking about this unit, going fowards.\"\n*if ch6_goodend = true\n  Aegis leans up against her desk and crosses her arms. \"You did good, ${first_name}. I can see the potential there to lead this team. In a few months, I'll be putting in the paperwork to have you take my place. I'm old, and I'm not sure whether I'll really recover from what Damian did.\"\n  \n  She extends her hand and you...\n  \n  *choice\n    #Shake it, accepting the offer.\n
