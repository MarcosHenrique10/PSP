a, he puts in for transfer to a different team - despite the protests of every single member of the squad. A few weeks after that, it becomes clear that he's abandoned SOLAR entirely. Whatever happened to him after that, you have no idea.\n  *goto anima_fate\n  \n*elseif (((ch4_courser_fate = \"suicide\") and (chevalier_relationship \u003c70)) and (ch2_solar_romance != \"chevalier\"))\n  Chevalier never seemed to really recover from Courser's betrayal and apparent suicide. A few weeks after returning to Geneva, he puts in for transfer to a different team - despite the protests of every single member of the squad. A few weeks after that, it becomes clear that he's abandoned SOLAR entirely. Whatever happened to him after that, you have no idea.\n  *goto anima_fate\n  \n*elseif (ch2_solar_romance = \"chevalier\") and ((ch4_courser_fate = \"alive\") or (ch4_courser_fate = \"held\"))\n  *set teamcount+1\n  Courser's betrayal follows Chevalier like a dark cloud, dulling his usual enthusiasm and playful quips. For a time, he refuses to talk about it - whether his best friend is still alive or not. Somedays, his smile does seem a touch more brittle than it has been before but, eventually, as events unfold, he is more like his usual self. Warm when off-duty, strong when on-task, and always trying to convince you to get 'just one more' matching tattoo.\n  \n  You're there with him, when he says he might try to find Courser in the future. One day, he says, he might be able to forgive him. Not yet, but one day.\n  *goto anima_fate\n  \n*elseif (ch2_solar_romance = \"chevalier\") and ((ch4_courser_fate = \"dead\") or (ch4_courser_fate = \"suicide\"))\n  *set teamcount+1\n  Courser's betrayal follows Chevalier like a dark cloud, dulling his usual enthusiasm and playful quips. For a time, he refuses to talk about it. Somedays, his smile does seem a touch more brittle than it has been before but, eventually, as events unfold, he is more like his usual self. Warm when off-duty, strong when on-task, and always trying to convince you to get 'just one more' matching tattoo.\n  \n  You're there with him, watching from afar, when he visits Courser's grave. Whatever it is he says remains between him and the tombstone.\n  *goto anima_fate\n  \n*else\n  *set teamcount+1\n  As events unfold, Chevalier is always there with a quip and, often, a new tattoo. Courser's betrayal weighs heavily on him, and he generally refuses to talk about it, but he remains with the squad, a source of warmth when off-duty and a bastion of strength when putting pressure on a villain. Somedays, however, his smile does seem a touch more brittle than before.\n  *goto anima_fate\n\n*label anima_fate\n*page_break\n*if ((ch4_ada_awakened = \"true\") and (ch5_anima_unlocked = \"true\")) and (((ch6_tribunal_anima_told_unlock = \"true\") or (ch6_tribunal_anima_told_awake = \"true\")) or (ch6_caught_lies = \"true\"))\n  *set ch6_anima_gone \"true\"\n  Anima's unauthorised modifications and procedures don't escape the eyes of the upper echelons of SOLAR authority. Despite the protests of the squad, she is seized for reasons of 'global security'. For a week, she is held in a facility far more secure and remote than the Geneva headquarters but every insistence is made that 'the machine' is being cared for.\n    \n  At the end of that week, there is no response to any enquiries.\n    \n  That night, Blueshift goes missing.\n  *goto blueshift_fate\n\n*elseif ((ch4_ada_awakened = \"true\") or (ch5_anima_unlocked = \"true\")) and ((ch6_anima_experiment_continue = \"true\") or (ch6_caught_lies = \"true\"))\n  *set teamcount+1\n  Anima's unauthorised modifications and procedures don't escape the eyes of the upper echelons of SOLAR authority, it seems. Members of Geneva's technological teams take her for testing. For weeks, she exists only within the basement of the Geneva complex, behind locked doors and armored bulkheads.\n    \n  But she returns to the team, no worse off than she left it.\n  *goto blueshift_fate\n\n*elseif ch4_ada_awakened = \"true\"\n  *set teamcount+1\n  Anima remains with the team, although even in light of her apparent personality, SOLAR refuses to relent on their protocols, still considering her property and not a person. It becomes a bitter battle between members of your squad and elements within SOLAR - one which shows no sign of concluding any time soon.\n  *goto blueshift_fate\n\n*else\n  *set teamcount+1\n  Anima remains with the team, as enigmatic and mysterious as always. Whether there's any chance of recovering anything further of Ada's personality, seems to be unknown. You can't shake the feeling that while Ada might not be there, something else is.\n  *goto blueshift_fate\n    \n*label blueshift_fate\n*page_break\n*if ch6_anima_gone = \"true\"\n  After he goes AWOL, SOLAR dispatches teams to bring Blueshift in, but not your team.\n  \n  You're there, though, at the briefing when they reassess his status as a known villain and a known threat. You're there at the next one, where they detail the beginning of his path of destruction, one that is coming straight for Geneva and one that has killed anyone they've sent to stop him. There are rumblings of an Omega classification when they display satellite imagery of broken landscapes.\n  \n  You recognise the rainbow feathered mantle, the armored costume that makes him look like a Mesoamerican deity...\n  \n  Exarch is back. And, one day, you'll have to face him down.\n  *goto al_jinn_fate\n\n*elseif (((ch5_distraction = \"civilian\") and (ch6_tribunal_blueshift_told_identities = \"true\")) and (ch4_ada_awakened = \"true\")) or (((ch5_distraction = \"civilian\") and (ch6_caught_lies = \"true\")) and (ch4_ada_awakened = \"true\"))\n  One evening, Blueshift is arrested for leaking the identities of Phaestus and Mirage to the wider world. It's a quick case, thanks to his past as Exarch. He is sent somewhere far away, somewhere where no one is sure he's even alive, somewhere where it's true to what the Tribunal said - it's a deep dark hole where he can simply be... forgotten.\n  \n  Before too long, it becomes clear that Anima handles it by regressing to her more alien personality.\n  *goto al_jinn_fate\n\n*elseif (((ch5_distraction = \"civilian\") and (ch6_tribunal_blueshift_told_identities = \"true\")) and (ch4_ada_awakened = \"false\")) or (((ch5_distraction = \"civilian\") and (ch6_caught_lies = \"true\")) and (ch4_ada_awakened = \"false\"))\n  One evening, Blueshift is arrested for leaking the identities of Phaestus and Mirage to the wider world. It's a quick case, thanks to his past as Exarch. He is sent somewhere far away, somewhere where no one is sure he's even alive, somewhere where it's true to what the Tribunal said - it's a deep dark hole where he can simply be... forgotten.\n  *goto al_jinn_fate\n\n*elseif ((ch3_blueshift_murder = \"true\") and (ch6_tribunal_blueshift_told_murder = \"true\")) or ((ch3_blueshift_murder = \"true\") and (ch6_caught_lies = \"true\"))\n  *set teamcount+1\n  The news that Blueshift was responsible for murdering a civilian in cold blood is kept quiet. As best as you can determine, he is given a slap on the wrist. \n  \n  He remains part of the team, although remarkably less caustic than before. It might be a slap on the wrist, but it is one that was evidently followed with the threat of harsher punishment. His past will catch up to him, you're sure... but not yet.\n  *goto al_jinn_fate\n\n*else\n  *set teamcount+1\n  Despite everything, Blueshift remains with the team - that is, when he's not in a lab or a workshop working on some new project. \n  \n  Surprisingly, he steps back from any idea of actually leading the team and seems to remain content with sarcastically and narcissitically offering his perspective on events - but perhaps with less venom than he had before. His past will catch up to him, you're sure... but not yet.\n  *goto al_jinn_fate\n\n*label al_jinn_fate\n*page_break\n*if ((ch5_mirage_dead = true) and (ch2_solar_romance != \"aljinn\"))\n  While there was certainly no love lost between Mirage and Al-Jinn, the loss of someone she once counted as a friend under such bizarre circumstances leads her to retire from the team. \n  \n  She remains with SOLAR, working in a variety of positions, never quite settling in one place. Eventually, you hear word that she's found somewhere to settle - as an instructor at the Academy for Empowered Development and Education.\n  \n  Or, as you know it personally, Capetown.\n  *goto courser_fate\n  \n*elseif (((ch5_pcpd_status = \"aljinn\") and (ch5_mirage_dead = false)) and (ch2_solar_romance != \"aljinn\"))\n  In the aftermath of Sentinel's arrest, Al-Jinn seems to grow distant. It becomes clear that, after a particularly heated discussion between her and the rest of the team, taking control of the officers in Paradigm City's police force wasn't something she was able to handle doing, or living with. Soon after, she retires from SOLAR. \n  \n  Eventually, you hear word that she is an instructor at the Academy for Empowered Development and Education. Or, as you know it personally, Capetown.\n  *goto courser_fate\n  \n*elseif ((ch5_mirage_dead = true) and (ch2_solar_romance = \"aljinn\"))\n  While there was certainly no love lost between Mirage and Al-Jinn, the loss of someone she once counted as a friend under such bizarre circumstances leads her to withdraw from you and then, soon after, retire from the team, unwilling to see another friend - or more - suffer the same fate.\n\n  She remains with SOLAR, working in a variety of positions, never quite settling in one place. Eventually, you hear word that she's found somewhere to settle - as an instructor at the Academy for Empowered Development and Education.\n  \n  Or, as you know it personally, Capetown.\n  *goto courser_fate\n\n*elseif (((ch5_pcpd_status = \"aljinn\") and (ch5_mirage_dead = false)) and (ch2_solar_romance = \"aljinn\"))\n  *set teamcount+1\n  In the aftermath of Sentinel's arrest, Al-Jinn seems to grow distant. After a tense, private discussion, you manage to find out the reason for it - using her powers to take control of officers of Paradigm City's police force was not something she was comfortable with. Unsure of where she belongs, she ponders becoming an instructor in Capetown - if not for you, that is.\n  \n  She remains with the team, performing as Aegis' adjutant for as long as she remains in command. With any luck, she remarks, as time passes, she'll be able to continue the tradition of such disciplined service for whomever takes command. She's grinning at you, though, when she says it.\n  *goto courser_fate\n  \n*else\n  *set teamcount+1\n  Al-Jinn remains with the team, performing as Aegis' adjutant for as long as she remains in command. When asked what she might do when the Captain inevitably steps down, she shrugs and remarks that maybe she'll take up teaching in Capetown. Strangely, she even seems to be sincere.\n  *goto courser_fate\n\n*label courser_fate\n*page_break\n*if (ch6_courser_witness = \"true\")\n  After being a key witness in the case against Sentinel, Courser can give up any hope of being the hero he used to be. It's only through that effort that he isn't locked away in some cell to live out the rest of his days in isolation and seclusion, forgotten by the world that once adored him. \n  \n  The last you hear of Courser, he's returned to his birthplace of Baltimore, becoming a ghostly crimefighter - doing good without uniform, cape or costume.\n  *goto ch6_the_dreams\n  \n*elseif (((ch4_courser_fate = \"dead\") or (ch4_courser_fate = \"suicide\")) or (ch4_courser_fate = \"alive\"))\n  No one ever really forgets Courser, even if they never seem quite ready to be able to forgive him.\n\n  There's a memorial service for the loss of SOLAR's 'poster boy'. It's all propaganda, of course, with a carefully-constructed story that preserves his public image while seeming to adhere to the facts. Chevalier leaves halfway through.\n\n  Courser's legacy is preserved - as a shining beacon to attract more young people to the world that damned him.\n  *goto courser_monument2\n  \n*else\n  You're not quite sure what happened to Courser after he was taken in for questioning. He did not appear at Sentinel's trial, despite the wealth of evidence it would have been, and any enquiry you make is stonewalled 'for reasons of global security'. In the end, you have no idea whether he's alive or dead, or whether the shadowy figures he betrayed managed to catch up to him.\n  *goto ch6_the_dreams\n  \n*label courser_monument2\n*line_break\n*line_break\n*if ch4_courser_fate = \"alive\"\n  The night of the service, there's an encrypted message waiting for you.\n  \n  [i]I can't ever undo what I did to you and the team. In the future, I hope to find some way to make up for what I did and to be worthy of wearing that uniform again. Whatever I find, whatever I learn, I'll bring to you, one Capetown kid to another. Take care of yourself, ${first_name}, and watch your back.[/i]\n  *goto ch6_the_dreams\n\n*else\n  *goto ch6_the_dreams\n\n*label ch6_the_dreams\n*page_break\n*if ch5_source_embrace = \"true\"\n  *achieve helpme\n  In the weeks following the showdown with Sentinel, you are plagued by strange dreams and waking nightmares, terrible visions of that thing you glimpsed in the infinite darkness, memories of the resonance that found a place behind your eyes. The feeling of it crawling over your skin like a chemical burn never fades, nor does the maddening sensation of a half-forgotten song ever leave your head. At night, alone, you can't shake a distinct feeling of dread, the sense that if you look anywhere but forwards you'll never see anything ever again.\n  \n  Whatever it was, whatever it is, it has [i]glimpsed[/i] you.\n  \n  Whatever it is, it is getting closer.\n  \n  And it exerts a pull, like a bowling ball on stretched canvas. Impossible to ignore.\n  \n  You resolve to find it, before it finds you.\n  *goto ch6_the_ending\n\n*else\n  For the first few weeks following the showdown with Sentinel, you are troubled by strange dreams, visions of that thing you glimpsed in the infinite darkness, memories of the resonance that found a place behind your eyes, if only for a moment.\n  \n  Eventually, however, the dreams recede and, before too long, it ceases to be anything but a vague memory of a half-remembered song. Longer still, and you're not even sure anything happened at all.\n  *goto ch6_the_ending\n  \n*label ch6_the_ending\n*page_break\n*achieve chp6\nIt all worked out for the best.\n\nAt least, that's what you tell yourself a week later, atop the tallest building in the Geneva complex. The wind whips at your face, the air thick with the ozone promise of a storm to come - you can see the dark clouds on the horizon, boiling over the Alps.\n*line_break\n*line_break\n*if ch6_anima_gone = \"true\"\n  Exarch is coming. He's crushing everything in a straight line from where he started in the East Andes, on a path that looks like it'll hit Geneva in a matter of weeks. Maybe only days, if the latest reports are to be believed. Predictive modelling indicates a staggering amount of casualties if he is allowed to reach the city.\n  *goto exarch_ending2\n  \n*else\n  *goto sentinel_ending\n  \n*label exarch_ending2\n*line_break\n*line_break\n*if ch6_new_captain = \"true\"\n  Your team - truly your team now, now that the promotion has gone through - is waiting beneath you, somewhere in the complex. Some of the faces are old, but many of them are new. None of them want to talk about what's happening, or what they will have to do in the near future. You wonder if there'll be any point in even trying to talk with Blueshift, or if he'd even listen. He might have listened to...\n\n  He's coming straight for Geneva, bearing down like an angry storm front. People whisper the word 'Omega' when they talk about him. Yourself, you're not so sure - but you'll get a personal accounting of his powers soon enough.\n  *goto exarch_ending3\n\n*else\n  Aegis maintains command, refusing to talk about Blueshift. The rest of your team waits beneath you. Some old faces, some new. None of them want to talk about what's happening, or what they will have to do in the near future. You wonder if there'll be any point in even trying to talk with Blueshift, or if he'd even listen. He might have listened to...\n\n  He's coming straight for Geneva, bearing down like an angry storm front. People whisper the word 'Omega' when they talk about him. Yourself, you're not so sure - but you'll get a personal accounting of his powers soon enough.\n  *goto exarch_ending3\n\n*label exarch_ending3\n*line_break\n*line_break\n*if ch6_sentinel_free = \"true\"\n  It's some small consolation that Sentinel flew to challenge Exarch the moment he touched down on the western coast of Spain. Exarch ripped ${senhim} in two and crushed ${senhis} helmet underfoot. Everything you did, everything you worked for, has been for naught. Sentinel died a martyr.\n  *goto exarch_ending4\n  \n*elseif ch6_sentinel_prison = \"true\"\n  They sprung Sentinel from wherever he was being held, on the condition that ${senhe}'d defeat Exarch. $!{senhe} made ${senhis} challenge the moment Exarch touched down on the western coast of Spain. Exarch ripped ${senhim} in two and crushed ${senhis} helmet underfoot. Everything you did, everything you worked for, has been for naught. Sentinel died a martyr.\n  *goto exarch_ending4\n  \n*else\n  By now, Sentinel is little more than a footnote in the story of a new epic villain. That, at least, is some small consolation. Sentinel will be remembered as nothing but an minor fact - regardless of your own investigation into ${senhis} crimes.\n  *goto exarch_ending4\n  \n*label exarch_ending4\n*line_break\n*line_break\n*if ch6_sent_ally = \"true\"\n  And yet, you can't feel too broken up by it. Sentinel did, after all, induct you into the growing movement of powerful individuals who had ${senhis} back. One of those individuals is the Director-General, who suddenly has an opening for another, better empowered hero...\n  \n  Providing you can stop Exarch.\n  *goto ch6_final_choice\n*else\n  And yet, even with all of that in mind, this will just be another day in your job. If you bring down Exarch, someone else will be there to take his place. It never ends. Maybe, inevitably, the likes of Exarch and Sentinel is the end result...\n  \n  You can muse on that later. You'll have that luxury when you stop Exarch.\n  *goto ch6_final_choice\n  \n*label sentinel_ending\nYou find yourself thinking about Sentinel.\n*line_break\n*line_break\n*if ch6_sentinel_prison = \"true\"\n  With Sentinel imprisoned, you've struck a blow to whatever conspiracy is lurking in the heart of the global empowered community. The media frenzy around the case ensures that 'free actors', those costumed cape heroes, are made to submit to increasingly stringent regulation. Where they break instead of bow, SOLAR teams step in to the vacuum to maintain security. Sometimes, though, you're not sure if the world is closer to true peace, or if it is merely just resting under the peace of the gun.\n\n  It's a long time, though, before the whispers of conspiracy reach your ears again. Whatever power they had, it wasn't enough to spring Sentinel. They can't move openly, not yet.\n  *line_break\n  *line_break\n  *goto sentprison2\n\n*elseif ch5_sentinel_dead = \"true\"\n  With Sentinel's death, you were sure that you had struck a solid blow to the conspiracy... but you know a cover-up when you see it and everything, no matter the evidence, was blamed on the actions of a rogue cape. Sentinel, they said, had just succumbed like anyone else would, to the pressures of trying to work in a world where ${senhe} was stymied at every turn, where villains get more powerful year by year, and where resources are always stretched thin...\n\n  There were always excuses, always reasons. The ${man} ${senhim}self became a martyr. Whatever peace you expected to find, it never comes.\n\n  Sentinel's death is a catalyst, although you're not sure for what. There are more SOLAR units but more resistance to the program that executed one of the 'old greats' in downtown Paradigm. Things fall apart.\n  *goto sentdead2\n\n*else\n  *if ch6_sent_ally = \"true\"\n    Sentinel spreads ${senhis} arms wide and laughs. \"You've done well, ${first_name} - I knew I could count on you, ever since we first met. It is time for us to usher in a new era for all mankind.\"\n    \n    At Sentinel's side, and with the Director-General at your back, you watch as the events that began in Paradigm ripple out around the world.\n    \n    They serve as a catalyst. Slowly but surely, the power of SOLAR is stripped away. Sentinel plays the humble hero assaulted by an uncaring bureaucracy out to destroy the last vestiges of costumed heroes. Without SOLAR's watchful eye, and without the velveteen mailed fist of the teams you used to serve with, you see a rise in empowered villains amidst the supposed return of the 'good old days'.\n    \n    In the end, you're not sure what happens to the people you used to know, and you find yourself wondering if you even care.\n    \n    Because when you step out on to the battlefield at Sentinel's side, you're almost taken aback at the adulation you receive. Sentinel's friends are all to happy to lavish rewards on you and give you everything you ever think you wanted.\n    \n    Providing you do exactly as they say.\n    *goto ch6_final_choice\n  \n  *else\n    With no solid case against Sentinel, the world continues on much as it always had, although one host to an increasing sense of apocalypse. Sentinel quickly returned to doing what ${senhe} had always done, fanning the flames between costumed heroes and newer governmental teams. Behind everything Sentinel does, you can see ${senhis} masters, the shadowy tendrils that reach further that you can comprehend.\n    *goto sentaliveandfree2\n\n*label sentdead2\n*line_break\n*line_break\n*if ch6_new_captain = \"true\"\n  You lead your team - truly your team now, now that the promotion has gone through - around the world, from hotspot to hotspot, thwarting villains and rogues wherever they might scheme or strike. Some of the faces you lead are familiar, and some are new, but all of them follow your lead, even as your funding is cut and your supplies dry up.\n  *goto sentdead3\n\n*else\n  Aegis maintains her leadership, despite her best efforts to finally step down, as she leads you around the world, from hotspot to hotspot. You thwart villains and rogues wherever they might scheme or strike. Some of the faces you serve with are familiar, and some are new, but all of them are kept in check by Aegis' wrath, even as your funding is cut and your supplies dry up.\n  *goto sentdead3\n  \n*label sentdead3\n*page_break\n*page_break\n*if ch6_new_captain = \"true\"\n  Behind you, Aegis clears her throat.\n  \n  You turn.\n  \n  \"How's the burden of command treating you?\" she asks, like she's expecting you to chug a cup of nails.\n  \n  You turn.\n  *fake_choice\n    #\"Like a glove.\"\n      Aegis nods. \"Then I made the right choice. Nice to know my crown's not too heavy.\"\n    #\"Honestly? I hate it.\"\n      Aegis laughs. \"So you're normal then. Good.\"\n    #\"How'd you even cope?\"\n      \"Vices, my friend, vices. You'll find some,\" she says.   \n  *goto sentdead4\n    \n*else\n  Behind you, Aegis clears her throat.\n  \n  You turn.\n  \n  \"We're moving out in an hour, ${cape_name},\" she tells you. \"Pack something for the cold - I hope you like snow. Briefing's in ten.\"\n  \n  \"Another day, another job?\" you ask.\n  \n  \"Another day, another job.\"\n  *goto sentdead4\n  \n*label sentdead4\n*set teamcount+2\n*line_break\n*line_break\nShe stands beside you, overlooking the city and the world beyond. \"There's something I've been thinking about, ${first_name}. Back in Paradigm, when Sentinel was killed. We spat in the face of some very powerful people, and we're already feeling their influence. So, what I'm wondering is: how long until they get tired of playing around and kick us in the teeth?\"\n    \nShe leaves you to ponder that thought, alone. All around, you think you can see the shadowplayers and puppetmasters, moving their pieces for an endgame you can't comprehend. Yet.\n*goto ch6_final_choice\n    \n*label sentaliveandfree2\n*line_break\n*line_break\n*if ch6_new_captain = \"true\"\n  You lead your team - truly your team now, now that the promotion has gone through - around the world, from hotspot to hotspot, thwarting villains and rogues wherever they might scheme or strike. Some of the faces you lead are familiar, and some are new, but all of them follow your lead.\n  *goto sentaliveandfree3\n\n*else\n  Aegis maintains her leadership, despite her best efforts to finally step down, as she leads you around the world, from hotspot to hotspot. You thwart villains and rogues wherever they might scheme or strike. Some of the faces you serve with are familiar, and some are new, but all of them are kept in check by Aegis' wrath.\n  *goto sentaliveandfree3\n  \n*label sentaliveandfree3\n*page_break\n*page_break\n*if ch6_new_captain = \"true\"\n  Behind you, Aegis clears her throat.\n  \n  You turn.\n  \n  \"How's the burden of command treating you?\" she asks, like she's expecting you to chug a cup of nails.\n  \n  You turn.\n  *fake_choice\n    #\"Like a glove.\"\n      Aegis nods. \"Then I made the right choice. Nice to know my crown's not too heavy.\"\n    #\"Honestly? I hate it.\"\n      Aegis laughs. \"So you're normal then. Good.\"\n    #\"How'd you even cope?\"\n      \"Vices, my friend, vices. You'll find some,\" she says.\n      \n  *goto sentaliveandfree4\n*else\n  Behind you, Aegis clears her throat.\n  \n  You turn.\n  \n  \"We're moving out in an hour, ${cape_name},\" she tells you. \"Pack something for the cold - I hope you like snow. Briefing's in ten.\"\n  \n  \"Another day, another job?\" you ask.\n  \n  \"Another day, another job.\"\n  *goto sentaliveandfree4\n  \n*label sentaliveandfree4\n*set teamcount+2\n*line_break\n*line_break\n*if ch6_sent_ally = \"true\"\n  She stands beside you, overlooking the city and the world beyond. \"There's something I've been thinking about, ${first_name}. Back in Paradigm, when we put did the best we had and still came up short... those people aren't going to go away. We went after them and didn't make it stick. So, what I'm wondering is: how long before they hit back?\"\n    \n  She leaves you to ponder that thought, alone. [i]Funny,[/i] you think to yourself, reflecting on the deal you made with Sentinel. [i]If only she knew...[/i]\n  \n  *goto ch6_final_choice\n    \n*else\n  She stands beside you, overlooking the city and the world beyond. \"There's something I've been thinking about, ${first_name}. Back in Paradigm, when we put did the best we had and still came up short... those people aren't going to go away. We went after them and didn't make it stick. So, what I'm wondering is: how long before they hit back?\"\n    \n  She leaves you to ponder that thought, alone. All around, you think you can see the shadowplayers and puppetmasters, moving their pieces for an endgame you can't comprehend. Yet.\n  *goto ch6_final_choice\n\n*label sentprison2\n*if ch6_new_captain = \"true\"\n  You lead your team - truly your team now, now that the promotion has gone through - around the world, from hotspot to hotspot, thwarting villains and rogues wherever they might scheme or strike. Some of the faces you lead are familiar, and some are new, but all of them follow your lead.\n  *goto sentprison3\n\n*else\n  Aegis maintains her leadership, despite her best efforts to finally step down, as she leads you around the world, from hotspot to hotspot. You thwart villains and rogues wherever they might scheme or strike. Some of the faces you serve with are familiar, and some are new, but all of them are kept in check by Aegis' wrath.\n  *goto sentprison3\n  \n*label sentprison3\n*if ch6_new_captain = \"true\"\n  Behind you, Aegis clears her throat.\n  \n  You turn.\n  \n  \"How's the burden of command treating you?\" she asks, like she's expecting you to chug a cup of nails.\n  \n  You turn.\n  *fake_choice\n    #\"Like a glove.\"\n      Aegis nods. \"Then I made the right choice. Nice to know my crown's not too heavy.\"\n    #\"Honestly? I hate it.\"\n      Aegis laughs. \"So you're normal then. Good.\"\n    #\"How'd you even cope?\"\n      \"Vices, my friend, vices. You'll find some,\" she says.\n      \n  *goto sentprison4\n*else\n  Behind you, Aegis clears her throat.\n  \n  You turn.\n  \n  \"We're moving out in an hour, ${cape_name},\" she tells you. \"Pack something for the cold - I hope you like snow. Briefing's in ten.\"\n  \n  \"Another day, another job?\" you ask.\n  \n  \"Another day, another job.\"\n  *goto sentprison4\n  \n*label sentprison4\n*set teamcount+2\n*line_break\n*line_break\n*if ch6_sent_ally = \"true\"\n  She stands beside you, overlooking the city and the world beyond. \"There's something I've been thinking about, ${first_name}. Back in Paradigm, when we put Sentinel away, we showed ${senhis} friends that we can hurt them. So, what I'm wondering is: how long until they're knocking on our front door?\"\n    \n  She leaves you to ponder that thought, alone. [i]Funny,[/i] you think to yourself, reflecting on the deal you made with Sentinel. [i]If only she knew...[/i]\n  \n  Sentinel might be imprisoned, but you'll be sure to prosper in ${senhis} stead.\n  *goto ch6_final_choice\n    \n*else\n  She stands beside you, overlooking the city and the world beyond. \"There's something I've been thinking about, ${first_name}. Back in Paradigm, when we put Sentinel away, we showed ${senhis} friends that we can hurt them. So, what I'm wondering is: how long until they're knocking on our front door?\"\n    \n  She leaves you to ponder that thought, alone. All around, you think you can see the shadowplayers and puppetmasters, moving their pieces for an endgame you can't comprehend. Yet.\n  *goto ch6_final_choice\n\n*label ch6_final_choice\n*line_break\n*line_break\nThe future recedes out before you, rich with possibility and opportunity, and here, at the end, you can only...\n\n*fake_choice\n  #...smile.\n  #...sigh.\n  #...frown.\n  #...smirk.\n  #...laugh.\n  \n*goto ch6_the_end\n\n*label ch6_the_end\n*achieve end\n*if ch2_solar_romance = \"none\"\n  *achieve noromance\n  *goto cheevo\n*elseif ch2_solar_romance = \"aljinn\"\n  *achieve jinnromance\n  *goto cheevo\n*elseif ch2_solar_romance = \"courser\"\n  *achieve courseromance\n  *goto cheevo\n*elseif ch2_solar_romance = \"chevalier\"\n  *achieve chevromance\n  *goto cheevo \n*label cheevo\n*if ch1_oconnell_romance = \"none\"\n  *achieve noirish\n  *goto cheevo2\n*else\n  *goto cheevo2\n*label cheevo2\n*if ((((((aegis_relationship >70) and (aljinn_relationship >70)) and (blueshift_relationship >70)) and (chevalier_relationship >70)) and (courser_relationship >70)) and (anima_relationship >70))\n  *achieve solarfriend\n*if classical >50\n  *achieve oldtype\n  *goto cheevo3\n*else\n  *achieve newtype\n  *goto cheevo3\n*label cheevo3  \n[b]THE END[/b]\n*if teamcount = 6\n  *achieve alltogether\n*if brawn >4\n  *achieve flexual\n*if brains >4\n  *achieve brains\n*if bravado >4\n  *achieve johnnybravado\n*if power >4\n  *achieve shocktherapy\n*if power >7\n  *achieve power\n*goto_scene ending", "capetown": "*temp sentinel_hp 20\n\nHere, at the end, you can only wonder-\n\n*page_break\n\nWhat made you even [i]want[/i] to become a hero in the first place?\n\n*fake_choice\n  #Ambition\n    *set classical %-5\n  #Compassion\n    *set classical %+5\n  #Empathy\n    *set classical %-5\n  #Fate\n  #Integrity\n    *set classical %+5\n  #Justice\n    *set classical %+10\n  #Love\n  #Loyalty\n  #Power\n    *set classical %-10\n\nMaybe, but you're not sure it matters anymore.\n\nThey're all good reasons, of course, and all ones that come to you tonight, on the first night that you can truly consider yourself an empowered cape, a hero.\n\nThey're all good reasons. Fitting for [i]someone[/i], at least.\n\nThe bitterness of that thought sticks to your brain like static charge.\n\nFunny. That's fitting, too.\n\n*page_break\n\n[b]Chapter I[/b]\n*line_break\n[b]CAPETOWN DREAMING[/b]\n\n[i]'Life can only be understood backwards; but it must be lived forwards.'[/i]\n*line_break\n-Soren Kierkegaard\n\n*page_break\n\nYou dream.\n\nImages twist around you, the first twenty-one years of your life rendered in abstract clarity. You glimpse your home, ensconced behind walls, and a pair of twins whose voices are thick with Ireland. You feel electricity dancing around your fingertips. A hundred faces, some you remember vividly and others in little more than a sketch - flashes of color and ad-hoc imagery. And yet more memories, all swirling around you like a kaleidescope of hopes and regrets...\n\nThey all coalesce into...\n\n*page_break You.\n*set age 6\n\nYou're six years old.\n\nFor as long as you can remember, you've lived in the walled city the locals refer to as Capetown. Of course, that's not the proper name - that's The United Nations Academy for Empowered Development and Education - but Capetown seemed to stick.\n\nYou're six years old and it's playtime. Or 'self-directed learning time', as your caretakers and teachers have put it.\n\nYou are...\n\n*choice\n  #A boy.\n    A boy. Many of the most renowned heroes have been men, just like you. Sentinel, Australis, Crusader, Ursa Major, Stonehammer... For as long as you've been able to remember, you've wanted to be standing alongside them.\n    *set gender \"male\"\n    *set phe \"he\"\n    *set phim \"him\"\n    *set phis \"his\"\n    *set man \"man\"\n    *set men \"men\"\n    *set sir \"sir\"\n    *set title \"Mr.\"\n    *set sentinel_gender \"male\"\n    *set senhe \"he\"\n    *set senhim \"him\"\n    *set senhis \"his\"\n    *set senman \"man\"\n    *set senboy \"boy\"\n    *set sensir \"sir\"\n    *set sentitle \"Mr.\"\n    *goto name\n\n  #A girl.\n    A girl. Many of the most renowned heroes have been women, just like you. Sentinel, Valkyrie, The Exalted, Harbinger, Lady Dynamic... For as long as you've been able to remember, you've wanted to be standing alongside them.\n    *set gender \"Female\"\n    *set phe \"she\"\n    *set phim \"her\"\n    *set phis \"her\"\n    *set man \"woman\"\n    *set men \"women\"\n    *set sir \"ma'am\"\n    *set title \"Ms.\"\n    *set guy \"girl\"\n    *set sentinel_gender \"female\"\n    *set senhe \"she\"\n    *set senhim \"her\"\n    *set senhis \"her\"\n    *set senman \"woman\"\n    *set senboy \"girl\"\n    *set sensir \"ma'am\"\n    *set sentitle \"Mrs.\"\n    *goto name\n  #Not so easily defined.\n    Gender is a funny thing. While many of the most renowned heroes have been nominally men or women, there are some that have served as powerful examples for those outside the boundary. Celestion, Moose, Veritas-Above-All, Obsidian Eagle. For as long as you've been able to remember, you've wanted to be standing alongside them.\n    *choice\n      #I present as masculine.\n        *set guy \"one\"\n        *set sentinel_gender \"male\"\n        *set senhe \"he\"\n        *set senhim \"him\"\n        *set senhis \"his\"\n        *set senman \"man\"\n        *set senboy \"boy\"\n        *set sensir \"sir\"\n        *set sentitle \"Mr.\"\n        *set title \"Mx.\"\n        *choice\n          #My pronouns are ze, hir, hirself.\n            *set gender \"Non-Binary\"\n            *set phe \"ze\"\n            *set phim \"hir\"\n            *set phis \"hir\"\n            *goto name\n          #My pronouns are xe, xem, xemself.\n            *set gender \"Non-Binary\"\n            *set phe \"xe\"\n            *set phim \"xem\"\n            *set phis \"xyr\"\n            *goto name\n          #My pronouns are ey, em, emself.\n            *set gender \"Non-Binary\"\n            *set phe \"ey\"\n            *set phim \"em\"\n            *set phis \"eir\"\n            *goto name\n          #My pronouns are they, them, theirself.\n            *set gender \"Non-Binary\"\n            *set phe \"they\"\n            *set phim \"them\"\n            *set phis \"their\"\n            *goto name\n      #I present as feminine.\n        *set guy \"one\"\n        *set sentinel_gender \"female\"\n        *set senhe \"she\"\n        *set senhim \"her\"\n        *set senhis \"her\"\n        *set senman \"woman\"\n        *set senboy \"girl\"\n        *set sensir \"ma'am\"\n        *set sentitle \"Mrs.\"\n        *set title \"Mx.\"\n        *choice\n          #My pronouns are ze, hir, hirself.\n            *set gender \"Non-Binary\"\n            *set phe \"ze\"\n            *set phim \"hir\"\n            *set phis \"hir\"\n            *goto name\n          #My pronouns are xe, xem, xemself.\n            *set gender \"Non-Binary\"\n            *set phe \"xe\"\n            *set phim \"xem\"\n            *set phis \"xyr\"\n            *goto name\n          #My pronouns are ey, em, emself.\n            *set gender \"Non-Binary\"\n            *set phe \"ey\"\n            *set phim \"em\"\n            *set phis \"eir\"\n            *goto name\n          #My pronouns are they, them, theirself.\n            *set gender \"Non-Binary\"\n            *set phe \"they\"\n            *set phim \"them\"\n            *set phis \"their\"\n            *goto name\n\n*label name\nEven here, in the dream, you know that your name is...\n\n*if (gender=\"Female\")\n  *goto female_name\n\n*elseif (gender=\"male\")\n  *goto male_name\n  \n*else\n  *goto nb_name\n  \n*label nb_name\n\n*choice\n  #Alex\n    *set first_name \"Alex\"\n    *goto surname\n  #Andy\n    *set first_name \"Andy\"\n    *goto surname\n  #Bailey\n    *set first_name \"Bailey\"\n    *goto surname\n  #Jules\n    *set first_name \"Jules\"\n    *goto surname\n  #Max\n    *set first_name \"Max\"\n    *goto surname\n  #Sam\n    *set first_name \"Sam\"\n    *goto surname\n  #No, none of these are right...\n    *input_text first_name\n    ${first_name}, is that correct?\n    *choice\n      #Yes.\n        *goto surname\n      #No.\n        *goto nb_name\n\n*label male_name\n\n*choice\n  #Jack\n    *set first_name \"Jack\"\n    *goto surname\n  #Ibrahim\n    *set first_name \"Ibrahim\"\n    *goto surname\n  #Jun\n    *set first_name \"Jun\"\n    *goto surname\n  #Gabriel\n    *set first_name \"Gabriel\"\n    *goto surname\n  #Omar\n    *set first_name \"Omar\"\n    *goto surname\n  #Ren\n    *set first_name \"Ren\"\n    *goto surname\n  #No, none of these are right...\n    *input_text first_name\n    ${first_name}, is that correct?\n    *choice\n      #Yes.\n        *goto surname\n      #No.\n        *goto male_name\n\n*label female_name  \n\n*choice\n  #Sarah\n    *set first_name \"Sarah\"\n    *goto surname\n  #Jie\n    *set first_name \"Jie\"\n    *goto surname\n  #Valentina\n    *set first_name \"Valentina\"\n    *goto surname\n  #Fatima\n    *set first_name \"Fatima\"\n    *goto surname\n  #Nora\n    *set first_name \"Nora\"\n    *goto surname\n  #Kate\n    *set first_name \"Kate\"\n    *goto surname\n  #No, none of these are right...\n    *input_text first_name\n    ${first_name}, is that correct?\n    *choice\n      #Yes.\n        *goto surname\n      #No.\n        *goto female_name\n\n*label surname\n\nOne of the few memories you have of your parents is the name they left you. For a moment, it's hard to remember...\n\n*choice\n  #Smith\n    *set last_name \"Smith\"\n    *goto parents\n  #Buhari\n    *set last_name \"Buhari\"\n    *goto parents\n  #Brown\n    *set last_name \"Brown\"\n    *goto parents\n  #Hoshino\n    *set last_name \"Hoshino\"\n    *goto parents\n  #Jameson\n    *set last_name \"Jameson\"\n    *goto parents\n  #Ngata\n    *set last_name \"Ngata\"\n    *goto parents\n  #No, none of these are right...\n    *input_text last_name\n    ${last_name}, is that correct?\n    *choice\n      #Yes.\n        *goto parents\n      #No.\n        *goto surname\n\n*label parents\n\nYou've lived in Capetown your entire life and your parents are little more than a pieced together recollection, like reassembled glass. There are many kids here who know their parents in a similar fashion. Some are lucky enough to have them come visit. But not you. All you've got are memories, vague imprints from a life you're not sure you ever lived.\n\nEventually, you came to understand that...\n\n*fake_choice\n  #Your parents were unprepared to raise a child like you.\n    *set parent_status \"alive_scared\"\n    Your parents were scared of you. Without powers of their own, they had no idea of what was expected of them. They wanted a normal child - a child whose difficulties would revolve around learning to [i]walk[/i] before they could [i]run[/i], not learning to [i]float[/i] before they could [i]soar[/i].\n\n    They gave you a name before they submitted you to the Academy. At least you have that link to them.\n\n    Although, sometimes you're not sure if you [i]want[/i] that link.\n\n    One day, maybe, you'll devote some time to finding them... and prove to them that you're nothing to be afraid of.\n    *line_break\n    *line_break\n  #Your parents felt that Capetown was the best place for you.\n    *set parent_status \"alive_distant\"\n    It wasn't that your parents wanted to get rid of you, it was more that they wanted what was best for you. A difference of degrees, absolutely, but a difference all the same. Without powers of their own, they had no idea how to handle the idea of a child who could possibly project energy, hurl things with their mind, speak to animals or any of the more esoteric abilities that formed dozens of glossy magazine horror stories.\n\n    The Academy, they figured, was the best place for you to learn about yourself.\n\n    And it's not like they didn't care. You'd receive a birthday card every year - but you don't remember them ever showing up in person...\n    *line_break\n    *line_break\n  #Your parents were dead.\n    *set parent_status \"dead\"\n    Your parents had been killed just after you were born, the victims of a supertech terrorist by the name of Collider. You can only barely remember their faces, their voices, their names... Nothing of them was left, Collider's singularity bombs annihilated them and three-hundred others.\n\n    You're the only thing they left on this world.\n\nThe thoughts of your parents are brushed aside by the sounds of your classmates calling for you.\n\n\"${first_name}!\" That's Isaac, one of the bigger boys in your year level. You've always thought he looks like a bit of a bulldog, jowls and all. \"Come play kickball with us! Come on, we need another player!\"\n\nKickball's fun but there's a lot of other things you could be doing before you have to go back to class. Over by the playground, you can see a group of kids forming, all of them arguing about something. They're probably going to play a round of 'Capes and Robbers' and everyone wants to be the hero.\n\nOn second thought, maybe you'll just go inside and read a book. Isaac can be a bit rough and you're kind of tired of being one of the robbers - they always lose.\n\n*choice\n  #Kickball. But you won't let Isaac beat you again, not today.\n    Even though Isaac is big and rough, you're gradually able to hold your own. By the end of the year, you were able to run faster and hit harder than anyone else in your year, even Isaac. (+1 Brawn)\n    *set brawn+1\n    *goto classes\n\n  #Capes and Robbers. And maybe this time, you'll get to be the cape!\n    Your teachers are pretty insistent about the types of games you can play during self-directed learning time. Luckily, Capes and Robbers is one of the ones they sanction. That is, providing there's no violence and no actual use of powers.\n\n    Most of the fun comes from dreaming up your new identity, as either a hero or a villain - even if the villains have to lose. You spend a lot of time devising these identities and then bitterly arguing why Juliet's laser blasts simply can't penetrate your electric forcefields! (+1 Bravado)\n    *set bravado+1\n    *goto classes\n\n  #Actually, a book sounds like a good idea.\n    You've always been good at reading, probably because you do it to the exclusion of more active or team-orientated activities. But that's okay, because while everyone else is playing outside, Mrs Williams brings you some cookies. Score. (+1 Brains)\n    *set brains+1\n    *goto classes\n\n*label classes\n*page_break\n\nYou spent a lot of time in Capetown's classrooms within the junior academy. Here, you were run through a typical primary school education - languages, history, mathematics, the sciences... and lessons about the responsibility you have to the world to use your powers for the benefit of everyone. That, you remember, was the first lesson drilled into you: the ideal of responsibility exists beyond yourself and must extend to everyone you might meet.\n\nEven at such a young age...\n\n*choice\n  #You never understood why it was so important.\n    Precisely - people don't tell natural athletes to slow themselves down, do they? What do you do when being responsible only makes things worse? Perhaps idealism only functions in a vacuum.\n\n    In any case, you frustrate many of your tutors to no small end.\n    *set classical %-10\n    *goto ABG_lesson\n\n  #You understood the need for responsibility.\n    You could hurt someone - and only villains would use their power to hurt someone. Even if it's hard, it's important to set an example. When you have a large enough hammer, everything might start looking like a nail. \n    *set classical %+10\n    *goto ABG_lesson\n    \n*label ABG_lesson\n*page_break\n\nThere were other lessons, too, of course.\n\nYou learned about the first empowered inviduals and their history. Metahumans, parahumans, capes, empowered individuals, all terms for humans who developed superhuman capabilities. No one was sure where they came from initially but, soon enough, in the wake of world-changing events, the question of where they came from was replaced by the more pressing question of what to do about them.\n\nIPSA (and the Academy, and you) were one of the answers to that question.\n\nABCs were supplemented by ABGs. Alpha-class, those whose powers truly embraced the term 'superhuman', the 'last, great capes'. Beta, a step down - powerful, yet the world would not shake beneath them. Gamma, those whose powers could be useful, but not to the extent that someone would call them a 'true' cape. The three main grades of empowered individual. Your instructors were adamant that all of these people, even the Gamma-class individuals, all had their own role to play and that every role was just as vital to protecting the public.\n\nFrom it, you remember thinking...\n\n*fake_choice\n  #...that, one day, you'll share the power of the Alpha-class.\n    A lofty goal - but, unfortunately, impossible. It's almost entirely unheard of for a cape to transcend their rating. Something to do with genetics or neurology. Even in the Academy, the exact specifics of powers were something people were struggling to pin down.\n    \n    You remember a fragment from a paper on power theory, where the author insisted that there were capes with powers that made Alphas look like children. \"Powers we haven't even seen yet,\" the article fervently insisted.\n    \n    Purely theoretical, of course.\n  #...that this system could be imperfect.\n    The system was designed by people, which meant there had to be an underlying reason for it. Education, regulation, security, assessment - that's what everyone always said.\n    \n    Purely for the sake of argument, of course.\n  #...that the Gamma-class capes would never be true heroes.\n    You wonder what it would be like, to forever be relegated to being second-class heroes. As you got older, you found that there were other ratings with even less degree of powers. Delta and Epsilon, the latter not having any outward expression of their genetic markers at all. And yet, these people are treated the same as you. It's unfair - but for you, or for them?\n\nLater, of course, you found out that all of this was true.\n\nAnd all of it was false.\n\n*label meetsentinel\n\n*page_break Time passes\n*set age 8\n*set ch1_met_sentinel true\n\nYou're eight years old and it's self-directed learning time again. Across the junior courtyard, you spy a tall figure you recognise from newspapers and broadcasts, made obvious by ${senhis} distinctive gold and silver armored bodysuit and the gladiator helmet that obscures the top half of ${senhis} head (you recall the word 'hoplite' from one of Mr. Matsuda's history lessons). That's Sentinel, one of the world's best heroes! One of the few who actually looks good in a cape!\n\nAll the other kids are giving ${senhim} a wide berth and more than a few nervous glances. $!{senhe} could be here to punish someone, especially with that frown that can be seen beneath ${senhis} mask.\n\nYou gather up your courage and step over to ${senhim}, even if your friends whisper that you're not supposed to talk to visitors without a teacher saying it's okay. But surely they weren't talking about heroic visitors, right?\n\nSentinel watches you approach. That frown becomes a radiant smile, as if it had never existed.\n\n\"Ah! You must be one of the cadets here,\" ${senhe} says.\n\nYou nod.\n\n\"And what is it that you do?\"\n\nIt takes you a moment to realise ${senhe}'s asking to see you use your power. After a moment's hesitation - the teachers always frown on it outside of approved classes - you snap your fingers. There's a brief flash.\n\nSentinel watches with interest. \"And how old are you?\"\n\n\"Eight.\"\n\n\"Eight!\" ${senhe} beams like that's an incredibly profound statement. \"With a power like that, you'll be as strong as me in no time at all! Is that what you're looking forward to - being a hero?\"\n\nYou nod.\n\n\"But why?\"\n\nThat's an odd question. It's not one you've been asked before - it's just been something you've always wanted.\n\nWhat did you tell Sentinel?\n\n*fake_choice\n  #I want to protect everyone!\n    *set classical %+10\n    *set sentreason \"1\"\n    Sentinel's lips press together in a thin line. \"Does everyone deserve protection - is that something they've taught you here? What if you can't protect everyone, who deserves it if you have to choose?\"\n\n    But you can protect everyone, can't you? That's what heroes do. That's what you want to tell Sentinel.\n    *line_break\n  #I want to stop the bad guys!\n    *set classical %+5\n    *set sentreason \"2\"\n    Sentinel asks, \"But how do you always know who they are? And if someone tells you, how can you trust their word?\"\n\n    The questions make you pause. Don't they always wear dark costumes and have names like Colonel Catastrophe?\n    *line_break\n  #I want to tell people what to do!\n    *set sentreason \"3\"\n    Sentinel's face is hard to read under ${phis} mask. \"Really? And do your wardens hear you say that?\"\n    *line_break\n  #I want to be just like you!\n    *set sentreason \"4\"\n   Sentinel grunts, sounding somewhat amused. \"They say education makes the ${senman}. I wasn't educated in a place like this.\"\n   *line_break\n  #I... I don't know yet...\n    *set sentreason \"5\"\n   Sentinel shrugs. \"Somehow, I'm sure you'll leave here with a certain idea of your place in life.\"\n   *line_break\n*line_break\nBefore you can say anything further, one of the teachers - old Mr. Borlace - is calling Sentinel over. The gold-and-silver icon gives you a smile and a 'good luck' and a 'be sure to study hard' and marches over to meet with him, ${senhis} smile fading back into that strange frown, leaving you alone in the courtyard.\n\nBut only for a few seconds, because you're soon swamped by the bodies and questions of your classmates.\n\nStrangely, as you grow older and leave the junior dorms behind, the image of Sentinel's disapproving frown remains etched in your memory, as vivid as the day you met ${senhim}. You were never sure if ${senhe} disapproved of your answer, or of something else.\n\n*page_break Time passes\n*set age 12\n\nYou're twelve, and Mr Matsuda is taking you through a lesson on his favorite subject - hero theory (that is, when he's not teaching history).\n\n\"All good heroes,\" he's saying, walking the front of the classroom like a stage, \"Have three attributes - their brawn, their bravado, and their brains.\" He stops his pacing, taps a finger to his temple to punctuate his last point.\n\n\"All are necessary, all are important, but the trick is knowing when one approach will serve and when another will not. Some villains you'll be able to outsmart, some you'll be able to talk down, and some you'll need to be prepared to fight. All heroes have their own speciality, the strength of mind, body or personality that makes them a legend! But your speciality can't be everything - if you over-specialise, you may not be able to adapt. You would risk finding yourself outmatched - or useless!\"\n\nOn the holographic display behind him, Matsuda brings up a selection of images. You recognise every cape there and can name almost all of them, placing a name to each colorful costume. Bulldog Rodeo, Valkyrie, The Firmament, Demigod.\n\nSentinel.\n\nYou focused on the heroes who...\n\n*fake_choice\n  #...were known for their ability to subdue any villain.\n    *set brawn+1\n    When push comes to shove, you needed to follow the lead of those who could guarantee their victory. There would always be villains who wouldn't want to talk and might even be smarter than you. In that situation, the application of strength is the only thing that'd allow you to protect people (+1 Brawn).\n  #...were known for their confidence and charismatic je ne sais quoi.\n    *set bravado+1\n    Je ne sais quoi, that's what Matsuda said. True heroes do more than fight villains - they inspire respect. The most important thing is to be a symbol for peace, friendship and mutual understanding. With that ability, one can end fights before they even begin (+1 Bravado).\n  #...were known for their mental stratagems.\n    *set brains+1\n    Knowledge is power, that's a saying Matsuda always liked. It's one you pick up on and hold to. The more you think, the more tools you have to use against an adversary. There's no such thing as an invincible cape and all of them have a weakness - with a sharp mind, those weaknesses will be your strengths (+1 Brains).\n    \n\"You're the next generation,\" Matsuda says, smiling proudly. \"One day, you'll all be protecting the world, and I'll be proud to say I taught you well.\"\n\n*page_break Time passes\n*set age 16\n\nYou're sixteen now, having moved into the senior academy three years ago. \n\nIt's strange how much smaller the junior academy seems from your new room. When you were young, the area between the junior and senior areas seemed an insurmountable gulf and the seniors seemed like distant unknowable giants who kept bizarre courts filled with unfathomable rituals. Now, it's just a different kind of boring.\n\nWhat's even stranger, sometimes, is that at some point, everyone stopped calling you 'kid' and started calling you 'a pleasant young ${man}’ and, around that same time, you started finding many of your classmates far more interesting than you used to. \n\nWhen you look back on your adolescence, what was your fondest memory?\n\n*choice\n  #Entering the senior boxing tournament - and winning.\n    No powers and nothing below the belt, that was the saying. You remember the sweat stinging your eyes and the sound of the gloves - you also remember the blood bubbling in your nose from a bad hit or two. It was a hard match, but you prevailed in the end. The bruises and aches that clung to you for a week or so were just a reminder of your victory (+1 Brawn).\n    *set brawn+1\n    *set ch1_boxing_champ true\n    *goto meet_and_greet\n  #Attending secret parties.\n    You were never sure if the parties were as secret as some of your friends liked to claim, given that they tended to take place in each other's dorm rooms. You suspect that, like any good parent, the supervisors of Capetown knew when to enforce the rules and when to look the other way (+1 Bravado).\n    *set bravado+1\n    *set ch1_party_animal true\n    *goto meet_and_greet\n  #Being recognised with the Burton Award for Academic Excellence.\n    You never neglected your studies and your teachers noticed. Your knowledge of empowered heroes, villains and their history was recognised as one of the best - even if it was 'only' from the senior academy. Still, everyone said, you'll go far if you maintain that level of dedication (+1 Brains).\n    *set brains+1\n    *set ch1_senior_academic true\n    *goto meet_and_greet\n\n*label meet_and_greet\n*page_break\n*set ch1_met_oc true\n\nIt seemed like more young people like you would arrive every month. It was almost a Capetown constant. They weren't all young children though, not like you had been when you arrived. There were always those people who suddenly came into their powers during their adolescence, something triggered in their neural structure by rampant physiological changes. At least, that's the prevailing theory.\n\nIt was important for the 'new kids' to feel as much of a part of Capetown as you had been. So, you're sitting at one of the welcome assemblies for the new kids, the late bloomers, the ones who came into their powers during their adolescence, the ones who had possessed a normal life and now would never be as powerful as you due to whatever quirk gave people these powers in the first place. The 'laters'.\n\nNot that they knew it yet.\n\nYour eyes wander over the crowd - some seem hopeful, some seem eager, but most seem anxious. Around you, your classmates murmur to themselves about the new kids which probably does nothing more than feed the anxiety you can see up on the stage (a feedback loop, Ms. Zadeh called it).\n\nBut you? Your eyes have settled on a pair of redheads - the O'Connell twins, Dawn and Alan. Over the years, you'd encounter them both at various times and, over the years, you grew particularly close to one of them.\n\n*choice\n  #Dawn.\n    You had eyes for Dawn. \n\n    You were never quite sure why you noticed her - maybe it was her fiery hair that, as you found out, came to match her fiery personality. Loud and outspoken, it always seemed like she straddled the line between reckless and playful - frustrating the Academy tutors and supervisors to no end. Somehow, that playful personality made the casual jabs and jibes of your fellow students seem petty and pointless, not nearly as cutting as they once had been.\n\n    Of course, Dawn's ability to meld with and move through any substance she could touch and emerge at any point she wished helped. After all, few people would be brave enough to mock someone who could be anywhere at any time.\n    *set ch1_oconnell_romance \"Dawn\"\n    *set oconnell_relationship 65\n    *set ocname \"Dawn\"\n    *set oche \"she\"\n    *set ochim \"her\"\n    *set ochis \"her\"\n    *set ocman \"woman\"\n    *set otherocname \"Alan\"\n    *set otheroche \"he\"\n    *set otherochim \"him\"\n    *set otherochis \"his\"\n    *set otherocman \"man\"\n    *set otherocsib \"Alan\"\n    *goto camping_trip\n  #Alan.\n    You had eyes for Alan. \n\n    You're not sure why you noticed him - maybe it was the fact that he was simply one of the tallest boys with the broadest shoulders. Before he'd come to the Academy, he was a star football player at his old school - a talent he brought to the Academy's playing fields with remarkable aplomb. Somehow, the warmth of his smile made the casual jabs and jibes of your fellow students seem petty and pointless, not nearly as cutting as they once had been. \n\n    That, and Alan's ability to take on the features of the last substance he had touched. Few of your cohort were brave enough to mock 'the living rock man'.\n    *set ch1_oconnell_romance \"Alan\"\n    *set oconnell_relationship 65\n    *set ocname \"Alan\"\n    *set oche \"he\"\n    *set ochim \"him\"\n    *set ochis \"his\"\n    *set ocman \"man\"\n    *set otherocname \"Dawn\"\n    *set otheroche \"she\"\n    *set otherochim \"her\"\n    *set otherochis \"her\"\n    *set otherocman \"woman\"\n    *set otherocsib \"Dawn\"\n    *goto camping_trip\n    \n  #Neither, actually. I had exams to study for.\n    *set brains+1\n    *set ch1_oconnell_romance \"none\"\n    *set ocname \"Dawn\"\n    *set oche \"she\"\n    *set ochim \"her\"\n    *set ochis \"her\"\n    *set ocman \"woman\"\n    *set otherocname \"Alan\"\n    *set otheroche \"he\"\n    *set otherochim \"him\"\n    *set otherochis \"his\"\n    *set otherocman \"man\"\n    *set otherocsib \"Alan\"\n    Or maybe you only wished that.    \n\n    You watch them both for a while but realise you don't feel much interest at all - they're just people. Even as the years pass, you manage to never find time for them. Eventually, they fade from your recognition and become nothing more than another pair of faces that you pass in the halls or spy from across the senior courtyard.\n\n    But that's okay.\n\n    After all, you've got tests and exams to study for (+1 Brains).\n    *goto camping_trip\n\n*label camping_trip\n*page_break Time passes\n*set age 18\n\nYou're eighteen now, in your final year before your graduation from the Senior Academy. \n\nYou're staring out the window of the senior dormitories, lost in your thoughts. In the senior courtyard below, you can spy around a dozen of your fellow students, all wearing backpacks and looking ready to head on an adventure. It's a camping weekend to celebrate the final halcyon year of your cohort before it is broken up - not everyone wants to go on to Cadet training, and less still will actually make it, but you do and you will. \n\nAmidst the group, the shockingly red hair of the O'Connell twins is immediately apparent.\n\n${ocname} catches your gaze and waves to you, smiling.\n\nAnd you're...\n\n*choice\n\n  #Obviously going - jeez, where'd I put my bag?!\n    *set ch1_camping_trip \"true\"\n\n    And obviously running late, at that! You wave back and frantically mouth to ${ocname} that you'll only be a minute!\n    *goto fred_encounter\n\n  #Obviously not going - that trip could be spent getting ready for the final exam.\n    It could be, that's true. But this is the last time you may be able to spend time with them, and you've never been hiking before.\n    \n    The handwritten invitation feels heavy on your desk, drawing all attention towards it.\n    *choice\n      #On second thought, go.\n        You rush out of the room, hoping you're not too late.\n        \n        ${ocname} greets you at the stairs, all smiles. \"What took you so long?\"\n        *goto fred_encounter\n      #No - the exams come first.\n        *set ch1_oconnell_romance \"none\"\n        *set ocname \"Dawn\"\n        *set oche \"she\"\n        *set ochim \"her\"\n        *set ochis \"her\"\n        *set ocman \"woman\"\n        *set otherocname \"Alan\"\n        *set otheroche \"he\"\n        *set otherochim \"him\"\n        *set otherochis \"his\"\n        *set otherocman \"man\"\n        *set otherocsib \"Alan\"\n        You wonder if you should wave back. The moment passes. The next time you look out the window, they're all gone.\n  \n        But that's okay, because this allows you all the time in the world to...    \n        *choice\n          #Master your powers without interruption.\n            *set power+1\n            You spend the weekend in one of the training rooms, focusing your powers - better coming to understand how to hold an electrical charge, to focus it, to direct it where you want it to go. Without interruption, it's so much easier to focus (+1 Power).\n            \n            It's strange how much [i]easier[/i] it feels when you're able to focus on nothing but the lightning between your fingers. It's not something you've realised before - most Academy classes are busy things where most people want to socialise more than they want to learn. The motions are easier as you run through them, thrusting your palm, snapping your fingers, all in the service of compelling electricity to act as you wish. Like dancing or singing.\n            \n            You wonder what it means, or if other members of your classes have had the same realisation.\n            \n            Still, when they all return on the Sunday night, laughing at in-jokes and reminiscing about shared experiences, you do wonder if you missed out on something. But only for a moment.\n            *goto senior_exam\n          #Practice your fitness regimen.      \n            *set brawn+1\n            You spend the weekend in the gym, running through fitness drills, stretching regimens and practice bouts. Your body aches at the end of it, but it's a good ache (+1 Brawn).\n          \n            Still, when they all return on the Sunday night, laughing at in-jokes and reminiscing about shared experiences, you do wonder if you missed out on something. But only for a moment. \n            *goto senior_exam\n          #Study for the end-of-year exams.\n            *set brains+1\n            You spend the weekend cramming for the upcoming exams, learning every bit of empowered theory that you can get your hands on. By the end of the weekend, you know that you'll pass (+1 Brains).\n          \n            Still, when they all return on the Sunday night, laughing at in-jokes and reminiscing about shared experiences, you do wonder if you missed out on something. But only for a moment.\n            *goto senior_exam\n\n*label fred_encounter\n\n*page_break\n\nIt's your first time outside the walls of Capetown.\n\nThere's so much to see and hear. It occurs to you that there's a difference between knowing things, like the geography of the Shawangunks in a textbook, and actually walking the paths, seeing the birds jump between branches...\n\n\"That's an Eastern Bowerbird,\" ${ocname} says, from beside you. The others - ${otherocsib} and the rest of the group - are scattered around the trail, talking, laughing.\n\n*if (brains = 3)\n  You look at it again. \"There's no such thing as an Eastern Bowerbird,\" you tell ${ocname}.\n  \n  $!{oche} smiles and shrugs. \"You got me. Still, don't you think they've got a good deal? Out here, they can do whatever they want.\" $!{oche}'s silent for a moment. \"Out here, we can do whatever we want.\"\n  *goto octrailtalk\n*else\n  You look at it again. You're not sure that's an actual type of bird, but you're also not enough of an ornithologist to be sure that it isn't either.\n  \n  \"You can trust me,\" ${oche} adds with a grin, \"I know a thing or two about birds. Out here, they can do whatever they want.\" $!{oche}'s silent for a moment. \"Out here, we can do whatever we want.\"\n  *goto octrailtalk\n  \n*label octrailtalk\n\n\"You still miss home, huh? Ireland?\"\n\n${ocname} gives you a look. \"I was only born there. It's not home.\" The O'Connell accent is quite the reminder, though.\n\n\"What's so bad with Capetown?\"\n\n$!{oche} says, like you're having trouble understanding ${ochim}, \"The walls, maybe? The regulations? The constant reminders of how important we are? It's like some kind of creepy boarding school sometimes, only the teachers are all ex-cops. That's what's bad about it! How do you even put up with it?\"\n\n*fake_choice\n  #Because we need to obey the regulations of IPSA.\n    \"Who even came up with all these rules, the UN? Why do we have to follow them?\"\n  #Because I might hurt someone.\n    \"So, you don't trust yourself?\"\n  #Because, while I won't hurt someone, someone else might.\n    \"So, you'll live your life defined by what other people might do?\"\n*line_break\n*line_break\n\"Come on now, that's unfair,\" you retort.\n\n\"You're right,\" ${ocname} says, \"It [i]is[/i] unfair. This whole thing is unfair.\"\n    \n${ocname} sighs. \"I just sometimes forget that you've lived with this thing your whole life. I grew up seeing capes on the television, y'know, and never once thought there'd be so many [i]rules[/i].\"\n\n*if (ch1_oconnell_romance =\"Alan\")\n  ${ocname} reaches up for a branch and pulls it from a tree. He's already becoming hard, his skin turning brown and gnarled, obviously agitated. \"Forget I said anything, okay?\"\n  *goto prefightfred\n\n*else\n  Dawn scoops up a rock and twirls it through her fingers, the stone disconcertingly melding with her flesh as it passes through. \"Forget I said anything, okay?\"\n  *goto prefightfred\n  \n*label prefightfred\n\n*page_break\n*set ch1_oc_mystery \"true\"\n\n\"Can I ask you something?\" ${ocname} says, about thirty minutes later. $!{oche} is looking far more relaxed, although still not like ${ochis} usual self.\n\n\"It's not about what we were talking about before, right?\"\n\n\"No, no. This is going to sound crazy but... do you remember when you got your powers? Like, what happened?\"\n\n\"No,\" you reply. \"I got them early, remember? I've just always been able to give people a shock,\" you add, shooting them a smile.\n\n\"You're very funny,\" ${ocname} replies, giving you a playful shove. \"But I'm being serious. You don't remember the sound of it, the... singing? It was like, when we stood at the base of this trail, just looking up at this huge mountain. Like that. That sense of something huge beyond description, singing behind your eyes.\"\n\n*fake_choice\n  #\"No, I really don't.\"\n    \"That's a bit weird, don't you think?\" ${ocname} replies.\n    \n    \"No weirder than being a great conductor?\"\n  #\"Are you okay?\"\n    \"Yeah, I'm fine,\" ${ocname} replies, \"I'm just thinking about things.\"\n    \n    \"Be careful, that's uncharted territory for you,\" you reply.\n*line_break\n*line_break\n$!{oche} smirks. \"Oh, shut up, I'm being serious. I do remember something. It's hard to describe, I don't think I can do it with words. Imagine trying to describe a circle to a blind person - it's like that.\" ${ocname} sighs, shrugs.\n\n\"What about ${otherocsib}?\"\n\n\"Yeah,\" ${ocname} says, \"$!{otheroche} knows about it. Kinda strange, though, that you don't.\"\n\n\"Must be a laters-only thing,\" ${oche} says, after a moment.\n\n*page_break\n\nCloser to the campsite, the mood has lightened - all talk of regulations and mysteries forgotten as ${ocname} makes use of ${ochis} powers, putting on a small show that makes the final part of the trek seem not so impossible.\n\n\"What've we got here, some little capelets who've wondered off their reservation?\"\n\nThe voice sounds like it came from someone in your group but no one would ever say something like that. Walking down the trail, you spy a group of young men around your age, evidently out on their own hike, and spread out across the trail so you can't easily walk past.\n\n${ocname} stops what ${oche} was doing with ${ochis} power, the rocks dropping to the ground, but doesn't take a step back, either.\n\n\"Hey,\" says Alan, \"We're all just out for a hike, same as you.\"\n\n\"Oh, sod off, Mackie,\" the leader says, mocking Alan's accent. He picks one a bit too far north, mistaking Ireland for Scotland, but maybe that was deliberate - Alan frowns, squaring himself up.\n\n\"Nice one, Frederic,\" one of the boys adds from behind their leader.\n\n\"Do you want me to kick your ass?\" Dawn snaps, stepping up beside her brother. \n\n\"I'd rather you do something else to my ass, sweetheart!\"\n\nThat phrase shifts the tension into something worse, something dangerous.\n*page_break\nIt boils over in Alan first.\n\nAlan hurls out a curse, reaching into his pocket for a shard of metal. \"Please,\" he says, with maudlin politeness, \"Say that to my sister again.\" With a thought, he'll take on the properties of that metal, becoming tough and unyielding. Magnetic, too, but you doubt that'll be the problem, not once Alan's closed the issue with his fists.\n\nThe O'Connell twins are a force to be reckoned with, known for working in a ridiculous hammer and anvil strategy in some of your team sparring sessions, but you know it could spiral out of control fast. Neither of them are the type to think before they leap and you know them both well enough to recognise that they're thinking about leaping, damn the consequences.\n\nYou need to handle this.\n\nYou step past whatever invisible demarcation line separates the us and the them, drawing attention from both sides.\n\n\"What're you gonna do, freak?\" Frederic sneers, looking right at you. With his fists balling and his feet shifting in that subtle way that heralds danger, he's obviously spoiling for a fight.\n\nAnd you...\n\n*choice\n  #Attack him - with your powers!\n    *set power+1\n    *set classical %-15\n    *set ch1_fought_fred_powered \"true\"\n    *set ch1_fought_fred \"true\"\n\n    Summoning your power is as easy as snapping your fingers. And so, you do, and direct the energy that crackles around your forefinger to arc into Frederic's chest, no more difficult for you than dragging a pen across a page.\n\n    He's blasted from his feet, sent flying backwards.\n\n    \"That,\" you tell him, feeling your lips twist in a smile.\n\n    Groaning, his shirt smoking, Frederic tries to rise. He manages to shimmy halfway up the tree trunk before he collapses in a heap, making strange noises. His friends go to help him and you and your friends are able to continue up the trail without further incident.\n\n    You catch people looking at you, though, and you're not sure if they're proud of what you did, or very worried. Evidently, they all remember that using your powers in such a way is absolutely against the regulations.\n\n    It felt good, though. On second thought, maybe they're all just jealous of the fact that you were willing to break the rules to make sure no one got hurt. No one except the person who deserved it, of course.\n    \n    And it was surprisingly easy (+1 Power).\n    *goto campsite\n  \n  #Attack him - without your powers.\n    *set classical %-5\n    *set ch1_fought_fred \"true\"\n    \"This,\" you tell him, and throw a punch.\n    *line_break\n    *line_break\n    *if (brawn >2)\n      *achieve ch1_punch_win\n      He might talk a big game and make threats but you find it immediately clear that he's never fought someone who knows how to fight back before. You pay back every word with a jab or a cross, a hook or an uppercut. What feels like an hour of frenzied activity passes by in mere seconds.\n\n      Frederic falls. He curls around his gut in a heap, making pitiful noises that are somehow different to the ones he was making just a short time ago. His friends hesitate but, when it's clear that you've made your point, hurry over to help him up.\n\n      You leave them behind, basking in the adulation of the play-by-play that Alan is all too happy to provide.\n      *goto campsite\n        \n    *elseif (brawn = 2)\n      It's the first of many. Frederic's been looking forward to this and he throws out his fists with reckless abandon, a mess of jabs and hooks. Not a professional, not by a long shot, but naked anger does a lot to make someone dangerous. You manage to hold your own, however, and return every blow with one of your own.\n      \n      Adrenaline roars through you. It feels like hours but it's really only seconds. At the end of it, you hammer Frederic across his face and he falls back, yowling. That one hurt. \n      \n      \"Okay, okay!\" Frederic says from the ground, wiping the blood from his mouth with the sleeve of his shirt. \"Go on. You've made your point, asshole.\" He stares at you, still just as angry as he had been at the start, but it's muted - the anger of someone who knows they've just been humiliated.\n      \n      You leave Frederic and his friends behind, basking in the concerned voices of your classmates and the gleeful re-tellings of your little bout.\n      *goto campsite\n\n    *else\n      And Frederic bats it aside with all the care of a cat swiping a mouse. His face splits in a shark's smile, all teeth and hungry eyes, and he pistons a meaty fist into your jaw.\n\n      You see stars. \n      \n      ...what were you thinking? It's hard to think.\n\n      But what were you thinking, really?\n\n      The next thing you remember is tasting a coppery earthy mix that, upon swiping at your face, you realise is dirt and blood. Between you and Frederic stands Alan, his now-steel body gleaming in the noon sun. He's saying something but it's all nonsense to you, but you can guess the general idea. With a truce enacted at the threat of a metal fist, you're helped to your feet.\n\n      You can outrun the sound of Frederic's laughter and the taunting calls he shouts up the trail, but you're not so sure you can outrun the humiliation that clings to you like a chemical burn.\n      *set ch1_fought_fred_lost \"true\"\n      *goto campsite\n  #Talk him down - there's no need for violence.\n    *set classical %+10\n    He might be spoiling for a fight, but there's no reason to give him one and prove whatever Frederic evidently believes about people like you. It's easy enough to see that he's been a victim of something, something that's made him so angry.\n    \n    \"Nothing,\" you tell him. \"Nothing at all. Whatever you're trying to find, you're not going to find it with me - or with any of my friends.\"\n    \n    \"You think you can tell us what to do?\" Frederic sneers.\n    \n    You hold your arms out wide, a gesture of friendship. \"No, and I don't want to. But all heroes have to start somewhere, even if it's just making sure that we can leave this track the same way we came into it - not as friends but not as enemies either.\"\n    \n    *if (bravado>2)\n      *set ch1_talked_fred_down \"true\"\n      *set classical %+5\n      Frederic stares at you for a good long moment, his face unreadable. His friends pull him away and set him walking down the path as you and your friends walk further up the trail. It's a strange feeling and, one by one, the people around you remark that it was like something out of a movie.\n      *goto campsite\n    *else\n      Frederic stares at you for a good long moment, his face unreadable.\n      \n      As you turn away, he hits you from behind.\n      \n      *page_break\n      You see stars as you turn back and, behind them, Frederic's face split in a shark's smile all teeth and hungry eyes as he hits you again.\n      \n      ...what were you thinking? It's hard to think.\n\n      The next thing you remember is tasting a coppery earthy mix that, upon swiping at your face, you realise is dirt and blood. Between you and Frederic stands Alan, his now-steel body gleaming in the noon sun. He's saying something but it's all nonsense to you, but you can guess the general idea. With a truce enacted at the threat of a metal fist, you're helped to your feet.\n\n      You can outrun the sound of Frederic's laughter and the taunting calls he shouts up the trail, but you're not so sure you can outrun the humiliation that clings to you like a chemical burn.\n      *set ch1_fought_fred_lost \"true\"\n      *set ch1_fought_fred \"true\"\n      *goto campsite\n\n  #Let him go - it wouldn't be worth it. \n    *set classical %+10\n    You take a step back. \"Nothing,\" you say, \"I'm not going to waste my time and prove you right. None of us are.\"\n\n    You head off first and everyone follows. Frederic's taunts follow you up the trail, echoing from trees, sticking in your ears even when his voice has long since stopped carrying.\n    *goto campsite    \n\n*label campsite\n*page
