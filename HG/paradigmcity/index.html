"But not you,\" Sentinel says.  After a moment or two, you realize ${senhe}'s looking at you.\n\n\"You can stay.\"\n\n*choice\n  #Stay and attend the briefing.\n    *goto ch3_sent_briefing\n  #Leave and stay with your team.\n    *goto ch3_setup\n    \n*label ch3_sent_briefing\n*set sentinel_relationship %+15\n\nA murmur flows through your team as you step away from the pack and head towards Aegis and Sentinel.\n\nYou spy a new expression on Sentinel's face, however.\n\nApproval.\n\n*page_break\n\nSentinel stands by one of the windows, staring at the rest of the city - and, probably, out to the rest of the island.\n\n\"This place was once something great,\" ${senhe} muses, \"But when Leons killed Demigod...\"\n\n\"That was a long time ago, Sentinel,\" Aegis says. She doesn't sound as harsh as usual. \"I know how much his vision meant to you.\"\n\n\"This killer is here to finish the job, to drive the final nail into this city.\" Sentinel states. \"I'm not a politician. Demigod was. Since he died, I've been holding this place together as best I can, so it can be like what I remember it being.\"\n\nSentinel sighs, air through ${senhis} teeth. \"But more people leave, every day. We lose capes and they don't get replaced. And now rumors of old villains lurking in the areas I can't police effectively.\"\n\n\"We're here now,\" Aegis replies. \"My people are good.\"\n\n\"But the problem is that I shouldn't need to ask for help, especially not from a group like SOLAR.\"\n\n*fake_choice\n  #Speak up.\n    *set aegis_relationship %-5\n    \"But we'll be happy to help. That's why we're here,\" you say. \"It might not be ideal but few things in life are - if we work together, we'll have this city back to normal.\"\n    \n    Aegis gives you a glare - speak when spoken to, it says.\n  #Don't.\n    \nSentinel casts ${senhis} eyes in your direction.\n    \n\"I remember you,\" ${senhe} says. \"From the Academy. I know you remember me. You were eight years old but, even then, I knew you would go on to do great things, that you had it in you to be a hero. And here you are, here to help me, even if it is at the behest of the new way of doing things. It's almost like our position is reversed now. But only almost.\"\n\nWhat ${senhe} says next surprises you.\n\n\"I want you as my personal liaison for this investigation.\"\n\n\"Excuse me?\" You and Aegis ensure that ${senhe} gets it in stereo.\n\n\"A personal liaison,\" Sentinel repeats, \"Someone who I can have reports from. And I'd like to help this new empowered hero start their career as best I can. Can you arrange this for me, Captain Ng-Mae?\"\n\n\"I'd be very happy to,\" Aegis smiles, the expression like glass.\n\n\"Excellent. So then,\" Sentinel says, clapping ${senhis} hands together. \"Let's get down to business...\"\n\nThe discussion moves on before that smile can fall off Aegis' face and shatter on the floor.\n  \n*goto ch3_team_briefing\n  \n*label ch3_setup\n*set ch3_setup true\n*set sentinel_relationship %-10\n\n\"I'd rather stay with my team, if that's alright. After all, I haven't been cleared for this briefing, have I?\"\n\nSentinel frowns, just as ${senhe} had all those years ago. Still, you can feel the camaraderie of your squad build around you. It may have cost you some of Sentinel's good graces - but when had they ever been apparent, really, you reflect - but has brought you some from your team as a whole.\n\n*page_break\n*set courser_relationship %+10\n*set chevalier_relationship %+10\n*set blueshift_relationship %+10\n*set aljinn_relationship %+10\n\n\"What do you know, it's the Paradigm City Hilton.\"\n\nChevalier's quip falls on deaf ears.\n\nSentinel had given you and your team an old precinct to operate out of. Old being the operative word in that sentence, you realise. This place hasn't been in operation for months, maybe a year or more. The walls are marred with tags and graffiti. You flick at a light switch and nothing happens. It's not old in the sense that a house could be a bit musty, it's old in the sense of something abandoned to the elements.\n\n\"Great. So the light is blown. Or we don't have any power,\" Blueshift comments.\n\n\"From bad to worse,\" Al-Jinn says lightly. She flicks at another switch - nothing.\n\n\"Pessimists,\" Courser adds with a wide smile. \"Look, we've got a few hours before the Captain gets back at the very least, so, let's try and get this place shipshape for her.\"\n\n\"Ship of Theseus is an apt metaphor,\" Anima says.\n\nHowever, once you get working, the scale of it doesn't seem nearly as intimidating. You end up...\n\n*choice\n  #Helping Al-Jinn set up the Captain's office.\n    *goto setup_jinn\n  #Assisting Blueshift and Anima with the technical work.\n    *goto setup_shift\n  #Working with Chevalier and Courser to clean out the old junk.\n    *goto setup_chev\n    \n*label setup_jinn\n*set bravado+1\n\nAs the Captain's attache and general assistant, Al-Jinn saw it as a personal quest to ensure that the Captain had a suitable office to operate the assignment from.\n\nThe precinct obliged with an old room for an old commander. Just as rundown as the rest of the place, it's going to take a fair amount of elbow grease to get it in an acceptable state.\n\nAl-Jinn is exacting, intense and quiet as she goes about her duties. You wonder just what the Captain might have done to earn this loyalty, this respect.\n\n\"So,\" you say, and take a moment to gather up your next words...\n\n*choice\n  *if (ch2_rushed_in = \"true\")\n    #\"I saw the Captain's medals, back in Geneva. Do you know how she earned them?\"\n      \"Some of them,\" Al-Jinn says, \"The ones that she displays, at least.\"\n      \n      \"She has more?\" You find that hard to believe. If it was Chevalier saying it, you'd take it for a joke.\n      \n      \"Our Captain has a shaky relationship with her military history. Some of those medals came from being made an example of. I'm not sure how much I should say about it.\"\n      \n      \"Is it classified?\"\n      \n      Al-Jinn shakes her head. \"Not exactly. But out of friendship and respect, I'm not sure if it is something I should talk about. The African Purges aren't pleasant history.\"\n      *goto setup_jinn_2\n  *else\n    #\"I don't get it. She's a Captain. How'd she end up in SOLAR?\"\n       \"It's a long, unfortunate story. I'm not sure how much I'm supposed to say.\"\n     \n       \"Is it classified?\" you ask.\n     \n       Al-Jinn shakes her head. \"Not exactly. But out of friendship and respect, I'm not sure if it is something I should talk about. The African Purges aren't pleasant history.\"\n       *goto setup_jinn_2\n  #\"She limps but she's not afraid of anyone, not even Sentinel. What's her story?\"\n     \"She really isn't. I haven't served with her as long as some others but I've seen footage - when she first met Chevalier, she had him on the ground. That was a few years ago.\"\n     \n     \"But before that?\" you ask.\n     \n     \"It began in the African Purges...\"\n     *goto setup_jinn_2\n  #\"I'm surprised that we've got an actual military officer in charge. Is that normal?\"\n     \"Not for SOLAR, no. There are ex-military, sure, but none that are still, technically, officers. We're not a military outfit.\"\n     \n     \"So, why is she here then?\" you ask.\n     \n     \"Well, the African Purges were...\"\n     *goto setup_jinn_2\n     \n*label setup_jinn_2\n*page_break\n     \nAl-Jinn pauses and looks you over for a moment.\n\n*if (aljinn_relationship > 70)\n  \"Why not,\" she says, \"It's an open secret in our team anyway. I might as well be the one to let you in on it. As I was saying, the African Purges...\"\n  \n  It was history barely touched on at the Academy.\n  \n  Al-Jinn takes a seat. \"I'm sure you know the story - twenty years ago, the world went mad. Maybe it was resentment or jealousy or fear but in a lot of the world, people began killing people with powers - or those that were suspected to have them. Pogroms, lynches, mass graves... The Purges, everyone called it. Africa had it hard. The Captain was part of the relief efforts.\"\n  \n  \"I didn't know a lot of that. I mean, I know it happened, but...\"\n  \n  Al-Jinn just nods. One part understanding, one part 'let me continue'. \"She wasn't there to intervene. She wasn't there to save anything but the assets of her home country. The Captain had to watch while cities burned and people were buried alive. She wouldn't take it now and she didn't take it then.\"\n  \n  \"She disobeyed her orders...\" you say.\n  \n  \"She did. And she saved a lot of lives in the process. One of them was- Well, a topic that's rather complicated. \n  \n  \"A lot of people died in the process - on both sides. Her soldiers, enemy combatants, people caught in the middle. When you crunch the numbers, she saved people - a net gain, hard to be angry about that, right? But when you disobey orders and people die because of it? Her superiors couldn't court martial her, she was a hero, but they couldn't let her remain either. So, she was quietly transferred, shuffled somewhere more 'politically convenient'.\"\n  \n  \"To SOLAR?\"\n  \n  Al-Jinn nods, finding something to work on. \"They made an example of her, and some of us find that example important to emulate.\"\n  \n  \"But, if you ask me,\" she says, \"I think they're hoping she'll die here.\"\n  *goto ch3_team_briefing\n\n*else\n  \"I'm sorry, I really can't say anything else. It's not just the Captain but Ada, too - and I think I've already said too much at that. Let's drop it.\"\n  \n  You do, and it stays dropped. By the time Aegis returns, there's no chance of it being picked up again.\n  *goto ch3_team_briefing\n\n*label setup_shift\n\nAssisting might be overstating it. When you ask how you can help, Blueshift just tells you to stay out of the way. But after thirty minutes or thereabouts, he appears to have relented and, with precise instructions, lets you know how you could assist him. Check the cameras, check the electronic locks, check that the power outlets work...\n\nYou're not surprised to learn that Blueshift expects exacting standards everyone and everything. He's thorough and he's stubborn, going so far as to disassemble things like the security system to ensure that it works to whatever standard he desires.\n\n*if brains >2\n  *set blueshift_relationship %+10\n  It's easy stuff. By the time Blueshift has checked the biometric locks, you've already checked the wiring and status of the security feeds. He gives you a single nod - a sure sign that he's impressed.\n  *goto setup_shift1a\n\n*elseif brains >1\n  Luckily, for you and him, you know what you're doing - you're no expect on a lot of these technical tasks, but you can pick it up with an example or two. Blueshift seems to respect that, although he certainly doesn't say so.\n  *goto setup_shift1a\n\n*else\n  *set blueshift_relationship %-10\n  Unfortunately, your technical knowledge doesn't quite seem to be able to meet that standard. Blueshift frowns and, more than once, directs you to take care of something else while he 'fixes' your work.\n  *goto setup_shift1a\n  \n*label setup_shift1a\n*set brains+1\n\n\"If we're operating out of this place for long,\" he says, over his shoulder, \"I want to know we have control of it.\"\n\nTo his left, almost buried under a pile of hardware and cables, Anima kneels beneath a desk, fitting in the new systems that will allow the team no small degree of information and intelligence.\n\nYour eyes wander over the desk. Your eyes wander over the items there, lingering on a photo of Blueshift and Anima - Ada and Leland, more like - in matching garish swimwear, standing on some beach that you don't recognise. Both of them mugging the camera, drinks in hand.\n\nIt has to be them, but you can't imagine either of them pulling faces and, as strange as it seems, having fun.\n\n*fake_choice\n  #\"Nice photo.\"\n    *set anima_relationship %+5\n  #\"I didn't know you could look on the bright sides of things, Shift.\"\n  #\"Where'd you have this taken?\"\n    \nBlueshift glances over. \"Over in the Caribbean. We were hunting down someone dealing in supertech weapons. The job was easier than anyone anticipated, even myself. With two days to catch our breath, we had some time to kick back, so to speak.\"\n\nUnder the cover of Blueshift's talk, Anima arrives at your shoulder. \"Maracas Beach, Trinidad,\" she says. \"The temperature is thirty one degrees Celsius. Blueshift asks Chevalier for a photo; there is rain on the horizon. The rain turns to hail.\" She walks away, as suddenly as she had appeared, repeating that mantra: \"The rain turns to hail.\"\n\nBlueshift has perched himself on one of the desks, idly working on some electronic doodad.\n\n\"It's not mine, though,\" he says, and he tilts his chin to point to Anima.\n\n\"It's her's.\"\n\n*goto ch3_team_briefing\n\n*label setup_chev\n\nWith Chevalier and Courser, you get the manual work. The hard labor. The endless toil of moving everything that shouldn't belong to a better place.\n\nThe better place is, apparently, behind the precinct. Chevalier handles most of the work - super-strength means he ends up carrying more on one arm than you or Courser can carry in both. He sings to himself, even when Courser complains, like someone who knows that no matter what he says he won't change anything - and wouldn't want to. True to form, that just makes Chevalier louder.\n\nWhile you work, it occurs to you that Chevalier's nose is slightly crooked - the sort of thing that's been broken and healed, albeit imperfectly.\n\nStrange. His files say he's invulnerable.\n\nSo, you ask him.\n\n\"Oh, that?\" Chevalier says, \"I got that little memory when I took down Collider.\"\n\n*choice\n  *if (parent_status = \"Dead\")\n    #\"Collider? He killed my parents - how'd you do it?\"\n      \"I'm sorry to hear that,\" Chevalier says. \"He was a real piece of work. That's why a bunch of us independent capes got together to bring him down.\"\n      \n      \"You were an indie cape?\" you ask.\n      \n      \"Yeah. I operated under the name of Protectron back then.\"\n      \n      Courser grins from the other side of the room. \"He's never been any good with names.\"\n      \n      \"Hey, come on, I was sixteen!\"\n    \n      \"You brought down Collider when you were sixteen?\"\n    \n      \"Yeah, or thereabouts. A bunch of us tracked him down, gave him the ol' 'come quietly'. It didn't work. He had these huge powered fists and he caught me with one heck of a right hook. He snapped my nose, I snapped his back. My nose never healed quite right, and he never healed at all.\"\n      *goto setup_chev2\n  *else\n    #\"Collider - I read about him in the Academy - a singularity-themed villain, right?\"\n      \"That's the one,\" Chevalier says with a nod. \"Back when I was an indie cape under the name of Protectron.\"\n      \n      Courser grins from the other side of the room. \"He's never been any good with names.\"\n    \n      \"Hey, come on, I was sixteen!\"\n    \n      \"You brought down Collider when you were sixteen?\"\n    \n      \"Yeah, or thereabouts. A bunch of us tracked him down, gave him the 'come quietly'. It didn't work. He had these huge powered fists and he caught me with one heck of a right hook. He snapped my nose, I snapped his back. My nose never healed quite right, and he never healed at all.\"\n      *goto setup_chev2\n  #\"Aegis brought that up - it sounded like you weren't with SOLAR then.\"\n    \"You're right,\" Chevalier says, \"I wasn't. I operated independent for a while under the name Protectron.\"\n    \n    Courser grins from the other side of the room. \"He's never been any good with names.\"\n    \n    \"Hey, come on, I was sixteen!\"\n    \n    \"You brought down Collider when you were sixteen?\"\n    \n    \"Yeah, or thereabouts. A bunch of us tracked him down, gave him the 'come quietly'. It didn't work. He had these huge powered fists and he caught me with one heck of a right hook. He snapped my nose, I snapped his back. My nose never healed quite right, and he never healed at all.\"\n    *goto setup_chev2\n  #\"But you're invulnerable. I didn't think you could even get injuries like that.\"\n    \"We can,\" Chevalier says, bumping his big shoulders up. \"I mean, we can die. Invulnerable isn't immortal, that's what they always told us. It comes in tiers, basically - like football players.\" He grins widely.\n    \n    \"See, you've got those who are invulnerable to certain things entirely. You've got people like me who can't be hurt, but still feel pain. I still need to breathe, too. It sounds great when you hear you've got an invulnerability power but, really, I don't think there's been a single cape who is truly, utterly invulnerable. No such thing as an invincible cape.\"\n    *goto setup_chev2\n    \n*label setup_chev2\n    \nCourser clears his throat and, with a flourish, produces a basketball from beneath a broken chair.\n\n\"Anyone up for a game?\" he asks.\n\n*page_break\n\nYou never played much basketball back at the Academy.\n\n*if brawn >2\n  *set courser_relationship %+10\n  *set chevalier_relationship %+10\n  Even so, you make up for your lack of experience with your general athleticism. Chevalier and Courser might know more about the sport, but you're able to give a good showing.\n  *goto setup_chev_bball\n\n*elseif brawn >1\n  *set courser_relationship %+5\n  *set chevalier_relationship %+5\n  But you pick up the basics. Chevalier and Courser might have you outmatched with their experience, but you hold your own.\n  *goto setup_chev_bball\n\n*else\n  A fact made quite apparent by how easily both Chevalier and Courser sink their shorts, near or far.\n  *goto setup_chev_bball\n  \n*label setup_chev_bball\nWhile the three of you have been playing basketball, you've been aware of Blueshift and Anima attending to some of the technical work. Neither of them displayed any interest in joining in.\n  \nChevalier sinks a shot from a distance you couldn't hope to match. Super-strength has its perks, it seems.\n  \nCourser wanders from the improvised court, shaking his head, unable to even hope to intercept it.\n  \nYou step up, to the middle of the court, as Chevalier showboats a few tricks with the ball.\n  \n*fake_choice\n  #Ask about Anima and Blueshift.\n    *goto setup_chev_animashift\n  #Ask about the Captain.\n    *goto setup_chev_captain\n  #Game on.\n    *goto setup_chev_playball\n    \n*label setup_chev_animashift\n*set brawn+1\n\"Those two aren't one for the whole esprit de corps, are they?\"\n\nChevalier shrugs, a slight movement of his broad shoulders. \"Not since the accident.\"\n\n\"That's if you believe it was an accident,\" Courser says from the sideline.\n\n\"It was. Gotta be.\"\n\nYou mentally run through Anima's file, then Blueshift's. You don't recall anything about an accident.\n\n\"What sort of accident are we talking here?\" you ask.\n\nChevalier collects the basketball in the crook of his arm. \"It was a few months after Shift joined the team. He and Ada had been hitting it off - they were our tech heads, really. But then...\"\n\n*page_break\n\nChevalier looks you over, seems to consider you as he mulls over his next words.\n\n*if chevalier_relationship >60\n  \"You know how Ada only talks in the present tense?\"\n  \n  You nod.\n  \n  \"She wasn't always like that. Shift wasn't always such an asshole - I mean, he is, but he wasn't so cold about it. He and Ada were working on a project, it went bad - Shift came out of it okay, but Ada...\" Chevalier dribbles the ball on the spot once, twice. \"She's not the same. Might not ever be.\"\n  \n  \"If he's so smart,\" Courser says, \"Then how come it went wrong? A bit of a coincidence that it happened just after they met and now they're inseparable. And what we know about him-\"\n  \n  \"I know he cuts his hair the moment it hits his eyes and not one second before,\" Chevalier offers, and then offers you the ball with a soft underarm throw. \"The Captain vouched for him, man. That's all I need.\"\n  \n  You catch it, and the game resumes.\n  *goto ch3_team_briefing\n  \n*else\n  \"Well,\" he says, eventually, \"I'm not sure if it's my place to say. It's a hell of an issue. Not even the Captain likes to talk about it.\"\n  \n  \"I'm just saying,\" Courser says, \"How much do we know about Shift? A bit of a coincidence that it happened just a little bit of time after those two met and now they're inseparable. And what we know about him-\"\n  \n  \"I know he cuts his hair the moment it hits his eyes and not one second before,\" Chevalier offers, and then offers you the ball with a soft underarm throw. \"The Captain vouched for him, man. That's all I need.\"\n  \n  You catch it, and the game resumes.\n  *goto ch3_team_briefing\n\n*label setup_chev_captain\n\"So,\" you say, \"What do the two of you think about the Captain?\"\n\nChevalier keeps hold of the basketball. \"Don't know - how about you tell us what you think, rook?\"\n\n*fake_choice\n  #\"She seems like a good leader. Tough, but fair.\"\n    Chevalier nods. \"That's about right. It's surprising that she came out of Africa as well as she did.\"\n  #\"She's a bit over the top.\"\n    \"Maybe,\" Chevalier says, \"But I think that's the point. She went through a lot in Africa.\"\n  #\"She's a soldier - I'm not sure I'm comfortable being led by her.\"\n    Courser says, \"I get the point - we're keeping the peace, not fighting a war.\"\n    \n    Chevalier waves the basketball to indicate the rest of the city. \"Look out there. Every year, there's more villains. Every year, we've got less heroes. Feels like a war to me. Besides, ever since Africa...\" He catches himself and takes a moment to think.\n\nAfrica. One of the continents that had suffered the most in the wake of empowered individuals stepping onto the stage of history.\n\nChevalier's passing you the basketball before you can ask anything else.\n\nIn a moment, the game resumes.\n*goto ch3_team_briefing\n\n*label setup_chev_playball\n\n\"Come on, Chevy,\" you call, \"You going to throw that thing or what?\"\n\nThe game resumes.\n\n*goto ch3_team_briefing\n\n*label ch3_team_briefing\n*page_break\n\nTwo days later and you're looking at a functional, if not comfortable, base of operations.\n\n*if (ch3_setup = \"true\")\n  It took a lot of work, all in all, but you and the team managed to bring the place to an acceptable standard. Not somewhere you would want to live, of course, but a place with everything you need to work. Some of the graffiti, sprayed tags and slogans from half a dozen empowered gangs, remains, however.\n  *goto ch3_setup_a\n*else\n  The squad had put in good work while you were being briefed by Sentinel. You're not sure if you believe their stories of just how bad the place was before they brought it up to spec, however, the hints of longstanding damage and wear and tear do give evidence to their claims. Still, it is secure and functional.\n  *goto ch3_setup_a\n  \n*label ch3_setup_a\n\nAll in all, it looks good. Not great, but good. It could use a nice coat of paint, furnishings that were more than pure utilitarian function, but it'll do.\n\n*page_break\n\nIt took a day for Sentinel to send over the information and another day for Blueshift to compile and analyse it into something useful.\n\nNow, you stand around a table in the central operations room. A map of Paradigm has been cast across the holographic table, with all the information from the map in Sentinel's office there.\n\n\"We're looking at a capekiller,\" Aegis begins. \"That much we know. They've been active too with three murders in the past week, all of them capes and all of them matching an existing pattern over a period of months. All except one, however, two weeks ago.\"\n\nAegis taps a section of the map and takes a moment to down a pill while the map resolves into a small section of suburbia.\n\n\"Western Springs. That great little section of twee suburbia, like a little model town for people who can only imagine in three colors.\" Aegis shakes her head. \"My comments notwithstanding, Raymond Wu was murdered two weeks ago. Wu didn't have powers but, based on what I've seen from Sentinel, this fits the MO of the killer we're looking for - I want to know why he's going after someone who isn't a cape.\n\n\"We go in, find anything of note, anything that was [i]missed[/i], interview witnesses, that sort of thing. Al-Jinn, Blueshift, I'll put you on this. Turn that place over with a fine-toothed comb.\"\n\nAnd then Aegis says, \"Of course, that's not all of our leads.\"\n\n*page_break\n\nAegis shifts the map again, to a section of the downtown district.\n\n\"A week ago, someone bombed a medical clinic - easy, quiet! - yes, a medical clinic. But this one is owned by GenTee, the guys who pioneered the genetic test for powers. You don't have to be Chevalier to see the connection there. Sentinel believes that if someone is killing capes and someone is targeting cape-related infrastructure then maybe there's a political edge. Chevalier, you'll work with Anima and Courser on this one.\"\n\n\"But wait,\" Aegis adds, \"There's more.\"\n\n*page_break\n\n\"I've got a third option, one that Sentinel doesn't really know about - and one I'm not going to tell ${senhim}.\"\n\n\"Is that wise, Captain?\" Courser asks. \"We should be working with ${senhim}, not giving ${senhim} a reason to hack us off.\"\n\n\"We are, ${senhe} just isn't aware of it. I don't need another person looking over our shoulders. Sentinel provided us a list of names, the recurring villains, ${senhis} own little sideshow of horrors, if you will, and I intend to use it. We haul them in, ask them what they know, and see what we get. Maybe one of them got political, maybe one of them knows something about that rumor of a new villain muscling in - we won't know until we bloody well [i]ask[/i]. I'll put something together on this one, and Jinn? I'd like your help.\"\n\n\"Of course, Captain,\" Al-Jinn replies.\n\nYou realise that you weren't mentioned for any of this.\n\n*fake_choice\n  #Speak up - you're not here to observe!\n    \"Captain? Have you forgotten something?\"\n    \n    Aegis turns to look at you, and the smile she wears on her face isn't reassuring.\n    \n    \"Not at all, ${cape_name},\" she says.\n  #Aegis is competent, she won't have forgotten me.\n    You keep quiet.\n  \n\"${cape_name}, I do hope you were listening - because you'll be heading up this investigation.\"\n\n*if (ch2_won_ctf = \"false\")\n  \"What?\" Blueshift stares at you from the other side of the table, just as shocked as you are. \"Not that I care about this city or Sentinel or the people in it, but ${phe}'s untested. $!{phe} couldn't even handle a simple training exercise. This compromises our ability to achieve our objective - namely, stopping a murderer slash arsonist before they strike again.\"\n  *goto ch3_setup_b\n \n*else\n  \"What?\" Blueshift stares at you from the other side of the table, just as shocked as you are. \"Not that I care about this city or Sentinel or the people in it, but ${phe}'s untested. Capturing a fake flag is one thing, but this is something else.\"\n  *goto ch3_setup_b\n\n*label ch3_setup_b\n\n\"Ease up, Shift - your ego's showing.\" Chevalier grins at him.\n\n\"Who else will head it up?\" Aegis asks, \"You? You have a history and an ego that, I swear to God, bends light when it hits you just the right way. Anima is bright but she's not personable. Chevalier's not a thinker. I could go on but I'll save you all the self-esteem - ${cape_name} is the best for the job. They're new, this is a new city to them, they'll see things you all might miss. By all means, if you think ${phe} can't do it, then you can go with ${phim} - but I'm going to teach you trust if I have to beat it into you, [i]Leland[/i], am I understood?\"\n\nThe team watches him expectantly.\n\n\"As crystal, Captain,\" he finally states.\n\n*page_break\n\n\"Of course, I do have an ulterior motive for this,\" Aegis comments. She holds up a hand, as if reciting a solemn oath. \"Hang me later.\"\n\n*if (ch3_setup = \"true\")\n  \"While you all left me to deal with the golden ${senboy},\" Aegis says, \"$!{senhe} told me something interesting - Sentinel wants ${cape_name} to be their liaison. So, ${senhe}'s not going to look over our shoulder, but ${senhe} wants our rookie to do it for him. Fine by me, you'll be going to each site in order to ensure that Sentinel gets what Sentinel wants. And ${senhe} wants it by the end of the week - that gives us four days to have a preliminary report ready.\"\n  *goto ch3_setup_end\n\n*else\n  \"As ${cape_name} might have mentioned, Sentinel asked for ${phim} to be their personal liaison. $!{senhis} city, ${senhis} rules. Be sure to thank Sentinel for this detail next time you see ${senhim}, ${cape_name} - you'll be going to each site to ensure that Sentinel gets first-hand accounts. And ${senhe} wants that account by the end of the week. You've got four days, ${cape_name}.\"\n  *goto ch3_setup_end\n  \n*label ch3_setup_end\n  \nThe news ripples through the crowd. Blueshift gives you a disdainful look, but that's not surprising. Courser is giving you a smile that looks like it reaches to his ears. The others are wary, maybe wondering why you over them, or why Sentinel even wants a personal envoy in the first place.\n\nYou can't say you're sure either.\n\n*page_break\n\nLater, with all the pieces in place, the team watches you, waiting for you to begin. No pressure.\n\nMentally, you recount Aegis' directives.\n\n1. Investigate the murder of Raymond Wu.\n*line_break\n2. Investigate the bombing of GenTee Downtown Medical.\n*line_break\n3. Question a number of local suspects.\n\nIt should be easy enough, all in all.\n\n*if (ch2_solar_romance = \"chevalier\")\n  Chevalier smiles at you from across the table. \"Don't listen to Blueshift, he just doesn't adapt well to change and hates failure - I've got your back.\"\n  \n  A few hours prep and you'll be ready to go.\n  *goto ch3_hub1\n\n*elseif (ch2_solar_romance = \"courser\")\n  Courser smiles. \"Listen, Blueshift's kind of an ass. Don't worry about him, we've all got your back on this.\"\n  \n  A few hours prep and you'll be ready to go.\n  *goto ch3_hub1\n\n*elseif (ch2_solar_romance = \"aljinn\")\n  Al-Jinn gives you a wry smile. \"Ready when you are, ${cape_name}.\"\n  \n  A few hours prep and you'll be ready to go.\n  *goto ch3_hub1\n\n*else\n  Courser slaps you on the shoulder. \"Congrats, newbie,\" he teases, \"Out of the frying pan and into the fire - we've all got your back on this.\"\n  \n  A few hours prep and you'll be ready to go.\n  *goto ch3_hub1\n\n*label ch3_hub1\n*page_break\n*if (hub = 0)\n  Tuesday. Time to get started and piece together some clues.\n\n  You're Academy trained, you've covered a lot of this sort of work in your Cadet school classes - there's nothing that you can't do, despite what Blueshift believes.\n*if (hub = 1)\n  Wednesday. Secretly, you wonder if any of this case is ever going to make sense.\n\n  As you ponder this, walking the corridors of the precinct, you swear you spy Anima dancing in one of the rooms.\n\n  The thought is shocking enough that you quickly look again, but then she's just standing there.\n\n  Something to think about on the way to the next job, at least.\n*if (hub = 2)\n  Thursday. A pattern begins to form, something you reflect upon as you shoot hoops with Courser and Chevalier.\n\n  You narrowly avoid bumping into Blueshift at the communal kitchen. You prepare a meal silently, content to let him simmer in his silent bout of narcissistic bitterness, until he says:\n\n  \"Not bad, ${cape_name}. I'm not going to say I was wrong about you just yet, but I'm reevaluating a few things.\"\n\n  Step by step. Hopefully, this next outing will give him something else to evaluate.\n*if (hub = 3)\n  Friday. It's time to compile what you've got into something of a report for Sentinel, and for your team.\n  \n  You sit amongst papers and data storage devices, borrowing a desk and laptop in the communal kitchen. You rub at your eyes, your scalp, and piece together what you've found.\n  \n  Hopefully, it'll be enough.\n  *goto ch3_report\n\n*choice\n  *if murder = false\n    #Investigate the murder out at Western Springs.\n      *goto ch3_murder_scene\n  *if bombing = false\n    #Investigate the GenTech clinic bombing.\n      *goto ch3_bombing_scene\n  *if criminals = false\n    #Haul in local criminals for intel.\n      *goto ch3_interrogations\n    \n*label ch3_report\n\nBleary-eyed, you stare at the laptop screen, and revise everything you've found, compiling it into a report.\n\nRaymond Wu was killed by someone with superior strength. The explosion was not the cause of death and tampering with the crime scene is suspected.\n*line_break\n*line_break\n*if ch3_found_cloth = \"true\"\n  *set aegis_relationship %+10\n  And you believe that someone on Sentinel's staff might be responsible.\n  *goto report_bombing\n  \n*else\n  But you've got no evidence of who might be responsible.\n  *goto report_bombing\n  \n*label report_bombing\n*page_break\n\nThe GenTech medical clinic was bombed. Although the damage was light, the primary motivation appears to be someone with a political aim.\n*line_break\n*line_break\n*if ch3_false_flag = \"true\"\n  *set aegis_relationship %+10\n  But nothing about the bombing seems truly consistent with that sort of attack. The damage is minimal, nothing has been destroyed, the place could easily reopen. So, why hasn't it? While the assailant remains a mystery, it seems like it could be a false lead.\n  *goto report_criminals\n  \n*else\n  But there's nothing there to really shed light on who might have done it, or why.\n  *goto report_criminals\n  \n*label report_criminals\n*page_break\n\n*if ch3_misschief_data = \"true\"\n  *set aegis_relationship %+10\n  Ultimately, the rumors of an emerging or returning villain were substantiated by a member of Paradigm's criminal underworld. They also claimed to recognise the voice of one of Sentinel's team as an accomplice or associate. Not much to go on, but every little bit counts.\n  *goto ch3_the_club\n  \n*else\n  Ultimately, the rumors of an emerging or returning villain were unable to be substantiated. It's entirely possible that everyone has been chasing false leads.\n  *goto ch3_the_club\n    \n*label ch3_murder_scene\n*set murder \"true\"\n*set hub +1\n*set met_mirage \"true\"\n\nThe Captain was right. As far as the eye can see, everything is rendered in greys, browns and creams. All the houses share the same color scheme, as if some edict had come down from on high and set out the three true colors for suburbia. Raymond Wu's house is, of course, no exception.\n\nWhat's left of it, at least.\n\nThe eastern side of the house is just [i]gone[/i], along with a fair amount of the meagre yard - like an angry god had reached down and ripped away a good third of the property.\n\nYou find one of Sentinel's people there, as you step out of your vehicle. Mirage, one of Sentinel's capes, her allegiance made obvious by the gold and silver uniform she's wearing.\n\n\"${cape_name}?\" Mirage asks, fixing you with a radiant smile.\n\nIt takes you a moment to catch your breath. She's beautiful, even if you're surprised by her appearance, in more than one sense: how did Sentinel know to send someone?\n\nBut you're sure you can worry about that later.\n\n\"That's right,\" you say, extending your hand for a shake. \"Nice to meet you, Mirage.\"\n\n\"Oh, please.\" She laughs. \"The pleasure's all mine.\"\n\nBehind you, Blueshift clears his throat.\n\n*page_break\n\nBlueshift looks at you then at Mirage. \"Brunette, six foot, olive skin, violet eyes.\"\n\nMirage shimmers and you catch a glimpse of someone else there, for a split second. Someone who isn't Mirage nor the person Blueshift described.\n\n\"You're no fun,\" Mirage tells Blueshift with two voices, and then becomes someone else. A plain-looking woman, mousy and unremarkable save for the silver and gold domino mask she's wearing, her black hair flopping around her face.\n\n\"He really isn't,\" Al-Jinn comments, \"But using mental powers on people without their consent is frowned upon. Maybe even illegal.\"\n\n\"Oh come on, Naemah, stop looking so severe - Paradigm's beholden to no one. But fine, I won't. I'll stop. I guess what they say about you SOLAR types is true.\"\n\n\"Maybe that's why your city's in such a mess, Sarab.\"\n\n*fake_choice\n  #They have history - what's with that?\n    \"You too know each other?\" you ask, before anyone can say anything further.\n    \n    \"Smooth,\" remarks Blueshift, and wanders off to do whatever it is he does when he's not stroking his own ego.\n    \n    \"In another life,\" Al-Jinn says.\n    \n    Mirage just smiles. \"Naomi and I used to run together, back in Cairo - back before you ever thought about going legit, ain't that right?\"\n    \n    \"I grew up,\" Al-Jinn tells her and then, over her shoulder as she heads inside, \"You should, too.\"\n  #They have history - and I'm staying out of it.\n    *set aljinn_relationship %+5\n    You keep your mouth shut. Whatever's happening, isn't something you want to get involved in. No need to have their bad blood on you.\n    \n    Al-Jinn leaves Mirage to think about that point and heads inside. You follow.\n    \n*page_break\n\n\"This is ridiculous.\"\n\nBlueshift might be right, you reflect. Inside, the house is abandoned, and clearly has been for some time. Dust clings to every surface and the floorboards are covered in shoeprints. Obviously, no one's going to live in a place that feels like a demolition company left the job half done. And if the local authorities have cased the place, as Sentinel's files indicated that they had, then you're forced to wonder just what you'll find here, picking over a dig site that's half-ruined and thoroughly explored.\n\nYou just need to have faith that you'll find something. Anything.\n\n\"You're a regular glass half full type, aren't you, Blueshift?\" Al-Jinn says.\n\nBlueshift's reply is delayed by him removing his helmet. He scratches at his stubble, helmet held in the crook of his arm.\n\n\"Spend too much time discussing the volume and you forget about the the contents,\" he says. His eyes turn to you, tired brown things. \"What's the plan, Chief?\"\n\n*fake_choice\n  #Tell them to turn this place upside down, leave nothing unturned.\n    *set ch3_house_strat 1\n  #Tell them to be careful, there's no telling how stable this place is.\n    *set ch3_house_strat 2\n    \nThe pair nod, ready to commence the investigation.\n\n*page_break\n\n*label ch3_murder_hub\n\nYou ponder your next move.\n\n*choice\n  *if murder_aj = \"false\"\n    #\"Al-Jinn, do you feel anything?\"\n      *goto murder_aljinn\n  *if murder_bs = \"false\"\n    #\"Blueshift, any preliminary findings?\"\n      *goto murder_blueshift\n  *if murder_mi = \"false\"\n    #\"I'm going to go talk to Mirage.\"\n      *goto murder_mirage\n  *if murder_mu = \"false\"\n    #\"I'm going to check out the murder scene.\"\n      *goto murder_murder\n  *if murder_ex = \"false\"\n    #\"I'm going to have a look at that explosion site.\"\n      *goto murder_explosion\n  *if murder_fi = \"false\"\n    #\"Let's see if we can find anything they might have missed.\"\n      *goto murder_investigate\n  *if ((((((murder_aj = true) and (murder_bs = true)) and (murder_mi = true)) and (murder_mu = true)) and (murder_ex = true)) and (murder_fi = true))\n    #Finish up the investigation.\n      *goto murder_finish\n    \n*label murder_blueshift\n*set murder_bs \"true\"\nBlueshift glances at you. \"Someone destroyed about half of this house.\"\n    \n\"Very perceptive,\" you say.\n    \n\"I do try.\"\n\nHe looks up from his hand tablet. \"I need more data before I have anything more definitive to say. Something doesn't add up here. Something more than a murder and a half-demolished house.\"\n\n*goto ch3_murder_hub\n\n*label murder_aljinn\n*set murder_aj \"true\"\nAl-Jinn raises an eyebrow. \"What is this, Star Trek? My power doesn't work like that.\"\n  \nDamn. That'd be too easy.\n  \nStill, Al-Jinn says: \"You know what gets me about this whole thing, ${cape_name}? More than anything else? It's that Mirage is a wholly different legal entity to Sarab in the eyes of the courts. To ensure she's protected if something goes wrong,\" she bitterly remarks. \"It disgusts me.\"\n  \nYou know the calculated necessity of it. If there was no separation, it'd be easy enough to figure out someone's identity if the same person shows up for a court date whenever a capes does something wrong. But now, in the face of Al-Jinn's disgust, you're not sure if you agree with it.\n  \n*fake_choice\n  #Separation of cape identity and civilian identity must be maintained to preserve public order.\n    *set classical %+15\n    Al-Jinn just says, \"You too? Maybe everyone's right about the Academy, what it's creating. Just- just go find something and leave me be.\"\n  #Preserving public order comes second to holding capes accountable for what they might do 'in uniform'.\n    *set classical %-15\n    Al-Jinn smiles slightly. \"Precisely. I've done some things I don't agree with anymore, but we can't protect people if they think we're thugs.\"\n      \n    \"But we still have codenames,\" you point out.\n      \n    \"Just an old tradition - our names are still known in the SOLAR database. Even our DNA. If something goes wrong... if we do something wrong, we're the ones who pay the price. As it should be.\"\n    \n*goto ch3_murder_hub\n\n*label murder_mirage\n*set murder_mi \"true\"\nYou find Mirage in the abandoned kitchen, looking like her regular self.\n    \nShe looks you over, smiles like the Cheshire cat.\n    \n*if torso = \"sleek bodysuit\"\n  \"I didn't know that you SOLAR types wore the old school tights.\"\n    \n  \"Some of us do. Some of us remember how things were before the world got like this.\"\n    \n  \"You'd fit in around here, Sentinel thinks the same thing. Anyways-\" She draws out the last syllable, \"-is there something you needed?\"\n  *goto murder_mirage2\n    \n*else\n  \"Ah, ${cape_name}, my new best friend. Is there something I can do for you?\"\n  *goto murder_mirage2\n  \n*label murder_mirage2\n\n*choice\n  *if mirage_1 = \"false\"\n    #\"What was the official story here?\"\n      *set mirage_1 \"true\"\n      \"That's an interesting one,\" Mirage says. \"See, Raymond was an old friend of Sentinel, due to his campaigning for increased law enforcement, that sort of thing. The death got to Sentinel, I think, more than ${senhe} lets on. An empowered individual took him out and half his house. Maybe it was just to get to Sentinel.\" She shrugs, not seeming terribly interested.\n      *goto murder_mirage2\n  *if mirage_2 = \"false\"\n    #\"How did you get here?\"\n      *set mirage_2 \"true\"\n      \"Hmm? Oh!\" Mirage smiles. \"That's easy, Sentinel sent me here. $!{senhe} got word from your team and suggested that you might need a hand with this investigation that's happening. So, here I am!\"\n      *goto murder_mirage2\n  *if mirage_3 = \"false\"\n    #\"Were there any witnesses?\"\n      *set mirage_3 \"true\"\n      Mirage shakes her head, and then says, \"Well, actually, there was. Raymond's husband, Colin, but he left Paradigm last week. I can't blame the guy.\"\n    \n      \"Did he make any kind of statement?\" you ask.\n    \n      \"Sure! I'll have the lab boys send it over.\"\n      *goto murder_mirage2\n  *if mirage_4 = \"false\"\n    #\"What's your history with my squadmate?\"\n      *set mirage_4 \"true\"\n      Mirage grins toothily. \"Jinnie? We used to roll together, back in Egypt, before everything got all... like it is. She got all legitimate about things, joined SOLAR as soon as she could - aced every test and picked up a glove fetish along the way. Me? Well, Paradigm gives me more freedom.\"\n      *goto murder_mirage2\n  #Finish up.\n    *goto murder_mirage3\n\n*label murder_mirage3\n\"One last thing,\" Mirage says, as you go to leave.\n    \nHer next words send a chill through you. \"You can't trust your team.\"\n    \nYou pause, remembering her earlier dispute with one particular member. \"Who, Al-Jinn?\"\n    \n\"No,\" she whispers, indicating behind you with a tilt of her chin. Blueshift passes the doorway, eyes focused on his hand tablet.\n    \n\"Him.\"\n*page_break\n*goto ch3_murder_hub\n\n*label murder_explosion\n*set murder_ex \"true\"\n\nYou walk to the broken side of the house, where it had been blasted apart by some great detonation. It was a powerful one, whatever it was  - the wood is blackened and charred, burnt down to the stone foundation in places.\n\nYou examine some of the shattered wood, kick up some of the broken ground, run your fingers over the exposed foundations...\n\nSomething's odd about this.\n  \n*if (brains > 2)\n  *set blueshift_relationship %+5\n  It takes you a few moments but, once you double check some of the broken beams, get some light on the charred stonework, step outside to look at the bent fence, it is really quite obvious.\n  \n  The explosion didn't come from outside the house.\n  \n  Whatever it was that exploded, it happened inside. And something else, something more worrying than that.\n  \n  You call Blueshift over for a second opinion.\n  \n  \"Yes,\" he says. \"I was coming to the same conclusion, but you reached it before me. Well done.\"\n  \n  \"Tell me I'm wrong,\" you say.\n  \n  \"You're not,\" he says. \"This place has been sanitised.\"\n  \n  \"Someone's tampered with the crime scene,\" you agree. \"We've got wood here, where it looks like it came inward, but we've got outward breaks here and here.\"\n  \n  Blueshift nods. \"I trust we're of the same mind - we don't tell Mirage. This goes straight to the Captain.\"\n  *goto ch3_murder_hub\n  \n*else\n  It looks like a huge explosion. What else is there to it, really?\n  \n  Maybe Blueshift would know more, you think.\n  \n  You call him over. He stands there silently, either studying the damage or trying to kill you with his thoughts - it's hard to tell.\n  \n  \"This explosion didn't happen outside the house,\" Blueshift says, eventually. \"The signs are all there. Examine the wood - it's broken outwards, like it was pushed from inside. The fence stands, albeit bent outwards, too. Anima could give us a more accurate approximation but there's something else that's a more pressing problem.\"\n  \n  He pauses, probably for effect.\n  \n  \"This place has been sanitised.\"\n  \n  *fake_choice\n    #\"What?\"\n    #\"What're you talking about?\"\n    #\"Excuse me?\"\n  \n  Blueshift nods. \"Sanitised. Make something more palatable by removing elements that are likely to be controversial.\"\n\n  \"I know what the word means,\" you remark.\n\n  \"And I'm making sure. Someone's altered this crime scene.\"\n\n  \"But why?\"\n\n  \"The next question, yes. But I don't at all think that it's a coincidence that Mirage is here. We take this back to the Captain and we don't say a word. This wasn't just a murder.\"\n  *goto ch3_murder_hub\n\n*label murder_investigate\n*set murder_fi \"true\"\n\nYou wander the premises, walking from room to room, looking for anything that seems out of place.\n\nYou can't shake the feeling of walking through a mausoleum.\n\nOr a shrine, perhaps, you reflect, as you enter what must have been a living room. Most of the old furniture is gone, except for a lounge that must have been too big or heavy to be moved.\n\nYou take a seat for a moment, to collect your thoughts.\n\n*page_break\n\nYour eyes settle on a picture of Wu and a person who must have been his husband, the frame smeared with dusty fingerprints. The sight of the two men, happy and smiling, brings bile to your throat. Where were the heroes when Raymond was killed?\n\n*if (ch3_house_strat = 1)\n  *set ch3_found_cloth \"true\"\n  Angrily, you leap to your feet and kick the couch away. It's not like anyone's going to notice, what with how thoroughly Blueshift and Al-Jinn are being about their investigation. If it isn't bolted down, they're turning it over.\n  \n  You're just helping.\n  \n  Turning to leave, you pause, and turn back. Something catches your eye, something beneath the couch, caught in a gap between the floorboards.\n  \n  A scrap of golden cloth. After a brief inspection, you realise that it doesn't match to any of the furnishings still in the place.\n      \n  But it reminds you of the Paradigm City ELE uniforms.\n  *goto murder_investigate2\n      \n*elseif (brains > 2)\n  *set ch3_found_cloth \"true\"\n  Not here, that's for sure. Maybe busy elsewhere - at least, that's what you hope.\n  \n  You hop to your feet. That's enough time moping when there's a job to do. You briefly check under the couch, more out of some need to be thorough than anything else, and something catches your eye there, caught in a gap between floorboards.\n  \n  A scrap of golden cloth. It doesn't match to any of the furnishings still in the place.\n      \n  But it reminds you of the Paradigm City ELE uniforms.\n  *goto murder_investigate2\n  \n*else\n  In the end, it doesn't matter - they weren't here and they weren't able to respond in time. You resolve to do better.\n  \n  You hop to your feet. That's enough moping when there's a job to do.\n  \n  Sentinel's people must have been thorough. There doesn't appear to be anything here.\n  \n  *page_break\n  *goto ch3_murder_hub\n      \n*label murder_investigate2\n*if torso = \"sleek bodysuit\"\n  You crumple the golden cloth in your hand, keeping it out of sight.\n  \n  Part of you hopes it won't be there when you look again.\n  *goto ch3_murder_hub\n  \n*else\n  You stow the scrap of cloth in one of the pockets of your armored suit, keeping it out of sight.\n  \n  Part of you hopes it won't be there when you look again.\n  *goto ch3_murder_hub\n      \n*label murder_murder\n*set murder_mu \"true\"\n\nRaymond Wu was found upstairs, so, that is where you head.\n\nThe damage is just as bad up here, the whole side of the residence missing. Cold night air whistles around broken wood. Floorboards creak beneath you and you wonder if - hope that - they'll hold your weight.\n\nThe room he was found in has been cleared, either by looters or removalists.\n\nA white outline lies on the far side of the room, like a chalky reminder of whatever happened here.\n  \nYou examine the outline, bending down to look at it. Something's not right.\n  \n*if brains > 2\n  You glance at the shapes outlined by the white chalk, at how the arms and legs would be fitting with the torso. You nod to yourself, seeing it.\n    \n  Raymond Wu's arms and legs sit at angles that no normal human could reach. Whoever killed him was strong, stronger than a normal person.\n    \n  Strong enough, maybe, to blast the side of the house off, too.\n    \n  You file that away for future reference.\n  *goto ch3_murder_hub\n*else\n  Something about it is off, but you're not sure what. Maybe Al-Jinn would know, given her medical experience.\n    \n  You call her up and point out the outline.\n    \n  \"Look at it closely, picture the body there,\" she says. \"His limbs would be have to have been wrenched under extreme force to end up like that. Left arm is longer than the right - severe dislocation at the very least.\"\n    \n  \"An empowered criminal?\" you ask.\n    \n  \"Maybe. He could have just been caught in what destroyed some of his home.\"\n    \n  You file that away for future reference.\n  *goto ch3_murder_hub\n\n*label murder_finish\n\n\"I think we've found everything we're going to find here,\" you say. \"Let's head back, team.\"\n\nBlueshift and Al-Jinn follow you out, as does Mirage who\n*if ch3_found_cloth = true\n  seems far more threatening than she had been just a few hours ago. The golden cloth, the cloth that matches her uniform, feels so heavy.\n  *goto murder_final_end\n*else\n  gives you all a wave as you go.\n  *goto murder_final_end\n  \n*label murder_final_end\n*line_break\n*line_break\nAll in all, you're glad to leave her, and the former Wu residence, behind.\n\n*page_break\n\nIn the car, Al-Jinn says, \"Sanitised. Crime scene contamination, you mean. Are you serious? Of course you are, I forget that you don't have a sense of humor.\"\n\nBlueshift ignores or doesn't care about the jibe. Too focused on driving. \"Absolutely.\"\n\n*if ch3_found_cloth = true\n  *achieve ch3_firstclue\n  *set blueshift_relationship %+10\n  *set aljinn_relationship %+10\n\n  You produce the golden cloth, holding it so Al-Jinn can see it. \"And we've got proof, I think.\"\n\n  \"Christ and Allah,\" Al-Jinn remarks, \"The Captain's going to like this. We'll need to run this against their uniforms! But we're going to need more than a scrap of cloth and a few theories, too.\"\n  \n  \"Somehow,\" you say, looking out the window as cars and buildings streak past, \"I think Paradigm will provide.\"\n  *goto ch3_hub1\n  \n*else\n  \"I just wish we found some actual proof,\" you say.\n  \n  \"We have evidence that something's been happening here, something beyond a mere capekiller.\" Al-Jinn seems surprised by herself. \"I can't believe I just said that. But, yes, we need actual proof before we start looking into this... corruption or whatever it is. But I know the Captain's going to like getting her teeth into this.\"\n  \n  \"They made a mistake at that scene,\" Blueshift says, \"They'll make others. We'll be there to catch them.\"\n  \n  \"Yeah,\" you say, looking out the window as cars and buildings streak past, \"I'm sure Paradigm will give us ample opportunity for that.\"\n  *goto ch3_hub1\n  \n*label ch3_bombing_scene\n*set hub+1\n*set bombing \"true\"\n\nDowntown Paradigm is nothing like the walled town of the Academy that you grew up in and has very little in common the history-laden streets of New York. It's a sleek thing, built to be new, to set the cutting edge for the foreseeable future, and then brightened by the peoples of Polynesia and the African diaspora. Compared to the outer fringes of the island-city, where Sentinel had claimed - and you had plainly seen - that law was breaking down, downtown still has all the grandeur that one would expect from the so-called City of Legends.\n\nThat is, until your eyes return to the blasted windows and charred facade of the GenTech clinic.\n\nCourser, Chevalier and Anima hang around you. You hear Chevalier sigh.\n\n\"Man. Who'd blow up a clinic? What's the point?\"\n\nCourser nudges a shard of glass with his boot. \"This isn't the first time it's happened. It's not about the clinic, but what it represents, y'know?\"\n\n\"Come on, man, this place helps people.\"\n\n\"Or used to,\" Anima says.\n\n\"I'm not arguing that - but sometimes I think that, all this regulation? It's not about us, it's about them and us, if you get what I'm saying?\"\n\n*fake_choice\n  #\"But it's a clinic. No matter your political axe to grind, you don't go there.\"\n    *set chevalier_relationship %+10\n    Courser protests, \"All I'm saying is, maybe it'd help if we think about the why of it. No one just blows things up because they can. That's movie stuff.\"\n    \n    \"Let's not legitimise a terror-bombing with some kind of rational think-talk,\" Chevalier says.\n    \n    You lead the team inside.\n  #\"It's a symbol of empowered regulation - no wonder someone blew it up.\"\n    *set courser_relationship %+10\n    \"Exactly,\" Courser says. \"Now, I'm not saying it's right but I'm saying there's a lot of people out there. Scared people, on both sides of the divide.\"\n    \n    \"I didn't know there was a divide,\" Chevalier replies.\n    \n    \"You just need to look at history, man,\" Courser says with a small shrug.\n    \n    You lead the team inside.\n  #\"Now's not the time or the place for a pol sci discussion.\"\n    That reminder silences your team as you head inside.\n   \n\"Okay,\" you say, as much to keep that 'discussion' tabled, as to get their attention. \"What're we looking at here, team?\"\n\nIt's a good question. The lobby is a mess - ceiling half-collapsed in, lights dangling by electrical wires like a line of hanged men, charred flooring, waiting room chairs burnt and melted.\n\nStrange, though. It doesn't look as bad as it did from the outside.\n\n\"Looks like an exploded office to me,\" Chevalier puts in.\n\n\"Power remains,\" Anima states, from behind the remnants of the reception desk, as disconcertingly quiet as always. Just when did she get there?\n\nCourser stands off to the side, deep in thought. \"Someone grok me this,\" he says, all of a sudden. \"It's a bit weird that no one died, right? What, did they just blow this place up in the dead of night?\"\n\n\"Thank God for squeamish terrorists?\" Chevalier suggests.\n\nYou get to work.\n\n*page_break\n\n\"I don't get it,\" Chevalier says after a good hour of examination. He leans on the burnt reception desk, brow furrowed. It reminds you far too much of a confused puppy.\n\n\"What else is new?\" Courser ribs him.\n\nYou understand Chevalier's concern. There's no sign of any casualties, backed up by the report from Sentinel's team. All of the equipment is still operational, ready to be used if there were only staff and patients. Speaking of the patients, none of the files have been destroyed either. \n\n*if brains >2\n  *set ch3_false_flag \"true\"\n  *set chevalier_relationship %+10\n  *set courser_relationship %+10\n  If there was a political motivation here, then the erstwhile firebug did a bad job of it. You're smart enough to see it. It might just mean that this was a ploy, designed to imitate a certain ideology. A false flag.\n  *goto bombing_scene2\n  \n*elseif bravado >2\n  *set ch3_false_flag \"true\"\n  *set chevalier_relationship %+10\n  *set courser_relationship %+10\n  If there was a political motivation here, then the erstwhile firebug did a bad job of it. You've got enough idea of how to influence people to see it. It might just mean that this was a ploy, designed to imitate a certain ideology. A false flag.\n  *goto bombing_scene2\n\n*else\n  But maybe you're just overthinking it.\n  *goto bombing_scene2\n  \n*label bombing_scene2\n\n\"Maybe they just wanted to blow it up, Chevy,\" Courser suggests. \"You know that's how some of the old guard worked.\"\n\n\"Yeah, but they never targeted clinics or hospitals. That's a new thing. That's a post-Golden thing. And when they do, you know about it.\"\n\nYou're about to say something when, at the windows, Anima speaks.\n\n\"They approach.\"\n\n*page_break\n\nOutside, a pair of gold and silver figures stand. Not Sentinel - ${senhis} subordinates.\n\n*if met_mirage = \"true\"\n  You recognise Mirage's domino mask, though - even if the woman herself looks nothing like you remember from the Wu residence. But that's to be expected with her power. The other is a man holding a hammer that's as big as he is, and a matching intimidating set of armor girds his person. Phaestus - Sentinel's technological expert and one of the so-called old guard.\n  *goto ch3_meet_heph  \n  \n*else\n  A woman in a domino mask whose appearance unsettles you for some reason you can't express - that's Mirage. The other is a man holding a hammer that's as big as he is, and a matching intimidating set of armor girds his person. Phaestus - Sentinel's technological expert and one of the so-called old guard.\n  *goto ch3_meet_heph\n  \n*label ch3_meet_heph\n\nPhaestus' voice, amplified by some speaker system in his helmet booms out, \"SHOW YOURSELVES.\"\n\nAfter a moment's deliberation, you do.\n\n*page_break\n\nPhaestus stands in the middle of the street, flanked by Mirage. His bearing is of someone wanting a challenge, the massive head of his hammer resting on the road, the haft held casually in one hand.\n\n\"SOLAR,\" he says, making the word sound like an insult. \"I should have known you would be here.\"\n\n*fake_choice\n  #\"You're interfering with an official investigation.\"\n    \"I don't care,\" Phaestus replies. \"I'm busy with my own investigation into this incident. You will leave, at once.\"\n  #\"We're busy. Is there something we can help you with?\"\n    \"You can help me by leaving this place, immediately,\" Phaestus replies.\n  *if brains >1\n    #\"Phaestus. Hephaestus, right? I always heard he had a limp - does that track to you accurately?\"\n      You can't read him under the helmet, but you swear you see him bristle.\n      \n      \"Your attempts at humor are ill-advised. You will leave, immediately.\"\n\n\"Are you serious?\" Chevalier replies. \"We're on SOLAR business - our jurisdiction supersedes your own.\"\n\n\"It does, perhaps. Officially,\" Phaestus intones. That word, too, sounds like a threat. \"But unofficially, it is worth less than my hammer. Chevalier, I am aware of your invulnerability threshold. My hammer supersedes it. The rest of you are no threat to me. Leave, lest I find an excuse to send you back to your Captain, broken and crushed.\"\n\nHe goads Chevalier but it is Anima who steps up. Chevalier grabs her hand. \"Don't do anything stupid,\" he hisses to her.\n\n*if ch3_false_flag = \"true\"\n  *achieve ch3_cluetwo\n  \"It's fine,\" you say. \"It's fine. We're leaving. Besides, I think we got what we came for anyway.\"\n  \n  They follow you to the end of the block, and you wonder if Phaestus knows what you know.\n  \n  You can't help but think that his timing was awfully coincidental.\n  *goto ch3_hub1\n  \n*else\n  \"Let's go, team. We'll let the golden knight here try and fix this without our help.\"\n  \n  They follow you, even if Chevalier mutters something under his breath about it.\n  *goto ch3_hub1\n\n*label ch3_interrogations\n*set hub+1\n*set criminals \"true\"\nYou've never interrogated someone before.\n\nIt's one of those thoughts that you think will always stay constant, until you get the unsettling realisation that it's just as malleable as anything else.\n\nYou've never interrogated anyone before, but you're about to.\n\n*page_break\nIt's been a slow day. One by one, Chevalier, Blueshift, Courser and Anima bring in a selection of costumed villains from the greater Paradigm area. Some wear makeshift things - a painted motorcycle helmet and leathers - some, those who've been in the game longer, wear handmade costumes. Some have names that work, others have ones that roll your eyes (\"Steeler, because he steals,\" Aegis had said, doing just that.) \n\nOne by one, you, Aegis and Al-Jinn have been trying to get answers out of them.\n\nUnfortunately, your technique doesn't seem to be working as well as it should. You've been relying on...\n\n*fake_choice\n  #Being the good cop - trying to make them see the benefit in helping you.\n  #Being the bad cop - trying to intimidate them so they feel unable to resist you.\n  \nIt hasn't been working. Now, you and the other two stand outside the makeshift interrogation room, letting your final suspect - a woman with the cape name of Misschief - stew in the room for a while longer.\n\n\"We haven't got shit,\" Aegis declares. \"But I refuse to believe that none of these criminals know nothing about this crime wave. We need a plan.\"\n\n\"They might think we're desperate,\" Al-Jinn supposes. \"With all three of us in the room, all three of us from SOLAR, they might have the resolve to stonewall us.\"\n\n\"In that case,\" Aegis says, turning to you. \"${cape_name}, you can handle this by yourself. We'll be outside if you get into trouble.\"\n\nYou open the door and step inside.\n\n*page_break\n\nMisschief - which the owner probably finds quite acerbic, you reflect - sits on the opposite side of a metal table. Your eyes catch on her ridiculous pigtails which clash with the sheer intimidating physique she possesses. You've read her file - second-generation empowered, second-generation Paradigm resident, list of minor misdemeanours across the island but no real record worth chasing her down for - and yet you're sure she could snap Chevalier in half.\n\n\"What's the problem, officer?\" she asks.\n\n\"You might've heard about a string of murders and bombings. I'm here to put a stop to it. I figure we can talk about things without my partners in the room.\"\n\n\"Don't I get a lawyer?\"\n\n\"Not when SOLAR's involved.\"\n\nYou take a moment to assess your next move. You could try leaning on her with your brawn or your intellect - of maybe just hope that she wavers in the face of your bravado...\n\n*choice\n  #Try to bad cop her with intimidation.\n    \"And trust me, we can do a lot worse than holding you in a room for a few hours.\"\n    \n    \"That's bull- I haven't killed anyone!\"\n    \n    \"We have you pegged at the areas of these crimes on the days they were committed. My superiors want someone to be brought in for this. If I can't find anyone else...\"\n    \n    You trail off, for effect.\n    \n    *if (brawn >2) or (bravado >2)\n      *set ch3_misschief_data \"true\"\n      Misschief watches you. You see it in the slump of her shoulders first - she cracks, and she talks.\n      *goto ch3_post_interrogation\n    *else\n      Misschief smirks. \"You're bluffing.\"\n      \n      And, unfortunately for the interrogation, you are. That steel table would melt before Misschief does.\n      *goto ch3_post_interrogation\n    \n  #Try to good cop her with persuasion.\n    \"But trust me, I'd rather get those handled without anything getting any worse. I really do just want to talk.\"\n    \n    \"I haven't killed anyone.\"\n    \n    \"But you were there in those areas on the days where these crimes were committed. We're not accusing you of them - we just want to know if you saw anything, heard anything. No one else is able to, or willing, to help us. But you can.\"\n    *if (bravado >2) or (brains >2)\n      *set ch3_misschief_data \"true\"\n      Misschief watches you. You see it in the slump of her shoulders first - she cracks, and she talks.\n      *goto ch3_post_interrogation\n    *else\n      Misschief shakes her head. \"I don't know anything, really. No matter how long you hold me here, it's going to be the same. I don't talk to capes.\"\n      \n      And, unfortunately for the interrogation, she's able to hold to that, even when Aegis barges in with all the fire and fury she can muster. The steel table would melt before Misschief does.\n      *goto ch3_post_interrogation\n      \n*label ch3_post_interrogation\n\n*if ch3_misschief_data = \"true\"\n  *set aegis_relationship %+10\n  *achieve ch3_cluethree\n  As Misschief is escorted from the precinct, you meet with Aegis to tell her what you know.\n  \n  \"Turns out the rumors of an old villain making a play for Paradigm are true,\" you say. \"At least, that's what Misschief says. She didn't know much about the bombings or the murders - but she says that there's been sightings of a woman with severe facial scarring, someone she's seen around Paradigm in a timeframe that matches these incidents.\"\n  \n  \"No one I recognise by memory,\" Aegis says. \"And she didn't go to Sentinel with this information because ${senhe}'s Sentinel and would've thrown the book at her, right? So, more bombings, more people die.\"\n  \n  \"There's one other thing,\" you say, even though you're trying to wrap your head around it.\n  \n  *page_break\n  \n  Aegis turns to look at you, tucking some grey hairs behind an ear. Fallen out of place with the fire and brimstone routine.\n  \n  \"Misschief says someone on Sentinel's team is the one who told them not to talk.\"\n  \n  Aegis stares. \"What?\"\n  \n  \"Misschief-\"\n  \n  \"No, I heard. Are you sure? Are you damn sure?\"\n  \n  You nod. \"She picked the voice but they weren't in their uniform. A ${man}, said ${senhe} was dressed like a villain.\"\n  \n  \"So,\" Aegis says, \"Something's rotten in Paradigm Tower.\"\n  *goto ch3_hub1\n\n*else\n  *set aegis_relationship %-10\n  \"What a waste of time,\" Aegis says, as Misschief is escorted out of the precinct. \n  \n  \"We did our best,\" you say.\n  \n  \"Wasn't good enough. We botched this bad. Fucked up. I can't shake the feeling that someone got to them before we did. Told them not to talk.\"\n  \n  With that thought in your head, you soon find that you can't shake it either.\n  *goto ch3_hub1\n\n*label ch3_the_club\n*page_break\n\nYou're just about to give the report another editing pass when you hear a voice behind you.\n\nBlueshift stands there with Anima and Al-Jinn. All three of them are out of uniform. \"Surprised to see you still up,\" Blueshift says. \"Listen, the three of us are going to visit one of the nearby clubs, have a drink or two - celebrate the fine work we've accomplished so far. You up for it?\"\n\nWithout Chevalier and Courser? Since when would they miss out on a party? Something's up.\n\n*choice\n  #Go with Blueshift and Anima.\n    *set ch3_blueshift_mission \"true\"\n    *goto ch3_club_intro\n  #Don't go.\n    *goto ch3_no_club\n  #\"Does the Captain know about this?\"\n    *goto ch3_ask_if_aegis_knows\n    \n*label ch3_ask_if_aegis_knows\n\n\"No,\" says Blueshift, as matter of fact as usual. Blunt to a fault.\n\n\"I'm using her logic - keeping part of our operations more clandestine for the benefit of the investigation as a whole. I can't ask for permission on this but I will ask for forgiveness. Look, we're wasting time here - are you in or are you out?\"\n\n*choice\n  #Go with Blueshift.\n    *set ch3_blueshift_mission \"true\"\n    *goto ch3_club_intro\n  #Don't go.\n    *goto ch3_no_club\n  #Don't go - and report it to Aegis.\n    *goto ch3_snitch_aegis\n    \n*label ch3_snitch_aegis\n\n\"I'm sorry, Blueshift,\" you say, \"But I'm not going to go behind the Captain's back, not without a proper explanation.\"\n\n\"As you wish,\" he says, and stalks off, flanked by Anima and Al-Jinn.\n\nYou wait until he's gone, count for ten more seconds to make sure. And then you ponder your next move. It's late and you can't imagine the hell you'll unleash if you wake Aegis up at this hour - but still, she should know as soon as possible, shouldn't she?\n\n*choice\n  #Reconsider.\n    *goto ch3_reconsider\n  #Send Aegis an email.\n    *set ch3_player_emailed \"true\"\n    *set aegis_relationship %+5\n    *goto ch3_email_aegis\n\n*label ch3_email_aegis\n\nAn email will do fine, you decide. It's enough of a paper trail to ensure that she knows about it and that Blueshift's little midnight tryst will be followed up on. It's a short sharp message - Blueshift came to you with a mission, refused to mention any details, and had Anima and Al-Jinn with him.\n\nBut even now, you wonder what the purpose of it is. If it has anything to do with the web of complex issues that you've found yourself in since arriving in Paradigm City.\n\n*label ch3_reconsider\nYou're still musing over it, a few hours later, over a cup of coffee.\n\nAnd that's when you hear the door open.\n\n*page_break\n\nYou turn your gaze towards the door, surprised. You catch sight of Anima, lurching into the lobby, and when the moonlight strikes her face at just the right angle you wish it hadn't.\n\nHalf of her face is missing.\n*goto ch3_post_maekir\n  \n*label ch3_club_intro\n\n\"I'm in,\" you tell Blueshift. \"For better or worse.\"\n\n\"Excellent,\" he replies, actually smiling. For some reason, that doesn't fill you with confidence.\n\n*page_break\n\nAt the wheel of a car he claims is 'rented' but you're sure that he 'borrowed', Blueshift leads the way towards the forgotten parts of Paradigm City - the broken, derelict parts that you had glimpsed on the drive from the airport.\n\nThe night's gloom hasn't done much to improve the city's appearance.\n\nThere's very little conversation from the front seats - Anima is riding shotgun and you doubt her capacity for small talk. Al-Jinn sits opposite you, lost in her thoughts.\n\nEventually, Blueshift deigns to tell you the reason for this excursion.\n\n\"I have a former associate in a club nearby, one who got in contact with me about this series of murders we're investigating. I'm following up the lead.\"\n\n\"You don't need us all for that,\" you say.\n\n\"Wrong. I need deniability. We're four coworkers out for some late night revelry.\"\n\n*fake_choice\n  #\"Deniability? For what, exactly?\"\n    Blueshift's dark eyes glance at you in the rear-view mirror. \"We're being monitored,\" he says. \"And I'm not sure by whom.\"\n    \n    Blueshift leaves you to ponder that as he pulls up.\n  #\"Fine by me.\"\n    Just a few moments later, Blueshift pulls up, cuts the engine.\n    \nThe team files out.\n\n*page_break\n\nYou've seen enough movies to know that, even from the outside, this club is the kind of place where you keep one hand in your pocket. To keep tabs on your wallet, to look like you're armed - either one, really.\n\nIt's obvious that the premises has seen better days - graffiti has been sprayed over the walls and fences, and you swear you spy blood splatter on the sidewalk. Cigarettes litter the ground and the smoke of them is a haze around the main doorway, where a set of bouncers watch over the milling patrons, themselves looking like they're about three seconds from starting something.\n\n\"Act natural,\" Blueshift says.\n\nThat shouldn't be too hard, right?\n\n*page_break\n\nAs you reach the doors and the bouncers there, feeling like every eye is watching you, trying to figure out if you're a mark or not, whether they know you from somewhere or think they know you from somewhere, you stop short.\n\n*if ch1_camping_trip = \"true\"\n  *line_break\n  *goto ch3_fred1\n  \n*else\n  Nothing, just a trick of the light. You make it inside without issue.\n  *goto ch3_club_floor\n\n*label ch3_fred1\nThe bouncer who just checked the squad's ID. You recognise his thick neck, his squashed face.\n\n*if (ch1_talked_fred_down = true)\n\n  You remember talking him down from the brink of violence, when he had been spoiling for a fight for no reason other than who you are.\n  *goto ch3_fred2\n\n*if (ch1_fought_fred = true)\n\n  You remember the feeling of his fists on your body, hammering again and again.\n  *goto ch3_fred2\n\n*if (ch1_fought_fred_powered = true)\n\n  You remember the feeling of electricity around your fingertips, and the sensation of directing it at his chest.\n  *goto ch3_fred2\n\n*if (ch1_fought_fred = false)\n\n  You remember his taunts, his mockery echoing up the trail, behind and all around you.\n  *goto ch3_fred2\n\n*label ch3_fred2\nFrederic.\n\n*page_break\n\nHe's bigger now, but not any taller, giving him this strangely bulldog-like build, his black shirt stretched tight across his shoulders.\n\nYou catch his eyes and recognition kindles there.\n\n\"Say,\" he says, \"Don't I know you?\"\n\n*choice\n  #Yes - and remind him from where.\n    *goto fred_yes1\n  #Yes - remain noncommittal.\n    *goto fred_yes2\n  #No.\n    *goto fred_no\n    \n*label fred_yes1\n\n\"When I was sixteen, I met you in the Shawangunks. I was there with some friends, and so were you.\"\n  \n\"Oh, shit...\" Frederic murmurs, eyes going wide.\n\n*if ((((ch1_fought_fred = true) and (ch1_fought_fred_lost = false)) and (ch1_fought_fred_powered = false)))\n  \"Remember? You thought you'd insult me and my friends. I hope you're not going to do the same thing tonight. Because I'd happily lay you out again. See, you were my very first encounter with the persecution that's dogged people like me for years, Frederic. I've never forgotten you or your petty hatred.\"\n\n  Frederic just stands there. \"I wanted to say I'm sorry,\" he says.\n  \n  The admission comes as a brief shock, but who knows if it is sincere - or if it makes up for everything he did.\n  *fake_choice\n    #Forgive him.\n      *achieve fr d Blueshift is all but frogmarched towards the back of the club.\n\nIt draws attention but it seems like it's the kind of attention that lures people to look away, to not look closely. The bartender even mixes you a drink and, when you go to pay, advises you something in Spanish.\n\n'On the house' is the assumed meaning.\n\nYou find yourself wondering what's going on here and fighting down the surreal feeling that you've been led into a den of lions.\n\nAnd they're starting to wake up.\n\n*fake_choice\n  #Have another drink.\n    Or you're just being paranoid, it's hard to tell.\n    \n    You wave the bartender over, order another drink.\n    \n    This time, you have to pay. There are limits to your host's hospitality, it seems.\n  #Act natural.\n    Maybe you're just being paranoid.\n    \n    You try to put it from your mind, and enjoy the cooling atmosphere of your host's hospitality, whoever they are.\n  #Brace yourself.\n    Mentally, you ready yourself - check for escape routes, how many people are there, how many more might rise from their seats if you have to break for it..\n    \n    You'll be ready for anything, no matter the 'hospitality' of your host.\n    \n*page_break\n\nTime passes, you're not sure how long. Blueshift's been gone for a while and it occurs to you that he didn't mention how long it should take. It might be worth finding him - but without any sort of distraction, that's going to be difficult without being noticed.\n\nA band has started up on the stage, some kind of pop-rock thing about a magical frog. It's not bad, all in all, but feels out of place in the rough, smoky atmosphere.\n\nAnima stands at the far side of the bar, looking as blandly disinterested as always. The eyes on her are met with the same lack of care, the same lack of feeling. A man wanders towards the bar, settles in next to her, as if it was an afterthought that wasn't planned.\n\nAl-Jinn steps up next to you, distracts you.\n*if ch2_solar_romance = \"aljinn\"\n  She
