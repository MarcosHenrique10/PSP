rything twists around you, you realise that you're heading into the city park.\n  #Put Sentinel through to reception - literally.\n    *set sentpower+1\n    *set sentinel_hp -Brawn\n    You have to stay on ${senhim}. You can't let up, even for a second. If you can keep ${senhim} busy then maybe, just maybe, there'll be a way to stop ${senhim}.\n    \n    For now, that giant marble desk at one end of the lobby will do.\n    \n    Battering aside a series of blows from Sentinel, you heft ${senhim} high and bring ${senhim} down on the marble structure, head first, and send ${senhim} crashing through it.\n    \n    For a moment, the air is filled with marble dust. Sentinel hurls one of the broken ends at you. As you catch it, ${senhe} punctuates the point with the end of ${senhis} boot - the force sends you flying, crashing into Paradigm Park.\n  #Outwit Sentinel and evade ${senhim} for as long as you can.\n    *set sentbrains+1\n    *set sentinel_hp -Brains\n    You duck around Sentinel's viper-quick strikes, giving ${senhim} only air for ${senhis} trouble. There's certain patterns there that you can see - it's obvious now, ${senhe}'s never had to fight someone on an equal footing. At least, not for a long time. And when would ${senhe}, with powers like ${senhe} has?\n    \n    You slip around ${senhim} again, until just the right opening appears for you to strike. Your foot finds ${senhis} chest and you draw on ${senhis} energy to flip backwards, kicking off ${senhim} with your other foot. It's a good idea, certainly, but Sentinel grabs your foot and hurls you through a pane of glass.\n  #Draw power from the generators beneath your feet and smite Sentinel.\n    *set sentpower+1\n    *set sentinel_hp -Power\n    You reach out and suck everything you can from the generators, a vortex of electrical charge.\n    \n    Sentinel kicks out at you and you whirl around it, planting your palms on ${senhis} chest.\n    \n    The moment you do so, the whole lobby explodes - and Sentinel is launched away from you, a pair of smoking handprints on ${senhis} chest armor.\n    \n    You take to the air after ${senhim} but it appears that Sentinel was waiting for you - ${senhe} lashes you with a hard right and ${senhis} victorious cry echoes in your ears as your body churns up the grass of the city park.\n\n*label fightpark\n*page_break\n\nYou pick yourself up, hauling yourself out of a jagged gouge in the earth. Sentinel stands nearby, knee-deep in a manmade lake. The evening sun makes startling patterns through the tropical trees. The whole scene would almost be picturesque, if it wasn't the stage for shocking violence between two heroes.\n\n\"The Golden Age was never supposed to end, ${cape_name}!\" Sentinel shouts, \"We're supposed to be leaders and symbols - the guardians and enforcers of a new age! I [i]will[/i] restore it!\"\n\nWhile ${senhe}'s talking, ${senhe}'s distracted.\n\n*fake_choice\n  #Appeal to Sentinel's decency with a grand speech.\n    *set sentinel_hp -Bravado\n    *set sentbravado+1\n    \"It'll never work, Sentinel! Look around you! This destruction is why it had to end! You were a hero, you can still stop this!\"\n   \n    \"It's all because of people like you! Because of what they made us into!\" Sentinel snaps back, and ${senhe} launches from the lake surrounded by a halo of water.\n   \n    You meet ${senhim} halfway and the energy of the contact distorts the air, running through you like a bass line. It's just enough of a distraction for Sentinel to catch hold of you and hammer away at you, over and over again, before hurling you in the direction of downtown.\n   \n  #$!{senhe} might be invulnerable but ${senhe} probably still needs to breathe! Hold ${senhim} under!\n    *set sentpower+1\n    *set sentinel_hp -Brawn\n    Invulnerable doesn't mean immortal, that's what Chevalier had once said.\n\n    As the final word leaves Sentinel's lips, you hammer with a flurry of blows. A kick to the knees sends ${senhim} down and a foot to the chest keeps ${senhim} under. $!{senhe} thrashes at your legs.\n\n    The water ripples.\n\n    The lake explodes around you as Sentinel leaps free, too strong to contain for a second longer. Roaring, Sentinel's fists find your chin, your cheek, and the sheer force of the blows sends you flying.\n  #Blast the lake with lightning and fry ${senhim}!\n    *set sentpower+1\n    *set sentinel_hp -Power\n    That's a simple tactic - water conducts electricity and you intend to make Sentinel pay for ${senhis} tactical blunder.\n   \n    The lake lights up as you pour energy into it, churning the still waters with your own current. Sentinel seizes up for a second or two and, for a moment, it seems like you've got ${senhim}.\n   \n    But the silver-and-gold hero must draw power from pain or rage and ${senhe} finds some way to rip ${senhim}self free and into the air. Before you can beam ${senhim} again, Sentinel headbutts you and, while you blink away stars and sunbursts, ${senhe} throws you down the central boulevard.\n\n*label fighttown\n*page_break\n\nYou land in the downtown district, just managing to catch yourself before you take out a bus.\n\nSentinel's not even a second behind. $!{senhe} lands some distance away.\n\nA strange calm descends over you. Somehow, you know that this is it. Sirens squeal in the distance but they sound so far away. In the shadow of Paradigm City's skyscrapers, lit by neon billboards and city lights, the whole situation seems like something out of a dream.\n\n\"You should have seen it, $!{first_name}...\" Sentinel spreads ${senhis} arms, as if to encompass the whole city - the whole world. \"All of this, at our fingertips. At our behest. We walked across the globe like giants, making everything right. Think of all the problems we solved, of all the villains we put down! And how did they repay us?! With blood and murder and registration and regulation!\"\n\nWas this what the Golden Age was? Demigods doing battle over petty grudges and differences of opinion?\n\nSentinel reaches up and removes ${senhis} broken, battered helmet. It drops to the asphalt with a heavy clang. $!{senhe}'s bruised and bloody and yet looks so much like you. $!{senhis} fists ball and ${senhis} feet twist, and ${senhis} power ebbs away - awaiting ${senhis} next surge.\n\n$!{senhe}'d been your hero, once.\n\n*fake_choice\n  #Shout at everyone to get clear and hold Sentinel off as best you can.\n    *set sentinel_hp -Bravado\n    *set sentbravado+1\n    \"Run!\" You shout to the people in the bus behind you and, as Sentinel charges, the one thing you're aiming to do is to keep them safe.\n    \n    You bat ${senhim} away, again and again, keeping the fight contained to the street - which means keeping Sentinel close. And ${senhe} takes that opportunity to exact ${senhis} vengeance, hammering away with ${senhis} fists and elbows, ${senhis} feet and knees.\n    \n    More and more, those blows are getting through. Whatever that surge of power you had was, it's fading.\n    \n    But you can't give in. You won't.\n    \n    You absorb all of the energy coming in from Sentinel's punch, and send it right back to ${senhim} when your foot meets ${senhis} temple...\n  #Now or never - end this with a flurry of blows.\n    *set sentpower+1\n    *set sentinel_hp -Brawn\n    The only way to keep those people safe is to hammer Sentinel into the ground.\n    \n    And you do so without giving ${senhim} a moment's respite. $!{senhe} meets you strength for strength, as driven as you are, as insistent on finishing this as you are, and ${senhis} blows begin to stagger you. It seems impossible but, as ${senhis} knee finds your stomach and sends the air whoofing out of your lungs, you know it to be true.\n    \n    Whatever that surge of power you had was, it's leaving you.\n    \n    But you won't let Sentinel win. If you're going down, ${senhe}'s going to bleed for it.\n    \n    Without ${senhis} helmet, you focus your attacks on ${senhis} head.\n    \n    You realise you're on the right track as your fist slams into ${senhis} nose, and the cartilage buckles under your knuckles...\n  #Strike from the air in order to disorientate Sentinel and hit ${senhim} from several angles.\n    *set sentbrains+1\n    *set sentinel_hp -Brains\n    The only way to keep those people safe is to keep Sentinel disorientated. If ${senhe} likes to keep things within arms-length then there's no need to oblige ${senhim}.\n    \n    You take to the skies, blitzing Sentinel from multiple angles. Every time ${senhe} turns to find you, you're striking ${senhim} from somewhere else. You kick ${senhim} in the spine, attack ${senhis} joints - anything to stymie ${senhim}, if only for a moment.\n    \n    Suddenly, you waver in flight and Sentinel catches you with a right hook.\n    \n    Whatever that surge of power you had was, it's leaving you.\n    \n    You can't let things end here. Not when you're this close!\n    \n    You drop down on Sentinel from above, leading with your elbow.\n  \n  #Overwhelm ${senhim} with an unstoppable energy cascade.\n    *set sentpower+1\n    *set sentinel_hp -Power\n    Overwhelming firepower. Sentinel might be invulnerable but there's no such thing as an invincible enemy - all you need is the right kind of firepower.\n    \n    And here, surrounded by neon billboards and skyscrapers, there's no shortage of firepower for your abilities.\n    \n    You draw it in, focusing on it and calling it like remembering a song you've never heard - it comes easily.\n    \n    You direct it, like a conductor, into and [i]through[/i] Sentinel, and let it cascade relentlessly.\n    \n    And then there's a hitch, a brief hiccup - your power shorts out and the cascade cuts with it, but only for a second. It's enough warning that you know that your power is going to leave you. Whatever surge you got won't be with your forever.\n    \n    But you've still got enough power to end this.\n    \n    You let it wash through you, and arc it out from your fingers - seeking out Sentinel's core.\n    \n*if sentinel_hp \u003c6\n  *goto normalend\n  \n*else\n  *goto losingend\n\n*label normalend\n*page_break\n\nAnd with that final blow, Sentinel wavers.\n\nThe silver-and-gold legend drops to ${senhis} knees, one hand splayed across the broken asphalt. $!{senhe} spits up blood, one eye swollen and bloodshot. $!{senhe}  tries to stand but is unable to. Without the confidence of victory, ${senhis} powers have faded.\n\nYou lurch towards ${senhim}, your whole body aching, the last remnants of your power snapping and popping around your fingertips.\n\nOn ${senhis} knees, Sentinel stares at you, ${senhis} eyes wild and defiant.\n\n\"Do it,\" ${senhe} spits.\n\n*choice\n  #Apprehend ${senhim}.\n    *set classical %+20\n    \"And prove you right?\" You retort, \"That all of us in SOLAR are thugs and jackboots? No. This is about more than me and you. We can still be symbols - and we can do it for the right reasons.\"\n\n    \"How disgustingly naive,\" Sentinel replies, slurring slightly. \"You really think you've won...\"\n    \n    The sirens blare loudly now and the screech of tires announces the arrival of what must be a whole platoon of PCPD officers, girded for war. \"Freeze!\" they shout, weapons trained on Sentinel. \"Don't move!\"\n    \n    You wait there while they slap Sentinel with a set of nullifier cuffs and load ${senhim} into a secure vehicle, all of the officers keeping their distance from you. Sentinel spares one final look at you as the door slams closed.\n    \n    Finally, you exhale.\n    \n    Time to find your team.\n    \n    *finish Chapter VI: Apotheosis\n    \n  #Kill ${senhim}.\n    *set ch5_sentinel_dead \"true\"\n    *set classical %-20\n    *achieve deicideaward\n    \"With pleasure,\" you seethe.\n    \n    Sentinel breaks easily in your hands - all it took was one final blow - and you let the corpse drop to the shattered roadway.\n    \n    The sirens blare loudly now and the screech of tires announces the arrival of a whole platoon of PCPD officers, girded for war. \"Freeze!\" they say, training their weapons on you and on what used to be Sentinel. \"Don't move!\"\n    \n    You wait there until they've confirmed the death. Some of the officers congratulate you, others stare at you with open hatred - who knows how well they'd known the caped hero. But all of them keep their distance.\n    \n    Finally, you exhale.\n    \n    Time to find your team.\n    \n    *finish Chapter VI: Apotheosis\n\n*label losingend\n*page_break\n\nYou land your blow on Sentinel and ${senhe}...\n\n...doesn't even notice.\n\nNo matter what you do, ${senhe} just keeps coming.\n\nWith a feral snarl, Sentinel casts you aside like you're nothing but a broken doll - you slam into a sedan and the blow crushes you into the engine block. It hurts, far more than anything else yet, and you cough up blood. A sharp pain spikes through your side.\n\nSentinel advances upon you, taking each step with deliberate precision. Behind ${senhim}, in the windows of the bus, people stare at you, aghast.\n\nYou've failed them.\n\nYou call your power one final time, letting your awareness spread until you're drawing from whatever source you can pull from. Energy surges through you and into your hands, enough for one final strike.\n\nThere's nothing else you can do.\n\n\"Sentinel!\" You scream, energy building in your hands. It arcs wildly, beyond anything you can control.\n\n\"STOP!\"\n\n$!{senhe} takes another step.\n\n*choice\n  *selectable_if (goodend = 2) #Apprehend ${senhim}.\n    *goto impossible\n  *selectable_if (goodend = 2) #Surrender.\n    *goto impossible\n  *selectable_if (goodend = 2) #Call for help.\n    *goto impossible\n  #Kill ${senhim}.\n    It's so bright. Sentinel is just barely perceptible, visible only because ${senhe} moves, and that changes the light.\n    *choice\n      #There must be another way...\n        *achieve badend\n        You hesitate.\n\n        Your opponent doesn't.\n\n        Sentinel grabs your head in ${senhis} grip, screaming wordlessly. A single slam against the engine of the sedan disrupts your power and makes it hard to think. There's a brief twisting sensation, a flash of pain and then - mercifully - nothing at all.\n        *goto_scene ending\n\n      #...there is no other way.\n        *set ch5_sentinel_dead \"true\"\n        *achieve deicideaward\n        You direct that energy straight into your opponent, pulling enough energy from the surroundings that everything goes dark beyond what the setting sun provides.\n\n        And all of it arcs into Sentinel.\n\n        $!{senhe} doesn't stop, not for three more paces. And then ${senhe} staggers, and light pours from ${senhis} eyes and mouth - the air becomes thick with the smell of scorched flesh and burnt hair.\n\n        And then ${senhe}'s just... gone, utterly reduced to naught but ash.\n\n        You drop to your knees, utterly spent - physically, mentally, emotionally.\n\n        You pitch forwards. It's a relief when darkness finds you.\n      \n        *finish Chapter VI: Apotheosis\n        \n*label impossible\n*finish", "screenshots": "*comment choicescrip intended for use with the publicity screenshots requirement. screenshots are taken from chapters 1 and 2.\n\nscreenshots\n*script window.animateEnabled = false;\n*page_break\n*script changeBackgroundColor(\"sepia\")\n\n*comment scene 1\n*label scene1\n*set title \"Ms.\"\n*set first_name \"Constance\"\n*set last_name \"Harrison\"\n*set cape_name \"Voltiac\"\n*set Age 18\n*set Gender \"Female\"\n*set Brawn 1\n*set Brains 2\n*set Bravado 2\n*set Power 3\n\nYou're six years old.\n\nFor as long as you can remember, you've lived in the walled city the locals refer to as Capetown. Of course, that's not the proper name - that's The United Nations Academy for Powered Development and Education - but Capetown seemed to stick.\n\nYou're six years old and it's playtime. Or 'self-directed learning time', as your caretakers and teachers have put it.\n\nYou are...\n*fake_choice\n  #A boy.\n    *goto scene2\n  #A girl.\n    *goto scene2\n  #Not so easily defined.\n    *goto scene2\n\n*comment scene 2\n*label scene2\n*script changeBackgroundColor(\"black\")\n\nYou've lived in Capetown your entire life and your parents are little more than a pieced together recollection, like reassembled glass. There are many kids here who know their parents in a similar fashion. Some are lucky enough to have them come visit. But not you. All you've got are memories, vague imprints from a life you're not sure you ever lived.\n\nEventually, you came to understand that...\n*fake_choice\n  #Your parents were unprepared to raise a child like you.\n  #Your parents felt that Capetown was the best place for you.\n  #Your parents were dead.\n  \n*goto scene3\n\n*comment scene 3\n*label scene3\n*script changeBackgroundColor(\"sepia\")\n\nYou need to handle this.\n\nYou step past whatever invisible demarcation line separates the us and the them, drawing attention from both sides.\n\n\"What're you gonna do, freak?\" Frederic sneers, looking right at you. With his fists balling and his feet shifting in that subtle way that heralds danger, he's obviously spoiling for a fight.\n\nAnd you...\n*choice\n  #Attack him - with your powers!\n    *goto scene4 \n  #Attack him - without your powers.\n    *goto scene4 \n  #Talk him down - there's no need for violence.\n    *goto scene4 \n  #Let him go - it wouldn't be worth it. \n    *goto scene4\n\n*comment scene 4\n*label scene4\n\nYou wake up.\n\nIt's been barely a week since you graduated from Cadet School in Capetown and found yourself adrift. No cape, just a uniform. No city, just a sprawling government facility in Geneva. No saving the day, just orders. On a morning like this, staring at the unfamiliar ceiling of SOLAR HQ, you might wonder if any of it was worth it.\n\nYour room is remarkably spartan - after all, you haven't had much time to settle in yet since you only arrived last night. You brought what little you could and arranged it on what little surfaces you had available, to bring just a little touch of home to the bare institutional walls.\n\nWhat do you cherish bringing most of all?\n\n*choice\n  #Your Cadet School mixed martial arts trophy.\n    *goto scene5\n  #A photo from your Cadet School graduation.\n    *goto scene5\n  #A collection of superpower research literature, organised alphabetically.\n    *goto scene5\n\n*comment scene 5\n*label scene5\n\nThe training room is back down the elevators, towards the basement areas of the SOLAR facility.\n\nThe SOLAR team - your team, you quickly remind yourself, as strange as that sounds - waits in the assembly area. They're all making conversation, waiting for Aegis to arrive - just like you are.\n\nYou eyes wander over the crowd. It might be a good opportunity to get to know them, before you get thrown into this exercise that Aegis had mentioned. Whatever it is.\n\nYour new team stands around the assembly area, surrounded by the sibilant susurrus of quiet conversation. \n\n*fake_choice\n    #Talk to Courser - the poster boy.\n    #Talk to Chevalier - the tank.\n    #Talk to Al-Jinn - the telepathic medic.\n    #Talk to Anima - the fire support.\n    #Talk to Blueshift - the telekinetic analyst.\n\t\n*finish", "solar": "*temp courser_job \"blueshift\"\n*temp jinn_job \"chevalier\"\n*temp player_job \"anima\"\n*temp ch2_aljinn_assigned \"false\"\n*temp ch2_courser_assigned \"false\"\n*temp ch2_player_assigned \"false\"\n*temp flag_guard \"?\"\n*temp met_courser \"false\"\n*temp met_chevalier \"false\"\n*temp met_aljinn \"false\"\n*temp met_anima \"false\"\n*temp met_blueshift \"false\"\n*temp heard_plan \"false\"\n*temp meetcount 0\n*temp costumecount 0\n*temp helmetdone 0\n*temp torsodone 0\n*temp accdone 0\n*temp aegis1 0\n*temp aegis2 0\n*temp aegis3 0\n*temp aegis4 0\n\n[b]Chapter II[/b]\n*line_break\n[b]SOLAR[/b]\n\n[i]'As you get older it is harder to have heroes, but it is sort of necessary.'[/i]\n*line_break\n-Ernest Hemmingway\n\n*page_break\n\nYou wake up.\n\nIt's been barely a week since you graduated from Cadet School in Capetown and found yourself adrift. No cape, just a uniform. No city, just a sprawling government facility in Geneva. No saving the day, just orders. On a morning like this, staring at the unfamiliar ceiling of SOLAR HQ, you might wonder if any of it was worth it.\n\nYour room is remarkably spartan - after all, you haven't had much time to settle in yet since you only arrived last night. You brought what little you could and arranged it on what little surfaces you had available, to bring just a little touch of home to the bare institutional walls.\n\nWhat do you cherish bringing most of all?\n\n*choice\n  #Your Cadet School mixed martial arts trophy.\n    You took first place. Funny, the trophy seems much smaller now.\n    *if ch1_boxing_champ = \"true\"\n      *achieve alltrophies\n      *set brawn+1\n      *goto meetcourser\n    *else\n      *set brawn+1\n      *goto meetcourser\n  *if (ch1_camping_trip = \"true\") \n    #A photo from your senior camping trip.\n      It's certainly one of the things you remember most about the Academy. There you are, standing next to ${ocname}, all smiles. It feels like a lifetime ago.\n      \n      There's no time to reflect, however. You've got an appointment with your new CO.\n      *set bravado+1\n      *goto meetcourser\n  *else\n    #A photo from your Cadet School graduation.\n      You gave a speech when you graduated from Cadet School. The kind of speech where you need to please everyone and avoid actually saying anything. Still, everyone liked it well enough, and you like to think you pull formal wear off quite well, going by the photo.\n      \n      There's no time to reflect, however. You've got an appointment with your new CO.\n      *set bravado+1\n      *goto meetcourser\n  #A collection of superpower research literature, organised alphabetically.\n    In the end, your time at Cadet School led you to one salient point: there's plenty of theories about superhuman abilities and empowered individuals, but very little concrete, repeatable evidence. They exist, and there's plenty of information on them, but no one's quite sure where they came from.\n    \n    There's no time to reflect, however. You've got an appointment with your new CO.\n    *set brains+1\n    *goto meetcourser\n\n*label meetcourser\n\nLorna Ng-Mae - or Aegis, as her codename goes - had sent you an email the night before. It requested a meeting 'at your earliest convenience'.\n\nThe tone of it, even through text, made it clear that she wouldn't want to be kept waiting.\n\nLuckily, however, the SOLAR facility is obviously built for ease of use. But even with the plentiful amount of signs and glowing wall panels that indicate where you should be heading, you still end up turned around. Just as you realise that you're lost, a helpful and wholly synthesised voice asks you who you're looking for, sounding from somewhere above. \n\n\"Aegis,\" you say, and it gives you the floor and number of her office.\n\nIt's a few floors up from your current position but it's easy enough to find an elevator.\n\nYou step into the first available car. There's a man in there, dark-skinned with shaved black hair, wearing the deep blue uniform you've seen around the complex. The warm smile on his face is instantly disarming and instantly recognisable. You've seen this man before, on posters and ads. Courser, that's his name. One of the poster boys for the new generation of empowered paragons.\n\nCourser grins, wagging his finger at you as if in recognition. \"Hey, I think I've seen you before - Capetown, right? Yeah, definitely, a few years behind me!\"\n\n*choice\n  #\"That's right.\"\n    Courser smiles, the expression lighting up his entire face from his angular cheekbones to his bright blue eyes. No wonder he's SOLAR's poster boy - one of them, at least. \"I knew it! I never forget a face! The name's Damian, Damian Alexander. You're ${cape_name}, right? I've heard about you.\"\n    \n    \"That's me,\" you reply.\n    \n    \"Incredible, bumping into you here! Talk about luck! Jeez, I remember you - you were the ${guy} who\n    *if (ch1_boxing_champ = \"true\")\n      took home the boxing trophy, right?\" He mimes a few jabs.\n      *goto courser2\n    *elseif (ch1_party_animal = \"true\")\n      always knew how to get along with people, right? Made sure to get to all the parties? You'll be a hit with Chevalier.\"\n      *goto courser2      \n    *elseif (ch1_senior_academic = \"true\")\n      won all those academic awards, right? Everyone was talking about you, said you'd go far. And here you are, ready to use that brain for a better tomorrow.\"\n      *goto courser2\n    *else\n      debug\n      *goto courser2\n  #\"Sorry, mistaken identity.\"\n    *set ch2_lied_courser true\n    *set courser_relationship %-5\n    That grin doesn't quite leave Courser's face, but it does grow more brittle than it had been. \"Whatever you say, friend,\" he says, bumping his shoulders up.\n    \n    His stop comes up first. As he leaves, he remarks over his shoulder, \"But don't lie to the Captain. She'll rake you over some mean coals, if you catch my drift. Be seeing you.\"\n    *goto meetaegis\n\n*label courser2\n*line_break\n*line_break      \nYou smile, sheepish. \"The one and only.\"\n    \nCourser nods again. \"Incredible.\" The elevator dings. \"Listen, I'd love to stay and chat and play catch up all day, but this is my stop.\" He slugs you on the shoulder as he steps out.\n    \nHe hovers just outside, holding the elevator door open. \"Listen, don't let the Captain get under your skin. She's rough but this whole thing? It's a test, we've all gone through it. We'll bump into each other soon, I'm sure!\"\n    \nHe steps away and the elevator sighs closed, resuming its ascent.\n*goto meetaegis\n\n*label meetaegis\n*line_break\n*line_break\nThe rest of the journey is in silence.\n\n*page_break\n\nThe elevator doors open and you step into a hallway, one that's rather similar to all the other ones you've seen in this facility.\n\nYou move down the hall, stepping past uniformed men and women who give you a variety of glances, but none who recognise you like Courser did. You keep your eyes peeled for door number 512.\n\nThere.\n\nThe door sighs open automatically as you approach. It isn't locked but a brief glance inside confirms that Captain Ng-Mae isn't in there, either.\n\nWeird. Maybe you should wait.\n\n*choice\n  #Wait - fools rush in.\n    *set aegis_relationship %+10\n    You wait outside, not prepared to invade Aegis' privacy - or, perhaps, risk invoking the wrath of your superior on your first day.\n    \n    There's the sound of footsteps from up the hall, the strange loping gait of someone with a limp. Turning, you catch a glimpse of a tall woman with all the hallmarks of someone from south-east Asia. Her black hair, tied back, is streaked with gray. She wears a frown and you can glimpse scars here and there, over her hands, on her cheek, just under the collar of her uniform.\n    \n    The name tag on her breast reads AEGIS.\n    \n    \"${cape_name}, yes?\" \n    \n    You nod.\n    \n    You catch a glimpse of what you take to be an approving look before she waves you inside.\n    *goto sit\n  #Go in - it might be a test.\n    *set ch2_rushed_in true\n    *set aegis_relationship %-5\n    You enter and find the room deserted of any life.\n    \n    A great desk dominates one end of the room with a desk plate that reads LORNA NG-MAE, CPT. There's a few other things - bookshelves, photos, a case of medals - that catch your eye, too.\n    \n    Well, since you're here, you might as well take a look before you settle in for the wait.\n    \n    *fake_choice\n      #Examine the desk.\n        You examine the desk. There's very little on it - an advanced computer that's built into the old wood, a pair of pill bottles (painkillers, it seems), a nameplate. That plate doesn't bear the logo of IPSA, strangely enough. In fact, you don't immediately recognise it.\n        *line_break\n        *line_break      \n      #Examine the shelves.\n        The shelves hold a variety of books and more than a few of those gaudy snow globes that one picks up as a souvenir when travelling. There's also a photo of six people, all in a similar uniform. You can easily guess that it's the Captain and her team - they all seem happy enough in the image. That's good, because you'll be joining them.\n        *line_break\n        *line_break\n      #Inspect the medals.\n        You take a look at the medals on display, kept in a secure case on one side of the office. There's not many there, and you don't recognise any of them, but it makes something clear - Captain Lorna Ng-Mae obviously did her job well. Maybe, in the future, you'll be able to ask her about them.\n\n        Something's weird about that, though - taking orders from a soldier for a job like this.        \n        *line_break\n        *line_break    \n    A cough from the doorway. You turn, suddenly sheepish, to find a tall woman with all the hallmarks of someone from south-east Asia standing there. Her black hair, tied back, is streaked with grey. She wears a frown that seems to be more intimidating than the scars you can spy on her hands and cheek.\n    \n    \"Do you always walk into offices uninvited, ${cape_name}?\"\n    *goto sit\n\n*label sit\n*line_break\n*line_break\nAegis moves to stand behind her desk, holding a military posture the entire time, despite her limp.\n\n\"Sit,\" Aegis tells you, although she remains standing.\n\n*choice\n  #Sit.\n    *goto aegisquestions_parents\n  #Remain standing.\n    *set aegis_relationship %-5\n    \"I said [i]sit,[/i]\" she remarks. Her eyes narrow and you gather that it is probably best to sit down before it gets any worse.\n    *goto aegisquestions_parents\n\n*label aegisquestions_parents\n*page_break\n\nAegis swipes a finger across her desk terminal. \"I have read your file, ${cape_name}. Screw it, ${first_name}, mind if I call you ${first_name}?\"    \n\n\"I-\"\n\n\"I wasn't asking. I've read your file, as I was saying. You've been in the Academy since birth, or thereabouts. That's not important. Facts don't interest me, I can pull up the entirety of your life if I so choose. If I wanted facts, I'd find Blueshift. What I want is to hear you talk. There's a lot in here-\" She taps the desktop, \"-that I want to talk about.\"\n\n\"Let's start with your parents, speaking of your birth. It can't have been easy\n*if (parent_status = \"alive_scared\")\n  having your parents give you to the Academy because they were afraid of you. Of course, it's not uncommon either.\"\n  *choice\n    #You can't blame them for being afraid.\n      \"It's normal to want to avoid things that scare you - even if that thing is your child. That's just human nature.\" For whatever reason, you feel a need to defend your parents, even if you never really knew them.\n      \n      \"Human nature's a strange thing, isn't it? Well, perhaps it is better this way,\" Aegis muses.\n      *goto aegisquestions_social\n    #It's a long time ago - it doesn't matter anymore.\n      \"It is what it is.\" You feel no ill-will towards your parents, but you're not about to defend them either. The past is the past and, all things considered, you might have made the same decision if you were under the same circumstances.\n      \n      \"Very zen, I like it,\" Aegis muses, \"Letting the past stay in the past.\"\n      *goto aegisquestions_social\n    #Who cares? They abandoned me.\n      \"I've done better without them.\" Have you truly put it behind you, or is there still a touch of bitterness there? Some days it is hard to tell.\n      \n      \"Seems like I've found a sore spot,\" Aegis muses.\n      *goto aegisquestions_social\n*elseif(parent_status = \"alive_distant\")\n  knowing that your parents cared for you, but still kept their distance. It'd make me wonder if they weren't just lying to me to make themselves feel better - oh, don't look at me like that, I'm speaking from experience.\"\n  *choice  \n    #They wanted what was best for me.\n      \"I am sure they thought it would be in my best interest to leave me there.\" Your parents might be distant, but you still feel that they would have been there for you if things had just been different. But they weren't, and so you can't hate them.\n    \n      \"You'll live, I'm sure,\" Aegis states.\n      *goto aegisquestions_social\n    #It's a long time ago - it doesn't matter anymore.\n      \"It is what it is.\" The past is the past, a collection of facts with no feeling behind it - this fact, at least. You feel no ill-will for your parents, but you're not about to defend them either.\n      \n      \"Very zen, I like it.\" Aegis comments, \"Letting the past stay in the past.\"\n      *goto aegisquestions_social\n    #Who cares? They abandoned me.\n      \"I've done better without them.\" Have you truly put it behind you, or is there still a touch of bitterness there? Some days it is hard to tell.\n      \n      \"Seems like I've found a sore spot,\" Aegis muses.\n      *goto aegisquestions_social\n    \n*elseif(parent_status = \"dead\")\n  having your parents die at such a young age. God, Collider... singularity bombs, miniature black holes. What a fucking mess. Ask Chevalier about it, if you get the chance - I heard he took him down.\"\n  *choice  \n    #You miss them.\n      \"It's hard sometimes, knowing they aren't there anymore, wondering if they'd be proud of me. Sometimes I wonder what they'd say.\" You're surprised by how much you just revealed. But, on second thought, it's probably there in your files, regardless.\n    \n      \"My condolences. I am sure it wasn't easy, but I want to know that you're not going to break down crying on Mother's Day.\" \n      \n      \"I'll be fine,\" you tell her.\n      \n      \"That was a joke. You are allowed to laugh.\"\n      *goto aegisquestions_social\n    #It was a long time ago, and Collider was brought to justice.\n      \"I barely even remember them and the man responsible was brought down, like you said,\" you reply. \"I don't think anything else matters.\"\n      \n      \"Well, my condolences. Justice was served and everything turned out right in the end. But when people die, ${first_name}, it's fine to care.\"\" \n      *goto aegisquestions_social\n    #They're dead - who cares?\n        \"I've never even seen bodies. They might as well have never even existed. So, no, it wasn't particularly hard,\" you reply.\n      \n        \"Regardless, I'm still giving you my condolences. I admire your resilience but it's also kind of fucked up - when people die, it's fine to care.\"\n        *goto aegisquestions_social\n        \n*label aegisquestions_social\n*page_break\nAegis swipes her finger again, bringing up another part of your file. Even upside down, you can glimpse the Academy logo - you'd recognise it anywhere.\n\n\"Capetown.\" Aegis says, letting the word hang in there air for one second, two... \"Hell of a name, really. Not one I've ever liked but, then, I've always found the place a bit strange. Like boot camp for dangerous preschoolers.\" \n\nShe nods to her desk. \"I've got a wealth of notes here - marks, academic reports, notes and comments from members of the faculty... But this caught my eye in particular. You\n*if (ch1_boxing_champ = \"true\")\n  were a boxing champion. I like that, I like fighters. \n  *if (bravado > brains)  \n    And you had no shortage of people ready to say good things about you - students and staff. That's always a useful skill but I do hope you can bring me something more useful than a silver tongue.\"\n    *goto aegis_choice1\n  *elseif (brains > bravado)\n    More than that, you achieved a lot of distinctions for your papers. Unfortunately, ${first_name}, you'll be doing field work. You'll need to repurpose those booksmarts into streetsmarts. I've got enough booksmarts from Blueshift. I get enough shit from him, too. Don't be like him.\"\n    *goto aegis_choice1\n  *else\n    But I don't want some bulldog pugilist, though - not on my team. Because, honestly, that's what I see here. Someone who can punch, and punch well, but that's about it.\"\n    *goto aegis_choice1\n\n  *label aegis_choice1\n  \n  *line_break\n  Aegis stares you down. \"So, level with me. Are you happy with how you spent your time while at the Academy? Practicing how to break a nose or two?\" \n  *choice  \n    #Yes.\n      You worked hard to earn that title, and all of your hard work paid off when it came to your final physical exams. No one could touch you.\n        \n      \"I am - I wouldn't have done anything differently.\"\n      \n      \"Really? No regrets in that whole time? Aren't you lucky,\" she muses.\n      *goto aegisquestions_camping\n    #No.\n      If you had your time again you might have spent more time getting to know your peers, or working on your studies. You were strong, athletic... but heroes aren't warriors, you reflect, there's more to it than that.\n        \n      \"I might have done a few things differently,\" you say.\n        \n      \"Well, lucky for you,\" she replies, \"my unit's the best hope for problem cases who need new beginnings. Yours truly, included.\"\n      *goto aegisquestions_camping\n      \n*elseif (bravado > brawn) and (bravado > brains) \n  spent a lot of time carousing. You were, apparently, the life of the party. I do hope you can bring me something better than a fucking silver tongue.\"\n  *line_break\n  Aegis stares you down. \"Are you happy with how you spent your time while at the Academy? Treating it like some private resort?\"\n  *choice  \n    #Yes.\n      You worked hard to get to know everyone, and all of your hard work paid off when it came to your final oral exams - your confidence was undeniable and won over even the toughest examiner, Ionoclast himself. You had the charisma that the world sorely needed, like the heroes of old. People liked you and, if they like you in the future, you might be able to end things without violence.\n      \n      \"I am - I wouldn't have done anything differently.\"\n      \n      \"Really? No regrets in that whole time? Aren't you lucky,\" she muses.\n      *goto aegisquestions_camping\n    #No.\n      If you had your time again you might have spent more time working on your physical strength, or working on your studies. It's well and good to be charismatic, but there'll always be times where talking things over doesn't work.\n      \n      \"I might have done a few things differently,\" you say.\n      \n      \"Well, lucky for you,\" she replies, \"my unit's the best hope for problem cases who need new beginnings. Yours truly, included.\"\n      *goto aegisquestions_camping\n  \n*elseif (brains > brawn) and (brains > bravado) \n  focused on your academic pursuits. No one could say you didn't hit the books. Unfortunately, ${first_name}, you'll be doing field work. You'll need to repurpose those booksmarts into streetsmarts. I've got enough booksmarts from Blueshift. I get enough shit from him, too. Don't be like him.\"\n  \n  Aegis stares you down. \"Are you happy with how you spent your time while at the school? Reading books because you couldn't read people?\"\n  *choice  \n    #Yes.\n      You worked hard to learn everything there was to know about empowered individuals and historical heroes and villains, and all of your hard work paid off when it came to your final written exams. \n      \n      \"I am - I wouldn't have done anything differently.\"\n            \n      \"Really? No regrets in that whole time? Aren't you lucky,\" she muses.\n      *goto aegisquestions_camping\n    #No.\n      If you had your time again you might have spent more time getting to know your peers, or working on your physical strength. Sometimes you wonder if there's any point to being smart if no one likes you, or if you can't defend yourself. Particularly in this line of work.\n      \n      \"I might have done a few things differently,\" you say.\n      \n      \"Well, lucky for you,\" she replies, \"my unit's the best hope for problem cases who need new beginnings. Yours truly, included.\"\n      *goto aegisquestions_camping\n      \n*else \n  becoming well rounded. It seems that you were equally good in your studies, socialising with your peers, and in physical pursuits - even if you were not the best in any of them. A regular fucking Jack of All Trades. There's not really anything in your academic history to recommend you to me.\"\n  \n  Aegis stares you down. \"So, level with me. Are you happy with how you spent your time while at the Academy? Just going with the flow?\" \n  *choice  \n    #Yes.\n      You worked hard to balance everything, ensuring a more complete understanding than locking yourself into any one field. Adaptable, flexible. All good things. \n      \n      \"I am - I wouldn't have done anything differently,\" you say.\n       \n      \"Really? No regrets in that whole time? Aren't you lucky,\" she muses.\n      *goto aegisquestions_camping\n    #No.\n      If you had your time again you might have spent more time specialising in one area, standing out. You were always the kind of person who'd blend into the crowd. Maybe that's going to come in handy at some point.\n      \n      \"I might have done a few things differently,\" you say.\n      \n      \"Well, lucky for you,\" she replies, \"my unit's the best hope for problem cases who need new beginnings. Yours truly, included.\"\n      *goto aegisquestions_camping\n      \n*label aegisquestions_camping\n\nAegis pauses for a moment, one hand slipping down to her obliques, pressing against her back. \n\n\"Old wound,\" she explains, catching you watching, \"Why I can't sit - that, and meetings are so much shorter when one person is standing, I've found.\"\n\nShe returns her gaze to the desk and the information there.\n\n*page_break\n*if (ch1_camping_trip = \"true\")\n\n  \"Now, tell me about that little incident when you were sixteen,\" Aegis says, bringing up a map of the hiking trail. \n\n  \"Apparently, you had a bit of a disagreement with a number of fellow teens up on the trail of Mount Wherethehell. I don't care about where it was or whose jurisdiction it was or details like that. What I want to know is that, when there was an argument and you\n  *if (ch1_fought_fred_powered = \"true\")\n    blasted him in the chest, what was going through your idiot head? \n    \n    \"That's a distinct violation of the regs, things that I thought you Academy grads were supposed to live and breathe - frankly, you're lucky they didn't put some black mark on your record. Maybe someone pulled strings, I don't know, but you could have killed some idiot because he said things you didn't like.\"\n    *goto aegisquestions_camping2\n  *elseif (ch1_fought_fred_lost = \"true\")\n    thought you'd lay him out, and - by all reports - got your ass kicked, what was going through your head? \n    \n    \"He said something you didn't like, so, you stepped up - and weren't prepared for him to back it up with his fists? You're lucky that the other recruit, O'Connell, was there to save your ass.\"\n    *goto aegisquestions_camping2\n  *elseif (ch1_fought_fred = \"true\") \n    thought you'd lay him out, and did, what was going through your head? \n    \n    \"What, did you think that just because someone said something you didn't like, called you a bad name, that allowed you to abuse your training and kick his ass?\"\n    *goto aegisquestions_camping2\n  *elseif (ch1_fought_fred = \"false\") \n    walked away. Just like that. Took the moral high ground and let the bigot tell all his friends that you were too chickenshit to stand up to him.\"\n    *goto aegisquestions_camping2\n\n  *label aegisquestions_camping2\n    \n  Aegis shakes her head. \"What the hell possessed you to do that?\"\n\n  *fake_choice\n    *if (ch1_fought_fred = \"false\") \n      #\"Fighting him wouldn't have proven anything.\"\n        \"Oh, don't give me that crap, it's too early in the morning,\" Aegis sighs. \"Listen, ${first_name}, you're going to be doing a lot of fighting from here on in, so, I hope you get used to the idea of it. That pissant of a kid didn't want to press the issue - luckily for him, probably. For all you know, beating him around might've taught him not to be such a little prick.\"\n        \n        \"Or it might have made him worse,\" you point out.\n        \n        \"I didn't know you were prescient, too.\"\n    *if (((ch1_fought_fred = \"true\") and (ch1_fought_fred_powered = \"false\")) and (ch1_fought_fred_lost = \"false\"))\n      #\"I couldn't let him get away with that, and our fists were the best way to decide it.\"\n        Aegis drops her voice an octave, verging on some kind of parody. \"Me beat him, me good. I'm not defending him, hell, I'm not even angry that you did fight him - just try not to sound like you came out of that fight missing a few hundred brain cells.\"\n    *if (((ch1_fought_fred = \"true\") and (ch1_fought_fred_powered = \"false\")) and (ch1_fought_fred_lost = \"false\"))\n      #\"I thought he needed his ass kicked.\"\n        \"Honesty,\" Aegis says, smiling. \"Refreshing. By the sounds of it, he did need his ass kicked. Between you and me, I won't cry any tears for a bigot. But you'll be running into a little of people who need their asses kicked,\" she continues, \"And some of them will be able to snap you in half. So, in the future, be discerning.\"\n    *if (ch1_fought_fred = \"false\") \n      #\"I had to step in to defuse things. It wasn't about morals.\"\n        \"Admirable,\" Aegis replies, \"But getting yourself lulled into what's practical can be a danger in this line of work. Sometimes taking the moral high ground is the only thing we can do, the only thing we should do, and damn the consequences.\"\n        \n        It feels like she's talking from experience.\n    *if (ch1_fought_fred = \"false\") \n      #\"You're right, I did take the moral high ground, and I'd do it again.\"\n        \"That's what I like to hear,\" Aegis says, a smile coming to her face. \"But this isn't a movie, ${first_name} - sometimes taking the moral high ground has consequences. Sometimes, you even get the benefit of being able to see them before they hit you. Sometimes.\"\n        \n        It feels like she's talking from experience.\n    *if (ch1_fought_fred_powered = \"true\")\n      #\"He got on my nerves - that shock was just a wake-up call.\"\n        \"If you give anyone else that kind of 'wake-up call' without my explicit consent or outside of a do-or-die situation, I'll make sure that the only uniform you wear from then on will be a janitor's, am I clear?\"\n        \n        You nod.\n    *if (ch1_fought_fred_powered = \"true\")\n      #\"I don't see why using my power on him is worse than punching him.\"\n        \"You know,\" Aegis comments, \"I'm inclined to agree. Even if I don't have powers, I don't see why you shouldn't just use them. I could kill you with a few things in this room, or with my hands. At the end of the day, blasting electricity is just a thing you do that I can't.\"\n         \n        Something sticks out to you about that. \"You don't have powers, but you're part of SOLAR?\"\n        \n        \"Long story,\" Aegis says, and moves on before you can press her on it.\n    *if (ch1_fought_fred_powered = \"true\")\n      #\"Regulations? Where were they when Fred was insulting me and my friends?\"\n        \"They were waiting for you about ninety miles away, behind some familiar walls, waiting to beat you with a fucking chair for that. You got off lightly,\" Aegis says.\n        \n        \"Regulations are important. But it's also important to know when to break them. Honestly, some pissant kid on a hiking trail? Not one of those times.\"\n    *if (ch1_fought_fred_lost = \"true\")\n      #\"I had to do something. Even if I lost, I stood up for myself.\"\n        \"That's important,\" Aegis says, nodding. \"The thing about morals is it doesn't matter if you win, it doesn't matter if the people in charge spit in your face because you did the right thing, it matters that you did it. You're the only one you need to justify it to.\"\n      \n  \n  Aegis rubs at her back, face twisting. \"Christ, let's wrap this up. Look, this is really just a prelude to the thing I really wanted to talk about.\"\n      \n  You can already guess what Aegis is referring to.\n\n  *page_break\n  *goto nyctalk\n\n*else\n  *goto nyctalk\n\n*label nyctalk\n*page_break\n\n*if (ch1_vigilante = \"true\")\n\n  \"Now,\" Aegis says, a little smile coming to her face, \"Tell me about New York. \n  \n  \"Tell me about ${vname}.\"\n\n  *page_break\n\n  Aegis taps a series of commands, bringing up a file image of ${vname}. $!{vhe} looks just like you remember, glowering at you from the wall behind Aegis, a particular brand of evil that's going to stick with you.\n\n  \"You, at the ripe old age of nineteen, decided to try and bring in an empowered murderer. Let's see here...\"\n  *line_break\n  *line_break\n  *if (ch1_vigilante_target = \"mike\")\n    \"A gunshot wound that left you with a collapsed lung. Doctors said it was less than an inch from your heart. A nice little scar, I imagine? Join the club.\"\n    *goto aegisquestions_vigilante\n  *elseif (ch1_vigilante_target = \"purge\")\n    \"Severe burns, fourth-degree. Epidermis, soft tissue, burnt lung from superheated air... Skin grafts... Doctors said you were lucky, and I agree. I imagine it left one hell of a scar.\"\n    *goto aegisquestions_vigilante\n  *elseif (ch1_vigilante_target = \"taurine\")\n    \"Three broken ribs, a punctured lung, fractured jaw, a concussion... You know, I'd heard about Taurine and her adaptive adrenal physiology - this little report is a good reminder why she stayed active for so long.\"\n    *goto aegisquestions_vigilante\n  \n  *label aegisquestions_vigilante\n\n  \"I think the medical reports make it clear enough. Part of me wants to applaud your audacity, your can-do attitude. The other part of me wants to slap you across the face and tell you that it was a fucking stupid idea, the worst one a young cape could have.\"\n\n  She brings her hands together, for a single, deliberate clap. \"I'm a firm believer in compromise. But I want to know why.\"\n\n  *if (ch1_vigilante_reason = 1)\n    \"Honestly?\" you ask, and Aegis nods. \"I thought I was ready, with all the training I'd been through.\"\n  \n    \"There's a difference between training and fighting,\" she replies, \"But I suppose they're dead and you're not. That's a win in my books.\"\n    *goto aegisquestions_vigilante2\n  *elseif (ch1_vigilante_reason = 2)\n    \"Honestly?\" you ask, and Aegis nods. \"I wanted to prove myself - I'd been behind those walls for over a decade.\"\n  \n    \"And they'd been fighting and killing for about the same amount of time,\" she points out. \"Still, they're dead and you're not. That's a win in my books.\"\n    *goto aegisquestions_vigilante2\n  *elseif (ch1_vigilante_reason = 3)\n    \"Honestly?\" you ask, and Aegis nods. \"I wanted to show people that I could handle being a heroic cape.\"\n  \n    \"Ah,\" she replies, \"There's nothing quite like ego-driven self-immolation.\" She shakes her head, muttering something. \"Whatever. They're dead, you're not. It's a win.\"\n    *goto aegisquestions_vigilante2\n\n  *label aegisquestions_vigilante2\n  Aegis' lips press into a narrow line though. \"Let's make one thing clear, however - crystal fucking clear. If you want to go after someone like that again, all half-cocked, just because you think you can, go get yourself killed where I don't need to file paperwork. Am I understood, ${cape_name}?\"\n\n  \"As crystal, Captain.\"\n  \n  \"I'll admit that I'm somewhat impressed, though. I can appreciate a certain amount of swaggering braggadocio. Just don't fuck up, there's more on the line than your life now.\"\n\n  *goto endofmeeting\n\n*else\n\n  \"When you were nineteen,\" Aegis begins, \"There was an incident in New York, one you played a small but significant part in.\"\n  \n  Aegis brings up an image on the wall behind her. It's ${vname}'s mugshot, just as you remember them.\n\n  \"You tipped off the local precinct about ${vname}, a known murderer with a list of crimes as long as my arm. Congratulations for following proper procedure, granted, but I'm not one for that if it's just going to lead to something worse. If ${vname} had've spotted you, they might've gotten away. As it was, they only managed to kill six people before they were brought in.\"\n\n  She presses a command and those names are brought up behind her, next to ${vname}'s face.\n  \n  \"All things considered,\" Aegis says, \"It worked out. This time. But I want to know why you did things the 'correct' way. Not everyone would.\"\n  *fake_choice\n    #You followed the correct procedure, as all capes should.\n      \"Well, procedure dictates to alert the local authorities if you notice a wanted villain like ${vname}. That's all there is to it.\"\n      \n      \"I guess Courser's going to have competition for this year's 'stick in the mud' award. I'll tell you what I told him: you're going to come to a time where procedures need to be broken. You followed procedure and six people died.\"\n    #You doubted you ability to bring them in yourself.\n      \"I knew I couldn't bring ${vhim} in by myself, regardless of the correct procedure.\"\n      \n      \"Makes sense,\" Aegis replies, \"Although it implies that you'll break the rules if you think you could get away with it. Remember this: my leg only means it takes me longer to catch up to you, not that I won't.\"\n    #You knew better than to take on a murderer without backup.\n      \"It might be hard to believe, Captain, but I wasn't stupid enough to try and take on ${vname} alone.\"\n      \n      Aegis grins, a little slight quirk of her lips. \"Well now, there's some fire. But there'll come a time in this job where you will have to face down a murderer alone. Don't go running to hide behind a badge then.\"\n      \n  \"I'm impressed,\" she continues, tapping a finger against the side of her desk, \"Although I'm not sure why. Just don't fuck up, there's more on the line than your life now.\"\n\n  *goto endofmeeting \n\n*label endofmeeting\n\nAegis types out a series of commands and her computer goes dark. The images behind her blink off.\n\n\"That's all, ${cape_name}. \n\n*label finalquestions\n\n\"Do you have any questions?\"\n\n*choice\n  *if aegis1 = 0\n    #\"What's SOLAR? What do we do?\"\n      \"Special Operations: Local and Regional, the active arm of the United Nations International Powered Security Agency. We're the people the law comes to when they need something solved - we're investigators, cops and, sometimes, we're even regular fucking capes. Not one for manuals, huh? Yeah, me either.\"\n      *set aegis1+1\n      *goto finalquestions\n  *if aegis2 = 0\n    #\"When do I meet the team?\"\n      \"Right now. I'll set up a little teambuilding exercise in about thirty minutes, an old tradition. Hazing, you might say.\"\n      *set aegis2+1\n      *goto finalquestions\n  *if aegis3 = 0\n    #\"Do I get to make my own costume?\"\n      \"I knew you'd ask about that. Look, you're not going to get a cape and no one in my unit is wearing tights. But I'm lenient, you'll make yourself something nice.\"\n      *set aegis3+1\n      *goto finalquestions\n  *if aegis4 = 0\n    #\"Why do you swear so much?\"\n      \"Because I'm old, in perpetual pain, and it catches every fucking person off-guard. Being thrown to the wolves will do that to you, kid.\"\n      *set aegis4+1\n      *goto finalquestions\n  #\"No, nothing further.\"\n    *goto dismissed\n    \n*label dismissed\n*set ch2_solar_files true\n\n\"Excellent. I want you to head down to the training room - a quaint little thing that we call the Sandpit.\" Aegis drags a finger across the surface of her computer interface. \"You'll meet the rest of the team there. I've forwarded you their dossiers - check them on your hand terminal stat screen. Read them, memorise them. For now, you're dismissed, ${cape_name}.\"\n\n*page_break\n*set ch2_met_solar true\n\nThe training room is back down the elevators, towards the basement areas of the SOLAR facility.\n\nThe SOLAR team - your team, you quickly remind yourself, as strange as that sounds - waits in the assembly area. They're all making conversation, waiting for Aegis to arrive - just like you are.\n\nYou eyes wander over the crowd. It might be a good opportunity to get to know them, before you get thrown into this exercise that Aegis had mentioned. Whatever it is.\n\n*label meettheteam\n\nYour new team stands around the assembly area, surrounded by the sibilant susurrus of quiet conversation. \n*if (meetcount = 1)\n  Courser nudges Chevalier in the side. \"You see the game last night?\"\n*if (meetcount = 2)\n  Chevalier takes a second to admire the image of a dragon on his left forearm. \"Still not sure about this one...\"\n*if (meetcount = 3)\n  Al-Jinn glances at one of her gloved hands, flexing it idly.\n*if (meetcount = 4)\n  Despite her conversation with Blueshift, you can feel Anima's eyes on you from across the room.\n*if (meetcount = 5)\n  Aegis' voice cuts through it, all order, no nonsense, \"Time to get started, team. Come inside.\"\n  \n  The great doors hiss open.\n\n*choice\n  *if (met_courser = \"false\")\n    #Talk to Courser - the poster boy.\n      *gosub trial_end\n      *set met_courser True\n      *set meetcount +1\n      Damian Alexander. He looks just as you remember from the elevator - African-American, shaved head, bright blue eyes and a dazzling smile. Athletic but not nearly carrying the muscles of his friend, Chevalier, whom he is standing next to. \n      \n      \"Welcome to the big leagues,\" Courser says.\n      *choice\n        *if (ch2_lied_courser = \"True\")\n          #\"Sorry about lying to you in the elevator...\"\n            Courser just shrugs. \"It's alright, maybe I came on a bit too strongly!\"\n\n            \"Kind of crazy that we've both come from Capetown, right? We've both been Academy-trained. I guess it's up to us to keep everything shipshape around here.\" He spares a pointed, friendly look at Chevalier.\n          \n            \"I know my regs,\" he responds, \"I just don't follow them.\"\n          \n            \"After this whole thing, maybe we can hang out, grab a drink?\" Courser suggests, \"You know, get you settled in.\"\n          \n            \"Well, that depends on how sore we're going to be after this,\" Chevalier says.\n            \n            Still, it might be a good plan.\n            *goto meettheteam\n        *else\n          #\"Thanks, it's good to be here.\"\n            *set courser_relationship %+5\n            \"Kind of crazy that we've both come from Capetown, right? We've both been Academy-trained. I guess it's up to us to keep everything shipshape around here.\" He spares a pointed, friendly look at Chevalier.\n          \n            \"I know my regs,\" he responds, \"I just don't follow them.\"\n          \n            \"After this whole thing, maybe we can hang out, grab a drink?\" Courser suggests, \"You know, get you settled in.\"\n          \n            \"Well, that depends on how sore we're going to be after this,\" Chevalier says.\n            \n            Still, it might be a good plan.\n            *goto meettheteam\n        #\"Courser's an unusual name...\"\n          *set courser_relationship %+5\n          \"Believe it or not, you know it wasn't what I wanted originally?\" Courser asks. \"Yeah, I wanted Corsair - you know, like a cool pirate type. Someone snapped it up a decade ago and is still active. So, this sounds almost like it. Close enough, right?\"\n          \n          \"Oh, come on, you've got to tell them the best part.\" That's Chevalier, grinning like the proverbial cat-swallowing canary.\n          \n          \"It's a term for a racehorse. I know, right? I really should've done my reading. All the good names're taken, though - there's that many of us around. I'm surprised you got ${cape_name}, really.\"\n         \n          \"Previous ${cape_name} might've died or something,\" Chevalier offers.\n         \n          \"Jeez, Chevy, way to bring up the rookie's spirits.\"\n          *goto meettheteam\n  *if (met_chevalier = \"false\")\n    #Talk to Chevalier - the tank.\n      *gosub trial_end\n      *set met_chevalier True\n      *set meetcount +1\n      Ryan Blackwood. He's the tallest member of the unit, matching it with the broadest shoulders. Still, for all his imposing size, he seems to carry a good deal of good ol' all-American charm with warm brown eyes and an easygoing smile. His SOLAR uniform ends at his biceps, leaving numerous tattoos to peek out from under the tight sleeve, some of the designs trailing down his whole arm.\n      *choice\n        #\"What's with the tattoos?\"\n         *set chevalier_relationship %+5\n         \"What, these? Yeah, I've got a few.\" You put that away as one hell of an understatement.\n         \n         Before you can say anything further, though, Chevalier is taking you on a bit of a guided tour down the interesting gallery of his left arm - fantastic beasts, names, a love heart or two, and plenty of things that you take to be trophies or memories. It leaves your head spinning.\n         *goto meettheteam\n        #\"Chevalier, isn't that French?\"\n         Chevalier looks as if he's about to say something when Courser interrupts, \"Oh, it is! But that's not the reason he took that name, was it?\"\n         \n         Chevalier admits, \"I'm a big fan of Chevy cars.\"\n         \n         \"There's worse things to be a fan of,\" you reply.\n         *goto meettheteam\n  *if (met_aljinn = \"false\")\n    #Talk to Al-Jinn - the telepathic medic.\n      *gosub trial_end\n      *set met_aljinn True\n      *set meetcount +1\n      Naomi Al-Fadil. She's the shortest member of the team. Her cape name, if not her appearance, makes clear her Middle Eastern heritage. She seems like a professional, much like the rest of the unit, with a neat uniform and a severe bob cut that probably hits the exact regulation length. Strangely, she's wearing gloves, setting her apart from everyone else on the team.\n      *choice\n        #\"Are the gloves part of the uniform?\"\n         *set aljinn_relationship %+5\n         \"Not exactly,\" Al-Jinn replies, smiling. \"I've got a limited form of telepathy. If I touch someone, skin-on-skin, I can tell what they're thinking. It just makes life easier.\"\n         \n         \"That sounds like a bit of a curse.\"\n         \n         \"Aren't all our powers a burden to bear?\" she replies. \"In the sense of having a responsibility to use them well, or dealing with the side-effects?\"\n         \n         \"I suppose,\" you reply.\n         *goto meettheteam\n        #\"What's your role on the team?\"\n         \"If you get beat up out there, I'll be patching you up,\" Al-Jinn replies. \"I also handle things for the Captain - paperwork, logistics, things like that. I don't fight much - my power's skin deep, you could say, but I'm the team's investigator if that's needed.\"\n         \n         \"Is it needed? Often, I mean?\"\n         \n         Al-Jinn nods. \"Often enough.\"\n         *goto meettheteam\n  *if (met_anima = \"false\")\n    #Talk to Anima - the fire support.\n      *gosub trial_end\n      *set met_anima True\n      *set meetcount +1\n      Ada Okoye. She lingers like a dusky shape on the edge of your vision, her features so sharp that they border on being aerodynamic. She stands next to Blueshift, making quiet conversation, her voice like the pleasant sound of a deep woodwind. Her uniform seems to be worn to an exacting standard and her thick hair has been buzzed into submission. What her powers are, you have no idea. Her file is classified - more so than usual.\n      *choice\n        #\"Hey, I'm ${first_name}, how're you?\"\n          *set anima_relationship %+5\n          Anima watches you, looking disinterested. \"I am fine.\"\n          \n          The silence stretches out from polite to uncomfortable.\n          \n          You find something else to occupy your attention.\n         *goto meettheteam\n        #\"So, what do you do?\"\n          The question doesn't seem to interest her. \"Prosecute objectives to the full extent of my ability, as do you.\"\n          \n          She stares at you until you turn away, and then returns her attention to Blueshift.\n         *goto meettheteam\n  *if (met_blueshift = \"false\")\n    #Talk to Blueshift - the telekinetic analyst.\n      *gosub trial_end\n      *set met_blueshift True\n      *set meetcount +1\n      Leland Cross. Swarthy in every sense of the word - tanned skin, trimmed dark hair flicked through with strands of grey that nonetheless curls around his ears. The dusting of stubble on his face makes it clear that Blueshift is a man who doesn't value personal grooming over his results - and the somewhat unkempt status of his uniform reflects that, too. He catches you looking and his eyes make his arrogance loud and clear.\n      *choice\n        #\"I'm ${first_name} - hoping we won't get off on the wrong foot.\"\n         *set blueshift_relationship %+5\n         \"I'm Cross,\" he replies. \"And yes, I've heard whatever clever pun you're about to say before. Just stay out of my way, do your job to the best of your ability, and we'll get along fine.\"\n\n         \"That's the plan.\"\n\n         *goto meettheteam\n        #\"So, you and Anima are friends or...?\"\n         Leland's doesn't frown at the question but his disposition certainly doesn't improve.\n         \n         \"We work well together,\" he says, evading the question.\n         \n         You have the distinct feeling that pressing the issue will just make things worse. And so, it drops.\n         *goto meettheteam\n  *if (meetcount = 5)\n    #Let's do this.\n      *gosub trial_end\n      *goto ctf_start\n    \n*label ctf_start\n\nBehind those thick doors lies what must be a football field made purely from sand, with metal partitions sticking out of the ground like an obstacle course dreamed up by someone who only had access to sheet metal. All blind corners and walls that you wouldn't be able to see over, much less around.\n\n\"Ladies and gentlemen,\" announces Aegis, standing in the middle of it all like some scarred desert ruler, \"Welcome to the Sandpit.\"\n\n*page_break\n\nIt's certainly an accurate name, you reflect, as you find your new team at the centre of the sandy field, stuck in what seems like a no man's land between a complex mess of metal partitions.\n\n\"We've got a newbie here today,\" Aegis continues, \"${cape_name}, our newest recruit - so let's all be sure to give ${phim} a warm welcome.\"\n\nMost of them do. Chevalier, Courser, Al-Jinn - they're all smiling and nodding, politely applauding. But two of the other team members, Blueshift and Anima, appear to scrutinize you with nothing more than barely disguised contempt.\n\n\"It's a simple team-building exercise today,\" Aegis continues. \"Capture the Flag.\" She produces a pair of scrappy-looking cloth flags - one red, one blue. \"Now, I know the rules are so simple that you could all recite them in your sleep, but we've got a newbie and so I'm going to restate them.\n\n\"You both have a flag, you both want the other team's flag. You're both allowed to do anything to get it, stopping short of breaking bones or killing each other, because that thing is more valuable than fucking [i]gold[/i] to you today. But if you go down, you stay down.\"\n\n\"Teams are simple. Chevalier, Blueshift, Anima - you're Team Blue, Chevalier leading. Courser, Al-Jinn, ${cape_name}, you're Team Red, ${cape_name} leading.\"\n\nChevalier laughs. \"Boss, come on, that's hardly fair.\"\n\nAegis nods, \"No doubt about that, but I want to see if our newbie has been doing their homework. There's no such thing as an invincible enemy.\"\n\n\"It's their funeral,\" Blueshift states. His accent is hard to place. South American, maybe.\n\n\"Easy, Shift,\" Chevalier replies, grinning, \"You sound like you're afraid of the competition.\"\n\n\"Stow it,\" Aegis cuts in. \"Set those flags and get planning. You've got three minutes before I sound the whistle.\"\n\nTeam Blue heads off, Chevalier holding their flag. \"Good luck,\" he calls to you, the only member of his team to do so.\n\nAegis presses the red flag into your hands. \"Good luck, kid,\" she says, \"I'm betting on you.\"\n\n*page_break\n\n\"So, Captain ${cape_name},\" Al-Jinn begins, \"What's the plan? The clock is ticking.\"\n\n\"I'm still puzzling that out,\" you reply, just after placing the flag as deep within the maze of metal walls and partitions as possible. \"Courser, can you run me through Blueshift's capabilities?\"\n\nCourser nods. \"Sure. He's a telekinetic, only he gets less powerful if he moves around. Smartest person on the team, too, and ruthless when he wants to win. And looking at you before, like that? He wants to win. No one who gets within his line of sight is going to make it to the flag.\"\n\n\"What about Chevalier?\"\n\n\"Chevy's a tank. He's got that classic cape package - super strength, speed, even an invulnerability power. No, it's not that alarming, don't worry. He still feels pain, even if it doesn't actually hurt him. We just send someone who doesn't need to fight him directly, and he's out.\"\n\n\"And Anima?\"\n\n\"Tough, fast, strong. Too much firepower to go loud in here. Hard to say anything more than that. In any case, she won't let anything get between her and that flag.\"\n\nCourser adds, \"Look, I know it's a lot to take in, but I reckon I can get us a good plan of attack. Unless you've figured something out?\"\n\nHave you?\n\n*choice\n  #Not yet - hear Courser out.\n    *set heard_plan \"true\"\n    *goto courser_strat\n  #Yes - Go with your own plan.\n    *goto sandpit_planning\n\n*label courser_strat\n\n\"Maybe,\" you say, \"But it can't hurt to hear you out - what've you got?\"\n\nCourser nods. \"Okay, listen. We'll almost certainly have Shifter on the defensive given that he's stronger the longer he remains in one location. If it were me in your shoes? I'd be sending me to deal with him, I can slip through the metal walls and get the drop on him.\"\n\n\"And I can handle Chevalier with a word,\" Al-Jinn puts in.\n\n\"Right, exactly,\" Courser says, nodding emphatically. \"Sure thing, I mean, I love Chevy but he'll be coming in for the glory. Anima, though? She's going to roll in hot and blitz us, standard play when she's working with Blueshift like this. Whoever we've got on defence is going to have barely a second to react before she shuts them down. I know I can't, and neither can Jinn - so, sorry about getting the short stick, newbie.\"\n\n\"One problem with it, Damian,\" Al-Jinn comments, \"We both know that Blueshift is the smartest person on the team and how much he likes things to work like machines. He might have us figured out.\" She finger-quotes, \"'Exacting variables and tolerances', and all.\"\n\nCourser pauses then and says, more slowly, \"You're right. This is all just my recommendation but I think it's a solid one. Ball's in your court on this.\"\n\nHis plan seems solid but, if Blueshift really is the 'smartest person on the team', then it's likely he's figured that out, too... However, Chevalier's leading the team. Maybe it really will be as simple as Courser thinks.\n\n*choice\n  #Go with Courser's plan.\n    *set ch2_courser_plan true\n    *set jinn_job \"Chevalier\"\n    *set courser_job \"Blueshift\"\n    *set player_job \"Anima\"\n    *set courser_relationship %+15\n    \"Let's do it,\" you tell Courser and the team. They immediately split off to their assigned tasks.\n    \n    After a minute or so, you hear the sharp squeal of a whistle.\n    \n    Game on.\n    *goto sandpit_gameon\n  #It's too risky - go with your own plan.\n    *goto sandpit_planning\n \n*label sandpit_planning\n\n\"Let's switch it up a little,\" you say. \"If you've figured it out, then Blueshift has too, right? If you're thinking he'll zig, then he's going to zag.\"\n\n\"I don't think so,\" Courser replies, \"But this is your op. What's the plan? We need someone to take the flag from Blueshift, someone to intercept Chevalier halfway, and someone to hold their ground against Anima.\"\n\n\"Okay,\" you say, quite aware that time is ticking down, \"First things first, to take on Blueshift and retrieve their flag...\"\n\n*fake_choice\n  *if (ch2_aljinn_assigned = \"false\") \n    #\"Al-Jinn - your telepathy should be enough.\"\n      *set ch2_aljinn_assigned true\n      *set jinn_job \"Blueshift\"\n      Al-Jinn clicks her tongue against her teeth. \"Understood. I'll go for the flag.\"\n  *if (ch2_courser_assigned = \"false\")\n    #\"Courser - get him with an oblique attack.\"\n      *set ch2_courser_assigned true\n      *set courser_job \"Blueshift\"\n      Courser grins. \"Shift won't even know what hit him.\"\n  *if (ch2_player_assigned = \"false\")\n    #\"I'll handle him.\"\n      *set ch2_player_assigned true\n      *set player_job \"Blueshift\"\n      \"I'll handle that,\" you say. \"I think I can handle him, even as overconfident as he is.\"\n\n*line_break\n*line_break\n\"Alright, that's our offensive planned,\" Courser comments. \"But someone needs to intercept Chevalier before he gets to us.\"\n\nYou nod. \"And that's...\"\n\n*fake_choice\n  *if (ch2_aljinn_assigned = \"false\") \n    #\"Al-Jinn, give him a painful thought or two.\"\n      *set ch2_aljinn_assigned true\n      *set jinn_job \"Chevalier\"\n      \"Consider it done,\" Al-Jinn replies, nodding her head.\n      *line_break\n      *line_break\n  *if (ch2_courser_assigned = \"false\")\n    #\"Courser, you're his friend, so you should know how he fights.\"\n      *set ch2_courser_assigned true\n      *set courser_job \"Chevalier\"\n      Courser laughs. \"Alright, okay, I'll do what I can.\"\n      *line_break\n      *line_break\n  *if (ch2_player_assigned = \"false\")\n    #\"I'll handle him.\"\n      *set ch2_player_assigned true\n      *set player_job \"Chevalier\"\n      \"I think I can give him enough of a shock that he'll be reeling from it,\" you say.\n\n\"That's our offensive organised and half of their offensive interdicted,\" Al-Jinn says, \"But that still leaves their shock attack element - Ada. If everything goes right but we don't stop her, it's a draw.\"\n\nWhich, if you've figured out Aegis at all, you're sure that she'll count as a loss.\n\n\"So then,\" you say, \"Defending our flag...\"\n\n*fake_choice\n  *if (ch2_aljinn_assigned = \"false\") \n    #\"...that's you, Al-Jinn.\"\n      *set ch2_aljinn_assigned true\n      *set jinn_job \"Anima\"\n      Out of the corner of your eye, you catch a brief glimpse of Al-Jinn shaking her head.\n  *if (ch2_courser_assigned = \"false\")\n    #\"...that's you, Courser.\"\n      *set ch2_courser_assigned true\n      *set courser_job \"Anima\"\n      Courser lets out a long breath. \"Maybe I can ambush her...\" he murmurs.\n  *if (ch2_player_assigned = \"false\")\n    #\"...is my responsibility.\"\n      *set ch2_player_assigned true\n      *set player_job \"Anima\"\n      \"...is my responsibility,\" you finish. \"I'll give Anima something she's not used to and hold our flag.\"\n\n*if ((((jinn_job = \"Chevalier\") and (courser_job = \"Blueshift\")) and (player_job = \"Anima\")) and (heard_plan = \"true\"))\n  *set ch2_courser_plan true\n\n  Courser smirks. \"Hey, if you wanted to go with my plan, you could have just said so!\"\n  \n  The sentence has barely left Courser's mouth when the whistle squeals.\n\n  Game on.\n  *goto sandpit_gameon\n  \n*elseif ((((jinn_job = \"Chevalier\") and (courser_job = \"Blueshift\")) and (player_job = \"Anima\")) and (heard_plan = False))\n  \"Hey, great minds think alike!\" Courser smiles.\n  \n  The sentence has barely left his mouth when the whistle squeals.\n  \n  Game on.\n  *goto sandpit_gameon\n\n*else\n\n\"I hope this works.\"\n\nThe sentence has barely left Courser's mouth when the whistle squeals.\n\nGame on.\n*goto sandpit_gameon\n\n*label sandpit_gameon\n*page_break\nAll you can do now is hope that the plan will work.\n\n*label blueshift_result\n*if (jinn_job = \"Blueshift\")\n  You wait, closer to your flag than the offensive thrust of your team. Excepting the crunch of the sand beneath your feet, the only thing you can hear is your breathing and the pounding of the blood in your ears.\n\n  You hear someone's voice - Al-Jinn - shouting out a word, at the exact same time as you hear a resounding series of impacts.\n  \n  The impacts don't drown out Aegis' voice, however: \"You're dead, Naomi!\"\n  *goto chevalier_result\n*elseif (player_job = \"Blueshift\")\n  You advance towards the side of the field that holds the Blue flag, doing your best to use the blind corners to keep out of sight. Rushing across the no man's land is a bit of a daunting prospect, but you manage to do so without getting spotted by Anima or Chevalier.\n  \n  You creep closer, the sand crunching beneath your feet, your breathing loud, the blood pounding away in your ears. The setup appears to be a mirror to your own, so, you know when you're just about upon Blueshift.\n  \n  You step out and move to close the gap, running towards Blueshift, a plan already forming.\n  *fake_choice\n    #Distract him - catch him off-guard.\n      \"Hey-!\"\n      \n      Blueshift turns to look at you, already throwing out a hand.\n    #Blast him - telekinetics can't beat electricity.\n      *set power+1\n      You react without thinking, drawing electrical power into your palm - not enough to kill, but enough to give Blueshift a nasty surprise.\n      \n      Blueshift turns to look at you, already throwing out a hand. Your charge goes wide, bending around him, impossibly shifted to lance into the sand by his feet.\n    #Go hand-to-hand - mind over matter, fist over mind.\n      You rush towards Blueshift.\n      \n      Blueshift turns to look at you, seeming incredulous, and throws out his hand.\n\n  Force slams into your abdomen, sending you into a freefall tumble, only for the ground to suddenly slip away from you, recede beneath you.\n  \n  You're dragged above the partition walls, getting a brief glimpse of the whole training arena.\n   \n  You only have a second to reflect on that before Blueshift brings you back down to Earth, hard.\n  *goto ctf_bad_ending\n*else\n  You wait, closer to the flag than the offensive thrust of your team. Excepting the crunch of the sand beneath your feet, the only thing you can hear is your breathing and the pounding of the blood in your ears.\n  \n  And then, Aegis's voice: \"You're dead, Leland.\"\n  \n  So far, so good.\n  *goto chevalier_result\n  \n*label chevalier_result\n*page_break\n*if (courser_job = \"Chevalier\")\n  Towards the no-man's land, you catch an exchange.\n  \n  \"Hey, buddy,\" that's Chevalier, \"You want to do this?\"\n  \n  \"Sure,\" Courser replies, as friendly as always, \"Just not in the face. What was my last best, thirty seconds? Throw 'em up, big guy!\"\n  \n  After twenty-seven seconds, Aegis announces, \"You're dead, Damian!\"\n  *goto anima_result\n*elseif (player_job = \"Chevalier\")\n  You wait, eyes peeled from your vantage point. It's easy enough to spot Chevalier as he comes through the no-man's land and into your territory, and easy enough to put yourself between him and the flag.\n
