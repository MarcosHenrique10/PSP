 \n      \"Your witch cannot be found with mere mortal eyesss,\" says the tall one. \"Even yoursss. You'll have to be lucky indeed to find her in time, if you find her at all. But we do not asssk twice.\"\n\n      The thin one reaches for the spit, and you quickly step out of the way. Sensing your conversation is at its end, you turn and walk with barely-masked haste toward the alley exit. You breathe a sigh of relief when you emerge onto the street without any more trouble.\n      \n      Your relief, however, is short-lived. Doubt sets in. Will you really be able to find the witch without the help of the Red Men?\n      *page_break\n      *goto DullahanDockEncounter\n\n\n*label DullahanDockEncounter\n\nIt is, of course, dark by the time you reach the main road home. Travel by night is beginning to become a habit for you—and not a particularly good one. In fact, you're hardly surprised when, as you near the crossroads which were once haunted by the highwayman, you notice an increasingly familiar sort of cold silence descending upon the road.\n\nOut of the shadow of the forest strides the dullahan, looking dangerously close to irate. Before he reaches out to strangle you, as he looks like he just might do, you quickly explain that you've found a most likely suspect: a witch.\n\nHow much, exactly, do you tell him?\n\n*choice\n\n  #Only that I have good reason to believe the thief is a local witch. No need to mention the dagger or let on that I know about his weakness.\n\n    *set guile %+20\n    *goto DullahanDockEncounter2\n\n  #That the thief is a witch and that she recently purchased a golden dagger.\n\n    *set guile %-20\n    *goto DullahanDockEncounter2\n\n  *if (redmenbargain = \"yes\") #That the thief is a witch, and I know how to find her. No need to mention the dagger or let on that I know about his weakness.\n\n    *set guile %+20\n    *goto DullahanDockEncounter2\n\n  *if (redmenbargain = \"yes\") #That the thief is a witch armed with a golden dagger, and I know how to find her.\n\n    *set guile %-20\n    *goto DullahanDockEncounter2\n\n\n*label DullahanDockEncounter2\n\nSilent rage emanates in a palpable chill from the dullahan. His hand lashes out toward you. Rather than seizing you by the throat, however, he grabs your shoulder.\n\nAn image flashes into your mind unbidden.\n\nYou see a young, barefoot woman in a simple white gown and green tunic. She has long, dark, wavy hair and eyes like blue ice. Her preternatural beauty is not lessened by the tears staining her cheeks or the fury in her face as she kneels in the mud and screams.\n\nShe holds what looks to be the body of a dead wolf in her arms. Its blood stains her clothes and her hands.\n\n*page_break\n\nThe dullahan releases you, and the vision ends. Believing you understand his intent, you nod and tell him that yes, the person you saw matches the description you were given.\n\nHe makes an irritated gesture and waves his arm out in an arcing motion, as if asking, Where?\n\n*if redmenbargain = \"yes\" \n  Ah. He doesn't know where she is. Neither do you. But as you explain to the dullahan, the Red Men do, and they have promised to lead you to her tomorrow night.\n  \n  He paces, appearing more frustrated than ever. But at length, he seems to accept that nothing more can be done about it.\n  *page_break\n  *goto DullahanDockEncounter3\n\n*else\n  Ah. He doesn't know where she is. Unfortunately, neither do you. But as you tell the dullahan, it is likely she lives close by. Between your Sighted eyes and his Faerie intuition, the two of you should be able to find her.\n\n  Sensing his impatience, you quickly add that you will need to gather some necessary supplies (and your wits, truth be told) before facing the witch. Though your time is short, you plead for a little more, asking him to wait just one more day.\n  \n  At length, the dullahan relents.\n  *page_break\n  *goto DullahanDockEncounter3\n\n*label DullahanDockEncounter3\n\nYou expect him to leave, but instead, he continues to stand before you as if waiting for you to do something. When you don't, he gestures sharply at the road. Apparently, he means to follow you home.\n\nIs he concerned for your safety? Or merely protecting his interests? You decide not to ask.\n\nYour walk home is strangely quiet (and rather chilly), but you arrive safely and without incident. When you reach your own door, you turn to look over your shoulder for your escort. You see nothing but an empty, moonlit road.\n\n*goto checkpoint_save\n\n\n*label checkpoint_save\n\n*page_break End of Chapter\n*set save_load true\n*set return_to_scene \"witch-hunt\"\n*goto_scene savegame\n\n\n*label fatal_end\n\n*page_break\n*set save_load false\n*set return_to_scene \"docks\"\n*goto_scene savegame", "ending": "*page_break\nYour journey has come to an end—but for some, death is only the beginning. Should you choose to live your life over again, making different choices may lead you to a different fate.\n\nWill you defy destiny and try once more?\n\n*page_break The End?\nWe hope you've enjoyed playing [i]The Harbinger's Head.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "grandmas": "*temp timebonus\n\n[b]Chapter II: Fact and Fiction[/b]\n\nThe next morning, you awake from a fever-dream, drenched in cold sweat and the rank smell of base terror.\n\nIt was a dream of magic, of blood moons and bone whips and a headless horseman. You want to believe it was just a nightmare, but you know better. The dullahan was real—and so was the deal you made. No doubt he'll be visiting soon, perhaps even tonight, expecting some sort of progress. He certainly didn't strike you as the patient sort.\n\nAgain you remember his whip, the jagged edges of the white spinal cord bones as sharp and hungry for blood as sharks' teeth. It's enough to send you tumbling right out of bed and onto your feet.\n\nA tiny, panicking corner of your mind screams at you to run for it, to hit the pavement and begin your impossible search as soon as possible. But dullahan or no dullahan, you have your livelihood to worry about, daily concerns that do not magically vanish the instant something strange occurs.\n\n*page_break\n\n*if job=\"herbalist\"\n\n  Happily, you've done fairly well for yourself as an herbalist. While you may not be rich, after doing a bit of math, you are convinced you've enough savings to be able to afford taking a few days off.\n\n  After posting a note on the door about being unavailable for the next few days due to personal matters, you finish up a couple of simple, everyday concoctions and head into town to deliver them to your customers.\n\n  Satisfied your affairs are in order for the time being, you head back south towards home, taking care to stick to the road this time. When the path turns in the direction of your house, however, you pass it, continuing on towards your grandmother's house instead.\n\n  *goto GrandmasHouse\n\n*if job=\"lamplighter\"\n\n  You glance out the window and wince at the lightening sky. Is it so late already? Grabbing your coat and shoes and a hasty breakfast, you hoof it to town, where you know the morning shift are already working on dampening the streetlights before the coming of dawn renders them completely unnecessary.\n\n  You arrive in time to catch one of them just as he's putting out his last light. You're in luck; he's a friend of yours, or at least a decent acquaintance, and with a little charm (and the promise of half your pay for the next week) he agrees to cover your night shifts for a few days while you sort out some personal matters.\n\n  With that taken care of, you head back south towards home, sticking to the road this time. When the path turns in the direction of your house, however, you pass it, continuing on towards your grandmother's house instead.\n\n  *goto GrandmasHouse\n\n*if job=\"teacher\"\n\n  It's early yet, not quite dawn. Grabbing your coat and shoes and a quick bite to eat, you strike out for the local schoolhouse. Once there, you go straight to the headmaster, who is less than pleased when you inform her you'll be needing a few days to yourself to set certain personal affairs in order. She is even less pleased when you politely decline to share what, precisely, your \"personal affairs\" entail.\n\n  Still, in the end, she grudgingly grants your request. You leave the schoolhouse satisfied that, for the time being at least, your livelihood will remain intact. You'd like to have a life to go back to once this nightmarish business with the dullahan is over, after all.\n\n  You head south towards home, following the road rather than taking your forest shortcut this time. When the path branches off in the direction of your house, however, you keep going until you arrive at your grandmother's house instead.\n\n  *goto GrandmasHouse\n\n*label GrandmasHouse\n\nThe house is just as you remember it: cozy, warm-seeming, with wide windows and well-tended vines draped over the cream-colored exterior like a shawl. An old, rusting horseshoe hangs over the door. In the backyard, you know there is a simple, unassuming herb garden closed in by white wooden pickets and a circle of salt. No doubt your grandmother is there at this very moment, tending to the parsley and thyme with her usual care and diligence.\n\nIt's been a while since the two of you have had a chat, but you're itching to get started on your research. Will you stop and greet her before entering the house?\n\n*choice\n\n  #Of course. It would be impolite to ignore her.\n\n    *set guile %-10\n    *set timebonus \"off\"\n    *goto GrandmaChat\n\n  #Why should I when I can easily sneak past her and go straight to Grandfather's study? I can always stop by and say hello another day.\n\n    Feeling slightly like a cat burglar, you step quietly into the house (she never remembers to lock the door!) and head for your grandfather's study.\n\n    *set guile %+10\n    *set timebonus \"on\"\n    *goto Study\n\n  #Yes. She's my grandmother, for goodness' sakes, and I know she's been lonely since Grandfather died. I can spare a few moments to say hello.\n\n    *set altruism %+10\n    *set timebonus \"off\"\n    *goto GrandmaChat\n\n  #I know I should, but time is precious. I need to be careful with what I choose do right now.\n\n    It doesn't seem wise to test a dullahan's patience—and besides, this is a matter of life or death. Surely your grandmother would understand.\n    \n    Without further ado, you head into the house and make your way to Grandfather's study.\n\n    *set daring %-10\n    *set timebonus \"on\"\n    *goto Study\n\n*label GrandmaChat\n\nSure enough, your grandmother is exactly where you expected to find her: kneeling in the dirt with an absent smile on her lips and a basketful of fresh herbs in her hands. Her face lights up when she sees you, and she hugs you with all the fragile fervor her delicate frame can muster. \"Oh, my dear \n*if gender=\"male\"\n  laddie,\" she coos, \"it's been too long.\"\n*if gender=\"female\"\n  lassie,\" she coos, \"it's been too long.\"\n*if gender=\"neutral\"\n  child,\" she coos, \"it's been too long.\"\n\nBefore you know it, you are deeply involved in a long and thoughtful discussion on gardening and living alone and the vices and virtues of growing old. You can practically feel the minutes ticking by, but you're powerless to stop them—or your grandmother, for that matter.\n\n*page_break\n\nFinally, you force yourself to interrupt, explaining the reason for your visit wasn't merely to talk, but to search your grandfather's study for clues about a few old legends. When she asks why, you tell her…\n\n*fake_choice\n\n  #…a friend of mine is interested in folklore, and I'm hoping to help them out with their research.\n  #…I'm writing a book based on Grandfather's stories.\n  #…I got bored and wanted some new reading material.\n  #…a dullahan is missing his head, and I have to help him get it back!\n\n\"Isn't that nice, dear.\" She smiles apologetically. \"I wish I could help—you know how disorganized your grandfather was—but I've never quite been able to bring myself to do more than dust in there.\n\n\"Good luck, love. Speaking of which,\" she adds with a wink, \"if you happen to find one of his shamrocks in there, be sure to take it with you. They protect against curses, you know.\"\n\nYou thank your grandmother and, at long last, head into the house, making a beeline for Grandfather's study.\n\n*goto Study\n\n*label Study\n\nThe study is just as your grandfather left it, albeit slightly less dusty. Worn leather volumes, all hand-me-downs and bookshop bargains, line the oak shelves on the walls and stand in odd corners of the room, stacked in precarious towers. Crinkled, yellowing sheaves of parchment peek out of overstuffed drawers and lay strewn across the desk by the window, weighed down by an odd assortment of paperweights, including a round, pale moonstone and a rabbit's foot.\n\nThere is no rhyme nor reason to your grandfather's mad sense of organization—at least, none known to any but the man himself. How do you plan to make sense of it all?\n\n*choice\n\n  #It doesn't really matter, does it? I'll just grab things at random until I find something. Maybe I'll get lucky.\n\n    *set luck -1\n\n    *goto Search\n\n  #The only way to get through it is step by step. I just have to be patient and focus.\n\n    *goto Search\n\n  #Grandfather always said I had the Sight. Perhaps, if I concentrate, I'll pick up on something. \n\n    *if (faeriesight > 59)\n      *set timebonus \"on\"\n      *goto SightSearch\n\n\n    *elseif timebonus=\"on\"\n      Despite a valiant effort, you detect nothing out of the ordinary. If only you had more practice using your Sight.\n      *goto Search\n\n    *else\n      Despite a valiant effort, you detect nothing out of the ordinary. If only you had more practice using your Sight.\n      *goto Search\n\n*label SightSearch\n\nYou look around the room, widening your perception—a simple trick, not unlike widening your eyes to use your peripheral vision. You relax the rest of your senses, waiting.\n\nA few moments pass, and all the while, you feel something stirring in the room the way air stirs before a gust of wind. Something warm whispers across your cheek, tweaking your nose, just as Grandfather used to. You can practically see him smiling and winking at you, his gray-blue eyes twinkling.\n\nThe room shifts, so subtly you might have missed it if you weren't looking for it. One of the stacks of books in the far corner of the room shivers. The bottom left drawer of the desk rattles slightly. A sheaf of loose-leaf paper wriggles as if alive for just a fraction of a second.\n\nYou whisper your thanks to the empty air. For one brief moment, you feel the warmth again, curling around your hand, and you can almost see Grandfather squeezing it and whispering, \"Good luck, child.\"\n*if luck >0\n  \n  When you turn your hand over and open it, you find a small, pressed shamrock lying in the palm of your hand. Since it is too small to carry as it is, you search the desk until you find an envelope to keep it in. You slip the envelope into one of your pockets.\n\n*set shamrock \"yes\"\n*page_break\n\nIt isn't long before you find what you're looking for. While Grandfather's notes and books may not contain all the answers you seek, he certainly manages to give you some food for thought.\n\n*goto Research\n\n*label Search\n\n*if timebonus=\"off\"\n\n  The hours drag. Under normal circumstances, Grandfather's research material might have been more appealing. But as things stand, every book, every page that fails to mention a headless rider is nothing but one more setback, one more undesirable distraction from your quest.\n\n  It is late afternoon before you find even the first piece of the puzzle, and with each bit of new information, new questions arise for which you can find no answers.\n\n  Still, at the end of the day, you aren't exactly empty-handed.\n\n  *goto Research\n\n*if timebonus=\"on\"\n\n  Good thing you got an early start; quite some time passes before you finally find relevant information. Luckily, the day is not over yet.\n\n  *goto Research\n\n*label Research\n\nAccording to your research, numerous sightings of tall, headless beings in dark clothes have been recorded all over the country. These encounters always seem to occur at night in dark alleys or lonely, moonlit fields.\n\nThough described as imposing, horrifying creatures, dullahans don't seem inclined to inflict harm without cause—though they do appear to be somewhat easily offended. Unwelcome bystanders may be treated to a bucket of blood in the face (though you have to wonder if they always carry a bucket around with them for just such a purpose). More serious offenders may be blinded or even murdered with a single flick of the dullahan's bone-whip.\n\nSome writers connect the dullahan, or \"dark man,\" to Crom Cruach, the \"bloody crooked man\" of ancient times: a deity who demanded human sacrifice as tribute.\n\n*page_break\n\nThe stories do not mention how or why a dullahan's victims are chosen. As for the dullahan's headlessness, you find only two possible theories regarding its cause. One, the dullahan's head was severed from his body while he was a living man (or woman) in some sort of accident or during battle. Two, those who commit crimes worthy of beheading and manage to escape punishment while they live receive their just punishment in the afterlife instead.\n\nThere are no stories about the theft of a dullahan's head; if any before have dared to try it, they do not appear to have lived to tell the tale. However, you do find one (admittedly vague) clue. While most of the Fair Folk cannot abide the touch of iron, a dullahan's weakness is gold. Perhaps the thief used this to their advantage when committing the burglary?\n\n*if timebonus=\"off\"\n\n  Though you can't help feeling there is more information to be found if only you had the time, the shadows in the study have grown long. Outside, the darkling sky draws nearer and nearer to full night. It is time to head home.\n\n  *goto checkpoint_save\n\n*if timebonus=\"on\"\n\n  Since there is time yet to spare before day's end, you decide to search a little longer.\n\n  *goto FurtherReading\n\n*label FurtherReading\n\nYou are rewarded with the discovery of two more stories: that of Charley Culnane's chance encounter with a dullahan, and that of Hackelberg, the Wild Huntsman.\n\nWhich would you like to read about first?\n\n*label bookchoice\n\n*choice\n\n  *disable_reuse #I will read the story of Charley Culnane.\n\n    *goto CharleyCulnane\n\n  *disable_reuse #I will read about the Wild Huntsman.\n\n    *goto Hackelberg\n\n  #Enough reading! I'm going home.\n\n    *goto checkpoint_save\n\n*label CharleyCulnane\n\nOne night while Charley Culnane was riding his old mare home, he spotted the disembodied head of a white horse riding along the same road as he. Before his eyes, the rest of the horse appeared, along with its black-garbed rider, whose head rested not on his shoulders, but in the crook of his arm.\n\nOddly, this dullahan seemed capable of speech, as Charley managed to converse with him and even challenged him to a quick race across the countryside (which Charley lost, but only barely).\n\nInvigorated by the ride, the dullahan thanked Charley for the opportunity. He explained that he and his horse had broken their necks at the bottom of a hill over a century ago, and in all that time, no man dared to ride with him—until Charley came along.\n\nThe dullahan left Charley with parting words and the promise of his protection and aid in future races. \"Keep, as you have always done, at the tail of the hounds, never balk at a ditch nor turn away from a stone wall, and the headless horseman will never desert you nor the old mare.\"\n\nYou see little of the dullahan you know in this particular tale, but at the heart of every legend, there is usually a grain of truth. Perhaps there is hope for you yet.\n\nWhat now?\n\n*goto bookchoice\n\n*label Hackelberg\n\nAccording to German legend, Hackelberg was a huntsman whose love for the hunt burned eternal. Even on his deathbed, he longed for it. He asked to be buried in the forest he loved and begged God to allow his spirit to continue the chase on Earth rather than going to Heaven.\n\nHis wish, it seems, was granted. Now and again, wayfarers in the woods report hearing the distant baying of the Wild Huntsman's hounds, his hunting horn echoing like a death-knell throughout the forest. It is said those who hear the horn at night, yet still venture out to hunt the following day, are bound for misfortune.\n\nThe exact whereabouts of his grave are unknown, though it is believed to be guarded by a pack of vicious black dogs. Although in the German version, the Wild Huntsman's head remains attached to his body, according to your grandfather's notes, other highly similar tales describe him as a headless being not unlike a dullahan.\n\nBut was Hackelberg's horn a threat or a warning? Is the nature of the dullahan closer to that of a bloodthirsty hunter or a herald of woe? Or is it, perhaps, a little of both?\n\nWhat now?\n\n*goto bookchoice\n\n\n*label checkpoint_save\n\n*page_break End of Chapter\n*set save_load true\n*set return_to_scene \"highway\"\n*goto_scene savegame", "highway": "*temp money \"have\"\n*temp hiding \"unknown\"\n\n[b]Chapter III: The Highwayman[/b]\n\nThough you swore you had left yourself time enough to get home safely before full dark, the sun seems to have other ideas. By the time you restore the study back to its original state of respectable disarray and step onto the road, the sky has already grown dim. It seems to grow darker still with every step.\n\nBy the time you reach the last turn at the final crossroads of your journey, the twilight hours are dying fast. You shiver involuntarily. To the right lies the way home, but to the left looms the forest. You pause, wondering if the dullahan is watching you even now.\n\nDeliberately, you turn your back on the forest and face homeward. Not a heartbeat later, your skin breaks out in a rash of gooseflesh. You have just enough time to realize you've made a mistake before something crashes through the brush behind you and seizes you.\n\n*page_break\n\nOne heavy, grimy palm clamps down hard over your mouth, muffling your screams. Something sharp and cold presses against your throat as you are dragged backward off of the road and into the shadow of the woods.\n\n\"Stand an' deliver,\" grumbles a voice in your ear. A sudden overwhelming stench of alcohol and God knows what else overwhelms your poor, unprepared nostrils, making you gag.\n\nYour assailant laughs in a mad sort of half-cackle, half-sob. \n*if gender=\"male\"\n  \"Don't exactly have the look of a rich man, do ye? No matter. Give me what you got. Or else.\"\n  *goto HighwaymanChoice\n*if gender=\"female\"\n  \"Don't exactly have the look of a rich lady, do ye? No matter. Give me what you got. Or else.\"\n  *goto HighwaymanChoice\n*if gender=\"neutral\"\n  \"Don't exactly look rich, do ye? No matter. Give me what you got. Or else.\"\n  *goto HighwaymanChoice\n*else\n  *goto HighwaymanChoice\n\n*label HighwaymanChoice\n\nWhat do you do?\n\n*choice\n\n  *hide_reuse #Fight back! If I act quickly, I'll have the element of surprise on my side.\n\n    *goto FightHighwayman\n\n  #Maybe he'll let me live if I do as he says?\n\n    *set guile %-10\n    *goto SurrenderHighwayman\n\n  #I'll do as he asks for now and wait for an opportune moment to escape.\n\n    *set guile %+10\n    *goto HighwaymanOpportuneMoment\n\n\n\n*label FightHighwayman\n\n*if (daring > 59)\n  *goto HighwayPunch\n\n*else\n  You struggle, but your fear outweighs your courage. Your pathetic escape attempt seems to succeed only in annoying your attacker. He presses the knife harder against your throat. \"Don't even think about it,\" he warns you.\n  \n  Time to try a different tactic.\n  *goto HighwaymanChoice\n\n\n*label HighwayPunch\n\nThe last syllable of your assailant's threat has barely left his lips when you strike. Your foot kicks backward to connect with his shin, and you bite down hard on the hand covering your mouth. You reach up with both your own hands to push away the hand holding the knife as the man howls and instinctually jerks away from the source of his suffering.\n\n*choice\n\n  #This man has been haunting the road for too long. It's time someone taught him a lesson.\n\n    *goto TeachHighwaymanLesson\n\n  #I'm unarmed and alone. I'd be a fool not to run.\n\n    This is no time to play hero.\n    \n    You sprint for the trees. It isn't more than the space of a heartbeat or two before you hear the highwayman's clumsy footsteps pounding through the grass after you.\n\n    *set hiding \"yes\"\n    *goto HighwayRescue\n\n\n*label TeachHighwaymanLesson\n\nYou spin around and strike out with a right cross, your fist connecting with a crack against his jaw. He yowls and lashes out at you, his knife flashing in the dark. An arc of agony and hot blood follows in its wake as it slashes through the front of your shirt and the skin of your lower abdomen. The wound runs wide across your stomach but not deep—you'll survive, provided you're able to bandage it later.\n\nThe man shoves you down onto the ground, pinning you flat on your stomach with all of his strength, and presses the knife to your neck again. Pain sears through your wound, white-hot and blinding. You moan in agony and in revulsion at the way his body is pressing against yours.\n\nHe leans down close to you, and the low sound of his voice in your ear makes your skin crawl. \n*if gender=\"female\"\n  \"Bitch,\" he growls. \"I jus' wanted yer money. But you had to be difficult, didn't ya? Now ye owe me extra.\"\n  *set hiding \"no\"\n  *page_break\n  *goto HighwayRescue\n*else\n  \"Bloody idjit,\" he growls. \"I jus' wanted yer money. But you had to be difficult, didn't ya? Now ye owe me extra.\"\n  *page_break\n  *set hiding \"no\"\n  *goto HighwayRescue\n\n\n*label SurrenderHighwayman\n\nCold cash isn't so precious it's worth risking your life for. With trembling hands, you start to reach for your coin purse.\n\n\"Hold it!\" the man snaps, pushing the edge of the blade harder against your throat. \"Keep yer hands where I can see 'em. I'll get the money. If ye scream, I'll cut your throat, y'hear me?\"\n\nYou nod—very carefully—and after a moment's hesitation, he removes his hand. He slides his hand down your side, feeling around for the purse. It's all you can do not to shrink away from his touch.\n\nFinally he finds his target and, with a sharp yank, detaches the purse from your belt. He weighs it in his hand and grunts. \"What's this, pocket change?\"\n\nHe thrusts the bag into a coat pocket and starts feeling around again, checking for a hidden pocket or secret stash.\n\nYou squirm, desperate to break free but unable to fight for it. He nicks your neck with the edge of the knife and mutters, \"Don't even think about it.\"\n\n*set hiding \"no\"\n*set money \"havenot\"\n*page_break\n*goto HighwayRescue\n\n\n*label HighwaymanOpportuneMoment\n\nYou try to speak, but your voice is too muffled to understand.\n\nThe man grunts. \"If ye scream, yer dead,\" he mutters, moving his hand away from your mouth.\n\nYou tell him all the money you carry is in the coin purse hanging from your belt.\n\n\"That's \n*if gender=\"female\"\n  right, lass,\" he purrs. His hand slides down your side to your belt, searching for the purse. \"The easy way is always best. Just hold still, and ye'll be on yer way soon enough.\"\n  \n  Locating his quarry, he tugs on the purse, fumbling with the knotted strings.\n  *goto OpportuneMoment\n*if gender=\"male\"\n  right, lad,\" he purrs. His hand slides down your side to your belt, searching for the purse. \"The easy way is always best. Just hold still, and ye'll be on yer way soon enough.\"\n  \n  Locating his quarry, he tugs on the purse, fumbling with the knotted strings.\n  *goto OpportuneMoment\n*else\n  right,\" he purrs. His hand slides down your side to your belt, searching for the purse. \"The easy way is always best. Just hold still, and ye'll be on yer way soon enough.\"\n  \n  Locating his quarry, he tugs on the purse, fumbling with the knotted strings.\n  *goto OpportuneMoment\n\n*label OpportuneMoment\n\n*if (guile > 59)\n  It's tempting to try and flee the instant he's distracted, but you're clever enough to wait, knowing he won't be able to untie the strings with one hand. Finally coming to the same conclusion, he lowers the knife to cut the purse free from your belt. Just as he's about to cut it, you elbow him hard, knocking the breath out of him. You sprint for the trees.\n  *set hiding \"yes\"\n  *page_break\n  *goto HighwayRescue\n*else\n  *goto failOpportuneMoment\n\n*label failOpportuneMoment\n\nHoping he's distracted enough, you elbow him hard and lunge forward. Though you hear an audible gasp of pain behind you, your timing was off.\n\n\"Ye \n*if gender=\"female\"\n  bitch.\" He presses the knife into the soft skin of your neck until he draws blood, driving his other fist into your gut hard enough to leave you breathless. \"Ye try that again and yer dead, got it?\"\n  *set hiding \"no\"\n  *page_break\n  *goto HighwayRescue\n*else\n  bastard.\" He presses the knife into the soft skin of your neck until he draws blood, driving his other fist into your gut hard enough to leave you breathless. \"Ye try that again and yer dead, got it?\"\n  *set hiding \"no\"\n  *page_break\n  *goto HighwayRescue\n\n\n*label HighwayRescue\n\n*if hiding=\"yes\"\n  Once enveloped in the deep dark of the forest, you run only long enough to put decent space between yourself and your pursuer. Once his footfalls and cursing begin to sound muffled, you force yourself to slow, to fall quiet, to slip deeper into the woods unheard.\n\n  Figuring the highwayman is too drunk to properly track you, you don't waste time covering your path. Instead, you creep up to one of the larger trees and begin to climb. You're just able to pull yourself up into the sheltering foliage of the higher boughs before the man reappears, breathless and all but foaming at the mouth.\n\n  \"Where are you?\" he shouts. \"I know you're here somewheres. You can't hide forever!\" He pauses, no doubt listening for signs of your presence.\n  \n  You hold your breath. In that still, breathless moment it occurs to you: the forest has fallen into a dead, unnatural silence.\n\n  *page_break\n\n  It's just as before. One moment, nothing but silence—the next, a tall, dark shadow emerging from the lesser, darker shadows cast by the trees. The air crackles, a perfect conductor for the dullahan's flaring temper.\n\n  Your attacker whirls around to face the dullahan and cries out in alarm. He raises his knife. \"Oi! Who—what…who are you, then? Stay back! I'm warning you!\"\n  \n  The dullahan advances. Panicking, the highwayman draws his arm back and, with a flick of the wrist, makes his first mistake, tossing his knife at the dullahan's throat.\n\n  The knife hits its mark. The dullahan makes no sound, but his blood-red rage floods through the scene like a tidal wave. He rips the knife from his throat and tosses it aside. He surges forward. The highwayman tries to flee—his second and final, fatal mistake.\n\n  The dullahan's whip flashes out like lightning in the pale moonlight. It hits the ground, dripping red with fresh blood.\n  \n  The highwayman drops to the forest floor with a strangled, gurgling cry. Another lash elicits another cry and another spray of blood. The third strike leaves the man silent, twitching for a few moments before falling perfectly, dreadfully still. A dark puddle begins to spread from his limp, lifeless body, soaking the ground beneath him.\n\n  *goto HighwayRescue2\n\n*else\n  *goto UnhiddenRescue\n\n\n*label HighwayRescue2\n\n*if (faeriesight > 69)\n  A half-transparent shade with the highwayman's face rises from the corpse, emitting an unearthly shriek at the sight of the body at its feet. Flailing, it flees with wild abandon into the woods.\n  \n  The dullahan, for his part, seems oddly unconcerned with the ghost's fate. He wipes his whip clean on his coat and hooks it back onto his belt, then leans back as if to look up. With a jolt, you realize he's waiting for you. You hastily clamber down.\n  *page_break\n  *goto HighwayFinale\n*else\n  The dullahan wipes his whip clean on his coat and hooks it back onto his belt, then leans back as if to look up. With a jolt, you realize he's waiting for you. You hastily clamber down.\n  *page_break\n  *goto HighwayFinale\n\n\n*label UnhiddenRescue\n\nJust as you're considering whether a second attempt, however fatal, at escape might be preferable to allowing this man to touch you for even a second longer, the tables turn. A familiar shape is emerging from the forest: a patch of darkness darker than the night itself. Its footfalls make no sound as it approaches.\n\nYour captor grips you with anxious forcefulness. He sees it too. \"Oi! Who goes there?\"\n\nThe dullahan's chilling silence envelops you, and you can tell the man also feels it by the way he begins to shiver, his nails digging into your skin.\n\nHe presses the knife hard against your neck. \"Stop right \n*if gender=\"female\"\n  there! Stop, or I'll kill 'er! Her blood'll be on yer hands!\"\n  *goto UnhiddenRescue2\n*if gender=\"male\"\n  there! Stop, or he's a dead man! And ye'll be next!\"\n  *goto UnhiddenRescue2\n*else\n  there!\" He turns the knife to reflect the moonlight and presses till it draws blood. \"I'm warning ye! Don't want innocent blood on yer hands, do ye?\"\n  *goto UnhiddenRescue2\n\n*label UnhiddenRescue2\n\nSomething white flashes out in the darkness, whistling dangerously close to your jaw as it knocks the knife out of the highwayman's hand. With a shriek, he releases you, staggering back. He opens his mouth to shout, but the words never make it past his lips. Another white flash leaves a crimson gash in its wake, and blood pours from the man's throat as he collapses, gurgling, to the ground.\n\nHe twitches for a moment, then falls still. A puddle of blood pools around his lifeless corpse and stains the ground red.\n\n*if (faeriesight > 69)\n  A half-transparent shade with the highwayman's face rises from the corpse, emitting an unearthly shriek at the sight of the body at its feet. Flailing, it flees with wild abandon into the woods.\n  \n  The dullahan, for his part, seems oddly unconcerned with the ghost's fate. You look up to see the dullahan wiping his bone-whip clean on his coat. He hooks it back onto his belt and stands, arms crossed. Waiting.\n  *page_break\n  *goto HighwayFinale\n*else\n  You look up to see the dullahan wiping his bone-whip clean on his coat. He hooks it back onto his belt and stands, arms crossed. Waiting.\n  *page_break\n  *goto HighwayFinale\n\n*label HighwayFinale\n\nShaken (and shaking), you blurt out the first thing that comes to mind. You thank him, wondering even as you do so whether he truly meant to save you or simply wanted to punish the highwayman for his insolence.\n\nThe dullahan doesn't react. He's still waiting. Finally, you recall your original mission, and it dawns on you that he's expecting good news.\n\nFumbling for words, you explain that while you don't have his head yet, you've learned some valuable information that may help you discover both the thief and the dullahan's stolen property. Of course, much of your research yielded vague answers at best; it would serve you far better to know the truth, even just one hard fact. But dare you pry?\n\n*choice\n\n  #I don't dare.\n    It is apparent he is not in the best of moods tonight. Best not to risk riling him further.\n    *goto HighwayFinale2\n\n  #It can't hurt to ask—I hope.\n    Swallowing the lump in your throat, you tell him your readings did not give clear answers as to his origins or the reasoning behind his choice of victims. You explain that such answers could be quite helpful in your search.\n    \n    The dullahan crosses his arms. His silence is deafening. You quickly apologize for prying and decide to move on.\n    *goto HighwayFinale2\n\n\n*label HighwayFinale2\n\nThe dullahan continues to stand there, unmoving. Is he still waiting? Perhaps he's hoping for—or demanding—more. But there is no more to tell.\n\nWell…except for one thing. Your grandfather's notes mentioned a dullahan's weakness is gold. This means not only did the burglary likely involve the use of something gold, the thief must also have been the sort who would know this secret in the first place. But is it really in your best interest to tell the dullahan you know his weakness?\n\n*choice\n\n  #I'm afraid speaking up will be the death of me. I don't want to die!\n    *gosub trial_end\n    You keep your trap shut, and for several long, gut-wrenching moments you await his response. He moves and you flinch, terrified he's about to kill you—but no, he reaches out instead to grab your shoulder, feeding you a vision of moon phases and severed heads and spilled blood. Another warning.\n    \n    Satisfied he has made his point, the dullahan turns and walks away, leaving you standing alone in the dark beside a dead man.\n    *set daring %-10\n    *goto HighwayFinale3\n\n  #I will tell him. Better to be honest now than dead later. Besides, it is the right thing to do.\n    *gosub trial_end\n    Taking a deep breath, you share your knowledge with the dullahan. He stiffens and you brace yourself, certain you're about to go the way of the highwayman—but at length he bows slightly, as if in his best approximation of a nod.\n    \n    The dullahan pauses, then reaches out to touch your shoulder, less painfully than the last time he did so. He sends you visions of the loss of his head and of what will happen to you if you fail to find it. Once his warning is finished, he turns and walks away, the unnatural silence retreating with him.\n    *set guile %-10\n    *set altruism %+10\n    *set daring %+10\n    *goto HighwayFinale3\n\n  #Why would I tell him something I might be able to use to my advantage later?\n    *gosub trial_end\n    You keep your trap shut, and for several long, gut-wrenching moments you await his response. He moves and you flinch, terrified that he's about to kill you—but no, he reaches out instead to grab your shoulder, feeding you a vision of moon phases and severed heads and spilled blood. Another warning.\n    \n    Satisfied he has made his point, the dullahan turns and walks away, leaving you standing alone in the dark beside a dead man.\n    *set guile %+10\n    *set altruism %-10\n    *goto HighwayFinale3\n\n\n\n*label HighwayFinale3\n\n*if money=\"havenot\"\n  You grimace down at the corpse beside you. You wish there were another way, but there's nothing for it—he still has your coin purse, and there's no one else around who will fetch it for you. You kneel down and pry the purse from his cold, dead fingers.\n  \n  You reattach your purse to your belt and rise. Something in the grass glints and catches your eye.\n\n  *goto KnifeChoice\n\n*else\n  You step around the corpse of the highwayman, careful not to tread on the bloodied ground surrounding him. Suddenly, a glint in the grass catches your eye.\n\n  *goto KnifeChoice\n\n*label KnifeChoice\n\nIt's the highwayman's knife. Should you take it with you?\n\n*choice\n\n  #A little extra protection couldn't hurt.\n    You pick up the knife and carefully slide it into your boot. Its presence is somewhat of a comfort, even if deep down, you know it probably won't do you much good. You turn your boots towards home again, and this time, you manage to arrive at your destination without further incident.\n    *set weapon \"highwayknife\"\n    *goto checkpoint_save\n\n  #I'd rather not.\n    A measly little knife probably won't be of much use to you on this particular adventure anyway, or so you tell yourself. You turn your boots towards home again, and this time, you manage to arrive at your destination without further incident.\n    *goto checkpoint_save\n\n\n*label checkpoint_save\n\n*page_break End of Chapter\n*set save_load true\n*set return_to_scene \"tavern\"\n*goto_scene savegame\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n  *label purchased\n  *return\nRemember earlier how we told you that the first part of the game is available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n  *subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2018-07-26 $2.99 $1.99 purchased\n*abort\n", "savegame": "*if (save_load)\n\n  *set sname name\n  *set sgender gender\n  *set sweapon weapon\n  *set sjob job\n  *set sshamrock shamrock\n  *set sredmenbargain redmenbargain\n  *set sbody body\n  *set sdullahan dullahan\n  *set smaire maire\n  *set sdullahanstatus dullahanstatus\n  *set smairemurder mairemurder\n  *set saltruism altruism\n  *set sdaring daring\n  *set sguile guile\n  *set sfaeriesight faeriesight\n  *set sluck luck\n  *goto endsaveload\n\n*else\n\n  *set name sname\n  *set gender sgender\n  *set weapon sweapon\n  *set job sjob\n  *set shamrock sshamrock\n  *set redmenbargain sredmenbargain\n  *set body sbody\n  *set dullahan sdullahan\n  *set maire smaire\n  *set dullahanstatus sdullahanstatus\n  *set mairemurder smairemurder\n  *set altruism saltruism\n  *set daring sdaring\n  *set guile sguile\n  *set faeriesight sfaeriesight\n  *set luck sluck\n  *goto endsaveload\n\n\n*label endsaveload\n*if choice_randomtest\n  *set return_to_scene \"startup\"\n*if (save_load)\n  [b]Progress Saved…[/b]\n\n  Should you die during the next chapter, you will be able to return to this point.\n\n  *page_break Begin Next Chapter\n  *goto_scene {return_to_scene}\n\n*else\n  [b]You died.[/b]\n\n  Perhaps if you were to choose more wisely, fate would treat you more kindly. Would you like to try again?\n\n  [b]Reminder:[/b] Certain choices may boost or lower your character stats, while others may require high or low scores in specific stats in order to achieve a favorable outcome. If you're unsure of your next move, it may be wise to check your stats to see where your current strengths and weaknesses lie.\n\n  *if return_to_scene = \"startup\"\n    *page_break Restart Game\n    *restart\n  *choice\n    #Restart chapter.\n      *goto_scene {return_to_scene}\n    #Restart game.\n      *restart\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\nYour reasons, however, likely won't be of much interest to whatever it is you've stumbled upon. Whether man or monster, the things that walk the woods by moonlight are generally to be avoided. Present company excluded, of course.\n\nThe strange thing is, despite how close your instinct tells you this creature is, you don't hear any signs of its approach. No crunching of leaves nor snapping of twigs, not even the odd howl, whistle, or growl.\n\nIn fact, the rest of the forest seems to have fallen mute as well. Where are the mice, the owls, the badgers, the wolves? Only the whisper of leaves shivering at the touch of a cool breeze breaks the silence.\n\nA tremor runs down your own spine; your hands are cold and clammy. The creature draws ever nearer. You don't know how you know—you just do.\n\nThe question is, what are you going to do about it?\n\n*fake_choice\n  #I will stand my ground and fight if necessary. I will not let my imagination get the best of me.\n  #I will wait patiently for the creature to emerge. Perhaps it is only a fellow wanderer lost in the woods, same as me.\n  #I will hide. If it is a person, perhaps I can pickpocket them—and if it is an animal, perhaps I can capture it and sell it as a pet to some eccentric aristocrat.\n  #I will hide. Hopefully whatever it is will pass me by and leave me in one piece.\n\n*script changeBackgroundColor(\"black\")\n\nThe dullahan waits, a question hanging in the air. How, exactly, can you prove you didn't take it?\n\nThere's only one way, of course. To prove your innocence, you must prove someone else's guilt. With a sinking feeling in your stomach, you force the bitter words out of your mouth.\n\nYou will help him find the thief.\n\nThough his movements are subtle, some of the tension leaves the dullahan's shoulders and stance. You sense he is surprised and at least considering your proposal. On the one hand, you dread his acceptance—but on the other hand, it does seem to be your only chance to survive this encounter.\n\nPerhaps a little additional convincing is in order? What might make your assistance valuable to the dullahan?\n\n*fake_choice\n  #My courage is unequaled. I will neither flee nor falter till my quest is complete.\n  #Deadly or not, this creature is clearly hurt by his loss. What is a dullahan without his head? I have no ulterior motives; I only want to help.\n  #For the right price, I am capable of anything. Even recovering a stolen head.\n  #I'll do anything he wants as long as he doesn't kill me! I will do his bidding without question, I swear!\n  #What happened to this creature, regardless of his nature, is wrong. My intentions are pure; I wish only to set things right.\n  #It's obviously in my best interests to help him, isn't it? So there's no good reason why I wouldn't see this through to the end.\n\n*script changeBackgroundColor(\"sepia\")\n\nOne heavy, grimy palm clamps down hard over your mouth, muffling your screams. Something sharp and cold presses against your throat as you are dragged backward off of the road and into the shadow of the woods.\n\n\"Stand an' deliver,\" grumbles a voice in your ear. A sudden overwhelming stench of alcohol and God knows what else overwhelms your poor, unprepared nostrils, making you gag.\n\nYour assailant laughs in a mad sort of half-cackle, half-sob.\n\"Don't exactly look rich, do ye? No matter. Give me what you got. Or else.\"\n\nWhat do you do?\n\n*fake_choice\n  *hide_reuse #Fight back! If I act quickly, I'll have the element of surprise on my side.\n  #Maybe he'll let me live if I do as he says?\n  #I'll do as he asks for now and wait for an opportune moment to escape.\n\nWhen you ask Eamon if he's noticed anything out of the ordinary around the Howling Hound, he falters for a moment, glancing up with an incredulous look in his eyes. He doesn't answer right away. Though you can tell by the way he's acting that the answer is yes, you worry he might not be willing to divulge anything further.\n\nPerhaps it is because of your history together, however distant, or perhaps it is because your question caught him so off-guard. Whatever the reason, Eamon chooses to speak. \"Your grandfather always did say you had the Sight.\"\n\nHe casts a quick look around as though to confirm no one is eavesdropping. \"A couple of months ago, I noticed missing food and drink that could not be accounted for in the ledgers. I questioned the staff, but no one confessed, and no proof against any of them emerged then or since. I considered that perhaps some sort of vermin were to blame, but I've yet to find proof of that either. I run a clean establishment, just as Father did.\"\n\nHere he frowns. \"Some of the staff are convinced that the culprit is…of unnatural origin. Some of the girls claim that it pulls on their skirts and the ribbons in their hair when they enter the cellar, and a man who was caught attempting to steal a drink from one of the kegs swore that something attacked him, scratching at his ankles and tripping him up.\"\n\nEamon looks away, busying himself once more with tending to the glassware. \"Some say they've also heard singing in the cellar. But of course, it's more likely than not just some trick of the senses.\"\n\nWhat now?\n\n*fake_choice\n  #Ask to see the cellar.\n  #Talk about something else.\n  #End the conversation.\n\nCaptain McDowell blinks, clearly startled by your blunt inquiry. \"How did you know about that?\"\n\nYou explain that you've heard rumors about the incident.\n\n\"And why exactly,\" asks the captain, his eyes intent upon your face, \"are you interested in this alleged incident?\"\n\n*fake_choice\n  *disable_reuse #\"I'm trying to help someone right a wrong that was done to them.\"\n  *disable_reuse #\"It's a matter of grave peril. I can't say more than that.\"\n  #\"Please. My life depends on it.\"", "startup": "*title The Harbinger's Head\n*author Kim Berkley\n*scene_list\n  startup\n  grandmas\n  highway\n  $ tavern\n  $ docks\n  $ witch-hunt\n  $ aftermath\n  $ ending\n\n*create name \"\"\n*create gender \"neutral\"\n\n*create weapon \"none\"\n*create job \"unknown\"\n*create shamrock \"none\"\n\n*create redmenbargain \"no\"\n*create body \"none\"\n*create dullahan \"alive\"\n*create maire \"alive\"\n*create dullahanstatus \"normal\"\n*create mairemurder \"no\"\n*create clurichaun \"no\"\n\n*create altruism 50\n*create daring 50\n*create guile 50\n*create faeriesight 50\n*create luck 1\n\n*create return_to_scene \"\"\n\n*comment Dullahan and Maire can be set to alive or dead. Sorcha has a temp variable in the witch hunt chapter. Dullahanstatus is neutral, angry (you threatened him or killed him), or unwillingprotector (you forced him to protect you from the Red Men).\n\n*create save_load false\n\n*create sname \"\"\n*create sgender \"neutral\"\n\n*create sweapon \"none\"\n*create sjob \"unknown\"\n*create sshamrock \"none\"\n\n*create sredmenbargain \"no\"\n*create sbody \"none\"\n*create sdullahan \"alive\"\n*create smaire \"alive\"\n*create sdullahanstatus \"normal\"\n*create smairemurder \"no\"\n\n*create saltruism 50\n*create sdaring 50\n*create sguile 50\n*create sfaeriesight 50\n*create sluck 1\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Visit a myth-infested 1820s Ireland. One dark (if not particularly stormy) night, you find yourself face to face with a frightening visage—or lack thereof. Though shaped like a man, the creature you’ve encountered appears to have lost his head. Worse, he seems to think you might be the one to blame!\n\n  [i]The Harbinger's Head[/i] is a fantastic 46,000 word interactive horror novel by Kim Berkley, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n  It’s up to you to prove your innocence and discover the true thief of the harbinger's head before your own winds up on the chopping block!\n\n  • Play as male, female, or non-binary.[n/]\n  • Step into the shoes of an herbalist, schoolteacher, or lamplighter.[n/]\n  • Shape your personality and build your skills through the choices you make, or trust your luck at your own peril.[n/]\n  • Make friends—or enemies—of the various Fae creatures you’ll encounter along the way.[n/]\n  • Discover one of eight endings…or meet an untimely death.\n\n  *if choice_prerelease and not(choice_is_ios_app)\n    [i]You can play the first part of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n    *choice\n      #Sign up to be notified when the game is available.\n        *subscribe {\"now\": true}\n        *restart\n      #Play the first part of the game now for free.\n        *goto purchased\n\n  [i]You can play the first part of the game for free. Purchase the rest of the game below.[/i]\n  *if choice_is_advertising_supported\n    [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n  *purchase_discount adfree 2018-07-26 $2.99 $1.99 purchased\n  *if choice_is_advertising_supported\n    *page_break_advertisement\n  *if not(choice_is_advertising_supported)\n    *page_break Play Now for Free\n\n\n*label purchased\n\n\n\n*label Prologue\n\n[b]Chapter I: Midnight Meeting[/b]\n\nThe year is 1820; the month, October. What better time than that of the blood moon for dark mischief?\n\nAnd it is mischief you sense, no doubt about it. Dark, otherworldly mischief—and whatever its source, it isn't far from you at all. You feel the cackle-crackle of it in the chilled air, tiptoeing through your nervous system and leaving gooseflesh in its wake.\n\nTell me, what is your name?\n\n*input_text name\n\nAnd how do you prefer your pronouns?\n\n*choice\n\n  #Male.\n    *set gender \"male\"\n    *goto forestflashback\n\n  #Female.\n    *set gender \"female\"\n    *goto forestflashback\n\n  #Neither.\n    *set gender \"neutral\"\n    *goto forestflashback\n\n*label forestflashback\n\nYou shouldn't be in the woods at night, ${name}—a lesson you learned the hard way when you were but a \n*if gender=\"male\"\n  lad. \n*if gender=\"female\"\n  lass. \n*if gender=\"neutral\"\n  child. \nWhat were you doing in the woods all those years ago?\n\n*choice\n\n  #I sought a rare flower which blooms only by the light of the full moon. I wished to give it to my mother for her birthday.\n\n    *set altruism %+10\n    *goto Escape\n\n  #The miller's son dared me to spend the night in the forest. I never walk away from a challenge.\n\n    *set daring %+10\n    *goto Escape\n\n  #My brother tricked me into going. He told me if I went alone at night, I might catch a glimpse of the Fair Folk.\n\n    *set guile %-10\n    *goto Escape\n\n  #I was searching for a four-leaf clover. I'd dreamt of a place where I'd find one—and I was right! Too bad I never got the chance to take it with me.\n\n    *set luck +1\n    *set faeriesight %+10\n    *goto Escape\n\n\n*label Escape\n\nUnfortunately, you chose an especially inopportune time to wander into the woods on your own. Something found you that night, something quite hungry and with a particular taste for young flesh.\n\nA hobgoblin.\n\nWith hooklike claws and gnashing teeth, it leaped out at you from the shadows, lunging for the bare, unprotected skin of your throat. You managed to dodge the attack—out of luck, or fate, or some unseen helping hand, you never did know—and lived to breathe another breath.\n\nBut your evasive maneuver bought you seconds only. How did you manage to escape the clutches of that bloodthirsty creature?\n\n*choice\n\n  #I ran, leading it back towards an old bear trap I'd come across earlier. With careful timing, I hopped right over the trap. The goblin didn't.\n\n    *set guile %+10\n    *goto Grandpa\n\n  #I grabbed the largest branch I could lift and ran at the goblin, shrieking like a berserk warrior. Deciding I was not worth the trouble, it fled.\n\n    *set daring %+10\n    *goto Grandpa\n\n  #I climbed a tree, hoping it wouldn't follow. It did—but one of the branches broke beneath its weight, and it fell, suffering fatal wounds. Lady Luck was on my side that night.\n\n    *set luck -1\n    *goto Grandpa\n\n*label Grandpa\n\nOf course, when you told the rest of your village about your adventure, nobody believed you. And by the time someone thought to check the forest, the hobgoblin was nowhere to be found.\n\nOnly your grandfather seemed to find your story plausible. The other adults often complained he filled your head with stuff and nonsense, and they whispered behind closed doors about his superstitions and eccentric mannerisms. To you, he was the greatest storyteller you'd ever known.\n\nHe spun tale after tale for you about all manner of fantastic creatures. Listening to him, you swore you could hear the far-off stomp-stomp-stomp of roaring giants and the screeching of banshees in the wee foggy hours before the morn. He knew the names of every member of the Inner Circle of the Seelie Court and never failed to leave an offering of milk outside the door every Samhain for the local Cat Sidhe.\n\n*page_break\n\nWhat the other adults didn't know was that your grandfather's stories weren't just stories. Not to you. To you, they were knowledge. To you, they were truth. For they gave you names for the things you sometimes glimpsed on the brink of sleep just before your eyes closed, the shadows that moved at the edges of your sight, only to disappear when you turned your head.\n\nAny attempt to broach the subject to your mother or father or any other responsible adult led, at best, to a stern (if well-meaning) lecture on the difference between fantasy and reality. At worst, it led to ridicule. Only your grandfather accepted your seemingly tall tales without batting an eye. \"You've got the Sight,\" he would tell you with a wink. \"You're a lucky one, \n*if gender=\"male\"\n  laddie.\"\n*if gender=\"female\"\n  lassie.\"\n*if gender=\"neutral\"\n  you are.\"\n\nAs you grew older, however, you began to doubt. Surely such stories could only be just that, stories—right? Surely the Fair Folk and their ilk were nothing but bedtime tales. Perhaps the creature you met in the woods that night was no hobgoblin, but some ordinary forest beast warped by a child's terror and imagination into something more than it truly was.\n\nIt couldn't have actually been a hobgoblin—could it?\n\n*choice\n\n  #Of course not. Hobgoblins aren't real. It was probably just a wildcat or perhaps a runaway goat. With rabies.\n\n    A sound theory, though not one your grandfather would likely approve of. But every child must grow out of their bedtime stories sometime, right?\n\n    *set faeriesight %-20\n    *goto Profession\n\n  #Of course not. My imagination simply ran away with me thanks to all those stories. Grandfather should have known better—but then, he always was a bit off his rocker.\n\n    Besides, you didn't have time for his silly Faerie stories anymore. You were busy learning practical things, things you could actually use for the rest of your life.\n\n    *set faeriesight %-20\n    *set altruism %-10\n    *goto Profession\n\n  #I certainly hope not. The world is dangerous enough without mythological beasts running amok. Just thinking about it gives me the shivers.\n\n    You never did like Grandfather's scary stories anyway; they gave you the most terrible nightmares. You preferred your picture books, with all their warm, bright colors and happy endings.\n\n    *set faeriesight %-10\n    *set daring %-10\n    *set guile %-10\n    *goto Profession\n\n  #Of course it was. Child or not, I know a hobgoblin when I see it!\n\n    It never mattered that no one believed you. You believed, and Grandfather believed, and that was enough.\n\n    *set faeriesight %+20\n    *goto Profession\n\n  #Whether it was or wasn't, I believe in Grandfather and his stories.\n\n    Grandfather was on the strange side, yes, but kooky is a far cry from crazy. Besides, what other explanation is there for the things you've seen over the years?\n\n    *set faeriesight %+20\n    *set altruism %+10\n    *goto Profession\n\n  #I don't know what to believe. I try not to think about it too hard.\n\n    It's easier that way, isn't it?\n\n    *set guile %-10\n    *goto Profession\n\n*label Profession\n\nIt's been years since Grandfather told you one of his tales, and even longer since the incident in the woods. Whether the thing you faced as a child was of this world or not, it was nothing compared to the company you're in tonight. Whatever it is you're sensing now feels much stronger, much more menacing, than a mere hobgoblin or wildcat.\n\nYou are no longer a child; youthful folly cannot excuse you for making the same mistake twice. What was it that compelled you to venture into danger this time?\n\n*choice\n\n  #I am an herbalist. I was gathering certain ingredients which can only be properly identified by starlight.\n\n    *set job \"herbalist\"\n\n    What sort of ingredients?\n\n    *choice\n\n      #Healing herbs.\n\n        A noble pursuit, to be sure. Hopefully you won't be needing those herbs for yourself tonight.\n\n        *set altruism %+20\n        *goto PresentDay\n\n      #Poisonous herbs.\n\n        Belladonna, larkspur, moonflower—why is it that the most deadly things have the most poetic names?\n\n        *set guile %+20\n        *goto PresentDay\n\n  #I am a lamplighter, and my work ends as the sun sets. The walk home from the town square is long and dark, and tonight I was too weary to realize I'd lost my way until I was neck-deep in the woods.\n\n    *set job \"lamplighter\"\n\n    A lamplighter? An interesting choice of profession. Does it pay well?\n\n    *choice\n\n      #Not exactly. Luckily I have quick fingers and a deft touch—it's easy to lift a wallet here and a coin purse there during the day, between shifts.\n\n        It's always nice to have some extra change in your pocket. Unfortunately, your pickpocketing skills aren't likely to do you much good in your current situation.\n\n        *set altruism %-20\n        *goto PresentDay\n\n      #It pays enough. Besides, something about lighting fires to ward off the night feels rather heroic. And you'd never believe the sort of people you meet during the morning shift!\n\n        It takes courage to walk alone in the dark—and you'll no doubt have need of that before this night is over.\n\n        *set daring %+20\n        *goto PresentDay\n\n  #I am a schoolteacher. I covered for a fellow teacher's evening classes, and the sun was already setting by the time class was over.\n\n    *set job \"teacher\"\n\n    But what on earth is a schoolteacher doing in the woods? Why not take the main road home?\n\n    *choice\n\n      #I thought if I took a shortcut through the forest, I'd be able to make it home before full dark.\n\n        Unfortunately, it looks as though you were mistaken.\n\n        *set guile %-20\n        *goto PresentDay\n\n      #I've heard tell of a dangerous highwayman haunting the main road after sunset these past few weeks. On the road, I would be vulnerable. Here in the woods, at least, I can take cover in the foliage.\n\n        A fair point. Though of course, that means other things might be hiding here as well…things which may prove more dangerous than a greedy highwayman.\n\n        *set daring %-20\n        *goto PresentDay\n\n*label PresentDay\n\nYour reasons, however, likely won't be of much interest to whatever it is you've stumbled upon. Whether man or monster, the things that walk the woods by moonlight are generally to be avoided. Present company excluded, of course.\n\nThe strange thing is, despite how close your instinct tells you this creature is, you don't hear any signs of its approach. No crunching of leaves nor snapping of twigs, not even the odd howl, whistle, or growl.\n\nIn fact, the rest of the forest seems to have fallen mute as well. Where are the mice, the owls, the badgers, the wolves? Only the whisper of leaves shivering at the touch of a cool breeze breaks the silence.\n\nA tremor runs down your own spine; your hands are cold and clammy. The creature draws ever nearer. You don't know how you know—you just do.\n\nThe question is, what are you going to do about it?\n\n*choice\n\n  #I will stand my ground and fight if necessary. I will not let my imagination get the best of me.\n\n    A bold choice.\n\n    Scanning the ground, you spot a large rock, hefty enough to do decent damage but light enough that you would not struggle to throw it. You also see a branch, long and weathered almost to smoothness; it's about the size of a sturdy walking stick.\n\n    *set daring %+20\n    *set guile %-10\n\n    *choice\n\n      #I pick up the rock. A ranged weapon means dealing damage without having to get too close.\n\n        Just don't miss—one rock means you'll only get one shot.\n\n        *set weapon \"rock\"\n        *set guile %+10\n        *goto DullahanEntrance\n\n      #I pick up the stick. It's easier to wield and can be used both to attack and to defend myself.\n\n        If only swords grew on trees. Still, your makeshift staff is certainly better than nothing.\n\n        *set weapon \"branch\"\n        *goto DullahanEntrance\n\n      #I have no need of weapons! I can take this thing with my bare hands!\n\n        There's a fine line between bravery and stupidity. You enjoy living on the edge of it, don't you?\n\n        *set daring %+10\n        *set guile %-10\n        *set weapon \"hands\"\n        *goto DullahanEntrance\n\n  #I will wait patiently for the creature to emerge. Perhaps it is only a fellow wanderer lost in the woods, same as me.\n\n    Very understanding of you. Of course, if you're wrong, your mistake will likely prove fatal.\n\n    *set altruism %+20\n    *set guile %-20\n    *set weapon \"empathy\"\n    *goto DullahanEntrance\n\n  #I will hide. If it is a person, perhaps I can pickpocket them—and if it is an animal, perhaps I can capture it and sell it as a pet to some eccentric aristocrat.\n\n    How resourceful of you.\n\n    *set altruism %-20\n    *set guile %+10\n    *set weapon \"hidingbush\"\n    *goto DullahanEntrance\n\n  #I will hide. Hopefully whatever it is will pass me by and leave me in one piece.\n\n    No sense risking life and limb facing some unknown predator, after all.\n\n    *set daring %-20\n    *set weapon \"hidingtree\"\n    *goto DullahanEntrance\n\n*label DullahanEntrance\n\nYour heart pounds against the bones of its cage as though it would break loose and flee if it could. You itch to turn away, to escape, but you stay put—though whether through sheer force of will or the paralysis of fear, it's hard to say.\n\nThere are no telltale footsteps nor the crashing of foliage brushed hastily aside to warn you before it happens. One minute, you're peering anxiously into the dark, watching for signs of impending arrival—the next, it's there in front of you, a wild fury of motion cloaked in living shadow and the blackest of ebony cloth.\n\nA man, then? But the shape appears wrong. Something is missing. It's not until the creature suddenly falls still as a statue that you realize what that something is.\n\nIts head. It's missing its head.\n\n*page_break\n\nYour grandfather's stories come flooding back to you, some tiny, unfrozen part of your mind grabbing at memory after memory, searching with growing desperation for an explanation of the sight before you.\n\nA demon in the shape of a tall, dark, and headless man, clad neck to toe in black. Its cloak swings back and forth behind it in the wake of its manic entrance, yet no rustling of cloth reaches your ears. The moonlight glints off of the buckles of its boots—riding boots.\n\nSuddenly you have it. A dullahan. This man—this demon—is a dullahan. A herald of death and a stealer of souls, a dullahan's sole purpose in visiting the realm of the living is to end lives. Carrying its severed head aloft like a lantern, it seeks out its victims with its preternatural sight and calls out once, just once, uttering the only sound its cracked, pale lips can utter: the name of its prey.\n\nThat single, fatal, inescapable utterance is the last thing its victims hear. In that moment, they are ripped, heart and soul, from their earthly bodies into the spirit world. There they are forced to ride with the dullahan into the realm of death, never to return.\n\n*page_break\n\n*if weapon=\"rock\"\n\n  You will not be carried away by this dark faerie! You cannot fight it, but perhaps you have a shot at escape. Your fingers wrap white-knuckled around the stone in your palm, and you take a deep breath, preparing for the leap of faith that just might save you—or end you for good.\n\n  In one quick motion, you draw your arm back and fling the stone with all your might at the dullahan. You don't watch to see if you hit your target. The moment the stone leaves your hand, you're already turning away, one foot flashing forward to take the first step away—away from this nightmare.\n\n  Four steps more are all you can manage before it is upon you like flies upon rotting flesh.\n\n  *set weapon \"none\"\n  *page_break\n  *goto DullahanUpClose\n\n*if weapon=\"branch\"\n\n  There are two choices here: cowardice or madness. You clutch your branch tightly, your hands trembling, and some tiny, tucked away corner of your heart wishes you could choose the easy way out. But you won't. It's just not in your nature.\n\n  So you let the madness drown out the terror, and raising your weapon high, you let loose a shrill, banshee-like war cry and rush at the monster standing before you with all the battle fury you can muster.\n\n  Your attack fails spectacularly. Not only does the dullahan appear unharmed, even bored, by your assault, your branch snaps in two in the process.\n\n  *set weapon \"none\"\n  *page_break\n  *goto DullahanUpClose\n\n*if weapon=\"hands\"\n\n  Flight would be futile. No mortal can outrun death. But just because your time has come doesn't mean you have to take it lying down.\n\n  You have no weapons, but you need none. You have your free will and your fury, and you will rage—rage against darkness and death, a star burning brightest in your final moments.\n\n  Roaring like thunder, you rush forward. And with all the might you can muster, you send your fist flying at the creature's chest, where its heart (if it had one) would be.\n\n  It doesn't work…not that you ever really expected it to. Your fist connects painfully with an immovable wall of black, and instead of the dullahan, it is you who stumbles back, your hand aching from the impact.\n\n  *set weapon \"none\"\n  *page_break\n  *goto DullahanUpClose\n\n*if weapon=\"empathy\"\n\n  Fear curls its cold tendrils around your heart, but you keep still, willing your feet to stay firmly rooted to the ground. You wonder if you should speak first or wait. But without a head, you're pretty sure the dullahan cannot speak—and even if it had a head, you wouldn't want it to say the one thing it could (and probably would) say: your name.\n\n  You suck in your breath and open your mouth to speak. That single, trembling sound is all it takes—in a flash, the dullahan is upon you, crossing the distance between it and you with a sickening, inhuman speed too fast for even your Sighted eyes to follow.\n\n  *set weapon \"none\"\n  *page_break\n  *goto DullahanUpClose\n\n*if weapon=\"hidingtree\"\n\n  You hold your breath, praying with every fiber of your being that it cannot hear your heartbeat. Seconds tick by. The dullahan does not move.\n  \n  Neither do you, but you can feel the pressure building in your chest. If only it would leave. If only something would distract it! But the forest remains eerily silent, and the seconds continue to tick by in slow, agonizing procession.\n  \n  You count to give yourself something, anything to do besides thinking about the burning lack of oxygen in your lungs.\n\n  One. Two. Three…\n\n  You know a split second before it happens that you're about to sign your own death warrant, but you know there's nothing you can do to stop it. You can't fight biology. You gasp aloud, gulping in a draught of air like a drowning man at a watering hole.\n\n  Your gasp becomes a cry of surprise when something sharp and white suddenly flickers through the air towards you, ripping through the base of the branch with impossible force. Splinters fly, and you glimpse the tail end of a whip made of—is that a human [i]spine[/i]?—before you and your severed perch come crashing to the ground at the dullahan's feet.\n\n  *set weapon \"none\"\n  *page_break\n  *goto DullahanUpClose\n\n\n*if weapon=\"hidingbush\"\n\n  You will your breath to slow to a whisper, pressing a hand over your pounding heart as if to muffle the sound. You are a statue, you are stone; you will not move so much as a hair's breadth until the opportune moment.\n\n  Neither will the dullahan.\n\n  For minutes as long as hours, you wait, refusing to make the first move. In the end, neither of you makes the first move. It is a leaf that betrays you. Floating down with almost angelic grace, it brushes against your hair, your cheek, with a shushing sound so subtle no mortal ears could possibly pick up on it.\n\n  Unluckily for you, the dullahan is far from mortal. In the blink of an eye, it is before you, one black-gloved hand streaking through the foliage and reaching for your neck.\n\n  *set weapon \"none\"\n  *page_break\n  *goto DullahanUpClose\n\n\n*label DullahanUpClose\n\nSteel fingers close around your throat like a vise, lifting you off the ground with no more apparent effort than if you were a sack of feathers.\n\nYou flail, but the blinding white pain of your windpipe slowly being crushed is overwhelmed with something altogether Other, with a capital O. The instant the dullahan touches you, your mind is flooded with strange visions. At first, it's all a blur, too fast to keep up with, but then you begin to pick out impressions here and there, flashes of emotions and images not of this moment.\n\nA fury that is not your own burns in your veins. A horse shrieks and stomps and rears up in wild panic. Accusations—a yearning for justice, for cold-blooded revenge.\n\nSomething has been taken from you, something precious. A forest—this forest, you think—beneath a blood moon. Tonight? Is this tonight? And then you see it: a head, pale and cracking and reeking and dead, utterly dead.\n\nIt's the dullahan's head, of course. The head it should be carrying with it—but isn't. \n\nThe dullahan throws you to the ground, and the visions go out like a candle, returning you to your own body and senses. It—he?—is looming over you with palpable intensity, the tension between you an electric cord ready to snap. His right hand hovers over the whip of bone hanging from his belt.\n\nWhat now?\n\n*choice\n\n  #I'm out of here!\n\n    You scramble to your feet and try to make a dash for it, but before your foot lands at the end of your first step, the dullahan seizes you by your hair and tosses you back to the ground. He stands over you with menacing fury. His hand is now grasping the whip, ready to draw it out at a moment's notice.\n\n    Your next move may be your last. Choose wisely.\n\n    *set daring %-10\n\n    *choice\n\n      #He's going to kill me! I've got to at least try to escape!\n\n        Blinding agony lashes through you as something cold and bone-white slashes across your throat, spilling your hot blood in a spray of crimson.\n\n        The last thing you see in this world is the dirty, bloodied ground coming up fast to meet you.\n        *set daring %-10\n        *goto fatal_end\n\n      #Maybe I should try to explain what I saw….\n\n        *goto VisionExplain\n\n  #Those visions must have meant something. Perhaps I should try to describe them?\n\n    It's certainly worth a try. What have you got to lose?\n\n    *goto VisionExplain\n\n*label VisionExplain\n\nYou do your best to explain your experience, describing as best you can what you saw, those emotions you felt which you are sure belonged not to you, but to the dullahan. Sorting it out aloud helps to clarify certain things, the facts falling into place like dominoes.\n\nThe forest, the blood moon—the visions were from tonight, you are sure of it. The steed—well, the legends always depict dullahans riding black stallions. Clearly, the horse you saw belonged to this particular dullahan, though where the horse is now, you haven't the faintest idea. As for the missing head, it's not just missing. It was stolen.\n\nWho—what—in this world or the next would dare to steal from such a creature?\n\nUnfortunately, from the emotions you felt during the visions, you can make a pretty good guess who the dullahan thinks is responsible. You try to tell him that you didn't, couldn't possibly, have done it, but without a face to emote with, his reaction is unreadable. You get the feeling, however, he is far from convinced.\n\n*choice\n\n  #If I could just turn his suspicion in another direction, perhaps he'd leave me alone….\n\n    Lying to a creature of the Otherworld—are you sure that's a good idea? What will you say took the head?\n\n    *set guile %+10\n    *fake_choice\n\n      #A hobgoblin.\n\n        The dullahan is not impressed with your story. \n\n      #A banshee.\n\n        The dullahan is not impressed with your story. \n\n      #A satanic cult.\n\n        The dullahan is not impressed with your story. \n\n    In fact, his hand is now resting on the whip, ready to use it if you insult him again. Perhaps it's time for a different tactic….\n\n    *choice\n\n      #I offer to prove my innocence. What other choice do I have?\n\n        *goto QuestProposal\n\n      #Forget it. I'm running for it!\n\n        Blinding agony lashes through you as something cold and bone-white slashes across your throat, spilling your hot blood in a spray of crimson.\n\n        The last thing you see in this world is the dirty, bloodied ground coming up fast to meet you.\n\n        *set daring %-10\n        *goto fatal_end\n\n  #If the visions work both ways, he might see into my mind just as I saw into his; then he would know I'm innocent. If I can just touch him again…\n\n    You reach for his hand…and cry out in pain as the back of it smashes across your face in a backhanded slap. The dullahan's fingers close around his whip. Now what?\n\n    *choice\n\n      #I offer to prove my innocence. What other choice do I have?\n\n        *goto QuestProposal\n\n  #I will prove I had nothing to do with the theft of the dullahan's head.\n\n    *goto QuestProposal    \n \n\n*label QuestProposal\n\nThe dullahan waits, a question hanging in the air. How, exactly, can you prove you didn't take it?\n\nThere's only one way, of course. To prove your innocence, you must prove someone else's guilt. With a sinking feeling in your stomach, you force the bitter words out of your mouth.\n\nYou will help him find the thief.\n\nThough his movements are subtle, some of the tension leaves the dullahan's shoulders and stance. You sense he is surprised and at least considering your proposal. On the one hand, you dread his acceptance—but on the other hand, it does seem to be your only chance to survive this encounter.\n\nPerhaps a little additional convincing is in order? What might make your assistance valuable to the dullahan?\n\n*choice\n\n  #My courage is unequaled. I will neither flee nor falter till my quest is complete.\n\n    Brave words from a brave heart. May your daring nature be your salvation and not your downfall.\n\n    *set daring %+10\n    *goto QuestAccept01\n\n\n  #Deadly or not, this creature is clearly hurt by his loss. What is a dullahan without his head? I have no ulterior motives; I only want to help.\n\n    It is a rare soul that would risk life and limb merely for the sake of showing kindness to such a fearsome creature. Yet despite its Otherworldly nature, you have seen firsthand that it can, and does, feel deeply, and surprisingly humanly. And kindness is never uncalled for.\n\n    *set altruism %+10\n    *goto QuestAccept01\n\n  #For the right price, I am capable of anything. Even recovering a stolen head.\n\n    Allowing you to live should be payment enough, of course, but when negotiating, one must always begin by asking for more than what is actually expected. And who knows? Perhaps he'll actually be grateful enough, in the end, to reward you after all.\n\n    *set altruism %-10\n    *goto QuestAccept01\n\n  #I'll do anything he wants as long as he doesn't kill me! I will do his bidding without question, I swear!\n\n    Not exactly a pinnacle of courage, are you? Then again, you are but human—it's only natural you should be afraid. And what better motivation is there than the fear of death itself?\n\n    *set daring %-10\n    *goto QuestAccept01\n\n  #What happene
