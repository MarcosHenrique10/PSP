<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Harbinger's Head — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>

      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "harbingershead", "title": "The Harbinger's Head", "scenes": {"aftermath": "*temp research \"undetermined\"\n\n[b]Chapter VII: Homecoming[/b]\n\nYou breathe in the fresh air of a cold predawn. Your body aches down to its core; your soul feels bruised and battered and in great need of a good rest. But none of it matters. All of it is eclipsed by a single, overwhelming sense of relief—you are free. It's over. It's finally over.\n\n*if dullahan = \"alive\"\n\n  *goto MaireJudgment\n\n*else\n\n  *page_break\n  *goto Burial\n\n\n*label MaireJudgment\n\nThe dullahan strides a few paces ahead of you and holds his head aloft, clutching it by its tangled black hair. The air crackles with the same dark energy as that first night you met in the woods.\n\nThe dullahan's mouth opens, a great gaping cavern of putrid black and rotting flesh, and you brace yourself, expecting a scream. Instead, in a voice no louder nor any more pleasant than bone scraping against dry bone or a snake slithering through rough grass, the dullahan whispers, \"Maire Morgan.\"\n\nNow comes the shriek you expected—not from the dullahan's cracked and oozing lips, but from afar—an inhuman, yet somehow female cry of outrage and utter terror. The shadowy figure of the witch appears before you as if wrenched out of the air itself, writhing and raging in agony. She tries to flee the instant she is fully formed, but she barely takes two steps before the dullahan reaches out and seizes her by the neck with his free hand.\n\n*page_break\n\nShe chokes and kicks and scratches at him with her bare hands, to no apparent effect. He does seem to hesitate…perhaps considering whether or not to end her existence as he did her sister's. Instead, he raises his head up higher and emits a high, ringing whistle that seems to pierce through the last dregs of morning haze and woodland slumber. A moment of silence follows—even Maire quiets for an instant—and several long seconds later, an animalistic scream bellows out in answer.\n\nMaire gasps and renews her efforts to escape with more vigor than ever, eyes wide with abject horror as she curses the dullahan in a language you recognize as that of her magic. Yet no spell seems to be taking shape; perhaps life is required for such feats. \n\nThe reason for her panic bursts through the foliage and into view—an ebony steed of enormous proportions, at least twenty hands tall, eyes blazing with black fire. Unlike his master, he still possesses his head, and his coat gleams in the morning light like obsidian reflecting candlelight. He is beautiful death, majestic and savage—yet before his master, he bows his head and waits with patient devotion.\n\nYou glimpse what you think may have been a smile as the dullahan throws Maire upright onto the horse's back before mounting the steed himself. Again she fights and scrambles for her freedom, and again it's to no avail. Her eyes alight on you, and in a last-ditch effort, she lunges at you, perhaps thinking to use you as a hostage with which to buy her release—or perhaps planning to kill you for the part you have played in her fate.\n\n*fake_choice\n\n  #Reach out my hand to her.\n\n  #Defend myself.\n\n  #Back away from her.\n\n  #Laugh in her face.\n\nAt that precise moment, the horse rears up, putting you just out of arm's reach and galloping for the woods. He leaves no prints, nor does the striking of his hooves against the earth produce any audible sound. But the echoes of the witch's screams linger in your ears and in your mind long after she is gone.\n\n*page_break\n*goto Burial\n\n\n*label Burial\n\n*if body = \"maire\"\n\n  You look down at Maire's body lying lifeless on the grass beside you. You have no shovel with which to bury her in the earth, but you will not leave her body out in the open either. Instead, you construct a small cairn using stones gathered from beneath nearby trees. By the time your work is finished, you're weary enough to want to lie down on the spot, grave or no grave.\n\n  But something, some final dredge of courage or strength—or perhaps simply a yearning for a hot meal and a soft bed—keeps you on your feet long enough to point them, at long last, towards home.\n\n  *page_break\n  *goto GoneHome\n\n*if body = \"dullahan\"\n\n  You look down at the dullahan's body lying lifeless on the grass beside you. You have no shovel with which to bury him in the earth, but you will not leave his body out in the open either. Instead, you construct a small cairn using stones gathered from beneath nearby trees. By the time your work is finished, you're weary enough to want to lie down on the spot, grave or no grave.\n\n  But something, some final dredge of courage or strength—or perhaps simply a deep yearning for a hot meal and a soft bed—keeps you on your feet long enough to point them, at long last, towards home.\n\n  *page_break\n  *goto GoneHome\n\n*if body = \"both\"\n\n  You look down at the bodies lying beside you on the grass. You have no shovel with which to bury the witch and the dullahan in the earth, but you will not leave their bodies out in the open either. Instead, you construct small cairns for each of them using stones gathered from beneath nearby trees. By the time your work is finished, you're feeling faint and dangerously close to passing out.\n\n  But something, some final dredge of courage or strength—or perhaps simply a deep yearning for a hot meal and a soft bed—keeps you on your feet long enough to point them, at long last, towards home.\n\n  *page_break\n  *goto GoneHome\n\n*else\n\n  You're tired, and part of you would like nothing more than to lie down right where you are and take a good, long nap. But common sense prevails (if only after a period of serious internal debate); with a deep breath, you turn and begin the long trek back home.\n\n  *page_break\n  *goto GoneHome\n\n\n*label GoneHome\n\nYou return home without incident and collapse gratefully onto your bed, which seems softer for your long absence from it. You dive instantly into a deep slumber.\n\n*if redmenbargain = \"yes\"\n\n  *goto RMFinal\n\n*else\n\n  *goto HomeAgain\n\n\n*label HomeAgain\n\n*if ((dullahanstatus = \"angry\") or (dullahan = \"dead\"))\n\n  Your sleep, however, is not the dreamless respite you were hoping for. Your dreams are riddled with visions of headless shadows, gleaming white bones, and pools of blood so deep they drown you. On this first night, you wake yourself from them with your cries. But as you grow used to their frequent nocturnal visits over months and years, you learn at last to live with them.\n\n  *page_break\n  *goto Epilogue\n\n*if mairemurder = \"yes\"\n\n  Your sleep, however, is not the dreamless respite you were hoping for. Your dreams are drenched in blood and rife with visions of flashing white fangs and black fur gleaming in firelight, and you wake choking and clutching at your throat. As months and even years pass, this dream becomes a frequent nocturnal visitor of yours. You learn, at length, to live with it, though you still find yourself waking in a cold sweat every time.\n\n  *page_break\n  *goto Epilogue\n\n*else\n\n  Your sleep is blissfully dreamless, uninterrupted by nightmares or visions for the first time in days. Now and then in the years to come, you'll dream of dullahans and witches and other things that haunt the night. But for tonight, at least, you'll sleep in peace.\n\n  *page_break\n  *goto Epilogue\n\n\n*label RMFinal\n\nHowever, it isn't long before your precious slumber is interrupted by an all-too-familiar rapping on your door. Dressing with bleary haste, you stumble to the threshold. The sight awaiting you on the other side rattles the little bones in your spine like chimes in the wind.\n\nThe three Red Men stand on your front step, teeth bared in disquieting mimicries of smiles. \"Won't you invite usss in?\" leers the tall one.\n\nThey don't wait for an invitation. They know their rights. They brush past you and immediately set to kindling a fire in your fireplace. It is customary, should the Fear Dearg visit you in the night, to welcome them and offer them the warmth of your hearth. To do otherwise would be gravely impolite.\n\n*page_break\n\nYou stare as they get the fire going and crowd around it, thawing their clawed hands in its brightness. The sight of the three of them in your home, your one blessed sanctuary from the insanity of the past few days, is a gruesome juxtaposition that is almost too much for you to bear.\n\nThe whiskered one smirks, sensing your discomfort. \"Got any red tea?\" he quips, and giggles when you confusedly shake your head no.\n\n\"We did not come for tea,\" the tall one reminds him quietly. He turns his head to look directly at you. \"We come to collect our sssupper, as promisssed.\"\n\nYou can make out just enough of the silent one's face to see him licking his lips obscenely.\n\n*choice\n\n  #Feign innocence. Ask what they would like to feast on.\n\n    The whiskered one glares. \"Don't play coy,\" whispers the tall one. \"You know what we eat. I can sssee it in your eyesss.\" Your stomach curls in on itself, for he's right. You know exactly what they eat.\n\n    *goto RMBodyChoice\n\n  #Change the subject. Ask if they would like a different kind of tea.\n\n    The whiskered one guffaws, but the tall one seems unamused. \"We are hungry, and we have done our part to earn our meal. It would not be polite to keep usss waiting.\"\n    \n    Your heart sinks. There is no pretending with the Red Men. And you know exactly what it is they want, though it turns your stomach to think of it.\n\n    *goto RMBodyChoice\n\n  #Ask them to leave.\n\n    The room goes graveyard silent. \"Now, now,\" murmurs the tall one, who seems taller now somehow, the curve of his lips more vicious, \"isss that any way to treat your honored guessstsss?\" You wince, knowing there is only one way to rid yourself of their company.\n\n    *goto RMBodyChoice\n\n\n*label RMBodyChoice\n\nThe Red Men are the vultures of the Fair Folk, and only flesh will satisfy them. What will you offer them to roast on their spit?\n\n*choice\n\n  *selectable_if ((body = \"dullahan\") or (body = \"both\")) #They can feast upon the dullahan's remains.\n\n    The tall one nods. \"Very good.\" Three predatory smiles gleam at you from beneath three red-stained hoods. \"Take usss to him.\"\n\n    *goto BodyRetrieval\n\n  *selectable_if ((body = \"maire\") or (body = \"both\")) #They can feast upon the witch's remains.\n\n    The tall one nods. \"Very good.\" Three predatory smiles gleam at you from beneath three red-stained hoods. \"Take usss to her.\"\n\n    *goto BodyRetrieval\n\n  #I cannot pay their price. I refuse!\n\n    The Red Men bare their teeth. \"Refussse all you like,\" growls the tall one, \"but you will pay your duesss.\" All at once, they rush at you, falling upon you in a flurry of fangs and claws just inside the threshold of your front door.\n\n    *goto RMRefusal\n\n  #I have no flesh to offer them, but I can hunt. What sort of meat do they prefer?\n\n    A quiet chuckle ripples through the trio. \"No need to hunt,\" murmurs the tall one. \"If you cannot offer usss a proper meal, we shall have to make do with what we have right here.\"\n    \n    Your eyes widen. You turn to run for the door, but they fall upon you like a pack of wolves, taking you down just inside the threshold.\n\n    *goto RMRefusal\n\n\n*label RMRefusal\n\n*if ((dullahan = \"dead\") or (dullahan = \"angry\"))\n\n  Though they prefer to roast their meat, between their hunger and their ire, it seems they have lost the patience to bother with cooking you first. Even scavengers will hunt when they're starving.\n  \n  In your final moments, you learn the singular agony of being eaten alive one cruel bite at a time.\n\n  *goto_scene ending\n\n\n*else\n\n  You cry out as the first claw tears into your flesh, and to your (and their) utter shock, an inhuman scream cries out in reply.\n  \n  All four of you freeze, watching, waiting, but nothing comes. At length, they let out a collective sigh. \"It isss nothing,\" hisses the tall one. \"Let usss feassst.\" They bow back down to attend to the task at hand, and you give yourself up for dead.\n\n  *page_break\n\n  There are no hoofbeats to announce your savior's approach, no jingling spurs as a forewarning—it is not until the whiskered one suddenly shrieks, his blood spattering across your faces as something sharp and white lashes out and rips open his jugular, that you and your attackers realize he has come. Face down on the ground, you manage to raise your head up enough to glimpse four black hooves furiously pawing the ground outside your door.\n\n  The other two Red Men don't stop to question or to beg. With grating, inhuman screeches, they flee in opposite directions. The silent one falls victim to the same whip that felled his brother. The tall one outruns the whip but not the steed, and in moments, he is trampled to death beneath heavy hooves.\n\n  Wounded, but not fatally so, you manage to pull yourself to your feet, staring at the dullahan, the herald of death who has just paradoxically saved your life. Not quite knowing what to say, you manage a weak nod. He pauses, then briefly returns the nod before turning and riding off to disappear back into the night.\n\n  You look down at the three bodies on your lawn and sigh. You've much to do before the dawn—after all, these corpses aren't going to bury themselves.\n\n  *page_break\n  *goto Epilogue\n\n\n*label BodyRetrieval\n\nThe Red Men care not that you are weary, nor that you have not had a decent night's rest in days. You are well aware that asking them to come back tomorrow is out of the question. And so you walk, putting one foot in front of the other for what seems like an eternity until at last, you somehow find your way back to your makeshift graveyard.\n\nThe whiskered one is all but drooling now. \"Well, what are ye waiting for?\" he snaps. \"Hop to it!\"\n\nIt's tempting to tell them to do it themselves, but with an inward groan, you realize they cannot. Cairns built by human hands are sacred, protected from nocturnal carnivores like the Fear Dearg.\n\nWith a sigh, you begin your dreadful task, lifting one stone at a time, each one seeming heavier than the last. Slowly but surely, one pile dwindles as the other grows, until at last the body you have promised them is uncovered.\n\n\"At lassst,\" hisses the tall one, and the three of them fall upon the body like a pack of ravenous beasts, tearing into the flesh with tooth and claw as if they have not eaten for years. You turn away from the sight of it, your stomach heaving at the smell and sound of their feasting and your heart sinking with the knowledge that this night will no doubt haunt you for years to come.\n\n*page_break\n*goto Epilogue\n\n\n*label Epilogue\n\n[b]Epilogue[/b]\n\nThe year is 1859; the month, October. It has been near four decades since the incident in the forest. Though time has worn many a precious memory down to a barely recognizable nub, that night remains as sharp and clear in your mind as the edge of a knife.\n\nTime has changed much since those days. Your youth is gone, lost in a maze of wrinkles, sagging skin, and brittle bones. Gone, too, is the house you once lived in; now, you sit on the porch of what was once your grandparents' house, passed on to you following your grandmother's death years ago.\n\n*if (weapon = \"golddagger\")\n\n  Wait a moment—speaking of knives, whatever happened to that dagger you took from the witch's sanctum?\n\n  *choice\n\n    #I sold it, obviously.\n\n      Of course, the relative luxury you're privy to these days was bought with the high price that dagger fetched. Those gold buckles on your shoes certainly didn't pay for themselves, after all.\n\n      *goto GrandpaResearchChoice\n\n    #I kept it.\n\n      It's been kept safe and sound in the false bottom of a drawer in your bedside table for ages. It never did serve any practical purpose. But now and then, you take it out and look at it as if to remind yourself that the events of a certain October so many years ago truly did occur, and not just in your mind.\n\n      *goto GrandpaResearchChoice\n\n    #I lost it.\n\n      You always were the forgetful sort. Now and then you look for it, out of boredom or perhaps curiosity, hoping for a little tangible proof of your adventure all those years ago. But it never turns up, and you've begun to suspect it never will.\n\n      *goto GrandpaResearchChoice\n\n*else\n\n  *goto GrandpaResearchChoice\n\n\n*label GrandpaResearchChoice\n\nAs for your grandfather's talismans and research…\n\n*choice\n\n  #…they are safe under lock and key. I could not part with them, but I have had my fill of adventures with the Fair Folk.\n\n    *set research \"yes\"\n    *goto Epilogue2\n\n  #…they are gone. I burned what I could and buried the rest, and I never looked back. I'll have nothing more to do with that part of my life.\n\n    *set research \"no\"\n    *goto Epilogue2\n\n  #…they are still here. I continued the research, and with Eamon Cavanaugh's help, I have learned much more about the Fair Folk over the years than my grandfather could ever have dreamed.\n\n    *set research \"eamon\"\n    *goto Epilogue2\n\n\n*label Epilogue2\n\nYou close your eyes, thinking back on your life, which has been long and, at times, strange and surreal. You wonder: if you had it to do over, would you follow the same path? Or would you choose differently, walk roads which heretofore were unexplored?\n\nIt is a big question—too big to answer when you are so sleepy. And you are so very tired, even though the night is young and you slept so peacefully last night….\n\nWhen at last you open your eyes again, the world is not the same. You are still on your porch under the same October moon as before, but something in the shifting of the shadows and the moonlight on the ground and the odd, elderflower scent on the air tells you that this is not the same world in which you dozed off.\n\nYou turn and see your own body resting, still and lifeless, on the porch, and realize at last what has transpired.\n\n*page_break\n\n*if ((dullahanstatus = \"normal\") and (dullahan = \"alive\"))\n\n  *goto DullahanDeathChoice\n\n*if ((dullahanstatus = \"angry\") and (dullahan = \"alive\"))\n\n  *goto DullahanCalling\n\n*else\n\n    *goto ForeverAlone\n\n\n*label DullahanDeathChoice\n\nThough shocked for a moment, you feel no fear—not even when you look out to the road to see a familiar figure seated on a tall black horse. You know, somehow, that he has come for you…yet he makes no move to raise his head or call your name.\n\nIt seems he is giving you a choice, one which no other who has crossed his path has been given. Perhaps this is his way of thanking you for your help, once upon a time. Then again, perhaps all his victims face a similar choice: come quietly, or be taken. Yet he does not seem impatient; he waits calmly without so much as laying a hand on his whip. Even the horse seems unperturbed, though he tosses his head as if annoyed with your hesitation.\n\nWhat will you choose?\n\n*choice\n\n  #I do not believe he means me harm. I will go with the dullahan.\n\n    You walk forward, your ghostly footsteps on the ground now as silent as the dullahan's, and stand before him, awaiting his judgment. He moves his arm, and now you do feel a flicker of fear as you glance at his bone whip—but he only extends his hand to you to help you up on the horse.\n\n    With a sigh of relief, you take his hand, and he pulls you up behind him with seemingly little effort. Nothing flickers in your thoughts as it once did whenever you touched him; perhaps that was a trick of the living flesh, or perhaps he has since learned to guard his mind.\n\n    You glance down to see his head is smiling. In a flash, the horse is galloping for the trees, for the forest which both is and isn't the same one in which your path and that of the dullahan's crossed all those years ago.\n    \n    The wind is cool and refreshing on your face, and the faster you go, the more the world blurs and fades around you. Up ahead, you can make out a bright light amongst the trees. You hear laughter, pure and youthful and carefree, and realize belatedly it is coming from your own lips.\n\n    It seems you chose well.\n\n    *page_break\n    *goto_scene ending\n\n  #I do not trust the dullahan. I will find my own way to cross to the Other Side.\n\n    *goto DullahanRefuse\n\n\n*label DullahanRefuse\n\nYou shake your head, and the dullahan lowers his hand. He pauses, leaving you to wonder what he's thinking. Thankfully, he is not offended—perplexed, perhaps, but not angry. With a slight shrug, he turns and rides away again into the night, leaving you alone to contemplate your next move.\n\nYou close your eyes and find that somehow, you see more clearly this way. Now you can easily make out three paths: one dark, one light. Which will you follow?\n\n*choice\n\n  #I will take the path towards the light.\n\n    The farther you follow it, the lighter and warmer you feel. As the world melts away into brightness and silence, you smile.\n\n    It seems you have chosen well.\n\n    *page_break\n    *goto_scene ending\n\n  #I will take the path towards the darkness.\n\n    The farther you follow it, the colder you feel, and the darker the world grows around you. At length, there is nothing but numbness and the black void around you. You feel yourself begin to fade, and with a sigh, you give yourself up to the dark.\n\n    *page_break\n    *goto_scene ending\n\n  #Neither. I will stay here for now.\n\n    You open your eyes again, and the paths disappear. You're not ready to leave this world behind—not yet. There is so much left yet to explore, so much you can do now that you are free from your mortal fetters. The only question left is, where to begin?\n\n    *page_break\n    *goto_scene ending\n\n\n*label DullahanCalling\n\nShock begins to twist into fear as you sense a familiar presence behind you. Turning, you see the dullahan astride his midnight horse.\n\nGiven the circumstances of the last moments you spent in each other's presence, it is safe to assume he has not come without some ill intent. Yet he does not seem inclined to strike you down—he could easily have done so by now, if he wished.\n\nAs if in reply to your silent questions, he holds his head aloft, and suddenly his purpose is all too clear. Despite knowing the futility of it, you flee for your life—or, more accurately, your afterlife—and he mocks you by giving chase, letting you run just long enough to begin to hope you'll make it before he finally utters the syllables you most fear to hear from his lips.\n\n\"$!{name}.\"\n\n*page_break\n\nThe wind carries the sound of his voice to your ears. The moment you hear your name, something cold and sharp, like brambles frosted over in winter, wraps around your heart and drags you backwards toward your fate. You scream in agony and horror, digging your heels into the dirt and grasping at empty air in desperation. But there is nothing that can save you, nothing that can hinder the fate that has been biding its time, waiting to take you for near forty years.\n\nThe dullahan's hand wraps round your neck like a manacle clapping down hard around a wrist, and he drags you up and onto the horse's back alongside him. With a wild cry, his steed rears up in a show of triumph before plunging forward into the night, heading for the woods.\n\nYou scream for help, for salvation, for forgiveness, but find no absolution. You can only pray your destination will be less painful than the journey there.\n\n*page_break\n*goto_scene ending\n\n\n*label ForeverAlone\n\nYou stand and stare in shock for several moments. You are dead. And yet, you are not gone.\n\nShock gives way to vague dread as you begin to contemplate your situation beyond the immediate implications. Where do you go? What do you do? This can't be all there is to the afterlife…can it?\n\nYou look around, half-expecting some specter of death to be standing over you, come to reap your soul—perhaps a headless creature, cloaked in black and carrying its head under its arm—but nothing comes.\n\nNot knowing what else to do, you sit on your porch steps and wait. And wait. And wait.\n\n*if research = \"no\"\n\n  It is morning before you give up your vigil and true panic begins to set in. You don't know any other humans with the Sight, and your grandfather's research—including everything he knew about ghosts—is lost to you forever.\n  \n  The only other sources of help to whom you might be able to turn are members of the Fae. Yet you have precious few connections. What will you do?\n\n  *goto HelpChoice\n\n*else\n\n  It is morning before you give up your vigil and true panic begins to set in. You don't know any other humans with the Sight—and the only others you might be able to communicate with are among the Fae. Yet you have precious few connections to whom you can turn. What will you do?\n\n  *goto HelpChoice\n\n\n*label HelpChoice\n\n*choice\n\n  #Seek the counsel of the Red Men at the docks.\n\n    *goto RedMenAdvice\n\n  *if (clurichaun = \"yes\") #Ask for advice from the clurichaun at the Howling Hound.\n\n    *goto ClurichaunAdvice\n\n  *if ((research = \"yes\") or (research = \"eamon\")) #Search for the truth using your grandfather's research.\n\n    *goto ResearchAdvice\n\n\n*label RedMenAdvice\n\nYou're unsure of where to look for the Red Men now, and it's difficult after so long to remember where you saw them last. Luckily, you have all the time in the world. Hours pass, but eventually, you find them.\n\nThey smirk when they see you and gesture for you to join them beside their spit, upon which they appear to be roasting…something. You'd rather not know what.\n\nThey look much the same as you remember, though their cloaks seem a deeper red now, and the whiskered one appears to be missing a few teeth. \"Lossst again, are we?\" hisses the tall one.\n\n\"Hopeless, just hopeless,\" cackles the whiskered one.\n\n*page_break\n\n\"That'sss what happens when you crosss one of usss,\" says the first. \"Essspecially one such asss…him.\"\n\nFinally, it hits you. The dullahan will not come for you, and because you wronged him, no other Faerie creature will help you. The Other Side is their world, not yours, and you are not welcome.\n\n\"Precisssely,\" leers the tall one. \"Of courssse, we could help…\"\n\n\"But you have nothing to give in return,\" smirks the whiskered one. \"So get goin'! Go on! We don't need your kind here!\" He aims a kick at you, and you retreat, not out of fear of them but out of fear for your immortal soul.\n\nYou walk away from the docks, wandering aimlessly as you struggle to comprehend your fate. You will spend eternity cursed to walk the earth as a specter, unable to live, unable to move on, forever caught between one moment and the next. There are worse fates, you suppose, but at the moment all you can think about is how brightly the Red Men's fire shone in the pre-dawn darkness—and how cold you felt, no matter how close you drew to it.\n\n*page_break\n*goto_scene ending\n\n\n\n*label ClurichaunAdvice\n\nYou move more swiftly as a ghost, and it is not long before you are standing in the dark, moist basement of the Howling Hound, unsure of how exactly you arrived here but not willing to question it too thoroughly. Instead you call out for the clurichaun, praying that he dwells here still.\n\nA faint giggle echoes in the darkness, and though you cannot see (for this time there is no pretty maid to light the candles for you), you recognize the lilting voice of your old friend the clurichaun. \"Oh, help me, help!\" he cries, barely able to choke his words out past his laughter. \"Oh, help! I'm being haunted! Help!\"\n\nYou wait, biting your tongue in the hopes that humoring him will put him in a good mood.\n\n*page_break\n\nEventually his laughter subsides, though you can still hear it hovering near the edges of his words when he speaks again. \"And what, pray tell, brings ye here, and in such a condition?\"\n\nYou explain your predicament and your hope that he can help.\n\nHis response is another bout of laughter, more malicious now than it sounded before. \"Ha. Typical idjit mortal, thinking ya could cross a dullahan and get away wit' it. Don't get it, do ya?\"\n\nYou can just see him now, shaking his head and smirking knowingly. \"Ye've fallen out of favor. No one will come for ya now. Ye turned your back on one of us, and fair's only fair, after all.\"\n\nRealization dawns slowly, dragging dread along behind it on its heels. You aren't merely dead—you're cursed by the Fair Folk. The Other Side is their domain, and you are not welcome.\n\nThe dullahan will not come for you. No other will help you find your way. You will spend eternity cursed to walk the earth as a specter, unable to live, unable to move on, forever caught between one moment and the next.\n\nYou stumble out of the basement blindly, echoes of the clurichaun's giggles following you down the hall. There are worse fates than the one facing you now, you're sure of that—but knowing and believing are two different things. At the moment, you feel nothing but cold, dead terror and an ache for warmth that can never again be eased.\n\n*page_break\n*goto_scene ending\n\n\n*label ResearchAdvice\n\n*if (research = \"yes\")\n\n  Grandfather's research is in a strongbox under the floorboards beneath your bed; the key is in a drawer beside it. All you need do is walk into your house, down the hall, and into your bedroom—a simple enough task with a corporeal body. But when you reach for the knob on your front door, it burns you with cold fire.\n  \n  You draw your hand back sharply, crying out in surprise and pain and staring at the knob. Then you remember—the knob is made of cold iron. After the events of that fell October forty years ago, you grew more vigilant about taking precautions against the Fae. You replaced all your brass doorknobs with iron and hung an iron horseshoe on your front door. And even if you could walk through the door to get to your room, both lockbox and key are iron too.\n\n  You turn away from your home, heart hanging heavy in your chest. Answers to your questions may be mere steps away, but you'll never be able to reach them. You'll have to seek your answers elsewhere.\n\n  *goto ResearchAdviceAlternateChoice\n\n*else\n\n  *goto EamonStudy\n\n\n*label EamonStudy\n\nThe majority of Grandfather's research is safe and sound in a strongbox hidden under the floorboards beneath your bed. However, you have been seeing Eamon regularly to collaborate on your research efforts, and in the intervals, he often borrows substantial portions of Grandfather's notes to read over until your next meeting.\n\nIf your memory serves you right, he recently began looking into ghosts and the afterlife, concerned—though he refused to admit to it—about his own fate, and perhaps yours as well.\n\nYou move with preternatural speed, almost too fast for your own eyes to register. Before you know it, you are standing in Eamon's study in his home above the Howling Hound. Questioning how you got there is more dizzying than the journey itself was, so instead, you turn your attention to investigating your surroundings.\n\n*page_break\n\nEamon's study is uncomplicated and straightforward, much as you've found Eamon himself to be. A few shelves line the walls, holding a handful of books and some minor assorted heirlooms, including, you can't help but notice, a small statue of a dancing clurichaun. At the center of the room stands a plain but sturdy writing desk which is cluttered with papers and one burnt-out candle.\n\nSitting at the desk with his head bowed and pressed into the crook of one arm, Eamon sleeps like the dead. Beneath his sleeping form, of course, are the very notes you came to investigate.\n\nYou reach out to Eamon to rouse him from his slumber, and at your touch he shudders and cries out, nearly falling out of his chair in his shock. Nearly as surprised as he, you step back, wondering at his violent response, and ask if he is all right.\n\nHe does not respond. Nor, as he looks around his study with wide, wild eyes, does he appear to see you.\n\nMost likely it is because he does not possess the Sight, but that knowledge does nothing to alleviate the lonely feeling of being looked straight through as if you didn't exist at all.\n\nSeeing nothing out of the ordinary, Eamon shakes his head and pushes himself to his feet. Muttering something to himself about a nightmare, he walks right past you and feels his way down the hall, no doubt seeking the solace of his bed.\n\n*page_break\n\nYou look at the papers on the desk. You can't pick them up and move them as you normally would. But with a little experimentation, you discover you can create a slight breeze by using enough force of will, just strong enough to rearrange them haphazardly. \n\nYour search is long and largely unfruitful. Most entries are typical ghost-story fare—a loved one saying goodbye, an enemy wrapping up unfinished business, a glimpse of a white figure at the end of a dark hallway. Only one catches your eye: a woman who dreamt her recently deceased sister came to visit her, only to have their meeting interrupted by the sound of a horn and distant hoofbeats. The sister exclaims that she has tarried too long and must go before she misses her ride, and the dream ends abruptly.\n\nAlongside the story, in rougher shorthand scribbles, Grandfather's notes question whether perhaps something has come to ferry the sister to the other side. The last two legible lines suggest this might be for one of two reasons—either the souls being ferried are lost and need help finding their way to eternal rest, or they are involuntarily collected and taken by force to their eternal punishment.\n\n*page_break\n\nIn the end, Grandfather never found the answer. Of course, you know it now, or at least a part of it. You know what creature was coming for the sister in the dream. And you also remember, with awful clarity, the fate that befell that creature.\n\nThe dullahan is dead. You have not seen him or his ilk since that night; even if he is not the only one of his kind, you doubt any would come for you now. To betray one of the Fair Folk is to betray them all. You are on your own, stuck in a purgatory of your own making—assuming Grandfather was right, that is, and there is no other way to move on.\n\nYou know there is little hope for your predicament, but all you have now is time; you may as well make of it what you can. Grandfather's notes may not have your answer, but you can walk the world over and never weary nor age. You can seek out answers where living mortals dare not tread without fear of death, for you already stand in its shadow. \n\nIt may be ages, even an eternity, before you find your answers—if any exist. Luckily, you've got all the time in the world.\n\n*page_break\n*goto_scene ending\n\n\n*label ResearchAdviceAlternateChoice\n\n*choice\n\n  #Seek the counsel of the Red Men at the docks.\n\n    *page_break\n    *goto RedMenAdvice\n\n  *if (clurichaun = \"yes\") #Ask for advice from the clurichaun at the Howling Hound.\n\n    *page_break\n    *goto ClurichaunAdvice", "choicescript_description": "Visit a myth-infested 1820s Ireland. One dark (if not particularly stormy) night, you find yourself face to face with a frightening visage—or lack thereof. Though shaped like a man, the creature you’ve encountered appears to have lost his head. Worse, he seems to think you might be the one to blame!\n\n[i]The Harbinger's Head[/i] is a fantastic 46,000 word interactive horror novel by Kim Berkley, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\nIt’s up to you to prove your innocence and discover the true thief of the harbinger's head before your own winds up on the chopping block!\n\n• Play as male, female, or non-binary.[n/]\n• Step into the shoes of an herbalist, schoolteacher, or lamplighter.[n/]\n• Shape your personality and build your skills through the choices you make, or trust your luck at your own peril.[n/]\n• Make friends—or enemies—of the various Fae creatures you’ll encounter along the way.[n/]\n• Discover one of eight endings…or meet an untimely death.\n", "choicescript_stats": "*stat_chart\n  opposed_pair Altruism\n    Avarice\n  opposed_pair Daring\n    Caution\n  opposed_pair Guile\n    Innocence\n  percent faeriesight Strength of the Sight", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n  \n  Unlock the rest of the game, including the thrilling conclusion!\n  \n  *purchase_discount adfree 2018-07-26 $2.99 $1.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n  \n  You've paid to unlock the rest of the game.\n", "docks": "*temp suspicion 0\n*temp witch \"no\"\n*temp dagger \"no\"\n*temp dockattempts 0\n\n[b]Chapter V: Dark Dealings[/b]\n\nAfter stopping for a time to catch your breath and grab a bite to eat, you turn your feet seaward and start walking. By the time you arrive, the hustling, bustling docks are already soaked in the golden glow of the setting sun.\n\nThough you're loath to be caught on the road alone at night—again—you can't afford to go home just yet. The only lead you have will be gone with the morning tide.\n\nYou gaze out across the crowds at the moored ships, squinting against the sunlight in an effort to read the names painted in bold letters along the ships' hulls. It's no use; none of the ships whose names you can make out from here are the one you're looking for.\n\nPerhaps a little deductive work is in order. For the type of jobs Captain McDowell is involved in, you imagine he'd need a fairly swift vessel—both for the prompt delivery of goods and to make a quick getaway whenever necessary. That rules out many of the heavier merchantmen that have docked here to trade. At the same time, [i]The Expeditious[/i] needs to be big enough to carry decent loads of cargo, meaning she's not likely to be one of the smaller sloops moored here.\n\nFollowing this train of thought, your gaze falls upon a tall topsail schooner anchored farther down the docks. A clipper ship by the look of her, she's a sleek, well-polished vessel that seems like she could outrun the wind if she tried, despite her moderate girth. You can't read her name from here, but you're willing to bet the next few minutes of what precious time you have left that she's the one.\n\n*page_break\n\nWith a deep breath, you plunge into the sea of milling sailors, merchants, customers, and shipwrights. The air thrums with the noise of hundreds of voices and twice as many boots pounding against wooden planks and wet sand. The entire scene stinks of sweat, tar, spices, and raw seafood.\n\nAs you draw closer to the ship, a sigh of relief escapes your lips. It's her, all right. The golden letters seem to shimmer in the sunlight: [i]The Expeditious[/i].\n\nOnce you reach the pier, however, a new problem presents itself to you. You've never set foot on a ship before, let alone visited the captain of one. What, exactly, is the protocol for this situation? Should you simply board the ship and look for Captain McDowell, or should you find some other way to contact him first?\n\nSuddenly, a voice behind you interrupts your pondering. \n*if gender=\"female\"\n  \"Can I help you, lassie?\"\n  *goto Docks2\n*if gender=\"male\"\n  \"Can I help you, laddie?\"\n  *goto Docks2\n*else\n  \"Can I help you, friend?\"\n  *goto Docks2\n\n*label Docks2\n\nYou spin around to face a man in a tricorne hat and a black coat studded with gold buttons and embroidered decor. His face is weathered, a little leathery, and scarred all over with pockmarks, and his nose is as crooked as a drunkard's gait. An iron-wrought Celtic cross hangs on a loop of leather around his neck. He doesn't seem angry or impatient, merely curious.\n\nYou explain that you've come to speak to the captain of [i]The Expeditious[/i].\n\nHe raises an eyebrow at that. \"Well, you're in luck. Captain Michael McDowell, at your service. What is it you're wanting to speak about?\"\n\n*choice\n\n  #\"A strange customer.\"\n    *goto CaptainConvo-1A\n  #\"A particular piece of merchandise.\"\n    *goto CaptainConvo-1B\n\n*label CaptainConvo-1A\n\nCaptain McDowell blinks, clearly startled by your blunt inquiry. \"How did you know about that?\"\n\nYou explain that you've heard rumors about the incident.\n\n\"And why exactly,\" asks the captain, his eyes intent upon your face, \"are you interested in this alleged incident?\"\n\n*goto CaptainChoice\n\n*label CaptainChoice\n\n*choice\n\n  *disable_reuse #\"I'm trying to help someone right a wrong that was done to them.\"\n\n    *if (altruism > 70)\n      *goto CaptainConvinced\n\n    *else\n      Captain McDowell's face scrunches up into an amused sort of grimace. \"Somehow, I highly doubt that. Forgive me for sayin' so, but you don't seem the selfless type.\"\n      *set suspicion +1\n      *goto CaptainChoice\n\n  *disable_reuse #\"It's a matter of grave peril. I can't say more than that.\"\n\n    *if (guile \u003c 70)\n      *goto CaptainConvinced\n\n    *else\n      Captain McDowell looks unimpressed. \"I don't see how that's any of my business,\" he says. \"I'm sorry, but I'll be needing a wee bit more information than that before I risk stickin' my nose where it don't belong.\"\n      *set suspicion +2\n      *goto CaptainChoice\n\n  #\"Please. My life depends on it.\"\n    *goto CaptainConvinced\n\n*label CaptainConvinced\n\nThe captain peers at you, searching perhaps for signs of a falsehood. Whatever he sees in you, he gives no sign of his opinion, but he seems willing to talk to you now at least.\n\n*if gender=\"female\"\n  \"All right, lass,\" he says at last. \"We'll speak. But not on my ship. There's a shadow hanging over you dark enough to turn noon to midnight—not to mention, it's bad luck to bring a woman aboard. Besides,\" he adds with a gleam in his eye, \"secrets are safer surrounded by noise than by silence.\"\n  \n  He hooks your arm through his. \"Come, lass. Walk with me.\" He guides you away from the ship and the beggars and into the fray. The crowd is beginning to thin now that the sun is setting.\n  *page_break\n  *goto DockWalk\n\n*if gender=\"male\"\n  \"All right, lad,\" he says at last. \"We'll speak. But not on my ship. There's a shadow hanging over you dark enough to turn noon to midnight. Besides,\" he adds with a gleam in his eye, \"secrets are safer surrounded by noise than by silence.\"\n  \n  He juts his chin back towards the mainland. \"Walk with me.\" He turns away, heading into the crowd without looking back to see if you'll follow. He knows you will.\n  *page_break\n  *goto DockWalk\n\n*else\n  \"All right,\" he says at last. \"We'll speak. But not on my ship. There's a shadow hanging over you dark enough to turn noon to midnight. Besides,\" he adds with a gleam in his eye, \"secrets are safer surrounded by noise than by silence.\"\n  \n  He juts his chin back towards the mainland. \"Walk with me.\" He turns away, heading into the crowd without looking back to see if you'll follow. He knows you will.\n  *page_break\n  *goto DockWalk\n\n\n*label CaptainConvo-1B\n\n\"Merchandise, eh?\" The captain looks you up and down, and something about his gaze makes you square your chin and stand up straighter. If he notices, he's polite enough not to comment. \"And what, particularly, might you be lookin' to buy?\"\n\nYou tell him the merchandise you seek is gold. He starts to grin, but the expression freezes halfway to completion. \"Is it jewelry you want? Or…perhaps something a little sharper?\"\n\nWhen you hesitate too long, he takes a step towards you. Nothing in his face seems malicious, yet you get the distinct sense you've hit a nerve. \"You wouldn't happen to know anything about the woman who came to me asking after that fancy dagger the other day, would you?\"\n\n*choice\n\n  #\"She's the reason I'm here. I'm looking for her.\"\n\n    \"So she's the merchandise you're after?\" he says with a dry chuckle. \"I see.\"\n    *set suspicion +1\n    *goto CaptainConvinced\n\n  #\"No, I don't know anything about her. I'm looking for a golden dagger.\"\n\n    \"I see.\" He purses his lips. \"Just a wild coincidence then, I suppose?\"\n    *set suspicion +2\n    *goto CaptainConvinced\n\n\n*label DockWalk\n\n\"Before you ask,\" Captain McDowell begins, \"I've no idea who she is or what her name might be. I'd never seen her like before, and Heaven help me, I hope to never lay eyes on her or her kind again.\"\n\nHe winks at a passing maid, his face a mask of jovial pretense. He looks for all the world as if he's telling you some long-winded joke, yet something in the lines around his eyes and the flatness of his tone lends gravity to his words. \"There was a wrongness about her, the kind of eerie wrongness that creeps up on you in a dark room and makes you feel as if something's right behind you even when the room is empty. All the men were crossing themselves silly when they thought she wasn't looking—myself included.\n\n\"She didn't ask to see my ledger or my wares. It was like she already knew I had what she was looking for. 'A dagger,' she said, 'gold-etched and sharp enough to carve the air itself.' I'd picked up just such a one the day before we left France for Eire.\n\n\"I offered her the lowest price I could afford, but she handed me a bag of gold worth twice the price I'd named, thanked me, and left. I almost didn't keep the coin for fear it was cursed but…well, gold is gold, after all.\"\n\n*goto DockWalkChoice\n\n*label DockWalkChoice\n\n*choice\n\n  *disable_reuse #Ask for a description of the witch.\n\n    *set witch \"yes\"\n    *goto DockWalkWitch\n\n  *disable_reuse *if (witch = \"yes\") #Ask where the witch went.\n\n    *goto WitchWhere\n\n  *disable_reuse #Ask for a description of the dagger.\n\n    *goto DockWalkDagger\n\n  *disable_reuse #Ask the captain what he knows about dullahans.\n\n    *set suspicion +2\n    *goto DockWalkDullahan\n\n  *if ((witch = \"yes\") and (dagger = \"yes\")) #End the conversation.\n\n    *goto DockWalkEndConvo\n\n\n*label DockWalkWitch\n\n\"Long hair, black as a shadow, and cold blue eyes. Looking her too long in the eye felt like standing in a blizzard.\"\n\nThe captain shakes his head. \"Her accent was strange. Her face didn't look a day over thirty, but something about the way she spoke reminded me of my great-uncle in Killarney, God rest his soul.\" His hand reaches up automatically to touch the iron cross resting against his chest.\n\n\"She wore a heavy black Kerry cloak and dressed simply. No shoes. She didn't look like a woman of much wealth. Made it all the more shocking when she tossed that bag of gold at me like it was nothing.\"\n\n*goto DockWalkChoice\n\n\n*label WitchWhere\n\nCaptain McDowell snorts. \"You think she'd tell the likes of me?\" \n*if gender=\"female\"\n  He pats your arm. \"I'm sorry, lass, but I've no idea where she's gone. And no desire to find out.\"\n  *goto DockWalkChoice\n*if gender=\"male\"\n  He glances at you sidelong. \"Boyo, she's one skirt I wouldn't chase after if I were you. She's deadly, that one, mark my words.\"\n  *goto DockWalkChoice\n*else\n  He shakes his head. \"She didn't mention it, and I didn't dare bring it up. We're both better off not knowing, if you ask me.\"\n  *goto DockWalkChoice\n\n\n*label DockWalkDagger\n\n\"It was a lovely little thing—not a famous beauty, far as I ken, but made with a master craftsman's eye,\" Captain McDowell tells you. Something in his smile becomes a little more genuine as he reminisces.\n\n\"Fancy gold cross guard and pommel. Intertwining blue and steel on the grip. The blade and sheath were gilded with more gold. Looked ornamental but for the sharpness. It was French in make: likely LePage, from the look of it.\"\n\n*set dagger \"yes\"\n*goto DockWalkChoice\n\n\n*label DockWalkDullahan\n\nThe captain's expression darkens, and he lowers his voice so that you must strain to make out his words. \"I know little—only what the average Irishman might—and wish I knew less. A woman once told me she thought she'd seen one while walking home from church. She thought him just a man at first, dressed in dark clothes and sitting by a pond. But when he turned towards her, she saw he was headless, and she fled. Why do you ask?\"\n\n*choice\n\n  #Tell him the truth.\n\n    You explain, in as plain and concise language as you can manage, that just such a creature came upon you in the woods, and that your life now depends on whether you can manage to fulfill his demand—that is, to help him recover something he has lost.\n    \n    The captain seems torn between curiosity and common sense. In the end, he errs on the side of caution. \"I see,\" he murmurs, and he does not question you further.\n    *set guile %-10\n    *goto DockWalkChoice\n\n  #Tell him a white lie.\n\n    You tell Captain McDowell you are merely continuing the work your grandfather began in the field of Faerie research. You mention his name, but the captain shakes his head; he does not know your family.\n    \n    He also does not seem completely convinced by your answer, but he does not question you further.\n    *set suspicion +1\n    *set guile %+10\n    *goto DockWalkChoice\n\n\n*label DockWalkEndConvo\n\nThanking the captain for his time, you excuse yourself on the grounds that dusk is fast approaching, and you wish to be home again by full dark. \n\n*if suspicion > 2\n  It is not until you stop walking and glance up to check the time that you realize you've followed Captain McDowell blindly into an abandoned alley. Eyes wide, you start to move away from the captain. But in a flash, he grabs you and shoves you against the wall.\n  \n  He presses the blade of a small dirk against your stomach, and the smile which has graced his warm visage for the past several minutes is gone. In its place is a glare, cold and calculating and, deep down, fearful—and all the more dangerous for it.\n  *goto DockWalkConfrontation\n\n*else\n  You start to turn right, but the captain halts and pulls you back with a quiet chuckle. The road you nearly turned to walk down is little more than an abandoned alley leading to a dead end—just the sort of dark, dingy little side street favored by criminals and deviants.\n  \n  \"I doubt that road will take you home,\" McDowell says with a smile.\n  *goto DockWalkBlessing\n\n\n*label DockWalkConfrontation\n\nYou glance down the alley towards the main street, hoping for a helping hand. The passersby don't even glance in your direction. The point of a short blade pressed against your belly tells you that calling for help would be suicide.\n\n\"Now tell me,\" Captain McDowell growls, \"what you're really after. No more lies, no more half-truths. Who are you—what are you—and what is it you want?\"\n\n*goto ConfrontationChoice\n\n*label ConfrontationChoice\n\nWhat now?\n\n*choice\n\n  *disable_reuse #Swear I mean him no harm.\n\n    *if (guile \u003c= 30) and (altruism > 60)\n      Captain McDowell squints at you with fierce intent. His expression doesn't change, but eventually, he lowers his blade and releases you.\n      \n      \"God help me, I believe you. And I won't ask for more. The less I know, the better. But there's something of the dark about you yet; I can feel it. Keep your wits about you. And stay far, far away from my ship.\"\n      \n      Tipping his hat to you and sheathing his blade, he turns and strolls away, looking for all the world as if he's just been out for a merry jaunt before tucking in for the night.\n      *page_break\n      *goto RedMen\n\n    *elseif (dockattempts >= 1)\n      The expression in Captain McDowell's eyes goes flat like a shark's eyes. He shakes his head. \"Sorry to say it, but I don't believe you. You've got a cunning look about you, always calculating. And you've wasted your second chance. I'm afraid I can only afford to be so generous.\"\n      *label capkill\n\n      Slapping his hand over your mouth to cover the scream he sees coming, he slides his blade into your belly, puncturing your stomach.\n      \n      Overcome with agony, you moan and slump to the ground, blood leaking from the wound like ale from a punctured keg. The captain wipes his blade on the inside of his coat and walks away, leaving you to die a slow and painful death in the darkened alley.\n      *goto fatal_end\n\n    *else\n      The captain chuckles mirthlessly. \"I doubt that. You've got a cunning look about you. You've likely thought of at least three ways out of this already. Try to think up a better one this time. You've got one chance left to convince me not to kill you.\"\n      *set dockattempts +1\n      *goto ConfrontationChoice\n\n  *disable_reuse #Play on his superstitions to intimidate him.\n\n    *if (guile >= 70) and (daring > 60)\n        You tell Captain McDowell that if he doesn't let you go this very instant, something much more fearsome than a mere witch will be coming for him and his eternal soul. The captain, sensing at least some truth about your words, goes pale and releases you.\n        \n        \"God have mercy on us both,\" he murmurs. \"Keep your curses and your darkness. I want none of it.\" With a habitual tip of his hat, he sheathes his blade and retreats, leaving you alone in the alley.\n        *page_break\n        *goto RedMen\n\n    *elseif (dockattempts >= 1)\n      The expression in Captain McDowell's eyes goes flat like a shark's eyes. He shakes his head. \"Sorry to say it, but I don't believe you. You're all bluster and no bite. And you've wasted your second chance. I'm afraid I can only afford to be so generous.\"\n      *goto capkill\n\n    *else\n      Captain McDowell narrows his eyes. \"Nice try, friend, but something tells me you believe that even less than I do. You've got one last chance to talk before I kill you. How about the truth this time?\"\n      *set dockattempts +1\n      *goto ConfrontationChoice\n\n  *disable_reuse #Insist on my innocence and beg for my life.\n\n    *if (guile \u003c= 40) or (gender = \"female\")\n      Captain McDowell grimaces and lowers his sword. \"All right, all right. Stop your whinging. If you've got so little backbone, you can't be all that dangerous on your own. But mind you stay far away from me and mine. If I catch you near my ship again, I'll gut you.\"\n      \n      Sheathing his blade, he turns and saunters off in the direction of his ship, wearing nonchalance like a well-tailored coat.\n      *set daring %-20\n      *page_break\n      *goto RedMen\n\n    *elseif (dockattempts >= 1)\n      The expression in Captain McDowell's eyes goes flat like a shark's eyes. He shakes his head. \"Pathetic. Did you really think you'd gain my sympathy if you shed a few crocodile tears? You've wasted your second chance. I'm afraid I can only afford to be so generous.\"\n      *set daring %-20\n      *goto capkill\n\n    *else\n      Captain McDowell grimaces. \"God be my witness,\" he says, \"if you don't stop that blubbering this instant, I'll gut you here and now. Swallow those crocodile tears and start talking sense. I won't ask you again.\"\n      *set daring %-20\n      *set dockattempts +1\n      *goto ConfrontationChoice\n\n  *disable_reuse #Look him in the eye and tell him the truth—the whole truth.\n\n    Captain McDowell listens to your story with widening eyes that betray the awe behind his otherwise stony face. When you finish, he is silent for a long time.\n    \n    \"More things in Heaven and Earth, Horatio,\" he murmurs to himself, and finally, he lowers his blade. \"I've heard many a strange tale in my time and lived to tell a few of them myself, but nothing like this.\"\n\n    He shakes his head. \"I believe you. I also believe our ways are best kept separate. Do me a favor—don't come visiting my ship again any time soon.\"\n    \n    You nod, and he breathes a little sigh of relief.\n    \n    \"Good luck to you, friend. May the winds of fate be ever at your back.\" With a tip of his hat and one final, almost sympathetic glance, he turns and walks away.\n    *page_break\n    *goto RedMen\n\n  *disable_reuse #Rely on my good luck to save me.\n\n    *if (luck >= 2) \n      You can't scream for help, but if you can stall long enough, perhaps someone will come to your aid.\n      \n      You begin at the beginning—the very, very beginning—by telling the captain about that time you had a run-in with a hobgoblin. Then you wander off on a tangent about your grandfather and his research. The more you talk, the more impatient Captain McDowell looks.\n\n      Just as he's about to interrupt you, a stranger's voice calls out, \"Here now! What's all this about?\"\n      \n      A big, burly, redheaded man nearly a head taller than the captain is making his way towards the pair of you. Captain McDowell is forced to make a polite and hasty retreat.\n      \n      After checking to see if you are unharmed, your good Samaritan takes off after the captain, and you are left alone—and, by some mad stroke of luck, alive—in the alleyway.\n      *set luck -2\n      *page_break\n      *goto RedMen\n\n    *elseif (dockattempts >= 1)\n      You try to stall Captain McDowell with a long-winded tale about your past, hoping that in the meantime, some good Samaritan will come to your aid. But it isn't long before the captain catches on and interrupts.\n      \n      \"That's enough,\" he snaps. The expression in his eyes has gone flat like a shark's eyes.\n      *set luck-2\n      *goto capkill\n\n    *else\n      You try to stall Captain McDowell with a long-winded tale about your past, hoping that in the meantime, some good Samaritan will come to your aid. But your luck, it seems, has run out on you. Eventually the captain catches on and interrupts your rambling.\n      \n      \"That's enough,\" he snaps. \"I'll give you one last chance to come clean. You won't get another.\"\n      *set luck -2\n      *set dockattempts +1\n      *goto ConfrontationChoice\n\n\n*label DockWalkBlessing\n\n\"I've little notion of what you're going through, and I imagine it's in both our interests that it stays that way. But I hope you find whatever you're looking for and come away from it in one piece.\" He hesitates, fidgeting with the cross hanging around his neck.\n\nSeeming to come to a decision, he reaches out and grasps your arm with a firm grip. \"May Christ and his saints stand between you and harm. May the road rise up to meet you. And if God sends you down a stony path, may he give you strong shoes to weather the way.\" \n\n*if gender = \"female\"\n  You thank him for the blessing, feeling strangely comforted by it. With a shallow bow, Captain McDowell kisses your hand and politely bids you farewell. \n  *set luck +1\n  *page_break\n  *goto RedMen\n\n*else\n  You thank him for the blessing, feeling strangely comforted by it. With a wink and a tip of his hat, Captain McDowell politely bids you farewell.\n  *set luck +1\n  *page_break\n  *goto RedMen\n\n\n\n*label RedMen\n\nNow that your talk with Captain McDowell is at an end, it's time to head home. But just as the thought crosses your mind, something farther down the alley catches your eye.\n\nSquinting down the cobbled path, you spot a group of three raggletag beggars huddled round a rat roasting over a small firepit. You catch one of them staring, and he winks at you.\n\nSomething cold shivers through your veins. Yet despite yourself, you find you've begun walking towards them.\n\nAs you draw closer, you become aware of a strange quality in their appearance. Though you have perfect vision, you appear to be seeing double, as if the image of the three beggars has been superimposed over another scene.\n\nYou blink hard and rub at your eyes, and finally—unfortunately—your vision clears. You can now see with your Sight what mere mortal vision could not discern, and part of you deeply regrets it.\n\n*page_break\n\nThe three beggars are neither short nor feeble-framed, as they first appeared, but tall (though not as tall as a dullahan) and threatening, even hunched over and seated. Their cloaks are stained brownish-red, the color of drying blood, and beneath their hoods, the flickering light of their fire highlights the crags and scars of their misshapen, bestial faces.\n\nSharp, jagged-edged fangs gleam white in the darkness as the three of them grin at you, and the tallest one beckons to you with one long, claw-like finger. \"Come clossser, ${name},\" he whispers, and his voice is the voice of a man hanged at the gallows. \"Come clossser and take your turn.\"\n\nHe nods toward the spit over the fire, and a wave of sick realization washes over you: the thing they are roasting on the spit is much too large to be a rat, as you first thought. It is, in fact, the size and approximate shape of a full-grown human corpse. It reeks of burning flesh.\n\n*page_break\n\nEven as you fight the nausea, your mind is reeling.\n\nYou know these monsters. You remember them from your grandfather's stories. They are Fear Dearg—Red Men, sometimes also called the Rat Men because of their faces. The vultures of Faerie, they feast on carrion. Though not thought to be outright murderous, they are said to delight in dark humor and dangerous pranks.\n\nYour instincts tell you to run for it, but in the back of your mind, you know you're going to need some assistance with finding your witch. The Red Men might be able to help.\n\nOf course, their notion of \"help\" might turn out to be detrimental to your health, but your fate will likely be worse if you fail the dullahan.\n\nWhat will you do?\n\n*choice\n\n  #It can't hurt to talk to them, at least.\n\n    *goto RedMenConvo1\n\n  #No way. I'm leaving. There must be more than one way to find a witch!\n\n    You turn and head for the end of the alley, facing the street. It's a straight line. It's impossible to make a wrong turn. Yet somehow you manage to do just that, and you wind up right back where you started. You turn and try again; the result is the same.\n    \n    You try to walk away three more times before you finally give up. It looks like you're going to have to talk to the Red Men after all.\n\n    *goto RedMenConvo1\n\n\n*label RedMenConvo1\n\n\"Come, take your turn,\" says the tall one again.\n\n\"But mind,\" says the middle one, whose gray cheeks are riddled with whiskers, \"if you burn 'im, you'll be takin' 'is place on the spit!\"\n\nThe third one, who is the thinnest and whose face is completely hidden by his hood, laughs softly. His laugh is the laugh of an old corpse freshly risen from the grave, hollow and cold.\n\n*choice\n\n  #Take my turn.\n\n    *goto RedMenConvo2\n\n  #Refuse.\n\n    As politely as possible, you decline their invitation. But the Red Men won't have it.\n    \n    \"No turn, no tidings,\" hints the middle one in a singsong voice. Once again, it looks like you're going to have to do the opposite of what you want.\n\n    *goto RedMenConvo2\n\n\n*label RedMenConvo2\n\nFighting hard against the impulse to run again, you step up to the spit and wrap your fingers around the handle. You begin turning it slowly, evenly, careful not to let one side cook for too long. The Red Men seem pleased.\n\n\"Now then, ${name},\" says the tall one, \"which of your questionsss would you like to asssk firssst?\"\n\n*set witch \"no\"\n*goto RedMenChoice\n\n*label RedMenChoice\n\n*choice\n\n  *disable_reuse #Ask how they know my name.\n\n    \"We know many thingsss,\" murmurs the tall one. The whiskered one cackles.\n    *goto RedMenChoice\n\n  *disable_reuse #Ask what they know about the theft of the dullahan's head.\n\n    \"A head isss a terrible thing to lose,\" says the tall one. The others laugh, but he keeps staring at you, black eyes gleaming like smoldering coals in the firelight. \"We never lose thingsss. We find thingsss.\"\n    *goto RedMenChoice\n\n  *disable_reuse #Ask about the witch.\n\n    \"Oh yesss,\" hisses the tall one, \"we know your witch. Most have forgotten her, but lost thingsss are our ssspecialty.\"\n\n    *set witch \"yes\"\n    *goto RedMenChoice\n\n  *disable_reuse *if (witch = \"yes\") #Ask the Red Men to help me find the witch.\n\n    Your query is answered with a round of long-toothed grins. The tall one leans towards you, his disproportionate face twisted with dark delight. \"You wish to make a bargain?\"\n    *goto RedMenBargain\n\n  *if (redmenbargain = \"yes\") #Take my leave.\n\n    The tall one smiles at you and reaches over to relieve you of your spit-turning duties. \"Until tomorrow,\" he whispers. You can feel their gazes following you as you turn and walk out of the alley.\n\n    *goto DullahanDockEncounter\n\n  *disable_reuse *if ((witch = \"yes\") and (redmenbargain = \"no\")) #End the conversation and leave.\n\n    \"Leaving so soon?\" the whiskered one asks. It sounds less like a question than a veiled threat, but he makes no move towards you. \"Don't you want to make a bargain? You won't get far without us, no, not far at all.\"\n\n    \"Yesss,\" agrees the tall one. \"You need usss if you want to find your witch. Your Sssight alone isssn't ssstrong enough on itsss own. You need usss.\"\n    *goto LeaveChoice\n\n\n*label LeaveChoice\n\n*choice\n\n  #Find out more about the bargain.\n\n    *goto RedMenBargain\n\n  #Leave.\n\n    You release the handle of the spit, and the thin one hisses, lurching forward to grab and turn it before their dinner is ruined. You politely but firmly repeat your farewells.\n    \n    \"Very well,\" mutters the tall one. \"Fare well on your fool'sss errand. Sssleep well this night. It may be your lassst.\" He smirks. \"Pleasssant dreamsss.\"\n\n    You turn and walk away, praying they do not play the same trick on you twice…or worse, a newer, deadlier one. Happily, you emerge from the alleyway unscathed.\n    \n    Your relief, however, is short-lived. Doubt sets in. Will you really be able to find the witch without the help of the Red Men?\n    *page_break\n    *goto DullahanDockEncounter\n\n*label RedMenBargain\n\nA deal with one of the Fae is not a thing to be taken lightly, particularly when those with whom you are dealing are as suspect as the Red Men. And yet your options are rather limited. You ask for their terms.\n\nThey glance at each other knowingly, as if they had discussed the matter long before you stumbled into their little alley. \"We'll take you to 'er, right enough,\" begins the whiskered one.\n\n\"In exchange,\" says the tall one, \"for a meal.\"\n\n\"Y'see,\" continues the whiskered one, \"we're sick of our regular fare here at the docks. We want fresh meat. We're not askin' for much, are we?\"\n\n\"Just one meal,\" whispers the tall one, \"in exchange for one witch. I'd sssay thisss deal isss heavily weighted in your favor, wouldn't you agree?\"\n\n\"So what'll it be?\" The middle one tugs on his whiskers. \"Wanna make a deal?\"\n\n*choice\n\n    #Agree to their terms.\n\n      The three of them laugh in unison, the sound of it not unlike nails being hammered into a coffin. \"So be it,\" says the first. \"Tomorrow night, we will take you to find your lossst witch.\"\n      \n      When you ask where to meet them, he shakes his head. \"We will find you,\" he murmurs.\n      *set redmenbargain \"yes\"\n      *goto RedMenChoice\n\n    #Refuse their terms.\n\n      Your refusal is met with dead silence. They hunch forward, and for one terrible moment, you wonder if you've just made three deadly enemies.\n
