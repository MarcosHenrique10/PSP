<script>
/* Browser save storage for the ChoiceScript web player.
 *
 * HTML+JS can't write files, so saves live in IndexedDB (one object store,
 * keyed by an auto-increment id). Each record mirrors the Python save format:
 * {game, description, saved_at, scene, state, is_autosave}. The autosave for a
 * game is a single record (game + is_autosave=true), replaced in place.
 *
 * Exposed as a global `Saves` with promise-returning methods.
 */
(function (root) {
  "use strict";

  const DB_NAME = "choicescript";
  const STORE = "saves";
  let dbPromise = null;

  function openDb() {
    if (dbPromise) return dbPromise;
    dbPromise = new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(STORE)) {
          const store = db.createObjectStore(STORE, { keyPath: "id", autoIncrement: true });
          store.createIndex("game", "game", { unique: false });
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return dbPromise;
  }

  function tx(mode) {
    return openDb().then((db) => db.transaction(STORE, mode).objectStore(STORE));
  }

  function reqPromise(request) {
    return new Promise((resolve, reject) => {
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }

  // List all saves for a game, newest first.
  function list(game) {
    return tx("readonly").then((store) => {
      return new Promise((resolve, reject) => {
        const out = [];
        const idx = store.index("game");
        const cursor = idx.openCursor(IDBKeyRange.only(game));
        cursor.onsuccess = () => {
          const c = cursor.result;
          if (c) { out.push(c.value); c.continue(); }
          else {
            out.sort((a, b) => (b.saved_at || "").localeCompare(a.saved_at || ""));
            resolve(out);
          }
        };
        cursor.onerror = () => reject(cursor.error);
      });
    });
  }

  function nowIso() {
    return new Date().toISOString().replace(/\.\d+Z$/, "").replace("T", "T");
  }

  // Write a named (manual) save. Never overwrites — always a new record.
  // `rec` is the replay record: { seed, answers, description, saved_at, count }.
  function putSave(game, rec) {
    return tx("readwrite").then((store) =>
      reqPromise(store.add({
        game: game,
        description: rec.description || "Save",
        saved_at: rec.saved_at || nowIso(),
        seed: rec.seed,
        answers: rec.answers || [],
        count: rec.count != null ? rec.count : (rec.answers || []).length,
        is_autosave: false,
      })));
  }

  // Write/replace the single autosave record for a game.
  function putAutosave(game, rec) {
    return tx("readwrite").then((store) => new Promise((resolve, reject) => {
      const idx = store.index("game");
      const cursor = idx.openCursor(IDBKeyRange.only(game));
      let existing = null;
      cursor.onsuccess = () => {
        const c = cursor.result;
        if (c) {
          if (c.value.is_autosave) { existing = c.value; }
          if (!existing) { c.continue(); return; }
        }
        const out = {
          game: game, description: rec.description || "Autosave",
          saved_at: rec.saved_at || nowIso(),
          seed: rec.seed, answers: rec.answers || [],
          count: rec.count != null ? rec.count : (rec.answers || []).length,
          is_autosave: true,
        };
        if (existing) out.id = existing.id;
        const put = store.put(out);
        put.onsuccess = () => resolve(put.result);
        put.onerror = () => reject(put.error);
      };
      cursor.onerror = () => reject(cursor.error);
    }));
  }

  function getAutosave(game) {
    return list(game).then((all) => all.find((s) => s.is_autosave) || null);
  }

  // All saves for a game, newest first (used to render the load list).
  function listSaves(game) { return list(game); }

  function deleteSave(game, id) {
    return tx("readwrite").then((store) => reqPromise(store.delete(id)));
  }

  const idbBackend = { listSaves, putSave, putAutosave, getAutosave, deleteSave };

  // ---- localStorage fallback ------------------------------------------- //
  // IndexedDB is unavailable or throws in some contexts — notably Firefox on
  // file:// origins, which is exactly how an offline compiled bundle is opened.
  // This backend mirrors the same API over a single localStorage key so saves
  // keep working there. One JSON array of records; ids are a simple counter.

  function lsBackend() {
    const KEY = "choicescript_saves";
    function readAll() {
      try { return JSON.parse(localStorage.getItem(KEY) || "[]"); }
      catch (e) { return []; }
    }
    function writeAll(rows) { localStorage.setItem(KEY, JSON.stringify(rows)); }
    function nextId(rows) {
      return rows.reduce((m, r) => Math.max(m, r.id || 0), 0) + 1;
    }
    function forGame(rows, game) {
      return rows.filter((r) => r.game === game)
        .sort((a, b) => (b.saved_at || "").localeCompare(a.saved_at || ""));
    }
    return {
      listSaves(game) { return Promise.resolve(forGame(readAll(), game)); },
      putSave(game, rec) {
        const rows = readAll();
        rows.push({
          id: nextId(rows), game: game,
          description: rec.description || "Save", saved_at: rec.saved_at || nowIso(),
          seed: rec.seed, answers: rec.answers || [],
          count: rec.count != null ? rec.count : (rec.answers || []).length,
          is_autosave: false,
        });
        writeAll(rows);
        return Promise.resolve();
      },
      putAutosave(game, rec) {
        const rows = readAll();
        let row = rows.find((r) => r.game === game && r.is_autosave);
        if (!row) { row = { id: nextId(rows), game: game, is_autosave: true }; rows.push(row); }
        row.description = rec.description || "Autosave";
        row.saved_at = rec.saved_at || nowIso();
        row.seed = rec.seed;
        row.answers = rec.answers || [];
        row.count = rec.count != null ? rec.count : (rec.answers || []).length;
        writeAll(rows);
        return Promise.resolve();
      },
      getAutosave(game) {
        return Promise.resolve(readAll().find((r) => r.game === game && r.is_autosave) || null);
      },
      deleteSave(game, id) {
        writeAll(readAll().filter((r) => r.id !== id));
        return Promise.resolve();
      },
    };
  }

  // Pick a backend: prefer IndexedDB, fall back to localStorage if it's missing
  // or throws (e.g. file:// in Firefox). The probe is cheap and one-time.
  function chooseBackend() {
    try {
      if (typeof indexedDB === "undefined" || indexedDB === null) return lsBackend();
    } catch (e) { return lsBackend(); }
    // Wrap each IDB method so a runtime failure transparently degrades to LS.
    let fallback = null;
    function wrap(name) {
      return function () {
        const args = arguments;
        if (fallback) return fallback[name].apply(fallback, args);
        let p;
        try { p = idbBackend[name].apply(idbBackend, args); }
        catch (e) { fallback = lsBackend(); return fallback[name].apply(fallback, args); }
        return Promise.resolve(p).catch(() => {
          fallback = lsBackend();
          return fallback[name].apply(fallback, args);
        });
      };
    }
    return {
      listSaves: wrap("listSaves"), putSave: wrap("putSave"),
      putAutosave: wrap("putAutosave"), getAutosave: wrap("getAutosave"),
      deleteSave: wrap("deleteSave"),
    };
  }

  root.Saves = chooseBackend();

})(typeof window !== "undefined" ? window : globalThis);

</script>
<script>
/* Browser front-end for the ChoiceScript web player.
 *
 * The engine (cs.js) is synchronous: io.choose() must return the chosen index
 * immediately. Browsers can't block for a click, so we use a REPLAY model:
 *   - a session is just {seed, answers[]}
 *   - to show the current screen we build a fresh engine with a seeded RNG and
 *     run it, feeding the recorded answers; the IO buffers all output and, when
 *     the answers run out at a prompt, throws StopReplay carrying that prompt.
 *   - the user's action appends one answer; we replay again.
 * Deterministic (seeded rand) so replay always reproduces the same story, and
 * saves are tiny (seed + answers). Stats use the same engine instance's
 * read-only show_stats() overlay.
 */
(function () {
  "use strict";

  const CS = window.CS;

  // Thrown by the replay IO when it needs the next answer.
  class StopReplay extends Error {
    constructor(prompt) { super("stop"); this.prompt = prompt; }
  }

  // Deterministic RNG (mulberry32) so a (seed, answers) pair reproduces a run.
  function makeRng(seed) {
    let a = seed >>> 0;
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  // IO backend that feeds recorded answers and buffers output for one screen.
  class ReplayIO {
    constructor(answers) {
      this.answers = answers;
      this.cursor = 0;
      this.output = [];        // {kind:'text'|'achievement'|'stat_chart', ...}
      this.statsMode = false;  // when true, route text/stat_chart to statsOut
      this.statsOut = [];
      this.engine = null;
      // Output index at which each new progress segment begins. A segment is
      // the narration between two decisions; every consumed answer starts one.
      this.segmentStarts = [];
    }

    _emit(item) { (this.statsMode ? this.statsOut : this.output).push(item); }

    text(paragraph) { this._emit({ kind: "text", text: paragraph }); }
    achievement(title) { this._emit({ kind: "achievement", title: title }); }
    stat_chart(rows) { this._emit({ kind: "stat_chart", rows: rows }); }
    image(info) { this._emit({ kind: "image", src: info.src, align: info.align, alt: info.alt }); }
    colored_bar(info) { this._emit({ kind: "colored_bar", label: info.label, color: info.color, pct: info.pct, value: info.value }); }

    _next(expectKind) {
      if (this.cursor < this.answers.length) {
        const a = this.answers[this.cursor];
        this.cursor += 1;
        // A decision was resolved: everything emitted from here on is a new
        // progress segment (skip while replaying the stats overlay).
        if (!this.statsMode) this.segmentStarts.push(this.output.length);
        return a;
      }
      return undefined; // caller throws StopReplay
    }

    choose(options) {
      const a = this._next();
      if (a === undefined) throw new StopReplay({ kind: "choice", options: options });
      // Record the picked option so it shows in the history log. _next() has
      // already opened a new segment, so this lands at the top of it.
      const opt = options[a.index];
      if (!this.statsMode && opt) this._emit({ kind: "chosen", text: opt.name });
      return a.index;
    }
    page_break(label) {
      const a = this._next();
      if (a === undefined) throw new StopReplay({ kind: "page", label: label });
      // consumed; nothing to return
    }
    input_text(variable) {
      const a = this._next();
      if (a === undefined) throw new StopReplay({ kind: "input_text", variable: variable });
      if (!this.statsMode) this._emit({ kind: "chosen", text: a.value });
      return a.value;
    }
    input_number(variable, lo, hi) {
      const a = this._next();
      if (a === undefined) throw new StopReplay({ kind: "input_number", variable: variable, lo: lo, hi: hi });
      if (!this.statsMode) this._emit({ kind: "chosen", text: String(a.value) });
      return a.value;
    }
  }

  // ---- scene loading ---- //

  const sceneCache = {};   // "game/scene" -> parsed Line[]
  let GAME = null;         // current game name
  let sceneText = {};      // scene name -> raw text (fetched lazily)

  // Thrown by the sync loader when a scene hasn't been fetched yet. The async
  // controller catches it, fetches the file, and replays again (replay always
  // re-runs from the start, so it converges once every needed scene is cached).
  class NeedScene extends Error {
    constructor(name) { super("need scene " + name); this.scene = name; }
  }

  async function fetchScene(name) {
    // Offline bundle (compiled single-file build): scenes are embedded in the
    // page, so read them from memory instead of hitting the network.
    const off = window.__CS_OFFLINE__;
    if (off && off.scenes) {
      const key = name.toLowerCase();
      if (key in off.scenes) return off.scenes[key];
      throw new Error("could not load scene '" + name + "' (not in bundle)");
    }
    // Server mode: scenes are plain static files: <game>/scenes/<scene>.txt
    const url = "/" + encodeURIComponent(GAME) + "/scenes/" +
      encodeURIComponent(name) + ".txt";
    const res = await fetch(url);
    if (!res.ok) throw new Error("could not load scene '" + name + "' (" + res.status + ")");
    return res.text();
  }

  function loaderFor() {
    return function (name) {
      name = name.toLowerCase();
      const key = GAME + "/" + name;
      if (!(key in sceneCache)) {
        if (!(name in sceneText)) throw new NeedScene(name);
        sceneCache[key] = CS.parseScene(sceneText[name]);
      }
      return sceneCache[key];
    };
  }

  // ---- session (seed + answers) ---- //

  let session = null;   // { seed, answers: [] }

  function newSession() {
    session = { seed: (Math.random() * 0x7fffffff) >>> 0, answers: [] };
  }

  // Replay the recorded answers and return {output, prompt} for the current
  // screen, or {output, done:true} if the story ended. Async because a missing
  // scene triggers a fetch and a fresh replay from the start.
  async function replay() {
    for (;;) {
      const io = new ReplayIO(session.answers);
      const engine = new CS.Engine(io, loaderFor());
      engine._rng = makeRng(session.seed);
      lastEngine = engine;
      lastIO = io;
      try {
        engine.run("startup");
        return { output: io.output, segmentStarts: io.segmentStarts, done: true };
      } catch (e) {
        if (e instanceof StopReplay) return { output: io.output, segmentStarts: io.segmentStarts, prompt: e.prompt };
        if (e instanceof NeedScene) { await ensureScene(e.scene); continue; }
        throw e;
      }
    }
  }

  async function ensureScene(name) {
    name = name.toLowerCase();
    if (name in sceneText) return;
    sceneText[name] = await fetchScene(name);
  }

  let lastEngine = null;
  let lastIO = null;

  // ---- rendering ---- //

  const $ = (sel) => document.querySelector(sel);
  const storyEl = () => $("#story");
  const promptEl = () => $("#prompt");

  function el(tag, cls, text) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }

  function renderOutput(output, container) {
    for (const item of output) {
      if (item.kind === "text") {
        container.appendChild(el("p", "para", item.text));
      } else if (item.kind === "chosen") {
        const row = el("p", "chosen");
        row.appendChild(el("span", "chosen-mark", "➤ "));
        row.appendChild(el("span", "chosen-text", item.text));
        container.appendChild(row);
      } else if (item.kind === "image") {
        container.appendChild(renderImage(item));
      } else if (item.kind === "achievement") {
        container.appendChild(el("p", "achievement", "★ Achievement: " + item.title));
      } else if (item.kind === "stat_chart") {
        container.appendChild(renderStatChart(item.rows));
      } else if (item.kind === "colored_bar") {
        container.appendChild(coloredBar(item));
      }
    }
  }

  // Illustration from *image / *text_image. Source is relative to the game
  // root (/<game>/<src>). If the file doesn't exist, the figure removes itself
  // so a missing image just leaves the story unchanged.
  function renderImage(item) {
    const fig = el("figure", "story-image align-" + (item.align || "center"));
    const img = document.createElement("img");
    const parts = item.src.split("/").map(encodeURIComponent);
    const off = window.__CS_OFFLINE__;
    if (off) {
      // Offline bundle: images sit in a local images/ folder beside index.html.
      // Only the basename is used so nested source paths still resolve.
      img.src = "images/" + parts[parts.length - 1];
    } else {
      img.src = "/" + encodeURIComponent(GAME) + "/" + parts.join("/");
    }
    img.alt = item.alt || "";
    img.loading = "lazy";
    img.onerror = () => { fig.remove(); };
    fig.appendChild(img);
    return fig;
  }

  function renderStatChart(rows) {
    const box = el("div", "statchart");
    for (const row of rows) {
      if (row.kind === "text") {
        box.appendChild(el("div", "stat-text", row.label + ": " + CS.csStr(row.value)));
      } else if (row.kind === "percent") {
        box.appendChild(bar(row.label, row.value));
      } else if (row.kind === "opposed_pair") {
        const l = (row.labels[0] || "?") + " vs " + (row.labels[1] || "?");
        box.appendChild(bar(l, row.value));
      }
    }
    return box;
  }

  function bar(label, value) {
    let pct = Number(value);
    if (isNaN(pct)) pct = 0;
    pct = Math.max(0, Math.min(100, Math.round(pct)));
    const wrap = el("div", "stat-bar");
    wrap.appendChild(el("span", "stat-label", label));
    const track = el("span", "bar-track");
    const fill = el("span", "bar-fill");
    fill.style.width = pct + "%";
    track.appendChild(fill);
    wrap.appendChild(track);
    wrap.appendChild(el("span", "stat-pct", pct + "%"));
    return wrap;
  }

  // A magic-style meter from *gosub coloredbar: a colored fill whose width is
  // the game's percentage, with the raw score shown at the end. The fill color
  // comes straight from the game so each discipline keeps its own hue.
  function coloredBar(item) {
    let pct = Number(item.pct);
    if (isNaN(pct)) pct = 0;
    pct = Math.max(0, Math.min(100, Math.round(pct)));
    const wrap = el("div", "stat-bar colored-bar");
    wrap.appendChild(el("span", "stat-label", item.label));
    const track = el("span", "bar-track");
    const fill = el("span", "bar-fill");
    fill.style.width = pct + "%";
    if (item.color) fill.style.background = item.color;
    track.appendChild(fill);
    wrap.appendChild(track);
    wrap.appendChild(el("span", "stat-pct", CS.csStr(item.value)));
    return wrap;
  }

  // ---- main render step ---- //

  async function render() {
    let result;
    try {
      result = await replay();
    } catch (e) {
      showError(e);
      return;
    }
    const story = storyEl();
    story.innerHTML = "";
    const newestCard = renderSegments(result.output, result.segmentStarts, story);
    const prompt = promptEl();
    prompt.innerHTML = "";

    if (result.done) {
      prompt.appendChild(el("p", "ending", "— THE END —"));
      const again = el("button", "btn", "Play again");
      again.onclick = () => { newSession(); autosave(); render(); };
      prompt.appendChild(again);
      autosave();
      refreshStats();
      scrollNewest(newestCard);
      return;
    }

    const p = result.prompt;
    if (p.kind === "choice") renderChoice(p, prompt);
    else if (p.kind === "page") renderPage(p, prompt);
    else if (p.kind === "input_text") renderInputText(p, prompt);
    else if (p.kind === "input_number") renderInputNumber(p, prompt);

    autosave();
    refreshStats();   // keep the live stats panel in sync with story progress
    scrollNewest(newestCard);
  }

  // Put the START of the newest narration at the top of the viewport (just
  // below the sticky topbar via scroll-padding-top), instead of jumping to the
  // very bottom. That way long new passages begin at the top and can be read
  // straight down without hunting for where the new text started.
  function scrollNewest(card) {
    if (card && card.scrollIntoView) card.scrollIntoView({ block: "start" });
    else window.scrollTo(0, document.body.scrollHeight);
  }

  // Split the full output into bordered progress cards. Each segment is the
  // narration produced after one decision; the first spans the story opening.
  // Returns the last (newest) card so the caller can scroll it into view.
  function renderSegments(output, segmentStarts, story) {
    const bounds = [0].concat(segmentStarts || []);
    let lastCard = null;
    for (let s = 0; s < bounds.length; s++) {
      const start = bounds[s];
      const end = (s + 1 < bounds.length) ? bounds[s + 1] : output.length;
      if (end <= start) continue;               // empty segment: skip the card
      const card = el("div", "segment");
      renderOutput(output.slice(start, end), card);
      story.appendChild(card);
      lastCard = card;
    }
    return lastCard;
  }

  function answer(a) { session.answers.push(a); render(); }  // render is async; fire-and-forget is fine

  function renderChoice(p, prompt) {
    const list = el("div", "choices");
    p.options.forEach((opt, i) => {
      const b = el("button", "btn choice", opt.name);
      if (!opt.selectable) {
        b.disabled = true;
        b.title = opt.reason || "unavailable";
        b.appendChild(el("span", "locked", "  (" + (opt.reason || "locked") + ")"));
      } else {
        b.onclick = () => answer({ index: i });
      }
      list.appendChild(b);
    });
    prompt.appendChild(list);
  }

  function renderPage(p, prompt) {
    const b = el("button", "btn next", p.label || "Next");
    b.onclick = () => answer({ page: true });
    prompt.appendChild(b);
  }

  function renderInputText(p, prompt) {
    const form = el("form", "inputform");
    const input = el("input", "textinput");
    input.type = "text";
    input.placeholder = p.variable;
    form.appendChild(input);
    const b = el("button", "btn", "OK");
    b.type = "submit";
    form.appendChild(b);
    form.onsubmit = (ev) => { ev.preventDefault(); answer({ value: input.value.trim() }); };
    prompt.appendChild(form);
    setTimeout(() => input.focus(), 0);
  }

  function renderInputNumber(p, prompt) {
    const form = el("form", "inputform");
    const input = el("input", "textinput");
    input.type = "number";
    input.min = p.lo; input.max = p.hi;
    input.placeholder = p.lo + "–" + p.hi;
    form.appendChild(input);
    const b = el("button", "btn", "OK");
    b.type = "submit";
    form.appendChild(b);
    form.onsubmit = (ev) => {
      ev.preventDefault();
      let v = Number(input.value);
      if (isNaN(v) || v < p.lo || v > p.hi) { input.focus(); return; }
      if (Number.isInteger(v)) {} else { v = v; }
      answer({ value: v });
    };
    prompt.appendChild(form);
    setTimeout(() => input.focus(), 0);
  }

  function showError(e) {
    const prompt = promptEl();
    prompt.innerHTML = "";
    prompt.appendChild(el("p", "error", "Engine error: " + (e && e.message ? e.message : e)));
    console.error(e);
  }

  // ---- live stats panel ---- //
  //
  // The stats screen (choicescript_stats) is often interactive — a *choice
  // menu of stat categories the player clicks to expand. The panel keeps its
  // own little replay session: `statsAnswers` records clicks made *inside* the
  // panel, and we re-run the stats scene against a fresh snapshot of the
  // current story state whenever the story advances (refreshStats) or the user
  // navigates within stats. Because the snapshot is re-taken from live progress
  // each time, the panel updates in realtime; browsing stats never advances the
  // actual story.

  let statsOpen = false;
  let statsAnswers = [];       // clicks made inside the stats screen
  let statsAvailable = null;   // null=unknown, true/false once probed

  async function toggleStats() {
    if (statsOpen) { closeStatsPanel(); return; }
    if (statsAvailable === false) { flash("No stats screen for this game."); return; }
    if (!(("choicescript_stats") in sceneText)) {
      try { sceneText["choicescript_stats"] = await fetchScene("choicescript_stats"); statsAvailable = true; }
      catch (e) { statsAvailable = false; flash("No stats screen for this game."); return; }
    }
    statsOpen = true;
    statsAnswers = [];
    document.body.classList.add("stats-open");
    const panel = $("#stats-panel");
    if (panel) panel.setAttribute("aria-hidden", "false");
    await refreshStats();
  }

  function closeStatsPanel() {
    statsOpen = false;
    document.body.classList.remove("stats-open");
    const panel = $("#stats-panel");
    if (panel) panel.setAttribute("aria-hidden", "true");
  }

  // Re-render the stats panel against the current story state. No-op when the
  // panel is closed. Called after every story step so stats stay live.
  async function refreshStats() {
    if (!statsOpen) return;
    const body = $("#stats-body");
    if (!body) return;

    // Snapshot the story at the current point (fetching any missing scenes).
    let state;
    while (true) {
      const io = new ReplayIO(session.answers);
      const engine = new CS.Engine(io, loaderFor());
      engine._rng = makeRng(session.seed);
      try { engine.run("startup"); state = engine.captureState(); break; }
      catch (e) {
        if (e instanceof StopReplay) { state = engine.captureState(); break; }
        if (e instanceof NeedScene) { await ensureScene(e.scene); continue; }
        showStatsError(body, e); return;
      }
    }
    await renderStatsScreen(state, body, true);
  }

  // Run choicescript_stats against `state` with `statsAnswers` replayed, then
  // paint the result (and any interactive prompt) into `body`. If a recorded
  // stats click is no longer valid against the current state (retry=true), we
  // reset the stats navigation and re-render once from the top.
  async function renderStatsScreen(state, body, retry) {
    let io, prompt = null;
    while (true) {
      io = new ReplayIO(statsAnswers);
      io.statsMode = true;
      const engine = new CS.Engine(io, loaderFor());
      engine._rng = makeRng(session.seed);
      try {
        engine._applyState(state);
        engine.runStatsScene();
        break;
      } catch (e) {
        if (e instanceof StopReplay) { prompt = e.prompt; break; }
        if (e instanceof NeedScene) { await ensureScene(e.scene); continue; }
        if (retry && statsAnswers.length) { statsAnswers = []; return renderStatsScreen(state, body, false); }
        showStatsError(body, e); return;
      }
    }

    body.innerHTML = "";
    renderOutput(io.statsOut, body);
    if (!prompt) return;

    const rerun = (a) => { statsAnswers.push(a); refreshStats(); };
    if (prompt.kind === "choice") {
      const list = el("div", "choices");
      prompt.options.forEach((opt, i) => {
        const b = el("button", "btn choice", opt.name);
        if (!opt.selectable) {
          b.disabled = true;
          b.title = opt.reason || "unavailable";
          b.appendChild(el("span", "locked", "  (" + (opt.reason || "locked") + ")"));
        } else {
          b.onclick = () => rerun({ index: i });
        }
        list.appendChild(b);
      });
      body.appendChild(list);
    } else if (prompt.kind === "page") {
      const b = el("button", "btn next", prompt.label || "Next");
      b.onclick = () => rerun({ page: true });
      body.appendChild(b);
    } else if (prompt.kind === "input_text") {
      const form = el("form", "inputform");
      const input = el("input", "textinput"); input.type = "text"; input.placeholder = prompt.variable;
      form.appendChild(input);
      const ok = el("button", "btn", "OK"); ok.type = "submit"; form.appendChild(ok);
      form.onsubmit = (ev) => { ev.preventDefault(); rerun({ value: input.value.trim() }); };
      body.appendChild(form);
      setTimeout(() => input.focus(), 0);
    } else if (prompt.kind === "input_number") {
      const form = el("form", "inputform");
      const input = el("input", "textinput"); input.type = "number"; input.min = prompt.lo; input.max = prompt.hi;
      input.placeholder = prompt.lo + "–" + prompt.hi;
      form.appendChild(input);
      const ok = el("button", "btn", "OK"); ok.type = "submit"; form.appendChild(ok);
      form.onsubmit = (ev) => {
        ev.preventDefault();
        const v = Number(input.value);
        if (isNaN(v) || v < prompt.lo || v > prompt.hi) { input.focus(); return; }
        rerun({ value: v });
      };
      body.appendChild(form);
      setTimeout(() => input.focus(), 0);
    }
  }

  function showStatsError(body, e) {
    body.innerHTML = "";
    body.appendChild(el("p", "error", "Stats error: " + (e && e.message ? e.message : e)));
    console.error(e);
  }

  // ---- modal ---- //

  function openModal(title, output) {
    closeModal();
    const overlay = el("div", "modal-overlay");
    const modal = el("div", "modal");
    const head = el("div", "modal-head");
    head.appendChild(el("h2", null, title));
    const x = el("button", "btn small", "Close");
    x.onclick = closeModal;
    head.appendChild(x);
    modal.appendChild(head);
    const body = el("div", "modal-body");
    if (Array.isArray(output)) renderOutput(output, body);
    else body.appendChild(output);
    modal.appendChild(body);
    overlay.appendChild(modal);
    overlay.onclick = (ev) => { if (ev.target === overlay) closeModal(); };
    document.body.appendChild(overlay);
    return overlay;
  }
  function closeModal() {
    const ex = $(".modal-overlay");
    if (ex) ex.remove();
  }

  // ---- save / load via IndexedDB ---- //

  function autosave() {
    if (!session) return;
    Saves.putAutosave(GAME, { seed: session.seed, answers: session.answers,
      saved_at: new Date().toISOString(), count: session.answers.length });
  }

  async function doSave() {
    const desc = prompt("Name this save:", "Save " + new Date().toLocaleString());
    if (desc === null) return;
    await Saves.putSave(GAME, { seed: session.seed, answers: session.answers.slice(),
      description: desc || "Save", saved_at: new Date().toISOString(), count: session.answers.length });
    flash("Saved.");
  }

  async function doLoad() {
    const list = await Saves.listSaves(GAME);
    if (!list.length) { flash("No saves yet."); return; }
    const box = el("div", "savelist");
    list.forEach((s) => {
      const row = el("div", "saverow");
      const label = (s.is_autosave ? "[autosave] " : "") + (s.description || "Save") +
        " — " + (s.count || 0) + " choices · " + fmtDate(s.saved_at);
      const b = el("button", "btn", label);
      b.onclick = () => {
        session = { seed: s.seed, answers: s.answers.slice() };
        closeModal(); autosave(); render();
      };
      row.appendChild(b);
      if (!s.is_autosave) {
        const del = el("button", "btn small danger", "✕");
        del.onclick = async (ev) => { ev.stopPropagation(); await Saves.deleteSave(GAME, s.id); closeModal(); doLoad(); };
        row.appendChild(del);
      }
      box.appendChild(row);
    });
    openModal("Load game", box);
  }

  function doRestart() {
    if (!confirm("Restart from the beginning? Current progress is autosaved separately.")) return;
    newSession(); autosave(); render();
  }

  function fmtDate(iso) {
    if (!iso) return "";
    try { return new Date(iso).toLocaleString(); } catch (e) { return iso; }
  }

  function flash(msg) {
    const f = el("div", "flash", msg);
    document.body.appendChild(f);
    setTimeout(() => f.remove(), 1500);
  }

  // ---- boot ---- //

  async function boot() {
    const off = window.__CS_OFFLINE__;
    if (off) {
      GAME = off.game;
    } else {
      const params = new URLSearchParams(location.search);
      GAME = params.get("game");
      if (!GAME) { location.href = "/"; return; }
    }
    $("#game-title").textContent = off && off.title ? off.title : GAME;
    document.title = (off && off.title ? off.title : GAME) + " — ChoiceScript";

    const menuBtn = $("#btn-menu");
    if (off) {
      // Single-game offline bundle: no menu to return to.
      if (menuBtn) menuBtn.style.display = "none";
    } else if (menuBtn) {
      menuBtn.onclick = () => { location.href = "index.html"; };
    }
    $("#btn-stats").onclick = toggleStats;
    const closeBtn = $("#btn-stats-close");
    if (closeBtn) closeBtn.onclick = closeStatsPanel;
    $("#btn-save").onclick = doSave;
    $("#btn-load").onclick = doLoad;
    $("#btn-restart").onclick = doRestart;
    document.addEventListener("keydown", (ev) => {
      if (ev.key !== "Escape") return;
      if ($(".modal-overlay")) closeModal();
      else if (statsOpen) closeStatsPanel();
    });

    // Resume from autosave if present, else start fresh.
    const auto = await Saves.getAutosave(GAME);
    if (auto && auto.answers) {
      session = { seed: auto.seed, answers: auto.answers.slice() };
    } else {
      newSession();
    }
    render();
  }

  window.Player = { StopReplay, makeRng, ReplayIO };
  document.addEventListener("DOMContentLoaded", boot);

})();

</script>
</body>
</html>
