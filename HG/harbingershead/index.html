ope we can resolve this without resorting to violence.\n\n    *set guile %-20\n    *goto DoorFind3\n\n  #I should stick close to the stairs, just in case I need to make a quick exit….\n\n    *set daring %-20\n    *goto DoorFind3\n\n  #I know my life is at risk, but I made the dullahan a promise—I can't turn my back on him now.\n\n    *set altruism %+20\n    *goto DoorFind3\n\n  #Which is more powerful, a witch or a dullahan? I wonder if the witch will be willing to make a deal….\n\n    *set guile %+20\n    *goto DoorFind3\n\n  #I can't help but believe the witch had her reasons for doing what she did. But I'm not sure I believe the dullahan deserves what she's done to him, either….\n\n    *set altruism %+20\n    *goto DoorFind3\n\n\n*label DoorFind3\n\nWhen you reach the bottom, you discover what looks to be an underground sanctum. A dozen or so lit sconces line the walls, along with shelves upon shelves of vials, bags, and boxes filled with artifacts and solutions you don't dare try to identify. Several open passageways branch out into other directions, but it is too dark to see where they lead.\n\nIn the center of the room stands a rough stone altar with various tools laid out on it. In the middle of these sits a grim centerpiece consisting of a mummified human hand clutching a thick white candle. A dead hand…you recall it from your grandfather's stories. It is said that a light will never burn out so long as a dead hand holds it.\n\nYou take your own ${lightsource} and set it down on a nearby shelf. No sense carrying something so flammable, so easily used against you, into a confrontation with a witch.\n\n\"You've come,\" a voice whispers, and out of one of the shadowed pathways steps a woman whose face is identical to the witch from the dullahan's vision. She wears a black cloak and a worn and simple gown which once upon a time might have been white, but is now a dull, mottled gray. Her hair is tangled and unkempt.\n\nIn one hand, she holds a small dagger matching the description given to you by Captain McDowell. In the other, she's clutching a small black sack of rough cloth which appears to contain something round—something roughly the size of a human head.\n\n*page_break\n\nAs soon as she enters the room, the dullahan lunges for her. Shaking her head, she presses the gold-edged dagger to the bag, and he immediately skids to a stop.\n\n\"Now, now, this thing is precious to you, is it not? It would be a shame if it was damaged,\" she murmurs. Flexing his hand, the dullahan reaches for his whip.\n\nA sudden thud at the top of the stairs makes you both start and look back. Where moonlight once spilled in from outside, there is only darkness now, and out of the darkness steps a black wolf.\n\nThere is something strangely ephemeral about the wolf, as though the moonlight itself might be more substantial.\n\n\"You may be quick,\" says the witch, nodding toward the wolf, \"but the dead are quicker. If you so much as touch that whip, she will spirit your head away somewhere you can never reach, and it will be lost to you forever. Dare you risk it?\"\n\nThough the cold fury radiating from him is so potent you can practically feel icicles forming, the dullahan drops his hand and steps back.\n\nThe witch smiles. \"So you do understand me. Good. I wish to make a deal.\"\n\n*goto WitchChoice\n\n\n*label WitchChoice\n\n*choice\n\n  *disable_reuse #Ask who she is.\n\n    She raises an eyebrow at you. \"I am the witch you seek.\" She seems amused at your surprise. \"Of course I knew you were coming. I do not leave the front door unlocked for just anyone, you know.\"\n\n    *goto WitchChoice\n\n  *disable_reuse *if (witchvision = \"yes\") #Ask if her name is Sorcha Morgan.\n\n    The witch's cheeks grow pale, and her eyes widen in brief surprise. Then she glances at the dullahan and appears to regain some composure. \"So he communicates with you, does he? And yet you still know nothing. No, child, that is not my name.\"\n    \n    She opens her mouth as if to say more, then closes it again, pressing her lips together tightly and saying nothing.\n\n    *goto WitchChoice\n\n  *disable_reuse #Attack the witch.\n\n    *set daring %+10\n    *goto WitchAttack1\n\n  #Ask about the deal.\n\n    *goto WitchDeal\n\n\n*label WitchAttack1\n\nYou throw caution to the wind and rush forward, your ${weapon} aimed at the witch's heart. Unfortunately, your timing is awful—you have her full attention, and her reflexes are quick.\n\nIn a low, ethereal voice, she whispers something in a language you do not know—and \n*if (witchpower >= 100)\n  a wild wind slams into you with the force of a tornado. It carries you across the room, slamming you against the back wall like a giant's hand squashing a bug.\n  \n  You cry out in pain as a few ribs crack from the impact, and blood gushes from the dent left in your head by the shelf you were thrown against. The wolf steps between you and the smirking witch, watching you closely as you stumble away from the wall and back to the dullahan's side.\n  *goto WitchAttack1Choice\n*elseif (witchpower >= 50)\n  a wild wind howls around you, knocking you off your feet. You fall flat on your back, your head slamming hard against the ground. The witch frowns, as if something has not quite gone the way she expected.\n  \n  As you stand up, the wolf leaps in between the two of you, a low, warning growl rumbling in its throat.\n  *goto WitchAttack1Choice\n*else\n  a wild wind howls all around you, disturbing even the unflappable dullahan at your side, yet never quite seeming to touch you.\n  \n  The witch, shocked at the failure of her magic, manages to dodge your attack only at the last minute. The wolf leaps between you with a vicious growl.\n  *goto WitchAttack1Choice\n\n\n*label WitchAttack1Choice\n\nIf you attack again right away, it may well be the last thing you ever do. Dare you attempt it?\n\n*choice\n\n  #I have nothing to lose. Attack!\n\n    You set your jaw and, with a desperate war cry, raise your ${weapon} once again and rush at the witch.\n    \n    You only manage to take three steps before the wolf is at your throat. The last thing you hear as the world goes dark is the sound of your own flesh being torn from your bones.\n\n    *set daring %+10\n    *goto fatal_end\n\n  #Perhaps I should listen to what she has to say.\n\n    Discretion is, after all, the better part of valor. You lower your weapon, and the wolf backs off, returning to its post on the stairs.\n    \n    You ask the witch about the deal she wishes to propose.\n\n    *goto WitchDeal\n\n*label WitchDeal\n\nThough the witch's face is beautiful, she does not wear a smile well. The faint lines that accompany it speak more of bitterness than of laughter, and though she appears young, she speaks with the weariness of old age. \"My terms are simple.\"\n\nShe turns to the dullahan. \"Take my sister's soul to Heaven, or to Tir na nOg, or wherever it is that lost souls find eternal peace. If you can find it in your dead and rotting heart to do so, I will happily return your head unharmed. If not—well, I'm afraid there will be consequences.\"\n\nBehind you, the wolf whines as if something is wrong. The witch makes a point of not looking at it, keeping her eyes glued instead to the dullahan, waiting for an answer.\n\nThe dullahan, for his part, appears to be at a loss and quite frustrated about it. His hands are spread wide as if to ask, \"How?\" Finally, he waves his arm in an abrupt gesture of refusal.\n\n*page_break\n\nThe witch's eyes narrow dangerously, and she jabs the tip of the knife into the sack. The dullahan reels back, clutching wildly at the empty air above his neck where his head should be. Though he is silent, you can feel him screaming.\n\n\"Are you refusing even so simple a request?\" the witch demands. \"You are little more than death's delivery boy. I ask nothing more of you than what is already in your nature to do. Deliver my sister, or by all the gods that ever were, I swear I will drive this knife into your precious skull and end you here and now!\"\n\nIf you don't act quickly, one or both of them may do something rash—and the chances are good that you will be caught in the crossfire. What will you say to distract them from the argument?\n\n*goto WitchDullahanChoice\n\n\n*label WitchDullahanChoice\n\n*choice\n\n  *disable_reuse #Ask the witch about her sister.\n\n    Something flickers in the witch's eyes, and something in her expression falters, if only for an instant. \"Sorcha was—is—my twin. Years ago, when blood still flowed in both our veins, we made a living as Faerie doctors, healing the sick and curing the cursed. We lived off the land, ate the greens from our garden and hunted our own game, and took only what we needed to survive.\n\n    \"During one midnight hunt, we grew careless. We wore our other forms that night, and some fool hunter mistook her for a common beast and put an arrow in her neck.\n    \n    \"I ripped his throat out with my bare teeth and nearly did the same to his companion before I recognized him as a priest.\" Though she keeps her voice even, the witch's face has grown pale and taut, and the knuckles of the hand holding the knife have gone white.\n    \n    The ice in her voice is all the colder for the agony buried beneath it. \"I begged him to give my sister the viaticum, to protect her soul, but he refused. Instead of going to her eternal rest, her soul was ripped from her body by that—that—that thing—\"\n    \n    Here she gestures at the dullahan, her eyes burning bright blue. \"And she has wandered in a place between here and there for centuries, tormented and unable to move on. All because a cruel, simple-minded man of the cloth did not think her human enough to deserve her last rites.\"\n\n    *set witchsister \"yes\"\n    *goto WitchDullahanChoice\n\n  *disable_reuse #Ask the dullahan why he is refusing the deal.\n\n    *set deathvision \"yes\"\n    *goto DullahanDeathVision\n\n  *disable_reuse #Ask if I can leave.\n\n    You can practically feel the dullahan glaring daggers at you, despite his lack of eyes, and the witch doesn't look much more amused by your request. \"I doubt you would make it more than two steps before one or the other of them tears you apart,\" she observes dryly, gesturing at the dullahan and the wolf on the stairs.\n\n    Oh well, at least you asked.\n\n    *goto WitchDullahanChoice\n\n  *selectable_if ((witchsister = \"yes\") and (deathvision = \"yes\")) #Ask the witch if there is anything else she might ask for instead.\n\n    *goto WitchDeal2\n\n\n*label DullahanDeathVision\n\nThe dullahan hesitates; it is, after all, a difficult question to answer using only hand gestures. After what seems an interminable internal debate, he reaches out and seizes your hand. In an instant, you are transported—in mind, if not in body—far and away from the cave, the witch, and the wolf.\n\nImages flood your mind, a thousand deaths flickering in and out of your consciousness one after the other. You watch a thousand different miserable faces, some quite old and others surprisingly young (at least in appearances), go pale and still as a thousand different souls are torn from their mortal coils. No two faces are the same, no two deaths exactly alike.\n\nWhen the dullahan finally releases you, it takes you several deep breaths to recover your wits and your balance.\n\n\"Well, what did he show you?\" demands the witch from across the room. \"What was his answer?\"\n\nYou think back over everything you've just witnessed, wondering why the dullahan showed you such terrible things. Not a single one of the deaths was peaceful, and not a single one of the souls went with the dullahan without a fight.\n\nEvery single soul in the vision resisted the dullahan's call with wild desperation, as if they could not accept that death had finally come to take them. And the other place you glimpsed now and then between deaths, the place every soul seemed to be heading, had a cold, gray, empty feeling to it, as if it were made of the infinite void that exists only in the cracks between here and the hereafter.\n\nWhat, then, was the dullahan trying to tell you?\n\n*choice\n\n  #The souls he takes deserve to be punished. He cannot take her sister's soul to Tir na nOg because it does not belong there.\n\n    You share your interpretation. The dullahan makes an angry gesture, but whatever corrective measure he may have intended to inflict upon you is interrupted by the witch's response.\n    \n    \"How dare you,\" she growls, her face contorting with pure hatred. \"Sorcha is the purest soul I've ever known. She never acted with malice or spite, not once in her too-short life. The only one deserving of a punishment that cruel is the foul creature standing beside you.\"\n\n    *goto WitchDullahanChoice\n\n  #He is a creature of cruelty and darkness. He cannot take her sister's soul to Tir na nOg because he cannot go there himself.\n\n    You share your interpretation. The dullahan makes an angry gesture at you. Clearly, something got lost in translation.\n    \n    The witch, however, seems unconvinced. \"He may be a thing of evil, but even I concede he is also a thing of immense power. I think it is not that he cannot do it, but that he does not wish to.\"\n\n    *goto WitchDullahanChoice\n\n  #He only takes lost souls—those who are unable to move on because they cannot, or will not, accept their own fates. He cannot take her sister's soul to Tir na nOg because she is not ready to move on yet.\n\n    You share your interpretation. The dullahan seems relieved and bows slightly in your direction.\n    \n    The witch, on the other hand, looks shaken. \"That's ridiculous,\" she snaps, recovering herself. \"He can take her wherever he chooses. It is simply that he does not wish to.\"\n\n    *goto WitchDullahanChoice\n\n  #He enjoys suffering. It is not that he cannot help her sister; it is that he has no desire to.\n\n    You share your interpretation. The dullahan gestures angrily at you.\n    \n    The witch, meanwhile, seems unsurprised. \"Well, that much is obvious,\" she responds in a flat voice. \"And here I thought you might have something useful to tell me.\"\n\n    *goto WitchDullahanChoice\n\n  #I have no idea. I'm still not sure how I even got mixed up in all of this in the first place.\n\n    The dullahan throws his hands up in the air as if to ask God why he was cursed with your presence. The witch levels her gaze at you, her expression almost bored. \"What impressive insight you possess. I can see why he sought your aid.\"\n    \n    The dullahan crosses his arms. You can't help but think that if he could roll his eyes at you, he would.\n\n    *goto WitchDullahanChoice\n\n\n*label WitchDeal2\n\nThe witch's smile softens, if only a fraction. \"Does it surprise you that I have not bargained for my own soul as well? Perhaps you think I should ask the dullahan to spare me, to forget my name and let me live.\" She shakes her head. \"The only reason I still walk this earth is because I refused to let death take me before I found a way to save Sorcha. If she can be at peace, that is enough for me.\"\n\n\"No!\" a voice cries from the top of the stairs.\n\nTurning, you see a woman with a face identical to the witch's now standing where the wolf used to be. Long black hair streams like dark water down to her waist, and her willow-thin frame is clad only in a billowing gown the color of the moon in winter. \"Maire, don't do this!\"\n\nThe witch—Maire—shakes her head. \"Don't interfere, Sorcha. We both know my soul was forfeit long ago. Dullahan, take my sister to Tir na nOg!\"\n\nThe dullahan waves his arms again in a clear gesture of helpless refusal, and the room erupts into chaos. Sorcha rushes forward, demanding her sister's soul be included in the bargain, while Maire screams at the dullahan to take her away. The dullahan, for his part, looks dangerously close to throwing caution to the wind and attacking them both out of pure spite.\n\nIt occurs to you that no one is looking in your direction anymore. This could be a good time to strike—if, that is, you're still intent on completing your quest. Or you could bide your time and see if they don't sort it out themselves, and pray the one left standing is sympathetic to your situation.\n\n*choice\n\n  #I swore an oath to help the dullahan retrieve his head. I have to do whatever it takes to get it back.\n\n    *set daring %+20\n    *set altruism %+20\n    *goto WitchFight\n\n  #It's safer to watch from the sidelines than to throw myself into a fight where I don't belong. I'll wait and see what happens.\n\n    *set daring %-20\n    *set guile %+20\n    *goto WitchWait\n\n  #There's no telling what the witch will do with me if she manages to kill the dullahan, but the Fair Folk always hold up their end of a bargain. I'll side with the dullahan.\n\n    *set daring %+20\n    *set guile %-20\n    *goto WitchFight\n\n  #I'm only here because I didn't want the dullahan to kill me. If he dies, he can't kill me, and if he gets his head back, he'll have no reason to kill me. There's no point in risking my life in a fight when I'm so close to freedom.\n\n    *set guile %+20\n    *set altruism %-20\n    *goto WitchWait\n\n  #It's clear the dullahan is a heartless creature; the world would be better off without him. Why should I endanger myself for the sake of such a beast?\n\n    *set altruism %-20\n    *set guile %-20\n    *goto WitchWait\n\n\n*label WitchWait\n\nYou watch as the argument escalates. The room practically vibrates with the force of the rising tempers and powers flaring just beneath the surface. Sorcha seizes her sister's arm, pleading with her to see reason. Maire, distracted, attempts to shake her off, snapping at her to get back to her place on the stairs. The dullahan, seeing his opportunity, draws out his whip.\n\nA white streak flashes like lightning across the room, and a scream rings out, high and piercing—but it is Sorcha, not Maire, who is wounded, having stepped forward to receive the blow meant for her sister. Maire, wide-eyed and pale, watches as her sister crumbles to the floor, drenched in blood. \"Sorcha!\"\n\nWith an exasperated gesture, the dullahan raises his whip again, ready to strike, but Maire has lost all sight of reason. \"No. You shan't spill a single drop more of my family's blood,\" she hisses, and seconds before the whip strikes, she drives the dagger into the sack.\n\n*set dullahan \"dead\"\n*page_break\n\nThe whip clatters to the floor, the bones of it scattering across the stone as if cast by the hand of a diviner. The dullahan doubles over in obvious agony, screaming without sound, and collapses onto the ground. He writhes like a maddened snake, limbs lashing out in frantic jerks and spasms. As his strength wanes, his movements grow quieter, less wild, until at last, with a final, weak twitch, he falls utterly still.\n\nMaire doesn't spare so much as a second to gloat or revel in his pain. She drops the dagger, along with the bag and its contents, onto the floor with no more care than if it were a pouch full of junk. The bag lands with a sickening squelch, a black pool of something slick and wet slowly spreading out beneath it. Turning to her sister, Maire cradles Sorcha's fast-fading form in her arms, the scene a tragic mimicry of that which you saw in the dullahan's visions.\n\n\"Peace, sister,\" Sorcha whispers. \"Don't you see? I am dead already; I cannot die again.\"\n\n\"With every breath, a little more of you disappears,\" says Maire, stroking Sorcha's hair with unexpected gentleness. \"Don't placate me; tell me the truth. What will happen to you?\"\n\nSorcha shakes her head. Even so minor a movement seems to come to her only with great effort. \"I cannot say.\"\n\nWatching the sisters cling to their final moments together, you are presented with three options: wait in respectful silence in the hopes that the witch will have no further use for you and allow you to go free, try to sneak out, or kill Maire while she is distracted and tie up the last of your loose ends here.\n\n*choice\n\n  #I will wait.\n\n    *goto SorchaDeath\n\n  #I will run.\n\n    *goto WitchFlee\n\n  #I will fight.\n\n    *goto WitchFight\n\n\n*label SorchaDeath\n\nYou can't bring yourself to interrupt this moment, even if it may cost you your life. \"Sorcha,\" Maire murmurs, \"you cannot disappear. I have spent centuries with no room in my heart or head for anything but thoughts of saving you. Do not tell me all these long years have been wasted on a fool's errand. I could not bear it.\"\n\n\"But you have saved me,\" replies Sorcha. Her voice is so faint you can no longer hear it and instead must read her lips to understand her answer. \"Anything is better than that purgatory from which I fled to find you. Were it not for you, I would be there still. But will you do me one last favor?\"\n\n\"You always were the spoiled one,\" says Maire, and the ghost of a smile flits across Sorcha's lips. \"Anything, Sister. Name it.\"\n\nSorcha's body is nearly invisible now, no more corporeal than a wisp of mist moments before the dawn. \"Live and die for your own sake from this night onward. Not for mine.\"\n\n\"Sorcha,\" Maire whispers, her voice breaking. Though Sorcha's lips move to answer, she disappears at last, and her reply is lost to the overwhelming silence that follows.\n\n*set sorcha \"dead\"\n*page_break\n\nMaire stares at the empty space where her sister once lay for several long moments, lost in shock and grief. At length her eyes begin to wander, a flicker of hatred flashing in them as they pass over the dullahan's corpse—and then they land on you.\n\nShe is on her feet in an instant, hands raised and ready to cast. You throw your arms up in a helpless blocking gesture, knowing even as you do so that it will do you no good. But instead of attacking, she simply stares with terrifying intensity.\n\n*if ((altruism > 75) or (guile \u003c 25))\n\n  After several heart-pounding instants, something in her expression flickers. She closes her eyes and curls in on herself, clutching her hands tightly together. \"It is taking everything in me not to tear out your heart for the part you have played here—but I can find no darkness there great enough to justify the deed. Go now, before I change my mind. And take that thing with you,\" she adds with a growl, gesturing towards the dullahan's body.\n\n  Picking up the head first and tying it to your belt, you approach the body with caution, unable to stop yourself from imagining that he yet lives and will break your neck (or worse) as soon as you're within reach. Yet when you finally bring yourself to touch him, he does not stir.\n  \n  Bracing yourself, you grasp his hand and pull hard, expecting his body to be a heavy burden to bear. Instead, you find he seems to weigh hardly anything at all. Lifting him by both arms, you manage to drag him up and out of the witch's sanctum without much trouble.\n\n  *set body \"dullahan\"\n  *goto checkpoint_save\n\n*else\n\n  *goto SanctumCollapse\n\n*label SanctumCollapse  \n\nThe moment stretches on, your discomfort increasing tenfold with each passing second. Yet when it's over, the expression in Maire's eyes makes you wish it could have lasted longer. \"Your soul is as black as mine,\" she mutters, as if to herself. \"Good.\"\n\nShe whispers something in the language of magic, and you brace yourself for an impact which never comes. Instead, you feel the ground beneath your feet begin to tremor. Loose dirt and gravel shake free from the walls and ceiling of the sanctum to rain down around you in a dusty haze. Maire kneels as if to pray, and it finally occurs to you that you're not the only one whose life she means to end.\n\n*choice\n\n  #Attack the witch! Perhaps if I kill her, the spell will break.\n\n    Steeling yourself for the inevitable backlash, you take a deep breath before rushing at Maire, brandishing your ${weapon} with all the strength you have left to muster. She doesn't look up, doesn't even bat an eye—and all too soon, you find out why. Just as you reach her, weapon raised and ready for the kill, the sanctum ceiling collapses.\n\n    An instant before you're buried beneath its weight, Maire opens her eyes and looks straight at you…but it is not you whom she is looking at. The last thing you see before the world goes black is her lips forming a single word: \"Sorcha.\"\n\n    *goto fatal_end\n\n  #Beg her to stop the spell!\n\n    You rush to kneel at Maire's side, tossing dignity to the wind as you plead with her for pity, for reason—anything to stop this madness. But she doesn't give the slightest sign that she's aware of your presence. It's as if you don't exist.\n\n    In fact, you soon won't. Having wasted your final moments and all but your last breath on a fool's errand, you can only watch helplessly as the ceiling above you begins to collapse. You don't even have time to whisper a final prayer or farewell before you're buried beneath it.\n\n    *goto fatal_end\n\n  #Run for the door!\n\n    You race to the stairs in a blind panic, skittering and scrambling on their rough, uneven surfaces as you claw your way towards freedom.\n\n    \"Did you think I would let you walk out of here alive after what you've done?\" Maire's voice whispers in your head.\n    \n    Just inches from the exit, the stairs crumble beneath your feet like cheap clay. You tumble backward, head over feet. The last thing you hear before the world goes black is the sickening crack of your neck snapping as your head connects with cold, unyielding stone.\n\n    *goto fatal_end\n\n  #Flee deeper into the sanctum!\n\n    Fighting against the instinct to head straight to the surface, you sprint to the closest open tunnel. Maire lets out a furious lupine howl, and although you don't stop to look back, you know she's giving chase.\n\n    You run blindly, trying not to listen as the world collapses around you, struggling for breath to fill your burning lungs as dust and dirt pollute the air. At length, you stumble into an antechamber, falling to your hands and knees at its center as you give up the chase and surrender to your doom.\n\n    Yet whether because the stone foundations of this room are too strong or the spell itself is spent, against all odds, you find that you are spared. The tunnels outside both the entrance and exit ahead collapse, but the room itself remains intact. A few small candles lend weak, flickering light to the otherwise empty darkness.\n\n    You are not alone. You turn to see Maire standing behind you, dirt and debris matted in her hair and smeared along her arms and legs, blood seeping from a gash in one knee. \"No,\" she whispers hoarsely. \"You will not walk away from this.\"\n    \n    Without further preamble, she raises her hands and flings another curse at you, this one aimed straight at your heart.\n\n    *set sanctumflee \"yes\"\n    *page_break\n    *goto SanctumFlee1\n\n*label SanctumFlee1\n\n*if (witchpower >= 100)\n\n  You gasp, a hollow, agonized sound, and fall to your knees, clutching at your chest as if to somehow rip out the source of your sudden agony. Your heart is in a vice, and as Maire closes her fist, you imagine you can feel the veins bursting and the blood flooding your chest cavity as she crushes your heart.\n\n  You collapse onto your back, your vision fading to black as the pain gives way to nothingness.\n\n  *goto fatal_end\n\n*if (witchpower >= 50)\n\n  Your heart aches—not as it would for a lost love, but as if invisible fingers have wrapped around it and are squeezing it tight. You cough and clutch at your chest, but you're still standing.\n  \n  At length, Maire drops her hand, her expression flat, her eyes dead cold. Without a word, she flickers—there's no better word for it. One instant, she's a woman; the next, a wolf. She bares her teeth, and you steel yourself for battle.\n\n  *goto WolfFight\n\n*else\n\n  The effect is no more significant than if a butterfly had fluttered its wings at you. Maire, enraged and bewildered, shakes her head. \"Whatever protection you carry is potent indeed,\" she rasps, \"but it will not save you.\"\n  \n  In the flicker of an eye, her womanly figure is gone, replaced by the form of a black wolf with wild eyes and cruel fangs.\n\n  *goto WolfFight\n\n\n*label WitchFlee\n\n*if (guile > 85)\n\n  Through sheer force of will, you make your escape one swift and silent footfall at a time, backing cautiously up to the stairs. As you turn to take the first step, you hear Maire begin to chant. Knowing you've seconds left at most, you sprint up the stairs, taking them two at a time.\n  \n  Maire's voice rises to a roar, furious and wild, and the living earth around you shudders in its wake. The stairs begin to crumble, and you stumble and flail for the door, heart pounding and sure, so dreadfully sure it's all about to end, and then—\n\n  You're out. You clamber up into the clear, open air. Though the ground beneath you still quivers, it's a mere tremor, not the earthquake of an instant before. As you scramble away from the door in the earth, you hear the distant echo of soil and rock tumbling in on themselves as the witch's sanctum collapses below your feet.\n\n  *set body \"none\"\n  *set maire \"dead\"\n  *goto checkpoint_save\n\n*elseif (luck >= 3)\n\n  You make your escape one swift and silent step at a time, backing cautiously up to the stairs. As you turn to take the first step, you hear Maire begin to chant.\n  \n  Knowing you've seconds left at most, you sprint up the stairs, taking them two at a time. Maire's voice rises to a roar, furious and wild, and the living earth around you shudders in its wake.\n\n  The stairs begin to crumble, and you stumble and flail for the door, heart pounding and sure, so dreadfully sure it's all about to end, and then—\n\n  You're out. Through sheer luck alone, you've somehow managed to survive.\n  \n  You clamber up into the clear, open air. Though the ground beneath you still quivers, it's a mere tremor, not the earthquake of an instant before. As you scramble away from the door in the earth, you hear the distant echo of soil and rock tumbling in on themselves as the witch's sanctum collapses below your feet.\n\n  *set luck -3\n  *set body \"none\"\n  *set maire \"dead\"\n  *goto checkpoint_save\n\n*else\n\n  You start to back towards the stairs, praying your retreat will go unnoticed. Your prayers, unfortunately, go unanswered. Maire doesn't even bother to look up; with a whispered word, the golden dagger shivers as if pulled by an invisible string. Then—snap—it flings itself across the room at you, aimed directly at your throat.\n\n  You don't even have time enough to scream before the blood starts flowing from your neck. Eyes wide with shock, you collapse. As the world fades to nothingness, the last things you hear are the hushed voices of the Morgan sisters bidding each other a tearful final farewell.\n\n  *goto fatal_end\n\n\n*label WitchFight\n\nThere's no room for hesitation. Stepping forward, you drive your ${weapon} down hard towards the witch's wrist. You narrowly miss the flesh but connect solidly with the golden dagger, knocking it hard out of her hand. As the blade clatters to the floor, you kick it away; the cold metal shrieks as it skitters across the room.\n\n*if ((sorcha = \"alive\") and (dullahan = \"alive\"))\n\n  Sorcha dives for it, flickering back into wolf's form mid-leap, only to be stricken from the air by the dullahan's whip. Blood spurts from a gash across her shoulder as she crashes onto the floor, but when she stands, she's steady—injured, but not beaten.\n\n  \"Mind the dullahan, sister,\" Maire calls to her. \"I'll take care of this one.\"\n  \n  Sorcha immediately dives into battle, fangs gleaming in the firelight as she and the dullahan begin a deadly dance. You, meanwhile, are left to face Maire—alone.\n\n  *goto WitchFight2\n\n*else\n\n  *goto WitchFight2\n\n\n*label WitchFight2\n\nWithout warning, Maire lurches forward and seizes you by the neck with one hand, crushing your windpipe with preternatural force. She begins a low chant under her breath. You…\n\n*choice\n\n  #…claw at her face with my free hand.\n\n    You drag your ragged fingernails down the side of her face, grimacing as the flesh (still soft, despite its age) splits and leaks hot blood. Maire shrieks, but with one hand at your throat and the other gripping the sack containing the dullahan's head, she has no means of defense. She releases you on instinct, and you scramble back out of arm's reach.\n\n    *goto WitchFight3\n\n  #…kick her. Hard.\n\n    Striking fast and sharp, you drive your boot as hard as you can into the witch's kneecap. It's not a crippling blow, by any means, but it causes enough pain to make her cry out.\n    \n    With one hand wrapped around your neck and the other gripping the sack containing the dullahan's head, she has no means of defense. She releases you on instinct, and you scramble back out of arm's reach.\n\n    *goto WitchFight3\n\n  *if (weapon = \"knife\") #…stab her.\n\n    Your blade lashes out, flashing in the candlelight. Having no free hand with which to block the blow (for the one not wrapped around your neck still clutches the sack containing the dullahan's head), she releases you on instinct, shoving you off-balance to avoid the snicker-snack of the knife's steel edge. You use the momentum to your advantage, scrambling back to relative safety and out of arm's reach.\n\n    *goto WitchFight3\n\n  *if ((weapon = \"light pole\") or (weapon = \"poker\")) #…attack her with my ${weapon}.\n\n    Your weapon is too long for traditional close-quarters combat—so instead of aiming for a traditional target, you shove the tip of your ${weapon} down at her foot instead.\n    \n    Sensing the attack coming, she releases you, shoving you back and away to avoid the cold iron tip of your chosen weapon. You scramble back, eying the sack still dangling from her hand, as she balls the other hand—now free—into a fist.\n\n    *goto WitchFight3\n\n  *if ((weapon = \"umbrella\") or (weapon = \"cane\")) #…beat at her head with my ${weapon}. At the very least, it's sure to shut her up!\n\n    You bring your ${weapon} down hard on the witch's head—repeatedly. With a cry, she releases you in order to guard her face from the attacks. You scramble back and out of arm's reach, eying the sack still dangling from her hand, as she balls the other hand—now free—into a fist.\n\n    *goto WitchFight3\n\n\n*label WitchFight3\n\nShe sneers at you but does not bother to rage, as if you are no more than a disgusting irritation, vermin to be shooed from her house with a broom. She begins to chant again—a different spell, this one sounding a bit more guttural, rawer around the edges, like the blade of a saw.\n\nIf you're going to attack, best do it soon, before you find out firsthand what sort of torture she's conjuring up for you now.\n\n*goto WitchFight3Choice\n\n\n*label WitchFight3Choice\n\nWhat will you do?\n\n*choice\n\n  *disable_reuse #Attack! Aim for the jugular!\n\n    *if (witchattackfail = \"yes\")\n      *goto WitchAttackFail2\n\n    *else\n      *goto WitchAttackFail\n\n  *disable_reuse #Attack! Aim for the heart!\n\n    *if (witchattackfail = \"yes\")\n      *goto WitchAttackFail2\n\n    *else\n      *goto WitchAttackFail\n\n  #Attack! Aim for her hand!\n\n    *goto WitchAttackSuccess\n\n\n*label WitchAttackFail\n\nThough well-aimed, with a flick of the witch's wrist, your attack misses its mark. Yet you felt no enchantment in your own flesh and bones, and her magic could not have touched the weapon itself.\n\nNo—it was the air itself she commanded, pushing it hard and fast to turn your hand aside. And it required as little effort as one might use to swat a fly.\n\nAs if in response to your thoughts, Maire smiles knowingly and continues her chant.\n\n*set witchattackfail \"yes\"\n*goto WitchFight3Choice\n\n\n*label WitchAttackFail2\n\nYou try again, attacking a from a different angle and praying the witch is too distracted to notice.\n\nShe's not. Another flick of her wrist and you stagger to the side, nearly dropping your ${weapon} as you flail and stumble back out of her reach. Now what?\n\n*goto WitchFight3Choice\n\n\n*label WitchAttackSuccess\n\nIt's a desperate move but the only one you can think to make in the limited time left. You dive forward, ${weapon} in hand. All but rolling her eyes, Maire flicks her wrist as if to divert your attack.\n\nBut she defends from the wrong angle, assuming you're aiming for some vital artery or perhaps her heart—she doesn't realize, until too late, your true target. Her chant falters, interrupted with a gasp as the tip of your weapon catches on the rough fabric of the sack and rips it from her hand, sending it and its contents tumbling across the floor.\n\n*page_break\n\n*if ((dullahan = \"alive\") and (sorcha = \"alive\"))\n\n  The temperature of the room seems to drop ten degrees in an instant. On the opposite side, you hear a wolfish shriek of pain. Maire, distracted, looks over to her sister, who now seems to be fighting a losing battle. Knowing better than to turn your back to her, you step between the witch and the dullahan's head, ${weapon} at the ready.\n  \n  Her white-marble cheeks pallid and blotched with red fury, Maire snarls and, in the blink of an eye, transforms. The dagger clatters to the ground. In the witch's place stands a black wolf, a perfect match for the form in which her sister first appeared to you, save one thing: the blood-red glint of battle rage in Maire's eyes is all her own.\n\n  *goto WolfFight\n\n*else\n\n  Knowing better than to turn your back to her, you step between the witch and the dullahan's head, ${weapon} at the ready. Her white-marble cheeks pallid and blotched with red fury, Maire snarls and, in the blink of an eye, transforms.\n  \n  The dagger clatters to the ground. In the witch's place stands a black wolf, a perfect match for the form in which her sister first appeared to you, save one thing: the blood-red glint of battle rage in Maire's eyes is all her own.\n\n  *goto WolfFight\n\n\n*label WolfFight\n\nThere is no dramatic speech before the charge, no whispered threats or smirking one-liners to delay the inevitable. Maire leaps without hesitation, jaws wide and ready to clamp down hard on your throat. \n\nYou have less than seconds to choose a course of action—and odds are, you won't get a second chance. How will you defend yourself?\n\n*choice\n\n  #The best defense is a good offense! I will be brave and stand my ground, meeting her attack head on.\n\n    *if (daring > 60) \n\n      It takes every ounce of courage within you not to move aside out of harm's way. Instead, you plant your feet and brace yourself for the impact.\n\n      *goto StandGroundAttack\n\n    *else\n\n      You try to steel yourself against your own survival instinct, but to no avail. You're too cautious, too aware of your own mortality—and, ironically, it will cost you your life. At the last moment, you waver; before you know it, Maire is upon you.\n\n      Her jaws close around your throat, and you try to scream—for help, or out of agony, or both—but her teeth are crushing your windpipe, and blood is flooding from your ruined artery. Your last image of this world is a fading glimpse of blood and gore dripping from wicked white fangs.\n\n      *goto fatal_end\n\n  #I'll dodge first and attack second. Landing a blow now won't do me any good if it gets me killed as well.\n\n    *goto DodgeAttack\n\n  #I'll catch her off guard with a surprise attack.\n\n    *if (guile > 60)\n\n      In a flash of the sort of inspiration that only comes an instant before an otherwise-certain death, you drop to your knees, almost as if you're about to pray or perhaps beg for your life.\n\n      Maire's leap carries her over your head, and you drive your ${weapon} as hard as you can up into her unprotected torso.\n\n      *goto SurpriseAttack\n\n    *elseif (luck >=4)\n\n      In a flash of the sort of inspiration that only comes an instant before an otherwise-certain death, you drop to your knees, almost as if you're about to pray or perhaps beg for your life. \n\n      Luck is on your side tonight. Maire's leap carries her over your head, and you drive your ${weapon} as hard as you can up into her unprotected torso.\n\n      *set luck -4\n      *goto SurpriseAttack\n\n    *else\n\n      You may think yourself clever, but unfortunately, you are not cunning enough to outwit a witch. By the time you think of something that has even half a chance of catching her off guard, your time has run out.\n\n      Maire's jaws close around your throat, and you try to scream—for help, or out of agony, or both—but her teeth are crushing your windpipe, and blood is flooding from your ruined artery. Your last image of this world is a fading glimpse of blood and gore dripping from wicked white fangs.\n\n      *goto fatal_end\n\n\n*label StandGroundAttack\n\n*if (((weapon = \"knife\") or (weapon = \"light pole\")) or (weapon = \"poker\"))\n\n  At the last possible moment, you stab your ${weapon} up hard into Maire's chest. She yelps, and together you collapse in a bloody heap on the floor.\n  \n  Even as blood froths from her mouth, she snaps at you, still fighting to end your life before she loses her own. But with a mighty shove, you force her weight off you and roll to your feet, tearing your weapon from her breast as you move.\n\n  She howls and writhes on the floor for an instant or two, then falls still, blood pouring from her wound with every beat of her wretched heart.\n\n  *goto MaireDeath\n\n*else\n\n  At the last possible moment, you jab your ${weapon} up hard into Maire's chest. While its dull point cannot pierce her flesh, it's enough to throw her attack off-balance. You crumple together to the floor. Before either of you can think twice, you raise your weapon and bring it down hard on her skull, the blow connecting with a sickening crack.\n\n  Dazed but not dissuaded, Maire lunges again—but it is a pathetic attempt, off-kilter and lacking the power of the first. You bring the ${weapon} down again, and something in the pit of your stomach folds in on itself when you feel something crunch. Maire falls and does not get up a third time.\n\n  *goto MaireDeath\n\n\n*label DodgeAttack\n\nYou don't think, you just move—fast, and out of the way. Maybe it's luck, or maybe it's fate, but somehow you manage to dance right out of the jaws of death…at least for the moment.\n\nInstead of catching your throat, Maire's teeth catch on your sleeve. Together, you fall in a tangle of thrashing limbs and cries of human and inhuman pain.\n\n*if (((weapon = \"knife\") or (weapon = \"light pole\")) or (weapon = \"poker\"))\n\n  Maire lunges for you again, trying desperately to correct her error, and on pure instinct, you bring your weapon up to defend yourself. Her momentum drives your ${weapon} deep into her chest, carving a mortal wound into her very heart. With a sharp yank, you tear your weapon from her body and leap back out of the reach of her fangs; blood sprays from the open wound, staining her fur and your flesh alike a deep red.\n\n  She stares at you as if she cannot comprehend the situation, cannot possibly fathom defeat—and then drops like a rag doll to the floor.\n\n  *goto MaireDeath\n\n*else\n\n  Maire lunges for you again, trying desperately to correct her error, and on pure instinct, you bring your weapon up to defend yourself. Your ${weapon} connects with the side of her face, altering her trajectory and (from the awful sound of it) snapping a bone or two in the process.\n\n  She howls and falls short of her target but strikes at you again a breath later. With no thought in your mind but that of survival, you bring your weapon down on her head with every ounce of strength left in your body, The blow connects with a resounding crack.\n\n  Maire wobbles, falters, and finally collapses with a low groan.\n\n  *goto MaireDeath\n\n\n*label SurpriseAttack\n\n*if (((weapon = \"knife\") or (weapon = \"light pole\")) or (weapon = \"poker\"))\n\n  Your ${weapon} drags through her skin, slicing like a cutter ship through calm waters, blood rippling in its wake. She howls and crashes to the floor behind you, a heap of limp fur and bone.\n\n  *goto MaireDeath\n\n*else\n\n    She emits a strangled sort of half-gasp, and you guess that the impact has driven the air from her lungs. As she hits the floor, you spin on your heels and strike again, driving your ${weapon} straight at her head. The blow lands with a deafening crack, and she collapses.\n\n    *goto MaireDeath\n\n\n*label MaireDeath\n\n*if ((sorcha = \"alive\") and (dullahan = \"alive\"))\n\n  Across the room, you hear a howl, followed by the crack of a whip and a sharp, inhuman cry. Somehow you know without looking that Sorcha has lost her battle as well.\n  *goto MaireDeath2\n\n*else\n\n  You take a deep, shaky breath.\n  *goto MaireDeath2\n\n\n*label MaireDeath2\n\n\"Sorcha,\" Maire moans, so softly you almost don't hear it. \"Sister.\" She sighs and falls utterly still.\n\nYou fancy you feel a brief, passing chill in the air, as if something cold has touched you on its way out the door.\n\n*set maire \"dead\"\n*set sorcha \"dead\"\n*set mairemurder \"yes\"\n\n*page_break\n\n*if (sanctumflee = \"yes\")\n\n  The silence in the antechamber is heavy, as if the air itself has weight to it. For several moments, you do nothing but simply stand and struggle to breathe. At length, you take a step back from the body at your feet and look around—and the reality of the situation begins to set in.\n\n  The way back has collapsed. The way forward is inaccessible. You're trapped in an underground chamber with a limited air supply and nothing but the lupine corpse of a witch for company.\n\n  Panic shimmers at the edges of your vision and tap dances up your spine, and for a moment, it's too tempting to give into hysterics and throw yourself at one of the doors, screaming (likely in vain) for rescue. But air is limited—and so is your time on this good earth.\n\n  You're lucky in only one sense: this room seems unfinished, or perhaps it simply had never became necessary. In any case, the walls are packed earth and stone combined rather than solid rock. So you follow the only course of action left to you, beginning to dig with your weapon and your bare hands, up and at an angle, trying not to remember how many steps you initially took when you first descended into the witch's lair.\n\n  *page_break\n  *goto SanctumEscape\n\n*elseif ((dullahan = \"alive\") and (maire = \"dead\"))\n\n  Looking up from the wolf's body and across the room, you spot the dullahan standing over Sorcha. She lies prostrate on the ground, trembling. Yet the dullahan pays her no mind; he turns this way and that as if searching for something.\n  \n  Your eyes shift unbidden to the corner of the room where the sack and its contents have rolled. Not far from there lies the golden dagger the witch had held when you first entered the sanctum.\n\n  *goto DullahanKnifeChoice\n\n*else\n\n  *goto EverybodyDeadChoice\n\n\n*label DullahanKnifeChoice\n\n*choice\n\n  #Grab the knife. Just in case.\n\n    *set weapon \"golddagger\"\n    *goto DullahanConfrontationA\n\n  *if ((guile > 60) or (daring > 60)) #Seize the knife and the head before the dullahan can get to them.\n\n    *set weapon \"golddagger\"\n    *goto DullahanConfrontationB\n\n  #Go to Sorcha.\n\n    *goto SorchaLastWords\n\n\n*label EverybodyDeadChoice\n\nThe sanctum is utterly still. You are now the sole living thing left in this place, your only company corpses and gently flickering candles.\n\n*if (weapon != \"golddagger\")\n  *goto DaggerChoice\n\n*else\n  *goto EverybodyDeadChoice2\n\n\n*label DaggerChoice\n\nWill you take the dagger?\n\n*choice\n\n  #Yes. It will fetch a good price from the right buyer.\n    *set altruism %-20\n    *set weapon \"golddagger\"\n    *goto EverybodyDeadChoice2\n\n  #No. It's probably cursed.\n    *set daring %-20\n    *goto EverybodyDeadChoice2\n\n  #Yes. One never knows when it might come in handy.\n    *set guile %+20\n    *set weapon \"golddagger\"\n    *goto EverybodyDeadChoice2\n\n  #No. What use have I for a dagger?\n    *goto EverybodyDeadChoice2\n\n\n*label EverybodyDeadChoice2\n\nWhat will you do with the bodies?\n\n*choice\n\n  #Leave the place as it is. Walk away and never look back.\n\n    You leave the dullahan's head on the floor. Without sparing his or the witch's body so much as another glance, you head up the stairs and out the door.\n\n    *set body \"none\"\n    *goto checkpoint_save\n\n  #Take the dullahan's body out and bury him. Leave the witch to her sanctum.\n\n    You can't carry both body and head at once, so you tie the head to your belt. Reaching down, you grasp the dullahan's hand and pull hard, expecting his height and strength to equate to a certain magnitude of weight—only to nearly fall on your arse. He seems to weigh hardly anything at all.\n    \n    Lifting him beneath both arms, you manage to drag him up and out of the witch's sanctum with little trouble.\n\n    *set body \"dullahan\"\n    *goto checkpoint_save\n\n  #Take the witch's body out and bury her. Leave the dullahan and his head where he lies.\n\n    You leave the dullahan's head on the floor and walk over to Maire's corpse. The witch is lighter than she looks, but her weight hangs heavy on your shoulders—too heavy for your overtaxed muscles to endure when you try to lift her outright. Instead, you must drag her up the stairs and out the door behind you.\n\n    *set body \"maire\"\n    *goto checkpoint_save\n\n  *if (redmenbargain=\"no\") #Bury them both.\n\n    You can't quite convince yourself to leave their bodies here to rot; it isn't right, and worse, it could come back to haunt you. So you do your best to ignore your body's screams of protest and drag each corpse up the stairs and out the door, taking care not to forget the dullahan's head.\n\n    *set body \"both\"\n    *goto checkpoint_save\n\n  *if (redmenbargain=\"yes\") #Take them both. I may have need of one or the other later, and the sanctum may not be the best place to leave them.\n\n    There doesn't seem to be a downside to your plan. At the very least, burying them should keep them from coming back to haunt you later—and if you should need access to their bodies in the future, as you suspect you might, you don't fully trust that you'll be able to reenter the witch's lair at a later date.\n    \n    Doing your best to ignore your body's screams of protest, you drag each corpse up the stairs and out the door, taking care not to forget the dullahan's head.\n\n    *set body \"both\"\n    *goto checkpoint_save\n\n\n*label SanctumEscape\n\nBetween bone-deep aches, the shivering darkness, and the gradual thinning of the air, it isn't long before you lose track of time completely. Perhaps it is only a few hours before it happens, perhaps a few days. It feels like years.\n\nWhatever the case, after some time, you finally feel it—a small trickle of cool, clear air. What strength was left to you is renewed, and you scrabble at the earth, choking on the loose soil as it collapses on you all at once. And at last, at long last, you break through to the surface.\n\nLike a wild creature, frantic and inhuman, you clamber up the wall itself in your desperation for freedom. By some miracle or favor from Lady Luck, you manage to haul yourself up through the hole and out of the antechamber.\n\nYou crawl a safe distance away from the opening before collapsing on your back, breathing too deep and too fast, and not caring because you're free…you're finally free. You lie there for some time, content simply to breathe without fear coating your lungs and thickening your throat.\n\nAfter some time, it occurs to you that the witch's body still lies in the chamber below you. Will you leave her there to rot, or should you find a way to haul her body up with you?\n\n*choice\n\n  #Leave her. I'm not risking my safety for the sake of her corpse.\n\n    What's dead is dead, and what happens to Maire or her body next is not your concern.\n\n    *set body \"none\"\n    *goto checkpoint_save\n\n  #She requires a proper burial. I will find a way to get her out.\n\n    You notice some long, thick, sturdy roots growing not far from the hole. Uprooting the longest of these as a makeshift rope, you climb back down into the abyss.\n    \n    The candles have gone out, but there's just enough light from the surface to guide you back to Maire's body. With great difficulty and a lot of trial and error, you manage to hoist her up to the surface, climbing up yourself shortly thereafter with great relief.\n\n    *set body \"maire\"\n    *goto checkpoint_save\n\n  *if (redmenbargain=\"yes\") #I should bury her body somewhere safe and easy to find, just in case.\n\n    You notice some long, thick, sturdy roots growing not far from the hole. Uprooting the longest of these as a makeshift rope, you climb back down into the abyss.\n    \n    The candles have gone out, but there's just enough light from the surface to guide you back to Maire's body. With great difficulty and a lot of trial and error, you manage to hoist her up to the surface, following with great relief shortly thereafter.\n\n    *set body \"maire\"\n    *goto checkpoint_save\n\n\n*label DullahanConfrontationA\n\nHeart pounding, you dive for the dagger. At the same time, something freezing cold and deadly silent flashes past. You whirl around, blade in hand, to find the dullahan standing not two feet from you, cradling his own head in his hands.\n\nThe head is a horrific sight, all paleness and pockmarks and pestilence. It oozes and reeks of death, and its gaze is somehow both piercing and hollow—and staring straight into your own.\n\nNeither of you move, and after a moment, you realize he's waiting to see what you will do.\n\n*choice\n\n  #Lower the knife. It's only for self-defense.\n\n    *goto DullahanConfrontationA2\n\n  #Attack the dullahan. If I don't kill him now, he'll only come back to haunt me later!\n\n    Your attempt to strike down the dullahan catches him by surprise, and your blade is mere inches from his flesh before he reacts—yet it is still enough to save him and doom you.\n    \n    He drops his whip and seizes your wrist, wrenching it so hard the bones splinter. You shriek and drop the dagger. Releasing your hand, he grabs hold of your neck and squeezes, his grip a steel vise your poor, pathetic mortal hands haven't the faintest hope of deterring.\n\n    As the world goes black, you reflect dimly on where your destiny has led you, wondering where you went astray. You found the dullahan's head and saved him, only to lose your own head—and subsequently your life—in the process.\n    \n    Fate, it seems, has a dark sense of humor.\n\n    *goto fatal_end\n\n\n*label DullahanConfrontationA2\n\nDespite the way all the little hairs are standing up on the back of your neck, you force yourself to lower the knife. The dullahan shifts his weight and seems to pause as if considering his options. After a long moment, he walks past you, taking care not to get too close or fully turn his back, and heads for the door.\n\nSliding the knife into your belt, you turn to follow him. As you do, you notice two things: Sorcha's body, such as it was, is gone, but Maire's earthly remains…well, remain.\n\n*goto MaireBodyChoice\n\n*label MaireBodyChoice\n\n*choice\n\n  #Take her body with me. She deserves a proper burial.\n\n      She's lighter than she looks, but her weight hangs heavy on your shoulders—too heavy for your overtaxed muscles to endure when you try to lift her outright. Instead, you're forced to drag her, like you would game after a hunt, as you ascend the stairs and lead the dullahan out the door.\n\n    *set body \"maire\"\n    *goto checkpoint_save\n\n  #Leave her body. Let her sanctum be her sepulcher.\n\n      You turn away from the witch's corpse and lead the dullahan up and out of the sanctum without so much as a glance backward.\n\n      *set body \"none\"\n      *goto checkpoint_save\n\n  *if (redmenbargain = \"yes\") #Take her body with me. There might be need of it later.\n\n      She's lighter than she looks, but your overtaxed muscles threaten to revolt when you try to lift her outright. Instead, you decide to drag her, like you would game after a hunt, as you ascend the stairs and lead the dullahan out of the sanctum.\n\n      *set body \"maire\"\n      *goto checkpoint_save\n\n\n*label DullahanConfrontationB\n\nIt seems almost suicidal, but there's no room for hesitation. You dive for the dagger, reaching one arm out for the head. You snatch them up just as something dark and deadly cold flashes past your line of vision; you whirl around to find the dullahan standing before you, just out of arm's reach.\n\nHe could kill you in an instant, but he doesn't move. He doesn't dare. You hold his pustulant head by its rotting hair in one hand and your dagger in the other—pointing straight at his most precious possession.\n\n*choice\n\n  #Threaten the dullahan. Demand his word, as best he can give it, that he will never speak my name nor cause me to come to harm.\n\n    *set dullahanstatus \"angry\"\n    *goto DullahanBargain\n\n  *if (redmenbargain=\"yes\") #Threaten the dullahan. Bargain for protection from the Red Men—and for his word not to harm me.\n\n    *set dullahanstatus \"unwillingprotector\"\n    *goto DullahanBargain\n\n  #Kill the dullahan. I'll never feel safe as long as he roams the earth.\n\n    *set dullahanstatus \"angry\"\n    *goto DullahanMurder\n\n*label DullahanBargain\n\nGooseflesh rises on your arms, and you fight the urge to shiver as the temperature of the air around you plummets in the wake of his rage. You've insulted him—worse, you've betrayed him, though you wonder if he sees it as such. Perhaps it's more of an affront that a weak and worthless mortal such as yourself dares leverage his own head against him.\n\nWhatever the case, he seethes and fumes in icy silence, and your palms begin to sweat when you see his hand tighten around the handle of his whip. You press the tip of the knife against his temple, and he stiffens, fists clenching in helpless frustration.\n\nIn spite of yourself, you're shocked when his shoulders finally slump and he bows, the closest gesture he has to a nod. You cannot shake hands without sharing a vision, and it seems he cannot (or will not) speak his assent aloud. But is it enough?\n\n*choice\n\n  #We have no other means of communicating. I have to trust he will honor our deal.\n\n    Not without some measure of trepidation, you hold the head out to the dullahan, dagger at the ready in case he attacks. He snatches his head away, and for a moment, death seems all too imminent—but he restrains himself. He steps away, though never quite turning his full back to you, and storms out the door.\n\n    You begin to follow, only to realize you have yet another choice before you. Though Sorcha's body is gone, Maire's is yet there. Will you take her body with you or leave it here?\n\n    *goto MaireBodyChoice\n\n  #I can't read him, and I don't trust him. The only way to ensure he won't kill me is to kill him first.\n\n    *set dullahanstatus \"angry\"\n    *goto DullahanMurder\n\n\n*label DullahanMurder\n\nYour knuckles tighten around the hilt of the blade. Realizing what's about to transpire, the dullahan lunges at you—an instant too late. The second the gold tip pierces his skin, he stops short, the whip falling to the floor, bones scattering in all directions.\n\nAs you drive the knife deeper, the dullahan doubles over in obvious agony, screaming without sound. He collapses onto the ground, writhing like a maddened snake, limbs lashing out in frantic jerks and spasms. As his strength wanes, his movements grow quieter, less wild. At last, with a final, weak twitch, he falls utterly still.\n\nThe expression on his face, once so fierce and focused, is empty, hollow, agonized—frozen in an endless, silent cry. The sanctum is now utterly silent save for the sound of your own breathing.\n\n*set dullahan \"dead\"\n*set dullahanstatus \"angry\"\n*goto EverybodyDeadChoice\n\n\n*label SorchaLastWords\n\nNot knowing quite what you'll do or say when you get there, you go to kneel at Sorcha's side. She looks, if it's possible, even paler than before; her body is becoming more transparent with every passing second.\n\nShe gazes up at the ceiling, crystalline tears sliding down her cheeks and leaving ghostly trails of grief behind them. \"You know not what you have done, child,\" she whispers. There is no malice in her voice, only pain. She flinches at the sound of the dullahan's boots as he paces the room, searching for his head. \"You have doomed us both and sold your soul to a demon.\"\n\nShe seems to have some time left to her, though precious little from the look of it. If you have something to say to her, best say it fast.\n\n*goto SorchaConvoChoice\n\n\n*label SorchaConvo\n\n*if (SorchaTime \u003c 1)\n\n  *goto SorchaDeath2\n\n*else\n\n    *goto SorchaConvoChoice\n\n\n*label SorchaConvoChoice\n\n*choice\n\n  *disable_reuse #Ask Sorcha where the dullahan takes his victims.\n\n    She closes her eyes. \"Purgatory, gray and cold and hollow as a lifeless ravine.  I could not return, and I could not move on. I wandered, hungry for things I could not name and grasping at memories I could not recall. I would rather not exist at all than return to that place.\"\n\n    *set SorchaTime -1\n    *goto SorchaConvo\n\n  *disable_reuse #Ask Sorcha how she managed to escape from the Other Side to return to her sister.\n\n    She shakes her head slightly. \"I'm not certain. On the Other Side, I could not sleep, but sometimes I dreamed of…dark things. Past sins, broken promises, false hopes.\n    \n    \"One day, I dreamt of my sister and heard the dullahan's hunting horn, and somehow, I knew. She hid from him for ages with her magic, but even the strongest spells break down over time. Her time was up. He was coming for her.\n\n    \"I could not let her suffer the same fate as me. I didn't stop to wonder how I would do it—I didn't think at all. I just ran, calling out to her in my heart, and she answered me in her own. Perhaps she helped me cross the threshold, or perhaps I could have done it all along. It never occurred to me to try before.\"\n\n    She shivers, and even such a simple act seems to sap what little remains of her waning strength. \"For nothing,\" she whispers to herself. \"It was all for nothing.\"\n\n    *set SorchaTime -1\n    *goto SorchaConvo\n\n  *disable_reuse #Ask Sorcha what will happen to her now.\n\n    \"Why do you ask?\" she replies, and for the first time a hint of anger sharpens her tongue. \"What matters my fate, or any of our fates, to you?\"\n    \n    She grimaces. \"Even were I inclined to tell you, I have nothing to tell. I know not. Though I suspect the answer is…nowhere.\"\n\n    *set SorchaTime -1\n    *goto SorchaConvo\n\n  *disable_reuse *if ((altruism > 60) or (guile > 40)) #Try to comfort her.\n\n    She sighs. \"I would thank you but for the fact that, were it not for you, I would have no need of placation in the first place.\"\n\n    *set SorchaTime -1\n    *goto SorchaConvo\n\n  #There is nothing I wish to say to her.\n\n    Words cannot change the course of either of your fates, and so you simply sit beside her in silence and wait.\n\n    *goto SorchaDeath2\n\n\n*label SorchaDeath2\n\nSorcha is almost completely transparent now. Behind you, the dullahan's footsteps echo across the room, heading for the stairs; it seems he has found his head.\n\n\"Tell me one thing,\" she murmurs, her voice no louder than the distant fluttering of a bird's wings. \"Why? Why do you help him?\"\n\n*choice\n\n  #\"I have my reasons.\"\n\n    She frowns, and for a moment, you can almost see the wolf inside of her again glaring out at you. \"Very well. Keep your secrets. God knows I have my own to keep. May He forgive us both.\"\n\n    With a final sigh, she disappears, leaving you alone in the sanctum with her sister's body.\n\n    *goto MaireBodyChoice\n\n  #\"He threatened my life. He would have killed me if I refused him.\"\n\n    She presses her lips together. \"He may be the death of you yet. He is a demon, a servant of death. He can bring nothing but pain and misery. God knows Maire and I have had our share of it. Pray that your paths never cross again from this night on.\"\n\n    With a final sigh, she disappears, leaving you alone in the sanctum with her sister's body.\n\n    *goto MaireBodyChoice\n\n  #\"Because he needed help and had done me no wrong.\"\n\n    Her eyes widen. \"Did you not know him for what he was? Did you not care? He is a demon, a servant of death. Pray you do not serve his same sentence when you pass on to the Other Side. And pray that God forgives you for your choices.\"\n\n    With a final sigh, she disappears, leaving you alone in the sanctum with her sister's body.\n\n    *goto MaireBodyChoice\n\n\n*label checkpoint_save\n\n*page_break End of Chapter\n*set save_load true\n*set return_to_scene \"aftermath\"\n*goto_scene savegame\n\n\n*label fatal_end\n\n*page_break\n*set save_load false\n*set return_to_scene \"witch-hunt\"\n*goto_scene savegame"}};
