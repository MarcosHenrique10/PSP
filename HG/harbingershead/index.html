d to this creature, regardless of his nature, is wrong. My intentions are pure; I wish only to set things right.\n\n    Purity of heart has been the saving grace of more than one hero of legend; perhaps it will be yours as well.\n\n    *set guile %-10\n    *goto QuestAccept01\n\n  #It's obviously in my best interests to help him, isn't it? So there's no good reason why I wouldn't see this through to the end.\n\n    Clever of you to point that out. It's true, betraying a dullahan would likely be a poor choice in the best of circumstances. And at the moment, you have more reason than most not to want to cross one.\n\n    *set guile %+10\n    *goto QuestAccept01\n\n*label QuestAccept01\n\nBesides…\n\n*choice\n\n  #…I've got luck on my side.\n\n    *set luck +1\n    *goto QuestAccept02\n\n  #…I have the Sight. I can be his eyes.\n\n    *set faeriesight %+10\n    *goto QuestAccept02\n\n*label QuestAccept02\n\nThe dullahan crosses his arms, apparently unimpressed. But at length, he drops them to his sides again in a gesture of resigned acquiescence.\n\nHe hesitates, then reaches out to seize your shoulder, his fingers digging deep into your soft flesh. As before, impressions flash into your mind, this time with more force of purpose. You see the head again, its blank, dead eyes staring with unnerving lack of emotion into yours. Several moons in different phases flit by in a sped-up mimicry of the passage of time.\n\nYou see through the dullahan's eyes, finding yourself empty-handed, raging, reaching for you—the sight of yourself outside of your own body is dizzying. There's a flash of white and a spray of crimson. Your nose fills with the sick, metallic stench of blood. Your blood.\n\nHe lets you go, and the images stop. He waits.\n\nIt was a threat, of course. The message was simple: find the head, or else. If only you'd paid better attention to just how many moons passed in the vision. He was probably telling you how much time you have before his patience runs out.\n\n*page_break\n\nYou nod nervously. You understand the terms of your agreement with bitter clarity. You won't let him down.\n\nSatisfied that his message got through to you, the dullahan turns. With a flourish of shadow and a silver glint of moonlight upon his boot buckles, he disappears into the black of the night.\n\nA few moments pass in utter stillness. Then somewhere nearby, a rodent of some kind skitters through the underbrush, startling you. Overhead, an owl hoots. Gradually, signs of life return to the clearing, drowning out the sound of your drumming pulse. A gust of fresh air brushes your cheek, and you let out the breath you hadn't realized you were holding.\n\nTrembling with fear or fatigue (or both), you point your feet towards home and start walking. Slow steps become a quick trot which soon turns into a flat-out run. You do not stop until you finally—finally!—arrive at your own doorstep, panting hard. To your utter amazement, you are still in one piece.\n\n*goto checkpoint_save\n\n\n\n*label checkpoint_save\n\n*page_break End of Chapter\n*set save_load true\n*set return_to_scene \"grandmas\"\n*goto_scene savegame\n\n\n*label fatal_end\n\n*page_break\n*set save_load false\n*set return_to_scene \"startup\"\n*goto_scene savegame", "tavern": "*temp progress 0\n*temp eamon \"no\"\n*temp gamewin \"no\"\n*temp eamonwitch \"no\"\n*temp smugglertalk \"no\"\n*temp smugglerdrinks \"no\"\n*temp redux \"no\"\n*temp inntopic \"no\"\n*temp cellarask \"no\"\n\n[b]Chapter IV: The Howling Hound[/b]\n\nYour sleep that night is, mercifully, too deep to allow for nightmares. The next morning, you rise with the sun, rested (if not necessarily well) and ready to continue your search. After grabbing a hasty bite to eat, you head to the local tavern, fingers crossed in the hopes of finally finding a proper lead to follow.\n\nThe Howling Hound lies curled around a corner plot of land at the end of Main Street, its sloped roof arched as if stretching. Dangerous and wild by night, by day the inn is as docile as a sleeping dog. Its half-shuttered windows let in just enough light for the innkeeper to read his ledger and the gamblers to read their cards, and no more.\n\nYou enter to find the place quieter than usual, only populated by a handful of regular customers, the staff, and one overcrowded table of rather questionable-looking ruffians who appear to be elbow-deep in drinks and card games. At the bar, innkeeper Eamon Cavanaugh glances over a pair of vulcanite spectacles at his customers while he polishes glassware with meticulous care.\n\nStanding at the entrance and deliberating where to begin, you find yourself at a loss. Something about this place tugs at your sixth sense. There's a curious presence here you cannot quite place.\n\n*goto InnChoices\n\n*label InnChoices\n\nStanding around doing nothing won't accomplish much. What shall you do?\n\n*choice\n\n  *if (eamon = \"no\") #Talk to Eamon.\n\n    *goto EamonConvo\n\n  *if (eamon = \"yes\") #Talk to Eamon again.\n\n    *goto EamonChoices\n\n  *disable_reuse *if (((smugglertalk = \"yes\") and (gamewin = \"no\")) and (eamonwitch = \"yes\")) #Try to talk to the smugglers again.\n\n    Your last encounter with the smugglers went less than smoothly. But perhaps a few drinks and a round of cards might loosen their tongues.\n\n    *set redux \"yes\"\n    *goto SmugglerConvoRedux\n\n  *disable_reuse *if ((gamewin = \"lose\") and (eamonwitch = \"yes\")) #Play one more round of cards with the smugglers.\n\n    You have just enough money left for another round of drinks and one last desperate try. You can only hope a win will be enough to draw some morsel of truth from their lips.\n\n    *set redux \"yes\"\n    *goto SmugglerGameRedux\n\n  *disable_reuse #Approach the men at the table.\n\n    *if eamonwitch = \"yes\"\n      You can't ask the men directly about the witch right after they saw you talking to Eamon, not without risking his neck along with yours—after all, smugglers don't take kindly to men who share their secrets with strangers. But perhaps, if you're vague enough and generous enough, they'll share a few juicy tidbits with you.\n      *goto SmugglerConvo\n\n    *else\n      *goto SmugglerConvo\n\n  *if (progress >= \"100\") #Leave the Howling Hound.\n\n    *goto LeaveInn\n\n\n*label EamonConvo\n\nEamon Cavanaugh's face is a memorable one for its lack of proportion. In comparison to the size of his boulder-like head and the shock of blond hair bursting from the top of it, his squinting green eyes, turned-up little nose, and pursed lips seem cut and pasted from some other, far smaller, specimen of the male gender.\n\nBrawny-armed but soft in the middle and of only middling height, his smile is rare but genuine. His eyes, though dulled from thirty-some years of poring over letters and complex business documents in low lighting, are sharp thanks to the aid of his spectacles and a lifetime of learning how to spot the difference between tomfoolery and a brewing tempest.\n\n\"$!{name},\" he greets you, brows raising high over the rims of his eyewear. Though the two of you are little more than acquaintances, your grandfather once spent many hours discussing rumors of the Fair Folk with Eamon's father. You haven't been in the Howling Hound since your grandfather died; with the elder Cavanaugh already gone before him some years before and your mutual connection with Eamon so thoroughly severed, visiting somehow felt like intruding. \"It's been a long time.\"\n\n*set eamon \"yes\"\n\n*goto EamonChoices\n\n*label EamonChoices\n\nWhat do you want to talk to him about?\n\n*choice\n\n  *disable_reuse #Ask how Eamon has been.\n\n    *goto TopicEamon\n\n  *disable_reuse #Ask Eamon about local rumors.\n\n    *goto TopicRumors\n\n  *disable_reuse #Ask Eamon about the men at the table.\n\n    *goto TopicSmugglers\n\n  *disable_reuse #Ask Eamon about the Howling Hound.\n\n    *set inntopic \"yes\"\n    *goto TopicInn\n\n  *disable_reuse #Ask Eamon what he knows about dullahans.\n\n    *goto TopicDullahan\n\n  *disable_reuse *if ((inntopic = \"yes\") and (cellarask = \"no\")) #Ask to see the cellar.\n\n    *set cellarask \"yes\"\n    *goto Cellar\n\n  #Never mind. I don't want to talk to Eamon right now.\n\n    You apologize and excuse yourself. Eamon nods and returns his attention to his work, watching you out of the corner of his eye.\n\n    *goto InnChoices\n\n\n*label TopicEamon\n\nEamon's brows inch higher at your inquiry. You half-expect him to take offense or, at the very least, question why you're suddenly taking interest in his wellbeing again after years of silence. Instead, he shrugs, looks down, and pretends to shift his focus to the tankard he's polishing. \"I'm well enough. The Hound pays for itself, and there hasn't been a proper brawl in weeks. All in all, I can't complain.\"\n\nHe puts the tankard away and reaches for the next glass. \"And you, ${name}?\" he asks in a mild tone. \"How have you been? How is your grandmother?\"\n\nYou answer the easier question first, telling Eamon that your grandmother is well. As for your own state of affairs…\n\n*choice\n\n  #…I tell him I'm well and leave it at that.\n\n    Eamon nods. \"I am glad to hear it. So what can I do for you?\"\n\n    *goto EamonChoices\n\n  #…honestly? I've seen better days.\n\n    Eamon doesn't look up, but something in his face softens, if only a fraction. \"I am sorry to hear that.\" It looks for a moment as though he might inquire further, but in the end, he presses his lips together and waits for you to make the next move.\n\n    *goto EamonChoices\n\n  #…my life has become a waking nightmare!\n\n    Eamon glances up, startled by your outburst. \"I am…sorry to hear that?\" He doesn't seem to mean it thus, but his confusion colors his words as a question rather than a statement. He opens his mouth, perhaps to ask for more information, then closes it again, choosing to wait instead for you to speak first.\n\n    *goto EamonChoices\n\n\n*label TopicRumors\n\nEamon shrugs. \"You hear a lot of talk in a place like this. There's talk that the highwayman from the main road was found dead last night. There's an investigation underway, but it's likely a sham. No one's going to bother locking up a local hero, even if he is a murderer, if they can help it.\"\n\nSo you're probably safe from arrest, provided you keep your head down for a few weeks. It's good to know, though it's not exactly what you meant to find out.\n\nYou tell Eamon you're looking for something out of the ordinary—something difficult to explain, perhaps. \n\nEamon squints at you. \"You mean supernatural. Following in your grandfather's footsteps, are you?\"\n\n*choice\n\n  #\"Yes, I decided to continue his research.\"\n\n    Eamon nods. \"I figured as such. You two were inseparable, the way I remember it.\" He ponders your question for awhile until at length, you wonder if he'll answer at all.\n\n    *goto TopicRumors2\n\n  #\"Not exactly.\"\n\n    Eamon blinks. He hesitates, perhaps judging whether or not to inquire further.\n\n    *goto TopicRumors2\n\n\n*label TopicRumors2\n\nFinally he says, \"I haven't heard much in the way of what you're looking for. But I did overhear something earlier at that table,\" he points to the group of questionable men, \"about a witch. It's not the first time I've heard of it this week either. It's likely naught but exaggeration, but it's all I've heard of late, aside from the usual complaints—brownies stealing socks and the like.\"\n\n*if gamewin = \"yes\"\n\n  Of course, you've already heard their side of this story yourself. You ask him if there's anything else, but he shrugs and shakes his head.\n\n  *set eamonwitch \"yes\"\n  *goto TopicRumors2Choice\n\n*if gamewin = \"no\"\n\n  All too often, so-called witches turn out to be nothing more than women with their wits about them who've managed to cross someone important. Still, it might be a lead worth investigating, if only to rule it out.\n\n  *set eamonwitch \"yes\"\n  *goto TopicRumors2Choice\n\n*else\n\n  It's too bad you couldn't get the smugglers to tell you their tale yourself. If you're to get to the truth of the matter, you'll have to do it on your own.\n\n  *set eamonwitch \"yes\"\n  *goto TopicRumors2Choice\n\n\n*label TopicRumors2Choice\n\nWhat now?\n\n*choice\n\n  #Continue the conversation.\n    *set progress +50\n    *goto EamonChoices\n\n  #End the conversation.\n    You thank him for his help and excuse yourself. Eamon nods and returns his attention to his work, watching you out of the corner of his eye.\n    *set progress +50\n    *goto InnChoices\n\n\n*label TopicSmugglers\n\nEamon thinks before he speaks, seeming to choose his words carefully. \"They are seafarers—of questionable means. Their ship is [i]The Expeditious[/i], owned by one Captain Michael McDowell, if I'm not mistaken. They're to set sail tomorrow, I believe.\"\n\nYou've heard the name McDowell before. He masquerades as an honest merchant, but he has quite the underground reputation as a smuggler of fine goods.\n\nWhat now?\n\n*choice\n\n  #Continue the conversation.\n    *set progress +50\n    *goto EamonChoices\n\n  #End the conversation.\n    You thank him for the information and excuse yourself. Eamon nods and returns his attention to his work, watching you out of the corner of his eye.\n    *set progress +50\n    *goto InnChoices\n\n\n*label TopicInn\n\nWhen you ask Eamon if he's noticed anything out of the ordinary around the Howling Hound, he falters for a moment, glancing up with an incredulous look in his eyes. He doesn't answer right away. Though you can tell by the way he's acting that the answer is yes, you worry he might not be willing to divulge anything further.\n\nPerhaps it is because of your history together, however distant, or perhaps it is because your question caught him so off-guard. Whatever the reason, Eamon chooses to speak. \"Your grandfather always did say you had the Sight.\"\n\nHe casts a quick look around as though to confirm no one is eavesdropping. \"A couple of months ago, I noticed missing food and drink that could not be accounted for in the ledgers. I questioned the staff, but no one confessed, and no proof against any of them emerged then or since. I considered that perhaps some sort of vermin were to blame, but I've yet to find proof of that either. I run a clean establishment, just as Father did.\"\n\nHere he frowns. \"Some of the staff are convinced that the culprit is…of unnatural origin. Some of the girls claim that it pulls on their skirts and the ribbons in their hair when they enter the cellar, and a man who was caught attempting to steal a drink from one of the kegs swore that something attacked him, scratching at his ankles and tripping him up.\"\n\nEamon looks away, busying himself once more with tending to the glassware. \"Some say they've also heard singing in the cellar. But of course, it's more likely than not just some trick of the senses.\"\n\nWhat now?\n\n*choice\n\n  #Ask to see the cellar.\n\n    Eamon shrugs. \"If you insist.\" He turns his head to call out over his shoulder, \"Saoirse!\"\n    \n    Barely a moment after the sound escapes his lips, a young maid, no older than seventeen, appears as if from thin air. Her auburn hair is braided and adorned with red ribbons tied in love-knots, and from beneath long lashes, a pair of green eyes gaze up at you with vague curiosity.\n    \n    \"Saoirse,\" Eamon says to her, \"please take ${name} to the cellar.\"\n    *set cellarask \"yes\"\n    *goto Cellar\n\n  #Talk about something else.\n\n    *goto EamonChoices\n\n  #End the conversation.\n\n    You thank him for the information and excuse yourself. Eamon nods and returns his attention to his work, watching you out of the corner of his eye.\n    *goto InnChoices\n\n\n*label TopicDullahan\n\nEamon shoots you a baleful glance. \"Not much. It was my father who knew about such things, not me.\"\n\nWell, it was worth a try, anyway. What now?\n\n*choice\n\n  #Continue the conversation.\n    *goto EamonChoices\n\n  #End the conversation.\n    You thank him anyway and excuse yourself. Eamon nods and returns his attention to his work, watching you out of the corner of his eye.\n    *goto InnChoices\n\n\n*label Cellar\n\nSaoirse nods to you and, without a word, takes up a candle from a shelf behind the bar, lights it, and leads you downstairs to the cellar. She pauses at the door, and you can see her hands are shaking a bit. You ask if anything is wrong.\n\nShe replies, \n*if gender=\"male\"\n  \"Well, sir, it's just…the last time I came down here, I was a bit startled, is all. Something—that is, I thought something brushed against me leg. I cried out, but when Mr. Cavanaugh came to have a look, he couldn't find nothing.\"\n  \n  With a deep breath, she reaches out and pulls open the door, casting you an unsure smile. \"Least I won't be alone this time.\"\n  *page_break\n  *goto Cellar2\n*if gender=\"female\"\n  \"Well, miss, it's just…the last time I came down here, I was a bit startled, is all. Something—that is, I thought something brushed against me leg. I cried out, but when Mr. Cavanaugh came to have a look, he couldn't find nothing.\"\n  \n  With a deep breath, she reaches out and pulls open the door, casting you an unsure smile. \"Least you're here with me now, miss. There's something about your presence that's comforting—I hope you don't mind my sayin' so.\" A faint blush blooms across the apples of her cheeks.\n  *page_break\n  *goto Cellar2\n*else\n  \"Well, no, it's just…the last time I came down here, I was a bit startled, is all. Something—that is, I thought something brushed against me leg. I cried out, but when Mr. Cavanaugh came to have a look, he couldn't find nothing.\"\n  \n  With a deep breath, she reaches out and pulls open the door, casting you an unsure smile. \"Least I won't be alone this time.\"\n  *page_break\n  *goto Cellar2\n\n\n*label Cellar2\n\nYou follow Saoirse into the room, where the two of you are greeted by a rush of chill, damp air. With one hand bunched into a brave fist at her side, Saoirse walks past you, candle raised high as she lights a series of five wall sconces. Two of these are set by the door, along with one for each of the other walls of the cellar.\n\nAs the flickering light blooms in the darkness, your eyes adjust enough to begin making out rows and rows of rotund barrels and kegs. Against the stone walls stand wooden shelves filled with baskets, bottles, and boxes of meticulously labeled supplies. Nothing here appears out of the ordinary—and yet the strange feeling you first noticed when you walked into the Howling Hound has grown at least ten times stronger since you stepped into the cellar.\n\n\"Is there something I can do for you?\" Saoirse asks, having completed her circuit of the room. You shake your head no.\n\nThe two of you stand together in silence for the space of a moment or two before Saoirse speaks up again. \"I hope I'm not pryin', but is it food and spirits you're after, or…one spirit in particular?\"\n\n*choice\n\n  #Tell Saoirse to mind her own business.\n\n    Saoirse frowns and looks away, her cheeks flushed and her pretty red lips pressed into a thin line. \"My apologies,\" she murmurs. \"I forgot my place. It won't happen again.\"\n\n    *goto Cellar3\n\n  #Tell Saoirse I'm here about the strange presence in the cellar and ask her what she knows.\n\n    Saoirse's mouth forms a great O, the reflection of candlelight flickering like a living spark in the green of her eyes. \"I…well, whatever it is likes to play tricks on the staff—'specially us girls. Some of us refuse to come down alone anymore.\n    \n    \"Oh, and the ale—it loves the ale. Mr. Cavanaugh tried a hundred and three ways to keep it out of it, but nothing works. Sometimes I…\" She pauses, biting her lip. \"Sometimes I worry it's a ghost, but Mr. Cavanaugh says it's just our imaginations running away with us.\"\n\n    *goto Cellar3\n\n  #Tell Saoirse I'd like to try some free samples from the supply.\n\n    Saoirse arches an eyebrow at you. When she speaks, it's clear she's struggling—vainly—to keep a level, nonjudgmental tone. \"I'm afraid  I can't do that. I'm certain if Mr. Cavanaugh meant for you to eat or drink free of charge, he would'a mentioned it to me himself.\"\n\n    *goto Cellar3\n\n\n*label Cellar3\n\nYou nod. Looking around the room again, you hunt for a clue as to where to begin your search, but nothing stands out to you. Saoirse, growing nervous—or perhaps just bored—begins humming a tune you recognize as \"Cockles and Mussels.\"\n\nIt occurs to you that whatever the thing in the cellar is might not show itself to more than one person at a time. Faerie creatures—especially ghosts, if ghost it is—tend to be warier of multiple visitors.\n\nYou ask Saoirse to leave, explaining that what you need to do here must be done in privacy. She protests, but you stand your ground.\n\nAt length, she acquiesces with a sigh. \"Well, Mr. Cavanaugh trusted you enough to let you down here in the first place. So I s'pose it's all right. But don't steal nothing, or it'll be on both our heads!\"\n\nShe leaves, closing the door behind her and leaving you alone with the cold and the damp and the unnerving, unseen presence. A little shiver runs up the length of your spine.\n\n*page_break\n\n*if (faeriesight > 60)\n  *set clurichaun \"yes\"\n  *goto Clurichaun\n\n*else\n  *goto ClurichaunFail\n\n\n*label Clurichaun\n\nYou wait, listening to the drip-drip-drip of a leak in one of the kegs and the faint echo of your own heartbeat.\n\nAt first, nothing happens. Then you hear something scuttle from one end of the room to the other just behind you, and the scuttling is followed by a quick, high-pitched noise that might have been a laugh.\n\nWhen you spin around to look for the source, you see nothing. But something behind you chucks a small, loose stone at you and giggles again when you turn back around.\n\nFinally you see it. It's not a ghost—not even close. Nor is it a leprechaun, though it—or rather, he—bears a strong similarity to one in both stature and general appearance. A fancifully-dressed male figure no taller than a short man's shinbone, he is perched atop of one of the kegs, wearing a Cheshire grin. He's decked head to toe in miniature-sized red-and-white finery, and his shoe buckles shine in the candlelight.\n\nWhen he notices you looking, he tilts one of his feet to reflect the light directly into your eyes, blinding you. You blink and rub your eyes, and when you look again, he's gone.\n\n\"Do you know what I am?\" asks a low, hoarse voice. The words are slurred, and they echo strangely off the walls so you can't tell where they originated.\n\nThe right answer, of course, is that he's a clurichaun—a close cousin of the leprechaun, but vainer and much quicker to anger. Now that you realize, you're surprised you didn't think of it sooner. Clurichauns are known for their practical jokes, and cellars (particularly those well-stocked with alcohol) are their favorite haunts.\n\nThe question is, however, what will you tell the clurichaun?\n\n*choice\n\n  #I'll call him a leprechaun, just to see what his reaction will be.\n\n    Your answer is met with cold silence. The clurichaun yanks on your hair hard enough to make you yelp and your eyes water. But when you lash out at him, he slips past your fingers and back into the shadows. \"Best think twice afore you anger a clurichaun,\" the voice growls.\n\n    *goto Clurichaun2\n\n  #I'll tell it like it is. He's a clurichaun, no doubt about it.\n\n    The clurichaun snorts. \"Well, well, Sighted and sensible to boot. That's twice as much as most humanfolk have to boast about.\"\n\n    *goto Clurichaun2\n\n  #What if I'm wrong? I'll tell him I don't know.\n\n    Another loose pebble flies out of the dark, smacking you square on the nose. \"Ooh, you little liar. The truth may be bitter, but there's no shame in the telling of it. You know full well what I am. Sass me again, and the next one'll leave a mark you won't forget.\"\n\n    *goto Clurichaun2\n\n\n*label Clurichaun2\n\nA tapping noise makes you look up, and there atop the shelf beside you sits the clurichaun, his feet dangling a scant few inches above your head. In his hand is a small wooden noggin cup. He lifts it to his lips and gulps the (probably alcoholic) contents of with obvious deep satisfaction.\n\n*if gender=\"female\"\n\n  \"So, lass,\" he says, \"what is it brings a bright-eyed, bushy-tailed bird like you to a dank, dark hole in the ground such as this?\"\n\n  *goto ClurichaunChoice\n\n*if gender=\"male\"\n\n  \"And just what is it, lad,\" he says, \"that caught your curiosity so as to tempt you down to a dank, dark hole in the ground such as this? Hoping to corner that red-ribboned beauty what escorted you here, perhaps?\" He shoots you a lascivious wink.\n\n  *goto ClurichaunChoice\n\n*else\n\n  He peers down at you. \"And what sort of queer hawk, I wonder, would find pleasure in doddering around a dank, dark hole in the ground looking for clurichauns?\"\n\n  *goto ClurichaunChoice\n\n\n*label ClurichaunChoice\n\nWhat do you want to talk to the clurichaun about?\n\n*choice\n\n  *disable_reuse #Ask him why he's living in the Howling Hound's cellar.\n\n    *goto TopicCellarDwelling\n  \n\n  *disable_reuse #Ask him what he knows about dullahans.\n\n    *goto TopicClurichaunDullahan\n\n  *disable_reuse #Ask him about the theft of the dullahan's head.\n\n    *goto TopicTheft\n\n  #I don't want to talk to him anymore.\n\n    *goto CellarExit\n  \n\n*label TopicCellarDwelling\n\nThe clurichaun's ale-gold eyes squint at you with a mixture of disbelief and wry amusement. \"Are ya really asking a clurichaun why he's taken up residence in a cellar? Are ya off yer nut? That's like askin' a born gambler why he likes playin' cards! Just look at all these lovely kegs—and Mr. Whinging Dog, or whatever this place is called, has some of the best stock this side of the Atlantic!\"\n\n*choice\n\n  #Ask the clurichaun to leave the Howling Hound on Eamon's behalf.\n\n    The clurichaun bursts out laughing so hard he nearly topples from his perch and onto your head. You take a few steps sideways, just in case.\n    \n    When he finally catches his breath, he answers you in the plainest of terms. \"Not bloody likely.\" Given that he seems able to appear and disappear on a whim, it's not likely you'll be able to force him to go, either—but at least now you can say you tried.\n\n    *set altruism %+10\n    *goto ClurichaunChoice\n\n  #Change the subject.\n\n    *goto ClurichaunChoice\n\n\n*label TopicClurichaunDullahan\n\nThe clurichaun falls still as stone, his hand frozen halfway through scratching his rather oversize nose. \"Nasty business, dullahans,\" he murmurs, letting his hand fall to his lap. All traces of his drunken slur have vanished, replaced with grim sobriety. \"But then, I don't suppose I'd be any pleasanter if it were me ferrying all those souls to the other side.\n\n\"They're hunters. Ghastly escorts. They track down souls what have overstayed their welcome in this world and hie them off to the next, whether they will or nil. The one here—you've seen him, haven't you?\" The clurichaun's lips quirk up in a ghost of a sly smile. \"You've got that haunted look about you. So you like as not don't need me to tell you just how pleasant-tempered our local dullahan is. Even for his sort, he's a bit touchy.\"\n\nHe raises an eyebrow at you. \n*if gender=\"female\"\n  \"Is that all, lass?\"\n  *goto ClurichaunChoice\n\n*if gender=\"male\"\n  \"Is that all, boyo?\"\n  *goto ClurichaunChoice\n\n*else\n  \"Is that all, then?\"\n  *goto ClurichaunChoice\n\n\n*label TopicTheft\n\nYou ask the clurichaun what sort of creature might possess both the means and motivation to steal something from a dullahan—say, its head—and watch as he grows paler with each syllable.\n\nAt first, he doesn't even answer you; he's too busy muttering what sounds like a string of Gaelic curses under his breath and glancing about as though the dullahan himself might appear at any moment and snatch him from his precarious perch. But at length, he focuses his golden eyes on you and takes a breath.\n\n\"I've no idea what sort of mental gobshite might go about stealing from a dullahan,\" he says, \"but like as not, it's a human. None of the Fae would act so desperately daft.\" He shakes his head. \"But then, I've no idea what sort of human could pull off such a thing.\"\n\nHe scratches his chin with one long, curved, yellowish fingernail. \"Come to think, I've heard whisperings about a witch wandering through town. A tall tale, like as not, but such a one as she's the only sort what might have a slim chance—and only the slimmest, mind you—of outwitting a dullahan.\"\n\n*page_break\n\nYou ask where this witch might be found. The clurichaun smiles, fingering the empty noggin cup now resting on his lap. \"Oh, it's my pleasure to tell you—if you'll do something for me.\"\n\nWhen you ask what he's after, his answer is simpler than you expected.\n\n\"Put in a good word for me with Mr. Innkeeper, will ya? Life would be much easier if he'd stop trying to off me and just set aside a bite and a pint (or two) for me every day. Think of it as fair pay for honest work. In return, I'd be happy to look after the stock. Keep away prying eyes and idle hands, if ya catch my drift.\"\n\nHow will you answer him?\n\n*choice\n\n  #The clurichaun seems harmless enough, and the terms of the deal are more than fair. I'll ask Eamon to let him stay.\n\n    The clurichaun grins and tips his hat to you. \"Grand. Thanks.\"\n\n    *set altruism %+10\n    *goto TopicTheft2\n\n  #Nothing in this life is free. I'll take the deal—I get more out of it, anyway.\n\n    The clurichaun nods, a gleam in his eye. \"Grand.\"\n\n    *set guile %+10\n    *goto TopicTheft2\n\n  #I know better than to bargain with the Fair Folk. Either he tells me what I need to know, or I tell Eamon exactly how to get rid of him.\n\n    The clurichaun's face turns tomato-red in an instant, fury flushing his features and deepening the crags around his mouth and bulging eyes. You get the sense he'd like nothing more than to hop down onto your shoulders and beat you senseless—but something holds him back. Perhaps he realizes just how easily you could have him evicted.\n\n    It takes him several minutes and deep, grounding breaths to calm down enough to say, \"You must be gone in the head to be threatening a clurichaun.\"\n    \n    You hold your ground. Finally, he sighs, gritting his teeth. \"Fine. I'll tell you what you want to know, but only because I don't believe in bludgeoning the intellectually challenged.\"\n\n    *set daring %+10\n    *goto TopicTheft2\n\n\n*label TopicTheft2\n\nOne of his feet begins to tap in an absent, nervous gesture against the shelf, making a hollow sound. \"Afraid I can't tell ya where the so-called witch herself might be, but I can tell ya where she was seen last. I overheard some of the staff gabbing about how they overheard those smugglers upstairs talking about her. Called her a strange customer—they all got chills when they saw her.\"\n\nHe pauses, staring down at you very seriously. \"If a witch it is you're after, you best watch your back. Only a very dark sort of witch, steeped in very dark sorts of magic, would be crafty and cruel enough to cross a dullahan and get away with it.\"\n\nWhat now?\n\n*choice\n\n  #Ask the clurichaun something else.\n\n    *set progress +50\n    *goto ClurichaunChoice\n\n  #I got the information I was looking for. It's time to go.\n\n    *set progress +50\n    *goto CellarExit\n\n*label CellarExit\n\nAre you sure you want to leave?\n\n*choice\n\n  #Yes. I'm done here.\n\n    You thank the clurichaun for his time and he grins. With a wink, he vanishes, and all the lights blow out at once.\n    \n    Feeling your way with methodical care, you make your way back to the door and open it, calling for Saoirse. She arrives in a flash and gasps in spite of herself at the sight of the pitch-black cellar.\n    \n    \"Are you all right?\" she asks, touching your arm gently. You nod, and with a sigh, she closes the door and leads you back upstairs.\n\n    *goto EamonChoices2\n\n  #No, I've changed my mind.\n\n    *goto ClurichaunChoice\n\n\n\n*label EamonChoices2\n\n\"How did it go?\" Eamon asks once Saoirse is gone, his tone as casual as if he is asking about afternoon tea.\n\n*choice\n\n  *if (clurichaun = \"yes\") #Tell Eamon the creature is a clurichaun and a nuisance. Luckily, I know how to get rid of it—for a price.\n\n    Eamon frowns at your news, but as you explain, the clurichaun is obviously bad for business. In the end, apparently deciding he has no better option, he agrees to your terms.\n    \n    He listens to your instructions on banishing clurichauns—some of which you remember from your grandfather's stories, though the rest is nothing more than guesswork based on basic Faerie knowledge. When you finish, he nods and silently hands over the sum he agreed to. The transaction at an end, he returns to his work with seeming indifference to your continued presence.\n\n    *set guile %+20\n    *set altruism %-20\n    *set clurichaun \"no\"\n    *goto InnChoices\n\n *if (clurichaun = \"yes\") #Tell Eamon the creature is a clurichaun and will treat him well if treated well in return.\n\n    Eamon seems slightly unruffled by your announcement but listens without protest. You explain how the clurichaun is, by and large, harmless and will look out for the inventory of the inn in exchange for nothing more than his fair (and comparatively small) share of the basic essentials: food, drink, and a roof under which to take shelter.\n\n    When you are finished, Eamon takes several minutes to answer. When he finally does, it is with a small, secret smile. \"I suppose you, of all of us, would know best what to do. The clurichaun can stay, provided he behaves himself. Thank you for the advice, ${name}.\"\n    \n    Though the smile disappears as quickly as it came, the relief is evident in his face as he turns, taking up another glass to polish.\n\n    *set altruism%+20\n    *set guile %-20\n    *goto InnChoices\n\n #Tell Eamon I didn't find anything after all.\n\n    Eamon squints at you, his disbelief glaringly apparent. After all, you spent quite some time down in the cellar only to come back empty-handed. \"Shame,\" he murmurs, turning back to his work without another word.\n\n    *set altruism %-10\n    *set daring %-10\n    *goto InnChoices\n\n #Tell Eamon it was a ghost and explain how to get rid of ghosts.\n\n    *goto GhostStory\n\n*label GhostStory\n\n*if clurichaun=\"yes\"\n\n  You don't want to rile the clurichaun by outing him, but you don't want to appear incompetent either. As some of the staff already think the presence in the cellar is a ghost, convincing Eamon to believe your tall tale is not difficult—though he does look a bit surprised. \"It seems odd that a ghost would only have made itself known recently,\" he observes.\n\n  You hastily explain that the ghost may have lain dormant for many years until something on the premises disturbed it.\n  \n  \"Well, there was a small kitchen fire not long before the staff started complaining,\" he admits.\n  \n  You nod, explaining that perhaps the fire evoked bad memories from the ghost's life—or death. Though he still seems somewhat skeptical, Eamon finally agrees that you must be right.\n  \n  You explain the basics of exorcising ghosts and cleansing haunted properties, and when you are finished, he thanks you for your advice. Then, frowning slightly as if he has a bad taste in his mouth, Eamon returns to his work.\n\n  *set altruism %-20\n  *set guile %+10\n  *goto InnChoices\n\n*else\n\n  You don't know what the thing in the cellar is, but you don't want to admit you don't know, either—and a ghost is as good a guess as any (even if your instincts tell you it's probably wrong). At least some of the staff already think there's a ghost, so it's isn't difficult to convince Eamon to believe in your tall tale—though he does look a bit surprised.\"It seems odd that a ghost would only have made itself known recently,\" he observes.\n\n  You hastily explain that the ghost may have lain dormant for many years until something on the premises disturbed it.\n  \n  \"Well, there was a small kitchen fire not long before the staff started complaining,\" he admits.\n  \n  You nod, explaining that perhaps the fire evoked bad memories from the ghost's life—or death. Though he still seems somewhat skeptical, Eamon finally agrees that you must be right.\n  \n  You explain the basics of exorcising ghosts and cleansing haunted properties, and when you are finished, he thanks you for your advice. Then, frowning slightly as if he has a bad taste in his mouth, Eamon returns to his work.\n\n  *set altruism %-10\n  *set guile %+10\n  *goto InnChoices\n\n\n*label ClurichaunFail\n\nYou wait. And wait. And wait. For a long time, nothing happens. You stare as hard as you can into the dark corners of the cellar, peeking into the shadows and between the shelves and behind the barrels…but to no avail. Your Sight simply isn't strong enough, or perhaps the thing in the cellar simply doesn't appreciate your company.\n\nSomewhere, the thing giggles. You jump as a sharp gust of air whistles past your ear, as if someone were blowing into it.\n\nUnnerved, you turn to open the door and find it locked. All at once, the lights go out and you are plunged into pure darkness. An invisible hand tugs at your hair, but when your hand jerks up to brush it off, nothing is there.\n\nIn a loud voice, you call for Saoirse. Just before she reaches the door, you hear the lock click open again, and the door swings wide without resistance.\n\nSeeing the look on your face, her eyes widen as she draws you out of the darkness and into the warm glow of the candle she holds. She shuts the door quickly behind you.\n\n\"Are you all right?\" she asks. You nod. She offers you a sweet, knowing smile as if to say, It's all right. We've all been there.\n\nShe leads you back to Eamon without another word.\n\n*page_break\n*goto EamonChoices2\n\n\n*label SmugglerConvo\n\nYou walk over to the men at the table. You smell them long before you reach them; they reek of sweat, cheap ale, and mixed spices. Drawing closer, you can see the dried salt rimming the edges of their Monmouth caps and tricorne hats, their coats and faces worn and weathered from long years spent navigating treacherous waters.\n\nEngrossed in their game and their drinks, they don't appear to give your presence a second thought until you clear your throat several times. The blond man nearest you on the right—the youngest of the bunch, judging by the peach fuzz lining his jaw and the lack of wrinkles or sun spots on his face—finally glances up. Only then do you realize one of his eyes is the pale, cloudy blue of blindness.\n\n*if gender=\"female\"\n\n  \"What is it, lass? Come to bring us another round?\"\n  \n  You shake your head and explain that you don't work here—you're just looking for information. Specifically, you want to know if they've noticed any strange happenings since arriving in town.\n  \n  The young man shrugs. \"That depends on what it's worth to ye.\" He winks.\n\n  *goto SmugglerChoice\n\n*else\n\n  \"What, are you come to toss us out? We ain't been botherin' no one.\"\n  \n  You shake your head and explain that you don't work here—you're just looking for information. Specifically, you want to know if they've noticed any strange happenings since arriving in town.\n  \n  The young man shrugs. \"That depends on what it's worth to ye.\" He winks.\n\n  *goto SmugglerChoice\n\n\n*label SmugglerChoice\n\nWhat now?\n\n*choice\n\n  #Keep trying. Perhaps eventually they'll give in out of pure annoyance.\n\n    You tell the man again that you're just looking for some information, nothing too precious, but he's not interested in your chatter. He and his shipmates return to their cards and their ale and ignore you.\n\n    *goto SmugglerChoice\n\n  #Buy them a round of drinks. In vino veritas, as the saying goes.\n\n    *set smugglerdrinks \"yes\"\n    *goto SmugglerConvo2\n\n  #Give up. Surely I can find a source of information around here more reliable than a bunch of drunken sailors.\n\n    *goto InnChoices\n\n\n*label SmugglerConvo2\n\nYou head over to the bar and hand over a sizable chunk of your funds, announcing to Eamon (just loud enough so the men at the table can hear) that you'll be buying drinks for the whole crew. They cheer and toast you with the drinks the barmaid serves them upon your return to the table.\n\n\"Knew I liked the look of ye,\" says the young man with a grin. He motions you into the empty chair next to him. \"Name's Sean. And you are?\"\n\nYou tell him your name.\n\n\"Now then, ${name}, what was it ye were looking to find out?\"\n\nYou explain again the nature of your search. The men share a knowing look; something is definitely afoot, but they don't seem overly willing to discuss it.\n\nEven Sean, despite his apparent approval of you, seems hesitant to speak up, though he's hiding his discomfort behind bluster and a big smile. \"Well now, I s'pose we've seen our share of oddities. Why, some of the men even claimed they saw mermaids not a fortnight ago. But here? In town?\" He shrugs. \"We've spent most of our free time here in the Hound. Still,\" he adds, a twinkle in his good eye, \"maybe if you stick around for a game or two, something might come to mind.\"\n\n*choice\n\n  #No thanks. I'm not looking to gamble, just to get some answers.\n\n    Sean makes a face, and a few of the other sailors grumble. \"Like a dog with a bone,\" he mutters. \"We've seen some things, all right. In fact, just the other day—\" The sailor next to him, an older man with a face like a grizzly bear, grunts and nudges Sean sharply in the side.\n\n    Sean winces and falls silent. \"Well, there's no tellin' anyhow, is there? It was probably nothing. Usually is. Anyway, afraid I can't help you out. But good luck with your search. And thanks again for the drinks.\"\n    \n    If there were any chance of gleaning information from this particular group to begin with, it's clear you've managed to lose it. With nothing left to say, you rise and leave the table, considering your options.\n\n    *set daring %-10\n    *page_break\n    *goto InnChoices\n\n  #Why not? I might lose some money, but I might get some invaluable information in the process.\n\n    *set daring %+10\n    *goto CardGame\n\n\n*label CardGame\n\nSean's grin stretches from ear to ear. \"Fantastic.\"\n\nThe men finish their current game; the older man sitting next to Sean wins the round. While most of the men seem unamused, Sean only laughs good-naturedly and begins to deal out fresh cards.\n\nIt occurs to you that you've a choice to make here. Sure, you might be able to win this game on skill alone—if no one else at the table is cheating, which in this case seems like rather a big \"if\"—but perhaps, if you're very clever, you might be able to cheat your way to victory. Or you could always play blind and rely on Lady Luck to save your arse.\n\nSean finishes dealing the cards, and the others take up their hands to inspect them. Better make up your mind fast.\n\n*goto CardGameChoice\n\n\n*label CardGameChoice\n\n*choice\n\n  #Trust my skill.\n\n    *if guile >= 60\n      *goto GameWin\n\n    *else\n      *goto GameLose\n\n  #Trust my luck.\n\n    *if luck > 1\n      *set luck -2\n      *goto GameWin\n\n    *else\n      *set luck -1\n      *goto GameLose\n\n  #Trust nothing. Cheat.\n\n    *if guile >= 75\n      *set guile %+20\n      *set daring %+20\n      *set altruism %-20\n      *goto GameWin\n\n    *else\n      *set daring %+10\n      *set altruism %-20\n      *goto GameCaught\n      \n\n*label GameWin\n\nCards exchange hands. Bets are placed. The grizzly man, as you've come to think of him, in particular keeps a close eye on you. Apparently he expected you to cheat. But when you lay down a full house of kings and jacks at the end of the round, he merely raises an eyebrow, shrugs, and lays down his own hand—a whole lot of nothing.\n\n*if redux = \"yes\"\n\n  As the others put their cards on the table, a grumble goes around the group.\n  \n  Sean chuckles and lays down his own hand: a full house of nines and tens that would have won him the game if not for you. \"Looks like your luck's changed. I don't s'pose you'd play another round, now that you've got the coin for it?\"\n\n  You decline and remind him of the stakes you played for.\n\n  *page_break\n  *goto GameWin2\n\n*else\n\n  As the others put their cards on the table, a grumble goes around the group.\n  \n  Sean chuckles. \"Beginner's luck is a hell of a thing,\" he remarks, his tone cheery despite his own hand: a full house of nines and tens that would have won him the game if not for you. \"I don't s'pose you'd play best o'three?\"\n\n  You decline and remind him of the stakes you played for.\n\n  *page_break\n  *goto GameWin2\n\n*label GameWin2\n\n\"Aye, I s'pose you've earned your information,\" Sean says. \"I'll give ye what I can.\"\n\nHe leans in close, both his good green eye and blind blue one somehow managing to find yours. \"Old Aldric here won't let me say much, but I'll say this. We get a lot of queer customers in our line of work. But this one lady, soon as she stepped on board something went funny—all the men felt it. Dunno what it was about her, but we didn't like it.\n\n\"She wouldn't tell us what she wanted, kept insisting she'd only speak to the captain. Well, they talked, and when she left, he said she jus' wanted to do business, same as the rest, and to leave it at that.\"\n\nYou ask if he knows what she bought.\n\nHe shakes his head. \"'Fraid not.\"\n\nThen you ask if he at least got a good look at her. He shrugs.\n\n\"Not exactly. She was wearing a cloak and kept her hood up. But it seems to me she had eyes like the sky before a storm—cold, blue, and dangerous.\"\n\nHe shudders. \"Anyhow, there's no telling where she's gone off to. But if anyone knows, it's the captain.\"\n\nYou ask where to find him, and Sean replies, \"Oh, I imagine he's still on the ship. Look for [i]The Expeditious[/i] at the docks—you can't miss her.\"\n\nHe smiles. \n*if gender=\"female\"\n  \"Anything else, love?\"\n  \n  You shake your head no. It's not likely there's anything more he could tell you that would be of use. Thanking him, you collect your winnings (a generous pile of silver and copper) and take your leave. He bids you farewell with a wink before returning to his cards and his ale.\n  *set progress +100\n  *set gamewin \"yes\"\n  *goto InnChoices\n*else\n  \"Anything else?\"\n  \n  You shake your head no. It's not likely there's anything more he could tell you that would be of use. Thanking him, you collect your winnings and take your leave. He offers you a mock-salute and a grin before returning to his cards and his ale.\n  *set progress +100\n  *set gamewin \"yes\"\n  *goto InnChoices\n\n\n*label GameLose\n\n*if redux = \"yes\"\n\n  The cards are dealt, passed, drawn. They place their bets, and you place yours, hopes high and fingers mentally crossed.\n  \n  Unfortunately, this hand serves you no better than the last.\n  \n  \"Ouf.\" Sean winces sympathetically as you lay down your cards: a whole bunch of nothing.\n  \n  A man across the table with half an ear missing cries out shrilly when he realizes he's won with nothing but a three of a kind. He begins raking in the coins with drunken glee.\n  \n  \"Looks like this just isn't your night,\" says Sean as you take your leave. \"Best of luck to ye in life, if not in cards!\"\n\n  *goto InnChoices\n\n*else\n\n  *goto FirstGameLose\n\n\n*label FirstGameLose\n\nCards exchange hands. Bets are placed. The grizzly man (as you've come to think of him) in particular keeps a close eye on you. Apparently he expected you to cheat.\n\nYou lay down your hand, and something like a smirk turns up the corner of his mouth as he places his own cards on the table. You're tied—for last place.\n\nWith a triumphant whoop, Sean fans out his cards for all to see. A full house, tens over nines. It's the best hand on the table, and he knows it.\n\n*if gender=\"female\"\n  \"Sorry, lass,\" he says, \"looks like Lady Luck's run out on you this round. Best two o' three?\"\n  \n  It's a tempting offer, but your financial resources are limited at best. You decline and take your leave of the table.\n  *set gamewin \"lost\"\n  *goto InnChoices\n\n*if gender = \"male\"\n  \"Sorry, boyo,\" he says, \"looks like fickle Lady Luck's left you high and dry this round. Best two o' three?\"\n  \n  It's a tempting offer, but your financial resources are limited at best. You decline and take your leave of the table.\n  *set gamewin \"lost\"\n  *goto InnChoices\n\n*else\n  \"Sorry, friend,\" he says, \"looks like Lady Luck was looking the other way this round. Best two o' three?\"\n  \n  It's a tempting offer, but your financial resources are limited at best. You decline and take your leave of the table.\n  *set gamewin \"lost\"\n  *goto InnChoices\n\n\n*label GameCaught\n\nCards exchange hands. Bets are placed. The grizzly man (as you've come to think of him) in particular keeps a close eye on you. Apparently he expected you to cheat. You wait until he seems preoccupied with surveying his own cards, then start to bend the corner of the king of spades that just found its way into your hand.\n\nWithout missing a beat, the grizzly man reaches over and slaps the cards out of your hand.\n\nSean gapes. \"Aldric, what in the—\"\n\n\"Cheatin',\" the grizzly man grunts. \"Folding corners.\"\n\nThe others glare at you with palpable dislike. You know you should protest, but you don't dare lie to their faces—especially the grizzly man's.\n\nSean leans over and inspects your cards. You can tell the exact instant he finds the crease from the way his brow furrows. When he speaks, he doesn't look at you.\n\n*if gender = \"female\"\n  \"You're lucky, lass,\" he mutters. \"Not lucky enough to not get caught—but lucky enough to catch us in a good mood. Any other day, and you'd be paying for that little trick with more than a round of drinks.\"\n  \n  One of the men begins to argue, but the grizzly man cuts him off with a dark look. Sean shakes his head.\n  \n  \"Get going,\" says Sean, \"before we change our minds.\"\n  \n  Sensing an apology would only make things worse, you get up and leave without further ado.\n  *set gamewin \"cheat\"\n  *goto InnChoices\n\n*else\n  \"You might not be lucky enough to cheat us and get away with it,\" he mutters, \"but you're lucky enough to catch us in a good mood. Any other day, we'd beat you senseless and leave you lying empty-pocketed on the street.\"\n  \n  One of the men starts to interrupt, but one look from the grizzly man shuts him up fast.\n  \n  \"Now get going,\" says Sean, \"before we change our minds.\"\n  \n  Sensing an apology would only make things worse, you get up and leave without further ado.\n  *set gamewin \"cheat\"\n  *goto InnChoices\n\n*label SmugglerConvoRedux\n\n*if smugglerdrinks = \"yes\"\n\n  \"Change your mind?\" Sean grins when you sit down. The others eye you, some with a gleam of greed in their eyes, others with blank curiosity. The grizzly man frowns at you but says nothing.\n\n  You nod and tell him you're up for one more round of cards—if he is.\n  \n  Sean laughs as one of his fellows shuffles and begins to deal. \"Well, I don't mind winning the rest of your coin if you don't mind losing it to me,\" he teases.\n\n  What will your strategy be this time?\n\n  *goto CardGameChoice\n\n*else\n\n  *goto SmugglerConvo2\n\n\n*label SmugglerGameRedux\n\n\"Back for another try, eh?\" Sean beams at you as you reclaim your seat beside him.\n\nWhen you explain that you're in it to win, double or nothing, he crows. \"That's the spirit!\"\n\nWhat will your strategy be this time?\n\n*choice\n\n  #Trust my skill.\n\n    *if guile >= 60\n      *goto GameWin\n\n    *else\n      *goto GameLose\n\n  #Trust my luck.\n\n    *if luck > 1\n      *set luck -2\n      *goto GameWin\n\n    *else\n      *set luck -1\n      *goto GameLose\n\n  #Trust nothing. Cheat.\n\n    *if guile >= 75\n      *set guile %+20\n      *set daring %+20\n      *set altruism %-20\n      *goto GameWin\n\n    *else\n      *set daring %+10\n      *set altruism %-20\n      *goto GameCaught\n\n\n*label LeaveInn\n\nAre you sure you're ready to leave? You never know what strange secrets may yet be lurking in the dark corners of the Howling Hound.\n\n*choice\n\n  #Actually, I think I will stick around a bit longer.\n\n    *goto InnChoices\n\n  #Yes, I'm sure. It's time to move on.\n\n    *goto checkpoint_save\n\n\n*label checkpoint_save\n\n*page_break End of Chapter\n*set save_load true\n*set return_to_scene \"docks\"\n*goto_scene savegame", "witch-hunt": "*temp protection \"none\"\n*temp witchpower 0\n*temp lightsource \"lantern\"\n*temp witchvision \"no\"\n*temp witchinghour \"no\"\n*temp sorcha \"alive\"\n*temp sanctumflee \"no\"\n*temp SorchaTime 2\n\n*temp witchsister \"no\"\n*temp deathvision \"no\"\n*temp witchattackfail \"no\"\n\n[b]Chapter VI: Head Hunt[/b]\n\n*if (redmenbargain = \"yes\")\n  You wake up hacking and coughing, choking on the all-too-real stench of things from your nightmares. From what scraps you can recall, you believe you were dreaming of hot coals and burnt flesh and familiar voices whispering, \"Your turn, your turn, ${name}.\"\n  *goto WHIntroChoice\n\n*else\n  You wake from another nightmare about the dullahan. You'd grown almost used to them, but this one felt even more vivid than the ones that came before; your skin still stings where you dreamt his terrible bone whip lashed flesh from bone.\n  *goto WHIntroChoice\n\n\n*label WHIntroChoice\n\nBut there is no time to wallow in worry or self-pity. You rise, and after dressing and a quick breakfast, you begin your main task for the day: gathering supplies for your witch hunt.\n\nYour tight purse limits your options somewhat, so you begin by looking around your house for possible means of protection.\n\n*if (job = \"herbalist\")\n  *goto HerbalistChoice\n\n*if (job = \"lamplighter\")\n  *goto LamplighterChoice\n\n*if (job = \"teacher\")\n  *goto SchoolteacherChoice\n\n*else\n  *goto HerbalistChoice\n\n\n*label HerbalistChoice\n\nAs an herbalist, you don't exactly have an arsenal of weaponry at your disposal. However, you do manage to scrounge up a few options.\n\nIn the kitchen, you find your steel paring knife, small but cruelly sharp and easily hidden. Amongst your garden tools, you come across your weed hook, iron-tipped and mounted on an ash shaft. \n*if (weapon = \"highwayknife\")\n  There's also the rusty knife you found on the highwayman's body at the crossroads.\n\nWhich of these will you take with you on your hunt?\n\n*choice\n\n  #I will take the paring knife.\n\n    Steel isn't as good as iron against the supernatural, but it could still get the job done in a pinch. You slip the little knife into your boot.\n    *set weapon \"knife\"\n    *goto StudyChoice\n\n  #I will take the weed hook.\n\n    Iron is more effective than steel against the supernatural, and wood from an ash tree is also said to possess protective powers. However, you can't conceal the weed hook's curved blade in your boot; instead, you fashion a makeshift frog for it out of rope and attach it to your belt.\n    *set weapon \"weed hook\"\n    *goto StudyChoice\n\n  *if (weapon = \"highwayknife\") #I will take the highwayman's knife.\n\n    The highwayman's knife may be rusty and a bit dull, but at least this way, your tools of the trade will stay clean. You sharpen it as best you can before sliding it into your boot.\n    *set weapon \"knife\"\n    *goto StudyChoice\n\n\n*label LamplighterChoice\n\nAs a lamplighter, you've dealt with your share of odd and dangerous types, but nothing quite like a real, live witch. You'll need a bit more than luck and bare knuckles if your hunt ends in a fight.\n\nThe long pole you use to kindle and douse streetlights doesn't have any sharp edges, but it is made of iron. It might be enough to at least keep her at arm's length—and who knows when the wick might come in handy. Or you could take the cast iron poker sitting by the fireplace. \n*if (weapon = \"highwayknife\")\n  There's also the rusty knife you found on the highwayman's body at the crossroads.\n\nWhich of these will you take with you on your hunt?\n\n*choice\n\n  #I will take the lamplighter's pole.\n\n    At about three feet long, the iron pole could serve to keep an enemy at arm's length—particularly if iron is as painful to witches as folklore suggests. It's heavy enough to make it a decent blunt weapon as well, though it's doubtful whether you'll be wanting (or even able) to beat the witch bloody. And if you happen to need a light, you've got a wick handy.\n    \n    You set the pole on the table; you'll have to carry it with you in one hand when you embark on your journey tonight.\n    *set weapon \"light pole\"\n    *goto StudyChoice\n\n  #I will take the fireplace poker.\n\n    The poker's pointy end is sharp enough to serve its purpose as a makeshift weapon, and the iron from which it is wrought is said to be poison to magical creatures.\n    \n    It's also heavy and a bit awkward, and you run the risk of stabbing yourself in the leg if you merely hang it from your belt. So you place it on the table, making a mental note to grab it on your way out the door later tonight.\n    *set weapon \"poker\"\n    *goto StudyChoice\n\n  *if (weapon = \"highwayknife\") #I will take the highwayman's knife.\n\n    The highwayman's knife may be rusty and a bit dull, but at least this way, your tools of the trade will stay clean. You sharpen it as best you can before sliding it into your boot.\n    *set weapon \"knife\"\n    *goto StudyChoice\n\n\n*label SchoolteacherChoice\n\nSchoolteachers aren't known for their combat expertise, but you know you must be prepared for an attack nonetheless. Your witch isn't likely to give back the stolen goods without a fight, and so you scour your home for whatever makeshift protection you can find.\n\nIn the end, your options are meager—but at least you do have options. There's the birchwood cane the school gave you for administering corporal punishment, or you could grab a knife from the kitchen. Then there's your umbrella, though it's unclear how much good it would do you. \n*if (weapon = \"highwayknife\")\n  There's also the rusty knife you found on the highwayman's body at the crossroads.\n\nWhich of these will you take with you on your hunt?\n\n*choice\n\n  #I will take the cane.\n\n    Birchwood is said by some to protect against witchcraft, and the cane is light and easy to carry with you. It's not a very deadly weapon, but it could serve as a brief distraction, at the very least.\n    *set weapon \"cane\"\n    *goto StudyChoice\n\n  #I will take the kitchen knife.\n\n    You are not of noble birth, but for once, this fact comes in handy—your cutlery is wrought of iron rather than silver. Iron is said to be poison to magical creatures, whether they be Fae or mortal. You slip the kitchen knife into your boot.\n    *set weapon \"knife\"\n    *goto StudyChoice\n\n  #I will take the umbrella.\n\n    Are you expecting it to rain? An umbrella is a strange choice of weapon, to be sure, though it may prove useful to you yet. One should always endeavor to expect the unexpected—or so the saying goes.\n    *set weapon \"umbrella\"\n    *goto StudyChoice\n\n  *if (weapon = \"highwayknife\") #I will take the highwayman's knife.\n\n    The highwayman's knife may be rusty and a bit dull, but at least this way, your tools of the trade will stay clean. You sharpen it as best you can before sliding it into your boot.\n    *set weapon \"knife\"\n    *goto StudyChoice\n\n\n*label StudyChoice\n\nYou've got hours yet to endure before moonrise. Perhaps the best course of action would be to do some research in your grandfather's study to see what other preparations might benefit you tonight. You could also visit with your grandmother—after all, this may well be your last day on this good earth—or find some activity to keep your mind off things until nightfall.\n\n*choice\n\n  #I will check my grandfather's notes for more information about witches.\n    *goto WitchStudy\n\n  #I will visit my grandmother.\n    Your grandmother's calm, loving presence helps soothe your nerves for a time, and you spend a peaceful day enjoying her cooking and her company.\n    \n    When you bid her farewell, it is with a heavy heart and thoughts filled with terror and sorrow. On your way home, you can't help but wonder if you'll see her again in this life.\n    *set altruism %+ 20\n    *goto StartHunt\n\n  #I will find something to distract myself with.\n    *goto Distraction\n\n\n*label Distraction\n\n*if (job = \"lamplighter\")\n\n  You go for a long walk, tracing the old, familiar paths of your profession down the main road and trailing your fingers absently along the lampposts as you pass them. Your mind wanders over the countless faces you've passed in the streets: some strangers, some coworkers, some you might even call friend.\n  \n  You know these roads as well as you know yourself, perhaps better. If you die, will you walk these paths in death as you have in life?\n\n  *goto StartHunt\n\n*if (job = \"herbalist\")\n\n  You while away the hours in your garden, tending to your flowers and herbs and extracting the weeds creeping in to encroach on their territory.\n  \n  The smell of green leaves in the bright sun and the crunch of dirt between your fingertips has always been a comfort to you in the past, but today, it only reminds you that you may yet become food for the worms.\n\n  *goto StartHunt\n\n*else\n\n  You turn to your books for solace, hoping the magic of the printed word may save you—if only for a time—from a day spent in terror and misery.\n  \n  It works for awhile. But as the day wanes and the shadows grow long outside your window, the words begin to blur and your concentration falters, flickering like a dying flame. Your mind begins to wander off mid-sentence, and you spend the rest of the afternoon plagued with fevered thoughts of dullahans, witches, and death.\n\n  *goto StartHunt\n\n\n*label WitchStudy\n\nYou hasten over to your grandparents' house, bidding your grandmother only a brief hello and how are you before making a beeline for Grandfather's study. There you find stacks upon stacks of notes about witches and witchcraft, but much of what you find is conflicting and unconfirmed. Some sources accuse witches of congress with demons or even the Devil himself, while others claim the craft is rooted in healing and natural wisdom.\n\nSome reports refer to familiars, the animal companions of witches, while others describe witches who can transform themselves into beastly forms. Still others link their magic and knowledge to the Fair Folk, and several of these describe Faerie doctors whose Fair Folk knowledge has saved many a mortal life.\n\n*page_break\n\nYou also find quite a bit of information on how to protect oneself against dark witchcraft and the Evil Eye. The list of talismans and rituals seems to go on forever, but after some hard work, you narrow your options down to the most commonly referenced items that you have at your disposal.\n\nThough a bit malodorous, carrying a handful of garlic cloves in your pocket may offer you some defense against a witch's wiles. Cat's eye could also do the trick; you know your grandmother has a ring with a cat's eye stone which you might borrow.\n\nShamrocks, of course, are said to be the best protection of all, capable of repelling any spell. \n*if (shamrock = \"yes\")\n  Your own lucky shamrock happens to be sitting in a locked drawer in your desk at home.\n  *goto WitchStudyChoice\n*else\n  If only you had one now. Your grandfather may be hiding one or two somewhere in his study, but the day has grown old, and your time is short—you've no chance of finding it now.\n  *goto WitchStudyChoice\n\n\n*label WitchStudyChoice\n\nWhat will you take with you?\n\n*choice\n\n  #I will take some garlic from the kitchen.\n\n    On the bright side, even if the garlic doesn't actually ward off witchcraft, the witch herself might at least be repulsed by the smell.\n    \n    You stuff a few cloves into your pockets and head home, bidding Grandmother a quick farewell lest she catch a whiff of your strange new perfume.\n    *set protection \"garlic\"\n    *set witchpower -50\n    *goto StartHunt\n\n  #I will borrow my grandmother's ring.\n\n    Your grandmother is clearly confused as to why you suddenly need her ring, but after you promise profusely to bring it back soon, she gives you permission to take it. Though it does not fit on your finger, you are able to hang it on a thick thread and wear it around your neck. This should be good enough—or so you hope.\n    \n    You thank your grandmother and, bidding her a bittersweet farewell, head home.\n    *set protection \"catseye\"\n    *set witchpower -50\n    *goto StartHunt\n\n  *if (shamrock = \"yes\") #I will take my shamrock.\n\n    You bid your grandmother a brief farewell, praying it won't be the last, and head home on swift feet.\n    \n    Irrational though it may be, you find yourself worrying that the shamrock won't be there when you look. But when your shaking hands turn the key in the lock and open the drawer, there's the envelope, just as you left it. You open it, just to be sure, and breathe a sigh of relief. The shamrock is there and intact.\n    \n    You fold it and slide it gently into a secure pocket.\n    *set luck +1\n    *set protection \"shamrock\"\n    *set witchpower -100\n    *goto StartHunt\n\n\n*label StartHunt\n\nThe darkling sky outside your windows tells you it won't be long now till your ghastly escort appears. You make yourself dinner, trying not to think of it as your last meal, and do your best to enjoy it. \n\n*if (redmenbargain = \"yes\")\n  *goto RedMenJourney\n\n*else\n  *goto DullahanJourney\n\n\n*label RedMenJourney\n\nA red sunset fades to the black and blue of nightfall. As the waning moon rises, you pace through your house, wondering if you should wait here or at the docks. A sudden rap, rap, rapping at your door startles you so badly you nearly trip over your own feet as you hasten to leave, grabbing your supplies as you go.\n\nWhen you open the door, you find the Red Men waiting patiently on your doorstep. Behind them hovers the dullahan, his stance tense and his arms crossed. \"Your friend don't like us much, I'm afraid,\" chirrups the Red Man with the whiskered face. \"But even he knows better than to interfere with a proper bargain!\"\n\n\"Are you ready to meet your witch, ${name}?\" asks the tall one.\n\nThere is, of course, only one right answer. When you nod a silent yes, his lips stretch out in a smile that curdles the marrow in your bones. Stepping back, he crooks one misshapen finger and beckons you to follow.\n\n*page_break\n\nYou pass no one on the road. Your journey through the forest is long and strangely silent save for the occasional whispering of the three Red Men and the crunching of leaves beneath your boots as you tramp through the dense foliage.\n\nYou haven't felt anything yet to suggest the presence of a witch or the Fair Folk—present company excluded—and you've no idea how much farther your destination may be. Perhaps you should strike up a conversation to pass the time?\n*goto RMJourneyChoice\n\n*label RMJourneyChoice\n\n*choice\n\n  *disable_reuse #Ask the Red Men how much longer it will take to get to the witch.\n\n    \"Not much longer now,\" replies the tall one, \"although, I sssupossse time isss relative.\"\n\n    \"Got to get there afore the witchin' hour, after all,\" chirrups the whiskered one.\n\n    *goto RMJourneyChoice\n\n  *disable_reuse #Ask them why they were so insistent on making a deal with me.\n\n    The tall one glances back at you, dark amusement glimmering in his beady eyes. \"A good sssupper isss worth a long walk. We can barely remember the lassst time we had fresssh meat.\"\n\n    *goto RMJourneyChoice\n\n  *disable_reuse #Ask them how they knew where I live.\n\n    \"Asss I informed you yesssterday,\" the tall one says, \"we are good at finding lossst thingsss.\" He smirks, and the other two share a chuckle that grates on your nerves.\n\n    *goto RMJourneyChoice\n\n  *disable_reuse #Ask them what they know about the witch.\n\n    \"Which witch?\" asks the whiskered one, and he cackles at his own pathetic joke. The other two ignore him.\n    \n    You specify, with waning patience, that you are asking about the witch you're hunting for.\n\n    \"Not our story to tell,\" whispers the thin one, speaking for the first time. Apparently this answer suffices for the three of them, as not one bothers to elaborate.\n\n    *goto RMJourneyChoice\n\n  *disable_reuse #Ask the dullahan about the witch.\n\n    Though you're not sure you want him to answer, as his only available method of communication is not exactly pleasant, you try to ask the dullahan more about your quarry.\n    \n    He doesn't bother to answer, or even acknowledge, your question. You get the feeling he's less than pleased about your bargain with the Red Men.\n\n    *goto RMJourneyChoice\n\n  #Conversation is overrated. Silence is golden.\n\n    *goto RedMenJourney2\n\n\n*label RedMenJourney2\n\n*set witchpower +50\n\nYour journey drags on for nearly a full hour more before you sense that something has changed. Something in the way the air tastes on your tongue, or perhaps the chill breeze that snakes through the trees, has your skin breaking out in a rash of gooseflesh. The dullahan seems to feel it too, his torso turning right and left as if he is trying to discern the exact origin of the phenomenon.\n\n\"Thisss isss where we leave you,\" hisses the tall Red Man, the three of them coming to such an abrupt halt that you nearly stumble into the whiskered one.\n\nYou look around, expecting to see a cabin or even the crumbling remains of some ruined castle—or at the very least, a ramshackle shack—but you see and hear nothing unusual. Only the shivers tickling your spine tell you that something here is awry.\n\nThe tall one nods up at the pale moon, which you can just make out between the crisscrossing branches above. \"It isss not yet the witching hour,\" he murmurs. \"You may have a chance yet.\" He bares his teeth at you in a gruesome grin. \"Good luck, ${name}.\"\n\nThe other two snicker and follow him into the dark of the forest. It seems you and the dullahan are on your own now.\n\n*page_break\n*goto DoorFind\n\n\n*label DullahanJourney\n\nYou wait until the last blood-red shadows of the sunset have faded to full dark before gathering your equipment and stepping out into the night. Though you've no way to know for sure, there's one place that you're most likely to find the dullahan.\n\nWhen you arrive at the crossroads, you don't see him at first. After you wait a few moments, however, a familiar silence descends on the scene. You can just make out his form standing at the edge of the light emanating from your ${lightsource}.\n\nHis body tips forward in what seems like an attempt at a nod, and he turns and heads back toward the forest. You follow him without a word.\n\n*page_break\n*if (faeriesight > 75)\n  *goto DullahanJourney2a\n*if (faeriesight \u003c= 75)\n  *goto DullahanJourney2b\n\n\n*label DullahanJourney2a\n*set witchpower +50\n\nThough you've no means of knowing the way, when you still yourself for long enough to focus on your sixth sense, you find yourself drawn in a certain direction through the woods. There's something powerful out there, something dangerous—something besides the dullahan, that is. Yet despite its strength, you can only barely sense it.\n\nIs it that far away? Or is it trying to hide? There's only one way to find out. You keep walking.\n\nThe moon climbs higher and higher in the sky as the hours pass. Keeping your senses on high alert is draining; after awhile, you learn to tune into them only now and then to check that you're still on the right path.\n\nIn between these moments, you begin to long for some better way to pass the time. Your companion isn't exactly an expert conversationalist, but perhaps a few questions couldn't hurt?\n\n*goto DullahanJourneyChoice\n\n\n*label DullahanJourney2b\n*set witchpower +100\n\nYou have no idea if you're walking in the right direction or if you're even in the right forest. Perhaps the witch has moved on—perhaps she is on the run. Or perhaps you've made a grave mistake and are hunting the wrong suspect.\n\nDoubts like bats flit about the recesses of your mind, and it's all you can do to push them aside and focus on the task at hand. You focus on your Sight, praying you can sense witchcraft the same way you sense Faerie magic, and wait for some sign that you're on the right track.\n\nThe hours trudge by, seeming to stretch longer as the night drags on without so much as a glimmer of hope. You need something to distract yourself from the fears piling up in the back of your mind. Dare you try a conversation with the dullahan?\n\n*goto DullahanJourneyChoice\n\n\n*label DullahanJourneyChoice\n\n*choice\n\n  *disable_reuse #Ask the dullahan about the vision of the witch.\n\n    *goto DWitchVision\n\n  *disable_reuse #Ask him where he came from.\n\n    The dullahan's steps slow as he seems to consider the question. At length, he shrugs and motions for you to pick up the pace. Perhaps he doesn't remember?\n\n    *goto DullahanJourneyChoice\n\n  *disable_reuse #Ask him where the souls he takes end up.\n\n    The dullahan, unable to shake the head he does not have, makes an abrupt, negative gesture with his hand. Whether it's because he doesn't know or because you're not allowed to know, it doesn't look as if he's going to answer your question.\n\n    *goto DullahanJourneyChoice\n\n  #Continue my journey in silence.\n\n    You keep walking without a word, managing to find a modicum of solace in repeating old nursery rhymes to yourself as you tramp onward.\n\n    *goto DullahanJourney3\n\n\n*label DWitchVision\n\nThe dullahan pauses. At length, he extends a hand to you. He seems to be offering you another glimpse of the fragmented vision you witnessed yesterday.\n\nWill you take him up on his offer?\n\n*choice\n\n  #Politely decline.\n\n    You shake your head and offer the most respectful refusal you can muster up. The dullahan, seeming annoyed now, drops his hand and starts walking again.\n\n    *goto DullahanJourneyChoice\n\n  #Take the dullahan's hand.\n\n    The moment you touch him, your eyes cloud over with the same otherworldly visions as before—only this time, instead of a flood of images, you're watching one continuous scene.\n    \n    The first thing you see is the witch, once again weeping and kneeling in mud, clinging to a limp wolf with thick black fur. An arrow shaft protrudes from its neck, and blood oozes from the wound.\n    \n    Standing opposite the pair is a male figure whom you did not notice the first time. He is garbed in a plain black tunic and cowl, and his face goes white as he watches you approach.\n\n    As you draw nearer, the witch turns. Spotting you—that is, the dullahan—she screams. \"No—you can't! No!\"\n    \n    She turns back to the man. \"Sir, you must hurry! You cannot let it take her!\"\n\n    The man hesitates, his entire frame trembling with violent fits of terror. Finally he shakes his head. \"No.\"\n\n    You feel your mouth—the dullahan's mouth—open with a nauseating chorus of grinding bones and the squelch of rotting sinews. In a voice like wind and water and dead things crunching under heavy boots, it whispers, \"Sorcha Morgan.\"\n    \n    The witch screams and throws up a hand as if to shield herself—\n\n    You blink, and the vision is gone. The dullahan has released your hand, and his own shivers slightly as he slowly flexes it. It's difficult to say whether the effort of granting you your vision took a toll on him, or if he simply decided enough was enough.\n    \n    At length, he drops his hand. He continues on as if nothing has happened, leaving you to scramble after him before he leaves you behind.\n\n    *set witchvision \"yes\"\n    *page_break\n    *goto DullahanJourneyChoice\n\n\n*label DullahanJourney3\n\nFinally, whether by virtue of your Sight or some outrageous stroke of luck, you stumble across the power you're looking for. Without knowing how, you know this is the place you sought. And yet nothing about this particular patch of forest seems different from any other dank, dark path through the woods, save for a certain sense of wrongness about the place.\n\nYou glance up at the moon through the gently swaying forest canopy. \n*if (faeriesight > 80)\n  Though it seems ages have passed since you left your house, you doubt the hour is much later than midnight. The strength of your Sight, it seems, has served you well.\n  *page_break\n  *goto DoorFind\n\n*else\n  By your reckoning, dawn is but a few hours away, and you are neck-deep into the witching hour. Perhaps you are not so lucky after all.\n  *page_break\n  *goto DoorFind\n\n\n*label DoorFind\n\nYou and the dullahan pace the forest floor looking for answers, and it is only because you are searching so desperately that you finally find one. You come across a pile of mossy, weathered stones which, at first glance, seem perfectly unremarkable. Yet all your senses are screaming that things are not as they appear, and you can't help but notice how neatly they are piled, as if human hands have placed them here. Is this, perhaps, a grave?\n\n*if (faeriesight > 30)\n  You reach out to pick one up, and it crumbles in your hand…as do the rest. In mere instants, the pile disintegrates into dust. As you brush it aside, you find yourself staring at what appears to be a trap door.\n  *goto DoorFind2\n\n*else\n  You reach out to pick one up. It feels real enough, but something tells you this is not a natural stone. It takes you some time to clear out the entire pile, but when you finally finish your task, you are rewarded with an unexpected discovery: a trap door.\n  *goto DoorFind2\n\n\n*label DoorFind2\n\nThe door looks as old as the oldest trees in the forest, the wood weathered and warped with great age. Yet the iron fittings shine in the starlight, and the gold designs wrapped around the handle and woven through the woodwork look almost brand new.\n\nThe dullahan reaches for the door before drawing his hand back with a furious gesture, sensing the poisonous metals. You lean down and grasp the handle, praying you're not about to trip some deadly magical trap.\n\nThough heavy, the door opens without resistance. You peer down into the darkness below. The light of your ${lightsource} reveals a crude set of stairs carved directly into the earth and paved with haphazard cobblestones.\n\nTaking a deep breath, you begin the descent, and you feel rather than hear the dullahan following close behind you. With each step, you brace yourself for some sort of unseen barrier or alarm, but nothing happens. At the bottom of the stairs, you can just make out the faint flickerings of what looks like candlelight.\n\nWhat are you thinking as you make your descent?\n\n*choice\n\n  #At last, we have come to the final confrontation. I am ready to end this, once and for all.\n\n    *set daring %+20\n    *goto DoorFind3\n\n  #Will the dullahan reward me for my help, I wonder? Perhaps if I get my hands on that golden dagger…\n\n    *set altruism %-20\n    *goto DoorFind3\n\n  #I h
