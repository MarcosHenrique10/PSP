ur\n    *if pets=1\n        *if num_p=1\n            dog,\n        *if num_p>1\n            dogs,\n    *if pets=2\n        *if num_p=1\n            cat,\n        *if num_p>1\n            cats,\n    *if pets=3\n        *if num_p=1\n            pet,\n        *if num_p>1\n            pets,\n    *if pets=4\n        *rand born_g 1 2\n        *if born_g=1\n            daughter,\n        *if born_g=2\n            son,\n    so you don't immediately realize what you're hearing.\n    *line_break\n    Then you remember Achlys.\n    \n    You sit back to think about it. How long has it been since you've heard her voice?\n    *line_break\n    Your gaze shifts from your\n    *if pets=1\n        *if num_p=1\n            dog,\n        *if num_p>1\n            dogs,\n    *if pets=2\n        *if num_p=1\n            cat,\n        *if num_p>1\n            cats,\n    *if pets=3\n        *if num_p=1\n            pet,\n        *if num_p>1\n            pets,\n    *if pets=4\n        *if born_g=1\n            daughter,\n        *if born_g=2\n            son,\n    to @{fsex Nikolaj|Nika} busy preparing dinner, to your hands.\n    \n    You would have once spent an evening like this, damp and wintry, curled up in bed crying. You would have tried to hide your invisible pain one day after another, not knowing what else to do. When did it change? How far have you come since you were like that person on TV?\n    \n    You cast a glance at the calendar. It's Thursday, but you haven't had therapy today. In fact, you've been having sessions once every two weeks for a while now.\n    \n    You feel better, you [i]are[/i] better.\n    *line_break\n    @{fsex Nikolaj|Nika} turns to look at you, still holding a pan, and smiles at you for no reason. The love in ${friend_his} eyes moves you. You smile back.\n    \n    Yes, life can be merry sometimes.\n    *line_break\n    And you can't help but feel grateful for it.\n    *goto_scene theend", "friday": "*text_image friday.png center Friday\n\nIt's starting to get cold.\n\nYou open your eyes, confused by the dim light. It's a gloomy, cloudy day, and it could be four in the morning as much as noon. You roll onto your side, turning to the nightstand, then pull a hand out of the covers, ignoring the icy air that stings your skin. You briefly check the time on your cell phone—8 am.\n*temp msg_8am\n*set msg_8am 0\n*label choice_8am\n*fake_choice\n    *if (msg_8am=0) #While I'm at it, I'll check email and notifications.\n        *set loneliness+1\n        *set msg_8am 1\n        You unlock your smartphone screen, and take a look at what happened while you were sleeping.\n        *line_break\n        Spam from an online store app.\n        *line_break\n        A notice of new levels added to a casual game.\n        *line_break\n        Zero messages.\n        *line_break\n        You sigh. Of course zero messages. Now… how to continue the morning?\n        *goto choice_8am\n    #Even though I have the day off, I should get up and do some chores.\n        *set depression -3\n        *goto chores_f\n    #It's cold outside and I don't have to get up. I want to go back to sleep.\n        *set sleep+1\n        *set depression +3\n        *set energy +5\n        You leave your cell phone on the nightstand, slip your hand under the covers again, and shiver. Turning to one side, the side with your back to the nightstand, you go back to clutching the pillow. It's the one from the empty side of the bed; even though you're alone, you can't sleep in the middle of it.\n        *fake_choice\n            #It's uncomfortable.\n                *set anxiety +1\n            #There's... too much space.\n                *set anxiety +1\n                *set loneliness +1\n            #It makes me feel even more lonely than I already do.\n                *set loneliness +3\n                *set depression +1\n        You close your eyes, tightly clutching the pillow and sinking your face into it.\n        *line_break\n        You can hear the rain outside, as it starts pounding on the windows.\n        \n        You drift off to sleep.\n        *page_break Some hours later...\n        A few hours later, the rain pounding on the windows wakes you up. You blink a few times, sigh, and decide you have to at least try to get up. You roll out of bed, grab your phone, and drag yourself into the other room—on the couch.\n        *fake_choice\n            #Well, technically I'm out of bed.\n                You don't have time for self-pity: your smartphone reclaims your attention, vibrating. You turn to look at it.\n        *goto midday_f\n\n*label chores_f\nYou decide to get up. Even though it's a day off doesn't mean you have to lie down all day. It's all about practice.\n*line_break\nYou think about what you have to do today: go to the post office, stop by and get some groceries, and perhaps do a little house cleaning.\n\nBefore you leave, though, you want to…\n*fake_choice\n    #Take a shower, get dressed, and eat breakfast. If I'm going to start my day, I'm going to do it right.\n        *set energy -5\n        *set depression -2\n    #Take a shower, then get dressed. I'm not hungry, but I don't want to be a slob.\n        *set energy -3\n        *set depression -1\n        *set anxiety +1\n    #Get quickly dressed and get over it.\n        *set depression +2\n\nBefore leaving you stop to take a look out the window, where the weather shows no signs of improving.\n*temp umbrella\n*set umbrella 0\n*fake_choice\n    #I'll take the umbrella. Best to be prepared.\n        *set umbrella 1\n    #I hurry up. The sooner I go, the sooner I'll be back.\n\n*page_break A few hours later...\nAfter a couple of tries at finding the right key, you finally manage to unlock the door and to kick it open.\n*if umbrella=0\n    *set depression +1\n    Your hands are occupied with wet bags, dripping water just like you.\n*if umbrella=1\n    In one hand you carry your dripping umbrella, in the other a grocery bag.\n\nIt takes you a few minutes to put the groceries away. As you close the fridge, your gaze falls on a stain on the floor.\n*fake_choice\n    #Time to clean house.\n        *set filthy 0\n        *set energy -5\n        *set anxiety -3\n        You hustle around the house, thinking that if you clean today, you'll have less to do tomorrow. You sweep, dust, wash, do laundry. When you're done, you feel proud of yourself—but definitely more tired than before.\n    #Sounds like a problem for future me.\nOnce you've verified that you have no more pressing tasks, you drop down on the couch. You've just allowed your mind to wander, when a vibration comes from your pocket.\n*line_break\nA little surprised, you pull out your cell phone.\n\n*label midday_f\n\nﾠﾠﾠﾠ[i][1] New Email[/i]\n\nflashes on the screen. You try to unlock the smartphone with your fingerprint, but the system is acting up. Annoyed, you opt for the manual password. It's nothing special, but every time you put it in you feel a little embarrassed: it's your own name, followed by the name of your crush.\n\n*fake_choice\n    #Pretty cheesy for an otherwise practical woman.\n        *set gender \"female\"\n        *set gend 2\n    #Pretty cheesy for an otherwise practical man.\n        *set gender \"male\"\n    #Pretty cheesy for an otherwise practical person.\n        *set gender \"nb\"\n        *set gend 3\n\nDespite this, you still haven't thought about changing it. Although your best friend status, unfortunately, won't be changing anytime soon.\n*fake_choice\n    *if (gender=\"female\") #He sees me only \"as a sister\".\n    *if (gender=\"male\") #He sees me only \"as a brother\".\n    *if (gender=\"nb\") #He sees me only \"as a sibling\".\n    *if (gender=\"female\") #She sees me only \"as a sister\".\n        *set friend_he \"she\"\n        *set friend_him \"her\"\n        *set friend_his \"her\"\n    *if (gender=\"male\") #She sees me only \"as a brother\".\n        *set friend_he \"she\"\n        *set friend_him \"her\"\n        *set friend_his \"her\"\n    *if (gender=\"nb\") #She sees me only \"as a sibling\".\n        *set friend_he \"she\"\n        *set friend_him \"her\"\n        *set friend_his \"her\"\n\nYou try to put these thoughts aside for the moment. You can't think about this every time, after all.\n*line_break\nFirst, you enter your name…\n*label mc_name\n*if gender=\"female\"\n    *fake_choice\n        #Chloe\n            *set name \"Chloe\"\n        #Mila\n            *set name \"Mila\"\n        #Sofia\n            *set name \"Sofia\"\n        #Lizzie\n            *set name \"Lizzie\"\n        #Emily\n            *set name \"Emily\"\n        #Actually, it's...\n            *input_text name\n*if gender=\"male\"\n    *fake_choice\n        #Thomas\n            *set name \"Thomas\"\n        #Ezra\n            *set name \"Ezra\"\n        #Dylan\n            *set name \"Dylan\"\n        #Jayden\n            *set name \"Jayden\"\n        #Carter\n            *set name \"Carter\"\n        #Actually, it's...\n            *input_text name\n*if gender=\"nb\"\n    *fake_choice\n        #Ashley\n            *set name \"Ashley\"\n        #Harley\n            *set name \"Harley\"\n        #Quinn\n            *set name \"Quinn\"\n        #Morgan\n            *set name \"Morgan\"\n        #Phoenix\n            *set name \"Phoenix\"\n        #Actually, it's...\n            *input_text name\n\nYour fingers are shaking a bit, as usual. You carefully insert the remaining letters—${friend_his} name.\n*if friend_he=\"he\"\n    *fake_choice\n        #Thomas\n            *set friend \"Thomas\"\n        #Ezra\n            *set friend \"Ezra\"\n        #Dylan\n            *set friend \"Dylan\"\n        #Jayden\n            *set friend \"Jayden\"\n        #Carter\n            *set friend \"Carter\"\n        #Actually, it's...\n            *input_text friend\n*if friend_he=\"she\"\n    *fake_choice\n        #Chloe\n            *set friend \"Chloe\"\n        #Mila\n            *set friend \"Mila\"\n        #Sofia\n            *set friend \"Sofia\"\n        #Lizzie\n            *set friend \"Lizzie\"\n        #Emily\n            *set friend \"Emily\"\n        #Actually, it's...\n            *input_text friend\n*if name=friend\n    An error appears on the screen.\n    *line_break\n    \"Ugh, what an idiot,\" you mutter. \"I entered the same name twice. Obviously.\"\n    \n    You try again. First, your own name:\n    *goto mc_name\n\n[i]${name}${friend}[/i], you type... and voila, there you are in front of your background wallpaper. A picture of you two.\n*fake_choice\n    #I'm pathetic.\n        *set loneliness +2\n    #Sigh...\n        *set depression +2\n\n\"Time to check the e-mail,\" you bitterly mutter, and tap on the screen.\n*line_break\nᅠ ᅠ\n*line_break\nᅠ ᅠ\n\n*text_image space.png left\n*line_break\n[b]$!{friend}[/b] \u003ccomradesaxby@cmail.com>\n*line_break\nto me ⮟\n\nHey $!{name},\n*line_break\nthanks for the email, @{gend man|girl|pal}!\n*line_break\nYou didn't have to bother getting me a gift. Once you've passed the twenty-year mark there's little to be cheerful about :D\n*line_break\nI don't know how much longer I'll stay here, but I'll probably extend my trip—the perks of being on leave, heh.\n*line_break\nSo, you asked me for updates. Let's see, what happened recently? Geez, my memory…\n\nWell, yesterday my sister dragged me to the resort's bar, and of course, she managed to get drunk on two margaritas. At one point she slipped away and ended up flirting with a guy who looked like a stand-in for young Schwarzenegger, and she kept feeling his biceps. It was an... interesting night, shall we say.\n*line_break\nOh yeah, about flirting–don't ask me how I got there because I don't know, but it looks like I've a date tonight! A few days ago, we were at a photography exhibit when I heard this @{gend guy|girl|person} talking to someone else, who was standing right behind me. \"This photograph,\" @{gend he was|she was|they were} saying enthusiastically, \"reminds me of my favorite Mueller's self-portrait.\" Of course, I couldn't help but turn around and ask @{gend him|her|them}, \"Are you talking about the painter Otto Mueller, by any chance?\"—I mean, how many appreciators of the German expressionism do you meet around every day?\n*line_break\nLong story short… @{gend He's|She's|They're} a modern art major, and guess what, @{gend he's|she's|they're} studying at our local university! @{gend he's|she's|they're} here on vacation, too. We chatted for a while, and finally decided to go out for a glass of wine tonight. We'll see if my MFA can still get me laid :D\n\nOther than that, what else? Well I don't know if this counts as an interesting event, but my parents got me a new laptop for my birthday. Hoping I won't spill coffee on this one, too.\n\nWell, I've gotta go. Rosie just got up and from the look on her face, I'd say she's having a bad hangover. Talk to you soon!\n\n$!{friend}\n*line_break\n*text_image space.png left\n\n*fake_choice\n    #Good for ${friend_him}.\n    #...\n        *set depression+1\n        *set loneliness+1\n\n*temp line1\n*temp line2\n*temp line3\n*temp line4\nWithout stopping to think, you start typing a reply. The cold air against your skin makes you shiver, and you're already missing your bed.\n*line_break\nᅠ ᅠ\n*line_break\nᅠ ᅠ\n\n*text_image space.png left\n*line_break\n$!{friend},\n*fake_choice\n    #Birthdays are important and should always be celebrated!\n        *set anxiety-1\n        *set line1 \"Birthdays are important and should always be celebrated! I'm glad you're with your sister and you two are having fun. It's your special day and you deserve to enjoy it to the fullest.\"\n    #I see why you don't want to celebrate your birthday...\n        *set anxiety+1\n        *set line1 \"I see why you don't want to celebrate your birthday... Celebrations can be difficult. At least you're with your sister, think about that.\"\n\n*text_image space.png left\n*line_break\n$!{friend},\n*line_break\n${line1}\n\n*fake_choice\n    #Don't stay away too long or I'll forget about you :D\n        *set line2 \"Don't stay away too long or I'll forget about you :D\"\n    #Are you extending your vacation again? ...how much longer?\n        *set loneliness+1\n        *set depression+1\n        *set line2 \"Are you extending your vacation again? ...how much longer? I didn't think you'd be out of town that long.\"\n\n\n*text_image space.png left\n*line_break\n$!{friend},\n*line_break\n${line1}\n*line_break\n${line2}\n\n*fake_choice\n    #Wow, that sounds like an interesting meeting. After your date you'll have to tell me all about @{gend him|her|them}!\n        *set depression-1\n        *set line3 \"Wow, that sounds like an interesting meeting. After your date you'll have to tell me all about @{gend him|her|them}! I hope @{gend he isn't|she isn't|they're not} too young. Remember when @{gend Gheorghe|Alissa|Ollie} wanted you to join TikTok? And you thought it was a variation of Tic Tac Toe? It's bound to happen again, you know :P\"\n    #I hope your date goes well.\n        *set loneliness+1\n        *set line3 \"I hope your date goes well. I'm happy for you.\"\n\n*text_image space.png left\n*line_break\n$!{friend},\n*line_break\n${line1}\n*line_break\n${line2}\n*line_break\n${line3}\n\n*fake_choice\n    #I'll be waiting for your news then. Don't let Rosie throw up on your new computer!\n        *set line4 \"I'll be waiting for your news then. Don't let Rosie throw up on your new computer!\"\n    #I'll leave you to your vacation...\n        *set loneliness+1\n        *set depression+2\n        *set line4 \"I'll leave you to your vacation... See you soon, hopefully.\"\n\n*text_image space.png left\n*line_break\n$!{friend},\n*line_break\n${line1}\n*line_break\n${line2}\n*line_break\n${line3}\n*line_break\n${line4}\n\nYours,\n*line_break\n$!{name}\n*line_break\n*text_image space.png left\n\n*page_break Send\n\n*set loneliness+1\nYou stare blankly at the screen for a few moments. \"Stupid, stupid $!{friend},\" you murmur through dry lips. You realize you're crying.\n*fake_choice\n    #These are my first words of the day, and I'm crying.\n        *set depression+2\n    #...\n\n*temp check_apps\n*set check_apps 0\n*label mobile_screen\nYou move a thumb across the mobile screen, switching apps.\n*fake_choice\n    #Open Gallery.\n        *label gallery\n        You open the gallery, then start scrolling through the few photos on your device. Some of them catch your eye.\n\n        *fake_choice\n            *disable_reuse #The last photo you took.\n                You took this picture two weeks ago. $!{friend} laughs, a little embarrassed by your shot. A coworker is patting ${friend_him} on the back to congratulate ${friend_him} on a major work accomplishment.\n                *line_break\n                You zoom in on $!{friend}'s face. $!{friend_his} eyes sparkle, ${friend_his} teeth are straight and white, ${friend_his} smile wide and pleasant.\n                *line_break\n                You stare at ${friend_his} face for a few moments, then hastily wipe the tears from your cheeks.\n                *page_break Back\n                *goto gallery\n            *disable_reuse #A meme you downloaded some time ago.\n                *set depression+1\n                The meme shows a man shooting another version of himself sitting in an armchair. He then turns to the viewer and says, \"It's not even a meme, please help me.\"\n                *page_break Back\n                *goto gallery\n            *disable_reuse #Your most recent photo with $!{friend}.\n                *set loneliness+1\n                Although you and $!{friend} see each other fairly often, you don't have many photos together, and almost all of them were taken by you on your cell phone. \n                *line_break\n                This one is no different: you two are inside a pub, sitting on a wooden bench with two pints of beer on the table. You're obviously a little tipsy; your cheeks are red, you have a goofy grin on your face, and your head is resting on one of ${friend_his} shoulders. $!{friend_he} smiles ${friend_his} usual undefinable grin, looking at the camera.\n                *line_break\n                The photo is a little blurry, but your heart still shakes.\n                *page_break Back\n                *goto gallery\n            *disable_reuse #An old college photo.\n                *set depression+1\n                One of the first photos saved on your phone, back during your senior year of college. The photo was taken at a party. You recognize the faces of some of your classmates—Kelly, Raphael, others whose names you no longer remember. And then there's you, smiling.\n                *line_break\n                You don't even remember how to smile like that anymore, showing your teeth and cheek dimples. \n\n                The photo was most probably taken after a game of beer pong. Hard to tell who won.\n\n                It seems like another lifetime.\n                *page_break Back\n                *goto gallery\n            #Just close the gallery.\n                *goto mobile_screen\n    #Open FriendBook.\n        You open FriendBook, cringing at seeing your profile picture.\n\n        *label inside_fb\n        You scroll through the latest updates. Not much to see, with only thirty-four friends.\n\n        *fake_choice\n            *disable_reuse #Check out my profile.\n                The last post on your profile is your sharing of a song. Zero likes.\n                *page_break Keep scrolling\n                The last post on your profile is your sharing of a song. Zero likes.\n\n                You've shared a funny webcomic with a pun in the title. Zero likes.\n                *page_break Keep scrolling\n                The last post on your profile is your sharing of a song. Zero likes.\n\n                You've shared a funny webcomic with a pun in the title. Zero likes.\n\n                A month ago you wrote, \"Life sucks.\"\n                *line_break\n                A contact of yours commented, \"LOL tell me about that\". Zero likes.\n                *set loneliness +1\n                *page_break Back\n                *goto inside_fb\n            *disable_reuse #Check out $!{friend}'s profile.\n                You linger for a moment, staring at ${friend_his} profile picture. $!{friend_he} recently changed it—${friend_he}'s in a club with Rosie, each of them holding a glass of sparkling wine.\n\n                $!{friend} Saxby has 1300 friends and an uncountable number of photos. On ${friend_his} wall there are several posts of happy birthday wishes. A name never seen before catches your eye.\n                *fake_choice\n                    #Open @{gend his|her|their} profile.\n                        *set youknow 1\n                        Mackenzie Archer, 19. Modern Arts student at your local university.\n\n                        You open @{gend his|her|their} profile picture, zooming in. \"Damn, @{gend he's handsome|she's stunning|they're breathtaking},\" you mutter bitterly.\n                        *fake_choice\n                            #They have already linked up on Friendbook, wow.\n                                *set loneliness +1\n                                *set anxiety +1\n                            #I'm happy for $!{friend}. I really am. $!{friend_he} deserves it.\n                                *set depression -1\n                                *set loneliness +1\n                            #It hurts so fucking much…\n                                *set depression +2\n                                *set loneliness +2\n                                *set anxiety +2\n                    #Close FriendBook.\n                        *goto mobile_screen\n            #Close the app.\n                *goto mobile_screen\n    #Lock the screen.\n        *goto midday\n\n\n*label midday\nYou check the time: it's midday. You push back the tears, tossing the phone onto the couch.\n*fake_choice\n    *selectable_if (mind>=40) #I should eat something.\n        *set depression -1\n        You force yourself to get off the couch, then drag yourself into the kitchen. You turn on the TV, and tune it to a rerun of an old TV show as you cook some mac and cheese.\n        \n        You grab a fork from the dish rack, bring the bowl to the table, and start to eat with no appetite at all. You really want to focus on the TV show, but your mind keeps going back to\n        *if youknow=1\n            Mackenzie.\n        *if youknow=0\n            ${friend_his} email.\n        \n        As you finish your meal, drop the bowl in the sink, turn off the TV, and head back to bed.\n        *page_break\n    #I only want to sleep.\n        *set sleep+1\n        *set depression +3\n\n*set time \"afternoon\"\nYou lie in bed, thinking about doing something else instead of sleeping. You decide it wouldn't be a bad idea to read a novel. You've bought it, started it, and left it on your nightstand for the last six months—not that you don't like it, but your concentration…\n\n…\n\n…here you are again, reading and re-reading the same five sentences without being able to go on. You just can't focus on the words you're reading, as intrusive thoughts keep requiring your attention.\n\n\"You're so miserable. You deserve nothing. How could $!{friend} ever love you?\"\n\n*fake_choice\n    #I like $!{friend}, but I'm not in love with ${friend_him}. I just wish I was... different than this. To be likeable as well. \n        *set loneliness+2\n    #I've been in love with $!{friend} for years, it's true. So what? What can I do about it? I can't just... stop.\n        *set love 1\n\n*set depression+1\n*set anxiety+1\n\"$!{friend} isn't the problem. [i]You[/i] are the problem. @{love+1 Would you want others to like you? Have you seen yourself recently?|How can you think you're worthy of ${friend_him}?}\"\n\n\"Stop it,\" you mutter. You throw the book on the nightstand, bringing your hands to your eyes. \"Stop it, stop it, stop it!\" you hiss through your teeth, hitting your head with your fists. You curl up on your side, clutching the pillow.\n*line_break\nYou can't bring yourself to cry.\n\n\"You don't [i]deserve[/i] to be able to cry.\"\n\n\"Please stop. Just stop,\" you gasp. Maybe that's true, maybe you don't deserve to cry, but you'd settle for a bit of silence—a favor Achlys rarely grants you.\n\nAchlys is the omnipresent voice in your mind. Sometimes she whispers, sometimes she growls. Often it's just a persistent chant, working in the dark to keep you subjugated to her. You'd like to say you're used to it by now, but the truth is quite different.\n\nYou close your eyes, hoping to fall asleep.\n\n\"You're pathetic.\"\n\nYou start to count your breaths. One, two... \n\n\"@{youknow+1 Have you read about ${friend_his} new crush?|Have you seen Mackenzie?} @{gend [i]He[/i] is|[i]She[/i] is|[i]They[/i] are} someone who will succeed in life.\"\n\nThree, four... \n\n\"And you? You dream of quitting an entry level position because everyone else is better than you. Pathetic. Failure.\"\n\n*fake_choice\n    #That's untrue.\n        *set anxiety+3\n    # Five, six... \n        *goto breathe\n\n\"That's untrue,\" you finally reply in your mind. Although Achlys is only a voice, you can hear her smile.\n*line_break\n\"It's untrue? Don't you feel like throwing up every time you're about to cross the threshold? Doesn't your heart beat wildly even if you just think someone might be about to call you? Didn't you have to force yourself not to cry that time your boss scolded you? What are you, twelve years old? Pathetic, failed, and disillusioned. What a delicious hat trick. You still wonder why you have no friends?\"\n\n*fake_choice\n    #$!{friend} is my friend!\n        *set depression+1\n        *set anxiety+1\n        *set loneliness+2\n    #One, two...\n        *goto breathe\n\n\"$!{friend} is my friend!\" you exclaim in large print in your mind. You've completely lost focus, and your breathing is quickened. Achlys sneers.\n*line_break\n\"But [i]of course[/i]. Your [i]best[/i] friend. So much so that ${friend_he}'s spending ${friend_his} birthday with ${friend_his} sister, in another country, without even inviting you. Oh, that's right, I forgot: you're a loser, you couldn't have afforded it anyway. What a shame, huh? You're forced to miss out on $!{friend} flirting with people better than you. After all, it's not a difficult quest: they're [i]all[/i] better than you.\n\n*fake_choice\n    #...I'm not...\n        *set anxiety+1\n        *set depression+2\n    #One, two...\n        *goto breathe\n\n\"…I'm not…\"\n*line_break\n\"[i]You're not[/i] what? You're not a failure? You're not a loser? Honey, you're curled up in bed on a Friday afternoon, a prelude to the rest of your weekend, while everyone is out having fun. Tonight, $!{friend} will be fucking some hot @{gend guy|girl|person} while you'll be lying in bed, pretending you don't care. Then, tomorrow ${friend_he}'ll call you to tell you about ${friend_his} amazing night and you'll—\"\n\n*fake_choice\n    #SHUT. THE FUCK. UP!!!\n        *set depression-1\n    # ...\n        *set depression+3\n\n\"—and you'll resume that old hobby of yours. That old, exquisite hobby of yours. Remember?\"\n\n*fake_choice\n    #I have a history of self-harm.\n        *set hobby 1\n    # I have suffered from an eating disorder in the past.\n        *set hobby 2\n    # I abused prescribed drugs for a while.\n        *set hobby 3\n\n\"That's right, that one. Or do you really think this weekend is going to play out any differently? By tomorrow afternoon you'll be lying on the toilet floor, @{hobby crying and bleeding|vomiting and coughing|passed out}.\"\n\nYou have tears in your eyes again. Achlys won't shut up, she [i]never[/i] shuts up. Frustrated, you sink your face into the pillow and let out a scream, continuing to breathe and scream with your airway covered, until your lungs starts to ache.\n\nSomehow, you fall asleep.\n*page_break\n*goto evening\n\n*label breathe\nYou manage to regularize your breathing. Achlys' voice gets weaker and weaker... Weaker and weaker.\n*line_break\nSomehow, you fall asleep.\n*page_break\n*goto evening\n\n*label evening\n*set time \"evening\"\n*set energy +15\n*if name=\"Alex\"\n    *set friend2 \"Ash\"\n    *if friend=\"Ash\"\n        *set friend2 \"Morgan\"\nYou open your sleepy eyes, and the first thing you notice is the overwhelming darkness. You must have been sleeping all afternoon.\n*line_break\nYour cell phone is ringing. You answer before you lose the call.\n\n\"Yeah?\" you mutter with a groggy voice, bringing the device to your ear. You hear a cheerful, if hesitant, voice on the other end.\n\n\"Hey, $!{name}! Were you sleeping? I'm sorry, I didn't mean to bother you,\" ${friend_he} chuckles.\n*line_break\nIt's $!{friend2}, a coworker of yours. $!{friend_he}'s nice and you usually get along well, but you're not used to be called outside of work hours. You sit up, alarmed, and cast a glance at the window. \"$!{friend2}, no bother at all. Is everything okay?\" you ask.\n\n\"Sorry, I would have texted you but I'm driving. There's a pub not far from your place that I've been wanting to try for a while, and since $!{friend} is still on break, I thought I'd ask if you'd like to grab a bite together,\" ${friend_he} suggests. You can hear the noise of the road in the background.\n\n\"$!{friend} is away, therefore you have nothing else to do,\" Achlys whispers. \"Even your coworkers know how pathetic you are.\"\n\n*choice\n    *selectable_if (loneliness>30) #\"That'd be cool.\"\n        *set nightout 1\n        *set Alex +2\n        *set loneliness-1\n        *set depression-2\n        Your heart is racing. You couldn't care less about Achlys right now. \"That'd be cool,\" you exclaim, trying to temper your enthusiasm. You blush to hea the rain has started pounding on the closed windows again, and the darkness in the room mirrors the one inside you.\n*if hobby=0\n    *fake_choice\n        #I have a history of self-harm.\n            *set hobby 1\n        # I have suffered from an eating disorder in the past.\n            *set hobby 2\n        # I abused prescribed drugs for a while.\n            *set hobby 3\n*if (hobby !=0)\n    *page_break\n*set depression +10\n*if hobby=3\n    *set energy-40\n    *if energy\u003c2\n        *set energy 2\n    When you stopped taking psychotropic drugs a few months ago, you didn't have the courage to throw them away. Part of the reason is because, deep down, you knew this moment would come.\n\n    You head to the bathroom, open the medicine cabinet, and grab two packages of anti-anxiety medication.\n    \n    \"You shouldn't just take two. Why don't you take them all? You should. You should erase yourself from this world you don't deserve. You are pathetic, a weakling, a failure. Do the world a favor and [i]die[/i],\" Achlys urges.\n    \n    You walk into the kitchen, pile the pills on the table, grab a bottle of gin off the shelf, and use its bottom to reduce the pills to powder. You do it in a hurry, all too automatically, and feel ashamed of it. But it's this shame you want to escape, this constant hissing that haunts you and that you can't shut out of your thoughts.\n    \n    You uncap the gin bottle, take a sip, then set it down on the tabletop. You place one hand next to the pile of powder, rubbing the cut of your hand toward you, and letting the powder fall into your other open hand. You make sure to pick up as much as you can, wiping away the off-white streaks left on the wood. You toss it into your mouth, licking it off your palm as if you were hungry, then reach for the bottle again.\n    *line_break\n    You drink until a shiver of disgust forces you to stop.\n    \n    With the newfound silence in your mind you leave the kitchen, retrieve your cell phone from the floor, and finally go to lie down in bed.\n    *goto into-bed\n*if hobby=2\n    *set harm 4\n    You head into the kitchen in a frenzy. You open the fridge, swallow from the milk carton, then grab some chicken—left over from Thursday—and eat it directly from the fridge. You grab a can of beer, open it, swallow half of it, then notice leftover macaroni and cheese on the second shelf of the fridge. There's still a fork inside; you scavenge all of it in less than a minute.\n    *line_break\n    You close the fridge, still holding the beer can. You keep drinking as you open the pantry, digging, moving, pulling out cookies, frantically eating them. Some peanuts. Some chocolate.\n    \n    \"What a disgusting pig. Does it make you feel better to gorge yourself like this? You're gross. You should hide from the sight of the world, you make me sick,\" laughs Achlys.\n    *line_break\n    You can't stop bringing food to your mouth; the tears keep falling, and the pain you feel in your chest clashes with the feeling of comfort you get from chewing.\n    \n    After fifteen minutes there is nothing left to eat. You find yourself standing in the middle of the kitchen, your mouth and hands dirty, and a lot of empty packaging. You feel a shame so deep it takes your breath away.\n    \n    \"You're not worthy of love. You're not worthy of affection. You're not even worthy of being called human,\" Achlys punctuates in your mind.\n    \n    You head to the bathroom, shivering, and squat down next to the toilet. You close one hand into a fist, leaving your index and middle fingers outstretched. Then you shove them down your throat, and feel your teeth scraping and scratching the skin of your fingers.\n    *line_break\n    You gag. Once, twice. Your hands are shaking, as your whole body; tears are sliding down your neck, getting into your shirt and causing you to shiver with cold.\n    \n    You feel your stomach twist like a washcloth, and the painful contractions push ing that you're even still alive.\" \n\n            You' re still breathing erratically. The tears no longer flow, not because you don't have to cry, but because you no longer have any. \n            *line_break\n            \"Stop it, please just shut up. Please be quiet. Please stop. Stop. Stop,\" you beg her. You press a hand on the burn and another scream rises to your lips; Achlys is silent, for the moment. She's taken her toll and you know she'll leave you alone for a while, at least. \n\n            With the newfound silence in your mind you leave the kitchen, retrieve your cell phone from the floor, and finally go to lie down in bed. \n            *goto into-bed\n        #I hurt myself.\n            *set harm 3\n            You approach the wall, stumbling. You stare at the rough paint for a long, long minute; then you bellow, exhausted from those thoughts that won't give you a break, close your fists, and start hitting the wall. \n\n            As your skin scratches and tears, a guttural moan of pain escapes your lips. There is something primal about your cry, and when the urgency finally subsides, your wail of pain still continues.\n            *line_break\n            The wall has two large blood stains, which you know you need to clean up while it's fresh. Your hands are shaking; even if you've always targeted the same spot, the pain is as intense as the first time.\n\n            \"You don't deserve to be fine. You don't deserve peace. Chicken, wimp, pathetic to the core. You don't even have the guts to punish yourself as you deserve. You're lame, a disgrace, it's embarrassing that you're even still alive.\" \n\n            You' re still breathing erratically. The tears no longer flow, not because you don't have to cry, but because you no longer have any. \n            *line_break\n            \"Stop it, please just shut up. Please be quiet. Please stop. Stop. Stop,\" you beg her. You rub your injured knuckles slowly against the wall, and another screa ing yourself, or just skip it.\n        *if (hobby !=3)\n            You have not medicated your recent wounds.\n        *fake_choice\n            *selectable_if (((tidy=0) and (time>=15)) and (energy>5)) #Tidy up the living room. [15 min]\n                *set energy-5\n                *set time-15\n                *set tidy 1\n                *goto planit2\n            *selectable_if ((((time>=45) and (filthy=1)) and (clean=0)) and (energy>10)) #Clean the house. [45 min]\n                *set energy-10\n                *set time-45\n                *set clean 1\n                *goto planit2\n            *selectable_if (((shower=0) and (time>=20)) and (energy>3)) #Take a shower. [20 min]\n                *set energy-3\n                *set time-20\n                *set shower 1\n                *goto planit2\n            *selectable_if (((time>=60) and (dinner=\"none\")) and (energy>10)) #Cook a homemade dinner. [1 hour]\n                *set dinner \"cook\"\n                *set energy-10\n                *set time-60\n                *goto planit2\n            *selectable_if (((time>=5) and (dinner=\"none\")) and (energy>5)) #Order a pizza. [5 min]\n                *set energy-5\n                *set time-5\n                *set dinner \"pizza\"\n                *goto planit2\n            *selectable_if ((((time>=15) and (hobby !=3)) and (wounds=0)) and (energy>2)) #Treat your wounds. [15 min]\n                *set energy-2\n                *set time-15\n                *set wounds 1\n                *goto planit2\n            #That's enough.\n                So the plan is to:\n                *if tidy=1\n                    tidy up the living room,\n                *if clean=1\n                    clean the house,\n                *if shower=1\n                    take a shower,\n                *if wounds=1\n                    treat your wounds,\n                *if dinner=\"cook\"\n                    and cook a homemade dinner.\n                *if dinner= el=1\n                    [b]Mackenzie Archer[/b]\n                    \n                You almost let out a pained verse.\n                *line_break\n                \"No, I can't believe it...\" you murmur with a pang of sorrow in your chest.\n                *if ((part_rel=0) or (pic_rel=0))\n                    \n                    *goto relationship\n            *disable_reuse #Look further down.\n                *set anxiety+5\n                *set part_rel 1\n                *if name_rel=1\n                    [b]$!{friend} Saxby[/b]\n                \n                [b]In a Relationship with[/b]\n                *line_break\n                [b]Mackenzie Archer[/b]\n                \n                \"Please no, please no, please no...\" you mutter, almost panicking.\n                *if ((name_rel=0) or (pic_rel=0))\n                    \n                    *goto relationship\n            *if ((name_rel=1) and (part_rel=1)) #Open the badly cropped photo.\n                *set depression+5\n                The photo shows, unmistakably, $!{friend} and @{gend a guy|a girl|another person} kissing. From what little you can remember, it would certainly appear to be Mackenzie.\n\nYour heart is beating so fast you can hear it pounding in your ears.\n*line_break\nYou can't stop looking at that picture. $!{friend} is smiling, looking happy. And Mackenzie—@{gend he's|she's|they're} so painfully @{gend handsome|beautiful|beautiful}. You can't get over how much young @{gend he looks|she looks|they look}. \"@{gend He's|She's|They're} a freakin' kid,\" you murmur, nervously biting your lower lip.\n*line_break\nTogether, they have racked up hundreds of excited reactions from their friends and followers. The comments are cheering, and their responses ecstatic.\n\nYou have a wave of nausea.\n*line_break\nYou quickly get up from the couch, hurry to the bathroom, and barely make it to the toilet before puking up your lunch.\n\n\"It's not fair,\" you think.\n*line_break\nYou slide to sit on the ground, and start hitting the wall behind you with your head.\n*line_break\n\"It's not fair, it's not fair, it's not fair.\"\n*line_break\nTears roll down your cheeks. They're tears of anger, of fear, of anguish. They're tears that flow from your eyes, but that are born in that black hole you have in your chest. All your pain is concentrated there, in a bottomless pit that sucks up every positive emotion that could arise in you.\n*line_break\nAnd you feel so \n*if depression>=60\n    in pain.\n*if depression\u003c60\n    *if loneliness>anxiety\n        lonely.\n    *if anxiety>=loneliness\n        scared.\n\nYou bring your hands to your face, digging your fingertips into the flesh. If it weren't for your almost non-existent fingernails, you'd be bleeding; instead, you slowly curl up, bringing your knees to your chest. You lean sideways against the siphon, your shoulders still against the cold tiles, and try to control your breathing.\n\nOne, two...\n\n\"You're pathetic.\"\n\nThree, four...\n\n\" No one needs you, and no one wants you.\"\n\nFive, six...\n\n\"Everyone would be happier without you.\"\n\nSeven, eight.\n\n\"Is yours even a life?\"\n\nInhale. Exhale. Inhale. Exhale.\n*line_break\nYou can feel Achlys' long, icy fingers squeezing your thoughts, screaming at you, taking up all the space in your mind. Devouring all your happy thoughts.\n\nMaybe it's true, you think. Maybe everyone would be better off without you. Maybe they'd all be happier.\n*line_break\n$!{friend} seems to be.\n*line_break\n${friend2} had such a look of pain on ${friend_his} face last night, an expression you'd never seen on ${friend_him}.\n*line_break\nWho else do you have left? Who would ever be interested in your existence?\n\n\"No one,\" Achlys answers for you.\n\nYou start to rock, drawing deep breaths but still unable to fill your lungs. You make choked verses, tears well up in your throat, nausea grips you again. You can't breathe. You can't stop feeling what you're feeling. You can't stop feeling this crazy, powerful, overwhelming fear you're drowning in.\n\nAnd all you can do is continue to cry, make choked sounds, and gasp for air.\n\n*page_break An eternity later \n\nYou feel so weak, you have trouble standing. Your hands are shaking, your throat and mouth are dry. You are pale as a sheet.\n*line_break\nYou're up, though, and you didn't\n*if (hobby =1)\n    *if harm=1\n        cut yourself.\n    *if harm=2\n        burn yourself.\n    *if harm=3\n        punch anything.\n*if hobby=2\n    binge eat.\n*if hobby=3\n    take any meds.\n\n\"Not yet,\" snickers the usual evil voice that dwells in your mind.\n\nYou wander around like a ghost, feeling the weight of\n*if depression>=60\n    the sorrow of life.\n*if depression\u003c60\n    *if loneliness>anxiety\n        a loneliness you can't shake away.\n    *if anxiety>=loneliness\n        the anguish for the future.\n\n\"Maybe I'm the one who's wrong,\" you think; and this time, that's your voice.\n\nYou reach the kitchen, turn on the faucet, fill a glass. You look at the stream of water with sorrowful eyes.\n\n\"Maybe [i]I[/i] am the problem,\" your voice keeps echoing in your mind.\n*line_break\nAchlys is silent. Or maybe she's echoing you?\n\nYou notice too late that water is overflowing from the glass. You turn off the faucet, then get a cold chill. You realize your shirt is drenched in sweat.\n\n\"How long has it been?\".\n\nYou bring the glass to your lips. You want to look at a clock, but you can't move outside of your intended path. Your body is in survival mode; all you can do is observe yourself as if estranged from your own body, while it continues to go on autopilot.\n\nYes, that's your voice in your mind. Your voice that now screeches, that screams, that wants to smash everything, hurt yourself, tear your hair out, eat glass, open your belly, destroy every utensil, smash walls with your fists and your head, and scream, scream until it has no voice.\n\nYet you remain motionless, silent. The glass in one hand, your gaze fixed on a drop of water.\n*line_break\nThe drop wobbles, hanging from the faucet.\n*line_break\nIt falls.\n*line_break\n[i]Plink[/i].\n\nYou sob, then shudder again. You would like to drink more—your body knows you need to drink more water—but you fear that if you open your mouth again, a scream will come out this time. \n\n\"What if it's worth the trouble?\" you reflect. You should feel worried, but it's just a lazy thought.\n*line_break\nYou don't feel anything.\n*line_break\nNothing you do.\n\nYou leave the glass in the sink, then turn around and start walking again.\n\n*page_break ...\n\n[i]Where are you now?[/i]\n\n[i]How much time has passed?[/i]\n\nYou look around. The room is darker. You're sitting at the kitchen table, your laptop open in front of you.\n\n[i]When did I turn it on?[/i]\n\nYou have a plethora of tabs in front of you, none of which you remember opening. You check what you've done so far: apparently, you're in the middle of erasing your online presence.\n\n\"Good,\" you hear Achlys' voice again. \"Isolate yourself even more. Scum like you deserve to be alone. Stop forcing your existence into the lives of others. Do the world a favor and be gone.\"\n*line_break\nFor once, even she seems serious.\n\n\"Maybe she's serious because she's right?\" you think again.\n*line_break\n\"Maybe I should… end it all.\"\n\nYou should feel something.\n*line_break\nYou'd [i]like[/i] to feel something.\n*line_break\nYou feel nothing.\n\n*temp call_smn\n*set call_smn \"no\"\n*temp call_who\n*set call_who 0\n\n*fake_choice\n    *if (nightout=1) #Call $!{friend2}.\n        *set loneliness+5\n        *set call_smn \"yes\"\n        *set call_who 1\n    #Call ${friend}.\n        *set loneliness+3\n        *set depression+3\n        *set anxiety+3\n        *set call_smn \"yes\"\n        *set call_who 2\n    #Keep doing what you're doing.\n\n*if call_smn=\"yes\"\n    You get up slowly, very slowly. You don't want to jolt your body or your mind—everything seems dipped in jelly right now, and you're okay with that.\n\n    You look for your cell phone around the house, still with the same tired, impassive expression on your face.\n    *line_break\n    You find it on the bathroom sink, and without wondering what it's doing there, you pick it up with the same phlegm that got you here.\n\n    You look for @{call_who Alex|$!{friend}} in the contacts, then select ${friend_his} number.\n    *line_break\n    Bring the cell phone to your ear.\n\n    You wait.\n    *line_break\n    You wait.\n    *line_break\n    You wait.\n\n    …\n\n    No answer.\n\n    You glance at your phone as if it had just wronged you, and you can hear Achlys snickering once again. You breathe hard, trying to calm yourself, and gently place the cell phone where you found it. Then, you walk back into the kitchen.\n\n    You move slowly, almost dragging your feet; the existential dread, the emptiness gnawing in your chest prevents even the smallest movement outside of that.\n\n    You only wish to sleep.\n    *line_break\n    \"Possibly forever,\" rumbles through your mind, and once again—it's your voice uttering that.\n\n    You sit back down at your laptop, swallow, and open the next tab.\n*if call_smn=\"no\"\n    You try to ignore these thoughts, and struggle to turn back to the laptop. You swallow, then open the next tab.\n*line_break\nFriendBook.\n\nWith a trembling hand, you move the scroll wheel upward. You know it will only amplify your pain, but with masochistic instinct you want to see, you want to perceive the people who are happier than you. The people who are out there living, right now, while you ponder the value of your own existence.\n\nOne ad catches your eye.\n\n“Mh?”\n\n*fake_choice\n    #Click on the ad.\n\n*if depression>=60\n    [b]** YOUR PAIN WON'T LAST FOREVER **[/b]\n*if depression\u003c60\n    *if loneliness>anxiety\n        [b]** YOU ARE NOT ALONE **[/b]\n    *if anxiety>=loneliness\n        [b]** YOUR LIFE MATTERS **[/b]\n*line_break\n[i]If you're in a state of psychological distress, remember that you can break free from it.[/i]\n*line_break\n[i]Start your therapy today. Contact us to schedule your first appointment.[/i]\n\nA call-to-action button prompts you to click.\n*line_break\nYou sniff.\n\n\"You're so obviously fucked in the head that even your devices recognize it. You're embarrassing,\" Achlys points out. \n\nFrustrated, you slam the laptop shut.\n\n*page_break\n*set time \"evening\"\nIt's officially the evening.\n*line_break\nThe last evening of your long weekend.\n\nIt's dark outside, but after pouring almost non-stop for three days, the weather seems to have calmed down. You glance out the window, surprised to actually be able to see the moon.\n*line_break\n\"It might be the last time you see it,\" Achlys suggests.\n*line_break\nYou feel so tired you can't even fight her anymore.\n\nA shout of celebration comes from somewhere; one of the two teams has probably scored a goal.\n\n\"This is the best time to leave quietly, you know. No one would bother you. They'd all be busy enjoying their lives while you end yours.\"\n\n“…”\n\nYou clench your teeth, your fists, curl up on the bed. The room is dark, and your gaze slips to an ill-defined spot in front of you.\n\n\"You could really do this. And after that... No more worry. No more pain. Not a single thing.\"\n\n*fake_choice\n    #No more grief.\n    #No more laughter.\n\n\"You wouldn't feel this\n*if depression>=60\n    pain\n*if depression\u003c60\n    *if loneliness>anxiety\n        anxiety\n    *if anxiety>=loneliness\n        loneliness\nconsuming you every day.\"\n\n*fake_choice\n    #I wouldn't have to feel any pain anymore.\n        *set depression+1\n    #I wouldn't feel the sun and the rain on my skin anymore.\n        *set depression-1\n\n\"You wouldn't feel your heart shatter at yet another rejection.\"\n\n*fake_choice\n    #I would no longer suffer for love.\n        *set depression+1\n    #I would no longer feel love.\n        *set depression-1\n\n\"You would never shed a tear again.\"\n\n*fake_choice\n    #I would never cry from sorrow again.\n        *set depression+1\n    #I would never cry from laughing again.\n        *set depression-1\n\n\"And you would never have to wake up in this cold, bleak, and terrifying world again.\"\n\n*fake_choice\n    #I would never have to wake up again.\n    #I would never have to wake up again...\n\nYou sit up, tired of being whispered to by Achlys. You don't know what to do, and perhaps you will choose impulsively; however, you know you must choose now.\n*line_break\nBefore she chooses for you.\n\n*choice\n    *selectable_if (mind\u003c35) #I'm ending [i]myself[/i].\n        *goto end-it-all\n    *selectable_if ((mind>49) and (energy>15)) #I'm ending [i]Achlys[/i].\n        *goto therapy \n    #I don't want to move. I just want to sleep.\n        *goto another-day\n\n*label end-it-all\n*set mind 0\nYou get out of bed, frenzied. Achlys laughs, laughs loudly in your mind, at such a volume that you can't hear anything else, not even your own thoughts.\n\nYou open the closet with an impassive gaze and steady hands.\n\n\"Hurry! Hurry up!\" she urges you.\n\nYou pull out a belt. A long, strong one.\n\n\"Erase your filthy existence from this world!\"\n\nYou climb onto the bed. You feel the mattress sink beneath your feet.\n\n\"It's time to end this!\"\n\nYou bind.\n*line_break\nYou tighten.\n*line_break\nYou breathe.\n*line_break\nYou cry.\n\n\"I don't want to suffer anymore.\"\n\n*page_break Later, that night\n*set time \"night\"\n\nThe apartment is quiet.\n*line_break\nIt's almost two in the morning, and the derby is long over.\n\nA cell phone was left on the edge of the sink.\n*line_break\n*if Alex>=60\n    The screen lights up.\n    \n    “$!{name}? Alright, I guess you went to bed early. See you tomorrow at the office then. Have sweet dreams.”\n    \n    The screen goes black.\n    \n    The apartment falls back into darkness.\n*if Alex\u003c60\n    Its screen stays off, and the device will be dead long before it will receive a new call.\n*goto_scene endings dead\n\n\n*label therapy\n\"No,\" you murmur in a hoarse voice.\n*line_break\nAchlys, for the first time, seems to waver. \"...no?\"\n\nHer question remains unanswered. You get out of bed almost in a rush, impatient. Your ears ring, your heart beats so fast you feel pressure in your eyes.\n*line_break\nYou sit back down at the kitchen table, open your laptop, and click on the ad.\n*line_break\nYou start typing.\n\n[i]Dear Dr. Kelley,[/i]\n*line_break\n[i]My name is $!{name} and I'm a young @{gend man|woman|adult}. I'm going through a delicate time in my life and I'm afraid I'm suffering from\n*if depression>=60\n    depression.\n*if depression\u003c60\n    *if loneliness>anxiety\n        loneliness\n    *if anxiety>=loneliness\n        anxiety.\nWhen I'm feeling very, very bad, I\n*if (hobby !=3)\n    *if harm=1\n        cut myself.\n    *if harm=2\n        burn myself.\n    *if harm=3\n        I hurt myself by beating the walls.\n    *if hobby=2\n        binge eat—an eating disorder that I thought I had overcome.\n*if hobby=3\n    abuse benzos.\nMoreover, lately I've been having suicidal thoughts[/i].\n*line_break\n[i]Please call me back at the number listed. I would like to see you as soon as possible.[/i]\n\nThe website takes your personal information, adding it directly to the contact form, and with one click you send the e-mail. \n\n“…”\n\nSilence.\n\nHere comes another cheer of celebration.\n\nYou decide to turn on the TV, just to see who's winning.\n\n*page_break Later, that night\n*set time \"night\"\nThe apartment is quiet.\n*line_break\nIt's almost two in the morning, and the derby is long over.\n\nYour cell phone is on the nightstand, charging.\n*line_break\n*if Alex>=60\n    The screen lights up.\n    \n    \"Sorry, I was driving! Alright, sweet dreams. See you tomorrow. :)\"\n    \n    The screen briefly illuminates your sleeping face. Your expression is strangely peaceful, perhaps even dreamy.\n*if Alex\u003c60\n    \n    You sleep peacefully, hugging your pillow but with a smile on your face.\n\nThe night is quiet.\n*goto_scene endings cured\n\n*label another-day\n\"Enough,\" you mutter to yourself. \"Enough. I'm tired.\"\n*line_break\nYou raise one leg first, tuck it under the covers, then repeat the process with the other one. Despite the cover, you're shivering from the cold. You know it's useless to complain about it; it's a deep chill that comes from within, and against which you have no cure.\n\nYou hug the pillow, disheartened.\n\n\"You know you can't keep this up forever,\" Achlys grins.\n*line_break\nAs a response, you close your eyes.\n\n*page_break Later, that night\n*set time \"night\"\n\nThe apartment is quiet.\n*line_break\nIt's almost two in the morning, and the derby is long over.\n\nA cell phone was left on the edge of the sink.\n*line_break\n*if Alex>=60\n    The screen lights up.\n    \n    “$!{name}? Alright, I guess you went to bed early. See you tomorrow at the office then. Have sweet dreams.”\n    \n    The screen goes black.\n*if Alex\u003c60\n    Its screen stays off, forgotten in an empty room.\n\nThe only noise is your faint groaning, as you toss and turn in bed in the grip of a new nightmare.\n*goto_scene endings again\n", "theend": "*page_break The End\n\n*text_image title.png center A Long Weekend\n\n[i]A Long Weekend — [/i]\n[i]a story about love, terror, and existential angst.[/i]\n\nThank you for playing. The ending reached for this game is:\n\n*comment #2\n*page_break\n*text_image title.png center A Long Weekend\n\n[i]A Long Weekend — [/i]\n[i]a story about love, terror, and existential angst.[/i]\n\nThank you for playing. The ending reached for this game is:\n\n*if (theend\u003c5)\n    *achieve acheron\n    You killed yourself.\n*if ((theend=5) or (theend=6))\n    *achieve kairos\n    You decided to carry on as you always have.\n*if (theend>6)\n    *achieve dionysus\n    You've decided to turn your life around.\n\nAs for the ill that afflicted you...\n\n*comment #3\n*page_break\n*text_image title.png center A Long Weekend\n\n[i]A Long Weekend — [/i]\n[i]a story about love, terror, and existential angst.[/i]\n\nThank you for playing. The ending reached for this game is:\n\n*if (theend\u003c5)\n    You killed yourself.\n*if ((theend=5) or (theend=6))\n    You decided to carry on as you always have.\n*if (theend>6)\n    You've decided to turn your life around.\n\nAs for the ill that afflicted you...\n\n*if depression>=60\n    *achieve dep\n    You suffered from severe depression.\n*if depression\u003c60\n    *if loneliness>anxiety\n        *achieve lon\n        You felt an overwhelming loneliness.\n    *if anxiety>=loneliness\n        *achieve anx\n        You felt an overwhelming anxiety.\n\nAs for your relationships, instead...\n\n*comment #4\n*page_break\n*text_image title.png center A Long Weekend\n\n[i]A Long Weekend — [/i]\n[i]a story about love, terror, and existential angst.[/i]\n\nThank you for playing. The ending reached for this game is:\n\n*if (theend\u003c5)\n    You killed yourself.\n*if ((theend=5) or (theend=6))\n    You decided to carry on as you always have.\n*if (theend>6)\n    You've decided to turn your life around.\n\nAs for the ill that afflicted you...\n\n*if depression>=60\n    You suffered from severe depression.\n*if depression\u003c60\n    *if loneliness>anxiety\n        You felt an overwhelming loneliness.\n    *if anxiety>=loneliness\n        You felt an overwhelming anxiety.\n\nAs for your relationships, instead...\n\n*if ((love=0) or (love=1))\n    *achieve eros\n    You never got over your feelings for $!{friend}.\n*if ((love=2) or (love=3))\n    *achieve anteros\n    You have developed feelings for $!{friend2}.\n\nIs there anything else noteworthy to say?\n\n*comment #5\n*page_break\n*text_image title.png center A Long Weekend\n\n[i]A Long Weekend
