<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A Long Weekend — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "longweekend", "title": "A Long Weekend", "scenes": {"choicescript_description": "Explore your own psyche in present-day London. Can you silence the lying voice in your mind and live your best life, or will you succumb to it?\n\nOver a three-day long weekend, balance your physical and mental energy in an effort to be happy. Improve your sorrow through daily actions and aim for a better future—or indulge in it, and see where it takes you.\n\n\"A Long Weekend\" is a 40,000-word interactive novel by Nathaniel Becker. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\n• Play as male, female, or non-binary; straight or gay.\n• Achieve one of nine different endings.\n• Define your inner pain through your choices—anxiety, loneliness, or depression.\n• Overcome your self-destructive behaviors with your own inner strength.\n• Find a true friend, a true love, or keep relying only on yourself.\n• Find out how your story continues in the years to come!\n\nWill you be able to turn your life into a daily wonder?\n\n[b]Content Warning:[/b] Abuse of prescribed drugs, anxiety, blood, depression, eating disorders, loneliness, medical procedures, mental illness, self-harm, risky sexual encounters, suicide, vomiting.", "choicescript_stats": "*label back\n*temp dep\n*set dep (depression*1.5)\n*temp lon\n*set lon (loneliness*1.2)\n*set mind round(100-(((dep+anxiety)+lon)/3))\n*if mind>100\n    *set mind 100\n*if mind\u003c0\n    *set mind 0\n*if energy>100\n    *set energy 100\n*if energy\u003c0\n    *set energy 2\n\n*if theend=0\n    It's ${day} ${time}.\n    *line_break\n    *if day=\"friday\"\n        *if time=\"morning\"\n            Your long weekend has just begun.\n        *if time=\"afternoon\"\n            You're halfway through the first day.\n        *if time=\"evening\"\n            The first day is almost over.\n        *if time=\"night\"\n            Your long weekend will last only two more days.\n    *if day=\"saturday\"\n        *if time=\"morning\"\n            Your second day has just begun.\n        *if time=\"afternoon\"\n            You're halfway through the second day.\n        *if time=\"evening\"\n            The second day draws to a close.\n        *if time=\"night\"\n            Only one day left.\n    *if day=\"sunday\"\n        *if time=\"morning\"\n            The last morning.\n        *if time=\"afternoon\"\n            The last afternoon.\n        *if time=\"evening\"\n            The weekend is almost over.\n        *if time=\"night\"\n            The end is almost here.\n\n    *if (name != \" \")\n        Your name is $!{name}. \n    *if (gender != \" \")\n        You're a young @{gend man|woman|person}.\n\n    *stat_chart\n        percent Mind\n        percent Energy\n\n    *if (friend != \" \")\n        Your only friend is $!{friend}.\n        *if ((love=0) or (love=1))\n            Although you are @{love+1 very attracted to|in love with} ${friend_him}, ${friend_he} sees you \"as a @{gend brother|sister|sibling}\".\n        *if love=2\n            You were in love with ${friend_him}.\n        *if love=3\n            You had a crush on ${friend_him}.\n    *if Alex>35\n        *line_break\n        Your coworker, ${friend2}, is very nice to you.\n        *if (((love=0) or (love=1)) and (sex=0))\n                *if kissed=0\n                    Maybe ${friend_he} could be your friend.\n                *if kissed=1\n                    There has been a short flirt between the two of you.\n        *if sex=1\n            You slept together after a night out.\n        *if ((love=2) or (love=3))\n            Apparently, you have feelings for ${friend_him}.\n\n    *if hobby=1\n        You have a history of self-harm. No one knows, and you think you're clean now.\n    *if hobby=2\n        You have suffered from an eating disorder in the past. No one knows, and you think you're clean now.\n    *if hobby=3\n        You have abused prescribed drugs for a while in the past. No one knows, and you think you're clean now.\n\n*if theend>0\n    *if theend\u003c5\n        Your name was $!{name}. \n        *if (gender != \" \")\n            You were a young @{gend man|woman|person}. Sadly, you died by suicide because of a severe\n            *if depression>=60\n                depression.\n                *if depression\u003c60\n                    *if loneliness>anxiety\n                        loneliness\n                        *if anxiety>=loneliness\n                            anxiety.\n        *if Alex>=60\n            You left behind ${friend2}, a coworker who had feelings for you.\n    *if theend=5\n        Your name is $!{name}. You're a young @{gend man|woman|person}.\n        \n        Your only friend is $!{friend}. Since ${friend_he} started a new relationship ${friend_he} has little time for you.\n        *line_break\n        You have an up and down relationship with a coworker of yours, ${friend2}. \n        \n        *if hobby=1\n            You have a history of self-harm. You still harm yourself from time to time, but you keep it a secret.\n        *if hobby=2\n            You have suffered from an eating disorder in the past. You still binge from time to time, but you keep it a secret.\n        *if hobby=3\n            You have abused prescribed drugs for a while in the past. You still take excessive amounts of benzos from time to time, but you keep it a secret.\n    *if theend=6\n        Your name is $!{name}. You're a young @{gend man|woman|person}.\n        \n        Your only friend is $!{friend}. Since ${friend_he} started a new relationship ${friend_he} has little time for you.\n        *line_break\n        You suffer greatly from loneliness and your unrequited love for $!{friend}.\n        \n        *if hobby=1\n            You have a history of self-harm. You still harm yourself from time to time, but you keep it a secret.\n        *if hobby=2\n            You have suffered from an eating disorder in the past. You still binge from time to time, but you keep it a secret.\n        *if hobby=3\n            You have abused prescribed drugs for a while in the past. You still take excessive amounts of benzos from time to time, but you keep it a secret.\n    *if theend=7\n        Your name is $!{name}. You're a young @{gend man|woman|person}.\n        \n        You used to be friends with $!{friend}, but you've broken away from that toxic friendship, and now you have new friends.\n        \n        *if hobby=1\n            In the past, you used to self-harm.\n        *if hobby=2\n            In the past, you suffered from an eating disorder.\n        *if hobby=3\n            In the past, you used to abuse prescribed drugs.\n        Thankfully, you started a therapy that made you feel much better.\n        \n        *if married=1\n            You married the person you believe to be the love of your life—${friend2}.\n            *line_break\n            *if haveit=\"yes\"\n                You also have @{num_p one|two|three|many} @{pets dog|cat|pet|kid}@{num_p |s|s|s}.\n    *if theend=8\n        Your name is $!{name}. You're a young\n        *if (religion !=\" \")\n            ${religion}\n        @{gend man|woman|person}.\n        \n        You used to be friends with $!{friend}, but you've broken away from that toxic friendship. You have new friends including ${friend2}, a coworker of yours.\n        \n        *if hobby=1\n            In the past, you used to self-harm.\n        *if hobby=2\n            In the past, you suffered from an eating disorder.\n        *if hobby=3\n            In the past, you used to abuse prescribed drugs.\n        Thankfully, you started a therapy that made you feel much better.\n        \n        *if (sport != \" \")\n            You started playing sports, and really got into ${sport}.\n        *if free_yn=\"yes\"\n            In your free time, you also love @{freetime hiking|to attend book club meetings|to attend plays at the theatre|to attend religious gatherings|to serve in a soup kitchen|to help out at a homeless shelter|to help out at an animal shelter|to visit the residents in a nursing home|to participate in volunteering programs|drawing|painting|to shoot photographies|to découpage|pottery crafting|sculpting|sewing}.\n    *if theend=9\n        Your name is $!{name}. You're a young @{gend man|woman|person}.\n        \n        You used to be friends with $!{friend}, but you've broken away from that toxic friendship, and now you have new friends.\n        \n        *if hobby=1\n            In the past, you used to self-harm.\n        *if hobby=2\n            In the past, you suffered from an eating disorder.\n        *if hobby=3\n            In the past, you used to abuse prescribed drugs.\n        Thankfully, you started a therapy that made you feel much better.\n        \n        *if married=1\n            You married the person you believe to be the love of your life—@{fsex Nikolaj|Nika}.\n            *line_break\n            *if haveit=\"yes\"\n                You also have @{num_p one|two|three|many} @{pets dog|cat|pet|kid}@{num_p |s|s|s}.", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n  \n  Permanently remove all advertising from the game.\n  \n  *purchase_discount adfree 2022-07-14 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n  \n  You've paid to permanently remove all advertising.\n", "endings": "*label dead\n*page_break Epilogue\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Come back in a few minutes to play the next part of [i]A Long Weekend[/i]!\n\n  Or, you can buy the game now to skip the wait.\n\n  *purchase_discount adfree 2022-06-23 $4.99 $2.99 purchased\n  *delay_break 1200\n\n*label purchased\n*if friend_he=\"he\"\n    *set fsex 1\n*if friend_he=\"she\"\n    *set fsex 2\n*if ((Alex>=60) and ((love=2) or (love=3)))\n    *set theend 1\n    You had a very sober and quiet funeral service.\n    *line_break\n    There weren't many attendees. A few relatives came from afar, a few colleagues showed up, even a couple of college buddies who live in the area.\n    *line_break\n    They were all very quiet. It was possible to hear weeping and sniffling from only one person, @{fsex a man|a woman} standing apart, on the right side of the small church.\n\n    The service is over, and outside it's raining. Not the way it usually does in the movies, but the way it rains in London. The sky is gray, the wind is blowing, the morning is turning to noon, and some of the people in the room start to leave, opening their dark umbrellas with a mechanical snap.\n\n    In the front row there is @{fsex a man|a woman} with a resigned expression on ${friend_his} face. @{fsex An older man|A man} approaches ${friend_him}.\n    *line_break\n    \"Sorry for your loss, $!{friend}.\"\n\n    The man walks away after patting ${friend_him} on the shoulder. $!{friend_he} nods, murmurs a thank you, then returns to staring ahead. @{gend The guy|The girl|The person} at ${friend_his} side leans in, whispers something in ${friend_his} ear. $!{friend} checks ${friend_his} watch.\n\n    \"You go ahead, I can't leave now. I'll see you tonight,\" ${friend_he} replies in a low voice, then gives a discreet kiss on the cheek of @{gend the guy|the girl|the other person}, who nods and walks out of the church. @{fsex The sniffing man|The sniffing woman} follows @{gend him|her|them} with ${friend_his} eyes.\n\n    *page_break\n\n    “Mackenzie?”\n\n    @{gend He turns|She turns|They turn} around. @{gend He has|She has|They have} an open umbrella, a little black coat, a dark scarf. @{gend A well-groomed beard|Light makeup|Healthy hair}. \"Yes?\" @{gend he asks|she asks|they ask}, not recognizing the person in front of @{gend him|her|them}.\n\n    \"I'm ${friend2}. A...\" ${friend_he} pauses, blocked by the lump in ${friend_his} throat. \"A friend of $!{name}.\"\n\n    Mackenzie stands in puzzlement for a moment, then a spark of understanding lights up @{gend his|her|their} eyes.\n    *line_break\n    \"Oh,\" @{gend he says|she says|they say}. \"My condolences.\"\n\n    $!{friend2} nods. \"May I ask how old you are, Mackenzie?\"\n    *line_break\n    $!{friend_he} doesn't have an umbrella, and ${friend_he}'s slowly getting soaked. Mackenzie tries to move @{gend his|her|their} umbrella to cover ${friend_him} too, but ${friend2} steps back.\n\n    @{gend The guy is|The girl is|They're} still confused. \"Nineteen,\" @{gend he finally replies|she finally replies|they finally reply}. \n    *line_break\n    ${friend2} nods. \"I met $!{friend} when I was your age,\" ${friend_he} comments, seemingly without any logical connection.\n\n    They stand in silence looking at each other for a moment longer. The blending of traffic and rain is the only noise around them.\n\n    \"Take care,\" ${friend2} finally says, walking back into the church.\n\n    Mackenzie stands there, not knowing what to think. Eventually, still pensive, @{gend he resumes|she resumes|they resume} walking towards @{gend his|her|their} destination.\n\n    *page_break\n\n    The funeral procession moves to the cemetery, where you are laid to rest in your eternal home.\n    *line_break\n    People start to walk away, now that there is nothing left to see but a simple gravestone.\n\n    ${friend2} tarries on the sidelines.\n    *line_break\n    $!{friend_his} gaze follows the few remaining people still lingering around. However, in a matter of minutes there's almost no one left, and the last person to walk away is ${friend_him}.\n    *line_break\n    $!{friend}.\n\n    ${friend2} looks at ${friend_him} moving around in ${friend_his} dry coat, the umbrella held firmly in one hand and the cell phone in the other, while exchanging some messages with who knows who.\n    *line_break\n    $!{friend} exchanging messages, kissing ${friend_his} @{gend boyfriend|girlfriend|partner}, checking ${friend_his} watch. As if ${friend_he} doesn't give a shit at all, ${friend2} reckons.\n    *line_break\n    And then, ${friend2}—${friend_he} loses it.\n\n    *page_break\n\n    \"$!{friend}!\" ${friend_he} shouts in ${friend_his} direction.\n    *line_break\n    $!{friend} turns around, surprised to see ${friend2} approaching ${friend_him}. The look on ${friend_his} coworker and friend's face is angry—no, more than that: it's enraged. ${friend2} quickly approaches ${friend_him}, fists clenched, and $!{friend} shoves ${friend_his} cell phone into ${friend_his} pocket.\n\n    \"$!{friend2}, I'm sorry for—\" ${friend_he} starts, but ${friend2} punches ${friend_him} in the face.\n    *line_break\n    The umbrella lands on the ground, smearing dirt and gravel. The wind drags it away. \n\n    \"What the fuck are you doing?!\"\n    *line_break\n    $!{friend} stares at ${friend_him} in disbelief, unable to react. $!{friend_he} brings a hand to ${friend_his} cheek, ${friend_his} eyes wide in ${friend2}'s wrathful ones.\n\n    ${friend2} is blind with rage. $!{friend_he} grabs ${friend_him} by the lapels of ${friend_his} coat, pushing ${friend_him} backwards.\n    *line_break\n    \"It's all your fault, you @{fsex fucking piece of shit|fucking bitch}! It's all your fault!\" ${friend_he} yells in ${friend_his} face. $!{friend} tries to free ${friend_him}self, pushing with ${friend_his} own arms against those of ${friend2}, but it's no use. $!{friend_he} backs away, still pushed by the other's firm grip.\n\n    \"What the fuck are you talking about? I wasn't even there! Have you lost your mind?!\" ${friend_he} replies, yelling back. A couple of passing women stare at them, murmur something, and quickly walk away.\n\n    They keep backing away, ${friend2} with ${friend_his} fists clenched around the fabric, $!{friend} d2}'s eyes widen. \"An itty-bitty...?\" ${friend_he} repeats in disbelief. Then ${friend_his} expression turns into a mask of pure fury.\n    *line_break\n    \"I loved @{gend him|her|them}!\" ${friend_he} yells in ${friend_his} face, raising ${friend_his} free arm to punch ${friend_him} again. \"I loved @{gend him|her|them}, you @{fsex fucker|bitch}! You don't know shit!\" ${friend_he} keeps hitting ${friend_him}, now with both hands. \n    *line_break\n    $!{friend} raised ${friend_his} arms to defend ${friend_him}self, bringing them in front of ${friend_his} face as a shield. Still, ${friend2} doesn't seem to care—they're drenched in water, in mud, in horror.\n    *line_break\n    \"You don't know shit about me! NOTHING, NOTHING, NOTHING!\"\n\n    $!{friend} keeps parrying the blows until the other is too tired to continue. Then ${friend_he} grabs ${friend_his} arms, taking control of the situation. $!{friend_he} moves ${friend2} off of ${friend_him}self, sitting up.\n    *line_break\n    ${friend2} lets ${friend_him}self be moved, sitting up as well in the grass. \n    *line_break\n    They both pant.\n\n    The freezing rain has now completely soaked them, but they no longer care.\n\n    They both remain silent for a while.\n\n    *page_break\n\n    \"I'm sorry, ${friend2}. But taking it out on me isn't going to change anything,\" $!{friend} concludes before standing back up.\n    *line_break\n    ${friend2} stares blankly.\n    *line_break\n    \"What am I going to do now?\" ${friend_he} murmurs. $!{friend} chuckles, bitter.\n    *line_break\n    \"What could you possibly do? This is what life is. $!{name}'s gone, but you aren’t. You'll move on like everyone else, and maybe you'll get another itty-bitty office crush,\" ${friend_he} deadpans.\n\n    ${friend2} doesn't react. $!{friend_he} pays no attention to ${friend_him} leaving, even though ${friend_he} can hear the gravel crunching under ${friend_his} leather shoes. $!{friend_he} just stands there, sitting in the rain, looking at your tombstone.\n\n    *goto_scene theend\n*if ((Alex>=60) and ((love=0) or (love=1)))\n    *set theend 2\n    You had a very sober and quiet funeral service.\n    *line_break\n    There weren't many attendees. A few relatives came from afar, a few colleagues showed up, even a couple of college buddies who live in the area.\n    *line_break\n    They were all very quiet. It was possible to hear weeping and sniffling from only one person, @{fsex a man|a woman} standing apart, on the right side of the small church.\n\n    The service is over, and outside it's raining. Not the way it usually does in the movies, but the way it rains in London. The sky is gray, the wind is blowing, the morning is turning to noon, and some of the people in the room start to leave, opening their dark umbrellas with a mechanical snap.\n\n    In the front row there is @{fsex a man|a woman} with a resigned expression on ${friend_his} face. @{fsex An older man|A man} approaches ${friend_him}.\n    *line_break\n    \"Sorry for your loss, $!{friend}.\"\n\n    The man walks away after patting ${friend_him} on the shoulder. $!{friend_he} nods, murmurs a thank you, then returns to staring ahead. @{gend The guy|The girl|The person} at ${friend_his} side leans in, whispers something in ${friend_his} ear. $!{friend} checks ${friend_his} watch.\n\n    \"You go ahead, I can't leave now. I'll see you tonight,\" ${friend_he} replies in a low voice, then gives a discreet kiss on the cheek of @{gend the guy|the girl|the other person}, who nods and walks out of the church. @{fsex The sniffing man|The sniffing woman} follows @{gend him|her|them} with ${friend_his} eyes.\n    \n    *page_break\n\n    “Mackenzie?”\n\n    @{gend He turns|She turns|They turn} around. @{gend He has|She has|They have} an open umbrella, a little black coat, a dark scarf. @{gend A well-groomed beard|Light makeup|Healthy hair}. \"Yes?\" @{gend he asks|she asks|they ask}, not recognizing the person in front of ging some messages with who knows who.\n    *line_break\n    $!{friend} exchanging messages, kissing ${friend_his} @{gend boyfriend|girlfriend|partner}, checking ${friend_his} watch. As if ${friend_he} doesn't give a shit at all, ${friend2} reckons.\n    *line_break\n    ${friend2} approaches ${friend_him}.\n    \n    *page_break\n    \n    \"@{gend He was|She was|They were} in love with you.\"\n    *line_break\n    $!{friend} turns to look at ${friend_him}. \"Sorry?\" ${friend_he} asks, taken aback. $!{friend_he} squares ${friend_his} friend, but the other wanders ${friend_his} gaze over the cemetery, tightening ${friend_his} lips.\n\n    \"$!{name}. @{gend He was|She was|They were} in love with you,\" ${friend_he} repeats. A brief silence ensues; eventually, $!{friend} sighs. \"Yeah. I know,\" ${friend_he} replies.\n\n    $!{friend} remains dry under ${friend_his} umbrella, sheltered. ${friend2}, on the other hand, seems not to care about the rain. $!{friend_his} gaze is still lost on the gravestones, ${friend_his} hands tucked in ${friend_his} pockets, an impassive expression on ${friend_his} face. Finally, ${friend_he} nods.\n    \"$!{friend_he} deserved so much better,\" ${friend2} mutters, then walks away.\n\n    $!{friend} doesn't reply. $!{friend_he} stands watching ${friend2} go, hearing the gravel crunching under ${friend_his} soles, and looking at the rain beating down on ${friend_his} head.\n    *line_break\n    $!{friend_he} knew ${friend_he} had lost two friends in one day.\n    \n    *goto_scene theend\n*if ((Alex>=35) and (Alex\u003c60))\n    *set theend 3\n    You had a very sober and quiet funeral service.\n    *line_break\n    There weren't many attendees. A few relatives came from afar, a few colleagues showed up, even a couple of college buddies who live in the area.\n    *line_break\n    They were all very quiet. No one cried, and they were all in about the same area of the church, except for one person. In fact, @{fsex one man|one woman} remained on the sidelines the entire time.\n\n    The service is over, and outside it's raining. Not the way it usually does in the movies, but the way it rains in London. The sky is gray, the wind is blowing, the morning is turning to noon, and some of the people in the room start to leave, opening their dark umbrellas with a mechanical snap.\n\n    In the front row there is @{fsex a man|a woman} with a resigned expression on ${friend_his} face. @{fsex An older man|A man} approaches ${friend_him}.\n    *line_break\n    \"Sorry for your loss, $!{friend}.\"\n\n    The man walks away after patting ${friend_him} on the shoulder. $!{friend_he} nods, murmurs a thank you, then returns to staring ahead. @{gend The guy|The girl|The person} at ${friend_his} side leans in, whispers something in ${friend_his} ear. $!{friend} checks ${friend_his} watch.\n\n    \"You go ahead, I can't leave now. I'll see you tonight,\" ${friend_he} replies in a low voice, then gives a discreet kiss on the cheek of @{gend the guy|the girl|the other person}, who nods and walks out of the church. @{fsex The lonely man|The lonely woman} waits until $!{friend} is alone, then approaches ${friend_him}.\n    \n    *page_break\n\n    \"My condolences, $!{friend},\" ${friend_he} says in a low voice. $!{friend} turns to look at ${friend_him}.\n    *line_break\n    \"${friend2}. Thank you,\" ${friend_he} replies. $!{friend_he} looks up at the casket, now raised by the funeral workers. \"How are you holding up?\" ${friend_he} asks, turning to look at ${friend_his} friend. \"I know you had a crush on @{gend him|her|them}. I'm sorry.\"\n    *line_break\n    ${friend2} shrugs, then tucks ${friend_his} hands into ${friend_his} trouser pockets. \"I didn't know @{gend him|her|them} that well, anyway,\" ${friend_he} mutters.\n    *line_break\n    The two of them head toward the exit of the church. $!{friend} stops to retrieve ${friend_his} umbrella, and ${friend2} waits for ${friend_him}.\n    \n    \"How come it always r faces, the same as everyone else's.\n    *line_break\n    A shallow, but still existing, grief.\n    *line_break\n    And that's more than others could hope for.\n    *goto_scene theend\n*if (Alex\u003c35)\n    *set theend 4\n    You had a very sober and quiet funeral service.\n    *line_break\n    There weren't many attendees. A few relatives came from afar, a few colleagues showed up, even a couple of college buddies who live in the area.\n    *line_break\n    They were all very quiet. No one cried, and they were all in about the same area of the church, equally distant from each other.\n\n    The service is over, and outside it's raining. Not the way it usually does in the movies, but the way it rains in London. The sky is gray, the wind is blowing, the morning is turning to noon, and some of the people in the room start to leave, opening their dark umbrellas with a mechanical snap.\n\n    In the front row there is @{fsex a man|a woman} with a resigned expression on ${friend_his} face. @{fsex An older man|A man} approaches ${friend_him}.\n    *line_break\n    \"Sorry for your loss, $!{friend}.\"\n\n    The man walks away after patting ${friend_him} on the shoulder. $!{friend_he} nods, murmurs a thank you, then returns to staring ahead. @{gend The guy|The girl|The person} at ${friend_his} side leans in, whispers something in ${friend_his} ear. $!{friend} checks ${friend_his} watch.\n\n    \"You go ahead, I can't leave now. I'll see you tonight,\" ${friend_he} replies in a low voice, then gives a discreet kiss on the cheek of @{gend the guy|the girl|the other person}, who nods and walks out of the church.\n    \n    The funeral workers raise your casket, ready to be taken to the cemetery. $!{friend} sighs, and willingly or not, has to accompany you to your eternal resting place.\n    *line_break\n    $!{friend_he} was your best friend, after all.\n    *goto_scene theend\n\n*label again\n*page_break Epilogue\n*temp fsex\n*if friend_he=\"he\"\n    *set fsex 1\n*if friend_he=\"she\"\n    *set fsex 2\n*if Alex>=60\n    *set theend 5\n    It works for a while.\n    \n    Life goes on as usual. ${friend2} invites you over for dinner the following Saturday. Achlys keeps putting you on edge all week, but the date goes well. Despite that, you have trouble falling asleep that night—and so the night after that.\n    \n    $!{friend} comes back from ${friend_his} trip. $!{friend_he} introduces you to Mackenzie, and despite the fling you're having with ${friend2}, you can't help but feel a sense of unease that lingers for days.\n    \n    You and ${friend2} continue to see each other for a few weeks. One night, however, you're in dreadful fear that ${friend_he} may be cheating on you.\n    *line_break\n    Anxiety makes you shout at each other, and although ${friend2} wants to reconcile, you shut yourself away for a few days.\n    \n    *page_break\n    \n    Things go on a bit up and down for a few months. ${friend2} bores you and gives you anxiety, because ${friend_he} gives you \"too much attention,\" as you tell $!{friend}. When you push ${friend_him} away though, depression grips your stomach and you can't help but seek ${friend_him} out again.\n    \n    *page_break\n    \n    You spend Christmas together, but on New Year's Eve you have a panic attack because ${friend_he} is seeing some friends. $!{friend_he} visits you at home, and you have a fight. You break up for a few days.\n    \n    In March, $!{friend} announces at work that \n    *if fsex=1\n        he has proposed to Mackenzie. @{gend He|She|They} said yes.\n    *if fsex=2\n        Mackenzie has proposed to her. @{gend He|She|They} said yes.\n    *line_break\n    You lock yourself in the bathroom where you cry for the rest of your lunch break.\n    *line_break\n    ${friend2} holds a grudge for a while.\n    \n    *page_break\n    \n    A month later, you're lying on ${friend2}'s bed when ${friend_he} suddenly asks you to move in together. You panic and promptly refuse. A huge fight ensues, in which ${friend2} throws in your face how you never got over your feelings for $!{friend}. You leave, slamming the door.\n    \n    You break up for good.\n    \n    *page_break\n    \n    ${friend2} has moved to a different office. You spend most of your time sleeping, but you hang out with $!{friend} when ${friend_he} has time for you. Unfortunately, Mackenzie is often there as well, and when @{gend he's|she's|they're} not, you discuss the wedding anyway. You suck it up just to be in ${friend_his} company.\n    \n    The wedding is in September. You attend dressed in your best @{gend suit|dress|formal wear}, but the pain you feel is clearly visible on your face.\n    *line_break\n    At the service you also see ${friend2}. You greet each other, but it's very awkward.\n    *line_break\n    You go back to your car with a panic attack.\n    \n    *page_break\n    \n    A couple of months later, $!{friend} and Mackenzie invited you and other friends to spend New Year's Eve at their home.\n    *line_break\n    During dinner, they announce that\n    *if ((fsex=1) and (gend=2))\n        Mackenzie is pregnant.\n    *if ((fsex=1) and (gend=1))\n        they're adopting a baby.\n    *if ((fsex=1) and (gend=3))\n        they're having a baby.\n    *if ((fsex=2) and (gend=1))\n        $!{friend} is pregnant.\n    *if ((fsex=2) and (gend=2))\n        they're adopting a baby.\n    *if ((fsex=2) and (gend=3))\n        they're having a baby.\n    \n    You go to the bathroom and throw up. ${friend2} knocks on the door, asks if you're okay, and you finally let ${friend_him} in.\n    *line_break\n    $!{friend_he}'s still in love with you, and ${friend_he} asks you to give it another try.\n    *line_break\n    You know damn well that it won't work this time either.\n    *line_break\n    You accept anyway.\n    *goto_scene theend\n*if Alex\u003c60\n    *set theend 6\n    It works for a while.\n    \n    Life goes on as usual. You sleep in a lot, waste your free time on social, and spend plenty of time working.\n    \n    $!{friend} comes back from ${friend_his} trip. $!{friend_he} introduces you to Mackenzie, and you feel heartbroken. Nonetheless, you congratulate them.\n    \n    The little positive feelings you used to feel, from time to time, are now completely gone. You resume\n    *if harm=1\n        to cut yourself\n    *if harm=2\n        to burn yourself\n    *if harm=3\n        to punch the walls\n    *if hobby=2\n        to binge eat\n    *if hobby=3\n        taking too many pills\n    on a daily basis.\n    \n    Things keep going on a bit up and down for a few months.\n    \n    *page_break\n    \n    In March, $!{friend} announces at work that \n    *if fsex=1\n        he has proposed to Mackenzie. @{gend he has|she has|they have} said yes.\n    *if fsex=2\n        Mackenzie has proposed to her. @{gend he has|she has|they have} said yes.\n    *line_break\n    You lock yourself in the bathroom where you cry for the rest of your lunch break.\n    *line_break\n    No one comes to check up on you.\n    \n    *page_break\n    \n    You spend most of your time sleeping, but you hang out with $!{friend} when ${friend_he} has time for you. Unfortunately, Mackenzie is often there as well, and when @{gend he's|she's|they're} not, you discuss the wedding anyway. You suck it up just to be in ${friend_his} company.\n    \n    The wedding is in September. You attend dressed in your best @{gend suit|dress|formal wear}, but the pain you feel is clearly visible on your face.\n    *line_break\n    After a while, you go back to your car with a panic attack.\n    \n    *page_break\n    \n    A couple of months later, $!{friend} and Mackenzie invited you and other friends to spend New Year's Eve at their home.\n    *line_break\n    During dinner, they announce that\n    *if ((fsex=1) and (gend=2))\n        Mackenzie is pregnant.\n    *if ((fsex=1) and (gend=1))\n        they're adopting a baby.\n    *if ((fsex=1) and (gend=3))\n        they're having a baby.\n    *if ((fsex=2) and (gend=1))\n        $!{friend} is pregnant.\n    *if ((fsex=2) and (gend=2))\n        they're adopting a baby.\n    *if ((fsex=2) and (gend=3))\n        they're having a baby.\n    \n    You go to the bathroom and throw up.\n    *line_break\n    That night you get so drunk, you can't even remember your own name. While the others are toasting at midnight, you've already collapsed into a corner.\n    *line_break\n    You know you're just in for a new year of the old you.\n    *goto_scene theend\n\n*label cured\n*page_break Epilogue\n*temp fsex\n*if friend_he=\"he\"\n    *set fsex 1\n*if friend_he=\"she\"\n    *set fsex 2\n*if Alex>=60\n    *set theend 7\n    The first appointment with your therapist goes great. On your way out of the office you text ${friend2} and ${friend_he} calls you back, excited for you.\n    \n    You see your therapist twice a week—on Mondays and Thursdays. The following Saturday, you have dinner at ${friend2}'s.\n    *line_break\n    Your date is awesome.\n    \n    You start spending more and more time at ${friend2}'s place, and one day you realize you have two toothbrushes: one at your apartment, and one at ${friend_his}.\n    *line_break\n    One of these nights you are in bed together, watching a corny Christmas movie. In the meanwhile,\n    *if fsex=2\n        you're holding her in your arms, kissing her temple every now and then.\n    *if fsex=1\n        he's holding you in his arms, kissing your temple every now and then.\n    *line_break\n    \"I love you, $!{name}.\"\n    \n    You shift your gaze to ${friend2}, who looks at you anxiously. \"... What?\" you repeat, caught off guard.\n    *line_break\n    ${friend2} bites ${friend_his} lower lip, occasionally avoiding your gaze.\n    \n    \"I know we've only been dating for a few weeks, but...\" ${friend_he} speaks so softly you have to focus to hear ${friend_his} voice. You fumble for the remote, and turn down the volume on the TV without taking your eyes off ${friend2}.\n    \n    \"But?\" you repeat, prompting ${friend_him} to continue. $!{friend_his} blue eyes continue to dart between yours and the blankets.\n    \n    \"But... the connection I feel with you is something I've never felt before. I've always liked you, but only because I didn't [i]know[/i] you, you know?\"\n    *line_break\n    You look at ${friend_him}, feeling confused. You're not sure if that was a compliment or not. ${friend2} sighs.\n    \n    \"I loved the way you were so quiet, kind but somehow distant, reserved. You always had a certain deepness in your eyes, like... like something unsaid.\"\n    *line_break\n    ${friend2} reaches for your hand, absent-mindedly caressing it. You squeeze ${friend_his} in yours.\n    *line_break\n    \"There's something your therapist said that I couldn't get out of my head,\" ${friend_he} confesses. \"What is it?\" you promptly ask, having no idea what it might be. \n    *line_break\n    \"That [i]the eyes are the window to our mind[/i]. I always thought it was just me, you know, that I had a crush on you and that because of that, I saw you differently. But no, it is quite the opposite, $!{name}. I had a crush on you because of the way your eyes sparkled when something silly happened in the office. Because of the way your eyes would avert from mine when I did something nice for you. Because of the way they darkened when you thought no one noticed.\" ${friend2} moves ${friend_his} hand, to be the one to hold yours. You let ${friend_him} do it, speechless.\n    *line_break\n    \"But I noticed, you know. And that's why I had a crush on you, because I recognised the... the preciousness behind those eyes.\"\n    \n    ${friend2} pauses, returning ${friend_his} gaze to the screen. You don't know if ${friend_he} has anything else to say, but you can't stop staring at ${friend_him}. You're dumbfounded.\n    \n    \"But it's different now. I realized that... what I was feeling was just the need to figure out if you were [i]really[/i] special. And now that I know that, now that I've kissed you...\"\n    *line_break\n    ${friend2} looks back at you. $!{friend_his} eyes are teary, but you guess yours are too, after all.\n    *line_break\n    \"Now that\n    *if fsex=1\n        I've held you in my arms,\n    *if fsex=2\n        I've slept in your arms,\n    that I've heard you laughing as we eat breakfast in bed, that I've soaped your back, that I've woken up by your side...\"\n    *line_break\n    $!{friend_he} brings a hand to your cheek, caressing it. You try to swallow, but there's a lump in your throat.\n    *line_break\n    \"Now I know that I love you. I know it because every time I wake up and you're not beside me, I feel a loneliness I've never felt before. I know it because this is the second time I've expressed my feelings for you in a few minutes, and I can't wait to do it a third and a thousandth time. Most of all I know it because, $!{name}...\"\n    *line_break\n    ${friend2} pauses, and you realise you're holding your breath. $!{friend_he} smiles at you with pressed lips.\n    *line_break\n    \"Because I'm so hoping to hear you say you feel the same way about me, and because I'm terrified you might not.\"\n    \n    \"…\"\n    *line_break\n    You were't expecting such a discourse. A laugh comes from the TV, but you barely notice the existence of a world outside the two of you.\n    *line_break\n    You take a deep breath.\n    *line_break\n    \"I love you too, ${friend2}.\"\n    \n    *page_break\n    \n    You spend Christmas together at ${friend2}'s place, where you have now brought all your things. On New Year's Eve you go out with ${friend2} and ${friend_his} friends, now also [i]your[/i] friends. You have fun, you dance, you go home, you make love. You fall asleep in each other's arms as you do every night—then you both roll over on different sides of the bed.\n    \n    You continue the therapy. You no longer hurt yourself, and Achlys' voice is reduced to an occasional, almost inaudible whisper.\n    \n    *page_break\n    \n    In March, $!{friend} announces at work that \n    *if fsex=1\n        he has proposed to Mackenzie. @{gend He|She|They} said yes.\n    *if fsex=2\n        Mackenzie has proposed to her. @{gend He|She|They} said yes.\n    *line_break\n    You congratulate ${friend_him} with a smile and a nod. $!{friend} reciprocates, even though there's now only a polite coexistence between the two of you, and only because of the common workplace. Obviously, the same goes for ${friend2}.\n    \n    $!{friend} tells people that ${friend2}, jealous of your friendship, forced you to cut ties with ${friend_him}; and that you, being a 'simp', accepted. But you and ${friend2} know that the truth is quite different.\n    \n    You have talked to your therapist at great length about $!{friend}. Dr. Kelley listened to you attentively, occasionally changing position in the chair, but never losing focus. At the end of your first conversation about $!{friend}, Dr. Kelley looked you straight in the eye, ran his fingers over the corners of his lips, and then asked you, \"Have you ever heard of 'codependency,' $!{name}?\"\n    \n    *page_break\n    \n    A few months later, you agree to ${friend2}'s request to go on a trip to France. You know it's always been a dream of ${friend_his}, so you take your time-off at the same time and leave together for a week.\n    \n    You visit Marseille first, then Lyon, Lille, and finally Paris. On your last night, you spare no expense: you have dinner at a fancy place, stay in a luxury hotel with a view of the illuminated Eiffel Tower…\n    \n    And in the most corny, cheesy and cliched possible way,\n    *if friend_he=\"he\"\n        ${friend2} takes you to a spot with a breathtaking view, kneels down, and asks you to marry him.\n        *line_break\n        You almost can't believe your eyes. The proposal comes with an engagement ring, and despite the small diamond—the best he could afford, it's still the most beautiful thing you've ever seen.\n        *line_break\n        You reply that nothing could ever make you happier.\n    *if friend_he=\"she\"\n        you take ${friend2} to a  spot with a breathtaking view, kneel down, and ask her to marry you.\n        *line_break\n        She almost can't believe her eyes. The proposal comes with an engagement ring, and despite the small diamond—the best you could afford, she looks as if she has just realised all her dreams.\n        *line_break\n        She replies that nothing could ever make her happier.\n\n    *page_break\n    *set married 1\n    \n    \"Are you completely sure you want to put the couch over there?\"\n    *line_break\n    \"Why?\"\n    *line_break\n    \"Well, because...\" ${friend2} pauses, then points to the door at the other end of the room. \"It's not fair. You'd always see me walk in from this position, and I couldn't scare you from behind,\" ${friend_he} complains jokingly. You chuckle, and lean in to give ${friend_him} a kiss on the cheek. \"That's the spirit, honey.\"\n    \n    You move to a house outside of London. Going to work takes longer, but going and coming back together, you at least have each other's company. The air is cleaner, the place quieter, and there's enough room for...\n    \n    *fake_choice\n        #Your dogs.\n            *set pets 1\n            There's enough space for your dogs, and to be exact...\n            *fake_choice\n                #Only one, actually.\n                    *set num_p 1\n                #Two.\n                    *set num_p 2\n                #Three.\n                    *set num_p 3\n                #Many!\n                    *set num_p 4\n        #Your cats.\n            *set pets 2\n            There's enough space for your cats, and to be exact...\n            *fake_choice\n                #Only one, actually.\n                    *set num_p 1\n                #Two.\n                    *set num_p 2\n                #Three.\n                    *set num_p 3\n                #Many!\n                    *set num_p 4\n        #Your various pets.\n            *set pets 3\n            There's enough space for your pets, and to be exact...\n            *fake_choice\n                #Just a couple.\n                    *set num_p 2\n                #Three.\n                    *set num_p 3\n                #Many!\n                    *set num_p 4\n        #Your future children.\n            *set pets 4\n            There's enough space for your children, and to be exact...\n            *fake_choice\n                #Only one, actually.\n                    *set num_p 1\n                #Two.\n                    *set num_p 2\n                #Three.\n                    *set num_p 3\n                #Many!\n                    *set num_p 4\n    \n    *page_break\n    *set haveit \"yes\"\n    \n    You hear that $!{friend} and Mackenzie have had their first child. You find that out at work, having stopped following ${friend_him} on social media a long time ago.  Besides, you and ${friend2} have been pretty busy with the house, the job, your hobbies, and last but not least,\n    *if pets\u003c4\n        the energy it takes to have animals.\n    *if pets=4\n        *if ((gend=2) and (fsex=1))\n            your own attempts to have a child.\n\n            Not long after, it's your turn to announce at work that you're pregnant.\n        *if ((gend=1) and (fsex=2))\n            your own attempts to have a child.\n\n            Not long after, it's your turn to announce at work that ${friend2} is pregnant.\n        *if ((gend=1) and (fsex=1))\n            your own attempts to adopt a child.\n\n            Not long after, it's your turn to announce at work that you're about to adopt a little kid.\n        *if ((gend=2) and (fsex=2))\n            your own attempts to adopt a child.\n\n            Not long after, it's your turn to announce at work that you're about to adopt a little kid.\n        *if (gend=3)\n            your own attempts to adopt a child.\n\n            Not long after, it's your turn to announce at work that you're about to adopt a little kid.\n    \n    *page_break\n    \n    One evening, you come across a TV show about psychological disorders. In the studio, an individual is talking about a persistent voice in their mind.\n    *line_break\n    You're busy feeding your\n    *if pets=1\n        *if num_p=1\n            dog,\n        *if num_p>1\n            dogs,\n    *if pets=2\n        *if num_p=1\n            cat,\n        *if num_p>1\n            cats,\n    *if pets=3\n        *if num_p=1\n            pet,\n        *if num_p>1\n            pets,\n    *if pets=4\n        *rand born_g 1 2\n        *if born_g=1\n            daughter,\n        *if born_g=2\n            son,\n    so you don't immediately realize what you're hearing.\n    *line_break\n    Then you remember Achlys.\n    \n    You sit back to think about it. How long has it been since you've heard her voice?\n    *line_break\n    Your gaze shifts from your\n    *if pets=1\n        *if num_p=1\n            dog,\n        *if num_p>1\n            dogs,\n    *if pets=2\n        *if num_p=1\n            cat,\n        *if num_p>1\n            cats,\n    *if pets=3\n        *if num_p=1\n            pet,\n        *if num_p>1\n            pets,\n    *if pets=4\n        *if born_g=1\n            daughter,\n        *if born_g=2\n            son,\n    to ${friend2} busy preparing dinner, to your hands.\n    \n    You would have once spent an evening like this, damp and wintry, curled up in bed crying. You would have tried to hide your invisible pain one day after another, not knowing what else to do. When did it change? How far have you come since you were like that person on TV?\n    \n    You cast a glance at the calendar. It's Thursday, but you haven't had therapy today. In fact, you've been having sessions once every two weeks for a while now.\n    \n    You me an avid hiker—nature and clean air are especially good for your mental wellbeing. Your favorite spots are in Sussex, so you start travelling often in the company of other people.\n         #Book club meetings.\n             *set freetime 2 \n             Before you know it, you're hooked on your weekly book club meetings: now that you're feeling better, you're able to focus on the books you love to read on lonely evenings.\n         #Plays at the theatre.\n             *set freetime 3\n             Before you know it, you're hooked on the plays you can see at the local theatre. Like your friends, you take out an annual subscription, and afterwards you often discuss about the one you just attended to—over a cup of tea, of course.\n         #Religious gatherings.\n             *set freetime 4\n             You start attending religious meetings with your friends. More specifically, you start attending...\n             *fake_choice\n                 #An Anglican church.\n                     *set religion \"Christian\"\n                     You start attending religious meetings with your friends. More specifically, you start attending an Anglican church.\n\n                     Soon enough, you feel that your Anglican faith has started to improve your mental health, and you feel more at peace.\n                 #A Catholic church.\n                     *set religion \"Christian\"\n                     You start attending religious meetings with your friends. More specifically, you start attending a Catholic church.\n\n                     Soon enough, you feel that your Catholic faith has started to improve your mental health, and you feel more at peace.\n                 #A different Protestant church.\n                     *set religion \"Christian\"\n                     You start attending religious meetings with your friends. More specifically, you start attending a Protestant church.\n\n                     Soon enough, you feel that your Protestant faith has started to improve your mental health, and you feel more at peace.\n                 #A mosque.\n                     *set religion \"Muslim\"\n                     You start attending religious meetings with your friends. More specifically, you start attending a mosque.\n\n                     Soon enough, you feel that your Muslim faith has started to improve your mental health, and you feel more at peace.\n                 #A synagogue.\n                     *set religion \"Jewish\"\n                     You start attending religious meetings with your friends. More specifically, you start attending a synagogue.\n\n                     Soon enough, you feel that your faith in Judaism has started to improve your mental health, and you feel more at peace.\n                 #A mandir.\n                     *set religion \"Hindu\"\n                     You start attending religious meetings with your friends. More specifically, you start attending a mandir.\n\n                     Soon enough, you feel that your Hindu faith has started to improve your mental health, and you feel more at peace.\n                 #A vihara.\n                     *set religion \"Buddhist\"\n                     You start attending religious meetings with your friends. More specifically, you start attending a vihara.\n\n                     Soon enough, you feel that your Buddhist faith has started to improve your mental health, and you feel more at peace.\n                 #A gurdwara.\n                     *set religion \"Sikh\"\n                     You start attending religious meetings with your friends. More specifically, you start attending a gurdwara.\n\n                     Soon enough, you feel that your faith in Sikhism has started to improve your mental health, and you feel more at peace.\n                 #Another place of worship.\n                     *set religion \"religious\"\n                     You start attending religious meetings with your friends.\n\n                     Soon enough, you feel that your faith has started to improve your mental health, and you feel more at peace.\n         #Community volunteering.\n             Before you know it, you're hooked on volunteering. You don't want anyone to suffer the way you did, and that's why you start to…\n             *fake_choice\n                 #Serve in a soup kitchen.\n                     *set freetime 5\n                     You don't want anyone to suffer the way you did, and that's why you start to serve in a local soup kitchen.\n                 #Help out at a homeless shelter.\n                     *set freetime 6\n                     You don't want anyone to suffer the way you did, and that's why you start to help out at a local homeless shelter.\n                 #Help out at an animal shelter.\n                     *set freetime 7\n                     You don't want anyone to suffer the way you did, and that's why you start to help out at a local animal shelter.\n                 #Visit the residents in a nursing home.\n                     *set freetime 8\n                     You don't want anyone to suffer the way you did, and that's why you start to visit the residents in a local nursing home.\n                 #Help my community in a different way.\n                     You don't want anyone to suffer the way you did, and that's why you start to participate in local volunteering programs.\n                     *set freetime 9\n\n             Volunteering is hard work, but it makes you go back home with a feeling of joy in your heart, and it has a very positive impact on your mental wellbeing.\n         #Art classes.\n             Before you know it, you're hooked on art lessons. In particular, you take…\n             *fake_choice\n                 #Drawing classes.\n                     *set freetime 10\n                     You start taking drawing classes, which you are very passionate about. Eventually, you, Patricia and Mohammed manage to drag other friends to the course. You have a lot of fun, and you always enjoy their company.\n                 #Painting classes.\n                     You start taking painting classes, which you are very passionate about. Eventually, you, Patricia and Mohammed manage to drag other friends to the course. You have a lot of fun, and you always enjoy their company.\n                 #Photography classes.\n                     You start taking photography classes, which you are very passionate about. Eventually, you, Patricia and Mohammed manage to drag other friends to the course. You have a lot of fun, and you always enjoy their company.\n                 #Découpage classes.\n                     You start taking découpage classes, which you are very passionate about. Eventually, you, Patricia and Mohammed manage to drag other friends to the course. You have a lot of fun, and you always enjoy their company.\n                 #Pottery classes.\n                     You start taking pottery classes, which you are very passionate about. Eventually, you, Patricia and Mohammed manage to drag other friends to the course. You have a lot of fun, and you always enjoy their company.\n                 #Sculpting classes.\n                     You start taking sculpting classes, which you are very passionate about. Eventually, you, Patricia and Mohammed manage to drag other friends to the course. You have a lot of fun, and you always enjoy their company.\n                 #Sewing classes.\n                     You start taking sewing classes, which you are very passionate about. Eventually, you, Patricia and Mohammed manage to drag other friends to the course. You have a lot of fun, and you always enjoy their company.\n\n    *page_break\n    *set free_yn \"yes\"\n    \n    You feel like you are living life to the fullest, and you always have so much to do that you hardly notice that you are not in a relationship.\n    *line_break\n    One day, you go for a beer in a pub with ${friend2}, David, Patricia, Mohammed, and one of David's new coworkers, @{fsex Nikolaj|Nika}. David and @{fsex Nikolaj|Nika} work for a law firm, and it's interesting to listen to them talk.\n    \n    Halfway through the evening, you notice the looks you get from @{fsex Nikolaj|Nika}. You realise you have impressed @{fsex him|her}.\n    *line_break\n    When it's time to leave, @{fsex Nikolaj|Nika} asks for your number. Since you found @{fsex him|her} to be a nice person, you accept.\n    \n    That night, shortly after returning home, you find a message from @{fsex him|her}. @{fsex He|She} simply texted: \"Hey, @{fsex Nikolaj|Nika} here. It was really nice to meet you))\"\n    *line_break\n    You sit down on the sofa, smiling. You press your heels against the couch, removing your shoes without taking your eyes off the screen. \"Hey, thank you. It's mutual. You seem to be a really interesting person.\"\n    *line_break\n    @{fsex Nikolaj|Nika} hasn't gone offline, and immediately replies. \"So do you. Besides being the @{gend most handsome man|most charming woman|most beautiful person} in the pub,\" @{fsex he|she} sends. You can't help but burst out laughing.\n    *line_break\n    \"You're too kind!\" you type, but you stop to think about how to continue the message. Having ${friend2} at your table is nothing new for you. Still, you can't forget how your last attempt at a relationship failed badly. And before that, with $!{friend}...\n    \n    You think about what to add for a few minutes. Finally, you quickly type and send your answer with a sigh.\n    *line_break\n    \"Thank you, @{fsex Nikolaj|Nika}. You're very attractive yourself, but right now I'm not looking for anything more than friendship. I hope you can understand.\"\n    *line_break\n    You wait for an answer, half stretched out on the sofa. You feel a slight anxiety.\n    \n    @{fsex Nikolaj|Nika} is typing…\n    *line_break\n    @{fsex Nikolaj|Nika} is online.\n    *line_break\n    @{fsex Nikolaj|Nika} is typing…\n    \n    \"No problem, I'll be happy to get to know you better as a friend. It was worth a shot)))\"\n    *line_break\n    You giggle, then you send a smiley.\n    \n    *page_break\n    \n    One evening, you come across a TV show about psychological disorders. In the studio, an individual is talking about a persistent voice in their mind.\n    *line_break\n    You're busy preparing your dinner, so you don't immediately realize what you're hearing.\n    *line_break\n    Then you remember Achlys.\n    \n    You sit back to think about it. How long has it been since you've heard her voice?\n    *line_break\n    Your gaze shifts from the TV, to your cell phone, to your hands.\n    \n    You would have once spent an evening like this, damp and wintry, curled up in bed crying. You would have tried to hide your invisible pain one day after another, not knowing what else to do. When did it change? How far have you come since you were like that person on TV?\n    \n    You cast a glance at the calendar. It's Thursday, but you haven't had therapy today. In fact, you've been having sessions once every two weeks for a while now.\n    \n    You feel better, you [i]are[/i] better.\n    *line_break\n    Your cell phone buzzes. It's a text from David.\n    \n    \"Hey! Remember that tomorrow after ${sport} we're going out for a drink with the gang!\"\n    *line_break\n    You smile, then grab the cell phone to reply.\n    \n    Yes, life can be merry sometimes.\n    *line_break\n    And you can't help but feel grateful for it.\n    *goto_scene theend\n*if Alex\u003c35\n    *set theend 9\n    The first appointment with your therapist goes great. On your way out of the doctor's office, a man holds out a flyer to you. You take it as you walk, without thinking too much about it.\n    \n    You see your therapist twice a week—on Mondays and Thursdays. During the next session, the conversation quickly turns to the \"$!{friend} topic,\" as you call it.\n    *line_break\n    You of that flyer still stored somewhere.\n    \n    A few days later, you get a job interview at a law firm. Your wide-ranging work experience seems to be of some interest to them.\n    *line_break\n    A couple of days go by before they call you back. They want you for a trial period.\n    *line_break\n    You're ecstatic, and you gladly accept.\n    \n    Time passes. You prove your worth and get hired full-time.\n    *line_break\n    You continue the therapy. You no longer hurt yourself, and Achlys' voice is reduced to an occasional whisper.\n    \n    *page_break\n    \n    There is a great variety of people at your workplace. Among your colleagues, the one you most get along with is David. You start to go out together, after work, to have a beer and a chat.\n    \n    David takes a liking to you. He starts to introduce you to other colleagues who work on different floors, and whom you have not yet met. You form a close group, and at least once a month you all go out to dinner together.\n    \n    One of these nights you notice that @{fsex Nikolaj|Nika}, an accountant at the law firm, looks at you very differently from the way ${friend_he} looks at others.\n    *line_break\n    $!{friend_he}'s kind and friendly with everyone, makes funny jokes, tells interesting anecdotes about his life. But when ${friend_he} meets your gaze, something in ${friend_his} eyes changes.\n    \n    \"So, is this a Russian thing? I went to high school with a girl from Leningrad, and she also wrote in such a meticulous and neat way.\"\n    *line_break\n    @{fsex Nikolaj|Nika} winces. \"First of all, Brian, you've just let everyone know how old you are, you old head. Leningrad has been called St Petersburg for at least thirty years,\" ${friend_he} notes. There is a brief general laugh. \"It's not my fault you weren't born yet thirty years ago, kiddo!\" retorts Brian. It's just friendly bantering—apparently, they have been working together since @{fsex Nikolaj|Nika} started working at this u're not sure why, until he reaches into his jacket pocket and pulls out an engagement ring. He asks you to marry him, because your smile is something he never wants to stop seeing.\n        *line_break\n        You almost can't believe your eyes. Despite the small diamond—the best he could afford, it's still the most beautiful thing you've ever seen. Your eyes are teary and you have a lump in your throat.\n        *line_break\n        You reply that nothing could ever make you happier.\n    *if ((friend_he=\"she\") and (gend=1))\n        Halfway through the evening, you order two flutes of sparkling wine. Nika looks puzzled, until you reach into your jacket pocket and pull out an engagement ring. You ask her to marry you, because her smile is something you never wants to stop seeing.\n        *line_break\n        She almost can't believe her eyes. Despite the small diamond—the best you could afford, the best you could afford, she looks as if she has just realised all her dreams. Her eyes are teary, and she looks like she has a lump in her throat.\n        *line_break\n        She replies that nothing could ever make her happier.\n    *if ((((friend_he=\"he\") and (gend=1)) or ((friend_he=\"she\") and (gend=2))) or (gend=3))\n        Once back at the hotel, @{fsex Nikolaj|Nika} quietly slips into your room. You're lucky that ${friend_his} family is open-minded, but you don't want any trouble while in public. So you've waited until now to kiss passionately, and when @{fsex Nikolaj|Nika} orders some sparkling wine in the room, you jokingly ask ${friend_him} what are you celebrating. $!{friend_he} just smiles.\n        \n        Once the sparkling wine arrives, ${friend_he} takes you by the hand and leads you out to the balcony. The view from the hotel is breathtaking. You want to tell ${friend_him} that, but when you turn to look at @{fsex Nikolaj|Nika}, you find ${friend_him} on one knee. Between two fingers ${friend_he} has an engagement ring, which ${friend_he} hands to you.\n        *line_break\n        $!{friend_he} asks you to marry ${friend_him}, because your smile is something ${friend_he} never wants to stop seeing.\n        \n        You almost can't believe your eyes. Despite the small diamond—the best ${friend_he} could afford, it's still the most beautiful thing you've ever seen. Your eyes are teary and you have a lump in your throat.\n        *line_break\n        You reply that nothing could ever make you happier.\n\n    *page_break\n    *set married 1\n    \"Are you completely sure you want to put the couch over there?\"\n    *line_break\n    \"Why?\"\n    *line_break\n    \"Well, because...\" @{fsex Nikolaj|Nika} pauses, then points to the door at the other end of the room. \"It's not fair. This way I can't come and tickle you from behind,\" ${friend_he} complains jokingly. You chuckle, and lean in to give ${friend_him} a kiss on the cheek. \"That's the spirit, honey.\"\n    \n    You move to a house outside of London. Going to work takes longer, but going and coming back together, you at least have each other's company. The air is cleaner, the place quieter, and there's enough room for...\n    \n    *fake_choice\n        #Your dogs.\n            *set pets 1\n            There's enough space for your dogs, and to be exact...\n            *fake_choice\n                #Only one, actually.\n                    *set num_p 1\n                #Two.\n                    *set num_p 2\n                #Three.\n                    *set num_p 3\n                #Many!\n                    *set num_p 4\n        #Your cats.\n            *set pets 2\n            There's enough space for your cats, and to be exact...\n            *fake_choice\n                #Only one, actually.\n                    *set num_p 1\n                #Two.\n                    *set num_p 2\n                #Three.\n                    *set num_p 3\n                #Many!\n                    *set num_p 4\n        #Your various pets.\n            *
