ppears to go past a few more missing floors, all the way to the top.\n\nShining down from the upper opening is a gleaming green light.\n\n“The star emerald!” Waif cries eagerly.  Immediately he starts up the staircase… until you place a hand on his shoulder.\n\n“Hang on,” you say.  “It was an effort just getting to the tower.  Let’s not go running around too fast.”\n\nYour partner steps down reluctantly.  Together you search the second floor.  There’s not much here, but at least everything doesn’t crumble to the touch.\n\nYou’re about to set foot on the steps again when Waif calls you over.  “Come.  Look at this.”\n\nHe’s standing over a moldy chest.  Your partner has already brushed the sand aside and gotten it open.  Inside is a smaller object made of delicate green glass.\n\n“Should we touch it?” he asks.  Instead of answering him you pick it up.  You turn it over in your hands a few times before realizing what it is.\n\n“It’s a puzzle box!”\n\n“A what?”\n\n“A puzzle box.  My grand-uncle had a few of them.  They’re always different, but he taught me a few tricks on how to solve them.”  The crystalline structure of the box is sleek and beautiful.  You can see there’s something inside, but refraction from the glass makes it impossible to tell what it is.  \n\n“I’ll bet I can open it,” you tell Waif.\n\n*choice\n  #Give the box a try\n    Roll two dice (or just pick a random number from 2 to 12) and enter it below:\n    *temp roll\n    *input_number roll 2 12\n    *if (roll \u003c 7)\n      *goto_scene 79\n    *if (roll > 6)\n      *set luck +1\n      *if (luck = 3)\n        *achieve luck\n      *goto_scene 23\n    *else\n      *set luck +1\n      *if (luck = 3)\n        *achieve luck\n      *goto_scene 23\n  #Put the box in your rucksack and continue upward\n    *goto_scene 122", "148": "\nYou move to the lever at the western side of the room.  You figure one door’s as good as the other.\n\n“Waif, help me pull.”\n\nThe lever comes down with the smooth ease of good engineering.  The granite block begins to lower, while simultaneously, a door rises out of the floor in the west side passage.  Even when the mechanism is fully raised, you realize it hasn’t blocked much sun.\n\n“Maybe if we—”\n\n“Aaahhhh!”\n\nSomething large and dark leaps from the top of the ancient counterweight.  Disturbed from its resting place, a huge spider lunges at Waif!\n\nRoll a single die (or just pick a random number from 1 to 6) and enter it below:\n*temp roll 5\n*input_number roll 1 6\n*if (roll = 1) or (roll = 6)\n  *goto_scene 108\n*else\n  *set luck +1\n  *if (luck = 3)\n    *achieve luck\n  *goto_scene 70", "149": "\nLeft, right… one random hallway is as good as another.  You split the difference and take the center.\n\nThe light from Waif’s torch reveals crude stone walls wet with condensation.  They seem to grow darker the further you go.  At one point the corridor makes a U-turn, doubling back on itself, and that’s when things get significantly steeper.\n\n“Careful,” you tell Waif as the floor curves even further downward.  He starts to respond when his foot skids on a patch of sand!\n\nYou reach for your friend as he slips over the edge.  He’s light.  It should be an easy catch… but as you grab for him your own feet slide out from under you on the sandy incline.  Together you fall, skidding downward, trying to avoid the burning torch along the way.  Ultimately you’re deposited into another room, dropped rudely through a hole in the chamber’s ceiling.\n\n“Ugh,” you groan as you rise slowly to your feet.  “I’ve almost had enough of this place.”\n\nWaif’s raises his torch and his eyes go wide.  “Almost...”\n\n*page_break Ouch! You're gunna feel that in the morning.\n*goto_scene 142", "15": "\nSlowly, without taking your eyes from the cheetah’s, you draw forth your canteen and uncap it.  Then, as vigorously as possible, you shake a bunch of water in the direction of its face.\n\nNothing happens.  \n\nThe cat screams in anger.  Waif is staring at you like you just grew three extra heads.  Silently you curse yourself as you drop the canteen to the floor of the cave.\n\nDid you really just do that? Let's pretend you didn't, and try something else.\n\n*choice\n  #Try fighting the cheetah off with a torch\n    *set fight +1\n    *if (fight = 2)\n      *achieve fighter\n    *goto_scene 42\n  #Run blindly into the next cave\n    *set runaway +1\n    *if (runaway = 2)\n      *achieve runaway\n    *goto_scene 95", "150": "\n“Forget it,” you shout to Waif.  “Just run!”\n\nYou turn your backs to the wave of insects and start running.  Waif is just ahead of you.  The ants are swarming behind you, surging forward.  You can hear the rustling of their carapaces as they slide against and climb over each other.\n\nThere’s a brief, heart-stopping moment when you’re sure they’ve caught you.  You can actually feel the creatures crawling up your feet, skittering beneath your pants leg, biting you in the calves…  But the pain never comes.  Either it’s all in your head, or you’re too numb to feel it.  You want to turn around, to see if you’ve beaten them.  But as Waif glances back over his own shoulder, the fear in his eyes tells you not to.\n\nFinally Waif slows, mere seconds before it feels like your heart is going to explode.  You take it down to a jog, then a walk.  When you finally look back you see only a dozen or so ants left in the street, crawling in mindless circles.\n\n“That… was… close…” you breathe.  “I… I don’t…”\n\n“Take it easy,” Waif tells you.  “We’re safe.”  Not only hasn’t he broken a sweat, he isn’t even out of breath!  You don’t know whether to be angry or jealous.\n\nYou rest until your breath comes back, helped along by a cool drink from your friend’s canteen.  When you look up, the avenue you’re on has reached a junction point.  One road heads east into the rising sun.  The other stretches in the opposite direction.\n\n*choice\n  #Go east\n    *goto_scene 13\n  #Go west\n    *goto_scene 82", "151": "\nYour legs shake as the floor grumbles beneath your feet.  Frantically you look down.  Sand is scattered in small piles around you.\n\n[i]Earth is key…[/i]\n\n“Waif!” you cry.  “Help me gather some sand!”\n\nCupping your hands together, you start scooping up sand and dumping it into the altar.  As expected, it runs straight out of the holes on all four sides.  But something else happens too.  The floor seems to be slowing down.\n\n“Keep going!”\n\nYou both alternate, taking turns scooping and loading the altar with sand.  As you develop a rhythm the floor slows its ascent even more.  But it still doesn’t stop…\n\nWaif’s hand closes over your shoulder as he suddenly points upward.  “Look!”\n\nA number of stones have retracted, creating a hole in the ceiling.  There’s a glyph carved beside the opening you hadn’t seen before.\n\n“Water!” Waif translates.  “Water, life!”\n\nWaif drags you over until you’re standing directly beneath the hole.  Arms at your sides, the two of you hold your breath as you’re pushed upward, straight through the new opening.  The floor slams into the ceiling with a dull [i]BOOM[/i], knocking you right to your knees.\n\n“Here!”\n\nWhen you look up again, you’re in the equivalent of a stone cylinder with no roof.  Waif has already climbed out.  He extends a hand downward and pulls you into the upper chamber.\n\n*page_break Pretty slick escape!\n*goto_scene 142", "152": "\nYou continue along the shadowy corridors until they spill you into a long, narrow hallway.  The floor is different here.  Instead of the smooth mortared flagstone you’ve been walking on the entire time, this floor is made up of square clay tiles.\n\n“Hang on,” you say as Waif moves to step into the hall.  “Something’s up here.”\n\nHolding the torch low, you can see the tiles come in three colors: white, black, and red.  They seem randomly distributed along the length of the hall in no distinguishable pattern.\n\n“We have to go through here,” your partner shrugs.  He points to a dark exit at the opposite end.  “There’s no other way.”\n\nLooks like you'll need to tread carefully. Lift your leg and make a choice:\n\n*choice\n  #Step on a white tile\n    *goto_scene 170\n  #Step on a black tile\n    *goto_scene 61\n  #Step on a red tile\n    *goto_scene 113", "153": "\nYou push your palm against the obelisk key and begin to turn counter-clockwise.  The stone shifts beneath your hand…\n\n“Wait!”\n\nWaif’s hand slaps itself over your wrist.  You stop.\n\n“The [i]right[/i] way is NOT the left!” he exclaims.  “That means you should turn it to the right!”\n\nYou pause in confusion for a moment, and then the answer hits you.  Waif’s right!  Whew!  Good thing he’s here.\n\n*page_break Turn the obelisk key to the right\n*goto_scene 47", "154": "\nYou continue on through the darkness (who would’ve thought?) feeling your way around the room.  As you explore the area for some sort of way out, you find the chamber you’re in is little more than a great big cave.\n\n“Look,” Waif says.  “Stuff.”\n\nA heap of old tapestries is the only indication of human presence down here.  They rest in a large, rotting pile, so far gone it’s impossible to tell what they once represented.\n\n“Do you think the—”\n\nWaif stops talking as something shifts in the darkness.  A smell washes over the room.  It’s a powerful earthy smell, all mold and funk and putrescence.\n\n“Watch out!”\n\nLike something out of a living nightmare, an enormous subterranean slug looms over you.  Somehow, down here in the darkness, the creature has grown to gargantuan proportions.  Its tentacles probe the air blindly, reaching for something.  Anything…\n\n*page_break\n\n*If (salt = true)\n  *goto_scene 52\n*Else\n  *set fight +1\n  *if (fight = 2)\n    *achieve fighter\n  You're going to have to fight the slug off! Roll two dice (or just pick a random number from 2 to 12) and enter it below:\n  *temp roll 5\n  *input_number roll 2 12\n  *if (roll \u003c 8)\n    *set luck +1\n    *if (luck = 3)\n      *achieve luck\n    *goto_scene 35\n  *if (roll > 7)\n    *goto_scene 168", "155": "\n“I’m not guessing which gems go where,” you say.  “Let’s just take the left hallway.”\n\nWaif casts a hungry look back at the jewel-studded wall, but still doesn’t protest.  Together you enter the leftmost corridor.  As you walk side by side into the darkness, the air gets colder.  The walls take on moisture as well. \n\nAll of a sudden Waif halts.  “Wait,” he says warily.  “I think I heard something.”\n\n“Heard what?”\n\n“I’m not sure.  Some kind of—”\n\n[i]BOOM![/i]\n\nAn ear-splitting crash precedes a gargantuan stone block dropping straight down from the ceiling.  It lands a mere six feet in front of you, sending up a plume of grey dust and totally blocking the way.\n\n“Donovan!  You okay?”\n\nA chill rockets through your body, causing the hairs on your arms and neck to stand on end.  If your partner hadn’t stopped when he did, you’d be a pancake right now.\n\n“Uhhh… thanks?”  Even in the orange torchlight you’re pretty sure you’re white as a ghost.\n\nWaif puts a consoling hand on your shoulder and turns you gently around.  “Let’s pick another hallway.”\n\n*choice\n  #Take the hallway on the right\n    *goto_scene 68\n  #Take the center hallway\n    *goto_scene 149", "156": "\nYou look from one glyph to the other.  At first glance they all look the same.  But there has to be something.  Something to distinguish the one right answer from the five wrong ones…\n\n“Wait!”  You practically throw your rucksack from your back.  Waif watches as you rifle through it and produce your grand-uncle’s journal.\n\n“Remember what it said on the back of the map?” you cry.  You find the page and flip it over.  “Here: ‘It takes [i]nine lives[/i] to find the Hall of Kings’.”\n\nWaif still looks confused.  “So?”\n\n“The cat!  That’s what Murdoch meant!”  You point up at the smooth curves of the feline glyph.  “The [i]cat’s[/i] the one who has nine lives!”\n\nYour partner’s face curls into a sly grin as it finally sinks in.  One by one he points to the other openings.  “From six less five…”\n\n“Exactly!”\n\nShuddering with excitement, you pass beneath the cat glyph.  The hall is simple, undecorated.  It ends in a plain stone door, covered with more glyphs.\n\n“They’re names,” Waif says.  “The names of all those who ruled Atraharsis.”\n\nJust as he finishes his sentence a hollow boom echoes from somewhere deep below.  The door grinds open.  Centuries of dust and dirt fall away, revealing more darkness.\n\nThe torchlight flickers, probably because Waif’s arm is shaking.  Silently you take it from him and hold it out before you.\n\n“Come on,” you say.  And without another word you disappear into the wide, sweeping chamber…\n\nThe room is enormous.  It goes on for as far as you can see.  Light flares as Waif ignites a second torch from his pack.  Suddenly the illumination is reflected everywhere… by polished shields, glimmering jewels, and long stacks of gleaming gold!\n\nYou found it!  The Hall of Kings!\n\n*page_break\n\n*image hall_of_kings.jpg\n*achieve hallofkings\n\n*page_break\n*set jewel_bag true\n*achieve jewel_bag\n*set treasures +1\n*If (treasures = 2)\n  *achieve treasures2\n*If (treasures = 4)\n  *achieve treasures4\n*If (treasures = 6)\n  *achieve treasures6\n\n*check_achievements\n*If (((((((((choice_achieved_jade_bookends) and choice_achieved_coin_pouch) and choice_achieved_jewel_bag) and choice_achieved_crystal_box) and choice_achieved_silver_ingots) and choice_achieved_serpent_ring) and choice_achieved_pearls) and choice_achieved_amethyst) and choice_achieved_diamond_amulet)\n  *achieve all_treasure\n\n“I… I don’t belie—”\n\n“Oh you’d [i]better[/i] believe it!” you cry exuberantly.  The slap on the back you give him almost knocks Waif over.  “We’re finally here!”\n\nYou practically dance down the center of the enormous hall.  Tall statues line both sides, beautifully carved in the likeness of men and women.  The rulers of Atraharsis, you realize.  The founders, the scholars, the kings and queens.  All of them are here, preserved in marble, their names and deeds engraved on stone tablets beneath their feet.\n\nAnd that’s not all.  Each king and queen has been honored in other ways too, as gifts from the people of their reign litter the floor around each statue.  You see coins, gems, jars of spices and incense.  Idols of gold and silver, ivory and jade.  Chests overflow with totems and trinkets.  Waif picks up a jeweled dagger, chased with precious metals.  You blow the dust from something nearby, and a diamond-studded tiara is revealed.    \n\nThe walls behind each ruler are set with mosaics and other great works of art, presumably spinning tales of the highlights of their life.  There’s more than you could ever take, or carry, or even spend.  It’s overwhelming, yet humbling at the same time.\n\n“This… this is crazy,” you say.  “I don’t know what else to say.”\n\nWaif places a bag of jewels in your hand, each one so big and perfect it doesn’t even look real.  “Say you’ll take what you need,” he tells you, “to save your grand-uncle’s estate.  Say you’ll honor his memory, as the people of Atraharsis honored the memory of their own ancestors.”\n\nYou nod quietly.  Once again you find yourself wishing your grand-uncle could be here.  Perhaps he is, you think fondly.  At least in spirit.\n\nWaif’s voice breaks you from your thoughts.  “Donovan.  Come over here.”  At the other end of the room, a simple pedestal rests against the far wall.  Waif is huddled over it, pointing to a series of glyphs just above.\n\n*page_break\n\n“What does it say?” you ask.  \n\nWaif translates:  “Place here man’s greatest treasure.”  \n\nThere’s silence in the room as you pause, considering.  \n\n“Greatest treasure?”  Waif repeats.  He glances around the room.  “That could be anything.  I mean, just look at all of this!”\n\nYou rub your chin.  “Or maybe it means something else,” you say.\n\n“Like what?”  All of a sudden Waif’s eyes light up.  “Water!” he cries.  “We’re in the desert, maybe the greatest treasure is water?”\n\n“Could be,” you allow.  Your friend stops in the middle of grabbing his canteen.\n\n“Life?” Waif offers.  “After all the danger we’ve been through, maybe man’s greatest treasure is life itself?”\n\nHis new answer sounds better, but still you’re not so sure.  How could you put ‘life’ on the tiny pedestal?  It must be something else…\n\n*choice\n  #You know man's greatest treasure\n    *temp answer\n    *input_text answer\n    *if (answer = \"knowledge\")\n      *goto_scene 96\n    *if (answer = \"KNOWLEDGE\")\n      *goto_scene 96\n    *if (answer = \"Knowledge\")\n      *goto_scene 96\n    *else\n      Waif makes a face. \"I'm not sure '${answer}' is man's greatest treasure...\"\n      *page_break Huh. Oh well.\n      *goto_scene 165\n  #You don't know it, so you offer up another treasure\n    *goto_scene 165", "16": "\n“Stay here,” you tell Waif.  “And back me up if anything goes wrong.”\n\nYou back away slowly and circle around the outside perimeter of the fire pit.  No one’s ever accused you of being light on your feet, but the sand muffles your footsteps to where you feel like you’re being sufficiently stealthy.  By the time you get to the opposite side of the circle, the dark figure hasn’t moved.  He stands there perfectly still, leaning casually against the pillar.\n\nWithout thinking you rush him.  You’re not sure why, but for some reason it seems important to have the element of surprise.  The figure does absolutely nothing as you approach.  Either that, or he doesn’t even see you…\n\nAt the last possible second you realize your mistake.  You change direction, and rather than slam full force into the pillar itself you go sprawling headlong into the fire pit.  Dust and dirt fly everywhere.  You also enjoy the distinctly new sensation of getting sand up your nose.\n\nYou’re brushing off the last of the charcoal as Waif runs up to you.  He’s laughing.\n\n“He’s over there,” he points.  Off to your right, the statue of a scholarly man stands tall on a worn pedestal.  “If you hurry you can still catch him!”\n\nYou return Waif’s humor with a twisted smirk.  The figure on the pillar was nothing more than a shadow!\n\n“At least you searched the fire pit,” Waif quips.  “Come.  We haven’t checked these roads yet.”\n\nTwo very broad avenues lead away from the fire pit.\n\n*choice\n  #Take the west road\n    *goto_scene 124\n  #Head east\n    *goto_scene 103", "160": "\nFor some reason you have a good feeling about the hawk glyph.  “Let’s take that one.”\n\nPassing beneath the great bird you walk a dark corridor for what seems like a very long time.  The floor feels like it slopes upward in the darkness, or maybe it’s just your imagination.\n\n“This doesn’t seem right,” you wonder aloud.  “I think—”\n\nYou’re rocked as the ground beneath you suddenly shakes.  Dust and debris crumble from the ceiling, filling your eyes, shrouding your vision as the rumble grows to an almost deafening roar.\n\nWaif points frantically upward.  “Light!”  Sure enough, sunlight streams in from several cracks in the masonry above.  Then a tremendous rushing sound drowns out everything else, and you’re being flung down the corridor by a torrent of icy cold water.\n\n“The river!”\n\nDarkness swallows you as the torch is snuffed out.  You can’t fight it.  There’s nothing to do but keep your head up as you roll with the churning, swirling rapids.  Thankfully, the river isn’t pulling you down.  It’s pushing you up instead, faster and faster, until you crash hard against the ceiling and break through, into the blinding light of the desert sun.\n\nAtraharsis is behind you… but the city is sinking!  A cloud of dust swirls high into the air as the broken walls and towers are once again swallowed beneath the sands.  You and Waif are deposited on the bank of a temporary oasis, by waters that recede even as you stumble to your feet.  Eventually you’re left standing at the edge of a rubble-strewn field.  Only a few scattered pieces of marble and sandstone give the slightest indication that a city once stood here.\n\n*page_break What now?\n\n*achieve escape1\n\nWaif is the first to break the silence.  “I wonder if we made the right choice?”\n\nYou think of your lost star gem, and the other star jewels that you missed.  About all the treasures hidden throughout the city, and of course, the Hall of Kings.  “No,” you tell him.  “I’m pretty sure we messed up.”\n\nLying in the sand nearby you notice your rucksack.  At least you still have that, and whatever other valuables you may have found.  It might not be enough to save your grand-uncle’s estate, but you also have the most important treasure of all: your life. \n\nAs you lift your pack the obelisk key rolls out.  It stares up at you playfully from the sand.\n\n“Come on Waif,” you smile.  “Looks like Atraharsis is done with us… for today at least.”\n\n\n*goto_scene ending", "162": "\nWaif points to a door that wasn’t there before.  Beyond it you find a tunnel, long and straight and ending in a patch of blue sky.  The walls shake as you sprint down its length, holding your breath against plumes of thick, choking dust.  A good part of one wall caves in right in front of you, but you manage to hurdle it without breaking stride.\n\nThere’s one last violent tremor and then you’re through; the tunnel spits you out into the desert, to bake beneath a blazing yellow sun.  You want to flop down in exhaustion.  But as Waif pulls you free of the opening, past the broken remnants of the hidden door, he points backward.  “Look!  The city!”\n\nSomehow you’re already beyond the shattered city walls.  Yet Waif is still tugging you along, ushering you frantically in the opposite direction.   And then you see why:\n\nAtraharsis is sinking.\n\nLong, sweeping dunes collapse around it as the city is sucked beneath the desert floor.  You watch it all go — every wall, every stone, every shattered home and palace.  As the last of the broken towers are swallowed a great cloud forms in the air overhead.  It looks like the sandstorm you encountered last night, only much thicker and a lot more concentrated.  The ground still rumbles beneath you.  The sand still shifts under your feet.\n\nWhen the dust clears you’re standing on the edge of a bleak, barren plain.  Broken bits of marble and cracked sandstone are the only indications that anything once stood here.  A few hours from now, these too will be swallowed by the dunes themselves.\n\n“Back where it belongs,” Waif says solemnly.  “The city beneath the sands.”\n\nYou stand there for a long while, just staring back at the void where Atraharsis used to be.  Then it’s time to go.  Climbing back up the cliff face is hard, especially in the mid-day sun with canteens that are nearly empty.  But you make it.  You make it all the way back to your camp, when all of a sudden…\n\n“[i]Young![/i]”\n\n*page_break Who's that?\n\nYou whirl at the sound of a gruff voice.  Standing between you and your tent is the hulking, mustached form of John Sullivan.\n\n“What was all that?” he demands.  The big adventurer is flanked by another two men.  They’re both as sun-bronzed as him, but not nearly as huge.  \n\n“What was what?”\n\nHis face goes sour.  “Don’t give me that!  The rumbling!  The shaking!  All those tremors — don’t tell me you didn’t hear any of that!”\n\nSlowly you turn toward Waif.  His face is the picture of innocence.  “Did [i]you[/i] hear anything?” you ask him.\n\n“No,” Waif says.  “Not that I recall.”\n\nSullivan goes red.  He scans your campsite, which at this point is nothing more than a few smoldering coals and single tent shredded by last night’s storm.  “Well what the heck have you been doing up here?”\n\nYou give a casual shrug.  “We were going to have a breakfast, actually,” you say.  “A bit late, but if you wanted to—”\n\n“Forget it!” Sullivan cries. His mouth curls into a snarl.  “Looks like you’re done here anyway.  Have been for a while.”  He turns to stomp off.  Before he does, his eyes shift to your partner.\n\n“C’mon Waif,” he spits.  “We need every man today, so I guess you’re—”\n\n“No.”  The word is firm.  Unmistakable.  But from the look of confusion on Sullivan’s face, you’d think Waif was speaking an entirely different language.\n\n“Did you just say [i]no[/i]?”\n\n“Yeah,” you say, stepping forward.  “He did.”  You stand tall now, beside your friend.  “Oh, and one more thing.  His name’s not ‘Waif’.  It’s [i]Renn[/i].”\n\nSullivan’s eyes flare.  He almost says something… almost, but not quite.  Then he shakes his head and storms away.  You watch silently until he and his men disappear over the next ridge.\n\n“Thanks,” Waif says.  His voice is low now.  Choked up and full of emotion.  But you shake your head at him.  \n\n“No,” you tell him. “I should be the one thanking [i]you[/i].  None of this would’ve happened without your help.  I would’ve never found Atraharsis, or the Hall of Kings.  I would’ve never recovered the star jewel.  Or rather, [i]almost[/i] recovered it…”\n\n*page_break\n\nWaif smiles.  You can’t help but notice it’s a weird smile, though.\n\n“Yeah…” he says.  “About that…”\n\nOne hand fishes into his pocket.  When it comes out, he’s holding the star jewel.  It’s even more beautiful in the sun.  Blinding, even.\n\nYou just stand there.  Dumbstruck.\n\n“What!  I… I… [i]HOW[/i]?”\n\nWaif holds out the jewel and drops it into your hand.  It takes up your entire palm.  He turns sideways, gesturing with one hand to accentuate how small and thin he actually is.  \n\n“You’re right,” he says.  “I [i]am[/i] Renn.  But sometimes, it’s good to be Waif too...”\n\n*achieve ultimate\n\n[b]You found gold, gems, treasure.  You located the Hall of Kings, won a star jewel, and recovered the long-lost knowledge of Atraharsis.[/b]\n\n[b]CONGRATULATIONS![/b]\n[b]YOU HAVE REACHED THE ULTIMATE ENDING![/b]\n\nCheck out the full Ultimate Ending series!\n*line_break\n*link www.UltimateEndingBooks.com\n\nYou may go to www.ultimateendingbooks.com/extras.php and enter code\n*line_break\n[b]ST17490[/b]\n*line_break\nfor tons of extras, and to print out your Ultimate Ending Book One certificate!\n\n*choice\n  #Play TREASURE OF THE FORGOTTEN CITY again\n    *goto_scene startup\n  #About the Authors\n    *goto_scene authors\n  #Check out a sneak peek for Ultimate Ending #2: THE HOUSE ON HOLLOW HILL\n    *goto_scene sneak_peek\n  #End the game\n    *goto_scene ending", "165": "\n“Maybe it just wants our biggest treasure,” you say, “before allowing us to leave.  You know, as a kind of sacrifice.”\n\nWaif scans the chamber again as if seeing it for the first time.  “You could be right,” he says.  “Now that you mention it, I don’t see any sign of an exit anywhere.”\n\nTogether you search for the best possible offering.  You settle on a magnificent scepter of gold, studded with sapphires, rubies, and emeralds.  It must’ve belonged to someone very important.  One of the more beloved rulers of Atraharsis.\n\n“Here we go.”  Gingerly you lay the jeweled rod on the plain stone altar.  An area beneath the object begins to sink, lowering the scepter smoothly into the floor.\n\nYou wait.  For an agonizing minute, nothing occurs.  Then a series of noises begins — hollow booms, deep in the earth, far beneath your feet.\n\nA door opens.  Light streams in.  You see a tunnel that slants upward for a long while… and a second door near the top, open to the sky.\n\n“That was it!” Waif cries.  “We did it!”\n\nQuickly you gather your things.  Each of you brings a hand-picked array of treasure, and you take a few moments to stuff it securely in your packs.  While you do, the noises beneath your feet continue.  They grow louder in volume, until finally the Hall itself starts to rumble.  \n\n“Let’s go,” you say sternly.  “Now.”\n\nRocks and debris begin to shake from the ceiling, filling the hall with plumes of cascading dust.  The two of you run for the exit.  You stop to look back one last time on the grandeur of the Hall of Kings, willing your brain to emblazon this moment so you can enjoy it for the rest of your life.\n\nThe ground shakes as you race down the tunnel.  It’s long — longer than it first looked — and in a moment’s panic you wonder if you’ll make it in time.  You imagine the irony of losing everything at the very end, but then you break free, hurtling past the once-hidden opening and into a world of sun and azure sky.\n\n*page_break\n\n*achieve escape2\n\nYou look up and are surprised to find yourself beyond the city walls.  Sand rushes down from two different hillsides in an avalanche of movement.  It feels like the entire desert is shaking.\n\n“Look!” Waif cries.  “The city!”\n\nNot far behind you, Atraharsis is sinking.  You watch the buildings go, then the walls, then the broken minarets.  You continue to scramble backward, throwing one arm over your eyes as the last tower is covered in sand.  A swirling cloud of dust rolls over you, very much like the sandstorm that started it all.  When the smoke clears, there’s nothing left where a city once stood.\n\nWaif doubles over in a fit of coughing.  He looks grey from head to toe — you’re both totally caked with dirt and dust.  “The city beneath the sands,” he finally says.  “Gone again.”\n\nYou heft your rucksack with one hand.  It’s pleasantly heavy.  “Gone but not forgotten,” you chime in.  Waif laughs, and together you turn in the direction of your camp.\n\nA smile paints its way across your face as you walk back.  Aside from a few scrapes and bruises, you made it out virtually unscathed.  Best of all you fulfilled your grand-uncle’s lifelong dream.  His estate will be safe now, his legacy secured for generations to come.\n\n“You know,” Waif says, pointing at the distant obelisk.  “I wouldn’t mind trying for one of those star gems again.  Not right now,” he adds hastily, “but you know…  someday….”\n\nThe obelisk key is a five-pound lump pressed into the small of your back.  “Yeah, maybe,” you say with a grin.  “Someday…”\n\n\n*goto_scene ending", "167": "\nVery carefully, you and Waif begin picking your way through the streets of Atraharsis.  The going is slow at first.  Rock and rubble lay strewn everywhere; there’s not a building in the city that hasn’t lost a good portion of its structure to the ravages of time.  Sand is everywhere as well.  It’s piled high against the city’s pitted stone architecture, leaving sweeping dunes that rise and fall in most of the open areas.\n\n“There’s some sort of a square through there,” you point out.  Up ahead, through a dirt-choked alleyway, you can see a wide swath of worn cobbled road.  “Let’s see what it is.”\n\nYou’re leading your partner beneath the shadows of two very decrepit-looking buildings when you feel the ground begin to rumble.  The rumble turns into a full-blown shake as the noise increases in volume, and plumes of dust begin rising from every visible surface.\n\n“Get against the walls!” you shout.\n\nSince the walls themselves are shaking this seems counterintuitive, but a little protection is better than none at all.  Across from you, on the opposite side of the alley, Waif is huddled in a tight ball.  There’s a shifting, grinding noise, and then suddenly an enormous piece of the building comes loose!\n\nQuick! Roll a single die (or just pick a random number from 1 to 6) and enter it below:\n*temp roll 5\n*input_number roll 1 6\n*if (roll = 1) or (roll = 2)\n  *goto_scene 63\n*if (roll = 3)\n  *goto_scene 137\n*else\n  *set luck +1\n  *if (luck = 3)\n    *achieve luck\n  *goto_scene 115", "168": "\n*achieve slug\n\n“Waif!” you shout.  “Ummm… your torch!”\n\nYour partner is already waving the firebrand at the slug’s massive body.  It might feel the heat, but being down here for its entire life has rendered the creature totally blind.\n\nRetreating along the corridor you came from is not an option.  You’d only be trapped against the stone portcullis.  All you can do is look for another exit, so you circle along the outer wall of the chamber.  Waif keeps the slug at bay as your fingers dance in the darkness, searching for any kind of opening.  Then…\n\n“Wait… stop!  Look OUT!”\n\nYou forgot about the tapestries!  As you trip backward over the moldering pile, the slug shifts in your direction.  The dust-caked fabric breaks your fall, but the last thing you see is the enormous slime-coated monstrosity slamming down on you.\n\nA bit gross, but this is definitely\n\n\n*goto_scene ending", "169": "\nThere are too many blocks, too many combinations.  Too much margin for error.  Your gaze shifts back to the marble column.\n\n“Think you can climb it?” you ask Waif.  He nods.  Sorta.\n\nYou step back as he gets to it.  Remarkably, he makes solid progress.  Waif’s fingers and toes find minuscule cracks and fissures in the column’s surface.  In just a couple of minutes, he’s halfway up.\n\n“What’s that?” he asks abruptly.  You listen, but you don’t hear anything.  To your surprise, Waif slides back down the column.  He cocks his head curiously, then his eyes go wide and he heads for the staircase.\n\n“RUN!”\n\nThere’s no time to ask questions.  With a last reluctant look toward the star emerald, you fly down the steps after your friend.  It’s not until you reach the second floor that you hear it.  Or rather, you [i]feel[/i] it...\n\nThe Queen’s Tower is shaking.\n\nA rumble begins somewhere beneath you.  It grows louder and louder as the floor trembles.  In no time, the Tower fills with dust.  Chunks of stone break free from the walls, creating deadly projectiles that cartwheel downward all around you.\n\nWaif keeps glancing back to see where you are.  His eyes urge you to hurry.  At long last you reach the bottom, where the two of you go flying out of the Tower entrance.  You run far out into the street, not stopping until you’re several blocks away.\n\n[i]CRASH![/i]\n\nFrom a safe vantage point, you and Waif watch the strange yet beautiful sight of the Queen’s Tower collapsing in upon itself.  A wave of harmless dust rolls over you both, and then you’re staring at nothing but a large pile of rubble.\n\n“That thing stood for four thousand years,” you say with as serious a face as possible. “And you knocked it down in only ten minutes.”\n\nWaif looks back at you horrified.  “But I… I didn’t…”  He stops only when you break out laughing.\n\n“Relax,” you tell him with a pat on the back.  “There are still two other jewels in this city to go after.”\n\n*page_break Let's try not to destroy any more pieces of ancient history.\n*goto_scene 131", "17": "\nYou look at Waif and laugh.  “You’re being silly, man.  We could use some luck.”\n\nWith that you flip the quarter high into the air.  It catches the sun for one gleaming instant, then drops into the four-thousand year old well.  The two of you look at each other, half expecting something to happen.  Nothing does.\n\n“I didn’t hear it hit bottom,” Waif says.\n\n“Probably landed in the sand.”\n\nThe two of you lean over the well shaft one last time in an effort to see something.  As you do, Waif’s torch illuminates three distinct symbols carved side-by-side into the stone: an owl eating a snake eating a rodent.\n\n“What’s that about?” you ask.\n\nWaif shrugs.  “I don’t know.  Circle of life?”  He seems a lot more relieved now that the coin-toss is over.  “Say, what did you wish for anyway?”\n\nYou laugh again, this time patting him on the back so hard he almost falls over.  “Can’t tell you or it won’t come true.”\n\n*page_break Hey, a rule is a rule.\n*goto_scene 33", "170": "\n*achieve colorblind\n\nYou decide to try a white tile.  Gingerly you press down on it with your foot… and nothing happens.\n\n“White’s safe,” you guess.  “Let’s try red.”\n\nYou step on a red tile.  Then a black one.  There’s no reaction at all.  You can’t help but feel silly.  The whole thing is nothing more than a fancy tiled corridor.\n\n“Well that was anti-climatic,” you tell Waif.  “Let’s go.”\n\nThe torchlight bounces gently as the two of you make your way toward the opposite end of the hall.  You’re about halfway down when…\n\n[i]CLICK![/i]\n\n“What was that?” you ask nervously.\n\n“I— I’m not sure,” Waif says.  “All I did was step on this white tile and—”\n\nA grinding noise erupts from your left and right, followed by a loud hissing sound.  The room begins filling with—\n\n“SAND!”\n\nDozens of small doors have opened in the walls on both sides of the hallway.  Sand pours in from all directions.  It piles rapidly all around you.\n\n“Quick, Waif!” you shout.  “Get back to the—”\n\nYou can’t hear him.  You can’t see him.  Everything is swallowed by darkness as Waif and his torch are swept beneath several tons of cool desert sand.  You stumble backward in the blackness, trying to feel your way along the wall until you can no longer move.\n\nYour feet are buried.  Then your knees.  You struggle against the rising sand, hoping for a miracle but realizing this is probably\n\n\n*goto_scene ending", "18": "\nThe avenue you’re walking widens into a broad concourse.  Soon a structure looms in the distance, tall and impressive and leaping up toward the sky.  The shape is unmistakable.  When you were young, your grand-uncle must’ve pointed it out to you a hundred different times on Murdoch’s map.\n\n“The Ziggurat!”\n\nThe massive, multi-tiered pyramid is a darker stone than the rest of the city.  You wonder where the giant stone blocks were cut from, how they got here, who built the thing and why.  Too many questions.  Too long ago.\n\n“Your map has one of the star jewels next to the Ziggurat,” Waif says.  “Perhaps it’s inside?”\n\n“That’s what I’m counting on,” you tell him.  If Waif were to look down at your hands right now, he’d find your fingers crossed.  “Alright, let’s get climbing.”\n\nThere are a series of stone steps leading up all four sides of the pyramid.  The south side seems to be the least dangerous.  Your climb is slow, the slope uncomfortably steep.  The steps are mostly covered in sand, which makes it difficult to get any sort of decent footing.\n\n“C’mon,” Waif calls back from ahead of you.  “We’re almost there.”\n\nA rock-slide of small boulders rumbles past you as Waif nears the top.  It takes some maneuvering, but you manage to get out of the way in time.  The last quarter of the climb however, appears exceptionally treacherous.  Many of the stones look cracked and loose.  Then, something catches your eye.\n\n“Hang on, I think I found something.”\n\nThere’s an opening in the Ziggurat’s face.  You stare into it and see nothing but blackness.\n\n“There’s a room here,” you call up to Waif.  Smaller and lighter (not to mention a better climber), he’s just about at the top.  “Maybe we can use it to gain access to the upper chambers?”\n\n*page_break\n\n*image crevace.jpg\n\n*choice\n  #Call Waif down and try to find another way up from inside the Ziggurat\n    *goto_scene 114\n  #Hey, you're almost there. Take a chance with those last few steps\n    *goto_scene 73\n", "20": "\nThere’s something you like about the horse glyph… something innocuous and non-threatening.  For some odd reason, it just seems like it would be the right choice.\n\n“Let’s try this one,” you tell Waif.\n\nTogether you pass beneath the horse symbol, into the shadows.  The hall continues onward for a long while, curving left as you go.  You pass several side-corridors, but all of them are caved in.  Perhaps they once went somewhere, but right now they’re packed with nothing but rubble and cobwebs. \n\nSide by side you continue walking, sticking to the main tunnel.  Eventually, the corridor ends.  The room ahead is total darkness.  You step forward and enter it, heart pounding…  \n\n[i]This is it!  This must be—[/i]\n\n“We’re back in the same room!” Waif says.  The torchlight reveals the hexagonal chamber exactly the same as you left it.  Waif looks absolutely stunned.\n\nYou take the torch from him and hold it over your head.  Directly above, the serpent glyph stares down at you.  It looks poised and ready to strike.\n\n“We walked in a circle,” you say.  “The horse and the snake must be the same corridor.  They’re connected.”\n\nWaif scratches his head.  “Well at least our odds just got better.  We eliminated two possibilities.”\n\nHe's right! There are only four exits left to choose from.\n\n*choice\n  #Pick the exit marked with the DOG\n    *goto_scene 146\n  #Pick the exit marked with the CROWN\n    *goto_scene 99\n  #Pick the exit marked with the CAT\n    *goto_scene 156\n  #Pick the exit marked with the HAWK\n    *goto_scene 160", "21": "\nHere the street widens into a long, broad concourse.  Large granite statues tower over both sides of the avenue, each carved in exquisite, painstaking detail.  They appear to depict the Sultans, Khans, and many rulers of Atraharsis.  None bear weapons.  Most bear scrolls, staffs, and even tools in some cases.  All of them look distinguished, amiable, and wise.\n\nYou’ve passed at least two dozen such statues, including more than a few women, when you finally turn to Waif.  “How many leaders of Atraharsis were there?”\n\n“These are not the leaders,” he corrects you.  “These were the scholars, the teachers, the passers of knowledge.  There was a time, long ago, when they were revered even above kings and queens.”\n\nAt the end of the avenue, a lone statue presides over the center.  A series of glyphs are carved deeply into the base.  Waif impresses you by translating them roughly:\n\n[b]Gold, jewels, armies, land — false tenements of true power[/b]\n*line_break\n[b]Cities fall.  Kings perish.  Dynasties crumble.  Linage ends[/b]\n*line_break\n[b]These things are constructs of man.  Always fleeting[/b]\n*line_break\n[b]Only knowledge is forever[/b]\n\nYou let out a long breath.  “That’s deep.”\n\n“Deep?”\n\n“Yeah.  These people were gravely serious about their culture.  Whatever happened to them?”\n\nWaif shrugs.  “Perhaps they were conquered.  Or the aquifer running beneath the city finally dried up.  There are many such theories.”  He pauses, then points up to the distant cliff face.  “But the best ones involve that obelisk.”\n\nYou squint up in the direction from which you came.  The obelisk is nothing more than a tiny dark finger against the sky.\n\n“Well if you’re right, then we need to hurry.”\n\n*page_break Continue on through the city\n*goto_scene 111", "22": "\n*achieve glugglug\n\nThe giant jewel sparkles in the torchlight.  Waif sets to it with his knife.\n\n“Hey.  Um…”\n\nHe already has it loose!  It’s the biggest, most amazing jewel you’ve ever seen.  You step forward to help him…\n\n[i]BOOM![/i]\n\nThe wall collapses outward.  It knocks Waif to the ground, but then he’s swept up in a torrent of rushing water!\n\n“The river!” you exclaim as icy water rapidly fills the room.  “The underground aquifer that once fed the ci—”\n\nYour sentence is never finished as your mouth fills with water.  It surges into the room, thousands upon thousands of gallons, filling the cave in mere seconds.\n\n“Waif!”  Your scream is little more than a gurgle.  But it’s too late.  He’s already gone.  You try to fight the current, but the river drags you along the cave with unrelenting force.  It pins you against the ceiling…\n\nAs the water keeps rising, you realize this must be\n\n\n\n*goto_scene ending", "23": "\nCarefully you slide, push and prod certain areas of the green crystal case, being careful with its delicate, four-thousand year old components.  Waif looks on in amazement as you make your way through the puzzle box.  You might as well be pulling off the greatest magic trick of all time.\n\nAt one point you stop.  A small silver needle protrudes from one of the slides near the bottom.  You ask Waif for his knife, and with the tip of the blade, you pry the needle out and toss it to the sandy floor.\n\n“What was that?” Waif asks.\n\n“Nothing good.”\n\nA few more minutes go by.  Then, just as you’re about to give up and stuff the box into your rucksack…\n\n[i]CLICK![/i]\n\nThe crystal box swings open on tiny silver hinges.  Inside, resting on a crushed pillow of red velvet, are two snake-sculpted rings of bright yellow gold.\n\n“Pick one,” you tell your partner.  Reverently Waif chooses the ring with aquamarine eyes.  He leaves you the one with eyes of diamond.\n\n“We’re ring buddies now,” you tell him as you carefully tuck the box into your pack.  Waif looks back at you utterly confused.\n\n“Never mind,” you smile.  “Let’s head up and get what we came for.”\n*set serpent_ring true\n*achieve serpent_ring\n*set treasures +1\n*If (treasures = 2)\n  *achieve treasures2\n*If (treasures = 4)\n  *achieve treasures4\n*If (treasures = 6)\n  *achieve treasures6\n\n*check_achievements\n*If (((((((((choice_achieved_jade_bookends) and choice_achieved_coin_pouch) and choice_achieved_jewel_bag) and choice_achieved_crystal_box) and choice_achieved_silver_ingots) and choice_achieved_serpent_ring) and choice_achieved_pearls) and choice_achieved_amethyst) and choice_achieved_diamond_amulet)\n  *achieve all_treasure\n\n*page_break Not a bad job! Climb to the top of the tower\n*goto_scene 122", "24": "\n“Remember when we saw this constellation before?” you say.  “Back in the city square?”\n\nWaif nods.\n\n“It was missing two stars.  The second and the fourth.”  You examine those two gems on the wall.  They’re both red.  Garnets, maybe rubies.  “Here, give me your knife.”\n\nUsing the point of the blade, being very careful not to chip the gems, you pry the jewels loose from the surrounding sandstone.  To your surprise, they pop out rather easily.  You turn around and hand them to Waif.  “Do your thing.”\n\nYour friend smiles.  Climbing the statue is child’s play for him.  Waif shimmies up the neck, straddles the head, and places the two gemstone into the serpent’s eye sockets.  Nothing happens.\n\n“I don’t know what—”\n\nWithout warning a slab of stone directly in front of the statue grinds to one side.  Simultaneously, the snake’s head dips down, until its nose is pointing directly at the newly-formed hole.\n\nWaif hops down and shoves his torch into the darkness.  Another chamber lies just beneath you, not far down.\n\n“Well I guess that’s the way,” he shrugs.  He hands you the torch, hangs from the lip, and drops down easily into the new room.  “Come on, it’s all good.”\n\nYou throw Waif your rucksack and look back at the serpent one last time.  And for one brief instant, you’d swear that its eyes glow.\n\n*page_break Glad you didn't have to take any of those other corridors? You should be.\n*goto_scene 142", "25": "\nThe top chamber of the Ziggurat is a perfect square.  Two tunnels lead into the room from the east and west.  Your eyes however are drawn instantly upward, to where a deep red light streams into the dusty chamber.\n\n“The star ruby!”\n\nNestled against a hole in the ceiling is a breathtaking, fist-sized gemstone.  It refracts the sunlight streaming in from above, bathing the entire room in shimmering waves of crimson and scarlet.\n\n“But how do we get to it?” Waif asks.  “There’s no way up.”\n\nHe’s right.  The stone is set into the dead center of the ceiling, a good thirty feet overhead.  There’s nothing in the chamber to climb on.  The only features are two enormous stone blocks, one above either exit, and what looks to be a crude lever next to each.  They appear to act as counterweights for some sort of gate or doorway.\n\n“What does your uncle’s journal say?”\n\n“[i]Grand[/i]-uncle,” you smirk.  You pull it from your rucksack and flip through the timeworn pages.  “There’s not much here, only a single line.  It says: [i]In Darkness all Will be Revealed[/i].”\n\n“That doesn’t even rhyme.”  Waif actually sounds disappointed.\n\nYou think for a moment, then re-examine the room.  It’s still very early morning.  Sunlight streams in from both exits.  Maybe if you closed one…\n\n“We need the room dark,” you tell Waif.  “Help me close one of these doors.”\n\n*choice\n  #Pull the lever on the east side of the chamber\n    *goto_scene 120\n  #Pull the lever on the west side of the chamber\n    *goto_scene 148", "26": "\nYou stare first at the blue sapphire, then at the red lense.  A thought occurs to you.\n\n“Purple.”\n\nWaif raises an eyebrow.  Striding past him you pick up the red sphere and mount it directly in front of the star jewel.  Sunlight passes through the both of them, turning the room a beautiful violet color.\n\n[i]CLICK![/i]\n\nDeep in the floor somewhere, a mechanism activates.  The room fills with the loud grinding of stone on stone as the granite door is lifted slowly back into position, clearing your exit.  There’s another click as it locks into place.\n\n“Purple is the color of [i]royalty[/i],” you explain to Waif.  “Blue and red make purple.”\n\nYou move to the mosaic and carefully close your palm over the star jewel.  It rotates a quarter turn to the left, then pops easily into your hand.\n\n*achieve sapphire\n*set treasures +1\n*If (treasures = 2)\n  *achieve treasures2\n*If (treasures = 4)\n  *achieve treasures4\n*If (treasures = 6)\n  *achieve treasures6\n\n*check_achievements\n*If (((((((((choice_achieved_jade_bookends) and choice_achieved_coin_pouch) and choice_achieved_jewel_bag) and choice_achieved_crystal_box) and choice_achieved_silver_ingots) and choice_achieved_serpent_ring) and choice_achieved_pearls) and choice_achieved_amethyst) and choice_achieved_diamond_amulet)\n  *achieve all_treasure\n\n[b]Great job!  You just recovered the star sapphire of Atraharsis![/b]\n*set star \"sapphire\"\n\nA rumble somewhere off in the distance drags you back to reality.  It’s nothing like the first tremor, but it’s a sobering reminder that your time here is limited.\n\nYou wave the big jewel in the air.  “If we want to keep this thing we’d better get moving.”  With that you place the gem securely in your rucksack and lead Waif out of the temple.\n\n*page_break Continue your adventure\n*goto_scene 116\n\n", "27": "\n“We’re here to explore the city,” you say simply.  “Not rush blindly through it.”\n\nWith that, you step forward to where several broken buildings are marked with a series glyphs and symbols.  Very few of them are recognizable.  Not even from your grand-uncle’s journal.\n\nOne however, you manage to translate as a pair of words: [i]The Serpent.[/i]  Above the inscription are a large number of star-shaped dots, all painted in blue.  They’re arranged in a vaguely snake-like pattern.\n\nYou squint at it for a moment, and then it comes to you.  “Wait, I know this.  This is the Hydra.”\n\n“Hydra?”\n\n“Yeah, it’s a constellation.”  A fond memory flashes through your mind; you and your grand-uncle laying in the field behind his manor, staring up at the stars.  “Back then I’m sure they called it the serpent, but that’s what it is.”\n\nYour friend looks at you skeptically.  “Are you sure?”\n\nYou trace the dots with one finger.  “Yeah, totally.  The number two and number four stars are missing, but the rest of it is unmistakable.”\n\nWaif considers this.  “It makes sense I suppose.  The founders of Atraharsis were said to have been great astronomers.”\n\n“Great engineers, great stonemasons, great astronomers…”  You can’t help but laugh.  “Is there anything these people [i]weren’t[/i] great at?”\n\n“Yes,” Waif answers.  He scoops up a pile of sand and lets it slip through his fingers.  “Longevity.”\n\n*page_break The rest of the area is empty. Keep exploring.\n*goto_scene 21", "28": "\n“Gold and red… gold and red…” you repeat the words out loud.  “That sound about right to you, Waif?”\n\nYour partner nods.  Together you each grab one of the levers, count down from three, and then pull.  For a long moment nothing happens.  Then a loud grinding causes you to whirl to the right, where a stone door has retracted into the floor.\n\nWarily you head inside.  The room is slightly smaller, the walls polished smooth on all sides.  An astounding layer of dust covers everything, thicker than anything you’ve seen so far.  It’s obvious no one has been in here in… well, forever.\n\n“Oh… wow.”  Before you know it you’re holding Waif’s torch.  Using only his shirt sleeve, he wipes four thousand years of grime from one of the walls.\n\nYou sneeze violently, several times.  “What is it?”\n\nScrawled over the walls, on every side of the room, are a series of elaborate diagrams.  Beneath them, etched in perfect detail, is a large scale map of Atraharsis.\n\n“Look here.”  Waif traces a finger along the wall in several places.  “The river originates beneath the cliff face.  And these are access points, where water is funneled to different parts of the city.  Fountains, wells — here, this one goes all the way up to the obelisk.”\n\nAgain you sneeze.  Through watery eyes, you watch Waif point out many different aspects of the schematics.  “Impressive,” you tell him.  “But does it say anything about the Hall of Kings?”\n\nWaif turns back to the diagrams.  As he does, a low rumble shakes the chamber.  You both freeze, bracing for a rush of water that never comes.  Dust floats down from the ceiling like snow.\n\n“We need to hurry,” you say.  “We’ve already been down here way too long.”\n\n*page_break Backtrack into the machine room and take the shadowy corridor\n*goto_scene 44", "29": "\n*achieve scorpion\n\nWith the reflexes of a hockey goalie you reach out and smack Waif’s wrist.  The scorpion goes flying across the room.  It scurries away, ending the danger.  But when your friend’s arm returns to its prior position, there’s a tiny red dot on the back of his hand.\n\n“It stung me.”  Waif’s voice is sad, melancholy.  You don’t like the sound of it.  There’s too much resignation.\n\n“Maybe it wasn’t poisonous?” you say hopefully.\n\n“No,” he tells you calmly.  “It was.”\n\nYou reach for his hand.  Maybe if you act fast enough you can squeeze the poison from the wound.  But Waif pulls away as if reading your mind.  “You can’t.  It doesn’t work like that.”\n\nHis face goes pale and his knees buckle.  You catch him as he falls, but not before Waif knocks over the other two lenses.  In slow motion you watch as they shatter against the stone floor of the temple.\n\nWith Waif sick, and the two of you trapped in the inner sanctum, you slowly come to the grim realization that this is probably\n\n\n\n*goto_scene ending", "30": "\n“This place is huge,” you say.  “There has to be something here.”\n\nWith that, you and Waif begin searching the library.  Since everything is over four thousand years old, most of it falls to ruin at your touch.  Some of it has survived though, preserved deep beneath the cool desert sands.\n\nYou find few things of interest; some old quills, some decorative tiles, a container that might have once held some sort of ink.  But it’s under a broken table that you find the most interesting item: a partially intact chest.\n\n“Waif, look at this.”\n\nYou pull forth a yellowed map of Atraharsis.  Most of it has faded into obscurity, but you can still see the near-invisible lines of corridors and hallways running beneath the city.\n\n“The catacombs,” Waif says.  “They were halls carved out by the engineers of Atraharsis, by order of its many kings.”\n\nBeneath the map you find a pair of carved jade bookends.  They appear very valuable.  As you reach for them, Waif’s eyes go wide with terror.\n\n“No!  Wait!”\n\nHurry! Roll two dice (or just pick a random number between 2 and 12) and enter the total below:\n\n*temp roll\n*input_number roll 2 12\n*if roll > 9\n  *goto_scene 76\n*if roll \u003c 10\n  *set luck +1\n  *if (luck = 3)\n    *achieve luck\n  *goto_scene 94", "31": "\nYou step forward and kick over the pile of bones.  Scattering them away with the toe of your boot, the symbol of a horse is revealed.\n\n“What does it mean?” you ask Waif.  Only Waif is long gone.  He’s already halfway back down the alleyway.\n\nA symbol [i]beneath the bones.[/i]  Hmm…\n\nA clicking sound reaches your ears, from somewhere not far in the distance.  You can’t pinpoint the direction, but for some reason it sends a shiver right through you.\n\n*page_break Best thing to do now is to catch up with Waif. \n\nYou continue beyond the Oasis into another even larger area.  Here your surroundings become less streets and avenues and more of a mass of toppled structures, all of them in varying stages of decay.  The wind howls through the broken stone of hollowed out homes.  As it rises and falls, it creates a creepy wailing sound.\n\n“This looks like the Ruins,” you say, “from Murdoch’s map.”\n\nMany of the buildings around you are massive, or at least were massive when they were first constructed.  It’s obvious they were once very beautiful.  Worn cobbles beneath your feet poke through in many places here.  Thinking about the people who walked on it — more than four and a half thousand years ago — leaves you with a sense of awe.\n\n“Donovan!  Wait!”\n\nWaif’s warning comes too late as you round the next corner.  A pack of what appear to be wild dogs is patrolling the street.  One raises its nose and sniffs the air.  It sees you, and they all come running.\n\n“Waif!  The dogs—”\n\n“Not dogs, jackals,” Waif says.  He’s holding his torch out before him in a defensive posture.  “They’ll be on us in seconds!  What should we do?”\n\n*choice\n  #You think there still might be time to run\n    *goto_scene 57\n  #You could also try to make a stand\n    *goto_scene 11\n  #Try hiding in one of the buildings\n    *goto_scene 87", "32": "\nYour partner’s eyes go wide as he heeds your last-second warning.  He dives.  Then, as you look on in horror, he’s buried beneath a ton of sand and rubble.\n\n“Waif!”\n\nYou scramble around the monolith, fearing the worst.  But when the dust settles you find your friend safe and sound, sprawled out just beyond reach of the falling mountain of rock.\n\n“Thanks,” Waif says as you pull him to his feet.  “I didn’t see it coming down.”\n\nTogether you haul away the base stones that once made up the bottom of the tower.  When you finish clearing away the dust and sand, a third glyph is there.  It’s a snake.\n\n“Horse, hawk, serpent,” you repeat, scrawling them in your grand-uncle’s journal.  “Bad glyphs.”\n\nWaif brushes himself off and looks up at you.  “The worst.”\n\n*page_break Slip that journal back in your rucksack\n*goto_scene 41", "33": "\nThe sand-strewn road winds its way north and east, past several broken tenements and shattered homes.  The architecture of Atraharsis is inherently beautiful.  Even in its ruined state, you can make out the pride with which everything here was once built and maintained.\n\nAll of a sudden Waif stops.  His face is drawn with discomfort.\n\n“What is it?”\n\nYour partner looks like he swallowed an onion.  “It’s nothing,” he mutters.  “Let’s go.”  He continues walking again, but you notice he’s shifted to the other side of the street.\n\nStanding near the road, in the place Waif avoided, is a small mausoleum.  The squarely-built tomb is decorated with beautiful columns and cornices.  The doors and windows are gone, but tiny shards of colored glass still jut upward from within the frame.  What may have once been a statue is broken off at the base.\n\n“Should we check it out?” you ask.  Waif cringes visibly.  He shoots you a look of dread and dismay.\n\n“Come on,” you tell him.  “We can’t just pass everything by because you’re superstitious about it.”\n\n*choice\n  #Explore the mausoleum\n    *goto_scene 86\n  #Continue along the wider avenue\n    *set advice +1\n    *if (advice = 3)\n      *achieve advice\n    *goto_scene 43\n  #Take the side road that veers to the right\n    *set advice +1\n    *if (advice = 3)\n      *achieve advice\n    *goto_scene 97", "34": "\n“Snake eats rodent,” you say, picking up the stone embossed with the serpent.  You slide it into the center spot.\n\n“And owl eats snake,” Waif chimes in.  He places the owl stone into the remaining slot, completing the sequence.  \n\nFor several moments, nothing happens.  Then, with a low rumble, the sleek marble column begins retracting into the floor.  It happens smoothly, flawlessly.  You can only imagine the engineering it took for something like this to work, much less hold up after so many long and buried centuries.\n\nEventually the column is no more than a pedestal, three feet high.  The rumbling stops, and your prize is finally set before you.  Waif looks at you expectantly.\n\n“Should… should we just…”\n\nYou reach out and remove the beautiful green jewel from its stone mount.  The star inside the gemstone reflects back the white brilliance of the sun.\n\n*achieve emerald\n*set treasures +1\n*If (treasures = 2)\n  *achieve treasures2\n*If (treasures = 4)\n  *achieve treasures4\n*If (treasures = 6)\n  *achieve treasures6\n\n*check_achievements\n*If (((((((((choice_achieved_jade_bookends) and choice_achieved_coin_pouch) and choice_achieved_jewel_bag) and choice_achieved_crystal_box) and choice_achieved_silver_ingots) and choice_achieved_serpent_ring) and choice_achieved_pearls) and choice_achieved_amethyst) and choice_achieved_diamond_amulet)\n  *achieve all_treasure\n\n[b]Amazing job!  You just recovered the star emerald of Atraharsis![/b]\n*set star \"emerald\"\n\nIt’s a powerful moment in your life, and you can’t help but get choked up about it.  You think of all the things you can do now.  All of your problems solved…  \n\n“My uncle would’ve loved to have been here,” you say sadly.\n\n“[i]Grand[/i]-uncle,” Waif corrects you with a mischievous wink.\n\nThe walk back down the tower steps is a lot nicer than the walk up!\n\n*page_break Continue your adventure\n*goto_scene 116\n", "35": "\n“Waif, use the torch!”\n\nYou point to the moldering pile of tapestries.  They’re caked with long centuries of dust and filth, but you’re crossing your fingers they’re still very flammable.\n\nYour partner backs up to the pile.  Glancing back to make sure you’re clear, he puts the torch to them.  The entire heap of fabric erupts in a blaze of yellow flame!\n\nThe slug rears back, more from the heat than anything else.  Living down here its entire existence, you’re fairly sure the creature must be blind.  The blaze perfectly illuminates the entire chamber.  For now it drives the slug to the opposite end of the cave, but you know it won’t last forever.  When the pile burns out…\n\n“Look!”\n\nWaif points to an exit — a pitch-black tunnel, not far from where you’re standing.  It’s too small for the slug to get through.  You breathe a long, shuddering sigh of relief, and then you’re sprinting through the opening.  Running side by side along the corridor…\n\n*page_break The darkness can't last forever, can it?\n*goto_scene 44", "36": "\n“Let’s skirt around the city and head for the East Gate,” you say.  “It’ll give us a better idea of what we’re facing.”\n\nYou walk along hard-packed ground on what was once a well-traveled road.  To your left, the sun-bleached, broken walls of the city tower over you.  On your right, the desert stretches all the way to the featureless horizon.\n\nFor a long while, nothing is out of the ordinary.  But then, out of the corner of your eye, you swear you detect a hint of movement somewhere high on the parapets.\n\nBefore you can even say anything, Waif starts moving in that direction.  “I think I see a crack in the rubble,” he explains.  “A way into the city.”\n\nYou frown.  “It might be better to stick to the road.  We don’t even know where the gate is yet.”\n\n*choice\n  #Try Waif's shortcut into Atraharsis\n    *set advice +1\n    *if (advice = 3)\n      *achieve advice\n    *goto_scene 134\n  #Continue along the road that leads to the East Gate\n    *goto_scene 133", "37": "\nYour eyes fall on the yellow sphere.  It gleams a golden color, even in the blue light.\n\n“Gold is royal, isn’t it?”  You’re only thinking aloud now.  When Waif says nothing you pick up the yellow lense and mount it directly in front of the blue sapphire.  The light shines through the both of them, turning the entire room a sickly green.\n\nThe silence is broken by a loud hissing sound.  [i]Snakes![/i]  You spin out in a circle, bracing for an attack that never comes.  Nothing else enters the room.  Nothing except…\n\nA cloud swirls through the chamber, threatening to envelop you both.  Glancing around you notice that up near the ceiling, several stones have retracted into the wall.  Spraying forth from these new openings is a shimmering, glimmering cloud of dust.  Diamond dust.\n\n“Cover your mouth!” you warn.  “Don’t breathe it in!”\n\nRoll two dice (or just pick a random number between 2 and 12) and enter the total below:\n\n*temp roll\n*input_number roll 2 12\n*if roll > 4\n  *set luck +1\n  *if (luck = 3)\n    *achieve luck\n  *goto_scene 54\n*else \n  *goto_scene 14", "38": "\n*achieve hamstrung\n\nIt’s no use!  No matter how hard you run, the jackals run faster.  They’ve got more legs.  More endurance.  More—\n\n“Aarrghh!”\n\nWaif screams as one of the creature’s teeth tears into his calf.  Enough is enough!  You stop instantly and move to stand guard over your fallen friend.  If they want to get to him they’ll have to get through you first!\n\nBetween Waif’s torch and you screaming your head off, you manage to keep the jackals at bay.  Eventually they get tired of trying to find an opening.  Slinking away, they head back down the avenue to find easier prey.\n\n“Thank you,” Waif says through gritted teeth.  You can see he’s in obvious pain, clutching his leg tightly with both hands.  Gently you pry his fingers away from the wound.\n\n“It’s bad,” you tell him.  “I can stop the bleeding, but you need a doctor.  Pronto.”\n\nWaif nods, grateful for the help.  The good news is you’ll both be okay.  But your adventure, unfortunately, has to be cut short.\n\nIt’s a shame, but for now this is\n\n\n*goto_scene ending", "39": "\n*achieve clumsy\n\nYou mark off a pretty good distance.  Then you take a running start, keep your eye on the gap, and at the very last moment, jump…\n\nOnly you don’t jump.  You trip!\n\nYou’re focusing so much on your footwork that your eyes and body betray each other.  Half a meter before the jump you realize your front foot is going to come down too far forward.  You try to make a last minute adjustment but your heel slips off the edge of the chasm.  Tumbling wildly, you fall backward into the hole!\n\nWaif cries out for you.  The sunlight disappears.  The last thing you remember is a growing darkness as you fall and fall and fall…\n\nSorry to say it, but you have reached\n\n\n*goto_scene ending", "40": "\n“There,” you say.  “She’s pointing to that alley.”\n\nDirectly in line with the statue’s outstretched arm is a narrow avenue.  Waif looks at you skeptically for a moment, but still falls in behind you.\n\nThe alley is empty, nondescript.  Other than sand, it contains nothing.  As you continue along, the buildings seem to creep closer in on both sides.  The feeling of claustrophobia is unsettling.  Then, just as you’re about to turn back, the avenue comes to a dead end.\n\n“Ugh.”\n\nAgainst the far wall is a thick pile of bleached bones.  They look to have come from a large animal, maybe a camel or something similar.  An ominous feeling steals over you, and for some reason you feel wracked with a shudder of despair.  You jump at the squawk of a bird of prey, somewhere high overhead.\n\n“This is wrong,” Waif says.  “We should not be here.”  He makes a sign in the air, presumably to ward off evil. \n\n*choice\n  #You're brave enough to search the bones\n    *goto_scene 31\n  #No one will blame you for backing out of the alley\n    *set runaway +1\n    *if (runaway = 2)\n      *achieve runaway\n    *set advice +1\n    *if (advice = 3)\n      *achieve advice\n    *goto_scene 102", "41": "\nAfter walking some more you stumble upon a wide area where many streets come together.  Several stone pillars form a ring around a central depression, and inside you can easily see the remains of a large fire.  The blackened timbers and thousand-year old ashes are mixed in amongst the desert sands.\n\nLeaning against one of the pillars, standing exceptionally tall, is the outline of a human figure.  Wordlessly you extend your arm to keep Waif from walking past you.\n\n“Do you think it could be one of your former group?” you whisper.  The two of you are crouched down beside a broken hunk of granite.\n\nYour friend shakes his head.  “I know all of Sullivan’s crew.  I’ve never seen a man that tall.”\n\nHis words are a relief, but at the same time they create even more mystery.  Who could this be?  Is he hostile?  Dangerous?  Above everything else, how did he get here?\n\n“I can probably circle around,” you tell Waif, “and get behind him.”\n\n“What will you do then?”\n\nYou shrug.  “Haven’t figured that out yet.”\n\nThe figure is still leaning against the pillar. What's next?\n\n*choice\n  #Circle around and sneak up on the unknown figure\n    *goto_scene 16\n  #Take a more direct approach and just call out to him\n    *goto_scene 101", "42": "\nSlowly you step beside Waif, not taking your eyes from the cheetah even for a second.  Your hand closes over his as you gently take the torch.\n\n“When I do this,” you tell him, “run out of here and don’t look back.”\n\nWaif looks frozen by fear.  You have to tell him two more times before he delivers the smallest, most imperceptible of all nods.  Then, fighting against every last ounce of flight instinct, you take a step toward the big desert cat.\n\n“HI-YAAAA!!!” you scream, for lack of anything else to say.  In one hand you still hold Murdoch’s journeyman’s pack.  With the other, you swing the firebrand before you in a wide, threatening arc.\n\nThe cat arches its back… but it retreats.  First one step, then two.  You scream again, a third time, and by the fourth you’re already running full speed, following Waif out of the cave.  You’re a good hundred yards into the sunlight before you finally stop.  Even then you expect to look back and find the creature mid-leap, ready to deliver the killing blow…\n\n“She’s gone,” Waif assures you.  He’s right.  The road is between you and the cave mouth is totally clear.\n\nSmiling broadly, you hand the torch back and begin rifling through Murdoch’s pack.  Beyond an empty canteen, a container of lamp oil, and what looks to be some kind of hundred year-old jerky, you find two crumpled, yellowed pages.  They have a ragged edge, as if torn from…\n\n“The journal!” you cry.  “These are the two missing pages!”\n\nQuickly you open your grand-uncle’s journal and match the torn edges to where they were ripped from the book.  For the first time in a century, Murdoch’s work is once again complete.  The pages themselves show only two large glyphs.  One is a hawk, the other a snake.  Both of the drawings have been crossed out.\n\n“What’s it mean?” Waif asks.  \n\n“Not sure.  But these glyphs are crossed out for a reason.”\n\n*page_break Solid job. Head down the road some more\n*goto_scene 97", "43": "\nThe road spills out into an enormous city square.  This was a place where crowds would gather to meet, shop, or socialize.  You can only imagine what that looked like  — thousands of people buying, selling and trading from all manner of distant lands.\n\nAll that’s left of the place now is sand and silence.  Flat, smooth cobbles stretch out in every lonely direction.\n\n“Where to?” Waif asks.  You answer him by pointing.  The Queen’s Tower is now twice as big as it was before.  You’re getting close.\n\nThe road takes you beneath a series of broken archways, back into the streets at the other end of the square.  Three rusty iron cages hang from the last arch.  Waif mutters a curse and traces a mark in the air with two fingers; a sign of warding.\n\n“This was a place of suffering,” he says in disgust.\n\n“Not anymore,” you assure him.  The cages are empty now, but you’d rather not think of the things they’ve seen.\n\nA shadow suddenly passes over you, from somewhere high above.  It sends an involuntary shudder through your body.\n\n“There are markings up ahead,” you say.  “Maybe we should check them out.”\n\nWaif wholeheartedly disagrees.  “No.  We should leave this place quickly, and not look back.”\n\n*choice\n  #Take the time to check out the markings\n    *goto_scene 27\n  #Heed Waif's advice and hurry through this area\n    *set advice +1\n    *if (advice = 3)\n      *achieve advice\n    *goto_scene 91", "44": "\nYou stumble on, shivering against the darkness.  With all the past weeks’ heat, sweat, and toil, you never once thought you’d be missing the desert sun.\n\n“There’s a light on up ahead,” Waif says skeptically.  He sounds like he only half believes it.  “It’s… some kind of room.”\n\nSure enough he’s right.  As your eyes begin readjusting you can start to see things beyond the light of your partner’s torch.  You emerge from the hallway into a large granite chamber.  Tiny shafts cut into the ceiling bring light down here, presumably from somewhere up in the city above.\n\n“Look!”\n\nThere’s an alcove on the far wall.  Recessed within it is a three-pronged dais.  Each of the prongs ends in a fist-sized depression, exactly the size and shape of a star jewel.\n\n“I think we’re supposed to put our jewel in the right place here,” Waif points at the dais.\n\nYou don’t like the sound of that one bit.  “Are you sure?”\n\n“Well, no.  But there’s nothing else in the whole room.”\n\nYou walk the entire chamber just to make sure.  Nothing else.  No other exits.  Just Waif, you, the dais, and the star gemstone resting snugly in your rucksack.  You pull it out with a heavy sigh.  Hold it in your palm one last time…\n*page_break\n\n*If star = \"ruby\"\n  *goto_scene 66\n*If star = \"emerald\"\n  *goto_scene 58\n*If star = \"sapphire\"\n  *goto_scene 92", "45": "\n*achieve classfive\n\nYou’re out time.  Out of room!  As much as you hate the idea of making the attempt, the floor retracts more with every second that goes by.\n\nFlattening yourself against the wall, you take three lunging steps.  On the fourth one you jump…\n\nBut the distance is too far.\n\nEven with Waif reaching out for you, you fall woefully short of the other hallway.  Your arms pinwheel through the air as you drop helplessly into the cold, dark waters of the raging river.\n\nOh, man!  You came so close!  \n\nNot for a lack of trying, but this is obviously\n\n\n*goto_scene ending", "46": "\n*achieve pancaked\n\nWhen Waif lit the fires, the floor started moving.  Maybe putting them out will stop it.\n\n“Douse the braziers!”\n\nWaif grabs his canteen while you pull yours from your rucksack.  Upending them onto the coals, you put both fires out in no time.  But nothing happens!  The chamber grows dark again.  The ceiling is sickeningly close.\n\n[i]Death by Fire…[/i]\n\n“Quick, light them again!” you cry.  “Light them so we can search the room for another way!”\n\nBut it’s no use.  The coals are much too wet now.  As you struggle for an answer the room grows smaller.  Darker.  Waif’s torch goes out, and that’s when you realize this must be\n\n\n*goto_scene ending", "47": "\nWith your arm outstretched you begin to rotate the key to the right.  There’s a sharp click, and then you step back as the entire obelisk begins to turn on its own.  It goes through all four faces, turning a full 360 degrees with the loud grinding of stone on stone.  Then it stops, and everything goes silent.  The obelisk key pops back out and drops into your hand.\n\n“That was weird,” Waif says.  “I don’t know what—”\n\nWithout warning you feel the ground shift beneath you.  There’s a tremendous crack — like the biggest thunderclap you ever heard, but somewhere muffled and very far away.  The noise is followed by what sounds like rushing water.  It gets louder.  Closer.  Just in front of you, a tremendous field of dust begins rising into the air.\n\n“The ground’s falling away!”\n\nYou grab Waif and pull him down, kneeling against the obelisk for what little protection it brings.  Right before your eyes, the desert floor drops away.  What you thought was water was actually sand; millions of tons of it drop off into what seems like an endless, bottomless pit.  The sinkhole expands outward in a geometric progression.  Thankfully, it’s moving away from you.\n\n“Cover your mouth!” Waif shouts.  “And your eyes!”\n\nYou mimic your new friend by pulling your shirt over your face.  You can’t see.  You can’t hear.  Your ears are filled with television static, a thousand times louder than anything you’ve ever heard in your life.  Eventually the ground stops shaking and the sound drops down to a low hiss.  When the dust finally settles you find yourself standing at the top of a sheer cliff wall.  Hundreds of feet down, the ancient, broken ruins of a city lays sprawled out beneath you.\n\nYou found it!\n\n*page_break\n\n“Atraharsis!” you roar.  “There it is!”\n\nThe once-great city of Kings is breathtaking, even in its ruined state.  Atraharsis’s walls barely stand.  Its temples and palaces are a crumbled ruin, blocks of stone and masonry scattered like hundreds of yellowed dice.  Even as you watch, more sand drains away.  Piles of it still line the cobbled streets, but for the most part the city is revealed.\n\n“It was here the whole time,” you swear.  You still can’t believe it.  “Right beneath us.”\n\n“The City Beneath the Sands,” Waif says.  “It was always said.”\n\nA jagged path zigs and zags its way downward from the obelisk.  You follow along, being careful not to trip over any rubble that could put you over the edge.  It’s still a long way down.  Waif stays right with you, picking his way along the narrow ledge.  He’s having a much easier time of it than you are.\n\nThe path winds its way westward, skirting the edge of the city.  When it finally spits you out, you stand before a broken opening in the enormous city walls.\n\n“This is the Great Gate,” you tell Waif.  “Murdoch’s journal has a crude map.  Hang on…”  You reach into your rucksack.  “Ah, here it is.”\n\n*page_break\n\n*image map.jpg\n\n*page_break\n*set map true\n\n“It was known as the Grand Gate,” Waif tells you.  “Your map has it wrong.”\n\nYou look back at the city and shrug.  There’s nothing great or grand about the opening in the wall.  In fact there’s not even a gate anymore, if there even was one to begin with.  Written on the back side of the map is another message.  You read it out loud:\n\n[b]Three Star Jewels, Three Deadly Trials[/b]\n*line_break\n[b]Before the Walls Will Sing[/b]\n*line_break\n[b]It Takes Nine Lives[/b]\n*line_break\n[b]From Six Less Five[/b]\n*line_break\n[b]To Find the Hall of Kings[/b]\n\n“Well we only have two lives,” Waif says. “So that may be a problem.”  He studies the map for a moment.  “Your map shows the location of the star jewels,” he says with interest.  “Sullivan’s map wasn’t nearly as detailed.”\n\nThe jewels stare back at you seductively, beckoning you as they did your grand-uncle.  Even one of them would be enough to live the rest of your days in comfort.  Not to mention Atraharsis’s other hidden treasures, plus the fabled riches supposedly buried in the secret chamber known as the Hall of Kings.\n\n“Waif listen,” you begin.  “You need a boss.  I need a crew.  As of right now, you’re hired.  If you want the job, that is.”\n\nFor a moment all your friend does is stare up at the yellowed walls of the ancient city.  Then he smiles.  The sun gleams off a pair of golden teeth.  “I’m in.”  He extends one calloused hand in your direction and you shake it.\n\n“Okay Mr. Young—”\n\n“Donovan.”\n\n“Okay [i]Donovan[/i],” Waif says with a slight bow.  “Where do we begin?”\n\nYour map shows two potential entrances to the city of Atraharsis. Only one of them is visible. \n\n*choice\n  #Head in through the Great/Grand Gate\n    *goto_scene 109\n  #Skirt the city and look for the East Gate\n    *goto_scene 36", "51": "\nYou walk for minutes that seem like hours in the dar
