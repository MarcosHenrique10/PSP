kness.  Waif leads with the torch held out before him, turning left and right with vague purpose.  You hear nothing.  See nothing.  This makes it all the more nerve-wracking, because you expect the worst at any moment.\n\n“There’s a room here,” Waif says.\n\nUp ahead, the corridor widens into a large chamber.  The torchlight illuminates everything, including the walls.  All of it is bare.  There’s nothing anywhere, except—\n\n“Look!  The floor!”\n\nDirectly beneath your feet, a complete map of Atraharsis has been meticulously painted from wall to wall.  It includes everything, from the Ziggurat to the Temple to the Queen’s Tower.  The colors haven’t faded much, even after all this time.  The overall attention to detail is incredible.\n\nWaif points.  “See these lines?”  In a lighter ink, another schematic has been laid over the map itself.  “These are the Underhalls.  The very catacombs we’re in right now.  They stretch beneath the city, and—”\n\nA blue vein follows beneath the cliff face on the map.  It shoots off in several directions, along streets and avenues, including a wide vein that flows up through the cliff itself.  There, at the top, is an unmistakable drawing of the obelisk.\n\n“The aquifer!” Waif cries.  “The one that feeds the oasis!  See how it runs beneath the city?  Through to the pools, the fountains,” his finger traces upward, “and then to the obelisk itself!”\n\n“So?”\n\n“This is how the engineers hid the city!  When Atraharsis became threatened they channeled the river, running the waters beneath these halls to sink the city beneath the sands!”\n\nThe thought of millions of gallons of water rushing beneath you is more than a bit disquieting.  Still, the knowledge it took to build this place…\n\n“Come on,” you say.  “Let’s not give this city a reason to keep us.”\n\n*page_break Better keep moving\n*goto_scene 152", "52": "\nThe slug bears down on you.  It’s just too big.  The torch is too small.  You’re out of options.  Unless…\n\n“Waif!” you shout.  “Throw me your pack!”\n\nHe does.  You flip it open, reach inside, and pull out a giant fistful of the pink rock salt.\n\nYou throw it.\n\nThe salt strikes the slug with exactly the desired reaction.  It recoils in pain, halting its advance and rearing back in confusion.\n\n“It’s working!” Waif yells.\n\nYou grab another handful of salt, then another, spreading it out a wide arc.  Soon the slug is twisting and writhing on the far side of the cavern.  No longer a threat, you stop.\n\n“Find us an exit,” you tell Waif.  “Hurry.”\n\nUsing the torch, your partner works his way along the wall.  You keep one hand in Waif’s bag, your eyes on the slug.  All the fight has gone out of it.  You’re pretty sure you’ll be okay when—\n\n“Found one,” Waif calls.  “Over here.”\n\nA pitch-black opening is cut roughly into one wall.  It’s the only way out of the room.\n\n“Let’s go,” you tell Waif as you hand back his pack.  There’s hardly any salt left.  He looks crushed. \n\n“Yeah, sorry about that.”\n\n*page_break\n\n*image slug.jpg\n\n*page_break Continue along the pitch-black tunnel\n*goto_scene 44", "54": "\nYou follow the growing cloud back to its origins.  Up near the ceiling, several stone blocks have retracted into the wall.  The diamond dust pouring out from them has already stopped.  All you have to do now is ride it out.\n\n“Close your eyes!” you shout as it washes over you.  “Don’t blink!”\n\nFor several moments you do nothing but stand there, eyes squinted shut, breathing as shallowly as possible through the collar of your shirt.  You can only hope that Waif heard you in time.\n\nEventually, the dust settles.  You give it another minute or two to be safe, then carefully peek out from beneath your shirt.  Waif is doing exactly the same thing.  He’s okay!\n\nYou pull the yellow lense from the mount and replace it on the dais.\n\n“We need a better choice,” you tell Waif.  You hold up the other two lenses.  “Which one?”\n\n*choice\n  #Try the red lense\n    *goto_scene 26\n  #Go with the green lense\n    *goto_scene 74", "55": "\nThe street widens here, the sand pushed back to reveal a great cobbled avenue with structures on both sides.  Everything is shattered beyond recognition.  You close your eyes and try to imagine Atraharsis as it once was, picturesque and beautiful, boasting the world’s greatest engineers and some of the most advanced architecture of its time.\n\n“This was a city of peace,” you say.  “Or at least, that’s what my grand-uncle used to tell me.”\n\nWaif nods.  “Peace and knowledge.  Somehow the kings and queens of Atraharsis avoided war.  At one point it was the center of all trade; a sparkling jewel in the heart of the desert, fed from beneath by the waters of a great spring.”\n\nYour foot catches on yet another mound of dust.  It’s hard for you to imagine this city ever had water.  It’s the driest, most sun-scorched place you’ve ever seen.\n\n“And one more thing,” Waif adds.  “I was thinking—”\n\nThe ground beneath you abruptly gives way.  The sensation of falling ends in a violent landing, all the breath knocked from your lungs.  You throw your arms up as broken cobbles rain down all around you.\n\nWhen the dust finally settles you’re in a basement of chiseled  sandstone.  A pitch black tunnel yawns to your right.  That’s when you notice the chattering.  Dozens of enormous rats have encircled you.  Noses sniffing the air, they squint upward as if they’ve never seen the sun.  Slowly they begin to close in…\n\n“Wait!” Waif cries.  “Don’t move!”\n\nDon't move? is he [i]kidding[/i] you?\n\n*choice\n  #There's probably just enough time to take the pitch black tunnel\n    *set runaway +1\n    *if (runaway = 2)\n      *achieve runaway\n    *goto_scene 110\n  #Listen to Waif and stay still\n    *set advice +1\n    *if (advice = 3)\n      *achieve advice\n    *goto_scene 75", "56": "\n“Quick, get behind these rocks!” you shout.  “While there’s still time!”\n\nWith a nimbleness you only wish you possessed, Waif vaults over the stones behind you.  He’s already disappeared from view by the time you finish your own mad scramble.\n\nThe lizard stomps over to where you’re hiding.  Craning its neck, it leans down and lifts up one of the stones in its tremendous maw.\n\n“It’s trying to find us!” you warn your friend.  “We have to get to another—”\n\n“No,” Waif tells you firmly.  “Look.”\n\nYou glance up to find the monster no longer coming.  In fact, it’s now taking the smooth white stone back in the direction it came.\n\n“We woke it up,” Waif explains, “when we first raised the city.  But it’s not after us.  It’s after its eggs.”\n\nYou reach back and rap your knuckles against one of the broken pillars.  “But these are just rocks.”\n\nWaif shrugs.  “It doesn’t know that.  Yet.”\n\nYou watch the big lizard as it disappears down the next street.  Fortunately it’s not moving in the direction you need to go.\n\n“Come on,” you tell your partner.  “The tower is just up ahead.”\n\n*page_break The Queen's Tower awaits!\n*goto_scene 111", "57": "\n“Run!”\n\nYou turn on your heels and sprint, willing your feet to move faster than you’ve ever run in your life.  All you can do is move forward.  There’s no time to look back, no time to worry about whether or not Waif is still with you.  All that exists, right now at least, are your feet and the road.\n\nAfter a while the exertion takes its toll.  Sweat beads along your face and neck.  It runs into your eyes, stinging like crazy.\n\n“Waif?” you call back blindly.  A grunt over your shoulder tells you he’s still there.  But you can hear the dogs too, and you’re not entirely sure you can outrun them.\n\nRoll a single die (or just pick a random number between 1 and 6) and enter the total below:\n\n*temp roll\n*input_number roll 1 6\n*if (roll = 4) or (roll = 6)\n  *goto_scene 38\n*else \n  *set luck +1\n  *if (luck = 3)\n    *achieve luck\n  *goto_scene 118", "58": "\n*set star \"NULL\"\n\nYou set the star emerald in its position on the dais.  A noise startles you from above, and you jump back…\n\nThree enormous stone columns fall from the ceiling.  They slam into the floor right where you were standing, creating a thick stone portcullis that cuts you off from the alcove!\n\n“Over there!” Waif shouts.  Off to your left, a door is sliding open.  You ignore it for the moment and reach between the stone columns.  Your arm goes through… then your shoulder.  But the gap is too small.  The emerald gleams in the shadows, tantalizingly just beyond your reach.\n\n“It’s closing!”\n\nWaif’s right.  The door is sliding in the other direction now, once again becoming part of the wall.  There isn’t any time…\n\n“Come on,” you say reluctantly.  “We have to go!”\n\nThe door is half closed by the time you slide into the darkened hallway.  But Waif isn’t there.  You call back for him as the seconds tick by.  The opening becomes a narrow sliver of light, separating you from the darkness.\n\n“Waif!”\n\nAt the last possible second, he slips through.  The door slams shut behind him.  The torch flickers wildly as a small corridor is revealed.\n\n“Where do you think it leads?” your partner asks.\n\n“I don’t know.”  You look back forlornly in the direction of your beautiful lost emerald.  “But it had better be worth it.”\n\nThe corridor deposits you into a long stone chamber.  Three exits are spaced equidistant from each other at the opposite end.  In the center, mounted on a smooth platform, is the magnificently-carved statue of a giant serpent.\n\n“Is this the Hall of Kings?” Waif asks.  “Doesn’t seem very… kingly.”\n\nThree of the walls here are featureless stone.  The fourth however, is studded with multi-colored gemstones in a long trailing pattern.  Sort of like…\n\n“The Hydra.”\n\n*page_break\n\nYour partner squints.  “The constellation?”\n\n“Yes.  See how the jewels are spaced?”  You trace a line from point to point.  “Seventeen stars.  Seventeen gemstones.”  Looking back at the statue, you notice it follows the same serpentine shape.  But the sculpture has no adornment at all.\n\nWaif bends over the platform, where a small series of glyphs have been etched into the side.  “The serpent sees the way,” he translates.  “Doesn’t make much sense.  The statue couldn’t see if it wanted to — its eyes are missing.”\n\nYou follow his gaze to the snake’s head.  Two holes are carved where the eyes would be.  Holes exactly the same size and shape as—\n\n“The gems!” you cry.  “Waif, we need to put the statue’s eyes back!”  You look at the wall.  The constellation’s line of colorful jewels shimmers like liquid in the torchlight.\n\n“Sounds about right,” Waif agrees.  “But which ones?”\n\nIf you [i]know[/i] which two jewels to use (without guessing!) combine those two numbers below!\n*line_break\n(For example, if you think it's the 5th jewel and the 9th jewel you would go to page 59). Once again, don't guess!\n\n*choice\n  #You know the answer\n    *input_text jewel_answer\n    *if jewel_answer = 24\n      *goto_scene 24\n    *else \n      Unfortunately, that's not right. \n      *goto_scene hallway_guess\n  #You don't know the answer\n    *goto_scene hallway_guess", "60": "\n“Water!” you think quickly.  “Give me your canteen!”\n\nWaif has his canteen unslung in seconds.  You uncap it and begin pouring, watching as the water flows in through the top of the altar and out through the many holes on all sides.\n\nNothing happens.\n\n[i]Maybe it’s not enough,[/i] you think.  Reaching into your rucksack you produce your own canteen.  You empty it into the altar, watching as it too dribbles out the sides.  The result is the same: the floor still grinds inevitably upward.\n\nWaif looks at you with fear in his eyes.  “Try something else!”\n\n*choice\n  #Put out the braziers' flames\n    *goto_scene 46\n  #Try pouring sand into the altar\n    *goto_scene 151", "61": "\nFingers crossed, eyes closed, you step on a black tile.  Long seconds tick by…\n\nNothing happens.\n\nSlowly you shift forward, adding more and more weight until you’re totally committed.  Finally, you’re standing on it.  Waif lets out a long, strained sigh.\n\n“Good choice.”\n\nYou glance down for the next black tile, it’s simply too far away.  You’ll need to step on one of the other colors first…\n\nWithout hesitating you pick red.  Again you move slowly, carefully, shifting your body weight until the red tile fully supports you.  Again, you’re safe.\n\n“Avoid the white ones,” you call back to your partner.  You can hear him begin moving behind you.  Together you make your way down the hall, being extremely careful not to touch any of the light-colored tiles.  When the floor turns back to flagstone at the very end, you’re both relieved.\n\nWaif holds his torch back for one last look.  “What do you think would’ve happened if—”\n\n“Don’t know,” you say.  “Don’t care.”\n\n*page_break The tunnel ahead is pitch-black. Continue along it\n*goto_scene 44", "62": "\n“Waif, help!  I can’t—”\n\nYou let go.  You don’t think about it, it just happens.  Your fingers aren’t strong enough to grip the rock one-handed.  As they give way you close your eyes and brace yourself for that sickening, falling sensation reserved only for the worst possible nightmares…\n\nBut the feeling never comes.  When you open your eyes again Waif has you by the wrist.  His face is red from the strain of holding your weight.  Grabbing him with your free hand, you swing your leg up and catch your foot on the next ledge.  You pull yourself onto the stone platform, your chest still heaving.\n\n“Thanks for that,” you gasp once you catch your breath.  “I thought for sure that was it.”\n\nWaif smiles and helps you to your feet.  “No more climbing for you,” he quips.  He offers you some water from his canteen, and the two of you continue onward.\n\n*page_break You made it! Barely. Good job anyway.\n*goto_scene 25", "63": "\nThe ground shakes.  The air fills with dust.  The wall comes down…\n\n[i]CRASH![/i]\n\nPain spikes up your leg as a heavy piece of stone strikes your ankle.  You yank your leg in, trying to stay as small a target as possible until the whole thing is over.  Eventually the tremors stop.  Everything goes still, and the dust begins to settle.\n\nWaif comes running over, his face painted with concern.  “Are you okay?”\n\nYou pull up your pants leg and start rubbing your ankle.  At least there’s no cut or laceration.\n\n“Could be broken, could be sprained,” you say.  “Impossible to tell.  Here, help me up.”\n\nWith Waif’s aid, you get back to your feet.  Your ankle takes your body’s weight with little problem.  That’s a good thing.\n\n“I think I’m okay,” you tell your friend.  “Whatever it is, there’s not an X-ray machine for hundreds of miles anyway.  We have a few hours before the whole thing swells up, so let’s not waste them.”\n\nYou didn't think you'd get through this thing without a couple of bumps and bruises, did you?\n\n*page_break Continue deeper into the city\n*goto_scene 105", "64": "\nThe sinkhole is still expanding.  Leaving solid ground now would be a foolish move, and it probably wouldn’t help your friend one bit.  You have to think…\n\nQuickly you reach down and grab Waif’s own pack.  Just inside the leather flap is a coil of rope!\n\n“Here!” you shout down to him.  “Grab it!”\n\nYou fling one end of the rope toward him, but Waif is still sliding.  There’s a blind panic in his eyes.  Luckily, he has just enough presence of mind to heed you.  He lunges for the rope with both hands, catching it only barely with his right.\n\nYou brace one foot against the nearest piece of granite and then you pull hard.  Slowly, Waif emerges from the sands.  First his shoulders, then his arms, then his waist are free.  By the time his knees show, your partner is crawling his way up to the edge of the sinkhole.\n\nEventually the sand-slide stops.  You lie flat on your backs for a moment, the both of you breathing heavy, staring up into the early morning sky.\n\n“Thanks,” Waif says when he can speak again.\n\nYou hold up his rope.  “Thank [i]this[/i].”\n\nWhew, close call! The sinkhole blocks any chance of entering the city through Waif's shortcut.\n\n*choice\n  #Keep on toward the East Gate (staying on the path this time!)\n    *goto_scene 133\n  #Turn back and head to the Great Gate\n    *goto_scene 109", "65": "\nYou follow the passage to the north, where it descends deeper into the desert earth.  The air is colder here.  A chill runs through you as the sweat of your prior exertion in the city begins to cool on your skin.\n\n“It keeps going down,” Waif notes.  “And look at the walls.”\n\nThe smooth paved stones give way to rough cut walls of pure sandstone.  You see tool marks everywhere.\n\n“This was their quarry,” you say.  “They took stone from down here to build up Atraharsis.”\n\n“Wouldn’t that weaken the city’s foundation?” Waif asks.\n\n“I don’t know.  I’m not an engineer.”\n\nA distant roar reaches your ears as the passage widens into a system of caves.  The roar grows louder as you approach the far wall.  The wall is damp!  It’s even weeping in some places.  In others, the light from Waif’s torch glints off a few stones embedded into the walls.\n\n“Gems!”  Waif runs his hand over a few of the larger stones.  The clarity is stunning.  Pulling his knife, Waif pries loose one of the pale blue stones.  It takes up most of his palm, reflecting beautifully in the light of his torch.\n\n“This place is a mine!” he cries.  He scans the wall and points at a tremendous gem, almost as large as his head.  “Look at that!  We’re rich!’\n\nYou take a hesitant step forward.  “Yeah…”  Half of you is thrilled.  The other half is not so happy about the amount of water seeping out of the wall.  Especially in places where the wall is cracked, and around some of the gemstones.\n\n“Come on,” Waif says.  He sets the torch down temporarily.  “Help me with this big one.”\n\n*choice\n  #If you'd like to be filthy rich, help Waif pry loose the big jewel\n    *set advice +1\n    *if (advice = 3)\n      *achieve advice\n    *goto_scene 22\n  #Or, continue on instead\n    *goto_scene 89", "66": "\n*set star \"NULL\"\nYou place the star ruby on the dais.\n\n“Look out!”\n\nWaif yanks you backward as three large stone columns slam down from the ceiling.  Little more than a foot apart they act as a crude stone portcullis, cutting you off from the alcove.  Your gemstone gleams red behind them, even in the shadows.\n\n“Maybe we can…”\n\nThere’s the familiar noise of stone on stone as a door grinds open somewhere behind you.   Numbly you watch as it slides all the way to one side, clicks loudly, and immediately begins closing again.\n\n“Waif, come on!”  Anxiously you step into the shadows of the new corridor.  When you turn back, Waif is still back at the portcullis, agonizing over the star jewel.  The door is still closing…  “WAIF!”\n\nHe’s not going to make it.  As the door all but seals the passageway, you scramble helplessly for something to prop it open.  There’s nothing around!\n\n[i]BOOM![/i]\n\nThe door closes.  But at the last possible second… Waif slides through.  He does it sideways, with almost superhuman speed, his shirt tearing up the back as it gets caught between several tons of grinding sandstone.  The torch flickers wildly in the darkness.\n\n“That was foolish,” you chide your friend.  “You almost became a permanent feature.”\n\nWaif nods, still shaken.  When he’s finally okay you keep moving.  \n\nUp ahead the small corridor ends, opening in another area.  The torchlight reveals a perfectly round chamber with an exit at the opposite end.  It’s entirely empty and nondescript, except for one thing:\n\n“What’s that sound?”\n\nAn odd, background noise fills your ears.  It’s more of a buzzing, or maybe a rushing sound.  As you enter the room, it seems to originate from every direction at once.\n\n“Where’s it coming from?” you ask.  “The walls?”\n\nWaif tilts his head.  “No, I don’t think so.”  He approaches the opposite hallway.  “Perhaps there’s—”\n\n*page_break\n\nThe two of you are jarred instantly off your feet.  One knee explodes with pain as you go down, and it’s not until you stand up again that you realize—\n\n“The floor is moving!”\n\nThe grinding of stone against stone is drowned out by an almost deafening roar.  The air is suddenly alive, swirling with a cool wind and… moisture?  Waif is pointing.  Shouting.  You can barely hear him.  “The river!”\n\nYou look down, over the edge of the retracting floor which is already halfway gone.  Beneath you, not far down, a portion of the underground river thunders past.  It’s loud, powerful.  It sounds like the end of the world.\n\nAs the floor continues its disappearing act you’re forced against one wall.  Set into into stone, you notice something you didn’t before: a small, diamond-shaped depression.  A key goes here… you realize.\n\nOn the opposite end of the chamber, Waif’s already made the deadly jump for the other exit.  As usual, he made it.  But it looks far too long a jump for you…\n\n*page_break\n\n*If diamond_amulet = true\n  *goto_scene 72\n*Else\n  You're going to have to jump! Roll two dice (or just pick a random number from 2 to 12). What's the total?\n  *choice\n    #The total number is ODD\n      *set luck +1\n      *if (luck = 3)\n        *achieve luck\n      *goto_scene 144\n    #The total number is EVEN\n      *goto_scene 45", "68": "\n*achieve trapped\n\nYou’ve no idea which gemstones to pry from the constellation.  Rather than chance being wrong, you walk to the other end of the room.\n\n“Pick an exit,” you tell Waif.  It seems like a good idea.  So far your friend hasn’t steered you wrong.\n\nWaif peers into each of the three openings with the torch.  “They all look the same,” he shrugs.  “Let’s go right.”\n\nA minute later you’re pretty far down the long corridor when it abruptly dead-ends.\n\n“Hmm…” Waif says.  “Maybe if we—”  he stops.  “Wait, did you just hear a click?”\n\n“No.  Nothing.”\n\n[i]BOOM![/i]\n\nA solid block of granite explodes from the ceiling behind you, neatly sealing the corridor.  It’s big and thick and totally impenetrable.  It must weigh several dozen tons.\n\nYou wait, half expecting another door to open… but nothing more happens.  You’re boxed in, surrounded by stone on all four sides.  There’s nothing to look at.  Nothing to see.  And they’ll be even less, you’re afraid, when Waif’s torch finally goes out.\n\n“Maybe someone will come,” Waif offers.  “Sullivan’s crew, or perhaps someone else.  Maybe if we shouted [i]really[/i] loud…”\n\nFear grips you in the darkness.  It’s an awful lot of ‘maybes’.\n\nAll you can do is cross your fingers and hope for the best.  But for now at least, this is\n\n\n*goto_scene ending", "69": "\nYou stand before the remains of a once-magnificent palace.  The cracked walls sport carvings and mosaics, and the floors are set with tiles of jade, jet, and lapis.  There were probably tapestries and rugs as well, but these are long gone.  Victims of time, the elements, and the desert sands.\n\nWaif stands beside you as explore the residence’s broken halls.  He drops back slowly, however, as a distant sound picks up.\n\nSomewhere ahead, you hear low moaning.  It rises and falls with the wind, at times sounding like someone is in excruciating pain.  Waif mutters something unintelligible and traces a sign of warding in the air with one hand.  As you turn the next corner, the source of the noise comes into view.\n\nIt’s a face.  Set against the far wall is the large ceramic visage of a bearded man.  His expression is twisted, his lips pursed together in what could be either a tight grin or a frown, depending on what angle you look from.\n\n“Let’s check it out,” you say.  But Waif is already a half dozen steps behind you.  Whatever you’re going to do here, it’s obvious you’ll do it alone.\n\n*choice\n  #Continue to search the rest of the ruined palace\n    *goto_scene 132\n  #Maybe it would be safer to just head back to the street\n    *set advice +1\n    *if (advice = 3)\n      *achieve advice\n    *goto_scene 55", "7": "\n*set sandstone_key true\n*set journal true\n\nWelcome to the Arabian Desert!\n\nYou are DONOVAN YOUNG, entrepreneur, explorer, and most recently, would-be treasure hunter.  For the past six weeks you’ve been working hard to fulfill your grand-uncle’s unrealized dream; finding [i]ATRAHARSIS[/i] — the legendary city beneath the sands.\n\nYou were always adventurous, and never missed an opportunity to listen to your grand-uncle’s tales of traveling the world.  As his favorite nephew he left you a journal; the diary of Robert Murdoch, a man who once claimed to have found Atraharsis and then lost it again.  The journal contains clues, most in the form of riddles themselves.  Included with the journal is a thick piece of triangular sandstone, covered in glyphs, which your grand-uncle always claimed was the key to entering the city.\n\nUnfortunately, finding the city is proving a lot harder than you originally thought.  Since his passing, your grand-uncle’s estate has fallen into financial ruin.  You’ve used the last of his resources to fund your expedition, but with the money now gone and the supplies run out, your crew has finally abandoned you.  Only by securing one or more of Atraharsis’s three priceless star jewels, once gifted to the city’s greatest monarchs, can you hope to save your grand-uncle’s legacy.\n\nThis is your third night alone in the desert and a raging sandstorm ravages your small camp.  All you can do is ride it out, huddling up in your tent as the wind rips mercilessly at the thick canvas seams.  One peg comes loose.  Then two.  The entire canopy fills with a blast of air and you have a brief, terrifying vision of the whole tent being uprooted and flung into the desert sky.\n\n*page_break\n\nYou scramble to your feet!  But before you can do anything the flap of your tent swings open and a man enters.\n\nHe’s small.  Scrawny.  Covered from head to toe in dust and sand.  You don’t recognize him as one of your former crew, but it makes little difference.  The man spits a mouthful of dirt before quickly getting to work securing the loose tent posts.  You join him, and together you barely manage to keep your small canvas shelter from being torn from the ground.\n\n“I am Waif,” he coughs finally.  Outside the storm still howls, furious at being defeated.  “Actually my name is Renn, but they [i]call me Waif[/i].  The others, I mean.”\n\nYou look the man up and down as he dusts himself off.  He must be one of Sullivan’s crew.  The opposing dig team caused you a lot of worry when they first showed up over a week ago.  Now, you suppose, it doesn’t really matter.\n\n“I’m Donovan.  Donovan Young.  Mind if I ask how you got here?”\n\n“I left the other expedition,” Waif explains.  “The other men and I had… differences.”  He sighs and lowers his head in admission.  “In truth I was cast out.  Mr. Sullivan would not listen to me.  He digs too far to the north, and he operates under dangerously foolish conditions.”\n\n“Well I’m sure glad you showed up,” you say.  Waif returns your smile weakly.  The storm passes and the hours tick by.  By morning you know all about the other dig team, including how many of your men Sullivan managed to pick up.  Sadly you think back to your grand-uncle.  To his old manor house, empty now except for a whole lifetime’s worth of his personal treasures.\n\n“The best I can do is offer you breakfast,” you tell Waif as you step from the tent.  “I was actually about to pack up and—”\n\nAn object catches your eye, silhouetted against the golden sliver of rising sun.  Something is poking up from the sands…\n\n*page_break\n\n“Waif,” you cry out in excitement.  “Come on!”\n\nTogether you bound over to the object, a large four-sided obelisk jutting straight up from the sands.  It’s covered on all sides with strange glyphs and markings.  Some of them you recognize from your grand-uncle’s journal.\n\n“What is it?” asks Waif.\n\n“I don’t know, but it wasn’t here yesterday.”  All around the obelisk is a base of solid bedrock.  The sand is pushed back in every direction.\n\n“The storm,” Waif offers.  “Maybe the winds uncovered it?”\n\nYou run your hand over the ancient column, which towers a good six feet above your head.  Right around eye level you notice a very familiar, triangular-shaped hole.\n\n“The key!” you gasp.  Adrenaline surges through you as you pull the thick piece of stone from your rucksack.  “This must be the lock!  The key fits right—”\n\n“Hold on,” Waif warns.  “Look — there are holes like this on all four sides.  How do you know which side it belongs in?”\n\nHe’s right.  Each hole is the exact same shape as the piece of stone your grand-uncle gave you.  You glance down at the journal, searching for answers.  There you find a sketch… and a riddle:\n\n[b]North, South, East, West[/b]\n*line_break\n[b]One Brings Life, The Others Death[/b]\n*line_break\n[b]Sun and Moon and Stars Bereft[/b]\n*line_break\n[b]The One Right Way is Not the Left[/b]\n\nYou look back at the obelisk.  “Each of its sides are aligned to the four points of the compass,” you say.\n\n*page_break\n\nBelow the riddle is a crude drawing.  You wonder if it was sketched by Robert Murdoch himself.\n\n*image north_south_east_west.jpg\n\n“What does [i]‘bereft’[/i] mean?” Waif asks.\n\n“I means ‘without’,” you say absently.  And with your own answer, realization suddenly dawns over you.  “Waif, I get it!  We need to choose the side without the sun or moon or stars!”\n\nTogether you circle the obelisk.  Just above each of the four keyholes is a mark.  On the east face is the sun glyph.  Opposite that, on the west, is a moon.  A mark symbolizing the stars appears on the south side, and on the north…\n\n“Here,” you tell Waif.  “The crown.  It’s gotta be the crown.”\n\nYou reach up and plug the stone key into the obelisk.  Nothing happens.\n\n“Perhaps you have to turn it,” Waif suggests.\n\nWell, it looks like you have two choices.\n\n*choice\n  #Turn the obelisk key clockwise\n    *goto_scene 47\n  #Turn the key counter-clockwise\n    *goto_scene 153", "70": "\nYou act without thinking.  With one hand you shove Waif out of the way.  With your other, you grab his torch.\n\nThe spider misses your friend by mere inches.  It lands, turns, and begins scurrying straight in Waif’s direction.  Sweeping your arm downward, you set the torch to it.  The creature rears back as it catches fire and begins screeching like a wounded animal.\n\nYou help Waif to his feet, being sure to hold the torch out in front of you to ward off another attack.  Instead the spider scampers backward and buries itself beneath a pile of sand.\n\n“Did— did you see the markings on its back?” Waif gasps.  “That creature was deadly!”\n\nThis time it’s Waif who hugs you as you help him to his feet.  You push the lever back to its original position and watch as the west side doorway resets itself.  Maybe it wasn’t such a good choice.  Especially when you consider a new thought that just crossed your mind…\n\n*page_break Now Waif owes [i]you[/i] one!\n*goto_scene 120", "71": "\n“The tower is green,” you say.  “The star emerald on the map is green.  So let’s stick to the program and take the green side.”\n\nYou start up the four-thousand year old staircase, with Waif following close behind you.  Other than the disturbing lack of any railing, the steps are sturdy, solid, and safe.  For a while, nothing happens.  Then, about halfway up…\n\n“Donovan!”\n\nThe grinding beneath your feet alerts you just before Waif’s warning.  The jade steps have begun tilting downward!  They disappear into themselves on an angle, turning the entire staircase into a spiral slide!\n\nYou skid downward, picking up speed, your fingers grasping the tower stones for any sort of handhold.  Unfortunately they’re just too smooth.  Finally you resign yourself and brace your legs for impact.  But where the floor used to be, you notice the bottom of the stair landing has retracted into the wall!\n\n“Ungh!”\n\nWaif is gone, no longer beneath you.  Somehow he managed to swing his body over the side of the steps, landing hard but safely on the first floor.  You on the other hand, go sailing into the pit.  You fall another fifteen or twenty feet, squinting your eyes shut, willing your ankles not to shatter…\n\nLuckily you hit sand.  Soft, deep sand.  When you roll to a stop you’re staring at bones.  Thousands upon thousands of tiny little bones and teeth.  Waif’s torch throws light on the scene from above.  That’s when you notice the walls of the pit are decorated with intricate and beautiful carvings of long-fanged, deadly-looking snakes.\n\n“The Queen’s viper pit!” Waif calls down from above.  “I guess that staircase was for uninvited guests only.”  You sit up with the crackle and crunch of petrified snake bones giving way beneath your weight.  There must’ve been hundreds of snakes in here.  Maybe thousands.\n\n“Good thing the vipers died long before we got here,” Waif says.  When you look up again, a rope almost hits you square in the face.  “Get up here.  Let’s take the other staircase.”\n\nSnakes! Why did it have to be snakes?\n\n*page_break Climb out of the pit\n*goto_scene 147", "72": "\nThere’s little time!  You pull the diamond-shaped amulet from your pocket as the thunderous roar of surging water grows even louder.\n\n[i]A key to use in distant thunder…[/i]\n\nYou whirl around, facing the wall.  But as you go to plug the silver amulet into the depression, you drop it!\n\n[i]Before the waters pull you under…[/i]\n\n“DONOVAN!”  Waif’s scream is frantic.  You ignore him.  Bending through the pain in your knee, you grab the amulet once more and this time pop it into the wall…\n\nThe ground stops moving instantly.  Still, there’s almost no flagstone left.  You stand pinned on the edge, dripping with sweat.  Unable to move, until…\n\n“Yes!”\n\nThere’s another shift as the floor begins grinding back to its original position.  If you hadn’t been ready for it, it might have jarred you over the ledge!  Waif lets out a long breath as you’re slowly returned to the opposite end of the chamber.  When you finally step into the hallway with him, he throws you into a bone-crushing hug.\n\n“That was—”\n\nThe floor drops out beneath you.  It happens without a hint of warning.  You fall only a short distance, skid along a darkened stone ramp, and are ultimately deposited — via a hole in the ceiling — into yet another large chamber.\n\nAs you sit there rubbing your aching backside, Waif lands next to you with a loud thump.\n\n“This is getting old,” you groan as you struggle to your feet.\n\n*page_break You're battered and bruised, but you're still here!\n*goto_scene 142", "73": "\nThe opening looks dark and cold, and let’s face it, spooky.  You turn your gaze back to the top of the Ziggurat.\n\n“Stay there,” you tell Waif.  “I’m coming up.”\n\nWith hands shaking from exertion (at least you [i]think[/i] it might be exertion) you grab the next step.  Everything in your upper body aches.  As your footing has gotten increasingly worse, you’ve been transferring most of your body weight to your arms and chest.  Now that decision is starting to take its toll.\n\nYou’re almost to the top when you make the mistake of looking down.  Vertigo seizes you.  You’ve never been overly afraid of heights, but you’ve never been totally comfortable with them either.  The dizzy spell passes as you cling to a four-thousand year old chunk of rock; the only thing keeping you from a very long, very messy fall.\n\n“Look out!”\n\nSuddenly the stone beneath your feet gives way.  You dangle helplessly in the air by one arm, reaching out with your other hand for something… anything…\n\nQuick, flip two coins! What's the result?\n\n*choice\n  #Both coins come up HEADS\n    *goto_scene 126\n  #Both coins turn up TAILS\n    *set luck +1\n    *if (luck = 3)\n      *achieve luck\n    *goto_scene 62\n  #One coin is HEADS, the other is TAILS\n    *goto_scene 12", "74": "\nYou grab the green lense.  It feels heavy in your hand.  Walking over to the mosaic, you very carefully mount it in front of the star sapphire.  The room goes from bright blue to a deep turquoise or even sea green.\n\nAt first nothing happens.  Then…\n\n[i]CLICK![/i]\n\nThe noise comes from the dais itself.  A stone drops away at waist-height, revealing a small square aperture.\n\n“That must be it,” Waif says.  “There’s something inside — a lever or counterweight that raises the stone door.”\n\nBefore you can stop him your friend reaches inside the dark hole.  His arm goes in up to the elbow.\n\n“I don’t feel anything.  It’s empt—  ACK!”\n\nAs Waif yanks his arm back you expect the worst!  You’re pretty close.  A red-yellow scorpion is attached to his hand. one pincer clamped painfully around your friend’s thumb.  Its tail curves menacingly overhead, poised and ready to strike…\n\nUh oh! Flip a coin from your left hand and catch it in your right.\n\n*choice\n  #The coin comes up HEADS\n    *goto_scene 29\n  #The coin comes up TAILS\n    *set luck +1\n    *if (luck = 3)\n      *achieve luck\n    *goto_scene 138", "75": "\nYou’re caught between a wall of swarming rats or fleeing as fast as you legs will carry you into uncertain darkness.  It’s a bad choice either way, so you decide to trust your partner.\n\n“Here!”\n\nWaif’s torch lands at your feet.  You pick it up and hold it away from your body, rotating in a slow arc.  The rats scramble away!  In every direction you point the torch the rats fall back, afraid of the flames.  You’re about to call up for further instructions when something else lands beside you, slapping limply against the floor.\n\n“Take the rope!”\n\n[i]Rope?  Where’d he get rope?[/i]  Not that you aren’t grateful or anything…\n\nCarefully you loop the rope around your legs and waist, creating a very rudimentary cradle.  Sure enough, you feel yourself being lifted.  Your feet leave the floor and the next thing you know Waif has pulled you all the way to the mouth of the jagged hole created when the street gave way.\n\n“Thanks Waif,” you say as you swing yourself up.  He takes his torch back and nods.\n\n“We should get moving, Donovan.  Our time here is limited.”\n\n*page_break Continue through the streets of Atraharsis\n*goto_scene 13", "76": "\n*achieve snakebite\n\nYou don’t even see the asp.  Sleek and black, it strikes you before you have any chance to react.\n\nTwo red dots blossom on the back of your hand.  They glisten like jewels in the sun.  Waif kicks the snake across the room, but by then it’s already too late.  The asp’s neurotoxin kicks in, and you feel your body going rigid as your muscles involuntarily contract.  Your vision blurs.  Your mouth feels numb.\n\n“Donovan!” Waif cries out.  He’s shaking you now.  “D-o-n-o-o-o-o-v-a-a-a-a-a-n…”\n\nWaif’s voice is the last thing you remember as the darkness closes in.  For you, this is\n\n\n*goto_scene ending", "77": "\n*achieve gimp\n\nThe lizard looks slow, and your axe is sharp.  What could possibly go wrong?\n\nAs the creature saunters in you wind back take your best swing.  [i]THWACK![/i]  The axe crashes into the side of the lizard’s head exactly where you were aiming.  But its skin is too thick, its skull too hard.  Rather than penetrate the tough reptilian hide the weapon is jarred from your fingers and goes sailing through the air!\n\nWaif is having no better luck.  The monster takes little notice of his torch at all.  It pushes through you both, heading straight past on its way to the smooth white stones directly behind you.  It opens its mouth to strike… and misses!\n\nYou glance back.  The lizard has one of the stones in its mouth.  It starts turning back in the direction it came from.\n\n“Eggs!”  Waif cries in realization.  “The quakes probably woke it from its nest, and now it thinks these things are its eggs!”\n\nWhew.  What a relief.  You lower your axe when all of a sudden…\n\n“AARRGHH!!”\n\nWith a sickening crunch the creature accidentally steps on your foot!  It stomps away with the ‘egg’ in its mouth, but by then the damage is already done.  Your foot feels like a jigsaw puzzle with half the pieces missing.\n\nAfter avoiding the last swish of the monster’s tail, Waif comes running to your aid.  “We… I… Oh.”  One look at your foot is all it takes.  “Donovan, I’m… I’m sorry.”\n\nThe journey from Atraharsis will be painfully long.  The walk to a hospital even longer.  In time your foot will heal.  Probably.  Still, it doesn’t change the fact that right now this happens to be\n\n\n*goto_scene ending", "78": "\nThe Grand Courtyard is a huge mess of sand and rubble.  You step through cautiously, avoiding the sharper, more jagged pieces that threaten to slice your legs to ribbons.  You’re in the process of deciding which direction is least dangerous when, all of a sudden, the entire city is rocked by a massive, violent tremor.\n\n“Cover up!”\n\nThe walls of Atraharsis shake to their very foundations.  Buildings topple around you.  A massive dust cloud rolls through the Courtyard, barreling down at you with breakneck speed.  You stand frozen by the sight of it.  Unable to move…  \n\nAt the last second, Waif grabs your arm.  With surprising strength, he pulls you into the shelter of one of the smaller, more well-built hovels on one side of the street.  Dust swirls outside as the walls continue to shake.  Then, just as abruptly as it all started, everything stops.\n\n“Aftershock?” Waif asks when it’s all clear again.\n\n“Maybe,” you cough.  Your eyes sting a little, but you’re okay.  Thanks to Waif.\n\n“We’ll have to hurry,” you say needlessly.  “This whole city could come crashing down around us at any time.”\n\n“Also,” Waif adds, “Mr. Sullivan’s crew would’ve heard the tremors.  They could already be on their way here.”\n\nIt’s a fair point.  Peeking back out into the streets you see an open area not far to the west.  To the east, you notice the crumbling wreckage of what looks to be an elaborate palace.\n\n*choice\n  #Check out the open area\n    *goto_scene 112\n  #The crumbling palace sounds more interesting\n    *goto_scene 69", "79": "\n*achieve thimble\n\nYou pull and push on a series of slides and buttons, advancing your way through the puzzle box.  Its glass pieces move beautifully, even after dozens of centuries buried beneath the sands.  You’re pretty sure you’re getting close when all of a sudden…\n\n[i]CLICK![/i]\n\n“That’s it!” you cry out in triumph.  “I did it…”\n\nBut then you look down.  A bright red dot blossoms up from your index finger.  You hold it out curiously, then you see the needle.  The pinprick happened so quickly, the needle so insidiously positioned within the box you never even saw it.\n\n“Why are you bleeding?” Waif asks.  “What’s… the…”\n\nHis voice is suddenly slow.  Like he’s talking with a mouthful of marbles.  Or maybe it’s just that the room is moving.  The entire tower is spinning now, faster and faster until the next thing in your field of vision are the cobbles of the flagstone floor.\n\n“Dooooonnooooovaaaaaannnnnn…”\n\nWaif must’ve left the room, because now he seems miles away.  Or maybe, you realize with a growing horror, it’s you that’s leaving…\n\nYou were so close to the top of the tower.  But you’ll never see what’s up there, because this is\n\n\n*goto_scene ending", "80": "\n*achieve rubble\n\nYou scream out a warning but it’s already too late!\n\nWaif gets only partially out of the way as the tower of stone comes down.  His arms go up defensively as it crashes over him, knocking him to the cobblestone avenue and pinning him to the ground.\n\nYou’re there in just seconds, kneeing beside him.  He’s alive.  Still breathing.  But right now he’s unconscious, and there’s a enormous gash on his forehead.  You’re no physician but your friend is going to need stitches — and lots of them.\n\n“D-Donovan?”\n\nRelief floods over you as Waif wakes up.  He’s groggy, woozy.  His eyes have a glossed-over look to them that doesn’t feel right.  He probably has some sort of concussion.\n\n“Don’t worry,” you assure him.  “I’ll get you help.”\n\nYou wrap his wound and sit him up.  In time, he even stands.  Retracing your steps, you lead Waif slowly back through the city gates and toward the safety of your camp.  But as you look forlornly back over the city of Atraharsis, you begrudgingly realize your adventure has reached\n\n\n*goto_scene ending", "81": "\nThe south passage slopes definitively downward.  As you descend into the darkness the air gets cooler.  The walls of the passage also turn from brick and mortar to rough-hewn rock.  Tool marks on both sides show where, thousands of years in the past, the first citizens of Atraharsis used this area to quarry stone for the city.\n\n“There’s humidity down here,” you say.  Your voice echoes much too loudly in the enclosed space.\n\n“Perhaps because we’re underground,” Waif says.\n\n“Yes, but there’s way too much of it.”\n\nThe corridor widens.  Everything is dark and dank.  You can no longer see the walls on either side of you.  Beyond the meager corona of Waif’s torch, everything is black.\n\n“Maybe we should try the other passage.”\n\nYou’re in the process of deciding whether to continue when the corridor fills with the sudden grind of stone on stone.  The two of you whip around to find the source of the noise: a series of thick rectangular blocks has fallen behind you, forming a portcullis.  You’re cut off.\n\n“Well that settles that.”\n\nWaif looks the blocks up and down.  The openings between them are only about a foot and a half wide.  He sucks in his breath and, miraculously, just manages to squeeze his body through.\n\n\"Well at least [i]you’re[/i] not stuck here for all eternity,” you say sheepishly.  You know there’s no possible way you’d ever fit.  “Maybe you could, um, go for help?”\n\nYour partner sucks in his gut once again and squeezes back to your side of the stone portcullis.  “No my friend,” he says loyally.  “We’re in this together.”\n\n*page_break Venture on into the darkness\n*goto_scene 154", "82": "\nUp ahead, several roads converge around what must once have been a busy well.  A ring of beautiful gray stones is cut into a raised circular pattern, while four larger keystones are inscribed with symbols to represent the points of a compass rose.\n\nThe well shaft itself is smooth and featureless.  It leads down into a darkness so thick, not even the morning sunlight can penetrate to the bottom.\n\nWaif peers into the well curiously as he walks past.  On a whim, you pull a quarter out of your pocket.\n\n“What are you doing?”  Waif asks nervously.\n\n“Making a wish.”\n\n“In [i]there?[/i]”  Something about the whole thing obviously doesn’t sit right with him.\n\n“Sure.  Why not?”\n\nWaif doesn’t have an answer.  He only stands there, eyeballing the well shaft suspiciously.\n\n*choice\n  #Make a wish\n    *goto_scene 17\n  #Put the quarter back in your pocket and move on\n    *set advice +1\n    *if (advice = 3)\n      *achieve advice\n    *goto_scene 33", "83": "\n*achieve arachnophobia\n\nQuickly you sweep up the torch.  Then, trying to hold Waif as still as possible, you use it to get the spiders off his body.\n\n“Oooww!!!’\n\nThe flames are hot, and the spiders go up quickly.  But in the process, Waif’s is also burned.  His clothes are in tatters, and the skin of his arms and legs are bright red.  As you pull him to the opposite end of the chamber, the spiders stop their advance.\n\n“You okay?”\n\nWaif doesn’t answer — his face is too contorted in pain.  He’ll be alright eventually, but right now he needs some definite medical attention.\n\n“I have some antibiotics back in my tent,” you tell him.  “And salve.”\n\nYour friend nods.  Those two things sound great to him right about now.  Continuing on right now isn’t possible, but you’re comforted by the fact that you still have one of the star jewels!\n\nIf you escape Atraharsis, get back to camp, and make it out of the desert?  You’ll be able to save your grand-uncle’s estate!\n\nYou never did find the Hall of Kings, but that’s okay.  You and Waif had an amazing adventure, even if this happens to be\n\n\n*goto_scene ending", "84": "\nThere’s something about the statue that doesn’t seem right.  Something… missing.\n\n“Look around,” you tell Waif, as you begin your own search.  There’s sand everywhere.  It’s easy to move aside, but the only thing you find beneath it is rubble.  That, and more sand.\n\n“Nothing,” Waif says after a while.  “Unless you count this.”  He’s holding a small chunk of rock.  It looks like every other lump of stone you’ve seen so far.  Then he hands it over, and you realize it’s actually a tiny statue of a bird.\n\nYou run your thumb over the smooth marble surface of the little sparrow.  Without thinking, you reach out and place it into the statue’s outstretched palm.\n\nThe woman’s arm moves.\n\nIn one slow, smooth motion, the arm of the statue dips down a few inches and stops.  As it does, the woman’s jaw drops open.  Inside her mouth is a large amethyst.   \n\n“Whoa!” Waif cries.  “How’d you know that?”\n\nYou take the gemstone and hold it up to the sun.  It gleams a deep, beautiful purple.\n\n“I didn’t.”\n\n“But… you…”\n\nAll you can do is shrug.  “It was a lucky guess.”\n\nWell it's not one of the star jewels, but it's a pretty good start!\n\n*set amethyst true\n*achieve amethyst\n*set treasures +1\n*If (treasures = 2)\n  *achieve treasures2\n*If (treasures = 4)\n  *achieve treasures4\n*If (treasures = 6)\n  *achieve treasures6\n\n*check_achievements\n*If (((((((((choice_achieved_jade_bookends) and choice_achieved_coin_pouch) and choice_achieved_jewel_bag) and choice_achieved_crystal_box) and choice_achieved_silver_ingots) and choice_achieved_serpent_ring) and choice_achieved_pearls) and choice_achieved_amethyst) and choice_achieved_diamond_amulet)\n  *achieve all_treasure\n\n*page_break\n*goto_scene 102", "85": "\nThe avenue stretches north and east, to where the sheer bedrock cliff meets the city wall.  Here, along the sand-strewn rock face, several openings have been carved out by hand.  And high overhead, somewhere above, the obelisk.\n\n“The city was originally built against these cliffs,” Waif tells you.  “The first settlers cut out these caves here.”\n\nSome of the openings are deep and wide.  Using the torch you explore a few of them.  Eventually you see signs of human habitation.  Waif picks up one piece of a broken clay urn, turning it over and over in an attempt to read any writing he might find.  You’re just about to leave when you look down and stop dead in your tracks.\n\nResting before you is a fairly modern-looking journeyman’s pack.  It’s emblazoned with an insignia that matches the one on your journal.\n\n“It’s [i]his![/i]” you exclaim.  You scoop it up too quickly, knocking a century’s worth of dust up your nose.  “This pack belonged to Murdoch!”\n\nYou sneeze.  Twice.  Three times, then four.  When you’re finally done, you can’t understand why Waif seems frozen in some weird, awkwardly-crouched position.  That is, at least, until you follow his gaze…\n\nA large desert cat stands poised between you and the cave exit.  As you meet the stare of the cheetah’s yellow eyes, its lips curl back in a snarl.\n\n*choice\n  #Try fighting the animal off with Waif's torch\n    *set fight +1\n    *if (fight = 2)\n      *achieve fighter\n    *goto_scene 42\n  #Try throwing some water at it (hey, cats hate water, right?)\n    *achieve water\n    *goto_scene 15\n  #Chance it by running deeper into the cave\n    *set runaway +1\n    *if (runaway = 2)\n      *achieve runaway\n    *goto_scene 95", "86": "\nYou approach the small but beautiful mausoleum.  But when you look back from the doorway, you notice Waif hasn’t budged.\n\n“If you go in there,” he tells you, “it will have to be alone.  I am sorry.”\n\nYou shrug at him and peek inside.  Enough sunlight bleeds in to make out the details.  The small chamber is smooth and well-kept, its walls painted with faded scenes of long ago.  In some, you can make out the city as it once was; wide, elegant avenues filled with throngs of colorful people.  You see the ziggurat looming over a series of lush, water-filled gardens.  The Queen’s Tower, climbing delicately into a stunning orange sky.\n\nBut one feature stands out.  Chiseled crudely into the stone, in a graffiti-like way, is a series of hurried hieroglyphs.  You pull out your grand-uncle’s journal and translate the ancient writing:\n\n[i][b]Beware of False Kings[/b][/i]\n\nYou lean back for a minute, lost in thought.  False kings?  What does it mean?  Then, all of a sudden…\n\n[i]CRASH![/i]\n\nThe wall you happen to be leaning on gives way!  One entire side of the mausoleum caves outward, spilling you into the street.  Jagged stones and mortar shower down all around you as you’re enveloped in a cloud of dirt and debris.  You emerge unscathed but covered in a sheen of fine grey dust.  It gets in your mouth and lungs, causing you to cough violently.\n\nWaif is soon standing over you, extending one hand.  He helps you up and dusts you off.\n\n“Superstitious yet?” he smirks.\n\nYou're a little shaken, but it's all good. The path forks here.\n\n*choice\n  #Take the road to the right\n    *goto_scene 97\n  #Continue along the wider avenue\n    *goto_scene 43", "87": "\n“Quick!” you tell Waif.  “Into one of the buildings!”\n\nDucking back around the corner you choose the nearest doorway.  You’re through in seconds, crouching down, trying to make yourself as small a target as possible.  You can smell the jackals before you even see them.  Their rank, musty scent wrinkles your nose so badly you’re afraid you might even sneeze.\n\n“BACK!”\n\nYou turn just in time to see Waif kicking one of the mutts in the face.  Of course they sniffed you out… like all dogs, they have an exceptional sense of smell.  You should’ve known!\n\nThe jackal yelps in pain and skitters away to regroup with the others.  During the lull you pull Waif to his feet and drag him back outside.  Maybe there’s still time to run.  Better get moving.\n\n*page_break Run fast. Run very fast.\n*goto_scene 57", "88": "\n*achieve ants\n\n“Back away,” you tell Waif.  “We can’t fight them all, there are too many!”\n\nCarefully you retreat, but with every step you take the ants advance that much further forward.  Tons more spill forth from the fissure in the ground.  Soon they’re crawling over one another just to get to you.\n\n“Run!”\n\nThe ants move in a wave.  You stay ahead of them, but only barely.  Waif, of course, is ahead of you.  Nimbly he steps through Atraharsis’s rubble-strewn avenues, leaping and springing over obstacles until suddenly…\n\nWaif trips.  He falls hard, knocking the wind out of himself.  You’re running so fast you actually pass by him, and by the time you turn around the lower half of his body is already swarming with insects.\n\n“No!”\n\nYou pull off your rucksack.  Using it as a club, you beat most of the ants from Waif’s body.  There are fewer of them now.  You’ve traveled a good distance from their hive, and rather than pursue you many have turned around.  You beat the ants until your arm hurts, until finally you’ve driven away the last of the intruding insects.  But Waif still hasn’t recovered.  He’s covered in bites from the waist down; dozens of angry red bumps that look agonizingly painful.\n\nWaif writhes around on the ground for what seems like forever.  Eventually you help him to his feet, but his wounds are swelling up fast.  His skin feels hot.  He needs medical attention.\n\nFortunately you’re still close to the city gates.  If you leave now getting Waif help should be easy.  Unfortunately however, this means your adventure in Atraharsis has reached\n\n\n*goto_scene ending", "89": "\n“Hang on a second,” you tell Waif.  “Put your ear against that wall.”  Lowering his knife, Waif does as you tell him.  His eyes go wide.\n\n“The underground river,” you say.  “The one that fed the city?  It’s still here.  And it’s just on other side of that wall.”  You point out a series of wide, deep fissures, all of which are seeping water.  “That very [i]cracked[/i] wall.”\n\nWaif gulps as he puts his knife away.  Together you back out of the room, making your way into the next rough-hewn chamber.  The rush of water is even louder here.  But at least the walls are dry.\n\nA minute later your partner is holding his torch against one side of the room.  “Donovan,” he says.  “Come look at this.”\n\nSet into the chiseled rock wall, a series of crude levers and switches are set up.  Most are rotted completely away, but a few of the wooden artifacts still carry some weight to them.  By holding the torch close, you can see each lever is painted with a differently-colored band.\n\n“This is unbelievable,” Waif breathes.  “I mean, I knew the builders were engineers, but…”\n\n“But you didn’t know they’d harness the power of the river to run their machines?” you finish for him.  “This must be how the obelisk works.  Waif, this must be how they buried the city!”\n\nYou put your own ear to the wall now.  The river runs directly behind the ancient control panel.  You can hear it churning, swirling, millions of pounds of pressure kept at bay by nothing more than a thin layer of sandstone.\n\n“These switches could be what we’re looking for,” Waif suggests.  “They could open a door or chamber.  Maybe even the Hall of Kings.”\n\n“Or they could kill us both,” you answer back.  “How could they possibly still work?  Another tremor, even a small one, is likely to flood this entire place.”\n\nYou glance down at the controls.  They’re connected in sets, with only two pairs of levers still intact.  Off to your left, a shadow-filled corridor exits the machine room at the opposite end.\n\n*choice\n  #Pull the black and blue levers in series\n    *goto_scene 121\n  #Push the gold and red levers together\n    *goto_scene 28\n  #Leave well enough alone, and skip the levers entirely.\n    *goto_scene 44", "90": "\nFluttering in the wind, the threadbare remnants of a four-thousand year old tent have somehow survived beneath the sands.  All other supports have long since turned to dust, but one exceptionally thick pole juts defiantly upward.\n\nSuddenly there’s a great shifting and grating noise.  It sounds similar to when the Obelisk key was turned, only now it’s ten times louder and coming from every direction.  Soon everything begins to shake.  Rubble falls from the Atraharsis’s high walls, sending up plumes of dust all around the city.  For a heart-stopping moment you think the entire place is going to come crashing down around you, and then the rumbling stops and the air goes still.  Luckily you were near the center of the road.  Nothing dangerous came your way.\n\n“You okay?” you ask Waif.\n\n“Yes.  But the city appears to not be entirely stable.”\n\nYou can only smirk as you bite back a sarcastic remark.  It’s all you can do not to roll your eyes.\n\n“These tremors will be felt for miles,” Waif notes.  “My old team will have heard them, along with Mr. Sullivan.  They will come here, and soon too.”\n\nThat’s something you hadn’t though of.  It wipes the smile from your face as you factor in this new variable.\n\n“Should we search this place?” Waif asks.  “Or continue on?”\n\n*choice\n  #Poke around the area more thoroughly\n    *goto_scene 139\n  #Keep moving instead\n    *goto_scene 85", "91": "\n“Alright,” you say.  “If this place really spooks you, there’s another street that looks like it runs parallel.”  \n\nWaif is quick to jump at the opportunity.  He nods in gratitude and leads you from the arched area.  Soon you’re walking another avenue, although this one is more winding and cluttered with debris.  The cracks in the street are wider here, and some of them run deep into the ground.\n\n“I don’t know,” you say.  “Maybe we should go back.”\n\nYour partner chuckles.  “Nonsense.”  You notice he’s having a much less difficult time than you.  Smaller and lighter, Waif is also a lot quicker on his feet.  He picks his way past the rubble like it’s nothing.\n\nEventually the road narrows to the point where you almost have to walk single file.  A large crack — no, a fissure — runs through the middle of the alleyway.  Up ahead everything broadens out, but right now you’re faced with having to jump the gap.  How wide is it?  Ten feet?  Twelve?  It’s difficult to tell.\n\n“Hey, I don’t think—”\n\nWaif jumps before you can finish.  He leaps across the gap handily, with tons of room to spare.  \n\n“C’mon!  It’s easy!”\n\nWell it certainly [i]looks[/i] easy.  Sort of.  Then again…\n\nQuick, flip two coins! What's the result?\n\n*choice\n  #Both coins come up HEADS\n    *goto_scene 127\n  #Both coins turn up TAILS\n    *goto_scene 39\n  #One coin is HEADS, the other is TAILS\n    *set luck +1\n    *if (luck = 3)\n      *achieve luck\n    *goto_scene 104", "92": "\n*set star \"NULL\"\n\nYou place the star sapphire on the dais.  Off to your right, a door slides slowly open.\n\n“Watch out!”\n\nWaif tackles you to the floor as a trio of thick stone columns slam down from the ceiling.  The pillars land barely a foot apart, too thin for you to squeeze or reach through.  You’re cut off from the star gem!\n\nYou glance right.  The door is fully open now.  Immediately however, it begins sliding closed again.  With only seconds left you start toward it, willing your feet to move.\n\n“Waif, come on!”\n\nYou can see your partner is torn.  His gaze keeps moving between the rapidly closing door and the crude stone portcullis.  In the shadows of the alcove, the sapphire still gleams a brilliant blue.\n\n“Hurry!”\n\nEventually there’s no choice — you turn sideways and hurl yourself into the shadowy hallway.  When you look back you expect to see Waif right behind you… but he’s not there.  The door is almost closed now.  Only a thin sliver of light separates you from total darkness.\n\n“Waif!”\n\nAt the last possible second your partner comes flying into the corridor.  His torch flickers as the door slams closed.  When he’s finally finished gathering himself, he looks up at you sheepishly.\n\n“Well, that was…”\n\nYour voice trails off and a moment of silence passes between you.  Rather than admonish him further you take Waif’s torch and walk to the end of the new hallway.  “Come on,” you say with forced cheerfulness.  “Let’s see what was worth sacrificing a star jewel for.”\n\n*page_break\n\nYou enter a low, box-shaped room littered with sand.  The walls here are worn smooth, except for strange vertical grooves from floor to ceiling.  A simple stone altar stands in the center of the chamber.  It has a opening in the top, and several smaller holes cut symmetrically into all four sides.  The base of the altar is covered in glyphs.\n\nYou give the torch back to Waif.  “What’s it say?”\n\nTwo ancient braziers sit on either side of the altar.  Waif touches the torch to them on a whim, and they immediately light up!  The room fills with sweet-smelling smoke as the centuries-old charcoal burns.  Waif translates easily by the new light:\n\n[i][b]Death by Fire[/i][/b]\n*line_break\n[i][b]Water, Life[/i][/b]\n*line_break\n[i][b]Yet Earth is Key[/i][/b]\n*line_break\n[i][b]To End Your Strife[/i][/b]\n*line_break\n\nAlmost on cue, a noise fills the chamber.  The ceiling feels suddenly lower… or rather, the floor beneath you is grinding upward!\n\n“We’re going to be squashed!” Waif cries.  The floor is already past the entrance, eliminating any possibility of retreat.  “What do we do?”\n\nYou scramble, searching for an answer.  The ceiling is flat and unremarkable, except for a slight recess directly above the altar.  No help there…\n\n*choice\n  #Put out the flaming braziers and hope the floor will stop\n    *goto_scene 46\n  #The altar has an opening. Maybe you could pour water into it?\n    *goto_scene 60\n  #Try scooping sand into the altar\n    *goto_scene 151", "94": "\nYour hand closes over one of the jade bookends.  Then, with pantherish speed, Waif knocks your arm away.\n\n“What the—”\n\nAn asp slithers out from beneath the ruined chest.  It looks long and black and very deadly.  The snake’s head strikes the air where, only a split second before, your hand had rested.  After missing its target it slides quickly away, disappearing beneath some rubble.\n\n“Waif!” you cry out in astonished gratitude.  “Nice going!”  You hug him, and probably a little too tightly.  He grunts.\n\n“You saved my life!”\n\nYour friend looks back at you sheepishly.  “Perhaps.  It was nothing, really.  Where I come from—”\n\n“Wherever you come from, you move faster than that asp!  And for that I’m grateful.”  You toss him the bookends before slapping him roughly on the back.  “These are yours, my friend.  Now let’s get going.”\n\n*set jade_bookends true\n*achieve jade_bookends\n*set treasures +1\n*If (treasures = 2)\n  *achieve treasures2\n*If (treasures = 4)\n  *achieve treasures4\n*If (treasures = 6)\n  *achieve treasures6\n\n*check_achievements\n*If (((((((((choice_achieved_jade_bookends) and choice_achieved_coin_pouch) and choice_achieved_jewel_bag) and choice_achieved_crystal_box) and choice_achieved_silver_ingots) and choice_achieved_serpent_ring) and choice_achieved_pearls) and choice_achieved_amethyst) and choice_achieved_diamond_amulet)\n  *achieve all_treasure\n\n*page_break Whew, close call! Head back into the streets of Atraharsis\n*goto_scene 124", "95": "\nIn the rear of the cave, a dark opening leads into the next chamber.  Or it leads absolutely nowhere.  Truth is, you really don’t know.\n\n“Back up,” you tell Waif.  You do your best to keep your voice calm, controlled.  “Slowly.”\n\nYour friend takes a careful step backward.  So do you.  The cheetah mirrors your movements, although you do gain some measure of distance between yourselves and the big cat.  Finally, with your back is pressed up against the darkness, you dare a quick look over your shoulder.  In the meager light of Waif’s torch, you see nothing but a dead end!\n\n“Can’t go that way,” you say in measured tones.  Murdoch’s journeyman’s pack dangles from your hand.  “When I throw this thing, RUN.”\n\nHalf a moment later, your chance comes.  The cat looks down, but only for a split second…\n\n“GO!”\n\nYou hurl the pack has hard as you can, then sprint along the rightmost edge of the cave.  Waif goes left.  You don’t even look back, all you can hear is the sound of the heavy bag striking the cheetah square in the face.  Then you’re out in the sunlight, bolting away from the cave opening.  Waif is pumping hard alongside you.\n\nEventually you stop and turn around.  You’re not being pursued.  Relief washes over you, followed immediately by regret.  Why couldn’t you have thrown something [i]else?[/i]\n\n“I really wanted to know what was in that thing,” you lament.\n\nWaif shakes his head.  “I know.”  He points back to where the huge cat paces back and forth along the cave opening.  “But it belongs to her now.”\n\n*page_break Hey, at least you're not breakfast!\n*goto_scene 97", "96": "\n“Knowledge!” you cry.  “That’s the answer!”  \n\nYou’re practically shaking your partner by now.  He stares back at you quizzically.  \n\n“Waif, if there’s anything we learned about Atraharsis, it’s that its founders and rulers valued knowledge above [i]everything[/i] else!”\n\n“But… but that’s not tangible,” Waif says.  He glances down at the pedestal.  “How do you place [i]knowledge[/i]?”\n\nYour mind goes blank for a moment.  Then, slowly, you draw your grand-uncle’s journal from your rucksack.  Gingerly you place it on the simple stone pedestal.\n\nThe pedestal lowers.  You watch as Robert Murdoch’s hundred year-old journal sinks slowly into the floor, disappearing to a place it poetically belongs.  There’s the low grating of stone on stone, and a door opens in the wall before you.\n\nYou see scrolls.  Scroll tubes of bone.  A few dozen at least, they lay stacked in a neat pile, sealed at the ends with beeswax.\n\n“Their knowledge,” Waif breathes.\n\nYou nod solemnly.  “Yes.  Their discoveries and advancements.  Their art, their culture.”  You pick up one of the scroll cases, trying to imagine the last time another person actually touched it.  “They preserved it all here, for others to find.  Even across four millennia.”\n\nWordlessly Waif begins gathering up scrolls.  You do the same.  It means dumping half the treasure in your rucksack, but you do it anyway.  You already have enough gold and jewels to last you a lifetime.  But the true treasure, you realize, is the collective wisdom of Atraharsis.\n\nAs you slide the last tube into your pack a low rumble fills the Hall.  Somewhere deep below, a series of hollow booms seems to be getting louder and louder.  It’s followed by an even more ominous background noise that rises above the rest; the thundering rush of water.\n\n“The underground river!” Waif exclaims.  “We have to hurry!”\n\n*page_break Hurry onward\n*goto_scene 162", "97": "\nThe road here widens around a central pool, built with some of the most beautiful masonry work you’ve ever seen.  Each stone fits perfectly within the next, the edges so sharp and crisp it looks almost as if done with laser efficiency.  It’s a testament to the builders that the structure has lasted this long, especially after being shaken to the surface from deep beneath the desert.\n\n“The architects here were masters,” Waif says.  “It’s a shame so much of their knowledge was lost with the city itself.”\n\nYou’re still not sure what happened to the city.  Was Atraharsis razed?  Sacked?  Or did its engineers somehow find a way to bury it, to hide its secrets from the rest of the world?\n\nYou hop up into the pool itself, which is filled with a fine sand.  A preliminary search reveals a colorful mosaic on the bottom, made up of thousands of tiles.  You motion Waif over.  “Help me with this.”\n\nTogether you work to uncover the picturesque artwork that graces the bottom of the once-beautiful pool.  When you’ve scattered most of the sand to the far corners, the image of a woman is revealed.  She’s garbed in a starkly-colored dress of alternating red and black, and menaced by a snarling dog.  The woman is running in the opposite direction.\n\n“Nothing else in here,” Waif sighs.  He swipes an arm across his forehead and it comes back slick and glistening.  “Should we keep moving?”\n\n*page_break Keep moving\n*goto_scene 145", "98": "\n“Might as well check out everything,” you tell Waif.  “Just… be careful.”\n\nWaif steps forward and prods the sacks with his foot… which turns out to be the worst possible choice.  The pile crumbles to dust at his touch, and hundreds of spiders begin pouring forth.\n\n“Aaaaaa!!!!” he screams.  It’s hard to see anything with Waif swinging the torch back and forth.  “Get them off of me!”\n\nYou rush forward to help him beat the spiders from his leg.  But they’re on his arms now, too.  Waif strikes at them with the torch, singing all the hair from his forearms and burning himself in the process.  The spiders themselves go up in waves of flame, like tiny pieces of dried paper.\n\n“Stop moving!  Stop struggling!” you tell him.  But he can’t.  Waif falls backward into the pile where even [i]more[/i] of the arachnids swarm over him.   He drops the torch…\n\n*choice\n  #Use the torch to get the rest of the spiders off your friend\n    *goto_scene 83\n  #Grab the torch and use it on the spiders' nest\n    *goto_scene 130", "99": "\n*achieve mushrooms\n\nYou look up at the crown.  It’s the only symbol that’s not an animal.  It’s also the only symbol that’s regal.\n\n[i]The Hall of Kings…[/i]\n\n“It’s gotta be the crown,” you tell Waif.  “Come on, let’s go!”\n\nWaif follows dutifully.  The only hint of skepticism on his part is a small backward glance as you make your way through the shadowy exit.\n\nAlmost immediately things change.  The floor is polished.  The walls take on a more finished feel.  Everything seems nicer, more beautifully designed.  Then the hall opens into another chamber, this time a throne room!\n\n“This is it!” you cry.  “The Hall of Kings!”\n\nYou stop, the smile fading from your face.  Something is wrong.  There’s something soft, almost spongy beneath your feet.  Waif swings his torch low, and that’s when you realize you’re standing in a mushroom patch.  \n\n“What the—”\n\nYour feet are stuck.  These aren’t like any mushrooms you’ve ever seen.  The strange grey fungus is everywhere, all dry and powdery.  It covers the walls, the floor, the ancient throne itself.  You’re able to pull your feet free, but every movement sends up clouds of powder.  It gets in your eyes, your nose, your mouth…\n\n“Spores…” Waif chokes.  “Stop moving.  They’re… the spores…”\n\nAll of a sudden you’re very, very tired.  Your legs weigh a thousand pounds each.  Your arms hang like tree trunks at your sides.  You open your mouth to say something but all you can manage is a bone-cracking yawn.  You look over at Waif and he’s already laid down, right in the middle of the mushrooms.\n\n“Waif…”  Your voice is slurred and far away.  “We… cant… we have to…”\n\nNow your eyelids are heavy too.  They droop closed, and a wonderful sense of peace steals over you.  Maybe you just need to sit down and rest a minute.  Or maybe, just maybe, this is\n\n\n*goto_scene ending", "authors": "\nDanny McAleese started writing fantasy fiction during the golden age of Dungeons & Dragons, way back in the heady, adventure-filled days of the 1980's. His short stories, The Exit, and Momentum, made him the Grand Prize winner of Blizzard Entertainment's 2011 Global Fiction Writing contest.\n*line_break\nHe currently lives in NY, along with his wife, four children, three dogs, and a whole lot of chaos. \n*line_break\n*link www.dannymcaleese.com\n\nDavid Kristoph lives in Fort Worth, Texas with his wonderful wife and two not-quite German Shepherds. He's a fantastic reader, great videogamer, good chess player, average cyclist, and mediocre runner. He's also a member of the Planetary Society, patron of StarTalk Radio, amateur astronomer and general space enthusiast. He writes mostly Science Fiction and Fantasy. \n*line_break\n*link www.DavidKristoph.com\n\nCheck out the full Ultimate Ending series!\n*line_break\n*link www.UltimateEndingBooks.com\n\n*choice\n  #Play TREASURE OF THE FORGOTTEN CITY again\n    *goto_scene startup\n  #Check out a sneak peek for Ultimate Ending #2: THE HOUSE ON HOLLOW HILL\n    *goto_scene sneak_peek\n  #End the game\n    *goto_scene ending", "choicescript_description": "Three priceless star jewels. A century-old, cryptic journal. Using only the resources left by your grand-uncle, it's up to you to find Atraharsis—the legendary lost city beneath the sands. But the way won't be easy. Raging sandstorms, sinister traps, and a whole host of mysteries stand between you and your Ultimate goal.\n\n[i]Treasure of the Forbidden City[/i] is a 40,000 word interactive fantasy novel by Danny McAleese and David Kristoph, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\nCan you solve the riddles and recover the fabled star gems in time? Or will you, like so many who've gone before, become the next permanent resident of the forbidden city?\n\n• Filled with clever riddles and challenging puzzles.[n/]\n• Hours of story-forging, problem-solving enjoyment.[n/]\n• 49 possible achievements to unlock.[n/]\n• Find clues, tips, and items that can help you in your quest.[n/]\n• 26 unique conclusions based on your decisions.[n/]\n• One ULTIMATE ENDING!\n", "choicescript_stats": "*label top_of_stats\nYou're carrying the following items:\n*if journal = true\n  *line_break\n  -Robert Murdoch's journal\n*if sandstone_key = true\n  *line_break\n  -Sandstone key\n*if map = true\n  *line_break\n  -Map of Atraharsis\n*if salt = true\n  *line_break\n  -Salt\n*if diamond_amulet = true\n  *line_break\n  -Diamond amulet\n*if amethyst = true\n  *line_break\n  -Amethyst\n*if coin_pouch = true\n  *line_break\n  -Pouch of silver and gold coins\n*if star = \"emerald\"\n  *line_break\n  -[b]Star Emerald[/b]\n*if star = \"sapphire\"\n  *line_break\n  -[b]Star Sapphire[/b]\n*if star = \"ruby\"\n  *line_break\n  -[b]Star Ruby[/b]\n*if jewel_bag = true\n  *line_break\n  -Large bag of jewels\n*if pearls = true\n  *line_break\n  -Pearls\n*if crystal_box = true\n  *line_break\n  -Puzzle box\n*if serpent_ring = true\n  *line_break\n  -Gold serpent ring\n\n\n*temp roll\n*temp coin\nIf you need to make a random dice roll or coin flip:\n*fake_choice\n  #Roll one die\n    *rand roll 1 6\n    You roll a ${roll}\n  #Roll two dice\n    *rand roll 2 12\n    You roll a ${roll}\n  #Flip one coin\n    *rand coin 1 2\n    *if (coin = 1)\n      The coin lands HEADS\n    *if (coin = 2)\n      The coin lands TAILS\n  #Flip two coins\n    *rand coin 1 4\n    *If (coin = 1)\n      The coins both land HEADS\n    *If (coin = 4)\n      The coins both land TAILS\n    *If (coin = 2) or (coin = 3)\n      One coin lands HEADS, the other TAILS\n*page_break Return\n*goto top_of_stats", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements and delay timers.\n\n  *purchase adfree $4.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements and delay timers.", "death": "\n\n\n\n\nYou have died.\n\n*goto_scene ending", "ending": "\n*page_break The End\nWe hope you've enjoyed playing [i]Treasure of the Forbidden City[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99 $0.99\n", "gosub": "Under the hood, this chapter uses the gosub command to execute subroutines.\n\nThe school bully is being mean to you.\n\n*choice\n  #Stand up to him.\n    He's a lot tougher than you are; you hit him, but he barely even notices.\n    \n    *gosub feelings\n    \n    He beats you up and takes your lunch money.\n    *finish\n  #Give him my lunch money.\n    He takes your money and laughs at you.\n    \n    *gosub feelings\n    \n    He leaves you alone for the rest of the week.\n    *finish\n\n*label feelings\n\nHow do you feel about this?\n*choice\n  #Angry.\n    Maybe you can get even some day.\n    *return\n  #Sad.\n    You do your best, but you think he can probably see your shame.\n    *return\n", "hallway_guess": "\nSince you have no idea which jewels to pick, you'll have to choose one of the three exits and hope for the best!\n\n*choice\n  #Take the hallway on the left\n    *goto_scene 155\n  #Take the hallway on the right\n    *goto_scene 68\n  #Take the center hallway\n    *goto_scene 149", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set journal true\n*set map true\n\nBelow the riddle is a crude drawing.  You wonder if it was sketched by Robert Murdoch himself.\n\n*image north_south_east_west.jpg\n\n“What does [i]‘bereft’[/i] mean?” Waif asks.\n\n“I means ‘without’,” you say absently.  And with your own answer, realization suddenly dawns over you.  “Waif, I get it!  We need to choose the side without the sun or moon or stars!”\n\nTogether you circle the obelisk.  Just above each of the four keyholes is a mark.  On the east face is the sun glyph.  Opposite that, on the west, is a moon.  A mark symbolizing the stars appears on the south side, and on the north…\n\n“Here,” you tell Waif.  “The crown.  It’s gotta be the crown.”\n\nYou reach up and plug the stone key into the obelisk.  Nothing happens.\n\n“Perhaps you have to turn it,” Waif suggests.\n\nWell, it looks like you have two choices
