<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Treasure of the Forbidden City — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "treasureoftheforgottencity", "title": "Treasure of the Forbidden City", "scenes": {"100": "\n*achieve nakatomi\n\n“I don’t know which blocks go where,” you say forlornly.  “And I’m afraid of trying the wrong ones.  Knowing the engineers that built this city, who knows what would happen?”\n\nWaif has no choice but to agree.  Together you turn to face the marble column.\n\n“You really think you can climb that thing?”\n\n“Guess we’ll find out,” Waif says.\n\nHe starts up it, and at first things seem okay.  Waif’s fingers find cracks you can’t even see with your own eyes.  His feet find tiny toeholds.  Slowly but surely, he makes his way upward.  But then, for seemingly no reason, he stops.\n\n“Hang on…” Waif says.  His voice seems shaky.\n\n“What is it?”\n\n“Is the column moving?”\n\nYou look down.  Sure enough, the entire column is rotating.  Waif is being pulled away from you, clockwise, with the grinding of stone on stone.  Abruptly the cylinder lurches downward.  Sinks another ten or fifteen feet.\n\n“Jump!” you tell him.  “Get down!  Now!”\n\n[i]BOOM![/i]\n\nSomething deep inside the tower shifts.  Or maybe it collapses.  There’s a hollow, rumbling sound followed by what sounds like it could be rushing water.  And then…\n\nEverything falls away.  Waif, the column, the emerald — the whole world is a mass of whirling, falling stone as the entire Queen’s Tower comes apart from the bottom up.  You don’t cry out.  You don’t even have time.  All you have is one last perfect view of Atraharsis as you cartwheel downward through the morning sky.\n\nFor you, as well as for Waif, this is regrettably\n\n\n*goto_scene ending", "101": "\nYou don’t know who this person is, but assaulting them from behind just doesn’t seem right.\n\n“Hey!” you call out.  “You!”\n\nThe figure doesn’t react.  He doesn’t move.  You wait another few seconds, then step out into the street from behind the safety of the broken column.\n\n“How did you get—”\n\nThe sentence falls back down your throat.  Waif, for some reason, is suddenly laughing.  “Look!” he points.\n\nOff to the side, the statue of a man stands on a sand-strewn pedestal.  He’s holding a staff in one hand and a set of scrolls in the other.  It’s then you realize the figure leaning against the pillar isn’t a man at all.  It’s nothing more than a shadow, made tall by the morning sun.\n\n“Should we get him?” Waif jeers.  “Or should we let him go?”\n\nThere’s nothing you can do but chuckle yourself.  The laughter actually feels good.  It breaks the tension.  Warmth begins spreading over you as the sun climbs into the sky.\n\nA brief search of the fire pit turns up nothing but rubble, refuse, and a few petrified, gnawed-upon bones.\n\n“We should get going,” Waif says.  “The day is escaping us.”\n\nTwo wide, identical avenues stretch away from the fire pit in a new direction.\n\n*choice\n  #Take the road to the east\n    *goto_scene 103\n  #Take the road to the west\n    *goto_scene 124", "102": "\nYou continue beyond the Oasis into another even larger area.  Here your surroundings become less streets and avenues and more of a mass of toppled structures, all of them in varying stages of decay.  The wind howls through the broken stone of hollowed out homes.  As it rises and falls, it creates a creepy wailing sound.\n\n“This looks like the Ruins,” you say, “from Murdoch’s map.”\n\nMany of the buildings around you are massive, or at least were massive when they were first constructed.  It’s obvious they were once very beautiful.  Worn cobbles beneath your feet poke through in many places here.  Thinking about the people who walked on it — more than four and a half thousand years ago — leaves you with a sense of awe.\n\n“Donovan!  Wait!”\n\nWaif’s warning comes too late as you round the next corner.  A pack of what appear to be wild dogs is patrolling the street.  One raises its nose and sniffs the air.  It sees you, and they all come running.\n\n“Waif!  The dogs—”\n\n“Not dogs, jackals,” Waif says.  He’s holding his torch out before him in a defensive posture.  “They’ll be on us in seconds!  What should we do?”\n\n*choice\n  #There still might be time to run\n    *set runaway +1\n    *if (runaway = 2)\n      *achieve runaway\n    *goto_scene 57\n  #You could try to make a stand\n    *set fight +1\n    *if (fight = 2)\n      *achieve fighter\n    *goto_scene 11\n  #Or maybe you could hide in one of the buildings\n    *goto_scene 87", "103": "\nThe avenue you travel is long and wide and filled with sand.  Some piles are even taller than you are, and as you make your way among them you notice yourself walking on a definite tilt.   It’s almost as if the road beneath your feet slopes downward.  With all the sand it’s impossible to tell.\n\nAll of a sudden Waif stops and points with an outstretched arm.  “There is the temple on your map.”\n\nHe’s right.  The dome is cracked and most of the arched entrances have long since fallen over, but the resemblance is unmistakable: you’re standing before the Temple of Luus’.  And within its walls, if Murdoch’s map is right… one of the fabled star jewels.\n\n“Who is Luus’?” Waif asks.\n\n“I was hoping you’d know.”\n\nYour friend shrugs and shakes his head.  “The people of Atraharsis had many gods.  Many temples.  They worshiped a variety of—”\n\nWaif stops because you’ve already left him in the street.  Passing beneath one of the unbroken archways, you make your way into the temple’s once-sacred inner halls.  There’s a lot less sand inside.  The floors are smooth, and painted murals decorate the walls.  Although faded with age, you can make out a few scenes depicting the people who once lived here.  Most of the settings are outdoors.  The people kneel prostrate before the temple, all heads turned to the sky.\n\n“Sun worshipers?” you ask.\n\n“Could be,” Waif says.  “Could be anything else, too.”\n\nThe halls get more decorated and beautiful as you continue through them.  Then, as you get nearer the temple’s inner chambers, a room up ahead seems bathed in a glowing blue light.\n\n“The star sapphire!” you exclaim.  “Come on!”\n\n*page_break Did you really find it?\n*goto_scene 129", "104": "\nYou wind back, take a running start, and then at the last minute, jump…\n\nWaif is there to catch you on the other side, absorbing your momentum.  You spin around and look back.  Not only did you cross the gap, you made it easily.\n\n“See?” Waif says.  “Told you.”\n\nYou can’t help but smile.  It’s good to have a partner you can trust.  Even better, you’re pretty sure Waif feels the same way.\n\n*page_break Pat yourself on the back and move on\n*goto_scene 21", "105": "\nA dozen large avenues feed into what was unmistakably some kind of central bazaar.  This was obviously a place of great trade.  Everywhere you look you see ancient stones set among petrified timbers — all that remains of the colorful booths that once made up a huge inner city of tents and stalls.\n\n“We’ve passed a lot of statues,” you say.  “But none of warriors or generals.  I’ve seen no swords, no spears…”\n\n“That’s because Atraharsis was a city of enlightenment and wisdom,” Waif says.  “The people here valued knowledge above everything else, even gold and gems.”\n\nYou wrinkle your nose in distaste.  “Let’s hope not.  Or I came all this way for nothing.”\n\nSearching the area thoroughly would take months, even years, so all you can do is a cursory job.  Together you find little that isn’t buried beneath tons of sand and rubble.  You pick up an ancient bowl, intact and valuable.  Also amongst your treasures you count a polished onyx statue of a woman petting a cat.  When you look over at Waif however, he’s bent over a jug he recently unsealed.  Your friend is eagerly scooping fistfuls of pink and white rock salt into his pack.\n\nYou can’t help but laugh.  “Waif, why?”\n\n“You can always use salt!” he tells you simply.\n\n“Yeah, but salt that’s thousands of years old?”  You still don’t get it.  “After all this time, wouldn’t—”\n\nWithout warning the ground breaks open before you.  Only this isn’t an earthquake, or a tremor.  This is something entirely different.\n\n“Ants!”\n\n*set salt true\n*page_break \n\n*image ants.jpg\n\n*page_break\n\nDozens of angry-looking insects begin spilling from the torn ground.  They’re the biggest ants you’ve ever seen.\n\n“Red desert ants!” Waif shouts.  “All these tremors must have disturbed their colony!”\n\nThe ants advance toward you, their antennae quivering in the air.  You can see their mandibles opening and closing.  They look sharp and incredibly painful.\n\nThrough sheer bad luck your back happens to be up against one of the larger structures in Atraharsis’s central bazaar.  There might be time to flee, or you can choose to fight the ants off using the flames of Waif’s torch.\n\nThe ants number in the hundreds now, and they’re still pouring from the ground.  Whatever you choose, you’d better do it fast!\n\n*choice\n  #Stand your ground and try fighting off the ants\n    *set fight +1\n    *if (fight = 2)\n      *achieve fighter\n    *goto_scene 140\n  #You'd rather take your chances and run\n    *set runaway +1\n    *if (runaway = 2)\n      *achieve runaway\n    You're going to need to roll two dice (or just pick a random number from 2 to 12) and enter it below:\n    *temp roll\n    *input_text roll\n    *if (roll = 3) or (roll = 5)\n      *goto_scene 88\n    *if (roll = 7) or (roll = 9)\n      *goto_scene 88\n    *else\n      *set luck +1\n      *if (luck = 3)\n        *achieve luck\n      *goto_scene 150", "108": "\n*achieve arachnophobia\n\n“Waif!”  You move to push your friend out of the way, but not before the spider sinks its fangs into his neck.\n\nWaif screams.  You reach for his torch, but he’s flailing too hard.  Eventually he drops it, the torch instantly going out in a large pile of sand.  As Waif falls, clutching his neck, the spider turns to face you.\n\nYou reach back into your rucksack and your fingers close over your camping hatchet.  Unfortunately, this time it’s stuck.  As hard as you pull, it just won’t come free.  In the meantime, Waif is moaning as his body fights whatever toxin the spider just injected into him.  You glance back and the creature is almost on you.\n\nAt the last second you kick it.  The crunch of its body is oddly satisfying, even through the fear.  But joy turns to terror as you watch the spider’s underbelly break ripely open.  Hundreds of smaller spiders come pouring from their mother’s body, swarming in your direction.  And they’re not happy.\n\nWhat’s worse than a venomous spider bite?  A hundred spider bites.\n\nSorry to say it, but this is\n\n\n*goto_scene ending", "109": "\n“Well we’re already here,” you tell Waif.  “Might as well make our way straight inside.”\n\nYou advance forward and find yourself feeling very small.  Nothing remains of the great gates to the city.  The walls are broken, shattered piles of stone that yawn inward where mounds of sand and rubble make up all new avenues of Atraharsis.  Off in the distance, strange cracking sounds come from an unknown origin.  It could be the wind.  It could be your imagination.  The entire thing is very, very eerie.\n\nWaif pulls a long torch from his own pack and lights it.  The flames feel good as they drive some of the morning chill from the air.\n\n“Where does your grandfather’s journal say to go next?” Waif asks.\n\n“Grand-[i]uncle[/i],” you correct him.  “Besides, it wasn’t originally his journal.  It belonged to a man named Murdoch.  He was here over a hundred years ago.”\n\nThe map is nondescript here, and this portion of the journal doesn’t offer much guidance.\n\n“There’s the main courtyard,” you say.  “Let’s start there.”  \n\n*page_break Head over to the Courtyard\n*goto_scene 78", "11": "\nYou don’t know much about jackals, but you do know something about dogs.  And turning your back on a pack of charging hounds is probably the worst thing you can do at this point.\n\n“HA!” you scream as loud as you can.  “HAAA!  HAAAAA!”\n\nYou pull your camping hatchet from your rucksack, never taking your eyes from the lead dog.  By standing up straight, and flaring your shoulders, you try to make yourself look as menacing as possible.\n\n“HAAA!” Waif repeats a little more awkwardly.  His height and stature are unfortunate in this situation, but your partner has the advantage of his torch.  The flames leave a trail of greasy black smoke as he waves it before him in a wide arc.\n\nThe combined display gives the jackals pause.  They halt their advance and begin growling suspiciously, side-stepping in a circle as they try to gain position.  But they’re still coming…\n\nAll of a sudden something flies through the air.  There’s a loud thump, and the dogs leap off to one side.  The snarling is replaced by snapping and biting as the three of them fight tooth and nail in the desert sand.\n\nYou back up slowly.  Incredibly, the jackals don’t even notice you anymore.\n\n“What in the world was that?”\n\n“A haunch of goat,” Waif replies.  He wipes a greasy hand on his pack as he closes it.  “[i]Spiced[/i] goat.”\n\n[i]Ugh.[/i]  You’re caught between being grateful and feeling sorry for the poor animals.  But hey, at least you’re still in one piece.\n\n*page_break Nice job sticking up for yourself!\n*goto_scene 118", "110": "\nThe rats are swarming, they’ll be on you in seconds.  There’s no way you’re staying put!  You whirl around and run full tilt down the pitch black hallway.  Anything’s better than being gnawed on by a hundred rats.  In the tunnel at least, you’ll have some protection.  Maybe.  You hope…\n\n[i]WHAM![/i]\n\nYou wake staring up into a blinding white light.  [i]Is this the afterlife?[/i]  You’re not entire sure.  For several moments you can’t remember anything beyond your own name.  And then…\n\n[i]Oh yeah!  The rats![/i]\n\nYou bolt upright, feverishly slapping at every part of your body.  You’re relieved to find no rats in sight.  Gradually your eyesight returns and a man fades into your vision.  It’s Waif!\n\n“I [i]told[/i] you not to move,” he admonishes you.\n\n“What happened?”\n\n“You ran full speed into a wall.  Or at least I [i]think[/i] it was a wall.  It was too hard to tell down there.  Too dark.”\n\nYour hand goes to your head.  There’s a nasty, painful bump, but when you pull your palm away it comes back clean.  No blood.  That’s good, at least.  \n\n“But… How’d you get me out?”\n\n“The rats wouldn’t come near my torch,” Waif explains.  “Plus, I have this.”  He pats a thick coil of rope.  “Next time listen to me.  Are you okay to walk?”\n\nYou nod and Waif helps you up.  After drinking half your canteen you promptly upend some of it over your head.  Waif frowns at the waste of good water, but by all accounts it was a necessary thing.  You feel seventy-five percent better.  Maybe eighty.\n\n*page_break Better get moving. The star jewels aren't going to find themselves, right?\n*goto_scene 13", "111": "\nAt long last you stand before the Queen’s Tower.  It’s been impressive all morning from a distance, but up close the structure takes on all new levels of beauty and wonder.\n\nSmooth white stone of an unknown origin winds its way high into the desert sky.  The tower itself looks almost like the queen on a chessboard.  Its curved hourglass shape flares out near the top, forming what resembles a green-jeweled crown.\n\n“There’s no door.”\n\nWaif is right.  You pass through a marbled arch straight into the lower level of the tower itself.  Everything inside, though ruined, still retains a certain measure of refined elegance.  Sand partially covers the lavish, tattered carpets.  Shredded tapestries rot on the walls, parts of them still sporting vivid color.\n\n“Which Queen was this built for?” you ask.\n\n“I don’t know know,” Waif says.  “But she had great taste.”\n\nThe second floor is several stories overhead.  Two staircases wind their way upward in opposite directions to the next level.  One of them is stone.  The other is green, set with pieces of jade inlay.\n\n“Which one?”\n\nWaif shrugs.  “I suppose it doesn’t matter.  It appears they both lead to the same place.”\n\n*choice\n  #Take the stone staircase\n    *goto_scene 147\n  #The green jade staircase sounds better\n    *goto_scene 71", "112": "\n“Let’s head over to that open area,” you tell Waif.  “That way if there’s another tremor, at least nothing will fall on top of us.”\n\nThe avenue eventually yawns into what must’ve been a beautiful, scenic Oasis.  Water once fed this place in abundance.  Smooth tiles mark pathways through gardens now filled with nothing more than sand.  There are fountains everywhere, and statues of birds and fish.  Everything is done with amazing craftsmanship, from the empty pools to the mosaics set into the surface of the marble benches.\n\n“The rulers of Atraharsis were engineers,” Waif explains.  “They built many wonderful things.  These were their gardens, fed from beneath the city by a great aquifer.”\n\nYou remember your grand-uncle telling you tales of a tunnel system beneath Atraharsis.  In his stories the tunnels were filled with treasure, not water.\n\n“I thought the Hall of Kings was beneath the city?”\n\nWaif nods.  “It was said to be, yes.”\n\n“Then maybe we should look for a way down.”\n\nWhile searching the area you walk past a group of exquisite female statues.  They stand in a circle, laughing, splashing, playing… all except one.  The lone woman faces away from the group, palm up, with one outstretched arm.  It’s almost like she could be pointing.\n\n*choice\n  #Follow in the statue's direction\n    *goto_scene 40\n  #Search the Oasis for other clues\n    *goto_scene 84\n  #You'd rather continue onward\n    *goto_scene 102", "113": "\nYou step onto a red tile.  You don’t hesitate, or even think about it — you just do it.\n\nNothing happens.\n\n“Excellent,” Waif says.  “Now just stick to the red ones.”\n\nUnfortunately it’s not going to be that easy.  The next red tile is too far away.  You’ll have to step on one of the other colors first.  You choose again…\n\nWaif winces as you place your right foot onto one of the black tiles.  This time you move slowly, shifting your weight little by little.  As your trailing foot finally leaves the red tile, you grit your teeth…\n\n“We still okay?”\n\nYou sense Waif nodding somewhere behind you.  “We’re good.”\n\nBy sticking just to the red and black tiles, you make you way across the hall.  Your partner mimics your path, taking exactly the same steps, until the two of you stand safely on the familiar flagstones of the opposite hallway.\n\nWaif shrugs as he looks back.  “Maybe the white tiles did nothing too?”\n\nYou can only smirk.  “Why don’t you try them?” you suggest.  “I’ll wait here.”\n\n*page_break Continue braving the shadows of the Underhalls\n*goto_scene 44", "114": "\nThe interior of the Ziggurat is a collection of dust and shadows.  The sun streaming in through the doorway reveals only a small slice of the chamber.  The rest is lost in darkness, at least until Waif files in behind you.\n\nAs your friend’s torch illuminates all the but the far corners of the rectangular room, you can make out writing on the walls.  Beautiful glyphs are carved in neat, immaculate columns.  For a moment you wish your grand-uncle were here.  He would sit here deciphering every one of them, telling countless stories from long, long ago.\n\n“Any idea what they say?” you ask Waif.\n\nHis eyes dart up and down as he holds his torch up to the wall.  “Mostly they are a warning.  The ones I know, anyway.”\n\n“Warning against what?”\n\nWaif shrugs apologetically.  He points out that some of the writings look smoother than the rest.  Rather than a bunch of glyphs, this part of the wall appears to be a map.\n\n“More tunnels,” Waif says.  He drags a finger along a series of dust-caked lines.  “They connect the Ziggurat to the catacombs of Atraharsis.”\n\nIn the back of the room you find a small exit, and beyond that, another chamber.  This one however, glows with a light of its own.  A red light.\n\n“Come on!” you cry.  “This way.”\n\nNot far above you, an opening in the ceiling leads to a pure crimson chamber.  Hand and footholds have been carved into the wall, forming a ladder of sorts.\n\n“That’s the top, right?”\n\n“I think so.”  Waif looks apprehensive about the light.  Probably he’s just spooked.\n\n“Well let’s go!”\n\n*page_break Climb the ladder to the top of the Ziggurat\n*goto_scene 25", "115": "\nThe giant piece of wall hurdles inexorably downward, screaming through the dust and chaos.  There’s no time to move…\n\n[i]BOOM![/i]\n\nIt crashes violently into the ground only a few feet away!  Smaller pieces break off, showering you with dirt and gravel.  You might have a few cuts or scrapes when everything is said and done.  The good news is, you’re going to be okay!\n\nAs the tremors grind to a halt you feel Waif’s hand close over your arm.  He pulls you from the alley and leads you into the open area, eliminating any further risk of getting crushed.\n\n“We shouldn’t delay,” you say when everything has returned to normal.  “Between the sandstorms raging out there and the ground shifting in here who knows how long this city will stay unburied.”\n\nWaif nods his agreement.  “We need to move quickly for another reason,” he advises.  “Sullivan and his crew would have felt the tremors.  If I were him, I would be heading this way to investigate.”\n\nYou stare back at your friend blankly.  You hadn’t thought of that.  Just one more thing to worry about…\n\n*page_break Better keep up the pace\n*goto_scene 105", "116": "\nYou walk the streets of Atraharsis exuberantly, your head still spinning with accomplishment.  The star jewel is going to solve all of your problems.  You and Waif will be known, respected.  Maybe even famous!  But best of all, recovering the priceless gem will certainly save your grand-uncle’s estate.\n\n“Where to now?” Waif asks.\n\nYou walk over to where the street is the most broken.  Beneath the rubble, the sunlight illuminates a man-made underground passage of brick and stone.  “Down there,” you say.  “The Underhalls.”\n\nIt’s almost crazy.  Atraharsis has proven unstable enough, yet here you are willing to go deeper.  But you know you’ll never achieve your final goal without traversing the series of tunnels dug beneath the city.\n\n“Is Sullivan after the Hall of Kings as well?” you ask Waif.\n\n“Of course.”\n\n“Then you know it’s down there,” you point.  “We’re here, and he’s not.  So let’s go do it.”\n\nYou climb down and begin walking the tunnels.  Eventually all sunlight dissipates, leaving you in halls that are pitch-black and choked with dust.  Waif’s torch lights the way, but beyond its glow the rest of the world is totally unknown.  The darkness is like a blanket, draped in every direction.\n\nAbruptly Waif stops walking.  You bump into him.\n\n“The halls run left and right here,” he says.  “Which one do we take?”\n\n*choice\n  #The left passage sounds good to you\n    *goto_scene 51\n  #The right hallway sounds better\n    *goto_scene 119", "117": "\nThe serpent looks like the most deadly of all the glyphs.  Therefore, you theorize, it must be safe.\n\n“Let’s take the snake,” you tell Waif.  Your friend hesitates, but only for a moment.  Holding the torch before him, he follows you into the shadows.\n\nThe corridor continues for a long while.  It also appears to curve to the right.  At certain intervals other corridors open into the main hallway, but all of them are impassable; each one is choked closed with rubble and sand.\n\n“Think we picked the right one?” Waif asks.\n\nYou shrug.  “Impossible to tell until we get there.”  And just as you finish saying it, ‘there’ arrives in the form of another darkened chamber.\n\nThe two of you step forward and peer inside.  But it’s not until you’ve entered the room that you realize what just happened…\n\n“It’s the same room!” you cry.  You see six walls, six glyphs — everything is precisely the same as you left it.\n\n“Did we walk in a circle?” Waif asks.\n\nYou glance back at the hall you just came out of.  Etched into the stone above it you see the horse.\n\n“Yeah.  Looks like the horse and serpent are connected to the same hallway.”  You frown.  “We walked all that way for nothing.”\n\nWaif flashes a gold-toothed smile your way.  “No, not nothing.  We just eliminated two wrong choices.”\n\nHe makes a good point. Now there are only four exits left for you to choose from.\n\n*choice\n  #Pick the exit marked with the DOG\n    *goto_scene 146\n  #Pick the exit marked with the CROWN\n    *goto_scene 99\n  #Pick the exit marked with the CAT\n    *goto_scene 156\n  #Pick the exit marked with the HAWK\n    *goto_scene 160", "118": "\nThe sound of barking and braying eventually fades into the distance.  The jackals are gone!  You guide Waif through a few twists and turns just to be on the safe side, and emerge back onto one of Atraharsis’s wide, sand-swept avenues.  Everything around you is the same sun-bleached beige.  \n\nA long, low structure captures your attention, mainly because of a large inscription over the doorway.  Pulling out your grand-uncle’s journal, it takes only moments to translate:\n\n[b][i]The Greatest Treasures Lie Within[/i][/b]\n\n“This is it!” you exclaim.  You can’t jam the book back into your rucksack fast enough.  “Waif, come on!”\n\nInside, the building is half-filled with sand.  An entire wall is caved in, and sunlight streams in from above.  The rest of the structure is filled with shelves.  Wall to wall, they’re packed with thousands of scrolls and scroll cases of yellowed bone.\n\n“Where are the treasures?” you ask.  Absently you pick up a stack of papyrus pages bound crudely together with glue.  The precursor of an actual book.\n\n“I believe you’re holding them.”\n\n“This?” you cry indignantly.  “These books and scrolls?”\n\n“No,” Waif explains.  “The [i]knowledge[/i] within these books and scrolls.  To the founders of Atraharsis, that was more valuable than anything else.  Even gold or jewels.”\n\nYou frown as the fragile paper turns to dust between your fingers.  “Well then they won’t mind if I look around for some [i]real[/i] treasure.”\n\n*choice\n  #Search the library some more\n    *goto_scene 30\n  #Search somewhere else\n    *goto_scene 124", "119": "\nThe hall widens here into a large, rectangular room.  It might have once been a sub-basement or an antechamber, but now it appears empty.  You notice it’s a lot cooler down here.  Other than some dark stains across floor, the only other feature is an identical exit in the opposite wall.\n\n“There’s something lying over there,” Waif says.  “In the corner.”\n\nHe moves that way before you can say anything.  After having led the way through the city, it’s weird having to follow your partner now.  But he’s the one with the torch.\n\n“Slow down,” you tell him.  Your voice is nasal.  It seems that with every movement you make, the dust of centuries swirls its way up your nostrils.\n\nThe object comes into view.  Three moldy, decrepit sacks are stacked in a rough pile.  Who knows how long they’ve been there.  Your nose wants nothing to do with them.\n\n“Should we check them out?” Waif asks.\n\n*choice\n  #Four thousand year-old sacks? Why not check them out?\n    *goto_scene 98\n  #On second thought, why bother? Continue on instead\n    *goto_scene 152", "12": "\nWaif reaches out and grabs your arm... but you’re too heavy.  He doesn’t have the strength to hold you, and together the two of you go rolling down the side of the Ziggurat!\n\nThe whole world becomes a blur of light and noise.  You tumble for what seems like forever, giving your body up to gravity, trying to stay loose enough that you don’t break anything.  A bed of jagged rock guides you painfully down the stone pyramid, but it also slows your fall.  The friction eventually brings you to a sharp, grinding halt.\n\nThe next thing you know Waif is standing over you.  You stand up, brush yourself off, and take stock of the situation.  You’re alive, and you appear to be intact.  Ditto for Waif.  For now at least, it seems you’re both okay.\n\n“I suppose we’ll be taking your way,” says Waif.  He points to the dark opening in the Ziggurat.  It’s only a few steps above where your fall ended.\n\nYou nod at him and then cough.  Something shifts uncomfortably behind your ribs.\n\n“Let’s do it,” you say.  “Before the pain kicks in.”\n\n*page_break Head into the heart of the Ziggurat\n*goto_scene 114", "120": "\n“The sun rises in the east,” you reason, “so most of the sunlight is streaming in from that direction.”\n\nA moment later you’re standing by the east lever.  Waif stands at the ready, wincing with anticipation as you pull it.\n\nFor a few seconds nothing happens.  You’re afraid that maybe the mechanism is too old… that centuries of being buried have destroyed whatever it once did.  But then you remember, this is Atraharsis.  Its craftsmen were celebrated and renowned for their amazing works of engineering.\n\nThere’s a distant boom, followed by the low, hollow grinding of stone on stone.  As the tremendous granite block begins lowering itself, a stone door rises out of the floor in the east hallway.  It continues upward, blocking the sunlight as it moves to meet the ceiling.  Once there, it stops.\n\nSunlight still enters from the west, but that light is subdued, diffused.  Your eyes adjust to a room that is now mostly dark.  Through the star jewel, crimson light streams in from above.  But now you see something else… a pattern of small depressions cleverly cut into the wall and ceiling.  A path that leads straight up —  and over — to the star ruby.\n\n“I got this,” Waif tells you.  He climbs the wall nimbly, using the shallow depressions as hand and footholds.  When he reaches the ceiling he grabs two similar depressions and kicks gently away from the wall.  He’s dangling thirty feet in the air now, by only his fingertips.\n\n“Be careful!”\n\nAs if he’s been doing it his whole life, Waif moves hand over hand across the ceiling.  You marvel at his agility.  When he reaches the star jewel he plucks it free, tucks it into his shirt, and reverses direction.  You breathe a deep sigh of relief as he makes the wall again and scrambles back down.  When he hands you the gemstone he’s wearing a broad smile.\n\n*achieve ruby\n*set treasures +1\n*If (treasures = 2)\n  *achieve treasures2\n*If (treasures = 4)\n  *achieve treasures4\n*If (treasures = 6)\n  *achieve treasures6\n\n*check_achievements\n*If (((((((((choice_achieved_jade_bookends) and choice_achieved_coin_pouch) and choice_achieved_jewel_bag) and choice_achieved_crystal_box) and choice_achieved_silver_ingots) and choice_achieved_serpent_ring) and choice_achieved_pearls) and choice_achieved_amethyst) and choice_achieved_diamond_amulet)\n  *achieve all_treasure\n\n[b]You did it!  You recovered the star ruby of Atraharsis![/b]\n*set star \"ruby\"\n\n*page_break Time to head back down the Ziggurat and into the city\n*goto_scene 135", "121": "\n*achieve paddle\n\n“Here,” you tell Waif.  “Help me with these.  Ready?  One… two…”\n\nSimultaneously you pull down on the black and blue levers.  They move smoothly, but with the feeling of a heavy weight somewhere behind them.  There’s a loud [i]CLICK[/i] deep within the wall, followed by a few long seconds of nothingness.  Then…\n\n[i]WHOOSH![/i]\n\nA puff of wind swirls up from behind the panel, blowing all the hair away from your face.  The rushing of water gets louder.  And louder…\n\n“Switch it back!” Waif yells.  He’s shoving on the levers with all his might.  “Switch it back!”\n\nQuickly you grab hold of the sticks alongside him.  You heave forward, putting all of your weight behind it, when suddenly…\n\n[i]SNAP[/i].  Both levers break off in your hands!\n\nYour partner looks back at you in growing horror.  He opens his mouth to say something, but before he can get anything out the room dissolves in an icy explosion of water and stone…\n\nAs the unstoppable force of the underground river sweeps you under, you realize with dismal certainty this must be\n\n\n*goto_scene ending", "122": "\n*set crystal_box true\n*achieve crystal_box\n*set treasures +1\n*If (treasures = 2)\n  *achieve treasures2\n*If (treasures = 4)\n  *achieve treasures4\n*If (treasures = 6)\n  *achieve treasures6\n\n*check_achievements\n*If (((((((((choice_achieved_jade_bookends) and choice_achieved_coin_pouch) and choice_achieved_jewel_bag) and choice_achieved_crystal_box) and choice_achieved_silver_ingots) and choice_achieved_serpent_ring) and choice_achieved_pearls) and choice_achieved_amethyst) and choice_achieved_diamond_amulet)\n  *achieve all_treasure\n\nThe staircase finally ends.  Out of breath and out of steps, you make it to the very top of the Queen’s Tower.\n\nThe view from up here is amazing.  The broken city of Atraharsis lies spread out beneath you, like a bunch of child’s blocks tumbled over.   The obelisk sits high on the cliff overlooking it all, and beyond that, the desert stretches in every direction.\n\nA long, slender column of smooth stone rises high into the sky above you.  Atop it, gleaming green in the morning sun, is the star emerald of Atraharsis.\n\nYour stomach lurches just thinking about how high off the ground you are.  And yet the emerald is even higher, impossibly out of reach.\n\n“How are we going to get it down?”\n\nThe corner of Waif’s mouth twists in thought.  “I can climb it,” he tells you.  For once however, there’s no confidence in his voice.  He almost looks skeptical.\n\n“No way.  There are no handholds.”\n\n“There are [i]always[/i] handholds,” Waif replies.\n\nScattered at your feet you notice a bunch of square stone blocks.  Some of them are embossed with images of what appear to be animals.  As you kneel to examine them, Waif taps your shoulder and points to the base of the column.  “Look at this.”\n\nSet into the column itself are three square holes.  Two of them are empty.  The third one is already filled with one of the animal blocks: the rodent.\n\n“I’m starting to understand the people who built this city,” you tell Waif.  “And I’ll bet anything this mechanism brings the column down.”\n\n*page_break\n\n“We need to put the correct blocks into the first two holes,” you say.  “But which ones?”\n\n*image queens_tower_puzzle.jpg\n\nYou scavenge around the top of the tower. You find only five different blocks to choose from.\n\n*image queens_tower_puzzle2.jpg\n\nIf you can figure out which two blocks to pick, take the number of the FIRST block as the tens column and the number of the SECOND block as the ones column, and enter it on the next screen.\n\nFor example, if you put the crocodile block (1) in the left hole, and the lion block (5) in center hole, you would enter 15.  (HINT: It’s not page 15)\n\nIf you don't know the answer, DON'T GUESS. With a little luck, Waif still might be able to climb the column! \n\n*choice\n  #You know the answer\n    *input_text block_answer\n    *if block_answer = 34\n      *goto_scene 34\n    *else \n      Unfortunately, that's not right. Looks like Waif is going to have to climb.\n      *goto_scene waif_climbing\n  #You don't know the answer\n    *goto_scene waif_climbing", "124": "\nFurther west, the broken roads and avenues turn mostly to sand.  Among these, with the sheer face of the cliff looming not far in the distance, you come across a broad series of standing stones.\n\n“The Necropolis,” Waif tells you.  “It’s on your map.”\n\nA chill runs through you as you make your way through the ancient cemetery.  Elaborate monuments mark the lives of people who’ve been gone for four dozen centuries. There’s an air of stillness here.  An unsettling calm.  As creepy as it seems, this is the one place Waif doesn’t seem spooked by.  As superstitious as your friend is, it appears death is the one thing that doesn’t frighten him.\n\n“Donovan!  Look!”\n\nYou’d been avoiding the grave markers, but not Waif.  Pegged to one of the taller ones, a diamond-shaped amulet of pure silver gleams in the sun.  Beneath it, a message has been scrawled in charcoal.\n\n[i]A Key to Use in Distant Thunder[/i]\n*line_break\n[i]Before the Waters Pull You Under[/i]\n\n“It’s in English!” you cry.  The flowing black letters are distinct and familiar.  You flip open the journal to compare the handwriting.  It matches perfectly.  “It’s from Murdoch!”\n\nCarefully Waif removes the amulet from its peg.  He flips it over, finds nothing on either side, and hands it to you.\n\n*page_break\n*set diamond_amulet true\n*achieve diamond_amulet\n*set treasures +1\n*If (treasures = 2)\n  *achieve treasures2\n*If (treasures = 4)\n  *achieve treasures4\n*If (treasures = 6)\n  *achieve treasures6\n\n*check_achievements\n*If (((((((((choice_achieved_jade_bookends) and choice_achieved_coin_pouch) and choice_achieved_jewel_bag) and choice_achieved_crystal_box) and choice_achieved_silver_ingots) and choice_achieved_serpent_ring) and choice_achieved_pearls) and choice_achieved_amethyst) and choice_achieved_diamond_amulet)\n  *achieve all_treasure\n\n“Why would he leave this here?” Waif asks.  “And why the message?”\n\n“Murdoch’s expedition split up,” you explain to him.  “He had more than one group searching for the star jewels.  They must’ve been leaving hints for each other.”\n\n“Okay, but why the rhymes?”\n\nYou think about it for a moment.  “I don’t know.  I always figured he was just a strange guy.  But maybe… maybe there was another expedition looking for Atraharsis also.  Kinda like us and Sullivan.”\n\nWaif reads the charcoal message again, this time out loud.  “Waters,” he laughs.  “Pulling you under?”\n\nWith one hand you pick up a fistful of sand.  The wind carries it away as it slips through your fingers.  “I don’t know,” you say.  “Atraharsis was dried up long before Murdoch’s crew got here.”  A frightening thought occurs to you.  “Maybe they were dying of thirst.”\n\nWaif nods solemnly.  “Or seeing a mirage.”\n\nAs you slip the strange amulet into your pocket you see a wide road leading back to the east.  Not far down, it forks to the left and right.\n\n*choice\n  #Take the left fork\n    *goto_scene 103\n  #Take the right fork\n    *goto_scene 18", "126": "\n*achieve ziggurat\n\n“Waif!  Hel—”\n\nYour friend reaches out for you, but just a moment too late.  You drop through the air a good fifteen feet, bounce off the stone beneath you, and instantly begin rolling down the face of the Ziggurat.  Sharp, jagged stone claws at you from every direction. Cut and scrapes however, are the least of your concerns right now…\n\nActing quickly, you splay your arms and legs outward in order to slow your roll.  It helps, but it also leaves you vulnerable.  At one point your left leg is bent backward at a disturbing angle.  There’s a muffled pop that originates from somewhere behind your kneecap, and you find yourself screaming in agony.  \n\nThe wind is knocked from your lungs as your back slams into one of the stone slabs.  Lifting your head groggily you take stock of the situation.  You’ve fallen about halfway down the Ziggurat, and your leg is most certainly broken.\n\nThe good news is that you’ll live.  Everything but your pride will eventually heal.  But as Waif scrambles down to help carry you back through the gates of Atraharsis, you come to the solemn realization that this is\n\n\n*goto_scene ending", "127": "\nYou back up slowly, trying to gauge the distance.  Sometimes the jump looks impossible.  At other angles, it looks easy.\n\n“Just do it already,” Waif calls from the other side.\n\n[i]Here goes nothing![/i]\n\nYou run… and jump.  Halfway across you realize your leap isn’t [i]nearly[/i] as good as Waif’s.  You’re going to fall short!\n\nThe air leaves your lungs all at once as you slam chest-first into the opposite wall of the small chasm.  Your hands and fingers claw at the dirt, but they’re slipping fast!\n\nWaif’s face goes from one of total confidence to a complete, almost comical look of dismay.  He runs over, grabs your wrists, and pulls you up just before your fingers give way.  You lay there panting, sucking in air but not oxygen, for what seems like forever.\n\n“Sorry,” Waif says sheepishly.  “I thought you—”\n\nYou hold up one hand until your breath comes back.  “You know why they call you Waif, right?”\n\nYour friend blinks.  “Because I am small.  And thin.”\n\n“And fast,” you chuckle.  “Come on, let’s go.”\n\n*page_break Close one! Brush off the dirt and continue\n*goto_scene 21", "128": "\n“If these symbols are glyphs of ‘doom’, we should probably learn what they are.  That way we can avoid them.”\n\nYou look the tower up and down, trying to find a weak spot.  One of the mid-sized boulders seems to be loose.  If you brushed away enough sand, you’re sure you could shift it.\n\n“C’mon Waif, help me with this one.”\n\nThe two of you get to work.  You spend the next ten or fifteen minutes clearing compacted sand away from the ancient stone.  It’s like scraping cement, only softer, easier.  Eventually you can wiggle it.  A little bit at first, and then a lot.\n\nSoon you’re pushing, shoving.  When your shoulder hurts, you start kicking.  Nothing seems to be working.  You’re about to give up when all of a sudden…\n\n“Waif, look out!”\n\nA stone splits in half near the bottom of the pile with a resounding CRACK!  Then the whole thing topples over.  It’s falling… but not in the direction you wanted it to!\n\nQuick, flip two coins!\n\n*choice\n  #Both come up HEADS when they land\n    *goto_scene 80\n  #Either (or both) of the coins show TAILS after flipping\n    *set luck +1\n    *if (luck = 3)\n      *achieve luck\n    *goto_scene 32", "129": "\nYou race into the temple’s inner sanctum, with Waif right behind you.  A stunningly beautiful mosaic makes up one entire wall.  In the center of it, gleaming brightly, is a star sapphire the size of a baseball.\n\n“That’s it!” you cry exuberantly.  “Waif, we did it!”\n\n[i]BOOM![/i]\n\nNo sooner do the words leave your lips than the room explodes with a hollow bang.  A giant block of granite has dropped from the ceiling of the hallway you just came from, totally and completely sealing off the exit.  Waif looks utterly pale.  If your partner delayed even just another second he’d be as flat as a pancake right now!\n\n“How… how do we get out?” he wavers.\n\nSlipping your grand uncle’s journal from your rucksack you turn quickly to the temple entry.  By the cerulean light you read the following passage:\n\n[b][i]When Drowning in a Sea of Blue[/b][/i]\n*line_break\n[b][i]Only Royals May Pass Through[/b][/i]\n*line_break\n\nWaif blinks.  “Well we’re certainly drowning in blue.  But what’s royal in here?”\n\nThe room itself is fairly empty.  A raised dais near the mosaic contains a collection of thick glass spheres in an array of different colors.  Most of them are broken.  A few are left intact.  Looking back at the sunlight streaming in through the star sapphire, you notice something interesting…\n\n“I got it!” you tell Waif.  “See that brass mount in front of the sapphire?  It’s made to fit these lenses.  The priests of the temple could swap them out.  Use them to change the color of the room.”\n\nThere are three lenses left unbroken. But which--if any--is the right one?\n\n*choice\n  #Mount the red lense\n    *goto_scene 26\n  #Try the yellow lense\n    *goto_scene 37\n  #The green lense seems right\n    *goto_scene 74", "13": "\nHurrying through the city, you’re still out of breath when a crude structure juts skyward in the road ahead.   Tall and lean, it appears to be made of several large stones fitted carefully together.  It also seems oddly familiar.\n\n“This is the monolith,” you say, pulling out your grand-uncle’s journal.  “See?  Here it is on the map.”\n\nSurrounding the strange totem are three smaller towers of stacked stone.  Two of them seem to have fallen over a long time ago.  A third one still stands, but only partially.\n\n“The journal talks about this place,” you tell Waif, “but in the form of a riddle.”  You open to the page read the following passage aloud:\n\n[b]Six Spokes Around a Buried Wheel[/b]\n*line_break\n[b]Three Glyphs of Certain Doom[/b]\n*line_break\n[b]Tread Wisely Down the Path of Kings[/b]\n*line_break\n[b]Step Wrong and Seal Your Tomb[/b]\n\n“It makes no sense,” says Waif.  “There are three spokes here, and no wheel.  And nothing is buried.”\n\nThe two of you pace slowly around the monolith in contemplation.  In doing so you notice that each fallen tower bears a mark — or glyph — carved beneath it.  One of the marks is a horse.  The second one is a hawk.\n\n“Are these the ‘glyphs of certain doom’?” Waif asks nervously.\n\n“I don’t know,” you reply, “but I’m writing them all down.”  You notice your partner doesn’t appear very happy at the news.\n\n“Should we knock this one down as well?” Waif finally asks, pointing out the third tower.  “More than likely there will be another glyph beneath it.”\n\nOdds are he’s probably right.  The column of stacked stone already leans precariously to one side.  But it also looks dangerously unstable.\n\n*choice\n  #Help Waif topple the third tower\n    *set advice +1\n    *if (advice = 3)\n      *achieve advice\n    *goto_scene 128\n  #Leave it alone\n    *goto_scene 41", "130": "\nYou sweep up the torch and make your decision: before helping Waif you need to cut off the creatures at the source.  You touch the flame to the ancient sacks…\n\nThe spider’s nest goes up in a giant fireball!  It flares, and for a brief moment the entire chamber feels like you’re getting the worst sunburn of your life.  The spiders cringe, curling up into tiny balls.  They fall away from Waif’s body like black rain.\n\n“What was that?” Waif blinks.\n\n“Their nest.”\n\nYour friend is still blindly patting down his arms and legs.  He must’ve been staring directly at the flames.  As you search the room, the glint of metal catches your eye.  You kick apart the burning sacks to reveal a large pile of red and black tiles.  On top of them is a smaller stack — this one of silver ingots.\n\n“Help me gather these,” you say, pointing.\n\nFinally satisfied he’s gotten rid of any last stragglers, your partner helps gather up the silver bars.  Each is stamped with the rough glyph of a lion.  Waif finishes, wobbling as he stands.  “Almost too much to carry.”\n\n“Almost,” you grin.\n\n*set silver_ingots true\n*achieve silver_ingots\n*set treasures +1\n*If (treasures = 2)\n  *achieve treasures2\n*If (treasures = 4)\n  *achieve treasures4\n*If (treasures = 6)\n  *achieve treasures6\n\n*check_achievements\n*If (((((((((choice_achieved_jade_bookends) and choice_achieved_coin_pouch) and choice_achieved_jewel_bag) and choice_achieved_crystal_box) and choice_achieved_silver_ingots) and choice_achieved_serpent_ring) and choice_achieved_pearls) and choice_achieved_amethyst) and choice_achieved_diamond_amulet)\n  *achieve all_treasure\n\n*page_break The halls are dark and full of cobwebs.\n*goto_scene 152", "131": "\nYou follow the widest road away from the broken Tower.  After walking for quite a while you come to the skeletal remains of a once-magnificent grove.\n\n“This place was the pride of Ta and Sa-Niah, two brothers who ruled the city together,” Waif tells you.  “They brought all manner of trees and palms to form a garden here, right in the center of Atraharsis.”\n\nLines of bluish stones make up a broken path through the grove.  You pass beneath half an arch, then come to a broken stone bench resting between the hollowed-out husks of two once magnificent trees.  A headless statue stands nearby, holding a worn tablet.  And on that tablet, etched in charcoal…\n\n“Look!  It’s the symbol from Murdoch’s journal!”  You rush over to the statue.  “He was here!”  Beneath the symbol, scrawled in jagged black lettering:\n\n[b][i]Gold and red or you will be dead[/i][/b]\n*line_break\n[b][i]Heed these words and live instead[/i][/b]\n*line_break\n\n“Grim…” Waif swallows.  He looks around nervously.  “What do you think it means?”\n\nYou both freeze uncomfortably, waiting for something terrible to happen.  Nothing does.  The screech of a bird reaches your ears from somewhere far away.\n\n“I understand Murdoch’s crews leaving messages for each other,” Waif says.  “But what’s with all the rhymes?”\n\nYou shrug.  “Robert Murdoch was eccentric but brilliant.  No one’s sure why he was such a weird guy.”\n\n“Hey!” Waif laughs merrily.  “That rhymes!”\n\n*page_break Punch Waif in the arm and continue\n*goto_scene 18", "132": "\nYou step forward slowly, keeping your eyes peeled for signs of danger.  The rest of the palace seems empty.  There’s nothing else here to find.\n\nEventually you approach the moaning face.  With every step you take, things get a little more eerie.  Finally you’re on top of it.  And that’s when you realize the wall behind the face is broken and open to the street.\n\nYou chuckle.  The moaning sound is nothing more than the wind blowing through the large ceramic mask.  A glint of something else catches your eye.  With your elbow, you shatter the lower half of the bearded man’s jaw to reveal a small, secret niche.  Still resting within the space you find a threadbare pouch of silver and gold coins!\n\n“Here!”  Waif catches the pouch as you throw it over to him.  Coins spill into his palm and his eyes light up instantly.\n\n“Any objection to holding [i]these[/i]?” you ask.\n\n“None!” Waif cries excitedly.\n\n*set coin_pouch true\n*achieve coin_pouch\n*set treasures +1\n*If (treasures = 2)\n  *achieve treasures2\n*If (treasures = 4)\n  *achieve treasures4\n*If (treasures = 6)\n  *achieve treasures6\n\n*check_achievements\n*If (((((((((choice_achieved_jade_bookends) and choice_achieved_coin_pouch) and choice_achieved_jewel_bag) and choice_achieved_crystal_box) and choice_achieved_silver_ingots) and choice_achieved_serpent_ring) and choice_achieved_pearls) and choice_achieved_amethyst) and choice_achieved_diamond_amulet)\n  *achieve all_treasure\n\n*page_break Good job, ummm... facing your fears?\n*goto_scene 55", "133": "\nYou see the East Gate of Atraharsis long before you arrive there.  Presiding over it is an enormous stone colossus.  The statue might once have been magnificent, but is now so blasted by sand and sun it’s almost entirely featureless.   It’s impossible to tell even if the figure was originally a man or a woman.  Either way, it points with one broken arm into the city, in the direction of a long, slender tower.\n\n“That’s the Queen’s Tower,” you tell Waif.  “According to Murdoch’s map.”\n\n“I thought it was your uncle’s map?”\n\n“[i]Grand[/i]-uncle,” you explain again.  “And yes.  Err, I mean, no.  I mean, he bought the map from someone who knew a guy whose second cousin was once married to a member of Murdoch’s crew, so…”\n\nWaif looks back at you utterly confused.\n\n“Forget it.  I’m sorry I said anything.”\n\nYou turn your attention back to the entrance to the city.  One of the tremendous iron-bound gates is still here, the rotted wood hanging from a monstrous hinge, half-buried in the sand.  Just beyond that, the wide, sand-strewn avenues of Atraharsis lay spread out before you.  After the cold desert night, the sun is starting to feel good on your back.\n\n“We may need this,” Waif says, pulling a torch from his pack.  He lights it, and the flames drive away just that much more of the morning cold.\n\n*choice\n  #Head north, to where there seems to be some sort of movement in the early morning shadows\n    *goto_scene 90\n  #Head west, toward what looks to be some sort of hole or well dug into the ground\n    *goto_scene 82\n  #Head south, where the avenue appears to open into a broad, spacious area\n    *goto_scene 167", "134": "\nThe East Gate could still be a long distance away.  If there’s an easy way into the city right here, you figure you might as well explore it.\n\n“Let me get a better look,” Waif says.  He drops his pack temporarily and starts climbing amongst the jagged stone.  “It appears the tremors have opened a—”\n\nYour friend’s sentence is interrupted by a great sucking sound.  The sand and stone shifts all around him, and before you can do anything Waif is sliding downward into what looks to be a giant sinkhole.\n\n“Help!”\n\nYou’re still on solid footing but you’re losing your partner fast!  You could rush down and grab him (giving up solid ground) or you could try to find some other way to rescue Waif.  Time’s running out though…\n\n*choice\n  #Rush forward to grab Waif\n    *goto_scene 141\n  #Sit tight and explore other options\n    *goto_scene 64", "135": "\nYou leave the Ziggurat behind you and enter the Grand Plaza.  Dozens of palaces and two-story structures rise up to form a large community here.  All of them are fancy and elaborate.  You marvel at how beautiful everything is, even in utter ruin.  A whole team of archaeologists could spend their entire lives here, and never get tired of their work.\n\n“Up ahead,” Waif indicates.  “Look.  The street.”\n\nThe tremors have hit this part of the city especially hard.  There are few structures left standing.  What appears to be a large, jagged wall is actually the other half of the avenue, risen up out of the ground.\n\n“See that?”\n\nBeneath the broken avenue, a series of underground passages run beneath the city.  As sunlight filters down you can see the walls are paved with smooth, clean stone.\n\n“The undercity,” you say excitedly.  “This is what we want!  This is where we’ll find the Hall of Kings!”\n\nWaif hops down.  Casting one last glance up at Atraharsis, you follow him.  \n\n“Which way?”\n\nThe light of your partner’s torch illuminates a long hall, which runs north and south.  Both directions look identical in every way.\n\n*choice\n  #Take the north passage\n    *goto_scene 65\n  #You'd rather go south instead\n    *goto_scene 81", "136": "\nYou look at the blocks again and again.  But no matter how long you stare at them, you still don’t know which ones to use.\n\n“Looks like you’re climbing,” you tell Waif.\n\nYour partner rubs his hands with sand, stretches his fingers, and begins the ascent.  At first it’s slow going.  Only the smallest cracks in the smooth marble of the column give Waif any potential hand or toeholds.  Yet somehow, insanely, he still manages to climb his way up.  He’s halfway there, then three-quarters… and then finally he reaches the top.\n\n“Waif!” you hiss.  “Be careful!”\n\nSlowly and delicately, Waif removes the glimmering green jewel from its mount.  Then he slides back down the column, hugging the marble with his entire body to keep from slipping too fast.\n\n“That was amazing!” you tell him when he’s back on his feet.  You almost can’t even believe it.  “You’re incredible!”\n\n“I am Waif,” he grins.  He holds out his hand and drops the jewel into your palm, where it shines with a radiance all its own.  It’s the single most beautiful thing you’ve ever seen.\n\n*achieve emerald\n*set treasures +1\n*If (treasures = 2)\n  *achieve treasures2\n*If (treasures = 4)\n  *achieve treasures4\n*If (treasures = 6)\n  *achieve treasures6\n\n*check_achievements\n*If (((((((((choice_achieved_jade_bookends) and choice_achieved_coin_pouch) and choice_achieved_jewel_bag) and choice_achieved_crystal_box) and choice_achieved_silver_ingots) and choice_achieved_serpent_ring) and choice_achieved_pearls) and choice_achieved_amethyst) and choice_achieved_diamond_amulet)\n  *achieve all_treasure\n\n[b]Congratulations!  You’ve recovered the star emerald of Atraharsis![/b]\n*set star \"emerald\"\n\nSomewhere off in the distance, a dust cloud swirls on the desert horizon.  You squint into it, but can’t make out any details.\n\n“Let’s get of here,” you tell Waif.  Together, you make your way down the steps and out of the Queen’s Tower.\n\n*page_break Nice work getting the jewel! But can you keep it?\n*goto_scene 116", "137": "\n*achieve crushed\n\nThe rumbling gets louder.  The tremors get more violent.  Waif yells something over the chaos, but you can’t hear him.  \n\nThe giant chunk of stone hurtles downward.  It’s coming straight for you!  There’s no time to avoid it!\n\nA sunburst of white sparks explodes somewhere in the back of your vision, then everything goes black…\n\nYikes.  Did you really roll a 3?  Tough one.\n\nWell, okay.  Maybe next time you’ll do better.  But for now, as premature as it seems, this is going to be\n\n\n*goto_scene ending", "138": "\nYou bring your hand down violently on Waif’s forearm.  It flings the scorpion upward, high into the air.  You both watch as it goes sailing across the room, tumbling end over end before landing and skittering away.  Together you look back at Waif’s hand…\n\nThere’s not a single mark on it.\n\n“Wow,” Waif breathes.  “That was… quick thinking.”\n\n“Yeah,” you tell him.  “You’re welcome.  Now let’s pick the [i]right[/i] lense this time.”\n\n*choice\n  #Try the red lense\n    *goto_scene 26\n  #Go with the yellow lense\n    *goto_scene 37", "139": "\n“My grand-uncle spent his whole life hoping to get to this place,” you say.  “So let’s be thorough.”\n\nThe two of you get to work searching the area.  It’s mostly dirt and rubble, but you find scraps of other wood and fabric buried beneath the sands.  The place was once a city square, as far as you can figure.  A place where vendors set up small shops and sold their wares.\n\nYou’re about to give up and move on when Waif produces a small piece of pottery.  As he lifts it the bottom drops out, spilling a cascade of tiny shimmering globes into the sand.\n\n“Pearls!” he cries out excitedly.\n\nYou kneel to help him gather up the tiny treasures.  There are at least a hundred of them in all, from black to lavender to milky white.\n\n“Truly this is a city of riches,” Waif breathes.\n\n“Maybe,” you say, holding up one of the larger pearls.  “It’s still not a star jewel though.”  Your eyes are drawn upward to the distant tower.  At the top, something green glints in the rising sun.\n*set pearls true\n*achieve pearls\n*set treasures +1\n*If (treasures = 2)\n  *achieve treasures2\n*If (treasures = 4)\n  *achieve treasures4\n*If (treasures = 6)\n  *achieve treasures6\n\n*check_achievements\n*If (((((((((choice_achieved_jade_bookends) and choice_achieved_coin_pouch) and choice_achieved_jewel_bag) and choice_achieved_crystal_box) and choice_achieved_silver_ingots) and choice_achieved_serpent_ring) and choice_achieved_pearls) and choice_achieved_amethyst) and choice_achieved_diamond_amulet)\n  *achieve all_treasure\n\n*page_break Not a bad start! Continue along the northern avenue\n*goto_scene 85", "14": "\n*achieve sandstorm\n\nThe dust envelops you, despite your best attempts at avoiding it.  It shimmers.  It glimmers.  It’s horridly beautiful… at least up until you blink, and your eyes suddenly feel like they’re being sliced by a thousand tiny razors.\n\n“Waif!” you scream, but it’s already too late.  Your friend is face down on the floor, unmoving.  Malevolent green light continues streaming into the chamber, reminding you of your failure.  It’s the last thing you see before your eyesight is taken away, signifying that this is indeed\n\n\n\n*goto_scene ending", "140": "\nThe ants are swarming.  Churning.  They form an semi-circle at your feet, their bodies rolling beneath the sun in a red, deadly wave.\n\n“Waif!” you cry out.  “Your torch!”\n\nGripped by panic, it seems your partner has forgotten all about his firebrand.  He brandishes now, swinging it down and forward.  A few ants fall beneath the flames, but there are way too many.  The torch just isn’t enough.\n\n“Hang on…”\n\nYou unsling your rucksack and reach inside.  For one panicked moment you think you left it back at camp, but then your hand closes around the object of your search: a small metal cannister of lamp oil.\n\nQuickly you squirt the oil onto the cobbles, creating a curved line separating you and Waif from the advancing army of ants.  Eventually the container goes empty and you toss it.  You can only hope it’s enough.\n\n“Light it!”\n\nWaif does as he’s told.  The flammable liquid goes up instantly, igniting in a huge wave of heat and smoke.  You hear a distinct crackle as the front line of ants falls victim to the flames.  The ants just behind them fall back and retreat.\n\n“It’s working!” you shout triumphantly.  But you also know it won’t last forever.  You and Waif will need to get moving before the flames die down, or before reinforcements arrive.  You grab his shoulder and pull him backward, away from the battle.\n\n“Which way?  East or west?”\n\n*choice\n  #Go east\n    *goto_scene 13\n  #Go west\n    *goto_scene 82", "141": "\n*achieve sinkhole\n\n“Waif, quick!  Grab my hand!”\n\nSprinting forward without thinking, you extend your arm.  Your partner reaches back, and then suddenly you’re [i]both[/i] sliding into the sinkhole!\n\nSand rushes past you.  It fills your ears, your mouth, your nose…  Somehow you stay on top, doing your best to avoid the rock and rubble tumbling past to fill the gaping hole.  The sand-slide begins to slow, and then eventually, stops altogether.  You’re buried up to your waist in the newly-shifted desert.  It takes you a good minute or two to pull yourself free.\n\n“Waif!  WAIF!”\n\nYour voice echoes against the empty horizon.  There’s no answer.  Your friend is gone, buried beneath the sands of Atraharsis.  \n\nYou hardly knew him, but you’re overcome with a profound sense of sorrow and loss.  Unwilling to face the city alone, you reluctantly accept that this is\n\n\n*goto_scene ending", "142": "\nYou stand in what appears to be a large, circular chamber.  But as the torchlight reaches the walls, it’s revealed the room is actually hexagonal.  Each of the sides contain a single arched exit.  And above each shadowy opening—\n\n“Look!  The glyphs!”\n\n*image wheel_room.jpg\n\nSix images are carved deeply into the stone, one directly above each opening.  You spin in a circle, examining all of them.\n\n“One of these leads to the Hall of Kings,” you tell Waif.  “It just [i]has[/i] to…”\n\nYou stare at the openings. They all look the same. Each is completely identical to all the others, except for the different markings carved overhead.\n\nAlright, this is it! Make your choice! \n\n*choice\n  #Pick the exit marked with the SERPENT\n    *goto_scene 117\n  #Pick the exit marked with the DOG\n    *goto_scene 146\n  #Pick the exit marked with the CROWN\n    *goto_scene 99\n  #Pick the exit marked with the HORSE\n    *goto_scene 20\n  #Pick the exit marked with the CAT\n    *goto_scene 156\n  #Pick the exit marked with the HAWK\n    *goto_scene 160", "144": "\n“Jump!” Waif screams.  He’s nearly drowned completely out by the thunder of the surging river.  “Do it NOW!”\n\nThere’s no time to line things up or even hesitate — all you can do get in motion.  You take your best running start, plant your left foot against the lip of the receding floor, and launch yourself toward the opposite hallway.\n\nYou sail forward, feeling the powerful rush of air churning beneath you.  Waif looks so small, so very far away.  Your foot catches something… and then suddenly you’re through the opening.  You made it!\n\n“I… can’t… believe…”\n\nYou fall.  Not into the river, though.  This time the floor of the hallway gives out, dropping you through a chute and along a rough stone ramp.  You bang up against Waif a few times, and then the both of you are ejected — through the ceiling — into another large chamber.\n\nFor a few moments you just lie there, dizzy from the fall, grateful to be alive.  Then you pick yourself up, check for broken bones, and help Waif to his feet.\n\n*page_break Where'd you end up now?\n*goto_scene 142", "145": "\nHere the street doubles back upon itself, creating a wide avenue that skirts the northernmost reaches of the city.  Not far in the distance, the Queens Tower looms against the morning sky.  Its smooth, almost-reflective surface curves inward as it juts upward from the sands, creating a feminine, hourglass shape.\n\nStanding between you and the tower, a raised pavilion is set off to one side.  A series of beautifully carved marble columns are set equidistant from one another in a large rectangle.\n\n“As much as I want that tower,” you say, pointing upward, “this is too interesting not to check it out.”  Waif nods his agreement, and moments later, you’re at the top of a small set of granite steps.\n\nThe floor here is clean, the debris minimal.  A series of large, elongated stones — pieces of the toppled columns — lay strewn about, the edges polished smooth by centuries beneath the shifting sands.  Kneeling before one, you’re attempting to read an inscription at the base when, all of a sudden, Waif starts backing up in your direction.\n\n“What’s the—”\n\nThen you see it.  Ahead of you, crawling forward on all fours, is an enormous, razor-toothed monitor lizard.  The creature is freakishly huge — maybe twice the size of a Komodo Dragon — all scales and claws and muscle.  Its thick pink tongue flicks in and out of its mouth as it sniffs the air.\n\n“Waif…”  you whisper, as if somehow lowering your voice might help.  He doesn’t move.  “Waif!”\n\nWaif stands beside you, frozen against one of the rounded white stones.  There are three more such stones behind you.  You grab the only weapon you have — your camping hatchet — and wield it with as much ferocity as you can.  Which to be honest, isn’t much.\n\nWith the monster still advancing, it’s time to make your move.\n\n*choice\n  #Fight the lizard\n    *set fight +1\n    *if (fight = 2)\n      *achieve fighter\n    *goto_scene 77\n  #Hide behind the set of large stones\n    *goto_scene 56\n  #Try yanking Waif out of the way and make a break for it\n    *set runaway +1\n    *if (runaway = 2)\n      *achieve runaway\n    *goto_scene 111", "146": "\n*achieve dog\n\nYou look at the glyph shaped like a dog.  Innocent and pure.  Man’s best friend.\n\n“The dog looks good,” you say.  After all, what could go wrong?\n\nTogether you pass beneath the glyph and enter a dark corridor.  You haven’t gone more than a few dozen steps when, suddenly—\n\n“The floor!” Waif cries.  “It’s rising up behind us!”\n\nYou whirl around.  The floor you just crossed is tilting upward, turning the entire corridor into a steep incline.  By the time you turn back it’s already too late  — your legs buckle.  The torch goes out.   Waif lets out a scream and you find yourself sliding downward, into the oblivion of utter darkness.\n\n“Unnffff!”\n\nYou fall and fall, yet somehow when you land you’re still alive.  Waif re-ignites the torch and you find yourselves in a high-slung cavern, sprawled across an enormous pile of sand.  The walls are rough-hewn, scarred by the blades of a thousand primitive tools.  The ceiling stretches high overhead.\n\n“The quarry,” Waif says.  You notice an ominous tone in his voice.  “The founders excavated here to build the city.  These tunnels… they go on for miles and miles.”\n\nThere must be a dozen exits from this room alone.  All of them are pitch black.  As if reading your mind, Waif follows your gaze to the torch.  How many hours of light are left?  How much water is still in your canteens?\n\nThere are thousands of tunnels that make up the maze down here.  Maybe you’ll be able to navigate them.  Maybe you’ll be able to make it out.\n\nOr maybe all the exits collapsed in on themselves thousands of years ago.  You don’t know the answers to these questions, but ultimately you’ll find out.\n\nFor now however, this appears to be\n\n\n*goto_scene ending", "147": "\nThe simple stone staircase empties unceremoniously into the second level of the Queen’s Tower.  This floor is even more lavish than the first.  The furnishings are more preserved, the walls more brightly painted.  The staircase you arrived at continues upward, spiraling high along the wall.  It a
