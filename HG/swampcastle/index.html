nger ruler of even a single village in the swamplands. \n\t\t\t\t\t\t*set rule -8\n\t\t\t\t\t\t*if rule \u003c 0\n\t\t\t\t\t\t\t*set rule 0\n\t\t\t\t\t\t*finish\n\t\t\t#Surrender.\n\t\t\t\tYou surrender. \n\t\t\t\t*page_break\n\t\t\t\t*If rule > 18\n\t\t\t\t\tThe rebels raid your treasury and leave. \n\t\t\t\t\t*set rule -5\n\t\t\t\t\t*set gold 0\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto neutral_continued\n\t\t\t\tThe rebels decide to take you prisoner. You spend the rest of your days in a dungeon. By the time you're let out, you are no longer ruler of even a single village in the swamplands. \n\t\t\t\t*set rule -8\n\t\t\t\t*if rule \u003c 0\n\t\t\t\t\t*set rule 0\n\t\t\t\t*finish\n\t\t\n\t\n\t#Surrender.\n\t\tYou surrender. \n\t\t*page_break\n\t\t*If rule > 18\n\t\t\tThe rebels raid your treasury and leave. \n\t\t\t*set rule -5\n\t\t\t*set gold 0\n\t\t\t*page_break\n\t\t\t*goto neutral_continued\n\t\tThe rebels decide to take you prisoner. You spend the rest of your days in a dungeon. By the time you're let out, you are no longer ruler of even a single village in the swamplands. \n\t\t*set rule -8\n\t\t*if rule \u003c 0\n\t\t\t*set rule 0\n\t\t*finish\n\t\n\n\n\n*label executation\nYou've gathered most of the former rebels in the square, the ones you could find at least. They're all wondering why they're here. The knights are surrounding them, blocking off all the entrances. \n\nThe rebel officer looks at you and says, \"Lord ${name}, what are you doing? You gave us your word that you would protect us.\"\n*choice\n\t#\"I'm sorry, this is out of my hands.\"\n\t\tThe rebels are slaughtered. They're barely able to fight back against the well-armed knights. Many fall, and only a handful escape. \n\t\t*set dark +20\n\t\t*set rule -2\n\t\t*page_break\n\t\t*goto neutral_continued\n\t#\"You're right.\" (Stop the Knights)\n\t\tYou tell the knights to stop.\n\t\t\n\t\tThe head knight looks uneasy. \"Are you refusing an order from your King? This will not stand well.\"\n\t\t*choice\n\t\t\t#\"I'm sure the King will understand my position.\"\n\t\t\t\t*set light +10\n\t\t\t\t\"We shall see.\" \n\t\t\t\t*page_break\n\t\t\t\t*goto neutral_continued\n\t\t\t#\"The King will not know about this, since you will all be dead. (Attack the Knights)\n\t\t\t\t*set dark +20\n\t\t\t\tYour men slaughter the knights, but a single knight is able to escape. \n\t\t\t\t*choice\n\t\t\t\t\t#Chase after him.\n\t\t\t\t\t\t*set militia -10\n\t\t\t\t\t\t*set guards -10\n\t\t\t\t\t\tYou eventually catch up and kill the knight.\n\t\t\t\t\t\t*set dark +5\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto neutral_continued\n\t\t\t\t\t#Let him go.\n\t\t\t\t\t\tYou let him go.\n\t\t\t\t\t\t*set rule -1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto neutral_continued\n\n\t\n*label victory1\nYou're able to finish off the rebel army. You have saved the village!\n*set rule +1\n*set peasants +5\n*page_break\n*goto neutral_continued", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n*script changeBackgroundColor(\"sepia\")\n*set name \"Lord Wellington\"\n*set leadership 5\n*set strength 3\n*set agility 2\n*set intelligence 4\n*set stealth 2\n*set merchants 8\n*set farmers 10\n*set peasants 30\n*set militia 28\n*set guards 14\n*set archers 15\n*set knights 5\n*set magicians 5\n*set druids 4\n\n*image guard.png\n\nYou visit the head guardsman, who is stationed in a small barracks within the castle's interior walls. He has a dark, burly beard and appears to be in very good shape. He's currently instructing the men and training them in combat. It looks like the guards are about to have a tournament. The winner will receive an extra week's rations and pay. He looks up when you arrive and seems pleased to see you. \"Hello, my liege!\"\n*label guards\nWhat would you like to do?\n*fake_choice\n\t#Observe the tournament.\n\t#Join the tournament.\n\t#Ask who gave them the resources and permission to organize this tournament.\n*script changeBackgroundColor(\"black\")\n*set name \"Thor\"\n*set leadership 3\n*set strength 2\n*set agility 4\n*set intelligence 2\n*set stealth 2\n*set merchants 10\n*set farmers 20\n*set peasants 30\n*set militia 34\n*set guards 18\n*set archers 15\n*set knights 5\n*set magicians 5\n*set druids 3\n*set light 85\n\n*image tavern.png\n\n\nAs you walk up to the tavern, you see two guards in front of it. One of the guards is preoccupied with talking to a villager, but he's still within earshot of the other guard. The other guard you recognize immediately (he was the one that sent in the subjects). He will most certainly recognize you.\n\n\nWhat should you do?\n*fake_choice\n\t#Sneak around and enter through the back of the tavern.\n\t#Continue and hope he doesn't recognize me.\n*script changeBackgroundColor(\"sepia\")\n*set name \"Thorin\"\n*set leadership 3\n*set strength 1\n*set agility 2\n*set intelligence 2\n*set stealth 2\n*set merchants 8\n*set farmers 15\n*set peasants 30\n*set militia 40\n*set guards 18\n*set archers 12\n*set knights 5\n*set magicians 5\n*set druids 4\n*set light 15\n\nKingdom Summary\n\n*image castle-35216.png\n\nCivilian Units:\t${peasants} Peasants, ${merchants} Merchants, ${farmers} Farmers, and ${workers} Workers\n\nMilitary Units: ${militia} Militia, ${guards} Guards, ${knights} Knights, and ${archers} Archers\n\n*fake_choice\n\t#Hire Militia. (10 GP)\n\t#Hire 10 Militia. (100 GP)\n\t#Hire Guards. (50 GP)\n\t#Hire 5 Guards. (250 GP)\n\t#Hire Knights. (100 GP)\n\t#Hire Merchants. (50 GP)\n\t#Hire Farmers. (10 GP)\n\t#Hire 10 Farmers. (100 GP)\n\t#Hire Magicians. (200 GP)\n\t#Hire Archers. (75 GP)\n\t#Hire 5 Archers. (375 GP)\n\t#Hire Workers. (25 GP)\n\t#Hire 5 Workers. (125 GP)\n\t#Done.\n\n*set name \"Belros\"\n*set leadership 5\n*set strength 1\n*set agility 2\n*set intelligence 2\n*set stealth 1\n*set merchants 8\n*set farmers 15\n*set peasants 30\n*set militia 50\n*set guards 30\n*set archers 12\n*set knights 8\n*set magicians 5\n*set druids 2\n*set light 40\n\n*set barbarians 100\n\nYour Army: ${militia} Militia, ${guards} Men at Arms, ${knights} Knights, ${magicians} Magicians, and ${archers} Archers\n\nThe Enemy Army: ${barbarians} Barbarians and 1 Battering Ram\n\n*fake_choice\n\t#Have my archers fire a volley!\n\t#Send a wave of guards into the fray!\n\t#Send a knight into the fray!\n\t#Send a wave of militia to attack the barbarians!\n\t#Have a magician cast a fireball spell!\n\t#Have peasants throw rocks at the enemy!\n\t#Charge them by myself!\n\t#Retreat into the castle!\n\t#Destroy their battering ram!\n\t#Surrender.\n\n*set gold 1000\n\nA merchant dressed in fine clothing walks in. He politely bows and introduces himself.\n\n\"My liege, I am Edward of Thornberry. I'm a merchant with many trade connections throughout the Kingdom. If you would allow me to be frank, I do not believe this area offers any resources of real value; however, its location could be considered quite valuable. It borders the neighboring Kingdom of Galmencia. I think with the proper amount of investment, I could turn this castle into the main hub of trading in the region. As you may already be aware, Galmencia stones are in huge demand all throughout the Kingdom, and Galmencia is in great need of resources that we have in abundance, such as furs and food. I would only require a small investment to set up the trading outpost. We would need to hire builders to create structures and a main road leading to and from the neighboring Kingdoms. For such a trading post to be viable, I would need an investment of at least…250 Gold Pieces to start. More would allow me to set up the trading post faster, however. I would, of course, give you a percentage of all sales and tolls collected as a result of this venture.\"\n\nYou have ${gold} Gold Pieces in the treasury.\n\n*fake_choice\n\t#\"Sounds splendid! Here, take 500 Gold Pieces and get it done right away.\"\n\t#\"Excellent idea. Take 250 Gold pieces and begin work immediately.\"\n\t#\"Hmm. I'm only willing to make a small investment at this time. I will give you 100 Gold Pieces to set up a small trading post. If it's successful, I'll consider giving you more Gold.\"\n\t#\"Not interested. If you wish to take a gamble, then invest your own money.\"", "startup": "*comment Copyright 2016 by Philip Kempton.\n*title Swamp Castle\n*author Philip Kempton\n\n*scene_list\n\tstartup\n\tanimal\n\tday2\n\tday3\n\tday4\n\tday5\n\tday6\n\trebellion\n\tending\n\tdeath\n\n\t\n*create leadership 0\n*create strength 0\n*create agility 0\n*create stealth 0\n*create getup 0\n*create examine 0\n*create letteropened 0\n*create cautious 0\n*create impulsive 0\n*create light 50\n*create dark 50\n*create weapon 0\n*create medical 0\n*create gold 1000\n*create horse 0\n*create haveletter 0\n*create horserevived 0\n*create health 100\n*create intelligence 0\n*create diplomacy 0\n*create name \" \"\n*create loyal 0\n*create knight 0\n*create noble 0\n*create peasant 0\n*create history 0\n*create merchants 5\n*create farmers 10\n*create peasants 35\n*create servants 5\n*create militia 10\n*create guards 20\n*create archers 5\n*create knights 0\n*create clerics 0\n*create magicians 0\n*create druids 0\n*create workers 5\n*create castle 1\n*create defenses 2\n*create staff 0\n*create short_sword 0\n*create two_handed_sword 0\n*create spear 0\n*create sword_and_shield 0\n*create unarmed 0\n*create fireball 0\n*create healing 0\n*create potion 0\n*create thievesguild 0\n*create bandit 0\n*create tax 2\n*create farmers_no_tax 0\n*create farmers_tax 0\n*create farmers_own_land 0\n*create rule 0\n*create bandits 0\n*create thieves 0\n*create dagger 0\n*create boss1_health 100\n*create barbarians 50\n*create archer_damage 5\n*create plan 0\n*create saved_king 0\n*create advisor 0\n*create army 0\n*create catapults 0\n*create barbarian_diplomacy 0\n*create clothing 0\n*create table 0\n*create flag 0\n*create royalty 0\n*create location 0\n*create with_guard 0\n*create magic_show 0\n*create boss2_health 200\n*create inforest 0\n*create onhill 0\n*create barbarians_inforest 0\n*create stealth_archer 0\n*create stealth_guard 0\n*create stealth_thief 0\n*create stealth_assassin 0\n*create stealth_army 0\n*create stealth_magician 0\n*create stealth_other 0\n*create bolts 5\n*create barbarian_patrol 0\n*create hiddenwall 0\n*create stealth_boss 100\n*create stop 0\n*create your_votes 0\n*create vero_votes 2\n*create gillian_votes 3\n*create gensa_votes 8\n*create undecided_votes 10\n*create bribe 0\n*create warrior_votes 0 \n*create governor 0\n*create rebel_army 0\n*create rebel_defense 3\n*create gensa_bribe 0\n*create poison 0\n*create king 0\n*create score 0\n*create Galmencia_battle 0\n*create Galmencia_peace 0\n*create Galmencia_stealth 0\n*create leader_bonus 0\n*create day1 0\n*create day2 0\n*create day3 0\n*create day4 0\n*create day5 0\n*create dead 0\n*create merchant_edward 0\n*create farmer_status 0\n*create letter_read 0\n*create supported_gensa 0\n*create current_governor 0\n*create armed 0\n*create noble_outfit 0\n*create courtiers_outfit 0\n*create merchant_outfit 0\n*create peasant_outfit 0\n*create helped_merchants 0\n*create no_outfit 0\n*create large_man_hp 150\n*create economy 0\n*create war_defense 0\n*create rebellion_count 0\n*create difficulty 0\n*create archer1 0\n*create pre_war_guards 0\n*create pre_war_knights 0\n*create pre_war_peasants 0\n*create archers_half 0\n*create broken_formation 0\n*create bare_hands 0\n*create druid_show 0\n*create shield_wall 0\n*create prepare 0\n*create gave_speech 0\n*create jousting_tournament 0\n*create inspection1 0\n*create necro_staff 0\n*create oldname \" \"\n*create name_no 0\n*create necro 0\n\n*achievement ruthless visible 10 Ruthless\n\tFinish the game with a high Dark stat. \n\n*achievement merciful visible 10 Merciful\n\tFinish the game with a high Light stat. \n\n*achievement humble visible 10 Humble Beginnings\n\tWin the game with the peasant background.\n\n*achievement governor visible 10 Hello Governor\n\tBecome governor of Magincia.\n\n*achievement fasttalker visible 25 Fast Talker\n\tGet into the tavern without using Stealth. \n\n*achievement royalty visible 10 Royal Arms\n\tBecome royalty. \n\n*achievement king visible 25 Ruler of the Realm\n\tBecome King or Queen of the realm. \n\n*achievement gladiator visible 10 What We Do in Life, Echoes in Eternity\n\tWin the guard's tournament. \n\t \n*achievement freedom visible 25 Down with the Government!\n\tChange the government of Magincia from a monarchy to a republic. \n\n*achievement cake visible 5 Let Them Eat Cake!\n\tSurvive a rebellion from angry peasants. \n\n*achievement cake2 visible 10 Let Them Eat…More Cake!\n\tSurvive two rebellions from angry peasants. \n\n*achievement cake3 visible 20 Let Them Eat…Tons of Cake!\n\tSurvive three rebellions from angry peasants.\n\n*achievement diplomatic visible 10 Diplomatic\n\tConvince the barbarians to stop raiding your lands through diplomacy. \n\n*achievement warriorspath visible 10 The Warrior's Path\n\tResolve the barbarian conflict through war. \n\n*achievement intelligence visible 5 Dodo\n\tWin the game with 0 Intelligence.\n\t\n*achievement dragontamer visible 10 Dragon Tamer\n\tResolve the farmer's crisis with the \"dragon\" in a way that everyone benefits from. \n\n*achievement leader visible 5 Natural Born Leader\n\tWin the game with Leadership as your highest stat.\n\n*achievement stronger visible 5 We Can Rebuild Him\n\tWin the game with Strength as your highest stat.\n\n*achievement fraggle visible 10 Fragglesworth the Third\n\tEarn a new title among your people. \n\n*achievement conspiracy visible 10 Conspiracy Theory\n\tWarn the King about a conspiracy to overthrow him.\n\n*achievement loner visible 10 Loner\n\tWin the game without choosing a new advisor.\n\n*achievement thievesguild visible 10 Thief\n\tInfiltrate the Thieves Guild.\n\n*achievement bandit visible 10 Bandit\n\tFind the bandits' HQ yourself.\n\n*achievement druid visible 10 Druid\n\tBecome friends with the Druids.\n\t\n*achievement strange_staff visible 10 Staff of Power\n\tObtain a mysterious artifact. \n\t\n*achievement dark_arts visible 10 Dark Arts\n\tExplore too far into the dark arts. \n\n*achievement magic_man visible 30 I Know Magic\n\tConvince someone that you are a powerful magic user. \n\n*achievement assassin visible 10 Et Tu, Brute?\n\tAssassinate an important person in the kingdom.  \n\n*achievement allthumbs visible 10 All Thumbs\n\tFinish the game with 0 Agility.\n\n*achievement giant visible 10 Giant Slayer\n\t\tDefeat a \"giant.\"\n\n*achievement farmer visible 10 Friend to Farmers\n\tLet the farmers own their own land. \n\t\n*achievement oneman visible 20 One-Man Army\n\tBluff your way out of a sticky situation. \n\n*achievement hard visible 50 Veni, Vidi, Vici\n\tBeat the game on Hard.\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tYou are a newly appointed Lord in charge of a small castle. Manage your castle's finances, hire troops, resolve conflicts among the peasants, and bring order to the realm. Expand your power through war, diplomacy, or stealth. Whether you rise or fall is up to you in Swamp Castle.\n\n\t[i]Tale of a Kingdom - Swamp Castle[/i] is an interactive novel by Philip Kempton where your choices control the story. It's entirely text-based—102,000 words, without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n\t• Manage the economy of your province by controlling the tax rates.[n/]\n\t• Decisions you make impact the story and your ability to rule your subjects.[n/]\n\t• Fight against raiders and even other Lords.[n/]\n\t• Choose between decisions that could help your subjects or give you additional power.\n\n\t*if choice_is_advertising_supported\n\t\t[i]Tale of a Kingdom - Swamp Castle[/i] is supported by advertisements, but you can buy the unlimited version to turn off ads forever.\n\t\t\n\t\t*purchase_discount adfree 2023-04-20 $4.99 $2.99 purchased\n\t\t*page_break_advertisement\n\n\t\t*goto purchased\n\t*else\n\t\t[i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n\t\t*purchase_discount adfree 2023-04-20 $4.99 $2.99 purchased\n\t\t*page_break Play Now For Free\n\n*label purchased\n\n\nWelcome to Tale of a Kingdom - Swamp Castle\n\n*image swamp_castle.png\n\n*page_break\nChoose a difficulty:\n\n*choice\n\t#Easy.\n\t\tYou have chosen to play on Easy. \n\t\t*set rule +2\n\t\t*set guards +10\n\t\t*set militia +10\n\t\t*set peasants +5\n\t\t*set difficulty 1\n\t\t*goto start_story\n\t#Normal. (Recommended)\n\t\tYou have chosen to play on Normal.\n\t\t*set difficulty 2\n\t\t*goto start_story\n\t\t\n\t#Hard.\n\t\tYou have chosen to play on Hard. \n\t\t*set rule -2\n\t\t*set guards -10\n\t\t*set peasants -15\n\t\t*set merchants -2\n\t\t*set farmers -2\n\t\t*set militia -5\n\t\t*set difficulty 3\n\t\t*goto start_story\n*label start_story\n*page_break\nThis story takes place in the Kingdom of Magincia, a small yet influential kingdom known for its brave knights and powerful magicians. \n\nThe Kingdom of Magincia is made up of five provinces, and the Central Province is called King's Town. The Eastern Province is mostly flatlands, the South is one of the most populated, the West is mostly swamplands, and the North is vast and relatively unexplored.\n\nThe Kingdom of Magincia is ruled by a shrewd King named Gareth III. According to historical scholars, he gained his power by winning the hearts and minds of his people. In reality, his true rise to power was largely based on his political savvy, bribes, and a willingness to crush anyone that stood in his way. That is not to say he isn't a good ruler. The Kingdom has prospered greatly since he took over; however, there are still a few dissidents stoking the fires of rebellion. The Kingdom of Magincia has gone through several rebellions and has had many kings over the centuries. What makes Gareth unique is that he's one of the few individuals that has managed to maintain power for this long. \n\nMost Lords attribute his success to the unique way he governs. He allows the other provinces, for the most part, to govern themselves. Technically, the Lords of each province can elect their own governor, but the King is the one that approves the Lordships, and he also reserves the right to veto any candidate for governor he feels is not suitable to the position. Though the kingdom appears peaceful, there are always rumors of rebellion, but so far it has been just that…rumors. \n\n\nYou have recently been given a Lordship in the westernmost province of the Kingdom. This province is known mostly for its swamplands and inhospitable conditions. In fact, the castle in which you are taking ownership of is often referred to as \"Swamp Castle.\"\n*page_break\nActually, that begs the question…how exactly did you receive your Lordship?\n*choice\n\t#I worked my way up the ranks and proved my loyalty to the King.\n\t\tAh yes. You worked your way up the ranks and waited several years before being given the opportunity of such an honor. The King no doubt wanted to award your years of loyalty, so he gave you this Lordship.\n\t\t*set loyal 1\n\t\t*set leadership +2\n\t\t*goto continue1\n\t#I was a Knight who fought so heroically in battle that the King had no choice but to give me a Lordship.\n\t\tOh yes, of course. I remember that battle. Your side was losing, so you rushed in and attacked the enemy commander. Your efforts turned the battle around and resulted in the enemy army routing.\n\t\t*set knight 1\n\t\t*set knights +1\n\t\t*set strength +2\n\t\t*goto continue1\n\t#I come from a noble household. It's what we do.\n\t\tAh yes, of course. It's in your blood. \n\t\t*set noble 1\n\t\t*set intelligence +1\n\t\t*set magicians +1\n\t\t*set gold +500\n\t\t*goto continue1\n\t#I was a humble peasant, but I have the respect of the people due to the fact that I helped bring down a rebellion plot against the King. \n\t\tAh yes, of course, when the former Lord was planning a rebellion, you helped stop the plot. The people cried for you to gain a Lordship, and the King granted it! Well, there's also the fact that no one else really wanted the position…but the King granted it nonetheless!\n\t\t*set peasant 1\n\t\t*set diplomacy +1\n\t\t*set rule -1\n\t\t*set peasants +2\n\t\t*set gold -500\n\t\t*goto continue1\n*label continue1\nWhat would you say is your strongest trait?\n*choice\n\t#My Strength and fighting ability.\n\t\t*set strength +2\n\t\t*if difficulty = 3\n\t\t\t*set strength -1\n\t\t*page_break\n\t\t*goto continue2\n\t#My Agility.\n\t\t*set agility +2\n\t\t*if difficulty = 3\n\t\t\t*set agility -1\n\t\t*page_break\n\t\t*goto continue2\n\t#My Intelligence.\n\t\t*set intelligence +2\n\t\t*if difficulty = 3\n\t\t\t*set intelligence -1\n\t\t*page_break\n\t\t*goto continue2\n\t#My Leadership ability.\n\t\t*set leadership +2\n\t\t*if difficulty = 3\n\t\t\t*set leadership -1\n\t\t*page_break\n\t\t*goto continue2\n\t#I am an excellent Diplomat.\n\t\t*set diplomacy +2\n\t\t*if difficulty = 3\n\t\t\t*set diplomacy -1\n\t\t*page_break\n\t\t*goto continue2\n\t#I'm able move around without being seen.\n\t\t*set stealth +2\n\t\t*if difficulty = 3\n\t\t\t*set stealth -1\n\t\t*page_break\n\t\t*goto continue2\n\n*label continue2\nThe King has managed to maintain his control for this long, and there's no doubt that with your help, the Kingdom will continue to prosper. \n*page_break\n\nYou arrive at your castle expecting a large gathering, but only a few servants and the castle's advisor are there to greet you. You wonder where all the people are.\n*fake_choice\n\t#Where is everyone? Where's my parade? Didn't you know I was coming?\n\t\tYour advisor speaks up. \"I'm sorry, my Lord, the last Lord did not keep this castle in very good condition, and most of the peasants left as a result.\"\n\t\t*page_break\n\n\t#Well, maybe it's better this way. No need for a spectacle. \n\t\tYour advisor takes you into the inner chamber of the castle.\n\t\t*page_break\n\n\t#Remain silent.\n\t\tYour advisor takes you into the inner chamber of the castle. \n\t\t*page_break\n\n\n*label next\nYou walk down a long hallway; there's moss and cracked stone all throughout the castle. \n\nThis castle is in a terrible state.\n\n*page_break\nOnce inside, your advisor asks the following question: \"How should I address you, my Lord?\" \n*label enter_name\n\nWhat is your name?\n*input_text name\n\t\t\n*label continue_now\n\"Welcome, ${name}, to Swamp Castle. As you can see, the castle isn't in the best of conditions, but it hasn't been properly supervised for quite some time. We hope you can turn it around.\"\n*choice\n\t*hide_reuse #\"You can start by no longer referring to my castle as 'Swamp Castle.'\"\n\t\t\"Yes, of course. Forgive me!\"\n\t\t*page_break\n\t\t*goto question1\n\t#\"This place is a mess. Is there anything we can do?\"\n\t\t\"We've already begun to start repairs. Hopefully, in a few weeks' time, everything will be in order.\"\n\t\t*page_break\n\t\t*goto question1\n\n*label question1\t\t\n\"Lord ${name}, would you like to know more about the history of this castle and its people?\"\n*choice\n\t#\"Yes.\"\n\t\t\"Okay…let's see, where to begin…\"\n\t\t*goto history\n\t#\"Yes.\" (Lie)\n\t\t\"Excellent, well the castle was built before the great fire war. This castle was actually destroyed during the great ice war, but was rebuilt by Bron the builder during…\"\n\n\t\tHe drones on and on about the history of the castle. You simply nod and pretend to be interested. You try your best not to fall asleep, but it's proving somewhat difficult. You start to wonder when this man will finally stop talking so you can begin your lordly duties. Suddenly, he stops talking. It appears he has finished telling the story of this place.\n\t\t*page_break\n\t\t*goto guard\n\t#\"No.\"\n\t\t\"Oh…well…yes, of course you must already know all about this place. Let's move on to other business then.\"\n\t\t*page_break\n\t\t*goto guard\n\t\n*label history\n\"What would you like to know?\"\n*choice\n\t#\"How old is this castle?\"\n\t\t\"The castle is centuries old, my liege! In fact, it's one of the oldest castles in the realm.\" (That explains the cracked walls, you think to yourself.)\n\t\t*page_break\n\t\t*goto history\n\t#\"What resources does this castle and the surrounding lands have?\"\n\t\t\"Well…not much, my Lord. We have no resources that are considered to be high in demand, due to the fact that the land surrounding this castle is mostly swamplands. As you can imagine, it's difficult to farm here, so the population is sparse. There are, however, a variety of creatures that live in the swamps! Not to mention rumors of many rare plants hidden throughout. Herbalists and researchers from all across the kingdom come to visit the swamplands, which often increases tourism; I've also heard some rumors that the swamp may have magical properties, but if you ask me, this is mostly folk stories; however, some people believe so strongly in this that they've set up magical shops offering a variety of cures and medicines. From what I hear, a few of them may actually work. A small group of people, comprising mostly of Druids, go so far as to consider the swamplands as 'sacred ground.'\" \n\t\t*set history 1\n\t\t*page_break\n\t\t*goto history\n\t#\"What is your role here?\"\t\n\t\t\"To advise you, of course. I also take care of the castle's day-to-day operations, so to speak.\"\n\t\t*page_break\n\t\t*goto history\n\t#\"Let's move on. We can discuss the history of this place more at a later time.\"\n\t\t*goto guard\n\n*label guard\nA guard opens the door and walks up to you respectfully. \"My liege! This letter arrived for you. There are also some subjects waiting to speak to you.\"\n*if difficulty = 3\n\t*set health -20\n*page_break\n*label firstday\nWhat do you do?\n*choice\n\t*if noble > 0\n\t\t#Take and read the letter.\n\t\t\tIt appears to have the royal seal on it. Perhaps it's from the King himself! It would make sense, as your family is quite known throughout the Kingdom. \n\t\t\t\n\t\t\t[i]Hello ${name}, I want to congratulate you on your post. I'm sure you will do better than the last Lord, you can't possibly do any worse. The King gave you this castle to reward your family's loyalty during the rebellion. Enclosed are 1000 Gold Pieces to help you with any expenses; however, with your family's wealth, I'm sure you have more than enough needed to repair any damages to the castle.[/i]\n\t\t\t\n\t\t\t[i]The King's Scribe,[/i]\n\t\t\t\t\n\t\t\t[i]- Sir Jacob[/i]\n\t\t\t*page_break\n\t\t\tWell, not exactly from the King, but someone official at least. You wonder what he meant by 'you can't possibly do any worse.'\n\t\t\t*set letter_read + 1\n\t\t\t*goto firstday\n\t*if loyal > 0 \n\t\t#Read the letter.\n\t\t\t[i]My dear friend, it is with great pleasure that I bestow upon you this Lordship. I know it has been a long time coming, and I appreciate your loyalty and hard work. I would have given you a bigger command, but as you know, I am constantly dealing with politics and squabbling nobles, and this is the best I can do. Enclosed is a note of credit from the royal treasury for 1000 Gold Pieces. Please use it in any way you see fit. Good luck, old friend![/i]\n\t\t\t\n\t\t\t[i]Sincerely,[/i]\n\t\t\t\n\t\t\t[i]- King Gareth III[/i]\n\t\t\t\t\n\t\t\tWell, it is a note from the King himself. You knew he appreciated your years of service, but you didn't expect this.\n\t\t\t*set letter_read + 1\n\t\t\t*page_break\n\t\t\t*goto firstday\n\t*if knight > 0 \n\t\t#Examine the letter.\n\t\t\t[i]${name}, your heroic deeds at the Battle of Garmish have earned you this Lordship. Enclosed is a line of credit from the royal treasury for 1000 Gold Pieces. I expect great things from you. Do not disapoint me.[/i]\n\n\t\t\t[i]- King Gareth III[/i]\n\t\t\t*set letter_read + 1\n\t\t\t*page_break\n\t\t\t*goto firstday\n\t\t\t\n\t*if peasant > 0 \n\t\t#Look at the letter.\n\t\t\t[i]Hello, the King wishes you well. Enclosed is a line of credit of 500 Gold Pieces from the royal treasury. Please use this to turn the castle around into a prospering one…do not use it for any other purpose. Though you are now a Lord, do not forget where you came from and how easily it can be taken away from you.[/i]\n\t\t\t\t\n\t\t\t[i]Head of the King's Knights[/i]\n\t\t\t\t\n\t\t\t[i]- Sir Bareth[/i]\n\t\t\t*page_break\n\t\t\tWell, that wasn't exactly the warmest welcome. You wonder why one of the King's knights is writing to you. Perhaps he wonders if you have any ambitions of rebellion of your own. Haven't you done enough to prove your loyalty? \n\t\t\t*page_break\n\t\t\t*set letter_read + 1\n\t\t\t*goto firstday\n\t#\"Who wishes to see me?\"\n\t\t\"The following individuals have requested an audience with you, my liege:\"\n\t\t\n\t\t- The Merchant Edward\n\t\t\n\t\t- The Farmer Davo\n\t\t\n\t\t- The Master Builder Brian\n\t\t*page_break\n\t\t*goto firstday\n\t#Send in the subjects.\n\t\t*if letter_read = 0\n\t\t\t\"Lord, you haven't read your letter from the King yet, are you sure you want to send in the subjects without knowing what it says?\"\n\t\t\t*choice\n\t\t\t\t#Yes, I could care less about the letter, send in the subjects.\n\t\t\t\t\tYou order the guard to bring in the first subject. This should be interesting.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto merchant\n\t\t\t\t\n\t\t\t\t#No, I will read the letter.\n\t\t\t\t\tYour advisor looks relieved.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto firstday\n\t\t\t\t\n\t\tYou order the guard to bring in the first subject. This should be interesting.\n\t\t*page_break\n\t\t*goto merchant\n\n*label merchant\t\t\nA merchant dressed in fine clothing walks in. He politely bows and introduces himself. \n\n\"My liege, I am Edward of Thornberry. I am a merchant with many trade connections throughout the Kingdom. If you would allow me to be frank, I do not believe this area offers any resources of real value; however, its location could be considered quite valuable. It borders the neighboring Kingdom of Galmencia. I think with the proper amount of investment, I could turn this castle into the main hub of trading in the region. As you may already be aware, Galmencia stones are in huge demand all throughout the Kingdom, and Galmencia is in great need of resources that we have in abundance, such as furs and food. I would only require a small investment to set up the trading outpost. We would need to hire builders to create structures, and a main road leading to and from the neighboring Kingdoms. For such a trading post to be viable, I would need an investment of…at least…250 Gold Pieces to start. More would allow me to set up the trading post faster, however. I would of course give you a percentage of all sales and tolls collected as a result of this venture.\"\n\nYou have ${gold} Gold Pieces in the treasury.\n\n*choice\n\t#\"Sounds splendid! Here, take 500 Gold Pieces and get it done right away.\"\n\t\tThe merchant looks overjoyed. \"I will not let you down. I'll start work immediately!\"\n\t\t*set merchants +10\n\t\t*set merchant_edward +3\n\t\t*set gold -500\n\t\t*page_break\n\t\t*goto farmer\n\t#\"Excellent idea. Take 250 Gold Pieces and begin work immediately.\"\n\t\t\"Thank you, my liege. I will start work right away.\"\n\t\t*set gold -250\n\t\t*set merchants +5\n\t\t*set merchant_edward +2\n\t\t*page_break\n\t\t*goto farmer\n\t#\"Hmm. I'm only willing to make a small investment at this time. I'll give you 100 Gold Pieces to set up a small trading post. If it's successful, I will consider giving you more Gold.\"\n\t\tThe merchant looks disappointed but takes your offering. \"Thank you, my liege…I will try my best to get a small trading post up and running with this initial investment.\"\n\t\t*set gold -100\n\t\t*set merchant_edward +1\n\t\t*page_break\n\t\t*goto farmer\n\t#\"Not interested. If you wish to take a gamble, then invest your own money.\"\n\t\t\"What do you think I am, a bank?\" You tell the merchant to leave. The merchant looks angry, and to your surprise, he doesn't leave.\n\t\t*set merchants -2\n\n\t\t\"Sir, I do not think you understand. This is precisely why the current castle is in such a shambles. A Lord must take risks! Don't you understand that?\"\n\t\t*choice\n\t\t\t#Flog him for his impudence.\n\t\t\t\tYou have him flogged for daring to speak back to you in such a manner. \n\t\t\t\t*set dark +2\n\t\t\t\t*set merchants -1\n\t\t\t\t*page_break\n\t\t\t\t*goto farmer\n\t\t\t#Order him to leave.\n\t\t\t\tYou order the guard to escort the merchant out and to send in the next subject.\n\t\t\t\t*page_break\n\t\t\t\t*goto farmer\n\t\t\t\t\n*label farmer\nNext a peasant walks in, and from his straw hat and clean yet poorly made clothes, you can tell that this man is no noble, but he's at least trying his best to be presentable.\n*page_break\n\nThe man walks up quietly. He doesn't look at you directly when he speaks. \n\n\"My liege, I have been elected as the main spokesman for the farmers that still remain here. As I'm sure you're aware, this area does not offer the best farming conditions, and many of my fellow farmers have left as a result. We are in dire need of investment to make anything substantial here. We want to hire workers to drain the bogs and swamplands. Only then can we set up proper farming land. Will you help us? \n\n\"We estimate it would take at least 250 Gold Pieces to clear the area we would need. Once we've drained the swamps, I'm sure it will attract more peasants and farmers to the surrounding area. Do we have your permission to start work?\"\n\nYou have ${gold} Gold Pieces in the treasury.\n*choice\n\t*selectable_if (gold > 249) #\"Yes, you have my permission. Here are 250 Gold Pieces to help you hire the workers you need to drain the swamps.\"\n\t\tThe farmer looks happy. \"Thank you, my liege!\"\n\t\t*set gold -250\n\t\t*set farmer_status 3\n\t\t*set farmers +2\n\t\t*set peasants +5\n\t\t*page_break\n\t\t*goto repairs\n\t#\"You have my permission, but I cannot give you the funds you require. You will have to finance it yourself.\"\n\t\tThe farmer looks disappointed. \"My liege, I understand you have many responsibilities, but how can we continue to farm in such inhospitable conditions? Many of the farmers will leave if something is not done.\"\n\t\t*choice\n\t\t\t#\"Well…if you do drain the swamplands, I would be willing to suspend any tithes you may owe me for a period of five years.\"\n\t\t\t\t\"That may be enough to convince most of the farmers to stay. Thank you, my liege.\" He leaves quickly.\n\t\t\t\t*set farmers_no_tax 1\n\t\t\t\t*set farmer_status 2\n\t\t\t\t*set peasants +2\n\t\t\t\t*page_break\n\t\t\t\t*goto repairs\n\t\t\t#\"If you build the farms, I will let farmers own the land and require no tithes from them. This motivation alone should be enough to convince them to stay.\"\n\t\t\t\tThe man's eyes widen. \"You will let us own the land? My liege, that is very generous of you! I will get started right away, and I'm sure with that incentive we can gather enough resources and investments to drain it ourselves.\"\n\t\t\t\t*set farmers +5\n\t\t\t\t*set farmer_status 4\n\t\t\t\t*set peasants +5\n\t\t\t\t*set farmers_own_land 1\n\t\t\t\t*achieve farmer\n\t\t\t\t*page_break\n\t\t\t\t*goto repairs\n\t\t\t#\"I'm sorry. You will just have to figure it out on your own.\"\n\t\t\t\tThe farmer leaves.\n\t\t\t\t*set farmer_status 1\n\t\t\t\t*page_break\n\t\t\t\t*set farmers -1\n\t\t\t\t*goto repairs\n\t#\"It seems like too much trouble. I would rather spend the money on more useful things. You're on your own.\"\n\t\tThe farmer does not take the rejection well, but he's smart enough to leave without an argument. He leaves quickly.\n\t\t*set farmers -2\n\t\t*set farmer_status 1\n\t\t*page_break\n\t\t*goto repairs\n\t*selectable_if (history > 0) #\"From what I understand, the swamplands are considered sacred and bring in a good amount of tourism. I strictly forbid you from doing any such thing!\"\n\t\tThe farmer looks infuriated, but he's smart enough to leave without arguing with you.\n\t\t*set farmers -5\n\t\t*set druids +1\n\t\t*set magicians +1\n\t\t*set peasants +1\n\t\t*page_break\n\t\t*goto repairs\n\t\t\n*label repairs\nNext walks in your master builder. \n\n\"Hello, my liege. We currently have five workers in our employ. Given the manpower, we can only concentrate on repairing one thing this week. What should it be?\"\n\nYou have ${gold} Gold Pieces in the treasury.\n\n*choice\n\t*disable_reuse *selectable_if (gold > 249) #The castle, it is in shambles. (250 GP)\n\t\t\"Very well. We will repair the castle.\"\n\t\t*set castle 1\n\t\t*set gold -250\n\t\t*page_break\n\t\t*goto taxes\n\t*disable_reuse *selectable_if (gold > 99) #The outer walls, defense is paramount. (100 GP)\n\t\t\"Very well. We will repair the walls.\"\n\t\t*set defenses +1\n\t\t*set gold -100\n\t\t*page_break\n\t\t*goto taxes\t\n\t*disable_reuse *selectable_if (gold > 149) #The main village, we need to attract more peasants. (150 GP)\n\t\t\"Very well. We will repair the main village.\" \n\t\t*set peasants +10\n\t\t*set gold -150\n\t\t*page_break\n\t\t*goto taxes\n\t*selectable_if (gold > 249) #I will not accept that. We should hire more workers so that we can work on multiple projects. (250 GP)\n\t\t\"Of course, my liege! I will hire workers right away. What projects should we work on?\"\n\t\t*set gold -250\n\t\t*set workers +5\n\t\t*goto multiple\n\t#Nothing.\n\t\t\"Nothing at this time.\"\n\t\t*page_break\n\t\t*goto taxes\n\n*label multiple\nYou can select multiple projects to work on now.\n\nYou have ${gold} Gold Pieces in the treasury.\n\n*choice\n\t*disable_reuse *selectable_if (gold > 249) #The castle, it is in shambles. (250 GP)\n\t\t*set castle + 10
