ts\n\t\t*set gold +tax_increase\n\t\t*set gold +tax_increase2\n\t\tNew taxes have been collected.\n\t\t\n\t\t\n\t\tYou now have ${gold} Gold Pieces in the treasury. \n\t\t*page_break\n\t\t*goto taxes\n\t\t\n\t\t\n\n*label taxes\nWhat should the tax rate be?\n*choice\n\t#High taxes.\n\t\t\"We are in dire needs of funds. We'll have higher taxes.\" \n\t\t*set tax 30\n\t\t*set peasants -5\n\t\t*set merchants -2\n\t\t*set farmers -1\n\t\t*page_break\n\t\t*goto start\n\t#Medium taxes.\n\t\t\"We'll have medium taxes.\"\n\t\t*set tax 20\n\t\t*page_break\n\t\t*goto start\n\t#Low Taxes\n\t\t\"We'll have low taxes.\"\n\t\t*set tax 1\n\t\t*set peasants +5\n\t\t*set merchants +5\n\t\t*page_break\n\t\t*set farmers +1\n\t\t*goto start\n\t#No taxes.\n\t\t\"We need to get as many people as we can to join our villages. I will temporarily suspend taxes.\"\n\n\t\t*set peasants +15\n\t\t*set merchants +10\n\t\t*set farmers +5\n\t\t*set tax 0\n\t\t*page_break\n\t\t*goto start\n\n*label start\n*if saved_king > 0\n\tA guard approaches you. \"Sir, we have some knights outside that wish to see you.\" You nod your head and invite them into your great hall.\n\t*page_break\n\tFive knights in full armor walk in, and they bow before you. They're all dressed in full plate mail, carrying weapons of extraordinary craftmanship. The center knight, who happens to be the shortest of the five, comes forward.\n\t\n\t\"Lord ${name}, we are here to offer our services.\"\n\t\n\t*fake_choice\n\t\t#\"And how much would it cost to purchase your services?\"\n\t\t\tYou ask them how much their services are.\n\t\t\t*page_break\t\n\t\t#\"I'm sorry, I don't think I can afford you…\"\n\t\t\tYou tell them you don't think you can afford their services.\n\t\t\t*page_break\t\n\t\t\n\t\"No…I don't think you understand, my liege; we have already been paid in full. We've been sent from the King himself. He was so grateful for your help in crushing the rebellion plot, he sent us to aid you.\"\n\t\n\tFive knights have been added to your army.\n\t*set knights +5\n\t*page_break\n\tYou thank the knights, and they soon leave.\n\t*goto homes\n*label homes\nAn older lady of nobility approaches your court and bows respectfully. \n\nShe states that many of the peasants do not have proper housing and are forced to sleep outside in the cold. She says that even those who have money to pay for rent cannot, due to the fact that many of the inns are full or charging exorbitant prices to take advantage of the situation. She hopes you can do something about this. \n*choice\n\t*selectable_if (workers > 9) #Build temporary housing for the peasants to live in. (Requires 10 Workers)\n\t\tShe looks happy and leaves with a group of workers to get started right away. \n\t\t*set workers -10\n\t\t*set light +10\n\t\t*set dark -10\n\t\t*set peasants +10\n\t\t*page_break\n\t\t*goto to_battle\n\t*selectable_if (gold > 249) #Purchase land from nobles in order for the peasants to build their own homes. (250 GP)\n\t\tShe bows respectfully and thanks you for your generosity. She starts organizing efforts to build homes for the homeless in the newly purchased lands.\n\t\t*set light +10\n\t\t*set dark -5\n\t\t*set peasants +10\n\t\t*page_break\n\t\t*goto to_battle\n\t*selectable_if (gold > 99) #Offer Gold to the innkeepers to lower the rent and expand. (100 GP)\n\t\tShe smiles and leaves. Several merchants take your offer of Gold to expand their property, while also agreeing to lower the rent.\n\t\t*set light +5\n\t\t*set peasants +5\n\t\t*set dark -2\n\t\t*page_break\n\t\t*goto to_battle\n\t#Force the innkeepers to charge less.\n\t\tShe's grateful for your assistance. Your effort allows many of the peasants to find shelter, but it also upsets some of the merchants who don't share your same convictions regarding the homeless.\n\t\t*set light +5\n\t\t*set merchants -5\n\t\t*set peasants +2\n\t\t*page_break\n\t\t*goto to_battle\n\t#Offer to conscript many of the homeless into my army.\n\t\tYou take advantage of the situation and conscript many new recruits. \n\t\t*set militia +10\n\t\t*set guards +5\n\t\t*set light -10\n\t\t*set dark +10\n\t\t*page_break\n\t\t*goto to_battle\n\t#Tell her there's nothing I can do.\n\t\tShe leaves, dismayed by your response. \n\t\t*set thieves +2\n\t\t*set rule -1\n\t\t*page_break\n\t\t*goto to_battle\n*label to_battle\nThe rest of the day is rather uneventful. You begin to grow bored…\n*page_break\nSuddenly, a guard bursts through the door, and he's covered in blood.\n\n(So much for boring.)\n*page_break\n\"My liege, we are soon to be under attack…a horde of barbarians is heading this way. They've already destroyed one of our farms!\"\n*choice\n\t*selectable_if (leadership > 0) #\"Get everyone inside the castle walls…NOW!\" (Requires Leadership)\n\t\tYou manage to get everyone inside the castle walls, then quickly close the gate. \n\t\t*set light +5\n\t\t*set militia +5\n\t\t*goto barbarian_battle\n\t#\"Gather the troops.\"\n\t\tYou tell your guards to gather the troops. You arm a few peasants with spears.\n\t\t*set peasants -5\n\t\t*set militia +5\n\t\t*page_break\n\t\tOne of your guards yells from the wall, \"I see them…there must be dozens of them…maybe more! A few peasants are running this way…but if we don't close the gates, the enemy will soon be upon us.\"\n\t\t*choice\n\t\t\t#\"Close the gates!\"\n\t\t\t\tYour guard reluctantly closes the gates. Some peasants are caught and unable to get inside. The barbarians are soon upon them, but at least the enemy has not breached the wall.\n\t\t\t\t*if peasants > 9 \n\t\t\t\t\t*set peasants -10\n\t\t\t\t*if peasants \u003c 10 \n\t\t\t\t\t*set peasants 0\n\t\t\t\t*goto barbarian_battle\n\t\t\t#\"Leave the gates open until everyone is inside.\"\n\t\t\t\tA few barbarians manage to get in, but your guards quickly dispatch them, though there are some casualties.\n\t\t\t\t*set guards -5\n\t\t\t\t*set light +5\n\t\t\t\t*goto barbarian_battle\n\t\t\t\t\n*label barbarian_battle\n*if difficulty \u003c 3\n\tYou look outside and see a horde of at least fifty barbarians. They also appear to have siege weapons, including a battering ram and ladders. They're getting ready to assault the walls.\n\n*if difficulty = 3\n\tYou look outside and see a horde of at least a hundred barbarians. They also appear to have siege weapons, including a battering ram and ladders. They're getting ready to assault the walls.\n\t*set barbarians +50\n\t\nWhat do you do?\n*choice\n\t#Open the gates and have everyone charge!\n\t\t*if guards > 20\n\t\t\tYour men fight valiantly, and several of the barbarians retreat; however, the enemy soon regroups to attack again.\n\t\t\t*set guards -20\n\t\t\t*set barbarians -30\n\t\t\t*goto defense\n\n\t\tThough the barbarians' weapons might be primitive, their fighting skills are superior. Your men are slaughtered as a result.\n\t\t*set guards 0\n\t\t*set barbarians -10\n\t\t*goto defense\n\t#Defend the wall.\n\t\tYou position your men on top of the walls.\n\t\t*page_break\n\t\t*goto defense\n\n*label defense\t\n*if barbarians \u003c 1\n\tThe barbarian army scatters and flees.\n\t*page_break\n\t*finish\nWhat do you do?\n\t\t\nYour Army:\n\n${militia} Militia\n\n${guards} Men at Arms (Guards)\n\n${knights} Knights\n\n${magicians} Magicians\n\n*if archers \u003c 0\n\t*set archers 0\n${archers} Archers\n\n${defenses} - The Wall's Defensive Strength\n\n*if defenses \u003c 1\n\tThe enemy has breached the defenses!\n\nThe enemy army:\n*if barbarians > 0\n\t${barbarians} Barbarians (Armed with throwing spears, light bows, and axes.)\n*if barbarians \u003c 0\n\tThe barbarian army has scattered. Finish them!\n1 Battering Ram (Supported by five elite barbarian warriors.)\n\n*choice\n\t*if archers > 0\n\t\t*selectable_if (defenses > 0) #Have my archers fire a volley! (Requires Archers) (Requires Defenses Up)\n\t\t\t\n\t\t\t*image archers.png\n\t\t\t*if shield_wall = 0\n\t\t\t\tThe enemy forces are caught completely off guard. Your archers fire a volley directly at the barbarians, killing ${archers} of them. A couple of your archers take casualties as some of barbarians manage to return fire. The barbarians have now formed a shield wall to better protect themselves. \n\t\t\t\t*set archer_damage archers\n\t\t\t\t*set barbarians -archer_damage\n\t\t\t\t*set archers -2\n\t\t\t\t*set shield_wall 1\n\t\t\t\t*page_break\n\t\t\t\t*if defenses > 0\n\t\t\t\t\tThe barbarians attack your outer gate, doing 1 Damage.\n\t\t\t\t\t*set defenses -1\n\t\t\t\t*page_break\n\t\t\t\t*goto defense\n\t\t\t*set shield_archer archers/2\n\t\t\t*set shield_archer round(shield_archer)\n\t\t\tYour archers fire a volley, but since the barbarians have their shields up, only about half of the arrows hit their intended targets. The barbarians are also better prepared to return fire, and several of your archers are killed. \n\t\t\t*set barbarians -shield_archer\n\t\t\t*set archers -5\n\t\t\t*page_break\n\t\t\t*if defenses > 0\n\t\t\t\tThe barbarians attack your outer gate, doing 1 Damage.\n\t\t\t\t*set defenses -1\n\t\t\t*page_break\n\t\t\t*goto defense\n\t*selectable_if (guards > 9) #Send a wave of guards into the fray! (Requires 10 Guards)\n\t\tThough the barbarians' weapons might be primitive, their fighting skills are superior. Your men are slaughtered as a result, but not before they take a few of the enemy soldiers down with them.\n\t\t*set guards -10\n\t\t*set barbarians -5\n\t\t*if defenses > 0\n\t\t\tThe barbarians attack your outer gate, doing 1 Damage.\n\t\t\t*set defenses -1\n\t\t*page_break\n\t\t*goto defense\n\t*selectable_if (knights > 0) #Send a knight into the fray! (Requires 1 Knight)\n\t\tYour knight fights valiantly and slays many barbarians, but he is soon overpowered. \n\t\t*set knights -1\n\t\t*set barbarians -5\n\t\t*if defenses > 0\n\t\t\tThe barbarians attack your outer gate, doing 1 Damage.\n\t\t\t*set defenses -1\n\t\t*page_break\n\t\t*goto defense\n\t*if knights > 0\n\t\t*selectable_if (guards > 9) #Send a wave of guards supported by knights. (Requires 10 Guards and 2 Knights)\n\t\t\tYou slaughter many barbarians but also take casualties of your own. \n\t\t\t*set guards -5\n\t\t\t*set barbarians -15\n\t\t\t*set knights -1\n\t\t\t*if defenses > 0\n\t\t\t\tThe barbarians attack your outer gate, doing 1 Damage.\n\t\t\t\t*set defenses -1\n\t\t\t*page_break\n\t\t\t*goto defense\n\t*selectable_if (militia > 9) #Send a wave of militia to attack the barbarians. (Requires 10 Militia)\n\t\t\tThe militia is quickly slaughtered, but not before they take down a couple barbarians.\n\t\t\t*set militia -8\n\t\t\t*set barbarians -2\n\t\t\t*if defenses > 0\n\t\t\t\tThe barbarians attack your outer gate, doing 1 Damage.\n\t\t\t\t*set defenses -1\n\t\t\t*page_break\n\t\t\t*goto defense\n\t*if magicians > 0 \n\t\t*selectable_if (defenses > 0) #Have a magician cast a fireball spell! (Requires 1 Magician) (Requires Defenses Up)\n\t\t\tYour magician casts a fireball at the barbarians, causing severe damage to them; however, one of the barbarians throws a spear and takes down the mage. \n\t\t\t*set barbarians -20\n\t\t\t*set magicians -1\n\t\t\t*page_break\n\t\t\t*if defenses > 0\n\t\t\t\tThe barbarians attack your outer gate, doing 1 Damage.\n\t\t\t\t*set defenses -1\n\t\t\t*page_break\n\t\t\t*goto defense\n\t*if defenses > 0 \n\t\t*selectable_if (peasants > 9) #Have peasants throw rocks at the enemy! (Requires 10 Peasants)\n\t\t\tYour peasants throw rocks at the enemy; they do minimal damage, and suffer casualties of their own.\n\t\t\t*set peasants -5\n\t\t\t*set barbarians -1\n\t\t\t*page_break\n\t\t\t*if defenses > 0\n\t\t\t\tThe barbarians attack your outer gate, doing 1 Damage.\n\t\t\t\t*set defenses -1\n\t\t\t*page_break\n\t\t\t*goto defense\n\t*if defenses \u003c 1\n\t\t*disable_reuse  #Charge them by myself. (Requires Defenses Down)\n\t\t\t*if defenses > 0\n\t\t\t\tThe barbarians attack your outer gate, doing 1 Damage.\n\t\t\t\t*set defenses -1\n\t\t\t*if barbarians > 5\n\t\t\t\t*if strength > 0\n\t\t\t\t\tYou kill some but are soon injured and forced to retreat.\n\t\t\t\t\t*set barbarians -4\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto defense\n\t\t\t*if barbarians \u003c 5\n\t\t\t\tYou manage to vanquish them all!\n\t\t\t\t*finish\n\t\t\t*if barbarians = 5\n\t\t\t\tYou manage to vanquish them all!\n\t\t\t\t*finish\n\t\t\tYou actually manage to kill a couple but are soon overpowered. Clearly, these barbarians are better warriors than you; your only saving grace is that you're better equipped and protected by armor. Several of your men rush in to rescue you before the barbarians can inflict real damage upon you. A few of your men fall in the process. It would be best not to try that again. \n\t\t\t*set barbarians -2\n\t\t\t*if militia > 4\n\t\t\t\t*set militia -2\n\t\t\t*if guards > 1\n\t\t\t\t*set guards -2\n\t\t\t*set rule -1\n\t\t\t*page_break\n\t\t\t*goto defense\n\t\t\t\n\t#Retreat into the castle.\n\t\tYou order your troops to retreat into the castle. Unfortunately, several peasants and other civilians get attacked by the barbarians.\n\t\t*set peasants -10\n\t\t*set farmers -4\n\t\t*set merchants -2\n\t\t*set rule -1\n\t\t*goto castle\n\t*selectable_if (barbarians \u003c 1) #Destroy their battering ram and finish them off. (Requires All or Most Barbarians Dead)\n\t\t*finish\n\t#Surrender.\n\t\tAre you sure you want to surrender?\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\tThe barbarian leader walks up to you with his axe drawn…the last thing you see is him smiling as he slashes down at you. \n\t\t\t\t*page_break\n\t\t\t\t*goto_scene death\n\t\t\t#No.\n\t\t\t\tYou decide to keep fighting.\n\t\t\t\t*page_break\n\t\t\t\t*goto castle\t\t\t\n\t#Wait.\n\t\tYou wait for a moment…to consider your next plan of attack. \n\t\t*page_break\n\t\t*if defenses > 0\n\t\t\t\tThe barbarians attack your outer gate, doing 1 Damage.\n\t\t\t\t*set defenses -1\n\t\t*goto defense\n\n*label castle\n*if barbarians \u003c 1\n\tThe barbarian army scatters and flees. \n\t*page_break\n\t*finish\nYou are now inside your castle; it's a more defensible position, but you'll still have to fight the barbarian horde. \n\nWhat do you do?\n*if archers \u003c 0\n\t*set archers 0\t\t\nYour Army:\n\n${militia} Militia\n\n${guards} Guards\n\n${knights} Knights\n\n${magicians} Magicians\n\n${archers} Archers\n\n${militia} Militia\n\n${castle} - The Castle's Defensive Strength\n\n*if castle > 0\n\t*image defense_with_gate.png\n\n\n*if castle \u003c 1\n\t*image defense_no_gate.png\n\t\n\t\n\tThe enemy has breached the defenses!\n\nThe enemy army:\n*if barbarians \u003c 1\n\t*goto victory1\n*if barbarians > 0\n\t${barbarians} Barbarians (Armed with throwing spears, light bows, and axes.)\n\t\n\t\n1 Battering Ram (Supported by five elite barbarian warriors.)\n\n*fake_choice\n\t*if castle > 0\n\t\t*selectable_if (archers > 4) #Have my archers fire a volley! (Requires 5 Archers) (Requires Walls Up)\n\t\t\tYour archers fire a volley directly at the barbarians. A few of your archers take casualties as some of the barbarians return fire. \n\t\t\t*set archer_damage archers\n\t\t\t*set archers-2\n\t\t\t*set barbarians -archer_damage\n\t\t\t*page_break\n\t\t\tThe barbarians attack your castle gate, doing 1 Damage.\n\t\t\t*set castle -1\n\t\t\t*page_break\n\t\t\t*goto castle\n\t\n\t*selectable_if (guards > 4) #Send a wave of guards into the fray! (Requires 5 Guards) (Requires Defenses Down)\n\t\t\tThough the barbarians' weapons might be primitive, their fighting skills are superior. Your men are slaughtered as a result, but not before they take a few of the enemy soldiers down with them.\n\t\t\t*set guards -5\n\t\t\t*set barbarians -15\n\t\t\t*if castle > 0\n\t\t\t\tThe barbarians attack your castle gate, doing 1 Damage.\n\t\t\t\t*set castle -1\n\t\t\t*page_break\n\t\t\t*goto castle\n\t\n\t*selectable_if (knights > 0) #Send a knight into the fray! (Requires 1 Knight)\n\t\t\tYour knight fights valiantly and slays many barbarians, but he is soon overpowered. \n\t\t\t*set knights -1\n\t\t\t*set barbarians -8\n\t\t\t*if castle > 0\n\t\t\t\tThe barbarians attack your castle gate, doing 1 Damage.\n\t\t\t\t*set castle -1\n\t\t\t*page_break\n\t\t\t*goto castle\n\t*if castle \u003c 1\n\t\t*if knights > 1\n\t\t\t*selectable_if (guards > 9) #Send a wave of guards supported by knights. (Requires 10 Guards and 2 Knights) (Requires Defenses Down)\n\t\t\t\tYou slaughter many barbarians, but also take casualties of your own. \n\t\t\t\t*set guards -2\n\t\t\t\t*set barbarians -20\n\t\t\t\t*set knights -1\n\t\t\t\t*page_break\n\t\t\t\t*goto castle\n\n\t*selectable_if (militia > 9) #Send a wave of militia to attack the barbarians. (Requires 10 Militia)\n\t\t\tThe militia is quickly slaughtered, but not before they take down several barbarians.\n\t\t\t*set militia -5\n\t\t\t*set barbarians -3\n\t\t\t*if castle > 0\n\t\t\t\tThe barbarians attack your castle gate, doing 1 Damage.\n\t\t\t\t*set barbarians -2\n\t\t\t\t*set castle -1\n\t\t\t*page_break\n\t\t\t*goto castle\n\t*if magicians > 0\n\t\t*selectable_if (castle > 0) #Have a magician cast a fireball spell! (Requires 1 Magician) (Requires Walls Up)\n\t\t\tYour magician casts a fireball at the barbarians, causing severe damage to them; however, one of the barbarians throws a spear and takes down the mage.\n\t\t\t*set barbarians -25\n\t\t\t*set magicians -1\n\t\t\t*page_break\n\t\t\t*if castle > 0\n\t\t\t\tThe barbarians attack your castle gate, doing 1 Damage.\n\t\t\t\t*set castle -1\n\t\t\t*page_break\n\t\t\t*goto castle\n\t*if peasants > 4\n\t\t*selectable_if (castle > 0) #Have peasants and servants throw rocks at the enemy!\n\t\t\tYour servants throw rocks at the enemy; they do minimal damage, and suffer casualties of their own.\n\t\t\t*set peasants -5\n\t\t\t*set barbarians -2\n\t\t\t*page_break\n\t\t\t*if castle > 0\n\t\t\t\tThe barbarians attack your castle gate, doing 1 Damage.\n\t\t\t\t*set castle -1\n\t\t\t*page_break\n\t\t\t*goto castle\n\t*if castle \u003c 1\n\t\t*disable_reuse #Charge them by myself.\n\t\t\t*if barbarians > 5\n\t\t\t\tYou kill some but are soon injured and forced to retreat.\n\t\t\t\t*set barbarians -5\n\t\t\t\t*page_break\n\t\t\t\t*goto castle\n\t\t\t*if barbarians \u003c 5\n\t\t\t\tYou manage to vanquish them all!\n\t\t\t\t*finish\n\t\t\t*if barbarians = 5\n\t\t\t\tYou manage to vanquish them all!\n\t\t\t\t*finish\n\t*selectable_if (barbarians \u003c 1) #Destroy their battering ram and finish them off. (Requires All or Most Barbarians Dead)\n\t\t*finish\n\t#Surrender.\n\t\t*page_break\n\t\t*goto_scene death\n\t\t\t\t\n*label victory1\nYou have inflicted such heavy damage to the barbarian army that they're forced to retreat. You have won the battle!\n*finish", "day4": "*temp tax_increase 1\n*temp tax_increase2 1\n*temp pre_war_militia 0\n*if militia \u003c 0\n\t*set militia 0\n*if guards \u003c 0\n\t*set guards 0\n*if merchants \u003c 0\n\t*set merchants 0\n*if magicians \u003c 0\n\t*set magicians 0\n*if farmers \u003c 0\n\t*set farmers 0\n*if peasants \u003c 0\n\t*set peasants 0\n*if workers \u003c 0\n\t*set workers 0\n*if knights \u003c 0\n\t*set knights 0\n*if archers \u003c 0\n\t*set archers 0\n*if druids \u003c 0\n\t*set druids 0\n*if prepare = 1\n\t*goto mobilize2\nAfter the battle, the town spends time mourning their dead. You order repairs to take place at once, and everyone pitches in.\n*if guards > 9\n\t*set rule +1\nYou need to decide what your first priority should be after the attack?\n*choice\n\t#Repair the defenses.\n\t\t*set defenses +2\n\t\t*set workers +5\n\t\t*page_break\n\t\tYou organize additional workers and begin hasty repairs reinforcing the walls. \n\t\t*page_break\n\t\t*goto court\n\t#Seeing to the wounded.\n\t\t*set guards +5\n\t\t*set archers +3\n\t\t*set peasants +2\n\t\tYou organize the healers and the people to concentrate the efforts upon helping the wounded. You're able to save a few of the injured. \n\t\t*page_break\n\t\t*goto court\n\t#Reassure the people.\n\t\t*set peasants +10\n\t\tYou decide to give a speech to the people; what should be the main theme?\n\t\t*choice\n\t\t\t#Heartfelt; we shall overcome this and prevent it from happening again.\n\t\t\t\t*set light +2\n\t\t\t\t*set peasants +5\n\t\t\t\t*page_break\n\t\t\t\t*goto court\n\t\t\t#Vengeful; we will make the barbarians pay for this, and they will regret attacking us. \n\t\t\t\t*set dark +2\n\t\t\t\t*set militia +5\n\t\t\t\t*set guards +1\n\t\t\t\t*page_break\n\t\t\t\t*goto court\n\t\t\t\n*label court\nIt's a somber mood as you sit in during court for the rest of the day. Most of the subjects who were scheduled to petition you today decided to postpone, out of respect to the dead.\n\n*if difficulty = 3\n\tYou hear that some of the peasants have departed to live in lands further away from the barbarian camps. \n\t*set peasants -10\n\t*set farmers -5\n\t*set merchants -5\n\t*set workers -2\n\t*set rule -1\n\nAfter some time passes, your advisor walks up. \n*page_break\n\"My liege, this event has lowered the morale of the people considerably. The direction we take next will be very important to the future of this castle. I am not a wartime advisor. I feel you may need a new advisor when it comes to matters such as these.\"\n*fake_choice\n\t#Reassure him.\n\t\t\"You've been a loyal advisor, don't put yourself down like that. I don't think there was anything you could have done to prevent this.\"\n\t\t*page_break\n\t\tYour advisor listens to your words and seems appreciative. \"Even so, my liege, I feel we should look at hiring additional advisors that are more knowledgeable in these areas.\"\n\t#Agree with him.\n\t\t\"You've been a loyal advisor, but I think in this matter you are correct, we need war advisors.\"\n\t\t*page_break\nYour advisor takes out a parchment. \"My liege, I know of several individuals that could be helpful during this time. We can send for one of them to join us. Time is limited, so if we're going to contact one, we should do it now.\"\n*page_break\n*label advisors\n\"Tell me about the advisors you had in mind.\"\n*choice\n\t#General Varys.\n\t\t*image general.png\n\t\t\n\t\t\n\t\tVarys is actually retired; however, everyone still refers to him as General Varys. He was a great general who fought in the Northern Rebellion wars. Some feel the safety of the Kingdom was ensured by his swift action in battle. He's also highly respected by the royal family.\n\t\t*page_break\n\t\t*goto advisors\n\t#Gothica the Warrior.\n\t\t*image barbarian_1.png\n\t\t\n\t\t\n\t\tShe's considered to be one of the greatest warriors in the Kingdom. There is some controversy about her, due to the fact that she grew up in a barbarian village; however, it's clear that she has no love for barbarians. Her early life is not well known, but something must have happened, as she now hunts them with ruthless intent. She signs up as a mercenary to fight them whenever she has the chance. She's known for her prowess as a warrior and her fierceness in battle. Many fighters in the realm respect her and consider her a hero of the Kingdom despite her barbaric lineage.\n\t\t*page_break\n\t\t*goto advisors\n\t#Felspar the Diplomat.\n\t\t*image felspar.png\n\t\t\n\t\t\n\t\tFelspar has been called upon by the King several times over the past few years. She's a very wise negotiator and has de-escalated several conflicts. As a result, she has a fine reputation, especially among the merchants and farmers, since they rely upon peaceful times for trade and farming.\n\t\t*page_break\n\t\t*goto advisors\n\t#Brander the Rogue.\n\t\t*image brand1.png\n\t\t\n\t\tBrander is a rogue who grew up in the Central Province. Some say he's of noble blood, but no one can confirm it. In his early years, he was a bandit, stealing from foreign merchants. He gained the trust and respect of many peasants by sharing the food he procured during a great famine. During the rebel wars in the south, he was pardoned by the King due to his efforts in disrupting the rebel's supply lines.\n\t\t*page_break\n\t\t*goto advisors\n\t#I've heard enough.\n\t\t\"I've heard enough. I think I'm ready to choose a new advisor.\"\n\t\t*page_break\n\t\t*goto advisor_choice\n\n*label advisor_choice\nI choose…\n*choice\n\t#General Varys.\n\t\tYour advisor nods. \"I will send for him.\"\n\t\t*set leadership +2\n\t\t*set rule +1\n\t\t*set knight +2\n\t\t*set guards +5\n\t\t*set militia +10\n\t\t*set advisor 1\n\t\t*page_break\n\t\t*goto overview\n\t#Gothica the Warrior.\n\t\tYour advisor nods. \"I will send for her.\"\n\t\t*set strength +2\n\t\t*set guards +20\n\t\t*set militia +5\n\t\t*set advisor 2\n\t\t*page_break\n\t\t*goto overview\n\t#Felspar the Diplomat.\n\t\tYour advisor nods. \"I will send for her.\"\n\t\t*set diplomacy +1\n\t\t*set intelligence +1\n\t\t*set merchants +3\n\t\t*set peasants +5\n\t\t*set farmers +2\n\t\t*set advisor 3\n\t\t*set gold +1000\n\t\t*page_break\n\t\tHearing that you're seeking a diplomatic solution to the problem, several merchants give you funds, hoping it will help with the negotation. \n\t\t*page_break\n\t\t*goto overview\n\t#Brander the Rogue\n\t\tYour advisor nods. \"I will send for him.\"\n\t\t*set stealth +2\n\t\t*set agility +1\n\t\t*set peasants +15\n\t\t*set militia +5\n\t\t*set advisor 4\n\t\t*page_break\n\t\t*goto overview\n\t#None of them.\n\t\tYour advisor looks surprised at your answer.\n\t\t\n\t\tYou respond, \"I will take care of this myself. I do not need any of them.\"\n\t\t*set peasants +10\n\t\t*achieve loner\n\t\tYour advisor frowns. \"If that is what you want, my liege.\" \n\t\t*page_break\n\t\t*goto overview\n\t\n\t\n*label overview\nYour advisor brings out another parchment showing an overview of your Kingdom. \n*page_break\n*goto kingdom\n\n*label kingdom\nKingdom Summary\n\n*image castle-35216.png\n\nCivilian Units:\n\n*if peasants > 0\n\t${peasants} Peasants\n\n*if peasants \u003c 1\n\tYou have no peasants to recruit units from!\n\t*set peasants 0\n\n${merchants} Merchants\n\n${farmers} Farmers\n\n${workers} Workers\n\t\t\n\t\t\nMilitary Units:\n\t\t\n${militia} Militia\n\n${guards} Guards\n\n${knights} Knights\n\n${archers} Archers\n\n\nUnique Units:\n\n${druids} Druids\n\n${magicians} Magicians\n\n${thieves} Thieves\n\n${bandits} Bandits\n\nOther Important Statistics:\n\n${rule} Rule\n\n*if rule > 3 \n\t(Rule is secure.)\n*if rule \u003c 4 \n\t(Rule is not secure.)\n\n${gold} Gold Pieces\n\n*if tax = 0\n\tNo Taxes\n\n\n*if tax = 10\n\tLow Taxes\n\n\t\n*if tax = 20\n\tMedium Taxes\t\n\n\t\n*if tax = 30\n\tHigh Taxes\t\n\n\t\n*choice\n\t*if (Gold > 9) and (peasants > 0) \n\t\t#Hire Militia. (10 GP)\n\t\t\t*set militia +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -10\n\t\t\t*goto kingdom\n\t*if (Gold > 99) and (peasants > 9) \n\t\t#Hire 10 Militia. (100 GP)\n\t\t\t*set militia +10\n\t\t\t*set peasants -10\n\t\t\t*set gold -100\n\t\t\t*goto kingdom\n\t*if (Gold > 49) and (peasants > 0)\n\t\t#Hire Guards. (50 GP)\n\t\t\t*set guards +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -50\n\t\t\t*goto kingdom\n\t*if (Gold > 249) and (peasants > 4)\n\t\t#Hire 5 Guards. (250 GP)\n\t\t\t*set guards +5\n\t\t\t*set peasants -5\n\t\t\t*set gold -250\n\t\t\t*goto kingdom\n\t*if (Gold > 99) and (peasants > 0) \n\t\t#Hire Knights. (100 GP)\n\t\t\t*set knights +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -100\n\t\t\t*goto kingdom\n\t*if (Gold > 49) and (peasants > 0) \n\t\t#Hire Merchants. (50 GP)\n\t\t\t*set merchants +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -50\n\t\t\t*goto kingdom\n\t*if (Gold > 9) and (peasants > 0) \n\t\t#Hire Farmers. (10 GP)\n\t\t\t*set farmers +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -10\n\t\t\t*goto kingdom\n\t*if (Gold > 99) and (peasants > 9) \n\t\t#Hire 10 Farmers. (100 GP)\n\t\t\t*set farmers +10\n\t\t\t*set peasants -10\n\t\t\t*set gold -100\n\t\t\t*goto kingdom\n\t*if (Gold > 199) and (peasants > 0) \n\t\t#Hire Magicians. (200 GP)\n\t\t\t*set magicians +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -200\n\t\t\t*goto kingdom\n\t*if (Gold > 74) and (peasants > 0) \n\t\t#Hire Archers. (75 GP)\n\t\t\t*set archers +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -75\n\t\t\t*goto kingdom\n\t*if (Gold > 374) and (peasants > 4) \n\t\t#Hire 5 Archers. (375 GP)\n\t\t\t*set archers +5\n\t\t\t*set peasants -5\n\t\t\t*set gold -375\n\t\t\t*goto kingdom\n\t*if (Gold > 24) and (peasants > 0) \n\t\t#Hire Workers. (25 GP)\n\t\t\t*set workers +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -25\n\t\t\t*goto kingdom\n\t*if (Gold > 124) and (peasants > 4) \n\t\t#Hire 5 Workers. (125 GP)\n\t\t\t*set workers +5\n\t\t\t*set peasants -5\n\t\t\t*set gold -125\n\t\t\t*goto kingdom\n\t#Done.\n\t\t*set tax_increase tax * peasants\n\t\t*set tax_increase2 * merchants\n\t\t*set gold +tax_increase\n\t\t*set gold +tax_increase2\n\t\t*if tax = 10\n\t\t\t*set gold +150\n\t\t*if tax = 20\n\t\t\t*set gold +300\n\t\t*if tax = 30\n\t\t\t*set gold +500\n\t\tNew taxes have been collected.\n\t\t\n\t\t\n\t\tYou now have ${gold} Gold Pieces in the treasury. \n\t\t*page_break\n\t\t*goto taxes\n\n*label taxes\nWhat should the tax rate be?\n*choice\n\t#High taxes.\n\t\t\"We are in dire needs of funds. We will have high taxes.\"\n\t\t*set tax 30\n\t\t*set peasants -5\n\t\t*set merchants -2\n\t\t*set farmers -1\n\t\t*goto start\n\t#Medium taxes.\n\t\t\"We will have a medium tax rate.\"\n\t\t*set tax 20\n\t\t*goto start\n\t#Low taxes.\n\t\t\"We will have low taxes.\"\n\t\t*set tax 10\n\t\t*set peasants +5\n\t\t*set merchants +5\n\t\t*set farmers +1\n\t\t*goto start\n\t#No taxes.\n\t\t\"We need to get as many people as we can to join our villages. I will temporarily suspend taxes.\"\n\t\t*set peasants +15\n\t\t*set merchants +10\n\t\t*set farmers +5\n\t\t*set tax 0\n\t\t*goto start\n\t\t\n*label start\nA guard walks in. \"Lord ${name}, we have a peasant wanting to speak to you. He says he speaks for a group of peasants that live on the outskirts of town.\"\n*choice\n\t#\"Send him in.\"\n\t\tA peasant walks in and respectfully bows his head.\n\n\t\t\"My liege, during the barbarian attack, my village took the brunt of the damage. Several of our buildings were destroyed, including the mill where we kept our surplus of food. If we don't do something soon, we'll have a food shortage on our hands. I know some of the farms closer to the castle were not affected. Could you order them to help us?\"\n\t\t*choice\n\t\t\t*selectable_if (farmers > 14) #\"I'll ask the other farmers to give your village a portion of their yield.\" (Requires 15 Farmers)\n\t\t\t\tThe peasant looks overjoyed. \"Thank you, Lord ${name}. I know some of the farmers may not like it, but our village will be very grateful.\"\n\t\t\t\t*set farmers -12\n\t\t\t\t*set rule +1\n\t\t\t\t\n\t\t\t\t(Farmer's Morale Decreased Moderately)\n\t\t\t\t\n\t\t\t\t(Peasant's Morale Increased Greatly)\n\t\t\t\t*set peasants +10\n\t\t\t\t*set light +10\n\t\t\t\t*page_break\n\t\t\t\t*goto war\n\t\t\t#\"The survivors can join my army as militia.\"\n\t\t\t\tThe peasant thinks for a moment. \"That is an option…but I'm not sure if everyone will want to do that. What will happen to the peasants that refuse to join?\"\n\t\t\t\t*choice\t\n\t\t\t\t\t#\"They will have to support themselves.\"\n\t\t\t\t\t\tThe peasant looks disappointed. \"Very well, then…\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t(Peasant Morale Decreased Moderately)\n\t\t\t\t\t\t\n\t\t\t\t\t\t(Militia Numbers Increased Moderately)\n\t\t\t\t\t\t*set peasants -10\n\t\t\t\t\t\t*set militia +10\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto war\n\t\t\t\t\t\t\n\t\t\t\t\t*selectable_if (gold > 99) #\"I will try to find them other work.\" (100 GP)\n\t\t\t\t\t\tThe peasant looks somewhat relieved. He leaves to tell his fellow villagers.\n\n\t\t\t\t\t\t(Militia Numbers Increased Moderately)\n\n\t\t\t\t\t\t(Peasant Morale Decreased Slightly)\n\t\t\t\t\t\t*set light +5\n\t\t\t\t\t\t*set militia +5\n\t\t\t\t\t\t*set peasants -5\n\t\t\t\t\t\t*goto war\n\t\t\t\t\t#\"They join, or they can starve.\"\n\t\t\t\t\t\tThe peasant looks disappointed. \"Very well, then…\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t(Peasant Morale Decreased Greatly)\n\n\t\t\t\t\t\t(Militia Numbers Increased Greatly)\n\t\t\t\t\t\t*set peasants -20\n\t\t\t\t\t\t*set militia +20\n\t\t\t\t\t\t*set rule -1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto war\n\t\t\t*selectable_if (gold > 199) #\"I'll purchase food from the merchants to supply to your village.\" (200 GP)\n\t\t\t\t\"Thank you, my liege!\"\n\t\t\t\t\n\t\t\t\t(Peasant Morale Increased Slightly)\n\t\t\t\t*set gold -200\n\t\t\t\t*set light +10\n\t\t\t\t*set dark -5\n\t\t\t\t*set peasants +5\n\t\t\t\t*set rule +1\n\t\t\t\t*page_break\n\t\t\t\t*goto war\n\t\t\t#\"I'm sorry, there's little I can do…\"\n\t\t\t\t*set peasants -5\n\t\t\t\t*set rule -1\n\t\t\t\tThe peasant looks disappointed. \"Very well, then…\"\n\t\t\t\t\n\t\t\t\t(Peasant Morale Decreased Slightly)\n\t\t\t\t*page_break\n\t\t\t\t*goto war\n\t#\"What does he want?\"\n\t\tThe guard responds, \"Apparently, his village was attacked by barbarians, and the surrounding farms were burned.\"\n\t\t*page_break\n\t\t*goto start\n\t#\"Send him away.\"\n\t\tThe guard tells the peasant leader to go away. \n\t\t*set peasants -1\n\t\t*page_break\n\t\t*goto war\n\t\t\n*label war\t\n*if advisor > 0\n\t\t*goto war_advisor\n\t\t\n\n*label war_advisor\n\nA guard walks in. \"Lord ${name}, your new advisor has arrived.\"\n\nLet's see what the new advisor has to say about your current situation. \n*page_break\n\n*if advisor = 1\n\t*goto varys\n\n*if advisor = 2\n\t*goto gothica\n\n*if advisor = 3\n\t*goto fespar\n\n*if advisor = 4\n\t*goto brander\n\n*label varys\nThe old General walks in.\n\n\"Hello, my liege. I appreciate you sending for me to hear my advice. I think I can help you with this current dilemma. I have fought in many wars, and I am well versed in matters related to war…that is, if you choose to go down that path.\n\n\"We should take our numbers into account, then mobilize an army…perhaps even a militia. We should also send out a scouting party to find out their troop strength. I've dealt with their kind before, there's little negotiating with them. I think our best bet is to fight them.\"\n*page_break\n*goto decision\n*label gothica\n\nA tall female warrior walks in holding a massive sword in her hand. \"Hello, ${name}. I heard barbarians have attacked your castle. They are animals; all they know is slaughter and blood. We should destroy them and make sure nothing like this ever happens again. Give me some troops, and I will see to their destruction myself.\"\n*page_break\n*goto decision\n*label fespar\n\nA middle-aged woman with long hair walks in. \"Hello, my liege. My name is Lady Fespar. I heard what happened with the barbarians. Raiding parties like these are not uncommon during this time of year. Galmencia is currently undergoing a food shortage, so some of its citizens have formed small armies to raid the other provinces. The one that attacked you is well known in the region. To attack them would only cause further bloodshed; I think we should negotiate with them and try to find peaceful terms.\"\n*page_break\n*goto decision\n*label brander\t\n\nThe rogue walks in and casually leans against your war table. \"Hello there, I hear you have a barbarian problem. They aren't much different from the rebels I fought in the Northern Province. They're nothing more than bandits and not well organized. If we sneak into their main camp, we can attack them by surprise, maybe even take out their leader. It would do great damage to them, causing discourse among their ranks. I wouldn't need too many men. Just a good group of veteran warriors.\"\n*page_break\n*goto decision\n\n*label decision\nWhat should you do?\n*choice\n\t#Mobilize for war.\n\t\tWe shall mobilize for war…\n\t\t*page_break\n\t\t*goto mobilize\n\t*selectable_if (diplomacy > 1) #Negotiate with the barbarian leader. (Requires Diplomacy)\n\t\t\"Very well, we shall negotiate with them…how would you like us to proceed?\"\n\t\t*choice\n\t\t\t#\"We shall request they come here for the talks.\"\n\t\t\t\t\"Very well…\"\n\t\t\t\t*set location 1\n\t\t\t\t*set barbarian_diplomacy -1\n\t\t\t\t\n\t\t\t\t\"Should we place guards near you during the talks?\"\n\t\t\t\t*choice\n\t\t\t\t\t#\"Yes.\"\n\t\t\t\t\t\t\"Very well…\"\n\t\t\t\t\t\t*set barbarian_diplomacy -1\n\t\t\t\t\t\t*set with_guard 1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto diplomat\n\t\t\t\t\t#\"No.\"\n\t\t\t\t\t\t*set barbarian_diplomacy +1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto diplomat\n\t\t\t#\"We shall request a neutral location for the talks.\"\n\t\t\t\t\"Very well…\"\n\t\t\t\t*set location 2\n\t\t\t\t\n\t\t\t\t\"Should we bring guards with us?\"\n\t\t\t\t*choice\n\t\t\t\t\t#\"Yes.\"\n\t\t\t\t\t\t\"Very well…\"\n\t\t\t\t\t\t*set barbarian_diplomacy -1\n\t\t\t\t\t\t*set with_guard 1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto diplomat\n\t\t\t\t\t#\"No.\"\n\t\t\t\t\t\t*set barbarian_diplomacy +1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto diplomat\n\t\t\t#\"We shall go to a place of their choosing for the talks.\"\n\t\t\t\t\"Very well…\"\n\t\t\t\t*set location 3\n\t\t\t\t\n\t\t\t\t\"Should we bring guards with us?\"\n\t\t\t\t*choice\n\t\t\t\t\t#\"Yes.\"\n\t\t\t\t\t\t*set barbarian_diplomacy +1\n\t\t\t\t\t\t*set with_guard 1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto diplomat\n\t\t\t\t\t#\"No.\"\n\t\t\t\t\t\t*set barbarian_diplomacy -1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto diplomat\n\t*selectable_if (stealth > 1) #Sneak-attack the barbarian camp. (Requires Stealth)\n\t\t\"A bold move. If you're successful, you should be able to cause enough chaos within their ranks to easily dispatch them.\"\n\t\t*page_break\n\t\t*label stealth_setup\n\t\tYour advisor feels ten well-trained warriors should be enough to sneak behind enemy lines with you, but no more or they could be spotted.\n\t\t\n\t\tWho do you take with you? (You can select a single unit multiple times.)\n\t\t\n\t\tYour unit comprises of:\n\t\t\n\t\t\n\t\t${stealth_guard} Men at Arms\n\t\t${stealth_archer} Archers\n\t\t${stealth_thief} Thieves\n\t\t${stealth_assassin} Assassins\n\t\t${stealth_magician} Magicians\n\t\t${stealth_other} Trained Peasants or Militiamen\n\t\t\n\t\t\n\t\tSlots full:\n\t\t\n\t\t${stealth_army} / 10\n\t\t*if stealth_army > 9\n\t\t\tYour advisor hands you some equipment. You receive:\n\t\t\t\t\n\t\t\t- Leather Armor\n\t\t\t- 1 Crossbow\n\t\t\t- 5 Crossbow Bolts\n\t\t\t- 1 Dagger\n\t\t\t*page_break\n\t\t\t*goto sneak_attack\n\t\t\t\n\t\t*choice\n\t\t\t*if stealth_army \u003c 11\n\t\t\t\t*selectable_if (Guards > 0) #Bring along a man at arms. (Requires 1 Guard)\n\t\t\t\t\t*set guards -1\n\t\t\t\t\t*set stealth_guard +1\n\t\t\t\t\t*set stealth_army +1\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto stealth_setup\n\t\t\t*selectable_if (Archers > 0) #Bring along an archer. (Requires 1 Archer)\n\t\t\t\t*set archers -1\n\t\t\t\t*set stealth_archer +1\n\t\t\t\t*set stealth_army +1\n\t\t\t\t*page_break\n\t\t\t\t*goto stealth_setup\n\t\t\t*selectable_if (Magicians > 0) #Bring along a magician. (Requires 1 Magician)\n\t\t\t\t*set magicians -1\n\t\t\t\t*set stealth_magician +1\n\t\t\t\t*set stealth_army +1\n\t\t\t\t*page_break\n\t\t\t\t*goto stealth_setup\n\t\t\t*if gold > 99\n\t\t\t\t*selectable_if (Thieves > 0) #Bribe a thief to join me. (Requires 1 Thief and 100 GP)\n\t\t\t\t\tYou manage to convince a thief to join you.\n\t\t\t\t\t*set thieves -1\n\t\t\t\t\t*set stealth_guard +1\n\t\t\t\t\t*set stealth_army +1\n\t\t\t\t\t*set gold -100\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto stealth_setup\n\t\t\t*selectable_if (Gold > 299) #Hire an assassin. (300 GP)\n\t\t\t\tYou hire an assassin.\n\t\t\t\t*set stealth_assassin +1\n\t\t\t\t*set stealth_army +1\n\t\t\t\t*set gold -300\n\t\t\t\t*page_break\n\t\t\t\t*goto stealth_setup\n\t\t\t*selectable_if (Militia > 1) #Bring along a unit from the militia.\n\t\t\t\t\t*set stealth_other +1\n\t\t\t\t\t*set stealth_army +1\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto stealth_setup\n\t\t\t*selectable_if (Peasant > 1) #Bring along a peasant.\n\t\t\t\t\t*set stealth_other +1\n\t\t\t\t\t*set stealth_army +1\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto stealth_setup\n\t\t\t\t\n\t\t\t#That's enough for now.\n\t\t\t\tYour advisor hands you some equipment. You receive:\n\t\t\t\t\n\t\t\t\t- Leather Armor\n\t\t\t\t- 1 Crossbow\n\t\t\t\t- 5 Crossbow Bolts\n\t\t\t\t- 1 Dagger\n\t\t\t\t*page_break\n\t\t\t\t*if health \u003c 0\n\t\t\t\t\t*set health 1\n\t\t\t\t*goto resting\n\n\t#Do nothing…for now.\n\t\tThe barbarian raids continue, and many peasants leave your territory as a result. \n\t\t*set peasants -20\n\t\t*set merchants 0\n\t\t*set farmers 0\n\t\t*set rule -2\n\t\t\n*label resting\n*if difficulty = 3\n\t*goto sneak_attack\nYour advisor suggests that maybe you should get some rest before proceeding with the sneak attack.\n\nYour Health is ${health}.\n\nWhat do you say?\n*choice\n\t#\"I could use some rest.\"\n\t\t*set rule -1\n\t\tYou decide to rest for a few hours.\n\t\t*if health > 59\n\t\t\t*set health 100\n\t\t*if health \u003c 50\n\t\t\t*set health +30\n\t\t*page_break\n\t\t*goto sneak_attack\n\t#\"There isn't any time to waste, we must go now.\"\n\t\t*set rule +1\n\t\t*set peasants +2\n\t\t*page_break\n\t\t*goto sneak_attack\n\n\n*label sneak_attack\t\nYou and your small group of troops head out to the barbarian camp…\n*page_break\nYou arrive at the barbarian camp a little after midnight. \n*page_break\n*label new1\nYour troops gather around you, waiting for your command.\n*choice\n\t*disable_reuse *selectable_if (leadership > 2) #Send someone to scout up ahead.\n\t\tYou send a unit to scout the area. He returns. \"I spotted at least five guards. One in a tower, two at the front entrance, one at the back entrance, and one patrolling the camp.\"\n\t\t*page_break\n\t\t*goto new1\n\t#Scout ahead myself.\n\t\tYou slowly make your way through the enemy lines and find a good vantage point to watch from.\n\t\t\n\t\t*set hiddenwall 1\n\t\t*page_break\n\t\tYou spot at least five guards outside, two guarding the main entrance, one guarding the rear entrance, one in a watchtower, and one patrolling the walls.\n\t\t\t\n\t\tYou notice a large crack in one section of the wall…with the proper amount of Strength, you might be able to break it and crawl through it.\n\t\t*choice\n\t\t\t#Run up to the cracked wall.\n\t\t\t\tYou decide to boldly run up to the wall yourself. \n\t\t\t\t*page_break\n\t\t\t\tYou run towards the wall, hoping you aren't spotted…\n\n\t\t\t\t*if stealth > 1\n\t\t\t\t\tAs you get closer, you notice that the wall is made of wood and appears very old. It looks like an animal might have dug a hole under the wall and pushed up against the wood to crack it a bit.\n\t\t\t\t\t*set hiddenwall 1\t\t\t\t\t\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto wall\n\t\t\t\tYou run straight into a guard. You both fall over and look at each other. The guard starts to get up and pull out his sword. \n\t\t\t\t*choice\n\t\t\t\t\t#Stab him with my dagger.\n\t\t\t\t\t\t*if strength > 2\n\t\t\t\t\t\t\tYou manage to pull out your dagger before he gets his sword out, and you lunge at the guard. You stab him deep in the chest, killing him.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto wall\n\n\t\t\t\t\t\tYou manage to pull your dagger out before he gets his sword out. You lunge at the guard and aim for his chest…\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tThe guard is wearing plate armor, which causes your dagger to brush off of it. He takes out his sword and slashes across your chest. You can feel the cut is deep. The guard raises his sword again, but this time you're ready, and you thrust the dagger into a weak point in his armor. The guard falls over, dead.\n\t\t\t\t\t\t*set health -25\n\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if health > 0\n\t\t\t\t\t\t\tYour Health is ${health}.\n\t\t\t\t\t\t*if health \u003c 1\n\t\t\t\t\t\t\tYou look at your wound and realize that you've taken too much damage. You fall to the ground and breathe your last breath.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto wall\n\t\t\t\t\t#Take out my crossbow and shoot him.\n\t\t\t\t\t\tYou take out your crossbow…\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tYou feel the sudden pain of a sword sticking through your arm, but you manage to fire the crossbow into the guard's chest. He falls over, dead.\n\t\t\t\t\t\t*set health -50\n\t\t\t\t\t\t*set bolts -1\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if health > 0\n\t\t\t\t\t\t\tYour Health is ${health}.\n\t\t\t\t\t\t*if health \u003c 1\n\t\t\t\t\t\t\tYou realize that you've taken too much damage. You fall to the ground and breathe your last breath.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto wall\n\t\t\t#Return to my troops.\n\t\t\t\tYou return back to your troops.\n\t\t\t\t*page_break\n\t\t\t\t*goto new1\n\t#Move silently toward the enemy camp.\n\t\tYour troops move toward the enemy camp…\n\t\t*page_break\n\t\tThe enemy camp is in front of you, but it's too dark to see much. \n\t\t\n\t\tWhat do you do?\n\t\t*choice\n\t\t\t#Silently walk toward the main entrance.\n\t\t\t\tYou see two guards.\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (archers > 1) #Have my archers fire simultaneously at both guards, taking them out. (Requires At Least 2 Archers)\n\t\t\t\t\t\t*if archers > 2\n\t\t\t\t\t\t\tThe first archer fires and hits the guard in the throat, killing him. The second archer misses, but a third archer takes down the guard before he can sound the alarm.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto wall2\n\t\t\t\t\t\tThe first archer fires and hits the guard in the throat, killing him, but the second archer misses. The guard charges, and the second archer ends up getting impaled by the guard's spear. The first archer takes a second shot and kills the guard.\n\t\t\t\t\t\t*set stealth_archer -1\n\t\t\t\t\t\t*set stealth_army -1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto wall2\n\t\t\t\t\t*selectable_if (stealth_assassin > 0) #Send in an assassin. (Requires 1 Assassin)\n\t\t\t\t\t\tThe assassin kills the first guard by shooting a hand crossbow bolt into his throat; before the second guard has chance to move, he throws a dagger, hitting the guard in the leg and making him kneel. The guard cries out in pain. The assassin flips over the kneeling guard and is now behind him. He takes out a second dagger and slices his throat.\n\n\t\t\t\t\t\tThe assassin smiles and walks back, when suddenly a third guard, who must have heard the commotion while on patrol, attacks the assassin from behind with his spear. The assassin turns around, and the guard runs the spear through the assassin's chest. Blood spills out of the assassin's mouth. Rather than fall, the assassin pulls the spear in closer, then takes a dagger out and stabs the guard in the throat. Both men fall over, dead.\n\t\t\t\t\t\t*set stealth_assassin -1\n\t\t\t\t\t\t*set stealth_army -1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto wall2\n\t\t\t\t\t*selectable_if (stealth_assassin > 1) #Send in multiple assassins. (Requires 2 Assassins)\n\t\t\t\t\t\tOne of the assassins whistles, causing both guards to look in one direction. The other assassin gets behind the first guard and slices his throat. The second guard turns with his spear, ready to avenge his fallen friend, but he's suddenly grabbed from behind by the other assassin, who covers his mouth and thrusts a short sword into him from behind. The assassins dispatched both guards with no casualties of their own.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto wall2\n\t\t\t\t\t#Have my men attack one while I handle the other.\n\t\t\t\t\t\tYour men manage to surprise the guard and only take a single casuality. You're able to defeat the other guard, though he manages to wound you a little.\n\t\t\t\t\t\t*set health -10\n\t\t\t\t\t\t*if health \u003c 1\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\tYou notice that the wound has hit a major artery. You have sustained too much damage. You fall to the ground and breathe your last breath.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t*set stealth_army -1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto wall2\n\t\t\t\t\t#Have my men charge at the guards.\n\t\t\t\t\t\tA couple of your men get injured, but you manage to overpower the enemy guards. \n\t\t\t\t\t\t*set stealth_army -2\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto wall2\n\t\t\t\t\t#Charge the guards myself.\n\t\t\t\t\t\tYou decide to charge the guards yourself.\n\t\t\t\t\t\t*if strength > 2\n\t\t\t\t\t\t\tYou manage to kill both guards with only minor injuries.\n\t\t\t\t\t\t\t*set health -5\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto wall2\n\t\t\t\t\t\tYou take out both guards but receive heavy wounds in the process. \n\t\t\t\t\t\t*set health -20\n\t\t\t\t\t\t*if health \u003c 1\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\tYou've taken too much damage. You fall to the ground and breathe your last breath. \n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto wall2\n\t\t\t#Silently walk around to the back of the camp.\n\t\t\t\t*if stealth \u003c 3\n\t\t\t\t\tYou're spotted by the guard patrolling the grounds. \n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Take him down myself.\n\t\t\t\t\t\t\tHow do you proceed?\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Pull out my dagger and stab him.\n\t\t\t\t\t\t\t\t\t*if agility > 2\n\t\t\t\t\t\t\t\t\t\tYou manage to kill him silently. \n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto guard_sleeping\n\t\t\t\t\t\t\t\t\tYou manage to kill the guard, but not before taking some minor wounds. \n\t\t\t\t\t\t\t\t\t*set health -10\n\t\t\t\t\t\t\t\t\t*if health \u003c 0\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\tIt turns out that the wounds aren't so minor, after all. You begin to bleed profusely and start to grow faint. You fall to the ground and breathe your last breath.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t*goto guard_sleeping\n\t\t\t\t\t\t\t\t*selectable_if (bolts \t*page_break\n\t*goto_scene death\nYou're now inside the barbarian walls. Your men seem to be watching the perimeter. \n*choice\n\t#Continue alone.\n\t\tYou continue on alone and see what appears to be the main leader's tent.\n\t\t*label new7\n\t\t*choice\n\t\t\t#Go inside.\n\t\t\t\tYou get your dagger ready and go inside…\n\t\t\t\t*page_break\n\t\t\t\tYou walk in and see…\n\t\t\t\t*page_break\n\t\t\t\tNothing. It's empty. The enemy commander is not here.\n\t\t\t\t*choice\n\t\t\t\t\t#Leave the tent.\n\t\t\t\t\t\tYou decide to leave the tent.\n\n\t\t\t\t\t\tYou run head first into the enemy commander. He pulls out his sword, ready to fight you. \n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto stealth_fight\n\t\t\t\t\t#Hide and wait.\n\t\t\t\t\t\tWhere should you hide?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#In the armoire.\n\t\t\t\t\t\t\t\tYou hide in the armoire. Soon, you see the enemy commander walk in with a female companion.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Attack him by surprise.\n\t\t\t\t\t\t\t\t\t\tYou take out your dagger and open the armoire. You suddenly charge at him with full force. The woman with him is in your way…\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Kill her with my dagger.\n\t\t\t\t\t\t\t\t\t\t\t\tYou stab her, and the enemy commander looks horrified. You then attack the enemy commander; the first blow hits him, but he regains his composure and pulls out his sword before you can hit him again.\n\t\t\t\t\t\t\t\t\t\t\t\t*set stealth_boss -20\n\t\t\t\t\t\t\t\t\t\t\t\t*set dark +20\n\t\t\t\t\t\t\t\t\t\t\t\t*set light -5\n\t\t\t\t\t\t\t\t\t\t\t\t*goto stealth_fight\n\t\t\t\t\t\t\t\t\t\t\t#Push her out of the way.\n\t\t\t\t\t\t\t\t\t\t\t\t*set light +2\n\t\t\t\t\t\t\t\t\t\t\t\tYou push the woman out of the way, but the enemy commander has enough time to pull out his large sword. \n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t*goto stealth_fight\n\t\t\t\t\t\t\t\t\t#Wait.\n\t\t\t\t\t\t\t\t\t\tThe woman starts arguing with the enemy commander. You try to listen to their conversation, but it's difficult to hear from inside the armoire. You get the sense that she's upset about something he did.\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Attack while he's distracted.\n\t\t\t\t\t\t\t\t\t\t\t\tYou bust out of the armoire and lunge at the enemy commander, slashing him across his chest with your dagger. \n\t\t\t\t\t\t\t\t\t\t\t\t*set stealth_boss -20\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Grab the woman.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set dark +10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou grab the woman and put the dagger to her throat.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe enemy commander looks horrified and begins to reach for his sword.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Threaten to kill her.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set dark +10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe commander lifts his arms in surrender and says, \"Please do not hurt her. Kill me if you must, but not her.\" \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Kill him.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou go to attack him, but the woman struggles and makes you lose your balance, then she tries to grab your dagger.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Kill her.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou kill the woman with your dagger. The enemy commander screams and runs up to attack you. You're caught off guard, and he slashes viciously at you, causing damage.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set dark 20\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set light -10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set health -20\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if health \u003c 1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou've taken too much damage. You fall to the ground and breat goto_scene death\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Get ready to attack whoever walks in.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe enemy commander walks in, and you surprise-attack him. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set health +10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto stealth_fight\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Wait.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe woman walks over to the armoire and opens it. She attempts to find a particular dress, but instead finds you. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Stab her.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou stab her, and she screams in pain. The enemy commander runs in, sees what's happening, and attacks you. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set dark +10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set light -10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto stealth_fight\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Attempt to knock her out.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tShe manages to escape. The enemy commander runs in. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto stealth_fight\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Under the bed.\n\t\t\t\t\t\t\t\tUnfortunately, your feet stand out, and you hear a scream. The barbarian leader lifts up the bed and attacks you. \n\t\t\t\t\t\t\t\t*set health -10\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto stealth_fight\n\t\t\t\t\t\t\t#Hide in plain sight and concentrate really hard on being invisible. (Requires Stupidity)\n\t\t\t\t\t\t\t\tThe enemy commander walks in, sees you, and attacks…\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto stealth_fight\n\t\t\t*selectable_if (fireball > 0) #Cast a fire spell to catch the tent on fire.\n\t\t\t\tIt takes some time to cast the spell, but eventually the tent catches on fire. The fire spreads quickly. Soon, guards are running to put out the fire.\n\t\t\t\t*set fireball -1\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (bolts > 1) #Shoot at the guards with my crossbow.\n\t\t\t\t\t\tYou take two of them down with well-placed shots; however, by now the fire has spread so much that all the guards are aware of it. One of them spots you. \n\t\t\t\t\t\t*set bolts -2\n\t\t\t\t\t\t*set stealth_boss -20\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Run away.\n\t\t\t\t\t\t\t\tYou manage to slip away during the confusion.\n\n\t\t\t\t\t\t\t\tSuddenly, you see the enemy commander looking outside of a large tent…he must not have been in his own tent when you set it on fire.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\tThere are guards swarming the area now…if you're going to do something, you'd better do it quickly.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Fight the enemy commander.\n\t\t\t\t\t\t\t\t\t\tYou run after the enemy commander.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto stealth_fight\n\t\t\t\t\t\t\t\t\t#Retreat.\n\t\t\t\t\t\t\t\t\t\tYou retreat.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\tDue to the attempt on his life, the barbarian leader triples his guard, so it's unlikely you'll get another chance like this again; however, no one knows for sure who attempted to kill him. \n\t\t\t\t\t\t\t\t\t\t*set rule -4\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Raise forces and declare war.\n\t\t\t\t\t\t\t\t\t\t\t\tYou decide to declare war on the barbarian tribes.\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t*goto mobilize\n\t\t\t\t\t\t\t\t\t\t\t#Return home.\n\t\t\t\t\t\t\t\t\t\t\t\tThe barbarian raids continue, causing many of your people to flee.\n\t\t\t\t\t\t\t\t\t\t\t\t*set rule -4\n\t\t\t\t\t\t\t\t\t\t\t\t*set peasants -10\n\t\t\t\t\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t#Stand and fight.\n\t\t\t\t\t\t\t\tYou run up to fight, and you kill the guards, but not before taking wounds of your own. \n\t\t\t\t\t\t\t\t*set health -20\n\t\t\t\t\t\t\t\t*set stealth_boss -10\n\t\t\t\t\t\t\t\t*if health > 0\n\n\n\t\t\t\t\t\t\t\t\tYour Health is ${health}.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto stealth_fight\n\t\t\t\t\t#Slip away in the confusion.\n\t\t\t\t\t\tYou manage to slip away during the confusion. \n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Find a place to hide and watch.\n\t\t\t\t\t\t\t\tYou find a place to hide behind a barrel. The guards eventually put out the fire. They seem distraught, but suddenly one of them yells something, and the guards looks relived. Apparently, the enemy commander was not in his tent at the time of the fire. They move him to the main tent, which is now guarded by several men.\n\t\t\t\t\t\t\t\t*set stealth_boss +10\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Go after the enemy commander.\n\t\t\t\t\t\t\t\t\t\tYou run head first toward the barbarian leader…\n\t\t\t\t\t\t\t\t\t\t*goto stealth_fight\n\t\t\t\t\t\t\t\t\t#Flee.\n\t\t\t\t\t\t\t\t\t\tDue to the attempt on his life, the barbarian leader triples his guard, so it's unlikely you'll get another chance like this again; however, no one knows for sure who attempted to kill him. \n\t\t\t\t\t\t\t\t\t\t*set rule -4\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Raise forces and declare war.\n\t\t\t\t\t\t\t\t\t\t\t\tYou decide to declare war on the barbarian tribes.\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t*goto mobilize\n\t\t\t\t\t\t\t\t\t\t\t#Return home.\n\t\t\t\t\t\t\t\t\t\t\t\tThe barbarian raids continue, causing many of your people to flee.\n\t\t\t\t\t\t\t\t\t\t\t\t*set rule -4\n\t\t\t\t\t\t\t\t\t\t\t\t*set peasants -10\n\t\t\t\t\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t#Head to the large tent in the center of camp.\n\t\t\t\t\t\t\t\tYou walk in and see the enemy commander standing in front of you. He pulls out a large, spiked club.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto stealth_fight\n\t\t\t\t\t\t\t#Leave the camp.\n\t\t\t\t\t\t\t\tYou leave the camp, hoping you killed the commander…\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\tTurns out the commander wasn't in his tent when you set it on fire. \n\n\t\t\t\t\t\t\t\tDue to the attempt on his life, the barbarian leader triples his guard, so it's unlikely you'll get another chance like this again; however, no one knows for sure who attempted to kill him. \n\t\t\t\t\t\t\t\t*set rule -1\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Raise forces and declare war.\n\t\t\t\t\t\t\t\t\t\tYou decide to declare war on the barbarian tribes.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto mobilize\n\t\t\t\t\t\t\t\t\t#Return home.\n\t\t\t\t\t\t\t\t\t\tThe barbarian raids continue, causing many of your people to flee.\n\t\t\t\t\t\t\t\t\t\t*set rule -4\n\t\t\t\t\t\t\t\t\t\t*set peasants -10\n\t\t\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n*label stealth_fight\n*if health \u003c 0\n\tYou've taken too much damage. You fall to the ground and breathe your last breath. \n\t*page_break\n\t*goto_scene death\nYour Health is ${health}.\n\nThe barbarian leader taunts you to attack him.\n*choice\n\t#Charge him.\n\t\tHe trips you, and you fall to the ground. \n\t\t*set health -5\n\t\t*if health \u003c 0\n\t\t\n\t\t\tYou've taken too much damage. The barbarian leader kills you. \n\t\t\t*page_break\n\t\t\t*goto_scene death\n\t\tHe raises his weapon high to strike you…\n\t\t*page_break\n\t\t*if agility > 3\n\t\t\tSomehow, you manage to dodge his blow.\n\t\t\t*page_break\n\t\t\t*goto duel3\n\t\t\n\n\t\tHe hits you in the chest so hard that you think you hear one of your ribs crack.\n\t\t*set health -50\n\t\t*if health \u003c 0\n\t\t\n\t\t\tYou've taken too much damage. You fall to the ground and don't have enough Strength to get up. The barbarian leader kills you.\n\t\t\t*page_break\n\t\t\t*goto_scene death\n\t\t*page_break\t\n\t\t*goto duel3\n\t\t\t\t\t\n\t#Attack.\n\t\tHe blocks your blow, and your weapons are now locked together.\n\t\t*choice\n\t\t\t#Push him back.\n\t\t\t\t*if strength > 2\n\t\t\t\t\tYou push with all your might, and he moves back slightly, breaking the lock.\n\t\t\t\t\t*goto duel3\n\t\t\t\tYou try to push him back with all your might, but you're unable. He sidesteps and slashes at your side, giving you a deep cut. \n\t\t\t\t*set health - 25\n\t\t\t\t*if health \u003c 0\n\n\t\t\t\t\tYou've taken too much damage. You don't have enough strength to continue, and you breathe your last breath. \n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto_scene death\n\t\t\t\t*goto duel3\n\t\t\t#Attempt to overpower him.\n\t\t\t\t*if strength > 3\n\t\t\t\t\tSomehow, you manage to overpower him and knock him to the ground. He rolls back before you can strike him. \n\t\t\t\t\t*set boss2_health -10\n\t\t\t\t\t*goto duel3\n\t\t\t\tIt doesn't work, and he quickly overpowers you, throwing you down to the ground. He then hits you with his spiked club; the impact is so powerful that you think you hear one of your ribs crack.\n\t\t\t\t*set health -50\n\t\t\t\t*if health \u003c 0\n\n\t\t\t\t\tYou've taken too much damage. You don't have enough Strength to continue, and you breathe your last breath. \n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto_scene death\n\t\t\t\t*goto duel3\n\t\t\t#Kick him away.\n\t\t\t\t*if strength > 2\n\t\t\t\t\tYou successfully kick him away.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto duel3\n\n\t\t\t\tHe barely feels your blow, and he sidesteps and hits you hard with the side of his sword. You fall down. He laughs and gets ready to swing at you.\n\t\t\t\t*choice\n\t\t\t\t\t#Roll out of the way.\n\t\t\t\t\t\t*if agility > 2\n\t\t\t\t\t\t\tYou manage to dodge his blow, but just barely.\n\t\t\t\t\t\t\t*goto duel3\n\t\t\t\t\t\tHis attack lands and hits you hard on the head.\n\t\t\t\t\t\t*set health -50\n\t\t\t\t\t\t*if health \u003c 0\n\n\t\t\t\t\t\t\tYou've taken too much damage. You don't have enough Strength to continue, and you breathe your last breath. \n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto duel3\n\t\t\t\t\t\t\n\t\t\t\t\t#Block the attack.\n\t\t\t\t\t\t*if strength > 3\n\t\t\t\t\t\t\tSomehow, you manage to block the attack…\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto duel3\n\n\t\t\t\t\t\tHe hits you so hard that you almost drop your weapon. You see blood everywhere.\n\t\t\t\t\t\t*set health -75\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto duel3\n\t\t\t#Pull back.\n\t\t\t\t*if agility > 2\n\t\t\t\t\tYou pull back, he tries to lunge at you with his sword, but you jump back before he can hit you.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto duel3\n\t\t\t\tYou pull back, but he slashes at you and gives you a deep cut on your arm. \n\t\t\t\t*set health -25\n\t\t\t\t*page_break\n\t\t\t\t*goto duel3\n\t#Be defensive.\n\t\tHe continues to taunt you. \"Aww, look at the scared little lord…\"\n\n\t\tHe suddenly lunges at you with incredible speed.\n\t\t*page_break\n\t\t*if agility > 2\n\t\t\tYou manage to parry his blow…he's incredibly fast.\n\t\t\t*page_break\n\t\t\t*goto duel3\n\n\t\tYou're unable to avoid his blow, and he hits you hard.\n\t\t*set health -25\n\t\t*page_break\n\t\t*goto duel3\n\t\t\t\n\n\n*label duel3\n*if health \u003c 0\n\n\tYou've taken too much damage. You stumble around, trying to fight the barbarian leader. Eventually, he disarms you, breaking one of your arms in the process. You don't have enough Strength to continue. You hear the barbarian laugh as you lose consciousness.\n\t*page_break\n\t*goto_scene death\nHe laughs and gets ready to attack.\n\n*choice\n\t#Continue fighting.\n\t\tThe fight continues. The match is one sided, as the barbarian is superior to you in both Strength and Agility. You begin to tire…\n\t\t*if health \u003c 20\n\n\t\t\tHe runs up and stabs you in the chest.\n\t\t\t*page_break\n\t\t\t*goto_scene death\n\t\t\t\n\t\t\t\n\t\tWhat do you do?\n\t\t*choice\n\t\t\t#Try to outsmart him.\n\t\t\t\t*if intelligence > 2\n\t\t\t\t\tYou see a moment when he leaves himself open. You attack, and he falls to the ground. You have bested him.\n\n\t\t\t\t\tThe barbarian leader groans. \"You piece of shit! Ugh…let me live, and I promise to not attack your lands again…\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Kill him.\n\t\t\t\t\t\t\tYou kill the barbarian leader. Having seen the leader dead, several barbarians run away.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\tSoon, a new barbarian leader emerges and marches an army to destroy your castle.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*set rule +1\n\t\t\t\t\t\t\t*goto mobilize\n\t\t\t\t\t\t#Let him live.\n\t\t\t\t\t\t\tYou let him live. He honors his side of the deal. \n\t\t\t\t\t\t\t*set rule +1\n\t\t\t\t\t\t\t*finish\n\n\t\t\t\tIt doesn't work. He defeats you. Before you can say anything, he takes out a dagger and holds it to your throat. \n\t\t\t\t\n\t\t\t\tDo you surrender?\n\t\t\t\t*choice\n\t\t\t\t\t#No.\n\t\t\t\t\t\tHe kills you.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t#Yes.\n\t\t\t\t\t\tHe takes you hostage. After some time passes, he discovers who you are. \"Let's see if your people would be willing to pay your ransom.\" \n\t\t\t\t\t\t\n\t\t\t\t\t\tHe hits you so hard that it knocks you out. The last thing you hear before you fall unconscious is him laughing.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tYou wake up in a dungeon in chains and spend several days there.\n\t\t\t\t\t\t*set rule -1\n\n\t\t\t\t\t\tSuddenly, the dungeon door opens…\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if rule > 0 \n\t\t\t\t\t\t\t\"Well, what do you know, your people decided to pay your ransom. It was a hefty price, too…you're lucky to have such loyal subjects.\"\n\t\t\t\t\t\t\t*set gold 0\n\t\t\t\t\t\t\t*set rule 0\n\t\t\t\t\t\t\t*set peasants -10\n\t\t\t\t\t\t\t*set farmers -5\n\t\t\t\t\t\t\t*set merchants -2\n\t\t\t\t\t\t\t*finish\n\n\t\t\t\t\t\tThe barbarian leader walks in. \"Sorry, Lord ${name}, your subjects weren't willing to pay your ransom. They already elected a new Lord to run Swamp Castle. You're of no further use to me.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\tHe smiles. \"Do you have anything to say before I end you?\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Beg for my life.\n\t\t\t\t\t\t\t\tHe laughs. \"Oh, not so noble now, are we? Fine, I won't end you…\"\n\n\t\t\t\t\t\t\t\tHe walks away, still laughing.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\tYou spend several years in the dungeon before you're finally released.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t\t#Remain silent.\n\t\t\t\t\t\t\t\t\"Oh, that's too bad, I was hoping to hear you beg for your life. Well, I guess this will have to do…\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tHe lifts up a sword and slashes down at you. The last thing you hear is him laughing.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto_scene death\n\t\t\t#Fight dirty.\n\t\t\t\t*if dark > 70\n\t\t\t\t\tYou do everything you can to overtake him. Hit him with low blows, use others as human shields. Eventually, you defeat him. \n\t\t\t\t\t*set dark +5\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Kill him.\n\t\t\t\t\t\t\tYou kill the barbarian leader. Having seen the leader dead, several barbarians run away. Having taken out their leader, you may have won.\n\n\t\t\t\t\t\t\tYou decide to leave…\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\tAll the barbarian raids stop.\n\t\t\t\t\t\t\t*set rule +1\n\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t#Let him live.\n\t\t\t\t\t\t\tYou let him live. He honors his side of the deal. \n\t\t\t\t\t\t\t*set rule +1\n\t\t\t\t\t\t\t*finish\n\n\t\t\t\tIt doesn't work. He defeats you. Before you can say anything, he takes out a dagger and ends you. \n\t\t\t\t*page_break\n\t\t\t\t*goto_scene death\n\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t#Continue to fight and don't give up.\n\t\t\t\t*if light > 70\n\t\t\t\t\tYou continue to fight, despite the fact that he's a superior fighter. He hits you again and again, but you keep getting up. Eventually, the barbarian grows tired.\n\t\t\t\t\t*page_break\n\t\t\t\t\tThe barbarian leader speaks. \"This is getting boring, beating you to a pulp like this…it's no fun. I'm impressed by your willingness
