power.\n", "choicescript_stats": "Below is a list of importatant information and statistics:\n\n*stat_chart\n  text name\n  text health\n  text leadership\n  text strength\n  text agility\n  text intelligence\n  text stealth\n  text merchants\n  text farmers\n  text peasants\n  text militia\n  text guards\n  text archers\n  text knights\n  text magicians\n  text druids \n  opposed_pair Light\n    Dark\n ", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements.\n\n  *purchase_discount adfree 2023-04-20 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements.", "day2": "*temp tax_increase 1\n*temp tax_increase2 1\n*temp food_increase 10\n\nAfter a long day, you go to your bedchamber and fall asleep.\n*page_break\nDay breaks, you look outside your castle window and see peasants moving around getting ready for the day. It dawns on you that the people you're looking at are your people and your responsibility.\n\nSuddenly, there's a knock on your door…\n*page_break\nWhat do you do?\n*choice\n\t#Open the door.\n\t\tYou open the door and see a servant standing outside. He tells you that you're being summoned to the great hall.\n\t\t*choice\n\t\t\t#Go to the great hall to find out what's happening.\n\t\t\t\tYou decide to walk to the great hall to see what's going on.\n\t\t\t\t*page_break\n\t\t\t\t*goto day2\n\t\t\t#\"I'm being summoned…who DARES to SUMMON me?\"\n\t\t\t\t*set dark +1\n\t\t\t\tThe servant seems to hesitate to respond. \"It…it's another Lord, sir. It appears he was sent by the King.\"\n\t\t\t\t*choice\n\t\t\t\t\t#Go see him right away.\n\t\t\t\t\t\tYou decide to walk to the great hall to see what's going on.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto day2\n\t\t\t\t\t#Make him wait.\n\t\t\t\t\t\tNo one summons me. They'll have to wait until I'm ready.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou wait a few minutes, then go down to the great hall.\n\t\t\t\t\t\t*set dark +1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto day2\n\t#Ask who it is.\n\t\t\"It is Larry, sir!\"\n\t\t*choice\n\t\t\t#Okay…open the door.\n\t\t\t\tYou open the door and see a servant standing outside. He tells you that you're being summoned to the great hall.\n\t\t\t\t*choice\n\t\t\t\t\t#\"Nice to meet you, Larry.\"\n\t\t\t\t\t\t*set light +1\n\t\t\t\t\t\tLarry beams. \"Thank you, Lord ${name}…\" He suddenly realizes that you have no idea who he is.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\"Oh, I am one of your servants from court! I'm here to advise you on various matters.\" \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\tRight now, you're being summoned. He begins to walk down the stairs, expecting you to follow.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Go to the great hall to find out what's happening.\n\t\t\t\t\t\t\t\tYou decide to walk to the great hall to see what's going on.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto day2\n\t\t\t\t\t\t\t#\"I am being summoned…who DARES to SUMMON me?\"\n\t\t\t\t\t\t\t\t*set dark +1\n\t\t\t\t\t\t\t\tThe servant stops. He turns around and says, \"It is another Lord, sir. It appears he was sent by the King.\"\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Go see him right away.\n\t\t\t\t\t\t\t\t\t\tYou decide to walk to the great hall to see what's going on.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto day2\n\t\t\t\t\t\t\t\t\t#Make him wait.\n\t\t\t\t\t\t\t\t\t\tNo one summons me. They'll have to wait until I'm ready.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tYou wait a few minutes, then go down to the great hall.\n\t\t\t\t\t\t\t\t\t\t*set dark +1\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto day2\n\t\t\t\t\t#\"When I ask you who you are, state your position and name, fool!\"\n\t\t\t\t\t\t*set dark +1\n\t\t\t\t\t\t\"I am a servant from court. You are being summoned…\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Go to the great hall to find out what's happening.\n\t\t\t\t\t\t\t\tYou decide to walk to the great hall to see what's going on.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto day2\n\t\t\t\t\t\t\t#\"I am being summoned…who DARES to SUMMON me?\"\n\t\t\t\t\t\t\t\t*set dark +1\n\t\t\t\t\t\t\t\t\"It is another Lord, sir. It appears he was sent by the King.\"\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Go see him right away.\n\t\t\t\t\t\t\t\t\t\tYou decide to walk to the great hall to see what's going on.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto day2\n\t\t\t\t\t\t\t\t\t#Make him wait.\n\t\t\t\t\t\t\t\t\t\tNo one summons me. They'll have to wait until I'm ready.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tYou wait a few minutes, then go down to the great hall.\n\t\t\t\t\t\t\t\t\t\t*set dark +1\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto day2\n\t\t\t#\"And…what do you want?\"\n\t\t\t\t\"Oh, I am one of your servants from court! I'm here to advise you on various matters. Right now, you're being summoned…\"\n\t\t\t\t*choice\n\t\t\t\t\t#Go to the great hall to find out what's happening.\n\t\t\t\t\t\tYou decide to walk to the great hall to see what's going on.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto day2\n\t\t\t\t\t#\"I am being summoned…who DARES to SUMMON me?\n\t\t\t\t\t\t*set dark +1\n\t\t\t\t\t\t\"It…is another Lord, sir. It appears he was sent by the King.\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Go see him right away.\n\t\t\t\t\t\t\t\tYou decide to walk to the great hall to see what's going on.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto day2\n\t\t\t\t\t\t\t#Make him wait.\n\t\t\t\t\t\t\t\tNo one summons me. They'll have to wait until I'm ready.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou wait a few minutes, then go down to the great hall.\n\t\t\t\t\t\t\t\t*set dark +1\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto day2\n\n*label day2\nYou walk down to the great hall. Waiting for you is a nobleman in a fine red robe. He appears to be holding a staff of some kind. You sit down, and he shows you a royal seal proving he was indeed sent from the King.\n\nHe tells you that he was sent to assess you and report back to the King. Your advisor whispers that this man is known as Gensa and is a powerful politician in the Kingdom. \n*choice\n\t#\"Okay…\"\n\t\tHe nods and says, \"By the way, my name is Gensa. It's a pleasure to meet you.\"\n\t\t*page_break\n\t\t*goto noble1\n\t#Tell him he is not needed.\n\t\t\"It doesn't work that way. I don't need your permission to be here. Now, shall we begin?\"\n\t\t*choice\n\t\t\t#\"Yes.\"\n\t\t\t\tHe responds, \"Thank you. Let us begin…\"\n\t\t\t\t*page_break\n\t\t\t\t*goto noble1\n\t\t\t#\"Yes, but refer to me as Lord ${name}.\"\n\t\t\t\tHe nods and says, \"And you can refer to me as Lord Gensa…your superior.\"\n\t\t\t\t*page_break\n\t\t\t\t*goto noble2\n\t\t\t#\"No. I require further answers from you before we start anything! You can't order me around in my own castle.\"\n\t\t\t\tYou await his response…\n\t\t\t\t*page_break\n\t\t\t\t*goto questions_1\n*label questions_1\n\"Very well, what would you like to know?\"\n*choice\n\t*hide_reuse #\"Who are you?\"\n\t\t\"My name is Gensa. I am a Lord in the same province as you, but unlike you, I have been ruling my fiefdom for several years.\"\n\t\t*page_break\n\t\t*goto questions_1\n\t*hide_reuse #\"What gives you the right to question me?\"\n\t\t\"You may not be aware of this, but I have been temporarily elected Governor of this province by the King. We have been without a Governor for several months now. As Governor, I have the right to inspect other Lords' castles and report anything I find concerning directly to the King.\"\n\t\t*page_break\n\t\t*goto questions_1\n\t#\"Nothing. Continue.\"\n\t\tHe continues…\n\t\t*page_break\n\t\t*goto noble2\n\t*selectable_if (noble = 1) #\"I know from my time in court that this is highly unusual.\" (Requires Nobility)\n\t\t\"Yes, it may be, ${name}, but I am here nonetheless. Now, shall we begin?\"\n\t\t*set rule +1\n\t\t*page_break\n\t\t*goto noble2\n*label noble1\n\nHe pulls out a parchment.\n*page_break\n*goto noble3\n\n*label noble2\n\nHe pulls out a patchment. \"Thank you. Now, as I was saying…I have been sent by the King to assess your castle.\"\n*choice\n\t#Interrupt him. \"It's only my second day!\"\n\t\t\"That's even more of a reason to be here to make sure you don't mess anything up, like the last owner of this castle did.\"\n\t\t*page_break\n\t\t*goto noble3\n\t#Remain silent.\n\t\t\"Let's begin…\"\n\t\t*page_break\n\t\t*goto noble3\n\t\t\n*label noble3\n\"How have you improved your fiefdom?\"\n*choice\n\t*disable_reuse *selectable_if (castle > 1) #\"I have started repairs on the castle's interior.\"\n\t\t\"Excellent. Anything else?\"\n\t\t*set rule +1\n\t\t*page_break\n\t\t*goto noble3\n\t*disable_reuse *selectable_if (defenses > 2) #\"I have begun to fortify the castle's outer walls.\"\n\t\t\"Excellent. Anything else?\"\n\t\t*set rule +1\n\t\t*page_break\n\t\t*goto noble3\n\t*disable_reuse *selectable_if (farmers_own_land > 0) #\"I have decided to let the farmers own the land they farm.\"\n\t\t\"What a stupid thing to do! Anything else?\"\n\t\t*set rule -1\n\t\t*page_break\n\t\t*goto noble3\n\t*disable_reuse *selectable_if (peasants > 35) #\"I have inspired the peasants.\"\n\t\t\"A jester could have done that. Anything else?\"\n\t\t*page_break\n\t\t*goto noble3\n\t*disable_reuse *selectable_if (merchants > 5) #\"I have inspired the merchants.\"\n\t\t\"Smart. Anything else?\"\n\t\t*set rule +1\n\t\t*page_break\n\t\t*goto noble3\n\t*disable_reuse *selectable_if (workers > 5) #\"I have hired additional workers to speed up repairs.\"\n\t\t\"Good. Anything else?\"\n\t\t*set rule +1\n\t\t*page_break\n\t\t*goto noble3\n\t*disable_reuse *selectable_if (guards > 10) #\"I have inspired the guards.\"\n\t\t\"Good. Anything else?\"\n\t\t*set rule +1\n\t\t*page_break\n\t\t*goto noble3\n\t*disable_reuse *selectable_if (bandits > 0) #\"I have discovered a bandit's lair.\"\n\t\t\"Interesting. Anything else?\"\n\t\t*set rule +1\n\t\t*page_break\n\t\t*goto noble3\n\t*disable_reuse *selectable_if (tax = 10) #\"I lowered taxes.\"\n\t\t\"Not what I would have done, but all right. Anything else?\"\n\t\t*page_break\n\t\t*goto noble3\n\t*disable_reuse *selectable_if (tax = 0) #\"I have temporarily suspended taxes.\"\n\t\t\"What an incredibly stupid thing to do! Anything else?\"\n\t\t*set rule -1\n\t\t*page_break\n\t\t*goto noble3\n\t*disable_reuse *selectable_if (tax > 20) #\"I have raised taxes.\"\n\t\t\"Not what I would have done, but all right. Anything else?\"\n\t\t*page_break\n\t\t*goto noble3\n\t*disable_reuse *selectable_if (gold > 499) #\"I have 500 Gold Pieces in the treasury.\"\n\t\t\"Good to see you haven't spent it all yet, but not really an accomplishment. Anything else?\"\n\t\t*page_break\n\t\t*goto noble3\n\t*disable_reuse *selectable_if (farmers_no_tax > 0) #\"I have temporarily suspended taxes for farmers.\"\n\t\t\"Not what I would have done, but all right. Anything else?\"\n\t\t*page_break\n\t\t*goto noble3\n\t*disable_reuse *selectable_if (druids > 0) #\"I have introduced myself to the Druids.\"\n\t\t\"Don't really care about that, but all right. Anything else?\"\n\t\t*page_break\n\t\t*goto noble3\n\t*disable_reuse *selectable_if (magicians > 0) #\"I am on good terms with the magicians in this land.\"\n\t\t\"Interesting. Anything else?\"\n\t\t*set rule +1\n\t\t*page_break\n\t\t*goto noble3\n\t*disable_reuse #\"I have hired a powerful warrior from the East.\" (Lie)\t\t\n\t\t\"Really, what's his name?\"\n\t\t*choice\n\t\t\t#\"Fred.\"\n\t\t\t\t\"Never heard of him. Anything else?\"\n\t\t\t\t*page_break\n\t\t\t\t*goto noble3\n\t\t\t*disable_reuse *selectable_if (dark > 54) #\"His tongue was cut out, so he couldn't tell me. I just call him Beast.\"\n\t\t\t\t\"Interesting. Anything else?\"\n\t\t\t\t*set dark +5\n\t\t\t\t*set rule +1\n\t\t\t\t*page_break\n\t\t\t\t*goto noble3\n\t\t\t#\"I'm not sure.\"\n\t\t\t\t\"I don't believe you then. Anything else?\"\n\t\t\t\t*page_break\n\t\t\t\t*goto noble3\n\t*disable_reuse *selectable_if (light > 52) #\"The people respect me.\"\n\t\t\"Interesting. Anything else?\"\n\t\t*set rule +1\n\t\t*page_break\n\t\t*goto noble3\n\t*disable_reuse *selectable_if (dark > 52) #\"The people fear me.\"\n\t\t\"Interesting. Anything else?\"\n\t\t*set rule +1\n\t\t*page_break\n\t\t*goto noble3\n\t#\"That's all I can think of right now.\"\n\t\t*if rule \u003c 4\n\t\t\t\"It sounds like you haven't done much at all,\" Gensa says in disgust. \"If I was Lord of this castle, I would have done much more than that.\"\n\t\t\t*choice\n\t\t\t\t#Try to think of other things I've done.\n\t\t\t\t\t\"Well…\" You try to think of something else to say.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto noble3\n\t\t\t\t#Explain to him that you've only been Lord of this castle for one day.\n\t\t\t\t\tGensa looks at you, annoyed. \"I think what a Lord does on his first day tells a lot about his ability to lead.\"\n\t\t\t\t\t\n\t\t\t\t\tHe writes something down.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto noble4\n\t\tHe writes something down.\n\t\t*page_break\n\t\t*goto noble4\n\t\t\n*label noble4\n\"I see court is about to begin, and you have visitors. Do you mind if I stay and watch you in action?\"\n*fake_choice\n\t#\"By all means.\"\n\t\tHe takes a seat.\n\t#\"If you must…\"\n\t\tHe mutters something, then takes a seat.\n*page_break\nThe next page will display the Kingdom summary screen. It will show some statistics about your fiefdom. \n\nSince this is your first time seeing it, would you be interested in a detailed explanation of it?\n*choice\n\t#Yes, I'll review the Kingdom Summary screen.\n\t\t*goto explanation\n\t#No, I'm sure I can figure it out.\n\t\t*goto kingdom\n\t\n*label explanation\nThe Kingdom summary shows how many people live in your domain and what resources you currently have.\n\nTo help you understand, here's some information regarding units:\n\n\nPeasants – Peasants are the backbone of your fiefdom. For every peasant, you earn a certain amount in taxes. The amount you gain depends on the level of taxes you set. They cannot be bought, and once you train them, they cannot return to being a peasant. Be careful to balance the number of peasants you have with your tax level. If you have too few peasants to tax or you decide to train them to the point that there are no peasants left to work simple jobs, your income could suffer greatly.\n\nMilitia – These are peasants that are trained for war. They aren't much more than your average peasant with a spear and some training in how to use it, but they can be effective in war, especially when numbers count. They cost 10 Gold and 1 Peasant to train.\n\nGuards – Guards protect your castle, but they can also be used in warfare as men of arms. They are well equipped and well trained. They cost 50 Gold and 1 Peasant to train.\n\nKnights – Knights are elite units who often inspire others in battle. They are extremely brave and one of the best fighting units available. They cost 100 Gold and 1 Peasant to train.\n\nMerchants – Merchants help keep the trade flowing within the Kingdom. Every merchant you have provides you with +1 Gold. You can also send merchants on special trade missions.  They cost 50 Gold and 1 Peasant to train.\n\nFarmers – Farmers provide the Kingdom with food. They're important for feeding your people. They cost 10 Gold and 1 Peasant to train. \n\nDruids – A mysterious group of people that are very in tune with nature. They can be sent on special assignments. They cannot be bought by Gold. \n\nMagicians – Magic users with extraordinary abilities. They can be useful for a variety of tasks. They cost 200 Gold and 1 Peasant to train.\n\nArchers - These are highly trained and highly specialized warriors that can be used to defend the walls of your castle. They cost 75 Gold and 1 Peasant to train.\n\nWorkers – Workers allow you to work on tasks that involve building or repairing. Five workers are needed for any one project. Having ten or more will allow you to work on multiple projects at the same time. Having a high amount of workers may also reduce the cost of certain projects and give you extra options when constructing something. They cost 50 Gold and 1 peasant to train.\n\n\nThieves – Thieves are peasants who have turned to stealing to make a living. Each thief takes away a small portion of Gold from your income. \n\nBandits – Bandits attack farmers and also rob peasants. Each bandit takes away a small portion of Gold and food from your Kingdom. \n\n\nOther important details:\n\nRule – This represents how strong your rule over your fiefdom is. If it gets too low, you may be overthrown. \n\nTreasury – This displays how much Gold you currently have in reserve. \n\nTax Rate (per peasant) - High taxes (30 GP), medium (20 GP), low (10 GP), and no taxes (0 GP). \nLower taxes encourage more people to join your villages. \n\n\nThere are other stats that are hidden but still important. Certain decisions will affect the game in various ways.\n\n\nIf any unit or stat drops below zero, there will be a deficit. Negative numbers will more than likely result in penalties, and in some instances may cause the game to end. So try your best not to be in the negative in any unit you consider to be important. It's also recommended to leave some Gold in the treasury. You never know when you might need it…\n\n*page_break\n*goto kingdom\n*label kingdom\nKingdom Summary\n\n*image castle-35216.png\n\nUnits:\n\n*if peasants > 0\n\t${peasants} Peasants\n\n*if peasants \u003c 1\n\tYou have no peasants to recruit units from!\n\n${militia} Militia\n\n${guards} Guards\n\n${knights} Knights\n\n${merchants} Merchants\n\n${farmers} Farmers\n\n${druids} Druids\n\n${magicians} Magicians\n\n${archers} Archers\n\n${workers} Workers\n\n${thieves} Thieves\n\n${bandits} Bandits\n\n\nOther Important Statistics:\n\n${rule} Rule\n\n*if rule > 3 \n\t(Rule is secure.)\n*if rule \u003c 4 \n\t(Rule is not secure.)\n\n${gold} Gold\n\n*if tax = 0\n\tNo Taxes\n\n\n*if tax = 10\n\tLow Taxes\n\n\t\n*if tax = 20\n\tMedium Taxes\t\n\n\t\n*if tax = 30\n\tHigh Taxes\t\n\n\t\n*choice\n\t*if (Gold > 9) and (peasants > 0) \n\t\t#Hire Militia. (10 GP)\n\t\t\t*set militia +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -10\n\t\t\t*goto kingdom\n\t*if (Gold > 99) and (peasants > 9) \n\t\t#Hire 10 Militia. (100 GP)\n\t\t\t*set militia +10\n\t\t\t*set peasants -10\n\t\t\t*set gold -100\n\t\t\t*goto kingdom\n\t*if (Gold > 49) and (peasants > 0)\n\t\t#Hire Guards. (50 GP)\n\t\t\t*set guards +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -50\n\t\t\t*goto kingdom\n\t*if (Gold > 249) and (peasants > 4)\n\t\t#Hire 5 Guards. (250 GP)\n\t\t\t*set guards +5\n\t\t\t*set peasants -5\n\t\t\t*set gold -50\n\t\t\t*goto kingdom\n\t*if (Gold > 99) and (peasants > 0) \n\t\t#Hire Knights. (100 GP)\n\t\t\t*set knights +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -100\n\t\t\t*goto kingdom\n\t*if (Gold > 49) and (peasants > 0) \n\t\t#Hire Merchants. (50 GP)\n\t\t\t*set merchants +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -50\n\t\t\t*goto kingdom\n\t*if (Gold > 9) and (peasants > 0) \n\t\t#Hire Farmers. (10 GP)\n\t\t\t*set farmers +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -10\n\t\t\t*goto kingdom\n\t*if (Gold > 99) and (peasants > 9) \n\t\t#Hire 10 Farmers. (100 GP)\n\t\t\t*set farmers +10\n\t\t\t*set peasants -10\n\t\t\t*set gold -100\n\t\t\t*goto kingdom\n\t*if (Gold > 199) and (peasants > 0) \n\t\t#Hire Magicians. (200 GP)\n\t\t\t*set magicians +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -200\n\t\t\t*goto kingdom\n\t*if (Gold > 74) and (peasants > 0) \n\t\t#Hire Archers. (75 GP)\n\t\t\t*set archers +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -75\n\t\t\t*goto kingdom\n\t*if (Gold > 374) and (peasants > 4) \n\t\t#Hire 5 Archers. (375 GP)\n\t\t\t*set archers +5\n\t\t\t*set peasants -5\n\t\t\t*set gold -375\n\t\t\t*goto kingdom\n\t*if (Gold > 24) and (peasants > 0) \n\t\t#Hire Workers. (25 GP)\n\t\t\t*set workers +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -25\n\t\t\t*goto kingdom\n\t*if (Gold > 124) and (peasants > 4) \n\t\t#Hire 5 Workers. (125 GP)\n\t\t\t*set workers +5\n\t\t\t*set peasants -5\n\t\t\t*set gold -125\n\t\t\t*goto kingdom\n\t#Done.\n\t\t*set tax_increase tax * peasants\n\t\t*set tax_increase2 * merchants\n\t\t*set gold +tax_increase\n\t\t*set gold +tax_increase2\n\t\tCompleted. New taxes collected.\n\t\t\n\t\t\n\t\tYou now have ${gold} Gold Pieces in the treasury. \n\t\t*page_break\n\t\t*goto taxes\n\t\t\n\n*label taxes\n*if day1 > 0\n\t*goto done\nWhat should the tax rate be?\n*choice\n\t#High taxes.\n\t\t\"We are in dire needs of funds. We will have high taxes.\"\n\t\t*set tax 30\n\t\t*set peasants -5\n\t\t*set merchants -2\n\t\t*set farmers -1\n\t\t*goto start\n\t#Medium taxes.\n\t\t\"We shall have medium taxes.\"\n\n\t\t*set tax 20\n\t\t*goto start\n\t#Low taxes.\n\t\t\"We will have low taxes.\"\n\t\t*set tax 10\n\t\t*set peasants +5\n\t\t*set merchants +5\n\t\t*set farmers +1\n\t\t*goto start\n\t#No taxes.\n\t\t\"We need to get as many people as we can to join our villages. I will temporarily suspend taxes.\"\n\t\t*set peasants +10\n\t\t*set merchants +10\n\t\t*set farmers +5\n\t\t*set tax 0\n\t\t*goto start\n\t\n*label start\nAs you finish reviewing your Kingdom's finances, a guard approaches you. \n*page_break\n\"Sir, we have a farmer who was unable to pay his tithes wanting to see you…normally, we wouldn’t bring such a trivial thing to your attention, but the farmer’s story is rather outrageous. We think he's lying, but he swears he is telling the truth.\"\n*label choice1\nDo you want to see him?\n*choice\n\t#\"Yes…let’s see what he has to say.\"\n\t\tThe guard leaves to get the farmer.\n\t\t*page_break\n\t\t*goto farmer2\n\t*disable_reuse #\"What makes you think he's lying?\"\n\t\t\"Sir, he's claiming something that cannot possibly be true. I don’t think it's worth your time.\"\n\t\t*page_break\n\t\t*goto choice1\n\t#\"No…I'm too busy for such trivial things.\"\n\t\tThe guard sends the farmer away.\n\t\t*goto bandit_start\n\n*label farmer2\t\t\nIn walks an old farmer. He bows before you awkwardly. \n\n\"My liege, nobody believes me, but the story I'm about to tell you is the truth! I was walking to my barn to feed my pigs like I do every morning, when suddenly before me was a giant…\"\n*page_break\n\"Dragon!\"\n\nSeveral guards laugh. \"I tell you sir, I have seen many things, but never a dragon before. Frankly, I was downright shocked a dragon would be outside my barn. I really wasn’t expecting it, so I ran as fast as I could to town, and I told the first guards I saw. No one wanted to believe me, but I finally convinced a couple guards to come back to my farm. When we arrived it was too late, the dragon had broken into my barn and eaten most of my pigs.\"\n\n\nHow do you respond?\n*choice\n\t#Ask him questions.\n\t\tYou decide to ask him some questions…\n\t\t*page_break\n\t\t*goto questions\n\t#This man is obviously lying, throw him in the dungeon.\n\t\t*set farmers -1\n\t\t*set dark +1\n\t\tThe guards do what they're told.\n\t\t*page_break\n\t\t*goto bandit_start\n\t#Send the farmer away.\n\t\t*set farmers -1\n\t\tThe guards do what they're told. \n\t\t*page_break\n\t\t*goto bandit_start\n\t\t\n*label questions\nYou decide to ask the farmer…\n*choice\n\t#\"You say it was a dragon…well, what exactly did it look like?\"\n\t\t\"Well, my liege…it had green, scaly skin, large claws, a thick tail, and it was massive in size. It had to be a dragon! I’ve never seen anything like it.\"\n\t\t*page_break\n\t\t*goto questions\n\t#\"What makes you think a Dragon would visit your farm in particular?\"\n\t\t\"That I do not know, my liege. Perhaps it saw how big my pigs were. Ask any farmer here, and they'll tell you I raise some mighty big ones. In fact, before today, I had the largest pig farm in the province. The farmland I take care of is mostly swampland, so I focus on raising animals rather than growing crops.\"\n\t\t*page_break\n\t\t*goto questions\n\t#\"You say the dragon ate your pigs, but you didn't actually see it. Is that correct?\"\n\t\t\"That's right, sir! I didn’t actually see the dragon eat my pigs, but when I returned, there was pig’s blood on the ground.\"\n\t\t*page_break\n\t\t*goto questions\n\t#I have no further questions.\n\t\tDo you believe him?\n\t\t*choice\n\t\t\t#Yes, I think he's telling the truth.\n\t\t\t\tThe farmer looks very relieved. \"Thank you, my liege, nobody believed me, and I mean NOBODY. They all think I’m just making it up. I just had to see you to explain what happened, as I won't be able to pay my tithes at the current moment.\"\n\t\t\t\t*page_break\n\t\t\t\t*goto chat1\n\t\t\t#No, he's lying.\n\t\t\t\tVery well…\n\t\t\t\t*goto chat2\n*label chat1\nHow do you resolve this?\n*choice\n\t#Let the farmer off the hook. There was nothing he could have done to prevent this. \n\t\t*set farmers +1\n\t\t*set rule -1\n\t\t*set guards -1\n\t\t*set light +1\n\t\tThe farmer looks relived, but some of the guards seem upset. \n\t\t*page_break\n\t\t*goto bandit_start\n\t#Send ten guards to investigate and hunt down the dragon. (Requires 10 Guards)\n\t\tYou send out a party of guards. They end up coming back a few hours later. It was no dragon, just a giant lizard, that’s all. Some of the guards feel upset they were sent on such a pointless quest, but at least the farmer looks happy.\n\t\t*set farmers +1\n\t\t*set guards -1\n\t\t*set light +1\n\t\t*page_break\n\t\t*goto bandit_start\n\t*selectable_if (druids > 0) #Send a Druid to find this so-called dragon. (Requires Druid)\n\t\t*set farmers +1\n\t\t*set light +1\n\t\tThe Druid returns with a giant lizard. \"My liege, I did not find a dragon, but I did find this giant lizard. It matches the description the farmer gave. What would you like me to do with it?\"\n\t\t\n\t\t*image varan-153478_1280.png\n\t\t\n\t\t*choice\n\t\t\t#\"Release it back into the wild, but far enough away that it won’t cause trouble.\"\n\t\t\t\tThe Druid looks quite pleased. \n\t\t\t\t*set light +1\n\t\t\t\t*set druids +1\n\t\t\t\t*page_break\n\t\t\t\t*goto bandit_start\n\t\t\t#\"Kill it. Time for a feast.\"\n\t\t\t\t*set druids -1\n\t\t\t\t*set farmers +1\n\t\t\t\t*set peasants +5\n\t\t\t\tYou have a huge feast and invite several people to come partake. The peasants and farmers look pleased, but the Druid does not. \n\t\t\t\t*page_break\n\t\t\t\t*goto bandit_start\n\t\t\t*selectable_if (gold > 99) #\"Train it.\" (100 GP) \n\t\t\t\tThe Druid begins to train it.\n\t\t\t\t*set gold -100\n\t\t\t\t*set guards +4\n\t\t\t\t*achieve dragontamer\n\t\t\t\t*page_break\n\t\t\t\t*goto bandit_start\n\t\t\t#\"I could care less what you do with it.\"\n\t\t\t\tThe Druid takes the giant lizard away.\n\t\t\t\t*page_break\n\t\t\t\t*goto bandit_start\n\t\t\t#Sell it for 200 GP.\n\t\t\t\tThe Druid looks displeased.\n\t\t\t\t*set gold +200\n\t\t\t\t*set druids -1\n\t\t\t\t*page_break\n\t\t\t\t*goto bandit_start\n\t*selectable_if (gold > 49) #Offer a 50 GP reward for anyone that brings me the head of this beast.\n\t\tIt turns into a great debacle. Hundreds of peasants bring you heads of all sorts of things. Most of them appear to be fake. Some even jest and make fun of you, dressing up as a dragon.\n\t\t*set rule -1\n\t\t*page_break\n\t\t*goto farmer1\n\t#\"On second thought, I don’t believe you.\"\n\t\tYour guards wait for your command.\n\t\t*page_break\n\t\t*goto chat2\n\t*selectable_if (gold > 99) #Hire a famous dragon hunter to take care of this. (100 GP)\n\t\tThe dragon hunter returns empty handed. \"Sorry, my liege, I couldn’t find any dragon.\"\n\t\t*set rule -1\n\t\t*choice\n\t\t\t#Demand a refund.\n\t\t\t\t\"No refunds, my liege.\"\n\t\t\t\t*choice\t\n\t\t\t\t\t#Fine.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto farmer1\n\t\t\t\t\t*selectable_if (diplomacy > 0) #Ask him to give half the gold back.\n\t\t\t\t\t\tHe gives you back 50 GP. \n\t\t\t\t\t\t*set gold +50\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto farmer1\n\t\t\t\t\t#Pay him extra to say he did find it.\n\t\t\t\t\t\t*set peasants +1\n\t\t\t\t\t\t*set farmers +1 \n\t\t\t\t\t\t*set dark +5\n\t\t\t\t\t\tAll right, if you insist…\n\t\t\t\t\t\t*goto farmer1\n*label farmer1\t\t\t\t\t\t\nWhat do you do with the farmer?\n*choice\n\t#Throw him in the dungeon!\n\t\tYour guards do as you say.\n\t\t*set farmers -1\n\t\t*page_break\n\t\t*goto bandit_start\n\t#Let him go.\n\t\tYour guards look displeased, but they follow your order.\n\t\t*set guards -1\n\t\t*page_break\n\t\t*goto bandit_start\n\t\n*label chat2\nHow do you resolve this?\n*choice\n\t#Let the farmer off with a warning, but tell him not to make up stories like this again.\n\t\tThe farmer looks displeased, but he leaves before you change your mind. \n\t\t*page_break\n\t\t*set light +1\n\t\t*page_break\n\t\t*goto bandit_start\n\t#Throw the farmer in the dungeon.\n\t\t*set farmers -1\n\t\t*set dark +1\n\t\tYour guards follow the order. \n\t\t*page_break\n\t\t*goto bandit_start\n\t#Fine the farmer. (Receive 10 GP)\n\t\t*set gold +10\n\t\t*set farmers -1\n\t\tThe guards follow your order.\n\t\t*page_break\n\t\t*goto bandit_start\n\t#On second thought, maybe I do believe him. \n\t\tYour guards await your command…\n\t\t*goto choice1\n\n\t\t\t\t\n*label bandit_start\nA guard walks in. \"Sir, one of our caravans was attacked by bandits. The raids have increased as of late; however, we have no idea where their headquarters are.\"\n\nWhat would you like to do?\n*choice\n\t*selectable_if (diplomacy > 0) #Negotiate with the bandits.\n\t\tYou negotiate with the bandits to stop the raids, and you won't pursue them, but you're not sure if they'll honor their part of the deal.\n\t\t*set bandits +2\n\t\t*page_break\n\t\t*goto thievesguild1\n\t*selectable_if (guards > 9) #Send guards to find out where the bandits call their home. (Requires 10 Guards)\n\t\t*set guards -5\n\t\tYour guards engage a group of bandits in the field. Your guards are well trained and defeat them, but there are still a couple casualties. Eventually, you find the bandits' HQ. The fight is vicious, and you lose more guards, but at least you've won the battle.\n\t\t*page_break\n\t\t*goto thievesguild1\n\t*selectable_if (knights > 0) #Send a knight to find the bandits' lair. \n\t\t\t\tYour knight finds the bandit's lair and returns to tell you of its location.\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (guards > 9) #Attack the bandits with my guards. (Requires 10 Guards)\n\t\t\t\t\t\tThe fight is vicious, and you lose a couple guards, but at least you win the battle.\n\t\t\t\t\t\t*set guards -2\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto thievesguild1\n\t\t\t\t\n\t\t\t\t\t*selectable_if (knights > 0) #Send my knight to defeat the bandits.\n\t\t\t\t\t\tYour knight fights valiantly and ends up defeating the bandits; however, his injuries are too great and he decides to retire, becoming a well-respected peasant.\n\t\t\t\t\t\t*set knights -1\n\t\t\t\t\t\t*set peasants +1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto thievesguild1\n\t\t\t\t\n\t#Do nothing.\n\t\t*set bandits +3\n\t\t*set rule -1\n\t\t*page_break\n\t\tThe bandit attacks on caravans continue…\n\t\t*page_break\n\t\t*goto thievesguild1\n\t*selectable_if (guards > 5) #Send guards with the trade caravans to protect them. (Requires 5 Guards)\n\t\tYou send guards to protect the caravans. For the most part, it works; however, a few bandit raids still continue.\n\t\t*set guards -5\n\t\t*set bandits +1\n\t\t*page_break\n\t\t*goto thievesguild1\n\t*selectable_if (gold > 499) #Hire adventurers to find and defeat the bandits. (500 GP)\n\t\tThe adventurers defeat the bandits. Songs are sung in their honor. \n\t\t*set gold -500\n\t\t*page_break\n\t\t*goto thievesguild1\n\t*selectable_if (bandit > 0) #Actually, I already know where the bandits' HQ is…\n\t\t*set rule +1\n\t\tWith this knowledge, you set up an attack on the Bandit HQ. They're caught by surprise and are defeated.\n\t\t*achieve bandit\n\t\t*page_break\n\t\t*goto thievesguild1\n\t\t\n*label thievesguild1\t\t\nNext, the guard speaks about thieves in the city and rumors of them forming a Thieves Guild.\n*choice\n\t*selectable_if (thievesguild > 0) #Actually, I might have some information useful in finding the Thieves Guild… \n\t\t*set rule +1\n\t\tYou tell your guards that you remember meeting a strange character at the tavern and have some details that could help you locate the Thieves Guild. \n\t\t\n\t\tAfter much searching, your guards end up finding the Thieves Guild, and they destroy it. \n\t\t*achieve thievesguild\n\t\t*page_break\n\t\t*goto cleric\n\t*selectable_if (gold > 499) #Hire adventurers to find and destroy the Thieves Guild. (500 GP)\n\t\tThe adventurers defeat the thieves. Songs are sung in their honor. \n\t\t*set gold -500\n\t\t*page_break\n\t\t*goto cleric\n\t*selectable_if (diplomacy > 1) #Negotiate with the Thieves Guild.\n\t\tYou negotiate with the Thieves Guild. They agree to limit their activities; however, the fact that you have given them an audience increases their influence.\n\t\t*set thieves +1\n\t\t*if gold > 99\n\t\t\t*set gold - 100\n\t\t*page_break\n\t\t*goto cleric\n\t*selectable_if (guards > 9) #Send guards to find the Thieves. (Requires 10 Guards)\n\t\tYour guards find the Thieves Guild, but there are couple casulaties on your side.\n\t\t*set guards - 2\n\t\t*page_break\n\t\t*goto cleric\n\t*selectable_if (knights > 0) #Send a knight to find the thieves.\n\t\t*set knight -1\n\t\t*set peasants +1\n\t\tYour knight finds the Thieves Guild and destroys it. Unfortunately, he's injured and decides to retire as a well-respected peasant. \n\t\t*page_break\n\t\t*goto cleric\n\t#Execute anyone found stealing. \n\t\t*set thieves +1\n\t\t*set dark +2\n\t\t*set peasants -5\n\t\tThere are less thieves on the streets, but some still continue to steal. \n\t\t*page_break\n\t\t*goto cleric\n\t#Do nothing.\n\t\t*set thieves +3\n\t\t*set rule -1\n\t\tYou do not address this issue at the current moment…\n\t\t*page_break\n\t\t*goto cleric\n\t*selectable_if (gold > 99) #Bribe them. (100 GP)\n\t\tMost of the thieves accept your bribe, but some of them still continue to steal.\n\t\t*set thieves +1\n\t\t*if gold > 49\n\t\t\t*set gold - 50\n\t\t*page_break\n\t\t*goto cleric\n\n*label cleric\nA cleric approaches in a white cloak. He wants to set up a small chapter of clerics in the city, but it will require substantial funds. Will you invest?\n\nYou have ${gold} Gold Pieces in the treasury.\n\n*choice\n\t*selectable_if (workers > 9) #I will build the temple myself. (Requires 10 Workers) \n\t\tYou decide to send a team of workers to build the temple. The clerics are very grateful and give you two healing potions. \n\t\t*set workers -5 \n\t\t*set peasants +5\n\t\t*set light +4\n\t\t*set healing +2\n\t\t*page_break\n\t\t*goto library1\n\t*selectable_if (gold > 249) #I will give a small donation to build the temple. (250 GP)\n\t\tYou give a small donation. The clerics are grateful, and the construction of the temple attracts peasants. \n\t\t*set gold -250\n\t\t*set peasants +2\n\t\t*set light +2\n\t\t*page_break\n\t\t*goto library1\n\t*selectable_if (gold > 499) #I will give a medium donation to build the temple. (500 GP)\n\t\tYou give a medium donation. The clerics are grateful and give you a healing potion. \n\t\t*set gold -500\n\t\t*set light +5\n\t\t*set healing +1\n\t\t*set peasants +5\n\t\t*page_break\n\t\t*goto library1\n\t*selectable_if (gold > 999) #I will give a large donation to build the temple. (1000 GP)\n\t\tYou give a large donation. The clerics are very grateful and give you three healing potions. \n\t\t*set gold -1000\n\t\t*set light +10\n\t\t*set healing +3\n\t\t*set peasants +15\n\t\t*page_break\n\t\t*goto library1\n\t#I will not finance the temple. \n\t\tYou do not give any donation to build the temple.\n\t\t*page_break\n\t\t*goto library1\n\n*label library1\nIn walks a group of magicians. After all the formal greetings, you find out that this group of magicians wishes to expand their magical library.\n*choice\n\t*selectable_if (intelligence > 0) #I know a few scholars that could get this accomplished. (Requires Intelligence) \n\t\tYou know of a few scholars that could help expand the library. You send word to them. \n\t\t*set magicians +1\n\t\t*set peasants +10\n\t\t\n\t\tThe expansion of the library attracts both mages and peasants. The mages are so grateful that they give you a fireball spell scroll. \n\t\t*set fireball +1\n\t\t*page_break\n\t\t*goto done\n\t*selectable_if (gold > 249) #Give a small donation. (250 GP)\n\t\t*set gold -250\n\t\t*set magicians +1\n\t\t*set peasants +5\n\t\t\n\t\tThe expansion of the library attracts both mages and peasants.\n\t\t*page_break\n\t\t*goto done\n\t*selectable_if (gold > 499) #Give a medium donation. (500 GP)\n\t\tYou give a medium donation.\n\t\t*set gold -500\n\t\t*set magicians +1\n\t\t*set peasants +10\n\t\t\n\t\tThe expansion of the library attracts both mages and peasants.\n\t\t*page_break\n\t\t*goto done\n\t*selectable_if (gold > 999) #Give a large donation. (1000 GP) \n\t\tYou give a large donation. \n\t\t*set gold -1000\n\t\t*set magicians +2\n\t\t*set peasants +10\n\t\t*set fireball +1\n\t\t\n\t\tThe expansion of the library attracts both mages and peasants. The mages are so grateful that they give you a fireball spell scroll. \n\t\t*page_break\n\t\t*goto done\n\t#I will not finance the library.\n\t\tYou decide not to finance the library.\n\t\t*page_break\n\t\t*goto done\n\n*label done\t\t\n*set day1 1\nThat concludes all of the business for today. The noble Gensa approaches you. He looks at you and says, \"One final question, ${name}…\"\n*page_break\n\"Have you given any thought who you might vote for in the Governor's election?\"\n*choice\n\t#\"You, Gensa.\"\n\t\t\"Excellent.\"\n\t\t*set rule +1\n\t\t*set dark +5\n\t\t*page_break\n\t\t*goto review\n\t#\"Myself.\"\n\t\t*set rule -1\n\t\tGensa laughs.\n\t\t*page_break\n\t\t*goto review\n\t#\"Anyone but you, Gensa.\" \n\t\t*set rule -2\n\t\t*set light +10\n\t\t*page_break\n\t\t*goto review\n\t#\"I haven’t really thought about it.\"\n\t\t\"Well, you really should.\"\n\t\t*page_break\n\t\t*goto review\n\n*label review\nGensa’s Review\n*if rule \u003c 0\n\tGensa thinks you won’t last long as ruler.\n\t*set rule -1\n\tSome of your servants hear this and start whispering.…\n*if rule = 0\n\tGensa thinks you're no better than the last ruler. \n*if rule > 0\n\t*if rule \u003c 4\n\t\tGensa thinks you have some potential.\n*if rule > 3\n\tGensa thinks your prospects as a ruler look great.\n\t*set rule +1\n\nHe leaves. \n*page_break\nA guard enters. \"Sir, this letter was left for you.\"\n*page_break\n[i]Hello,[/i]\n\n\n[i]You do not know who I am, but I know of you. I am not sure if you are aware, but there are plots to overthrow the King. In fact, I have some information that could prove vital if you wish to buy it from me for 500 Gold Pieces. Meet me outside the castle walls around midnight tonight. Come unarmed and alone.[/i]\n\n\n\nYou have ${gold} Gold Pieces in the treasury.\n\n*page_break\nWhat a mysterious letter…\n\nDo you plan to go?\n*choice\n\t#Yes.\n\t\tYes, I'd better see what all of this is about. I'll make sure to be ready at the designated time, but in the meantime, I have other business to attend to.\n\t\t*set plan 1\n\t\t*page_break\n\t\t*goto go1\n\t#No.\n\t\tNo, it sounds sketchy or possibly it's a trap. Best not to take any chances. \n\t\t*page_break\n\t\t*goto go1\n\n*label upgrade\n*image map-48691_1280.png\n\nYour main worker asked you if you have any projects you want them to focus on. Since you have ten workers or more, you can work on multiple projects at once. What would you like to upgrade?\n*choice\n\t\t\t\t*disable_reuse *selectable_if (gold > 99) #The walls. (100 GP)\n\t\t\t\t\tYou upgrade the walls.\n\t\t\t\t\t*set defenses +2\n\t\t\t\t\t*set gold -100\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto upgrade\n\t\t\t\t*disable_reuse *selectable_if (gold > 249) #The castle. (250 GP)\n\t\t\t\t\tYou upgrade the castle.\n\t\t\t\t\t*set castle +1\n\t\t\t\t\t*set gold -250\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto upgrade\n\t\t\t\t*disable_reuse *selectable_if (gold > 149) #The main village. (150 GP)\n\t\t\t\t\tYou upgrade the main village.\n\t\t\t\t\t*set peasants +10\n\t\t\t\t\t*set gold -150\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto upgrade\n\t\t\t\t#That is all.\n\t\t\t\t\tYou leave.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto go1\n*label go1\nYou still have plenty of time left; what would you like to do?\n*choice\n\n\t*disable_reuse #Upgrade a building.\n\t\tYou go to see your master builder.\n\t\t*if workers > 9\n\t\t\t*page_break\n\t\t\t*goto upgrade\n\t\t*page_break\n\t\t*image map-48691_1280.png\n\t\t\n\t\tYou decide to perform some upgrades. Since you have less than ten workers, you can only select one structure to upgrade. What would you like to upgrade?\n\n\t\tYou have ${gold} Gold Pieces in the treasury. If you spend more than is available, you will owe the remainder. \n\t\t*choice\n\t\t\t*selectable_if (stop = 0) #The walls. (100 GP)\n\t\t\t\tYou upgrade the walls.\n\t\t\t\t*set stop +1\n\t\t\t\t*set gold -100\n\t\t\t\t*set defenses +2\n\t\t\t\t*page_break\n\t\t\t\t*goto go1\n\t\t\t*selectable_if (stop = 0) #The castle. (250 GP)\n\t\t\t\tYou upgrade the castle.\n\t\t\t\t*set gold -250\n\t\t\t\t*set stop +1\n\t\t\t\t*set castle +1\n\t\t\t\t*set rule +1\n\t\t\t\t*page_break\n\t\t\t\t*goto go1\n\t\t\t*selectable_if (stop = 0) #The main village. (150 GP)\n\t\t\t\tYou upgrade the main village.\n\t\t\t\t*set gold -150\n\t\t\t\t*set stop +1\n\t\t\t\t*set peasants +10\n\t\t\t\t*page_break\n\t\t\t\t*goto go1\n\t\t\t#Leave.\n\t\t\t\tYou decide to leave.\n\t\t\t\t*page_break\n\t\t\t\t*goto go1\n\t*disable_reuse #Learn from my advisor.\n\t\tYour advisor only has time to go over one skill for today. What would you like to study?\n\t\t\n\t\t\t\t\n\t\tYour Current Stats:\n\t\t\n\t\tLeadership: ${leadership}\n\t\t\n\t\tStrength: ${strength}\n\t\t\n\t\tAgility: ${agility}\n\t\t\n\t\tStealth: ${stealth}\n\t\t\n\t\tDiplomacy: ${diplomacy}\n\t\t\n\t\tIntelligence: ${intelligence}\n\t\t*choice\n\t\t\t#Leadership.\n\t\t\t\tYou spend the rest of the day training.\n\t\t\t\t*set leadership +1\n\t\t\t\t*goto go1\n\t\t\t#Strength.\n\t\t\t\tYou spend the rest of the day training.\n\t\t\t\t*set strength +1\n\t\t\t\t*page_break\n\t\t\t\t*goto go1\n\t\t\t#Agility.\n\t\t\t\tYou spend the rest of the day training.\n\t\t\t\t*set agility +1\n\t\t\t\t*page_break\n\t\t\t\t*goto go1\n\t\t\t#Stealth.\n\t\t\t\tYou spend the rest of the day training.\n\t\t\t\t*set stealth +1\n\t\t\t\t*page_break\n\t\t\t\t*goto go1\n\t\t\t#Diplomacy.\n\t\t\t\tYou spend the rest of the day training.\n\t\t\t\t*set diplomacy +1\n\t\t\t\t*page_break\n\t\t\t\t*goto go1\n\t\t\t#Intelligence.\n\t\t\t\tYou spend the rest of the day training.\n\t\t\t\t*set intelligence +1\n\t\t\t\t*page_break\n\t\t\t\t*goto go1\n\t#Go to bed.\n\t\tIt's midnight.\n\t\t*choice\n\t\t\t#Fall asleep.\n\t\t\t\tYou decide to go to sleep. \n\t\t\t\t*set health 100\n\t\t\t\t*page_break\n\t\t\t\t*goto day_3\n\t\t\t*selectable_if (plan > 0) #Go outside the castle to meet with the person behind the mysterious letter.\n\t\t\t\tDo you bring a weapon?\n\t\t\t\t*choice\n\t\t\t\t\t#Yes, I grab a dagger and conceal it.\n\t\t\t\t\t\tYou grab the dagger. \n\t\t\t\t\t\t*set dagger +1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto guard1\n\t\t\t\t\t#No, I won't bring a weapon.\n\t\t\t\t\t\tYou go unarmed.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto guard1\n*label guard1\nDo you bring a guard with you?\n*choice\n\t#Yes.\n\t\tYou leave with a guard, his armor clanging as you walk outside. You tell him to find a place to hide. He tries to hide behind a large bush, but his helmet is still poking out. You wait for several hours, but no one shows up. \n\t\t*goto day_3\n\t#No.\n\t\tYou wait outside the castle walls for this mysterious stranger, until someone finally approaches…\n\t\t*page_break\n\t\tA man in a cloak walks up to you.  \n\t\t\n\t\tYou have ${gold} Gold Pieces. \n\t\t\n\t\t\"Hello there. Did you bring the money? I have the information you seek right here.\" He quickly shows you an opened letter.\n\t\t*choice\n\t\t\t*selectable_if (gold > 499) #Give him 500 Gold Pieces.\n\t\t\t\t*page_break\n\t\t\t\t*goto boss_nobattle\n\t\t\t*if diplomacy > 1 \n\t\t\t\t*selectable_if (gold > 249) #\"500 Gold Pieces is too much, would you take 250?\"\n\t\t\t\t\tHe agrees to 250 Gold Pieces.\n\t\t\t\t\t*set gold -250\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto boss_nobattle\n\t\t\t*selectable_if (dagger > 0) #\"No, but I did bring something else.\" Attack him with my dagger.\n\t\t\t\tYou lunge at the cloaked figure…\n\t\t\t\t*set boss1_health -10\n\t\t\t\t*if strength > 1\n\t\t\t\t\t*set boss1_health -5\n\t\t\t\t*page_break\n\t\t\t\t*goto boss1\n\t\t\t*selectable_if (gold \u003c 501) #Lie and say I have the money. \n\t\t\t\t\"Good, hand it over then.\"\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (leadership > 1) #Pretend to get the money, then surprise attack him.\n\t\t\t\t\t\tYou hit him hard. He's clearly surprised by your attack.\n\t\t\t\t\t\t*set boss1_health -20\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto boss1\n\t\t\t\t\t#Charge at him.\n\t\t\t\t\t\tYou charge at him.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto boss1\n\t\t\t\t\t*selectable_if (agility > 1) #Attack him when he least expects it. (Requires Agility) \n\t\t\t\t\t\tYou hit him hard. He's clearly surprised by your attack.\n\t\t\t\t\t\t*set boss1_health -20\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto boss1\n\t\t\t#\"No, but I don’t plan on going away empty handed.\" Attack him.\n\t\t\t\tYou lunge at the cloaked figure…\n\t\t\t\t*set boss1_health -5\n\t\t\t\t*if strength > 1\n\t\t\t\t\t*set boss1_health -5\n\t\t\t\t*page_break\n\t\t\t\t*goto boss1\n\t\t\t#\"No.\" \n\t\t\t\t\"Then why did you come? Are you trying to trick me?\" He rushes at you with a dagger.\n\t\t\t\t*choice\n\t\t\t\t\t#Attempt to block his attack.\n\t\t\t\t\t\tYou try to block his attack, but he still manages to slash your arm.\n\t\t\t\t\t\t*set health -10\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto boss1\n\t\t\t\t\t*selectable_if (agility > 1) #Jump out of the way.\n\t\t\t\t\t\tYou barely dodge his attack. The knife glistens in the moonlight as it narrowly misses your face. \n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto boss1\n*label boss1\n*if health \u003c 50\n\t*set health 50\n*image rogue.png\n\n\nBoss Health: ${boss1_health}\n\n\nYour Health: ${health}\n\nThe cloaked figure starts to pull out a crossbow…\n*choice\n\t*selectable_if (dagger > 0) #Throw my dagger at him. (Requires Agility) \n\t\tYou throw the dagger directly at him; it hits him, and he whinces in pain. He drops the crossbow as a result.\n\t\t*set boss1_health -10\n\t\t*if strength > 1\n\t\t\t*set boss1_health -5\n\t\t*set dagger -1\n\t\t*page_break\n\t\t*goto boss2\n\t#Charge him.\n\t\tHe fires the crossbow and hits you for 25 Damage.\n\t\t*set health -25\n\t\t*page_break\n\t\t*goto boss2\n\t*selectable_if (strength > 1) #Tackle him.\n\t\tYou tackle him, and he hits the ground hard. You proceed to punch him in the face repeatedly. Somehow, he manages to get free of your grasp and is back on his feat.\n\t\t*set boss1_health -10\n\t\t*if strength > 2\n\t\t\t*set boss1_health -5\n\t\t*page_break\n\t\t*goto boss2\n\t#Jump out of the way.\n\t\t*If agility > 1\n\t\t\tYou manage to avoid his crossbow bolt.\n\t\t\t*page_break\n\t\t\t*goto boss2\n\t\t*If agility \u003c 2\n\t\t\tYou jump back, but he still manages to hit you.\n\t\t\t*set health -10\n\t\t\t*page_break\n\t\t\t*goto boss2\n\n*label boss2\n*if boss1_health \u003c 1\n\t\t*goto list1\n*image rogue.png\n\n\nBoss Health: ${boss1_health}\n\n\nYour Health: ${health}\n\t\nHe pulls out a dagger and attempts to stab you with it. \n*fake_choice\n\t*selectable_if (agility > 1) #Dodge his attack.\n\t\tYou manage to dodge his attack.\n\t\t*page_break\n\t\t*goto boss3\n\t#Attempt to grab the dagger and disarm him.\n\t\t*if agility > 0\n\t\t\tYou manage to disarm him and grab his dagger.\n\t\t\t*set dagger +1\n\t\t\t*page_break\n\t\t\t*goto boss3\n\t\t*if agility \u003c 1\n\t\t\tYou are unsuccessful in disarming him; he slashes at you, doing a small amount of damage. \n\t\t\t*set health -10\n\t\t\t*page_break\n\t\t\t*goto boss3\n\t*selectable_if (dagger > 0) #Jump back, then counter-attack with my dagger. \n\t\t*if agility > 1\n\t\t\tYou manage to counter-attack.\n\t\t\t*set boss1_health -10\n\t\t\t*if strength > 1\n\t\t\t\tset boss1_health -10\n\t\t\t*page_break\n\t\t\t*goto boss3\n\t\t*if agility \u003c 2\n\t\t\tYour counter-attack fails…\n\t\t\t*page_break\n\t\t\t*if agility > 0\n\t\t\t\tHowever, you manage to dodge his attack.\n\t\t\t*if agility \u003c 1\n\t\t\t\tYou take a small amount of damage.\n\t\t\t\t*set health -10\n\t\t\t*page_break\n\t\t\t*goto boss3\n\t*selectable_if (leadership > 1) #Jump back, then counter-attack with my fists.\n\t\t*if agility > 1\n\t\t\tYou manage to counter-attack him.\n\t\t\t*set boss1_health -10\n\t\t*if agility \u003c 2\n\t\t\tYour counter-attack fails…\n\t\t\t*page_break\n\t\t\t*if agility > 1\n\t\t\t\tYou still manage to avoid his blow, however.\n\t\t\t*if agility \u003c 2\n\t\t\t\tYou take a small amount of damage.\n\t\t\t\t*set health -10\n\t\t*page_break\n\t\t*goto boss3\n\t#Jump back.\n\t\tHe hits you for 10 Damage.\n\t\t*page_break\n\t\t*set health -10\n\t\t*if health \u003c 1\n\t\t\t*goto_scene death\n\t\t*goto boss3\n\t\t\n*label boss3\n*if boss1_health \u003c 1\n\t\t*goto list1\n*image rogue.png\n\n\nBoss Health: ${boss1_health}\n\n\nYour Health: ${health}\n\nHe tries to attack you again, but you manage to dodge it.\n*choice\n\t*selectable_if (dagger > 0) #Attack him with my dagger. \n\t\t*set boss1_health -10\n\t\tYou slash him with your dagger.\n\t\t*if strength > 1\n\t\t\t*set boss1_health -5\n\t\t*page_break\n\t\t*goto flask\n\t#Attack him with my fists.\n\t\tYou hit him with your fists.\n\t\t*set boss1_health -5\n\t\t*if strength > 1\n\t\t\t*set boss1_health -5\n\t\t*page_break\n\t\t*goto flask\n\n*label flask\n*image rogue.png\n\n\nHe pulls out a flask of some sort.\n*choice\n\t*selectable_if (dagger > 0) #Throw my dagger at the flask.\n\t\t*set dagger -1\n\t\t*if agility > 1\n\t\t\tIt explodes like a firebomb, dealing tremendous damage all around him.\n\t\t\t*set boss1_health -30\n\t\t\t*page_break\n\t\t\t*goto boss4\n\t\tYour dagger misses the flask. He quickly throws it at you, and it explodes like a firebomb next to you. You take some damage.  \n\t\t*set health - 20\n\t\t*page_break\n\t\t*goto boss4\n\t*selectable_if (dagger > 0) #Throw my dagger at him.\n\t\tHe drops the flask, and it explodes like a firebomb. He's able to jump away some, but he's still caught within the blast radius. \n\t\t*set boss1_health -20\n\t\t*set dagger -1\n\t\t*page_break\n\t\t*goto boss4\n\t#Charge him.\n\t\tHe throws the flask directly at you. It breaks and explodes like a firebomb, causing tremendous damage. You take most of the damage, but because of your close proximity, he also takes some damage. \n\t\t*set health -30\n\t\t*set boss1_health -10\n\t\t*page_break\n\t\t*goto boss4\n\t#Back away.\n\t\tHe throws the flask at you. It breaks and explodes like a firebomb. You manage to move slightly away from the blast, but still take some damage.\n\t\t*set health -20\n\t\t*page_break\n\t\t*goto boss4\n\t*selectable_if (agility > 0) #Jump back.\n\t\tHe throws the flask at you. It breaks and explodes like a firebomb. You manage to jump away from the blast but still take a small amount of damage.\n\t\t*set health -10\n\t\t*page_break\n\t\t*goto boss4\n\n*label boss4\n*if health \u003c 1\n\t*goto_scene death\n\t\n*if boss1_health \u003c 1\n\t\t*goto list1\n*image rogue.png\n\nBoss Health: ${boss1_health}\n\n\nYour Health: ${health}\n\n\nWhat do you do next?\n\n*choice\n\t*selectable_if (dagger > 0) #Attack him with my dagger. \n\t\t*if strength \u003c 2\n\t\t\tYou do 10 Damage to him.\n\t\t\t*set boss1_health -10\n\t\t\t*page_break\n\t\t\t*goto boss5\n\t\tYou do 15 Damage to him.\n\t\t*set boss1_health -15\n\t\t*page_break\n\t\t*goto boss5\t\n\t#Attack him with my fists.\n\t\t*if strength \u003c 2\n\t\t\tYou do 5 Damage to him.\n\t\t\t*set boss1_health -5\n\t\t\t*page_break\n\t\t\t*goto boss5\n\t\tYou do 10 Damage to him.\n\t\t*set boss1_health -10\n\t\t*page_break\n\t\t*goto boss5\n\t*selectable_if (healing > 0) #Cast a healing spell on myself.\n\t\t*set healing -1\n\t\t*set health 100\n\t\t*page_break\n\t\t*goto boss5\n\t*selectable_if (potion > 0) #Take a healing potion.\n\t\t*set potion -1\n\t\t*set health 100\n\t\t*page_break\n\t\t*goto boss5\n\t*selectable_if (fireball > 0) #Shoot a fireball at him.\n\t\t*image fire-312260_1280.png\n\t\t\n\t\tYou hit him with a fireball, causing massive damage. \n\t\t*set fireball -1\n\t\t*set boss1_health -20\n\t\t*page_break\n\t\t*goto boss5\n\n*label boss5\n*if boss1_health \u003c 1\n\t\t*goto list1\nHe starts to run away.\n\n\nBoss Health: ${boss1_health}\n\n\nYour Health: ${health}\n\n\n*choice\n\t*selectable_if (dagger > 0) #Throw a dagger at his legs.\n\t\t*if agility > 0\n\t\t\tYou hit him hard.\n\t\t\t*set boss1_health -20\n\t\t*if agility \u003c 1\n\t\t\tHe manages to avoid your blow by jumping sideways. He starts running again.\n\t\t*set dagger -1\n\t\t*page_break\n\t\t*goto boss5\n\t#Chase after him.\n\t\tYou chase after him. He won't get away that easily…\n\t\t*choice\n\t\t\t*selectable_if (dagger > 0) #Attack him with my dagger. \n\t\t\t\tYou manage to slash him with your dagger.\n\t\t\t\t*set boss1_health -10\n\t\t\t\t*if strength > 1\n\t\t\t\t\t*set boss1_health -5\n\t\t\t\t*if boss1_health \u003c 1\n\t\t\t\t\t*goto list1\n\t\t\t\t*page_break\n\t\t\t\tThe cloaked man winces, but he manages to keep running.\n\t\t\t\t*page_break\n\t\t\t\t*goto cliff\n\t\t\t#Attack him with my fists.\n\t\t\t\tYou manage to hit him with your fists.\n\t\t\t\t*set boss1_health -5\n\t\t\t\t*if strength > 1\n\t\t\t\t\t*set boss1_health -5\n\t\t\t\t*if boss1_health \u003c 1\n\t\t\t\t\t*goto list1\n\t\t\t\t*page_break\n\t\t\t\tThe cloaked man winces, but he manages to keep running.\n\t\t\t\t*page_break\n\t\t\t\t*goto cliff\n\t\t\t*selectable_if (fireball > 0) #Shoot a fireball at him.\n\t\t\t\t*image fireball-417899_1280.png\n\t\t\t\t\n\t\t\t\tYou cast a fireball, and it hits the cloaked man directly in the back, causing severe damage. \n\t\t\t\t\n\t\t\t\t*set fireball -1\n\t\t\t\t*set boss1_health -20\n\t\t\t\t*if boss1_health \u003c 1\n\t\t\t\t\t*goto list1\n\t\t\t\t*page_break\n\t\t\t\tThe cloaked man winces, but somehow he manages to keep running.\n\t\t\t\t*page_break\n\t\t\t\t*goto cliff\n\t#Let him leave. \n\t\t*goto leave1\n\n*label cliff\nThe cloaked figure runs until he comes to a small cliff. As there's nowhere left to go, he turns around to face you. \n*page_break\nHe yells as the wind begins to pick up. \"Don't take a step further, or I'll throw this letter off this cliff!\"\n\n\nWhat do you do?\n*choice\n\t#Charge him.\n\t\tYou charge him, and he ends up falling off the cliff. You can't see where he fell, as it's too dark. You try to search for the letter, but you can't see anything. You're also unable to find his body. You return to the castle.\n\t\t*page_break\n\t\t*goto day_3\n\t*selectable_if (diplomacy > 0) #Negotiate his life for the letter.\n\t\t\tHe takes your deal, then he runs away after handing you the letter.\n\t\t\t*page_break\n\t\t\t*goto letter\n\t#Stop.\n\t\tThe cloaked man says, \"Good. Now here's how it'll go…you give me 100 Gold Pieces, and I'll give you this letter!\"\n\t\t*choice\n\t\t\t*selectable_if (gold > 99) #Give him the money. (Requires 100 GP)\n\t\t\t\tHe gives you the letter and runs away.\n\t\t\t\t*page_break\n\t\t\t\t*goto letter\n\t\t\t*selectable_if (dagger > 0) #Throw a dagger at him when he's distracted.\n\t\t\t\t*set boss1_health -20\n\t\t\t\t*if boss1_health \u003c 1\n\t\t\t\t\tYou manage to hit him, and he drops the letter. He falls over the cliff. You manage to grab the letter before the wind can blow it away. \n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto list1\n\t\t\t\tYou manage to hit him, and he falls over the cliff. You're unsuccessful in grabbing the letter, though. You try to search for it, but you can't see anything in the darkness. You return to the castle empty handed.\n\t\t\t\t*page_break\n\t\t\t\t*goto day_3\n\t\t\t#Charge him.\n\t\t\t\tYou charge him at full speed. You manage to hit him, and he falls over the cliff. You're unsuccessful in grabbing the letter before he drops it. You try to search for it, but you can't see anything in the darkness. You return to the castle empty handed.\n\t\t\t\t*page_break\n\t\t\t\t*goto day_3\t\t\t\t\n\n*label list1\nYou have defeated the cloaked man. Unfortunately, you cannot verify who he is, though you do find his letter.\n*page_break\n*goto letter\n\n*label boss_nobattle\nBefore you can look up to ask him where he got this, he's gone.\n*page_break\n*goto letter\n\n*label letter\nThe letter he had has a list of names on it. It looks like a list of people planning a rebellion against the King. \n\nWhat do you do?\n*choice\n\t#Send word to the King.\n\t\t*set light +5\n\t\t*set dark -5\n\t\t*set rule +1\n\t\tYou send word to the King, and he soon crushes the rebellion.\n\t\t*set saved_king +1\n\t\t*achieve conspiracy\n\t\t*page_break\n\t\t*goto day_3\n\t#Blackmail the people on the list for money. \n\t\t*set gold + 1000\n\t\t*set dark +5\n\t\t*set light -5\n\t\tYou suspect many of the people on this list will want to keep their plan a secret. You could easily get 1000 Gold Pieces for it…\n\t\t*page_break\n\t\t*goto day_3\n\t#Use it as leverage to gain a seat at the table. (Join the Rebellion) \n\t\t*set dark +10\n\t\t*set light -10\n\t\t*set rule +1\n\t\tYou join the group plotting rebellion and gain additional power. The King is actually assassinated, but the rebellion ends up being crushed regardless due to his loyal generals. Luckily, you were never exposed as part of the plot. The King's son takes over as ruler; however, he's rather young and inexperienced. \n\t\t*page_break\n\t\t*goto day_3\n\n*label leave1\nThe man manages to escape…\n\nYou return to the castle.\n*page_break\n*goto day_3\n\t\n*label day_3\nThe next day, you find out that a Galmencia trader wishes to do business with you. \n*choice\n\t*selectable_if (merchants > 7) #Send merchants to negotiate a trade. (Requires 8 Merchants) \n\t\tYour merchants return with 500 Gold Pieces in profit; however, a few stay behind to continue working with the Galmencia trader. \n\t\t*set merchants -5\n\t\t*set gold +500\n\t\t*set rule +1\n\t\t*page_break\n\t\t*goto rebellion\n\t#Do not trade with him.\n\t\tYou decide not to trade with him.\n\t\t*set merchants -2\n\t\t*page_break\n\t\t*goto rebellion\n\n*label rebellion\nYou hear a commotion outside…\n*page_break\nYou decide to look outside.\n\n*if rule > 3 \n\tIt's just some peasants singing; apparently, they're happy enough with your rule to sing in the streets…\n\t*page_break\n\t*finish\n\nYou see several peasants carrying pitchforks and makeshift weapons. Your advisor tells you that he thinks they're forming a rebel army to overthrow you. \n\nHow do you handle it?\n*choice\n\t*selectable_if (guards > 14) #Send guards to quell the crowd. (Requires 15 Guards)\n\t\tThe guards manage to quell the crowd, but not before they cause much damage to the surrounding area.\n\t\t*set guards -10\n\t\t*set defenses -1\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*page_break\n\t\t*finish\n\t*selectable_if (gold > 499) #Bribe them to go away. (500 GP)\n\t\tThey agree to take the gold and disperse.\n\t\t*set gold -500\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*page_break\n\t\t*finish\n\t*selectable_if (diplomacy > 1) #Address their grievances and negotiate a compromise.\n\t\tThey agree to your terms. \n\t\t*set rule -1\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*page_break\n\t\t*finish\n\t#Do nothing. \n\t\t*set peasants -20\n\t\tPeasants riot in the streets and loot your fiefdom. It is total chaos.\n\t\t*page_break\n\t\t*if peasants \u003c 1\n\t\t\t*goto possible_end_game\n\t\t*set rule -1\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*finish\n\t\n*label possible_end_game\nThe rebel peasants overtake your guards and bust through the castle doors. Five of them surround you.\n*choice\t\n\t*selectable_if (leadership > 2) #Order them to stand down. (Requires 3 Leadership)\n\t\tThey leave you alone, but not before stealing a few valuables. \n\t\t*set gold -250\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*finish\n\t*selectable_if (light > 58) #Remind them how I helped them in the past.\n\t\tThey leave you alone, but not before stealing a few valuables. \n\t\t*set gold -250\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*finish\n\t*selectable_if (dark > 58) #Threaten them.\n\t\tThey run off, but not before raiding your treasury.\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*set gold -500\n\t\t*finish\n\t#Defend myself.\n\t\tYou look around; this will likely be the toughest battle you've ever faced. They surround you from all sides, and you don't even have a weapon on you…\n\t\t*page_break\n\t\tThey're hesitant to attack you…\n\t\t\n\t\tWhat should you do?\n\t\t*choice\n\t\t\t#Charge the peasant with the spear.\n\t\t\t\t*if agility \u003c 3\n\t\t\t\t\tYou charge the peasant with the spear, but he's too quick for you; he stabs the spear deep into your leg. You're forced to your knees.\n\t\t\t\t\t*set health -15\n\t\t\t\t\t*if health \u003c 1\n\t\t\t\t\t\tSuddenly, another peasant appears before you with a dagger and slashes at you, opening a deep cut; you've taken too much damage. You fall to the ground. Several more peasants surround you with clubs and makeshift weapons…\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t*page_break\n\t\t\t\t\tSeeing you fall causes the other peasants to join in, and they begin to strike you with their weapons.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t*selectable_if (strength > 2) #Rip the spear out of my leg and stab one of the peasants with it. (Requires Great Strength)\n\t\t\t\t\t\t\tYou're able to remove the spear and use it as a weapon. \n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto fight_rebels\n\t\t\t\t\t\t#Try to roll away.\n\t\t\t\t\t\t\tYou're unsuccessful. The peasants keep attacking you.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t*selectable_if (guards > 10) #Call for help.\n\t\t\t\t\t\t\tA few of your soldiers manage to help you up. One hands you his sword. However, they're soon overpowered by another mob of peasants. You are again facing the five rebels, but at least this time, you're armed.\n\t\t\t\t\t\t\t*set health -30\n\t\t\t\t\t\t\t*if health \u003c 1\n\t\t\t\t\t\t\t\tYou start swinging wildly at the peasants, taking down three of them. As you turn, you notice a fourth peasant charging you with a pitchfork.\n\t\t\t\t\t\t\t\t*if agility > 2\n\t\t\t\t\t\t\t\t\tEven though you're completely exhausted, you somehow manage to dodge the blow successfully and stab the sword into the peasant. \n\t\t\t\t\t\t\t\t\t*set guards -5\n\t\t\t\t\t\t\t\t\t*set health 1\n\t\t\t\t\t\t\t\t\t*goto fight_rebels\n\t\t\t\t\t\t\t\t*if light > dark\n\t\t\t\t\t\t\t\t\tSomehow, you manage to avoid the attack. \n\t\t\t\t\t\t\t\t\t*set guards -5\n\t\t\t\t\t\t\t\t\t*set health 1\n\t\t\t\t\t\t\t\t\t*goto fight_rebels\n\t\t\t\t\t\t\t\tThe peasant stabs you with the pitchfork in the chest and you fall down…\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t\t*set guards -5\n\t\t\t\t\t\t\t*goto fight_rebels\n\t\t\t\t\n\t\t\t\tYou manage to shove the peasant down and get a hold of his spear. You're still surrounded, but at least you have a weapon now.\n\t\t\t\t*page_break\n\t\t\t\t*goto fight_rebels\n\t\t\t#Charge the peasant with the club.\n\t\t\t\tYou push the peasant over and are able to grab his club. At least you're armed now. \n\t\t\t\t*page_break\n\t\t\t\t*goto fight_rebels\n\t\t\t#Charge the peasant with the dagger.\n\t\t\t\tYou run toward him to attack, but he's quite skilled. He avoids your blows, then strikes you several times. You fall to the ground. The rest of the peasants attack you from all sides. You soon lose consciousness.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene death\n\t\t\t*selectable_if (leadership > 0) #Taunt one of them into attacking me.\n\t\t\t\tThe one with the spear attempts to stab you with it…\n\t\t\t\t*choice\n\t\t\t\t\t#Dodge and attempt to grab his weapon.\n\t\t\t\t\t\t*if agility \u003c 1\n\t\t\t\t\t\t\tYou're unable to dodge his strike. The spear goes deep into your shoulder. Before you can pull it out, another peasant attacks you from the side with a dagger, forcing you to the ground. Several more peasants gather around you, hitting you with clubs and makeshift weapons.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t*if agility \u003c 2\n\t\t\t\t\t\t\tYou attempt to dodge the peasant's strike but fail. The spear hits you in the shoulder. On the peasant's second attack, you manage to dodge it and grab the spear. You take it away from him and shove him to the ground. More peasants are circling you, but at least you have a weapon now. \n\t\t\t\t\t\t\t*set health -20\n\t\t\t\t\t\t\t*if health \u003c 1\n\t\t\t\t\t\t\t\tBefore you can react, a peasant stabs you with a dagger from behind. You fall to the ground in pain. Other peasants surround you, beating you with clubs and makeshift weapons.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou manage to dodge his blow and take the spear from him. You're soon surrounded by additional peasants holding makeshift weapons.  \n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto fight_rebels\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t*selectable_if (strength > 1) #Let him stab you, but grab his weapon after he does.\n\t\t\t\t\t\t*set health -20\n\t\t\t\t\t\t*if health \u003c 1\n\t\t\t\t\t\t\tYou let the peasant stab you, but the blow does more damage than you thought it would. You stumble, falling to a knee. Before you can get up, another peasant stabs you with a dagger from behind. You fall to the ground in pain. Other peasants surround you, beating you with clubs and makeshift weapons, and soon you lose consciousness.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\tThe peasant isn't very well trained with the weapon, he strikes hard but misses any vital organs. He ends up sticking the pointy end in your shoulder. You push the peasant back and rip the spear out. The peasant runs away in surprise. You're hurt from the blow, but at least you have a weapon now.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto fight_rebels\n\t\t\t\t\t#Jump back.\n\t\t\t\t\t\tYou jump back but land right on the peasant with the club. He hits you hard on the head, and soon all the peasants are hitting you. You are overwhelmed.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto_scene death\n\t\t\t#Wait for them to strike first.\n\t\t\t\tThis doesn't go your way. They all attack together, and soon you are overwhelmed.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene death\n\t\t\n*label fight_rebels\nThe fighting is vicious. You can't believe how much these peasants want you dead. \n*choice\n\t*selectable_if (strength > 2) #Fight on!\n\t\tThe fight is completely brutal, you hold nothing back. The remaining rebels are defeated. You have survived.\n\t\t*set peasants -10\n\t\t*set rule +1\n\t\t*page_break\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*finish\n\t#Attempt to flee.\n\t\tThe peasants soon overpower you…\n\t\t*page_break\n\t\t*goto_scene death\n\t*selectable_if (fireball > 0) #Cast a fireball.\n\t\tYou're able to cause enough damage to the rebels to lead a successful counter-attack. The remaining rebels retreat. You have survived. \n\t\t*set peasants -10\n\t\t*set rule +1\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*page_break\n\t\t*finish\n\t\t\n", "day3": "*temp shield_archer 1\nMonths pass without much incident. You take the time to learn more about your Kingdom and its people. \n*page_break\n\n*if rule > 3\n\tThe peasant population appears to be happy with your rule. Jobs are plentiful, and the land is peaceful once again.\n\t*page_break\n*if rule \u003c 3\n\tThe peasant population appears to be unhappy with your rule. Rumors spread that another noble is trying to incite rebellion within the population. If you aren't careful, you may have an uprising on your hands. \n\t*page_break\n*if rule = 3\n\tYour rule appears stable, though some peasants grumble about poor working conditions. Only a few stage demonstrations. The possibility of rebellion is low, but…you should stay alert nonetheless. \n\t*page_break\n*if merchant_edward = 4\n\tThe merchant Edward of Thornberry's endeavor to make your castle the center of trade between the Kingdoms of Magincia and Galmencia has proven very successful. Merchants from all parts of the Kingdom flock to your castle to trade. \n\t\n\tEdward reports that even though the trading post is in its early infancy, he has made tremendous profit. He deposits 450 Gold Pieces into your treasury. \n\t*set gold +450\n\t*set merchants +10\n\t*page_break\n*if merchant_edward = 3\n\tThe merchant Edward of Thornberry's endeavor to make your castle the center of trade between the Kingdoms of Magincia and Galmencia has had some early success. It's nowhere near the trading hub he promised, but many merchants from all over the Kingdom come to your castle to trade. \n\t\n\tHe deposits 300 Gold Pieces into your treasury, which he states is your share of the profits. \n\t*set gold +300\n\t*set merchants +5\t\n\t*page_break\n*if merchant_edward = 2\n\tThe merchant Edward of Thornberry's endeavor to make your castle the center of trade between the Kingdoms of Magincia and Galmencia is proving difficult. That isn't to say it hasn't had some success; merchants from various parts of the Kingdom come to your castle to trade. \n\t\n\tEdward promises that given enough time, you'll start to see a real difference. In the meantime, he deposits 100 Gold Pieces into your treasury, which he states is your share of the profits. \n\t*set gold +100\n\t*set merchants +2\n\t*page_break\n*if merchant_edward = 1\n\tThe merchant Edward of Thornberry's endeavor to make your castle the center of trade between the Kingdoms of Magincia and Galmencia has proven an almost complete failure. Only a handful of merchants visit your castle to trade. \n\t\n\tEdward states that the trading post is still early in its infancy, and given enough time, you'll start to see things turn around. Edward deposits 50 Gold Pieces into your treasury, which he claims to be your share of the profits. \n\t*set gold +50\n\t*set merchants +1\n\t*page_break\n*if merchant_edward = 0\n\tThe merchant Edward of Thornberry's endeavor to make your castle the center of trade between the Kingdoms of Magincia and Galmencia has proven to be a complete failure. With little to no funds to build the trading post, Edward has abandoned his project to make your castle the center of trade.\n\t\n\tRumor has it that he departed to see another Lord who might be more willing to support his endeavor. As a result, several merchants have left your castle in pursuit of more profitable enterprises. \n\t*set merchants -2\t\n\t*page_break\n*if farmer_status = 4\n\tThe endeavor to make the lands more farmable has been a complete success. Driven by the promise of owning their own land, dozens of farmers start draining the swamp bogs. The news quickly spreads, and farmers throughout the Kingdom come to establish farms within your villages. \n\t\t\n\tIt has upset many of the Druids in the land, since they consider the swamps to be sacred. As a result, the majority of them have left your Kingdom. A few magicians have grumbled as well, since the swamplands are the main source of magical ingredients throughout the land; however, they decide to stay, given that the majority of the population is happy with your decision to drain the swamps. \n\t*set farmers +10\n\t*set peasants +5\n\t*set druids 0\n\t*page_break\n*if farmer_status = 3\n\tThe endeavor to make the land more farmable has been very successful. The funds you provided allowed the farmers to hire workers to drain the swamp bogs. The news quickly spreads, and as a result, many peasants have flocked to the Kingdom looking for work. \n\t\t\n\tIt has, however, upset many of the Druids in the land, since they consider the swamps to be sacred. As a result, the majority of them have left your Kingdom. A few magicians have grumbled as well, since the swamplands are the main source of magical ingredients throughout the land; however, most decide to stay due to the potential growth this influx of peasants could create in the Kingdom. \n\t*set farmers +10\n\t*set peasants +2\n\t*if magicians > 0\n\t\t*set magicians -1\n\t*set druids 0\n\t*page_break\n*if farmer_status = 2\n\tThe endeavor to make the lands more farmable has been somewhat successful. Suspending taxes from farmers has given a few large farms the ability to expand and hire workers to drain the bogs. The news of farmers hiring workers has spread, resulting in a small increase in the peasant population.\n\t\n\tIt has, however, upset many of the Druids in the land, since they consider the swamps to be sacred. As a result, the majority of them have left your Kingdom. A very small number of magicians have grumbled as well, since the swamplands are the main source of magical ingredients throughout the land; however, given that only a small portion of the swamps have been drained and the impact on magical ingredient availability has been negligible, they decide to stay.\n\t*set farmers +5\n\t*set peasants +2\n\t*set druids 0\n\t*page_break\n*if farmer_status = 1\n\tThe endeavor to make the lands more farmable has been almost a complete failure. Very few of the farmers have the resources to expand their operations. Many decide to leave your domain in search of areas with better promises of cultivation. \n\t\n\tIts failure, however, has pleased many of the Druids in the land, since they consider the swamps to be sacred.\n\t*set farmers -5\t\n\t*page_break\n*if farmer_status = 0\n\n\tYour decision to not allow the farmers of the land to drain the swamps upset several of the smaller farm owners. As a result, the majority of them have left your domain.\n\t\n\tOn the plus side, however, your decision to not drain the swamps has pleased many of the Druids and magicians of the land. The Druids consider the land to be sacred, and many of the magicians rely on the swamplands to gather magical ingredients. Some magicians were unsure how the new Lord would handle the swamplands. After seeing nothing will be changed, a small increase in the magician and Druid population has occurred. \n\t*set druids +1\n\t*set magicians +1\n\t*page_break\n\nYou hear from a group of traveling merchants that there has been news of barbarian hordes attacking small castles near the border of Galmencia. The incidents seem to have been contained; however, your advisor tells you to take note of this news, as some barbarian tribes may look upon your new Lordship as an opportunity to raid your villages. \n*page_break\t\n\t\n*temp tax_increase 1\n*temp tax_increase2 1\n*if militia \u003c 0\n\t*set militia 0\n*if guards \u003c 0\n\t*set guards 0\n*if merchants \u003c 0\n\t*set merchants 0\n*if magicians \u003c 0\n\tset magicians 0\n*if farmers \u003c 0\n\t*set farmers 0\n*if peasants \u003c 0\n\t*set peasants 0\n*if workers \u003c 0\n\t*set workers 0\n*if knights \u003c 0\n\t*set knights 0\n*if archers \u003c 0\n\t*set archers 0\n*if druids \u003c 0\n\t*set druids 0\n\n*label kingdom\nKingdom Summary\n\n*image castle-35216.png\n\nCivilian Units:\n\n*if peasants > 0\n\t${peasants} Peasants\n\n*if peasants \u003c 1\n\tYou have no peasants to recruit units from!\n\n${merchants} Merchants\n\n${farmers} Farmers\n\n${workers} Workers\n\t\t\n\t\t\nMilitary Units:\n\t\t\n${militia} Militia\n\n${guards} Guards\n\n${knights} Knights\n\n${archers} Archers\n\n\nUnique Units:\n\n${druids} Druids\n\n${magicians} Magicians\n\n${thieves} Thieves\n\n${bandits} Bandits\n\nOther Important Statistics:\n\n${rule} Rule\n\n*if rule > 3 \n\t(Rule is secure.)\n*if rule \u003c 4 \n\t(Rule is not secure.)\n\n${gold} Gold Pieces\n\n*if tax = 0\n\tNo Taxes\n\n\n*if tax = 10\n\tLow Taxes\n\n\t\n*if tax = 20\n\tMedium Taxes\t\n\n\t\n*if tax = 30\n\tHigh Taxes\t\n\n\t\n*choice\n\t*if (Gold > 9) and (peasants > 0) \n\t\t#Hire Militia. (10 GP)\n\t\t\t*set militia +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -10\n\t\t\t*goto kingdom\n\t*if (Gold > 99) and (peasants > 9) \n\t\t#Hire 10 Militia. (100 GP)\n\t\t\t*set militia +10\n\t\t\t*set peasants -10\n\t\t\t*set gold -100\n\t\t\t*goto kingdom\n\t*if (Gold > 49) and (peasants > 0)\n\t\t#Hire Guards. (50 GP)\n\t\t\t*set guards +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -50\n\t\t\t*goto kingdom\n\t*if (Gold > 249) and (peasants > 4)\n\t\t#Hire 5 Guards. (250 GP)\n\t\t\t*set guards +5\n\t\t\t*set peasants -5\n\t\t\t*set gold -250\n\t\t\t*goto kingdom\n\t*if (Gold > 99) and (peasants > 0) \n\t\t#Hire Knights. (100 GP)\n\t\t\t*set knights +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -100\n\t\t\t*goto kingdom\n\t*if (Gold > 49) and (peasants > 0) \n\t\t#Hire Merchants. (50 GP)\n\t\t\t*set merchants +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -50\n\t\t\t*goto kingdom\n\t*if (Gold > 9) and (peasants > 0) \n\t\t#Hire Farmers. (10 GP)\n\t\t\t*set farmers +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -10\n\t\t\t*goto kingdom\n\t*if (Gold > 99) and (peasants > 9) \n\t\t#Hire 10 Farmers. (100 GP)\n\t\t\t*set farmers +10\n\t\t\t*set peasants -10\n\t\t\t*set gold -100\n\t\t\t*goto kingdom\n\t*if (Gold > 199) and (peasants > 0) \n\t\t#Hire Magicians. (200 GP)\n\t\t\t*set magicians +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -200\n\t\t\t*goto kingdom\n\t*if (Gold > 74) and (peasants > 0) \n\t\t#Hire Archers. (75 GP)\n\t\t\t*set archers +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -75\n\t\t\t*goto kingdom\n\t*if (Gold > 374) and (peasants > 4) \n\t\t#Hire 5 Archers. (375 GP)\n\t\t\t*set archers +5\n\t\t\t*set peasants -5\n\t\t\t*set gold -375\n\t\t\t*goto kingdom\n\t*if (Gold > 24) and (peasants > 0) \n\t\t#Hire Workers. (25 GP)\n\t\t\t*set workers +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -25\n\t\t\t*goto kingdom\n\t*if (Gold > 124) and (peasants > 4) \n\t\t#Hire 5 Workers. (125 GP)\n\t\t\t*set workers +5\n\t\t\t*set peasants -5\n\t\t\t*set gold -125\n\t\t\t*goto kingdom\n\t#Done.\n\t\t*set tax_increase tax * peasants\n\t\t*set tax_increase2 * merchan
