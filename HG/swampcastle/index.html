<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Swamp Castle — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "swampcastle", "title": "Swamp Castle", "scenes": {"animal": "The advisor tells you that that there is no further court business to discuss.\n*fake_choice\n\t#\"Well, that went reasonably well.\"\n\t\tYou tell your advisor that you think you could get used to this.\n\t#\"That could have gone better.\"\n\t\tThe advisor replies, \"I think you did just fine, my liege.\"\n\t#\"Thank goodness…\"\n\t\tThe advisor smiles and walks away.\n\n\nNow that you've completed all the business for today…\n*label begin\nHow would you like to spend the rest of your time?\n*fake_choice\n\t#I want to get to know my subjects.\n\t\t\n\t\tYou walk around for some time, talking to a few peasants.\n\t\t*label day1\n\t\t\n\t\tWhat should you do next?\n\t\t*fake_choice\n\t\t\t*hide_reuse #Visit the head guardsman.\n\t\t\t\t*image guard.png\n\t\t\t\t\n\t\t\t\tYou visit the head guardsman, who is stationed in a small barracks within the castle's interior walls. He has a dark, burly beard and appears to be in very good shape. He's currently instructing the men and training them in combat. It looks like the guards are about to have a tournament. The winner will receive an extra week's rations and pay. He looks up when you arrive and seems pleased to see you. \"Hello, my liege!\" \n\t\t\t\t*Label guards\n\t\t\t\tWhat would you like to do?\n\t\t\t\t*fake_choice\n\t\t\t\t\t#Observe the tournament.\n\t\t\t\t\t\tYou decide to watch the tournament. Since you're there, the guards fight even harder to win. One guard in particular decides to use dirty tactics. He throws sand in the eyes of his opponent and attacks him from behind. He attacks one man so viciously that he needs to be taken away to the healers.\n\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t#Cheer for the man.\n\t\t\t\t\t\t\t\tYou tell your men that there are no rules in war. This man does what he must to win. Use him as an example. \n\t\t\t\t\t\t\t\t*set dark +1\n\t\t\t\t\t\t\t\t*set guards +1\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\tThe man ends up winning the tournament.\n\t\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t\t#Congratulate him.\n\t\t\t\t\t\t\t\t\t\tYou congratulate the warrior. He beams at you and raises his sword in the air. The crowd cheers.\n\t\t\t\t\t\t\t\t\t\t*set guards +2\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto day1\n\t\t\t\t\t\t\t\t\t#Make him a knight.\n\t\t\t\t\t\t\t\t\t\tYou make the warrior a knight. He beams with pride, and the crowd cheers.\n\t\t\t\t\t\t\t\t\t\t*set knights +1\n\t\t\t\t\t\t\t\t\t\t*set dark +1\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto day1\n\t\t\t\t\t\t\t\t\t*selectable_if (gold > 99) #Give him an additional 100 Gold Pieces out of the royal treasury.\n\t\t\t\t\t\t\t\t\t\tHe beams at you and raises his sword in the air. The crowd cheers.\n\t\t\t\t\t\t\t\t\t\t*set guards +5\n\t\t\t\t\t\t\t\t\t\t*set gold -100\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto day1\n\t\t\t\t\t\t\t\t\t#Challenge the warrior to a duel.\n\t\t\t\t\t\t\t\t\t\tThe warrior looks confused. He was expecting you to congratulate him on his victory. This was clearly unexpected, but he accepts your challenge nonetheless.\n\t\t\t\t\t\t\t\t\t\t*set dark +1\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto round3-2\n\t\t\t\t\t\t\t#Tell the man to fight honorably.\n\t\t\t\t\t\t\t\t*set light +2\n\t\t\t\t\t\t\t\tWithout the use of dirty tactics, the man is quickly defeated by a more honorable opponent. The winner is a warrior of immense size who fought valiantly with a two-handed sword. \n\t\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t\t#Congratulate him.\n\t\t\t\t\t\t\t\t\t\tYou congratulate the warrior. He beams at you and raises his sword in the air. The crowd cheers.\n\t\t\t\t\t\t\t\t\t\t*set guards +2\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto day1\n\t\t\t\t\t\t\t\t\t#Make him a knight.\n\t\t\t\t\t\t\t\t\t\tYou make the warrior a knight. He beams with pride, and the crowd cheers.\n\t\t\t\t\t\t\t\t\t\t*set knights +1\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto day1\n\t\t\t\t\t\t\t\t\t*selectable_if (gold > 99) #Give him an additional 100 Gold Pieces out of the royal treasury.\n\t\t\t\t\t\t\t\t\t\tHe beams at you and raises his sword in the air. The crowd cheers.\n\t\t\t\t\t\t\t\t\t\t*set guards +5\n\t\t\t\t\t\t\t\t\t\t*set gold -100\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto day1\n\t\t\t\t\t\t\t\t\t#Challenge the warrior to a duel.\n\t\t\t\t\t\t\t\t\t\tThe warrior looks confused. He was expecting you to congratulate him on his victory. This was clearly unexpected, but he accepts your challenge nonetheless.\n\t\t\t\t\t\t\t\t\t\t*set dark +1\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto round3-2\n\t\t\t\t\t#Join the tournament.\n\t\t\t\t\t\t\"I shall personally join this tournament. Prepare your men.\" The head guardsman looks stunned, but he soon starts organizing everyone, and a crowd gathers to watch the tournament.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tThe warmup begins, with the fighters trying out various weapons. You find that everyone you spar with is holding back. They seem to not want to injure you. \n\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t#Tell my men to fight me as they would any other!\n\t\t\t\t\t\t\t\tThe head guardsman starts barking orders, and soon the men start attacking you as they would any other fighter.\n\t\t\t\t\t\t\t\t*set guards +5\n\t\t\t\t\t\t\t\t*set light +5\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto tournament\n\t\t\t\t\t\t\t#Say nothing…this should be an easy victory.\n\t\t\t\t\t\t\t\tAnyone who tries to spar with you gets beaten easily. The people cheer as you knock down each opponent.\n\t\t\t\t\t\t\t\t*set peasants +5\n\t\t\t\t\t\t\t\t*set guards -2\n\t\t\t\t\t\t\t\t*set health +25\n\t\t\t\t\t\t\t\t*set dark +5\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto tournament\n\t\t\t\t\t*hide_reuse #Ask who gave them the resources and permission to organize this tournament.\n\t\t\t\t\t\t\"Well, it's tradition, my liege…we didn't think you would mind. We use extra rations and funds as part of our budget. In fact, I think every man participating has contributed a little.\"\n\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t#\"If you have extra funds and rations, they need to be given back to the treasury, not wasted away for your own amusement!\"\n\t\t\t\t\t\t\t\t\"Of course! I am sorry, Lord ${name}. I will distribute 100 Gold Pieces back to the treasury.\" \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThe men hear of this, and many look disheartened. A few withdraw from the tournament, while others continue. \n\t\t\t\t\t\t\t\t*set guards -2\n\t\t\t\t\t\t\t\t*set gold +100\n\t\t\t\t\t\t\t\t*goto guards\n\t\t\t\t\t\t\t#\"I see…well, continue then.\"\n\t\t\t\t\t\t\t\t\"Thank you!\" The fighters start to gather for the tournament.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto guards\n\t\t\t\t\t\t\t#\"That seems like a paltry prize for a tournament. I shall reward 100 Gold Pieces to the winner! Then we should see some real action.\"\n\t\t\t\t\t\t\t\tThe men hear your words and look overjoyed. Soon, many more join the tournament. \n\t\t\t\t\t\t\t\t*set guards +2\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto guards\n\t\t\t*disable_reuse *selectable_if (druids > 0) #Visit the Druids.\n\t\t\t\tThey welcome you. One female Druid approaches. \"I understand you rejected the farmers' request to drain the swamps. We are grateful to have such an intelligent Lord. Please take this health potion we made. It comes from the resources the swamp provides us.\" After much pleasant conversation, you decide to leave.\n\t\t\t\t*page_break\n\t\t\t\t*set potion +1\n\t\t\t\t*achieve druid\n\t\t\t\t*goto day1\n\t\t\t*hide_reuse #Visit the merchant, Edward.\n\t\t\t\tEdward is busy trying to organize the merchants. He doesn't see you.\n\t\t\t\t*fake_choice\n\t\t\t\t\t*selectable_if (merchants > 4) #Greet him in a friendly yet lordly manner.\n\t\t\t\t\t\tEdward is surprised to see you. He gives you a quick status of how the work is going and asks if you came for any particular reason. \n\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t*selectable_if (gold > 99) #\"I feel you need more funds to complete your work…here is an additional 100 Gold Pieces.\"\n\t\t\t\t\t\t\t\t*set merchants +2\n\t\t\t\t\t\t\t\t*set gold -100\n\t\t\t\t\t\t\t\t*set merchant_edward +1\n\t\t\t\t\t\t\t\tHe looks overjoyed and tells you this will go a long way. After much conversation, you decide to walk back to the castle. \n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto day1\n\t\t\t\t\t\t\t#\"I just came to encourage you and to let you know I'm here if you need anything.\"\n\t\t\t\t\t\t\t\t*set merchants +1\n\t\t\t\t\t\t\t\tHe thanks you, and the two of you talk for quite some time. Eventually, you leave.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto day1\n\t\t\t\t\t#Leave.\n\t\t\t\t\t\tYou decide to leave.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto day1\n\t\t\t*hide_reuse #Talk to the servants.\n\t\t\t\tIt is mostly uneventful. You also notice a group of servants having a difficult time cleaning the stables.\n\t\t\t\t*fake_choice\t\n\t\t\t\t\t#Tell them I appreciate their hard work.\n\t\t\t\t\t\tOne of the servants responds to you. \"Thank you, my liege!\"\n\t\t\t\t\t\t*set light +1\n\t\t\t\t\t\t*set servants +1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto day1\n\t\t\t\t\t#Help the servants clean the stables.\n\t\t\t\t\t\t*set light +2\n\t\t\t\t\t\tIt isn't the lordliest duty, but the servants appreciate your help.\n\t\t\t\t\t\t*set rule -1\n\t\t\t\t\t\t*set servants +5\n\t\t\t\t\t\t*goto day1\n\t\t\t\t\t#Tell them to work harder.\n\t\t\t\t\t\tOne of the servants responds to you. \"Yes, my liege!\"\n\t\t\t\t\t\t*set dark +2\n\t\t\t\t\t\t*set light -1\n\t\t\t\t\t\t*set servants -1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto day1\n\t\t\t*hide_reuse *selectable_if (farmers > 9) #Spend time with the farmers.\n\t\t\t\tYou talk to the farmers, and they appreciate it.\n\t\t\t\t*set farmers+1\n\t\t\t\t*page_break\n\t\t\t\t*goto day1\n\t\t\t*hide_reuse #Walk around the castle's walls.\n\t\t\t\t*if defenses = 2 \n\t\t\t\t\tThey're in horrible shape. You really must fix them. If anyone were to attack your castle, they would have no problem getting inside the walls. A light wind could probably knock over certain parts of this wall. \n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto day1\n\t\t\t\t*if defenses > 2\n\t\t\t\t\tThe walls look to be in better condition. Workers continue to improve it. You may have a good defensive position here soon. \n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto day1\n\t\t\t*hide_reuse *selectable_if (magicians > 0) #Visit the magicians.\n\t\t\t\tThe magicians greet you warmly and ask you to come into their quarters. After many minutes of conversation with the head magician, you notice several interesting things in the room. What do you ask about?\n\t\t\t\t*fake_choice\n\t\t\t\t\t#The golden amulet on the altar.\n\t\t\t\t\t\tThat is an amulet of agility. It grants the wearer +1 Agility.\n\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t#Offer to buy it.\n\t\t\t\t\t\t\t\t\"Well, it's not really for sale…\"\n\t\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t\t*selectable_if (diplomacy > 1) #Tell him it would be of tremendous use to me.\n\t\t\t\t\t\t\t\t\t\tAfter much debate, you finally convince him. He gives you the necklace. You feel it best to leave before he changes his mind. \n\t\t\t\t\t\t\t\t\t\t*set agility +1\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto day1\n\t\t\t\t\t\t\t\t\t#Demand it, then.\n\t\t\t\t\t\t\t\t\t\tThe magician looks at you sternly but finally hands it over. You decide it would be best to leave.\n\t\t\t\t\t\t\t\t\t\t*set dark +5\n\t\t\t\t\t\t\t\t\t\t*set magicians -1\n\t\t\t\t\t\t\t\t\t\t*set agility +1\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto day1\n\t\t\t\t\t\t\t\t\t*selectable_if (gold > 499) #Offer 500 Gold Pieces for it.\n\t\t\t\t\t\t\t\t\t\tAfter much debate, you finally convince him. He gives you the necklace. You feel it best to leave before he changes his mind. \n\t\t\t\t\t\t\t\t\t\t*set agility +1\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto day1\n\t\t\t\t\t\t\t\t\t#Never mind, then.\n\t\t\t\t\t\t\t\t\t\t\"Thank you, my liege. You would be surprised how often people try to buy things from me, and when they realize they can't, they start demanding it.\" You end your conversation on a happy note and decide to leave.\n\t\t\t\t\t\t\t\t\t\t*set light +1\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto day1\n\t\t\t\t\t\t\t#Demand that he give it to me.\n\t\t\t\t\t\t\t\tHe flatly refuses.\n\t\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t\t#Take it by force.\n\t\t\t\t\t\t\t\t\t\t*image wizard.png\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tYou suddenly feel a force pushing you to the ceiling. Then, you're suddenly driven into the ground. The last thing you remember is the magician muttering something about arrogant Lords.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\tYou wake up some hours later and find out that the magician has left.\n\t\t\t\t\t\t\t\t\t\t*set magicians -1\n\t\t\t\t\t\t\t\t\t\t*goto day1\n\t\t\t\t\t\t\t\t\t*selectable_if (diplomacy > 1) #Tell him if he doesn't, he'll regret it.\n\t\t\t\t\t\t\t\t\t\t\tThe magician looks at you sternly but finally hands it over. You decide it would be best to leave now. \n\t\t\t\t\t\t\t\t\t\t\t*set dark +10\n\t\t\t\t\t\t\t\t\t\t\t*set agility +1\n\t\t\t\t\t\t\t\t\t\t\t*set magicians -1\n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t*goto day1\n\t\t\t\t\t#The massive number of scrolls on the table.\n\t\t\t\t\t\t\"Ah yes…we know many spells…would you like to learn one?\"\n\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t*selectable_if (intelligence > 1) #\"Yes.\"\n\t\t\t\t\t\t\t\t\"Any spell in particular?\"\n\t\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t\t*selectable_if (light > 50) #A healing spell.\n\t\t\t\t\t\t\t\t\t\tHe teaches you the spell. You t +1\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto round2\n\t\t\t\t*selectable_if (unarmed \u003c 1) #Act defensively.\n\t\t\t\t\t\tYou take several more hits; his weapon has such a long reach that it's hard to block all the blows.\n\t\t\t\t\t\t*set health -10\n\t\t\t\t\t\t\n\t\t\t\t\t\tEventually, you spot an opportunity to strike back, and you hit him hard, causing him to drop his spear. He offers his surrender. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYour Health is ${health}.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Surrender? No…hit him as hard as I can.\n\t\t\t\t\t\t\t\tYou hit him so hard that he flies eight feet back. The peasants watching cheer, but your head guardsman frowns.\n\t\t\t\t\t\t\t\t*set peasants +2\n\t\t\t\t\t\t\t\t*set guards -1\n\t\t\t\t\t\t\t\t*set dark +2\n\t\t\t\t\t\t\t\t*set light -2\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto round2\n\t\t\t\t\t\t\t#End the match.\n\t\t\t\t\t\t\t\tYou end the match. You have won. \n\t\t\t\t\t\t\t\t*set guards +1\n\t\t\t\t\t\t\t\t*set light +1\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto round2\n\t\t*selectable_if (unarmed > 0) #Attempt to disarm him.\n\t\t\tHe gets in a couple of hits, but you soon disarm him and are now holding his spear.\n\t\t\t*set health -10\n\t\t\t\n\t\t\tYour Health is ${health}.\n\t\t\t*page_break\n\t\t\tWhat now?\n\t\t\t*choice\n\t\t\t\t#Attack with the spear.\n\t\t\t\t\tYou attack with the spear. He's no match for you and quickly offers his surrender.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Surrender? No…hit him as hard as I can.\n\t\t\t\t\t\t\tYou smash the spear so hard into him that he flies eight feet back. The peasants watching cheer, but your head guardsman frowns.\n\t\t\t\t\t\t\t*set peasants +2\n\t\t\t\t\t\t\t*set guards -1\n\t\t\t\t\t\t\t*set dark +2\n\t\t\t\t\t\t\t*set light -2\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto round2\n\t\t\t\t\t\t#End the match.\n\t\t\t\t\t\t\tYou end the match. You have won. \n\t\t\t\t\t\t\t*set guards +1\n\t\t\t\t\t\t\t*set light +1\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto round2\n\t\t\t\t#Throw the spear as hard as I possibly can.\n\t\t\t\t\tYou hit him directly in the chest, and he falls over. You have won the match.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto round2\n\t\t\t\t#Drop the spear and continue to fight him with my fists.\n\t\t\t\t\tThe crowd roars and cheers at your gesture. It's a difficult fight, but you manage to prevail.\n\t\t\t\t\t*set health -20\n\t\t\t\t\t*set peasants +10\n\t\t\t\t\t*set guards +1\n\t\t\t\t\t*set strength +1\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto round2\n\n*label round2\nDo you wish to change weapons before you enter the next round?\t\t\n*choice\n\t#Yes.\n\t\t*set staff 0\n\t\t*set sword_and_shield 0\n\t\t*set short_sword 0\n\t\t*set spear 0\n\t\t*set unarmed 0\n\t\t*set two_handed_sword 0\n\t\tAll right, then!\n\t\t*page_break\n\t\tWhich weapon do you choose?\n\t\t*choice\n\t\t\t#The staff.\n\t\t\t\tYou choose the staff.\n\t\t\t\t*set staff 1\n\t\t\t\t*page_break\n\t\t\t\t*goto 2_round\n\t\t\t#The sword and shield.\n\t\t\t\tYou take the sword and shield and prepare for the first round.\n\t\t\t\t*set sword_and_shield 1\n\t\t\t\t*page_break\n\t\t\t\t*goto 2_round\n\t\t\t#The two-handed sword.\n\t\t\t\tYou choose the two-handed sword and prepare for the first round.\n\t\t\t\t*set two_handed_sword 1\n\t\t\t\t*page_break\n\t\t\t\t*goto 2_round\n\t\t\t#The short sword.\n\t\t\t\tYou choose the short sword and prepare for the first round.\n\t\t\t\t*set short_sword 1\n\t\t\t\t*page_break\n\t\t\t\t*goto 2_round\n\t\t\t#The wooden spear.\n\t\t\t\tYou take the wooden spear and prepare for the first round.\n\t\t\t\t*set spear 1\n\t\t\t\t*page_break\n\t\t\t\t*goto 2_round\n\t\t\t#None of them, I shall enter this tournament unarmed.\n\t\t\t\tYou stun the crowd. You must be rather confident in yourself.\n\t\t\t\t*set unarmed 1\n\t\t\t\t*set peasants +2\n\t\t\t\t*page_break\n\t\t\t\t*goto 2_round\n\t#No.\n\t\tAll right, then.\n\t\t*goto 2_round\n\t\t\n*label 2_round\nYour second opponent seems to be very agile and is using a short sword. Before you know it, he's already running up to attack you! \n\nHow do you react?\n*choice\n\t*selectable_if (sword_and_shield > 0) #I block his blows with my shield and stay on the defensive.\n\t\tHe does minimum damage to you, and quickly tires.\n\t\t*set health -5\n\t\t*choice\n\t\t\t#Attack him.\n\t\t\t\tYou hit him hard with your sword. Exhausted, he falls over. You have won the second round.\n\t\t\t\t*goto round3\n\t\t\t#Let him tire further.\n\t\t\t\tSomehow, he regains his energy and is soon attacking you will full force again. He connects with several blows.\n\t\t\t\t*set health -15\n\t\t\t\t*page_break\n\t\t\t\t*goto nowwhat\n\t*selectable_if (spear > 0) #I let him come to me, and when he does, I strike hard with my spear.\n\t\t\tHe was expecting you to take that action, and he quickly parries your spear and soon his short sword is coming at you with full force.\n\t\t\t*choice\n\t\t\t\t*selectable_if (agility > 1) #Attempt to dodge the blow.\n\t\t\t\t\tHe swings, but you manage to somehow dodge the blow. \n\t\t\t\t\t*goto nowwhat\n\t\t\t\t*selectable_if (strength > 1) #Drop the spear and tackle him.\n\t\t\t\t\tHe manages to get a couple blows on you, but soon you're on top of him, and you pummel him into submission. You have won the round. \n\t\t\t\t\t*set health -10\n\t\t\t\t\t\n\t\t\t\t\tYour Health is ${health}.\n\t\t\t\t\t*goto round3\n\t\t\t\t*selectable_if (leadership > 1) #Take the blow, but counterattack soon after.\n\t\t\t\t\t*set health -10\n\t\t\t\t\tYou take the blow but then attack with one of your own. You hit him hard and he flies several feet, however, to your surprise he gets back up. \n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto nowwhat\n\t\t\t\t#Take the blow.\n\t\t\t\t\tHe furiously hits in a series of blows.\n\t\t\t\t\t*set health -20\n\t\t\t\t\t*page_break\n\t\t\t\t\tEventually, you get the upper hand and attack him when he's vulnerable, but you've received much damage in the process.\n\t\t\t\t\t\n\t\t\t\t\tYour Health is ${health}. \n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto nowwhat\n\t#I charge at him.\n\t\tYou charge at him, but the moment you get close, he dodges away. He strikes you and quickly moves back. You begin to tire…\n\t\t*set health -10\n\t\t\n\t\tYour Health is ${health}.\n\t\t*page_break\n\t\t*goto nowwhat\n\t*selectable_if (unarmed \u003c 1) #I fight with an equal amount of offense and defense.\n\t\tYou fight well, but soon you both tire. \n\t\t*set health -5\n\t\t*page_break\n\t\tYour Health is ${health}.\n\t\t\n\t\t*page_break\n\t\t*goto nowwhat\n\t*selectable_if (unarmed > 0) #I stay on the defensive.\n\t\tHe expected you to attack, so little fighting is done.\n\t\t*page_break\n\t\t*goto nowwhat\n\t\t\n*label nowwhat\nHe taunts you to attack him, smiling often. \n*choice\n\t#Attack him.\n\t\tHe expects this and viciously hits you in the face. He laughs, taunting you even more than before. \n\t\t*set health -25\n\t\t\n\t\tYour Health is ${health}.\n\t\t*page_break\n\t\t*choice\n\t\t\t*selectable_if (health > 50) #Fight on.\n\t\t\t\tYou fight on, and surprisingly, you eventually overtake him. You have won the round, though you've taken a lot of hits. \n\t\t\t\t*set health -15\n\t\t\t\tYour Health is ${health}.\n\t\t\t\t*page_break\n\t\t\t\t*goto round3\n\t\t\t#He is clearly the better fighter…I will let him have this victory.\n\t\t\t\t*page_break\n\t\t\t\t*goto lost_tournament\n\t\t\t*selectable_if (dark > 50) #\"You dare attack your Lord in such a manner? I will have you flogged if you keep this up.\"\n\t\t\t\tFor a moment, he hesitates and lowers his weapon.\n\t\t\t\t*choice\n\t\t\t\t\t#Attack him while he's vulnerable.\n\t\t\t\t\t\tYou hit him when he least expects it. You have won the round, even if it was with a bit a trickery. \n\t\t\t\t\t\t*set dark +2\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto round3\n\t\t\t\t\t#Wait for him to get into his attack posture. \n\t\t\t\t\t\tHe nods and quits taunting you. You fight for several more minutes; eventually, you overtake him and win the battle, but you've taken many blows in the process.\n\t\t\t\t\t\t*set health -15\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto round3\n\t*selectable_if (agility > 0) #Wait for the right moment to strike.\n\t\tYou don't let his tauning get to you, and soon you have the upper hand when he attacks and you take it. You get hit a few times, but you soon have him on the ground. You have won. \n\t\t*set health -10\n\t\t\n\t\t\n\t\tYour health is ${health}.\n\t\t*page_break\n\t\t*goto round3\n\t*selectable_if (agility > 1) #Feint an attack.\n\t\tHe takes the bait and dodges, expecting you to be somewhere else; however, you're at the same spot you were before. You quickly hit him with all your might, and he falls. The crowd cheers! You have won the round. \n\t\t*set peasants +2\n\t\t*page_break\n\t\t*goto round3\n\t*selectable_if (spear > 0) #Throw my spear.\n\t\tThe spear hits him slightly in the leg, but not enough to do serious damage. Soon he is upon you, and he's attacking with full force.\n\t\t*choice\n\t\t\t#Fight with my fists.\n\t\t\t\tHe pummels you again and again; however, you don't give up. Eventually, you see an opening and hit him as hard as you possibly can. You have won the round. \n\t\t\t\t*set health -25\n\t\t\t\t*page_break\n\t\t\t\t*goto round3\n\t\t\t*selectable_if (agility > 1) #Dodge his blows and wait for the right moment.\n\t\t\t\tHe gets arrogant thinking you're defenseless, but you quickly counter with a vicious blow. He is knocked out. You have won the round. \n\t\t\t\t*page_break\n\t\t\t\t*goto round3\n\t\t\t#Attempt to regain the spear.\n\t\t\t\tHe expects this and continues to pummel you, blow after blow. Eventually, you regain the spear. \n\t\t\t\t*set health -20\n\t\t\t\t*page_break\n\t\t\t\tWhat now?\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (strength > 1) #Break the long spear in half to make a short spear.\n\t\t\t\t\t\tSurprisingly, you fight better with the shorter spear. Eventua 0\n\t\t\t\t\t\t\t\t\t\t\tYou hit him with a vicious uppercut that temporarily stuns him, and then you hit him with a flurry of blows. He falls to the ground and is unable to continue. You have won the round.\n\t\t\t\t\t\t\t\t\t\t*if agility > 0\n\t\t\t\t\t\t\t\t\t\t\tYou hit him with a vicious uppercut that temporarily stuns him, and then you hit him with a flurry of blows. He falls to the ground and is unable to continue. You have won the round.\n\t\t\t\t\t\t\t\t\t\tYou hit him with an uppercut, but it does little damage to him. He decides to take this fight seriously, and begins to act in a more defensive manner. Eventually, he wears you down. He hits you with a massive blow that sends you flying. You're unable to continue. You may have lost the round, but you have gained the respect of a few guards. \n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto lost_tournament\n\t\t\t\t\t\t\t\t\t#Throw sand into his eyes.\n\t\t\t\t\t\t\t\t\t\tEven though this move is rather dishonorable, it is quite effective. It temporarily blinds him, allowing you to attack him with a series of punches and kicks. He falls to the ground and is unable to continue. You have won the round!\n\t\t\t\t\t\t\t\t\t\t*set guards -1\n\t\t\t\t\t\t\t\t\t\t*set dark +10\n\t\t\t\t\t\t\t\t\t\t*set light -2\n\t\t\t\t\t\t\t\t\t\t*page_break\t\n\t\t\t\t\t\t\t\t\t\t*goto round3\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*selectable_if (strength > 0) #Use all my Strength to pull the spear out from under him. \n\t\t\t\t\t\t\t\tYou manage to pull the spear out from under him. It catches him off guard, and he falls hard to the ground. \n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Hit him while he's down.\n\t\t\t\t\t\t\t\t\t\tYou strike him hard, and win the round!\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto round3\n\t\t\t\t\t\t\t\t\t#Back away and let him get up.\n\t\t\t\t\t\t\t\t\t\tThough noble, this gesture may cost you, as after a few moments he gets up more guarded then before. \n\t\t\t\t\t\t\t\t\t\t*set light +5\n\t\t\t\t\t\t\t\t\t\tAt least he's taking this fight seriously now…is that a good thing?\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tWhat do you do?\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Use the break in the fighting to rest for a moment.\n\t\t\t\t\t\t\t\t\t\t\t\t*set health +10\n\t\t\t\t\t\t\t\t\t\t\t\tYou lean against your spear and rest for a moment. Soon, he is upon you.\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Hit him with the butt of my spear.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tThis motion catches him off guard, as he was expecting you to strike in a forward motion. He hits the ground hard. You have won the round!\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto round3\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Tackle him.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou tackle him, but he starts hitting you with his elbow and the end of the short sword, but you pummel him into submission. You have won the round. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set health -5\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto round3\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Stab him with my spear.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tHe dodges your spear and manages to grab it. He pulls you forward and thrusts his dagger hard into your shoulder. Even though it's wooden, it penetrates your skin and you see blood spill out.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set health -10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Head-butt him.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou hit him hard, and he falls over. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou have won the round!\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto round3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Knee him.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe attack takes him by surprise, and he lets go of the spear.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Knee him again.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tHe's ready this time and blocks it. The battle gets bloody, but since he's disarmed, he's unable to form a proper counter attack. You eventually win the round, but not before taking several hits.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set health -15\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto round3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Hold the spear horizontally and hit him.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou hit him hard in the head. He falls to the ground. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou have won the round!\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto round3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Attempt to trip him with the spear.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if agility > 0\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou successfully trip him, and he hits the ground hard.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou have won the round!\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto round3\n\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tHe manages to stay on his feet, then he suddenly grabs you spear and takes it away from you!\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tWhat do you do?\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Rip the short sword out of my shoulder and continue fighting.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe fighting is brutal, but he isn't as skilled with the spear as he was with the short sword. Eventually, you overpower him and win the round, but not before taking a couple blows in the process. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set health -10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto round3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Charge him.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tHe hits you with all his force with the tip of the spear. You hear a cracking noise.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if health \u003c 15 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe rest is a blur…it appears you have lost the round and possibly been severely injured. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto lost_tournament\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if health > 15\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set health -10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe cracking sound ends up being the spear breaking in half.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYour opponent is stunned that you're still standing.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Attack him.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou take this opportunity to attack him, and he's caught off guard. You have won the round!\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto round3\n\n*label round3\nThis is the final round, which weapon will you use? \t\t\n\n*if health > 1\n\tYour Health is ${health}.\n\n*if health \u003c 1\n\tYour Health is very low, and you can barely stand. \n*set staff 0\n*set sword_and_shield 0\n*set short_sword 0\n*set spear 0\n*set unarmed 0\n*set two_handed_sword 0\n*choice\n\t#The staff.\n\t\tYou choose the staff.\n\t\t*set staff 1\n\t\t*page_break\n\t\t*goto battle\n\t#The sword and shield.\n\t\tYou take the sword and shield and prepare for the first round.\n\t\t*set sword_and_shield 1\n\t\t*page_break\n\t\t*goto battle\n\t#The two-handed sword.\n\t\tYou choose the two-handed sword and prepare for the first round.\n\t\t*set two_handed_sword 1\n\t\t*page_break\n\t\t*goto battle\n\t#The short sword.\n\t\tYou choose the short sword and prepare for the first round.\n\t\t*set short_sword 1\n\t\t*page_break\n\t\t*goto battle\n\t#The wooden spear.\n\t\tYou take the wooden spear and prepare for the first round.\n\t\t*set spear 1\n\t\t*page_break\n\t\t*goto battle\n\t#None of them, I shall enter this tournament unarmed.\n\t\tYou stun the crowd. You must be rather confident in yourself.\n\t\t*set unarmed 1\n\t\t*set peasants +2\n\t\t*page_break\n\t\t*goto battle\n\t*disable_reuse #Attempt to see what my opponent is using. (This is against the rules of the tournament.)\n\t\tHe's using a two-handed sword.\n\t\t*set dark +1\n\t\t*page_break\n\t\t*goto round3\n\t*if healing > 0\n\t\t*disable_reuse *selectable_if (health \u003c 100) #Take a healing potion. (This is against the rules of the tournament.)\n\t\t\t*set dark +5\n\t\t\t*set light -5\n\t\t\tYou feel refreshed.\n\t\t\t*set health 100\n\t\t\t*page_break\n\t\t\t*goto round3\n\t#Leave the tournament.\n\t\tYou concede to your opponent. \n\t\t*page_break\n\t\t*goto lost_tournament\n\t\n*label battle\nOut steps an opponent of immense size. He has a two-handed sword, but it looks like he's holding it with one hand. \n\nWhat do you do?\n*choice\n\t*selectable_if (strength > 1) #He may have size, but he's arrogant. He probably expects me to back down, but I'll charge him instead.\n\t\tYou catch your opponent off guard and hit him with a few vicious blows, ones that would knock out any normal man; however, he's still standing with barely a scratch on him. \n\t\t*choice\t\n\t\t\t#Attack even harder.\n\t\t\t\tYou continue to press the attack, and eventually, he regains his composure and hits you with a vicious blow to the head. You fall to the ground and are unable to get up. You have lost the round.\n\t\t\t\t*page_break\n\t\t\t\t*goto lost_tournament\n\t\t\t#Attack with my weapon with an equal amount of offense and defense.\n\t\t\t\tThe fight is vicious, and neither opponent seems to be letting up. \n\t\t\t\t*set health -10\n\t\t\t\t\n\t\t\t\tWhat do you do?\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (health > 25) #Continue my current strategy.\n\t\t\t\t\t\tHe eventually overpowers you. You have lost the round. \n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto lost_tournament\n\t\t\t\t\t*selectable_if (health > 50) #Switch to a more defensive posture.\n\t\t\t\t\t\tYou realize his size is too much to take head on, so you decide to fight more defensively, and it pays off. Though you take many blows, he opens himself up at a critical moment. You strike hard and win the round!\n\t\t\t\t\t\t*set health -10\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto victory\n\t\t\t\t\t#Fight more offensively.\n\t\t\t\t\t\tHe eventually overpowers you. You have lost the round. \n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto lost_tournament\n\t#Fight defensively.\n\t\tHe hits you hard, but you manage to block most of his blows. Suddenly, you see him winding up to hit you hard from the side.\n\t\t*Set health -5\n\t\t*choice\n\t\t\t*selectable_if (agility > 0) #Dodge out of the way at the last moment.\n\t\t\t\tYou manage to narrowly avoid his blow. He is now off balance. You take the opportunity and strike him hard. He is knocked down to the ground, unconscious. You have won the round!\n\t\t\t\t*page_break\n\t\t\t\t*goto victory\n\t\t\t#Brace myself for the hit.\n\t\t\t\tYou're knocked hard to the ground in great pain. The great giant looms over you. He doesn't give you a chance to get back up, you hear a crack, and blood falls down, covering your eyes. You have lost the round. \n\t\t\t\t*page_break\n\t\t\t\t*goto lost_tournament\n\t\t\t#Quickly strike before he can.\n\t\t\t\t*if unarmed > 0\n\t\t\t\t\tYou try to hit him with your fist before he strikes, but you're half a second too late. He hits you hard on the top of the head, and you fall over, defeated. \n\t\t\t\t\t*goto lost_tournament\n\t\t\t\t*if short_sword > 0\n\t\t\t\t\tYou manage to hit him hard with your short sword. He staggers back, and you use the moment to deliver a final blow, making him fall to the ground. You have won the round!\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto victory\n\t\t\t\t*if two_handed_sword > 0\n\t\t\t\t\tYou strike at the same moment he does, and your swords clash. You are now in a sword lock with the immense giant. \n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Use all my Strength to overcome him.\n\t\t\t\t\t\t\t*if strength > 1\n\t\t\t\t\t\t\t\tThe crowd is in awe as you slowly overcome the giant's strength and push him to the ground. \n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Attack him while he's down.\n\t\t\t\t\t\t\t\t\t\tYou hit him hard in the head with a swift sword strike. Your opponent is knocked unconscious. You have won!\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto victory\n\t\t\t\t\t\t\t\t\t#Let him get up.\n\t\t\t\t\t\t\t\t\t\t*set light +5\n\t\t\t\t\t\t\t\t\t\t*if dark > 1\n\t\t\t\t\t\t\t\t\t\t\t*set dark -2\n\t\t\t\t\t\t\t\t\t\tThe giant slowly gets up, confused at your gesture. It doesn't last long though, and soon he's charging you with his full might. \n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Attempt to trip him.\n\t\t\t\t\t\t\t\t\t\t\t\t*if agility \u003c 2\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou attempt to trip him, but he's ready for this, moving with a suprising amount of grace for such a large giant, and whacks you hard across the chest. You fall to the ground in agony. Before you can do anything, he hits you repeatedly with his sword until you black out from the pain. \n\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto lost_tournament\n\t\t\t\t\t\t\t\t\t\t\t\tYou narrowly miss his strike, then trip him with your leg. He falls to the ground with a mighty thud, struggling to get back up on his feet. You use the opportunity to run up and strike him hard. He falls over. You have won the round!\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t*goto victory\n\t\t\t\t\t\t\t\t\t\t\t#Charge at him as well.\n\t\t\t\t\t\t\t\t\t\t\t\tYou charge him at full pace, and you both attack simultaneously… \n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\tFor a moment, you aren't sure what happened. You hear the crowd yelling, but everyone sounds muffled. You manage to look up and see that you're on the ground, ten feet away from where you stood before…and so is the giant. He's attempting to get up.\n\t\t\t\t\t\t\t\t\t\t\t\t*set health -10\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Attempt to get up.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if strength \u003c 2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou manage to get up, but not before the giant does. He hits you with a vicious blow, and you're sent flying another ten feet. You land on the ground with a hard thud. Dust and blood cover your face. You have lost the round.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto lost_tournament\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou manage to get up first. You run up to the giant just as he's about to steady himself and hit him as hard as you can, almost flipping him over. He is knocked out instantly. You have won the round.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto victory\n\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if (spear > 0) #Throw my spear at the giant.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe giant is almost up and about to charge you. You raise the spear, steadying it with your hand. You throw the spear with all your might…\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if agility \u003c 1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe spear misses. The giant rises with his weapon and hits you hard on the head, throwing you another ten feet. Dust and blood cover your face. You have lost the round. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto lost_tournament\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe spear hits him hard in the head. He falls to the ground, unconscious. You have won the round!\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto victory\n\t\t\t\t\t\t\t\t\t\t\t#Brace for impact.\n\t\t\t\t\t\t\t\t\t\t\t\tYou're knocked hard to the ground in great pain. The great giant looms over you. Unlike you, he doesn't give you a chance to get back up; you hear a crack, and blood falls down, covering your eyes. You have lost the round. \n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t*goto lost_tournament\n\t\t\t\t\t\t\tYou attempt to strike him, but it's too latel his sword hits you hard before you can strike, and you fall to the ground with a loud thud. You try to get up, but you're unable to. You have lost the round. \n\t\t\t\t\t\t\t*set health -5\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto lost_tournament\n\t\t\t\t\t\t#Move back to break the hold.\n\t\t\t\t\t\t\tYou attempt to move back, but he uses the momentum to push you over. He then attacks you viciously. He pins you to the ground. He lifts his arms high to strike you a final blow. \n\t\t\t\t\t\t\t*set health -10\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Attempt to escape his pin.\n\t\t\t\t\t\t\t\t\tYou attempt to escape his pin…\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t*if agility > 1\n\t\t\t\t\t\t\t\t\t\tYou somehow manage to escape his pin, and he roars with anger. He runs up and attempts to grab you again.\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Knee him in the face.\n\t\t\t\t\t\t\t\t\t\t\t\tYou knee him directly in the face. It causes him to stagger back and land on one knee. You take advantage of the opportunity, running up and striking him hard in the chest, then the head. He falls to the ground and is knocked out. You have won the round!\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t*goto victory\n\t\t\t\t\t\t\t\t\t\t\t#Dodge out of the way.\n\t\t\t\t\t\t\t\t\t\t\t\tYou try to dodge him, but he manages to catch you. He now has you in a choke hold…you feel the world around you getting hazy…sounds muffle. \n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Elbow him in the face.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou hit him hard in the face, but he doesn't let up his choke. Eventually, everything goes black and you pass out. You have lost the round. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set health -5\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto lost_tournament\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Knee him in the groin.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou hit him with the low blow. The pain causes him to stop, and you use the moment to your advantage by kicking him repeatedly. Some members of the crowd boo, while others laugh and cheer. Eventually, the giant cannot take any more of your attacks and holds his hands up in surrender.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set dark +2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set light -2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Accept his surrender.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou accept his surrender. You have won the round. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto victory\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Continue my assault.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set dark +5\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou continue to kick him until he's unconscious. You have won the round. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto victory\n\t\t\t\t\t\t\t\t\tYou're unable to escape; he hits you hard with his sword. You hear a cracking noise and are unsure whether it's the sword or your skull making it. You soon fall unconscious. You have lost the round.\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t*goto lost_tournament\n\t\t\t\t\t\t\t\t#Knee him in the groin.\n\t\t\t\t\t\t\t\t\tYou hit him with the low blow. The pain causes him to stop, and you use the moment to your advantage by kicking him repeatedly. Some members of the crowd boo, while others laugh and cheer. Eventually, the giant cannot take any more of your attacks and holds his hands up in surrender.\n\t\t\t\t\t\t\t\t\t*set dark +2\n\t\t\t\t\t\t\t\t\t*set light -2\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#Accept his surrender.\n\t\t\t\t\t\t\t\t\t\t\tYou accept his surrender. You have won the round. \n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t*goto victory\n\t\t\t\t\t\t\t\t\t\t#Continue my assault.\n\t\t\t\t\t\t\t\t\t\t\t*set dark +5\n\t\t\t\t\t\t\t\t\t\t\tYou continue to kick him until he's unconscious. You have won the round. \n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t*goto victory\n\t\t\t\t\t\t\t\t#Push him off.\n\t\t\t\t\t\t\t\t\t*if strength > 2 \n\t\t\t\t\t\t\t\t\t\tSomehow, you manage to push him away. You quickly stand up and get into fighting position. \n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\tHe roars in anger and starts swinging at you wildly.\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Attempt to parry the blows.\n\t\t\t\t\t\t\t\t\t\t\t\tYou attempt to parry the blows, but several hit you.\n\t\t\t\t\t\t\t\t\t\t\t\t*set health - 25\n\t\t\t\t\t\t\t\t\t\t\t\t*if health \u003c 25\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou fall to the ground and try to get up, but cannot. Unable to escape, he hits you hard with his sword. You hear a cracking noise and are unsure whether it's the sword or your skull making it. You soon fall unconscious. You have lost the round.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto lost_tournament\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t*if agility > 1 \n\t\t\t\t\t\t\t\t\t\t\t\t\tSuddenly, you have a moment of clarity and see an opening. You swing hard at his face, striking him. He falls over with a thud. You have won the round.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto victory\n\t\t\t\t\t\t\t\t\t\t\t\tYou fall to the ground, unable to hold your sword let alone your own weight. He kicks you and points the sword at your throat. \n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Smile and nod in agreement that he has won.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe giant turns around and lifts his hands high in the air in victory. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Walk away and let the giant receive his praise.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou leave the giant to receive his well-deserved praise.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set light +1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto lost_tournament\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Go up to congratulate the giant.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe giant ignores you, still roaring with the crowd.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Wait until he turns around.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tHe continues to ignore you. Finally, he turns around and smiles. You try to congratulate him, but he leaves before you can say another word. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set rule -1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto lost_tournament\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Leave.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou leave the giant to receive his well-deserved praise.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto lost_tournament\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Sneak up behind the giant and attack him.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tWhen the giant has his back to you, you sneak up and hit him viciously on the head. He falls to the ground with a thud. He doesn't move…probably unconscious. The crowd is stunned. You have \"won\" the round. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set dark +10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set light -10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set guards -1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto victory\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Refuse to give in.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set light +1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set guards +1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tHe looks at you, bewildered, then he lifts his sword high and hits you hard. You hear a cracking noise and are unsure whether it's the sword or your skull making it. You soon fall unconscious. You have lost the round.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto lost_tournament\n\t\t\t\t\t\t\t\t\t\t\t#Swing back wildly.\n\t\t\t\t\t\t\t\t\t\t\t\tMany of your blows miss, and the ones that do hit he walks off as if you were a child having a tantrum. He hits you hard. You hear a cracking noise and are unsure whether it's the sword or your skull making it. You soon fall unconscious. You have lost the round.\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t*goto lost_tournament\t\n\t\t\t\t\t\t\t\t\t\t\t#Tackle him.\n\t\t\t\t\t\t\t\t\t\t\t\tYou tackle him with amazing speed, making him fall to the ground.\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Drop my sword and start pummeling him with my fists.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou hit him several times; he tries to parry your blows, but soon there's too much blood covering his face.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Continue to hit him.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tHe's unable to block your blows and soon stops defending himself. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Continue hitting him.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou continue to hit him over and over again. Soon, nothing remains of the man but a bloody pulp. The crowd is shocked at the brutality of it…then they suddenly cheer in celebration. You have won the round. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set guards -2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set dark +10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set light -5\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto victory\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Stop.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou stop. Clearly, you have won the round.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set light +2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto victory\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Stop.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou stop, thinking the fight is done, when suddenly he picks you up and slams you to the ground like a rag doll. He has you by both hands, and you're unable to punch him. He starts pushing you back toward the arena's wall. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set health -15\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Head-butt him.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if strength > 1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou head-butt him, and it dazes him enough for you to move out of his grip. You then move around him and shove him into the arena wall with a loud crash. He breaks through the wall and falls to the ground. He tries to get up, but he cannot. You have won the round. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto victory\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYour head-butt does little to stop his momentum. He slams you into the arena wall, and you hear a loud crack, unsure whether the wall has broken or the sound you hear is one of your bones. You are unable to continue. You have lost the round. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set health -5\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto lost_tournament\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Try to flip him over.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou attempt to use the momentum to flip him around…\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if strength > 0\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if agility > 1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tSomehow, you manage to flip the giant man around and slam him into the arena wall. He falls to the ground \t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto lost_tournament\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Fight defensively.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou play it safe, attacking him when he opens himself and staying in a defensive posture. Your attacks wear him down and frustrate him. Eventually, you find an opening for a critical strike. You knock him out with one blow. You have won the round!\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto victory\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Attack him again.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou strike him with your spear…\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tBefore you can pull back to attack again, the giant of a man grabs onto your spear.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Try to pull the weapon free.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tHe overpowers you and knocks you down. You have lost the round.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto lost_tournament\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Let go of the weapon and roll backwards.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou abandon your weapon and roll backwards.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYour opponent now has the spear. You get ready for his next move…\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYour opponent roars loudly, takes the spear, and breaks it in half. The crowd cheers. He then walks up to you, ready to fight with his fists.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Run for the two-handed sword behind him.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou manage to grab the two-handed sword, then you turn around to prepare your attack.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if agility \u003c 3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tAs you turn around, you see his massive fist coming toward you. It's too late to dodge, and he knocks you down. You're too exhausted to continue. You have lost the round. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set health 1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto lost_tournament\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou turn around to see his massive fist coming toward you…\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tSomehow, you manage to dodge the blow. The crowd cheers. What do you do now?\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Charge at him with the sword.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou hit him with the sword, causing some serious damage. You raise your sword to hit him again, when suddenly as you swing down, he grabs the sword in midair.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Try to pull the weapon free.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tHe overpowers you and knocks you down. You have lost the round.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto lost_tournament\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Let go of the weapon.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tWith his two-handed weapon, he's able to defeat you. You have lost the round. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set health 1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto lost_tournament\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Fight defensively.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou fight defensively, hitting him when he strikes and slowly wearing him down. Eventually, you spot an opportunity and knock him flat. You have won the round!\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto victory\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Face him head-on with my fists.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tHe pummels you over and over again.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if health > 24\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou manage to take the blows and hit him back with some of your own. The crowd cheers as the fighting gets brutal.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tSoon, you're both so exhausted that you can barely stand upright.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Call it a draw.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou call the fight a draw, and your opponent agrees. The crowd is disappointed that there's no winner this year. Many peasants disperse dissatisfied; however, a couple guards have gained respect for you.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set guards +2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto day1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Fight on!\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if light > 54\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou manage to knock him down and eventually win the fight; however, you're severely hurt and may even have a few broken bones. Your opponent is rushed to the healers, it looks like he'll survive. You have won the round.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set guards -1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set health 1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto victory\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tHe lands a vicious left hook, causing you to fall down. You're unable to continue. You have lost the round. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto lost_tournament\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tHe lands a vicious left hook, causing you to fall down. You're unable to continue. You have lost t r Lord. I am ordering you to let me through. Understood?\"\n\t\t\t\t\t\t\t\t\t\t\"Okay…\"\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\tWord gets out that you're in the tavern…perhaps it's because of the dozen guards outside. You're unable to overhear any conversations.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto day1\n\t\t\t\t\t\t\t\t\t#Leave.\n\t\t\t\t\t\t\t\t\t\tYou leave.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto day1\n\t\t\t\t\t\n\t\t\t\t\t#\"Fine.\"\n\t\t\t\t\t\tThe guard makes it difficult to talk to anyone in private. Everyone wonders why this peasant is being escorted by a guard. Finally, you decide to leave.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto day1\n\t\t\t#Make something up.\n\t\t\t\tYou talk to the guard about an assassination plot. The guard looks completely confused. \"Sir…I'm sorry, but that makes no sense. If you think there's an assassination plot against you, why would you leave your castle? Please, let me take you back.\" He attempts to signal the other guard. \n\t\t\t\t*choice\n\t\t\t\t\t#Fine.\n\t\t\t\t\t\tYou leave with the guard.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto day1\n\t\t\t\t\t#Hold a knife to the guard's throat. \"Don't even think about it.\"\n\t\t\t\t\t\t*set dark +2\n\t\t\t\t\t\t\"Lord ${name}, what are you doing?\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Slit the guard's throat.\n\t\t\t\t\t\t\t\t*set guards -1\n\t\t\t\t\t\t\t\t*set dark +5\n\t\t\t\t\t\t\t\tYou kill the guard with your dagger. He falls to the ground in a bloody heap. One of the villagers screams, and soon the other guard is upon you.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t*selectable_if (agility > 0) #Run for it.\n\t\t\t\t\t\t\t\t\t\tYou manage to outrun the other guard.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto day1\n\t\t\t\t\t\t\t\t\t#Fight the guard.\n\t\t\t\t\t\t\t\t\t\tThe guard is in full armor with a longsword still sheathed. How do you proceed?\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Charge at him before he can get his longsword out.\n\t\t\t\t\t\t\t\t\t\t\t\tYou charge at the guard, but your attacks do little damage since he's in full armor. He takes out his longsword and thrusts it through your chest.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t\t\t\t\t\t#Throw the dagger at him.\n\t\t\t\t\t\t\t\t\t\t\t\tThe dagger does little damage, but it forces him to block the blow with his armor.\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Grab his longsword.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou grab his longsword and thrust it into a weak part of his armor. He falls to the ground.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Finish him.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou finish him off. Now several guards are running toward you.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set guards -1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set dark +5\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Stand and fight.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe guards eventually overpower you.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Run away.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou run away successfully.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto day1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Run away.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou manage to get away.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto day1\n\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if (agility > 0) #Run up and knee him in the face.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*image muay-thai-150006_1280.png\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou knock the guard out. All of the commotion has resulted in too much attention on you. You're forced to run for it.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto day1\n\t\t\t\t\t\t\t#Put the dagger down.\n\t\t\t\t\t\t\t\tYou put the dagger down. You tell him not to say anything and quickly leave the scene.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto day1\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t#Leave.\n\t\t\t\tYou decide to leave. \n\t\t\t\t*page_break\n\t\t\t\t*goto begin\t\t\t\n\t\t\t\t\n*label bar\nYou spend several moments gathering in the environment around you. You see people of all walks of life here…peasants, farmers, and merchants. The scene is peaceful, but occasionally a fight breaks out. Suddenly, you hear someone speaking to you.\n*page_break\n*image woodblock-33369_1280.png\n\nIt's the barmaid. \"You there. Are you going to drink something or just stand there all night?\"\n\nWhat should you do?\n*choice\n\t*selectable_if (gold > 10) #Order a drink. (10 GP)\n\t\tYou order a drink, and she leaves you alone. After some time has passed, you overhear several different conversations. You learn a great deal about your people and also hear whispers of bandits outside one of the villages.\n\n\n\t\t*image beer.png\n\n\t\t*set intelligence +1\n\t\t*set bandit +1\n\t\t*page_break\n\t\t*goto day1\n\t#Ignore her.\n\t\t\"Hey, I'm talking to you, mister.\" She walks around and speaks to a bulky-looking man. He approaches you.\n\t\t*page_break\n\t\t*image guy.png\n\t\t\n\t\t\"We don't take kindly to freeloaders here. I'm going to have to ask you to leave.\" You notice a few of the bar patrons are watching. What do you do?\n\t\t*choice\n\t\t\t#Punch him in the gut.\n\t\t\t\t*set dark +1\n\t\t\t\tYou hit him hard in the gut, but this man has taken punches before. He quickly straightens up and prepares to attack.\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (agility > 0) #Dodge his punch.\n\t\t\t\t\t\tYou dodge his punch, then the next one, and the next one. He ends up destroying the tables and chairs around him trying to reach you. Finally, the barmaid tells him to forget it.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tBy this time, most of the patrons have left.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Stay.\n\t\t\t\t\t\t\t\t*image punch.png\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tA man in a black cloak approaches you. He hits you hard in the gut, so hard that you cannot move. He crouches down and whispers the following in your ear:\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"You have talent, I will give you that, but you lack discipline. Perhaps you may be useful to us one day, but not today.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tAs he leaves, you pass out, but not before noticing the emblem he has on his arm.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou wake up in the dungeon, and after much convincing the guards finally let you out. You mention the emblem you saw on the man's arm that punched you. The guard frowns and says, \"That emblem has been appearing quite frequently as of late. It's a symbol of a gang of thieves in the city. Perhaps the tavern you visited is one of their hotspots.\" You take a mental note of this and walk back to the castle. \n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*set guards -1\n\t\t\t\t\t\t\t\t*set peasants -5\n\t\t\t\t\t\t\t\t*set thievesguild 1\n\t\t\t\t\t\t\t\t*goto day1\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Leave before the guards come.\n\t\t\t\t\t\t\t\tYou decide to leave before the guards come.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto day1\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t*selectable_if (strength > 0) #Hit him again, but this time much harder.\n\t\t\t\t\t\tYou end up knocking him out.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*image punch.png\n\t\t\t\t\t\t\n\t\t\t\t\t\tA man in a black cloak approaches you. He hits you hard in the gut, so hard that you cannot move. He crouches down and whispers the following in your ear:\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"You have talent, I will give you that, but you lack discipline. Perhaps you may be useful to us one day, but not today.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\tAs he leaves, you pass out, but not before noticing the emblem he has on his arm. You believe it's some kind of Thieves Guild symbol. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\tYou wake up in the dungeon, and after much convincing the guards finally let you out.\n\t\t\t\t\t\t*set guards -1\n\t\t\t\t\t\t*set peasants -5\n\t\t\t\t\t\t*set thievesguild 1\n\t\t\t\t\t\t*goto day1\n\t\t\t\t\t#Shove him.\n\t\t\t\t\t\tYou attempt to shove him, but it only makes the impact of his fist to your face that much worse. You end up getting thrown out.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYour Health is ${health}.\n\t\t\t\t\t\t*set health - 25\n\t\t\t\t\t\t*if health \u003c 1\n\t\t\t\t\t\t\tYou're too injured to continue today. You decide to go to bed. \n\t\t\t\t\t\t\t*set health 25\n\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto day1\n\t\t\t\t\t#Tell him to leave me alone if he knows what's good for him.\n\t\t\t\t\t\tHe laughs, and you end up taking a hard punch to the face. You wake up outside the tavern.\n\t\t\t\t\t\t*set rule -1\n\t\t\t\t\t\t*set health -10\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto day1\n\t\t\t#Leave.\n\t\t\t\tYou leave.\n\t\t\t\t*page_break\n\t\t\t\t*goto day1\n", "choicescript_description": "You are a newly appointed Lord in charge of a small castle. Manage your castle's finances, hire troops, resolve conflicts among the peasants, and bring order to the realm. Expand your power through war, diplomacy, or stealth. Whether you rise or fall is up to you in Swamp Castle.\n\n[i]Tale of a Kingdom - Swamp Castle[/i] is an interactive novel by Philip Kempton where your choices control the story. It's entirely text-based—102,000 words, without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n• Manage the economy of your province by controlling the tax rates.[n/]\n• Decisions you make impact the story and your ability to rule your subjects.[n/]\n• Fight against raiders and even other Lords.[n/]\n• Choose between decisions that could help your subjects or give you additional
