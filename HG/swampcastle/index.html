e.png\n\t\t\n\t\t\"My liege, that would increase our security, but it will also disrupt trade within our castle. Are sure you want to do this?\"\n\t\t*choice\n\t\t\t#\"Yes.\"\n\t\t\t\t*image defense_with_gate.png\n\t\t\t\t\n\t\t\t\t\"Very well…\"\n\n\t\t\t\tYou close the gates to the castle. Several merchants complain, but it allows your guards to better defend your castle.\n\t\t\t\t*page_break\n\t\t\t\t*set merchants -10\n\t\t\t\t*if merchants \u003c 0\n\t\t\t\t\t*set merchants 0\n\t\t\t\t*set guards +5\n\t\t\t\t*page_break\n\t\t\t\t*goto orders\n\t\t\t#\"No.\"\n\t\t\t\t*image defense_no_gate.png\n\t\t\t\t\n\t\t\t\tYou decide to leave the gates open for trade. The merchants are relieved, but it'll make the job of defending the castle more difficult for your guards. \n\t\t\t\t*page_break\n\t\t\t\t*goto orders\n\t*disable_reuse *selectable_if (leadership > 2) #\"I want the guard's watch to be doubled until we know more.\"\n\t\t*image tower-48712_1280.png\n\t\t\n\t\tYou double the guards on the watchtower. \n\t\t\n\t\t*set guards +10\n\t\t*page_break\n\t\t*goto orders\n\t*selectable_if (diplomacy > 0) #\"I want to hear from the other Lords regarding this matter.\" (Requires Diplomacy)\n\t\tGillian states that he will remain neutral in this conflict.\n\t\t\n\t\tVero is currently leading forces to help the King regain control of the Central Province.\n\t\t\n\t\tGensa cannot be reached.\n\t\t*page_break\n\t\t*goto orders\n\t#\"That is all for now.\"\n\t\t\"Very well…\"\n\t\t*page_break\n\t\t*goto main_story\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n*label main_story\n*if militia \u003c 0\n\tset militia 0\n*if guards \u003c 0\n\tset guards 0\n*if merchants \u003c 0\n\tset merchants 0\n*if magicians \u003c 0\n\tset magicians 0\n*if farmers \u003c 0\n\tset farmers 0\n*if peasants \u003c 0\n\tset peasants 0\n*if workers \u003c 0\n\tset workers 0\n*if knights \u003c 0\n\tset knights 0\n*if archers \u003c 0\n\tset archers 0\n*if druids \u003c 0\n\tset druids 0\nYour advisor wants to know how you will proceed.\n*choice\n\t#\"We will send troops to aid the King.\"\n\t\t\"Very well. I will start mobilizing our troops.\"\n\t\t*page_break\n\t\t*goto king\n\t#\"We will send troops to aid the rebels.\"\n\t\t\"Very well. I will start mobilizing our troops.\"\n\t\t*set army 0\n\t\t*page_break\n\t\t*goto rebel_war\n\t#\"We will send financial aid to the rebels.\"\n\t\t\"Very well. I will take an inventory of our resources.\"\n\t\t*set merchants * 100\n\t\t*set gold + merchants\n\t\t*set merchants 0\n\t\t*set gold +500\n\t\t*page_break\n\t\t*goto rebel_funding\n\t#\"We will remain neutral during this conflict.\"\n\t\tYou decide to remain neutral in this conflict.\n\t\t*page_break\n\t\t*goto neutral\n\t\t\n\n*label king\n\"My liege, here is a summary of our current forces.\"\n\nCivilian Units:\n\n*if peasants > 0\n\t${peasants} Peasants\n\n*if peasants \u003c 1\n\t\tYou have no peasants to recruit units from!\n\t\t*set peasants 0\n\t\t\nMilitary Units:\n\n${militia} Militia\n\n${guards} Guards\n\n${knights} Knights\n\n${magicians} Magicians\n\n${archers} Archers\n\nYou have ${gold} Gold Pieces in the treasury.\n\n*choice\n\t*if (Gold > 9) and (peasants > 0) \n\t\t#Hire Militia. (10 GP)\n\t\t\t*set militia +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -10\n\t\t\t*goto king\n\t*if (Gold > 99) and (peasants > 9) \n\t\t#Hire 10 Militia. (100 GP)\n\t\t\t*set militia +10\n\t\t\t*set peasants -10\n\t\t\t*set gold -100\n\t\t\t*goto king\n\t*if (Gold > 49) and (peasants > 0)\n\t\t#Hire Guards. (50 GP)\n\t\t\t*set guards +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -50\n\t\t\t*goto king\n\t*if (Gold > 249) and (peasants > 4)\n\t\t#Hire 5 Guards. (250 GP)\n\t\t\t*set guards +5\n\t\t\t*set peasants -5\n\t\t\t*set gold -250\n\t\t\t*goto king\n\t*if (Gold > 99) and (peasants > 0) \n\t\t#Hire Knights. (100 GP)\n\t\t\t*set knights +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -100\n\t\t\t*goto king\n\t*if (Gold > 49) and (peasants > 0) \n\t\t#Hire Merchants. (50 GP)\n\t\t\t*set merchants +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -50\n\t\t\t*goto king\n\t*if (Gold > 9) and (peasants > 0) \n\t\t#Hire Farmers. (10 GP)\n\t\t\t*set farmers +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -10\n\t\t\t*goto king\n\t*if (Gold > 99) and (peasants > 9) \n\t\t#Hire 10 Farmers. (100 GP)\n\t\t\t*set farmers +10\n\t\t\t*set peasants -10\n\t\t\t*set gold -100\n\t\t\t*goto king\n\t*if (Gold > 199) and (peasants > 0) \n\t\t#Hire Magicians. (200 GP)\n\t\t\t*set magicians +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -200\n\t\t\t*goto king\n\t*if (Gold > 74) and (peasants > 0) \n\t\t#Hire Archers. (75 GP)\n\t\t\t*set archers +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -75\n\t\t\t*goto king\n\t*if (Gold > 374) and (peasants > 4) \n\t\t#Hire 5 Archers. (375 GP)\n\t\t\t*set archers +5\n\t\t\t*set peasants -5\n\t\t\t*set gold -375\n\t\t\t*goto king\n\t*if (Gold > 24) and (peasants > 0) \n\t\t#Hire Workers. (25 GP)\n\t\t\t*set workers +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -25\n\t\t\t*goto king\n\t*if (Gold > 124) and (peasants > 4) \n\t\t#Hire 5 Workers. (125 GP)\n\t\t\t*set workers +5\n\t\t\t*set peasants -5\n\t\t\t*set gold -125\n\t\t\t*goto king\n\t#Done.\n\t\t\"Very well…\"\n\t\t*page_break\n\t\t*goto orders-2\n*label orders-2\nDo you have any other orders?\n*choice\n\t*disable_reuse *selectable_if (Leadership > 1) #Organize a volunteer militia. (Requires Leadership)\n\t\t*set militia +20\n\t\t*goto orders-2\n\t*disable_reuse *selectable_if (dark > 70) #Forcefully conscript civilians.\n\t\t*set army +peasants\n\t\t*set army +merchants\n\t\t*set army +farmers\n\t\t*set peasants 0\n\t\t*set merchants 0\n\t\t*set farmers 0\n\t\t*set dark +20\n\t\t*set light -10\n\t\t*goto orders-2\n\t*disable_reuse *selectable_if (governor > 0) #As Governor, ask all nearby towns and castles to donate troops.\n\t\tYou receive additional reinforcements.\n\t\t*set army +50\n\t\t*goto orders-2\n\t*disable_reuse *selectable_if (gold > 500) #Sell knighthoods to nobles who pledge troops and support. (500 GP)\n\t\t*set army +20\n\t\t*set gold -500\n\t\t*goto orders-2\n\t#That is all.\n\t\tVery well.\n\t\t*page_break\n\t\t*goto king2\n\n*label king2\nYou gather your forces…\n*set army +militia\n*set army +guards\n*set army +guards\n*set army +archers\n*set army +archers\n*if leadership > 3\n\t*set army +50\n*if leadership = 3\n\t*set army +30\n*if leadership = 2\n\t*set army +20\n*if leadership = 1\n\t*set army +10\n*set militia 0\n*set guards 0\n*page_break\n\nTotal Troops:\n\n\n${army} Men at Arms\n\n${knights} Knights\n\n${magicians} Magicians\n\n${archers} Archers\n\nYou march your forces toward the capital…\n*set health 100\n*set rebel_army 1000\n*if difficulty = 3\n\t*set rebel_army 1250\n*if difficulty = 1\n\t*set rebel_army 850\n*set archer1 0\n*page_break\nYou arrive at the capital and see a great battle taking place between General Vero's forces and the rebels. It appears that the rebels have divided the forces in half; 500 troops are currently engaging General Vero's forces, while another 1000 continue their siege on the massive castle.\n\nWhat do you do?\n*choice\n\t#Aid General Vero.\n\t\tYou send in your forces to aid General Vero…\n\t\t*page_break\n\t\tThe fighting is fierce, and when you arrive General Vero is about to be flanked. You rush in with your forces and prevent his army from being defeated. General Vero has been wounded and asks you to take over command of his forces. He has 400 troops left.\n\t\t*set army +400 \n\t\t*set knights +2\n\t\t*set rule +1\n\t\t*set light +10\n\t\t*page_break\n\t\t*goto siege\n\t#Attack the forces sieging the castle.\n\t\tYou're able to take the forces sieging the castle by surprise.\n\t\t\n\t\tHow should you begin the attack?\n\t\t*set rule +1\n\t\t*choice\n\t\t\t*selectable_if (archers > 5) #Fire a volley of arrows. (Requires 5 Archers)\n\t\t\t\t*set rebel_army - archers\n\t\t\t\tThe rebels do not expect the volley. You're able to attack the enemy's forces without taking any casualties of your own.\n\t\t\t\t*page_break\n\t\t\t\t*goto siege\t\t\t\t\n\t\t\t*selectable_if (knights > 1) #Send in knights to cause chaos in the enemy's front line.\n\t\t\t\t*if knights \u003c 5\n\t\t\t\t\tYour knights do damage the enemy forces, but they're quickly overpowered by the rebels.\n\t\t\t\t\t*set knights 0\n\t\t\t\t\t*set rebel_army - 20\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto siege\n\t\t\t\tYour knights cause chaos in the enemy's front line, taking down several troops.\n\t\t\t\t*set knights -4\n\t\t\t\t*set rebel_army -50\n\t\t\t\t*page_break\n\t\t\t\t*goto siege\n\t\t\t#Charge with all of my forces and take them by surprise!\n\t\t\t\tYour forces charge, and a great battle takes place!\n\t\t\t\t*set army -50\n\t\t\t\t*set rebel_army -100\n\t\t\t\t*page_break\n\t\t\t\t*goto siege\n\t\n\n\t\n*label siege\n*image battlement-castle-towers.png\n\n*if rebel_army \u003c 0\n\t*goto victory\nYour Army:\n\n*if army > 0\n\t${army} Men at Arms\n\t\n*if knights > 0\n\t${knights} Knights\n\n*if magicians > 0\n\t${magicians} Magicians\n\n*if archers > 0\n\t${archers} Archers\n\nYour Health is ${health}.\n\n*if health \u003c 0\n\t*goto_scene death\n\t\n\nRebel Army: \n\n${rebel_army} Enemy Troops\n\nThe rebel army is currently bombarding the King's defenses with catapults. The catapults are out of range of the King's archers, so there's little he can do to stop the onslaught. The enemy has set up a defensive perimeter behind the catapults to prevent you from breaking through to help. You must find a way to break the enemy's formation soon, or the castle defenses will fall.\n\n*if necro_staff > 0\n\tYou notice that the staff you took from the magician is glowing. \n\n*choice\n\t*selectable_if (archers > 9) #Fire a volley of arrows. (Requires 10 Archers)\n\t\t*image archers.png\n\t\t*set archers_half archers/2\n\t\t*if archer1 = 0\n\t\t\tYou fire at the enemy with your archers, catching them by surprise. They soon return a volley of arrows of their own. Damage is taken on both sides. \n\t\t\t*set rebel_army - archers\n\t\t\t*set archers -10\n\t\t\t*set archer1 1\n\t\t\t*page_break\n\t\t\t*goto siege\n\t\tYou fire at the enemy with your archers, but they've taken a defensive posture, so only about half the arrows hit the enemy. They soon return a volley of arrows of their own. Damage is taken on both sides. \n\t\t*set rebel_army - archers_half\n\t\t*set archers -10\n\t\t*page_break\n\t\t*goto siege\n\t*if knights > 4\n\t\t*selectable_if (army > 0) #Charge with my forces supported by knights. \n\t\t\tYour forces charge into the fray, causing serious damage to the rebel army. You take some casualties, but not as much as the enemy. \n\t\t\t*set knights -2\n\t\t\t*set army -10\n\t\t\t*set rebel_army -50\n\t\t\t*page_break\n\t\t\t*goto siege\n\t*disable_reuse #Charge with my men!\n\t\t*if strength > 2\n\t\t\tWith you nearby. your men are greatly inspired. inflicting massive damage upon the enemy forces and causing them to break defensive formation.\n\t\t\t*set army - 20\n\t\t\t*set rebel_army -100\n\n\t\t\tYou're forced to fall back when you take a minor arrow wound.\n\t\t\t*set archer1 0\n\t\t\t*set broken_formation 0\n\t\t\t*set health -10\n\t\t\t*page_break\n\t\t\t*goto siege\n\t\tWith you nearby, your men are greatly inspired, causing increased damage to the enemy forces.\n\t\t*set army - 20\n\t\t*set rebel_army -50\n\n\t\tYou're forced to fall back when you take an arrow wound.\n\t\t*set health -20\n\t\t*page_break\n\t\t*goto siege\n\t*selectable_if (army > 24) #Order my entire army to charge!\n\t\t*if army > rebel_army\n\t\t\t*set army -35\n\t\t\t*set rebel_army -25\n\t\t\tYour men charge…\n\t\t\t*page_break\n\t\t\tYour troops are able to break through the enemy formation and destroy the catapults that are bombarding the castle walls.\n\n\t\t\tWith their catapults destroyed, the enemy forces begin to panic. Your men manage to push what's left of them back, while at the same time inflicting heavy casulaties on the enemy troops. Eventually, they're forced up against the castle walls. The King's archers fire upon the enemy from behind while you continue to hammer them from the front. Unable to defend themselves from two sides, most of the enemy surrender. Your army storms the enemy camp, looking for their commander, but they find no sign of him. Regardless of this, you've won a great victory today. \n\t\t\t*page_break\n\t\t\t*goto victory\n\t\t*set army -25\n\t\t*set rebel_army -25\n\t\tYour men charge, trying to break the enemy formation that's preventing you from reaching the King's castle. The casualties are about even, but their formation doesn't break. Your men regroup and wait for further instruction. \n\t\t*page_break\n\t\t*goto siege\n\t*selectable_if (knights > 0) #Send in my knights!\n\t\t*if broken_formation = 0\n\t\t\tYour knights charge with their horses, decimating the enemy forces!\n\t\t\t*if knights \u003c 2\n\t\t\t\t*set rebel_army -8\n\t\t\t\t*set knights 0\n\t\t\t\t*page_break\n\t\t\t\t*goto siege\n\t\t\t*set rebel_army - 20\n\t\t\t*set knights -2\n\t\t\t*page_break\n\t\t\t*set broken_formation 1\n\t\t\t*goto siege\n\t\tYour knights charge, but the enemy are ready this time with spearman in front. Heavy casualties are taken on both sides.\n\t\t*set knights -4\n\t\t*set guards -15\n\t\t*page_break\n\t\t*goto siege\n\t*selectable_if (magicians > 0) #Coordinate an attack with a magician.\n\t\t*if intelligence > 1\n\t\t\t*image fire-307891_1280.png\n\t\t\t\n\t\t\tYou coordinate the attack expertly, shooting a giant fireball right into the center of the enemy forces. This causes many of the enemy soldiers to panic and break formation.  \n\t\t\t*set rebel_army - 25\n\t\t\t*set magicians -1\n\t\t\t*set archer1 0\n\t\t\t*set broken_formation 0\n\t\t\t*page_break\n\t\t\t*goto siege\n\t\t*image fire-307891_1280.png\n\t\t\n\t\tYou coordinate the attack well, shooting a fireball into the enemy forces. The enemy is able to close the hole up rather quickly before your forces can use this to their advantage. The fireball takes down several enemy soldiers, but your mage is wounded by a stray arrow. \n\t\t*set rebel_army -15\n\t\t*set magicians -1\n\t\t*page_break\n\t\t*goto siege\n\t*selectable_if (archers > 0) #Have my archers put away their bows and join the main army as soldiers.\n\t\tYour archers put away their bows and join the army as soldiers.\n\t\t*set army + archers\n\t\t*set archers 0\n\t\t*page_break\n\t\t*goto siege\n\t*if necro_staff > 0\n\t\t*disable_reuse #Use the necromancer's staff.\n\t\t\tYou grab the staff and begin to feel its dark power slowly overtaking you. \n\t\t\t\n\t\t\tAre you sure you want to do this?\n\t\t\t*choice\n\t\t\t\t#Yes.\n\t\t\t\t\tYou scream in agony as a dark power takes control of you. You hold your hands up and slam the bottom of the staff into the ground. Then you let out a banshee of a scream.\n\n\t\t\t\t\tThe staff glows with a blinding green light, then it shoots out what you can only describe as a green death ray at the rebel army. Hundreds of enemy troops are instantly disintegrated. \n\t\t\t\t\t*set dark +1000\n\t\t\t\t\t*set light 0\n\n\t\t\t\t\tYou no longer feel like yourself, and a different voice speaks for you now. \n\t\t\t\t\t*set oldname name\n\t\t\t\t\t*set name \"Kopaul\"\n\t\t\t\t\t*set necro 1\n\t\t\t\t\t*set rebel_army -300\n\t\t\t\t\t*goto siege\n\t\t\t\t#No.\n\t\t\t\t\tYou quickly let go of the staff. You don't know how to use that thing, so it probably isn't worth it. It stops glowing. You look back up at the battlefield.\n\t\t\t\t\t*set necro_staff 0\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto siege\n\n\t*selectable_if (army \u003c 25) #Surrender.\n\t\tRather than show mercy, the enemy troops take turns stabbing you. Eventually, you pass out from blood loss. \n\t\t*goto_scene death\n\t\n\n*label victory\n*if necro = 1 \n\tYour men gather to congratulate you on your victory. When they call you Lord ${oldname}, you say in a loud voice, \"No longer refer to me as that pitiful human's name. I am Lord Kopaul, and you shall address me as such.\"\n\n\tYour men look confused, but they don't want to anger you any further. Your men now refer to you as Lord Kopaul.\n\t\t\nNews spreads of your victory against the rebels. It inspires many of the other Lords to join the fight. Soon, almost all of the rebels have been defeated, and the rest are in full retreat.\n*page_break\n*set rule +2\nAs the fog of war clears, you soon hear rumors that Gensa was behind the rebellion. Though much of the rebel army has been defeated, he has somehow managed to elude capture. Rumors spread that he may have fled the Kingdom altogether.\n\nThe King grants you further powers, giving you command of all the armed forces, and you soon become one of his most trusted advisors. \n\nMonths pass without incident, and the war with the rebels is declared to be officially over.\n*page_break\nYou and the King are alone and having a discussion about how to rebuild the Kingdom after the war, when suddenly you notice an assassin hiding in the darkness with a crossbow, about to fire.\n\nWhat do you do?\n*choice\n\t*selectable_if (light > dark) #Shield the King with my body.\n\t\t*set light +10\n\t\tYou take an arrow in the shoulder, but you manage to save the King. His guards rush in, hearing the commotion, and quickly dispatch the would-be assassin, who is revealed to be Gensa. Seeing your wound, the King takes you to his most trusted doctor.\n\n\t\tYou feel dizzy and have trouble walking by the time you arrive at the doctor's quarters.\n\t\t*page_break\n\t\tWhen the doctor examines your wound, you overhear that the crossbow bolt was covered with a powerful poison. You begin to grow faint…and eventually, you pass out.\n\n\t\t*if light > 70 \n\t\t\tYou awake bedridden, but very much alive. After several weeks, you make a full recovery. The King rewards you by making you his adopted son and heir. Eventually, you will be King. You live the rest of your days in peace, known as the defender of the crown and hero of the realm. \n\t\t\t*set royalty 1\n\t\t\t*achieve royalty\n\t\t\t*page_break\n\t\t\t*finish\n\t\t*if strength > 2\n\t\t\tYou awaken bedridden, but very much alive. After several weeks, you make a full recovery. The King rewards you by making you his adopted son and heir. Eventually,you will be King. You live the rest of your days in peace, known as the defender of the crown and hero of the realm. \n\t\t\t*set royalty 1\n\t\t\t*achieve royalty\n\t\t\t*page_break\n\t\t\t*finish\n\t\tThe poison spreads throughout your body. You do not survive the night.\n\t\t*page_break\n\t\tThough you have not survived, your legend will live on for centuries. The King personally oversees your funeral, inviting all the Lords of the realm to attend. He also builds a giant statue in your honor, and you're buried on royal grounds, an honor previously never given to non-royalty. You're known as one of the greatest Lords in the realm, and the bards will sing of your sacrifice for generations.\n\t\t*page_break\n\t\t*finish\n\t*selectable_if (dark > light) #Use the King as a human shield.\n\t\tYou grab the King and pull him forward just as a bolt is about to hit you. Several others fly in the darkness, with many of them hitting the king, but none of them hitting you. The assassin runs away. To your surprise, you look down, and the King is still alive. You examine his wounds; most of the bolts missed his vital organs and major arteries. The King tries to speak but cannot. Soon, the guards will find out what happened here.\n\t\t*choice\n\t\t\t#Grab one of the bolts and shove it into the King's heart.\n\t\t\t\t*set dark +100\n\t\t\t\tYou grab one of the crossbow bolts and shove it into the King's chest. You muffle his scream, and he dies. You finish killing him just as two guards rush in.\n\n\t\t\t\tThe guards look horrified to see the King dead. You tell them that an assassin is somewhere nearby. They send out a search party and eventually find the assassin, killing him before he can even say anything.\n\t\t\t\t*page_break\n\t\t\t\tTime passes, and eventually you're made King of the realm. Your greed has no bounds, and you rule the Kingdom with cruel brutality.\n\n\t\t\t\t*if necro = 1\n\t\t\t\t\t*goto kopaul1\n\n\t\t\t\tOne day, while in your royal chamber, you notice a book on your bed. You go over to look at it and see that it's a history of the Kingdom of Magincia. You open it to a random page. A particular text catches your eye…\n\t\t\t\t*page_break\n\t\t\t\t[i]The Kingdom of Magincia has gone through several rebellions and has had many Kings over the centuries. Few Kings have managed to hold onto power for long…[/i]\n\n\t\t\t\tYou continue to read, amused thinking they'll need to update this book soon. After some time has passed, you notice that something is off…at first, you're not quite sure what it is. But then you realize it isn't something, but rather the lack of something. You realize that you can't hear any noise. You open your door to see the two guards usually stationed outside your bedroom are gone. By the time you turn around, an assassin is upon you. He plunges a dagger into your chest, and you fall to the ground. He says something, but you can't quite make it out. Then you hear him say, \"Lord Bareth sends his regards.\" You don't recognize the name; it must be another noble vying for power. As you take your last breath, you remember the phrase from the book you just read…\n\t\t\t\t*page_break\n\t\t\t\t*finish\n\t\t\t#Call out to the guards.\n\t\t\t\tYou call out to the guards, and they immediately take the King to the doctor. You hear rumors that the King is unconscious, and there's only a small chance he will wake; apparently, the first bolt was poisoned. One of the guards approaches you.\n\n\t\t\t\t\"Lord ${name}, the King called for you before he fell unconscious. His health is deteriorating, and we fear he may die. If you wanted to say any last words to him, now might be your only chance.\" \n\t\t\t\t*choice\n\t\t\t\t\t#Follow the guard into the bedchamber.\n\t\t\t\t\t\tYou start to follow the guard. You hear whispers from the other nobles, and you manage to catch bits and pieces. Apparently, they're arguing about who will rule Magincia if the King dies. You hear your name being mentioned by several of the nobles as one of the more likely candidates.\n\n\t\t\t\t\t\tThe guard opens the door to the King's bedchamber and lets you enter. He closes it to give you privacy, saying he'll be right outside if you need anything. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou look at the King, who appears to be in a very fragile state. The poison has taken its toll.\n\n\t\t\t\t\t\tSuddenly and without warning, the King begins to move, then he slowly opens his eyes. He sees you…and rage fills him. He tries to find his voice and begins to call for a guard.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Kill him.\n\t\t\t\t\t\t\t\t*set dark +20\n\t\t\t\t\t\t\t\tYou take his pillow and smother him with it. He struggles, but he's too weak to fight you. Eventually, he stops. You check his pulse. He's dead. You put the pillow back behind his head.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tMinutes later, the guard re-enters the room and tells you that there are others waiting to say their goodbyes. You leave the room. After several minutes, you hear some commotion, and the doctor comes out looking dismayed. He declares the King dead.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\tYou have hidden your crimes well; the doctor found no evidence of foul play. Soon after, the nobles start bowing to you, asking you to take control of the Kingdom as it descends into chaos. You're more than happy to do so, as you walk down the royal court to take your seat at the throne. You rule Magincia with an iron fist for many years, no one knowing the truth of what you have done. \n\t\t\t\t\t\t\t\t*set dark +100\n\t\t\t\t\t\t\t\t*achieve assassin\n\n\t\t\t\t\t\t\t\tTime passes, and eventually you're made King of the realm. Your greed has no bounds, and you rule the Kingdom with cruel brutality.\n\n\t\t\t\t\t\t\t\t*if necro = 1\n\t\t\t\t\t\t\t\t\t*goto kopaul1\n\n\t\t\t\t\t\t\t\tOne day, while in your royal chamber, you notice a book on your bed. You go over to look at it and see that it's a history of the Kingdom of Magincia. You open it to a random page. A particular text catches your eye…\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t[i]The Kingdom of Magincia has gone through several rebellions and has had many Kings over the centuries. Few Kings have managed to hold onto power for long…[/i]\n\n\t\t\t\t\t\t\t\tYou continue to read, amused thinking they'll need to update this book soon. After some time has passed, you notice that something is off…at first, you're not quite sure what it is. But then you realize it isn't something, but rather the lack of something. You realize that you can't hear any noise. You open your door to see the two guards usually stationed outside your bedroom are gone. By the time you turn around, an assassin is upon you. He plunges a dagger into your chest, and you fall to the ground. He says something, but you can't quite make it out. Then you hear him say, \"Lord Bareth sends his regards.\" You don't recognize the name; it must be another noble vying for power. As you take your last breath, you remember the phrase from the book you just read…\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t#Do nothing.\n\t\t\t\t\t\t\t\tEventually, he's able to call the guard. Guards enter and force you to leave. As you're walking away, some of the King's guards grab you and throw you in a cell. Weeks pass, but eventually you're let out. The King has fully recovered now, and you stand before him in chains. He looks at you, not knowing what to say. He thinks for a moment.\n\n\t\t\t\t\t\t\t\t*if rule > 25\n\t\t\t\t\t\t\t\t\tWith much reluctance, he decides to banish you from the Kingdom rather than kill you. You're stripped of all your titles and removed from the Kingdom by force. \"Be thankful that you're still alive,\" are the last words you hear the King say to you. \n\t\t\t\t\t\t\t\t\t*set rule 0\n\t\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t\tThe King makes a motion with his hands, and you're in the dark again; apparently, they put something over your head, obstructing your vision. You're thrown back into the cell, and you lose track of time. Eventually, you're let out, only to see an executioner standing over you. The axe hits your head before you can say a word.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t*selectable_if (diplomacy > 1) #Make an excuse as to why I can't leave.\n\t\t\t\t\t\tYou tell the guard some excuse as to why you can't see the King. He looks confused, but seeing how there are so many other nobles waiting to be at the King's bedside, he leaves you. Days pass, and the King makes a miraculous recovery.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tThe King's first order is to strip you of all your titles and land. He then banishes you to a village in the north. You spend many months trying to survive the winter, until one day a barbarian horde attacks the village, slaughtering all of its inhabitants…including you. \n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto_scene death\n\t\t\t\n\t#Shout!\n\t\tThe assassin shoots the King, and he falls over before the guards can come in. The guards dispatch the assassin before he can escape.\n\t\t*set light +10\n\t\t*page_break\n\t\t*goto decision\n\t#Do nothing.\n\t\t*set dark +10\n\t\tThe assassin shoots the King, and he falls over. Guards rush in, but it's too late. Eventually, the guards dispatch the assassin.\n\t\t*page_break\n\t\t*goto decision\n\n*label kopaul1\nAs the days pass, you slowly feel less and less like yourself. The necromancer staff never leaves your side, and you feel its power growing each day.\n\nOne night, you have a strange dream. You're walking in a forest with mist covering the ground. Suddenly, you see yourself. No, not yourself…but someone that looks exactly like you. The person approaches and says, \"Hello, Lord ${oldname}.\"\n\nThe mention of the name confuses you for a moment, then you realize…[i]yes, that is my name.[/i] \n\nYour twin begins to speak again. \"Do you have any questions for me?\"\n\n*label questions1\nWhat do you say?\n*choice\n\t*disable_reuse #\"Who are you?\"\n\t\t\"My name is Kopaul, I am a necromancer who lived many years ago.\"\n\t\t*page_break \n\t\t*goto questions1\n\t#\"Why are you here?\"\n\t\t\"Years ago, I was captured. The foolish mortals didn't know how to kill me, so they decided to burn me and everything in my possession. They thought they were successful, but they weren't. I was able to transfer my consciousness into my staff. When you used the staff, you awoke me. It has taken a long time, but I have finally gained enough strength to come back.\n\n\t\t\"You may think the choices you've made so far have been of your own accord, but in reality, I was making them for you, or at the very least influencing your every decision. I'm sorry, but I have no further use for you. Goodbye, Lord ${oldname}.\"\n\t\t*choice\n\t\t\t#\"Goodbye?\"\n\t\t\t\tLord Kopaul shoves a dagger deep into your heart.\n\n\t\t\t\tYou don't wake up from the dream.\n\t\t\t\t*achieve dark_arts\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene death\n\t\t\t\n\t\t\t\n\t\t\n*label decision\nThere is much dispute over who should rule Magincia now. Though the King had many sons, all of them were bastards.\n\nIn the meantime, you're still in charge of the King's forces. You send additional forces to destroy what's left of the rebels. Over the course of several months, the war is declared officially over, and more people turn to the pressing issue of who will rule Magincia now. \n*choice\n\t#Take over as King.\n\t\t*image crown-42251_1280.png\n\t\t\n\t\tYou declare yourself King. This angers some of the other Lords. War erupts around the Kingdom, but since you're in command of most of the forces, you easily destroy anyone that tries to oppose you. You become the ruler of Magincia.\n\t\t*set king 1\n\t\t*set dark +25\n\t\t*set light -25\n\t\t*finish\n\t#Find the true heir.\n\t\tYou begin looking for the King's true heir.\n\n\t\tEventually, you find the true heir and crown him the next King. You keep your current position and title. Time passes until you eventually retire. You decide to live the rest of your days in peace, and legends of your wisdom are still told throughout the Kingdom to this very day. \n\t\t*set light +20\n\t\t*finish\n\t\t\n\t\t\t\t\n*label rebel_war\nHow many troops will you dedicate to the war effort?\n*choice\n\t#Send all the men we can spare.\n\t\t\tYou gather your forces…\n\t\t\t\n\t\t*set army +guards\n\t\t*set army +militia\n\t\t*set army +knights\n\t\t*set army +archers\n\t\t*set army +magicians\n\t\t*set army +peasants\n\t\t*set leader_bonus leadership\n\t\t*set leader_bonus leader_bonus * 5\n\t\t*set army +leader_bonus\n\t\t*set militia 0\n\t\t*set archers 0\n\t\t*set knights 0\n\t\t*set magicians 0\n\t\t*set peasants 0\n\t\t*if army > 150\n\t\t\t*set rule +1\n\t\t*page_break\n\t\tYou send ${army} men to war.\n\n\t\t*if army > 100\n\n\t\t\tWith your help, the rebel army is able to break through and capture the capital. By taking the capital, the rebels have gained legitimacy. The King's remaining forces are scattered and are now referred to as \"the rebels.\" The King is executed. For your support during the war, you are rewarded. You are put on the small council, which consists of ten Lords that make most of the day-to-day decisions concerning the governing of the realm. Major decisions are voted upon by the entire council, which is comprised of thirty Lords. Though there are arguments from time to time and delays in decision making, the overall governmental structure appears to be functioning well. \n\t\t\t*page_break\n\t\t\t*goto gensa\n\t\t\t\n\t\tThe rebel troops are unable to break through to capture the capital. The rebel forces are forced to retreat as a result. The war spreads all throughout the Kingdom.\n\t\t*set rule -4\n\n\t\tThe rebel army and King's forces fight to a standstill, and soon there are few troops remaining that are able to fight. Lords from all across the realm declare their independence from Magincia. Each province is thrown into chaos, and you're forced to stay within your castle's walls to ensure your rule remains intact. \n\n\t\tA few weeks later, you decide to check on the surrounding villages of your domain. When you arrive, you see that much of them have already been ransacked, burned, or both. The remaining peasants decide to rebel and are able to convince several of your troops to join their side. You are thrown out of power.\n\t\t*page_break\n\t\t*goto_scene death\n\t#Send most of the troops.\n\t\tYou gather your forces…\n\t\t*set army +guards\n\t\t*set army +militia\n\t\t*set army +knights\n\t\t*set army +archers\n\t\t*set army +magicians\n\t\t*set leader_bonus leadership\n\t\t*set leader_bonus leader_bonus * 4\n\t\t*set army +leader_bonus\n\t\t*set militia 0\n\t\t*set archers 0\n\t\t*set knights 0\n\t\t*set magicians 0\n\t\t*page_break\n\t\t*if army > 120\n\t\t\tWith your help, the rebel army is able to break through and capture the capital. By taking the capital, the rebels have gained legitimacy. The remaining King's forces are scattered and are now referred to as \"the rebels.\" The King is executed. You're given additional leadership roles as part of the new government. You are put on the small council, which consists of ten Lords who make most of the day-to-day decisions concerning the governing of the realm. Major decisions are voted upon by the entire council, which is comprised of thirty Lords. Though there are arguments from time to time and delays in decision making, the overall governmental structure appears to be functioning well.\n\t\t\t*page_break\n\t\t\t*goto gensa\n\t\t\t\n\t\tThe rebel troops are unable to break through to capture the capital. The rebel forces are forced to retreat as a result. The war spreads all throughout the Kingdom.\n\t\t*set rule -4\n\n\t\tThe rebel army and King's forces fight to a standstill, and soon there are few troops remaining that are able to fight. Lords from all across the realm declare their independence from Magincia. Each province is thrown into chaos, and you're forced to stay within your castle's walls to ensure your rule remains intact. \n\n\t\tA few weeks later, you decide to check on the surrounding villages of your domain. When you arrive, you see that much of them have already been ransacked, burned, or both. The remaining peasants decide to rebel and are able to convince several of your troops to join their side. You are thrown out of power.\n\t\t*page_break\n\t\t*goto_scene death\n\t\t\n\t#Send half of my troops.\n\t\tYou gather your forces…\n\t\t*set army +guards\n\t\t*set army +militia\n\t\t*set army +knights\n\t\t*set army +archers\n\t\t*set army +magicians\n\t\t*set leader_bonus leadership\n\t\t*set leader_bonus leader_bonus * 3\n\t\t*set army +leader_bonus\n\t\t*set guards 0\n\t\t*set militia 0\n\t\t*set archers 0\n\t\t*set knights 0\n\t\t*set magicians 0\n\t\t*page_break\n\t\t*if army > 150\n\t\t\tWith your help, the rebel army is able to break through and capture the capital. By taking the capital, the rebels have gained legitimacy. The remaining King's forces are scattered and are now referred to as \"the rebels.\" The King is executed. You're given additional leadership roles as part of the new government. You are put on the small council, which consists of ten Lords who make most of the day-to-day decisions concerning the governing of the realm. Major decisions are voted upon by the entire council, which is comprised of thirty Lords. Though there are arguments from time to time and delays in decision making, the overall governmental structure appears to be functioning well. \n\t\t\t*page_break\n\t\t\t*goto gensa\n\t\tThe rebel troops are unable to break through to capture the capital. The rebel forces are forced to retreat as a result. The war spreads all throughout the Kingdom.\n\t\t*set rule -4\n\n\t\tThe rebel army and King's forces fight to a standstill, and soon there are few troops remaining that are able to fight. Lords from all across the realm declare their independence from Magincia. Each province is thrown into chaos, and you're forced to stay within your castle's walls to ensure your rule remains intact. \n\n\t\tA few weeks later, you decide to check on the surrounding villages of your domain. When you arrive, you see that much of them have already been ransacked, burned, or both. The remaining peasants decide to rebel and are able to convince several of your troops to join their side. You are thrown out of power.\n\t\t*page_break\n\t\t*goto_scene death\n\t\t\n\t#Send a small amount of troops.\n\t\tYou gather your forces…\n\t\t*set army +guards\n\t\t*set army +knights\n\t\t*set army +archers\n\t\t*set army +magicians\n\t\t*set leader_bonus leadership\n\t\t*set leader_bonus leader_bonus * 2\n\t\t*set army +leader_bonus\n\t\t*set guards 0\n\t\t*set militia 0\n\t\t*set archers 0\n\t\t*set knights 0\n\t\t*set magicians 0\n\t\t*page_break\n\t\t*if army > 180\n\t\t\tWith your help, the rebel army is able to break through and capture the capital. By taking the capital, the rebels have gained legitimacy. The remaining King's forces are scattered and are now referred to as \"the rebels.\" The King is executed. You're given additional leadership roles as part of the new government. You are put on the small council, which consists of ten Lords who make most of the day-to-day decisions concerning the governing of the realm. Major decisions are voted upon by the entire council, which is comprised of thirty Lords. Though there are arguments from time to time and delays in decision making, the overall governmental structure appears to be functioning well.  \n\t\t\t*set rule +1\n\t\t\t*page_break\n\t\t\t*goto gensa\n\t\t\t\n\t\tThe rebel troops are unable to break through to capture the capital. The rebel forces are forced to retreat as a result. The war spreads all throughout the Kingdom.\n\t\t*set rule -4\n\n\t\tThe rebel army and King's forces fight to a standstill, and soon there are few troops remaining that are able to fight. Lords from all across the realm declare their independence from Magincia. Each province is thrown into chaos, and you're forced to stay within your castle's walls to ensure your rule remains intact. \n\n\t\tA few weeks later, you decide to check on the surrounding villages of your domain. When you arrive, you see that much of them have already been ransacked, burned, or both. The remaining peasants decide to rebel and are able to convince several of your troops to join their side. You are overthrown and imprisoned in the dungeon. \n\t\t*page_break\n\t\t*goto_scene death\n\n*label gensa\n*set rule +2\nAfter the fog of war clears, you eventually find out that the true leader behind the rebellion was actually Gensa. Apparently, he'd been planning it for years, slowly gathering support from all the Lords and secretly building up his army. His voice soon becomes the loudest on the small council. \n*set dark +10\n*page_break\nSeveral months pass, and the Kingdom appears to be getting back to normal. Much of the rebel activity has ceased, and the lands are relatively peaceful. Financially, the Kingdom has recovered and is in good health. \n\nOver the course of those months, you observed Gensa slowly gaining further influence over the small council. Though all the Lords may have a say in what happens to the Kingdom, Gensa is rumored to have bought many of their votes. If rumors are believed to be true, this means he controls four votes on the ten-person council. If his influence continues to grow in this way, soon he'll become the de-facto ruler of Magincia. \n*page_break\nYou arrive one day for a council meeting that lasts longer than usual. There's still much debate over the Central Province and which Lords should govern it. Eventually, the council decides to take a small break and reconvene later. During this break period, Gensa approaches you.\n\n\"${name}, I'm not sure if I ever told you, but I truly appreciate the support you gave during the war effort. If it wasn't for your reinforcements, we may never have won the war. Also, your experience on the council has been invaluable. I'm so glad we have someone like you helping us lead our Kingdom.\"\n*fake_choice\n\t#\"You honor me, Gensa.\"\n\t\tGensa smiles and continues. \n\t#\"I did it for the good of Magincia.\"\n\t\tGensa gives a half-smile. \"Yes, of course…\" He continues.\n\t#\"If I'd known I was fighting for you, I never would have sent the troops in the first place.\"\n\t\tGensa frowns. \"I'm disappointed to hear you say that. Well, the past is the past, we must think of the future now.\" He continues.\n\t#Remain silent.\n\t\tGensa continues.\n\n\"I'm not sure if you're aware of this, but there have been reports of troops from Galmencia gathering on our border. Galmencia has even begun encroaching on our land by building unauthorized trading outposts and small forts. Many speculate that they're planning an invasion, or at the very least they're trying to see how we'll respond to their actions. In this difficult time of transition, the government cannot afford to be weak or delayed in its response. I plan on putting forth a vote to the council that in the event of a war, we should elect a temporary leader to oversee the defense of the realm.\"\n*fake_choice\n\t#\"Who would be the leader?\"\n\t\t\"We would vote on it, of course. Though there are only a few suitable candidates, myself included.\"\n\t#Remain silent.\n\t\tA few moments pass, and nothing is said by either party. Finally, Gensa breaks the silence by speaking again.\n\n\"I was hoping to hear your thoughts on such a proposal.\"\n*choice\n\t#\"It sounds like a reasonable idea; electing a temporary leader would allow us to respond quickly to such threats.\"\n\t\t\"I'm glad we're in agreement.\"\n\t\t\n\t\tThe council resumes its session, and Gensa is unable to finish his conversation with you. \n\t\t*page_break\n\t\t*goto the_vote\n\t#\"I don't think it is a good idea…\"\n\t\tGensa looks surprised by your response. \"But why?\"\n\t\t*fake_choice\n\t\t\t#\"The whole reason for this rebellion was to form a new government; what if the leader tries to take over again, like the last King?\"\n\t\t\t\t\"Are you always this distrustful? You misunderstand! This would only happen if a war broke out, and even then it would only be temporary.\"\n\t\t\t\t\t\n\t\t\t\tThe council resumes its session, and Gensa is unable to finish his conversation with you. \n\t\t\t#\"I think our current way of governing is working just fine.\"\n\t\t\t\t\"Perhaps, but think about if something were to change. We should be prepared…\"\n\t\t\t\t\t\n\t\t\t\tThe council resumes its session, and Gensa is unable to finish his conversation with you. \n\t\t*page_break\n\t\t*goto the_vote\n*label the_vote\t\nA day has passed since your conversation with Gensa. You wonder if he's truly sincere, or if he's simply looking to gain more power.\n*fake_choice\n\t#He's trying to gain more power.\n\t\tYou figure he's simply trying to gain additional power. \n\t\t*page_break\n\t#He's trying to protect the realm.\n\t\tYou give him the benefit of the doubt. Perhaps he's simply looking out for the Kingdom. \n\t\t*page_break\n\t#I'm still not sure.\n\t\tYou ponder it some more, and something gives you the feeling you'll need to make up your mind regarding this. \n\t\t*page_break\n\nDuring a council meeting, Gensa stands up and says he wishes to propose a vote on something important.\n\nHe begins to walk around the council chambers. \"My friends…I have given this matter great thought, and I have come to the conclusion that in a time of war, we should designate a leader to oversee the defense of the realm. This council works well when making decisions concerning the realm during peacetime, but in a time of war, we need a single voice making the decisions. I urge you all to consider this proposal, as it could be the difference between our Kingdom thriving or its demise.\"\n\nHe sits down, and everyone proceeds to put the proposal to a vote. The new resolution reads as follows:\n\n[i]In the event of a war or attack from a foreign Kingdom, the council of Lords will elect a temporary leader to oversee the realm's management and defenses.[/i]\n\n\nYou are the first to vote, what do you say?\n*choice\n\t#Yea.\n\t\tYou vote yes. \n\n\t\tThe vote ends up being 6-4 in favor. The resolution is passed. \n\t\t*page_break\n\t\t*goto final_vote\n\t#Nay.\n\t\tYou vote no. \n\n\t\tThe vote ends up being 5-5, resulting in a tie.\n\n\t\tGensa stands up. \"This is a perfect example of why we need this proposal. In a time of war, what if we can't agree on a decision? What if it results in a tie, like it has now? Don't you see why this is so important? I suggest we take a recess and take some time to think this matter over. We can re-vote tomorrow.\"\n\t\t*page_break\n\t\tGensa approaches you.\n\t\t\n\t\t\"How can I convince you to vote yes to this proposal? Don't you see the importance? Is it possible to get through to you?\"\n\t\t*choice\n\t\t\t#\"I understand your position, but I'm not in favor of it.\"\n\t\t\t\tGensa leaves, frustrated as ever.\n\n\t\t\t\tThe next day, the council continues to deliberate…but seems to get nowhere. Suddenly, after several days of argument, one of the Lords on the council's health deteriorates. He is forced to withdraw from the council and return to his home to recover. In his absence, a replacement Lord is elected to the council. He ends up breaking the tie.\n\t\t\t\t*page_break\t\t\t\t\n\t\t\t\tTo your dismay, the resolution is passed. The Lord whose health deteriorated makes a full recovery some days after. He cannot prove it, but he confides to you that he believes he was poisoned. \n\t\t\t\t*set poison 1\n\t\t\t\t*page_break\n\t\t\t\t*goto final_vote\n\t\t\t#\"Perhaps I can be swayed…but I make no promises.\"\n\t\t\t\t\"What could I do to sway you?\"\n\t\t\t\t*choice\n\t\t\t\t\t#\"Have the entire council vote on this, all thirty Lords.\"\n\t\t\t\t\t\t\"Very well.\"\n\n\t\t\t\t\t\tThe vote passes, 18-12. \n\t\t\t\t\t\t*goto final_vote\n\t\t\t\t\t#\"Gold, what else?\"\n\t\t\t\t\t\tGensa thinks for a minute, wondering if you're setting a trap for him.\n\n\t\t\t\t\t\t\"I'll give you 10,000 Gold Pieces to vote for this proposal.\"\n\t\t\t\t\t\t*set gensa_bribe 1\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Agree.\n\t\t\t\t\t\t\t\t*set gold +10000\n\t\t\t\t\t\t\t\t*set dark +10\n\t\t\t\t\t\t\t\t*set light -10\n\t\t\t\t\t\t\t\tYou agree. You head back to the council, and the proposal passes. \n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto final_vote\n\t\t\t\t\t\t\t#Refuse.\n\t\t\t\t\t\t\t\tYou refuse. Gensa leaves in anger.\n\t\t\t\t\t\t\t\t*set poison 1\n\n\t\t\t\t\t\t\t\tThe next day, the council continues to deliberate…but seems to get nowhere. Suddenly, after several days of argument, one of the Lords on the council's health deteriorates. He is forced to withdraw from the council and return to his home to recover. In his absence, a replacement Lord is elected to the council. He ends up breaking the tie.\n\t\t\t\t\t\t\t\t*page_break\t\t\t\t\n\t\t\t\t\t\t\t\tTo your dismay, the resolution is passed. The Lord whose health deteriorated makes a full recovery some days after. He cannot prove it, but he confides to you that he believes he was poisoned.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto final_vote\n\t\t\t\t\t#\"I don't think there's anything you could say that would sway me, Gensa.\" \n\t\t\t\t\t\tGensa leaves, frustrated as ever.\n\n\t\t\t\t\t\tThe next day, the council continues to deliberate…but seems to get nowhere. Suddenly, after several days of argument, one of the Lords on the council's health deteriorates. He is forced to withdraw from the council and return to his home to recover. In his absence, a replacement Lord is elected to the council. He ends up breaking the tie.\n\t\t\t\t\t\t*page_break\t\t\t\t\n\t\t\t\t\t\tTo your dismay, the resolution is passed. The Lord whose health deteriorated makes a full recovery some days after. He cannot prove it, but he confides to you that he believes he was poisoned. \n\t\t\t\t\t\t*set poison 1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto final_vote\n\t\n*label final_vote\nSeveral weeks pass, and nothing eventful happens.\n\nOne day, during a small council meeting, a knight opens the door and interrupts one of the council members, who's making a speech concerning the taxation of farmers.\n\nThe knight appears to be out of breath but eventually recovers. He tells the council that troops from Galmencia have attacked a border village in the Western Province. They raided and burned it to the ground. The council members look shocked. The knight awaits the council's orders.\n\nGensa stands up and says, \"Well, this is an act of war. We will not tolerate this. We must send troops to investigate. I vote that we elect a leader during this period. I submit myself for candidacy. Does anyone else?\"\n*choice\n\t#State that I will also run for temporary leader.\n\t\tGensa looks over, surprised. After a moment, he regains his composure. \"Fine…fine, let us begin the deliberations on who will be leader.\"\n\t\t\n\t\tGensa speaks to the entire council, which is comprised of thirty Lords. He states that in this time of war, strong leadership is needed. He claims he has the leadership that is required. He also claims that you lack the leadership needed to see us through this war.\n\t\t\n\t\tHe finishes his speech and sits down.\n\t\t*page_break\n\t\t*goto response\n\t\t\t\n\t#Remain quiet.\n\t\tNo one else runs against Gensa, and he is made leader. Weeks pass, and most of the small council is kept out of the affairs of the state. Gensa has ordered all Lords to contribute troops to the war effort to repel the \"Galmencian horde.\"  Months pass under his leadership, and Galmencia is eventually conquered. Rather than return the remaining troops, Gensa keeps them and makes himself permanent leader. There's little you can do to stop him, and eventually he becomes the King of Magincia. You remain on the small council, but with much less power than before.\n\t\t*finish\n\n*label response\nHow do you respond to his accusation that you don't have the leadership required to run this country?\n*choice\n\t*disable_reuse *selectable_if (Galmencia_peace > 0) #\"I've dealt with Galmencian barbarians before and found a peaceful way to end the conflict.\"\n\t\t*set rule +1\n\t\t*goto response\n\t*disable_reuse *selectable_if (Galmencia_battle > 0) #\"I've dealt with Galmencian barbarians before and defeated them in battle.\"\n\t\t*set rule +2\n\t\t*goto response\n\t*disable_reuse *selectable_if (governor > 0) #\"I was Governor of the Western Province.\"\n\t\t*set rule +2\n\t\t*goto response\n\t*disable_reuse *selectable_if (noble > 0) #\"I am a noble whose entire life has been dedicated to learning to lead my subjects.\"\n\t\t*set rule +1\n\t\t*goto response\n\t*disable_reuse *selectable_if (knight > 0) #\"I have fought in many wars as a knight of the realm; I'm exactly what you need right now.\"\n\t\t*set rule +1\n\t\t*goto response\n\t#Say nothing else.\n\t\tYou have nothing else to say on the matter.\n\t\t*page_break\n\t\t*goto response2\n\t\t\n*label response2\nHow do you respond to Gensa's claims that he has the necessary qualifications to be a good leader?\n*choice\n\t*disable_reuse *selectable_if (gensa_bribe > 0) #\"Do you really want someone who uses bribes to get his way?\"\n\t\tThe Lords all start muttering amongst themselves. Gensa is outraged. \"You have no proof of that!\"\n\t\t\n\t\tEven so, a few of the Lords appear to agree with you. \n\t\t*set rule +2\n\t\t*page_break\n\t\t*goto response2\n\t*disable_reuse *selectable_if (poison > 0) #\"Would you trust someone who poisons a fellow council member?\"\n\t\tMany of the Lords look shocked and begin muttering amongst themselves. Gensa is outraged. \"You have no proof of that!\"\n\n\t\tEven so, a few of the Lords appear to agree with you. \n\t\t*set rule +2\n\t\t*page_break\n\t\t*goto response2\n\t#Say nothing else. \n\t\tThe Lords cast their vote…\n\t\t*if light > 70\n\t\t\t*set rule +1\n\t\t*if leadership > 4\n\t\t\t*set rule +1\n\t\t*page_break\n\t\t*if rule \u003c 21\n\t\t\tGensa wins the vote. He immediately takes power. You soon learn that the attack on the village was done by bandits, not Galmencian soldiers, but before you can alert the council of this, Gensa has already declared war upon Galmencia. The war lasts almost five years, and during that time period, Gensa gains more and more power. Eventually, the war ends with Galmencia's surrender. By that time, Gensa has gained enough power to declare himself King. He strips you of all your power and forces you into retirement. Though he attempts to discredit you, the people will always remember you as a great hero who helped saved Magincia. You take some respite with the fact that Gensa is eventually overthrown; few Kings remain in power for long in the Kingdom of Magincia. You live the remainder of your life as the Lord of Swamp Castle, helping your people prosper and your Kingdom grow. \n\t\t\t*finish\n\t\tThe vote is 16-14…\n\t\t*page_break\n\t\tIn your favor! You have been elected leader. You soon learn that the attack on the village was done by bandits, not Galmencian soldiers. It was all a ploy to make it seem as if the Kingdom was under attack. You find out that Gensa was actually behind it, but you lack hard proof, since the entire town was burned to the ground and most of the bandits who participated in the raid either died mysteriously in prison or never met their employer. \n\t\t*fake_choice\n\t\t\t#Throw Gensa in jail.\n\t\t\t\tYou throw Gensa in jail. Eventually, he gets out, but his reputation is far too gone, and so is his power. \n\t\t\t#Exile Gensa.\n\t\t\t\tYou force Gensa to leave Magincia. Rumors spread that he attempted to raise a new army, but he has few friends left in the realm. The last report you heard was that Galmencian bandits were pursuing him. You never hear from him again.\n\t\t\t#Execute Gensa.\n\t\t\t\tGensa is executed for his crimes.\n\t\t\t#Do nothing to Gensa.\n\t\t\t\tYou have no hard evidence to convict Gensa of a crime; however, he knows you had the power to do whatever you wanted to him. In a different position, he would have most certainly removed you from play. He appreciates your mercy. Eventually, rumors spread of his crimes, and his power grows small. You hear he's been overthrown by his subjects and is no longer in control of his castle. He leaves Magincia, never to be heard from again. \n\t\t\n\t\tOver the course of several months, you manage to de-escalate the conflict with Galmencia. You've gained the support of the people and of the council. Many want you to continue on as leader, and some even want you to declare yourself King.\n\t\t*choice\n\t\t\t#Declare myself King.\n\t\t\t\tThere's little opposition. You're declared King of Magincia, and you lead your people forward into the future. You rule wisely, and peace is spread throughout the entire Kingdom. \n\t\t\t\t*set king 1\n\t\t\t\t*finish\n\t\t\t#Rejoin the council.\n\t\t\t\tYou rejoin the council. The council survives for many decades. Eventually, you're forced to retire due to your age, but the people will always respect your authority. You'll go down in history as a hero of Magincia, and the one man who had enough honor not to take control over the Kingdom even when the opportunity presented itself. You spend the rest of your days in peace and are known as the man who brought freedom to Magincia. \n\t\t\t\t*achieve freedom\n\t\t\t\t*finish\n\n\t\n*label rebel_funding\n\nAfter gathering a full inventory of all your supplies, you find you have a grand total of ${gold} Gold Pieces. \n*choice\n\t*selectable_if (Gold > 19999) #Give 20,000 Gold Pieces to the rebels.\n\t\t*set rule +2\n\t\tThe rebels gladly accept the funding.\n\t\t*set gold -20000\n\t\t*page_break\n\t\tA few weeks pass, and the rebels have managed to win the war!\n\t\t*page_break\n\t\t*goto gensa\n\t*selectable_if (Gold > 14999) #Give 15,000 Gold Pieces to the rebels.\n\t\t*set rule +1\n\t\t*set gold -15000\n\t\tThe rebels gladly accept the funding.\n\t\t*page_break\n\t\tA few weeks pass, and the rebels have managed to win the war!\n\t\t*page_break\n\t\t*goto gensa\n\t*selectable_if (gold > 9999) #Give 10,000 Gold Pieces to the rebels.\n\t\t*set gold -10000\n\t\tThe rebels gladly accept the funding.\n\t\t*page_break\n\t\t*if rule > 20\n\t\t\tA few months pass, and the rebels manage to win the war!\n\t\t\t*page_break\n\t\t\t*goto gensa\n\t\t*if rule > 15\n\t\t\tYour support isn't enough to lead the rebels to victory; however, the King respects you enough to let you keep your lands. You live the rest of your days as the Lord of a small castle in the swamps.  \n\t\t\t*set rule -10\n\t\t\t*if rule \u003c 0\n\t\t\t\t*set rule 1\n\t\t\t*finish\n\t\tYour support isn't enough to lead the rebels to victory. The King decides to confiscate your lands and throw you out of power.\n\t\t*goto_scene death\n\t*selectable_if (gold > 4999) #Give 5000 Gold Pieces to the rebels.\n\t\tThe rebels gladly accept the funding.\n\t\t*set gold -5000\n\t\t*page_break\n\t\t*if rule > 20\n\t\t\tYour support isn't enough to lead the rebels to victory; however, the King respects you enough to let you keep your lands. You live the rest of your days as the Lord of a small castle in the swamps.  \n\t\t\t*set rule -10\n\t\t\t*finish\n\t\tYour support isn't enough to lead the rebels to victory. The King decides to confiscate your lands and throw you out of power.  \n\t\t*goto_scene death\n\t*selectable_if (Gold > 999) #Give 1000 Gold Pieces to the rebels.\n\t\t*set gold -1000\n\t\tYour support isn't enough to lead the rebels to victory. The King decides to confiscate your lands and throw you out of power.  \n\t\t*goto_scene death\n\t#Send them a small amount of food and supplies.\n\t\tYour support isn't enough to lead the rebels to victory. The King decides to confiscate your lands and throw you out of power.  \n\t\t*goto_scene death\n\n*label neutral\nA week has passed since you decided to remain uninvolved in the conflict. Suddenly, a messenger arrives. \n\nA guard walks in to tell you the latest news. \"My liege, the rebel assault on the King has been broken. Fragments of their army have been spotted all throughout Magincia. Though much of the rebel forces have been broken, they still have a strong foothold in the Northern Province.\"\n\nTwo more days pass, then another guard walks in with additional news. \"My liege, a small rebel detachment of troops has been spotted heading to our castle. We're not sure what their intentions are.\"\n*choice\n\t#\"Close the gate and prepare the defenses.\"\n\t\tThe gate is closed, and troops are stationed around the area. \n\t\t*set defenses +2\n\t\t*page_break\n\t\t*goto next\n\t#\"Close the gate, but don't do anything that would appear hostile.\"\n\t\tThe gate is closed.\n\t\t*set diplomacy +1\n\t\t*page_break\n\t\t*goto next\n\t\t\n*label next\nA rebel officer approaches the gate and requests an audience with you. \n*choice\n\t#See what he has to say.\n\t\tYou decide to see what he has to say.\n\t\t*page_break\n\t\t*goto next2\n\t#Deny his request.\n\t\tYou deny his request.\n\t\t*page_break\n\t\t*goto rebels_turned_away\n\n*label next2\nThe rebel officer looks wounded and worn out. \"My liege, we have nearly escaped death at the hands of the King's army. We tried to surrender, but they continued to butcher our men. There are very few of us left, and many of our forces are scattered all throughout Magincia. We haven't eaten for days. I beg of you, will you provide us with shelter, food, and medical treatment?\"\n*page_break\n*goto questions2\n\n*label questions2\nDo you have any questions you'd like to ask the rebel officer before you decide?\n*choice\n\t#Ask about their troop numbers.\n\t\tFor a moment, the officer looks surprised by your question. He regains his composure and says, \"We have about 200 troops, my liege.\"\n\t\t*page_break\n\t\t*goto questions2\n\t#\"How many of your men are injured?\"\n\t\t\"About 50 have sustained serious wounds that will require medical treatment.\"\n\t\t*page_break\n\t\t*goto questions2\n\t#\"What is your current supply situation?\"\n\t\t\"We have completely run out of supplies.\"\n\t\t*page_break\n\t\t*goto questions2\n\t#\"Do you have any Gold?\"\n\t\tThe officer looks guarded when you ask that question. \"We may have some meager supplies of Gold, but not much.\" \n\t\t*page_break\n\t\t*goto questions2\n\t#\"What happened to your troops?\"\n\t\t\"We were assaulting the main palace when we were attacked by General Vero's forces. Somehow, they were able to coordinate with the King, and we were attacked on both sides. The fighting lasted for days, and it was vicious. We tried to negotiate some form of surrender with terms, but they wouldn't accept anything other than unconditional surrender. We took the bulk of our assault troops that we had left and punched a hole through their defenses just long enough for some of us to escape. From our original numbers, only about a quarter of us survived. The fighting was so chaotic that we didn't have much time to re-organize afterward. We've been on the run for days now.\"\n\t\t*page_break\n\t\t*goto questions2\n\t#I've heard enough.\n\t\t\"So…will you help us?\"\n\t\t*choice\n\t\t\t#\"I will provide you with food, temporary shelter, and medical treatment.\"\n\t\t\t\t*set light +15\n\t\t\t\tYou begin handing out rations to the troops and providing medical treatment to the wounded. A few of the rebel soldiers gather in the main square, but most stay outside the castle, setting up tents or going to nearby villages to resupply and rest.\n\t\t\t\t*set rebel_army +200\n\t\t\t\t*page_break\n\t\t\t\t*goto helped\n\t\t\t#\"I will provide you some food and treat your wounded, but that is all.\"\n\t\t\t\tYou hand out food and treat the wounded. \n\t\t\t\t*set light +10\n\t\t\t\t*set rebel_army +150\n\t\t\t\t*page_break\n\t\t\t\t*goto helped\n\t\t\t#\"I will treat your wounded, but nothing more.\"\n\t\t\t\tYou begin to treat the wounded; some of the injuries are too severe and require that you bring some of the soldiers inside.\n\t\t\t\t*set light +5\n\t\t\t\t*set rebel_army +50\n\t\t\t\t*page_break\n\t\t\t\t*goto helped\n\t\t\t#\"I will, but only if you agree my demands.\"\n\t\t\t\tThe officer looks surprised at your words. \"What is it that you want?\"\n\t\t\t\t*choice\n\t\t\t\t\t#\"Give me all your Gold, and I will help your troops.\"\n\t\t\t\t\t\t\"We don't have much…will you accept 5000 Gold Pieces?\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"Yes.\"\n\t\t\t\t\t\t\t\tThe officer begrudgingly hands over the Gold. \n\t\t\t\t\t\t\t\t*set gold +5000\n\t\t\t\t\t\t\t\t*set rebel_army +200\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto helped\n\t\t\t\t\t\t\t#\"Not enough.\"\n\t\t\t\t\t\t\t\t*set dark +10\n\t\t\t\t\t\t\t\t\"Please…\"\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t*selectable_if (diplomacy > 1) #\"I'm sure you can find more than 5000 Gold…I mean, it is your lives we're talking about here.\" (Requires Diplomacy)\n\t\t\t\t\t\t\t\t\t\t*set dark +10\n\t\t\t\t\t\t\t\t\t\tThe officer begins to look for additional supplies throughout his camp. He gathers them all and comes back a few hours later.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"8000 Gold is all we managed to find. Will you take it?\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#\"Yes.\"\n\t\t\t\t\t\t\t\t\t\t\t\tThe officer begrudgingly hands over the Gold. \n\t\t\t\t\t\t\t\t\t\t\t\t*set gold +8000\n\t\t\t\t\t\t\t\t\t\t\t\t*set dark +20\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t*goto helped\n\t\t\t\t\t\t\t\t\t\t\t#\"No, it's not enough.\"\n\t\t\t\t\t\t\t\t\t\t\t\t*set dark +30\n\t\t\t\t\t\t\t\t\t\t\t\tThe officer leaves.\n\t\t\t\t\t\t\t\t\t\t\t\t*set rebel_army +100\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t*goto rebels_turned_away\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t#\"Fine.\"\n\t\t\t\t\t\t\t\t\t\tThe officer begrudgingly hands over the Gold. \n\t\t\t\t\t\t\t\t\t\t*set gold +5000\n\t\t\t\t\t\t\t\t\t\t*set rebel_army +200\n\t\t\t\t\t\t\t\t\t\t*set dark +20\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto helped\n\t\t\t\t\t\t\t\t\t#\"No, now leave.\"\n\t\t\t\t\t\t\t\t\t\t*set dark +25\n\t\t\t\t\t\t\t\t\t\tThe officer leaves.\n\t\t\t\t\t\t\t\t\t\t*set rebel_army +100\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto rebels_turned_away\n\t\t\t\t\t*selectable_if (diplomacy > 1) #\"Swear allegiance to me, and I will offer your troops sanctuary.\" (Requires Diplomacy)\n\t\t\t\t\t\t\"I will have to speak to my men about your offer. Please give us some time.\"\n\n\t\t\t\t\t\tA few hours pass, and his men return. \"A hundred of my men are willing to take your deal, myself included. The rest will continue to march on after they have resupplied.\"\n\t\t\t\t\t\t*set militia +100\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto helped\n\t\t\t\t\t#\"Anyone who lays down their arms may enter and join my lands as peasants.\"\n\t\t\t\t\t\t\"I will have to speak to my men about your offer. Please give us some time.\"\n\n\t\t\t\t\t\tA few hours pass, and his men return. He says that a hundred of his men are willing to take your deal, himself included. The rest will continue to march on after they have resupplied.\n\t\t\t\t\t\t*set peasants +100\n\t\t\t\t\t\t*set rebel_army 0\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto helped\n\t\t\t#\"No. Leave my lands at once.\"\n\t\t\t\tThe rebels leave in frustration.\n\t\t\t\t*set rebel_army +100\n\t\t\t\t*set dark +10\n\t\t\t\t*page_break\n\t\t\t\t*goto rebels_turned_away\n\t\t\n\t\t\n*label helped\nA day passes while you help the rebels. Suddenly, you hear a guard yelling that he has spotted a group of knights heading this way. \n\nYour advisor walks in. \"My liege, some royal knights sent by the King are demanding an audience with you. It seems they've discovered that some of the rebels are taking refuge in your lands.\"\n\nYou have no choice but to allow them entry.\n*page_break\nTen knights enter the castle, and their leader walks into the court hall.\n\n\"Lord ${name}, it has come to the attention of the King that you are aiding the rebels. You must cease this at once. My orders are to have them taken as prisoners so they may face execution as traitors to the realm.\" \n*choice\n\t#\"I have made a promise to these men, I shall not break it.\" \n\t\tThe head knight looks uneasy. \"You are refusing an order from your King? This will not stand well.\"\n\t\t*choice\n\t\t\t#\"I am sure the King will understand my position.\"\n\t\t\t\t*set light +10\n\t\t\t\t\"We shall see about that.\" \n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t*goto neutral_continued\n\t\t\t#\"The King will not know about this, since you will all be dead.\" (Attack)\n\t\t\t\t*set dark +20\n\t\t\t\tYour men slaughter the knights, but a single knight is able to escape. \n\t\t\t\t*choice\n\t\t\t\t\t#Chase after him.\n\t\t\t\t\t\t*set militia -10\n\t\t\t\t\t\t*set guards -10\n\t\t\t\t\t\tYou eventually catch up and kill the knight.\n\t\t\t\t\t\t*set dark +10\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto neutral_continued\n\t\t\t\t\t#Let him go.\n\t\t\t\t\t\tYou let him go.\n\t\t\t\t\t\t*set rule -1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto neutral_continued\n\t#\"Very well…do what you must.\"\n\t\t*set dark +10\n\t\tYou stop giving aid to the rebels and force them to leave. Most of them end up getting slaughtered even after they surrender. \n\t\t*page_break\n\t\t*goto neutral_continued\n\t*selectable_if (rebel_army \u003c 1) #\"They've given up their arms and joined my lands as peasants. They are no further threat to you.\"\n\t\tThe guard ponders this for a moment, then speaks. \"So they're unarmed, perfect. Line them up, we shall start the executions at once.\"\n\t\t*choice\n\t\t\t#\"Very well…\"\n\t\t\t\t\"Excellent. Gather them all into the square.\"\n\t\t\t\t*set dark +10\n\t\t\t\t*page_break\n\t\t\t\t*goto executation\n\t\t\t#\"I won't stop you, but I will take no part in this.\"\n\t\t\t\t\"Excellent. Gather them all into the square.\"\n\t\t\t\t*set rule -1\n\t\t\t\t*page_break\n\t\t\t\t*goto executation\n\t\t\t#\"No. I have given these men my word to protect them.\"\n\t\t\t\tThe knight looks uneasy. \"You are refusing an order from your King? This will not stand well.\"\n\t\t\t\t*choice\n\t\t\t\t\t#\"On second thought, I will help you.\"\n\t\t\t\t\t\t\"Excellent. Gather them all into the square.\"\n\t\t\t\t\t\t*set dark +10\t\t\t\t\t\t\t\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto executation\n\t\t\t\t\t#\"I'm sure the King will understand my position.\"\n\t\t\t\t\t\t\"We shall see.\" \n\t\t\t\t\t\t*set light +10\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe knight leaves. \n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto neutral_continued\n\n*label neutral_continued\nA representative from the King approaches you. \n*page_break\nHe explains that the war is currently in a stalemate, and neither side can break the struggle. He asks for your support.\n\nAt the same time, a rebel representative approaches you and asks for the same thing. \n\nWhat do you do?\n*choice\n\t#Support the King.\n\t\tYou decide to support the King.\n\t\t*page_break\n\t\t*goto king\n\t#Support the rebels.\n\t\tYou decide to support the rebels.\n\t\t*page_break\n\t\t*goto rebel_war\n\t*selectable_if (rule > 19) #Declare my lands independent of the Kingdom!\n\t\t*image castle-35216.png\n\t\t\n\t\tBoth representatives leave. You have declared yourself King under the rule of your own nation. As the war between the King of Magincia and the rebels continues, you continue to strengthen your own newly formed empire. Many refugees come to join your Kingdom in order to escape the war. By the time the fighting finally ends, you've already established a strong Kingdom. You live out the rest of your days as the ruler of a small but powerful independent Kingdom. \n\t\t*set king 1\n\t\t*finish\n\n\n\n*label rebels_turned_away\n\"My liege, the rebels have gathered in formation. They're attacking one of the nearby villages.\"\n*choice\n\t#Attempt to negotiate with them.\n\t\tThe rebel troops need food and supplies. They're willing to stop their attack and leave if you help.\n\t\t\n\t\tWhat do you do?\n\t\t*choice\n\t\t\t#Give them half the crop yields of the village.\n\t\t\t\tYou reluctantly give them half of your crop yields from the nearby village. Many of the peasants and farmers are upset with this, but at least you have peace. \n\t\t\t\t*set rule -2\n\t\t\t\t*set peasants -10\n\t\t\t\t*set farmers -5\n\t\t\t\t*goto neutral_continued\n\t\t\t#Refuse.\n\t\t\t\tThey continue to raid the village, taking numerous supplies.\n\t\t\t\t*choice\n\t\t\t\t\t#Send troops to stop them.\n\t\t\t\t\t\tYour men gather to protect the village. You see more than ${rebel_army} rebels attacking the village. \n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Fight them.\n\t\t\t\t\t\t\t\tYou and your men charge into battle.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto rebel_village_battle\n\t\t\t\t\t\t\t#Rescue as many peasants as I can, then retreat.\n\t\t\t\t\t\t\t\tYour men take some losses, but you're able to rescue most of the peasants.\n\t\t\t\t\t\t\t\t*set rule -1\n\t\t\t\t\t\t\t\t*set peasants -5\n\t\t\t\t\t\t\t\t*set militia -20\n\t\t\t\t\t\t\t\t*set guards -10\n\t\t\t\t\t\t\t\t*set knights -1\n\t\t\t\t\t\t\t\t*goto neutral_continued\n\t\t\t\t\t\t\t#Retreat to the castle!\n\t\t\t\t\t\t\t\tThe rebels take over the village and raid it for all its goods.\n\t\t\t\t\t\t\t\t*set rule -4\n\t\t\t\t\t\t\t\t*set dark +20\n\t\t\t\t\t\t\t\t*set peasants -10\n\t\t\t\t\t\t\t\t*goto neutral_continued\n\t\t\t\t\t#Let them raid the village.\n\t\t\t\t\t\tThe rebels raid the village and take several supplies. They leave soon after.\n\t\t\t\t\t\t*set rule -4\n\t\t\t\t\t\t*set dark +20\n\t\t\t\t\t\t*set peasants -10\n\t\t\t\t\t\t*goto neutral_continued\n\t\t\t\t\n\t#Send troops to stop them.\n\t\tYour men gather to protect the village. You see more than ${rebel_army} rebels attacking the village. \n\t\t*choice\n\t\t\t#Fight them.\n\t\t\t\tYou and your men charge into battle.\n\t\t\t\t*page_break\n\t\t\t\t*goto rebel_village_battle\n\t\t\t#Rescue as many peasants as I can, then retreat.\n\t\t\t\tYour men take some losses, but you're able to rescue most of the peasants.\n\t\t\t\t*set rule -1\n\t\t\t\t*set peasants -5\n\t\t\t\t*set militia -20\n\t\t\t\t*page_break\n\t\t\t\t*goto neutral_continued\n\t\t\t#Retreat to the castle!\n\t\t\t\tThe rebels take over the village and raid it for all its goods.\n\t\t\t\t*set rule -4\n\t\t\t\t*set peasants -10\n\t\t\t\t*page_break\n\t\t\t\t*goto neutral_continued\n\t#Ignore them.\n\t\tThe rebels raid the village and take numerous supplies. They leave soon after.\n\t\t*set rule -2\n\t\t*set dark +20\n\t\t*set peasants -10\n\t\t*page_break\n\t\t*goto neutral_continued\n\n*label rebel_village_battle\t\n*if stealth \u003c 2\n\tThe rebels see you approaching and begin to form a defensive formation around the village. \n\t*page_break\n\t*goto rebel_battle_at_village\nYou're able to catch the rebels by surprise and attack them before they can properly set up defenses. \n*set rebel_defense 0\n*page_break\n*goto rebel_battle_at_village\n\n\n*label rebel_battle_at_village\nRebel Army:\n*if rebel_army \u003c 0\n\tThe rebel army has scattered.\n\t*page_break\n\t*goto victory1\n*if rebel_army > 0 \n\t${rebel_army} Soldiers\n\nRebel Defenses: ${rebel_defense}\n\nYour Army:\n*if militia > 0\n\tMilitia: ${militia}\n\t\n*if Guards > 0\n\tGuards: ${guards}\n\n*if knights > 0\n\tKnights: ${knights}\n\t\n*if magicians > 0\n\tMagicians: ${magicians}\n\t\n*if archers > 0\n\tArchers: ${archers}\n\n\nYour Health is ${health}.\n\n*choice\n\t*selectable_if (archers > 4) #Fire a volley at the rebels with my archers. (Requires At Least 5 Archers)\n\t\t*set rebel_army - archers\n\t\tYour archers fire at the rebels…\n\t\t*page_break\n\t\t*if rebel_defense > 0\n\t\t\tThe rebels hide behind their defenses and take minimal casualties. They fire back a volley of their own.\n\t\t\t*set rebel_army -2\n\t\t\t*set archers -5\n\t\t\t*page_break\n\t\t\t*goto rebel_battle_at_village\n\t\tYou fire a volley and take out several rebels. They return fire, hitting some of your troops as well. \n\t\t*if archers > 10\n\t\t\t*set archers -5\n\t\t\t*set rebel_army -10\n\t\t\t*page_break\n\t\t\t*goto rebel_battle_at_village\n\t\t*set archers -5\n\t\t*set rebel_army -5\n\t\t*page_break\n\t\t*goto rebel_battle_at_village\n\t*selectable_if (guards > 0) #Send in a wave of guards!\n\t\t*if rebel_defense > 0\n\t\t\tThe rebels are able to use their defensive position to their advantage. You're able to take down some of the rebels, but your troops suffer major casualties.\n\t\t\t*set guards - 10\n\t\t\t*if guards \u003c 0\n\t\t\t\t*set guards 0\n\t\t\t*set rebel_army -5\n\t\t\t*page_break\n\t\t\t*goto rebel_battle_at_village\n\t\tYour forces are evenly matched.\n\t\t*set guards -10\n\t\t*set rebel_army -10\n\t\t*if guards \u003c 0\n\t\t\t*set guards 0\n\t\t*page_break\n\t\t*goto rebel_battle_at_village\n\t*selectable_if (militia > 0) #Send in my militia troops.\n\t\t*if rebel_defense > 0\n\t\t\tThe rebels are able to use their defensive position to their advantage. Many of your militia soldiers are slaughtered as a result. \n\t\t\t*set militia - 20\n\t\t\t*set rebel_army -5\n\t\t\t*page_break\n\t\t\t*goto rebel_battle_at_village\n\t\tYour militia forces fight bravely, but they're no match for the rebel army and take heavy casualties. \n\t\t*set militia -20\n\t\t*set rebel_army -10\n\t\t*if militia \u003c 0\n\t\t\t*set guards 0\n\t\t*page_break\n\t\t*goto rebel_battle_at_village\n\t*if militia > 0\n\t\t*selectable_if (rebel_defense > 0) #Send militia to attempt to breach the rebel's defenses.\n\t\t\tYour militia do damage to the rebel's defensive fortifications but take heavy casualties in the process.\n\t\t\t*set militia -25\n\t\t\t*set rebel_army -5\n\t\t\t*set rebel_defense -1\n\t\t\t*page_break\n\t\t\t*goto rebel_battle_at_village\n\t*if guards > 0\n\t\t*selectable_if (rebel_defense > 0) #Send guards to attempt to breach the rebel's defenses.\n\t\t\tYour guards do damage to the rebel's defensive fortifications but take heavy casualties in the process.\n\t\t\t*set guards -5\n\t\t\t*set rebel_army -1\n\t\t\t*set rebel_defense -1\n\t\t\t*page_break\n\t\t\t*goto rebel_battle_at_village\n\t*if guards > 0\n\t\t*selectable_if (knights > 0) #Send a wave of guards supported by knights.\n\t\t\t*set knights -1\n\t\t\t*set guards -10\n\t\t\t*set rebel_army -20\n\t\t\t*page_break\n\t\t\t*goto rebel_battle_at_village\n\t*selectable_if (magicians > 0) #Have a magician cast a fireball at the rebels.\n\t\t*if rebel_defense > 0\n\t\t\tMuch of the fireball's damage is absorbed by the rebels' fortified walls, but you do take down a few of their troops. \n\t\t\t*set rebel_army - 5\n\t\t\t*set magicians -1\n\t\t\t\n\t\t\tYour magician is taken down by a rebel's arrow. \n\t\t\t*page_break\n\t\t\t*goto rebel_battle_at_village\n\t\t\n\t\tYour magician does heavy damage to the rebels.\n\t\t*set rebel_army -10\n\t\t*set magicians -1\n\t\t*page_break\n\t\t*goto rebel_battle_at_village\n\t*disable_reuse #Charge the enemy with my men.\n\t\t*if rebel_defense > 0\n\t\t\tYou're only able to do minimal damage, since the rebels have positioned themselves behind the village walls.\n\t\t\t*set rebel_army -10\n\t\t\t\n\t\t\tYou're forced to fall back when an arrow takes down your horse.\n\t\t*page_break\n\t\t*goto rebel_battle_at_village\t\t\t\n\t*selectable_if (rebel_army \u003c 1) #Finish them!\n\t\tYou're able to finish off the rebel army. You have saved the village!\n\t\t*set rule +1\n\t\t*set peasants +5\n\t\t*page_break\n\t\t*goto neutral_continued\n\t#Retreat.\n\t\tYou begin to sound the retreat, but the rebels use this to their advantage and chase after you.\n\t\t*page_break\n\t\tSeveral rebels surround you.\n\t\t*choice\n\t\t\t#Fight my way out.\n\t\t\t\t*if strength > 2\n\t\t\t\t\tYou manage to fight your way through the enemy.\n\t\t\t\t\t*set rebel_army -10\n\t\t\t\t\t*set health 50\n\t\t\t\t\t*if rebel_army \u003c 20\n\t\t\t\t\t\tYou've done enough damage to the rebel army that they decide to retreat after raiding the village.\n\t\t\t\t\t\t*set rule -1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto neutral_continued\n\t\t\t\t\tThe rebel army returns to the village and continues pillaging. Several peasants are killed.\n\t\t\t\t\t*set peasants -10\n\t\t\t\t\t*set rule -4\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto neutral_continued\n\t\t\t\tYou're unable to escape.\n\t\t\t\t*set health 50\n\t\t\t\t*choice\n\t\t\t\t\t#Fight to the end.\n\t\t\t\t\t\t*if rebel_army > 10\n\t\t\t\t\t\t\tYou are killed in battle.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\tSomehow, you manage to defeat the enemy, but you're severely injured, receiving a wound to your leg that will more than likely affect how agile you are. \n\t\t\t\t\t\t*set health 5\n\t\t\t\t\t\t*if agility > 0\n\t\t\t\t\t\t\t*set agility -1\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto neutral_continued\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto neutral_continued\n\t\t\t\t\t#Surrender.\n\t\t\t\t\t\tYou surrender. \n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*If rule > 18\n\t\t\t\t\t\t\tThe rebels raid your treasury and leave. \n\t\t\t\t\t\t\t*set rule -5\n\t\t\t\t\t\t\t*set gold 0\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto neutral_continued\n\t\t\t\t\t\tThe rebels decide to take you prisoner. You spend the rest of your days in a dungeon. By the time you're let out, you are no lo
