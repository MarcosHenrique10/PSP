st thing you hear is him laughing.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\n\t#Surrender.\n\t\tHe takes you hostage. \"Let's see if your people would be willing to pay your ransom.\"\n\n\t\tHe hits you so hard that it knocks you out. The last thing you hear before you fall unconscious is the clanging of weapons…\n\t\t*page_break\n\t\tYou wake up in a dungeon in chains and spend several days there.\n\t\t\t\t\n\t\tSuddenly, the dungeon door opens…\n\t\t*page_break\n\t\t\t\t\n\t\t*if rule > 0 \n\t\t\t\"Well, what do you know…your people decided to pay your ransom. It was a hefty price, too…you're lucky to have such loyal subjects.\"\n\t\t\t*set gold 0\n\t\t\t*set rule 0\n\t\t\t*set peasants -10\n\t\t\t*set farmers -5\n\t\t\t*set merchants -2\n\t\t\t*finish\n\n\t\tThe barbarian leader walks in. \"Sorry, Lord ${name}, your subjects weren't willing to pay your ransom. They already elected a new Lord to run Swamp Castle. You're of no further use to me.\"\n\t\t\t\t\t\n\t\tHe smiles. \"Do you have anything to say before I end you?\"\n\t\t*choice\n\t\t\t#Beg for my life.\n\t\t\t\tHe laughs. \"Oh, not so noble now, are we? Fine, I won't end you…\"\n\n\t\t\t\tHe walks away, still laughing.\n\t\t\t\t*page_break\n\t\t\t\tYou spend several years in the dungeon until you're finally released, but by that time the world has changed and your reign has been forgotten. \n\t\t\t\t*page_break\n\t\t\t\t*goto_scene death\n\t\t\t\t\t\t\n\t\t\t#Remain silent.\n\t\t\t\t\"Oh, that's too bad, I was hoping to hear you beg for your life. Well, I guess this will have to do…\"\n\t\t\t\t\t\n\t\t\t\tHe lifts up a sword and slashes down at you. The last thing you hear is him laughing.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene death\n\n*label diplomat\n\"How should we prepare for the meeting?\"\n*choice\n\t*disable_reuse *selectable_if (advisor = 3) #Ask Fespar for advice.\n\t\tFespar responds with the following advice. \"My liege, the Galmencia tribes are a proud people. They respect strength, so try not to appear weak; however, don't go too far, as they may take it as a challenge. If you treat them as equals and respect them, they'll be pleasantly surprised. Do not pander too much, however, or they'll think you're patronizing them.\"\n\t\t*set barbarian_diplomacy +1\n\t\t*page_break\n\t\t*goto diplomat\n\t*disable_reuse #Collect emergency taxes from the peasants.\n\t\tThe peasants aren't happy about this \"emergency tax,\" but they give it to you anyway. \n\t\t*set rule -1\n\t\t*set gold +1000\n\t\t*set peasants -10\n\t\t*page_break\n\t\t*goto diplomat\n\t*disable_reuse *selectable_if (farmers > 9) #Prepare a feast for the barbarians. (Requires 10 Farmers)\n\t\t*set barbarian_diplomacy +1\n\t\t*page_break\n\t\t*goto diplomat\n\t*disable_reuse *selectable_if (druids > 0) #Bring a Druid to advise me.\n\t\t*set barbarian_diplomacy +1\n\t\t*set druid_show 1\n\t\t*page_break\n\t\t*goto diplomat\n\t*selectable_if (clothing \u003c 1) #Dress in barbarian clothing.\n\t\t*set barbarian_diplomacy -1\n\t\t*set clothing 1\n\t\t*page_break\n\t\t*goto diplomat\n\t*selectable_if (clothing \u003c 1) #Dress in normal clothing.\n\t\t*set barbarian_diplomacy +1\n\t\t*set clothing 2\n\t\t*page_break\n\t\t*goto diplomat\n\t*selectable_if (clothing \u003c 1) #Dress in noble clothing.\n\t\t*set barbarian_diplomacy -2\n\t\t*set clothing 3\n\t\t*page_break\n\t\t*goto diplomat\n\t*selectable_if (clothing \u003c 1) #Dress in battle armor.\n\t\t*set clothing 4\n\t\t*page_break\n\t\t*goto diplomat\n\t*selectable_if (table \u003c 1) #Prepare an elaborate table for the negotiations.\n\t\t*set table +1\n\t\t*set barbarian_diplomacy -1\n\t\t*page_break\n\t\t*goto diplomat\n\t*selectable_if (table \u003c 1) #Prepare a normal table for the negotiations.\n\t\t*set table +1\n\t\t*page_break\n\t\t*goto diplomat\n\t*disable_reuse *selectable_if (gold > 499) #Bring gifts of wine. (500 GP)\n\t\t*set gold -500\n\t\t*set barbarian_diplomacy +1\n\t\t*page_break\n\t\t*goto diplomat\n\t*disable_reuse *selectable_if (merchants > 9) #Bring a group of merchants along. (Requires 10 Merchants)\n\t\t*set barbarian_diplomacy +1\n\t\t*page_break\n\t\t*goto diplomat\n\t*disable_reuse *selectable_if (magicians > 0) #Bring a magician to entertain them. (Requires 1 Magician)\n\t\t*set barbarian_diplomacy -1\n\t\t*set magic_show 1\n\t\t*page_break\n\t\t*goto diplomat\n\t*selectable_if (flag = 0) #Bring a white flag of truce.\n\t\t*set barbarian_diplomacy -1\n\t\t*set flag 1\n\t\t*page_break\n\t\t*goto diplomat\n\t*selectable_if (flag = 0) #Bring a flag with my Kingdom's colors.\n\t\t*set barbarian_diplomacy +1\n\t\t*set flag 2\n\t\t*page_break\n\t\t*goto diplomat\n\t*selectable_if (flag = 0) #Don't bring a flag.\n\t\t*set barbarian_diplomacy -1\n\t\t*set flag 3\n\t\t*page_break\n\t\t*goto diplomat\n\n\t*disable_reuse *selectable_if (knights > 0) #Bring one of my best knights. (Requires 1 Knight)\n\t\tYou bring along one of your best knights.\n\t\t*set barbarian_diplomacy -1\n\t\t*page_break\n\t\t*goto diplomat\n\t*disable_reuse *selectable_if (advisor = 2) #Bring Gothica with me.\n\t\tYou decide to bring Gothica the Warrior along with you.\n\t\t*set barbarian_diplomacy -2\n\t\t*page_break\n\t\t*goto diplomat\n\t*disable_reuse *selectable_if (intelligence > 1) #Study barbarian customs.\n\t\tYou spend your time studying barbarian customs.\n\t\t*set barbarian_diplomacy +1\n\t\t*page_break\n\t\t*goto diplomat\n\t#That is all.\n\t\t\"Very well…\"\n\t\t*page_break\n\t\t*goto peace_talks\n\n*label peace_talks\nThe barbarian leader arrives with several of his best warriors.\n*if location = 1\n\tYou overhear the barbarian leader complaining about having to travel all the way here for so-called \"peace\" talks. \n\t*if with_guard = 1\n\t\tYour guards glare at the barbarian warriors. The barbarian warriors hold their weapons close. The barbarian leader seems hesitant, and you overhear him whisper to one of his warriors, \"First they ask us to come here, and now they surround us with guards. Be prepared to fight at any moment.\"\n\t*if with_guard = 0\n\t\tThe barbarian warriors relax somewhat when they realize there are no guards nearby. Apparently, they were expecting you to ambush them. \n\n*if location = 2\n\tYou overhear the barbarian leader talking about the location of the talks; he seems satisfied with the neutral location. \n\t*if with_guard = 1\n\t\tYour guards glare at the barbarian warriors. The barbarian warriors hold their weapons close. The barbarian leader seems hesitant, and you overhear him whisper to one of his warriors, \"First they ask us to come here, and now they surround us with guards. Be prepared to fight at any moment.\"\n\t*if with_guard = 0\n\t\tThe barbarian warriors relax somewhat when they realize there are no guards nearby. Apparently, they were expecting you to ambush them. \n\n*if location = 3\n\tYou overhear the barbarian leader state that you must be either very brave or very stupid to let them pick the location. \n\t*if with_guard = 1\n\t\tHe notices the attachment of guards you brought. \"Brave, but not stupid.\"\n\t*if with_guard = 0\n\t\tHe notices that you brought no guards. \"That answers my question,\" he says with a smile…then he whispers something to his barbarian warriors, and they roar with laughter.\n\t\t\n*if flag = 1\n\tThe barbarian leader notices your white flag of truce. He laughs. \"Look lads, they've brought a flag of surrender!\"\n\n*if flag = 2\n\tThe barbarian leader notices your Kingdom's flag. He ponders this and says to one of his companions, \"Well, at least we know this is an official meeting.\" \n\t\n*if flag = 0\n\tThe barbarian leader notices you didn't bring a flag. He frowns, then says to one of his companions, \"They didn't bring their flag, I wonder if this is an official meeting or if they're just wasting our time.\" \n\t\t\n*if clothing = 1\n\tAs the barbarians get closer, they notice your men are wearing crude barbarian outfits. \"Is that supposed to be what we wear? No…you look like sheep herders.\" \n\t\n*if clothing = 2\n\tThe barbarian leader seems pleased that your men are not wearing pretentious clothing. \n\t\n*if clothing = 3\n\tThe barbarian leader laughs at your noble clothing. \"What a waste of cloth…\"\n\t\n*if clothing = 4\n\tThe barbarian leader briefly notices that you're wearing battle armor. He doesn't seem to care; however, you do notice that he puts his hand a little closer to his weapon. \n\n*if magic_show = 1\n\tThe barbarians notice your magician attempting to entertain them. They don't seem very entertained, however. You hear one of them say, \"Do they think we've never seen a fire mage before?\"\n\n*if druid_show > 0\n\t\tThe barbarians notice your Druid and show their utmost respect.\n\t\nThe barbarian leader walks into your tent with the table set in the middle. \n\n\nWhat do you do?\n*choice\n\t#Welcome him.\n\t\tYou welcome him and sit down. He nods and follows suit. \n\t\t*set barbarian_diplomacy + 1\n\t\t*page_break\n\t\t*goto meeting\n\t#Bow my head.\n\t\tThe barbarian leader whispers something to his warriors, and you hear a few of them laugh. \n\t\t*set barbarian_diplomacy - 1\n\t\t*page_break\n\t\t*goto meeting\n\t#Wait for him to bow.\n\t\tYou wait for him to bow, but you end up staring at each other for a long time. He responds, \"If you're expecting me to bow to you, kid, you're going to be waiting forever.\" His barbarian companions laugh. \n\t\t*set barbarian_diplomacy - 2\n\t\t*page_break\n\t\t*goto meeting\n\t#Do nothing.\n\t\tAfter a few moments of silence, the barbarian leader decides to sit down.\n\t\t*page_break\n\t\t*goto meeting\n\n*label meeting\n\nYou're both sitting down at opposite ends of the table. His men and advisors are gathered behind him. \n\n*if druid_show > 0\n\t(The Druid you brought along advised you to speak first.)\n\n*choice\n\t#Speak first.\n\t\tYou speak first and begin to talk terms. The barbarian leader looks relieved. \n\t\t*set barbarian_diplomacy +1\n\t\t*choice\n\t\t\t#Ask the leader if we can speak alone.\n\t\t\t\tThe barbarian leader looks offended. \"Anything you have to say can be said in front of my sworn brothers.\"\n\t\t\t\t*set barbarian_diplomacy -1\n\t\t\t\t*page_break\n\t\t\t\t*goto meeting2\n\t\t\t#Keep talking.\n\t\t\t\tThe barbarian leader listens intently…\n\t\t\t\t*page_break\n\t\t\t\t*goto meeting2\n\t\t\t\n\t#Wait for the barbarian leader to say something.\n\t\tYou wait a long time…nothing is spoken. You decide to begin negotiations.\n\t\t*set barbarian_diplomacy -1\n\t\t*choice\n\t\t\t#Ask the leader if we can speak alone.\n\t\t\t\tThe barbarian leader looks offended. \"Anything you have to say can be said in front of my sworn brothers.\"\n\t\t\t\t*set barbarian_diplomacy -1\n\t\t\t\t*page_break\n\t\t\t\t*goto meeting2\n\t\t\t#Start the negotiations.\n\t\t\t\tThe barbarian leader listens intently…\n\t\t\t\t*page_break\n\t\t\t\t*goto meeting2\n\t\t\n\n*label meeting2\n*if difficulty = 3\n\t*set barbarian_diplomacy -1\nAn hour passes, and the barbarian leader listens to your proposal, rarely saying anything unless you ask him a direct question.\t\n\n*if barbarian_diplomacy \u003c 0\n\tAfter you finish, the barbarian leader is half asleep, and it takes a nudge from one of his warriors before he realizes you've finished.\n\t\n\tHe stands up and begins to speak…\n\t*set rule -1\n\t*page_break\n\t\"Listen, little Lord, I grow tired of your words. Let me tell you exactly what it will take for us to stop raiding your lands. We want Gold, and lots of it! We require 10,000 Gold Pieces, as well as free passage throughout your Kingdom.\n\t*choice\n\t\t*selectable_if (gold > 9999) #Give him 10,000 Gold Pieces.\n\t\t\t*set gold -10000\n\t\t\t*set rule -2\n\t\t\t\"Good, good. Now about the free passage throughout your Kingdom?\"\n\t\t\t*choice\n\t\t\t\t#Grant him and his men free passage.\n\t\t\t\t\t*set rule -2\n\t\t\t\t\tHe smiles. \"Thank you, I think this meeting has concluded.\"\n\t\t\t\t\t*page_break\n\t\t\t\t\tThe barbarian leader honors his deal; however, he uses the free passage you gave him to attack other nearby castles.\n\t\t\t\t\t*achieve diplomatic\n\t\t\t\t\t*set Galmencia_peace 1\n\t\t\t\t\t*finish\n\t\t\t\t#I cannot agree to that.\n\t\t\t\t\t\"You can't, or you won't? How about this…agree to it, or I'll kill you right where you stand.\"\n\t\t\t\t\t\n\t\t\t\t\tHe awaits your response.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t*selectable_if (with_guard > 0) #Call my guards.\n\t\t\t\t\t\t\tThe barbarians raise their swords. A few tense seconds pass until the barbarian leader speaks. \"Fine…I'll just take the gold.\"\n\n\t\t\t\t\t\t\tThe barbarian leader leaves, and the raids stop.\n\t\t\t\t\t\t\t*achieve diplomatic\n\t\t\t\t\t\t\t*set Galmencia_peace 1\n\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t#Unsheathe my sword.\n\t\t\t\t\t\t\tThe barbarian smiles. \"Oh…this just got a lot more interesting. Tell you what…I have a new proposal for you now. Want to hear it?\"\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Remain silent.\n\t\t\t\t\t\t\t\t\tThe barbarian takes out his spiked club. \"If you defeat me in combat, you won't have to agree to the free passage…but if I defeat you, not only do I get free passage, I get half of your farm yields for this season.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tWhat do you say?\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#Agree to fight him.\n\t\t\t\t\t\t\t\t\t\t\tHe smiles. \"This is going to be fun…\"\n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t*goto duel\n\t\t\t\t\t\t\t\t\t\t#I will not gamble with such things.\n\t\t\t\t\t\t\t\t\t\t\t\"Fine, then this means war, little lord. I hope your army is ready…because we'll be coming in full force.\"\n\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t#\"We will be ready.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\tThe barbarian leader leaves.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto mobilize\n\t\t\t\t\t\t\t\t\t\t\t\t#\"On second thought…I concede to all your demands.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set rule -3\n\t\t\t\t\t\t\t\t\t\t\t\t\tThe barbarian laughs. \"Good, good.\" \n\t\t\t\t\t\t\t\t\t\t\t\t\t*set farmers 0\n\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\tThe barbarian leader seems to honor his deal; however, he uses the free passage you gave him to attack other nearby castles. Several of your people leave because of the increased barbarian presence in the region.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*achieve diplomatic\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set Galmencia_peace 1\n\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t\t#\"I've heard enough from you…\" (Attack)\n\t\t\t\t\t\t\t\t\tYou attack him, but he laughs and casually blocks your attack. \"This is going to be fun…\"\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t*goto duel\n\t\t\t\t\t\t#Agree to his terms, even if I can't afford it.\n\t\t\t\t\t\t\t*set rule -2\n\t\t\t\t\t\t\t*set gold -10000\n\t\t\t\t\t\t\tHe smiles \"Thank you, I think this meeting has concluded.\" \n\t\t\t\t\t\t\t*set Galmencia_peace 1\n\t\t\t\t\t\t\t*if gold \u003c 0\n\t\t\t\t\t\t\t\tAs he walks out, you start to think about the financial repercussions this will have on your Kingdom's economy and the debt you must now owe. \n\t\t\t\t\t\t\t\t*set rule -2\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\tThe barbarian leader seems to honor his deal; however, he uses the free passage you gave him to attack other nearby castles.\n\t\t\t\t\t\t\t*achieve diplomatic\n\t\t\t\t\t\t\t*finish\n\t\t*if gold > 7999\n\t\t\t*selectable_if (diplomacy > 2) #Haggle the price down to 8000 GP.\n\t\t\t\t*set gold -8000\n\t\t\t\t*set rule -2\n\t\t\t\t\"Fine…8000 Gold Pieces. Now, about the free passage throughout your Kingdom?\"\n\t\t\t\t*choice\n\t\t\t\t\t#Grant him and his men free passage.\n\t\t\t\t\t\t*set rule -2\n\t\t\t\t\t\tHe smiles. \"Thank you, I think this meeting has concluded.\"\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tThe barbarian leader seems to honor his deal; however, he uses the free passage you gave him to attack other nearby castles.\n\t\t\t\t\t\t*achieve diplomatic\n\t\t\t\t\t\t*set Galmencia_peace 1\n\t\t\t\t\t\t*finish\n\t\t\t\t\t#I cannot agree to that.\n\t\t\t\t\t\t\"You can't, or you won't? How about this…agree to it, or I'll you right where you stand.\"\n\t\t\t\t\t\n\t\t\t\t\t\tHe awaits your response.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*selectable_if (with_guard > 0) #Call my guards.\n\t\t\t\t\t\t\t\tThe barbarians raise their swords. A few tense seconds pass until the barbarian leader speaks. \"Fine…I'll just take the Gold.\" \n\n\t\t\t\t\t\t\t\tThe barbarian leader leaves, and the raids stop.\n\t\t\t\t\t\t\t\t*achieve diplomatic\n\t\t\t\t\t\t\t\t*set Galmencia_peace 1\n\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t#Unsheathe my sword.\n\t\t\t\t\t\t\t\tThe barbarian smiles. \"Oh…this just got a lot more interesting. Tell you what…I have a new proposal for you now. Want to hear it?\"\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Remain silent.\n\t\t\t\t\t\t\t\t\t\tThe barbarian takes out a spiked club. \"If you defeat me in combat, you won't have to agree to the free passage…but if I defeat you, not only do I get free passage, I get half of your farm yields for this season.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tWhat do you say?\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Agree to fight him.\n\t\t\t\t\t\t\t\t\t\t\t\tHe smiles. \"This is going to be fun…\"\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t*goto duel\n\t\t\t\t\t\t\t\t\t\t\t#I will not gamble with such things.\n\t\t\t\t\t\t\t\t\t\t\t\t\"Fine, then this means war, little lord. I hope your army is ready…because we will be coming in full force.\"\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#\"We will be ready.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe barbarian leader leaves.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto mobilize\n\t\t\t\t\t\t\t\t\t\t\t\t\t#\"On second thought…I con eave, thinking about your next move…\n\t\t*choice\n\t\t\t#Prepare for war.\n\t\t\t\tYou prepare for war.\n\t\t\t\t*set rule +1\n\t\t\t\t*page_break\n\t\t\t\t*goto mobilize\n\t\t\t#Do nothing.\n\t\t\t\tThe raids continue…however, the casualties the peasants suffer are much lower than expected.\n\t\t\t\t*set rule -1\n\t\t\t\t*set peasants -2\n\t\t\t\t*finish\n\n*label duel\n*if health > 0\n\tYour Health is ${health}.\n\nThe barbarian taunts you to attack him.\n*choice\n\t#Charge him,\n\t\tHe trips you, and you fall onto the table. \n\t\t*set health -5\n\t\t*if health \u003c 0\n\t\t\t*page_break\n\t\t\tYou realize that you've taken too much damage. You don't have enough Strength to continue. The barbarian kills you.\n\t\t\t*page_break\n\t\t\t*goto_scene death\n\t\tHe raises his club high to strike you…\n\t\t*page_break\n\t\t*if agility > 3\n\t\t\tSomehow, you manage to dodge his blow. The table breaks in half with his massive swing. \n\t\t\n\t\t*if agility \u003c 4\n\t\t\tHe hits you in the chest so hard that the table cracks.\n\t\t\t*set health -50\n\t\t*page_break\t\n\t\t*goto duel2\n\t\t\n\t\t\t\n\t\t\n\t#Attack.\n\t\tHe blocks your blow, and your swords are now locked together.\n\t\t*choice\n\t\t\t#Push him back.\n\t\t\t\t*if strength > 2\n\t\t\t\t\tYou push with all your might and he moves back slightly, breaking the lock with your swords.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto duel2\n\n\t\t\t\tYou try to push him back with all your might, but you're unable to. He sidesteps and slashes at your side, giving you a deep cut. \n\t\t\t\t*set health -25\n\t\t\t\t*page_break\n\t\t\t\t*goto duel2\n\t\t\t#Attempt to overpower him.\n\t\t\t\t*if strength > 3\n\t\t\t\t\tSomehow, you manage to overpower him and knock him to the ground. He rolls back before you can strike him. \n\t\t\t\t\t*set boss2_health -10\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto duel2\n\t\t\t\tIt doesn't work, and he soon overpowers you, throwing you down to the ground. He then hits you with his spiked club, and the impact is so powerful that you think you hear one of your ribs crack.\n\t\t\t\t*set health -50\n\t\t\t\t*page_break\n\t\t\t\t*goto duel2\n\t\t\t#Kick him away.\n\t\t\t\t*if strength > 2\n\t\t\t\t\tYou successfully kick him away.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto duel2\n\n\t\t\t\tHe barely feels your blow, and he quickly sidesteps and hits you hard with the side of his sword. You fall down. He laughs and gets ready to swing at you.\n\t\t\t\t*choice\n\t\t\t\t\t#Roll out of the way.\n\t\t\t\t\t\t*if agility > 2\n\t\t\t\t\t\t\tYou manage to dodge his blow, but just barely.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto duel2\n\n\t\t\t\t\t\tHis attack lands and hits you hard on the head.\n\t\t\t\t\t\t*set health -50\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto duel2\n\t\t\t\t\t\t\n\t\t\t\t\t#Block the attack.\n\t\t\t\t\t\t*if strength \u003c 4\n\t\t\t\t\t\t\tHe hits you so hard that you almost drop your weapon. You see blood everywhere.\n\t\t\t\t\t\t\t*set health -75\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto duel2\n\t\t\t\t\t\tSomehow, you manage to block the attack. The barbarian looks surprised.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto duel2\n\t\t\t#Pull back.\n\t\t\t\t*if agility > 2\n\t\t\t\t\tYou pull back, and he tries to lunge at you with his sword, but you jump back before he can hit you.\n\t\t\t\t\t*goto duel2\n\t\t\t\tYou pull back, but he slashes at you and gives you a deep cut on your arm. \n\t\t\t\t*set health -25\n\t\t\t\t*page_break\n\t\t\t\t*goto duel2\n\t#Be defensive.\n\t\tHe continues to taunt you. \"Aww, look at the scared little lord…\"\n\t\t\n\t\tHe suddenly lunges at you with incredible speed.\n\t\t*page_break\n\t\t*if agility > 2\n\t\t\tYou manage to parry his blow…he's incredibly fast.\n\t\t\t*page_break\n\t\t\t*goto duel2\n\n\t\tYou're unable to avoid his blow, and he hits you hard.\n\t\t*set health -25\n\t\t*page_break\n\t\t*goto duel2\n\t\t\n\n\n*label duel2\n\n*if health \u003c 1\n\tYou're too exhausted to protect yourself. The barbarian runs up and stabs you in the chest…\n\t*page_break\n\t*goto_scene death\n\nHe laughs and gets ready to attack.\n\n\nYour Health is ${health}.\n\n*choice\n\t#Continue fighting.\n\t\tThe fight continues. The match is one sided, as the barbarian is superior in both strength and agility to you. You begin to tire.\n\t\t*if health \u003c 20\n\t\t\tThe barbarian runs up and stabs you in the chest.\n\t\t\t*page_break\n\t\t\t*goto_scene death\n\t\t\t\n\t\tWhat do you do?\n\t\t*choice\n\t\t\t#Try to outsmart him.\n\t\t\t\t*if intelligence > 2\n\t\t\t\t\tYou see a moment when he leaves himself open. You attack, and he falls to the ground. You have bested him.\n\n\t\t\t\t\tThe barbarian leader groans. \"You piece of shit! Fine…you have won the duel. Now let me live, and we will honor our deal.\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Kill him.\n\t\t\t\t\t\t\tYou kill the barbarian leader. Having seen the leader dead, several barbarians run away. You may have won the duel and taken out their leader, but this means war. \n\n\t\t\t\t\t\t\tSoon, a new barbarian leader emerges and marches an army to destroy your castle…\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*set dark +10\n\t\t\t\t\t\t\t*set light -10\n\t\t\t\t\t\t\t*goto mobilize\n\t\t\t\t\t\t#Let him live.\n\t\t\t\t\t\t\tYou let him live. The barbarian raids stop on your land.\n\t\t\t\t\t\t\t*set rule +1\n\t\t\t\t\t\t\t*set light +5\n\t\t\t\t\t\t\t*set dark -2\n\t\t\t\t\t\t\t*finish\n\t\t\t\tIt doesn't work. He defeats you. Before you can say anything, he takes out a dagger and holds it to your throat. \n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\"Now, do you agree to all my terms?\"\n\t\t\t\t*choice\n\t\t\t\t\t#\"Yes, I agree to your terms.\"\n\t\t\t\t\t\t*set rule -4\n\t\t\t\t\t\t\"Excellent.\" He smiles. \"Thank you, I think this meeting has concluded.\"\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tThe barbarian leader seems to honor his deal; however, he uses the free passage you gave him to attack other nearby castles…many of your subjects leave due to the increase in barbarians in the region.\n\t\t\t\t\t\t*set peasants -10\n\t\t\t\t\t\t*set merchants -5\n\t\t\t\t\t\t*set farmers -5\n\t\t\t\t\t\t*finish\t\t\t\t\n\t\t\t\t\t#\"Never!\"\n\t\t\t\t\t\tHe takes you hostage. \"Let's see if your people would be willing to pay your ransom.\" \n\t\t\t\t\t\t\n\t\t\t\t\t\tHe hits you so hard that it knocks you out. The last thing you hear before you fall unconscious is the clanging of weapons.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tYou wake up in a dungeon in chains and spend several days there.\n\t\t\t\t\t\t*set rule -1\n\t\t\t\t\t\tSuddenly, the dungeon door opens…\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if rule > 0 \n\t\t\t\t\t\t\t\"Well, what do you know, your people decided to pay your ransom. It was a hefty price, too…you're lucky to have such loyal subjects.\"\n\t\t\t\t\t\t\t*set gold 0\n\t\t\t\t\t\t\t*set rule 0\n\t\t\t\t\t\t\t*set peasants -10\n\t\t\t\t\t\t\t*set farmers -5\n\t\t\t\t\t\t\t*set merchants -2\n\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\tThe barbarian leader walks in. \"Sorry, Lord ${name}, your subjects weren't willing to pay your ransom. They already elected a new Lord to run Swamp Castle. You're of no further use to me.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tHe smiles. \"Do you have anything to say before I end you?\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Beg for my life.\n\t\t\t\t\t\t\t\tHe laughs. \"Oh, not so noble now, are we? Fine, I won't end you…\"\n\n\t\t\t\t\t\t\t\tHe walks away, still laughing.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\tYou spend several years in the dungeon before you're finally released.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t\t#Remain silent.\n\t\t\t\t\t\t\t\t\"Oh, that's too bad, I was hoping to hear you beg for your life. Well, I guess this will have to do…\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tHe lifts up a sword and slashes down at you. The last thing you hear is him laughing.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto_scene death\n\t\t\t#Fight dirty.\n\t\t\t\t*if dark > 70\n\t\t\t\t\tYou do everything you can to overtake him. Hit him with low blows, use others as human shields. Eventually, you defeat him. \n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Kill him.\n\t\t\t\t\t\t\tYou kill the barbarian leader. Having seen the leader dead, several barbarians run away. You may have won the duel and taken out their leader, but this means war. \n\n\t\t\t\t\t\t\tSoon, a new barbarian leader emerges and marches an army to destroy your castle.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*set dark +10\n\t\t\t\t\t\t\t*set light -10\n\t\t\t\t\t\t\t*goto mobilize\n\t\t\t\t\t\t#Let him live.\n\t\t\t\t\t\t\tYou let him live. He honors his side of the deal. \n\t\t\t\t\t\t\t*set rule +1\n\t\t\t\t\t\t\t*finish\n\t\t\t\tIt doesn't work. He defeats you. Before you can say anything, he takes out a dagger and ends you. \n\t\t\t\t*page_break\n\t\t\t\t*goto_scene death\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t#Continue to fight and don't give up.\n\t\t\t\t*if light > 70\n\t\t\t\t\tYou continue to fight, despite the fact that he's a superior fighter. He hits you again and again, but you keep getting up. Eventually, the barbarian leader grows tired. \"This is getting boring, beating you to a pulp like this…it's no fun. I'm impressed by your willingness to fight for your people. I will not require you to give my troops safe passage in your lands.\"\n\t\t\t\t\t\n\t\t\t\t\tHe leaves…and soon after, you pass out. \n\t\t\t\t\t*set rule +1\n\t\t\t\t\t*page_break\n\t\t\t\t\tThe barbarian leader honors his side of the deal, and the raids stop. \n\t\t\t\t\t*finish\n\n\t\t\t\tYou continue to fight, despite the fact that he's a superior fighter. He hits you again and again, but you keep getting up. Eventually, the barbarian grows tired.\n\n\t\t\t\tHe holds you down and takes out a dagger. \"Accept my terms or die! What say you?\"\n\t\t\t\t*choice\n\t\t\t\t\t#\"Yes, I agree to your terms.\"\n\t\t\t\t\t\t*set rule -4\n g for your life. Well, I guess this will have to do…\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tHe lifts up a sword and slashes down at you. The last thing you hear is him laughing.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\n\t#Surrender.\n\t\tHe stops and smiles. \"Ah…that's a good little lord. Do you agree to my terms then?\"\n\t\t*choice\n\t\t\t#\"Yes.\"\n\t\t\t\t*set rule -4\n\t\t\t\t\"Excellent.\" He smiles. \"Thank you, I think this meeting has concluded.\"\n\t\t\t\t*page_break\n\t\t\t\tThe barbarian leader seems to honor his deal; however, he uses the free passage you gave him to attack other nearby castles…many of your subjects leave due to the increase in barbarians in the region.\n\t\t\t\t*set merchants 0\n\t\t\t\t*set farmers 0\n\t\t\t\t*set workers 0\n\t\t\t\t*finish\t\t\t\t\n\t\t\t#\"No.\"\n\t\t\t\tHe takes you hostage. \"Let's see if your people would be willing to pay your ransom.\" He hits you so hard that it knocks you out. The last thing you hear before you fall unconscious is the clanging of weapons.\n\t\t\t\t*page_break\n\t\t\t\tYou wake up in a dungeon in chains and spend several days there.\n\t\t\t\t\n\t\t\t\tSuddenly, the dungeon door opens…\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t*if rule > 0 \n\t\t\t\t\t\"Well, what do you know…your people decided to pay your ransom. It was a hefty price, too…you're lucky to have such loyal subjects.\"\n\t\t\t\t\t*set gold 0\n\t\t\t\t\t*set rule -2\n\t\t\t\t\t*set peasants -10\n\t\t\t\t\t*set farmers 0\n\t\t\t\t\t*set merchants 0\n\t\t\t\t\t*finish\n\t\t\t\tThe barbarian leader walks in. \"Sorry, Lord ${name}, your subjects weren't willing to pay your ransom. They already elected a new Lord to run Swamp Castle. You're of no further use to me.\"\n\t\t\t\t\n\t\t\t\tHe smiles. \"Do you have anything to say before I end you?\"\n\t\t\t\t*choice\n\t\t\t\t\t#Beg for my life.\n\t\t\t\t\t\tHe laughs. \"Oh, not so noble now, are we? Fine, I won't end you…\"\n\n\t\t\t\t\t\tHe walks away, still laughing.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tYou spend several years in the dungeon before you're finally released.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t\n\t\t\t\t\t#Remain silent.\n\t\t\t\t\t\t\"Oh, that's too bad, I was hoping to hear you beg for your life. Well, I guess this will have to do…\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tHe lifts up a sword and slashes down at you. The last thing you hear is him laughing.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t\n*label mobilize\n*set pre_war_militia +militia\n*set pre_war_peasants +peasants\n*set pre_war_guards +guards\n*set pre_war_knights +knights\n*if difficulty = 3\n\tYou start to mobilize for war.\n\t*goto mobilize2\n*if leadership > 0\n\t*set militia +5\n*if leadership > 1\n\t*set guards +2\n*if leadership > 2\n\t*set knight +1\n\n*if leadership > 3\n\t*set archers +4\n*set prepare 1\nYou begin to mobilize for war.\n*page_break\n*label mobilize2\n\"What preparations should we make?\"\n*choice\n\t*disable_reuse *selectable_if (leadership > 1) #Organize a militia. (Train Volunteer Peasants as Militia)\n\t\tYou begin to organize the peasants into a militia. \n\t\t*if peasants > 10\n\t\t\t*set militia +10\n\t\t\t*set peasants -10\n\t\t\t*if leadership > 2\n\t\t\t\t*set militia +5\n\t\t*if peasants > 1\n\t\t\t*set militia +2\n\t\t*page_break\n\t\t*goto mobilize2\n\t*disable_reuse *selectable_if (intelligence > 1) #Have my guards study the art of war.\n\t\tA couple of your guards excel so well that they become knights.\n\t\t*set knights +2\n\t\t*if intelligence > 1\n\t\t\tOne guard in particular has shown an aptitude for magic. Your advisor decides to train him as a magician. \n\t\t\t*set magicians +1\n\t\t*page_break\n\t\t*goto mobilize2\n\t*disable_reuse *selectable_if (strength > 1) #Train my men in combat.\n\t\tYou spend time training your men for combat.\n\t\t*set militia +5\n\t\t*if strength > 2\n\t\t\tMany of the men are impressed by your fighting ability. \n\t\t\t*set guards +5\n\t\t\t*set peasants -5\n\t\t*page_break\n\t\t*set peasants -5\n\t\t*goto mobilize2\n\t*disable_reuse #Forcefully conscript civilians.\n\t\tThis adds to your army, but several peasants complain. \n\t\t*set militia +10\n\t\t*set peasants -10\n\t\t*if peasants \u003c 0\n\t\t\t*set peasants 0\n\t\t*set dark +10\n\t\t*page_break\n\t\t*goto mobilize2\n\t*disable_reuse *selectable_if (gold > 999) #Hire mercenaries. (1000 GP)\n\t\tYou hire a small detachment of mercenaries. They number 35 men, and many are considered to be elite warriors. \n\t\t*set knights +5\n\t\t*set guards +10\n\t\t*set militia +20\n\t\t*set gold -1000\n\t\t*page_break\n\t\t*goto mobilize2\n\t*disable_reuse *selectable_if (workers > 9) #Build war machines. (Catapults) (Requires 10 Workers)\n\t\t*set catapults +2\n\t\t*set workers -8\n\t\t*page_break\n\t\t*goto mobilize2\n\t*selectable_if(leadership > 0) #Send scouts ahead.\n\t\tThe barbarians number in the hundreds. You estimate at least two hundred enemy troops, if not more.\n\t\t*page_break\n\t\t*goto mobilize2\n\t*selectable_if(stealth > 0) #Scout the enemy myself.\n\t\tYou watch the enemy forces for half a day. At first, it appears that there are around two hundred enemy troops, but then you notice that they're concealing their numbers. You estimate the true enemy troop strength to be closer to three hundred. \n\t\t*page_break\n\t\t*goto mobilize2\n\t*disable_reuse *selectable_if (rule > 5) #Ask the Central Province for reinforcements.\n\t\tYou receive some reinforcements of knights and soldiers.\n\t\t*set knights +2\n\t\t*set militia +10\n\t\t*page_break\n\t\t*goto mobilize2\n\t*disable_reuse *selectable_if (noble > 0) #Use my noble connections to get more troops. (Requires Nobility)\n\t\tYou receive a good number of reinforcements.\n\t\t*set militia +10\n\t\t*set guards +5\n\t\t*set knight +1\n\t\t*page_break\n\t\t*goto mobilize2\n\t*disable_reuse *selectable_if (diplomacy > 0) #Ask the surrounding villages and farms for volunteers.\n\t\t*if diplomacy > 2\n\t\t\tThey send you a large number of volunteers.\n\t\t\t*set militia +10\n\t\t\t*set peasants -10\n\t\t\t*if farmers > 9\n\t\t\t\tEven a few farmers decide to join your ranks.\n\t\t\t\t*set farmers -10\n\t\t\t\t*set militia +10\n\t\t\t\t*page_break\n\t\t\t\t*goto mobilize\n\t\t\t*page_break\n\t\t\t*goto mobilize2\n\t\tThey send you a small number of volunteers.\n\t\t*set militia +10\n\t\t*set peasants -10\n\t\t*page_break\n\t\t*goto mobilize2\n\t*disable_reuse *selectable_if (druids > 0) #Ask the Druids to send me animals trained for war.\n\t\t*set druids -1\n\t\tThe Druids are displeased with your proposal, but they send you some trained animals nonetheless.\n\t\t*set army +10\n\t\t*page_break\n\t\t*goto mobilize2\n\t*disable_reuse #Release and pardon prisoners from the dungeon if they're willing to fight.\n\t\tYour army grows, but many in the Kingdom disapprove of this. \n\t\t*set dark +10\n\t\t*set rule -1\n\t\t*if bandits > 0\n\t\t\t*set militia +bandits\n\t\t\t*set bandits 0\n\t\t*if thieves > 0\n\t\t\t*set militia +thieves\n\t\t\t*set thieves 0\n\t\t*set militia +5\n\t\t*set guards +5\n\t\t*set peasants -2\n\t\t*page_break\n\t\t*goto mobilize2\n\t#That is all.\n\t\t\"Very well…\"\n\t\t*set army +guards\n\t\t*set army +militia\n\t\t*page_break\n\t\t*goto army\n\t\t\n*label army\nHere's a summary of your current army:\n\nSoldiers: ${army}\n\nArchers: ${archers}\n\nKnights: ${knights}\n\nMagicians: ${magicians}\n\nCatapults: ${catapults}\n\n*choice\n\t#Order my army to march.\n\t\tYou get your forces ready to march…\n\t\t*page_break\n\t\t*goto war1\n\t#Go back to preparing for war.\n\t\t\"Very well…\"\n\t\t*set army -guards\n\t\t*set army -militia\n\t\t*page_break\n\t\t*goto mobilize2\n\t\n*label war1\n\nYou march your forces toward the barbarian camp, which is located on the outskirts of Galmencia. It's a hilly forest area; it's possible to use the terrain to your advantage.\n\nWhere do you set up your forces?\n*if health \u003c 1\n\t*set health 1\n\t\n*choice\n\t#On top of the hill.\n\t\tThe hill is a good strategic location; it will increase the range of your archers and catapults.\n\t\t*page_break\n\t\t*goto war2\n\t#Hide most of them in the forest.\n\t\tThis terrain can be used for a surprise attack and also provides cover from arrows. \n\t\t*set inforest 1\n\t\t*page_break\n\t\t*goto war2\n\t#The open field; let's finish this!\n\t\tA bold move, and your men are emboldened by your confidence. \n\t\t*set peasants +10\n\t\t*page_break\n\t\t*goto war2\n\t\t\n*label war2\nThe enemy army approaches; there must be at least two hundred of them. They blow war horns and start beating drums. Your men look at each other, clearly uneasy with the coming horde.   \n*set barbarians 200\n*choice\n\t*selectable_if (intelligence > 0) #Give a speech to embolden my troops.\n\t\tYour speech raises your men's spirits, and they look ready to fight.\n\t\t*set rule +1\n\t\t*page_break\n\t\t*goto war3\n\t#Tell my men to hold steady.\n\t\tYou tell your men to hold steady…\n\t\t*page_break\n\t\t*goto war3\n\t\t\n*label war3\nThe enemy army is in full formation now; they appear to be attempting to surround your forces in a circle. \n\n\nYour Forces:\n\nSoldiers: ${army}\n\nArchers: ${archers}\n\nKnights: ${knights}\n\nMagicians: ${magicians}\n\nCatapults: ${catapults}\n\n\nEnemy Forces:\n\n*if barbarians > 0\n\t${barbarians} Barbarians\n\t\n*if barbarians \u003c 0\n\tThe barbarians have scattered, and only a handful remain.\n\t*set rule +1\n\t*page_break\n\t*goto war4\n\n*choice\n\t\t*selectable_if (archers > 9) #Fire a volley from the archers. (Requires 10 Archers)\n\t\t\tYou fire a volley from your archers!\n\t\t\t*set barbarians -archers\n\t\t\t\t\t\n\t\t\t*if onhill > 0\n\t\t\t\t*if barbarians_inforest \u003c 1\n\t\t\t\t\tYou do extra damage, since your men are firing from the hill.\n\t\t\t\t\t*set barbarians -10\n\t\t\t\n\t\t\t*if barbarians_inforest > 0 \n\t\t\t\tMost of your arrows don't hit their targets due to the fact that the barbarians have found cover in the forest. They shoot a volley of their own back at you.\n\t\t\t\t*set archers -10\n\t\t\t\t*set barbarians -5\t\t\t\n\t\t\t\t\n\t\t\t*if barbarians_inforest \u003c 1 \n\t\t\t\tAfter you fire with your archers, several barbarians flee to the cover of the forest. \n\t\t\t\t*set barbarians_inforest 1\n\t\t\t\n\t\t\t*page_break\n\t\t\t*goto war3\n\t\t\n\t\t*selectable_if (catapults > 0) #Fire the catapult. (Requires Working Catapult)\t\n\t\t\tYou fire the catapult! Several barbarians scatter as huge boulders land near them. \n\t\t\t*set barbarians -20\n\t\t\t*set catapults -1\n\t\t\t*if onhill > 0\n\t\t\t\tYou do extra damage, since your men are firing from the hill.\n\t\t\t\t*set barbarians -10\n\t\t\t*if catapults \u003c 1\n\t\t\t\t\tYour catapult has jammed!\n\t\t\t\t\t*goto war3\t\n\t\t\tYour men begin to load more stones onto the catapult.\n\t\t\t*goto war3\n\t\t*selectable_if (archers > 0) #Have my archers put down their bows and join the soldiers with their swords.\n\t\t\tYour archers put away their bows and take out their short swords. \n\t\t\t*set army +archers\n\t\t\t*set archers 0\n\t\t\t*page_break\n\t\t\t*goto war3\n\t\t#Charge them!\n\t\t\tYou charge the barbarians head on, and both sides take heavy casualties, as the fighting is brutal. \n\t\t\t*set army -25\n\t\t\t*set barbarians -25\n\t\t\t*page_break\n\t\t\t*goto war4\n\t\t*disable_reuse *selectable_if (inforest > 0) #Let them get closer, then attack them by surprise with my troops hiding in the forest.\n\t\t\tIt works well! Many of the barbarians are killed, but you suffer casualties of your own.\n\t\t\t*set barbarians - 30\n\t\t\t*set army -10\n\t\t\t*page_break\n\t\t\t*goto war3\n\t\t*selectable_if (barbarians \u003c 1) #Finish them.\n\t\t\tYou finish off the remaining barbarians.\n\t\t\t*page_break\n\t\t\t*goto war4\n\t\t#Surrender.\n\t\t\tAre you sure you want to surrender?\n\t\t\t*choice\n\t\t\t\t#Yes.\n\t\t\t\t\tYou surrender. The barbarian army surrounds you. Their leader approaches you. He smiles, and with a single strike of his club, he knocks you out. They take you as a hostage and return to their encampment. \n\t\t\t\t\t*page_break\n\t\t\t\t\t*set rule -1\n\t\t\t\t\tYou wake up in a dungeon in chains and spend several days there. You lose track of time.\n\n\t\t\t\t\tSuddenly, the dungeon door opens…\n\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t*if rule > 0 \n\t\t\t\t\t\tThe barbarian leader walks in. \"Well, what do you know…your people decided to pay your ransom. It was a hefty price, too…you're lucky to have such loyal subjects.\"\n\t\t\t\t\t\t*set gold 0\n\t\t\t\t\t\t*set rule 0\n\t\t\t\t\t\t*set farmers 0\n\t\t\t\t\t\t*set merchants 0\n\t\t\t\t\t\t*finish\n\t\t\t\t\tThe barbarian leader walks in. \"Sorry, Lord ${name}, your subjects weren't willing to pay your ransom. They already elected a new Lord to run Swamp Castle. You're of no further use to me.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\tHe smiles. \"Do you have anything to say before I end you?\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Beg for my life.\n\t\t\t\t\t\t\tHe laughs. \"Oh, not so noble now, are we? Fine, I won't end you…\"\n\n\t\t\t\t\t\t\tHe walks away, still laughing.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\tYou spend several years in the dungeon before you're finally released.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t#Remain silent.\n\t\t\t\t\t\t\t\"Oh, that's too bad, I was hoping to hear you beg for your life. Well, I guess this will have to do…\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tHe lifts up a sword and slashes down at you. The last thing you hear is him laughing.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\t#No. \n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto war3\n\n*label war4\t\n*set barbarians +100\n*image viking-33877_1280.png\n\t\nSuddenly, you hear war drums coming from behind you; your army is being attacked from the rear. You see a detachment of one hundred more barbarians charging at you. Apparently, they were hiding to ambush your forces.\n*page_break\n*label war5\t\n*if barbarians \u003c 0\n\tThe barbarians scatter as your army pursues them.\n\t*set rule +2\n\t*page_break\n\tYour soldiers finish off the rest of the barbarians and help your wounded men. You've won a great victory today, one that will be remembered by your people for years to come. \n\t\t\t\n\tYou and your remaining army march back to the castle. When you arrive, it is late evening. Content and at peace with your most recent victory, you fall asleep as soon as your head touches the pillow. \n\t*page_break\n\t*goto volunteers\n\nEnemy Forces:\n\n*if barbarians > 0\n\t${barbarians} Barbarians\n\n*if barbarians \u003c 1\n\t*set rule +2\n\t*set Galmencia_battle 1\n\tYour soldiers finish off the rest of the barbarians. Your men help the wounded. You've won a great victory today, one that will be remembered by your people for years to come. \n\t\n\tYou and your remaining army march back to the castle. When you arrive, you go to your bedchamber to rest.\n\t*page_break\n\t*goto volunteers\n\t\nYour Forces:\n\n*if army > 0\n\tSoldiers: ${army}\n*if army \u003c 1\n\tYour soldiers have scattered.\n\n*if archer1 = 0\n\tArchers: ${archers}\n\nKnights: ${knights}\n\nMagicians: ${magicians}\t\n\n*choice\n\t\t*disable_reuse *selectable_if (archers > 9) #Fire a volley at the charging barbarians. (Requires 10 Archers)\n\t\t\t*set barbarians -archers\n\t\t\tAfter you fire with your archers, the barbarians reach your forces, and your archers are forced to drop their bows and pull out their short swords.\n\t\t\t*set army +archers\n\t\t\t*page_break\n\t\t\t*goto war5\n\t\t*selectable_if (catapults > 0) #Fire the catapult. (Requires Working Catapult)\t\n\t\t\tYou fire the catapult! Several barbarians scatter as huge boulders land near them. \n\t\t\t*set barbarians -20\n\t\t\t*set catapults -1\n\t\t\t*if onhill > 0\n\t\t\t\tYou do extra damage, since your men are firing from the hill.\n\t\t\t\t*set barbarians -10\n\t\t\t*if catapults \u003c 1\n\t\t\t\tYour catapult has jammed!\n\t\t\t\t*goto war5\n\t\t\tYour men begin to load more stones onto the catapult.\n\t\t\t*goto war5\n\t\t*selectable_if (knights > 2) #Have the soldiers charge them, supported by my knights. (Requires 3 Knights)\n\t\t\t\tThe fighting is brutal, but the casualties are about even. \n\t\t\t\t*set knights -2\n\t\t\t\t*set army -15\n\t\t\t\t*set barbarians -25\n\t\t\t\t*page_break\n\t\t\t*goto war5\n\t\t*selectable_if (knights > 0) #Send a knight into the fray!\n\t\t\tYour knight valiantly dives into battle, taking out five barbarians before he falls. \n\t\t\t*set knights -1\n\t\t\t*set barbarians -5\n\t\t\t*page_break\n\t\t\t*goto war5\n\t\t*selectable_if (magicians > 0) #Have a magician cast a fireball spell.\n\t\t\tYour magician casts a fireball, causing heavy damage to the enemy; however, one of the barbarians strikes him down before he can withdraw.\n\t\t\t*set magicians -1\n\t\t\t*set barbarians -25\n\t\t\t*page_break\n\t\t\t*goto war5\n\t\t*disable_reuse *selectable_if (leadership > 2) #Make a coordinated strike on their leader. (Requires Leadership)\n\t\t\t\tYou hit the vanguard of their army hard, and the leader is forced to withdraw. You use the chaos to your advantage, defeating several barbarians.\n\t\t\t\t*set army -10\n\t\t\t\t*set barbarians -20\n\t\t\t\t*page_break\n\t\t\t\t*goto war5\n\t\t*selectable_if (archers > 0) #Have my archers put down their bows and join the soldiers with their swords.\n\t\t\tYour archers put away their bows and take out their short swords. \n\t\t\t*set army +archers\n\t\t\t*set archers 0\n\t\t\t*page_break\n\t\t\t*goto war5\n\t\t*selectable_if (army > 0) #Have my soldiers attack them!\n\t\t\t*if leadership \u003c 2\n\t\t\t\tYou charge the barbarians head on; the fighting is brutal, and your troops take heavy casualties. \n\t\t\t\t*set army -40\n\t\t\t\t*set barbarians -20\n\t\t\t\t*page_break\n\t\t\t\t*goto war5\n\t\t\tYou charge the barbarians head on; the fighting is brutal, and both sides take heavy casualties. \n\t\t\t*set army -20\n\t\t\t*set barbarians -20\n\t\t\t*page_break\n\t\t\t*goto war5\n\t\t*disable_reuse *selectable_if (advisor = 2) #Send in Gothica the Warrior\n\t\t\tGothica kills dozens of barbarians, but eventually she takes too many arrows and gets tired out. You order your men to retrieve her, and she yells at the enemy as your troops literally drag her to safety.\n\t\t\t*set barbarians -20\n\t\t\t*page_break\n\t\t\t*goto war5\n\t\t*disable_reuse *selectable_if (advisor = 1) #Send in General Varys to rout the enemy.\n\t\t\tThe General does a good job at attacking the barbarians by finding a weak spot in their formation. Many of them scatter; however, he's unable to rout them all. He's forced to withdraw when an arrow strikes his horse. \n\t\t\t*set barbarians -15\n\t\t\t*page_break\n\t\t\t*goto war5\n\t\t*disable_reuse *selectable_if (army > 0) #Attack the barbarians along with my men.\n\t\t\tYour men are inspired by your daring attack; however, you're forced to withdraw when one of the barbarians takes down your horse.\n\t\t\t*if strength > 3\n\t\t\t\t*set barbarians -20\n\t\t\t\t*set army -5\n\t\t\t\t*page_break\n\t\t\t\t*goto war5\n\t\t\t*set barbarians -10\n\t\t\t*set army -10\n\t\t\t*page_break\n\t\t\t*goto war5\n\t\t*selectable_if (army \u003c 1) #Fight to the bitter end.\n\t\t\t\tYou stand and fight, even as your men flee.\n\t\t\t\t*page_break\n\t\t\t\t*goto fight1\n\t\t*selectable_if (barbarians \u003c 1) #Finish them.\n\t\t\t*set rule +2\n\t\t\t*set Galmencia_battle 1\n\t\t\tYour soldiers finish off the rest of the barbarians. Your men help the wounded. You've won a great victory today, one that will be remembered by your people for years to come. \n\t\t\t\n\t\t\tYou and your remaining army march back to the castle. When you arrive, you go to your bedchamber to rest.\n\t\t\t*page_break\n\t\t\t*goto volunteers\n\t\t#Surrender.\n\t\t\tYou surrender. The barbarian army surrounds you. Their leader approaches you. He smiles, and with a single strike of his club, he knocks you out. They take you as a hostage and return to their encampment. \n\t\t\t*page_break\n\t\t\t*set rule -1\n\t\t\tYou wake up in a dungeon in chains and spend several days there. You lose track of time…\n\n\t\t\tSuddenly, the dungeon door opens.\n\t\t\t*page_break\n\t\t\t\t\t\t\n\t\t\t*if rule > 9 \n\t\t\t\tThe barbarian leader walks in. \"Well, what do you know…your people decided to pay your ransom. It was a hefty price, too…you're lucky to have such loyal subjects.\"\n\t\t\t\t*set gold 0\n\t\t\t\t*set rule 0\n\t\t\t\t*set peasants 0\n\t\t\t\t*set farmers 0\n\t\t\t\t*set merchants 0\n\t\t\t\t*set militia 0\n\t\t\t\t*finish\n \n\t\t\tThe barbarian leader walks in. \"Sorry, Lord ${name}, your subjects weren't willing to pay your ransom. They already elected a new Lord to run Swamp Castle. You're of no further use to me.\"\n\t\t\t\t\t\t\n\t\t\tHe smiles. \"Do you have anything to say before I end you?\"\n\t\t\t*choice\n\t\t\t\t#Beg for my life.\n\t\t\t\t\tHe laughs. \"Oh, not so noble now, are we? Fine, I won't end you…\"\n\n\t\t\t\t\tHe walks away, still laughing.\n\t\t\t\t\t*page_break\n\t\t\t\t\tYou spend several years in the dungeon before you're finally released.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t\t\n\t\t\t\t#Remain silent.\n\t\t\t\t\t\"Oh, that's too bad, I was hoping to hear you beg for your life. Well, I guess this will have to do…\"\n\t\t\t\t\t\t\t\n\t\t\t\t\tHe lifts up a sword and slashes down at you. The last thing you hear is him laughing.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto_scene death\n\t\t\t\n*label volunteers\n*achieve warriorspath\nThe next day, your advisor approaches.\n*page_break\n*if militia > 0\n\t\"Lord ${name}, when organizing the army, we had several volunteers join. There is a dispute between your commanders on what we should do with these men, especially the militia.\"\n\t\n\tWhat do you advise?\n\t\n\t*if peasants > 0\n\t\tAvailable Peasants: ${peasants}\n\t\n\t*if peasants \u003c 0\n\t\t*set peasants 0\n\t\tThere are no peasants left.\n\t\n\tNumber of Troops Claiming They Were Volunteers: ${militia}\n\t\n\t*choice\n\t\t#This was a temporary measure to avert disaster. All drafted troops should return to their normal professions.\n\t\t\tYou decide to order the volunteers to disband and return to their normal professions. Since record-keeping wasn't a priority for the commanders, they can't ensure that all of the volunteers have left the army, but by the looks of it, most of them have. This has upset a few of your commanders, but the majority understand your position. A few volunteers return the equipment they received, but most keep it for themselves. Many of the peasants are happy with your decision.\n\t\t\t*set guards 0\n\t\t\t*if difficulty \u003c 3\n\t\t\t\t*set gold +200\n\t\t\t*set guards +pre_war_guards\n\t\t\t*set knights 0\n\t\t\t*set knights +pre_war_knights\n\t\t\t*if militia \u003c pre_war_militia\n\t\t\t\t*set rule -1\n\t\t\t*if militia > pre_war_militia\n\t\t\t\t*set militia 0 \n\t\t\t\t*set militia +pre_war_militia\n\t\t\t*set peasants 0 \n\t\t\t*set peasants +pre_war_peasants\n\t\t\t*if peasants \u003c 10\n\t\t\t\t*set peasants +8\n\t\t\t*finish\n\t\t#Let them sort it out themselves.\n\t\t\tThe commanders decide to let the men decide for themselves. The number of volunteers that return is about half. Most of your commanders are satisfied with this result, though some still feel you should have kept all the volunteers. The people are happy with your decision.\n\t\t\t*set guards -2\n\t\t\t*if militia \u003c pre_war_militia\n\t\t\t\t*set rule -1\n\t\t\t*if militia > 0\n\t\t\t\t*set militia militia/2\n\t\t\t*set peasants + militia\n\t\t\t*if peasants \u003c 10\n\t\t\t\t*set peasants +5\n\t\t\t*if difficulty \u003c 3\n\t\t\t\t*set rule +1\n\t\t\t*finish\n\t\t#There could be more attacks; as a precaution, I want all draftees to remain in their current positions. \n\t\t\tYour commanders are happy with this decision. A few of the volunteers have escaped, but the majority stay. The peasant population is rather displeased with your decision. \n\t\t\t*set rule -2\n\t\t\t*set militia -10\n\t\t\t*set peasants -5\n\t\t\t*if peasants > 10\n\t\t\t\t*set peasants -5\n\t\t\t*set guards -5\n\t\t\t*if difficulty = 3\n\t\t\t\t*set rule -1\n\t\t\t*finish\n\n\"Lord ${name}, many of the volunteers that were drafted into the army have died. It has lowered the morale of the peasant population greatly. I would advise you not to draft any more peasants until the people have had a chance to recover from this terrible loss.\"\n*set rule -2\n*finish\t\t\t\n*label fight1\nThe fighting is brutal, and soon you're completely surrounded by the barbarians.\n*set rule -1\n\nA huge barbarian charges at you with a large sword…\n*page_break\n*if agility > 2\n\tYou dodge the blow and knock him down.\n\t*set barbarians -1\n\t*page_break\n\t*goto fight2\n*if strength > 2\n\tYou block his blow and shove your sword deep into his chest.\n\t*set barbarians -1\n\t*page_break\n\t*goto fight2\n\n*if agility > 0 \n\tYou manage to block the blow, but you're unable to take him down.\n\t*page_break\n\t*goto fight2\n\nYou fight with the barbarian; he slashes with a fierceness you've never seen before. \n*set health -10\n*if health \u003c 1\n\tYou've taken too many hits. You fall to the ground and breathe your last breath.\n\t*page_break\n\t*goto_scene death\nYou eventually cut him down, but not before taking a few hits of your own.\n*set barbarians -1\n*page_break\n*goto fight2\n\t\t\n*label fight2\t\t\n*if barbarians > 0\n\tRemaining Barbarians: ${barbarians}\n\t\n*if barbarians \u003c 1\n\tMost of the barbarians flee, and you finish off the last of them, ending the battle in victory!\n\t*set rule +1\n\t*set militia 0\n\t*page_break\n\t*finish\n*if health \u003c 12\n\tYour Health is dangerously low!\n\n*if health \u003c 0\n\t*page_break\n\tA barbarian stabs you with his sword, and you fall to the ground. \n\t*goto_scene death\n\n\nYour Health is ${health}.\n\nWhat should you do?\n*choice\n\t#Attack.\n\t\tYou attack the barbarians with complete disregard for your own safety.\n\t\t*if strength > 2\n\t\t\tYou kill two of them.\n\t\t\t*set barbarians -2\n\t\t\t*set health -10\n\t\t\t*if health \u003c 1 \n\t\t\t\tSuddenly, you feel the pain of a spear being stabbed through your chest from behind. You fall to the ground. Looking around, you see your army scatter, and the survivors butchered. The barbarian that stabbed you takes out his dagger and holds you down.\n\t\t\t\t*page_break\n\t\t\t\t*if light \u003c 71\n\t\t\t\t\tThe last thing you feel is a dagger slitting your throat.\n\t\t\t\t\t*goto_scene death\n\t\t\t\tYou feel the end is near as the barbarian puts the dagger to your throat…\n\t\t\t\t*page_break\n\t\t\t\tSuddenly, you hear someone yelling, and the barbarian puts down the dagger. You see a large barbarian order the others to take you prisoner. The last thing you remember is being dragged away by one of them.\n\t\t\t\t*set rule -1\n\t\t\t\t*page_break\n\t\t\t\tYou wake up in a dungeon in chains. Your wounds have been treated. You spend several days there and eventually lose track of time…\n\n\t\t\t\tSuddenly, the dungeon door opens.\n\t\t\t\t*page_break\n\t\t\t\t\t\t\t\n\t\t\t\t*if rule > 9 \n\t\t\t\t\tThe barbarian leader walks in. \"Well, what do you know…your people decided to pay your ransom. It was a hefty price, too…you're lucky to have such loyal subjects.\"\n\t\t\t\t\t*set gold 0\n\t\t\t\t\t*set rule 0\n\t\t\t\t\t*set peasants 0\n\t\t\t\t\t*set farmers 0\n\t\t\t\t\t*set merchants 0\n\t\t\t\t\t*set militia 0\n\t\t\t\t\t*finish\n\n\t\t\t\tThe barbarian leader walks in. \"Sorry, Lord ${name}, your subjects weren't willing to pay your ransom. They already elected a new Lord to run Swamp Castle. You're of no further use to me.\"\n\t\t\t\t\t\t\t\n\t\t\t\tHe smiles. \"Do you have anything to say before I end you?\"\n\t\t\t\t*choice\n\t\t\t\t\t#Beg for my life.\n\t\t\t\t\t\tHe laughs. \"Oh, not so noble now, are we? Fine, I won't end you…\"\n\n\t\t\t\t\t\tHe walks away, still laughing.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tYou spend several years in the dungeon before you're finally released.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t#Remain silent.\n\t\t\t\t\t\t\"Oh, that's too bad, I was hoping to hear you beg for your life. Well, I guess this will have to do…\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tHe lifts up a sword and slashes down at you. The last thing you hear is him laughing.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto_scene death\t\n\t\t\t*page_break\n\t\t\t*goto fight2\n\t\tYou manage to kill one of them.\n\t\t*set health -10\n\t\t*set barbarians -1\n\t\t*page_break\n\t\t*goto fight2\n\t*selectable_if (fireball > 0) #Cast a fireball spell.\n\t\tYou cast a huge fireball that smashes down into a group of barbarians, killing several of them. \n\t\t*set fireball -1\n\t\t*set barbarians -10\n\t\t*page_break\n\t\t*goto fight2\n\t*selectable_if (healing > 0) #Drink a healing potion.\n\t\tYou drink a healing potion and feel refreshed.\n\t\t*set health 100\n\t\t*set healing -1\n\t\t*page_break\n\t\t*goto fight2\n\n\t*selectable_if (barbarians \u003c 1) #Finish them.\n\t\t\tYou kill the last of the barbarian scum. You look around you; most of your men are wounded or dead, but at least you've won the battle. You have just enough energy to find a horse and ride back to your castle. When you arrive, you collapse on the ground. Your servants carry you to your bedchamber. Several of the townspeople hear of what you did on the battlefield and marvel at how you're still alive.\n\t\t\t*set rule +1\n\t\t\t*finish\n\t*selectable_if (health \u003c 50) #Surrender.\n\t\tYou surrender. The barbarian army surrounds you. Their leader approaches you. He smiles, and with a single strike of his club, he knocks you out. They take you as a hostage and return to their encampment. \n\t\t*page_break\n\t\t*set rule -1\n\t\tYou wake up in a dungeon in chains and spend several days there. You lose track of time…\n\n\t\tSuddenly, the dungeon door opens.\n\t\t*page_break\n\t\t\t\t\t\n\t\t*if rule > 0 \n\t\t\tThe barbarian leader walks in. \"Well, what do you know…your people decided to pay your ransom. It was a hefty price, too…you're lucky to have such loyal subjects.\"\n\t\t\t*set gold 0\n\t\t\t*set rule -4\n\t\t\t*set peasants 0\n\t\t\t*set farmers 0\n\t\t\t*set merchants 0\n\t\t\t*set militia 0\n\t\t\t*if rule \u003c 0\n\t\t\t\t*set rule 0\n\t\t\t*finish\n\t\t*if rule \u003c 0 \n\t\t\tThe barbarian leader walks in. \"Sorry, Lord ${name}, your subjects weren't willing to pay your ransom. They already elected a new Lord to run Swamp Castle. You're of no further use to me.\"\n\t\t\t\t\t\t\n\t\t\tHe smiles. \"Do you have anything to say before I end you?\"\n\t\t\t*choice\n\t\t\t\t#Beg for my life.\n\t\t\t\t\tHe laughs. \"Oh, not so noble now, are we? Fine, I won't end you…\"\n\n\t\t\t\t\tHe walks away, still laughing.\n\t\t\t\t\t*page_break\n\t\t\t\t\tYou spend several years in the dungeon before you're finally released.\n\n\t\t\t\t\tWhen you arrive to your former castle, you aren't welcome, as they've already elected a new Lord, and you're turned away instead. \n\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t\t\n\t\t\t\t#Remain silent.\n\t\t\t\t\t\"Oh, that's too bad, I was hoping to hear you beg for your life. Well, I guess this will have to do…\"\n\t\t\t\t\t\t\t\n\t\t\t\t\tHe lifts up a sword and slashes down at you. The last thing you hear is him laughing.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto_scene death\n", "day5": "*advertisement\n*temp tax_increase 1\n*temp tax_increase2 1\n*temp food_increase 10\n*temp guard_army 0\n*temp gold_increase 0\n*temp vote 2000\n*if militia \u003c 0\n\t*set militia 0\n*if guards \u003c 0\n\t*set guards 0\n*if merchants \u003c 0\n\t*set merchants 0\n*if magicians \u003c 0\n\t*set magicians 0\n*if farmers \u003c 0\n\t*set farmers 0\n*if peasants \u003c 0\n\t*set peasants 0\n*if workers \u003c 0\n\t*set workers 0\n*if knights \u003c 0\n\t*set knights 0\n*if archers \u003c 0\n\t*set archers 0\n*if druids \u003c 0\n\t*set druids 0\n*if your_votes > 0\n\t*goto election\nYou wake up and look outside to a new day. It has been several weeks since the last barbarian attack. It appears things are finally calming down, and you've used that time to become a better leader.\n*set health 100\n*page_break\n\nWhat should you focus on improving?\n\n\nCurrent Stats:\n\n${leadership} Leadership\n\n${Strength} Strength\n\n${Agility} Agility\n\n${Diplomacy} Diplomacy\n\n${Stealth} Stealth\n\n${Intelligence} Intelligence\n\n\n*choice\n\t#Leadership.\n\t\tYou've found Leadership to be important on the battlefield. Your Leadership increases slightly.\n\t\t*set leadership +1\n\t\t*page_break\n\t\t*goto kingdom\n\t#Diplomacy.\n\t\tYou've found Diplomacy to be an important tool. Your skills in it increase slightly.\n\t\t*set diplomacy +1\n\t\t*page_break\n\t\t*goto kingdom\n\t#Agility.\n\t\tYou've found Agility to be important on the battlefield. Your Agility increases slightly.\n\t\t*set agility +1\n\t\t*page_break\n\t\t*goto kingdom\n\t#Strength.\n\t\tYou've found Strength to be important on the battlefield. Your Strength increases slightly.\n\t\t*set strength +1\n\t\t*page_break\n\t\t*goto kingdom\n\t#Stealth.\n\t\tYou've found Stealth to be an important tool. Your skills in it increase slightly.\n\t\t*set stealth +1\n\t\t*page_break\n\t\t*goto kingdom\n\t#Intelligence.\n\t\tYou've found knowledge to be an important tool. Your ability has increased slightly.\n\t\t*set intelligence +1\n\t\t*page_break\n\t\t*goto kingdom\n\n*label kingdom\nKingdom Summary\n\n\nCivilian Units:\n\n*if peasants > 0\n\t${peasants} Peasants\n\n*if peasants \u003c 1\n\t\tYou have no peasants to recruit units from!\n\t\t*set peasants 0\n\n${merchants} Merchants\n\n${farmers} Farmers\n\n${workers} Workers\n\t\t\n\t\t\nMilitary Units:\n\t\t\n${militia} Militia\n\n${guards} Guards\n\n${knights} Knights\n\n${archers} Archers\n\n\nUnique Units:\n\n${druids} Druids\n\n${magicians} Magicians\n\n${thieves} Thieves\n\n${bandits} Bandits\n\nOther Important Statistics:\n\n${rule} Rule\n\n*if rule > 3 \n\t(Rule is secure.)\n*if rule \u003c 4 \n\t(Rule is not secure.)\n\n${gold} Gold Pieces\n\n*if tax = 0\n\tNo Taxes\n\t*set tax_increase 0\n\n*if tax = 10\n\tLow Taxes\n\t*set tax_increase 10\n\t\n*if tax = 20\n\tMedium Taxes\t\n\t*set tax_increase 20\n\t\n*if tax = 30\n\tHigh Taxes\t\n\t*set tax_increase 30\n\t\n*choice\n\t*if (Gold > 9) and (peasants > 0) \n\t\t#Hire Militia. (10 GP)\n\t\t\t*set militia +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -10\n\t\t\t*goto kingdom\n\t*if (Gold > 99) and (peasants > 9) \n\t\t#Hire 10 Militia. (100 GP)\n\t\t\t*set militia +10\n\t\t\t*set peasants -10\n\t\t\t*set gold -100\n\t\t\t*goto kingdom\n\t*if (Gold > 49) and (peasants > 0)\n\t\t#Hire Guards. (50 GP)\n\t\t\t*set guards +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -50\n\t\t\t*goto kingdom\n\t*if (Gold > 249) and (peasants > 0)\n\t\t#Hire 5 Guards. (250 GP)\n\t\t\t*set guards +5\n\t\t\t*set peasants -5\n\t\t\t*set gold -250\n\t\t\t*goto kingdom\n\t*if (Gold > 99) and (peasants > 0) \n\t\t#Hire Knights. (100 GP)\n\t\t\t*set knights +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -100\n\t\t\t*goto kingdom\n\t*if (Gold > 49) and (peasants > 0) \n\t\t#Hire Merchants. (50 GP)\n\t\t\t*set merchants +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -50\n\t\t\t*goto kingdom\n\t*if (Gold > 9) and (peasants > 0) \n\t\t#Hire Farmers. (10 GP)\n\t\t\t*set farmers +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -10\n\t\t\t*goto kingdom\n\t*if (Gold > 99) and (peasants > 9) \n\t\t#Hire 10 Farmers. (100 GP)\n\t\t\t*set farmers +10\n\t\t\t*set peasants -10\n\t\t\t*set gold -100\n\t\t\t*goto kingdom\n\t*if (Gold > 199) and (peasants > 0) \n\t\t#Hire Magicians. (200 GP)\n\t\t\t*set magicians +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -200\n\t\t\t*goto kingdom\n\t*if (Gold > 74) and (peasants > 0) \n\t\t#Hire Archers. (75 GP)\n\t\t\t*set archers +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -75\n\t\t\t*goto kingdom\n\t*if (Gold > 374) and (peasants > 0) \n\t\t#Hire 5 Archers. (375 GP)\n\t\t\t*set archers +5\n\t\t\t*set peasants -5\n\t\t\t*set gold -375\n\t\t\t*goto kingdom\n\t*if (Gold > 24) and (peasants > 0) \n\t\t#Hire Workers. (25 GP)\n\t\t\t*set workers +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -25\n\t\t\t*goto kingdom\n\t*if (Gold > 124) and (peasants > 4) \n\t\t#Hire 5 Workers. (125 GP)\n\t\t\t*set workers +5\n\t\t\t*set peasants -5\n\t\t\t*set gold -125\n\t\t\t*goto kingdom\n\t#Done.\n\t\t*set tax_increase tax * peasants\n\t\t*set tax_increase2 * merchants\n\t\t*set gold +tax_increase\n\t\t*set gold +tax_increase2\n\t\tCompleted. New taxes collected.\n\t\t\n\t\t\n\t\tYou now have ${gold} Gold Pieces in the treasury. \n\t\t*page_break\n\t\t*goto taxes\n\n*label taxes\nWhat should the tax rate be?\n*choice\n\t#High taxes.\n\t\t\"We are in dire needs of funds. We will have high taxes.\"\n\t\t*set tax 30 \n\t\t*set peasants -10\n\t\t\t\n\t\t*if peasants \u003c 1\t\n\t\t\t*set peasants 0\n\t\t*set merchants -2\n\t\t*set farmers -1\n\t\t*goto start\n\t#Medium taxes.\n\t\t\"We will have a medium tax rate.\"\n\t\t*if peasants \u003c 1\t\n\t\t\t*set peasants 0\n\t\t*set tax 20\n\t\t*goto start\n\t#Low Taxes.\n\t\t\"We will have low taxes.\"\n\t\t*if peasants \u003c 1\t\n\t\t\t*set peasants 0\n\t\t*set tax 10\n\t\t*set peasants +5\n\t\t*set merchants +5\n\t\t*set farmers +1\n\t\t*goto start\n\t#No taxes.\n\t\t\"We need to get as many people as we can to join our villages. I will temporarily suspend taxes.\"\n\t\t*if peasants \u003c 1\t\n\t\t\t*set peasants 0\n\t\t*set peasants +15\n\t\t*set merchants +10\n\t\t*set farmers +5\n\t\t*set tax 0\n\t\t*goto start\n\n*label start\n*if rule \u003c 0\n\t*goto revolution\n\n*goto check\n\n*label revolution\nYou hear a commotion outside…\n*page_break\nYou look outside and see several peasants gathering around your castle. Apparently, they're revolting.\n*choice\n\t#Send guards to quell the rebellion.\n\t\t*set guard_army +guards\n\t\t*set guard_army +militia\n\t\t*set guard_army +archers\n\t\t*set guard_army +knights\n\t\t*set guard_army +magicians\n\t\t*set guard_army +defenses\n\t\t\n\t\t*if guard_army > 49\n\t\t\tYour troops are able to put down the rebellion, but you suffer major casualties and property damage. \n\t\t\t*set guards -10\n\t\t\t*set militia -10\n\t\t\t*set archers -10\n\t\t\t*set knights 0\n\t\t\t*set magicians 0\n\t\t\t*set peasants -10\n\t\t\t*set gold 0\n\t\t\t*set rebellion_count +1\n\t\t\t*if rebellion_count = 1\n\t\t\t\t*achieve cake\n\t\t\t*if rebellion_count = 2\n\t\t\t\t*achieve cake2\n\t\t\t*if rebellion_count = 3\n\t\t\t\t*achieve cake3\n\t\t\t*page_break\n\t\t\t*goto story\n\n\t\tYour troops are unable to put down the rebellion. You are overthrown.\n\t\t*goto_scene death\n\t\t\n\t#Address their grievances.\n\t\t*if diplomacy > 3\n\t\t\tYou attempt to speak to your subjects…\n\t\t\t*page_break\n\t\t\tYou're able to calm them down, but not before much damage has been done.\n\t\t\t*set gold 0\n\t\t\t*set defenses 0\n\t\t\t*set rebellion_count +1\n\t\t\t*if rebellion_count = 1\n\t\t\t\t*achieve cake\n\t\t\t*if rebellion_count = 2\n\t\t\t\t*achieve cake2\n\t\t\t*if rebellion_count = 3\n\t\t\t\t*achieve cake3\n\t\t\t*page_break\n\t\t\t*goto story\n\t\t*if diplomacy \u003c 4\n\t\t\tYou attempt to speak to your subjects…\n\t\t\t*page_break\n\t\t\tThey throw rocks at you, and soon you're surrounded by an angry mob. They capture you and take over the castle. \n\t\t\t*goto_scene death\n\t\t\n*label check\n\n\n*if rule \u003c 4\n\t*goto rebellion\n\n*if rule > 3\n\t*goto story\n\t\n*label rebellion\nYou see several peasants carrying pitchforks and makeshift weapons. Your advisor tells you that they're forming a rebel army to overthrow you. \n\t\nHow do you handle it?\n*choice\n\t*selectable_if (guards > 14) #Send guards to quell the crowd. (Requires 15 Guards)\n\t\tThe guards manage to quell the crowd, but not before they cause much damage to the surrounding area.\n\t\t*set merchants -10\n\t\t*set farmers -10\n\t\t*set guards -10\n\t\t*set militia 0\n\t\t*set defenses 1\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*goto story\n\t*selectable_if (gold > 499) #Bribe them to go away. (500 GP)\n\t\tThey agree to take the Gold and disperse. \n\t\t*set gold -500\n\t\t*set merchants 0\n\t\t*set farmers 0\n\t\t*set militia 0\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*goto story\n\t*selectable_if (diplomacy > 2) #Address their grievances and negotiate a compromise.\n\t\tThey agree to your terms. \n\t\t*set merchants 0\n\t\t*set farmers 0\n\t\t*set militia 0\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*goto story\n\t#Do nothing. \n\t\t*set peasants -20\n\t\tPeasants riot in the streets and loot your fiefdom. It is total chaos.\n\t\t*if peasants \u003c 1\n\t\t\t*page_break\n\t\t\t*goto possible_end_game\n\t\t*set peasants 0\n\t\t*set merchants 0\n\t\t*set farmers 0\n\t\t*set militia 0\n\t\t*set rule -1\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*goto story\n\t\n*label possible_end_game\nThe rebel peasants overtake your guards and bust through the castle doors. Five of them surround you.\n*choice\n\t*selectable_if (leadership > 2) #Order them to stand down. (Requires 3 Leadership)\n\t\tThey leave you alone, but not before stealing a few valuables. \n\t\t*set gold -250\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*goto story\n\t*selectable_if (light > 60) #Remind them how I helped them in the past.\n\t\tThey leave you alone, but not before stealing a few valuables. \n\t\t*set gold -250\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*goto story\n\t*selectable_if (dark > 60) #Threaten them.\n\t\tThey run off, but not before raiding your treasury.\n\t\t*set gold -500\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*goto story\n\t#Defend myself.\n\t\tYou look around; this will likely be the toughest battle you've ever faced. They surround you from all sides, and you don't even have a weapon on you.\n\t\t*page_break\n\t\tThey're hesitant to attack you…\n\t\t\n\t\tWhat should you do?\n\t\t*choice\n\t\t\t#Charge the peasant with the spear.\n\t\t\t\t*if agility \u003c 3\n\t\t\t\t\tYou charge the peasant with the spear, but he's too quick for you; he stabs the spear deep into your leg. You're forced down to your knees.\n\t\t\t\t\t*page_break\n\t\t\t\t\tSeeing you fall causes the other peasants to join in, and they begin to strike you with their weapons.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t*selectable_if (strength > 2) #Rip the spear out of my leg and stab one of the peasants with it. (Requires Great Strength)\n\t\t\t\t\t\t\tYou're able to remove the spear and use it as a weapon. \n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto fight_rebels\n\t\t\t\t\t\t#Try to roll away.\n\t\t\t\t\t\t\tYou're unsuccessful. The peasants keep attacking you.\n\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t*selectable_if (guards > 10) #Yell for help.\n\t\t\t\t\t\t\tA few of your soldiers manage to help you up. One hands you his sword. However, they're soon overpowered by another mob of peasants. You are once again facing the five rebels, but at least this time, you're armed.\n\t\t\t\t\t\t\t*set health -30\n\t\t\t\t\t\t\t*set guards -5\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto fight_rebels\n\n\t\t\t\tYou manage to shove the peasant down and get a hold of his spear. You're still surrounded, but at least you have a weapon now.\n\t\t\t\t*page_break\n\t\t\t\t*goto fight_rebels\n\t\t\t#Charge the peasant with the club.\n\t\t\t\t\tYou push the peasant over and are able to grab his club. At least you're armed now. \n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto fight_rebels\n\t\t\t#Charge the peasant with the dagger.\n\t\t\t\tYou run towards him to attack, but he's quite skilled. He avoids your blows, then strikes you several times. You soon fall to the ground. The rest of the peasants attack you from all sides. You slowly lose consciousness.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene death\n\t\t\t*selectable_if (leadership > 2) #Taunt one of them into attacking me.\n\t\t\t\tThe one with the spear attempts to stab you with it.\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (agility > 0) #Dodge and attempt grab his weapon. (Requires Agility)\n\t\t\t\t\t\tYou manage to grab his weapon. At least you're armed now. \n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto fight_rebels\n\t\t\t\t\t*selectable_if (strength > 2) #Let him attack you, but grab his weapon after he does.\n\t\t\t\t\t\t*set health -20\n\t\t\t\t\t\tThe peasant isn't very well trained with the weapon; he ends up stabbing you in your shoulder. You push him back and rip the spear out. The peasant runs away in surprise. You're hurt from the blow, but at least you have a weapon now.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto fight_rebels\n\t\t\t\t\t#Jump back.\n\t\t\t\t\t\tYou jump back but land right on the peasant with the club. He hits you hard on the head. Soon, all of the peasants are hitting you, and you're overwhelmed.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto_scene death\n\t\t\t#Wait for them to strike first.\n\t\t\t\tThis doesn't go your way. Soon, they all attack together, and you're overwhelmed.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene death\n\t\t\n*label fight_rebels\nThe fighting is vicious. You can't believe how much these peasants want you dead. \n*choice\n\t*selectable_if (strength > 3) #Fight on!\n\t\tThe fight is completely brutal; you hold nothing back. The remaining rebels are defeated. You have survived.\n\t\t*set peasants -10\n\t\t*set merchants 0\n\t\t*set farmers 0\n\t\t*set militia 0\n\t\t*set rule 0\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*page_break\n\t\t*goto story\n\t#Attempt to flee.\n\t\tThe peasants quickly overpower you.\n\t\t*page_break\n\t\t*goto_scene death\n\t*selectable_if (fireball > 0) #Cast a fireball.\n\t\tYou're able to cause enough damage to the rebels to lead a successful counter-attack. You have survived. \n\t\t*set merchants 0\n\t\t*set farmers 0\n\t\t*set militia 0\n\t\t*set peasants -10\n\t\t*set rule 0\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*page_break\n\t\t*goto story\n\n*label story\n\n*if militia \u003c 0\n\t*set militia 0\n*if guards \u003c 0\n\t*set guards 0\n*if merchants \u003c 0\n\t*set merchants 0\n*if magicians \u003c 0\n\t*set magicians 0\n*if farmers \u003c 0\n\t*set farmers 0\n*if peasants \u003c 0\n\tset peasants 0\n*if workers \u003c 0\n\t*set workers 0\n*if knights \u003c 0\n\t*set knights 0\n*if archers \u003c 0\n\t*set archers 0\n*if druids \u003c 0\n\t*set druids 0\n\nYou're relaxing in your study when your advisor knocks on the open door. \n*page_break\n\"My liege, Governor Gensa is here. He's requesting your presence in the great hall.\" \n*choice\n\t#\"Tell him I'll be right there.\"\n\t\t\"Yes, my liege!\"\n\t\t*page_break\n\t\t*goto story2\n\t#\"Him? Again? Very well…\"\n\t\tYour advisor leaves to make preparations.\n\t\t*page_break\n\t\t*goto story2\n\n*label story2\nYou arrive in the great hall. Governor Gensa is examining the state of your castle. \n*if castle \u003c 1\n\tGensa turns and says to you, \"You know, you really should aim to improve the condition your castle. It is in dire need of repairs.\"\n\t*set rule -1\n*if castle > 1\n\tGensa turns and says to you, \"Your castle seems to have undergone some repairs, it looks quite nice.\"\n\t*set rule +1\n*if castle = 1\n\t\"Your castle's condition is on par with a few others in the realm, you should really think about doing some repairs though. I see a few cracks in the foundation over there.\" \n*label start1\n*if difficulty = 3\n\t*set rule -1\n\nGensa begins to speak again once you're seated. \"Lord ${name}, I've come here to discuss the governing of the Western Province. As you may already be aware, I have been assigned the role of temporary Governor until we can have a formal vote to decide who the Governor should be. I wanted to get a take on your intentions.\"\n*choice\n\t#\"Who are the candidates?\"\n\t\tGensa responds. \"Well, the candidates have not yet been officially announced, but I can tell you that I plan on running, and I have good information stating that Vero and Gillian will run.\"\n\t\t*page_break\n\t\t*goto story3\n\t#\"I haven't really given it much thought at all…\"\n\t\t\"Hmmm, it seems you care little in regards to politics…would that be true?\"\n\t\t*choice\n\t\t\t#\"I guess you could say that.\"\n\t\t\t\t\"Hmm…well, if that's the case, perhaps this will be easier than I thought. I was hoping I could persuade you to vote for me. What would it take?\"\n\t\t\t\t*choice\n\t\t\t\t\t#\"Gold.\"\n\t\t\t\t\t\t\"Of course…of course. How does 8000 Gold Pieces sound?\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*selectable_if (diplomacy > 1) #\"10,000 sounds a lot better.\"\n\t\t\t\t\t\t\t\t*set gold +10000\n\t\t\t\t\t\t\t\t\"Very well. I shall send payment to you right away. It was a pleasure doing business with you.\"\n\t\t\t\t\t\t\t\t*set supported_gensa 1\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tHe leaves before you can change your mind.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto end_day\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#\"That would be acceptable.\"\n\t\t\t\t\t\t\t\t*set gold +8000\n\t\t\t\t\t\t\t\t\"Excellent! I shall send payment to you right away. It was a pleasure doing business with you.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tHe leaves before you can change your mind.\n\t\t\t\t\t\t\t\t*set supported_gensa 1\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto end_day\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#\"Forget it. I was just curious what you would offer.\"\n\t\t\t\t\t\t\t\tGensa shakes his head.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto story3\n\t\t\t\t\t#\"Troops.\"\n\t\t\t\t\t\t\"Interesting…how does ten guards sound?\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*selectable_if (diplomacy > 1) #\"Twenty guards would sound a lot better…\"\n\t\t\t\t\t\t\t\t\"Very well…I will send a detachment right away.\"\n\t\t\t\t\t\t\t\t*set guards +20\n\t\t\t\t\t\t\t\t*set supported_gensa 1\n\n\t\t\t\t\t\t\t\tHe leaves before you can change your mind.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto end_day\n\t\t\t\t\t\t\t#\"That would be acceptable.\"\n\t\t\t\t\t\t\t\t*set guards +10\n\t\t\t\t\t\t\t\t\"I will send a detachment right away.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*set supported_gensa 1\n\t\t\t\t\t\t\t\tHe leaves before you can change your mind.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto end_day\n\t\t\t\t\t\t\t#\"On second thought, I'm not interested in such an arrangement.\"\n\t\t\t\t\t\t\t\t\"Very well…\"\n\t\t\t\t\t\t\t\t*page_break\n\t\t\
