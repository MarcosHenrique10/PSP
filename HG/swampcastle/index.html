nt's wife uses the distraction to knock out two of the bandits. \n\t\t\t\t\t\t\t\t\t\t\t\t*if armed = 0\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou manage to grab a weapon from one of the downed bandits before the giant can reach you. \n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t*goto large-man\n\t\t\t\t\t\t\t\t\t#\"As your Lord, I order you to leave these people alone.\"\n\t\t\t\t\t\t\t\t\t\t\"I've had enough of you and your orders,\" says the large man. You've distracted them long enough for the merchant's wife to hit two of the bandits with the branch so hard that it breaks in two. Both men are knocked out. The large man looks extremely angry and throws the woman about twenty feet. He then looks to you and charges.\n\t\t\t\t\t\t\t\t\t\t*if armed = 0\n\t\t\t\t\t\t\t\t\t\t\tYou manage to pick up one of the bandit's weapons before the giant reaches you. \n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto large-man\t\n\t\t\t\t\t\t\t#Run in and help her fight them off.\n\t\t\t\t\t\t\t\tYou run in and are able to catch two of the bandits off guard, knocking them out. \n\t\t\t\t\t\t\t\t*if armed \u003c 0\n\t\t\t\t\t\t\t\t\tYou also manage to pick up one of their weapons. \n\t\t\t\t\t\t\t\tThe larger bandit knocks the woman aside and moves to attack you.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto large-man\n\t\t\t\t\t#No, there's little I can do for them.\n\t\t\t\t\t\tYou continue down your path. \n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto meeting\n\t\t\t*goto meeting\n\t#\"I'm not paying that.\"\n\t\tThe man with the club looks at you angrily. \"Oh, you'll pay…trust me.\"\n\t\t*page_break\n\t\t*goto battle\n\n\n*label battle\nThe large man and two other men who were hiding in the forest rush at you. What do you do?\n*choice\n\t#Stand and fight.\n\t\t*if armed > 0\n\t\t\tYou pull out your longsword and get ready to fight.\n\t\t\t*page_break\n\t\t\t*goto battle-weapon\n\t\tYou get into a defensive posture and prepare to fight. You regret not bringing a weapon. \n\t\t*page_break\n\t\t*goto battle-no-weapon\n\t#Run away.\n\t\t*If agility > 1\n\t\t\tYou run as fast as you can from the men. Eventually, they give up on their pursuit, but not before yelling obscenities. You're not going to be able to get to the Governor's meeting on time. You're forced to return to your castle.\n\t\t\t*set rule -2\n\n\t\t\tSome days later, you receive a letter from Gensa, who's quite upset that you missed your meeting with him. The inspections continue, but this time with even more frequency.\n\t\t\t*set peasants -5\n\t\t\t*set guards -2\n\t\t\t*finish\n\t\tYou're unable to outrun your pursuers. They pin you to the ground and beat you until you're unconscious. Eventually, a patrol finds you. They realize who you are and bring you back to the castle. \n\t\t*set rule -4\n\n\t\tSome days later, you receive an anonymous letter; it is simply a drawing of you running away. The inspections continue.\n\t\t*set peasants -10\n\t\t*set guards -5\n\t\t*finish\n\n*label battle-weapon\nThe largest man comes at you first with his club swinging.\n\nWhat do you do?\n\n*choice\n\t#Attempt to dodge his blow.\n\t\t*if agility = 2\n\t\t\tYou manage to dodge his blow, but just barely. You don't have much time to react before there are two more armed men attacking you. \n\n\t\t\tYou manage to stab the first man in the chest before he can strike, but the other one hits you hard with a club. \n\t\t\t*set health -15\n\n\t\t\tYou turn around and slash at the other attacker, causing blood to splatter everywhere. He falls to the ground in pain and is unable to stand; as a result, he starts to crawl away from the battle.\n\t\t\t*choice\n\t\t\t\t#Finish him.\n\t\t\t\t\tYou slice his head clean off in a single motion. \n\t\t\t\t\t*set dark +5\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto large-man\n\t\t\t\t#Turn my attention to the larger man.\n\t\t\t\t\tYou turn around and get ready to fight the larger man. \n\t\t\t\t\t*set health +5\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto large-man\n\t\t*if agility > 2\n\t\t\tYou manage to dodge his blow easily. You do it so well that he trips and falls to the ground. Before you can take advantage of this, however, two more armed men attack you. \n\n\t\t\tYou manage to stab the first man in the chest before he can strike, but the other man hits you with his club. \n\t\t\t*set health -5\n\n\t\t\tYou turn around and slash at the other attacker, causing blood to splatter everywhere. He falls to the ground in pain and is unable to stand; as a result, he starts to crawl away from the battle.\n\t\t\t*choice\n\t\t\t\t#Finish him.\n\t\t\t\t\tYou slice his head clean off in a single motion. \n\t\t\t\t\t*set dark +5\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto large-man\n\t\t\t\t#Turn my attention to the larger man.\n\t\t\t\t\tYou turn around and get ready to fight the larger man. You manage to take a moment to catch your breath.  \n\t\t\t\t\t*set health +5\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto large-man\t\n\t\tYou fail to dodge the blow. You're struck hard and thrown at least ten feet by the blow. \n\t\t*set health -30\n\n\t\tThe large man laughs and tells his lackeys to finish you. Two armed men rush in to attack you with clubs. The first one tries to stab you with a dagger, but this time you're ready for it, and you manage to move just at the right moment. Then you take your sword and shove it deep into the man's chest. The man falls on top of you, weighing you down.\n\n\t\tThe other man tries to hit you with his club, but you manage to use the man on top of you as a shield to block the blow. You shove the man off and slash at the other man, causing blood to splatter everywhere. It's now just you and the larger man, who's grinning. \n\t\t*page_break\n\t\t*goto large-man\n\t#Attempt to parry his blow with my longsword.\n\t\t*if strength > 1\n\t\t\tYou manage to parry his blow.\n\t\t\t*if agility > 1\n\t\t\t\tThen you attack with your own weapon, causing the large man to jump back to avoid the blow. He falls to the ground, tripping over a large tree root. Before you can take advantage of the situation, two men rush forward.\n\n\t\t\t\tThe other two bandits are no match for you, however, and quickly fall to your sword. By the time you're able to turn around to face the larger man, he's already up and ready to fight. \n\t\t\t\t*page_break\n\t\t\t\t*goto large-man\n\t\tYou attempt to hit him back but miss. You're about to strike again when a second man tackles you to the ground. A third man takes out a dagger and attempts to stab you while the second man is pinning you down. You manage to kick the man pinning you down and use him as a shield as the other man stabs him in the back. You shove the second man off you and quickly stab the third man through the chest, who's still in shock after accidently stabbing the other bandit. You manage to get up, somewhat winded. It isn't long before the large man is on top of you.\n\t\t*set health -5\n\t\t*page_break\n\t\t*goto large-man\n\t#Take the blow, but get ready with an attack of my own.\n\t\t*if strength > 2\n\t\t\tSomehow, you manage to take the mighty blow. This stuns the large giant long enough for you to slash your longsword hard across his chest, causing major damage.\n\t\t\t*set large_man_hp 100\n\t\t\t*set health -20\n\n\t\t\tThe two other men look shocked when they see how you didn't even flinch at the larger man's blow, and they run away. It's now just you and the larger man, who looks at the wound he received and grins at you. He steps forward, still grinning, and says, \"Finally, someone worth fighting.\"\n\t\t\t*goto large-man\n\t\tThe blow is harder than you expected. You fall back and hear a large crack as you smash into a small tree.\n\t\t*set health -30\n\n\t\tThe large man laughs and tells his lackeys to finish you off. The first one runs up and stabs you in the arm. You're unable to dodge it since you're stuck in the tree. He raises his hand for a second strike, but this time you're able to get out of the tree, and he misses. You roll past him, striking desperately at his legs. You manage to slash his right leg, causing him to fall over. The third man charges in rage, and you manage to shove a sword so far through his chest, you have trouble getting it out. You breathe heavily, trying to recover. The large man stares at you for a moment, then moves in to attack.\n\t\t*if agility > 1\n\t\t\t*page_break\n\t\t\t*goto large-man\n\t\t*set health -10\n\t\t*page_break\n\t\t*goto large-man\n\t#Jump back.\n\t\tYou jump back, but the blow still manages to hit you slightly, causing minor damage. \n\t\t*set health -15\n\t\tThe two other men rush forward to attack you. \n\t\t*if agility > 1\n\t\t\tYou manage to dodge their blows and take them both down without much of a fight. \n\t\t\t\n\t\t\tThe large man grins and runs up to attack you again. \n\t\t\t*page_break\n\t\t\t*goto large-man\n\t\tYou manage to dodge most of their blows, but a few hit you. Eventually, you overpower both of them, and they fall to your blade. \n\t\t*set health -10\n\t\t*page_break\n\t\t*goto large-man\n\n*label battle-no-weapon\nThe large man laughs when he realizes that you don't even have a weapon. He instructs his two lackeys to finish you off. They approach, one with a small short sword and the other with a small club.\n\nWhat do you do?\n*choice\n\t#Rush at the man with the small club.\n\t\tYou rush at the man with the small club. He's caught off guard, as he didn't expect you to be so eager to fight. You manage to disarm him and shove him to the ground. Before you can turn around, however, the other man has stabbed you in the shoulder with his short sword. You turn around and hit him so hard with your club that it smashes into pieces, though it probably wasn't made well to begin with. The man falls to the ground, unconscious.\n\n\t\tThe man that you shoved runs up and tackles you to the ground, punching you in a furious manner. Blood covers your face as you try to block his blows. You manage to flip him over. You reach behind your shoulder and remove the short sword that's embedded in it, blood draining out of your shoulder furiously. You take the short sword and shove it deep into the other man's chest. You pull out the sword, taking a moment to gather your strength so you can stand up. You're breathing heavily.\n\t\t*set health -50\n\t\t*page_break\n\t\t*goto large-man\n\t#Wait for one of them to attack.\n\t\tThey toy with you, pretending to attack and taunting you. Eventually, the man with the club comes forward and attempts to swing it at your head. You duck just at the right moment. You tackle him and begin pummeling him in the face. Suddenly, the man with the short sword comes up behind you and slashes you from behind. You groan in pain as blood splatters all around you.\n\n\t\tHe lifts his sword over his head to attack you again, but this time you're ready. You roll at just the right moment, causing him to stab the other man instead. You use the shock of the man stabbing his friend to your advantage and have enough time to grab the small club. He charges at you furiously, slashing left and right. You dodge most of the blows, but a few manage to get past your guard. The man is furious and leaves himself open for a counter-attack when he lunges and misses you by a few inches. You swing the club so hard at him that it shatters in two as it hits him in the face. It instantly knocks him unconscious. You grab the short sword and take a moment to gather your strength before turning to face the giant. You're covered in blood, and he's grinning. He moves forward to finish you off. \n\t\t*set health -70\n\t\t*page_break\n\t\t*goto large-man\n\t#Rush at the man with the small short sword.\n\t\tThis is unwise, as this man appears to know how to fight. The moment you get close, he shoves the blade toward your chest.\n\n\t\t*if agility > 2\n\t\t\tSomehow, you manage to dodge most of the strike, but not before the blade slashes your side. You grab his hands and wrench the blade free, shoving him to the ground in the process. Before you can take advantage of this opportunity, you're hit hard from behind by the man with the small club, causing you to drop the sword. He hits you so hard with the club that it shatters against your back. You turn around, groaning in pain.\n\n\t\t\tWithout a weapon, the man begins to punch you repeatedly. Eventually, you manage to get the upper hand, punching him hard in the chest and then giving him an uppercut to the jaw. He falls to the ground, unconscious. The other man tackles you and pummels you while he has you pinned down. You try to block the blows, but there are too many. Eventually, your hand finds something sharp…it's the short sword. You're able to grab it and stick it into his throat, causing blood to splatter everywhere. You take a few moments to stand up, wondering if anything is broken. Before you can even take a breath, the giant is already on top of you. \n\t\t\t*page_break\n\t\t\t*goto large-man\n\n\t\tIt goes deep into your chest. You fall to the ground in agony. The last thing you see is the man lifting up the sword again to strike a second blow. \n\t\t*goto_scene death\n\n*label large-man\n*if health \u003c 1\n\t*goto knockout\n*if large_man_hp \u003c 1\n\t*goto knockout2\nYour Health: ${health}\n\nOpponent's Health: ${large_man_hp}\n\nWhat do you do?\n*choice\n\n\t#Attack the large man with my weapon.\n\t\tYou manage to hit the large man.\n\t\t*if strength \u003c 2\n\t\t\tYou only do minor damage.\n\t\t\t*set large_man_hp -10\n\t\t*if strength = 2 \n\t\t\tHe didn't expect you to be so strong. You do a good amount of damage to him. \n\t\t\t*set large_man_hp -20\n\t\t*if strength > 2\n\t\t\tThe large man is amazed by your strength. You do a large amount of damage to him. \n\t\t\t*set large_man_hp -30\n\t\tEven though you manage to hit the large man, he manages to land a few blows on you as well. \n\t\t*if agility \u003c 2\n\t\t\t*set health -15\n\t\t*if agility > 1\n\t\t\t*set health -10\n\t\t*page_break\n\t\t*goto large-man\n\t*selectable_if (potion > 0) #Take a healing potion.\n\t\tYou drink a healing potion and feel much better.\n\t\t*set health 100\n\t\t*set potion -1\n\t\t*page_break\n\t\t*goto large-man\n\t*selectable_if (fireball > 0) #Shoot a fireball at the large man.\n\t\tYou hit the large man, doing tremendous damage. \n\t\t*set fireball -1\n\t\t*set large_man_hp -30\n\t\t*page_break\n\t\t*goto large-man\n\t*disable_reuse *selectable_if (dark > 65) #Throw some dust into the large man's eyes.\n\t\tThis is a rather dishonorable move, but an effective one. You manage to blind the large man long enough to get several hits in. You cause moderate damage. \n\t\t\n\t\tHe probably won't fall for that move again. \n\t\t*set large_man_hp -25\n\t\t*set dark +10\n\t\t*set light -10\n\t\t*page_break\n\t\t*goto large-man\n\t*disable_reuse *selectable_if (light > 65) #Hit the large man with a wild blow.\n\t\tSomehow, you manage to hit him, causing tremendous damage.\n\t\t*set large_man_hp -25\n\t\t*page_break\n\t\t*goto large-man\n\t*disable_reuse *selectable_if (intelligence > 2) #Try to outsmart him.\n\t\tYou feint an attack, catching the large man off balance. You then hit him hard, causing a decent amount of damage.\n\t\t\n\t\tHe probably won't fall for that move again. \n\t\t*set large_man_hp -15\n\t\t*page_break\n\t\t*goto large-man\n\t*selectable_if (healing > 0) #Cast a healing spell on myself.\n\t\tYou feel much better.\n\t\t*set healing -1\n\t\t*set health 100\n\t\t*page_break\n\t\t*goto large-man\n\t*disable_reuse *selectable_if (stealth > 1) #Run into the woods and hope that the large man will follow so I can sneak-attack him.\n\t\tYou run into the forest, and the large man follows you like you hoped he would. You climb a tree before he can see where you went. He looks around, confused, then you suddenly jump from about ten feet up, hitting him hard in the back of the head, causing massive damage. \n\t\t*set large_man_hp -40\n\t\t\n\t\tHe probably won't fall for that again. \n\t\t*page_break\n\t\t*goto large-man\n\t*disable_reuse *selectable_if (leadership > 2) #Examine the large man to find a weakness in his defenses. \n\t\tYou notice that the large man tends to attack with the same sequence of attacks over and over again, so you decide to take advantage by waiting for him to repeat the same sequence again. When he does, you avoid all his blows and land a hard strike on his head, causing major damage. \n\t\t\n\t\tThe large man tries to fight more unpredictably; you probably won't be able to pull off that trick again. \n\t\t*set large_man_hp -20\n\t\t*page_break\n\t\t*goto large-man\n\t*disable_reuse *selectable_if (agility > 2) #Try to outmaneuver him. \n\t\tYou notice that the large man is rather clumsy, so you decide to take advantage of this by running around until he trips. When he does, you land a hard strike on the back of his head, causing major damage. The large man is able to get up before you can strike another one. \n\t\t\n\t\tThe large man fights more carefully; you probably won't be able to pull off that trick again. \n\t\t*set large_man_hp -20\n\t\t*page_break\n\t\t*goto large-man\n\n\n*label knockout\nThe large man swings hard at you with his club, causing you to fall to the ground. You try to get up, but you're too weak. The last thing you see before you pass out is his club swinging toward your face. \n*page_break\n*if dark > light\n\t*goto_scene death\nEventually, a patrol finds you. They realize who you are and bring you back to the castle. \n*set rule -2\nSome days later, you receive an anonymous letter; it is simply a drawing of you being beaten to a bloody pulp. \n*set peasants -10\n*set guards -5\nIt takes months before you fully recover from your injuries. \n*finish\n\n*label knockout2\n*image giant.jpg\n*achieve giant\n\nThe large man falls over. You've won the battle. \n\n*if helped_merchants > 0\n\tThe merchants saw what you did and will more than likely spread stories of your victory over this giant. They decide to accompany you. \n\t*set rule +1\n\t*set merchants +2\n*set rule +2\nYou continue on your journey.\n*page_break\n*goto meeting\n\n\t\t\t\n*label meeting\t\n*image architecture-1297834.png\n\nYou arrive at the Governor's manor. His guards call out for him. \n*if no_outfit = 1\n\t*set rule -1\n\tGensa comes out and notices your dirty clothes. He says something to his guards, and they laugh. \n\t\nGensa orders his servants to make you a room. It's quite nice, but nothing near as extravagant as one would expect a visitor such as you to receive. You decide to get some rest before meeting with Gensa. \n*page_break\n*label meeting2\n*if supported_gensa > 0\n\t*goto meeting3\nThe next morning, you speak to Gensa for several hours. Most of it includes him rambling about how you should have voted for him to be gGvernor. Eventually, once he's done with his long tirade, he promises that the inspections will be at a reasonable frequency, blaming it on one of his servants saying they must have not marked down that you'd already received your inspection.\n\nWhether he's telling the truth or not, you care little. You leave as soon as you're able to and arrive back at your castle without incident.\n*set rule +1\n*finish\t\n\n*label meeting3\nGensa sends a servant to bring you to a private meeting room. The servant opens a door to a small meeting room with two comfortable chairs facing a small table and fireplace. You realize that the location of the meeting room makes it difficult for people to eavesdrop. Gensa is sitting down with a glass of wine, watching the fire.\n\nWhen you enter the room, Gensa stands up and greets you cordially. He asks you to sit down and join him by the fire.\n*page_break\nTime passes fairly quickly, you and Gensa mostly making small talk discussing various duties as a Lord and recent news in the Kingdom. Suddenly, Gensa's demeanor becomes more serious. He then asks you single question:\n\n\"Do you want more than just being a Lord of a small castle in the swamps?\"\n\nHow do you respond?\n*fake_choice\n\t#\"Of course I do.\"\n\t\tGensa smiles. \"You want more. I know the feeling.\"\n\t\t*page_break\n\t#\"The swamps have their advantages.\"\n\t\tGensa puts up his hands. \"Of course I meant no disrespect. I was simply suggesting that perhaps you could have more than just that.\"\n\t\t*page_break\n\t#\"I'm quite happy with my current situation.\"\n\t\tGensa frowns. \"Is that so? I figured you were ambitious, like me.\"\n\t\t*page_break\n\nGensa leans in closer and speaks at a whisper. \"Do you know how I became Lord of this manor? It wasn't easy. It wasn't handed to me or given freely. I had to earn it, and it wasn't pretty.\" \n\nGensa relaxes and leans back in his chair. \"I was the spymaster for the King. I learned a lot of secrets. It was my job really, gaining useful information for the King. If I discovered a plot by one of the many Lords in the realm that could threaten the King's rule, no matter how small, I was obligated to tell him about it. One day, I uncovered a minor infraction by one of the Lords. He was inflating the price of iron ore by lying about how much of it was mined each month. He was secretly stockpiling it and planned to sell the whole lot of it once the market price was high enough. Nothing outrageous for a typical Lord, except there was one problem. The Central Province was currently going through an iron shortage, and the King was having difficulty equipping new recruits. Had the King found out that the Lord was lying about the iron ore, he would have been furious. He probably would have demanded the Lord to give up his extra iron ore or possibly something much worse.\" \n\nGensa pauses and takes a sip from his cup of wine before continuing. \"When I discovered this, I confronted the Lord about it rather than going directly to the King like I normally did. I was curious what the man would say. To my surprise, he said very little and simply handed me a bag.\" \n\nGensa takes a moment to look at his half-empty glass of wine, swirling the contents around before continuing. \"Inside the bag, there were many Gold Pieces. Now, I was paid decently by the King for being his spymaster, but not nearly as much as the typical Lord would be. It was then that I realized how profitable my position could be. There were always rumors of Lords planning something against the King. I also realized that since the King rarely verified my information or asked me how I acquired it, I could simply just make things up. If a Lord upset me, all I would have to do is whisper in the King's ear that he was planning to overthrow him. Whether it's true or not doesn't matter. The King looked at the Lord differently and was cautious around him…excluding him from taking part in important decisions, for example. I began taking bribes from Lords and extorting the ones that refused. Eventually, I convinced enough of them to support me as a Lord when such a position became available. I kept the secrets I learned and used them to gain additional power.\" \n\nGensa turns his head to look directly at you. \"You see, Lord ${name}, knowledge is power, and I know quite a bit. I know that the King is not as strong politically as he once was. I know that there are gaps in his security…gaps that could be exploited if utilized at the right time.\"\n*page_break\nGensa pulls out a map of the Kingdom of Magincia. The map has the number of the King's forces spread amongst the Kingdom. He also has notes on each Lord's strengths and weaknesses. \n\nHe uses his index finger to point at the center of the map. \"Do you notice what's missing here? The King has forces stationed all throughout the realm, but most of them are at the edges of his borders, protecting against external threats. Now if someone were to secretly…and quietly…raise a small army in the Central Province, they could take the King by surprise. All orders go through the Central Province. If the main roads were blocked, many of his loyal generals and commanders wouldn't be able to react in time. A large enough force could storm the castle walls and take it over.\"\n\nHe pauses for a few seconds to see your reaction.\n\n\"Now, I've just given you some knowledge. Let's say you had discovered this information on your own. What would you do with it?\"\n*choice\n\t#\"I would use it for my own benefit.\"\n\t\t\"Yes, exactly. There are many ways you could use this information. You could notify the King and gain favor, you could use it to find out if any of the other Lords have noticed it and are planning anything, you could even have troops ready to stop them…or you could help them overthrow the King.\"\n\t\t*choice\n\t\t\t#\"Yes, all of those are valid options.\"\n\t\t\t\t\"Exactly. They are all valid options. Having troops stationed in certain areas could be used in a variety of ways. I was hoping you'd join me in this effort. There are a few other Lords that share my concerns and have already prepared small detachments of troops in case of an invading barbarian or rebel army. I hope I can count you among them.\"\n\t\t\t\t*choice\n\t\t\t\t\t#\"Yes, of course.\"\n\t\t\t\t\t\tGensa smiles. \"It's Lords like you that will help ensure this Kingdom's safety. I'll be in touch shortly to go over the particulars. Good day, Lord ${name}.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tGensa escorts you out. The rest of the day is rather uneventful. \n\t\t\t\t\t\t*set dark +20\n\t\t\t\t\t\t*set light -20\n\t\t\t\t\t\t*set rebel_army +100\n\t\t\t\t\t\t*set rule +1\n\t\t\t\t\t\t*finish\n\t\t\t\t\t#\"No, I wouldn't be willing to commit such troops.\"\n\t\t\t\t\t\tGensa frowns. \"Well, perhaps there are other ways you could help. I simply want you to be aware of the information in case anything were to happen. Thank you for stopping by.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tGensa ends the meeting. One of his servants escorts you out of the meeting room. The rest of the day is rather uneventful.\n\t\t\t\t\t\t*finish\n\t\t\t#\"What you spoke of last is treason.\"\n\t\t\t\tGensa frowns. \"No, you misunderstand. I was simply trying to make a point. I have no intention of overthrowing the King. I plan on rectifying this security issue as soon as possible. We've already seen a few barbarians get past our defenses. If they somehow managed to reach the Central Province, it would be disastrous for the Kingdom. I'll be sending troops to secure the roads to the central border. If a barbarian army, or a group of Lords for that matter, decided to attack, I would be ready to aid the King at a moment's notice.\"\n\t\t\n\t\t\t\tGensa quickly puts the map away and smiles. \"Now, to get to why I've brought you here. I've heard rumors that there is a group of Lords plotting rebellion within the Kingdom. I have intelligence that Gillian may be funding this operation, and Vero is secretly training troops to see it through. I was hoping you could keep your eyes open and let me know if you notice them doing anything you would deem suspicious.\n\t\t\n\t\t\t\t\"Normally, I would go to the King with this information, but it's possible that my information is wrong, or if I take sudden action they could cover their tracks. It's best to watch them and be vigilant. I trust you will keep this information just between us.\"\n\t\t\t\t\n\t\t\t\tGensa stands up and escorts you out of the meeting room. The rest of the day is rather uneventful. \n\t\t\t\t\n\t\t\t\t*finish\n\t#\"I would warn the King of course.\"\n\t\tYou tell Gensa that the King would be appreciative if you informed him about such security flaws. \n\t\t\n\t\tUpon hearing your response, Gensa frowns. \"Perhaps…perhaps he would wonder why you were researching such things. Regardless, I plan on rectifying this security flaw as Governor of the Western Province. We've already seen a few barbarians get past our defenses. If they somehow managed to reach the Central Province, it would be disastrous for the Kingdom. I'll be sending troops to secure the roads to the central border. If a barbarian army, or group of Lords for that matter, decided to attack, I would be ready to aid the King at a moment's notice.\"\n\t\t\n\t\tGensa quickly puts the map away and smiles. \"Now, to get to why I've brought you here. I've heard rumors that there is a group of Lords plotting rebellion within the Kingdom. I have intelligence that Gillian may be funding this operation, and Vero is secretly training troops to see it through. I was hoping you could keep your eyes open and let me know if you notice them doing anything you would deem suspicious.\n\t\t\n\t\t\"Normally, I would go to the King with this information, but it's possible that my information is wrong, or if I take sudden action they could cover their tracks. It's best to watch them and be vigilant. I trust you will keep this information just between us.\"\n\t\t\n\t\tGensa smiles and shakes your hand, signifying that the meeting is over. One of his servants escorts you out of the manor.\n\t\t*set light +10\n\t\t*set dark -10\n\t\t*page_break\n\t\tYou arrive back at your castle without incident. Your advisor asks you about the meeting. \n\t\t\n\t\tWhat do you say?\n\t\t*fake_choice\n\t\t\t#Tell him that I need to keep an eye on Gillian and Vero. \n\t\t\t\tHe looks confused and wants to ask why, but he decides not to and simply follows your orders. A few weeks later, your advisor gives you a report on recent activities by Gillian and Vero. You find nothing suspicious in them.\n\t\t\t#Tell him it's nothing for him to be concerned about.\n\t\t\t\tYour advisor nods and goes back to his duties.\n\t\t*finish\n\t\n*label gillian\nYour advisor looks at you. \"Is there anything I can advise you on?\"\n*choice\n\t#\"What would be the best way to prepare for this inspection?\"\n\t\t\"Knowing Gillian, he'll probably take a look at your financials. It'll probably include a variety of different factors. The number of peasants, merchants, and farmers will more than likely be important to him. Trade is also very important to him. We should take any steps we can to help boost the economy here.\"\n\t\t*page_break\n\t\t*goto gillian\n\t#\"If we can't prepare in enough time, what do you suggest?\"\n\t\t\"Well…that's a complicated question, Lord ${name}. We could take many different routes. We could ask for an extension, though I don't know how Gillian would feel about that. Gillian is not above bribery…I've heard rumors he's taken bribes before, though he's never had a position as powerful as Governor. We could always embellish our books, but that would have dangerous consequences if he found out.\"\n\t\t*page_break\n\t\t*goto Gillian\n\t#\"Tell me about Gillian's background.\"\n\t\t\"Gillian was a peasant who worked his way up to being a very wealthy merchant. He mostly traded in various foods and cloth from foreign lands. He has quite a knack for developing foreign trade relations. He gained so much wealth that he was able to purchase a Lordship. His primary motivation is money; however, I also feel that a healthy economy is important to him, as he would never have been able to reach his goals had the Lord he was under not been as friendly as he was to merchants and farmers.\"\n\t\t*page_break\n\t\t*goto Gillian\n\t#\"No, that is all.\"\n\t\t\"Very well.\"\n\t\t*page_break\n\t\t*goto economy1\n\t\t\n*label economy1\n*label kingdom\nKingdom Summary\n\n*image castle-35216.png\n\nCivilian Units:\n\n*if peasants > 0\n\t${peasants} Peasants\n\n*if peasants \u003c 1\n\tYou have no peasants to recruit units from!\n\t*set peasants 0\n\n${merchants} Merchants\n\n${farmers} Farmers\n\n${workers} Workers\n\t\t\n\t\t\nMilitary Units:\n\t\t\n${militia} Militia\n\n${guards} Guards\n\n${knights} Knights\n\n${archers} Archers\n\n\nUnique Units:\n\n${druids} Druids\n\n${magicians} Magicians\n\n${thieves} Thieves\n\n${bandits} Bandits\n\nOther Important Statistics:\n\n${rule} Rule\n\n*if rule > 3 \n\t(Rule is secure.)\n*if rule \u003c 4 \n\t(Rule is not secure.)\n\n${gold} Gold Pieces\n\n*if tax = 0\n\tNo Taxes\n\n\n*if tax = 10\n\tLow Taxes\n\n\t\n*if tax = 20\n\tMedium Taxes\t\n\n\t\n*if tax = 30\n\tHigh Taxes\t\n\n\t\n*choice\n\t*if (Gold > 9) and (peasants > 0) \n\t\t#Hire Militia. (10 GP)\n\t\t\t*set militia +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -10\n\t\t\t*goto kingdom\n\t*if (Gold > 99) and (peasants > 9) \n\t\t#Hire 10 Militia. (100 GP)\n\t\t\t*set militia +10\n\t\t\t*set peasants -10\n\t\t\t*set gold -100\n\t\t\t*goto kingdom\n\t*if (Gold > 49) and (peasants > 0)\n\t\t#Hire Guards. (50 GP)\n\t\t\t*set guards +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -50\n\t\t\t*goto kingdom\n\t*if (Gold > 249) and (peasants > 4)\n\t\t#Hire 5 Guards. (250 GP)\n\t\t\t*set guards +5\n\t\t\t*set peasants -5\n\t\t\t*set gold -250\n\t\t\t*goto kingdom\n\t*if (Gold > 99) and (peasants > 0) \n\t\t#Hire Knights. (100 GP)\n\t\t\t*set knights +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -100\n\t\t\t*goto kingdom\n\t*if (Gold > 49) and (peasants > 0) \n\t\t#Hire Merchants. (50 GP)\n\t\t\t*set merchants +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -50\n\t\t\t*goto kingdom\n\t*if (Gold > 9) and (peasants > 0) \n\t\t#Hire Farmers. (10 GP)\n\t\t\t*set farmers +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -10\n\t\t\t*goto kingdom\n\t*if (Gold > 99) and (peasants > 9) \n\t\t#Hire 10 Farmers. (100 GP)\n\t\t\t*set farmers +10\n\t\t\t*set peasants -10\n\t\t\t*set gold -100\n\t\t\t*goto kingdom\n\t*if (Gold > 199) and (peasants > 0) \n\t\t#Hire Magicians. (200 GP)\n\t\t\t*set magicians +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -200\n\t\t\t*goto kingdom\n\t*if (Gold > 74) and (peasants > 0) \n\t\t#Hire Archers. (75 GP)\n\t\t\t*set archers +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -75\n\t\t\t*goto kingdom\n\t*if (Gold > 374) and (peasants > 4) \n\t\t#Hire 5 Archers. (375 GP)\n\t\t\t*set archers +5\n\t\t\t*set peasants -5\n\t\t\t*set gold -375\n\t\t\t*goto kingdom\n\t*if (Gold > 24) and (peasants > 0) \n\t\t#Hire Workers. (25 GP)\n\t\t\t*set workers +1\n\t\t\t*set peasants -1\n\t\t\t*set gold -25\n\t\t\t*goto kingdom\n\t*if (Gold > 124) and (peasants > 4) \n\t\t#Hire 5 Workers. (125 GP)\n\t\t\t*set workers +5\n\t\t\t*set peasants -5\n\t\t\t*set gold -125\n\t\t\t*goto kingdom\n\t#Done.\n\t\t*set tax_increase tax * peasants\n\t\t*set tax_increase2 * merchants\n\t\t*set gold +tax_increase\n\t\t*set gold +tax_increase2\n\t\t*if tax = 10\n\t\t\t*set gold +150\n\t\t*if tax = 20\n\t\t\t*set gold +300\n\t\t*if tax = 30\n\t\t\t*set gold +500\n\t\tNew taxes have been collected.\n\t\t\n\t\t\n\t\tYou now have ${gold} Gold Pieces in the treasury. \n\t\t*page_break\n\t\t*goto taxes\n\n*label taxes\nWhat should the tax rate be?\n*choice\n\t#High taxes.\n\t\t\"We are in dire needs of funds. We will have high taxes.\"\n\t\t*set tax 30\n\t\t*set peasants -5\n\t\t*set merchants -2\n\t\t*set farmers -1\n\t\t*goto start\n\t#Medium taxes.\n\t\t\"We will have a medium tax rate.\"\n\t\t*set tax 20\n\t\t*goto start\n\t#Low taxes.\n\t\t\"We will have low taxes.\"\n\t\t*set tax 10\n\t\t*set peasants +5\n\t\t*set merchants +5\n\t\t*set farmers +1\n\t\t*goto start\n\t#No taxes.\n\t\t\"We need to get as many people as we can to join our villages. I will temporarily suspend taxes.\"\n\t\t*set peasants +15\n\t\t*set merchants +10\n\t\t*set farmers +5\n\t\t*set tax 0\n\t\t*goto start\n\t\t\n*label start\n\"Lord {name}, the Governor will arrive here in three days. Should we temporarily suspend court?\"\n*choice\n\t#\"Yes, we should suspend all courtly petitions, unless they're of the utmost urgency, and focus all of our energy upon improving the economy before the Governor arrives.\"\n\t\t*set rule -4\n\t\t*set economy +2\n\t\t*set war_defense +1\n\t\t*page_break\n\t\t*goto movingon\n\t#\"No, my duties as Lord are still important to the people; we'll just have to find a way to keep court open while we prepare for the Governor's arrival.\"\n\t\t\"Very well, my liege. We actually have two petitioners waiting to see you right now. I'll send them in.\" \n\t\t*page_break\n\t\t*goto head_guard\n\n*label head_guard\nIn walks your head guardsman. He bows respectfully and waits a few moments before speaking. \n\n\"Lord ${name}, I wouldn't bring this matter up unless I had to, but I regret to inform you that we've been experiencing a large number of deserters in the army. We aren't sure if we should change our policy regarding desertion. Currently, the guard's commanding officer decides on their punishment. Usually, it's one year in the dungeon on the first offense, and additional offenses or ones deemed more serious may result in stiffer sentences. All soldiers who sign up must serve for a mandatory five years. Desertion adds two extra years to their mandatory service.\"\n*choice\n\t#\"Anyone found deserting will be put to death.\"\n\t\t*set rule +1\n\t\t*set dark +10\n\t\t*set peasants -7\n\t\t\"A stiff punishment, my Lord, but perhaps a necessary one. Thank you, I will implement this policy immediately.\"\n\n\t\tThe policy is put into effect, and the amount of desertions decrease dramatically. A small number are still caught attempting to leave, but it's nothing compared to previous numbers. The commanders approve of your policy overall; however, a few peasants take issue with it.\n\t\t*set guards +2\n\t\t*page_break\n\t\t*goto other_lord\n\t#\"Anyone found deserting will be sent to the dungeon for a minimum of five years, and they won't be allowed to re-enter the army afterward.\"\n\t\t\"Perhaps a stiffer punishment on the first offense will dissuade would-be deserters from attempting to leave. Thank you, my liege.\"\n\n\t\tThe head guardsman puts your policy into effect, and there's a major decrease in the number of desertions; however, a few still attempt to leave. Perhaps over time, this will change. Overall, the commanders and your subjects feel that the penalty is fair. \n\t\t*set rule +1\n\t\t*page_break\n\t\t*goto other_lord\n\t#\"Anyone who wishes to leave the army may receive a one-time pardon, provided they can give good cause; after that, the current policy applies as usual.\" \n\t\t\"I'm not sure how the commanders will react to that, but perhaps it's best we give an opportunity for such individuals to leave the military service.\"\n\n\t\tSeveral soldiers take the offer, including one knight. Some commanders are displeased with your new policy, but most are satisfied with the fact that it's only temporary. Many of the soldiers who leave decide to find new employment in other jobs in your surrounding villages.\n\t\t*set guards -10\n\t\t*set militia -10\n\t\t*set knight -1\n\t\t*set peasants +5\n\t\t*page_break\n\t\t*goto other_lord\n\t#\"Anyone who wishes to leave the army during peacetime may do so, but must give proper notice and pay a fine ranging from 50 to 100 Gold Pieces, depending on their rank.\"\n\t\t\"I'm not sure how the commanders will react to that, but perhaps it will be effective. If they're willing to pay that much to leave the military, perhaps it is best for them to leave.\"\n\t\t*set guards -5\n\t\t*set militia -5\n\t\t*set peasants -2\n\n\t\tThe policy is put into effect…some soldiers decide to pay the fine and leave. \n\t\t\n\t\tYou have added 750 Gold Pieces to your treasury.\n\t\t*page_break\n\t\t*goto other_lord\t\t\n\t*selectable_if (gold > 999) #\"Completely restructure the military hiring and training process to ensure we only get people who truly want to serve.\" (1000 GP)\n\t\t\"Thank you, my liege! I also feel that is the root of the problem. We have very little finances to properly vet recruits. This budget will go far in improving our hiring and training process. Thank you!\"\n\t\t*set guards +5\n\t\t*set gold -1000\n\t\t*set war_defense +1\n\t\t*set rule +1\n\t\t*page_break\n\t\t*goto other_lord\n\t#\"I think the current policy is fine; perhaps you are the problem.\"\n\t\tThe head guardsman looks stunned. \"My liege, I have served as head guardsman for over five years, and another twenty years as a guard.\" \n\t\t*choice\n\t\t\t#\"Perhaps it's time we had new blood leading my guards.\"\n\t\t\t\t\"Very well, I will provide you with a list of replacements.\" The former head guardsman leaves. \n\n\t\t\t\tYour policy is put into effect, and the head guardsman is removed. The new head guardsman is eager to prove his effectiveness, and desertions decrease dramatically; however, many soldiers who have already served their terms decide to leave the military out of protest.\n\t\t\t\t*set guards -5\n\t\t\t\t*set dark +5\n\t\t\t\t*set light -2\n\t\t\t\t*set rule -1\n\t\t\t\t*page_break\n\t\t\t\t*goto other_lord\n\t\t\t#\"Let me put it this way…I will hold you fully responsible for any further desertions.\"\n\t\t\t\t\"Very well, I will redouble my efforts to prevent this from happening.\"\n\n\t\t\t\tThe head guardsman, in fear of losing his job, becomes much more vigilant about preventing desertions. As a result, the number of deserters decrease; however, the new policies and checks the head guardsman puts into place angers some of the veteran soldiers. A few soldiers who have fully served their term decide to leave rather than re-enlist.\n\t\t\t\t*set guards -3\n\t\t\t\t*set militia -2\n\t\t\t\t*set dark +2\n\t\t\t\t*set light -1\n\t\t\t\t*page_break\n\t\t\t\t*goto other_lord\n\t\n*label other_lord\nA young Lord approaches you with his retinue of advisors. \n\n\"Hello, Lord ${name}. My name is Duke Wellington the Fifth, I'm sure you've heard of me? My family has been in charge of Wellington manor for over five generations.\"\n*choice\n\t*selectable_if (noble =1) #\"Duke Wellington the Fifth? Ah, yes! I knew your father. It's a pleasure to see you.\"\n\t\t*set rule +2\n\t\tYou banter back and forth for several minutes discussing various topics of nobility. The young Lord looks very happy to find out that you're aware of his family history. \n\t\t*goto other_lord2\n\t#\"It's a pleasure to see you, Duke.\"\n\t\t\"You as well, and thank you for seeing me on such short notice.\"\n\t\t*set rule +1\n\t\t*page_break\n\t\t*goto other_lord2\n\t#\"Never heard of you.\"\n\t\tThe Duke blinks for several moments, then continues to speak.\n\t\t*set light +5\n\t\t*set peasants +2\n\t\t*page_break\n\t\t*goto other_lord2\n\t#\"Get to the point, I don't have all day.\"\n\t\tThe Duke looks angry and is about to say something when an older advisor whispers something into his ear. The young Lord's demeanor calms, and he continues speaking.\n\t\t*set dark +5\n\t\t*set peasants +2\n\t\t*page_break\n\t\t*goto other_lord2\n*label other_lord2\t\n\"Yes, well I'm sure you're aware that the barbarian hordes have attacked several villages within the Western Province of Magincia. It appears that you have found a way to prevent further raids from hitting your villages. I would be most interested in receiving any help you could offer to improve our chances of defending against such raids.\"\n*choice\n\t#\"I would be glad to help.\"\n\t\tThe young Lord smiles and shares all of the information he has regarding the most recent raids on his villages. \n\t\t*set light +5\n\t\t*set dark -5\n\t\t*page_break\n\t\t*goto other_lord3\n\t#\"What's in it for me?\"\n\t\tThe young Lord blinks for several moments until an advisor whispers something into his ear. \"I'll most certainly make it worth your while, Lord ${name}, if you help me.\" Then he thinks for a moment, and trying to be nonchalant, he continues. \"As you may already be aware, my family has plenty of Gold.\" He proceeds to share all of the information he has regarding the most recent raids on his villages. \n\t\t*set light -2\n\t\t*set dark +5\n\t\t*page_break\n\t\t*goto other_lord3\n\n\n*label governor\nYou send out letters informing all the Lords of your instructions. The King has given you a sizable budget to help bring about change in the realm. How much of this do you plan to contribute to your initiative? (Remember, this comes straight out of your treasury.)\n\nYou have ${gold} Gold Pieces in the treasury.\n\n*choice\n\t#Nothing. The Lords should be able to achieve my goals with their own funds.\n\t\tMonths have passed since you sent the letters. Your advisor tells you that very few of the Lords have been able to meet your expectations. As a result, several Lords have complained about your Governorship.\n\t\t*choice\n\t\t\t#Let them talk.\n\t\t\t\tA majority of the Lords feel you have not provided them with the necessary funds to get this new initiative through. As a result, several have written the King criticizing your Governorship. \n\t\t\t\t*set rule -4\n\n\t\t\t\tYour advisor approaches you. \"Even though you are Governor, there are still matters you need to attend to in our own court. You have two people waiting to see you.\"\n\t\t\t\t*page_break\n\t\t\t\t*goto head_guard\n\t\t\t#Hint that anything found saying something that is deemed deterimental to my goals will be severely punished.\n\t\t\t\tThis quiets most of the detractors, but not all of them. \n\t\t\t\t*set dark +10\n\t\t\t\t*set light -10\n\t\t\t\t*set rule -2\n\n\t\t\t\tYour advisor approaches you. \"Even though you are Governor, there are still matters you need to attend to in our own court. You have two people waiting to see you.\"\n\t\t\t\t*page_break\n\t\t\t\t*goto head_guard\n\t#I will give them some minor aid. (5000 GP)\n\t\tA few of the Lords have been able to reach their goals, three in all, but many are still not making a proper effort to get your goals met. \n\t\t*set gold -5000\n\t\t*choice\n\t\t\t#Reward the Lords that have met my goals.\n\t\t\t\tYou decide you will reward the Lords…\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (gold > 2999) #Through additional funds. (3000 GP)\n\t\t\t\t\t\t*set gold -3000\n\t\t\t\t\t\tThe Lords thank you for the additional funds. This angers some of the more traditional Lords, but a few of the ambitious ones work harder to meet your expectations when they see that you've rewarded those who have met their goals with additional funds. \n\n\t\t\t\t\t\tYour advisor approaches you. \"Even though you are Governor, there are still matters you need to attend to in our own court. You have two people waiting to see you.\"\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto head_guard\n\t\t\t\t\t#Through favors in court.\n\t\t\t\t\t\tYou provide them favors and better opportunities in your court. This angers some of the more traditional Lords, but it also motivates some of the more ambitious ones to meet your expectations. \n\t\t\t\t\t\t*set dark +10\n\t\t\t\t\t\t*set light -10\n\n\t\t\t\t\t\tYour advisor approaches you. \"Even though you are Governor, there are still matters you need to attend to in our own court. You have two people waiting to see you.\"\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto head_guard\n\t\t\t\t\t#Through writing to the King about their success.\n\t\t\t\t\t\tMany of the Lords are honored for you to do such a thing. This motivates them to work harder, as they find the King's approval very important. \n\t\t\t\t\t\t*set rule +1\n\n\t\t\t\t\t\tYour advisor approaches you. \"Even though you are Governor, there are still matters you need to attend to in our own court. You have two people waiting to see you.\"\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto head_guard\n\t\t\t#Punish any Lords that haven't met my goals.\n\t\t\t\tHow would you punish them?\n\t\t\t\t*set dark +20\n\t\t\t\t*set light -10\n\t\t\t\t*choice\n\t\t\t\t\t#Require that they pay higher taxes.\n\t\t\t\t\t\tYou tax the Lords that you deem as failing to meet your goals at a higher rate than the ones that have. This angers several of the Lords, especially the ones who are in charge of smaller villages. Some of the Lords who hold larger villages simply increase their own taxes on their lands to account for your higher tax. \n\t\t\t\t\t\t*set rule -1\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou have added an additional 2000 Gold Pieces to your treasury. \n\t\t\t\t\t\t*set gold +2000\n\n\t\t\t\t\t\tYour advisor approaches you. \"Even though you are Governor, there are still matters you need to attend to in our own court. You have two people waiting to see you.\"\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto head_guard\n\t\t\t\t\t#Refuse their petitions in court.\n\t\t\t\t\t\tThis upsets several of the traditional Lords; however, the more ambitious ones take your iniative more seriously and work harder to achieve it. \n\t\t\t\t\t\t*set dark +5\n\n\t\t\t\t\t\tYour advisor approaches you. \"Even though you are Governor, there are still matters you need to attend to in our own court. You have two people waiting to see you.\"\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto head_guard\n\t\t\t\t\t#Write to the King about their failings.\n\t\t\t\t\t\tThis upsets several of the Lords, as their reputation with the King is very important to them. They end up writing their own letters to the King stating your failure as a good Governor. \n\t\t\t\t\t\t*set rule -1\n\n\t\t\t\t\t\tYour advisor approaches you. \"Even though you are Governor, there are still matters you need to attend to in our own court. You have two people waiting to see you.\"\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto head_guard\n\t#I will give them moderate aid. (10,000 GP)\n\t\tMany of the Lords have been able to meet your expectations. Your iniative is considered a moderate success. \n\t\t*set rule +2\n\t\t*set gold -10000\n\n\t\tYour advisor approaches you. \"Even though you are Governor, there are still matters you need to attend to in our own court. You have two people waiting to see you.\"\n\t\t*page_break\n\t\t*goto head_guard\n\t*selectable_if (gold > 14999) #I will give them plenty of aid. (15,000 GP)\n\t\tA majority of the Lords have been able to meet your expectations. Your iniative is considered a major success. \n\t\t*set rule +3\n\t\t*set gold -15000\n\n\t\tYour advisor approaches you. \"Even though you are Governor, there are still matters you need to attend to in our own court. You have two people waiting to see you.\"\n\t\t*page_break\n\t\t*goto head_guard\n\t*selectable_if (gold > 19999) #I will use the entire budget to ensure this is successful. (20,000 GP)\n\t\tAlmost all of the Lords are able to meet your expectations. Your iniative is considered a complete success, and the fact that you were willing to use much of your own funds reinforces that you truly care about the Western Province. Your popularity with the people increase greatly. \n\t\t*set peasants +10\n\t\t*set gold -20000\n\t\t*set rule +4\n\n\t\tYour advisor approaches you. \"Even though you are Governor, there are still matters you need to attend to in our own court. You have two people waiting to see you.\"\n\t\t*page_break\n\t\t*goto head_guard\n\t\t\n*label other_lord3\nYou notice several things wrong with the young Lord's strategies. He has very little combat experience, and it shows. He hasn't properly formed a strong and organized army. He's done little to improve his defenses. The one diplomatic mission he did send was a complete failure, mainly due to their lack of understanding when it comes to barbarian culture. \n*choice\n\t*selectable_if (leadership > 4) #\"It would appear that you have a lack of understanding when it comes to military matters. If you want, I can allow you to have access to some of my advisors and personally give some advice on how you can improve the defenses of your lands.\"\n\t\tThe young Lord is very appreciative. He pays you 500 Gold Pieces for your help. \n\t\t*set gold +500\n\t\t*set rule +1\n\t\t*goto movingon\n\t*selectable_if (strength > 4) #\"The only thing these barbarians understand is strength. Find out who their leader is and find a way for him to meet with me. Tell him whatever you like, just get him here.\"\n\t\tThe young Lord is very appreciative. He pays you 500 Gold Pieces for your help. \n\t\t*set gold +500\n\t\t*set rule +1\n\t\t*goto movingon\n\t*selectable_if (diplomacy > 3) #\"I would be more than happy to host a diplomatic event here at my castle, for you to find a peaceful way to resolve this conflict. With me here to help you understand barbarian culture, I'm sure we can come to some kind of agreement with them concerning your lands.\"\n\t\tThe young Lord is very appreciative. He pays you 500 Gold Pieces for your help. \n\t\t*set gold +500\n\t\t*set rule +1\n\t\t*goto movingon\n\t*selectable_if (advisor = 1) #\"Frankly, you have no military experience whatsoever. I think I'll lend you my advisor for a few days to help you develop a strategy to defend against the next attack. With his help, you should be able to handle any threat that comes your way.\"\n\t\tThe young Lord is very appreciative. He pays you 500 Gold Pieces for your help. However, your advisor, General Varys, is rather displeased. He doesn't like being sent around like a common servant. \n\t\t*set gold +500\n\t\t*set rule -1\n\t\t*goto movingon\n\t*selectable_if (advisor = 3) #\"Frankly, you lack diplomatic experience. You need an advisor like mine to help you in such matters. I would be willing to lend you my advisor for a few days to help you prepare a diplomatic mission.\"\n\t\tThe young Lord is very appreciative. He pays you 500 Gold Pieces for your help. Your advisor, however, is rather displeased. Felspar doesn't like being sent around like a common servant. \n\t\t*set gold +500\n\t\t*set rule -1\n\t\t*goto movingon\n\t*selectable_if (guards > 19) #\"Frankly, your military force is laughable. I'll lend you a few of my forces to help secure your lands and train your troops.\" (Requires 20 Guards)\n\t\tThe forces you send are enough to help secure his land; however, only ten guards make it back alive. The Lord pays you 500 Gold Pieces for your services. Many of your guards are angry to be used like mercenaries. \n\t\t*set guards -15\n\t\t*set gold +500\n\t\t*goto movingon\n\t#\"Do not worry, Lord, I'll take care of this problem for you.\" (Lie)\n\t\tYou tell the Lord not to worry, that you'll take care of this problem. When he asks how, you simply dismiss him, saying not to worry about it and just focus on other matters. When the moment comes and the next barbarian raid occurs, you're nowhere to be found. The barbarians burn many of the young Lord's villages and farms to the ground. Then they lay siege to his castle. Few survive the siege, and the whereabouts of the young Lord are unknown. \n\t\t\n\t\tAs a result of the barbarian attacks, hundreds of refugees have scattered across the Western Province. A large group of refugees has gathered outside of your castle walls, hoping you will provide them shelter. What do you do?\n\t\t*choice\n\t\t\t#Shelter them, of course. (350 GP)\n\t\t\t\t*if gold \u003c 350\n\t\t\t\t\tYou don't have enough money in the treasury; as a result, you're forced to take out a loan from one of the local merchants.\n\t\t\t\t\t*set gold -400\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto large_refugees\n\t\t\t\t*if gold > 349 \n\t\t\t\t\t*set gold -350\n\t\t\t\t\tYou have enough money to feed and shelter them. \n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto small_refugees\n\t\t\t\t*goto small_refugees\n\t\t\t#Allow them entry…for a small fee.\n\t\t\t\tMany of the refugees cannot pay the fee, but a few scrounge enough to pay it, and you allow that group entry.\n\t\t\t\t\n\t\t\t\tYou have added 500 Gold Pieces to your treasury. \n\t\t\t\t*set light -10\n\t\t\t\t*set dark +20\n\t\t\t\t*set gold +300\n\t\t\t\t*page_break\n\t\t\t\t*goto movingon\n\t\t\t#Allow them entry…that is, if most of them are willing to join my army.\n\t\t\t\tMany of the refugees refuse your offer, but a few have decided to take you up on it.\n\n\t\t\t\tYou have gained 10 Militia and 5 Guards. \n\t\t\t\t*set militia +10\n\t\t\t\t*set guards +5\n\t\t\t\t*page_break\n\t\t\t\t*goto movingon\n\t\t\t#Turn them away.\n\t\t\t\tYou turn them away. \n\t\t\t\t*set dark +2\n\t\t\t\t*set light -5\n\t\t\t\t*page_break\n\t\t\t\t*goto movingon\n\t\t\t#Take their valuables, then turn them away.\n\t\t\t\t*set dark +25\n\t\t\t\t*set light -20\n\t\t\t\t\n\t\t\t\tYou have added 750 Gold Pieces to your treasury. \n\t\t\t\t*set gold +750\n\t\t\t\t*page_break\n\t\t\t\t*goto movingon\n\t#\"I'm sorry, but there's not much I can do at the moment. My own subjects take priority over such matters, as I'm sure you understand.\" \n\t\tThe young Lord is furious. He yells that you will regret not helping him. He then leaves promptly. \n\t\t*page_break\n\t\tSome days later, you find out that the Lord spent most of his money hiring mercenaries to defend his province. When the barbarian hordes came, many of these mercenaries actually switched sides when they were offered more money from the barbarian leader. As a result, many of the young Lord's villages and farms were burned to the ground. \n\t\t\n\t\tA small number of refugees have gathered at your castle, hoping you'll provide them shelter. What will you do? \n\t\t*choice\n\t\t\t#Shelter them, of course. (250 GP)\n\t\t\t\t*if gold \u003c 250\n\t\t\t\t\tYou don't have enough money in the treasury; as a result, you're forced to take out a loan of 300 Gold Pieces from one of the local merchants. \n\t\t\t\t\t*set gold -300\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto small_refugees\n\t\t\t\t*if gold > 249 \n\t\t\t\t\t*set gold -250\n\t\t\t\t\tYou welcome the new refugees. Five peasants, four farmers, two merchants, and one guard have joined you. \n\t\t\t\t\t*set peasants +5\n\t\t\t\t\t*set farmers +4\n\t\t\t\t\t*set merchants +2\n\t\t\t\t\t*set guards +1\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto movingon\n\t\t\t\t*goto movingon\n\t\t\t#Allow them entry…for a small fee.\n\t\t\t\tMany of the refugees cannot pay the fee, but a few scramble enough together to pay it, and you allow that group entry.\n\t\t\t\t\n\t\t\t\tYou have earned 300 Gold Pieces.\n\t\t\t\t*set light -5\n\t\t\t\t*set dark +10\n\t\t\t\t*set gold +300\n\t\t\t\t*page_break\n\t\t\t\t*goto movingon\n\t\t\t#Allow them entry…that is, if most of them are willing to join my army.\n\t\t\t\tMany of the refugees refuse your offer, but several decide to take you up on it.\n\n\t\t\t\tYou have gained 5 Militia and 1 Guard. \n\t\t\t\t*set militia +5\n\t\t\t\t*set guards +1\n\t\t\t\t*page_break\n\t\t\t\t*goto movingon\n\t\t\t#Turn them away.\n\t\t\t\tYou turn them away. \n\t\t\t\t*set dark +2\n\t\t\t\t*set light -5\n\t\t\t\t*page_break\n\t\t\t\t*goto movingon\n\t\t\t#Take their valuables and then turn them away.\n\t\t\t\t*set dark +20\n\t\t\t\t*set light -10\n\t\t\t\t\n\t\t\t\tYou gain 500 Gold Pieces. \n\t\t\t\t*set gold +500\n\t\t\t\t*page_break\n\t\t\t\t*goto movingon\n\n\n*label small_refugees\nYou welcome the new refugees. Five peasants, four farmers, two merchants, and one guard have joined you. \n*set peasants +5\n*set farmers +4\n*set merchants +2\n*set guards +1\n*page_break\n*goto movingon\n\n*label large_refugees\nYou welcome the new refugees. Ten peasants, five farmers, two merchants, and two guards have joined you. \n*set peasants +10\n*set farmers +5\n*set merchants +2\n*set guards +2\n*page_break\n*goto movingon\n\t\t\t\t\n*label movingon\n*if current_governor = 1\n\t\"That finishes all court business for today.\"\n\t*page_break\n\t*finish\n\nYou have ${gold} Gold Pieces in the treasury.\n\n\"What steps should we take to improve our Kingdom?\"\n\n(You can select multiple answers.)\n*choice\n\t*disable_reuse *selectable_if (gold > 199) #Reinforce the outer walls. (200 GP)\n\t\t*set war_defense + 1\n\t\t*set gold -200\n\t\t*goto movingon\n\t*disable_reuse *selectable_if (gold > 249) #Improve the defenses of the castle. (250 GP)\n\t\t*set castle +1\n\t\t*set gold -250\n\t\t*goto movingon\n\t*disable_reuse *selectable_if (gold > 249) #Improve the look of the castle. (250 GP)\n\t\t*set economy +1\n\t\t*set gold -250\n\t\t*set castle +1\n\t\t*goto movingon\n\n\t*disable_reuse *selectable_if (gold > 199) #Hire translators to help in trading missions with other Kingdoms. (200 GP)\n\t\t*set economy +1\n\t\t*set merchants +2\n\t\t*set gold -200\n\t\t*goto movingon\n\t*disable_reuse *selectable_if (gold > 499) #Hire mercenary knights. (500 GP)\n\t\t*set knights +4\n\t\t*set gold -500\n\t\t*goto movingon\n\t*if leadership > 2 \n\t\t*disable_reuse *selectable_if (gold > 100) #Set up a town watch. (100 GP)\n\t\t\t*set economy +1\n\t\t\t*set gold -100\n\t\t\t*set war_defense +1\n\t\t\t*set militia +5\n\t\t\t*goto movingon\n\t#That is all for now. \n\t\tThe Governor has arrived to inspect your castle. \n\t\t*If defenses > 5\n\t\t\t*set war_defense +1\n\t\t*if defenses > 9\t\n\t\t\t*set war_defense +1\n\t\t*if merchants > 9\n\t\t\t*set economy +1 \n\t\t*if merchants > 19\n\t\t\t*set economy +1\n\t\t*if farmers > 19\n\t\t\t*set economy +1\n\t\t*if farmers > 39\n\t\t\t*set economy +1\n\t\t*if guards > 19\n\t\t\t*set war_defense +1\n\t\t*if guards > 39\n\t\t\t*set war_defense +1\n\t\t*if militia > 29\n\t\t\t*set war_defense +1\n\t\t*if militia > 49\n\t\t\t*set war_defense +1\n\t\t*if knights > 9\n\t\t\t*set war_defense +2\n\t\t*if magicians > 4\n\t\t\t*set economy +1\n\t\t\t*set war_defense +1\n\t\t*if gold > 499\n\t\t\t*set economy +1\n\t\t*if peasants \u003c 30\n\t\t\t*set economy -2\n\t\t*if light > 75\n\t\t\t*set war_defense +1\n\t\t*if intelligence > 2\n\t\t\t*set economy +1\n\t\t*if leadership > 3\n\t\t\t*set war_defense +1\n\t\t*if rule > 20\n\t\t\t*set war_defense +2\n\t\t\t*set economy +2\n\t\t*if rule \u003c 10\n\t\t\t*set war_defense -1\n\t\t\t*set economy -1\n\t\t*if archers > 9\n\t\t\t*set war_defense +1\n\t\t*if archers > 19\n\t\t\t*set war_defense +1\n\t\t\n\t\t*if current_governor = 2\n\n\t\t\tThe Governor finishes his inspection.\n\t\t\t*page_break\n\t\t\t*if war_defense \u003c 8\n\t\t\t\tVero looks at you sternly. \"You call this castle defensible?\n\t\t\t\t*if guards \u003c 19\n\t\t\t\t\tYou barely have enough guards to run patrols! Not to mention defend your gate.\n\t\t\t\t*if Knights \u003c 9\n\t\t\t\t\tI wanted to meet with some of your knights, so I set up a large conference room that could fill a dozen or so men. Imagine my surprise when only a handful showed up. Is that really how many knights you employ in this realm? Do you not understand the importance of knights in battle?\n\t\t\t\t\t\n\t\t\t\t*if archers \u003c 15\n\t\t\t\t\tWhen I first arrived, I noticed how few archers you had on the walls. Sure, if they're all working double shifts, then maybe you have some kind of defense, but that is unrealistic.\n\t\t\t\t\t\n\t\t\t\t*if magicians \u003c 5\n\t\t\t\t\tI think you underestimate the important of magicians in battle. Yes, their fancy outfits are somewhat laughable, but when it comes to their magical power, it can make the difference between a victory or defeat. \n\t\t\t\t*if leadership \u003c 3\n\t\t\t\t\tNo offense, but I think you could brush up a bit on your leadership skills. Your men behave in a lazy fashion. They need discipline!\n\t\t\t\t\t\n\t\t\t\t*if defenses \u003c 5\n\t\t\t\t\tThe walls…oh, don't even get me started about your walls. I was afraid I would break them if I leaned against them too hard. You really think that would stop an army? Even if you hired masons to reinforce them further, the entire structure needs to be rebuilt. I found tunnels and holes all throughout. Perhaps they have suffered damage from previous sieges.\"\n\t\t\t\t*if defenses > 5\n\t\t\t\t\tAt least your walls are sufficient.\"\n\t\t\t\t*choice\n\t\t\t\t\t#\"I'm sorry. I did the best I could on such short notice.\"\n\t\t\t\t\t\t\t\"I'm sorry, too…for you, that is!\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tVero leaves.\n\t\t\t\t\t\t\t*set rule -5\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\tYour advisor walks up. \"Don't feel too bad, my liege. I heard that the majority of Lords failed his inspection.\"\n\t\t\t\t\t\t\t*finish\n\t\t\t\t\t*selectable_if (gold > 499) #\"Wait…are you sure you inspected everything? What about the treasury room?\" (500 GP)\n\t\t\t\t\t\t\"Are you trying to bribe me? What are you, crazy? That is also going into your report. Good day!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tVero leaves.\n\t\t\t\t\t\t*set rule -8\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tYour advisor walks up. \"Don't feel too bad, my liege. I heard that the majority of Lords failed his inspection.\"\n\t\t\t\t\t\t*finish\n\t\t\t\"I must say, I'm impressed, ${name}. I didn't expect you to do that well. You've clearly passed my inspection…in fact, you're the only Lord to do so. I'll be sure to mention it to the King the next time I see him. Good day.\"\n\n\t\t\tVero leaves. \n\t\t\t*set rule +4\n\t\t\t*finish\n\t\t*if current_governor = 3\n\n\t\t\tThe Governor has finished his inspection.\n\t\t\t*page_break\n\t\t\t*if economy \u003c 7\n\t\t\t\tGillian looks at you sternly. \n\t\t\t\t\n\t\t\t\t\"You call this an improvement?\n\t\t\t\t\n\t\t\t\t*if merchants \u003c 15 \n\t\t\t\t\tThe number of merchants you have is laughable. \n\t\t\t\t*if farmers \u003c 20\n\t\t\t\t\tYou barely have enough farmers to feed your people. \n\t\t\t\t*if peasants \u003c 30\n\t\t\t\t\tI wonder what your subjects think of your rule…maybe I should ask them. Oh wait, there are only a dozen or so peasants that actually live here. How do you expect to collect taxes if you don't have any peasants?\n\t\t\t\t*if castle \u003c 1\n\t\t\t\t\tLook at your castle, it's one of most run-down things I've ever seen. I'm afraid to even touch the walls, as I feel it could cause the roof to collapse.\n\t\n\t\t\t\t\"I don't think the decisions you've made for this Kingdom have been best for its residents. I'm going to write a full report to the King to let him know about this travesty!\"\n\t\t\t\t*choice\n\t\t\t\t\t#\"I'm sorry. I did the best I could on such short notice.\"\n\t\t\t\t\t\tI'm sorry, too…for you, that is!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tGillian leaves.\n\t\t\t\t\t\t*set rule -5\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tYour advisor walks up. \"Don't feel too bad, my liege. I heard that the majority of Lords failed his inspection.\"\n\t\t\t\t\t\t*finish\n\t\t\t\t\t*selectable_if (gold > 499) #\"Wait…are you sure you inspected everything? What about the treasury room?\"\n\t\t\t\t\t\t\"Fine, let me take a look.\" Gillian spends a few moments looking around. \"Well, what about it?\"\n\t\t\t\t\t\t*set dark +10\n\t\t\t\t\t\t*set light -10\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"Oh hey, did you drop this?\" (500 GP)\n\t\t\t\t\t\t\t\tGillian looks at the Gold for a moment. \"Why, yes…yes, I did. Thank you.\"\n\n\t\t\t\t\t\t\t\tHe turns to leave, then pauses. \"By the way…I'm still writing you a bad review. Good day.\"\n\t\t\t\t\t\t\t\t*set rule -4\n\t\t\t\t\t\t\t\t*set gold -500\n\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t#\"Oh hey, did you drop this?\" (1000 GP)\n\t\t\t\t\t\t\t\tGillian looks at the Gold for a moment. \"Why, yes…yes, I did. Thank you.\" \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tHe turns to leave, then pauses. \"By the way…I'm still writing you a bad review, but maybe I won't mention [i]everything[/i] I saw. Good day.\" \n\t\t\t\t\t\t\t\t*set rule -2\n\t\t\t\t\t\t\t\t*set gold -1000\n\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t#\"Oh hey, did you drop this?\" (3000 GP)\n\t\t\t\t\t\t\t\tGillian looks at the Gold for a moment. \"Why, yes…yes, I did. Thank you.\" \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tHe turns to leave, then pauses. \"By the way…I took a second look at your review, and it seems I subtracted you in a few areas that I shouldn't have. It's still barely passing, but I see no reason to write the King about the issues I found. Good day.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if gold \u003c 2999\n\t\t\t\t\t\t\t\t\tAfter Gillian leaves, your advisor approaches. \"Lord ${name}, that wasn't just your Gold. Many of the nobles and merchants keep their Gold here. We're going to have to take out a loan to reimburse them.\"\n\t\t\t\t\t\t\t\t\t*set gold -1000\n\t\t\t\t\t\t\t\t*set gold -3000\n\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t#\"Oh hey, did you drop this?\" (5000 GP)\n\t\t\t\t\t\t\t\tGillian looks at the Gold for a moment. \"Why, yes…yes, I did. Thank you.\" \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tHe turns to leave, then pauses. \"By the way…I took a second look at the review, and it seems I subtracted you in a few areas that I shouldn't have. You actually did much better. I'll be sure to mention it to the King the next time I see him. Good day.\"\n\t\t\t\t\t\t\t\t*set rule +1\n\t\t\t\t\t\t\t\t*if gold \u003c 4999\n\t\t\t\t\t\t\t\t\tAfter Gillian leaves, your advisor approaches. \"Lord ${name}, that wasn't just your Gold. Many of the nobles and merchants keep their Gold here. We're going to have to take out a loan to reimburse them.\"\n\t\t\t\t\t\t\t\t\t*set rule -1\n\t\t\t\t\t\t\t\t\t*set gold -2000\n\t\t\t\t\t\t\t\t*set gold -5000\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t#\"Oh hey, did you drop this?\" (10,000 GP)\n\t\t\t\t\t\t\t\tGillian looks at the Gold for a moment. \"Why, yes…yes, I did. Thank you.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tHe turns to leave, then pauses. \"By the way…I took a second look at the review, and it seems I subtracted you in a few areas that I shouldn't have. You actually did very well. I'll be sure to write a letter to the King letting him know how well your economy is doing. Good day.\"\n\t\t\t\t\t\t\t\t*set rule +2\n\t\t\t\t\t\t\t\t*if gold \u003c 9999\n\t\t\t\t\t\t\t\t\tAfter Gillian leaves, your advisor approaches. \"Lord ${name}, that wasn't just your Gold. Many of the nobles and merchants keep their Gold here. We're going to have to take out a loan to reimburse them.\"\n\t\t\t\t\t\t\t\t\t*set rule -2\n\t\t\t\t\t\t\t\t\t*set gold -4000\n\t\t\t\t\t\t\t\t*set gold -10000\n\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t#\"Oh hey, did you drop this?\" (20,000 GP)\n\t\t\t\t\t\t\t\tGillian looks at the Gold for a moment. \"Why, yes…yes, I did. Thank you.\" \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tHe turns to leave, then pauses. \"By the way…I took a second look at the review, and it seems I subtracted you in a few areas that I shouldn't have. You actually did very well…extraordinarily well, in fact. I'll be sure to write a letter to the King letting him know how your economy should be used as the standard moving forward. Good day.\"\n\t\t\t\t\t\t\t\t*set rule +2\n\t\t\t\t\t\t\t\t*if gold \u003c 19999\n\t\t\t\t\t\t\t\t\tAfter Gillian leaves, your advisor approaches. \"Lord ${name}, that wasn't just your Gold. Many of the nobles and merchants keep their Gold here. We're going to have to take out a loan to reimburse them.\"\n\t\t\t\t\t\t\t\t\t*set rule -2\n\t\t\t\t\t\t\t\t\t*set gold -5000\n\t\t\t\t\t\t\t\t*set gold -20000\n\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t\t\n\t\t\t\"Hmm. You actually passed inspection. That means out of all the Lords in the realm, only you have truly met the standards I've set. Congratulations! Next time I see the King, I'll be sure to mention how well you did on your inspection. Good day!\"\n\t\t\t*set rule +4\n\t\t\t*finish\n", "day7": "Court is rather uneventful today. Your advisor suggests it may be a good idea use this free time to travel to some of the nearby villages under your domain. \n\nWhat do you do?\n\n", "death": "*comment Copyright 2015 by Philip Kempton.\n*comment \n*image game_over.png\n\n\nYou have died or lost control of your Kingdom.\n\n*set dead 1\n*goto_scene ending", "ending": "Calculating score…\n*if light \u003c 0\n\t*set light 0\n*if dark \u003c 0\n\t*set dark 0\n*set score +rule\n*set score +castle\n*set score +governor\n*set score +king\n*if dead > 0\n\t*goto skip\n*if king > 0\n\t*achieve king\n*if dark > 85\n\t*achieve ruthless\n*if light > 85\n\t*achieve merciful\n*if peasant = 1\n\t*achieve humble\n\n*if difficulty = 1\n\t*if score > 5 \n\t\t*set score -5\n*if intelligence = 0\n\t*achieve intelligence\n*if leadership > strength\n\t*if leadership > agility\n\t\t*if leadership > stealth\n\t\t\t*if leadership > intelligence\n\t\t\t\t*if leadership > diplomacy\n\t\t\t\t\t*achieve leader\n\n*if strength > leadership\n\t*if strength > agility\n\t\t*if strength > stealth\n\t\t\t*if strength > intelligence\n\t\t\t\t*if strength > diplomacy\n\t\t\t\t\t*achieve stronger\n\n*if agility = 0\n\t*achieve allthumbs\n\t\n*if difficulty = 3\n\t*achieve hard\n\t*set score +10\n*label skip\t\n*page_break\n\nThe game is over!\n\n*if dead = 0\n\tYour score is ${score}.\n\n*page_break End\nWe hope you've enjoyed playing [i]Tale of a Kingdom - Swamp Castle.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99\n", "rebellion": "Some weeks pass. One day, a rider reaches your castle gate. He says he has urgent news. Your men open the gates and lead him to your court.\n\nThe rider begins to speak. \"My liege, there has been a rebellion in the Central Province, and the King is requesting troops from all castles to help put down this rebellion. We're not sure who the rebel leaders are, but they are well organized.\"\n*set health 100\n*set army 0\n\n*label start\nWhat do you say?\n*choice\n\t#\"How did this happen?\"\n\t\t\"Apparently, they've been planning an attack for months. Moving their men inside the Central Province. The King is currently surrounded by the rebel army and has lost control of the Northern Province, which seems to be their base of operations.\"\n\t\t*page_break\n\t\t*goto start\n\t#\"What is the King requesting of me?\"\n\t\t\"He is requesting you send all available troops you can to aid him in the war. General Vero is currently leading the counter-offensive against the rebel army.\"\n\t\t*page_break\n\t\t*goto start\n\t#\"I'll need to speak to my advisor on this matter.\"\n\t\tThe rider leaves and gets back on his horse. Apparently, he has several other Lords to notify. \n\t\t*page_break\n\t\t*goto story\n\t\t\n*label story\nYour advisor comes up. \"My liege, this is not good; the last time there was a rebellion, it lasted for months and disrupted trade throughout the entire Kingdom.\" \n\nWhat do you say to your advisor?\n*choice\n\t#\"What are the King's chances of surviving this rebellion?\"\n\t\t\"Well, it sounds like he was attacked by surprise and is currently surrounded. We would need more information, including the number of troops the rebels have and whether there's any foreign power supporting them.\" \n\t\t*page_break\n\t\t*goto story\n\t#\"How could we help the King?\"\n\t\t\"We could help the King in a number of different ways, but it sounds like what he needs the most right now is manpower.\" \n\t\t*page_break\n\t\t*goto story\n\t#\"What do you advise?\"\n\t\t\"Well, I urge you to gain more information before you make a decision; however, I would think we should help the King if we can.\"\n\t\t*page_break\n\t\t*goto story\n\t#\"That is all.\"\n\t\tYour advisor is called away by a guard and leaves. \n\t\t*page_break\n\t\t*goto story2\n\n*label story2\nYou spend some time trying to learn more information regarding the rebel army's strength. Information on their troop numbers are unknown; however, you do know that the majority of their troops are located in the Northern Province and they currently have the King surrounded in the capital. You're also aware that while most Lords have pledged to aid the King, some are remaining neutral, and a few have proclaimed support for the rebels.\n\nYour advisor comes in with a surprised look on his face. You ask him what's going on. He tells you that a representative from the Rebel army is here to meet with you.\n\nWhat do you want to do?\n*choice\n\t#\"Let's hear what he has to say.\"\n\t\tYou decide to hear from the rebel representative. \"Perhaps we can learn something from him.\"\n\t\t*page_break\n\t\t*goto rebel\n\t#Refuse to see him.\n\t\tYou tell your men to refuse his entrance. \n\t\t*set rebel_army +100\n\t\t*page_break\n\t\t*goto rebels_turned_away\n\t\t\n\n\t\t\n\t\t\n\t\t\n*label rebel\nA man in armor walks in. He appears to be a knight of some kind, but you don't recognize his colors or the symbols on his shield. He bows respectfully and begins to speak.\n\n\"My liege, I was sent to request your aid in the war to free Magincia.\"\n*fake_choice\n\t#\"What do you mean?\"\n\t\t\"We wish to remove the rule of monarchy from the Kingdom of Magincia and replace it with a republic led by a council of Lords.\"\n\n\t#\"Aren't you part of the rebel army that attacked our King?\"\n\t\t\"He is not our King; in fact, if you know your history, he took the throne by force from the rightful King. We hold no loyalty to him.\"\n\n*label questions\n\nWhat do you say?\n*choice\n\t#\"Who exactly is your leader?\"\n\t\t\"At the moment, we have a council of Lords making all the war decisions. We do have a commander, but we've decided to keep his or her identity a secret for the time being; however, I can assure you that we are led by someone who wishes to bring peace and prosperity back to Magincia as quickly as possible.\" \n\n\t\t*goto questions\n\t#\"What are you requesting from me?\"\n\t\t\"We need aid, whether it be in the form of troops or money.\"\n\n\t\t*goto questions\n\t#\"What do I get in return?\"\n\t\t\"We will make sure you are part of the council of Lords that will lead the new government.\"\n\n\t\t*goto questions\n\t#\"What are your troop strengths?\"\n\t\t\"The size of our army is equal to that of the King's, and our ranks are growing daily.\" \n\n\t\t*goto questions\n\t#\"Why should I be involved?\"\n\t\t\"We will remember who was with us and who was against us. I assure you that anyone who works against us will have a limited or no role at all in the future government of Magincia.\"\n\n\t\t*goto questions\n\t#I have heard enough.\n\t\t\"You will have to decide where your loyalties lie.\"\n\t\t\n\t\tThe rebel representative leaves.\n\t\t*page_break\n\t\t*goto advisor_questions\n\t\t\n\t\t\n\t\t\n*label advisor_questions\t\t\nYour advisor approaches you. What should you ask him?\n*choice\n\t#\"Do you think he's telling the truth?\"\n\t\t\"Who knows? There have been many rebellions in the past where the leaders claimed they wanted to form a more democratic government, but it ended up being a monarchy again. This could all be a ruse. I find it hard to believe that the rebel army has a force equal to that of the King's; if they did, it would have been extremely difficult to keep that force hidden for this long. If they do indeed have a force that strong, they probably have foreign support.\" \n\t\t*page_break\n\t\t*goto advisor_questions\n\t#\"What would you advise?\"\n\t\t\"I think you should try to verify some of his information and then make a decision. I don't feel comfortable not knowing who we'd be fighting for if we joined the rebels; however, it is up to you, my liege.\" \n\t\t*page_break\n\t\t*goto advisor_questions\n\t#\"That is all.\"\n\t\tYour advisor leaves, and the head of your guard approaches. \n\n\t\t*goto orders\n\n*label orders\t\t\n\"What are your orders?\"\n*choice\n\t*selectable_if (stealth > 0) #\"Send spies to find out all you can about these rebels.\" (Requires Stealth)\n\t\tYour spies return with additional information. \n\n\t\tApparently, the rebels have indeed surrounded the King; however, they don't have enough forces to overtake the castle. They're currently trying to fight a war of attrition, but the King has enough supplies to last for at least a month. Relief forces led by General Vero will arrive to aid the King shortly. The opposing forces are about even in troop strength; however, if the rebels allow themselves to be surrounded, it will cut off their supply line. They're desperately trying to find a way into the capital.\n\t\t*page_break\n\t\t*goto orders\n\t*selectable_if (stealth > 1) #\"Send spies to follow the rebel messenger to find out how the other Lords react to his message.\" (Requires Medium Stealth)\n\t\tMost of the Lords have decided to remain neutral. Vero has rushed to the King's aid and is currently leading the main army. Gensa hasn't been seen for several days. \n\t\t*page_break\n\t\t*goto orders\n\t*disable_reuse *selectable_if (leadership > 1) #\"Close the gates to all outsiders for the moment, until we know more.\" (Requires Medium Leadership)\n\t\t*image defense_no_gat
