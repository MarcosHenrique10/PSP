t\t\t\t\t\t*goto story3\n\t\t\t\t\t#\"Help me secure my rule here.\"\n\t\t\t\t\t\t\"I could definitely do that…I do have some powerful connections. I would be willing to share a few of them with you.\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*selectable_if (diplomacy > 1) #\"It would have to be more than a few…\"\n\t\t\t\t\t\t\t\t*set rule +3\n\t\t\t\t\t\t\t\t\"Very well…I'll get you in touch with my spymaster, he should be able to provide you with what you need.\"\n\t\t\t\t\t\t\t\t*set supported_gensa 1\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tHe leaves before you can change your mind.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto end_day\n\t\t\t\t\t\t\t#\"That would be acceptable.\"\n\t\t\t\t\t\t\t\t\"Very well…I shall introduce you to some of my connections in court.\"\n\t\t\t\t\t\t\t\t*set supported_gensa 1\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tHe leaves before you can change your mind.\n\t\t\t\t\t\t\t\t*set rule +2\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto end_day\n\t\t\t\t\t\t\t#\"On second thought, I'm not interested in such an arrangement.\"\n\t\t\t\t\t\t\t\t\"Very well…\"\n\t\t\t\t\t\t\t\tpage_break\n\t\t\t\t\t\t\t\t*goto story3\n\t\t\t\t\t#\"I cannot be bought…if that's what you're implying.\" \n\t\t\t\t\t\tGensa looks surprised. \"Of course not! I was simply curious, that's all…\"\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto story3\n\t\t\t#\"No, I've just been busy with my duties here.\"\n\t\t\t\t\"Ah, I see. Well, perhaps someone can enlighten you on current events.\" \n\t\t\t\t*page_break\n\t\t\t\t*goto story3\n\t\t\t\t\n*label story3\n\"I would prefer to know your decision before the vote takes place…if possible.\"\n\nHe leaves.\n\nYou look to your advisor. \"Do you know anything about this?\"\n\nYour advisor says, \"I know that Gensa, Vero, and Gillian are running, and the position of Governor does hold quite some power. Is there anything you would like to know?\"\n*label story4\n*choice\n\t#\"Tell me about Gensa.\"\n\t\t\"Gensa used to be the spymaster for the last Governor. He's very politically savvy. I'm not sure of what methods he employs, but he rose to the top rather quickly. He gained a Lordship in the Western Province after serving only two years as spymaster.\"\n\t\t*page_break\n\t\t*goto story4\n\t#\"Tell me about Vero.\"\n\t\t\"Vero is an old warrior respected by many in the Kingdom. He's known for his loyalty to the King, and he's a man that always keeps his word. Honor and duty are two words that come to mind when many think of him.\"\n\t\t*page_break\n\t\t*goto story4\n\t#\"Tell me about Gillian.\"\n\t\t\"Gillian used to be the master of coin for the last Governor. He's now a powerful merchant who rose to power and recently purchased a Lordship. Despite living in the swamplands, he's amassed quite a fortune.\"\n\t\t*page_break\n\t\t*goto story4\n\t#\"What makes the position of Governor so powerful?\"\n\t\t\"They speak for all the Lords when important decisions are to be made. They also have a direct line of communication to the King. Their role is to ensure their province maintains peace and prosperity. They also receive additional taxes and troops from the King.\" \n\t\t*page_break\n\t\t*goto story4\n\t#\"That is all.\"\n\t\t\"Very well…\"\n\t\t*page_break\n\t\t*goto story5\n\t\t\n*label story5\nAfter some time passes, your advisor asks who you're planning to vote for.\n*choice\n\t#Gensa.\n\t\t*set rule +2\n\t\tYour vote turns out to be the deciding factor. Gensa is appreciative of your efforts and assures you that your voice will be heard in important matters. \n\t\t*set current_governor 4\n\t\t*set supported_gensa 1\n\t\t*finish\n\t#Vero.\n\t\tYour vote turns out to be the deciding factor. Vero focuses on improving the realm's defenses. As a result, your troop strength has increased greatly. \n\t\t*set guards +10\n\t\t*set knights +2\n\t\t*set current_governor 2\n\t\t*finish\n\t#Gillian.\n\t\tYour vote turns out to be the deciding factor. Gillian focuses on improving the province's economy. As a result, your Gold yield has increased greatly. \n\t\t*set gold +2000\n\t\t*set current_governor 3\n\t\t*finish\n\t*selectable_if (rule > 9) #I plan on running myself. (Requires 10 Rule)\n\t\tThe King accepts you as a candidate. Now you need to decide how you might win this.\n\t\t*page_break\n\t\t*goto election\n\t#I don't plan on participating in the election.\n\t\tYou don't participate in the election and focus on your own affairs. Gensa ends up winning by the smallest of margins. \n\t\t*set peasants +5\n\t\t*set current_governor 4\n\t\t*finish\n\n*label election\nThe election will be held soon. Your advisor brings you the following information regarding the election. \n\nYou - ${your_votes} Votes\n\nVero - ${vero_votes} Votes\n\nGillian - ${gillian_votes} Votes\n\nGensa - ${gensa_votes} Votes\n\n*if undecided_votes > 0\n\tUndecided - ${undecided_votes} Votes\n\nWhat should you do?\n*choice\n\t*selectable_if (bribe \u003c 1) #Speak to Vero.\n\t\tVero greets you. \n\t\t*if knight > 0\n\t\t\t\"I know your history of how you were granted a Lordship. Your exploits as a warrior are still spoken of today. It's a pleasure to meet you.\"\n\n\t\tYou end up hearing tales of Vero's exploits as a warrior. He treats you with good hospitality, but there isn't much more to say once he's finished his tales.\n\t\t*choice\n\t\t\t*disable_reuse #Ask him if he would be willing to support me.\n\t\t\t\tHe thinks for a moment.\n\n\t\t\t\t\"Well, we are both warriors…I wonder which of us is the better one. There's one way to solve this. Enter the noble's jousting tournament. I'll be participating as well. If you win, you will have my vote, as well as the votes of my supporters.\"\n\t\t\t\n\t\t\t\tYou talk some more, then leave. \n\t\t\t\t*page_break\n\t\t\t\t*goto election\n\t\t\t*disable_reuse #Bribe him.\n\t\t\t\tHe's outraged that you would attempt to bribe him. He tells you to leave and not to visit again.\n\t\t\t\t*set bribe +1\n\t\t\t\t*page_break\n\t\t\t\t*goto election\n\t\t\t#Respectfully leave.\n\t\t\t\tYou leave.\n\t\t\t\t*page_break\n\t\t\t\t*goto election\n\t*selectable_if (gillian_votes > 0) #Speak to Gillian.\n\t\tGillian welcomes you. You talk for some time regarding his past as a merchant. \n\t\t*if peasant > 0\n\t\t\tHe's impressed by how you were able to gain a Lordship with your humble beginnings as a peasant. \n\t\t*choice\n\t\t\t*disable_reuse *selectable_if (peasant > 0) #Ask him if he would be willing to support me.\n\t\t\t\t\"Perhaps…come back when you have Gold with you.\"\n\t\t\t\t*page_break\n\t\t\t\t*goto election\n\t\t\t*disable_reuse #Bribe him.\n\t\t\t\tHe laughs. \"There's little I need. What could you offer me?\"\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (merchants > 9) #\"Ten experienced merchants and an open borders agreement, so you can trade with Galmencia.\" (Requires 10 Merchants)\n\t\t\t\t\t\tHe looks at you for a few seconds.\n\n\t\t\t\t\t\t\"That would be an acceptable.\"\n\n\t\t\t\t\t\tHe promises to give his votes to you.\n\t\t\t\t\t\t*set gillian_votes 0\n\t\t\t\t\t\t*set dark +10\n\t\t\t\t\t\t*set light -5\n\t\t\t\t\t\t*set merchants -10\n\t\t\t\t\t\t*set your_votes +4\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto election\n\t\t\t\t\t*selectable_if (gold > 2499) #\"2500 Gold Pieces?\"\n\t\t\t\t\t\tHe looks at you for a few seconds.\n\n\t\t\t\t\t\t\"That would be an acceptable amount. I could use the Gold for an investment I was considering.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tHe promises to give his votes to you.\n\t\t\t\t\t\t*set gold -2500\n\t\t\t\t\t\t*set dark +10\n\t\t\t\t\t\t*set light -5\n\t\t\t\t\t\t*set gillian_votes 0\n\t\t\t\t\t\t*set your_votes +4\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto election\n\t\t\t\t\t#\"Never mind.\"\n\t\t\t\t\t\tHe laughs and escorts you out.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto election\n\t\t\t\t\t\n\t\t\t#Respectfully leave.\n\t\t\t\tHe escorts you out.\n\t\t\t\t*page_break\n\t\t\t\t*goto election\n\t#Speak to Gensa.\n\t\t*label gensa\n\t\t*if your_votes \u003c 2\n\t\t\tGensa says he has no wish to speak to you at this time. Perhaps he would consider doing so if you somehow managed to gain additional votes.\n\t\t\t*page_break\n\t\t\t*goto election\n\t\tGensa greets you. \"I'm surprised to see you here. How can I help you?\"\n\t\t*choice\n\t\t\t#\"Would you consider supporting me?\"\n\t\t\t\t\"No.\"\n\t\t\t\t*page_break\n\t\t\t\t*goto gensa\n\t\t\t#\"What would you give me if I decided to support you?\"\n\t\t\t\t\"That would depend on how many votes you have…I would give you 2000 GP for each vote you provided. I also would help secure your rule.\"\n\t\t\t\t*choice\n\t\t\t\t\t#\"All right, you have a deal.\"\n\t\t\t\t\t\t*set gold_increase your_votes * vote\n\t\t\t\t\t\t*set gold +gold_increase\n\t\t\t\t\t\tYour Gold increases by ${gold_increase}.\n\t\t\t\t\t\t*set rule +1\n\t\t\t\t\t\t*set supported_gensa 1\n\t\t\t\t\t\t*set current_governor 4\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto end_day\n\t\t\t\t\t\n\t\t\t\t\t#\"I would have to think about it.\"\n\t\t\t\t\t\t\"Very well…\"\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto gensa\n\t\t\t\t\t#\"No thanks.\"\n\t\t\t\t\t\t\"Very well.\"\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto gensa\n\t\t\t#Leave.\n\t\t\t\tYou leave.\n\t\t\t\t*page_break\n\t\t\t\t*goto election\n\t*disable_reuse *selectable_if (gave_speech = 0) #Give a speech.\n\t\t*if intelligence > 1\n\t\t\tYou feel well prepared to give a speech. \n\t\t\t*set your_votes +2\n\t\t\t*set undecided_votes -2\t\n\t\tYou think the speach went well but aren't sure if any of the Lords were swayed by your words. \n\t\t*set gave_speech +1\n\t\t*page_break\n\t\t*goto election\t\n\t*selectable_if (undecided_votes > 0) #Try to gain votes from the undecided.\n\t\tThere are several ways to do this…what do you propose?\n\t\t*choice\n\t\t\t*disable_reuse *selectable_if (jousting_tournament = 0) #Enter the noble's jousting tournament.\n\t\t\t\tYou enter the tournament. You see nobles from all across the realm. You get ready for your first match. Your opponent charges at you.\n\t\t\t\t*page_break\n\t\t\t\t*set jousting_tournament 1\n\t\t\t\t*if strength > 1\n\n\t\t\t\t\tYou knock him off his horse. You have won the first round!\n\t\t\t\t\t\n\t\t\t\t\tYou have earned 500 Gold Pieces.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*set gold +500\n\t\t\t\t\tYou get ready for your next opponent. He charges at you with his horse.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*if agility > 0\n\t\t\t\t\t\tYou manage to knock him off his horse. You have won the second round!\n\t\t\t\t\t\t*set gold +1000\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou have earned 1000 Gold Pieces.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t*if agility \u003c 1 \n\t\t\t\t\t\tYou fall off your horse. You have lost the tournament. \n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto election\n\t\t\t\t\tThe final round is next. You discover that you will be facing Vero.\n\n\t\t\t\t\tYou get ready and charge toward Vero…\n\t\t\t\t\t*if agility > 1\n\t\t\t\t\t\tYou knock Vero off his horse. You have won the tournament!\n\t\t\t\t\t\t*set gold +2000\n\t\t\t\t\t\tYou have earned 2000 Gold Pieces.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tVero is impressed by your prowess in battle. He decides to give his votes to you. \n\t\t\t\t\t\t*set vero_votes -3\n\t\t\t\t\t\t*set your_votes +3\n\t\t\t\t\t\t*set undecided_votes -1\n\t\t\t\t\t\t*set your_votes +1\n\t\t\t\t\t\t*set warrior_votes 1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto election\n\t\t\t\tVero knocks you off your horse. You have lost the tournament.\n\t\t\t\t*page_break\n\t\t\t\t*goto election\n\t\t\t*disable_reuse #Focus upon improving the economy of the province.\n\t\t\t\tHow will you do this?\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (merchants > 9) #Send merchants to improve the economy. (Requires 10 Merchants)\n\t\t\t\t\t\t*set merchants -10\n\t\t\t\t\t\t*set undecided_votes -1\n\t\t\t\t\t\t*set your_votes +1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto election\n\t\t\t\t\t*selectable_if (gold > 2999) #Send an investment of 3000 Gold Pieces.\n\t\t\t\t\t\t*set gold -3000\n\t\t\t\t\t\t*set undecided_votes -1\n\t\t\t\t\t\t*set your_votes +1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto election\n\t\t\t\n\t\t\t\t\t#Never mind.\n\t\t\t\t\t\tYou decide not to improve the economy at this time. Someone else takes the lead and starts this initiative. \n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto election\n\t\t\t\t\n\t\t\t*disable_reuse #Improve the roads of the province.\n\t\t\t\tHow will you do this?\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (workers > 9) #Send workers to improve the roads. (Requires 10 Workers)\n\t\t\t\t\t\t*set workers -10\n\t\t\t\t\t\t*set undecided_votes -2\n\t\t\t\t\t\t*set your_votes +2\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto election\n\t\t\t\t\t*selectable_if (gold > 1999) #Send an investment of 2000 Gold Pieces.\n\t\t\t\t\t\t*set gold -2000\n\t\t\t\t\t\t*set undecided_votes -2\n\t\t\t\t\t\t*set your_votes +2\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto election\n\t\t\t\t\t#Never mind.\n\t\t\t\t\t\tYou decide not to improve the roads. Someone else takes the lead and starts this initiative. \n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto election\n\t\t\t*disable_reuse #Improve the security of the trade routes in the Kingdom.\n\t\t\t\tHow will you do this?\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (guards > 9) #Send guards to patrol the roads. (Requires 10 Guards)\n\t\t\t\t\t\tYou send guards to protect the trade routes.\n\t\t\t\t\t\t*set Guards -10\n\t\t\t\t\t\t*set undecided_votes -1\n\t\t\t\t\t\t*set your_votes +1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto election\n\t\t\t\t\t*selectable_if (gold > 1499) #Send an investment of 1500 Gold Pieces to hire guards.\n\t\t\t\t\t\tYou hire guards to watch over the trade routes. \n\t\t\t\t\t\t*set gold -1500\n\t\t\t\t\t\t*set undecided_votes -1\n\t\t\t\t\t\t*set your_votes +1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto election\n\t\t\t\t\t#Never mind.\n\t\t\t\t\t\tYou decide not to improve the security of the trade routes. Someone else takes the lead and starts this initiative. \n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto election\n\t\t\t*disable_reuse #Provide food for the poor.\n\t\t\t\tHow will you do this?\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (farmers > 10) #Send farmers to help. (Requires 10 Farmers)\n\t\t\t\t\t\tYou send farmers to help. \n\t\t\t\t\t\t*set farmers -5\n\t\t\t\t\t\t*set undecided_votes -1\n\t\t\t\t\t\t*set your_votes +1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto election\n\t\t\t\t\t*selectable_if (gold > 1999) #Send an investment of 2000 Gold Pieces to buy a surplus of food.\n\t\t\t\t\t\tYou send over a surplus of food. \n\t\t\t\t\t\t*set gold -2000\n\t\t\t\t\t\t*set undecided_votes -1\n\t\t\t\t\t\t*set your_votes +1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto election\n\t\t\t\t\t#Never mind.\n\t\t\t\t\t\tYou decide not to pursue this. Someone else takes the lead and starts this initiative. \n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto election\n\t\t\t*disable_reuse *selectable_if (noble > 0) #Use my noble connections.\n\t\t\t\tYou end up gaining one vote.\n\t\t\t\t*set undecided_votes -1\n\t\t\t\t*set your_votes +1\n\t\t\t\t*page_break\n\t\t\t\t*goto election\n\t\t\t*disable_reuse *selectable_if (leadership > 1) #Organize a volunteer militia group to help with various events throughout the Kingdom.\n\t\t\t\tYour efforts gain you one vote. \n\t\t\t\t*set undecided_votes -1\n\t\t\t\t*set your_votes +1\n\t\t\t\t*page_break\n\t\t\t\t*goto election\n\t\t\t#Examine a different tactic.\n\t\t\t\tVery well…\n\t\t\t\t*page_break\n\t\t\t\t*goto election\n\t\t\t\t\t\t\n\t#Proceed to the election.\n\t\t*if your_votes > 8\n\t\t\tYou have won the election!\n\t\t\t\n\t\t\tThe King sends you 20,000 Gold Pieces, 20 Guards, 5 Knights, and 1 Magician. \n\t\t\t*set gold +20000\n\t\t\t*set guards +20\n\t\t\t*set rule +1\n\t\t\t*set knights +5\n\t\t\t*set magicians +1\n\t\t\t*set governor 1\n\t\t\t*achieve governor\n\t\t\t*set current_governor 1\n\t\t\t*page_break\n\t\t\t*if your_votes > 10\n\t\t\t\t*set rule +2\n\t\t\t*finish\n\t\t*goto end_day\n\t\t\n*label end_day\nGensa ends up winning the election. Whether this is a good thing for the Kingdom or not will have to be seen over time. \n*set current_governor 4\n*finish", "day6": "*temp tax_increase 1\n*temp tax_increase2 1\n*temp food_increase 10\n*temp guard_army 0\n*temp gold_increase 0\n*if rule > 5\n\t*goto story\n*if inspection1 = 1\n\t*goto inspections\n*if inspection1 = 2\n\t*goto ambush\n\t\n*label rebellion\nYou see several peasants carrying pitchforks and makeshift weapons. Your advisor tells you that they're forming a rebel army to overthrow you. \n\t\nHow do you handle it?\n*choice\n\t*selectable_if (guards > 14) #Send guards to quell the crowd. (Requires 15 Guards)\n\t\tThe guards manage to quell the crowd, but not before they cause much damage to the surrounding area.\n\t\t*set merchants -10\n\t\t*set farmers -10\n\t\t*set guards -10\n\t\t*set militia 0\n\t\t*set defenses 1\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*goto story\n\t*selectable_if (gold > 499) #Bribe them to go away. (500 GP)\n\t\tThey agree to take the Gold and disperse. \n\t\t*set gold -500\n\t\t*set merchants 0\n\t\t*set farmers 0\n\t\t*set militia 0\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*goto story\n\t*selectable_if (diplomacy > 2) #Address their grievances and negotiate a compromise.\n\t\tThey agree to your terms. \n\t\t*set merchants 0\n\t\t*set farmers 0\n\t\t*set militia 0\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*goto story\n\t#Do nothing. \n\t\t*set peasants -20\n\t\tPeasants riot in the streets and loot your fiefdom. It is total chaos.\n\t\t*if peasants \u003c 1\n\t\t\t*page_break\n\t\t\t*goto possible_end_game\n\t\t*set peasants 0\n\t\t*set merchants 0\n\t\t*set farmers 0\n\t\t*set militia 0\n\t\t*set rule -1\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*goto story\n\t\n*label possible_end_game\nThe rebel peasants overtake your guards and bust through the castle doors. Five of them surround you.\n*choice\n\t*selectable_if (leadership > 2) #Order them to stand down. (Requires 3 Leadership)\n\t\tThey leave you alone, but not before stealing a few valuables. \n\t\t*set gold -250\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*goto story\n\t*selectable_if (light > 60) #Remind them how I helped them in the past.\n\t\tThey leave you alone, but not before stealing a few valuables. \n\t\t*set gold -250\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*goto story\n\t*selectable_if (dark > 60) #Threaten them.\n\t\tThey run off, but not before raiding your treasury.\n\t\t*set gold -500\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*goto story\n\t#Defend myself.\n\t\tYou look around; this will likely be the toughest battle you've ever faced. They surround you from all sides, and you don't even have a weapon on you.\n\t\t*page_break\n\t\tThey're hesitant to attack you…\n\t\t\n\t\tWhat should you do?\n\t\t*choice\n\t\t\t#Charge the peasant with the spear.\n\t\t\t\t*if agility \u003c 3\n\t\t\t\t\tYou charge the peasant with the spear, but he's too quick for you; he stabs the spear deep into your leg. You're forced down to your knees.\n\t\t\t\t\t*page_break\n\t\t\t\t\tSeeing you fall causes the other peasants to join in, and they begin to strike you with their weapons…\n\t\t\t\t\t*set health -10\n\t\t\t\t\t*choice\n\t\t\t\t\t\t*selectable_if (strength > 2) #Rip the spear out of my leg and stab one of the peasants with it. (Requires Great Strength)\n\t\t\t\t\t\t\tYou're able to remove the spear and use it as a weapon. \n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto fight_rebels\n\t\t\t\t\t\t#Try to roll away.\n\t\t\t\t\t\t\tYou're unsuccessful. The peasants keep attacking you.\n\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t*selectable_if (guards > 10) #Yell for help.\n\t\t\t\t\t\t\tA few of your soldiers manage to help you up. One hands you his sword. However, they are soon overpowered by another mob of peasants. You are again facing the five rebels, but at least this time, you're armed.\n\t\t\t\t\t\t\t*set health -30\n\t\t\t\t\t\t\t*set guards -5\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto fight_rebels\n\n\t\t\t\tYou manage to shove the peasant down and get a hold of his spear. You're still surrounded, but at least you have a weapon now.\n\t\t\t\t*page_break\n\t\t\t\t*goto fight_rebels\n\t\t\t#Charge the peasant with the club.\n\t\t\t\t\tYou push the peasant over and are able to grab his club. At least you're armed now. \n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto fight_rebels\n\t\t\t#Charge the peasant with the dagger.\n\t\t\t\tYou run towards him to attack, but he's quite skilled. He avoids your blows, then strikes you several times. You soon fall to the ground. The rest of the peasants attack you from all sides. You slowly lose consciousness.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene death\n\t\t\t*selectable_if (leadership > 2) #Taunt one of them into attacking me.\n\t\t\t\tThe one with the spear attempts to stab you with it.\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (agility > 0) #Dodge and attempt to grab his weapon. (Requires Agility)\n\t\t\t\t\t\tYou manage to grab his weapon. At least you're armed now. \n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto fight_rebels\n\t\t\t\t\t*selectable_if (strength > 2) #Let him attack me, but grab his weapon after he does.\n\t\t\t\t\t\t*set health -20\n\t\t\t\t\t\tThe peasant isn't very well trained with the weapon, but he stabs you in your shoulder. You push him back and rip the spear out. The peasant runs away in surprise. You're hurt from the blow, but at least you have a weapon now.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto fight_rebels\n\t\t\t\t\t#Jump back.\n\t\t\t\t\t\tYou jump back but land right on the peasant with the club. He hits you hard on the head. Soon, all of the peasants are hitting you, and you're overwhelmed.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto_scene death\n\t\t\t#Wait for them to strike first.\n\t\t\t\tThis doesn't go your way. Soon, they all attack together, and you're overwhelmed.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene death\n\t\t\n*label fight_rebels\n*if health \u003c 1\n\tYou've taken too much damage. You fall to the ground, and the rebels continue to attack you.\n\t*page_break\n\t*goto_scene death\nThe fighting is vicious. You can't believe how much these peasants want you dead. \n*choice\n\t*selectable_if (strength > 3) #Fight on!\n\t\tThe fight is completely brutal, and you hold nothing back. The remaining rebels are defeated. You have survived.\n\t\t*set peasants -10\n\t\t*set merchants 0\n\t\t*set farmers 0\n\t\t*set militia 0\n\t\t*set rule 0\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*page_break\n\t\t*goto story\n\t#Attempt to flee.\n\t\tThe peasants soon overpower you.\n\t\t*page_break\n\t\t*goto_scene death\n\t*selectable_if (fireball > 0) #Cast a fireball.\n\t\tYou're able to cause enough damage to the rebels to lead a successful counter-attack. You have survived. \n\t\t*set merchants 0\n\t\t*set farmers 0\n\t\t*set militia 0\n\t\t*set peasants -10\n\t\t*set rule 0\n\t\t*set rebellion_count +1\n\t\t*if rebellion_count = 1\n\t\t\t*achieve cake\n\t\t*if rebellion_count = 2\n\t\t\t*achieve cake2\n\t\t*if rebellion_count = 3\n\t\t\t*achieve cake3\n\t\t*page_break\n\t\t*goto story\n\n*label story\nA few weeks have passed since the election. \n*set health 100\n*if militia \u003c 0\n\t*set militia 0\n*if guards \u003c 0\n\t*set guards 0\n*if merchants \u003c 0\n\t*set merchants 0\n*if magicians \u003c 0\n\t*set magicians 0\n*if farmers \u003c 0\n\t*set farmers 0\n*if peasants \u003c 0\n\t*set peasants 0\n*if workers \u003c 0\n\t*set workers 0\n*if knights \u003c 0\n\t*set knights 0\n*if archers \u003c 0\n\t*set archers 0\n*if druids \u003c 0\n\t*set druids 0\n*if current_governor = 1\n\tAs Governor, you've had to make several decisions regarding budgeting and priorities. What do you consider most important to the realm right now, and where other Lords should focus their efforts on improving?\n\t*choice\n\t\t#Focus on the military.\n\t\t\tYou decide that defense is paramount. You instruct all Lords to improve their defenses in case of future barbarian attacks. \n\t\t\t*set guards +10\n\t\t\t*page_break\n\t\t\t*goto governor\n\t\t#Focus on the economy.\n\t\t\tYou decide that improving the Western Province's economy is most important. You instruct all the Lords to improve their own trade and industry. \n\t\t\t*set merchants +10\n\t\t\t*page_break\n\t\t\t*goto governor\n\t\t#Focus on the betterment of the people.\n\t\t\tThe people have been through a difficult time. Resources should be spent to improve their living conditions, as well as their welfare. You instruct all Lords to make these initiatives to protect the people's future. \n\t\t\t*set peasants +10\n\t\t\t*page_break\n\t\t\t*goto governor\n\n*if current_governor = 2\n\tGeneral Vero has proven to be an effective Governor. He's gotten most of the Lords in line. How he achieved that, you cannot be certain of. What you can be certain of is that he appreciates the support you gave him during his election. \n\t\n\tYou hear that other Lords, which either actively worked against Vero being elected or didn't vote for him, have even fared well under his Governorship. It is a testament to the man's moral character. \n\t*page_break\n\tOne day, a messenger arrives with a letter from the Governor. He's carrying several letters. The messenger hands one of the letters to your advisor and leaves in a hurry, presumably to deliver the rest to the other Lords. \n\t\n\tWhen you open the letter, you find it contains a handwritten note from Vero, which reads:\n\t\n\t[i]Attention all Lords of the Realm:[/i]\n\t\n\t[i]As Governor of the Western Province, I want to make sure everything is done to keep our defenses strong. As such, I will be personally inspecting all Lord's castles to ensure steps are being taken to improve the defenses of the realm. When I arrive, I expect to find that all of you have taken the proper steps to make this initiative successful. Failure to do so will result in severe consequences.[/i]\n\t\n\t[i]- Governor Vero Magnus[/i]\n\t*page_break\n\tAfter you finish reading the letter, your advisor takes a look at it.\n\n\tHe thinks for a few moments, then speaks. \"It makes sense, Lord ${name}. Vero has always cared about defense more than anything else in the realm. Perhaps we should take some steps to work on our defenses before he arrives.\"\n\t*page_break\n\t*goto economy1\n\t\n*if current_governor = 3\n\tGillian has proven to be an effective Governor. He's gotten most of the Lords in line. You hear rumors that he achieved this through somewhat nefarious means, including bribery, but you can't be certain of that. What you can be certain of is that he appreciates the support you gave him during his election. \n\t\n\tYou hear that other Lords, which either actively worked against Gillian being elected or didn't vote for him, haven't fared as well under his Governorship.\n\t*page_break\n\tOne day, a messenger arrives from the Governor. He's carrying several letters. The messenger hands one of the letters to your advisor and leaves in a hurry, presumably to deliver the rest to the other Lords. \n\t\n\tWhen you open the letter, you find it contains a handwritten note from Gillian, which reads:\n\t\n\t[i]Attention all Lords of the Realm:[/i]\n\t\n\t[i]As Governor of the Western Province, I want to make sure everything is done to keep our economy stable. As such, I will be personally inspecting all Lord's castles to ensure steps are being taken to improve the economy here. When I arrive, I expect to find that all of you have taken the proper steps to make this initiative successful. Failure to do so will result in severe consequences.[/i]\n\t\n\t[i]- Governor Gillian Linnius[/i]\n\t*page_break\n\tAfter you finish reading the letter, your advisor takes a look at it.\n\n\tHe thinks for a few moments, then speaks. \"It makes sense, Lord ${name}. Gillian has always cared about finances more than anything else in the realm.\"\n\t*page_break\n\t*goto gillian\n\n*if current_governor = 4\n\t*if supported_gensa > 0\n\t\tGensa has proven to be an effective Governor. He's gotten most of the Lords in line. You hear rumors that he achieved this through somewhat nefarious means, including threats and bribes, but you can't be certain of that. What you can be certain of is that he appreciates the support you gave him during his election. You hear that other Lords, which either actively worked against Gensa being elected or didn't vote for him, have not fared as well under his Governorship. A few of these Lords blame you for their misfortune, as they feel you were the deciding factor in the election. \n\t\t*set dark +10\n\t\t*page_break\n\t\tOne day, the Governor sends a message requesting a private audience with you. \n\t\t\n\t\tWill you attend?\n\t\t*choice\n\t\t\t#Yes, of course.\n\t\t\t\tThe governor sets the meeting to be at his manor a few days from now.\n\t\t\t\t*page_break\n\t\t\t\tThe days pass, and the time of the meeting quickly approaches.\n\t\t\t\t*choice\n\t\t\t\t\t#Assemble an escort of guards, enough to ensure my security.\n\t\t\t\t\t\tYou assemble a small escort of guards. About an hour into your journey, one spots smoke up ahead in the distance. You send one of your guards to scout ahead and find out what's happening. It turns out a fire has broken out in one of the smaller villages. Apparently, the blacksmith was trying to forge when he was drunk. If the fire isn't quelled soon, it could spread to other buildings in the village. Stopping the fire would most certainly mean that you'll miss your meeting with Gensa. What do you want to do? \n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I could care less about the meeting. I will personally lead the effort to stop this fire. \n\t\t\t\t\t\t\t\tWith the help of your leadership and guards, you successfully stop the fire from spreading. The villagers are quite grateful that you were in the area at the time of the fire. \n\t\t\t\t\t\t\t\t*set peasants +5\n\n\t\t\t\t\t\t\t\tGensa is rather displeased when he finds out you won't be attending his meeting.\n\t\t\t\t\t\t\t\t*set rule -2\n\t\t\t\t\t\t\t\t*if merchants > 4\n\t\t\t\t\t\t\t\t\t*set merchants -5\n\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t#This fire needs to be stopped, but I still need to meet with the Governor. I'll order my guards to take care of it while I travel the rest of the way alone.  \n\t\t\t\t\t\t\t\tAt first, your guards are hesitant to leave you, but as soon as they see the smoke increasing, they realize that you're probably right. They tell you that they'll only be a few hours behind you and rush to put the fire out. One of the guards hands you a longsword for the journey. \"Just in case,\" he says before following the group of guards toward the smoking village.\n\t\t\t\t\t\t\t\t*set armed 1\n\t\t\t\t\t\t\t\t*set peasants +5\n\t\t\t\t\t\t\t\t*set rule +1\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto ambush1\n\t\t\t\t\t\t\t#This meeting is too important. I can't stop to help, and neither can my guards. \n\t\t\t\t\t\t\t\tAs you travel past the village, you notice the flames growing louder, as do the screams of several villagers. Many call for you to help, but their yells are drowned out by the sound of buildings collapsing. Eventually, you travel far enough that the smell of smoke is no longer noticeable.\n\t\t\t\t\t\t\t\t*set rule -1\n\t\t\t\t\t\t\t\t*set peasants -10\n\t\t\t\t\t\t\t\t*set dark +10\n\t\t\t\t\t\t\t\t*set light -10\n\t\t\t\t\t\t\t\t*goto meeting\n\t\t\t\t\t#Go alone.\n\t\t\t\t\t\tYour advisor looks at you, concerned. \"Why would you choose to go alone?\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"As a sign of respect.\"\n\t\t\t\t\t\t\t\t*set supported_gensa +1\n\t\t\t\t\t\t\t\t*set rule +1\n\t\t\t\t\t\t\t\t*goto ambush\n\t\t\t\t\t\t\t#\"To not draw attention to myself.\"\n\t\t\t\t\t\t\t\t*set stealth +1\n\t\t\t\t\t\t\t\t*goto ambush\n\t\t\t\t\t#On second thought, I'm too busy to attend.\n\t\t\t\t\t\tThe Governor seems displeased by this, especially since you told him days before that you would meet him, but he doesn't press the topic further.\n\t\t\t\t\t\t*set rule -2\n\t\t\t\t\t\t*finish\n\t\t\t#No, I'm too busy.\n\t\t\t\tThe Governor seems displeased, but he doesn't press the topic further. The rest of the day is rather uneventful.\n\t\t\t\t*finish\n\n\tGensa has proved to be an effective Governor. He's gotten most of the Lords in line. You hear rumors that he achieved this through somewhat nefarious means, including threats and bribes, but you can't be certain of that. What you are certain of is that he's made your day-to-day operations much more difficult. He's constantly making surprise inspections, forcing you to stop what you're doing and suspend court so he can go over your finances and recent decisions. You get the feeling he's doing this because you didn't support him during the election process. When he can't make the inspection himself, he sends one of his agents, who you sincerely doubt knows anything about finances or leadership. You spend most of the time explaining basic concepts to them; it's almost as if he picked random people to inspect you, regardless of their experience. After the tenth inspection in a month, your advisor approaches you and asks if there's anything that can be done about this.\n\t*page_break\n\t*goto inspections\n\t\n*label inspections\nWhat do tell your advisor?\n*choice\n\t#\"Request a meeting with Gensa.\"\n\t\tTo your surprise, Gensa actually accepts your meeting request. Your advisor asks how you'd like to handle your travel plans, as Gensa's manor is at least a day's ride away. \n\t\t*set inspection1 1\n\t\t*choice\n\t\t\t*selectable_if (guards > 20) #Assemble a small army of guards to escort me in order to remind Gensa of my strength.\n\t\t\t\tYour large party turns many heads at Gensa's manor. In fact, your guards almost outnumber his. He's unable to support lodging for all your troops, so most of them are required to spend the night outside in tents. Gensa's eyes open wide when he sees the amount of men you brought. He starts yelling something at his servants. You can't hear what he says, but it looks like he's none too pleased. His servants hastily make up a room for you. It smells foul and looks like one of the servant's rooms. The condition of the lodging doesn't bother you; just seeing Gensa's expression of surprise was worth it. \n\t\t\t\t\n\t\t\t\tYou decide to get some rest before the meeting. \n\t\t\t\t*set supported_gensa -2\n\t\t\t\t*page_break\n\t\t\t\t*goto meeting2\n\t\t\t#Assemble an escort of guards, enough to ensure my security. \n\t\t\t\tYou assemble a small escort of guards. About an hour into your journey, one spots smoke up ahead in the distance. You send one of your guards to scout ahead and find out what's happening. It turns out a fire has broken out in one of the smaller villages. Apparently, the blacksmith was trying to forge when he was drunk. If the fire isn't quelled soon, it could spread to other buildings in the village. Stopping the fire would most certainly mean that you'll miss your meeting with Gensa. What do you want to do? \n\t\t\t\t*choice\n\t\t\t\t\t#I could care less about the meeting. I will personally lead the effort to stop this fire. \n\t\t\t\t\t\tWith the help of your leadership and guards, you successfully stop the fire from spreading. The villagers are quite grateful that you were in the area at the time of the fire. \n\t\t\t\t\t\t*set peasants +5\n\n\t\t\t\t\t\tMissing your meeting with Gensa, however, means the inspections will only continue, if not increase in frequency.\n\t\t\t\t\t\t*set rule -2\n\t\t\t\t\t\t*if merchants > 4\n\t\t\t\t\t\t\t*set merchants -5\n\t\t\t\t\t\t*finish\n\t\t\t\t\t#This fire needs to be stopped, but I still need to meet with the Governor. I'll order my guards to take care of it while I travel the rest of the way alone.  \n\t\t\t\t\t\tAt first, your guards are hesitant to leave you, but as soon as they see the smoke increasing, they realize that you're probably right. They tell you that they'll only be a few hours behind you and rush to put the fire out. One of the guards hands you a longsword for the journey. \"Just in case,\" he says before following the group of guards toward the smoking village.\n\t\t\t\t\t\t*set armed 1\n\t\t\t\t\t\t*set peasants +5\n\t\t\t\t\t\t*set rule +1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto ambush1\n\t\t\t\t\t#This meeting is too important. I can't stop to help, and neither can my guards. \n\t\t\t\t\t\tAs you travel past the village, you notice the flames growing louder, as do the screams of several villagers. Many call for you to help, but their yells are drowned out by the sound of buildings collapsing. Eventually, you travel far enough that the smell of smoke is no longer noticeable.\n\t\t\t\t\t\t*set rule -1\n\t\t\t\t\t\t*set peasants -10\n\t\t\t\t\t\t*set dark +10\n\t\t\t\t\t\t*set light -10\n\t\t\t\t\t\t*goto meeting\n\t\t\t#Go alone. \n\t\t\t\tYour advisor looks at you, concerned. \"Why would you choose to go alone?\"\n\t\t\t\t*choice\n\t\t\t\t\t#\"To show that I do not fear him.\"\n\t\t\t\t\t\t*set rule +1\n\t\t\t\t\t\t*goto ambush\n\t\t\t\t\t#\"As a sign of respect.\"\n\t\t\t\t\t\t*goto ambush\n\t\t\t\t\t#\"To not draw attention to myself.\"\n\t\t\t\t\t\t*set stealth +1\n\t\t\t\t\t\t*goto ambush\n\t#\"The next time Gensa or one of his lackeys shows up, turn them away.\"\n\t\tGensa eventually hears of this and is furious. He sends twice the number of inspections, but this time with armed guards. \n\t\t\n\t\tWhat do you do?\n\t\t*choice\n\t\t\t#Allow them entry.\n\t\t\t\tYou begrudgingly allow them entry. It isn't worth an armed conflict. The inspectors make a show by ordering your men around. The level of inspections remains the same. It begins to impede castle commerce. \n\t\t\t\t*set rule -1\n\t\t\t\t*set peasants -2\n\t\t\t\t*set merchants -4\n\t\t\t\t*finish\n\t\t\t#Refuse them.\n\t\t\t\tWhen you refuse the inspectors at the gate, there's a moment when you think an armed conflict might take place. \n\t\t\t\t*page_break\n\t\t\t\t*if guards \u003c 10\n\t\t\t\t\tIt appears that the inspectors have brought more men than you have guards. Violence ensues, and your guards are restrained. The inspectors give a long speech to the public, making sure they know who the Governor is and that this is what happens to people that oppose him.\n\t\t\t\t\t*set rule -4\n\t\t\t\t\t*set guards -2\n\t\t\t\t\t*set peasants -8\n\t\t\t\t\t*finish\n\t\t\t\tYour guards stare down the other armed men, but eventually, the inspectors back down and leave. Gensa, furious as he is, will not engage in open combat in the streets; it would make his Governorship look bad. All inspections stop. You have seemed to save face in the eyes of many of your soldiers, but a few of the peasants decide to leave out of fear. \n\t\t\t\t*set guards +2\n\t\t\t\t*set peasants -5\n\t\t\t\t*finish\n\t*disable_reuse #Write to the King about Gensa's behavior.\n\t\tYou write to the King about Gensa's behavior. You find out that the letter was intercepted. You also hear that Gensa has written to the King to tell him that out of all the Lords in the realm, you are the only one to fail inspection this year. Whether this is true or not, it has greatly hurt your reputation. \n\t\t*set rule -8\n\t\t*finish\n\t#Eventually, he'll tire of this game. Do nothing for now. \n\t\tA few more inspections occur, but eventually, they become less and less. It appears Gensa is too busy to continuously bother you. You were right, however; the inspections have caused some peasants and merchants to leave the castle.\n\t\t*set peasants -2\n\t\t*set merchants -4\n\t\t*finish\n\t\t\t\n*label ambush\n*set inspection1 2\nYour advisor nods and starts to order the servants to prepare a horse for your journey. \n\nYour advisor approaches you again.\n\n\"I understand your reasoning, but will you at least take a weapon to defend yourself?\"\n*choice\n\t#Agree to take a weapon.\n\t\t*set armed 1\n\t\tYou decide it wouldn't hurt to take a weapon, just in case. You grab a longsword and sheathe it.\n\t\t*goto ambush1\n\t#Tell him there's no need.\n\t\tYou tell him that there's no need, then you get on your horse and begin traveling to the Governor's manor.\n\t\t*page_break\n\t\t*goto ambush1\n\t\n*label ambush1\nAbout two hours into your journey, you run into a couple who appears to have their wagon stuck in a ditch.\n\nDo you offer to help?\n*choice\n\t#Yes.\n\t\tYou ask the couple if they could use some help. They're most grateful to receive your assistance. \n\t\t\n\t\tYou successfully help them get their wagon out of the ditch, but you dirty your clothes in the process. \n\t\t*set light +10\n\t\t*set dark -5\n\t\tYou find out that the couple are merchants heading in the same direction you are; they plan to sell their wares to the Governor. They ask why you're traveling.\n\t\t*set helped_merchants 1\n\t\t*choice\n\t\t\t#Tell them the truth.\n\t\t\t\tThey look at you, speechless. They instantly get to their knees and bow. They start speaking so quickly that you can barely understand them. You gather the gist of it to be something along the lines of how much of an honor it is to be in your presence.\n\t\t\t\t*choice\n\t\t\t\t\t#Tell them to stand up.\n\t\t\t\t\t\tThey reluctantly stand up, still in shock after learning your true identity. \n\t\t\t\t\t\t*set light +5\n\t\t\t\t\t\t*goto royal-clothes\n\t\t\t\t\t#Allow them to pay their respects to me.\n\t\t\t\t\t\tThe praising goes on for several more minutes, until they finally compose themselves from the shock of learning who you are. \n\t\t\t\t\t\t*set dark +4\n\t\t\t\t\t\t*goto royal-clothes\n\t\t\t#Tell them I'm traveling to meet with the Governor, but don't give all the details. \n\t\t\t\t*set stealth +1\n\t\t\t\t\"Well, that makes sense. You must be one of the delegates the Governor has summoned.\"\n\t\t\t\t*choice\n\t\t\t\t\t#\"No, I'm not…delegates, you say?\"\n\t\t\t\t\t\t\"Oh, I just assumed, given your look of nobility…my mistake. Yes, he's been seeing several nobles lately, even a few barbarian leaders. I'm not sure what's going on…\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tShe leans in to whisper. \"But it must be something important, as he has guards all around his manor when they arrive. Also, a lot of the delegates leave with carts full of rare goods or sacks of Gold.\"\n\t\t\t\t\n\t\t\t\t\t\tHer husband frowns. \"Stop gossiping woman, we have to get going. Help me load these goods that flew off the wagon when it fell into the ditch.\"\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tShe's about to leave when she notices the dirt on your shirt. \"Oh no…that won't do. You can't meet the Governor with dirty clothes. Will you please take one of our outfits? We are cloth merchants, after all.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto clothchoice\t\n\t\t\t\t\t#Say nothing.\n\t\t\t\t\t\t*if armed > 0\n\t\t\t\t\t\t\t\"If I had to guess, you're probably an expert swordsman.\" She nods at the longsword around your belt. \"The Governor has been hiring a lot of men lately…seems a bit suspicious, if you ask me.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tShe leans in to whisper. \"I mean, why would the Governor need so many troops? He must have recruited at least a thousand. I know because we got a large order for new guard uniforms.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tHer husband frowns. \"Leave the delegate alone woman, no need to hear any more of your jibber-jabber…we have to get going! Now help me load these goods that flew off the wagon when it fell into the ditch.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if armed = 0\n\t\t\t\t\t\t\t\"If I had to guess, I'd say you're working for one of the many nobles the Governor has sent for. He's been talking to all the Lords as of late.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\tShe's about to leave when she notices the dirt on your shirt. \"Oh no…that won't do. You can't meet the Governor with dirty clothes. Will you please take one of our outfits? We are cloth merchants, after all.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label clothchoice\n\t\t\t\t\t\tBefore you can even respond, she begins rummaging through the cart and pulls out three different outfits. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Which one would you like?\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#The courtier's outfit.\n\t\t\t\t\t\t\t\tThe outfit is well made. It's not as fancy as the nobleman's outfit, but it'll do. \n\t\t\t\t\t\t\t\t*set courtiers_outfit 1\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tHer husband calls for her again, and she leaves, but not before thanking you for your help. You continue on your journey. \n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto forest-ambush\t\n\t\t\t\t\t\t\t#The merchant's outfit.\n\t\t\t\t\t\t\t\t*set merchant_outfit 1\n\t\t\t\t\t\t\t\tThe outfit is well made. It has plenty of pockets, both visible and hidden, for merchants to hold their wares. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tHer husband calls for her again, and she leaves, but not before thanking you for your help. You continue on your journey.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto forest-ambush\t\n\t\t\t\t\t\t\t#The peasant's outfit.\n\t\t\t\t\t\t\t\t*set peasant_outfit 1\n\t\t\t\t\t\t\t\tThe merchant's wife looks confused at your choice, then suddenly smiles. \"Ah, I understand you're trying not to draw any attention to yourself. Smart.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou put on the outfit. For peasant's clothing, it's actually quite well made. \n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto forest-ambush\t\n\t\t\t#Tell them I'm hoping to find work there.\n\t\t\t\t\"That makes sense. Ever since Lord Gensa was made Governor, he's been spending a lot of Gold to upgrade his manor. I'm sure there's work to be had there.\"\n\n\t\t\t\tThe merchant's wife looks at the dirt on your shirt and frowns. \"We seem to have dirtied your clothing. It'll be harder for you to find work. We can't have that! Please, let us give you a new outfit; we are cloth merchants. after all.\"\n\t\t\t\t\n\t\t\t\tBefore you can even reply, the woman has already pulled out a clean peasant's shirt for you to wear and hands it to you. \n\t\t\t\t*choice\n\t\t\t\t\t#Put it on.\n\t\t\t\t\t\tYou put on the outfit; for a peasant's shirt, it's actually very well made. The merchant's wife beams a smile at you. \"Now you look very presentable! Thank you again for your help.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou get back on your horse and leave to continue on your journey. \n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*set peasant_outfit 1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto forest-ambush\n\t\t\t\t\t#Take it, but don't put it on.\n\t\t\t\t\t\tThe woman looks puzzled. \"Not to your liking? Well, take it anyway, we appreciate the help you gave us.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou decide to leave in order to continue on your journey. \n\t\t\t\t\t\t*set no_outfit 1\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto forest-ambush\n\t\t\t#Say nothing.\n\t\t\t\t\"Well, aren't you the mysterious one…or maybe just mute. Anyway, thank you again for your help.\"\n\t\t\t\t\n\t\t\t\tShe starts to help her husband load some goods that fell off the wagon when they hit the ditch. You decide to leave and continue on your journey. \n\t\t\t\t*set no_outfit 1\n\t\t\t\t*page_break\n\t\t\t\t*goto forest-ambush\n\t#No.\n\t\t*set light -10\n\t\t*set dark +5\n\t\tYou ride past the couple. Their expression, which was at first one of excitement, has now turned into more one of disdain.\n\t\t*page_break\n\t\t*goto forest-ambush\n\n*label royal-clothes\nThe wife of the merchant notices the dirt on your clothes, and her face changes into a horrified expression.\n\n\"We've dirtied his clothes. Frank, look…look what we've done!\"\t\n\nThe male merchant walks over, examines your shirt, and sees the dirt. \n\n\"My liege, please accept some fresh clothes from our wagon. We are cloth merchants. I get the material, and my wife makes the clothes. We're actually quite well known in the area for our quality. It would be an honor to provide you with fresh clothes.\"\n*fake_choice\n\t#Accept.\n\t\tThey're so happy that you've decided to take them up on their offer. They begin to gather an assortment of clothes for you to inspect and try on. \n\t#Refuse.\n\t\tThey won't take no for an answer; knowing who you are, they can't possibly allow you to leave in such a dirtied condition. \n\nThe merchant hastily starts moving things around the wagon. The merchant's wife eventually presents you with three different garments. Which one do you take?\n*choice\n\t#The nobleman's outfit.\n\t\t\"Of course!\" she exclaims. \"I don't know why I even offered you the other outfits.\"\n\t\t\n\t\tYou put on the outfit and are surprised at how high a quality the material is. You look more noble than you did before. \n\t\t*set rule +1\n\t\t*set noble_outfit 1\n\t\t*page_break\n\t\t*goto forest-ambush\n\t#The courtier's outfit.\n\t\tThe outfit is well made. It isn't as fancy as the nobleman's outfit, but it'll do. \n\t\t*set courtiers_outfit 1\n\t\t*page_break\n\t\t*goto forest-ambush\n\t#The merchant's outfit.\n\t\t*set merchant_outfit 1\n\t\tThe outfit is well made. It has plenty of pockets, both visible and hidden, for merchants to hold their wares. \n\t\t*page_break\n\t\t*goto forest-ambush\n\t#The peasant's outfit.\n\t\t*set peasant_outfit 1\n\t\tThe merchant's wife looks confused at your choice, then suddenly smiles. \"Ah, I understand you're trying not to draw any attention to yourself. Very smart, my liege.\"\n\t\t\n\t\tYou put on the outfit. For peasant's clothing, it's actually quite well made. \n\t\t*page_break\n\t\t*goto forest-ambush\n\t\n*label forest-ambush\t\nThe road you're on eventually leads into a forest. The path narrows, forcing you to slow down. Suddenly, you see a large man with a club standing in your way, and you're forced to stop. \n\nThe man with the club approaches you so you can hear him. \"Well, what do we have here, boys! Are you lost, little sheep? What brings you into my forest?\"\n\n*if necro_staff > 0\n\tSuddenly, an older man emerges from the forest. He stares at you as if you were a ghost. He slowly walks up to the large man. The large man is quite upset and says, \"Old man, I thought I told you to remain hidden!\" The old man ignores him, the entire time keeping his eye on you as if you might disappear at any moment. Eventually, the old man whispers something into the larger man's ear, which causes the larger man's face to fill with panic.\n\n\tThe larger man tries to say something but can't. Eventually, he regains his composure and says in a trembling voice, \"Where did you get that staff?\"\n\t\n\tHe then points at a staff that you happened to have brought along for the journey. It's the same staff that you received from the magician. You take a moment to think and remember him telling you something about it having belonged to a powerful necromancer.\n\t\n\tWhat do you say?\n\t*choice\n\t\t#\"I found it.\"\n\t\t\tThe large man looks at you, stunned. \"You…found it? Are you serious? Don't you know how powerful that thing is? Here, just go away, we'll let you pass, just don't come near us.\"\n\t\t\t\n\t\t\tBoth men move aside and let you pass. It's a funny sight to behold, the large man behaving like a scared mouse as you walk by. You continue on your journey.\n\t\t\t*if helped_merchants > 0\n\t\t\t\t\n\t\t\t\tAs you leave, you hear the faint sound of a woman screaming behind you. It must be the wife of the merchant you met earlier. The bandits must be robbing them. \n\t\t\t\t\n\t\t\t\tDo you turn around?\n\t\t\t\t*choice\n\t\t\t\t\t#Yes, even if it means fighting the bandits.\n\t\t\t\t\t\t*set light +10\n\t\t\t\t\t\t*set dark -5\n\t\t\t\t\t\tYou turn back around and see that the bandits have tied up the husband, but the wife isn't cooperating; she's holding a downed tree branch and swinging it around wildly whenever one of the bandits gets close. They begin to laugh, until one of her swings lands a nasty blow. What do you do?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Yell for the bandits to stop!\n\t\t\t\t\t\t\t\tThey stop and turn to face you. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tSeeing you return, the large bandit hesitantly says, \"What do you want?\"\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#\"These people are with me, leave them alone.\"\n\t\t\t\t\t\t\t\t\t\t\"Well, if they're with you, I'm sure you won't mind paying their toll now, will you?\"\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (gold > 249) #Pay their toll. (250 GP)\n\t\t\t\t\t\t\t\t\t\t\t\t*set gold - 250\n\t\t\t\t\t\t\t\t\t\t\t\tYou pay their toll and help the couple gather their things. You escort them to safety. The merchants are very grateful for your help, and they decide to join you on the rest of the journey.\n\t\t\t\t\t\t\t\t\t\t\t\t*set merchants +2\n\t\t\t\t\t\t\t\t\t\t\t\t*goto meeting\n\t\t\t\t\t\t\t\t\t\t\t#\"Why don't you pick on someone your own size?\"\n\t\t\t\t\t\t\t\t\t\t\t\tThe large man laughs. The merchant's wife uses the distraction to knock out two of the bandits. The larger bandit is enraged. \"Staff or not, I'm going to beat the crap out of you.\" \n\t\t\t\t\t\t\t\t\t\t\t\t*if armed = 0\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou manage to grab a weapon from one of the downed bandits before the large giant can reach you. \n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t*goto large-man\n\t\t\t\t\t\t\t\t\t#\"As your Lord, I order you to leave these people alone.\"\n\t\t\t\t\t\t\t\t\t\t\"I've had enough of you,\" says the large man. \"I'm going to beat you to a pulp, then take that staff from you.\" The other bandits aren't as brave, and they run away.\n\t\t\t\t\t\t\t\t\t\t*if armed = 0\n\t\t\t\t\t\t\t\t\t\t\tYou manage to pick up one of the bandit's weapons before the giant reaches you. \n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto large-man\t\n\t\t\t\t\t\t\t#Run in and help her fight them off.\n\t\t\t\t\t\t\t\tYou run in and are able to catch two of the bandits off guard. With your help, she ends up causing both bandits to run away. \n\t\t\t\t\t\t\t\t*if armed \u003c 0\n\t\t\t\t\t\t\t\t\tYou notice that one of the bandits dropped a short sword. You decide to pick it up. \n\t\t\t\t\t\t\t\tThe larger bandit knocks the woman aside and moves closer to attack you.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto large-man\n\t\t\t\t\t#No, there's little I can do for them.\n\t\t\t\t\t\tYou continue down your path. \n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto meeting\n\t\t\t*goto meeting\n\t\t#Pretend to be the necromancer.\n\t\t\t*if dark > light\n\t\t\t\tYou say in your best necromancer-like voice, \"I am the Dark Lord Kopaul. Run away now, mortals, or I shall kill you all and add you to my undead army.\"\n\t\t\t\t\n\t\t\t\tThe bandits look at each other for a few moments…\n\t\t\t\t*page_break\n\t\t\t\tMost decide to run away. The larger bandit scowls when he sees this. One of the bandits yells as he runs, \"You never said anything about necromancers!\" The larger man turns around to face you, then after thinking about it for a few seconds, decides to run away as well.\n\t\t\t\t\n\t\t\t\tYou continue on your journey without any further interruptions. \n\t\t\t\t*achieve magic_man\n\t\t\t\t*page_break\n\t\t\t\t*goto meeting\n\t\t\t\t\n\t\t\tYou say in your best necromancer-like voice, \"I am the Dark Lord Kipaul. Run away now, mortals, or I shall kill you all and add you to my undead army.\"\n\t\t\t\t\n\t\t\tThe bandits look at each other for a few moments…\n\t\t\t*page_break\n\t\t\tThey're about to run when the older man stops them, saying, \"Wait a second, this guy isn't the necromancer I was thinking of. Lord Kopaul was much shorter. Not to mention he just mispronounced his own name by saying 'Kipaul' instead of 'Kopaul.' That staff is probably a fake…yeah, I think he's trying to pull a fast one on us.\" \n\t\t\t*choice\n\t\t\t\t#Tell them they're wrong, that I am the necromancer.\n\t\t\t\t\t\"No…it's pronounced Kipaul. I…I hate it when people mispronounce my name. That's actually what started me on this path…yes…I became a necromancer because people kept mispronouncing my name. It angers me so much. I'm going to melt the flesh off your bones and have you join my undead army as skeleton warriors!\"\n\t\t\t\t\t*page_break\n\t\t\t\t\t*if diplomacy > 2\n\t\t\t\t\t\tThe bandits look at the older bandit. The older man thinks for a second, then shrugs. \"I could be wrong about the name.\" The bandits' faces fill with panic again, and they all decide to run away, not willing to take the chance of receiving the wrath of Lord \"Kipaul.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou continue your journey without any further interruptions.\n\t\t\t\t\t\t*achieve magic_man\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto meeting\n\t\t\t\t\tThe bandits stare at you for a moment. Then the old man starts laughing…then the rest of the bandits start laughing, as well. They clearly don't believe you now.\n\t\t\t\t\t*set rule -2\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto descisions\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t#Say nothing.\n\t\t\t\t\tOne of the smaller bandits says, \"Ah, look at that, we caught him in a lie. He's no necromancer.\" The larger bandit looks furious.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto descisions\n*label forest-ambush2\n\t\nWhat do you say?\n*choice\n\t*disable_reuse #\"Your forest?\"\n\t\t\"Yes, we're too far out for Lord ${name} to do anything. There won't be a patrol coming by here for quite some time…so if you want to get by, pay the toll or leave.\"\n\t\t*page_break\n\t\t*goto forest-ambush2\n\t#\"You dare speak to your Lord this way?\"\n\t\t*if noble_outfit = 1\n\t\t\t\"Hmm. You are wearing that fancy outfit, but it doesn't matter. You're all alone out here, and there are three of us.\" You hear two men laughing in the distance; they must be hiding somewhere in the forest.\n\t\t\t*choice\n\t\t\t\t#\"I never said I was alone.\"\n\t\t\t\t\t*if helped_merchants > 0\n\t\t\t\t\t\tThe man blinks several times at your response. \"What do you mean? I don't see any guards with you.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou reply, \"You think I would be foolish enough to travel this road without guards? You must be dumber than I thought. I have an escort right behind me. I simply like to scout ahead myself.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe man laughs and says, \"You're bluffing. I'm sure there's no one behind—\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tSuddenly, he's interrupted by the sound of hoofs and the clanging of a cart in the distance. \n\t\t\t\t\t\t\n\t\t\t\t\t\tA voice yells out, hidden somewhere in the forest. \"Shit, he's telling the truth! Don't you hear that rattling noise? There must be an entire guard platoon with him. Let's get out of here.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou hear twigs snap as unseen men run away into the forest. The big man looks angry and starts yelling at them. The noise of the cart grows louder. The man cries out in frustration, then decides to run off as well.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tAfter a few moments, the merchants you met earlier meet up with you. You overhear the merchant's wife say to her husband, \"Frank, I told you we needed to get this cart fixed, it makes so much noise. Also, we really should do a better job at packing, our wares clang so much against the inside of the cart. It's just inviting bandits to attack us.\" She sees you and smiles, but she's too busy berating her husband to stop.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThey have no idea how close they came to being robbed by bandits. You decide to escort them the rest of the way to the Governor's manor in order to ensure their safety. \n\t\t\t\t\t\t*set rule +1\n\t\t\t\t\t\t*set light +5\n\t\t\t\t\t\t*achieve oneman\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto meeting\n\t\t\t\t\t\n\t\t\t\t\tThe man blinks several times at your response. \"What do you mean? I don't see any guards with you.\"\n\t\t\t\t\t\t\n\t\t\t\t\tYou reply, \"You think I would be foolish enough to travel this road without guards? You must be dumber than I thought. I have an escort right behind me. I simply like to scout ahead myself.\"\n\t\t\t\t\t\t\n\t\t\t\t\tThe man laughs and says, \"You're bluffing. I'm sure there's no one behind you. We'll just wait here and see.\"\t\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Do nothing.\n\t\t\t\t\t\t\tA few seconds pass, then a few minutes…nothing happens. \n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto descisions\n\t\t\t\t\t\t#Run.\n\t\t\t\t\t\t\tWhile the bandits are distracted, you make a run for it. You notice that the merchants you saw earlier are still working on their wagon. \n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Stop to warn them.\n\t\t\t\t\t\t\t\t\tYou stop to warn them of the bandits, but the merchant refuses to leave their cart behind. Suddenly, the large bandit appears. \n\t\t\t\t\t\t\t\t\t*set light +2\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#Run.\n\t\t\t\t\t\t\t\t\t\t\t*set dark +5\n\t\t\t\t\t\t\t\t\t\t\t*set light -5\n\t\t\t\t\t\t\t\t\t\t\tThe bandits stop pursuing you when they see the merchant's cart. You hear a woman screaming for help in the distance. \n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tYou're unable to make the Governor's meeting in time. You decide to return to your castle. \n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t*set rule -1\n\t\t\t\t\t\t\t\t\t\t\tSome days later, you receive a letter from Gensa, who's quite upset that you missed your meeting with him. The inspections continue. Your head guard also gives you a report that there was a robbery gone wrong in the forest, and two merchants were killed.\n\t\t\t\t\t\t\t\t\t\t\t*set peasants -5\n\t\t\t\t\t\t\t\t\t\t\t*set guards -2\n\t\t\t\t\t\t\t\t\t\t\t*set merchants -2\n\t\t\t\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t\t\t\t#Help defend the cart.\n\t\t\t\t\t\t\t\t\t\t\t*set health 125\n\t\t\t\t\t\t\t\t\t\t\tThe merchant's wife tosses you some hide armor and a helmet. You hastily don it. With this gear, you feel better protected. It might give you a better chance to defeat these bandits. \n\t\t\t\t\t\t\t\t\t\t\t*if armed = 0\n\t\t\t\t\t\t\t\t\t\t\t\tYou also manage to find a short sword in the merchant's cart.\n\t\t\t\t\t\t\t\t\t\t\t*set light +2\n\t\t\t\t\t\t\t\t\t\t\t*goto battle\n\t\t\t\t\t\t\t\t#Keep running.\n\t\t\t\t\t\t\t\t\tThe bandits stop pursuing you when they see the merchant's cart. You hear a woman screaming for help in the distance. \n\t\t\t\t\t\t\t\t\t*set light -10\n\t\t\t\t\t\t\t\t\t*set dark +10\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou're unable to make the Governor's meeting in time. You decide to return to your castle. \n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t*set rule -1\n\t\t\t\t\t\t\t\t\tSome days later, you receive a letter from Gensa, who's quite upset that you missed your meeting with him. The inspections continue. Your head guard also gives you a report that there was a robbery gone wrong in the forest, and two merchants were killed.\n\t\t\t\t\t\t\t\t\t*set peasants -5\n\t\t\t\t\t\t\t\t\t*set guards -2\n\t\t\t\t\t\t\t\t\t*set merchants -2\n\t\t\t\t\t\t\t\t\t*finish\n\t\t\t\t#\"Let me pass, or you'll regret it.\"\n\t\t\t\t\t\"Ha, let's just see about that…\"\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto descisions\n\t\t\t\t\n\t\t*if no_outfit = 1\n\t\t\t\"Hmm. You are wearing a nobleman's outfit, but it's awfully dirty. Maybe you found it lying on the side of the road. Are you trying to pull a fast one on me?\"\n\t\t\t*choice\n\t\t\t\t#Assure him that I'm not.\n\t\t\t\t\t*if diplomacy > 1\n\t\t\t\t\t\tYou manage to convince him that you truly are who you say you are.\n\t\t\t\t\t\t\n\t\t\t\t\t\tEventually, the large man regains his composure. \"It doesn't matter whether you're a Lord or not. You're all alone out here, and there are three of us.\" You hear two men laughing in the distance; they must be hiding somewhere in the forest.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"I never said I was alone.\"\n\t\t\t\t\t\t\t\tThe man blinks several times at your response. \"What do you mean? I don't see any guards with you.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou reply, \"You think I would be foolish enough to travel this road without guards? You must be dumber than I thought. I have an escort right behind me. I simply like to scout ahead myself.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThe man laughs and says, \"You're bluffing. I'm sure there's no one behind—\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tSuddenly, he's interrupted by the sound of hoofs and the clanging of a cart in the distance. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tA voice yells out, hidden somewhere in the forest, \"Shit, he's telling the truth. Don't you hear that rattling noise? There must be an entire guard platoon with him. Let's get out of here.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou hear twigs snap as unseen men run away into the forest. The big man looks angry and start lone. You're an imposter, and you're also trying my patience.\"\n\t\t\t\t*page_break\n\t\t\t\t*goto descisions\n\t\t\t#Say nothing.\n\t\t\t\tHe takes your silence as a sign that you must be lying. \n\t\t\t\t*page_break\n\t\t\t\t*goto descisions\n\n\t#\"I work in the Governor's court. I'm delivering an important message to him.\"\n\t\tThe large man's face turns into a horrified expression when you mention the Governor. \"I didn't know, please don't mention this to the Governor, I didn't know you were in his employ.\"\n\t\t*if courtiers_outfit = 0\n\t\t\tSuddenly, a voice calls out in the forest. \"Hey, if you work for the Governor, why aren't you wearing the proper attire? This guy is trying to pull a fast one on you, Horgen!\"\n\t\t\t\n\t\t\tThe large man's expression changes to anger. \"Nice try, little sheep.\"\n\t\t\t*page_break\n\t\t\t*goto descisions\n\t\tHe looks you over, sees you're indeed wearing court clothes, then moves aside. \"Let him pass, boys.\"\n\t\t\n\t\tYou pass without incident.\n\t\t*page_break\n\t\t*if helped_merchants > 0\n\t\t\tAs you leave, you hear the faint sound of a woman screaming behind you. It must be the wife of the merchant you met earlier. The bandits must be robbing them. \n\t\t\t\n\t\t\tDo you turn around?\n\t\t\t*choice\n\t\t\t\t#Yes, even if it means fighting the bandits.\n\t\t\t\t\t*set light +10\n\t\t\t\t\t*set dark -5\n\t\t\t\t\tYou turn back around and see that the bandits have tied up the husband, but the wife isn't cooperating; she's holding a downed tree branch and swinging it around wildly whenever one of the bandits gets close. They begin to laugh, until one of her swings lands a nasty blow. What do you do?\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Yell for the bandits to stop!\n\t\t\t\t\t\t\tThey stop and turn to face you. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"What do you want?\"\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#\"These people are with me, leave them alone.\"\n\t\t\t\t\t\t\t\t\tThe larger man laughs. \"Well, if they're with you, I'm sure you won't mind paying their toll now, will you?\"\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t*selectable_if (gold > 249) #Pay their toll. (250 GP)\n\t\t\t\t\t\t\t\t\t\t\t*set gold - 250\n\t\t\t\t\t\t\t\t\t\t\tYou pay their toll and help the couple gather their things. You escort them to safety. The merchants are very grateful for your help. They decide to join you on the rest of the journey.\n\t\t\t\t\t\t\t\t\t\t\t*set merchants +2\n\t\t\t\t\t\t\t\t\t\t\t*goto meeting\n\t\t\t\t\t\t\t\t\t\t#\"Why don't you pick on someone your own size?\"\n\t\t\t\t\t\t\t\t\t\t\tThe large man laughs. The merchant's wife uses the distraction to knock out two of the bandits. \n\t\t\t\t\t\t\t\t\t\t\t*if armed = 0\n\t\t\t\t\t\t\t\t\t\t\t\tYou manage to grab a weapon from one of the downed bandits before the giant can reach you. \n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t*goto large-man\n\t\t\t\t\t\t\t\t#\"As your Lord, I order you to leave these people alone.\"\n\t\t\t\t\t\t\t\t\t\"I've had enough of you and your orders,\" says the large man. You've distracted them long enough for the merchant's wife to hit two of the bandits with the branch so hard that it breaks in two. Both men are knocked out. The large man looks extremely angry and throws the woman about twenty feet. He then looks to you and charges.\n\t\t\t\t\t\t\t\t\t*if armed = 0\n\t\t\t\t\t\t\t\t\t\tYou manage to pick up one of the bandit's weapons before the giant reaches you. \n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t*goto large-man\t\n\t\t\t\t\t\t#Run in and help her fight them off.\n\t\t\t\t\t\t\tYou run in and are able to catch two of the bandits off guard, knocking them out. \n\t\t\t\t\t\t\t*if armed \u003c 0\n\t\t\t\t\t\t\t\tYou also manage to pick up one of their weapons. \n\t\t\t\t\t\t\tThe larger bandit knocks the woman aside and moves to attack you.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto large-man\n\t\t\t\t#No, there's little I can do for them.\n\t\t\t\t\tYou continue down your path. \n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto meeting\n\t\t*goto meeting\t\t\t\n\t#\"I'm simply a merchant passing through.\"\n\t\t\"Is that so…well, you wouldn't mind paying the toll then, huh? Write it off as a business expense, for all I care.\"\n\t\t*page_break\n\t\t*goto descisions\n\t#\"I'm a laborer looking for work.\"\n\t\t*if peasant_outfit = 1\n\t\t\tThe large man looks you over. \"Hmm, I guess you wouldn't have any money then, huh? Move along, we're looking for bigger fish than you.\"\n\t\t\t\n\t\t\tYou pass without incident. \n\t\t\t*if helped_merchants > 0\n\t\t\t\tAs you leave, you hear the faint sound of a woman screaming behind you. It must be the wife of the merchant you met earlier. The bandits must be robbing them. \n\t\t\t\t\n\t\t\t\tDo you turn around?\n\t\t\t\t*choice\n\t\t\t\t\t#Yes, even if it means fighting the bandits.\n\t\t\t\t\t\t*set light +10\n\t\t\t\t\t\t*set dark -5\n\t\t\t\t\t\tYou turn back around and see that the bandits have tied up the husband, but the wife isn't cooperating; she's holding a downed tree branch and swinging it around wildly whenever one of the bandits gets close. They begin to laugh, until one of her swings lands a nasty blow. What do you do?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Yell for the bandits to stop!\n\t\t\t\t\t\t\t\tThey stop and turn to face you. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"What do you want?\"\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#\"These people are with me, leave them alone.\"\n\t\t\t\t\t\t\t\t\t\tThe larger man laughs. \"Well, if they're with you, I'm sure you won't mind paying their toll now, will you?\"\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (gold > 249) #Pay their toll. (250 GP)\n\t\t\t\t\t\t\t\t\t\t\t\t*set gold - 250\n\t\t\t\t\t\t\t\t\t\t\t\tYou pay their toll and help the couple gather their things. You escort them to safety. The merchants are very grateful for your help. They decide to join you on the rest of the journey.\n\t\t\t\t\t\t\t\t\t\t\t\t*set merchants +2\n\t\t\t\t\t\t\t\t\t\t\t\t*goto meeting\n\t\t\t\t\t\t\t\t\t\t\t#\"Why don't you pick on someone your own size?\"\n\t\t\t\t\t\t\t\t\t\t\t\tThe large man laughs. The merchant's wife uses the distraction to knock out two of the bandits. \n\t\t\t\t\t\t\t\t\t\t\t\t*if armed = 0\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou manage to grab a weapon from one of the downed bandits before the giant can reach you. \n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t*goto large-man\n\t\t\t\t\t\t\t\t\t#\"As your Lord, I order you to leave these people alone.\"\n\t\t\t\t\t\t\t\t\t\t\"I've had enough of you and your orders,\" says the large man. You've distracted them long enough for the merchant's wife to hit two of the bandits with the branch so hard that it breaks in two. Both men are knocked out. The large man looks extremely angry and throws the woman about twenty feet. He then looks to you and charges.\n\t\t\t\t\t\t\t\t\t\t*if armed = 0\n\t\t\t\t\t\t\t\t\t\t\tYou manage to pick up one of the bandit's weapons before the giant reaches you. \n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto large-man\t\n\t\t\t\t\t\t\t#Run in and help her fight them off.\n\t\t\t\t\t\t\t\tYou run in and are able to catch two of the bandits off guard, knocking them out. \n\t\t\t\t\t\t\t\t*if armed \u003c 0\n\t\t\t\t\t\t\t\t\tYou also manage to pick up one of their weapons. \n\t\t\t\t\t\t\t\tThe larger bandit knocks the woman aside and moves to attack you.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto large-man\n\t\t\t\t\t#No, there's little I can do for them.\n\t\t\t\t\t\tYou continue down your path. \n\t\t\t\t\t\t*set light -10\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto meeting\n\t\t\"That's crap. You don't look like a peasant to me, not with that outfit.\"\n\t\t*page_break\n\t\t*goto descisions\n\t#Say nothing.\n\t\t\"Keeping quiet, huh? Or maybe you're just too afraid to say anything. Well, you can't pass through here without paying the toll.\"\n\t\tpage_break\n\t\t*goto descisions\n\t#Turn around and leave.\n\t\t\"That's a good little sheep, leave and come back when you have the money.\"\n\t\t*page_break\n\t\t*set rule -1\n\t\tSome days later, you receive a letter from Gensa, who's quite upset that you missed your meeting with him. The inspections continue, but this time with increased frequency.\n\t\t*set peasants -5\n\t\t*set guards -2\n\t\t*finish\n\t\t\t\n*label descisions\nThe large man moves closer to you. \"If you want to pass, the toll is 250 Gold Pieces.\" He holds his club in a menacing manner. \n\nWhat do you do?\n*choice\n\t*selectable_if (gold > 249) #Pay the toll. (250 GP)\n\t\tYou decide to pay the toll. The large man lets you pass. \n\t\t*set gold -250\n\t\t*page_break\n\t\t*if helped_merchants > 0\n\t\t\tAs you leave, you hear the faint sound of a woman screaming behind you. It must be the wife of the merchant you met earlier. The bandits must be robbing them. \n\t\t\t\n\t\t\tDo you turn around?\n\t\t\t*choice\n\t\t\t\t#Yes, even if it means fighting the bandits.\n\t\t\t\t\t*set light +10\n\t\t\t\t\t*set dark -5\n\t\t\t\t\tYou turn back around and see that the bandits have tied up the husband, but the wife isn't cooperating; she's holding a downed tree branch and swinging it around wildly whenever one of the bandits gets close. They begin to laugh, until one of her swings lands a nasty blow. What do you do?\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Yell for the bandits to stop!\n\t\t\t\t\t\t\tThey stop and turn to face you. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"What do you want?\"\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#\"These people are with me, leave them alone.\"\n\t\t\t\t\t\t\t\t\tThe larger man laughs. \"Well, if they're with you, I'm sure you won't mind paying their toll now, will you?\"\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t*selectable_if (gold > 249) #Pay their toll. (250 GP)\n\t\t\t\t\t\t\t\t\t\t\t*set gold - 250\n\t\t\t\t\t\t\t\t\t\t\tYou pay their toll and help the couple gather their things. You escort them to safety. The merchants are very grateful for your help. They decide to join you on the rest of the journey.\n\t\t\t\t\t\t\t\t\t\t\t*set merchants +2\n\t\t\t\t\t\t\t\t\t\t\t*goto meeting\n\t\t\t\t\t\t\t\t\t\t#\"Why don't you pick on someone your own size?\"\n\t\t\t\t\t\t\t\t\t\t\tThe large man laughs. The merchant's wife uses the distraction to knock out two of the bandits. \n\t\t\t\t\t\t\t\t\t\t\t*if armed = 0\n\t\t\t\t\t\t\t\t\t\t\t\tYou manage to grab a weapon from one of the downed bandits before the giant can reach you. \n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t*goto large-man\n\t\t\t\t\t\t\t\t#\"As your Lord, I order you to leave these people alone.\"\n\t\t\t\t\t\t\t\t\t\"I've had enough of you and your orders,\" says the large man. You've distracted them long enough for the merchant's wife to hit two of the bandits with the branch so hard that it breaks in two. Both men are knocked out. The large man looks extremely angry and throws the woman about twenty feet. He then looks to you and charges.\n\t\t\t\t\t\t\t\t\t*if armed = 0\n\t\t\t\t\t\t\t\t\t\tYou manage to pick up one of the bandit's weapons before the giant reaches you. \n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t*goto large-man\t\n\t\t\t\t\t\t#Run in and help her fight them off.\n\t\t\t\t\t\t\tYou run in and are able to catch two of the bandits off , knocking them out. \n\t\t\t\t\t\t\t*if armed \u003c 0\n\t\t\t\t\t\t\t\tYou also manage to pick up one of their weapons. \n\t\t\t\t\t\t\tThe larger bandit knocks the woman aside and moves to attack you.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto large-man\n\t\t\t\t#No, there's little I can do for them.\n\t\t\t\t\tYou continue down your path. \n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto meeting\n\t\t*page_break\n\t\t*goto meeting\n\t*disable_reuse *selectable_if (diplomacy > 1) #\"That toll price is outrageous.\"\n\t\t\"Just kidding little sheep, it's only 50 Gold Pieces.\"\n\t\t*page_break\n\t\t*goto descision2\n\t#\"I'm not paying that.\"\n\t\tThe man with the club looks at you angrily. \"Oh, you'll pay…trust me.\"\n\t\t*page_break\n\t\t*goto battle\n\n\t\t\t\n\n*label descision2\nWhat do you do?\n*choice\n\n\t*selectable_if (gold > 49) #Pay the toll. (50 GP)\n\t\t\tYou decide to pay the toll. The large man lets you pass. \n\t\t\t*set gold -50\n\t\t\t*page_break\n\t\t\t*if helped_merchants > 0\n\t\t\t\tAs you leave, you hear the faint sound of a woman screaming behind you. It must be the wife of the merchant you met earlier. The bandits must be robbing them. \n\t\t\t\t\n\t\t\t\tDo you turn around?\n\t\t\t\t*choice\n\t\t\t\t\t#Yes, even if it means fighting the bandits.\n\t\t\t\t\t\t*set light +10\n\t\t\t\t\t\t*set dark -5\n\t\t\t\t\t\tYou turn back around and see that the bandits have tied up the husband, but the wife isn't cooperating; she's holding a downed tree branch and swinging it around wildly whenever one of the bandits gets close. They begin to laugh, until one of her swings lands a nasty blow. What do you do?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Yell for the bandits to stop!\n\t\t\t\t\t\t\t\tThey stop and turn to face you. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"What do you want?\"\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#\"These people are with me, leave them alone.\"\n\t\t\t\t\t\t\t\t\t\tThe larger man laughs. \"Well, if they're with you, I'm sure you won't mind paying their toll now, will you?\"\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (gold > 249) #Pay their toll. (250 GP)\n\t\t\t\t\t\t\t\t\t\t\t\t*set gold - 250\n\t\t\t\t\t\t\t\t\t\t\t\tYou pay their toll and help the couple gather their things. You escort them to safety. The merchants are very grateful for your help. They decide to join you on the rest of the journey.\n\t\t\t\t\t\t\t\t\t\t\t\t*set merchants +2\n\t\t\t\t\t\t\t\t\t\t\t\t*goto meeting\n\t\t\t\t\t\t\t\t\t\t\t#\"Why don't you pick on someone your own size?\"\n\t\t\t\t\t\t\t\t\t\t\t\tThe large man laughs. The mercha
