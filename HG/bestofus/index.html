n your mind, you know that you can't go on for much longer.\n\t\t*return\n\t*else\n\t\t*set energy 0\n\t\t*goto_scene startup detour\n", "governor": "*set energy 100\n\n*temp canuse false\n\n\nYou quickly fluttered your eyes open, recognizing the voice and soon thereafter a face looming before you. Governor Serres had been sitting in office for only seven years, but nobody could say those seven years hadn't been eventful. He'd introduced progressive agendas on a state level, all of which were put on hold due to the severity of the earthquakes. While the press had focused upon the President making his visits to the ravaged areas, Governor Serres was working and dragging out dozens of trapped people with the rescue workers. He was a good man, but recently it was looking increasingly like he would be ousted, as Reissman Industries had started backing a challenger with a great deal in donations.\n\nThe Governor chuckled as you bounced quickly straight in your seat and almost to your feet.\n\n\"Steady there. Just wanted to make sure you were still alive. Go grab some coffee, I've no use for you in such a condition. Better buy some doughnuts for the break room too, while you're at it.\"\n\nGreat. A coffee run.\n*page_break\nYou slowly stood up from your desk after the Governor had left. The messy open-office plan stretched out all around you as the large central room went about its busy daily life. This was the heart of the Governor's office, where all issues landed first before being rushed into corner offices to be handled by senior staffers.\n\nYou walked along the wall of the office, making your way to the least crowded part by the entrance. The hustle and bustle of working hours could be easily heard from the closed offices, with people on conference calls, typing on keyboards, or shouting at the IT department. As you crossed the doorway to the small break room, roughly half the size of a cleaning cupboard, you saw it was empty, a heavily used coffee machine struggling to brew yet another pot of black tar.\n\nYou sighed and headed out to the entrance.\n*page_break\nThe Governor's office remained in Sacramento, in the landmark building echoing the same kind of architectural motifs as the Capitol building and the White House all the way across the continent. The building had survived largely unscathed from the earthquakes, much like the rest of the city. You, on the other hand, were in Pacifica, in a small office building near the centre of the city that had been shifted into a headquarters for the Governor's re-election drive.\n\nIn recent weeks, Governor Serres had become more and more closely tied to the situation in Pacifica, and the headquarters for the election drive was now also acting as a temporary office for the Governor while he tried to closely supervise the processes taking place in the city.\n\nAs you walked out the door, a slightly stretched black SUV rolled up directly in front of the doors, along with two other accompanying black SUVs. Stopping for a moment to watch, you saw men and women in black suits step out, clearly armed. You rushed out of the way as the SUV's door was opened and out stepped a middle-aged man in an expensive suit and the look of someone who was highly esteemed. He was large, standing much taller than any of the bodyguards huddled around the SUV, and with the combined width of two of them as well. As he walked to the office entrance, he had to bend from the knees in order to actually enter without hitting his head.\n\nRight behind this goliath stepped a shorter man with nearly as expensive a suit, with a small American flag pin on the lapel. You recognized the man as Gerald Rennow, the Lieutenant-Governor of California.\n\nBefore the bodyguards could usher you along, you continued down the street.\n*page_break\nThe coffee shop a few blocks down was busy. While standing in line, you took full advantage of the free wi-fi they provided. With a short jingle and a buzz, your phone signalled the arrival of a new message. With a quick swipe of your thumb, you opened the message and saw a picture taken from the doorway of the Governor's office. The goliath you'd seen before stood near the window while the two opposing leading men of California were in a heated argument. The caption, aptly written by the co-worker who sent the image, said \"Mommy and daddy are fighting again.\"\n\nThe line slowly shifted forward, and eventually you reached the counter. A young woman chewing bubblegum stood on the opposite side, smiling as you approached. \n\n\"Good afternoon, how may I help you?\"\n*fake_choice\n\t#Venti, non-fat, soy mocha with light whip.\n\t#Venti, full-organic, non-fat mocha-banana frappe with protein, a double-shot, and light whip.\n\t#Venti, sugar-free, non-fat, vanilla soy, double-shot, decaf, no foam, extra-hot Peppermint White Chocolate Mocha with light whip and extra syrup.\n\nThe woman quickly took a cardboard cup from a stand and placed it in a machine, pressing a series of buttons before it started to belch and gurgle, providing a dark liquid. You also got a box of doughnuts for the office, since the Governor had tasked you with doing that. Your plastic card went into a slot on a small keypad next to the cash register, your fingers putting in your pin code.\n\nThe young woman smiled as she handed over a large cardboard box and your drink, which you accepted before pulling out your card and heading back to the office.\n\nThe sound of screeching tires stopped your progress.\n\n*if (teleport)\n\t*set canuse true\n\t*goto contpoint\n*elseif (agility)\n\t*set canuse true\n\t*goto contpoint\n*elseif (strength)\n\t*set canuse true\n\t*goto contpoint\n*else\n\t*goto contpoint\n\n*label contpoint\n*page_break\nAs you looked around the corner, you saw another black stretched SUV careening around a corner from the direction of the Governor's office—no, perhaps it was the same one, it was hard to tell. Behind it rushed a black car, red-and-blue lights flashing behind the grille as it chased the SUV. On top of the car was a female figure grabbing onto the edge of the roof. As you looked on, her fist smashed against the windshield and shattered it over the driver and passengers.\n\nThe car careened onto the sidewalk and slammed into a solid wall, the entire front of it up until the front doors embedding itself inside the building. The agile figure on the roof jumped off mid-way to the wall, bouncing off the ground and rolling before pointing her hand up towards the edge of a building and shooting a kind of hook towards it. She then swung up, a loud whirring echoing off the buildings as she was pulled towards the anchor point.\n*choice\n\t#Chase the mystery woman.\n\t\t*goto chasebegins\n\t#Check on the car.\n\t\tA billow of smoke was coming from the wall, the source probably being the coolant system. You rushed up and looked through the tinted windows to see the men inside groaning and shifting around. The ones in the back opened the doors and stumbled out on their own, holstering pistols as they exited and backing away from the car. You could see the ones in the front trying to unbuckle themselves and lean their seats back to crawl out.\n\t\t\n\t\tThe situation wasn't dire, and the men seemed to be in surprisingly good condition.\n\t\t*choice\n\t\t\t#Help the men out of the car.\n\t\t\t\tThe front doors were blocked from opening by the crumbling wall the vehicle was wedged in. The part of the windows still outside was too narrow to drag anyone out or climb through to provide any kind of aid. The driver and the passenger were in the progress of scrambling for the switch to drop the seat back into a reclined position so they might get out.\n\t\t\t\t\n\t\t\t\t*if (canuse)\n\t\t\t\t\tYou could use your powers, but a crowd was quickly forming, and after seeing the woman swinging away, you thought these armed men wouldn't take lightly to you suddenly exhibiting these strange powers.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Take the risk and use your powers.\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t*if (teleport) #Teleport inside and free the men.\n\t\t\t\t\t\t\t\t\t*if (endurance)\n\t\t\t\t\t\t\t\t\t\t*set energy -5\n\t\t\t\t\t\t\t\t\t*if not (endurance)\n\t\t\t\t\t\t\t\t\t\t*set energy -10\n\t\t\t\t\t\t\t\t\tYou looked at the front seats and braced yourself, then set your things on the ground and vanished, becoming a kind of mist that jumped inside the car and then reformed into yourself again. The two men jumped and began to reach into their jackets, responding quite swiftly to your sudden appearance. You stopped them by quickly reaching over to the sides of the seats and dropping them back with a solid thud. You unclasped their seatbelts in another swift motion, dropping the two men onto the reclined seats.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tBefore the men could react further, you dissipated into the mist once more and left the vehicle, reforming directly next to the box of doughnuts and your cup of coffee. You heard a gunshot down the street, the sound of a shattering window, and the wailing of sirens.\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#Rush to the scene.\n\t\t\t\t\t\t\t\t\t\t\t*goto crashsite\n\t\t\t\t\t\t\t\t\t\t#Go back to the office.\n\t\t\t\t\t\t\t\t\t\t\t*goto_scene collection\n\t\t\t\t\t\t\t\t*if (agility) #Squeeze inside and help the men free.\n\t\t\t\t\t\t\t\t\tYou set your things on the ground and slid inside the car without much issue, winding yourself around the driver's seat and reaching over dexterously to unlatch the seatbelts of the two struggling men. Without the seatbelts holding them in place, they could easily reach back to the lever that allowed the seat to push back into a reclined position. As the seats came back, you rolled out of the way and slid out of the car.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou stepped up to your box of doughnuts and cup of coffee as you heard a gunshot down the street, the sound of a shattering window, and the wailing of sirens.\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#Rush to the scene.\n\t\t\t\t\t\t\t\t\t\t\t*goto crashsite\n\t\t\t\t\t\t\t\t\t\t#Go back to the office.\n\t\t\t\t\t\t\t\t\t\t\t*goto_scene collection\n\t\t\t\t\t\t\t\t*if (strength) #Pull the car out of the building.\n\t\t\t\t\t\t\t\t\t*if (endurance)\n\t\t\t\t\t\t\t\t\t\t*set energy -5\n\t\t\t\t\t\t\t\t\t*if not (endurance)\n\t\t\t\t\t\t\t\t\t\t*set energy -10\n\t\t\t\t\t\t\t\t\tYou set your things down on the ground, walking up to the car and the dazed men trying to cordon off the area. One of them was busy trying to respond to a radio, while the other was confronting a couple of spectators. As swiftly as you could, you settled near the back of the car and leaned down. Your hands gripped the back of the car and pushed into the metal, the reinforced steel buckling under your strength as your knuckles turned white. The groaning of the steel brought curious gazes from the people around you. The feeling of eyes burrowing into the back of your head burned in your mind as you began stepping back and pulling the vehicle out of the wall.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tWith a puff of the crumbling wall, the car was freed and you released your grip, your handprints now clearly visible on the car. The two agents outside were in shock, and you looked at them as they gripped their weapons loosely, hesitating whether or not to engage you in any fashion. With calm steps, you walked to the front of the car and pulled the bulky door off its hinges, thus freeing the driver. The two men in the front of the car were now clear, so you rushed to your things, picked them up, and moved along before the phones came out to capture every detail of you.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tAs you moved off, you heard a gunshot down the street, the sound of a shattering window, and the wailing of sirens.\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#Rush to the scene.\n\t\t\t\t\t\t\t\t\t\t\t*goto crashsite\n\t\t\t\t\t\t\t\t\t\t#Go back to the office.\n\t\t\t\t\t\t\t\t\t\t\t*goto_scene collection\n\t\t\t\t\t\t#Help the men in some other way.\n\t\t\t\t\t\t\t*goto otherhelp\n\t\t\t\t*else\n\t\t\t\t\t*goto otherhelp\n\t\t\t#Chase after the mystery woman.\n\t\t\t\t*goto chasebegins\n\t\t\t#Leave the scene.\n\t\t\t\t*goto_scene collection\n\t#Head back to the office.\n\t\t*goto_scene collection\n\n\n*label otherhelp\n\"Please, everybody stand back,\" one of the agents that had crawled out of the car advised the slowly gathering crowd. As it became increasingly apparent that the people still inside were unable to get out, a few people in the crowd rushed ahead to help. You decided to rush in with the group, who at first tried to squeeze inside as best they could to help the men get free, but they very quickly found that they couldn't fit. One of the men in this group took a chunk of the wall and bashed it against one of the front windows, only to find that they were reinforced against such assault.\n\nInstead, you and the group took up positions toward the back of the car, trying to pull it out enough to open the front doors to the point where someone might reach inside. As the struggle continued, you heard a gunshot down the street, the sound of a shattering window, and the wailing of sirens.\n\nSlowly, the car groaned and shifted as you all worked together to extract this great hunk of reinforced metal. The front doors emerged from the wall, and the people towards the front began shouting to stop as soon as there was enough clearance. They rushed to the doors, opened them, and helped the men get out.\n\nThose that were no longer necessary on the scene slowly departed, including yourself. You picked up your box and coffee cup, then left for the office.\n*page_break\n*goto_scene collection\n\n\n\n\n*label chasebegins\nYou heard a few questioning calls follow you as you suddenly ran off. Your feet hit the pavement in step with the thrum of blood rushing through your ears. You could hear sirens somewhere in the distance as you continued on. When you came around a corner, you saw a young man in the distance running after the same SUV you were tailing. He seemed hell-bent on catching up to it and suddenly ducked into an alleyway. Seeing the car turning and moving in that general direction, it was a safe bet that it might be a good shortcut. In the heat of the moment, you picked up speed into a full sprint and followed the young man into the alley.\n\nA chain-link fence rose up in the middle of the alley, and as the young man approached it, you saw him suddenly bound up and hop over it. He rolled over the top bar and then landed softly, continuing in full stride.\n\n*choice\n\t#Use your powers to get past.\n\t\t*choice\n\t\t\t*if (flight) #Fly over.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tYour feet left the ground as you quickly flew up, the rush of air in your ears blasting only for a brief moment before you were descending once more. You landed softly on the other side of the fence, fairly certain that nobody saw you use your powers.\n\t\t\t\t*goto carsmash\n\t\t\t*if (jumping) #Jump over.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tYour feet left the ground as you quickly flew up, the rush of air in your ears blasting only for a brief moment before you reached the top of your arc and began the trip down. You landed softly on the other side of the fence, fairly certain that nobody saw you use your powers.\n\t\t\t\t*goto carsmash\n\t\t\t*if (teleport) #Teleport through.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tYou saw the familiar blurred vision that quickly morphed into a deep darkness. Thousands of little lights lit up and sparkled directly in front of your eyes, and the feeling of your entire body dissipated for a moment. As the sparkling lights united back into daylight, you walked directly ahead with the fence now behind you. With a quick glance around, you were comfortable in the knowledge that nobody saw you use your powers.\n\t\t\t\t*goto carsmash\n\t\t\t*if (wallcrawl) #Hop on the wall and go past.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tThe fence didn't go too high up. You jumped up and slapped your hands and feet against the concrete wall of the building next to the fence. With a fine grip, you crawled up the wall and slung yourself past the top of the fence, landing softly on the other side. A quick glance later, you were sure nobody had seen you use your powers.\n\t\t\t\t*goto carsmash\n\t\t\t*if (agility) #Jump off the wall and climb over.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tThe fence wasn't high at all for someone as agile as yourself. You rushed in and jumped against the concrete wall to your left, using your legs as springs to launch yourself towards the top of the fence. With an arcing body, you rolled over the top bar, then twisted to finish a front-flip and continue into a smooth roll as soon as your feet hit the ground. Bouncing back from the roll, you continued the chase, quite confident nobody had noticed anything.\n\t\t\t\t*goto carsmash\n\t\t\t*if (energypower) #Freeze the fence and smash it.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tAs soon as the man was past the fence, you raised your hand and concentrated upon the fence. As you squinted, you saw a frosty mist billow around the fence, beads crystallizing together. The entire metal fence creaked, and as you reached it, you gave it a worthy kick, and a large hole ripped through it. As frozen metal rained onto the asphalt, you continued rushing after the man, hoping that nobody saw your party trick.\n\t\t\t\t*set ice +1\n\t\t\t\t*goto carsmash\n\t\t\t*if (energypower) #Make the metal bend to your will.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tAs soon as the man was past the fence, you raised your hand and concentrated upon the fence. As you squinted, you saw the chain-link begin shifting around as if pulled by strong gusts of wind or a strong magnetic field. It rattled around for a moment before becoming taut, your eyes seeing the linking metal wires unwind and pop apart. As you ran through the human-sized hole bent into the middle of the fence, you glanced around to make sure that nobody saw your use of powers.\n\t\t\t\t*goto carsmash\n\t\t\t*if (energypower) #Melt a hole in the fence.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tAs soon as the man was past the fence, you raised your hand and concentrated upon it. As you squinted, you saw the fence begin to warping. As your concentration pierced the fence, you felt a burning heat approaching. The metal links began glowing crimson, then yellow. In heavy droplets, the metal melted and rained down on the asphalt. Just in time for you to pass through the newly created hole, you allowed the heat to dissipate, then ran through without a drop of molten metal hitting your back. You could only hope nobody saw your party trick as you rushed after the man.\n\t\t\t\t*set fire +1\n\t\t\t\t*goto carsmash\n\t\t\t*if (strength) #Smash through.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tWho cares about a fence? You continued running, bracing yourself just before impact. The fence was ripped off the bolts attaching it to the concrete walls of the flanking buildings, and you continued running after the man. The chain-link rattled beneath your feet as you went, and you could only hope that the noise hadn't attracted any unwanted attention.\n\t\t\t\t*goto carsmash\n\t#Climb over.\n\t\tYou may have had powers at your disposal, but it would be unwise to use them in broad daylight. Even if you didn't want to use your powers, you weren't completely blocked by the fence. With swift feet, you grasped the holes in the chain-link and smashed the tip of your shoes against the twisted links. You saw the man running away from you and gaining distance, but your efforts weren't in vain. You rolled yourself over the fence and dropped, hitting the asphalt hard but not hard enough to stop you from rushing after the kid.\n\t\t*goto carsmash\n\n\n*label crashsite\nThe location was quite hard to pinpoint, but you ran for it as fast as you could. You skipped through alleys and streets to find the source of the noise. You ran past a chaotic scene where someone had shot through a window, then followed a trail of skidmarks down the street and around a full block to another major street.\n\n*label carsmash\nYou arrived to the sight of an older man crawling from the back of the SUV. You saw the man limping on the ground halfway between the alley and the spot where the SUV had finally stopped. To your left, you saw the mystery woman who'd been riding on the roof of the car. Her eyes were locked on the kid's body splayed on the street, her general posture somewhat shaken but still rather hard to read. She'd seen carnage before, at least to some extent. Her gaze suddenly switched to you, and her look turned cold.\n*page_break\nShe wore an outfit that reminded you of biker gear. Thick, tear-resistant weave with stitched reinforcements at the elbows, shoulders, and knees. The outfit was black and orange with bright-red highlights. Her face was covered by a mask that went past her eyebrows, her nose, and much of her cheeks. The mask was painted with feline features, and although someone less knowledgeable could argue for a cutesy cat look, to you the large angled ears with tufts of long hair coming from the top hinted at a wild, predatory lynx. She met your look as if it were a challenge, then glanced towards the car and took out some kind of a weapon, pointed it at a nearby building, then fired a hook towards it. She was making her escape from the scene.\n\nFrom behind you, you suddenly heard a cry pierce the still air. As you glanced back, you saw the elderly man who you'd seen crawling out of the wreckage now sitting beside the body of the man you'd been chasing. He held the young man close to his dark suit, his entire body trembling as he screamed into the heavens. Suddenly, you realized you recognized the man. He was none other than the Lieutenant-Governor of California, Gerald Rennow.\n\n*choice\n\t#Rush to help Mr. Rennow.\n\t\t*set fame +10\n\t\tYou rushed over to the politician, kneeling down and very quickly checking his health. He was bruised, battered, cut, and broken, but alive. The young man in his arms was still, his eyes closed and his clothes seeping with blood. The father caressed his son, leaving smears of blood running across the young face. He didn't react to your presence and showed no interest in the fleeing figure.\n\t\t\n\t\tSomewhere in the distance, the dull tones of wailing sirens made their way towards you, but as you looked at Rennow, the sound seemed to dissipate, leaving behind only the hollow sorrow of a father losing his son.\n\t\t*page_break Two Weeks Later.\n\t\t*goto_scene collection\n\t#Rush to check on the car.\n\t\t*set fame +5\n\t\tYou ran up to the wreckage of the car, leaning down to the broken windows and peering inside. You saw a woman in a suit sitting in the passenger seat, the seatbelt holding her tightly against it. You couldn't see a driver inside the car. The windshield had shattered, and blood was running through the glass. It was horrific to think where the driver may have ended up if he'd been slung out during the crash.\n\t\t\n\t\tA streak of steam rose up from beneath the bonnet of the car, but it wasn't on fire. The woman strapped to the seat seemed fine for the time being, but you'd learned not to move anyone if you didn't absolutely have to in situations like these. Instead, you began trying to wake her up. Somewhere in the distance, wailing sirens gained in intensity as the emergency responders travelled your way.\n\t\t*page_break Two Weeks Later.\n\t\t*goto_scene collection\n\t#Rush after the woman.\n\t\t*goto_scene caracalfight\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*set full_name \"Jane West\"\n*set name \"Jane\"\n*set surname \"West\"\n*set heroname \"Paragon\"\n*set gender \"Female\"\n*set prefix \"Ms.\"\n*set natlang \"English\"\n*set englang true\n*set nation \"Canadian\"\n*set work \"aid\"\n*set body 30\n*set energy 100\n*set fame 10\n*set benign 70\n*set training \"No formal training.\"\n*set suit \"casual\"\n*set caped \"full\"\n*set colours \"Blue, Black, and Red.\"\n*set flight true\n*set jumping false\n*set teleport false\n*set wallcrawl false\n*set energypower false\n*set healing false\n*set agility false\n*set endurance false\n*set strength true\n*set adaptation false\n*set durability true\n*set senses false\n*set infravision true\n*set heatresistance false\n*set ultravision false\n*set reveal false\n*set kills false\n*set everybody_met false\n*set aurora_met false\n*set reaver_met false\n*set caracal_met \"false\"\n\n\n\"Yeah, yeah! These look to be in pretty good condition. These tents seem to be intact, and we've got all the poles. There's mattresses and sleeping bags too,\" the man at the back of the store called out. At the front, the rest of the men were quiet for a moment.\n\n\"I don't like this. Is this really what it's come down to? We're stealing?\"\n\n\"It's not stealing, Jack! It's survival. Do you want your kids to keep sleeping without a roof over their heads? They'll get pneumonia, or worse!\"\n\n\"Yeah…but this still feels wrong. We could just find a building that's at least somewhat safe, right?\"\n\n\"We've been trying to do that for two days, Jack. Every place is either full or cordoned off as structurally unstable. We've looked everywhere!\"\n\nThe man from the back of the store was shuffling around. You could hear the clinking of backpacks and then the shuffling of something being stuffed inside them. From the front, you heard another crunch of glass followed by three gasps. A dark voice murmured, \"Leave. Now.\"\n\n\"Oh god…Nightreaver…please, this is for our families…\" one of the men said, his words followed by a nasty-sounding hit and a groan.\n\n\"Stay down,\" a rough, gravelly voice announced to the whole store. The voice was accented and harsh in a way that reminded you of certain German and Austrian actors. It was a voice that stood out as very distinct.\n*fake_choice\n\t#Reveal yourself and intervene.\n\t#Reveal yourself and watch.\n\t#Try and sneak away.\n\n*script changeBackgroundColor(\"black\")\n*set reveal true\n*set energy 100\n*set fame +5\nThe voice continued. You quickly recognized it, connecting it and the face to a young woman named Alexandra Jessop. She had originally arrived just after the quakes as a volunteer aid worker with the Red Cross, leaving behind a job as an ambulance driver in Raleigh. Now she was head of street operations in the San Francisco area. Despite the fancy title, most of her duties revolved around organizing foot patrols to point out places with a lot of badly supplied homeless people or roaming youth groups, so they might make connections and call in for a van with food, blankets and clothes.\n\nYou had joined up so early on that you were one of the senior workers on street patrol and often knew the right spots and most common faces. You had also learned harsh lessons on what worked and what didn't when diffusing potentially dangerous situations.\n\n\"Look, ${name}, I need you on patrol today. We've got a new hire and you know the ropes better than anyone around here.\"\n*label questionnewbie\n*fake_choice\n\t#\"Who am I walking around today?\"\n\t#\"What route should I take?\"\n\t#\"Any news about dangers along the way?\"\n\t#\"Can't you give the newbie to someone else?\"\n\t#\"Okay, give me a few minutes and I'll be ready.\"\n\n*script changeBackgroundColor(\"sepia\")\n*set full_name \"Li Yubei\"\n*set name \"Yubei\"\n*set surname \"Li\"\n*set heroname \"Dragon\"\n*set gender \"Male\"\n*set prefix \"Mr.\"\n*set trans false\n*set sexual \"Undefined\"\n*set natlang \"Chinese\"\n*set englang false\n*set nation \"Chinese\"\n*set work \"consulate\"\n*set body 20\n*set energy 80\n*set fame 25\n*set benign 75\n*set gadget false\n*set training \"Northern Style Kung Fu.\"\n*set suit \"fancy\"\n*set caped \"half\"\n*set colours \"Red and Orange\"\n*set flight false\n*set jumping false\n*set teleport true\n*set wallcrawl false\n*set energypower false\n*set healing true\n*set agility true\n*set endurance false\n*set strength false\n*set adaptation false\n*set durability true\n*set senses false\n*set infravision false\n*set heatresistance false\n*set ultravision false\n*set reveal true\n*set kills true\n*set everybody_met false\n*set aurora_met false\n*set reaver_met false\n*set caracal_met \"false\"\n\nSirens were wailing close by; Caracal glanced off the roof and then towards the downtown area.\n\n\"You've got powers, so I'd rather not fight you.\" The woman moved towards the opposite side of the rooftop, her eyes still on you. \"I don't know if you're into all this vigilante stuff, you're not wearing a mask or any kind of gear for it, but you seem familiar with what you can do…\" She paused for a brief moment and then seemed to sniff the air.\n\n\"Aurora is on her way. Time for me to disappear,\" she said, flashing you a smile before smashing a pellet against the rooftop. The pellet exploded into a thick mist, and you heard Caracal run. A loud bang, followed by the whirring of a line extending from her gadget. Then she was gone.\n\nFrom the corner of your eye, you saw a flash of green and blue, then felt a great gust of wind that blew straight past you, slammed into Caracal and then turned back towards you. Caracal slammed against the roof, and above her, you saw another female figure floating in place. Her face was covered by a mask, a blue cape flying behind her and emphasizing her strong pose. You had seen her before on captured footage and from a distance on your own patrols; this was Aurora, in the flesh.\n\nCaracal was the first to be on her feet, looking up at the flying woman. The two shared a cold stare.\n\n\"I told you to get out. I saw your trail of chaos and clawmarks on that car roof. You're still active.\"\n\n\"And I told you that I'm not leaving before I've gotten what I need from these bastards,\" Caracal responded, her hands clenching into fists and then flashing out sets of bright blades from the backs of her hands.\n\n\"Stop acting tough. You'll set the public against us if you keep to your stupid crusade, and if that happens, you will have fought for absolutely nothing. No gains. Now, I'm letting you go one more time. Next time, I'll fly you across the border myself,\" Aurora stated. Then she turned to you, looking at your clothes and smirking. \"You, I don't know, so I'll give you a bit of advice. Keep away from Caracal and her crusade. She'll ruin everything that has been building since the quakes.\"\n\nWith a flash of green and blue, Aurora departed. You tracked her path with your eyes for a moment before looking back down to the roof. Caracal was nowhere to be seen.\n*page_break Two Weeks Later.\n*set energy 100\n*set fame +10\nThe speech started off slow, with a solemn tone, the words of the usually straight-standing state official now overcome by the clacking of camera shutters. His face was washed in the bright light from the flashes of those same cameras.\n\n\"You think they're really going to do it? Enforce some kind of law on these vigilantes?\" a man casually asked. You glanced around, seeing nobody else in earshot who he might be talking to.\n\nThe coffee shop you were sitting in was largely empty and the seats the two of you were taking up happened to be the best for hearing the TV. Before you could reply, the man continued, his voice filled with the waves of a lovely thespian accent, common in older Shakespearian players.\n\n\"I hope not. It was a tragedy what happened, but I don't think they should make these people the bad guys. Not all of them are like that. The legislation they've been talking about would basically put these people under watch 24/7. Strange powers or not, they have the right to privacy.\"\n\n*fake_choice\n\t#\"I think I agree with you.\"\n\t#\"What do you think would happen if they tried to control these powered people? It's just legislation.\"\n\t#\"It's going to be a moderate solution, in any case. They'll have to compromise to get it through.\"\n\t#\"Maybe some of them need this kind of oversight.\"\n\t#\"I don't know. This might be one of those times where we have to balance security and freedom.\"\n\t#\"What do you care? You're not from around here.\"\n\t#Bid him farewell and leave.\n\t#Stand up and leave.\n\n\n*set full_name \"Elias Koivisto\"\n*set name \"Elias\"\n*set surname \"Koivisto\"\n*set heroname \"Silverwing\"\n*set gender \"Non-binary transgender\"\n*set prefix \"Mx.\"\n*set trans true\n*set sexual \"Undefined\"\n*set natlang \"Finnish\"\n*set englang true\n*set nation \"Finnish\"\n*set work \"aid\"\n*set body 80\n*set energy 70\n*set fame 45\n*set benign 20\n*set gadget false\n*set training \"Capoeira.\"\n*set suit \"utility\"\n*set caped \"false\"\n*set colours \"Orange, Black and White\"\n*set flight false\n*set jumping false\n*set teleport true\n*set wallcrawl false\n*set energypower true\n*set healing false\n*set agility false\n*set endurance false\n*set strength false\n*set adaptation false\n*set durability false\n*set senses true\n*set infravision false\n*set heatresistance false\n*set ultravision true\n*set reveal true\n*set kills false\n*set everybody_met true\n*set aurora_met true\n*set reaver_met true\n*set caracal_met \"true\"\n\n\"You know, there is an unfortunate lack of respect in your kind. Ordinary people would think twice about putting their noses in any business guarded by armed men, but you just had to get yourself shot, didn't you? For what? Some kind of delusion of heroic grandeur?\" a deep, bassy voice thundered. You opened your eyes to a burning white light filtering through a thick cloth. Shadows moved against this bright backdrop, but you could not see who they were. With quick tugs, you felt for the position of your body, heavy restraints clattering and holding you back at every motion. There was a strange echo in the room, as if part of the noise was muffled and reflected by a shifting pool.\n\n\"This whole incident could have been avoided. It is extremely unfortunate you chose this path. I have a simple question for you, and I expect you to answer it truthfully. Why are you here?\" the same voice continued, shifting around and echoing in a way that told you that whoever this man was, he was \ncircling you from a fair distance.\n\n*fake_choice\n\t#\"I was curious. Wouldn't you be, if a random explosion revealed a hidden bunker?\"\n\t#\"I wanted to help. I needed to see if anyone was still trapped inside.\"\n\t#\"What can I say? I like moonlit walks in secret underground lairs.\"\n\t#Say nothing.\n\n*ending\n", "startup": "\n*title Best of Us\n\n*author Teo Kuusela\n\n*scene_list\n\tstartup\n\tdisaster\n\tcollection\n\t$ counter\n\t$ dawn\n\t$ endgame\n\n*create full_name \"John Doe\"\n*create name \"John\"\n*create surname \"Doe\"\n*create heroname \"Unknown\"\n*create gender \"Undefined\"\n*create prefix \"Mr.\"\n*create trans false\n*create sexual \"Undefined\"\n\n*create natlang \"None\"\n*create englang true\n*create nation \"None\"\n*create work \"None\"\n*create living \"Undefined\"\n\n*create body 50\n*create energy 100\n*create fame 0\n*create benign 50\n\n*create gadget false\n*create training \"No formal training.\"\n\n*create flight false\n*create jumping false\n*create teleport false\n*create wallcrawl false\n\n*create energypower false\n*create healing false\n*create agility false\n*create endurance false\n*create strength false\n*create adaptation false\n*create durability false\n*create senses false\n*create infravision false\n*create heatresistance false\n*create ultravision false\n\n*create fire 0\n*create ice 0\n\n*create suit \"undefined\"\n*create caped \"undefined\"\n*create colours \"undefined\"\n\n*create alley_intervene true\n\n*create reveal false\n*create kills false\n\n*create attacked_reaver false\n*create nightreaver_seduce false\n\n*create firstheard false\n*create everybody_met false\n*create aurora_met false\n*create reaver_met false\n*create caracal_met \"false\"\n*create purge_met false\n*create dawn_told false\n\n*create ferrismet false\n*create ferrisnamed false\n\n*create flirt_aurora true\n*create flirt_icarus true\n\n*create rennowdead false\n*create angieshot \"false\"\n*create nolobby false\n*create realname false\n*create phone false\n\n*create barrcap \"false\"\n\n*create purgefight \"true\"\n*create havepurgemask false\n*create rennowreveal false\n*create purgesave false\n*create purgereap false\n*create dawnick \"Dawn\"\n\n*create jailpath false\n*create endgame \"Undefined\"\n*create loyal_aurora false\n*achievement kittyhunt visible 20 Chasing a Cat\n\tChase after a very naughty cat.\n\tYou chased and confronted Crimson Caracal.\n*achievement unmask visible 20 Unmasked.\n\tWhen you have someone with a mask at your mercy…why wait?\n\tYou have discovered the identity of Purge.\n*achievement english visible 20 Englishman in Pacifica\n\tHe's an alien, he's a legal alien.\n\tYou chose to speak with Daniel Clarke.\n*achievement dungeoncrawl visible 20 Dungeoncrawl\n\tA hole has appeared, let's go search for treasure!\n\tYour Dungeon Master would be proud.\n*achievement gullible visible 30 Weapon X\n\tA tank of water, a table with restraints…let's get ourselves enhancements!\n\tWhat did you expect would happen?\n*achievement flameon visible 20 Flame On\n\tWhat's a little heat between friends?\n\tYou've favoured heat over cold.\n*achievement iceman visible 20 Talk About a Cold Shoulder\n\tSometimes you just have to cool off.\n\tYou've favoured ice over fire.\n*achievement avatar visible 30 The First Airbender\n\tYou don't have an arrow-shaped tattoo on your head, do you?\n\tIce? Fire? Why bother when you can airbend?\n*achievement iuris visible 50 Regulae Iuris\n\tRules of law must be followed.\n\tYou have followed the rule of law and turned yourself in to the authorities.\n*achievement ius visible 50 Ius Remonstrandi\n\tAll uses of law are not righteous.\n\tYou decided to ignore Aurora's warning and refused to turn yourself in.\n*achievement nazicard hidden 5 Godwin's Law\n\thidden\n\tWay to pull out the Nazi card. You don't deserve these points.\n*achievement juslord visible 100 Justice Lord\n\tThe big bad cannot live to see prison.\n\tReissman suffered death for his crimes.\n*achievement gilded visible 100 Gilded Cage\n\tThe big bad must go to prison.\n\tReissman was turned over to the authorities, along with evidence of his wrongdoings.\n*achievement school visible 45 Community College Heroes\n\tEveryone needs to learn somehow.\n\tYou have taken the next generation under your wing.\n*achievement project visible 45 The Hero Project\n\tCreating the best of the best.\n\tUnethical research project? I think you mean limitless supply of supersoldiers!\n*achievement retire visible 45 Moving On\n\tEveryone has to stop at some point.\n\tYou have chosen to call it a day for your hero career and move on.\n*achievement homeward visible 45 Homeward Bound\n\tReturn home.\n\tYou have returned to your homeland to become a hero.\n*achievement agent visible 45 I Am The Law\n\tBecome the government's agent.\n\tYou've taken on a role as the government's very own crimefighter.\n*achievement steelman hidden 25 Man of Steel\n\thidden\n\tMore powerful than a locomotive, able to leap tall buildings in a single bound, and dresses like a boyscout.\n*achievement spooder hidden 25 Great Power Comes With Great Responsibility\n\thidden\n\tA friendly neighbourhood wallcrawler.\n*achievement mainittu hidden 100 Torilla tavataan\n\thidden\n\tFinland mentioned!\n*achievement famous visible 20 Now Available as an Action Figure\n\tReach the pinnacle of fame.\n\tYou're more famous than most comic book superheroes!\n*achievement brutal visible 20 Vigilante\n\tProve yourself a brutal vigilante.\n\tSome matters just require brutal efficiency.\n*achievement boyscout visible 20 Iconic Hero\n\tProve yourself the quintessential hero.\n\tAlways be prepared!\n\n*temp powerset 0\n*temp powerprint 0\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tIt's the dawn of superpowers! Grab a cape and stand with the first generation of heroes as they struggle to join society and vanquish a criminal conspiracy, or lay the foundation to become the first villain.\n\n\t[i]The Best of Us[/i] is an interactive novel by Teo Kuusela, where your choices control the story. It's entirely text-based--127,000 words, without graphics or sound effects--and fueled by the vast, unstoppable power of your imagination.\n\n\t• Choose your powers: freeze your opponents, or carry them to the skies.[n/]\n\t• Don your very own hero uniform and save the city of Pacifica.[n/]\n\t• Face your fellow heroes and uncover a conspiracy.[n/]\n\t• Decide the future of heroes: dangerous vigilantes, or paragons of justice?[n/]\n\t• Lay the foundation for a better future, and perhaps profit from it as well.\n\n\t[i]You can play the first three chapters of the game for free. Purchase the rest of the game below.[/i]\n\t*if choice_is_advertising_supported\n\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\t*comment endif\n\n\t*purchase_discount adfree 2016-01-01 $4.99 $2.99 purchased\n\t*if choice_is_advertising_supported\n\t\t*page_break_advertisement\n\t*if not(choice_is_advertising_supported)\n\t\t*page_break Play Now for Free\n\n\n*label purchased\n\n\n[i]There was a time we were innocent. The nation was booming and people were happy. The politicians were ripping one another apart on national television, [/i]\n[i]flanked by pundits from every side of the aisle. Some people took to a god or several to answer the many mysteries of this universe, some took to [/i]\n[i]alcohol to dull the void of having no answers, some took to scientific figures as if they were the next messiah and the black holes were something [/i]\n[i]worth worshipping.[/i]\n\n[i]Now I barely remember that time of innocence. It was all background noise to the struggles each and every one of us went through in [/i]\n[i]our daily lives. Get up in the morning, drag ourselves to work, serve some purpose no matter how dull or worthless it sometimes felt, then drag [/i]\n[i]ourselves back home again. Then try to find a good way to spend our few free hours before rushing to bed so we could wake up refreshed for a new day of [/i]\n[i]that same rat race.[/i]\n\n[i]When that innocence was lost, the aftershocks would go on to change our entire world.[/i]\n*page_break\nThe blank form in front of you, on a table welded from brushed stainless steel, looked daunting. Four pages of information required just for a permit to enter the United States. With a sigh, you grasped the pen beside the form and wondered why you had ever agreed to this.\n\nThe basic questions were always the most boring. To alleviate that, you decided to do them out of order this time. After jotting down your social security number, you moved on to gender. As with most official forms, the question meant the biological gender you were born as, and any choice for people who identified as something different from that was missing.\n*choice\n\t#Male.\n\t\t*set gender \"Male\"\n\t\tOf course, now that you had jotted this down, did you identify as that?\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\t*goto lang\n\t\t\t#No.\n\t\t\t\t*set trans true\n\t\t\t\t*goto transy\n\t#Female.\n\t\t*set gender \"Female\"\n\t\tOf course, now that you had jotted this down, did you identify as that?\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\t*goto lang\n\t\t\t#No.\n\t\t\t\t*set trans true\n\t\t\t\t*goto transy\n\n*label transy\nWhat did you identify as?\n*choice\n\t*if (gender = \"Male\") #Female.\n\t\t*set gender \"Female\"\n\t\t*goto lang\n\t*if (gender = \"Female\") #Male.\n\t\t*set gender \"Male\"\n\t\t*goto lang\n\t#Non-Binary.\n\t\t*set gender \"Non-binary transgender\"\n\t\t*goto lang\n\n\n*label lang\nThe questions continued, and you moved to the next blank box.\n\n[i]What is your native language?[/i]\n*fake_choice\n\t#Arabic.\n\t\t*set natlang \"Arabic\"\n\t#Bengali.\n\t\t*set natlang \"Bengali\"\n\t#Cantonese.\n\t\t*set natlang \"Cantonese\"\n\t#English.\n\t\t*set natlang \"English\"\n\t#French.\n\t\t*set natlang \"French\"\n\t#German.\n\t\t*set natlang \"German\"\n\t#Hindi.\n\t\t*set natlang \"Hindi\"\n\t#Italian.\n\t\t*set natlang \"Italian\"\n\t#Japanese.\n\t\t*set natlang \"Japanese\"\n\t#Javanese.\n\t\t*set natlang \"Javanese\"\n\t#Korean.\n\t\t*set natlang \"Korean\"\n\t#Malay.\n\t\t*set natlang \"Malay\"\n\t#Mandarin.\n\t\t*set natlang \"Mandarin\"\n\t#Persian.\n\t\t*set natlang \"Persian\"\n\t#Portuguese.\n\t\t*set natlang \"Portuguese\"\n\t#Punjabi.\n\t\t*set natlang \"Punjabi\"\n\t#Russian.\n\t\t*set natlang \"Russian\"\n\t#Spanish.\n\t\t*set natlang \"Spanish\"\n\t#Swahili.\n\t\t*set natlang \"Swahili\"\n\t#Tamil.\n\t\t*set natlang \"Tamil\"\n\t#Vietnamese.\n\t\t*set natlang \"Vietnamese\"\n\t#Wu.\n\t\t*set natlang \"Wu\"\n\t#Other.\n\t\t*input_text natlang\n\t\t*page_break\n\n\n*if (gender = \"Male\")\n\t*set prefix \"Mr.\"\n*if (gender = \"Female\")\n\t*set prefix \"Ms.\"\n*if (gender = \"Non-binary transgender\")\n\t*set prefix \"Mx.\"\n\n*if not (natlang = \"English\")\n\tOf course, since you were filling out this form in English, you also knew English, at least to a somewhat good degree.\n\t*fake_choice\n\t\t#In fact, I have always been excellent at it.\n\t\t\t*set englang true\n\t\t#I could get by in day-to-day life.\n\t\t\t*set englang false\n\n\n[i]What is your nationality?[/i]\n*fake_choice\n\t#American.\n\t\t*set nation \"American\"\n\t#Bangladeshi.\n\t\t*set nation \"Bangladeshi\"\n\t#Brazilian.\n\t\t*set nation \"Brazilian\"\n\t#British.\n\t\t*set nation \"British\"\n\t#Chinese.\n\t\t*set nation \"Chinese\"\n\t#Congolese.\n\t\t*set nation \"Congolese\"\n\t#Egyptian.\n\t\t*set nation \"Egyptian\"\n\t#Ethiopian.\n\t\t*set nation \"Ethiopian\"\n\t#Filipino.\n\t\t*set nation \"Filipino\"\n\t#French.\n\t\t*set nation \"French\"\n\t#German.\n\t\t*set nation \"German\"\n\t#Indian.\n\t\t*set nation \"Indian\"\n\t#Indonesian.\n\t\t*set nation \"Indonesian\"\n\t#Iranian.\n\t\t*set nation \"Iranian\"\n\t#Italian.\n\t\t*set nation \"Italian\"\n\t#Japanese.\n\t\t*set nation \"Japanese\"\n\t#Mexican.\n\t\t*set nation \"Mexican\"\n\t#Nigerian.\n\t\t*set nation \"Nigerian\"\n\t#Pakistani.\n\t\t*set nation \"Pakistani\"\n\t#Russian.\n\t\t*set nation \"Russian\"\n\t#Turkish.\n\t\t*set nation \"Turkish\"\n\t#Vietnamese.\n\t\t*set nation \"Vietnamese\"\n\t#Other.\n\t\t*input_text nation\n\t\t*page_break\n*if ((nation = \"Finnish\") or (natlang = \"Finnish\"))\n\t*achieve mainittu\nAfter the questions about your origin, you hopped back to the very top of the sheet to fill out your name.\n\n[i]What is your first name?[/i]\n*if (gender = \"Female\")\n\t*fake_choice\n\t\t#Alexandra.\n\t\t\t*set name \"Alexandra\"\n\t\t#Clara.\n\t\t\t*set name \"Clara\"\n\t\t#Elisa.\n\t\t\t*set name \"Elisa\"\n\t\t#Fatima.\n\t\t\t*set name \"Fatima\"\n\t\t#Hina.\n\t\t\t*set name \"Hina\"\n\t\t#Maria.\n\t\t\t*set name \"Maria\"\n\t\t#Nina.\n\t\t\t*set name \"Nina\"\n\t\t#Paula.\n\t\t\t*set name \"Paula\"\n\t\t#Yun.\n\t\t\t*set name \"Yun\"\n\t\t#Other.\n\t\t\t*input_text name\n\t\t\t*page_break\n*if (gender = \"Male\")\n\t*fake_choice\n\t\t#Adam.\n\t\t\t*set name \"Adam\"\n\t\t#David.\n\t\t\t*set name \"David\"\n\t\t#Elias.\n\t\t\t*set name \"Elias\"\n\t\t#Filip.\n\t\t\t*set name \"Filip\"\n\t\t#Julian.\n\t\t\t*set name \"Julian\"\n\t\t#Leon.\n\t\t\t*set name \"Leon\"\n\t\t#Mohamed.\n\t\t\t*set name \"Mohamed\"\n\t\t#Ren.\n\t\t\t*set name \"Ren\"\n\t\t#Wei.\n\t\t\t*set name \"Wei\"\n\t\t#Other.\n\t\t\t*input_text name\n\t\t\t*page_break\n\n*if (gender = \"Non-binary transgender\")\n\t*fake_choice\n\t\t#Adam.\n\t\t\t*set name \"Adam\"\n\t\t#Alexandra.\n\t\t\t*set name \"Alexandra\"\n\t\t#Clara.\n\t\t\t*set name \"Clara\"\n\t\t#David.\n\t\t\t*set name \"David\"\n\t\t#Elias.\n\t\t\t*set name \"Elias\"\n\t\t#Elisa.\n\t\t\t*set name \"Elisa\"\n\t\t#Fatima.\n\t\t\t*set name \"Fatima\"\n\t\t#Filip.\n\t\t\t*set name \"Filip\"\n\t\t#Hina.\n\t\t\t*set name \"Hina\"\n\t\t#Julian.\n\t\t\t*set name \"Julian\"\n\t\t#Leon.\n\t\t\t*set name \"Leon\"\n\t\t#Maria.\n\t\t\t*set name \"Maria\"\n\t\t#Mohamed.\n\t\t\t*set name \"Mohamed\"\n\t\t#Nina.\n\t\t\t*set name \"Nina\"\n\t\t#Paula.\n\t\t\t*set name \"Paula\"\n\t\t#Ren.\n\t\t\t*set name \"Ren\"\n\t\t#Wei.\n\t\t\t*set name \"Wei\"\n\t\t#Yun.\n\t\t\t*set name \"Yun\"\n\t\t#Other.\n\t\t\t*input_text name\n\t\t\t*page_break\n\n[i]What is your surname?[/i]\n*fake_choice\n\t#Demir.\n\t\t*set surname \"Demir\"\n\t#Ghang.\n\t\t*set surname \"Ghang\"\n\t#Kazi.\n\t\t*set surname \"Kazi\"\n\t#Kovach.\n\t\t*set surname \"Kovach\"\n\t#Lee.\n\t\t*set surname \"Lee\"\n\t#Miller.\n\t\t*set surname \"Miller\"\n\t#Olssen.\n\t\t*set surname \"Olssen\"\n\t#Silva.\n\t\t*set surname \"Silva\"\n\t#Smith.\n\t\t*set surname \"Smith\"\n\t#Takahashi.\n\t\t*set surname \"Takahashi\"\n\t#Torres.\n\t\t*set surname \"Torres\"\n\t#Other.\n\t\t*input_text surname\n\t\t*page_break\n\n\n*if ((nation = \"Japanese\") or (nation = \"Chinese\"))\n\t*set full_name ((surname & \" \") & name)\n\t*goto nameconv\n*elseif ((nation = \"Vietnamese\") or (nation = \"Korean\"))\n\t*set full_name ((surname & \" \") & name)\n\t*goto nameconv\n*elseif ((nation = \"Sri Lankan\") or (nation = \"Taiwanese\"))\n\t*set full_name ((surname & \" \") & name)\n\t*goto nameconv\n*else\n\t*set full_name ((name & \" \") & surname)\n\t*goto nameconv\n\n\n*label nameconv\nWell then, those were the 'simple' questions out of the way. You glanced up from the paperwork and out the window. Outside, it was a fresh spring evening, the otherwise relatively quiet streets of your hometown broken by a group of rowdy teenagers going out to try and find someone gullible enough to buy them alcohol. A flash went through your head, bringing forth memories of your own youth when you were among such teenagers.\n\nYou and many of your friends had gathered on the schoolyard with a bag of stolen ciders, getting drunk more from the rush than the alcohol content of the drinks themselves. By chance, a few of the so-called 'nerds' of your school happened to walk by, and a group of three boys, the same ones who had stolen the beverages, went off to harass them. Soon enough, the boys grabbed one of the nerds and had him on the ground, giving him a torturous beat-down.\n*fake_choice\n\t#I tried to stop the boys, no matter what happened to me.\n\t\t*set benign +10\n\t\t*set body +10\n\t\tYour best intentions that day got you plenty of bruises. When you got home, you had quite the explanation to try and give your parents, only barely managing to stop them from calling the school and making waves that were not necessary. It was just the daily reality of school at your age.\n\t#I stood by and watched. I could not help, and I knew it.\n\t\tYou had no clue as to how to help the boy being beaten. You weren't strong enough to defy the bigger bullies and end up standing up to the rest of the group, who would no doubt turn on you as soon as you tried to spoil their 'fun'. The whimpering boy curled up into a ball and closed his eyes as their fists hit him over and over again.\n\t\t*set body -10\n\t#I watched with glee, waiting for an opening to join in.\n\t\t*set benign -10\n\t\t*set body +5\n\t\tYou weren't sure what came over you in the heat of that moment, but you felt the urge to join the bullies in taking the smaller boy. As soon as you saw a gap to squeeze in, you did so and began wailing on the smaller boy with a giddy glee reinforced by the rest of the people in your group. The rush of adrenaline that pumped through your body was almost overwhelming, and eventually your friends had to pull you off of the boy.\n\n*page_break\nFor whatever reason, your memory trip flickered to a different scene. This time, it was you who was on the ground, with people looming over you and calling you a freak.\n\n\"You freak!\" you heard as the cacophony of shouting mixed in with the sound of kicks against your side.\n\nThis memory was from when you were fourteen, a particularly rough time in your life. Your parents had forced a move upon you, breaking up your friendships and established place in the cliques of school. At this new school, you were the new kid—a target for the bullies.\n\nAs if this was not enough, you were also discovering something strange in yourself. It was something that didn't fit with what you had learned in school and from your parents. Something was brewing inside you, wanting to come out. You had reached puberty a couple of years prior, so at first you thought something had gone wrong with that, even asking your parents about some of it, yet they could only offer dumbfounded looks. As it got weirder and weirder, you realized it was something very different.\n*page_break\nYou were becoming something more than just human. Powers came to you in a flurry, only for a quick moment and in times of severe distress. One time when the bullies cornered you, your powers had manifested, and although you were left in a state of shock by the sudden overwhelming of your senses and couldn't remember what you had done, the bullies never touched you again.\n\nAfter high school, it was time to start upon your path to a career in full earnest. You had spent some time working at burger joints and other odd jobs, but eventually you would need to do something more.\n*choice\n\t#I was best utilized in manual labour and on the sports field.\n\t\tYou had the natural strength of both body and mind to do things that many others wouldn't because they were too hard. On the sports field, if the coach needed a bruiser, you were the one he'd call out, and if there was heavy lifting to do, it would be you doing it. With this inherent ability, it felt only natural to go to a sports academy. You could always fall back upon menial labour, but in the world of sports you had the possibility to strike it rich.\n\t\t*set body +10\n\t\t*choice\n\t\t\t#I also developed good social skills.\n\t\t\t\tYou were never without friends, and on the sports field, you often assumed the position as captain of the team.\n\t\t\t\t*set body -5\n\t\t\t\t*goto worp\n\t\t\t#I also had the mind to develop my brain.\n\t\t\t\tMuscles themselves were nothing if you did not know when and where to use them. You also dissolved yourself into your regular studies in order to better yourself intellectually as well as just physically.\n\t\t\t\t*set body +5\n\t\t\t\t*goto worp\n\t#I had always excelled at social tasks, being a natural leader and crowd-pleaser.\n\t\tYou had the world open to you. With good social skills came the power of friends and acquaintances, the ability to mask yourself in roles as an excellent actor or to befriend or scam your way up the corporate ladder. At school, before your parents had forced the move upon you, you were always one of the more popular kids, and even parents were charmed by you to some extent. With a silver tongue, the world would be your oyster.\n\t\t*set body -5\n\t\t*choice\n\t\t\t#I was also careful to build my strength.\n\t\t\t\tDespite your silver tongue, you needed something else as well. Perhaps it was just another aspect of trying to achieve that exaggerated image of a perfect human being which had been created by society. Perhaps it was as simple as wanting to be able to lift heavy objects, since you couldn't always depend on friends. Either way, you were active in sports and later began to visit the gym more often, keeping yourself fit.\n\t\t\t\t*set body +5\n\t\t\t\t*goto worp\n\t\t\t#I was also quite a bit into book learning.\n\t\t\t\tYou could have simply convinced your friends to do your studies for you, but instead you had the mind to actually put in the work by yourself. In your favourite school subjects, you found that you perhaps liked books and studying more than your friends, but overall, studying was still second on your list of priorities.\n\t\t\t\t*set body -5\n\t\t\t\t*goto worp\n\t#I excelled at theoretical studies and engineering.\n\t\tA keen mind, the main attribute for anyone who wanted to create something that would end up changing the world and bringing forth the best that humanity had to offer, by giving people the tools they needed to better themselves. You would have no shortage of work, whether you ended up as an engineer, architect, designer, scientist, or even a writer or painter. Throughout your childhood, your mind was always working overtime to comprehend your surroundings and satisfy your demand for more knowledge.\n\t\t*set body -10\n\t\t*choice\n\t\t\t#I also built up my body and strength.\n\t\t\t\tA keen mind was still nothing if it was not in a healthy and agile body. Your knowledge of the world and the subjects of health and anatomy also pointed towards the fact that you would need to get some fresh air, exercise, and eat healthy so you could make the best use of your brainpower.\n\t\t\t\t*set body +5\n\t\t\t\t*goto worp\n\t\t\t#I also developed quite a few social skills.\n\t\t\t\tBy helping others with tough subjects, you made yourself a good friend to many of the people around you. Perhaps you were not the most popular kid in school at any point in your life, but you did pick up on many skills that would end up carrying you a long way in job interviews and maybe even in the academic community, if you chose to lead such a life.\n\t\t\t\t*set body -5\n\t\t\t\t*goto worp\n\n*label worp\n*page_break\nYou shook your head gently, brushing away the memories of your past. As you looked back down at the paperwork, you glanced at your hand and the pen you were holding. With a smile, you went back to scribbling down the next page of information required from you.\n*page_break Prologue\n\"[i]Our last news item comes from San Francisco, where a luxury yacht was found teetering atop the Golden Gate Bridge this morning. According to eyewitness reports, the yacht had suddenly been taken up into the air and placed there by something or someone. Aboard the yacht, police reportedly found fifteen kilos of uncut cocaine and the unconscious bodies of Hermann Gunther, former CEO of the [b]BlackWatch International[/b] private military corporation, and Luis Carrera, a known drug smuggler for various South American drug cartels. This marks the fifth incident where, by powers unknown, major players in the San Francisco drug scene have been…[/i]\"\n\nThe TV flicked off as your father got off the couch. You were sitting at the kitchen table, drinking a smoothie that your mother had made for you despite the fact that you told her not to bother. Thanks to living alone and being a rare sight for your parents, you were fed and pampered every time you visited.\n\n\"Can you believe that? I don't know what to believe anymore, when even the news is telling me that boats can fly.\" Your father put on a show of grumbling, yet you saw a smile on his face as he entered the kitchen, one that only grew wider as he went to the refrigerator to grab a quick snack, where he finally shook his head in utter disbelief. He glanced over his shoulder at you and your mother, expecting the two of you to find it just as absurd.\n\nYou, however, had a good idea what kind of power would grab a boat and place it on top of the Golden Gate Bridge. It had been kept secret from your parents since you first began developing your powers, but you had no illusions about these mystery events that were slowly becoming increasingly common around the world. There were others with powers out there. Yet unlike you, they had chosen to revel in their powers, showing little to no regard for the safety of anyone around them.\n*page_break\n*label powers\n*set flight false\n*set jumping false\n*set teleport false\n*set wallcrawl false\n*set energypower false\n*set healing false\n*set agility false\n*set endurance false\n*set strength false\n*set adaptation false\n*set durability false\n*set senses false\n*set infravision false\n*set heatresistance false\n*set ultravision false\n*set powerset 0\n\nYour own powers had blossomed into what you might've thought of as both a gift and a curse. Although originally highly varied and very sudden in nature, your abilities had slowly evolved into three distinct sets of powers, which you could mostly use at will. However, you still had a lot to do if you wished to master any of them. They also took a lot out of you; even just a few hours of exerting your powers would drain you to the point where you could easily find yourself sleeping for a few days straight or eating your entire kitchen empty in order to replenish the depleted energy.\n\n[i][b]Author's note:[/b] You can find descriptions of all the following powers on your stats page.[/i]\n\nThe most powerful of your developed powers was…\n*choice\n\t#Flight.\n\t\tFlight powers grant the user the ability to fly, levitate, and glide through the air with the same ease as most birds. Without durable skin, the powered person will not be able to fly at speeds higher than Mach 1 due to friction caused by the air. A user of this particular power may end up with altitude sickness when flying too high and may also suffer from the effects of windchill if they do not have aerial adaptation.\n\t\t\n\t\tIs this what you want?\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\t*set flight true\n\t\t\t\t*goto morepower\n\t\t\t#No.\n\t\t\t\t*goto powers\n\t#Super Jumping.\n\t\tSuper Jump grants the user the ability to jump even tall buildings in a single bound. Powered humans who are experienced with this ability can make such great leaps that to many bystanders it will look as if they were flying. Super Jumpers may suffer from the effects of windchill if they do not have aerial adaptation or thermal resistance.\n\t\t\n\t\tIs this what you want?\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\t*set jumping true\n\t\t\t\t*goto morepower\n\t\t\t#No.\n\t\t\t\t*goto powers\n\t#Teleportation.\n\t\tTeleportation grants the user the ability to teleport short distances. The energy usage of this particular power is so great that teleporting even just from one edge of a city to the other would drain the powered human for several days. However, teleportation through a solid wall or from one end of a room to the other is so minuscule in energy usage that it can be done in highly rapid succession.\n\t\t\n\t\tIs this what you want?\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\t*set teleport true\n\t\t\t\t*goto morepower\n\t\t\t#No.\n\t\t\t\t*goto powers\n\t#Wallcrawling.\n\t\tWallcrawling grants the user the ability to stick to walls and ceilings, much like many insects and arachnids. This power may not offer particularly high speeds for transportation, but with high agility or endurance, Wallcrawling is a safe and precise form of movement. It demands the least energy of all the powered modes of movement.\n\t\t\n\t\tIs this what you want?\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\t*set wallcrawl true\n\t\t\t\t*goto morepower\n\t\t\t#No.\n\t\t\t\t*goto powers\n\n\n*label morepower\n*if (powerset = 3)\n\t*goto cracking\n*else\n\t*gosub detailintro\n\t\n\tYou also had…\n\t*choice\n\t\t#Energy Manipulation.\n\t\t\tEnergy Manipulation gives the powered person a limited amount of control over energy itself. This can mean the ability to chill objects to the point of freezing or heating the air itself to project flames. Energy Manipulation is one of the most taxing powers that one can have, but it can be extremely versatile in practice. It is hard to control these forces once unleashed, and collateral damage will be frequent, with any normal human being targeted by such powers almost sure to die as a result.\n\t\t\t\n\t\t\tIs this what you want?\n\t\t\t*choice\n\t\t\t\t*if (energypower = false) #Yes.\n\t\t\t\t\t*set powerset +1\n\t\t\t\t\t*set energypower true\n\t\t\t\t\t*goto morepower\n\t\t\t\t#No.\n\t\t\t\t\t*goto morepower\n\t\t\t\t*if (energypower) #Remove this power.\n\t\t\t\t\t*set powerset -1\n\t\t\t\t\t*set energypower false\n\t\t\t\t\t*goto morepower\n\t\t#Healing Factor.\n\t\t\tHealing Factor grants the user the ability to heal minor wounds in a highly accelerated fashion, and even limbs can be regenerated if given enough time. This is a passive power which, although it requires the powered person to still have energy to spare, does not actually use up a significant amount of it.\n\t\t\t\n\t\t\tIs this what you want?\n\t\t\t*choice\n\t\t\t\t*if (healing = false) #Yes.\n\t\t\t\t\t*set powerset +1\n\t\t\t\t\t*set healing true\n\t\t\t\t\t*goto morepower\n\t\t\t\t#No.\n\t\t\t\t\t*goto morepower\n\t\t\t\t*if (healing) #Remove this power.\n\t\t\t\t\t*set powerset -1\n\t\t\t\t\t*set healing false\n\t\t\t\t\t*goto morepower\n\t\t#Super Agility.\n\t\t\tSuper Agility grants the user the freedom of movement otherwise attainable only by a lifetime of training in gymnastics. The powered person has enhanced control over their body as well as better balance, coordination, speed, reflexes, strength, and endurance than normal humans, even if they have been trained to their peak condition.\n\t\t\t\n\t\t\tIs this what you want?\n\t\t\t*choice\n\t\t\t\t*if (agility = false) #Yes.\n\t\t\t\t\t*set powerset +1\n\t\t\t\t\t*set agility true\n\t\t\t\t\t*goto morepower\n\t\t\t\t#No.\n\t\t\t\t\t*goto morepower\n\t\t\t\t*if (agility) #Remove this power.\n\t\t\t\t\t*set powerset -1\n\t\t\t\t\t*set agility false\n\t\t\t\t\t*goto morepower\n\t\t#Super Endurance.\n\t\t\tSuper Endurance grants the user enhanced endurance to the point where they can work, even heavily, for extended periods of time without the need for sleep, hydration, or food. Of course, there are limitations to how long this exertion can last, but they fluctuate according to the physical condition of the person.\n\t\t\t\n\t\t\tIs this what you want?\n\t\t\t*choice\n\t\t\t\t*if (endurance = false) #Yes.\n\t\t\t\t\t*set powerset +1\n\t\t\t\t\t*set endurance true\n\t\t\t\t\t*goto morepower\n\t\t\t\t#No.\n\t\t\t\t\t*goto morepower\n\t\t\t\t*if (endurance) #Remove this power.\n\t\t\t\t\t*set powerset -1\n\t\t\t\t\t*set endurance false\n\t\t\t\t\t*goto morepower\n\t\t#Super Strength.\n\t\t\tSuper Strength grants the user strength well beyond even the strongest normal human. With great energy expenditure, a powered person can lift heavy objects such as boulders or trucks, as well as being able to punch through reinforced concrete slabs with ease. A powered person with Super Strength must also have durability in order not to harm their body when throwing such a punch.\n\t\t\t\n\t\t\tIs this what you want?\n\t\t\t*choice\n\t\t\t\t*if (strength = false) #Yes.\n\t\t\t\t\t*set powerset +1\n\t\t\t\t\t*set strength true\n\t\t\t\t\t*goto morepower\n\t\t\t\t#No.\n\t\t\t\t\t*goto morepower\n\t\t\t\t*if (strength) #Remove this power.\n\t\t\t\t\t*set powerset -1\n\t\t\t\t\t*set strength false\n\t\t\t\t\t*goto morepower\n\t\t#Environmental Adaptation.\n\t\t\tEnvironmental Adaptation combines effects from both Aerial and Aquatic Adaptation, granting the ability to withstand both very low and very high pressures, with greater capacity and more effective filtration systems in the lungs, making it possible to breathe even at very high altitudes. Furthermore, the powered person has a reactive friction-resistant skin layer that helps when travelling through the air or water at high speeds, as well as forming a second layer that resists the effects of windchill and cold temperatures to some extent.\n\t\t\t\n\t\t\tIs this what you want?\n\t\t\t*choice\n\t\t\t\t*if (adaptation = false) #Yes.\n\t\t\t\t\t*set powerset +1\n\t\t\t\t\t*set adaptation true\n\t\t\t\t\t*goto morepower\n\t\t\t\t#No.\n\t\t\t\t\t*goto morepower\n\t\t\t\t*if (adaptation) #Remove this power.\n\t\t\t\t\t*set powerset -1\n\t\t\t\t\t*set adaptation false\n\t\t\t\t\t*goto morepower\n\t\t#Durability.\n\t\t\tDurability means the powered person has adapted to be able to withstand blows, whether they be punches, gunfire, explosions, or even slower effects such as acid or fire. The user has roughly the same pain threshold as normal people, but with Durability the body can withstand crushing or even fatal injuries, at least to an extent.\n\t\t\t\n\t\t\tIs this what you want?\n\t\t\t*choice\n\t\t\t\t*if (durability = false) #Yes.\n\t\t\t\t\t*set powerset +1\n\t\t\t\t\t*set durability true\n\t\t\t\t\t*goto morepower\n\t\t\t\t#No.\n\t\t\t\t\t*goto morepower\n\t\t\t\t*if (durability) #Remove this power.\n\t\t\t\t\t*set powerset -1\n\t\t\t\t\t*set durability false\n\t\t\t\t\t*goto morepower\n\t\t#Heightened Senses.\n\t\t\tHeightened Senses grants the user a highly tuned set of senses, from better hearing to abnormally good vision to very quick reflexes. A powered person with Heightened Senses can also taste, feel, touch, and smell at a much higher level of precision and capability than normal humans. With training, the user may learn to block out some of these senses, at least to some degree, perhaps even to the point where they can completely mute the other senses in order to concentrate upon one thing, for example a single sound or a faint smell.\n\t\t\t\n\t\t\tIs this what you want?\n\t\t\t*choice\n\t\t\t\t*if (senses = false) #Yes.\n\t\t\t\t\t*set powerset +1\n\t\t\t\t\t*set senses true\n\t\t\t\t\t*goto morepower\n\t\t\t\t#No.\n\t\t\t\t\t*goto morepower\n\t\t\t\t*if (senses) #Remove this power.\n\t\t\t\t\t*set powerset -1\n\t\t\t\t\t*set senses false\n\t\t\t\t\t*goto morepower\n\t\t#Infravision.\n\t\t\tInfravision allows the user to see in the infrared spectrum, essentially giving the powered person the ability to see temperatures along with regular colours. This is an always-on ability that can only be suppressed by wearing sunglasses with a polarization or filter that blocks out infrared wavelengths. It should be noted that the eyes are not in fact emitting IR radiation, but are only tuned to detect it alongside other wavelengths of light.\n\t\t\t\n\t\t\tIs this what you want?\n\t\t\t*choice\n\t\t\t\t*if (infravision = false) #Yes.\n\t\t\t\t\t*set powerset +1\n\t\t\t\t\t*set infravision true\n\t\t\t\t\t*goto morepower\n\t\t\t\t#No.\n\t\t\t\t\t*goto morepower\n\t\t\t\t*if (infravision) #Remove this power.\n\t\t\t\t\t*set powerset -1\n\t\t\t\t\t*set infravision false\n\t\t\t\t\t*goto morepower\n\t\t#Thermal Resistance.\n\t\t\tThermal Resistance grants the user a high tolerance toward what normal humans would consider extreme temperatures. A powered person with this set of powers is near-impervious to fire and freezing alike, being able to push through without injury. As a result of this power, the user's pain receptors are often dulled, and thus their tolerance to pain is much higher than in normal humans. A powered user can, for example, be splashed with boiling water without injury, and the water will feel roughly lukewarm on the skin.\n\t\t\t\n\t\t\tIs this what you want?\n\t\t\t*choice\n\t\t\t\t*if (heatresistance = false) #Yes.\n\t\t\t\t\t*set powerset +1\n\t\t\t\t\t*set heatresistance true\n\t\t\t\t\t*goto morepower\n\t\t\t\t#No.\n\t\t\t\t\t*goto morepower\n\t\t\t\t*if (heatresistance) #Remove this power.\n\t\t\t\t\t*set powerset -1\n\t\t\t\t\t*set heatresistance false\n\t\t\t\t\t*goto morepower\n\t\t#Ultravision.\n\t\t\tUltravision allows the user to see in the ultraviolet spectrum, essentially giving the powered person the ability to see bodily fluids or other organic trails, or even to see ink and paint traces that would otherwise be undetectable. This is an always-on ability that can only be suppressed by wearing sunglasses with a polarization or filter that blocks out ultraviolet wavelengths. It should be noted that the eyes are not in fact emitting UV radiation, but are only tuned to detect it alongside other wavelengths of light.\n\t\t\t\n\t\t\tIs this what you want?\n\t\t\t*choice\n\t\t\t\t*if (ultravision = false) #Yes.\n\t\t\t\t\t*set powerset +1\n\t\t\t\t\t*set ultravision true\n\t\t\t\t\t*goto morepower\n\t\t\t\t#No.\n\t\t\t\t\t*goto morepower\n\t\t\t\t*if (ultravision) #Remove this power.\n\t\t\t\t\t*set powerset -1\n\t\t\t\t\t*set ultravision false\n\t\t\t\t\t*goto morepower\n\t\t#No, that's wrong. Let me rethink all of my powers.\n\t\t\t*goto powers\n\n\n*label cracking\n*page_break\nThe real reason you came to visit your parents was that you were beginning your long vacation and had decided to visit them before flying off to spend a few weeks in Los Angeles, seeing the sights and experiencing what the centre of world entertainment had to offer, with its ivory towers and tall glass buildings scattered among the richest suburbs in the world.\n*page_break Two Weeks Later\n\"Watch out!\" echoed a shout from one of the tall glass buildings as a loud boom and a steely groan rumbled high above. Sirens began to wail, and a chaotic group of cars stuck in the street were all bathed in the red-and-blue flashing lights.\n\nThe heavy structure came tumbling down, kicking a massive wave of dust into the air and making it impossible to see very far ahead of oneself. You hobbled to the sidewalk and saw one of the trees planted next to a hotel entrance covered in a brownish grey dust; it had been a lush and healthy green only a few moments earlier.\n*page_break\nA man in a deep blue uniform grasped your arm, guiding you through the smoke to a pair of EMTs rushing around an ambulance and taking care of at least two dozen people. Their scrubs were dirty from blood and dust, and their supplies were clearly extremely limited. One of the EMTs rushed over to you as he spotted you approaching.\n\n*choice\n\t#Point out the cop. He's the one hurt.\n\t\tYou had, in fact, stumbled over a cop who had been hit by some falling concrete and was quite badly bruised. It would be a safe bet that he had some broken bones, as well. With some loud groans from the officer, you and the EMT guided him to lay down on a splayed jacket covered by a trash bag. It was a very rough solution to a bad situation, but it would have to do. With a nod in your direction, the EMT began checking the officer.\n\t\t\n\t\t*if (healing)\n\t\t\tYou suffered injuries as well, but all the wounds had already begun to heal. There would be nothing for the EMTs to treat.\n\t\t\t*goto firstuse\n\t\t*elseif (durability)\n\t\t\tThere had been some concrete shrapnel flying your way, but you had thick skin. There was barely a cut or bruise on you. The EMT would have very little to treat.\n\t\t\t*goto firstuse\n\t\t*else\n\t\t\tYou dabbed your forehead with your finger to wipe off some sweat, but as you brought the hand back down, it was clear that it wasn't just sweat, the fingertips coloured crimson by the blood oozing from your wounds. Once you had noticed it, you did recall that there had been a few concrete shrapnel pieces flying your way. The EMT rushed over to you next, quickly guiding you to the ambulance for some patching up.\n\t\t\t*goto firstuse\n\t#I had some scratches and bruises that needed tending to.\n\t\tThe police officer helped you over to the ambulance and guided you to sit, the EMT hovering over you to check your reactions and the depth of your wounds.\n\t\t\n\t\t*if (healing)\n\t\t\tThe wounds were still oozing some blood that trickled down your face, but the flesh was being welded shut right before the EMT's eyes. He looked at you with astonishment and some bewilderment, but with a quick glance at the cop behind him, the EMT quickly placed a patch over the wound to hide it.\n\t\t\t\n\t\t\t\"I haven't seen anything like that outside of comic books, man…better keep it hidden,\" he whispered, nodding towards you. The rest of your wounds were already sealed and scarred over by the time he finished applying the first patch.\n\t\t\t*goto firstuse\n\t\t*elseif (durability)\n\t\t\tThere were bruises on your skin from the falling debris which had bounced off of your thick and durable flesh. No cuts, no bleeding. After quickly checking out your limbs, the EMT was already rushing off to the next patient. You would survive, and with no broken bones nor bleeding wounds, you were very low on the priority list.\n\t\t\t*goto firstuse\n\t\t*else\n\t\t\tYour wounds were still open, and blood had sealed one of your eyelids shut. The EMT quickly washed away the blood covering your eye, then rushed to patch up the bleeding wounds on your forehead and brow. The rest of you was bruised and aching, but after a quick check-up it was clear that there were no broken bones or punctured arteries. It was sheer bad luck that the concrete shrapnel had hit you. It would take some time to fully recover.\n\t\t\t*goto firstuse\n\n*label firstuse\n*page_break\nIt took several days for the full scale of the disaster to become known. The entire San Andreas fault had shifted in one massive push, causing a devastating earthquake throughout the entirety of California. From San Francisco to Los Angeles, almost half of the city skyscrapers had crumbled to dust, and many small houses were flattened, especially in the poorer areas. Gas and electrical mains broke as the ground shifted, causing massive fires that blazed despite the water and sewage pipes also bursting and flooding several streets.\n\nA state of emergency was declared just hours after the earthquake, and the National Guard was brought in to aid in a massive evacuation and the attempted containment of loss of life.\n*page_break\nIt was during this disaster that rumours became facts and comic books became reality.\n\nIn San Francisco, a blurry flying figure was seen flitting though the city and holding onto falling buildings in order to buy time for fleeing civilians. This figure also stopped to extinguish fires a great deal, and once the aftershocks had dissipated, helped clear several piles of rubble, saving thousands of civilians in a matter of hours. Still images of this figure began spreading in the news; a female in green-and-blue clothing, wearing a clearly home-sewn mask to hide the upper part of her face. Due to the blurry trail she left behind as she flew, the media quickly named her Aurora.\n\nIn Los Angeles, a man in dark utility clothing became a widely known figure who curtailed much of the looting in the aftermath of the earthquake. Although he was essential in limiting the riots, he quickly became a figure that many people hated; his trail was usually one of blood and broken bones, with the police and emergency services left to clean up the mess. This man quite publicly spread a video around the internet, identifying himself as Nightreaver.\n\nThere had been vigilantes and 'costumed heroes' before them, some quite famous. However, they had been powerless, driving in old cars and wearing silly and colourful tights. This new breed had powers. Aurora was filmed flying and demonstrating great strength, and Nightreaver was said to climb on walls and have an agility and endurance level that no normal human could possess.\n\nNow, it was a new dawn.\n*set firstheard true\n*finish\n\n\n\n*label detailintro\n\nSo, you developed the power \n*if (flight)\n\tof f
