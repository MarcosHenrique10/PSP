nd completely indecipherable. The clang of guard boots on the walkways makes it sound like there were fifteen people on patrol, although you know there are only two or three at the most at this hour.\n\nThis hour, you think again and shrug, looking at the wall opposite the door. Whereas all the movies you've seen had a classic barred window, you have a solid concrete wall surfaced with a thick steel panel. There was no way to tell time, but the clanging of the door in the central chamber usually meant a guard change, which took place thirty minutes before the wake-up bell rang. Sighing, you sit down on the small, cheap-looking toilet and begin counting.\n\nYou had met Aurora five days prior on the rooftop, then turned yourself in after two days of arranging your absence in your civilian life. Now, you're locked up in the brand-new Keyesville Federal Correctional Facility, which has been hastily modified to contain people with powers. With the lack of fanciful force fields and power-dampening technologies, they'd been forced to go with what they knew. Apparently, that took the form of doors and walls that had extremely high voltages pumped through them.\n*page_break\n\"Good morning, detainees,\" a very familiar female voice suddenly boomed in the central chamber. You stood up and walked to the door, looking out to see Aurora floating in the middle of the chamber, rotating slowly to see all of the few scattered cells in use.\n\n\"Thank you all for being so cooperative, especially those of you who walked in here voluntarily and saved all of us a great deal of pain,\" she calls out, her eyes seeming to linger upon you for a quick moment. \"Today will be registration day. Congress has pushed through legislation regarding all of us, and it is now time for us to step up and take full responsibility for ourselves and our actions, both in the past and the future. We will be registered as powered individuals, a classification which will be tied to our federal records and aid in holding all of us culpable for our actions. Those of you who aren't citizens or nationals of the United States of America will have a choice: registration in a separate foreign operator registry, or deportation with a travel ban into America.\"\n\nYou can hear those of the powered individuals in the prison that hadn't come in voluntarily. They're definitely riled up, shouting at Aurora and condemning her as a traitor. You shake your head and take a step back, breathing deep. Their words were being distorted and mixed into waves of echoing noise, but you hear someone in one of the cells close to yours: \"I have a family!\"\n*page_break\nThe cell door clanked as the mechanism pulling it open hit a lock at the far end of its motion. It had probably been a few hours since Aurora revealed the events of the day to the powered community locked up with you. You sit on your bed and look up to the now-open door, seeing Aurora float up and set down on the catwalk just outside.\n\n\"Before anything else is said or done here, I appreciate you walking in here voluntarily. I'm coming to you because I need help, and I think you're the only one who would be inclined to help me in any way,\" she says, stepping inside your cell.\n*label auronversation\n*hide_reuse\n*choice\n\t#\"Actually, I've started having second thoughts about this registration.\"\n\t\t*set doubts true\n\t\t\"Have you?\" Aurora asks, crossing her arms. \"That's unfortunate timing, considering everything going on. Look, whether you want to register or not, you're going to. It's the only way to truly help those in need out there while coexisting with the authorities. We can't keep staying in this very questionable grey area between morality and law.\"\n\t\t\n\t\tAurora sighs and glances out of your cell, looking up and down the rows of cell doors. She shakes her head and turns back to you, a very serious look on her face.\n\t\t\n\t\t\"Believe me, I've been talking with some very powerful people in the last month. This is the best option we have, and it's also the right thing to do.\"\n\t\t*goto auronversation\n\t*if (doubts = false) #\"I'm with you, what is it?\"\n\t\t\"New Dawn. I'll tell you more later. Thank you,\" Aurora says and flashes you a smile. \n\t\t*goto comingtohead\n\t#\"There's nobody else here you could talk to?\"\n\t\tAurora glances back at the rows of cells far behind her and seems to wince as she leans against the deactivated doorframe.\n\t\t\n\t\t\"I would like to say I do, but after all that has come to pass in the last week…I don't think even those I would consider friends would stand beside me right now.\"\n\t\t*goto auronversation\n\t#\"What do you want help with?\"\n\t\t\"New Dawn. I'll tell you more if you agree to do this with me.\"\n\t\t*goto auronversation\n\t#\"I'll stand with you.\"\n\t\t*goto comingtohead\n\t#\"No. I can't help you.\"\n\t\t*goto jailhouserocks\n\n\n*label comingtohead\n\"Guards will come escort you out of here in an hour, we'll get your registration out of the way and then get you suited up again. Thank you for agreeing to this,\" Aurora says and smiles, nodding her thanks to you.\n\nHer feet lift up off the ground as she begins drifting out of your cell. A clank informs you that the door has unlocked from its position, then begins closing at an increasing pace. A metallic thud brings it finally flush against the frame, and several bolts lock it into place. A powerful spark arcs between the mesh on the door and the doorframe as electricity begins to flow between the two once more.\n*goto jailyques\n\n\n*label jailhouserocks\n\"Hmm…I'd hoped to have you by my side on this. Unfortunately, it appears that this whole mess keeps being a series of miscalculations. Nobody wants to be a hero with accountability,\" Aurora says, shaking her head.\n\nHer feet lift up off the ground as she begins drifting out of your cell. A clank informs you that the door has unlocked from its position, then begins closing at an increasing pace. A metallic thud brings it finally flush against the frame, and several bolts lock it into place. A powerful spark arcs between the mesh on the door and the doorframe as electricity begins to flow between the two once more.\n\n\"I had high hopes for you, but now it seems you're following Nightreaver's road. That road will only lead to chaos in the streets.\"\n*label jailyques\n*page_break\nYou stand in the queue with a large, broad woman in front of you, her muscles bulging out of her prison jumpsuit, and a slim, nerdy-looking teenager fidgeting behind you. The wide corridor is barren and cold, all of you lit up by buzzing fluorescent lights. You sigh quietly while looking around. Some ways away from the queue stands one of the guards, clad in a dark jumpsuit with a belt full of gadgets. In his hands is a long baton with short prongs close to the tip, prongs equipped with small, shiny spikes. As with everything in the building, they have electricity running through them.\n\nUp ahead, someone shuffles into a small room at the far end of the corridor, and a wave of motion runs through the entire line. You take a few steps forward and continue waiting again.\n\nIt would stand to reason that someone you know should have popped up at some point. Everyone was allowed to keep their masks if they wore them, which was definitely kind of strange, but nobody looked familiar. Then again, you aren't quite sure just how big this whole round-up of powered individuals is on the outside. Everyone in the nation might be getting shipped to the same location, or California has a lot more powered folks in it than you'd imagined. From the amount of people that you were seeing during meals, you guessed that very few people with powers actually went into heroics. \n*if (alley_intervene = false)\n\tLooking back, maybe it hadn't been the obvious choice for you either, in the beginning. You still remember the screams coming from that alley. You could have helped, but chose not to.\n*page_break\nYou finally get to the end of the corridor, pumping with your feet a little bit while standing in order to keep the circulation going. With a yawn, you look around and guess from the general state of affairs that the queue has so far wasted at least a good few hours of your life. Now you're at a distance that you can hear the chatter from the room, guessing that there are maybe three or four people working there, trying to handle the entire load of registering you and your fellow detainees.\n\nAnother person is allowed inside, and you take a few steps forward. Now you're past the corner where the corridor continues in either direction. You can hear the ticking of a clock and glance up to see a large one, its arms moving slowly round. It's six o'clock. The queue has wasted at least five hours of your life. You breathe a heavy sigh that instantly gains you a nasty look from one of the guards.\n\nYou've just about resigned yourself to the wait again when you hear the echoes of a loud crash from down the corridor stretching to your right. All the guards turn immediately, then glance at one another. One of them goes for the radio to find out what's going on. \n*if (senses)\n\tYou can hear it already, way before the guard can get a response. You hear the voices, even as they get distorted from the echo: Nightreaver and Crimson Caracal.\n\nJust as the radio crackles with a response, you see a guard being flung past the corner at the far end. Two figures follow and round the corner as well. They start running towards you. Both are wearing detainee jumpsuits, although both have also donned bits of the body armour the heavier guards tend to wear, and their masks are like a shining beacon of light in the distance. Suddenly, when you see Nightreaver and Crimson Caracal rushing down the corridor, your extremely boring day is saved.\n*choice\n\t#Fight with them.\n\t\tYou glance down at your handcuffs and then back at the two figures getting closer. A guard pushes past you and takes a position in the middle of the corridor with the others, batons at the ready. You glance back down at your cuffs, then smile.\n\t\t\n\t\t*if ((energypower) and ((durability) or (adaptation)))\n\t\t\t*gosub energyuse\n\t\t\tIt's been a while since you got to use your powers, but now seems like the best opportunity for it. You focus upon the metal cuffs on your wrists and take a deep breath. You watch as the metal begins to change, ever so slightly.\n\t\t\t*if (fire > ice)\n\t\t\t\tThe metal begins turning dark, then a very dull red that quickly heats up to a crimson and then a bright orange. You feel your skin resist the heat of the melting cuffs and push harder with your focus. Turning a bright yellow, a sliver of the metal cuffs finally falls off in a molten blob, and you quickly shake the things off your wrists. A few small bubbles in your skin tell you that the heat was just about too much for you to handle, and the place where you burned yourself would be irritating you \n\t\t\t\t*if (healing)\n\t\t\t\t\tfor a few hours before your healing powers could do their thing.\n\t\t\t\t\t*goto surprisenub\n\t\t\t\t*else\n\t\t\t\t\tfor at least a few weeks.\n\t\t\t\t\t*goto surprisenub\n\t\t\t*else\n\t\t\t\tYou felt the space between your hand and the metal cuff tighten as a layer of frost built up, crystals of ice stabbing you at the microscopic level. You push with your focus until you hear the metal become audibly brittle, and at that point, it's just a matter of hitting it against something. You lunge at the wall nearby, the cuff shattering in a small explosion of frozen metal shards that shower the corridor. You're free.\n\t\t\t\t*goto surprisenub\n\t\t*elseif ((strength) and (durability))\n\t\t\t*gosub energyuse\n\t\t\tIt's been a while since the last time you focused your powers. With a smile, you stretch your shoulders and widen your elbows as far as they can naturally go, twisting the cuffs so your arms are straight over one another. Then you yank with your full force and the metal snaps, releasing your hands. You rub your wrists for a quick moment, then turn your attention back to the guards.\n\t\t\t*goto surprisenub\n\t\t*else\n\t\t\t*set cuffed true\n\t\t\tYou shake your hands violently, banging the cuffs together repeatedly. You don't have enough slack to get your hands out, you don't have the strength to snap them off, and you can't force the lock in any way. With a grunt, you look around and see the guards all carrying keys on their belts. One of them has to be a handcuff key.\n\t\t\t*goto surprisenub\n\t#Stay out of it.\n\t\tYou step back and watch as the two figures draw closer. A guard pushes past you and takes a position in the middle of the corridor with the others, batons at the ready. You look down at your handcuffs, then back at the guards, taking a few more steps back until you bump into the wall.\n\t\t\n\t\tThe three guards stand adamantly as the two vigilantes rush down the corridor, ready to resist their charge as much as they can. As the two get close, the middle guard suddenly turns and hits the guard to his right with his baton before turning the electricity on and shoving it directly into the guard to his left. Nightreaver and Caracal run forward, Caracal pouncing upon the guard that got hit in the face and making sure he's taken care of, while Nightreaver jumps and dropkicks the guard being shocked.\n\t\t\n\t\tThe man in the middle pulls off his helmet and withdraws his baton, looking at the two heroes clambering back to their feet. You see Nightreaver grumble something, then turn to the remaining guard.\n\t\t\n\t\t\"I'm with the—\" the guard begins, when a sudden explosion rocks the entire building. \"Ah, crap! It's started. I'm with the New Dawn. We're going to get you out of here.\"\n\t\t*page_break\n\t\tNightreaver turns to look directly at you and grabs a set of keys from one of the unconscious guards. He rushes over to you and begins looking through the keys to uncuff you, while Caracal gives you a dirty look and tells him that they should keep moving.\n\t\t\n\t\t\"I'm not leaving ${heroname} here,\" Nightreaver says, glancing back at her. \"I know how I was captured and how they treated me in here. The least we can do is help others escape. Especially good people like ${heroname}.\"\n\t\t\n\t\tThe feeling of fresh air on your wrists feels strange, and you rub your skin as Nightreaver looks at you and flashes a smile.\n\t\t\n\t\t*goto nubbie\n\t#Fight against them.\n\t\tYou step back and watch as the two figures draw closer. A guard pushes past you and takes a position in the middle of the corridor with the others, batons at the ready. You look down at your handcuffs, then back at the guards, taking a few more steps back until you bump into the wall.\n\t\t\n\t\tThe three guards stand adamantly as the two vigilantes rush down the corridor, ready to resist their charge as much as they can. As the two get close, the middle guard suddenly turns and hits the guard to his right with his baton before turning the electricity on and shoving it directly into the guard to his left. You see this happen and jump the guard by pure instinct, slamming him into the ground and starting to pound on him.\n\t\t\n\t\tNightreaver and Caracal run forward, Caracal pouncing upon the guard to your right, while Nightreaver jumps and dropkicks the guard to your left. Both of them glance your way and look at you quizzically before you lunge for Nightreaver to try and take him down. They're now fully aware of your intentions, and you suddenly feel hands gripping you from behind and throwing you around.\n\t\t\n\t\tYou find yourself slumped against the wall, shaking your head and slowly regaining your senses. The two vigilantes are running down the corridor, and you scramble to get the handcuffs unlocked and off your wrists. As they clatter upon the floor, you give chase to the two escaping vigilantes. A sudden explosion rocks the building and throws you against a wall, but you recover and keep moving.\n\t\t*page_break\n\t\t*goto almostchase\n\n\n*label surprisenub\n*set joint_escape true\n\nYou launch forward and crash into one of the guards just as Caracal and Nightreaver reach your end of the corridor. The guard that had brushed past you suddenly turns and strikes his baton directly into the guard to his left while you pummel the guard you targeted to his right. You look up and see the middle guard remove his helmet, turn off his baton and simply beat his opponent unconscious. \n*if (cuffed)\n\tYou fumble with the keys for a moment, but manage to get them off, rubbing your wrists and enjoying the freedom.\n*comment endif\n\n\"I wasn't expecting that,\" Nightreaver grumbles as he reaches you and looks at the two guards limp on the ground, as well as the one standing right next to you.\n\n\"I'm with the—\" the guard begins, when a sudden explosion rocks the entire building. \"Ah, crap! It's started. I'm with the New Dawn. We're going to get you out of here.\"\n*page_break\n*label nubbie\n\"Nice to see you,\" Nightreaver says and grabs your shoulder, pushing you down the corridor leading away from the cell blocks. The four of you begin running as another explosion rocks the building, and you hear the sound of shattering glass somewhere far down the halls of the prison.\n\nYou rush around a corner and into a larger room that's obviously some kind of entrance hall for the people working in the facility. The entire roof is missing, wind blowing into the hall and the sun shining above. The fresh air smells clear and refreshing, but you're quickly taken out of the moment by Nightreaver pulling you along.\n\nAs you rush across the hall and towards a set of doors that seem to be an exit, you see a flash of green and blue against the sky. Still running, you see Aurora crashing into the side of the building behind you. From the height and position, you guess that it's one of the cell blocks. From the corner of your eye, you see something else, something pure white shining in the sunlight. You look up to see Icarus, his large wings open and beating slowly in the air as he stares down Aurora, who's climbing back out of the wall.\n\n\"Come on! We have to go!\" Caracal shouts, bringing your attention back to the doors. One of them is held open by the guard who helped you, and just beyond them you can see the outside.\n*choice\n\t#Follow Caracal and Nightreaver.\n\t\t*goto followingalong\n\t#Intervene and help Aurora.\n\t\t*goto Aurorahelp\n\t#Intervene and help Icarus.\n\t\t*goto icarushelp\n\n\n*label followingalong\nYou hurry through the door along with the others, rushing out through the yard and constantly glancing up. You can hear the battle going on above from the grunts and shouts, as well as the booms when one of the two flying heroes gets thrown into a wall or ceiling. You hear a loud bang coming from the other direction and see a guard high atop a guard tower with her rifle pointed your way. The ground puffs next to Nightreaver as you keep running, but as you get ready for a second gunshot, you see the female guard getting knocked out, a figure in a long white cloak and a hood standing above her.\n\n\"What is this?\" you finally ask as the guard guides the three of you behind a small shack in the yard.\n\n\"We're breaking everyone out who wants to come. We need to take our city back. Pacifica is a warzone against powered folk. The National Guard is running the streets and they have some kind of special tactical force targeting vigilantes and taking them down hard. Barrier turned up dead thanks to them, but nobody knows how it happened, and they're not releasing any information,\" the guard tells you while trying to catch his breath.\n\n\"How are we getting out?\" Nightreaver asks, looking at the wilderness rising around the detainment complex with some worry in his eyes.\n\n\"We have trucks that can get you closer to Pacifica, but nobody is getting into the city in a vehicle without passing through a checkpoint. We'll be dropping you off before we hit those, allowing you to sneak into the city by other means,\" the guard said and looked around the corner, pointing out a few trucks in the distance.\n\n\"Hold on, we're supposed to trust these murderous bastards?\" Caracal says, looking at both you and Nightreaver. \"I've seen the people they leave behind. Blood-smeared messages, torture, unnecessary violence.\"\n\n\"We didn't have proper leadership. Those elements have been…Purged,\" a modulated voice says from next to you, and all four of you turn to see a familiar sight dressed in all white and a mask. \"Come, I will show you the way to the trucks so you can leave this damned concentration camp.\"\n*page_break\n*goto trucks\n\n\n*label almostchase\n*page_break\nAnother explosion rocks the building, throwing you off-balance as you're still running at full speed after the escaping duo.\n\nYou rush around a corner and into a larger room that's obviously some kind of entrance hall for the people working in the facility. The entire roof is missing, wind blowing into the hall and the sun shining above. The fresh air smells clear and refreshing, but you're quickly taken out of the moment by a noise from the far side: Caracal and Nightreaver opening a set of doors and slipping out.\n\nAs you rush across the hall, you see a flash of green and blue against the sky. Still running, you see Aurora crashing into the side of the building behind you. From the height and position, you guess that it's one of the cell blocks. From the corner of your eye, you see something else, something pure white shining in the sunlight. You look up to see Icarus, his large wings open and beating slowly in the air as he stares down Aurora, who's climbing back out of the wall.\n\nYou rush across the hall and slam yourself straight through the door the two figures escaped through, bracing yourself for some kind of an ambush on the other side. Instead of finding an ambush, you fing the outside world closed off by layers of fences.\n*page_break\nA gunshot booms as you turn to see where Nightreaver and Caracal might have gone, and the sound directs you to their location. They duck and weave as they run across the yard, then huddle behind some kind of a small shack, their trail visible by the small puffs as bullets hit the ground behind them. You look up to the tower, where a guard readies her rifle again, taking aim at the small shack. Suddenly, a figure clad in a white cloak and hood is standing next to her with a hand on the rifle. Purge. You hear the shriek of surprise, then a loud bang as the guard gets thrown against a wall.\n\nYou watch Purge blink away from the guard tower, and after a moment standing next to the shack, offering a hand to the pair of vigilantes still trying to figure out a way to escape.\n\nYou watch as Nightreaver takes Purge's hand and gets up, saying something to the figure in white before Purge runs off again at blinding speed. The man in his black mask then rounds the corner and keeps running, Caracal hot on his heels. As they gain distance, you hear a sudden noise from above and look up, only to see Icarus suddenly slamming against the lip of the roof just above you, Aurora stuck between him and the roof.\n\n*choice\n\t#Keep chasing Nightreaver and Caracal.\n\t\t*goto trucks\n\t#Intervene and help Aurora.\n\t\t*goto Aurorahelp\n\t#Intervene and help Icarus.\n\t\t*goto icarushelp\n\n\n\n*label Aurorahelp\n*set helpinghand \"Aurora\"\nYou glance at Caracal and Nightreaver, then back up at the two figures flying overhead and pummeling one another. With a sigh, you flex your muscles and steady your feet against the ground. \n*if (flight)\n\t*gosub energyusemin\n\tYour feet leave the ground straight away as you fly up and into the mix. You surprise Icarus with a sudden tug at his leg, pulling him down, then you hit him hard enough to disrupt his flight. He plummets down and crashes onto the roof. You look up to see Aurora looking back at you, blood dripping from her nose and her face fixed in confusion and surprise at your sudden arrival.\n\t*goto fightsty\n*elseif (jumping)\n\t*gosub energyusemin\n\tYou crouch and brace yourself for a moment, trying to time your jump just right. Then you leap into the air and take Icarus by surprise, reaching him with a single bound and grabbing onto his foot. With a firm tug, you bring him down to your level and hit him, turning him so as to fall under you as you come down. He cushions your landing as you both hit the roof, and you jump aside to look up at Aurora. She's looking back at you, blood dripping from her nose and her face fixed in confusion and surprise at your sudden arrival.\n\t*goto fightsty\n*elseif (teleport)\n\t*gosub energyuse\n\tYou focus on a spot up in the sky and reach out with your powers. Your vision blurs and an instant later, you feel yourself suddenly dropping. The wind blows the blur out of your eyes, and you see Icarus directly in front of you as you fall past. You flail your hands towards him and manage to grab one of his wings, pulling him down with you, then you hit him on the back of the head to avoid having him fly you back up. The two of you tumble down, and you manage to rotate the man under you just before you come down hard against the surviving rooftop. Icarus softens your fall just enough to brace yourself and roll off, avoiding any scrapes or injuries to yourself. As you rise up to your feet, you look up to Aurora and find her looking back down at you, blood dripping from her nose and her face fixed in confusion and surprise at your sudden arrival.\n\t*goto fightsty\n*else\n\tYou climb quickly up to the roof, keeping your eyes peeled upon the fight happening above you. With your feet planted on the half-destroyed roof, you can see Aurora's uppercut throwing Icarus back away from her. \n\t*if (energypower)\n\t\tYour flying opponent has his back to you, his demeanour showing him completely unaware that you've even begun to target him. \n\t\t*if (fire > ice)\n\t\t\t*gosub energyuse\n\t\t\tWith a sudden scream, Icarus turns around and begins flailing. Against the backdrop of a clear sky, you see the bright white feathered angel wings suddenly combust, raining embers as they dwindle to a light frame. It yet remains a mystery if the wings propel him or not, as the man falls from the sky and the sheer panic might have broken his concentration on staying aloft. He hits the broken roof hard and rolls, the fire slowly dwindling. You glance up at Aurora, who in turn has her eyes glued to Icarus's writhing body. She looks horrified for a moment, then gathers herself and seems more surprised and confused by your helping.\n\t\t\t*goto fightsty\n\t\t*else\n\t\t\t*gosub energyuse\n\t\t\tWith a grunt of audible confusion, Icarus begins frantically turning his head from side to side. Against the backdrop of a clear sky, you see the bright white feathered angel wings suddenly gather frost. Icicles form, fusing the feathers to one another, the frame within finally ceasing its movement as it becomes encased in a solid block of ice. It yet remains a mystery to you if the wings propel him at all, or if the sudden shock and confusion caused him to break his concentration, but the man certainly comes crashing down hard. The ice shatters as Icarus hits the broken roof, tiny shards of melting ice raining down upon you as you look up at Aurora. She seems puzzled by Icarus's sudden tumble from the sky, but then looks at you with a slight smile, some surprise and confusion still etched upon her face.\n\t\t\t*goto fightsty\n\t*else\n\t\t*if (gadget)\n\t\t\tYour hand goes directly to where your array of gadgets would usually be, only to find the rough, crumpled cloth of the prison jumpsuit. A curse escapes you as it dawns upon you again just where you are and what you're facing. \n\t\t*comment endif\n\t\t\n\t\tYou look around the roof, your eyes darting from object to object, trying to identify aything you might use. Finally, you find something that could help you: a metal pole that had once been an attachment point for an antenna or something like that. You rush over, bending it and ripping it off the bolts holding it to the damaged roof. The screech of the metal brings some attention to you, which you notice when you turned back and see Aurora and Icarus shooting you suprised sidelong glances.\n\t\t\n\t\tYou take the pole in your hand and feel the weight of it for a moment as the two flying opponents stall their fight, waiting for you to take action. You swing the pole back, then launch forward, tossing the pole like a spear directly at the two. Both of them fly apart as the pole draws closer, but as it arcs through the space where Icarus had been, Aurora takes her chance and sucker-punches Icarus straight out of the air. He slams into the already-broken roof as you look up to see Aurora turning to look at you, blood dripping from her nose as she nods a thank you for your unexpected help.\n\t\t*goto fightsty\n\n*label icarushelp\n*set helpinghand \"Icarus\"\nYou glance at Caracal and Nightreaver, then back up at the two figures flying overhead and pummeling one another. With a sigh, you flex your muscles and steady your feet against the ground.\n\n*if (flight)\n\t*gosub energyusemin\n\tYour feet leave the ground straight away as you fly up and straight into the mix. You surprise Aurora with a sudden tug at her leg, pulling her down and then hitting her hard enough to disrupt her flight. She plummets down and crashes onto the roof. You look up and see Icarus looking back at you, his bright feathered wings marked with blood and grime, and his face fixed in confusion and surprise at your sudden arrival.\n\t*goto fightsty\n*elseif (jumping)\n\t*gosub energyusemin\n\tYou crouch and brace yourself for a moment, trying to time your jump just right. You leap into the air and take Aurora by surprise, reaching her with a single bound and grabbing onto her foot. With a firm tug, you bring her down to your level and hit her, turning her to fall under you as you come down. The woman cushions your landing as you both hit the roof, and you jump aside to look up at Icarus. He's looking back at you, his bright feathered wings marked with blood and grime, and his face fixed in confusion and surprise at your sudden arrival.\n\t*goto fightsty\n*elseif (teleport)\n\t*gosub energyuse\n\tYou focus on a spot up in the sky and reach out with your powers. Your vision blurs, and an instant later, you suddenly feel yourself dropping. The wind blows the blur out of your eyes, and you see Aurora directly in front of you as you fall past. You flail your hands towards her and manage to grab her leg, pulling her down with you and hitting her on the back of the head to avoid having her fly you back up. The two of you tumble downwards, and you manage to rotate the woman under you just before you come down hard against the surviving rooftop. Aurora softens your fall just enough to brace yourself and roll off, avoiding any scrapes or injuries to yourself. As you rise up to your feet, you look up to Icarus and find him looking back down at you, his bright feathered wings marked with blood and grime, and his face fixed in confusion and surprise at your sudden arrival.\n\t*goto fightsty\n*else\n\tYou climb quickly up to the roof, keeping your eyes peeled on the fight happening above you. With your feet planted on the half-destroyed roof, you can see Aurora's uppercut throwing Icarus back away from her. \n\t*if (energypower)\n\t\t*gosub energyuse\n\t\tYour flying opponent has her back to you, her demeanour showing that she's completely unaware that you've even begun to target her.\n\t\t*if (fire > ice)\n\t\t\tAurora lets out a shriek as a sudden burst of flame explodes around her and swirls into the shape of an inverted tornado. The inferno clearly also scorched Icarus, as he backs away, but you maintain control and push harder against the flying woman. Her shrieks echo in your ears as she bursts out of the fire and topples over in mid-air, crashing hard onto the broken roof beneath her. Icarus looks absolutely horrified for a moment, then gathers himself and looks at you with surprise and confusion over your helping him.\n\t\t\t*goto fightsty\n\t\t*else\n\t\t\tWith a grunt of audible confusion, Aurora slows down and starts trying to shake her limbs. Against the backdrop of a clear sky, you see her form begin to gather frost. Icicles form on her boots as she slowly succumbs, finally ceasing all her movement as she becomes encased in a solid block of ice. Her flight powers freeze over as well, apparently, as she suddenly plummets directly down to the broken roof. The ice shatters as Aurora hits the roof hard, tiny shards of melting ice raining down upon you as you look up at Icarus. He seems puzzled by Aurora's sudden tumble from the sky, but then looks at you with a slight smile, some surprise and confusion still etched upon his face.\n\t\t\t*goto fightsty\n\t*else\n\t\t*if (gadget)\n\t\t\tYour hand goes directly to where your array of gadgets would usually be, only to find the crumpled and rough cloth of the prison jumpsuit. A curse escapes you as it dawns upon you again just where you are and what you're facing. \n\t\t*comment endif\n\t\t\n\t\tYou look around the roof, your eyes darting from object to object and trying to identify aything you might use. Finally, you find something that could help you: a metal pole that had once been an attachment point for an antenna or something like that. You rush over, bending it and ripping it off the bolts holding it to the damaged roof. The screech of the metal brings some attention to you, which you notice when you turn back and see Aurora and Icarus shooting you suprised sidelong glances.\n\t\t\n\t\tYou take the pole in your hand and feel the weight of it for a moment while the two flying opponents stall their fight, waiting for you to take action. You swing the pole back, then launch forward, tossing the pole like a spear directly at the two. Both of them fly apart as the pole draws closer, but as it arcs through the space where Icarus had been, Aurora takes her chance and sucker-punches Icarus straight out of the air. He slams into the already-broken roof as you look up at Aurora turning to look at you, blood dripping from her nose as she nods a thank you for your unexpected help.\n\t\t*goto fightsty\n\n\n*label fightsty\n\nWith half of the flying fighters down and out, at least for the time being, you look over to where you'd seen Crimson Caracal and Nightreaver running off to, seeing no sign of them. In the distance rises a plume of dirt, which is being kicked up from the road leading up to the facility. You glance around, seeing the forested mountains behind you, the trees surrounding the facility's outer fences, and somewhere far beyond, an opening and the slight shimmer of a lake.\n*page_break\n*if (helpinghand = \"Aurora\")\n\tYou look up to see Aurora, who in turn was observing the building in the direction that the two vigilantes had been heading for. She turns to look at you, a narrow smile dancing on her face.\n\t\n\t\"They'll be heading for the trucks that smashed through the outer perimeter. New Dawn is trying to break them out, because they remain intensely defiant to what our powered community should be doing. I can get you to them in time, but I'll need you to work with me if I'm to help you. None of the neutrality or insecurity BS. You work with me to set things right,\" she says, her smile morphing into a serious, soul-shattering stare.\n*if (helpinghand = \"Icarus\")\n\tYou look up to see Icarus, who in turn was observing the building in the distance, the one that the two vigilantes had been rushing towards. With a grim and determined look on his face, he turns to you and nods.\n\t\n\t\"They'll be heading to the trucks. There are some waiting just past that building. You can either chase after them and try to get to the trucks in time before they leave, or seek your own way out. One way or the other, you can't stay. I'll fly you past the building, and then you'll be on your way. I doubt Aurora will stay down for long,\" Icarus says solemnly, looking back at Aurora's still body. He sighs.\n\t\n\t\"This place is a concentration camp, and we don't know their true intentions in collecting us. We need to be wary. I do know for a fact that there are corporate elements here studying each and every one of the detainees,\" Icarus says, looking down and offering a narrow smile as his brow furrows.\n*if ((helpinghand = \"Icarus\") and not (nolobby))\n\t\"Personally, I would hate to see you get cut up under the pretence of science. You're far too good-looking to suffer under a knife like that.\"\n\n*if ((joint_escape) and (helpinghand = \"Aurora\"))\n\tA thought goes through your mind immediately: you would be able to take Aurora down with the help of Caracal and Nightreaver, and getting her to fly you to them would save a lot of time and energy. You glance at the facility you just escaped from, then back at Aurora.\nYou offer a quick but decisive nod of agreement. ${helpinghand} scoops you up in a quick motion and you head for the building across the yard.\n*page_break\n*label trucks\n\n*if (helpinghand = \"Undefined\")\n\t*if (joint_escape)\n\t\tYour feet pound on the ground as you run with the other two vigilantes, Purge jolting ahead in bursts of speed and guiding you to the large building looming across the yard. Its concrete façade and ascetic aesthetic send a chill rolling up your back, but fortunately Purge guides you along towards the side of the building, where the layers of fence meet the wall.\n\t\t\n\t\t\"Through here. The area past the fence leads to the parking area in front of the facility. We'll be riding out through the main gate,\" Purge says, suddenly disappearing in a blur, and a mere moment later reappearing on the other side of the electrified chain-link fence.\n\t\t\n\t\t*if ((energypower) and (fire > ice))\n\t\t\t*gosub energyuse\n\t\t\tA grumble leaves your throat as another fence stands in your way. You push out with your powers and concentrate upon the metal. The air warps, the metal begins to turn a dull brown and smoke, then in a flash it becomes bright red, then orange, and then it begins to droop. The metal links ooze to the ground in a slow-forming rain of fire, and you have your passage through. Electricity arcs from one cooling molten glob of the fence to another before stabilizing to run on the chain-link that remains intact above the hole.\n\t\t\t\n\t\t\tCrimson Caracal and Nightreaver both look at you and smile, passing through the hole you made and rushing off after Purge to get to the trucks. You follow suit.\n\t\t\t*goto truckyrucky\n\t\t*elseif (wallcrawl)\n\t\t\t*gosub energyuse\n\t\t\tYou exchange looks with Nightreaver, who then turns to glance at Caracal, then at the concrete wall the fence is joined to. He rolls his shoulders, unleashing a series of pops as he flexes his muscles. With a smirk, he places one hand upon the wall, then the other, then a foot, and bounces up to attach his second foot around waist height. Even in the inflexible jumpsuit, he manages to be extremely agile as he swings his limbs up and very deftly crawls to just past the top of the fence.\n\t\t\t\n\t\t\t\"Boost her up to me, and I'll swing her over,\" he says and offers a hand, supporting himself with his feet while his back is pushed against the wall and one hand providing support from high over his shoulder. His other hand is lowered towards you.\n\t\t\t\n\t\t\tYou climb up the wall some ways so you can both reach Caracal and help her reach Nightreaver. The woman behind you grumbles something under her breath as you offer a leg down to her, her hands grasping it and pulling herself up. She makes short work of using you as a ladder, lifting herself to stand on your shoulders, her entire body shaking as she teeters on a fine balance. Her knees bend and she readies herself, reaching out to Nightreaver's hand and jumping up to grasp it. The kick of her feet against your shoulder shoves you back, so you can't see if she made it as you're forced to very quickly adjust your own position.\n\t\t\t\n\t\t\tYou hear the sound of feet on the ground on the other side of the fence and turn to look, seeing Caracal standing and looking at you. Nightreaver is already crawling over the top and back down to the ground. You follow suit, catching up just as they start running after Purge and towards the trucks.\n\t\t\t*goto truckyrucky\n\t\t*elseif (teleport)\n\t\t\t*gosub energyuse\n\t\t\tYou glance at Nightreaver and Caracal, then concentrate upon the space next to Purge. You feel the familiar blurring overtake your vision and a sense of weightlessness, which quickly subsides as you reappear standing next to the white-clad figure. You can see cars lined up in the yard past the corner of the building, with several trucks parked there as well.\n\t\t\t\n\t\t\tLooking back, you see Nightreaver crawling up the wall, Caracal clinging to his back as they shuffle along. Stifling a snicker over the fairly awkward scene, you wait patiently for them to cross. When they finally reach the ground again, both rush quickly past you and into the parking area. Purge rushes ahead to show all of you to the trucks, and you follow them.\n\t\t\t*goto truckyrucky\n\t\t*else\n\t\t\t*gosub energyuse\n\t\t\tYou bend your knees and launch yourself clear over the fence, landing softly next to Purge. You can see cars lined up in the yard past the corner of the building, with several trucks parked there as well.\n\t\t\t\n\t\t\tLooking back, you see Nightreaver crawling up the wall, Caracal clinging to his back as they shuffle along. Stifling a snicker over the fairly awkward scene, you wait patiently for them to cross. When they finally reach the ground again, both rush quickly past you and into the parking area. Purge rushes ahead to show all of you to the trucks, and you follow them.\n\t\t\t*goto truckyrucky\n\t*else\n\t\tYour feet pound on the ground as you run after the other vigilantes. You can see Purge jolting ahead in bursts of speed and guiding Caracal and Nightreaver to the large building looming across the yard. Its concrete façade and ascetic aesthetic send a chill rolling up your back, but fortunately Purge guides them towards the side of the building instead of inside. At the corner, you can see the layers of fence meet the wall.\n\t\t\n\t\tYou keep on running, watching while Nightreaver climbs up onto the wall and Caracal climbs onto his back and holds on tight. Purge disappears for a moment, appearing on the other side of the fence and looking back to you as he waits. Nightreaver crawls very deftly over the fence, then drops to the ground on the other side, letting Caracal off before the group disappears around the corner again.\n\t\t\n\t\t*if (energypower)\n\t\t\t*gosub energyuse\n\t\t\tA grumble leaves your throat as another fence stands in your way. You push out with your powers and concentrate upon the metal. The air warps, the metal begins to turn a dull brown and smoke, then in a flash it becomes bright red, then orange, and then it begins drooping. The metal links ooze to the ground in a slow-forming rain of fire, and you have your passage through. Electricity arcs from one cooling molten glob of the fence to another before stabilizing to run on the chain-link that remains intact above the hole.\n\t\t\t\n\t\t\tYou rush to catch up to the escaping vigilantes.\n\t\t\t*goto truckyrucky\n\t\t*elseif (wallcrawl)\n\t\t\t*gosub energyuse\n\t\t\tYou follow Nightreaver's suit and hop onto the wall as soon as you can reach it, crawling on it as fast as you've ever crawled to try and make up time. You reach the top of the fence and can hear the buzzing of the electricity, then you drop down to the ground and roll around the corner. Emerging from the roll, you take off running again, passing the corner and picking up the pace.\n\t\t\t*goto truckyrucky\n\t\t*elseif (teleport)\n\t\t\t*gosub energyuse\n\t\t\tWhile running, you concentrate upon the space past the fences as hard as you can. You've never tried something like this before, but you know deep down that you can make it. The familiar blurring overtakes your vision, and you feel weightless for a moment. Then your foot hits the ground again as you reappear on the other side of the layers of fencing, still in motion. Unfortunately, your legs weren't quite up to speed on the momentum, and you can feel yourself being thrown off-balance.\n\t\t\t\n\t\t\t*if (agility)\n\t\t\t\tVery deftly, you throw yourself into a roll, kicking back to your feet on the other end and careening around the corner to continue the chase.\n\t\t\t\t*goto truckyrucky\n\t\t\t*else\n\t\t\t\tYou smash against the ground and can feel the gravel chafing against your skin as your momentum gets ground down. With a loud grunt and a curse, you rush back to your feet and get back up to speed, rushing around the corner and after the vigilantes.\n\t\t\t\t*goto truckyrucky\n\t\t*else\n\t\t\t*gosub energyuse\n\t\t\tYou take a few longer hops in your run, bending your knees on the last hop and bounding your way clean over the fence. Your feet hit the gravelly ground on the other side and slide for a moment, but you manage to maintain control and rush around the corner, hot on the heels of the vigilantes.\n\t\t\t*goto truckyrucky\n*else\n\tYour feet touch the ground on the other side of the building, and in front of you opens a large yard with four trucks lined up in perfect order. They're black, designed to be open-bed, but now have canvas structures to shroud whoever would be riding inside. You can't see Caracal or Nightreaver anywhere, which isn't surprising as a convoy of military trucks is driving in through the main gate when you land.\n\t\n\t${helpinghand} looks at you, then to the incoming trucks, and pushes you behind one of the parked cars to keep you out of sight, what with your brightly coloured jumpsuit still on.\n\t\n\t\"I'll try and go fetch your gear before any more fighting happens. Stay out of sight,\" ${helpinghand} says, then quickly takes flight again, heading back towards the heart of the detainment facility. You peek under the car and narrow your eyes as you see the trucks screeching to a halt, surrounding the gated entrance and securing it under tight guard. Armed men pour out of the trucks even before they've fully stopped, roughly half of them rushing into the building.\n\t*goto keepontrucking\n\n*label truckyrucky\n*page_break\nAs you run after Caracal, Nighteaver, and Purge, in front of you opens a large yard with four trucks lined up in perfect order. They're black, designed to be open-bed, but now have canvas structures to shroud whoever would be riding inside. You can't see Caracal or Nightreaver anywhere, which isn't surprising as a convoy of military trucks is driving in through the main gate when you arrive.\n\nYou duck behind one of the parked cars to keep out of sight and pause to have a good look at what's happening. You peek over the hood and narrow your eyes as you see the incoming trucks screeching to a halt, surrounding the gated entrance and securing it under tight guard. Armed men pour out of the trucks even before they've fully stopped, roughly half of them rushing into the building.\n\n*label keepontrucking\n*page_break\n\"I want a patrol across the parking lot, two by two, clockwise. Make sure nobody has gotten this far. Sergi! I want your group to hold this gate. You two, with me to administration. Keep on frequency Delta.\"\n\nBoots rush across the parking lot as you continue peeking at the armed people slowly dispersing to their assigned duties. The trucks they came in are blocking the way out, making escape much harder to achieve without going in personally to move the vehicles. The alternative would be to run through the fence.\n\n*if (joint_escape)\n\t\"No going through the gate, we'll need to go through the fence,\" Nightreaver mutters, his eyes focused upon the fences rising all around the parking lot. \"Everybody in the truck. None of the other cars will have the mass or ground clearance to smash through and drive off-road. Get to the closest town of some kind, switch cars, then rush back to the city.\"\n\t\n\tYou exchange quick looks with the others before you all nod in unison. Slowly and quietly, Caracal reaches up and pops open one of the truck's cabin doors and climbs in. As she gets further in, she seems to struggle with something, heaving back and forth. With a final jerk, she pulls out a thin man, prompting Nightreaver to rush to take him and place him on the ground. When you get a better look, you have a perfect view of several holes in his head: gunshot wounds.\n\t\n\tNightreaver turns to Purge with a grim frown, then follows Caracal into the cabin. Caracal is already on a cramped shelf behind the seats, leaving the passenger seat empty for now.\n\t\n\t\"Passenger seat is yours. I will make my own way…\" Purge says, only to be cut off by Nightreaver growling from the cabin. \n\t\n\t\"No, you're coming with us and explaining everything. What the hell has been happening for the last year?\" he demands with a look that makes the white-clad figure pause, then climb inside in silence.\n\t\n\tYou follow and take the passenger seat, closing the door behind you and buckling up.\n\t*page_break\n*if not (joint_escape)\n\tYou hear the pop of a car door being opened and watch as Caracal climbs up halfway into the cabin of one of the trucks. She struggles with something that you can't see from your position, then some kind of mass slumps down through the gap of the door, and Nightreaver helps it to the ground before sharing some words with Purge. Then, they climb inside the cabin and close the passenger side door.\n\t\n\tYou look around in haste, rushing to another safe spot behind a car. The truck starts, and you hear a shout of surprise from the guards blocking the gate, bringing their attention to the vehicle being stolen. You skip around the back of the small sedans and coupés, stopping behind one of them as the truck suddenly kicks out of the parking spot and heads directly for the fence.\n\t\n\tIn the chaos of the truck smashing through the fences, electricity sparking and guards hollering in the background, you manage to slip inside the canvas-covered back of the truck.\n\t*page_break\n\nThe truck smashes through the last layer of fence, and you feel the ground beneath the vehicle sink and grip the wheels as it struggles to push forward. Loud shouts come from the blockade at the main gate, trying to halt the progress of the vehicle or alert others to it. The tail slides around as Nightreaver kicks the gas pedal, the rear wheels spinning and finally gripping onto the soil, propelling you all forwards.\n\nA gunshot rings out behind you, followed quickly by another, and another. You can clearly hear the canvas roof on the back of the truck getting ripped by errant bullets that ricochet off the backboard or sides of the truck. One lucky bullet shatters the back window of the cabin and falls somewhere under the seats as it loses momentum.\n\nThe truck keeps rolling along, the tires now safely on a tightly packed gravel road. Then the truck turns, and most of the noise is suddenly gone as the wheels hit nice, smooth asphalt.\n\n\"Looks like we're clear. We'll need to switch to something else as soon as possible,\" Nightreaver grumbles loudly and continues to drive.\n\n\"Time for some answers,\" Crimson Caracal pipes up, leading Purge to give a sigh through the shimmering mask's modulator.\n\n\"Yes. I suppose so. But you won't like any of them.\"\n*page_break\n\"Before anything else, you need to know about the New Dawn. I used to think it meant something greater, a larger group of the downtrodden with interesting and valuable powers banding together. People who would never step up to make themselves known like you folks. I stumbled upon them some time ago, but did not join their ranks before I was taken away after a horrific car accident. I was led to some kind of underground research lab, tested, prodded, and hooked up to machines just to keep me alive. There I found the true Dawn,\" Purge voiced through the modulator, and you could hear some heavy breathing through it as well. \"She was a woman, and she had taken over the whole lab. Instead of it being a cage for her, where the scientists would poke and prod at her to figure out a serum for enhanced capabilities in other people, she turned it into her private little playpen. She breathed life back into me, and gave me the power to go faster than any being on this planet.\"\n\n\"Enough with the sob story. Get to the point,\" Nightreaver roars from the driver's seat.\n\n\"The point…the point is that the underground lab was owned and run by Reissman Industries. They're under a unique black-bag contract to supply the government with the serum, but not only are they double-dealing by having contracts with the Russians and Chinese, they're also seeking to control all powered people out there. The government is helping them with this. The facility we just broke out of was only the first in their larger plan. The Registration Act, soon there's going to be suppressing medicine to help 'control' powers, then chips to 'monitor' power levels,\" Purge says, the modulator crackling as the voice becomes more rapid and heated in tone.\n\n\"You're nuts,\" Caracal says, \n*if (caracal_met = \"fight\")\n\tbringing a smirk to your face. Last couple of times you met her, she'd been the one spouting conspiracy theories.\n\t*goto expoexpo\n*else\n\traising a hush of protest from Nightreaver. She falls silent.\n\t*goto expoexpo\n\n*label expoexpo\n\n\"That massive fireball a week back was Dawn breaking out of the lab. Or more precisely, exposing the lab. She took over the New Dawn after that and began putting things in order. We want to expose Reissman, we want there to be freedom for powered people, we want to usher in a new age of tolerance and security. From what I hear, you two have the same goals in mind,\" Purge says, exchanging lengthy looks with both Nightreaver and Caracal.\n\n\"Aurora is their pawn in all of this. She trusts the government blindly. She trusts the law and that it's being exercised, not realizing how her actions are constantly at odds with that. The government in turn pushed her into the hands of Reissman to play puppetmaster,\" Nightreaver says as he finishes putting together all the puzzle pieces, sighing loudly and slamming his fist against the steering wheel.\n\n*if (joint_escape)\n\t\"Nightreaver, Caracal, ${heroname}…I'm helping you escape because you three are of special interest to Dawn. We're going to take down Reissman in one solid strike. We're going to storm the Star of Pacifica, get the dirt on him, and make sure he doesn't escape. He lives in the penthouse these days, and we can pipe any video evidence to the ad screens outside while we take Reissman in. He has some kind of special security, they'll be trained to deal with anyone with powers. Dawn and I need your help to make this happen,\" Purge finishes. The two vigilantes exchange grave looks, but eventually both Nightreaver and Caracal nod in unison: they're in. Now all of them turn to look at you.\n*if not (joint_escape)\n\t\"Nightreaver, Caracal…I'm helping you two escape because you're of special interest to Dawn. We're going to take down Reissman in one solid strike. We're going to storm the Star of Pacifica, get the dirt on him, and make sure he doesn't escape. He lives in the penthouse these days, and we can pipe any video evidence to the ad screens outside while we take Reissman in. He has some kind of special security, they'll be trained to deal with anyone with powers. Dawn and I need your help to make this happen,\" Purge finishes. The two vigilantes exchange grave looks, but eventually both Nightreaver and Caracal nod in unison: they're in.\n*comment endif\n\nYour mind is racing, taking in all of Purge's exposition.\n*page_break Two Days Later.\nTwo days have passed since the breakout. You sit atop a roof in the middle of Pacifica, looking at the beaming tower known as the Star of Pacifica. Far below, trucks roll around and people can be heard chanting. Things have gotten much worse in the week you were gone than you'd even dreamed. The few powered individuals of note that had refused to either register or turn themselves in had initiated a kind of popular movement. In turn, the Governor had been pushed to declare a state of emergency and bring in the National Guard. The whole thing was a mess, a powderkeg waiting to explode. You, on the other hand, are calm as you think back upon recent events.\n\nAfter Caracal and Nightreaver had left the truck and taken a car to drive back to the outskirts of Pacifica, you got out and found your own way. Purge, as usual, had run off. You think back upon the decision you made after that, wondering if it was the right one after all. For better or worse, you found yourself sitting in a quaint diner in the mountains, having changed your clothes and taken off your mask in order to blend in. Sitting at the corner table, your eyes were glued to the old-fashioned wall-mounted phone.\n*choice\n\t*if ((phone = true) and not (ferrisnamed = true)) #I contacted the huge man who gave me the burner phone.\n\t\tThe ringing line was daunting at first, and you felt your heart pounding in your throat as you waited for anything from the other side. Finally, you heard the crackle of the phone being picked up, followed by an instant and overwhelming silence that momentarily made you think the phone was defective. However, you eventually remembered a thing or two from spy films and called into the void.\n\t\t\n\t\t\"Hello? Um, I have information on Dawn. Two days, on the roof of the building opposite the Star, across the square,\" you said, trying to sound as confident as you could. Whoever was on the other end hung up.\n\t\t\n\t\t*goto mamroofie\n\t*if ((phone = true) and (ferrisnamed = true)) #I contacted Ferris Bernard, the man who gave me the burner phone.\n\t\tThe ringing line was daunting at first, and you felt your heart pounding in your throat as you waited for anything from the other side. Finally, you heard the crackle of the phone being picked up, followed by an instant and overwhelming silence that momentarily made you think the phone was defective. However, you eventually remembered a thing or two from spy films and called into the void.\n\t\t\n\t\t\"Hello? Ferris? I have information on Dawn. Two days, on the roof of the building opposite the Star, across the square,\" you said, trying to sound as confident as you could. Whoever was on the other end hung up.\n\t\t\n\t\t*goto mamroofie\n\t#I found a way to contact Aurora.\n\t\tYou took a greyhound back to the city, circumventing the roadblocks placed along the way by being one of a dozen in a large vehicle. The guards didn't care as much as they should have, and you passed through to the city without issues. Once there, you made short work of recovering your backup equipment, then headed to some of Aurora's haunts. Delivering a message proved much harder than it should have been, and eventually you had to go sleuthing for a contact number for the facility you'd just broken out of. In any case, the message was short and sweet: meet on the rooftop you're now sitting on.\n\t\t\n\t\tWith a quiet yawn, you sit down and continue waiting patiently. The Star of Pacifica shines like a beacon before you, the massive screens showing ads for beauty products, fast food, and trucks. Sometimes all three at the same time. The air rushes past you, and the green-blue blur coursing through your vision is a welcome sight when it comes. You bound onto your feet to welcome your fellow hero. Aurora sets down upon the roof behind you, crossing her arms expectantly and furrowing her brow.\n\t\t\n\t\t\"Back in the city? I thought you would have been far gone by now,\" she says, taking in a quick, heavy breath. \"I got your message. What do you want?\"\n\t\t\n\t\t*if (helpinghand = \"Aurora\")\n\t\t\t\"Remember, I helped you deal with Icarus. I never even learned why the two of you were fighting in the first place. And I never even get my gear back,\" you mention, noticing Aurora's face loosening slightly, her eyes glancing down at her feet. \n\t\t\"I called you here because something is about to happen. Something neither of us wants to see. I heard Purge feed a lot of information to Nightreaver and Caracal during the escape, and I think they're allying with the cult we're both familiar with: New Dawn.\"\n\t\t\n\t\tYou explain the entire affair in some detail to Aurora, and her body language changes over the course of your speech. She uncrosses her hands, begins pacing, and keeps glancing at the Star of Pacifica looming behind you as she listens to every word. Finally, as you end your story, she stops and stands still for an extended moment, her eyes glued to the lit-up top of the skyscraper and the penthouse where Reissman lives.\n\t\t\n\t\t\"I'm thankful you've come to me with this information instead of anyone else. The situation is very serious…\" she mutters and turns to you, offering a weak smile. \"I feel like I owe you an explanation. I've been working closely with the government ever since I started in San Francisco. I know of Reissman's objectives, and I'm involved in all of this because someone needs to keep an eye on him and his methods. But what he's doing is valuable to all of us. All I have told you and the others is true about my own motivations: we should be held accountable, in a registry, act within the confines of law wherever it can be applied to our heroics. Reissman, I believe, will act as a major piece in gathering that kind of trust and clout.\"\n\t\t\n\t\t\"How? Why?\" you question, and Aurora nods with a smile.\n\t\t\n\t\t\"It's hard to explain, I don't quite understand the details. Reissman Industries has a secret research team working on figuring out what makes us tick. They want to figure out what's so different about us, and then use that information to enhance the rest of humanity. Imagine it. We could hold the cure for cancer inside us,\" Aurora says, her idealism shining through her like a wild bonfire.\n\t\t\n\t\t*fake_choice\n\t\t\t#Agree with her.\n\t\t\t\tYou nod to her as she looks at you, her eyes burning with passion and her face painted with an expectant, giddy smile. She bursts into a laugh as you agree with her and has to struggle to regain her composure, her bubbly nature spilling out of her heroic costume. She clears her throat and brings her attention back to the skyscraper behind you, forcing her face to tighten into more of a blank slate.\n\t\t\t\t\n\t\t\t#Question her ideals.\n\t\t\t\t\"They could also turn that upon us. Break our powers, kill us, torture us, use our powers to enhance soldiers. How could we be a part of something like that?\" you ask, and Aurora shakes her head in reply.\n\t\t\t\t\n\t\t\t\t\"No, it's…we can't think of the possible negative outcomes when there's so much good we're achieving, and can achieve in the future.\"\n\t\t\t\t\t\t\n\t\t\"Look, I'll need your help. I can put out the word that they should increase security, but we'll need to get involved. I still have duties all over the place that I must take care of, but you should be a wild card for all parties involved,\" Aurora says, nodding her head towards the penthouse. \"I can only assume that you'd want to help me stop Nightreaver and Caracal, as well as New Dawn. That is why you called me here, right?\"\n\t\t\n\t\t*choice\n\t\t\t#\"Yes, I want to help you take them down.\"\n\t\t\t\t*set loyal_aurora true\n\t\t\t\t*set endgame \"Loyal\"\n\t\t\t\t\"Good. I'll keep an ear out on what's happening here. I'll make contact with security at the Star of Pacifica, get a direct line to them. You'll need to stay alert and close by to keep monitoring the situation. I promise, I'll come as soon as I can when something—anything—happens,\" Aurora says and smiles warmly, placing a hand on your shoulder and gripping it lightly before her boots leave the ground and she flies off in a blur of colour.\n\t\t\t\t*goto roofie\n\t\t\t*if (sexual = \"Women\") #\"Actually, I called because I've come to care about you and wanted to make sure you're all right.\"\n\t\t\t\t*set flirt_aurora true\n\t\t\t\t\"Oh, that's sweet of…\" Aurora says, pausing, her eyes darting to look at you with one eyebrow raised. \"Oh…oh, I…wow, um…I don't know what to say.\"\n\t\t\t\t\n\t\t\t\tShe pauses long enough to make things awkward, and both of you go to clear your throats. You quickly answer her question in order to move on from the awkward moment.\n\t\t\t\t*choice\n\t\t\t\t\t#\"The answer is yes. I want to help you take them down.\"\n\t\t\t\t\t\t*set loyal_aurora true\n\t\t\t\t\t\t*set endgame \"Loyal\"\n\t\t\t\t\t\t\"Good. I'll keep an ear out on what's happening here. I'll make contact with security at the Star of Pacifica, get a direct line to them. You'll need to stay alert and close by to keep monitoring the situation. I promise, I'll come as soon as I can when something—anything—happens,\" Aurora says and smiles warmly, placing a hand on your shoulder and gripping it lightly before her boots leave the ground and she flies off in a blur of colour.\n\t\t\t\t\t\t*goto roofie\n\t\t\t\t\t#\"The real reason I called you was to make sure that you don't intervene.\"\n\t\t\t\t\t\tAs soon as you finish your sentence, Aurora lunges at you, her hands balled into fists.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"You won't do anything to me!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if (senses)\n\t\t\t\t\t\t\tYour heightened senses kick in as soon as the hero twitches into motion. Her fist swings just past your head, a strong air current rushing into your ear as you make your best effort to dodge the strike. As you scramble away from the fist, your senses alert you to a second strike incoming. \n\t\t\t\t\t\t\t*if (agility)\n\t\t\t\t\t\t\t\tYour body is already in motion, twisting to the side to dodge the second attack, bringing you around to make an unintentionally fancy flip in order to get out of the way in time. You land on your feet, crouched low and looking up to see Aurora already streaking across the sky in a blur of green and blue.\n\t\t\t\t\t\t\t\t*goto roofie\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYour body isn't as fast as your mind, however, as you try to twist away from the hit but feel the uppercut hit you straight in the gut nonetheless. \n\t\t\t\t\t\t\t\t*if (durability)\n\t\t\t\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t\t*elseif (agility)\n\t\t\t\t\t\t\tYou see the blow coming just in time to try and roll away from it. Aurora's fist swings just past your head, a strong air current rushing into your ear as you make your best effort to dodge the strike. As you scramble away from the fist, you steady yourself directly in the path of another blow heading your way. In a mighty attempt, you try to dodge, but you can't get out of the way in time.\n\t\t\t\t\t\t\t*if (durability)\n\t\t\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tThe fist looks like it's heading for your face. In a moment of pure reflex, you throw your hands up and then down to try and guide the incoming blow out of the way. The fist glances off one of your forearms, but the result ends up contorting your entire body as the blow lands in your stomach instead. \n\t\t\t\t\t\t\t*if (durability)\n\t\t\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t\t\t*goto roofall\n\t\t\t*if (sexual = \"All\") #\"Actually, I called because I've come to care about you and wanted to make sure you're all right.\"\n\t\t\t\t*set flirt_aurora true\n\t\t\t\t\"Oh, that's sweet of…\" Aurora says and then pauses, her eyes darting to look at you with one eyebrow raised. \"Oh…oh, I…wow, um…I don't know what to say.\"\n\t\t\t\t\n\t\t\t\tShe pauses long enough to make things awkward, and both of you go to clear your throats. You quickly answer her question in order to move on from the awkward moment.\n\t\t\t\t*choice\n\t\t\t\t\t#\"The answer is yes. I want to help you take them down.\"\n\t\t\t\t\t\t*set endgame \"Loyal\"\n\t\t\t\t\t\t*set loyal_aurora true\n\t\t\t\t\t\t\"Good. I'll keep an ear out on what's happening here. I'll make contact with security at the Star of Pacifica, get a direct line to them. You'll need to stay alert and close by to keep monitoring the situation. I of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t*goto roofall\n\t\t\t\t*else\n\t\t\t\t\tThe fist looks like it's heading for your face. In a moment of pure reflex, you throw your hands up and then down to try and guide the incoming blow out of the way. The fist glances off one of your forearms, but the result ends up contorting your entire body as the blow lands in your stomach instead. \n\t\t\t\t\t*if (durability)\n\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t*goto roofall\n\t#Move on to Pacifica and contact Nightreaver and Caracal.\n\t\tYou took a greyhound back to the city, circumventing the roadblocks placed along the way by being one of a dozen in a large vehicle. The guards didn't care as much as they should have, and you passed through to the city without issues. Once there, you made short work of recovering your backup equipment, then headed to some of Nightreaver's haunts. It was easier to deliver a message than you expected. The message was short and sweet: meet on the rooftop you're now sitting on.\n\t\t\n\t\t*if (joint_escape)\n\t\t\tYou wait until well after midnight before you see any sign of your fellow vigilantes. Nightreaver's head pops out from beyond the edge of the roof, and he clambers over the edge to join you on the rooftop. He keeps his distance just in case, looking around and making sure you're alone. Satisfied, he crouches down low, his piercing gaze falling upon you.\n\t\t\t\n\t\t\t\"I got your message. What do you want?\" his gruff voice demands.\n\t\t\t\n\t\t\t\"I want to help you with Reissman,\" you respond. The dark-clad man smirks and shakes his head.\n\t\t\t\n\t\t\t\"Nothing will change, even with Reissman gone. I've spoken with Dawn, leader of New Dawn and boss to the white runner you seem to attract everywhere you go. She has the lofty goal of exposing Reissman and granting freedom to all, but all she wants is control. She would relish chaos in the streets and an impasse on the political level,\" Nightreaver growls, then stands up, looking at the tall skyscraper behind you. \"The best thing would be to work to take down both of them.\"\n\t\t\t\n\t\t\t*fake_choice\n\t\t\t\t#\"Then let's work together.\"\n\t\t\t\t\t*set endgame \"Chaos\"\n\t\t\t\t\t\"Good. Dawn will be there to see Reissman go down. She will be in the same place at the same time, and that means we have the best opportunity we can get,\" Nightreaver says, then takes a few steps towards you, offering his hand for a shake.\n\t\t\t\t\t\n\t\t\t\t\t\"${heroname}, you make a great hero. I had my doubts about you, but you've proven me wrong. It'll be a pleasure and an honour working with you. \n\t\t\t\t\t*if ((sexual = \"Men\") or (sexual = \"All\"))\n\t\t\t\t\t\tI feel like we'll do great together,\" he says, offering you a very thin smile.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Flirt with him.\n\t\t\t\t\t\t\t\tYour mind rushes to put words together and you hear noises coming out of your mouth, but you're not sure if the sentence you thought of actually came out of your mouth. Nightreaver offers you a momentary quizzical look, then an awkward chuckle.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (nightreaver_seduce)\n\t\t\t\t\t\t\t\t\t\"Thank you for showing interest in me, but I have already told you that I am spoken for. Please,\" he pauses and glances away. \"Do not continue to chase me in this way.\"\n\t\t\t\t\t\t\t\t\t*goto roofie\n\t\t\t\t\t\t\t\t*elseif (gender = \"Female\")\n\t\t\t\t\t\t\t\t\t\"Thank you, but…um…how do you say…I am already spoken for,\" Nightreaver says, then quickly moves on from the subject. \"Keep stalking the Star of Pacifica. I'll signal you when the time comes to charge in.\"\n\t\t\t\t\t\t\t\t\t*goto roofie\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\"Thank you, but…um…how do you say…you're not my type, and I am already spoken for,\" Nightreaver says, then quickly moves on from the subject. \"Keep stalking the Star of Pacifica. I'll signal you when the time comes to charge in.\"\n\t\t\t\t\t\t\t\t\t*goto roofie\n\t\t\t\t\t\t\t#Let him go on.\n\t\t\t\t\t\t\t\t\"Just keep stalking the Star of Pacifica. I'll signal you when the time comes to charge in.\"\n\t\t\t\t\t\t\t\t*goto roofie\n\t\t\t\t\t*else\n\t\t\t\t\t\tKeep stalking the Star of Pacifica. I'll signal you when the time comes to charge in.\"\n\t\t\t\t\t\t*goto roofie\n\t\t\t\t#\"Let's work on Reissman first, then we can think of Dawn.\"\n\t\t\t\t\t\"Fine, but she will be there when we strike Reissman. They will be in the same place at the same time, and that would be the best time to get rid of her too. I'll do it myself if I have to, but your help would be appreciated,\" Nightreaver says and takes a few steps towards you.\n\t\t\t\t\t\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"Fine, I'll help you take down Dawn.\"\n\t\t\t\t\t\t\t*set endgame \"Chaos\"\n\t\t\t\t\t\t\tNightreaver takes a few steps towards you, offering his hand for a shake.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"${heroname}, you make a great hero. I had my doubts about you, but you've proven me wrong. It'll be a pleasure and an honour working with you. Keep stalking the Star of Pacifica. I'll signal you when the time comes to charge in.\"\n\t\t\t\t\t\t\t*goto roofie\n\t\t\t\t\t\t#\"I can't do that. Reissman takes priority.\"\n\t\t\t\t\t\t\t*set endgame \"NWO\"\n\t\t\t\t\t\t\t\"Fair enough,\" Nightreaver says, hanging his head for a moment before taking a few steps towards you and putting his hand out for a shake.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"${heroname}, you make a great hero. I had my doubts about you, but you've proven me wrong. Whatever follows, it will be a pleasure to work with you, at least on taking down Reissman's plans. Keep stalking the Star of Pacifica. I'll signal you when the time comes to charge in.\"\n\t\t\t\t\t\t\t*goto roofie\n\t\t*else\n\t\t\t*set endgame \"Neutral\"\n\t\t\tYou wait, and wait, and then wait some more. You spend the entire night on the rooftop. No sign of Nightreaver, Caracal, Purge, or anyone else, for that matter. The only thing keeping you company is the shouting in the streets as the National Guard keeps order and maintains the curfew, and the light from the beacon of the building stretching up before you. After a night of staring at it, you have to admit that the Star of Pacifica doesn't look half bad.\n\t\t\t\n\t\t\tYou know very little about New Dawn's plans regarding Reissman, or what any of the other people involved in the whole mess are going to do. The only one left to rely upon is yourself. You placed your hope in yourself and vowed to intervene. You would make sure that whatever happens, you would participate in bringing the world along for the next stage in a long ride.\n\t\t\t*goto roofie\n\n*label mamroofie\nThe door to the rooftop swings open and smacks against the concrete frame with a dull metallic thud. You turn to see three men in suits rush out and spread around the rooftop to make sure you're alone. Soon afterwards, a massive hulking figure comes out, looking like he shouldn't even fit through. He straightens his dark, well-tailored suit and walks toward you.\n\n*if (realname)\n\t\"${name}, \n*if not (realname)\n\t\"${heroname}, \nhow marvelous to see you alive and well after your ordeal. I'd thought you a reliable ally, but my confidence was shaken when you walked straight into the government's maw,\" he says and smiles, stopping in his stride around the midway point between the door and you.\n\n\"I know you work for Reissman. The whole lab did. It wasn't your facility, it wasn't even a cage for Dawn. Your safeguards were broken, and she used it as a base, probably until something tipped you off. Then she escaped with a massive fireball that made sure the world would know about the facility,\" you said, observing the mammoth tilt his head to the side in interest, then smirk and eventually grimace.\n\n\"Hmm. You're smarter than you look. You didn't put this together by yourself, did you? Even a dull week in a cell doesn't give you that kind of clout,\" the man grumbled, forcing his face to smile. \"You called me here about our agreement. What do you have on Dawn? Where is she?\"\n\n\"I don't know,\" you state bluntly, but look over your shoulder at the Star of Pacifica. \"But I know where she will be. Your boss has become her main target. This whole conspiracy of yours will come crashing down in a few days.\"\n\n\"Conspiracy? Thinking about the well-being of the major populace is a conspiracy now?\" the mammoth laughs in repeated booms. \"Well, we'll have to do something about Reissman's security solution, then. To make sure nobody gets close enough to even breathe the same air as him. And what will your role be in this? Did you lure me here to fight me, or to join me and help?\"\n\n*choice\n\t#\"To join you.\"\n\t\t*set endgame \"Loyal\"\n\t\tThe mammoth smirks and takes a few steps towards you again, his large hands popping his suit jacket open and casually sliding the lapels aside. His hands enter his pockets as he takes the final few steps to your side, standing very casually now, looking past you at the Star of Pacifica.\n\t\t\n\t\t\"You know, I always told him not to build that thing. Too supervillainy,\" he murmurs and tu
