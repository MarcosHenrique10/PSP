rns to smile at you. \"Whether we succeed or fail, I have a feeling we'll get along famously. Great things lie ahead, and together we'll be able to reshape the world if we put out minds to it.\"\n\t\t\n\t\t\"I'll put my men to scouring the city in search of Dawn and take over Reissman's security detail personally. You need to stay close by and prepared. Stake out the Star and be ready to intervene at any moment. I need you to be the ace in the hole, something they won't expect,\" the man says, looking at you confidently. \n\t\t*if not (ferrisnamed)\n\t\t\t*set ferrisnamed true\n\t\t\t\"Ferris Bernard, by the way. Pleasure to be working with you.\"\n\t\t\n\t\tThe large man turns around and walks back to the door, stuffing himself in with the three suited men following closely after him. The door closes, and you're left to look back at the Star of Pacifica.\n\t\t*page_break\n\t\t*goto roofie\n\t#\"To make sure you won't stand in their way.\"\n\t\tThe mammoth laughs again, the few guards he brought with him turning to look at him for a split second before returning to their overwatch duties.\n\t\t\n\t\t\"How do you think that will happen?\" he finally asks, his face turning serious and his hands going to unbutton his jacket.\n\t\t\n\t\t*choice\n\t\t\t#\"We can join forces and take over Reissman's operation once he's out of the way.\"\n\t\t\t\t\"You have a very interesting way of thinking about things. Mr. Reissman is the head of a large multi-arm company that has been in his family generation after generation after generation,\" the large man says with a wide smile. He looks past you at the Star of Pacifica. \"And you would suggest we, without name, money, or connections…would simply take over?\"\n\t\t\t\t\n\t\t\t\t\"The company? Who cares? The operation under that,\" you say confidently, causing the man to chuckle.\n\t\t\t\t\n\t\t\t\t\"Ah. You mean the Reissman-funded effort to study powered individuals and spread their discoveries to the greater public in a wave of 'good-willed' capitalism. That one? Without Reissman, that operation will be cut short from a lack of funds,\" he responds, sliding his hands casually into his pockets.\n\t\t\t\t\n\t\t\t\t\"You said it yourself: the knowledge gathered would make anyone rich. With all of the information under a single umbrella, connections will be easy to make,\" you note, and his smile vanishes for a very brief moment. The large man turns slowly to consider you, then stretches the smile across his face once again.\n\t\t\t\t\n\t\t\t\t*if (body >= 60)\n\t\t\t\t\t*set endgame \"Gain\"\n\t\t\t\t\t\"Hmm. I don't know why, but I think you might be on to something. I have access to most of the project details. With a confident partner, the project could find life outside Reissman's grasp. It'll need turmoil within the company to work, however,\" he says, his eyes narrowing slightly. \"You prove to me that you're serious, and I'll make sure the project disappears from company lists. If Dawn breaks into the Star, make sure Reissman is killed and she takes the fall for it.\"\n\t\t\t\t\t*goto roofie\n\t\t\t\t*else\n\t\t\t\t\t*page_break\n\t\t\t\t\t\"You're a lunatic,\" he grumbles and shakes his head. \"Mr. Reissman is doing great things, for this city, the people living in it, as well as the nation. He's a leading figure, even on the global level. He has great vision and focus, as well as the necessary ruthlessness to bring all of us to a more civilized age of technology and democratized evolution.\"\n\t\t\t\t\t\n\t\t\t\t\tThe man looks over your shoulder at the Star of Pacifica, then back to you, a very thin smirk forming upon his lips.\n\t\t\t\t\t\n\t\t\t\t\t\"Have you ever heard of Transhumanism? Detestable rabble putting forth all kinds of thought experiments about the limits of the human body and how it could be transcended with the use of technology and medicine. I used to think of them as the dregs of the intelligentsia, but Reissman showed me there's some merit to their never-ending thought experiments. Yes, we capture powered individuals—like Project Dawn—and cut them open to figure out how they're different. That's the way of science. We take that which is unknown to us, study and appraise it, then find a way to use the new information to the benefit of all mankind.\"\n\t\t\t\t\t\n\t\t\t\t\t\"You've tasted the fruit?\" The words escape your lips, prompting the man to chuckle a bit.\n\t\t\t\t\t\n\t\t\t\t\t\"One could say that. I was Project Mammoth. They used the sequencing they found in Dawn and adapted it. I grew in size and strength. I used to be a frail scientist; now, I am so much more,\" he says, glancing back at the massive skyscraper rising behind you.\n\t\t\t\t\t\n\t\t\t\t\tSuddenly, he surges forward.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*if (senses)\n\t\t\t\t\t\tYour heightened senses kick in as soon as the man twitches into motion. His fist swings just past your head, a strong air current rushing into your ear as you make your best effort to dodge the strike. As you scramble away from the fist, your senses alert you to a second strike incoming. \n\t\t\t\t\t\t*if (agility)\n\t\t\t\t\t\t\tYour body is already in motion, twisting to the side to dodge the second attack, bringing you around to make an unintentionally fancy flip in order to get out of the way in time. You land on your feet, crouched low and looking up at the mammoth in front of you, seeing his eyes burn with rage.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou launch back into the fight with a powerful kick off the ground. Instead of hitting the large man, you launch yourself over his shoulder, grabbing onto his suit jacket and then landing with a powerful tug at his collar. The lumbering form comes rolling over your back and lands hard on the roof in front of you.\n\t\t\t\t\t\t\t*goto roofight\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYour body isn't as fast as your mind, however, as you try to twist away from the hit but feel the uppercut hit you straight in the gut nonetheless. \n\t\t\t\t\t\t\t*if (durability)\n\t\t\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t*elseif (agility)\n\t\t\t\t\t\tYou see the blow coming just in time to try and roll away from it. His fist swings just past your head, a strong air current rushing into your ear as you make your best effort to dodge the strike. As you scramble away from the fist, you steady yourself directly in the path of another blow heading your way. In a mighty attempt, you try to dodge, but can't get out of the way in time. \n\t\t\t\t\t\t*if (durability)\n\t\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t*else\n\t\t\t\t\t\tThe fist looks like it's heading for your face. In a moment of pure reflex, you throw your hands up and then down to try and guide the incoming blow out of the way. The fist glances off one of your forearms, but the result ends up contorting your entire body as the blow lands in your stomach instead. \n\t\t\t\t\t\t*if (durability)\n\t\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t\t*goto roofall\n\t\t\t#\"Reissman is wrong to do this. Even you must realize that. He'll put us in camps and dissect us like a modern Mengele.\"\n\t\t\t\t*achieve nazicard\n\t\t\t\t\"Harsh words. Extremely harsh and very unappreciated words,\" the man grumbles, his face pulling into an emotionless blank canvas. \"Mr. Reissman is doing great things, for this city, the people living in it, as well as the nation. He's a leading figure, even on the global level. He has great vision and focus, as well as the necessary ruthlessness to bring all of us to a more civilized age of technology and democratized evolution.\"\n\t\t\t\t\n\t\t\t\tThe man looks over your shoulder at the Star of Pacifica, then back to you, a very thin smirk forming upon his lips.\n\t\t\t\t\n\t\t\t\t\"Have you ever heard of Transhumanism? Detestable rabble putting forth all kinds of thought experiments about the limits of the human body and how it could be transcended with the use of technology and medicine. I used to think of them as the dregs of the intelligentsia, but Reissman showed me there's some merit to their never-ending thought experiments. Yes, we capture powered individuals—like Project Dawn—and cut them open to figure out how they're different. That's the way of science. We take that which is unknown to us, study and appraise it, then find a way to use the new information to the benefit of all mankind.\"\n\t\t\t\t\n\t\t\t\t\"You've tasted the fruit?\" The words escape your lips, prompting the man to chuckle a bit.\n\t\t\t\t\n\t\t\t\t\"One could say that. I was Project Mammoth. They used the sequencing they found in Dawn and adapted it. I grew in size and strength. I used to be a frail scientist; now, I am so much more,\" he says and glances back at the massive skyscraper rising behind you.\n\t\t\t\t\n\t\t\t\tSuddenly, he surges forward.\n\t\t\t\t*page_break\n\t\t\t\t*if (senses)\n\t\t\t\t\tYour heightened senses kick in as soon as the man twitches into motion. His fist swings just past your head, a strong air current rushing into your ear as you make your best effort to dodge the strike. As you scramble away from the fist, your senses alert you to a second strike incoming. \n\t\t\t\t\t*if (agility)\n\t\t\t\t\t\tYour body is already in motion, twisting to the side to dodge the second attack, bringing you around to make an unintentionally fancy flip in order to get out of the way in time. You land on your feet, crouched low and looking up at the mammoth in front of you, seeing his eyes burn with rage.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou launch back into the fight with a powerful kick off the ground. Instead of hitting the large man, you launch yourself over his shoulder, grabbing onto his suit jacket and then landing with a powerful tug at his collar. The lumbering form comes rolling over your back and lands hard on the roof in front of you.\n\t\t\t\t\t\t*goto roofight\n\t\t\t\t\t*else\n\t\t\t\t\t\tYour body isn't as fast as your mind, however, as you try to twist away from the hit but feel the uppercut hit you straight in the gut nonetheless. \n\t\t\t\t\t\t*if (durability)\n\t\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t*elseif (agility)\n\t\t\t\t\tYou see the blow coming just in time to try and roll away from it. His fist swings just past your head, a strong air current rushing into your ear as you make your best effort to dodge the strike. As you scramble away from the fist, you steady yourself directly in the path of another blow heading your way. In a mighty attempt, you try to dodge, but can't get out of the way in time.\n\t\t\t\t\t*if (durability)\n\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t*goto roofall\n\t\t\t\t*else\n\t\t\t\t\tThe fist looks like it's heading for your face. In a moment of pure reflex, you throw your hands up and then down to try and guide the incoming blow out of the way. The fist glances off one of your forearms, but the result ends up contorting your entire body as the blow lands in your stomach instead. \n\t\t\t\t\t*if (durability)\n\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t*goto roofall\n\t\t\t#\"I intend to put you through this roof.\"\n\t\t\t\tThe man begins to laugh at your forceful statement, the ruckus cut short as you grip onto his fancy dress jacket and toss him over your shoulder. He slams hard against the roof, his body reeling from the sudden attack.\n\t\t\t\t*goto roofight\n\n\n*label roofight\n\nAs you return to a ready stance, you can feel your entire body announcing just how heavy the ordeal had been. The man is much taller and larger than you, and behind a slightly pudgy exterior lies a lot of mass and hidden power.\n\nYou charge back into action while he's still down, coming to bear with all your might to keep him that way. The bootsteps of the guards rush towards you as they come to the aid of their boss. Before they get in range to take you down, you turn your attention to them, counter-attacking so as to keep the fight under your control.\n\nAs you make contact with the suited guards, they prove themselves excellent opponents. All of them are able to handle themselves in pure hand-to-hand combat before you use any of your powers, but then quickly have to back off. As you move after them, you suddenly feel a large hand land on your back, grab you firmly, and toss you to the side. You hit the roof hard, skipping off and rolling straight over the edge before you even know what happened.\n\n*label roofall\nThe edge of the roof blocks the view of your opponent, leaving you to reel from the strike and figure out a way out of your predicament before you become a smear on the sidewalk below. Clutching your stomach and gasping to get some air back into your lungs, you scramble to look around. \n\n*if (teleport)\n\t*gosub energyuse\n\tWhile tumbling down, you opened your arms and legs to stabilize yourself. It took much more energy than you would have thought, but made your fall stable enough for you to concentrate for a moment. You stared at the windows passing you and concentrated. A familiar blur overcame your vision as you felt the rush of air slowly disappear.\n\t\n\tThe blur gave way to a rough office floor. You crashed down onto it, kicking the air out of your lungs but not much more. With a sigh of relief which came out as more of a groan, you rose up to your elbows and rolled onto your back.\n\t*goto roofer\n*elseif (flight)\n\t*gosub energyusemin\n\tThe answer was obvious. In fact, most of the time you jumped off roofs just for the fun of it. You heard a shriek from below as a civilian saw you tumbling down towards the ground, but before you could even get close, you concentrated and felt the motion stop. With your power of flight, you hovered in midair for a brief moment, then darted off into the sky.\n\t*goto roofer\n*elseif (energypower)\n\t*gosub energyuse\n\tYou'd never done anything like it before, but there was no better time to try. Your focus went to the air around you and began twisting the energies, forcing sudden bouts of wind to tug at you for very brief moments. It slowed you down, but wasn't enough.\n\t\n\t*gosub energyuse\n\tYou pushed yourself harder and closed your eyes, forcing your mind to expand. Suddenly, a massive gust of wind picked you up and slowed your descent. You glided softly down to the ground, your chest heaving from adrenaline and exhaustion. Before any nosy civilians or National Guard could come around to ask questions, you took to your feet again.\n\t*goto roofer\n*elseif (durability)\n\tYou trusted in your natural durability, bringing your knees to your chest, crossing your arms over them, and forming yourself into a tight ball. There was a scream from somewhere below, but you concentrated upon staying in form.\n\t\n\tInstead of smashing against the ground or a poorly parked car, you felt something soft against your back stretch and give way. A ripping sound followed, then you crashed down, broken glass raining down around you as you went through another layer of obstacles, only to then fall directly into a pool. Without any recollection of swimming, you found yourself climbing up over the side of the pool and back to dry ground, coughing up water and trying to steady yourself. Glancing up, you saw a large canopy overhead with a sizable hole ripped through it.\n\t\t\n\tHuh. No reason for anyone to hang such a thing over the pool's glass ceiling, but you would definitely take it over falling onto concrete. Come to think of it, you didn't even know the building had a pool until now.\n\t*goto roofer\n*else\n\t*if (gadget)\n\t\tYou kept struggling to save yourself as you fell. None of your powers were applicable, and you weren't nearly aerodynamic enough to go wide and smash through a window. Your hand rushed to your gadgets and grabbed one at random, actually managing to find your grappling hook. You pointed it at the windows and fired, launching a small metal hook and sturdy cable straight through one of them.\n\t\t\n\t\tYou have no idea what the hook caught onto, but it tugged you hard enough to send you directly at the windowed wall flying by you. Bringing your knees and elbows to your chest, you smashed straight through a window and ended up in some kind of a small office space, saved from certain doom.\n\t\t*goto roofer\n\t*else\n\t\tYou kept struggling to save yourself as you fell. None of your powers were applicable, and you weren't nearly aerodynamic enough to go wide and smash through a window. There were screams coming from below as you hit terminal velocity and closed your eyes, confident in your imminent death.\n\t\t\n\t\tInstead, you felt something soft against your back stretch and give way. A ripping sound followed that, then you crashed down, broken glass raining down around you as you went through another layer of obstacles, only to then fall directly into a pool. Without any recollection of swimming, you found yourself climbing up over the side of the pool and back to dry ground, coughing up water and trying to steady yourself. Glancing up, you saw a large canopy overhead with a sizable hole ripped through it.\n\t\t\n\t\tHuh. No reason for anyone to hang such a thing over the pool's glass ceiling, but you would definitely take it over dying. Come to think of it, you didn't even know this building had a pool.\n\t\t*goto roofer\n\n*label roofer\n\nAfter your tumble off the roof, you tried to reach out to others, to no avail. Either everyone was much too busy preparing for something, or they had no interest in talking to you. Knowing what was being planned on either side of this powered conflict, you made the sure guess that it was probably more column A than column B.\n\nInstead, you would have to rely upon yourself.\n*set endgame \"Neutral\"\n*label roofie\n*page_break Two Days Later.\n*if (energy >= 50)\n\t*set energy 50\nThe next couple of days go by uneventfully. You keep a vigil over the Star of Pacifica, prepare yourself and your equipment, but get little to no rest as a result. Your nerves make your dreams go crazy. Instead, you choose to lull your mind with television. After the first day, you already miss the freedom of the internet. The late-night talk shows are the only thing that stand out from the droll inanity of commercials, television dramas, and cooking shows.\n\n\"I tell you, these superheroes roaming our streets need the Hollywood treatment. Look at this picture we found of the one they call \n*if (fame >= 65)\n\t${heroname}. Look at it.\" The host gets pulled into a split-screen with a picture of you.\n\t*if (suit = \"fancy\")\n\t\t\"Talk about too much! All those frills and shiny things, I bet this costume is worth a small country in tailoring costs. And don't get me started on the ${colours}! Hey, you. Yeah, you in the audience, remind me to ask about that colour coordination from our first guest, who just happens to be fashionista extraordinaire…\"\n\t\t*goto groany\n\t*elseif (suit = \"classic\")\n\t\t\"Talk about lawsuit material. How has nobody in the comic book industry called this out yet? Amazing. And don't get me started on the ${colours}! Hey, you. Yeah, you in the audience, remind me to ask about that colour coordination from our first guest, who just happens to be fashionista extraordinaire…\"\n\t\t*goto groany\n\t*elseif (suit = \"utility\")\n\t\t\"Who wears this kind of stuff out in the streets? This guy would look more at home at a construction site, or some kind of fetish strip club! And don't get me started on the ${colours}! Hey, you. Yeah, you in the audience, remind me to ask about that colour coordination from our first guest, who just happens to be fashionista extraordinaire…\"\n\t\t*goto groany\n\t*else\n\t\t\"Who wears street clothes while trying to be some big hero, huh? No showmanship there! And don't get me started on the ${colours}! Hey, you. Yeah, you in the audience, remind me to ask about that colour coordination from our first guest, who just happens to be fashionista extraordinaire…\"\n\t\t*goto groany\n*else\n\tNightreaver! Look at it.\" The host gets pulled into a split-screen with a picture of Nightreaver. \"Doesn't this guy look like he should be in some weird fetish strip club? Look at all that black, dear lord. I think we should definitely talk about this trainwreck with our first guest, who just happens to be fashionista extraordinaire…\"\n\t*goto groany\n\n*label groany\n\nWith a groan, you turn the television off and roll over, trying to get some sleep.\n*page_break\nYou wake up from one of your stress-induced nightmares to an explosion rocking the entire city. The windows rattle, the floor shakes, and things fall off shelves. Rushing out to your window, you see a fireball rising up from the top of the Star of Pacifica, painting the night sky red. It's certainly not the kind of signal you'd been expecting.\n\nYou scramble to your gear and start putting on your costume, shortly thereafter making your way out the door and towards the scene of the explosion.\n*finish\n\n\n*label afreshdawn\n*set energy +10\n*if (energy > 100)\n\t*set energy 100\n\nIt took you two days of following clues littered around the city to find what you were looking for. The address on the keychain led you to an old abandoned mansion in the Hollywood Hills, which in turn led you to an old warehouse in Alameda, followed by a whole series of small apartments all around the slums of Pacifica. Over time, the clues became less of a treasure hunt and more of a path—a path you had to travel, with New Dawn probably having eyes and ears everywhere along the way.\n\nA test of some kind.\n\nOn the second day, things became more obvious. The trail led you to a closed Kezar Stadium in the middle of the night, but you didn't allow the locked gates to keep you out. You slipped in and made your way to the field.\n\nYou cross from the long entrance tunnel into the field, the grass enveloped by the darkness of night. The seats all around you appear empty, and your footsteps echo off the tunnel walls. Entering carefully, you take a peek around and see the stadium as deserted as it should be at night. Yet something is definitely off. High above, where the announcer booth is located, a light is on and shining like a beacon.\n\n\"Hello again,\" you hear a familiar modulated voice call from behind you. You turn as fast as you can, but see nobody there, then turn back to see a white-clad figure standing in the middle of the field.\n*fake_choice\n\t#Walk out to the field.\n\t\tYou take the first few hesitant steps out of the tunnel and emerge into the dark field. You make your way towards Purge, your senses alert for any kind of ambush. From the corner of your eye, you can see movement, but as soon as you see it, you also hear loud claps echoing off the empty seats all around you.\n\t\t\n\t\t\"Nice of you to join us, ${heroname}, you've been quite expedient in jumping through hoops,\" the clear sound of a dainty voice calls to you. \"Purge thought you would make it here tomorrow, but I insisted. It's very nice to finally meet you.\"\n\t\t\n\t\tThe lights of the stadium suddenly turn on all at once, signalled by the loud bang of breakers. The light bounces off Purge's white clothing in a way that blinds you for a moment, giving the owner of the voice time to approach without danger of you doing anything sudden and violent. With a hand raised to cover up the excess bloom from Purge, you turn to assess the approaching woman.\n\t#Stay where you are.\n\t\tYou stand back by the safety of the tunnel, crossing your arms expectantly at the white figure trying to lure you out into the open. You aren't about to fall for a trick like that and refuse to play the game being presented to you. The shimmering mask keeps staring at you from mid-field, capturing your attention while waiting for something to happen. Then there's clapping. It bounces off the seats and walls of the stadium, making it impossible to locate from where you stand.\n\t\t\n\t\tThe lights of the stadium suddenly turn on all at once, signalled by the loud bang of breakers. The light bounces off Purge's white clothing in a way that blinds you for a moment, and you quickly bring a hand up to cover the excess bloom. In the distance, you can see a figure dropping from the stands and walking out to the field, swaying casually in her stride. From the body movement and the silhouette, you guess the figure to be a woman.\n\t\t\n\t\t\"Nice of you to join us, ${heroname}, you've been quite expedient in jumping through hoops,\" the clear sound of a dainty voice calls to you, confirming your suspicion. \"Purge thought you would make it here tomorrow, but I insisted. It's very nice to finally meet you.\"\n\t#Turn around and head back.\n\t\tYour footsteps echo off the tunnel walls yet again as you make your way back. You hear a loud bang go off throughout the entire structure and glance back, seeing the entire field now lit up by the racks upon racks of lights high above the stadium. The pause is long enough to notice that Purge is no longer standing in the middle of the field. If the figure was there, you would see the white clothes reflecting the light like a bright star in the centre of your vision.\n\t\t\n\t\t\"Why leave?\" a modulated voice rasps from deeper in the tunnel, the already distorted voice aggravated even more by the echo. \"You've come so far, and now you turn away? Do you fear a trap? Now? We could have made a trap for you two days ago, or yesterday; yet now, at the last moment, you turn your back on all the answers you were seeking.\"\n\t\t\n\t\tPurge walks around the corner and stops at the end of the tunnel, the shimmering mask pointed towards the field stretching behind you. Before you can move back out onto the field or get past Purge, you hear a dainty and clear female voice calling out from the tunnel entrance behind you.\n\t\t\n\t\t\"${heroname}, you've been quite expedient in jumping through hoops. I hope you won't leave us now after all that effort. Purge thought you would make it here tomorrow, but I insisted. It's very nice to finally meet you.\"\n\t\t\n\t\tThere's a pause, and Purge takes a few steps to the side in order to give you space if you do decide to leave. Yet there's something enchanting about the woman behind you, and you feel the urge to turn around and hear her out.\n*comment endif\n\n\"You might have heard of me; people have come to call me Dawn. I much prefer just plain old Katie, even if it doesn't carry much mystique or weight in it. You may call me whichever,\" she says as she keeps walking towards you. You can see that while everyone else in the powered community seems to have gone nuts for costumes, Dawn is dressed in very ordinary clothes: jeans, a shirt for a band you haven't heard of, and a jacket with a fur-lined hood.\n\n*fake_choice\n\t#Greet her, calling her Dawn.\n\t\t*set dawnick \"Dawn\"\n\t\t\"It's a pleasure to meet you as well, Dawn. \n\t\t*if (ferrisnamed)\n\t\t\tWe happen to have a friend in common. Ferris Bernard. He asked me to call him if I happen to know where you are,\" you say, offering her a slightly reserved smile. You spark her curiosity, and she tilts her head slightly.\n\t\t\t\n\t\t\t\"Is that so? What has he offered you? Clearly, you haven't contacted him yet, since this stadium isn't crawling with his little men in black,\" she says, chuckling.\n\t\t\t\n\t\t*if ((ferrisnamed) and (phone))\n\t\t\t\"Whether I call him or not will depend on what happens here,\" you say matter-of-factly and observe Dawn's reaction.\n\t\t\t\n\t\t\tHer lips stretch into a thin smile as she begins to pace back and forth, observing you and your outfit. Her face is grim, and on occasion she glances back at Purge before returning her eyes to you.\n\t\t\t\n\t\t\t\"Well, Dawn, \n\t\t*if ((ferrisnamed) and not (phone))\n\t\t\t\"I didn't take the phone he offered me. I have no way to contact him,\" you say matter-of-factly and observe Dawn's reaction.\n\t\t\t\n\t\t\tShe smiles widely, glancing at Purge for a short moment before turning her attention back to you. She slowly begins to pace back and forth, observing you and your outfit, and it appears she has a slight bounce in her step.\n\t\t\t\n\t\t\t\"Well, Dawn, \n\t\tshall we get down to business?\"\n\t#Greet her, calling her Katie.\n\t\t*set dawnick \"Katie\"\n\t\t\"It's a pleasure to meet you as well, Katie. \n\t\t*if (ferrisnamed)\n\t\t\tWe happen to have a friend in common. Ferris Bernard. He asked me to call him if I happen to know where you are,\" you say and offer the woman a slightly reserved smile. You spark her curiosity, and she tilts her head slightly.\n\t\t\t\n\t\t\t\"Is that so? What has he offered you? Clearly, you haven't contacted him yet, since this stadium isn't crawling with his little men in black,\" she says, chuckling.\n\t\t\t\n\t\t*if ((ferrisnamed) and (phone))\n\t\t\t\"Whether I call him or not will depend on what happens here,\" you say matter-of-factly and observe Dawn's reaction.\n\t\t\t\n\t\t\tHer lips stretch into a thin smile as she begins pacing back and forth, observing you and your outfit. Her face is grim, and on occasion she glances back at Purge before returning her eyes to you.\n\t\t\t\n\t\t\t\"Well, Katie, \n\t\t*if ((ferrisnamed) and not (phone))\n\t\t\t\"I didn't take the phone he offered me. I have no way to contact him,\" you say matter-of-factly and observe Dawn's reaction.\n\t\t\t\n\t\t\tShe smiles widely, glancing at Purge for a short moment before turning her attention back to you. She slowly begins to pace back and forth, observing you and your outfit, and it appears she has a slight bounce in her step.\n\t\t\t\n\t\t\t\"Well, Katie, \n\t\tshall we get down to business?\"\n\t#Skip the introductions and get to the point.\n\t\t*set dawnick \"Dawn\"\n*comment endif\n\nDawn continues looking at you for a moment longer, her eyes assessing your build. She nods to Purge, then closes the distance between you.\n\n\"You must have many questions. I've prepared something so we don't have to stand here all night. Please, if we might,\" she says and walks past you, heading into the tunnel system running through the stadium. You follow, noticing Purge walking close behind you.\n\nShe leads you down into some kind of a small office near the locker rooms, pushes the door open and then heads straight inside. You pause at the doorway, looking over the office and the tunnels before deciding what to do. Purge stops behind you and leans against the rough wall, a sigh escaping the modulator strapped to his shimmering mask. The office is small but not cramped. The walls are decorated with paint and not much more. A corkboard hangs upon the wall next to a flimsy-looking desk and has various sports posters pinned to it. Small office chairs are placed on either side of the desk, and the wall on the door side is lined with green cabinets.\n\n\"Come, sit,\" she says, pulling the chairs out from beneath the desk and making herself comfortable on one of them. You notice that she reaches down and pulls out a plastic bag that squeaks as it's placed on the desk.\n\n\"I got us some Chinese,\" she says with a smile as she reaches into the bag and pulls out styrofoam containers.\n*if (((((nation = \"Chinese\") or (nation = \"Japanese\")) or ((nation = \"Korean\") or (nation = \"Filipino\"))) or ((nation = \"Indonesian\") or (nation = \"Vietnamese\"))) or ((nation = \"Cambodian\") or (nation = \"Singaporean\")))\n\t\"Um, no offence. Not like I got Chinese food because of…you know…wow, that sounded more racist than I thought it would. I'm sorry. Please, sit, before I make more of an ass of myself.\"\n\nThe styrofoam containers are opened, filling the office with the aroma of freshly-cooked Chinese food. It's distracting, but you sit down and try to get back to what you came here for.\n*label dawnexposition\n*choice\n\t#\"Why all the runaround in order to find you?\"\n\t\t\"I had to make sure you weren't being followed and that you were serious about finding me in the first place. Simply giving you an address and being there would have been far too easy,\" the woman on the other side of the desk responds with smile, digging into her styrofoam container for a piece of chicken. \"Also, I haven't been in the outside world for a while. I had to catch up on some information, especially about you. For that part, Purge was very helpful.\"\n\t\t*goto dawnexposition\n\t#\"I thought New Dawn was a cult.\"\n\t\t*set noanswer true\n\t\t\"It was. When I wasn't leading it. You see, I gathered some people around me and they came to regard me with great respect. They thought I would change the world. I can't deny that I believed it as well, right up until I was captured and stuck in an underground concrete box. The thing is, thanks to my powers, I don't have to change the world. The world is already changing; I just have to make sure my powers aren't used to take it over during that change.\"\n\t\t\n\t\t\"How would they do that?\" you ask. ${dawnick} drops her chopsticks for a moment and looks at you.\n\t\t\n\t\t\"They did tests on me. Same kind of tests they intend to do on every other powered person out there. That's what the whole detainment thing is really about. And the registry, for that matter. Reissman is manipulating the system to gain easy access to research specimens,\" she says, grimacing. \"They had another project. I was Project Dawn, the source of their information. Project Mammoth was the result of having that information. Ferris Bernard was the subject. He was a scrawny researcher when they started on him, and now he's a hulking powerhouse who can tear down buildings with his bare hands.\"\n\t\t*goto dawnexposition\n\t#\"How is Reissman connected to all this?\"\n\t\t\"He built Pacifica, and he wants it to be the shining beacon of a new and ordered society. Most important to that vision is human superiority. By knowing what makes us folk with powers tick, he can use that to advance human evolution itself. Of course, the way people would get their hands on anything our bodies could offer, they would have to buy it from Reissman,\" ${dawnick} says with a sigh, poking an errant piece of chicken before looking up at you.\n\t\t\n\t\t\"It's not worth the cost, to be honest. Yes, we may offer marvellous breakthroughs in science just by being poked and prodded, but to keep it cheap and monopolized, Reissman is using the government to lock us up. Discriminatory policies will lead us nowhere as a society.\"\n\t\t*goto dawnexposition\n\t#\"Where did you find Purge?\"\n\t\t\"Oh, I created Purge. In a way. See, they put me in a concrete box underground—a fully self-sufficient research lab. Purge was a test subject, recovered from a car accident of some kind, I think. Instead of allowing the researchers to play around with the barely-alive body, I made them enhance it,\" she says, flashing a very brief and forced smile. \"You have no idea how strange it is to play god….\"\n\t\t\n\t\t*if (rennowreveal)\n\t\t\t\"Richard Rennow. That's the person under the mask,\" you say, and she glances at you and nods.\n\t\t\t\n\t\t\t\"Not anymore. Maybe once. The procedure changed him, and for all the public knows, he's dead and buried. Even his father doesn't know, and he wouldn't understand, either. He used the pull he had to get his son into that facility, and I made them register him as deceased after the operation was done.\" She sighs, then offers a sorrowful look. \"Purge thinks very highly of me. When I first sent him out, he got involved with the people who had twisted my image into the cult you probably stumbled upon. Once I was ready to break out, he was my best asset in stopping all that and renewing our true purpose.\"\n\t\t*goto dawnexposition\n\t*if (noanswer) #\"You didn't answer me about New Dawn. What is it?\"\n\t\t\"It was a cult, as you said. Corrupted from my purpose of helping those that were cold and lonely, and used by those few I had trusted to create some kind of territorial gang. When I got out of my little prison, I changed things. I culled the bad elements and reorganized the entire thing. We're supposed to be a force of good, not have blood-smeared walls and firefights with the police,\" ${dawnick} says, shaking her head.\n\t\t\n\t\t\"What are you going to do now, then?\" you continue, prodding at the real question.\n\t\t\n\t\t\"Right now, we want to oppose Reissman, the government, and anyone else who would lock powered folks in a concentration camp and prod them with needles. I'm trying to change public opinion, but it's hard, so I will have to make grander gestures. For example, Purge will lead an assault upon the concentration camp they're establishing to free some core figures. Nightreaver and Crimson Caracal are in there, and they would be of great help,\" she explains, her volume rising as she gets more excited, then stops. She takes a few breaths and offers a smile.\n\t\t*goto dawnexposition\n\t#\"What do you have planned? Why contact me?\"\n\t\t\"I need your help. And that of other powered folks who disagree with the government policy being outlined right now. We're going to expose Reissman for what he really is, and to do that, we'll be assaulting his home and monument of new glory: the Star of Pacifica,\" ${dawnick} says seriously, looking up at you and dropping her chopsticks for a moment.\n\t\t\n\t\t\"How?\" you ask, receiving a teasing smile from the woman across the table.\n\t\t\n\t\t\"We need evidence. His computer will have it all, and a confession of guilt would be even better. I intend no harm to him, just very simple humiliation. We need to shift public opinion, and there's no better way to do that than for someone to become a scapegoat and be outed as a driving force behind corruption. We need you in particular, because Reissman will have help from his own private militia, trained to take down people with powers, and he'll probably have Aurora ready to pounce at the chance to defeat us and carry us all to prison for registration.\"\n\t\t*goto dawnexposition\n\t#Enough questions; eat the food.\n\t\tSighing, you relax into the uncomfortable chair, pick up the chopsticks, and start poking at the food placed in front of you. You can feel the woman looking at you as you pick up a small piece of chicken and place it in your mouth. Looking up, you see her beaming happily on the other side of the desk.\n\t\t\n\t\t\"Now this is a proper date. Eat up while I get this thing open,\" she says as she reaches down and lifts a cheap-looking bottle of wine from somewhere beneath the desk. Before you can agree or disagree with her chosen beverage, she's already pouring the stuff into two plastic cups that also come from beneath the desk.\n\t\t\n\t\t*choice\n\t\t\t#Go with it, see what happens.\n\t\t\t\tThe whole date thing seems very sudden, as she just threw the term at you, \n\t\t\t\t*if not (englang)\n\t\t\t\t\twhich you assume to be a play on words due to the casual nature of it, \n\t\t\t\tand you continue to eat, observing her as she drinks up the first cup of wine and takes a refill. With a slight smile, you take your cup and start drinking as well. After a few cups, the two of you begin to quaintly chatter. ${dawnick} is especially curious about the vigilantism you've been involved in so far, asking about specific incidents that had reached public awareness. She also fills you in on some more specifics about what had happened in that underground facility you saw, and what has been happening since then.\n\t\t\t\t\n\t\t\t\tYou notice some time later that the bottle is almost empty and the food is already completely gone. However, you and ${dawnick} continue to have a pleasant conversation. A knock at the office door breaks the moment, and Purge walks to the doorway, nodding towards the hallway and looking at your late-night dinner companion as expectantly as the mask allows.\n\t\t\t\t\n\t\t\t\t\"I apologize. It's time we were on our way. The key you picked up is for an apartment near the Star of Pacifica. Office building two blocks south, has apartments on the second floor from the top. Room number is on the key. I trust you'll find the place. I need your help, and I need you to be an ace in the hole for us. We get inside the Star of Pacifica, obtain the information, and you enter when things start going wrong and we're already tied down. Nobody should expect you to be there,\" ${dawnick} says as she gets up and walks with you to the door of the office. \"I'm trusting you on this. After it's done, I'll make sure you're properly rewarded, if that's what you want out of this. For now, I have other arrangements to make.\"\n\t\t\t\t\n\t\t\t\tShe pauses, then walks over to you, leans in, and kisses your cheek.\n\t\t\t\t\n\t\t\t\t\"Oh, and thanks for the great date. I had fun.\"\n\t\t\t\t*goto dawndinner\n\t\t\t#Be reserved and cautious.\n\t\t\t\tThe whole date thing proves very sudden, as she just threw the term at you,\n\t\t\t\t*if not (englang)\n\t\t\t\t\twhich you assume to be a play on words due to the casual nature of it, \n\t\t\t\tand you continue to eat, observing her as she drinks up the first cup of wine and takes a refill. Although you refuse the wine yourself, after a few more cups for ${dawnick}, the two of you begin to quaintly chatter. ${dawnick} is especially curious about the vigilantism you've been involved in so far, asking about specific incidents that had reached public awareness. She also fills you in on some more specifics about what had happened in that underground facility you saw, and what has been happening since.\n\t\t\t\t\n\t\t\t\tYou notice some time later that the bottle is about halfway empty and the food is completely gone. However, you and ${dawnick} continue to have pleasant conversation. A knock at the office door breaks the moment, and Purge walks to the doorway, nodding towards the hallway and looking at your late-night dinner companion as expectantly as the mask allows.\n\t\t\t\t\n\t\t\t\t\"I apologize. It's time we were on our way. The key you picked up is for an apartment near the Star of Pacifica. Office building two blocks south, has apartments on the second floor from the top. Room number is on the key. I trust you'll find the place. I need your help, and I need you to be an ace in the hole for us. We get inside the Star of Pacifica, obtain the information, and you enter when things start going wrong and we're already tied down. Nobody should expect you to be there,\" ${dawnick} says as she gets up and walks with you to the door of the office. \"I'm trusting you on this. After it's done, I'll make sure you're properly rewarded, if that's what you want out of this. For now, I have other arrangements to make.\"\n\t\t\t\t\n\t\t\t\tShe pauses, then walks over to you, leans in, and kisses your cheek.\n\t\t\t\t\n\t\t\t\t\"Oh, and thanks for the great date. I hope you had fun too.\"\n\t\t\t\t*goto dawndinner\n\t#Enough questions, push the food aside.\n\t\tYou sigh and lean back in the uncomfortable chair, watching the woman on the other side of the desk continue to eat for a few minutes, until your staring becomes awkward enough for her to stop. With a clearing of her throat, she puts her chopsticks down and leans away from the food.\n\t\t\n\t\t\"Fine, if you want to just talk business, we can talk business,\" she says and crosses her arms. \"The key you picked up on the rooftop is for an apartment near the Star of Pacifica. Office building two blocks south, has apartments on the second floor from the top. Room number is on the key. I trust you'll find the place.\"\n\t\t\n\t\tShe pauses for a moment, watching as Purge emerges from the doorway and looks in.\n\t\t\n\t\t\"See, I need your help, and I especially need you to be an ace in the hole for us. We get inside the Star of Pacifica, obtain the information, publish all of the evidence Reissman has on the internet and the ad screens, maybe even film a confession. You enter when things start going wrong and we're already tied down doing the more important parts of the plan. Nobody should expect you to be there, and it will take security, Ferris, and Aurora completely off-guard. I'll make sure you're rewarded afterwards, if that's something you want, but this has to happen if we're to destroy this anti-powered sentiment right in its infancy.\"\n\t\t\n\t\tPurge motions toward the tunnels beyond the doorway, the shimmering mask pointed straight towards you. It's time to leave.\n\t\t*goto dawndinner\n\n*label dawndinner\n*page_break\nAfter leaving the stadium, you manage to find the place ${dawnick} had been talking about, a tiny little place close to the Star of Pacifica with a view of the penthouse. The next day, you wake to the sound of heavy trucks outside. Leaning out the window, you see column after column of military vehicles rolling into Pacifica. Later that day, you hear that the Governor has called in the National Guard's aid in gathering powered individuals and organizing their movement to registration centres.\n\nYou sigh and glance over at a phone in the apartment. You have a few choices that you can try.\n\n*choice\n\t*if ((phone = true) and not (ferrisnamed = true)) #Contact the man who gave you the burner phone.\n\t\tThe ringing line was daunting at first, and you felt your heart pounding in your throat as you waited for anything from the other side. Finally, you heard the crackle of the phone being picked up, followed by an instant and overwhelming silence that momentarily made you think the phone was defective. However, you eventually remembered a thing or two from spy films and called into the void.\n\t\t\n\t\t\"Hello? Um, I have information on Dawn. Two days, on the roof of the building opposite the Star, across the square,\" you said, trying to sound as confident as you could. Whoever was on the other end hung up.\n\t\t\n\t\t*goto mamroofieB\n\t*if ((phone = true) and (ferrisnamed = true)) #Contact Ferris Bernard, the man who gave you the burner phone.\n\t\tThe ringing line was daunting at first, and you felt your heart pounding in your throat as you waited for anything from the other side. Finally, you heard the crackle of the phone being picked up, followed by an instant and overwhelming silence that momentarily made you think the phone was defective. However, you eventually remembered a thing or two from spy films and called into the void.\n\t\t\n\t\t\"Hello? Ferris? I have information on Dawn. Two days, on the roof of the building opposite the Star, across the square,\" you said, trying to sound as confident as you could. Whoever was on the other end hung up.\n\t\t\n\t\t*goto mamroofieB\n\t#Find a way to contact Aurora.\n\t\tDelivering a message proved much harder than it should have been, and eventually you had to go sleuthing for a contact number for the detainment facility ${dawnick} told you about. In any case, the message was short and sweet: meet on the rooftop you're now sitting on.\n\t\t\n\t\tWith a quiet yawn, you continue to wait patiently. The Star of Pacifica shines like a beacon before you, the massive screens showing ads for beauty products, fast food, and trucks. Sometimes all three at the same time. The sound of air rushes past you, and the green-blue blur coursing through your vision is a welcome sight when it comes. You bound onto your feet to welcome your fellow hero. Aurora sets down onto the roof behind you, crossing her arms expectantly and furrowing her brow.\n\t\t\n\t\t\"Still in the city? I thought you would have been far gone by now,\" she says, taking in a quick heavy breath. \"I got your message. What do you want?\"\n\t\t\n\t\t\"I called you here because something is about to happen. Something neither of us wants to see. I've talked with Dawn, the leader of that New Dawn cult you've probably run into,\" you say and notice Aurora's eyes narrow, hurrying you to explain further. \"Reissman has been doing a whole lot of bad stuff, Aurora, and New Dawn is going to expose him.\"\n\t\t\n\t\tYou explain the entire affair in some detail to Aurora, and her body language changes throughout your speech. She uncrosses her hands, begins pacing, and keeps glancing at the Star of Pacifica looming behind you as she listens to every word. Finally, as you end the story of what you discovered, she stops and stands still for an extended moment, her eyes glued to the lit-up top of the skyscraper and the penthouse where Reissman lives.\n\t\t\n\t\t\"I'm thankful you've come to me with this information instead of anyone else. The situation is very serious,\" she mutters and turns to you, offering a weak smile. \"I feel like I owe you an explanation. I've been working closely with the government ever since I started in San Francisco. I know of Reissman's objectives, and I'm involved in all of this because someone needs to keep an eye on him and his methods. But what he's doing is valuable to all of us. All I've told you and the others is true about my own motivations: we should be held accountable, in a registry, act within the confines of law wherever it can be applied to our heroics. Reissman, I believe, will act as a major piece in gathering that kind of trust and clout.\"\n\t\t\n\t\t\"How? Why?\" you question, and Aurora nods with a smile.\n\t\t\n\t\t\"It's hard to explain, I don't quite understand the details. Reissman Industries has a secret research team working on figuring out what makes us tick. They want to figure out what's so different about us, then use that information to enhance the rest of humanity. Imagine it. We could hold the cure for cancer within us,\" Aurora says, her idealism shining through her like a wild bonfire.\n\t\t\n\t\t*fake_choice\n\t\t\t#Agree with her.\n\t\t\t\tYou nod at her as she looks to you with eyes burning with passion, her face painted with an expectant giddy smile. She bursts into a laugh as you agree with her and has to struggle to recover her composure, her bubbly nature spilling out of her heroic costume. She clears her throat and brings her attention back to the skyscraper behind you, forcing her face to tighten into more of a blank slate.\n\t\t\t\t\n\t\t\t#Question her ideals.\n\t\t\t\t\"They could also turn that upon us. Break our powers, kill us, torture us, use our powers to enhance soldiers. How could we be part of something like that?\" you ask. Aurora shakes her head in response.\n\t\t\t\t\n\t\t\t\t\"No, it's…we can't think of the possible negative outcomes when there's so much good we are achieving, and can achieve in the future.\"\n\t\t\t\t\n\t\t\n\t\t\"Look, I'll need your help. I can put out the word that they should increase security, but we'll need to get involved. I still have duties all over the place that I must take care of, but you should be a wild card for all parties involved,\" Aurora says to you, nodding her head towards the penthouse. \"I can only assume that you would want to help me stop Nightreaver and Caracal, as well as New Dawn. That's why you called me here, right?\"\n\t\t\n\t\t*choice\n\t\t\t#\"Yes, I want to help you take them down.\"\n\t\t\t\t*set endgame \"Loyal\"\n\t\t\t\t*set loyal_aurora true\n\t\t\t\t\"Good. I'll keep an ear out on what's happening here. I'll make contact with security at the Star of Pacifica, get a direct line to them. You'll need to stay alert and close by to keep monitoring the situation. I promise, I'll come as soon as I can when something—anything—happens,\" Aurora says and smiles warmly, placing a hand on your shoulder and gripping it lightly before her boots leave the ground and she flies off in a blur of colour.\n\t\t\t\t*goto roofie\n\t\t\t*if (sexual = \"Women\") #\"Actually, I called because I've come to care about you and wanted to make sure you're all right.\"\n\t\t\t\t*set flirt_aurora true\n\t\t\t\t\"Oh, that's sweet of…\" Aurora says, then pauses, her eyes darting to look at you with one eyebrow raised. \"Oh…oh, I…wow, um…I don't know what to say.\"\n\t\t\t\t\n\t\t\t\tShe pauses long enough to make things awkward, and both of you go to clear your throats. You quickly answer her question in order to move on from the awkward moment.\n\t\t\t\t*choice\n\t\t\t\t\t#\"The answer is yes. I want to help you take them down.\"\n\t\t\t\t\t\t*set endgame \"Loyal\"\n\t\t\t\t\t\t*set loyal_aurora true\n\t\t\t\t\t\t\"Good. I'll keep an ear out on what's happening here. I'll make contact with security at the Star of Pacifica, get a direct line to them. You'll need to stay alert and close by to keep monitoring the situation. I promise, I'll come as soon as I can when something—anything—happens,\" Aurora says and smiles warmly, placing a hand on your shoulder and gripping it lightly before her boots leave the ground and she flies off in a blur of colour.\n\t\t\t\t\t\t*goto roofie\n\t\t\t\t\t#\"The real reason I called you was to make sure that you don't intervene.\"\n\t\t\t\t\t\tAs soon as you finish your sentence, Aurora lunges at you, her hands balled into fists.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"You won't do anything to me!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if (senses)\n\t\t\t\t\t\t\tYour heightened senses kick in as soon as the hero twitches into motion. Her fist swings just past your head, a strong air current rushing into your ear as you make your best effort to dodge the strike. As you scramble away from the fist, your senses alert you to a second strike incoming. \n\t\t\t\t\t\t\t*if (agility)\n\t\t\t\t\t\t\t\tYour body is already in motion, twisting to the side to dodge the second attack, bringing you around to make an unintentionally fancy flip in order to get out of the way in time. You land on your feet, crouched low and looking up to see Aurora already streaking across the sky in a blur of green and blue.\n\t\t\t\t\t\t\t\t*goto roofie\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYour body isn't as fast as your mind, however, as you try to twist away from the hit but feel the uppercut hit you straight in the gut nonetheless. \n\t\t\t\t\t\t\t\t*if (durability)\n\t\t\t\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t\t*elseif (agility)\n\t\t\t\t\t\t\tYou see the blow coming just in time to try and roll away from it. Aurora's fist swings just past your head, a strong air current rushing into your ear as you make your best effort to dodge the strike. As you scramble away from the fist, you steady yourself directly in the path of another blow heading your way. In a mighty attempt, you try to dodge, but can't get out of the way in time. \n\t\t\t\t\t\t\t*if (durability)\n\t\t\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tThe fist looks like it's heading for your face. In a moment of pure reflex, you throw your hands up and then down to try and guide the incoming blow out of the way. The fist glances off one of your forearms, but the result ends up contorting your entire body as the blow lands in your stomach instead. \n\t\t\t\t\t\t\t*if (durability)\n\t\t\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t\t\t*goto roofall\n\t\t\t*if (sexual = \"All\") #\"Actually, I called because I've come to care about you and wanted to make sure you're all right.\"\n\t\t\t\t*set flirt_aurora true\n\t\t\t\t\"Oh, that's sweet of…\" Aurora says, then pauses, her eyes darting to look at you with one eyebrow raised. \"Oh…oh, I…wow, um…I don't know what to say.\"\n\t\t\t\t\n\t\t\t\tShe pauses long enough to make things awkward, and both of you go to clear your throats. You quickly answer her question in order to move on from the awkward moment.\n\t\t\t\t*choice\n\t\t\t\t\t#\"The answer is yes. I want to help you take them down.\"\n\t\t\t\t\t\t*set endgame \"Loyal\"\n\t\t\t\t\t\t*set loyal_aurora true\n\t\t\t\t\t\t\"Good. I'll keep an ear out on what's happening here. I'll make contact with security at the Star of Pacifica, get a direct line to them. You'll need to stay alert and close by to keep monitoring the situation. I promise, I'll come as soon as I can when something—anything—happens,\" Aurora says and smiles warmly, placing a hand on your shoulder and gripping it lightly before her boots leave the ground and she flies off in a blur of colour.\n\t\t\t\t\t\t*goto roofie\n\t\t\t\t\t#\"The real reason I called you was to make sure that you don't intervene.\"\n\t\t\t\t\t\tAs soon as you finish your sentence, Aurora lunges at you, her hands balled into fists.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"You won't do anything to me!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if (senses)\n\t\t\t\t\t\t\tYour heightened senses kick in as soon as the hero twitches into motion. Her fist swings just past your head, a strong air current rushing into your ear as you make your best effort to dodge the strike. As you scramble away from the fist, your senses alert you to a second strike incoming. \n\t\t\t\t\t\t\t*if (agility)\n\t\t\t\t\t\t\t\tYour body is already in motion, twisting to the side to dodge the second attack, bringing you around to make an unintentionally fancy flip in order to get out of the way in time. You land on your feet, crouched low and looking up to see Aurora already streaking across the sky in a blur of green and blue.\n\t\t\t\t\t\t\t\t*goto roofie\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYour body isn't as fast as your mind, however, as you try to twist away from the hit but feel the uppercut hit you straight in the gut nonetheless. \n\t\t\t\t\t\t\t\t*if (durability)\n\t\t\t\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t\t*elseif (agility)\n\t\t\t\t\t\t\tYou see the blow coming just in time to try and roll away from it. Aurora's fist swings just past your head, a strong air current rushing into your ear as you make your best effort to dodge the strike. As you scramble away from the fist, you steady yourself directly in the path of another blow heading your way. In a mighty attempt, you try to dodge, but can't get out of the way in time. \n\t\t\t\t\t\t\t*if (durability)\n\t\t\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tThe fist looks like it's heading for your face. In a moment of pure reflex, you throw your hands up and then down to try and guide the incoming blow out of the way. The fist glances off one of your forearms, but the result ends up contorting your entire body as the blow lands in your stomach instead. \n\t\t\t\t\t\t\t*if (durability)\n\t\t\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t\t\t*goto roofall\n\t\t\t#\"No. In fact, I wanted to make sure that you don't intervene.\"\n\t\t\t\tAs soon as you finish your sentence, Aurora lunges at you, her hands balled into fists.\n\t\t\t\t\n\t\t\t\t\"You won't do anything to me!\"\n\t\t\t\t\n\t\t\t\t*if (senses)\n\t\t\t\t\tYour heightened senses kick in as soon as the hero twitches into motion. Her fist swings just past your head, a strong air current rushing into your ear as you make your best effort to dodge the strike. As you scramble away from the fist, your senses alert you to a second strike incoming. \n\t\t\t\t\t*if (agility)\n\t\t\t\t\t\tYour body is already in motion, twisting to the side to dodge the second attack, bringing you around to make an unintentionally fancy flip in order to get out of the way in time. You land on your feet, crouched low and looking up to see Aurora already streaking across the sky in a blur of green and blue.\n\t\t\t\t\t\t*goto roofie\n\t\t\t\t\t*else\n\t\t\t\t\t\tYour body isn't as fast as your mind, however, as you try to twist away from the hit but feel the uppercut hit you straight in the gut nonetheless. \n\t\t\t\t\t\t*if (durability)\n\t\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t*elseif (agility)\n\t\t\t\t\tYou see the blow coming just in time to try and roll away from it. Aurora's fist swings just past your head, a strong air current rushing into your ear as you make your best effort to dodge the strike. As you scramble away from the fist, you steady yourself directly in the path of another blow heading your way. In a mighty attempt, you try to dodge, but can't get out of the way in time. \n\t\t\t\t\t*if (durability)\n\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t*goto roofall\n\t\t\t\t*else\n\t\t\t\t\tThe fist looks like it's heading for your face. In a moment of pure reflex, you throw your hands up and then down to try and guide the incoming blow out of the way. The fist glances off one of your forearms, but the result ends up contorting your entire body as the blow lands in your stomach instead. \n\t\t\t\t\t*if (durability)\n\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t*goto roofall\n\t#Call nobody and follow Dawn's request to hang back for now.\n\t\t*set endgame \"NWO\"\n\t\t*goto roofie\n\n*label mamroofieB\nThe door to the rooftop swings open and smacks against the concrete frame with a dull metallic thud. You turn to see three men in suits rush out and spread around the rooftop to make sure you're alone. Soon afterwards, a massive hulking figure comes out of the doorway, looking like he shouldn't fit through at all. He straightens his dark, well-tailored suit and walks towards you.\n\n*if (realname)\n\t\"${name}, \n*if not (realname)\n\t\"${heroname}, \nhow marvelous to see you alive and well after your ordeal. I had thought you a reliable ally, but my confidence was shaken when you walked straight into the government's maw,\" he says and smiles, stopping in his stride around the midway point between the door and you.\n\n\"I know you work for Reissman. The whole lab did. It wasn't your facility, it wasn't even a cage for Dawn. Your safeguards were broken, she used it as a base, probably until something tipped you off, and then escaped with a massive fireball that made sure the world would know about the facility,\" you stated, observing the mammoth tilt his head to the side in interest, then smirk and eventually grimace.\n\n\"Hmm. You're smarter than you look. You didn't put this together by yourself, did you?\" the man grumbles, forcing his face to smile. \"You've met her, haven't you? Well, you called me here about our agreement. What do you have? Where is she?\"\n\n\"I don't know,\" you state bluntly, looking over your shoulder at the Star of Pacifica. \"But I know where she will be. Your boss has become her main target. This whole conspiracy of yours will come crashing down in a few days.\"\n\n\"Conspiracy? Thinking about the well-being of the major populace is a conspiracy now?\" The man laughs in repeated booms. \"Well, we'll have to do something about Reissman's security solution, then, to make sure nobody gets close enough to even breathe the same air as him. And what will your role be in this? Did you lure me here to fight me, or to join me and help?\"\n\n*choice\n\t#\"To join you.\"\n\t\t*set endgame \"Loyal\"\n\t\tThe man smirks and takes a few steps towards you again, his large hands popping his suit jacket open and casually sliding the lapels aside. His hands enter his pockets as he takes the final few steps to your side, standing very casually now, looking past you at the Star of Pacifica.\n\t\t\n\t\t\"You know, I always told him not to build that thing. Too supervillainy,\" he murmurs, turning to smile at you. \"Whether we succeed or fail, I have a feeling we'll get along famously. Great things lie ahead, and together we'll be able to reshape the world if we put out minds to it.\"\n\t\t\n\t\t\"I will put my men to scouring the city in search of Dawn and take over Reissman's security detail personally. You need to stay close by and prepared. Stake out the Star, and be ready to intervene at any moment. I need you to be our ace in the hole, something they won't expect,\" the man says, looking at you confidently. \n\t\t*if not (ferrisnamed)\n\t\t\t*set ferrisnamed true\n\t\t\t\"Ferris Bernard, by the way. Pleasure to be working with you.\"\n\t\t\n\t\tThe large man turns around and walks back to the door, stuffing himself in with the three suited men following close after him. The door closes, and you're left to look back at the Star of Pacifica.\n\t\t*page_break\n\t\t*goto roofie\n\t#\"To make sure you won't stand in their way.\"\n\t\tThe mammoth man laughs again, the few guards he brought with him turning to look at him for a split second before returning to their duties.\n\t\t\n\t\t\"How do you think that will happen?\" he finally asks, his face turning serious and his hands going to unbutton his jacket.\n\t\t\n\t\t*choice\n\t\t\t#\"We can join together and take over Reissman's operation once he's out of the way.\"\n\t\t\t\t\"You have a very interesting way of thinking about things. Mr. Reissman is the head of a large multi-arm company that has been in his family generation after generation after generation,\" the large man says with a wide smile, then looks past you at the Star of Pacifica. \"And you would suggest we, without name, money, or connections…would simply take over?\"\n\t\t\t\t\n\t\t\t\t\"The company? Who cares? The operation under that,\" you say confidently, causing the loud man to chuckle.\n\t\t\t\t\n\t\t\t\t\"Ah. You mean the Reissman-funded effort to study powered individuals and spread the discoveries to the greater public in a wave of 'good-willed' capitalism. That one? Without Reissman, that operation will be cut short from a lack of funds,\" he responds, sliding his hands casually into his pockets.\n\t\t\t\t\n\t\t\t\t\"You said it yourself, the knowledge gathered would make anyone rich. With all of the information under a single umbrella, connections will be easy to make,\" you note, and his smile vanishes for a very brief moment. The large man turns slowly to consider you, then stretches the smile across his face once again.\n\t\t\t\t\n\t\t\t\t*if (body >= 60)\n\t\t\t\t\t*set endgame \"Gain\"\n\t\t\t\t\t\"Hmm. I don't know why, but I think you might be on to something. I have access to most of the project details. With a confident partner, the project could find life outside Reissman's grasp. It'll need turmoil within the company to work, however,\" the man says, his eyes narrowing slightly. \"You prove to me that you're serious, and I'll make sure the project disappears from company lists. If Dawn breaks into the Star, make sure Reissman is killed and she takes the fall for it.\"\n\t\t\t\t\t*goto roofie\n\t\t\t\t*else\n\t\t\t\t\t*page_break\n\t\t\t\t\t\"You're a lunatic,\" he grumbles, shaking his head. \"Mr. Reissman is doing great things, for this city, the people living in it, as well as the nation. He's a leading figure, even on the global level. He has great vision and focus, as well as the necessary ruthlessness to bring all of us to a more civilized age of technology and democratized evolution.\"\n\t\t\t\t\t\n\t\t\t\t\tThe man looks over your shoulder at the Star of Pacifica, then back to you, a very thin smirk forming upon his lips.\n\t\t\t\t\t\n\t\t\t\t\t\"Have you ever heard of Transhumanism? Detestable rabble putting forth all kinds of thought experiments about the limits of the human body and how it could be transcended with the use of technology and medicine. I used to think of them as the dregs of the intelligentsia, but Reissman showed me there's some merit to their never-ending thought experiments. Yes, we capture powered individuals—like Project Dawn—and cut them open in order to figure out how they're different. That's the way of science. We take that which is unknown to us, study and appraise it, then find a way to use the new information to the benefit of all mankind.\"\n\t\t\t\t\t\n\t\t\t\t\t\"So, you tasted the fruit?\" The words escape your lips, prompting the man to chuckle a bit.\n\t\t\t\t\t\n\t\t\t\t\t\"One could say that. I was Project Mammoth. They used the sequencing they found in Dawn and adapted it. I grew in size and strength. I used to be a frail scientist; now, I am so much more,\" he says, glancing back to the massive skyscraper rising behind you.\n\t\t\t\t\t\n\t\t\t\t\tSuddenly, he surges forward.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*if (senses)\n\t\t\t\t\t\tYour heightened senses kick in as soon as the man twitches into motion. His fist swings just past your head, a strong air current rushing into your ear as you make your best effort to dodge the strike. As you scramble away from the fist, your senses alert you to a second strike incoming. \n\t\t\t\t\t\t*if (agility)\n\t\t\t\t\t\t\tYour body is already in motion, twisting to the side to dodge the second attack, bringing you around to make an unintentionally fancy flip in order to get out of the way in time. You land on your feet, crouched low and looking up at the mammoth in front of you, seeing his eyes burn with rage.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou launch back into the fight with a powerful kick off the ground. Instead of hitting the large man, you launch yourself over his shoulder, grabbing onto his suit jacket and then landing with a powerful tug at his collar. The lumbering form comes rolling over your back and lands hard on the roof in front of you.\n\t\t\t\t\t\t\t*goto roofight\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYour body isn't as fast as your mind, however, as you try to twist away from the hit but feel the uppercut hit you straight in the gut nonetheless. \n\t\t\t\t\t\t\t*if (durability)\n\t\t\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t*elseif (agility)\n\t\t\t\t\t\tYou see the blow coming just in time to try and roll away from it. His fist swings just past your head, a strong air current rushing into your ear as you make your best effort to dodge the strike. As you scramble away from the fist, you steady yourself directly in the path of another blow heading your way. In a mighty attempt, you try to dodge, but can't get out of the way in time. \n\t\t\t\t\t\t*if (durability)\n\t\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t*else\n\t\t\t\t\t\tThe fist looks like it's heading for your face. In a moment of pure reflex, you throw your hands up and then down to try and guide the incoming blow out of the way. The fist glances off one of your forearms, but the result ends up contorting your entire body as the blow lands in your stomach instead. \n\t\t\t\t\t\t*if (durability)\n\t\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t\t*goto roofall\n\t\t\t#\"Reissman is wrong to do this. Even you must realize that. He'll put us in camps and dissect us like a modern Mengele.\"\n\t\t\t\t*achieve nazicard\n\t\t\t\t\"Harsh words. Extremely harsh and very unappreciated words,\" the man grumbles, his face pulling into an emotionless blank canvas. \"Mr. Reissman is doing great things, for this city, the people living in it, as well as the nation. He's a leading figure, even on the global level. He has great vision and focus, as well as the necessary ruthlessness to bring all of us to a more civilized age of technology and democratized evolution.\"\n\t\t\t\t\n\t\t\t\tThe man looks over your shoulder at the Star of Pacifica,then back to you, a very thin smirk forming upon his lips.\n\t\t\t\t\n\t\t\t\t\"Have you ever heard of Transhumanism? Detestable rabble putting forth all kinds of thought experiments about the limits of the human body and how it could be transcended with the use of technology and medicine. I used to think of them as the dregs of the intelligentsia, but Reissman showed me there's some merit to their never-ending thought experiments. Yes, we capture powered individuals—like Project Dawn—and cut them open in order to figure out how they're different. That's the way of science. We take that which is unknown to us, study and appraise it, then find a way to use the new information to the benefit of all mankind.\"\n\t\t\t\t\n\t\t\t\t\"You've tasted the fruit?\" The words escape your lips, prompting the man to chuckle a bit.\n\t\t\t\t\n\t\t\t\t\"One could say that. I was Project Mammoth. They used the sequencing they found in Dawn and adapted it. I grew in size and strength. I used to be a frail scientist; now, I am so much more,\" he says, glancing back at the massive skyscraper rising behind you.\n\t\t\t\t\n\t\t\t\tSuddenly, he surges forward.\n\t\t\t\t*page_break\n\t\t\t\t*if (senses)\n\t\t\t\t\
