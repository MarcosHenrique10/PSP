ach\n*choice\n\t#Try to reach the roof.\n\t\t*if ((flight) or (jumping))\n\t\t\t*gosub energyusemin\n\t\t\tYou look up to the circling helicopters, seeing the pattern in their movement. The spotlights rotate slowly, scanning the nearby streets while the crew probably talks to the ground personnel. You notice another helicopter in the distance, rushing towards the skyscraper at great speed. The circling black helicopters immediately shift to meet the new arrival, and you can see that the third one is painted white and blue. The closer it gets, the clearer the news channel logo on the side becomes. You smirk and take your chance to slip in.\n\t\t\t\n\t\t\tYour feet leave the rooftop from where you've been observing the scene. The wind chills your skin as you soar high over the square. Your flight reaches its pinnacle, and you start guiding your motion to land on the skyscraper's roof.\n\t\t\t\n\t\t\tWith a loud clang, you land on a grated walkway and rush to hop over a railing and onto the rooftop itself. The hatch near the middle of the roof stands out, thanks to being marked with a large yellow frame. You rush over to it, slipping in through the hatch just as one of the helicopters turns around and a spotlight illuminates the corner of the roof.\n\t\t\t*goto entry\n\t\t*else\n\t\t\t*gosub energyusemin\n\t\t\tIt's a long way up, but you've grown powerful enough to breeze through the effort. You turn to run off the rooftop and jump over to the next one, then turn and cross that one, heading for the next jump. You circle around the Star of Pacifica, rushing through openings between spotlight passes.\n\t\t\t\n\t\t\tWith enough speed gained, you make a sweeping turn on the rooftop closest to the skyscraper, lunging off the side and straight for the glass exterior of the Star of Pacifica.\n\t\t\t\n\t\t\t*if (teleport)\n\t\t\t\tWhile soaring through the air, you concentrate upon the space behind the windows and stretch out with your power. Instead of smashing through the glass or finding yourself falling to the street far below, you feel a mist rise at the edge of your vision and overcome you. The next moment, you crash straight onto a soft office floor and force yourself into a controlled roll in order to redirect and burn off your momentum.\n\t\t\t\t\n\t\t\t\tYou look out the window as a spotlight runs straight over the window you just passed through. You could risk it by jumping back out and trying to gain altitude with rapid teleports, but you have no idea what's waiting for you upstairs and how much energy you'll need. Instead, you rush to find a staircase or elevator.\n\t\t\t\t*goto entry\n\t\t\t*else\n\t\t\t\tYou soar through the air and with a loud smack land against the window, which somehow holds together despite your gained momentum. With hands and feet holding onto the smooth glass surface, you begin climbing up, rushing as you see a spotlight running straight below you.\n\t\t\t\t\n\t\t\t\tIt feels like the climb takes forever, but you finally reach the edge of the roof. You fling yourself over and roll onto your back. The helicopters go on with their incessant circling, spotlights roaming the sides of the building, sometimes an errant motion bringing the light much too close for comfort. Near the centre of the roof, you see a bright yellow access hatch. Scrambling back to your feet, you rush to the hatch and slip through.\n\t\t\t\t*goto entry\n\t#Head straight for the penthouse.\n\t\t*if ((flight) or (jumping))\n\t\t\t*gosub energyusemin\n\t\t\tYou look up to the circling helicopters, seeing the pattern in their movement. The spotlights rotate slowly, scanning the nearby streets while the crew probably talks to the ground personnel. You notice another helicopter in the distance, rushing towards the skyscraper at great speed. The circling black helicopters immediately shift to meet the new arrival, and you can see that the third one is painted white and blue. The closer it gets, the clearer the news channel logo on the side becomes. You smirk and take your chance to slip in.\n\t\t\t\n\t\t\tYour feet leave the rooftop from where you've been observing the scene. The wind chills your skin as you soar high over the square. Your flight reaches its pinnacle, and you start guiding your motion to land on the small balcony.\n\t\t\t\n\t\t\tWith a solid thud of your soles against the wood-surfaced balcony, you land and take in your surroundings. The full-wall windows separating the balcony from the penthouse are gone, with mounds of glass shards lying around the metal frame. The shards crunch underfoot as you pass inside, just as one of the helicopters turns back, its spotlight illuminating the corner of the building.\n\t\t\t*goto skippoint\n\t\t*else\n\t\t\t*gosub energyusemin\n\t\t\tIt's a long way up, but you've grown powerful enough to breeze through the effort. You turn to run off the rooftop and jump over to the next one, then turn and cross that one, heading for the next jump. You circle around the Star of Pacifica, rushing through openings between spotlight passes.\n\t\t\t\n\t\t\tWith enough speed gained, you make a sweeping turn on the rooftop closest to the skyscraper, lunging off the side and straight for the glass exterior of the Star of Pacifica.\n\t\t\t\n\t\t\t*if (teleport)\n\t\t\t\tWhile soaring through the air, you concentrate upon the space behind the windows and stretch out with your power. Instead of smashing through the glass or finding yourself falling to the street far below, you feel a mist rise at the edge of your vision and overcome you. The next moment, you crash straight onto a soft office floor and force yourself into a controlled roll in order to redirect and burn off your momentum.\n\t\t\t\t\n\t\t\t\tYou look out the window as a spotlight runs straight over the window you just passed through. You could risk it by jumping back out and trying to gain altitude with rapid teleports, but you have no idea what's waiting for you upstairs and how much energy you'll need. Instead, you rush to find a staircase or elevator.\n\t\t\t\t*goto entry\n\t\t\t*else\n\t\t\t\tYou soar through the air and with a loud smack land against the window, which somehow holds together despite your gained momentum. With hands and feet holding onto the smooth glass surface, you begin climbing up, rushing as you see a spotlight running straight below you.\n\t\t\t\t\n\t\t\t\tIt feels like the climb takes forever, but you finally reach the penthouse balcony. You fling yourself over the railing and with a solid thud of your soles against the wood-surfaced balcony, you land on your feet. You pause a moment to take in your surroundings. The full-wall windows separating the balcony from the penthouse are gone, with mounds of glass shards lying around the metal frame. The shards crunch underfoot as you pass inside.\n\t\t\t\t*goto skippoint\n\t*if (turnaway = false) #Go in through the main entrance.\n\t\tYou confidently drop down from the roof, making your way to the square and walking straight past the established blockade, your eyes glued to the front door. As soon as you set foot past the barricades placed between the cars, you hear the clicking of dozens of firearms, the men holding them turning their safeties off and pointing their weapons at you.\n\t\t\n\t\t\"Hey! You can't cross the barrier,\" one of the guards shouts. You can't see which one through the ski masks all of them were wearing.\n\t\t\n\t\tThrough the group of guards pointing guns at you, a slender woman in a tailored suit emerges and immediately calms the situation just with her body language. She comes past the guards, but not a single step closer as she regards you. Her hands move to her waistline and open the dark business jacket to reveal a handgun in a shoulder holster.\n\t\t\n\t\t\"Whoa there! Who the hell do you think you are? What's your business here?\" she asks, her eyes burning into you.\n\t\t\n\t\t*choice\n\t\t\t#\"I'm a hero, and your building has a huge hole in it. I could help.\"\n\t\t\t\t\"Hero, huh?\" she scans you with her eyes, then smirks. \"No hero business here. Gas leak, big boom, we have everything under control.\"\n\t\t\t\t\n\t\t\t\tHer face is cool and collected, showing no emotion whatsoever. If you didn't know better and couldn't put things together from the heavily armed response, you might actually take her for her word. She carries herself with an aura of absolute authority.\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#\"I know what's happening in there. Let me through. Your boss is in danger.\"\n\t\t\t\t\t\t*if (body \u003c= 30)\n\t\t\t\t\t\t\tYou manage to talk to the woman in a calm manner, dropping hints about certain details of the plans you know about, and painting broad assumptions as to what has already happened inside the Star of Pacifica. She stares at you, her face blank, for a good while, trying to make you squirm.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"All right,\" she finally says and signals for the guards to lower their weapons. \"Come with me.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tShe walks through a gap in the group of guards and motions for you to follow her, which you do. You step through the front door to the skyscraper, hot on her heels. The lobby is quiet, the occasional crackle of a radio echoing from somewhere above. The first four floors of the building all open into the lobby, with a vaulted ceiling enclosing the area. Above the ceiling, there are offices and other such spaces, from what you've gathered.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"We had a breach through the underground garage. The guard on night shift bumped into the intruders on floor fifteen and raised the alarm. We found him at the bottom of the elevator shaft when we arrived. We've been unable to raise the penthouse guards on radio, and camera feeds have been cut all over the building,\" the woman explains after the front door closes. Her back is to you.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Knock her out and head upstairs.\n\t\t\t\t\t\t\t\t\t*set benign -5\n\t\t\t\t\t\t\t\t\tAs she walks ahead of you, leading you somewhere while briefing you on the situation, you take a few quick steps to catch up. Suddenly, you lunge forward, grabbing her in a chokehold and forcing her down. You feel her instantly struggle against you, and for a while she succeeds, but you lock in your hold and crouch down. \n\t\t\t\t\t\t\t\t\t*if (kills)\n\t\t\t\t\t\t\t\t\t\tWith a quick jerk, you move your entire upper body, and the woman's neck snaps as she convulses and finally falls to the ground.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou step over her and head on your way. She was kind enough to tell you the cameras were offline, so you'll make quick progress now that you know you don't have to keep an eye out for them.\n\t\t\t\t\t\t\t\t\t*goto entry\n\t\t\t\t\t\t\t\t#Hurry her along so you can go up.\n\t\t\t\t\t\t\t\t\t\"All right, look, I know the people after your boss. They're not going to be waiting around for too much longer. We're wasting time.\" You hurry her along, and she glances back at you, offering a quick nod.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tHer steps become rapid as she leads you through the corridor while her mind races to find a good way to efficiently convey all the information she's gathered from the scene so far.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\"No idea as to how many people will be waiting for you, or if the penthouse is completely locked down, for that matter. It's supposed to double as a huge panic room. Mr. Bernard is heading up on the cargo elevator with a special squad,\" she says and guides you to the public elevator, where she opens the door and leans in to slip a keycard through a thin slot next to the buttons. \"Hold down the buttons for floors five and nine. This elevator will take you straight to the penthouse floor.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou walk in and press the buttons she told you to hold down. She offer you a final nod as the metal doors slide shut and the elevator nudges into motion.\n\t\t\t\t\t\t\t\t\t*goto skippoint\n\t\t\t\t\t\t\t\t#Listen to her brief.\n\t\t\t\t\t\t\t\t\t\"Mr. Bernard has gone up to the penthouse on the cargo elevator. We have no idea how many intruders there are, or where they are. We haven't been able to confirm the location of Mr. Reissman, or if the penthouse has been locked down. If it has been, it's supposed to be a safe room, a near-impenetrable vault,\" she tells you as she walks you to the public elevators. \"If you can't reach anyone inside the penthouse, try and find Mr. Bernard. He'll be grouped up with a squad of special operators who can help you track down whoever else is roaming the building.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tShe opens the elevator door and leans in, sliding a keycard through a small slot next to the buttons. She then holds the door open for you, motioning for you to enter.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\"Hold down the five and nine buttons until the elevator is mobile. It will get you all the way to the penthouse,\" she tells you, then nods a quick goodbye as you enter the elevator and hold down the buttons. The elevator nudges into motion.\n\t\t\t\t\t\t\t\t\t*goto skippoint\n\t\t\t\t\t\t*elseif (body >= 70)\n\t\t\t\t\t\t\tShe stares at you for a good long while, assessing your form and weighing the risks versus benefits of letting you in or not. She definitely doesn't want to fight you, that much you can see from the way she appraises you.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"All right,\" she finally says and signals for the guards to lower their weapons. \"Come with me.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tShe walks through a gap in the group of guards and motions for you to follow her, which you do. You step through the front door to the skyscraper, hot on her heels. The lobby is quiet, the occasional crackle of a radio echoing from somewhere above. The first four floors of the building all open into the lobby, with a vaulted ceiling enclosing the ms to pierce your very being for a moment as she finishes her detailed appraisal.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"We have no need of you here, hero. Turn back around and go back to wherever you came from. Like I said, gas leak. Don't know what you're talking about,\" she says, then nods to the guards.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou're forced to take a few steps back as the ring of guards tightens around you.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Fight your way through.\n\t\t\t\t\t\t\t\t\t*goto squarefight\n\t\t\t\t\t\t\t\t#Try another approach.\n\t\t\t\t\t\t\t\t\tWith a sigh, you smile, nod, turn around, and head back. Soon thereafter, you find yourself back on the rooftop, trying to figure out another way in.\n\t\t\t\t\t\t\t\t\t*goto approach\n\t\t\t\t\t#Fight your way through.\n\t\t\t\t\t\t*goto squarefight\n\t\t\t#\"I'm a hero. What happened here?\"\n\t\t\t\t\"Hero, huh?\" She scans you with her eyes, then smirks. \"No hero business here. Gas leak, big boom, we have everything under control.\"\n\t\t\t\t\n\t\t\t\tHer face is cool and collected, showing no emotion whatsoever. If you didn't know better and couldn't put things together from the heavily armed response, you might actually take her for her word. She carries herself with an aura of absolute authority.\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#\"I know what's happening in there. Let me through. Your boss is in danger.\"\n\t\t\t\t\t\t*if (body \u003c= 30)\n\t\t\t\t\t\t\tYou manage to talk to the woman in a calm manner, dropping hints about certain details of the plans you know about, and painting broad assumptions as to what has already happened inside the Star of Pacifica. She stares at you, her face blank, for a good while, trying to make you squirm.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"All right,\" she finally says and signals for the guards to lower their weapons. \"Come with me.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tShe walks through a gap in the group of guards and motions for you to foll e as you enter the elevator and hold down the buttons. The elevator nudges into motion.\n\t\t\t\t\t\t\t\t\t*goto skippoint\n\t\t\t\t\t\t*elseif (body >= 70)\n\t\t\t\t\t\t\tShe stares at you for a good long while, assessing your form and weighing the risks versus benefits of letting you in or not. She definitely doesn't want to fight you, that much you can see from the way she appraises you.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"All right,\" she finally says and signals for the guards to lower their weapons. \"Come with me.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tShe walks through a gap in the group of guards and motions for you to follow her, which you do. You step through the front door to the skyscraper, hot on her heels. The lobby is quiet, the occasional crackle of a radio echoing from somewhere above. The first four floors of the building all open into the lobby, with a vaulted ceiling enclosing the area. Above the ceiling, there are offices and other such spaces, from what you've gathered.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"We had a breach through the underground garage. The guard on night shift bumped into the intruders on floor fifteen and raised the alarm. We found him at the bottom of the elevator shaft when we arrived. We've been unable to raise the penthouse guards on radio, and camera feeds have been cut all over the building,\" the woman explains after the front door closes. Her back is to you.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Knock her out and head upstairs.\n\t\t\t\t\t\t\t\t\t*set benign -5\n\t\t\t\t\t\t\t\t\tAs she walks ahead of you, leading you somewhere while briefing you on the situation, you take a few quick steps to catch up. Suddenly, you lunge forward, grabbing her in a chokehold and forcing her down. You feel her instantly struggle against you, and for a while she succeeds, but you lock in your hold and crouch down. \n\t\t\t\t\t\t\t\t\t*if (kills)\n\t\t\t\t\t\t\t\t\t\tWith a quick jerk, you move your entire upper body, and the wom er, which you do. You step through the front door to the skyscraper, hot on her heels. The lobby is quiet, the occasional crackle of a radio echoing from somewhere above. The first four floors of the building all open into the lobby, with a vaulted ceiling enclosing the area. Above the ceiling, there are offices and other such spaces, from what you've gathered.\n\t\t\t\t\n\t\t\t\t\"We had a breach through the underground garage. The guard on night shift bumped into the intruders on floor fifteen and raised the alarm. We found him at the bottom of the elevator shaft when we arrived. We've been unable to raise the penthouse guards on radio, and camera feeds have been cut all over the building,\" the woman explains after the front door closes. Her back is to you.\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#Knock her out and head upstairs.\n\t\t\t\t\t\t*set benign -5\n\t\t\t\t\t\tAs she walks ahead of you, leading you somewhere while briefing you on the situation, you take a few quick steps to catch up. Suddenly, you lunge forward, grabbing her in a chokehold and forcing her down. You feel her instantly struggle against you, and for a while she succeeds, but you lock in your hold and crouch down. \n\t\t\t\t\t\t*if (kills)\n\t\t\t\t\t\t\tWith a quick jerk, you move your entire upper body, and the woman's neck snaps as she convulses and finally falls to the ground.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou step over her and head on your way. She was kind enough to tell you the cameras were offline, so you'll make quick progress now that you know you don't have to keep an eye out for them.\n\t\t\t\t\t\t*goto entry\n\t\t\t\t\t#Hurry her along so you can go up.\n\t\t\t\t\t\t\"All right, look, I know the people after your boss. They're not going to be waiting around for too much longer. We're wasting time.\" You hurry her along and she glances back at you, offering a quick nod.\n\t\t\t\t\t\t\n\t\t\t\t\t\tHer steps become rapid as she leads you through the corridor while her mind races to find a good way to efficiently convey all the information she has gathered from the scene so far.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"No idea as to how many people will be waiting for you, or if the penthouse is completely locked down, for that matter. It's supposed to double as a huge panic room. Mr. Bernard is heading up on the cargo elevator with a special squad,\" the woman says and guides you to the public elevator, where she opens the door and leans in to slip a keycard through a thin slot next to the buttons. \"Hold down the buttons for floors five and nine. This elevator will take you straight to the penthouse floor.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou walk in and press the buttons she told you to hold down. She offers you a final nod as the metal doors slide shut and the elevator nudges into motion.\n\t\t\t\t\t\t*goto skippoint\n\t\t\t\t\t#Listen to her brief.\n\t\t\t\t\t\t\"Mr. Bernard has gone up to the penthouse on the cargo elevator. We have no idea how many intruders there are, or where they are. We haven't been able to confirm the location of Mr. Reissman, or if the penthouse has been locked down. If it has been, it's supposed to be a safe room, a near-impenetrable vault,\" she tells you and walks you towards the public elevators. \"If you can't reach anyone inside the penthouse, try and find Mr. Bernard. He'll be grouped up with a squad of special operators who can help you track down whoever else is roaming the building.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tShe opens the elevator door and leans in, sliding a keycard through a small slot next to the buttons. She then holds the door open for you, motioning for you to enter.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Hold down the five and nine buttons until the elevator is mobile. It will get you all the way to the penthouse,\" she tells you, then nods a quick goodbye as you enter the elevator and hold down the buttons. The elevator nudges into motion.\n\t\t\t\t\t\t*goto skippoint\n\t\t\t#Fight your way through.\n\t\t\t\t*goto squarefight\n\t*if (teleport) #I can teleport. I'll just teleport inside and make my way up.\n\t\t*gosub energyusemin\n\t\tIt's a long way up, but you've grown powerful enough to breeze through the effort. You turn to run off the rooftop and jump over to the next one, then turn and cross that one, heading for the next jump. You circle around the Star of Pacifica, rushing through openings between spotlight passes.\n\t\t\n\t\tWith enough speed gained, you make a sweeping turn on the rooftop closest to the skyscraper, lunging off the side and straight for the glass exterior of the Star of Pacifica.\n\t\t\n\t\tWhile soaring through the air, you concentrate upon the space behind the windows and stretch out with your power. Instead of smashing through the glass or finding yourself falling to the street far below, you feel a mist rise at the edge of your vision and overcome you. The next moment, you crash straight onto a soft office floor and force yourself into a controlled roll in order to redirect and burn off your momentum.\n\t\t\n\t\tYou look out the window as a spotlight runs straight over the window you just passed through. You could risk it by jumping back out and trying to gain altitude with rapid teleports, but you have no idea what's waiting for you upstairs and how much energy you'll need. Instead, you rush to find a staircase or elevator.\n\t\t*goto entry\n\n\n*label squarefight\nThere are at least twenty heavily armoured black SUVs arranged around the square. Within that cordon stand—by a quick count—some thirty armed men and women, as well as the four men and women in suits; one is down in the square with you, while the others stand next to the main entrance. High above circle two helicopters, one of which is being distracted by herding a news helicopter. If the helicopters have weapons on them, you have no idea what kind of arsenal it might be.\n\nThe numbers are very much against you.\n\n*fake_choice\n\t#Rush the guards and cause as much damage as you can.\n\t#Make a beeline for the door.\n\t#Cause some chaos and slip inside.\n\n*if (durability)\n\t*gosub energyusemax\n\tYou rush the nearest guard, jumping at him and smashing him against the ground with a loud crack. While in motion, you can hear the sound of loud booms all around you as the guards unload their weapons in your direction. As you shift away from the prone guard, you feel the bullets being shot at you bouncing off your thick skin.\n\t\n\tThe guards, seeing that their weapons have no effect on you, decide to switch tactics very quickly. Instead of traditional firearms, the entire group of several dozen highly trained mercenaries take up shock batons and rush you. The batons themselves don't feel like anything, whether the blows or the small metal spikes trying to pierce your skin. Yet when the spikes touch you and the arcs of electricity suddenly redirect themselves through your skin, you feel the jolts. Even if the shock wasn't subdermal, it's enough to make your muscles lock up and cause a great deal of pain.\n\t\n\tWith great effort, you force yourself into the zone. \n\t*if (energypower)\n\t\t*if (fire > ice)\n\t\t\tYou throw balls of fire, melt down the rubber batons, cause unused ammunition to suddenly explode; all the tricks in the book to keep the majority of the guards away while you're in the melee.\n\t\t\t*goto fightyend\n\t\t*else\n\t\t\tYou throw up ice shields, freeze the rubber batons until they're brittle, encase some guards in frozen blocks; all the tricks in the book to make sure you don't get overwhelmed in the melee.\n\t\t\t*goto fightyend\n\t*elseif (strength)\n\t\tYou block batons, ripping them out of the hands of the guards and using them as throwing weapons. You even use the guards themselves as throwing weapons, bowling down half a dozen other guards with one.\n\t\t*goto fightyend\n\t*else\n\t\tYou block batons, ripping them out of the guards' hands and tossing them aside, or even throwing them at other guards.\n\t\t*goto fightyend\n*else\n\tYou rush the nearest guard, jumping at him and smashing him against the ground with a loud crack. While in motion, you can hear the sound of loud booms all around you as the guards unload their weapons in your direction. As you shift away from the prone guard, you glance down and see blood dripping to the ground at your feet. With some speed, you rush and try to get past the next guard, but mid-stride you feel your legs give way.\n\t\n\tYou hit the ground hard, hearing a crack from your skull as you land face-first on the paved square. A red river flows between the paving stones. You feel your body shutting down, \n\t*if (healing)\n\t\tyour wounds healing rapidly and sapping your energy completely. To heal several hundred gunshot wounds, it will take several months to recover. With some effort, you lean your head back and look at the Star of Pacifica. From somewhere high above, a helicopter spotlight blinds you.\n\t\t\n\t\tYou fall unconcious.\n\t\t*goto_scene startup detourshort\n\t*else\n\t\tcold shivers going through you as the blood pumps out. With some effort, you lean your head back and look at the Star of Pacifica. From somewhere high above, a helicopter spotlight blinds you.\n\t\t\n\t\tYou fall unconcious.\n\t\t*goto_scene startup detourshort\n\n*label fightyend\nThe entire square breaks out into a massive brawl, and you're in the middle of it all, struggling to keep yourself afloat.\n*page_break\n*set throw_spot true\nIn the heat of the fighting, you begin to feel something small and hard raining down upon you. You look up to see a figure heading directly towards the square, having been flung out a window with a shower of glass. From the colours alone, lit up by the lights of the square, you recognize Crimson Caracal's outfit. She's coming down fast.\n\nAbove her, you suddenly see a second figure jump out of the same shattered window. They come down even faster, making themselves as aerodynamic as possible. Just before reaching Caracal, the second figure suddenly opens large white wings that immediately become like light sources unto themselves as they reflect the light from the square. Icarus…\n\nYou watch as Icarus grabs Caracal and swoops her up into the air. Their sudden appearance gives you enough time to depart from the fight and rush to the doors. In one swift motion, you make your way past the lobby reception table to find a way up to the top of the building.\n*page_break\n\n*label entry\nThe corridors are empty. Eerily so.\n\nYou make your way from floor to floor, finding most of the building completely deserted. It actually makes no sense to you just how empty the building is, when the outside is crawling with heavily armed people. You expected at least a few patrols on the upper floors, but there's nothing. \n\nWhile walking along one of the top floor corridors, you notice damage on the wall. A bullethole, then a scorch mark on the floor with a small flash-bang husk nearby, then a human-sized dent in the wall.\n*if (ultravision)\n\tThe dent in the wall is splashed with a slightly luminescent fluid. You concentrate upon the traces visible only in ultraviolet and observe very faint blood splatter in the grooves. The trail is tiny, so no real damage was caused to whoever was thrown against the wall. The faint trail heads off in small smudges, guiding you like tiny LED lights embedded in the floor and walls. \n*if (infravision)\n\tIt's warmer in the corridor than the previous one. You reach out with your senses and concentrate upon the infrared signatures left behind, observing a very faint trail of footsteps and handprints heading down the corridor. \n\nYou must be getting close. With some fresh urgency in your steps, you hurry down the corridor to find a way to the penthouse.\n*page_break\n*if not (throw_spot)\n\t\"Icarus!\" You hear a shout come down the corridor. You rush ahead to find out where it came from, only to hear a loud shattering of glass.\n\t\n\tYou come around a corner into a large open-plan office with several figures tied into a brawl near the far windows. The glass has shattered across two panes of the full-wall windows, and you see a massive man standing by the opening, wearing a suit and a helmet with a slightly elongated forehead and some kind of short, tusk-like stubs coming out of its front.\n\t\n\tThe brawl gets thrown to the side in one sudden motion, and you watch as Icarus emerges from this bundle of people, rushing past the large man and diving straight out the window. There's a moment of confusion as the people Icarus had been fighting try to regroup. Then one of them catches a glimpse of you.\n\t\n\t\"Hey, there's another one over there!\"\n\t*if (((endgame = \"Loyal\") and (loyal_aurora = false)) or (endgame = \"Gain\"))\n\t\t*page_break\n\t\tThere's a pause as the large hulking figure by the window looks over at you, then his voice rumbles through the office.\n\t\t\n\t\t\"Let that one go. ${heroname} is a friend!\" he calls out, and you recognize the voice: Ferris Bernard.\n\t\t\n\t\tFerris marches toward you, taking long strides and making short work of the distance. He extends his hand for a shake just as there's a crunch of glass and Icarus re-emerges from the outside, his white wings shining and his arms holding Crimson Caracal.\n\t\t\n\t\t\"Looks like greetings need to be postponed. Head to the penthouse, Dawn is in there with Reissman. I think Aurora is fighting her, but she'll need help. Hurry up,\" Ferris says, nodding, \n\t\t*if (endgame = \"Gain\")\n\t\t\t\"and remember what we talked about. I'm counting on you to hold your end.\"\n\t\t\t\n\t\t\tHe then rushes back towards Icarus, rallying the guards to him and restarting the brawl all over again.\n\t\t\t*goto skippoint\n\t\t*else\n\t\t\trushing off straight for Icarus, rallying the guards to him and restarting the brawl all over again.\n\t\t\t*goto skippoint\n\t*else\n\t\t\n\t\t\"This one is mine! Keep watch on the flying one!\" the large man shouts, giving you just enough time to recognize him: Ferris Bernard.\n\t\t*page_break\n\t\tThe mammoth of a man takes action, his tusk-equipped helmet pointed straight at you as he charges right through an unfortunate office desk.\n\t\t*if (strength)\n\t\t\tYou push your feet against the floor and steady yourself, leaning forwards. The man charges straight at you without hesitation, prepared to run straight over you. Instead, just at the right moment, you grab him by the tusks and sling him over you and through the wall behind you into another office.\n\t\t\t\n\t\t\t*goto mammothfight\n\t\t*else\n\t\t\tThere's plenty of time and room to get away, and you jump up just as the charging man reaches you, rolling straight over his form and evading the brunt of it. Instead of running through you, he runs through the wall behind you and crashes into another office space.\n\t\t\t\n\t\t\t*goto mammothfight\n\n*label mammothfight\nBehind you, you hear the crunch of glass and glance back. Icarus stands at the window, his white extended wings shimmering with reflected light, in his hands a slightly worse-for-wear-looking Crimson Caracal. The guards jump into action and rush them, but both of your fellow vigilantes are quick to get into the fight. Icarus does look your way in the midst of the chaos, offering a nod and a smile to you.\n\n\"Hey ${heroname}, I hope you have your will in order,\" Ferris calls out to you while scrambling through the hole he made in the wall. \"Because you're not going to be walking out of here!\"\n\nHe then rushes at you again.\n\n*fake_choice\n\t#Go on the offence: take him down before he can cause any damage.\n\t#Stay defensive: let him wear himself out.\n\n\nWith a loud crash, the large man stumbles through another wall. Yet he keeps on steaming ahead, making a large sweep and smashing through the same wall in a different place, rushing straight for you. Instead of outright evading or using his momentum to take him down right away, you place yourself in front of one of the round concrete pillars. With a last-second jump, you get out of the way and let Ferris crash straight into the pillar. A loud clang sounds through the office as he smashes through the concrete and hits the large steel I-beam inside.\n\n\"So, what should I call you now that you're officially a supervillain?\" you call out. \"Battering Ram?\"\n\nWhile Ferris stands up and fixes his helmet, he lets out a chuckle in the midst of his grunts. \"Mammoth! I'm Mammoth!\"\n\nHe then charges you again.\n*choice\n\t*if ((energypower = \"true\") and (fire > ice)) #Put the heat on him.\n\t\t*gosub energyuse\n\t\tYou push out with your powers and see the air begin to shimmer. As the man stomps towards you, a wall of fire bursts to life between the two of you and quickly reaches out at this Mammoth. He still bursts straight through the fire, although you notice that the tusks on his helmet have slightly melted and drooped from their previous shiny posture.\n\t\t\n\t\tYou strike again with fire, splashing the Mammoth's face with a small ball-shaped inferno. The helmet is heavily scorched but still looking surprisingly good. His suit is also scorched and littered with tiny embering holes, revealing a layer beneath that seems to resist the heat very well.\n\t\t\n\t\tDespite your efforts, the man keeps coming. He leans his head down and batters straight into you, tossing you through a thin office wall.\n\t\t*goto mammothend\n\t*if ((energypower = \"true\") and (fire \u003c ice)) #Put him in ice.\n\t\t*gosub energyuse\n\t\tYou push out with your powers and see the air begin to sparkle. As the man stomps towards you, it appears as if the frost clinging to him is doing nothing to halt him. As soon as a bit of ice forms, it's shattered by the bulging muscles striving to propel the Mammoth towards you.\n\t\t\n\t\tInstead, you switch tactics and concentrate upon the floor. A layer of sheer ice forms in the space between you and him, and you prepare to evade him. Indeed, the Mammoth isn't prepared for the slippery surface and stumbles, smashing face first onto the ice. His tusk catches in the ice, throwing him over his shoulder as he keeps sliding toward you at great speed.\n\t\t\n\t\tWith a quick hop, you evade him as he courses straight past where you'd been and through yet another office wall.\n\t\t*goto mammothend\n\t*if (agility = \"true\") #Keep mobile and strike fast.\n\t\t*gosub energyuse\n\t\tThe Mammoth stomps towards you at great speed. Instead of avoiding him, you hop up and over, kicking down into his neck and back with your heels as he passes underneath. You hear a loud crash from behind you as the Mammoth stumbles through another wall, then lets out a scream of rage.\n\t\t\n\t\tInstead of rushing you again, he grabs an office table and throws it at you. The piece of heavy furniture narrowly misses as you bend backwards to avoid being hit, then smashes against another desk behind you.\n\t\t*goto mammothend\n\t*if (strength = \"true\") #Stop him and brawl it out.\n\t\t*gosub energyuse\n\t\tYou push your feet against the floor again and steady yourself. The Mammoth smashes into you, and your muscles strain as you grab onto him and force him to a halt. The two of you slide all the way through another office wall, smashing through the drywall from the momentum.\n\t\t\n\t\tOnce halted, you smash your fist straight into the large man's side, then knee him in the gut. The Mammoth responds by taking hold of your waist and lifting you up, smashing you straight into the floor and following you down, beginning to pummel you back. \n\t\t*if (durability)\n\t\t\tHis fist crashes into your body at full force, but your thick skin resists blow after blow. You exchange a long series of heavy hits to one another before you finally manage to get a good hold on him and toss him back out to the main office.\n\t\t\t*goto mammothend\n\t\t*else\n\t\t\tHis fist crashes into you, and you feel the shocks of pain shoot through you again and again. Instead of being a squishy punching bag for him, you need to get him off of you. Your hands grasp at him for a hold, which you eventually gain, and you toss him back out into the main office with a loud grunt.\n\t\t\t*goto mammothend\n\t*if (teleport = \"true\") #Keep him guessing by teleporting around him.\n\t\t*gosub energyuse\n\t\tThe mist overcomes your vision once more, and you feel the numbness that has come to be a fairly pleasant feeling to you. The mist withdraws for just a fraction of a moment, you feel your foot hit something solid and massive, just before the mist takes over again. Then, you feel your fist hit the Mammoth's side just before all feeling leaves your body.\n\t\t\n\t\tIn short, rapid bursts, you keep bouncing in and out of the mist to launch a single strike before disappearing again. Even from the very brief glimpses into reality, you can hear and feel the seething anger in the Mammoth as you keep bouncing around him like a pesky fly.\n\t\t\n\t\tFinally, he begins to flail errantly at the air around him. A lucky shot hits your leg just before it makes contact, throwing your focus off long enough for the massive man to grab hold of you and throw you through a wall.\n\t\t*goto mammothend\n\t#Keep avoiding him.\n\t\tYou keep bouncing around, trying to keep yourself mobile while offering a fair defence and occasional counter-attacks. The Mammoth goes with you for a while, swinging into air or crashing through furniture as he chases you. Then an errant swing actually glances off you, throwing you off-balance just enough to bring you toppling over instead of finishing a vault over a desk.\n\t\t\n\t\tThe massive man grabs your leg and swings you straight through a wall.\n\t\t*goto mammothend\n\t#Try to keep at a range.\n\t\tThe large man chases you, but you keep running away. You pepper him with whatever you can get your hands on. \n\t\t*if (gadget)\n\t\t\tYou even put your gadgets to good use, trying to see if he responds to gas, electric shock, even a flash-bang. \n\t\tNothing seems to be effective, but he definitely gets angrier and angrier as you keep escaping his grasp. Finally, he decides to respond to your ranged attacks with one of his own: while moving to a new vantage point, you find a large office desk smashing directly in front of you. Careening to a sudden halt to save yourself, a chair comes from the same direction and strikes you directly in the side. You topple down to the floor.\n\t\t\n\t\tThe massive man is on you in an instant, grabbing your leg and swinging you straight through a wall.\n\t\t*goto mammothend\n\n\n*label mammothend\n*page_break\nThe Mammoth rushes at you again, but you see a sudden red streak in your vision as Caracal comes into frame. She runs full-tilt diagonally to intercept the huge man chasing you around, then launches herself up into the air and drop-kicks Ferris in the back of the head. Both of them continue the diagonal momentum and topple over into a pile of broken office furniture.\n\n\"Go! You need to help Dawn and Nightreaver! We'll keep acting as distraction!\" Caracal shouts as she reveals a set of blades from her knuckles and slashes down at the Mammoth.\n\nYou see Icarus handling the other guards just fine, and rush out of the offices. Once again, you're on your way up.\n*page_break\n*label skippoint\nThe penthouse is completely open. You emerge into it and tread carefully on the floors littered with broken furniture and random household items. You round a corner into the living room proper and find a pile of guards in suits stacked up against the wall. All of them are either dead or unconscious—you don't check to make sure, since you're still looking for the fight that caused the destruction.\n\nYou make your way into the kitchen, which looks like someone lit a bonfire in the middle of it. The walls are scorched, and the floor is a slowly draining puddle from the sprinkler system. A door has been broken down on the opposite side of the kitchen. You follow the trail of destruction into a large dining room with a second balcony.\n\nThe large mahogany table has been flipped over and broken in three. One of its legs is sticking out of the wall on the opposite side of the room. Several full-wall windows have been broken into a spiderweb of shards being held together by thin sheets of plastic in the middle of the security glass. A dark heap is slumped next to one of the windows.\n*page_break\nYou walk further in and find the dark heap to be Nightreaver. He takes heavy, tired, and raspy breaths. His eyes are open but focused on nothing. You take a quick moment to check him out and find that he's regaining his focus and energy, his eyes eventually focusing upon your face and his lips mouthing something even as no sound comes out.\n\nA gunshot booms outside and you hop to your feet, rushing past Nightreaver's very much alive body.\n\nFrom your new angle, you see that the balcony goes around the corner and continues. This must connect to the helicopter pad on the side of the Star of Pacifica. You think back, and determine that you should be roughly at the right height for this to be plausible.\n*page_break\nYour slow chase continues outside. The wind howls and tugs at you as you sneak out onto the narrow balcony surrounded by stone railings and gargoyles. With steady steps, you walk past the corner, seeing Aurora and Purge engaged in a fight, while two other figures climb the steps up to the helipad.\n\nYou hear a gunshot, followed by two more in rapid succession. Flashes of light indicate them to be coming from whoever one of the climbing figures is, possibly Dawn or Reissman.\n\nThe fight between Purge and Aurora is a mess. The two are intertwined in a blur of green, blue, and white. You see one or the other sometimes fly off and slam into a wall, only to get up and back into the fight. The two of them are of little consequence; the two people who matter are getting higher and higher. You give chase.\n*page_break\nYour feet slap againt the stone steps leading upwards. With long strides, you rush up several steps at a time, catching up to the two fleeing figures just as they get to the upper balcony directly preceding the helipad. You notice one of the helicopters circling above slowly come around, then hover with its spotlight pointed straight at the helipad.\n\nYou get up to the next balcony just in time to see one of the figures flare up into a bipedal figure of sheer flame. The feminine figure rushes forward, and the light from her flames shows you the face of the man running from her. Mr. Reissman, the wealthy heir to an industrialist empire, is pushing into his late sixties but still appears to be quite spry. He jumps aside and allows the flaming woman to rush past, training his pistol upon her and firing twice.\n\nThe flame suddenly dwindles, and you see Dawn slump to her knees. Her shirt slowly becomes red in two places along her spine. Reissman sees you and immediately trains the gun at you. Even from a distance, you can see the barrel shaking.\n\n\"Who the devil are you? Another one of these freaks?\" he calls out, shoving the barrel of the gun towards you repeatedly.\n\n*if (endgame = \"NWO\")\n\t\"I'm here to expose you and make sure you get locked up for what you've done,\" you say and take a step forwards.\n\t\n\t\"Ha! What I've done?\" He shoves the barrel towards you again to try and make you stop. \"What is it that I've done? I built a city to house hundreds of thousands who would otherwise be rummaging in ruins! I want to make sure you freaks actually do good instead of spreading chaos with your so-called vigilante justice! How is it that I'm supposed to be the villain in this situation?\"\n\t\n\tHe pauses while backing away, his finger still on the trigger with the barrel pointed right at you.\n\t\n\t\"You have no idea what's really happening, do you? You don't have a real cause. If you did, you would be fighting the government, not me!\"\n\t*goto finalcount\n*elseif ((endgame = \"Loyal\") and (loyal_aurora = false))\n\t*set aggro false\n\t\"Sir, I'm here on behalf of Ferris Bernard. I'm here to help,\" you say, taking a step forward.\n\t\n\t\"Bernard? Why the hell would he want anything to do with one of you freaks?\" he shouts, but you see his finger leave the trigger and rest right above the trigger guard, while his head turns to look at the woman. \"Fine. My helicopter is coming down to fetch me and get me the hell out of here. Buy me some time to get onboard.\"\n\t*goto finalcount\n*elseif (endgame = \"Gain\")\n\t*set aggro false\n\t\"Sir, I'm here on behalf of Ferris Bernard. I'm here to help,\" you say, taking a step forward.\n\t\n\t\"Bernard? Why the hell would he want anything to do with one of you freaks?\" he shouts, but you see his finger leave the trigger and rest right above the trigger guard, while his head turns to look at the woman. \"Fine. My helicopter is coming down to fetch me and get me the hell out of here. Buy me some time to get onboard.\"\n\t*goto finalcount\n*elseif (endgame = \"Chaos\")\n\t\"I'm here to expose you and make sure both of you get what's coming to you,\" you say, taking a step forwards.\n\t\n\t\"Ha! What's coming to us?\" He shoves the barrel towards you again to try and make you stop. \"What is that? Jail? I built a city to house hundreds of thousands who would otherwise be rummaging in ruins! She has freak powers that let her escape justice! Neither I nor her will go to jail for anything, and you know it. So enlighten me, what's coming to us?\"\n\t\n\tHe pauses while backing away, his finger still on the trigger with the barrel pointed right at you.\n\t\n\t\"You have no idea what's really happening, do you? You don't have a real cause. If you did, you would be fighting the government, not me!\"\n\t*goto finalcount\n*elseif (loyal_aurora)\n\t*set aggro false\n\t\"I'm here on behalf of Aurora. She wanted my help to make sure you get through this safely,\" you say, taking a step forward.\n\t\n\t\"Aurora!\" Reissman shouts quizzically, glancing in the general direction where she's fighting Purge.\n\t\n\tHe pauses. You see his finger leave the trigger and rest right above the trigger guard, while his head turns to look at the woman bleeding out on the balcony.\n\t\n\t\"Fine, little hero. My helicopter is coming down to fetch me and get me the hell out of here. Buy me some time to get onboard.\"\n\t*goto finalcount\n*else\n\t\"I don't actually know. I came to find out what I could do. The powered heroes are ripping each other to pieces, you intend to lock all of us up, the people are frightened. I'm not sure yet as to what path would lead to the best outcome.\"\n\t\n\t\"Ha! And what would that be, then? Your fellow freaks are terrorists, and since you're not on my side either, I'm going to assume you have some kind of chip on your shoulder about my gains, as well. Never mind the fact that I built this damned city and saved hundreds of thousands from a life of rummaging in ruins!\" Reissman shouts, glancing at the woman bleeding out on the balcony. \"Hate to break this to you, little hero, but there's no right path to take! There is no happy ending to be found here.\"\n\t*goto finalcount\n\n*label finalcount\n*page_break\nThe wind howls as you stand on the balcony, a helicopter hovering above, its incessant spotlight partly blinding you. In front of you, Reissman stands with his arms open and his suit jacket flapping in the strong wind. You breathe heavily, remembering the carnage you saw leading up to this moment. Dawn lies still against the stone balcony, her back bloodied by the gunshot wound and a puddle of red forming beneath her.\n\nReissman sees your hesitation.\n\n\"What do you think you can achieve here? You freaks have ruined everything! The city lies in chaos, and there are people with who-knows-what kind of powers walking among us and ready to explode at any given moment! We were trying to help. Help you, help the innocents who don't know their powers, help the ordinary citizens. But you toss all of that in our faces and act as if we've done something wrong here. I've only tried to look after this city. A city I built!\"\n\nYou take a few steps closer. \n*if (aggro)\n\tReissman points the barrel straight at your head and squeezes the trigger. There's a cold click, followed by another. It appears that the man has spent his bullets. \nReissman puts the gun away and stares you down, taking a few slow steps back.\n\n*if (endgame = \"Loyal\")\n\tYou know the right thing to do would be to keep him safe. Whether he's a bad man or not isn't for you to decide. If he'd been doing all that the other vigilantes say, there would be an investigation into that kind of corruption. Right now, the best thing would be to keep the status quo stable, keep progressing towards a safe and regulated coexistence between powered people and the ordinary populace. The only way to do that is through that same status quo.\n\t*goto faggio\n*elseif (endgame = \"Gains\")\n\tYou know what needs to be done. The agreement you have with Ferris still stands, but the choice will ultimately be up to you. One way or the other, Reissman needs to fly off the balcony.\n\t*goto faggio\n*elseif (endgame = \"NWO\")\n\tYou know what Dawn wants you to do. Reissman has to go down, but stay alive to face the harsh reality of justice. Things must be public and done by the book in order to make sure Reissman's little empire comes crumbling down.\n\t*goto faggio\n*else\n\tYou're free to choose your path from here on out. It feels strange, sudden, abrupt. You feel like you've been on a roller coaster, and now it has suddenly stopped so you can get off and choose your own ride. It's just you and Reissman, nobody else whispering their ideas into your ear.\n\t*goto faggio\n*label faggio\n*page_break\nAs you're about to make your decision, you hear the ad speakers from the sides of the building suddenly screech and wail. A gravelly voice comes on, gurgling into a microphone somewhere. The light of the massive ad screens flicker and change. You have no idea what's happening on the screens, but can make a healthy guess from the colours being splashed onto nearby buildings, as well as the voice itself.\n\n\"I am called Nightreaver,\" the gravelly voice calls out through the speakers, \"and you all will bear witness to the crimes of Reissman Industries. They have spread corruption through the government, built a private army meant to hunt down everyone with powers, and established a concentration camp in the mountains where they can experiment on us. We have had enough. You don't have to trust us or praise us as heroes, no matter what we do and how we keep you safe. But there are things in this world that are wrong. I, for one, will not stand by while someone tries to marginalize and oppress me and those like me, or conduct unethical tests on our bodies.\"\n\nThe voice continues. Reissman rushes to the balcony railing and looks down at the square, where chaos has erupted. \n*if (endgame = \"Loyal\")\n\tYou take a step towards him, only to see Purge suddenly blur in from the edge of your vision and stop between you and Reissman. The white-clad figure turns to face Reissman, and you see hands emerging from beneath the dirty white cloak.\n\t\n\t*choice\n\t\t#Stop Purge.\n\t\t\t*set benign +10\n\t\t\t*set reissman_escape true\n\t\t\t*goto purgefight\n\t\t#Allow it to happen.\n\t\t\t*set benign -15\n\t\t\tPurge shoves Reissman over the railing. For some reason, you just stand back and watch it happen. You hear a faint shriek in Aurora's voice, but can't see the familiar green-blue blur of the flying hero. She was either too slow to react, or simply couldn't. A moment later, you hear a united gasp from the square below as Reissman lands on the hard stone pavement.\n\t\t\t\n\t\t\t\"Why?\" you hear a gasping voice ask, and turn to see Dawn lying in her own blood, looking up at Purge. The masked figure turns as well.\n\t\t\t\n\t\t\t\"Because he wouldn't see justice otherwise,\" Purge says, the modulator projecting a confident voice from behind the mask. \"The evil must be Purged.\"\n\t\t\t\n\t\t\tThe mask then turns to stare directly at you while you're still locked in place. \"I will be seeing you again.\"\n\t\t\t\n\t\t\tPurge runs as a faint white blur, moving past the edge of the balcony and out of sight. High above, the helicopter moves away from the building, leaving you in relative darkness. The bleeding woman looks up to you and says something you can't hear, yet somehow intuit. You feel the urge to help her, an urge you can't resist. You kneel down next to her and pull up her shirt to reveal the bullet wounds, still spewing out blood.\n\t\t\t\n\t\t\t*if (flight)\n\t\t\t\tYou very gingerly pick her up. Your feet leave the balcony, and you float up to the sky, then suddenly shift direction and shoot towards the nearest hospital.\n\t\t\t\t*goto posty\n\t\t\t*else\n\t\t\t\tWith the woman whispering unintelligibly, your hands seem like they're working by themselves. It's a strange experience, as you see your hands bandaging her after ripping off pieces of her clothes and your own outfit, all while your mind doesn't know what you're actually doing. After bandaging her, you pick her up very gingerly and head back down to deliver her to the nearest hospital.\n\t\t\t\t*goto posty\n*else\n\t*choice\n\t\t#Throw him off the roof.\n\t\t\t*set benign -10\n\t\t\t*set reissman_dead true\n\t\t\t*achieve juslord\n\t\t\tYou smirk and step forward again. While he's distracted, you take your opportunity and grab him by the shoulders, pull him back, then sling him straight over the stone railing, watching as he arcs just past the lower balcony and continues downward.\n\t\t\t\n\t\t\tYou hear a faint shriek in Aurora's voice, but can't see the familiar green-blue blur of the flying hero. She was either too slow to react, or simply couldn't. A moment later, you hear a united gasp from the square below as Reissman lands on the hard stone pavement.\n\t\t\t\n\t\t\t\"Why?\" you hear a gasping voice ask, and turn to see Dawn lying in her blood, looking up at you. You turn away and look up to the sky. It's over. Reissman is done.\n\t\t\t*goto posty\n\t\t#Grab him and turn him over to the police.\n\t\t\t*set benign +15\n\t\t\t*achieve gilded\n\t\t\tYou smirk and step forward again. While he's distracted, you take your opportunity and grab him by the shoulders, pull him back, and sling him straight into the hard wall behind you. The smack is mighty, and there's a thud that follows soon after as he crumples unconscious to the floor. You make sure that he's actually unconscious before you do anything else.\n\t\t\t\n\t\t\tWith a relieved sigh, you look to the sky. It's over. Reissman is done.\n\t\t\t*goto posty\n\n\n\n*label purgefight\nYour hand quickly shoots out and grabs Purge by the shoulder, ripping the figure backwards and straight into the hard wall behind you. The figure crumples into a pile of white, while Reissman rushes to back away towards the steps leading up to the helipad. The helicopter hovering above comes closer, causing your outfit to flap in the strong wind. As Purge stands back up, the white cloak also billows.\n\n\"Again, you stand in my way. Time to finish this,\" Purge says, the modulator squealing as it tries to express the correct tones in the words.\n\nIn a blink, Purge is gone. The next moment, you feel a fist bury itself in your side. \n*if (durability)\n\tInstead of recoiling in pain, you stand your ground and turn to take a swing at your fast opponent. The punch somehow manages to hit, probably taking the white-clad adversary by surprise. They move back and hesitate, allowing you to get into a ready stance.\n\t*goto purgefight2\n*else\n\tYou recoil in pain and jump to the side while Purge remains in place, waiting to watch you squirm. The punch was mighty, but not enough to take you completely out of the fight. Standing back upright, you shifted to a ready stance.\n\t*goto purgefight2\n\n*label purgefight2\n\nPurge is far too fast for offence, as well as for reactionary defence. You glance up at the landing helicopter and smirk. You don't have to defeat Purge, just buy enough time for the helicopter to take off again.\n*fake_choice\n\t*if ((energypower = \"true\") and (fire > ice)) #Lash out with fire.\n\t\t*gosub energyusemax\n\t\tWith a quiet chuckle, you pull on your concentration and feel the air warping by your hands. You open them up to your sides and wait for a moment until the air finally ignites. Making single strands of flame, you form two whip-like infernos to stretch out of your hands. With a smirk at Purge, you swing them around in wide arcs, lashing them at the white-clad figure and blocking the path to Reissman.\n\t\t\n\t\tYou watch as Purge backs away from the flicks of flame reaching towards them. He blurs and reappears at your side, but a flame is already on the way there. He tries another spot, but another flame is moving to fill that spot. With an annoyed grunt, Purge backs off and studies your slightly chaotic movements.\n\t\t\n\t\tSuddenly, he blurs in your vision and charges. Both the flames are at your sides, and you know where the adversary is going to strike as soon as he blurs into motion. The hit comes straight through the flame whips and hits you in the chest, sending you back to the stone railing. With a groan, you quickly get back up, only to have Purge appear over you. Two hands grab onto you and pin you against the railing, trying to shove you over.\n\t\t\n\t\tInstead of allowing it to happen, you reach down within you and lock eyes with the shimmering mask. The air between the two of you shimmers and then combusts as an infernal shell surrounds you. From beyond the flames, you hear modulated screeches of pain.\n\t*if ((energypower = \"true\") and (fire \u003c ice)) #Lash out with ice.\n\t\t*gosub energyusemax\n\t\tWith a quiet chuckle, you stare down your opponent. You know just the solution for this speedster, and you push out with your powers, manipulating the air around him. Tiny sparkles hang in the air around the white-clad figure as you stare each other down. You're the first to mov, forming a small clump of ice on your palm and slinging it straight at Purge in order to get the adversary moving. You succeed. The figure blurs, but much slower than usual as the frost slows Purge's muscles.\n\t\t\n\t\tThe flash of white moves to the side, then charges straight at you. You smile and snap your powers to full, freezing the figure in motion into a solid icicle. With full momentum, Purge crashes straight into the railing, and the ice formed on the opponent's clothes and body shatters. Purge quickly backs off, coughing and swaying in pain.\n\t\t\n\t\tWith a confident smirk, you move back into a ready stance.\n\t*if (agisense = \"true\") #Trust in your agility and heightened senses to guide you.\n\t\t*gosub energyuse\n\t\tThe two of you stare each other down for a while, both of you ready for a fight. Purge is the first to move, charging straight at you. Although you are slower, your senses alert you to the strike coming at you. Your agility allows you to shift aside in time to avoid the blow and counterattack.\n\t\t\n\t\tBlows are exchanged in rapid succession, with most of Purge's punches hitting you, yet you struggle through. With a smile, you keep fighting, landing blow after blow by relying upon sheer instinct.\n\t\t\n\t\tAfter a while, you manage to throw a knee high into the air just as Purge charges forward. The mask hits your knee and cracks slightly, tossing Purge back. The white-clad figure retreats to a distance and stares you down again.\n\t#Try to lock him in melee combat.\n\t\tYou charge at Purge, ready for a brawl. You strike the air with punch after punch, kick after kick. Finally, a lucky hit lands on Purge, but as you land the blow, you see that the opponent has instead captured your leg and twists it around. The motion jerks you over in the air, slamming you face-first into the stone surface of the balcony.\n\t\t\n\t\tPurge descends upon you, slamming at your back and sides. A dozen blows or so later, you manage to kick your leg up and use the momentum to shove Purge off of you. Scrambling back to your feet, you retreat and get back into a ready stance.\n\t#Just stay in his way and draw his attention.\n\t\tYou charge at Purge, ready for a brawl. You strike the air with punch after punch, kick after kick. Finally, a lucky hit lands on Purge, but as you land the blow, you see that the opponent has instead captured your leg and twists it around. The motion jerks you over in the air and slams you face-first into the stone surface of the balcony.\n\t\t\n\t\tPurge descends upon you, slamming at your back and sides. A dozen blows or so later, you manage to kick your leg up and use the momentum to shove Purge off of you. Scrambling back to your feet, you retreat and get back into a ready stance.\n\t\t\n\n*page_break\nPurge recovers and stands on the far side of the balcony. You glance up and see the helicopter taking off again. With a smirk, you point it out and rush at Purge. You run straight through the air as your opponent shifts over to where you had been.\n\n\"This isn't over, ${heroname}!\" Purge shouts through the screaming modulator before taking off running. The white blur moves straight over the edge of the balcony and then out of sight.\n\nWith a sigh, you glance up to the sky at the helicopter flying into the distance. It's over. Reissman is safe.\n*page_break\n*label posty\n\n*if (fame >= 100)\n\t*achieve famous\nFamous to many, infamous to others, you've grown into a hero of your own. The first few years of powered people flying around and solving problems is over. You've made your mark on the world, \n*if (loyal_aurora)\n\tstanding with a titan and paragon: Aurora. \n\t*goto end1\n*elseif (endgame = \"Chaos\")\n\tstanding beside true heroes and warriors of justice; Nightreaver, Crimson Caracal, and Icarus. \n\t*goto end1\n*elseif (endgame = \"NWO\")\n\tstanding before the rising dawn with titans of a new world: Dawn and Purge. \n\t*goto end1\n*elseif (endgame = \"Gain\")\n\tstanding in the shadows and waiting for your opportunity beside a behemoth: Ferris Bernard.\n\t*goto end1\n*else\n\tstanding by your very own brand of justice: a lone wolf.\n\t*goto end1\n\n*label end1\n*page_break\n*if (reissman_escape)\n\tYou allowed Reissman to get away, but the released and publicised evidence of his wrongdoing went far in reducing his hiding places. His allies turned on him, his guards left him, and many in his close family went public in condemning him. The Coast Guard intercepted his yacht off the coast as he was trying to flee south.\n\n*if (reissman_dead)\n\tAfter the altercation atop the Star of Pacifica, Reissman Industries took a dive in the stock market. Their owner had been implicated in corruption, criminal enterprises, and a large-scale conspiracy. The death of the mastermind offered the board of directors some room to save themselves and distance the company from the man, but it remained a PR disaster. Reissman Industries would suffer a hostile takeover by Omnia Enterprise Solutions a year later, combining the two corporations into the international conglomerate Reissman-Omnia Corporation.\n\t*if not (nolobby)\n\t\tTwo days before they announced the merger, a gift basket arrived at your doorstep with a thank-you card from Daniel Clarke. You don't remember aiding him or Omnia in any way, aside from hearing the man out in the coffee shop, so it struck you as odd that they would go to such lengths.\n\t*goto end2\n*else\n\tAfter the altercation atop the Star of Pacifica, Reissman Industries took a dive in the stock market. Their owner had been implicated in corruption, criminal enterprises, and a large-scale conspiracy. Although you had Reissman in your grasp and ready to go to jail, he had the money and friends to buy his freedom and return to business. To salvage the company, the board of directors had been busy trying to distance themselves from the corporation and Reissman's actions, but when his case got thrown out of court, they all stepped down in a major exodus. Under the firm control of Mr. Reissman, the corporation was involved in a highly controversial merger with Omnia Enterprise Solutions a year later, combining the two corporations into the international conglomerate Reissman-Omnia Corporation. \n\t*if not (nolobby)\n\t\tTwo days before they announced the merger, a gift basket arrived at your doorstep with a thank-you card from Daniel Clarke. You do not remember aiding him or Omnia in any way, aside from hearing the man out in the coffee shop, so it struck you as odd that they would go to such lengths.\n\t*goto end2\n*label end2\n\nBlackWatch, the men in black that had raided the penthouse meeting and worked to capture powered individuals in the name of the government, was officially disbanded. However, it very quickly became apparent that it would still survive, as elements of it reincorporated as smaller security services. At least two of them have openly come out as the first security professionals who are equipped and trained to secure facilities even from powered individuals.\n*page_break\nYou walk out of the courthouse in your full hero outfit, and you see others lined up along the steps, behind them a mass of press. In the line of heroes waiting at the steps are Icarus, Leatherback, Aurora, and Caracal. You step down and hear the press begin shouting questions at you in unison. \n*if (reissman_dead)\n\tYour final appearance at court was done. Once more, you explained the death of Reissman and somehow got to walk, despite the prosecution demanding terrible things to happen to you.\n\t*goto end20\n*else\n\tYour final appearance at court was done. Once more, you had to testify before a judge and jury about everything you'd seen and been through during your short vigilante career.\n\t*goto end20\n\n*label end20\n\n*if (benign >= 100)\n\t*achieve boyscout\n*if (benign \u003c= 0)\n\t*achieve brutal\nYou looked at the faces of the other waiting vigilantes and sighed. Some of them looked at you with derision, some with pride, some with utter neutrality. \n*if (endgame = \"chaos\")\n\tDawn was nowhere to be seen. You'd learned that Nightreaver turned her in, although nobody had heard anything more about it. Nightreaver told you that he'd sneaked into the police station and seen a recording of Dawn walking out of jail without anyone blinking an eye.\nUnsurprisingly, Nightreaver is absent from the group. You're sure the evening news would show him busting small crime halfway across the city while you were on the stand.\n\nShifting your eyes past all of that, you find yourself looking across the street, where three figures stand in bright outfits that look like they come straight out of a superhero film. The next generation of powered heroes, vigilantes ready to take up the mantle and go through the same rough starting period as you had in the aftermath of the earthquake. They were seeking a mentor. You know, because one or two of them have already been stalking you for several weeks.\n*if not (angieshot = \"false\")\n\tRemembering back to your co-worker Angie, you thought that they would definitely need it. Civilians should never be in the line of fire. Fortunately, Angie had returned to work after a few months of treatment, and continues therapy to this day.\n\nYou start to head down the large stone steps when a reporter tries to burst through to you.\n\n\"Do you have anything to say to us?\" she shouts over the others. The other reporters are also shouting at you, and the other vigilantes are slowly moving toward you. If you do have anything to say, you definitely don't have the time or opportunity for a long speech.\n*choice\n\t#\"No side has been right in this mess. Trust the rule of law, not anyone who would manipulate it.\"\n\t\t*goto shoopydoo\n\t#\"No side has been right in this mess. Everyone here deserves to be judged.\"\n\t\t*goto shoopydoo\n\t#\"We are your friends, not enemies. Do not fear us.\"\n\t\t*goto shoopydoo\n\t*if (rennowreveal) #\"Purge is Richard Rennow.\"\n\t\t*goto shoopydoo\n\t#\"Work with us, not against us!\"\n\t\t*goto shoopydoo\n\t#\"Reissman's work has been despicable. Something like this cannot happen again!\"\n\t\t*goto shoopydoo\n\t#\"These proceedings are a farce. The government should face judgement, not just Reissman.\"\n\t\t*goto shoopydoo\n\t#\"Reissman only wished for the betterment of humanity.\"\n\t\t*goto shoopydoo\n\n*label shoopydoo\nThe entire mass of reporters explodes into mixed shouts and further questions. You can hear a word here or there, but can't make out full sentences. You turn away from the crowd, camera flashes illuminating you and everything around you.\n\n*if (loyal_aurora)\n\tAurora walks up to you, flanked by a man in a cheap-looking suit and and a badge pinned to his lapel stating that he's a visitor to the courthouse.\n\t\n\t\"Our work is far from done, ${heroname}. Those kids look up to us and seek guidance. I've pulled some strings, and it seems like we might get a mentoring program off the ground. A place for them to study their powers. They've asked me to head it, but I'm not that kind of a person. Instead, I've given them your name,\" Aurora says, motioning for the suited man to come closer.\n\t\n\t\"Hello, ${prefix} ${heroname}, I'm Julian Cazarosta. Pleased to meet you. I'm in charge of the mentor program, and we've heard a great deal about you. Do you have any interest in joining us on this?\"\n\t*choice\n\t\t#No, I'm done with heroics.\n\t\t\t*achieve retire\n\t\t\t*set retiree true\n\t\t\t*goto end3\n\t\t#The kids need someone. I'll do it!\n\t\t\t*achieve school\n\t\t\t*goto end3\n\t\t*if (notam = true) #No, I need to go back to my homeland.\n\t\t\t*achieve homeward\n\t\t\t*goto end3\n\t\t#No, I'm the wrong person for that.\n\t\t\t\"Good,\" Aurora says with a smile. \"Because I need you with me.\"\n\t\t\t\n\t\t\t*if (flirt_aurora)\n\t\t\t\tThere's a moment where you can hear the blood rushing through your veins when Aurora says that, and you could swear she just winked at you too. With a clearing of your throat, you force yourself to calm down.\n\t\t\t\n\t\t\t\"Oh, yes. The United States government is most pleased with Aurora's actions so far. We're sanctioning her missions on US soil, and she has requested that you might accompany her on a trial basis,\" Julian says and smiles before catching his words. \"Oh, trial basis at first, of course. I'm sure we'll have many things for you to achieve.\"\n\t\t\t*choice\n\t\t\t\t#Accept an official position.\n\t\t\t\t\t*achieve agent\n\t\t\t\t\tYou agree with a nod, shaking hands with the hero and the government man. All of you exchange smiles.\n\t\t\t\t\t\n\t\t\t\t\t\"We have a great future ahead of us, I'm sure of it,\" Mr. Cazarosta says.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto end3\n\t\t\t\t*if (flirt_aurora) #Wink at Aurora and accept.\n\t\t\t\t\t*achieve agent\n\t\t\t\t\tYou agree with a nod, then turn to Aurora and wink. She surprises you by leaning in and kissing you, placing a hand on your cheek as she does so. The moment seems to last for a lifetime, but eventually it breaks, and she pulls away.\n\t\t\t\t\t\n\t\t\t\t\t\"I'll definitely be seeing you later, then,\" she says and gives you a smile, flying up to the sky.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto end3\n\t\t\t\t#No, I don't want this.\n\t\t\t\t\t*goto end3\n*else\n\tIcarus walks up to you, standing tall with an aura of confidence that never seems to waver. Even on occasions where you argue or fight, he never changes his opinion of you, it seems.\n\n\t\"Those kids look up to us for some reason. I've been asked to establish a place for them to study, but I can't relate to them, or know what they need. I'm thinking of suggesting that you take my place instead,\" he says into your ear, pausing for a moment to give you time to take it in.\n\t*choice\n\t\t#No, I'm done with heroics.\n\t\t\t*achieve retire\n\t\t\t*set retiree true\n\t\t\t*goto end3\n\t\t#The kids need someone. I'll do it!\n\t\t\t*achieve school\n\t\t\t*goto end3\n\t\t*if (notam = true) #No, I need to go back to my homeland.\n\t\t\t*achieve homeward\n\t\t\t*goto end3\n\t\t#No, I'm the wrong person for that.\n\t\t\t*goto end3\n\n*label end3\n*if ((endgame = \"Gains\") and (reissman_dead))\n\t*achieve project\n\tYou exchange quick handshakes and continue down the steps, finding a long black limousine waiting for you. The door opens as you get closer, and you get in, closing the door behind you. You look over at the large man sitting opposite you as the car nudges into motion and find Ferris Bernard smiling a fairly unnerving smile.\n\t\n\t\"Stage one has just completed. We've compiled all the data we're left with, and it appears we're now ready to start gathering hopefuls. A lot of good will come out of this,\" he says, glancing out the window. \"As well as a lot of profit. It's good to be in business, partner.\"\n\t*goto end4\n*elseif (retiree)\n\tYou exchange quick handshakes and continue down the steps, finding a taxi waiting to cart you away. With the press still shouting after you, you open the door and tell the driver to just drive for a while. With a nod, the driver pulls out into traffic. A few intersections later, the taxi hangs a right and keeps going.\n\t\n\t*if (living = \"far\")\n\t\tFinally, you just tell the driver an address some ways down from the road to your home. With a curt nod, the driver turns left at the next intersection and starts heading to the address. You tip the driver generously when you finally stop, then get out and head off for the familiarity of home.\n\t\t\n\t\tYou walk confidently through the door and begin tripping out of your outfit. With a sigh, you remove the last piece, then turn to look at the pile of cloth and equipment. With a single sweep, you gather all of it up and toss it into the trash as you go to take a shower.\n\t\t*goto end4\n\t*else\n\t\tFinally, you just tell the driver an address some two blocks away from your home. With a curt nod, the driver turns left at the next intersection and starts heading to the address. You tip the driver generously when you finally stop, then get out and head to an alley that provides a shortcut to your house.\n\t\t\n\t\tYou crawl in through the window you keep open for your vigilante escapades and begin tripping out of your outfit. With a sigh, you remove the last piece, then turn to look at the pile of cloth and equipment. With a single sweep, you gather all of it up and toss it into the trash as you go to take a shower.\n\t\t*goto end4\n*else\n\tYou continue down the steps and find a taxi waiting to cart you away. With the press still shouting after you, you open the door and tell the driver to drop you off a few blocks away so you can then make your own way. The taxi takes a right after the second intersection, then continues until the driver is sure the press isn't making chase before pulling over. You pay the driver and tip generously, then rush into an alley and head straight for the rooftops once more.\n\t*goto end4\n\n\n*label end4\n*page_break End\nWe hope you've enjoyed playing [i]Best of Us.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThank you for playing!\n\nFor more from the same author, head over to \n*link http://www.teokuusela.com.\n*line_break\nYou can also follow the author on Twitter @dGoshman.\n\n*ending\n\n\n*label energyusemin\n*if (endurance)\n\t*if (energy >= 20)\n\t\t*set energy -2\n\t\t*return\n\t*elseif (energy >= 10)\n\t\t*set energy -2\n\t\tYou feel yourself pushing out with the last of your energy. Your breathing is heavy, your limbs numb, and your mind is becoming clouded. Your energy is all but spent, and you can't go on for much longer.\n\t\t*return\n\t*else\n\t\t*set energy 0\n\t\t*goto_scene startup detour\n*else\n\t*if (energy >= 20)\n\t\t*set energy -5\n\t\t*return\n\t*elseif (energy >= 10)\n\t\t*set energy -5\n\t\tYou feel yourself pushing out with the last of your energy. Your breathing is heavy, your limbs numb, and your mind is becoming clouded. Your energy is all but spent, and you can't go on for much longer.\n\t\t*return\n\t*else\n\t\t*set energy 0\n\t\t*goto_scene startup detour\n\n*label energyuse\n*if (endurance)\n\t*if (energy >= 20)\n\t\t*set energy -5\n\t\t*return\n\t*elseif (energy >= 10)\n\t\t*set energy -5\n\t\tYou feel yourself pushing out with the last of your energy. Your breathing is heavy, your limbs numb, and your mind is becoming clouded. Your energy is all but spent, and you can't go on for much longer.\n\t\t*return\n\t*else\n\t\t*set energy 0\n\t\t*goto_scene startup detour\n*else\n\t*if (energy >= 30)\n\t\t*set energy -10\n\t\t*return\n\t*elseif (energy >= 20)\n\t\t*set energy -10\n\t\tAs you push out with your powers, you notice just how exhausted you are. Your breathing is heavy, your limbs numb, and your mind is becoming clouded. Your energy levels are low, and somewhere in your mind, you know that you can't go on for much longer.\n\t\t*return\n\t*else\n\t\t*set energy 0\n\t\t*goto_scene startup detour\n\n*label energyusemax\n*if (endurance)\n\t*if (energy >= 30)\n\t\t*set energy -10\n\t\t*return\n\t*elseif (energy >= 20)\n\t\t*set energy -10\n\t\tYou feel yourself pushing out with the last of your energy. Your breathing is heavy, your limbs numb, and your mind is becoming clouded. Your energy is all but spent, and you can't go on for much longer.\n\t\t*return\n\t*else\n\t\t*set energy 0\n\t\t*goto_scene startup detour\n*else\n\t*if (energy >= 50)\n\t\t*set energy -20\n\t\t*return\n\t*elseif (energy >= 40)\n\t\t*set energy -20\n\t\tAs you push out with your powers, you notice just how exhausted you are. Your breathing is heavy, your limbs numb, and your mind is becoming clouded. Your energy levels are low, and somewhere i
