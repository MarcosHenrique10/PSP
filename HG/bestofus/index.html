cluding the thrilling conclusion!\n\n  *purchase_discount adfree 2016-01-01 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.", "collection": "*set energy 100\n*set aurora_met true\n*if not (caracal_met = \"fight\")\n\t*set caracal_met \"true\"\n\n*temp cofnum 1\n*temp muggertold false\n\n\n[i]It only takes one spark to light a world-consuming fire. The modern age is full of phones with video capture and short-fused social media that are much too fast to form into lynch mobs without having all of the known facts at hand. These heroes were careful, but some were not as careful as they should have been. The actions of a few soon branded everyone who had powers, whether they had taken up vigilantism or not.[/i]\n\n[i]Aurora remained the first and most well-known. Even as many pushed to sling misinformation about her, many others gathered to push back. She emerged from the worst few weeks with surprisingly little effect on her public image. In hushed whispers, some claimed that leniency was paid for by unknown sponsors.[/i]\n*page_break\n\"…and today, Mr. Rennow finally returned to public life after several weeks of mourning over the tragic loss of his son at the hands of the vigilante known as Crimson Caracal,\" the news anchor said, sliding something on the touch-screen embedded in his desk, the camera panning at the same time to include a monitor on the screen. On the monitor, you could see surprisingly sharp pictures of Crimson Caracal on top of a black SUV, then fleeing after the SUV had crashed.\n\n\"The Pacifica Metropolitan Police Department has requested the public to be on the lookout for this South African vigilante. Although the police refuse to release official records, the Chief Constable has stated that the department has open cases on her ranging from breaking and entering to attempted murder of a state official.\" The man behind the news desk looked off-camera for a split second, then turned back to stare directly out from the TV screen.\n\n\"We are now going live to a statement being given by Lieutenant-Governor Rennow.\"\n*page_break\nThe speech started off slow, with a solemn tone, the words of the usually straight-standing state official now overcome by the rapping of camera shutters, his face awash in the bright light from their flashes.\n\n\"You think they're really going to do it? Enforce some kind of law on these vigilantes?\" a man casually asked. You glanced around, seeing nobody else in earshot who he might be talking to.\n\nThe coffee shop you were sitting in was largely empty, and the seats the two of you were taking up happened to be the best for hearing the TV. Before you could reply, the man continued, his voice filled by the waves of a lovely thespian accent, common in older Shakespearian players.\n\n\"I hope not. It was a tragedy what happened, but I don't think they should make these people the bad guys. Not all of them are like that. The legislation they've been talking about would basically put these people under watch 24/7. Strange powers or not, they have the right to privacy.\"\n\n*label coffeset\n*if (cofnum = 3)\n\t*goto aftercoffee\n*else\n\t*hide_reuse\n\t*choice\n\t\t#\"I think I agree with you.\"\n\t\t\t*set cofnum +1\n\t\t\t\"I would imagine most people do. Freedom is a value held extremely high in this country. It would be a shame to see all that change because some distrust their fellow man,\" he notes, then furrows his brow. \"Of course, this wouldn't be the first time it happened.\"\n\t\t\t\n\t\t\t*goto coffeset\n\t\t#\"What do you think would happen if they tried to control these powered people? It's just legislation.\"\n\t\t\t*set cofnum +1\n\t\t\t\"It always starts as just legislation, then it gets implemented and twisted as much as possible until someone gets the Supreme Court involved. This legislation could end in an atmosphere of fear that will put us all back into a situation where we drag even innocent people out of their homes and into camps, just because they might be a threat.\" He looked up at the TV screen and took a sip of his harsh-smelling black coffee before speaking again. \"And I hear tyranny is certainly not what this country was built upon.\"\n\t\t\t\n\t\t\t*goto coffeset\n\t\t#\"It's going to be a moderate solution in any case. They'll have to compromise to get it through.\"\n\t\t\t*set cofnum +1\n\t\t\t\"Will they?\" he asks, twirling his cup for a brief moment before looking back to you. \"The bill already has bipartisan support, and the public is leaning towards isolating the dangerous unknown. At least for now.\"\n\t\t\t\n\t\t\tHe pauses for a long moment and smiles at you.\n\t\t\t\n\t\t\t\"I do hope they compromise and come up with a moderate solution. A reasonable solution, which isn't based on fear of the unknown.\"\n\t\t\t\n\t\t\t*goto coffeset\n\t\t#\"Maybe some of them need this kind of oversight.\"\n\t\t\t*set cofnum +1\n\t\t\t\"Maybe, but who's going to do the watching? With some of these powers, they could be out in international waters well before the authorities could even react to one of them going overboard. What's the answer to that? An international effort is unlikely. More likely, one country is going to overstep the boundaries and either begin employing or imprisoning these people with powers, setting off a domino effect that will shape the entire future of this planet. Either by eradicating a quirky set of mutations that would bring us all forward as a species over time, or by making them rebel and causing irreparable damage.\" He placed his cup on the saucer and looked you in the eyes.\n\t\t\t\n\t\t\t\"Unless overwhelmed, everyone tends to rebel when their own country tries to take away their liberties. When it is a foreign government trying to take away your liberties, now then…then there will be a full insurrection.\"\n\t\t\t\n\t\t\t*goto coffeset\n\t\t#\"I don't know. This might be one of those times where we have to balance security and freedom.\"\n\t\t\t*set cofnum +1\n\t\t\t\"Perhaps, but there's a historical basis to argue that it isn't worth the costs that come with it,\" he says with a mournful look at his drink.\n\t\t\t\n\t\t\t\"What do you mean?\"\n\t\t\t\n\t\t\t\"Ah, I don't wish to lecture. Honestly, I don't even remember all the facts myself. The United States has always been a land of overkill. From the treatment of blacks, to sexual and religious minorities, to wartime enemies. Too often, the go-to answer for the question of finding security is isolation from the public.\"\n\t\t\t\n\t\t\t*goto coffeset\n\t\t#\"What do you care? You're not from around here.\"\n\t\t\t*set cofnum +1\n\t\t\t*if not (nation = \"American\")\n\t\t\t\t\"Well, neither are you. That much is clear,\" the man said and smiled at you, taking another sip of his coffee.\n\t\t\t\t\n\t\t\t\"But that is beside the point. Just because I wasn't born in America, do you think that excludes me from what happens in America? What America does, the rest of the world follows in one way or another. This just happens to be one of those situations where the entire world is watching for someone to go first, and nobody can afford to rest on their laurels. I would daresay that this arrival of powers, powers that we've only seen in comics and fantastical films prior to this, could become a greater issue for the entire planet than the creation of the atom bomb.\"\n\t\t\t\n\t\t\t*goto coffeset\n\t\t#Bid him farewell and leave.\n\t\t\tYou say your goodbyes, but he quickly moves to stop you.\n\t\t\t*goto aftercoffee\n\t\t#Stand up and leave.\n\t\t\tYou stoop up and left the man in an awkward silence. He sat for a moment longer, then you heard him jump up from his seat and rush after you. Just as you were getting out the door, the man huffed his way past you and, with an apologetic smile, turned back to look at you.\n\t\t\t\n\t\t\t\"Hey, I apologize. You don't have to storm off, I was just trying to make conversation.\"\n\t\t\t*choice\n\t\t\t\t#Keep walking.\n\t\t\t\t\t*set nolobby true\n\t\t\t\t\t*goto crackdown\n\t\t\t\t#Hear him out.\n\t\t\t\t\t*goto aftercoffee\n\n*label aftercoffee\n*achieve english\n\"Oh, I never properly introduced myself. I apologize. My name is Daniel, Daniel Clarke,\" the man said, extending his hand for a shake. \"I work as a consultant for Omnia Enterprise Solutions. Specifically, I've come here to analyse the feasibility of high-speed network infrastructures from a political and socioeconomic focus. Sounds boring, doesn't it?\"\n\nThere is a pause as he smiles, locked in place. Then he seems to realize he had more to say and clears his throat, his face becoming more serious and his hands patting down his pockets to find a business card to hand you.\n\n\"Truth be told, I already know who you are, ${prefix} ${surname}. I've had you tagged as a person of interest for about two weeks. \n*if (work = \"governor\")\n\tMainly because you're working with Governor Serres on his campaign and have close ties to the man. As you can understand, this is important for anyone who might end up lobbying for any new network initiatives.\"\n*if (work = \"aid\")\n\tYou work for a good cause, you know the streets here better than anyone, and you see the situation here improve or decline on a daily basis. Your input would be most important for an accurate analysis by our project.\"\n*if (work = \"consulate\")\n\tMainly because you work with the consulate of your nation. Although you may not work directly in the politics of this state or this country, you still have reach here, if you pull on the right strings and make the right connections. As you can imagine, this would be very important if I am to lobby for any projects here.\"\n*comment endif\n\nThe two of you looked at one another for a brief moment of silence as his words started latching on to other pieces of information in your head. The entire state's network capabilities had been largely destroyed during the quakes, and although the many companies who owned the cable networks in the state were trying to rebuild, Omnia was a fresh competitor with top-of-the-line technology to make the entire process go much smoother.\n*page_break\n\"Mr. Clarke, I don't…\" you started, but he interrupted by offering you a small business card. You glanced down at it and saw the soft off-white colouring and smooth indented lettering, your hand reaching for it instinctively.\n\n\"Please, don't say anything. I just want a contact who can help me reach those who would actually need to hear my sales pitch. You will remain without a name in all my contact books and reports, and I won't say anything about you to whoever I talk to. We both know that this entire state would benefit from having Omnia come in and get something done.\"\n\n*fake_choice\n\t#\"Sure, I'll help you.\"\n\t\t\"Great! I'll be contacting you within the next few weeks, and we'll get some gears in motion. I really appreciate you doing this.\"\n\t\t\n\t#\"No, I want nothing to do with lobbyists.\"\n\t\t*set nolobby true\n\t\t\"Well, that's unfortunate. But not the end of the world or the project. I thank you for your time nonetheless.\"\n*comment endif\n\nYou departed from Daniel with a prompt and brief handshake. As you walked away, you heard a car stop, a door open, and Mr. Clarke step inside. Moments later, a white sedan drove past you and headed towards the city centre.\n*page_break\n*label crackdown\nThe following night, you were doing your usual rounds around the city. Some criminals had become emboldened by the public backlash against the 'freaks,' while others openly ran in the opposite direction when you showed up and used your powers. It was just past midnight when you picked up on the trail of a couple of muggers who had escaped you the few previous nights. Normally, you might not let yourself get dragged into quite such street-level crime, but something about this bunch drew your attention. Perhaps it was the bodies they sent to the nearest emergency room, or perhaps it was the level of organization they seemed to have. A pattern was emerging, and you felt like you were hot on their trail that night.\n\nYou entered a dark yard that had once been a playground behind some apartment buildings. Now the buildings had lost half their floors, and what remained served as a dangerous refuge for bored kids.\n\nAs you crossed into the yard, you looked around and saw two figures moving into one of the buildings, an iron door closing behind them. Above the door, you saw a mix of spray-painted images and tags competing for space. It appeared that someone had sprayed the words \"NEW DAWN\" all over it.\n\nThe words still haunted you from the day you had first seen them. You felt prepared, however, as you had been training.\n*fake_choice\n\t#I had trained my body to endure.\n\t\t*set body +10\n\t#I had trained my mind to stay sharp.\n\t\t*set body -10\n\nThe broken-down plastic slide from a disused wooden climbing tower lay in the way as you crossed the yard, heading towards the door and the decorative layers of spray-paint. Up at the second floor window, you saw a figure against a shifting backlight looking down at you. It was a silhouette, but clear enough in shape that you could tell they were watching you. You kept moving.\n\nConfidently, you reached for the door to open it and slip inside, trying to find the muggers or anyone who knew anything about them. Your leads had all coalesced here. The door creaked open, and inside you saw two figures sitting by a toppled-over desk. Empty-looking bags and backpacks had been thrown into the corner, with a small metal box laying on the floor next to the two figures, its lid removed from broken hinges and with wallets and jewelry pouring out of it. The cold concrete hallway echoed with the meticulous footsteps of hard, low heels, an occasional squeak of rubber piercing your ears.\n\n\"So, the mighty ${Heroname} comes for us at last?\" A mocking voice reached your ears, going through a modulator to mask the gender and identity of the speaker. You turned to see a figure in a long white cloak that, after being tied around the neck, continued up into a hood. You had to admit that this figure had a certain panache, one that was often found in Japanese media, but here in the hallway of a broken building, it looked more ridiculous than impressive.\n\nYou took an immediate step back away from the door as the figure moved closer. The iron door groaned, then moved to close in front of you. You were back in the yard, but as you turned you saw the same figure standing right next to the monkey bars, straightening their awkward-looking get-up and hiding a set of white clothes beneath the cloak.\n*page_break\nEven in the darkness, you could see through to what the hood was hiding. Instead of a face, you saw very nondescript facial features bent in ways that should be impossible. You looked closer and saw a thick layer of something, perhaps a mask, that seemed to refract what little light was hitting it, causing an intriguing and somewhat mesmerizing effect that made this person's face twist and melt to the point of being unrecognizable. Near the lower edge of the plastic mask, you spotted an opaque ring with horizontal slots on it, probably the voice modulator.\n*if ((infravision) or (ultravision))\n\tEven with your enhanced vision, you were unable to decipher the puzzle of the mask.\n*comment endif\n\n\"I've heard about you. The way you've crashed into our business. The police we can handle; they can be directed to other leads and led on chases that can last for years. You vigilantes are an unfortunate lot, butting yourselves into business that doesn't and shouldn't involve you,\" the figure said, the voice modulator shifting between a higher and lower pitch, tinted by a robotic mechanical tinge.\n\n\"I believe you simply stumbled upon our business, but perhaps you were always meant to discover us in one way or another. You see, the world has changed. There has been a New Dawn for all of humanity.\"\n*page_break\nIn a flash, the figure in white disappeared, then reappeared again standing next to you. Behind you, you heard the heavy door slamming shut with a mighty boom. The stranger was faster than anything you'd seen before, becoming a very faint trace of a white blur streaking across your vision. It reminded you of Aurora, but she had the courtesy of leaving a trail. This was just a faint sense of movement that your brain couldn't handle.\n\n*choice\n\t#Take the opportunity to attack.\n\t\t*gosub trial_end\n\t\t*set benign -5\n\t\t*goto fightscene\n\t#Wait and see what happens.\n\t\t*gosub trial_end\n\t\t*set benign +5\n\t\t*goto waitscene\n\t#Start asking questions.\n\t\t*gosub trial_end\n\t\t*goto questionscene\n\t#Try to escape the situation.\n\t\t*gosub trial_end\n\t\t*goto escapescene\n\n*label waitscene\n\"What is your goal here? To torment us? To drive those two men inside back to the streets? Perhaps one of the cells that are already crowded with the poor lost people that try to survive in the streets of Pacifica.\" The figure began to pace as the voice modulator rasped the shifting voice.\n\n\"You cannot help the scum left over from a quake that has ushered in a New Dawn. They serve a single purpose. A purpose of chaos. A New Dawn has come to all mankind, and we are the first to revel in it. We are Order, and with us march a thousand lost souls ushering in a fresh beginning for the fortunate who learn to live in the changing world. The men inside were obsolete and had to be Purged.\"\n\nAs the speech ended, you looked around. The yard fell into a pressing silence, broken only by the sound of your own shifting and the noise echoing off the broken concrete walls.\n*choice\n\t#Make a run for it and escape.\n\t\t*goto escapescene\n\t#\"I have no interest in you. I'm leaving.\"\n\t\t\"You're…what?\"\n\t\t\n\t\tThe figure in white looked at you dumbfounded as you walked past them and towards the entryway to the yard. As you kept walking, you heard the voice modulator rasping from behind you.\n\t\t\n\t\t*goto later\n\t#Fight it out.\n\t\t*goto fightscene\n\n*label questionscene\nThe figure in white turned to regard you once more, the short period of confusion providing you with enough time to launch into some questions.\n\n*label questionrebound\n*hide_reuse\n*choice\n\t#\"Who are you?\"\n\t\t\"I am the one who would Purge the filth from these streets. The parasites leeching off those who would live in this new world of ours. Yes, the men inside were pests that were not only stealing, but also murdering, raping, and abusing their victims. They have no place in the Order that is rising from our New Dawn.\"\n\t\t\n\t\t*goto questionrebound\n\t#\"What is this New Dawn I keep seeing?\"\n\t\t\"It is the inevitable reaction to the shifting zeitgeist. A Star rises in the middle of what used to be a broken slum, shining over a new and polished city where there is no room for the forsaken. The lights of the city shine brighter than those of Akihabara, welcoming us to a new life, a better life. We are Order, and with us march thousands of lost souls that perished in the quakes to lay foundation to a fresh beginning for all humankind.\"\n\t\t\n\t\t*if (englang)\n\t\t\t\"You use big words. I've heard that kind of talk before. How about you call New Dawn what it is: a cult.\"\n\t\t*if not (englang)\n\t\t\t\"You use big words for a cult leader.\"\n\t\t\n\t\t\"Cult?\" the figure shouted, the voice modulator peaking for a moment. \"New Dawn is not a cult! We see the future for what it is and will do what it takes to keep the scum from spoiling it the way they did before the quakes!\"\n\t\t\n\t\t\"By slaughtering people in an apartment complex and having shootouts with the police?\"\n\t\t\n\t\t\"That…\" The figure took a few steps back and shifted their gaze between you and the ground. \"Some people are harder to convince than others. And some people have information necessary for all of us to prosper.\"\n\t\t*goto questionrebound\n\t#\"What do you want?\"\n\t\t\"Very simple. Order, happiness, freedom. We have entered a fresh chapter in the history of humankind, one that should be a joyous paradise for all of us. People are showing unimaginable talents, and Pacifica is rising from the ashes of a corrupt slum. But with all of this change, there will be those who push back and those who would prey upon the free. The scum of society must be flushed away before true happiness can shine upon the people of Pacifica,\" the white-dressed figure said solemnly, looking up at you.\n\t\t*goto questionrebound\n\t#\"I've come here for some muggers. Know them?\"\n\t\t*set muggertold true\n\t\t\"The men inside are who you seek. I have taken care of them for the benefit of us all. And more will be Purged.\"\n\t\t*goto questionrebound\n\t#I am finished with questions.\n\t\tYou had asked what you wanted to ask. The figure in white looked at you, expecting you to make a move.\n\t\t\n\t\t\"What now? Will you try to take us in? Would you be Purged as well?\"\n\t\t*choice\n\t\t\t#Make a run for it and escape.\n\t\t\t\t*goto escapescene\n\t\t\t#\"I have no interest in you. I'm leaving.\"\n\t\t\t\t\"You're…what?\"\n\t\t\t\t\n\t\t\t\t*if (muggertold)\n\t\t\t\t\t\"I told you, I came here for the muggers. I have no intention to destroy this entire place in search for them. It is easier to wait for them to strike again and catch them red-handed. When they don't have help.\"\n\t\t\t\t\n\t\t\t\tThe figure in white looked at you dumbfounded as you walked past them and towards the entryway to the yard. As you kept walking, you heard the voice modulator rasping from behind you.\n\t\t\t\t\n\t\t\t\t*goto later\n\t\t\t#Fight it out.\n\t\t\t\t*goto fightscene\n\n*label escapescene\nYou took to your feet and rushed past the figure. A white blur streaked across your vision, and the figure was waiting for you past the playground, seeing you move towards the yard entrance. This stranger was faster than you could ever hope to be, and you would have to do something else than just run for it.\n\n*fake_choice\n\t*if (gadget = true) #Use your gadgets to put up a smokescreen.\n\t\tWith a quick swipe of your hand, you unleashed a few small smoke pellets into your palm and lit the fuses. A thick, oozing layer of smoke was unleashed, spreading out from your hand and then from the ground as you dropped the pellets and let them roll around. Before the smoke had fully filled the air, you could still see the figure moving, but as things grew more and more shrouded, you felt yourself able to make a move.\n\t\t\n\t\tYou made a run for it.\n\t\t*goto later\n\t*if (energypower = true) #Put up a smokescreen by manipulating the moisture in the air.\n\t\t*if (endurance = true)\n\t\t\t*set energy -5\n\t\t*if (endurance = false)\n\t\t\t*set energy -10\n\t\tYou concentrated hard upon the moisture in the air, sucking all of it in and manipulating its temperature in order to form a thick mist. You could feel the thickness of the air before you saw a visible change, the figure in white watching you and not reacting. The moisture kept concentrating until you pulled it in with a final surge of your powers, masking the entire yard in a thick fog, which smelled fresh and dewy and left no chance of seeing any further than your own hand.\n\t\t\n\t\tYou made a run for it.\n\t\t*goto later\n\t*if (flight = true) #Fly out of the yard, simple as that.\n\t\t*if (endurance = true)\n\t\t\t*set energy -4\n\t\t*if (endurance = false)\n\t\t\t*set energy -8\n\t\tYour feet left the ground as you launched directly up into the air. The white blur streaked across the yard and you felt a glancing punch against your lower abdomen. You felt the muscles burn where the punch had landed as you rose high above the buildings and looked down. The figure in white was staring in your direction, then disappeared, reappearing moments later up on the roof of one of the buildings.\n\t\t*goto shawoopy\n\t*if (jumping = true) #Jump out of the yard.\n\t\t*if (endurance = true)\n\t\t\t*set energy -3\n\t\t*if (endurance = false)\n\t\t\t*set energy -6\n\t\tYour knees bent as you lowered yourself, tightening your muscles and then heaving yourself straight up, using your powers to bound high into the air. You arced through the sky, stalled for a brief moment when you saw that the figure in white was down below just staring at you, then came down upon the roof of a building. The figure had disappeared when you glanced back down into the yard, and you could hear slamming sounds from within the building as doors were kicked open one after the other. The sounds came closer, but you had a lead on this stranger chasing you to the roof.\n\t\t*goto shawoopy\n\t*if (teleport = true) #Teleport away in quick bursts.\n\t\t*if (endurance = true)\n\t\t\t*set energy -5\n\t\t*if (endurance = false)\n\t\t\t*set energy -10\n\t\tYou blinked, allowing your powers to flare. Your eyes opened to the slightly chilly wind that blew against you on top of the building. You took the scene in for a brief moment, then looked around, leaning past the side of the building and seeing the figure in white disappear. Soon thereafter, you could hear slamming sounds from within the building, as doors were kicked open one after the other. The sounds came closer, but you had a lead on this stranger chasing you to the roof.\n\t\t*goto shawoopy\n\t*if (wallcrawl = true) #Climb up the wall; the figure won't expect that.\n\t\t*if (endurance = true)\n\t\t\t*set energy -2\n\t\t*if (endurance = false)\n\t\t\t*set energy -4\n\t\tYou were aware of the space around you. The entrance was sunken into the building, giving a bit of a lip over it before the bright wall of graffiti began rising up. After that, the wall began buckling and cracking, a piece of it turned inwards and held in place by rebar. No obstacles for you to get up if you tried.\n\t\t\n\t\tAnd so you made the leap up, holding your hands and feet out in front of you. Feeling the familiar grip of yourself against the old concrete, you began crawling up to the roof. As you went, you glanced down to the yard. The figure in white had disappeared, and you could hear slamming sounds from within the building as doors were kicked open one after the other. The sounds came closer, and you were quite certain the figure would beat you to the roof.\n\t\t\n\t\tHowever, the stranger couldn't walk up walls, so you had a distinct advantage there.\n\t\t*goto shawoopy\n\t#Run inside and try to find another way out.\n\t\t*goto later\n\t#Run for the gap between the buildings and try to avoid the figure.\n\t\t*goto later\n\n*label shawoopy\n\n*choice\n\t#Leave the scene.\n\t\t*set purgefight \"false\"\n\t\t*goto skippydip\n\t#Go in for a fight.\n\t\t*goto fightscene\n\n*label later\nA white blur went past your eyes, the sudden motion coming in from your peripheral causing you to blink. When you opened your eyes, you saw the figure standing in front of you. Suddenly, you felt a punch collide with your chest, \n*if (durability)\n\thitting you hard enough that despite your highly durable skin, you were forced to take several steps back. \n*if not (durability)\n\tsending you smashing against the concrete wall behind you, clutching your chest. \nAlthough the figure was hidden beneath layers of fabric and a shimmering mask that distorted their facial features, the body language was still clear. The arms were outstretched, the torso bent forwards, the head tilting from side to side. The exact emotion was hard to read…exasperation, confusion, insecurity, perhaps even all of them?\n\n\"Hey, I'm trying to be an antagonist here. You don't get to leave in the middle of it!\" the figure shouted, then rushed to punch you again. \"You're no fun!\"\n*page_break\nThe stranger began an onslaught, fast strikes landing all across your torso and arms as you made the effort to block and even counterstrike. The figure was much too fast, and although you managed a few lucky strikes, it was to little avail.\n\nThe figure tossed you through a window and into a pile of rubble waiting on the other side. Instead of engaging the figure again, you rushed into a derelict corridor to try and find any advantage you might be able to get; a blind corner, perhaps a pipe to keep the figure at a distance.\n\nYou turned past a corner and saw the figure in white already standing there. They rushed at you in a blur and struck you square in the chest, knocking you back into a stairwell. You were forced to climb up while trying to fight the assailant off, but you only got up to the third floor—or perhaps the fourth, it was hard to keep track—before your opponent moved to grab you and threw you into the corridors again.\n\nThe fight continued through at least two small apartments as you were tossed around and slammed through the thin, unfinished walls. Keeping track of the fight was excruciating, as you felt like you were doing nothing but hitting air, while your extremely fast opponent kept peppering you with small but effective kicks and punches. By some kind of luck, as the figure in white rushed you again, you managed to grab onto the white cloak and drag them with you through one of the walls. Both of you rolled to get back to your feet, now standing on opposite sides of a space that might have made a good living room had the building been finished.\n\nThe two of you breathed heavily, staring each other down across the room. You were the first to move back into the fray, but once again, your enemy was the first to land a strike.\n*page_break\n\n*label fightscene\nThe two of you clashed in a furious exchange of blows. You lost track of time very quickly, but fairly early on one of your blows hit the figure in white, leading both of you to tumble back onto a weak part of the roof. With a horrendous noise, you both went through the roof and at least two floors below it before finding yourselves in an abandoned living room.\n\nOn your back on a piece of concrete, you rolled over, seeing a piece of rebar jutting out of another large piece of concrete. As the room fell silent, you picked up on a rough electronic rasping, then the high-pitched squeal of a speaker blowing out, ending the noise. Slowly, you rose to your feet, seeing the figure in white slumped against the rubble with their mask cracked and modulator hanging off. The figure's chest was heaving up and down.\n\n*label atyourmercy\n*hide_reuse\n*choice\n\t#Tie the figure up and leave this to the police.\n\t\t*set benign +10\n\t\t*set fame +5\n\t\t*if (gadget)\n\t\t\t*set purgefight \"cops\"\n\t\t\tYou reached for your gadgets and pulled out a cord of high-tensile polymer wire, something you used fairly often when capturing criminals and tying them up for the police. A couple of zip ties to hold the hands and feet, then a few quick wraps of the wire between all the zip ties to make a nice little bunch for the police. Too easy.\n\t\t\t\n\t\t\tAs you finished up and used a pair of tiny cutters to break off the wire, the figure in white came around and began shifting. You heard a guttural mumbling as you climbed over the rubble and headed back into the empty apartment building, seeking a stable way out.\n\t\t\t*goto skippydip\n\t\t*elseif (strength)\n\t\t\t*set purgefight \"cops\"\n\t\t\tWith a confident smirk, you took hold of the rebar and pulled it out with a mighty roar, a large block of concrete still stuck to the end of it. You smashed the concrete off with a few mighty blows, then began bending the long steel cable around the figure. With great strength, you made sure that the steel was firmly against their skin, making it fairly hard to slip out of. Both arms were tied together in several places, then the rebar went across the back, around the waist, and several tight loops around the legs.\n\t\t\t\n\t\t\tConfident in your solution, you climbed over the rubble and headed back into the empty apartment building to seek a stable way out.\n\t\t\t*goto skippydip\n\t\t*else\n\t\t\t*set havepurgemask true\n\t\t\tAlthough the apartment was empty, not everything was gone. There were old broken electronics, as well as many kinds of fabric. You rushed through, pulling out a couple of electric cords and a thin sheet that you could rip and use as makeshift rope. When you returned to the rubble pile, you looked to where your new prisoner was splayed, seeing only a broken mask there. A quick glance around revealed that while you were scrounging for something to tie around their arms and legs, your prisoner had made a break for it.\n\t\t\t\n\t\t\tWith a grumble, you picked up the mask and climbed over the rubble, trying to find a way out.\n\t\t\t*goto skippydip\n\t#Take the mask off.\n\t\t*set havepurgemask true\n\t\t*set rennowreveal true\n\t\t*achieve unmask\n\t\tSince you had the opportunity, why not go for it? In comics, they never took the chance, and often that decision was a primary reason for failure later on. You leaned down and placed your hand upon the voice modulator, pulling on it slowly. In your chest, your heart raced with adrenaline, excitement, expectation, and fatigue.\n\t\t\n\t\tThe face beneath was revealed, and as you gazed upon it, your eyebrows immediately shot upwards in shock. You had seen this face plastered all over the news in recent weeks, fuelling the fires of hatred towards those with powers.\n\t\t\n\t\tRichard Rennow.\n\t\t*goto atyourmercy\n\t*if (kills) #End the stranger's life.\n\t\t*set purgefight \"dead\"\n\t\t*set benign -10\n\t\tTaking a deep breath, you grasped a chunk of concrete and pulled it free from the pile. With a single heave, you sent the large concrete block hurling directly to where your opponent was splayed. The block hit exactly where you wanted, and when you examined the spot, you saw a hole leading to the next floor down, surrounded by a white cloak.\n\t\t\n\t\tWith a satisfied nod, you crawled over the pile of rubble and back to the empty corridors, trying to find a secure way out of the building.\n\t\t*goto skippydip\n\t#Escape the scene while you can.\n\t\tYou crawled over the pile of rubble and back to the empty corridors, trying to find a secure way out of the building. As you went, you could hear shifting rubble behind you and quickened your pace.\n\t\t*goto skippydip\n\n\n*label skippydip\n*page_break\nStanding atop a roof nearby, you watched the first police car arrive at the scene. You observed them walk inside the building, and a while later walking past one of the windows on the second floor. There was no sign of the white-clad figure. \n*if not (purgefight = \"dead\")\n\tYou didn't see the figure escape, but one of the two officers walked out with a scrap of white cloth in hand. The officer then went to guide other cars to the location.\n\nThe rest of the night went fairly slowly. You had escaped the area just as more police sirens turned the corner and wailed your way. You withdrew to a safer place to lick some of your wounds and rest. After a quick trip to a drive-thru, you were fed and ready to keep going for a bit longer. You applied some of the ice from your drink on any bruised \n*if (durability)\n\tspots on your body, although there was barely a single decent bruise on you, thanks to your thick skin.\n\t*goto nexxie\n*elseif (healing)\n\tspots on your body, although any bruises on you were disappearing quickly as your healing powers kicked in.\n\t*goto nexxie\n*else\n\tspots on your body.\n\t*goto nexxie\n\n*label nexxie\n*page_break\nAs you returned to the rooftops and overlooked the cityscape once more, you took in a deep breath of the chilly night air. A chopper was flying overhead, spotlight beaming down into the apartment buildings on the south side, making long sweeps in search of someone.\n\nThe small stones and other dirt that had gathered on the roof rustled ever so slightly, bringing your attention to something moving behind you. You turned, seeing the black silhouette of a man in front of you. Although there was enough light to see some of the details on him, the silhouette had been more than enough: Nightreaver.\n\n\"We need to talk.\"\n\n*fake_choice\n\t#Attack.\n\t\t*set benign -5\n\t\tYou looked at Nightreaver for a moment. The man in black stood as an imposing figure against the cityscape, just the same as the first time you had seen him. You had continued to find traces of him, and had heard crooks of all kinds mention him with fear in their voice. You, however, had not met him since the incident in the store at the start of your vigilante career. Now, as he stood in front of you, you couldn't help but ball your hand into a fist and lunge at him.\n\t\t\n\t\tNightreaver shifted away from you with very short steps, then suddenly darted straight towards you with arms outstretched. You saw the night sky for a moment, then heard a loud smash as you hit the rooftop. A dark boot landed on your throat, pressing down.\n\t\t\n\t\t*if (attacked_reaver)\n\t\t\t\"You haven't changed at all, have you?\" Nightreaver growled, then leaned into your line of sight. \"I said, we need to talk.\"\n\t\t\t\n\t\t\t\"About what?\" you gasped, the boot lifting slightly off your throat.\n\t\t\t\n\t\t\t\"Not here. I'll let Aurora explain everything. Just follow me, and believe me when I say that this is important.\"\n\t\t\t*page_break\n\t\t\t*goto smishmash\n\t\t*else\n\t\t\t\"What the hell do you think you're doing?\" Nightreaver growled, then leaned into your line of sight. \"I said, we need to talk.\"\n\t\t\t\n\t\t\t\"About what?\" you gasped, the boot lifting slightly off your throat.\n\t\t\t\n\t\t\t\"Not here. I'll let Aurora explain everything. Just follow me, and believe me when I say that this is important.\"\n\t\t\t*page_break\n\t\t\t*goto smishmash\n\t#Talk.\n\t\t*set benign +5\n\t\tYou looked at Nightreaver for a moment. The man in black stood as an imposing figure against the cityscape, just the same as the first time you'd seen him. You kept finding traces of him, and had heard crooks of all kinds mention him with fear in their voice. You, however, had not met him since the incident in the store at the start of your vigilante career. \n\t\t\n\t\t\"Talk? Talk about what?\" you asked, prompting a shake of the head from Nightreaver.\n\t\t\n\t\t\"Not here. Follow me from a distance, I'll lead you to the others.\"\n\t\t\n\t\t\"Others?\" The man in black turned and walked to the edge of the roof.\n\t\t\n\t\t\"Yes. You'll see, just come with me.\"\n\t\t\n\t\tAnd with that, the man hopped off the roof. You rushed to the side of the building and saw Nightreaver sticking to the wall of the building, bracing himself, then jumping across to the neighbouring building.\n\n*label smishmash\n*page_break\nNightreaver led you through the city towards the downtown area, making sure you were following along by stopping, looking back at you, and guiding you along. The pursuit led you to the balcony of a luxurious penthouse in a structure right next to the Star of Pacifica building. A pool in the middle of the balcony was flanked by a small garden on either side, the walls leading into it composed of thick sheets of glass.\n\nInside, you saw a group of people gathered around a living room. Someone stood in the middle of them, waving their hands excitedly and gesturing to the entire group with sweeping motions. Nightreaver opened the door, and suddenly the noise from inside flooded through.\n\n\"…we can't allow it to happen. They will take us in one by one if they have to, lock us all up, and then nobody will stand with us anymore. We will be a forgotten footnote. That's why I'm offering you this one chance,\" the female voice said loudly, then cut off as you and Nightreaver walked in. You identified the woman making the speech as Aurora.\n\n\"Ah, you've arrived. Good. I'll speak with the two of you alone and catch you up with what we've been talking about,\" Aurora said, then motioned the rest of the people towards a doorway, to what seemed like a kitchen and dining room. \"Please, we'll continue the debate once everyone is caught up. I won't force you to stay, but I hope that you will enjoy the food and drinks in the kitchen and wait around so we can actually talk about this. This affects all of us.\"\n\nFollowing Aurora, you heard the bubbling of many accents coming from the group walking towards the kitchen. It was a strange cacophony of globalized heroics, that's for sure. You made a note to listen closely to the speech patterns later, so you might play a guessing game on their origins.\n*page_break\nThe group dispersed towards the kitchen. Aurora broke off to you and Nightreaver, pulling the two of you into a small home office. She left the door open as she walked in behind you, then leaned against a desk with a laptop on it.\n\n\"We've met, haven't we? But we haven't been properly introduced. They call me Aurora,\" she said, offering her hand for a shake, \"and I've been hearing more and more things about you, ${heroname}. You've met Nightreaver.\"\n\nAurora waved her hand towards Nightreaver, and he nodded his head in greeting. He was solemn, his chin framed with several days' worth of dark stubble at the very least.\n\n*if (benign >= 70)\n\t\"I hope what we've been hearing about you is correct. If it is, you're a welcome inclusion to the growing group of heroes,\" Aurora stated. \n\t*if (kills)\n\t\t\"Although I certainly hope you won't be leaving such a wake of death behind you.\"\n\t*if not (kills)\n\t\t\"You've been keeping people safe with a good record. Even those who stand in your way remain alive. That's a good sign.\"\n\t*goto pickup\n*elseif (benign >= 50)\n\t\"We've been hearing some mixed things about you, but then again…all of our careers seem to still be in a state of flux. You're still on your way to making a great deal of good, and I hope you continue on that path,\" said Aurora. \n\t*if (kills)\n\t\t\"Although I certainly hope you won't be leaving such a wake of death behind you.\"\n\t*if not (kills)\n\t\t\"You've been keeping people safe with a good record. Even those who stand in your way remain alive. That's a great sign.\"\n\t*goto pickup\n*else\n\t\"I'll be honest, I didn't want to bring you here. You're not someone we need in our little people-with-powers club. You're a liability waiting for someone to expose your negative attitude. But everyone needs to be heard here,\" Aurora said. \n\t*if (kills)\n\t\t\"I still wish you wouldn't leave such a wake of death behind you. It's completely unnecessary.\"\n\t*if not (kills)\n\t\t\"Although I have to say, I'm pleased that you tend to keep people alive. That's a good sign.\"\n\t*goto pickup\n\n*label pickup\n*page_break\n\"Look, here's the situation. I work closely with some people these days, people in the government, and they've tipped me off that something big is about to happen. The Governor is being forced to sign an order for the detainment of all individuals with powers, and we will be in the crosshairs first and foremost. I'm not sure who is behind this push, but…\" Aurora said in a calm voice, trailing off as a figure appeared at the doorway and cleared its throat. You glanced back, seeing Crimson Caracal there.\n\n\"It's Reissman. He's pulling the strings,\" she stated blandly, then took a step in.\n\n\"Not again with your conspiracy theories. I told you I'd fly you back to where you came from if you kept meddling in things here.\" Aurora said, standing up. Nightreaver placed a hand on her shoulder.\n\n\"Uh-huh. Fly me where I came from, huh? Nightreaver is German. Icarus is British. \n*if not (nation = \"American\")\n\t${heroname} is ${nation}. \nWhy not fly them out of here too? Would solve a lot of problems, wouldn't it, dispersing this merry band of vigilantes before the government has to,\" Caracal said, shifting out of the doorway. You glanced at Aurora and Nightreaver, both of whom seemed hesitant. \"We may not like each other, but it seems to me that we need each other.\"\n*page_break\n*set everybody_met true\nIn a chilly mood, the night continued. The politics of the situation were complex and hard to understand by everyone involved, but the pieces slowly started to come together. Everyone gathered back into the living room, the TV showing an all-hours news cable network with the volume turned low. You finally managed to take a good look at who had been corralled into this clandestine meeting.\n\nYou knew Aurora and Nightreaver. Crimson Caracal seemed like she hadn't been invited, but had joined in spite of that. Others in the room were fresh faces.\n\nThere was Icarus, a man with a lean build and sleek clothing which hugged his body. On his back was a set of folding wings that looked borderline angelic. Bright white feathers covered the surface of the wings, and it was hard to discern if the wings were actually sprouting from his back or if they were an elaborate part of his costume. \n*if not (nolobby)\n\tHe actually seemed very familiar when you heard him speak. You couldn't place it, but there was certainly something about him you recognized.\n*comment endif\n\nAnother new face was Leatherback, a woman in her early twenties clad in layer upon layer of leather, and not much more. Her demeanour was that of an annoying teenager, and her American accent was strange and bubbly. It reminded you a bit of a stereotypical gangster accent. You came to the conclusion quite quickly that it was all for show, as she seemed to hide a tough, experienced interior behind the mask of a not-particularly-smart fashionista.\n\nThere was also Barrier, a silent man dressed in utility clothing and wearing large gauntlets on his hands that seemed to have some sort of coil wrapping around them. It was hard to pinpoint where he could have come from due to his not speaking and the outfit covering his most identifiable features.\n*page_break\nThe gathering quieted down after a couple hours of debate. Occasionally it got fairly heated, then lulled back into mostly silent contemplation. You could feel a rift forming between some members, with Aurora and Icarus wanting to work within the system as much as possible, and Caracal and Nightreaver wanting to take on the system. Two distinct options began to form for you, as both ideas could work to solve the greater issue.\n\n\"The system can't be trusted. We can try to be poster heroes all we want, but that's not going to help in a system where all the wheels are greased by money and barter. Even in election years, we would be used as nothing but tools to gain votes, and those giving us warm handshakes one day will forget about any promises made once they're in office.\" Caracal said, Nightreaver backing her opinion.\n\n\"If we fight the system directly, we will lose both political and popular support. They will crack down on us, blood will flow, and that will only gain us more enemies, more dirty looks, more support for bigger guns to be used against us,\" Aurora stated.\n\nBehind Aurora, the TV kept shifting the image between a studio with a single person seated behind a table and some location shoot. The screen switched over to a group of people shouting at the police at a Hungarian border checkpoint. The crowd looked distinctly Middle-Eastern, and all of them looked lean to the point of malnourishment. With heaving sighs, both Aurora and Caracal fell silent, and the room got eerily quiet with the exception of the television.\n\n*if (senses)\n\tSomething was wrong. You heard a slight shifting noise, then a metallic creak coming from above you. \nCrimson Caracal suddenly twisted her head up to stare at the roof. Her claws came out and everyone jumped to stand up, staring at her. Aurora balled a hand into a fist and took a step back, unsure as to what the other woman was up to. Then everyone heard the clatter of something falling upon the hard floor.\n*page_break\nChaos erupted with a loud explosion on both sides of the living room. Bright flashes disoriented everyone, and the noise left ears ringing. When you came to, the flash dissipating and the ringing starting to diminish, you could see dark figures tackling Aurora and Icarus. The others were coming to and fighting back just by sheer instinct, all but Barrier and Nightreaver, who seemed to be in full form.\n\nBlasts of warped air pulsed out of Barrier's gauntlets, tossing enemies against the wall behind them and back through the doorway they'd barged in through. Another group further away erupted with gunfire aimed at Barrier, but with a swift wave of his hand, he formed a bubble of solid air around himself, the bullets ricocheting into the ceiling.\n\nNightreaver was sticking onto the ceiling with his legs, dangling two opponents at the same time and smashing their heads into the roof before dropping down on some more assailants. He was a blur of knees and elbows launched at his enemies, blood spurting into the air as he fought through the group.\n\nYou got up on your feet, taking in the immediate area around you. One of the assailants had been tossed onto the ground in front of you, his clothing reminiscent of SWAT tactical gear with the exception of having no markings on his outfit. There were no patches, no flags, no text identifying who they were or where they came from. An assault rifle was next to his body, one of his hands laying on top of it. Behind you, another group of black-clad people rushed in, targeting you with their assault rifles.\n\n*choice\n\t*if (kills) #Grab an assault rifle and put it to use.\n\t\t*set benign -10\n\t\t*set body +5\n\t\tBRAAATAT! BRAAAAAT! BRATATAT!\n\t\t\n\t\tThe group opposing you hesitated. You felt small darts piercing your outfit, but as they started crackling with electricity, you could tell that they weren't working right. You continued firing, your finger pulling on the trigger again and again. By the time you had finished the clip, the group that had been coming in your direction was lying dead on the floor.\n\t\t\n\t\t*goto finishthefight\n\t*if (gadget) #Utilize your gadgets.\n\t\t*set body -5\n\t\tYou went for your belt, pulling out a few things as you felt the sting of two small darts piercing your outfit. You heard the darts start crackling with electricity, but they hadn't penetrated deep enough to actually have any effect upon you. With a swipe of your hand, you tossed a few of your smoke pellets on the ground, followed up by a few darts. Three of them hit the men in combat gear, and you saw sparks arcing out from the darts. One of them didn't seem to have an effect, but the other two brought the men down.\n\t\t\n\t\tSmoke shrouded you as they began firing, and you managed to duck down, leap forward, and take down the rest of the group with swift efficiency. You may not have fought fully geared adversaries before, but you didn't allow that to hinder you.\n\t\t\n\t\t*goto finishthefight\n\t#Rush them.\n\t\t*set body +5\n\t\tYou charged straight at the group. You could feel a pair of darts pierce your outfit and embed in your skin. Electricity began to course through your muscles, causing them to seize up, but not enough to make you lose your momentum. The same people who for a brief moment were happy they got you with their tazers were now getting knocked over like bowling pins. The tazers the darts were connected to were wrenched away from whatever hands were holding them, and the electric current stopped as suddenly as it had started.\n\t\t*gosub powerscenify\n\t\t\n\t\tWith the group of assailants beneath you and largely disarmed, you suddenly found yourself with the upper hand. They may have been trained in close combat, but that didn't work as well with a pile on top of you. You, however, were on top and managed to start wailing on them, only stopping once everyone had been safely knocked out.\n\t\t\n\t\t*goto finishthefight\n\t#Defend yourself.\n\t\tYou turned to look at the group of assailants and went into a ready stance.\n\t\t*gosub powerscenify\n\t\t\n\t\tThe men in front of you raised their assault rifles and backed away from melee range. Suddenly, from between them, two darts flew out and pierced your outfit, and you could feel them entering your skin. You heard the crackle of electricity coursing through your muscles, seizing them with a strong current.\n\t\t\n\t\t*if (durability)\n\t\t\tDespite your thick skin, you could feel yourself seize up from the darts. It was a very peculiar sensation, and you had a feeling these people had prepared specifically for this kind of power.\n\t\t\n\t\tAll of a sudden, electricity sparked in front of you and then stopped. You regained some of your composure, seeing cut wires dangling from the darts in your chest. In the corner of your eye, you saw Nightreaver looking your way, then getting tackled by another assailant before lunging back into the fight. He gave you precious seconds, and you lunged forward, wailing with your fists. After a fairly rough fight with lots of knees and elbows being thrown around, you finally slumped on top of a pile of unconscious enemies.\n\t\t\n\t\t*goto finishthefight\n\t#Try to escape.\n\t\t*set body -5\n\t\tYou turned to look at the group of assailants and went into a ready stance. The men in front of you raised their assault rifles at you and backed away from melee range. As they got ready, you turned on one heel and started running for it. From between the enemies, two darts flew out and pierced your outfit, and you could feel them entering your skin. You heard the crackle of electricity coursing through your muscles, seizing them with a strong current.\n\t\t\n\t\t*if (durability)\n\t\t\tDespite your thick skin, you could feel yourself seize up from the darts. It was a very peculiar sensation, and you had a feeling these people had prepared specifically for this kind of power.\n\t\t\n\t\tAll of a sudden, electricity sparked in front of you and then stopped. You regained some of your composure, seeing cut wires dangling from the darts in your chest. In the corner of your eye, you saw Nightreaver looking your way, then getting tackled by another assailant before lunging back into the fight. He gave you precious seconds, and you lunged forward, wailing with your fists. After a fairly rough fight with lots of knees and elbows being thrown around, you finally slumped on top of a pile of unconscious enemies.\n\t\t\n\t\t*goto finishthefight\n\n\n*label finishthefight\n*page_break\nYou looked around, seeing Aurora pushing off the pile of people on top of her and rushing into the fight. A spurt of blood arced through the air, and you saw Crimson Caracal merging into the fight as well. Icarus rushed past you, wings open, and flew straight into the glass wall. As the glass shattered and rained onto the balcony, the noise from outside poured in as a deafening flood.\n\nThe chopping sound of helicopters hovering over the penthouse overwhelmed the noise of the fighting. You saw bright spotlights targeting Icarus, causing his wings to shine a bright blinding white. The helicopters twirled around, the pilots trying to save their eyes from it.\n\n\"Everyone get out and disperse!\" Aurora shouted over everything. \"I will try to contact all of you later, but it's not safe. Stay in hiding for a few days!\"\n\nNightreaver ran over to you, then guided you out to the balcony and off the side. The noise stayed behind you and did not follow. You tagged along with Nightreaver during the escape.\n*set fame +10\n*finish\n\n*label powerscenify\n*if ((energypower) and (fire > ice))\n\t\n\t*set energy -5\n\tYou reached out with your power and felt a spark of fire ignite within your fist, quickly spreading to envelop your entire hand. With arcing swings, the fire reached out from your fist and struck at a black-clad assailant, then another, and another.\n\t*return\n*elseif ((energypower) and (fire \u003c ice))\n\t\n\t*set energy -5\n\tYou reached out with your power and felt a small shard of ice form between your fingers. You slung it forwards, gathering mass as it travelled through the air and smashing straight into the gut of an assailant. With a satisfying thud, the figure in black went down, a circle of frost on their outfit.\n\t*return\n*elseif (teleport)\n\t\n\t*set energy -10\n\tYou surged forwards, pushing out with your focus and blinking into the familiar mist. You emerged behind an assailant, striking the black-clad figure with an elbow before withdrawing back into the mist. An instant later, you reappeared and sent a kick careening towards another opponent.\n\t*return\n*elseif (strength)\n\t\n\t*set energy -5\n\tYou picked up one of the black-clad assailants and tossed the figure straight across the room, knocking down another one on the far side. Then still another tried to rush you from the side, but you grabbed him by the arm and tossed him at the nearest wall.\n\t*return\n*else\n\t*return\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first three chapters are available for free? This is the end of the free content.\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2016-01-01 $4.99 $2.99 purchased\n*abort\n", "consul": "*set energy 100\n\nAbove you, you saw the familiar smiling face of the consul's secretary, his arms clutching a thick set of binders against his chest as he observed your groggy face start to wake up. The secretary, Sebastian, was a third-generation ${nation}-American who was known for endlessly hounding the consulate with resumes during his college years. \n\n\"Good to see you awake again, ${name}. I need you down in the lobby level. The downstairs office is being cleared for the election. I already have some people down there, but I need you to join them. We'll start erecting the voting booths tomorrow, but there's a lot of tables and paperwork to carry around, and you know best where those go,\" Sebastian said and smiled, heading off again.\n*page_break\nYou cleared your throat and rubbed your still-sleepy face before standing up. You made your way down to the staircase and climbed down two floors into the lobby, walking through a set of double doors made of clear glass into an office with an open floorplan. Tables were set to the sides of the office, with chairs being slowly pushed into stacks. The windows to the side of the office opened onto a quiet street, as the consulate was located some ways away from anything notable.\n\n\"Hey, ${name}, you got roped into coming down here too? Well, come here and help me move this.\" The woman hailing you was Angie. She was a young college student who'd come in as a volunteer when the consulate was moved to Pacifica and the office needed a lot more hands to file away all the records it had amassed over the years. She'd made a fuss over digitizing the records to make things easier for everyone and had been hired on to oversee that project. Now, due to lack of people to do all the heavy lifting, she was doing much more varied work around the place. Just like everyone else.\n*page_break\n\"${name}, did you happen to hear about the shootout?\" Angie asked as you were shifting around some chairs. \"Terrible. This situation is getting out of hand. With these weird powered vigilantes popping up like some kind of comic book, this place is becoming a mess.\"\n\nOne of the other office workers sneered in the background, grumbling loudly. \"Those freaks need to be taken down a notch. They need to be put on a register or something.\"\n\n\"What, you want these heroes put on registers? I thought you went picketing several times over gun control, and now you want to control a bunch of people who actually do some good around these parts!\" another worker pointed out, leading to the beginning of a heated exchange. Angie looked at you with a worried expression.\n\n\"Anyway, help me move this desk,\" she said, pointing to one of the office tables.\n*page_break\nYou took up a position on the opposite side of the large wooden tabletop that was attached to tiny metal poles acting as legs. The two of you lifted it and made your way to the side of the office, placing the table on top of another one that was already placed against the wall. As you let go, you saw three other people from the office walk in, carrying fold-out booths that would be used during the elections. It would be hectic, with expats walking in over the course of three days, looking at a series of lists of names, and then marking things down on a piece of paper.\n\nEvery once in a while, Sebastian would come down to check on the progress, make sure everyone knew where everything was going, then help you and the group carry some folders and boxes of papers into a basement storage space. He was frequently called back upstairs to handle things for the consul, but for the most part, he seemed invested in helping you clear out the space and make the consulate look respectable for your fellow countrymen.\n*page_break\nAs Angie was lifting a set of chairs into a pile right next to the window, you heard the screeching of tires break the silence looming outside. Everybody rushed to the window out of instinct to see what was happening, and as you did, you saw a stretched black SUV knock down a yield sign and struggle to drive straight down the road. A female figure in an odd costume was hanging off the roof.\n\n*if (senses)\n\tThe hairs on your neck suddenly stood as your heightened senses warned you of imminent danger. Adrenaline began pumping through you, and time slowed down as you reacted. The muzzle of a pistol was barely visible through the window of the SUV, and it was pointed straight at you.\n\t*choice\n\t\t#Take cover.\n\t\t\t*set angieshot true\n\t\t\tYou rushed down as fast as you could, and the window shattered above you as a gunshot rang out. The people above you let out screams and jumped down below the window, as well. As you heard the car careening off down the street, you looked up and saw Angie next to you, her shirt drenched in red. She'd been hit by the bullet.\n\t\t\t\n\t\t\t*goto gunshotwound\n\t\t#Try to pull Angie into cover with you.\n\t\t\tYou rushed to cover, locking your eyes on Angie and tackling her down with you. She shrieked as she went down, and you felt a shower of glass falling down on both of you. A gunshot sounded in a low boom, as time was still slowed down for you, and the screams of the other people followed shortly thereafter. The others jumped down in a panic, and as the adrenaline began clearing from your body, you looked up and saw a hole in the window exactly where Angie had been standing. On the far wall, there was another small, slightly smoking hole. Angie looked up at you with a frightened look, her entire body stiff as she tried to figure out what had just happened. People began panicking and running outside and up the stairs.\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#Rush out and chase the car.\n\t\t\t\t\t*goto chasecar\n\t\t\t\t#Make sure Angie snaps out of it.\n\t\t\t\t\tYou talked to Angie, trying to keep pulling her attention to you. She continued to suffer from shock, but began coming around and responding to you over time. As the wailing sirens in the distance got closer, you managed to pull Angie further away from the window and to the back of room. She finally began to calm down.\n\t\t\t\t\t\n\t\t\t\t\t*if ((sexual = \"All\") or (sexual = \"Women\"))\n\t\t\t\t\t\tOnce she had calmed down, your eyes met, and she suddenly lunged up to grab the back of your head, pulling you down to her and giving you a quick kiss on the corner of your mouth.\n\t\t\t\t\t*goto_scene collection\n\t\t#Try and pull everyone into cover.\n\t\t\t*set angieshot \"true\"\n\t\t\tYou rushed to cover, grabbing anyone next to you. They resisted as you pulled them down, not realizing what was happening until it was too late. A shower of glass fell over you, and a gunshot rang out. The people above you screamed and dropped to the ground as the car kept careening down the street. As the room fell silent, you looked up to see Angie next to you, her clothes becoming saturated with a thick red colour. The bullet had hit her.\n\t\t\t\n\t\t\t*goto gunshotwound\n\t\t#Stand still.\n\t\t\t*set angieshot \"true\"\n\t\t\tYou stood still at the window and watched as the car drove by. You waited through your sense of dread and saw a flash from the window of the car at nearly the same time the window shattered in front of you and people ducked for cover. You saw the female figure slam her fist into the roof of the car as it continued down the street and disappeared. A scream brought your attention down as the crowd parted in a panic, your eyes falling upon Angie on the ground, her clothing becoming saturated with a viscous red liquid.\n\t\t\t\n\t\t\t*goto gunshotwound\n*else\n\t*set angieshot \"true\"\n\tYou stood still at the window and watched as the car drove by. You saw a flash from the window of the car at nearly the same time the window shattered in front of you and people ducked for cover. You saw the female figure slam her fist into the roof of the car as it continued down the street and disappeared. A scream brought your attention down as the crowd parted in a panic, your eyes falling upon Angie on the ground, her clothing becoming saturated with a viscous red liquid.\n\t\n\t*goto gunshotwound\n\n\n*label gunshotwound\n*page_break\nPeople were panicking. Some ran outside, one ran upstairs. Only two people stuck around to look at the gunshot wound with you. One of them was shaking uncontrollably, while the other was just mesmerized by the blood. You were still largely in control of your senses.\n\n*choice\n\t#Rush out and chase the car.\n\t\t*set angieshot \"ran\"\n\t\tYou heard a few questioning calls after you as you smashed the front door open and ran out. Your feet hit the pavement in step with the thrum of blood rushing through your ears. Sirens somewhere far off pierced your ears. In the distance, you saw a young man running after the car as well. He seemed hell-bent on catching up to it and ran into an alleyway. Seeing the car moving in that general direction, it was a safe bet that it might be a good shortcut. In the heat of the moment, you followed the young man into the alley.\n\t\t*goto chasecar\n\t#Take charge of the situation and help Angie.\n\t\tWith quick barked orders, you pulled the people remaining out of their shock and guided them into doing something productive. One of them was quickly on the phone, talking with emergency services. You heard wailing sirens in the distance, but were sure those were police and not an ambulance. Something else had to be done. With the help of another person, you began treating the gunshot wound. You gingerly lifted Angie just enough to feel if she had an exit wound, only to find none. As soon as she was back down, the two of you flew into action, ripping off pieces of cloth to soak up blood and then applying pressure to the gunshot wound. With your hands on Angie, blood pouring out from between your fingers, you kept talking to her in as calm a voice as you could. Fortunately, she kept up with the conversation, and you managed to get her to engage with you.\n\t\t\n\t\tYou could only hope the ambulance would come quickly.\n\t\t*page_break\n\t\t*goto_scene collection\n\t#Call emergency services.\n\t\tThe other people were panicking. They would clearly be of no use to you. Instead of relying upon them to keep Angie concious and alive, you dialled emergency services and waited. The operator answered in a calm, almost soothing voice, keeping you talking and giving out information. He guided you to apply pressure to the wound while an ambulance was dispatched. You could already hear sirens wailing, hoping that they weren't just police cars.\n\t\t*page_break\n\t\t*goto_scene collection\n\n\n*label chasecar\n\nA chain-link fence rose up in the middle of the alley, and as the young man approached it, you saw him suddenly bound up and hop over the fence. He rolled over the top bar and then landed softly, continuing in full stride.\n\n*choice\n\t#Use your powers to get past.\n\t\t*choice\n\t\t\t*if (flight) #Fly over.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tYour feet left the ground as you quickly flew up, the rush of air in your ears blasting only for a brief moment before you were descending once more. You landed softly on the other side of the fence, fairly certain that nobody saw you use your powers.\n\t\t\t\t*goto carsmash\n\t\t\t*if (jumping) #Jump over.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tYour feet left the ground as you quickly flew up, the rush of air in your ears blasting only for a brief moment before you reached the top of your arc and began the trip down. You landed softly on the other side of the fence, fairly certain that nobody saw you use your powers.\n\t\t\t\t*goto carsmash\n\t\t\t*if (teleport) #Teleport through.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tYou saw the familiar blurred vision that quickly morphed into a deep darkness. Thousands of little lights lit up and sparkled directly in front of your eyes, and the feeling of your entire body dissipated for a moment. As the sparkling lights united back into daylight, you walked directly ahead with the fence now behind you. With a quick glance around, you were comfortable in the knowledge that nobody saw you use your powers.\n\t\t\t\t*goto carsmash\n\t\t\t*if (wallcrawl) #Hop on the wall and go past.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tThe fence didn't go too high up. You jumped up and slapped your hands and feet against the concrete wall of the building next to the fence. With a fine grip, you crawled up the wall and slung yourself past the top of the fence, landing softly on the other side. A quick glance later, you were sure nobody had seen you use your powers.\n\t\t\t\t*goto carsmash\n\t\t\t*if (agility) #Jump off the wall and climb over.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tThe fence wasn't high at all for someone as agile as yourself. You rushed in and jumped against the concrete wall to your left, using your legs as springs to launch yourself towards the top of the fence. With an arcing body, you rolled over the top bar and then twisted to finish a front-flip and continue into a smooth roll as soon as your feet hit the ground. Bouncing back from the roll, you continued the chase, quite confident nobody had noticed anything.\n\t\t\t\t*goto carsmash\n\t\t\t*if (energypower) #Freeze the fence and smash it.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tAs soon as the man was past the fence, you raised your hand and concentrated upon it. As you squinted, you saw a frosty mist billow around the fence, little beads crystallizing. The entire fence creaked, and as you reached it, you gave it a worthy kick and a large hole ripped into it. As frozen metal rained onto the asphalt, you continued rushing after the man, hoping that nobody saw your party trick.\n\t\t\t\t*set ice +1\n\t\t\t\t*goto carsmash\n\t\t\t*if (energypower) #Make the metal bend to your will.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tAs soon as the man was past the fence, you raised your hand and concentrated upon the fence. As you squinted, you saw the chain-link fence begin shifting around as if pulled by strong gusts of wind or a strong magnetic field. It rattled around for a moment before becoming taut, your eyes seeing the linking metal wires unwind and pop apart. As you ran through the human-sized hole you'd ripped into the middle of the fence, you glanced around to make sure that nobody saw your use of powers.\n\t\t\t\t*goto carsmash\n\t\t\t*if (energypower) #Melt a hole in the fence.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tAs soon as the man was past the fence, you raised your hand and concentrated upon it. As you squinted, you saw the fence begin to warp. As your concentration pierced the metal fence, you felt a burning heat approaching. The metal links began glowing crimson, then yellow. In heavy droplets, the metal melted and rained down on the asphalt. Just in time for you to pass through the newly created hole, you allowed the heat to dissipate, then ran through without a drop of molten metal hitting your back. You could only hope nobody saw your party trick as you rushed after the man.\n\t\t\t\t*set fire +1\n\t\t\t\t*goto carsmash\n\t\t\t*if (strength) #Smash through.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tWho cares about a fence? You continued running, bracing yourself just before impact. The fence was ripped off the bolts attaching it to the concrete walls of the flanking buildings, and you continued running after the man. The chain-link rattled beneath your feet as you went, and you could only hope that the noise hadn't attracted any unwanted attention.\n\t\t\t\t*goto carsmash\n\t#Climb over.\n\t\tYou may have had powers at your disposal, but it would be unwise to use them in broad daylight. Even if you didn't want to use your powers, you weren't completely blocked by the fence. With swift feet, you grasped the holes in the chain-link and smashed the tip of your shoes against the twisted links. You saw the man running away from you and gaining distance, but your efforts weren't in vain. You rolled yourself over the fence and dropped, hitting the asphalt hard, but not hard enough to stop you from rushing after the kid.\n\t\t*goto carsmash\n\n\n*label carsmash\n*if (senses)\n\t\n\tYou were past the fence, but your heightened senses picked up on something: great danger. You heard the squealing tires of the SUV on the next street and saw the man running out of the alleyway. Suddenly, the warning from your senses made perfect sense.\n\nAs the SUV came into view from the end of the alley, your adrenaline automatically kicked in and gave you ample time to see the driver through the tinted window struggling with the wheel. The man's eyes went wide, and he began to jump out of the way, his legs springing him into the air with a great deal of energy. The driver lost control at the exact wrong moment, then the SUV went sideways, tipped, and then rolled. Broken glass showered the street as the car smashed into a fire hydrant, then launched into the air. Three complete midair turns later, the bonnet was wrenched from the bolts holding it to the car. You avoided disaster as the large sheet of metal cut into the wall next to you, a full quarter of it now buried in the hard concrete.\n\nAs you looked back, you were unable to see the man you'd been tailing, or the SUV. A trail of gore, shattered glass, and wrecked metal led off to the right.\n*page_break\nYou emerged from the alley to the sight of an older man crawling from the back of the SUV. You saw the man limping on the ground halfway between the alley and the spot where the SUV had finally stopped. To your left, you saw the mystery woman who;d been riding on the roof of the car. Her eyes were locked on the kid's body splayed on the street, her general posture somewhat shaken but still rather hard to read. She'd seen carnage before, at least to some extent. Her gaze suddenly switched to you, and her look turned cold.\n\nShe wore an outfit that reminded you of biker gear. Thick, tear-resistant weave with stitched reinforcements at the elbows, shoulders, and knees. The outfit was black and orange with bright-red highlights. Her face was covered by a mask that went past her eyebrows, her nose, and much of her cheeks. The mask was painted with feline features, and although someone less knowledgeable could argue for a cutesy cat look, to you the large angled ears with tufts of long hair coming from the top hinted at a wild, predatory lynx. She met your look as if it were a challenge, then glanced towards the car and took out some kind of a weapon, pointed it at a nearby building and then fired a hook towards it. She was making her escape from the scene.\n\nFrom behind you, you suddenly heard a cry pierce the still air. As you glanced back, you saw the elderly man who you'd seen crawling out of the wreckage now sitting beside the body of the man you'd been chasing. He held the young man close to his dark suit, his entire body trembling as he screamed into the heavens. Suddenly, you realized that you recognized the man. He was none other than the Lieutenant-Governor of California, Gerald Rennow.\n\n*choice\n\t#Rush to help Mr. Rennow.\n\t\t*set fame +10\n\t\tYou rushed over to the politician, kneeling down and very quickly checking his health. He was bruised, battered, cut, and broken, but alive. The young man in his arms was still, his eyes closed and his clothes seeping with blood. The father caressed his son, leaving smears of blood running across the young face. He didn't react to your presence and showed no interest in the fleeing figure.\n\t\t\n\t\tSomewhere in the distance, the dull tones of wailing sirens were making their way towards you, but as you looked at Rennow, the sound seemed to dissipate, leaving behind only the hollow sorrow of a father losing his son.\n\t\t*page_break Two Weeks Later.\n\t\t*goto_scene collection\n\t#Rush to check on the car.\n\t\t*set fame +5\n\t\tYou ran up to the wreckage of the car, leaning down to the broken windows and peering inside. You saw a woman in a suit sitting in the passenger side, the seatbelt holding her tightly against the seat. You couldn't see a driver inside the car. The windshield had shattered, and blood was running through the glass. It was horrific to think where the driver may have ended up if he'd been slung out during the crash.\n\t\t\n\t\tA streak of steam rose up from beneath the bonnet of the car, but it wasn't on fire. The woman strapped to the seat seemed fine for the time being, but you'd learned not to move anyone if you didn't absolutely have to in situations like these. Instead, you began trying to wake her up. Somewhere in the distance, wailing sirens gained in intensity as the emergency responders travelled your way.\n\t\t*page_break Two Weeks Later.\n\t\t*goto_scene collection\n\t#Rush after the woman.\n\t\t*goto_scene caracalfight\n", "counter": "*temp gundraw false\n*temp smashydoor false\n\n*set energy 100\n\n[i]The attack on the gathering of vigilantes was a precautionary measure, and a well-organized one. It left the city open for new manoeuvres by those that had captured heroic attention for themselves. For a short period of time, the police force stepped out again and took the lead in crime prevention.[/i]\n\n[i]When heroes scurry into their holes like rats, even those who would support vigilante justice and look up to them as heroes from comic books could see that they're ordinary people and not untouchable. Yet the greatest blow to their image wouldn't come from mere mortals, but from something very different. To take down someone with any kind of power, you needed one of two things: someone with power or someone with nothing to lose.[/i]\n*page_break\nThe light burned your eyes as the piece of cloth covering them was removed. You heard Nightreaver's steady footsteps and saw his dark silhouette crest past the light. Your eyes were slow to adjust to the light, but you began to see shapes taking form around the room you were in. A desk was lit up by
