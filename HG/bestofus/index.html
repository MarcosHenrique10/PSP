where you going to emerge, and going through something blind always unnerved you. The mist grew over your eyes, and for a moment, you felt completely massless. Then you were in the room beyond. As you took in your surrounding, you could feel an unnatural silence that gave you the creeps. \n\t\t\n\t\t*if (senses)\n\t\t\tFinally, you heard a shuffle from whatever was up the stairs, beyond the door. A slow squeal of rubber, the shuffling of a boot shifting, the crackle of an earpiece. Someone was coming. Not just someone, a group of someones. \n\t\tYou unlocked the door behind you and leaned to peek through the crack. Leaving the door open very slightly, you turned back to take in the room you were in. It was fairly large and went around the corner to a wall that it probably shared with the room you had come in through. The decoration was composed mainly of computers and lab equipment, but also a few ordinary tables and shelves that had papers, binders, and books arranged upon them. A rack of small test tubes and a Newton's cradle rounded out the lovely little laboratory.\n\t\t\n\t\tYou were startled by a sudden surge of noise from outside the door. Heavy, booted steps filled and echoed in the corridor as the area outside the door suddenly filled with the light of several flashlights. You backed away from the doorway and turned to see several men in sharp-looking suits move tactically down the corridor and secure the doorway. Two of them held close eyes upon you, their flashlights pointed at you but angled down so as not to directly blind you. Both men had weapons at their sides.\n\t\t\n\t\t\"Stand down, hero,\" you heard a shout from the corridor beyond, then watched as a large man leaned through the doorway and took up a stance in front of the two suited men.\n\t\t\n\t\t*if (work = \"governor\")\n\t\t\tYou had seen this person before, although at the time you hadn't caught his name. On the fateful day when Lieutenant-Governor Rennow lost his son, he had come to see the Governor with this man.\n\t\t\n\t\t\"Please.\"\n\t\t\n\t\t*choice\n\t\t\t#Stand down and talk it out.\n\t\t\t\t*set benign +5\n\t\t\t\t*goto talkthingsout\n\t\t\t#Try to escape.\n\t\t\t\t*goto escapade\n\t\t\t#Attack.\n\t\t\t\t*set benign -5\n\t\t\t\t*goto smellthedefeat\n\n\n\n*label pastthedoors\n*page_break\nYou stood up straight and walked to the window, looking down. Surprisingly, the lights here worked. The terminals seemed to be out of commission, but everything else was powered, as if the emergency batteries or generators were hardwired to prioritize this section of the structure. To the left, you saw the second door that was connected to the hallway, with a metal staircase leading down into the deeper and larger chamber. Large coils of wire led across the empty floor and directly to a large cage hung from the four corners of the room with thick steel wires.\n\nThe cage was empty, with several bars seared clean off in a pattern that left large enough of a hole for a grown person to crawl through.\n\nNow that you were closer to the window, you could see more clearly the ways into the room. After the corridor passed the doors, it appeared that the room went below the corridor into someplace else. Large, mechanical crank-like switches were placed close to the large steel doors leading underneath.\n\n*choice\n\t#Get to the chamber below.\n\t\t*if (teleport)\n\t\t\t*set energy -4\n\t\t\tFor a very brief moment, you looked around the control room for some way to smash the thick and probably reinforced window. Then, you remembered your ever-helpful set of powers and teleported through, emerging below the window on the sturdy floor of the larger chamber.\n\t\t\t*goto chamber\n\t\t*elseif (energypower)\n\t\t\t*set energy -5\n\t\t\tFor a very brief moment, you looked around the control room for some way to smash the thick and probably reinforced window. Then, you remembered your ever-helpful set of powers and, with a slight bit of manipulation, caused the glass to crack and then shatter with a beautiful shower of shards into the chamber beyond. You slipped through, landing on the sturdy floor of the larger chamber.\n\t\t\t*goto chamber\n\t\t*else\n\t\t\tSearching the control room, you looked for the heftiest-looking hard object in there. The windows were thick and probably reinforced, but a hard enough object with enough mass could easily gain you entry beyond. First, you used a chair to crack the glass, then finished the job with a large metal drawer. The window shattered with a beautiful shower of shards into the chamber beyond. You slipped through, landing on the sturdy floor of the larger chamber.\n\t\t\t*goto chamber\n\t#Backtrack and head in the other direction.\n\t\tThe way out of the room was much easier than the way in. A manual override keycard slot was placed on the wall next to the doorframe, and it seemed like there were mechanical emergency levers to force the door open embedded in the doorframe itself.\n\t\t*if (smashydoor)\n\t\t\tOf course, it didn't matter, since you'd already forced your way past the door on your way in.\n\t\t\n\t\tPast the door, you found yourself back in the corridor with the blinking red light. You turned and continued back to the rubble-blocked staircase with firm steps, swiftly passing the corner and heading down where you'd come from, past the ruined room.\n\t\t\n\t\t*goto awayblinks\n\n\n*label chamber\nThe large chamber was eerily silent. With emergency power on, almost all the electronics had been shut down, resulting in a cold, hollow atmosphere. You walked over grated metal with loud clanks and groans echoing off the walls, with pipes and large cables running underfoot. There was nothing for you to look at in the chamber gave any clue as to what had been held in the cage. No computer terminal responded, no paperwork remained left behind; the only way to go now was the route below the corridor.\n\nHeavy steel doors stood in your way, embedded directly below the middle of the corridor crossing towards the elevated door to your right. Directly next to the door was a large mechanical-looking switch which reminded you of a handcrank, with wrist-thick electrical cable rising up to it, as well as a chain that came from the floor, went inside the housing for the switch and then went back down into the floor again. With a curious glance at the mechanics of the object, you placed your hand on the crank and tried to move it.\n\nThe crank shifted clockwise, facing resistance, then shifted counter-clockwise and stopped dead at a lock of some kind. Shrugging, you pulled the crank clockwise, overcame the resistance and, with a great clattering of the chain, began engaging some kind of machinery. After a full rotation of the crank, the lights on the panel around it lit up, and you heard something shift and clang inside the steel door blocking your way when the crank locked into position. Moments later, the steel doors began grinding open, squealing as they shifted apart and into the walls.\n*page_break\nFirst, you saw a crack of light coming from the other side, then a chamber similar to the one you were already in. Instead of being fully lit, this one was flooded with a dim blue light centered upon a large, coffin-like tank of water in the centre of the room. A set of metal steps led up to the tank, which was placed on a raised metal platform. As the doors opened, you could see that the platform was awkwardly angled and raised from one side toward a control room similar to the one in the chamber you came from. A heavy-looking lid lay next to the tank, its inside rim filled with a thick rubber seal.\n\nThe room opened up more, and you stepped inside. The space in this room was much better utilized, with training equipment and dummy weapons lining the walls. A punching bag broken in half was against one wall, half of it still hanging from a large metal hook, the rest strewn on the floor below it. A set of steel bars jutted out of another wall, part of it resembling monkey bars, while another looked like a gymnastics rack.\n\nThe control room was dark, although you could see the silhouettes of equipment and computers inside. All of the windows that would have separated it from the chamber were broken, and shattered glass was piled up on the concrete floor below. You walked up to the metal steps leading to the coffin-like tank and looked around a bit more closely. You finally had a good angle on the back wall, where the tank had blocked your view originally, and a gasp escaped you.\n\nA woman was held against the wall, dummy knives driven through her limbs hard enough to stick her a good way up the firm steel and concrete wall. She was limp, hanging off the weapons, and from the blood-soaked lab coat, you determined she was already dead. Some of the blood had even dried. On the wall next to her, the words \"NEW DAWN\" were written in what you presumed was her blood.\n*page_break\n*if (senses)\n\tSomething thrummed against the steel paneling around the room. From the direction of the control room door, you could hear the steady yet hurried sound of boots against the floor. With some concentration, you could hear the slightest sound of someone talking.\n\nYou heard a clatter from the control room and whipped around in time to see a bright flash and hear a deafening explosion. As you shot to the ground and took cover, you heard splashing in the tank next to you, the liquid spraying over you from the impact. With a ringing in your ears, you looked up to the control room, seeing several men in suits looking down at you, their flashlights pointed at you and with guns ready at their sides.\n\n\"Stand down, hero,\" you heard a shout from the corridor beyond, then watched as a large man leaned through the doorway and took up a stance in front of the shattered control-room windows.\n\n*if (work = \"governor\")\n\tYou had seen this person before, although at the time you hadn't caught his name. On the fateful day when Lieutenant-Governor Rennow lost his son, he had come to see the Governor with this man.\n\n\"Please.\"\n*choice\n\t#Do what they say and talk things out.\n\t\t*set benign +5\n\t\t*goto talkthingsout\n\t#Try to escape.\n\t\t*goto escapade\n\t#Attack.\n\t\t*set benign -5\n\t\t*goto smellthedefeat\n\n\n*label talkthingsout\n*set ferrisnamed true\nYou relaxed your muscles and leaned your head to the side in expectation, your gaze focused upon the large man addressing you. He smiled and stepped forward, relaxing his body and suddenly looking a lot less intimidating in size.\n\n\"Excellent,\" he boomed. \"Now that we've broken the ice, let us speak.\"\n\nThe two of you got closer, remaining outside of each other's personal space. Both of you seemed secure, knowing that you had the space to move around if one became violent, but the first step in building trust had occurred.\n\n\"I don't know who you are, but you're not supposed to be here. Since I'm standing in front of you now and we're being cordial, I will assume we're not enemies and that all this is a quaint coincidence. My installation has a hole in it, nobody is here, and I have a mysterious figure roaming my corridors, no doubt seeking someone to save,\" the large man stated and nodded to himself, flashing a smile before continuing. \"I am Ferris Bernard, you do not need to know my employer or position. But now you have my name, and that's a first step for trust, is it not?\"\n\nHe halted and looked at you. After a short moment, it was clear he was waiting for you to speak up.\n*fake_choice\n\t#Give your vigilante alias.\n\t\t*set fame +5\n\t\t\"I am ${heroname},\" you said, looking up at the hulking figure, who simply smirked.\n\t\t\n\t#Give your real first name.\n\t\t*set fame +5\n\t\t\"I am ${name},\" you said, looking up at the hulking figure, who smiled in approval.\n\t\t\n\t#Give your real full name.\n\t\t*set fame +10\n\t\t*set realname true\n\t\t\"I am ${full_name},\" you said, looking up at the hulking figure, who beamed with approval.\n\t\t\n\t#Change the subject.\n\t\t\"What are you doing here?\" you queried, the smile on the large man's lips tightening in disapproval. \"What is this place?\"\n\t\t\n\t\t\"Now now, you're not playing very nicely,\" he responded, sighing. \"There is no trust here, and I won't disclose anything to you until there is. All of your questions are meaningless anyhow.\"\n\t\t\n\t\tThe mammoth of a man took a step towards you, then rushed forward. You tried to react, but his fist came at you too fast, smashing into you and smacking the air out of you. As you crumpled before the sudden attack, he pushed in again, slamming you into the floor. Everything went dark.\n\t\t*page_break\n\t\t*goto torture\n*comment endif\n\n\"Excellent, we've made our acquaintance, now we can move on to something more important. I'm here because something powerful was here, and it should be behind lock and key. Guessing from the plume of fire I saw rising from this facility as we drove here, I can only assume it's gone. Now I have two options that are open to me; chase and try to track down this power, or seek allies, because this is much more dangerous of a situation than I'm letting on. If you were in my position…what would you do?\"\n\n*choice\n\t#\"What is this dangerous power?\"\n\t\t*set body -5\n\t\tYou ask about the danger and power the man is talking about, but he quickly tuts you and shakes his head.\n\t\t\n\t\t\"Uh-uh, not part of the conversation. I'm telling you there's a terrible power that has escaped from this bunker. That's all you know. What would be your choice? Instant action, or the seeking of allies?\"\n\t\t\n\t\t*choice\n\t\t\t#\"Action. Track down this danger and catch it, whatever it is.\"\n\t\t\t\t*set benign -10\n\t\t\t\t\"Ha! Easier said than done; I am but one man, and even with all of these trained guards in my entourage, I would have no chance to catch this danger. Instant action wouldn't be the right thing to do. This danger has been locked away for a good reason. Even if I were to give chase, I would only end up cornering the danger and make it even more dangerous,\" the large man said, slowly shaking his head.\n\t\t\t\t\n\t\t\t\t\"No. This is a time for patience. However, I enjoy your attitude. I would very much like you to travel down this road with me. And in return, I may have something to offer you. Equipment, wealth, notability…perhaps even a slice of that dangerous power. Allow me to show you.\"\n\t\t\t\t*goto swimlesson\n\t\t\t#\"I would seek allies.\"\n\t\t\t\t*set benign +10\n\t\t\t\t\"Ha! Excellent, you're on the right track. Yet allies are not all there is to this. Even with all of these traditionally trained guards in my entourage, we would be unable to bring down this threat. Perhaps not even with you in the mix. Chasing this danger will only result in cornering it and making it even more lethal to us and everyone in this city,\" the large man said, slowly shaking his head.\n\t\t\t\t\n\t\t\t\t\"No, this is a time for patience. However, I enjoy your attitude. I would very much like you to travel down this road with me. And in return, I may have something to offer you. Equipment, wealth, notability…perhaps even a slice of that dangerous power. Allow me to show you.\"\n\t\t\t\t*goto swimlesson\n\t#\"Track down this danger and catch it quickly, whatever it is.\"\n\t\t*set benign -10\n\t\t\"Ha! It's easier said than done, I am but one man, and even with all these traditionally trained guards in my entourage, I would have no chance to catch this danger. Instant action wouldn't be the right thing to do, either. This danger has been locked away for a good reason. Even if I were to make chase and catch up, it would only end up cornering the danger and make it even more lethal,\" the large man said, slowly shaking his head.\n\t\t\n\t\t\"No, this is a time for patience. However, I enjoy your attitude. I would very much like you to travel down this road with me. And in return, I may have something to offer you. Equipment, wealth, notability…perhaps even a slice of that dangerous power. Allow me to show you.\"\n\t\t*goto swimlesson\n\t#\"I would seek allies first.\"\n\t\t*set benign +10\n\t\t\"Ha! Excellent, you're on the right track. Yet allies are not all there is to this. Even with all of these traditionally trained guards in my entourage, we would be unable to bring down this threat. Perhaps not even with you in the mix. Chasing this danger will only result in cornering it and making it even more lethal to us and everyone in this city,\" the large man said, slowly shaking his head.\n\t\t\n\t\t\"No, this is a time for patience. However, I enjoy your attitude. I would very much like you to travel down this road with me. And in return, I may have something to offer you. Equipment, wealth, notability…perhaps even a slice of that dangerous power. Allow me to show you.\"\n\t\t*goto swimlesson\n\n*label swimlesson\n*page_break\nYou were led down into one of the larger rooms, up some steps and directly over a coffin-like tank of water. The liquid was hued a strangely radiating blue and was quite mesmerizing as you looked into it. \n*if (ferrisnamed)\n\tFerris Bernard, the mammoth of a man, \n*if not (ferrisnamed)\n\tThe mammoth of a man\ncircled around the side of the tank and stopped to stand directly opposite you. A hatch opened in the ceiling and with a rattle of chains, a solid reinforced metal sheet was lowered down to your eye level. There were heavy restraints attached to it, with buckles that looked strong enough to hold a raging bull.\n\n\"You might have noticed that this isn't an ordinary pool of water. This is, in fact, a containment pod,\" the large man said and began opening the restraint clamps. \"We use it for testing. It slows down movement of the human body to a point where we're able to see and analyse everything that is happening.\"\n\nHe opened the last clamp, then guided the plate to lay flat on the edge of the tank. With a smile, you were directed to lay upon the large plate.\n*choice\n\t#Lie down.\n\t\tYou took a breath and looked at everyone in the room for a quick moment before stepping up and sitting on the plate. You placed your back on the cold metal, then lifted your legs to fit into the leg restraints. Your hands slipped through the arm restraint loops, which were perfectly fitted to position around mid-forearm.\n\t\t*if (ferrisnamed)\n\t\t\tFerris \n\t\t*if not (ferrisnamed)\n\t\t\tThe large man\n\t\tpulled everything tight around you and clamped the buckles to keep you on the plate, a warm smile on his face the whole time.\n\t\t\n\t\tYou felt the rattle of the chain as you were pulled back upright and then positioned over the coffin. The plate seemed to fit into some kind of a groove at your feet and began slowly tilting in a controlled motion. The man watched you being positioned over the tank and nodded slowly.\n\t\t\n\t\t\"Good, good. You're as gullible as you look,\" he said with a chuckle, then brought his fist against your head. Everything blurred and even went dark for a brief moment, but you stayed concious. He forced a sack of some kind over your head, then gave you another quick punch.\n\t\t*page_break\n\t\t*achieve gullible\n\t\t*goto torture\n\t#Refuse.\n\t\tYou looked at the metal plate for a moment, then glanced over at all of the people in the room. Your eyes landed on the large man, and you shook your head.\n\t\t\n\t\t\"No. I'm not going to get tied down for whatever you're planning to do,\" you said defiantly and stood your ground. Instead of looking disappointed, the hulking man nodded in approval and smiled.\n\t\t\n\t\t\"Excellent. I'd hoped you would be smarter than that. Had you willingly put yourself in restraints, I would have had no other choice than to torture you for information. Now we can finally talk,\" he said, looking to the side to signal for the metal plate to be hoisted back up.\n\t\t\n\t\t\"The danger that was caged up here is called Project Dawn, but she calls herself Katie Navarra. We encountered her roaming the streets as some kind of minor cult leader for the homeless before the earthquake. First confirmed person with any kind of powers. We captured her and began testing. She escaped for almost two weeks when the earthquake shook the entire state apart, but we managed to find her again and conceal this bunker here during the reconstruction. We ran exhaustive tests on her physiology and brain functions, trying to determine how or why she had these strange powers, but the only thing we managed to surmise was what she could do.\"\n\t\t*page_break\n\t\t*set dawn_told true\n\t\tThe large man walked past you and down the steps, towards massive doors that opened and led into another large chamber. You followed with slight hesitation and saw a cage hung from the four corners of the room placed in the very middle of the chamber. The bars were bent, and upon catching sight of it \n\t\t*if (ferrisnamed)\n\t\t\tFerris \n\t\t*if not (ferrisnamed)\n\t\t\tthe massive man \n\t\tsighed and shook his head.\n\t\t\n\t\t\"Strength like that wasn't one of them. She was a manipulator. Something in her made people follow her, although her power wasn't strong enough to exert any kind of mind control. Subjects were more affected by a strong suggestion or pressure, but they always had an option not to do something she said. Her natural charisma, however, managed to change even the strongest mind with enough time. She would poke holes in logic, which made her suggestions work much better. In addition to this, she could…combust. Her entire body would become an open flame. The water tank happened to be an excellent device for pacification.\" The hulking man turned around and shook his head, his face becoming serious for the first time since you'd first seen him.\n\t\t\n\t\t\"Now that I know you're not gullible or outright stupid like most of the vigilantes out there, the truth is that I could use help on this. We have eyes and ears everywhere, but no chance to fight Project Dawn directly. We also don't want to reveal our operations to every other hero out there. If you're willing, we would provide you with a burner phone with one number on it. We see Project Dawn, we send you a message with an address. You see her, you send a message to that number. Interested? I promise, no tricks this time. If you don't want to do this, we'll stay out of your way in the future, and if you try finding us again, you'll find nothing.\"\n\t\t*choice\n\t\t\t#Agree to take the phone.\n\t\t\t\t*set phone true\n\t\t\t\tYou took the opportunity and the phone, heading back out into the night with new purpose in your step.\n\t\t\t\t\n\t\t\t\tOnce you reached your home, you tried to look up anything you could find on \n\t\t\t\t*if (ferrisnamed)\n\t\t\t\t\tFerris Bernard, \n\t\t\t\t*if not (ferrisnamed)\n\t\t\t\t\tthis strange mammoth of a man, \n\t\t\t\tbut found nothing. It was strange but not completely unexpected.\n\t\t\t\t\n\t\t\t\t*if (work = \"governor\")\n\t\t\t\t\tYou tried to use what else you knew of him, looking for any and all pictures of Lieutenant-General Rennow to see if the man was anywhere in the background. He wasn't a very inconspicuous person at all and should have stood out anywhere he went, but you couldn't find any photographs with him in them. He was a blank slate. Either he was working with the government and ranked high enough to have himself wiped from everything, or his work never even threatened to bring him into the limelight.\n\t\t\t\t*page_break\n\t\t\t\t*goto roundup\n\t\t\t#Refuse.\n\t\t\t\tYou refused the phone and left, intent upon finding this Project Dawn while not putting your eggs in a basket with whoever the people running the bunker were.\n\t\t\t\t\n\t\t\t\tOnce you reached your home, you tried to look up anything you could find on \n\t\t\t\t*if (ferrisnamed)\n\t\t\t\t\tFerris Bernard, \n\t\t\t\t*if not (ferrisnamed)\n\t\t\t\t\tthis strange mammoth of a man, \n\t\t\t\tbut found nothing. It was strange but not completely unexpected.\n\t\t\t\t\n\t\t\t\t*if (work = \"governor\")\n\t\t\t\t\tYou tried to use what else you knew of him, looking for any and all pictures of Lieutenant-General Rennow to see if the man was anywhere in the background. He wasn't a very inconspicuous person at all and should have stood out anywhere he went, but you couldn't find any photographs with him in them. He was a blank slate. Either he was working with the government and ranked high enough to have himself wiped from everything, or his work never even threatened to bring him into the limelight.\n\t\t\t\t*page_break\n\t\t\t\t*goto roundup\n\n\n\n*label escapade\nYou remember running for it. You shifted your body, jumped around as much as you could to make yourself a moving target, then lunged for an opening when it presented itself. \n*if (gadget)\n\tSmoke filled the space you were darting through to make you even harder to catch, and you tazed at least one guard.\n\nBut escaping gunfire is hard. You had just believed yourself free from the situation when a massive hand grasped the back of your head and suddenly pulled you straight into the hard concrete floor. Everything went dark, and it remained dark when you began to regain conciousness.\n*page_break\n*goto torture\n\n\n\n*label smellthedefeat\n*if (endurance)\n\t*set energy -10\n\t*goto smellysmelly\n*else\n\t*set energy -20\n\t*goto smellysmelly\n*label smellysmelly\nYou rushed in, confident and decisive. The guards with guns were no issue. You swept them aside fairly easily while dodging the huge hands of the large man leading them. You could hear the whoosh in the air as arms that were more like tree trunks came rushing at you and missed, again and again. All around you was chaos and shouting as the guards tried to communicate and avoid shooting one another. Finally, after a good fight, the last of the guards fell, and you turned to your last opponent.\n\nThe large man stood in front of you like a wall. \n*if (gadget)\n\tYou launched pellets at him, some spewing out smoke, some gas, some acting like flashbangs. He covered his face but still stood firm before your technological assault.\n*if (strength)\n\tYou rushed in, seeking to bury your fist in his gut, yet he resisted your action. His face distorted in pain, but not as much as you'd expected. \n\t*if not (durability)\n\t\tIn fact, you felt your own fist crumple in the impact, and flashes of pain coursed through your body; you could hear the crunching of bones.\n\t\t*goto nostrength\n\t*else\n\t\t*goto nostrength\n*label nostrength\n*if (energypower)\n\t*if (endurance)\n\t\t*set energy -10\n\t*if not (endurance)\n\t\t*set energy -20\n\t\n\t*if ((fire > ice) and (fire > 70))\n\t\t*achieve flameon\n\t\tYou went back to the biggest weapon in your arsenal. With some concentration, a ball of fire began forming in your hand, which you felt grow stronger and hotter as you pushed your energy into that one small spot in space. The burly man looked at you and raised an eyebrow, then turned around at the last moment as you shot your hand forward and engulfed him entirely in a spout of fire.\n\t\t\n\t\tTo your amazement, while the back of the large suit jacket burned and smouldered into ash, it only revealed a strange layer beneath that resisted your powers. You finally dropped your hand and released the man, expecting him to be ready to keel over. Yet again he defied you, standing back up and turning to face you once more.\n\t\t*page_break\n\t\t*goto smellyend\n\t*elseif ((ice > fire) and (ice > 70))\n\t\t*achieve iceman\n\t\tYou went back the biggest weapon in your arsenal. With your focus on the air around the mammoth of a man before you, you began draining energy from it. The man looked at you quizzically as he felt the cool breath of air against his skin, then the crystals of ice forming and refusing to melt even against his natural body heat. You encased the man in this cold front, waiting for it to reach just below the point of freezing.\n\t\t\n\t\tThe man moved his limbs, feeling how his motions were slowed down. His eyebrow shot up as he looked again at you, and he was about to say something as you pushed your power outward in one blast, flash-freezing him into position. With the man frozen as a statue, you took a brief moment to breathe. As you exhaled and leaned against the wall, you saw the statue move and shift. You'd never seen that before, and had thought it an impossible feat, yet this man was somehow resisting. Suddenly, the ice shattered in an explosion, and the mammoth stood before you once more.\n\t\t*page_break\n\t\t*goto smellyend\n\t*else\n\t\t*achieve avatar\n\t\tYou went back to the biggest weapon in your arsenal. With some concentration, you began feeling the air around you and manipulating its ambient energies. It began as slight wisps of air passing along your skin, then grew into short bursts that were like gentle gusts of wind. The burly man before you watched with amusement as the wind began picking up around you, then was directed at him in strong kinetic bursts.\n\t\t\n\t\tThe first two blasts of this force knocked him back a few steps, the third one he was braced for, the fourth he merely flinched at. With a tired grunt, you let up after a moment when it became clear the man was not affected by the blasts as much as you'd expected, and the only thing you were doing was tiring yourself out.\n\t\t*page_break\n\t\t*goto smellyend\n*label smellyend\n*if (endurance)\n\t*set energy -2\n*if not (endurance)\n\t*set energy -4\nYou launched yourself into hand-to-hand combat. Your punches and kicks were blocked or allowed through to not much effect. The mammoth of a man continued staring you down while defending himself, yet he didn't strike back. He simply waited.\n\nFinally he struck, his tree trunk of an arm crashing into your side and launching you back against the wall. His massive hand grasped your forehead, tugged you forwards, then launched you back again against the concrete. He did it again, and again. You heard the crunching in the back of your head as you impacted one time after another. As the hand released you and you slumped down along the wall, everything began growing dark and numb.\n*page_break\n\n*label torture\n\"You know, there is an unfortunate lack of respect in your kind. Ordinary people would think twice about putting their noses in any business guarded by armed men, but you just had to get yourself shot, didn't you? For what? Some kind of delusion of heroic grandeur?\" a deep bass voice thundered. You opened your eyes to a burning white light filtering through a thick cloth. Shadows moved against this bright backdrop, but you couldn't see who they were. With quick tugs, you felt for the position of your body, heavy restraints clattering and holding you back at every motion. There was a strange echo in the room, as if part of the noise was muffled and reflected by a shifting pool.\n\n\"This whole incident could have been avoided. It is extremely unfortunate you chose this path. I have a simple question for you, and I expect you to answer it truthfully. Why are you here?\" the same voice continued, shifting around and echoing in a way that told you that whoever this man was, he was circling you from a fair distance.\n\n*choice\n\t#\"I was curious. Wouldn't you be, if a random explosion revealed a hidden bunker?\"\n\t\t*set dawn_told true\n\t\t\"Clearly then, you're not one for old proverbs. Curiosity killed the cat, after all,\" the voice boomed as it got slowly closer.\n\t\t\n\t\t\"Curiosity I can respect, even when it's folly to follow it. Curiosity leads to discovery and the satisfaction of gaining both knowledge and wisdom. So tell me, what have you discovered here? What is the tiny nugget of information that has made this little trip of yours worthwhile?\"\n\t\t\n\t\t\"You interrupted my search, I didn't have time to look through everything,\" you said.\n\t\t\n\t\t\"Mmm, that is most fortunate. It means we don't have to make sure none of Project Dawn's secrets escape this facility. Well, I suppose it's already too late for that. You see, what was stored here, and what was studied here, was a woman. Katie Navarra. We encountered her roaming the streets as some kind of minor cult leader for the homeless before the earthquake. First confirmed person with any kind of powers. We captured her and began testing. She escaped for almost two weeks when the earthquake shook the entire state apart, but we managed to find her again and conceal this bunker here during the reconstruction. We ran exhaustive tests on her physiology and brain functions, trying to determine how or why she had these strange powers, but the only thing we managed to surmise was what she could do.\"\n\t\t\n\t\tThe bag on your head was suddenly ripped off, and you saw yourself tied to a metal plate above a coffin-like tank of water. In front of you stood the mammoth of a man, who seemed to be the leader of the guards you had encountered. At the base of the raised platform where you and the man were stood at least four guards, perhaps more. Training equipment along the walls had been torn down and littered the floor.\n\t\t\n\t\t\"This chamber was a training room, and the tank a deprivation chamber that also worked to pacify her. Katie, you see, could combust. Her entire body would suddenly just rage in fire. But even worse, she's a manipulator. Somehow she can coerce people to do her will, or see matters her way. She cannot tell people to kill themselves or others unless they already have an inkling towards that kind of thing,\" the man in front of you said, smirking. \"I'm telling you all this because I believe you to be the curious sort, and the likelihood of you leaving us alone after all this is very slim. You're a vigilante, if not a hero of some kind. I'm willing to let you loose, as long as you use your curiosity to track down Project Dawn and deal with her. She's dangerous and cannot be left to roam the streets. We'll provide you with a burner phone with a single number on it. We will message the phone if we have a sighting of her, and you can message us if you have a lead on her. Together, I believe we have a chance against her. Alone, we'll just be wasting time, energy, and resources,\" the man said and reached to your side, already starting to fidget with the restraints. One of the guards walked up behind him and showed you a cheap phone with a single number in the address book, with a name assigned: Ferris Bernard.\n\t\t*set ferrisnamed true\n\t\t*choice\n\t\t\t#I'll do it.\n\t\t\t\t*set phone true\n\t\t\t\tYou took the opportunity and the phone, heading back out into the night with new purpose in your step.\n\t\t\t\t\t\n\t\t\t\tOnce you reached your home, you tried to look up anything you could find on this Ferris Bernard, but found nothing on the name. It was strange but not completely unexpected.\n\t\t\t\t\n\t\t\t\t*if (work = \"governor\")\n\t\t\t\t\tYou tried to use what else you knew of him, looking for any and all pictures of Lieutenant-General Rennow to see if the man was anywhere in the background. He wasn't a very inconspicuous person at all and should have stood out anywhere he went, but you couldn't find any photographs with him in them. He was a blank slate. Either he was working with the government and ranked high enough to have himself wiped from everything, or his work never even threatened to bring him into the limelight.\n\t\t\t\t*page_break\n\t\t\t\t*goto roundup\n\t\t\t#Refuse.\n\t\t\t\tYou refused the phone and left into the night, intent upon finding this Project Dawn while not putting your eggs in a basket with whoever the people running the bunker were.\n\t\t\t\t\n\t\t\t\tOnce you reached your home, you tried to look up anything you could find on this Ferris Bernard, but found nothing on the name. It was strange but not completely unexpected.\n\t\t\t\t\n\t\t\t\t*if (work = \"governor\")\n\t\t\t\t\tYou tried to use what else you knew of him, look for any and all pictures of Lieutenant-General Rennow to see if the man was anywhere in the background. He wasn't a very inconspicuous person at all and should have stood out anywhere he went, but you couldn't find any photographs with him in them. He was a blank slate. Either he was working with the government and ranked high enough to have himself wiped from everything, or his work never even threatened to bring him into the limelight.\n\t\t\t\t*page_break\n\t\t\t\t*goto roundup\n\t#\"I wanted to help. I needed to see if anyone was still trapped inside.\"\n\t\t\"Of course. Helping the poor souls working in a hidden underground bunker. You saw the size of the explosion, so what gave you the idea that anyone inside would still be alive after something like that? Your efforts are misguided, little hero,\" the voice boomed and got slowly closer.\n\t\t\n\t\t*if (benign \u003c 45)\n\t\t\t\"You are not a good person. It's time to come clean. You enjoy hurting people far too much to be one of those pesky heroes I see flitting about. Tell me truthfully, what is it you're after? What gives you the motivation to put on that silly outfit and roam this city?\"\n\t\t\t*choice\n\t\t\t\t#\"People need me.\"\n\t\t\t\t\t\"People need you? Not someone like you, but you? Do you surmise yourself to be some kind of god? Who gave you this power over the rest of us, who granted you the authority? Or did you just take it, like you take lives away from those who stand in your way?\" the voice asked. \n\t\t\t\t\t*if not (kills)\n\t\t\t\t\t\t\"Ultimately, what is the difference between killing someone and maiming them for the rest of their miserable life?\"\n\t\t\t\t\t\n\t\t\t\t\tYou heard a heavy sigh from the man as stepped around whatever you were tied to.\n\t\t\t\t\t\n\t\t\t\t\t\"As much as I would enjoy getting inside your head, and how I would love to analyse just what makes you tick and what gives you that kind of superiority complex, I'm not here for a therapy session,\" he said before rushing directly over to you, close enough that you could feel his breath on your face. A heavy large hand fell upon your jaw and gripped it tightly, the thumb sinking into the soft flesh behind your ear and causing your lungs to let out a sharp squeak of pain.\n\t\t\t\t\t\n\t\t\t\t\t\"Why are you here? What are you after? Who blew up my facility?\"\n\t\t\t\t\t*goto tortwo\n\t\t\t\t#\"People need someone like me.\"\n\t\t\t\t\t\"Hmm. People need someone like you? Someone to make the difficult decisions of life and death? Do you surmise yourself to be some kind of god? Who gave you this power over the rest of us, who granted you the authority? Or did you just take it, like you take lives away from those who stand in your way?\" the voice asked. \n\t\t\t\t\t*if not (kills)\n\t\t\t\t\t\t\"Ultimately, what is the difference between killing someone and maiming them for the rest of their miserable life?\"\n\t\t\t\t\t\n\t\t\t\t\tYou heard a heavy sigh from the man as he stepped around whatever you were tied to.\n\t\t\t\t\t\n\t\t\t\t\t\"As much as I would enjoy getting inside your head, and how I would love to analyse just what makes you tick and what gives you that kind of superiority complex, I'm not here for a therapy session,\" he stated before rusheing directly over to you, close enough that you could feel his breath on your face. A heavy large hand fell upon your jaw and gripped it tightly, the thumb sinking into the soft flesh behind your ear and causing your lungs to let out a sharp squeak of pain.\n\t\t\t\t\t\n\t\t\t\t\t\"Why are you here? What are you after? Who blew up my facility?\"\n\t\t\t\t\t*goto tortwo\n\t\t\t\t#\"I'm telling you the truth. I want to help.\"\n\t\t\t\t\t\"You really are just like the other pathetic little heroes flitting about, aren't you? Sickly sweet souls who would do anything for the greater good. The sheer amount of self-entitlement oozing out of your kind is sickening. Instead of helping this city grow into the shining example of survival it should be, the phoenix rising out of the ashes, you're weakening it, scurrying around like rats and infesting it with your heroics. Making the people reliant upon you, making the more nasty personalities pop up to prove a challenge for you…you're all magnets for destruction.\" A large, heavy hand fell upon your jaw and gripped it tightly, the thumb sinking into the soft flesh behind your ear and causing your lungs to let out a sharp squeak of pain.\n\t\t\t\t\t\n\t\t\t\t\t\"Why are you here? What are you after? Who blew up my facility?\"\n\t\t\t\t\t*goto tortwo\n\t\t\t\t#\"You're right. I get to hurt people and get away with it.\"\n\t\t\t\t\t\"Who gave you this power over the rest of us, who granted you the authority? Or did you just take it, like you take lives away from those who stand in your way?\" the voice asked.\n\t\t\t\t\t\n\t\t\t\t\tYou heard a heavy sigh from the man as stepped around whatever you were tied to, then he rushed directly to you, close enough that you could feel his breath on your face. A large, heavy hand fell upon your jaw and gripped it tightly, the thumb sinking into the soft flesh behind your ear and causing your lungs to let out a sharp squeak of pain.\n\t\t\t\t\t\n\t\t\t\t\t\"Why are you here? What are you after? Who blew up my facility?\"\n\t\t\t\t\t*goto tortwo\n\t\t*else\n\t\t\t\"You're just like the other pathetic little heroes flitting about, aren't you? Sickly sweet souls who would do anything for the greater good. The sheer amount of self-entitlement oozing out of your kind is sickening. Instead of helping this city grow into the shining example of survival it should be, the phoenix rising out of the ashes, you're weakening it, scurrying around like rats and infesting it with your heroics. Making the people reliant upon you, making the more nasty personalities pop up to prove a challenge for you…you're all magnets for destruction.\" A large, heavy hand fell upon your jaw and gripped it tightly, the thumb sinking into the soft flesh behind your ear and causing your lungs to let out a sharp squeak of pain.\n\t\t\t\n\t\t\t\"Why are you here? What are you after? Who blew up my facility?\"\n\t\t\t*goto tortwo\n\t#\"What can I say, I like moonlit walks in secret underground lairs.\"\n\t\t\"Ha,\" the voice said in a dull boom, then paused for a fairly long time. \"Ha.\"\n\t\t\n\t\t\"We have a funny one here, don't we? A funny little worm in a funny little outfit, trying to slither away from the responsibilities of life. You fail to realize just how little anyone cares for your well-being. I want answers, and I want them now,\" the voice boomed as it got closer. A large, heavy hand fell upon your jaw and gripped it tightly, the thumb sinking into the soft flesh behind your ear and causing your lungs to let out a sharp squeak of pain.\n\t\t\n\t\t\"Why are you here? What are you after? Who blew up my facility?\"\n\t\t*goto tortwo\n\t#Say nothing.\n\t\t\"Hmm. Nothing to say?\" the voice boomed and suddenly got extremely close to your ear.\n\n\t\t*if (suit = \"fancy\")\n\t\t\t\"Your outfit is pathetic. This is not some kind of costume party, no matter how many of you freaks there are out there. I would rip it off you and reveal your identity to this whole room if it mattered even the tiniest speck in the grand scheme of things. Do you realize how far beneath me you truly are? Do you realize how futile your every action is? Nobody on this rock cares for you or your kind. I would toss you aside if I didn't want answers from you. And you will give me my answers.\"\n\t\t\t\n\t\t\tYou felt a large hand take hold of your chin and grip it tightly, pressing down on the soft flesh behind your ear with the thumb. A shock of pain coursed through you and made a whimper escape your lungs.\n\t\t\t\n\t\t\t\"Why are you here? What are you after? Who blew up my facility?\"\n\t\t\t*goto tortwo\n\t\t*elseif (suit = \"classic\")\n\t\t\t\"What is this? Do you think this leotard you wear gives you any kind of credibility? I would rip that stupid outfit off of you if it offered me anything, but it doesn't. You are a maggot writhing around in an old turd. You're so far beneath me that your little escapade into my business isn't even a speck on my radar. I want answers, and you will give me answers.\"\n\t\t\t\n\t\t\tYou felt a large hand take hold of your chin and grip it tightly, pressing down on the soft flesh behind your ear with the thumb. A shock of pain coursed through you and made a whimper escape your lungs.\n\t\t\t\n\t\t\t\"Why are you here? What are you after? Who blew up my facility?\"\n\t\t\t*goto tortwo\n\t\t*elseif (suit = \"utility\")\n\t\t\t\"You wear many pockets, but all of them are empty of anything valuable to me. I would rip off your pathetic costume and reveal your true identity to everyone here, but nobody cares. A worm like you, a pathetic spy and wannabe, cannot even fathom how far beneath me you actually are. All I want from you is answers, and you will give them to me.\"\n\t\t\t\n\t\t\tYou felt a large hand take hold of your chin and grip it tightly, pressing down on the soft flesh behind your ear with the thumb. A shock of pain coursed through you and made a whimper escape your lungs.\n\t\t\t\n\t\t\t\"Why are you here? What are you after? Who blew up my facility?\"\n\t\t\t*goto tortwo\n\t\t*else\n\t\t\t\"You refuse to wear the stupid costumes we see in the news, but you still guard your identity by carrying nothing in your pockets. Why? Do you think a worm like yourself, a pathetic spy, would mean anything to me? Do you think that I would go after whatever pathetic bloodline you have? Please. This isn't a comic book, nobody cares. All I need from you is answers, and I will get them, one way or another.\"\n\t\t\t\n\t\t\tYou felt a large hand take hold of your chin and grip it tightly, pressing down on the soft flesh behind your ear with the thumb. A shock of pain coursed through you and made a whimper escape your lungs.\n\t\t\t\n\t\t\t\"Why are you here? What are you after? Who blew up my facility?\"\n\t\t\t*goto tortwo\n\n*label tortwo\n*choice\n\t#\"I don't know anything.\"\n\t\t*goto mewlmewl\n\t#\"I was curious. I wanted to see what this place was. I don't know anything else.\"\n\t\t*goto mewlmewl\n\t#\"I wanted to help. I needed to see if there were still people inside. I don't know anything else.\"\n\t\t*goto mewlmewl\n\t#\"Get your damn dirty hands off me!\"\n\t\t*goto feisty\n\t#Say nothing.\n\t\t*goto feisty\n\n\n*label mewlmewl\n\"You mewling little freak, tell me what you know! Where is Project Dawn?\" the man shouted, his hand gripping your face and his fingernails digging into your skin. You felt spittle landing on you as he growled.\n\n\"Sir,\" someone interrupted from behind the large man, and you could hear him shift away from you. \"We have incoming. Looks like Aurora and her friends.\"\n\nThe man growled loudly and shoved you as he released your face. Whatever you were tied to shook violently, chains rattling loudly above your head. Heavy steps led the large man away from you, and his voice echoed off the far wall as he began barking orders.\n\n\"Clear the place. Torch the control rooms and destroy the lab,\" he shouted. You could hear rushed steps as someone came over to you, but the large man's voice interrupted him. \"Leave the hero here to burn.\"\n\nThe footsteps receded out of the room you were in. You heard the sound of stuff being thrown around somewhere nearby, then the clanking of metal cans, followed by the splashing of liquid. When the noises stopped, it became deathly silent. After a moment, the smell of burning reached your nose, and a while after that, you began feeling the chamber getting much warmer.\n*page_break\n*goto speedyescape\n\n\n*label feisty\n\"Feisty…unfortunate that defiance will get you nowhere. Tell me what you know! Where is Project Dawn?\" the man shouted, his hand gripping your face and his fingernails digging against your skin. You felt spittle landing on you as he growled.\n\n\"Sir,\" someone interrupted from behind the large man, and you could hear him shift away from you. \"We have incoming. Looks like Aurora and her friends.\"\n\nThe man growled loudly and shoved you as he released your face. Whatever you were tied to shook violently, chains rattling loudly above your head. Heavy steps led the large man away from you, and his voice echoed off the far wall as he began barking orders.\n\n\"Clear the place. Torch the control rooms and destroy the lab,\" he shouted. You could hear rushed steps as someone came over to you, but the large man's voice interrupted him. \"Leave the hero here to burn.\"\n\nThe footsteps receded out of the room you were in. You heard the sound of stuff being thrown around somewhere nearby, then the clanking of metal cans, followed by the splashing of liquid. When the noises stopped, it became deathly silent. After a moment, the smell of burning reached your nose, and a while after that, you began feeling the chamber getting much warmer.\n*page_break\n*label speedyescape\n*set purgesave true\nYou could hear the creaking, crackling, and groaning of the structure and objects around you, then the sound of a large pane of glass shattering in a single boom. The blaze was getting closer. You could feel the room temperature skyrocketing. You took in deep breaths and felt the hot air clinging to your insides, causing aggravating coughs on the exhale. You heard a rattling of chains above you and took in another deep breath, but this time the sudden cool air entering your lungs resulted in an involuntary spasm. You coughed as you tried to get the spasms under control, but your body would have none of it.\n\nThe sack was pulled off your head. The fire was nowhere to be seen, and high above you was a dark sky full of stars. You turned your head and saw a plume of smoke rising from behind you and into the clear sky.\n\n\"You're out, don't worry,\" you heard a modulated and distorted voice say behind you. You turned around to see a familiar white-dressed and masked person standing there, staring. You launched to your feet and stepped back, your lungs still forcing dirty air out in bursts of coughing.\n\n\"What do you want?\" you said and watched as Purge took a single step towards you.\n\n\"I just saved you from becoming a pile of charcoal, so you're welcome. The big bastard who tried to torch you is Ferris Bernard, the number-one strongman for Reissman Industries and a key enforcer for Rennow's campaign to become Governor,\" Purge said and looked back at the bunker. You saw a streak of colour against the night sky, resolving into a blue-green blur; Aurora. Purge glanced back at you and tugged nervously on the white hood covering the strange mask.\n\n\"New Dawn is rising. But first, there must be a dusk,\" your white-dressed rescuer stated, then vanished in a blur that ran off the side of the building.\n*page_break\n*goto roundup\n\n\n\n*label roundup\n*finish A Few Days Later.\n", "dawn": "*if (energy >= 70)\n\t*set energy 100\n\t*goto startit\n*elseif (energy >= 55)\n\t*set energy 80\n\t*goto startit\n*elseif (energy >= 40)\n\t*set energy 65\n\t*goto startit\n*else\n\t*set energy 50\n\t*goto startit\n*label startit\n*temp doubts false\n*temp cuffed false\n*temp joint_escape false\n*temp helpinghand \"Undefined\"\n*temp noanswer false\n\n*set ferrismet true\n\n\n[i]The time of heroes, vigilantes, and freaks is over. Project Dawn has been let loose. Decisive action is called for.[/i]\n\n[i]Suggested course of action: Termination.[/i]\n*page_break\n*set fame +5\nYou were still tired from the events in the bunker and the attack on the vigilante group session in the penthouse. Your powers had recovered, but not to their fullest extent. In order to keep yourself involved without exhausting yourself all over again, you'd been doing a lot of research and looking around for signs of Project Dawn or any other major threats.\n\n*if (purgesave)\n\tPurge saved you from the inferno of the bunker complex, then fled from the scene when Aurora arrived. She didn't pay any attention to you, but took a close look at the facility before quickly leaving towards the city centre.\n\t\nYou hadn't heard from Nightreaver at all since he'd beckoned you back to the penthouse. It was strange. You'd shifted your foot patrols in order to take a peek at the usual type of crime Nightreaver tackled, yet you hadn't seen even the slightest hint of him.\n\nYou pushed back your chair and leaned forward, stretching your back and shoulders before getting up. Your eyes wandered across the small room and took in your private little space—your lair, your sanctuary. It had grown to be as much a part of your vigilante career as your suit. It was just one room in your home that you'd converted and hidden away, but it felt like so much more. You looked outside at the skyline of Pacifica.\n*fake_choice\n\t#It was far on the horizon, as I lived on the outskirts of the city in a fairly isolated house.\n\t\t*set living \"far\"\n\t\tIt usually took you at least forty minutes to get into the city. The house was far, but not too far. Isolated enough to avoid too many curious eyes, but not isolated to the point of living in the wilderness. The room conversion had been a fairly quick process. You changed the old room from a traditional second bedroom into a completely new configuration, utilizing the space as best you could:\n\t\t*choice\n\t\t\t#Training room.\n\t\t\t\t*set body +5\n\t\t\t\tA ceiling-mounted punching bag, a rack of various fake weapons, a mirror to examine your form. Everything you might need to keep your shape up and your combat skills honed. A large poster on the wall opposite from the mirror shows a detailed map of the human body, with nerve clusters marked clearly as targets.\n\t\t\t\t*goto roofevening\n\t\t\t*if (gadget) #Gadget shop.\n\t\t\t\t*set body -10\n\t\t\t\tA long workbench lined two of the walls, with several vices and table-mounted magnifying glasses lining it. Between these were piles of small circuits, rolls of wire, and empty pellet shells. The walls above the workbenches were filled with shelves and holders for tools and other equipment.\n\t\t\t\t\n\t\t\t\tThe walls on either side of the entrance had several mannequins on them, holding spare outfits, equipment belts, and other gear.\n\t\t\t\t*goto roofevening\n\t\t\t#High-tech monitoring station.\n\t\t\t\t*set body -5\n\t\t\t\tThe widest wall in the room was lined with mounted monitors, forming a collage of stills and video feeds from all across the city. Due to the distance and the fact that there was an internet service provider monopoly in the county, most of the screens were slightly greyed out, with a rotating circle indicating buffering issues.\n\t\t\t\t\n\t\t\t\tEven so, this was your connection to the city. Through these screens, you could monitor most of the major events going on or tune into any news station.\n\t\t\t\t*goto roofevening\n\t\t\t#Office space.\n\t\t\t\tNot quite the ordinary office space, but office space nonetheless. A large table, lots of shelves, drawers, and cabinets all filled with notes, case files, copied archive information about crimes, and old snippets of media. Everything you might need to solve some crimes. There was even the traditional corkboard on the wall with pictures of gangsters and strings tying them together into a web of contacts. Of course, New Dawn and the whole mess with the other heroes had jerked you right out of any investigation you might have been conducting. When everything eventually blew over, you'd have to start all over again.\n\t\t\t\t*goto roofevening\n\t\t\t#A bit of everything.\n\t\t\t\tYou had a workbench in the room with a mannequin next to it holding a spare outfit. A large punching bag hung from the ceiling in the middle of the room, with a narrow mirror mounted on one wall so that you might observe your form.\n\t\t\t\t\n\t\t\t\tAt another wall stood an office desk topped with a series of six screens showing various images and video feeds from Pacifica. Due to the distance and the fact that there was an internet service provider monopoly in the county, most of the screens were slightly greyed out, with a rotating circle indicating buffering issues.\n\t\t\t\t*goto roofevening\n\t#It was fairly close, as you lived in the suburbs in a nice little house.\n\t\t*set living \"near\"\n\t\tThe city was close, and the skyscrapers downtown formed a mountain of concrete and glass against the horizon. The house may have been small and slightly cramped, even for just one person, but you made it work. The room itself was definitely another piece of evidence for that. It had been meant as a small home office, yet you'd somehow managed to maximize the space and turn it into something completely different:\n\t\t*choice\n\t\t\t#Training room.\n\t\t\t\t*set body +5\n\t\t\t\tA ceiling-mounted punching bag, a rack of various fake weapons, a mirror to examine your form. Everything you might need to keep your shape up and your combat skills honed. A large poster on the wall opposite from the mirror shows a detailed map of the human body, with nerve clusters marked clearly as targets.\n\t\t\t\t*goto roofevening\n\t\t\t*if (gadget) #Gadget shop.\n\t\t\t\t*set body -10\n\t\t\t\tA long workbench lined two of the walls, with several vices and table-mounted magnifying glasses lining it. Between these were piles of small circuits, rolls of wire, and empty pellet shells. The walls above the workbenches were filled with shelves and holders for tools and other equipment.\n\t\t\t\t\n\t\t\t\tThe walls on either side of the entrance had several mannequins on them, holding spare outfits, equipment belts, and other gear.\n\t\t\t\t*goto roofevening\n\t\t\t#High-tech monitoring station.\n\t\t\t\t*set body -5\n\t\t\t\tThe widest wall in the room was lined with mounted monitors, forming a collage of stills and video feeds from all across the city. Due to the distance and the fact that there was an internet service provider monopoly in the county, most of the screens were slightly greyed out, with a rotating circle indicating buffering issues.\n\t\t\t\t\n\t\t\t\tEven so, this was your connection to the city. Through these screens, you could monitor most of the major events going on or tune into any news station.\n\t\t\t\t*goto roofevening\n\t\t\t#Office space.\n\t\t\t\tNot quite the ordinary office space, but office space nonetheless. A large table, lots of shelves, drawers, and cabinets all filled with notes, case files, copied archive information about crimes, and old snippets of media. Everything you might need to solve some crimes. There was even the traditional corkboard on the wall with pictures of gangsters and strings tying them together into a web of contacts. Of course, New Dawn and the whole mess with the other heroes had jerked you right out of any investigation you might have been conducting. When everything eventually blew over, you'd have to start all over again.\n\t\t\t\t*goto roofevening\n\t\t\t#A bit of everything.\n\t\t\t\tYou had a workbench in the room with a mannequin next to it holding a spare outfit. A large punching bag hung from the ceiling in the middle of the room, with a narrow mirror mounted on one wall so that you might observe your form.\n\t\t\t\t\n\t\t\t\tAt another wall stood an office desk topped with a series of six screens showing various images and video feeds from Pacifica. Due to the distance and the fact that there was an internet service provider monopoly in the county, most of the screens were slightly greyed out, with a rotating circle indicating buffering issues.\n\t\t\t\t*goto roofevening\n\t#It was right outside your window, as you lived in a downtown apartment.\n\t\t*set living \"in\"\n\t\tThe view from your window was that of the city itself, another apartment complex being directly across a small paved yard, with no greenery in view unless a neighbour had a flower in the window. The apartment was tiny and cramped, but fortunately had an extra room for you to use. It had been meant as a small home office, yet you'd somehow managed to maximize the space and turn it into something completely different:\n\t\t*choice\n\t\t\t#Training room.\n\t\t\t\t*set body +5\n\t\t\t\tA ceiling-mounted punching bag, a rack of various fake weapons, a mirror to examine your form. Everything you might need to keep your shape up and your combat skills honed. A large poster on the wall opposite from the mirror shows a detailed map of the human body, with nerve clusters marked clearly as targets.\n\t\t\t\t*goto roofevening\n\t\t\t*if (gadget) #Gadget shop.\n\t\t\t\t*set body -10\n\t\t\t\tA long workbench lined two of the walls, with several vices and table-mounted magnifying glasses lining it. Between these were piles of small circuits, rolls of wire, and empty pellet shells. The walls above the workbenches were filled with shelves and holders for tools and other equipment.\n\t\t\t\t\n\t\t\t\tThe walls on either side of the entrance had several mannequins on them, holding spare outfits, equipment belts, and other gear.\n\t\t\t\t*goto roofevening\n\t\t\t#High-tech monitoring station.\n\t\t\t\t*set body -5\n\t\t\t\tThe widest wall in the room was lined with mounted monitors, forming a collage of stills and video feeds from all across the city. Due to the distance and the fact that there was an internet service provider monopoly in the county, most of the screens were slightly greyed out, with a rotating circle indicating buffering issues.\n\t\t\t\t\n\t\t\t\tEven so, this was your connection to the city. Through these screens, you could monitor most of the major events going on or tune into any news station.\n\t\t\t\t*goto roofevening\n\t\t\t#Office space.\n\t\t\t\tNot quite the ordinary office space, but office space nonetheless. A large table, lots of shelves, drawers, and cabinets all filled with notes, case files, copied archive information about crimes, and old snippets of media. Everything you might need to solve some crimes. There was even the traditional corkboard on the wall with pictures of gangsters and strings tying them together into a web of contacts. Of course, New Dawn and the whole mess with the other heroes had jerked you right out of any investigation you might have been conducting. When everything eventually blew over, you'd have to start all over again.\n\t\t\t\t*goto roofevening\n\t\t\t#A bit of everything.\n\t\t\t\tYou had a workbench in the room with a mannequin next to it holding a spare outfit. A large punching bag hung from the ceiling in the middle of the room, with a narrow mirror mounted on one wall so that you might observe your form.\n\t\t\t\t\n\t\t\t\tAt another wall stood an office desk topped with a series of six screens showing various images and video feeds from Pacifica. Due to the distance and the fact that there was an internet service provider monopoly in the county, most of the screens were slightly greyed out, with a rotating circle indicating buffering issues.\n\t\t\t\t*goto roofevening\n\n*label roofevening\n\nYou glanced into the room and took a step back, turning to see the television instead. You had it turned on to the local news by default. This time, the news was busy reporting on an armed robbery nearby. With a smirk, you walked straight into your little lair and grabbed your outfit. It was only half on by the time you'd gone out the \n*if (living = \"far\")\n\tdoor to rush to the scene.\n\t*goto eveningy\n*else\n\twindow to rush to the scene.\n\t*goto eveningy\n\n*label eveningy\n*page_break The Next Evening.\nYou were sitting on top of an office building, looking down at the busy square in front of the Star of Pacifica building. The humongous screen that usually served as ad space was now tuned to a news broadcast. Echoes from the surrounding buildings made the sound distorted and hard to understand from where you were, but you managed it.\n\n\"Due to the increased amount of destruction in Pacifica in the aftermath of these powered vigilantes arriving in our good nation, there is no other option than to enact this executive order,\" the voice from the television echoed with a hollow ring. The voice belonged to the President, standing defiantly behind his podium in the White House.\n\n\"These vigilantes cannot remain out there unmonitored, and they cannot be allowed to remain as a threat to public safety. Under these circumstances, this executive order will authorize the detainment of any vigilante operating in the United States, whether a citizen or not…\" You sighed as the President continued rambling on about his executive order; a political action made under great pressure in Washington.\n*page_break\nYou heard a rush of air behind you and the pat of boots landing on the roof. You turned to see Aurora, her cape flapping in the wind, providing a contrast to the blue-and-green colours of her outfit.\n\n\"Turn yourself in,\" she said, her tone of voice firm and confident.\n\n\"It hasn't even been a week since the attack on us. Why would we turn ourselves in? We know nothing about the people who attacked the penthouse,\" you said, standing firm against Aurora's gaze.\n\n\"Because we don't have a choice. This is how it works, we need to follow laws if we're to uphold them. And we don't want another one of those penthouse attacks, it's unnecessary and endangers civilians,\" she said and kept staring at you. \n*if not (nation = \"American\")\n\t\"You're not from here, show them your passport and you'll be let off easy. A plane ticket will be arranged to get you home.\"\n\t\n\t\"What if this is home now?\" you asked, to seemingly deaf ears.\n*label questions\n*hide_reuse\n*choice\n\t#\"Where's Nightreaver?\"\n\t\t\"He's safe, he was the first to turn himself in,\" Aurora answered quickly.\n\t\t\n\t\t\"I doubt it. Last I saw him, he was going to try and seek you out. Did you throw him in a cage?\" you continued, receiving a dismissive shake of the head from Aurora.\n\t\t\n\t\t\"Either you believe me and he voluntarily walked into custody…or you don't, and think that I took him by surprise and delivered him to the authorities with a big black ribbon on his head. I guess it's up to you to decide what to think. I'm just here to deliver a message,\" Aurora said, squinting at you.\n\t\t\n\t\t\"He went missing before this executive order was signed. That's not right,\" you stated, and the woman in front of you laughed.\n\t\t\n\t\t\"There are laws against vigilantism, too. Nightreaver of all people deserved to be locked up. Do you know how many people he left paralysed in a hospital?\" Aurora said and sighed, shaking her head. \n\t\t*if (kills)\n\t\t\t\"Of course, you have your own body count as well, don't you?\"\n\t\t*goto questions\n\t#\"Where's Crimson Caracal?\"\n\t\t\"Who knows. Back in Africa, if she knows what's good for her,\" Aurora said calmly, squinting at you. \"She's involved in enough deaths and injuries to warrant worse.\"\n\t\t\n\t\t*goto questions\n\t#\"Where's Icarus?\"\n\t\t\"The British choir boy? Don't know. Haven't seen any sign of him since the penthouse attack. I'm pretty sure he isn't dead, certain that he's not detained. Yet.\"\n\t\t\n\t\t*goto questions\n\t#\"Where's Leatherback?\"\n\t\t\"Leatherback? I think she was injured in the penthouse fight. Either she's hiding somewhere like she should, or she's in a hospital under whatever name she goes by when not in costume. She'll be found as well if she pops her head back into any heroics,\" the woman said dismissively.\n\t\t\n\t\t*goto questions\n\t#\"Where's Barrier?\"\n\t\t*set barrcap \"true\"\n\t\t\"I hope you realize just how dangerous Barrier can be with his powers. He was caught in the penthouse fight and delivered to detainment immediately,\" Aurora said, letting out a snort. \"His powers are completely out of control if he doesn't wear his gear. He's better off hidden away.\"\n\t\t\n\t\t*goto questions\n\t#\"Was the penthouse attack supposed to capture all of us?\"\n\t\t\"Yes,\" Aurora answered.\n\t\t\n\t\t\"But you fought against them,\" you said, taking a step forwards.\n\t\t\n\t\t\"That was before I knew who they were and what they were trying to do. If we'd been captured that night, the President wouldn't have to be involved in all this. It could have been kept local, off the federal level. Now, everything has changed, and I'm going to make a point of standing with the government on this,\" she said and shot a warning look your way. You took a step back again.\n\t\t\n\t\t\"People could have died there. \n\t\t*if (kills)\n\t\t\tPeople did die there. \n\t\tWho else knew about the meeting?\" you asked and received an exasperated sigh from Aurora.\n\t\t\n\t\t\"I don't know, and you ask way too many questions. This is very simple, ${heroname}, you turn yourself in and we don't have any more trouble,\" she said, trying to stare you down.\n\t\t*goto questions\n\t#\"What if I refuse to turn myself in?\"\n\t\t\"They'll come for you. And if they can't, I will come for you,\" Aurora stated bluntly, her eyes burning with determination.\n\t\t\n\t\t\"You think much of yourself. You're the poster girl, but you're not the most powerful among us,\" you said and received a quick scoff from the woman.\n\t\t\n\t\t\"Perhaps. But do you really want to find out?\"\n\t\t*goto questions\n\t*if (ferrisnamed) #\"Do you know anything about a Project Dawn? Or Ferris Bernard?\"\n\t\t\"Project Dawn? Unless that's connected to that New Dawn thing, I don't have anything for you. Ferris Bernard, I do know of. He works as some kind of enforcer and problem-solver for Reissman Industries. Why?\" Aurora asked, seeming fairly dismissive of your question. It was clear she didn't know anything about the facility or the danger within.\n\t\t*goto questions\n\t#\"I won't come with you. They can't lock us away.\"\n\t\t\"I don't want you to come with me, I want you to wisen up and side with the good guys here. The government is going to crack down on our little vigilante business, and it's up to us how hard they're going to do that. It's your call; either there's blood on the streets, or we go in quietly and listen to what we're told from now on. We're an asset, but they want to make sure we don't get out of control. We don't need any more crates littering this city,\" Aurora said, her voice rushing to get the heated words out faster the further she got into her tirade. At the end of it, she looked at you with fury in her eyes.\n\t\t\n\t\t\"If I don't hear that you've turned yourself in by tomorrow night, I'll be coming to drag you in personally.\"\n\t\t*goto meetdawn\n\t#\"I'll turn myself in then. No need for any more violence.\"\n\t\t\"Good. Look, the government is the good guy here. They just want to make sure we don't go on any rampages, that we're under control and an asset instead of a threat. If we don't wisen up and do this, there's going to be blood and unnecessary violence in our future,\" Aurora said and let out a sigh of relief.\n\t\t\n\t\t\"Turn yourself in by tomorrow night. Any later and they'll put you on a detainment list and come after you hard.\"\n\t\t*goto meetdawn\n\n\n*label meetdawn\n\nWith a loud flutter of her cape, Aurora rose to the skies and darted off, flying past the Star of Pacifica and heading off to whatever waited for her behind it. You sighed as you watched her go, your eyes falling back down to the busy square below and the flat screen now showing an interview with someone claiming to be an expert, probably concerning the plans the government would be putting into place for the 'vigilantes' out there.\n*page_break\nYou turned around to walk away. As Aurora flew away in a streak of colour in the sky, you also saw a flash of white move across the roof. As the streak of white halted, you came face to face with Purge. The beacon of white in the middle of the roof, appearing as if from nowhere, was a strange and unnerving thing, yet you found yourself slowly getting used to it. With a clearing of your throat, you walked forward to meet the figure in white.\n\n\"Again, I find myself asking…what do you want?\" you said, slowing your steps and then halting completely. The figure in white looked directly at you from behind the mask, and you heard a modulated chuckle come through the speakers.\n\n\"Talk. I'm here to talk. Dusk has fallen, I'm here to tell you that you have a place in the Dawn.\" The crackling of the voice modulator enhanced the strangeness of the situation. \"You can either follow Aurora to an era of shackles and security, or you can come with me and enjoy the freedom of chaos.\"\n\n\"When we first met, you were going on about order, purging the criminals,\" you said with a hint of disbelief in your voice.\n\n\"No. Yes, we would bring order, happiness, freedom. Yes, we would sweep away those who prey on the weak and the free. The predator isn't always the criminal. This will be a dark road, with misery and chaos, but ultimately…even chaos is order. And sometimes, misery to some begets happiness for others,\" Purge said, shifting in stance and then suddenly disappearing from sight, a gust of wind blasting against you as the air around you rushed to fill the void left behind by the fast figure. On the spot where Purge once stood lay a key with a small printed label on it; an address.\n\nYou looked up to the horizon and sighed. For your entire career in costume, you had been chasing after something without knowing it. Something was moving in the background, and it felt like now everything was coming to a head. Whichever path you chose, there would be no turning back.\n*page_break Present Day.\nThe next day you're up early, or more accurately, still up from the previous night. Your thoughts continue to be plagued by a lack of information and confusion about the things you did and didn't know.\n\nFor a full day, you walk the city streets, dressed like any other normal person, and take it all in. You wander into a small park in the heart of Pacifica. Somewhere in the distance is a playground and the happy screams of children echo throughout the rest of this small green patch in the midst of the concrete cityscape. A path made of packed gravel crunches underfoot as a jogger goes by. It's a strangely serene place; a sudden departure from the extended flashback that's been going on in your head.\n\nNext to the path, a group of elderly men are gathered, playing chess and talking of current affairs. Next to them is a radio, and somehow the men have managed to find a radio station playing the best of the 50's. In between songs, there are small snippets of historical news mixed with current affairs.\n\nWith a relaxed sigh, you sit down on one of the many park benches. Someone has already tagged it in several places with a large black pen, and someone else has carved the numbers 420 into the wood with a sharp instrument. Across your vision walks a hot-dog vendor pushing their metal cart, and somewhere on the opposite side of the park you can hear the jingle of an ice cream truck.\n\nIt's all so very idyllic. Then you turn your eyes to the city and see the looming Star of Pacifica just a few blocks away. A newspaper floats by, carried by a light breeze that stops just as the paper is within reach of you. You spot the headline on the cover: \"California Demands Vigilante Detainment!\"\n*line_break\nYou pick up the paper hesitantly and skim through the article. The state is lobbying for mass detainment rights on all powered vigilantes. Apparently there's already a facility open for it. It doesn't surprise you, with what the news has been telling you for the past weeks and months, and what Aurora told you the previous night. It's going to get hard to conduct yourself with such attention on you and your fellow vigilantes.\n\nYet, there's something that strikes you as odd about the article. The rhetoric used is harsh, painting even Aurora as a menace and a threat that needs to be leashed. An editorial column in the same paper blames the powered individuals for pretty much everything, from the earthquake to stalling building ventures in Pacifica to the lack of FEMA money to San Francisco and Los Angeles.\n*page_break\n\"What do you think?\" you hear a voice call from behind the newspaper you're holding. You lower it and see a small girl looking up at you with big emerald eyes and a smile from ear to ear. You turn the paper over and see that she's seen the headline about the detainments.\n\n\"Where's your parents?\" you ask without even thinking.\n\n\"I asked you first,\" the girl huffs, tossing her cute little arms on her waist to look as puffed up and pouty as she can.\n\n\"About what?\" you ask, looking around and trying to see if you can find any parents looking for their lost child.\n\n\"The heroes! They're great, aren't they? I think they'll save us all,\" she says and waves her arms around excitedly, her face pulling into a wide smile again. \"But Mommy says they're just trouble and should go away. I don't think she likes them very much. I think the heroes should show Mommy that they're doing good!\"\n\n\"Honey! Honey!\" you hear a call from behind you as a middle-aged woman rushes to the scene and quickly grabs her daughter. \"Hey, you stay away from my child, you freak. What do you think you're doing, luring kids around the park? I should call the police. Let's go, baby,\"\n\nTaken aback, you lean into the seat and try to look as innocent as you can while the woman carts away her child. The little girl turns her head to you, then offers a wave as she gets dragged away. With a loud sigh, you lean forward and put the newspaper down, turning your attention back to the question at hand.\n*page_break\nBoth sides want peace.\n\nAurora wants to work within the system, cooperate with the government and make heroes into agents of justice. She wants to be held accountable and within the reach of the justice system, which in itself is a good idea. Unfortunately, the atmosphere within the justice system and in the public will not be impartial towards any powered heroes. They'll end up pushing agendas and making you into scapegoats.\n\nOn the other hand is Purge, who seems to be conflicted in what he or she wants. For all you know, New Dawn is still a cult that paints walls with the blood of their victims, but according to Purge, they now want freedom. They want to keep the powered individuals outside of the reach of the government, allowing all of you to make your own way in the world. In a way, perhaps that would be the easier route to affecting public opinion and gaining the support of the masses.\n\nNeither option feels good enough. Yet you cannot take on either side alone, or stay neutral in the affair and have both sides coming after you. The options seem clear: either you hang up your outfit for the remainder of the chaos, or you make a choice and take a stand on one side or the other. And you have no intention of quitting just yet.\n\nThen again, perhaps you could go one route and use that to your advantage to play both sides, or try and stay neutral in the matter altogether. It would be hard to do, perhaps even impossible, but you could try.\n*choice\n\t#Turn yourself in to the authorities.\n\t\t*set fame +10\n\t\t*set jailpath true\n\t\t*achieve iuris\n\t\t*goto jailhouse\n\t#Follow Purge's clue.\n\t\t*set fame -5\n\t\t*achieve ius\n\t\t*goto afreshdawn\n\n\n*label jailhouse\n*set energy +30\n*if (energy > 100)\n\t*set energy 100\n\nYou wake up to the heavy clang of a metal door locking, followed by a loud electric buzz that echoes off a large central chamber. You sit up in your cramped little bed and yawn, looking out towards the noise. You see your door; a large steel frame filled in with heavy-duty mesh that you know from experience is coursing with electricity. Past the door is a grated metal walkway that allows movement around the four floors of cell space. The echoes of people talking somewhere beyond reach your cell, distorted a
