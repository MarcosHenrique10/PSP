<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Best of Us — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "bestofus", "title": "Best of Us", "scenes": {"aidwork": "*set energy 100\n\n*temp waitrookie false\n\nThe voice continued. You quickly recognized it, connecting it and the face to a young woman named Alexandra Jessop. She had originally arrived just after the quakes as a volunteer aid worker with the Red Cross, leaving behind a job as an ambulance driver in Raleigh. Now she was head of street operations in the San Francisco area. Despite the fancy title, most of her duties revolved around organizing foot patrols to point out places with a lot of badly supplied homeless people or roaming youth groups, so they might make connections and call in for a van with food, blankets, and clothing.\n\nYou had joined up so early on that you were one of the senior workers on street patrol and often knew the right spots and most common faces when on patrols. You'd also learned the harsh lessons on what worked and what didn't when diffusing potentially dangerous situations.\n\n\"Look, ${name}, I need you on patrol today. We've got a new hire, and you know the ropes better than anyone around here.\"\n*label questionnewbie\n*hide_reuse\n*choice\n\t#\"Who am I walking around today?\"\n\t\t\"Umm, his name is…just give me a sec here,\" Alexandra said, flipping through her notes, double-checking a couple of pages and then finally landing on the right page. \"Ah, here we go. Richard Rennow. His dad is the Lieutenant-General and apparently isn't very happy that his boy wants to work for us. So I need you to keep the kid safe on his first day.\"\n\t\t*goto questionnewbie\n\t#\"What route should I take?\"\n\t\t\"Take your pick, really. I suggest heading towards the housing projects east of Pacifica. I hear things there aren't getting any better, and we haven't been that way in a couple of days.\"\n\t\t*goto questionnewbie\n\t#\"Any news about dangers along the way?\"\n\t\t\"The usual. Gangs are making some plays, drug trade is as rampant as usual. Some of our patrols have reported back that there's more Asian activity than they usually see, so the city underworld might have Chinese or Japanese visitors coming in,\" Alexandra said, shrugging rather non-committally.\n\t\t\n\t\t\"You know how the streets get at times. It's the daytime, so you'll be better off now than during the nights.\"\n\t\t*goto questionnewbie\n\t#\"Can't you give the newbie to someone else?\"\n\t\t\"Look, I know you must be tired of going through all the newbies, but I need you on this. I don't want his dad from the Governor's office to start pulling strings and making all our lives miserable. And I need to know that the kid learns from the best, okay? I'm depending on you here, just do this for me.\"\n\t\t*goto questionnewbie\n\t#\"Okay, give me a few minutes and I'll be ready.\"\n\t\t\"Great! I'll have the kid wait in the lobby with his gear all set up. Good luck out there, tiger.\"\n\t\t\n\t\tYou quickly walked over to the metal lockers lining an entire wall of the office, opened the one marked with the number 306 and pulled out your regular gear, which was a mix of some medical supplies and a belt usually worn by bouncers and security guards, with a couple of spray-cans of mace on the back, as well as a multitool. You also took out a comfortable backpack, then closed the locker to go off and fill the backpack with some clothing, water, and food. You also carried around an old phone so you could be contacted and could contact others reliably.\n\t\t*page_break\n\t\t*goto tours\n\n*label tours\n\"The backpack has a real heft to it. Yeah. Yeah. I think I absolutely made the right choice. Look, Christine, I can't talk more now. Sorry, but I really need to go. Talk to you later.\"\n\nYou turned the corner and saw a young man in outdoor clothing reminiscent of hiking gear slipping his phone into his pocket. He fiddled with the single backpack strap that he had slung over his left shoulder and sighed, a nervous aura about him. He jumped as he noticed you approaching, straightening up immediately and then shifting from one foot to the other before surging forwards and extending his hand for a shake. After some quick introductions, you headed for the door and guided the young man along with you.\n\n\"Hi, I'm Richard. Very nice to meet you. May I call you ${name}?\"\n\n*fake_choice\n\t#\"Of course, Richard.\"\n\t#\"Let's keep it at surnames, if you're going to work under me.\"\n\"Very well, then!\" Richard said, nodding.\n\n\"Ready for a rough day?\"\n\n\"Absolutely!\" the kid said, flashing a smile. There was a hint of hesitation in his trembling voice.\n*page_break\nThe walk to the general area of your designated neighbourhood was only about fifteen minutes. You kept a comfortably quick pace and saw the young man moving quickly behind you, trying to mask it when his breathing got progressively heavier. The initial small talk had died down roughly a block away from your office. Slowly, he began to lag behind, speeding up occasionally with short bursts of jogging to catch back up with you.\n\n*fake_choice\n\t#Slow down.\n\t\t*set waitrookie true\n\t\tWith a very slight sigh, you waited for the rookie to catch up. You rounded a corner together, continuing now at a slightly slower pace. It gave you ample time to take in your surroundings. The streets were half-empty, even for what was usual at this hour. The silence of the streets was broken by a series of gunshots and the noise of squealing tires. It was at least two blocks away, but your muscles immediately sprung into action, your entire body twitching with the urge for the adrenaline rush you'd come to know during your nights on patrol.\n\t\t\n\t\tRight next to you, you saw Richard, startled and even slightly scared as he looked towards the noise. His body was urging him to run for it. You'd seen the look of a panicked animal before in humans, and his movements became unpredictable and twitchy as the sounds came towards you.\n\t#Keep going.\n\t\tYou didn't wait up for the kid any more than you absolutely had to. The people on the streets and the neighbourhoods were your focus, and if the newbie couldn't keep up, he needed a rough wake-up to the reality of doing this line of work. With swift steps, you rounded a corner and kept going, hearing his hasty steps struggling to keep up with you.\n\t\t\n\t\tThe chase was interrupted when you reached the next intersection, a loud squeal of tires echoing through the half-empty streets followed by a rapid set of gunshots. You twitched. Your muscles wanted to spring into action immediately. The noise was coming from around a corner, down the main street, and directly towards you.\n\n*fake_choice\n\t#Try to rush ahead and chase the noise.\n\t\tThe sound of Richard calling out after you was quickly muffled by the ecstatic amount of adrenaline coursing through your body. You just took off and left everything in the dust, rushing out towards the source of the noises. Only a block of running later, the source of the noise came hurtling around a corner and slamming into a yield sign, breaking it off before careening down the street past you. The familiar muzzle flash from a handgun brought your instincts into action, and you hit the ground, hearing a bullet smash through the glass of a small office directly behind you.\n\t#Keep to your own job and call the police.\n\t\tYou swiftly took out your phone and dialled. Meanwhile, the noise came careening in from behind the corner, slamming straight through a yield sign hard enough to snap it in half and still keep going. You picked out the license plate immediately, and as soon as someone picked up on the other end of the call, you stated matter-of-factly what was happening as well as giving the license plate. Your spelling out of the license plate was interrupted by a gunshot half a block away from you, heading out of the slightly stretched SUV and shattering the window of a small street-level office.\n\t#Stick close to the kid and keep him safe.\n\t\tYou grasped Richard's shoulder and guided him to the side of the street. You watched as the source of the noise careened from behind a corner and smashed into a yield sign, snapping it off at the base and then continuing directly your way. From the window, you saw a familiar flash as a gun was fired, the bullet shattering the window of a small office down the street. You shoved Richard to the ground by sheer instinct, following him down in case any stray bullets kept flying.\n*comment endif\n\t\t\nAs the car sped off again, you rushed to keep track of it and saw a figure crouched upon the roof. The black, slightly stretched, and expensive-looking SUV had a feminine figure on the roof, one arm punched through the roof and another hand high in the sky as if she were riding a rodeo bull. You also saw a faint glint of light as short blades or hooks extended from this mystery woman's knuckles.\n\n\"Did…did you see that?\" the newbie shouted, looking frantically between you and the car disappearing around the corner. \"That was my dad's car!\"\n\nHe ran after the car as fast as his feet could carry him, no trace left of his previous panting.\n*page_break\nYou called after the kid to no avail, and it was clear he would just end up getting himself hurt. You rushed after him and the car, running down the street and then turning into an alleyway after Richard. A chain-link fence rose up in the middle of the alley, and as the young man approached it, you saw him suddenly bound up and hop over the fence. He rolled over the top bar, then landed softly, continuing in full stride.\n\n*choice\n\t#Use your powers to get past.\n\t\t*choice\n\t\t\t*if (flight) #Fly over.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tYour feet left the ground as you quickly flew up, the rush of air in your ears blasting only for a brief moment before you were descending once more. You landed softly on the other side of the fence, fairly certain that nobody saw you use your powers.\n\t\t\t\t*goto carsmash\n\t\t\t*if (jumping) #Jump over.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tYour feet left the ground as you quickly flew up, the rush of air in your ears blasting only for a brief moment before you reached the top of your arc and began the trip down. You landed softly on the other side of the fence, fairly certain that nobody saw you use your powers.\n\t\t\t\t*goto carsmash\n\t\t\t*if (teleport) #Teleport through.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tYou saw the familiar blurred vision that quickly morphed into a deep darkness. Thousands of little lights lit up and sparkled directly in front of your eyes, and the feeling of your entire body dissipated for a moment. As the sparkling lights united back into daylight, you walked ahead, the fence now behind you. With a quick glance around, you were comfortable in the knowledge that nobody saw you use your powers.\n\t\t\t\t*goto carsmash\n\t\t\t*if (wallcrawl) #Hop on the wall and go past.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tThe fence wasn't too high. You jumped up and slapped your hands and feet against the concrete wall of the building next to the fence. With a fine grip, you crawled up the wall and slung yourself past the top of the fence, landing softly on the other side. A quick glance later, you were sure nobody had seen you use your powers.\n\t\t\t\t*goto carsmash\n\t\t\t*if (agility) #Jump off the wall and climb over.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tThe fence wasn't high at all for someone as agile as yourself. You rushed in and jumped against the concrete wall to your left, using your legs as springs to launch yourself towards the top of the fence. With an arcing body, you rolled over the top bar, then twisted to finish a front-flip and continue into a smooth roll as soon as your feet hit the ground. Bouncing back from the roll, you continued the chase, quite confident nobody had noticed your super-agility.\n\t\t\t\t*goto carsmash\n\t\t\t*if (energypower) #Freeze the fence, then smash it.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tAs soon as Richard was past the fence, you raised your hand and concentrated upon it. As you squinted, you saw a frosty mist billow around the fence, beads crystallizing together. The entire fence creaked, and as you reached it and gave it a worthy kick, a large hole ripped into it. As the rain of frozen metal rained onto the asphalt, you continued rushing after Richard, hoping that nobody saw your party trick.\n\t\t\t\t*set ice +1\n\t\t\t\t*goto carsmash\n\t\t\t*if (energypower) #Make the metal bend to your will.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tAs soon as Richard was past the fence, you raised your hand and concentrated upon it. As you squinted, you saw the chain-link fence begin shifting around as if pulled by strong gusts of wind or a strong magnetic field. It rattled around for a moment before becoming taut, then you saw the linking metal wires unwind and pop apart. As you ran through the human-sized hole in the middle of the fence, you glanced around to make sure nobody saw your use of powers.\n\t\t\t\t*goto carsmash\n\t\t\t*if (energypower) #Melt a hole in the fence.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tAs soon as Richard was past the fence, you raised your hand and concentrated upon it. As you squinted, you saw the fence begin warping. As your concentration pierced the metal fence, you felt a burning heat rising from it. The metal links began glowing crimson, then yellow. In heavy droplets, the metal melted and rained down on the asphalt. Just in time for you to pass through the newly created hole, you allowed the heat to dissipate and ran through without a drop of molten metal hitting your back. You could only hope nobody saw your party trick as you rushed after Richard.\n\t\t\t\t*set fire +1\n\t\t\t\t*goto carsmash\n\t\t\t*if (strength) #Smash through.\n\t\t\t\t*if (endurance)\n\t\t\t\t\t*set energy -3\n\t\t\t\t*if not (endurance)\n\t\t\t\t\t*set energy -6\n\t\t\t\tWho cares about a fence? You continued running, bracing yourself just before impact. The fence was ripped off the bolts attaching it to the concrete walls of the flanking buildings, and you continued running after Richard. The chain-link fence rattled beneath your feet, and you could only hope that the noise hadn't attracted any unwanted attention.\n\t\t\t\t*goto carsmash\n\t#Climb over.\n\t\tYou may have had powers at your disposal, but it would be unwise to use them in broad daylight. Even if you didn't want to use your powers, you weren't completely blocked by the fence. With swift feet, you grasped the holes in the chain-link fence and smashed the tip of your shoes against the twisted links. You saw Richard running away from you, gaining distance, but your efforts weren't in vain. You rolled yourself over the fence and dropped, hitting the asphalt hard but not hard enough to stop you from rushing after the kid.\n\t\t*goto carsmash\n\n\n*label carsmash\n*if (senses)\n\t\n\tYou were past the fence, but your heightened senses picked up on something: great danger. You heard the squealing tires of the SUV on the next street, then saw Richard running out of the alleyway. Suddenly, the warning from your senses made perfect sense.\n\nAs the SUV came into view from the end of the alley, your adrenaline automatically kicked in, giving you ample time to see the driver through the tinted window struggle with the wheel. Richard's eyes went wide, and he began to jump out of the way, his legs springing him into the air with a great deal of energy. The driver lost control at the exact wrong moment, and the SUV went sideways and tipped, then rolled. Broken glass showered the street as the car smashed into a fire hydrant, then launched into the air. Three complete mid-air turns later, the bonnet was wrenched from the bolts holding it to the car. You avoided disaster, the large sheet of metal cutting into the wall next to you, a full quarter of it now buried in the hard concrete.\n\nWhen you looked back, you were unable to see Richard Rennow or the SUV. A trail of gore, shattered glass, and wrecked metal led off to the right.\n*page_break\nYou emerged from the alley to the sight of an older man crawling from the back of the SUV. You saw Richard limping on the ground, halfway between the alley and the spot where the SUV had finally stopped. To your left, you saw the mystery woman who'd been riding on the roof of the car. Her eyes were locked on the kid's body splayed on the street, her general posture somewhat shaken but still rather hard to read. She'd seen carnage before, at least to some extent. Her gaze suddenly switched to you, and her look turned cold.\n\nShe wore an outfit that reminded you of biker gear. Thick, tear-resistant weave with stitched reinforcements at the elbows, shoulders, and knees. The outfit was black and orange with bright-red highlights. Her face was covered by a mask that reached past her eyebrows, her nose, and much of her cheeks. The mask was painted with feline features, and although someone less knowledgeable could argue for a cutesy cat look, to you the large angled ears with tufts of long hair coming from the top hinted at a wild, predatory lynx. She met your look as if it were a challenge, then glanced towards the car and took out some kind of weapon, pointed it at a nearby building, then fired a hook towards it. She was making her escape from the scene.\n\nFrom behind you, you suddenly heard a cry pierce the still air. As you glanced back, you saw the elderly man who you'd seen crawling out of the wreckage now sitting beside Richard's body. He held the young man to his dark suit, his entire body trembling as he screamed into the heavens. Suddenly, you realized you recognized the man. He was none other than the Lieutenant-Governor of California, Gerald Rennow.\n\n*choice\n\t#Rush to help Richard.\n\t\t*set fame +10\n\t\tYou rushed over to the politician, kneeling down and very quickly checking his health. He was bruised, battered, cut, and broken, but alive. The young man in his arms was still, his eyes closed and his clothes seeping with blood. The father caressed his son, leaving smears of blood running across the young face. He didn't react to your presence and showed no interest in the fleeing figure.\n\t\t\n\t\tSomewhere in the distance, the dull tones of wailing sirens made their way towards you, but as you looked at Rennow, the sound seemed to dissipate, leaving behind only the hollow sorrow of a father losing his son.\n\t\t*page_break Two Weeks Later.\n\t\t*goto_scene collection\n\t#Rush to check on the car.\n\t\t*set fame +5\n\t\tYou ran up to the wreckage of the car, leaning down to the broken windows and peering inside. You saw a woman in a suit sitting on the passenger side, the seatbelt holding her tightly against the seat. You couldn't see a driver inside the car. The windshield had shattered, and blood was running through the glass. It was horrific to think where the driver may have ended up if he'd been slung out during the crash.\n\t\t\n\t\tA streak of steam rose up from beneath the bonnet of the car, but it wasn't on fire. The woman strapped to the seat seemed fine for the time being, but you'd learned not to move anyone if you didn't absolutely have to in situations like these. Instead, you began trying to wake her up. Somewhere in the distance, wailing sirens gained in intensity as the emergency responders travelled your way.\n\t\t*page_break Two Weeks Later.\n\t\t*goto_scene collection\n\t#Rush after the woman.\n\t\t*goto_scene caracalfight\n", "caracalfight": "*set energy 100\n*set caracal_met \"fight\"\n\n*temp biggame false\n*temp indepth false\n*temp asked 0\n\n*achieve kittyhunt\n\nYou chased after this mysterious woman. She ran for the rooftops, you ran into the alley. You weren't wearing your outfit, but this woman was clearly dangerous, and you had to do something about it. With your powers, it took you no time at all to get from the alley up to the roof. With a swift glance across the rooftop, you located the woman running to the other side, screeching to a halt as she heard you join her above the city.\n\nHer costume ears seemed to perk up as she twirled around and bent into a smooth, predatory pose. She began walking around the roof, her eyes locked upon you. She didn't speak, although her gaze seemed more quizzical and intrigued than outright hostile.\n\nA question suddenly flickered in your mind as you took in this mystery woman and your surroundings. What were you trying to achieve by being on the roof with her?\n\n*choice\n\t#I have questions that need answers.\n\t\t\"Who are you?\" You launched into your questions straight away, watching the woman prowl before you. Her stance continued to be low and ready to pounce if you became aggressive.\n\t\t\n\t\t\"They call me Crimson Caracal,\" she told you, her posture changing to a slightly more open one. \"I prefer just Caracal.\"\n\t\t*set indepth true\n\t\t*goto queryseries\n\t#I came looking for a fight.\n\t\tYou readied your stance and took a few steps.\n\t\t\n\t\t\"I don't want to hurt anyone I don't need to, but if you're going to butt into this, I'm not going to spare you from what's coming to you. There are much bigger things going on than you might realize, and you won't stop me now.\" She spoke in fluent English, her voice coated with an accent you'd heard at a comedy club very recently. A South African man had made an appearance, and his accent matched hers perfectly.\n\t\t\n\t\tThe woman tilted her head briefly and sniffed the air, then turned her eyes back on you with fresh determination.\n\t\t\n\t\t*if (gender = \"Male\")\n\t\t\t\"Bring it, boy scout. Nobody corners a Caracal.\"\n\t\t*if (gender = \"Female\")\n\t\t\t\"Bring it, girl scout. Nobody corners a Caracal.\"\n\t\t\n\t\t*goto fisties\n\t#I need to bring her in for what she's done.\n\t\t\"I don't want to fight you, but you need to answer for what you've done,\" you said, your eyes matching her intense look and burrowing into her. She changed posture very quickly, her quizzical face warping into a dismissive smile.\n\t\t\n\t\t\"I don't want to hurt anyone I don't need to, but if you're going to butt into this, I'm not going to spare you from what's coming to you. There are much bigger things going on than you might realize, and you won't stop me now.\" She spoke in fluent English, her voice coated with an accent you'd heard at a comedy club very recently. A South African man had made an appearance, and his accent matched hers perfectly.\n\t\t\n\t\tYou readied your stance and took a few steps. The woman tilted her head briefly and sniffed the air, then turned her eyes back on you with fresh determination.\n\t\t\n\t\t*if (gender = \"Male\")\n\t\t\t\"Bring it, boy scout. Nobody corners a Caracal.\"\n\t\t*if (gender = \"Female\")\n\t\t\t\"Bring it, girl scout. Nobody corners a Caracal.\"\n\t\t\n\t\t*goto fisties\n\t#I only want to find out more about her.\n\t\t\"Who are you?\" You launched into your questions straight away, watching the woman prowl before you. Her stance continued to be low and ready to pounce if you became aggressive.\n\t\t\n\t\t\"They call me Crimson Caracal,\" she told you, her posture changing to a slightly more open one. \"I prefer just Caracal.\"\n\t\t*goto queryseries\n\n\n*label queryseries\n*if (asked = 4)\n\t*page_break\n\t*goto caracalrun\n*else\n\t*hide_reuse\n\t*choice\n\t\t#\"Where did you come from?\"\n\t\t\t*set asked +1\n\t\t\tShe spoke fluent English, but her accent was thick. You'd been to a local comedy club recently where you'd seen a man from South Africa do prop comedy. His accent had been much the same as Caracal's.\n\t\t\t\n\t\t\t\"Doesn't really matter, does it? I could've jumped from a plane arriving from Hong Kong and landed on that car for all anyone knows, and nothing would change.\"\n\t\t\t*goto queryseries\n\t\t#\"You don't care about casualties?\"\n\t\t\t*set asked +1\n\t\t\t*set biggame true\n\t\t\t\"Only when they're innocent.\" Caracal shifted around you so she could see down to the street. Chaos was erupting down there, with police, emergency services, and a small army of bodyguards all coming to the scene in a hurry.\n\t\t\t\n\t\t\t\"That kid down there, Rennow's kid, not innocent. Just a pawn in a bigger game.\"\n\t\t\t*goto queryseries\n\t\t*if (biggame) #\"Bigger game?\"\n\t\t\t*set asked +1\n\t\t\t\"There's a lot more going on in this city than you realize. Things are happening here that reach all across the globe.Rennow is a low-level player, but he'll lead me to the bigger fish. They need to be taken down and taken down hard.\"\n\t\t\t\n\t\t\t\"What are you talking about?\"\n\t\t\t\n\t\t\t\"Capitalist enterprises going across at least fifteen borders to make absolutely sure the legal ramifications are as minimal as possible. Private armies, big-time arms trade, blood diamonds, cartels, enforcing wars without goals for their own profit. You name it, these guys are involved in it.\"\n\t\t\t*goto queryseries\n\t\t#\"Why were you on the roof of that car?\"\n\t\t\t*set asked +1\n\t\t\t\"I needed information. Resistance from the bodyguards was stronger than I thought. Don't worry your pretty head, I'll keep on Rennow's heels.\"\n\t\t\t*goto queryseries\n\t\t*if (indepth) #\"Why are you targeting Rennow?\"\n\t\t\t*set asked +1\n\t\t\t\"He's the loose end of a thread that goes all the way to the top. If I keep pulling, someone's gonna end up having a bad day at my claws.\"\n\t\t\t\n\t\t\t\"He's a public figure, it'll look like an attack against him.\"\n\t\t\t\n\t\t\t\"It is an attack against him. Whatever support he gathers from that is well worth it if I can get to who he's involved with.\"\n\t\t\t*goto queryseries\n\t\t#Enough questions.\n\t\t\t*goto caracalrun\n\n\n\n*label caracalrun\nSirens wailed close by, and Caracal glanced off the roof, then towards the downtown area.\n\n\"You've got powers, so I'd rather not fight you.\" She moved towards the opposite side of the rooftop, her eyes still on you. \"I don't know if you're into all this vigilante stuff, you're not wearing a mask or any kind of gear for it, but you seem familiar with what you can do….\" She paused for a brief moment, then seemed to sniff the air.\n\n\"Aurora is on her way. Time for me to disappear,\" she said, flashing you a smile before smashing a pellet against the roof. The pellet exploded into a thick mist, then you heard Caracal run for it. A loud bang was followed by the whirring of a line extending from her gadget. Then, she was gone.\n\nFrom the corner of your eye, you saw a flash of green and blue, then felt a great gust of wind that blew straight past you, slammed into Caracal and then turned back towards you. Caracal slammed against the roof, and above her, you saw another female figure floating in place. Her face was covered up by a mask, a blue cape flying behind her and emphasizing her strong pose. You'd seen her before on captured footage and from a distance on your own patrols; this was Aurora, in the flesh.\n\nCaracal got on her feet and looked up at the flying woman. The two shared a cold stare.\n\n\"I told you to get out. I saw your trail of chaos and clawmarks on that car roof. You're still active.\"\n\n\"And I told you that I'm not leaving before I've gotten what I need from these bastards,\" Caracal responded, her hands clenching into fists and then flashing out sets of bright blades.\n\n\"Stop acting tough. You'll bring the public against us if you keep to your stupid crusade, and if that happens, you'll have fought for absolutely nothing. No gains. Now, I'm letting you go one more time. Next time, I'll fly you across the border myself,\" Aurora stated, then turned to you, looking at your clothes and smirking. \"You I don't know, so I'll give you a bit of advice. Stay away from Caracal and her crusade. She'll ruin everything that we've been building since the quakes.\"\n\nWith a flash of green and blue, Aurora was gone. You tracked her path with your eyes for a moment before looking back down to the roof. Caracal was nowhere to be seen.\n*page_break Two Weeks Later.\n*goto_scene collection\n\n\n\n*label fisties\n*page_break\nThe two of you launched into the middle of the roof. You were without your usual gear, but she wasn't. A flurry of small pellets came your way, bursting into clouds of oppressing smoke and tiny bits of metal that itched against your skin. It was more of an inconvenience than anything else as you kept running, getting well out into fresh air before you were in range to swing at one another.\n\n*choice\n\t*if (flight) #Fly her up into the sky high enough to yield.\n\t\t*if (endurance)\n\t\t\t*set energy -4\n\t\t*if not (endurance)\n\t\t\t*set energy -8\n\t\tThe soles of your shoes left the roof as you stretched out horizontally, your hands already balled into fists. You opened your arms at the last second, slamming into Caracal and gripping onto her. She tried to jump over you but reacted too late, getting caught in your arms as you roared into the skies. Her elbows and knees sprang into action, jabbing into you as soon as you began to lift her upward.\n\t\t\n\t\t*if (durability)\n\t\t\tThe blows slammed into you one after the other, registering as heavy hits but not particularly painful or distracting, thanks to your supernaturally thick skin. You flew higher and higher until you lost sight of individual people on the ground. Still kicking and punching, Caracal was putting up a fight but clearly losing momentum.\n\t\t\t\n\t\t\tFinally, she stopped completely, stayed still in your grip and looked at you with a burning rage mixed with dread.\n\t\t\t\n\t\t\t\"Well, we're high enough that the fall would kill anyone. What's your next step? I'm at your mercy.\"\n\t\t\t*choice\n\t\t\t\t*if (kills) #Drop her and let her fall.\n\t\t\t\t\tYour arms let go of the woman, and her hands suddenly went from being ready to punch you to grabbing at you as best she could. Her hand caught your foot, then slipped as her arm was yanked straight. You watched as the woman in black and orange fell, her lips moving to curse you, but the only sound actually coming out becoming a scream.\n\t\t\t\t\t\n\t\t\t\t\t*if (senses)\n\t\t\t\t\t\tYou sensed the trembling in the air before you heard it, and heard it before you saw it; Something flying at great speed and heading straight in your direction. Then as it got closer, you could sense the pressure shift as this incoming thing headed lower. Aurora?\n\t\t\t\t\t\n\t\t\t\t\tCaracal was just about to reach the rooftops when a blur of green and blue intercepted her. Before you could move to react to this new arrival, you saw Caracal slow down enough that she could be dropped again, and was now rolling across a rooftop. The flying blur stopped, a blue cape flapping behind a set of green-and-blue tights draped over the figure of a woman. She stood in midair in a pose that would fit a comic book perfectly. Aurora, in the flesh.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Flee the scene.\n\t\t\t\t\t\t\tAurora was preoccupied with Caracal, and you weren't in your outfit and definitely not prepared to be having a serious conversation with Aurora. The decision was easy for you to make, and you fled.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tAurora was faster than you when flying, you knew as much from the footage you'd seen of her. But she was watching Caracal quite closely and didn't seem to react as you flew away. Perhaps she would end up flying around trying to find you afterwards, but by then, you'd already be somewhere far from the scene.\n\t\t\t\t\t\t\t*page_break Two Weeks Later.\n\t\t\t\t\t\t\t*goto_scene collection\n\t\t\t\t\t\t#Stay and see what happens.\n\t\t\t\t\t\t\tCaracal stopped at the raised corner of the flat rooftop, Aurora hovering over her with hands clenched into tight fists. Her gaze was set upon the woman on the roof as she began getting back up, then finally brought her attention to you in a brief glance. You hadn't moved; she seemed appreciative of that, as she flashed a very quick smile.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"I told you to get out. I saw your trail of chaos and clawmarks on that car roof. You're still active,\" Aurora said, the two women locking gazes and staring one another down.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"And I told you that I'm not leaving before I've gotten what I need from these bastards,\" Caracal responded, her hands clenching into fists, then flashing out sets of bright blades.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Stop acting tough. You'll bring the public against us if you keep to your stupid crusade, and if that happens, you'll have fought for absolutely nothing. No gains. Now, I'm letting you go one more time. Next time, I'll fly you across the border myself,\" Aurora stated and then turned to you, looking at your clothes and smirking. \"You I don't know, so I'll give you a bit of advice. Stay away from Caracal and her crusade. She'll ruin everything that we've been building since the quakes.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tWith a flash of green and blue, Aurora was gone. You tracked her path with your eyes for a moment before looking back at the roof. Caracal was nowhere to be seen.\n\t\t\t\t\t\t\t*page_break Two Weeks Later.\n\t\t\t\t\t\t\t*goto_scene collection\n\t\t\t\t#Drop her and catch her before she hits the rooftop.\n\t\t\t\t\tYour arms let go of the woman, and her hands suddenly went from being ready to punch you to grabbing at you as best she could. Her hand caught your foot, then slipped as her arm was yanked straight. You watched as the woman in black and orange fell, her lips moving to curse you, but the only sound actually coming out becoming a scream.\n\t\t\t\t\t\n\t\t\t\t\t*if (senses)\n\t\t\t\t\t\tYou sensed the trembling in the air before you heard it, and heard it before you saw it; Something flying at great speed and heading straight in your direction. Then as it got closer, you could sense the pressure shift as this incoming thing headed lower. Aurora?\n\t\t\t\t\t\t\n\t\t\t\t\tYou were already rushing down to catch her, flying faster than her terminal velocity, reaching her in good time and shifting the velocity into a sideways direction in a masterful manipulation of whatever force granted you the power of flight. Despite deciding not to kill or harm Caracal with the drop, now that you were just above a solid, flat rooftop, you found no reason to do anything but drop her on it. As she landed quite roughly and rolled, you stopped and floated in midair. A shadow suddenly overcame your own.\n\t\t\t\t\t*page_break\n\t\t\t\t\tYou glanced back to see a woman in green and blue hovering some ways behind you, her eyes fixed upon Caracal. A blue cape flapped behind her, and her face was covered by a blue mask. You'd seen her before in several pictures and videos, of course. This was the already legendary Aurora standing before you.\n\t\t\t\t\t\n\t\t\t\t\tAfter considering you for a moment, Aurora flew past you and began looming over the woman on the rooftop. The two began a staring contest, both their fists clenching, Caracal unleashing several sharp blades from the backs of her hands.\n\t\t\t\t\t\n\t\t\t\t\t\"I told you to get out. I saw your trail of chaos and clawmarks on that car roof. You're still active,\" Aurora said, the two women locking gazes and staring one another down.\n\t\t\t\t\t\n\t\t\t\t\t\"And I told you that I'm not leaving before I've gotten what I need from these bastards,\" Caracal responded.\n\t\t\t\t\t\n\t\t\t\t\t\"Stop acting tough. You'll bring the public against us if you keep to your stupid crusade, and if that happens, you'll have fought for absolutely nothing. No gains. Now, I'm letting you go one more time. Next time, I'll fly you across the border myself,\" Aurora stated and then turned to you, looking at your clothes and smirking. \"You I don't know, so I'll give you a bit of advice. Stay away from Caracal and her crusade. She'll ruin everything that we've been building since the quakes.\"\n\t\t\t\t\t\n\t\t\t\t\tWith a flash of green and blue, Aurora was gone. You tracked her path with your eyes for a moment before looking back at the roof. Caracal was nowhere to be seen.\n\t\t\t\t\t*page_break Two Weeks Later.\n\t\t\t\t\t*goto_scene collection\n\t\t\t\t#Fly her back down.\n\t\t\t\t\tWith the woman pacified by the threat of a fatal drop, you began the journey back down at a speed that was much faster than a drop would be. With a masterful control over your power of flight, you managed to slow down before reaching the rooftops and diverted a lot of the energy into horizontal motion, dropping off Caracal as you swooped back into the air.\n\t\t\t\t\t\n\t\t\t\t\t*if (senses)\n\t\t\t\t\t\tYou sensed the trembling in the air before you heard it, and heard it before you saw it; Something flying at great speed and heading straight in your direction. Then as it got closer, you could sense the pressure shift as this incoming thing headed lower. Aurora?\n\t\t\t\t\t\n\t\t\t\t\tCaracal hit the rooftop from a manageable height, then rolled over and got back on her feet. As you watched her stand back up, you saw your shadow suddenly overcome by another.\n\t\t\t\t\t*page_break\n\t\t\t\t\tYou glanced back to see a woman in green and blue hovering some ways behind you, her eyes fixed upon Caracal. A blue cape flapped behind her, and her face was covered by a blue mask. You'd seen her before in several pictures and videos, of course. This was the already legendary Aurora standing before you.\n\t\t\t\t\t\n\t\t\t\t\tAfter considering you for a moment, Aurora flew past you and began looming over the woman on the rooftop. The two began a staring contest, both of their fists clenching as they posed at one another, Caracal unleashing several sharp blades from the backs of her hands.\n\t\t\t\t\t\n\t\t\t\t\t\"I told you to get out. I saw your trail of chaos and clawmarks on that car roof. You're still active,\" Aurora said, the two women locking gazes and staring one another down.\n\t\t\t\t\t\n\t\t\t\t\t\"And I told you that I'm not leaving before I've gotten what I need from these bastards,\" Caracal responded.\n\t\t\t\t\t\n\t\t\t\t\t\"Stop acting tough. You'll bring the public against us if you keep to your stupid crusade, and if that happens, you'll have fought for absolutely nothing. No gains. Now, I'm letting you go one more time. Next time, I'll fly you across the border myself,\" Aurora stated and then turned to you, looking at your clothes and smirking. \"You I don't know, so I'll give you a bit of advice. Stay away from Caracal and her crusade. She'll ruin everything that we've been building since the quakes.\"\n\t\t\t\t\t\n\t\t\t\t\tWith a flash of green and blue, Aurora was gone. You tracked her path with your eyes for a moment before looking back at the roof. Caracal was nowhere to be seen.\n\t\t\t\t\t*page_break Two Weeks Later.\n\t\t\t\t\t*goto_scene collection\n\t\t*else\n\t\t\tHer blows kept slamming against your skin, causing you to lose focus on the flying for moments at a time. You were already going down in short stalls when she launched her knee into your abdomen, timing it with a simultaneous hit with her fist against your back. All the air in your lungs escaped. Your arms around Caracal opened, and in a swift motion she released herself and rolled over your falling body. Some moments later, as you were regaining control, you heard the noise of her hook launching toward something.\n\t\t\t\n\t\t\tYou, however, were heading straight for a concrete roof. Just before impact, you concentrated as much as you could and pushed past the thumping pain, feeling the rush of air around you shifting. By a matter of centimetres, you succeeded in changing your trajectory to an upswing. You avoided the brunt of the damage, but the trajectory still left you slamming into the roof, then rolling and bouncing like a ragdoll all the \n\t\t\tway to the far side of the roof.\n\t\t\t\n\t\t\tGroaning, you glanced up and saw Caracal on the roof of another building, waving her hand at you and then turning to run off. Moments later, a shadow descended upon you.\n\t\t\t*page_break\n\t\t\tYou looked up to see a woman in a green-and-blue outfit hovering above you, her blue cape flapping behind her as if she had just appeared from the pages of a comic book. Her fists were clenched, and she looked up at the direction where Caracal had gone, then gave only a brief moment of attention to you.\n\t\t\t\n\t\t\t\"I don't know you, but I know something happened here, so I'll give you a bit of advice. Stay away from Caracal and her crusade. She'll ruin everything that we've been building since the quakes,\" she said before lifting into the air and heading off after the escaping Caracal.\n\t\t\t\n\t\t\tEven if it had only been a short passing moment, all that you'd heard of the already legendary Aurora was affirmed. She was certainly faster than you as she flew, and her demeanour was like that of a strong and determined hero from a comic book.\n\t\t\t*page_break Two Weeks Later.\n\t\t\t*goto_scene collection\n\t*if (teleport) #Teleport to her and take her by surprise.\n\t\t*if (endurance)\n\t\t\t*set energy -3\n\t\t*if not (endurance)\n\t\t\t*set energy -6\n\t\tThe familiar mist hazed over your eyes as you dematerialized and then popped back into existence moments later just next to Caracal. She reacted supernaturally fast to your disappearance, her body turning rigid in order to halt her movement. She was just reaching a ready position when you reformed and launched your first surprise blow.\n\t\t\n\t\tShe tried to react to your blow, but despite her enhanced speed and the agility that she was showing, she wasn't fast enough to block or avoid the blow. She recoiled, and you switched to her other side with your power and hit her again. For a moment, you had complete dominance over the fight, but Caracal was slowly adjusting to you teleporting from place to place around her.\n\t\t\n\t\tThen she finally figured you out and had a stroke of luck, as well. As you blinked back into existence, a booted foot was waiting for you. Caracal's leg strike hit you in the jaw and sent you flying backwards a fair distance.\n\t\t*page_break\n\t\t*goto fightresolve\n\t*if (energypower) #Put her in ice.\n\t\t*if (endurance)\n\t\t\t*set energy -3\n\t\t*if not (endurance)\n\t\t\t*set energy -6\n\t\t*set ice +1\n\t\tYou reached out and concentrated. You could see the air shift around Caracal as she ran towards you, beads of frost forming on her figure. Her eyes went wide with confusion as her movement slowed down, her muscles contorted, and her breath became heavy steam before her very eyes. You pushed with your powers a little bit more, and the air around the woman froze solid, her body swallowed by a monolith of ice.\n\t\t\n\t\tShe was so very still inside the ice. It was almost beautiful to see her sealed away in a timeless space. Small droplets of water began forming on the side of the ice, melting from the power of the bright California sun. Even so, it would take hours for her to thaw out completely.\n\t\t*if (senses)\n\t\t\t\n\t\t\tAs you walked up to the ice and touched the smooth surface for a moment, you could hear and feel the rush of blood still going around in her body. She was sealed in the ice, but she was still very much alive. At least for a moment.\n\t\t\t\n\t\t\tBut as you extended your senses out, another thing dawned upon you: a strong sense of dread. The air itself was contracting in a very small space.\n\t\t*page_break\n\t\tAs you stepped away from the ice, you saw a flash of green and blue blur across the sky, and before you could react, it turned and headed directly towards you. The flying trail of colours crashed directly into the ice, shattering it and rescuing Caracal. The flier then crashed into you, sending you backwards on the hard concrete rooftop.\n\t\t\n\t\tYou got back to your feet quickly, taking a few steps back towards the centre of the roof so as not to get knocked off. \n\t\t*goto fightresolveskip\n\t*if (strength) #Trust your strength, put her through the roof.\n\t\t*if (endurance)\n\t\t\t*set energy -2\n\t\t*if not (endurance)\n\t\t\t*set energy -4\n\t\t*goto fightresolveskip\n\t*if (agility) #Trust my agility; avoid her and strike at every opening.\n\t\t*goto fightresolveskip\n\t*if (durability) #Trust my thick skin; let her approach, and strike when she's reeling.\n\t\t*goto fightresolveskip\n\t*selectable_if (body > 55) #I have the body to withstand a fight, so I just go blow-to-blow with her.\n\t\t*goto fightresolveskip\n\t*selectable_if (body \u003c 45) #Be smart about it; let her fight, and take advantage of any openings.\n\t\t*goto fightresolveskip\n\t#Try to go blow-to blow-with her.\n\t\t*goto fightresolveskip\n\t#Tackle her and take away any advantage she has.\n\t\t*goto fightresolveskip\n\n\n*label fightresolve\nStaggering back from the lucky shot, Caracal began steeling herself for another bout. You got back up to continue the fight, noting the woman before you sniffing the air repeatedly. \n*if (senses)\n\tYou could feel the air pressure changing and hear the low breathing of something heading your way. Your senses picked it up and transmitted it to you as a sense of immediate dread. Noticing your bit of hesitation, Caracal looked at you with a smile.\n*comment endif\n\n*label fightresolveskip\nThen she lunged at you. Her fists came as a flurry of blows, mixed with a few kicks when she saw openings for them. You blocked one blow after the other, \n*if (agility)\n\tdodged out of the way, \n*if (durability)\n\tlet the few hits that came through smash against your tough body, just waiting for any moment that you could strike back. \n*if (strength)\n\tEvery blow you landed hit like a truck, and Caracal made sure to try and dodge out of the way whenever she could, knowing she was outmatched and would likely just get broken bones if she tried to put herself in front of your blows.\n*if not (strength)\n\tEvery blow you landed was blocked or countered. Despite that, you got some hits in, and it became slowly evident that the both of you were quite evenly matched when it came to a pure fistfight.\n*page_break\nFrom the corner of your eye, you saw a flash of green and blue, then found yourself flying off in the opposite direction from Caracal, who you saw was also travelling in midair. The both of you slammed into the hard concrete roof and looked up to see a woman hovering over the place where you had just been. Her face was covered up by a mask, and a blue cape flew behind her, emphasizing her strong pose. You'd seen her before in captured footage and from a distance on your patrols; this was Aurora, in the flesh.\n\nCaracal was the first on her feet, looking up at the flying woman. The two shared a cold stare.\n\n\"I told you to get out. I saw your trail of chaos and clawmarks on that car roof. You're still active.\"\n\n\"And I told you that I'm not leaving before I've gotten what I need from these bastards,\" Caracal responded, her hands clenching into fists, then flashing out sets of bright blades.\n\n\"Stop acting tough. You'll bring the public against us if you keep to your stupid crusade, and if that happens, you'll have fought for absolutely nothing. No gains. Now, I'm letting you go one more time. Next time, I'll fly you across the border myself,\" Aurora stated and then turned to you, looking at your clothes and smirking. \"You I don't know, so I'll give you a bit of advice. Stay away from Caracal and her crusade. She'll ruin everything that we've been building since the quakes.\"\n\nWith a flash of green and blue, Aurora was gone. You tracked her path with your eyes for a moment before looking back down to the roof. Caracal was nowhere to be seen.\n*page_break Two Weeks Later.\n*goto_scene collection\n", "choicescript_description": "It's the dawn of superpowers! Grab a cape and stand with the first generation of heroes as they struggle to join society and vanquish a criminal conspiracy, or lay the foundation to become the first villain.\n\n[i]The Best of Us[/i] is an interactive novel by Teo Kuusela, where your choices control the story. It's entirely text-based--127,000 words, without graphics or sound effects--and fueled by the vast, unstoppable power of your imagination.\n\n• Choose your powers: freeze your opponents, or carry them to the skies.[n/]\n• Don your very own hero uniform and save the city of Pacifica.[n/]\n• Face your fellow heroes and uncover a conspiracy.[n/]\n• Decide the future of heroes: dangerous vigilantes, or paragons of justice?[n/]\n• Lay the foundation for a better future, and perhaps profit from it as well.\n", "choicescript_stats": "*label statspage\n*temp powers \"none\"\n*temp Outfit \"none\"\n\n*if (benign > 100)\n\t*set benign 100\n*if (benign \u003c 0)\n\t*set benign 0\n\n*if (fame > 100)\n\t*set fame 100\n*if (fame \u003c 0)\n\t*set fame 0\n\n*if (flight)\n\t*set powers \"Flight\"\n\t*goto power2set\n*elseif (jumping)\n\t*set powers \"Super Jumping\"\n\t*goto power2set\n*elseif (teleport)\n\t*set powers \"Teleportation\"\n\t*goto power2set\n*else\n\t*set powers \"Wallcrawling\"\n\t*goto power2set\n\n\n*label power2set\n*if (energypower)\n\t*set powers (powers & \", Energy Manipulation\")\n*if (healing)\n\t*set powers (powers & \", Healing Factor\")\n*if (agility)\n\t*set powers (powers & \", Super Agility\")\n*if (endurance)\n\t*set powers (powers & \", Super Endurance\")\n*if (strength)\n\t*set powers (powers & \", Super Strength\")\n*if (adaptation)\n\t*set powers (powers & \", Environmental Adaptation\")\n*if (durability)\n\t*set powers (powers & \", Durability\")\n*if (senses)\n\t*set powers (powers & \", Heightened Senses\")\n*if (infravision)\n\t*set powers (powers & \", Infravision\")\n*if (heatresistance)\n\t*set powers (powers & \", Thermal Resistance\")\n*if (ultravision)\n\t*set powers (powers & \", Ultravision\")\n\n*set powers (powers & \".\")\n\n\n*if (suit = \"fancy\")\n\t*set Outfit \"A fancy, delicately adorned outfit that looks well out of place for anyone roaming the streets as a vigilante.\"\n*if (suit = \"classic\")\n\t*set Outfit \"An outfit that could fit on the page of early 80s comic books, with sleek lines and simplistic form.\"\n*if (suit = \"utility\")\n\t*set Outfit \"An extremely utilitarian and functional outfit that looks bulky but helps carry everything one might need during a rough night.\"\n*if (suit = \"casual\")\n\t*set Outfit \"A casual outfit that helps a vigilante blend into a crowd. A very typical set of daily wear modified slightly to help in vigilante activities.\"\n\n\n*if (caped = \"full\")\n\t*set Outfit (Outfit & \" A full cape is attached around the shoulders, with more than enough fabric for the hem to brush the ground.\")\n*if (caped = \"half\")\n\t*set Outfit (Outfit & \" A half-cape is attached at the shoulders, with a reach only to around the waist or mid-back.\")\n\n\n\n*if (reveal)\n\t*stat_chart\n\t\ttext heroname Alias\n*stat_chart\n\ttext full_name Name\n\ttext Gender\n\t\n\topposed_pair Body\n\t\tMind\n\t\n*if (reveal)\n\t*stat_chart\n\t\ttext Training\n\t\t\n\t\topposed_pair Fame\n\t\t\tObscurity\n\t\topposed_pair Benign\n\t\t\tBrutal\n\t\t\n\t\tpercent Energy\n\t\ttext Powers\n\n*if (reveal)\n\t*line_break\n\tOutfit: ${outfit} The colour scheme for the outfit is ${colours}.\n\n*choice\n\t#Power descriptions.\n\t\t*goto powdesc\n\t*if (firstheard = true) #Known vigilantes.\n\t\t*goto vigilies\n\t#People of importance.\n\t\t*goto vips\n\n\n*label powdesc\n*choice\n\t#Durability.\n\t\tDurability means the powered person has adapted to be able to withstand blows, whether they be punches, gunfire, explosions, or even slower effects such as acid or fire. The user has roughly the same pain threshold as normal people, but with Durability the body can withstand crushing or even fatal injuries, at least to an extent.\n\t\t*goto powdesc\n\t#Energy Manipulation.\n\t\tEnergy Manipulation gives the powered person a limited amount of control over energy itself. This can mean the ability to chill objects to the point of freezing or heating the air itself to project flames. Energy Manipulation is one of the most taxing powers that one can have, but it can be extremely versatile in practice. It is hard to control these forces once unleashed, and collateral damage will be frequent, with any normal human being targeted by such powers almost sure to die as a result.\n\t\t*goto powdesc\n\t#Environmental Adaptation.\n\t\tEnvironmental Adaptation combines effects from both Aerial and Aquatic Adaptation, granting the ability to withstand both very low and very high pressures, with greater capacity and more effective filtration systems in the lungs, making it possible to breathe even at very high altitudes. Furthermore, the powered person has a reactive friction-resistant skin layer that helps when travelling through the air or water at high speeds, as well as forming a second layer that resists the effects of windchill and cold temperatures to some extent.\n\t\t*goto powdesc\n\t#Flight.\n\t\tFlight powers grant the user the ability to fly, levitate, and glide through the air with the same ease as most birds. Without durable skin, the powered person will not be able to fly at speeds higher than Mach 1 due to friction caused by the air. A user of this particular power may end up with altitude sickness when flying too high and may also suffer from the effects of windchill if they do not have aerial adaptation.\n\t\t*goto powdesc\n\t#Healing Factor.\n\t\tHealing Factor grants the user the ability to heal minor wounds in a highly accelerated fashion, and even limbs can be regenerated if given enough time. This is a passive power which, although it requires the powered person to still have energy to spare, does not actually use up a significant amount of it.\n\t\t*goto powdesc\n\t#Heightened Senses.\n\t\tHeightened Senses grants the user a highly tuned set of senses, from better hearing to abnormally good vision to very quick reflexes. A powered person with Heightened Senses can also taste, feel, touch, and smell at a much higher level of precision and capability than normal humans. With training, the user may learn to block out some of these senses, at least to some degree, perhaps even to the point where they can completely mute the other senses in order to concentrate upon one thing, for example a single sound or a faint smell.\n\t\t*goto powdesc\n\t#Infravision.\n\t\tInfravision allows the user to see in the infrared spectrum, essentially giving the powered person the ability to see temperatures along with regular colours. This is an always-on ability that can only be suppressed by wearing sunglasses with a polarization or filter that blocks out infrared wavelengths. It should be noted that the eyes are not in fact emitting IR radiation, but are only tuned to detect it alongside other wavelengths of light.\n\t\t*goto powdesc\n\t#Teleportation.\n\t\tTeleportation grants the user the ability to teleport short distances. The energy usage of this particular power is so great that teleporting even just from one edge of a city to the other would drain the powered human for several days. However, teleportation through a solid wall or from one end of a room to the other is so minuscule in energy usage that it can be done in highly rapid succession.\n\t\t*goto powdesc\n\t#Thermal Resistance.\n\t\tThermal Resistance grants the user a high tolerance toward what normal humans would consider extreme temperatures. A powered person with this set of powers is near-impervious to fire and freezing alike, being able to push through without injury. As a result of this power, the user's pain receptors are often dulled, and thus their tolerance to pain is much higher than in normal humans. A powered user can, for example, be splashed with boiling water without injury, and the water will feel roughly lukewarm on the skin.\n\t\t*goto powdesc\n\t#Ultravision.\n\t\tUltravision allows the user to see in the ultraviolet spectrum, essentially giving the powered person the ability to see bodily fluids or other organic trails, or even to see ink and paint traces that would otherwise be undetectable. This is an always-on ability that can only be suppressed by wearing sunglasses with a polarization or filter that blocks out ultraviolet wavelengths. It should be noted that the eyes are not in fact emitting UV radiation, but are only tuned to detect it alongside other wavelengths of light.\n\t\t*goto powdesc\n\t#Super Agility.\n\t\tSuper Agility grants the user the freedom of movement otherwise attainable only by a lifetime of training in gymnastics. The powered person has enhanced control over their body as well as better balance, coordination, speed, reflexes, strength, and endurance than normal humans, even if they have been trained to their peak condition.\n\t\t*goto powdesc\n\t#Super Endurance.\n\t\tSuper Endurance grants the user enhanced endurance to the point where they can work, even heavily, for extended periods of time without the need for sleep, hydration, or food. Of course, there are limitations to how long this exertion can last, but they fluctuate according to the physical condition of the person.\n\t\t*goto powdesc\n\t#Super Jump.\n\t\tSuper Jump grants the user the ability to jump even tall buildings in a single bound. Powered humans who are experienced with this ability can make such great leaps that to many bystanders it will look as if they were flying. Super Jumpers may suffer from the effects of windchill if they do not have aerial adaptation or thermal resistance.\n\t\t*goto powdesc\n\t#Super Strength.\n\t\tSuper Strength grants the user strength well beyond even the strongest normal human. With great energy expenditure, a powered person can lift heavy objects such as boulders or trucks, as well as being able to punch through reinforced concrete slabs with ease. A powered person with Super Strength must also have durability in order not to harm their body when throwing such a punch.\n\t\t*goto powdesc\n\t#Wallcrawling.\n\t\tWallcrawling grants the user the ability to stick to walls and ceilings, much like many insects and arachnids. This power may not offer particularly high speeds for transportation, but with high agility or endurance, Wallcrawling is a safe and precise form of movement. It demands the least energy of all the powered modes of movement.\n\t\t*goto powdesc\n\t#Back to stats.\n\t\t*goto statspage\n\n\n*label vigilies\n*choice\n\t*if (firstheard = true) #Aurora.\n\t\t*gosub aurory\n\t\t\n\t\t*goto vigilies\n\t*if (everybody_met = true) #Barrier.\n\t\t*gosub barrstat\n\t\t\n\t\t[b]Alias:[/b] Barrier\n\t\t*line_break\n\t\t[b]Real Name:[/b] Unknown\n\t\t*line_break\n\t\t[b]Known Powers:[/b] Energy Manipulation\n\t\t*line_break\n\t\t[b]Suspected Nationality:[/b] Unknown\n\t\t\n\t\t[b]Outfit:[/b] Cargo trousers, utility jacket, mask that covers the entire face. Heavy gauntlets with large coils wrapped around them, possibly to enhance or target his powers.\n\t\t\n\t\t*goto vigilies\n\t*if ((caracal_met = \"true\") or (caracal_met = \"fight\")) #Crimson Caracal.\n\t\t[b]Status:[/b] Active\n\t\t\n\t\t[b]Alias:[/b] Crimson Caracal\n\t\t*line_break\n\t\t[b]Real Name:[/b] Unknown\n\t\t*line_break\n\t\t[b]Known Powers:[/b] Super Agility, Heightened Senses\n\t\t*line_break\n\t\t[b]Suspected Nationality:[/b] South African\n\t\t\n\t\t[b]Outfit:[/b] Orange-brown padded bodysuit with a cowl and mask shaped after the facial features of a caracal. Long ears rise from the mask, with tufts at the points. Gauntlets hide knuckle blades that can be extended and retracted at will.\n\t\t\n\t\t*goto vigilies\n\t*if (dawn_told = true) #Dawn.\n\t\t[b]Status:[/b] Active\n\t\t\n\t\t[b]Alias:[/b] Project Dawn / Dawn\n\t\t*line_break\n\t\t[b]Real Name:[/b] Katie Navarra\n\t\t*line_break\n\t\t[b]Known Powers:[/b] Self-Combustion, Energy Manipulation\n\t\t*line_break\n\t\t[b]Suspected Nationality:[/b] Unknown (American?)\n\t\t\n\t\t[b]Outfit:[/b] Unknown\n\t\t\n\t\t*goto vigilies\n\t*if (everybody_met = true) #Icarus.\n\t\t[b]Status:[/b] Active\n\t\t\n\t\t[b]Alias:[/b] Icarus\n\t\t*line_break\n\t\t[b]Real Name:[/b] Unknown\n\t\t*line_break\n\t\t[b]Known Powers:[/b] Flight\n\t\t*line_break\n\t\t[b]Suspected Nationality:[/b] British\n\t\t\n\t\t[b]Outfit:[/b] Sleek white-gold bodysuit. Domino mask. Lush feathered wings that are either a very well-made part of the outfit or a part of his physique.\n\t\t\n\t\t*goto vigilies\n\t*if (everybody_met = true) #Leatherback.\n\t\t[b]Status:[/b] Active\n\t\t\n\t\t[b]Alias:[/b] Leatherback\n\t\t*line_break\n\t\t[b]Real Name:[/b] Unknown\n\t\t*line_break\n\t\t[b]Known Powers:[/b] Unknown\n\t\t*line_break\n\t\t[b]Suspected Nationality:[/b] American\n\t\t\n\t\t[b]Outfit:[/b] Leather trousers, leather shirt, leather jacket. Large domino mask.\n\t\t\n\t\t*goto vigilies\n\t*if (firstheard = true) #Nightreaver.\n\t\t*gosub reavery\n\t\t\n\t\t*goto vigilies\n\t*if (purge_met) #Purge.\n\t\t*gosub purgiewurgie\n\t\t*line_break\n\t\t[b]Known Powers:[/b] Super Speed, Endurance, Heightened Senses\n\t\t\n\t\t[b]Outfit:[/b] White outfit hidden beneath a white cloak. Cloak wrapped once around the neck and then continued up and over the head in a hood. Translucent mask that refracts light such that the face beneath is distorted and unrecognizable, with voice modulator attached below the chin.\n\t\t\n\t\t*goto vigilies\n\t#Back to stats.\n\t\t*goto statspage\n\n\n*label aurory\n*if ((aurora_met) or (everybody_met))\n\t[b]Status:[/b] Active\n\t\n\t[b]Alias:[/b] Aurora\n\t*line_break\n\t[b]Real Name:[/b] Unknown\n\t*line_break\n\t[b]Known Powers:[/b] Flight, Super Strength, Thermal Resistance\n\t*line_break\n\t[b]Suspected Nationality:[/b] American\n\t\n\t[b]Outfit:[/b] Classic bodysuit coloured green with a blue stripe down the chest. Also wears a blue cape that falls naturally around mid-calf. Identity hidden by a mask that covers her face up to the hairline, except for her mouth and chin.\n\t*return\n*else\n\t[b]Status:[/b] Active\n\t\n\t[b]Alias:[/b] Aurora\n\t*line_break\n\t[b]Real Name:[/b] Unknown\n\t*line_break\n\t[b]Known Powers:[/b] Flight and Strength?\n\t*line_break\n\t[b]Suspected Nationality:[/b] American\n\t\n\t[b]Outfit:[/b] Green-and-blue bodysuit with a blue mask.\n\t*return\n\n*label reavery\n*if (reaver_met)\n\t[b]Status:[/b] Active\n\t\n\t[b]Alias:[/b] Nightreaver\n\t*line_break\n\t[b]Real Name:[/b] Unknown\n\t*line_break\n\t[b]Known Powers:[/b] Wallcrawling, Durability\n\t*line_break\n\t[b]Suspected Nationality:[/b] German\n\t\n\t[b]Outfit:[/b] Black upon black upon black. Mask that hides all but the mouth and chin and is connected down into the rest of the outfit as a cowl. Bodysuit padded and designed for stealthy movement, with hidden pockets and a utility belt.\n\t*return\n*else\n\t[b]Status:[/b] Active\n\t\n\t[b]Alias:[/b] Nightreaver\n\t*line_break\n\t[b]Real Name:[/b] Unknown\n\t*line_break\n\t[b]Known Powers:[/b] Wallcrawling?\n\t*line_break\n\t[b]Suspected Nationality:[/b] Unknown\n\t\n\t[b]Outfit:[/b] Black bodysuit, some kind of cowl.\n\t*return\n\n*label barrstat\n*if (barrcap = \"true\")\n\t[b]Status:[/b] Active\n\t*return\n*elseif (barrcap = \"dead\")\n\t[b]Status:[/b] K.I.A.\n\t*return\n*else\n\t[b]Status:[/b] Captured\n\t*return\n\n*label purgiewurgie\n*if ((purgefight = \"dead\") and (purgereap = false))\n\t[b]Status:[/b] K.I.A.\n\t\n\t[b]Alias:[/b] Purge\n\t*line_break\n\t*if (rennowreveal)\n\t\t[b]Real Name:[/b] Richard Rennow\n\t\t*return\n\t*else\n\t\t[b]Real Name:[/b] Unknown\n\t\t*return\n*elseif ((purgefight = \"dead\") and (purgereap = true))\n\t[b]Status:[/b] Believed K.I.A. (Active imposter?)\n\t\n\t[b]Alias:[/b] Purge\n\t*line_break\n\t*if (rennowreveal)\n\t\t[b]Real Name:[/b] Richard Rennow\n\t\t*return\n\t*else\n\t\t[b]Real Name:[/b] Unknown\n\t\t*return\n*elseif ((purgefight = \"true\") and (purgereap = \"false\"))\n\t[b]Status:[/b] Captured\n\t\n\t[b]Alias:[/b] Purge\n\t*line_break\n\t*if (rennowreveal)\n\t\t[b]Real Name:[/b] Richard Rennow\n\t\t*return\n\t*else\n\t\t[b]Real Name:[/b] Unknown\n\t\t*return\n*elseif ((purgefight = \"true\") and (purgereap = \"true\"))\n\t[b]Status:[/b] Active\n\t\n\t[b]Alias:[/b] Purge\n\t*line_break\n\t*if (rennowreveal)\n\t\t[b]Real Name:[/b] Richard Rennow\n\t\t*return\n\t*else\n\t\t[b]Real Name:[/b] Unknown\n\t\t*return\n*else\n\t[b]Status:[/b] Active\n\t\n\t[b]Alias:[/b] Purge\n\t*line_break\n\t*if (rennowreveal)\n\t\t[b]Real Name:[/b] Richard Rennow\n\t\t*return\n\t*else\n\t\t[b]Real Name:[/b] Unknown\n\t\t*return\n\n\n\n*label vips\n*choice\n\t*if ((ferrisnamed = true) or (purgesave = true)) #Ferris Bernard.\n\t\tEnforcer and problem-solver for Reissman Industries. Large, hulking man of immense strength and intimidating force of presence. He does not seem to exist in any public records.\n\t\t\n\t\tWas the leader of a secret underground facility that acted as a laboratory and holding place for Project Dawn, and which was destroyed in a mysterious large-scale explosion.\n\t\t*goto vips\n\t#Reissman family.\n\t\tThe Reissmans are a family of billionaires and the owners of a large manufacturing empire. Their family started off owning a small steel plant in Illinois during the car boom in Chicago; they became part owners of various automotive companies and expanded their trade all over the globe. For a time, they were shipping magnates and railroad tycoons, as well as military contractors. Under the leadership of current patriarch Benedict Reissman, the family has turned their attention to advanced technologies and the reconstruction of California in the aftermath of the earthquakes.\n\t\t*goto vips\n\t#Rennow family.\n\t\tA family of political operators. Gerald Rennow is the Lieutenant-General of California and is up for election for the Governorship. He holds fairly good ties to industry and would have been the safe choice for Governor of California without the earthquake intervening and forcing a state of emergency, the handling of which gave current Governor Serres extra political points.\n\t\t\n\t\tGerald Rennow had a son, Richard, who is interested in working to aid the poor and homeless in the new city of Pacifica. \n\t\t*if (rennowdead)\n\t\t\tRichard Rennow was tragically killed in a car crash when the SUV carrying his father rolled as the result of a chase. The vigilante Crimson Caracal was indicted for causing the crash, having been seen riding on the roof of the SUV just prior.\n\t\t*goto vips\n\t#Governor Serres.\n\t\tAlberto Serres, the current Governor of California. He was already safely on the way out of office at the end of his second term when the earthquakes hit California, causing a major state of emergency. His decisive action in the aftermath won him a fair bit of popularity with voters, giving him the confidence to run for a third term.\n\t\t\n\t\tHis opponents would have voters believe that the response to the earthquakes was not thanks to Governor Serres, but to rapid action taken at the federal level, from the President of the United States and FEMA, as well as their partnership with large industries with interests in California.\n\t\t*goto vips\n\t#Back to stats.\n\t\t*goto statspage\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game, in
