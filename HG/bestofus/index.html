 large bright screens, and a rack made of rough metal stood right next to the desk with various tools littered on the shelves.\n\nYou started seeing more of the room. Three full mannequins stood nearby, staring in your direction and wearing variations of the Nightreaver outfit. All of them were recognizable as the same outfit, but there were little details, equipment and flourishes that differentiated one from the other. On the other side of you, you could see a large mat assembled to fill that entire side of the room. Wooden knives, swords, and batons were placed in racks along the wall, and several types of punching bags took up space on either side of them. In the middle of the mat stood a large wooden dummy you had seen in pretty much every Kung Fu movie ever made.\n\nNightreaver stepped up to the computer screens and tapped a few keys, filling the room with the sound of the keyboard.\n\n\"I'm sorry for blinding…no, blindfolding you for a moment, but this is my inner sanctum. I hope you will show at least some respect towards me and tell me when you wish to leave so I can escort you out, instead of breaking for it,\" Nightreaver said, turning around to look at you. \"Every vigilante needs their little place to relax, and it's easier to relax when you know nobody knows about it.\"\n*page_break\nYou got used to the light and eventually got up and about. After a quick tour of the large single room you had been led to, Nightreaver let you roam around freely. His screens were rolling with information, from digs into the police database to feeds from at least twenty different news outlets. While you were looking at the flow of information, Nightreaver approached you with a small tray. The tray held a rather unappetizing-looking brown bar on it, as well as two small bottles of water.\n\n\"Sorry. I don't have much to offer right now. The bar is a high-nutrient ration. It tastes like really bland oats and the texture is close to cardboard, but it's better than nothing after the night we've had,\" he said with a shrug. \"Anyways, I appreciate you tagging along after things went south. You're actually pretty decent at what you do, it seems. Have you had any training or…no, don't answer that. I don't want to know any details about you. What I do want to do is make sure you're ready for when we head out there again.\"\n\n*label reaverlair\n*hide_reuse\n*choice\n\t#Ask why he's being nice to me now.\n\t\t\"Why the mood swing? You weren't happy to see me on the roof earlier,\" you asked, looking up at Nightreaver while unwrapping the ration bar. He sighed and shook his head.\n\n\t\t\"You might not know this, but I've been doing this for years. I discovered my abilities when I was young, and ever since took to heart the ethos of certain comic book heroes. The same goes for Aurora. I'm sure you can name at least three of her heroes right off the top of your head. I can see traces of the same in Icarus, Barrier, even Caracal,\" he said. \"I've seen a lot of people like you pick up this line of work in my few years. One after another, they pick up on leads and get pulled into something they cannot handle. Eventually, many of them break down and either retire or lose their lives. You, on the other hand, are a riddle. You've casually stumbled upon a pretty big thing, and you don't seem to be the least bit phased by it.\"\n\n\t\tThe man in black shook his head again, his words becoming whispers. His language became clinical, as if he was thinking out loud and talking to himself rather than continuing to answer your question. Eventually he just kind of wandered off by himself.\n\t\t*goto reaverlair\n\t#\"Where are we?\"\n\t\t\"Near the coast. That is all you need to know for now,\" he said and roamed around the room for a moment, gathering pieces of equipment and placing them on a mannequin stand.\n\t\t\n\t\t*goto reaverlair\n\t#\"What happened in the penthouse?\"\n\t\tThe man sighed heavily and turned around, leaning against the desk holding up his computer screens. He crossed his arms and hung his head.\n\t\t\n\t\t\"Someone was followed, or someone told whoever it was that attacked us. Those people were trained and had the equipment necessary to down some of us,\" he stated, looking at you with serious eyes behind the mask. \"Can't say that for most armed groups in this country.\"\n\t\t\n\t\t*goto reaverlair\n\t#\"Can you tell me more about the others at the meeting?\"\n\t\t\"Heroes, vigilantes, others like us,\" Nightreaver said and cleared his throat, trying to find the correct words. \"You know myself, Aurora, and Crimson Caracal. Icarus arrived in the city recently, and he seems to work on some greater purpose. Barrier has been here for a longer while, but only became active after Icarus arrived and began operating. Leatherback has been a vigilante since before the earthquake, but has been keeping, how you say…a low profile.\"\n\t\t\n\t\tThere was a pause as you struggled to put names to costumes, then looked up to see Nightreaver casually fidgeting with his gear again. Apparently, all of these powered people aren't a point of wonder.\n\t\t\n\t\t\"Icarus and Barrier?\" you find yourself whispering in the form of a question. The dark-clad man turns to you and smiles.\n\t\t\n\t\t\"They're connected, and they have a common cause, yes,\" Nightreaver confirms. \"They're still heroes. Nothing has so far shown that they would prove a threat to anyone but criminals.\"\n\t\t*goto reaverlair\n\t#\"Is there any place to rest here?\"\n\t\t\"Oh, you should get some rest. Please, I have a bed here you can use and sleep in,\" Nightreaver said, nodding towards a doorway. \"I will go out and find out what's happening out there. Everything must be a mess.\"\n\n\t\tYou followed the man into the next room, which proved more like a large closet than anything else, a cubby where a bed had been assembled.\n\t\t*if ((sexual = \"Women\") or (sexual = \"None\"))\n\t\t\tThe mattress was thin and the sheets looked well worn. The pillow seemed like it had been filled with rocks judging from its hardness and lumpiness. Yet after the day you had, you managed to find sleep, even with the glare from the monitors in the other room reaching your eyes.\n\t\t\t*goto lairmorn\n\t\t*else\n\t\t\t*choice\n\t\t\t\t#Try and get Nightreaver in bed with you.\n\t\t\t\t\t*set nightreaver_seduce true\n\t\t\t\t\tThe mattress was thin and the sheets looked well worn. The pillow seemed like it had been filled with rocks judging from its hardness and lumpiness. You glanced back at Nightreaver, who shrugged about the condition of the bed.\n\t\t\t\t\t\n\t\t\t\t\t\"It must be hard sleeping here all alone,\" you began, cringing mentally as soon as the words escaped you.\n\t\t\t\t\t\n\t\t\t\t\t\"It is a bed, it allows me to rest here and be more comfortable than on the floor. It is good enough,\" he said and turned to leave.\n\t\t\t\t\t\n\t\t\t\t\t\"Aren't you tired? Wouldn't you like to rest as well?\" you asked, trying to keep a suggestive tone in your voice. Nightreaver seemed completely oblivious.\n\t\t\t\t\t\n\t\t\t\t\t\"I still have things to do, and I must see if I can find others from the meeting.\"\n\t\t\t\t\t\n\t\t\t\t\t\"I'm asking you to join me in bed, Nightreaver,\" you blurted out, and the man ground to an abrupt halt. He turned to face you, his eyes hastily darting between you and various objects in the room.\n\t\t\t\t\t\n\t\t\t\t\t\"I apologize…\" he began, finally locking his gaze with yours. \"I am, how do you say it…spoken for. I cannot. Even if I wished to. Get some rest.\"\n\t\t\t\t\t*goto lairmorn\n\t\t\t\t#Sleep alone.\n\t\t\t\t\tThe mattress was thin and the sheets looked well worn. The pillow seemed like it had been filled with rocks judging from its hardness and lumpiness. Yet after the day you had, you managed to find sleep, even with the glare from the monitors in the other room reaching your eyes.\n\t\t\t\t\t\n\t\t\t\t\t*goto lairmorn\n\n*label lairmorn\n*page_break The Following Morning.\nYou felt a hand on your shoulder, and your body twitched in response. Your eyes fluttered open, then focused to see Nightreaver standing in front of you.\n\n\"Good morning,\" he stated, smiling through the gap in his mask. \"I apologize for waking you. I thought you would like to see this.\"\n\nHe took his hand off your shoulder and reached out with the other, brandishing a remote. Turning on one of the screens he'd set up as a television, he showed you a scene of an elderly man in a deep blue uniform step up to a podium on the steps of the Pacifica police headquarters. Constant camera flashes lit up his groggy face, and the gathered crowd all hushed in order to see what he had to say. With another press of the button, Nightreaver unmuted the screen.\n\n\"…and we are finally prepared to make a statement. As you've already heard from hints from the public, there was an operation that took place at the penthouse of 28 Banner Street. This operation was undertaken by law enforcement operators with support from BlackWatch International. This operation was to disperse a group of powered vigilantes who had taken to squatting in said penthouse. It was deemed by law enforcement officials that this was a significant threat to the security of the neighbouring areas, and lacking resources, they contracted BlackWatch operators. During the operation, with minimal loss of life…\"\n\nAs the live feed from the local police commissioner continued, Nightreaver shook his head and turned to you.\n\n\"That's not right. Those weren't police, and those weren't BlackWatch either. Minimal loss of life? No. There was loss of life there…this whole speech stinks. I need to get in touch with Aurora. I might have an idea on how to contact her. Meet me tomorrow night, around eleven, at the penthouse. If you don't see me or Aurora before midnight, get back into hiding. Come on, I'll walk you out of here,\" he said, offering you the same blindfold you'd worn when the two of you arrived.\n*page_break\nThe following night, you stood atop a neighbouring building, looking up at the penthouse that you'd been in when it was raided. Nobody was moving around up there, and it seemed like the place was no longer guarded. The crime scene had been combed for evidence, statements had been made, and the building was slowly returning to a state of normalcy.\n\nAs you looked up, you wondered just what you'd gotten yourself into. The whole situation was crazy from the start; superpowers belonged in comic books, not in real life—yet you had been granted them by some twist of fate in your life. Then the earthquake drew everyone to one place, creating a breeding ground for confusion as each vigilante sought to find their persona while also trying to deal with others like them.\n\nYou took a moment to just breathe, and even contemplated just taking the night off and going for a nice long walk in civilian clothes. However, some small voice in the back of your head drowned out all of that. As that voice slowly took over and made you take the first steps towards the penthouse, your mind was still trying to bring everything together into something coherent.\n*fake_choice\n\t#I had always wanted to be a hero. Just like in the comics.\n\t\tOf course. Swooping in to save the day is what every child dreams of for at least a few weeks during their long journey into adulthood. Perhaps your fascination with the idea had been clinging on for longer than most due to the powers you had, but it didn't diminish a certain naivete inherent in the notion.\n\t\t\n\t\tYou glanced down at the streets below and watched as a firetruck drove past, either returning from a call or just patrolling the streets. They're the heroes, aren't they? Then again, they also get paid, whereas you did it from the goodness of your heart. There was a pause as you heard your own thoughts and let out a slight scoff. You are a human being with a moral compass, not some archetypal hero. You do what feels right, not what some outside force says is right. Your feet carried you to the edge of the building as you headed for the penthouse.\n\t#I'm only trying to make the best out of a bad situation. I don't seek out these things, they just happen.\n\t\tOf course. Perhaps you simply had bad luck, stumbling into powers of your very own, getting caught in the dealings of some kind of a cult, and then gaining a nemesis who dresses in white. \n\t\t*if (purgefight = \"dead\")\n\t\t\tYou'd made short work of the villain in order to make sure the story didn't descend into a strange spiral of increasingly unbelievable meetings between the two of you. You were already living in a world that felt like it had been ripped from a comic book, the last thing you wanted was for it to follow comic book plotlines as well.\n\t\t\n\t#Deep down, I had always wanted power, to use it to stop people who would call me a freak.\n\t\tPower. Of course. Power is the one thing that makes everyone bend the knee, in one way or another. \n\t\t*if (purgefight = \"dead\")\n\t\t\tThat power had allowed you to take on a foe much faster than you and slay them. \n\t\tYou paused for a moment and looked up at the dark sky. Somewhere in the back of your mind, a very faint voice called out in confusion. Were you on the road to becoming a supervillain?\n\t\t\n\t\tWith a dismissive chuckle, you moved from your spot to head towards the penthouse. As much as your life had come to resemble a comic book plotline, you're still a human in full control of your actions. Supervillains are an archetype, not something that anyone could actually become. Then you looked down at your outfit and sighed as you realized that the same could be said of superheroes.\n*comment endif\n\nFor a moment, you paused and looked around yourself. The noise of the city faded into the background as you simply concentrated on the space around you, taking a deep breath of the chilly air. You reminded yourself that this is reality, not your childhood fantasies. You would have to prove responsible for your choices.\n*page_break\nYou made your way to the balcony of the penthouse, looking at the plants that had been uprooted and knocked down by the wind from helicopter blades, or just people stomping on them as they rushed into position to assault the building. The glass wall leading inside was completely smashed, with the ground all around it covered in a thick layer of shards. The television was still on inside, the screen dark with a small blue box complaining about a missing signal. The shells left from both bullets and spent flashbangs littered the floor, the couch had been overturned, and the coffee table was smashed to pieces.\n\n*if (ultravision)\n\tYou opened your range of vision to ultraviolet and saw that the floor, ceiling, and walls were covered in bright splatter that normal human eyes couldn't see. It was remnants of the blood, sweat, and spit that had been launched out of the many bodies involved in the fight. Someone had tried to clean it up, and had done a good job at it. Some of the traces were smeared in a fashion that made you think they'd been dragged, and those marks tended to reach towards the balcony. Someone had been dragging out the dead and wounded.\n\t*goto inspection\n*else\n\tThe place was too clean for having been a chaotic fighting ring just a week prior. Remnants of the fight remained, but there were no chalk outlines for bodies recovered from the scene, no blood splatter, and no remnants of ripped clothing or equipment. Aside from the objects littering the floor and some smashed furniture, there were missing pieces that should indicate that several groups of people had smashed in with flashbangs and guns, and that a fight had happened.\n\t*goto inspection\n\n*label inspection\n*page_break\n*set purgereap true\nYou shuffled past the shells on the ground, meandering through the crime scene to see if you could find anything that the authorities might have missed. With a quiet sigh, you knelt down to touch a small spot on the floor where the wooden surface had been slashed by a set of Crimson Caracal's blades. Inside the cut, you could still see a bit of blood soaked into the wood grain. You stood back up, looking around for something more.\n\nLooking to the balcony, you saw a figure standing in the empty pool. You weren't alone anymore, and this wasn't Aurora or Nightreaver. Although the view was limited because of the edge of the pool, you could see a mask that you'd seen before. It shimmered in the light of the moon and surrounding buildings, deflecting light to morph the face that was hiding behind it into an unidentifiable mess. The chin was further covered by a voice modulator. As you stepped closer, you saw the pure white clothing shining in the same light, acting as a beacon in the middle of this darkened balcony.\n\n*if (purgefight = \"dead\")\n\t\"I thought I killed \n\t*if (rennowreveal)\n\t\tyou, Rennow. Although I guess that wasn't the first time you've been killed.\" \n\t\t*goto encounter\n\t*else\n\t\tyou.\" \n\t\t*goto encounter\n*elseif (havepurgemask)\n\t\"I thought I took your \n\t*if (rennowreveal)\n\t\tmask, Rennow.\" \n\t\t*goto encounter\n\t*else\n\t\tmask.\" \n\t\t*goto encounter\n*else\n\t\"I thought you would've given up.\" \n\t*goto encounter\n\n\n*label encounter\n\nYou took a couple of steps further, the broken glass crunching underfoot. As you watched the figure in white staring you down, you saw a flash of bright orange light in the distant horizon. The flash grew in an instant into a large glowing orb of fire, swallowing a large area in the distance before finally parting from the ground and rising up. A trail followed the ball as it rose, forming a stem for the mushroom cloud. You watched the cloud reach for the sky, and the windows around you began rattling as the massive boom from the explosion reached you. Instinct took over, and you threw yourself back inside.\n\nAs you landed and slid over the shards of glass, the balcony was swallowed by a tide of dust rushing along the streets below. It was the perfect frame, as you saw the white figure in the pool blink away and the dust in the air reaching out into the void they left behind. The trail went straight off the railing, then turned towards the source of the explosion.\n*page_break\nThe noise of the city dulled into a frail silence as the entire population shared a skipped heartbeat.\n\nThe moaning of sirens began wailing throughout the city, gaining a hollow urgency in the shifting echoes. You moved out onto the balcony, making your way to the edge and glancing down. People were slowly pouring out of buildings in confused masses, traffic moving to avoid emergency vehicles weaving past at great speed. You were illuminated for a brief moment as the spotlight from a helicopter swept over the city, the chopping rotors pulling it towards the fire.\n\nThe entire night was converging upon the explosion, and you rushed from the roof to see what was happening.\n*page_break\nThe heat from the blaze could be felt several city blocks before reaching the scene. You followed the sirens to a scene of utter devastation in the middle of the transition from small apartment buildings to suburbs. There was a large crater dug into the ground surrounded by rubble, uprooted trees, and wrecked cars.\n\nIn the heart of the crater was a hole surrounded by thick walls of broken reinforced concrete. This, the deepest part of the crater, had dug down at least two full stories below the surface. Rough steel bars jutted out where the concrete had been blown off, giving you a line of sight inside this underground construction. Whatever had been on top was now littered around the edges of the massive crater.\n\nSpouts of water and foam rushed out of the thick hoses connected to the fire trucks that had arrived on the scene. The red-and-blue flashing of emergency vehicles lit up the underground ruin as the fire began to dwindle, and a plume of steam continued high into the skies. You watched the trail of steam as it rose higher and higher.\n*page_break\nAs the blaze gave way and revealed the true visage of the destruction at the very centre of the crater, your attention was drawn to the sight of lights on the far side. A set of three headlights slowed to a crawl and then stopped on the opposite side of the mayhem, hiding behind their bright flare; then the doors opened and shadows stepped out. A sense of dread slowly crawled down your back, sending chills throughout your body. Something was wrong here, and you had the urge to investigate further.\n\nThe question was, would you find answers inside whatever this blast had uncovered, or on the opposite side with the newly arrived vehicles?\n\n*choice\n\t#Approach the vehicles.\n\t\t*goto vehics\n\t#Descend into the structure.\n\t\t*goto holeinthewall\n\n\n*label vehics\nYou skirted the perimeter which was being established around the site of the explosion. As you went past street after street, you saw ambulances and police cars lined up, blocking the way further in, and people in uniforms leading civilians either to the ambulances or away from the scene. You could hear the confusion and shock in the crowd, trying to find something to grasp at in order to make sense of the situation. And someone finally did manage to hook onto something: you.\n\n*if (nation = \"American\")\n\t\"Hey, freak! Get out of here! Haven't your kind done enough harm?\"\n\t*goto vehicont\n*else\n\t\"Hey, freak! Get out of here and go back to whatever hole you crawled out from! You don't belong here! haven't your kind done enough harm? We don't need more from your type!\"\n\t*goto vehicont\n\n*label vehicont\n\nThe shouting man paused, then looked at you with fury in his eyes. Small groups of civilians were being drawn toward his voice as he berated you.\n\n*if (kills)\n\t\"Yeah, I'm talking to you. Haven't you been doing enough, killing poor Americans on your little crusade? Who the hell gave you the right to come and mess things up for the rest of us?\" \n\t*goto killberate\n*else\n\t\"How many poor Americans have you put into the hospital, huh? Who the hell gave you the right to stomp over us on your little crusade?\" \n\t*goto killberate\n\n*label killberate\nThe shouting continued. A few weaker voices joined him, then increased in strength as the people took their frustration and fear out on you. Behind you, these people saw a crater that had shattered their homes, and your presence was riling them up. Some of the police standing around were shooting you glances as well, giving you all the necessary clues that you should keep moving.\n*set fame +15\n*page_break\nWithout slowing down any more than you had to, you made your way over to the other side of the crater. You could hear the cars humming even from a distance, and as you approached the driver doors of each car opened. Out climbed men in loose-fitting suits, their suit jackets failing to hide shoulder holsters. Behind the cars, there was a concrete box with a bulky steel door on it. It was much like an air-raid shelter or bunker entrance, but smaller.\n\n\"Turn around and go back,\" the man in the suit said, looking directly at you with a blank face to try and intimidate you. Behind the cars, you could see a dip in the ground leading into some kind of concrete-and-steel doorway.\n\n\"There's nothing for you here. Time to go, buddy,\" the second man said after closing the door of his car. He began moving towards you, one of his hands staying close to his waistline.\n\nBoth of them looked trained, but nothing in them indicated government agent. In fact, the SUVs they had arrived in had shiny black surfaces with traces of a logo of some kind having been removed very recently. The black around where the logo had been was very slightly faded, while the black that had been hidden was still fresh and shiny. You could make out a few letters and casually tried to shift over to see more. In bits and pieces, you guessed one letter after another: BlackWatch.\n*choice\n\t#Question the men.\n\t\t\"What's going on here?\" you asked, halting to regard both of the men.\n\t\t\n\t\t\"Nothing to be concerned about. You can move right along,\" the man in front of you said, his eyes still locked on your frame and his hand sliding down towards his waistline. As he shifted, you saw a small earpiece in his ear, a curled wire running behind his neck and into the folds of his dark suit.\n\t\t\n\t\t\"Not before I know what's going on here. Who are you?\" you asked, watching as the men moved the lapels of their suits out of the way and placed their hands on what looked like pistol grips. You couldn't see it from the angle if they were stun guns or firearms, but if you had to bet, you'd bet on the latter. The two men shared quick glances before returning their attention to you.\n\t\t\n\t\t\"Please, back away and move along. This is your final warning.\"\n\t\t\n\t\t*choice\n\t\t\t#Continue questioning them.\n\t\t\t\t\"What's past that door? Doesn't look like an air-raid shelter to me,\" you said, standing firm in your place.\n\t\t\t\t\n\t\t\t\tYou heard two metallic pops as the two men freed their pistols from their holsters, then the rattle as they drew their weapons and pointed them at you. You heard the click of the safeties being switched off, their fingers hovering over the trigger guard.\n\t\t\t\t\n\t\t\t\tIt appeared your warning time was up.\n\t\t\t\t\n\t\t\t\t*if (durability)\n\t\t\t\t\tFor you, the solution was quite simple. You walked up towards both men quite confidently. Their shots were loud booms, intertwining into a strange rhythm as both men unloaded their magazines into you. Instead of stopping, you walked up to the first man, took his pistol in a quick flurry of motion, and whipped him across the face with it, hard enough to knock him unconscious. The clatter coming from the direction of the second man indicated that he was reloading.\n\t\t\t\t\t\n\t\t\t\t\tAs you looked his way, three shots immediately rang out in deafening cracks. You felt the bullets hit you, two in the torso and one in the head. Once again, you rushed against the tide of more bullets as the panicking man emptied his entire magazine into you. Moments later, his weapon clattered against the ground, his unconscious body following suit. With no more answers to be gained from these men, you walked past them to the heavy-looking steel doors.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto getinside\n\t\t\t\t*elseif (agility)\n\t\t\t\t\tYou bounced off the spot you'd been standing in, deftly cartwheeling around and gaining swift momentum to lunge at the suited man in front of you. A gunshot rang out, and you heard the crack of the bullet hitting the ground next to you as you rotated back around and reached out for the other handgun pointed at you. Before another shot could be fired, you pulled on the pistol, rolled yourself behind the suited man, and disarmed him with swift blows to several nerve clusters in his arm and shoulder.\n\t\t\t\t\t\n\t\t\t\t\tWith your arms around the man, you propped him up while his pistol fell to the ground. The second man stepped back to gain distance and reaction time, and for a moment, it seemed like you were at an impasse. \n\t\t\t\t\t*if (gadget)\n\t\t\t\t\t\tOne arm gripping your new human shield, you went for your equipment.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYour eyes remained glued to your opponent as you fumbled by feel alone to get ahold of what you needed. Needles or small boomerangs might have been nice in this situation, but instead you first felt your fingers grip the small flashbang pellets. With a swift motion, you ducked behind the suited man and unleashed two pellets past him. The small orbs of hard plastic hit the ground, the glass inside shattered, and the chemicals exploded with a thunderous clap and a flash of bright light. In the confusion, you darted past your human shield, grabbing his neck and hopping up with the intention of landing on the ground on your back, with the man hitting his head hard enough to cause unconsciousness. You heard a crunch as his forehead hit the ground, then rolled up and pounced upon the blinded and confused gunman. A few punches later, you had him disarmed, then forced into a chokehold. A faint gurgling was the only noise he made as he struggled, before going limp in your arms. With a satisfied look at the two unconscious burly men, you walked past the cars to the bulky steel door of the entrance.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto getinside\n\t\t\t\t\t*else\n\t\t\t\t\t\t*if (durability)\n\t\t\t\t\t\t\tWith your arms gripping your new human shield, your mind raced through the options. These men were far from talkative, and as soon as you got out from behind your fleshy cover, there would be bullets coming at you. With a smirk, you took firm hold of the man directly in front of you, pulled his head into your armpit and brought him quite harshly against your knee. With a crack, his eyes blurred from impending unconsciousness; then he went limp, rolling off your knee and into the cold dirt.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tAs you looked up, three shots immediately rang out in deafening cracks. You felt the bullets hit you, two in the torso and one in the head. Confidently, you rose back off the ground and lunged at the second man, rushing against the tide of more bullets as he panicked and emptied his entire magazine into you.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tMoments later, his weapon clattered against the ground, with his unconscious body following suit. With no more answers to be gained from these men, you walked past them and to the heavy-looking steel doors.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto getinside\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tWith your arms gripping your new human shield, your mind raced through the options. These men were far from talkative, and you would have to act fast so as to avoid having yourself pumped full of bullets. You trusted your agility to provide a mobile and hard-to-hit target, but at this distance it didn't matter much. A distraction of some kind would be necessary.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou glanced down at the ground, making sure to stay behind your fleshy cover as you did so. The dropped pistol was in your reach, but you wouldn't be able to make a move fast enough to pick it up without either having the man in front of you try to pounce you or jump away and leave you defenceless. Instead, with a smirk, you pushed the unsuspecting man directly at his compatriot, dropping low and bringing your foot to follow in his wake.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou felt the weapon against your foot. With a swift motion, you twirled it into the air and watched as the two men collided, the man who had been your shield rolling off the other to give you a clear shot. You jumped at the chance, kicking the airborne pistol and sending it off to make an acquaintance with the gunman's face. The still-reeling man was bringing his weapon up, distracted enough to miss his chance to avoid getting hit, instead getting the chunk of metal directly across the bridge of his nose at a fairly nice velocity.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou rushed after the pistol, running past the man with the now-broken nose and grabbing his face as you rushed by, then leapt into the air and landed on your back. With a loud crack, the man was pulled down with you, the back of his head hitting the cold ground, causing him to go limp. You twirled around and tripped the guard who had served as your meat shield, disabling him as well. With both targets down, you walked past them to the heavy-looking steel doors.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto getinside\n\t\t\t\t*elseif (energypower)\n\t\t\t\t\t*if (kills)\n\t\t\t\t\t\tThe manipulation of weapons was too easy. The gunpowder simply needed to reach a high enough temperature. As their fingers reached the triggers and the men got ready to fire at you, the magazines exploded in a shower of shrapnel and bullets. The ground in front of you puffed as an errant bullet landed there, but otherwise you were out of range for any damage to be done. The men in suits were not so fortunate.\n\t\t\t\t\t\t\n\t\t\t\t\t\tBlood spilled out from open wounds in their arms and faces, their hands were mangled, and pieces of skin hung off the bone. Both men fell to their knees in shock, their lips now sealed from any answers they might have given you. You walked past them without further protest, and their cries vanished as the bulky metal door slammed shut behind you.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto getinside\n\t\t\t\t\t*else\n\t\t\t\t\t\tTheir guns clattered to the ground. Manipulating the temperature of the metal they were holding onto was much too easy. With the men distracted by the sudden pain, you walked over and, with a few swift moves, brought both of them to the ground. After making sure they were unconscious, you walked past the cars and into the bulky steel door of the entrance.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto getinside\n\t\t\t\t*else\n\t\t\t\t\t*if (gadget)\n\t\t\t\t\t\tYour eyes remained glued to your opponents as you brought your hands to your suit and fumbled by feel alone to get ahold of what you needed. Needles or small boomerangs might have been nice in this situation, but instead you first felt your fingers grip the small flashbang pellets. With a swift motion, you unleashed two pellets on the ground between yourself and them. The small orbs of hard plastic hit the ground, the glass inside shattered, and the chemicals exploded with a thunderous clap and a flash of bright light.\n\t\t\t\t\t\t\n\t\t\t\t\t\tIn the confusion, you darted straight forwards, past the nearest gunman, grabbing his neck and hopping up with the intention of landing on your back, with the man hitting his head hard enough to cause unconsciousness. You heard a crunch as the man's forehead hit the ground, then rolled up and pounced upon the second blinded and confused man. A few punches later, you had him disarmed, then forced into a chokehold. A faint gurgling was the only noise he made as struggled, before going limp in your arms. With a satisfied look at the two unconscious burly men, you walked past the cars to the bulky steel door of the entrance.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto getinside\n\t\t\t\t\t*else\n\t\t\t\t\t\tIt seemed like your options were limited. You could probably take one of them before you got shot at, but looking at the men with guns, you could guess that they were both pretty experienced. If you did go for it, you would either be out of the heroics business for a long time, or your family would be arranging a funeral by this time next week. And that was if these people were the type to inform the authorities and not the type to weigh you down and drop you off a boat.\n\t\t\t\t\t\t\n\t\t\t\t\t\tWith a deep breath, you made your choice.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Go for it.\n\t\t\t\t\t\t\t\tYou shifted in place very quickly and pounced forward. You closed the distance in a hurry, blood pumping through your body as the adrenaline kicked in. Your hearing was muffled with a rush of blood, and your vision blurred as it focused upon your target. Nonetheless, the bright flashes momentarily blinded you, you could hear the clap of thunder punch against your eardrums, and you could feel your clothing becoming moist.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou launched off the run and leapt through the air, ending up pouncing on the gunman closest to you and bringing your fists down upon him in rapidly repeated punches. His nose shifted against one of the blows and blood began seeping out, then his eyes closed and you felt his body fall limp beneath you, though his chest still heaved. Satisfied, you were about to turn to the second gunman when some blood dripped onto your target's face. It was as if it had snapped your attention away from the gunmen and back to yourself, as you suddenly realized that the blood was yours.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tWith a gasp, you looked down and saw the places your outfit had been pierced, the broken edges of the fabric painted with crimson. From the corner of your vision, you saw a foot enter the scene. Your eyes shot up at the second gunman just as he brought the butt of his pistol down on your head. There was a flash of light that then slowly drifted into an endless darkness. The blow knocked you unconcious.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto torture\n\t\t\t\t\t\t\t#Back away.\n\t\t\t\t\t\t\t\t*set gundraw true\n\t\t\t\t\t\t\t\t\"Alright, alright. I get the hint. I'm backing off,\" you stated, raising your arms in a sign of concession and taking a few steps backwards the way you came. You then turned around and returned to the other side of the massive crater, only to find the situation was much the same as when you'd last been there. You glanced into the pit, then wandered down the sloping earth towards the revealed structure.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto holeinthewall\n\t\t\t#Disarm them.\n\t\t\t\t*if (durability)\n\t\t\t\t\tFor you, the solution was quite simple. You walked up to both men quite confidently. Their shots were loud booms, intertwining into a strange rhythm as both men unloaded their magazines into you. Instead of stopping, you walked over to the first man, took his pistol in a quick flurry of motion, and whipped him across the face with it, hard enough to knock him unconscious. The clatter coming from the direction of the second man indicated that he was reloading.\n\t\t\t\t\t\n\t\t\t\t\tAs you looked up his way, three shots immediately rang out in deafening cracks. You felt the bullets hit you, two in the torso and one in the head. Once again, you rushed against the tide of more bullets as the panicking man emptied his entire magazine into you. Moments later, his weapon clattered against the ground as well, his unconscious body following suit. With no more answers to be gained from these men, you walked past them to the heavy-looking steel doors.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto getinside\n\t\t\t\t*elseif (energypower)\n\t\t\t\t\t*if (kills)\n\t\t\t\t\t\tThe manipulation of weapons was too easy. The gunpowder simply needed to reach a high enough temperature. As their fingers reached the triggers and the men got ready to fire at you, the magazines exploded in a shower of shrapnel and bullets. The ground in front of you puffed as an errant bullet landed there, but otherwise you were out of range for any damage to be done. The men in suits were not so fortunate.\n\t\t\t\t\t\t\n\t\t\t\t\t\tBlood spilled out from open wounds in their arms and faces, their hands were mangled, and pieces of skin hung off the bone. Both men fell to their knees in shock, their lips now sealed from any answers they might have given you. You walked past them without further protest, and their cries vanished as the bulky metal door slammed shut behind you.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto getinside\n\t\t\t\t\t*else\n\t\t\t\t\t\tThe guns clattered to the ground. Manipulating the temperature of the metal they were holding onto was much too easy. With the men distracted by the sudden pain, you walked up and, with a few swift moves, brought both of them to the ground. After making sure they were unconscious, you walked past the cars to the bulky steel door of the entrance.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto getinside\n\t\t\t\t*elseif (agility)\n\t\t\t\t\tYou bounced off from the spot you'd been standing in, deftly cartwheeling around and gaining swift momentum to lunge at the suited man in front of you. A gunshot rang out, and you heard the crack of the bullet hitting the ground next to you as you rotated back around and reached for the other handgun pointed at you. Before another shot could be fired, you pulled on the pistol, rolled yourself behind the suited man, and disarmed him with swift blows to several nerve clusters in his arm and shoulder.\n\t\t\t\t\t\n\t\t\t\t\tWith your arms around the man, you propped him up while his pistol fell to the ground. The second man stepped back to gain distance and reaction time, and for a moment, it seemed like you were at an impasse. \n\t\t\t\t\t*if (gadget)\n\t\t\t\t\t\tOne arm gripping onto your new human shield, you went for your equipment.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYour eyes remained glued to your opponent as you fumbled by feel alone to get ahold of what you needed. Needles or small boomerangs might have been nice in this situation, but instead you first felt your fingers grip the small flashbang pellets. With a swift motion, you ducked behind the suited man and unleashed two pellets past him. The small orbs of hard plastic hit the ground, the glass inside shattered, and the chemicals exploded with a thunderous clap and a flash of bright light. In the confusion, you darted past your human shield, grabbing his neck and hopping up with the intention of landing on your back, with the man hitting his head hard enough to cause unconsciousness. You heard a crunch as his forehead hit the ground, then rolled up and pounced upon the blinded and confused gunman. A few punches later, you had him disarmed, then forced into a chokehold. A faint gurgling was the only noise he made as he struggled, before going limp in your arms. With a satisfied look at the two unconscious burly men, you walked past the cars to the bulky steel door of the entrance.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto getinside\n\t\t\t\t\t*else\n\t\t\t\t\t\t*if (durability)\n\t\t\t\t\t\t\tWith your arms gripping onto your new human shield, your mind raced through the options. These men were far from talkative, and as soon as you got out from behind your fleshy cover, there would be bullets coming at you. With a smirk, you took firm hold of the man directly in front of you, pulled his head into your armpit and brought him quite harshly against your knee. With a crack, his eyes blurred from impending unconsciousness, then he went limp, rolling off your knee and into the cold dirt.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tAs you looked up, three shots immediately rang out in deafening cracks. You felt the bullets hit you, two in the torso and one in the head. Confidently, you rose back off the ground and lunged at the second man, rushing against the tide of more bullets as the panicking man emptied his entire magazine into you.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tMoments later, his weapon clattered against the ground, with his unconscious body following suit. With no more answers to be gained from these men, you walked past them to the heavy-looking steel doors.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto getinside\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tWith your arms gripping onto your new human shield, your mind raced through the options. These men were far from talkative, and you would have to act fast so as to avoid having yourself pumped full of bullets. You trusted your agility to provide a mobile and hard-to-hit target, but at this distance, it didn't matter much. A distraction of some kind would be necessary.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou glanced down at the ground, making sure to stay behind your fleshy cover as you did so. The dropped pistol was in your reach, but you wouldn't be able to make a move fast enough to pick it up without either having the man in front of you try to pounce on you or to jump away and leave you defenceless. Instead, with a smirk, you pushed the unsuspecting man directly at his compatriot, dropping low and bringing your foot to follow in his wake.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou felt the weapon against your foot. With a swift motion, you twirled it into the air and watched as the two men collided, the man who had been your shield rolling off of the other to give you a clear shot. You jumped at the chance, kicking the airborne pistol and sending it off to make an acquaintance with the gunman's face. T od pumping through your body as the adrenaline kicked in. Your hearing was muffled by the rush of blood, and your vision blurred as it focused upon your target. Nonetheless, the bright flashes blinded you momentarily, you could hear the clap of thunder punch against your eardrums, and you could feel your clothing becoming moist.\n\t\t\t\t\t\t\n\t\t\t\tYou launched off the run and leapt through the air, ending up pouncing on the gunman closest to you and bringing your fists down upon him in rapid repeated punches. His nose shifted against one of the blows, and blood began seeping out; then his eyes closed, and you felt his body fall limp beneath you, though his chest still heaved. Satisfied, you were about to turn to the second gunman when some blood dripped onto your target's face. It was as if it had snapped your attention away from the gunmen and back to yourself, as you suddenly realized that the blood was yours.\n\t\t\t\t\t\t\n\t\t\t\tWith a gasp, you looked down and saw the places where your outfit had been pierced, the broken edges of the fabric painted with crimson. From the corner of your vision, you saw a foot enter the scene. Your eyes shot up at the second gunman just as he brought the butt of his pistol down on your head. There was a flash of light that then slowly drifted into an endless darkness. The blow knocked you unconcious.\n\t\t\t\t*page_break\n\t\t\t\t*goto torture\n\t#Leave, and try to see if I can still slip inside the revealed structure.\n\t\t\"Alright, alright. I get the hint. I'm backing off,\" you stated, raising your arms in a sign of concession and taking a few steps backward the way you came. Then, you turned around and returned to the other side of the massive crater, only to find the situation was much the same as when you had last been there. You glanced into the pit, then wandered down the sloping earth towards the revealed structure.\n\t\t\n\t\t*goto holeinthewall\n\n\n\n*label getinside\nThe room behind the large steel doors was dark, unwelcoming, and small. It was nothing but a concrete box with a tiny crevasse opposite the entrance. From there, a steep set of concrete stairs led down at an angle that looked like a sheer drop as one walked to the precipice, with smooth handrails attached to the walls on either side. The cramped downward-leading corridor was only made tighter by the rails.\n\nAt the bottom of the stairs was a doorway, shaped and angled in such a way that it was impossible to see into the room beyond from the stairs before one got low enough to actually pass through the thing. It appeared as if no door fit in the hole, however, as there were no visible hinges or even a place for hinges on the frame.\n\nWithout any other way down, you slipped into the crevasse and made your way carefully, hearing the rustling of your shoes against the steps but not much else. Whoever had entered here before you was either extremely quiet or was far enough into the building that you couldn't hear them. \n*if (senses)\n\tFor one with such keen senses as yourself, it was borderline astounding that they would be able to do so in such a short time.\n*page_break\nYou emerged into another concrete chamber once you got past the open doorway. The walls were barren and lifeless concrete, continuing left to a white-painted wall with a closed door. A flimsy-looking desk and a toppled chair sat right next to the door, with a small flat screen dangling off the side by its cable. Above the doorway, there was a small dome with a flashing red light inside it.\n\nAs you slowly walked closer, the door began opening with a loud screech and a groan that shook the wall around it. Suddenly, you could hear voices from the other side, but not ones that were close to the door itself.\n\n\"Dammit, man. Can you close the door properly next time? That noise was really loud!\" a gruff voice screamed from the other side, followed immediately by another equally gruff voice that carried a clear northern English accent.\n\n\"It's not my damn fault that the whole frame is off-kilter. It's not gonna latch, so deal with the noise.\"\n\n\"If it's going to keep making that noise, open it all the way so it doesn't! For the love of Christ!\"\n\n\"You're not my bloody boss, alright? Open it yourself.\"\n\nSomething smashed on the other side of the door, and the yelling became indistinct grunts that carried the insults in them perfectly without actually spelling them out. Footsteps rushed to the door, and it was flung open with a quick yank. You found yourself staring directly at a man in a suit, who looked back at you and blinked. Time seemed to slow as you watched his face begin twisting into a shout and his arm begin reaching for something at his belt.\n\n*label takesthem\n*disable_reuse\n*choice\n\t#Take them out quickly.\n\t\tThe man went for his gun. You saw the shape of a holster emerging from beneath the hem of his suit jacket as you launched into action. In a single bound, you closed the distance.\n\t\t\n\t\t*if (kills)\n\t\t\tYour hand grabbed onto the man's arm and tugged it, making him lose the hold he had on the pistol. In a quick jolt of your own arm, you pulled his entire arm out of its socket, while your other hand slipped down to the man's holster and ripped the pistol out. In a fluid motion, your hands worked to cock the pistol, place the barrel beneath the man's jaw, then press the trigger.\n\t\t\t\n\t\t\tWhile the fountain of blood and bits was still spreading through the air, you shouldered past the man and raised the pistol again, emptying the rest of the clip into the second man. It was the first time you'd seen the owner of the British voice; he was a bulky-looking bald man, a tattoo creeping up his neck from beneath the collar of his dress shirt. His jacket was splayed open, and his hands were busy raising his own pistol towards you.\n\t\t\t\n\t\t\tHis eyes went wide when your shots connected, and he slumped down with a whimper as you walked past, tossing the now-empty pistol beside him and continuing your way further inside.\n\t\t\t*page_break\n\t\t\t*goto godeeper\n\t\t*else\n\t\t\tYour hand grabbed onto the man's arm and tugged it, making him lose the hold he had on the pistol. In a quick jolt of your own arm, you pulled his entire arm out of its socket, while your other hand slipped down to the man's holster and ripped the pistol out. In a fluid motion, you smashed your shoulder into the guard's jaw and drove him to the ground, rolling over his unconscious body and flinging the pistol at the second man.\n\t\t\t\n\t\t\tIt was the first time you'd seen the owner of the British voice; he was a bulky-looking bald man, a tattoo creeping up his neck from beneath the collar of his dress shirt. His jacket was splayed open, and his hands were busy raising his own pistol towards you.\n\t\t\t\n\t\t\tWith a loud clack, your pistol collided with the bald head, driving a deep gash into the scalp. Both his hands shot up to hold the spot, and you pounced forwards, grabbing his legs and pulling him off-balance. His head got smashed again, this time against the concrete floor. Finally, his eyes rolled back and he fell unconscious, giving you time to rush over to the first man and choke him unconscious, as well.\n\t\t\t\n\t\t\tWith the deed done, you continued further inside.\n\t\t\t*page_break\n\t\t\t*goto godeeper\n\t#Disarm him and take him as a human shield.\n\t\tThe man went for his gun. You saw the shape of a holster emerging from beneath the hem of his suit jacket as you launched into action. In a single bound, you closed the distance. Your hand grabbed onto the man's arm and tugged it, making him lose the hold he had on the pistol. In a quick jolt of your own arm, you pulled his entire arm out of its socket, while your other hand slipped down to the man's holster and ripped the pistol out. With a loud clatter, you tossed the pistol away, wrapped one of your arms around the gunman, and turned him around to face his British friend while you peeked around him.\n\t\t\n\t\t\"Drop the weapon,\" you ordered, your eyes on the bulky bald man who was raising his own pistol towards you. You noted a tattoo of some kind peeking just above the edge of his dress suit.\n\t\t\n\t\t\"Bollocks to that, mate. I never liked him anyway,\" the man answered, his trigger finger pressing down firmly. A bright flash of fire came out of the barrel of his gun, and a shock of warmth suddenly spread across your abdomen. Your human shield slumped in your arms, and the sudden dead weight wrenched him out of your hold. The loud gunshots rang out again and again as the guard emptied his entire clip into you.\n\t\t\n\t\t*if (durability)\n\t\t\tYou looked down as the bullets pierced your outfit, breaking and shredding the fabric while your own skin remained fresh and unharmed below it. With a smirk, you stepped past your human shield and rushed the second gunman while he fumbled to reload his weapon. The big man didn't go down with any dignity. You wrapped yourself around his legs and knocked him down harshly. There was a loud crack as his head hit the concrete floor, and his eyes rolled back as he fell unconscious.\n\t\t\t\n\t\t\tWith a sigh, you stepped back up and dusted yourself off before walking back to check on the first gunman. The Briton had shot him twice through the heart. There was nothing to save. With a shake of your head, you continued your journey further into the structure.\n\t\t\t*page_break\n\t\t\t*goto godeeper\n\t\t*else\n\t\t\tThere were hot flashes through your body as you felt something shift inside. You looked down and saw the broken fabric of your outfit and the blood pouring out of you. With a grunt, you looked back up at the smirking Briton and took a single step before your legs gave way beneath you. The large bald man walked up to you and, with a mighty kick, forced you unconscious.\n\t\t\t*page_break\n\t\t\t*goto torture\n\t#Use my powers to take them both down.\n\t\tThe man went for his gun. You saw the shape of a holster emerging from beneath the hem of his suit jacket as you launched into action. In a single bound, you closed the distance.\n\t\t\n\t\t*gosub poweruseduo\n\t\t\n\t\tWith that done, you smiled and stood up, continuing further into the structure.\n\t\t*page_break\n\t\t*goto godeeper\n\n\n*label poweruseduo\n*if (flight)\n\t*if (endurance)\n\t\t*set energy -2\n\t*if not (endurance)\n\t\t*set energy -4\n\tA few steps away from the man, your feet left the ground and you pushed yourself forwards as you took flight. With extended hands, you smashed directly into the gunman, taking a firm grip on him as you swooped into the room behind him and lifted him into the concrete ceiling. A puff of dust fell down as the man smashed into it, and more scraped off as you swung around and used his weight to your benefit in launching him at the second gunman.\n\t\n\tWith a clatter, the British man dropped his gun on the floor from the force of his fellow. With a smirk, you landed on top of the unconscious first guard and saw some kind of a tattoo peeking out from under the Briton's dress shirt as he struggled to try and get you off him. Instead of allowing him to do that, you brought your fist down repeatedly, punching the man unconscious.\n\t*return\n*elseif (teleport)\n\t*if (endurance)\n\t\t*set energy -4\n\t*if not (endurance)\n\t\t*set energy -8\n\tWhile still in motion, you looked past the guard and focused your powers. The familiar mist overcame your eyes and almost instantly dissipated again, revealing your new position just past him. His shout of confusion was swiftly silenced by your blow, which was quickly followed by a throw that brought him crashing hard against the concrete floor. You heard the click of a pistol from ahead of you and saw a burly bald man standing there aiming at you. You smiled as you saw his finger squeeze the trigger, the mist overcoming you once again.\n\t\n\tYou appeared behind the second gunman, who was no doubt the one with the British voice. As you connected a blow against the small of his back, you saw a tattoo peeking out from beneath the collar of his dress shirt, but then you teleported again. The strikes continued as you overwhelmed the large opponent and finally brought him down with a quick kick. His eyes rolled back as he toppled, his head crunching against the hard floor.\n\t*return\n*elseif (strength)\n\t*if (endurance)\n\t\t*set energy -2\n\t*if not (endurance)\n\t\t*set energy -4\n\tAs you reached the guard going for his gun, you placed one hand on his chest and gripped his dress suit. He looked at you in disbelief as his feet left the ground, your other hand grabbing one of his flailing legs and lifting him up over your head as you walked through the doorway.\n\t\n\tAs the guard struggled in your grip, held over your head, you saw the second man not that far off in the distance; probably the Briton you'd heard previously, and he was going for his gun as well. His eyes were wide and his motions jerky from his slight state of panic, and he seemed to be muttering something under his breath. With a quick motion, you sent the first guard directly into the second, toppling both of them onto the concrete floor.\n\t\n\tWith rapid steps, you made your way over and gave both of them quick strikes to knock them out completely. In the fury of the moment, you also noticed that the Briton had some kind of tattoo on his neck, although you could only see a little bit of it peeking out from beneath the dress shirt.\n\t*return\n*elseif (energypower)\n\t*if (endurance)\n\t\t*set energy -2\n\t*if not (endurance)\n\t\t*set energy -4\n\tYou shook your head at the effort the two men were exerting over trying to fight you. Before the first guard could pull out his pistol, and before his British companion could even react to your presence, both of the magazines slotted inside their pistols heated up, and the gunpowder exploded. As the flash went away and the smoke cleared, you began hearing screams over the whine in your ears.\n\t\n\tBoth men were on the ground, large chunks blown off their legs, blood splattered all over the place.\n\t*if (kills)\n\t\tWith a sigh, you stepped over the first guard, gave the bald Briton a quick look, and kept walking. For a brief moment, you noticed something peeking out from beneath the collar of his dress shirt, perhaps a tattoo, but you disregarded it and moved on, leaving the men writhing on the concrete floor.\n\t\t*return\n\t*else\n\t\tYou looked over at the second guard, the British one, and made sure he wasn't trying anything tricky before you leaned down, removed his belt, and wrapped it around his leg. You made a makeshift tourniquet around the deep gash, then tightened it enough to cause the man to fall unconscious from the shock. It was likely he would survive the wound.\n\t\t\n\t\tYou walked over to the Briton and did the same to him. The big man was much stronger-willed than his friend, as he stayed awake and cursed at you the whole way. You saw as he struggled that a tattoo was peeking out from beneath the collar of his dress shirt, but you never got a good look at it. Finally, you choked the Briton unconscious in order to make sure that he conserved his energy.\n\t\t*return\n*elseif (durability)\n\t*if (endurance)\n\t\t*set energy -2\n\t*if not (endurance)\n\t\t*set energy -4\n\tIn a single bound, you closed the distance. Your hand grabbed onto the man's arm and tugged it, making him lose the hold he had over the pistol. In a quick jolt of your own arm, you pulled his entire arm out of its socket, while your other hand slipped down to the man's holster and ripped the pistol out. \n\t*if (kills)\n\t\tWith a loud clatter, you tossed the pistol away, wrapped one of your arms around the gunman, and turned him around to face his British friend while you snapped his neck.\n\t*if not (kills)\n\t\tWith a loud clatter, you tossed the pistol away, wrapped one of your arms around the gunman, and turned him around to face his British friend while you choked him unconscious.\n\t*comment endif\n\t\n\tThe guard dropped like a sack of potatoes, and you stepped over him as the second man began shooting. You took a good, long look at the British man, at his bulky form and bald head, the tattoo peeking out from beneath the collar of his dress shirt, the empty leather holster at his belt, and the confused look on his face as you kept walking slowly towards him.\n\t\n\tYou looked down as the bullets pierced your outfit, breaking and shredding the fabric while your own skin remained fresh and unharmed below it. With a smirk, you stepped right in front of the second gunman while he fumbled to reload his weapon. The big man didn't go down with any dignity. There was a loud crack as his head hit the concrete floor, and his eyes rolled back as he fell unconscious.\n\t*return\n*else\n\tYou looked at the guard, thinking about your powers for a split second, and came to the conclusion that none of your powers would cut it by itself, so you would have to do this the hard way.\n\t*goto takesthem\n\n\n\n*label godeeper\nThe room with the guards was some kind of a security checkpoint. There was a large, disabled metal detector towards the back of the room and an X-ray machine for bags and such. Nearby on a table was a pile of security cards, and a box of lanyards was placed below the table. Dead monitors were spread out across all the tables in the small security booth, with nothing else of much importance visible.\n\nYou hopped over the small metal barrier next to the metal detector on your way to the doorway at the far left corner of the room. The door was open, and light spilled in from the other side. Attempting to peer through the doorway, you approached from the side and made sure not to get directly in a line of sight from anyone on the other end. You sneaked over to the wall by the doorway and then crouched, looking into the next room.\n\nIt was a corridor painted in a bright, clinical white. The lights were dim and kept shifting slightly, as if running on reserve power, and four doorways were placed in perfect symmetry along the length of the corridor. Metal signs were attached to the walls next to the door, and even in the low light and fair distance, you could read the text on them. Three of them were offices for people with names that meant nothing to you, with no titles mentioned. The one to the far left, the last door before the corridor took a sharp left turn and continued somewhere, indicated that it was some kind of a quarantine section.\n\nYou continued down the corridor carefully, checking the doors with quick nudges as you went. All of the offices were silent, with closed doors that didn't seem to have any way to open them. The doors had keycard slots with flickering red lights, but no handle.\n*page_break\nA noise from the end of the corridor brought your attention in that direction. You shifted past the quarantine door, noting that it was also equipped with the same kind of keycard slot and no other obvious way to open it. With a peek around the corner, you confirmed that the corridor led down in a gradual slope, heading in the general direction of the crater from what you could tell. The lights there were completely off, with small spotlights shifting along the walls. As you watched, two figures emerged from a door at the far end of the corridor. They flicked their flashlights on, then one of them touched their chest and mumbled into a radio. \n*if (senses)\n\tThe crackle of the radio was loud as it echoed down the corridor towards you. The words were mumbled, but you could still hear what was said.\n\t\n\t\"Sir, we've confirmed that the paper records from Project Dawn are gone. It's been precise, no rummaging around for them. Whoever took them knew exactly where to find them,\" the man said.\n\t\n\t\"Secure the breached room. If anyone tries coming in that way, stall them until we're clear,\" the radio crackled in response.\n*if not (senses)\n\tThe crackle of the radio echoed off the walls and was the only audible part of the conversation.\n*comment endif\n\nThe two men exchanged quick looks, then moved down a corridor leading to the right, directly opposite the door they'd come out of. You could hear their footsteps echo in the empty hallway and then disappear, and you approached. The door to the room the men had come out of opened into a large laboratory of some sort, with plenty of binders and papers everywhere and lab equipment liberally spread around.\n\nTurning to the right, you saw a corridor with one doorway on its left side. At the far end was a T-intersection showered in a red pulsing glow coming from the right. As you walked down the corridor, you could hear the chatter of the two men again, locating them behind the closed door on the left. You continued past.\n*page_break\nYour face was bathed in the blinking red light as you came around the corner and looked down the corridor. It was empty, ending with four thick doorframes jutting out at the far end. You were unable to see if the doors were closed or not, but you could see for certain that none of the doors had been blown into the hall. The other way out of the T-intersection of corridors led to a barrier of heavy rubble that had piled up on top of a ruined staircase. You were unable to see the bottom of the staircase through the small spaces, and it sounded like there was nobody down there. At least, nobody well enough to be calling out.\n\nYou continued down the corridor, seeing the flashing red light on the ceiling emerge from behind a concrete beam. The doorframes blocking your sight shifted and revealed the doors hiding behind them. The far doors remained undamaged and standing firm in their places, but the two closest ones were open, one of them forced by large hydraulic clamps.\n\nAs you snuck closer to the doors, you suddenly came face to face with a mammoth of a man coming out of the doorway to your left. He looked surprised as he found you standing in the corridor. He flashed a smile and quirked his head.\n\n\"A hero? Now how did you get here…\" he muttered before standing up straight in a pose and announcing, \"Stand down, hero.\"\n\nAs if that were some kind of a signal, two men emerged from each of the open doors. They pulled out their pistols and immediately brandished them in your direction, taking partial cover by the doorframes. The pulsing light above bathed all of you in red light, making the entire scene a step above surreal. \n*if (work = \"governor\")\n\tNow that you were standing there directly opposite this hulk of a man, you noticed you'd seen him before, although at the time you hadn't caught his name. On the fateful day when Lieutenant-Governor Rennow lost his son, he'd come to see the Governor with this man.\n*comment endif\n\n\"Please,\" the man uttered, his face stretching into a narrow smile.\n\n*fake_choice\n\t#Stand down and talk it out.\n\t\t*set benign +5\n\t\t*goto talkthingsout\n\t#Try to escape.\n\t\t*goto escapade\n\t#Attack.\n\t\t*set benign -5\n\t\t*goto smellthedefeat\n\n*label holeinthewall\n*achieve dungeoncrawl\nYou heard some shouting from behind you as you descended into the pit. The firefighters averted their hoses as you rushed in, focusing on other locations instead. As you got closer, you could see the damage much more clearly. The structure that had been revealed had thick reinforced concrete walls, but an entire corner of one room had been blown off in the explosion. A webbing of steel blocked some of the hole, but not enough that you couldn't get through just by crawling past.\n\nYou slipped inside what was probably at some point a clinically white room. The walls, floor, and ceiling were now covered with evidence of an explosion of some kind. All the tables and whatever equipment had been in the room were broken into small pieces and strewn across the floor. The walls were scorched with soot, and pieces of rebar and concrete were embedded in them. After a short time looking around in the room, you made your way to a door that had been blasted open and off its hinges. Beyond was a corridor that continued to both the left and right.\n\nTo the left, you could see a T-intersection of corridors that had been half-buried by rubble. One path of the intersection was blocked by that rubble, and a red pulsing light came from the unblocked direction.\n\nTo the right, you could see a doorway at the far end, and then another corridor continuing to the left. A sign was hanging from the wall by the door, pointing down the corridor and stating that it was the way to a staircase. The door itself was twisted in its frame, with no markings on it. A shattered keycard slot was set in place of a lock and handle.\n\n*choice\n\t#Left, to the rubble and the light.\n\t\tYour face was bathed in the blinking red light as you turned the corner and looked down the corridor. It was empty and ended with four thick doorframes jutting out at the far end. You were unable to see if the doors were closed or not, but you could see for certain that none of the doors had been blown into the hall. Behind you now was a barrier of heavy rubble that had piled up on top of a ruined staircase. You were unable to see the bottom of the staircase through the small gaps, and it sounded like there was nobody down there. At least, nobody well enough to be calling out.\n\t\t\n\t\tYou continued down the corridor, seeing the flashing red light in the ceiling emerge from behind a concrete beam. The doorframes blocked from sight shifted to reveal closed doors behind them. The doors remained undamaged and standing firm in their places.\n\t\t\n\t\tThere were keycard slots on the doors, but they seemed to be dead. You saw several LEDs in the keycard slot housing, but none of them were lit. Whether you had a keycard that matched or not, you would have the same difficulty in getting past the closed doors.\n\t\t\n\t\t*choice\n\t\t\t#Try to force the doors.\n\t\t\t\tIt was straightforward enough. No matter the bulk of the door in your way, with enough force, anything will open. You rotated your limbs, limbering up and focusing on the task ahead.\n\t\t\t\t\n\t\t\t\t*if (energypower)\n\t\t\t\t\t*set smashydoor true\n\t\t\t\t\t*set energy -20\n\t\t\t\t\tYou reached out to the molecules composing the heavy doors. Like many times before, you felt the air itself start changing around you as you projected your power outward, concentrating all of it upon the object barring your path. Instead of the door melting away at the push of your will, it somehow held together and rebuffed your power. With a grunt, you pushed harder.\n\t\t\t\t\t\n\t\t\t\t\tSlowly, the door began to give way. First, you felt a crack at the keycard slot, which you then managed to pull wider into a weak point. Soon enough, the entire door was twisted by your effort. Stepping up, you gave the door a mighty final kick that broke it down.\n\t\t\t\t\t\n\t\t\t\t\tWith your chest heaving from the strain, you found yourself in a pristine white room filled with a few desks and computer terminals, a long curving window acting as a wall on the far side, dividing it from a larger room that descended almost a full floor further below you.\n\t\t\t\t\t*goto pastthedoors\n\t\t\t\t*elseif (strength)\n\t\t\t\t\t*set smashydoor true\n\t\t\t\t\t*set energy -20\n\t\t\t\t\tPeople might say that brute force never helped anyone. They would be wrong.\n\t\t\t\t\t\n\t\t\t\t\tYou smashed your mighty fist against the door, \n\t\t\t\t\t*if not (durability)\n\t\t\t\t\t\thearing a crack in your hand and feeling all of the muscles in your arm screaming in agony, \n\t\t\t\t\tleaving a dent behind in the otherwise solid door. A crack had appeared, now you just had to tear it open wide enough to pass through. A few solid kicks later, the door buckled beneath your onslaught.\n\t\t\t\t\t\n\t\t\t\t\tIt took a great deal of effort on your part to kick your way to the point where you could get ahold of it and rip it apart. But eventually, with straining muscles, the door buckled and came apart as if forced by an oversized can opener.\n\t\t\t\t\t\n\t\t\t\t\tWith your chest heaving from the strain, \n\t\t\t\t\t*if not (durability)\n\t\t\t\t\t\tand with arms and legs cut up by your forceful entrance, \n\t\t\t\t\tyou found yourself in a pristine white room filled with a few desks and computer terminals, a long curving window acting as a wall on the far side, dividing it from a larger room that descended almost a full floor further below you.\n\t\t\t\t\t*goto pastthedoors\n\t\t\t\t*else\n\t\t\t\t\tWith confident steps, you continued further down the corridor, staring down the doors in your way. None of them were open, not even slightly ajar. You tried to pull on the doors, but found no grip. You tried to kick the doors, but they were too thick to crack. You tried to break open the keycard slot and rewire it, but without power, it was to no avail.\n\t\t\t\t\t\n\t\t\t\t\tAfter a fair bit of time, it was finally clear that you weren't going to get past these doors, not without some kind of intervention. You turned and walked back to the rubble-blocked staircase, continuing past the ruined room to see what the other direction unveiled.\n\t\t\t\t\t*goto awayblinks\n\t\t\t*if (teleport) #Try to teleport through.\n\t\t\t\t*set energy -25\n\t\t\t\tThe door was an obstacle, but not big enough for someone with your powers. Your palm placed flush against the door, you reached out with your powers. This was something you had tried to do a few times, but the only times it had actually worked was when you knew an alternative way past a wall or door. When everything was sealed, your power tended to fail.\n\t\t\t\t\n\t\t\t\tYou saw the familiar mist crawling around in your peripheral vision. Slowly, your arms and legs went numb and your concentration on whatever was past the door started filling your mind. The mist crawled out of your vision and left behind the darkness of the inside of your eyelids. With a heaving breath, you forced your eyes open and were immediately blinded.\n\t\t\t\t\n\t\t\t\tMoments later, the blinding white light gave way to more details in the room. The red blinking light filling the corridor was gone, and so was the hallway itself. As you gathered your senses, you found yourself in a pristine white room filled with a few desks and computer terminals, a long curving window acting as a wall on the far side, dividing it from a larger room that descended almost a full floor further below you.\n\t\t\t\t*goto pastthedoors\n\t\t\t#Turn back and look around some more.\n\t\t\t\tWith hesitant steps, you continued some way further down the corridor, just to make sure all the doors were in fact closed with no way to easily open them. It seem to be the case, so you turned and continued back to the rubble-blocked staircase, to the path where you had come from, and continued past the ruined room.\n\t\t\t\t\n\t\t\t\t*goto awayblinks\n\t#Right, to the door and staircase.\n\t\t*goto awayblinks\n\n\n\n*label awayblinks\nThe door at the far end taunted you as you approached, its dying keycard slot flickering as the LED inside finally lost power. It was flimsy enough that you could probably have barged straight through into whatever was beyond it, but a perfectly intact staircase revealed itself on your left, leading up in a gentle slope.\n\n*fake_choice\n\t#Head up the stairs.\n\t\tThe gently climbing steps rose up, the top of them just barely blocking your view into another corridor. Above, you could see the very top of a corner, and then were unsure what followed from there. You set your foot on the lowest step and began climbing.\n\t\t\n\t\t*if (senses)\n\t\t\tYou heard a shuffle from whatever was beyond the stairs, and a very faint trail of a whisper reached your ears. A slow squeal of rubber, the shuffling of a boot shifting, the crackle of an earpiece. Someone was coming. Not just someone, a group of someones.\n\t\t\t\n\t\tYou walked up cautiously, trying to peer around the corner at the top as best you could. As you reached the corner, you were startled by a sudden surge of noise from the corridor beyond. Heavy, booted steps filled and echoed off the walls as the area around the corner suddenly filled with the light of several flashlights. You backed away, peeking just slightly past the corner to see several men in sharp-looking suits move tactically down the corridor, securing multiple doorways on their way towards you. Two of them sat stationary, keeping close eyes upon you, their flashlights pointed at the corner you were peeking around. Both men had weapons at their sides.\n\t\t\n\t\t\"Stand down, hero,\" you heard a shout from the corridor beyond, then watched as a large man leaned through the doorway and took up a stance in front of the two suited men.\n\t\t\n\t\t*if (work = \"governor\")\n\t\t\tYou had seen this person before, although at the time you hadn't caught his name. On the fateful day when Lieutenant-Governor Rennow lost his son, he had come to see the Governor with this man.\n\t\t\n\t\t\"Please.\"\n\t\t\n\t\t*fake_choice\n\t\t\t#Stand down and talk it out.\n\t\t\t\t*set benign +5\n\t\t\t\t*goto talkthingsout\n\t\t\t#Try to escape.\n\t\t\t\t*goto escapade\n\t\t\t#Attack.\n\t\t\t\t*set benign -5\n\t\t\t\t*goto smellthedefeat\n\t#Try to break open the door.\n\t\t*set energy -5\n\t\tThe door was closed, but apparently not locked. There was no handle, but as you tried to push and pull upon the door, you felt it shifting a tiny bit in its frame. With one less latch to go through, you took a step back and crouched, then launched your foot against the door. With an audible crack, the door opened, creaking as it swung and then smashed against the wall.\n\t\t\n\t\tA silence fell as soon as the massive bang from the opening door was gone; an unnatural silence that gave you the creeps. \n\t\t*if (senses)\n\t\t\tFinally, you heard a shuffle from whatever was beyond the stairs, and a very faint trail of a whisper reached your ears. A slow squeal of rubber, the shuffling of a boot shifting, the crackle of an earpiece. Someone was coming. Not just someone, a group of someones. \n\t\tYou went through the newly opened door and looked around quickly. It was a fairly large room that went around the corner and probably shared a wall with the room you'd come in through. The decoration was composed mainly of computers and lab equipment, but also a few ordinary tables and shelves that had papers, binders, and books arranged on them. A rack of small test tubes and a Newton's cradle rounded out the lovely little laboratory.\n\t\t\n\t\tYou were startled by a sudden surge of noise from outside the door. Heavy, booted steps filled and echoed in the corridor as the area outside the door suddenly filled with the light of several flashlights. You backed away from the doorway and turned to see several men in sharp-looking suits move tactically down the corridor and secure the doorway. Two of them held close eyes upon you, their flashlights pointed at you but angled down so as not to directly blind you. Both men had weapons at their sides.\n\t\t\n\t\t\"Stand down, hero,\" you heard a shout from the corridor beyond, then watched as a large man leaned through the doorway and took up a stance in front of the two suited men.\n\t\t\n\t\t*if (work = \"governor\")\n\t\t\tYou had seen this person before, although at the time you hadn't caught his name. On the fateful day when Lieutenant-Governor Rennow lost his son, he had come to see the Governor with this man.\n\t\t\n\t\t\"Please.\"\n\t\t\n\t\t*choice\n\t\t\t#Stand down and talk it out.\n\t\t\t\t*set benign +5\n\t\t\t\t*goto talkthingsout\n\t\t\t#Try to escape.\n\t\t\t\t*goto escapade\n\t\t\t#Attack.\n\t\t\t\t*set benign -5\n\t\t\t\t*goto smellthedefeat\n\t*if (teleport = \"true\") #Teleport inside.\n\t\tYou stretched out with your power, imagining the space on the other side of the door. Usually, when you did this, there was a way to see
