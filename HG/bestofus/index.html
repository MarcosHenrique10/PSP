tYour heightened senses kick in as soon as the man twitches into motion. His fist swings just past your head, a strong air current rushing into your ear as you make your best effort to dodge the strike. As you scramble away from the fist, your senses alert you to a second strike incoming. \n\t\t\t\t\t*if (agility)\n\t\t\t\t\t\tYour body is already in motion, twisting to the side to dodge the second attack, bringing you around to make an unintentionally fancy flip in order to get out of the way in time. You land on your feet, crouched low and looking up at the mammoth in front of you, seeing his eyes burn with rage.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou launch back into the fight with a powerful kick off the ground. Instead of hitting the large man, you launch yourself over his shoulder, grabbing onto his suit jacket and then landing with a powerful tug at his collar. The lumbering form comes rolling over your back and lands hard on the roof in front of you.\n\t\t\t\t\t\t*goto roofight\n\t\t\t\t\t*else\n\t\t\t\t\t\tYour body isn't as fast as your mind, however, as you try to twist away from the hit but feel the uppercut hit you straight in the gut nonetheless. \n\t\t\t\t\t\t*if (durability)\n\t\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t\t*goto roofall\n\t\t\t\t*elseif (agility)\n\t\t\t\t\tYou see the blow coming just in time to try and roll away from it. His fist swings just past your head, a strong air current rushing into your ear as you make your best effort to dodge the strike. As you scramble away from the fist, you steady yourself directly in the path of another blow heading your way. In a mighty attempt, you try to dodge, but can't get out of the way in time. \n\t\t\t\t\t*if (durability)\n\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t*goto roofall\n\t\t\t\t*else\n\t\t\t\t\tThe fist looks like it's heading for your face. In a moment of pure reflex, you throw your hands up and then down to try and guide the incoming blow out of the way. The fist glances off one of your forearms, but the result ends up contorting your entire body as the blow lands in your stomach instead. \n\t\t\t\t\t*if (durability)\n\t\t\t\t\t\tYou feel the air escape your lungs from the weight of the blow, the force of it strong enough that it sends you right over the edge of the roof.\n\t\t\t\t\t\t*goto roofall\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou feel the fist penetrate your entire being. Something scrambles in your stomach, you feel an ache in your spine, and the air is forced out of your lungs. Time slows down to a crawl as you find yourself being punched right over the edge of the roof.\n\t\t\t\t\t\t*goto roofall\n\t\t\t#\"I intend to put you through this roof.\"\n\t\t\t\tThe man begins laughing at your forceful statement, the ruckus cut short as you grip onto his fancy dress jacket and toss him over your shoulder. He slams hard against the roof, his body reeling from the sudden attack. \n\t\t\t\t*goto roofight\n\n\n\n*label energyusemin\n*if (endurance)\n\t*set energy -2\n\t*return\n*else\n\t*set energy -5\n\t*return\n\n*label energyuse\n*if (endurance)\n\t*set energy -5\n\t*return\n*else\n\t*set energy -10\n\t*return\n", "disaster": "*set energy 100\n\n*temp colnum 0\n*temp cols 0\n*temp colour1 \"none\"\n*temp colour2 \"none\"\n*temp colour3 \"none\"\n*temp armygear false\n\n\n[i]When the great shock happened, the entire nation stood still. Very few events I can remember had brought such silence to an entire country in such little time. The entire state of California had been ripped from the mainland, and the coastline of North America changed overnight. The aftershocks went on for weeks. Hundreds of thousands of people were never found beneath the rubble, millions were evacuated to makeshift camps in less-affected bordering states. Some even went as far as the Midwest, as government agencies fought to find places for temporary refuge.[/i]\n\n[i]And in the ruins, people who had been outcasts and fugitives became the new sensation, heroes who worked as hard as anyone from emergency services to save lives and avoid further damage. The spotlight had shifted, and the time of innocence was over. Overnight, social media sparked a massive movement that hailed the superheroes as something akin to gods. And in the aftermath, a counter-movement also arose, seeking to out these 'gods' and referring to the thousands of comic books and movies showing the kind of damage and danger such powered people would bring with them.[/i]\n*page_break\n\"And I vow to you with all my powers as the President of these United States of America, that this city will be rebuilt…\" The voice of the President sent a passionate wave through a stadium full of the sick and the now-homeless. A podium with a few microphones had been set up at one end, and the media were hovering around it. Men in black suits roamed the crowd, looming over the terrified civilians and trying to keep the President safe. \n*if (senses)\n\tYou could just barely overhear the crackling of the radio transmissions to their earpieces, buzzing with reports from all around the stadium.\n*comment endif\n\n\"And this city will stand stronger and more beautiful than it ever has before!\" the President concluded, the destitute crowd applauding as if a sign above his head had given the order to do so. The President thanked the people and left the podium, leaving the press buzzing.\n\nJust after he had stepped off the podium and towards the exit from the stadium, a scrawny man in a tailored suit approached and shook his hand, a warm smile stretching across both of their faces as they greeted one another. You recognized the man as Benedict Reissman, billionaire CEO of Reissman Industries.\n*if (senses)\n\t*page_break\n\t\"Fine speech, Mr. President. It will be a true pleasure working with you and FEMA on the rebuilding effort,\" Mr. Reissman said as he continued shaking the President's hand.\n\t\n\t\"Thank you for all your efforts, Mr. Reissman. Without your pledge, I'm afraid Congress would tear me apart. Even in such horrible circumstances, my opponents will seek to undermine me,\" the President said, nodding weakly.\n\t\n\t\"Of course, it is election season,\" the tailored CEO stated and released the slowly greying President's hand.\n\t\n\tThe two marched into the tunnels of the stadium, and you could no longer hear them.\n*page_break\nA few hours later, you were walking down to fetch some water from a nearby logistics depot established by the National Guard. You had missed the delivery from the truck that offloaded both food and rations to the people in the stadium, and someone had managed to take your share in all the commotion.\n\nA begging trip was the last thing you wanted to do, but you hadn't had a single bite to eat all day and your water bottle had just gone dry. There was a family living in a ruined house nearby as well, so you might as well try to grab a box for them too, if the people at the depot would allow it. From the looks of the family the last time you had seen them, it was clear the National Guard didn't know of their location.\n\nAs you walked, you suddenly heard screaming from up ahead.\n\n\"No! No, you asshole! Get away from me! Get…the fuck…away!\"\n\nThree shadows stretched over a wall, painting an absurd picture of what was happening just behind the wall. The checkpoint established in the middle of the avenue was empty, the light jingling of barbed wire echoing the eerie emptiness in the streets. Menacing laughter emanated from a set of male lips just behind the wall.\n*choice\n\t#Rush in.\n\t\tYour entire body trembled as you took deep breaths and walked forward. You could feel the adrenaline pumping through your veins as you got closer. Among the weakening protests and deep laughter, a new sound joined the mix. There was a sharp whistle as something moved through the air very fast, followed by a squishy bludgeoning sound. Occasionally, a quick crack joined in, only to bring out a louder scream.\n\t\t\n\t\tWith swift feet, you rushed ahead, past the corner of the wall and down the alley. Light glistened off the wetness flowing over a black club. White knuckles wrapped a set of fingers around the grip of the club, and a strong arm brought it down time after time against a frail and cowering figure on the ground.\n\t\t*page_break\n\t\tThe next few moments were a blur of motion that even you in the midst of it could not keep track of. You moved very quickly, your arms and legs shifting by instinct more than command. At the end of it, you alone were left standing, your knuckles bruised and bloodied, your clothes torn, your breathing heavy and ragged.\n\t\t\n\t\tTwo men in camouflage were in the paved alleyway, their chests heaving with heavy breaths, their eyes closed, and their faces cut and bruised. Near them, the whimpering form of a small man began shifting, then moving towards the back of the alley.\n\t\t\n\t\t\"No…no…no more. Please, don't hurt me!\" the cowering figure muttered with swollen lips as he crawled away from you and the unconscious soldiers.\n\t\t*choice\n\t\t\t#Approach the man.\n\t\t\t\tWith somewhat trembling legs, you got closer to the broken man. The light reflecting off his eye as he looked up at you painted a frame around the horrific fear shining from them like a beacon. With one hand, you reached down to touch and reassure him, but the man swatted the hand away as he scrambled to his feet and ran towards the other end of the alley.\n\t\t\t\t\n\t\t\t\tWith a sigh, you let the man run.\n\t\t\t\t*goto bloobloo\n\t\t\t#Check the soldiers.\n\t\t\t\tThe uniformed men were still alive, although you were sure they both had broken bones, and one of them had a dislocated elbow and a dislocated shoulder in the same arm. It would be excruciating to slot the arm back into place, and you were somewhat glad in that knowledge. Somewhere behind you, the subject for the horrendous assault scrambled to his feet and began running.\n\t\t\t\t\n\t\t\t\t*set armygear true\n\t\t\t\tYou noticed there were a few items that would prove useful in future situations. The men had military-grade equipment on them. A radio could be obtained, as well as a baton that had been used in the assault. The men also carried weapons, but the last thing you needed was a fully mobilized National Guard going around looking for the guns, so you immediately decided to leave them on the ground.\n\t\t\t\t*choice\n\t\t\t\t\t#Take the gear.\n\t\t\t\t\t\tYou stripped the men clean of anything that was truly interesting to you.\n\t\t\t\t\t\t*goto bloobloo\n\t\t\t\t\t#Leave it.\n\t\t\t\t\t\t*goto bloobloo\n\t\t\t#Flee the scene.\n\t\t\t\tWithout looking behind to see that the situation had truly been resolved, you took to your trusty legs and ran.\n\t\t\t\t*set alley_intervene false\n\t\t\t\t*goto bloobloo\n\t#Keep listening.\n\t\tYour entire body trembled as you took deep breaths and walked forward. You could feel the adrenaline pumping through your veins as you got closer. Among the weakening protests and deep laughter, a new sound joined the mix. There was a sharp whistle as something moved through the air very fast, followed by a squishy bludgeoning sound. Occasionally, a quick crack joined in, only to bring out a louder scream.\n\t\t\n\t\tWhoever had been crying out suddenly went quiet. The squishing sounds continued for a moment, then were replaced by two voices joined in sadistic laughter. As the voices came towards you out of the alley, you snapped out of it and came to a decision.\n\t\t*choice\n\t\t\t#Confront the men.\n\t\t\t\tYou stepped out into the alley, directly in front of the two men, who were still laughing.\n\t\t\t\t\n\t\t\t\tThe next few moments were a blur of motion that even you in the midst of it could not keep track of. You moved very quickly, your arms and legs shifting by instinct more than command. At the end of it, you alone were left standing, your knuckles bruised and bloodied, your clothes torn, your breathing heavy and ragged.\n\t\t\t\t\n\t\t\t\tTwo men in camouflage were in the paved alleyway, their chests heaving with heavy breaths, their eyes closed, and their faces cut and bruised. With adrenaline still coursing through your veins, you took to your feet and fled the scene, realizing who you had just beaten up.\n\t\t\t\t*goto bloobloo\n\t\t\t#Run for it.\n\t\t\t\tWithout so much as a look over your shoulder, you ran for it.\n\t\t\t\t*set alley_intervene false\n\t\t\t\t*goto bloobloo\n\t#Walk away.\n\t\tSurely, there was nothing you could do. You turned to cross the street and began walking. The thud of a baton against a squishy bleeding man echoed in your ears. The deep laughter mixed with horrified cries as you tuned it out and continued on your way. Yet, a spark of doubt lit up in your chest. One that would keep you up during the next few nights, then continue to haunt your dreams.\n\t\t*set alley_intervene false\n\t\t*goto bloobloo\n\n*label bloobloo\n*page_break\nThe entire state of California was a mess and had descended into madness and chaos. For a time, you bunked with the less fortunate before feeling the urge to move on. Looting was rife throughout the city of Los Angeles, and strict curfews had to be put in place to contain the situation. The world needed more heroes.\n\nThis was your time, a spark that kicked you into action. One evening, you slipped into a closed-off mall. Although mostly ransacked already, you found everything one might need to be a budding vigilante. Now, it was time to choose who you would become.\n*page_break\nThe first targets for ransacking were the sporting goods and clothing stores, which would provide you with the outfit you would be wearing for the start of your career.\n*label uniform\n*fake_choice\n\t#Very fancy.\n\t\t*set suit \"fancy\"\n\t\tFlashy and fancy clothes. Maybe a suit or another such conservative party dress. Or maybe keep it very modern and hip with the kids. Add a few rhinestones for the bling factor. Not very good when it comes to protecting yourself or hiding, but you'll definitely look good while doing your hero thing.\n\t#Classic tights.\n\t\t*set suit \"classic\"\n\t\tAh, that classic look from pre-80s comic books, with tights and underpants that go over them. No room for anything to be carried, no pockets, and very little room left to the imagination when it came to the private parts. It's flashy and keeps your movement as free as possible, but offers very little protection from pretty much everything.\n\t#Very utilitarian.\n\t\t*set suit \"utility\"\n\t\tSleek, slim, and close to the body, with as many pockets as possible. A coverall, or perhaps an army surplus jacket with cargo trousers. Heavy-duty work or combat boots may not provide the best flexibility, but they will protect your feet. Very noticeable, but who knows what kind of secrets you could hide in the pockets? Perhaps, after some time, you could add some body armour to crown the ensemble.\n\t#Close to everyday wear.\n\t\t*set suit \"casual\"\n\t\tJacket, jeans or other very regular pants, nice comfortable shoes, and a shirt. It makes for a nice set and can be worn even outside office hours. Perhaps not the most heroic of getups, but one you could replace easily if torn. It might make it easier to disappear into crowds as well.\n*comment endif\n\nIs this what you wanted?\n*choice\n\t#Yes.\n\t\t*goto doncape\n\t#No, let me rethink.\n\t\t*goto uniform\n\n*label doncape\nDid you don a cape of some kind?\n*fake_choice\n\t#Yes, a full cloak.\n\t\t*set caped \"full\"\n\t#Yes, a cape that reaches my waist.\n\t\t*set caped \"half\"\n\t#No, it'll just get in the way.\n\t\t*set caped \"false\"\n\nWhat did you pick as your colour scheme?\n*fake_choice\n\t#A single-colour outfit.\n\t\t*set colnum 1\n\t\t*set cols 1\n\t#A two-colour outfit.\n\t\t*set colnum 2\n\t\t*set cols 2\n\t#A three-colour outfit.\n\t\t*set colnum 3\n\t\t*set cols 3\n\nWhat were these colours?\n\n*label collos\n*if (colnum = 0)\n\t*goto passon\n*else\n\t*hide_reuse\n\t*choice\n\t\t#A passionate red.\n\t\t\t*set colnum -1\n\t\t\t*if (colour1 = \"none\")\n\t\t\t\t*set colour1 \"red\"\n\t\t\t\t*goto collos\n\t\t\t*elseif (colour2 = \"none\")\n\t\t\t\t*set colour2 \"red\"\n\t\t\t\t*goto collos\n\t\t\t*else\n\t\t\t\t*set colour3 \"red\"\n\t\t\t\t*goto collos\n\t\t#A softer pink.\n\t\t\t*set colnum -1\n\t\t\t*if (colour1 = \"none\")\n\t\t\t\t*set colour1 \"pink\"\n\t\t\t\t*goto collos\n\t\t\t*elseif (colour2 = \"none\")\n\t\t\t\t*set colour2 \"pink\"\n\t\t\t\t*goto collos\n\t\t\t*else\n\t\t\t\t*set colour3 \"pink\"\n\t\t\t\t*goto collos\n\t\t#A distinguished purple.\n\t\t\t*set colnum -1\n\t\t\t*if (colour1 = \"none\")\n\t\t\t\t*set colour1 \"purple\"\n\t\t\t\t*goto collos\n\t\t\t*elseif (colour2 = \"none\")\n\t\t\t\t*set colour2 \"purple\"\n\t\t\t\t*goto collos\n\t\t\t*else\n\t\t\t\t*set colour3 \"purple\"\n\t\t\t\t*goto collos\n\t\t#A responsible navy blue.\n\t\t\t*set colnum -1\n\t\t\t*if (colour1 = \"none\")\n\t\t\t\t*set colour1 \"navy blue\"\n\t\t\t\t*goto collos\n\t\t\t*elseif (colour2 = \"none\")\n\t\t\t\t*set colour2 \"navy blue\"\n\t\t\t\t*goto collos\n\t\t\t*else\n\t\t\t\t*set colour3 \"navy blue\"\n\t\t\t\t*goto collos\n\t\t#A determined blue.\n\t\t\t*set colnum -1\n\t\t\t*if (colour1 = \"none\")\n\t\t\t\t*set colour1 \"blue\"\n\t\t\t\t*goto collos\n\t\t\t*elseif (colour2 = \"none\")\n\t\t\t\t*set colour2 \"blue\"\n\t\t\t\t*goto collos\n\t\t\t*else\n\t\t\t\t*set colour3 \"blue\"\n\t\t\t\t*goto collos\n\t\t#A balanced green.\n\t\t\t*set colnum -1\n\t\t\t*if (colour1 = \"none\")\n\t\t\t\t*set colour1 \"green\"\n\t\t\t\t*goto collos\n\t\t\t*elseif (colour2 = \"none\")\n\t\t\t\t*set colour2 \"green\"\n\t\t\t\t*goto collos\n\t\t\t*else\n\t\t\t\t*set colour3 \"green\"\n\t\t\t\t*goto collos\n\t\t#A spontaneous orange.\n\t\t\t*set colnum -1\n\t\t\t*if (colour1 = \"none\")\n\t\t\t\t*set colour1 \"orange\"\n\t\t\t\t*goto collos\n\t\t\t*elseif (colour2 = \"none\")\n\t\t\t\t*set colour2 \"orange\"\n\t\t\t\t*goto collos\n\t\t\t*else\n\t\t\t\t*set colour3 \"orange\"\n\t\t\t\t*goto collos\n\t\t#A cheerful yellow.\n\t\t\t*set colnum -1\n\t\t\t*if (colour1 = \"none\")\n\t\t\t\t*set colour1 \"yellow\"\n\t\t\t\t*goto collos\n\t\t\t*elseif (colour2 = \"none\")\n\t\t\t\t*set colour2 \"yellow\"\n\t\t\t\t*goto collos\n\t\t\t*else\n\t\t\t\t*set colour3 \"yellow\"\n\t\t\t\t*goto collos\n\t\t#Pure white.\n\t\t\t*set colnum -1\n\t\t\t*if (colour1 = \"none\")\n\t\t\t\t*set colour1 \"white\"\n\t\t\t\t*goto collos\n\t\t\t*elseif (colour2 = \"none\")\n\t\t\t\t*set colour2 \"white\"\n\t\t\t\t*goto collos\n\t\t\t*else\n\t\t\t\t*set colour3 \"white\"\n\t\t\t\t*goto collos\n\t\t#A neutral grey.\n\t\t\t*set colnum -1\n\t\t\t*if (colour1 = \"none\")\n\t\t\t\t*set colour1 \"grey\"\n\t\t\t\t*goto collos\n\t\t\t*elseif (colour2 = \"none\")\n\t\t\t\t*set colour2 \"grey\"\n\t\t\t\t*goto collos\n\t\t\t*else\n\t\t\t\t*set colour3 \"grey\"\n\t\t\t\t*goto collos\n\t\t#Solid black.\n\t\t\t*set colnum -1\n\t\t\t*if (colour1 = \"none\")\n\t\t\t\t*set colour1 \"black\"\n\t\t\t\t*goto collos\n\t\t\t*elseif (colour2 = \"none\")\n\t\t\t\t*set colour2 \"black\"\n\t\t\t\t*goto collos\n\t\t\t*else\n\t\t\t\t*set colour3 \"black\"\n\t\t\t\t*goto collos\n\n\n*label passon\n*if (cols = 1)\n\t*set colours colour1\n*if (cols = 2)\n\t*set colours ((colour1 & \" and \") & colour2)\n*if (cols = 3)\n\t*set colours ((((colour1 & \", \") & colour2) & \", and \") & colour3)\n\n*if (jumping)\n\t*if ((strength) and (durability))\n\t\t*if ((suit = \"classic\") and (caped = \"full\"))\n\t\t\t*achieve steelman\n\t\t\t*goto passondale\n\t\t*else\n\t\t\t*goto passondale\n\t*else\n\t\t*goto passondale\n*elseif (wallcrawl)\n\t*if ((agility) and (senses))\n\t\t*if ((suit = \"classic\") and (caped = \"false\"))\n\t\t\t*achieve spooder\n\t\t\t*goto passondale\n\t\t*else\n\t\t\t*goto passondale\n\t*else\n\t\t*goto passondale\n*else\n\t*goto passondale\n\n*label passondale\nThere was a clanking sound from outside the store. You had just gotten your outfit ready when you saw flashlights flicker on, and a few male voices began talking in slightly hushed voices. Someone was ransacking the sporting goods store you were in. Again.\n\nYou stalked towards the entrance but made sure to be as stealthy about it as possible, just to find out who these men were before jumping into any action. The shutter shook as the men tried to open it, then went around through the broken window as you had done before them. They walked on the broken glass, filling the store with a light crunching noise. The spotlights of their flashlights moved around the store, illuminating your surroundings for a brief moment before continuing.\n\n\"Hey, Jack, I think we've got something here,\" one of the men said, walking almost directly past you towards the back of the store.\n*page_break\n\"Yeah! These look to be in pretty good condition. These tents seem to be intact, and we've got all the poles. There's mattresses and sleeping bags too,\" the man at the back of the store called out. At the front, the rest of the men were quiet for a moment.\n\n\"I don't like this. Is this really what it's come down to? We're stealing?\"\n\n\"It's not stealing, Jack! It's survival. Do you want your kids to keep sleeping without a roof over their heads? They'll get pneumonia, or worse!\"\n\n\"Yeah…but this still feels wrong. We could just find a building that's at least somewhat safe, right?\"\n\n\"We've been trying to do that for two days, Jack. Every place is either full or cordoned off as structurally unstable. We've looked everywhere!\"\n\nThe man at the back of the store was shuffling around. You could hear the clinking of backpacks and then the sound of something being stuffed inside them. From the front, you heard another crunch of glass, followed by three gasps. A dark voice murmured, \"Leave. Now.\"\n\n\"Oh god…Nightreaver…please, this is for our families…\" one of the men said, his words followed by a nasty-sounding hit and a groan.\n\n\"Stay down,\" a rough, gravelly voice announced to the whole store. The voice was accented and harsh in a way that reminded you of certain German and Austrian actors. It was a voice that stood out as very distinct.\n*choice\n\t#Reveal yourself and intervene.\n\t\t*set fame +10\n\t\t*set body +5\n\t\tYou quickly stood up and stepped out from between the shelves. You saw the man in black standing in the middle of three men, his fist clenched, with one of the men bent over and reeling from a punch in the gut. You could see his scowling mouth, the rest of his face hidden behind a mask that was attached to a sleek bodysuit with some kind of padding inside to reinforce against attacks.\n\t\t\n\t\tWith your newly fashioned vigilante outfit on, you stood up to this already-infamous figure and saw a smirk stretch across his lips.\n\t\t\n\t\t\"Stop this,\" you uttered, and the smirk grew wider.\n\t\t\n\t\t\"I've seen a dozen vigilantes rise up since the quakes, along with little Miss Aurora's appearance. What makes you think you have what it takes to take me on?\" the masked man said. Meanwhile, the civilians were quickly making their way to safety outside the store.\n\t\t*choice\n\t\t\t#I attack, trying to take him off-guard.\n\t\t\t\t*set attacked_reaver true\n\t\t\t\tYou launched yourself forward.\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t*if (teleport) #Teleport behind him.\n\t\t\t\t\t\tOne moment you were there, looking at the masked face of the infamous Nightreaver, the next you were staring at the back of his head. The glass shards crunched under your foot, and you rushed into motion, landing a solid hit on the vigilante  before he could even try to react. Then he turned, and you quickly teleported again, but this time you felt something go wrong. A sharp pain rushed through your side for a moment, and a cry escaped your mouth. As you recoiled, the booted heel of the vigilante smashed into your side, and then he lunged towards you, his fists in a flurry.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe experienced crimefighter continued punching until you were down on the floor, his fists stopping only when you ceased struggling.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"That's a neat trick you have there. But you have no idea what you're doing. Just like the rest of 'em,\" you heard the heavily breathing man say before standing back up. Moving your head, you discovered that the vigilante was already gone.\n\t\t\t\t\t\t*goto postfisticuffs\n\t\t\t\t\t*if (strength) #Give him a taste of your full strength.\n\t\t\t\t\t\tYou felt the surge of power in your arm as you tightened yourself and lunged for your target. Nightreaver immediately went to defend himself and block the blow, but suddenly found himself flying backwards and crashing against the wall with a groan. As you rushed forward for a second punch, you suddenly felt a pain in your arms and chest, sending you reeling to the ground in shock. Something had gone wrong with your powers, and Nightreaver was quick to take the advantage.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Neat trick you have there, but you don't have any control, do you? Just like all the others,\" he said. When you looked up, you found that the vigilante was gone.\n\t\t\t\t\t\t*goto postfisticuffs\n\t\t\t\t\t*if (energypower) #Give him a spout of flame.\n\t\t\t\t\t\t*set fire +1\n\t\t\t\t\t\tWith a quick motion, you concentrated upon the air between you and Nightreaver, using your hands to quickly focus on a specific spot. You saw the air begin to shimmer and then light up, forming a small fire between your hands. Nightreaver's eyes went wide, and he surged forward in an attempt to stop you. Yet it was too late. The air between your hands exploded in a ball of flame, sending both you and the Nightreaver flying in opposite directions.\n\t\t\t\t\t\t\n\t\t\t\t\t\tWhen you came to, you saw the shelves and clothes racks smouldering. Beyond that, there was a dark figure hobbling to his feet. Nightreaver was clutching his side, but otherwise seemed in good condition.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"You're dangerous. You have no control. We will be seeing one another again.\" And with that, he jumped out through the window and vanished.\n\t\t\t\t\t\t*goto postfisticuffs\n\t\t\t\t\t*if (energypower) #Put him in ice.\n\t\t\t\t\t\t*set ice +1\n\t\t\t\t\t\tWith a quick motion, you concentrated on the air between you and Nightreaver, using your hands to quickly focus on a specific spot. You saw the air begin to shimmer, forming into a small white crystal which then quickly expanded. Nightreaver's eyes went wide, and he surged forward in an attempt to stop you. Yet it was too late. As you watched, the crystal grew larger, then fractured. Shards of ice shot out from between your hands, the explosion of energy throwing you and the vigilante to opposite sides of the store.\n\t\t\t\t\t\t\n\t\t\t\t\t\tWhen you came to, you saw the shelves and clothes racks were full of holes from the now-melted shards of ice. Beyond that, there was a dark figure hobbling to his feet. Nightreaver was clutching his side, but otherwise seemed in good condition.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"You're dangerous. You have no control. We will be seeing one another again.\" And with that, he jumped out through the window and vanished.\n\t\t\t\t\t\t*goto postfisticuffs\n\t\t\t\t\t*if (energypower) #Blast him with pure energy.\n\t\t\t\t\t\tWith a quick motion, you concentrated upon the air between you and Nightreaver, using your hands to quickly focus on a specific spot. You saw the air begin to shimmer, glow, and then slowly come together in a sphere of energy. Nightreaver's eyes went wide, and he surged forward in an attempt to stop you. Yet it was too late. The air between your hands exploded in a ball of flame, throwing both you and Nightreaver in opposite directions.\n\t\t\t\t\t\t\n\t\t\t\t\t\tWhen you came to, you saw the shelves and clothes racks had partially disintegrated, and the remains smouldering. Beyond that, there was a dark figure hobbling to his feet. Nightreaver was clutching his side, but otherwise seemed in good condition.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"You're dangerous. You have no control. We will be seeing one another again.\" And with that, he jumped out through the window and vanished.\n\t\t\t\t\t\t*goto postfisticuffs\n\t\t\t\t\t#Tackle him onto the glass shards.\n\t\t\t\t\t\tYou lowered your torso and kept rushing forward. You felt your shoulder pound against the firm padded abdomen of the vigilante before you. His feet left the ground for only a split second before he tensed up, returning to his firm footing. Then it was you who lost your footing, as the vigilante wrapped his arms around your waist and lifted you up, only to smash your head down upon the hard floor.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou couldn't see or hear for a moment, your limbs trying to push you off the ground and back into the fight by pure instinct. Yet you could only feel the cold floor against your face.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"You have no idea what you're doing, do you? Just like the rest of 'em,\" you heard the vigilante above you say. When you had regained your senses and moved your head to look up, you found that he was already gone.\n\t\t\t\t\t\t*goto postfisticuffs\n\t\t\t\t\t#Try a quick punch combo.\n\t\t\t\t\t\tThe muscles in your shoulders and back tightened as you shifted your torso and raised your arms. You threw a punch, followed straight away by another, and another. You felt your fists brush off the vigilante as he in turn slashed his arms up and redirected your blows, one after the other. When you finally landed a blow, it felt like he'd given it to you, your fist flying directly into his hard chest protection, and you felt the skin on your knuckles break and begin bleeding.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe vigilante quickly responded with a knee into your stomach, followed by two elbows into your back. The hits were strong, much stronger than you thought they would be. Another elbow cracked against the side of your head, and you slumped to the floor.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou couldn't see or hear for a moment, your limbs trying to push you off the ground and back into the fight by pure instinct. Yet you could only feel the cold floor against your face.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"You have no idea what you're doing, do you? Just like the rest of 'em,\" you heard the vigilante above you say. When you had regained your senses and moved your head to look up, you found that he was already gone.\n\t\t\t\t\t\t*goto postfisticuffs\n\t\t\t\t\t*if (armygear) #Use the baton.\n\t\t\t\t\t\tThe muscles in your shoulders and back tightened as you shifted your torso and raised your arm. You brought the firm baton down on the vigilante, but Nightreaver slashed his arms up and blocked your blows, one after the other. The baton cracked against his arms harder and harder until the vigilante sprang into action, guiding your baton to hit his ribs and then wrapping his arm around it, wrenching it from your grasp so hard you felt your elbow nearly dislocate.\n\t\t\t\t\t\t\n\t\t\t\t\t\tNightreaver quickly moved on to a flurry of blows, with a knee to your stomach followed by two elbows to your back. The hits were strong, much stronger than you thought they would be. Another elbow cracked against the side of your head, and you slumped to the floor.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou couldn't see or hear for a moment, your limbs trying to push you off the ground and back into the fight by pure instinct. Yet you could only feel the cold floor against your face.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"You have no idea what you're doing, do you? Just like the rest of 'em,\" you heard the vigilante above you say. When you regained your senses and moved your head to look up, you found that the vigilante was already gone.\n\t\t\t\t\t\t*goto postfisticuffs\n\t\t\t#Brace for an attack and keep him talking.\n\t\t\t\tYou stood firm, spreading your legs in order to give you better balance for any sudden onslaught from the vigilante in front of you. His body remained motionless, but you saw his head follow you as you shifted around in your stance.\n\t\t\t\t\n\t\t\t\t\"I've been doing this for years. Do you really think someone like you could just stand up and defy me?\" Nightreaver said, chuckling a little.\n\t\t\t\t\n\t\t\t\t\"Years? I haven't heard of you before…\" you uttered, holding your ground.\n\t\t\t\t\n\t\t\t\t\"That's because I've been keeping myself from being spotted by cameras and news crews. Until the earthquake, there was no need to be anything but a rumour within the criminal underground. Now, there's cameras everywhere and looting in the streets. Someone has to stand in the way of that before it gets out of hand,\" the vigilante said, then studied you for a moment. \n\t\t\t\t*if not (natlang = \"English\")\n\t\t\t\t\t\"You're not from around here. What are you doing in a get-up like that?\"\n\t\t\t\t*if (natlang = \"English\")\n\t\t\t\t\t\"What's your excuse?\"\n\t\t\t\t\n\t\t\t\t*fake_choice\n\t\t\t\t\t#\"I don't like seeing people suffer. I need to help somehow.\"\n\t\t\t\t\t\t*set benign +10\n\t\t\t\t\t#\"The people need an icon in dark times. I wish to inspire people.\"\n\t\t\t\t\t\t*set benign +5\n\t\t\t\t\t#\"The people need someone to lead them now. I can offer them that beacon of leadership.\"\n\t\t\t\t\t\t*set benign -5\n\t\t\t\t\t#\"I genuinely don't know. I just felt a calling.\"\n\t\t\t\t\n\t\t\t\tYou looked away for only a moment, thinking about your answer. When you looked back to speak your piece, the vigilante who had been standing almost directly in front of you had disappeared without a trace.\n\t\t\t\t*goto postfisticuffs\n\t#Reveal yourself and watch.\n\t\t*set fame +5\n\t\tYou quickly stood up and stepped out from between the shelves. You saw the man in black standing in the middle of three men, his fist clenched, with one of the men bent over and reeling from a punch in the gut. You could see his scowling mouth, the rest of his face hidden behind a mask that was attached to a sleek bodysuit with some kind of padding inside to reinforce against attacks.\n\t\t\n\t\tWith your newly fashioned vigilante outfit on, you stood up to this already-infamous figure. The vigilante looked at you and smirked, grabbing one of the men by the neck and tossing him towards the broken window.\n\t\t\n\t\t\"Get out of here, punks,\" the man in the mask said, and the civilians began rushing out of the store.\n\t\t*page_break\n\t\tYou stood firm, staring at the vigilante in front of you. His body remained motionless, but you saw his head following you as you shifted in place.\n\t\t\n\t\t\"I've been doing this for years. I've seen a dozen wannabes rise from the ruins of this city, none of them worth the effort they put into their masks,\" Nightreaver said, chuckling.\n\t\t\n\t\t\"Years? I haven't heard of you before…\" you uttered, holding your ground.\n\t\t\n\t\t\"That's because I've been keeping myself from being spotted by cameras and news crews. Until the earthquake, there was no need to be anything but a rumour within the criminal underground. Now, there's cameras everywhere and looting in the streets. Someone has to stand in the way of that before it gets out of hand,\" the vigilante said, then studied you for a moment. \n\t\t*if not (natlang = \"English\")\n\t\t\t\"You're not from around here. What are you doing in a get-up like that?\"\n\t\t*if (natlang = \"English\")\n\t\t\t\"What's your excuse?\"\n\t\t\n\t\t*fake_choice\n\t\t\t#\"I don't like seeing people suffer. I need to help somehow.\"\n\t\t\t\t*set benign +10\n\t\t\t#\"The people need an icon in dark times. I wish to inspire people.\"\n\t\t\t\t*set benign +5\n\t\t\t#\"The people need someone to lead them now. I can offer them that beacon of leadership.\"\n\t\t\t\t*set benign -5\n\t\t\t#\"I genuinely don't know. I just felt a calling.\"\n\t\t\n\t\tYou looked away for only a moment, thinking about your answer. When you looked back to speak your piece, the vigilante who had been standing almost directly in front of you had disappeared without a trace.\n\t\t*goto postfisticuffs\n\t#Try and sneak away.\n\t\t*set body -5\n\t\tYou quickly darted between some racks of clothing. You had seen another entrance at the back of the store which you thought you might be able to use to get out. You heard a shuffle from the doorway, then a loud bang directly in front of you. You fell, your senses overwhelmed by a sudden light and loud noise that turned into a ringing in your ears. When you regained your senses, you saw a man in dark clothing standing in front of you and the civilians scrambling out the window. You saw the vigilante's lips move, but his voice was muffled by the ringing. After that, he simply watched you, waiting for you to regain your senses.\n\t\t\n\t\t\"I've been doing this for years. I've seen a dozen wannabes rise from the ruins of this city, none of them worth the effort they put into their masks,\" Nightreaver said, chuckling.\n\t\t\n\t\t\"Years? I haven't heard of you before…\" you uttered, holding your ground.\n\t\t\n\t\t\"That's because I've been keeping myself from being spotted by cameras and news crews. Until the earthquake, there was no need to be anything but a rumour within the criminal underground. Now, there's cameras everywhere and looting in the streets. Someone has to stand in the way of that before it gets out of hand,\" the vigilante said, then studied you for a moment. \n\t\t*if not (natlang = \"English\")\n\t\t\t\"You're not from around here. What are you doing in a get-up like that?\"\n\t\t*if (natlang = \"English\")\n\t\t\t\"What's your excuse?\"\n\t\t\n\t\t*fake_choice\n\t\t\t#Attack him while he's preoccupied.\n\t\t\t\t*set attacked_reaver true\n\t\t\t\tYou launched yourself forward.\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t*if (teleport) #Teleport behind him.\n\t\t\t\t\t\tOne moment you were there, looking at the masked face of the infamous Nightreaver, the next you were staring at the back of his head. The glass shards crunched under your foot, and you rushed into motion, landing a solid hit on the vigilante before he could even try to react. Then he turned, and you quickly teleported again, but this time you felt something go wrong. A sharp pain rushed through your side for a moment, and a cry escaped your mouth. As you recoiled, the booted heel of the vigilante smashed into your side, then he lunged at you, his fists in a flurry.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe experienced crimefighter continued punching until you were down on the floor, his fists stopping only when you had ceased struggling.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"That's a neat trick you have there. But you have no idea what you're doing. Just like the rest of 'em,\" you heard the heavily breathing man say before he stood back up. When you moved your head, you found that the vigilante was already gone.\n\t\t\t\t\t\t*goto postfisticuffs\n\t\t\t\t\t*if (strength) #Give him a taste of your full strength.\n\t\t\t\t\t\tYou felt the surge of power in your arm as you tightened yourself and lunged for your target. Nightreaver immediately went to defend himself and block the blow, but suddenly found himself flying backwards and crashing against the wall with a groan. As you rushed forward for a second punch, you suddenly felt a pain in your arms and chest, sending you reeling to the ground in shock. Something had gone wrong with your powers, and Nightreaver was quick to take the advantage.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Neat trick you have there, but you don't have any control, do you? Just like all the others,\" he said. When you looked up, you found that the vigilante was gone.\n\t\t\t\t\t\t*goto postfisticuffs\n\t\t\t\t\t*if (energypower) #Give him a spout of flame.\n\t\t\t\t\t\t*set fire +1\n\t\t\t\t\t\tWith a quick motion, you concentrated upon the air between you and Nightreaver, using your hands to quickly focus on a specific spot. You saw the air begin to shimmer and then light up, forming a small fire between your hands. Nightreaver's eyes went wide, and he surged forward in an attempt to stop you. Yet it was too late. The air between your hands exploded in a ball of flame, sending both you and the Nightreaver flying in opposite directions.\n\t\t\t\t\t\t\n\t\t\t\t\t\tWhen you came to, you saw the shelves and clothes racks smouldering. Beyond that, there was a dark figure hobbling to his feet. Nightreaver was clutching his side, but otherwise seemed in good condition.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"You're dangerous. You have no control. We will be seeing one another again.\" And with that, he jumped out through the window and vanished.\n\t\t\t\t\t\t*goto postfisticuffs\n\t\t\t\t\t*if (energypower) #Put him in ice.\n\t\t\t\t\t\t*set ice +1\n\t\t\t\t\t\tWith a quick motion, you concentrated on the air between you and Nightreaver, using your hands to quickly focus on a specific spot. You saw the air begin to shimmer, forming into a small white crystal which then quickly expanded. Nightreaver's eyes went wide, and he surged forward in an attempt to stop you. Yet it was too late. As you watched, the crystal grew larger, then fractured. Shards of ice shot out from between your hands, the explosion of energy throwing you and the vigilante to opposite sides of the store.\n\t\t\t\t\t\t\n\t\t\t\t\t\tWhen you came to, you saw the shelves and clothes racks were full of holes from the now-melted shards of ice. Beyond that, there was a dark figure hobbling to his feet. Nightreaver was clutching his side, but otherwise seemed in good condition.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"You're dangerous. You have no control. We will be seeing one another again.\" And with that, he jumped out through the window and vanished.\n\t\t\t\t\t\t*goto postfisticuffs\n\t\t\t\t\t*if (energypower) #Blast him with pure energy.\n\t\t\t\t\t\tWith a quick motion, you concentrated upon the air between you and Nightreaver, using your hands to quickly focus on a specific spot. You saw the air begin to shimmer, glow, and then slowly come together in a sphere of energy. Nightreaver's eyes went wide, and he surged forward in an attempt to stop you. Yet it was too late. The air between your hands exploded in a ball of flame, throwing both you and Nightreaver in opposite directions.\n\t\t\t\t\t\t\n\t\t\t\t\t\tWhen you came to, you saw the shelves and clothes racks had partially disintegrated, and the remains smouldering. Beyond that, there was a dark figure hobbling to his feet. Nightreaver was clutching his side, but otherwise seemed in good condition.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"You're dangerous. You have no control. We will be seeing one another again.\" And with that, he jumped out through the window and vanished.\n\t\t\t\t\t\t*goto postfisticuffs\n\t\t\t\t\t#Tackle him into the glass shards.\n\t\t\t\t\t\tYou lowered your torso and kept rushing forward. You felt your shoulder pound against the firm padded abdomen of the vigilante before you. His feet left the ground for only a split second before he tensed up, returning to his firm footing. Then it was you who lost your footing, as the vigilante wrapped his arms around your waist and lifted you up, only to smash your head down upon the hard floor.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou couldn't see or hear for a moment, your limbs trying to push you off the ground and back into the fight by pure instinct. Yet you could only feel the cold floor against your face.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"You have no idea what you're doing, do you? Just like the rest of 'em,\" you heard the vigilante above you say. When you had regained your senses and moved your head to look up, you found that he was already gone.\n\t\t\t\t\t\t*goto postfisticuffs\n\t\t\t\t\t#Try a quick punch combo.\n\t\t\t\t\t\tThe muscles in your shoulders and back tightened as you shifted your torso and raised your arms. You threw a punch, followed straight away by another, and another. You felt your fists brush off the vigilante as he in turn slashed his arms up and redirected your blows, one after the other. When you finally landed a blow, it felt like he'd given it to you, your fist flying directly into his hard chest protection, and you felt the skin on your knuckles break and begin bleeding.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe vigilante quickly responded with a knee into your stomach, followed by two elbows into your back. The hits were strong, much stronger than you thought they would be. Another elbow cracked against the side of your head, and you slumped to the floor.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou couldn't see or hear for a moment, your limbs trying to push you off the ground and back into the fight by pure instinct. Yet you could only feel the cold floor against your face.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"You have no idea what you're doing, do you? Just like the rest of 'em,\" you heard the vigilante above you say. When you had regained your senses and moved your head to look up, you found that he was already gone.\n\t\t\t\t\t\t*goto postfisticuffs\n\t\t\t\t\t*if (armygear) #Use the baton.\n\t\t\t\t\t\tThe muscles in your shoulders and back tightened as you shifted your torso and raised your arm. You brought the firm baton down on the vigilante, but Nightreaver slashed his arms up and blocked your blows, one after the other. The baton cracked against his arms harder and harder until the vigilante sprang into action, guiding your baton to hit his ribs and then wrapping his arm around it, wrenching it from your grasp so hard you felt your elbow nearly dislocate.\n\t\t\t\t\t\t\n\t\t\t\t\t\tNightreaver quickly moved on to a flurry of blows, with a knee to your stomach followed by two elbows to your back. The hits were strong, much stronger than you thought they would be. Another elbow cracked against the side of your head, and you slumped to the floor.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou couldn't see or hear for a moment, your limbs trying to push you off the ground and back into the fight by pure instinct. Yet you could only feel the cold floor against your face.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"You have no idea what you're doing, do you? Just like the rest of 'em,\" you heard the vigilante above you say. When you regained your senses and moved your head to look up, you found that the vigilante was already gone.\n\t\t\t\t\t\t*goto postfisticuffs\n\t\t\t#\"I don't like seeing people suffer. I need to help somehow.\"\n\t\t\t\t*set benign +10\n\t\t\t#\"The people need an icon in dark times. I wish to inspire people.\"\n\t\t\t\t*set benign +5\n\t\t\t#\"The people need someone to lead them now. I can offer them that beacon of leadership.\"\n\t\t\t\t*set benign -5\n\t\t\t#\"I genuinely don't know. I just felt a calling.\"\n\t\t\n\t\tYou looked away for only a moment, thinking about your answer. When you looked back to speak your piece, the vigilante who had been standing almost directly in front of you had disappeared without a trace.\n\t\t*goto postfisticuffs\n\n*label postfisticuffs\n*set reaver_met true\n*page_break\nAfter your brief encounter with an already somewhat established vigilante, you decided not to push your luck and returned to where you were holed up. You hid your gear and washed up with some collected rainwater. In front of you was a broken mirror, and with a smile, you held up the headgear of your suit, masking part of your face with it. You needed a name. Nightreaver had gotten his by spreading it to the criminals, which ended up in police reports and then the news. Aurora got her name because the blurry coloured streak she looked like when flying reminded people of the aurora borealis.\n\nYou would be naming yourself and spreading that name among the people you help.\n*fake_choice\n\t#Lucid.\n\t\t*set heroname \"Lucid\"\n\t#Polaris.\n\t\t*set heroname \"Polaris\"\n\t#Silverwing.\n\t\t*set heroname \"Silverwing\"\n\t#Titanis.\n\t\t*set heroname \"Titanis\"\n\t#Ultrahuman.\n\t\t*set heroname \"Ultrahuman\"\n\t#I have something much better in mind.\n\t\t*input_text heroname\n\t\t*page_break\n\nWith a smile, you allowed yourself to daydream a little. The chants of an imaginary crowd filled your ears, shouting for a name you had just invented.\n\n${heroname}…${heroname}. ${heroname}!\n\nThe hum of a thousand voices called out to you. A hand landed on your shoulder, while another grasped your own hand and shook it firmly. A dozen lights flashed in front of you as pictures were taken. You could see the iconic swirling newspaper effect from old movies and your own face there, shaking hands with the President on a podium.\n\nWith a dismissing chuckle, you pushed the scene out of your mind. That kind of thing would never happen, and even if it did, you were not sure if you would enjoy it as much as you did the daydream. Then came a shriek from a nearby street. Lunging now into determined action, you took the headgear and put it on, rushing out the door to recover the rest of your outfit.\n*set reveal true\n*page_break One Year Later.\n[i]Things got worse before they got better, as they always do.[/i]\n\n[i]San Francisco, Los Angeles, and the entire coastline stretching between them was faced with turmoil. Reconstruction required some of the richest men in the world and a shocking mutual motion by the Republicans and Democrats, as well as the cooperation of a new and slowly growing group of people with mysterious powers. Between the ruins of the two great cities, a shining new gem was given birth: Pacifica. The most modern city in America, the heart of which would give Seoul and Tokyo a run for their money. This city would become a heart that pumped blood into the ruins of San Francisco, Los Angeles and other affected cities in California.[/i]\n\n[i]At the same time, the National Guard was withdrawn piece by piece, replaced by [b]BlackWatch International[/b] and other, smaller security companies. Returning or remaining civilians were treated poorly, but they were forced to cope until new housing could be finished.[/i]\n*page_break\n*set fame +10\nYou had been struggling for the past year with finding your own place, some communities growing to know you better than others. You hadn't met other heroes or vigilantes in the streets, at least not any worth noting. Some kids who put on a mask and tried to take a bite out of crime wouldn't quite qualify. Aurora had become a symbol of the reconstruction effort and was constantly busy with helping builders and meeting up with powerful figures eager to shake her hand and make vague promises on political points.\n\nMeanwhile, you had focused on street-level crime and making sure civilians were safe. Your toolset had slowly grown more powerful, but aside from your powers, had you also made the effort to develop tools and gadgets?\n\n*fake_choice\n\t#Yes.\n\t\t*set gadget true\n\t#No.\n\nAfter a particularly rough week out in the streets, you had been forced to stay in recuperation for a fair bit of time. Your naivete had eroded away by that week, and you were faced with the fact that you didn't really know how to fight. As such, you had approached a few places to see what kind of fighting styles were being taught in the growing city. The variety was decent, and you picked a martial art to be trained in.\n\n\n*label stylechoice\n*allow_reuse\n*fake_choice\n\t#American styles.\n\t\t*goto americano\n\t#European and Middle-Eastern styles.\n\t\t*goto european\n\t#Asian styles.\n\t\t*goto asian\n\n\n*label americano\n*allow_reuse\n*choice\n\t#Brazilian Jiu-Jitsu.\n\t\tBrazilian Jiu-Jitsu has a strong focus upon grappling and driving your opponent to the ground. It has throws, locks, and submissions which will make even the strongest opponent end up either incapacitated, unconcious, or dead, depending on the amount of force used. By using correct technique and taking advantage of an opponent's own momentum and weak points, even a small and frail person can overpower a hulking enemy.\n\t\t\n\t\tDid you like the sound of that?\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\t*set training \"Brazilian Jiu-Jitsu.\"\n\t\t\t\t*goto settledcombat\n\t\t\t#No.\n\t\t\t\t*goto americano\n\t#Capoeira.\n\t\tCapoeira has a focus upon agile movements. It is as marvelous to watch as it is deadly, combining highly acrobatic dancing with kicks and punches, although the use of knee-strikes and elbow-punches are preferred to more traditional fighting styles. As a combat style, capoeira requires fast and precise control, as it leans more towards counter-attacks than full-on assault. By making you aware of your own movements and those of the opponent, capoeira is a viable fighting style against even large groups of swarming people, whether they be armed or unarmed.\n\t\t\n\t\tDid you like the sound of that?\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\t*set training \"Capoeira.\"\n\t\t\t\t*goto settledcombat\n\t\t\t#No.\n\t\t\t\t*goto americano\n\t#Jeet Kune Do.\n\t\tJeet Kune Do, developed by the famed martial arts actor Bruce Lee, is a fast and mobile fighting style based on Chinese martial arts but including a lot of hybridization between styles. The style relies upon striking between the time your opponent starts their strike and the time their strike lands. Thus the strikes, with both hands and feet, are to be precise and extremely quick, with a high focus upon trained reactions. According to Jeet Kune Do, fights are spontaneous, and a fighter's response to fighting must flow between everything they might need, from kicking and punching to grabs and locks.\n\t\t\n\t\tDid you like the sound of that?\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\t*set training \"Jeet Kune Do.\"\n\t\t\t\t*goto settledcombat\n\t\t\t#No.\n\t\t\t\t*goto americano\n\t#Back to other styles.\n\t\t*goto stylechoice\n\n*label european\n*allow_reuse\n*choice\n\t#Krav Maga.\n\t\tKrav Maga is perhaps the most famous modern self-defence martial art in the world. Originating in the Israeli army, this fighting style combines the best from hand- and leg-focused fighting styles to bring about a brutal, highly efficient martial art that will make even the strongest opponent quake in fear. The style offers simultaneous offensive and defensive moves, focusing upon the very fast removal of threats instead of any unnecessary flourishes.\n\t\t\n\t\tDid you like the sound of that?\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\t*set training \"Krav Maga.\"\n\t\t\t\t*goto settledcombat\n\t\t\t#No.\n\t\t\t\t*goto european\n\t#Sambo.\n\t\tSambo, the martial art developed by the Red Army in the early existence of the Soviet Union, is a hybrid fighting style that combines elements from many Asian martial arts. It focuses upon grappling, wrestling, and throwing, which form the very basis of the entire fighting style. Once an opponent is on the ground, however, it is easy enough to put them to sleep with a swift kick or elbow strike.\n\t\t\n\t\tDid you like the sound of that?\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\t*set training \"Sambo.\"\n\t\t\t\t*goto settledcombat\n\t\t\t#No.\n\t\t\t\t*goto european\n\t#Savate.\n\t\tSavate, or French kickboxing, is a fighting style with roots in traditional boxing, as well as Asian kickboxing fighting styles such as Muay Thai. The emphasis in this particular martial art is on fast and nimble kicks and punches, all at specific weak points on an opponent's body. Training in savate de rue, the self-defence variant, includes unsportsmanlike takedowns, kicks, and punches that are meant to bring down an assailant fast and hard.\n\t\t\n\t\tDid you like the sound of that?\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\t*set training \"Savate.\"\n\t\t\t\t*goto settledcombat\n\t\t\t#No.\n\t\t\t\t*goto european\n\t#Back to other styles.\n\t\t*goto stylechoice\n\n\n*label asian\n*allow_reuse\n*choice\n\t#Bokator.\n\t\tBokator is an ancient fighting style hailing from Cambodia, including the traditional hard and fast punches and kicks, but also plenty of weapon use. It is first and foremost a form of combat meant for the battlefield, and as such is a brutal and efficient martial art. This fighting style has only fairly recently seen a resurgence, as its masters were brought together after the bloody Khmer Rouge. Bokator takes full advantage of the weak points in a human body and seeks to cripple them with weapons such as knives, swords, and batons, and in unarmed combat provides locks, punches, kicks, grapples, and throws that do the same job.\n\t\t\n\t\tDid you like the sound of that?\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\t*set training \"Bokator.\"\n\t\t\t\t*goto settledcombat\n\t\t\t#No.\n\t\t\t\t*goto asian\n\t#Eskrima.\n\t\tEskrima, perhaps the most famous of the martial arts hailing from the Philippines, is a powerful fighting style that focuses upon the use of simple weapons like batons and blades to take down an opponent hard and fast. In addition to weapon use, this martial art also includes joint locks, grapples, and unarmed combat, all of which remain as fast and deadly as the armed side of this fighting style.\n\t\t\n\t\tDid you like the sound of that?\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\t*set training \"Eskrima.\"\n\t\t\t\t*goto settledcombat\n\t\t\t#No.\n\t\t\t\t*goto asian\n\t#Muay Thai.\n\t\tMuay Thai, much like Savate, is a style of kickboxing, but instead of having roots in European boxing, it draws from centuries of brutal war in the jungles. It has hard punches that will drop an opponent unconcious with a single swing, along with kicks that will break bones.\n\t\t\n\t\tDid you like the sound of that?\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\t*set training \"Muay Thai.\"\n\t\t\t\t*goto settledcombat\n\t\t\t#No.\n\t\t\t\t*goto asian\n\t#Northern Style Kung Fu.\n\t\tThe Chinese martial arts, also known as Kung Fu or Wushu, can be separated into three rough categories: Northern, Southern, and other.\n\t\t\n\t\tNorthern fighting styles offer extended postures, the swift and nimble switching from one to the other becoming the core of the martial art. As such, acrobatics, high-flying kicks, and sweeping movements are the focus of the Northern styles.\n\t\t\n\t\tDid you like the sound of that?\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\t*set training \"Northern Style Kung Fu.\"\n\t\t\t\t*goto settledcombat\n\t\t\t#No.\n\t\t\t\t*goto asian\n\t#Silat.\n\t\tSilat, a Malay fighting style shaped over millenia, is a martial art based upon stability during mobility. It combines dance-like moves with efficient and quick ones, and it also includes fighting with weapons. No matter what posture or strike you are in, as a practitioner of silat, you will be standing stable and unwavering in the face of anything coming your way. It offers kicks, punches, elbow- and knee-strikes, throws, grapples, and locks.\n\t\t\n\t\tDid you like the sound of that?\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\t*set training \"Silat.\"\n\t\t\t\t*goto settledcombat\n\t\t\t#No.\n\t\t\t\t*goto asian\n\t#Southern Style Kung Fu.\n\t\tThe Chinese martial arts, also known as Kung Fu or Wushu, can be separated into three rough categories: Northern, Southern, and other.\n\t\t\n\t\tSouthern fighting styles offer grounded, compact postures with an emphasis upon short and powerful moves. Practitioners prefer a jab-like punch in favour of swooping kicks and tend to stay their ground. Postures hold limbs close to the body, allowing good defence and quick counter-attacks.\n\t\t\n\t\tDid you like the sound of that?\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\t*set training \"Southern Style Kung Fu.\"\n\t\t\t\t*goto settledcombat\n\t\t\t#No.\n\t\t\t\t*goto asian\n\t#Back to other styles.\n\t\t*goto stylechoice\n\n\n*label settledcombat\nYou continued going to classes a few nights every week, honing yourself as best you could. The teachers were surprised by your rapid progress, completely oblivious to the fact that you were practising your fighting outside of the classes. After all, there's no better way to learn than experience.\n\nEven so, there was a definite pleasure in going to the classes. It just so happened that the class had several very attractive people either attending or teaching, and a little eye candy was great for relieving some of the stress from the heroics.\n*fake_choice\n\t#I enjoyed looking at the men.\n\t\t*set sexual \"Men\"\n\t#I enjoyed looking at everyone.\n\t\t*set sexual \"All\"\n\t#I didn't really enjoy looking at anyone in that way.\n\t\t*set sexual \"None\"\n\t#I enjoyed looking at the women.\n\t\t*set sexual \"Women\"\n*page_break\nIt was one of those nights again. The Pacifica Star building at the heart of the growing downtown market district was all lit up, shining above everything around it. You thought you could just make out the wealthy businessmen wining and dining in the glass cage that made up the penthouse at the very top. A three-story luxury mansion in the clouds.\n\nMeanwhile, in the half-finished housing project two miles downwind, the police sirens screamed like banshees, swarming around one of the buildings. The workers had been forced out by a group of street thugs and gangsters trying to make a play for territory, all at the expense of anyone that was earmarked to have an apartment in the building.\n\nThen it happened. The first gunshot. Suddenly, the area became a warzone.\n\nThe police sirens became louder than ever as the streets were cleared of civilians. It was time you rushed into action. By now, you had had some experience with such events, and there was a method to your madness.\n*page_break\n*if (flight)\n\tYou took to the skies, feeling the rush of wind against your face once again. It was a liberating feeling every time your feet left the ground, and you had mastered the art of flying to the point where it caused hardly any noticeable drain on your body, even with prolonged time in the skies. You were not as fast as Aurora seemed to be, flitting across the sky in a blur, but you had nothing to complain about. Slowly, you guided yourself down to the rooftop and lowered yourself to stand very confidently on the flat, cold surface.\n\t*goto roofie\n*elseif (jumping)\n\tYou spread your legs and crouched down in place, concentrating and stiffening your muscles and placing your hand on the cold surface you were standing on. You felt the familiar vibrations going through your entire body and waited for just a moment more before unleashing the built-up power and launching yourself into the sky. The wind chilled your face as you leapt high over the apartment buildings. You landed with your feet soaking up the impact very naturally, storing the energy for only a moment before springing you up to the sky again. As you crashed down upon the hard roof of your target building, you bent your legs, landing with one knee hitting the surface and the other with the foot down. You're not quite sure how you worked it out, but you learned that curling yourself up just as you landed stopped the impact energy from being soaked up for another jump, enabling you to stop leaping very efficiently, along with looking quite cool when landing.\n\t*goto roofie\n*elseif (wallcrawl)\n\tTo you, it only came natural to defy the laws of gravity. Every flat and even non-flat surface became another place to walk or crawl upon. Your body had moulded into such a shape where you could naturally and without much exertion climb up a sheer cliff for miles and feel no different than if you'd simply walked that mile on a horizontal flat field. The issue was not getting to a roof, it was getting from roof to roof. Fortunately, the skeleton of this particular housing project has its buildings quite close to one another, and you hopped from roof to roof, or roof to wall in the cases where you couldn't quite reach. Finally, you reached the rooftop surrounded by the police, making your way quickly over the edge and onto the solid concrete roof.\n\t*goto roofie\n*elseif (teleport)\n\tWith a smile, you looked at the building not that far away from you, flashing red and blue with the lights of the police cars. You glanced to the roof of another building closer to you, then blinked and saw yourself all that much closer to your target roof. It had always been very heavy on your body to teleport, but in the last year you had grown much more used to it, becoming capable of traversing even long distances, as long as it was in short bursts. It took seventeen teleports to get to your target roof, but with your power, you could be sure that nobody saw or heard you.\n\t*goto roofie\n*else\n\tIt was at times like these that you wished you had what it took to build rocket boots or a jetpack. But then again, those would ruin the element of surprise in even the loudest of surroundings. Instead, you reached for your gadgets and rushed forward from the roof, launching a grappling hook on the opposite roof and pulling yourself up mid-flight. Your feet bent slightly as you swung directly into the wall of the apartment building, but with a whir, the grappling hook launcher began pulling you up the wall, your feet kicking just enough to keep you from smashing against the hard surface. It took only a few launches for you to reach the target building. Although you took some time climbing halfway up the side of the building, you were sure not that much attention had been directed at you.\n\t*goto roofie\n\n*label roofie\n\nThe roof of the overrun building was empty. They always were. The bad guys always left the roof unguarded. From the street, you heard a police officer on the megaphone telling the thugs to drop their weapons. The gunshots had died down again.\n\n\"Lower your weapons and let the hostages go!\" the megaphone blared, distorted as the voice echoed off concrete walls.\n*choice\n\t#I will go in quietly and minimize the risk of lives being lost.\n\t\t*goto sneakypeaky\n\t#I will go in quietly, but I don't care about the lives of the thugs.\n\t\t*set kills true\n\t\t*set benign -5\n\t\t*goto sneakypeaky\n\t#I will go in loudly, surprise the thugs and kill those who try and stop me.\n\t\t*set kills true\n\t\t*set benign -5\n\t\t*goto wreckshit\n\t#I will go in loudly, surprise the thugs and overwhelm them before anyone gets killed.\n\t\t*goto wreckshit\n\n\n*label wreckshit\nThe hallways and rooms of the concrete skeleton echoed coldly as you confidently marched through. The thugs that had taken over were clearly not very well organized or numerous, but enough to cause the local police department trouble by squatting. If they had hostages as well, the threat they posed to the local community had suddenly spiked. You were not about to let that happen.\n\nYou had cleared two entire floors in a light jog when you saw the first thug, a purple bandanna wrapped around his head and a handgun drooping from his fabric belt, which held up a pair of loose jeans. Just to emphasize the late-90s gangster image, the dark-skinned man wore no shirt and a golden chain around his neck with a small cross dangling from it.\n\nWhen you came across him, he smiled with golden teeth flashing with the red and blue lights. When you moved on, those teeth were littered on the floor,\n*if ((strength) and (kills))\n\talong with a pink gooey substance leaking out from a large crack in the back of his head.\nnext to his head.\n*page_break\nYour methods were fast and hard, leaving plenty of the street thugs begging for their mothers. They were not a threat to you, even as they swarmed and tried to surround you. In close quarters, their guns were easily removed from the equation, and that left only startled brawlers to take care of.\n*goto converge\n\n\n*label sneakypeaky\nThe hallways and rooms of the concrete skeleton echoed coldly as you confidently marched through. The thugs that had taken over were clearly not very well organized or numerous, but enough to cause the local police department trouble by squatting. If they had hostages as well, the threat they posed to the local community had suddenly spiked. You were not about to let that happen.\n\n*if (wallcrawl)\n\tYou clung carefully to the ceiling and made your way down the hallways, keeping your eyes and ears peeled for any thugs coming your way. You heard the faint whispers of some men around the corner, sealed in a room. You heard the clatter of magazines as the thugs filled them up with more rounds. The police kept shouting outside for them to come out peacefully.\n\t\n\tWhen you dropped down from the roof in the middle of these thugs, they never saw the beatdown they were faced with coming. The rounds clattered onto the floor and spread around until an unconscious thug landed and blocked their path.\n\t*page_break\n\t*if (kills)\n\t\tYour methods were quick and simple. Many of the thugs you took out were walking around alone and quickly dispatched. From the shadows, you struck time and time again, throwing body after body onto the cold, hard concrete.\n\t\t*goto converge\n\t*else\n\t\tYour methods were quick and simple. Many of the thugs you took out were walking around alone and quickly muffled, knocked out, or put to sleep with a hold you had learned.\n\t\t*goto converge\n*elseif (teleport)\n\tThe air in the building felt stiff as you warped in rapid succession past windows and doorways. Wrapped in a light mist, you disappeared and then reappeared on the other end. You heard the noise from the thugs as they moved about, reloading their weapons or just fooling around. They had no idea someone was inside with them. This ignorance would be their downfall.\n\t*choice\n\t\t#Teleport your way through without being seen.\n\t\t\tYou smiled as you heard the thugs keep on talking behind you, completely unaware that you had just wandered past them, and on some occasions almost directly through them.\n\t\t\t*goto converge\n\t\t#Lessen the burden on the cops and take some of the thugs out.\n\t\t\tThe thugs never stood a chance. You appeared directly in front of two that were in the middle of a conversation, and before they could react to your appearance, they were already horizontal on the ground, and you had warped away to take care of the next outlaw. \n\t\t\t*if (kills)\n\t\t\t\tYou made short work of the thugs, their bones snapping as they crumpled to the ground, bleeding and limp.\n\t\t\t*goto converge\n*else\n\tYou crouched low, flitting past openings wherever you could and trying to stay in whatever shadows the red-and-blue lights outside left for you. The thugs swarming in the building were careless and ignorant of the fact that someone might have sneaked in. The few that walked around on some semblance of a patrol were easy to ambush around corners and then take to the ground. You made sure at least a few thugs behind you were taken care of so you would have less trouble in the future, then continued your search for the hostages.\n\t*goto converge\n\n\n*label converge\n\nThere was a feeling in your gut, however, that all of it was much too easy. You were not prepared for the scene that finally presented itself when you reached the room where the thugs were holding the hostages.\n*page_break\nThe floor was a lake of red flowing towards your feet as you stood at the door. A single light shone in the room, several dangling forms casting horrid shadows against the back wall. The wall behind them had red lettering painted upon it, the slowly shifting liquid dripping down the wall and conforming to the bumps of the concrete.\n\n[i]NEW DAWN[/i].\n\nAs you stared at the brutal scene, you heard gunshots behind you, as well as the loud banging of booted feet. You had heard it before. SWAT was clearing the building. You couldn't be seen here. Not now.\n\nYou rushed out and started climbing up the building once more. You heard the clatter of a cylinder at your feet and saw it roll around, the word \"Flashbang\" printed on the side in black. With a hand up trying to shield your face, you rushed forward. Then the boom hit you.\n*page_break\n\"${surname}. ${surname}!\"\n\nYou opened your eyes to see a figure blotting out the light. The voice beckoned you again and again, shaking you awake. A firm hand was on your shoulder.\n\n\"Another late night? Seriously, you need to pay more attention at work or we'll both get kicked out,\" you heard the voice say as you slowly began to comprehend that the scene around you was that of your workplace.\n\nThe smiling faces of your co-workers surrounded you, yet the scene you'd witnessed that night in the apartment complex still haunted you. It kept you from sleeping at night; instead, you were out on the street looking for clues. It was finally at work where you usually crashed and had to get some sleep.\n\n*if (nation = \"American\")\n\t*choice\n\t\t#I worked at the Governor's office.\n\t\t\t*set work \"governor\"\n\t\t\t*goto_scene governor\n\t\t#I had taken to aid work after the quakes.\n\t\t\t*set work \"aid\"\n\t\t\t*goto_scene aidwork\n*else\n\t*choice\n\t\t#I worked at the consulate.\n\t\t\t*set work \"consulate\"\n\t\t\t*goto_scene consul\n\t\t#I had taken to aid work after the quakes.\n\t\t\t*set work \"aid\"\n\t\t\t*goto_scene aidwork\n", "endgame": "*allow_reuse\n\n*temp turnaway false\n*temp throw_spot false\n*temp workwith false\n*temp offence false\n*temp aggro true\n*temp reissman_escape false\n*temp reissman_dead false\n*temp retiree false\n*temp notam false\n*temp agisense false\n*temp turnaway false\n\n\n*if ((agility) and (senses))\n\t*set agisense true\n*if not (nation = \"American\")\n\t*set notam true\n\nSirens wail throughout the city and the streets fill with the rumbling of trucks as the National Guard mobilizes to the scene. You look down at the square in front of the Star of Pacifica and see the entire area cordoned off by black armoured SUVs and men in black combat fatigues patrolling, armed with assault rifles and SMGs. At the main entrance, men in suits oversee the area, talking into their small in-ear radios to guide the flow of patrols.\n\nIt has the look of an official government operation, but it's far from it. There's no agency involved, only the very same people you'd been seeing throughout your vigilante career: BlackWatch International. None of them have identifying emblems on their outfits, but from your vantage point, you have the perfect angle on the SUVs, the BlackWatch emblem painted on each rooftop.\n\nA light flashing in the corner of your vision draws your attention to the sky, where two helicopters were circling the skyscraper. You see the familiar trail of green and blue streak across the sky as Aurora arrives at the scene. Next, you hear the rumble of more heavily armoured cars and see a hulking man emerge from an SUV at the square, heading in through the main entrance with a group of well-armed men.\n\nThe explosion happens around midway up the Star of Pacifica, creating a hole that stretches across five floors. A rain of paper flows down the south side of the building, and occasionally some rubble or a piece of furniture falls down from the opening. From the lack of smoke, it appears that whatever fire may have been started has already been extinguished by the top-of-the-line sprinkler system.\n*page_break\n*set barrcap \"dead\"\nA fluttering noise from behind draws your attention away from the skyscraper. You see Icarus standing quietly in place at the far end of the roof, folding in his wings. You notice that you're on edge, as you've already lowered into a combat stance by the time your mind manages to identify the figure.\n\n\"Whoa there. Easy, I'm not here to fight. Not you, not them,\" Icarus says, glancing up at the Star of Pacifica. \"I'm here to observe.\"\n\n\"Why?\" you demand, slowly shifting out from the ready stance as the angel-winged man has shown himself as no threat.\n\n\"Because this will lead to nothing significant. Whatever happens here tonight won't bring Barrier back, or end up with Reissman losing his cause. If he's jailed, he'll buy a way out. If he dies, he'll become a martyr for groups we don't want to meddle with. I want to observe what happens, because I need to know what the next step needs to be.\"\n\n\"Barrier?\" you question, a hint of confusion in your voice.\n\n*if (jailpath)\n\t\"You met Barrier at the meeting. He was captured and tortured. When you saw me at the prison, I was trying to recover him, but he was broken. He died a few hours after you escaped.\" \n\t*goto ica1\n*else\n\t\"You met Barrier at the meeting. He was captured and tortured. I tried to recover him from the detainment facility the government's been building. I managed to get him out during New Dawn's assault on the place, but Barrier died a few hours later.\" \n\t*goto ica1\n\n*label ica1\nIcarus has a striking lack of emotion in his voice.\n*label icaquest\n*hide_reuse\n*choice\n\t#\"What's your plan?\"\n\t\t\"I don't have one. I observe and react,\" Icarus says, flashing a quick smile before turning his attention back to the Star of Pacifica.\n\t\t*goto icaquest\n\t#\"Which side are you on?\"\n\t\t\"My own. I wish to see coexistence and acceptance, but none of this will lead to it. Neither the government's Reissman-influenced way, nor the New Dawn's way. We all need to take a stand, and I believe your place is to go over there and see this path to the end, even if no solution will be revealed. If things go right, I have a lead on something. If things go wrong, pressure must be placed from the outside,\" Icarus says, continuing to look over your shoulder. \"There are more of us out there. The United States isn't the only place where the powered can thrive.\"\n\t\t*goto icaquest\n\t#\"What is the government really doing?\"\n\t\t\"Protecting their interests,\" Icarus says, chuckling. \"Interests of politicians, of the military, or corporations and constituents.\"\n\t\t\n\t\t\"How helpful,\" you grumble, and notice Icarus smiling at you in response.\n\t\t*goto icaquest\n\t#\"Who should I side with?\"\n\t\t\"You can't pick either side, you can only choose what feels best for you. Everyone has a side of their own to weigh against any other allegiances.\"\n\t\t\n\t\t\"When did you become so mysterious?\" you ask, receiving a quiet chuckle in response.\n\t\t\n\t\t\"We haven't talked much, have we?\"\n\t\t*goto icaquest\n\t#\"What if I wanted to join you?\"\n\t\t\"You can't. Your path lies over there,\" Icarus says, pointing at the Star of Pacifica. \"Whether you realize it or not, wheels have been turning around you, leading you there. You are an unknown to everyone around you. Nobody trusts you, yet everyone trusts you. You'll hold a great deal of influence on how the world will move forward.\"\n\t\t\n\t\tHe chuckles and turns to look at you.\n\t\t\n\t\t\"I know, mysterious words don't help. But sometimes they're the only thing we have to offer.\"\n\t\t*goto icaquest\n\t#\"Why haven't you come to me before now? We could have figured something out to avoid this.\"\n\t\t\"Perhaps,\" the man says, shaking his head. \"Yet I didn't come to you now, either. I came to see what happens, not to hatch a plan with other heroes or discover a way to stop what's coming to a head.\"\n\t\t*goto icaquest\n\t#Turn away and prepare.\n\t\t*goto preptime\n\n\n*label preptime\n*page_break\nIt's time for you to make your move. You could go for the rooftop access, try and get to the penthouse balcony and enter that way, or rush the main entrance.\n*label appro
