e bronze on either side of their heads unite into a great ovular disks. They sit tall atop no saddle, a true warrior of Mac Conmara has no need of one. The manes of their horses grow long but well kept, few horses of Domnall's own riders stood as tall or bore the same muscles. \n\nOn many of their banners flutter a golden boar on a deep green field, Conchobar's own banner, alongside the banners of Mac Conmara which stands only slightly taller. The riders pull the reigns of their mounts and from side to side the horses sway their heads as they bring their trots to a halt. Through the group another rider emerges, this one with golden spirals trailing as his bronze helm, he bares a of similar hue to Domnall's, but his is longer and oiled so that it shimmers in the sun, with strips of red leather holding the plats in place. Domnall walks to him, an arm reaching out to welcome him, though his face betrays a slight discomfort. The man who can only be Conchobar gives a curt nod, and slides calmly from his horse. He observes the camp around him, betraying little emotion as he walks to his brother's open arms. As the two embrace and the riders begin to dismount, another emerges from the forest. Five hounds that look large enough to tackle a cow run behind, panting alongside the horse's heels. The  very name of Conchobar means 'he who is friend of hounds', it seems Conchobar has taken great pride in that.\n\nThe young rider allows the horse to trot to the sides of the others as they unfasten the brooch at their chest and allow the heavy cloak to fall to the horse's back. They pull from their head the bronze helm, and you see before you a girl scarcely younger than yourself, beautiful like few you have seen before. She observes the camp around her much like Conchobar had with an arched eyebrow. She slides from the horse to the excitable hounds who stand nearly at her own height, though she is by no means short. Conchobar turns and beckons her with a finger, and to his side she strides. You hear little of what's said, but you do pick up Conchobar's words of \"my daughter\", as Domnall embraces her with a somewhat awkward hug. She accepts half-heartedly, and Domnall leads the pair to his tent. The riders lead their horses to the tent, and stand outside it in silence. \nA firm fist jabs your side, and you turn to see Caelan looking at you with a devious smile. \"Did I just see you eying up Domnall's niece? I mean, you're not bad yourself but the heir to the Conmara throne might be slightly out of your reach, ${lad}.\"\n*choice\n      #\"Maybe, so what?\"\n            She raises an eyebrow, and smirks. \"Think you have a chance? Well, you're a surprising ${man}, ${name}. Who knows what the future holds?\" She laughs teasingly at that suggestion.\n            *goto 60\n      #\"I- I was not\"\n            \"'Course not\", she smirks, \"Though if our guest should be looking for a short fling, you'll be the ${lad} I should recommend, I take it?\"\n            *goto 60\n            \n      #\"I'm not really attracted to women\"\n            *goto 59\n\n\n*label 59\nShe raises an eyebrow at you, then seeing you're serious, she gives a nod. She looks around for a moment and an awkward silence hangs over you both. After a few moments, she says, \"Can't believe I've been told to get the feast stuff read, but hey, I better get back to it.\" She stands up and walks to the men at work. Though her voice was hard to read, you might have heard an element of… disappointment in it? \n*set Caelan -10\n*goto 61\n\n\n*label 60\n*choice\n      #\"She'd be lucky to have me!\"\n            She laughs at that, \"You mightn't be as highborn as her, but you have the confidence to be.\"\n            *set Caelan +7\n            *set Proud +5\n            *set Humble -5\n            *goto 63\n            \n      #\"Don't you dare\" (Joking)\n            She hangs her head back and laughs, \"Getting all defensive about her, huh? Don't worry, your little crush secret is safe with me. Good thing too, her father is known to be quite the tough man for would-be suitors to get around.\"\n            *set Caelan +6\n            *set Proud +5\n            *set Humble -5\n            *set Wistful -4\n            *set Sharp +4\n            *goto 63\n            \n      #\"It's not funny\" (Serious)\n            She looks at you surprised, reading you for a hint of humour, before seeing you're serious. She widens her eyes momentarily, and says \"Sorry. Didn't realise you had the sense of humour of a corpse.\"\n            *choice\n                  #\"Quite a ${handsome} corpse I'd make, though\"\n                        That forces a smile on her lips, and she tilts her head, \"Well if you do say so, ${name}.\"\n                        *set Caelan +5\n                        *set Proud +5\n                        *set Humble -5\n                        *set Wistful -4\n                        *set Sharp +4\n                        *goto 63\n                        \n                  #\"Sorry, I'm a little tense\"\n                        She rolls her eyes and nods, \"No problem. We all are a little, these days.\"\n                        *set Caelan -5\n                        *goto 63\n                  #\"How dare you speak to me like that?\"\n                       Her eyes widen further, and she stands up. \"I regret interrupting your ogling, ${name}. Seems you're better fun in a fight than a conversation. Slán.\" She walks off, irritation visible even from the way she moves.\n                       *set Caelan -15\n                       *goto 61\n\n*label 63\nYou both notice Domnall's niece, Sadhbh, as she emerges from the tent, and Caelan nudges you with her elbow, \"There she is, look, your one and only!\" she whispers teasingly. \"She doesn't look bad at all, in fact, I don't half blame you.\"\n*choice\n      #\"She does look great\" \n            She chuckles. \"Anyways…\" She stands up and stretches, \"Good to chat, ${name}. I had best get back to work.\" With that, she heads back over swiftly to where the great banquet table is being assembled.\n            \n            *goto 61 \n            \n      #\"Almost as kind on the eyes as yourself\"\n            She's taken a little aback by that, and her smile disappears for a moment as her cheeks redden. Then she composes herself and gives you a giddy grin.\n            *set Wistful -4\n            *set Sharp +4\n            *set Caelan +10\n            *set Charisma +4\n            *set Caelanromance +1\n            *goto 64\n            \n      #\"Eh, she's not really my type\"\n            \"Since when are your standards higher than the heir of the Conmara clan?\" Caelan asks with a raised eyebrow.\n            *choice\n                  #\"Since I saw you\"\n                        She's taken a little aback by that, and her smile disappears for a moment as her cheeks redden. Then she composes herself and gives you a giddy grin.\n                        *set Wistful -4\n                        *set Sharp +4\n                        *set Caelan +10\n                        *set Charisma +4\n                        *set Caelanromance +1\n                        *goto 64\n            \n                        \n                  #\"Not sure, she's just not for me\"\n                        She shrugs, \"Fair enough.\" She stands up and stretches, \"Well good to chat, ${name}. I had best get back to work.\" With that, she heads back over swiftly to where the great banquet table is being assembled.\n                        *set Caelan -4\n                        *goto 61\n            \n\n\n\n\n*label 64\nSmiling, she stands. \"I better get back to work, ${name}.\" She pauses for a moment, and then says \"Perhaps this evening in the feast you'll grace me with your presence?\" She grins at her own exaggerated formalities and heads off towards the workers before you can reply. It seems you've made quite a friend of her, or very likely, something much more.\n*goto 61\n\n\n\n\n\n\n\n\n\n\n\n\n*label 61\n*page_break \"You there, ${boy}!\"\nYou turn and see Sadhbh, Conchobar's daughter. She's walking over to you hurriedly, guiding her own horse behind her by the reigns. \"Tie my horse somewhere safe, ${boy}. Food and water aswell. Anything happens to her and I'll kill you myself.\" She holds the reigns before her and raises her eyebrows impatiently, willing you to take them, and so you do. Before your fingers have even wrapped around the reigns, she turns dismissively and is about to head back to go to Domnall's tent. \n*choice\n      #\"Wait\"\n            She stops and turns to you, looking you up and down. She asks you \"What?\" with a scowl.\n            *choice\n                  \n                  #I hadn't thought this far...\n                        One of her eyes widen in reaction to your indecisiveness, \"Get to it, ${boy}.\" She walks off to Domnall's tent, and you feel your flustered face redden. You tie the horse up, and as you do so Diarmuid taps your shoulder. \"${name}, you won't believe it, but Domnall's asked that I of all people play a tune at the feast!\"\n                        *set Sadhbh -3     \n                        *goto 62\n                  #Try to start a conversation with her\n                        *if Charisma >40\n                              Confidently and clearly, you ask her, \"What brings you to these parts, milady?\" She seems to have an inner debate with herself for a moment, and then shrugs. \"Your 'high and mighty' wanted my father to visit for a feast,\" she looks around the camp unimpressed, \"Though why my father agreed to come to a place like this I'll never know.\" When she seems about to move away, Diarmuid buts in, \"Wise and beautiful Sadhbh, Domnall has asked I perform at the feast, I'm sure you'll love it.\" She looks at him for a moment, and then just says \"Oh,\" making no effort to sound interested. She glances to you, and gives a nod, \"Perhaps I'll see you at the feast too. Don't forget my mare's food.\" She walks off, leaving you with a slightly disappointed looking Diarmuid.\n                              *set Sadhbh +10\n                              *goto 62\n                        *else\n                              Though your words are well thought, they come out jumbled and nervous-sounding. \"So... you're here for the feast, huh?\" She nods uncommitedly, and gives an awkward \"Anyway…\" as she turns away. You feel red creep up your face as Diarmuid taps your shoulder. \"${name}, you won't believe it, but Domnall's asked that I of all people play a tune at the feast!\"\n                              *set Sadhbh -3     \n                              *goto 62\n      #Do as she commands\n            As you tie up the poorly dispositioned mare, you feel Domnall's fingers excitedly tapping your back for attention. \"${name}, you won't believe it, but Domnall's asked that I of all people play a tune at the feast!\"\n            *goto 62\n            \n            \n\n            \n\n*label 62\nThe rest of the day floats by rather quickly, and before long the sun has begun to set. You could hear Diarmuid's practicing for most of the day, along with Caelan's urgent setting up for the feast. Now all is set up, and Diarmuid sits quietly beside his tent, the nerves beginning to take hold.\n*page_break The feast begins\nThe sky has turned a navy as the sun has slipped under the hills and trees. A great fire has been lit, around which the people of the camp sit and feast, the captains and leaders and highest knights sit along the great banquet table, while others like you feast and drink with legs crossed. After several minutes, Domnall raises his two hands above his head and claps them for silence. Looking around the crowd for his musician, he calls out, \"Diarmuid, you may play now\".\n\nDiarmuid holds his instrument tight as he walks to the center of the feast, there sits a long table laden with fanciful displays of cherries and foreign fruits and honeyed wine. Next to the Conchobar and Domnall at the head of the table, sits Conchobar's daughter. Domnall gives him a distracted nod to play, and there follows whistles and hoots by some of the knights. He ignores them as best he can, and begins to play. He strums his strings slowly at first, with the chatter and laughter Conchobar's men all but drowning his tune out, but on he plays. His fingers flick across the strings quicker and quicker, going through the motions as he'd painfully rehearsed a hundred times, and the droning tune of muffled laughter around him soon dims, giving way to his own sound. Several men and women at the table tap their fingers against their plates in rhythm with the music. Soon the chorus comes 'round, and Diarmuid's voice brakes into song. The encouragement of the drumming fingers had given him a new confidence and fervor entirely, and he begins to sing the words out delightedly, \n\n\"The rain, it lashed and poured and slashed\nas on the ground men's skulls were smashed!\nand on the ground there leapt and bound\nhalf-a-hundred o' the queen's finest hound'!\"\n\nBy now the drumming of fingers have turned to the slapping of palms and chalices on the red wooden table and the people, though ignorant of the words, hum and chant along to his tune,\n\"The king he ran through river and field\nfor his life, his life he wished not to yield!\nThe rain, the rain, it poured and lashed\nas on the ground men's throats were slashed!\"\n\nHands clapping and guests shouting along drown out his voice and string, but it made no matter, the people were loving his song. These people, some cruel and ignorant, were in love with his song. Surely that in and of itself was something to sing about!\n*choice\n    \n    #Sing along\n        \n        You belt your heart out as the whole camp comes alive.\n        \n        *set Charisma +4\n        *goto 54\n    #Join in the dance\n        You jump into the small crowd that's gathered in front of the feasting table and dance up a jig. There's a tussle and bustle in the crowd as people bump off each other in their excitement.\n        *set Charisma +4\n        *goto 54\n    #Cheer on Diarmuid\n        Theres a twinkle in his eye when you shout out his name, and he gives you a quick wink.\n        *set Diarmuid +3\n        *goto 54\n      \n      \n\n*label 54\nEven Conchobar has taken to swinging his head from side to side along with the music, and several of the knights have stood up from their feast as another course is brought out, this one an array of cheeses and berries and crisp flat bread. Diarmuid danced with energy as he sung, kicking his heels against the grass as the knights and warriors and nobles  join him in dance. It's a mess as the servants with heavy platters and tankards try to get through the dancers. One servant's knocked off balance by a young lady who had been spinning in circles, and clattered to the ground along with his jug of wine. The jug smashed and the red wine spilled like bloodied water in the grass. The dancers take no mind of it, and dance over and through the mess as the servant hurriedly collects the broken pottery pieces. You notice Caelan standing not far from you, tapping her feet to the music and laughing at the wonderful chaos around her. \n\nOne of the younger squires, around the same age as Sadhbh, makes his way nervously to where she sits. He's red in the cheeks, spurred on by a touch of the drink, you guess. He gestures for her to join him for a dance. Conchobar gives him a smirk that could break a man, and Sadhbh gives him a shake of her head in a way that questioned how he could have possibly thought she'd agree. One of the squire's friends gives him a cup of drink to raise his spirits. It seems to work, for not two verses later the boy has found another dance partner who twirls excitedly next to him, giggles and shrieks erupting from the pair as they spin.\nThen even Conchobar stands up to dance, and drags his reluctant daughter to the floor.\n\nIn what feels like no time at all, the ballad comes to an end, and the dancers hug and pant and give weary laughs. Just then you do not notice the two figures in dark brown cloaks as they walk to the table.\nJust then you were not paying attention to them as they whispered in Domnall's ear, and handed him a parchment. \nAnd just then, as Domnall's face reddened, the lifetime of those two men were cut short.\n\nThe few remaining dancers on the floor return hurriedly to their seats upon seeing Domnall's face. The camp goes quiet and all eyes are on Domnall as he shakes his head. Conchobar whispers something in his ear as the two messengers stand there awkwardly. Domnall thinks on the words his brother had whispered for a moment, and nods his head. \n\nHe stands up slowly, taking a deep breath, and commands them; \"You both shall follow me to my tent. Now. The rest of you, please enjoy the feast.\" Conchobar interrupts as Domnall turns to go to his tent, \"Surely, brother, you should let your men know. Each one would gladly give his life for you, they deserve to hear the truth.\" All eyes look to Domnall now, he gives his brother a look of irritation only someone looking very carefully would notice, and nods. \"These warriors, here.\" He gestures to the two who look nervously on. \"They have failed. Of the troop I sent earlier to seize Medb's head, these two are all that remain.\" Murmurs flicker across the camp. \"Without killing the great blasphemer, they tucked tail and ran to me, leaving their fallen brothers and sisters dead for nothing.\" One of the two splutters, \"My liege, we could not possibly win, they were waiting for us in the forests and came down from the trees and up from the bushes.\" Domnall looks distraught. Seeing his brother's indecisiveness, Conchobar stands and declares through bared teeth, \"And because of your carelessness, Gan Stad burns!\" Conchobar's men curse at the two, and begin throwing anything from apples to wooden bowls at the two. \nThe two stand bravely, pathetically. Domnall's face goes solemn, and he sits down once more. Conchobar does the same, but with a face strained as if hiding a grin. The two warriors know better than to run, and still they stand, trying to hide the pain on their faces as the missiles strike them. Sadhbh grimaces beside her father at the table and looks away.\nDiarmuid stands near the two, his face the very picture of hopelessness. The flickering light of the torches illuminates for a moment a wetness under his eyes.\nHe walks, you can tell embarrassed by his tears, from the camp center toward the toilets. No one pays any mind to him as he disappears from the limelight and into the shadowy area beyond the campfire. His hand fiddles with his belt and he pulls from it with two fingers a single vial. A vial, you can see, of asling.\n*goto 80\n*label 80\nWhat will you do now?\nThe messengers are still being pelted relentlessly with fruits and whatever can be found on the table.\n*choice\n    \n    \n    *hide_reuse #Go after Diarmuid\n        \n        \n        *set chapter4 +1\n        *goto 55\n    *hide_reuse #Talk to Caelan\n        *set chapter4 +1\n        *goto 68\n            \n    *if chapter4 =3\n        \n        \n        #Call out for Domnall to stop this\n            \n            \n            *set Ruthless -4\n            *set Compassionate +4\n                \n            *set triedtosave +1\n            *set Caelan +5\n            *goto 65\n    *if chapter4 =2\n        #It's time to get some sleep\n            \n            \n                \n            *goto 67\n            \n      \n      \n\n*label 65\nDomnall's head turns to you as your voice cuts through the chaos, and those around you take a step back so he can better see you. The pelting wanes as the attention of those feasting turns to you. Conchobar, who had been smirking moments ago at the humiliation unfolding, stands and glares at you. Domnall looks as if he'd been woken from a bad dream at your call of protest, looking then to the messengers who look now as if they are struggling to stand in their weariness and pain.\n\nConchobar grumbles something in Domnall's ear, his words are inaudible though the haste in his commanding voice is clear. Domnall looks top you, his face trying to be firm, though his eyes betray his inner conflict. Perhaps you can talk some sense into him?\n*set savemessenger +1\n*choice\n      #Appeal to Domnall's morals\n          *set Ruthless -4\n          *set Compassionate +4\n          \n          *if Charisma >45\n              \n              \n              \n             \n              Your words have strength behind them, and your voice clear and reasoning. Conchobar's eyes flicker around the camp, calculating his best move. Even his men, who had been doing the most throwing, look unsure, some even looking to the messengers with remorse. Conchobar breathes in, ready to scold you like a child by the look on his face, but Domnall raises his fist for silence. His face is firm, but his eyes betray a silent agreement with your words. \"It is not often I would take a questioning of my god-guided judgement lightly.\" You have put him in a difficult situation, you can only hope Domnall is willing to swallow some of his pride. \"But I can see your words do hold reason. The messengers have been punished enough. ${name}, bring them to a tent and give to them drink and warm clothing. Their cowardice is not a mistake either of them are likely to make again.\" You do as he says. They are bruised and bloodied from the onslaught, gratefully they accept the wine you give them, and collapse into their tent exhausted.\n              \n              *set Domnall +8\n              *set Caelan +6\n              *goto 67\n                  \n          *else\n              \n              \n              Though your words of mercy seem to strike a chord in Domnall, Conchobar's men grumble in dismay at someone who would question their chieftain's judgement. Your moral voice may have some volume, but the grumbling around the camp seems to hold far more sway. Domnall raises a fist for the muttering to cease, though his face looks like a strong man defeated. \"I will not have my god-guided judgement questioned in my own camp. Speak no more, ${boy}, and let justice be served.\"\n              \n              \n              *set Domnall -5\n              *goto 67\n         \n            \n      #Question whether his ancestors would have approved\n          \n          \n          *if Intelligence >45\n              \n              \n              Your words have strength behind them, and your voice clear and reasoning. You call out the names of his ancestors each, \"Niall Mac Conmara, Corpri Mac Conmara, Ailill Mac Conmara and Diermait Mac Conmara.\" All greats of the clan's past, each one etched in the psyche of the warriors through legend and myth, and each one most, importantly, men and women of honour and morals. Conchobar's eyes flicker around the camp, calculating his best move. Even his men, who had been doing the most throwing, look unsure, with some even looking to the messengers with remorse. Conchobar breathes in, ready to scold you like a child by the look on his face, but Domnall raises his fist for silence. His face is firm, but his eyes betray a silent agreement with your words. \"It is not often I would take a questioning of my god-guided judgement lightly.\" You have put him in a difficult situation, you can only hope Domnall is willing to swallow some of his pride. \"But I can see your words do hold reason. The messengers have been punished enough. ${name}, bring them to a tent and give to them drink and warm clothing. Their cowardice is not a mistake either of them are likely to make again.\" You do as he says. They are bruised and bloodied from the onslaught, gratefully they accept the wine you give them, and collapse into their tent exhausted.\n              \n              \n              *set Domnall +8\n              *set Caelan +6\n              *goto 67\n                  \n          *else\n              \n               \n               \n              Though your words of mercy seem to strike a chord in Domnall, Conchobar's men grumble in dismay at someone who would question their chieftain's judgement. Your knowledge of his ancestors is weak, and their names come out mispronounced and jumbled. Though your moral voice may have some volume, but the grumbling around the camp seems to hold far more sway. Domnall raises a fist for the muttering to cease, though his face looks like a strong man defeated. \"I will not have my god-guided judgement questioned in my own camp. Speak no more, ${boy}, and let justice be served.\"\n              \n              \n               \n              *set Domnall -5\n              *goto 67\n            \n\n      #Stay silent, let my stare speak for me\n          \n          While Domnall to you, his eyes betraying an inner conflict, Conchobar's men grumble in dismay at someone who would question their chieftain's judgement. The grumbling around the camp seems to hold far more sway than your silence. Domnall raises a fist for the muttering to cease, though his face looks like a strong man defeated. \"I will not have my god-guided judgement questioned in my own camp. Speak no more, ${boy}, and let justice be served.\"\n          \n          *set Domnall -5\n          *goto 67\n*label 55\nIt doesn't take long to find him, he's wandering around groggily, bearing something small in his fists. He doesn't seem to notice you In sudden jerk movement, he lifts his wrist to his mouth and bites down hard. He waves his hand after, shaking the pain that had shot through her knuckles. You hadn't realised how tensed his body was until he then relaxes it. It seems a pained calmness has enveloped him. In moments, however, the tenseness returns to his body, and he fumbles hastily to pour a drop of asling onto his tongue. \n*choice\n      #\"Stop!\"\n            His head turns to you in panic as the liquid falls to his tongue, \"${name}, it's- I…\", he splutters for a moments, before his words slur 'till barely audible. \n            *goto 56\n            \n      #Stay silent\n            The liquid falls to his tongue and his eyes half close in anticipation. He turns to sit down, and before you can do anything, he sees you. His eyes go wide in panic as the liquid slips down his throat, \"${name}, it's- I…\", he splutters for a moments, before his words slur 'till barely audible. \n            *goto 56\n      \n*label 56\nHe'd taken too much in his panic, and his effort to speak fades. He lets himself slide drowsily down the side of a wooden crate to the ground, and squints so that his lashes can blur out the light of the torches and the colours of the night. His tongue would be numb by now, like a big wet lump in his mouth. He smiles dumbly as the rest of the world quietens around him, and he breathes out a gentle song, slurred and slow, \n\"The king of Cuan Fearlann both\nfell to the foreign queen and host,\nhe rolled like babe under Dagda's sun,\nas castles crumbled under the foreign hun\". \n\nIt is several minutes until he wakes from his trance, and though still drowsy, his eyes widen in the realisation that you had been there to witness him in that state. \"Uh…  ${name}… you shouldn't… have seen.\" His eyes flicker open and close uncontrollably as he speaks, and his breathing is uneven. As he writhes weakly in the grass, you see a flicker of torchlight reflecting on glass. On the ground lies another vial of asling, one that must have fallen from his belt. It's contents glisten beautifully, as if beckoning you. Diarmuid's groans fade as he keels over in the ground and his eyes close. He's breathing alright, he'll survive. Anyone would react like that to the dose he had, though only a drop is needed to feel a pleasure nearly as strong. Never had you tried the stuff before even when you had been badly injured, expensive as it was. It seems rare opportunity has appeared before you, an opportunity to experience an inhuman world of pleasure.\n*choice\n      #Swallow just a drop\n            You pick the vial up, though it's light in your fingers the weight of the knowledge of what's inside makes you grasp it tight. You pull open the clasp and press it to your lips, blocking the hole with your tongue, before letting almost half the vial drip to the bottom of your mouth, and spread like a pool under your tongue. Your tongue goes numb, and you like how big it feels in your mouth. You push the wet lump against your lips. As the rest of the world quietens, a sweeter tune breathes into her mind's ear. The wordless tune of what Diarmuid had played whistles through your mind. As if entranced, your head waves slowly from side to side. You feel your heart beat like a brass drum as the music fills your head, and loose yourself in it. You feel like shivering under it's spell. Your heart beats like it wishes to break out of your chest. You feel it's spirit of pleasure wisping around your stomach and down your legs, through every part of your being. Your head falls back and you breathe out as the delicious beat of the music shakes you. Though much of you below the waist has gone numb, you let your knees tighten and relax in rhythm with the sweet song. More feeling eventually begins to soak into your tongue as you wash it across the back the inside of your lips again and again as the music within you digests and becomes part of you. Your toes curl as the burning music within you slows, and dissolved into the walls of your belly, your heaving chest and slips from your thighs down to your calves and disappears into the soles of your feet. You lie there for some time, lost in mindless thought, the cool night air kissing your face and sending pleasant shivers across you. When the feeling returns to your body, you drowsily get up and make your way back to the camp.\n            *set Addiction +40\n            *achieve asling\n            *goto 80\n           \n      #Take a small gulp\n            You pick the vial up, though it's light in your fingers the weight of the knowledge of what's inside makes you grasp it tight. You pull open the clasp and press it to your lips, blocking the hole with your tongue, before letting a single drop drip to the bottom of your mouth, and spread like a tiny pool under your tongue. Your tongue goes numb, and you like how big it feels in your mouth. You push the wet lump against your lips. As the rest of the world quietens, a sweeter tune breathes into her mind's ear. The wordless tune of what Diarmuid had played whistles through your mind. As if entranced, your head waves slowly from side to side. You feel your heart beat like a brass drum as the music fills your head, and loose yourself in it. You feel like shivering under it's spell. Your heart beats like it wishes to break out of your chest. You feel it's spirit of pleasure wisping around your stomach and down your legs, through every part of your being. Your head falls back and you breathe out as the delicious beat of the music shakes you. Though much of you below the waist has gone numb, you let your knees tighten and relax in rhythm with the sweet song. More feeling eventually begins to soak into your tongue as you wash it across the back the inside of your lips again and again as the music within you digests and becomes part of you. Your toes curl as the burning music within you slows, and dissolved into the walls of your belly, your heaving chest and slips from your thighs down to your calves and disappears into the soles of your feet. You lie there for some time, lost in mindless thought, the cool night air kissing your face and sending pleasant shivers across you. When the feeling returns to your body, you drowsily get up and make your way back to the camp.\n            *set Addiction +20\n            *achieve asling\n            *goto 80\n            \n      #Call for someone to help him\n            You are about to go for help, but before you do a thought pops into your head. If you were one day injured and in agony, a vial like that might be something that could come in handy? \n            \n            *choice\n                  \n                  #Take the vial\n                        It's for the best, you tell yourself as you slip it into your pocket. Strange, even from within your pocket the stuff seems to be calling you. You run back to the camp and beckon for the only man with any understanding of the stuff to come and help, Cathal. When he reaches Diarmuid, he stands over him shaking his head. \"Stupid, stupid ${lad}. You did well to tell me. Bring him to my tent and I'll tend to him, dealing with an unconscious fool should be more interesting than the show on display, truth be told.\" It's not easy, but you manage to drag his limp body to Cathal's tent. Scattered throughout the tent are perhaps hundreds of jars and caskets filled with objects of strange colour and stranger shapes. You heave Diarmuid onto the makeshift bed; a chest covered in blankets. Cathal thanks you and waves you away, and to the feasting area you return.\n                        *set Aslingvial +1\n                        *goto 80\n                  \n                 \n                  #Leave it\n                        You turn and head back to the camp, leaving Diarmuid in the grass slipping in and out of consciousness. He'll be fine, it's far more important that you don't allow yourself to get caught up in what you can't fully understand nor control. You run back to the camp and beckon for the only man with any understanding of the stuff to come and help, Cathal. When he reaches Diarmuid, he stands over him shaking his head. \"Stupid, stupid ${lad}. You did well to tell me. Bring him to my tent and I'll tend to him, dealing with an unconscious fool should be more interesting than the show on display, truth be told.\" It's not easy, but you manage to drag his limp body to Cathal's tent. Scattered throughout the tent are perhaps hundreds of jars and caskets filled with objects of strange colour and stranger shapes. You heave Diarmuid onto the makeshift bed; a chest covered in blankets. Cathal thanks you and waves you away, and to the feasting area you return.\n                        \n                        *set Ruthless +4\n                        *set Compassionate -4\n                        *goto 80\n                  \n      #No... I walk away\n            The juice of pleasure and healing is not to be played with, you know. Diarmuid was foolish, and after seeing the state it left him in you would be far more foolish to try some. Though, if you were one day injured and in agony, it might be something that could come in handy? Besides, Diarmuid will only waste it for his own pleasure, and perhaps do himself harm.\n            *choice\n                  #Take the vial\n                        It's for the best, you tell yourself as you slip it into your pocket. Strange, even from within your pocket the stuff seems to be calling you. You head back to the camp leaving Diarmuid in the grass slipping in and out of consciousness.\n                        *set Aslingvial +1\n                        *goto 80\n                  #Leave it\n                        You turn and head back to the camp, leaving Diarmuid in the grass slipping in and out of consciousness. He'll be fine, it's far more important that you don't allow yourself to get caught up in what you can't fully understand nor control.\n                        *set Ruthless +4\n                        *set Compassionate -4\n                        *goto 80\n                  \n*label 67\nThe atmosphere of the camp feast has all but disappeared, and the crowd begins to disperse. Domnall looks stricken with guilt as he stands from the feasting table, and Conchobar gives him a firm pat on the shoulder before turning and heading to his own tent. \n*if savemessenger =1\n      As you walk to your own tent, someone bumps into your shoulder, nearly knocking you off balance. It's Caelan, you hadn't seen her in the dark, and she wears a grin on her face. \"You did the right thing for those two, ${name}. That wasn't easy. I'll see you tomorrow.\"\n      *if Caelanromance =1\n            She gives you a quick kiss on the cheek, then disappearing into the darkness before you can respond. You can feel warm spot where her lips touched you as you get into your tent.\n            *goto 70\n      *else\n            She punches your shoulder cheekily,  then disappearing into the darkness before you can respond.\n            *goto 70\n*else\n      *goto 70\n\n*label 68\nCaelan smiles when she sees you coming to her, and grimaces as an apple flies over her head towards the messengers. \"This… this is awful.\" Tonight she wears a sleeveless tunic, and for the first time you can see just how large her burn mark is. It wraps around her shoulder and halfway down her arm, and the red tormented skin winds like a river from under her neckline up just past her chin. She notices you looking at it.\n*choice\n      #Redirect the conversation\n            You try to get her talking about her past, and what she did to become a master of shoulder-and-elbow fighting. She gives you one sentence answers mostly, her eyes still flinch with each grunt of pain from the two warriors. She's rubbing the burns on her arm shyly now.\n            *goto 69\n            \n      #\"You're scars are... beautiful\"\n            She looks at you, surprised and wary. When she finds no cynicism in your eyes, she gives an awkward \"thanks\", and looks away to the feasting table, rubbing the burns on her arm somewhat shyly. Perhaps it's the flicker of flame, or perhaps the cool night air, but when she turns you see a gentle red creep up her neck.\n            *set Caelan +5\n            *goto 69\n            \n      #\"How did you get them?\"\n            She looks at you warily, \"I got them at the siege of Baile Oihir…\" It was a great defeat for our people, and a day I'd rather not think on.\"\n            *choice\n                  #Press for more information\n                        She looks about to speak, and then shakes her head firmly. \"I said I'd rather not think on it, didn't I?\" There's irritation in her voice, but you can tell there's also a sadness behind it.\n                        *set Caelan -2\n                        *goto 69\n                        \n                  #\"I see...\"\n                        *goto 69\n                  \n                  \n*label 69\n\"Anyway, ${name}, I don't think I can watch this any longer, I think I'll head to my tent. Night, ${name}.\" With that she walks from the glowing center of the camp, and through the darkness towards her tent.\n*goto 80\n\n\n\n*label 70\nOnly as you lie down in your sheets do you realise just how tired you are. Sleep takes hold quickly, and this day begins to fade into the next.\n\n*finish\n                  \n\n\n\n\n\n\n\n\n      \n\n\n\n\n", "chapter5": "*image chapter5pic.jpg\n\n\nYou awake to Diarmuid's gruff voice. He stands outside your tent impatiently, calling for you to wake up. As you open the tent flaps you can see the events of last night have not left him unscathed, weary bags hang under his eyes and his hair is splayed out like a raven's nest. \"The Sadhbh girl wants you, ${name}, for some reason. She's been yapping for her 'horse ${boy}' and Conchobar wants his daughter's wish fulfilled.\" \n*if Diarmuidromance = 1\n     Though tired and croaky his voice is, you notice a slight tinge of jealousy hanging off his tongue.\n     *goto 72\n*else\n      *goto 72\n\n*label 72\nYou dress quickly, and  head to  Conchobar's tent. The morning sun forces your eyes to squint, though still you can see many of the camp are as worse off as Diarmuid. The night of drinking and gods-know-what has left the men unfit for a days work. As you arrive up to the tent a whiff of crushed berries being cooked greets you. You stand at the entrance, unsure if you should step in or wait, before Sadhbh bursts out. \"Took long enough\" she says as she walks by you without looking at you. She walks a few paces, then looks back at you with a raised eyebrow. She tilts her head for you to follow and continues on towards the stables with you at her heels. \n\n\"I'm taking Fiadh for a ride, Horse ${boy}, and my father demanded I bring an escort. I hope you're a fair rider.\" She arrives at where the horses are tied, and straps reigns to the prize red-brown stallion, presumably Fiadh. She gestures for you to take the older stallion. His head hangs low and his hair is stringy and straggly. Grey fur is speckled with black and deep brown. He is compliant, but reluctant, as you don on him his reigns. It is only moments later that you are riding alongside Sadhbh, or rather, several meters behind on your inferior mount. She calls for you to hurry, but your horse barely reacts to the taps of your heels on his sides. You can hear Sadhbh laugh as her ride leaps over protruding roots and splashes through puddles. Before long she is riding among the trees, so far ahead that the shape of her horse and her flickers in and out of sight between the vertical bars of the trees.\n\nYou catch up eventually, she was resting under a hawthorn tree with her mount, foamy sweat leaking through his fur. Your own mount's panting competes with the call of the birds and scuttling noises in the undergrowth, which all fill the forest air. Sadhbh too, is almost breathless, stroking the mane of Fiadh as she collects herself. She turns, and as rarely appears on her face, a giddy smile forms. \n*choice\n      #\"What are we doing?\"\n            She gestures around as if it's stupidly obvious, \"We're riding, obviously. I'd thought a Horse ${boy}, of all people, would know that.\"\n            *choice\n                  #\"Don't call me a 'Horse ${boy}'\"\n                        She rolls her eyes, \"He who's petty with names will never make a name for himself.\" She pauses at her words, and whispers them to herself. \"Huh\" she says with self-satisfaction, \"I could be a poet.\" Her arrogance is comical, she starts muttering then her own little rhymes, amazed by her own words. Then she turns to you, \"Since you are unlikely to make a name for yourself in any case, you might as well tell me you name, if you told me, If you've told me before I can't remember.\" You tell her your name.You know she's trying to tease you, whatever's going on in her pompous head is beyond you, and yet somehow her smiles are charming.\n                        *set Proud +2\n                        *set Humble -2\n                        *goto 73\n                  #\"My name's ${name}\"\n                       She rolls her eyes, \"He who's petty with names will never make a name for himself.\" She pauses at her words, and whispers them to herself. \"Huh\" she says with self-satisfaction, \"I could be a poet.\" Her arrogance is comical, she starts muttering then her own little rhymes, amazed by her own words. Then she turns to you, \"Since you are unlikely to make a name for yourself in any case, I suppose It matters not that you're petty. Sorry if I forget it, I'm not so good with names.\" You know she's trying to tease you, whatever's going on in her pompous head is beyond you, and yet somehow her smiles are charming.\n                       \n                       *goto 73 \n            \n      #\"Why did you choose me to come?\"\n            \"Isn't it obvious, Horse ${boy}? You're a horse ${boy}.\"\n            *choice\n                  #\"Don't call me a 'Horse ${boy}'\"\n                        She rolls her eyes, \"He who's petty with names will never make a name for himself.\" She pauses at her words, and whispers them to herself. \"Huh\" she says with self-satisfaction, \"I could be a poet.\" Her arrogance is comical, she starts muttering then her own little rhymes, amazed by her own words. Then she turns to you, \"Since you are unlikely to make a name for yourself in any case, you might as well tell me you name, if you told me, If you've told me before I can't remember.\" You tell her your name.You know she's trying to tease you, whatever's going on in her pompous head is beyond you, and yet somehow her smiles are charming.\n                        *set Proud +2\n                        *set Humble -2\n                        *goto 73\n                  #\"My name's ${name}\"\n                       She rolls her eyes, \"He who's petty with names will never make a name for himself.\" She pauses at her words, and whispers them to herself. \"Huh\" she says with self-satisfaction, \"I could be a poet.\" Her arrogance is comical, she starts muttering then her own little rhymes, amazed by her own words. Then she turns to you, \"Since you are unlikely to make a name for yourself in any case, I suppose It matters not that you're petty. Sorry if I forget it, I'm not so good with names.\" You know she's trying to tease you, whatever's going on in her pompous head is beyond you, and yet somehow her smiles are charming.\n                       *goto 73 \n            \n            \n      #Stay quiet\n            *goto 73\n      \n      \n*label 73\n\"To answer your question, ${name}, I wanted to go riding, my father said I needed security. The guard that usually rides with me smells of stale goat's milk and fish, so I decided I'd bring the ${boy} I met yesterday.\"\n\n*if triedtosave =1\n      *goto 76\n*else\n      *goto 75\n*label 76\n      \nShe continues, \"I didn't tell him it was the one who tried to stop the messenger's punishment, there's no way he would have agreed to it then.\" She leans against the great oak behind her, and slides down so that she sits on the toots that protrude from the earth. She turn her head and looks at you curiously, \"Why did you try to save them, by the way? Poor souls, I know, but were they worth defying your chieftain over?\"\n*choice\n    \n    \n    #\"It was a stupid mistake\"\n        \n        \n        She nods knowingly, \"Sometimes we all get these fits of feeling honorable, then sink back to earth with the rest of the mortals.\"\n        \n        \n        *set Proud -2\n        *set Humble +2\n        *set Sadhbh -4\n        *goto 75\n    #\"Someone needed to stand up for them\"\n        She smirks \"Very honorable of you indeed, ${name}.\" There's a sad pause for a moment. \"Didn't do anyone any good in the end, though, did it?\"\n        *set Proud +2\n        *set Humble -2\n        *set Sadhbh +5\n        *goto 75\n    #\"I couldn't just say nothing\"\n             \n        She smirks \"Very honorable of you indeed, ${name}.\" There's a sad pause for a moment. \"Didn't do anyone any good in the end, though, did it?\"\n        *set Proud +2\n        *set Humble -2\n        *set Sadhbh +5\n        *goto 75\n*label 75\nShe beckons Fiadh to her with the clicking of her tongue, and offers him oats from the sack at her belt. \"I suppose that wasn't exactly the only reason for choosing you though, ${name}. I guess you could say you've piqued my interest…\"\n*choice\n      #Sit down beside her\n            She shuffles to the side so you can sit next to her, and her eyes hold yours for a flickering moment. Sadhbh seems unsure what to say, and you suddenly feel awkward where you stand. Furiously, you notice a slight hot red feeling creep up your cheeks, and the more you notice it, the worse it becomes. Why is it, do you think?\n            *choice\n                  #I think... I fancy her\n                        She is effortlessly elegant where she sits, and you envy her calmness. A feeling somewhere between nausea and fear and excitement floats within you as you glance at her. She looks up at you and smiles, calming and yet panicking all at once. Your knees are numb, and yet beckoned by her smile they sit you down beside her.\n                        *goto 77\n                  #She's like royalty\n                        Daughter of one of the great chieftains of the Fearlanns, and she's chosen to spend much of her day with you. What it means you can't be sure, but it certainly reflects well on you one way or another.\n                        *goto 78\n                        \n                        \n                        \n                        \n                  #Something about her manner makes me uneasy\n                        She has an air of superiority, that's true. She seems cunning, manipulative, even. It might be best to stay on a person like this' good side.\n                        *goto 78\n\n            \n      #Pet her horse as she speaks\n            You move to Fiadh and stroke his mane, but the horse horse turns away from you, far more interested in the oats in Sadhbh's palm. Sadhbh seems unsure what to say, and you suddenly feel awkward where you stand. Furiously, you notice a slight hot red feeling creep up your cheeks, and the more you notice it, the worse it becomes. Why is it, do you think?\n            *choice\n                  #I think... I fancy her\n                        She is effortlessly elegant where she sits, and you envy her calmness. A feeling somewhere between nausea and fear and excitement floats within you as you glance at her. She looks up at you and smiles, calming and yet panicking all at once. Your knees are numb, and yet beckoned by her smile they sit you down beside her.\n                        *goto 77\n                  #She's like royalty\n                        Daughter of one of the great chieftains of the Fearlanns, and she's chosen to spend much of her day with you. What it means you can't be sure, but it certainly reflects well on you one way or another.\n                        *goto 78\n                        \n                        \n                        \n                        \n                  #Something about her manner makes me uneasy\n                        She has an air of superiority, that's true. She seems cunning, manipulative, even. It might be best to stay on a person like this' good side.\n                        *goto 78\n\n            \n      #Stay quiet\n            Sadhbh seems unsure what to say, and you suddenly feel awkward where you stand. Furiously, you notice a slight hot red feeling creep up your cheeks, and the more you notice it, the worse it becomes. Why is it, do you think?\n            *choice\n                  #I think... I fancy her\n                        She is effortlessly elegant where she sits, and you envy her calmness. A feeling somewhere between nausea and fear and excitement floats within you as you glance at her. She looks up at you and smiles, calming and yet panicking all at once. Your knees are numb, and yet beckoned by her smile they sit you down beside her.\n                        *goto 77\n                  #She's like royalty\n                        Daughter of one of the great chieftains of the Fearlanns, and she's chosen to spend much of her day with you. What it means you can't be sure, but it certainly reflects well on you one way or another.\n                        *goto 78\n                        \n                        \n                        \n                        \n                  #Something about her manner makes me uneasy\n                        She has an air of superiority, that's true. She seems cunning, manipulative, even. It might be best to stay on a person like this' good side.\n                        *goto 78\n                  \n                  \n                  \n*label 78\nHer eyes look over you for a moment, and her expression seems to change. Subtle, but you can tell her eyes don't share the joy displayed on her lips. She stands up briskly.\n*set Sadhbh -15\n*goto 79\n\n*label 77\nYou sit, and a moment feels like forever, and she turns her head to face you. Her eyes are frighteningly bright, and calm, and expectant.\n*choice\n      #I want to... but my head is frozen\n            The heat in your face has built up, and the air in your mouth and lungs stops as her fingers tip your chin. They sent electric sparks down your neck as she gently brings your face to face her. Your lips meet hers, and your inhibitions leave you, and the ice in your body melts as you both embrace.  The same warmth within you that had once made you nervous has become pleasant, it washes across your body as your two worlds meet, and for a few short moments, you're drifting amongst the clouds. She pulls from your embrace with a smile, and stands up. \"We better get going, now, horse ${boy}.\" She says it this time in jest, and you stand up and move towards your own mount. \"Actually…\" you hear behind you.\n            *set Sadhbh +30\n            *goto 79\n            \n      #Turn to meet her gaze\n            Your face turns to meet hers, and without warning or doubt, she leans in. Your lips meet hers, and your inhibitions leave you, and the ice in your body melts as you both embrace. The same warmth within you that had once made you nervous has become pleasant, it washes across your body as your two worlds meet, and for a few short moments, you're drifting amongst the clouds. She pulls from your embrace with a smile, and stands up. \"We better get going, now, horse ${boy}.\" She says it this time in jest, and you stand up and move towards your own mount. \"Actually…\" you hear behind you.\n            *set Sadhbh +30\n            *goto 79 \n            \n      #I- I can't\n            You stand up briskly, and she looks down in embarrassment. Even Fiadh seems to have sensed the awkwardness for he lets out a pouting sigh and chews on his reigns.\n            *set Sadhbh  -25\n            *goto 79\n\n\n\n\n\n*label 79\nShe seems about to say something, when a great brown-grey boulder thunders from the bushes and bounds between you. You are so startled you fall back into the grass, and as soon as it appeared, it disappears. The huffing of the great beast lingers in the air as it's hooves bring it farther and farther from where you lie. As the thumping of your chest lightens and you lean forward, the watery mud that runs down your back makes itself known. Sadhbh  is hardly in a better state. She had jumped behind a tree in her panic, now her hair and tunic cling to her, water-clogged wool heavy like leather hangs down. \n\nShe seems to barely be gathering herself together as you stand up and offer her your hand. Strange. The great antlered beasts of the forest usually keep well away from people. It must have been in a panic. Sadhbh with your help, gets to her feet, and looks to where the deer had been running. A cry rings out, almost human-like. It's deep voice goes high in a call of pain. A fox in the undergrowth jumps out in reaction, fleeing the harrowing echo, and scuttles away into the bushes. \n\nWithout saying a word, Sadhbh quickly but cautiously runs towards the cry. You follow her, trying to keep up through the thick maze of trees and low hanging branches, and find yourself in a clearing where the great beast, that had thundered by so boldly only moments ago, lies. It's legs meekly move in dull disarray. It lifts it's head as Sadhbh  nears, and shakes it's body violently as if trying to bolt. It's great antlers lay back into the mud when it's efforts remain futile, and Sadhbh kneels beside it. The great gash of a javelin has been cut out of the poor creatures thigh. Blood rushes into this gap from the body and spills out with every pained movement. The javelin must have fallen out a way back, but a fine arrow protrudes from the side of it's belly. Sadhbh  moves a hand gently onto the deer's belly. Sadhbh 's attempts at soothing her don't stop the pained jerks of panic from the creature's body, but the vigorous huffing and panting is slowly easing. \n\nThe eyes of the fading doe slowly begin to close, her breaths slowing further. \n\nAs you are about to take a step towards her, the doe's eyes shoot open, and she releases a great cry. This one is far removed to that which you heard from a distance. This one was a shrill shriek, Sadhbh falls back from the doe as her head shakes back and forth violently, her eyes wide open and helpless to the pain ringing inside her.\nYou don't know what to do other than pull Sadhbh  away from the tormented doe, and as you do, you see a puddle forming around the creature. Suddenly you feel the four years that have passed since you fled your home, your farm, disappear. \n*page_break You are there and here all at once\nThe day of the lambs, the call of their mother in agony, the thrashing of the dying doe before you.\nThe animal is wounded and frightened, too dangerous to help, but when the new life emerges you must. Her hind legs kick in her pain now, and you'll have to pull the newborns from her, lest she kick them in her agony. Her cries are lessening slightly now, replaced by grunts of effort, the last of the energy of a dying mammal. \n*page_break A dog barks in the distance\nBut there is no more time for terror, no time to worry for the slowly nearing barks of hounds, or the two humans before her. \n\nSomewhere nearby in the forest, a man laughs. \n\nThe birds in the trees nearby have scattered to the sky, the doe's fur is damp with blood and sweat, and a strained gargle-like shout from her leaves a creature lying before you with twig-thin legs splayed out in the ground, wrapped in slime and eyelids shut to the world, toiling to open and let light hit them for the first time. \n\nThe struggling of the doe has not ceased, however, and her legs kick weakly as a further cry escapes her. Her hoof narrowly misses  the newborn which appears to be struggling to stand, knees buckling as it does so.\n*choice\n      #Run straight to pick it up\n            You jump towards the fawn,  narrowly missing a hoof kick that would have easily snapped a rib, and pick up the slimy fawn. It's legs dangle weakly as you hug it's body to your chest, any noise it does make is drowned out by the cries of it's mother. You carefully pass it into Sadhbh's arms, she's in shock as she stares at you. The doe gives out a grunt. Weaker than the one before. It has a sense of finality to it. Her leg kicks are easier to dodge as you reach for the second fawn, they are sluggish. You hug the feebly struggling newborn to your chest and carry it to where Sadhbh and it's sibling lie. The doe's eyes flicker as it watches it's newborns stumble in human laps, calm eyes. For a moment, you feel the doe's eyes meet yours. Trusting eyes.\n            *set Sadhbh +20\n            *set Ruthless -4\n            *set Compassionate +4\n            *goto 74\n            \n            \n      #Wait for the kicks to slow, then pick up the fawn\n            Sadhbh looks to you in panic as you wait, willing you to do something but what she's not sure. After a few long moments of watch the doe's hooves narrowly miss her offspring, you run towards to fawn. Narrowly missing a hoof kick that would have easily snapped a rib, you pick up the slimy fawn. It's legs dangle weakly as you hug it's body to your chest, any noise it does make is drowned out by the cries of it's mother. You carefully pass it into Sadhbh's arms, she's in shock as she stares at you. The doe gives out a grunt. Weaker than the one before. It has a sense of finality to it. Her leg kicks are easier to dodge as you reach for the second fawn, they are sluggish. You hug the feebly struggling newborn to your chest and carry it to where Sadhbh and it's sibling lie. The doe's eyes flicker as it watches it's newborns stumble in human laps, calm eyes. For a moment, you feel the doe's eyes meet yours. Trusting eyes.\n            *set Sadhbh  +15\n            *goto 74\n\n*label 74\nPerhaps it's best their eyes are closed for the moment, you think. Their feeble bleats to you are peaceful as their mother drifts to mortal dream. A teardrop falls from Sadhbh's cheek to the fawn's nose as you both clean the slime from them. The fawn at Sadhbh's lap stands, and falls. A laugh escapes the both of you, and the cheerful bleats of the fawns is all you care about in the world for that moment. Sadhbh stands up, leaning down with hands under the fawn's belly to support it as it's wobbly legs tried to find a grip on the ground. You both laugh, her eyes look into yours, shiny and bright. \nAnd then an arrow hits her back with a thud, and she falls.\n\nBlood leaks into the grass and pools around her lower back as she lies, unmoving in the dirt. The barking of dogs grows louder, and a man laughs. Through the bushes a man on horseback emerges, and as he does so his grin turns to realisation, and then horror. His dog runs in front of his horse, sniffing the air. The man is Oscar. The bow in his hand falls to the ground and his skin goes pale. His eyes flick from you, to the deer, and to Sadhbh. He tries to speak, but the noise of a weak gasp is all that's released, frightened words caught in his throat. A gasp for air, deep and desperate, comes from Sadhbh. The strength of the arrow had winded her, and now as she regains feeling, so too comes the pain. She struggles with arms and legs, and jerks to stop. Each movement would send spears of pain up her spine and down her legs, from where the arrow had landed. Her lower back, just left of her spine, that was where the stick bright with fletched feathers protruded from her, deep and stable as she shivers in pain. Her gasps turn to whimpers, and from shouts to sobs. Her calls send birds to the skies and animals to the undergrowth, and all the while Oscar stares.\n\nYou can do nothing but try to hold the blood, applying pressure around the arrow as she squirms in her agony. Oscar gets off his mount and comes to your side, looking close to sobs himself and unsure what to do. He looks from you to her, and then back to you again.\n\"I'll.. I'll get help!\" he says desperately, looking nauseous. He moves to go back to his horse, and then turns, grabbing your arm. \"Please, ${name}, don't let them know it was I. Domnall.. he'll, he'll kill me!\" He's almost hyperventilating now, sweat glistening on his forehead and tears blotched under his eyes. \" It was an accident, I was chasing the deer, I swear!\" Sadhbh's blood is leaking through your fingers as he pleads, and one of the fawns, with eyes still shut to the world, bleats for milk. \n*choice\n      #\"How dare you ask me to lie?\"\n            \"I- I know\" he says with nose running like a child and eyes wet. \"But.. please!\" His grip on your arm tightens, \"What do you want? Land, fortune, ships? I can- I 'll get anything you want. I'm wealthy, just- just whatever you like ask me for.\" Ropes of saliva string between his teeth and tongue as he begs.\n            *set Mischievous -4\n            *set Obedient +4\n            *goto 80\n            \n      #\"How can you be so selfish?\"\n            \"I- I know\" he says with nose running like a child and eyes wet. \"But.. please!\" His grip on your arm tightens, \"What do you want? Land, fortune, ships? I can- I 'll get anything you want. I'm wealthy, just- just whatever you like ask me for.\" Ropes of saliva string between his teeth and tongue as he begs.\n            *set Mischievous -4\n            *set Obedient +4\n            *goto 80\n            \n      #\"I will tell only the truth\"\n            \"I- I know\" he says with nose running like a child and eyes wet. \"But.. please!\" His grip on your arm tightens, \"What do you want? Land, fortune, ships? I can- I 'll get anything you want. I'm wealthy, just- just whatever you like ask me for.\" Ropes of saliva string between his teeth and tongue as he begs.\n            *set Mischievous -4\n            *set Obedient +4\n            *goto 80\n            \n      #\"Go now! Get help\"\n            \"I- I know\" he says with nose running like a child and eyes wet. \"But.. please!\" His grip on your arm tightens, \"What do you want? Land, fortune, ships? I can- I 'll get anything you want. I'm wealthy, just- just whatever you like ask me for.\" Ropes of saliva string between his teeth and tongue as he begs.\n            *goto 80\n      \n*label 80\n\"Please, ${name}, name your price. I will return with help, and whatever desire you hold I can fulfill.\"\n\nYou held on for her dear life as Ultan rode for help. Your hands were slippery with her blood that protruded twixt her fingers in bubbles. The arrow is far too deeply embedded to pull out from her, and would only quicken her bleeding. The forest around you for the first time feels quiet, aside from Sadhbh's slowly weakening gasps for breath, and the pleads of the blind fawns. \nThough the blood has spread across her body, none seems to be coming from her mouth, a good sign in a situation as dire as this. When a soldier is wounded and bleeding from the mouth, it is an act of mercy to end his suffering. Her shaky fingers feel across the grass beside her and towards her back. You block her hands from touching the arrow, better for her not to know the damage that's done. Instead, her fingers find yours, and they hold on to you. They cry out for your assurance, but the blood that wets your hands betrays a grim answer. \n\nBy the time Oscar and Domnall's men have returned, the blood on your hands has crusted brown, and Sadhbh's fingers have ceased their movements. In what feels like a breath of wind and smoke, the men hoist her limp body onto a mare, and she rides hard for the camp. You have not the time to ask what has become of her nor feel her pulse yourself before she's taken away. The men and horses are gone, all but one. Oscar dismounts and walks to you, grimly but determined. \n\"I need an answer, now. I meant no harm, I offer you all that can make a ${man} happy. So tell me, what'll have you that can let the matter fall into the already traitorous hand of Medb? Name it, and it shall be done.\"\n*choice\n      #\"I can't be part of your lies.\"\n            His eyes that once panicked go cold. \"I'm not sure you have thought this through. Who'll be believed more? A captain or scout? I have connections with people of all kinds. I strongly advise that you reconsider, ${name}. I make a powerful friend, but an enemy one would best avoid making.\" He walks away from you towards his horse as he says this, before riding off after the other men.\n            *set Assasinultan +1\n            *set Mischievous -7\n            *set Obedient +7\n            *goto 81\n            \n      #\"Help me find my brother.\"\n            He nods seriously, and with a hint of relief he, \"Every noble, mercenary and farmer this side of the Sionainn will be looking for your brother, ${name}, I'll make it so.\"\n            *set Mischievous +4\n            *set Obedient -4\n            *goto 81\n      #\"Find my brother, and leave me forty heads of cattle.\"\n            He nods, and agrees with a sour tang on his tongue, \"The cattle, they'll be yours. As for your brother, every noble, mercenary and farmer this side of the Sionainn will be looking for your brother, ${name}, I'll make it so.\"\n            *set Cattle +40\n            *set Mischievous +4\n            *set Obedient -4\n            *goto 81\n            \n      #\"Find my brother, and leave me eighty heads of cattle.\"\n            He stares into your eyes for a moment, and traces his upper lip with his tongue. \"Eighty heads? Far you go, ${name}, but if that's what it takes to let this matter be resolved, I'll have it done. As for your brother, every noble, mercenary and farmer this side of the Sionainn will be looking for your brother, ${name}, I'll make it so.\"\n            *set Cattle +80\n            *set Mischievous +4\n            *set Obedient -4\n            *goto 81\n            \n      #\"Find my brother, I want eighty heads of cattle and your prize bull.\"\n            He stares at you aghast, \"I- I can't! That would leave me in ruin, ${name}. I beg you, your brother will be found and the cattle yours, but my bull you must leave me.\"\n            *set Mischievous +4\n            *set Obedient -4\n            *choice\n                  #Agree\n                        He nods, \"I'll have it done. As for your brother, every noble, mercenary and farmer this side of the Sionainn will be looking for your brother, ${name}, I'll make it so.\"\n                        *set Cattle +80\n                        *goto 81\n                        \n                        \n                  #Refuse\n                       He stares into your eyes for a moment, and traces his upper lip with his tongue. \"Far you go, ${name}, but if that's what it takes to let this matter be resolved, I'll have it done. As for your brother, every noble, mercenary and farmer this side of the Sionainn will be looking for your brother, ${name}, I'll make it so.\"\n                       *set Cattle +80\n                       *set PrizeBull +1\n                       *goto 81 \n                 \n                        \n                        \n\n\n*label 81\nHe turns and rides hard for the camp after the escort, leaving you and doe and fawn alone in the woods.\n\n*page_break A lonely walk back to the camp...\n\nConchobar's cries echo like thunder and eagle's shrieks. The walk alone back to the camp was quiet, and though her crusted brown blood coats your fingers, it would feel wrong to wipe it off. To rid yourself of her. Some quizzed you, others stared suspiciously, as you arrived. The whole camp knows, and all eyes stare at you and your hands, your bloody hands. Oscar greets you grimly, embracing you awkwardly, and eyes calculating as he pulls away. Hushed, he says \"All will be done, ${name}. Only I can make it so.\" He peers around before turning and moving to where the bellows ring out, beckoning you to follow.\n\nYou enter through the tent, there Conchobar's great frame leans hunched over his daughter's limp body. His chin and drip blood from kissing her desperately, and lines of red divide his teeth as his lips part. The man that once stood with ghostly calmness over his brother now sits like a beggar on the ground of his tent. Oscar, after a moment of shocked staring declares to Conchobar; \"All that can be done to seize these Balor-scum must be, and all that must be done I'll make so!\" Ultan nods to you to speak, \"${name} was with her, he witnessed it himse-\", Conchobar cuts though Oscar's voice. \"You were with my daughter when she died, ${name}?\" You nod. And as you nod the king that sat like beggar rises, looking down on you with a dark mess of hair, and forming a great mountain that feels as though it will fall and crush you. Her body hangs like a rag doll held up by on great beefy arm. Her blood, put back in motion  by the lifting of her body trickles down to her feet and drips steadily onto the carpet. \nOne eye of hers is slightly open, and glossy white stares at you between strands of reddened hair.\n\n\"You.. let this?\" A great hand wraps around your neck and tightens, the tips of his fingers reaching near the back of your neck, and his rough palm pushing in the front of your neck. Air can flow, but from his strength you still feel yourself gasping. All others in the room are silent. Oscar looks as though he is about to protest, but decides against it. A single tear drips from eye to beard as he stares at you, and he shakes your neck when you find yourself momentarily lost for any word.\n*choice\n      #\"I tried to save her.\"\n            His hand grips you harder, you can smell his breath and her blood as he breathes slowly, unblinking.\n            *goto 83 \n            \n            \n      #\"I should have been able to help her.\"\n            His hand grips you harder, you can smell his breath and her blood as he breathes slowly, unblinking.\n            *goto 83\n            \n      #\"It wasn't my fault\"\n            His hand grips you harder, you can smell his breath and her blood as he breathes slowly, unblinking. His eyes widen as his beard parts, opening for his words to escape. \"Oh, but it was. Why else would you be alive before me now, and not her?\" \n            *goto 83\n            \n      #\"It was Oscar!\"\n            His hand grips you harder, you can smell his breath and her blood as he breathes slowly, unblinking.\n            *set Mischievous -7\n            *set Obedient +7\n            *set Assasinultan +1\n            *goto 84\n      \n*label 84\nOscar shouts out in false shock, \"How dare you suggest such a thing, swine?\" Through his outrage his breath is short and his words stumbling, one of Conchobar's eyebrow's twitch. \"What do you mean ${boy}?\" You hear Oscar breathe in sharply, knowing better than to protest a second time.\n*choice\n      #Tell him the truth\n            While you speak, no more tears fall from his eyes. He releases you from his gaze, to look upon the whitened Oscar.\n            *achieve refusebribe\n            *set Mischievous -7\n            *set Obedient +7\n            *set Assasinultan +10\n            *goto 85\n      #\"Actually... never mind\"\n            You are struck across the cheek, so hard you'd have fallen if not for Conchobar's grip. \"So you would try to blame a clansman? I should strangle you right… now.\" His hand squeezes suddenly, a warning.\n            *set Assasinultan 0\n            *goto 83\n            \n            \n\n*label 85 \nThe world stands without movement or noise as you tell Conchobar all, and by the time all is said, the red around Conchobar's eyes has brightened. He lays the corpse across his bed, and orders \"Everyone… Out!\" His orders are followed, all but Oscar are permitted to leave. All corners of the campsite hear Oscar's cries and moans, but they do not last long. An uneasy quiet descends across the camp, interrupted only by the call of birds and the howling of wolves as night falls.\n\nAlmost at the moment you fall into your bed, the world fades into the unconscious.\n*page_break Sleep embraces you\nAs if no time had passed at all, you are woken. This time not by birdsong nor morning's light, but by a shadow. A great bear-like shadow. It whispers to you, fearful yet cold, \"You did wrong by Oscar, ${boy}. So, so wrong.\" A cool metal pierces your back deeply where you lie. The awaited pain, when it does arrive, falls upon you like teardrops. Your eyelids flutter lazily as your whole body arches without your will, and the world bids you slán.\n*ending\n\n\n\n\n\n\n\n\n\n\n*label 83\nAfter several moment's silence, he breathes in through his nose in what could have been a sniffle, and his fingers release you.  As his hand falls to his side, Ultan once more finds words… now that you weren't about to be killed. \"I have told your brother, and he's already making plans for bringing Medb's scum to justice. Your daughter will be avenged!\" Conchobar's eyes never leave you, and he gives a shake of his head, tilting it slightly as he speaks. \"You let this happen, you will bring me Medb's head.\" He looks you up and down, seemingly coming to a conclusion. \"And her children. Stake them. Her kinsmen, burn them. Any town or village that holds high her family's banner have burnt.\" He looks to the others in the room, seemingly ensuring there have been witnesses, before declaring to them; \"And it will be this one that does the killing. Medb's head is mine, but her kin and son, let this one have that honour.\" A moments silence follows, before through red saliva and lips he bellows; \"Out!\".\n\nUltan walks with you silently as you leave the tent until you are far out of the earshot of other camp members, before turning to you. \"Your decision is appreciated good ${name}, and you shall of course be awarded as agreed. I trust you shall tell no one of today's events.\" He nods, running his eyes across you momentarily, one last examination of your honesty, perhaps. \"A good night to you, ${name}.\" For the first time, as he starts to turn away, his eyes drop to your hands. \n\n\"You'd best clean that… or [i]her[/i], off you soon.\" He turns and leaves. You focus on the sensation of your hands once more, and consciously feel the scratchy, dry crumble of her blood. The smell they emit is gentle. So underwhelming for a death so violent. Though you wash your hands of them, letting the brown-red tinged water trickle to the grass, the smell never leaves. In fact, as you lie in bed it's all that you can smell. It's like the subtle smell of copper, and yet it fills you.\n\n*page_break Sleep embraces you\n\nSleep takes you, and though clean of blood your hands are washed, the scent still fills your nostrils, and the red still clouds your mind.\n\nYou stands in the Currach, a dozen others with you. One of the women shouts, one of the younger men's knees shakes so violently the boat seems to shiver. The others look over the side of the boat with pale faces. There is no leak, no spring of water being sucked in from the sea and into the boat. But even so, before your very eyes, the water rises around the boat. It's sinking. The sunset has struck red across the water's surface, though it doesn't glimmer. It sways in the breezeless air, deep and matt. \n\nAs the sea rises up around you hungrily, taking it's time to digest the boat, and as the others start to really panic. You imagined yourself thrashing in the salty depths as the water seeps into your mouth, your nose, your clothes weighing you down as you struggle in vain to pull the bright surface down to you. Your eyes opening wide as your body forces you to inhale. You'd seen a man drown once before. He'd puked twice from inhaling the water before he finally succumbed. Would the same happen here, to you? You open your eyes and look around the boat, the sound of tears and cries of panic blurring from your ears as if it were happening a million miles away, and you look at the flat sea. Not a fresh breath of wind. Not a splash. \n\nYou'd heard countless tales about the hunger of the sea, and for the first time, you believed them. Once the water has risen above the sides of the currach, and filled the boat in like an oval-shaped waterfall, you decide you'd rather let yourself drown now than thrash around on the surface with the others like drowning flies in a puddle. It's a strange thought to have. A familiar smell fills your nostrils as your clothes begin to soak. The water is at your chest when a face you hadn't pictured for some time appears in your mind. Conan's smiley, oblivious, toothy grin is there, he's running around and laughing at the chickens, cradling a stolen egg against his chest. You feel yourself smile as your head is pulled under.\n\nAnd then you taste it: blood. In your panic you gasp, and you breathe it in, and smell it and see it as you're pulled down and down, and your eyes sting like a spinefish's touch. Your nostrils are lit on fire as in you breathe the thick red. There are the splashing sounds of a dozen pairs of feet kicking desperately above you. The current brought by the sinking boat, or the current of the sea itself, pulls you downwards still. The pressure on your body mounts and the blood presses into your skull and chest and eyes painfully as you sink. The boat and your own body leaves a mist of bubbles above you as you sink. All orientation of what is up and down is lost from you as you are pulled, your body spiraling into a purgatory between life and death, and all around nothing but red, in a surreal hell that dissipates only slowly as you wake.\n\n*finish\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n      \n\n\n\n      ", "chapter51": "*Page_Break Chapter 5\n*image Chap5.png\nAfter a day of sitting alone, tied up in the tent, as the hustle and bustle of the army camp continues,
