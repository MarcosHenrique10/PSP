 to roar at you, you tell him; \"The Ó Broinn army has fallen.\" He pauses for a moment, and arches his eyebrows doubtfully. That's when you tell him all you saw, and his cheeks flushed red with anger recede into a pale worry. His hand goes to his forehead, fiddling with the few strands of red hair not tied back. The other hand clenches suddenly as his eyes close as if in pain, and his fist smashes into one of the tent's beams. The sudden rage fades as quickly as it arrived, and he nods to you. \"Thank you, young ${name}, I shall think on this…\" He closes the tent's flap as he backs away, face stricken with concern. \n                                                *set Telldomnallbroinn +1\n                                                *set Domnall +15\n                                                *goto 31\n                                                \n                                                \n                                                \n                                          #Go to bed\n                                                *goto 31\n                                    \n                                    \n                                #Go to bed    \n                                      *goto 31\n                         \n                                \n*label 31\nThe cloths that make up your tent are thin, but they keep the chilly night breeze from kissing you. You wrap yourself in the covers within the tent, and soon, as your body finally begins to relax, you drift off into another world altogether.\n*page_break The sun shines in through a slit in your tent\n\nYou wake up with warm light in your face, you stretch out in the sheets, and hear the noises of men awaking from their night's rest. You sit up, eyes blinking. You slept well last night, but the late hours are beginning to catch up with you. As pull yourself from the cloth coverings of the tent, a familiar face appears. Oscar. \"Good morning, ${name}. You're of course the scout who found out about the grave Ó Broinn news, so I thought it best that you be with me when I tell him.\" Your eyes are still blinking in the morning rays when he pulls you to your feet. \"You'd best get changed properly, I'll wait and then we can go together to Domnall\".\n*choice\n      #Very well \n            As he nods in agreement, Diarmuid walks up behind you both. \"Our chieftain wishes that all our captains be present at his tent now, \n            *if Domnallaffair =1\n                  his face is one of embarrassment as he looks to you, \"and you aswell, ${name}.\" He gives you both a polite nod, and scurries off to another tent.\n                  *set Oscar +10\n                  *set Proud -5\n                  *set Humble +5\n                  *set Obedient +5\n                  *set Humble -5\n                  *goto 32\n            *else\n                  he looks to you with a friendly smile, \"and you aswell, ${name}.\" He gives you both a polite nod, and scurries off to another tent.     \n                  *set Oscar +10\n                  *set Proud -5\n                  *set Humble +5\n                  *set Obedient +5\n                  *set Humble -5\n                  *goto 32\n              \n            \n            \n      #\"When [i]you[/i] tell him?\"\n            He seems surprised at your remark, and replies back to you as if you were stupid, \"Of course, I was captain of the night watch when you arrived, I am your superior and so I should be the one to inform our chieftain\". Each 'I' he emphasises more then the other.\n            *choice\n                  #I should be the one to tell him\n                        He splutters in protest for a moment, then composes himself. \"Fine, ${boy}, have it your way.\" As he turns to walk away, Diarmuid walks up behind you both. \"Our chieftain wishes that all our captains be present at his tent now, \n                        *if Domnallaffair =1\n                              his face is one of embarrassment as he looks to you, \"and you aswell, ${name}.\" He gives you both a polite nod, and scurries off to another tent.\n                              *set Oscar -10\n                              *set Humble -5\n                              *set Proud +5\n                              *set Obedient -5\n                              *set Mischievous +5\n                              *goto 32\n                        *else\n                              he looks to you with a friendly smile, \"and you aswell, ${name}.\" He gives you both a polite nod, and scurries off to another tent.\n                              *set Oscar -10\n                              *set Humble -5\n                              *set Proud +5\n                              *set Obedient -5\n                              *set Mischievous +5\n                              *goto 32\n                  \n\n                                      \n                       \n                        \n                  #He can tell the chief if he likes\n                        As he nods in agreement, Diarmuid walks up behind you both. \"Our chieftain wishes that all our captains be present at his tent now, \n                        *if Domnallaffair =1 \n                              his face is one of embarrassment as he looks to you, \"and you aswell, ${name}.\" He gives you both a polite nod, and scurries off to another tent.\n                              \n                              *set Oscar +10\n                              *set Proud -5\n                              *set Humble +5\n                              *set Obedient +5\n                              *set Humble -5\n                              *goto 32\n                        *else\n                              he looks to you with a friendly smile, \"and you aswell, ${name}.\" He gives you both a polite nod, and scurries off to another tent.     \n                              *set Oscar +10\n                              *set Proud -5\n                              *set Humble +5\n                              *set Obedient +5\n                              *set Humble -5\n                              *goto 32\n                  \n\n                                      \n                        \n                        \n            \n            \n                  *if Telldomnallbroinn =1\n                        #\"I've already told him\n                              He looks surprised, and then his face goes stern, \"You went to the chieftain against my orders, ${boy}. The chieftain gave me strict instructions not to let anyone visit him. We should have told him together when he was well rested. That was underhanded, ${name}.\" As he shakes his head in irritation, Diarmuid walks up behind you both. \"Our chieftain wishes that all our captains be present at his tent now,\n                              *if Domnallaffair =1\n                                    his face is one of embarrassment as he looks to you, \"and you aswell, ${name}.\" He gives you both a polite nod, and scurries off to another tent.\n                                    *set Obedient -5\n                                    *set Mischievous +5\n                                    *set Oscar -10\n                                    *goto 32\n                              *else \n                                    he looks to you with a friendly smile, \"and you aswell, ${name}.\" He gives you both a polite nod, and scurries off to another tent.\n                                    *set Obedient -5\n                                    *set Mischievous +5\n                                    *set Oscar -10\n                                    *goto 32\n                  \n\n                                 \n*label 32\n*page_break  Inside the chieftain's tent\nThirteen captains, five petty chieftains and a druid are gathered within his tent. The tent is divided into two chambers, one for his bed, and another with a round wooden table that you are all now centered around. On the table is a map, marking out the great Fearlann landscape, displaying all the land from the vast Fargock sea in the west and her Cuan islands, to the endless forests of the east. The druid stares at the map thoughtfully, while the captains mutter amongst each other, Oscar included. \n*if Telldomnallbroinn =1\n      *goto 35\n*else\n      Oscar slips into the next room, the other captains look curiously as he does so, and others put their ears to the tarp dividing the room as subtly as they can. A minute of conversation you can't quite hear follows, and then Oscar returns through the tent flaps, a smug smile across his face. He gives you a wink, and stands then between two other captains.\n      *goto 35\n      \n*label 35\nSome look at you curiously, questioning why a scout was among ${his} superiors. Moments later, Domnall Mac Conmara emerges from the bed chamber of the tent, and the captain's muttering is silenced.\n\n\"Captains\", he begins solemnly, \"We are but a day and night's march from the meeting point of our four hundred strong, and those of our allies the Ó Broinn.\" A few of the captains give nod, or an agreeing grunt as Domnall's eyes flick around the room, landing eventually on you. \"Our scout, ${name}, arrived back only last night,\n*if Ultansaved =1\n      along with our brave Ultan, who unfortunately is in no state to join us now.\n      *goto 33\n*else\n      apparently, our brave Ultan was not so lucky.\n      *goto 33\n*label 33\n*if Telldomnallbroinn =1\n      The intelligence gathered by our young ${name} is not what any of us would have hoped to hear.\" He glares at the map on the table for a moment, his strained breath all too audible in the silent room. \"${name} arrived at the camp of the Ó Broinn forces, to find them desolated. Three hundred strong reduced to corpse and ash.\" Some shake their head in disbelief, other's eyes go wide as they look to each other. Oscar looks about to speak, then decides against it, while the druid never lifts his gaze from the map, lost in thought. \"Our circumstances have changed, of course. As far as we knew the Ó Gearailt foe were several day's march from our allies, and our mistake was paid for in the blood of our most trusted friends. We believe the Gearailt may be fleeing north, but we can't be sure. What we can, however, be most certain of is that the Ó Broinn survivors would have been tortured until they gave them our location. Our next course of action must be a decisive one, and so all of you are gathered here to decide, with me, what we shall do next.\"\n      *goto 37\n*else\n      The intelligence gathered by our young ${name} is not what any of us would have hoped to hear. To such an extent in fact, that me and ${name} shall later discuss why I was not informed at ${his} first opportunity.\" He glares from you, to the map on the table for a moment, his strained breath all too audible in the silent room. Some captains look at you sympathetically, the female petty chieftain sneers. \"${name} arrived at the camp of the Ó Broinn forces, to find them desolated. Three hundred strong reduced to corpse and ash.\" Some shake their head in disbelief, other's eyes go wide as they look to each other. Oscar nods along, an arrogant smile on his face that does not go unnoticed by the female chieftain, who glares at him. All the while the druid never lifts his gaze from the map, lost in thought. \"Our circumstances have changed, of course. As far as we knew the Ó Gearailt foe were several day's march from our allies, and our mistake was paid for in the blood of our most trusted friends. We believe the Gearailt may be fleeing north, but we can't be sure. What we can, however, be most certain of is that the Ó Broinn survivors would have been tortured until they gave them our location. Our next course of action must be a decisive one, and so all of you are gathered here to decide, with me, what we shall do next.\"\n      *set Domnall -20\n      *set Oscar +5\n      *goto 36\n*label 36\n*choice\n      #\"Oscar told me not to wait before telling you!\"\n            Domnall looks to you, and then his eyes flick to Ultan. \"This is true, Oscar? My captain of the night watch?\". Oscar's face goes red, and he splutters back, \"My chief, you had told me to keep anyone from visiting! I wished only to give you a full night's rest.\" Domnall shakes his head, and scratches under his nose as he thinks. \"You did not think information so pressing should be given to me as soon as you heard? You were foolish,\" his eyes come back to you, then. \"And you, ${name}. You are young, and should most often do as superior orders. Sometimes, though, your chieftain needs someone with backbone. Oscar, you were stupid to not have informed me right away. Let that be your last mistake, or a captain you'll be no more.\" Most men would have had their captaincy removed there and then, you know, but Oscar is needed for the supplies he provides. Wealth can help one rise up the ranks, it can also make a leader more forgiving of one's mistakes.\n            *set  Oscar -20\n            *set Domnall +10\n            *goto 37\n      #Stay quiet\n            *goto 37\n\n\n\n\n*label 37\nThe blanket of quiet is lifted, and once again the higher ups of Domnall's four hundred strong mutter amongst each other, gesturing at the map to each other. The only two people not chatting is the female petty chieftain, Medb Ó Cuinn, and the druid, Cathal. Cathal's gaze lifts for the first time from the map, and lets his eyes trace over the figures in the room. Medb stands with her tongue licking across her teeth, she is three decades your senior. She would have been quite pretty in her youth, but now she bears wrinkles and bags under her eyes beyond her years. The weight of a family name like the Ó Cuinn's on one's shoulders can do that to a person. One of the largest clans under Domnall's rule, she alone mustered eighty of the four hundred warriors gathered. She steps forward confidently, her thick woolen robe hangs comfortably over her shoulders, held to her chest by a fine gold brooch. Cathal eyes her warily as she strides to the map. \n\n\"The Ó Gearailts were quicker in their advance than we had thought, four days too quick,\" she looks to each chieftain one by one, \"Our scout placements around the Gearailt territory were wrong, and our brothers and sisters paid for that with some three hundred lives. Now, the Ó Gearailt army that has likely maintained most of her strength, could be anywhere. Four days quick march we are from our own forts and farmlands, and we have not a clue where an army, far larger than we estimated, is. They could indeed be retreating, like our dear Domnall thinks,\" she smiles at him thinly as she says this, and then turns back to the other chieftains, \"Or perhaps they make their way through the great forests north of our lands as we speak, moving toward our lands so that they can plunder like wolves among shepherd-less sheep\". The chieftains murmur in fearful agreement. Domnall's jaw is tensed, as if his teeth are gritted behind his lips. The forest she speaks of lies above Domnall's territory, it's most eastern side acts as the natural boundary between the land of the Mac Conmara, and that of the Ó Gearailt. It's known as the 'Gan Stad' forest, meaning 'without end' in the old tongue. It's said the first men never dared enter it, so vast it was that it could swallow entire armies of men, never to be seen again. Now, if what Medb suggests is true, the Ó Gearailts seem to be using that to their advantage.\n\n\"Our castles will be crumbled to rubble, our ringforts and villages and farmlands burnt to ash. Our cattle will be herded away or slaughtered\", she then turns to the captains, among whom you stand, our wives and husbands and children will be left at the mercy of those sadistic savages\", she pauses, allowing her words to sink in to every man and woman in the room. \"All this, and we are four days away from that which we must protect… unless we can intercept the Ó Gearailts in the forest\". Cathal doubtfully responds as Medb takes a moment's pause, \"Go on\". She smiles at that, and places her large, sword-wielding fingers on the table as she speaks. \"Our army won't make it to the Gan Stad in time to intercept them, but a small unit of riders will\". \n\nOscar shakes his head, seemingly eager to counter her, \"What will a small group of riders do to an army that so easily crushed three hundred Ó Broinn beneath their feet? And even so, how would such an army even be found in the vast Gan Stad?\" Medb regards him back with knowing eyes like would a child, and looks again to the chieftains, \"We shall burn them out.\" Cathal's eyes go wide as he takes in her words, and so do those of many of the chieftains. \"Our riders will set a wall of flame in the path of the Ó Gearailt, and for fear of it spreading, they will retreat into the grasslands. That, brothers and sisters, is where we shall be waiting\". Though the room comes alive with voices of approval and disdain alike, it is Cathal's that bellows above them all; \"No!\"\n\nThough his volume is high, and his eyebrows are narrowed, his icy composure remains. He stands several inches taller than her, but as they face each other, her figure is the imposing one. \"We shall not burn a wood older than the first men to walk this land, all for an army that our wise Chieftain Domnall believes to be retreating anyway.\" Domnall nods, and looks about to speak out when the druid speaks again, this time quieter; \"It is a holy ground owned by no mortal. Dagda would not have it, [i]I[/i] will not have it.\" Medb snarls back, never once breaking their eye contact, \"Would Dagda have our families mutilated? Our livestock and crops ruined? Would [i]you[/i] have us left in famine for the winter?\" Finally she looks around the room once more, locking eye contact now with the reddened Domnall; \"The gods are not so cruel as to wish your people suffer that. You, my liege, are not so cruel.\"\n*finish\n\n\n\n", "chapter3": "*image chapter3pic.jpg\n\n\nMost of the chieftains are men of the gods, far too devout to go against the words of a druid as wise as Cathal, but two of them are swayed by the words of Medb. You can see Domnall is furious, but together they make up nearly half of the four hundred men assembled, he cannot simply ignore them. The captains hold their tongue as the chieftains argue back and forth. Medb then implores to Domnall, \"If reason from a chieftain will not persuade you, then think of the men you lead! Listen to your captains, see how they feel about the slaughter of their families\". Without looking to whom she reaches for, she grabs your tunic and pulls you to the middle of the room with one arm. When you say nothing, she glares at you and commands quietly, \"Are you dumb? Speak, ${boy}\".\n*choice\n      #\"I worry for our lands and people\"\n            She nods and turns to Domnall, \"And so ${he} should, the ${lad} needs ${his} chieftain to stay strong against an enemy that would have us wiped out like flowers in the winter snow!\". Domnall grimaces, and as he looks to be somewhat swayed, when Cathal speaks up.\n            \n            *set Ruthless -4\n            *set Compassionate +4\n\n            *set Medb +10\n            *set Domnall -5\n            *goto 38\n      #\"We can't burn holy ground, no matter what\"\n            Medb shakes her head, \"You want holy trees, we can plant more. You want sacrifices for the gods, that we can give. The bodies that will clog our rivers and litter our streets will not come back so easily. You are foolish to forsake the people of our land\". She turns to Domnall, \"This young ${lad} has had his head hammered so thoroughly with Cathal's words that he cannot see sense! Do not make the same mistakes this young fool makes\". Domnall grimaces at her words, and looks to be swaying, when Cathal speaks up.\n            *set Ruthless +2\n            *set Compassionate -2\n\n            *set Medb -10\n            *set Domnall +5\n            *goto 38\n      #Stay silent\n            She smiles grimly as you ignore her command, and turns to Domnall, \"You see, my chieftain, this ${man} is so loyal too you that ${he} cannot speak out, even when ${he} knows mine is the wisest path. I, on the other hand, care too much for your lands, and your reign, to let it be crushed for such a mistake. Do as I say, good chieftain, and let your people sleep safely\". Domnall thinks hard for a moment, perhaps swayed by her words, when Cathal speaks up.\n            *set Medb -5\n            *set Domnall -3\n            *goto 38\n*label 38\n\"Have you forgotten who pulls the sun to the sky so that your crops may grow, who blesses you with rooves above and walls around? Would you forsake those that have gifted you with life itself? If the attackers do move as the impulsive Medb suggests, Dagda will be fire enough to stop those that would harm us!\". There are nods of agreement amongst the devout chieftains, but Domnall remains conflicted. He looks to you, and the captains that stand around you. \"What say you? The wisest and the bravest of my armies, let your opinions be known\". \n\nThe prospect of lands destroyed and people slaughtered is an abstract thought to the chieftains, they shall make it through the winter regardless of their yield, though their coffers may suffer. The lower soldiers and farmers will not be so lucky, their pain in an attack will be very real. \n\nSome look to each other, fearful of speaking against a druid or chief, while Oscar and some others look to the ground, pretending to be unsure so as to avoid confrontation. Medb mouth twist halfway to a snarl, and faces up to Oscar. \"Did your chieftain make you captain for nothing? It certainly wasn't for your wise council\". She lets her frown grow into a smirk as he avoids her eye contact, face reddened in fear. \"Ah, Oscar, aren't you? Your father owned a fishing fleet, is that right? Who knew a man could pay his way to captaincy with fish\". Oscars face goes redder still, and Domnall bears his teeth behind his thick beard. \"You would question my honour and judgement, hag?\". \n\nDomnall's words take her by surprise, her face goes white for a moment. In the speed of an eagle's swoop, she  unsheathes a long dagger from beneath her cloak, and points it to Domnall, her mouth is wide as if readying to roar, and her eyes are opened wide. \"A funny choice of last words, pig!\". In moments, the entire tent is in turmoil. Daggers and maces are drawn, anything that a person could hide beneath their cloak is drawn. Oscar backs away through the captain's ranks as several seize the arms of Medb, and attempt to hold her down on the round table. The two chieftain's loyal to her do their best to knock the captains back with fists and knees, but they are soon overwhelmed. Though weapons are drawn, blood has not been spilt and flesh has not been torn. \nWith the room's temperature rising, that is something that is an unspoken rule that could boil over at any moment.\n\n*page_break\n\nCathal bellows then, in a voice that overwhelms those within the tent and escapes outside, \"Silence!\". His arms are stretched out above his head, as if trying to hold the roof from collapsing. The room goes quiet, and the muffled voices and chatter of the men gathered outside is the only noise that can be heard in the tent. \n\"Do not fall into a pit of savagery over poorly placed words, our enemy runs for the hills or makes their way to us with teeth bared. We must stay strong together!\" Medb pauses, and sheathes her dagger beneath her cloak. \"Why would the Ó Gearailt flee after such a strong victory? Their bloodlust has only grown. If none of you have the gall in your bellies to stop the Gearailt advance, then my men will. Your indecisiveness has been noted, my Chieftain.\" With that, she turns from Domnall, walks through the captains and out from the tent. Outside a murmur rises as she steps onto the grass. Many of the soldiers, though fearful of entering, had been listening in. The two chieftains that had stood by her side, glance at each other, conflicted. They turn and follow after Medb, giving a respectful nod to Domnall. No amount of respectful nodding will appease Domnall, though.\n\nThey've made their allegiance clear. Domnall's face betrays fury, but more than that, it portrays a hopelessness. If he had planned to chase down the army as they retreated in a gamble, there was no hope of that without Medb's forces. If she is right, though, it could save Domnall's northern villages from a massacre. He watches the flap that she exited from, still swinging gently. Without lifting his eyes from the flap, he waves the captains away, \"Off with you, if you will not readily offer council to me, then I have no need of you in here.\" As the men turn to leave, and you about to follow in tow, Domnall's voice commands; \"I would have you stay her, ${name}, for a moment if you'd be so kind. Then he lifts his head to look at you. \"Scout, ${name}, you saw what became of the Ó Broinn force. Tell me, did the Gearailt take pleasure in their massacre? Enough for them to continue their campaign?\" Cathal seems surprised, \"My chieftain, ${he} is but a young scout, there is no wisdom in ${his} council.\" Domnall waves him off without lifting his gaze from you. \"I wish to\n*if Telldomnallbroinn =1\n      *goto 41\n*else\n      Oscar shakes his head profusely, seemingly getting his courage back from Medb's onslaught, \"But my chieftain! If ${he} was not wise enough to inform you of the news as soon as ${he} returned, surely ${he} is not wise enough to comprehend fully what happened. If you wish for my opinio-\" Domnall cuts him off, \"I do not, I will\n      *goto 41\n*label 41\nhear what ${he} has to say. Now speak, ${name}. I command it.\" You think back, and visions of bodies and heads stuck on pikes fills your vision. Every last remnant of the force of little value had been burnt to ash. That would suggest their bloodlust was high, unless it was all for a show they took no pleasure performing. Were they sending a message they felt needed to be sent, or were they trying to quench an insatiable bloodthirst? \n*choice\n      #\"I think they're out for our blood\"\n            *gosub trial_end\n            \"This pressure is too much to be left upon a boy of simple upbringing, and simple mind. His thoughts are clouded, you see.\" Cathal gestures at you to Domnall, \"Do not make any mistake because of the poor judgement of a stupid ${boy}.\"\n            \n            *choice   \n                  #\"How dare you speak of me like that, old man?\"\n                        The chieftains look straight to Domnall, and then to Cathal as your bold words register. Cathal's eyes open in surprise, and he gives you a crooked grin. \"Simple [i]and[/i] hot-headed? You see, this one's a recipe for chaos in your army, good Domnall.\"\n                        *set Proud +5\n                        *set Humble -5\n                        *set Obedient -5\n                        *set Mischievous +5\n                        *if Domnall> 55\n                              Domnall says back in irritation, \"Do not speak to our ${name} in such a manner, druid. You're knowledge of the gods does not give you free reign to treat my people so.\" It seems you've impressed the chieftain in the passed day and night, the words of a druid are almost always held in high regard. Domnall says to you, \"Nevertheless, ${name}, every man and woman under my command represents the Conmara clan, and myself at it's head. Perhaps it is not wise to stray against the god's will without more reason than a hunch…\" You know by his tone he is conflicted by his own words.\n                              *set Cathal -10\n                              *goto 42\n                        *else\n                              Domnall thinks for a moment, conflicted, \"Perhaps you are right, Cathal. It would not be wise to stray against the god's will without more reason than a hunch…\" You know by his tone he is unsure of the truth in his words.\n                              *set Cathal -5\n                              *goto 42\n                  #\"You underestimate me, Cathal\"\n                        Cathal grins toothily at your words, \"Do I really, ${boy}? When your own chieftain insisted against my judgement that you be the one to lend him your advice, you had none. I do not estimate you at all, I see you for what you are. A scout that can do ${his} job well enough, but that's all.\"\n                        *set Proud +4\n                        *set Humble -4\n                        \n                        *if Domnall> 55\n                              Domnall says back in irritation, \"Do not speak to our ${name} in such a manner, druid. You're knowledge of the gods does not give you free reign to talk to young ${name} so.\" It seems you've impressed the chieftain in the passed day and night, despite your loss for advice. The words of a druid are almost always held in high regard. Domnall says to you, \"Nevertheless, ${name}, every man and woman under my command represents the Conmara clan, and myself at it's head. Perhaps it is not wise to stray against the god's will without more reason than a hunch…\" You know by his tone he is conflicted by his own words.\n                              *set Cathal -10\n                              *goto 42\n         \n                        *else\n                              Domnall thinks for a moment, conflicted, \"Perhaps you are right, Cathal. It would not be wise to stray against the god's will without more reason than a hunch…\" You know by his tone he is unsure of the truth in his words.\n                              *set Cathal -5\n                              *goto 42\n                  #Stay silent\n                        Domnall thinks for a moment, conflicted, \"Perhaps you are right, Cathal. It would not be wise to stray against the god's will without more reason than a hunch…\" You know by his tone he is unsure of the truth in his words.\n                        *goto 42\n           \n            \n      #\"I suspect they want no more of this war\"\n            *gosub trial_end\n            Cathal nods to Domnall knowingly, \"You see, my chieftain, even ${name} can see the folly in Medb's heresy. Perhaps the scout has more wisdom than I'd estimated.\" Domnall runs his fingers through his beard as Cathal speaks, and judges you with his gaze, before seemingly coming to a conclusion. \"We have no reason to  believe the Ó Gearailt advance through the Gan Stad, so to burn part of it it would be a senseless crime against the gods.\" He marches briskly towards the tent's flap, with the petty chieftains, Cathal and yourself following behind.\n            *goto 43\n            \n            \n      #\"My chieftain, I really can't say\"\n            *gosub trial_end\n            Domnall looks at you, the same way an engineer might look at a structure that failed to hold together. With disappointment, and a curiosity as to why. Cathal nods understandingly, and shakes his head to Domnall, \"You see, wise Domnall, the pressure is too much to be left on a ${boy} of simple upbringing, and simple mind.\"\n            *set Domnall -5\n            *choice\n                  #\"How dare you speak of me like that, old man?\"\n                        The chieftains look straight to Domnall, and then to Cathal as your bold words register. Cathal's eyes open in surprise, and he gives you a crooked grin. \"Simple [i]and[/i] hot-headed? You see, this one's a recipe for chaos in your army, good Domnall.\"    \n                        *set Proud +5\n                        *set Humble -5\n                        *set Obedient -5\n                        *set Mischievous +5\n                        *if Domnall> 55\n                              Domnall says back in irritation, \"Do not speak to our ${name} in such a manner, druid. You're knowledge of the gods does not give you free reign to treat my people so.\" It seems you've impressed the chieftain in the passed day and night, the words of a druid are almost always held in high regard. Half-heartedly, Domnall says to you, \"Nevertheless, ${name}, every man and woman under my command represents the Conmara clan, and myself at it's head. Be sure to tame your tongue.\" You know by his tone and light expression that his words came more from him wishing to be seen as diplomatic before the druid, than him speaking his true thoughts.\n                              *set Cathal -10\n                              *goto 42\n                        *else\n                              Domnall ignores him, \"If I'd wanted your silence I would have left you to leave with the captains. Next time you chieftain commands for your opinion, you will give it. I have had enough indecisiveness from my people today to leave Crom second-guessing himself.\"\n                              *set Cathal -5\n                              *goto 42\n                  #\"You underestimate me, Cathal\"\n                        Cathal grins toothily at your words, \"Do I really, ${boy}? When your own chieftain insisted against my judgement that you be the one to lend him your advice, you had none. I do not estimate you at all, I see you for what you are. A scout that can do ${his} job well enough, but that's all.\"\n                        *if Domnall> 55\n                              Domnall says back in irritation, \"Do not speak to our ${name} in such a manner, druid. You're knowledge of the gods does not give you free reign to talk to young ${name} so.\" It seems you've impressed the chieftain in the passed day and night, despite your loss for advice. The words of a druid are almost always held in high regard. Domnall looks at you once more, \"You speak of underestimation, well next time give us a reason not to.\"\n                              *set Cathal -10\n                              *goto 42\n         \n                        *else\n                              Domnall ignores him, \"If I'd wanted your silence I would have left you to leave with the captains. Next time you chieftain commands for your opinion, you will give it. I have had enough indecisiveness from my people today to leave Crom second-guessing himself.\"\n                              *set Cathal -5\n                              *goto 42\n                  #Stay silent\n                        Domnall thinks for a moment, conflicted.\n                        *goto 42\n*label 42\n\"My chieftain,\" Cathal pleads, \"you know as well as I that the Gan Stad forest is a place old as the first men, and valued by the gods over any sacrifice man can offer them. Do not be so foolish as to think you can disrespect them so without the gods having their reckoning.\"\n\nDomnall runs his fingers through his beard as Cathal speaks, and judges you with his gaze, before seemingly coming to a conclusion. \"We have not enough reason to believe the Ó Gearailt advance through the Gan Stad, so to burn part of it it would be a senseless crime against the gods.\" He marches briskly towards the tent's flap, with the petty chieftains, Cathal and yourself following behind.\n*goto 43\n*label 43\n*page_break You step outside\n\nThough most of Domnall's forces have been assigned rolls, hunting, scouting and fletching arrows, a hundred or so are huddled around the tent. Their concern and curiosity from the noises of aggression within then tent must have been piqued further now that Medb along with some forty riders, are mounting their steeds. Each one of them carries a fresh torch, except for the standard bearer. She holds the Ó Cuinn banner high, letting it's white and yellow colours flicker in the wind like an otherworldly flame. On it is the silver stallion of the Cuinn clan, with flaming wings emerging from his back. Hoisted high on a pole seven feet tall, the banner stands taller than any of the Mac Conmara standards, perhaps an intended slight.\n\nDomnall bellows across the camp, \"I command you, dismount your people, Medb!\" She ignores him, and spurs her bright white stallion around. Her riders follow suit. In a cry of desperate anger, Domnall shout; \"Anyone who follows the disloyal hag will have their lands seized!\" Looks of shock and fear flash across the rider's faces, but as Medb brings her stallion to a trot, the riders turn their backs on their desperate high chieftain, and canter to Medb's side. Cathal raises his hands above his head as they grow smaller, \"Heretics! Traitors! Enemies of Crom and chieftain alike.\" He then pleads to Domnall, \"They have disobeyed your orders and bear torches for the burning of the holy wood. Send your riders now to them, I beg you sire. The gods will be as angry with us for not stopping Medb as they will be about the damage she'll cause.\" When Domnall turns his back on him to go back into the tent, Cathal whispers in a voice that is barely audible from where you stand, \"A chieftain with subjects that don't obey him, is no chieftain at all.\" Domnall freezes, his jaw tightens. He turns to the hundred gathered at the tent, and speaks to his captain of the cavalry, \"My orders to Medb were clear, assemble fast… and cut her down.\"\n\n*page_break The squelching sound of hooves in mud fills the camp\n\nThe entire remaining cavalry under Domnall's command rides in the direction where Medb's horsemen disappeared behind the hills, eighty riders in all. Mail clinks against torsos and scabbards bounce against horse's sides as the men ride. All ride on bear backed horses, such is the Conmara way. \"Fight with Dagda's strength, with Crom's ferocity!\" Cathal shouts as the last riders mount and follow the captain's small army. \"You fight for the gods' honour!\". Medb's two loyal chieftains are dismayed, though at the spearpoint of Domnall's men they cease their protests. Though a large portion of Domnall's force they make up, they are vastly outnumbered. Even so, a brawl looks set to break out. Though all assembled had sworn loyalty to their high chieftain, for the people further north of Domnall's domain, it is with Medb and her loyal chieftains their hearts lie. To her, for leading them to victory in their early skirmishes with the Gearailt, they owe their lives. Domnall, well, he was more of an abstract figurehead to most before the four hundred were assembled.\n\nThe men most loyal to Medb, and those loyal to Domnall face off against each other. Before things can escalate, the main chieftain loyal to Medb, Aedan, speaks out. \"You have betrayed your most loyal, and powerful, ally in Medb. Do not expect the loyal support we have given to continue, Domnall.\" With that, he raises one hand above his head, and makes a fist. Eighty men and women disassemble their tents, and begin packing away their supplies. You see Domnall looking to Cathal, and then to you, hopelessness in his eyes Aedan's loyal warriors leave the camp. Domnall watches as his vast army four hundred strong is shrivelled into a meagre two hundred and fifty.\n\nOscar walks up to Domnall meekly, and whispers in his ear. Domnall is about to push him away irritatedly, and then seems to consider Oscar's words for a moment. Oscar holds a small object in his fingers, and passes it to Domnall. Cathal has overheard them, by the worry in his eyes, \"My liege, I strongly urge you not-.\" Domnall waves him for silence, and walks into the tent bearing whatever it was Oscar handed him between his fingers. Oscar smiles smugly as the high chieftain disappears behind the flaps, and Cathal shakes his head with concern. Oscar waves the curious onlookers away, \"Back to work, folks. Leave our chieftain to his privacy.\" Though not a captain of prestige, a captain still he is. Grudgingly, the somber warriors return to their tents, sharpening iron and bronze, or simply lounging about. You can see Diarmuid playing a tune with his strings beside the flameless campfire, and at the edge of the camp several men practice their sparring. Until Domnall's cavalry returns, with the blood of Medb's riders on their swords or not, it seems as though the remaining warriors of the camp will have to remain put. \n*goto 45\n\n*label 45\nWhat do you wish to do?\n*choice\n      *if MetCaelan >0\n            #Sleep for the rest of the day\n                  Are you sure? Do you think you've made the most of this rare day of rest?\n                  *choice\n                        #Yes      \n                              You close the flap of your own tent, and slip under the covers. It's been a tiring day, and much you have learned from it. You can only guess as to what tomorrow will bring…\n                              *finish\n                        \n \n                        #No\n                              *goto 45\n            \n      *disable_reuse #Walk over to where the men spar\n            You walk over to where a small crowd of onlookers are gathered, around two men in an embrace. A woman stands straight and rigid beside them, inspecting them with a grimace. The small crowd eat and drink, and cheering on the two men on. \"Cillian aboo!\" some cry, \"Ferghal aboo!\" the others respond. As you walk nearer you can see the two men struggling in their tight embrace, the man facing you is reddened in the face, and his teeth are gritted. Both wear a tough leather tunic, the right arm of each holding the collar of the other, and the left arm firmly gripping the other's right elbow. Cillian grunts as his back is pulled down slightly by a tug from Ferghal. Ferghal tugs hard at his elbow, trying to loosen his grip so he can't rebalance, and starts to push the weight of his torso onto Cillian's, bending him back further still. Though Cillian tugs hard on Ferghal's elbow in an attempt to pull himself up, Ferghal manages to pull him back still with a strong jerk of the arm holding his collar. Cillian struggles frantically for several seconds longer, until under Ferghal's weight, he crumbles.\n            *set MetCaelan +1\n            *goto 47\n      *disable_reuse #Try to look into Domnall's tent when no one is watching\n            You walk casually around near the tent until all have dispersed, making sure that no one takes notice of you, and seize your chance. You open the flap, allowing you a narrow line of vision into the tent. A quiet gasp escapes you as you see your High Chieftain lying motionless across the round table. His eyes are rolled back between eyelids that rest ajar, cloudy white and visionless slits in the gloomy room.\n            *choice\n                  #Go up to inspect him\n                        Cautiously, you slip inside the tent, allowing the flap to close off the outside behind you. As you step closer, you can see he's breathing. Weakly, but alive. A single strand of drool drips onto the map from the corner of his mouth, darkening the ink. You look across his body, one of his fingers are twitching and his feet are tensed. That's when you see it. Lying on the floor at his feet is a single empty vial. As you pick it up, you see a droplet of a sap remaining at the rim of it. You know immediately what it is. The same stuff you used to ease Ultan's pain, it's asling. Too much of the liquid pleasure can be deadly, and by the state of Domnall right now, he wasn't far off a deadly dose. You hear the voice of Oscar outside as he opens the tent flap, \"Our chieftain wishes for his priva-\" he sees Domnall's near-lifeless body. His lips wobble as he cries out, \"Help! Our chieftain… he- he's..\" Cathal bursts through the tent flap and runs to Domnall's side. You show him the empty vial, and he gives a knowing nod. \"He's had far too much of the sap. He'll be delirious for the next few hours, his personality may differ than normal, and his moods may swing. We are lucky, our chieftain will survive.\"\n                        *set Obedient -4\n                        *set Mischievous +4\n                        *goto 44\n                  #Call for help\n                        Your calls are answered moments later by Cathal, who bursts through the tent flap and stands over the chieftain's body. As Cathal inspects his body, you can see Domnall's still breathing. Weakly, but alive. A single strand of drool drips onto the map from the corner of his mouth, darkening the ink. Cathal looks across his body, one of his fingers are twitching and his feet are tensed. That's when you see it. Lying on the floor at his feet is a single empty vial. Cathal picks it up, you see a droplet of a sap remaining at the rim of it. You know immediately what it is, as does Cathal by the look of him. The same stuff you used to ease Ultan's pain, \"it's asling\", he says. Too much of the liquid pleasure can be deadly, and by the state of Domnall right now, he wasn't far off a deadly dose. \"He's had far too much of the sap. He'll be delirious for the next few hours,\" Cathal thinks aloud, \"his personality may differ than normal, and his moods may swing. We are lucky, our chieftain will survive.\"\n                        *set Obedient +4\n                        *set Mischievous -4\n                        *goto 44\n            \n      *disable_reuse #Talk to Diarmuid\n            You go over to Diarmuid, he looks up from his strings and greets you with a friendly smile.\n            *if Domnallaffair =1\n                  He suddenly seems to remember last night, you can tell by the embarrassment… or shame, in his eyes. \"${name}, I- I'm not sure what you saw precisely but…\" he trails off and looks away. A silence hangs over you both for a very long second.\n                  *choice\n                        #\"It's none of my business\"\n                              He nods at that, \"I do appreciate that, ${name}. Even so, I hope your opinion of me hasn't changed as a result of anything you may have seen?\"\n                              *choice\n                                    #\"I have no idea what you mean\"\n                                          *set Diarmuid +5\n                                          *set Wistful -3\n                                          *set Sharp +3\n                                          He reads your face for a moment, before giving a hurried nod, \"Of course, ${name}, I do tend to blabber about things.\" Eager to change the subject, he shows you the stringed instrument at his lap. \"Ever learnt how to play, ${name}?\"\n                                          *choice\n                                                #\"No, but I'd like you to teach me\"\n                                                      He smiles at you, \"Excellent!\"\n                                                      *goto 46\n                                                #\"I don't have much interest in learning\"\n                                                      He frowns, \"I- I see. I have something I must be doing now anyway, nice to talk, ${name}.\" He walks away from you, and this time when he sits down into his own tent, no tune can be heard.\n                                                      *set Diarmuid -5\n                                                      *goto 45\n                                   \n            \n            \n            \n            \n                                    #\"Of course it isn't\"\n                                          He looks at you questioningly, and smiles. \"I'm glad.\" He looks around, seemingly to everywhere but where you sit, you see his cheeks are reddened to his ears. Finally, though, when he does turn to you he bears a warm smile. He considers his words for a moment, and then shows you the stringed instrument at his lap. \"Ever learnt how to play, ${name}?\"\n                                          *choice     \n                                                 #Yes\n                                                       *goto 46\n                                                 #No\n                                                       He looks away from you to his instrument, positively hurt, he walks off to his bedding, and this time when he sits down into his own tent, no tune can be heard.\n                                                       *set Ruthless +6\n                                                       *set Compassionate -6\n                                                       *goto 45\n                                                             \n                             \n                                          \n                                    #\"It was, somewhat\"\n                                          He looks to you, a reddened sadness in his eyes. \"I see, ${name}…\" He turns looks around for a moment, to anywhere but where you sit, \"Perhaps it's best I take my leave.\" He stands up, his instrument still in hand, and begins to walk off.\n                                          *set Ruthless +8\n                                          *set Compassionate -8\n                                          *set Diarmuid -10\n                                          *choice\n                                                #Let him go off\n                                                      He walks away from you, and this time when he sits down into his own tent, no tune can be heard.\n                                                      *set Ruthless +4\n                                                      *set Compassionate -4\n                                                      *goto 45\n                                                #\"What's that instrument\"?\n                                                      He looks down to the wood and string he carries, surprised. \"This? Well, this is a fine string, and it can play the finest tune.\" He considers his words for a moment, and then asks timidly, \"Would you like me to teach you to use it?\"\n                                                      *choice\n                                                            #Yes\n                                                                  *goto 46\n                                                            #No\n                                                                  He looks away from you to his instrument, positively hurt, he walks off to his bedding, and this time when he sits down into his own tent, no tune can be heard.\n                                                                  *set Ruthless +6\n                                                                  *set Compassionate -6\n                                                                  *goto 45\n                                                            \n                                                      \n                                                      \n                                          \n       \n\n                        #\"I know what happened\"\n                              He nods worriedly, \"And does it- does it bother you, ${name}?\"\n                              *choice\n                                     #\"Of course it doesn't\"\n                                          He looks at you questioningly, and smiles. \"I'm glad.\" He looks around, seemingly to everywhere but where you sit, you see his cheeks are reddened to his ears. Finally, though, when he does turn to you he bears a warm smile. He considers his words for a moment, and then shows you the stringed instrument at his lap. \"Ever learnt how to play, ${name}?\"\n                                          *choice\n                                                  \n                                                  \n                                                     \n                                                   #\"No, but I'd like you to teach me\"\n                                                         \n                                                         He smiles at you, \"Excellent!\"\n                                                         \n                                                         *goto 46\n                                                   #\"I don't have much interest in learning\"\n                                                         He frowns, \"I- I see. I have something I must be doing now anyway, nice to talk, ${name}.\" He walks away from you, and this time when he sits down into his own tent, no tune can be heard.\n                                                         *set Diarmuid -5\n                                                         *goto 45\n                                   \n                                                  \n                                                  \n                      \n                                    #\"It does, a little\"\n                                          He looks to you, a reddened sadness in his eyes. \"I see, ${name}…\" He turns looks around for a moment, to anywhere but where you sit, \"Perhaps it's best I take my leave.\" He stands up, his instrument still in hand, and begins to walk off.\n                                          *set Ruthless +8\n                                          *set Compassionate -8\n                                          *set Diarmuid -10\n                                          *choice\n                                                #Let him go off\n                                                      He walks away from you, and this time when he sits down into his own tent, no tune can be heard.\n                                                      *set Ruthless +4\n                                                      *set Compassionate -4\n                                                      *goto 45\n                                                #\"What's that instrument\"?\n                                                      He looks down to the wood and string he carries, surprised. \"This? Well, this is a fine string, and it can play the finest tune.\" He considers his words for a moment, and then asks timidly, \"Would you like me to teach you to use it?\"\n                                                      *choice\n                                                            #Yes\n                                                                  *goto 46\n                                                            #No\n                                                                  He looks away from you to his instrument, positively hurt, he walks off to his bedding, and this time when he sits down into his own tent, no tune can be heard.\n                                                                  *set Ruthless +6\n                                                                  *set Compassionate -6\n                                                                  *goto 45\n                                                            \n                                    \n                        #I feign ignorance\n                              \"Is something the matter, Diarmuid?\" you ask, he looks back to you curiously. \"Well, ${name}, I'm not sure. It would matter far more if your opinion of me was lowered.\"\n                              *choice\n                                    #\"I have no idea what you mean\"\n                                          *set Diarmuid +5\n                                          *set Wistful -3\n                                          *set Sharp +3\n                                          He reads your face for a moment, before giving a hurried nod, \"Of course, ${name}, I do tend to blabber about things.\" Eager to change the subject, he shows you the stringed instrument at his lap. \"Ever learnt how to play, ${name}?\"\n                                          *choice\n                                                #\"No, but I'd like you to teach me\"\n                                                      He smiles at you, \"Excellent!\"\n                                                      *goto 46\n                                                #\"I don't have much interest in learning\"\n                                                      He frowns, \"I- I see. I have something I must be doing now anyway, nice to talk, ${name}.\" He walks away from you, and this time when he sits down into his own tent, no tune can be heard.\n                                                      *set Diarmuid -5\n                                                      *goto 45\n                                   \n            \n            \n            \n            \n                                    #\"Of course it isn't\"\n                                          He looks at you questioningly, and smiles. \"I'm glad.\" He looks around, seemingly to everywhere but where you sit, you see his cheeks are reddened to his ears. Finally, though, when he does turn to you he bears a warm smile. He considers his words for a moment, and then shows you the stringed instrument at his lap. \"Ever learnt how to play, ${name}?\"\n                                    \n                                          *choice\n       \n                                                #\"No, but I'd like you to teach me\"        \n                                                      He smiles at you, \"Excellent!\"\n                                                      \n                                                      *goto 46\n                                                #\"I don't have much interest in learning\"\n                                                      He frowns, \"I- I see. I have something I must be doing now anyway, nice to talk, ${name}.\" He walks away from you, and this time when he sits down into his own tent, no tune can be heard.\n                                                      *set Diarmuid -5\n                                                      *goto 45\n                                    \n                                          \n                                                    \n                                               \n                                          \n                                    #\"It was, somewhat\"\n                                          He looks to you, a reddened sadness in his eyes. \"I see, ${name}…\" He turns looks around for a moment, to anywhere but where you sit, \"Perhaps it's best I take my leave.\" He stands up, his instrument still in hand, and begins to walk off.\n                                          *set Ruthless +8\n                                          *set Compassionate -8\n                                          *set Diarmuid -10\n                                          *choice\n                                                #Let him go off\n                                                      He walks away from you, and this time when he sits down into his own tent, no tune can be heard.\n                                                      *set Ruthless +4\n                                                      *set Compassionate -4\n                                                      *goto 49\n                                                #\"What's that instrument\"?\n                                                      He looks down to the wood and string he carries, surprised. \"This? Well, this is a fine string, and it can play the finest tune.\" He considers his words for a moment, and then asks timidly, \"Would you like me to teach you to use it?\"\n                                                      *choice\n                                                            #Yes\n                                                                  *goto 46\n                                                            #No\n                                                                  He looks away from you to his instrument, positively hurt, he walks off to his bedding, and this time when he sits down into his own tent, no tune can be heard.\n                                                                  *set Ruthless +6\n                                                                  *set Compassionate -6\n                                                                  *goto 45\n                                                            \n            *else\n                  \"${name}, please, sit with me.\" He pats the ground beside him with his hand. \"I'm about to play my favorite tune, and one I know you're sure to like.\" He pauses for a moment, and his eyes light up with an idea, \"Would you like me to teach you to use an instrument as fine as she?\" He holds up his stringed instrument to you proudly.\n                  *choice\n                        #Yes\n                              *goto 46\n                        #No\n                              He seems to shrink before you, \"Oh… I see.\" He looks around, to anywhere but where you stand. \"It's just as well, then, ${name}. I have some work to attend to.\" He stands up, giving you a curt nod, and walks off to his bedding, disappearing beneath his tent.\n                              *set Ruthless +3\n                              *set Compassionate -3\n                              *goto 45\n                                                            \n                                                      \n                                                      \n                                          \n       \n\n                         \n                         \n                               \n                               \n\n\n*label 44\n*set Party +1\n*page_break Domnall begins to stir\nCathal observes Domnall closely as his eyes begin to flicker, and the tensing of his legs loosens. His arms are shivery as he lifts them, and leans his body forward until he is sat straight. He glances hastily around the room, eying each of you with suspicion. He wipes the drool from his face and tries to speak, but his lips quiver and his jaw wobbles, rendering his words inaudible. Cathal whispers for him to lie down, to relax. Domnall takes in a deep breath, and though the words he releases are jumbled and slurred, you can hear them clear enough. \"A feast… a feast mornin' tomorrow. Tell Conchobar… a feast.\"\n\nCathal shakes his head calmly, \"My liege, your brother is a far way off, and our supplies are far too short for a feast.\" Domnall splutters angrily at that, spittle flying as he insists, \"Feast.. tomorrow, Conchobar… tell.\" A shaky hand grips Cathal's forearm, and Cathal wearily nods. \"I see, my chieftain. We'll send a messenger to your brother, I'll tell the men we are to feast tomorrow's eve.\" Domnall nods sternly, his eyes move as if he has lost control of them, and Cathal turns to you, \"Tell our other messengers that Domnall's brother is to be here for tomorrow's feast.\" Not waiting for an answer, he waves you, and the others who had gathered in concern and curiosity, away. He kneels at the chieftain's side as he continues spurting nonsense much like a toddler. You tell the messengers outside the tent and obediently, if with some confusion, they mount their horses and head off. You'd heard of Domnall's brother Conchobar before. He kept to his own region much of the time, and though he had sent forty men to aid Domnall against the Gearailt, he had not come himself. Some say he was bitter that their mother had chosen Domnall to succeed the throne of the Conmara, and indeed she had the support of the druids and elders alike on that decision. \n\nConchobar was a strange character if rumours could be believed, secretive and ambitious, with something to hide…\n*goto 45\n\n*label 46\nTogether by the cool black campfire, he begins to teach you the sound of each string. Together you sing, and now and then he gives you the instrument to strum. He even tries to teach you a song about an ancient Queen, who battled her past-betrothed King for control of the Fearlanns. \n\n[i]\"The king he ran through river and field\n\nfor his life, his life he was not ready to yield!\n\nThe rain, the rain, it poured and lashed\n\nas on the ground men's throats were slashed!\"[/i]\n\nA gory song, but Diarmuid takes great joy in belting out the lyrics for all the camp to hear. Though some glance at him in annoyance, for most his joy and confidence is contagious. Those who know the lyrics have a kind of sing-off, each trying to sing- or shout- louder than the others. Those that don't know the words hum along, swaying their heads and tapping their feet against the ground as the tunes play out. You find your own feet unable to stop tapping the ground in rhythm with Diarmuid's song. Diarmuid gets giddier and giddier as those nearby cheer him on. Perhaps emboldened by the music, he rests a hand on your shoulder, and leans his head in towards your shoulder.\n*set Music +1\n*choice\n      #Lean into him\n            Delighted, he gives your arm a gentle squeeze and sings out his last few notes along with the others. They clap and cheer, as much to themselves as to Diarmuid, and the mood of the camp is lifted. He gives you a warm smile, \"Glad you could join me, ${name}. It was delightful.\" Before you can respond, he plants a light kiss on the side of your forehead.\n            *set Diarmuid +7\n            *choice\n                  *if Domnallaffair =1\n                        #\"But... you and Domnall?\"\n                              He pauses for a moment, and looks to the ground. \"My chieftain… he has taken a liking to me. I am not one to turn down his advances but, in truth, it is in service to him. I should be glad I have the attention of someone of his standing, even if to be not more than his consort…\" He says that sadly. \"It is my duty to my chieftain, I assure you, nothing more.\"\n                              *choice\n                                    #Kiss his cheek\n                                          He flushes a gentle red as you pull away, \"I'd best get back to my work, ${name}… I enjoyed this.\" He says, unable to contain his beaming smile. \"We'll talk again soon, no doubt.\" He gives you a little bow and heads off to his tent, into which he disappears.\n                                          *set Diarmuid +8\n                                          *set Diarmuidromance 1\n                                          *goto 45\n                                          \n                                          \n                                          \n                                          \n                                    #\"I had better be off\"\n                                          \"I see, I- I apologise.\" He stands up and gives a respectful nod. \"I didn't mean to… make you uncomfortable. It was good to talk.\" He stands up, giving you a curt nod, and walks off to his bedding, disappearing beneath his tent. \n                                          *set Diarmuid -4\n                                          *goto 45\n                        \n                  #Give him a kiss back\n                         You plant a light kiss on his cheek, and he flushes a gentle red as you pull away, \"I'd best get back to my work, ${name}… I enjoyed this.\" He says, unable to contain his beaming smile. \"We'll talk again soon, no doubt.\" He gives you a little bow and heads off to his tent, into which he disappears.\n                         *set Diarmuid +8\n                         *set Diarmuidromance 1\n                         *goto 45\n                  #\"I should go\"\n                         \"I see, I- I apologise.\" He stands up and gives a respectful nod. \"I didn't mean to… make you uncomfortable. It was good to talk.\" He stands up, giving you a curt nod, and walks off to his bedding, disappearing beneath his tent.  \n                         *set Diarmuid -4\n                         *goto 45\n                         \n                   \n                  \n                  \n                  \n      \n      \n            \n      #Lean away from his embrace\n            He stops, his voice fades from the singing in the air, and he looks away once more. Before he does so, however, you can see the scarlet flush of his skin. \"I'm… I apologise, ${name}.\" He leans away, allowing a space between the both of you, and continues again to sing and play his strings, if with a little less fervor than before, and sings out his last few notes along with the others. They clap and cheer, as much to themselves as to Diarmuid, and the mood of the camp is lifted. He stands up and gives you a curt nod, \"Glad you could join me, ${name}.\" He turns from you, and walks to his own tent, into which he disappears.\n            *set Diarmuid -3\n            *goto 45\n*label 47\nA cheer goes up amongst the onlookers as Cillian's back slams into the dirt. The woman walks over to the both of them as Ferghal sits down on the ground beside Cillian, and gives him a brief hug. Both men are heaving for air, and their leather has gone damp. The woman passes to each a cup, and they drink deep. \"Cillian, you're technique was poor.\" she says, \"When your opponent has the upper hand, you should pull their collar sideways to knock them off balance, pulling yourself up against someone with experience is a fruitless waste of energy.\" She turns to Ferghal, \"You are improving, Ferghal, but you cannot always rely on your size, if your opponent was larger then you may not have been able to pull that off. I want to see you try Crom's Hook next time.\" \n\nShe turns to you then, the first thing you see when she does so is a crimson burn scar that runs up hes neck to the bottom of her chin. Her nose is slightly crooked from a few too many hits, and her auburn-brown eyes burn like fire. \"Come to join us, ${lad}?\"\n*choice\n      #\"Absolutely!\"\n          *set Wistful -4\n          *set Sharp +4\n          *if Rugged >55\n              \n              \n              \n              She looks at you and gives an approving nod, \"You look from your cuts and scars like you've tried this before, time to show us your skills in a clinch.\"\n              \n              \n              *set Caelan +5\n              *goto 48\n          *else\n              She looks at you questioningly, \"You don't look like you've spent a lot of time in a clinch, but don't worry, we'll go easy on ya.\"\n              *goto 48\n                  \n            \n            \n            \n      #\"I'm not sure...\"\n          *set Wistful +4\n          *set Sharp -4\n          *if Rugged >55\n              She looks at you and gives an approving nod, \"Don't be shy, ${lad}. You look from your cuts and scars like you've tried this before, time to show us your skills in a clinch.\"\n              \n              \n              \n              *set Caelan +2\n              *goto 48\n          *else\n              \n              \n              She looks at you thoughtfully, \"You don't look like you've spent a lot of time in a clinch, but don't worry, we'll go easy on ya.\"\n              *set Caelan -2\n              *goto 48\n*label 48\nThe small crowd cheers as she slides a leather tunic over you, and sizes up to you. \"I'm Caelan, by the way.\" People around you make room excitedly as she grips the back of your collar with one arm and holds your elbow with the other. She node impatiently for you to do the same.\n*choice\n      *if Female \u003c1\n            #\"This feels wrong\"\n                  She glares at you, offended. \"Women fight in battle, do they not? If a woman was about to slice you from shoulder to shoulder, would you not fight back? This is no different.\" With that, she roughly places your right arm behind her neck, and your left at her elbow. Without warning, she begins to tug you by the collar hard to the side.\n                  *set Caelan -4\n                  *goto 49\n      #Get ready to wrestle\n            The moment your arms fall in place, she tugs you by the collar hard to the side.\n            *goto 49\n            \n            \n      #\"I don't want to fight\"\n            There are grumbles in the crowd around you, and Caelan gives you an irritated glance. \"Right. Off with you, ${boy}, and don't waste our time again.\" She roughly removes the leather tunic and gestures for you to leave.\n            *set Rugged -8\n            *set Delicate +8\n            *set Caelan -8\n            *goto 45\n            \n            \n            \n*label 49\nYour feet stumble for a moment as you bend over under her grip, and she smirks. The crowd give jeers and claps as she lets you get back into your stance. She stands there patiently, braced and never breaking eye contact with you.\n*goto 50\n*label 50\n*choice\n      *disable_reuse #Use your collar hand to pull her downwards\n            *if Endurance >40\n                  Your pull is strong, and for a moment she is taken off guard. Then as she is just about to start bending backwards, she plants her left foot behind her for stability, and pulls your elbow down, loosening your grip. In the moment it takes to adjust your hand for a strong hold, she is back up and pulling you sideways by your collar.\n                  *set Caelan +4\n                  *goto 50\n            *else\n                  You pull hard, but she needs only to steady herself to stop from bending backwards. As you struggle to put her off balance, she plants her left foot behind her for stability, and pulls your elbow down, loosening your grip. In the moment it takes to adjust your hand for a strong hold, she is back up and pulling you sideways by your collar.\n                  *goto 50\n      *disable_reuse #Use your weight to shove her backwards\n             *if Endurance >50\n                   The force of your weight against her loosens her grip on you, and you feel her nearly release her grip on your collar. She manages to pull herself upwards, tugging hard at your elbow as she does so. She eventually steadies herself against you, but the effort has flushed her face red.\n                   *set Caelan +8\n                   *goto 50\n             *else\n                   Your push against her loosens her grip on your collar, but only momentarily. She pulls hard on your collar, and you stumble to the side, nearly falling over as the onlookers cheer.\n                   *goto 50\n      #Try to trip her with my feet\n            You plant your heel behind hers, and before she has time to react, you use all your strength to push her backwards. Her eyes widen as her feet loose their hold on the ground. She hangs for a moment, holding on only by her grip on your collar. You are about to pull her downwards to finish her off, when her grip on your elbow tightens. She pushes hard with her thumb on one of the bones at your elbow, and it sends spasms of pain shooting up your arm. Your hand opens completely involuntarily, and she seizes the chance to hoist herself upwards and send you tumbling to the ground with an almighty pull. The onlookers cheer, \"Caelan aboo!\" as she pulls you to your feet. As you are hoisted upwards, she whispers in your ear, \"That was a dirty trick you tried, ${name}. Let my own trick be your first lesson, you may someday need it.\" She winks as she taps the sensitive bone on your elbow. \"'d be happy to spar again sometime, ${name}. But for now, ${lad}, go rest. You look exhausted.\" Some of the crowd chuckle at that, and nods of approval follow you as you walk from the sparring area.\n            \n            *set Caelan +5\n            *set Endurance +5\n            *goto 45\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n      *label purchased\n      *return\nRemember earlier how we told you that the first few chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n      *subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2022-06-09 $3.99 $2.99 purchased\n*abort", "chapter4": "*image chapter3pic.jpg\n\n\nYou wake to the sound of your name, \"${name}, up with ye.\" The flap of your tent is opened and light bursts in. Through squinted eyes you see before you Caelan's smirking face. \"All these tents are to be cleared for the feast. Need to make room for a banquet table to stuff our bellies at.\"\n*choice\n      #\"What feast?\"\n            She seems surprised, \"You hadn't heard? Our great chieftain decided yesterday there'd be a feast, though to celebrate what I'm not sure. Conchobar, Domnall's brother, will be here before the night's arrived, and Domnall wants all to be prepared. Domnall wants all to be ready well ahead of time, though, so get up off your ass.\"\n            *goto 57\n      #\"I see\"\n            \"Yep\" she continues, \"Domnall's having his brother, Conchobar over for the feast, and he should be here before nightfall. Domnall wants all to be ready well ahead of time, though, so get up off your ass.\"\n            *goto 57\n*label 57\nShe glances irritatedly to Domnall's tent, \"Your guess is as good as mine as to why they sent their best wrestler to spread the message, but here I am.\" She closes the flap, sending the tent back into gloominess, and yells in, \"Get dressed and get your things to the outskirts of the camp, or I'll dump whatever's left when I'm back in ten minutes. You hear her walk off, and you get changed. \n\nYou step outside your tent and around you the camp is already looking very different. Several stumps lay on the outskirts of the camp where trees had been cut down, and logs were being dragged to the center to be made into a great table. The air is filled with the scent of spices and sauces. Though the feast would not be 'till much later, relishes would need mixing and stews stewing. \nThough many are at work, those not involved in cooking or craftsmanship jobs are mostly relaxing, what do you wish to do?\n*choice\n      #Do some reading\n            You flick through a few pages of a book on the Fearlanns, some general folklore and myths surrounding the Gan Stad forest. Not a difficult read for you, but a nice and relaxing morning, and you know those kinds of morning's are few and far between. You are just putting your book down when\n            *set Intelligence +4\n            *goto 58\n            \n      #Help clear the tents from the camp center\n            Though you don't see much of Caelan, she gives you a nod of appreciation seeing you helping another to carry a crate of food from the dining area. You are about to disassemble another tent when\n            *set Caelan +2\n            *set Endurance +2\n            *goto 58\n            \n      #Do some exercises\n            You run the perimeter of the camp four times at a fairly fast pace, you feel tired physically and yet very much woken up. You are about to run one more when\n            *set Endurance +4\n            *goto 58\n*label 58\na watchman's horn blows in the camp outskirts and Domnall, somewhat nervous looking, steps out of his tent, followed by Cathal. Everyone turns in the direction of the horn's call, and from the forest there emerges two dozen men atop fine western stallions. There banners stand tall and proud, their thick woolen capes hang red and green nearly to the ground. Their helms are tall, th
