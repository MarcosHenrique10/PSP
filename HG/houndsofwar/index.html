<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>By Crom — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "houndsofwar", "title": "By Crom", "scenes": {"chapter1": "*image chapter1picfinal2.jpg\n\n\nThe man wrestled and fought against his ropes, from his gritted teeth dripped a pinkish drool, he had bitten his tongue hard. He groaned and gurgled, spitting in your direction with hate and pain and begging in his eyes. He wanted to punch the ground, to scratch himself free of his suffering, to kill anyone around him. \n\nHe slumped down for a moment, panting in exhaustion, the itch leaving him momentarily, before he cried out and began thrashing again. As he had knelt down you'd seen clearly the deep red cracking skin on his back. Such was Crom's rash. A demon of a thing, known for driving the strongest of men mad. Said to feel like white-hot needles beneath the skin, poking at random without warning. You've never had it before, and lucky enough you are, you think to yourself. \n\nThe pink drool is sent like droplets in a storm across the tent as Ultan shakes his head, he screams loud this time, and to stop him taking off the tip of his tongue, you…\n*choice\n      #Shove a wet rag in his mouth\n            He gnashes at your fingers as you place the cool cloth betwixt his teeth, but you move your hand away in time. He chews at the cloth angrily and glares at you with tears streaming from his eyes.\n            *goto 1\n      #Splash cool water over him\n            You pour the bucket over him and he shrieks like a banshee as it touches his back, he bites his tongue hard, but not quite off. More blood streams down his chin and he begins to sob.\n            *goto 1\n      #Drop Dagda's pain serum into his mouth\n            You pull the lid from the tiny vial at your belt, and let a droplet of asling fall into his shuddering mouth. He had already bitten his tongue- hard, but it seemed still intact. The asling would help ease the pain soon, if Dagda was feeling merciful. \n            *goto 1\n*label 1\nUltan is a muscular man, with bountiful scars across his shoulders and a ginger-brown beard. He was tied to several beams in the tent so that his arms stretched out like wings and his face and back were unable to touch any surface. His legs were tied together and weighed down so that he was kneeling. A strange sight it is, a skilled warrior and enduring farmer like Ultan reduced to… this thing. He is tied down tightly, for if allowed, a man with Crom's rash would scratch his skin away, and break his fists slamming the ground. \n\nThe tent is a dome-shaped object, with a central strong wooden beam and several flexible branches around it forming the frame, the frame to which Ultan was tied. Twixt them the dome was water tightened with leathers, protecting them from the heat of the sun above. The Fearlann hills were rarely so hot, they'd been lush grassland since the first men had settled them, but this Spring had been like no other, and under the sun's scornful glare men's skin had turned the colour of blood, and their scars crumbled and cooked. Perhaps the sacrifices of Samhain had displeased Crom, or perhaps he was simply having his fun with the mortals. \n\nYou'd ridden for six days and six nights alongside the Fargock sea together with Ultan. The blood and salt water had rendered Ultan's wool coat useless, and so ha had ridden much of the journey with nothing to cover his belly nor back. What a mistake that was. You have little enough asling left, you hold the vial between your fingers, Dagda's pain serum. Can numb a man of all feeling, but too much could send the numbness to his head. Dangerous, beautiful liquid. \nYou'd already given Ultan some, and who knows how long Crom's rash will last on him, some men have been left in it's suffering for days. It would be unwise to use it all so soon. Ultan's shrieks have begun to lessen into tired sobs and moans of pain, and the world around you is eerily quiet.\n\nYour hut is assembled far enough from the shore that the sea cannot be heard, and the only noise outside is the rustling of leaves in the gentle breeze. No chirping of the bird, no call of the wolf. This is a cursed place. You feel for the weapon at your belt for comfort, your people give to each grown man or woman a weapon that reflects their personality. Yours rarely leaves your side, it's a….\n*choice\n      #A ceremonial flanged mace, for your stubbornness and pride\n            Some consider the mace to be unbalanced and clumsy, but in your hands it sits comfortably. The head is heavy bronze lined with iron, and the handle a smooth ash wood, decorated in thin silver wiring that spirals and knots like the roots of a tree from the heavens. Though a masterwork in it's beauty and craftsmanship, it could crush through shield and helm as good as any weapon of war. That, however, is something you have yet to do.\n            *set sword \"mace\"\n            *set Proud +20\n            *set Humble -20\n            *goto 12\n      #A long dagger of stainless steel, for your honour and loyalty\n            A dagger like no other, it's steel is bright and it's hilt a dark oak wrapped in bull hide. The silver wiring that decorates the small cross guard beautifully knots and twists into the shape of a crescent moon, and shines just as bright. Some claim the dagger to be useless against an armoured opponent, but you know better. If in the arms of one skilled enough to properly use it, a long dagger is unpredictable, fast, and easily pushed between links of chain. That's, however, something you have yet to do.\n            *set Mischievous -20\n            *set Obedient +20\n            *set sword \"dagger\"\n            *goto 12\n      #An engraved light sparth axe, for your reason and humility\n            Though it's shaft is four feet long, giving it plentiful reach, it is made for it's speed. It's shaft it finely carved and finished ash, to a rectangular iron head that curves inward as it connects to the shaft. In the head is engraved in a pattern of knots and spirals, the head of a wolf. Some say the axe is a peasants weapon, but you know it's light weight and speed can't be matched by any longsword of the same length. A cheaper weapon it might be, but it'll cut through flesh and bone as well as the finest sword. That, however, is something you have yet to do.\n            *set Proud -20\n            *set Humble +20\n            *set sword \"sparth\"\n            *goto 12\n      \n*label 12\nDomnall Mac Conmara, chieftain of the Mac Conmara clan, to whom you serve under had gifted it to you six months passed. On the ${sword} is engraved the motto of the Mac Conmara clan; \n\n[i]'Lanna de Dagda'[/i], \n\nmeaning in the old tongue, \n[i]'Blades of Dagda'[/i].\n\nThe Mac Conmara people fancy themselves, after all, as warriors of the gods. It was gifted to you by order of Domnall himself, why is it that he had he looked so favourably upon you? \n*choice\n      #I'd given him advice whenever he needed it\n            You certainly did,\n            *if Intelligence >40\n                  and your advice was well placed and served him well. Although being too young to be considered much of an advisor, you helped him organise food supplies, take record of the clan's coffers, and even designed some of the watch towers that surround the clan's ringfort. He came to admire your intelligence and quick thinking so much that he felt obliged, and very happy, to gift you with such a fine weapon of war. \n                  *set Domnall +20\n                  *set Mischievous -4\n                  *set Obedient +4\n                  *goto 26\n            *else\n                  and your advice was usually well placed and served him well. He took your advise only occasionally, you being too young to be fully trusted, but you helped him organise food supplies, take record of the clan's coffers, and even designed some of the watch towers that surround the clan's ringfort. You'd naturally mad mistakes along the way of course, miscounting wages and food orders. Luckily, you'd been corrected by Domnall's advisors on most of those mistakes. However he came to appreciate your loyalty and hard work, so much that he felt obliged to gift you with such a fine weapon of war. \n                  *set Domnall +5\n                  *set Mischievous -4\n                  *set Obedient +4\n                  *goto 26\n      #I'd scouted for him and delivered far off messages when the need arose, riding day and night\n            His loyal rider, you were instrumental in the organisation and gathering of warriors from every corner of the land under Domnall's rule.\n            *if Endurance >40\n                  Over countless days and sleepless nights, you rode to each ringfort bearing the Mac Conmara banner, and rallied the petty chieftains and the noblemen to march for Domnall's seat of power. The army would never have been able to amass so quickly without your tireless efforts. Domnall recognised that, and felt so indebted to your faultless labour that he gifted you with a ${sword} like no other.\n                  *set Domnall +15\n                  *goto 26\n            *else\n                  You rode hard and fast to rally the petty chieftains and nobility that bore the Mac Conmara banner over their ringforts, and bade that they march for Domnall's seat of power. It was difficult, so exhausting that many a time you found yourself falling asleep on your mount. The great ordeal was almost too much for you, it took longer than expected, but in six days you had reached the ear of each major land-holder in the region. Domnall Mac Conmara believed that you deserved a reward for such an exhausting task, and so gifted you a ${sword} like no other.\n                  *set Domnall +5\n                  *goto 26\n            \n      #I'd risen the spirits of Domnall and the people, with a speech like no other\n            When the armies of Mac Conmara had gathered from all the ringforts and petty chiefdoms under Domnall's control, to prepare to march to the aid of Ó Broinn, the mood had been a somber one. \n            *if Charisma >40\n                  As the camps were set up, and the warriors were preparing their bedding, leery of the battle that would be inevitable, you let your voice be heard. And what a voice it was. The moment is blurred in your memory, but remember you well the shapes of four hundred somber men brought to life at your rousing words. As you finished each bellowing sentence, the men began to reply, first one, then two, then a dozen. Before the speech was over the men were shouting back in fervourous agreement, a mass of passionate cries; \"Domnall aboo!\", \"Lanna de Dagda aboo!\", \"Mac Conmara aboo!\". To every word you spoke they clung. From the corner of your eye you'd seen Domnall red with surprise, before standing before them and calling back; \"Mac Conmara aboo!\" So grateful to you he was, that he gifted you the finest ${sword} he had.\n                  *set Charisma +4\n                  *set Domnall +20\n                  *goto 26\n            *else\n                  As the camps were set up, and the warriors were preparing their bedding, leery of the battle that would be inevitable, you let your voice be heard. Though your words jumbled some, and your voice less of a wolf's bellow than you had intended, before long many began to nod their heads in agreement. Before long, as you finished each sentence, the men began to reply, first one, then two, then a dozen. Before the speech was over the men were shouting back in fervourous agreement, a mass of passionate cries; \"Domnall aboo!\", \"Lanna de Dagda aboo!\", \"Mac Conmara aboo!\". Your words were drowned out in the chants, but your message was heard loud as as thunder and clear as glass. From the corner of your eye you'd seen Domnall, a surprised look on his face, before standing before them and calling back; \"Mac Conmara aboo!\" He appreciated your efforts in arousing his men from their worry to such an extent, that he gifted you a fine ${sword} unlike any you'd seen before.\n                  *set Charisma +4\n                  *set Domnall +5\n                  *goto 26\n                  \n                  \n                  \n                  \n                  \n*label 26\nIt's strange when you think about it, how much you've grown, how your life has changed. When you were younger did you ever think you'd amount to so much? Not so long ago you toiled on your father's fields and played with your older brother, now you're a scout of the Mac Conmara army.\n*choice\n      #I always knew I'd get this far\n            Indeed, since you were a young ${boy} you always too much ambition to remain on the small farm, you always knew bigger things awaited you, speaking of your childhood,\n            *set Proud +7\n            *set Humble -7\n            *goto 27\n      #No, I never dreamed I'd leave the farm\n            You were a humble young ${boy} indeed, and yet here you are. Bigger things await you in the future, that's for certain. Speaking of your younger self,\n            *set Proud -5\n            *set Humble +5\n            *goto 27\n      #Of course I knew, and I intend to go much further\n            This land is ripe and ready for a young and ambitious ${lad} to rise up within her, let's hope your skill can match your confidence. You've held that same confidence since childhood, haven't you? Speaking of your childhood,\n            *set Proud +15\n            *set Humble -15\n            *goto 27\n\n*label 27\nDo you ever think back to your younger years?\n*choice\n      #No\n            Why is that?\n            *choice\n                  #I'm a ${man} grown, I see no reason to\n                       Of course, and anyway, if the urge hits you to think back, there's nothing stopping you.\n                       *set Wistful -10\n                       *set Sharp +10\n                       *goto 19\n                  #Memories can be painful, I'd rather not\n                        There, there. Some boxes are left unopened, this is true, but sometimes the worry of what could be inside bites harder than what truly is within. All in your own time, ${name}.\n                       *set Wistful -5\n                       *set Sharp +5\n                       *goto 19\n     #Yes\n           Of course you do, but why?\n           *choice\n                 #A grown ${man} should look upon ${his} past to prepare for the future\n                       Wise words indeed, soon we'll see if the past's lessons have really taught you enough…\n                       *set Intelligence +5\n                       *set Wistful +5\n                       *set Sharp -5\n                       *goto 19\n                 #I'm not sure, sometimes the past just calls to me\n                       The past is a funny thing, some say to learn from it, others say to move on and forget it, let's hope you've made the right choice in letting it speak to you.\n                       *set Intelligence +5\n                       *set Wistful +10\n                       *set Sharp -10\n                       *goto 19 \n                 \n*label 19\nAside from working the land with your father and brother, what did you mostly spend your time doing?\n*choice\n      #Racing and tussling with the the kids in Eascmore\n            You certainly did, all the play fighting and running came naturally to you, and the work at the farm helped you build the muscle to win much of the time. All that time dashing through rivers and climbing trees left plenty of scratched and scars that remain today, but hey, it's part of your look. All that time with other kids left you with good social skills, even if most of the time was spent shouting and laughing as you played.\n            *set Rugged +10\n            *set Delicate -10\n            *set Charisma +5\n            *set Endurance +10\n            *goto 20\n      #I learnt to read with the druid\n            There was only one druid in the village, an old man, it wasn't easy to convince him to teach you, but once he realised how serious you were about it, he agreed. Because of all the learning and reading, you had less time to spend with the other kids. Your social skills weren't as good back then as a result, but not to worry, you've improved greatly.\n            *set Rugged -10\n            *set Delicate +10\n            *set Charisma -5\n            *set Intelligence +10\n            *goto 20\n      #I didn't do much else really, nearly all my time was spent toiling behind the plough and hoe\n            Oh well, you may have missed out on many of the childhood experiences other children had, but it taught you how to work hard, and so you've grown to be a strong young ${man}.\n            *set Rugged +5\n            *set Delicate -5\n            *set Endurance +15\n            *set Charisma -5\n            *set Intelligence -5\n            *goto 20\n*label 20\nHow long ago it all seems…\n*page_break You are pulled from your thoughts\nThe walls of the hut around you come into focus, and you turn to see Ultan. Crom's rash seems to have lessened, that or he's too exhausted to react to it. He's slumped there like a criminal's corpse on a pike, poor fellow. \"Water,\" he mutters between pants. You'd taken care to give him little water and no food, with the way he'd been convulsing earlier it would have come right back up. You hold a shallow wooden bowl under his chin, keeping your hand out of reach of his mouth, should he try and bite. Men under Crom's curse are unpredictable. He leans his head forward and drinks it like a dog at a puddle. \"Like me to bark for ye too, huh?\" he says with a weary smile when he's finished, trying to make light of his indignity.\n\nYou and Ultan had been sent ahead of the others, to bring news of the armies of Ó Broinn. And news enough there was. They were no more. In their camp you are right now, in one of the few huts left standing. Outside the hut is ash and death. They were to be your allies against the Mac Gearailt clan.\n\nThe Mac Conmara clan, which you have served under for over a year were to ride to the aid of the Broinns when the scouts heard news of a Gearailt advance.  You were sent ahead of the four hundred men and women summoned  for battle by Domnall, your chieftain. Looks like the Gearailts beat you to them. Gearailt means spear rule in the old tongue, indeed they live up to their name. The corpses that surround the camp are shot full of javelins, and heads stand on pikes dotted across what was the Ó Broinn camp. Luckily your hut is far enough from the nearest corpse that the smell of flesh does not fill the space. There is, though, a distinct hanging of something in the air. To be truthful, if you did not know what the smell was, it would be almost a pleasant one. Like the lingering scent of bread from the oven. But cooked instead of dough is flesh. This was the safest place, though. The forests are riddled with wolves and the Gearailts may still be nearby. They would not expect anyone to be sleeping in Crom's own dining hall. \n\nThe camp is open plan, aside from just a few stakes set up randomly at the edges of it, there is little defense. Judging by the many horse corpses that litter the ground, the camp was ridden down by scores of mounted men. \n*choice\n      #The camp leaders were reckless, there should have been proper defences\n            True, if a small ditch had been dug, or more stakes erected, the cavalry would never have been able to ride through, axes swinging and spears thrusting. So many lives could have been saved. Though, it's likely the army had only arrived in the evening, and were attacked a few hours later. If you had been the camp leader, what would you have done differently?\n            *choice\n                  #I would have had hidden watches in the surrounding forest, to sound the alarm if an attack came\n                        A clever plan in theory, but unless a quick and strong leader was at the helm to rally the men together, the shock and disorganization of the camp may have left them to scatter like rats when the mounts rode through. Maybe you're just the kind of leader that would have been able to pull it off.\n                        *goto 21\n                  #I would have had stakes erected throughout the camp, especially around the borders\n                        It would have slowed down the charge to be sure, and an infantry assault on the camp would have been nowhere near as effective. The camp is large, and a lot of effort would have been needed to protect it properly, but it would have saved them from a death surrounded by the crying of horses and skewering of flesh. \n                        *goto 21\n                  #I would have had a ditch dug around the border of the camp, with smaller stakes within it\n                        A cavalryman's nightmare it would have been, but after a long journey the men might be reluctant to spend so much time reinforcing a camp they were only to stay the night in. It would have saved many a life that night, though, that much is true.\n                        *goto 21\n                  #I have no interest in leadership, I don't intent to have to make any such decision\n                        Contentedness can be a virtue, but sometimes life throws things in one's way that one does not expect.\n                        *goto 21\n             \n                        \n      #A true tragedy... but all men die. There's no reason to dwell on it\n            Perhaps… A cold, hard way to look at a massacre, but sometimes a leader must be cold and hard. Had you been the leader, what would have been your approach at stopping this \"true tragedy\"?\n            *choice    \n                  #I would have had hidden watches in the surrounding forest, to sound the alarm if an attack came\n                        A clever plan in theory, but unless a quick and strong leader was at the helm to rally the men together, the shock and disorganization of the camp may have left them to scatter like rats when the mounts rode through. Maybe you're just the kind of leader that would have been able to pull it off.\n                        *goto 21\n                  #I would have had stakes erected throughout the camp, especially around the borders\n                        It would have slowed down the charge to be sure, and an infantry assault on the camp would have been nowhere near as effective. The camp is large, and a lot of effort would have been needed to protect it properly, but it would have saved them from a death surrounded by the crying of horses and skewering of flesh. \n                        *goto 21\n                  #I would have had a ditch dug around the border of the camp, with smaller stakes within it\n                        A cavalryman's nightmare it would have been, but after a long journey the men might be reluctant to spend so much time reinforcing a camp they were only to stay the night in. It would have saved many a life that night, though, that much is true.\n                        *goto 21\n                  #I have no interest in leadership, I don't intent to have to make any such decision\n                        Contentedness can be a virtue, but sometimes life throws things in one's way that one does not expect.\n                        *goto 21\n      #The slaughter is horrific, I'd rather not think on it\n            Indeed, war is tragic and brutal, but sometimes the things we wish to keep from our thoughts, are the things we must consider most so that history does not repeat itself. If you were a leader of the camp, are there things you would have done differently?\n            *choice\n                  #I would have had hidden watches in the surrounding forest, to sound the alarm if an attack came\n                        A clever plan in theory, but unless a quick and strong leader was at the helm to rally the men together, the shock and disorganization of the camp may have left them to scatter like rats when the mounts rode through. Maybe you're just the kind of leader that would have been able to pull it off.\n                        *goto 21\n                  #I would have had stakes erected throughout the camp, especially around the borders\n                        It would have slowed down the charge to be sure, and an infantry assault on the camp would have been nowhere near as effective. The camp is large, and a lot of effort would have been needed to protect it properly, but it would have saved them from a death surrounded by the crying of horses and skewering of flesh. \n                        *goto 21\n                  #I would have had a ditch dug around the border of the camp, with smaller stakes within it\n                        A cavalryman's nightmare it would have been, but after a long journey the men might be reluctant to spend so much time reinforcing a camp they were only to stay the night in. It would have saved many a life that night, though, that much is true.\n                        *goto 21\n                  #I have no interest in leadership, I don't intent to have to make any such decision\n                        Contentedness can be a virtue, but sometimes life throws things in one's way that one does not expect.\n                        *goto 21\n*label 21\n*page_break A whimper in the hut\n\"${name},\" Ultan whispers with a croaky throat, \"You need to head back, the rest are a day's march away. The Gearailt will have questioned survivors, most like' they know the Conmara army is on it's way. We can't let the scum Gearailt flee, if the army has warning we can cut them off before they reach the river. Leave me some bloody asling, and go.\" It's true, the Gearailt army will be somewhat weakened, if the Conmara's men are warned they have a good chance of catching up to the Ó Gearailts.\n\nIt's a dangerous land for a ailed man, however, wolves have already started picking at the corpses on the outskirts of the camp. They've been kept at bay by the few torches you'd set up near your hut, but sooner or later their curiosity will outweigh their fear of fire. The two mounts tied to your tent have already started to tempt them, but a kick from a horse is not worth taking when there's fresh meat to be had on the ground… not yet at least. If you are to warn the army, it would be most apt to go now. That's what you were sent ahead with Ultan for. You know, however, that Ultan's chances of survival are slim if you leave him, and he is in no fit state to ride a horse. \nHe can't even  be left untied, a man with his ailment would do as much damage to himself as a wolf. You could always have him lying across your saddle, but every bump will give him a great deal of pain, and he'll be sure to slow you down…\n*choice\n      #Have him lying across the saddle\n            He jitters and shakes and scratches as you untie him from the hut's frame. Already he's starting to scratch, and scratch hard. In seconds, his nails are bloodied from the tears in his own back, and tears roll from his face as the pain of it hits him. You hold his arms as tight as you can, for however deterring the pain of the scratch is, ten times stronger is the need to itch. He struggles half heartedly against, his urge conflicting with his sense. It will be a great trial to bring him back, but the wolves of the forest would have his flesh at their first chance when the torches go out. That is unless the kicks of the remaining horse is enough of a deterrent. He struggles against you even as you make your decision…\n            *choice\n                  #I'll drug him with the rest of the asling and tie him to the saddle\n                        You force the vial between his lips and hold is shuddering jaw up as the liquid dribbles down his throat. It'll keep him docile for a time. Not enough time to finish the ride, but you can tie him down well enough. His struggling weakens as the serum slowly kicks in, and in moments he's slumped against you like a dead man. You tie him to the front of the horse's saddle, so that he lies with arms falling down one side of the horse, and legs on the other. You slide the harness over the horses neck and fit the nose band on, and push yourself up onto the fine mare. Spurring her around quickly with the reigns, you give her a squeeze with your heels and ride through the camp. She keeps a wide berth of the torches you'd set up around the hut, and of the few glowing embers that remain scattered across the camp. It's a desolate place. There are a few wolves picking at the corpses around the very edges of the camp. They are not in packs, lone males mostly, and they know a human camp is no place for a lone wolf.             \n                        *set Ruthless -10\n                        *set Compassionate +10\n                        *set Ultansaved +1\n                        *goto 22\n\n                        \n                  #It's not worth it... I'm sure he'll be fine here until I return\n                        If only he could have been brought, but you and him were sent as scouts, and both of you knew the risks. His horse is a bold one too, not easily freaked. She'll put up a fair fight if she needs to. You give Ultan a drop of your asling, calming him somewhat, and tie him back down to the pillars of the tent as quickly as you can, before he can hurt himself more. A wicked ailment it is. You untie your own horse and leap onto it. The sooner you've told the army, the sooner someone can retrieve Ultan. You slide the harness over the horses neck and fit the nose band on, and push yourself up onto the fine mare. Spurring her around quickly with the reigns, you give her a squeeze with your heels and ride through the camp. She keeps a wide berth of the torches you'd set up around the hut, and of the few glowing embers that remain scattered across the camp. It's a desolate place. There are a few wolves picking at the corpses around the very edges of the camp. They are not in packs, lone males mostly, and they know a human camp is no place for a lone wolf.\n                        *set Ruthless +10\n                        *set Compassionate -10\n                        *goto 22\n            \n      #Leave him\n           You and him were sent as scouts, and both of you knew the risks. His horse is a bold one too, not easily freaked. She'll put up a fair fight if she needs to. You give Ultan a drop of your asling, calming him somewhat, and tie him back down to the pillars of the tent as quickly as you can, before he can hurt himself more. A wicked ailment it is. You untie your own horse and leap onto it. The sooner you've told the army, the sooner someone can retrieve Ultan. You slide the harness over the horses neck and fit the nose band on, and push yourself up onto the fine mare. Spurring her around quickly with the reigns, you give her a squeeze with your heels and ride through the camp. She keeps a wide berth of the torches you'd set up around the hut, and of the few glowing embers that remain scattered across the camp. It's a desolate place. There are a few wolves picking at the corpses around the very edges of the camp. They are not in packs, lone males mostly, and they know a human camp is no place for a lone wolf. \n           *set Ruthless +10\n           *set Compassionate -10\n           *goto 22 \n            \n      \n\n\n                       \n                       \n                       \n*label 22\n*page_break The beasts of the night scatter\nThe wolves flee as you approach until they are at a distance they deem safe, judging you, reading you. They are unlikely to do you harm, you know, there is food aplenty everywhere here. Still, their eyes shimmer in the darkness as they watch you, manflesh staining their faces crimson.\nYou spur your horse onwards, and the thick oakwood forest envelopes you. Trees charge at you and run away as your mare gallops along. Your ${sword} swings forth and back against her side as the moves. You allow your body to move in rhythm with the sway of hers as she moves. The army is in little rush, you know. The Ó Gearailt plague were not expected to have arrived in the South Fearlanns for four days and nights to come. Most of the Mac Conmara would be asleep by now, aside from the night watch. The army is large, and their campfires shouldn't be hard to find, so long as you keep the mare heading in the direction from where you left them.\n*if Ultansaved =1\n      Ultan's arms and legs sway with the horse, his breathing so quiet one might think him a corpse.\n      *goto 40\n*else\n      *goto 40\n*label 40\nYou're galloping fast under branches and over protruding roots, may Dagda be merciful, may the mare not trip and break her leg. \n\nYou can use your ${sword} well enough, but against a pack of wolves tempted by a wounded horse? May Dagda be merciful indeed.\n*page_break And so he is...\nAfter two hours at speed, and another spent treading more carefully through mud and pond, the thin trails of smoke rising above the canopy nearby appear in your vision. A fox scatters as your horse treads near it, and passing through branch and bush, you arrive into a clearing of tents. \n\nThe camp is silent, aside from the whispers and hushed chatter of a small group around a campfire. Five or six men patrol the camp's borders, armed with sparth axes and shortspears, and carrying torches. Much use they would be in an attack, the forest around the clearing is so dense that even with these lookouts to give warning, the enemy would be upon the camp before the men had left their beddings.\nYour horse walks calmly between the tents towards the fire, her breathing is heavy and her fur moist with mud and sweat. Steam perspires from her nose and open lips as her hooves squelch into the dewy grass. One watchman runs to you, torch outstretched and axe in hand. He stops in your path, \"Who are you, mounted ${man}?\" His cheeks are red, flustered that he hadn't seen you until now. The other watchmen run to you, their faces lit up in the night, the bronze and iron of their helms glowing. They surround you quickly, and your horse sways her head for fear of their spearheads. \n*if Ultansaved =1\n      You hold tightly to Ultan's limp body as the mare rears up to stop it from slipping from the horse. Ultan's started to make weak movements, the asling is starting to wear off.\n      *goto 39\n*else\n      *goto 39\n*label 39\n*choice\n      #\"I am a scout, ${name}, servant of Mac Conmara\"\n            *set Obedient +4\n            *set Mischievous -4 \n            *goto 24\n            \n            \n      #Point to my face, that should say it all\n            They only move in more, tightening their ring around you. The axeman in front of you raises his bronze blade above his head. \"One last time, your name?\".\n            *set Proud +5\n            *set Humble -5\n            *choice\n                  #I am ${name}, a scout of Mac Conmara\n                        *set Obedient +4\n                        *set Mischievous -4\n                        *goto 24\n                  #I ignore them, and go to the chieftain's tent\n                        You direct the mare to the camp center where the largest of the tents lie, and where you know Domnall will be. As soon as you move, the watchmen block your path with a wall of blades and points. One man grabs the reigns as the horse starts to rear up. He is toppled backwards as she pushes her head against him. Two others pull you down from your saddle as you struggle, shoving you into the mud face first. The man with the axe pulls the ${sword} from your belt while two spearmen kneel on your outstretched arms to restrain you. With your head in the dirt, you tell them, \"I'm ${name}, scout of Mac Conmara\". They pause for a moment, and with hands under your armpit to hoist you to your feet, inspecting your face behind the mud. The axeman glares suspiciously into your eyes,\n                        *if Ultansaved =1  \n                              \"And this is the scout that was sent with you?\" He asks as he gestures to Ultan. You tell them what had happened, of the desolation of the Ó Broinn army, and the illness that had taken hold of Ultan.\n                              *goto 52\n                        *else\n                              \"There were two scouts sent to Ó Broinn, what of the other?\". You tell them what had happened, of the desolation of the Ó Broinn army, and the illness that had forced you to leave Ultan.\n                              *goto 52\n                              \n                              \n                        *label 52\n                        *set Obedient -4\n                        *set Mischievous +4\n                        *goto 25\n            \n            \n                        \n      #Ignore them, head straight for the chieftain's tent\n            You direct the mare to the camp center where the largest of the tents lie, and where you know Domnall will be. As soon as you move, the watchmen block your path with a wall of blades and points. One man grabs the reigns as the horse starts to rear up. He is toppled backwards as she pushes her head against him. Two others pull you down from your saddle as you struggle, shoving you into the mud face first. The man with the axe pulls the ${sword} from your belt while two spearmen kneel on your outstretched arms to restrain you. With your head in the dirt, you tell them, \"I'm ${name}, scout of Mac Conmara.\" They pause for a moment, and with hands under your armpit two hoist you to your feet, inspecting your face behind the mud. The axeman glares suspiciously into your eyes,\n            *if Ultansaved =1\n                  \"And this is the scout that was sent with you?\" He asks as he gestures to Ultan. You tell them what had happened, of the desolation of the Ó Broinn army, and the illness that had taken hold of Ultan.\n                  *goto 53\n            *else\n                  \"There were two scouts sent to Ó Broinn, what of the other?\". You tell them what had happened, of the desolation of the Ó Broinn army, and the illness that had forced you to leave Ultan.\n                  *goto 53\n\n            *label 53\n            *set Obedient +4\n            *set Mischievous -4\n            *goto 25\n      \n*label 24\nThey order you from your horse, and you oblige. They circle they surround you in tightens, and one of them grabs the reigns of your horse and pulls her a safe distance from you. The axeman has his axe of bronze still raised, he glares at you with suspicion in his eyes. \"Two scouts were sent, what of the other?\" You tell them what had happened, of the desolation of the Ó Broinn army, and the illness that had forced you to leave Ultan.\n*goto 25\n\n*label 25\nHis eyes widen as your words sink in. \"No, the Ó Broinn have an army of three hundred, that can't be…\". A spearman grabs you by the neck of your tunic roughly, \"Don't dare deceive us, scout\". One of the men pulls him from you. \"The scout doesn't lie about ${his} allegiance, ${his} ${sword} bears the mark of a Mac Conmara warrior\", he says, reading aloud the slogan of the Conmara people from the inscription on the blade, \"Lanna de Dagda.\" \n*if Ultansaved =1\n      Two of the spearman finally take notice of Ultan, who lies across the horse like a drunkard. The asling is wearing from him now, and he's muttering a continuous stream of strange noises into the night air. They untie him from the horse, and bring him to one of the larger tents near Domnall's one once you have told them of his ailment. If Crom is feeling merciful, the maddening rash will be gone in the morning.\n      *goto 31\n*else\n      *goto 31\n*label 31\nThe men at the campfire are quiet now, leaning in to hear what's going on, as the men restraining you finally let go. \"We need to tell Domnall what's happened straight away,\" a spearman insists, but the axeman shakes his head. \"The news will keep 'till morning time, Domnall is fast asleep, no need to disturb him.\" Even as he says this his face is stricken with worry. An entire Ó Broinn army wiped out, the Ó Gearailt's force must be far greater than the scouts had reported. The spearman shakes his head, \"We must warn him, or soon the Gearailts might be upon us, or fled for the hills!\"\n\n\n*finish\n\n\n\n            \n\n\n                        \n                        \n            \n            \n\n\n            \n", "chapter2": "*image chapter2pic.jpg\n\n\nThough you'd served as scout and messenger of Domnall for a time, you know the men of the army that sleeps before you very little. Most of them are peasants and farmers and lowly trained footmen that have been brought from the far reaches of Domnall's domain. The axeman, whom you found out to be named Oscar, ordered fresh clothes and blankets be brought for you. He turns out to be a relatively wealthy fisherman, with a small fleet of ships in his possession. \n\nHe's been awarded by Domnall the position of captain of the night watch. A token position, really, he must have provided some of the food supplies for the journey to have earned it. He has a small tent erected near the campfire for you, and Oscar walks with you to it. \"Our chieftain is not a pleasant man when woken from his sleep. Leave your message with me, and I'll ensure it gets to him. For now, let's join the men at the campfire, eh?\"  \n*choice\n      #Okay\n            He's insistent on keeping the news from spreading, and so you follow him to the campfire.  Even if he is only captain of the lackluster night watch, he outranks a scout. You'll have an opportunity later to warn the king when the men are asleep, anyway, if you so choose. Oscar introduces you as he sits down amongst the men chatting;\n            *set Mischievous -5\n            *set Obedient +5\n            *goto 28\n            \n            \n      #I'd rather tell him myself\n            He seems slightly irritated, but forces a smile to you, \"And so you shall, young ${name}, in the morning.\" He puts a subtle but noticeable emphasis on 'morning'. \"As I said, our chieftain deserves a rest. Let your news stay inside the night watch, too. Best not throw the camp into panic before our leader is even awake\". He's insistent on keeping the news from spreading, and so you follow him to the campfire. Even if he is only captain of the lackluster night watch, he outranks a scout. You'll have an opportunity later to warn the king when the men are asleep, anyway, if you so choose.\n            *set Mischievous +5\n            *set Obedient -5\n            *goto 28\n            \n*label 28\n\"Hey, lads, mind if we join you?\" Oscar says as he sits down with them. Two of them give a look you can't quite see to each other, and another three keep chatting away. His face flushes a little in the dark, you notice.\n\nAfter barely a few seconds, that feel like minutes in the awkward atmosphere, a blonde man with a short-shaven head gives him and yourself a casual smile. \"Captain, 'course you can, don't got many seats here but the grass here is like silk... not that I'd know what silk's like\" he gives a short laugh and gestures for Oscar to sit with him, and he does. He beckons for you to sit with them aswell, the anxiousness on Oscar's face fades away. The three stop their chatter for a moment and give him a curt nod, and go back to their talking, with noticeably less laughter and swigging of ale than before. \"So\" Diarmuid begins in a casual voice, perhaps slightly forced, \"Two scouts leave and one returns, don't leave us in suspense, ${lad}.\" \n*choice\n      #I make up an excuse\n            You tell them that the other is not far behind, that his horse needed to stop to eat, and though Diarmuid looks sceptical, he pushes the topic no further. Oscar's panic fades to a relieved smile directed to you, as he nods along.\n            *set Mischievous +4\n            *set Obedient -4\n            *set Oscar + 15\n            *goto 29\n      #I explain what's really happening to them\n            Just as you start to explain the truth to Diarmuid, Oscar cuts in over your voice, \"That is information reserved for the chieftain\". He says it with a little too much rigour than intended, you guess, and then says with a nervously apologetic smile, \"Sorry, lads\". Without anyone noticing, Oscar gives your wrist a slightly painful squeeze of warning. Diarmuid seems annoyed, but pushes the topic no further.\n            *set Oscar -10\n            *goto 29\n      #Tell them the information is reserved for Domnall\n            Oscar nods his head as you say this, the worry fading to a relieved smile. He nods to you in thanks, and though Diarmuid looks sceptical, he pushes the topic no further.\n            *set Mischievous +4\n            *set Obedient -4\n            *set Oscar +15\n            *goto 29\n      \n*label 29\nIndeed, the flowing of drink slowed, but the blonde man, Diarmuid, is friendly enough. \"So what made ya join the commoners o'er here?\" he asks Oscar with a smile, \"A captain should eat and drink with his men, no?\" Oscar replies. \"Maybe so, maybe...\" Diarmuid sits back in the grass and looks wistfully at the sky.\n\nHe paused for a moment, then looks to Oscar and smiles, \"You're a wise man of the sea, eh? Well you got a campfire in front of you and an audience, so go on, give us a tale\". Oscar looks flustered for a moment, and his cheeks flash red in the darkness once more. He splutters in protest for a moment, but with Diarmuid's encouragement, he composes himself. He puts on a grave voice in mock fear, and begins, \"You all know the old tales of the Sea of Tears, north of the Fargock sea. Of it's waters coming alive with a hunger for manflesh, boats as sturdy and as well built as any, drifting out and without leak or tear of the hull, sinking. One such boat, a trading vessel of the Fearlanns, crafted of oak by the finest engineers, sailed through waters calm as glass for days. But as she rowed her way inland, towards the shores of a far-off land,\" he let his voice go hoarse for effect, \"the sailors noticed a change. The horizon had lifted in their vision. Their boat sat heavier in the water. The men panicked, the water was rising slowly up the sides of the ship. The sailors raced below deck, to find some leak, some pore in the hull. \n\nThere was none. First they threw their heavy ropes overboard, then their trading cargo, then their food. It did no good, still their vessel without a fault to her sunk deeper. The men began to throw each other off, a dozen tumbled into the water, non resurfaced. Only then did the men realise, it was not weight nor leak that was pulling them down, but the will of the sea herself\". \nHe left a lengthy pause after that line before saying, \"And true enough, the sea swallowed them up\". Diarmuid sat back in the grass and laughed, \"Bollocks she did!\" He smiles to Oscar, who looks about to object, and says in admittance, \"Not a bad tale though, not bad at all.\"\n\nOscar sits forward in the grass, leaning into the campfire's warmth, \"Not convinced, no? Well this here's a tale few men know, and it's as real as I am sitting here.\" Diarmuid rolls his eyes back in jest, and Oscar seems to have noticed he finally has the attention of the others, who have turned to him to listen.  This time he uses a gentler, colder voice for a more sinister effect. \"The traders of that boat mayhaps never made it out alive, but several months later, when the shock had worn off, a Fearlann trading company sent another ship. You see, rich people have short memories. This one, she was more of a fishing vessel, wide enough deck but narrow holding below. She was set for an eastern coast, and sailed well enough for a fortnight, eighty or so miles from the shore was where the winds suited her best.\n\nShe'd brought no oars, or at least as few as didn't matter for a boat her size, her captain knew the winds that far from any shore should be reliable enough to sail at a fair pace without manpower. The ship was blown off course, taken south to a sea darker than any they'd seen. One day, as they toiled and struggled to bring her back on course, the winds that had been so persistent and strong just a few miles back, ceased.\" He stares into the embers of the fire as the men sit silent. Diarmuid's grinning at the intensity of his storytelling, which seems to be egging Oscar on, it's clear he wants to impress the people. You've met many like him, people with desire to be respected, to be heard, anxious of being left out. Not a leading quality by any man's definition.\n*choice\n      #A captain trying to impress his men? Pathetic\n            Some men were not born to lead, this man epitomises that. Some might feel sorry for him, for his desire to be accepted, but not you. You know if a man does not have the qualities to lead, even to lead something as token as the night watch, he should not have accepted the position as such.\n            *set Ruthless +5\n            *set Compassionate -5\n            *goto 30\n      #Nice of him to chat with his men...\n            Though he lacks in certain leadership qualities, it's good of him to make an effort with those he leads.\n            *set Ruthless -5\n            *set Compassionate +5\n            *goto 30\n      \n*label 30\nOscar takes a deep breath and continues in a quieter voice than before, \"The ship floated in windless, waveless water for three weeks. The water was so thick with salt the boat floated three or more feet higher than it did on his homeland's coast. Their foodstuffs had been exhausted, and the sea's salt left the waters dead of any fish, seabird or seal. The men, each one strong of mind, loyal and trustworthy when they had set sail, began to turn on each other, drunk from their lack of water. \n\nStarted as bickering and complaining, It's said. Some blamed the captain for allowing them to move so far off course. And with all that crystal calm water like a great endless mirror, with the lack of water and sleepless nights of fear, a man starts seeing things.\" He slowly uncurls his lips from his teeth, and stares deeper into the embers as he speaks. The men had stayed silent, and Diarmuid's smiles turn to an eyebrow cocked with interest, it seemed the others were liking his little tale.\n\n\"They killed the captain first, and in their desperation...\" he continued in a darkly grim voice, \"They ate him.\" He looks around to you, and to Diarmuid, and to the others, many with eyes widened like children's. He smiles dramatically and says, \"But a one man's only got so much meat on his body, and the sailors saw more on each other. They killed and ate, and killed and ate. The last man, seeing the three dozen chewed and maimed corpses of men he'd once drank next to, flung himself overboard and was swallowed by the sea\". Oscar sits up straight with a stern gaze plastered on his face, and looks one by one to each of you, perhaps looking for a smile of approval, or a sign of fear at his story, and finished, \"The ship, several months later, drifted back to a small village far east of here, as if being spat back out by the sea. Hundreds of miles she must have travelled, and the sea brought her to Eascmore\". You're not sure if his gaze rests a little longer on you as he says this, but it feels like it. \"The villagers were so horrified at the scene, that they did something forbidden by the gods of these parts; they set the ship aflame and sent her drifting out, and swore never to speak of the cursed vessel again. The bodies and ship shrivelled to dust, well and good, a spirit however, does not disappear so easily... The souls of those men are trapped between this world and the next, a perpetual hell. Crom's forsaken. Out of mercy for the souls, or deviousness for the mortals, Crom changed them, giving them forms in which they could live, or even allowing some to change between forms.\n\nThe 'Sluagh', they're called. They fly as the blackest crows and hunt as the hungriest wolves. Best advice I can give is to keep your both eyes tightly shut this night, for by the time you did see one of these Sluagh, they  The night was silent for some seconds, before Diarmuid gave an approving chuckle, \"You did not disappoint, Captain, quite a tale, I'm impressed.\" He pours Oscar a cup of wine, and hand another to you, and they both take a deep swig.\n\nDiarmuid turns to you and asks, \"And you, scout ${boy}, what's your name?\" He nods thoughtfully when you tell him, and without saying anything, stand up and goes into a small tent. He rustles around in it for a few minutes, the people around the fire looking curiously at him, before he emerges with a bazouki. An ovular closed bowl it looks like, with a rectangular slab of wood protruding from it, and with strings running from the top of the slab over a small hole on the closed-bowl. He sits the instrument on his lap, and plucks at the strings gently so as not to wake any of the sleeping soldiers, and hums an indistinct tune as he does so. He thinks for a moment, and then with fingers strumming, he begins to gently sing;\n\n\"The young scout named ${name},\nmade all ${his} enemies lame\nand a trail of death ${he} left behind,\nbut the truth he let no one find,\n${name} the young,\nlet not loose ${his} tongue\".\nDiarmuid allows himself a wry smile to you, and finishes;\n\n\"not even to ${his} good friend Diarmuid.\"\nThat gets a chuckle from the others, their curiosity of your findings hasn't left them, so Oscar waves them down with an apologetic smile, \"Afraid the news his fit for Domnall's ears alone, lads. Leave young ${name} alone.\" As he says that one man bids you all a goodnight, and heads to his tent, followed by another. A few minutes later even Diarmuid is gone, and Ultan stumbles off into the darkness towards his own beddings. \nThe watchmen are still about, but they are dotted loosely around the camp and could easily be avoided. If, for any reason, you wish to tell Domnall of your findings alone, now is the time.\n*choice\n      #I head straight for Domnall's tent\n            You know you need to tell him. Oscar's a strange character, he could have sinister plans, or perhaps he simply wants to be the one to tell Domnall, to get closer to the chieftain. You make your way to the tent, stearing clear of the watchmen as they walk aimlessly around the camp, waiting for their shift to finish. Theres only a few hours before daybreak, you guess. You've ridden for longer periods without sleep before, but still, the opening of your eyelids is strained and the closing of them sweet. Too sweet. You shake your head and rub your eyes to wake up, and carefully treading, you arrive at the entrance of the tent. The night is quiet.\n            *choice\n                  #Ask for permission to enter\n                        You open a slit in the tent door so your voice can be heard, and you call into him; \"Domnall, my liege, may I come in? I have importa-\" The flap opens before you can finish, as if he'd been expecting you. His face is characterised by a thick, deep red-brown beard and half a dozen gold ring earings on each ear. He stands at roughly your height, but his frame is far wider, his body built out. His eyes go wide in surprise at seeing you, and he gives you a flustered look. \"Surely news of the Ó Broinn can wait, ${lad}. Off with you, now.\" His annoyance is clear, and he waves you off with his hand. You're not sure, but you think you see his eyes flick about for a moment, as if looking out for someone.\n                        *set Mischievous -4\n                        *set Obedient +4\n                        *choice\n                              #Give him the news anyway\n                                    Just as you start to speak, he gives you a hushed but stern whisper, \"Are you gone deaf from your journey, ${boy}? Off with you!\" His annoyance is turning closer to anger, it would be risky to press any further…\n                                    *set Domnall -5\n                                    *choice\n                                          #He must know!\n                                                You know you have to tell him, new this big simply can't wait. Just as he seems fit to roar at you, you tell him; \"The Ó Broinn army has fallen.\" He pauses for a moment, and arches his eyebrows doubtfully. That's when you tell him all you saw, and his cheeks flushed red with anger recede into a pale worry. His hand goes to his forehead, fiddling with the few strands of red hair not tied back. The other hand clenches suddenly as his eyes close as if in pain, and his fist smashes into one of the tent's beams. The sudden rage fades as quickly as it arrived, and he nods to you. \"Thank you, young ${name}, I shall think on this…\" He closes the tent's flap as he backs away, face stricken with concern. \n                                                *set Telldomnallbroinn +1\n                                                *set Domnall +15\n                                                *goto 31\n                                                \n                                                \n                                                \n                                          #Go to bed\n                                                *goto 31\n                                    \n                                    \n                              #Go to bed\n                                    *goto 31\n                        \n                      \n                        \n                        \n                                             \n                  #Enter quietly\n                        As you open the tent's flap, you see Domnall turn to you in naught but a tunic. He has a welcoming smile on him, \"Dia-\". His face goes white when he sees you, his eyes opening wide in recognition. With a firm beefy hand, he pushes you back from the tent. You stand outside in the quiet night, the only noise being a scuffling of clothes within the tent, paired with the mutterings of curses. Moments later, Domnall emerges, a cloak of wool hanging over his loose tunic. His face is characterised by a thick, deep red-brown beard and half a dozen gold ring earings on each ear. He stands at roughly your height, but his frame is far wider, his body built out. \"What could you possibly want from a tired man at this hour?\", he asks, his face flushed red. Then the realisation hits him, \"Ah, ${name}. Surely whatever new of the Ó Broinn can wait for morning. Go off, now, ${lad}.\" He moves to close the tent's flaps as he waves you away.\n                        *set Mischievous +4\n                        *set Obedient -4\n                        *choice      \n                              #Give him the news anyway\n                                    Just as you start to speak, he gives you a hushed but stern whisper, \"Are you gone deaf from your journey, ${boy}? Off with you!\" His annoyance is turning closer to anger, it would be risky to press any further…\n                                    *set Domnall -8\n                                    *choice\n                                          #He must know!\n                                                You know you have to tell him, new this big simply can't wait. Just as he seems fit to roar at you, you tell him; \"The Ó Broinn army has fallen.\" He pauses for a moment, and arches his eyebrows doubtfully. That's when you tell him all you saw, and his cheeks flushed red with anger recede into a pale worry. His hand goes to his forehead, fiddling with the few strands of red hair not tied back. The other hand clenches suddenly as his eyes close as if in pain, and his fist smashes into one of the tent's beams. The sudden rage fades as quickly as it arrived, and he nods to you. \"Thank you, young ${name}, I shall think on this…\" He closes the tent's flap as he backs away, face stricken with concern. \n                                                *set Telldomnallbroinn +1\n                                                *set Domnall +15\n                                                *goto 31\n                                                \n                                                \n                                                \n                                          #Go to bed\n                                                *goto 31\n                                    \n                                    \n                                #Go to bed    \n                                      *goto 31\n                         \n                         \n\n\n\n\n      #I'll tell him in the morning\n            *goto 31\n\n\n\n\n      #I'll wait for an hour to be sure, then I'll go to Domnall's tent\n              You know you need to tell him. Oscar's a strange character, he could have sinister plans, or perhaps he simply wants to be the one to tell Domnall, to get closer to the chieftain. You wait for an hour, wide awake in your beddings. Soon, you judge the time is right, lift the cloth entrance to your own tent, and step out into the cool night's breeze. You make your way to the tent, stearing clear of the watchmen as they walk aimlessly around the camp, waiting for their shift to finish. Theres only a few hours before daybreak, you guess. You've ridden for longer periods without sleep before, but still, the opening of your eyelids is strained and the closing of them sweet. Too sweet. You shake your head and rub your eyes to wake up, and carefully treading, you arrive at the entrance of the tent. The night is quiet.\n              *choice \n                    #Ask for permission to enter\n                          You open a slit in the tent door so your voice can be heard, and you call into him; \"Domnall, my liege, may I come in? I have importa-\". You are cut off by a gasp of surprise and a firm \"No!\". There's a hasty tussle of sheets, and an inaudible whisper, before the cloths that hang as the entrance to the kingly tent, are pulled aside. Diarmuid stands there, a look of annoyance on his face… and then his eyes open in recognition. \"${name}?\" Even in the darkness you can see the burning of his cheeks. \"I- uh-, I'll be off. Goodnight ${name}.\" He hurries off from the tent, wanting to get as quickly away from the conversation as possible. Moments later Domnall emerges, a cloak of wool hanging over his loose tunic. His face is characterised by a thick, deep red-brown beard and half a dozen gold ring earings on each ear. He stands at roughly your height, but his frame is far wider, his body built out. He rests a beefy hand on your shoulder, squeezing too tightly for comfort, and says calmly, \"Young ${name}, the night has made you weary, you've dreamt something up, but strange things happen in dreams, don't they? Some dreams are best left unspoken of, right?\" He looks you up and down, judging, and then releases your shoulder with a gentle pat. \"Whatever news of the Ó Broinn, we shall discuss tomorrow. Goodnight, ${name}.\" He begins to close the tent's flap.\n                          *set Mischievous -4\n                          *set Obedient +4\n                          *set Domnallaffair +1\n                          *achieve scandal\n                          *choice\n                                #Give him the news anyway\n                                    Just as you start to speak, he gives you a hushed but stern whisper, \"Are you gone deaf from your journey, ${boy}? Off with you!\" His annoyance is turning closer to anger, it would be risky to press any further…\n                                    *set Domnall -8\n                                    *choice\n                                          #He must know!\n                                                You know you have to tell him, new this big simply can't wait. Just as he seems fit to roar at you, you tell him; \"The Ó Broinn army has fallen.\" He pauses for a moment, and arches his eyebrows doubtfully. That's when you tell him all you saw, and his cheeks flushed red with anger recede into a pale worry. His hand goes to his forehead, fiddling with the few strands of red hair not tied back. The other hand clenches suddenly as his eyes close as if in pain, and his fist smashes into one of the tent's beams. The sudden rage fades as quickly as it arrived, and he nods to you. \"Thank you, young ${name}, I shall think on this…\" He closes the tent's flap as he backs away, face stricken with concern. \n                                                *set Telldomnallbroinn +1\n                                                *set Domnall +15\n                                                *goto 31\n                                                \n                                                \n                                                \n                                          #Go to bed\n                                                *goto 31\n                                    \n                                    \n                                #Go to bed    \n                                      *goto 31\n                        \n                        \n                        \n                        \n                    #Enter in silence\n                          You open the tent's flaps and walk in. Domnall lets out a panicked gasp and covers himself hurriedly with his blankets… and beside him Diarmuid does the same. Domnall shouts at you with his many earing swinging and his deep red beard twisted into a growl; \"Out!\". You leap back outside the tent. Inside Domnall mutters ferocious curses, and moments later Diarmuid slips out of the tent's flaps, a look of annoyance on his face… and then his eyes open in recognition. \"${name}?\", even in the darkness you can see the burning of his cheeks. \"I- uh-, I'll be off. Goodnight ${name}.\" He hurries off from the tent, wanting to get as quickly away from the conversation as possible. Moments later Domnall emerges, a cloak of wool hanging over his loose tunic. He stands at roughly your height, but his frame is far wider, his body built out. He looks about to shout at you, and then seems to compose himself. He rests a beefy hand on your shoulder, squeezing too tightly for comfort, and says calmly, \"Young ${name}, the night has made you weary, you've dreamt something up, but strange things happen in dreams, don't they? Some dreams are best left unspoken of, right?\" He looks you up and down, judging, and then releases your shoulder with a gentle pat. \"Whatever news of the Ó Broinn, we shall discuss tomorrow. Goodnight, ${name}.\" He begins to close the tent's flap.\n                          *achieve scandal\n                          *set Mischievous +4\n                          *set Obedient -4\n                          *set Domnall -10\n                          *set Domnallaffair +1\n                          *choice\n                                                  \n                                #Give him the news anyway\n                                    Just as you start to speak, he gives you a hushed but stern whisper, \"Are you gone deaf from your journey, ${boy}? Off with you!\" His annoyance is turning closer to anger, it would be risky to press any further…\n                                    *set Domnall -8\n                                    *choice\n                                          #He must know!\n                                                You know you have to tell him, new this big simply can't wait. Just as he seems fit
