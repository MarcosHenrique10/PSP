 you finally drift from consciousness. In this dream, you stand under the shadow of a huge elk that towers over you, it's antlers span the length of two tall man lying horizontally across. They sway at you like vast oak trees. Despite the massive beast's lunges towards you, you are without fear, in fact, you feel a rush of furious confidence. \n\nYou circle the beast, your eyes wildly searching for a way around… or under the great antlers. You, without even thinking, lunge to the right of the elk. As it twists it's heavy antlers to answer, you dig what appear to be hooves into the swampy ground, and like an agile hen harrier, you twist back before the elk has time to swing it's clumsy shield.\n\nWith all the might you can muster, you rip at the elk's tall, muscular neck with your tusks. The elk screams in panic, it loses it's footing in the slippery swamp and comes tumbling down on you. Your knees crumple beneath you as you succumb to the weight of the beast on your back. The muddy soil of the swamp rises around you, and your eyes widen in panic as you realise what is happening… the swamp is swallowing you alive. You scream and shout as you wriggle and squirm in the mud, but your loudest shouts are like the frightened squeal of a pig, and you're squirming like a foal under ${his} mothers protective grip.\n*Page_Break\nYour squeals become muffled as your mouth and snout are swallowed up in the mud, and as you open your mouth to breathe you inhale thick muck and swampy water. It fills your lungs as you struggle for breath, and you regurgitate it after several seconds of agony, only for your lungs to be refilled with it as you squirm and grapple against the elk for dear life.\n\nIt is only when you are shaken violently that you awake, and see Bruce, the Scottish mercenary your father had appointed to be your right hand man. His fingers are slippery against your sweat plastered body as he shakes you, \"We must get out now, my liege, before they see us\". He whispers these words in a fearful, urgent tone as he pulls a knife from his belt and cuts through the bindings on your wrists. You still feel the shadows of the pains that had felt so real in the dream, the burning sensation in your lungs, the feeling of weight on your back, it all, though much weaker now, remains.\n\nHe takes you, still only half concious, outside the tent. \"I scaled both walls with ropes, but the patrols are numerous, you know this place much better than I do, ${name}, I barely escaped the eyes of the guards on my way in and I doubt the two of us would make it through the lot of them unawares. How do we get out?\" His face is tense, his eyes are perpetually searching, even in the cool night air, his brow shines with sweat. \n*goto 39\n*label 39\n*choice\n    #Get away from me, I stand on the side of my Uncle!\n        \"You would betray your own father so cruelly? I have risked my life to rescue you yet you cosy up to your captor? Curse you, insolent ${boy}.\" \n        *choice\n            #Never mind\n                \"This is no time for jokes, ${name}, though I am glad you would not leave a knife in my back like that\"\n                *goto 39\n            #Guards! Help me!\n                \"His eyes open in a mix of tearful fear and rage. He grabs for your neck and begins to strangle you. You struggle but he is far too strong, you feel the blood get trapped in your head, sending a fiery sensation to envelope your skin. The world starts to fade and Bruce only stares into your blurry eyes. Soon the guards have arrived, and Bruce is given a battering to the head with iron-tipped clubs. He lies feebly squirming on the ground as five or maybe more guards beat him to death with kicks and blows. \n                \n                You keel over, coughing and spluttering between gasps for air, you can feel Bruce's finger marks on your neck. His body is dragged outside the camp, as you are binded once more your tent. You hear from the whispers of guards outside that his head is to be put on a pole.\n                \n                The next morning you are awoken by Cathal, who brings you to a large, glamorous tent where Aonghus is waiting.\n                *goto_scene chapter4part2\n                \n            #Get out before I call the guards\n                \"You would dare, would you? I think not!\" He spits in your face in spite, before sneaking out of the tent in silence. It is not long before alarm is raised in the camp and Bruce, by the sound of it, is put to rest with his head on a pole at the outer gates of the camp.\n                \n                The next morning you are awoken by Cathal, who brings you to a large, glamorous tent where Aonghus is waiting.\n                *goto_scene chapter4part2\n    #Between the two of us we could get rid of the watchmen without making a sound....\n        *goto 1001\n    #We should sneak as far as the inner gate, after that there will be too many guards to hide so we'll just have to run for it.\n        Bruce looks at you, his eyes wide, \"you are sure of this? Even if we do make it out of the outer gate, they will likely run us down with their hounds and horsemen!\"\n        *choice\n            #We can start a fire to distract the watchmen!\n                *goto 1000\n                \n            #Not if we get a horse ourselves.....\n               His dark brow furrows, then his lips twist into a grin, \"Good idea, the stables in the outer bailey are seldom patrolled, though it would be near impossible to get out without being spotted, it's a risky move. I wouldn't be surprised if we were shot full of arrows on our way out, but if we have our wits about us we might just be able to pull it off. I'm willing if you are, ${name}\"\n               *choice\n                   #On second thought...\n                       *goto 39\n                   #Then let's make haste!\n                       You head out from the tent, Bruce is clutching the wide selection of throwing daggers at his belt, his head twisting left and right nervously. You both sneak in between tents, sticking to the shadowy areas that seem to have the least guard traffic. Just as you are about to leave your cover and make a run for the stables, you see through the tent walls the silhouette of a man in candlelight.\n                       \n                       The silhouette gets larger and more defined as he nears the walls of his tent. \"Hello?\", he asks suspiciously. You see through the walls of the tent him picking up what appears to be a pole of some kind, he puts his other hand up against the walls of the tent, and pushes it towards you. You and Bruce both glance at each other in panic. A sudden movement would confirm the man's suspicion, but if he persists and touches you, his suspicions would be confirmed anyway, what do you do?\n                       *choice\n                           #Stay still\n                               His hand searches and searches until it touches your chest, you hear the man gasp, and before you can move he has gripped onto you firmly, Bruce raises a knife above his hand, ready to sever it. However, it's too late, the man in the tent pushes his spear through the thin fabric of the tent, plunging is deep into your stomach. You feel blood begin to seep into your mouth as you collapse on the ground, still deeply impaled by the spear. The man shouts an alarm but it all seems muffled to your ears. The blood stains your lips and dribbles out of the side of your mouth, you can feel the stomach acid burning your skin as it seeps out of your only partly clogged wound. \n                               \n                               You feel Bruce's arms under your shoulders and the back of your knees as he picks you up, your vision begins to fade, and so too does the feeling in your toes, then ankles, then thighs. The feeling is also fleeing your fingers and retreating back towards your shoulders, leaving desolate, alien objects hang from your torso. Bruce tries to run with you in his arms, but is struck in the back by a war dart with a 'thunk', and he topples over you. Even though the ground is solid, it feels like it's swallowing you up. The world around you fades and is replaced, by the dream that had left you in shivers this very night, almost like a prophecy, the Irish Elk and Boar, destined to die as one.\n                               *goto_scene death\n                           #Run!\n                               Together, you bolt towards the exit of the inner gate, the guard in the tent hears the sudden scuffling of footsteps and raises the alarm, \"Hey!\", he yells, \"Who's that?\" Several guards on the wall hear the calls, two rush to meet you while another three start closing the heavy wooden gates. Bruce stops to throw three daggers, one after the other, into the thigh and torso of one of them. The other man rushes at you, thrusting and slicing his axe excitedly at you. You have no weapon with you, so you're going to have to improvise…\n                               *choice\n                                   #Grab for the shaft of the axe\n                                       You hold onto it tightly, with both of you wrestling for power in both hands. He gives you a growl in frustration and kicks you hard in the stomach, you collapse onto the ground and he raises his axe above you, grinning in relief. His gleaming smile disappears when the 'thunk' sound of one of Bruce's daggers comes from behind him, he crumples over and collapses at your feet. Bruce grabs you by the wrist, hoists you up and, still winded by the guard's knee, you both run as fast as your legs will carry you towards the thin gap between the steadily closing gates.\n                                       *set health -10\n                                       *goto 50\n                                       \n                                   #Throw a rock at him\n                                       You lean down to pick up a rock, but before you can even get your fingers around it, the guard knees you in the stomach and knock you into the ground hard. His gleaming smile disappears when the 'thunk' sound of one of Bruce's daggers comes from behind him, he crumples over and collapses at your feet. Bruce grabs you by the wrist, hoists you up and, still winded by the guard's knee, you both run as fast as your legs will carry you towards the thin gap between the steadily closing gates.\n                                       *set health -10\n                                       *goto 50\n                                   *if combat >19\n                                       \n                                      #Barge right into him(requires combat 20)\n                                          *goto 2000\n*label 2000\nYou catch him off guard and he topples into the dust, sidestepping him, you and Bruce make your way as fast as your legs will carry you to the very narrow gap between the slowly and steadily closing gates.\n*goto 50\n                               \n*label 1000 \n\"Yes….\", he says impatiently, \"Those tents would go up in flames in seconds, but the only flames I've seen are on the torches of guards or under tomorrows breakfast. Neither would be easy to get hold of.\"\n*choice\n    *if Knowledge >10\n        #We could make our own(requires knowledge 10)\n            \n            \"But how, ${name}? I have not flint and I am not a druid nor a banshee. I don't suppose you would know anything of witchcraft?\" He asks with slightly patronising tone. \"Not witchcraft\", you answer, \"But the men of old had little need for flint or steal\". You hurriedly sharpen a stick and twist it between your palms, over a piece of fabric you had ripped from your bed. After a few short minutes, flickers of smoke begin to rise. You blow softly as flames begin to consume the cloth. Together, with Bruce a little startled from your quick thinking, you sneak from the tent and just as the flame is about to reach your fingers, you place it at the base of a tent some twenty footsteps from your own.\n                       \n            The flames start to lick their way up the sides of the tent as you retreat back from it. You hear the frightened noise of men drowsy from a sudden end to their slumber and screaming as the heat fills the tent. The poles holding the tent up, weakened by the flames, collapse inwards and the black, cinder-stained cloth of the tent wraps up the men inside as they scream in agony. As the timber snaps, sparks spray outward, and in seconds the sparks on the adjacent tents have evolved into great monstrous flames. Soon the whole inner camp is aglow, and the smell of burning fabric and, you suspect, human flesh makes you feel like doubling over and in a fit of coughing, but you know the longer you wait, the less chance you will have of making it out.  \n                       \n            The confused noises of nearby guards, the ringing of bells and sounding of horns in alarm fills the camp. Amidst all the confusion, you and Bruce seem to manage to slip away unawares. However as you run through smouldering walls and panicking hounds and horses, you lose Bruce, you strain your eyes in search of him in the thick clouds of smoke. You crouch down in hiding as you walk, hands feeling forward as you squint in the opaque, dusty air. You hear an alarming 'thunk' behind you, accompanied by the 'thump' sound of a bag of turnips falling hard to the floor. It is only as you near the sound that you recognise the smell of manure in the smoke. \n                       \n            You walk towards the smell, and you see an obscured silhouette of a horse, struggling against the rope that has tied it to the stable fence. As you become nearly close enough to touch it, you trip over a flat, log-like object. You peer closely to it, a human head rendered unrecognisable by a hoof print to the face. The realisation dawns on you, in the thick smoke Bruce must have brushed past the rear of the struggling mare in front of you, causing it to inflict a protective, deadly kick. You feel like screaming, though you know when the smoke starts to clear, someone will be bound to recognise you. \n                       \n            Tears stream from your eyes as you run through the outer gate, whether they are for Bruce or a result of the smoke in your eyes, you're not quite sure. You trod haggardly past men as they run with buckets in their hand towards the swamp, coughing from lungs full of soot as you go. The sound of leather boots squelching through thick mud reverberates outside the camp as men and women alike race back to the camp, weighed down by heavy buckets of water hoping to quench the now all-consuming flames. You don't stop until you both collapse together in a heap, deep in the woods.\n            *set Daragh \"Bruce\"\n            *set elk \"boar\"\n            *set sig +1\n            *achieve daddy\n            *goto_scene chapter6\n            \n \n    #The food is probably surrounded by guards, we'll take a torch from an isolated watchman.\n        \"As you say, ${name}\". His fingers rest on the selection of throwing daggers at his belt as you both creep from the tent. He pulls a cross necklace that hangs tucked under his dark leather armour. He kisses it hurriedly before tucking it back in. You make your way to the ladder of the inner wall, Bruce hides under it, waiting for a guard to climb down it from patrol on the wall. They say it's bad luck to lie beneath the rungs of a ladder, it's where Cromm's children hide, or so your father had told you. Do you join him?\n        *choice \n            #Yes\n                You hear the footsteps of a guard on the wall, the wall is barely twice the height of a cottage, but luckily in the dark the guard doesn't seem to have noticed you. The guard steps down slowly, yawning as he goes, it is only when he is at eye level with you that his eyes widen in alarm. Bruce is too quick for him, however, he stabs the guard in the neck through the rungs of the ladder, precisely between his chain mail coating and his Gallowglass bascinet. Bruce tells you to grab his torch as he gurgles in his own blood, finally collapsing onto the ground. You make your way back towards the tent as quietly as you can, you hear the crunching of grass behind you, and turn around just in time to see a tall guard with his bow aimed at your chest. Bruce manages to send a dagger deep into the guards stomach just in time, the man staggers, but looses an arrow as he collapses, sending it into your shoulder.\n                \n                *set health -40\n                *goto 41\n                           \n            #No\n                \"Damn you, ${boy}\", he growls in frustration. You hear the footsteps of a guard on the wall, the inner wall is barely twice the height of a cottage, but luckily the guard still hasn't noticed you. Bruce pulls you roughly by the arm to come under with him. The guard steps down slowly, yawning as he goes, it is only when he is at eye level with you that his eyes widen in alarm. Bruce is too quick for him, however, he stabs the guard in the neck through the rungs of the ladder, precisely between his chain mail coating and his Gallowglass bascinet. Bruce tells you to grab his torch as he gurgles in his own blood, finally collapsing onto the ground. You make your way back towards the tent as quietly as you can, you hear the crunching of grass behind you, and turn around just in time to see a tall guard with his bow aimed at your chest. Bruce manages to send a dagger deep into the guards stomach just in time, the man staggers, but looses an arrow as he collapses, sending it into your shoulder.\n                *set health -40\n                *goto 41\n                               \n                              \n                  \n                       \n*label 1001\n\"Maybe, I've been a mercenary for several years now and have had plenty of blood on my hands, but you are still young and I doubt you've killed anyone before. A ${man}'s first kill is never easy. Are you sure you're ready?\"\n*choice\n    #On second thought...\n        *goto 39\n    #I'm going to enjoy this!\n        He gives you a firm nod  with a slightly worried look on his face. His fingers resting on the selection of throwing daggers at his belt. He pulls a cross necklace that hangs tucked under his dark leather armour. He kisses it, whispering, \"may God forgive us\"., \"Then let's make haste, ${name}\".\n        *goto 43\n    #I'm ready, I think\n        \"Well then, ${name}, let our words become actions\", he says, his fingers resting on the selection of throwing daggers at his belt. He pulls a cross necklace that hangs tucked under his dark leather armour. He kisses it, whispering, \"May God forgive us\".\n        *goto 43\n*label 41\n\"Gah!\" ,you grunt, the force of the arrow knocks you back onto the hard, stony ground. You lie winded for several seconds, the red shadow of the arrow spreading across your torso. You try to twist yourself up, but the pain that shoots through you makes you gasp, and unable to bear it, you lie back down. You can see from the corner of your eye Bruce running over to the struggling guard and giving him a decisive, imploding blow with his foot on the guard's head. A sickening crunch fills the silent but chilly night air. Bruce lifts you on his shoulders after taking the torch from your hand, you hadn't even realised you were still holding it. \n\nDespite the added weight of you, he still manages to sneak back to the tents as graceful and silent as a fox. He comes to a tent not far  from where your own is situated, and places the torch at it's base. The flames start to lick their way up the sides of the tent as Bruce retreats back from it before putting you down gently, \"Your going to have to run if they see us, no way I could outrun them with you on me\".. You hear the frightened noise of men drowsy from a sudden end to their slumber and screaming as the heat fills the tent. The poles holding the tent up, weakened by the flames, collapse inwards and the black, cinder-stained cloth of the tent wraps up the men inside as they scream in agony. As the timber snaps, sparks spray outward, and in seconds the sparks on the adjacent tents have evolved into great monstrous flames. Soon the whole inner camp is aglow, and the smell of burning fabric and, you suspect, human flesh makes you feel like doubling over and in a fit of coughing, but you know the longer you wait, the less chance you will have of making it out.\n\nThe confused noises of nearby guards, the ringing of bells and sounding of horns in alarm fills the camp. Amidst all the confusion, you and Bruce seem to manage to slip away unawares. However as you run through smouldering walls and panicking hounds and horses, you lose Bruce, you strain your eyes in search of him in the thick clouds of smoke. \n\nYou crouch down in hiding as you walk, hands feeling forward as you squint in the opaque, dusty air. You hear an alarming 'thunk' behind you, accompanied by the 'thump' sound of a bag of turnips falling hard to the floor. It is only as you near the sound that you recognise the smell of manure in the smoke. You walk towards the smell, and you see an obscured silhouette of a horse, struggling against the rope that has tied it to the stable fence. As you become nearly close enough to touch it, you trip over a flat, log-like object. \n\nYou peer closely to it, a human head rendered unrecognisable by a hoof print to the face. The realisation dawns on you, in the thick smoke Bruce must have brushed past the rear of the struggling mare in front of you, causing it to inflict a protective, deadly kick. You feel like screaming, though you know when the smoke starts to clear, someone will be bound to recognise you. Tears stream from your eyes as you run through the outer gate, whether they are for Bruce or a result of the smoke in your eyes, you're not quite sure. You trod haggardly past men as they run with buckets in their hand towards the swamp, coughing from lungs full of soot as you go. \n\nThe sound of leather boots squelching through thick mud reverberates outside the camp as men and women alike race back to the camp, weighed down by heavy buckets of water hoping to quench the now all-consuming flames. You don't stop until you both collapse together in a heap, deep in the woods.\n*achieve daddy\n*set elk \"boar\"\n*set sig +1\n*goto_scene chapter6\n\n*label 43\nYou creep together from the tent, silent as foxes. You try to stay in the shadows as you peer around for any unlucky watchman to come patrolling your way, you slowly move towards the wooden walls. In the dark you can scarcely see the outline of the men on the wall, but by the flickering torches they hold, you know where each man is. You make your way to the ladder of the inner wall, Bruce hides under it, waiting for a guard to climb down it from patrol on the wall. They say it's bad luck to lie beneath the rungs of a ladder, it's where the devil's children hide, or so your father had told you. Do you join him?\n*choice\n    #Yes\n        You hear the footsteps of a guard on the wall, the wall is barely twice the height of a cottage, but luckily in the dark the guard doesn't seem to have noticed you. The guard steps down slowly, yawning as he goes, it is only when he is at eye level with you that his eyes widen in alarm. \n                              \n        Bruce is too quick for him, however, he stabs the guard in the neck through the rungs of the ladder, precisely between his chain mail coating and his Gallowglass bascinet. The sound of a man gurgling in his own blood is like nothing you have ever heard before, the man's eyes convulse in their sockets, his hands desperately grab to pull the dagger from him, holding now onto Bruce's wrists.\n l with you that his eyes widen in alarm. Daragh is too quick for him, however, he stabs the guard in the neck through the rungs of the ladder, precisely between his chain mail coating and his Gallowglass bascinet. \n                               \n                 Bruce tells you to grab his torch as he gurgles in his own blood, finally collapsing onto the ground. You make your way back towards the tent as quietly as you can, you hear the crunching of grass behind you, and turn around just in time to see a tall guard with his bow aimed at your chest. Bruce manages to send a dagger deep into the guards stomach just in time, the man staggers, but looses an arrow as he collapses, sending it into your shoulder.\n                 *set health -40\n                 *goto 41\n                               \n                              \n                  \n*label 1001\n\"Maybe, I've been a mercenary for several years now and have had plenty of blood on my hands, but you are still young and I doubt you've killed anyone before. A ${man}'s first kill is never easy. Are you sure you're ready?\n*choice\n    \n    \n    #On second thought...\n        *goto 39\n    #I'm going to enjoy this!\n        He gives you a firm nod  with a slightly worried look on his face. His fingers resting on the selection of throwing daggers at his belt. He pulls a cross necklace that hangs tucked under his dark leather armour. He kisses it, whispering, \"may God forgive us\"., \"Then let's make haste, ${name}\".\n        *goto 43\n    #I'm ready, I think\n        \"Well then, ${name}, let our words become actions\", he says, his fingers resting on the selection of throwing daggers at his belt. He pulls a cross necklace that hangs tucked under his dark leather armour. He kisses it, whispering, \"May God forgive us\".\n        *goto 43\n*label 41\n\"Gah!\" ,you grunt, the force of the arrow knocks you back onto the hard, stony ground. You lie winded for several seconds, the red shadow of the arrow spreading across your torso. You try to twist yourself up, but the pain that shoots through you makes you gasp, and unable to bear it, you lie back down. You can see from the corner of your eye Daragh running over to the struggling guard and giving him a decisive, imploding blow with his foot on the guard's head. A sickening crunch fills the silent but chilly night air. Daragh lifts you on his shoulders after taking the torch from your hand, you hadn't even realised you were still holding it. Despite the added weight of you, he still manages to sneak back to the tents as graceful and silent as a fox. He comes to a tent not far from the garrison, and places the torch at it's base.\n\nThe flames start to lick their way up the sides of the tent as Daragh retreats back from it before putting you down gently, \"Your going to have to run if they see us, no way I could outrun them with you on me\". You hear the frightened noise of men drowsy from a sudden end to their slumber and screaming as the heat fills the tent. The poles holding the tent up, weakened by the flames, collapse inwards and the black, cinder-stained cloth of the tent wraps up the men inside as they scream in agony. As the timber snaps, sparks spray outward, and in seconds the sparks on the adjacent tents have evolved into great monstrous flames.\n\nSoon the whole inner camp is aglow, and the smell of burning fabric and, you suspect, human flesh makes you feel like doubling over and in a fit of coughing, but you know the longer you wait, the less chance you will have of making it out.  The confused noises of nearby guards, the ringing of bells and sounding of horns in alarm fills the camp. Amidst all the confusion, you and Daragh seem to manage to slip away unawares. \n\nHowever as you run through smouldering walls and panicking hounds and horses, you lose Daragh, you strain your eyes in search of him in the thick clouds of smoke. You crouch down in hiding as you walk, hands feeling forward as you squint in the opaque, dusty air. You hear an alarming 'thunk' behind you, accompanied by the 'thump' sound of a bag of turnips falling hard to the floor. It is only as you near the sound that you recognise the smell of manure in the smoke. You walk towards the smell, and you see an obscured silhouette of a horse, struggling against the rope that has tied it to the stable fence. As you become nearly close enough to touch it, you trip over a flat, log-like object. You peer closely to it, a human head rendered unrecognisable by a hoof print to the face. The realisation dawns on you, in the thick smoke Daragh must have brushed past the rear of the struggling mare in front of you, causing it to inflict a protective, deadly kick. \n\nYou feel as though your eyes are screaming in the thick smoke, though you know when the smoke starts to clear, someone will be bound to recognise you. Tears stream from your eyes as you run through the outer gate, whether they are for Daragh or a result of the smoke in your eyes, you're not quite sure. You trod haggardly past men as they run with buckets in their hand towards the swamp, coughing from lungs full of soot as you go. The sound of leather boots squelching through thick mud reverberates outside the camp as men and women alike race back to the camp, weighed down by heavy buckets of water hoping to quench the now all-consuming flames. You don't stop until you collapse in a heap, deep in the woods.\n*set Daragh \"Bruce\"\n*set rot +1\n*goto_scene chapter6\n\n*label 43\nYou creep together from the tent, silent as foxes. You try to stay in the shadows as you peer around for any unlucky watchman to come patrolling your way, you slowly move towards the wooden walls. In the dark you can scarcely see the outline of the men on the wall, but by the flickering torches they hold, you know where each man is. You make your way to the ladder of the inner wall, Daragh hides under it, waiting for a guard to climb down it from patrol on the wall. They say it's bad luck to lie beneath the rungs of a ladder, it's where the devil's children hide, or so Ailbhe had told you. Do you join him?\n*choice\n    #Yes\n        You hear the footsteps of a guard on the wall, the wall is barely twice the height of a cottage, but luckily in the dark the guard doesn't seem to have noticed you. The guard steps down slowly, yawning as he goes, it is only when he is at eye level with you that his eyes widen in alarm. Bruce is too quick for him, however, he stabs the guard in the neck through the rungs of the ladder, precisely between his chain mail coating and his Gallowglass bascinet.\n                              \n        The sound of a man gurgling in his own blood is like nothing you have ever heard before, the man's eyes convulse in their sockets, his hands desperately grab to pull the dagger from him, holding now onto Daragh's wrists. His fingers twitch pleadingly on Daragh's, but Daragh only pushes the dagger in deeper. The man gasps silently, before finally collapsing onto the ground.\n        *goto 44\n                         \n    #No\n        \"Damn you, ${boy}\", he growls in frustration. You hear the footsteps of a guard on the wall, the inner wall is barely twice the height of a cottage, but luckily the guard still hasn't noticed you. Daragh pulls you roughly by the arm to come under with him. The guard steps down slowly, yawning as he goes, it is only when he is at eye level with you that his eyes widen in alarm. Daragh is too quick for him, however, he stabs the guard in the neck through the rungs of the ladder, precisely between his chain mail coating and his Gallowglass bascinet. \n                               \n        The sound of a man gurgling in his own blood is like nothing you have ever heard before, the man's eyes convulse in their sockets, his hands desperately grab to pull the dagger from him, holding now onto Daragh's wrists. His fingers twitch pleadingly on Bruce's, but Daragh only pushes the dagger in deeper. The man gasps silently, before finally collapsing onto the ground.\n        *goto 44\n*label 44\nYou tuck the body under the ladder, but you both turn your heads as you hear what sounds like the the footsteps of around eight guards. \"This was a very bad idea\", he says, looking around him. He quickly crouch-runs back towards the tents, beckoning you to follow. You duck between two tents and crouch in silence, waiting for the patrol to pass. \"We must get to the stables\", he says in a determined voice, \"otherwise we are both good as dead.\" Just as you are about to leave your cover and make a run for the stables, you see through the tent walls the silhouette of a man in candlelight. The silhouette gets larger and more defined as he nears the walls of his tent.\n\n\"Hello?\", he asks suspiciously. You see through the walls of the tent him picking up what appears to be a pole of some kind, he puts his other hand up against the walls of the tent, and pushes it towards you. You and Daragh both glance at each other in panic. A sudden movement would confirm the man's suspicion, but if he persists and touches you, his suspicions would be confirmed anyway, what do you do?\n*choice\n    #Stay still\n        \n        His hand searches and searches until it touches your chest, you hear the man gasp, and before you can move he has gripped onto you firmly, Bruce raises a knife above his hand, ready to sever it. However, it's too late, the man in the tent pushes his spear through the thin fabric of the tent, plunging is deep into your stomach. You feel blood begin to seep into your mouth as you collapse on the ground, still deeply impaled by the spear. The man shouts an alarm but it all seems muffled to your ears.\n                               \n        The blood stains your lips and dribbles out of the side of your mouth, you can feel the stomach acid burning your skin as it seeps out of your only partly clogged wound. You feel Daragh's arms under your shoulders and the back of your knees as he picks you up, your vision begins to fade, and so too does the feeling in your toes, then ankles, then thighs. The feeling is also fleeing your fingers and retreating back towards your shoulders, leaving desolate, alien objects hang from your torso. Daragh tries to run with you in his arms, but is struck in the back by a war dart with a 'thunk', and he topples over you. \n                               \n       Even though the ground is solid, it feels like it's swallowing you up. The world around you fades and is replaced, by the dream that had left you in shivers this very night, almost like a prophecy, the Irish Elk and Boar, destined to die as one.\n       \n       *goto_scene death\n    #Run!\n       Together, you bolt towards the exit of the inner gate, the guard in the tent hears the sudden scuffling of footsteps and raises the alarm, \"Hey!\", he yells, \"Who's that?\" Several guards on the wall hear the calls, two rush to meet you while another three start closing the heavy wooden gates. Daragh stops to throw three daggers, one after the other, into the thigh and torso of one of them. The other man rushes at you, thrusting and slicing his axe excitedly at you. You have no weapon with you, so you're going to have to improvise…\n       *choice\n          #Grab for the shaft of the axe\n              You hold onto it tightly, with both of you wrestling for power in both hands. He gives you a growl in frustration and kicks you hard in the stomach, you collapse onto the ground and he raises his axe above you, grinning in relief. His gleaming smile disappears when the 'thunk' sound of one of Daragh's daggers comes from behind him, he crumples over and collapses at your feet. Bruce grabs you by the wrist, hoists you up and, still winded by the guard's knee, you both run as fast as your legs will carry you towards the thin gap between the steadily closing gates.\n              *set health -10\n              *goto 50\n                                       \n          #Throw a rock at him\n              You lean down to pick up a rock, but before you can even get your fingers around it, the guard knees you in the stomach and knock you into the ground hard. His gleaming smile disappears when the 'thunk' sound of one of Bruce's daggers comes from behind him, he crumples over and collapses at your feet. Daragh grabs you by the wrist, hoists you up and, still winded by the guard's knee, you both run as fast as your legs will carry you towards the thin gap between the steadily closing gates.\n              *set health -10\n              *goto 50\n          *if combat >19\n              #Barge right into him(requires combat 20)\n                  You catch him off guard and he topples into the dust, sidestepping him, you and Daragh make your way as fast as your legs will carry you to the very narrow gap between the slowly and steadily closing gates.\n                  *goto 50\n*label 50\nYou manage to slip past the gates, looking behind as you run, you see with horror that Daragh didn't make it, you hear the sound of a few desperate clashes of swordplay, but soon the sound of metal slashing through flesh fills the night air. Then all is quiet, except for the sound of your leather boots on the uneven, grassy ground of the outer camp as you run for the stables. Knocking a stable boy into the mud, you leap atop a beautiful, glossy brown mare. She rears up as you hold tightly onto her unbridled neck, doing all you can not to fall off. \n\nYou try to soothe her with whispers of comfort, but still she shakes her sturdy neck back and forth, her long mane almost slapping your face as she moves. Finally you manage to calm her but already several are opening the gates that had ensured an end to Daragh's life, and further uphill a small pack of hunting dogs are bolting towards you. Seeing this the mare panics once more, but this time she pays little heed to you and instead digs her hooves into the hay-littered mud and leaps over the stable gates, she turns to the forest and bolts so fast it is all you can do to grab hold of her flowing mane as you bounce up and down on her bare back. You see some of the guards behind you mounting the remaining horses into the stable. \n\nOne of them blows a cow horn, it somehow aggravates the hunting dogs even further, they snap and froth at the mouth as they begin to pick up more speed. Yet the gap between you and them only widens as your mare accelerates through the open outer gates and into the swamp. You try to redirect her to the path of solid ground, but she is as determined as she is fast, and she pushes onward. The sloshing of hooves thick in mud begins to drown the now distant snapping of dogs. The swamp water splashes up at you as the mare struggles through it, her steps now becoming more strenuous and heavy.\n\nThe mare cries out as the mud crawls up to her knees, she wades through it, and soon her legs are completely submerged. She continues cautiously, seeming to know that in mud this thick, if she trips she may never be able to resurface. You begin to near the side of the swamp and the mud begins to sink around her, revealing the tops of her legs once more. You feel a sense of relief wash over you, but it is then that the 'twok' sound of an arrow embedding itself in flesh behind you is answered by another desperate cry by your steed. \n\nShe rears up to the sound of roaring dogs further down the swamp, they are accompanied by mounted archers, though their stallions dare go no further. Another arrow 'thunk's into her muscular neck and she, now on only her hind legs, falls back into the mud by her side with a squelch, you push away from her as she begins to slowly sink, and pull yourself up to the banks of the swamp. You run, your clothes heavy with mud, into the densely wooded forest. Until finally out of pure exhaustion, you collapse.\n\n*set Daragh \"Bruce\"\n*set rot +1\n*goto_scene chapter6\n\n                         \n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "chapter6": "*image chapter6pic.jpg\n\nDiarmuid is the one to fetch you as your body begins wake. \"Come on, ${name}. Domnall wants you. He seemed very tense.\" He pauses, as if he was about to ask a question, then decides against it. \"Good luck, ${name}… with whatever's going on.\" He leaves, and only then do you notice how drenched in sweat you are now. Your hair is stranded in damp wires, and your back sticks to the blanket as you pull yourself upwards. Domnall sits grimly as you arrive. \n\n*if Domnall > 49\n    \"I…\" he begins, \"It is out of my control, ${name}. My brother is adamant that you accompany him to the Cuan islands, where he believes the insurrectionists are housed.\" He looks ashamed as he continues, \"He is a man in mourning, and I know all too well he cannot be reasoned with. You should be safe. To ensure that you are, you may have one other camp member accompany you on your journey. I shall make an excuse for them to come along, and as I am the one providing Conchobar with the bulk of his force, he shall accept. Choose wisely, ${name}.\"\n    *goto 83\n*else\n    My brother is adamant that you accompany him to the Cuan islands, where he believes the insurrectionists are housed. Oscar has insisted on your behalf that you remain safe. To ensure that you are, you may have one other camp member accompany you on your journey. I shall make an excuse for them to come along, and as I am the one providing Conchobar with the bulk of his force, he shall accept. Choose wisely, ${name}.\"\n    *goto 83\n\n*label 83\nWho do you want to join you on this expedition?\n*choice\n    #\"Diarmuid\"\n        *set lover \"Diarmuid\"\n        *set they \"he\"\n        *set them \"him\"\n        *set their \"his\"\n        *set Caelan -20\n        *goto 96\n    #\"Caelan\"\n        *set lover \"Caelan\"\n        *set they \"she\"\n        *set them \"her\"\n        *set their \"her\"\n        *goto 97\n    #\"Cathal\"\n        *set lover \"Cathal\"\n        *set they \"he\"\n        *set them \"him\"\n        *set their \"his\"\n        *set romance 0\n        *set Caelan -20\n        *goto 84\n        \n*label 96\n*if Diarmuid \u003c40\n    \"I'm not sure he will wish to accompany you, ${name}. You had best pick someone else.\"\n    *goto 83\n*else\n    *set lovercaelan 0\n    *goto 84\n\n\n*label 97\n*if Caelan \u003c40\n    \"I'm not sure she will wish to accompany you, ${name}. You had best pick someone else.\"\n    *set lovercaelan +1\n    *goto 83\n*else\n    *goto 84\n\n\n\n*label 84\n\"It shall be so, ${name}.\" He nods and gestures for you to leave, and anticipation hits you like a stone to the chest, and the next few days slip away, and into the sea the ships and oarsmen go. As the boats are pushed into the sea by forty heaving men, a feint grey in the distance blends like a brushmark towards the sky. The fire in Dagda's wood has spread. May the rains fall heavy soon, lest all be consumed by the blaze.\n\n\n*page_break The great journey\nThree days and three long nights have passed in Dagda's great basin.\n\nThe hull of the longboat falls headlong into the base of the oncoming wave, sending white water crashing over the oarsmen. The slow beating of the great drum keeps the oarsmen in time as they heave over another wave. The thirty-six oars on either side climb the boat over each watery mountain like a rigid bug. Conchobar, who stands next to ${lover} as ${they} beat the drums, yells curses at the sea gods as the ship is hammered by white horses again and again, without respite. Water sloshes from side to side across the deck of the ship, through the feet of the oarsmen like a thousand snakes. An seaman's great soaked beard slaps Conchobar in the face as the wind screams abuse. The whole ship falls forward down the back of a wave, and you grip onto the great drum with all your strength to keep from sliding to your grave. The oarsmen nearly fall backwards off their seats, and fight to keep hold of their oars as another rumble of thunder echoes through the skies. Conchobar brushes the beard from his face and squints through the arrow-like raindrops that attack his face, at the mass of oarsmen in front of him. The great longboat sways onto one side, sending the drummer off balance and onto the deck hard, and for a moment, the oarsmen on one side paddle through naught but wind, flying back as they heaved in their seats with their oars cutting through the air.\n\nOn the other side the rowers are drenched in water, with their side of the boat so low you had feared for a moment the boat would capsize. Conchobar nearly topples into ${lover}, who's sprawled flat on the slippery deck like an upturned bug, as the ship rebalanced itself. He manages to grab the huge oak and leather drum as he skids, his muscular arms hoisting himself back up. The salt makes your eyes tear, and your own hair slaps down at your face. Conchobar reaches down and tugs the fat drummer back onto his feet, his nose had exploded blood when he fell and he furiously rubs red from his eyes as he balances himself. ${lover} grimaces in pain as ${they} rubs ${their} face, then gives a toothy grin at you. \n*choice\n    #Laugh at ${them}\n        The sound of everything is drowned out almost completely by the raging storm, and you and ${lover} laugh together as you fight to stay upright.\n        \n        *set Mischievous +4\n        *set Obedient -4\n        *goto 90\n    #Rush to help ${them}\n        As you lunge to ${their} rescue you lose your footing on the slippery deck, and you and ${lover} laugh together as you fight to stay upright.\n        *set Ruthless -4\n        *set Compassionate +4\n\n        *goto 90\n    #Focus on staying balanced\n        Even with both arms latched to the drum that proves difficult, but before long ${lover} has a secure hold onto the drum.\n        *goto 90\n    \n*label 90\n${lover} begins to beat the drum once more, and hearing the powerful beating through the wild storm gives the momentarily panicked, half-exhausted oarsmen a second wind. Through battered lips and blood, ${lover} gives the sailors a roar of encouragement with all ${they} have in ${their} lungs. Though the wind howls loudly, some of ${lover}'s call reaches their ears, and a growl of agreement through gritted teeth echoes back to ${them} as the oarsmen pull. It looks as though the oars could have snapped, the men pulled with so much vigour. Their veins protrude from their foreheads and forearms with each great pull. \n\nAs the great longboat soars over another great blue mountain, and topples down its back, there appears the navy silhouette of the Cuan islands through the swirling mist. A short, broad stone pier juts out of the nearest island like a stumped, beckoning finger. The heavy rain and towering waves had kept the islands well out of sight, and now the ship stands barely three boat lengths from the pier. Conchobar roars out over the torrents and grunts of the men as they heave, \"Bring her about, hold her up on the sternside!\" In struggled, exhausted synchronisation, the boat is turned so it floats parallel to the village. The waves crash aggressively against the pier and the low stone walls that protect the shore, and the storm shows no sign of letting up, though the waves had gotten tamer the closer the ship came to. It would be risky to try and dock now, the ship could easily end up splinters if they tried to tie up to the pier. \n\n*choice\n    #\"We can't dock now, it's too risky!\"\n        Conchobar raises an eyebrow at your audacity, but with eyes wide in agreement from the oarsmen in earshot, he gives a nod.\n        *set Obedient -7\n        *set Mischievous +7\n        *goto 91\n    #Stay silent\n        Instead it is ${lover} who speaks out, and after some convincing Conchobar gives in.\n        *set Obedient +7\n        *set Mischievous -7\n        *goto 91\n\n\n*label 91\nConchobar calls out to the oarsmen, whose faces glow red with effort in the blue world that has enveloped the ship, \"Hold her up, clansmen, we'll anchor here for the night. Don't worry lads, once the storm passes we'll dock and drink till our bellies ache!\". \n\nOnce the boat was anchored down a safe distance from the shore, warm woolen skins and cloaks are fetched for the men on deck, and ${lover} climbs below deck, most likely for a wineskin, holding a cloth to ${their} nose as blood dribbles down to ${their} tunic.\n\n*choice\n    #Go to check on them\n        You climb down below deck to where ${lover} clutches a cloth to ${their} face. As your feet step down the last rung of the ladder with a creek, ${they} wipe the blood from their face quickly. \"I've made a bad enough mess of myself, eh ${name}?\"\n        *choice\n            #\"Looking dashing as ever\"\n                ${lover} gives a sniffly laugh at that. The room is full of barrels and crates, a faint smell of bread and brew hangs in the air. Though the floor shifts and rocks slowly beneath your feet, this is an oasis compared to just feet above your heads.\n                *if romance =1\n                    \"Come, join me.\" ${lover} pats a barrel beside where they sit.\n                    *set Caelan +5\n                    *set Diarmuid +5\n                    *goto 94\n                *else\n                    \"Well, ${name}, I'm an old man so I get to stay below here. You, on the other hand, are in the prime of your life, you should be on deck with the rest. Up with you, go on.\"\n                    *set Cathal +5\n                    *goto 92\n                    \n            #\"I think we're all a mess after the past few days\"\n                ${lover} smirks at that. The room is full of barrels and crates, a faint smell of bread and brew hangs in the air. Though the floor shifts and rocks slowly beneath your feet, this is an oasis compared to just feet above your heads.\n                *if romance =1\n                    \"Come, join me.\" ${lover} pats a barrel beside where they sit.\n                    *set Caelan +2\n                    *set Diarmuid +2\n                    *goto 94\n                *else\n                    \"Well, ${name}, I'm an old man so I get to stay below here. You, on the other hand, are in the prime of your life, you should be on deck with the rest. Up with you, go on.\"\n                    *set Cathal +2\n                    *goto 92\n                    \n                \n                \n                \n                \n                \n            #\"You really have!\"(joking)\n                 ${lover} gives a sniffly laugh at that. The room is full of barrels and crates, a faint smell of bread and brew hangs in the air. Though the floor shifts and rocks slowly beneath your feet, this is an oasis compared to just feet above your heads.\n                *if romance =1\n                    \"Come, join me.\" ${lover} pats a barrel beside where they sit.\n                    *set Caelan +7\n                    *set Diarmuid +7\n                    *goto 94\n                *else\n                    \"Well, ${name}, I'm an old man so I get to stay below here. You, on the other hand, are in the prime of your life, you should be on deck with the rest. Up with you, go on.\"\n                    *set Cathal +4\n                    *goto 92\n                \n                \n                \n            #\"You need to smarten up\"(serious)\n                *set Proud +2\n                *set Humble -2\n                *if romance =1\n                    ${lover} rolls ${their} eyes at that. \"Don't be so dramatic, ${name}. Besides, if I was in better shape Conchobar mightn't let me down here, where there is warmth and wine all 'round.\" Patting the barrel beside ${them}, ${they} says \"Care to join a wounded sailor?\"\n                    *goto 94\n                *else\n                    Cathal rolls his eyes at that. \"Well, ${name}, I'm an old man so I get to stay below here. You, on the other hand, are in the prime of your life, you should be on deck with the rest. Up with you, go on.\"\n                    *set Cathal -3\n                    *goto 92\n                \n                    \n        \n        \n        \n        \n        \n        \n        \n        \n        \n        \n        \n    #Try to sleep on deck with the oarsmen.\n        *goto 92\n\n\n\n*label 94\nYou get a prickle in the back of your neck and a heating feeling in the forehead. Your heartbeat feels slow, and yet loud. The look in ${lover}'s eyes tells you it might not just be a chit chat ${they} wants.\n*choice\n    #Enthusiastically, I sit beside them.\n        ${lover}'s eyes widen in surprise at your haste, and the rid prickle you feel in your face is reflected on ${lover}'s.\n        *goto 105\n        \n    #I want to play it cool, \"I mean, I really should stay above deck...\"\n        ${lover} smiles, and plays along, \"Ah, there's plenty of room down here, besides I wouldn't mind some company.\" Your feeling is all but confirmed by ${their} tone. It's showtime or notime.\n        *choice\n            #I don't think I can... I tell ${them} I better go.\n                \n                There's an obvious disappointment in ${their} eyes as you bid ${them} goodnight, and make your way above deck.\n                *set Caelan -7\n                *set Diarmuid -7\n                *goto 92\n                \n            #It's showtime.\n                ${lover} smiles broadly as you sit beside ${them}. The red prickle you feel in your face is reflected in their own as you sit beside them.\n                *goto 105\n                \n        \n    #I'm not feeling this. I make an excuse and leave.\n        There's an obvious disappointment in ${their} eyes as you bid ${them} goodnight, and make your way above deck.\n        *set Caelan -7\n        *set Diarmuid -7\n        *goto 92\n\n*label 105\nFor a moment, your tongue is tied and the creaking of the deck above s the only noise in the room. \n*choice\n    #Try to get a conversation going\n        *if Charisma >50\n            After a few of your own finest jests you are both laughing almost uncontrollably. After, once ${lover} catches ${their} breath, ${lover} shuffles an inch closer, and you feel the mood shift from giddy to something slightly different…\n            *set Caelan +5\n            *set Diarmuid +5\n            *goto 106\n        *else\n            *if Charisma >30\n                After a few moments of flowing chatter, ${lover} shuffles an inch closer, and you feel the mood change to something slightly different..\n                \n                *goto 106\n            *else\n                You feel quite awkward and stumble through your words, but ${lover} seems to take no notice. As you ramble, ${lover} shuffles an inch closer, and you feel the mood change to something slightly different..\n                *set Caelan -3\n                *set Diarmuid -3\n                *goto 106\n                \n\n    #Just make good eye contact\n        ${lover} raises an eyebrow as you do your utmost to smolder, but then ${they} gets the message, and shuffles an inch closer to you.\n        *set Caelan +3\n        *set Diarmuid +3\n        *goto 106\n    \n    #Lean in towards ${them}\n        ${lover} looks startled by your urgency, but only for a moment, and then follows your lead.\n        *goto 106\n    \n*label 106\n\n*achieve romance\nIt hits you now just how incredible ${they} look. The blood at ${their} lips does nothing to take away from ${their} natural elegance. It only adds a fire to ${their} beauty.\nYou're not sure quite when, or how, but your lips meet. The burning red in your face fades, and your inhibitions leave you, and minutes flows to minutes like seconds. Nature's chaos reigns outside while you share together an oasis, wholly apart from the world. Eventually you both succumb to the calming music of the sea outside, and seamlessly from your shared dream, you both drift to sleep.\n*page_break A dreamless sleep\n\n\"Aaaagh!\", the gritty voice of Conchobar bellows, making you sit up in shock. \"A whole crew of oarsmen slept in the cold while the both of ye… and amongst the bloody wine and food?\" He gives ${lover} a mighty kick in the legs to wake ${them}, somehow seeming to have slept through the ranting so far, yielding a screech as ${they} too dart awake. He grabs you by the back of the neck and hoists you to your feet with one arm, shoving you towards the ladder. You squint drowsily at the morning sun, and ${lover} gives a yawn as ${they} emerge behind you.\n*set Caelan 15\n*set Diarmuid +15\n*goto 95\n\n\n\n\n\n\n*label 92\nThe night is long and the deck could leave a slug's back stiff, but the warmth emitted by the great carpet of bodies on deck keeps Crom's chills at bay. By the time the storm has passed and welcome sunshine fills the sky, it's morning.\n*set romance 0\n*goto 95\n\n*label 95\nFour other longboats from the fleet have arrived, and the seabirds at the pier had begun their morning calling. Several swift currachs had been sent ahead of time to scout the island and prepare for the main vessel's arrival. The men that had been sent ahead pull the ships to the pier and tie them up, as the exhausted oarsmen get to their feet and stretch after a night spent sitting upright. \n\n${lover} climbs up from below deck and gives a yawn. ${their} hair is a mess and ${their} eyes bagged from the exhaustion of the past three day journey. \"Hate the bloody sea\" ${they} mutter. \"Love it too though.\" Conchobar emerges from below deck moments later. His eyes are wide with delirium, as if the last several nights have been spent without a moment's sleep. \"Great work, men, you've earned a good days rest a hundred times over!\" he calls out. The rowers' response is almost ghostly, three days and nights of rowing with little respite would leave any other men as lifeless shells, and though the rowing clansmen were of a different sort, the journey had taken its toll on them. The men sent ahead on Currachs had made preparations for the vessel's arrival, and within view of the shore lay an array of brightly coloured tents, and though drenched from rain the banners flicker welcomingly.\n\nYou feel a weakness in your legs as you stretch from the boat to the pier, helped by one of the currachmen. Your knees give a sort of jolt as you try to find your feet on the stone pier, feeling so different to the wooden decks of the past three days. It's not unlike the feeling of coming off the last step on a staircase and thinking there's another to come. As you allow your exhausted body to take a knee on firm ground, you feel a weak sickness in the bottom of your stomach, and a quiver from the back of your throat to the roof of your mouth. The feeling of land that does not shift or sway under you brings up the seasickness that had been held down. ${lover}, too, seems to have succumbed to ${their} stomach, kneeling with head peering over the side of the pier. ${they} wipe ${their} chin and gives you a tired smile. \"I think we all need a bit of a fucking break, eh?\". The first of the ships have landed, though more are due to arrive in two days. It seems most likely that the plan is for Conchobar to lead the advance, hold a siege around Medb's holding, and wait for the rest of the ships.\n*if lovercaelan =1\n    *set Diarmuid 0\n    *goto 108\n*else\n    *set Caelan 0\n    *goto 108\n*label 108\n\n*page_break A time for respite\n\nAfter four hours of rest is afforded to the oarsmen, Conchobar orders for the march towards where they believe they'll find Medb's holding to begin. He paces through the makeshift camp, bellowing. Normally a horn would be blasted. However, even that might be just loud enough that people farther inland, behind the great forest that borders the sea, might be alerted. An army of this mass will hardly stay a secret for long.\n\n${lover} finds you in the crowd, and Oscar, who was in one of the last longships, joins you as the trek begins.\n\n\"I heard that when the warriors of the Cuan Isles fight, their faces become those of wolves, and bark like hounds\", Oscar says following a short silence. ${lover} turns to him with a smirk, \"Don't believe all that myself, but glad you've still got your imagination\". Whether or not it was intended to annoy, irritation is plain on his face. Perhaps realising it was taken in offense, ${lover} adds, \"But, hey, few outsiders have ridden far into the islands, so it may be so\". After an extended silence this time, ${lover} takes a swig from ${their} skin of wine and offers some to Oscar. He shakes his head without looking to ${them}, eyes locked on the path ahead. He breathes, and begins again, \"The Mac Tíre, they call them; children of the wild.\" ${lover} raises an eyebrow at you, bet decides against saying anything.\n\nAt midday food is passed down the long line of men, and the hundreds sit to eat. A few lads from the campfire night that were further back in the long convoy come up to your awkward trio as Oscar takes the first bite out of the hard bread. One jogs up to you with a large sack on his back, and with several skins of water. An old-looking mace hangs from his belt. \"A captain eating before his men? Thought you had more honour than that, eh?\" he questions jovially as another four sits down with you. Oscar gives a less than convincing smile at that, and another mocks offense, \"Speaking badly of your own captain to his face? Captain Oscar'll let ye off this time, might be\" he says with an oblivious smile to Oscar, \"But I'd be keeping a better eye on my lips if I were him, eh boss?\". There's a chorus of chuckling amongst the men at that. The laughs of ${lover} and Oscar are noticeably weaker than the rest. Perhaps they had known each other before? The atmosphere would certainly suggest it.\n\nOne man turns to Oscar, \"So, boss, any idea how long a journey we got ahead of ourselves? By the looks of our food supplies it's a long enough one\". It's clear by Oscar's expression he hadn't been kept very much in the know by     Conchobar, and you can tell that fact embarrasses him. \"The mighty Conchobar seems to be keeping as much as he can under his hat. Or crown, even\", he just says jokily. He stands up, pulling his trousers dramatically over his pot-belly. \"I'm gonna take a mighty piss o'er there, be back in a minute\". \n\nAfter  a short exchange of small talk, Oscar emerges from the forest and walks over. He's distractedly looking at the sea in the distance when he trips over someones bag and falls face first into the grass beside you. There's a light hearted laughter ringing around all those nearby, and Oscar laughs it off too as he sits himself up straight. \"A sign I've had a little too much wine, mayhaps\", he says with a smile as he fills another cup with the red stuff from the skin at his belt. That got a light cheer from the men, but ${lover} just rolls ${their} eyes. Oscar notices it from the corner of his eye and turns to ${lover} with a raised eyebrow, \"Is there something amiss, pal?\". He says the 'pal' part with an accusing tone. With a wearily annoyed look on his face, ${lover} shakes ${their} head and reaches for a piece of bread on the communal platter. One of the women pulls the tray to her side before ${lover} can reach it. \n\nShe looks to ${lover} with a hint of mischief in her eyes, and gives a look of exaggerated curiosity, \"Yeah, ${lover}, there something the matter?\" Another in the group looks up from his meal curiously, \"Did I miss something?\". \"Might as well give us a hint\". ${lover} grimaces, and raises ${their} eyes to Oscar. \"Nothing's the matter, Oscar, only that you're making a damn fool of yourself, spilling wine and falling around the place like a drunk\", and turning ${their} gaze away from Oscar, ${they} says, \"You're an embarrassment as a captain\". Only do the words leave ${their} lips when ${they} realises ${they}'d gone too far. Red creeps up ${their} cheeks like fire, and you realise that people all around, in other groups too, have turned to listen. Oscar sits flustered for a second. He stands, looking about to size up against ${them}. Then, he lets out a burp from his drinks, and his face turns redder than the wine on his tongue. \n\n*choice\n    \n    #Laugh\n        Oscar  ignores you, and leaving his wineskin and all but the bag on his back he turns and walks towards the top of the convoy. The remaining people sit in silence for a few moments before the call further up the line is sounded, and the march continues.\n        *goto 116\n    #\"Come on guys...\"\n        Oscar  ignores you, and leaving his wineskin and all but the bag on his back he turns and walks towards the top of the convoy. The remaining people sit in silence for a few moments before the call further up the line is sounded, and the march continues.\n        *set Ruthless -4\n        *set Compassionate +4\n        *goto 116\n        \n    #Stay silent\n        Leaving his wineskin and all but the bag on his back he turns and walks towards the top of the convoy. The remaining people sit in silence for a few moments before the call further up the line is sounded, and the march continues.\n        *goto 116\n        \n        \n\n\n*label 116\n*page_break Night's cool breeze whistles through the trees\n\nThe convoy is near' through the forest when the sun has hidden behind the oaks, and the tall shadows grow until they disappear, as all goes dark.\n\nThe night is quiet as you wrap in cloaks. The sky is clear so no tents are erected. Bar a lamp held by a night watch, the stars and moon are the only lights, and most of those stars are blocked by the canopy. Your face, the only part of your body left open to the wind, is kissed gently by the cold. \n\n*if romance =1\n    ${lover} lies fast asleep as your side, ${their} body leaning onto yours, ${their} breath entering and escaping ${their} lips in a calming melody, and to it you find yourself drifting off.\n    *goto 111\n*else\n    The countless bodies of warmth that surround you gives you comfort. The forest is lonely, but in the great herd around you you feel safe.\n    *goto 111\n\n\n*label 111\n*page_break You allow this day to slip gently away\n\nYou shoot upright to a sound. Alien and frightening. The call of a hundred hounds from the forests around. \n\nThe carpet of men and women around you stir, some shriek and others leap to their feet. Lights, like stars on earth flicker between the trees. \n\nShadows, seen only for the torches they carry, leap between the trees and cackle like madmen. Then the first stick, spiked with iron and fletched with arrows, flies through the air. A thud, a hollow gasp, and the man behind you falls.\n\nCries ring out all around, and the shadows descend on the mass of bodies. \n\nAs they rush with blades swinging, their forms become clearer. The torches they carry light up their faces. Wolf faces. At their heels rush hounds, bounding and barking. On those not yet standing the hounds leap. To those panicked and running the spears are flung. All the faces are a blur, ${lover} has disappeared. And there you sit, somewhere between hell and earth.\n\n\n*choice\n    #Grab for your ${sword}.\n        You hastily reach for it, feeling between your sheets and under the bags that pile beside where you sleep. As all Crom's fury fills the camp, you feel your fingers wrap around your most loyal companion. The cackle of a beastly thing sounds behind you, and when you face it it's eyes seem to ignore all others, and lock on you.\n        *goto 112\n    #Run into the gap of wolf  people, and break for the forest.\n        You dash as quickly as you can. Your legs were wrapped tightly so that you have little feeling in them, and you stumble over supplies and bodies. You get to the edge of the camp when a gray beast darts in front of you. Large, woolly, snout damp with red. It snarls at you and leans back on it's hind legs, ready to pounce. An animalistic cackle sounds behind you, and the hound gives a whine and runs for new prey. You turn, and a wolf man larger than any you have yet seen approaches with slow, calm strides.\n        *goto 112\n    #Play dead.\n        You let your body go limp, and fall to your back. You monitor your breath to stop your stomach from rising too highly, but panic is forcing your breaths to quicken. You lie stone still when a gray beast darts over to you. Large, woolly, it's snout damp with red. It leans over and barks down on your face, making you jump up in fright. The jig is up. It snarls at you and leans back on it's hind legs, ready to pounce. Then an animalistic cackle sounds behind you, and the hound gives a whine and runs for new prey. You turn, and a wolf man larger than any you have yet seen approaches with slow, calm strides.\n        *goto 112\n*label 112\nThe beast holds in it's hand a short sword. If the darkness does not deceive you, it's armour is weak, boiled leather studded with bronze, each stud glistening against the flickering flames that dot throughout the chaos.\n*choice\n    #Lunge at the creature with your ${sword}\n        You raise your ${sword} so that it's level with your head, poising yourself for an attack. You drive your legs into the ground, kicking off, and with your whole bodyweight behind it, your ${sword} arcs like a deadly wind at your assailant. It meets the beast man's armour with speed and force. The thing gives a windless cry out and falls backwards, hard onto the ground. You nearly topple over onto it, with so much momentum powering you forward, but you regain your footing, and stand firmly in the mud and roots of the forest floor.\n        *goto 114\n        \n        \n    #Barge into it, shoulder first\n        You drive your legs into the ground, kicking off, and with your whole bodyweight behind you, you barge into the creature. Your shoulder meets the beast man's armour with speed and force. The thing gives a windless cry out and falls backwards, hard onto the ground. You nearly topple over onto it, with so much momentum powering you forward, but you regain your footing, and stand firmly in the mud and roots of the forest floor.\n        *goto 114\n    #Run from it as fast as you can\n        You turn, feet stumbling in the mud, wishing your legs could only carry you faster. The wolf thing watches as you run, and lets out a laugh. \n        *goto 114\n        \n*label 114\nAnd then something hits you. \n\nYou twist in the air, and land hard, rolling in the mud with the sheer force of the hit. Your head hits the ground, and your vision goes blurry. \n\nThe faint shape of a wolf stands over you. The shape expands as it kneels down to you. With one hand, it grips your hair. The hand is moist, sticky, and dripping with grim red. With it's other hand it hold above you a shine. It flickers red and orange and yellow as torches rush by. Only during the gaps between those moving lights, do you see it's true colours; cold blue, silver. Iron.\n*page_break And death's kiss is brought down to your chest\n\nAs the dagger is inches from your heart, the wolf's head is kicked, so hard the skin rips. You hear a ghastly creek as it's neck yields to the impact, and the wolf snout rips clean from it's face. Though your vision is blurry, you still see the blood. Lots of blood. Despite the pulsing mask of red beneath the wolf skin, you can make out the shape of a very human nose, and it let's out a human-like groan.\n\nYour body is weak, your limbs all limp, and yet you feel yourself rise. As your head lulls forward, you see two meaty hands gripping your around the waist and stomach, dragging your feet along the dirt.\nYou smell. The smell of dog and death. A wolf snout pants like a human beside your ear, and you feel it's damp fur behind your neck.\nIt's one of them.\n\nThen it whispers between heaves. \"Síomha.\" A name you hadn't heard in a long time. The name given to you by your father. It mutters with between short breaths, \"Help… Síomha. Síomha… needs me.\" And then you know. His voice is deeper, rougher, and yet much the same. Conan. Wearing the head of a wolf.\n*choice\n    #Struggle against him.\n        Your muscles are weak but still he grunts in his efforts to hold you still, and takes a moment to readjust his arms for a better grip. \"Síomha, stay. I'm helpin'.\"\n        *goto 115\n    #\"Conan?\"\n        \"Tis me alright. Now shush, shush. Helpin'. Nice 'n quiet now.\" He starts to quicken his pace, dragging you faster.\n        *goto 115\n    #Stay silent\n        He starts to quicken his pace, dragging you away from the clearing where a camp once lay. \"Tha's it, Síomha. Good 'n' quiet.\"\n        *goto 115\n*label 115\n*achieve conan\nThe screams and shouts of the camp get quieter as you are dragged further from the chaos, into the thick of the forest. Your head is pounding, and as the feeling returns to the rest of your muscles, they too start to ache. \nConan huffs and struggles as you arrive at a much smaller clearing. This one smells of horse dung, and all around are mares grazing, tied to the trees.\n\nAn ambush of that sort would have been risky with horses, you know. In the dense forest a horse could have easily stumbled over a branch and broken a leg, and some would panic in the fire. Their heads turn to Conan, sniffing. Startled by the scent of wolf fur and human blood one of them rears up, shaking it's head back and forth.\nConan puts you down gently and removes his wolf head. It takes a while for the mare to be calmed, but when she is, he hoists you onto her and climbs up behind.\n\nBefore you can ask \"Where to?\", he whispers \"Medb, Medb'll want to meet my little Síomha.\"\n\n*finish ", "chapter7": "*image chapter7pic.jpg\n\n\nThe deep, mournful drone of the sea is all you can hear. It reaches out to you for help, lapping over your scabbed feet, desperately sucking the blood from your scars before being pulling back from the shore. The great wall of faces to your left reaches out a hundred miles, laughing at you, sobbing, growling. The faces morph as you walk, conjoining and shrinking, blurring into nothingness before jumping into your vision. From your knees to your thighs, you're encrusted with salt jewels from the  spray of the waves that had dried in the sun. Your thin arms peel like a viper under the burning rays. Long hair mats around your neck, trying to strangle you. And all the while, the faces watch, some drool while others cry. You can feel a thousand eyes on your back, and ten thousand on your face. You know not why, but you can't look into their eyes. Instead, you try to stare at the sand as it moves under you, your feet trudging forward, one step at a time. It's as if you need to keep up with the shore as it moves under you, or fall and be swallowed by the sea. \n\nThe pink sand beneath you beckons you to fall, to hug it, to embrace its comfort. As you struggle a foot forward in the sand, as you know you had done ten thousand times before, a face calls to you through gritted teeth. It speaks in the voice that sounds as though it's tripping over itself, not quite male sounding, nor female, it gurgles and drools as it speaks, \"${name}... hehehe. Take it niiice and slow... hehe... or stop a minute. You'll have plenty... hehe... of time to walk later.\" You look at the ground under your feet as you walk forward, but you can feel the agreement coming from the other faces. The back of your neck burns like the coals of a bonfire, and the ragged gown you wear clings to you like boiled leather rather than wool. Another face calls out in a voice like sand, \"Water... give w-.. wather... pleath\".\n\nYou glance at it, only for a moment, and see it's dry tongue moving over toothless gums as it speaks. You feel the inside of her own dry mouth as the waves lapped up against your ankles, as if to remind you of your thirst. The sea you walk along is like no other, people called it the sea of tears. So saturated with salt it was, that no grass nor shrub could survive in the beaches it bordered, and no fish nor seabird could survive its waters. A sick, hollow feeling had filled your stomach. Your chest pushes forwards and back weakly as you breathe, in rhythm with the sea as it washes over over your aching feet, and teases your parched mouth. Its coolness is a grim one, like the cool feeling of a lifeless body, but even so it beckons you to join it, to fall and be consumed. \n\n*page_break You are shaken awake\n\n\nYou lie face down over the horse's neck, and jerk upwards when you taste some of her mane in your mouth.\n\n\"We're all here an' safe, ${name}.\" Conan ruffles your hair as if you had stayed close all these years, and jumps from the horse. You blink in the sunlight and Medb's holding takes form. It is a ringfort, and one to behold. This is no structure built in a rush upon Medb's arrival in the Cuan islands. She must have made some friends.\nThat must be it, Medb hadn't been known for wolf-warriors, that must have been someone else's doing. \nThe structure is built upon layers of earthen mounds. The center circular castle of stone stands on a mound higher than the outer walls, which are built of sharpened wooden stakes.\nThe silver stallion of the Ó Cuinn clan stands on bright white and yellow banners, and with it another. This one a purple sea serpent on a deep green background. Around the outermost walls is dug in an earthen bank, bristling with stakes.\n\nConan is greeted by a guard, who looks suspiciously over you. \"My little Síomha! There ${he} is.\" They look confused, so he explains how he came across you, and they nod. \"Your Síomha'll need to be taken to a cell just in case, Conan. 'Sounds as though ${he}'s part of the Mac Conmara clan.\" Conan shakes his head, \"No, my Síomha's with us.\" He is reluctant, but agrees for you to be sent to the cell. \n*choice\n    #Object\n        They ignore you when you first try to speak, but one of them gives you a warning glare when you persist. It would be best to stag quiet for the moment.\n        *goto 145\n    #Stay silent\n        *goto 145\n    \n*label 145\n*page_break You are brought inside the fortress\nPeople look and stare as your hands are tied and you are marched through the layers of fortification to the inner stone fortress. The stone walls are wetter and mossy as you are taken downstairs, into the base of the earthen mound. What you hope is a sleeping man lies in one of the cells. The rest are empty. The room is faintly lit by a flickering torch. Conan follows the guards and takes a seat outside your cell as you're locked in. They untie your hands once the doors are shut. They are thick oak studded with bronze, and a rectangle just big enough for one's hand to fit through is cut into the middle of the door. A wooden platform, supposedly a bed, leans out of the stone walls, taking up a third of the room. It is cushioned with straw and it's outwardly jutting side is suspended with chains. The room is in shadows, illuminated only by the light that enters through the door. \n\nWhen the thick bronze lock is turned shut by clanging keys, and the footsteps of the guards have faded up the stairs, the face of Conan peers in through the gap. \"Síomha!\" he whispers in a not-so-quiet way. \"I've missed you loads, but I saw ye in the camp and I needed to save you. You saw that? I was savin' you and now you're safe. They won't hurt you or nothin', just a bit scared is all.\" He thinks for a moment, straining his eyebrows as he does. \"Síomha… why were you in tha' camp? Did the Conmara savages kidnap you?\"\n*choice\n    #\"I'm one of those 'Conmara savages'\"\n        He raises an eyebrow at you, and then shakes his head in disbelief, \"No, no. Must be that thumpin' ya got in yer head. You're all safe 'n' happy here though. Don' worry none.\" Though you try
