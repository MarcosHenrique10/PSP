 to explain to him the truth again, he won't believe you.\n        *goto 146 \n        \n    #\"I was in their army\"\n        He raises an eyebrow at you, and then shakes his head in disbelief, \"No, no. Must be that thumpin' ya got in yer head. You're all safe 'n' happy here though. Don' worry none.\" Though you try to explain to him the truth again, he won't believe you.\n        *goto 146 \n        \n    #\"They kidnapped me\"\n        He looks down and shakes angrily his head in agreement, \"Terrible, terrible.\" Then he looks up and smiles. Glad I came an' got ye out though!\"\n        *goto 146\n    \n    \n*label 146\nThen he starts talking about your family, how he hadn't seen your parents or sister in four years or more. His words, and smile, bring memories back you hadn't thought of in a very long time. \n*choice\n    #The memories are too painful, I try to redirect the conversation.\n        You ask him about how he joined Medb's clan, and he is delighted to relay the details. He chatters happily about the jobs he had to do to try and work his way up, labour and so on. He takes great pride in saying how much she trusts him, and says he can't wait to introduce you. That is something you're much more skeptical about. Eventually, one of the guards calls, saying he's needed elsewhere. Right, Síomha, have lots o' rest an' I'll be back in a lil' while.\" He stands up and nearly skips up the stairs, happy s to have found you.\n        *goto 147\n        \n        \n    #I don't feel like chatting, I try to gently shut down the conversation.\n        Though your answers are short and you give more than one stretch and yawn to indicate your tiredness, he doesn't seem to get the message. Eventually, you say you'd like to sleep and he gives an enthusiastic nod. \"Yes, Síomha, have lots o' rest an' I'll be back in a lil' while.\" He stands up and nearly skips up the stairs, so happy he is to have found you.\n        *goto 147                \n    #I can't wait to hear more about my parents and sister!\n        He tells you how your father has been, the crops were much kinder last time Conan was with them. Your sister's been growing up fast, though she's a little spiritual for father's liking, no interest in the farm and much more in the druidic arts. The arts are not something most farmer's children find themselves involved in. He chatters happily as if he'd never want to stop talking, barely letting you get a word in, in his carefree bliss. Eventually, one of the guards calls, saying he's needed elsewhere. Right, Síomha, have lots o' rest an' I'll be back in a lil' while.\" He stands up and nearly skips up the stairs, happy s to have found you.\n        *goto 147\n    #I'm tired and I tell him to leave me alone.\n        He seems a little surprised, and the curious disappointment is blatant in his eyes. He shakes it off, though, and nods solemnly. \"'Course, 'course, have lots o' rest an' I'll see you soon.\" He stands up and steps up the stairs hurriedly.\n        *set Ruthless +4\n        *set Compassionate -4\n        *goto 147\n    \n*label 147\nIt's several hours before you're talked to again, though you can't be sure quite how long in the sunless cellar. You have time to ponder, and can't help but wonder what that dream was. A prediction, a warning from the gods even? Or maybe just a nightmare. Only time can tell, and you pray it doesn't. You had begun to doze off, lying in the straw bed with little to do but ponder. You still felt a slight tenseness in your neck, and your head ached from the earlier wound.\n\nThe arrival of your visitor is accompanied by a chorus of footsteps, those of four men, you guess. A woman's voice orders for the door to be opened, and two guards step forward with their clanging keys, and pull open your cell door. You knew right away by her voice who she was. Medb stands before you, looking you up and down calmly. Young ${name}, or \"Síomha\" as our good Conan seems to know you by, I'm glad we could get the chance to meet again. Perhaps you could take this opportunity to explain yourself. Dagda's wood burns, along with the Ó Gearailt inside it. Your king's bid to please the gods came before his will to protect his people, would you agree?\"\n*choice\n    #Nod\n        She gestures for you to stand up.\n        \n        *goto 148\n        \n    #Shake your head\n        She raises and eyebrow. \"Well your take on it matters not.\" She gestures for you to stand up.\n        *set Mischievous +2\n        *set Obedient -2\n        *goto 148\n    \n*label 148\n\"Then, after I have fled from a king who would have me killed for doing my duty to a far off island. Then I happen to see long ships on my horizon, bristling with spears. Did the burning of wood hurt your petty king's pride that much? Was the flicker of flame truly enough to provoke a war? Explain.\"\n*choice\n    #\"You were framed for Sadhbh's death\"\n        *set Mischievous -8\n        *set Obedient +8\n        *goto 149\n        \n    #\"I don't know\"\n        She shakes her head, brows furrowed. \"Never have I tortured a prisoner of mine, the Ó Cuinns have more honor than that. But if this is not resolved innocent people will die. You've had a fair look oat what me and the Cuan island tribes are capable of already. I ask you now, once more, what provoked this war?\"\n        *choice\n            #\"I really don't know\"\n                She shakes her head, \"Then I have no more need for you. I hope you enjoy this place, you'll be here 'till the last Conmara clansman is off this Island.\"\n                *choice\n                    #Stay silent.\n                        *set Mischievous +4\n                        *set Obedient -4\n                        \n                        *goto 151\n                        \n                    #\"I have other information for you, about Domnall!\"\n                        She turns, her interest piqued. \"Anything you say could make your time in here far more comfortable, but do not lie to me, ${name}. Those that lie I owe no mercy to.\"\n                        *choice\n                            \n                            *if Domnallaffair =1\n                                #Tell her about Domnall and Diarmuid.\n                                    *set Mischievous -4\n                                    *set Obedient +4\n                                    *goto 150\n                            #Nevermind\n                                \"Do not waste my time\" she says.\n                                *set Mischievous +4\n                                *set Obedient -4\n                                *goto 151\n                      \n                            \n                                \n                        \n                \n            #\"You were framed\"\n                *set Mischievous -6\n                *set Obedient +6\n                *goto 149\n\n*label 151\nShe turns, and as two guards close the door behind her, she moves for the stairs. She seems to float up with her legs are covered by her long woolen cloak. The guards follow quickly behind.\n*goto 156\n\n*label 150\n*achieve deal\nHer eyes go wide, \"A king taking someone out of wedlock to bed, and a servant at that? This is strong stuff if it can be proven. It'll serve to demoralize his ranks anyhow if we can spread some such rumors amongst his men. I will have it looked into, and if your story bares any truth, then I'll have you suitably rewarded. In the meantime, for your trouble, I'll have a nice meal made.\" She turns, and as two guards close the door behind her, she moves for the stairs. She seems to float up with her legs are covered by her long woolen cloak. The guards follow quickly behind.\n\nIt is over an hour before a servant emerges, with a plate accompanied by a smell that makes your stomach ache. It's no normal prison meal, it looks like venison, and it shines with a honey glaze. The syrup has begun to drip from the meat and onto the forest berries that surround in on the plate, with visible anxiety, he hands it through the gap in your door, and then after a silver knife.\nYou take your first bite of the tender meal, and the sweet berries, and as quickly as he had come the servant scampers off.\n*set Medb +10\n*goto 156\n\n*label 149\nYou tell her everything, about how you were adventuring alongside Conchobar's firstborn, and how a stray arrow from Oscar's bow struck her with a fatal blow. You tell her everything, how he lied to the king and his brother, all except the part you played in all this. You know well not to tell her about the bribe, but how do you fill the obvious hole in this story of half-truths?\n*choice\n    #\"He threatened me with my life.\"\n        She grimaces, looking about to strike you, and then decides against it. \"There is a special place in hell for cowards like you, ${name}. Whether or not the rest of this war can be resolved peacefully, you already have too much blood on your hands to be let free. As far as I'm concerned you can rot in her until these walls crumble inwards. Shall I leave you to your self loathing or have you something worth saying to me?\"\n        *goto 155\n        \n    #\"He threatened me with my family's life.\"\n        She smacks her mouth with distaste, even so, all of this could have been resolved with a simple truth. How many must die so your family can be safe? You were put between a choice of two evils, and you chose the far greater. As far as I'm concerned you can rot in her until these walls crumble inwards. Shall I leave you, or have you something worth saying to me?\"\n        *goto 155\n        \n    #\"I didn't think it was his arrow at first, but it all makes sense now.\"\n        \"Ah, of course. So it was stupidity, your stupidity, that caused all this, but now you've had an epiphany? Your little lie may have lost you a night's dinner, ${boy}. As far as I'm concerned you can rot in her until these walls crumble inwards. Shall I leave you to your self loathing or have you something worth saying to me?\"\n        *goto 155\n        \n    #\"I didn't think she was going to die, but then I couldn't take back the lie.\"\n        She grimaces, looking about to strike you, and then decides against it. \"There is a special place in hell for cowards like you, ${name}. You could have resolved this, all of this, with a simple truth. Whether or not the rest of this war can be resolved peacefully, you already have too much blood on your hands to be let free. As far as I'm concerned you can rot in her until these walls crumble inwards. Shall I leave you to your self loathing or have you something worth saying to me?\"\n        *goto 155\n    \n    \n    \n*label 155\n*choice\n    *if Domnallaffair =1 \n        #Tell her about Domnall and Diarmuid.\n            *set Mischievous -4\n            *set Obedient +4\n            *goto 150\n    #\"I- I'm sorry.\"\n        She looks quizzically at you, taken aback, \"I'd feel pity for you if only you weren't the cause of a needless war. Rot here, ${name}.\"\n        *goto 151\n    #Shake your head.\n        \n        *set Mischievous +4\n        *set Obedient -4\n        *goto 151\n    \n    \n    \n*label 156\nYou can tell only by your own yawns that night has fallen. You hear the guard at the entrance, and moments later a new one arrives. He takes  a moment to replace the old torch that stands suspended against the wall via a metal stand. The room's brightness rises some, and you get into bed.\n\n*page_break Sweet dreams...\n\nConan's excited banging on the cell door is what wakes you, and he beams in at you as you sit up. \"Mornin' Síomha.\" He knows you only by the name given to you by your father, from what feels like a lifetime ago. \n*choice\n    #\"My name is ${name} now.\"\n        He looks confused, \"Síomha's name is ${name}?\" He angles his head slightly, \"Why?\" You explain that you changed it, for personal reasons, and he nods as if trying to understand. \"Okay… ${name}? Well I was talkin' to Medb about you… ${name}, and she said you'd be in 'ere for a while. So thought I'd keep ya comp'ny while you eat, 'tis nearly breakfast time now.\"\n        *goto 157\n        \n    #Leave it\n        \"I was talkin' to Medb about ye and she was sayin' ya might be a while in 'ere, thought I'd be keepin' ya company while yer eatin', 'tis near breakfast time now.\"\n        *set sname \"Síomha\"\n        *goto 157\n    \n    \n*label 157\nHe turns around as a servant walks down the steps with your breakfast in hand, covered in their cloak almost completely. It really doesn't look like much as they hand it through the door's gap, but Conan does his best to lighten the situation, \"Smells nice, wish i' were mine!\" You doubt that, but his efforts are nice. You look up to the servant as they linger for a moment, and they pull the cloak up to their forehead.\n\nIt's ${lover}. ${lover}'s eyes widen, reminding you to keep your reaction plain. \"I'll be serving dinner here as well\", ${they} looks behind her for a moment, making sure the guard is out of earshot, \"Some prisoners don't last more than two days in here\" ${they} says with eyebrows raised, firmly hinting something. Conan looks from ${them} to you worriedly, \"${sname}'ll be fine, I said for Medb to take special care of my ${sname}.\" He nods firmly to himself and then to you, \"I sure did.\" ${lover} then looks to you with a pained look on ${their} face. \"As we move from this world to the next, not everything we do we're proud of. Sometimes it's a higher power that forces these things on us.\" \n\n${lover} seemed to be doing the best to sound philosophical for any listeners, but by the expressions she gave you, she was hinting at something very real, happening at dinner time.\n*choice\n    #I wonder what's going on...\n        It's relieving to see ${them}, but what exactly ${they} has planned you have no idea.\n        *goto 300\n        \n    *if Intelligence >49\n        #There is a plan for my escape... and I'll have to do something terrible on the way.\n            Relieving and eerie all at once, ${they} nods to you, and turns to  leave the chambers.\n            *goto 300\n*label 300\nConan is called by a guard to leave shortly after, and the day passes with little happening at all.\n*page_break Dinner\n\nYou hear the guards change outside, the new one whistles to himself a song that only irritates you. The damp cold of the cell hadn't allowed for much sleep to be had the night before, and it was catching up to you in your mood, though you can scarcely remember feeling more alert than you are now. ${lover}'ll be here in a short while, with a plate, and hopefully a plan.\n\nYour heart leaps as you here the sound of feet rushing down the steps, and you stand at the ready for whatever is to come. And a face peers in with a beaming smile through the gap. It's Conan. \"Thought I'd join ye for dinner, ${sname}, been a busy day and i needed a chat. In fact…\" He steps back and you can see him reach into his pocket. \"I got some berries from the forest, an' I stole a piece o' cake from the kitchens.\" He hands it to you through the gap, and giddily warns \"An' now don' go tellin' anyone. Jus' thought the food in here wasn' all that great.\"\nAs he says that there's a thud outside, chorused by a short moan. Conan turns quickly, alarmed. From his pocket, without sound, he pulls a slim long dagger, and silently steps towards the cell, hunched low like a wolfhound ready to spring.\n*choice\n    #Stay silent\n        A few quick steps follow, quiet like raindrops, moving down the stairs to where Conan hides. Then ${lover} emerges into the torchlight, and in a clean movement Conan's whole body springs to action, like a predator. ${their} face turns to him, and he freezes, or tries to. His momentum sends him knocking into ${them}, nearly sending them both tumbling to the ground, but it saves ${them} from the fatal blow that was inches from ${their} chest. At your feet lies the tray of food from earlier, a worn wooden plate sits empty on it.\n        *set Ruthless +4\n        *set Compassionate -4\n        *goto 301\n    #\"Don't!\"\n        ${lover} emerges into the torchlight just as the words escape your lips, and in preemptive clean movement Conan's whole body springs to action, like a predator. He reacts just in time to move the knife from ${their} path. His momentum sends him knocking into ${them}, nearly sending them both tumbling to the ground, but it saves ${them} from the fatal blow that was inches from ${their} chest. At your feet lies the tray of food from earlier, a worn wooden plate sits empty on it.\n        *set Ruthless -4\n        *set Compassionate +4\n        *goto 301\n    #\"It's a servant!\"\n        ${lover} emerges into the torchlight just as the words escape your lips, and in preemptive clean movement Conan's whole body springs to action, like a predator. He reacts just in time to move the knife from ${their} path. His momentum sends him knocking into ${them}, nearly sending them both tumbling to the ground, but it saves ${them} from the fatal blow that was inches from ${their} chest. At your feet lies the tray of food from earlier, a worn wooden plate sits empty on it.\n        *set Ruthless -4\n        *set Compassionate +4\n        *goto 301\n    \n*label 301\nConan regains his footing and apologizes profusely, \"Sorry, sorry! I heard up above an' I thought… I wasn' sure but I thought you were bad an'…\" He stops, and looks down to ${lover}'s hand, a blood soaked blade gripped between it's fingers. He looks to ${them}, and then he looks to you, and ${lover} sees ${their} moment. \n*choice\n    #Throw the plate through the gap at ${lover}.\n        It catches ${lover} off guard, and ${they} drops ${their} blade as the plate clatters to the floor. \n        *goto 1000\n    #\"Nooooo!\"\n        His eyes go wide as ${lover}'s blade sinks into his side, his face scrunches in a silent cry of agony, and he falls. He hits the floor, and lies splayed out, blood traveling through the gaps of the cobblestone, forming a red maze-like pattern. He whimpers once, and then goes silent. And still. And the room is quiet.\n        *set Ruthless -4\n        *set Compassionate +4\n        *goto 158\n        \n    #\"Do it!\"\n        His eyes go wide as ${lover}'s blade sinks into his side, his face scrunches in a silent cry of agony, and he falls. He hits the floor, and lies splayed out, blood traveling through the gaps of the cobblestone, forming a red maze-like pattern. He whimpers once, and then goes silent. And still. And the room is quiet.\n        *set Ruthless +4\n        *set Compassionate -4\n\n        *goto 158\n    \n    \n*label 158\nYour vision is fuzzy. You sit down on your bed, the door mercifully blocking Conan from sight. A single salty teardrop runs down your cheek as ${lover} fiddles with a large ring of keys to undo your lock. The heavy door swings lazily open with a whine, and the nightmarish vision is there again. Your brother, gone.\n*choice\n    \n    #Let the tears flow, kneel down and touch him.\n        You kneel beside him, and gently touch his hair. He is still, but warm as if he were only sleeping. You gasp once, the violence of it hurting your throat, and making queasy your stomach. Four droplets stream from your eyes, you count them as they fall. He'll be with Dagda now, no doubt. A good heart. You stand and turn to ${lover}, who stares with a face chalky white back at you.\n        *goto 159\n        \n        \n        \n    #Look away, and walk past him.\n        Denial makes all sorrow less sharp, you'd heard, but the watery pressure behind your eyes does not let up, and the sharp pang behind your throat hits like a hammer. You turn to ${lover}, who stares with a face chalky white back at you.\n        *set Ruthless +4\n        *set Compassionate -4\n\n        *goto 159\n    \n    \n*label 159\n*if saveconan >0\n    *goto 160\n*else\n\"What…\" ${they} begins, but loses ${their} words.\n*choice\n    #\"He was my brother.\"\n        ${they} looks as though ${they} was going to be sick, ${their} blood smeared hand shivers, and drops it's blade. \"N-no…\" ${they} says, in disbelief. \"I… I'm sorry.\" The words come out weakly, ${they} knows they mean nothing.\n        *goto 160\n        \n    #\"It's nothing.\"\n        ${lover} looks with confusion and worry at you, and then towards the body. Though ${they} doesn't know why, ${they} says \"I… I'm sorry.\" The words come out weakly, ${they} knows they mean nothing.\n        *goto 160\n    \n    \n    \n*label 1000\nConan realizes what was about to happen and with fear and excitement in his eyes he wrestles her to the ground, he is about to deliver a powerful blow from his fist when you shout for him to stop, and he looks to you with confusion and worry.\nHe pauses and asks \"Why,\" and that's all it takes for ${lover} to get loose from his grip and ${they} scrambles to ${their} feet, and grabs the slippery red blade from the ground.\n*choice\n    #\"Stop! Don't hurt him.\"\n        ${lover} looks frustratedly from Conan to you, and then you blurt out why. ${lover}'s eyes widen, and ${they} shakes ${their} head. \"He can't live. The escape would fail, and we'd both die.\" Conan looks up desperately at you. \"Síomha…\"\n        *set Ruthless +2\n        *set Compassionate -2\n        *choice\n            #\"Conan, run!\"\n                At your words he dives out of reach of ${lover} and half-falling over he bolts up the stairs. You wince in anticipation for the alarm to be raised. Seconds pass as you and ${lover} stand in silence, and no cry is sounded. He's betrayed Medb and his homage vows for you. In a land where one's word is their character, that is something. A minute passes before ${lover} takes out the keys to your cell, fumbling with the lock and shaking ${their} head. \"You may have just killed us, ${name}…\" The heavy door swings grudgingly open.\n                *set saveconan +1\n                *set Ruthless -4\n                *set Compassionate +4\n                *goto 160\n                \n            #If it has to be done...\n                His eyes go wide as ${lover}'s blade sinks into his side, his face scrunches in a silent cry of agony, and he falls. He hits the floor, and lies splayed out, blood traveling through the gaps of the cobblestone, forming a red maze-like pattern. He whimpers once, and then goes silent.\n                *set Ruthless +4\n                *set Compassionate -4\n\n                *goto 158\n    #It has to be done...\n        His eyes go wide as ${lover}'s blade sinks into his side, his face scrunches in a silent cry of agony, and he falls. He hits the floor, and lies splayed out, blood traveling through the gaps of the cobblestone, forming a red maze-like pattern. He whimpers once, and then goes silent.\n        *set Ruthless +4\n        *set Compassionate -4\n\n        *goto 158\n        \n\n\n\n\n    \n*label 160\nYour feet are sluggish, your movements forced, but you find yourself following ${them} up the stairs, to where the source of the first cry lies, the guard. A sight nearly as grim, his blood has started to trickle down the stairs. You stand now beside a low window, just barely large enough for you to slip through. You are about to move to it, but ${lover} pulls you back. ${lover} is about to speak, but pierces ${their} lips. After a moment's silence, with both your pained expressions illuminated in the torchlight, and your shapes bouncing off the walls in flickering shadows, ${lover} speaks. \n\n\"Conchobar gave me an order, a terrible order, for you to carry out.\" ${lover} stairs at the ground as ${they} speaks, and then looks up to meet your eyes. a shine of moonlight enters through the window, and catches ${their} face that radiates dread.\n\n\"An eye for an eye, a daughter for a son.\"\n    \n    \n    \n*finish \n    ", "chapter8": "*image chapter8pic.jpg\nThe truth hits you like a mace to the chest, and leaves your stomach feeling as though it was turned. ${they} nods. \"Medb's son, Murchad. Seventeen years and some.\" ${their} breath is shallow as ${they} says this, ${their} voice quiet. \"If you do not do it, he'll have your head… and mine.\" ${lover} sniffles once, and then resolves to pull themself together. Then ${they} looks firmly to you, \"Do it, ${name}. We cannot leave until this terrible deed is done.\"\n*if saveconan >0\n    The hall is quiet, you both still live only by Conan's held tongue.\n    *goto 1001\n*else\n    *goto 1001\n*label 1001\n*choice\n    #\"I won't do it.\"\n        Looking directly into your eyes, ${they} nods and takes a forceful step towards you. \"You must. We will not leave until you have. We can't.\"\n        *set Ruthless -4\n        *set Compassionate +4\n        *goto 170\n        \n    #\"Why can't you?\"\n        Looking at the ground, ${they} shakes ${their} head impatiently, \"He ordered for it to be you who does the killing, seeing as he blames you for his daughter's death.\"\n        *goto 170\n    #\"If I must.\"\n        ${lover} seems surprised at your willingness, but nods in agreement. \"Sometimes these things are beyond our control, good people can be forced to doing bad things.\"\n        \n        *set Ruthless +4\n        *set Compassionate -4\n        *goto 170\n    \n*label 170\nYou must do it, the world has tied your hands.\n*choice\n    #\"I'll kill Medb instead!\"\n        \"He wished specifically for the boy's death. He says he wants her to suffer as he had suffered before he brings about her own death.\" ${lover} pauses, \"It may be enough him from killing us, though, and a far easier deed it would be than killing Murchad.\" ${lover} nods, if that is your choice, then make haste, her room is up those wooden stairs, three doors down the corridor on the left.\" ${lover} gestures with her hands the directions, and in moments you're following them. \"I'll wait here, ${name}, be back soon before an alarm is raised.\"  She speaks those words coldly, as if what is about to happen is no different to cleaning a room, stirring a broth. As if taking a life from this world is mundane, meaningless. You slip inside the room in which your would-be victim sleeps. As you stand still, Medb rolls over in her sleep. She does not wake, but the movement send you rushing to the only hiding spot you see; the curtains.\n        *set killmedb +1\n        *goto 171\n        \n    #\"Where is Murchad?\"\n        ${lover} gestures with her hands the directions, and in moments you're following them. \"I'll wait here, ${name}, be back soon before an alarm is raised.\" She speaks those words coldly, as if what is about to happen is no different to cleaning a room, stirring a broth. As if taking a young life from this world is mundane, meaningless. You slip inside the room in which your would-be victim sleeps. As you stand still, Murchad rolls over in her sleep. He does not wake, but the movement send you rushing to the only hiding spot you see; the curtains.\n        *set killmurchad +1\n        *goto 171\n    \n    \n    \n*label 171\n    \n    \n    \n*if killmurchad =1\n    *goto 281\n*else\n    *goto 320\n*label 281\nThe curtain you stand behind is thin, but in the night's shade, you're invisible. You conceal the blade under your tunic, lest the moonlight catch off it. The boy lies in bed, in an uneasy sleep, stirring and muttering. The night is silent, but if dawn's light arrives before you and ${lover} have fled, the guards will almost certainly see you. Time is short, and there is a deed still left undone.\n*if aslingvial >0\n    Then you feel something in your pocket. A vial. The vial of asling from the night of the feast. It could slow you down slightly, but this cruel deed would be made far easier.\n    *goto 286\n*else\n    *goto 286\n*label 286\n*choice\n    #I can't do it, I'll go back to ${lover}.\n        As you put a foot forward towards the boy, bedroom door is narrowly opened, sending a dagger of light from the hallway shooting across his dark bedroom floor. You manage to scamper back to your hiding place just in time.\n        \n        *set Ruthless -4\n        *set Compassionate +4\n        *goto 280\n        \n        \n    #Let's get this over with...\n        As you put a foot forward towards the boy, bedroom door is narrowly opened, sending a dagger of light from the hallway shooting across his dark bedroom floor. You manage to scamper back to your hiding place just in time.\n        *set Ruthless +4\n        *set Compassionate -4\n        *goto 280\n        \n        \n    #I- I need a moment to think.\n        You are taken from your thoughts when the bedroom door is narrowly opened, sending a dagger of light from the hallway shooting across the dark bedroom floor.\n        *goto 280\n    *if aslingvial >0\n        #I'll need some asling to get through this.\n            \n            \n            You have just gripped the vial in your pocket when the bedroom door is narrowly opened, sending a dagger of light from the hallway shooting across the dark bedroom floor.\n         \n            \n            *set Ruthless +2\n            *set Compassionate -2\n            *goto 280\n        \n\n*label 280\nMedb's ghostly silhouette walks towards him through the darkness, and slides into the bed beside him. She speaks softly, \"Those people, I don't wish to work with them either, but we must. The Ó Cuinn's would fall into ruin without them. We need to look after our own\". She puts an arm over his shoulders, and as her cool fingers rest on his arm, he stiffens. Her body goes still in response, and though you can't clearly see her face, there's a palpable feeling of hurt in the room. He looks up to her \"My real mother wouldn't have worked with savages. This isn't right. i wish someone else had taken me in. I'll… I'll run away.\" Medb's eyes seem in hollow. Then she speaks, her voice has lost much of it's warmth, but it's icy calm. \"A white mare once walked across an emerald green field. Thrice the gods gifted her a foal in the warmth of her belly, and thrice more the cub's heartbeats went still as she brought them into this world. Perhaps the Gods meant it as a test, perhaps it was to them not more than a cruel jape. Something inside the young mare broke\", her breathing had gotten quicker, and the calmness in her voice was fading. \n\nYou can see there's a gentle quivering in her fingers. You hear her suck a weak breath in, and her hands relax a little more. \"The mare changed some, the icy wind felt gentle on her back when it had once weighed her down, the flies that circled her eyes she looked past, when they had once tormented her. She came across a young foal, this one not of her own blood, but the mare's love extended past blood. She cared for it and it grew bolder under her watch. From under the tree where they rested by day, the foal could see a crystal blue river running through the emerald fields that lay on the other side. Fields where the wolf pack lived. Still, it yearned for the lush grass of the field across. Thrice it tried to run from her, to bathe in the heavenly waters and cross to the other side, and thrice she stopped him. The foal, however, did not think her his mother, and heeded not her warning. One warm day, when the mare lay sleeping, he went to the waters\". The air is still, the room tense. \"A mother never truly sleeps, always caring for her young. She knew that it would never listen, and wolves like to play with their helpless prey. She was kind, caring, and so she drowned the foal instead\".\n\n\n\nA single teardrop rolled down Murchad's cheek as her she spoke those last words. The boy looked as if he wanted nothing more than to sink and be swallowed by his mattress. Her lips pressed delicately to his forehead as she turned her body.\nMedb unwraps herself from the sheets, stood up, and disappeared outside the room into the corridor. His tears had been rolling down more heavily, and his face was wet. He lay back stiffly, the lingering warmth where Medb had sat in the sheets was a ghostly reminder of her words. You can hear those words replaying in his head again, and again. \"Heeded not her warning..... kind, caring.....drowned him instead\". His sweat and tears made cold by the night's breeze sent shivers through his body, and in your own ears she whispers, \"She drowned him instead\".\n\n\nHe lies as far to the side of the bed as he dares, and looks at both of his beasts. His hounds. The slender who lay with her head tucked between her front legs, and the frail Bronagh, who's head rested against her stomach. Murchad had never really thought of them by their names. Names were as strong as the people to whom they belong, so to him their names meant little. Now though, as Cliodhna's ears flicked up to his sniffles, he whispers to her. \"Cliodhna\". He stretches a finger quietly to her face, and she nestles a head against his hand and squeezed his finger gently between her gums. Bronagh had woken up by then, and meekly pads around her, perhaps expecting food. Bronagh observes the young Murchad cautiously as Cliodhna scratches her head against the side of the bed, and allows herself to be stroked.\n\nBronagh clearly hadn't been eating well. Despite being a male he was slightly smaller than Cliodhna, the lack of interest in eating, throughout his life, had stunted his growth. He sits back onto his hind legs, his long mane drooping over his thin shoulders, and he lets out a wide yawn. Murchad looks at him, at the purple-black lines across Bronagh's gums where his stitches had healed over, and the great discolored indents where his white teeth had once been embedded. The hounds had undergone a lot of training and 'adjustments' for his safety. He reaches a hand gently out to Bronagh, looking as if he wanted more than anything for him to take it as Cliodhna had. His heart seems to lift as Bronadh stood up from his hind legs, and sadly pads to the boy. He licks and rubs Murchad's hand as he had so desperately wanted him to do, but once he has done his obligatory licks, he turns away from the boy, and lies down lazily. \n\nThen the room is quiet again, and there you stand, clenching a blade meant for a boy.\n*choice\n    *if aslingvial \u003c0\n        #Quickly drink the asling.\n            You pour the liquid into your mouth and feel the honey-like sensation of it dripping down your throat. It only takes a moment, and then the world is calm. Your muscles relax, and your eyes open wide. You approach him with legs sluggish, dragging slightly. Your forehead feels cold and your hands have ceased sweating. The boy is a mere blur, his cries ring like quiet echoes as you pull out your dagger.\n            *achieve asling\n            *choice\n                \n                \n                #Kill him.\n                    You feel warmth in your hands and a shiver in your knees. Your eyes are wide and unblinking as you leave the room. Red liquid death drips from your hands slowly, in time with the growing pounding in your head. The vial wasn't a strong one, and the effects are starting to wear off. Your movements get sharper as you head back to ${lover}, but so too does your mind sharpen, to the heavy reality of what you have done.\n                    *achieve dagger\n                    *set killedmurchad +1\n                    *set Ruthless +20\n                    *set murderer +1\n                    *set Compassionate -20\n                    *goto 285\n             \n                \n                #Run.\n                    Your feet struggle for footing as you trod them foreword, one after the other. You fumble with the door to open it, and tumble back towards ${lover} as the boy's cries ring out.\n                    *goto 285\n            \n    #Kill him.\n        His shouts ring out as you emerge from the curtains and your dagger is revealed. You have a feeling they will echo in your head for a very long time.\n        *page_break A terrible deed is done\n        Red liquid death drips from your hands as you leave the bedroom, dripping, dripping, in time with the boy's shouts in your head. No good thinking too much now, you'll have to leave your sorrows until after the escape.\n        *achieve dagger\n        *set killedmurchad +1\n        *set murderer +1\n        *set Ruthless +20\n        *set Compassionate -20\n        \n        *goto 285\n        \n        \n    #Run back to ${lover}\n        Murchad's screams echo down the corridor as you run, but you know you've done what you must. Dagda would not look favorably on a child-killer.\n        *goto 285\n        \n        \n    \n\n*label 285\n${lover}'s waiting for you at the bottom of the corridor, where one of the only low windows in the castle lies.\n*if killedmurchad =1\n    ${lover} looks at your bloody hands, and nods solemnly. The stony expression ${they} bares doesn't conceal ${their} horror. Eyes shiny, and skin pale, ${they} whispers \"Let's go.\"\n    *goto 321\n*else\n    ${lover} looks at you solemnly, \"Is it done?\" Her eyes go wide and she splutters when you tell her the truth. \"But… you have to!\" ${lover} says urgently. \"What if… what if Conchobar has us killed for it?\" ${lover} shakes their head slowly. \"You will be the one to explain this to Conchobar. We have no time to go back. You are a fool, ${name}. A good fool though.\" And then a great bellow rings out, this one loud enough to reach all the way down the corridor, cries of anger and fear from Medb.\n    *goto 321\n            \n            \n\n\n    \n    \n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n*comment for Medb\n*label 320\nThe curtain you stand behind is thin, but in the night's shade, you're invisible. You conceal the blade under your tunic, lest the moonlight catch off it. The boy lies in bed, in a he mare lay sleeping, he went to the waters\". The air is still, the room tense. \"A mother never truly sleeps, always caring for her young. She knew that it would never listen, and wolves like to play with their helpless prey. She was kind, caring, and so she drowned the foal instead\".\n\n\n\nA single teardrop rolled down Murchad's cheek as she spoke those last words. The boy looked as if he wanted nothing more than to sink and be swallowed by his mattress. Her lips pressed delicately to his forehead as she turned her body.\nMurchad timidly unwraps himself from the sheets, stands up, and scampers outside the room into the corridor. His tears had been rolling down more heavily, and his face was wet. Medb lies back stiffly. You can hear those words replaying in his head again, and again. \"Heeded not her warning..... kind, caring.....drowned him instead\". His sweat and tears made cold by the night's breeze sent shivers through his body, and in your own ears she whispers, \"She drowned him instead\".\nThen the room is quiet again, and there you stand, clenching a blade meant for the sleeping chieftain.\n*choice\n    *if aslingvial \u003c0\n        #Quickly drink the asling.\n            You pour the liquid into your mouth and feel the honey-like sensation of it dripping down your throat. It only takes a moment, and then the world is calm. Your muscles relax, and your eyes open wide. You approach him with legs sluggish, dragging slightly. Your forehead feels cold and your hands have ceased sweating. The woman is a mere blur, her cries ring like quiet echoes as you pull out your dagger.\n            *achieve asling\n            *choice\n                \n                \n                #Kill her.\n                    You feel warmth in your hands and a shiver in your knees. Your eyes are wide and unblinking as you leave the room. Red liquid death drips from your hands slowly, in time with the growing pounding in your head. The vial wasn't a strong one, and the effects are starting to wear off. Your movements get sharper as you head back to ${lover}, but so too does your mind sharpen, to the heavy reality of what you have done.\n                    *achieve dagger\n                    *set killedmedb +1\n                    *set Ruthless +12\n                    *set murderer +1\n                    *set Compassionate -12\n                    *goto 275\n             \n                \n                #Run.\n                    Your feet struggle for footing as you trod them foreword, one after the other. You fumble with the door to open it, and tumble back towards ${lover} as the woman's shouts ring out.\n                    *goto 275\n            \n    #Kill her.\n        Her cries ring out as you emerge from the curtains and your dagger is revealed. You have a feeling they will echo in your head for a very long time.\n        *page_break A terrible deed is done\n        Red liquid death drips from your hands as you leave the bedroom, dripping, dripping, in time with the woman's shouts. No good thinking too much now, you'll have to leave your sorrows until after the escape.\n        *set killedmedb +1\n        *set murderer +1\n        *set Ruthless +12\n        *set Compassionate -12\n        *achieve dagger\n        *goto 275\n        \n        \n    #Run back to ${lover}\n        Murchad's screams echo down the corridor as you run, but you know you've done what you must. Dagda would not look favorably on a child-killer.\n        *goto 275\n        \n        \n    \n\n*label 275\n${lover}'s waiting for you at the bottom of the corridor, at the window.\n*if murderer >0\n    ${lover} looks at your bloody hands, and nods solemnly. The stony expression ${they} bares doesn't conceal ${their} horror. Eyes shiny, and skin pale, ${they} whispers \"Let's go.\"\n    *goto 321\n*else\n    ${lover} looks at you solemnly, \"Is it done?\" Her eyes go wide and she splutters when you tell her the truth. \"But… you have to!\" ${lover} says urgently. \"What if… what if Conchobar has us killed for it?\" ${lover} shakes their head slowly. \"You will be the one to explain this to Conchobar. We have no time to go back. You are a fool, ${name}. A good fool though.\" And then a great bellow rings out, this one loud enough to reach all the way down the corridor, cries of anger and fear from Medb.\n    *goto 321\n            \n*label 321\nTogether, you climb out of the window. The night's black has taken on a dark blue. Morning is near. The breeze brushes softly against you, and you hear a muffled shiver from ${lover}. As your feet meet the stone and mud ground. Your tongue is still, your breath staggered in fear and anticipation. Your limbs, like ${lover}'s, stand still. \n*if romance >0\n    *if killedmurchad =0\n        As you glance up at the fading stars, both crouched against the wall the window in silence, you feel ${lover}'s hand brush tentatively against yours.\n        *choice\n            \n            \n            #Wrap my fingers around ${their}s.\n                ${lover}'s hand responds, squeezing yours tightly for a moment. ${lover} touches ${their} forehead against the side of your head for a moment, and the hairs on the back of your neck stand pleasantly up in reaction. Then ${they} release themselves from you. You feel th coolness of the air once more, and ${they} whispers \"Lets go.\"\n                *set Caelan +7\n                *set Diarmuid +7\n                *goto 140\n            \n            #\"We need to go.\"\n                ${lover}'s hand shrinks quickly from yours and ${they} nods.\n                *set Caelan -7\n                *set Diarmuid -7\n                *goto 140\n    *else\n        *goto 140\n*else\n*goto 140\n\n\n*label 140\nTogether, as a call rings out in the castle, you run as hard as you can for the gate. And then you see it. It is not only for you and ${lover} that the alarm calls have begun to ring. You have to squint in the night to see it, but there at the outer ring of the fortress stands an army. Conchobar and Domnall's. The village houses inside the outer ring glow against the torches of the army. A horn bellows inside the castle, and more shouts across the fort ring out. You glance to ${lover}, who is unsurprised. In fact, ${they} seems glad, as if ${their} plan is only falling perfectly into place.\n\nThe sun is rising behind the army that forms a crescent at the fort entrance. The banners they hold high, surrounded by spears and axes, have gone black against the sunrise, and so too the men, lines in rows  upon rows upon rows. A horn bellows behind you from the castle, and three hundred voices jeer back. \"Conmara abú! Conmara abú!\" they call, \"King Domnall abú! Conchobar abú!\" Guards have begun to scamper onto the ramparts of the inner walls, but you and ${lover} manage to slip through the middle gate before the guards have manned it. As you near the outer wall and reach level ground, the army disappears behind the gates, but their voices, unrelenting and vicious, ring out everywhere. \n\nThe village huts inside the outer wall empty of people, scrambling in night clothes and blankets for the inner walls, carrying food, children and babies wrapped in cloths. You and ${lover} are the only two running towards the cries. The army's thumping of fists and axes and shields against the walls are like a chaotic chorus of drums, beating louder and louder as you near them. Medb's warriors have scrambled onto the outer ramparts further behind, and now run along the platforms on the circular wall towards the gate. Your pace quickens in an effort to beat them to it. You glance behind, and Medb's forces have closed the inner gates before all the villagers could make it. They stand in an anxious crowd, undefended and helpless. An old man staggers from his house, supporting himself against a crutch, a hunting bow slung over his shoulder. Left well  behind his panicked neighbours, he grunts in his effort to catch up.\n\nA great animalistic roar rings out once more from the army, \"Conchobar abú! Conmara abú!\" By the sounds of their roars, many of the army have gone into warp spasm. A state in which a warrior is relentless, unthinking and ruthless. Chieftains encourage it amongst warriors, it scares the enemy and gives the effect of a warrior growing ten times their own strength. It is not a state one can escape easily, though, least of all as part of a mob. \n\n${lover} pants to you as ${they} runs, \"Help me open the gates…\" ${their} breaths are short and quick, \"Conchobar ordered.\" A heavy wooden beam lies across the back of the gates, fastened through two heavy bronze slots. ${lover} reaches it ahead of you, red faced and panting hard. You look back and see sixty or more of Medb's warriors as they run hard along the ramparts towards the gate where you stand, and then to the crowd, the panicking crowd of villagers.\n\n${lover} shouts at you between pants, \"Help me… pull\" as she heaves against the heavy beam. It's sliding across slowly, too slow to finish before Medb's warriors are above you.\n\nThe shouts of the warriors on the other side are deafening, the panicked cries of the villagers behind you so meek in comparison.\n\nYou look to ${lover}, taking a step towards ${them}. Then you hear a voice behind you. \"Stop!\" You look behind you, and there stands the old man. His crutch lies at his wobbly feet, and with shaky hands he holds his bow, arrow notched and aimed for ${lover}. His eyes are wide with fear, but his eyebrows have angled with fierce determination. ${lover} keeps pulling, desperately ignoring the old man's commands. He shouts once more, \"I'll loose. I will!\" At those words he pulls the arrow back further, and squints his eyes with focus. The bar is inches from being free from the gates, and unleashing hell in the fortress.\n*choice\n    #Help ${lover} pull the bar.\n        You rush to ${their} side as ${they} gives the bar a final pull. As if in slow motion, the bar is pulled from it's socket with a groan as wood parts with metal. The world is still. And then the gates swing open with the force of a tsunami behind it, as hundreds of warriors stream in. They rush like wolves in a pack, they bristle with pikes and swords, faces displaying mindlessness. They rush past you as if you were nothing, their cheers so loud now their voices nearly knock you from your feet.\n        *set Ruthless +7\n        *set Compassionate -7\n        *goto 322\n    #Stay still\n        ${they} gives the bar a final pull. As if in slow motion, the bar is pulled from it's socket with a groan as wood parts with metal. The world is still. And then the gates swing open with the force of a tsunami behind it, as hundreds of warriors stream in. They rush like wolves in a pack, they bristle with pikes and swords, faces displaying mindlessness. They rush past you as if you were nothing, their cheers so loud now their voices nearly knock you from your feet.\n        *set Wistful +4\n        *set Sharp -4\n        *goto 322\n        \n        \n        \n    #Rush to stop ${lover} from pulling the bar.\n        You grab the bar and pull it against ${them}, and with your shoulder you try to shove ${them} from it. ${lover} shouts as ${they} loses their grip on it, and the bar only inches from coming loose holds strong against the warrior's battering.\n        \n        *set Ruthless -7\n        *set Compassionate +7\n        *goto 323\n    \n*label 322\nThe colors of cloaks and banners and bronze and steel go blurry, and then begin to gray. The colors around you seep slowly, and each moment the world takes a step away from color. The movement's slow around you, as if trapped in time. The only thing that is normal, is the rain. Rain starts to trickle downwards. You feel it splash against your face, and you see it bounce from the countless bodies caught in slow motion. It pitter-patters on the ground, against foreheads and spears, against shields and boots. And then you see it.\n\nA single droplet above you. A red so deep it looks almost black. It drops down towards you and though it happens so quickly you feel yourself waiting for some time for it. And then is splashes against your forehead. Your eyes close. And when they open you are there, in the pink beach, beside the wall of faces that stretches endlessly. And the sea of tears. You remember it all from your dream. The sand feels sharp under your feet. You feel something forceful inside your head. Like a conscious thought, but alien. A thought that feels foreign in your mind. \n\nA voice not quite male nor female, not quite high nor deep. It feels like an echo as it bounces inside your head. \"Do you see those faces, young ${name}?\" It asks sadly. The grimacing, slobbering and laughing faces all sound out humorless laughter in response. \"Each and every one, a  person who needn't have died. Each and every one, someone that died because of you.\" The sand feels slippery as it says this, moist. The faces laugh once more, this time with a little more convincing joy. \"Your people know me as 'Born of the mound', 'king of the mountain'.\" And the world around you for a moment becomes scarily clearer. \"I am Crom.\" You feel your feet sinking in the sand. \"And though you are not old, ${name}…\" It pauses as the faces laugh a laugh of true joy… \"You have lived long enough.\"\n*goto_scene ending\n        \n\n*label 323\nAs ${lover} topples back onto the ground, you feel a great force smash into your side, sending you hard into the gate, and then crumpling to the ground. The old man cries out in dismay. You need only glance down with your eyes to see it. An arrow that has lodged itself hard under your ribs. You know no warrior, great or small, can survive a wound like that. \n\nThen you feel it. The reds and blues and greens around you seep slowly from your vision, and each moment the world takes a step away from color. The movement's slow around you, as if trapped in time. The only thing that is normal, is the rain. The rain that has just started to trickle downwards. You feel it splash against your face, and you see it bounce from the countless bodies caught in slow motion. It pitter-patters on the ground, against the grass on the ground and the wood on the gate. And then you see it.\n\nA single droplet above you. A red so deep it looks almost black. It drops down towards you and though it happens quickly you feel yourself waiting some time for it to hit. And then is splashes against your forehead. Your eyes close. And when they open you are there, in the pink beach, beside the wall of faces that stretches endlessly. And the sea of tears. You remember it all from your dream. The sand feels sharp under your feet. You feel something forceful inside your head. Like a conscious thought, but alien. A thought that feels foreign in your mind. \n\nA voice not quite male nor female, not quite high nor deep. It feels like an echo as it bounces inside your head. \"Do you see those faces, young ${name}?\" It asks sadly. The grimacing, slobbering and laughing faces all sound out humorless laughter in response. \"Each and every one, a  person who needn't have died. Each and every one, someone that died because of you.\" The sand feels slippery as it says this, moist. The faces laugh once more, this time with a little more convincing joy. \"Your people know me as 'Born of the mound', 'king of the mountain'.\" And the world around you for a moment becomes scarily clearer. \"I am Crom.\" You feel your feet sinking in the sand. \"And though you are not old, ${name}…\" It pauses as the faces laugh a laugh of true joy… \"You have lived long enough.\"\n*choice\n    #\"I haven't, there's so much I want to do!\"\n        The thing ignores you, and simply repeats it's damning words, \"You have lived long enough.\"\n        *set Proud +6\n        *set Humble -6\n        *if Compassionate >89\n            \n            *achieve compassionate\n            *goto_scene ending\n        *else\n            *if Ruthless >89\n                *achieve ruthless\n                *goto_scene ending\n            *else\n                *goto_scene ending\n        \n    #\"But those villagers, I have to save them!\"\n        The thing goes silent, and the faces whisper, loud inaudible whispers. \"Do you? Those people that are going to die because of you?\"\n        *set Ruthless -6\n        *set Compassionate +6\n        *choice\n            #\"Not because of me, it's Oscar's lie!\"\n                The thing ignores you, and simply repeats it's damning words, \"You have lived long enough.\"\n                *if Compassionate >89\n                    *achieve compassionate\n                    *goto_scene ending\n                *else\n                    \n                    *if Ruthless >89\n                        \n                        *achieve ruthless\n                        *goto_scene ending\n                    *else\n                        *goto_scene ending\n              \n            #\"I know, but I need to set things right.\"\n                The whispering of a thousand faces grows louder. \"That's so?\" it asks. \"There is no afterlife for someone who returns to the human's realm. You would do that, for those people?\"\n                *set Ruthless -4\n                *set Compassionate +4\n                *choice\n                    #\"I must do it!\"\n                        \"Very well, ${name},\" it says, \"Do not disappoint me.\" The faces whisper grows louder and louder as he says this, and the sand slips from around your feet, spilling downwards as you stay suspended in the air. The whispers grow so loud you have to hold your ears, but still they pound, harder and harder against the side of your head, louder and louder so that you feel yourself screaming in pain, though you can't hear yourself.\n                        *goto 333\n                        \n                    #\"Actually...\"\n                        The face's whispering ceases, and their laughter erupts once more. The thing mutters in your mind, \"The coward has lived long enough.\"\n                        *if Compassionate >89\n                            \n            \n                            *achieve compassionate\n                            *goto_scene ending\n                        *else\n                            *if Ruthless >89\n                                *achieve ruthless\n                                *goto_scene ending\n                            *else\n                                *goto_scene ending\n                       \n\n\n\n\n\n\n\n\n*label 333\n*achieve crom\nFrom the air, once the sand below you has dissipated, you fall. The world goes black as your eyes close, and then you hit the ground, hard. You wake, and see the chaos above you. Your vision is blurry, but as you squint and blink all becomes clearer. Medb's men fight desperately on the ramparts, throwing down rocks and spears on the warriors on the other side of the wall. \nYou look down, and inside you the arrow remains, but the blood has stopped. And so too has ceased the pain. The gates now are being battered so hard that the great beam is starting to creak.\n\nYou come to your senses then, and jump to your feet. The mob outside the gates calls out viciously, \"Conchobar abú, Domnall abú!\" as the beam bends towards you, this time too far. The edges of it have started to bare splinters, one more heave, and it is sure to snap. Three of Medb's men stand at is, grunting as they push against the mobs heaves, but it is no good. With one more mighty heave, the beam snaps in two and the gates are a second from bursting open.\n*choice \n    #Grab the gates and push them closed.\n        You grab hold of either gate with your hands, dig your heels deep in the dirt, and push. You feel your muscles burn, and your veins pulse, but something pushes those gates back. Something otherworldly. The warriors at either side of you look on in amazement as you heave the strength of a hundred men backwards, and pushing your shoulder against the gate once it has closed, you keep it there. \n        *set Ruthless -8\n        *set Compassionate +8\n        *goto 334\n        \n    #Run.\n        The gates burst open, and you are trampled by the mob as you run. Ferocious shouts and terrified screams are all you can hear inside your head as your lifeblood slips from your veins.\n        *if Compassionate >89\n            \n            *achieve compassionate\n            *goto_scene ending\n        *else\n            *if Ruthless >89\n                *achieve ruthless\n                *goto_scene ending\n            *else\n                *goto_scene ending\n\n*label 334\nCries of frustration ring out on the other side as they heave to no effect. Your skin has gone red and blue, your muscles dying under the pressure, and yet you don't feel it. This is not warp spasm, for you feel no rage. Only the need to protect. The gates hold firm with your god-like strength behind it, once the warriors around you have gotten to their senses, they join you, and then so too join the villagers, men women and children, each one heaving with everything they have.\n\nOnce the door is holding firm without you, the exhaustion of a hundred men falls down on you, and you collapse into a deep sleep.\n*page_break\n\nThe sleep lasted several days, you were told. Once you woke up, it was as though a god had risen in human form, or so they say.\n*if murderer >0\n    Some of the villagers had hidden you away in their houses as you slept, for while you had saved them, the family of Medb was out for your blood for the murder committed. You had been smuggled out of the town walls once you had rested fully. They risked their lives to return the favour.\n    *goto smuggled\n*else\n    *goto smuggled\n\n*label smuggled\n\"Though the inhuman strength I had that day never returned\" you say to your audience, \"All those people that were saved by it never forgot. The story was told and retold a hundred times over, and that's why it sounds familiar to you.\" \n\nThe story has gotten hazier over the years in your mind, you've heard so many false retellings of it you sometimes wonder which of the added details are true. \n*if saveconan >0\n    Conan, who you had reunited with shortly after the fateful day, was always keen to play up your glory to the townspeople, how you breathed out great storms of fire and how you supposedly grew to be twelve foot tall. \n    *goto 1005\n*else\n    *goto 1005\n*label 1005\n\n*if romance >0\n    \n    *goto cheesy\n*else\n    *goto brie\n\n\n*label cheesy\nGoll Mac Morna, an elder of the Fianna had approached you soon after your great feat. Word had spread as far as the Fiannians themselves in the Hills of Tara. Goll was supposedly a relative of Fionn Mac Cumhail, a legend he was known to play up, and so even the sight of him sent whispers shivering across four corners of the Fearlanns. Somehow, he knew exactly where to find you. Where was that?\n*choice\n    #In Eascmore, in search of the rest of my family.\n        You traveled to your home town, and visited your house. It had since been abandoned. A single chicken wandering the fields was all that remained of the family crop and herds. The house, though the thatch was in need of repair, seemed relatively intact and without evidence of an attack. Perhaps they had fled when rumors of an invasion from the Ó Gearailts had spread, or perhaps they had moved on in search of better fertile lands. You can only hope they are still alive. The house remains abandoned to this day.\n        *set Compassionate +3\n        *set Ruthless -3\n        *goto goll\n        \n    #On the outskirts of Gan Stad forest, where I wished to make amends with Domnall.\n        You had explained and pleaded with him the situation you had been forced into, how a mass of innocents were soon to be slaughtered if not for your intervention. He seemed to have almost accepted your reasons, while Conchobar on the other hand had thrown a tantrum over it, demanding that your head be skewered on a spear. In the end Domnall decided on a medium approach, that you be banned from his employ and exiled from his territories. Cathal, too, had warned against capital punishment, wary that if your feat had indeed been aided by a God, it would not bode well on them to challenge it. So you were given a place to stay until arrangements could be made for you to live somewhere else.\n        *set Domnall +3\n        *goto goll\n        \n    #In a village far from the towns, where no one knew my name.\n        Indeed, at the time a break from the attention had been what you needed. You needed to travel far to find a land in which your story was not being retold yet, but once you had you stayed for some time away from the people's awe-filled gaze, and enjoyed a short period of rest.\n        *set Humble +4\n        *set Proud -4\n        *goto goll\n    \n    \n*label goll\nIt was there, as you remember so well, that Goll Mac Morna of the Fianna found you. He rode atop a white speckled mare with mane dyed a shimmering yellow, her hair grew thick and shaggy around her hooves. Her rode bareback atop her, and wore a pauper's brown cloak so that it almost covered the gold-studded breastplate, one signature of a knight of the Fianna. He was old, his long braided hair thinning and wiry. He let slip the cloak once he had dismounted, and your eyes had widened in recognition of the armour, described to you before only in legends.\n\nIt was then that he had offered you the grand prize of warriors and wisemen across the isle and beyond; a place amongst the knights in the Fianna.\n\nHe offered with hand outstretched a thin rag of red, for you to tie into your hair if you had wished to accept. What he offered in the form of a simple rag was a place in history and legend, a life of adventure and excitement, and a role defending all that is good amongst the greatest warriors in the land.\n\nAs he did, though, you realized what it meant. To join the Fianna one had to display their total dedication. Total dedication was demonstrated by leaving behind the romances and worldly possessions you had had in your life thus far, to join the Fianna was to begin a new life free of the old one.\n*if romance >0\n    You thought of ${lover} then, didn't you? Someone you barely knew in truth, and yet there was something about ${their}, was ${they} someone you were prepared to leave behind?\n    *choice\n        #Yes, I accepted his offer.\n            *achieve elder\n            Indeed a life worthy of legend you lived. A hundred and more great quests you embarked on, each one written down by scribes and bards and retold like a drop in a still lake; each telling told with added thrill and triumph, 'till your deeds seemed to the people of the Fearlanns and across every corner of the isle as what could only have been committed by the Gods themselves. Though you never again faced a God, you sometimes felt a strength deep in your core, in times of direst distress, that pushed you to the border of what is humanly possible.\n            *goto brie\n            \n        #No, I was in love.\n            The feelings you had could not be subdued by ambition or the promise of glory, and so you turned down his offer. You knew the Fianna would only ever ask once, and that once his horse disappeared over the hills you would never get such a chance again. To love someone this much, and to give up such an offer for them, you can only have wanted on thing.\n            *choice\n                #I wanted to marry ${them}.\n                    You had felt a light airy feeling in your chest as you realised what you wanted, a small smile forming on your lips. He nodded when you told him, and held a stare with you for a moment under wiry wild eyebrows angled in gentle curiosity, without taking away his hand. Then as the cool breeze calmed and his long hair hung still against the sides of his face, he turned and walked away. He never looked back as he rode off. You could feel a light sink in your heart, and hoped you had made the right choice.\n                    *goto marriage\n                \n                \n                #I changed my mind and accepted his offer.\n                    *achieve elder\n                    Indeed a life worthy of legend you lived. A hundred and more great quests you embarked on, each one written down by scribes and bards and retold like a drop in a still lake; each telling told with added thrill and triumph, 'till your deeds seemed to the people of the Fearlanns and across every corner of the isle as what could only have been committed by the Gods themselves. Though you never again faced a God, you sometimes felt a strength deep in your core, in times of direst distress, that pushed you to the border of what is humanly possible.\n                    *goto brie\n                    \n        \n    \n*label marriage\nIt took some time to find ${them}, once Domnall's force had disbanded ${they} had also left the Cuan Islands and, according to someone Conan knew, was visiting ${their} parents just north of Eascmore, at the coastal end of Gan Stad forest. As soon as you heard you rode hard in ${their} direction for almost a full day and night on the horse given to you by the villagers for your escape from the Cuan Islands. You remember so well how you knocked at the door where a neighbor had said ${they} was staying, how your heart rate quickened as it opened. \n*page_break\nThere ${they} stood, looking back at you with shock. \"${name}\" ${they} whispered, seemingly not believing it. You felt like your heart had swelled to double it's size in fear and excitement, your breaths felt loud yet weak. You felt then like it was now or never, your heart thundered and yet your body moved smoothly. Your eyes held ${their} gaze as you fell on your knee.\n*page_break \"Marry me\"\n${lover}'s hands shot to ${their} mouth and ${their} eyes went wide.\n*if murderer >0\n    \n    ${lover}'s face is scarlet as ${their} hands fall from ${their} face. \"I… thank you, ${name} but… I can't.\" That was when you felt your mouth clog, and the back of your throat sting like a hundred thorns. \"What we did… what I demanded of you that night in the escape. It can't be forgiven.\" ${lover}'s lips thinned as they squished together, and ${they} looked to the ground, and then to the air. \"There was no justice that night.\n    \n    *if killedmurchad >0\n        \n        I-\" ${they} croaked as ${they} struggled to release ${their} words, \"I made you kill a boy.\" \"A boy\" ${they} whispers. A single tear rolls down ${their} cheek.\n        \n        *goto failmarriage\n    *else\n        \n        I-\" ${they} croaked as ${they} struggled to release ${their} words, \"I made you kill a sleeping woman.\" \"I made you murder a sleeping woman\" ${they} whispers. A single tear rolls down ${their} cheek. \n        \n        *goto failmarriage\n\n*else\n    \n\n    ${lover}'s eyes seemed to glow for a moment, and then ${they} seemed to sink. \"But… after what I did? Tried to do…\" ${they} choked slightly on ${their} words, \"I nearly let those villagers be killed.\" ${lover}'s eyes moved from you to the fields beyond you, ${they} squeezed ${their} lips so that they thinned, before opening, \"How can you forgive me, when I can't forgive myself?\"\n    \n    *choice\n        \n        #\"Because I love you.\"\n            \n            \n            ${lover}'s eyes returned from the fields to meet your gaze. A gentle breeze brushed you both as ${they} took a step to you. Your knees straightened, bringing you face to face. Titing ${their} head slightly, ${they} leaned forward so ${their} lips met yours. The wind seemed to pick up as you embraced, you remember seeing leaves and hay scattering through the air as your eyes closed.\n            \n            *achieve marriage\n            *goto successmarriage\n            \n        #\"I can't forgive, but I can forget.\"\n            \n            \n            \n            ${lover} nodded sadly in agreement. \"No, no one can forgive what I did. To forget, we need to leave all this behind us. Apart.\" There was a pause and the air hung still. \"Good luck, ${name}.\" You were still kneeling as the door closed shut, and your heart's thundering ceased, then sunk. You heard a bird flap and flutter into the air behind you. And you stood. And walked away.\n            \n    \n            *goto failmarriage1\n           \n    \n    \n\n\n\n\n\n*label failmarriage\n*choice\n    #\"But... I love you!\"\n        ${lover} shook ${their} head slowly, \"We both need to leave this behind us.\" ${lover} turned away, and as ${they} slowly closed the door, ${they} whispered \"Good luck, ${name}.\" You were still kneeling as the door closed shut, and your heart's thundering ceased, then sunk. You heard a bird flap and flutter into the air behind you. And you stood. And walked away.\n        *goto failmarriage1\n        \n    #Stay silent\n        \"We both need to leave this behind us.\" ${lover} turned away, and as ${they} slowly closed the door, ${they} whispered \"Good luck, ${name}.\" You were still kneeling as the door closed shut, and your heart's thundering ceased, then sunk. You heard a bird flap and flutter into the air behind you. And you stood. And walked away.\n        *goto failmarriage1\n    \n*label failmarriage1\n        \nThe memory still hurts, still leaves you with that same sunken heart all these years later. You haven't spoken since, even now as an old ${man} your paths haven't again crossed. Life went on well all the same, your fame lasted through stories and even a few songs, but eventually people found a new hero to chatter on about. Ultan made good on his promise of fortunes for your compliance, you sold off most of it and lived on comfortably in a sizeable home. The vision of Goll Mac Morna fading over the hills follows you into every new day, fades into your dreams. The day of the escape feels like so long ago, sometimes you almost wonder if it was a dream, only reassured by the tune of a bards song about it. You hum it now to yourself quietly through dry lips, the words mostly forgotten. \n\nThough you still have what can never be taken away, a statement that still brings some sense of pride to you;\n[i]You are ${name}, borne of Eascmore, the savior of a hundred innocents, who stared Crom in the eyes… and lived.[/i]\n\n*if Compassionate >89\n    *achieve compassionate\n    *goto cheese1\n*else\n    *if Ruthless >89\n        *achieve ruthless\n        *goto cheese1\n    *else\n        *goto cheese1\n    \n*label successmarriage\nThe memory still, all these years later, brings a smile to your face. Your frail old body leans against a shrivelled willow tree. The children you and ${lover} bore have since grown and before you are their children, keen and quiet as you tell to them your tale, or at least a version of it. They know the tune of the song that's sung about your great deed the day of the escape, and hum along as you it to them. Then, as you begin to wrap it up, the young Brodagh who looks much as you would have at ${his} age, interrupts. \"But ${name}, what about the part where you breathed fire?\" Then your youngest grandchild, Eileen, blurts out \"An' the part where you tell the clouds 'n' sky ta send down lightnin'?\" You feel yourself laugh at that, but indeed, that's how legends are made.\n*if Compassionate >89\n    *achieve compassionate\n    *goto cheese1\n*else\n    *if Ruthless >89\n        *achieve ruthless\n        *goto cheese1\n    *else\n        *goto cheese1\n\n    \n*label brie\nYou've grown old, and lean now on a willow staff as you lecture the Fianna's prodigies, the new generation. You sometimes wonder how long you have left in this world, when your time will truly come, when there will be no returning. One thing is certain, though; the story of that ${man} who met Crom and lived will live for generations. ${name}, a ${man} amongst gods. \n\n${name}, the ${man} who defied death.\n*if Compassionate >89\n    *achieve compassionate\n    *goto cheese1\n*else\n    *if Ruthless >89\n        *achieve ruthless\n        *goto cheese1\n    *else\n        *goto cheese1\n*label cheese1\n    \n*goto_scene ending\n", "choicescript_description": "The drums beat, horns blow. It is time for you to dance a warrior's dance. You were born in poverty and raised by ambition. Now is your chance to write your own legend, will it be a tragedy or a triumph?\n\nTravel across oceans and through burning forests. Camp under the stars and find love. Be immersed in a land embellished in religion and customs, but scarred with fire and fury. \n\nBe a scout, an assassin and a warrior. Through wit and muscle become a hero. Debate with chieftains, duel with champions and watch as the gods make their judgment on your people.\n\n[i]By Crom[/i] is a 75,000 word historical-fantasy interactive fiction by Fionn Graham, where your choices control the story. It is text based-without graphics or sound effects-and fuelled by the vast unstoppable power of your imagination.\n\n• Play as male or female; trans or cis; bi, straight, gay or asexual.\n• Find romance with a combat trainer, an advisor and a member of clan royalty.\n• Discover betrayals and affairs, find lost family members.\n• Devise battle plans, take part in prison escapes, battle storms on the high seas and ride like the wind through forest and hills.\n• Accept bribes and be part of deadly conspiracies, assassinations and coverups.\n• Be a hero of innocents, or laugh as the world around you burns.\n\n[b]Content Warning:[/b] Contains graphic descriptions of violence and war.", "choicescript_stats": "[i]Born into the small fishing town of Eascmore, you are growing into a ${person} that time and legend won't forget, if you make the right choices in this life.\n\nMay Dagda look favourably upon you, and may Crom have mercy on you, ${name}.[/i]\n\n[b]Abilities and skills[/b]\n\nOver the years you've found you have a gift for many things,\nsome more than others.\n*stat_chart\n      percent Endurance\n      percent Intelligence\n      percent Charisma\n\n\n[b]Personality[/b]\n      \nIf someone was to describe your personality, they might mention that you are…\n*stat_chart\n      opposed_pair Sharp\n       Wistful\n      opposed_pair Mischievous\n       Obedient\n      opposed_pair Humble\n       Proud\n      opposed_pair Ruthless\n       Compassionate\n\n\n\n[b]Appearance[/b]\n\nYou look quite…\n*stat_chart\n    opposed_pair Rugged\n     Delicate\nSome people may think more highly of you than others…\n\n[b]Relationships[/b]\n*stat_chart\n      percent Conan\n      percent Medb\n      percent Domnall\n      percent Cathal\n      percent Diarmuid\n      percent Caelan\n      percent Oscar\n      ", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n  \n  Unlock the rest of the game, including the thrilling conclusion!\n  \n  *purchase_discount adfree 2022-06-09 $3.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n  \n  You've paid to unlock the rest of the game.\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Hounds of War.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "info": "Medb fleees to Cuan islands\n\nOscar boat scene\n\nMaire Currach dream.\n\n\n\n\n\nUltan kills, blames Medb troops\n\nI can get you to your brother.\n\nPunished, walk along the beach of heads\n\n[Head to cuan Islands]\n[use oscar scenes]\nUse variable ${Caelan} for Diarmuid/Caelan romance on board.\n\n\n[walk to medb's fortress = awkward oscar and ultan walk]\n\n\n[medb= murchads mother, use her scenes. meant to kill murchad]\n\n\n\nchapter 7\n\narrive at fortress-\n\nsiege begins\n\n\n—ultan traitor—\nknew about the attack.\nsee him talking to medb\n\n\nultan is about to tell medb that you were not on her side all along, that he bribed you to cover up. need to kill him or die.\nmedb and conan thought you were part of it\n\nmedb lets you tutor Murchad based on your best ability e fighting or history.\n\n\nConan friend of Medb-was personal guard of hers\n\nconvinces her to let you come inside fort as guest/hostage.\n\nwolf people legends. lover comes to rescuue you. conan stops mission because he wants to talkj with you. ie no guards meant to be around at night. medb about to kill you- conan stops her.\n\nyou have chance to open gates of ringfort at night when you escape, everyone inside killed. Medb tells you not to, hold both Conan and lover at kife point. Leave and they are locked away, open gates and they are killed and the invasion begins.\n\nmasses running inwards for the attack\nend\n\nsky red from fire.\n\n\nhave dreams about maire wall of heads, end up there if you let Medb's family be killed, you have chance during siege to let the wrriors into Medb's other children.\n\nUsing stats:\n[for lover]\n        *if romance =0\n            *set Cathal +3\n            *goto 20\n        *if lovercaelan =1\n            *set Caelan +3\n            *goto 20\n        *else\n            *set Diarmuid +3\n            *goto 20\n        \n        \n        ——————————————————————————————————————————————————————————-\n        \n        \n        \n[Medb takes you to a prison, questions you, you can tell her about scandal and she will give you a proper meal.]\n[try to convince Conan to let you out, he doesn't, but chats with you a lot. mentions murchad is defiant with his mother.]\n[visits you the first night]\n[Caelan tells you about, lets myou out to kill Murchad first escape plan the second night, Conan visits you
