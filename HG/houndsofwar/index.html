, he fights Caelan, forced to choose who to help, Caelan knocks out Conan. Caelan tells you that Murchad, her adopted son was ordered to be killed. She gives you asling to make the deed easier.\n\n\n[chance to kill murchad]\n-listen and leave\n-kill them\n\n\nchanceto leave, open gates and allow for massacre. \n\nduring massacre-\nMedb holds Conan at spearpoint, commands you to drop your sword and shield. \n\n-The moment you do she launches the javelin at you, die go to dagda.\n-If you fight, she kills conan\nif killed murchad-black raindrop falls from sky, sends you to wall of faces. Cromm speaks through Murchad's head in deep voice. heads are those that died because you agreed to Ultan's cowardice\n\n-live a good life\n\n—————————————————————————————————————————————————————————————————-\nREST OF PRISON SECTION==============\n\n[says shell look into rumour etc]\n[2 days pass, Conan visits tells you of siege]\n\n[lover dressed as servant girl]\n\n\n-tell her medb doesnt know about that, try to end war—————-caelan reports back next day for honour Conchobar would be disgraced if he came back with nothing, whole population outraged at home.———-orders murder either way of medb instead of murchad.\n\n-agree to assasinate murchad, says youll be killed if you dont.\n\n\n\n\n\n\n\n—————————————————————————————————————————-\n\nESCAPE FINAL SCENE======\n[warriors waiting at gates for you to open them, civilians around the village, babies crying as you wake up.\n\nMedb holds conan and guard hold lover at knife.\n\n-open \nmedb doesnt kil them, instead launches a spear at you, you die and are sent to hell, sea of tears etc\n\n-surrender, warriors screaming through gates for you to open.\noveriew of life later——-short excerpt with lover?\n\n", "prologue": "\n*image ingamepic.png\n\n\n\nYou help the scraggly lamb to her feet, quickly brushing your hands across her body, scrubbing off the yellow slime that covered the newborn. It was a fine little thing, you think to yourself, the noise it came out with was more like the chirp of a bird, sweet and delicate. The little thing's legs gave way again, and with your fingers under her belly, you pull her up to her feet. The poor mother lay exhausted on her side, and you give her a light pat on the back for her efforts, before opening your small dagger and cutting off the wool around her teets, so the lamb didn't swallow any. \n\nYou half lift, half guide the lamb to her mother's belly for milk, and it eagerly stumbles it's way to her, the shock of birth wearing off it. You'd helped a sow give birth before, six piglets she'd had, all scrambling over each other to get to their mother. This was different though, the lamb seemed more delicate, much less rowdy. You feel a nervous excitement as the lamb clumsily takes its first sup of milk. \n\nYou quietly crawl to the mother who was more lively now, bleating softly to her newborn. You carefully take out a  palm of oats from your coat pocket. It's sticky from the teaspoon of honey you'd put in as a treat, and the wool in the inside of the pocket sticks to your hand as you pull it out. You hadn't  thought that through, but it didn't matter. You gently hold your hand beside the mother's mouth and she eats it happily. When the oats are gone she licks the remainder of the honey from your hand with a long wet tongue, you feel a ticklish giggle escape your lips and you stroke her head as she starts licking up your arm for more, the little lamb still sucking away blissfully. You'd gotten up fierce early for this, and you feel a wave of relief and tiredness hit you. \n*choice\n      #Snuggle up next to the lamb and mother\n            You lie in the hay in the dry patch, a little away from where the she-lamb was borne. The mother knows you well, but even still a new mother is a cautious one, so she keeps her little one on the far side of her protectively. You give her a light rub and she pushes her head against your palm to massage her. You rub down her neck as she lies down relaxed, and you lie next to them in silence for a while as the sun's rays peak through the cracks in the shed.\n            *goto 2\n            \n      #Lie up next to the shed wall, best to give them their space\n            You lie in the small shed, watching the lamb as she drifts off to sleep, the mother licks her lamb's ears lazily, before tucking her long neck over the newborn and drifting to sleep alongside her. You lie with them in the shed for a while.\n            *goto 2\n      #I better get an early start on the farm work\n            *goto 2\n*label 2\nThe sun is just barely up and you'll have plenty of work to do when father rose, it's the end of spring in the Fearlanns and the potato and beet crop would need to be all dug up in the next week or two. But Da said you'd have half the day off if all went well with the new lamb, so maybe he'd let you go to the village if you brought a few eggs with you to sell. The lamb was white with a black spot on her ear, a fine looking newborn indeed. Da would be delighted to hear she was a female, your family already have a strong ram for breeding so Da usually took the newborn males to the market, where they didn't sell for very much. \n\nMost of the workin' men around Eascmore were fishermen and whalers, and most of the other farmers were goat farmers, so there wasn't much use around here for a ram, aside from for the meat. The lands along the Fearlann coast weren't the best on account of the sea spray that blew surprisingly far inland on a stormy day, and left the soil around the village salty and less than perfect for the kind of grasslands you find further inland. The land, too, was rocky and \"untamed\", as his father had said over a clay cup of cheap wine, \"both land and people\". Da had chuckled at that, though at the time you didn't know what was so funny. The grass grew much too thinly for cattle to survive, and few crops grew well in the sandy, salty soil, aside from beets and turnips. Da was a religious man, prayed to Dagda nightly, and you'd only seen him curse once. He'd cursed the soil. During last years harvest, when the turnips had been small, and when many wrinkled worse than the chieftain's wife, your father had kicked the soil up into the air, shouting blabber at it. \n\nYou remember the spittle flying from his mouth and the way his fists had clenched, veins protruding through his tanned, weather beaten skin. Your father rarely acted like that, and he'd looked all embarrassed when he saw you in the field behind him that time. Sometimes, your Da would just start laughing when he was at work, manically even, but when someone asked, he'd just shake his head with a smile, and he'd pick up the sack of beets, or whatever he was doing, and carry on. Da was odd like that, a mysterious character. \n\nYou sit forward quietly, mindful not to wake the now sleeping lamb and mother. You stand up, way too quickly, and dizzily stumbled backwards 'till you're leaning against the wall of the shed again. The noise wakes the mother, you feel her eye you with annoyance. \n*choice\n      #Give her my apple\n            You take your breakfast apple and roll it to her, you'll be having oats and goat's milk in the cottage anyway. She takes a lazy bite from it, acid-sweet juice frothing on her lips, and lays her neck down once more. You tiptoe out of the shed quietly, and into the warm morning sun's welcoming watch.\n            *goto 3\n            \n      #Give her a hushed \"sorry\"\n            You give her a hushed \"sorry\" with an apologetic smile and stealthily leap up over the shed gate. The latch was so rusted it'd be sure to wake the lamb, and though she loved her newborn, you don't imagine she'd be too happy with giving him another sup of milk so soon. The morning sun's welcoming watch hits your face, and a cool gentle breeze breathes life back into your tired limbs.\n            *goto 3\n            \n      #Ignore her and jump up over the shed gate\n            You tiptoe-run and leap up over the shed gate. The latch was so rusted it'd be sure to wake the lamb, and though she loved her newborn, you don't imagine she'd be too happy with giving him another sup of milk so soon. The morning sun's welcoming watch hits your face, and a cool gentle breeze breathes life back into your tired limbs.\n            *goto 3\n\n*label 3\nYou jog on past the chicken coop, and the hens scuttle over excitedly for their morning feed. You tell them you'll be back with their food later, and run on to the house. Your house has two rooms, one where your Da and Mam sleep, and another bigger room where you and your older brother Conan sleeps, also the family's kitchen. The house has painted white slate walls and a thick thatched roof, with a couple of red and yellow wildflowers growing around it.\n\nYour Da doesn't like you running barefoot in spring, it's a sunny time of year to be sure, but the Fargock sea's also at it's roughest, and it rains plenty. The puddles along the dirt road on a bad day were cold enough, and your father often says your feet'll be blue if you don't keep your shoes on. Are you wearing your shoes on now?\n*choice\n      #No, I like the feel of stones on my heels, and I like to impress the other kids with my cuts and bruises\n            Yeah, you like to be the tough one among other kids, don't you? Since your father's not yet up it's not like to do any harm.\n            *set Endurance +10\n            *set Rugged +15\n            *set Delicate -15\n            *set Obedient -10\n            *set Mischievous +10\n            *goto 4\n      #Yes, why experience pain where it's not needed?\n            Hey, life's tough enough as it is sometimes, and besides your new shoes are lined with wool. Soft as clouds, they are.\n            *set Intelligence +5\n            *set Endurance -5\n            *set Rugged -15\n            *set Delicate +15\n            *goto 4\n      #Nope, I forgot my shoes this morning\n            Oh well, your mind was wandering off somewhere far more interesting, no doubt.\n            *set Wistful +15\n            *set Sharp -15\n            *goto 4\n*label 4\nYou run into the kitchen, and see your big brother Conan lying fast asleep on the bench of the table, which he uses as a bed. He looks far too peaceful, and maybe it's time for him to wake up?\n*choice\n      #Grab him by the toes\n            Conan's eyes go wide and he gives a cry as he comes tumbling to the floor with arms flailing like an upturned bug. His eyes dart around the room for his attacker, and then he sees you. You have to grin as Conan jumps up pushes you back hard into the clothes box. Conan gives a wide toothy grin and you both crack up laughing, you rubbing the pang on your head where you'd hit the box, and Conan rubbing his eyes, not quite fully awake. Your laughter is in seconds drowned out by your new sister. She lets out a shrill shriek louder than a creature of her size has any business making, and you can hear Ma and Da in the next room start to stir.\n            *set Mischievous +20\n            *set Obedient -20\n            *set Conan +15\n            *goto 5\n            \n            \n      #Shout in his ear\n            He lets out a shriek as he wakes up, arms flailing like an upturned bug as he tumbles to the floor. His eyes dart around the room for his attacker, and then he sees you. You have to grin as Conan jumps up pushes you back hard into the clothes box. Conan gives a wide toothy grin and you both crack up laughing, you rubbing the pang on your head where you'd hit the box, and Conan rubbing his eyes, not quite fully awake. Your laughter is in seconds drowned out by your new sister. She lets out a shrill shriek louder than a creature of her size has any business making, and you can hear Ma and Da in the next room start to stir.\n            *set Mischievous +25\n            *set Obedient -25\n            *set Conan +10\n            *goto 5\n      \n      #Wake him up gently\n            You click your fingers beside his ear. He stretches his arms out and lets out a yawn, his face scrunched into a grimace, and a whiff of morning breath hits you. He pulls himself up and looks around the room, eyes blinking as he tries to wake himself up. He stands up and goes over to the fruit basket. Your new sister sleeps in it, tiny little thing. He coos at it softly, and pokes the little one's nose. Thats when she starts to shriek. You groan as the baby lets out a noise a creature of it's size has no business making, and Ma and Da's room starts to wake up.\n            *set Obedient +15\n            *set Mischievous -15\n            *goto 5\n*label 5\nTruth be told, she's not nearly as exciting as the new lamb. She'd been with your family a few weeks now. Conan keeps trying to make her happy and all, but you know she's not likely to enjoy any affection, best left to her naps and feeding. \n\nOnly your Mam seems to know how to calm her down. Conan stood at the oval-shaped straw fruit basket where she lay, and gave her a light flick on the ear. You had to laugh at that, Conan has a funny sense of humour. The baba's eye widened to circles and she went silent. The baby was so used to Mam's cooing she seemed in shock.\n\nConan looks to you, delighted with his success, and puts a hand on either side of her head. He pokes her on the sides of her head gently with either hand, making 'bop' and 'beep' noises with his mouth.  The wide-eyed baby lies there in stunned silence as your brother plays with her. The shock wares off her after a few more 'beep's, and she takes in a deep breath, her little belly expanding under the blankets. As you brace yourself for a second fit of screaming from the baby, your Da opens the door of his and ma's bedroom. He rolls his weary eyes at you and Conan, and gives you both a smile, \"Up to no good with your baby sister, I see\". \n\nHe strides over to her and picks her up with one large hand, and holds her to his chest as she lets out a whine. He made a small 'o' shape with his lips and sounded a random tune to her. People act weird around her, you've noticed. Conan is Conan, and when he does make faces and odd noises it's like an inside joke between the two of you, but with Da… it's different.\n*choice\n      #It bothers me that he acts all weird\n            Ah, don't worry, a little jealousy between siblings is completely normal. He's still your Da just as much.\n            *goto 6\n      #Eh, I don't really care how he acts\n            What does it matter if he acts like an idiot around the baby? He'll stop when she's older no doubt.\n            *goto 6\n      #If that's how he wants to act, it's fine by me\n            Dad knows best, I suppose.\n            *set Obedient +5\n            *set Mischievous -5 \n      \n*label 6\nYou can hardly wait to tell them all about the new lamb, how springy and gross and beautiful it was, but your Dad cuts you off before you were able to blurt it out. Da nods down towards the baby that was only starting to calm down, and your Mam bursts into the room and takes the baby from his hands. She whispers a \"morning\" to you all, she stands a little taller than your Dad and is a fairly stocky woman. She takes the baba back into their bedroom for \"breakfast\", and tells you and Conan to have yours before heading out. Your Da pours three bowlfuls of oats in goat's milk. Mam used to heat the oats into a nice creamy porridge but didn't have time to now on account of the baba. You slosh the cold soppy stuff around the bowl for a moment. The smell used to be nice, but now that it was cold it smelt sour. \n\nConan doesn't even pick up his spoon, he just drinks it all down straight from the bowl. \n\nHe eyes you after he'd wiped his chin of milk, and tells you with a knowing nod, \"Best jus' to drink it back\". Da was already up and wrapping himself in a woolly coat, \"Well if your gonna eat it do it now, we got work to do\". You grimace as the cold watery stuff passes your lips, and the soggy oats drop off the back of your throat into your stomach. Conan laughs as you put the bowl down, you squint involuntarily as your mouth opens and closes, trying to wash away the cold taste. \n\nYou get dressed as Da heads out into the field ahead, and you wrap up warm. The sun's shining well enough, but the sea wind has picked up outside. You'd been on lamb duty the past several days, just in case the mother had her lamb early, but your Da wouldn't have expected the lamb to have arrived yet. Should you tell your Da about the new she-lamb?\n*choice\n      #Yes, I run to him straight away!\n            You race out the door, Conan trailing behind you making 'clip clop' noises with his tongue. You know your Da'll be delighted to hear about her.\n            *set Obedient +5\n            *set Mischievous -5\n            *goto 7\n      #No, I'll let it be a surprise\n            *set Mischievous +5\n            *set Obedient -5\n            *goto 7\n      #Eh, I'll tell him later...\n            *goto 7\n\n*label 7\nThe whole field around your house is little more than three acres, with the sheep divided from the spud field by a gate of wiry sticks. The chicken coop by the house is small, with a small pond in the middle. You see Da on the other side of the spuds field. You, followed by Conan head towards him along the dirt path. Conan keeps making 'clip clop' noises with his tongue, imitating a horse, as he often did when walking. As you arrive behind your Da, however, your excitement dissipates. Your father's crouching at the patch, holding a tiny turnip in his hand, leaf and roots still attached. He's silent, and seems to be staring off into a field far beyond.\n\n\"How's the crop, Da?\", Conan asks, oblivious excitement in his voice. Your Da turns to him then, managing a weak smile, \"Edible, son, edible\". You've scarcely seen your Dad like this. Maybe it was better when he did curse the soil, or kick the ground. You decide to use a skill that has stood by you throughout your life so far to make things better…\n*choice\n      #I tell him some jokes, that'll get his mind off the field\n            \"That spud looks wrinklier than the village's druid\", you say. He turns back and smiles at you, \"Smarter too\" he replies with a chuckle, \"But don't go telling anyone I said that, alright?\". Somehow, however, the chuckle feels forced, the smile a weak one.\n            *set Charisma +30\n            *set Intelligence +10\n            *goto 8\n      #I reason with him\n            \"Well this area's sandier than most o' the rest\", you remind him optimistically, \"I'm sure the others are much better\". Your Da nods absently, staring at the wrinkled yellow ball in his hand, speckled with brown, and he looks at the soil. He stands up, pats your shoulder, and says in almost cheerful voice, \"What are you two doing standing around anyway? We've got two acres to dig up\". His optimism feels forced, though.\n            *set Intelligence +30\n            *set Charisma +10\n            *goto 8\n      #I stand up and get straight to work, he'll be heartened by my help\n            You grab a bag that sits beside him and with your fingers, you start digging the spuds out of the mud. Your Dad shakes his head, as if to wake himself from his thoughts, and stands up. He gives you a weak smile as he picks up a bag of his own. A forced smile.\n            *set Endurance +30\n            *set Charisma +10\n            *goto 8\n            \n            \n*label 8\nHe turns to Conan, who seems confused as to why your Da had been sad, \"Go on son, feed the chickens for me like a good lad, eh?\". Conan gives him a nod with as straight a face as he could muster, as if to reply, \"I know how important this is, I won't be letting you down\". He looks to you with a smile, looking for some sign of approval, and you give one back. He's two years your senior, at sixteen years, but still he looks up to you. Satisfied that all seems to be well, Conan races back to the chickens. When the \"clip clop\" sounds have quietened, your Da turns and walks off to the beet field, leaving you to start collecting the potato crop. He'd always been a smaller man than the rest of the boy's dads, and a bit shorter than your mum, but somehow as he walks off, he seems so much smaller. \n\nThe spuds get a fair bit better further down the field, but they're no healthy crop. You collect them as quickly as you can. You don't fancy the look of the clouds above. The smaller ugly turnips would be just as fine as any in a stew. Some of them would be going to the pigs anyhow. You spend the guts of two hours collecting, and have gone through most of the field when Conan comes running excitedly over. Your older brother is about the same height as you, though you're somewhat skinnier. His feet sink deep into the dug up soil with each step as comes nearer.\n\nThough he runs quickly he's holding something very carefully in his hands, which he keeps tight to his chest. As he stops right in front of you, you can see he holds an egg in each hand. He nods to them with a big wide grin on his face, and though you're tired and your fingers wet and cold, you can't help but smile back at your big brother's enthusiasm. You're about to speak but Conan hushes you down, as if the eggs were asleep. You quietly tell him to put the eggs back before they get cold. Conan gives a firm understanding nod, but hesitates for a moment, as if waiting for something. \"But thanks for showing me them\", you say, knowing thats what he'd been hoping for. \n\nHe gives you a delighted smile again, and holding the eggs carefully to his coat to keep them warm, he runs off back to the chicken coop. You get back to work, digging the soil back around where the leaf stalk had shot out, and you pull the lumps out. Their roots are different to what they had been other years, more frail looking. You chuck one after another into the fifth sack of the day. Not too bad a crop, you might get twelve or less bags from this field in a normal harvest, and there was still a fair bit of the field to go. It was enough anyways. Not much hope of selling the extras on in the village, though. All going well, if they're buried in a box near the shore, where it's coolest, the spuds will get your family through the winter, along with the beets. Hopefully the beetroot crop are better off. You look over to your Da in the next field, you still haven't told him of the lamb. Do you want to?\n*choice\n      #Yes, I'll run over now\n            You chuck the turnip in your hand into the sack and start running, but just as you're a few bounds from the sack, something hits you.\n            *set Obedient +3\n            *set Mischievous -3\n            *goto 9\n            \n\n      #No, he'll find out when he goes to feed the sheep later\n            You continue to harvest for several more minutes, and just as you're about to take a short break, something hits you.\n            *set Obedient -3\n            *set Mischievous +3\n            *goto 9\n*label 9\n*page_break\nIt takes the wind out of you, and you topple hard into the mud, painfully landing onto your shoulder. You let out a yelp as half your face is covered in mud, the weight on top of you pushing you deeper, your arms and legs flail outwards in panic for a moment. Then you see your attacker. Conan. He gets off you and sits next to you in the mud, half covered in the stuff himself and grinning widely.\n*choice\n    \n    \n    \n    #I'll curse him jokily\n        \"You cow!\" you call him, it's the only curse you know, you know it from when another farm boy your age had once called the fishmonger it, and from the look on her face it was a nasty curse alright. Conan doesn't know what it means either, but he seems to have got the idea. He gives a joyful war cry as he jumps onto you with fistfuls of mud, slapping them onto you and splashing water from a puddle into your face.\n        *set Charisma +5\n        *set Conan +10\n        *goto 10\n            \n            \n    #Slap a fistful of mud in his face, I like a bit of a tussle\n          \n          \n        He gives a joyous shriek and wipes the mud from his face, before leaping on top of you. He pins your right arm down into the mud with a knee, and splashes water from a puddle beside you onto your face.\n          \n        *set Endurance +5\n        *set Conan +10\n        *goto 10\n            \n            \n            \n      \n      \n    #That wasn't funny, and I tell him so\n          \n        He ignores your protests and laughs as you struggle.\n\n          \n        *set Conan -5\n        *set Obedient +5\n        *set Mischievous -5\n        *goto 10\n\n\n\n\n\n*label 10\nYour right arm is pinned down with Conan's knee, and you're sinking into the mud under his weight, what do you do?\n*choice\n    \n    *disable_reuse #Use all your strength to push him off, and roll over him\n        \n        *if Endurance >40\n            He yelps in surprise as you knock him off balance and he falls over into the mud, he tries to push you off as you roll on top, but you hold a firm grip on him. He grins delightedly, struggling against your grip and laughing at the time. After a tussle that lasts until you both are out of breath, you let him go. He sits down beside you with legs crossed on the ground and chuckles to himself, not minding the mud dripping from his chin. He stares at his hands as the open and close into fists, as if to admire his own fighting skills.\n            \n            *set Conan +4\n             \n            *goto 11\n        \n               \n        *else\n            \n             \n            He laughs as you struggle, knowing you're no match for his weight. The pushing is tiring and isn't getting you anywhere, you'll have to try something else…\n            \n            *goto 10\n    #Surrender\n        \n        You tell him you yield, and he gets off you… after rubbing a handful of mud into your hair. He sits down beside you with legs crossed on the ground and chuckles to himself, not minding the mud dripping from his chin. He stares at his hands as the open and close into fists, as if to admire his own fighting skills.\n         \n        *set Conan +2\n        *goto 11\n    \n    *disable_reuse #Try to wriggle your arm free\n        You struggle against him but his weight is too much, and your arm only sinks deeper into the brown soil.\n        *goto 10\n    *disable_reuse #Slap a handful of mud into his face with your free hand\n        *if Endurance >30\n            He tries to dodge your assault but you're too quick, there's a satisfying squelch as the mud plants onto his face. He rolls off you, laughing under the brown mask after spitting out the sludge that had entered his mouth. After an extended wrestle that leaves you both panting, he gets off you. He sits down beside you with legs crossed on the ground and chuckles to himself, not minding the mud dripping from his chin. He stares at his hands as the open and close into fists, as if to admire his own fighting skills.\n            \n            *set Conan +3\n            *goto 11    \n        *else\n            He grabs your wrist just as you pick up the mud, and you're powerless as his stronger arms force you to plant the mud onto your own face, he laughs as you spit out as much mud as you can, though you can still taste some of it on your teeth.\n            \n            *goto 10\n  \n*label 11\nYou both yelp as your father grabs you by back of your necks and hoists you up. \"You both look a state, get back to the house and clean yourselves up, and don't you dare wake your sister. Now!\". His forehead and the bridge of his nose are wrinkled in anger as he speaks. He holds you back by the collar of your coat for a moment as Conan runs off down the dirt path. Before you can say anything, he demands \"You think I need this today of all days?\". He gives you a light smack on the back of the head. \"Now go on, and hurry back to your work after\", he says before turning back and walking towards the beet field once more. You feel the back of your head as you walk. The slap wasn't a painful one, but to you it stings.\n\n*page_break Time is a fickle thing\n\nStrange, it doesn't feel like four years have passed.\nOne can only wonder what became of Conan. The death of your mother hit him hard, you know. You haven't seen him since the day you left Eascmore, when you left that cold, muddy dream far behind. Your sister you left behind too, Aoife, your mother had named her. Barely in her seventh year she was when you left, a nice girl. Quiet enough. It's easier to think of those people as just, people. If they were of your own blood, did it really matter?\n*page_break\n\nSince then you've flourished and grown into a…\n*choice\n      #I'm a man like no other\n            *set person \"man\"\n            *goto 13\n      #I'm a woman like no other\n            *set he \"she\"\n            *set his \"her\"\n            *set him \"her\"\n            *set son \"daughter\"\n            *set man \"woman\"\n            *set boy \"girl\"\n            *set King \"Queen\"\n            *set lad \"lass\"\n            *set nephew \"niece\"\n            *set person \"woman\"\n            *set handsome \"beautiful\"\n            *set himself \"herself\"\n            *set Female 1\n            *goto 13\n      #I was born with the body of a boy, but I'm a woman\n            *set he \"she\"\n            *set his \"her\"\n            *set him \"her\"\n            *set son \"daughter\"\n            *set man \"woman\"\n            *set boy \"girl\"\n            *set King \"Queen\"\n            *set lad \"lass\"\n            *set nephew \"niece\"\n            *set person \"woman\"\n            *set handsome \"beautiful\"\n            *set himself \"herself\"\n            *goto 13\n      #I was born with the body of a girl, but I'm a man\n            *set person \"man\"\n            *goto 13\n\n\n*label 13\nIndeed you are, you were named Síomha by your father, meaning love in the old tongue, but you have changed your name since, haven't you?\n*choice\n      \n      #Yes, my name is...\n            *goto 16\n*label 16\n\n*choice\n      #Fechin \"the raven\"\n            *set name \"Fechin\"\n            *goto 18     \n      #Ernin \"the iron one\"\n            *set name \"Ernin\"\n            *goto 18\n      #Daigh \"the flame\"\n            *set name \"Daigh\"\n            *goto 18\n      #Dana \"the abundant\"\n            *set name \"Dana\"\n            *goto 18\n      #Miren 'born of the sea'\n            *set name \"Miren\"\n            *goto 18           \n      #Actually, it's an unusual one in this land...\n          *goto 17\n*label 17\nIndeed? What is it?\n*input_text name\n*set name\"$!{name}\"\n\nAnd just once more to be sure…\n*input_text sname\n*set name\"$!{sname}\"\n*goto 18\n\n*label 18\n$!{name} is a fine name, fit for such a fine ${man}!\n*choice\n    #That's me\n        *goto 15\n    #Actually...\n        *goto 13\n  \n\n*label 15\nOpportunity for the ${boy} of a peasant would have been slim but time, and your own hard work, has changed things greatly. Since joining the ranks of the Mac Conmara clan, your life has changed. Now, rather than struggling to scrape out a meagre living, you can have something few peasants are permitted in this unjust world;\n\nYou can have ambition.\nBut what for? What dreams and hopes have you?\n*choice\n      #I want to find true love\n            Love. One can so easily get lost in the world of politics and war and intrigue, that one forgets what really matters. Many fine men and women make up the Mac Conmara people, and a ${man} as fine as yourself should have no trouble finding love should you only seek it out. May the gods be good, and may the winds be at your back as you search…\n            *set Compassionate +4\n            *set Ruthless -4\n            *goto 65\n      #Fame and fortune give me purpose\n            Clever trades, strategic marriages… and plundering, are all viable ways for a ${man} to make a name for ${himself}, and fatten his coffers if ${he} makes the right choices. May the gods be good, and may the winds be at your back as strive for success…\n            *set Compassionate -4\n            *set Ruthless +4\n            *goto 65\n      \n      \n      #Power and might are what drive me forward\n            The Fearlanns, and indeed all Éire, are ripe fruit for a ${man} of might to take them. Whether it be through alliances, betrayals and intrigue or all-out war, there are ways for a ${man} of ambition to get what ${he} wants. May the gods be good, and may the winds be at your back as you strive for power… \n            *set Compassionate -4\n            *set Ruthless +4\n            *goto 65\n      #I wish for adventure\n            Indeed, these lands are vast and her people's diverse. Much is there to be discovered and great adventure is there to be had, for anyone daring enough to seek it out. May the gods be good, and may the winds be at your back on your journeys…\n            *set Wistful +4\n            *set Sharp -4\n            *goto 65\n            \n      \n      \n      \n      \n*label 65\n*finish\n\n\n\n\n\n\n", "screenshots": "screenshots!\n*page_break\n*set name \"Bruce\"\n*set person \"man\"\n\n\n*set Endurance 60\n*set Charisma 13\n*set Intelligence 27\n\n\n\n\n*set Wistful 30\n*set Sharp 70\n\n*set Mischievous 43\n*set Obedient 57\n\n*set Proud 83\n*set Humble 17\n\n*set Ruthless 45\n*set Compassionate 55\n\n\n\n\n\n*set Rugged 64\n*set Delicate 36\n\n\n*comment Weapon\n\n\n*set sword \"mace\"\n\n\n\n*comment Relationships\n\n*set Conan 65\n\n*set Domnall 20\n\n*set Oscar 83\n\n*set Medb 70\n\n*set Cathal 40\n\n*set Diarmuid 35\n\n*set Caelan 44\n\n*set Sadhbh 30\n\n\nLooking around the crowd for his musician, he calls out, \"Diarmuid, you may play now\".\n\nDiarmuid holds his instrument tight as he walks to the center of the feast, there sits a long table laden with fanciful displays of cherries and foreign fruits and honeyed wine. Next to the Conchobar and Domnall at the head of the table, sits Conchobar's daughter. Domnall gives him a distracted nod to play, and there follows whistles and hoots by some of the knights. He ignores them as best he can, and begins to play. He strums his strings slowly at first, with the chatter and laughter Conchobar's men all but drowning his tune out, but on he plays. His fingers flick across the strings quicker and quicker, going through the motions as he'd painfully rehearsed a hundred times, and the droning tune of muffled laughter around him soon dims, giving way to his own sound. Several men and women at the table tap their fingers against their plates in rhythm with the music. Soon the chorus comes 'round, and Diarmuid's voice brakes into song. The encouragement of the drumming fingers had given him a new confidence and fervor entirely, and he begins to sing the words out delightedly, \n\n\"The rain, it lashed and poured and slashed\nas on the ground men's skulls were smashed!\nand on the ground there leapt and bound\nhalf-a-hundred o' the queen's finest hound'!\"\n\nBy now the drumming of fingers have turned to the slapping of palms and chalices on the red wooden table and the people, though ignorant of the words, hum and chant along to his tune,\n\"The king he ran through river and field\nfor his life, his life he wished not to yield!\nThe rain, the rain, it poured and lashed\nas on the ground men's throats were slashed!\"\n\nHands clapping and guests shouting along drown out his voice and string, but it made no matter, the people were loving his song. These people, some cruel and ignorant, were in love with his song. Surely that in and of itself was something to sing about!\n*fake_choice\n    \n\n    #Sing along\n\n    #Join in the dance\n\n    #Cheer on Diarmuid\n\n\n*set name \"Sarah\"\n*set person \"woman\"\n\n*set Endurance 20\n*set Charisma 83\n*set Intelligence 76\n\n\n\n\n*set Wistful 65\n*set Sharp 35\n\n*set Mischievous 49\n*set Obedient 51\n\n*set Proud 33\n*set Humble 67\n\n*set Ruthless 43\n*set Compassionate 57\n\n\n\n\n\n*set Rugged 34\n*set Delicate 66\n\n\n*comment Weapon\n\n\n*set sword \"dagger\"\n\n\n\n*comment Relationships\n\n*set Conan 45\n\n*set Domnall 55\n\n*set Oscar 64\n\n*set Medb 30\n\n*set Cathal 77\n\n*set Diarmuid 25\n\n*set Caelan 94\n\n*set Sadhbh 70\n\nShadows, seen only for the torches they carry, leap between the trees and cackle like madmen. Then the first stick, spiked with iron and fletched with arrows, flies through the air. A thud, a hollow gasp, and the man behind you falls.\n\nCries ring out all around, and the shadows descend on the mass of bodies. \n\nAs they rush with blades swinging, their forms become clearer. The torches they carry light up their faces. Wolf faces. At their heels rush hounds, bounding and barking. On those not yet standing the hounds leap. To those panicked and running the spears are flung. All the faces are a blur, Sadbh has disappeared. And there you sit, somewhere between hell and earth.\n\n*fake_choice\n    \n    \n\n    #Grab for your mace.\n     \n    #Run into the gap of wolf  people, and break for the forest.\n     \n    #Play dead.\n     \n*set name \"Seán\"\n*set name \"Seán\"\n*set person \"man\"\n*set Endurance 50\n*set Charisma 43\n*set Intelligence 17\n\n\n\n\n*set Wistful 45\n*set Sharp 55\n\n*set Mischievous 57\n*set Obedient 43\n\n*set Proud 67\n*set Humble 33\n\n*set Ruthless 72\n*set Compassionate 28\n\n\n\n\n\n*set Rugged 53\n*set Delicate 47\n\n\n*comment Weapon\n\n\n*set sword \"sparth\"\n\n\n\n*comment Relationships\n\n*set Conan 15\n\n*set Domnall 29\n\n*set Oscar 63\n\n*set Medb 26\n\n*set Cathal 20\n\n*set Diarmuid 95\n\n*set Caelan 74\n\n*set Sadhbh 30\n\nWater sloshes from side to side across the deck of the ship, through the feet of the oarsmen like a thousand snakes. An seaman's great soaked beard slaps Conchobar in the face as the wind screams abuse. The whole ship falls forward down the back of a wave, and you grip onto the great drum with all your strength to keep from sliding to your grave. The oarsmen nearly fall backwards off their seats, and fight to keep hold of their oars as another rumble of thunder echoes through the skies. Conchobar brushes the beard from his face and squints through the arrow-like raindrops that attack his face, at the mass of oarsmen in front of him. The great longboat sways onto one side, sending the drummer off balance and onto the deck hard, and for a moment, the oarsmen on one side paddle through naught but wind, flying back as they heaved in their seats with their oars cutting through the air.\n\nOn the other side the rowers are drenched in water, with their side of the boat so low you had feared for a moment the boat would capsize. Conchobar nearly topples into Diarmuid, who's sprawled flat on the slippery deck like an upturned bug, as the ship rebalanced itself. He manages to grab the huge oak and leather drum as he skids, his muscular arms hoisting himself back up. The salt makes your eyes tear, and your own hair slaps down at your face. Conchobar reaches down and tugs the fat drummer back onto his feet, his nose had exploded blood when he fell and he furiously rubs red from his eyes as he balances himself. Diarmuid grimaces in pain as he rubs his face, then gives a toothy grin at you. \n*fake_choice\n    \n\n    #Laugh at him.\n     \n    #Rush to help him.\n     \n    #Focus on staying balanced.\n\n*set name \"Saoirse\"\n*set person \"woman\"\n*set Endurance 83\n*set Charisma 23\n*set Intelligence 62\n\n\n\n\n*set Wistful 43\n*set Sharp 57\n\n*set Mischievous 68\n*set Obedient 32\n\n*set Proud 23\n*set Humble 77\n\n*set Ruthless 45\n*set Compassionate 55\n\n\n\n\n\n*set Rugged 58\n*set Delicate 42\n\n\n*comment Weapon\n\n\n*set sword \"dagger\"\n\n\n\n*comment Relationships\n\n*set Conan 45\n\n*set Domnall 29\n\n*set Oscar 55\n\n*set Medb 87\n\n*set Cathal 41\n\n*set Diarmuid 30\n\n*set Caelan 71\n\n*set Sadhbh 39\n\nMost of the workin' men around Eascmore were fishermen and whalers, and most of the other farmers were goat farmers, so there wasn't much use around here for a ram, aside from for the meat. The lands along the Fearlann coast weren't the best on account of the sea spray that blew surprisingly far inland on a stormy day, and left the soil around the village salty and less than perfect for the kind of grasslands you find further inland. The land, too, was rocky and \"untamed\", as his father had said over a clay cup of cheap wine, \"both land and people\". Da had chuckled at that, though at the time you didn't know what was so funny. The grass grew much too thinly for cattle to survive, and few crops grew well in the sandy, salty soil, aside from beets and turnips. Da was a religious man, prayed to Dagda nightly, and you'd only seen him curse once. He'd cursed the soil. During last years harvest, when the turnips had been small, and when many wrinkled worse than the chieftain's wife, your father had kicked the soil up into the air, shouting blabber at it. \n\nYou remember the spittle flying from his mouth and the way his fists had clenched, veins protruding through his tanned, weather beaten skin. Your father rarely acted like that, and he'd looked all embarrassed when he saw you in the field behind him that time. Sometimes, your Da would just start laughing when he was at work, manically even, but when someone asked, he'd just shake his head with a smile, and he'd pick up the sack of beets, or whatever he was doing, and carry on. Da was odd like that, a mysterious character. \n\nYou sit forward quietly, mindful not to wake the now sleeping lamb and mother. You stand up, way too quickly, and dizzily stumbled backwards 'till you're leaning against the wall of the shed again. The noise wakes the mother, you feel her eye you with annoyance. \n*fake_choice\n    \n\n\n    #Give her my apple.\n     \n    #Give her a hushed \"sorry.\"\n     \n    #Ignore her and jump up over the shed gate.\n     \n*set name \"Aisling\"\n*set name \"Aisling\"\n*set person \"woman\"\n*set Endurance 34\n*set Charisma 23\n*set Intelligence 94\n\n\n\n\n*set Wistful 25\n*set Sharp 75\n\n*set Mischievous 34\n*set Obedient 66\n\n*set Proud 55\n*set Humble 45\n\n*set Ruthless 59\n*set Compassionate 41\n\n\n\n\n\n*set Rugged 47\n*set Delicate 53\n\n\n*comment Weapon\n\n\n*set sword \"sparth\"\n\n\n\n*comment Relationships\n\n*set Conan 69\n\n*set Domnall 25\n\n*set Oscar 63\n\n*set Medb 48\n\n*set Cathal 43\n\n*set Diarmuid 85\n\n*set Caelan 14\n\n*set Sadhbh 16\n\nMost of the chieftains are men of the gods, far too devout to go against the words of a druid as wise as Cathal, but two of them are swayed by the words of Medb. You can see Domnall is furious, but together they make up nearly half of the four hundred men assembled, he cannot simply ignore them. The captains hold their tongue as the chieftains argue back and forth. Medb then implores to Domnall, \"If reason from a chieftain will not persuade you, then think of the men you lead! Listen to your captains, see how they feel about the slaughter of their families\". Without looking to whom she reaches for, she grabs your tunic and pulls you to the middle of the room with one arm. When you say nothing, she glares at you and commands quietly, \"Are you dumb? Speak, girl\".\n*fake_choice\n    \n\n    #\"I worry for our lands and people.\"\n      \n    #\"We can't burn holy ground, no matter what.\"\n      \n    #Stay silent.\n\n\n", "startup": "\n\n*title By Crom\n*author Fionn Graham\n*create name \"child\"\n*achievement marriage visible 30 For love\n    Marry for love, and have scores of descendants to tell your stories to.\n    They will carry your name and stories on forever.\n*achievement scandal visible 25 A royal scandal\n    Discover a scandal that could send the Mac Conmara clan into chaos.\n    Domnall's affair is a secret no more, do with it what you will…\n*achievement deal visible 10 Cut a deal\n    Use your information to cut a deal behind bars.\n    Let's hope you are justly rewarded.\n*achievement asling visible 10 Liquid dream\n    Asling, an intoxicating fluid waiting for you to try it.\n    Woozy, but elated.\n*achievement dagger visible 25 Cold dagger, cold heart\n    Assassinate one of royal blood. \n    The terrible deed is done. May it weigh only lightly on your conscience.\n    \n*achievement crom hidden 100 Face Crom -and live\n    hidden\n    You have conversed with the deathly one, may you use his gift well.\n*achievement refusebribe visible 15 Incorruptible\n    Stay honest -even if there is money to be made otherwise.\n    You have done the right thing, you hope.\n*achievement conan visible 20 The missing branch\n    Find a lost member of your family.\n    United with your brother, under less than perfect circumstances.\n*achievement romance visible 10 A romance on the high seas\n    A voyage not to be forgotten.\n    A night you won't soon forget.\n*achievement elder visible 50 An elder of the Fianna\n    You will have to prove a great deal in life if this is the future you seek.\n    Your struggles and triumphs have all been worth it.\n*achievement ruthless visible 35 One of Crom's own\n    End with 90 ruthlessness or over; a terror to behold.\n    People's voices drop as they whisper your name.\n*achievement compassionate visible 35 Heart of Dagda\n    End with 90 compassion or more; a pure spirit.\n    A faint light of hope in a dark world.\n\n    \n    \n\n    \n\n*scene_list\n      startup\n      prologue\n      chapter1\n      chapter2\n      chapter3\n      $ chapter4\n      $ chapter5\n      $ chapter6\n      $ chapter7\n      $ chapter8\n      $ ending\n\n*create he \"he\"\n*create him \"him\"\n*create his \"his\"\n*create son \"son\"\n*create man \"man\"\n*create boy \"boy\"\n*create King \"King\"\n*create nephew \"nephew\"\n*create lad \"lad\"\n*create himself \"himself\"\n*create handsome \"handsome\"\n\n*create person \"person\"\n\n\n*comment Life\n*create Health 100\n*create Addiction 0\n\n*comment Abilities\n\n*create Endurance 20\n*create Charisma 20\n*create Intelligence 20\n\n\n\n\n*create Wistful 50\n*create Sharp 50\n\n*create Mischievous 50\n*create Obedient 50\n\n*create Proud 50\n*create Humble 50\n\n*create Ruthless 50\n*create Compassionate 50\n\n\n\n\n\n*create Rugged 50\n*create Delicate 50\n\n\n*comment Weapon\n\n\n*create sword \"sword\"\n\n\n\n*comment Relationships\n\n*create Conan 40\n\n*create Domnall 30\n\n*create Oscar 40\n\n*create Medb 40\n\n*create Cathal 40\n\n*create Diarmuid 40\n\n*create Caelan 40\n\n*create Sadhbh 30\n\n\n*comment Info\n*create murderer 0\n*create Domnallaffair 0\n\n*create Telldomnallbroinn 0\n\n*create Ultansaved 0\n\n*create Cattle 0\n\n*create PrizeBull 0\n\n*create Party 0\n\n*create Female 0\n\n*create Music 0\n\n*create Domnallromance 0\n\n*create Diarmuidromance 0\n\n*create Learncombat 0\n\n*create MetCaelan 0\n\n*create HateCaelan 0\n\n*create Caelanromance 0\n\n*create Cararomance 0\n\n*create triedtosave 0\n\n*create chapter4 0\n*create Aslingvial 0\n\n*create Assasinultan 0\n\n*create savemessenger 0\n\n*create romance 1\n\n*create killmurchad 0\n*create killmedb 0\n*create killedmurchad 0\n*create killedmedb 0\n*create saveconan 0\n*comment lover [headingtocuanislands either Caelan or Diarmuid]\n*create lover \"lover\"\n*create them \"them\"\n*create their \"their\"\n*create they \"they\"\n\n*create lovercaelan 0\n\n\n*comment Cara is now Sadhbh\n\n*comment Conan name for you\n*create sname \"Síomha\"\n\n*if choice_is_omnibus_app\n    *comment skip description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n    The drums beat, horns blow. It is time for you to dance a warrior's dance. \n    \n    You were born in
