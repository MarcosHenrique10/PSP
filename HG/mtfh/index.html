d you used the opportunity to make a break for it.  You know you could have killed the bear, but you didn't need to.  Killing like that is foolish, pointless and cruel.  You jogged the rest of the night, and found a steam to wash your wounds in.  \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t- Leadership increased greatly\n\t\t\t\t\t\t\t\t*set leadership+2\n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t*set dark %+22\n\t\t\t\t\t\t\t\t- Light increased\n\n\t\t\t\t\t\t\t\tAfter several more days, you spotted the camp in the distance.  Word got around that you had fought a bear, and had the claw marks to prove it!\n\n\t\t\t\t\t\t\t\t- Glory increased\n\t\t\t\t\t\t\t\t*set infamy %+ guts\n\t\t\t\t\t\t\t\t*goto Training4\n\t\t\t\t\t\t\t\t\t\t \n\t\t\t\t\t#I flipped my knife over to hold it by the blade, and hurled it into the beast!\n\t\t\t\t\t\tWith swinging swipe of your arm, the knife sang through the air.  A wet, solid sounding thud told you that your knife found its mark.  The beast suddenly fell silent, stood a heartbeat longer, and crumpled to the cold ground.\n\n\t\t\t\t\t\tStepping up to the still black form, you saw that it was a bear!  Moving around it, you found your knife jammed up to the hilt in the bear's left eye.\n\n\t\t\t\t\t\t- Shooting increased greatly!\n\t\t\t\t\t\t*set shooting+2\n\t\t\t\t\t\t- Guts increased\n\t\t\t\t\t\t*set guts+1\n\n\t\t\t\t\t\tThe next day you skinned the bear and ate some of the meat.  After several more days of hiking, you eventually spotted the camp in the distance.  When you got there, everyone was impressed with the bear pelt, and the story of your impossible throw!  \n\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t- Glory increased\n\t\t\t\t\t\t*set infamy %+ guts\n\t\t\t\t\t\t*goto Training4\n\t\n\t\t\t\t\t#I backed away slowly, trying to soothe the creature with my voice.\n\t\t\t\t\t\tAS you backed away, whispering soothing sounds, the creature calmed down a little.  As you were trying to decide what to do, a cloud slipped over the moon, and the scene was cast in darkness.  You could hear the animal sniffing, but it looked like it couldn't see you.\n\n\t\t\t\t\t\tWhat did you do then?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I charged it, knife out!\n\t\t\t\t\t\t\t\t*goto bear\n\t\t\t\t\t\t\t#I stealthily moved around the cave, and tried to sneak past it.\n\t\t\t\t\t\t\t\tIn the darkness, you were as silent as all of your training prepared you to be.  As you glided only a few feet from the creature, you heard it sniffing the air, so you hurled your knife off in the distance to distract it.  At the sound you could hear the animal's sniffing turn that direction, and you slid past the beast.  You lost your knife, but made it past without a problem!  To this day, you wonder what kind of animal that was?\n\n\t\t\t\t\t\t\t\t- Stealth increased greatly!\n\t\t\t\t\t\t\t\t*set stealth+2\n\t\t\t\t\t\t\t\t*set guts+1\n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t- Guts increased\n\n\t\t\t\t\t\t\t\tAfter several more days of hiking, you spotted the camp in the distance.  You made great time, coming in only second!\n\t\t\t\t\t\t\t\t*goto Training4\n\n*label Training4\n*finish_advertisement\n", "training2": "\nYou graduated Basic a few days later.  It was the best day in your memory, with loved ones proudly watching.\n*page_break Hua!\nFrom that point on you started your training to be more than a Corpsman, more than a simple trooper - you were being trained to be a Mobile Armored Marine.\n\nA lot of your training dealt with learning the ins and outs of Tactical Powered Armor (or just \"Armor\", to Marines), and the standard armaments they use.\n\nWearing Armor feels like wearing your own personal tank.  Thick, durable metal plating covers the marine inside from head to toe.  The boots and gauntlets sport extra reinforcement over the toes and knuckles, great for wet work, demolition, or just having a good time.\n\nOver the right shoulder sits a rocket cannon, capable of launching highly explosive mini rockets, accurately, at incredible range.  The cannon is belt fed ammo from the Armor's bulky backpack, and holds enough missiles for a week-long mission.\n\nThe backpack also carries a huge arsenal of micro grenades - enough destructive force to demolish a starship.\n*page_break\n\nClamped to the Armor's thigh is a heavy blast pistol.  Blast weapons discharge a bolt of highly destabilized particles that rip apart most alloys on contact, and cause localized explosions.  They aren't lasers - lasers are more of a flash heating and cutting weapon.  Blasters have a lot more raw destructive potential!\n\nFlip open a panel in the Armor's left forearm, and you have access to the Oracle, a highly advanced computer console with a constant feed from any Imperial vessels in Orbit.\n\nThrusters set into the backpack, legs and shoulders give the Armor the ability to jump, hover, and fly.  These boosters can also be used creatively in combat, to give the trooper inside that little extra push.\n\nTactical Powered Armor, with a MAC Marine inside, is one of the deadliest things in the known universe!\n\n*page_break\n\nYour favorite day of Armor training was the day they split the recruits into two teams for a huge mock battle.  It was basically a huge game of capture the flag, and each recruit had a paint cannon mounted on the shoulder of their Armor.  This was the first time you were able to use the Armor in something similar to a real fight, and everyone was pumped to get into it!\n\nYour Armor's jump jets were removed, and you had no weapons other than the paint cannon and your fists.  Each suit was set to automatically shut down if it got paint on it, or if the suit was struck by another suit.\n\nThey split you into a red team and a blue team.  You were on blue.\n\nAt the start of the battle, what did you do?\n*choice\n\t#I volunteered to guard my team's flag\n\t\tYour flag was placed in a small clearing in some thin woods.  You could hear the distant thumps of shots fired and Armored bodies clashing, but everything around you was silent.\n\n\t\tHow did you set yourself up to protect the flag?\n\t\t*choice\n\t\t\t#I hid in the bushes and watched the flag\n\t\t\t\tWatching the flag, the trees around you grew silent.  But then, you saw movement in the brush across from your position.  Slowly, three enemy Armored figures emerged.  They were all looking around nervously, and they hadn't spotted you yet.\n\n\t\t\t\t- Stealth increased\n\t\t\t\t*set stealth+1\n\n\t\t\t\tWhat did you do then?\n\t\t\t\t*choice\n\t\t\t\t\t#I blasted them\n\t\t\t\t\t\tOpening fire, you took one in the chest and one in the face almost immediately.\n\n\t\t\t\t\t\t- Shooting increased\n\t\t\t\t\t\t*set shooting+1\n\n\t\t\t\t\t\tThe third warrior spun, and blasted the trees around you.  Leaves exploded with splashes of red paint, and you dove to the side just barely fast enough to avoid getting hit.  What did you do then?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I kept shooting!\n\t\t\t\t\t\t\t\t*label wolverine\n\t\t\t\t\t\t\t\tRolling to the side, scrambling along the ground, you hurled yourself behind a tree for safety.  Then, you saw the enemy, took aim and fired.  A splatter of blue paint covered his helmet, and he fell backwards with the force.\n\n\t\t\t\t\t\t\t\t- Shooting increased\n\t\t\t\t\t\t\t\t*set shooting+1\n\t\n\t\t\t\t\t\t\t\tBreathing heavily, you glanced down and noticed that you had a red mark on your right leg.  Looking closer, you could see that you'd been hit!  Somehow, the other trooper HAD hit you, but your suit didn't register it and shut down like it was supposed to.  What did you do?\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#I manually shut down my suit, calling myself hit\n\t\t\t\t\t\t\t\t\t\tAfter shutting down your suit, you lay there in the leaves for some time.  From where you were, you could see your team's flag.  You knew you had personally taken out three enemy troops, so you thought your team had a pretty good chance.\n\n\t\t\t\t\t\t\t\t\t\tIt turned out you were wrong!  Lying there, you had to watch as two red Armored troopers came running into the clearing, took the flag, and ran.\n\n\t\t\t\t\t\t\t\t\t\tYour team lost, but at least you knew that you had done the right thing.\n\n\t\t\t\t\t\t\t\t\t\t- Light increased\n\t\t\t\t\t\t\t\t\t\t*set dark %+22\n\t\t\t\t\t\t\t\t\t\t*goto Training_3\n\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t#I brushed the paint off with some leaves and kept playing\n\t\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\t\t\t\t\t\t\t\t\t\t*set dark %-20\n\n\t\t\t\t\t\t\t\t\t\tYou set yourself back in the bushes to watch, and only a couple of minutes later two red troopers came running into the clearing.  They were moving fast and recklessly, and made easy targets.  You blasted one across the side of the helmet, knocking him sideways, and took the second with a shot to the gut.  As their Armor shut down, your helmet speakers burst to life with cheering!  Those were the last two soldiers from the red team, and you were the last trooper standing from blue team!  You won the day!\n\n\t\t\t\t\t\t\t\t\t\t- Glory gained\n\t\t\t\t\t\t\t\t\t\t*set infamy %+ guts\n\t\t\t\t\t\t\t\t\t\t*goto Training_3\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#I ran away!\n\t\t\t\t\t\t\t\tWhich might not have been the bravest thing to do...\n\n\t\t\t\t\t\t\t\t- Guts decreased\n\t\t\t\t\t\t\t\t*set guts-1\n\n\t\t\t\t\t\t\t\tYou scrambled, ran, and heaved yourself to safety.  Unfortunately, that meant that the enemy trooper could just take the flag and win.  But still, you managed to get through the mock battle without getting shot!\n\t\t\t\t\t\t\t\t*goto Training_3\n\t\t\t\t\t\t\t#I called my team for backup!\n\t\t\t\t\t\t\t\t*label backitup\n\t\t\t\t\t\t\t\tHunkering down, blasts of red paint spattered the trees and bushes around you.  You rolled to the side, and came up to fire just as two of your teammates attacked from the other side!  The clearing was filled with a haze of blue paint, and when it cleared, no red troopers were left standing.\n\n\t\t\t\t\t\t\t\t- Leadership increased\n\t\t\t\t\t\t\t\t*set leadership+1\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou sent the two troopers back into the fight, and soon the battle was over.  Your team had won a solid victory.  That was a great day!\n\t\t\t\t\t\t\t\t*goto Training_3\n\t\t\t\t\t\t\n\t\t\t\t\t#I kept hiding\n\t\t\t\t\t\tWatching the enemy troopers, you were silent as the wind.\n\t\t\t\t\t\t\n\t\t\t\t\t\t- Stealth increased\n\t\t\t\t\t\t*set stealth+1\n\t\t\n\t\t\t\t\t\tAs you watched, one of them picked up the flag, and they turned their backs on you as they started to slowly creep back out of the clearing.  What did you do then?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I watched them go, and stayed hidden\n\t\t\t\t\t\t\t\tWell, you were silent, and proved that you could be stealthy even when you probably shouldn't be!\n\n\t\t\t\t\t\t\t\t- Stealth increased\n\t\t\t\t\t\t\t\t*set stealth+1\n\n\t\t\t\t\t\t\t\tYour team lost that battle, but you still had a great time.  Hiding.\n\t\t\t\t\t\t\t\t*goto Training_3\n\t\t\t\t\t\t\t#I opened fire\n\t\t\t\t\t\t\t\tYou blasted the trooper holding the flag square in the back, knocking him forwards into his face and sending the flag flying from his armored hand.  As the other two turned, you blasted a second in the side of the helmet.  His suit shut down and he crumpled to the ground.  The third red trooper opened fire, blasting the trees and bushes around you!\n\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto wolverine\n\t\t\t\t\t\t\t#I called for backup from my team\n\t\t\t\t\t\t\t\tAs you spoke into your radio, the enemy heard you and turned.  All three unleashed a barrage of red paint!\n\t\t\t\t\t\t\t\t*goto backitup\n\t\t\t#I boldly stood right next to the flag\n\t\t\t\tWhich was brave!\n\t\t\n\t\t\t\t- Guts increased dramatically!\n\t\t\t\t*set guts+3\n\n\t\t\t\tBut not wise!  After a few moments, you heard a stick break off to your left.  It was your only warning before a fusillade of red paint pellets blasted through the clearing.  Hurling yourself to the ground, you rolled for safety.  An enemy trooper came stomping into the clearing, blasting at you.\n\t\t\t\t*goto wolverine \n\t\t\t#I took the flag and hid it (which was against the rules!)\n\t\t\t\t- Darkness grows within you...\n\t\t\t\t*set dark %-17\n\n\t\t\t\tCheating might not be honorable, but it works!  You scrambled up a large tree and hid the flag high in its branches.\n\n\t\t\t\t- Stealth increased\n\t\t\t\t*set stealth+1\n\n\t\t\t\tWatching from this position, you saw three enemy troopers walk by below.  What did you do?\n\t\t\t\t*choice\n\t\t\t\t\t#I opened fire\n\t\t\t\t\t\tTaking aim, you took a breath, and blasted one of the troopers in the back.  he fell in a spray of blue paint.\n\n\t\t\t\t\t\t- Shooting increased\n\t\t\t\t\t\t*set shooting+1\n\t\t\n\t\t\t\t\t\tThe other two looked around, confused, and you took out a second with a blast to the top of his helmet.  The force knocked him to his side, where he fell, groaning.  The third looked up.  What did you do then?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I shot him\n\t\t\t\t\t\t\t\t- Shooting increased\n\n\t\t\t\t\t\t\t\t*set shooting+1\n\t\t\t\t\t\t\t\tUnfortunately, he was fast as well.  Your shot crashed into his chest just as his shot hit you, knocking you spinning out of the tree.  The force of the landing knocked you out for several minutes.  When you came to, you learned that your team had won, thanks to the fact that they couldn't find the flag...\n\t\t\t\t\t\t\t\t*goto Training_3\n\t\t\t\t\t\t\t#I dropped on him, aiming my boot for his face\n\t\t\t\t\t\t\t\tDropping free from the tree, you hurled yourself down and planted your armored boot in the enemy trooper's face.  With a jarring, grinding, crashing sound you took him to the ground.\n\n\t\t\t\t\t\t\t\t- Fighting increased\n\t\t\t\t\t\t\t\t*set fighting+1\n\t\t\n\t\t\t\t\t\t\t\tStraightening up, you glanced down to see blood dripping from the other trooper's shattered faceplate.  Something grew cold in your chest that day, as you looked at the trooper's lifeless body.\n\t\n\t\t\t\t\t\t\t\t- Darkness grows within you...\n\t\t\t\t\t\t\t\t*set dark %-39\n\n\t\t\t\t\t\t\t\tThe game was stopped, and a medical helicopter rushed to the scene, but it was too late.  Much too late.\n\t\t\t\t\t\t\t\t*goto Training_3\n\t\t\t\t\t#I dropped down on them\n\t\t\t\t\t\tDropping from the tree, for a moment, the world was still and silent.  Then you landed with a deafening thud, knocking two of the enemy troopers off their feet.  You planted your fist in the gut of the third, knocking him back several yards.  His suit registered the hit, and shut down.\n\n\t\t\t\t\t\t- Fighting increased\n\t\t\t\t\t\t*set fighting+1\n\n\t\t\t\t\t\tAs the other two troopers tried to get to their feet, you caught one in the face with your boot, knocking him back and out of the game.  The third scrambled to his feet, and spun to face you.  What do you do?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I shot him!\n\t\t\t\t\t\t\t\tTaking aim, you fired, but so did he!  Your shot took him square in the chest, and knocked him backwards into a tree.\n\n\t\t\t\t\t\t\t\t- Shooting increased\n\t\t\t\t\t\t\t\t*set shooting+1\n\t\t\t\n\t\t\t\t\t\t\t\tUnfortunately, his shot caught you in the shoulder.  You spun with the force, and fell to your stomach, your suit shutting down.\n\n\t\t\t\t\t\t\t\tFortunately, your team won the battle!  Mostly because no one ever found your flag.  For all you know, it's still up in that tree!\n\t\t\t\t\t\t\t\t*goto Training_3\n\t\t\t\t\t\t\t#I tackled him!\n\t\t\t\t\t\t\t\tLetting out a bellowing war cry, you charged, fists out to your sides.  Your enemy did the same, and as you closed you dropped to one knee and spun, landing a solid kick to the enemy trooper's side.\n\n\t\t\t\t\t\t\t\t- Fighting increased\n\t\t\t\t\t\t\t\t*set fighting+1\n\n\t\t\t\t\t\t\t\tAt the same moment, however, the other soldier caught you in the side of the helmet with a backhand.  In a real battle it would have hardly been enough to kill you, but your suit registered it, and shut down.\n\n\t\t\t\t\t\t\t\tFortunately, your team won the battle!  Mostly because no one ever found your flag.  For all you know, it's still up in that tree!\n\t\t\t\t\t\t\t\t*goto Training_3\n\t\t\t\t\t#I stayed concealed for the rest of the game\n\t\t\t\t\t\tOver the next half hour, you saw several enemy troopers scouting out beneath your tree.  However, none ever looked up!\n\n\t\t\t\t\t\t- Stealth increased greatly\n\t\t\t\t\t\t*set stealth+2\n\n\t\t\t\t\t\tIn the end, the game was ended early.  It seemed that someone had moved the blue team's flag, and no one knew where it was... \n\t\t\t\t\t\t*goto Training_3\n\n\t#I led the charge to get the enemy's flag!\n\t\tThe air was thick with red and blue paint as you cried out and led the charge.  The trooper to your right was taken down in a spray of red paint, and so was the trooper to your left!\n\n\t\tWhat did you do then?\n\t\t*choice\n\t\t\t#I pushed forward, screaming out a battle cry!\n\t\t\t\t\tYou slammed into the enemy, sending the trooper in front of you sprawling in the mud.  Another enemy trooper leapt over his fallen teammate, swinging his fist at your face plate.  Dodging to the side, you slipped in the mud and fell.\n\n\t\t\t\t\tGetting your legs under you, you leapt back up and kicked the enemy trooper in the side.  You could hear his grunt through his suit's speakers as he crumpled into the mud.\n\n\t\t\t\t\t- Fighting increased\n\t\t\t\t\t*set fighting+1\n\t\t\t\t\t\n\t\t\t\t\tLooking up, you could see a knot of troopers fighting around the enemy flag.  What did you do?\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I opened fire!\n\t\t\t\t\t\t\tYou fired as fast as you could into the group.  Your first shot caught a blue trooper in the back, knocking him forwards into the red trooper he was brawling with.  Both went down with their suits shut down.  Your second shot clipped a blue trooper in the shoulder, and your third shot took a red trooper in the face.  You laughed, seeing friends and foes cut down before you!\n\t\t\t\n\t\t\t\t\t\t\t- Shooting increased\n\t\t\t\t\t\t\t*set shooting+1\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t- Darkness grows within you...\n\t\t\t\t\t\t\t*set dark %-22\n\n\t\t\t\t\t\t\tThe remaining fighters scattered, confused.  What did you do then?\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#I kept shooting, finishing them all!\n\t\t\t\t\t\t\t\t\tYou took another teammate in the gut, knocking him to his hands and knees.  Laughing, your next shot took the leg out from under a red trooper.\n\n\t\t\t\t\t\t\t\t\t- Shooting increased\n\t\t\t\t\t\t\t\t\t*set shooting+1\n\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\t\t\t\t\t\t\t\t\t*set dark %-22\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tThe next moment, your vision went red and your suit shut down.  You'd been hit multiple times, by both teams.\n\n\t\t\t\t\t\t\t\t\tYou earned a bit of a nasty reputation that day, and there was a lot of discussion among the trainers about what to do with you.  In the end, they assumed that you had just gotten caught up in the moment, and you were reprimanded, but that's all. \n\n\n\t\t\t\t\t\t\t\t\t- Glory lost...\n\t\t\t\t\t\t\t\t\t*set infamy %-50\n\t\t\t\t\t\t\t\t\t*goto Training_3\n\t\t\t\t\t\t\t\t#I kept shooting, targeting only enemy troopers\n\t\t\t\t\t\t\t\t\tTaking advantage of the confusion, you managed to cut down two more red troopers before the rest of them figured out what was going on.\n\t\t\n\t\t\t\t\t\t\t\t\t- Shooting increased\n\t\t\t\t\t\t\t\t\t*set shooting+1\n\n\t\t\t\t\t\t\t\t\tIt took your team a while to respond, but when they did, working together you managed to wipe out the rest of the red resistance.  You earned a reputation as a wild card that day, and there was a lot of discussion among the trainers about what to do with you.  In the end, they assumed that you had just gotten caught up in the moment, and you were reprimanded, but that's all.\n\n\t\t\t\t\t\t\t\t\t- Glory lost...\n\t\t\t\t\t\t\t\t\t*set infamy %-30\n\t\t\t\t\t\t\t\t\t*goto Training_3\n\t\t\t\t\t\t\t\t#I ran in to get the flag\n\t\t\t\t\t\t\t\t\tTaking advantage of the confusion, you charged in.  You were only a few yards from the flag before any of the enemy troops reacted.  One jumped up and tried to block your way.  With a powerful leap, you flipped up and over the soldier, landing heavily next to the flag.\n\t\t\t\t\t\t\t\t\t*goto knuckles\t\t\t\n\n\n\t\t\t\t\n\t\t\t\t\t\t#I charged in, fists flying!\n\t\t\t\t\t\t\tRoaring, you joined the fight!  With a mighty leap you hurled yourself into the back of an enemy trooper, sending him sprawling in the mud with his suit shut down.  A red trooper saw you, and lunged at you, trying to plant his armored fist in your face place.  Turning, you leaned back and dodged the blow while at the same time bringing up your knee into his gut!\n\n\t\t\t\t\t\t\t- Fighting increased\n\t\t\t\t\t\t\t*set fighting+1\n\n\t\t\t\t\t\t\tYou suddenly found yourself next to the flag.\n\t\t\t\t\t\t\t*label knuckles\n\t\t\t\t\t\t\tWhat did you do?\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#I turned to fight off the rest of the enemies!\n\t\t\t\t\t\t\t\t\tSpinning, you swept the legs out from underneath one red trooper, knocking him to his back.  But, before he could land, you planted an elbow into his stomach.  You could hear his amplified grunt through is helmet speaker.\n\n\t\t\t\t\t\t\t\t\tAnother trooper dove for your legs, and knocked you to the ground.  Twisting, you pulled a leg free and planted a heavy boot in the trooper's forehead.  With a whine, his armor shut down.\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\tGetting back to your feet, you saw a red trooper a few yards away pick up a blue soldier, and slam him head first into the muddy ground.  Looking right at you, he bellowed a challenge.\n\n\t\t\t\t\t\t\t\t\t*label littlejohn\n\t\t\t\t\t\t\t\t\tThe two of you crashed into each other in a blur of motion.  He lashed out with a back handed blow to your face that you side stepped, swinging your own fist back at his gut.  He spun and dodged your fist, and continued the spin with his heavy boot hurling at your side.  You caught the boot, and went to slam your elbow into his knee.  He dropped to the ground and heaved the boot you were holding over his shoulder, carrying you with it, but you twisted in the air and landed in a crouch.\n\n\t\t\t\t\t\t\t\t\t- Fighting increased greatly!\n\t\t\t\t\t\t\t\t\t*set fighting+2\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tAnd just as suddenly, the battle was over.  While you and this trooper fought, someone else from your team captured the enemy flag.  Man, what a great day!\n\n\t\t\t\t\t\t\t\t\t*goto Training_3\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t#I grabbed the flag and ran!\n\t\t\t\t\t\t\t\t\t*label grabngo\n\t\t\t\t\t\t\t\t\tGripping it, you bolted as fast as you could through the muddy ground.\n\n\t\t\t\t\t\t\t\t\t- Leadership increased\n\t\t\t\t\t\t\t\t\t*set leadership+1\n\n\t\t\t\t\t\t\t\t\tRed paint shells pocked the mud around your feet, and you had to jog from side to side to avoid getting hit.  Diving, you barely made it back to the starting area, winning the day for the blue team!  Your teammates came running and lifted you up, chanting, \"${name}! ${name}!!\"  What a day!\n\n\t\t\t\t\t\t\t\t\t- Glory gained greatly!\n\t\t\t\t\t\t\t\t\t*set infamy %+ guts\n\t\t\t\t\t\t\t\t\t*goto Training_3\n\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t#I opened fire point blank at everyone around me!\n\t\t\t\t\t\t\t\t\tPlumes of blue paint sprayed into the air as you pumped shot after shot into anything and everything around you.  Troopers fell before you.  It didn't matter if they were friends or foes - they fell just the same.  You were like an avenging god of paintball war games, descended to wreak havoc among mere mortals.\n\n\t\t\t\t\t\t\t\t\t- Guts increased\n\t\t\t\t\t\t\t\t\t*set guts+1\n\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\t\t\t\t\t\t\t\t\t*set dark %-20\n\n\t\t\t\t\t\t\t\t\tAt least that's how you saw yourself.  In reality, you looked more like a flailing rabid dog, but it still worked.  You took down several troopers, until your vision suddenly went red and your suit shuddered and shut down.  A readout on your helmet display said that you were hit in the back of the head by a teammate.\n\n\t\t\t\t\t\t\t\t\t- Glory lost...\n\t\t\t\t\t\t\t\t\t*set infamy %-40\n\t\t\t\t\t\t\t\t\t*goto Training_3\n\t\t\t\t\t\t#I stealthily circled around\n\t\t\t\t\t\t\tHunkering down, you moved slowly and silently into some sparse trees to your right.  Using these as cover, you circled to the back of the fighting group.\n\t\t\t\t\t\n\t\t\t\t\t\t\t- Stealth increased\n\t\t\t\t\t\t\t*set stealth+1\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tFrom this point, you could see one red trooper who seemed to be making short work of the rest of your team.  However, his back was to the flag while he fought off your teammates.  What did you do?\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#I leapt out and challenged the trooper to fight!\n\t\t\t\t\t\t\t\t\t*goto littlejohn\n\t\t\t\t\t\t\t\t#I took aim and blasted the trooper!\n\t\t\t\t\t\t\t\t\tHe must not have seen you, because your shot seemed to take him by surprise!  It hit him square in the groin, and dropped him like a sack of dirt.  You could hear his amplified groaning through his helmet's speakers.\n\n\t\t\t\t\t\t\t\t\t- Shooting increased\n\t\t\t\t\t\t\t\t\t*set shooting+1\n\t\t\n\t\t\t\t\t\t\t\t\tWith the rest of your team, you finished off the few remaining blue troopers guarding the flag.  It felt great to win that day, and to see that superior tactics can take out a superior enemy!  \n\t\t\t\t\t\t\t\t\t*goto Training_3\n\t\t\t\t\t\t\t\t#I darted in and took the flag!\n\t\t\t\t\t\t\t\t\t*goto grabngo\n\t\t\t#I dove for cover behind the fallen trooper to my right, firing at the enemy and calling for backup!\n\t\t\t\tBlasting away at the enemy, you could hear muffled grunts from your teammate as he lay there and took blast after blast of paint!  Laughing, you returned fire at the enemy.  \n\t\t\t\t*set shooting+1\n\n\t\t\t\t- Shooting increased\n\n\t\t\t\tThe shooting came to a standstill.  What did you do then?\n\t\t\t\t*choice\n\t\t\t\t\t#I hoisted up the teammate I was hiding behind, and used him as a shield while I advanced\n\t\t\t\t\t\tLifting the guy up and holding him in front of yourself, you yelled and charged forward, letting loose with your shoulder cannon as you ran.  These armor suits really are strong!  You could hear the trooper you were carrying cursing and yelling, but his suit had been deactivated when he was hit, so there was nothing he could do!  The enemy shots rang off his armor as you charged ahead.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tWhen you were only a few steps from the entrenched enemy troops, you hurled your human shield at them, using the confusion to dive to the ground and blast away two enemy troopers.  The rest of your team surged forwards, and you won the day!  Afterwards the commanding officers watching clapped you on the back, and smilingly congratulated you on your creativity and ingenuity.\n\n\t\t\t\t\t\tAfter the battle, the guy you picked up met you in the barracks.  Staring daggers at you, he growled, \"I'll remember this, ${name}...\"  You wonder if he’s ever forgiven you?  If not, who cares?  It was for the good of the team!  And his team won, right?!\n\t\t\t\t\t\t*set guts+1\n\t\t\t\t\t\t*set infamy %+ guts \n\t\t\t\t\t\t*set enemy_trooper \"yes\"\n\t\t\t\t\t\t*set leadership+1\n\n\t\t\t\t\t\t- Leadership increased\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t- Guts increased\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t- Glory increased\n\t\t\t\t\t\t*goto Training_3\n\n\t\t\t\t\t#I radioed in for my team to circle around while I kept the enemy pinned down\n\t\t\t\t\t\tYou fired volley after volley, forcing the enemy troops to keep their heads down.  You even took one enemy trooper out!  But the real excitement was when suddenly, from trees to the enemy's side, a hail of paint cannon blasts ripped into the enemy position.  You took the opportunity to charge forward, and within moments your team had dominated the enemy and captured their flag!\n\t\t\t\t\t\t*set leadership+2\n\t\t\t\t\t\t\n\t\t\t\t\t\t- Leadership increased greatly\n\t\t\t\t\t\t*goto Training_3\n\n\t\t\t\t\t#I tried to remove my fallen teammate's shoulder cannon, to use it as a second weapon\n\t\t\t\t\t\t*if (technical > 10) and (shooting > 10)\n\t\t\t\t\t\t\tLying behind the fallen teammate, you twitched your right hand and a multi-tool flicked out of the wrist.  Quickly, you unscrewed the bolts holding the launcher in place and pulled it out of the suit's housing.  With three quick adjustments inside the launcher’s mechanism, you figured out a way that you can hold the launcher like an awkward rifle.\n\n\t\t\t\t\t\t\tYou took one deep breath, then launched yourself from cover you let loose with your shoulder cannon and the cannon in your arms, blasting enemy after enemy.  Each blast hit its mark, and within moments the battle was done.  A stunned silence followed, broken suddenly by your teammates screaming your name, and rushing forward to grab the enemy’s defenseless flag!  Man, that was a good day!\n\t\t\t\t\t\t\t*set shooting+1\n\t\t\t\t\t\t\t*set technical+1\n\t\t\t\t\t\t\t*set infamy %+ guts \n\n\t\t\t\t\t\t\t- Shooting increased\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t- Technical increased\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t- Glory increased\n\t\t\t\t\t\t\t*goto Training_3\n\n\t\t\t\t\t\t*if (technical > 10) and (shooting \u003c 11)\n\t\t\t\t\t\t\tLying behind the fallen teammate, you twitched your right hand and a multi-tool flicked out of the wrist.  Quickly, you unscrewed the bolts holding the launcher in place and pulled it out of the suit’s housing.  With three quick adjustments inside the launcher’s mechanism, you figured out a way that you could hold the launcher like an awkward rifle.\n\n\t\t\t\t\t\t\tYou took one deep breath, and then launched yourself from cover you let loose with your shoulder cannon and the cannon in your arms, blasting away.  Unfortunately, you were a better mechanic than a marksman, so most of the blasts missed.  They did, however, manage to freak out the enemy team long enough that your teammates could take advantage and come to your aid!\n\n\t\t\t\t\t\t\tIn the end, your creativity turned the tide, but you got taken out.  Still, your team got the enemy flag and won, and you knew that you had a big part in how it all played out!  What a great day!\n\t\t\t\t\t\t\t*set technical+1\n\t\t\t\t\t\t\t*set leadership+1\n\n\t\t\t\t\t\t\t- Leadership increased\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t- Technical increased\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t- Glory increased\n\t\t\t\t\t\t\t*goto Training_3\n\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tLying behind the fallen teammate, you twitched your right hand and a multi-tool flicked out of the wrist.  You quickly removed the bolts holding the shoulder launcher in place, and as you pulled it out of the housing, you were shocked at how many wires and parts there were!  You had no idea these things were this complicated!\n\n\t\t\t\t\t\t\tLaughing, you tried to figure out how the thing worked, when the trooper whose suit you were disassembling called out and asked what in the world you were doing!  Laughing, and still hiding as enemy shots hit the mud around you, you told him your idea.  After a moment, he started to laugh too!\n\n\t\t\t\t\t\t\tSuddenly, your view went red, and you realized that you must have been hit.  Slumping into the mud, you kept laughing.  After the match (you forget who won...), you and that trooper you used for cover, had a drink.\n\t\t\t\t\t\t\t*set guts+1\n\t\t\t\t\t\t\t*set technical+1\n\n\t\t\t\t\t\t\t- Guts increased\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t- Technical increased\n\t\t\t\t\t\t\t*goto Training_3\n\t\t\t\t\t\t\n\n*label Training_3\n*page_break\nCombat and tactics weren't the only training that the Corps had in mind.  The training base's chaplain was a large man with dark hair and a scar running through his right eyebrow.  He taught lessons on what he called \"The Core Ideals of the Empire.\"  They were things such as:\n\nAlways help the innocent\n*line_break\nFight for your fellow soldiers\n*line_break\nNever kill an unarmed foe\n\nThere were many lessons like this one, each meant to encourage you and your fellow recruits to \"walk in the light,\" as the chaplain called it.  \n\n\"And if you truly embrace these ideas,\" the chaplain would say, \"Your self-sacrifice, honor and goodness will be recognized, and you will be honored by the Empire as one of the holy brotherhood known as the Paladins!  Now, of course, these ideals aren't exactly required... and I'm sure some of you have heard of groups out there who disagree with the Empire's moral stance.  But, none the less, we hope you will embrace these ideas!\"\n*page_break\n\nOne day, the chaplain set you up in pairs to discuss what you thought about some of these ideals.  You found yourself paired up with a tall recruit with sandy hair, and a quick grin.\n\n\"My name's John,\" he said, and held out his hand.  What did you do?\n*choice\n\t#Shook his hand firmly\n\t\t\"That's a good grip you've got!\" he said, flashing a smile.  The two of you wandered outside, and found a place to sit and talk in the shade under a large tree.\n\n\t\t*label JohnnyQQ\n\t\t\"So, what's your take on all of this?\" he asked.\n\t\t*choice\n\t\t\t#\"I believe in it!\"\n\t\t\t\t\"Really?\" he says, eyeing you.  Then he flops onto his back, arms under his head, and looks up at the sky.  \"ALL of it?  Doesn't it seem just a little... I don't know... restrictive?  I mean, I joined up to be a soldier, not to... I don't know...\"\n\t\t\n\t\t\t\tWhat do you do?\n\t\t\t\t*choice\n\t\t\t\t\t#Say, \"But these ideals are IMPORTANT!\" and explain the value of values\n\t\t\t\t\t\t*label JohnnyOK\n\t\t\t\t\t\t*if dark > 60\n\t\t\t\t\t\t\tAs you explain your point of view with passion, John starts to nod.  \"You know, I think you're right,\" he says when you're done.  \"We're more than just soldiers.  Were like armed ambassadors!  We really do represent the Empire...  Wow.  That's a lot of responsibility...\"\n\n\t\t\t\t\t\t\tJohn suggests that the two of you grab some dinner.  \n\t\t\t\t\t\t\t*label johnnyjohn\n\t\t\t\t\t\t\tDuring the meal, it looks like you guys are heading towards a good friendship.  Where do you want to push the conversation?\n\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Towards getting away from this guy, and getting back to training!\n\t\t\t\t\t\t\t\t\tYou explain that you have some... underwear to fold... and excuse yourself from dinner.  Dang, that guy was way too friendly!\n\t\t\t\t\t\t\t\t\t*goto Training_F\n\t\t\t\t\t\t\t\t#Towards getting to know him as a friend\n\t\t\t\t\t\t\t\t\tYou and John became fast friends.  John ended up getting assigned to Ajax, the same orbital station you were assigned to!  The two of you still play cards, drink and talk about old times together.  He's definitely your best friend, and it's good to know you have a buddy who's got your back, no matter what.\n\t\t\t\t\t\t\t\t\t*set trooper_john \"friends\"\n\t\t\t\t\t\t\t\t\t*goto Training_F\n\t\t\t\t\t\t\t\t#Towards getting to know him romantically\n\t\t\t\t\t\t\t\t\tFlirting comes naturally to you, and you have some fun flirting with the guy.  He laughs a lot, flashing his huge grin.  What do you do?\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#Play it all off as a joke\n\t\t\t\t\t\t\t\t\t\t\tJohn laughed loudly, and you guys had a great time hanging out.  John ended up getting assigned to Ajax, the same orbital station you were assigned to!  The two of you still play cards, drink and talk about old times together.  He's definitely your best friend, and it's good to know you have a buddy who's got your back, no matter what.\n\t\t\t\t\t\t\t\t\t\t\t*set trooper_john \"friends\"\n\t\t\t\t\t\t\t\t\t\t\t*goto Training_F\n\t\t\t\t\t\t\t\t\t\t#Keep flirting\n\t\t\t\t\t\t\t\t\t\t\tJohn laughed some more, and you guys had a great time hanging out.  You and John grew close over the next few weeks.  You and he would spar together, but then started doing more romantic things together, too:  dinner, looking at the stars, discussing the merits of using tactical mobile armor versus fighter craft or orbital bombardments, long walks and talking about your lives.\n\t\t\n\t\t\t\t\t\t\t\t\t\t\tYour friendship turned to romance, and the days suddenly got easier.  He's back on the orbital station Ajax, the MAC station you just came from.  It'll be good to see him when you get back home!\n\t\t\t\t\t\t\t\t\t\t\t*set trooper_john \"lovers\"\n\t\t\t\t\t\t\t\t\t\t\t*goto Training_F\n\t\t\t\t\t\t\t\t\t\t#String him along, then humiliate him!\n\t\t\t\t\t\t\t\t\t\t\tJohn enjoyed all the attention, and opened up and told you about this time when he was a kid, and how his first crush had told everyone a secret.  Coaxing it out of him, he reveals that the secret was that he wet the bed, and how all the kids called him \"Johnny Pee Pee.\"\n\n\t\t\t\t\t\t\t\t\t\t\tYou console him, but then later that night, you gather a bunch of the other recruits around and tell them the story.  Then, when John was asleep, you snuck up and poured hot water into his bunk.  When he woke up, you flipped on the lights, and everyone called him \"Johnny Pee Pee\" and laughed and laughed!\n\n\t\t\t\t\t\t\t\t\t\t\t*set dark %-20\n\t\t\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t\t\t\t\t\t\t\tYou didn't see John much after that.  You wonder if he still holds a grudge?\n\t\t\t\t\t\t\t\t\t\t\t*goto Training_F\n\t\t\t\t\t\t*elseif dark > 35\n\t\t\t\t\t\t\tYou explain it, but somehow your words just don't have the ring of strong conviction.  John listens to you, but you can tell you aren't being very convincing.  You start to wonder... do you really believe in this stuff?  \n\n\t\t\t\t\t\t\tAfter a while, John seems more conflicted than ever.  \"I don't know,\" he says.  \"And it sounds like you don't, either!  Oh well.  Let's talk about something else...\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tWhat do you want to talk with John about?\n\t\t\t\t\t\t\t*label JohnnyTT\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Nothing.  I leave.\n\t\t\t\t\t\t\t\t\tYou explain that you have some... boots to shine... and excuse yourself.  Dang, that guy was way too friendly!\n\t\t\t\t\t\t\t\t\t*goto Training_F\n\t\t\t\t\t\t\t\t#Firearms training\n\t\t\t\t\t\t\t\t\tJohn talks with you for a while, and the conversation is pretty relaxed.  After a few minutes, it dies down...\n\n\t\t\t\t\t\t\t\t\tAfter an awkward moment, John says, \"Well, I guess I should get back to the barracks.  I have some... toenails to clip...\"\n\t\t\t\t\t\t\t\t\t*goto Training_F\n\t\t\t\t\t\t\t\t#The latest music\n\t\t\t\t\t\t\t\t\tYou talk and talk about your favorite bands, but after a few minutes, you realize that John hasn't really said much.  \"Uh,\" he starts, \"Yeah, I just... I don't know that much about...\" he trails off.  \n\n\t\t\t\t\t\t\t\t\tAfter an awkward moment, John says, \"Well, I guess I should get back to the barracks.  I have some... letters to write...\"\n\t\t\t\t\t\t\t\t\t*goto Training_F\n\t\t\t\t\t\t\t\t#What he did before he joined\n\t\t\t\t\t\t\t\t\tJohn explains that he grew up in the rugged mountains of North America, raising cows with his family.  John talks about how much he misses horseback riding, and his parents.  After a while, he suggests that you guys grab some dinner.\n\t\t\t\t\t\t\t\t\t*goto johnnyjohn\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou start to explain why you think that following these rules is important, but you notice John giving you a funny look.  \"You don't believe this at all!\" John says, and shakes his head.  \n\n\t\t\t\t\t\t\tYou bust out laughing.  He's right - you just don't believe in following these rules, or walking in \"the light.\"  \n\n\t\t\t\t\t\t\tJohn flashes you a grin and the two of you head back to training.  \"I don't know if you and I will ever see eye-to-eye,\" John says, \"But you're a funny guy!\"\n\t\t\t\t\t\t\t*goto Training_F\n\n\t\t\t\t\t#Say, \"Not to what?\"\n\t\t\t\t\t\t\"Not to be some goodie two shoes nice guy!\" he blurts.  \"I joined up to FIGHT!  This stuff is ... it's just ridiculous.  How can they train us to kill, and then expect us to be all gentlemanly at the same time?\"\n\t\t\t\t\t\n\t\t\t\t\t\tWhat do you say?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I explain that these rules ARE stupid\n\t\t\t\t\t\t\t\t*goto JohnnyNO\n\t\t\t\t\t\t\t#I explain why these rules are IMPORTANT\n\t\t\t\t\t\t\t\t*goto JohnnyOK\n\t\t\t\t\t\t\t#I tell him I don't know either...\n\t\t\t\t\t\t\t\t*goto JohnnyBLA\n\t\t\t\t\t#Say, \"Yeah, you're right.\" and explain that these ideas really aren't good\n\t\t\t\t\t\t*goto JohnnyNO\n\t\t\t\t\t#Say, \"Whatever,\" and get up and leave\n\t\t\t\t\t\tAs you walk away, you think about how much easier it is to NOT try and meet new people...\n\t\t\t\t\t\t*goto Training_F\n\t\t\t#\"I really don't know...\"\n\t\t\t\t*label JohnnyBLA\n\t\t\t\t\"So you don't know what you think either, huh?\" John asks.  \"Yeah.  It's tough.  I mean, it's a complicated issue...\"\n\n\t\t\t\tJohn talks for a long time.  By the end of it, however, he doesn't seem any closer to understanding what he believes.  After a while, the conversation starts to lag.\n\n\t\t\t\tWhat do you talk about next?\n\t\t\t\t*goto JohnnyTT\n\t\t\t#\"I think it's garbage\"\n\t\t\t\t*label JohnnyNO\n\t\t\t\tYou launch into a long speech about how ridiculous the rules are.  You explain that morality is only holding people back.  \"If the Empire wants missionaries,\" you explain, \"Then it should send missionaries.  Not try to use killers for the same job.\"\n\n\t\t\t\tJohn listens, and seems to agree.\n\n\t\t\t\tAfter you're done, John sits there a moment, looking at the sky.  \"I think you might be right,\" he eventually says.  \"But I don't like how it feels...\"\n\n\t\t\t\tThe conversation stalls for a bit.  What do you talk about?\n\t\t\t\t*goto JohnnyTT\n\t\t\t\t\n\t#Stood and stared at him, flat eyed\n\t\tAfter a long moment, John says, \"Well, uh, how about we just meet up... later... sometime...\"\n\n\t\tYou stare back.  Time creeps by like sticky globs of amber leaking from a wounded tree.\n\n\t\t\"Yeah,\" John finally says.  \"I'm going to go... take a nap...\"  And he leaves.\n\t\t*goto Training_F\n\t#Gave him a huge hug\n\t\tJohn stiffens under the attack, and mumbles something that sounded like, \"Nice to meet you too.\"  Letting go of him, he tries to give you a grin, but he ends up giving a shallow cough and looking at the ground.\n\n\t\t\"Yeah,\" John says.  \"I just remembered that I need to... talk to the chaplain.  About my...\" and he trails off.  \n\t\t*goto Training_F\n\t#Batted his hand aside, grumbling \"Let's get this over with...\"\n\t\tJohn frowns, and says back sternly, \"What now?\"\n\t\t\n\t\tWhat did you do?\n\t\t*choice\n\t\t\t#I punched him\n\t\t\t\tWith a sudden right hook, you caught him right in the temple.  John's head snapped back, and he went out cold, crumbling to the ground.\n\n\t\t\t\tJust for good measure, you gave him a kick to the stomach.  After all, didn't the chaplain say something about attacking an unarmed enemy?\n\n\t\t\t\t*set dark %- 30\n\t\t\t\t- Darkness grows within you...\n\n\t\t\t\tYou didn't see this John guy much after that.  You wonder if he still holds a grudge?\n\t\t\t\t*goto Training_F\n\t\t\t#I left\n\t\t\t\tTurning, you simply walked away.  Easy as that.\n\t\t\t\t*goto Training_F\n\t\t\t#I played it off as a joke\n\t\t\t\tSmiling big, you laughed and said that you were just kidding.  Still frowning, John smiled back and mumbled, \"Ok...\"\n\t\t\t\t*goto JohnnyQQ\n\n*label Training_F\n\n*page_break\nAfter about a year of training like this, your group of recruits was about a quarter of the size it was when you came in after Basic Training.  Most of the weak had been filtered out.  This was when they started augmenting you.\n\nThe first round of surgeries was general - all marines got the same things.  You hearing got sharper, vision a little better, you could choose to have an adrenaline boost anytime you wanted.  \n\n*page_break\nThe second round was more invasive.  Your bones were strengthened through intentional fracturing, combined with growth hormones and injections.  No matter how many pain killers they used, the experience was excruciating.  One recruit, Martinez, actually went crazy from the pain.  You never saw him again.\n\nYour skin was brutally forced to toughen, your pain threshold was raised, you were exposed to various psychological horrors, and you were even drowned and brought back a couple of times.\n\n*page_break\n\nThe third and final round of augmentation, though, was up to you.  And which upgrade package did you choose?\n*choice\n\t#An advanced cybernetically targeting eye\n\t\tYou remember the shock of waking up after the surgery.  The enhanced colors and detail took a while to get used to! \n\t\t*set shooting+1\n\t\t*set bionic_1 \"Cybernetic Eye\"\n\t\n\t\t- Shooting increased\n\t\t*goto Training_4\n\t\t\n\t#Your spine and arms reinforced for strength\n\t\tSitting on the couch in the forward viewing room of the starship, you flex your back and arms within the armor.  You smile to yourself, confident in your strength.  It feels good to know that you're stronger than any natural man ever could be!\n\t\t*set fighting+1\n\t\t*set bionic_1 \"Reinforced Arms and Spine\"\n\n\t\t- Fighting increased\n\t\t*goto Training_4\n\n\t#Your legs restructured and augmented for greater stealth\n\t\tOnce you got used to these, you couldn't help but sneak up and scare people.  It was almost too easy!\n\t\t*set stealth+1\n\t\t*set bionic_1 \"Augmented Legs\"\n\n\t\t- Stealth increased\n\t\t*goto Training_4\n\n\t#A cybernetic eye that scans and provides technical readouts\n\t\tYou remember waking up and looking around the room, seeing technical date pop up next to the machines!  THAT took some time to get used to!\n\t\t*set technical+1\n\t\t*set bionic_1 \"Cybernetic Eye\"\n\n\t\t- Technical increased\n\t\t*goto Training_4\n\n\t#Extra adrenaline boosters in your chest\n\t\tFor the next few weeks, you had to work through the urge to pump your body too full of adrenaline, and too often!\n\t\t*set guts+1\n\t\t*set bionic_1 \"Adrenaline Boosters\"\n\n\t\t- Guts increased\n\t\t*goto Training_4\n\n\n*label Training_4\n\n*page_break\n\nStaring out into space through the starship Slipdagger's forward viewers, you can hear that the Shock Troopers are ready below.  It's time to go.  You head down towards the launch bay, ready for your first mission.\n\nYour stats for the beginning of this mission are:\n\n*stat_chart\n\ttext Guts\n\ttext Leadership\n\ttext Shooting\n\ttext Fighting\n\ttext Technical\n\ttext Stealth\n\nBionic Implant:  ${bionic_1}\n\n*set bguts guts\n*set bleadership leadership\n*set binfamy infamy\n*set bshooting shooting\n*set bfighting fighting\n*set bstealth stealth\n*set btechnical technical\n\n\n\n\n\n\nWould you like to:\n*choice\n\t#Read a little about how this game works\n\t\tAs you read through the story of your first mission, you'll be given many choices to make.  There are several ways to end the game, and a ridiculous number of combinations, depending on what you choose to do.  It's all up to you!\n\n\t\tIn combat, most of the choices have at least 3 possible outcomes, depending on your stat scores.  Some choices have a LOT more than 3 possibilities, depending on combinations of stats!\n\n\t\tMost of your stats were just set in place as you walked through your memories of training.  Your stats will come in handy when you are doing things that tie into them - for example, if you choose to hide, the game will check and see if your stealth is high enough for the current situation.  Guts is a little different - guts directly influences how much Glory you earn, and there will be choices that you won't be able to pick if you aren't \"gutsy\" enough!  Guts might also be lowered sometimes if you choose a particularly cowardly action, or increased if you push through an extreme situation.\n\n\t\tHere are some stats that will change throughout the mission:\n\n\t\tGLORY - yours is currently at ${infamy} (it started at 20 percent).  Glory is how well you are known and how famous you are.  You can think of it like your score, but you honestly can work towards whatever you want!  As you go through the story, if you always choose things you are good at you'll stay mostly safe and get some glory along the way.  However, choosing things you AREN'T good at can result in heroics, fame and recognition - but you'll probably get hurt!  There's a fine line between being a hero, and being a memory.  Glory also gets harder to gain the higher it gets!\n\n\t\tDARK and LIGHT - You are currently at ${dark} light (you started at 50 light, 50 dark).  Light and dark go up and down depending on the choices you make.  Light and Dark aren't exactly matches for \"good\" and \"evil\", but more represent your preference to either operate selfishly or selflessly, whether you're willing to take the honorable route or whether you don't care about following the rules.  Making Dark choices doesn't mean that you are doing anything against your orders or the Empire - it's more about your own leanings, and what's important to you.  Following the easy, selfish or destructive path can sometimes make the darkness grow within you, but following the light is often costly in other ways.  Both light and dark are harder to increase the closer they get to 100.\n\n\t\tMORALE - you will be commanding a group of shock troopers, and depending on your leadership, their morale will go up or down, meaning they will be more or less likely to do well, or to run away at a critical moment.  Their morale starts at 50 percent, and it is easier to lose the higher it gets!\n\t\n\t\tARMOR - your armor starts out at a certain percent efficiency, depending on which style you choose (you'll choose your Armor in the next scene).  As you take damage, it will drop lower and lower.  If your armor drops below 1 percent, your Temporal Tether will activate, jumping you back to the beginning of chapter 1, and resetting everything except your light and dark stats.\n\n\t\tThe reason you joined the Mobile Armored Corps was for ${reason_to_join}, and there IS a way to fulfill that purpose in the game!  Have fun!\n\n\t\t*finish_advertisement\n\t\t\n\t#Start the mission - Chapter 1\n\t\t*finish_advertisement\n"}};
