to ${armor} percent!\n\n\t\t\t\tYou get back up, still firing.  It's as though you're watching yourself from outside your body.  You see lizard after lizard fall.  Then, just as suddenly as it started, you realize it's over.  The room is cleared.  You did it. \n\t\t\t\t*set infamy %+ (guts + (guts + (guts + guts)))\n\n\t\t\t\t- Glory increased \n\n\t\t\t\t*if troopcount > 0\n\t\t\t\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll tell them that you will deal with this trapdoor alone.\n\t\t\t\t\t*goto trapdoor\n\t\t\t\t*else\n\t\t\t\t\t*goto trapdoor\n\t\t*else\n\t\t\tIt's tough to go on.  You blast your system with adrenaline, but it's so hard to keep going.  You slow, and a lizard blasts you right in the chest.  You crumple to your knees.\n\t\t\t*set armor-8\n\t\t\t*if armor \u003c 1\n\t\t\t\t*goto_scene Combat_Death\n\t\t\t*else\n\t\t\t\t*page_break\n\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\tYou can hear the servos in your armor whine as you force yourself to stand back up.  Gripping your pistol, you take aim and fire, again and again.\n\t\t\t\t*if shooting > 10\n\n\t\t\t\t\tThe whole scene seems to move slowly, as in a dream.  Then, just as suddenly as it started, you realize it's over.  The room is cleared.  You did it.\n\n\t\t\t\t\t*set infamy %+ (guts + (guts + guts))\n\t\t\t\t\t- Glory increased \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t*if troopcount > 0\n\t\t\t\t\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll tell them that you will deal with this trapdoor alone.\n\t\t\t\t\t\t*goto trapdoor\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto trapdoor\t\n\t\t\t\t*else\n\t\t\t\t\tLizards die, but you can feel yourself slipping.  Many of your shots go wide, and you start firing wildly.\n\n\t\t\t\t\tAfter long moments, one of the enemy's blaster shots hits home, tearing into your shoulder and sending you sprawling in the dust and debris.\n\t\t\t\t\t*set armor-4\n\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t*else\n\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\tWhat do you do?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Retreat!\n\t\t\t\t\t\t\t\t*set enemy \"weakened\"\n\t\t\t\t\t\t\t\tYou fall back, almost mechanically, managing to avoid taking any more damage.  Once outside the room, you take a moment to rest.  The few lizards that are left don't seem interested in following you.\n\n\t\t\t\t\t\t\t\tYou blast your system with another dose of adrenaline, and head back in, rested and refreshed!\n\t\t\t\t\t\t\t\t*goto attack_alone\n\n\t\t\t\t\t\t\t#Keep Fighting!\n\t\t\t\t\t\t\t\tYou immediately take a blaster cannon shot to the side.  One of the lizards must have snuck around.\n\t\t\t\t\t\t\t\t*set armor-5\n\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*page_break\t\t\n\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\t\tYou turn, and even though you are horribly exhausted, you hit the lizard that hit you.  But your aim is horrible now, and you only injure it, taking off an arm.  The creature howls and hisses in pain.\n\n\t\t\t\t\t\t\t\t\tThis distracts the other lizards long enough though, for you to regain some of your composure.  What are you going to do now?\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#Hurl all of the grenades I have at the monsters.\n\t\t\t\t\t\t\t\t\t\t\t*goto boomshakalaka\n\t\t\t\t\t\t\t\t\t\t#Keep fighting!\n\t\t\t\t\t\t\t\t\t\t\tYou hurl one grenade, and pop up with your cannon ready.  Your blaster is starting to overheat, and your shoulder cannon is actually running low on rockets!  The air is filled with fiery death, and you take your share.  Wincing through the impacts on your Armor, you keep firing again and again.  Even so, your Armor's warning lights flash as hit after hit strikes home, knocking you back.\n\t\t\t\t\t\t\t\t\t\t\t*set armor-13\n\t\t\t\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\t\t\t\t\tYou stand your ground, shaking, over heated weapon barrels glowing and smoking.  It's over.  The lizards are dead.\n\t\t\t\t\t\t\t\t\t\t\t\t*set infamy %+ (guts + (guts + (guts + guts)))\n\t\t\t\t\t\t\t\t\t\t\t\t- Glory increased GREATLY!\n\n\t\t\t\t\t\t\t\t\t\t\t\t*if troopcount > 0\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll tell them that you will deal with this trapdoor alone.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto trapdoor\n\t\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto trapdoor\t\n\n*label southside\n*page_break\nAs you and the ${troopcount} Shock Troopers enter the machine works on the south side of the power station, you see that it's guarded by 15 or 20 of the lizard creatures.  They seem to be guarding a trap door set into the ground, and they look set up and ready for your attack.  What's your plan?\n\n*label comeagain\n*choice\n\t#I have the troops set up for a long firefight, and trust to the soldier's courage and my leadership to see us through!\n\t\tYou get yourself and your soldiers in place, and open fire.  The lizards shoot back with their large blaster cannons, and the room is quickly filled with smoke and debris as shots rip holes in the walls.\n\t\t*if troopcount = 24\n\n\t\t\tWith the full squad of Shock Troopers in place, they set up a devastating crossfire.  This is what they were trained to do.  And with your leadership and encouragement, it's not long before all of the lizards have been cut to pieces.  \n\n\t\t\tThe troopers cheer your name!\n\t\t\t*set infamy %+70\n\t\t\t*set morale %+50\n\n\t\t\t- Glory increased greatly\n\t\t\t*line_break\n\t\t\t- Morale grows\n\n\t\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll deal with this trapdoor alone.\n\t\t\t*goto trapdoor\n\t\t\n\t\t*else\n\t\t\tYou get yourself and your soldiers in place, and open fire.  The lizards shoot back with their large blaster cannons, and the room is quickly filled with smoke and debris as shots rip holes in the walls.\n\t\n\t\t\tThree soldiers go down immediately. \n\t\t\t*set troopcount-3\n\t\t\t*if troopcount \u003c 1\n\t\t\t\tWith all of the Shock Troopers down, you take on the lizards alone.\n\t\t\t\t*goto shooting_alone\n\t\t\t*else\n\t\t\t\t*set morale %-15\n\n\t\t\t\t- Morale lost... \n\t\t\t\t*goto combatloop\n\t#I launch myself into the room to take the beasts on alone!\n\t\tLike a hero of legend, you blast into the room alone, facing the overwhelming odds.  Three lizards fall before the rest seem to believe what's happening.  But then you begin to take fire.  One green bolt of energy takes you square in the side, and you're hurled into the ground, spinning.\n\t\t*set armor-12\n\t\t*if armor \u003c 1\n\t\t\t*goto_scene Combat_Death\n\t\t*else\n\t\t\t*page_break\t\t\n\t\t\t- Armor damaged, down to ${armor} percent!\n\n\n\t\t\t*set infamy %+ (guts + (guts + guts))\n\t\t\t- Glory increased \t\n\n\t\t\tYou use the spinning action to launch yourself into a group of lizards, arms wide.  The universe seems to slow, and all you see is the gentle spray of yellow lizard blood.  Several more creatures are killed, when you take a machette blow to the back, followed by another across your helmet!\n\t\t\t*set armor-14\n\t\t\t*if armor \u003c 1\n\t\t\t\t*goto_scene Combat_Death\n\t\t\t*else\n\t\t\t\t*page_break\t\t\n\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\n\t\t\t\t*set infamy %+ (guts + (guts + (guts + guts)))\n\t\t\t\t- Glory increased GREATLY\n\n\t\t\t\tWith a blast from your boosters, you hurl yourself free and spin in the air, laying waste to the beasts around you with your blaster pistol.  Landing in a cloud of steam and smoke, you realize that you've singlehandedly killed them all!\n\n\t\t\t\tYou catch your breath for a moment, and then look around.  You find the trap door that they were guarding.\n\n\t\t\t\tYou order the ${troopcount} troopers you have left to secure the area, and to link back up with the dropship.  You'll deal with this trapdoor alone.\n\t\t\t\t*goto trapdoor\n\t\n\t#I fire everything I've got into the room, leveling the place!\n\t\tWith one fluid motion, you step around the corner and swing your arms high, letting loose a hail of grenades.  Before they can even fall, however, your shoulder cannon begins firing.\n\n\t\tIn training, you were told that wearing a suit of Tactical Powered Armor was like becoming a living a tank.  In reality, it's like becoming a god of war, ascending from hell to punish the enemies of humanity...\n\n\t\tAfter a moment of silently blinding white light, your audio receptors kick back in.  You see the walls give, the ceiling collapse, and the entire southern side of the complex fall to rubble.\n\t\t*if building=\"ruined\"\n\t\t\t*goto chugga\n\t\t*else\n\t\t\tA rippling cascade of explosions rocks the entire complex, and sparking lighting arcs from wall to wall.  The whole complex seems ruined.\n\t\t\t*set building \"ruined\"\n\t\t\t*goto chugga\n\n\t#I scream and run!\n\t\t*set infamy %-40\n\t\t*set morale %-20\n\n\t\t- Glory lost...\n\t\t*line_break\n\t\t- Morale lost...\n\n\t\tThe troopers fall back with you, and look at your with undisguised scorn.  Slowly, you pull yourself together, and realize that you MUST face this enemy. So, what will you do?\n\t\t*goto comeagain\n\t\t\t\n*label combatloop\n\nNow what do you do?\n*choice\n\t#Keep at it - we're winning!\n\t\tYou rip into the enemy, but take several casualties.  One good push will do it, but you don't know if you have enough troops to make it work!\n\n\t\t*set troopcount-2\n\t\t*if troopcount \u003c 1\n\t\t\tTwo quick explosions hit your line, and suddenly you are alone.  All of the troopers have fallen.  With all of the Shock Troopers down, you take on the lizards alone.\n\t\t\t*goto shooting_alone\t\n\t\t*else\n\t\t\tTwo more troopers get taken out, but several lizards die as well.  You have ${troopcount} troops remaining.  What are your orders?\n\t\t\t*choice\n\t\t\t\t#Keep shooting!  Hold the line!\n\t\t\t\t\t*set troopcount-2\n\t\t\t\t\t*if troopcount \u003c 1\n\t\t\t\t\t\tAn explosion rocks your line, and suddenly you are alone.  All of the troopers have fallen.  With all of the Shock Troopers down, you take on the lizards alone.\n\t\t\t\t\t\t*goto shooting_alone\n\t\t\t\t\t*else\n\t\t\t\t\t\tTwo more troopers fall to enemy fire!\n\t\t\t\t\t\t*set morale %-20\n\n\t\t\t\t\t\t- Morale lost...\n\n\t\t\t\t\t\t*if morale > 50\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\tThe ${troopcount} troops you have left push through, firing shot after shot, and finally the last lizard falls dead.  Exhausted, you and the troops you have left stand slowly.\n\n\t\t\t\t\t\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll tell them that you will deal with this trapdoor alone.\n\t\t\t\t\t\t\t*goto trapdoor\n\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYour line breaks, and the ${troopcount} soldiers you have left start to try and run away!  What do you do?\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#I blast one in the back, and tell the rest to stay and fight or I'll kill them too!\n\t\t\t\t\t\t\t\t\tTaking aim, you drill one of the Shock Troopers in the back.\n\t\t\t\t\t\t\t\t\t*set troopcount-1\n\t\t\t\t\t\t\t\t\t*if troopcount \u003c 1\n\t\t\t\t\t\t\t\t\t\tThat... was the last soldier you had.  Even so, it DID feel good to execute him for failure...\n\t\t\t\t\t\t\t\t\t\t*set dark %-53\n\t\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\t\t\t\t\t\t\t\t\t\tYou turn to take on the somewhat confused Saurians alone.\n\t\t\t\t\t\t\t\t\t\t*goto shooting_alone\n\t\t\t\t\t\t\t\t\t*elseif troopcount = 1\n\t\t\t\t\t\t\t\t\t\tThe one trooper you have left looks at you, eyes wide with terror.  Slowly, he sinks back into his position, and fights with renewed vigor.  Weird how things like this can work!\n\t\t\t\t\t\t\t\t\t\t*set dark %-50\n\t\t\t\t\t\t\t\t\t\t*set morale %+50\n\t\t\t\t\t\t\t\t\t\t*set infamy %-50\n\n\t\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t- Glory lost...\n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t- Morale grows\n\n\t\t\t\t\t\t\t\t\t\t*goto combatloop\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\tThe remaining ${troopcount} troopers stop and look back at you, terrified looks twisting their faces.  Slowly, they sink back into their positions, and fight with renewed vigor.  Weird how things like this can work!\n\t\t\t\t\t\t\t\t\t\t*set dark %-50\n\t\t\t\t\t\t\t\t\t\t*set morale %+50\n\t\t\t\t\t\t\t\t\t\t*set infamy %-50\n\n\t\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t- Glory lost...\n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t- Morale grows\n\n\t\t\t\t\t\t\t\t\t\t*goto combatloop\n\n\t\t\t\t\t\t\t\t#I try to rally them to keep fighting!\n\t\t\t\t\t\t\t\t\tCalling out to the troops, you try to get them to take heart, and fight on!\n\t\t\t\t\t\t\t\t\t*set morale %+ (leadership + (leadership + (leadership + leadership)))\n\n\t\t\t\t\t\t\t\t\t- Morale grows, depending on leadership\n\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t*if morale > 40\t\n\t\t\t\t\t\t\t\t\t\tAnd it works!  The soldiers take heart, and come back to their posts!\n\t\t\t\t\t\t\t\t\t\t*goto combatloop\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\tThe troops ignore you, and try to run.  Most get cut down by enemy fire - it's hard to tell if anyone made it out alive.  But either way, you're alone now.\n\t\t\t\t\t\t\t\t\t\t*set troopcount 0\n\t\t\t\t\t\t\t\t\t\t*goto shooting_alone\n\n\t\t\t\t\t\t\t\t#I let them go - who needs them?!\n\t\t\t\t\t\t\t\t\tAs the soldiers try to run, you see most of them get cut down by enemy fire.  It's hard to tell if any made it out of the room safely.  \n\n\t\t\t\t\t\t\t\t\tNot that you mind - you're better on your own, anyway.\n\t\t\t\t\t\t\t\t\t*set troopcount 0\n\t\t\t\t\t\t\t\t\t*set dark %-33\n\n\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t\t\t\t\t\t*goto shooting_alone\n\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t#Fall back!\n\t\t\t\t\t*goto comeagain\n\t\t\t\t#Hold the line, I'm going in alone!\n\t\t\t\t\t*goto shooting_alone\n\t\n\t#Fall back out of the room, and re-think what we're doing.\n\t\t*set infamy %-40\n\t\t*set morale %+20\n\n\t\t- Glory lost...\n\t\t*line_break\n\t\t- Morale increased\n\t\t*goto comeagain\n\t\t\t\t\t\n\t#I go in alone, and tell the Shock Troopers to not interfere\n\t\tYou order the ${troopcount} troopers you have left to report back up to the dropship.  You'll deal with this alone.\n\n\t\t- Light increased\n\t\t*line_break\n\t\t- Glory increased\n\t\t*set infamy %+ guts\n\t\t*set dark %+40\n\t\t*goto shooting_alone\n\t#I order all the troops to throw every grenade they have, and I do the same!\n\t\tYou have about two dozen grenades left, and each trooper has a couple.  Priming each of them in turn, you string them together and hurl them into the room!\n\n\t\tThe explosion is devastating.  The walls give, the ceiling collapses, and the entire southern side of the complex lies in ruins.\n\t\t*if building=\"ruined\"\n\t\t\t*goto chugga\n\t\t*else\n\t\t\tA rippling cascade of explosions rocks the entire complex, and sparking lighting arcs from wall to wall.  The whole complex seems ruined.\n\t\t\t*set building \"ruined\"\n\t\t\t*label chugga\n\t\t\tDigging through the rubble, debris, and remains of lizard aliens, you find the trap door that they were guarding.\n\t\t\t*set building \"ruined\"\n\t\t\t*set infamy %+ (guts + guts)\n\n\t\t\t- Glory increased\n\n\t\t\tYou order the ${troopcount} troopers you have left to secure the area, and to link back up with the dropship.  You'll deal with this trapdoor alone.\n\t\t\t*goto trapdoor\n\n\n*label balto\n*if troopcount \u003c 1\n\t\tWith all of the troopers dead, you set out to search the complex on your own.  You find a a conference room and several machine shops, but they are all dark and silent.\n\n\t\t*label buck\n\t\tYou send out a scanner sweep, and catch something faint up ahead.  You head forward, pistol ready.  As you turn a corner, you feel something slam into you.  Looking down you see a silvered machete jutting from your Armor's groin!  Crouching to the side of the hallway is a Saurian wearing another one of those lightly armored suits.  It hisses menacingly. \n\n\t\t*set armor-13\n\t\t*if armor \u003c 1\n\t\t\t*goto_scene Combat_Death\n\t\t*else\n\t\t\t*page_break\t\t\n\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\tFurious, you glance down at the machete wedged in your groin armor, then look back at the lizard standing in front of you.  It looks confused, and a little nervous.  You backhand it across the face, sending it crashing against the wall.\n\n\t\t\tThe armored Saurian gets back to its feet and spins, trying to gash you with its spiked tail.  You side step, and blast the creature twice with your pistol.  The lizard's smoldering body falls, dead.\n\n\t\t\tWrenching the machete out of your armor, you toss it loudly to the concrete floor.\n\t\t\t*page_break\n\t\t\tWhen you come near the south side of the complex, your scanners pick up a large room with activity.\n\t\t\t*goto battle_alone\n\n*elseif troopcount = 1\n\t\tYou have only one Shock Trooper left, so you send him back to the dropship.  Then you set out to search the complex on your own.  You find a couple of storage rooms and a cafeteria, all silent and empty.\n\t\t*goto buck\n\n*else\n\t\tYou have only two Shock Troopers left, so you send them both back to the dropship.  Then you set out to search the complex on your own.  You find a couple of storage rooms and a cafeteria, all silent and empty.\n\t\t*goto buck\n\n*label trapdoor\n*finish_advertisement\n\n", "mission_1_trapdoor": "With the room smoldering behind you, you step up and look at the trap door.  It's a large metal door set into some kind of reinforced mounting.  There's a heavy handle on one side of the door with a small keypad beside it.  You grip the handle and pull.  It's locked.\n\n*set Eleanor \"no\"\n*label trapdoor2\nLooking down at the trap door, what would you like to do?\n*choice\n\n\t*selectable_if (code = \"yes\") #I type in the code.\n\t\tYou key in 767, and the door pops open.\n\t\t*goto openeddoor\n\t#I check my Oracle to see if it has any useful info.\n\t\tYou look through all of the info that you have on this station, but there's nothing about this hidden door.  Scanning it, you see that it's very thick, and would take a massive detonation to destroy it.  The Oracle warns that such a detonation would likely disable the power station.  What do you want to try next?\n\t\t*goto trapdoor2\n\n\t#I try and get it open by hacking the control panel.\n\t\t*if code = \"yes\"\n\t\t\tYou don't even need to hack - you key in 767, and the door pops open.\n\t\t\t*goto openeddoor\n\t\t*else\n\t\t\tYou snap out your wrist multi-tool, and get to work at hacking the doors control panel.\n\t\t\t*if technical > 12\n\t\t\t\tIt takes you a while, but you've dealt with machines more complicated than this.  After a couple of minutes, the trap door springs open.\n\t\t\t\t*goto openeddoor\n\t\t\t*else\n\t\t\t\tThis mechanism is too complicated for your skill level.  It won't budge.  So, what do you want to try next?\n\t\t\t\t*goto trapdoor2\n\t\t\n\t#I blast it open.\n\t\tYou blast the door a few times with your pistol, but don't even scratch it.  So you back up, take aim with your shoulder rocket and fire, careful not to hit any of the machinery in the room.  When the smoke clears, you can see that the door is still there, strong as ever.  This must be made from some pretty tough material!\n\t\n\t\tSo, what would you like to try next?\n\t\t*choice\n\t\t\t#I'll stack a massive amount of explosives and grenades on the door, and blast this whole area into next week!\n\t\t\t\t*set building \"ruined\"\n\t\t\t\tThe explosion rocks the power station, destroys the machinery that was in the room, and causes two of the walls to collapse.  Through a hole in the wall you see lighting arc between two tall towers made of pipes and covered in wires.  One of the towers explodes and collapses.  Digging through the debris, you find that it worked!  The door has been blasted open!\n\t\t\t\t*goto openeddoor\n\t\t\t#I'll need to re-think this a bit.\n\t\t\t\tThere's a good chance you could wreck some of the station's equipment that way.  Thinking about it, you still can only think of these three options...\n\t\t\t\t*goto trapdoor2\n\t#I search the complex for some clue, some key, to what's inside.  I can always come back.\n\t\tGood plan.  There must be some clue.  You've searched this area, but where to look next?\n\n\t\t*goto searching\n\n*label searching\n\nWhat area of the power station would you like to head towards?\n*choice\n\t#South\n\t\t*goto trapdoor2\n\n\t*if north != \"done\"\n\t\t#North\n\t\t\t*set north \"done\"\n\t\t\tScrounging through the north end of the complex, you start to think that you aren't going to find anything of use when you stumble across a machine shop.  Looking around, you think you could use some of these parts to patch up your Armor!\n\n\t\t\tAs you walk around the shop, you hear something clang in the back.  Raising your pistol, you demand that whoever is there come out with their hands up.\n\n\t\t\tA lone lizard creature steps forward, unarmed and hands raised in surrender.\n\t\t\t*label littleun\n\n\t\t\tWould do you do?\n\t\t\t*choice\n\t\t\t\t#I blast it.\n\t\t\t\t\tWith one quick pull of the trigger, the reptile's yellow blood spatters the walls and the problem is solved.  One less enemy to deal with.  Who cares that it had already surrendered?\n\n\t\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t\t*set dark %-40\n\t\t\t\t\t*goto repairx\n\n\t\t\t\t#I take it prisoner.\n\t\t\t\t\t*if leadership > 10\n\t\t\t\t\t\tYour commanding tone gets the lizard's attention.  It crouches low, and makes a whining, mewling sound.  \n\t\t\t\t\t\t*if troopcount > 1\n\t\t\t\t\t\t\tYou call in to get a couple of troopers to come with restraints, and take custody of the thing.  They haul it off, back to the dropship.\n\t\t\t\t\t\t\t*set lizard \"yes\"\n\t\t\t\t\t\t\t*goto repairx\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou realize that you don't have enough troopers left alive to help you haul this thing back to the dropship.  You don't have any restraints handy, so what do you want to do?\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Shoot it\n\t\t\t\t\t\t\t\t\t*goto lizbiz1\n\t\t\t\t\t\t\t\t#Let it go\n\t\t\t\t\t\t\t\t\t*goto lizbiz2\n\t\t\t\t\t\t\t\t#Grab it, and haul it back to the dropship yourself\n\t\t\t\t\t\t\t\t\tYou grip it by the arm, and start to pull it towards the door.  It immediately lashes out at your with its spiked tail, slashing across your back!\n\t\t\t\t\t\t\t\t\t*set armor-3\n\t\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent\n\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\tWhat do you do?\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Kill it, this is annoying!\n\t\t\t\t\t\t\t\t\t\t\t\tYou lift it into the air by its arm, and then backhand smash it into a nearby wall, splattering yellow blood and ichor across the room.  You toss the lifeless corpse to the side.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*goto repairx\n\t\t\t\t\t\t\t\t\t\t\t#Carry it back to the ship\n\t\t\t\t\t\t\t\t\t\t\t\tYou holster your pistol, and haul the squirming, squawking creature through the complex.  It lashes out at you a few more times, giving your armor minor gashes, but for the most part you keep it controlled, and it doesn't do any major damage.\n\t\t\t\t\t\t\t\t\t\t\t\t*set lizard \"yes\"\n\n\t\t\t\t\t\t\t\t\t\t\t\tAfter securing the creature on the dropship, you retrace your steps back to the machine shop.\n\n\t\t\t\t\t\t\t\t\t\t\t\t*goto repairx\n\t\t\t\t\t\t\t\t\t\t\t#Break its arms and legs, and THEN carry it back to the ship\n\t\t\t\t\t\t\t\t\t\t\t\tCalmly, you tighten your grip on the arm you're holding.  It snaps immediately, and the lizard lets out a high pitched shriek of pain.  You casually holster your pistol, and with your other armored hand, you simply crush the other arm as well.  The lizard's tail lashes wildly, and you catch it, and break it as well.  The alligator faced alien goes limp, whimpering and twitching, making it easy to snap both legs as well.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t_ Darkness grows within you...\n\n\t\t\t\t\t\t\t\t\t\t\t\t*set dark%-50\n\t\t\t\t\t\t\t\t\t\t\t\tThe lizard is a whimpering, twitching mess when you get it to the dropship.  Thick yellow liquid seems to be congealed around its gaping toothy maw.  As you strap it in, you notice that its eyes are glassy, but it's still twitching.  Giving it a quick scan with your Oracle, you see that it is indeed dead.  The twitching must be similar to how a snake's body twitches after its dead.  You leave the corpse in the dropship - maybe someone will want to see it?\n\n\t\t\t\t\t\t\t\t\t\t\t\t*goto searching \n\t\t\t\t\t\t\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou order the creature to surrender, but you just don't have a very commanding tone!  It hisses and glares at you.  Or maybe that's just how these thing's faces look.  For all you know, it could be smiling...\n\t\t\t\t\t\t*goto littleun\n\t\n\n\t\t\t\t#I speak to it softly.\n\t\t\t\t\tIt cocks its head to one side and stares at you, tongue flicking in and out of its large toothy alligator mouth.  It doesn't respond.  What do you do?\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I blast it - the thing is useless.\n\t\t\t\t\t\t\t*label lizbiz1\n\t\t\t\t\t\t\tWith one quick pull of the trigger, the reptile's yellow blood spatters the walls, your chest and your faceplate.  Problem solved.  One less enemy to deal with.  Who cares that it had already surrendered?\n\n\t\t\t\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t\t\t\t*set dark %-40\n\t\t\t\t\t\t\t*goto repairx\n\n\t\t\t\t\t\t#I grab it by the throat, and interrogate it roughly. \n\t\t\t\t\t\t\tYou lift if off the floor, shove the barrel of your pistol in its jaws, and command it to talk.\n\n\t\t\t\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t\t\t\t*set dark %-20\n\t\t\t\t\t\t\tIt hisses and thrashes around, and starts to claw at your armor.  Then, suddenly, it whips its tail around and catches you in back with its tail spikes!  Apparently, these creatures are never truly unarmed...  \n\n\t\t\t\t\t\t\t*set armor-3\n\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\tAll it takes is a squeeze, and you crush the lizard's throat.  It goes limp in your hand.  You toss the lifeless corpse to the side.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto repairx\n\n\t\t\t\t\t\t#I wave my pistol at the door, and tell it to get out of here.\n\t\t\t\t\t\t\t*label lizbiz2\n\t\t\t\t\t\t\tIt gives a hissing bark, and scampers out of the room.\n\t\n\t\t\t\t\t\t\t- Light increased\n\t\t\t\t\t\t\t*set dark %+50\n\n\t\t\t\t\t\t\tAs you turn back to look at what the machine shop offers, you hear something behind you.  Turning, you see the lizard you set free has come back, and is pointing blaster cannon at you.  With a curse, you try to raise your pistol, but get caught in the chest with a massive blast that knocks you across the machine shop, slamming you through several work tables and into the far wall.\n\t\t\t\t\t\t\t*set armor-15\n\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\tThe lizard fires off a couple more shots, blasts sending tools and machine parts flying, but you roll to the side.\n\n\t\t\t\t\t\t\t\tScrambling back to your feet, you dive to the side to avoid another blast, and fire off a rocket of your own.  Your missile blasts the creature, sending what's left of it spraying across the room.\n\n\t\t\t\t\t\t\t\tYou stand up, sighing, and wipe concrete dust and debris off of your suit.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*label repairx\n\t\t\t\t\t\t\t\tTurning to the tables of parts and tools, do you want to spend some time repairing your Armor?\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Absolutely!\n\t\t\t\t\t\t\t\t\t\tWith your trusty wrist multi-tool, you get to work. \n\t\t\t\t\t\t\t\t\t\t*if omega = \"Omega\"\n\t\t\t\t\t\t\t\t\t\t\t*set armor + technical\n\t\t\t\t\t\t\t\t\t\t\t*if armor > 50\n\t\t\t\t\t\t\t\t\t\t\t\t*set armor 50\n\t\t\t\t\t\t\t\t\t\t\t\t*goto fixeroo\n\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t*goto fixeroo\n\t\t\t\t\t\t\t\t\t\t*elseif omega = \"Beta\"\n\t\t\t\t\t\t\t\t\t\t\t*set armor + technical\n\t\t\t\t\t\t\t\t\t\t\t*if armor > 60\n\t\t\t\t\t\t\t\t\t\t\t\t*set armor 60\n\t\t\t\t\t\t\t\t\t\t\t\t*goto fixeroo\n\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t*goto fixeroo\n\t\t\t\t\t\t\t\t\t\t*elseif omega = \"Gama\"\n\t\t\t\t\t\t\t\t\t\t\t*set armor + technical\n\t\t\t\t\t\t\t\t\t\t\t*if armor > 80\n\t\t\t\t\t\t\t\t\t\t\t\t*set armor 80\n\t\t\t\t\t\t\t\t\t\t\t\t*goto fixeroo\n\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t*goto fixeroo\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*set armor + technical\n\t\t\t\t\t\t\t\t\t\t\t*if armor > 100\n\t\t\t\t\t\t\t\t\t\t\t\t*set armor 100\n\t\t\t\t\t\t\t\t\t\t\t\t*goto fixeroo\n\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t*label fixeroo\n\n\t\t\t\t\t\t\t\t\t\t\t\tAfter about half an hour, you managed to increase your Armor's effectiveness to ${armor} percent!\n\t\t\t\t\t\t\t\t\t\t\t\t*goto searching\n\n\t\t\t\t\t\t\t\t\t#No time!  I need to keep looking - people are depending on me!\n\t\t\t\t\t\t\t\t\t\tExcellent point - it looks like the primary damage is over, and you need to find out what happened to the colonists!  Repairs can wait.\n\n\t\t\t\t\t\t\t\t\t\t*set dark %+33\n\t\t\t\t\t\t\t\t\t\t- Light increased\n\t\t\t\n\t\t\t\t\t\t\t\t\t\t*goto searching\n\n\t*if east != \"done\"\n\t\t#East\n\t\t\t*set east \"done\"\n\t\t\tLooking through what seem like an endless supply of offices and conference rooms, you stumble across something.\n\n\t\t\tIn a room with a large table, there stands a chart with information about an upcoming exclusive deal with a company known as Lacertians.  Looking more, you find presentation notes that explain that, with leaving the Empire, Lacertians will help supply Far Hope with everything it needs, in exchange for...\n\n\t\t\tPeople.\n\n\t\t\tThere's no mistaking what the chart says.  Looking around the room, you don't find any more clues about what this means.  It COULD be something as simple as Lacertians wanting to hire more workers, but somehow you don't think so.\n\t\t\t*page_break\n\t\t\tYour Oracle picks up a heat signature.  The Oracle suggests that it's likely one of the Saurian aliens in another one of those environmental suits.  \n\n\t\t\tYou track the signal down and find a lone lizard.  It looks like it's making repairs or adjustments on some kind of small star craft.\n\n\t\t\tIt hears you, spins and squawks out some gibberish.  What do you do?\n\t\t\t*choice\n\t\t\t\t#I blast the sucker with a rocket.\n\t\t\t\t\tYou launch a rocket from your shoulder, and it explodes in mid-air, repelled by an invisible shield.\n\n\t\t\t\t\t*label fightingship\n\t\t\t\t\tThe lizard leaps inside the star craft, and the ship opens fire, blasting apart walls, the floor, everything.\n\n\t\t\t\t\tA blast catches you right in the chest, knocking you tumbling through several walls.\n\n\t\t\t\t\t*set armor-14\n\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t*else\n\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\tWhat do you do now?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I fire a massive barrage of rockets and blaster fire.\n\t\t\t\t\t\t\t\tYou fire volley after volley at the ship, while it hovers and blasts the building apart.  Using your suit's boosters, you strafe to the left, hurling your entire pack of grenades at the ship.\n\n\t\t\t\t\t\t\t\tThe explosion rips out a huge section of offices, and blasts out a large section of the wall.  As the dust clears, the alien craft lies half buried in the debris, broken open.\n\t\t\t\t\t\t\t\t*set infamy %+ guts\n\n\t\t\t\t\t\t\t\t- Glory increased\n\t\t\t\t\t\t\t\t*goto downed\n\n\t\t\t\t\t\t\t#I call in to the Slipdagger for support.\n\t\t\t\t\t\t\t\t*label Slipdagger\n\t\t\t\t\t\t\t\tTaking cover behind a wall, you call the Slipdagger, and ask for some fire support.\n\n\t\t\t\t\t\t\t\t\"Roger that, sir,\" replies the captain.  \"Would you like an orbital bombardment, or would you like us to engage the ship as it tries to leave orbit?\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tWhat do you say?\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Orbital bombardment!\n\t\t\t\t\t\t\t\t\t\t\"Yes sir,\" the captain replies.  \"Firing in 3, 2, 1...\"\n\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tA lance of blue iridescent flame strikes down from the sky like the hammer of God.\n\n\t\t\t\t\t\t\t\t\t\tEverything goes silent and black as your Armor's audio and video feeds cut out to protect you from the explosion.  You feel yourself hurled back end over end, tossed like a ragdoll.\n\t\t\t\t\t\t\t\t\t\t*set armor-14\n\t\t\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t\t\tYou were too close to the blast!\n\t\t\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t\t\t\t*else\n\n\t\t\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\t\t\t\tAs the dust settles, and you regain your feet, you see a crater where the whole eastern side of the complex once stood.  Electricity arcs erratically among the ruins.\n\t\t\t\t\t\t\t\t\t\t\t*set building \"ruined\"\n\t\t\t\t\t\t\t\t\t\t\t*set infamy %+ (guts + guts)\n\n\t\t\t\t\t\t\t\t\t\t\t- Glory increased\n\n\t\t\t\t\t\t\t\t\t\t\t*if puppy = \"keep\"\n\t\t\t\t\t\t\t\t\t\t\t\t*set puppy \"dead\"\n\t\t\t\t\t\t\t\t\t\t\t\tYour Oracle beeps, telling you that the \"life form\"... as in the puppy... that you had stowed in your backpack has been killed...\n\n\t\t\t\t\t\t\t\t\t\t\t\t*goto greyback\n\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t*label greyback\n\t\t\t\t\t\t\t\t\t\t\t\tOff to the left, jutting out from a pile of smoking cinderblock, you see the alien craft, broken open.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto downed\n\n\t\t\t\t\t\t\t\t\t#Take the ship out as it leaves!\n\t\t\t\t\t\t\t\t\t\tThe alien craft takes a few more shots at you, then lifts up out of the complex and speeds into the sky.\n\n\t\t\t\t\t\t\t\t\t\tThe sky is quiet for a moment, but then you see a flash of light - you would have missed it if it weren't for your Armor's sensors.  Then a call comes in,\n\n\t\t\t\t\t\t\t\t\t\t\"Sir, this is the Slipdagger.  Target destroyed.\"\n\n\t\t\t\t\t\t\t\t\t\t*goto searching\n\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Using my boosters, I launch myself through the ceiling and engage it in the air.\n\t\t\t\t\t\t\t\tBlasting through the ceiling, you take to the sky.  The star craft follows, filling the air behind you with blaster fire.\n\n\t\t\t\t\t\t\t\tYour suit is fast and more maneuverable than the spacecraft, but your rockets, when they hit, don't seem to be getting through the ship's shields.\n\n\t\t\t\t\t\t\t\tWhat would you like to do?\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#I close in and see if my Armor can penetrate the ship's shields.\n\t\t\t\t\t\t\t\t\t\tCutting your boosters, and flying in an erratic pattern, you suddenly bolt straight at the alien ship.  You feel a tingle as you get close, and a powerful shock rips through your suit as you enter the craft's shields.\n\t\n\t\t\t\t\t\t\t\t\t\t*set armor-13\n\t\t\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\t\t\t\tLanding on the ship, you punch an armored gauntlet through the ship's hull, and tear off a large piece of plating.  Aiming your cannon, you launch a rocket directly into the hole, blasting out the side of the ship.\n\n\t\t\t\t\t\t\t\t\t\t\tThis knocks you loose.  As you recover in the air, you see the smoking spacecraft lose control and spiral back to the ground, crashing with a healthy explosion.\n\n\t\t\t\t\t\t\t\t\t\t\tYou glide down to the crash site to see the ship broken in two in a small crater.\n\t\t\t\t\t\t\t\t\t\t\t*set infamy %+ (guts + guts)\n\n\t\t\t\t\t\t\t\t\t\t\t- Glory increased\n\t\t\t\t\t\t\t\t\t\t\t*goto downed\n\t\t\t\t\t\t\t\t\t#I hover, and open up with all the weapons I've got.\n\t\t\t\t\t\t\t\t\t\tFiring volley after volley, you start to make impacts on the ship, but while hovering the alien craft has an easy time blasting you back.  You get hit first in the gut, and then take a glancing hit off the helmet, knocking you spiraling toward the ground below.\n\t\t\t\t\t\t\t\t\t\t*set armor-18\n\t\t\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\n\t\t\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\t\t\t\tAt the last moment you recover control of your suit, and fire another volley at the enemy ship.  Your rockets hammer into it, one after another, and suddenly an orange ball of flame erupts from the craft.  One of your shots got through!\n\n\t\t\t\t\t\t\t\t\t\t\tThe starship belches smoke from a hole in its side, and spirals down to the ground where it crashes violently.\n\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t*set infamy %+ (guts + (guts + guts))\n\n\t\t\t\t\t\t\t\t\t\t\t- Glory increased \n\n\t\t\t\t\t\t\t\t\t\t\tYou fly down to check it out, and find the ship broken open in a smoldering crater.\n\t\t\t\t\t\t\t\t\t\t\t*goto downed\n\t\t\t\t\t\t\t\t\t#I maneuver away from the power station, and then call in for the Slipdagger to shoot from orbit.\n\t\t\t\t\t\t\t\t\t\t\"Yes sir,\" the captain replies.  \"Firing in 3, 2, 1...\"\n\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tA lance of blue iridescent flame strikes down from the sky like the hammer of God.  The explosion is deafening.\n\n\t\t\t\t\t\t\t\t\t\tThe blast wings the alien ship, and sends it spiraling uncontrollably.  You fly into its path, and you catch one glimpse of the terrified pilot as, with a single mighty punch, you send the craft hurtling to the ground.  It explodes on impact, violently, leaving nothing but twisted blackened metal.\n\t\t\t\t\t\t\t\t\t\t*set infamy %+ (guts + guts)\n\n\t\t\t\t\t\t\t\t\t\t- Glory increased\n\t\t\t\t\t\t\t\t\t\t*goto searching\n\t\t\t\t#I call in the Slipdagger for support.\n\t\t\t\t\t*goto Slipdagger\n\t\t\t\t#I take aim, and tell the thing to surrender or die.\n\t\t\t\t\tThe lizard gives a harsh bark of a laugh, and leaps into the ship.  You fire as it does, but your shots end short, repelled by some kind of energy shield around the ship.\n\t\t\t\t\t*goto fightingship\n\n\t*if west != \"done\"\n\t\t#West\n\t\t\t*set west \"done\"\n\t\t\t*set Eleanor \"yes\"\n\t\t\tOn the west side of the complex, you find the station's private gardens.  Unfortunately, they've been burned out and cleared.  From the scorch marks it looks like starships have landed here.\n\n\t\t\tLooking around more, you find the body of a woman in a blue dress.  Checking her pulse, you discover that she's alive!\n\n\t\t\t*page_break\n\n\t\t\tRushing her back to the dropship, you access the ship's medical supplies.  After about an hour of care, she slowly wakes up, but then screams when she sees you in your Armor.  Quickly, you remove your helmet and gauntlets, and she calms down.\n\n\t\t\t\"I'm so sorry,\" she whispers.  \"I thought you were one of those monsters!\"\n\n\t\t\tWhat would you like to say to her?\n\t\t\t*choice\n\t\t\t\t#\"Ma'am, I need to know what's happened here.\"\n\t\t\t\t\tShe straightens up, and replies seriously, \"Yes, of course.  Sorry...\"\n\t\t\t\t\t*goto explanation\n\t\t\t\t#\"Woman, you tell me what's going on here, or I swear I'll gut you!\"\n\t\t\t\t\t*set dark %-40\n\t\t\t\t\t*set Eleanor \"nope\"\n\t\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t\tHer eyes grow wide, but she immediately starts to tell you everything she knows!\n\t\t\t\t\t*label explanation\n\n\t\t\t\t\t\"My name is Eleanor, and my father ran the power station, which made him a pretty important man on Far Hope.  But the governor of the colony suddenly came up with this crazy idea a few months ago.  Oh, it was horrible!  But we didn't know it at the time!\"\n\n\t\t\t\t\t\"Sorry, it's just so hard to know where to start...  Well the governor, Mr. Plaxus, called a meeting of the colony's most influential, and said that he had been contacted by an alien race - a new one, a race that no one had ever heard of.  They called themselves the Lacertians, and they wanted to trade with us.  Well, that's how it started at least...\"\n\n\t\t\t\t\tYou ask her if the \"Lacertians\" are these Saurian lizard creatures that you've been fighting.\n\n\t\t\t\t\t\"Yes,\" she whispers.  \"Horrible, aren't they?\"\n\n\t\t\t\t\t*page_break\n\t\t\t\t\t\"At first, however, the trading went well.  But the deal with the Lacertians got slowly worse and worse.  First they wanted to trade for simple things, things we had a lot of, and they gave us large amounts of gold in return.  They seemed to have more gold than they needed, and it was always shaped into hideous talismans, idols and jewelry.  It got so that people here started to feel wealthy.  We started ordering expensive things from trade ships, and father expanded the power station here, in preparation for what was to come.  He ran this facility, you see.  That's how I've known places to hide, up until now.\"\n\n\t\t\t\t\t\"But then the Lacertians started to stay here longer and longer when they came to trade.  They also suggested that we leave the Empire.  That idea didn't set well with some of the colonists, but a lot of people here moved out to get away from the empire.  They didn't think it was a big deal.  I mean, we only see an Empire ship like once every couple of years anyway.  And with all of the money we were getting...\"\n\n\t\t\t\t\t\"But then,\" she says softly, \"But then they started to offer money for people.  For PEOPLE!  They promised that the people would be returned - they only wanted them to... to harvest some of their genetic material...\"\n\n\t\t\t\t\t*page_break\n\t\t\t\t\t\"Well, of course we held out, but once old Jackson agreed and sent off his wife... oh she was so horrified... but she came back, safe and sound, and with enough gold to make them the richest people on the planet...\"\n\n\t\t\t\t\t\"It didn't take long before others started doing it.  Within a couple of weeks the Lacertians were more and more involved with everything, and then...\"\n\n\t\t\t\t\t\"Then Governor Plaxus suggested we send off the whole settlement.  He pointed out that, if we did, we would all be filthy rich!  Well, many citizens, my father included, would have none of it.  But then people started disappearing.  It was terrifying.  Then, in one night, everyone was simply gone...\"\n\n\t\t\t\t\t\"I tried to get a message off to the Empire, but I don't think it got though.  I think this world is being blocked, by THEM.\"\n\t\t\t\t\t*page_break\n\t\t\t\t\t\"But I've found out where most of the people are being held.  They haven't taken them off world yet.  There's a huge secure bunker beneath this power station, and the colonists are being held there until the Lacertian carrier comes for them.  Father built a very strong bunker there... if only we had used it before it was too late!  They changed the code to get into it - I don't know it.\"\n\n\t\t\t\t\t\"Please, ${name}, please hurry!  Please save my father!\"\n\t\t\t\t\t*goto searching\n\n\t\t\t\t#\"No.  I'm something much worse.\"  And then I kill her.\n\t\t\t\t\t*goto murderous\n\t\t\t\t#\"No, I'm no monster.  I'm an Imperial Marine, and I'm here to help.\"\n\t\t\t\t\t\"Oh!\" she replies, looking around at the inside of the dropship.\n\t\t\t\t\t*if dark >= 40\n\t\t\t\t\t\t\n\t\t\t\t\t\tShe smiles up at you, and whispers a thank you.  You spend some time with her, helping her get her mind straight.  Do you press her for information?\n\t\t\t\t\t\t*label puppylove\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*selectable_if (puppy = \"keep\") #I take out the puppy I found, and give him to her.\n\t\t\t\t\t\t\t\t\tShe brightens up immediately, asking you where the puppy came from.  When you tell her, she smiles at you.  \"You seemed like someone with a gentle soul,\" she says.\n\t\t\t\t\t\t\t\t\t*set dark %+30\n\n\t\t\t\t\t\t\t\t\t- Light increased\n\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tShe hugs the puppy, who licks her face happily.  \n\n\t\t\t\t\t\t\t\t\t*set puppy \"given\"\n\t\t\t\t\t\t\t\t\t*if gender = \"female\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*goto girltime\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\tWhat do you do now?\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#I press her for information.\t\n\t\t\t\t\t\t\t\t\t\t\t\t\"Of course,\" she says, straightening up.  \"Sorry, I was distracted.\"\n\t\t\t\t\t\t\t\t\t\t\t\t*goto explanation\n\t\t\t\t\t\t\t\t\t\t\t#I take her hand, and kiss her.\n\t\t\t\t\t\t\t\t\t\t\t\tYou lean in to kiss her.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto smooch\n\t\t\t\t\t\t\t\t\t\t\t#I kill her.\n\t\t\t\t\t\t\t\t\t\t\t\tIt takes a special kind of person to give someone a puppy, and then kill them.  You think about that as you watch the smoke vapors curl lazily from the end of your blaster pistol.\n\n\t\t\t\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\t\t\t\t\t\t\t\t\t\t\t\t*set dark %-65\n\t\t\t\t\t\t\t\t\t\t\t\t*set infamy %-60\n\t\t\t\t\t\t\t\t\t\t\t\t*set Eleanor \"dead\"\n\t\t\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t\t\t- Glory lost...\n\t\t\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t\t\t- Darkness grows strongly within you...\n\n\t\t\t\t\t\t\t\t\t\t\t\tTossing the body out of the dropship, you head back inside the power station.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto searching\n\n\t\t\t\t\t\t\t#Absolutely.\n\t\t\t\t\t\t\t\t*label ofcourse\n\t\t\t\t\t\t\t\t\"Of course,\" she says, straightening up.  \"Sorry, I was distracted.\"\n\t\t\t\t\t\t\t\t*goto explanation\n\t\t\t\t\t\t\t#No, I give her as much time as she needs.\n\t\t\t\t\t\t\t\tShe takes a while to figure out where she is, and what's going on.\n\n\t\t\t\t\t\t\t\t*if gender = \"male\"\n\t\t\t\t\t\t\t\t\tWatching her, you notice how her hair shines in the morning sun.  How her eyes catch the light.  How red her lips are...\n\n\t\t\t\t\t\t\t\t\tWhat do you do?\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#I lean in to kiss her!\n\t\t\t\t\t\t\t\t\t\t\t*if guts \u003c 14\n\t\t\t\t\t\t\t\t\t\t\t\tYou aren't gutsy enough to do that!\n\n\t\t\t\t\t\t\t\t\t\t\t\tWhat do you do?\n\t\t\t\t\t\t\t\t\t\t\t\t*goto puppylove\n\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\tAs you lean in, she gasps, looking at your with wide eyed shock!  You lean back, muttering, \"Oh, sorry.  I guess I misread...\"\n\n\t\t\t\t\t\t\t\t\t\t\t\tA very awkward moment passes, and then she smiles at you.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto smooch\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t#I clear my throat, and avert my eyes like a gentleman.\n\t\t\t\t\t\t\t\t\t\t\t\"Sir?\" she asks, her voice soft.  \"Is something wrong?\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tWhat do you say?\n\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t#\"You're hot.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto yourehot\n\t\t\t\t\t\t\t\t\t\t\t\t#\"Well, ma'am, you're... distracting.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\tShe laughs softly, and says smilingly, \"What do you mean?\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*label lovelove\n\t\t\t\t\t\t\t\t\t\t\t\t\tWhat do you say?\n\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t#\"Forget it!  Just tell me what's going on here, OK?\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto ofcourse\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t#\"I want to touch you.  With my hands.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto yourehot\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t#\"I've never seen a woman so beautiful...\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Ha!\" she laughs, her smile deepening.  Then she looks into your eyes, her laughter gone.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tWhat do you say now?\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Nothing.  Now I kiss her.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label smooch\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tShe leans in to kiss you back.  A long moment passes, but then the ship's pilot interrupts the two of you.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"I'm sorry, sir,\" he says nervously, \"But it's been two hours...\"\n\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tShocked that so much time slipped by, you glance at Eleanor nervously.  She smiles at you, and says, \"That was sudden, but nice!  Well, I had better introduce myself, hadn't I?\"  Her smile is deep and knowing.\n\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou wonder at what you've gotten yourself into!\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set Eleanor \"love\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto explanation\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#I laugh a lot, to lighten the mood.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto yourehot\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#I say, \"I'm serious!  I've kissed a LOT of women, and you are the hottest!\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto yourehot\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#\"Anyway, so what's been going on here?  On Far Hope, I mean?\"\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tShe straightens up, and replies seriously, \"Yes, of course.  Sorry...\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto explanation\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#I smile, and say, \"You couldn't have me if you wanted, babe.  I'm out of your league.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tShe arches an eyebrow, and favors you with a smirk.  \"Really?  Well, God's gift to women, then let this poor hideous girl fill you in on what's been going on around here...\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto explanation\n\n\t\t\t\t\t\t\t\t\t\t\t\t#\"Nothing's wrong, I've just never seen someone so hot before.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\tShe glares at you.  \n\n\t\t\t\t\t\t\t\t\t\t\t\t\tAfter a moment, she says matter-of-factly, \"Well, here's what I know...\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto explanation\n\t\t\t\t\t\t\t\t\t\t\t\t#I say nothing.  I turn and look at her.  That's all.\n\t\t\t\t\t\t\t\t\t\t\t\t\tAfter a moment, she blushes, and looks away.  \"Sir,\" she whispers, \"You embarrass me...\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto lovelove\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t#I say, \"You're hot.\"\n\t\t\t\t\t\t\t\t\t\t\t*label yourehot\n\t\t\t\t\t\t\t\t\t\t\tHer eyes go wide, and she blinks at you, startled.  After a moment, with a faint crease in her forehead, she says, \"Thank you... sir.  Well, let me tell you what's been going on here.\"\n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t*goto explanation\n\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t#I frown, frustrated by these distractions, and press her for information!\n\n\t\t\t\t\t\t\t\t\t\t\t*goto ofcourse\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tWhat do you do?\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#I draw my pistol, and tell her to start talking.\n\t\t\t\t\t\t\t\t\t\t\t*set dark %-33\n\t\t\t\t\t\t\t\t\t\t\t*set Eleanor \"nope\"\n\t\t\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t\t\t\t\t\t\t\tHer eyes grow wide, but she immediately starts to tell you everything she knows!\n\t\t\t\t\t\t\t\t\t\t\t*goto explanation\n\t\t\t\t\t\t\t\t\t\t#I wait for her to pull herself together.\n\t\t\t\t\t\t\t\t\t\t\t*label girltime\n\t\t\t\t\t\t\t\t\t\t\tAfter a few more moments, she says, \"So, is it tough?  Being a female Mobile Marine, I mean?\"\n\n\t\t\t\t\t\t\t\t\t\t\tYou spend some time telling her about the Corps, and she seems genuinely interested.  Where do you take things from here?\n\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t#I push her to tell me the information I need\n\t\t\t\t\t\t\t\t\t\t\t\t\tShe seems sad for a moment, but then introduces herself.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto explanation\n\t\t\t\t\t\t\t\t\t\t\t\t#I enjoy the new friendship!\n\t\t\t\t\t\t\t\t\t\t\t\t\tShe seems to enjoy it too.  It's rare for her to meet a strong, bold woman to talk to!  She introduces herself.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set Eleanor \"friends\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto explanation\n\t\t\t\t\t\t\t\t\t\t\t\t#I push for a romantic connection\n\t\t\t\t\t\t\t\t\t\t\t\t\tShe responds happily, and the two of you hit it off very quickly.  It's rare for her to meet a strong, bold woman to talk to.  She knows however that this will have to wait - you have a mission!  She introduces herself.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set Eleanor \"love\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto explanation\n\t\t\t\t\t\t\t\t\t\t#Enough of this - I kill her and get back to work.\n\t\t\t\t\t\t\t\t\t\t\t*label murderous\n\t\t\t\t\t\t\t\t\t\t\tYour gauntleted hand shoots out faster than she can react.  A quick snap, and she slumps to the floor, lifeless.\n\n\t\t\t\t\t\t\t\t\t\t\t*set dark %-65\n\t\t\t\t\t\t\t\t\t\t\t*set infamy %-60\n\t\t\t\t\t\t\t\t\t\t\t*set Eleanor \"dead\"\n\t\t\t\t\t\t\t\t\t\t\t- Glory lost...\n\t\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t\t- Darkness grows strongly within you...\n\n\t\t\t\t\t\t\t\t\t\t\tTossing the body out of the dropship, you head back inside the power station.\n\t\t\t\t\t\t\t\t\t\t\t*goto searching\n\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto explanation\n\n*label downed\n\nStepping up to the broken alien craft, you see the lizard pilot struggling to crawl out.  He's leaking yellow liquid from several gashes.  It looks up at you, and makes a whimpering sound.\n\nWhat would you like to do?\n*choice\n\t#I crush it under my boot.  Slowly.  With a grin.\n\t\tAs you step up and lift your armored boot, it makes a feeble attempt to talk.  \"Pleasss,\" it croaks.  \"I know sssecretsss!\"\n\t\t\n\t\tIt makes a crunching sound as your boot ends its life.  Scraping off the remains, you head back to keep searching.\n\t\t*set dark %-33\n\n\t\t- Darkness grows within you...\n\t\t*goto searching\n\n\t#I lift it up by its scrawny neck, and demand to know everything it knows.\n\t\tIt gurgles, and then hisses out, \"Pleasss, I know the code!  The code to the bunkerrr!  It'sss ssseven sssix ssseven!\"\n\t\t\n\t\tThe creature coughs, and yellow slime comes bubbling out of its mouth.  Then it stops moving.  It must have been more wounded than you thought...\n\t\t*set code \"yes\"\n\t\t*goto searching\n\t#I blast the dying monster to dust.\n\t\tOne rocket was all it took.  The ship was already spewing out some very flammable liquids, and the whole mess goes up in bright and dancing iridescent flames.  Very pretty.\n\t\t*goto searching\n\t\t\t\n*label openeddoor\n*page_break\n\n*if (troopcount > 0)\n\tYou make sure the Shock Troopers are prepping the dropship for launch.  You have no idea what's here, but you have a feeling you might need to leave in a hurry!\n\t*page_break\n\nStepping down into the open hatch alone, the first thing you notice is the smell.  It's foul, musty and dank.  You deactivate your helmet's olfactory receptors.\n\nA large stone staircase descends into the darkness, winding slowly to the right.  Eventually the shaft opens up into a dimply lit tunnel.  At the far end of the tunnel you see more light.  Walking that way, you come into a massive concrete room with a high vaulted ceiling.  The walls are lined with shelves, and the entire place is filled with long metal canisters.  There must be hundreds upon hundreds of them.  Off to the right sits a forklift.  To the left you spot a wide door with a thin crack of light showing at its base.\n\nWhat would you like to do?\n*label exploringdark\n*choice\n\t#I take a look inside the canisters\n\t\tYou step up to the nearest one, and notice a small glass square on one end.  Looking in, you see a woman's unblinking face staring out at you with a look of horror.  She's not moving.\n\n\t\tLooking around the canister, you don't find any control panels.  The only break in the surface that you find is the small window.\n\t\t\n\t\tWhat now?\n\t\t*choice\n\t\t\t#I rip open the canister\n\t\t\t\tYou dig your armored fingers into the metal at either side of the woman's face.  Griping into it, you peel the canister open.  The metal protests loudly, and a spray of clear liquid bursts out of the canister.  Your arms, chest and helmet are all covered in the thick fluid.\n\n\t\t\t\tAs you finish pealing the canister open, you see that the inside was lined with various tubes and wires that are all hooked up all over the woman's body.  She still stares blankly, and her face is still contorted in fear.\n\n\t\t\t\tWhat do you do?\n\t\t\t\t*choice\n\t\t\t\t\t#I lay her on the ground, and scan her with my Oracle\n\t\t\t\t\t\tLying her gently on the ground, you flip open your Oracle and give her a scan.  She reads as alive, but in some kind of suspended animation.  Her vitals are all dangerously low, and slowly dropping.  The capsule must have been keeping her alive.  You think about how you were only trying to help her, to SAVE her, and now...\n\n\t\t\t\t\t\t*set dark %+35\n\t\t\t\t\t\t- Light increased\n\n\t\t\t\t\t\tYou start to make a call in to the Slipdagger, to talk to the ship's medical officer, when you hear a low, hissing growl behind you.  It's all of the warning you get before you are blasted in the back and knocked violently across the room.\n\t\t\t\t\t\t*set armor-12\n\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t*goto imhit\n\t\t\t\t\t#I kill her, if she isn't already dead\n\t\t\t\t\t\tYou snap her neck easily.  Her face slowly relaxes.\n\t\t\t\t\t\t*set dark %-33\n\t\t\t\t\t\t\n\t\t\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t\t\tAs you look at the corpse, you hear a low, hissing growl behind you.  It's all of the warning you get before you are blasted in the back and knocked violently across the room.\n\t\t\t\t\t\t*set armor-12\n\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto imhit\n\t\t\t\t\t#I leave her in the ruined capsule, and turn to the door\n\t\t\t\t\t\tLeaving the mess, you turn just in time to see a lizard kicks open the doors you had spotted earlier.  The lizard is wearing a blue plastic suit of some kind and holding a blaster cannon on its shoulder.  It fires immediately.  You have time to dive to the side, but the shot still catches you in the shoulder, sending you spinning.\n\t\t\t\t\t\t*set armor-7\n\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto imhit\n\t\t\t\t\t\t\n\t\t\t#I call out to see if anyone can hear me \n\t\t\t\t*goto shouty\n\t\t\t#Quietly, I approach the door \n\t\t\t\t*goto slippery\n\t#I call out to see if anyone can hear me\n\t\t*label shouty\n\t\tYou hear a screech from behind the door, and lights suddenly come on.  A lizard kicks open the doors, holding a blaster cannon on its shoulder.  It fires immediately.  You have time to dive to the side, but the shot still catches you in the shoulder, sending you spinning.\n\t\t*set armor-7\n\t\t*if armor \u003c 1\n\t\t\t*goto_scene Combat_Death\n\t\t*else\n\t\t\t*label imhit\n\n\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\tWith a boost from your jets you get back on your feet.  The lizard's large alligator face is open wide in a harsh, barking laugh.  What do you do?\n\t\t\t*choice\n\t\t\t\t#I fire back!\n\t\t\t\t\tWith a simple pull of the trigger, you blast a hole in the lizard alien's chest.  A confused look flashes through its eyes, and the blaster cannon slides off of its shoulder and clatters to the ground.  The reptile's arms go slack, and then it falls to the ground in a puddle of yellow blood.\n\n\t\t\t\t\t*goto dead\n\t\t\t\t#I try to wrestle the thing to the ground, to capture it!\n\t\t\t\t\t*if fighting > 12\n\t\t\t\t\t\tYou dodge another blast from the lizard, and then you're right in front of it, knocking the cannon out of its hands.  You grip the alien by the throat, lifting it off the floor.  While it struggles, you carry it into the other room with one arm, to see what it was doing in there.\n\t\t\t\t\t\t*goto subdued\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou jump forward, but just aren't skilled enough in fighting to get in close before the lizard catches you with another blast from its cannon.  The shock knocks you back into a wall of canisters, and your vision flickers for a moment as several canisters fall from the wall, crashing into your helmet!\n\t\t\t\t\t\t*set armor-12\n\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\tYou roll to your feet and leap back at the lizard, dodging yet another blast.  Without thinking, you pick up a nearby canister and hurl it at the lizard.  The reptile alien squawks as the canister slams into its gut, knocking it back into a wall of the metal tubes.  With a thunderous crash, the entire wall slides down and buries the creature.\n\t\t\t\t\n\t\t\t\t\t\t\t*set infamy %+ (guts + guts)\n\t\t\t\t\t\t\t- Glory increased\n\n\t\t\t\t\t\t\tYou step up to the pile and hear a faint whimpering and hissing beneath it.  Pulling several canisters away, you find the lizard lying awkwardly twisted.  Its right leg is broken, and there's a smear of yellow around its toothy jaws.  You grip the foul alien by the throat, lifting it off the floor.  While it struggles, you carry it into the other room with one arm, to see what it was doing in there.\n\t\t\t\t\t\t\t*goto subdued\n\n\n\t#Quietly, I approach the door\n\t\t*label slippery\n\t\tSlipping the door open just a crack, you see into another large room full of canisters.  In the middle, however, one of the green lizard creatures is bent over what looks like an operating table.  The lizard is wearing a plastic blue suit of some kind.  It's hard to see what's on the table.\n\n\t\tWhat now?\n\t\t*choice\n\t\t\t#I sneak into the room, up behind the creature, and capture it!\n\t\t\t\t*if stealth > 11\n\t\t\t\t\tYou slide silently into the room, up behind the lizard, and grip it around the throat!  \n\t\t\t\t\t*goto subdued\n\t\t\t\t*else\n\t\t\t\t\tAs you slide into the room, the creature must have heard you.  It spins around, hisses, and brandishes a laser scalpel.  As you try to capture it, it gives your Armor a gash across the neck!\n\t\t\t\t\t*set armor-5\n\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t*else\n\t\t\t\t\t\t\n\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\tYou recover quickly, but the lizard lunges for you, thinking it has the upper hand.  You catch the creature out of the air by its throat with one armored hand, while the other catches the claw that's holding the laser scalpel.  With a quick grip, you crush the claw with the scalpel.  The lizard screeches, then whimpers and calms down.\n\n\t\t\t\t\t\t*set infamy %+ guts\n\t\t\t\t\t\t- Glory increased\n\t\t\t\t\t\t*goto subdued\n\n\t\t\t#I sneak into the room, and blast the creature!\n\t\t\t\tSliding into the room, you take aim and blast the creature in the back.  It slumps to the floor, dead.\n\t\t\t\t*goto dead\n\t\t\t#I fling the door open, pistol raised, and demand that the creature surrender!\n\t\t\t\tIt spins around, hisses, and brandishes a laser scalpel.  You gesture with your pistol, and the lizard puts the scalpel back down.  Stepping up to it, you grip it by the throat.\n\t\t\t\t*goto subdued\n\n*label subdued\n\n*page_break\nYou step up to the table the lizard was working at, and look into the eyes of a man you recognize from your mission briefing as Mr. Plaxus, the colony governor.  Well, it's most of him, anyway.  It looks like they've replaced one of his arms with a reptilian arm, and he has green bulbous patches on his chest and neck.  It takes you a moment to realize that he's not dead.\n\n\"Can you speak?\" you ask the man.\n\n\"Yes,\" he replies in a strangely guttural tone.  He also sounds... angry?\n\n\"What have they done to you?\" you ask.\n\nThe lizard in your hand croaks out, \"Only what they assssked usss to!  We made a deal!  We give thisss human our secretsss, and we get the ressst for ourssselvesss...\"\n\nWhat would you like to do?\n*choice\n\t#I question Plaxus\n\t\tPlaxus gives you a sickly smile, and croaks, \"Oh, you don't know, do you?\"  Sitting up from the table, the half reptilian Plaxus growls, \"You are an Imperial marine, right?  Then you should know,\" he coughs, spitting up yellow phlegm.  \"Then you should know that these lizard creatures aren't in the Imperial registry.  They're something new.\"\n\n\t\t*label plaxustalk\n\t\tPlaxus slides his legs over the side of the table.  You see that they are bloated and swollen.  \"They call themselves Lacertians.  A Saurian race, is what we would call them.\"  Plaxus smiles up at you, showing large, pointed teeth.  \"They don't age, you see!  They can re-grow arms and legs!\"  Here, Plaxus starts to stand up.\n\n\t\tWhat do you do?\n\t\t*choice\n\t\t\t#I give him room to stand, and let him keep talking\n\t\t\t\tStepping back, Plaxus slowly stands up, saying, \"Do you see, my friend?  Do you see what this means?  They are sharing this with us!  They are giving US the power to live forever!\"\n\n\t\t\t\t\"And everyone agreed to this?\" you ask.\n\n\t\t\t\tNow standing, Plaxus looks to the walls to canisters and gives a deep sigh.  \"Well, you see, only a few of us will be getting this power.  Only the chosen.  The righteous.  Everything comes at a cost, marine.  Everything.  The rest of the colonists will pay that cost for us.\"\n\n\t\t\t\t\"Pay how?\" you ask, your stomach dropping with the suspicion.\n\n\t\t\t\tPlaxus turns and looks at you with a wolfish grin.  \"I think you know, marine.  These Lacertians are ... carnivorous.  They live nomadically, traveling the space ways, trading for food.  Trading their medical knowledge, mostly.  For food.\"\n\n\t\t\t\tSickened, you lift your blaster pistol, but Plaxus is faster.  He lunges at you, brandishing one of the lizard creature's silver machetes.  Except that in his hand, it glitters with a blue glow.\n\n\t\t\t\t*label decisions\n\t\t\t\tWhat do you do?\n\t\t\t\t*choice\n\t\t\t\t\t#I use the lizard doctor that I'm already holding as a weapon!\n\t\t\t\t\t\tThe lizard lets out a horrified screech as you slam it down into the attacking Plaxus, crushing them both in a spray of yellow blood!  Standing over the mangled mess, you think about how much your Armor is going to need a good cleaning when you get back to base...\n\n\t\t\t\t\t\t*set infamy %+ guts\n\t\t\t\t\t\t- Glory increased\n\t\t\t\t\t\t*goto ending\n\t\t\t\t\t#I dart forward and catch Plaxus with my other hand!\n\t\t\t\t\t\t*if fighting > 12\n\t\t\t\t\t\t\tWith your shocking speed and martial skill, you dart forward, dodge Plaxus' attack, and grip him by the throat.  Lifting him into the air, you now hold him in one armored hand and the lizard doctor in the other.\n\n\t\t\t\t\t\t\tYou call in some support to deal with the people in the canisters, and tell them that you have two prisoners.\n\t\t\t\t\t\t\t*set plaxus \"yes\"\n\t\t\t\t\t\t\t*set lizard \"yes\"\n\t\t\t\t\t\t\t*goto ending\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tUnfortunately, you just aren't skilled enough for a maneuver like that.  As you dart forward, Plaxus slams the glowing machete into your helmet.  Your vision flickers under the heavy blow.\n\t\t\t\t\t\t\t*label pikachu\n\t\t\t\t\t\t\t*set armor-10\n\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tFurious, you slap the machete away, and slam your fist into Plaxus' face.  He hurls back through the air, dead before he hits the ground.\n\n\t\t\t\t\t\t\t\t*set infamy %+ (guts + guts)\n\t\t\t\t\t\t\t\t- Glory increased\n\n\t\t\t\t\t\t\t\tYou call in some support to deal with the people in the canisters, and tell them that you have one alien prisoner.\n\t\t\t\t\t\t\t\t*set lizard \"yes\"\n\t\t\t\t\t\t\t\t*goto ending\n\t\t\t\t\t#I let Plaxus hit me, and then catch him\n\t\t\t\t\t\t*if guts \u003c 11\n\t\t\t\t\t\t\tYou aren't gutsy enough to do that!\n\t\t\t\t\t\t\t*goto decisions\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tPlaxus slams the glowing machete into your right shoulder, spraying the room with sparks.\n\t\t\t\t\t\t\t*set armor-12\n\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tPlaxus' evil grin fades as you casually reach up, yank the machete free, and toss it behind you.  Plaxus makes to turn and run when your armored hand darts out and catches him by the throat.  He struggles for a moment, then gives up and goes limp. \n\n\t\t\t\t\t\t\t\t*set infamy %+ (guts + guts)\n\t\t\t\t\t\t\t\t- Glory increased\n\n\t\t\t\t\t\t\t\tYou call in some support to deal with the people in the canisters, and tell them that you have two prisoners.\n\t\t\t\t\t\t\t\t*set plaxus \"yes\"\n\t\t\t\t\t\t\t\t*set lizard \"yes\"\n\t\t\t\t\t\t\t\t*goto ending\n\n\t\t\t\t\t#I let Plaxus hit me, and then hit him.  Hard.\n\t\t\t\t\t\t*if guts \u003c 12\n\t\t\t\t\t\t\tYou aren't gutsy enough to do that!\n\t\t\t\t\t\t\t*goto decisions\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tPlaxus slams the glowing machete into your right shoulder, spraying the room with sparks.\n\t\t\t\t\t\t\t*set armor-12\n\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tPlaxus' evil grin fades as you casually reach up, yank the machete free, and toss it behind you.  Plaxus makes to turn and run when your armored fist backhands him across the face.  The force knocks Plaxus spinning through the air.  His lifeless corpse slams into some canisters, spraying them with his yellow blood.  Calmly, you draw your pistol and blast the body a couple of times, just to make sure.\n\n\t\t\t\t\t\t\t\t*set infamy %+ (guts + (guts + guts))\n\t\t\t\t\t\t\t\t- Glory increased\n\n\t\t\t\t\t\t\t\tYou call in some support to deal with the people in the canisters, and tell them that you have one alien prisoner.\n\t\t\t\t\t\t\t\t*set lizard \"yes\"\n\t\t\t\t\t\t\t\t*goto ending\n\t\t\t\t\t#I dodge back and blast him\n\t\t\t\t\t\t*if shooting > 11\n\t\t\t\t\t\t\t*goto shootingrange\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou shoot, but miss.  Plaxus slams the glowing machete into your helmet.  Your vision flickers under the heavy blow.\n\t\t\t\t\t\t\t*goto pikachu\n\n\t\t\t\t\t\t\n\t\t\t#I blast him\n\t\t\t\t*label shootingrange\n\t\t\t\tWith one fluid motion you draw your blaster pistol and shoot Plaxus in the chest.  He lets out a gurgling screech, and dies in a pool of yellow blood.  \n\n\t\t\t\tThe lizard you are holding writhes in your grip as it tells you, \"I ssswear!  Thisss one made a deal with usss, a binding deal!  It'sss legal!  We have proof!\"\n\n\t\t\t\tA lizard lawyer.  Outstanding.\n\n\t\t\t\tWhat do you do?\n\t\t\t\t*choice\n\t\t\t\t\t#Toss the lizard against the far wall (hard), set charges and destroy the station.  Then go home.  Mission accomplished.\n\t\t\t\t\t\t*set dark %-50\n\t\t\t\t\t\t- Darkness grows within you...\n\t\t\t\t\t\t*set burn \"yes\"\n\t\t\t\t\t\t*set building \"no\"\n\t\t\t\t\t\t*goto ending\n\t\t\t\t\t#Take this lizard in as a prisoner, and a sample of whatever life form it is.\n\t\t\t\t\t\t*set lizard \"yes\"\n\t\t\t\t\t\t*goto ending\n\t\t\t\t\t#I crush the life out of the lizard, and then call in some support to deal with the people in the canisters.\n\t\t\t\t\t\t*set dark %-22\n\t\t\t\t\t\t- Darkness grows within you... \n\t\t\t\t\t\t*goto ending\n\n\t\t\t#I raise my blaster pistol, and tell him to stay down\n\t\t\t\tYou raise your blaster pistol, and Plaxus raises a reptilian hand in front of his face.  \"Wait!\" he cries, sliding off the table and scrambling across the floor on his back, trying to get away.\n\t\t\n\t\t\t\t\"I can give you money!  Riches!  We have amassed a massive amount of gold here!  It could all be YOURS!\"\n\t\t\n\t\t\t\tWhat do you do?\n\t\t\t\t*choice\n\n\t\t\t\t\t*if ((gold = \"yes\") or (gold = \"split\"))\n\t\t\t\t\t\t#I tell him I already have his money!\n\t\t\t\t\t\t\tYou grin at the foolish man, and say, \"It's already mine.  I found it earlier this morning.  By now it's been loaded onto our ship.\"\n\n\t\t\t\t\t\t\tPlaxus' jaw drops, and he sputters, \"What?  But... my money...\"\n\n\t\t\t\t\t\t\tWhat do you do now?\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Take these two back to the ship as prisoners, and call in some support to deal with the people in the canisters.\n\t\t\t\t\t\t\t\t\t*set plaxus \"yes\"\n\t\t\t\t\t\t\t\t\t*set lizard \"yes\"\n\t\t\t\t\t\t\t\t\t*goto ending\n\t\t\t\t\t\t\t\t#Kill them both.\t\t\t\t\n\t\t\t\t\t\t\t\t\tEasy decision.  You snap the neck of the lizard, toss it against the wall, and blast Mr. Plaxus in the chest.\n\n\t\t\t\t\t\t\t\t\t*goto ending\n\t\t\t\n\n\t\t\t\t\t*else\n\t\t\t\t\t\t#I ask him for more details.\n\t\t\t\t\t\t\tHe smiles slyly, and says, \"Well, the Lacertians paid a great deal!  It's all stored, here, in the colony!  Maybe we can cut some kind of deal?  You let me live, and I give you the gold?\"\n\t\t\n\t\t\t\t\t\t\tWhat do you do?\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#I make a deal with him, and then kill him when he tells me where the money is\n\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t\t\t\t\t\t*set dark %-50\n\t\t\t\t\t\t\t\t\tHe explains that the money is being held in the warehouses on the west side of the settlement.\n\t\n\t\t\t\t\t\t\t\t\tOnce you hear that, you give him a smile, and blast him and the lizard both.\n\t\n\t\t\t\t\t\t\t\t\tCalling up the Slipdagger, you tell them about the find, and about the colonists.  They send crew to secure both.\n\n\t\t\t\t\t\t\t\t\t*set gold \"yes\"\n\t\t\t\t\t\t\t\t\t*goto ending\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t#I make a deal with him, and keep my word\n\t\t\t\t\t\t\t\t\tHe explains that the money is being held in some warehouses to the west side of the settlement.  Once he tells you this, you call up the Slipdagger and tell them everything, and ask them to send crew to secure the colonists and the gold.\n\n\t\t\t\t\t\t\t\t\tA shocked Plaxus cries, \"But we had a deal!\"\n\n\t\t\t\t\t\t\t\t\tYou explain to him that you are indeed going to let him live.  As a prisoner.\n\t\t\t\t\t\t\t\t\t*set lizard \"yes\"\n\n\t\t\t\t\t\t\t\t\t*set plaxus \"yes\"\n\t\t\t\t\t\t\t\t\t*set gold \"yes\"\n\t\t\t\t\t\t\t\t\t*goto ending\n\t\t\t\t\t\t\t\t#I tell him no way, and take him and the lizard back as prisoners.\n\t\t\t\t\t\t\t\t\t*set lizard \"yes\"\n\t\t\t\t\t\t\t\t\t*set plaxus \"yes\"\n\t\t\t\t\t\t\t\t\t*goto ending\n\t\t\t\t\t\t\t\t#I kill him.\n\t\t\t\t\t\t\t\t\t*goto ending\n\t\t\t\t\t#I shoot Plaxus, and take this lizard in as a prisoner.\n\t\t\t\t\t\t*set lizard \"yes\"\n\t\t\t\t\t\t*goto ending\n\t\t\t\t\t#I tell him to shut up, and take these two back to the ship as prisoners, and call in some support to deal with the people in the canisters.\n\t\t\t\t\t\t*set plaxus \"yes\"\n\t\t\t\t\t\t*set lizard \"yes\"\n\t\t\t\t\t\t*goto ending\n\t\t\t\t\t#I toss the lizard against the far wall (hard), set charges and destroy the station with Plaxus in it.  Then go home.  Mission accomplished.\n\t\t\t\t\t\t*set dark %-50\n\t\t\t\t\t\t- Darkness grows within you...\n\t\t\t\t\t\t*set building \"no\"\n\t\t\t\t\t\t*set burn \"yes\"\n\t\t\t\t\t\t*goto ending\n\t\t\t\n\t#I question the lizard\n\t\tIt writhes in your grip, saying, \"We are what you call ... nomadic traders.  We havvvvve been trading wittttth thesssssse creaturesssss.\"\n\n\t\t\"Trading what?\" you ask, giving the alien a shake.\n\n\t\tThe lizard's eyes snap to Plaxus, then back at you.  \"That one there ... it knowsssss.  It knowsssss, and issss better at your lang-guage.  Thisssss issss all jussssst a misssss-underssssstanding, I asssssure you...\"\n\n\t\tWhat do you do?\n\t\t*choice\n\t\t\t#Question Plaxus\n\t\t\t\t*goto plaxustalk\n\t\t\t#Kill them both\n\t\t\t\t*goto darkside \n\n\t\t\n\t#I kill them both\n\t\t*label darkside\n\t\tEasy decision.  You snap the neck of the lizard and toss it against the wall.  It leaves a yellow smudge where it hits.  Plaxus cries out and tries to raise his hands, but you callously blast him in the chest.\n\n\t\t*set dark %-50\n\t\t- Darkness grows within you...\n\n\t\tNow, what about these canisters?\n\t\t*choice\n\t\t\t#These poor folks are gone.  I set charges, blow the station and go home.  Mission accomplished.\n\t\t\t\t*set dark %-35\n\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t*set burn \"yes\"\n\t\t\t\t*set building \"no\"\n\t\t\t\t*goto ending\n\t\t\t#I head back to the ship, and call in some support to deal with the people in the canisters.\n\t\t\t\t*goto ending\n\n*label dead\n*page_break\nThere's a table in the center of the brightly lit room, and on it you find a man you recognize from your briefing as Mr. Plaxus, the colony governor.  Well, it's most of him, anyway.  It looks like they've replaced one of his arms with a reptilian arm, and he has green bulbous patches on his chest and neck.  It takes you a moment to realize that he's not dead.\n\n\"Can you speak?\" you ask the man.\n\n\"Yes,\" he replies in a strangely guttural tone.  He also sounds... angry?\n\n\"What have they done to you?\" you ask.\n\nPlaxus gives you a sickly smile, and croaks, \"Oh, you don't know, do you?\"  Sitting up from the table, the half reptilian Plaxus growls, \"You are an Imperial marine, right?  Then you should know,\" he coughs, spitting up yellow phlegm.  \"Then you should know that these lizard creatures aren't in the Imperial registry.  They're something new.\"\n\nPlaxus slides his legs over the side of the table.  You see that they are bloated and swollen.  \"They call themselves Lacertians.  A Saurian race, is what we would call them.\"  Plaxus smiles up at you, showing large, pointed teeth.  \"They don't age, you see!  They can re-grow arms and legs!\"  Here, Plaxus starts to stand up.\n\nWhat do you do?\n*choice\n\t#I give him room to stand, and let him keep talking\n\t\tStepping back, Plaxus slowly stands up, saying, \"Do you see, my friend?  Do you see what this means?  They are sharing this with us!  They are giving US the power to live forever!\"\n\n\t\t\"And everyone agreed to this?\" you ask.\n\n\t\tNow standing, Plaxus looks to the walls to canisters and gives a deep sigh.  \"Well, you see, only a few of us will be getting this power.  Only the chosen.  The righteous.  Everything comes at a cost, marine.  Everything.  The rest of the colonists will pay that cost for us.\"\n\n\t\t\"Pay how?\" you ask, your stomach dropping with the suspicion.\n\n\t\tPlaxus turns and looks at you with a wolfish grin.  \"I think you know, marine.  These Lacertians are ... carnivorous.  They live nomadically, traveling the space ways, trading for
