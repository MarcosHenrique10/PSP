slams into the warehouse the launcher was sitting on, blossoming into a fiery ball that consumes the front half of the building.  Your third and fourth missiles take out the other gun turrets, and engulf the buildings in flames.\n\n\t\t\t\t\tMissile after missile streak towards the warehouses, and soon you can't even see the buildings.  They've been replaced by towers of gold and orange flames, shooting out sparking embers into the night.\n\n\t\t\t\t\t*set infamy %+ 30\n\t\t\t\t\t- Glory gained\n\n\t\t\t\t\tGrinning to yourself, you kick around, and head back to the settlement, with the radiant glow of the raging inferno lighting your way.\n\t\t\t\t\t*goto settlement\n\n\t\t\t\t#I ditch this problem, and head back\n\t\t\t\t\tKicking your right leg out, you flip around, and then fire your jets and blast back to your landing site.\n\t\t\t\t\t*set gold \"nope\"\n\t\t\t\t\t*set eastset \"ok\"\n\t\t\t\t\t*goto settlement\n\t\t\t\t\n\t\t\t\t#I fly in closer\n\t\t\t\t\tAs you approach, low to the ground, you get more missile locks.  What do you do?\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I stop and blast the missiles out of the air again\n\t\t\t\t\t\t\tStopping, you fire several missiles and knock the enemy rockets out of the sky.  Suddenly, streams of automatic tracer fire stitch the air, as new weapons begin firing from the rooftops of the warehouses!\n\n\t\t\t\t\t\t\tWhat do you do?\n\t\t\t\t\t\t\t*label villiage\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Fire back with a massive volley of incendiary rockets!\n\t\t\t\t\t\t\t\t\t*goto dusting\n\t\t\t\t\t\t\t\t#Dodge, and weave in closer\n\t\t\t\t\t\t\t\t\t*label rarity\n\t\t\t\t\t\t\t\t\tYou do your best, but several rockets explode nearby, knocking you sideways, and spinning you.  Several automatic rounds ping off of your armor, and then one missile detonates much too close, and sends you crashing into the dirt.\n\n\t\t\t\t\t\t\t\t\t*set armor-6\n\t\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\t\t\t*page_break\n\n\t\t\t\t\t\t\t\t\t\tYou roll to your feet, and blast forward, skimming the ground.  Another line of automatic fire streaks across your path, and then abruptly, you're at the warehouses and all the firing stops.\n\t\t\t\t\t\t\t\t\t\t*goto midas\n\t\t\t\t\t\t\t\t#Trade shots, and try to shoot out the weapons platforms\n\t\t\t\t\t\t\t\t\tRolling to your right, you lock onto one of the missile platforms and launch a rocket from your shoulder cannon.  You kick forwards, and then dodge to the left, snapping off several shots from your blaster pistol.\n\n\t\t\t\t\t\t\t\t\t*if shooting > 12\n\t\t\t\t\t\t\t\t\t\tContinuing to weave and dodge, you take your time and snap off perfectly aimed blaster bolts and rockets.  As your bolts strike, fountains of sparks and chunks of metal shoot off of the platforms.  After a few moments the final weapons platform grinds to a halt, and the warehouses are silent.\n\t\t\t\t\t\t\t\t\t\t*goto shootmidas\n\n\t\t\t\t\t\t\t\t\t*elseif shooting > 10\n\t\t\t\t\t\t\t\t\t\tYour first shot flies true, and one of the weapons platforms explodes in a shower of sparks and twisted metal.  You boost up to dodge another rocket only to take several high velocity automatic rounds across your chest and faceplate.\n\t\t\t\t\t\t\t\t\t\t*set armor-8\n\t\t\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\tGiving your thrusters a blast, you keep dodging and diving, and continue to trade shots.  It takes a while, but eventually you manage to take out the last weapons platform...\n\n\t\t\t\t\t\t\t\t\t\t\t*goto shootmidas\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\tYour shots fly wide, detonating on the ground, into the warehouses, and flying off into the dim morning light.  You keep trying to dodge, but get slammed by a rocket that sends you spinning into the rocky ground.  As you start to push yourself up to hands and knees, you take three high velocity automatic rounds off of your shoulders and helmet, knocking you back down.\n\t\t\t\t\t\t\t\t\t\t*set armor-6\n\t\t\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\tYou fire your side maneuvering thrusters, and then launch yourself backwards.  \n\n\t\t\t\t\t\t\t\t\t\t\tWell, shooting didn't work.  What would you like to do now?\n\t\t\t\t\t\t\t\t\t\t\t*goto villiage\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t#Ditch this problem, and head back to the settlement\n\t\t\t\t\t\t\t\t\t*set gold \"nope\"\n\t\t\t\t\t\t\t\t\t*goto settlement\n\t\t\t\t\t\t#I outmaneuver the missiles, and jet in closer\n\t\t\t\t\t\t\t*goto rarity\n\t\t\t\t\t\t#I've had enough - I stop and hammer the warehouses with everything I've got\n\t\t\t\t\t\t\t*goto dusting\n\n\t\t\t\t*selectable_if (stealth > 12) #I approach using my incredible stealth\n\t\t\t\t\tJetting to the side, you cut your engines and roll behind a large rock.  Blending in with the landscape, you dart from behind rocks and boulders, and slowly scurry your way up to the warehouses.\n\n\t\t\t\t\t*label midas\n\t\t\t\t\tOnce you get close, you see that the gun emplacements aren't manned, and don't seem to fire at anything too close.  You leap up to the roofs of the warehouses one by one, and disable the weapons systems.\n\n\t\t\t\t\t*label shootmidas\n\t\t\t\t\tThat done, you drop to the ground in front of the largest warehouse.  The huge doors are locked - This is the first thing that you've found that's been locked in this colony!\n\n\t\t\t\t\tYou give the door a solid kick, which rips it off of its hinges.  It's dark inside, so you turn on your Armor's search lights.  As the dust settles, you are almost blinded by the gleam of gold, silver and gemstones!\n\t\t\t\t\t\t\n\t\t\t\t\tJust then, your Oracle beeps.  A trooper just went down back at the power station.  Those guys must have found some strong resistance.\n\n\t\t\t\t\t*set troopcount-1\n\t\t\t\t\t*set morale %-10\n\t\t\t\t\t*set gold \"maybe\"\n\t\t\t\t\t*page_break\n\t\t\t\t\tYou stand stunned for a moment at the sheer amount of wealth filling this room.  What on EARTH have these colonists been doing, to amass this much wealth?\n\n\t\t\t\t\tAnd where ARE they?!\n\n\t\t\t\t\tBack to more important matters - what are you going to do?\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I send a call in to the Slipdagger, reporting this find, and asking them to have it investigated.  Then I head back to the settlement.\n\t\t\t\t\t\t\t\"Seriously?\" the captain's voice comes over your receiver.  \"Um, yes sir, we'll check it out!\"\n\t\t\t\t\t\t\t*set gold \"yes\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou fire up your boosters, and head back toward your landing site.\n\t\t\t\t\t\t\t*goto settlement\n\t\t\t\t\t\t#I wait a minute, and try to think of a way that this could all be mine!\n\t\t\t\t\t\t\t*set troopcount-2\n\t\t\t\t\t\t\t*set dark %-33\n\t\t\t\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t\t\t\tYou pace back and forth, ignoring beeping sounds coming from your Oracle.  Finally, you come up with a couple of options:\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#I head back to the drop ship, kill the crew, fly it over here and load it up.  Then I head back to the Slipdagger, ditching the Shock Troopers, the mission, everything.\n\t\t\t\t\t\t\t\t\t*set dark %-75\n\t\t\t\t\t\t\t\t\t*set troopcount 0\n\t\t\t\t\t\t\t\t\t*set morale \"1\"\n\t\t\t\t\t\t\t\t\t- Darkness grows greatly within you...\n\n\t\t\t\t\t\t\t\t\tOf course!  It's the only way to be sure.  You rocket your way to the power station, circling around and landing on the roof next to the drop ship.  You can hear gunfire below, and the screams of troopers fighting and dying.\n\n\t\t\t\t\t\t\t\t\tYou board the ship, and walk quickly to the cabin.\n\n\t\t\t\t\t\t\t\t\t\"Yes, sir?\" asks the pilot.  \"Is something wro-\"\n\t\t\t\n\t\t\t\t\t\t\t\t\tYou grip him by the throat, and crush the life out of him.\n\n\t\t\t\t\t\t\t\t\tAt that moment his co-pilot steps into the cabin, gasps, and tries to draw his pistol.\n\n\t\t\t\t\t\t\t\t\t*label fight2\n\t\t\t\t\t\t\t\t\tWhat do you do?\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#I boost forward and smash his face in.\n\t\t\t\t\t\t\t\t\t\t\t*set dark %-50\n\t\t\t\t\t\t\t\t\t\t\t- Darkness grows even more within you...\n\n\t\t\t\t\t\t\t\t\t\t\t*if fighting > 12\n\t\t\t\t\t\t\t\t\t\t\t\tYou manage to impale your fist through his face without damaging the ship!  It's yours now.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto stolenship\n\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\tYou slam into the co-pilot, crushing him, but also smashing all of the delicate machinery behind him.  This ship will never fly now...\n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tYou decide it's time to try calling the captain of the Slipdagger.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto calling\n\t\t\t\t\t\t\t\t\t\t#I draw my pistol faster, and blast him.\n\t\t\t\t\t\t\t\t\t\t\t- Darkness grows even more within you...\n\n\t\t\t\t\t\t\t\t\t\t\t*set dark %-50\n\t\t\t\t\t\t\t\t\t\t\tYour blaster, no matter how skilled you are at using it, fires bolts of unstable energy.  You blast the co-pilot in half, and he crashes back into the delicate inner workings of the ship, sending out showers of sparks.\n\n\t\t\t\t\t\t\t\t\t\t\tThe ship won't fly now...\n\n\t\t\t\t\t\t\t\t\t\t\tYou decide it's time to try calling the captain of the Slipdagger.\n\t\t\t\t\t\t\t\t\t\t\t*goto calling\n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t#I tell him to calm down, and then when he lowers his guard, I kill him.\n\t\t\t\t\t\t\t\t\t\t\t*if guts \u003c 13\n\t\t\t\t\t\t\t\t\t\t\t\tYou aren't gutsy enough to do that!\n\t\t\t\t\t\t\t\t\t\t\t\t*goto fight2\n\t\t\t\t\t\t\t\t\t\t\t*else\n\n\t\t\t\t\t\t\t\t\t\t\t\t- Darkness grows greatly within you...\n\n\t\t\t\t\t\t\t\t\t\t\t\t*set dark %-70\n\t\t\t\t\t\t\t\t\t\t\t\t*if leadership > 11\n\t\t\t\t\t\t\t\t\t\t\t\t\tThe man calms down, and listens.  You backhand the fool, snapping his neck with the force of your hit.  The ship is yours now!\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto stolenship\n\t\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou try your best, but you just aren't persuasive enough.  He draws his pistol and fires wildly, destroying sensitive machinery while missing you completely.  You blast him back, finishing the job of wrecking the cockpit.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\tThe ship won't fly now...\n\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou decide it's time to try calling the captain of the Slipdagger.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto calling\t\n\n\t\t\t\t\t\t\t\t#I call the captain of the Slipdagger, and offer to split it with him, if he'll come get me and the treasure, and help keep the whole thing secret.\n\t\t\t\t\t\t\t\t\t*set dark %-33\t\t\n\n\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t\t\t\t\t\tThe captain listens to you, interested.  In the end, he offers to do it for two thirds of the treasure.  You argue, but he explains that he'll need to give the Slipdagger's crew some of the money, to keep them quiet.\n\n\t\t\t\t\t\t\t\t\tIn the end you agree.  You give him the co-ordinates and then head back to your landing site to continue with the mission.\n\t\t\t\t\t\t\t\t\t*set gold \"split\"\n\t\t\t\t\t\t\t\t\t*goto settlement\n\n\t\t\t\t\t\t\t\t#I head back to my landing site, and get on with the mission.\n\t\t\t\t\t\t\t\t\t- Light increased\n\n\t\t\t\t\t\t\t\t\t*set dark %+25\n\t\t\t\t\t\t\t\t\t*goto settlement\n\t\t\t\t\t\t\t\t\n\n\t#Up, into the air, to get a better view.\n\t\tBlasting into the air, you hover and take a look around.  The warehouses to the east are even larger than you thought, and you can see that there are some lights on at the landing fields.  Turing, you also notice movement from the farms to the north, but then a large bolt of vivid green blaster fire sizzles past you.  Looking toward the power station, you see two more shots fired from that direction!  What do you do?\n\t\t*label fight3\n\t\t*choice\n\t\t\t#I land as quickly as possible.\n\t\t\t\tUsing your suits thrusters, you blast your way back to the ground just in time to dodge the hail of blaster fire.  However, you hit the ground hard, straining your Armor.\n\t\t\t\t*set armor-5\n\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t*else\n\t\t\t\n\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t*goto settlement\n\t\t\t#I use the suit's shoulder rocket launcher, and try to take out the guns that are firing at me, before I get hit.\n\t\t\t\t*if bionic_1 = \"Cybernetic Eye\"\n\t\t\t\t\tJust before you fire, your cybernetic eye zooms in on the shooters.  There are two of them, and they're dark green skinned and reptilian!  They look like a cross between a person and an alligator.  You've never seen this species before...\n\n\t\t\t\t*if shooting > 12\n\t\t\t\t\tWith incredible accuracy, you take aim and take the two enemies out, one missile each.\n\n\t\t\t\t\t*goto flying_pretty\n\t\t\t\t*else\n\t\t\t\t\tThe enemy blasts come in fast, and you just don't seem to have the accuracy to make a shot this difficult.  They are far away, and there are two of them.  You take one blast square in the chest, and get knocked back into a building.  Your Armor smashes through the wall, then through a couple of internal walls, and THEN you come crashing out the other side of the building!\n\t\t\n\t\t\t\t\t- Glory gained\n\t\t\t\t\t\n\t\t\t\t\t*set infamy %+(6 + (guts + guts))\n\t\t\t\t\t*set armor-16\n\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t*else\n\n\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\tStanding up, you brush pieces of building off of your suit.  You suppose you'll have to go on foot from here!\n\t\t\t\t\t\t*goto settlement\n\t\t\t#I ignore the shots fired at me and blast towards the station, full speed.\n\t\t\t\t*if guts \u003c 12\n\t\t\t\t\tYou aren't gutsy enough to try that!  So what are you going to do?\n\t\t\t\t\t*goto fight3\n\t\t\t\t*else\n\t\t\t\t\tThat takes some guts to do!  As you fly at a full-burn towards the station, several shots streak past you.  Then you suddenly take a hit to the shoulder that knocks you spinning.\n\t\t\t\t\t*set armor-15\n\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t*else\n\t\t\t\t\t\t\n\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\tYou recover, and keep going.  Most of the other shots miss you with the speed you're flying.  As you get closer you see that your enemies look like a cross between a crocodile and a human.  You also see that they're using large shoulder blasters.  Dodging in mid-air, you blast one, and then the other, all the while pulling off some very impressive aerial acrobatics!\n\n\t\t\t\t\t\t*set infamy %+ (guts + (guts + guts))\n\t\t\t\t\t\t- Glory increased\n\n\t\t\t\t\t\t*goto flying_pretty\n\t\t\t\t\t\t\n*label calling\nYou call up the captain of the Slipdagger, and explain your idea.  He asks why they've lost contact with the dropship crew, and you pause too long to think about it.\n\n\"What have you done?!\" cries the captain.  You smile to yourself, and mutter some choice curse words.\n\nSuddenly, the cockpit of the dropship goes blinding white as an incandescent lance of blue flame strikes down from the sky.\n\nIt's as though God Himself were striking you down.\n\n*page_break\n\n*goto_scene Ignoble_Death\n\n*label stolenship\nYou pilot the dropship over to the warehouses, and start to load up.  After about twenty minutes, when you are mostly done, you get a call from the Slipdagger.\n\n\"${name}?  Are you there?\" comes the captain's voice.  \"We're registering you as alive - if able, please respond.\"\n\nWhat do you do?\n*choice\n\t#I ignore the call, and finish loading up the ship.\n\t\tThe captain keeps calling, but in only a few more minutes you are done loading up, and take off.\n\n\t\tAnother call comes through.  \"Dropship pilot, please identify.  This is the Imperial Starship Slipdagger.  If you do not reply, we will be forced to assume that the dropship has been compromised, and we will use deadly force.\"\n\n\t\tWhat will you do now?\n\t\t*choice\n\t\t\t#I run for it!\n\t\t\t\tPutting the dropship's thrusters to full, you soon realize that while this ship can make it to orbit, it's slow and vulnerable in space.  The Slipdagger easily catches up, and opens fire.  The last thing you see is blue white flame slicing the dropship in half, and your Armor as well.  Then the cold black vacuum of space.\n\t\t\t\t*goto_scene Ignoble_Death\n\n\t\t\t#I answer, and try to smooth talk my way out of them attacking me!\n\t\t\t\t*label talkytalk\n\t\t\t\t*if leadership > 12\n\t\t\t\t\tWith your incredible skills of persuasion, you convince the captain that your forces were overrun, and that you are the only survivor.  He tells you to come in and dock with the Slipdagger.\n\n\t\t\t\t\tIt takes some fast talking once you land on the ship.  \n\t\t\t\t\t*label goldx\n\t\t\t\t\tHow do you explain the gold?\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I don't!  I simply forbid anyone from going into the dropship.\n\t\t\t\t\t\t\tHow do you explain that to the captain and his crew?\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#I tell them it's under quarantine.\n\t\t\t\t\t\t\t\t\t*set dark %- 22\n\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t\t\t\t\t\tThe captain seals off the landing bay immediately.\n\n\t\t\t\t\t\t\t\t\tUpon arriving at Mobile Armored Corps station Ajax, your incredible ability with people saves your bacon once again, and you cleverly get all the gold unloaded to a secure storage facility.\n\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t*set gold \"mine\"\n\t\t\t\t\t\t\t\t\t*goto_scene mission_1_Ending\n\t\t\t\t\t\t\t\t#I threaten to blast them if they do.\n\t\t\t\t\t\t\t\t\t*set dark %- 35\n\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t\t\t\t\t\tThat works, but you can't stay awake forever.  The first time you doze off, you wake up with your Armor deactivated, guarded by Military Police.\n\n\t\t\t\t\t\t\t\t\tWhen you get back to Ajax, your court martial meeting is held.  They know everything.  The trial is quick, and the punishment severe - execution.\n\n\t\t\t\t\t\t\t\t\tStanding before a firing squad, the only thing you regret is ... well, pretty much these last few decisions!\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t*goto_scene Ignoble_Death\n\t\t\t\t\t\t\t\t#I tell them it's an order!\n\t\t\t\t\t\t\t\t\t*set dark %- 22\n\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t\t\t\t\t\tShockingly, the captain seals off the landing bay immediately.  You have a very commanding voice!\n\t\t\t\t\t\t\t\t\t*label badtrial\n\n\t\t\t\t\t\t\t\t\tUpon arriving at Mobile Armored Corps station Ajax, your incredible ability to lead saves your bacon once again, and you cleverly get all the gold unloaded to a secure storage facility.\n\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t*set gold \"mine\"\n\t\t\t\t\t\t\t\t\t*goto_scene mission_1_Ending\n\t\t\t\t\t\t#I tell them that I found it lying around.\n\t\t\t\t\t\t\tYeah, no one's ever going to buy that.  The captain gives you a doubtful look, and calls for the ships guards.  What do you do now?\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#I give up.\n\t\t\t\t\t\t\t\t\tThey arrest you, strip you of your Armor, and confine you.\n\t\t\t\t\t\t\t\t\t*goto badtrial\n\t\t\t\t\t\t\t\t#I blast 'em all.\n\t\t\t\t\t\t\t\t\t*label ripcity\n\t\t\t\t\t\t\t\t\tYou cut loose with your shoulder cannon and blaster, and rip the Slipdagger apart from the inside.  You hit a fuel line, and the entire ship explodes in a ball of white hot flame.\n\n\t\t\t\t\t\t\t\t\tBetter than a firing squad!\n\t\t\t\t\t\t\t\t\t*goto_scene Ignoble_Death\n\t\t\t\t\t\t#I kill the crew of the Slipdagger, and take over the ship.\n\t\t\t\t\t\t\t*if guts \u003c 12\n\t\t\t\t\t\t\t\tBold idea, but you just don't have the guts to do it!\n\t\t\t\t\t\t\t\t*goto goldx\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*set dark %-75\n\t\t\t\t\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t\t\t\t\t*if shooting > 10\n\t\t\t\t\t\t\t\t\tYou cut loose with your shoulder cannon and blaster, and your training serves you well.  You hunt through the ship, killing the crew.  You enjoy it.  You've gone completely over to the darkness...\n\t\t\t\t\t\t\t\t\t*set dark 1\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tOnce the ship is secured, you head back to the orbital station Ajax.  With your boldness and leadership, you come up with a clever story about the lizard creatures invading the ship and killing the crew.\n\n\t\t\t\t\t\t\t\t\tThe fools at home eat it up.\n\t\t\t\t\t\t\t\t\t*set gold \"mine\"\n\t\t\t\t\t\t\t\t\t*goto_scene mission_1_Ending\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tYou fight hard, but you just aren't a good enough shot to pull this off.\n\t\t\t\t\t\t\t\t\t*goto ripcity\n\t\t\t\t\t\t\t\t\n\t\t\t\t*else\n\t\t\t\t\tThe captain of the Slipdagger seems interested at first, or at least confused, but quickly seems to decide that you're insane.  You just aren't commanding enough.  Bummer.\n\n\t\t\t\t\t\"Gunners,\" you hear him say, almost casually, \"fire when ready.\"\n\n\t\t\t\t\tThe last thing you see is blue white flame slicing your ship and your Armor to pieces, and the cold black vacuum of space.\n\t\t\t\t\t*goto_scene Ignoble_Death\n\n\t#I answer, and try to talk my way out of trouble.\n\t\t*goto talkytalk\n*label headingwest\n*finish_advertisement\n\n*label flying_pretty\n\nYou rocket up to the station, and land on the roof near where your attackers had been standing.\n*finish_advertisement\n", "mission_1_regroup": "*if troopcount \u003c 3\n\t*goto balto\n*else\n\t*goto spiderpig\n\n*label spiderpig\n*if morale > 60\n\tAs you step into the room with the troopers, you see that they look dirty and tired, but they're still amped and ready to fight.  \"Sir!\" one of them calls, \"Welcome back, sir!\"\n\n\tAnother trooper steps forward and shows you his \"collection\".  He has several long spikes covered in yellow gore.  \"I took 'em off the lizard' tails!\" he says enthusiastically.  \"I'm gonna make a necklace!\"\n\n\tDo you reprimand him?\n\t*choice\n\t\t#Yes I do.\n\t\t\t- Light increased\n\t\t\t*set dark %+33\n\n\t\t\tYou slap the gory spikes from the trooper's hands, glare at him and growl, \"You are better than this.  These are intelligent creatures.  If you must take trophies, take their weapons.\"  The other troopers look at you, clearly shamed.\n\n\t\t\t*set morale %-33\n\t\t\t- Morale decreased\n\n\t\t\t*goto recovered\n\t\t#No I don't.\n\t\t\tYou slap the trooper on the back, smile and say, \"Good man!  The teeth would make good trophies, too!\"  The trooper looks back at you with a wicked grin.\n\n\t\t\t- Darkness grows within you...\n\t\t\t*set dark %-33\n\t\t\t\n\t\t\t*goto recovered\n*else\n\tAs you step into the room with the troopers, you see that they look dirty, tired and some are wounded.  One trooper spots you, screams, \"We're all gonna die!\" and tries to run past you.\n\n\tWhat do you do?\n\t*goto coward\n\n*label coward\n*choice\n\t#I kill him as an example.\n\t\tYou clock the idiot in the face with an arm bar as he tries to pass you.  He gets knocked to the ground, nose broken and bleeding.  As he lies there whimpering, you turn to the rest of the troops.  \"You are NOT all going to die.  Just this man, for deserting his post.\"\n\n\t\tYou draw your blaster pistol, and end his whimpering.\n\n\t\t- Darkness grows within you...\n\t\t*line_break\n\t\t- Moral increased\n\t\t*set dark %-50\n\t\t*set morale %+50\n\t\t*set troopcount-1\n\n\t\t*goto recovered\n\t#I let the poor man go.  He's no use to me anyway.\n\t\tYou step to the side, and watch as the wretched coward runs off down the hallways of the Power Station, crying loudly.  At least he'll live - in his current state he couldn't have lasted long against enemies.\n\n\t\t- Light increased\n\t\t*set dark %+33\n\n\t\tAs you turn and look back at the rest of the troops, however, you can see that several of them are thinking about running now, too.  \n\t\n\t\t- Morale decreased\n\t\t*set morale %-50\n\t\t*set troopcount-1\n\n\t\t*goto recovered\n\t#I catch him, slap him around a bit, and tell him to fall in.\n\t\tYou catch him by his uniform, and hoist him into the air in front of you.  He whimpers and cries, dripping tears and snot across the front of his uniform.  Lightly, so you don't kill him, you slap him across the face a few times.  Even lightly though, with your metal gauntlets, you manage to bloody his face.\n\n\t\t- Darkness grows within you...\n\t\t*set dark %-22\n\n\t\tHe stops whimpering, and stares at you, terrified.  You command him to fall in, and drop him to the ground, roughly.  As he crawls back to the rest of the troops, they all stare at you in fear.  That's good.  Better they be afraid of you than the enemy. \n\n\t\t- Morale increased\n\t\t*set morale %+ (leadership + (leadership + leadership))\n\n\t\t*goto recovered\n\t#I stop him, and inspire him with words of encouragement.\n\t\t*if leadership > 12\n\t\t\tYou step in front of him and give an incredible speech, rousing and passionate, about the honor of serving the empire, about how he and the other troopers are heroes, and how these poor colonists NEED them.\n\n\t\t\tWiping his face, he looks at you with awe and falls back in with the others.\n\t\t\t\n\t\t\t- Morale increased greatly\n\t\t\t*set morale %+70\n\n\t\t\t*goto recovered\n\t\t*elseif leadership = 12\n\t\t\tYou step in front of him and give a good speech, but he only stares at you, eyes still haunted.  You speak more, and after a while he calms down and slowly rejoins the rest of the troops.\n\n\t\t\t*goto recovered\n\t\t*elseif leadership >=10\n\t\t\tYou step in front of him, and you TRY to encourage him, but your words don't seem to get through.  In fact, as the other troopers watch, you can see that this man's fear is starting to have an effect on them.\n\n\t\t\t- Morale decreased\n\n\t\t\t*set morale %-25\n\t\t\tWhat do you do?\n\t\t\t*goto coward\n\t\t*else\n\t\t\tYou step in front of him, and you say some stuff.  That's about the extent of it.  He looks at you, dumbfounded.  One of the other troops starts to chuckle, and then laughter breaks out.  They're definitely laughing AT you, but still, it broke the tension!\n\n\t\t\t- Glory increased\n\t\t\t*set infamy %+ guts\n\n\t\t\t*goto recovered\n\n\n*label recovered\nLooking around the room you see that there are ${troopcount} Shock Troopers still standing.\n\n\"Captain ${name},\" calls the sergeant, \"What are your orders?\"\n\nWhat would you like to do?\n*choice\n\t#Bark for the sergeant to come and tell you what they've found.\n\t\tIt seems that there's no sign of humans being here recently.  When the troopers came in through the roof, they encountered strong resistance from the Saurian creatures, but the sergeant thinks that this last group might have been all that were left.  He also says that he thinks he received a small piece of a garbled transmission earlier, but he couldn't make it out.  But that it WAS a human voice, and sounded female.  He thinks the transmission came from somewhere within the power station complex.  He also adds that they spotted some kind of lab, and that it didn't look like it was designed for humans.  Finally, he tells you about a weapon’s locker they found that looked like it had blaster weapon upgrade modules.\n\t\t\n\t\tWhat are your orders?\n\t\t*choice\n\t\t\t#I tell them to spread out and search the building.\n\t\t\t\t*goto spreadout\n\t\t\t#I tell them to form up on me, and that we are going to search the building together.\n\t\t\t\t*goto search\n\t\t\t#I tell them to take me to the alien lab.\n\t\t\t\t*goto strangescience\n\t\t\t#I tell them to take me to the weapons locker.\n\t\t\t\t*goto weaponslocker\n\n\t#Commend the troops, and give them some words of encouragement.\n\t\tYou tell the troops that they have done well, and that those who have fallen will be remembered.\n\n\t\t- Morale increased\n\n\t\tAfter they have taken a moment, what are your orders?\n\t\t*set morale %+ (leadership + (leadership + leadership))\n\t\t*choice\n\t\t\t#I tell them to spread out and search the building.\n\t\t\t\t*goto spreadout\n\t\t\t#I tell them to form up on me, and that we are going to search the building together.\n\t\t\t\t*goto search\n\n\t#Order the troops to spread out and secure the building.\n\t\t*goto spreadout\n*label weaponslocker\nThe sergeant leads you and the remaining ${troopcount} Shock Troopers down a short hallway and up a flight of stairs to the security office.  Inside you find what they were talking about - a blaster pistol upgrade module!  However, it might not be a match to the same type of blaster pistol that you use.  You scan it with your Oracle, and get an idea of how to try it out.\n\nDo you want to try and attach the module to your blaster pistol?\n*choice\n\t#Yes.\n\t\t*if technical > 12\n\t\t\tWith your incredible technical skill and know-how, you've managed to upgrade your pistol quite a bit!\n\n\t\t\t*set shooting+2\n\t\t\t- Shooting increased greatly\n\n\t\t\tNow what do you want to do?\n\t\t\t*choice\n\t\t\t\t#I tell the Shock Troopers to spread out and search the building.\n\t\t\t\t\t*goto spreadout\n\t\t\t\t#I tell the troops to form up on me, and that we are going to search the building together.\n\t\t\t\t\t*goto search\n\t\t*elseif technical > 10\n\t\t\tWith some time, you tweak the module enough to eventually get it to merge with your pistol's battery.  You can't shake the feeling, however, that if you only knew more you could have gotten more out of it!\n\n\t\t\t*set shooting+1\n\t\t\t- Shooting increased\n\n\t\t\tNow what do you want to do?\n\t\t\t*choice\n\t\t\t\t#I tell the Shock Troopers to spread out and search the building.\n\t\t\t\t\t*goto spreadout\n\t\t\t\t#I tell the troops to form up on me, and that we are going to search the building together.\n\t\t\t\t\t*goto search\n\t\t*else\n\t\t\tYou work on the module for a while, but you just can't figure out how to get the thing to match up.  You get the feeling that it's possible, but that you just don't know how...\n\n\t\t\tAfter about twenty minutes of working on it, the module pops loudly and shocks you, making you jump back and smash into a counter.  The troopers start to laugh!\n\n\t\t\t- Glory increased\n\t\t\t*set infamy %+15\n\n\t\t\tNow what do you want to do?\n\t\t\t*choice\n\t\t\t\t#I tell the Shock Troopers to spread out and search the building.\n\t\t\t\t\t*goto spreadout\n\t\t\t\t#I tell the troops to form up on me, and that we are going to search the building together.\n\t\t\t\t\t*goto search\n\t#No.  I want to get back to the mission!\n\t\tWhat do you want to do?\n\t\t*choice\n\t\t\t#I tell the Shock Troopers to spread out and search the building.\n\t\t\t\t*goto spreadout\n\t\t\t#I tell the troops to form up on me, and that we are going to search the building together.\n\t\t\t\t*goto search\n\n*label strangescience\nThe sergeant leads you and the remaining ${troopcount} Shock Troopers down a dark hallway and through several offices.  Turning a corner, you step into a large room that looks like it used to be a gymnasium.  Now several temporary-looking tables and shelves stand in the center of the room.  Stepping up to the main table, you find three glass vials filled with different colors, and a hypo-spray injector lying next to them.\n\nOn the other shelves, you find all kinds of beakers and papers, along with two computer consoles, but nothing is written in a language that you know.\n\nOne of the troopers calls out from off to the side with a shaky voice, \"Uh, sir?\"\n\nTurning, you see that part of the gym floor has been removed, and that a large bubbling pool of pinkish yellow liquid has been set into the floor.  Tubes run from the pool into the machinery of the make-shift lab.\n\nWhat do you do?\n*label scienceloop\n*choice\n\t#I use my Oracle to scan this material.\n\t\tAfter a moment, the Oracle reports that the liquid in the vials is made to be genetically reactive to human tissues.  The Oracle also reports that the liquid in the vat set into the floor is rendered down human material.  You contact the Slipdagger, and the ship's medical specialist looks at the data, and cringes.  \"These aliens must be pretty handy with medicine,\" the ship's doctor says.  \"I can't guess what those vials are for.  I CAN tell you that the red one looks like a hormonal booster, and that the green one should have the highest levels of reactivity.  Honestly, the green one looks dangerous...\n\n\t\t\"If you are thinking about injecting yourself, sir, I would suggest not.  When this mission is over, we'll be able to send in specialists to see what this crud is...\"\n\t\t\n\t\tSo what do you do?\n\t\t*goto scienceloop\n\t#I grab one of the vials and inject myself with it!\n\t\t*label injection\n\t\tWith a hissing click, you remove your helmet.  There are four colors - which one do you use?\n\t\t*choice\n\t\t\t#Blood red\n\t\t\t\tYou snap the vial with the thick blood red liquid into the injector, place it to your neck and press the button.\n\n\t\t\t\tEverything goes silent and white.\n\n\t\t\t\tAfter several moments, you can hear the distant sound of screaming.  Swirling colors swim in your vision.  Slowly, your senses return and you realize that you are the one screaming.  Looking around, you see one trooper dead at your feet, the lab has been destroyed, and there's blood dripping from your fists.  The remaining ${troopcount} troopers are cringing away from you, terrified.\n\t\t\t\t*page_break\n\n\t\t\t\tYou also notice that you ache all over.  Your Armor feels too tight.  Moving your arms, you realize that you are stronger than you used to be.  Stronger, and angrier.  However, you're having a hard time focusing your vision in one place for very long.  Eyes darting, you access your Oracle and set it to scan yourself.  After a moment, the Oracle reports that you have experienced a 13% gain in body mass, that your adrenaline levels are spiked.  There's something wrong, however, with your vision.\n\t\t\t\t*set fighting+2\n\t\t\t\t*set guts+1\n\t\t\t\t*set shooting-2\n\t\t\t\t*set troopcount-1\n\t\t\t\t*set morale%-50\n\t\t\t\t*set dark%-15\n\t\t\t\t*set leadership-1\n\t\t\t\t*set infamy%-30\n\t\t\t\n\t\t\t\t- Fighting increased greatly\n\t\t\t\t*line_break\n\t\t\t\t- Guts increased\n\t\t\t\t*line_break\n\t\t\t\t- Shooting decreased greatly\n\t\t\t\t*line_break\n\t\t\t\t- Leadership decreased\n\t\t\t\t*line_break\n\t\t\t\t- Darkness grows within you...\n\t\t\t\t*line_break\n\t\t\t\t- Glory lost...\n\n\t\t\t\tThe pain wracking your body slowly settles, and you feel your heartbeat settle into a regular rhythm.  The remaining troops say something about continuing to search the complex, and back towards the door.\n\t\t\t\t*goto spreadout\n\n\t\t\t#Yellow green\n\t\t\t\tYou snap the vial with the slick yellow green liquid into the injector, place it to your neck and press the button.\n\n\t\t\t\tAt first you don't feel anything.  Suddenly, you get a splitting headache, and then you start to scream.  Your body convulses inside your Armor, making you spasm violently.  The troopers watch in horror as you start to violently dig your armored gauntlets into your arms and legs, ripping away chunks of metal and machinery.  Your left hand is exposed, and you hold it up to see that it has turned green... and scaly.  You try to cry out, only to make a hissing, gargling sound.  The Shock Troopers raise their rifles and fire...\n\t\t\t\t*goto_scene Combat_Death\n\n\t\t\t#Shimmering blue\n\t\t\t\tYou snap the vial with the sparking blue liquid into the injector, place it to your neck and press the button.\n\n\t\t\t\tA painful wave of cold washes over your body.  Then another one.  Then another.  Shivering, you set your Armor to regulate your temperature, but it reports that it already is, and that your temperature is normal.\n\n\t\t\t\tYou fall to the floor, shivering.  The Shock Troopers gather around, but you simply lay there, unresponsive.  Finally, you lapse into a deep sleep.\n\t\t\t\t*page_break\n\n\t\t\t\tWhen you awaken, the first thing you notice is the silence.  Sitting up, you see that the lab has been removed, and that there's no sign of the Shock Troopers.  Standing up and looking around, you suddenly realize that your movements are somehow more graceful and fluid.  You check your Oracle, and it reports that your joints have been slightly altered, making your motions more graceful and smooth.  The Oracle doesn't know how long these effects will last.\n\n\t\t\t\tYou go back to looking around the room, and see the marks of a battle.  Two troopers lie dead in the corner.  Looking closer, you see that while you were knocked out, a group of the lizard creatures must have attacked the room.  You access your Oracle, and sure enough, all of the Shock Troopers are dead.  You ponder a moment, thinking about what would cause the lizards to not spot you lying on the floor?\n\n\t\t\t\t*set stealth+3\n\t\t\t\t*set troopcount 0\n\t\t\t\t*set dark%-15\n\t\t\t\t*set infamy%-15\n\t\t\t\n\t\t\t\t- Stealth increased GREATLY\n\t\t\t\t*line_break\n\t\t\t\t- Darkness grows within you...\n\t\t\t\t*line_break\n\t\t\t\t- Glory lost...\n\n\t\t\t\tThe pain wracking your body slowly settles, and you feel your heartbeat settle into a regular rhythm.\n\t\t\t\t*goto balto\n\n\t#I grab one of the troopers and inject HIM with one of the vials.\n\t\t- Darkness grows within you...\n\n\t\t*set dark %-50\n\t\tYou casually grab a trooper and spin him around into a headlock.  The other troopers raise their rifles, and tell you to let him go.  What do you do?\n\t\t*choice\n\t\t\t#I inject him.\n\t\t\t\t- Darkness grows within you...\n\t\t\t\t*set dark%-65\n\n\t\t\t\tYou reach for a vial, and the other troopers watch in stunned, horrified silence.  As you lift the injector to the trooper's neck, he starts screaming.  One of the troopers watching fires, and then suddenly the whole group opens up and starts shooting.  Bullets slam into you, knocking you back into the table and sending glass beakers smashing to the ground!\n\t\t\t\t*set armor-18\n\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t*else\n\t\t\t\t\t*page_break\t\t\n\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\tTossing the now dead trooper you were holding aside, you start blasting back!  Within moments, the lab is ruined, and all of the troopers are dead.\n\t\t\t\t\t*set troopcount 0\n\t\t\t\t\t*set infamy%-30\n\n\t\t\t\t\t- Glory lost...\n\n\t\t\t\t\t*goto balto\n\n\t\t\t#I let him go, and tell them all it was a joke!\n\t\t\t\t*if leadership > 11\n\t\t\t\t\tYour incredible charismatic charm wins them over, and they start laughing!\n\t\t\t\t\t*set morale%+30\n\n\t\t\t\t\t- Morale increased\n\t\t\t\n\t\t\t\t\tYou decide to keep moving, and to get on with the mission.\n\t\t\t\t\t*goto search\n\t\t\t\t*else\n\t\t\t\t\tThe solders don't buy it for a minute.\n\n\t\t\t\t\t- Morale lost...\n\t\t\t\t\t*set morale %-50\n\n\t\t\t\t\tYou tell them to get on with the mission.\n\t\t\t\t\t*goto search\n\t\t\t#I kill them all.\n\t\t\t\t- Darkness grows within you...\n\t\t\t\t*set dark%-40\n\n\t\t\t\tYou draw your pistol, and blast one of the troopers.  \n\n\t\t\t\tThe rest immediately open fire.  Bullets slam into your Armor, and rockets and blaster fire reduce the lab to blackened ruins.  You take several explosive bullet rounds to the chest and helmet!\n\n\t\t\t\t*set armor-15\n\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t*else\n\t\t\t\t\t*page_break\t\t\n\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\tTossing the now dead trooper you were holding aside, you start blasting back!  Within moments, all of the troopers are dead.\n\t\t\t\t\t*set troopcount 0\n\t\t\t\t\t*set infamy%-30\n\n\t\t\t\t\t- Glory lost...\n\n\t\t\t\t\t*goto balto\n\t#I burn the place down, and get back to the mission.\n\t\tYou tell the troops to fall back, and toss a grenade into the room.  The blast sets several of the liquids on fire, and destroys the temporary lab.\n\n\t\tWhat do you tell the troops?\n\t\t*choice\n\t\t\t#Spread out and search the complex.\n\t\t\t\t*goto spreadout\n\t\t\t#Form up on me, and we'll search it together.\n\t\t\t\t*goto search\n*label spreadout\n*if troopcount \u003c 1\n\tYou set out to search the place alone.  Your heavy footfalls echo through the deafening silence of the place.  You find a locker room, several offices and a weight training area, but they are all dark and silent.  Eventually, you hear sounds while on the South side of the station.  You creep up to the edge of a large door, and peek in.\n\n\t*goto battle_alone\n\n*elseif troopcount \u003c 2\n\tThe one remaining trooper bravely heads out and searches the place while you do the same, in another direction.  You find a locker room, several offices and a weight training area, but they are all dark and silent.\n\n\tA crackle comes over your helmet, followed by, \"Sir, are you there?  Sir!  I've encountered a pocket of resistance on the south end of the station.  I-\"\n\n\tThe transmission cuts off.  Flipping open your Oracle, you see the last Shock Trooper's vitals flat line.  Digging in your heels, you sprint towards the south side of the power plant.\n\n\t*set troopcount -1\n\t*goto battle_alone\n\n*elseif troopcount \u003c 5\n\tThe troopers head out and search the place while you do the same, alone.  You find a locker room, several offices and a weight training area, but they are all dark and silent.\n\n\tA crackle comes over your helmet, followed by, \"Sir, are you there?  Sir!  We've encountered a pocket of resistance on the south end of the station.  We-\"\n\n\tThe transmission cuts off.  Flipping open your Oracle, you see the last Shock Trooper's vitals flat line.  Digging in your heels, you sprint towards the south side of the power plant.\n\n\t*set troopcount -4\n\t*goto battle_alone\n\n*elseif troopcount = 5\n\n\tThe troopers head out and search the place while you do the same, alone.  You find a locker room, several offices and a weight training area, but they are all dark and silent.\n\n\tA crackle comes over your helmet, followed by, \"Sir, are you there?  Sir!  We've encountered a pocket of resistance on the south end of the station.  We-\"  The transmission crackles, and then a shaky voice comes back on, saying, \"Sir, they're all dead!  I'm the last one left.  Sir, we've found something, here on south-\"\n\n\tThe transmission cuts off.  Flipping open your Oracle, you see the last Shock Trooper's vitals flat line.  Digging in your heels, you sprint towards the south side of the power plant.\n\n\t*set troopcount -5\n\t*goto battle_alone\n\n*else\n\tThe troopers head out and search the place while you do the same, alone.  You find a locker room, several offices and a weight training area, but they are all dark and silent.\n\n\tA crackle comes over your helmet, followed by, \"Sir, are you there?  Sir!  We've encountered a pocket of resistance on the south end of the station.  We think the lizards are guarding something of importance.  Sir, I have three troopers down, and... make that four.  Sir, please come as quickly as you can!\"\n\n\tFlipping open your Oracle, you see that ${troopcount} troopers remain alive.  Digging in your heels, you sprint towards the south side of the power plant.\n\n\t*set troopcount-4\n\t*goto southside\n\n*label search\nAs you and the troops search, you find that the place is completely empty of people.  You find a locker room, several offices and a weight training area, but they are all dark and silent.\n\n\"This place is empty, sir,\" says the Shock Trooper sergeant.  \n\nYou send out a scanner sweep, and catch something faint up ahead.  \"Stay back,\" you tell the troops and you head forward alone, pistol ready.  As you turn a corner, you feel something slam into you.  Looking down you see a silvered machete jutting from your Armor's groin!  Crouching to the side of the hallway is a Saurian wearing another one of those lightly armored suits.  It hisses menacingly. \n*set armor-13\n*if armor \u003c 1\n\t*goto_scene Combat_Death\n*else\n\t*page_break\t\t\n\t- Armor damaged, down to ${armor} percent!\n\n\tFurious, you glance down at the machete wedged in your groin armor, then look back at the lizard standing in front of you.  It looks confused, and a little nervous. You backhand it across the face, sending it crashing against the wall.\n\n\tThe armored Saurian gets back to its feet and spins, trying to gash you with its spiked tail.  You side step, and blast the creature twice with your pistol.  The lizard's smoldering body falls, dead.\n\n\tWrenching the machete out of your armor, you hand it to one of the Shock Troopers as a souvenir.\n\t*page_break\n\n\n\tWhen you come near the south side of the complex, your scanners pick up confusing signals.  One of the Shock Troopers says that he thinks he hears something up ahead.  What do you want to do?\n\t*goto backtracka\n*label backtracka\n*choice\n\t#I head in the direction of the confusing readings, taking the soldiers with me.\n\t\t*goto southside\n\t#I tell the soldiers to head back to the drop ship, and I continue on to check out the confusing readings alone.\n\t\t*set dark %+ 20\n\t\t*set infamy %+ guts\n\n\t\t- Glory increased\n\t\t*line_break\n\t\t- Light increased\n\t\t*goto battle_alone\n\t#I order the Shock Troops to go check out the southern rooms, and report back to me.\n\t\tThe troops look nervous, but head out.  After a moment, you hear some shots fired, and a trooper runs back to you, telling you that there are a huge number of lizards up ahead, and that they need your help!\n\n\t\tWhat do you do?\n\t\t*choice\n\t\t\t#I go with the trooper.\n\t\t\t\t*goto southside\n\t\t\t#I tell the trooper to buck up, head back, and for them to take care of this themselves!\n\t\t\t\t*set morale %-40\n\t\t\t\t*set infamy %-30\n\t\t\t\t*set dark %-33\n\t\t\t\tThe trooper whines, and squeaks out a \"yes sir!\" before he runs back to the fight.\n\n\t\t\t\t- Morale lost...\n\t\t\t\t*line_break\n\t\t\t\t- Glory lost...\n\t\t\t\t*line_break\n\t\t\t\t- Darkness grows within you...\n\n\t\t\t\tThis is what the troopers are here for.  You sit back, and let them prove themselves.  They'll either do well, or they'll die.  You sit back and listen to the combat, watching your console to see how it plays out.\n\t\t\t\t*page_break\n\t\t\t\t*if morale \u003c 40\n\t\t\t\t\tThe troops don't seem to be fighting as hard as they could.  You watch your console, and see blip after blip wink out.  Eventually, the last one winks out, and you can hear the sounds of hissing and screeching.  It sounds like the lizards won.  You decide to head down, and clean up the mess the troopers left behind.\n\t\t\t\t\t*set dark %-17\n\t\t\t\t\t*set enemy \"weakened\"\n\t\t\t\t\t*set troopcount 0\n\t\t\t\t\t*set morale \"NA\"\n\n\t\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t\t*goto battle_alone\n\t\t\t\t\t\n\t\t\t\t*elseif morale \u003c=60\n\t\t\t\t\tThe troops seem to fight ok, but they have a hard time of it.  The fighting lasts a very long time.\n\n\t\t\t\t\t*set troopcount-6\n\t\t\t\t\tDo you want to let them finish this out on their own, or go help them?\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#They're doing fine!  I leave them to it.\n\t\t\t\t\t\t\t*set troopcount-6\n\t\t\t\t\t\t\t*if troopcount \u003c 1\n\t\t\t\t\t\t\t\tThe troops don't seem to be fighting as hard as they could.  You watch your console, and see the last the last trooper's vitals flat line.  You can still hear the sounds of hissing and screeching.  It sounds like the lizards won.  You decide to head down, and clean up the mess the troopers left behind.\n\t\t\t\t\t\t\t\t*set enemy \"weakened\"\n\t\t\t\t\t\t\t\t*set dark %-20\n\t\t\t\t\t\t\t\t*set troopcount 0\n\t\t\t\t\t\t\t\t*set morale \"NA\"\n\n\t\t\t\t\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t\t\t\t\t*goto battle_alone\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*goto pulledthrough\n\t\t\t\t\t\t#I go see if I can bail them out.\n\t\t\t\t\t\t\t*goto southside\n\t\t\t\t*else\n\t\t\t\t\t*label pulledthrough\n\n\t\t\t\t\tThe battle rages for some time, and you see several trooper signatures wink out on your Oracle, but eventually they pull through and win!\n\t\t\t\t\t*set troopcount-5\n\t\t\t\t\t*if troopcount \u003c 1\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou go to check on them, and find that somehow, while they did take out all the lizards, they managed to get themselves all killed, too.  Well, at least they died with honor, right?  Or something like that.  At least you didn't have to get hurt, and that's what's truly important...\n\n\t\t\t\t\t\tLooking around the room, digging through rubble and remains, you find a trap door set into the floor...\n\t\t\t\t\t\t*set dark %-40\n\t\t\t\t\t\t*set troopcount 0\n\t\t\t\t\t\t*set morale \"NA\"\n\t\t\t\t\t\t*set infamy %-38\n\n\t\t\t\t\t\t-Glory lost...\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t-Darkness grows within you...\n\n\t\t\t\t\t\t*goto trapdoor\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou go check on them, and see a room smeared with red and yellow blood, smoking and devastated.  The remaining troops, all ${troopcount} of them, stand panting and in shock, wide eyed, staring at nothing.\n\n\t\t\t\t\t\t\"Excellent work,\" you say offhandedly, striding through the carnage, checking the place out.  It's really quite a mess.  Digging through rubble and remains, you find a trap door set into the floor...\n\t\t\t\t\t\t*set morale %-40\n\t\t\t\t\t\t*set infamy %-40\n\t\t\t\t\t\t*set dark %-40\n\n\t\t\t\t\t\t- Morale lost...\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t- Glory lost...\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll tell them that you will deal with this trapdoor alone.\n\t\t\t\t\t\t*goto trapdoor\n\t\t\n\t*if backtrack != 1\n\t\t#I keep searching.\n\t\t\tLooking around, you do find a couple of interesting things:\n\n\t\t\tFirst, you notice that nothing is locked down.  Everything has simply been abandoned.  In fact, there's no sign of struggle at all.  That's strange.\n\n\t\t\tSecond, the readings from your scanners get more and more muddled the closer you get to the south side of the complex.  Something isn't right there.\n\t\t\n\t\t\tWhat would you like to do now?\n\t\t\t*set backtrack 1\n\t\t\t*goto backtracka\n\n*label battle_alone\n\nThe south room is a large machine works, with crocodile-faced Saurians guarding a heavy trap door set into the ground.\n\n*if enemy=\"weakened\"\n\tThe walls are smeared with red and yellow blood, and the place looks devastated.  It looks like the troopers fought hard, and weakened the enemy for you - there are only about six lizards left.\n\t*goto attack_alone\n\t\n\n*else\n\tThere looks to be about 15 or 20 of the lizards in all.  Would you like to call the Shock Troopers for backup?\n\n\t*choice\n\t\t#Absolutely!  There are just too many of them!\n\t\t\tYou fall back, and regroup with the troops\n\t\t\t*set infamy %-30\n\n\t\t\t- Glory lost...\n\n\t\t\t*goto southside\n\t\t#No, this is a battle I'd like to fight alone.\n\t\t\t*set guts + 1\n\t\t\t*set infamy %+ (guts + (guts + guts))\n\t\t\t*set dark %+50\n\n\t\t\t- Guts increased\n\t\t\t*line_break\n\t\t\t- Glory increased\n\t\t\t*line_break\n\t\t\t- Light increased\n\n\t\t\t*goto attack_alone\n\n*label attack_alone\n*set alone \"yes\"\n\nWhat would you like to do?\n*choice\n\t*if enemy !=\"weakened\"\n\t\t#I soften up the large group of Lizards with a couple of grenades and missiles!\n\t\t\tYou lob a small clutch of grenades in a high arc, and then spring from hiding, launching two missiles from your shoulder cannon.  The missiles and grenades explode simultaneously, and several lizards are blown apart in the assault.  One lizard spots you, however, and hurls a shimmering curved dagger.  The blade embeds in your gut armor, and releases a shocking jolt!\n\t\t\t*set armor-4\n\t\t\t*if armor \u003c 1\n\t\t\t\t*goto_scene Combat_Death\n\t\t\t*else\n\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\tYou wrench the small blade free, and look up at the lizard.  You notice now that it’s slightly taller and slimmer than the other alligator faced aliens that you’ve killed today.  It smiles at you, and draws two more shimmering daggers from behind its back.  You duck back behind a support beam and hear the daggers slam into the other side.  Ducking around the beam, you take one quick shot, blasting the tall lizard in the shoulder.\n\t\t\t\t\n\t\t\t\tWhat do you do now?\n\t\t\t\t*set enemy \"weakened\"\n\t\t\t\t*choice\n\t\t\t\t\t#I kick in my boosters, and hurl myself into the room, taking them on at close range!\n\t\t\t\t\t\t*goto fighting_alone\n\t\t\t\t\t#I hurl the rest of the grenades I have, launch missiles, and demolish the area!\n\t\t\t\t\t\t*goto boomshakalaka\n\t\t\t\t\t#I shift to a better position, and blast these toothy lizards at range!\n\t\t\t\t\t\t*goto shooting_alone\n\t#I attack them head on, using my boosters to launch myself in among them.  If they want to shoot me, they'll have to shoot their friends, too!\n\t\t*label fighting_alone\n\n\t\tYour bravery is the stuff of legends.  Basting your way into the room, you slam into two of the lizards, killing them instantly.  Unfortunately, this does make it easy for one of them to bury its machete in your side.  Sparks blast as the glowing blade bites deep.\n\t\t*set armor-10\n\t\t*set infamy %+ (guts + (guts + guts))\n\t\t*if armor \u003c 1\n\t\t\t*goto_scene Combat_Death\n\t\t*else\n\n\t\t\t- Armor damaged, down to ${armor} percent!\n\t\t\t*line_break\n\t\t\t- Glory increased\n\n\t\t\t*page_break\n\n\t\t\t*if enemy=\"weakened\"\n\t\t\t\t*if fighting > 12\n\t\t\t\t\tThe remaining four lizards are easy prey.  You know to avoid their tails and machetes, and in moments it's done.  You scrape a lizard's remains off the bottom of your boot, and stride over to the trap door.\n\t\n\t\t\t\t\t*if troopcount > 0\n\t\t\t\t\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll tell them that you will deal with this trapdoor alone.\n\t\t\t\t\t\t*goto trapdoor\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto trapdoor\n\t\t\t\t*elseif fighting > 10\n\t\t\t\t\tYou hurl yourself into their midst, crushing one lizard under your heavy armored boots.  A second lizard fires at you, but you spin out of the way and the shot hits a third lizard in the face!  Laughing, you lunge at the shooter, only to be shot in the side by a fourth lizard.  The blast knocks you to your hands and knees, and your vision blurs for a moment.\n\t\t\t\t\t*set armor-6\n\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t*else\n\n\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\tYou shake your head, clearing it, and spot a lizard rushing at you with two shimmering machetes.  Firing your boosters, you rocket forward and crush the lizard under your bulk.  You stand up in time to see the last lizard running for the door.  Almost instinctively, you launch a shoulder rocket that blasts the reptile in the back.\n\n\t\t\t\t\t\tAnd just like that, the room is clear!\n\n\t\t\t\t\t\t*if troopcount > 0\n\t\t\t\t\t\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll tell them that you will deal with this trapdoor alone.\n\t\t\t\t\t\t\t*goto trapdoor\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto trapdoor\n\n\t\t\t\t*else\n\t\t\t\t\tThe fight is tough.  You get in one good punch, but then a lizard darts in with a slice into the chest plate of your Armor, grinding it in deep!\n\t\t\t\t\t*set armor-15\n\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t*else\n\n\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\tStaggering back, you wrench the blade out of your chest, and use it to decapitate the lizard that struck you.  The other three are easy prey - you crush the spine of one with a leaping kick, punch the third so hard he spattered against a wall, and hurled the machete into the back of the last lizard as it tried to run away.\n\t\t\t\t\t\t*set infamy %+ (guts + (guts + guts))\n\n\t\t\t\t\t\t- Glory increased\n\n\t\t\t\t\t\t*if troopcount > 0\n\t\t\t\t\t\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll tell them that you will deal with this trapdoor alone.\n\t\t\t\t\t\t\t*goto trapdoor\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto trapdoor\n\t\t\t*else\n\t\t\t\n\t\t\t\tUnfortunately, that leaves quite a few left!  \n\n\t\t\t\t*if fighting > 12\n\t\t\t\t\tYour skill and prowess serve you well.  Spinning, leaping and lashing out with metal boots and gauntlets, you are soon covered in their yellow blood.  But, even so, there are just too many of them.  One lizard gets a good slice into the chest plate of your Armor!\n\t\t\t\t\t*page_break\n\t\t\t\t\t*set armor-11\n\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t*else\n\n\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\tStaggering back, you wrench the blade out of your chest, and use it to decapitate the lizard that struck you.  You crush the spine of one with a leaping kick, punch a third so hard he spattered against a wall, and hurl the machete into the back of a lizard as it tried to run away.\n\n\t\t\t\t\t\tBut even so, there are just so many.\n\t\t\t\t\t\t*page_break\n\n\t\t\t\t\t\t*set infamy %+ (guts + (guts + guts))\n\n\t\t\t\t\t\t- Glory increased\n\n\t\t\t\t\t\t*if guts > 10\n\t\t\t\t\t\t\tIt's a good thing you trained to have such strong resolve!  You fight on, ignoring the fatigue.  You blast your system with adrenaline.  You bring your elbow down into the face of one reptile, sending a spray of teeth and yellow blood.  You kick, punch and mangle your way to victory.  You stand, panting, surrounded by the dead and covered in their yellow blood.\n\t\t\t\t\t\t\t*set infamy %+ (guts + (guts + guts))\n\n\t\t\t\t\t\t\t- Glory gained GREATLY\n\n\t\t\t\t\t\t\t*if troopcount > 0\n\t\t\t\t\t\t\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll tell them that you will deal with this trapdoor alone.\n\t\t\t\t\t\t\t\t*goto trapdoor\n\t\t\t\t\t\t\t*else\n\n\t\t\t\t\t\t\t\t*goto trapdoor\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tIt's tough to go on.  You blast your system with adrenaline, but it's so hard to keep going.  You slow, and a lizard gets his tail around your right leg, the spikes digging deep.  He's trying to take you down, and it works - you trip and fall, getting swarmed by the green scaly monsters.\n\n\t\t\t\t\t\t\t*set armor-4\n\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t*else\n\n\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\tYou can hear the servos in your armor whine as you force yourself to stand back up.  You reach back and grab the one that pulled you down, wrenching its tail from its body.  The tail has a good weight to it.  You spin it around and lash out with it, burying the spikes in the head of the lizard you tore it free from!  One by one, you rip the lizards apart, crushing them, until you stand, panting, surrounded by the dead and covered in their yellow blood.\n\t\t\t\t\t\t\t\t*set infamy %+ (guts + (guts + guts))\n\n\t\t\t\t\t\t\t\t- Glory gained GREATLY\n\t\t\t\t\t\t\t\t*if troopcount > 0\n\t\t\t\t\t\t\t\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll tell them that you will deal with this trapdoor alone.\n\t\t\t\t\t\t\t\t\t*goto trapdoor\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*goto trapdoor\t\n\n\t\t\t\t*elseif fighting > 10\n\t\t\t\t\tYou lunge into the monsters, crushing one immediately.  You backhand a second, sending its head spinning, but there are just too many of them.  You take one machete blow to the side, turn, and crush the attacker with your fist.  Another machete strikes your helmet.  Sparks lights fill your vision...\n\t\t\t\t\t*set armor-13\n\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t*else\n\n\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\tYou leap back to your feet, and get right back into the fight!  You grab two lizard’s heads and smash them together, then turn and kick a third up and out of the ring of attackers.  Your armor is coated with yellow blood and gore, but you keep fighting.  Turning, you see one lizard bringing down a large shimmering blue broadsword, right at your head.  What do you do?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Block with my arm.\n\t\t\t\t\t\t\t\tYou hold up your arm and intercept the sword.  Sparks blast from your forearm, showering the attacker.  Warning lights flare in your heads up display.\n\t\t\t\t\t\t\t\t*set armor-2\n\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t\t*else\n\n\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t- Multi-tool damaged!\n\t\t\t\t\t\t\t\t\t*set technical-2\n\n\t\t\t\t\t\t\t\t\tWith your other arm, you punch the attacker, smashing its alligator face in.  You pry the sword out of your forearm, and bury it to the hilt in another lizard attacker.  Working your arms and legs like pistons, you crush, mangle and destroy your way to victory.  You stand, panting and covered in yellow ichor.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou look at your forearm, and see that the sword bit deeply into your multi-tool unit.  It's still useful, but barely.\n\t\t\t\t\t\t\t\t\t*if troopcount > 0\n\t\t\t\t\t\t\t\t\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll tell them that you will deal with this trapdoor alone.\n\t\t\t\t\t\t\t\t\t\t*goto trapdoor\n\t\t\t\t\t\t\t\t\t*else\n\n\t\t\t\t\t\t\t\t\t\t*goto trapdoor\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Blast it point blank with a missile.\n\t\t\t\t\t\t\t\tYour missile explodes mere feet from you, annihilating your attacker but also hurling you back and to the ground.\n\t\t\t\t\t\t\t\t*set armor-10\n\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t\t*else\n\n\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\t\tYou scramble to your feet, and turn to take on the rest of the lizards.  Working your arms and legs like pistons, you crush, mangle and destroy your way to victory.  You stand, panting and covered in yellow ichor.\n\t\t\t\t\t\t\t\t\t*if troopcount > 0\n\t\t\t\t\t\t\t\t\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll tell them that you will deal with this trapdoor alone.\n\t\t\t\t\t\t\t\t\t\t*goto trapdoor\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t*goto trapdoor\n\n\t\t\t\t\t\t\t#Take the hit, and strike back.\n\t\t\t\t\t\t\t\tYou hold your ground and watch the sword slam into your helmet.  Your vision goes white.\n\t\t\t\t\t\t\t\t*set armor-15\n\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t\t*else\n\n\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\t\tBlinded and confused, you lash out and strike the attacker.  You pry the sword from your helmet, and as your vision returns, you bury it to the hilt in another lizard attacker.  Working your arms and legs like pistons, you crush, mangle and destroy your way to victory.  You stand, panting and covered in yellow ichor.\n\t\t\t\t\t\t\t\t\t*set infamy %+ guts\n\t\n\t\t\t\t\t\t\t\t\t- Glory gained\n\n\t\t\t\t\t\t\t\t\t*if troopcount > 0\n\t\t\t\t\t\t\t\t\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll tell them that you will deal with this trapdoor alone.\n\t\t\t\t\t\t\t\t\t\t*goto trapdoor\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t*goto trapdoor\n\n\n\t\t\t\t*else\n\t\t\t\t\tThe fight is tough.  One lizard gets a good slice into the chest plate of your Armor, while one blasts you point blank with its pistol, blowing a huge smoking hole through the metal plating!\n\t\t\t\t\t*set armor-18\n\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t*else\n\t\t\t\t\t\t*Page_Break\n\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\tStaggering back, you wrench the blade out of your chest, and use it to decapitate the lizard that struck you.  Cursing, you hurl the blade into the chest of the monster that shot you.\n\t\t\t\t\t\t\n\t\t\t\t\t\tBut even so, there are just so many.\n\t\t\t\t\t\t*page_break\n\n\t\t\t\t\t\t*if guts > 11\n\t\t\t\t\t\t\tIt's a good thing you trained to have such strong resolve!  You fight on, ignoring the fatigue.  You blast your system with adrenaline.  You bring your elbow down into the face of one reptile, sending a spray of teeth and yellow blood.  You kick, punch and mangle your way to victory.  You stand, panting, surrounded by the dead and covered in their yellow blood.\n\t\t\t\t\t\t\t*set infamy %+ (guts + (guts + guts))\n\n\t\t\t\t\t\t\t- Glory increased\n\n\t\t\t\t\t\t\t*if troopcount > 0\n\t\t\t\t\t\t\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll tell them that you will deal with this trapdoor alone.\n\t\t\t\t\t\t\t\t*goto trapdoor\n\t\t\t\t\t\t\t*else\n\n\t\t\t\t\t\t\t\t*goto trapdoor\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tIt's tough to go on.  You blast your system with adrenaline, but it's so hard to keep going.  You slow, and a lizard gets his tail around your right leg, the spikes digging deep.  He's trying to take you down, and it works - you trip and fall, getting swarmed by the green scaly monsters.\n\n\t\t\t\t\t\t\t*set armor-9\n\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t*else\n\n\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\tYou can hear the servos in your armor whine as you force yourself to stand back up.  You reach back and grab the one that pulled you down, wrenching its tail from its body.  The tail has a good weight to it, and you spin it around and lash out with it, burying the spikes in the head of the lizard that you tore it free from!  One by one, you rip the lizards apart, crushing them, until you stand, panting, surrounded by the dead and covered in their yellow blood.\n\t\t\t\t\t\t\t\t*if puppy=\"keep\"\n\t\t\t\t\t\t\t\t\t*set puppy \"dead\"\n\n\t\t\t\t\t\t\t\t\t- Glory increased\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYour Oracle beeps, and as you check it, it tells you that the life form you had in your backpack... the puppy... has been killed.\n\t\t\t\t\t\t\t\t\t*set infamy %+ (guts + (guts + guts))\n\n\t\t\t\t\t\t\t\t\t*if troopcount > 0\n\t\t\t\t\t\t\t\t\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll tell them that you will deal with this trapdoor alone.\n\t\t\t\t\t\t\t\t\t\t*goto trapdoor\n\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t*goto trapdoor\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*set infamy %+ (guts + (guts + guts))\n\n\t\t\t\t\t\t\t\t\t- Glory increased\n\n\t\t\t\t\t\t\t\t\t*if troopcount > 0\n\t\t\t\t\t\t\t\t\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll tell them that you will deal with this trapdoor alone.\n\t\t\t\t\t\t\t\t\t\t*goto trapdoor\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t*goto trapdoor\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t#I prime every grenade I have, and hurl them all into the room!\n\t\t*label boomshakalaka\n\t\tYou have about two dozen grenades left.  Priming each of them in turn, you string them together and hurl them into the room!\n\n\t\tThe explosion is devastating.  The walls give, the ceiling collapses, and the entire southern side of the complex lies in ruins.  \n\t\t*if building=\"ruined\"\n\t\t\tYou notice that there's no blue lightning this time - the station must have already been dead.\n\t\t\t*goto battlela\n\t\t*else\n\t\t\tYou can hear what sounds like a chain reaction of explosions echoing through the complex.  Through a hole in the ceiling, you see a massive tower covered in antennas shiver, tilt, and then crash to the ground.\n\t\t\t*set building \"ruined\"\n\t\t\t*label battlela\n\n\t\t\tDigging through the rubble, debris, and remains of lizard aliens, you find the trap door that they were guarding.\n\t\t\t*set infamy %+ (guts + (guts + guts))\n\n\t\t\t- Glory increased\n\n\t\t\t*if troopcount > 0\n\t\t\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll tell them that you will deal with this trapdoor alone.\n\t\t\t\t*goto trapdoor\n\t\t\t*else\n\t\t\t\t*goto trapdoor\n\n\t#I take aim with my cannon and pistol, and blast 'em!\n\t\t*label shooting_alone\n\n\t\tGetting into the best position you can to get some cover, you take aim with your shoulder cannon and pistol, and fire!\n\t\t*if enemy=\"weakened\"\n\t\t\t*if shooting > 12\n\t\t\t\tTwo of the four lizards die instantly, blasted to ash.  The other two dive for cover and fire their blaster cannons.  One shot rips apart the wall near your head, and the other tears apart the rubble you were hiding behind, sending you hurling back to crash into a support pillar!\n\t\t\t\t*set armor-6\n\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t*else\n\n\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\t\t\t\t\t*page_break\n\n\t\t\t\t\t*if guts > 11\n\t\t\t\t\t\tYou bravely pull yourself to yourself up, set your feet and cut loose with your shoulder cannon.  In moments, the other two lizards are blasted to chunks.\n\n\t\t\t\t\t\t*set infamy %+ (guts + guts)\n\t\t\t\t\t\t- Glory increased \n\n\t\t\t\t\t\t*if troopcount > 0\n\t\t\t\t\t\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll tell them that you will deal with this trapdoor alone.\n\t\t\t\t\t\t\t*goto trapdoor\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto trapdoor\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou pull yourself up, but hesitate for only a moment.  Still, that moment was a moment too long - if only you were a little gutsier!  You think about this while you are knocked back to the ground by a blaster cannon bolt to the faceplate!\n\t\t\t\t\t\t*set armor-6\n\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\tYou roll to the side into a crouch, drawing your blaster pistol and firing, all in one motion.  Your shot takes one of the lizards in the chest - the stupid reptile had gotten up to charge you!  Its companion standing next to it goes to run for cover, and you take out its legs, then put it down permanently with a shot to the back of the head.\n\n\t\t\t\t\t\t\t*set infamy %+ (guts + guts)\n\t\t\t\t\t\t\t- Glory increased \n\t\t\t\t\t\t\t*if troopcount > 0\n\t\t\t\t\t\t\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll tell them that you will deal with this trapdoor alone.\n\t\t\t\t\t\t\t\t*goto trapdoor\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*goto trapdoor\n\t\t\t*elseif shooting > 10\n\t\t\t\tTwo of the four lizards die instantly, blasted to ash.  The other two dive for cover and return fire.  One shot nails you in the left shoulder, sending you spinning into a wall.\n\n\t\t\t\t*set armor-8\n\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t*else\n\t\t\t\t\t*page_break\n\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\tYou return fire, blasting one on the face.  There's only one left, and he's dug in.  The two of you trade fire for a while, knocking chunks off of walls and support pillars around the room.  Finally, you pull out a grenade.  Taking a quick glance at the place the lizard is hiding at, you wind back and throw it, bouncing it off of a pillar and right into the Saurian's cover!  With a flash and a bang, the lizard staggers out and dies.\n\n\t\t\t\t\t*set infamy %+ guts\n\t\t\t\t\t- Glory increased \n\t\t\t\t\t*if troopcount > 0\n\t\t\t\t\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll tell them that you will deal with this trapdoor alone.\n\t\t\t\t\t\t*goto trapdoor\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto trapdoor\n\t\t\t*else\n\t\t\t\tYou shoot one lizard, but the other three dive for cover and return fire.  As you lean out and blast a second lizard, a shot of green blaster fire nails you in the chest, and sends you sprawling.\n\n\t\t\t\t*set armor-10\n\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t*else\n\t\t\t\t\t*page_break\n\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\tYou crawl back to cover, but the Saurians are blasting the ground all around you.  You pull a grenade.  Taking a quick glance at the place the lizard is hiding at, you wind back and throw it, bouncing it off of a pillar and right into the Saurian's cover!  With a flash and a bang, the lizard staggers out and dies.\n\n\t\t\t\t\t*set infamy %+ (guts + guts)\n\t\t\t\t\t- Glory increased \n\t\t\t\t\t*if troopcount > 0\n\t\t\t\t\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll tell them that you will deal with this trapdoor alone.\n\t\t\t\t\t\t*goto trapdoor\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto trapdoor\n\n\t\t*else\n\t\t\t\n\t\t\tYou kill some, but there are just so many of them!  They open fire in return, and you are forced to duck into cover.  Their blasts rip away parts of the building around you.\n\t\t\t*if shooting > 12\n\t\t\t\tWith well-placed shots, you pick off the lizards one by one.  They press the attack, shredding the pillar you are hiding behind with vivid green blaster fire.  Once lucky shot catches you in the shoulder.\n\t\t\t\t*set armor-4\n\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t*else\n\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t*goto fenris\n\n\t\t\t*if shooting > 10\n\t\t\t\tStill, even with their great numbers, you manage to take out several of them. But they press the attack.  The hail of green blaster cannon fire is intense.  The pillar you are hiding behind gets blown to pieces, and you get hurled to the ground.\n\n\t\t\t\t*set armor-10\n\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t*else\n\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\tScrambling for cover, you think about falling back!\n\t\t\t\t\t*goto fenris\n\t\t\t*else\n\t\t\t\tYou take out a couple of them, but they open up with a hail of green blaster cannon fire.  The air crackles with charged energy bolts.  The pillar you are hiding behind takes a hit, and you lean out to snap off a few more shots.  The blasts fly wide - you just aren't that good of a shot!  The pillar gets blown to pieces, and you get thrown to the ground.\n\n\t\t\t\t*set armor-14\n\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t*else\n\t\t\n\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t*set infamy %+ (guts + guts)\n\n\t\t\t\t\t- Glory increased\n\n\t\t\t\t\tScrambling for cover, you think about falling back!\n\t\t\t\t\t*goto fenris\n\t#I try to sneak into the room, circle around and catch them by surprise!\n\t\t*if (enemy = \"weakened\") and (stealth > 11)\n\t\t\tWith so few of the lizards left, you are able to sneak in and break the necks of each lizard, one by one.  Nice work!\n\t\t\t*set infamy %+ (guts + guts)\n\t\n\t\t\t- glory increased\n\t\t\t*if troopcount > 0\n\t\t\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll tell them that you will deal with this trapdoor alone.\n\t\t\t\t*goto trapdoor\n\t\t\t*else\n\t\t\t\t*goto trapdoor\n\t\t*if (enemy != \"weakened\") and (stealth > 12)\n\t\t\tEven with so many lizards guarding the room, you manage to slip by them.  You slide up behind one, snap its neck, and lay the body down quietly.  Then, silently, you string grenades around the room, smiling to yourself the whole time.  You knew all that training in stealth would come in handy!!\n\n\t\t\tOnce you are ready, you kill every lizard in the room with the push of a button.\n\n\t\t\t*set infamy %+ (guts + guts)\n\n\t\t\t- Glory increased\n\t\t\t*if troopcount > 0\n\t\t\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll tell them that you will deal with this trapdoor alone.\n\t\t\t\t*goto trapdoor\n\t\t\t*else\n\t\t\t\t*goto trapdoor\n\t\t*else\n\t\t\tEven with your stealth, there are just too many lizards.  One spots you and lets out a squawk.  Bolts of green blaster energy tear the concrete apart around you, sending you crashing into a wall. \n\t\t\t*set armor-14\n\t\t\t*if armor \u003c 1\n\t\t\t\t*goto_scene Combat_Death\n\t\t\t*else\n\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\tYou scramble back to your feet in time to see one alligator-faced reptile charging right at you.  Without thinking, you jump forward and kick the monster right in the jaw.  A fan of yellow blood and teeth sprays through the air.  The other lizards pause their shooting for a moment, looking shocked and perhaps even impressed...\n\n\t\t\t\t*set infamy %+ (guts + (guts + guts))\n\t\t\t\t- Glory increased \n\n\t\t\t\tNow what are you going to do?\n\t\t\t\t*choice\n\t\t\t\t\t#I get into whatever cover I can, and blast em!\n\t\t\t\t\t\t*goto shooting_alone\n\t\t\t\t\t#I dive in among them, and fight them hand to hand!\n\t\t\t\t\t\t*goto fighting_alone\n\n\n*label fenris\n*page_break\n*if guts > 13\n\tHowever your combination of bravery and marksmanship make you a deadly foe.  You stand your ground, taking out lizard after lizard, until the room is steaming with their fallen bodies.  As the last reptile falls dead with a blaster burn on its chest, you smile to yourself.\n\t\n\t*set infamy %+ (guts + (guts + guts))\n\t- Glory increased\n\t*if troopcount > 0\n\t\tYou order the troopers to secure the area, and to link back up with the dropship.  You'll tell them that you will deal with this trapdoor alone.\n\t\t*goto trapdoor\n\t*else\n\t\t*goto trapdoor\n*else\n\tYou are forced to fall back, and take several glancing hits as you do.  One shot right across your back knocks you to the ground.\n\n\t*set armor-9\n\t*if armor \u003c 1\n\t\t*goto_scene Combat_Death\n\t*else\n\n\t\t- Armor damaged, down to ${armor} percent!\n\n\t\tStaggering back, you scramble into cover, and throw a grenade wildly in order to buy some time.\n\t\t*page_break\n\n\n\t\tBack on your feet, you assess the situation.  There are still several lizards left alive, and you're getting tired.\n\t\t*if guts > 10\n\n\t\t\tIt's a good thing you trained to have such strong resolve!  You fight on, ignoring the fatigue.  You blast your system with adrenaline.  Taking aim, you fire again and again.  The whole scene seems to move slowly, as in a dream.  You hazily realize that you've been hit in the stomach, and again in the chest.  The third hit knocks you to your back.  You fall, seeing lights and colors blur together.\n\t\t\t*set armor-3\n\t\t\t*if armor \u003c 1\n\t\t\t\t*goto_scene Combat_Death\n\t\t\t*else\n\t\t\t\t*page_break\n\t\t\t\t- Armor damaged, down
