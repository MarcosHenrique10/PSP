riking out with the side of your hand.  Your armored gauntlet slams into the Saurian's wrists, knocking the broadsword free.  Completing your slide, you gracefully snatch the broadsword out of the air with your other hand.  The entire maneuver is over in a blink of an eye.  The lizard stares at you, shocked, as you snap the silver broadsword in half, tossing the pieces to the clatter on the stone floor.\n\n\t\t\t*set infamy %+ guts\n\t\t\t- Glory increased \n\n\t\t\tThe stunned lizard shakes its head and opens its toothy mouth wide.  A hissing roar fills the hallway and it charges you with its claws outstretched.\n\n\t\t\t*goto punchypunch \n\t\t*elseif fighting > 10\n\t\t\tYou slide to the side and dodge the broadsword, but when you try to strike the lizard's hands, you miss.  This is a difficult maneuver, and this Saurian knows what it's doing.  The lizard lunges back away from you, gives a hiss, and leaps back at you.  The silvery blue broadsword clutched in its claws shimmers in the dim light.  One stabbing strike catches you in the shoulder and bites deep, only to be followed by a slash across your armored chest.  Your Armor's visual pickups flicker as the damage takes its toll.\n\n\t\t\t*set armor-10\n\t\t\t*if armor \u003c 1\n\t\t\t\t*goto_scene Combat_Death\n\t\t\t*else\t\n\n\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\tYou pull yourself together and force yourself back into a fighting stance.  The lizard strikes at you again and again, but you dance to the side and dodge the blows.  Growling, the lizard lunges toward you and you step to the side again, but then dart forward and slam an armored fist into the armor covering the Saurian's stomach.  The lizard scrambles back and glares at you.\n\n\t\t\t\n\t\t\t\t*set infamy %+ (guts + guts)\n\t\t\t\t- Glory increased \n\n\t\t\t\t*goto dive\n\n\t\t*else\n\t\t\tYou try to step out of the way of the strike, but don't move nearly fast enough.  The shimmering sword lances into your shoulder, followed by two quick slashes across your armored chest and stomach.  The hits knock you staggering back, and your screen flickers with warning lights.  A cascading system failure warning flashes, and you fall.\n\n\t\t\t*set armor-13\n\t\t\t*if armor \u003c 1\n\t\t\t\t*goto_scene Combat_Death\n\t\t\t*else\t\n\n\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\tYou hit the ground hard.  The impact knocks your Armor's systems into a quick recovery mode, and in an instant your heads up screen clears and you see the lizard raise the sword above its head.  As the sword comes down, you roll to the side, letting the sword dig deep into the ground beside you.  With another quick roll back over the sword, you snap it in half!  The lizard jumps back, hissing, clutching the broken sword.  With a quick kick to the creature's groin, you send it smashing into the ceiling.  It falls on top of you and scrambles limply.  You grip it by the face and stand up slowly, holding it out in front of you.  Closing your fingers, you crush its head.\n\t\t\t\n\t\t\t\t*set infamy %+ (guts + (guts + guts))\n\t\t\t\t- Glory increased \n\n\t\t\t\t*goto nexties\n*label dive\nNow what?\n*choice\n\t#I counter attack!\n\t\t*label hacknslash\n\t\t*if fighting \u003c 12\n\t\t\tBending your knees, you grind your boots into the ground, and then launch yourself at the toothy reptile.  The lizard is ready, however, and leaps to the side, spinning.  With a flash of silver blue, you see the glowing spikes of the Saurian's tail slam into your helmet.  Sparks fill your vision as you are knocked to the side, slamming head first into the wall.\n\t\t\t*set armor-9\n\t\t\t*if armor \u003c 1\n\t\t\t\t*goto_scene Combat_Death\t\n\t\t\t*else\n\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\tPulling yourself back to your feet, you turn to see the lizard leap at you, shimmering blue broadsword held high over its head.  As it charges you, you settle into a fighting stance.  At the last moment, as the broadsword comes swinging down, you slide forward and slam your left boot up in a perfect side kick.  The bottom of your foot catches the broadsword on the hilt, sending it flying from the lizard's claws.  It tumbles through the air and stabs into the wall behind the Saurian.  The creature is knocked backwards and stares at you wide eyed.\n\n\t\t\t\t*set infamy %+ (6 + (guts + guts))\n\t\t\t\t- Glory increased\n\n\t\t\t\t*goto punchypunch\n\t\t\t\t\t\t\n\t\t*else\n\t\t\tThis lizard is fast, but you're faster.  It stabs at you again but you're ready this time.  Batting the sword away, you slam your first into the monster's gut.  It flies back several yards and bounces off of a wall, but incredibly it gets back up!  You can see that the armor on the thing's stomach is shattered, and you knocked the broadsword out of its claws, but it still rushes back at you, hissing.\n\t\t\t\t\n\t\t\t*label punchypunch\n\t\t\tWhat do you do?\n\t\t\t*choice\n\t\t\t\t#I charge right back at it, fists up\n\t\t\t\t\t*if fighting > 12\n\t\t\t\t\t\tDashing forwards, your fists blur as you strike the lizard, hammering it backwards.  One strike shatters the helmet, while the next obliterates the armor on the lizard's stomach.  Two more knock it backwards, and the next is an uppercut that knocks it into the air.  As it falls, you lash out with a backhand into the alien's jaw that knocks the head completely off.\n\n\t\t\t\t\t\tDripping with yellow blood, you stand panting over the shredded, lifeless corpse of the reptile and let out a primal roar.\n\t\t\t\t\t\t*set infamy %+ guts\n\n\t\t\t\t\t\t- Glory increased\n\t\t\t\t\t\t*goto nexties\n\t\t\t\t\t*elseif fighting > 10\n\t\t\t\t\t\tDashing forwards, you slam your fist into the alien's helmet, shattering it.  The lizard gets knocked back against the wall, but recovers quickly and rips the remains of the helmet off of its head.  It glares at you, and wipes yellow blood from the corner of its mouth.  With a growling purr the lizard crouches low, claws spread wide.  It leaps at you, and you swing out your armored boot to catch it in mid-air.  The lizard twists through the air, spinning its tail, and your boot misses.  The force of the impact knocks you back, and the lizard starts to bite and claw at your armor.  Somehow, its teeth get a grip on a hose that snaps free, and your Armor's warning lights suddenly flare to life, warning of decompression!\n\n\t\t\t\t\t\t*set armor-4\n\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\tWith a mighty shove, you hurl the lizard back.  Your suit automatically reroutes your air supply, and the leak is sealed.  Furious, you charge at the lizard with your arms wide.  It jumps at you again, but this time you catch it with both armored hands, and slam it to the ground.  Its hisses turn to gurgled cries, and you plant your armored boot in its gut, crushing it into the floor.\n\n\t\t\t\t\t\t\t*goto nexties\n\t\t\t\t\t*else\n\t\t\t\t\t\tDashing forwards, you slam your fist into the alien's helmet, shattering it.  Unfortunately, as you do that, its tail swings around and bashes into your back.  The metal-covered spikes on its tail rend your back armor, tearing it apart.\n\n\t\t\t\t\t\t*set armor-10\n\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\tYour fists blur as you strike the lizard, hammering it backwards.  You lash out with a backhand into the alien's jaw that knocks the head completely off, spraying the hall with the fetid yellow ichor it uses for blood.\n\n\t\t\t\t\t\t\tDripping with the foul stuff, you stand and take deep heaving breaths.  \n\t\t\t\t\t\t\t*set infamy %+ (guts + guts)\n\n\t\t\t\t\t\t\t- Glory increased\n\t\t\t\t\t\t\t*goto nexties\n\n\n\t\t\t\t#I fire my Armor's boosters, and bowl the thing over\n\t\t\t\t\tSmoke and fire blast the corridor behind you, and you hurl yourself at the lizard.  You see it raise its claws, but they're nothing against a suit of Tactical Powered Armor!  With a sickening wet crack, you slam into the lizard and send what's left of its body flying in several directions.  Kicking your feet out in front of you, your thrusters stop and you grind to a halt.  Looking down, you see that your chest plate is smeared with yellow goo.  \n\t\t\t\t\t*goto nexties\n\t\t\t\t\t\t\t\t\n\t\t\t\t#I raise my pistol and fire\n\t\t\t\t\tIts hissing charge is stopped suddenly when your white hot bolt of blaster fire catches the monster in the face.  The lizard is knocked off of its feet and falls limply sideways.  The body spasms once, then lies still.\n\t\t\t\t\t*goto nexties\n\t#I run away! \n\t\t*set guts-1\n\t\t*set infamy %-50\n\t\t*set troopcount-1\n\t\tUsing your Armor's thrusters, you blast backwards and to the side, dodging away from the lizard's attacks.  Within moments, you are far from the lizard, but you have to search for a while to find another route.\n\n\t\t- Glory lost\n\t\t*line_break\n\t\t- Guts decreased\n\n\t\t*if troopcount > 0\n\t\t\tLooking at your Oracle, you see that another trooper has died.  You try to hurry.\n\t\t\t*goto nexties\n\t\t*else\n\t\t\t*goto nexties\n\n*label nexties\t\t\n\nTurning, you look down the hallway and deeper into the power station complex.  You wonder what else is waiting for you in there...\n*page_break\nYou leave the remains of the strangely suited Saurian and start walking.  Glancing at your Oracle, you follow the path to where the Shock Troopers were supposed to infiltrate the building.\n\n*if troopcount \u003c 1\n\tWalking down several corridors, you turn a corner to see the backs of four lizard creatures.  They're picking through the remains of the Shock Troopers.  The walls are scorched with blaster burns and pocked with holes from Imperial assault rifles.  There are several dead Saurians as well.  It looks like a big fight happened here, and the troopers must have fought hard.\n\n\tWhat do you do?\n\t*choice\n\t\t#I leap forward, smashing the lizards!  They're no match for an Imperial Marine!\n\t\t\tUsing your Armor's boosters, you launch yourself at the lizards, crushing one and then kicking another through a wall.  But then two other lizards lash out at you.  One is using its glowing blue machete, but the other is holding two Imperial combat knives that it must have pulled off of the dead troopers.  The lizard with the machete spins and slices into the back of your left knee while the other one lunges at you and stabs both Imperial combat knives at your helmet.  Your vision flickers as you are knocked to the floor.\n\n\t\t\t*set armor-12\n\t\t\t*if armor \u003c 1\n\t\t\t\t*goto_scene Combat_Death\n\t\t\t*else\n\t\t\t\t\n\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\tShaking your head, you reach out and grip the lizard with the knives by the throat.  Using this lizard as a weapon, you flip it through the air and crush the other lizard, killing them both.  \n\t\t\t\t*set infamy %+ (guts + guts)\n\t\t\t\t\n\t\t\t\t- Glory increased\n\t\t\t\t*goto regroup\n\n\t\t#I blast them to shreds with my pistol!  \n\t\t\tStanding your ground, you let loose a storm of blaster fire, ripping into the lizards from behind!  You blast a couple of them, but the others whip around and return fire.  One of them is holding one of the fallen trooper's assault rifles!  You get shot up the left side of your Armor, and take two rounds to the side of the helmet.  Your vision flickers for a moment.\n\t\t\t*set armor-12\n\t\t\t*if armor \u003c 1\n\t\t\t\t*goto_scene Combat_Death\n\t\t\t*else\n\n\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\tYou pull yourself back together, though, and blast the lizard through the leg, and then through the chest.  He falls to the floor with a wet sound.  The last lizard lunges for you with his machete, but you blast him in half at close range.\n\t\t\t\t*set infamy %+ (guts + guts)\n\t\t\t\t\n\t\t\t\t- Glory increased\n\t\t\t\t*goto regroup\n\n\t\t#A rain of grenades and shoulder cannon fire should level the area nicely!\n\t\t\tWith a sweeping gesture you toss a handful of grenades.  As they spin through the air you let loose with rocket after rocket from your shoulder cannon.  All seems to go silent, but then you realize that your suit is only compensating for the thunderous explosions going on in front of you.\n\t\t\t*if building=\"ruined\"\n\t\t\t\t\n\t\t\t\tAs your audio receptors tune back up, all you can hear is occasional falling masonry and debris.  The area is a blackened ruin of smoldering chunks of stone, metal and broken alien bodies.  The power in this area is definitely knocked out.  You were pretty sure you had ruined the station earlier, but if you hadn't, this would have done it!  You smile to yourself.\n\t\t\t\t\n\t\t\t\t*set infamy %+ (guts + guts)\n\t\t\t\t- Glory increased\n\n\t\t\t\t*goto regroup\n\t\t\t*else\n\t\t\t\tAs your audio receptors tune back up you can still hear echoing explosions long after your grenades have detonated.  There's a chain reaction going on throughout the power station.  Blue lightening arcs around the walls for a moment, and sparks blast out of several control panels set around the room.  The lights flicker, and then come back up as reserve generators kick in.  This station is definitely ruined!\n\n\t\t\t\tAs the dust and debris settle, there's nothing moving.  Nothing's alive.  You smile to yourself.\n\t\t\t\t*set building \"ruined\" \n\t\t\t\t*set infamy %+ (guts + guts)\n\n\t\t\t\t- Glory increased\n\n\t\t\t\t*goto regroup\n*else\n\tWalking down several corridors, you turn a corner to see the backs of several lizard creatures.  They're taking shots into a large room, hiding behind rubble.  You can hear the Shock Trooper's rough automatic rifle fire coming from the other room.  The two groups seem to be at a stand-still.\n\t*goto indentprob\n\n*label indentprob\nWhat would you like to do?\n*choice\n\t#I leap forward, smashing the lizards!  They're no match for an Imperial Marine!\n\t\tUsing your jump boosters, you launch yourself into the fray, sending boots and fists flying!\n\n\t\t*if (guts > 11) or (fighting > 11)\n\t\t\tYour bravery and prowess are unmatched!  In just a few moments, you have splattered and crushed your way to victory!  The stunned Shock Troopers watch in amazement, and give up a cheer when you stand alone, dripping with the alien's yellow blood.\n\t\t\t*set morale %+ (leadership + (leadership + leadership))\n\t\t\t*set infamy %+ guts\n\n\t\t\t- Morale increased\n\t\t\t*line_break\n\t\t\t- Glory increased\n\n\t\t\t*goto regroup\n\t\t*else\n\t\t\tUsing your Armor's boosters, you launch yourself at the lizards, crushing one and then kicking another through a wall.  But then two other lizards lash out at you, one with his spiked tail and the other with its glowing blue machete.  They catch you, one in the knee and the other to the side of your helmet!  Your vision flickers for a moment.\n\n\t\t\t*set armor-14\n\t\t\t*if armor \u003c 1\n\t\t\t\t*goto_scene Combat_Death\n\t\t\t*else\n\t\t\t\t\n\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\tYou fight on, however, and catch one by the throat.  Using this lizard as a weapon, you flip it through the air and crush the other lizard, killing them both.  The shock troops watch, amazed, and cheer when you are done.\n\t\t\t\t*set morale %+ (leadership + leadership)\n\t\t\t\t*set infamy %+ (guts + guts)\n\t\t\t\t\n\t\t\t\t- Morale increased\n\t\t\t\t*line_break\n\t\t\t\t- Glory increased\n\t\t\t\t*goto regroup\n\n\t#I blast them to shreds with my pistol!  \n\t\tStanding your ground, you let loose a storm of blaster fire, ripping into the lizards from behind!\n\n\t\t*if (shooting > 12) or (stealth > 11)\n\t\t\tYou decimate the lizards - the surprise was total!  In moments the fight is over, yellow ichor dripping from the walls.  The Shock Troopers cheer when they realize it was you who helped them!\n\t\t\t*set morale %+ (leadership + (leadership + leadership))\n\t\t\t*set infamy %+ guts\n\n\t\t\t- Morale increased\n\t\t\t*line_break\n\t\t\t- Glory increased\n\t\t\t*goto regroup\n\t\t*else\n\t\t\tYou blast a couple of them, but the others whip around and return fire.  One gets you with a shot to the side of the helmet.  Your vision flickers for a moment.\n\t\t\t*set armor-9\n\t\t\t*if armor \u003c 1\n\t\t\t\t*goto_scene Combat_Death\n\t\t\t*else\n\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\tYou pull yourself back together, though, and blast the lizard through the leg, and then through the chest.  He falls to the floor with a wet sound.  The last lizard lunges for you with his machete, but you blast him in half at close range.  When the troopers catch sight of you, they cheer.\n\t\t\t\t*set morale %+ (leadership + (leadership + leadership))\n\t\t\t\t*set infamy %+ (6 + guts)\n\n\t\t\t\t- Morale increased\n\t\t\t\t*line_break\n\t\t\t\t- Glory increased\n\t\t\t\t*goto regroup\n\n\t#I shoot.  With everything.  I level the entire area.\n\t\tWith a sweeping gesture you toss a handful of grenades.  As they spin through the air you let loose with rocket after rocket from your shoulder cannon.  All seems to go silent, but then you realize that your suit is only compensating for the thunderous explosions going on in front of you.\n\n\t\t*if building=\"ruined\"\n\t\t\tAs your audio receptors tune back up, you see that this blast, combined with your earlier demolitions, have well and certainly ruined this station!  No blue lightning dances around this time - the station simply lies smoldering and lifeless.\n\t\t\t*goto doubletap\n\t\t*else\n\t\t\tAs your audio receptors tune back up you can still hear echoing explosions long after your grenades have detonated.  There's a chain reaction going on throughout the power station.  Blue lightening arcs around the walls for a moment, and sparks blast out of several control panels set around the room.  The lights flicker, and then come back up as reserve generators kick in.  This station is definitely ruined!\n\n\t\t\tAs the dust and debris settle, there's nothing moving.  Nothing's alive.  You smile to yourself.\n\t\t\t*label doubletap\n\t\t\t*set troopcount-5\n\t\t\t*set building \"ruined\"\n\t\t\t*set morale %-35\n\t\t\t*set dark %-35\n\t\t\t*set infamy %+ (guts + guts)\n\n\t\t\t- Morale lost...\n\t\t\t*line_break\n\t\t\t- Glory increases\n\t\t\t*line_break \n\t\t\t*if troopcount \u003c 1\n\n\t\t\t\tLooking into the room that the troopers were in, you can't see anything moving.  Glancing at your Oracle, all the troopers register as dead.  You step in and check out the bodies.  Several were definitely killed by your barrage.  Oops.\n \n\t\t\t\t- Darkness grows within you...\n\t\t\t\t*goto regroup\n\t\t\t*else\n\t\t\n\t\t\t\tLooking into the room that the troopers were in, you can see several dead.  Only ${troopcount} remain alive.  A trooper cradles the dead body of another soldier and stares at you with shock and horror painted across his face.  Looking around, several of these dead were killed by your own barrage.  Oops.\n\n\t\t\t\t- Darkness grows within you...\n\t\t\t\t*goto regroup\n\n\t#I sit back and wait, letting the Shock Troopers deal with this\n\t\t*set dark %-35\n\n\t\t- Darkness grows within you...\n\n\t\t*if troopcount > 3\n\t\t\tYou sit back on your heels, lean against a wall, and wait.  You open up your arm console, and watch the heat signatures of the troopers.  Two wink out, but then you see one of the lizards take a shot through the throat and fall.  Another lizard gets hit in the arm, and charges the troopers, only to get cut down in a storm of automatic rifle fire.  Two more troopers go down, one blasted through the chest and one through the gut.\n\t\t\t*set troopcount-4\n\t\t\t*if troopcount \u003c 1\n\t\t\t\t\n\t\t\t\tWell, that's the last of the troopers.  You stand, round the corner and blast the last two lizards in the back.\n\t\t\t\t*goto regroup\n\t\t\t*else\n\n\t\t\t\tOne more lizard gets shot, and then the last one left surges forward towards the troopers, blasting wildly.  He must be desperate.  Another Shock Trooper's stats flat-line.\n\t\t\t\t*set troopcount-1\n\t\t\t\t*if troopcount \u003c 1\n\n\t\t\t\t\tWell, that's the last of the troopers.  You stand, round the corner and blast the last lizard in the back.\n\t\t\t\t\t*goto regroup\n\t\t\t\t*else\n\t\t\t\t\tOne more trooper dies, and with the small pop of a trooper's hand grenade, the fighting is suddenly over.\n\t\t\t\t\t*set troopcount-2\n\t\t\t\t\t*if troopcount \u003c 1\n\t\t\t\t\n\t\t\t\t\t\tStepping around the corner, you see a blasted and torn corridor littered with the bodies of lizards and men.  Red and yellow blood drips from the walls.  Nothing is lefts alive.  The troopers did well, considering.\n\t\t\t\t\t\t*goto regroup\n\t\t\t\t\t*else\n\n\t\t\t\t\t\tStepping around the corner, you see a blasted and torn corridor littered with the bodies of lizards and men.  Red and yellow blood drips from the walls.  Only ${troopcount} remain alive.  A trooper cradles the dead body of another soldier and stares at you, confused at your presence.\n\n\t\t\t\t\t\t\"Sir,\" he says hoarsely, \"If only you've been here a moment earlier!\"\n\n\t\t\t\t\t\t*goto regroup\n\t\t*else\n\t\t\tYou sit back on your heels, lean against a wall, and wait.  You open up your arm console, and watch.  Within moments however, all of the troopers are dead.  There were so few left, the lizards made short work of them.\n\n\t\t\tStanding up, you step around the corner and open fire, catching two of the lizards by surprise.  The remaining two whip around and open fire.  One shot misses you completely, but the second incandescent bolt of green energy detonates on the ceiling above you.  The shock knocks you flat, and large chunks of stonework come crashing down on you.\n\n\t\t\t*set armor-8\n\t\t\t*if armor \u003c 1\n\t\t\t\t*goto_scene Combat_Death\n\t\t\t*else\n\t\t\t\n\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\tHeaving yourself back to your feet, you dodge to the side to avoid another blast, and snap off a shot from your pistol.  Your white bolt of blaster fire hits one of the lizards' shoulder cannons, and the cannon overloads and explodes, tearing the lizard who was holding it in half.  The last lizard squawks, and then turns to run away.  Casually, you plug it in the back.  It flops to its knees, and then falls flat.\n\t\t\t\t*set dark %-18\n\n\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t*goto regroup\n\n\n*label regroup\n\nYou take a moment to check your power levels and ammo.  You still have plenty, and your Armor shows ${armor} percent efficiency.  These Saurian lizard things seem to have fairly deadly weapons, between their blaster cannons, glowing machetes and tail spikes.  You remind yourself not to underestimate them.\n*finish_advertisement\n", "mission_1_landing": "*if deathcount = 0\n\tYou stride into the ship's armory, ready to suit up.\n\t*goto whitefang\n*else\n\t*goto whitefang\n\n*label whitefang\nFor this mission, you have four Tactical Power Armor variants to choose from.  Which one do you want?\n*choice\n\t#Alpha - the standard, well balanced model\n\t\t*set omega \"Alpha\"\n\t\t- Armor starts at 100 percent efficiency\n\t\t*goto suitup\n\t#Beta - reduced armor for greater stealth\n\t\t*set armor 60\n\t\t*set stealth + 2\n\t\t- Stealth increased\n\t\t*line_break\n\t\t- Armor starts at 60 percent efficiency \n\t\t*set omega \"Beta\"\n\t\t*goto suitup\n\t#Gama - slightly reduced armor and increased close combat capabilities\n\t\t*set armor 80\n\t\t*set fighting + 1\n\t\t- Fighting increased\n\t\t*line_break\n\t\t- Armor starts at 80 percent efficiency \n\t\t*set omega \"Gama\"\n\t\t*goto suitup\n\t#Omega - elite model with thinner plating, and a sleek, stylish profile.  It sure does look nice.  It's good for veterans, and proving what you're made of.\n\t\tYou notice a warning tag next to the Omega Armor that reads, \"Beware: Omega Armor is Experimental and fragile, and for veteran marines only!\"\n\n\t\tDo you still want to put it on?\n\t\t*choice\n\t\t\t#Yes!\n\t\t\t\t*set armor 50\t\n\t\t\t\t- Armor starts at 50 percent efficiency \n\t\t\t\t*set omega \"Omega\"\n\t\t\t\t*goto suitup\n\t\t\t#Let me look at the other options again...\n\t\t\t\t*goto whitefang\n\n*label suitup\n\nYou clamp on your armor, piece after piece riveting itself into place.  The parts are heavy, but when the Armor comes together as a whole unit, the weight seems to disappear as all the powered systems begin to work together.  When the Armor is complete, you can feel its weight and bulk, but no more so than a regular space suit.\n\n*if deathcount = 0\n\tA Corps technician is there waiting, and when you are finished putting your armor on, he steps up and attaches some large cables to your chest and back.\n\n\t\"Have you ever used a Temporal Tether before?\" he asks offhandedly.\n\n\tYou've heard of them, but never used one.  Your armor vibrates with a strange hum as the technician explains.  \"Well, basically, a Temporal Tether links your Armor to this moment in space and time.  If your Armor is reduced to 0% efficiency, then the system activates, and you get yanked back through time to right now.  Make sense?\"\n\n\t\"...\"\n\n\tThe tech smiles and adds, \"I've heard that they can be confusing.  If you activate it, you'll be re-living the same moments over again, except that you'll be able to make changes that don't match your memory.  I've heard it gets... disorienting...\"\n\t*page_break\n\tThe tech smiles, and says, \"This must be an important mission if the Corps is using one.  They're expensive, and use up an immense amount of power!  Just don't use it too much - even if you get pulled back safely, the unit itself is used up and lost.  We also have a remote unit, but it's a lot more dangerous to use.  There,\" he says, unlocking the cables from your Armor.  \"You're good to go!\"\n\n\tYou lock your helmet on, and with a sealing hiss everything goes silent for a moment.  But then sound comes rushing back as your helmet's pickups adjust, and you walk to the launch bay.  The Shock Trooper's drop ship is prepped and ready, with steam billowing out of side vents and maneuvering jets glowing as they pre-heat.\n\n\tStepping up the drop ship's landing ramp, you see that the inside walls are packed with the troopers belted in and staring at you wide eyed.\n\t*goto pow\n\n*else\n\tYou can tell that they know that your temporal tether had been used.  To them that means that this must be a tough mission.  If YOU couldn't make it, what are THEIR chances?!  Especially since regular infantry don't get the luxury of tethers... only the more expensive, more highly trained marines, and even then...\n\t*set morale %-30\n\n\t- Morale lost...\n\t*goto pow\n\n*label pow\n\nWhat do you say to them?\n*choice\n\t#Troops!  This mission is important!  I will NOT stand for failure!  Some of you will not come back alive - in fact, you there, Johnson, I'm pretty sure you won't!  Now let's DO THIS!\n\t\tYou didn't think it was possible, but their eyes get even wider.  Amazing.  And you're pretty sure Trooper Johnson peed his pants.  These troops are truly terrified.  Good.\n\n\t\t- Glory increased\n\t\t*line_break\n\t\t- Morale lost...\n\t\t*set infamy %+ guts\n\t\t*set morale %-40\n\t\t*goto launch\n\t#This is my first mission, and I'm not sure what's going to happen, but let's just have a good time, ok?\n\t\tThe troopers blink at you a moment, then frown and glance at each other, looking confused.  One looks like he's about to ask a question, but then changes his mind.\n\t\t*set morale %-40\n\n\t\t*line_break\n\t\t- Morale lost...\n\t\t*goto launch\n\t#Don't get in my way.\n\t\tYou add a glare, just to make things clear.  The soldiers look terrified of you, which is only right.  You ARE a MAC Marine, after all.\n\t\t*set infamy %+ guts\n\n\t\t- Glory increased\n\t\t*goto launch\n\t#Do your jobs.  That's all I expect.\n\t\tThey look nervous, but firm up their jaws, and look more determined.  Good.  You feel like you've done your part, you just hope they listen and do theirs...\n\t\t*set morale %+40\n\n\t\t- Morale increased\n\t\t*goto launch\n\t*selectable_if (guts >10) #Troops, this mission is important.  I know you've been briefed.  I trust you.  Remember your training, and you will come back alive.\n\t\t\tThey look excited, but no longer as nervous.  They look determined, and ready.  You feel like you can trust them to do their part.\n\t\t\t*if leadership \u003c= 11\n\t\t\t\t*set morale %+50\n\n\t\t\t\t- Morale grows \n\t\t\t\t*goto launch\n\t\t\t*elseif leadership = 12\n\t\t\t\t*set morale %+70\n\n\t\t\t\t- Morale grows greatly\n\t\t\t\t*goto launch\n\t\t\t*else\n\t\t\t\t*set morale 99\n\t\t\t\t*set infamy %+guts\n\n\t\t\t\t- Morale at 99 percent!  Great work!\n\t\t\t\t*line_break\n\t\t\t\t- Glory increased\n\t\t\t\t*goto launch\n\t#Failure will result in one thing.  Death.  Sergeant, choose one trooper to die now, as an example.\n\t\tThe sergeant looks terrified, and after a moment of looking around the ship pleadingly, he points a shaky finger at a soldier.  The trooper he points at screams, and tries to unbuckle himself, but his hands are shaking uncontrollably now.  Slowly, you draw your blast pistol, point at the soldier and blow a hole through his chest.\n\n\t\tThe other troops scream and curse, but with one lift of an eyebrow they silence themselves.  Looking around the group, you feel satisfied.  They will do as you say, and they will die for you, if you need it.\n\t\t*set morale %+65\n\t\t*set troopcount-1\n\t\t*set dark %-54\n\n\t\t- Morale grows massively, as they fear you!\n\t\t*line_break\n\t\t- Darkness grows within you...\n\n\t\tYour Oracle beeps, letting you know a trooper has been lost...\n\t\t*goto launch\n\n*label launch\n*page_break\n\nYour troops ready to go, you step back down the ramp and head for your drop pod.  While the Shock Troops fly down in their assault drop ship, you will be doing something a little different.\n\nAt the front of the launch bay you step into a bulky tube set into the wall.  Metal arms reach out and grip your suit, and with the grinding sound of powerful hydraulics you hear the tube clamp itself shut around you.  You can't move.  This part always terrified you during training.\n\nThen you feel yourself being lowered through the deck of the ship, down into darkness.  You know what's going on - after all, this is a large part of the \"Mobile\" part of being a Mobile Armored Corps Marine.  You don't fly down and land on planets - you get fired at them, like a bullet from space.\n\n*page_break\n\nTo keep your mind occupied while you wait, you think over the mission.  At 0500 local time, just before dawn, the Shock Troopers will land on the roof of a large power station complex.  In fact, this is THE power station, for the entire planet!  There are only a few thousand colonists on the world, but there's a lot of machinery that this station powers.  You have been ordered to keep this station intact.  The shock troopers will land on the roof of the power station complex's main auditorium, right when intel says a weekly meeting should be going on.\n\nAt least, intel from over two weeks ago says that.  There had been some talk about rebelling against the empire, and that weekly meetings were held here at this station.  Now with communications with the entire colony cut off, the higher-ups guess that the rebellion has likely begun.\n\nRegardless of what's happening, that's the Shock Trooper's job - assault the auditorium, secure it and anyone in it, and then wait for your instructions.\n*page_break\n\nMeanwhile, right at the moment that they break in through the roof of the meeting hall, you will be shot into the Hall of Hope - that's the settlement's town hall.  The impact of your landing should level the two story stone structure, and perhaps about a block in any given direction.  The Hall of Hope is situated in the center of the settlement, with farms to the north and the station's spaceport to the south, with the sprawling power station complex to the east.\n\nAfter landing, your job is to scout out the settlement and assess the situation.  You have been given full authority on the ground for this mission.  Once you have gathered intel on the settlement proper, you are to rendezvous with the Shock Troopers and secure the power station.\n\nYour Commanding Officer did ask you to preserve the settlement as much as possible.  The settlers will need to get back to their lives as quickly as possible.  And again, keeping the power station intact is vital.\n\nHow heavy a hand you use, is up to you.  These colonists might be armed rebels, or they might be fools following a radical.  It's up to your discretion in how you handle things.  You're the one who has to live with yourself - the Empire simply wants its colony back!\n\n*page_break\n\nYou feel your drop pod shudder, stop suddenly, and then your stomach is in your throat as the pod is launched from the Slipdagger.  This is nothing like free fall - that would be easy by comparison.  This is being SHOT at the planet.  Your body is packed with chemicals and augments to help you deal with this, but even so, you feel like wetting yourself.  You feel like screaming.  You feel like throwing up.\n\nBut you also feel like laughing!  It's a confusing experience!\n\n\nYou feel and hear the soft PING PING that usually means planetary defensive fire.  Looks like they don't want you to land.  How rude.\n*page_break \nThen, even more sudden than the feeling of launch, you stop.  Your suit's auto calibrations cut out what you know is a deafening explosion that comes along with a drop pod hitting the ground.  You feel the smaller munitions that blast away the sides of the pod, and quickly climb out to find yourself in the center of a large smoking crater.  Twisted metal girders and rebar jut from the broken earth, and chunks of stone and scorched glass are still raining down from the sky.\n \nLooks like your first successful combat landing!\n\nWith a quick scan, you don't see anything moving.  What do you do?\n*choice\n\t#With a blast from my Armor's boosters, I leap up out of the pit into the sky, to get a good look around.\n\t\tLaunching yourself into the air and free from the smoke of the crater, you quickly notice that there's no one in sight.  The settlement looks empty.  You turn and look towards the power station just in time to catch a green blast of some kind off your left shoulder.  It clips you good, and the force knocks you back and off balance.  You land quickly and find cover.  The shot came from towards the power station.\n\n\t\t*set armor-7\n\t\t*if armor \u003c 1\n\t\t\t*goto_scene Combat_Death\n\t\t*else\n\n\t\t\t- Armor damaged, down to ${armor} percent!\n\t\t\t*goto advance\n\t#I use a quick burst from my Armor's boosters, to hop up to the edge of the crater, and take a look around.\n\t\tFrom the edge of the crater, you notice that the settlement seems empty.  There doesn't seem to be anyone around.  Strange.  You can see smoke from the power station, and hear gunfire from that direction, but otherwise the place seems dead.\n\t\t*goto advance\n\t#I stop still and listen for anything I can catch, while using my Armor's other sensors to sweep from within the crater.\n\t\tYou listen for several moments, but can't hear a thing.  At all.  Using your suit's scanners, you don't pick up any energy signatures from anywhere nearby.  What do you do now?\n\t\t*choice\n\t\t\t#With a blast from my Armor's boosters, I leap up out of the pit into the sky, to get a good look around.\n\t\t\t\tLaunching yourself into the air and free from the smoke of the crater, you quickly notice that there's no one in sight.  The settlement looks empty.  You turn and look towards the power station just in time to catch a green blast of some kind off your left shoulder.  It only clips you, but the force knocks you back and off balance.  You land quickly and find cover.  The shot came from towards the power station.\n\n\t\t\t\t*set armor-12\n\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t*else\n\n\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\t\t\t\t\t*goto advance\n\t\t\t#I use a quick burst from my Armor's boosters, to hop up to the edge of the crater, and take a look around.\n\t\t\t\tFrom the edge of the crater, you notice that the settlement seems empty.  There doesn't seem to be anyone around.  Strange.  You can see smoke from the power station, and hear gunfire from that direction, but otherwise the place seems dead.\n\t\t\t\t*goto advance\n\n*label advance\n*page_break\n\nThis settlement is creepy.  There should be a few thousand people here, but the place is still and quiet.  A light breeze tumbles some loose papers through the street, and the only thing you can hear is the distant pop of automatic rifle fire from the direction of the power station.\n*goto settlement\n\n*label settlement\nWhat direction do you want to go?\n*choice\n\t#West, towards the power station.\n\t\t*if ((northset != \"done\") and (eastset != \"done\")) and (southset != \"done\")\n\t\t\tYou start to head that way, then remember your mission entailed scouting the settlement.  What do you do?\n\t\t\t*choice\n\t\t\t\t#Don't scout - head directly to the station.\n\t\t\t\t\t*goto headingwest\n\n\t\t\t\t#Head back and scout.\n\t\t\t\t\t*goto settlement\n\t\t*else\n\t\t\t*goto headingwest\n\t*if northset !=\"done\"\n\t\t#North, through the settler's houses, and maybe to the farms beyond.\n\t\t\t*set northset \"done\"\n\t\t\tYou duck into several houses and buildings, but find nothing.  The place is abandoned, and from the looks of things, it's been this way for a while.  There's no sign of struggle, just empty buildings.  Interestingly, you realize that very few of them are locked, though.  A few doors hang wide open, and toss back and forth in the breeze.  What happened here?!\n\t\t\t*page_break \n\t\t\t*if puppy=\"no\"\n\n\t\t\t\tYou search through several homes and a few commercial buildings, finding nothing.  You're looking through an empty school, with books still open on some of the decks, when your scanners pick up a sound.\n\n\t\t\t\tYou freeze and listen for a moment.  At first, all you can hear is your heart pounding in your ears, but then you hear the sound again - a soft whine.\n\n\t\t\t\tPistol out, you step out of the classroom into the school playground.  A swing rocks in the breeze, when suddenly a little brown puppy comes trotting out toward you.  He's whining and trying to nuzzle against your Armor's boot.  The little guy looks hungry.  What do you do?\n\t\t\t\t*choice\n\t\t\t\t\t#I kick him.\n\t\t\t\t\t\tYou hear a quick yelp, and then the puppy is soaring into the air, off over the rooftops.\n\n\t\t\t\t\t\t*set dark %-37\n\t\t\t\t\t\t*set puppy \"killed\"\n\n\t\t\t\t\t\t- Darkness grows within you...\n\t\t\t\t\t\t*goto northwalk\n\n\t\t\t\t\t#I ignore the puppy - I have a mission.\n\t\t\t\t\t\tYou ignore the whining little puppy, and keep moving.  People's lives are in your hands!\n\n\t\t\t\t\t\t*goto northwalk\n\n\t\t\t\t\t#I hunt down some food for him.\n\t\t\t\t\t\tThe puppy follows you as you ransack the school cafeteria, smashing apart cupboards and shelving, looking for food.  You don't find anything very quickly - this might take more time.  What do you do?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Keep looking until I feed the little guy.\n\t\t\t\t\t\t\t\tYou haul out a refrigerator, completely stocked, through the front wall of the cafeteria freezer.  Ripping the door off of the refrigerator, you dump the food in the street for the pup.  Tail wagging, he dives into the food.\n\t\t\t\t\t\t\t\t*set dark %+37\n\t\t\t\t\t\t\t\t*set puppy \"fed\"\n\n\t\t\t\t\t\t\t\t- Light increased\n\n\t\t\t\t\t\t\t\tHowever, this took a long time.  When you get done, you notice that your arm console, your Oracle, reads that one of the Shock Troopers' life signs has winked out.  There must be a hard fight going on over at the power station...\n\t\t\t\t\t\t\t\t*set troopcount-1\n\t\t\t\t\t\t\t\t*goto northwalk\n\n\t\t\t\t\t\t\t#Ditch the puppy.\n\t\t\t\t\t\t\t\tThe puppy whines, and tries to follow you, but you tell him to stay.  He doesn't listen, so you are forced to yell to scare the puppy away.  You have more important things to think about right now.\n\t\t\t\t\t\t\t\t*set puppy \"killed\"\n\n\t\t\t\t\t\t\t\t*goto northwalk\n\t\t\t\t\t\t\t#Pick him up, empty out my tool kit and keep the puppy with me.\n\t\t\t\t\t\t\t\t*goto puppylove\n\t\t\t\n\n\t\t\t\t\t#I pick him up, dump out my suit maintenance tool compartment, and keep the puppy inside it.\n\t\t\t\t\t\t*label puppylove\n\t\t\t\t\t\t- Light increased greatly\n\n\t\t\t\t\t\t*set dark %+34\n\t\t\t\t\t\t*set puppy \"keep\"\n\t\t\t\t\t\tYou dump out your tools on the ground, scoop the puppy up and load him inside.  Glancing at the tools scattered about, you hope you don't need them later. You still have your wrist mounted multi-tool, but that's it.\n\n\t\t\t\t\t\t*set technical-2\n\t\t\t\t\t\t- Technical decreased greatly\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto northwalk\n\t\t\t*label northwalk\n\n\t\t\tMoving through the streets, you come to the north edge of the settlement.  A short distance away, the domed hydroponic farms squat like gigantic glass bubbles.  These greenhouses are where the people of this world grew all of their food.\n\n\t\t\tOff to your right, a movement catches your eye.  Turning quickly, all you see is a large glass greenhouse.  It looks like wheat, or something like it, is growing inside.  What do you do?\n\t\t\t*choice\n\t\t\t\t#I don't have time for games - I lock a hellfire incendiary missile into my shoulder launcher and blast the place, burning it down.\n\t\t\t\t\t*set northset \"done\"\n\t\t\t\t\t*label burningfarm\n\t\t\t\t\tYour missile streaks toward the greenhouse, smashes through the thin glass wall and explodes.  The stalks of wheat ignite quickly, and within a heartbeat the whole greenhouse has erupted in flames.  The glass ceiling shatters, and the walls of the greenhouse fall outwards into the neighboring structures.  The fires leap and spread, and within a few minutes, the whole farming complex is roaring in flames.\n\n\t\t\t\t\tWell, you think, these colonists, wherever they are, probably don't need the food anyway.\n\t\t\t\t\t*set dark %-30\n\n\t\t\t\t\t- Darkness grows within you...\n\t\t\t\t\n\t\t\t\t\tYou head back to your landing point in the center of the settlement.\n\n\t\t\t\t\t*goto settlement\n\t\t\t\t#I need to see what's going on here - I step up and investigate.\n\t\t\t\t\tStriding up to the greenhouse, you open the door and step inside.  The dim light of early morning turns the sea of stalks into a shadowy golden mass.  You turn on your helmet's infrared, and are shocked to find not one, but three shapes waiting for you, hidden among the stalks of wheat! \n\n\t\t\t\t\tWhat do you do?\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I open fire, blasting the shapes.\n\t\t\t\t\t\t\tIf they're innocent, then it's their fault for hiding, right?\n\n\t\t\t\t\t\t\t*set dark %-25\n\t\t\t\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t\t\t\tCutting loose with your blaster, you hear shrieks and screams as your weapons shred the shapes. One of them blasts back at you, and you get forced backwards toward the door.\n\t\n\t\t\t\t\t\t\t*set armor-6\n\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t*else\n\n\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\tWhat do you do now?\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Toss a hellfire incendiary grenade into the wheat, and burn them to ash.\n\t\t\t\t\t\t\t\t\t\t*goto burningfarm\n\t\t\t\t\t\t\t\t\t#Cease fire and demand that the survivors drop their weapons.\n\t\t\t\t\t\t\t\t\t\tThere's a moment of silence, followed by snorting and an inhuman chuckle.  A raspy voice calls out, \"Foolissssh,\" and then you take a blaster bolt to the chest, knocking you down.\n\t\t\t\t\t\t\t\t\t\t*set armor-9\n\t\t\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t\t\t\t*else\n\n\t\t\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\t\t\t\tYou get back up, convinced now that these things are at least not on your side, and probably inhuman.  You open fire again.\n\t\t\t\t\t\t\t\t\t\t\t*goto keepblasting1\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t#Keep blasting. \n\t\t\t\t\t\t\t\t\t\t*label keepblasting1\n\t\t\t\t\t\t\t\t\t\tYou launch a shoulder rocket at one of the targets, and let loose a volley from your blaster pistol at the other.  Within moments, it's over.\n\n\t\t\t\t\t\t\t\t\t\tStepping through the burnt and ruined stalks of wheat, you walk over to one of the fallen corpses to get a better look.  The body is badly burnt, but it looks like some kind of reptilian creature.  The alien looks like it would have stood about six feet tall, but hunched forwards.  The head is definitely reptilian, and toothy like an alligator.  Its legs look strong and it has a large thick tail.  On its belt you see what looks like a silvery machete, and it's gripping what clearly looks like a blaster pistol in its right hand.\n\n\t\t\t\t\t\t\t\t\t\tYou wonder what these things are - they don't look like a race that you are familiar with.  You also notice that they have spikes on their tails, and that the spikes are capped with some kind of blue-silver metal - the same metal that the machetes they wear are made of.  \n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\tYou look around some more, but find nothing else moving around in the area of the farms.  You decide to head back to the center of the settlement.\n\n\t\t\t\t\t\t\t\t\t\t*goto settlement\n\t\t\t\t\t\t#I call out to them, in case they're friendly.\n\t\t\t\t\t\t\tThere's a moment of silence, followed by a snort and an inhuman chuckle.  A raspy voice calls out, \"Foolissssh,\" and then you take a blaster bolt to the chest, knocking you down.\n\t\t\t\t\t\t\t*set armor-10\n\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t*else\n\n\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\tYou get back up, convinced now that these are at least not on your side, and probably inhuman.  You open fire again.\n\t\t\t\t\t\t\t\t*goto keepblasting1\n\n\t\t\t\t\t\t#I take a minute to analyze the readings.\n\t\t\t\t\t\t\tLooking at your Oracle, you see that the heat readings of these creatures are much to low to be humans, unless they are in some kind of suits.  Then one turns to the side, and you catch the profile - the shape of a jumping kangaroo, but with a beak?  That's the image your mind paints, at least.  NOT human, then...\n\n\t\t\t\t\t\t\tWhat do you do?\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Toss a hellfire incendiary grenade into the wheat, and burn them to ash.\n\t\t\t\t\t\t\t\t\t*goto burningfarm\n\t\t\t\t\t\t\t\t#Demand that they drop their weapons.\n\t\t\t\t\t\t\t\t\tThere's a moment of silence, followed by an inhuman chuckle.  A raspy voice calls out, \"Foolissssh,\" and then you take a blaster bolt to the chest, knocking you down.\n\t\t\t\t\t\t\t\t\t*set armor-13\n\t\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t\t\t*else\n\n\t\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\t\t\tYou get back up, and open fire.\n\t\t\t\t\t\t\t\t\t\t*goto keepblasting1\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t#Blast 'em. \n\t\t\t\t\t\t\t\t\tYou launch a shoulder rocket at one of the targets, and let loose a volley from your blaster pistol at the other.  The third one fires back, shattering the glass next to you.  You duck and roll to your left, coming up firing, and hit the third target in both the face and the chest!\n\n\t\t\t\t\t\t\t\t\tStepping through the burnt and ruined stalks of wheat, you walk over to one of the fallen corpses to get a better look.  The body is badly burnt, but it looks like some kind of reptilian creature.  .  It looks like it stood about six feet tall, but hunched forwards.  The head is definitely reptilian, and toothy like an alligator.  Its legs look strong and it has a large thick tail.  On its belt you see what looks like a silvery machete, and it's gripping what clearly looks like a blaster pistol in its right hand.\n\t\t\t\t\t\t\t\t\tYou wonder what these things are - they don't look like a race that you are familiar with.  You also notice that they have spikes on their tails, and that the spikes are capped with some kind of blue-silver metal - the same metal that the machetes they wear are made of.  \n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\tYou look around some more, but find nothing else moving around in the area of the farms.  You decide to head back to the center of the settlement.\n\n\t\t\t\t\t\t\t\t\t*goto settlement\n\t\t\t\t\t\t#I stealthily sneak around to the side of the farm and scout it out.\n\t\t\t\t\t\t\t*label stealthfarm\n\t\t\t\t\t\t\t*if stealth > 10\n\t\t\t\t\t\t\t\tWith your incredible stealth, you slink around to the side of the greenhouse.  Creeping up to the window, you activate your infrared.  Three shapes glow dimly, and checking your readings, you see that these creatures are certainly not human.  They're too cold, and are shaped wrong.  They stand about the size of a person, but they walk hunched forwards, with long tapering faces and large tails sticking out the back.\n\n\t\t\t\t\t\t\t\tWhat do you want to do from here?\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Toss a hellfire incendiary grenade through the glass ceiling of the greenhouse, and burn them to cinders.\n\t\t\t\t\t\t\t\t\t\t*goto burningfarm\n\t\t\t\t\t\t\t\t\t#Take careful aim and blast the creatures.\n\t\t\t\t\t\t\t\t\t\t*goto keepblasting1\n\t\t\t\t\t\t\t\t\t#Sneak away, back to the landing site.\n\t\t\t\t\t\t\t\t\t\tYou duck down, and pull back slowly, stealthily and silent.  You walk back to your landing site in the middle of the settlement, thinking about what you saw.  What WERE those things?\n\n\t\t\t\t\t\t\t\t\t\t*goto settlement\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYou slink up to the side of the greenhouse, and as you go to look inside, you trip.  If only you were a little more stealthy!\n\n\t\t\t\t\t\t\t\tYou wave your arms to catch yourself, and then fall through the glass wall of the greenhouse.  The sound is deafening in the silence!\n\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\tYou roll to your feet as fast as you can, and something strikes you in the back, knocking you back to your knees.\n\n\t\t\t\t\t\t\t\t*set armor-6\n\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\t\t\t\t\t\t\t\t\t*set infamy %+ guts \n\t\t\t\t\t\t\t\t\tYou leap to the side, spinning, and cut loose with your blast pistol, firing randomly.  You hear a kind of gurgling grunt in response to your blasting - you hit one!\n\t\n\t\t\t\t\t\t\t\t\t- Glory gained\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\tGetting back to your feet, something charges you through the stalks of wheat, hissing.\n\t\n\t\t\t\t\t\t\t\t\t*label fight1\n\t\t\t\t\t\t\t\t\tWhat do you do?\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#I hold my ground, and let loose with my battle cry!\n\t\t\t\t\t\t\t\t\t\t\t*if guts \u003c 12\n\t\t\t\t\t\t\t\t\t\t\t\tSorry, but you aren't gutsy enough for that!\n\t\t\t\t\t\t\t\t\t\t\t\t*goto fight1\n\t\t\t\t\t\t\t\t\t\t\t*elseif fighting > 10\n\t\t\t\t\t\t\t\t\t\t\t\tUsing your suit's amplifiers, you let out a mighty roar.  With a blast from your thrusters, you rocket forward and knock back the creature that was charging you.  You catch a glimpse of its glittering yellow eyes, wide in shock, as you drop your shoulder and slam the green scaly reptilian into the air.  It soars crashing through a high window.\n\n\t\t\t\t\t\t\t\t\t\t\t\tYou spot two more lizard creatures off to your sides.  They look like they were about to attack, but instead they turn and try and run.  You blast one in the back with your pistol, and then launch yourself after the third, crushing it with your weight.\n\n\t\t\t\t\t\t\t\t\t\t\t\t*set infamy %+ (guts + (guts + guts))\n\t\t\t\t\t\t\t\t\t\t\t\t- Glory increased\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t*label deadone\n\t\t\t\t\t\t\t\t\t\t\t\tYou look down at the dead monster at your feet.  It looks like a mottled brown and green mix between a man and a crocodile.  It has a large, strong tail and strong legs, but its arms are small in comparison.  On its belt you see what looks like a blaster and a silver machete.\n\n\t\t\t\t\t\t\t\t\t\t\t\tYou wonder what these things are... They don't look like a race that you are familiar with.  You also notice that they have spikes on their tails, and that the spikes are capped with some kind of blue-silver metal.  Looking closer, you see that it's the same metal that the machete is made of.  \n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\tYou look around some more, but find nothing else moving in the area of the farms.  You decide to head back to the center of the settlement.\n\n\t\t\t\t\t\t\t\t\t\t\t\t*goto settlement\n\t\n\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tUsing your suit's amplifiers, you let out a mighty roar.  With a blast from your thrusters, You rocket forward and knock back the creature that was charging you.  You catch a glimpse of its yellow eyes, wide in shock, as you drop your shoulder and slam the green scaly reptilian into the air.  It soars crashing through a high window.\n\n\t\t\t\t\t\t\t\t\t\t\t\tYou spot two more lizard creatures off to your sides.  One leaps at you, slashing with a large blade that's glowing faintly blue.  The blade buries itself in your shoulder, knocking you back in a shower of sparks.\n\t\t\t\t\t\t\t\t\t\t\t\t*set armor-7\n\t\t\t\t\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou strike back, kicking the reptile right in the chin, snapping its head back violently.  It slumps to the ground, eyes wide in death.  The third one is half way to the greenhouse door, so you launch yourself after it.  Right as you are about to crush it beneath you, it lashes at you with glowing blue spikes on its tail.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\tAs you land you catch the tail in one steel gauntleted hand, blocking it.  With a smooth twist you whip the creature off its feet and hurl it hissing and screeching through the glass roof of the greenhouse.  As it sails through the air, you take aim with your shoulder rocket and fire, blasting the monster to smoldering bits in mid-air.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set infamy %+ (guts + (guts + guts))\n\t\t\t\t\t\t\t\t\t\t\t\t\t- Glory increased greatly!\n\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto deadone\n\t\t\t\t\t\t\t\t\t\t#Open up, firing everything I've got.\n\t\t\t\t\t\t\t\t\t\t\t*if shooting > 12\n\t\t\t\t\t\t\t\t\t\t\t\tWith your skill and marksmanship, you calmly take aim and fire into the face of the creature, knocking it backwards.  Another leaps at you from the side, but you shoot it once in the gut, and then again in the face.\n\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tStepping through the burnt and ruined stalks for wheat, you walk over to one of the fallen corpses to get a better look.  \n\t\t\t\t\t\t\t\t\t\t\t\t*goto deadone\n\t\t\t\t\t\t\t\t\t\t\t*elseif shooting > 10\n\t\t\t\t\t\t\t\t\t\t\t\tYou calmly aim your pistol, and blast the creature in the chest.  It squawks once, and crumples lifeless to the ground.  But then a second creature leaps hissing from the wheat in front of you.  You see the flash of vicious looking teeth and for a moment it looks like some kind of animal is attacking you!  But then it slashes at you with a blue glowing machete.  You leap back, but the weapon makes a gash in your Armor's gut!\n\t\t\t\t\t\t\t\t\t\t\t\t*set armor-3\n\t\t\t\t\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou steady yourself, and fire from the hip, catching the creature in the chest with a bolt of energy.  It spins off to the side, its smoldering body a corpse before it hits the ground.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set infamy %+guts\n\t\t\t\t\t\t\t\t\t\t\t\t\t- Glory gained\n\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\tStepping through the burnt and ruined stalks for wheat, you walk over to one of the fallen corpses to get a better look.  \n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto deadone\n\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\tYou blast the creature, but your aim was a little off.  It bursts through the wheat in front of you, and you see it clearly for a moment - a lizard-like creature, green and bleeding a sickly yellow liquid from a blaster wound in the right shoulder.  The hissing, screeching monster leaps at you, brandishing a machete that glows faintly blue.\n\n\t\t\t\t\t\t\t\t\t\t\t\tThe blade digs deeply into your Armor's chest, spitting out a shower of sparks and knocking you backward.\n\t\t\t\t\t\t\t\t\t\t\t\t*set armor-6\n\t\t\t\t\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou steady yourself, and hurl your fist into the creature's face, smashing its jaw and sending it flying through the glass wall on the other side of the greenhouse!\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set infamy %+ (guts + guts)\n\t\t\t\t\t\t\t\t\t\t\t\t\t- Glory gained\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto keepblasting1\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t#Give my jet thrusters a blast, launching forward, fists flying.\n\t\t\t\t\t\t\t\t\t\t\t*if fighting > 11\n\t\t\t\t\t\t\t\t\t\t\t\tYou rocket forward and knock back the creature that was charging you.  It gets slammed to the ground, spasms, and stops moving.  You catch a glimpse of green, scaly skin, when two more leap at you through the wheat.  You stop one with a solid kick to the gut, and catch the third by the throat, snapping it with a quick twist of the wrist, and dropping the lifeless body to the ground in a heap.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto deadone\n\t\t\t\t\t\t\t\t\t\t\t*elseif fighting > 10\n\t\t\t\t\t\t\t\t\t\t\t\tYou rocket forward and knock back the creature, but it spins in the air.  You see a flash of electric blue, and the creature's tail spikes slash into your left shoulder, cutting deep gashes into your Armor!\n\t\t\t\t\t\t\t\t\t\t\t\t*set armor-2\n\t\t\t\t\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou grab the tail and give it a pull.  The creature it's attached to looks back at you and hisses.  With your Armor's incredible strength, you yank back and up, pulling the creature off of the ground!  It squawks and screeches.  Another comes charging at you through the wheat and you spin, slamming the animal that you are holding down on the one that charged you!  With sickening crunches, both go limp.  One more leaps out at you, and you slam your fist into its toothy face, sending large white teeth and yellow ichor spraying.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set infamy %+ (guts + guts)\n\t\t\t\t\t\t\t\t\t\t\t\t\t- Glory gained\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto deadone\n\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\tYou rocket forward and knock back the creature that was charging you.  It gets slammed to the ground, convulses, and ceases moving.  You catch a glimpse of green, scaly skin, when two more leap at you through the wheat.\n\n\t\t\t\t\t\t\t\t\t\t\t\tOne catches you in the shoulder with a glowing blue machete, while the other whips its tail around and lashes you with glowing blue spikes.\t\n\t\t\t\t\t\t\t\t\t\t\t\t*set armor-6\n\t\t\t\t\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou steady yourself, and whip out with a backhand, knocking one of the lizards to the ground.  You then hurl your fist into the other creature's face, smashing its jaw and sending the monster flying through the glass wall on the other side of the greenhouse!\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set infamy %+ (guts + guts)\n\t\t\t\t\t\t\t\t\t\t\t\t\t- Glory gained\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto keepblasting1\n\t\t\t\t\t\t\t\t\t\t#Jet into the sky, and burn the greenhouse from the air.\n\t\t\t\t\t\t\t\t\t\t\tWith a blast of your jet thrusters, you launch through the glass ceiling, sending a shower of crystal shards raining down on the lizards below.  As they duck for cover, you toss a couple of hellfire incendiary grenades into the wheat fields.\n\n\t\t\t\t\t\t\t\t\t\t\t*goto burningfarm\n\n\t\t\t\t#I duck down, and stealthily move around the greenhouse.  Maybe whatever it was hasn't seen me yet.\n\t\t\t\t\t*goto stealthfarm\n\t\t\t\t#I head back through the houses, toward the middle of the settlement.\n\t\t\t\t\tYou jog back to the middle of the settlement, leaving the farms behind.\n\n\t\t\t\t\t*goto settlement\n\n\t*if southset !=\"done\"\n\t\t#South, towards the landing fields.\n\t\t\t*set southset \"done\"\n\t\t\tWith a couple of low-level thruster jumps, you get through the settlement and alight at the edge of the landing fields.  To your right you see flat landing pads for starships, and suddenly notice that they are all empty.  Where are the colonists' ships?\n\n\t\t\tTo your left the control tower looms in the early morning gray light.  As you watch, you catch the flash of a red light.  It was only a moment, but it was there, up in the windows of the control tower.\n\t\t\t\n\t\t\tWhat do you want to do?\n\t\t\t*choice\n\t\t\t\t#I fly up to the top of the tower.\n\t\t\t\t\tYou crash in through one of the tower's huge glass windows, slamming through several computer consoles.  You look around the control room but don't find anything.  Strange.  What do you want to do?\n\t\t\t\t\t*goto towerloop\n\n\t\t\t\t#I use my thrusters to skim across the landing field, to the ground level doors of the tower.\n\t\t\t\t\tWith a low blast from your booster pack, you skim quickly across the ground right up to the large doors.  They're unlocked, so you let yourself in.\n\n\t\t\t\t\tThe interior hallway is dark - what do you do?\n\t\t\t\t\t*choice\n\t\t\t\t\t\t*if bionic_1 = \"Cybernetic Eye\"\n\t\t\t\t\t\t\t#I use my enhanced cybernetic eye to look around.\n\t\t\t\t\t\t\t\tYour eye flickers to life, casting red laser sweeps across the hallway.  It looks clear.  You take the stairs up to the control room at the top, and sweep the room.  You immediately notice two things - what looks like a small human is hiding behind some computer consoles, and a hand held PDA resting on a counter top that still registers as active.\n\n\t\t\t\t\t\t\t\tWhat do you want to do?\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#I go rip out the computer console that the human is hiding behind.\n\t\t\t\t\t\t\t\t\t\t*goto littleboy2\n\t\t\t\t\t\t\t\t\t#I threaten the human figure, demanding that it come out and tell me who it is.\n\t\t\t\t\t\t\t\t\t\tUsing your Armor's amplifiers, you demand that whoever is hiding come out.  Now.  A small child comes crawling out, crying.  He looks terrified.\n\t\t\t\t\t\t\t\t\t\t*goto threatkid\n\t\t\t\t\t\t\t\t\t#I go take a look at the PDA\n\t\t\t\t\t\t\t\t\t\tAs you pick it up, the screen flickers to life.  At a quick glance, you can see that this pad is registered to a vice administrator named Jackson.  It looks like if you spent some time with it, there could be some useful info on it.  What do you want to do?\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Take some time to study the PDA.\n\t\t\t\t\t\t\t\t\t\t\t\tYou link the PDA to your Oracle, and scan the info through your heads up display.  A detailed map of the settlement pops up, showing the landing fields to the south, farms to the north, large storage facilities to the east and the power station complex to the west.  The PDA registers that the power station generates far more power than the settlement currently needs.  Apparently, it was designed with the forethought that this settlement would grow and become the hub of the planetary government.  Looking at the power station, you see codes for locking the station down, and the code to some kind of reinforced bunker that lies beneath the station.\n\n\t\t\t\t\t\t\t\t\t\t\t\tJust then, your Oracle pops up a blinking icon, alerting you that one of the Shock Troopers has died.  You realize that you've been standing here for too long!  Closing up your Oracle, you turn back to the console with the human hiding behind it.\n\n\t\t\t\t\t\t\t\t\t\t\t\tIn a rush, you grip the console, and rip it away.\n\t\t\t\t\t\t\t\t\t\t\t\t*set code \"yes\"\n\t\t\t\t\t\t\t\t\t\t\t\t*set troopcount-1\n\t\t\t\t\t\t\t\t\t\t\t\t*set morale %-10\n\t\t\t\t\t\t\t\t\t\t\t\t*goto littleboy2\n\t\t\t\t\t\t\t\t\t\t\t#Forget it, and go deal with the human.\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#I go rip out the computer console that the human is hiding behind.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto littleboy2\n\t\t\t\t\t\t\t\t\t\t\t\t\t#I threaten the human figure, demanding that it come out and tell me who it is.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tUsing your Armor's amplifiers, you demand that whoever is hiding come out.  Now.  A small child comes crawling out, crying.  He looks terrified.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto threatkid\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t#I turn on my searchlights, and explore the tower.\n\t\t\t\t\t\t\tThe interior of the tower is empty, and you don't see any evidence of fighting.  It simply looks abandoned.  You make your way through the building, and find the elevator.  Unfortunately, the power is off, so you turn to the stairs.\n\n\t\t\t\t\t\t\t*label exploring1\n\t\t\t\t\t\t\tJogging up the stairs, you step into the control room at the top of the tower.  Dim early morning light filters in through the large windows.\n\n\t\t\t\t\t\t\tYou search the whole room, but don't find anything.  Strange.  What do you want to do?\n\t\t\t\t\t\t\t*label towerloop\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#I leave the tower, and destroy it on my way out.\n\t\t\t\t\t\t\t\t\tWith a blast from your thrusters, you launch yourself through one of the large plate glass windows.  Hovering outside, you turn, take aim, and launch a rocket through the window you came out of.\n\t\n\t\t\t\t\t\t\t\t\t*goto blasttower\n\t\t\t\t\t\t\t\t#I switch to infrared scanning.\n\t\t\t\t\t\t\t\t\t*goto littleboy1\n\t\t\t\t\t\t\t\t#I call out, to see if anyone is here.\n\t\t\t\t\t\t\t\t\tYou don't hear anything.  The place is silent.  What do you do now?\n\t\t\t\t\t\t\t\t\t*goto towerloop\n\t\t\t\t\t\t\t\t#I leave, and head back to the center of the settlement.\n\t\t\t\t\t\t\t\t\tWith a blast from your thrusters, you launch yourself through one of the large plate glass windows.  Flying low, you rocket back to the center of the settlement.\n\t\t\t\t\t\t\t\t\t*goto settlement\n\t\t\t\t\t\t#I keep my lights off, use infrared scanners and try to stay quiet.\n\t\t\t\t\t\t\tYou don't see any significant heat signatures in the rooms on the lower level, so you take the stairs up to the top of the control tower.  As you creep into the control room at the top, you look around.\n\n\t\t\t\t\t\t\t*label littleboy1\n\t\t\t\t\t\t\tAt first you don't see anything, but then you notice that one of the computer consoles seems extra warm.  Stepping up to it, you can easily make out the shape of someone or something hiding behind the computer.  It looks small.  What do you do?\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#I back away, leave the tower, and destroy it on my way out.\n\t\t\t\t\t\t\t\t\tWith a blast from your thrusters, you launch yourself through one of the large plate glass windows.  Hovering outside, you turn, take aim, and launch a rocket through the window you came out of.\n\t\n\t\t\t\t\t\t\t\t\t*goto blasttower\n\t\t\t\t\t\t\t\t#I blast the computer console.  Better safe than sorry.\n\t\t\t\t\t\t\t\t\tYou fire a couple of shots into the computer, and hear a voice scream.  A human voice.  You stop, and rip what's left of the computer out of the way.\n\n\t\t\t\t\t\t\t\t\t*label littleboy2\n\t\t\t\t\t\t\t\t\tA boy cringes away from you, whimpering.  You try to calm him down, but he curls away, mumbling and crying.\n\n\t\t\t\t\t\t\t\t\tYou spend a few minutes trying to calm him down, but he just won't respond to you.  What do you do?\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#I take off my helmet, and try and talk to him quietly and calmly.\n\t\t\t\t\t\t\t\t\t\t\t*if gender = \"female\"\n\t\t\t\t\t\t\t\t\t\t\t\tThe boy brightens up when he sees your face, and even grows a little shy.  \"Sorry, uh, ma'am,\" he stammers.\n\n\t\t\t\t\t\t\t\t\t\t\t\t*goto talkingkid\n\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\tYou spend several minutes talking to him, but he won't look at you.  Then, suddenly, he tries to attack you, biting and scratching!\n\n\t\t\t\t\t\t\t\t\t\t\t\tYou realize that this is going to take a lot of time to get anything useful out of him this way.  What do you want to do?\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#I threaten him, and command him to talk.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto threatkid\n\t\t\t\t\t\t\t\t\t\t\t\t\t#I put him out of his misery, burn this tower down and head back to the settlement.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tWith a quick squeeze of the trigger, this kid's problems are over.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set dark %-55\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tWith a blast from your thrusters, you launch yourself through one of the large plate glass windows.  Hovering outside, you turn, take aim, and launch a rocket through the window you came out of.\n\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto blasttower\n\t\t\t\t\t\t\t\t\t\t\t\t\t#I take the time to talk to him and calm him down.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe boy alternates between quiet whimpering, and lashing out at you.  You spend about 15 minutes with him, and don't see any signs of change.  Just as you are thinking that this is taking too long, your Oracle arm console beeps, telling you that one of the Shock Troopers has been severely wounded.  What do you want to do?\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Take as much time as it takes - this kid needs help.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tAs you work with the kid, he eventually calms down and starts to talk.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set dark %+50\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t- Light increased\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label talkingkid\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tHe explains that he's been hiding there for a long time.  He doesn't know how long.  He tells you that everyone has been taken by some \"dinosaurs with guns\", as he calls them.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tWhen you press him for details, he tells you three more things - first, he tells you that up until everyone disappeared and the \"dinosaurs\" came, the adults were talking and arguing about living forever, and whether or not it was worth it.  He knows that sounds weird, but he swears that's what they were saying.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tSecond, he knows there's a huge reinforced bunker under the south wing of the power station.  He says it's the most strongly reinforced place in the whole colony.  Apparently this kid's dad works at the station, so the kid knows a lot about it, and tells you the code is 767.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tFinally, he tells you that the power station was disabled by an earthquake about a year ago. He says that when it happened there was blue lightning jumping around the station from tower to tower.  If you see that happen, then it means that the station is ruined.  The kid hasn't seen anything like that happen yet, so he thinks that the station is still operational.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tAs you finish talking to the boy, you glance at your Oracle.  While you were talking to this kid, two of the Shock Troopers' life signs have winked out.  \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set code \"yes\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set troopcount-2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tWhat are you going to do now with this kid?\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#I call in to the Slipdagger, and tell them that I've found a survivor.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou radio in, and the captain tells you that they don't have any resources to send to help him just yet.  He also asks if you are aware that the Shock Troopers are facing heavy resistance, and suggests that you get back to your mission.\n\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set infamy %-40\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t- Glory lost...\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou secure the kid as best you can, and tell him that everything will be all right.  Someone will come for him soon.  He smiles, and thanks you.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set dark %+45\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t- Light increased\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tWith a blast from your thrusters, you launch yourself through one of the large plate glass windows.  Flying low, you rocket back to the center of the settlement.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto settlement\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#I put him out of his misery, burn this tower down and head back to the settlement.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tWith a quick squeeze of the trigger, this kid's problems are over.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set dark %-55\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tWith a blast from your thrusters, you launch yourself through one of the large plate glass windows.  Hovering outside, you turn, take aim, and launch a rocket through the window you came out of.\n\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto blasttower\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#I leave him here - I have a mission to get back to.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto teen1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#I switch tactics, and threaten him, commanding him to talk.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label threatkid\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tLooming over the kid, you bark out a harsh command to talk.  He looks at you, wide eyed, clearly terrified.  You point your pistol at a window and, while still glaring at the boy, you blast the window to shards.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set dark %-30\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tHe squeaks, and then tells you everything he knows.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto talkingkid\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Forget it - I leave him here and get back to my mission.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto teen1\n\t\t\t\t\t\t\t\t\t\t\t\t\t#I leave him here - I have a mission to get back to.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto teen1\n\t\t\t\t\t\t\t\t\t\t#I threaten him, and command him to talk.\n\t\t\t\t\t\t\t\t\t\t\t*goto threatkid\n\t\t\t\t\t\t\t\t\t\t#I make sure the kid is OK for now, and get back to my mission.\n\t\t\t\t\t\t\t\t\t\t\tDoing a quick scan of the kid, he looks OK, but he's probably suffering from some kind of shock.  You make sure that he's at least alright for the moment, and turn and head back to the settlement.  On your way, you call in to the Slipdagger to let them know that you found a settler.  \"Did he have any useful information?\" the captain asks.  You assume he didn't, and if he did, it would have taken too much time to get it.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tFlying low, you rocket back to the center of the settlement.\n\t\t\t\t\t\t\t\t\t\t\t*goto settlement\n\t\t\t\t\t\t\t\t\t\t#I get out of here.  This kid isn't worth my time.\n\t\t\t\t\t\t\t\t\t\t\t*label teen1\n\t\t\t\t\t\t\t\t\t\t\t*set dark %-25\n\t\t\t\t\t\t\t\t\t\t\tYou decide to abandon the teenager - you have a mission, and this kid is just distraction.\n\n\t\t\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t\t\t\t\t\t\t\tWith a blast from your thrusters, you launch yourself through one of the large plate glass windows.  Flying low, you rocket back to the center of the settlement.\n\t\t\t\t\t\t\t\t\t\t\t*goto settlement\n\t\t\t\t\t\t\t\t#I rip the computer out, to see what's there.\n\t\t\t\t\t\t\t\t\t*goto littleboy2\n\t\t\t\t\t\t#I call out loudly to see if anyone is here.\t\n\t\t\t\t\t\t\tNo one answers.  You turn on your lights, and explore the ground floor, finding nothing.\n\n\t\t\t\t\t\t\t*goto exploring1\n\n\t\t\t\t#I take aim, and blast the tower with a rocket!\n\t\t\t\t\tWith a press of a button, a rocket rips free from your shoulder launcher, and streaks toward the tower.\n\n\t\t\t\t\t*label blasttower\n\n\t\t\t\t\tThe tower erupts in fire and explodes, spraying a shower of flaming wreckage across the landing field.  You wonder for a moment if there was anyone hiding in there...  Well, better safe than sorry!\n\n\t\t\t\t\t*set dark %-33\n\t\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t\tLooks like your work here is done!  You head back to the middle of the settlement.\n\t\t\t\t\t*goto settlement\n\t\t\t\t#I head back to where I landed, near the middle of the settlement.\n\t\t\t\t\t*goto settlement\n\n\t*if eastset !=\"done\"\n\t\t#East, towards the large storage warehouses set on the hills.\n\t\t\t*set eastset \"done\"\n\t\t\tYou kick up and blast off, skimming above the ground, streaking toward the warehouses.  About half way there, your Armor's missile lock systems get triggered, and three red squares light up on your display.  Three missiles have locked onto you, and are rocketing towards you from the area of the warehouses.  \n\n\t\t\tSwinging your feet forward, and slow to a hover.  Almost casually, you fire three smaller rockets of your own from your shoulder cannon.  Three fireballs light up the sky.\n\n\t\t\tScanning, you see what look like weapons platforms on the roofs of the warehouses.  You can make out a few different types, and figure that this must be where the anti-aircraft fire came from that hit your drop pod.  A quick scan shows no life signs - these guns must be automated.\n\n\t\t\n\t\t\tWhat do you do?\n\t\t\t*choice\n\t\t\t\t#I load the heaviest missiles I've got, and blast those warehouses off the map!\n\t\t\t\t\t*label dusting\n\t\t\t\t\tYou cycle over to incendiary missiles, and begin firing rocket after rocket at the warehouses.  The first missile blasts the enemy missile launcher into flaming wreckage.  The second missile
