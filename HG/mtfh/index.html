 food.  Trading their medical knowledge, mostly.  For food.\"\n\n\t\tSickened, you lift your blaster pistol, but Plaxus is faster.  He lunges at you, brandishing one of the lizard creature's silver machetes.  Except that in his hand, it glitters with a blue glow.\n\n\t\t*label decisions2\n\t\tWhat do you do?\n\t\t*choice\n\t\t\t#I dart forward and catch Plaxus!\n\t\t\t\t*if fighting > 11\n\t\t\t\t\tWith your shocking speed and martial skill, you dart forward, dodge Plaxus' attack, and grip him by the throat.  Lifting him into the air, you now hold him in one armored hand.\n\n\t\t\t\t\tYou call in some support to deal with the people in the canisters, and tell them that you have a prisoner.\n\t\t\t\t\t*set plaxus \"yes\"\n\t\t\t\t\t*goto ending\n\t\t\t\t*else\n\t\t\t\t\tUnfortunately, you just aren't skilled enough for a maneuver like that.  As you dart forward, Plaxus slams the glowing machete into your helmet.  Your vision flickers under the heavy blow.\n\t\t\t\t\t*label pikachu2\n\t\t\t\t\t*set armor-10\n\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t*else\n\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\t\t\t\t\t\t\t\n\t\t\t\t\t\tFurious, you slap the machete away, and slam your fist into Plaxus' face.  He hurls back through the air, dead before he hits the ground.\n\n\t\t\t\t\t\t*set infamy %+ (guts + guts)\n\t\t\t\t\t\t- Glory increased\n\n\t\t\t\t\t\tYou call in some support to deal with the people in the canisters.\n\t\t\t\t\t\t*goto ending\n\t\t\t#I let Plaxus hit me, and then catch him\n\t\t\t\t*if guts \u003c 11\n\t\t\t\t\tYou aren't gutsy enough to do that!\n\t\t\t\t\t*goto decisions2\n\t\t\t\t*else\n\t\t\t\t\tPlaxus slams the glowing machete into your right shoulder, spraying the room with sparks.\n\t\t\t\t\t*set armor-14\n\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t*else\n\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\t\t\t\t\t\t\t\n\t\t\t\t\t\tPlaxus' evil grin fades as you casually reach up, yank the machete free, and toss it behind you.  Plaxus makes to turn and run when your armored hand darts out and catches him by the throat.  He struggles for a moment, then gives up and goes limp.\n\n\t\t\t\t\t\t*set infamy %+ (guts + guts)\n\t\t\t\t\t\t- Glory increased\n\n\t\t\t\t\t\tYou call in some support to deal with the people in the canisters, and tell them that you have a prisoner.\n\t\t\t\t\t\t*set plaxus \"yes\"\n\t\t\t\t\t\t*goto ending\n\n\t\t\t#I let Plaxus hit me, and then hit him.  Hard.\n\t\t\t\t*if guts \u003c 12\n\t\t\t\t\tYou aren't gutsy enough to do that!\n\t\t\t\t\t*goto decisions2\n\t\t\t\t*else\n\t\t\t\t\tPlaxus slams the glowing machete into your right shoulder, spraying the room with sparks.\n\t\t\t\t\t*set armor-14\n\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t*else\n\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\t\t\t\t\t\t\t\n\t\t\t\t\t\tPlaxus' evil grin fades as you casually reach up, yank the machete free, and toss it behind you.  Plaxus makes to turn and run when your armored fist backhands him across the face.  The force knocks Plaxus spinning through the air.  His lifeless corpse slams into some canisters, spraying them with his yellow blood.  Calmly, you draw your pistol and blast the body a couple of times, just to make sure.\n\n\t\t\t\t\t\t*set infamy %+ (guts + guts)\n\t\t\t\t\t\t- Glory increased\n\n\t\t\t\t\t\tYou call in some support to deal with the people in the canisters.\n\t\t\t\t\t\t*set lizard \"yes\"\n\t\t\t\t\t\t*goto ending\n\t\t\t#I dodge back and blast him\n\t\t\t\t*if shooting > 11\n\t\t\t\t\t*goto shootingrange2\n\t\t\t\t*else\n\t\t\t\t\tYou shoot, but miss.  Plaxus slams the glowing machete into your helmet.  Your vision flickers under the heavy blow.\n\t\t\t\t\t*goto pikachu2\n\n\t\t\t\t\t\t\n\t#I blast him\n\t\t*label shootingrange2\n\t\tWith one fluid motion you draw your blaster pistol and shoot Plaxus in the chest.  He lets out a gurgling screech, and dies in a pool of yellow blood.  \n\t\t*goto ending\n\t#I raise my blaster pistol, and tell him to stay down\n\t\tYou raise your blaster pistol, and Plaxus raises a reptilian hand in front of his face.  \"Wait!\" he cries, sliding off the table and scrambling across the floor on his back, trying to get away.\n\t\t\n\t\t\"I can give you money!  Riches!  We have amassed a massive amount of gold here!  It could all be YOURS!\"\n\t\t\n\t\tWhat do you do?\n\t\t*choice\n\n\t\t\t*if ((gold = \"yes\") or (gold = \"split\"))\n\t\t\t\t#I tell him I already have his money!\n\t\t\t\t\tYou grin at the foolish man, and say, \"It's already mine.  I found it earlier this morning.  By now it's been loaded onto our ship.\"\n\n\t\t\t\t\tPlaxus' jaw drops, and he sputters, \"What?  But... my money...\"\n\n\t\t\t\t\tWhat do you do now?\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Take him back to the ship as prisoners, and call in some support to deal with the people in the canisters.\n\t\t\t\t\t\t\t*set plaxus \"yes\"\n\t\t\t\t\t\t\t*goto ending\n\t\t\t\t\t\t#Kill him.\t\t\t\t\n\t\t\t\t\t\t\t*goto shootingrange2\n\t\t\t\n\n\t\t\t*else\n\t\t\t\t#I ask him for more details.\n\t\t\t\t\tHe smiles slyly, and says, \"Well, the Lacertians paid a great deal!  It's all stored, here, in the colony!  Maybe we can cut some kind of deal?  You let me live, and I give you the gold?\"\n\t\t\n\t\t\t\t\tWhat do you do?\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I make a deal with him, and then kill him when he tells me where the money is\n\t\t\t\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t\t\t\t*set dark %-50\n\t\t\t\t\t\t\tHe explains that the money is being held in the warehouses on the west side of the settlement.\n\t\n\t\t\t\t\t\t\tOnce you hear that, you give him a smile, and blast him.\n\t\n\t\t\t\t\t\t\tCalling up the Slipdagger, you tell them about the find, and about the colonists.  They send crew to secure both.\n\n\t\t\t\t\t\t\t*set gold \"yes\"\n\t\t\t\t\t\t\t*goto ending\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t#I make a deal with him, and keep my word\n\t\t\t\t\t\t\tHe explains that the money is being held in some warehouses to the west side of the settlement.  Once he tells you this, you call up the Slipdagger and tell them everything, and ask them to send crew to secure the colonists and the gold.\n\n\t\t\t\t\t\t\tA shocked Plaxus cries, \"But we had a deal!\"\n\n\t\t\t\t\t\t\tYou explain to him that you are indeed going to let him live.  As a prisoner.\n\n\t\t\t\t\t\t\t*set plaxus \"yes\"\n\t\t\t\t\t\t\t*set gold \"yes\"\n\t\t\t\t\t\t\t*goto ending\n\t\t\t\t\t\t#I tell him no way, and take him as a prisoner.\n\t\t\t\t\t\t\t*set plaxus \"yes\"\n\t\t\t\t\t\t\t*goto ending\n\t\t\t\t\t\t#I kill him.\n\t\t\t\t\t\t\t*goto shootingrange2\n\n\t\t\t\t#I kill Plaxus.  Slowly.\n\t\t\t\t\tThe man takes a while to die, and you enjoyed helping him along the way.\n\t\t\t\t\t*set dark %-40\n\n\t\t\t\t\t- Darkness grows within you...\n\t\t\t\t\t\n\t\t\t\t\tThen what do you do?\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I set charges and destroy the station.  Then go home.  Mission accomplished.\n\t\t\t\t\t\t\t*set dark %-45\n\t\t\t\t\t\t\t- Darkness grows within you...\n\t\t\t\t\t\t\t*set building \"no\"\n\t\t\t\t\t\t\t*set burn \"yes\"\n\t\t\t\t\t\t\t*goto ending\n\t\t\t\t\t\t#I head back to the ship, and call in some support to deal with the people in the canisters.\n\t\t\t\t\t\t\t*goto ending\n\t\t\t\t#I tell him to shut up, and take him back to the ship as a prisoner, also calling in support to deal with the canisters\n\t\t\t\t\t*set plaxus \"yes\"\n\t\t\t\t\t*goto ending\n\t\t\t\t#I set charges and destroy the station with Plaxus in it.  Then go home.  Mission accomplished.\n\t\t\t\t\t*set dark %-50\n\t\t\t\t\t- Darkness grows within you...\n\t\t\t\t\t*set building \"no\"\n\t\t\t\t\t*set burn \"yes\"\n\t\t\t\t\t*goto ending\n\n\n\n\n*label ending\n\nWell, that should just about take care of everything!  You climb aboard the Shock Troop dropship, and fly back to the Slipdagger, telling the captain to set a course for Mobile Armored Corps base Ajax.\n\n*finish_advertisement\n", "mission_1_approach": "\nThe power station looms on the edge of town, the shadowed shapes of towers and thick cabling visible in the early morning light.  What do you want to do?\n*choice\n\t#Stop and take time to scan the station\n\t\tYou stop for a moment, flip open your Oracle and give the complex a quick scan.  Your orders did include keeping this station intact, so you better know how things stand.\n\n\t\tThe station reads as functional, with minimal damage.  You read the Shock Trooper's dropship on the roof, and in good shape.  ${troopcount} of the Shock Troopers are still alive, clustered near the center of the station.  \n\t\t*set troopcount-1\n\t\tThey are currently fighting, and as you watch, you see one of the troopers register as wounded critically in the right shoulder.  Then, his vitals suddenly flat line.  ${troopcount} Troopers remain.\n\n\t\tThe station gives off several confusing readings as well.  Scattered about are moving heat sources, several too cold to be human, one that might be human on the Western wing, and a large heat signature on the Eastern side of the complex.  The complex has so much hot machinery and ambient radiation, however, that it's hard to get a clear reading.\n\n\t\tOne clear reading you DO get is of two signatures on the roof, facing your position.  They are colder than a human, and the Oracle reads them as probably reptilian, humanoid, and armed with large energy weapons.\n\t\t*page_break\n\t\t*goto approach\n\n\n\t#Hurry ahead to the station\n\t\t*label approach\n\t\tWith a quick burst of your back jets, you launch yourself ahead through the streets, speeding towards the power station.  You pull up short, however, when a movement on the roof catches your eye.  What do you do?\n\t\t*choice\n\t\t\t#I snap off a shot from my blaster!\n\t\t\t\t*if shooting > 12\n\t\t\t\t\tIn one fluid motion you whip your blaster up and pull the trigger.  Your bolt of white fire strikes something on the roof, and you hear a horrified screech.  Then, a body topples from the roof, lifeless.  In that moment you catch sight of green skin and a long tail, before your Armor's keen receptors pick up the dull thud of the body hitting the ground.\n\n\t\t\t\t\tLooks like all that marksmanship training really paid off!\n\n\t\t\t\t\tA hissing squawk is your only warning before a large blast of green energy hurtles past you, blowing apart a wall to your right. \n\n\t\t\t\t\tYou dive forward, roll, and cut loose with two more shots at the spot on the roof where you think the attack came from.  The first blast tears off a chunk of the edge of the roof, but the second catches something square in the face.  The body flies backwards.\n\n\t\t\t\t\tBoosting up to the roof, you find the body of a reptilian creature, its face a smoldering mess.  \n\t\t\t\t\t*goto entry\n\t\t\t\t*elseif shooting > 10\n\t\t\t\t\tYou whip your blaster up and cut loose a volley of shots.  One shot clips the target, and the other two impact on the roof of the station, exploding like white fireworks.  The reptilian tumbles, but comes up kneeling.  That's when you notice the huge shoulder blaster it's carrying.  Vivid bolts of green blaster cannon fire rip through the air, demolishing the street in front of you.  One shot slams into you, knocking you sideways through the window of a bakery.  You're slammed into a counter, and catch sight of a display holding several golden brown croissants.\n\t\t\t\t\t\n\t\t\t\t\t*set armor-7\n\n\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t*else\n\n\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\t\t\t\n\t\t\t\t\t\tTwo more blasts impact in the roof of the bakery, burying you.\n\t\t\t\t\t\t*goto buried\n\t\t\t\t*else\n\t\t\t\t\tIn one fluid motion you whip your blaster up and pull the trigger.  Your bolt of white fire goes wide, nailing a large antenna that explodes spectacularly!  You see clearly the reptilian form of an alien on the roof.  It looks at you, then at the antenna, then back at you, its alligator-face open in a laughing smile.\n\n\t\t\t\t\tToo bad you aren't a better shot!  But still, this will make a great story...\n\n\t\t\t\t\t*set infamy %+(guts + guts)\n\t\t\t\t\t- Glory increased\n\t\t\t\t\t*page_break\n\t\t\t\t\tThe lizard hefts a large blaster cannon to its shoulder, and as it turns toward you, you dive into a nearby alley for cover.  The buildings around you begin to explode as bolt after bolt of green blaster cannon fire lance through the settlement.  One blast knocks you forward through a wall, and another catches you in the side.  Tossed like a doll in the jaws of a rabid dog, you get tumbled by shock after shock.\n\n\t\t\t\t\t*set armor-14\n\n\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t*else\n\n\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\t\t\t\n\t\t\t\t\t\tYou stop getting hurled around, and feel yourself buried by the rubble of the buildings around you.  What do you do?\n\t\t\t\t\t\t*goto buried\n\n\t\t\t#I dive down the nearest alley, and peek around to get a better look!\n\t\t\t\tYour optics zoom in, and you see clearly a reptilian alien on the roof.  It had the long, toothy mouth of an alligator, and stands hunched forward, with a large tail balanced out behind it.  As you watch, you see it sit back on its tail, resting on it like a stool!  It hefts a very large metal shoulder weapon of some kind, and is looking around at the settlement.  It seems on alert, like it's expecting you, though it clearly hasn't seen you yet.\n\n\t\t\t\t*label sorry\n\t\t\t\tWhat do you want to do?\n\t\t\t\t*choice\n\t\t\t\t\t#Take careful aim, and shoot the creature from cover\n\t\t\t\t\t\tLifting your pistol, you aim carefully and squeeze the trigger.  Your bolt of white hot energy catches the lizard creature square in the chest.  It gasps, staggers, and then collapses out of sight on the roof.\n\n\t\t\t\t\t\tJust then, a bright green explosion rips into the wall just above where you are crouched, knocking you back from the corner!\n\t\t\t\t\t\t*set armor-3\n\n\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\tRolling to your feet, you find yourself standing in the street, facing the power station.  You catch sight of a green flash from the roof, and instinctively use your boosters to lunge to the side, dodging another massive blast of energy.  \n\n\t\t\t\t\t\t\tApparently, there's another alien on the roof!  What do you want to do?\n\t\t\t\t\t\t\t*label tryagain\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Unload a massive barrage of missiles and blaster fire!\n\t\t\t\t\t\t\t\t\t*goto baddaboom\n\t\t\t\t\t\t\t\t#Keep moving, and trade shots with the reptile\n\t\t\t\t\t\t\t\t\t*if shooting > 10\n\t\t\t\t\t\t\t\t\t\tYou dive to the side, and then launch yourself backwards to avoid a massive blast of green energy.  These reptiles are packing some powerful weaponry!\n\n\t\t\t\t\t\t\t\t\t\tYou only have a brief moment to see where the lizard is, and snap off a rapid burst of three shots.  Your first shot catches the alien in the side, your second misses completely, but your third nails it square in the chest.  The force knocks the monster backwards.\n\n\t\t\t\t\t\t\t\t\t\tFor a regular marine, a shot like that would have been luck.  For you, it was training!\n\n\t\t\t\t\t\t\t\t\t\tBoosting up to the roof, you see the dead bodies of the green lizards, wide toothy mouths locked open in death.  You give this last one you shot an extra kick to the side, just for good measure.\n\t\t\t\t\t\t\t\t\t\t*goto entry\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\tYou dive to the side, and then launch yourself backwards to avoid a massive blast of green energy.  These reptiles are packing some powerful weaponry!\n\n\t\t\t\t\t\t\t\t\t\tYou only have a brief moment to see where the lizard is, and snap off a rapid burst of three shots.  Your first shot catches the alien in the side, but your second and third shots miss completely.  \n\t\t\t\n\t\t\t\t\t\t\t\t\t\tWounded, the lizard howls in agony, and begins to blast wildly.  The streets around you erupt with explosions of green fire!  You get hurled to the ground, then up against a nearby wall, smashing through it.\n\n\t\t\t\t\t\t\t\t\t\t*set armor-6\n\n\t\t\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t\t\t\t*else\n\n\t\t\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\tPulling yourself free from the crumbling wreckage of the wall, you hear that the lizard's barrage has stopped.  Stepping out from the rubble of the building you were hurled into, you see the lizard standing on the rooftop, panting, gripping its bleeding side with one clawed hand and its massive blaster cannon in the other.  It locks eyes with you, glaring.\n\n\t\t\t\t\t\t\t\t\t\t\tYou and the lizard fire at each other at the same time.\n\n\t\t\t\t\t\t\t\t\t\t\tIts shot flies wide, barely missing you and demolishing a building behind you.  Bits of rock and debris rain over you from behind, as you see your bolt of white energy catch the lizard right in the face, knocking it backwards.\n\n\t\t\t\t\t\t\t\t\t\t\t*set infamy %+ (guts + guts)\n\t\t\t\t\t\t\t\t\t\t\t- Glory increased\n\n\t\t\t\t\t\t\t\t\t\t\tYou boost up to the roof of the power station, and see the dead corpses of the two lizards, each oozing yellow blood.\n\t\t\t\t\t\t\t\t\t\t\t*goto entry\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t#Stand boldly in the open, and shoot the thing!\n\t\t\t\t\t\t\t\t\t*if guts \u003c 12\n\t\t\t\t\t\t\t\t\t\tYou aren't gutsy enough to do that!  What do you do?\n\t\t\t\t\t\t\t\t\t\t*goto tryagain\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t*label bold\n\t\t\t\t\t\t\t\t\t\tYou step out into the street, a low breeze kicking up dust and swirling it around your heavy armored boots.  Looking up, you see a second lizard on the rooftop.  It's holding a large blaster cannon, and has it aimed right at you.  \n\n\t\t\t\t\t\t\t\t\t\tThe two of you stare at each other for a moment.  Then you slowly raise your left hand, point at the lizard, and then slowly draw that finger across your throat.\n\t\t\t\n\t\t\t\t\t\t\t\t\t\t*set infamy %+ (guts + (guts + guts))\n\t\t\t\t\t\t\t\t\t\t- Glory increased\n\n\t\t\t\t\t\t\t\t\t\tWith a hiss, the creature launches several blasts of green energy.  The first two explode to your right and left, but the third catches you in the chest and knocks you back a few feet.\n\n\t\t\t\t\t\t\t\t\t\t*set armor-14\n\n\t\t\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t\t\t\t*else\n\n\t\t\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\tYou take a step backwards and catch yourself before you fall.  The lizard stops shooting, and stares at you, shocked.  Then, with one quick, fluid motion, you raise your blaster pistol and snap off a shot, nailing the creature in the face.  It flops back, out of sight.\n\n\t\t\t\t\t\t\t\t\t\t\t*set infamy %+ guts\n\t\t\t\t\t\t\t\t\t\t\t- Glory increased\n\n\t\t\t\t\t\t\t\t\t\t\tYou boost yourself to the roof, and see the two dead aliens.  Each one is oozing yellow goo that might be what they use for blood.\n\t\t\t\t\t\t\t\t\t\t\t*goto entry\n\n\t\t\t\t\t\t\t\t#Boost to the rooftop, and fight the thing hand to hand\n\t\t\t\t\t\t\t\t\tIt fires a couple of times at you as your fly toward it, but you easily dodge the shots.  You land heavily on the roof, shaking the lizard off its balance.  It drops the massive blaster cannon, and draws a large silver machete that takes on a blue shimmer as the reptile holds it.\n\n\t\t\t\t\t\t\t\t\t*if fighting > 11\n\t\t\t\t\t\t\t\t\t\tYou pull back your fist, and give your back thrusters a quick boost to launch you forward.  The lizard tries to raise its shimmering machete to block you, but isn't fast enough.  Your fist smashes through the reptile's jaw, snapping its head backwards.  You can hear the alien's neck snap, and a spray of yellow blood fans into the air.\n\n\t\t\t\t\t\t\t\t\t\tIt falls, dead at your feet.  You give your wrist a flick to get the lizard's spit and yellow blood off of your armored gauntlet.\n\t\t\t\t\t\t\t\t\t\t*goto entry\n\t\t\t\t\t\t\t\t\t*elseif fighting > 10\n\t\t\t\t\t\t\t\t\t\tYou slam into the rooftop, knocking one of the lizard creatures down.  As it tries to scramble up, you slam your fist into its gut.  Your armored gauntlet smashes all the way through, punching a hole in the rooftop.  The impaled reptile flails about, and catches you in the shoulder with its shimmering blue machete.\n\t\t\t\t\t\t\t\t\t\t*set armor-4\n\n\t\t\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\t\t\t\tThe lizard's spasms stop.  It's dead.  You yank your fist free.  It's covered in yellow gore.\n\t\t\t\t\t\t\t\t\t\t\t*goto entry\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\tYou pull back your fist, and give your back thrusters a quick boost to launch you forward.  The lizard raises its shimmering machete to block you, and manages to stab your armor in the gut right as your armored fist slams into the creature's face.  Yellow blood and alligator teeth spray through the air, and the creature flies backward into a large cooling vent.  Smashing through a metal grate covering a vent, the lizard stumbles into a large spinning fan, and suddenly disappears in a massive spray of yellow blood and green lizard flesh!\n\t\t\t\t\t\t\t\t\t\t*set infamy %+ (guts + guts)\n\t\t\t\t\t\t\t\t\t\t- Glory increased\n\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tGrinning, you suddenly see warning lights in your Armor's display.  Looking down, you see the lizard's silver machete jutting from your Armor's stomach plating!\n\n\t\t\t\t\t\t\t\t\t\t*set armor-10\n\n\t\t\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t\t\t\t\t\t\tYou wrench the machete out, and toss it down.\n\t\t\t\t\t\t\t\t\t\t\t*goto entry\n\n\n\t\t\t\t\t#Sneak up on it\n\t\t\t\t\t\t*goto sneaky\n\t\t\t#I unload a massive barrage of missiles and blaster fire!\n\t\t\t\t*goto baddaboom\n\t#Launch a massive volley of missiles at the station\n\t\t*goto baddaboom\n\n*label sneaky\n*if stealth \u003c 10\n\tKeeping an eye on the roof of the power station, you crouch low and quickly dart from building to building, keeping out of sight.\n\n\tUnfortunately, Armor suits are tough to hide, and you haven't had much practice.  As you dart out of an alley, keeping low, a bolt of green blaster cannon fire hits the ground at your feet, sending you spinning.\n\t*set armor-10\n\n\t*if armor \u003c 1\n\t\t*goto_scene Combat_Death\n\t*else\n\n\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t*page_break\n\t\tYou land hard on your back.  With a quick thrust of your boosters, you pop up onto your feet just in time to dodge another blaster cannon bolt.  You spin, and hurl yourself through a nearby shop wall, taking cover.\n\n\t\tBlaster cannon shots explode all around you, tearing up the city block you are hiding in.  You get covered in debris, and still the explosions rock the area around you.  What do you do?\n\t\t*goto buried\n\n*if stealth \u003c 12\n\tKeeping an eye on the roof of the power station, you crouch low and quickly dart from building to building, keeping out of sight.\n\n\tYou dart from alley to alley, and almost make it to the side of the building when you hear a startled squawk from the rooftop.  You've been sighted!  Immediately, you dive for cover just in time to avoid most of an energy blast.  The explosion still hurls you down, however, and slams you into a wall.\n\t*set armor-5\n\n\t*if armor \u003c 1\n\t\t*goto_scene Combat_Death\n\t*else\n\n\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t*page_break\n\t\tYou scramble to your feet, and toss a grenade behind you as you duck into a building.  With a dull pop, the grenade knocks over several walls and kicks up dust, hiding your position.  Even so, a barrage of blaster cannon rounds rip into the area and you end up hidden under a pile of rubble.\n\t\t*label buried\n\t\t*choice\n\t\t\t#I launch myself up into the air, and blast the lizard!\n\t\t\t\tYou explode from your pile of rubble, launching into the air in a halo of fire and burning debris.  For a brief moment as you hang in the air, you see the shocked, slack-jawed, toothy face of the lizard on the rooftop.  The reptile tries to aim its shoulder cannon, but your pistol is quicker.  Your first shot hits the roof at its feet, knocking it backwards.  Before it lands, however, your second and third shots hit it in the stomach, and in the face.  As the body hits the roof, it's already dead.\n\t\t\t\t*set infamy %+ (guts + guts)\n\n\t\t\t\t- Glory increased\n\n\t\t\t\tAs you hover in the air, a movement on the rooftop off to your left catches your eye.  You just have time enough to dodge a large bolt of green energy, and are forced to land suddenly as two more bolts follow the first.\n\n\t\t\t\tApparently, there's one more lizard on the roof.  What do you do?\n\t\t\t\t*goto tryagain\n\t\t\t#I wait, hide, and try sneaking up again\n\t\t\t\tSeveral moments go by, but soon there's a lull in the shots.  Waiting several more minutes, you're sure it thinks you are dead.  Slowly, you pull yourself out of the rubble you're buried in.  Once you are unburied enough to see, you scan the rooftop.  The alien is nowhere to be seen.\n\n\t\t\t\t*goto goodsneak \n\t\t\t#I call in to the Slipdagger for fire support\n\t\t\t\t\"Sir,\" replies the captain of the Slipdagger, \"I can fire, but it'll very likely damage the power station facility.  Are you sure you want me to fire?\"\n\t\t\t\t*choice\n\t\t\t\t\t#Yes\n\t\t\t\t\t\t\"As you wish, sir,\" says the captain.  \"Please stand by.\"\n\n\t\t\t\t\t\tFor a heartbeat, there's no sound.  None.  Then the ground rumbles, and you realize that your helmet shut off the external sound because it was too loud.  A low rumble picks up, and as you pull yourself free from the debris, you see a smoking hole where the wall of the power station used to be.  The Slipdagger's shot was deadly accurate - it only tore into the station where the enemy was on the roof.  However, as your helmet's receptors adjust back to normal you can hear a distant chain of explosions echo through the power station.  You catch the sight of an arc of blue lighting playing off of one of the power station's towers, and then the lighting fades away.\n\t\t\t\t\t\t*set infamy %+ guts\n\n\t\t\t\t\t\t- Glory increased\n\t\t\t\t\t\t*set building \"ruined\"\n\t\t\t\t\t\t*goto entry\n\n\t\t\t\t\t#No\n\t\t\t\t\t\tSo, what would you like to do then?\n\t\t\t\t\t\t*goto buried\n\n*else\n\t*label goodsneak\n\tKeeping an eye on the roof of the power station, you crouch low and quickly dart from building to building, keeping out of sight.\n\n\tYou make it up to the side of the building, directly below where you saw the alien guard.  What do you do?\n\t*choice\n\t\t#I toss a grenade up onto the roof\n\t\t\tThe grenade lands on the roof with a quiet thud.  You hear a startled squawk, an explosion, and a moment later the body of an alligator-faced lizard creature falls from the rooftop, slapping the ground next to you.  It's quite dead.\n\n\t\t\tAs you step over to look at the alien lizard, you hear a hissing screech from the roof above.  Looking up, you catch sight of another of the creatures as it hefts its shoulder cannon.  You have just enough time to dive behind cover as the monster opens fire.\n\n\t\t\tWhat do you do?\n\t\t\t*goto tryagain\t\n\t\t#I stealthily climb the building\n\t\t\t*if stealth > 12\n\t\t\t\tWith your incredible skills in moving silently, you ghost up the side of the building, barely making a whisper.  As you peek over the edge of the roof, you spot a green, crocodile-faced lizard-man standing only a few feet away.  It's facing away from you, looking off toward where another of the reptiles stands.  Both of them are holding very large shoulder cannons.\n\n\t\t\t\tFrom the back, you notice that the lizards have what look like long silver spikes on either side of the ends of their large tails.\n\n\t\t\t\tYou slide up onto the rooftop, not making a sound.  Taking two muted steps up behind the alien, you chop at the back of its neck with your armored hand.  You hear a soft crack, and the lizard collapses limply to the rooftop.\n\t\t\t\t\n\t\t\t\t*set infamy %+ (guts + guts)\n\n\t\t\t\t- Glory increased\n\t\t\t\t*page_break\n\t\t\t\tYou catch the body, to make sure it doesn't fall too loudly.  Slowly lowering it, you watch across the rooftop.  The other lizard doesn't seem to have noticed.  What do you do now?\n\t\t\t\t*choice\n\t\t\t\t\t#I take aim, and blast the other one\n\t\t\t\t\t\tLifting your blaster pistol, you aim right at the lizard's head.  Just then, it turns slightly toward you, and makes a curious sounding hoot.  It seems to be looking your direction, but only with one eye.\n\n\t\t\t\t\t\tYou answer with a white hot bolt of energy to the side of its head.\n\n\t\t\t\t\t\tThe lizard-alien falls limply to the rooftop, its head smoking.\n\t\t\t\t\t\t*goto entry\n\t\t\t\t\t#I sneak up and take it out too\n\t\t\t\t\t\tSliding backwards, you melt into the shadows.  Deftly dodging behind some pipes, you slowly approach the alien lizard, moving low.  As you creep up behind it, its head suddenly snaps to the side and it looks your way with one large iridescent yellow eye.\n\n\t\t\t\t\t\tFreezing in place, you don't even breathe.\n\n\t\t\t\t\t\tAfter a moment, the creature looks away, and then it looks off toward where the other lizard was standing, and gives a sort of inquisitive hoot.  It cocks its head to the side, and hoots again.\n\n\t\t\t\t\t\tAnd then your gauntleted right hand flashes out and strikes the lizard in the back of the knee, while your left hand grips it by the tail.  It cries out and starts to fall, when you lift it by the tail, swing it over your head, and smash it into the rooftop.  The force of the impact sends a spray of yellow goo out of the lizard's mouth, and it lies still.\n\t\t\t\t\t\t*set infamy %+ guts\n\n\t\t\t\t\t\t- Glory increased\n\t\t\t\t\t\t*goto entry\n\t\t\t*else\n\t\t\t\tYou climb up the building, but as you reach the top you find yourself face to face with a startled lizard-alien.  It scrambles to ready its shoulder cannon, when you lash out with your armored boot and catch it in the gut.  It doubles over with a loud crack and a hideous screech.\n\t\n\t\t\t\t*label hissyfit\n\t\t\t\tA hiss from off to your right is your only warning as two large bolts of green blaster fire rip apart the rooftop near you.  Scrambling backwards, you fall off the rooftop and land hard on the ground below.\n\n\t\t\t\t*set armor-3\n\n\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t*else\n\n\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t\t*page_break\n\t\t\t\t\tMore blaster shots follow, and you dive back from the station, dodging down a nearby alleyway.  Apparently the lizard you killed had a buddy!  What do you do?\n\t\t\t\t\t*goto tryagain\n\t\t\t\t\n\t\t#I circle around and climb up somewhere else\n\t\t\tCircling around the power station wall, you find a spot that you think will be out of sight from the lizard's position on the rooftop.  You quickly climb the wall, and peek over the edge.  You can see the lizard, off to you left.  It looks like it's watching the ground in the direction you came from.  What do you want to do?\n\t\t\t*choice\n\t\t\t\t#I take aim, and blast it!\n\t\t\t\t\tYou site in your blaster pistol, and squeeze the trigger.  With a flash, a bolt of white energy catches the lizard in the head, and it drops to the rooftop with a gurgling hiss.\n\n\t\t\t\t\tThen you catch site of another of the lizards, a little further away.  It screeches, and turns to fire its shoulder blaster at you.  Taking aim, you fire at it, hitting it in the gut.  It howls and stumbles, but before it falls it gets off one good shot at you, knocking you backwards and off the rooftop.  You land hard on the ground below.\n\n\t\t\t\t\t*set armor-6\n\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t*else\n\n\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tGetting back to your feet, you boost back up to the rooftop.  Both lizards are dead.\n\t\t\t\t\t\t*goto entry\n\n\t\t\t\t#I sneak up on it, killing it silently\n\t\t\t\t\tYou crouch low, and creep across the rooftop, all the while watching the lizard in front of you.  You get very close to it, when it turns its head and looks off to the side.  You freeze in place.  \n\n\t\t\t\t\tAfter a moment, it turns back to looking at the settlement below.  Taking two muted steps up behind the alien, you chop at the back of its neck with your armored hand.  You hear a soft crack, and the lizard collapses limply to the rooftop.\n\n\t\t\t\t\t*goto hissyfit  \n\t\t\t\t#I wait patiently and watch\n\t\t\t\t\tAs you watch, you notice the lizard looks off to its side from time to time.  Following the gaze, you notice movement.  Then, stepping out of the shadow of a cluster of radio antennas, you see a second lizard creature.  Both are holding large blaster cannons on their shoulders.\n\t\t\t\t\n\t\t\t\t\tWhat do you do?\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I open fire on them both\n\t\t\t\t\t\t\tTaking careful aim, you drop the first one with a blaster bolt to the back of the head.  The second screeches, and whips around to fire at you, but a rocket from your shoulder cannon was already locked on and streaking towards the lizard.  It explodes in a shower of burning reptile bits.\n\t\t\t\t\t\t\t*goto entry\n\t\t\t\t\t\t#Patiently, I sneak up and kill the first one silently\n\t\t\t\t\t\t\tYou crouch low, and creep across the rooftop, watching both lizards carefully.  You get very close to the first one, when it turns its head and looks off at the other alien reptile.  You freeze in place.  \n\n\t\t\t\t\t\t\tAfter a moment, it turns back to looking at the settlement below.  Taking two muted steps up behind the alligator-faced alien, you chop at the back of its neck with your armored hand.  You hear a soft crack, and the lizard collapses limply to the rooftop. You catch the body, to make sure it doesn't fall too loudly.  Slowly lowering it, you watch across the rooftop.  The other lizard doesn't seem to have noticed.  What do you do now?\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#I take aim, and blast the other one\n\t\t\t\t\t\t\t\t\tLifting your blaster pistol, you aim right at the lizard's head.  Just then, it turns slightly toward you, and makes a curious sounding hoot.  It seems to be looking your direction, but only with one eye.\n\n\t\t\t\t\t\t\t\t\tYou answer with a white hot bolt of energy to the side of its head.\n\n\t\t\t\t\t\t\t\t\tThe lizard-alien falls limply to the rooftop, its head smoking.\n\t\t\t\t\t\t\t\t\t*goto entry\n\t\t\t\t\t\t\t\t#I sneak up and take it out too\n\t\t\t\t\t\t\t\t\tSliding backwards, you melt into the shadows.  Deftly dodging behind some pipes, you slowly approach the alien lizard, moving low.  As you creep up behind it, its head suddenly snaps to the side and it looks your way with one large iridescent yellow eye.\n\n\t\t\t\t\t\t\t\t\tFreezing in place, you don't even breathe.\n\n\t\t\t\t\t\t\t\t\t*if stealth > 12\n\t\t\t\t\t\t\t\t\t\tAfter a moment, the creature looks away, and then it looks off toward where the other lizard was standing, and gives a sort of inquisitive hoot.  It cocks its head to the side, and hoots again.\n\n\t\t\t\t\t\t\t\t\t\tAnd then your gauntleted right hand flashes out and strikes the lizard in the back of the knee, while your left hand grips it by the tail.  It cries out and starts to fall, when you lift it by the tail, swing it over your head, and smash it into the rooftop.  The force of the impact sends a spray of yellow goo out of the lizard's mouth, and it lies still.\n\t\t\t\t\t\t\t\t\t\t*set infamy %+ guts\n\n\t\t\t\t\t\t\t\t\t\t- Glory increased\n\t\t\t\t\t\t\t\t\t\t*goto entry\n\t\t\t\t\t\t\t\t\t*elseif stealth = 12\n\t\t\t\t\t\t\t\t\t\tThe creature's eye is fixed in your direction.  You're certain it has seen you, when it slowly turns its head away.  It gives a trilling hoot, and starts to look around the rooftop.  You think it's probably looking for the other alien.\n\n\t\t\t\t\t\t\t\t\t\tYou lash out with a strike to the lizard's back.  It squawks, and turns to face you.  You give it no chance, however, and give it a solid side kick right in its ribs.  The lizard folds in half and hurls limply over the edge of the roof.\n\t\t\t\t\t\t\t\t\t\t*goto entry\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\tAfter a moment, it starts to make a low, grumbling hissing sound while it turns slowly to face you.  It drops the blaster cannon it was holding, and whips out a silver machete that starts to glow blue.\n\n\t\t\t\t\t\t\t\t\t\t*if fighting > 10\n\t\t\t\t\t\t\t\t\t\t\tYou spring forward, and lash out with a powerful kick with your left boot.  The lizard tries to dodge to the side, but your boot catches it in the side of the head, knocking it sprawling on the rooftop.  Quickly, you leap onto the lizard's back, crushing it with your weight.  The machete falls from the lizard's lifeless claws, and loses its blue shimmer.\n\n\t\t\t\t\t\t\t\t\t\t\t*goto entry\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\tYou spring forward, but the lizard is faster.  Striking like a cobra, it buries its shimmering machete in your left shoulder, sending out a shower of sparks!\n\n\t\t\t\t\t\t\t\t\t\t\t*set armor-8\n\t\t\t\t\t\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t\t\t\t\t\t*else\n\n\t\t\t\t\t\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\t\t\t\t\t\t\t\t\t\t\t\t*set infamy %+ guts\n\t\t\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t\t\t- Glory increased\n\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\tWith your shoulder still sparking, you backhand the lizard with your powerful armored fist.  A fountain of teeth and yellow blood sprays across the rooftop, and the lizard collapses, dead.\n\n\t\t\t\t\t\t\t\t\t\t\t\tYou yank the silver machete out of your shoulder, and toss it contemptuously down.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto entry\n\n*label baddaboom\nThe rooftop explodes in an ever-expanding ball of fire as missile after missile and white hot bolts of blaster energy impact on the station.  Twisted metal and burning cinder blocks rain from the sky, and then everything is still.\n\nYou wonder if you just wrecked the station!  It's hard to tell... This might not be an important area...?\n\n*goto entry\n\n*label entry\n\nLooking around, digging through some fallen masonry, you find a large metal door that leads into the power station.  You wrench it open, and head inside.\n*finish_advertisement\n\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Rico\"\n\n*set Guts\t12\n*set Leadership\t10\n*set Shooting\t7\n*set Fighting\t16\n*set Technical\t10\n*set Stealth\t10\n*set Armor 50\n*set omega Omega\n\n*set troopcount\t24\n*set Morale 50\n*set infamy 37\n*set dark 5\n*set bionic_1 \"Adrenaline Boosters\"\n\n\nThe tech smiles, and says, \"This must be an important mission if the Corps is using one.  They're expensive, and use up an immense amount of power!  Just don't use it too much - even if you get pulled back safely, the unit itself is used up and lost.  We only have six units on board.  There,\" he says, unlocking the cables from your Armor.  \"You're good to go!\"\n\nYou lock your helmet on, and with a sealing hiss everything goes silent for a moment.  But then sound comes rushing back as your helmet's pickups adjust, and you walk to the launch bay.  The Shock Trooper's drop ship is prepped and ready, with steam billowing out of side vents and maneuvering jets glowing as they pre-heat.\n\nStepping up the drop ship's landing ramp, you see that the inside walls are packed with the troopers belted in and staring at you wide eyed.\n\nWhat do you say to them?\n*fake_choice\n\t#Troops!  This mission is important!  I will NOT stand for failure!  Some of you will not come back alive - in fact, you there, Johnson, I'm pretty sure you won't!  Now let's DO THIS!\n\t#Don't get in my way.\n\t#Do your jobs.  That's all I expect.\n\t#Troops, this mission is important.  I know you've been briefed.  I trust you.  Remember your training, and you will come back alive.\n\t#Failure will result in one thing.  Death.  Sergeant, choose one trooper to die now, as an example.\n\t#This is my first mission, and I'm not sure what's going to happen, but let's just have a good time, ok?\n\n\n*script changeBackgroundColor(\"black\")\n\n*set Guts\t12\n*set Leadership\t10\n*set Shooting\t7\n*set Fighting\t16\n*set Technical\t10\n*set Stealth\t10\n*set Armor 44\n\n*set troopcount\t21\n*set Morale 75\n*set infamy 70\n*set dark 4\n\nYou leave the remains of the strangely suited Saurian and start walking. Glancing at your Oracle, you follow the path to where the Shock Troopers were supposed to infiltrate the building. \n\nWalking down several corridors, you turn a corner to see the backs of several lizard creatures.  They're taking shots into a large room, hiding behind rubble.  You can hear the Shock Trooper's rough automatic rifle fire coming from the other room.  The two groups seem to be at a stand-still.\n\nWhat would you like to do?\n*fake_choice\n\t#I leap forward, smashing the lizards!  They're no match for an Imperial Marine!\n\t#I blast them to shreds with my pistol!  \n\t#I shoot.  With everything.  I level the entire area.\n\t#I sit back and wait, letting the Shock Troopers deal with this\n\n*script changeBackgroundColor(\"sepia\")\n\n*set Guts\t12\n*set Leadership\t10\n*set Shooting\t7\n*set Fighting\t16\n*set Technical\t10\n*set Stealth\t10\n*set Armor 28\n\n*set troopcount\t18\n*set Morale 58\n*set infamy 79\n*set dark 35\n\nRushing her back to the dropship, you access the ship's medical supplies.  After about an hour of care, she slowly wakes up, but then screams when she sees you in your Armor.  Quickly, you remove your helmet and gauntlets, and she calms down.\n\n\"I'm so sorry,\" she whispers.  \"I thought you were one of those monsters!\"\n\nWhat would you like to say to her?\n*fake_choice\n\t#\"No, I'm no monster.  I'm an Imperial Marine, and I'm here to help.\"\n\t#\"Ma'am, I need to know what's happened here.\"\n\t#\"Woman, you tell me what's going on here, or I swear I'll gut you!\"\n\t#\"No.  I'm something much worse.\"  And then I kill her.\n\n", "startup": "*title Mobile Armored Marine: Mission to Far Hope\n*author Steve Cave\n\n*scene_list\n  startup\n  training\n  training2\n  mission_1_Landing\n  mission_1_approach\n  mission_1_Going_In\n  mission_1_Regroup\n  mission_1_Trapdoor\n  mission_1_Ending\n\n\n\n*create name \"Trooper\"\n*create gender \"\"\n*create guts 10\n*create leadership 10\n*create fighting 10\n*create shooting 10\n*create technical 10\n*create stealth 10\n*create dark 50\n*create infamy 20\n*create weakness 0\n*create reason_to_join \"\"\n*create enemy_trooper \"\"\n*create bionic_1 \"\"\n*create armor 100\n*create morale 50\n*create troopcount 24\n*create building \"\"\n*create enemy \"\"\n*create alone \"\"\n*create eleanor \"\"\n*create lizard \"\"\n*create plaxus \"\"\n*create burn \"\"\n*create backtrack 0\n*create trooper_john \"\"\n*create deathcount 0\n*create puppy \"\"\n*create west \"\"\n*create north \"\"\n*create east \"\"\n*create code \"\"\n*create gold \"\"\n*create satisfied \"\"\n*create omega \"\"\n*create northset \"\"\n*create southset \"\"\n*create eastset \"\"\n*create badness \"\"\n*create bguts 50\n*create bleadership 10\n*create binfamy 50\n*create bfighting 10\n*create bstealth 10\n*create btechnical 10\n*create bshooting 10\n*create barmor 0\n*create bbtroopcount 0\n*create bmorale 0\n*create codex 50\n\n*set name \"Trooper\"\n*set gender \"no\"\n*set guts 10\n*set leadership 10\n*set fighting 10\n*set shooting 10\n*set technical 10\n*set stealth 10\n*set dark 50\n*set infamy 20\n*set weakness 0\n*set reason_to_join \"no\"\n*set enemy_trooper \"no\"\n*set bionic_1 \"none\"\n*set armor 100\n*set morale \"NA\"\n*set troopcount 24\n*set morale 50\n*set building \"ok\"\n*set enemy \"ok\"\n*set alone \"ok\"\n*set Eleanor \"ok\"\n*set lizard \"ok\"\n*set plaxus \"ok\"\n*set burn \"ok\"\n*set backtrack 0\n*set trooper_john \"no\"\n*set deathcount 0\n*set puppy \"no\"\n*set west \"no\"\n*set north \"no\"\n*set east \"no\"\n*set code \"no\"\n*set gold \"no\"\n*set satisfied \"no\"\n*set omega \"no\"\n*set northset \"yes\"\n*set southset \"yes\"\n*set eastset \"yes\"\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and (not(choice_purchased_adfree) and not(choice_is_web))\n    [i]Mobile Armored Marine[/i] is supported by advertisements, but you can pay\n    to turn off ads forever.\n\n    *purchase adfree $4.99 purchased\n    *page_break_advertisement\n\n\n*label purchased\n\nA flicker in the void.  The blue flash of plasma engines.  Traveling at speeds faster than light, the starship Slipdagger slices through space, shooting like a silvered arrow toward its target - a world called Far Hope.\n\nYou sit, alone in the forward viewing room of the ship, gazing at the stars sliding by like liquid light.  \n\nThe Slipdagger is an Infiltrator class Imperial vessel built for speed and stealth.  Small as space ships go, the Slipdagger carries only her crew, a small tactical squad of 24 Imperial Shock Troopers and yourself, a Mobile Armored Marine.  Not many people, but when one of them is an Armored Marine, well, you don't really NEED that many people!\n\nIt is the 42nd year of the reign of Emperor Gladius Rex over the Empire of Humanity.  The Empire dominates several solar systems, and protects mankind from threats both inside and out.  Battles in the void and around planets call for the Imperial Fleet, but when it's time to land and get your feet wet, the Imperium calls in the Mobile Armored Marine Corps.  You've trained harder, been cybernetically and chemically augmented, and to top it all off you wear a suit of Tactical Powered Armor into combat.\n\nThe planet your ship is speeding towards, Far Hope, is a human world on the extreme outer edge of the Sirius system.  The planet supports a single colony of a few thousand settlers.  Your briefing told you that something's up - communications were cut off two weeks ago, and no one knows why.\n\nYou are in command of this mission, and you'll soon need to head down to the launch deck and check on the troops.  This is your mission, your FIRST mission, but you aren't worried.\n\nYou can hear the troop commander drilling his men, so you sit and wait for him to finish before you head that way.  Staring into space, you think back to the beginning of your training.  It feels so long ago now...\n\n*finish\n", "training": "First, let's get some introductions out of the way.  What's your call sign, marine?  What do your fellow troopers call you?\n*choice\n\t#Hicks\n\t\t*set name \"Hicks\"\n\t\t*goto Why_Joined\n\t#Dutch\n\t\t*set name \"Dutch\"\n\t\t*goto Why_Joined\n\t#Felix\n\t\t*set name \"Felix\"\n\t\t*goto Why_Joined\n\t#Rico\n\t\t*set name \"Rico\"\n\t\t*goto Why_Joined\n\t#Mandella\n\t\t*set name \"Mandella\"\n\t\t*goto Why_Joined\n\t#I'd like to type in my own\n\t\tOutstanding.  Type away:\n\n\t\t*input_text name\n\t\t*if name = \"Cheat\"\n\t\t\tCheat enabled!\n\t\t\t*goto cheat\n\t\t*elseif name = \"John\"\n\t\t\tThere's another John in this story.  Don't get confused if you meet him!\n\t\t\t*goto Why_Joined\n\t\t*elseif name = \"Cave\"\n\t\t\tGreat name!  But not a cheat code, just in case you thought it would be!\n\t\t\t*goto Why_Joined\n\t\t*else\n\t\t\t*goto Why_Joined\n\n\n*label cheat\n*set name \"Cheater\"\n*set shooting 14\n*set fighting 14\n*set technical 14\n*set stealth 14\n*set guts 14\n*set leadership 14\n*set infamy 99\n*set dark 99\n*choice\n\t#Chapter 0 - Training\t\n\t\t*goto Why_Joined\n\t#Chapter 1 - Landing\n\t\t*goto_scene mission_1_Landing\n\t#Chapter 2 - Approach\n\t\t*goto_scene mission_1_approach\n\t#Chapter 3 - Going In\n\t\t*goto_scene mission_1_Going_In\n\t#Chapter 4 - Regroup\n\t\t*goto_scene mission_1_Regroup\n\t#Chapter 5 - Trapdoor\n\t\t*goto_scene mission_1_Trapdoor\n\t#Chapter 6 - Ending\n\t\t*goto_scene mission_1_Ending\n\n\n*label Why_Joined\n\n${name}, are you male or female?\n*choice\n\t#Male\n\t\t*set gender \"male\"\n\t\tWell, Mr. ${name}, what drove you to join the Mobile Armored Corps?\n\t\t*goto whyjoined2\n\n\t#Female\n\t\t*set gender \"female\"\n\t\tWell, Ms. ${name}, what drove you to join the Mobile Armored Corps?\n\t\t*goto whyjoined2\n\n*label whyjoined2\n*choice\n\t#I wanted to be the best I could be, serve the Empire proudly, and make my family proud!\n\t\t*set reason_to_join \"honor\"\n\t\t*goto Training\n\n\t#I want to build lifelong friendships, and the military seems like the perfect place to do it.\n\t\t*set reason_to_join \"friendship\"\n\t\t*goto Training\n\n\t#Money!  I grew up poor, and figured that becoming a MAC Marine was my best ticket to riches!\n\t\t*set reason_to_join \"money\"\n\t\t*goto Training\n\n\t#I'm a romantic, and hope to find the love of my life out here, among the stars...\n\t\t*set reason_to_join \"love\"\n\t\t*goto Training\n\n\t#I want to have my name known throughout the empire!  For glory!\n\t\t*set reason_to_join \"infamy\"\n\t\t*goto Training\n\n\t#I want people to fear me.\n\t\t*set reason_to_join \"evil\"\n\t\t*goto Training\n\n\n*label Training\n*set weakness 0\nThe new recruit training was rough.  They worked hard at breaking you down.\n\nYou remember the running.  The trainers had you running miles and miles at any time of day or night.  Those weeks seem a blur to you, just a faded mass of running through rain and mud, putting one foot in front of the other.  The only part that stands out is another recruit named Blake.\n\nBlake couldn't keep up with the running.  He was slowing down, tripping, and barely keeping his eyes open.  The sergeant was very clear that anyone who couldn't run fast enough would be dropped from the Corps.  They called it \"washing out\".  You remember Blake, straining and panting, and falling behind.  What did you do?\n*choice\n\t#I fell back beside him and tried to encourage him.\n\t\tHe still had trouble though, no matter how you tried to encourage him along.  His panting was rough and wretched, and he hardly even seemed to know you were talking to him.  What did you do then?\n\t\t*choice\n\t\t\t#I slowed down and gave him my arm to lean on.\n\t\t\t\t- Light increased\n\t\t\t\t*set dark %+20\n\t\t\t\t*set leadership-2\n\n\t\t\t\tWhile that felt nice to do, it didn't work out very well.  Unfortunately, he gripped a hold of your arm hard, and slowed you down.  At first you thought to help him, but then you only thought to pull away!  At the last moment you wrenched your arm free, and you barely made it to the end in time.  Blake washed out, and you never saw him again.\n\n\t\t\t\tYou can also remember the sergeant explaining to you, hard voiced and with disgust thick in his eyes and voice, that Blake was sent home because he didn't have what it takes to be a Mobile Marine.  \"Kindness is great and all,\" the sergeant barked, \"But a real leader needs to be able to make hard choices!  And you will never be a good leader until you get that through your head!\"\n\n\t\t\t\t- Glory lost...\n\t\t\t\t*line_break\n\t\t\t\t- Leadership decreased\n\t\t\t\t*set infamy %-40\n\t\t\t\t*set weakness+2\n\t\t\t\t*goto TrainingX\n\t\t\t#I kept at it, trying to urge him along.\n\t\t\t\t- Light increased\n\t\t\t\t*set dark %+20\n\n\t\t\t\tHe never really responded, plodding along, not even seeming to register that he heard you.  And then it got to the point that you had to keep going, or you would fail out.  What did you do then?\n\t\t\t\t*choice\n\t\t\t\t\t#I stayed with Blake.\n\t\t\t\t\t\tAnd your encouragement worked!  Both of your barely made it in time, and after he got done throwing up, he couldn't thank you enough!\n\n\t\t\t\t\t\t- Light increased\n\n\t\t\t\t\t\tYou sure felt great that day, and while that felt nice to do, in the long run it turned out horrible.  Staying with Blake was the worst thing you could have done for him.  On his first mission, his squad was sent to clean out a Volucris infestation on the factory moon of Char.  Volucri look like a mix between a cockroach and tiger.  According to the story, Blake was set as the squad's rear guard.  Apparently, looking at the video data from his Armor's helmet, he saw the swarm of Volucris drop down behind his squad, but he froze up and didn't say anything.  He didn't even fire a shot.  His squad was swarmed from behind, and three marines died in a matter of seconds.  The rest of the squad managed to make it out, but two of the survivors now have mechanical limbs.\n\n\t\t\t\t\t\tIt's tough to find out that you don't know as much about leadership as you thought you did...\n\n\t\t\t\t\t\t- Leadership decreased\n\n\t\t\t\t\t\t*set dark %+24\n\t\t\t\t\t\t*set leadership-1\n\t\t\t\t\t\t*goto TrainingX\n\t\t\t\t\t#I abandoned him.\n\t\t\t\t\t\tIt was a hard choice, but there was nothing you could do.  If he couldn't keep up, then he wouldn't have made a good marine.  Not everyone has what it takes.  Who knows what would have happened if you had coddled him along?  Still, it's a tough memory.\n\t\t\t\t\t\t*goto TrainingX\n\t\t\t\t\t\t\n\t\t\t#I left him there, panting and red faced, trudging along.\n\t\t\t\tIt was a hard choice, but there was nothing you could do.  If he couldn't keep up, then he wouldn't have made a good Mobile Marine.  Not everyone has what it takes...  Still, that was a rough day.\n\t\t\t\t*goto TrainingX\n\n\t#I kept running.  He needed to do this on his own.  That was the point.\n\t\tIt was a hard choice, but there was nothing you could do.  If he couldn't keep up, then he wouldn't have made a good marine.  Not everyone has what it takes...  Still, that was a rough day.\n\t\t*goto TrainingX\n\n\t#I insulted his mother.\n\t\tYou remember his red, sweaty, angry face all too well!  He growled something, spit swinging from his lips, and lunged after you.  You laughed, and stayed just out of his reach.\n\n\t\t- Darkness grows within you...\n\n\t\tBut your taunting helped him make it to the end on time!  Unfortunately, the big idiot didn't understand what you had done for him, and he punched you...  Which got him kicked out of the Corps anyway...  The worst part was that you got knocked out with one punch!\n\t\t\n\t\t- Fighting decreased\n\t\t*set dark %-20\n\t\t*set fighting-1\n\t\t*set weakness+1\n\t\t*goto TrainingX\n\n*label TrainingX\n*page_break\nBoot camp was a lot of working hard, being exhausted, and feeling stupid.\n \nThe day you first started rifle training you really made an idiot of yourself, and discovered a few new things that you were bad at!  You remember the trainer handing out the rifles, but yours didn't seem to shoot straight.  You then did something that totally failed - what was it?\n*choice\n\t#I took it apart and tried to fix it, and realized just how much I DIDN'T know about technical stuff!\n\t\tYou remember pulling out a few bolts, seeing if you could see what was wrong.  You had the rifle in several pieces when the trainer noticed, and yelled \"What the hell do you think you're doing?!\"  Just then, a spring popped out of the rifle, and the rest of the recruits started laughing.  That's when you realized that fixing stuff wasn't exactly your strongest area...\n\n\t\t- Glory lost...\n\t\t*set infamy%-40\n\t\t*if weakness = 0\n\t\t\t*set technical-3\n\t\t\t*line_break\n\t\t\t- Technical decreased massively\n\t\t\t*goto Training2\n\t\t*if weakness = 1\n\t\t\t*set technical-2\n\t\t\t*line_break\n\t\t\t- Technical decreased greatly\n\t\t\t*goto Training2\n\t\t\n\t\t*else\n\t\t\t*set technical-1\n\t\t\t*line_break\n\t\t\t- Technical decreased\n\t\t\t*goto Training2\n\t#I complained to the trainer, and got an ear full.\n\t\tThe trainer mocked you for the next several weeks, calling you a whiner and worse.  What did you do?\n\t\t*choice\n\t\t\t#I looked at the ground and submissively took it.  The memory still haunts me.\n\t\t\t\tIt turned out that the rifle was defective, but that didn't change anything.  This experience still lingers in your mind, making you feel timid at times...\n\n\t\t\t\t*if weakness = 0\n\t\t\t\t\t*set guts-3\n\t\t\t\t\t- Guts decreased massively\n\t\t\t\t\t*goto Training2\n\t\t\t\t*if weakness = 1\n\t\t\t\t\t*set guts-2\n\t\t\t\t\t- Guts decreased greatly\n\t\t\t\t\t*goto Training2\n\t\t\t\t*else\n\t\t\t\t\t*set guts-1\n\t\t\t\t\t- Guts decreased\n\t\t\t\t\t*goto Training2\n\t\t\t#I threw a weak wristed punch at the trainer...\n\t\t\t\tThe trainer caught your punch, and with a quick twist you were on the ground, begging that she let you go.  You never got over feeling like you were simply bad at fighting...\n\t\t\n\t\t\t\t*if weakness = 0\n\t\t\t\t\t*set fighting-3\n\t\t\t\t\t- Fighting decreased massively\n\t\t\t\t\t*goto Training2\n\t\t\t\t*if weakness = 1\n\t\t\t\t\t*set fighting-2\n\t\t\t\t\t- Fighting decreased greatly\n\t\t\t\t\t*goto Training2\n\t\t\t\t*else\n\t\t\t\t\t*set fighting-1\n\t\t\t\t\t- Fighting decreased\n\t\t\t\t\t*goto Training2\n\t#I just stuck with it, knowing that it would set my marksmanship back...\n\t\tTraining with that rifle set some bad habits that took you a long time to break!  You were actually a WORSE shot after that training!\n\n\t\t*if weakness = 0\n\t\t\t*set shooting-3\n\t\t\t- Shooting decreased massively\n\t\t\t*goto Training2\n\t\t*if weakness = 1\n\t\t\t*set shooting-2\n\t\t\t- Shooting decreased greatly\n\t\t\t*goto Training2\n\t\t*else\n\t\t\t*set shooting-1\n\t\t\t- Shooting decreased\n\t\t\t*goto Training2\n\t#I tried to hide and skip the training, but I never was good at that sort of thing.\n\t\tEvery day you tried hiding in a new place, but they found you over and over, each time giving you some new and humiliating punishment.  You realized then that being sneaky just wasn't your thing.\n\n\t\t*if weakness = 0\n\t\t\t*set stealth-3\n\t\t\t- Stealth decreased massively\n\t\t\t*goto Training2\n\t\t*if weakness = 1\n\t\t\t*set stealth-2\n\t\t\t- Stealth decreased greatly\n\t\t\t*goto Training2\n\t\t*else\n\t\t\t*set stealth-1\n\t\t\t- Stealth decreased\n\t\t\t*goto Training2\n*label Training2\n\nThese were your stats before the Mobile Armored Corps really got a hold of you, and shaped you into the soldier you are today:\n\n*stat_chart\n\ttext Guts\n\ttext Leadership\n\ttext Shooting\n\ttext Fighting\n\ttext Technical\n\ttext Stealth\n\n*label Training3\n*page_break\nNear the end of Basic Training, they had a final test for you.  You and the other recruits were dropped off in what you think were the mountains of Northern Canada, and told that when you found your way back to the base, you would graduate.  They told you that this was something similar to what the Spartans did, and that in proving yourself in this way, you would be joining a brotherhood of soldiers that dates back thousands of years.\n\nAs you were pushed out of an airplane one by one, you doubted the Spartans did it exactly like this...\n\nHanging from your parachute, gliding toward the rough, rocky, snow encrusted ground, what did you do?\n*choice\n\t#I paid close attention to the direction that the airplane was flying from, and flying to.\n\t\tKeeping an eye on the plane, you saw that after dropping off the other recruits, it headed west.\n\t\t*goto Training32\n\t#I watched where the closest fellow recruits were landing.\n\t\tYou saw that someone landed just South of where you landed.\n\t\t*goto Training32\n\t#I tried to make sure that I landed on clear, high ground.\n\t\tYou glided gently down and landed with a short run.  From this point, you could see that to the east there were only rocky crags as far as you could see...\n\t\t*goto Training32\n\n*label Training32\n\nLanding, you pulled out your large military issue knife (the only equipment they gave you for this mission) and cut your parachute free.\n\nDid you try and cheat in this test?\n*choice\n\t#Yes I did!  I secretly stashed a small hand held computer in my pocket.  It was against the rules, but in war, there are no rules, right?\n\t\tGrinning to yourself, you pulled out the small computer and turned it on.  Yeah this might be a short cut, but so what?!  The computer flickered to life, displaying a map made of green lines.  The map showed a clear path back to the base camp.  Following the blinking dots, it took you two days, and you had to take the computer apart a few times to fix it, but you were the first to arrive.  When you got close, you chucked the computer into some bushes.  You even got an award for being the first recruit back!\n\n\t\t- Technical increased greatly!\n\t\t*line_break\n\t\t*set technical+2\n\t\t- Glory increased\n\t\t*line_break\n\t\t*set infamy %+guts\n\t\t- Stealth increased\n\t\t*line_break\n\t\t*set stealth+1\n\t\t- Darkness grows within you...\n\t\t*set dark %-20\n\t\t*goto Training4\n\t#No way.  The training was important, and I knew I needed it.\n\t\tStanding there on the mountain side, you looked around at the bleak wilderness.  What direction did you walk?\n\t\t*label mountains\n\t\t*choice\n\t\t\t#I headed north, into the mountains.\n\t\t\t\tYou wandered those rocky peaks for hours that day, not catching sight of anyone or anything.  It was miserable.  Then, through gusts of wind and snow, you spotted a small shack on a mountainside about half a mile away.\n\n\t\t\t\tJogging over to it, you saw that it was an old hunting shack.  By the look of it no one had been there for some time.  Searching the cabin, you found an old radio on a counter, no food, and a dusty rifle hanging on the wall.  \n\n\t\t\t\tWhat did you do?\n\t\t\t\t*choice\n\t\t\t\t\t#I respected the fact that this was someone else's property, touched nothing, and headed back to where I landed.\n\t\t\t\t\t\tThen what direction did you go?\n\n\t\t\t\t\t\t*goto mountains\n\t\t\t\t\t#I fixed the radio and used it.\n\t\t\t\t\t\t*set technical+3\n\t\t\t\t\t\tWith no tool other than your buck knife, you disassembled and rebuilt that old, dusty radio.  That's when you realized you had a gift for working with machines...\n\n\t\t\t\t\t\t- Technical increased greatly\n\n\t\t\t\t\t\tYou flipped the radio on, and dialed in the military frequency.  Listening in you figured out what direction the signal was coming from, and in only a few short days you were back at the base!\n\t\t\t\t\t\t*goto Training4\n\t\t\t\t\t#I took the rifle with me, and went back to searching for the base.\n\t\t\t\t\t\t*set shooting+2\n\t\t\t\t\t\tThe rifle took some cleaning, but you knew your way around a firearm.  That was when you realized that you were somewhat gifted with them...\n\n\t\t\t\t\t\t- Shooting increased\n\n\t\t\t\t\t\tYou then headed out, and searched for several days for the camp with no luck.  On the fourth day you had shot yet another rabbit, and where cooking it over a fire when another recruit stumbled out of the brush!\n\n\t\t\t\t\t\tHe looked hungry, and asked for some food.  What did you do?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I pointed the rifle at him and told him to find his own food.\n\t\t\t\t\t\t\t\tAt first he looked terrified, but then his face twisted into rage.  With murder in his eyes, he growled, \"I'll remember this ${name}.\"  Then he backed slowly through the brush, and disappeared.\n\n\t\t\t\t\t\t\t\t*set dark %-25\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*set enemy_trooper \"yes\"\n\n\t\t\t\t\t\t\t\t- Darkness grew within you...\n\n\t\t\t\t\t\t\t\tYou wonder if that guy still holds a grudge about that...  he got back to the base camp just fine.  In fact, when you got back and reported, one of your trainers commended you on your resourcefulness, and not letting other recruits off easy.\n\t\t\t\t\t\t\t\t*set leadership+2\n\n\t\t\t\t\t\t\t\t- Leadership increased greatly\n\n\t\t\t\t\t\t\t\t*goto Training4\n\n\t\t\t\t\t\t\t#I shared some rabbit with him.\n\t\t\t\t\t\t\t\tHe grinned and thanked you, and the two of you ended up traveling the rest of the way together.  You wonder if that guy would have survived on his own.  He was friendly, but sure didn't seem to have a good grip on his emotions.\n\t\t\t\t\t\t\t\t*set leadership+1\n\t\t\t\t\t\t\t\t*set dark %+20\n\n\t\t\t\t\t\t\t\t- Leadership increased\n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t- Light increased\n\n\t\t\t\t\t\t\t\tFunny thing, when you got back to base one of the trainers reprimanded you for helping the other recruit out, telling you that a strong leader would have forced the other guy to survive on his own.  You didn't agree with that, and still don't!\n\t\t\t\t\t\t\t\t*goto Training4\n\t\t\t\t\t\t\t#I gave him as much food as he needed, and even made him some rabbit skin moccasins.\n\t\t\t\t\t\t\t\t*set dark %+20\n\t\t\t\t\t\t\t\t- Light increased\n\n\t\t\t\t\t\t\t\tHe was very thankful, and at first it looked like you had saved his life.  But then he insisted on staying with you, and relied on you more and more.  Eventually he started getting demanding and rude, and did less and less for himself.  What did you finally end up doing?\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#I put up with it.\n\t\t\t\t\t\t\t\t\t\t*set guts+1\n\t\t\t\t\t\t\t\t\t\t*set dark %+23\n\t\t\t\t\t\t\t\t\t\t- Guts increased\n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t- Light increased\n\n\t\t\t\t\t\t\t\t\t\tThose days were miserable.  Thinking back, you can't imagine being in a situation more trying than that week of travel with that sorry excuse for a trooper.  Eventually, you did find the base, and to add insult to injury you got chewed out for letting the other recruit tag along.  Something about how the other guy needed to learn on his own.  You don't regret it though - it made you feel good to help the guy!\n\t\t\t\t\t\t\t\t\t\t*goto Training4\n\t\t\t\t\t\t\t\t\t#I told him we couldn't travel together anymore.\n\t\t\t\t\t\t\t\t\t\t*set leadership+1\n\t\t\t\t\t\t\t\t\t\t*set enemy_trooper \"yes\"\n\t\t\t\t\t\t\t\t\t\t- Leadership increased\n\n\t\t\t\t\t\t\t\t\t\tIt was tough to do, but once free of him, you managed just fine on your own.  After a few more days of searching, you found the camp just fine.  The other recruit took another week, and you remember when he came in, he was covered in cuts and bruises, and looked half starved!  You tried to talk to him, but he gave you the most hateful glare you have ever seen, and whispered, \"I'll remember this, ${name}.\"  You wonder if he's ever forgiven you...\n\t\t\t\t\t\t\t\t\t\t*goto Training4\n\t\t\t\t\t\t\t\t\t#I shot him.\n\t\t\t\t\t\t\t\t\t\t*set dark %-55\n\t\t\t\t\t\t\t\t\t\t*set guts+2\n\t\t\t\t\t\t\t\t\t\t*set leadership+1\n\t\t\t\t\t\t\t\t\t\t*set shooting+1\n\t\t\t\t\t\t\t\t\t\tIt was strangely easy.  The guy just wouldn't shut up, and you knew he wouldn't have made a good marine anyway.  You knew each recruit had a tracking chip, so the only hard part was making sure you disabled it with a rock afterwards.  You knew you were doing humanity a favor, getting rid of that guy.  What if he had managed to get into a command position?  Who knows how many lives you potentially saved?\n\n\t\t\t\t\t\t\t\t\t\t- Guts increased greatly\n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t- Leadership increased\n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t- Shooting increased\n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\t\t\t\t\t\t\t\t\t\t*goto Training4\n\t\t\t\t\n\t\t\t\t\t#I refused to use anything there - I didn't need help, I was training to be a Marine!\n\t\t\t\t\t\t*set guts+3\n\t\t\t\t\t\t- Guts increased greatly\n\n\t\t\t\t\t\tTurning your back on resources like that, for no reason other than to challenge yourself, took courage and determination.  Both of which were forged in you by fire as over the next week, you scrambled and fought your way through those mountains, and never once regretted leaving that stuff behind.  Two and a half weeks later, starving and frost bitten, you were picked up by a rescue chopper.  Upon hearing your report, the trainers decided that you passed, and that you would make a fine marine.\n\t\t\t\t\t\t*goto Training4\n\t\t\t#I walked south, down the mountainside.\n\t\t\t\tYou spent several hours walking South, when you caught sight of another recruit through the sparse mountain trees.  He hadn't seen you yet.  What did you do then?\n\t\t\t\t*choice\n\t\t\t\t\t#I silently followed him, watching to see what he did.\n\t\t\t\t\t\t- Stealth increased\n\t\t\t\t\t\t*set stealth+1\n\n\t\t\t\t\t\tWatching, you recognized him as Drake, a recruit with a bad reputation.  While you watched, you saw him glance around, and then pull out a small pistol and pocket computer that he had stashed in his pockets.  What did you do then?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#That weasel was cheating!  I stepped out and confronted him.\n\t\t\t\t\t\t\t\tSeeing you, he jumped and tried to hide the equipment.  \n\t\t\t\t\t\t\t\t*label drake\n\t\t\t\t\t\t\t\tYou told him you saw what he had, and his shoulders sagged.  He tried to explain that he wasn't trying to cheat exactly, and that all's fair in war...  Eventually though, he withered under your gaze and handed over the stuff.\n\t\t\t\t\n\t\t\t\t\t\t\t\t- Leadership increased\n\t\t\t\t\t\t\t\t*set leadership+1\n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t- Light increased\n\t\t\t\t\t\t\t\t*set dark %+20\n\n\t\t\t\t\t\t\t\tWhat did you do with the gun and computer?\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#I broke them both, tossed the parts into the woods, and told Drake to follow me.\n\t\t\t\t\t\t\t\t\t\tDrake sure was angry.  He even tried to jump you, to stop you from breaking his gear.  You spun easily, dodging his outstretched hands, and slammed your elbow into his back.  He fell to the icy rocks gasping.  Quickly you planted your knee in his back, and pinned him to the ground.\n\n\t\t\t\t\t\t\t\t\t\t- Fighting increased\n\t\t\t\t\t\t\t\t\t\t*set fighting+1\n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t- Light increased\n\t\t\t\t\t\t\t\t\t\t*set dark %+20\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tDrake quickly agreed to stop fighting, so you let him up.  He agreed to go along with you, but slowly sank into a sullen rage.  Two weeks later, tired, cold and hungry, the two of you finally caught sight of the base camp.  By the time you two walked in, Drake hated you with every fiber of his being.  \"I'll remember this, ${name},\" he growled quietly, not even looking you in the eye.  You wonder where he ever ended up?\n\t\t\t\t\t\t\t\t\t\t*set enemy_trooper \"yes\"\n\t\t\t\t\t\t\t\t\t\t*goto Training4\n\n\t\t\t\t\t\t\t\t\t#I got rid of the pistol, but decided to use the computer.\n\t\t\t\t\t\t\t\t\t\tYou remember Drake giving you a knowing grin.  \"Not so high and mighty, are you?\" he said.  You told him to shut up while you used the computer to find the base.\n\n\t\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\t\t\t\t\t\t\t\t\t\t*set dark %-20\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tIt took you a few days to get to the base, and you had to take the computer apart a few times to fix it, but you both made it.\n\n\t\t\t\t\t\t\t\t\t\t- Technical increased\n\t\t\t\t\t\t\t\t\t\t*set technical+1\n\t\t\t\t\t\t\t\t\t\t*goto Training4\n\n\t\t\t\t\t\t\t\t\t#I got rid of the computer, but kept the pistol.\n\t\t\t\t\t\t\t\t\t\tYou remember Drake giving you a knowing grin.  \"Not so high and mighty, are you?\" he said.  You told him to shut up, and you pocketed the pistol.\n\n\t\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\t\t\t\t\t\t\t\t\t\t*set dark %-20\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tIt took the two of you about a week to find the base, but the pistol came in handy.  You shot two mountain goats, and you and Drake never went hungry.\n\n\t\t\t\t\t\t\t\t\t\t- Shooting increased\n\t\t\t\t\t\t\t\t\t\t*set shooting+1\n\t\t\t\t\t\t\t\t\t\t*goto Training4\n\n\t\t\t\t\t\t\t\t\t#I kept and used them both.\n\t\t\t\t\t\t\t\t\t\tYou remember Drake frowning at you, and yelling, \"Hey!  What are you doing?!\"  You told him to shut up, and the idiot tried to jump you!\n\n\t\t\t\t\t\t\t\t\t\tThat's when the training kicked in.  Why did he try and attack you while you were holding a pistol?!  You remember hearing the shot, and everything moving in slow motion.  You saw his face twist from anger to shock, and then his eyes go slack.  Why did he try to attack you?!  \n\n\t\t\t\t\t\t\t\t\t\t- Shooting increased\n\t\t\t\t\t\t\t\t\t\t*set shooting+1\n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\t\t\t\t\t\t\t\t\t\t*set dark %-37\n\n\t\t\t\t\t\t\t\t\t\tIt wasn't long before several helicopters showed up.  Each recruit had a tracking chip, and they knew that Drake had been shot.  You explained what had happened, that the pistol and the computer were HIS, and that he was shot accidently.  The equipment was eventually traced back to Drake, and you were exonerated, but not before developing a pretty nasty reputation...\n\n\t\t\t\t\t\t\t\t\t\t- Glory lost...\n\t\t\t\t\t\t\t\t\t\t*set infamy %-70\n\n\t\t\t\t\t\t\t\t\t\t*goto Training4\n\n\t\t\t\t\t\t\t#I followed him silently.\n\t\t\t\t\t\t\t\tStealthily, you followed him.  Checking his computer, he headed due west.  You tracked and followed him, and in just two days he made it back to camp, with you only about a half mile behind.\n\n\t\t\t\t\t\t\t\t- Stealth increased greatly!\n\t\t\t\t\t\t\t\t*set stealth+2\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tDid you report him when you got back?\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Yes\n\t\t\t\t\t\t\t\t\t\tHearing your report, Drake's belongings were searched and the computer was found.  Checking it, they could tell he had used it to locate the base camp.  Drake was kicked out of the Corps, only days before graduating from Basic.  Word got around that you had reported him, and the other recruits stopped talking to you.  Sometimes doing the right thing isn't popular.\n\n\t\t\t\t\t\t\t\t\t\t- Light increased\n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t- Glory lost...\n\t\t\t\t\t\t\t\t\t\t*set dark %+30\n\t\t\t\t\t\t\t\t\t\t*set infamy %-40\n\t\t\t\t\t\t\t\t\t\t*goto Training4\n\t\t\t\t\t\t\t\t\t#No\n\t\t\t\t\t\t\t\t\t\tYou kept what Drake did to yourself, not wanting to rat out a fellow recruit.  It didn't take long before Drake realized that you followed him though, and he thanked you for not telling anyone.  Word got around that you are a trustworthy guy, but not too moral, and that you know how to keep your mouth shut.\n\n\t\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t- Glory gained\n\t\t\t\t\t\t\t\t\t\t*set dark %-20\n\t\t\t\t\t\t\t\t\t\t*set infamy %+ guts\n\t\t\t\t\t\t\t\t\t\t*goto Training4\n\t\t\t\t\t\t\n\t\t\t\t\t#I stepped out and said hi.\n\t\t\t\t\t\tHe jumped, and dropped a small pocket computer and a pistol he was carrying.  He was cheating!  \n\t\t\t\t\t\t*goto drake\n\t\t\t\t\t\n\t\t\t#I jogged east, into the rocky hillside.\n\t\t\t\tWalking east, the ground got rockier and sharper, until you were climbing and sliding over sharp bits of shale, cutting your hands, knees and ripping a hole in your shirt.  Did you keep going?\n\t\t\t\t*choice\n\t\t\t\t\t#Yes, I kept going!\n\t\t\t\t\t\tYou pushed on, and still have scars from that week of fighting through the mountains.\n\n\t\t\t\t\t\t*set guts+3\n\t\t\t\t\t\t- Guts increased greatly\n\n\t\t\t\t\t\tCourage and determination were forged in you by fire as you scrambled, slid, and bled your way through those mountains.  Two weeks later, starving and frost bitten, you stumbled into a civilian hunting party.  The shocked hunters gave you food and water, and told you where you were.  You had gone the wrong way!  The hunters were happy to help you out and gave you a map and a rifle.\n\n\t\t\t\t\t\tIt took you several more weeks, but you strode into base camp with no fear.  You knew who you were, and what you were capable of.  Hearing your story, the trainers knew you'd make a fine marine, and everyone talked about what you had done!  You still have that rifle back home, to remind you of the people who've helped you along the way.\n\n\t\t\t\t\t\t- Glory gained\n\t\t\t\t\t\t*set infamy %+ guts\n\t\t\t\t\t\t*goto Training4\n\t\t\t\t\t\t\n\t\t\t\t\t#No, I turned back.\n\t\t\t\t\t\t*set leadership+1\n\t\t\t\t\t\t*if leadership > 15\n\t\t\t\t\t\t\t*set leadership 15\n\t\t\t\t\t\t*set guts-1\n\t\t\t\t\t\t*if guts \u003c 5\n\t\t\t\t\t\t\t*set guts 5\n\t\t\t\t\t\t- Leadership increased\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t- Guts decreased\n\n\t\t\t\t\t\tThen what direction did you go?\n\t\t\t\t\t\t*goto mountains\n\t\t\t#I went west, into the trees.\n\t\t\t\tYou set off walking west.  The ground got flatter with more trees the further you went.  As night fell, you looked for someplace to take shelter.  About a half an hour later, you spotted a cave in a rocky cliff face, and went inside.  It smelled awful, but you fell asleep easily.  If you had been a little less exhausted, you might have given that smell a little more thought...\n\n\t\t\t\tIn the middle of the night something woke you up.  Snapping to alertness, your training taking over, you were on your feet with your knife out.  In the moonlight, you could see the shape of something large growling at you, standing in the mouth of the cave.\n\t\t\n\t\t\t\tWhat did you do?\n\t\t\t\t*choice\n\t\t\t\t\t#I lunged at it, knife ready!\n\t\t\t\t\t\t*label bear\n\t\t\t\t\t\tPlowing into the huge shape, you felt your knife bite into thick fur.  A large paw swiped at you, raking bloody gashes down your back.  Screaming, you stabbed at it again and again, until the beast howled in pain and lumbered back.  Only then did you see it clearly - you were fighting a bear! \n\n\t\t\t\t\t\t- Fighting increased\n\t\t\t\t\t\t*set fighting+1\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t- Guts increased\n\t\t\t\t\t\t*set guts+1\n\n\t\t\t\t\t\tWhat did you do then?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I charged in for the kill!\n\t\t\t\t\t\t\t\tThe bear tried to close its jaws on your shoulder, but you ducked, slid to the side, and with one deft motion you slit the bear's throat.  Gouts of blood splashed the rocks at your feet as the hulking animal slumped, then fell.\n\t\t\t\t\t\t\t\t- Fighting increased\n\t\t\t\t\t\t\t\t*set fighting+1\n\n\t\t\t\t\t\t\t\tThe next day, you skinned the bear and packed up the meat.  A few days later you rolled into camp, looking like a savage come out of the wilderness to trade.  The other recruits and officers went wide eyed at your story, and seeing the claw marks on your back.  You still have those scars, and the bear pelt.  What a crazy way to graduate from Basic!\n\n\t\t\t\t\t\t\t\t- Glory increased\n\t\t\t\t\t\t\t\t*set infamy %+ (guts + guts)\n\t\t\t\t\t\t\t\t*goto Training4\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#I ducked out of the cave and ran!\n\t\t\t\t\t\t\t\tThe bear backed away from you, clearly afraid, an
