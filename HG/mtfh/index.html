<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mobile Armored Marine: Mission to Far Hope — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "mtfh", "title": "Mobile Armored Marine: Mission to Far Hope", "scenes": {"combat_death": "*page_break Uh-Oh...\n\nRed warning lights flash in your vision as your suit begins to shut down.  Your limbs are suddenly too hard to lift.  Lying there, you feel helpless as your suit shuts down, system by system.\n\n\"Warning!\" a voice calls in your helmet, \"Prepare for Temporal Tether recovery!\"\n\nYou grit your teeth and clench your eyes shut.  This is gonna hurt...\n\nFor a moment, your world is made of needles of blinding light, excruciating pain and mind numbing shock as you are ripped backwards through time.\n\n*if deathcount > 99\n\t*set armor barmor\n\t*set troopcount bbtroopcount\n\tAnd in a moment, reality snaps back into view.  You are standing in the base of a smoldering crater, with your armor hooked up to the temporal tether realignment module.  Everything is silent, and after a moment, the Slipdagger's senior technician's voice crackles to life in your ear.  \n\n\t\"Sir, the temporal tether appears to be used.  We can re-activate the module from here, but it will take some time to charge.  Also, this will damage your Armor's systems a bit.  It's unavoidable.\"\n\n\tAs you wait, your Oracle informs you that more of the troopers have been wounded, and you see that the squad's sergeant has contacted the Slipdagger to see what's taking you so long.  This isn't going to help morale...\n\n\t*set binfamy %-20\n\t*set infamy binfamy\n\t- Morale lost\n\n\tFinally, the device is recharged, and you feel the now familiar sensation ripple through your body.  You feel slightly out of place, as though... you don't belong.  It's an unnerving feeling.  You also notice several warning lights flare to life, telling you about several system failures in your Armor.  The whole suit is at ${armor} percent efficiency.\n\n\t*if deathcount = 100\n\t\t\"Sir,\" the technician says hesitantly, \"If your tether is triggered again, we can recharge it again remotely, but ... doing it this way will likely have lasting effects on you...  Most studies show a growing lack of people skills, and of situational awareness...\"\n\t\t*goto tetherstop\n\n\t*elseif deathcount = 101\n\t\t\"Sir,\" the technician says hesitantly, \"It looks like your tether has been remote triggered before.  At this point, you might have some ... permanent damage.  To yourself.  Please be careful, and keep in mind that your primary mission doesn't need to include keeping everything intact down there.  We all know you're trying to be careful, but...\"\n\n\t\tYou cut the conversation off, irritated.  Sniffing, you can feel something wet trickling out of your nose.  You can taste blood in the back of your throat.\n\n\t\t- Leadership lost\n\t\t*line_break\n\t\t- Guts gained\n\t\t*set leadership - 1\n\t\t*set guts + 1\n\n\t\t*goto tetherstop\n\n\t*elseif deathcount = 102\n\t\t\"Sir,\" the technician says hesitantly, \"It looks like your tether-\"\n\n\t\t\"I KNOW!\" you snap, and cut the line.  You doubt that technician has ever been yanked backwards through time this much in his life... You feel the same trickle of blood run out of your nose.  The same one you’ve felt before.  You think about all the events that you just lived through, and how none of them have happened yet.  But they will happen again.  And again.  And AGAIN!  You giggle to yourself at the thought.\n\n\t\tYou wonder why no one else is laughing.\n\n\t\tAbruptly stopping, you shake your head.  Time to get back to work.\n\n\n\t\t- Leadership lost\n\t\t*line_break\n\t\t- Guts gained\n\t\t*set leadership - 1\n\t\t*set guts + 1\n\t\t*goto tetherstop\n\n\t*else\n\t\t\"Sir,\" the technician says hesitantly, \"It looks like-\"\n\n\t\tYou grin, and say his words for him, right on top of him, \"Your tether has been remote triggered before.\"  You giggle, and then bust out into a full laugh.  You laugh so hard that you start coughing, and then you start to hack up gobbets of blood, spattering the inside of your helmet...\n\n\t\t\"Sir...?\" the technician's voice has a shake in it.\n\n\t\t\"I'M FINE!\" you bark back, viciously.  Then softly, \"I'm fine.  This is just... difficult...\"  You feel like you've said all this before.  Like you're going to keep saying it forever.  Over and over.  You smile, and start to giggle again...\n\n\t\tRegaining control, you stop laughing.  Back to the mission.  The endless loop of a mission.  You wonder if you will live in this loop for the rest of time.  In a way, that would be like living forever, right?\n\n\t\t*if deathcount = 103\n\n\t\t\t- Leadership lost\n\t\t\t*line_break\n\t\t\t- Guts gained\n\t\t\t*set leadership - 1\n\t\t\t*set guts + 1\n\t\t\t*goto tetherstop\n\t\t*else\n\t\t\tYou feel like you've had THAT thought before, too.  And this one.  All of them.  Nothing is new.  You start to shake...\n\n\t\t\t- Guts lost\n\t\t\t*set guts - 1\n\t\t\t*goto tetherstop\n\n\n*else\n\t*set deathcount + 1\n\t*page_break\n\t*if deathcount = 1\n\t\tAnd just as suddenly, you are standing in the Armory.  The same Corps technician who powered up your armor before is standing there, saying \"even if you get pulled back safely, the unit itself is used up and lost... Wait, where did your unit... Oh.\" He looks at you.  \"Your Temporal Tether just got used, didn't it!  Here, I'll have to replace it.\"\n\n\t\tAs he works, he reminds you that, while you might have memories of what happened, that now those events are all in the future.  \"None of that has taken place yet.  This DOES give you a distinct tactical advantage.  However, the whole ship will know of the loss of power, and what it means.  This can be discouraging for the troops.  I'd recommend not telling them if any of them have died in the future that you just experienced!\"\n\n\t\t*goto MNM\n\t*elseif deathcount = 2\n\t\tAnd just as suddenly, you are standing in the Armory.  The same Corps technician who powered up your armor before is standing there, saying \"even if you get pulled back safely, the unit itself is used up and lost... Wait, where did your unit... Oh.\" He looks at you.  \"Your Temporal Tether just got used again!  No worries - I can fix it.  By the loss of power on the ship, it looks like this has been triggered twice now?  This must be a hard mission - it looked like it from the briefing.  You know, as a Mobile Armored Marine, you have incredible destructive force at your disposal.  I saw that your mission demands that the power station remain intact... Maybe you should focus more on completing the main mission, before worrying about secondary concerns!  Just a thought.\"\n\n\t\t*goto MNM\n\n\t*elseif deathcount = 3\n\t\tAnd just as suddenly, you are standing in the Armory.  The same Corps technician who powered up your armor before is standing there, saying \"even if you get pulled back safely, the unit itself is used up and lost... Wait, where did your unit... Oh.\" He looks at you.  \"Your Temporal Tether... Oh wow.  There's been a huge drain on the ship's power.  Looks like this is the third time this has been triggered?  Oh no.  That's bad.  Well... have you tried just blasting everything that moves?  What about playing to your strengths?  Wow.  Well, sir, I don't have much more advice for you... Good luck.  One more power drain, and this is going to get... bad...\"\n\n\t\t*goto MNM\n\t*else\n\t\tAnd just as suddenly, you are standing in the Armory.  The same Corps technician who powered up your armor before is standing there, but it looks like he paused mid-sentence, almost waiting for you.  Smiling, he says, \"And you're back!  By the drain on the ship's power, I'd say you've jumped back here like ${deathcount} times?\"\n\t\t*goto MNM\n\n*label MNM\nHe pulls a charred box from your backpack, and then removes several long blackened rods from your Armor's chest, back and legs, replacing them with shining new ones.  Your suit vibrates and hums, and the technician unlatches the cables to your chest and back, pats your shoulder and says, \"You're good to go!\"\n\n*set armor 100\n*set troopcount 24\n*set morale 50\n*set building \"ok\"\n*set binfamy %-10\n*set infamy binfamy\n*set leadership bleadership\n*set guts bguts\n*set shooting bshooting\n*set fighting bfighting\n*set stealth bstealth\n*set technical btechnical\n*set alone \"ok\"\n*set Eleanor \"ok\"\n*set lizard \"ok\"\n*set plaxus \"ok\"\n*set burn \"ok\"\n*set backtrack 0\n*set puppy \"no\"\n*set west \"no\"\n*set north \"no\"\n*set east \"no\"\n*set gold \"no\"\n*set satisfied \"no\"\n*set omega \"no\"\n*set northset \"no\"\n*set southset \"no\"\n*set eastset \"no\"\n\n*page_break\n\n*goto_scene mission_1_Landing\n\n*label tetherstop\n*set troopcount bbtroopcount\n*set morale bmorale\n*set building \"ok\"\n*set leadership bleadership\n*set guts bguts\n*set shooting bshooting\n*set fighting bfighting\n*set stealth bstealth\n*set technical btechnical\n*set alone \"ok\"\n*set Eleanor \"ok\"\n*set lizard \"ok\"\n*set plaxus \"ok\"\n*set burn \"ok\"\n*set backtrack 0\n*set west \"no\"\n*set north \"no\"\n*set east \"no\"\n*set satisfied \"no\"\n*set omega \"no\"\n*set northset \"no\"\n*set southset \"no\"\n*set eastset \"no\"\n*set armor barmor\n*set deathcount + 1\n*goto_scene mission_1_Going_In\n", "ignoble_death": "Wow, there aren't very many ways to actually stay dead in this game, but you found one!  You must have been quite evil.  In fact, your final darkness vs. light ranking was ${dark} (the lower the darker!).\n\n*if dark \u003c 6\n\tIn fact, reaching a darkness level below 5 earns you the Shadow Brotherhood achievement!  Congratulations! \n\nYou almost made it away with the money - there IS a way to do it, while staying alive...\n\nThanks for playing!  I hope you enjoyed Power Armored Marine:  Mission to Far Hope!\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nYour final stats were:\n*stat_chart\n\ttext Guts\n\ttext Leadership\n\ttext Shooting\n\ttext Fighting\n\ttext Technical\n\ttext Stealth\n\nYour bionic implant was: ${bionic_1}\n\nYour final glory:\n*stat_chart\n\tpercent Infamy Glory\n\n\nAfter the mission, your final Light vs. Darkness was:\n*set badness 100\n*set badness - dark\n*stat_chart\n\tpercent Dark Light\n\tpercent badness Dark\n\nPlay it again and get different endings!\n\n*if infamy > 94\n\t- See if you can get enough glory to earn the Medal of Honor!\n\t*line_break\n*if deathcount > 0\n\t- See if you can make it through the mission without dying! \n\t*line_break \n*if satisfied != \"yes\"\n\t- See if you can fulfill the reason you joined the Corps in the first place (for your game, it was ${reason_to_join})!\n\t*line_break \n*if building = \"ruined\"\n\t- See if you can complete the mission WITHOUT demolishing the power station! \n\t*line_break \n*if (Eleanor != \"love\") and (gender=\"male\")\n\t- See if you can get the lady Eleanor to fall in love with you! \n\t*line_break \n*if troopcount \u003c 24\n\t- See if you can bring all of the Shock Troopers home alive! \n\t*line_break\n*if (dark > 5) and (dark \u003c 95)\n\t- See if you can earn the honor of being in the Shadow Brotherhood or a Light Marine! \n\t*line_break\n*if omega != \"yes\"\n\t- See if you can complete the mission using the Omega variant powered armor! \n\t*line_break \n*if name = \"Cheater\"\n\t- See if you can win without cheating!\n\n*delay_ending 1200 $4.99\n", "choicescript_description": "Blast into action as an Imperial Mobile Armored Marine! Decide when to use stealth, diplomacy, or your armor’s incredible power as you explore a silent colony world. Can you uncover the dark secret of Far Hope?\n\n[i]Mobile Armored Marine: Mission to Far Hope[/i] is a 65,000-word interactive novel by Steve Cave. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.", "choicescript_stats": "${name}'s Stats:\n\n*stat_chart\n\ttext Guts\n\ttext Leadership\n\ttext Shooting\n\ttext Fighting\n\ttext Technical\n\ttext Stealth\n\nThis is the state of your suit of ${omega} Powered Armor:\n*stat_chart\n\tpercent Armor  \n*if omega = \"Alpha\"\n\t(Alpha Armor maxes out at 100 percent)\n*if omega = \"Beta\"\n\t(Beta Armor maxes out at 60 percent)\n*if omega = \"Gama\"\n\t(Gama Armor maxes out at 80 percent)\n*if omega = \"Omega\"\n\t(Omega Armor maxes out at 50 percent)\n\n\nShock Troopers status:\n*if troopcount \u003c 1\n\t*set troopcount 0\n\t*set morale 0\n*stat_chart\n\ttext troopcount Troopers Alive (of 24):\n*stat_chart\n\tpercent Morale\n\nHow much honor and glory you have earned:\n*stat_chart\n\tpercent Infamy Glory\n\nAre you leaning towards darkness, or the light?\n*set badness 100\n*set badness - dark\n*stat_chart\n\tpercent Dark Light\n\tpercent badness Dark\n\n\nBionic Implant:  ${bionic_1}\n\n\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  ADVERTISING\n  \n  Remove advertisements.\n  \n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n", "episode2": "Episode 2 is not yet available.\n*ending", "mission_1_ending": "*if ((Eleanor = \"yes\") or (Eleanor = \"love\")) or (Eleanor = \"friends\")\n\tThe lady Eleanor travels back with you, to help explain what happened on Far Hope, and to gather aid for the colony's reconstruction.\n\n*if troopcount > 0\n\tYou leave what's left of the Shock Troops behind, to guard the colony and the people in canisters until help can get there.\n\n*if gold != \"mine\"\n\tUpon arriving back at Mobile Armored Corps orbital station Ajax, you give your report.  Your superiors are shocked to hear of this new Lacertian alien race, and about what they were doing with the colonists.\n\n*if (dark \u003c 30) and (gold != \"mine\")\n\tYou chuckle at their reaction, which gets you some stares.  \"What?\" you ask.  \"They were weak.\"  The officers present glance at each other nervously, and suggest you get some rest.\n\n*if omega=\"Omega\"\n\tYour commanding officer is impressed that you chose the Omega variant power armor for the mission!  \"It takes a real marine to pilot a suit like that into the mess you found on Far Hope, ${name}!\"  He claps you on the back, and immediately recommends you for promotion.\n\n\tBefore the meeting is over, you've been raised a rank, and gain the honor of being among very few Mobile Armored Marines who've been promoted so quickly!\n\n\t\"I'll be keeping my eye on you, soldier,\" says your CO.  \"Outstanding work.\" \n\t*set infamy %+60\n\t\n\t-Glory increased greatly!\n\n*if burn=\"yes\"\n\tYour commanding officer is shocked that you blew the entire place up.  You get sent on to speak with a general, who, upon hearing you explain it again, is furious.  He growls, \"We wanted to RESCUE the colony, not devastate it!  Perhaps the colonists could have been saved?!  Now we'll never know...  At LEAST you could have saved the power station...  Now the entire colony, personnel AND resources, are finished.  I'm extremely disappointed.\"\n\t\n\t*set infamy %-40\n\t- Glory lost…\n\n*if lizard=\"yes\"\n\tThe MAC xeno-biologists study the Lacertian prisoner, and learn a great deal from it.  Apparently, the Empire will be seeing a lot more of this saurian race.  They discover that the Lacertians view humans as rare delicacies.  Delightful.  The science officer in charge stops by to thank you for the alien sample.\n\t*set infamy%+14\n\t\n\t- Glory increased\n\n*if plaxus=\"yes\"\n\tGovernor Plaxus is studied in depth, and interrogated.  It appears that he did in fact make a deal with the Lacertians.  He was trading the colonists to the Lacertians, in exchange for extending his life.  He thought that by splicing his DNA with theirs, he would live forever.  The science officer thinks that to be unlikely, but is interested in further studies.\n\t*set infamy %+14\n\n\t- Glory increased\n\n*if gold=\"yes\"\n\tThe Corps commends you on spotting the money, and even gives you a reward!\n\n\t*set infamy %+18\n\t- Glory increased\n\n*if (gold=\"split\") and (reason_to_join != \"money\")\n\tOnce things have settled down back on base, the captain of the Slipdagger contacts you, dropping off a very large shipping container.  Sure enough, he was true to his word - the case is full of gold and jewels.  You're rich!\n\n*if (troopcount > 12) and (gold != \"mine\")\n\tYour commanding officer commends you on your fine work in keeping over half of the Shock Troopers alive!  He explains that not every marine understands the value of human life. \n\t*set infamy %+50\n\t*set codex %+40\n\n\t- Glory increased\n\n*if (armor > 60) and (gold != \"mine\")\n\tThe supply sergeant commends you on keeping your Armor mostly functional, especially considering the weapons the Lacertians were using.\n\t*set infamy %+20\n\n\t- Glory increased\n\n*if building = \"ruined\"\n\tAfter the teams are sent back to Far Hope, it comes to everyone's attention that the power station has been far too damaged to be reactivated.  You are called in for a special debrief where your commanding officer explains, in painful detail, how important that facility was.  He goes on to explain that it's VERY clear that it was Imperial weaponry that caused the damage.  Weaponry used by you.  As far as he's concerned, this mission was unsuccessful.\n\t*set infamy %-20\n\n\t- Glory lost... \n\n*if burn != \"yes\"\n\tAfter a few weeks, while training the orbital station Ajax, you get word that the support team was able to revive the colonists!  They are going to be OK.  You head to a viewing room, sit down, and stare out at the stars.  There's nothing quite like the feeling you get when you know you kicked the bad guys in the teeth, and when you know there are people, somewhere, who will remember that YOU saved them.\n\t*set infamy %+14\n\n\t- Glory increased\n*if puppy = \"dead\"\n\t*set technical + 2\n\n*if (infamy > 94) and (codex > 65)\n\tThe corps decides, after reviewing your file, and seeing how you performed admirably and according to the book, to give you the Medal of Honor for outstanding heroics in service of the Empire!  You can hardly believe it!  A huge ceremony is held in your honor - it's a fantastic experience!  The shining hall of ceremonies on Ajax station is a huge, vaulted room with massive windows facing the stars.  Your family is there, along with all of your friends.  Standing on a massive gold plated dais, an Imperial Arbiter - someone who speaks with the force of Emperor Gladius Rex himself - places the platinum medal over your head.  At that moment, the station fires a salute and all of the cannons fire on this side of the station.  Through the tall, massive windows, space is illuminated with a hundred star bursts in every color imaginable.\n\t*goto EEEE\n*elseif ((infamy > 75) and (codex > 65)) and (dark > 65)\n\tAfter reviewing your performance in the field, and seeing that you did things admirably and by the book, the corps decides to add a plaque with your name, and the mission, in the Hall of Heroes on Ajax.  It's a fairly big honor, and you get invited to also speak to some of the new recruits coming through about your mission.  You have a great time talking to them, and they seem very excited to meet you - looks like your name is getting well known!\n\t*goto EEEE\n*elseif ((infamy > 75) and (codex > 65)) and (dark > 32)\n\tAfter reviewing your performance in the field, and seeing that you did things admirably and by the book, the corps decides to add a plaque with your name, and the mission, in the Hall of Heroes on Ajax.  The hall is huge, and full of plaques.  Still, it's at least SOME recognition of what you've done.  You get invited to speak to some of the new recruits coming through about your mission.  They really enjoy your stories, especially the gristly parts!  Looks like your name is getting well known!\n\t*goto EEEE\n*elseif ((infamy > 75) and (codex > 65))\n\tAfter reviewing your performance in the field, and seeing that you did things admirably and by the book, the corps decides to add a plaque with your name, and the mission, in the Hall of Heroes on Ajax.  You roll your eyes at the honor - that hall is massive, and covered in plaques.  No one will ever even know about your name being added!  You get invited to speak to some of the new recruits coming through about your mission.  They are excited to meet you, but fall silent as your look around the room.  In quiet tones, you tell them about the mission.  You tell them plainly about the dark things you did.  You don't even flinch.  You finish off explaining that following \"the Light\" is fine for civilians and chaplains, but when things need to get done, a good soldier doesn't flinch.  Soldiers are weapons.  As the troops leave, they seem impressed, and a little scared. Good.  Looks like your name is getting well known!\n\t*goto EEEE\n*elseif codex > 65\n\tAfter reviewing your performance in the field and seeing that you did things admirably and by the book, the corps presents you with an honor ribbon, to be worn on the shoulder.  The long red and gold ribbon demonstrates and displays your honorable character, and the fact that you have been recognized as an exemplary soldier.\n\t*goto EEEE\n*else\n\t*goto EEEE\n*label EEEE\n\n*if ((troopcount > 12) and (dark > 60)) and (codex \u003c 50)\n\tThe surviving shock troopers from the mission ended up throwing you a surprise party!  Drinks were passed around, and they all cheered and toasted your leadership, great heart and the fact that you don't care if things are done exactly \"by the book.\"  The party lasts long into the night, and you wake up thinking that you might have gotten a tattoo...\n\t*goto dubstep\n*elseif (troopcount > 12) and (dark > 60)\n\tThe surviving shock troopers from the mission ended up throwing you a surprise party!  Drinks were passed around, and they all cheered and toasted your leadership, great heart and your professionalism as a leader.  \"Don't worry,\" one of the troops said quickly, \"This party was officially approved!  We knew you'd appreciate that!\"\n\t*goto dubstep\n*elseif ((troopcount > 12) and (dark \u003c 50)) and (codex > 50)\n\tThe surviving shock troopers from the mission ended up throwing you a surprise party!  Drinks were passed around, and they all toasted your leadership.  One trooper who had had a bit too much to drink looked at the others and said, \"${name} might not believe in following the Corps' idea of \"Walking in the light\", but he does things by the book, gets the job done, and got us all home!\"  The party lasted long into the night!\n\t*goto dubstep\n*elseif ((troopcount > 12) and (dark > 50)) and (codex \u003c 50)\n\tThe surviving shock troopers from the mission ended up throwing you a surprise party!  Drinks were passed around, and they all toasted your leadership.  One trooper who had had a bit too much to drink hooked an arm around your shoulders, looked at the others and said, \"${name} might not do things \"by the book\", but I'd like you to show me a marine with a bigger heart!!  ${name} here would punch an alligator in the face to help a buddy, and that... that's really...\"  This is where the trooper broke down and started crying on your shoulder!  The party got blurry from there, but you think maybe at one point someone vowed to name their first, second and third born kids after you!\n\t*goto dubstep\n*elseif (troopcount > 12) and (dark > 35)\n\tYou get a card from the surviving troopers, thanking you for your leadership in bringing them all back alive!  They all signed it. You have it on your desk.\n\t*goto dubstep\n*elseif (troopcount > 12)\n\tYou get a card from the surviving troopers, thanking you for your leadership in bringing them all back alive!  They all signed it.  Rolling your eyes, you crumpled it in a fist and tossed it in the nearest trash chute.\n\t*goto dubstep\n*else\n\t*goto dubstep\n\n*label dubstep\n\n\n*if infamy \u003c 6\n\tWord gets around about your mission, and people steal glances at you when they think you aren't looking.  You develop a dark, brooding character that drives people away - just the way you like it.  Some people start calling you the Death Marine... You kind of like the sound of it! \n\n*if burn = \"yes\"\n\tAfter a few weeks, while training the orbital station Ajax, you head to a viewing room, sit down, and stare out at the stars.  There's nothing quite like the feeling you get when you know you kicked the bad guys in the teeth.\n\n*if puppy = \"keep\"\n\tYou bring the puppy you rescued back to the base and name him Buck, after one of your favorite books when you were a kid.  Buck quickly becomes Ajax station's mascot, and popular with the other marines.\n\t*set dark %+50\n\t*set technical + 2\n\n\t- Light increased\n\n*if puppy = \"given\"\n\t*set technical + 2\n\n*if dark \u003c 6\n\tA short time later, something wakes you up in the dead of night.  You lay there, listening, but the only sound you hear is your own breathing.  Frowning, you reach over and flick on a table lamp next to your bed.\n\n\tSurrounding your bed stand seven figures covered in thick, black robes.  The one standing in the center, at the foot of your bed, has blood red symbols running down the front of his robes.  \"${name},\" speaks the center figure.  His voice is cold and rotting, like a freshly opened grave.  \"Welcome to the brotherhood...\"\n\n\tThe figure lifts a hand from beneath his robes.  The gnarled white hand is clutching a twisted silver dagger with a large ruby set into the hilt.  \n\n\t\"Sit up,\" the voice grates.  \n\n\t\"Why?\" you ask, sitting up regardless of the defiance in your voice.\n\n\t\"We have been watching you.  Your heart is dark and free.  You understand the deception of the concepts of good and evil.  Like a wolf cub shedding her milk teeth, you have discarded your morality to rise above the mediocrity around you.  You are now one of us.  \n\t*if gender=\"male\"\n\t\tWelcome - you are now a member of the Shadow Brotherhood!  We will be watching that one day, you may be in a place to help this decrepit Empire throw off the shackles and lies of its so-called ethics!\"\n\n\t\tWith that, a silver dagger flashes, neatly slicing your left cheek.  You flinch back, pulling up your hand, but when you lower it the group is gone.\n\n\t\tYou find the silver dagger lying on your bed, still wet with your blood.\n\t\t*goto UUUU\n\t*else\n\t\tWelcome my sister - you are now a member of the Shadowed Brethren!  Don't let the name fool you - we have men and women, aliens and more within our ranks.  We will be watching that one day, you may be in a place to help this decrepit Empire throw off the shackles and lies of its so-called ethics!\"\n\n\t\tWith that, a silver dagger flashes, neatly slicing your left cheek.  You flinch back, pulling up your hand, but when you lower it the group is gone.\n\n\t\tYou find the silver dagger lying on your bed, still wet with your blood.\n\t\t*goto UUUU\n*else\n\t*goto UUUU\n*label UUUU\n\n*if dark > 94\n\tA short time later, you are summoned to the station's chapel to meet with Ajax station's chaplain.\n\n\tThe chapel is a tall room made of wood and stone, and lit with a multitude of candles.  In the center stands a large stained glass window.  The colored shards have been arranged to depict a gold and blue figure stabbing down with a long spear.  The spear is piercing a red, gold and black dragon.  The figure is wearing a crown, and beams of radiant light shine down from parted clouds above.\n\n\tBefore the window stands a massive golden altar.  Something sparkles on it.\n\n\tAs you enter, the chaplain stands from where he was kneeling before the window, and turns toward you.  He's a massive man wearing a mix of thick blue and gold priestly robes and intricately etched silver breastplate and shoulder armor.  The candle light dances in his eyes as he smiles down at you over his bushy white beard.\n\n\t\"${name},\" he intones with a deep, resonant voice, \"It pleases me to meet you.  The Emperor has heard of your good and noble deeds, and the heart that moved you to them.  I, and the Order, would like to offer you this...\"\n\n\tTurning to the altar he picks up a long golden knife etched with ceremonial runes and set with blue stones.\n\n\t\"It is the symbol of the order of the Light Marines - Marines who have proven themselves, and who walk in the Light.  \n\t*if gender = \"male\"\n\t\tWelcome, brother.\"  Smiling, you take the gift, whispering, \"Thank you!\"\n\t\t*goto IIII\n\t*else\n\t\tWelcome, sister.\"  Smiling, you take the gift, whispering, \"Thank you!\"\n\t\t*goto IIII\n*else\n\t*goto IIII\n\n*label IIII\n*if trooper_john=\"friends\"\n\tJohn finds you, and claps you on the back, welcoming you home, grinning.  He buys you a drink, and you tell him all about the mission.\n\t*if reason_to_join = \"friendship\"\n\t\t*set satisfied \"yes\"\n\t\tYou stop and smile at him, and John asks you what's up.  You tell him that the whole reason you joined the Mobile Armored Corps was to build friendships, and that it's funny that the best friend you've made would be a guy you met back in training!  John laughs with you, and the two of you enjoy the rest of the evening, drinking and talking.  You feel very satisfied with your life.\n\t\t*goto OOOO\n\t*else\n\t\t*goto OOOO\n*else\n\t*goto OOOO\n\n*label OOOO\n*if ((Eleanor = \"love\") and (dark > 40)) and (burn != \"yes\")\n\tA few days go by, and you go to spend some time on an observation deck, staring out at the stars.  As you sit there, the lady Eleanor finds you.  She sits next to you and whispers, \"Thank you.  For saving my father, for saving me.  All of us.  Thank you.\"\n\n\tYou take her hand, and she smiles at you, looking deep into your eyes.  You pull her close.  You sit together, and watch the stars.\n\t*if reason_to_join = \"love\"\n\t\t*set satisfied \"yes\"\n\t\t\t\n\t\tYou grin, your arm around Eleanor.  People might have thought you were a fool to look for love in the Mobile Armored Corps, but you've certainly found it!  You pull her close, feeling happy and fulfilled.\n\t\t*goto AAA\n\t*else\n\t\t*goto AAA\n\n*elseif ((Eleanor = \"friends\") and (dark > 40)) and (burn != \"yes\")\n\tA few days go by, and you go to spend some time on an observation deck, staring out at the stars.  As you sit there, the lady Eleanor finds you.  Smiling, she sits next to you, saying, \"Thank you, ${name}, for all you've done!\"  You smile back, and she asks you what it's like to be a woman in the Mobile Armored Corps.\n\n\tThe two of you chat for a long time.\n\t*if reason_to_join = \"friendship\"\n\t\t*set satisfied \"yes\"\n\t\tYou smile, and Eleanor asks you what's up?  You tell her that the whole reason you joined the Mobile Armored Corps was to build friendship, and you just thought it was funny that the best friend you make would be someone you rescued!\n\n\t\tShe laughs back, and the two of you talk for a long time about life, dreams, hopes...  Friendship, true friendship, is a rare thing in this universe, and you feel content that you've made a real friend in Eleanor. \n\t\t*goto AAA\n\t*else\n\t\t*goto AAA\n\n*else\n\t*goto LLL\n\n\n\n\n\n*label AAA\n*if enemy_trooper = \"yes\"\n\t\t\t\n\tBut then, out of nowhere, you get hit in the back of the head and knocked forward sprawling on the floor!  Picking yourself up you turn to see another marine glaring at you.  \"Remember me?!\" he growls.\n\n\tIt takes you a moment, but then it all comes back to you.  The recruit who you abused in training.  This is the guy.\n\n\t\"Wha...,\" you say, wiping blood from your mouth.  \"That was so long ago!\"\n\n\t\"Well you had it coming!\" he barks, and then stalks away.\n\n\tEleanor looks at you, shocked, and whispers, \"I should be going...\"  She slips away, ignoring you as you call to her...  And just like that, your new relationship is torn away from you.\n\t*set satisfied \"no\"\n\t*goto MMM\n*else\n\t*goto MMM\n\n*label LLL\n*if ((Eleanor = \"yes\") and (dark \u003c= 40)) and (burn != \"yes\")\n\tA few days go by, and you go to spend some time on an observation deck, staring out at the stars.  As you sit there, the lady Eleanor finds you.  She thanks you for saving her father.  You look at her, and she flinches at the darkness in your eyes.  She covers her mouth with her hand, whispers, \"I'm sorry,\" and hurries away.\n\t\n\tYou sit there, alone, and watch the stars.\n\t*goto MMM\n*else\n\t*goto MMM\n\n*label MMM\n*if ((Eleanor = \"yes\") and (burn = \"yes\"))\n\tA few days go by, and you go to spend some time on an observation deck, staring out at the stars.  As you sit there the lady Eleanor finds you.  You look at her, and she glares back at you.  You say nothing, so she stalks forward and slaps out, hard, across the face.  \"How could you?!\" she sobs.  \"You killed everyone!  You... MONSTER!\"  She covers her face, and runs away.\n\t\n\tYou turn back to look out at the stars, alone.\n\t*goto NNN\n*else\n\t*goto NNN\n\n*label NNN\n*if (reason_to_join = \"honor\") and (dark > 70)\n\tYour mind drifts, and you think back to why you became a marine in the first place.  For honor.  Thinking about this mission, you feel like you made the right choices, the moral choices, and that your family will be proud of you.  You smile, satisfied with your life as a Marine of the Mobile Armored Corps.\n\t*set satisfied \"yes\"\n\t*goto III\n*else\n\t*goto III\n\n*label III\n\n*if trooper_john=\"lovers\"\n\tLater, John finds you, and you tell him all about your mission.  He listens, caring, and glad that you are home safely.  He pulls you close, and time seems to slow as you embrace.\n\t*if reason_to_join = \"love\"\n\t\t*set satisfied \"yes\"\n\t\tYou think back to why you joined the Mobile Armored Corps, and laugh to think that you found love back in training!  But you do love this man, and he loves you.  Holding him, you feel satisfied with your life.\n\t\t*goto UUU\n\t*else\n\t\t*goto UUU\n\n*label UUU\n*if (reason_to_join = \"infamy\") and (infamy > 90)\n\t*set satisfied \"yes\"\n\tYour mind drifts, and you think back to why you became a marine in the first place.  For glory.  And now you have it!  People have been talking about your exploits since before you even got back to Ajax!  You grin, satisfied with your life.\n\t*goto YYY\n*else\n\t*goto YYY\n\n*label YYY\n*if (reason_to_join = \"evil\") and (dark \u003c 10)\n\t*set satisfied \"yes\"\n\tYour mind wanders to why you became a marine in the first place.  To have people fear you.  Well, you've certainly satisfied THAT desire!  What's the point in trying to do the \"right\" thing, when it doesn't get you anything?  A wicked smile creeps across your face, and you laugh.\n\t*goto QWQ\n*else\n\t*goto QWQ\n\n*label QWQ\n*if (gold=\"split\") and (reason_to_join = \"money\")\n\t*set satisfied \"yes\"\n\tAfter a few weeks, the captain of the Slipdagger contacts you, setting up a time and a place to deliver a \"package\".  Sure enough, true to his word, the captain delivers a huge storage box full of gold and jewels - your part of the treasure from Far Hope!  You laugh, gazing at all the money.  You think back to how you joined the corps to get rich, but you never thought it would be like THIS!  You grin, satisfied with how things have turned out.\n\t*goto ASA\n*else\n\t*goto ASA\n\n*label ASA\n*if (gold=\"mine\") and (reason_to_join = \"money\")\n\t*set satisfied \"yes\"\n\tAs soon as you can, you sign your resignation papers.  You'll be out of the Mobile Armored Corps in two weeks!  You buy a small moon off of Jupiter, and make plans to live the rest of your life there, enjoying your wealth.  You laugh to think that the whole reason you joined the Corps in the first place was to get rich, and that THIS is how it worked out!  What a crazy universe.  You feel quite satisfied with your life.\n\t*goto ZXZ\n*else\n\t*goto ZXZ\n\n*label ZXZ\n*if (gold=\"mine\") and (reason_to_join != \"money\")\n\tAs soon as you can, you sign your resignation papers.  You'll be out of the Mobile Armored Corps in two weeks!  You buy a small moon off of Jupiter, and make plans to live the rest of your life there, enjoying your wealth.\n\t*goto DCD\n*else\n\t*goto DCD\n\n*label DCD\n\n*page_break The End\nThanks for playing!  I hope you enjoyed Mobile Armored Marine:  Mission to Far Hope!\n\n*if satisfied=\"yes\"\n\tGreat job!  Not only did you complete your mission, but you satisfied the whole reason you joined the Mobile Armored Corps in the first place, which was ${reason_to_join}!\n\nYour final stats were:\n*stat_chart\n\ttext Guts\n\ttext Leadership\n\ttext Shooting\n\ttext Fighting\n\ttext Technical\n\ttext Stealth\n\nYour bionic implant was: ${bionic_1}\n\nThis was the final state of your suit of ${omega} Powered Armor:\n*stat_chart\n\tpercent Armor  \n\nYour final Glory rating (you started at 20):\n*stat_chart\n\tpercent infamy Glory\n\nAfter the mission, your final Light vs. Darkness was:\n*stat_chart\n\topposed_pair dark\n\t\tLight\n\t\tDark\n*if dark \u003c 6\n\tYou earned the Shadowed Brethren achievement!\n*if dark > 94\n\tYou earned the Light Marine achievement!\n*if infamy > 94\n\tYou earned the Medal of Honor!\n*if omega=\"Omega\"\n\tYou completed the mission using Omega elite power armor, which is close to impossible!!\n*if (dark \u003c 6) and (infamy > 90)\n\tYou managed to be supremely dark AND honorable!  Incredible!!\n\t*goto BBBB\n*else\n\t*goto BBBB\n\n*label BBBB\n\n\nPlay it again to get different endings!\n\n*if infamy \u003c 94\n\t- See if you can get enough glory to earn the Medal of Honor!\n\t*line_break\n\t*goto S\n*else\n\t*goto S\n\n*label S\n*if satisfied != \"yes\"\n\t- See if you can fulfill the reason you joined the Corps in the first place (for your game, it was ${reason_to_join})!\n\t*line_break \n\t*goto D\n*else\n\t*goto D\n*label D\n*if building = \"ruined\"\n\t- See if you can complete the mission WITHOUT demolishing the power station! \n\t*line_break \n\t*goto F\n*else\n\t*goto F\n*label F\n*if (Eleanor != \"love\")\n\t- See if you can get the lady Eleanor to fall in love with you (it's easier if you have a gift for her)! \n\t*line_break \n\t*goto G\n*else\n\t*goto G\n*label G\n*if troopcount \u003c 24\n\t- See if you can bring all the Shock Troopers home alive! \n\t*line_break \n\t*goto H\n*else\n\t*goto H\n*label H\n*if (dark > 5) and (dark \u003c 95)\n\t- See if you can earn the honor of being a Light Marine or a Shadowed Brethren! \n\t*line_break\n\t*goto J\n*else\n\t*goto J\n*label J\n*if omega != \"yes\"\n\t- See if you can complete the mission using the Omega variant powered armor! \n\t*line_break \n\t*goto K\n*else\n\t*goto K\n*label K\n*if name = \"Cheater\"\n\t- See if you can win without cheating!\n\t*goto L\n*else\n\t*goto L\n*label L\n\n*page_break\n\nStay tuned for the next episode of Mobile Armored Marine!\n\nPlease save your game below; you'll need your saved game to continue where you left off.\n\n*save_game episode2\n\nWe hope you've enjoyed playing [i]Mobile Armored Marine: Mission to Far Hope.[/i]\n\n*feedback\n\nThanks for playing!\n\n*ending\n", "mission_1_going_in": "*if deathcount > 99\n\t*goto rainbowdash\n\t\n*else\n\tBefore heading in, you flip open the Oracle on your Armor's right arm, and check your status, and the status of your team.  You can still register ${troopcount} of the Shock Troopers are alive, and currently fighting.  Two are wounded, but not critically.\n\n\tThe Slipdagger contacts you, and the ship's senior technician comes on the line.  He explains that they have a temporal tether realignment module ready to launch, if you want it.  The module would be launched to your location, and would re-calibrate your temporal tether to link to THIS time and place, instead of back on the ship before launch.  There are dangers, however...  The remote system isn't as exact, and... you will feel the effects.  Strongly.  Possibly permanently.  It might not be worth it for you to be pulled back to this moment - it might be better to risk being pulled all the way back to the mission launch.  Your Armor shows at ${armor} percent.  Only you know how well the mission has gone, sir, and whether or not this is a good idea.\"\n\n\tYou're also aware that NOT using this backup system would show off how confident you are!\n\n\tWhat do you do?\n\t*choice\n\t\t#I tell them to launch the module!\n\t\t\t*set deathcount 100\n\t\t\t*set barmor armor\n\t\t\t*set bbtroopcount troopcount\n\t\t\t*set bmorale morale\n\t\t\t\"Standby for tactical insertion in 3... 2... 1... firing.\"\n\n\t\t\tA shooting star appears, growling larger slowly, and then suddenly it hits, a deafening boom shakes through your feet, and dust fills the air.  As the debris settles, you see that about 100 yards away from the station, a new crater has formed.  Striding over to it, you look inside.  A scorched bulky missile is jammed into the ground.  With loud pops, metal plates are ejected from the sides, and the missile folds out into a confusion of metallic parts.\n\n\t\t\tThe technician comes on the line, and walks you through attaching the harness, and starting up the system.  It's not quite as dramatic as the charging of the tether was on the Slipdagger - after all, this is only updating the system.  But still, you feel an uncomfortable tingle run through your body, and are left with a slight feeling of wrongness.\n\n\t\t\tAnd with that, the tech tells you, \"You're ready to go, sir!\"\n\t\t\t*goto rainbowdash\n\n\t\t#I tell them that I don't need it!\n\t\t\t\"Very well sir!  Good luck!\"  \n\n\t\t\t*set infamy %+ 60\n\t\t\t- Glory increased greatly!\n\n\t\t\tNow you just hope that you don't end up looking stupid, and having your tether trigger...  But, on the other hand, it's not like they'll remember!\n\t\t\t*goto rainbowdash\n*label rainbowdash\n\nWhat would you like to do?\n*choice\n\t#I head into the complex, wasting no more time!\n\t\t*goto entry2\n\n\t#I take some time to scan the entry, and the complex\n\t\t*label scanners\n\t\tFlipping open your Oracle, you scan the entry.  There's something only a few yards in, and it reads as alive and colder than a human.  Do you want to spend more time scanning, or head in?\n\t\t*choice\n\t\t\t#I take the time to do a thorough scan\n\t\t\t\t*if troopcount \u003c 4\n\t\t\t\t\tAdjusting for a more detailed scan, you see that the life form nearby is definitely one of these lizard creatures.  It looks like there's a corridor on the other side of these doors that ends in a ramp or stair case, and the lizard is waiting at the base of those stairs.\n\n\t\t\t\t\tYou read the Shock Trooper's dropship on the roof, still powered and the pilot reads as healthy.  The rest of the Shock Troopers are either dead, or the signal is confused.\n\t\t\t\t\t*goto rainbowdash\n\n\t\t\t\t*else\n\t\t\t\t\t\n\t\t\t\t\tAdjusting for a more detailed scan, you see that the life form nearby is definitely one of these lizard creatures.  It looks like there's a corridor on the other side of these doors that ends in a ramp or stair case, and the lizard is waiting at the base of those stairs.\n\n\t\t\t\t\tYou read the Shock Trooper's dropship on the roof, still powered and the pilot reads as healthy and alert.  It says that ${troopcount} of the Shock Troopers are still alive, fighting near the center of the station.  Two of the troopers register as wounded, one critical.  \n\t\t\t\t\t*set troopcount-1\n\t\t\t\t\tThen, his vitals suddenly flat line.  ${troopcount} Troopers remain.\n\n\t\t\t\t\tThere are several other confusing readings as well.  Scattered about are moving heat sources, several too cold to be human.  As you sweep the station, you read a human signature in the western wing of the complex.  It's the only human signature you read in the entire complex, besides the Shock Troopers.  Strange.  Where did all the colonists go?!\n\n\t\t\t\t\tYou also read a large energy spike in the western wing of the complex.  The Oracle reads it as mechanical, plasma-based.  The station doesn't run on plasma, so that's likely not something that's supposed to be here.\n\t\t\t\n\t\t\t\t\t*if building = \"ruined\"\n\t\t\t\t\t\tThe station itself reads as severely damaged.  The back-up generator is currently providing some power, but it will run down within a few hours.  It looks like the station's core is permanently off-line, and several fuel stores around the complex have ruptured.  \n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto rainbowdash\n\t\t\t\t\t*else\n\t\t\t\t\t\tThe station reads as online, and functioning.  The station's core is near where the Shock Troopers are fighting.  You hope they know not to damage anything too vital!\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto rainbowdash\n\t\t\t#I head into the power station\n\t\t\t\t*goto entry2\n\t\t\t#I do field repairs on my armor\n\t\t\t\t*goto fizzlepop\n\n\t#I stop and take some time to do some field repairs on my armor\n\t\t*label fizzlepop\n\t\t*if omega = \"Omega\"\n\t\t\t*if technical > 12\n\t\t\t\t*set armor + (technical + technical)\n\t\t\t\t*if armor > 50\n\t\t\t\t\t*set armor 50\n\t\t\t\t\t*goto fixit\n\t\t\t\t*else\n\t\t\t\t\t*goto fixit\n\t\t\t*else \n\t\t\t\t*set armor + technical\n\t\t\t\t*if armor > 50\n\t\t\t\t\t*set armor 50\n\t\t\t\t\t*goto fixit\n\t\t\t\t*else\n\t\t\t\t\t*goto fixit\n\t\t*if omega = \"Beta\"\n\t\t\t*if technical > 12\n\t\t\t\t*set armor + (technical + technical)\n\t\t\t\t*if armor > 60\n\t\t\t\t\t*set armor 60\n\t\t\t\t\t*goto fixit\n\t\t\t\t*else\n\t\t\t\t\t*goto fixit\n\t\t\t*else \n\t\t\t\t*set armor + technical\n\t\t\t\t*if armor > 60\n\t\t\t\t\t*set armor 60\n\t\t\t\t\t*goto fixit\n\t\t\t\t*else\n\t\t\t\t\t*goto fixit\n\t\t*if omega = \"Gama\"\n\t\t\t*if technical > 12\n\t\t\t\t*set armor + (technical + technical)\n\t\t\t\t*if armor > 80\n\t\t\t\t\t*set armor 80\n\t\t\t\t\t*goto fixit\n\t\t\t\t*else\n\t\t\t\t\t*goto fixit\n\t\t\t*else \n\t\t\t\t*set armor + technical\n\t\t\t\t*if armor > 80\n\t\t\t\t\t*set armor 80\n\t\t\t\t\t*goto fixit\n\t\t\t\t*else\n\t\t\t\t\t*goto fixit\n\t\t*else\n\t\t\t*if technical > 12\n\t\t\t\t*set armor + (technical + technical)\n\t\t\t\t*if armor > 100\n\t\t\t\t\t*set armor 100\n\t\t\t\t\t*goto fixit\n\t\t\t\t*else\n\t\t\t\t\t*goto fixit\n\t\t\t*else \n\t\t\t\t*set armor + technical\n\t\t\t\t*if armor > 100\n\t\t\t\t\t*set armor 100\n\t\t\t\t\t*goto fixit\n\t\t\t\t*else\n\t\t\t\t\t*label fixit\n\t\t\t\t\t*if troopcount \u003c2\n\t\t\t\t\t\t*set troopcount 0\n\n\t\t\t\t\t\tYou open the Oracle on your arm, and see that your suit is now at ${armor} percent capacity.  You flick out your Armor's wrist multi-tool, and get to work on the damage.  You can hear the sounds of fighting inside the building, so you don't spend TOO much time repairing the suit, but after fifteen minutes or so, you're very happy with the results!  Your technical training really came in handy!\n\t\t\t\t\n\t\t\t\t\t\t*page_break\n\n\t\t\t\t\t\tYou open the Oracle on your arm, and see that your suit is now at ${armor} percent capacity.  Good.  You also notice that the place has grown ominously quiet.  Looking at your Oracle, you see that none of the Shock Troopers are alive. \n\t\t\t\t\t\t*goto ookami\n\t\t\t\t\t*else\n\t\t\t\t\t\t*set troopcount-2\n\n\t\t\t\t\t\tYou open the Oracle on your arm, and see that your suit is now at ${armor} percent capacity.  You flick out your Armor's wrist multi-tool, and get to work on the damage.  You can hear the sounds of fighting inside the building, so you don't spend TOO much time repairing the suit, but after fifteen minutes or so, you're very happy with the results!  Your technical training really came in handy!\n\t\t\t\t\n\t\t\t\t\t\t*page_break\n\n\t\t\t\t\t\tYou open the Oracle on your arm, and see that your suit is now at ${armor} percent capacity.  Good.  You also notice that ${troopcount} of the Shock Troopers are still alive.  It looks like two more bought it.\n\t\t\t\t\t\t*label ookami\n \n\n\t\t\t\t\t\tWould you like to:\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Scan the entry way, and the complex\n\t\t\t\t\t\t\t\t*goto scanners\n\t\t\t\t\t\t\t#Hurry into the complex\n\t\t\t\t\t\t\t\t*goto entry2\n\t\t\t\t\t\t\t#Spend even more time doing field repairs on your Armor\n\t\t\t\t\t\t\t\t*if omega = \"Omega\"\n\t\t\t\t\t\t\t\t\t*if technical > 12\n\t\t\t\t\t\t\t\t\t\t*set armor + (technical + technical)\n\t\t\t\t\t\t\t\t\t\t*if armor > 50\n\t\t\t\t\t\t\t\t\t\t\t*set armor 50\n\t\t\t\t\t\t\t\t\t\t\t*goto fixitagain\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*goto fixitagain\n\t\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t\t*set armor + technical\n\t\t\t\t\t\t\t\t\t\t*if armor > 50\n\t\t\t\t\t\t\t\t\t\t\t*set armor 50\n\t\t\t\t\t\t\t\t\t\t\t*goto fixitagain\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*goto fixitagain\n\n\t\t\t\t\t\t\t\t*if omega = \"Beta\"\n\t\t\t\t\t\t\t\t\t*if technical > 12\n\t\t\t\t\t\t\t\t\t\t*set armor + (technical + technical)\n\t\t\t\t\t\t\t\t\t\t*if armor > 60\n\t\t\t\t\t\t\t\t\t\t\t*set armor 60\n\t\t\t\t\t\t\t\t\t\t\t*goto fixitagain\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*goto fixitagain\n\n\t\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t\t*set armor + technical\n\t\t\t\t\t\t\t\t\t\t*if armor > 60\n\t\t\t\t\t\t\t\t\t\t\t*set armor 60\n\t\t\t\t\t\t\t\t\t\t\t*goto fixitagain\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*goto fixitagain\n\n\t\t\t\t\t\t\t\t*if omega = \"Gama\"\n\t\t\t\t\t\t\t\t\t*if technical > 12\n\t\t\t\t\t\t\t\t\t\t*set armor + (technical + technical)\n\t\t\t\t\t\t\t\t\t\t*if armor > 80\n\t\t\t\t\t\t\t\t\t\t\t*set armor 80\n\t\t\t\t\t\t\t\t\t\t\t*goto fixitagain\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*goto fixitagain\n\n\t\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t\t*set armor + technical\n\t\t\t\t\t\t\t\t\t\t*if armor > 80\n\t\t\t\t\t\t\t\t\t\t\t*set armor 80\n\t\t\t\t\t\t\t\t\t\t\t*goto fixitagain\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*goto fixitagain\n\t\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*if technical > 12\n\t\t\t\t\t\t\t\t\t\t*set armor + (technical + technical)\n\t\t\t\t\t\t\t\t\t\t*if armor > 100\n\t\t\t\t\t\t\t\t\t\t\t*set armor 100\n\t\t\t\t\t\t\t\t\t\t\t*goto fixitagain\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*goto fixitagain\n\n\t\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t\t*set armor + technical\n\t\t\t\t\t\t\t\t\t\t*if armor > 100\n\t\t\t\t\t\t\t\t\t\t\t*set armor 100\n\t\t\t\t\t\t\t\t\t\t\t*goto fixitagain\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*label fixitagain\n\t\t\t\t\t\t\t\t\t\t\t*set troopcount-3\n\t\t\t\t\t\t\t\t\t\t\t*set dark %-33\n\t\t\t\t\t\t\t\t\t\t\tYou flick your multi-tool back out, and get to work.  As you work on your suit, your Oracle reports several more troopers dying.  You ignore it, focusing on your Armor.\n\n\t\t\t\t\t\t\t\t\t\t\t- Darkness grows within you...\n\n\t\t\t\t\t\t\t\t\t\t\tAfter working for about half an hour, you manage to get your suit up to ${armor} percent efficiency.  Unfortunately, you are down to ${troopcount} soldiers still alive in the squad.  Better hurry if you don't want to miss the party.\n\t\t\t\t\t\t\t\t\t\t\t*goto entry2\n\n*label entry2\n\nStepping up to the door, you go inside.  The entrance opens into a long corridor, faintly lit by one dimly flickering light bulb.  The corridor ends in a short flight of stairs.  How do you proceed?\n*choice\n\t#I enter slowly and stealthily\n\t\tYou creep down the stairs slowly, step by step, pistol ready.  At the bottom of the stairs you see one of the reptile creatures ahead, holding what looks like a large machete and a pistol of some kind.  The thing is looking at its feet, and scratching at something on the ground.  How do you want to deal with it?\n\t\t*choice\n\t\t\t#I silently glide up to it, and crack it over the head with my pistol!\n\t\t\t\t*if stealth > 11\n\t\t\t\t\tYou slide up behind it, and silently crack its skull with the butt of your pistol.  As it slumps to the ground you catch it, and carefully set the body to the floor without making a sound.\n\t\t\t\t\t*goto deeper\n\t\t\t\t*elseif stealth > 9\n\t\t\t\t\tYou creep up to the creature slowly, but just as you are bringing down your pistol, it turns and screeches.  You hit its shoulder instead, but still, it looks like you knocked its shoulder out of socket with your incredible strength!\n\n\t\t\t\t\tThe lizard whips around into a crouch, and slashes at your with its barbed tail.  The tail whips around your ankle, and the lizard jerks back, knocking you to the floor!  In moments, the lizard is on you, stabbing its shimmering blue machete into your chest plate.\n\t\t\t\t\t\n\t\t\t\t\t*set armor-5\n\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t*else\t\n\t\t\t\t\t\t- Armor damaged, down to ${armor} percent! \n\t\t\t\n\t\t\t\t\t\tSparks shower the area, but the stab didn't go too deep - the lizard can only use one arm.  You backhand the alien, and its body smacks into the corridor wall with a sick wet slap.  It leaves a greasy yellow stain on the wall, and slumps to the floor, lifeless.\n\t\t\t\t\t\t*goto deeper\n\t\t\t\t\t\t\n\t\t\t\t*else\n\t\t\t\t\t\"Silently gliding\" is a little beyond your abilities!  As you heavily stomp down the stairs, it hears you and spins around.  Tossing stealth to the wind (like you did during training), you give the creature a rude gesture, and call it a few choice names.\n\n\t\t\t\t\t*set infamy %+ (guts + guts)\n\t\t\t\t\t- Glory increased\n\n\t\t\t\t\tThe monster opens its wide, toothy maw and hisses, firing a bolt from its blast pistol.  The shot nails you right in the chest, knocking you backwards.\n\t\t\t\t\t*set armor-10\n\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t*else\n\t\t\t\t\t\t\n\t\t\t\t\t\t- Armor damaged, down to ${armor} percent! \n\t\t\t\t\t\t*goto fight_it\n\t\t\t#I blast it in the back with my pistol!\n\t\t\t\t*if shooting > 10\n\t\t\t\t\tYou barely even have to aim - Your well trained firing reflexes kick in, and you drill the lizard with a blast through the chest!  It crumples into a steaming heap on the floor.\n\t\t\t\t\t*goto deeper\n\t\t\t\t*else\n\t\t\t\t\tYour shot goes a little wide, blasting a hole in the wall next to the monster.  It spins, and the machete its holding begins to glow blue.  It hisses and charges you.\n\t\t\t\t\t*if guts > 11\n\n\t\t\t\t\t\tYou might not have trained much as a marksman, but you've certainly pushed yourself enough to not be intimidated by the likes of this little puke.  You stand your ground, take aim, and blast it through the chest.  It dies, wide eyed with shock.\n\t\t\t\t\t\t*goto deeper\n\t\t\t\t\t*else\n\n\t\t\t\t\t\tTerror grips you.  The monster's charge, its flashing fangs and hissing growl, are all too much for you.  You freeze.\n\n\t\t\t\t\t\tYou are snapped out of it when the lizard's glowing blue machete digs deep into your shoulder, sending sparks flying.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t*set armor-12\n\t\t\t\t\t\t*if armor \u003c 1\n\t\t\t\t\t\t\t*goto_scene Combat_Death\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t- Armor damaged, down to ${armor} percent!\n\t\t\t\t\n\t\t\t\t\t\t\tAs the machete strikes, however, you grip the lizard's arms, and give them a sharp twist, breaking both of them.  The reptile cries out, but you silence it with your armored fist in its face.  It slides to the floor, dead, and you wrench the foul alien machete from your shoulder and toss it to the floor.\n\n\t\t\t\t\t\t\t*set infamy %+ (guts + guts)\n\t\t\t\t\t\t\t- Glory increased \n\t\t\t\t\t\t\t*goto deeper\n\t\t\t\t\t\t\n\t\t\t#I wait for it to move along.\n\t\t\t\t*set troopcount-3\n\t\t\t\t*set morale %-20\n\t\t\t\t*if troopcount > 0\n\t\t\t\t\tEventually, the lizard does, but you can hear more explosions and the sounds of fighting.  Checking your Oracle, you can see that ${troopcount} of the Shock Troopers are still alive.\n\t\t\t\t\t*goto deeper\n\t\t\t\t*else\n\t\t\t\t\tEventually, the lizard does.  The power station is silent.  Checking your Oracle, you see that all of the Shock Troopers are dead.\n\t\t\t\t\t*goto deeper\n\n\t#I charge in, blast pistol out, shoulder cannon ready!\n\t\t*set guts+1\n\t\t- Guts increased\n\t\t*set infamy%+25\n\t\t*line_break\n\t\t- Glory increased\n\t\t\n\t\tAt the base of the stairs, you see one of the lizard creatures.\n\t\t*label kerpow\n\t\tIt cuts loose with several blaster pistol bolts, ripping into your shoulders, chest and stomach.  You stagger backwards under the hail of blasts, and fall to one knee.  Warning lights flash in your display as layers of metal are ripped from your Armor!\n\t\t*set armor-15\n\t\t*if armor \u003c 1\n\t\t\t*goto_scene Combat_Death\n\n\t\t*else\n\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\tYou recover your feet.\n\t\t\t*goto fight_it \n\n\n\t#I roll a grenade down the staircase first, then walk down after it goes off, holding my pistol ready.\n\t\tYou casually toss a grenade in, wait for the muffled WHUMP, and then step down through the smoke.  You see a wounded lizard creature, gripping its side as yellow slime oozes out of a large gash.  It snarls at you, and raises a glowing blue machete, as if to attack you, though it can barely stay on its feet.  What do you do?\n\n\t\t*choice\n\t\t\t#I blast it!\n\t\t\t\tIt's slow and wounded, and an easy target.  You drill it with a blast through the chest.  It flops to the floor, convulses once, and then is still.\n\t\t\t\t*goto deeper\n\t\t\t\t\n\t\t\t#I punch it!\t\t\t\t\n\t\t\t\tStepping forward, you easily side step a swing from the lizard's machete.  Winding back your fist, you swing as hard as you can at the creature's jaw.  Your fist crashes into its face, sending teeth and yellow slime flying.  The force knocks the lizard's limp dead body back across the hall, splattering it on the wall.\n\t\t\t\t*goto deeper\n\t\t\t\t\t\t\n*label fight_it\nYou notice the machete its carrying has a faint blue glow to it, as is lunges and swings the weapon at your head!  What do you do?\n*choice\n\t#I blast it!\n\t\t*if shooting > 12\n\t\t\tYour well trained firing reflexes kick in, and you drill the lizard with a blast through the chest!  It crumples into a steaming heap on the floor, gasping, switching, and then lying still.\n\t\t\t*goto deeper\n\t\t*elseif shooting >10\n\t\t\tYou might be a good shot, but you just aren't fast enough.  Before you can get your pistol up, the monster's blue shimmering machete slices into your chest plate.\n\t\t\t*set armor-5\n\t\t\t*if armor \u003c 1\n\t\t\t\t*goto_scene Combat_Death\n\t\t\t*else\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\tYou glance down at the blade, and grip it with your free hand.  The lizard looks up at you, stunned, and tries to wrench the machete free.  With a quick twist, you snap the blade in two.  Then you yank the broken end of the weapon out of your chest, and with a quick jab, stab it into the lizard's left eye.  The creature's face freezes with its toothy maw open wide.  The alien's body stiffens, and it falls backwards woodenly.\n\n\t\t\t\t*goto deeper \n\t\t*else\n\t\t\tYour reflexes and shooting skills were never really your focus, were they?  That comes into play now, as you slowly, leadenly, raise your pistol.  Before you have a chance, the monster's machete is digging into the side of your helmet!  Your vision is blurred as the force knocks you sideways.\n\t\t\t*set armor-8\n\t\t\t*if armor \u003c 1\n\t\t\t\t*goto_scene Combat_Death\n\t\t\t*else\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\tYou spin to lessen the damage, and lash out with a quick punch at the creature.  The augmented strength of your Armor sends the lizard smashing into the ceiling.  It lands back on the floor with a wet thud, leaving yellow splatter marks on the ceiling and the floor.\n\n\t\t\t\t*set infamy %+ (guts + guts)\n\t\t\t\t- Glory increased\n\n\t\t\t\t*goto deeper \n\t#I punch it!\n\t\t*label punch_it\n\t\tWinding back your fist, you swing as hard as you can at the creature's face, while trying to slide to the side to avoid it's now-glowing machete.\n\t\t*if fighting > 12\n\t\t\tWith your hours of skill and training, not to mention your augmented strength and speed, you easily dodge the attack.  Smiling, your fist crashes into the alien's alligator face, sending teeth and yellow slime flying.  The force knocks the lizard's limp dead body back across the hall, splattering it on the wall.  With a flick of your wrist, you shake yellow blood and gore off of your armored gauntlet.\n\t\t\t*goto deeper\n\t\t*elseif fighting > 10\n\t\t\tYou lash out at the thing, but it's faster.  The lizard's glowing blue machete digs deep into your shoulder, sending sparks flying.  \n\t\t\t*set armor-4\n\t\t\t*if armor \u003c 1\n\t\t\t\t*goto_scene Combat_Death\n\t\t\t*else\n\t\t\t\t\n\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\tAs the machete strikes, however, you grip the lizard's arms, and give them a sharp twist, breaking both of them.  The reptile cries out, but you silence it with your armored fist buried in its face.  It slides to the floor, dead, and you wrench the foul alien machete from your shoulder.  Snapping it in two, you toss it to the floor.\n\n\t\t\t\t*set infamy %+ (guts + guts)\n\t\t\t\t- Glory increased\n\t\t\t\t*goto deeper\n\t\t*else\n\t\t\tYou try to punch it, but your fist isn't even half way to the lizard's face when the glowing machete slams into the side of your helmet!  Your vision blurs, and for a moment you remember your 6th birthday, when you and a boy got into a fight, and he punched you in the side of the head.  Your senses are blurred, and for a moment you aren't sure where you are.  All you know is that it feels like you're falling...\n\t\t\t*set armor-10\n\t\t\t*if armor \u003c 1\n\t\t\t\t*goto_scene Combat_Death\n\t\t\t*else\n\t\t\t\t\n\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\tAs you slam into the floor, two things come immediately to mind.  First, that the boy's name was Mark, and that he was your best friend.  Second, that that information is completely useless, and that right now you are fighting for your life!\n\n\t\t\t\tYour training kicks in, and instinctively you roll to the side and up into a crouch.  Looking up, you see a lizard creature bearing down on you with a huge shimmering blue machete.  Without thinking, you launch a missile from your shoulder cannon.\n\n\t\t\t\tFor a moment, the hallway is lit with blinding light, and filled with flames.  As the smoke clears, you see pieces of burn green flesh scattered about, mixed with chunks of debris from the hallway walls and ceiling.  Standing up slowly, you brush yellow gore and dirt from your chest.\n\n\t\t\t\t*set infamy %+ (guts + (guts + guts))\n\t\t\t\t- Glory increased\n\t\t\t\t*goto deeper\n\n\t\t\t\t\t\t\n*label deeper\n*page_break\nYou step over to the place the lizard was standing, and see ragged toy doll lying on the floor.  It's the kind of doll that a child would carry, and by the looks of it, the lizard was chewing on it.\n\nStepping over to the body of the lizard you just killed, you flip open your oracle and give the creature a scan.  The Oracle identifies it as \"Saurian\", but that's simply a broad classification for reptilian aliens.  What do you do now?\n*choice\n\t#I call up the Slipdagger for more details\n\t\t\"Sir,\" the ship's medical officer says, \"The scans you sent us are of an un-registered alien race.  It's definitely Sauroid, and looks carnivorous by those teeth.  The hunched forwards posture and the large legs imply that it would be fast on the ground.  What sorts of weapons and tools do they use?\"\n\n\t\tYou give the machete a scan, and scan the blaster the lizard was holding.\n\n\t\t\"Give us a detailed scan of those spikes on the tail,\" the medical officer says.  \"Those are covered with the same silvery metal that the machete is made of.  The material is highly reactive, possibly to bio electricity.  In your hands that machete wouldn't be any more lethal than a regular boot knife.\n\n\t\t\"The blaster technology looks pretty standard.  They focus more heavily on the green light spectrum than our blasters do, but that doesn't mean much.\n\n\t\t\"One more thing,\" he adds.  \"The creature's cells seem to be highly regenerative.  Not that the lizard is still alive - it's certainly dead.  But, if you ripped off its arm, I have a suspicion that it could grow a new one, right as rain.  In fact, the thing you just killed registers a very confusing age range - it could be as much as over 200 standard years old.  Maybe even more.  Remarkable.\"\n\n\t\t*page_break\n\t\t*goto deeper2\n\t#I keep moving\n\t\t*goto deeper2\n\n*label deeper2\nYou stalk deeper into the building, keeping an eye on your scanner for more aliens, heading towards the Shock Troopers.\n\nRounding a corner, you come face to face with a lizard alien wearing what looks like a silver space suit.  It has reinforced armor on the shoulders and stomach, and a long helmet built for its triangle head.  The suit must have blocked the creature from your scans!\n\nIt's holding a very large silver machete, more of a broadsword, and the sword is glowing blue.\n\nThe lizard was ready for you, and lunges forward, stabbing at your chest.  What do you do?\n*choice\n\t#I dive out of the way!\n\t\t*if fighting > 12\n\t\t\tThe sword nicks your side as you dodge out of the way.\n\t\t\t*set armor-1\n\t\t\t*if armor \u003c 1\n\t\t\t\t*goto_scene Combat_Death\n\t\t\t*else\t\n\n\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\t*goto dive  \n\t\t*elseif fighting > 10\n\t\t\tYou dive back a little too slowly, and the sword bites into your side, tearing at your Armor.  Sparks fly, and your helmet's screen flickers slightly.\n\t\t\t*set armor-6\n\t\t\t*if armor \u003c 1\n\t\t\t\t*goto_scene Combat_Death\t\n\t\t\t*else\n\t\t\t\t- Armor damaged, down to ${armor} percent!\n\t\t\t\t*goto dive\n\t\t*else\n\t\t\tYou tense to move, but the lizard is a lot faster than you.  The blade stabs into your chest, driving deep.  A blast of sparks shower the lizard, and it twists the sword deeper into your chest.  Warning lights flash in your display and your Armor spasms for a moment.\n\t\t\t*set armor-13\n\t\t\t*if armor \u003c 1\n\t\t\t\t*goto_scene Combat_Death\t\n\t\t\t*else\n\t\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\t\tYour Armor's systems recover, and you shove the lizard away from you.  It wrenches the sword out and backs up.  Through its face mask it gives you a toothy grin.\n\t\t\t\t*goto dive\n\n\t#I take the hit, and punch back at the same time!\n\t\tStanding strong, you hurl your fist at the lizard's crocodile face.  The glowing broadsword stabs into your chest right as your fist connects with the alien's face.\n\n\t\tThe sword sinks deep into your Armor, and sparks explode from the impact.  You sink to your knees with the sword jammed into your chest.\n\n\t\t*set armor-19\n\t\t*if armor \u003c 1\n\t\t\t*goto_scene Combat_Death\n\t\t*else\n\t\t\t- Armor damaged, down to ${armor} percent!\n\n\t\t\tComing to your senses, you stagger back to your feet.  Looking around the hallway, you see the body of the lizard some 20 yards away.  As you stagger over to it, you see that the reptile's head is simply gone.\n\n\t\t\tLooking down, you finally notice that the broadsword is still sticking out of your chest.  Gripping the silvery blade, you wrench it free.  You spin it once, almost lazily, and then bury the sword into the body of the lizard at your feet.  The blade isn't glowing anymore, and the sword hilt snaps off in your hand, leaving the wide blade jammed into the body like a monument to your battle.\n\n\t\t\t*set infamy %+ (guts + (guts + guts))\n\t\t\t- Glory increased\n\t\t\t*goto nexties\n\n\t#I try to side-step the stab, and disarm the lizard\n\t\t*if fighting > 12\n\t\t\tWith one fluid motion you slide to the side and let the broadsword slice past you while st
