 of how the air feels right before a thunderstorm.\n\n*if (work_with_party = 1)\n    After a few minutes, your sharp eyes notice something moving in the forest. Suddenly, a deer pops up from behind a tree, and saunters dangerously close to the spot on the trail that Rexa is targeting. Should you do something?\n    *choice\n        #Yell at the deer\n            You make a sharp call to get the deer's attention. The good news is that the deer is startled and runs off. The bad news is that Rexa is similarly startled. \n            \n            \"What are you doing? I told you I was not to be interrupted,\" she says, clearly interrupted.\n            \n            You apologize and explain about the deer. Maybe she can try the spell again?\n            \n            \"There's no time,\" she says, still perturbed. \"I'm just going to try and finish the spell — [b]do not[/b] interrupt me this time.\" She starts chanting again.\n            \n            *set rexa_spell_weakened 1\n            *goto rexa_spell_done\n        #Throw something at the deer\n            You look around and find a small pebble. Quickly, you throw it in the direction of the deer. You miss, but you come close enough that the deer is startled, and runs away. Crisis averted.\n            *goto rexa_spell_done\n        #Leave the deer alone\n            Probably best not to do anything that would disturb Rexa. Besides, what harm could a deer do?\n            \n            As you think this, the deer cautiously steps [i]into[/i] the target area. There's a brief shimmer of light around the deer, and it jumps back. It shakes its head and runs off.\n            \n            You check and Rexa is still chanting. Maybe things will be fine?\n            *set rexa_spell_weakened 1\n            *goto rexa_spell_done\n*else\n    As ${rexa_name} continues chanting, you notice the spot on the trail starts to shimmer. It starts to look almost like a very large bubble covering the trail. You're not far from the spot, maybe it's worth further investigation?\n    *choice\n        #Walk up to the bubble and put your hand into it\n            You approach the bubble (first making sure the woman still has her eyes closed) and reach out and touch the bubble.\n            \n            Immediately, your entire arm receives a jolt of some energy that leaves you feeling numb. You turn back to hide but find yourself having trouble moving. Each step is an effort and you feel like you're walking through a swamp. Then, things start to go dark.\n            \n            \"Who's there?\" you hear the woman say, right before you pass out.\n            \n            You wake up and find yourself tied to a tree. Based on the shadows of the trees, it seems to be late afternoon. Several soldiers from the palace guard are looking right at you. \n            \n            \"Looks like we found one of the thieves that stole the gold,\" one soldier says. Looks like the Thieves Guild is going to have to wait for your dues, at least until after you get out of prison.\n            \n            [b]THE END[/b]\n            *goto fatal_end\n        #Throw a rock through the bubble\n            You pick up a small rock and chuck it into the bubble. The rock passes right through the bubble and the bubble seems unaffected.\n            *goto rexa_spell_done_no_party\n        #Throw an acorn through the bubble\n            You spot an acorn on the ground and toss it into the bubble. The acorn passes through the bubble, and comes to a rest right outside it. Out of nowhere, a bird (a thrush, maybe) swoops down to grab the acorn, and passes into the bubble.\n            \n            There's a brief shimmer of light around the bird, and it tumbles to the ground. Slightly stunned, it manages to fly back out of the bubble and back into the woods.\n            *set rexa_spell_weakened 1\n            *goto rexa_spell_done_no_party\n        #Don't disturb the bubble\n            You've never had good luck with magic, and now is not the time to test this. Besides, it seems like the bubble is setting some sort of magic trap, and if you interact with it, you could set it off. \n            *goto rexa_spell_done_no_party    \n\n*label rexa_spell_done_no_party\n\nThe bubble eventually becomes more and more transparent and disappears.\n\n*label rexa_spell_done\n\nAfter several minutes, ${rexa_name} stops chanting. \"That will have to do,\" she says.\n\n*if (work_with_party = 1)\n\n    As you and Rexa walk back, you consider finding out more about this mysterious woman in red.\n\n    *choice \n        # Ask Rexa about how she got involved with all of this\n            You inquire about Rexa's history with the group.\n\n            \"Rather nosy, aren't you?\" Rexa says. \n\n            You confess you were just wondering how such a powerful mage would be drawn to getting involved with carriage heists.\n\n            \"'Powerful mage', I see you're not above using flattery. Well, if you must know, Aldon and I both used to work for the King of the Silver Plains. I see from your expression you've never heard of him, which isn't a surprise. The Silver Plains are mostly desert now, after the Great Upheaval, but there was a time it was a rich land filled with resources and adventure.\"\n\n            \"The King had a history of going on adventures himself, and he discovered me in a village practicing peasant magic. The sort of magic farmers rely on to improve their meager harvest. The King took me under his wing and trained me in high court magic. At the same time, he recruited a number of promising swordsmen, including Aldon.\"\n\n            \"We went on many an adventure, but I won't bore you with the details now. Eventually, as you know, the Great Upheaval happened, and the kingdom was all but destroyed. Those who worked for the King were not welcome under the new rule, so we were all made to turn in our possessions and banished from the Silver Plains. Aldon and I opted to stick together and have been trying to survive on jobs like this ever since.\"\n\n            \"I should have warned you this wasn't a happy story, but you wanted to know, and now you do. Let's head back and see what the others are up to.\"\n\n            *goto with_party_ready\n\n        # Don't bother Rexa, it's not really the time\n            Maybe once the gold has been acquired and the heist is over, perhaps there will be a time to get to know everyone. For now, it's best for everyone to focus on the job at hand.\n            *goto with_party_ready\n\n*goto with_party_ready\n\n*label with_party_tiff_and_gorob\n\nYou watch ${tiff_name} and ${gorob_name} step off the trail and examine several trees.\n\nAfter reaching a particular tree, ${gorob_name} says \"What about this one?\"\n\n\"Too short,\" ${tiff_name} says. \"We need to stretch the rope high enough to catch a rider on a horse, and not any higher.\"\n\n*comment All choices will partially work, but let some soldiers through. If player has brought rope and offers it, then solution will block all soldiers from this area\n\n*if work_with_party = 1\n  They both turn in your direction. \"What's your expert opinion, ${player_name}?\" Tiff asks.\n  *choice \n    #Tell them rider-height should work\n      Tiff nods. \"Gorob, see if you can find a taller tree.\"\n      *goto tiff_and_gorob_done_setting_trap\n    #Suggest tying the rope lower to the ground\n      \"What?\" Tiff says. \"How will that knock the soldiers down?\"\n\n      \"It could work Tiff,\" Gorob says. \"We just trip the horses instead of the riders.\"\n      *goto tiff_and_gorob_done_setting_trap\n    *if (brought_rope = 1) #Offer your rope and suggest tying multiple lines\n      \"Oh ho, the thief brought a rope too!\" Gorob exclaims, surprised.\n      \n      Tiff smiles. \"You see Gorob? And you thought bringing a thief wasn't a good idea.\"\n      \n      *set rope_trap_strengthened 1      \n      *set brought_rope 0\n      *goto tiff_and_gorob_done_setting_trap\n            \n*label tiff_and_gorob_done_setting_trap      \n\n*if rope_trap_strengthened = 1\n    Using your rope, Tiff and Gorob place two rope lines across the road at different spots. \"That should definitely do the trick,\" Gorob remarks.\n    *goto tiff_and_gorob_chat\n*else\n    After a bit of back and forth, a spot is picked and a rope is tied across the road.  \"Let's hope that works,\" ${gorob_name} says.\n    *goto tiff_and_gorob_chat\n\n*label tiff_and_gorob_chat\n\n*if (work_with_party = 1)\n    You consider if now might be a good time to find out more about these two.\n\n    *choice\n        # Ask Tiff and Gorob how they joined this party of adventurers\n            \"Well now, getting to know one another right before we rob a carriage. That's not some sort of thief tactic, is it?\" Gorob asks.\n\n            Tiff laughs. \"Don't worry about Gorob. He doesn't trust his own mother. He comes from the northern Frostlands, where they can't even trust the weather.\"\n\n            \"Oh, we can trust it, just trust it to be cold, is all,\" Gorob responds. \"Tiff is right though, I'm from a barbarian tribe up in the Frostlands, but got tired of hunting dire wolves all the time, so I figured I'd try my luck being a hired axe. I've bounced around from town to town, met Aldon when he needed some extra muscle to clear out a nest of wights. Nasty business that one.\"\n\n            \"But it paid ok,\" Tiff adds. \"I was on that job too, maybe my second time working with Aldon. I went through militia training at Lightspire, but when it came time to sign on, they told me they didn't have any openings. Can you imagine, no openings in a militia? So I left and became a sell-sword. Got a couple small guard detail jobs, but really couldn't stand them. Met Aldon in a bar brawl and impressed him enough that he hired me on.\"\n\n            You note that both of them seem like they're a long way from home.\n\n            \"That's true,\" Tiff says. \"Never really thought I'd be making home in a place like Greywood. But, I can't really complain.\"\n\n            \"I actually like it,\" Gorob says. \"No barbarian tribe constantly on the move, I can actually sleep in a bed instead of in a tent. Better food too.\"\n\n            \"Come on, we better check the ropes one more time and head back,\" Tiff says. \"We'll tell you more about the early days with Aldon's group later.\"\n\n            *goto tiff_and_gorob_heading_back\n\n        # Save the chit-chat for a better time\n            Maybe once the gold has been acquired and the heist is over, perhaps there will be a time to get to know everyone. For now, it's best for everyone to focus on the job at hand.\n            *goto tiff_and_gorob_heading_back\n\n*label tiff_and_gorob_heading_back\n\nBoth ${tiff_name} and ${gorob_name} admire their work, and then start to head back.\n\n*if work_with_party = 0\n    You examine the rope trap. It's not bad, but it's probably not going to stop all the guards. This could be an opportunity to change how things will play out.\n    *choice\n        #Loosen the trap. More guards means more confusion, which might mean more opportunities for you\n            Maybe if everyone's occupied with fighting, you can grab the gold and slip away unnoticed.\n            *set rope_trap_weakened 1\n            *goto tiff_and_gorob_last_tweak\n        #Leave the trap alone\n            Or, maybe best to leave this alone. More guards just increases the chances of you getting hurt.\n            *goto tiff_and_gorob_last_tweak\n        *if (brought_rope = 1) #Add another trap line and strengthen the trap.\n            You brought the rope, so you might as well use it here. Fewer guards means less fighting, which means less chance of you facing the wrong end of a sword.\n            *set rope_trap_strengthened 1      \n            *set brought_rope 0\n            *goto tiff_and_gorob_last_tweak\n            \n*label tiff_and_gorob_last_tweak            \nYou head back to see what the rest of the party is up to.\n\n*goto with_party_ready\n\n*label with_party_aldon_and_claud\n\n*comment some \"preparation\" exercises with Aldon. If with_party, player can participate for some...extra story?\n\n*if work_with_party = 0\n\n    You watch as ${aldon_name} sits for a moment, eyes almost closed. Is he taking a nap? Is this what he calls \"preparing\"?\n\n    Suddenly, like a snake, ${aldon_name} springs up to a standing position and draws his sword in one fluid motion. \n\n    He leaps back and forth, swinging at invisible assailants, and working himself up into a bit of a frenzy. Admittedly, it does appear that he can handle a sword quite well. \n\n    After quite a while of doing this, during which ${aldon_name} shows no signs of fatigue, he finally stops. He then starts wandering the area, possibly checking to see if there are any spots where fighting will favor ${aldon_name} and his team. \n\n    After quite a bit of this, ${aldon_name} returns to the spot where you were watching him. \n\n    *goto with_party_ready\n\n*else\n\n    Aldon makes his way to a small clearing and sits on a rock. He closes his eyes, and seems to be concentrating, or maybe even sleeping.\n\n    You want to say something, but he seems so relaxed, you don't really want to ruin the moment. But really, what is he doing?\n\n    After a short while, Aldon opens his eyes and leaps to his feet. He seems somewhat rejuvenated. \n\n    \"Ok ${player_name}\", Aldon says, \"Now you can help me warm up my swordplay.\" He hands you a wooden training sword and takes one for himself. \"You might not have much skills with the blade, but you'll be better practice than using a tree.\" You feel like there was a compliment somewhere in that insult.\n\n    \"The first to three hits on the other wins,\" Aldon says. It looks like you have no choice but to engage Aldon in this bit of mock fighting.\n\n    *goto party_sword_fight_loop\n\n*label party_sword_fight_loop\n\nYou and Aldon face each other, weapons raised and ready.\n\n*if (aldon_hits = 1)\n\n    Aldon took a hit, but he's not slowing down.\n\n*if (aldon_hits = 2)\n\n    Aldon's taken a couple hits. Landing one more attack should win this contest.\n\n*if (aldon_hits = 3) or (aldon_hits > 3)\n\n    Aldon stops and salutes you. \"That's three hits on me, so the fight goes to you.\"\n    *goto aldon_fight_win\n\n*rand aldon_fight_value 1 100\n*if (aldon_fight_value > 50)\n\n    The bandit swings his sword in a clean arc. You realize quickly that you won't be able to dodge his attack.\n\n    *rand aldon_fight_value 1 100\n    *if (aldon_fight_value > 80) \n\n        Fortunately, you're able to deflect his strike with your sword. \n\n    *else\n\n        You try and block his attack with your sword, but you miss the block, and his sword hits you. It stings a bit, but it's really your pride that's wounded.\n\n        *set player_hits + 1\n        *if (player_hits = 3) or (player_hits > 3)\n\n            \"I believe that's three hits on you,\" Aldon says and steps back. You haven't been counting, so you'll have to take his word, and you lower your sword as well. \n            *goto aldon_fight_win        \n\n    *rand aldon_fight_value 1 100\n    *if (aldon_fight_value > 60) \n\n        You counter-attack with a quick thrust of your sword.\n\n        *rand aldon_fight_value 1 100\n        *if (aldon_fight_value > 40) \n\n            Aldon is able to parry your strike, knocking your attack away.\n\n        *else\n\n            Aldon is unable to parry and your sword hits him with a glancing blow.\n\n            *set aldon_hits + 1\n\n    *else\n\n        You try and stab Aldon with your sword but miss.\n\n*else\n\n    Aldon strikes out with his sword but you evade his blow.\n\n    *rand aldon_fight_value 1 100\n    *if (aldon_fight_value > 50) \n\n        You move to Aldon's side and make a quick thrust with your sword.\n\n        *rand aldon_fight_value 1 100\n        *if (aldon_fight_value > 50) \n\n            Aldon is able to quickly reposition himself and parry your strike, knocking your attack away.\n\n        *else\n\n            Aldon is unable to parry and you hit him.\n\n            *set aldon_hits + 1\n\n    *else\n\n        You try and stab Aldon with your sword but miss.\n\n*page_break\n*goto party_sword_fight_loop\n\n\n*label aldon_fight_win\n\n\"Thank you for that bit of warm-up exercise,\" Aldon says. \"Now, if you excuse me, I'll continue practicing alone for a bit.\" He takes back the practice swords and puts them away. He then draws his actual sword and starts practicing several complicated sword combination attacks. He switches stances at times, and you notice on a few occasions he switches to a two-handed grip for particularly devastating-looking swings.\n\nYou mention that his swordplay is impressive.\n\n\"Well, I'm not one to boast, but I have been doing this a while,\" he says while practicing. \"I've survived a couple battles, including one battle with dark riders at Grimwoods Keep. You might have heard of that one.\"\n\nYou ask why he favors a sword.\n\n\"The sword's always been good to me. It fits well with my style of fighting which favors a back-and-forth fight over a longer duration. Axes may do more damage, aye they do a lot of damage, but they're far too slow for me. I'll get in two strikes for every axe-fighter's one. Spears are another good choice, but if a spear-fighter misses, I can get up close for an easy quick strike.\"\n\nAfter a short while, Aldon says he's done practicing and needs to check the surrounding area. You walk with him as he points out some advantages and disadvantages of various clear spaces nearby. \"Too many low trees over there,\" he notes to himself, \"Can't see if anyone's on your flank.\" Eventually, Aldon is satisfied with his review of the environment and tells you his preparations are done.\n\n*goto with_party_ready\n    \n*label with_party_ready\n\nWith preparations done, everyone gathers back at the clearing. \n\n\"Now we hide and wait,\" ${aldon_name} says.\n\n*label checkpoint_save\n*if using_soft_save\n    *page_break End of Chapter\n    *set save_load true\n    *set return_to_scene \"ambush\"\n    *goto_scene savegame\n*else\n    *finish    \n\n*label fatal_end\n*if using_soft_save\n    *page_break Restart Chapter\n    *set save_load false\n    *set return_to_scene \"party\"\n    *goto_scene savegame\n*else\n    *ending\n", "savegame": "*if (save_load)\n  *set swork_with_party work_with_party\n  *set swork_alone work_alone\n  *set splayer_name player_name\n  *set saldon_name aldon_name\n  *set srexa_name rexa_name\n  *set stiff_name tiff_name\n  *set sgorob_name gorob_name\n\n  *set sbrought_dagger brought_dagger\n  *set sbrought_rope brought_rope\n  *set sbrought_smokebomb brought_smokebomb\n\n  *set sknows_rocktroll knows_rocktroll\n  *set sknows_blindfire knows_blindfire\n  *set sknows_gargoyle knows_gargoyle\n\n  *set srexa_spell_weakened rexa_spell_weakened\n\n  *set srope_trap_strengthened rope_trap_strengthened\n  *set srope_trap_weakened rope_trap_weakened\n\n  *set sparty_captured party_captured\n\n  *set sstronghold_stairway_guards_attempted stronghold_stairway_guards_attempted\n  *set sstronghold_wearing_servant_robe stronghold_wearing_servant_robe\n  *set sleft_party_in_dungeon left_party_in_dungeon\n  *set sobtained_marqley_pass obtained_marqley_pass\n\n  *set shas_merchant_pass has_merchant_pass\n\n  *set shas_letter_from_marqley has_letter_from_marqley\n\n  *set sfreed_party_but_not_working_with_them freed_party_but_not_working_with_them\n\n  *set splayer_defeated_bandit player_defeated_bandit\n  *set splayer_tried_side_of_stronghold player_tried_side_of_stronghold\n\n  *set splayer_card_total player_card_total\n  *set skid_card_total kid_card_total\n  *set srandom_card_value random_card_value\n  *set scard_game_winning_value card_game_winning_value\n\n*else\n  *set work_with_party swork_with_party\n  *set work_alone swork_alone\n  *set player_name splayer_name\n  *set aldon_name saldon_name\n  *set rexa_name srexa_name\n  *set tiff_name stiff_name\n  *set gorob_name sgorob_name\n\n  *set brought_dagger sbrought_dagger\n  *set brought_rope sbrought_rope\n  *set brought_smokebomb sbrought_smokebomb\n\n  *set knows_rocktroll sknows_rocktroll\n  *set knows_blindfire sknows_blindfire\n  *set knows_gargoyle sknows_gargoyle\n\n  *set rexa_spell_weakened srexa_spell_weakened\n\n  *set rope_trap_strengthened srope_trap_strengthened\n  *set rope_trap_weakened srope_trap_weakened\n\n  *set party_captured sparty_captured\n\n  *set stronghold_stairway_guards_attempted sstronghold_stairway_guards_attempted\n  *set stronghold_wearing_servant_robe sstronghold_wearing_servant_robe\n  *set left_party_in_dungeon sleft_party_in_dungeon\n  *set obtained_marqley_pass sobtained_marqley_pass\n\n  *set has_merchant_pass shas_merchant_pass\n\n  *set has_letter_from_marqley shas_letter_from_marqley\n\n  *set freed_party_but_not_working_with_them sfreed_party_but_not_working_with_them\n\n  *set player_defeated_bandit splayer_defeated_bandit\n  *set player_tried_side_of_stronghold splayer_tried_side_of_stronghold\n\n  *set player_card_total splayer_card_total\n  *set kid_card_total skid_card_total\n  *set random_card_value srandom_card_value\n  *set card_game_winning_value scard_game_winning_value\n\n*label endsaveload\n*if (save_load)\n  [b]Progress saved . . .[/b]\n\n  Should your game end during the next Chapter you will be able to replay from\n  this exact point.\n\n  Please note that this option applies only to this session. After quitting\n  the game, the next time you play will be from the very beginning.\n\n  *page_break Begin Next Chapter\n  *goto redirect\n*else\n  [b]Game reset to start of current chapter[/b]\n\n  Are you ready to resume?\n\n  *page_break Restart Chapter\n  *goto redirect\n\n*label redirect\n*if return_to_scene = \"bar\"\n  *goto_scene bar\n*if return_to_scene = \"party\"\n  *goto_scene party\n*if return_to_scene = \"ambush\"\n  *goto_scene ambush\n*if return_to_scene = \"chase\"\n  *goto_scene chase\n*if return_to_scene = \"guild\"\n  *goto_scene guild\n*if return_to_scene = \"vault\"\n  *goto_scene vault\n\n*ending", "screenshots": "*comment Screenshot example scene\n\n*comment On iPad, the stat screen is visible at all times, so we have to set stats to make choicescript_stats look realistic\n\n*comment NOTE mobile phones can typically only fit about 80 words on the screen at a time.\n\n*comment Good screenshots need to make sense out of context!\n*comment Make sure the *fake_choice is self-explanatory.\n\n*comment It's often difficult to find a self-explanatory moment\n*comment in the game, so we encourage you to tweak the text in\n*comment your screenshot scene to make it easier to understand.\n\n*comment These screenshots have a big impact on sales. It's worth a few minutes to make your game look awesome.\n\n*set work_with_party 1\n*set brought_dagger  0\n*set brought_rope 1\n*set brought_smokebomb 0\n\nYou arrive at Crow's Corner and find the party is already there and waiting in a small clearing.\n\n\"We were beginning to think you might not show,\" Rexa says, with a smile.\n\n\"I'm honestly surprised you [i]did[/i] show,\" Gorob says. \n\nYou reiterate your professionalism as a thief and explain that, despite your profession, you can be trusted to keep your word.\n\n\"Enough chit-chat,\" Aldon says, \"let's get to work. Rexa, do what you need to do to prepare your spell. Tiff and Gorob, set up your rope trap. The rest of us need to prepare to deal with the carriage.\"\n\nLooks like everyone has a job to do. You decide to help out.\n*fake_choice\n    #Go help Rexa prepare her spell\n    #Go help Tiff and Gorob with the rope trap\n    #Practice some sword fighting with Aldon\n\n*set work_with_party 0\n*set brought_dagger  1\n*set brought_rope 0\n*set brought_smokebomb 0\n\nAs you continue running across the rooftops, you find yourself on top of one of the many churches in town. This particular one, however, appears to have a stone gargoyle sitting on the ledge. \n\nYou're about to continue on, when you notice something sparkle. Resting in the gargoyle's hands is some sort of metallic object. It could be a medallion of some sort?\n\n*fake_choice\n    # There's no time to be inspecting gargoyles on the roof. You're going to lose that chest of gold!\n    # Take a closer look and see if you can pry that metallic object loose\n    # Hold on a second, didn't you read about real gargoyles pretending to be fake ones? \n\n*set work_with_party 1\n*set brought_dagger  1\n*set brought_rope 0\n*set brought_smokebomb 1\n\nA large number of soldiers on horses burst through the thickets. You watch as the party leaps from their hiding places and tries to distract the guards.\n\nYou see Aldon bravely standing his ground while multiple soldiers circle him. He might be brave, but he's clearly out-numbered.\n  \nFurther off, Tiff and Gorob are acting as a team and have managed to actually take a handful of soldiers off their horses. But, they too are clearly out-matched and out-numbered, and you don't know how much longer they can hold out.\n\nCuriously, Rexa is nowhere to be seen.\n\nFighting isn't really your specialty, so you're staying hidden for the time being. What to do? There sure are a lot of soldiers, and soldiers generally don't like thieves much.\n*fake_choice \n    #No more hiding, time to see what you're made of\n    #Stay hidden, you prefer keeping your head firmly on your shoulders\n    #You've got a dagger, time to put it to good use\n    #You've got a smoke bomb, let's see what it can do\n\n*set work_with_party 0\n*set brought_dagger  0\n*set brought_rope 0\n*set brought_smokebomb 0\n\nYou arrive in a large dining hall, with a huge long table sitting on top of a tastefully arranged collection of bear skin rugs. Various artworks line the walls, however your keen eye notices many of them are cheap copies of other works. \n\nAround the table are seated at least ten different Merchant Guild members. At least, that's what you assume they are, given they're all wearing the usual green vests and fur capes. They're all being rather talkative and barely paying any attention to the huge amount of dishes arranged in front of them.\n\nThere are a number of servants here, clad in green robes like the one you are wearing, bringing food to the table, and replacing dishes and silverware. There seem to be four servants assigned to just pouring wine. \n\nYou set the soup bowl down near one end of the table, and a servant immediately starts portioning out the soup into bowls and placing them in front of the merchants seated at the table. \n\n*fake_choice \n    # Help serve soup and see if you can hear any conversations about the gold\n    # Ask the servants if they saw any gold go through here recently\n    # Loudly ask if anyone's seen any gold recently\n\n*set work_with_party 0\n*set brought_dagger  1\n*set brought_rope 0\n*set brought_smokebomb 0\n\nYou find yourself in a small interior room in the Merchant's Guild stronghold. It appears to be someone's office, with a rudimentary desk, a few chairs, some random documents on a table. \n\nA rather short, dark-haired man with a crooked nose, dressed in green finery (Marqley, you presume), stands in front of a solid metal door with a heavy lock on it. In your professional opinion, the vault is right behind that door.\n\nYou also notice a large open (and seemingly empty) sack in Marqley's hand, that he drops on the floor almost immediately.\n\n\"Who are you and what are you doing here?\" Marqley says, glaring at you with a look of anger mixed with surprise.\n\n*fake_choice    \n    # Tell him you're part of Guild security, here to inspect the gold, err, rather, the vault\n    # Tell him you're from the Greywood bank, here on business\n    # Tell him you're here for the gold, plain and simple\n\n*finish    ", "startup": "*comment Copyright 2022 by D. S. Yu.\n\n*title A Golden Opportunity\n*comment *ifid 348112cc-cf71-11ec-9d64-0242ac120002\n*author D. S. Yu\n*scene_list\n  startup\n  bar\n  party\n  ambush\n  chase\n  guild\n  vault\n  ending\n*comment screenshots\n\n*comment Enable implicit flow control so if statements don't require goto/finish statements\n*create implicit_control_flow true\n\n*create work_with_party 0\n*create work_alone 0\n*create player_name \"Pat\"   \n*create aldon_name \"Aldon\"\n*create rexa_name \"Rexa\"\n*create tiff_name \"Tiff\"\n*create gorob_name \"Gorob\"\n\n*create brought_dagger 0\n*create brought_rope 0\n*create brought_smokebomb 0\n\n*create knows_rocktroll 0\n*create knows_blindfire 0\n*create knows_gargoyle 0\n\n*create rexa_spell_weakened 0\n\n*create rope_trap_strengthened 0\n*create rope_trap_weakened 0\n\n*create party_captured 0\n\n*create stronghold_stairway_guards_attempted 0\n*create stronghold_wearing_servant_robe 0\n*create left_party_in_dungeon 0\n*create obtained_marqley_pass 0\n\n*create has_merchant_pass 0\n\n*create has_letter_from_marqley 0\n\n*create freed_party_but_not_working_with_them 0\n\n*create player_defeated_bandit 0\n\n*create player_tried_side_of_stronghold 0\n\n*create player_card_total 0\n*create kid_card_total 0\n*create random_card_value 0\n*create card_game_winning_value 10\n\n*comment ----- \"Soft save system\" variables -----\n*create return_to_scene \"\"\n*create using_soft_save false\n\n*create save_load false\n\n*create swork_with_party 0\n*create swork_alone 0\n*create splayer_name \"Pat\"   \n*create saldon_name \"Aldon\"\n*create srexa_name \"Rexa\"\n*create stiff_name \"Tiff\"\n*create sgorob_name \"Gorob\"\n\n*create sbrought_dagger 0\n*create sbrought_rope 0\n*create sbrought_smokebomb 0\n\n*create sknows_rocktroll 0\n*create sknows_blindfire 0\n*create sknows_gargoyle 0\n\n*create srexa_spell_weakened 0\n\n*create srope_trap_strengthened 0\n*create srope_trap_weakened 0\n\n*create sparty_captured 0\n\n*create sstronghold_stairway_guards_attempted 0\n*create sstronghold_wearing_servant_robe 0\n*create sleft_party_in_dungeon 0\n*create sobtained_marqley_pass 0\n\n*create shas_merchant_pass 0\n\n*create shas_letter_from_marqley 0\n\n*create sfreed_party_but_not_working_with_them 0\n\n*create splayer_defeated_bandit 0\n\n*create splayer_tried_side_of_stronghold 0\n\n*create splayer_card_total 0\n*create skid_card_total 0\n*create srandom_card_value 0\n*create scard_game_winning_value 10\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  You're a thief in need of gold, stuck in the poor town of Greywood. The only gold in town is locked up in the Merchant's Guild vaults, guarded by mercenaries. Word on the street is that a new delivery of gold is coming by horse-drawn carriage. You're not the only one interested in this delivery, however, as a band of adventurers also has their eye on it. Do you team up with the band of adventurers, or strike out on your own? Either way, you can't pass up on this golden opportunity!\n\n  *if choice_is_advertising_supported\n    [i]${choice_title}[/i] is supported by advertisements, but you can buy the unlimited version to turn off ads forever.\n\t\t\n    *purchase_discount adfree 2023-03-09 $4.99 $2.99 purchased\n    *page_break_advertisement\n  *else\n    [i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n    *purchase_discount adfree 2023-03-09 $4.99 $2.99 purchased\n    *page_break Play Now for Free\n\n*label purchased\n*comment Image by \u003ca href=\"https://pixabay.com/users/clker-free-vector-images-3736/?utm_source=link-attribution&amp;utm_medium=referral&amp;utm_campaign=image&amp;utm_content=35494\">Clker-Free-Vector-Images\u003c/a> from \u003ca href=\"https://pixabay.com/?utm_source=link-attribution&amp;utm_medium=referral&amp;utm_campaign=image&amp;utm_content=35494\">Pixabay\u003c/a>\n*image calligraphy-g-small.png left\n\n“Guild official request — pay your dues, or you’re out of the guild”\n\nYou look at the letter again. The official Thieves Guild sigil is there, right at the bottom. The amount, 10 pieces of gold, isn’t entirely unreasonable, considering you haven’t paid your dues in months. There’s just one small problem. You barely have two copper pieces to rub together. How are you supposed to come up with the money? You’re a thief by trade, in the town of Greywood. It’s not like someone is just going to hand you a nice sack full of gold.\n\nMaybe they sent the letter to the wrong thief. You read it again and check the name at the top. The name appears to be:\n*input_text player_name\nNope, that's you all right. It says \"${player_name}\" right there in big official-looking letters. You tuck the letter back into one of the many pockets in your coat. \n\n*finish", "vault": "You find yourself in a small interior room in the Merchant's Guild stronghold. It appears to be someone's office, with a rudimentary desk, a few chairs, some random documents on a table. \n\nA rather short, dark-haired man with a crooked nose, dressed in green finery (Marqley, you presume), stands in front of a solid metal door with a heavy lock on it. In your professional opinion, the vault is right behind that door.\n\nYou also notice a large open (and seemingly empty) sack in Marqley's hand, that he drops on the floor almost immediately.\n\n\"Who are you and what are you doing here?\" Marqley says, glaring at you with a look of anger mixed with surprise.\n\n*choice\n    \n    # Tell him you're part of Guild security, here to inspect the gold, err, rather, the vault\n        \n        You explain you're part of Guild security, and you're here to inspect the vault and make sure everything is in order. \n        \n        \"Guild security? I've never seen you before.\"\n        \n        *choice\n            \n            # Explain that you're new to the guild and were assigned to security detail just yesterday\n\n                \"The Guild hasn't hired anyone in months,\" Marqley remarks. \"I'm going to need some confirmation from someone else in security on who exactly you are. Someone like the guards posted outside.\"\n\n                Marqley calls for the guards who stumble in and look at the both of you, puzzled.\n\n                \"Gentlemen, do you know this individual?\"\n\n                The guards confirm they do not know you. You try and explain that you mostly work downstairs so you haven't crossed paths, but they don't seem to understand.\n\n                \"Maybe you should come with us and talk to the boss,\" one of them says, and roughly grabs you by the arm.\n\n                They lead you downstairs where your lack of official Guild employment records lands you in the guild dungeon rather quickly.\n\n                [b]THE END[/b]\n\n                *goto fatal_end                \n                \n            # Explain that Guild security is a pretty big team\n\n                \"We've got a lot of guards on security, but not many others. And you really don't strike me as a guard. Maybe we should get some guards in here to confirm.\"\n\n                Marqley calls out and two rather burley guards are suddenly at the door to the room.\n\n                \"Gentlemen, do you know this individual?\"\n\n                The guards confirm they do not know you. You try and explain that you mostly work downstairs so you haven't crossed paths, but they don't seem to understand.\n\n                \"Maybe you should come with us and talk to the boss,\" one of them says, and roughly grabs you by the arm.\n\n                They lead you downstairs where your lack of official Guild employment records lands you in the guild dungeon rather quickly.\n\n                [b]THE END[/b]\n\n                *goto fatal_end\n                \n            # Note that Guild security works best when people don't know who they are\n\n                \"Ah yes, the whole safety-in-secrecy thing. I've heard about that. So why exactly do you need to inspect this vault?\"\n\n                You explain that you've been receiving reports that the interior walls of some of the vaults are starting to need repairs. \n\n                \"What sort of repairs?\"\n\n                You note that some of the vaults have gotten so bad that the metal interior has started to rust.\n\n                \"Well, we can't have that. I guess you should go ahead and inspect.\" Marqley motions you towards the locked vault door.\n\n                *choice\n\n                    # Mention that you don't have the key to the vault\n\n                        \"Security doesn't have keys to the vaults? That seems pretty suspicious.\"\n\n                        Marqley calls for guards, who arrive surprisingly promptly.\n\n                        \"Gentlemen, do you know this individual?\"\n\n                        The guards confirm they do not know you. \n\n                        \"Maybe you should come with us and talk to the boss,\" one of them says, and roughly grabs you by the arm.\n\n                        They lead you downstairs where your lack of official Guild employment records lands you in the guild dungeon rather quickly.\n\n                        [b]THE END[/b]\n\n                        *goto fatal_end\n\n                    # Ask Marqley for his key as you need to inspect that as well\n\n                        \"My key has been looking a little rusty as well, now that you mention it,\" Marqley says, and hands over his key. \n\n                        You make your way to the vault door, and something on the table catches your eye.\n\n                        *choice \n\n                            # Examine what's on the table\n\n                                You pause and walk over to the table.\n\n                                \"Aren't you supposed to be inspecting the vault? Those are my personal papers,\" Marqley says.\n\n                                You explain that there have been reports of confidential documents being stolen or copied. You inquire if Marqley happens to have any confidential documents on his table?\n\n                                \"No, no, of course not,\" he says, slightly agitated. \"Here, let me clean that up for you.\"\n\n                                He quickly sorts various papers on his desk. You notice a paper marked with a red official stamp fall to the floor, which you pick up without Marqley noticing. While he goes on about the lack of desk space in his office, you take a quick peek at the paper and find it mostly blank except for \"APPROVED\" written in large letters above what's probably Marqley's official seal. \n\n                                \"Ok, now things are in order. Do you need to inspect any of these stacks further?\"\n\n                                You tell Marqley that you'll trust his organization for now, and that you'll turn your attention back to the vault.\n\n                                *page_break\n\n                                You proceed to the vault, unlock it, hand the key back to Marqley, and enter.\n\n                                The vault is surprisingly full. There are papers, boxes of gemstones, stacks of paper money, piles of gold, silver, and copper coins. You even see a couple boxes of jewelry. You have to put your hands in your pockets to resist simply stealing everything you see.\n\n                                As you pretend to inspect the walls, you bump into something covered with a large cloth. The cloth falls off, revealing a chest with the official guild seal on it. Looking closer, it seems like the sort of chest designed to ride inside a carriage. Could this be the chest from the delivery carriage you tried to rob earlier?\n\n                                Marqley suddenly rushes in. \"No need to inspect that,\" he says and quickly covers the chest with the cloth again.\n\n                                You inquire whether that is the gold from the recent delivery and what it's doing here.\n\n                                \"Look, we don't have to get into this right now. I was going to transfer it to the main vault, I've just been so busy. Here,\" he says and hands you a sack. \"Go ahead and take some gold and transfer it downstairs and let them know the rest is coming in a couple days.\"\n\n                                You grab some gold for yourself, do a cursory mock examination of the vault walls (you declare the vault is in good shape), and then leave Marqley's office.\n\n                                As you walk down the hall, gold in hand, you hear Marqley screaming \"Stop that person, they stole money from the guild!\" Looks like Marqley decided to make you some sort of scapegoat. \n\n                                As you are surrounded by guards, you try and explain that Marqley asked you to take the gold. \n\n                                \"Ridiculous,\" Marqley says. \"This person works for the security team, which has access to all the vaults in this building. I saw this person pilfer 1000 gold pieces from the recent shipment that came in earlier. I bet this person is also behind all the missing gold from each delivery we've had over the last several months!\"\n\n                                You insist that the gold came from Marqley's vault, where you noticed the rest of the recently delivered gold, and that he's obviously been skimming from the top. \n\n                                The guards ask if you have any proof that the gold came from Marqley. \n\n                                You recommend they check Marqley's vault where they will find the rest of the recent gold delivery, but the guards seem hesitant. \"Even if we find the gold, that still doesn't explain why you have some of it. You say Marqley asked you to take it, but he's saying he didn't. We're inclined to believe Marqley on this matter.\"\n\n                                Just then you remember the piece of paper you took from Marqley's desk, and produce it.\n\n                                \"Oh, I see. Yes, it looks like you did get approval from Marqley. That's his official seal and everything.\"\n\n                                \"Where did you get that?\" Marqley screams in outrage. You say you got it from him, which is, in some ways, not entirely a lie.\n\n                                \"Marqley, you clearly approved this, it says 'APPROVED' right here,\" a guard says. To you he then says, \"You may be on your way.\" \n\n                                As you walk off with the sack of gold, you can hear Marqley screaming rather colorful words at the guards, who are asking to inspect his vault.\n\n                                *goto good_ending1\n\n                            # Inspect the vault\n\n                                Best not to arouse suspicion. You proceed directly to the vault and unlock it, hand the key back to Marqley, and enter.\n\n                                The vault is surprisingly full. There are papers, boxes of gemstones, stacks of paper money, piles of gold, silver, and copper coins. You even see a couple boxes of jewelry. You have to put your hands in your pockets to resist simply stealing everything you see.\n\n                                As you pretend to inspect the walls, you bump into something covered with a large cloth. The cloth falls off, revealing a chest with the official guild seal on it. Looking closer, it seems like the sort of chest designed to ride inside a carriage. Could this be the chest from the delivery carriage you tried to rob earlier?\n\n                                Marqley suddenly rushes in. \"No need to inspect that,\" he says and quickly covers the chest with the cloth again.\n \n                                You inquire whether that is the gold from the recent delivery and what it's doing here.\n\n                                \"Look, we don't have to get into this right now. I was going to transfer it to the main vault, I've just been so busy. Here,\" he says and hands you a sack. \"Go ahead and take some gold and transfer it downstairs and let them know the rest is coming in a couple days.\"\n\n                                You grab some gold for yourself, do a cursory mock examination of the vault walls (you declare the vault is in good shape), and then leave Marqley's office.\n\n                                As you walk down the hall, gold in hand, you hear Marqley screaming \"Stop that person, they stole money from the guild!\" Looks like Marqley decided to make you some sort of scapegoat. \n\n                                As you are surrounded by guards, you try and explain that Marqley asked you to take the gold. \n\n                                \"Ridiculous,\" Marqley says. \"This person works for the security team, which has access to all the vaults in this building. I saw this person pilfer 1000 gold pieces from the recent shipment that came in earlier. I bet this person is also behind all the missing gold from each delivery we've had over the last several months!\"\n\n                                You insist that the gold came from Marqley's vault, where you noticed the rest of the recently delivered gold, and that he's obviously been skimming from the top. \n\n                                The guards ask if you have any proof that the gold came from Marqley. \n\n                                You recommend they check Marqley's vault where they will find the rest of the recent gold delivery, but the guards seem hesitant. \"Even if we find the gold, that still doesn't explain why you have some of it. You say Marqley asked you to take it, but he's saying he didn't. So I think the best plan is to take that gold and throw you in the dungeon while we sort all of this out.\"\n\n                                [b]THE END[/b]\n                                *goto fatal_end\n        \n    # Tell him you're from the Greywood bank, here on business\n        \n        You inform Marqley that you're a representative from the esteemed Greywood bank, there with a one-time offer too good to pass up. \n        \n        \"You're working rather late today, it seems. Oh, and I suppose you have more details on this special offer?\" Marqley says, sounding a bit incredulous.\n        \n        *choice\n            \n            # Yes and if you act now you can double your money\n                \n                \"Double? I highly doubt that. No one is offering such a good percentage nowadays, especially not the Bank of Greywood.\" He takes a more careful look at you. \"No, I think you're not from the bank at all.\"\n                \n                Marqley manages to tap something on the underside of the desk, and in moments two large, burly guards have you handcuffed. \n                \n                \"Take this individual to the bank and see if the bank can confirm this person is in their employ.\" To you, Marqley says, \"I hope for your sake they do, because I hear the bank is particularly unkind to people giving the bank a bad name.\"\n                \n                [b]THE END[/b]\n\n                *goto fatal_end\n\n            # We're running a special this month. For just 1000 gold pieces, you can lock in a great interest rate of 10 percent\n                \n                \"10 percent sounds about right for the stingy Bank of Greywood, but 1000 gold pieces? That's a bit steep, don't you think?\"\n\n                You point out that the Merchant's Guild is not exactly poor, and Marqley looks like he's doing pretty well for himself, what with that latest shipment of gold that just came in by carriage.\n\n                \"It's true I'm doing well,\" Marqley muses with a bit of a smile. \"But hold on a minute, how do you know about the gold shipment?\" \n\n                You point out everyone in Greywood knows about the gold.\n\n                \"They know about the gold, but no one was supposed to know it was coming in by carriage.\"\n\n                *choice\n\n                    # How else was it supposed to arrive? On the wings of a dragon?\n\n                        \"Well, no, we don't hire dragons. They're far too greedy,\" Marqley admits. \"However, I just tested you and you failed. You see, the bank does know how we normally transfer the gold due to the special agreement between the guild and the bank.\"\n\n                        Marqley manages to tap something on the underside of the desk, and in moments two large, burly guards have you handcuffed. \n                \n                        \"Take this person to the bank and see if the bank can confirm this individual is in their employ.\" To you, Marqley says, \"I hope for your sake they do, because I hear the bank is particularly unkind to people giving the bank a bad name.\"\n\n                        [b]THE END[/b]\n                        *goto fatal_end\n\n                    # The bank knew because you already told us\n\n                        \"Quite right,\" Marqley says. \"Every one of these transactions include a secret agreement between the bank and the Merchant's Guild. Pretty sweet deal for the both of us, I think.\"\n\n                        \"So, now that I believe you work for the bank, tell me more about this deal. You said you can get me 10 percent? Is that in any currency? What about copper? Can I get the interest back in gold? As we all know copper is 25% the value of gold right now, so if I gave you 346 copper pieces, how much interest in gold would I get?\"\n\n                        *choice\n\n                            # About 5 gold pieces\n\n                                \"Hmm, no, that doesn't seem right. A banker should be better with numbers, me thinks. I'm going to have to have some of my people escort you back to the bank.\"\n\n                                Marqley calls out and rather quickly 2 burly guards have you in an armlock. \n\n                                \"Please escort this individual back to the Greywood Bank so he can explain to them how they lost a customer.\"\n\n                                [b]THE END[/b]\n                                *goto fatal_end\n\n                            # About 9 gold pieces\n\n                                \"That sounds right.\" Marqley pauses for a moment, considering his options. \"So you have piqued my interest,\" he says. \"If what you say is true and you can guarantee me 10 percent, well,\" Marqley looks at the vault door. \"I might be able to make a deposit now. Just give me a moment.\"\n\n                                You watch as Marqley picks up the sack and unlocks and opens the vault door. He looks around briefly, as if watching for someone, and then enters the vault and closes the door behind him. You patiently wait for his return, which only takes a few minutes. \n\n                                He hands you the sack, now filled with gold. \"That's 1000 gold pieces,\" he says. \"If I visit the bank tomorrow, I can request my 100 gold pieces of interest?\"\n\n                                You assure him it will be there waiting for him.\n\n                                \"Well then I'm glad you made a late night visit,\" he says. \"Now, please, take this to the bank at once. I'm expecting some visitors shortly who probably don't need to know about this transaction.\"\n\n                                He hands you a piece of paper with some sort of \"official business\" seal on it. \"Show this to anyone asking about the gold and they shouldn't question you further.\"\n\n                                With that, you cordially shake hands and depart. Naturally some guards question the sack you're carrying, but as soon as you show them the piece of paper, they let you pass. In no time at all, you have exited the stronghold.\n\n                                *goto good_ending1\n\n                            # About 14 gold pieces\n\n                                \"Hmm, no, that doesn't seem right. A banker should be better with numbers, me thinks. I'm going to have to have some of my people escort you back to the bank.\"\n\n                                Marqley calls out and rather quickly 2 burly guards have you in an armlock. \n\n                                \"Please escort this individual back to the Greywood Bank so he can explain to them how they lost a customer.\"\n\n                                [b]THE END[/b]\n                                *goto fatal_end\n\n                            # About 22 gold pieces\n\n                                \"Hmm, no, that doesn't seem right. A banker should be better with numbers, me thinks. I'm going to have to have some of my people escort you back to the bank.\"\n\n                                Marqley calls out and rather quickly 2 burly guards have you in an armlock. \n\n                                \"Please escort this individual back to the Greywood Bank so they can be informed that they just lost a customer.\"\n\n                                [b]THE END[/b]\n                                *goto fatal_end\n        \n    # Tell him you're here for the gold, plain and simple\n        \n        You tell Marqley that you know about the recent gold shipment, that it's probably behind that vault door, and you want him to open the vault and hand the gold over.\n        \n        Marqley starts to laugh. \"Awfully direct for a thief. Because that's what you are, right? A thief that wants to steal my gold.\"\n        \n        *choice\n            \n            # \"That's right, so hand the gold over already\"\n                \n                \"I think not. You think I'm afraid of one thief? An entire party of skilled adventurers tried to take the gold earlier and failed. Do you really think that you alone can overpower me and take the gold before I simply yell 'GUARDS!'\"\n\n                Just like that, several guards appear in the room as if summoned. Marqley points at you and says \"We have a thief in our midst.\"\n\n                In moments, the guards have you in chains and are leading you down to the dungeon. \n\n                [b]THE END[/b]\n                *goto fatal_end\n\n            # \"I prefer to think of myself as a re-distributor of wealth\"\n\n                \"Like that guy in the forest that wears a green hood. What was his name again? It doesn't matter.\"\n\n                You explain that the money you take will be put to good use. \n\n                \"How exactly will that happen?\" Marqley asks, with an amused expression on his face.\n\n                *choice\n\n                    # Explain that the money could help a lot of people down on their luck in Greywood\n\n                        \"So you steal from me, and give it to the poor and destitute who didn't lift one finger to earn this money?\"\n\n                        You try and explain that the people he calls poor and destitute were once upstanding citizens.\n\n                        \"I'd like to see proof of that,\" Marqley says with a sneer.\n\n                        Ask Marqley if he really cares so little for the needy.\n\n                        \"You, a thief, really need to ask that question? I work for the Merchant's Guild, a guild that makes money selling goods to people with money. That is how this all works. We are not some sort of charity. Perhaps some time to reflect on this in the dungeon will set your priorities straight.\"\n\n                        Marqley calls for the guards before you have the chance to ask him to reconsider. They escort you to the dungeon without delay.\n\n                        [b]THE END[/b]\n                        *goto fatal_end\n\n                    # Note that right now the people aren't particularly fond of the Merchant's Guild\n\n                        \"So giving them free money will make us look good?\"\n\n                        You assure Marqley this would be so. You point out that he himself would look like a hero in some people's eyes.\n\n                        He thinks on this for a moment.\n\n                        \"While it is true that the Merchant's Guild isn't well-loved, people are still buying and selling their stuff through us. You see, we don't really need the people's love. We just need their money. Also, buying the people's loyalty is temporary at best. How long would this even last? A year? Less? We'd just be setting up expectations that we'd be doling out money every year.\"\n\n                        \"No, I'm sorry, this seems like a terrible reason for me to let you take our gold. And given that this strategy is coming from you, an apparently thief, I like it even less. Guards!\"\n\n                        Marqley calls for the guards before you have the chance to ask him to reconsider. They escort you to the dungeon without delay.\n\n                        [b]THE END[/b]\n                        *goto fatal_end                    \n\n                    # Claim that if the money goes to the people, it'll be back in the Merchant's Guild vaults within the week\n\n                        \"How exactly do you figure that?\" Marqley asks with genuine curiosity.\n\n                        You tell him he needs to look at the big picture. The poor people of Greywood are sensible people, just trying to survive. If the guild gives them money, what are they going to do with it? Are they going to put it in the bank? Of course not. None of them are interested in saving money. They're going to take the money, and immediately turn around and use it to buy goods. Goods that are being sold by the Merchant's Guild. Additionally, they'll get into the habit of buying more, which ultimately means more sales for the Merchant's Guild down the road.\n\n                        Marqley inhales deeply and smiles.\n\n                        \"Well here's something I never thought I'd see. A thief that thinks like a merchant. On top of that, you're not wrong. Those fools will spend the money as fast as they can, and we'll see most of those profits. Even better, the whole thing will look like an act of good will to the people.\"\n\n                        Marqley picks up the sack and fills it with gold. He hands it to you, but holds it briefly before releasing it.\n\n                        \"I'm holding you to your word thief. Make sure this money goes to the people and not into your pocket. And make sure they know it came from the Merchant's Guild. I'm taking a big risk here, so don't make me regret it.\"\n\n                        *goto good_ending1\n\n            # \"A thief yes, and one in good standing with the Thieve's Guild. A Guild that your guild isn't on good terms with.\"\n\n                \"The thought of a thief in good standing with any organization makes me laugh,\" Marqley says. \"And so what if our guilds are not best friends? We mind our business and you mind yours.\"\n\n                While it's true that each guild has kept to itself, that might not be true for much longer. The Merchant's Guild offers far too many opportunities for the Thieve's Guild to pass up. \n\n                \"Are you actually threatening the Merchant's Guild? Are you suggesting that the Thieve's Guild would break the unwritten guild contract and actively steal from another guild?\"\n\n                It's only natural, you say, for a Thieve's Guild to look for the biggest prize. And right now, the Merchant's Guild is high on their list. However, a suitable \"donation\" to the guild would almost certainly direct their attention elsewhere. Wouldn't it be in the Merchant's Guild's best interest, and therefore Marqley's best interest, to make a simple gesture of good will now, rather than suffer mysterious losses in the future?\n\n                \"No, this feels like extortion, and if anyone is going to be extorting here, it should be me, not you.\"\n\n                Marqley calls for the guards before you have the chance to react. They escort you to the dungeon without delay.\n\n                [b]THE END[/b]\n                *goto fatal_end \n\n            *if (has_letter_from_marqley > 0) # \"According to this letter from you, I'm not the only thief here who has designs on this gold.\"                   \n\n                You pull the letter from Marqley out of your pocket and wave it in front of him. The look of shock on his face is particularly satisfying.\n\n                \"How, how did you get that?\" he says. \"I thought I sent that off before I left. Oh, but I must have forgotten because I had to stop by the bread shop before leaving Farbranch. They have the most excellent bread and...well never mind any of that. You must give me that immediately.\"\n\n                You hold it away from Marqley with a smile. You casually mention that perhaps some nearby guards would be very interested in the contents of this letter. No doubt many in the guild would find it a most enlightening read. You also note he probably shouldn't have signed it and added his official seal. \n\n                \"Fine, fine, I get it. What will it cost me to get my letter back?\"\n\n                You suggest a price of 1000 pieces of gold seems fair.\n\n                Marqley is practically seething, but manages a twisted smile and gathers the requested amount in a sack. You reach out for the sack, but Marqley quickly pulls it out of your grasp. \"First, the letter,\" he says and reaches out with his free hand.\n\n                *choice\n\n                    # Grab the sack and hand over the letter\n\n                        You take the sack of gold and hand Marqley the letter. He performs a little bow and then, without even hesitating, screams \"Guards! Guards! I've caught a thief!\"\n\n                        You try to run, but the sack of gold is heavier than you expected, and you're soon caught by several guards. Since you're holding a sack of gold, and no longer have the letter, there's not a lot you can do to talk your way out of this. The guards quickly escort you to the dungeon where you expect you'll be spending many days there, as stealing from the Merchant's Guild is a particularly heinous crime.\n\n                        [b]THE END[/b]\n                        *goto fatal_end \n\n                    # You weren't born yesterday. Tell Marqley you'll give him the letter once you're safely outside the stronghold with the gold.\n\n                        \"Drat!\" Marqley says. \"How infuriating. But, how do I know you'll hand over the letter once you're outside?\"\n\n                        You tell him you will honor the agreement.\n\n                        \"Honor from a thief? Hardly. No, this will not do at all. You are giving me that letter before you run off and disappear the way all you thieves love to do.\"\n\n                        You suggest that the two of you walk out of the building, you with the letter, Marqley with the gold, and as soon as you reach a safe location, you will do the exchange.\n\n                        Marqley clearly isn't happy, but he grudgingly agrees to this. Both of you make your way out of the building, Marqley doing his best to hide the sack of gold under a jacket. No one seems to be paying much attention to either of you. \n\n                        Eventually you take a side exit and are standing just outside the stronghold. You make Marqley walk a little bit more until you see a spot far away enough.\n\n                        Marqley pushes the sack of gold at you. \"We've gone far enough. Give me the letter like you said you would.\"\n\n                        You hand over the letter once you have the sack of gold in your other hand. Marqley simply turns and storms off into the dark, back to the guild headquarters. You can almost feel his anger with each step he takes.\n\n                        *goto good_ending1\n        \n*label good_ending1\n\nYou find yourself outside the Merchant's Guild stronghold with a sack full of gold. Thankfully, it is dark out, so you're able to make your way back home with the gold without running into anyone or arousing any suspicion. Once safely home, you open the sack and smile at 1000 pieces of gold. This should cover the Thieve's Guild dues and then some, you think to yourself, chuckling quietly.\n\n*page_break\n\n*if ((work_with_party > 0) and (left_party_in_dungeon = 0))\n\n    A few days later you arrange a meeting with Aldon and company, and distribute shares of the gold to each party member (at a discreet location, of course). Aldon and the gang seem quite pleased. \n\n    \"Well done thief,\" Aldon says. \"It seems like, thanks to you, all our efforts were not in vain.\"\n\n    \"The Merchant's Guild is going to come looking for us,\" Tiff says, \"And you too thief. Best to keep out of the spotlight for a while.\"\n\n    You assure her that if anyone can keep to the shadows and stay out of sight, it's you.\n\n    \"Perhaps you'd like to join us on our next adventure?\" Gorob asks. \"We've heard word that some goblins out west have kidnapped some royal's son, and he's willing to pay a good price to see his son rescued.\"\n\n    You tell them you appreciate the offer, but you'll be taking a break from adventuring for a little while.\n\n    \"Farewell then, ${player_name},\" Rexa says, \"And watch your back!\"\n\n    *page_break\n\n    Several weeks later, you're fully re-instated into the Thieve's Guild and enjoying a good pint at the Guild headquarters. A few colleagues have inquired how you managed to come up with the dues so quickly, oh, and also how you managed to buy such nice new boots and a new leather coat. You make up some story about a lost inheritance. \n\n    Suddenly, two figures wearing hooded cloaks enter the room and approach you. As they approach they remove their hoods and you see the familiar faces of Tiff and Gorob.\n\n    \"Sorry to intrude, ${player_name} but we're in a bit of a pickle and need your help,\" Tiff says. \n\n    You try and explain you're still taking a break from adventures, but neither Tiff or Gorob are willing to accept that.\n\n    \"You see, some of our adventures as of late have attracted the wrong kind of attention. We think some warlords in the west have put out a bounty on us. Rexa was captured by trolls, and Aldon's gone missing. Gorob and I barely escaped a group of assassins and now we're on the run,\" Tiff explains.\n\n    \"But, we've come up with a plan to fix all of this. Deep in one of the warlord's stronghold is evidence that the warlord murdered a famous hero amongst their people. If we can steal that evidence, we can expose the crime and send the warlords into a bloody war against each other.\"\n\n    \"Plus, while they're distracted, we can free Rexa,\" Gorob adds. \"Although, we still need to find Aldon first.\"\n\n    You interrupt the two and confess that you don't see a lot of upsides for you in all of this, and a lot of downsides.\n\n    \"We figured you'd say that,\" Tiff says. She trades a knowing glance at Gorob and adds \"We also learned that sequestered along with the evidence is Artemis Black's cloak. You know the one, the cloak that can render a thief completely undetectable?\"\n\n    You've heard of it. Every thief has heard of it. The legends say that Artemis pulled off jobs that were nothing short of impossible thanks to that cloak. And here Tiff and Gorob are telling you that not only is it real and not a myth, but they even know where it is.\n\n    \"So are you in?\" Gorob asks.\n\n    It looks like you might be off on another adventure soon!\n\n    [b]THE END?[/b]\n\n    *goto_scene ending\n\n*else\n\n    Several weeks later, you're fully re-instated into the Thieve's Guild and enjoying a good pint at the Guild headquarters. A few colleagues have inquired how you managed to come up with the dues so quickly, oh, and also how you managed to buy such nice new boots and a new leather coat. You make up some story about a lost inheritance. \n\n    *if (freed_party_but_not_working_with_them > 1)\n\n        You reflect on how you did manage to find those adventurers who helped you out, and gave them a bit of the loot. They seemed thankful (well, not that stout guy, he felt they deserved more, but you can't make everyone happy).\n\n    You've been keeping a relatively low profile, so you're rather surprised when a letter is delivered to the Guild headquarters addressed to you. The letter is not signed, nor is it very long, but it does have the official Merchant's Guild seal at the top and simply reads:\n\n    [i]\"We know who you are, we know where you are, and we want our gold back.\"[/i]\n\n    Perhaps a move to a new town is in order?\n\n    [b]THE END?[/b]\n\n    *goto_scene ending\n\n*label fatal_end\n*if using_soft_save\n    *page_break Restart Chapter\n    *set save_load false\n    *set return_to_scene \"vault\"\n    *goto_scene savegame\n*else\n    *ending\n"}};
</script>
<script>
/* ChoiceScript runtime — vanilla-JS port of the Python engine in cs/.
 *
 * Faithful reimplementation of parser + expr + interpolate + engine. The
 * engine is I/O-agnostic: it talks to an `io` object exposing text(), choose(),
 * page_break(), input_text(), input_number(), achievement(), stat_chart().
 *
 * Exposed as a global `CS` object (no modules, no build step).
 */
(function (root) {
  "use strict";

  // ---- errors ----------------------------------------------------------- //

  class CSError extends Error {
    constructor(message, scene, line) {
      super(formatLoc(scene, line) + message);
      this.raw_message = message;
      this.scene = scene === undefined ? null : scene;
      this.line = line === undefined ? null : line;
      this.name = "CSError";
    }
  }
  function formatLoc(scene, line) {
    if (scene == null && line == null) return "";
    return (scene == null ? "?" : scene) + " line " + (line == null ? "?" : line) + ": ";
  }
  class ExprError extends CSError { constructor(m, s, l) { super(m, s, l); this.name = "ExprError"; } }
  class GameOver extends Error { constructor(label) { super(label || ""); this.label = label || ""; this.name = "GameOver"; } }
  class QuitGame extends Error { constructor() { super("quit"); this.name = "QuitGame"; } }
  class LoadGame extends Error { constructor(state) { super("load game"); this.state = state; this.name = "LoadGame"; } }
  class RestartGame extends Error { constructor() { super("restart"); this.name = "RestartGame"; } }

  // ---- parser ----------------------------------------------------------- //

  const COMMAND_RE = /^\s*\*(\w+)\b[ \t]?([\s\S]*)$/;
  const INDENT_RE = /^([ \t]*)/;

  class Line {
    constructor(num, indent, command, arg, text) {
      this.num = num;
      this.indent = indent;
      this.command = command; // null for plain text
      this.arg = arg;
      this.text = text;
    }
    get is_blank() {
      return this.command == null && this.text.trim() === "";
    }
  }

  function getIndent(raw) {
    const m = INDENT_RE.exec(raw);
    const ws = m ? m[1] : "";
    if (ws.indexOf("\t") !== -1 && ws.indexOf(" ") !== -1) {
      throw new CSError("mixed tabs and spaces in indentation");
    }
    return ws.length;
  }

  function parseScene(text) {
    const lines = [];
    const rawLines = text.split("\n");
    for (let i = 0; i < rawLines.length; i++) {
      let raw = rawLines[i].replace(/\r$/, "");
      const num = i + 1;
      if (raw.trim() === "") {
        lines.push(new Line(num, 0, null, "", ""));
        continue;
      }
      const indent = getIndent(raw);
      const m = COMMAND_RE.exec(raw);
      if (m) {
        lines.push(new Line(num, indent, m[1], m[2], raw.trim()));
      } else {
        lines.push(new Line(num, indent, null, "", raw.trim()));
      }
    }
    return lines;
  }

  // ---- value coercion --------------------------------------------------- //

  function isNum(v) { return typeof v === "number"; }
  function isBool(v) { return typeof v === "boolean"; }
  function isStr(v) { return typeof v === "string"; }

  function toNum(value) {
    if (isBool(value)) throw new ExprError("Expected number, got boolean: " + value);
    if (isNum(value)) return value;
    const s = String(value).trim();
    if (/^-?\d+$/.test(s)) return parseInt(s, 10);
    // Match Python float(): the whole string must be a valid float literal.
    if (/^[+-]?(\d+\.?\d*|\.\d+)([eE][+-]?\d+)?$/.test(s)) {
      const f = Number(s);
      if (!isNaN(f)) return f;
    }
    throw new ExprError('Expected number, but got string: "' + value + '"');
  }

  function toBool(value) {
    if (isBool(value)) return value;
    if (isNum(value)) throw new ExprError("Expected boolean, got number: " + value);
    const s = String(value).trim().toLowerCase();
    if (s === "true") return true;
    if (s === "false") return false;
    throw new ExprError('Expected boolean, but got string: "' + value + '"');
  }

  function csStr(value) {
    if (isBool(value)) return value ? "true" : "false";
    if (isNum(value)) {
      // integers render without a decimal point
      if (Number.isInteger(value)) return String(value);
      return String(value);
    }
    return String(value);
  }

  // ---- expression tokenizer --------------------------------------------- //

  const TOKEN_SPECS = [
    ["OPEN_PARENTHESIS", /^\(/],
    ["CLOSE_PARENTHESIS", /^\)/],
    ["OPEN_CURLY", /^\{/],
    ["CLOSE_CURLY", /^\}/],
    ["OPEN_SQUARE", /^\[/],
    ["CLOSE_SQUARE", /^\]/],
    ["FUNCTION", /^(not|round|timestamp|log|length|auto)\s*\(/],
    ["NUMBER", /^\d+(\.\d+)?\b/],
    ["CURLY_QUOTE", /^[“”]/],
    ["WHITESPACE", /^\s+/],
    ["NAMED_OPERATOR", /^(and|or|modulo)\b/],
    ["VAR", /^\w+/],
    ["FAIRMATH", /^%[+\-]/],
    ["OPERATOR", /^[+\-*/&%^#]/],
    ["INEQUALITY", /^[!<>]=?/],
    ["EQUALITY", /^=/],
    ["COMMA", /^,/],
  ];
  const FUNC_NAME_RE = /^\w+/;

  class Token {
    constructor(name, value, pos, func) {
      this.name = name;
      this.value = value;
      this.pos = pos;
      this.func = func || null;
    }
  }

  function tokenize(expr) {
    let s = expr;
    let pos = 0;
    const tokens = [];
    while (s) {
      // String literal with backslash escapes.
      if (s[0] === '"') {
        let i = 1;
        let found = false;
        while (i < s.length) {
          const c = s[i];
          if (c === "\\") { i += 1; }
          else if (c === '"') { found = true; break; }
          i += 1;
        }
        if (!found) throw new ExprError("Invalid string, open quote with no close quote: " + s);
        const matched = s.slice(0, i + 1);
        pos += matched.length;
        tokens.push(new Token("STRING", matched, pos));
        s = s.slice(matched.length);
        continue;
      }
      let matched = null;
      for (const [name, rx] of TOKEN_SPECS) {
        const m = rx.exec(s);
        if (m && m[0]) { matched = [name, m[0]]; break; }
      }
      if (matched === null) throw new ExprError("Invalid expression, could not tokenize at: " + s);
      const [name, value] = matched;
      pos += value.length;
      s = s.slice(value.length);
      if (name === "CURLY_QUOTE") throw new ExprError("Invalid use of curly smart quote: " + value);
      if (name === "WHITESPACE") continue;
      let func = null;
      if (name === "FUNCTION") func = FUNC_NAME_RE.exec(value)[0];
      tokens.push(new Token(name, value, pos, func));
    }
    return tokens;
  }

  // ---- operators -------------------------------------------------------- //

  function fairAdd(v1, v2) {
    v1 = toNum(v1); v2 = toNum(v2);
    if (!(v1 >= 0 && v1 <= 100)) throw new ExprError("Can't fairAdd to non-percentile value: " + v1);
    if (v2 > 0) {
      const mult = (100 - v1) / 100.0;
      const value = Math.floor(v1 + v2 * mult);
      return value > 99 ? 99 : value;
    }
    const mult = v1 / 100.0;
    const value = Math.ceil(v1 - (-v2) * mult);
    return value < 1 ? 1 : value;
  }
  function fairSub(v1, v2) { return fairAdd(v1, -toNum(v2)); }

  function equals(v1, v2) {
    if (isBool(v1) || isBool(v2)) {
      return v1 === v2 || String(v1).toLowerCase() === String(v2).toLowerCase();
    }
    return v1 === v2 || String(v1) === String(v2);
  }
  function divide(a, b) {
    b = toNum(b);
    if (b === 0) throw new ExprError("can't divide by zero");
    return toNum(a) / b;
  }
  function concat(a, b) { return csStr(a) + csStr(b); }
  function numBin(fn) { return (a, b) => fn(toNum(a), toNum(b)); }
  // The `#` operator: 1-based character index into a string (e.g. name#1
  // returns the first character). Mirrors Scene.operators['#'] in scene.js.
  function charAt(v1, v2) {
    const s = csStr(v1);
    const i = toNum(v2);
    if (i !== Math.floor(i)) throw new ExprError("There is no character at position " + i + "; the position must be a whole number.");
    if (i < 1) throw new ExprError("There is no character at position " + i + "; the position must be greater than or equal to 1.");
    if (i > s.length) throw new ExprError('There is no character at position ' + i + '. "' + s + '" is only ' + s.length + " characters long.");
    return s.charAt(i - 1);
  }

  const OPERATORS = {
    "+": numBin((a, b) => a + b),
    "-": numBin((a, b) => a - b),
    "*": numBin((a, b) => a * b),
    "/": (a, b) => divide(a, b),
    "^": numBin((a, b) => Math.pow(a, b)),
    "modulo": numBin((a, b) => ((a % b) + b) % b),
    "&": (a, b) => concat(a, b),
    "#": charAt,
    "%+": fairAdd,
    "%-": fairSub,
    "=": equals,
    "!=": (a, b) => !equals(a, b),
    "<": numBin((a, b) => a < b),
    ">": numBin((a, b) => a > b),
    "<=": numBin((a, b) => a <= b),
    ">=": numBin((a, b) => a >= b),
    "and": (a, b) => toBool(a) && toBool(b),
    "or": (a, b) => toBool(a) || toBool(b),
  };

  // ---- evaluator -------------------------------------------------------- //

  class Evaluator {
    constructor(resolver) { this.resolver = resolver; }

    evalString(expr) { return this.evalTokens(tokenize(expr)); }
    evalTokens(tokens) { return this._evalExpr(tokens.slice(), null); }

    evalValueToken(stack) { return this._evalValueToken(stack.shift(), stack); }

    evaluateReference(stack, toLower) {
      if (toLower === undefined) toLower = true;
      const norm = (name) => toLower ? String(name).toLowerCase() : name;
      const findClosing = (kind, offset) => {
        let opens = 0;
        const openName = "OPEN_" + kind, closeName = "CLOSE_" + kind;
        for (let i = offset || 0; i < stack.length; i++) {
          if (stack[i].name === openName) opens += 1;
          else if (stack[i].name === closeName) {
            if (opens) opens -= 1; else return i;
          }
        }
        return -1;
      };
      if (!stack.length) throw new ExprError("Invalid expression, expected a name");
      const head = stack[0];
      if (head.name === "OPEN_CURLY") {
        stack.shift();
        const closing = findClosing("CURLY", 0);
        if (closing === -1) throw new ExprError("Invalid expression, no closing curly bracket");
        const name = this.evalTokens(stack.slice(0, closing));
        stack.splice(0, closing + 1);
        return norm(name);
      }
      if (head.name === "NUMBER") { stack.shift(); return head.value; }
      if (head.name !== "VAR") {
        throw new ExprError("Invalid expression; expected name, found " + head.name + " at char " + head.pos);
      }
      let name = String(head.value);
      stack.shift();
      while (stack.length && stack[0].name === "OPEN_SQUARE") {
        const closing = findClosing("SQUARE", 1);
        if (closing === -1) throw new ExprError("Invalid expression, no closing array bracket");
        const index = this.evalTokens(stack.slice(1, closing));
