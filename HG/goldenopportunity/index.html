o chase_streets_maze_a4\n\n*label chase_streets_maze_c1\n\nYou reach an intersection with streets headed in all directions. There's a statue of a mage here, wand extended in mid-cast.\n\nYou hear some sounds to the north. It could be a patrol, or possibly the escort.\n\n*choice\n\n    # Take the west street\n        You head west.\n        *goto chase_streets_maze_c0\n\n    # Take the east street\n        You head east.\n        *goto chase_streets_maze_c2\n\n    # Take the north street\n        You head north.\n\n        You run straight into a district patrol, which quickly apprehends you for being in the district without permission. \n        [b]THE END[/b]\n        *goto fatal_end\n\n    # Take the south street\n        You head south.\n        *goto chase_streets_maze_b1\n\n*label chase_streets_maze_c2\n\nYou reach an intersection with streets headed in all directions. There's a stateu of a cleric here, focused in prayer.\n\nYou hear some sounds to the north. It could be a patrol, or possibly the escort.\n\n*choice\n\n    # Take the west street\n        You head west.\n        *goto chase_streets_maze_c1\n\n    # Take the east street\n        You head east.\n        *goto chase_streets_maze_c3\n\n    # Take the north street\n        You head north.\n\n        You run straight into a district patrol, which quickly apprehends you for being in the district without permission. \n        [b]THE END[/b]\n        *goto fatal_end\n\n    # Take the south street\n        You head south.\n        *goto chase_streets_maze_b2\n\n*label chase_streets_maze_c3\n\nYou reach an intersection with streets headed in all directions. There's a stateu of a warrior here, sword raised high ready to strike.\n\nYou hear some sounds to the north. It could be a patrol, or possibly the escort.\n\n*choice\n\n    # Take the west street\n        You head west.\n        *goto chase_streets_maze_c2\n\n    # Take the east street\n        You head east.\n        *goto chase_streets_maze_c4\n\n    # Take the north street\n        You head north.\n\n        You run straight into a district patrol, which quickly apprehends you for being in the district without permission. \n        [b]THE END[/b]\n        *goto fatal_end\n\n    # Take the south street\n        You head south.\n        *goto chase_streets_maze_b3\n\n*label chase_streets_maze_c4\n\nYou reach an intersection with streets headed west and south. There's a statue of a ranger here, holding a bow.\n\n*choice\n\n    # Take the west street\n        You head west.\n        *goto chase_streets_maze_c3\n\n    # Take the south street\n        You head south.\n        *goto chase_streets_maze_b4\n\n*label chase_streets_maze_c0\n\nYou reach an intersection with streets headed east and north. There's a state of a man wearing a vest and a fur cape, holding a fancy box.\n\nYou hear some sounds to the north. It could be a patrol, or possibly the escort.\n\n*choice\n\n    # Take the east street\n        You head east.\n        *goto chase_streets_maze_c1\n\n    # Take the north street\n        You head north.\n        *goto chase_streets_final\n\n*label chase_streets_final\n\n*page_break\n\nYou find yourself headed down a long street which terminates in a large stone building. You see the escort march right into the building. You're too late to grab the gold this time. But, you're not giving up that easily. There's got to be a way to get that gold.\n\n*label checkpoint_save\n*if using_soft_save\n    *page_break End of Chapter\n    *set save_load true\n    *set return_to_scene \"guild\"\n    *goto_scene savegame\n*else\n    *finish    \n\n*label fatal_end\n*if using_soft_save\n    *page_break Restart Chapter\n    *set save_load false\n    *set return_to_scene \"chase\"\n    *goto_scene savegame\n*else\n    *ending", "choicescript_description": "You're a thief in need of gold, stuck in the poor town of Greywood. The only gold in town is locked up in the Merchant's Guild vaults, guarded by mercenaries. Word on the street is that a new delivery of gold is coming by horse-drawn carriage. You're not the only one interested in this delivery, however, as a band of adventurers also has their eye on it. Do you team up with the band of adventurers, or strike out on your own? Either way, you can't pass up on this golden opportunity!", "choicescript_stats": "This is a blank stats screen!\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n  \n  Permanently remove all ads and delays.\n  \n  *purchase_discount adfree 2023-03-09 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n  \n  You've paid to permanently remove all ads and delays.\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Golden Opportunity.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99 $0.99\n", "guild": "You're back in town with not a single coin for all your troubles. It's not the first time you've been on a heist job that failed. You remind yourself that even the best thieves, the most famous rogues of them all, had their off days. Truth be told, half the members of the Thieves Guild probably wouldn't have even taken on the adventure you just had. They'd rather sit in their little secret basement and gather dues. \n\nOh, and there's one other thing. The job's not over yet. You might not have gotten the gold, but you know where it is — inside the Merchant Guild stronghold. As long as they haven't moved the money out of the stronghold and into the bank, it's still \"off the books\" and up for grabs. So all you need to do now is break into the heavily fortified stronghold, evade the well-armed guards, probably deal with some locked safes and traps, and steal the gold. \n\nWho ever said the life of a thief was an easy one?\n\nFirst thing's first. You need to get inside that stronghold.\n*page_break\n\n*if (work_with_party > 0)\n    \n    *if (party_captured > 0)\n        This task would probably be easier if the party you were working with hadn't all gotten themselves captured. You watched from afar as the party, in chains, was led into the stronghold, no doubt placed in cells in the stronghold's dungeons. \n        \n        In some ways however, it's refreshing to be running solo again. You wait until nightfall and approach the stronghold, a multi-story brick structure as ugly as it is functional. \n        *goto outside_the_gates\n        \n    *else\n        You managed to meet up with ${aldon_name} and company after they got back to Greywood, when you informed them you weren't able to overtake the carriage. Aldon held a quick meeting to discuss a plan. After a bit of frustrated venting, the party agreed to meet at a designated spot near the stronghold, at night. The \"at night\" part was your contribution to the plan.\n        *goto outside_the_gates\n            \n*label outside_the_gates\n\nYou arrive near the stronghold under darkness of night. You notice a double-sized guard contingent manning the front gate. All the windows are covered with metal bars. The guards have torches and a bonfire going in front, but elsewhere the building is shrouded in blackness.\n\n*if (work_with_party = 0) \n    \n    *if (party_captured = 0)\n        Suddenly you see a group of figures moving in the shadows closer to the stronghold. They're sticking to the darkness reasonably well, but your keen eye spots a woman in a red robe and that gruff fellow in plate mail duck around a corner. It's that party again, and it looks like they want another crack at the gold too. Perhaps you could use this to your advantage?\n        *goto party_entrance_thief_alone\n    *else\n        *goto thief_entrance_alone\n    \n*else\n    *if (party_captured = 1)\n        *goto thief_entrance_alone\n    *else \n        \"Looks like they doubled the guard,\" Aldon says.\n        \n        \"That looks like a lot of guards, Aldon,\" Tiff says. \n        \n        \"And those are just the ones we can see,\" Gorob adds. \"You sure this is a good idea?\"\n        \n        \"We can handle this,\" Aldon says. \"Rexa, ${player_name}, come over here, we need to work on a plan.\"\n        *goto party_entrance_thief_together\n        \n\n*label thief_entrance_alone\n\nSticking to shadows and cover, you slowly make your way closer to the stronghold. With a bit of luck and skill, you sneak by the outer guard and find yourself at the inner courtyard in front of the main entrance. \n\nYou see four guards patrolling around a makeshift bonfire in the center of the courtyard. Four more guards are posted right in front of the main gate. All of the guards are wearing armor and look well armed. From the looks of things, they're probably hired mercenaries. \n\nThere's no other entrances on this side of the building, and all the ground floor windows are covered with iron bars. \n\n*label thief_entrance_alone_options\n\nYou weigh your options.\n\n*choice\n    # Make a distracting sound to draw the guards away\n        You find a discarded bottle and give it a good toss. The shattering noise echoes nicely throughout the courtyard.\n        \n        \"Who's there?\" one guard cries out, and another guard grabs a torch out of the bonfire. \"Let's go check it out,\" he says and two guards wander off.\n        \n        You've reduced the numbers, but there's still a lot of guards still between you and that front gate.\n        *goto thief_entrance_alone_fewer_guards\n    \n    # See if there's another way in\n        *if (player_tried_side_of_stronghold > 0) \n            You already checked the side, but maybe you missed something.\n            *goto thief_entrance_try_side\n        *goto thief_entrance_try_side\n    \n    *if (brought_smokebomb > 0) # Toss that smoke bomb you're carrying into the bonfire\n        *goto thief_entrance_smokebomb\n\n*label thief_entrance_try_side\n\nIt really doesn't seem like you're getting in through the front, but maybe there's a side entrance that's a little less...busy? You make your way around some trees and head to one side of the building, double-checking that no one spotted you.\n*goto thief_side_alone\n\n*label thief_entrance_smokebomb\n\n*set brought_smokebomb 0\n        \nYou've been lugging this smoke bomb around long enough, time to use it!\n        \nYou toss it into the bonfire and it explodes with a satisfying pop. In mere seconds the entire courtyard is filled with a dense layer of smoke. \n        \nYou here a chorus of yells and panicked orders coming from the guards. \"What happened?\" \"Stay at your positions!\" \"No, no, we're sitting ducks if we stay!\" \"I've gotta get out of this smoke!\" \"Wait, don't leave me!\" \n        \nUsing your superior sense of direction, you carefully make your way to the front gate. You almost run into the one guard still standing by the gate but fortunately his back is to you, so staying out of his line of vision, you reach the actual gate. \n        \n\"I can't see anything,\" the guard near you yells out. \"Of course you can't, you idiot, the place is filled with smoke,\" someone yells back. \"Who said that? Rory, you take that back!\" The guard walks off into the smoke and disappears.\n        \nThe gate lock is no match for your lock-picking skills, and in moments, you're inside the stronghold!\n*goto thief_inside_alone\n\n\n\n\n*label thief_entrance_alone_fewer_guards\n\nSo, what to do about those remaining guards?\n\n*choice\n    # There's not [i]that[/i] many, see if you can sneak by\n        You've used stealth to get through trickier situations than this in the past. Surely these guards won't notice a little thief skilled at hiding in shadows?\n        \n        You take the long way around the courtyard, sticking to a convenient low wall. One of the guards by the bonfire decides to start patrolling, so you pause for a 3 count, and then race by as his back is turned.\n        \n        Another guard decided to walk in your direction, so you stay low and behind a bush, wait for him to pass, and then continue. You're almost at the gate!\n        \n        Finally, you hug the wall and the shadows, position yourself between the two guards at the gate, and slowly back your way to the gate, keeping your eye on the backs of both guards.\n        \n        \"This was far too easy,\" you think to yourself, just as you back straight into another guard that was coming out of the building.\n        \n        \"Going somewhere?\" the guard asks as he pins your arms to your sides. \"Straight to a cell, me thinks,\" says one of the other guards that have turned to face you. \n        \n        [b]THE END[/b]\n        *goto fatal_end        \n\n    # See if there's another way in\n        *goto thief_entrance_try_side\n    \n    *if (brought_smokebomb > 0) # Toss that smoke bomb you're carrying into the bonfire\n        *goto thief_entrance_smokebomb\n    \n    # Try another distraction\n        Maybe you can just keep doing this until they all leave. Admittedly, this isn't the best strategy you've ever come up with. But, desperate times and all that.\n        \n        You find another empty bottle (who's leaving all these bottles lying around?) and give it a good toss into the darkness.\n        \n        \"What was that?\" one of the remaining guards says. \n        \n        \"You find anything Rory?\" another of the guards yells out.\n        \n        \"Nothing yet,\" a voice off in the darkness yells back.\n        \n        \"It's probably some kid,\" one of the guards by the entrance says. You two go help Rory and Ableton.\"\n        \n        Two more guards amble off into the darkness. You start searching for yet another bottle, and then hear some heated yelling.\n        \n        \"Hey, we don't need any help, get back to your post.\"\n        \n        \"Don said we needed to help you.\"\n        \n        \"Well Don is just an idiot then.\"\n        \n        \"Hey!\" a guard near the gate yells. \"I can hear you, you know.\"\n        \n        \"Good, so I guess you're not a deaf idiot,\" the voice says.\n        \n        \"That's enough out of you,\" the guard says, and heads off in the direction of the voice. \"Wait, guys, infighting is strictly forbidden!\" the other guard at the gate says and also runs off. Which, amazingly, leaves the gate completely unguarded!\n        \n        You slip by the few remaining guards and pick the gate lock while their backs are turned and slip into the stronghold. \"I can't believe that actually worked,\" you think to yourself.\n        *goto thief_inside_alone        \n\n*label thief_side_alone\n\nThe side of the building is barely lit, mostly by interior torches visible through the windows. There's no side door that you can find, nor any open windows. There is, however, a partially dismantled scaffold that you might be able to make use of. Also, there's a barrel sitting next to the wall that has a particularly horrible smell. \n\nMaybe you could...\n\n*choice\n    # Try climbing the scaffolding and see where it leads\n        You make your way up the scaffolding. It's extremely flimsy-feeling, but it's holding together. There's a brief moment where you feel the whole thing is going to come crashing down, but miraculously it doesn't. \n        \n        You make it near the roof, and with a bit of dedicated wall-climbing, you're on the roof looking for access.\n        \n        Sadly, the roof is about as interesting as the rest of the Merchant's Guild — no visible entrances. \n\n        As you make your way back down, you hear a voice near one of the windows, and realize that the window is unlocked and cracked open a bit. You can barely hear someone speaking inside, but you can't hear what they're saying. \n\n        *choice\n\n            # Try and slip inside and avoid detection\n                There's someone in there, but it sounds like it's just one person, so if you're quick, you can probably subdue the individual without alerting any guards. \n\n                You take a peek through the window, and see what appears to be some sort of small mostly empty room. You don't see anyone, and the voice has stopped, but you only got a quick look. Regardless, you pull open the window, and cautiously step in.\n                *goto thief_with_kid\n\n            # Going in through the window seems too risky, better to climb back down \n                Clearly there's someone in there, and you have no idea what you'd be up against going inside. One yell and the guards would be on you in minutes. You head back down the scaffolding and go back to the front of the building to look for better options.\n                *goto thief_entrance_alone_options        \n    \n    # See what's up with that stinky barrel\n        As you get closer to the barrel, you realize it smells like bad alcohol. [i]Really[/i] bad alcohol. Probably not drinkable. \n        \n        Although, maybe still flammable? \n        \n        While holding your breath, you very quietly roll the barrel back around near the front of the stronghold. You find a nice little slope that you can push the barrel down, and by your own calculations, it should roll right into that bonfire. So, you give the barrel a little push...\n        \n        The ensuing explosion sends some guards flying, and others screaming. Amidst the chaos, you slip into the stronghold undetected!\n        *goto thief_inside_alone        \n        \n    # Head back to the front of the building and rethink things\n        None of these options seem destined for success. Might be better to just head back to the front of the building for now. You quietly head back and find yourself looking at the front of the stronghold again, from a safe spot.\n        *goto thief_entrance_alone_options\n\n\n*label thief_with_kid\n*page_break\n\nYou step into a small room lit by a single lantern. There's a couple boxes in the room, and not much else. You notice what appear to be a bunch of playing cards scattered on the floor. As you lean down to inspect them, a young child with blond hair steps out from behind one of the boxes.\n\n\"Who are you?\" he says, looking at you with wide, surprised eyes.\n\n*choice\n\n    # \"I'm someone you don't want to trifle with kid, now get out of my way.\"\n\n        You really don't have time to be explaining yourself to some kid. But, as you step forward, the child lets out a surprisingly loud scream! You've dealt with alarm whistles that were less shrill.\n\n        The room door flies open and two guards immediately enter. \"Are you in danger, Master Timothy?\" one guard says and draws his sword. The other guard quickly ushers the young boy out of the room so the guards can deal with you.\n\n        After a brief scuffle, the guards have you bound and bring you down to the dungeons, where you'll have to explain to some Merchant's guild judge why you terrorized a small child.\n\n        [b]THE END[/b]    \n        *goto fatal_end\n\n    # \"I was just walking around this building and got lost.\"\n\n        \"How did you get in this room?\" the kid asks.\n\n        \"I slipped in while you weren't looking.\"\n\n        \"My father always says the proper thing to do is announce oneself as you enter a room.\"\n\n        \"Your father sounds like a man who knows his manners.\"\n\n        \"Yes, he's a very important merchant here. He's so important they always have him working late. That's why he put me here. Do you want to meet him? He'll probably be back soon.\"\n\n        \"That won't be necessary.\"\n\n        \"Do you want to play a game with me? I'm frightfully bored. I'm so bored I could just start screaming.\"\n\n        *choice \n\n            # You agree to play a game with the kid.\n                You explain that if you win, you'll be on your way, and the kid can't tell anyone he saw you.\n\n                \"And if I win, we have to play again!\" the kid says. Grudgingly, you agree to these terms.\n\n                \"Here,\" the kid says and collects the playing cards off the floor. \"We'll each take turns drawing cards. We add up all the numbers we get, and the first person to have more than ${card_game_winning_value} wins.\"\n\n                You ask what sort of cards these are. \n\n                \"Oh, they're just a bunch of different numbers, see?\" The kid shows you a single card that has the number \"7\" written on it in illustrative script. \"I'm supposed to use these to practice math and stuff, but I'd rather just play a game.\"\n\n                You ask how high the numbers go. \"I think the highest number is 9.\"\n\n                The kid dexterously shuffles the set of cards and places the deck face down on the floor. \"I'll go first,\" he says. \n                *goto thief_playing_game_with_kid\n\n            # You don't have time to play games with children. \n                \"Okay,\" the kid says. \"I think I'll try screaming then. Do you want to hear how loud I can get? I can get very loud. Here, listen to this.\"\n\n                The kid proceeds, despite your protests, to start screaming at the top of his lungs. He was not boasting about his capabilities, as his screams are loud enough that you have to cover your ears with your hands.\n\n                The room door flies open and two guards immediately enter. \"Are you in danger, Master Timothy?\" one guard says and draws his sword. The other guard quickly ushers the young boy out of the room so the guards can deal with you.\n\n                After a brief scuffle, the guards have you bound and bring you down to the dungeons, where you'll have to explain to some Merchant's guild judge why you made a small child scream.\n\n                [b]THE END[/b]    \n                *goto fatal_end\n\n            *if (has_merchant_pass > 0) # Maybe the kid would be interested in that medallion you found near the gargoyle\n\n                You bring out your shiny medallion to show to the kid. His eyes get very wide.\n\n                \"Wow, that's one of those special medallions my Dad's always talking about. He says only very special people get one of those. How did you get one?\"\n\n                You tell him it's not important. Rather, you offer the medallion to the kid, with the agreement that there will be no screaming, and that the kid has to promise he won't tell anyone he saw you.\n\n                \"Agreed!\" the kid says and holds out his hands.\n\n                You part with the medallion and leave the room. Once out of the room, you find yourself in a hallway that thankfully has no guards on duty. You see a somewhat nervous-looking merchant head off down the hallway. You decide to follow him. He slips into some nondescript room, and you wait a bit before you walk into the room yourself.\n\n                *goto inside_marqley\n\n*label thief_playing_game_with_kid\n*page_break\n*rand random_card_value 1 9\nThe child draws a card with ${random_card_value} written on it. \n\n*if (random_card_value > 5)\n    \"Oh good, I got a high card,\" the kid says.\n*else \n    \"Drat, it's a low card,\" the kid says.\n\n*set kid_card_total + random_card_value\n*if (kid_card_total > card_game_winning_value)\n    \"I win!\" the kid says, with obvious glee, and shows you his cards. \"Let's play again!\"\n\n    *choice\n        # Play another game with the kid\n\n            You agree to play another game. The kid shuffles the cards. \n            *set kid_card_total 0\n            *set player_card_total 0\n            \"I'll go first again,\" he says and draws a card.\n            *goto thief_playing_game_with_kid\n\n        # Tell kid you really have to be going\n\n            \"But I'm still having fun! If you leave now, I'll just have to scream at the walls or something. Do you want to hear me? I'm very good at screaming.\"\n\n            *choice\n                # Agree, with a sigh, to play another game\n\n                    \"Yay!\" The kid shuffles the cards and draws a card.\n                    *set kid_card_total 0\n                    *set player_card_total 0\n                    \"I'll go first again,\" he says and draws a card.\n                    *goto thief_playing_game_with_kid\n\n                # Let the kid scream his head off\n\n                    The kid shrugs his shoulders and starts screaming. He wasn't kidding about being good at screaming, he's exceedingly loud. \n\n                    You try to put your hand over the kid's mouth, but before you can, the room door flies open and two guards immediately enter. \"Are you in danger, Master Timothy?\" one guard says and draws his sword. The other guard quickly ushers the young boy out of the room so the guards can deal with you.\n\n                    After a brief scuffle, the guards have you bound and bring you down to the dungeons, where you'll have to explain to some Merchant's guild judge why you made a small child scream.\n\n                    [b]THE END[/b]    \n                    *goto fatal_end\n*else\n    \"It's your turn,\" the kid says. You draw a card.\n\n    *rand random_card_value 1 9\n    Your card has ${random_card_value} written on it. \n\n    *set player_card_total + random_card_value\n    *if (player_card_total > card_game_winning_value)\n\n        You smile and show the kid your cards. \n\n        \"Aww, you win,\" the kid says. \"I was having fun. Oh well.\"\n\n        You consider telling the kid he'll have better luck next time, but keep this to yourself, lest the kid think this is an invitation to play another game. Instead, you bid the child farewell and leave the room.\n\n        Once out of the room, you find yourself in a hallway that thankfully has no guards on duty. You see a somewhat nervous-looking merchant head off down the hallway. You decide to follow him. He slips into some nondescript room, and you wait a bit before you walk into the room yourself.\n\n        *goto inside_marqley\n    *else\n        \"My turn again,\" the kid says.\n        *goto thief_playing_game_with_kid\n\n\n*label party_entrance_thief_alone\n\nYou wait for the party to make the first move. You don't have to wait too long.\n\nSuddenly, a bright red glowing orb appears over the bonfire, and floats slowly towards the guards. \"What in blazes is that?\" a guard cries out.\n\n*if (knows_blindfire > 0)\n\n    Unlike the guards, you've heard about blindfire spells before, and also unlike the guards, you know well enough to look away right before the orb bursts in a brilliant flash of white.\n\n    *goto party_entrance_thief_alone_after_blindfire\n\n*else\n\n    Like the guards, you're somewhat mesmerized by the glowing red orb and as you watch, it explodes in a brilliant white burst of light.\n\n    Unfortunately, this burst of light renders you temporarily and completely blind.\n\n    By the time you regain your eyesight, you have just enough time to see the pommel of a sword headed right towards your face. You wake up later in chains, in the Merchant's Guild dungeon.\n\n    [b]THE END[/b]    \n    *goto fatal_end\n\n*label party_entrance_thief_alone_after_blindfire\n\n\"I can't see anything!\" another guard astutely yells. \"Assemble here, follow my voice,\" a third guard yells. You watch as the blinded guards stumble a bit but manage to form a bit of a phalanx right in front of the gate.\n\nOut of the darkness the man in plate armor, along with the woman in chain mail and the barbarian-looking fellow rush the gate. They have the sight advantage, but the guards have the numbers and manage to hold together, blinding swinging swords and pole-arms.\n\nThe woman in the crimson robe steps in front of the bonfire and begins hand motions that suggest she's about to cast another spell, aimed at the front gate.\n\nYou notice one guard, who apparently avoided the blindfire spell, stealthily advancing on the woman in the crimson robes. Meanwhile the rest of the party seems to be at a stalemate with the guards at the gate, and that spell will be wearing off soon. You ponder what to do.\n\n*choice\n    # Deal with that guard sneaking up on the woman in crimson. Whatever she's about to cast could tip the scales a bit.\n        You slip around and take a position behind the sneaking guard. As you approach him from behind, you see him slowly loosening his sword from the scabbard. Right as the guard is almost on top of the woman, you clock the guard on the side of his helmeted head with a handy rock you found earlier.\n        \n        The woman in red doesn't even seem to notice and is completely focused on completing some spell. \"Maybe she'll thank me later,\" you think to yourself.\n        \n        Just as she's about to cast, the guard you thought was knocked out manages to crawl forward and grab and pull the woman's crimson robe as she casts. The ensuing spell, somewhat like a bolt of lightning, flashes from her hands to the guards at the door. There's a brief explosion as guards and party members alike are all flung away from the gate. \n        \n        The gate is completely unmanned at this point, so you leave the woman in red to deal with the one guard trying to distract her. You get to the gate in the ensuing chaos  The gate lock is no match for your lock-picking skills, and in moments, you're inside the stronghold! \n        \n        *goto thief_inside_alone\n    \n    # Go help the skirmish at the gate. \n        You walk up to the gate. The party members seem to have dispatched a number of guards, but there's still plenty more. \n        \n        No one's seen you yet. There's a couple different ways to approach this.\n        \n        *choice\n            # Leap into the fray and fight the guards with the party\n                With a made-up-on-the-spot war cry of \"huzzah!\" you throw yourself into the fight. Unfortunately, this proves fruitless, as a reinforcement battalion arrives and wrestles you and the rest of the party to the ground.\n                \n                You wake up in a cell, with nothing but bruises to reflect on.\n                \n                [b]THE END[/b]\n                *goto fatal_end   \n            \n            # You're not much of a fighter. Maybe you can come up with some sort of diversion?\n                Fighting's never been your strong suit, so perhaps a reckless attempt to join the fight isn't going to get you very far. \n                \n                Instead, you improvise and yell out \"Everyone away from the building, there's a bomb set to go off!\"\n                \n                This is enough for everyone to pause and look your way. You frantically wave your hands in one direction and run off, hoping someone will follow. And sure enough, everyone runs in your direction.\n                \n                Using some low walls for hiding, you circle back while everyone else is taking cover. You run up to the unguarded gate, pick the lock in seconds, and make your way into the stronghold!\n                \n                *goto thief_inside_alone\n            \n            # Maybe you can slip into the stronghold unnoticed?\n                Given a choice between stealth and fighting, you'll pick stealth every time. Problem is, everyone is fighting right in front of the gate, leaving you no room to slip by.\n                \n                Just as you try and come up with a different plan, the gods must be smiling, because one of the guards somehow slips and falls on his back, which causes another guard to trip over him. Several other guards hurry over to help everyone up, leaving a large gap in the guard formation. \n                \n                You pick just the right moment during this comedy of errors and dash through the gap to the gate, lock picks in hand. Before the guards can even say anything, you've picked the lock and you're in the stronghold!\n                \n                *goto thief_inside_alone\n            \n*label party_entrance_thief_together\n\n\"Obviously we need a distraction,\" Tiff says. The party concurs, and then several eyes turn to you.\n\n*choice\n    # Volunteer (grudgingly) to provide a distraction\n        You take the hint and suggest that you can draw some guards off to one side of the stronghold while the rest of the party makes their way to the other side. However, you're quick to point out that you're probably only going to be able to draw off a few guards.\n        \n        \"That's still going to leave a lot of guards,\" Gorab says. \"Probably at least 2 to each of us.\"\n        \n        \"I don't like those odds,\" Tiff says.\n        \n        Aldon muses on this for a bit, then looks at Rexa.\n        \n        \"Do you have anything in your bag of tricks that can even the odds?\"\n        \n        Rexa looks at the bonfire and says, \"I just might.\"\n        *goto rexa_casts_blindfire\n    # Suggest maybe someone else in the party might be a better choice\n        You're no coward, but one little thief against a armed squad of guards doesn't seem very fair. Also, you point out that even if you're successful, it's not like all the guards are going to be distracted.\n        \n        \"That's true,\" Tiff notes. \"They may be unsophisticated mercenaries, but they're not going to all abandon their post.\"\n        \n        Aldon muses on this for a bit, then looks at Rexa.\n        \n        \"Do you have anything in your bag of tricks that can even the odds?\"\n        \n        Rexa looks at the bonfire and says, \"I just might.\"\n        *goto rexa_casts_blindfire\n    *if (brought_smokebomb > 0) # Mention that you brought a smokebomb\n        \"Now we're talking,\" Gorab says. \n        \n        \"Where'd you get that?\" Aldon asks. You confess you bought it a long time ago from a less-than-respectable merchant, but it should work.\n        \n        \"It's worth a shot. You can probably chuck it into that bonfire,\" Tiff says. You explain to her that you were planning on doing exactly that.\n        \n        \"Once the smoke starts, we make for the gate, understood?\" Aldon says. Everyone agrees.\n        *goto party_with_smokebomb\n    \n*label rexa_casts_blindfire\n*page_break\nWith everyone staying out of sight, Rexa stands up and slowly approaches the bonfire. Aldon whispers, \"Careful that they don't see you!\"\n\n\"I have to be close enough to the fire to cast,\" she whispers back.\n\nJust when it seems she's going to be spotted, she stops, and starts waving her hands in a circular motion. The bonfire starts to glow red, and suddenly a small glowing red orb rises up out of the fire, floating a few feet in the air.\n\n\"Bill, what's that?\" a guard near the bonfire says and elbows the guard next to him. \n\n\"What, the fire?\"\n\n\"No, that thing above it.\"\n\nThe other guard draws his weapon. \"Hey guys? There's something funny going on over here.\" Several of the other guards approach the fire, leaving just a few standing in front of the gate.\n\n\"Better shut your eyes,\" Tiff tells you, and you realize everyone else has their hands over their eyes. As you shut your eyes, you hear Rexa whisper \"Flarga!\"\n\nEven through your closed eyes you detect some sort of flash. Several guards cry out. You open your eyes and see all of the guards blinking into space as if they were blind. \n\n\"Now!\" Aldon says, and as a group, you rush forward towards the gate.\n*goto thief_party_rush\n\n*label party_with_smokebomb\n*page_break\n*set brought_smokebomb  0\nWith everyone out of sight, you creep forward in the darkness until you're just within range of the bonfire. The guards are facing the wrong direction, so all you need to do is toss the bomb into the bonfire and see what happens.\n\nTaking aim, you toss the smokebomb in a nice arc and land a couple feet short of the bonfire. Fortunately for you, you hit a patch of dirt and the smokebomb rolls forward, right into the fire.\n\nThere's a loud [b]thump[/b] and smoke starts practically flowing out of the fire. \n\n\"Bill, did you leave some of that meat you were cooking in the fire?\" a guard says.\n\nWithin minutes, the entire space is filled with smoke, so much so that you can barely tell where the bonfire was. You make your way back to the party and tell them the good news.\n\n\"Time to go,\" Aldon says, and as a group, you rush forward towards the gate.\n*goto thief_party_rush\n\n*label thief_party_rush\n*page_break\nWith most of the guards out of the picture, the party rushes the front gate. The handful of guards put up a brave front, but after a bit of a scuffle, Gorab, Tiff, and Aldon knock the guards unconscious. \n\n\"Well that was pretty easy,\" Gorab says, just as the gate opens and an entire squad some 20 guards strong comes pouring out of the stronghold. \n\n\"Retreat!\" Aldon yells and the party quickly turns to run. You're about to join them and then feel a strange, buzzing sensation in your legs and arms. \n\n\"A short-lived bodysprint spell,\" Rexa yells your way. \"Use it well.\"\n\nYou feel a burst of energy take hold. The approaching guards seem to be moving in slow motion. Without hesitation you run right around the approaching guards, through the gate, and close the gate behind you. You turn and see the guards still running in search of the rest of the party. And just like that, the spell wears off and your legs and arms feel heavy. But the guards never even saw you. \n\nLooks like the rest of the party will have to come up with another plan, but for now, you're inside the stronghold!\n*goto thief_inside_alone\n\n\n*comment --------- Inside stronghold -----------\n\n*label thief_inside_alone\n\n*page_break\n\nYou're inside the Merchant's Guild stronghold. It's surprisingly quiet in the large main hall. Maybe they sent everyone they had to guard the outside.\n\nThe whole hall is filled with lanterns and fires burning in wide hearths, giving the place an unexpectedly warm feeling. There's a couple people (guild members most likely, based on all the fur capes and green vests) milling about or chatting on benches. None of them are paying any attention to you. \n\nYou recall overhearing some Merchants Guild members once discussing some sort of \"upstairs vault\", so chances are pretty good the gold is on the second floor. \n\nYou take a quick survey of possible ways around the place.\n\n*set stronghold_stairway_guards_attempted 0\n*set left_party_in_dungeon 0\n\n*label inside_at_stairs\n\n*choice \n    *if (stronghold_stairway_guards_attempted = 0) # There's a main staircase up at the end of the room, although it looks like there's a couple guards blocking the way up.\n        You've already gotten past several guards this evening. What's a couple more?\n        \n        As you approach the stairway, you notice the guards already watching your approach with a keen eye.\n        \n        \"Going somewhere?\" one guard asks.\n        \n        You point out that you'd like to go upstairs.\n        \n        \"We don't know you,\" the guard points out, \"and you don't look like you belong to the guild.\"\n\n        \"Maybe this person's part of the kitchen crew,\" the other guard says.\n        \n        \"Doesn't look like kitchen staff either, not wearing the appropriate attire,\" the first guard says. \"Off with you then,\" he says and taps his sword hilt just in case you didn't get the message that he means business. \n        \n        They seem pretty set against you getting upstairs. Maybe there's another way?\n        \n        *set stronghold_stairway_guards_attempted 1\n        \n        *choice\n            # Make up some story about \"official guild business\"\n                \n                You come up with some story about some sort of emergency trade embargo with the Duchy of Seagreen, and that it's of the utmost urgency to inform the guild leaders.\n                \n                \"A trade embargo?\" the guard says. \"I think we would have heard of that.\"\n                \n                \"Especially with Seagreen, given that we don't have any sort of trade agreement with them.\" the other guard, apparently a want-to-be merchant himself, notes.\n                \n                You try to threaten them with disciplinary action, but they're not buying it. \n                \n                \"Yeah, I think this discussion is over,\" the first guard says and grabs you by the arms while the other guard binds your hands behind your back. \n                \n                They take you down to the dungeons and tell you you'll get to speak to the guild leaders, maybe in a couple years.\n                \n                [b]THE END[/b]\n                \n                *goto fatal_end\n            \n            # Point out one of the guard's shoes have come untied\n                \n                You point at their feet and mention the dangers of untied shoes while on the job. Neither guard looks down.\n                \n                \"We fell for that one last week, with that cheeky fellow, some sort of thief I think.\"\n                \n                \"Good thing he didn't get very far.\"\n                \n                \"Farther than you're going to get,\" the guard says and grabs you by the arms while the other guard binds your hands behind your back. \n                \n                They take you down to the dungeons and tell you that you'll have a couple years to come up with better material.\n                \n                [b]THE END[/b]\n                \n                *goto fatal_end\n            \n            # These two don't look like they're easily fooled. Best look for a different way up.\n                \n                You apologize to the guards, noting you must have taken a wrong turn, and head back to the main hall to look for another option.\n                \n                *goto inside_at_stairs\n\n            *if (has_merchant_pass > 0) # Wait, there's that weird medallion you acquired from that gargoyle on the roof.\n\n                You present the odd medallion and the guards inspect and suddenly look nervous.\n\n                \"We are so sorry,\" one of the guards says.\n\n                \"We had no idea,\" the other guard says. \"We were not expecting a Merchant's Guild official from the front office tonight. Please make your way upstairs.\" The guards stand aside to let you pass.\n\n                Upstairs, you wait for a bit, and then see a somewhat nervous-looking merchant head off down the hallway. You decide to follow him. He slips into some nondescript room, and you wait a bit before you walk into the room yourself.\n\n                *goto inside_marqley\n            \n    # There's a small hallway in the back end of the hall. Maybe there's another way up?\n        \n        You head down a small hallway, hoping that there's some other way up. As you make your way, you detect the aroma of food! There must be some sort of kitchen this way.\n        \n        *goto inside_kitchen\n    \n    *if ((party_captured = 1) and (left_party_in_dungeon = 0)) # Off in the corner you notice a set of stairs downwards\n        \n        Admittedly you want to be going up, not down, but maybe there's something useful down those stairs? You make your way downwards, and soon find yourself in the stronghold's dungeons.\n        \n        *goto inside_dungeons\n            \n               \n\n*label inside_kitchen\n\n*page_break\n\nYou enter a huge kitchen, filled with people busily preparing the evening meal. Pork and poultry are roasting in the main fire pit under the watchful eye of several chefs. A stone oven takes up most of the far wall, and you see various breads and other baked goods turning a golden brown. Along a long table many servants are preparing the food, or arranging dishes on serving plates. The smells of a feast fill the air and remind you that you haven't really had a good meal in a while.\n\n\"Oh good, you're finally here,\" a short, long-nosed man says behind you. You turn to face him. \n\n\"We're really short on servers tonight, so you'll need to grab a robe off the hook over there and take that soup bowl upstairs to the dining hall.\" He motions to a large bowl of soup at the end of the long table, and then looks at you expectedly. \n\n*choice \n    # Explain that there's been some misunderstanding and that you're not the person he was expecting.\n        \n        You clarify that you're not part of the hired staff, and that you're simply a visitor. The man gives you a disapproving look. \n        \n        \"Honestly I don't really care,\" he says. \"We're short-handed and need someone to bring this soup upstairs right now. Can you do that?\"\n        \n        *choice\n            # Grab a robe, grab the soup and go\n                You don a simple green robe, grab the soup bowl with both hands, and carry it back to the main hall, being careful not to spill anything. \n                \n                *set stronghold_wearing_servant_robe 1\n                *goto inside_soup_upstairs\n                \n            # Just grab the soup and go. That robe really clashes with your outfit\n                You grab the soup and make your way back to the main hall. The long-nosed man calls after you but you're just happy to get out of there without drawing even more attention.\n                \n                *goto inside_soup_upstairs\n                \n            # Refuse -- you're not a servant after all\n                You make it clear you're not here to carry anyone's soup. \n                \n                \"So what are you doing in the kitchen then?\" the man asks.\n                \n                You go into a grand story about how you're part of an inspection crew looking into reports of illegally obtained meat, but the guy isn't buying it, and eyes you suspiciously.\n                \n                \"Are you even in the Merchant's Guild? You look more like someone who would be part of that shady Thieves Guild down the street.\"\n                \n                You protest the association with the Thieves Guild, pointing out how outrageous their membership fees are. \n                \n                Just at that moment, several guards suddenly show up. \"We're looking for a thief that slipped past the guards. Do you know this person?\"\n                \n                The man shakes his head. \"I've no idea who this person is.\"\n                \n                The guards quickly grab you and escort you down to the dungeons. You're told you'll have plenty of time to get your story straight on just exactly what you were doing in the kitchen.\n                \n                [b]THE END[/b]\n                \n                *goto fatal_end\n\n    # Play along and grab a robe and the soup. This seems like a perfect opportunity to get upstairs.\n        \n        You accept your task and don a simple green robe. It's not a great fit, but it'll do. As you grab the soup bowl with both hands, the man reminds you that people are waiting.\n        \n        \"Make haste. I don't want to hear that the soup was served cold.\"\n        \n        You make your way back to the main hall, soup in hand(s). \n        \n        *set stronghold_wearing_servant_robe 1\n        *goto inside_soup_upstairs\n    \n    # Just grab the soup and go before anyone asks you any more questions.\n        \n        You grab the soup and rush right out before anyone can say anything. \n        \n        As you hurry back towards the main hall, you hear the man yell that you've forgotten something, but you pretend you didn't hear him. \n        \n        *goto inside_soup_upstairs\n                                \n\n*label inside_soup_upstairs\n\n*page_break\n\nYou're back in the main hall holding a large bowl of soup. From the smell, it's probably some sort of chicken and barley soup. You make your way to the staircase leading to the second floor. The guards at the foot of the stairs move to intercept you.\n\n*if stronghold_wearing_servant_robe = 1\n    \n    You explain you have some very hot soup that needs to be brought upstairs as soon as possible.\n    \n    *if stronghold_stairway_guards_attempted = 1\n        \n        One of the guards looks at you and squints.\n        \n        \"You look familiar somehow,\" he says.\n        \n        \"It's just some random servant,\" the other guard says dismissively. \"Just look at that shabby green servants robe.\"\n        \n        \"I guess you're right,\" the first guard says. \"Why would I recognize some random servant? Up you go then.\"\n        \n        The guards let you pass, and you make your way upstairs.\n        \n        *goto inside_upstairs_dining\n    *else\n        \n        \"Soup eh? Smells good.\" one of the guards says.\n        \n        \"It must be coming straight from the kitchen. Look at the food stains on that servants green robe.\"\n        \n        \"Best not to keep people waiting, up you go,\" the guard says and lets you pass. You make your way upstairs.\n        \n        *goto inside_upstairs_dining\n    \n*else\n    \n    You tell the guards you're in a hurry, and need to bring this soup upstairs before it gets cold.\n    \n    *if stronghold_stairway_guards_attempted = 1\n        \n        \"Wait, I remember you,\" one of the guards says. \"You're the one that came here earlier, trying to get upstairs.\"\n        \n        \"That's right,\" the other guard says. \"Looks like now you've stolen a bowl of soup as well.\" He wrestles the bowl out of your hands, sets it on the ground, and pins your arms behind your back.\n        \n        \"Stealing food is a particularly heinous crime in this guild,\" the guard informs you, as they take you down to the dungeons.\n        \n        [b]THE END[/b]\n        \n        *goto fatal_end\n    *else\n        \"You don't look like kitchen staff,\" one of the guards says.\n        \n        \"Yeah, where's your green servants robe?\"\n        \n        You explain you didn't have time to put it on. The soup took priority.\n        \n        \"Time to put it on? All servants are required to wear the robe before they even set foot in this place. If you were a servant, you'd know that.\"\n        \n        One guard grabs the soup away from you while the other guard pins your arms behind your back.\n        \n        \"We're going to take a little trip to the dungeons downstairs, where maybe you'll tell us who you really are.\"\n        \n        [b]THE END[/b]\n        *goto fatal_end\n        \n\n*label inside_upstairs_dining\n\n*page_break\n\nYou arrive in a large dining hall, with a huge long table sitting on top of a tastefully arranged collection of bear skin rugs. Various artworks line the walls, however your keen eye notices many of them are cheap copies of other works. \n\nAround the table are seated at least ten different Merchant Guild members. At least, that's what you assume they are, given they're all wearing the usual green vests and fur capes. They're all being rather talkative and barely paying any attention to the huge amount of dishes arranged in front of them.\n\nThere are a number of servants here, clad in green robes like the one you are wearing, bringing food to the table, and replacing dishes and silverware. There seem to be four servants assigned to just pouring wine. \n\nYou set the soup bowl down near one end of the table, and a servant immediately starts portioning out the soup into bowls and placing them in front of the merchants seated at the table. \n\n*choice \n    \n    # Help serve soup and see if you can hear any conversations about the gold\n        \n        You nod at the servant serving the soup and start helping them serve the soup. The servant seems somewhat relieved that someone is offering to help.\n        \n        As you dole out the bowls of soup to various Merchant guild members seated along the table, you linger to listen to various conversations.\n        \n        \"I heard there was some commotion at the front gates earlier,\" one rather portly merchant says. \"Not to worry,\" says another merchant, \"This place is like a vault. No one is sneaking in here.\"\n        \n        \"They're increasing dues again next month,\" someone laments.\n        \n        \"This soup is remarkable,\" an older man says and tugs your sleeve. \"Give my compliments to the chef.\"\n        \n        \"I hear Marqley is in charge of distributing this month's gold,\" a merchant says and motions towards a shorter merchant with a crooked nose is surrounded by a crowd. \"Great,\" another merchant says while rolling his eyes. \"So he's going to take his cut as usual then?\"\n        \n        *goto inside_upstairs_dining_2\n        \n    # Ask the servants if they saw any gold go through here recently\n        \n        You wander around trying to look busy, moving things around on the table. As you do so, you cross paths with various servants, and you make casual conversation.\n        \n        \"Gold? We're not supposed to be looking for gold,\" one servant says nervously, and hurries off.\n        \n        \"I hear someone tried to rob the delivery carriage in the forest,\" another servant says, \"but the gold wasn't stolen. It's in this building somewhere. We'll never see it, that's for sure.\"\n        \n        \"Gold? Really? Why don't you ask Marqley yourself?\" yet another servant says, with a sneering laugh. He nods his head in the direction of one end of the table, where a rather short merchant with a crooked nose is holding court with a bunch of fellow merchants.\n        \n        *goto inside_upstairs_dining_2\n        \n    # Loudly ask if anyone's seen any gold recently\n        \n        You interrupt everyone's meal with an important question. Has anyone seen a carriage-load of gold make its way into the building?\n        \n        The room falls silent. \"What did you say?\" a shorter merchant at the end of the table says.\n        \n        Apparently merchants are hard of hearing, so you repeat your request. At which point, two armed guards appear out of nowhere and grab you by the arms. \n        \n        \"Take this fool to the dungeons,\" the short merchant says with a wave of his hand. \"Maybe there's gold to be found in a dungeon cell?\" \n        \n        The room erupts with laughter as you are dragged out, escorted to the dungeons below to await your fate.\n        \n        [b]THE END[/b]\n        *goto fatal_end\n\n*label inside_upstairs_dining_2\n\nYou make your way closer to this Marqley fellow at the head of the table, and position yourself just out of eyesight but close enough to hear his conversation.\n\n\"That was quite the escape you made in the forest, Marqley,\" a merchant says. \n\n\"Yes, but never fear gentlemen, the gold is safe and sound.\"\n\n\"How can we be sure? Perhaps the same band is trying to steal the gold a second time.\"\n\n\"I assure you, it is safe in the vault.\"\n\n\"Why don't we go take a look?\"\n\n\"Later my friends, later.\"\n\nAs you lean a little closer to listen in, another servant clumsily bumps into you, and drops several dishes that come crashing onto the floor. The servant runs off.\n\nMarqley's group all turn in your direction. You notice a guard rapidly approaching as well.\n\n*choice\n    \n    # Quickly bend down to clean up the mess\n        \n        To avoid anyone identifying your face, you crouch down and start gathering the broken plate pieces. You see the guard's heavy boots suddenly appear in front of you.\n        \n        \"What happened here?\" you hear the guard say.\n        \n        Without looking up, you inform him that another servant dropped the dishes and you're just cleaning up.\n        \n        \"Another servant you say? Very well, continue cleaning while I track down the fool that broke these dishes.\"\n        \n        The guard leaves, and you breathe a little easier. In a short while another servant comes and helps you dispose of the mess. When you return you notice Marqley appears to be gone.\n        \n        You ask the servant that was helping you if they know where Marqley ran off to. The servant shrugs. \"There's only two ways out of this hall, three if you count going back downstairs.\" She points to two hallways leading off from opposite ends of the room. You need to pick one and catch up to Marqley, but which one? \n        \n        *temp random_hallway 2\n        *rand random_hallway 1 2\n        *choice\n            \n            # Take the far hallway\n                \n                *if random_hallway = 1\n                    \n                    You race down the far hallway, hoping to catch up to Marqley.\n                    \n                    *goto inside_marqley\n                *else\n                    \n                    You race down the far hallway only to come face to face with a squad of guards. \n                    \n                    \"Isn't this the guy we're looking for?\" one guard says. The others concur and drag you down to the dungeons.\n                    \n                    [b]THE END[/b]\n                    *goto fatal_end\n            # Take the near hallway\n                \n                *if random_hallway = 2\n                    \n                    You race down the near hallway, hoping to catch up to Marqley.\n                    \n                    *goto inside_marqley\n                *else\n                    \n                    You race down the near hallway only to come face to face with a squad of guards.\n                    \n                    \"Say, isn't this the guy we're looking for?\" one guard says. The others concur and drag you down to the dungeons.\n                    \n                    [b]THE END[/b]\n                    *goto fatal_end\n    # Make a run for it\n        \n        You beat a hasty retreat, hoping to ditch the guard and come back later. You dash down a hallway, looking for a place to hide.\n        \n        You come across a small closet that would be perfect for hiding in. You open it up, only to find it already occupied by the servant that broke the dishes earlier. \n        \n        \"Get your own hiding spot,\" the servant says and slams the door shut.\n        \n        As you try and force the door open again, a contingent of guards turns the corner.\n        \n        \"Say, isn't this the guy we're looking for?\" a guard says. The rest of the guards concur and drag you down to the dungeons to await some terrible form of punishment.\n        \n        [b]THE END[/b]\n        *goto fatal_end\n    \n    # Exclaim loudly that are enemies at the gate again\n        \n        You make sure your voice sounds particularly panicked at the thought of fighting.\n        \n        A couple nearby diners start to scream loudly and run off, along with various servants. You notice Marqley opt to quietly slip away, running down a nearby hallway.\n        \n        As you're about to follow, the guard grabs you.\n        \n        \"Who told you there are people attacking the gate again?\"\n        \n        *choice\n            \n            # \"Bill, it was definitely Bill\"\n                \n                \"There's no one named Bill here,\" the guard notes. \n                \n                You try and explain he's new to the Guild, but the guard isn't buying it. He quickly subdues you and ties your hands together.\n                \n                \"I don't know who you are or what you're up to, but a couple days in the dungeon ought to sort all of that right up.\"\n                \n                [b]THE END[/b]\n                *goto fatal_end\n            \n            # \"Does it matter? You need to get down there and defend the gate immediately!\"\n                \n                The guard starts to shoot you a look of annoyance, then reconsiders. \n                \n                \"You stay right here while I check things out. Make sure no one leaves.\n                \n                The guard runs off, giving you the perfect opportunity to chase after Marqley.\n                \n                *goto inside_marqley\n            \n            # \"I heard it from the cook downstairs\"\n                \n                \"What? Since when does the cook care about stronghold defenses? And besides, how could you hear about that if you're up here?\"\n                \n                \"Something tells me you're hiding something. Maybe some time in the dungeons will make you tell us your secrets.\"\n                \n                [b]THE END[/b]\n                *goto fatal_end\n        \n\n*label inside_dungeons\n\nYou make your way down the stone steps that wind around and end in a fairly dark, somewhat damp, stone hallway under the stronghold. You slowly make your way down the hall, keeping to the shadows.\n\nThe hallway ends after a short distance, into a small room lit with torches. You can't quite see into the room, as there's a stout iron door that's partly closed in the way. You can hear some voices within.\n\n*temp random_prisoner_number 7\n*rand random_prisoner_number 5 100\n*choice\n    \n    # Wait a bit and listen to the voices\n        \n        You get closer to the door and listen to what sounds like two guards deep in conversation.\n        \n        \"So you've been working dungeon duty for 6 months now and you still don't know why we don't number or letter prison cells?\"\n        \n        \"No one's ever bothered to tell me.\"\n        \n        \"It's because the Guild likes a personal touch with its prisoners. We're not the city guard after all. We treat every prisoner like an individual, even referring to them by name if they have one.\" \n        \n        \"So what about that group we've got that tried to steal the gold in the forest earlier?\"\n        \n        \"We've registered each one by name. They were an uncooperative bunch.\"\n        \n        You've heard enough. kick the door open and walk in. The two guards are sitting at a table, and look at you with confusion.\n        \n        \"What is this all about?\" one guard asks.\n        \n        You inform the guards that you were sent from upstairs.\n        \n        \"Who sent ya?\"\n        \n        You let them know this is \"need to know\" information that they don't need to know. This actually seems to mollify them somewhat. But then, one of them eyes you suspiciously. \n        \n        \"If you were sent from upstairs, they must want one of the prisoners. So, which one is it?\"\n        \n        *choice\n            \n            # Prisoner 1\n                *goto bad_prisoner\n            # Prisoner 2\n                *goto bad_prisoner        \n            # Prisoner 3\n                *goto bad_prisoner\n            # Prisoner 4\n                *goto bad_prisoner\n            # Prisoner ${random_prisoner_number}\n                *goto bad_prisoner\n            # Prisoner who could be referred to as ${aldon_name}\n                \"Oh right, that guy. Yeah, sure, just go through that door, his cell is the first one on the right.\"\n                *goto inside_dungeons_cells\n            # Prisoner A\n                *goto bad_prisoner\n    \n    \n    # Barge right in, maybe catch some guards by surprise\n        You decide to adopt a \"no time like the present\" attitude and kick the door open and walk in. There are two guards sitting at a table, looking at you with confusion.\n        \n        \"What is this all about?\" one guard asks.\n        \n        You inform the guards that you were sent from upstairs.\n        \n        \"Who sent ya?\"\n        \n        You let them know this is \"need to know\" information that they don't need to know. This actually seems to mollify them somewhat. But then, one of them eyes you suspiciously. \n        \n        \"If you were sent from upstairs, they must want one of the prisoners. So, which one is it?\"\n        \n        *choice\n            \n            # Prisoner 1\n                *goto bad_prisoner\n            # Prisoner 2\n                *goto bad_prisoner        \n            # Prisoner 3\n                *goto bad_prisoner\n            # Prisoner 4\n                *goto bad_prisoner\n            # Prisoner ${random_prisoner_number}\n                *goto bad_prisoner\n            # Prisoner who could be referred to as ${aldon_name}\n                \"Oh right, that guy. Yeah, sure, just go through that door, his cell is the first one on the right.\"\n                *goto inside_dungeons_cells\n            # Prisoner A\n                *goto bad_prisoner\n\n*label bad_prisoner\n\n\"Hah, we don't use numbers or letters for prisoners. You would know that if you were part of the guild. I think you're not really part of the guild, are you?\"\n\nThe guards quickly overpower you and throw you into the very cells you were trying to get to.\n\n[b]THE END[/b]\n*goto fatal_end\n\n*label inside_dungeons_cells\n\nYou head down the dungeon hall, passing a number of empty cells, and suddenly find yourself in front of some familiar faces.\n\n*if (work_with_party > 0)\n    ${aldon_name} sees you approach. \"${player_name} well met! Do you think you can get us out of these cells?\"\n    \n    *goto inside_dungeon_cells_choice    \n    \n*else\n    The scruffy barbarian guy looks up from his cell and sees you, and exclaims, \"Hey, it's that person from the bar.\"\n    \n    \"How did you get in here?\" the chain-mail wearing woman asks. \"Have you been following us this whole time?\"\n    \n    \"Does it matter? Get us out of here and maybe we can help you down the road,\" the barbarian says.\n       \n    *goto inside_dungeon_cells_choice    \n    \n*label inside_dungeon_cells_choice\n\nYou take a look at all the party members in the cells and ponder what to do.\n\n*temp random_pickpocket_number 37\n*rand random_pickpocket_number 1 100\n\n*choice \n    \n    # Mention that you don't have the keys to the cells\n        \n        \"Ah, yeah, you're going to need those,\" ${aldon_name} says. \"One of the guards in the guardroom usually has a set.\"\n        \n        You make your way back to the guardroom.\n        \n        \"Done already?\" one guard says. \"I thought you needed to get one of the prisoners.\"\n        \n        You tell the guards you don't have keys to the cells. The guards seem surprised by this.\n        \n        \"You didn't get a set from upstairs?\"\n        \n        You notice a set of keys hanging off the belt of one of the guards.\n        \n        *choice\n            \n            # Ask for the keys to the cells\n                \n                You mention that it was a rush request and they told you a guard would provide keys.\n                \n                \"Must've been Harry. That guy is always in a hurry. Hah. Yeah, here you go. Be sure to drop them off with me on your way back.\n                \n                You hurry back to the cells, keys in hand. In a few moments, you have everyone freed. \n                \n                *goto inside_dungeon_free_prisoners\n            \n            # Distract them and try and steal the keys\n                \n                You're a thief, so pick-pocketing is one of your practiced skills. \n                \n                You point to a corner of the room and casually note that you've never seen rats of that size.\n                \n                \"Oh not the rats again,\" one guard says. \"Where did it go?\" the other guard says, and they both approach the corner. Now is your chance. \n                \n                *if random_pickpocket_number > 30\n                    \n                    With a quick swipe, you take the keys from the guard's belt without him even noticing. \n                    \n                    \"Do you see it?\" one of the guard asks. \"I think it ran over here,\" the other guard says. \n                    You hurry back to the cells, keys in hand. In a few moments, you have everyone freed. \n                    \n                    *goto inside_dungeon_free_prisoners\n                *else\n                    You try to pick the keys off the guard's belt, but lady luck is not on your side this time. \n                    \n                    \"Hey, what do you think you're doing?\" the guard says, catching you in the act.\n                    \n                    \"Looks like someone was trying to steal your keys.\"\n                    \n                    \"Maybe we've got a different kind of rat here, one that's with that party we've got locked up?\"\n                    \n                    \"Better lock this rat up too, just to be sure.\"\n                    \n                    [b]THE END[/b]\n                    *goto fatal_end \n                \n    # On second thought, better not to free the party. They'll just attract more guards\n        \n        You explain you can't take the risk, and bid the party farewell. The group is outraged, and ${gorob_name} tries to grab you through the bars.\n        \n        \"You best hope our paths don't cross again,\" ${aldon_name} yells at you as you leave.\n        \n        After a brief exchange with the guards again, you make your way back upstairs to the main hall.\n        \n        *set left_party_in_dungeon 1\n        \n        *goto inside_at_stairs\n    \n    # Offer to pick the cell door locks\n        \n        \"Have at it then, if you think you can do it,\" ${aldon_name} says, with a somewhat amused expression.\n        \n        You set to work, and the cell locks are surprisingly trivial to pick. In a few moments you have everyone freed.\n        \n        \"Impressive work,\" ${tiff_name} says. \n        \n        *if work_with_party > 0\n            \n            \"I told you we could trust this thief,\" Gorob says.\n            \n            \"I'm pretty sure you said no such thing,\" Tiff says.\n\n        *goto inside_dungeon_free_prisoners\n               \n                \n*label inside_dungeon_free_prisoners\n\n*page_break \n\n*if work_with_party > 0\n       \n    You notice that ${rexa_name}, unlike the others, had a gag placed over her mouth (and her hands bound). The party helps remove her restraints.\n    \n    \"We overheard the guards talking about a vault where they keep their gold. It's directly above us on the second floor,\" ${aldon_name} says. \n    \n    \"I can only teleport one person, and the vault itself is shielded so I can get you just outside it. You'll have to figure out how to get in it by yourself,\" ${rexa_name} says. \"Among us, you probably have the best chance of actually getting into the vault.\"\n    \n    \"We'll make our way out, give the guards a distraction to keep them busy. Good luck thief, I'm sure we'll meet again!\" ${aldon_name} says.\n    \n    \"One more thing thief,\" ${tiff_name} says. \"Watch out for someone called Marqley. He's responsible for the gold and will do anything to protect it.\"\n    \n    You watch as ${rexa_name} starts to move her hands in a wave-like pattern as she speaks some obscure incantation in a low voice. You feel momentarily light-headed, and everything around you seems to be fading in color, becoming white. You have the strangest sensation of floating in the air.\n    \n    Then, in a sudden flash, color rushes back into your field of view and you feel heavy again. You blink several times and find yourself in an entirely new place.       \n    \n    *goto inside_marqley\n\n*else\n\n    *set freed_party_but_not_working_with_them 1\n    \n    \"You did us a favor,\" ${aldon_name} says, \"so perhaps we could offer one in return.\"\n    \n    \"Or at least work together on something,\" ${tiff_name} adds.\n    \n    You notice that ${rexa_name}, unlike the others, had a gag placed over her mouth (and her hands bound). The party helps remove her restraints.\n    \n    \"We overheard the guards talking about a vault where they keep their gold. It's directly above us on the second floor,\" ${aldon_name} says. \"Rexa here is a spellcaster that can teleport you close to the vault.\"\n    \n    \"I can only teleport one person, and the vault itself is shielded so I can get you just outside it. You'll have to figure out how to get in it by yourself,\" ${rexa_name} says. \"You've probably got the best chance of actually getting in.\"\n    \n    \"One more thing thief,\" ${tiff_name} says. \"Watch out for someone called Marqley. He's responsible for the gold and will do anything to protect it.\"    \n    \n    \"We'll make our way out, give the guards a distraction to keep them busy. If you somehow manage to get the gold, remember who got you some of the way there,\" ${aldon_name} says.\n    \n    You watch as ${rexa_name} starts to move her hands in a wave-like pattern as she speaks some obscure incantation in a low voice. You feel momentarily light-headed, and everything around you seems to be fading in color, becoming white. You have the strangest sensation of floating in the air.\n    \n    Then, in a sudden flash, color rushes back into your field of view and you feel heavy again. You blink several times and find yourself in an entirely new place.       \n    \n    *goto inside_marqley\n\n*label inside_marqley\n\n*label checkpoint_save\n*if using_soft_save\n    *page_break End of Chapter\n    *set save_load true\n    *set return_to_scene \"vault\"\n    *goto_scene savegame\n*else\n    *finish    \n\n*label fatal_end\n*if using_soft_save\n    *page_break Restart Chapter\n    *set save_load false\n    *set return_to_scene \"guild\"\n    *goto_scene savegame\n*else\n    *ending", "party": "*temp aldon_hits 0\n*temp player_hits 0\n*temp aldon_fight_value 0\n\nA new day dawns. Or, rather, it will dawn in a short while. It's still dark out and you're packing to go. This gold heist isn't going to be easy, but you can already feel yourself getting excited. After packing all your usual thieves' tools, you've got room for only one more item. You rummage in your box of gear and decide to bring:\n*choice\n    #An old but serviceable dagger\n        You're not looking for a fight, but if things get messy, this dagger might come in handy.\n        *set brought_dagger 1\n        *goto forest_path_1\n    #A coil of stout rope\n        You never know when you're going to need some rope. Remember that time you fell into that pit in the Darkland ruins? Well, maybe best not to dwell on that. But the rope sure came in handy.\n        *set brought_rope 1\n        *goto forest_path_1\n    #A dusty, unused smokebomb\n        You bought this off a traveling merchant a while ago. He swore it would work, and you couldn't pass up on the deal. Of course, you never had a real need for it, until now.\n        *set brought_smokebomb 1\n        *goto forest_path_1\n*label forest_path_1\n\nYou slip out of the city without anyone noticing, and soon enough you've entered the Black Forest. Even during the day this place is pretty dark, so you're thankful it's a full moon out and the trails are pretty easy to find. \n\n*label forest_path_after_claud\n*temp destination_name\n*set destination_name \"Crow's Corner\"\n    \nAfter more trekking, you find yourself nearing ${destination_name}. The dawn sun is just starting to make the forest glow. \n\n*if work_with_party = 1\n    You arrive at Crow's Corner and find the party is already there and waiting in a small clearing.\n\n    \"We were beginning to think you might not show,\" Rexa says, with a smile.\n\n    \"I'm honestly surprised you [i]did[/i] show,\" Gorob says. \n\n    You reiterate your professionalism as a thief and explain that, despite your profession, you can be trusted to keep your word.\n\n    \"Enough chit-chat,\" Aldon says, \"let's get to work. Rexa, do what you need to do to prepare your spell. Tiff and Gorob, set up your rope trap. The rest of us need to prepare to deal with the carriage.\"\n\n    Looks like everyone has a job to do. You decide to help out.\n    *choice\n        #Go help Rexa prepare her spell\n            You ask Rexa if she needs any help. She smiles.\n\n            \"I could use a lookout. This spell takes a while to prepare, and I can't be interrupted.\"\n\n            She walks off into a nearby grove and you follow.\n            *goto with_party_rexa\n        #Go help Tiff and Gorob with the rope trap\n            You mention to Tiff that you've set a rope trap up once or twice.\n\n            \"Experience setting traps, huh?\" she says.\n\n            \"Figures,\" Gorob says. \"Thieves always arming and disarming traps.\"\n\n            You explain that's not all thieves do.\n\n            \"Come on, let's get going,\" Tiff says. Gorob shrugs his shoulders and the three of you walk off to find a spot to set a trap.\n            *goto with_party_tiff_and_gorob\n        #Go help Aldon do whatever he's planning on doing\n            \"How are you planning to deal with the carriage?\" you ask Aldon.\n\n            \"I need to prepare myself mentally and physically. Care to join me?\"\n\n            The two of you sit down on some stones nearby.\n            *goto with_party_aldon_and_claud\n*else\n    As you approach Crow's Corner you hear some voices. You take cover and, crawling among some brambles, peer out to see the party from the bar gathered in a clearing.\n\n    The man in plate armor starts directing everyone. \n\n    \"Let's get to work,\" he says. \"Rexa, do what you need to do to prepare your spell. Tiff and Gorob, set up your rope trap. I'll prepare to deal with the carriage.\"\n\n    The woman in red walks off by herself into a nearby grove. The stout barbarian-type and the woman in chainmail head in the opposite direction. The leader sits down near some rocks and seems to be deep in thought. Do you:\n    *choice\n        #Follow the woman in red\n            Let's see what this mystery woman is planning. You quietly follow her into the grove.\n            *goto with_party_rexa\n        #Follow the barbarian and the woman in chainmail\n            Sounds like these two are going to set up a trap. You know a thing or two about traps. You make your way around the clearing and quietly follow them.\n            *goto with_party_tiff_and_gorob\n        #Listen to the leader\n            You crawl your way to a bush right near the rocks to see what the leader is planning to do.\n            *goto with_party_aldon_and_claud\n\n*label with_party_rexa\n\nYou watch as ${rexa_name} picks a spot to stand and makes a couple quick motions with her hands. You feel [i]something[/i] in the air — some sort of magical energy that makes your skin tingle. \n\n\"This spot should work,\" she says.\n\n*if work_with_party = 1\n    \"I'm about to lay a spell. It could take several minutes, and during that time, I need to be completely focused on the spell, otherwise it might fail. Also, the target will be that spot on the trail.\" She motions just past the grove where the trail turns slightly. \"If anything walks through that spot before my spell is complete, it could weaken the spell — keep an eye out and make sure nothing interrupts me, or walks into that spot.\"\n    \n    You assure Rexa you can handle things while she casts.\n    \nAt this point, ${rexa_name} pulls out a small leather pouch and opens it. She extracts a pinch of some sort of powder and scatters it in front of her while chanting some obscure words. She then points at a spot on the trail past the grove, closes her eyes, and starts chanting in a low, flat voice.\n\nAgain, you feel some sort of magical energy all around you. It reminds you
