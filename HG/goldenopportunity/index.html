<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A Golden Opportunity — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "goldenopportunity", "title": "A Golden Opportunity", "scenes": {"ambush": "It seems like you've been lying in wait forever. Or, perhaps the anticipation of a wagon full of gold is making you impatient. Gold, you've found, has that effect on you.\n\nSuddenly, you hear the sound of horses and a carriage! \n\n*if (rexa_spell_weakened > 0) or (rope_trap_weakened > 0)\n    A large number of soldiers on horses burst through the thickets. You watch as the party leaps from their hiding places and tries to distract the guards.\n    \n    You see ${aldon_name} bravely standing his ground while multiple soldiers circle him. He might be brave, but he's clearly out-numbered.\n      \n    Further off,  ${tiff_name} and ${gorob_name} are acting as a team and have managed to actually take a handful of soldiers off their horses. But, they too are clearly out-matched and out-numbered, and you don't know how much longer they can hold out.\n    \n    Curiously, ${rexa_name} is nowhere to be seen.\n    \n    Fighting isn't really your specialty, so you're staying hidden for the time being. What to do? There sure are a lot of soldiers, and soldiers generally don't like thieves much.\n    *choice \n        #No more hiding, time to see what you're made of\n          You pop up and yell a colorful challenge to the nearest soldier. \"What did you say about my mother?\" the soldier yells, and wheels his horse in your direction, sword pointed. \n      \n          You try and get some distance, but the horse is much faster and more agile than you expected. You try scrambling between trees, hoping to tangle the soldier up a bit, but he deftly maneuvers through the forest and catches up to you. Before you have a chance to dodge, he strikes you across the temple with the flat of his blade.\n      \n          It's a hard blow and you start to lose consciousness. Before you black out completely, you see the soldier dismount and walk towards you, slowly.\n      \n          [b]THE END[/b]\n          *goto fatal_end\n        #Stay hidden, you prefer keeping your head firmly on your shoulders\n          No need for foolish bravery just yet. You quietly stay hidden in the underbrush while the sounds of battle echo all around you. \n      \n          After what seems like a surprisingly short amount of time, the battle is over. It looks like ${aldon_name} and his crew have all been captured and are being trussed up and carried by horses back to the city, probably to face time in a cell. \n\n          *goto party_captured_player_hidden\n        *if (brought_dagger = 1) #You've got a dagger, time to put it to good use\n            You pop out of hiding and leap into the fray. A dagger isn't really an even match for a sword or spear, but you make good use of the terrain to confuse the horses, and flash your dagger to get the soldiers to hesitate.\n\n            Unfortunately, a soldier dismounts and gives chase. He's not wearing full armor either, and looks fast, so running probably isn't in the cards. You try to parry his sword, but your dagger just isn't cutting it. After a very brief exchange, you find yourself disarmed, with a sword pointed at your throat.\n        \n            \"You thieves are a scourge on our city,\" the soldier says before he knocks you unconscious.\n        \n            [b]THE END[/b]\n            *goto fatal_end\n        *if (brought_smokebomb = 1) #You've got a smoke bomb, let's see what it can do\n            \n            *set brought_smokebomb 0\n            \n            You've never tried these homemade smoke bombs, but the guy that sold it to you swears they will easily fill a moderately sized room full of smoke in minutes. You light the fuse and roll the funny black ball right into the middle of the clearing where most of the action is taking place. \n            \n            With a slight [b]pop[/b], your little bomb starts to spew a thick, white, cloud of smoke. Within moments, the entire area is filled with smoke, making it hard to breathe, and even harder to see. \n            \n            \"Where is everyone?\" you hear someone, possibly ${aldon_name}, yell. \"Who's asking?\" someone else responds. \n            \n            Here's your chance, you figure. The carriage should be somewhere to the left. \n            *choice \n                # Find the carriage and get some of that gold\n                    Nothing like a smoky diversion to tip the odds in your favor. You make your way through the smoke. A couple figures pass on either side, but they don't notice you. \n                    \n                    After a time, you spot what looks like a wheel, and then the rest of the carriage comes into view. You see one soldier, sword drawn, trying to defend the carriage, but his back is to you, so you continue to the other side. \n                    \n                    On the other side, you see a rather short merchant, and sitting right next to him is a silver chest with the Merchant Guild seal emblazoned on it. That has to be where the gold is!\n                    \n                    You are about to slip onto the carriage and grab the chest, when the merchant suddenly throws some sort of powder into the air and mumbles something. Instantly, the smoke dissipates and you realize you are standing right in the middle of two soldiers.\n                    \n                    \"What's this now,\" one soldier says, seeing you for the first time. His companion is about to approach you, weapon drawn, when the merchant says \"We've got no time for this, things aren't going well. Get back in the carriage and get these horses moving!\"  The soldiers quickly leap back into the carriage and with surprising efficiency have the carriage off and running. \n                    \n                    *if work_with_party = 1\n                        As you catch your breath, ${aldon_name} appears and watches the carriage ride off. \"I'm guessing all that smoke was your doing?\" he says. \"Good trick, but it didn't quite work. Come on, let's regroup with the others.\"\n                        \n                    *else\n                        You dive back into the underbrush as you see ${aldon_name} and the others run to where the carriage once was. \"So close,\" you hear ${tiff_name} say. \"What was all that smoke from?\" ${gorob_name} asks, looking at ${rexa_name}. \"Not one of my spells,\" she responds.\n                        \n                        \"Let's regroup,\" ${aldon_name} says and leads the party back to the clearing.\n                        \n                    *goto party_not_captured\n                        \n                # Best to stay hidden and see how this plays out\n                    There might be more smoke, but that doesn't mean the fire's out, so to speak. \n                    \n                    Of course, it's hard to see in all the confusion, but from the sounds of things, ${aldon_name} and his team might be getting the upper hand. Suddenly, the smoke completely dissipates, revealing a few soldiers still on their feet and the carriage. As ${aldon_name} and the rest rush the carriage, it suddenly takes off with considerable speed. \n  \n                    \"So close,\" you hear ${tiff_name} say. \"What was all that smoke from?\" ${gorob_name} asks, looking at ${rexa_name}. \"Not one of my spells,\" she responds.\n                        \n                    \"Let's regroup,\" ${aldon_name} says and leads the party back to the clearing.\n  \n                    *goto party_not_captured\n\n*if rope_trap_strengthened > 0\n    A relatively small number of soldiers on horses burst through the thickets followed by the carriage you've all been waiting for. You notice the soldiers are on alert, but clearly confused. \n    \n    \"Where's Bill?\" you hear one soldier cry. \"I thought he was with you,\" says another.\n    \n    You watch as ${aldon_name} and his crew burst from hiding and surprise the guards. Things seem pretty evenly matched, and its hard to say which way this fracas is going to go.\n    \n    *if work_with_party = 1\n        You jump into the fray doing your best to add to the chaos while helping ${aldon_name}'s party. Fighting's not your strong suit, so you rely on distractions, mis-directions, and the occasional shove from behind.\n            \n        With the reduced set of soldiers, ${aldon_name}'s force routs the guards and heads towards the carriage, when it suddenly goes flying off down the road at top speed!\n            \n        \"How did they get away?\" ${gorob_name} asks. \n            \n        \"We must have missed a guard or two,\" ${aldon_name} says. \n\n        *page_break\n\n        As the party walks away, you notice a piece of parchment float to the ground. It must have dropped off the carriage. You glance through it and notice it's some sort of letter. \n\n        [i]Dear Claud,[/i]\n\n        [i]The plan is proceeding well. At this point you should have almost all the gold you need for phase two. [/i]\n\n        [i]I'm about to return to Greywood with the last shipment of gold from Farbranch. I would have just sent you the gold directly, but one of the guards has decided to keep a constant watch on me. I barely had time before we left to write this letter, and I'll probably have to send it en route.[/i]\n\n        [i]I'll have to access the gold once I'm back in the main guild building. Obviously, this will incur a bit of a delay in getting it to you. I'm sure you'll understand. The revolution, so to speak, will have to wait, but briefly.[/i]\n\n        [i]Signed, Marqley[/i]\n\n        Interesting. You tuck the letter into your pocket for safe keeping.\n\n        *set has_letter_from_marqley 1\n            \n        *goto party_not_captured\n    *else\n        You focus your attention on the party. They seem to be holding their own, particularly since there don't seem to be that many soldiers. \n            \n        As the party continues fighting, you decide now is a good time to pay a visit to the carriage. Approaching slowly, using the brush for cover, you manage to reach the carriage without drawing any attention to yourself. Oh, how it pays to be a sneaky thief!\n            \n        Unfortunately, when you arrive at the carriage, you spot two guards and somewhat short, dark-haired merchant preparing to leave. The merchant screams \"Now!\" and the carriage takes off at high speed, evading the rest of the ambush.\n\n        *page_break\n\n        A piece of parchment floats down to the ground, discarded or lost from the carriage. You pick it up and read through it. It's a letter of some sort.\n\n        [i]Dear Claud,\n\n        The plan is proceeding well. At this point you should have almost all the gold you need for phase two. \n\n        I'm about to return to Greywood with the last shipment of gold from Farbranch. I would have just sent you the gold directly, but one of the guards has decided to keep a constant watch on me. I barely had time before we left to write this letter, and I'll probably have to send it en route.\n\n        I'll have to access the gold once I'm back in the main guild building. Obviously, this will incur a bit of a delay in getting it to you. I'm sure you'll understand. The revolution, so to speak, will have to wait, but briefly.\n\n        Signed, Marqley[/i]\n\n        Curious. You tuck the letter into your pocket for safe keeping.\n\n        *set has_letter_from_marqley 1\n        \n        *goto party_not_captured  \n\n             \n*comment Default case\n\nA large number of soldiers on horses burst through the thickets. You watch as the party leaps from their hiding places and tries to distract the guards.\n    \nYou see ${aldon_name} bravely standing his ground while multiple soldiers circle him. He might be brave, but he's clearly out-numbered.\n      \nFurther off,  ${tiff_name} and ${gorob_name} are acting as a team and have managed to actually take a handful of soldiers off their horses. But, they too are clearly out-matched and out-numbered, and you don't know how much longer they can hold out.\n    \nCuriously, ${rexa_name} is nowhere to be seen.\n    \nFighting isn't really your specialty, so you're staying hidden for the time being. What to do? There sure are a lot of soldiers, and soldiers generally don't like thieves much.\n*choice \n    #No more hiding, time to see what you're made of\n      You pop up and yell a colorful challenge to the nearest soldier. \"What did you say about my mother?\" the soldier yells, and wheels his horse in your direction, sword pointed. \n      \n      You try and get some distance, but the horse is much faster and more agile than you expected. You try scrambling between trees, hoping to tangle the soldier up a bit, but he deftly maneuvers through the forest and catches up to you. Before you have a chance to dodge, he strikes you across the temple with the flat of his blade.\n      \n      It's a hard blow and you start to lose consciousness. Before you black out completely, you see the soldier dismount and walk towards you, slowly.\n      \n      [b]THE END[/b]\n      *goto fatal_end\n    #Stay hidden, you prefer keeping your head firmly on your shoulders\n      No need for foolish bravery just yet. You quietly stay hidden in the underbrush while the sounds of battle echo all around you. \n      \n      After what seems like a surprisingly short amount of time, the battle is over. It looks like ${aldon_name} and his crew have all been captured and are being trussed up and carried by horses back to the city, probably to face time in a cell. \n\n      *goto party_captured_player_hidden\n    *if (brought_dagger = 1) #You've got a dagger, time to put it to good use\n        You pop out of hiding and leap into the fray. A dagger isn't really an even match for a sword or spear, but you make good use of the terrain to confuse the horses, and flash your dagger to get the soldiers to hesitate.\n\n        Unfortunately, a soldier dismounts and gives chase. He's not wearing full armor either, and looks fast, so running probably isn't in the cards. You try to parry his sword, but your dagger just isn't cutting it. After a very brief exchange, you find yourself disarmed, with a sword pointed at your throat.\n        \n        \"You thieves are a scourge on our city,\" the soldier says before he knocks you unconscious.\n        \n        [b]THE END[/b]\n        *goto fatal_end\n    *if (brought_smokebomb = 1) #You've got a smoke bomb, let's see what it can do\n        \n        *set brought_smokebomb 0\n        \n        You've never tried these homemade smoke bombs, but the guy that sold it to you swears they will fill a 10x10 room full of smoke in minutes. You light the fuse and roll the funny black ball right into the middle of the clearing where most of the action is taking place. \n            \n        With a slight [b]pop[/b], your little bomb starts to spew a thick, white, cloud of smoke. Within moments, the entire area is filled with smoke, making it hard to breathe, and even harder to see. \n            \n        \"Where is everyone?\" you hear someone, possibly ${aldon_name}, yell. \"Who's asking?\" someone else responds. \n            \n        Here's your chance, you figure. The carriage should be somewhere to the left. \n        *choice \n            # Find the carriage and get some of that gold\n                Nothing like a smoky diversion to tip the odds in your favor. You make your way through the smoke. A couple figures pass on either side, but they don't notice you. \n                    \n                After a time, you spot what looks like a wheel, and then the rest of the carriage comes into view. You see one soldier, sword drawn, trying to defend the carriage, but his back is to you, so you continue to the other side. \n                    \n                On the other side, you see a rather short merchant, and sitting right next to him is a silver chest with the Merchant Guild seal emblazoned on it. That has to be where the gold is!\n                    \n                You are about to slip onto the carriage and grab the chest, when the merchant suddenly throws some sort of powder into the air and mumbles something. Instantly, the smoke dissipates and you realize you are standing right in the middle of two soldiers.\n                    \n                \"What's this now,\" one soldier says, seeing you for the first time. His companion is about to approach you, weapon drawn, when the merchant says \"We've got no time for this, things aren't going well. Get back in the carriage and get these horses moving!\"  The soldiers quickly leap back into the carriage and with surprising efficiency have the carriage off and running. \n                    \n                *if work_with_party = 1\n                    As you catch your breath, ${aldon_name} appears and watches the carriage ride off. \"I'm guessing all that smoke was your doing?\" he says. \"Good trick, but it didn't quite work. Come on, let's regroup with the others.\"\n                        \n                *else\n                    You dive back into the underbrush as you see ${aldon_name} and the others run to where the carriage once was. \"So close,\" you hear ${tiff_name} say. \"What was all that smoke from?\" ${gorob_name} asks, looking at ${rexa_name}. \"Not one of my spells,\" she responds.\n                        \n                    \"Let's regroup,\" ${aldon_name} says and leads the party back to the clearing.\n                        \n                *goto party_not_captured\n                        \n            # Best to stay hidden and see how this plays out\n                There might be more smoke, but that doesn't mean the fire's out, so to speak. \n                    \n                Of course, it's hard to see in all the confusion, but from the sounds of things, ${aldon_name} and his team might be getting the upper hand. Suddenly, the smoke completely dissipates, revealing a few soldiers still on their feet and the carriage. As ${aldon_name} and the rest rush the carriage, it suddenly takes off with considerable speed. \n  \n                \"So close,\" you hear ${tiff_name} say. \"What was all that smoke from?\" ${gorob_name} asks, looking at ${rexa_name}. \"Not one of my spells,\" she responds.\n                        \n                \"Let's regroup,\" ${aldon_name} says and leads the party back to the clearing.\n  \n                *goto party_not_captured\n\n\n*label party_captured_player_hidden\n*set party_captured 1\nWell, looks like things didn't go quite according to plan. But, you managed to keep out of the fight. Time to follow that carriage to the city. The gold is still up for grabs and you're not giving up so easily!\n*goto checkpoint_save\n\n*label party_not_captured\n*set party_captured 0\n\"Well that didn't go according to plan,\" ${aldon_name} says. His armor appears to have protected him from the worst of it.\n\n\"What a mess,\" ${tiff_name} says. \"What happened?\" She looks a bit worse for wear, but nothing serious.\n\n\"We must have had a mix-up in one of our preparations,\" ${gorob_name} says, nursing a nasty-looking head-wound. \n\n*if work_with_party = 1\n    You point out if you all hurry, they might be able to catch up to the carriage.\n\n\"Gorob's hurt and we need to tend to this head wound,\" ${tiff_name} says. \"I'm fine,\" ${gorob_name} insists. \"No you're not,\" ${tiff_name} responds.\n\n*if work_with_party = 1\n    \"Go without us, if you can find a horse, maybe you can catch up,\" ${aldon_name} suggests. \"We'll meet you back in Greywood.\"\n*else\n    \"We'll make our way back to the city after we've patched up a bit,\" ${aldon_name} says. \"Maybe there's still a chance that the gold is up for grabs by the time we get back.\" ${tiff_name} gives him a look of disbelief, but says nothing.\n\n    You make your way into the forest following the carriage, leaving the party behind.\n\n*label checkpoint_save\n*if using_soft_save\n    *page_break End of Chapter\n    *set save_load true\n    *set return_to_scene \"chase\"\n    *goto_scene savegame\n*else\n    *finish\n\n*label fatal_end\n*if using_soft_save\n    *page_break Restart Chapter\n    *set save_load false\n    *set return_to_scene \"ambush\"\n    *goto_scene savegame\n*else\n    *ending", "bar": "You look around the mostly empty pub you’re sitting in. Maybe an easy mark just came in and you missed it. \n\n*choice \n  #Look for a merchant that wouldn’t miss a couple coins from his purse.\n    You scan the room, hoping that one of the many city merchant guild officials decided to stop for a drink. But unluckily for you, not a single green-vested, fur-cape-wearing merchant in sight.\n\n    Off in the corner though, you notice a group of scruffy adventurer types. They seem to be arguing back and forth about something. If you got closer, you could investigate this further.\n    *goto examine_party\n\n  #Look for a royal that might not be paying close attention to his belongings.\n    Maybe one of the royal family, wearing the royal medallion, decided to get out of that stuffy castle and be among the people for once. Hopefully they brought some valuables, and decided to leave their royal guards at home.\n\n    But, the scant room doesn't have anyone that comes close to matching a royal. Not even a distant cousin to a royal. All you notice is a group of adventurer types, huddled around a table in the corner, in a pretty heated discussion. Maybe it's worth a closer look or listen?\n    *label examine_party\n    *choice \n      #Quietly grab a seat within earshot of the party and listen to what's going on without attracting attention\n        You slowly creep over to the next table, take a seat mostly in shadow, and do a little eavesdropping. It looks like there's four party members: a tough-looking guy in plate mail, a woman in a crimson robe, a sword-for-hire type woman in chain mail, and a stout rough-and-tumble fellow.\n        *goto listen_to_party\n      #Boldly walk right up to the party and introduce yourself. \n        No need for subtlety with these types. They tend to leap before they look, so you might as well come across as someone they'd be willing to chat with. \n\n        You saunter right over and introduce yourself as a well renowned thief. The leader (you're assuming he's the leader because he has a full suit of plate armor on) stops in mid-sentence and glares right at you. The rest of the group -- a woman in a crimson robe, a sword-for-hire type woman in chain mail, and a stout rough-and-tumble fellow -- exchange some nervous glances. \n        *choice\n          #Grab a chair and sit at the table\n            *set work_with_party 1\n            You take the leader's stunned silence as an invitation, and pull up a chair. \n\n            \"Who said you could sit down?\" the gruff armored leader says. \"Get lost!\"\n\n            \"Now wait a second Aldon,\" the woman in a crimson robe says. \"We're going to need someone that's good with locks, and good staying out of sight. If this thief is competent, this might be just what we needed.\"\n\n            You confirm that you are as good as you claim you are.\n\n            \"Well then, maybe ${player_name} here is our latest addition to the party,\" the woman in crimson says.\n\n            \"Rexa, should we really be adding people at this time?\" the stout-looking man asks. \n\n            \"Gorob, we really could use a thief,\" the young woman in well-used chainmail says.\n\n            \"Tiff, we don't even know this thief,\" Gorob says, \"Something is raising my neck hairs here.\"\n\n            \"Your concerns are noted, Gorob,\" Rexa says. \"So, let's put it to a vote. Who's up for adding the thief?\"\n\n            Rexa and Tiff raise their hands.\n\n            \"Who's against?\"\n\n            Gorob raises his hands.\n\n            \"You've got the final vote, Aldon,\" Rexa says.\n\n            Aldon sighs, and then nods. \n\n            \"We do need a thief, so you're in. But, be warned thief, if you try anything, I'll be watching. Now listen carefully because we don't have time to catch you up,\" Aldon says.\n            *goto listen_to_party\n          #Take the hint and take a seat elsewhere\n            The armored fellow hasn't reached for his sword yet, but maybe it's best not to rile things up. Apologizing, you back away and find a seat at a nearby table, conveniently near enough to listen in.\n            *label listen_to_party\n            *if work_with_party = 0\n              *set aldon_name \"the man in plate mail\"              \n              *set rexa_name \"the woman in a crimson robe\"\n              *set tiff_name \"the woman in chain mail\"\n              *set gorob_name \"the stout-looking man\"\n              *set work_alone 1\n\n            \"So we know the carriage will be going through Black Forest pass,\" ${aldon_name} says.\n\n            \"Early morning, so it might still be dark out, plus there will be plenty of places to hide,\" ${tiff_name} says.\n\n            \"How many guards will be riding along?\" ${gorob_name} asks.\n\n            \"Four in front, two in back, and at least two in the carriage itself,\" ${aldon_name} says.\n\n            \"The Merchant Guild likes extra protection,\" ${gorob_name} says with a laugh.\n\n            \"Don't worry about the rear guard,\" ${rexa_name} says, \"I've got a spell that will make their horses lose the trail. But the front guard we'll need to deal with.\"\n\n            \"Gorob and I will set a rope trap,\" ${tiff_name} says. \"Knock 'em clean off their horses, and we'll take care of them before they know what hit them.\"\n\n            \"That just leaves the carriage,\" ${rexa_name} says.\n\n            \"I will take care of any guards on the carriage,\" ${aldon_name} says. \"Which just leaves the carriage and all the gold it's supposed to be carrying. Ok, everyone, we meet at dawn at Crow's Corner in the forest. If you're late, we leave without you and you lose your share.\"\n\n            The party disbands and goes their separate ways.\n\n            Sounds like a good old fashioned carriage heist! What a perfect opportunity.\n\n            You head back home to prepare.\n            *goto back_at_home\n      #Ignore the party. The last time you got mixed up with a group like that, you almost got eaten by a dragon.\n        Adventurers are always trying to make things harder than they need to be. They're probably arguing over how many torches to bring, or some such nonsense.\n\n        After a bit, the party leaves. You finish your drink and try to think of some other way to make some quick gold. You've heard rumors about the Merchant's Guild moving some of their funds in and out of the city. Risky, sure, but maybe they wouldn't notice a missing bar or two? Or maybe there's some band of orcs in the forest just passing through. Orcs don't usually carry much, but they're also usually not too bright.\n        \n        As you are about to get up, you feel a heavy gloved hand land on your shoulder.\n        \n        \"${player_name} we've been looking for you,\" a voice says. You turn and see Thieves Guild senior member and all-around pain-in-the-neck Elvo Marshfoot. Behind him are two heavy-set fellows who are probably working for the guild as hired muscle.\n        \n        You try to explain you've been here the whole time, but Elvo's not having any of that. His crew give you a not-so-friendly escort back to the Thieves Guild, where it looks like several years of servitude await you.     \n               \n        [b]THE END[/b]\n        *ending        \n                \n*label back_at_home\n\n*page_break\n\nYou spend the rest of the day learning more about the Merchant's Guild, a guild you've had a couple run-ins with in the past. They're a pretty big operation in Greywood, handling the majority of goods and services for sale. They've also been moving a lot of gold into the city, but not a lot of gold out of the city to larger chapters in Grend Aspir or other bigger cities. The few folks you talk to are quick to point out that the Merchant's Guild prices are nothing short of highway robbery for a small town like Greywood. But they control the commerce, so who else are you going to buy from or sell to?\n\nAfter a short evening meal with a friend (who thankfully offers to pay), you retire to your small back-alley apartment. Sitting near your bed is your prized copy of \"Ravenclaw's Adventurers Guide\", a heavyset tome gifted to you by your mentor Slake, who taught you almost everything you know about being a thief. \n\n*label reading_the_guide\n\nYou consider reading a bit of the guide, or just going to bed.\n\n*choice\n\n    # Your eyes are growing tired, best to turn in for the night.\n\n        You've had enough for one day, so you extinguish your lamp and soon are fast asleep.\n\n        *goto checkpoint_save\n\n    # Read the section titled \"Trolls and Tribulations\"\n\n        There's an entire chapter dedicated to trolls for some reason. Apparently Ravenclaw had a few nasty encounters with trolls. You learn there's quite the variety of trolls -- everything from your run-of-the-mill green trolls, to \"deep\" trolls (nasty sounding creatures only found in very deep dungeons and caverns). There's even a variety known as \"rock trolls\" that, according to the book, actually eat rocks.\n\n        *set knows_rocktroll 1\n\n        *goto reading_the_guide\n\n    # Read the section titled \"Magic and Misdeeds\"\n\n        Ravenclaw was not a fan of magic, but knew well enough to respect those who could use it. His general advice is that casters and their magic are weakest at the very beginning of a spell, while they're chanting and preparing. Sometimes, any sort of disturbance of the caster or the manifesting spell could ruin the spell. \n\n        Oh, also there's some hastily hand-written note, possibly from Slake, that says \"If you see a red glowing orb, that's a blindfire spell -- DON'T LOOK AT IT.\"\n\n        *set knows_blindfire 1\n\n        *goto reading_the_guide\n\n    # Read the section titled \"Gargoyles on the Rooftops\"\n\n        You read a relatively short section on gargoyles. The text doesn't really detail how to defeat gargoyles, only that they mimic stone gargoyles with uncanny skill, sometimes staying completely motionless for days or weeks. When in this state, however, they can often be surprised and startled by a loud noise coming from behind them.\n\n        *set knows_gargoyle 1\n        *goto reading_the_guide\n\n*label checkpoint_save\n*if using_soft_save\n    *page_break End of Chapter\n    *set save_load true\n    *set return_to_scene \"party\"\n    *goto_scene savegame\n*else\n    *finish", "chase": "*temp player_hits 0\n*temp bandit_hits 0\n*temp fight_value 0\n*temp jump_value 0\n\nThe carriage has a head start, but maybe there's still a chance. Granted, you're on your own, but it's really just the carriage now, so you should be able to handle a single carriage, right?\n\nFirst, though, you need a ride.\n\n*choice\n\n    # Look for a horse\n\n        There's got to be a spare horse around here somewhere after that fight. Something you can borrow from a soldier, perhaps?\n\n        After a short bit of searching you come across a fine-looking chocolate colored steed. The owner appears to be unconscious on the ground, a victim of a rope trap, perhaps? In any event, you manage to get into the saddle without having the horse bolt (you were always pretty good when it came to horses), and you're off at full gallop after the carriage!\n\n        *goto chase_forest\n\n    # On second thought, maybe chasing the carriage isn't a great idea\n\n        You've seen enough action for one morning. You know exactly where the carriage is going, so maybe it makes more sense to just head back to the city. \n\n        *goto checkpoint_save\n\n*label chase_forest\n\nYou decide to ride off the main path to save time. The horse is sturdy and capable of navigating deep forest growth without difficulty. \n\nYou come to a clearing. Part of the forest drops off to a deep ravine here, ending in a river below. You can see a bridge in the distance that the carriage will likely be crossing soon. If you can navigate the ravine you might make the other side of the river before the carriage does.\n\nAlternatively, you can continue on this side of the forest, a much easier route for your horse, but you'll lose more time.\n\n*choice\n\n    # Navigate the ravine\n\n        You coax your horse down the steep ravine, taking small twisting turns. Several times you feel like you're about to pitch over the front of your horse, but you make it all the way down to the river without mishap.\n\n        At the bottom of the ravine the river is wide but shallow. Your horse should be able to ford the river here. As you're about to take the plunge, you notice a strange, gray boulder of some sort, sitting right in the middle of the river where you need to cross. There's something odd about it -- why would there be a boulder right here?\n\n        *choice\n\n            # Wait a bit, see if you can see anything else about this boulder\n\n                You pause, and take another look at the boulder. It's an odd color for this area -- very light grey. \n\n                Suddenly, the boulder moves and rises! It turns around and reveals itself to be a rock troll!\n\n                You're no match for a troll, much less a rock troll. If you try and cross the river here, you'll surely be killed by the troll.\n\n                *choice\n\n                    # Give up on crossing the river, go back out of the ravine and continue the chase.\n\n                        You've lost a bit of time, but better lost time than lost life. You can see a relatively quick way back up out of the ravine, so you guide your horse back up. The horse is in just as much a hurry as you to get away from that troll.\n\n                        *goto chase_forest2\n\n                    # See if, maybe, you can negotiate passage with the troll\n\n                        You've heard stories about trolls guarding bridges and such. Maybe this troll would be willing to let you cross the river? You call out to the troll, who seems to be standing there, watching you.\n\n                        \"Little human,\" the troll says. \"Why are you here?\"\n\n                        You ask the troll in the nicest way possible if you might be able to cross the river.\n\n                        \"Bring me food and you may cross,\" the troll says, in a monotone voice that sounds like rumbling noises in a tunnel.\n\n                        Food? What exactly do rock trolls eat?\n\n                        *choice\n\n                            # You might have part of a sandwich or something in your pack\n\n                                You check and find a half-eaten biscuit. You offer it and the troll plucks it from your comparatively tiny hands and eats it.\n\n                                The rock troll turns a paler shade of gray and gasps, \"Human food! Not troll food! Terrible! Bad!\"\n\n                                Unfortunately, it seems trolls are not fans of human food. The troll angrily attacks you, resulting in your painful death.\n\n                                [b]THE END[/b]\n                                *goto fatal_end\n\n                            # You could offer your horse, as cruel as that sounds\n\n                                You get off your horse and push and pull it towards the troll. The troll does not seem particularly interested. Your horse, however, seems terrified and starts to resist your pulling and pushing. Suddenly, the horse decides it has had enough, bucks, and kicks you clean in the head, breaking your neck.\n\n                                [b]THE END[/b]\n                                *goto fatal_end\n\n                            *if (knows_rocktroll > 0) # Wait, rock trolls actually eat rocks, you read that somewhere, right?\n\n                                You're no expert on trolls, but something about rock trolls eating rocks seems familiar and right to you. Perhaps the troll was looking for choice rocks at the bottom of the river.\n\n                                You offer to collect some quality rocks you saw at the bank of the river. The troll actually agrees to this.\n\n                                After several trips back and forth, with the rock troll happily devouring each large rock you bring it, the troll agrees to let you pass.\n\n                                *goto chase_forest3\n\n\n                    *if (brought_dagger > 0) # Fight the huge troll with your tiny dagger\n\n                        You might be small but you're...quick? Well, anyway. \n\n                        You wade into the water with dagger drawn. You feel a surge of adrenaline as you face the monstrous troll that towers over you. \n\n                        To no one's surprise, the fight is over quickly, resulting in your rather painful death.\n\n                        [b]THE END[/b]\n                        *goto fatal_end\n\n            # No time to waste, cross the river\n\n                You guide your horse at a fast trot into the river, hoping to catch that carriage. \n\n                Suddenly, the boulder moves! You watch in horror as the boulder rises up, revealing itself to be a rock troll! \n\n                All seven feet of the massive gray troll comes lumbering at you with surprising speed. You and your horse are knocked down into the water. \n\n                You try and struggle to your feet, but the troll grabs you in its frighteningly long powerful arms. Looks like you won't be catching up to that carriage after all.\n\n                [b]THE END[/b]\n                *goto fatal_end\n\n    # Continue on this side of the forest\n\n        Better to not risk injuring your horse or worse. You continue your way through the forest. \n\n        *goto chase_forest2\n\n\n*label chase_forest2\n\nYou continue the chase and reach a bridge over the river below. The carriage must have crossed here, there's no other bridge for many miles. However, there's no sign of the carriage. \n\nAs you start to cross the bridge, three scruffy-looking bandits appear on either side of you. One appears to be carrying a large axe, another carries a stout spear, and the last seems to have a sword (fortunately sheathed at the moment).\n\n\"Where do you think you're going,\" the bandit with a sword says. \"There's a toll to cross this bridge.\"\n\n\"And that carriage that crossed before you didn't pay, so you're going to have to pay double.\"\n\nYou point out that hardly seems fair. Also, you have no money whatsoever to pay the toll with.\n\n\"Well that's going to be a problem then,\" the bandit with a sword, now drawn, says.\n\n*choice\n\n    # Offer your horse as payment\n\n        The bandits examine your horse and exchange glances.\n\n        \"It's a pretty nice animal,\" the man with an axe admits. \n\n        \"Ok, deal, now get off and start walking,\" the man with a sword says. \n\n        You dismount, bid the horse farewell, and walk back the rest of the way to town. On foot, you have no chance to catch up to the carriage so you'll just have to hope for another opportunity to get the gold when you get to town.\n\n        *goto checkpoint_save\n\n    # Try and evade the well-armed and rather crafty-looking bandits\n\n        You wish the bandits luck in their future endeavors and you (and your horse) try and make a break for it.\n\n        Unfortunately, the bandit with the spear was prepared for this, and manages to knock you clean off your horse.\n\n        \"If you've got no money, you'll have to pay in blood,\" the bandit with the sword says, rather menacingly.\n\n        [b]THE END[/b]\n        *goto fatal_end\n\n    *if (brought_dagger > 0) # Draw your dagger and challenge one of the bandits to a fair fight\n\n        You dismount and draw your dagger. The bandits step back for a moment, clearly not expecting a fight.\n\n        \"Looks like this is going to get messy,\" the bandit with the sword says.\n\n        You request a fair fight, one-on-one with one of the bandits. \n\n        \"And why would we agree to that?\"\n\n        You point out that you're a thief, and that there's an unwritten rule between bandits and thieves to not steal from each other unfairly.\n\n        \"What kind of rule is that?\" the bandit with an axe asks.\n\n        \"Naw, he's right. Remember what old Bradley used to say? If the robbers steal from each other, there will be nothing left to steal.\" The bandit looks at you. \"So what will it be then? Which one of us will you challenge for the right to pass?\"\n\n        *choice\n\n            # Challenge the bandit with the axe, he looks slow but powerful\n\n                You challenge the bandit with the axe, who steps forward with a grunt. He hefts his axe in both hands and lumbers towards you.\n                *goto axe_fight_loop\n\n            # Challenge the bandit with the spear, his spear gives him a reach advantage, but he won't be able to defend himself up close\n\n                You challenge the bandit with the spear, who laughs and readies his spear, pointed at you.\n                *goto spear_fight_loop\n\n            # Challenge the bandit with the sword, he has the shortest reach of the three, but you'll need to be able to handle a little sword play\n\n                You challenge the bandit with the sword. He smiles and nods while taking up an offensive stance.\n                *goto sword_fight_loop\n\n*comment random fight time! If you brought the dagger, of course. You need to land 3 hits to defeat a bandit. \n*comment - Man with axe is slow and unlikely to hit, but if he does, it's game over. You get 2 attacks to the enemy's one\n*comment - Man with spear, same speed as player. Has longer reach, meaning he has a higher chance to hit, but if he misses you capitalize on this and get an automatic hit\n*comment - Man with sword, can block player with high likelihood, but spends his attack doing so. If player misses, he gets a +1 chance to hit \n\n*label axe_fight_loop\n\nYou and the bandit with the axe square off, looking for an opportunity to attack.\n\n*if (bandit_hits = 1)\n\n    The bandit looks wounded, but still capable of fighting.\n\n*if (bandit_hits = 2)\n\n    The bandit appears to be hurt. Landing one more attack should probably finish him off.\n\n*if (bandit_hits = 3) or (bandit_hits > 3)\n\n    The bandit tries to continue the fight but his wounds are too great, and he falls to the ground, defeated.\n    *goto fight_win\n\n*rand fight_value 1 100\n*if (fight_value > 85)\n\n    The bandit swings his axe in a wide arc. You try and dodge, but luck is not on your side, and the axe hits you, wounding you critically.\n\n    [b]THE END[/b]\n    *goto fatal_end\n\n*else\n\n    The bandit swings his axe wildly, but you're able to dodge just in time. \n\n    As the bandit tries to recover from his miss, you step in and attack twice.\n\n    *rand fight_value 1 100\n    *if (fight_value > 50)\n\n        Your first strike hits, stabbing the bandit.\n        *set bandit_hits + 1\n\n    *else\n\n        Your first strike misses.\n\n    *rand fight_value 1 100\n    *if (fight_value > 50)\n\n        Your second strike hits, stabbing the bandit.\n        *set bandit_hits + 1\n\n    *else\n\n        Your second strike misses.\n\n*page_break\n*goto axe_fight_loop\n\n\n*label spear_fight_loop\n\nYou and the bandit with the spear circle each other, looking for an opportunity to strike.\n\n*if (bandit_hits = 1)\n\n    The bandit looks wounded, but still capable of fighting.\n\n*if (bandit_hits = 2)\n\n    The bandit appears to be hurt. Landing one more attack should probably finish him off.\n\n*if (bandit_hits = 3) or (bandit_hits > 3)\n\n    The bandit tries to continue the fight but his wounds are too great, and he falls to the ground, defeated. \n    *goto fight_win\n\n*rand fight_value 1 100\n*if (fight_value > 40)\n\n    The bandit makes a quick thrust with his spear, too fast for you, unfortunately. The stabbing pain makes you wince.\n    *set player_hits + 1\n    *if (player_hits = 3) or (player_hits > 3)\n\n        Sadly, that last stab appears to have hit a vital organ or two. You fall to the ground, as darkness descends upon you.\n\n        [b]THE END[/b]\n        *goto fatal_end        \n\n    Despite the new wound, you try and land a quick counter-attack.\n    *rand fight_value 1 100\n    *if (fight_value > 60)\n\n        You manage to slip in a quick stab of your dagger, the bandit staggers a bit.\n        *set bandit_hits + 1\n\n    *else\n\n        Your quick dagger attack misses.\n\n*else\n\n    The bandit makes a quick jab that you're able to dodge. \n\n    You take advantage of the bandit's poor positioning to step inside the range of his spear and make a quick cut with your dagger. The bandit is unable to defend himself quickly enough.\n\n    *set bandit_hits + 1\n\n*page_break\n*goto spear_fight_loop\n\n\n*label sword_fight_loop\n\nYou and the bandit with the sword face each other, weapons ready.\n\n*if (bandit_hits = 1)\n\n    The bandit looks wounded, but still capable of fighting.\n\n*if (bandit_hits = 2)\n\n    The bandit appears to be hurt. Landing one more attack should probably finish him off.\n\n*if (bandit_hits = 3) or (bandit_hits > 3)\n\n    The bandit tries to continue the fight but his wounds are too great, and he falls to the ground, defeated.\n    *goto fight_win\n\n*rand fight_value 1 100\n*if (fight_value > 50)\n\n    The bandit swings his sword in a clean arc. You realize quickly that you won't be able to dodge his attack.\n\n    *rand fight_value 1 100\n    *if (fight_value > 70) \n\n        Fortunately, you're able to deflect his strike with your dagger. \n\n    *else\n\n        You try and block his attack with your dagger, but you miss the block, and his sword gives you a nasty cut.\n\n        *set player_hits + 1\n        *if (player_hits = 3) or (player_hits > 3)\n\n            Sadly, that last cut was all your body could take. You fall to the ground, as darkness descends upon you.\n\n            [b]THE END[/b]\n            *goto fatal_end        \n\n    *rand fight_value 1 100\n    *if (fight_value > 50) \n\n        You counter-attack with a quick thrust of your dagger.\n\n        *rand fight_value 1 100\n        *if (fight_value > 40) \n\n            The bandit is able to parry your strike, knocking your attack away.\n\n        *else\n\n            The bandit is unable to parry and your hit cuts him.\n\n            *set bandit_hits + 1\n\n    *else\n\n        You try and stab the bandit with your dagger but miss.\n\n*else\n\n    The bandit strikes out with his sword but you evade his blow.\n\n    *rand fight_value 1 100\n    *if (fight_value > 50) \n\n        You move to the bandit's side and make a quick thrust with your dagger.\n\n        *rand fight_value 1 100\n        *if (fight_value > 40) \n\n            The bandit is able to quickly reposition himself and parry your strike, knocking your attack away.\n\n        *else\n\n            The bandit is unable to parry and your hit cuts him.\n\n            *set bandit_hits + 1\n\n    *else\n\n        You try and stab the bandit with your dagger but miss.\n\n*page_break\n*goto sword_fight_loop\n\n\n*label fight_win\n\n*set player_defeated_bandit 1\n\nThe remaining two bandits honor the agreement and let you pass. They pick up their fallen colleague and warn you that you should bring money the next time you want to pass this bridge, lest things get messy again.\n\nYou jump on your horse and quickly ride across the bridge and back into the forest.\n\n*goto chase_forest3\n\n*label chase_forest3\n*page_break\n\nYou burst out of deep forest back onto the main path to the city. You've made up remarkable time, and the carriage is in your sights, but it's just far enough ahead that it will reach the city before you do. You encourage your horse as best you can, but the carriage soon reaches the city gates. \n\nYou watch as a small group of soldiers and a relatively short dark-haired man in Merchant's Guild colors unload a chest and quickly carry it away on foot. If it hasn't reached the actual Merchant's Guild headquarters yet, that gold is still fair game, right? \n\nAs the gold escort moves off, you quickly leave your horse at the stall near the front gates and follow the escort closely.\n\n*label chase_city\n\nThe small group of soldiers makes its way through the city with you close enough behind to follow, but not so close that they start to get suspicious. You determine that if they go down one the smaller streets you might be able to make some sort diversion and distract the group away from the gold.\n\nAs you follow them, you see a small ladder set up against someone's roof that someone left out. You could use the ladder to take to the roofs of the city and follow the chest from above, or stay on the ground.\n\n*choice\n\n    # Take the high ground\n\n        You quickly vault up the ladder and make your way across the roof. Looking back, it doesn't seem like anyone noticed your hasty ascent.\n        *goto chase_rooftops1\n\n    # Stick to the city streets\n\n        Jumping around roofs was never your favorite thing, really. The whole falling down aspect never really resonated with you. Best to tail the chest from street-level.\n        *goto chase_streets1\n\n        \n*label chase_rooftops1\n\nRunning to the edge of the roof and looking down, you see the gold escort moving through the city. You make a quick estimate of their path, and start leaping across rooftops in pursuit, pausing every now and then to check to see where the escort is.\n\nAfter a few turns, you see the escort about to cross in front of an alley you're looking down into. Maybe there's a chance here to distract the guards from above and then swoop down and take the gold? You find a box of empty bottles on the roof where you stand, but you're several stories up, and it would take you a while to get down to street level. You also notice a clothesline with someone's drying laundry, stretched across the alley. \n\n*choice\n\n    # You've never tried this before, but just maybe you could jump to the clothesline and use it to swing down. Think of how cool you'd look doing that!\n\n        Time to put that one acrobatics training session you attended years ago to good use. As the escort rounds the corner you hurl a bottle over their heads. The shattering noise distracts the guards, who step away from the chest to investigate.\n\n        With a silent \"Tally-ho!\" you leap into the air and grab the clothesline. For a brief moment, it seems like everything is going to work. And then, with a sickening snap, the clothesline breaks and you plummet to the ground.\n\n        Fortunately, you only break your leg. Unfortunately, you are captured by the city guard and thrown in the dungeon for conspiring to steal from the Merchant's Guild.\n\n        [b]THE END[/b]\n        *goto fatal_end\n\n    # That clothesline looks super risky. \n\n        Yeah, there's no way that little clothesline is going to hold your weight. Better wait for another opportunity. You move on to the next rooftop as the escort moves on.\n\n        *goto chase_rooftop2\n\n*label chase_rooftop2\n\nYou come to a gap in the rooftops. The next roof is at least 10 feet away. You see the escort continuing on so you're going to have to get across somehow. It's a long way down though.\n\n*choice \n\n    # Jump the gap\n\n        You back up, giving yourself as much room as possible for a good running start. \n\n        *rand jump_value 1 100\n        *if (jump_value > 40)\n\n            You go flying through the air, but fall well short of the next roof. You plummet to the ground.\n\n            [b]THE END[/b]\n            *goto fatal_end\n        *else\n\n            You go flying through the air and just barely manage to get your hands on the edge of the next roof. With some effort you pull yourself up and continue the chase.\n            *goto chase_rooftop3 \n\n    # Look for something to cross the gap\n\n        That gap is a bit to far for you, so you quickly look around. You find a couple planks of wood of varying lengths. You finally find one that seems like it would work, and you place it into position between the two roofs. It just barely reaches, but it's good enough. You make your way across the wood plank, terrified of each and every squeak or cracking noise. Fortunately, the plank holds and you're able to continue the chase.\n\n        *goto chase_rooftop3\n\n    # Find a way down to street level\n\n        You'd rather not risk falling. You notice a quick ladder down, so you slide your way down to the street, hoping to follow the escort at ground level.\n\n        *goto chase_streets2\n\n\n*label chase_rooftop3\n\nAs you continue running across the rooftops, you find yourself on top of one of the many churches in town. This particular one, however, appears to have a stone gargoyle sitting on the ledge. \n\nYou're about to continue on, when you notice something sparkle. Resting in the gargoyle's hands is some sort of metallic object. It could be a medallion of some sort?\n\n*choice\n\n    # There's no time to be inspecting gargoyles on the roof. You're going to lose that chest of gold!\n\n        You ignore the gargoyle and its shiny possession, and continue along the roofs.\n\n        *goto chase_rooftop4\n\n    # Take a closer look and see if you can pry that metallic object loose\n\n        As you step to the side of the gargoyle and grab and pull on the metallic object, the gargoyle suddenly moves!\n\n        Looks like this is an actual gargoyle. Unfortunately for you, he doesn't like being woken up, and attacks you.\n\n        [b]THE END[/b]\n        *goto fatal_end\n\n    *if (knows_gargoyle > 0) # Hold on a second, didn't you read about real gargoyles pretending to be fake ones? \n\n        You find a handy bottle and throw it at the gargoyle from a safe distance. The gargoyle actually moves! \n\n        You hide behind a chimney for a while until you hear the sound of the gargoyle flying away. The gargoyle is gone, but it left the shiny object which appears to be some sort of metal badge, with the Merchant's Guild symbol on it. You tuck it into your pocket -- maybe this will come in handy later?\n\n        *set has_merchant_pass 1\n\n        You continue on with the chase, moving from roof to roof.\n\n        *goto chase_rooftop4\n\n*label chase_rooftop4\n\nUnfortunately, you reach a point where you're facing the city center, and you've run out of roofs to cross. You notice that the escort goes straight into some squat building with the Merchant's Guild colors on the building's flags. That must be their stronghold. Too bad the gold you want is in there now.\n\nYou make your way back down to the street. You're not giving up just yet. There must be a way inside. Time to come up with a new plan.\n\n*goto checkpoint_save\n\n\n*label chase_streets1\n\nYou start trailing the armed escort through the streets. So as to not arouse suspicion, you try to blend in with other people walking in the streets, always staying at least several horse-lengths behind the escort. \n\nYou watch as the guards in the escort rudely shove other people out of the way in their haste. Merchant Guild guards aren't known for their cordial manners. They do, however, seem to be particularly on edge, as they take several unnecessary turns through back streets and alleys, probably in an attempt to throw off any pursuers such as yourself.\n\nSuddenly, the escort takes a quick turn down a side street and two guards break off from the group and stand in formation at the end of the street, blocking the way. If you don't find a way around the guards, you're going to lose track of the escort!\n\n*temp chase_streets_rand 0\n\n*choice\n\n    # Run by the guards really fast. They might not even see you.\n\n        You bolt at full speed, hoping to be just a blur to the guards.\n\n        Unfortunately, the guards are paying attention and spot you right away. \"Where do you think you're running off to?\" one guard says and moves to block your path. You manage to evade the first guard, but the second guard moves surprisingly fast for something in full armor, and tackles you off your feet.\n\n        You protest your innocence, claiming to be an important person in a hurry to get somewhere, but the guards aren't buying it. \"You don't look all that important to me,\" a guard says, \"actually, you look like a thief.\" They bind you and force you to walk to the Merchant Guild headquarters, where you're promised a fair investigation into your case before they throw you into their dungeon.\n\n        [b]THE END[/b]\n        *goto fatal_end\n\n    # Stick to the shadows and sneak by while the guards aren't looking.\n\n        It's a reasonably quiet street, with plenty of shadows to hide in. You step off to the side and slowly make your way, using a couple discarded crates and other junk to block the guard's line of vision. \n\n        The guards seem to be on high alert, however, and are constantly scanning the whole area.\n\n        *rand chase_streets_rand 1 100\n        *if (chase_streets_rand > 40)\n\n            Through a series of good timing, quiet steps, and a knack for staying hidden, you manage to slip by the guards completely. You make a quick check to see if they're following you (they're not), and you continue trailing the escort.\n\n            *goto chase_streets1_2\n\n        *else\n            Unfortunately, as you try to slip by a crate, you inadvertently knock something over, which in turn knocks something else over, which in turn knocks over a bunch of other junk that makes a rather loud noise.\n\n            One of the guards who's apparently on edge, immediately throws a dagger in your direction. As luck would have it, his dagger hits you right in the neck.\n            [b]THE END[/b]\n            *goto fatal_end\n\n    # Blend in with the next group of people walking past the guards.\n\n        You stay back, waiting for a larger group of people to pass. Eventually a group of what appear to be porters carrying large packages walks by. You quickly blend into their group. They don't seem to be bothered by your presence, likely because they're all busy carrying heavy packages and can barely see what's in front of them.\n\n        As you approach the guards you position yourself to keep as many porters between you and the guards.\n\n        *rand chase_streets_rand 1 100\n        *if (chase_streets_rand > 40)\n\n            You walk right by the guards without them ever seeing you. You get back to trailing the escort, they can't have gotten that much father ahead.\n            *goto chase_streets1_2\n\n        *else\n\n            As you walk past, just then, one of the porters drops one of his packages, making a bit of a scene. A guard spots you out of the crowd and starts walking towards you. \n\n            \"You don't seem like a porter,\" the guard says. \"You look more like a thief.\" They bind you and force you to walk to the Merchant Guild headquarters, where you're promised a fair investigation into your case before they throw you into their dungeon.\n\n            [b]THE END[/b]\n            *goto fatal_end\n\n*label chase_streets1_2\n\nYou spot the escort a little further ahead. You following them for several turns, until they come to a stop on another side street. It seems like some of the guards need a quick break, and separate from the escort for the time being. The rest of the guard are circled around the chest. Maybe if you could somehow distract or remove the rest of the guards you could grab that chest. You notice they've stopped right in front of an alchemist's shop, which has a window displaying a number of colorful, mysterious powders in glass vials.\n\n*choice\n\n    # Distract the guards by starting a fight nearby\n\n        You bump into a random stranger walking by and make it look like someone else bumped into him. In the town of Greywood, sometimes that's all you need to do to start a fight.\n\n        Sure enough, pretty soon a small brawl has broken out. Unfortunately, the guards seem to be focused on their job, or maybe just not particularly observant, because none of them move from where they're standing. After a while, the remaining guards return to the escort and the group continues on their way, completely ignoring the people fighting in the streets.\n\n        You try and break up the brawl, and then quickly resume to trailing the escort.\n\n        *goto chase_streets2\n\n    # Break the alchemy shop window and see if the powders \n\n        You're no alchemist, but it seems like one of those powders probably might do something interesting. Maybe. \n\n        You find a chunk of cobblestone and while the guards aren't looking in your direction, you hurl it at the shop window. The window shatters and several of the vials with powders fall out, covering the guards.\n\n        \"Ahk, what is this?\" one of the guards, now covered in a yellow powder, yells. \"It smells awful!\"\n\n        \"It's making my eyes sting,\" another guard says, followed by, \"I'm having trouble breathing!\"\n\n        Within seconds, all of the guards have been rendered unconscious by the mysterious yellow powder. What a stroke of luck!\n\n        You swoop in, ready to open the chest and grab the gold. All you need to do is pick the lock before the guards get back. Not a problem for a thief, surely.\n\n        You notice the lock is rather simple. Strange they'd put such a basic lock on this sort of chest. Well, no need to ponder it further. You easily pick the lock and open the chest. \n\n        Suddenly a large puff of purple smoke explodes in your face. Only too late you realize the chest was rigged with a poison gas trap.\n\n        [b]THE END[/b]\n        *goto fatal_end\n\n    # Maybe now isn't the time to take this sort of risk\n\n        You decide not to test your luck. The other guards are going to be back any moment now. \n\n        Sure enough, the guards return and the escort heads off immediately, with you quickly trailing them once again.\n\n        *goto chase_streets2\n\n\n*label chase_streets2\n\n*page_break\n\nYou watch as the escort marches into the Waterfall District. This district is probably one of the nicer parts of town, which is unfortunate for you, as the residents don't take kindly to thieves and unfamiliars. It's gotten so that this district has hired their own private security force, a force that does frequent patrols, and a force you've had a few unpleasant run-ins with in the past. \n\nIt's also a district known for its rather maze-like streets. You'll have to choose wisely if you want to make sure you don't lose the escort. You watch as the escort moves north into the district. You follow them but they turn before you can catch up to them. \n\n*label chase_streets_maze_a2\n\nThe street splits here going east and west. There's a plaque that welcomes visitors to the Waterfall District, provided they have permission to visit. Streets lead east and west, or you can exit the district to the south.\n\n*choice\n\n    # Take the west street\n        You head west.\n        *goto chase_streets_maze_a1\n\n    # Take the east street\n        You head east.\n        *goto chase_streets_maze_a3\n\n    # Give up trailing the escort and leave the Waterfall District to the south\n        It's too risky and you've already lost sight of the escort. Better re-group and come up with a different plan.\n        *goto checkpoint_save\n\n*label chase_streets_maze_a1\n\nYou reach an intersection with streets going north, east, and west. There's a fountain with a statue of a man in a robe, pouring water from a urn.\n\nYou hear some sounds to the west. It could be a patrol, or possibly the escort.\n\n*choice\n\n    # Take the west street\n        You head west. \n\n        You run straight into a district patrol, which quickly apprehends you for being in the district without permission. \n        [b]THE END[/b]\n        *goto fatal_end\n\n    # Take the east street\n        You head east.\n        *goto chase_streets_maze_a2\n\n    # Take the north street\n        You head north.\n        *goto chase_streets_maze_b1    \n\n*label chase_streets_maze_a3\n\nYou reach an intersection with streets leading in all cardinal directions. There's a small fountain here with a fake waterfall. \n\nYou hear some sounds to the south. It could be a patrol, or possibly the escort.\n\n*choice\n\n    # Take the west street\n        You head west.\n        *goto chase_streets_maze_a2\n\n    # Take the east street\n        You head east.\n        *goto chase_streets_maze_a4\n\n    # Take the north street\n        You head north.\n        *goto chase_streets_maze_b3\n\n    # Take the south street\n        You head south.\n\n        You run straight into a district patrol, which quickly apprehends you for being in the district without permission. \n        [b]THE END[/b]\n        *goto fatal_end\n\n*label chase_streets_maze_a4\n\nYou reach an intersection with streets heading west and north. There's a carving of a waterfall on a wall.\n\n*choice\n\n    # Take the west street\n        You head west.\n        *goto chase_streets_maze_a3\n\n    # Take the north street\n        You head north.\n        *goto chase_streets_maze_b4\n\n*label chase_streets_maze_b1\n\nYou reach an intersection with streets going east, north, and south. Someone's planted an elm tree here.\n\n*choice\n\n    # Take the east street\n        You head east.\n        *goto chase_streets_maze_b2\n\n    # Take the north street\n        You head north.\n        *goto chase_streets_maze_c1\n\n    # Take the south street\n        You head south.\n        *goto chase_streets_maze_a1\n\n*label chase_streets_maze_b2\n\nYou reach an intersection with streets heading west, east, and north. There's a small archway over the street heading north.\n\n*choice\n\n    # Take the west street\n        You head west.\n        *goto chase_streets_maze_b1\n\n    # Take the east street\n        You head east.\n        *goto chase_streets_maze_b3\n\n    # Take the north street\n        You head north.\n        *goto chase_streets_maze_c2\n\n*label chase_streets_maze_b3\n\nYou reach an intersection with streets heading in all directions. There's a large fountain here with a fake waterfall.\n\n*choice\n\n    # Take the west street\n        You head west.\n        *goto chase_streets_maze_b2\n\n    # Take the east street\n        You head east.\n        *goto chase_streets_maze_b4\n\n    # Take the north street\n        You head north.\n        *goto chase_streets_maze_c3\n\n    # Take the south street\n        You head south.\n        *goto chase_streets_maze_a3\n\n*label chase_streets_maze_b4\n\nYou reach an intersection with streets heading in all directions. The cobblestones are a bit broken here.\n\nYou hear some sounds to the east. It could be a patrol, or possibly the escort.\n\n*choice\n\n    # Take the east street\n        You head east.\n\n        You run straight into a district patrol, which quickly apprehends you for being in the district without permission. \n        [b]THE END[/b]\n        *goto fatal_end\n\n    # Take the west street\n        You head west.\n        *goto chase_streets_maze_b3\n\n    # Take the north street\n        You head north.\n        *goto chase_streets_maze_c4\n\n    # Take the south street\n        You head south.\n        *got
