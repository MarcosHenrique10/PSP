all in the Press.\n\n\t\t*set Outcome \"By the next morning, every media outlet in the country is reporting the President's plans. Turns out his base doesn't much like the idea of sending their kids to internment camps.\"\n\t\t*set App -20\n\n\t\t*goto_scene displayOutcome\n\n\t#Tell him he looks tired and that you should sign the executive order for him. After working for all of three hours, he agrees and hands it over. You sign the name of the President of China.\n\n\t\t*set Outcome \"The international community thinks that Disaster has delivered a sick burn to the President of China and applaud him for his creative anti-fascism measures.\"\n\n\t\t*set Prest +20\n\n\t\t*goto_scene displayOutcome", "griftlow-1-3-joshuatree": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe right-wing media reports this as a win for privatization and environmentalism. Initially Disaster is thrilled by all the positive coverage. But, then he realizes that it might seem like a concession to hippies. You suspect that he hates hippies more than he loves being loved.  \n\n*page_break\n\nHe says he's going to install a few petting tiny zoos at Joshua Tree and clear-cut Yosemite to build a golf course.\n  \nWhat do you do?\n\n\n*choice\n\t#Tell him you think it's a great idea. Kids love petting zoos.  \n\n\t\t*set Outcome \"His clear-cutting methods in California don't go well. They ignite several wild fires that tear through the state. His theory that vacuuming the forest would have prevented this tragedy falls of deaf, angry ears\"\n\t\t*set App -20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Invite the President of Finland to visit and consult on Disaster's totally great idea. He's had good ideas about forests before. \n\n\t\t*set Outcome \"The President of Finland thinks that Disaster is the most hilarious guy he's ever met. He calls up several other world leaders during their meeting to inform that Disaster is actually just a great commedian and that he's been horribly misunderstood.\"\n\t\t*set Prest +20\n\n\t\t*goto_scene displayOutcome\n\n\t#Call your guy. He vandalizes Yosemite.  \n\n\t\t*set Outcome \"Disaster's plans are totally foiled because the hippies stage an occupation of the park, making it impossible to burn it down without without creating an international incident.\"\n\n\t\t*set Rage +20\n\n\t\t*goto_scene displayOutcome", "griftlow-1-4-nationblackmail": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nOh dear. The international gossip mill is atwitter over President Disaster's attempted blackmail of countries less fortunate than ours. Broadcasts from around the world condemn our scheme.\n\n*page_break\n\nPresident Blackmail -- err, sorry, President Disaster demands that you fix his tumbling international reputation right away.\n  \nWhat do you suggest we do?\n\n\n*choice\n\t#Pull out of all wars and military actions at once.  \n\n\t\t*set Outcome \"Pulling out our troops without warning is a mixed bag abroad, but Americans are thrilled to have all our soldiers home!\"\n\t\t*set App +20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Give a bunch of foreign aid to the impoverished countries we tried to blackmail.\n\n\t\t*set Outcome \"With his own pockets so empty, President Disaster flips out over the idea that we'd give money to other countries before bailing him out. Only a quick shoulder massage from his daughter Duchess keeps the President from calling in the firing squad. For now.\"\n\t\t*set Rage +20\n\n\t\t*goto_scene displayOutcome\n\n\t#Blame the rumors on all the lying liars from these other countries.  \n\n\t\t*set Outcome \"In a shocking turn of events, nobody believes President Disaster! It could be ages before anyone abroad takes him seriously again.\"\n\n\t\t*set Prest -20\n\n\t\t*goto_scene displayOutcome", "griftlow-2-1-natobribes": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nSTAT ALERT!\n\nThe President's personal accounts are running dry, and he's demanding 'a personal show of support' (a.k.a. a bribe!) from each of our NATO allies if they want our continued involvement.\n\nWhat do you do?\n\n*choice\n\t#Secure those bribes. And fast.\n\n\t\t*set Rage +15\n\t\t\n\t\t*goto_scene griftLow-2-2-CounterBribe\n\n\t#Tell our defense contractors to cover the bribes if they want to keep selling stuff to our allies.\n\n\t\t*set App -20\n\n\t\t*goto_scene griftLow-2-3-NewWar\n\n\t#Imply to China and Russia that President Disaster might be open to dissolving NATO...for the right price.\n\n\t\t*set Prest -15 \n\n\t\t*goto_scene griftLow-2-4-NATOgone", "griftlow-2-2-counterbribe": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nYou start making phone calls to NATO reps and your are met universally with mocking laughter. At each failure, Disaster shoots a BB gun in your direction. Several land very close to your eyes.\n\n\n*page_break\n\nOnly the Greek representative takes you seriously, for which you are grateful, but Greece has less money than a pauper and, in desperation, counter-threatens to expose this bribery scandal if President Disaster doesn't pay him.\n\n\nWhat do you do?\n\n*choice\n\t#There's nothing to do: Disaster is clean broke.    \n\n\t\t*set Outcome \"Greece reveals everything and the foreign press has a field day.\"\n\t\t*set Prest -15\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Agree and secretly livestream the remaining negotiation on Twitch.  \n\n\t\t*set Outcome \"Disaster comes out looking like a hapless victim, boosting his pity ratings. The Greek NATO representative goes to jail.\" \n\t\t*set App +15\n\t\t*set Rage -10\n\n\t\t*goto_scene displayOutcome\n\n\t#Threaten to bomb Greece if they don't let Disaster build three new hotels in Athens. \n\n\t\t*set Outcome \"Greece agrees, knowing two things: that Disaster is too stupid to know how insane it would be to bomb an ally state and that there's no way the tourist industry, as lively as it is, could support three new hotels. When the hotels fail, as they surely will, Greece can use them as public housing. In the meantime, the international community views it as a generous investment in a flagging economy.\"\n\t\t*set Prest +15\n\n\t\t*goto_scene displayOutcome", "griftlow-2-3-newwar": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nDefense contractors are used to this kind of thing, immediately agreeing to pay up. Almost too immediately. But, Disaster is thrilled and you're hoping to get a full night of sleep, so you ignore the warning bells. \n\n\n*page_break\n\nUntil you are wakened at 3AM by actual alarm bells. You rush from the broom closet that is your office/apartment/prison and are informed that someone sold a bunch of very expensive American-made weapons to some Jihadi group in Afghanistan. Thousands of American soldiers stationed there are dead. Starting a new war where the former President ended it doesn't bode well for reelection hopes.    \n\n\nWhat do you do?\n\n*choice\n\t#Secretly release evidence of the events, including the bribes, leading up to the recent tragedy.   \n\n\t\t*set Outcome \"Disaster's supporters know he is selfish, but this is a step too far. America's allies aren't too thrilled either. Disaster wants the head of whoever released that evidence.\"\n\t\t*set App -15\n\t\t*set Rage +15\n\t\t*set Prest -15\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Blame Obama.  \n\n\t\t*set Outcome \"Disaster and his supporters love to shit on minorities and especially love claiming that America's first black President is responsible for all of Disaster's own failings.\" \n\t\t*set App +15\n\t\t*set Rage -10\n\n\t\t*goto_scene displayOutcome\n\n\t#Blame Russia and promise to retaliate. \n\n\t\t*set Outcome \"Given Russia's recent interventions in the Middle East, it's a totally plausible claim. The rest of the world breathes sigh of relief (deeply misguided, of course) at even the smallest shred of evidence that America isn't working with Russia and against them.\"\n\t\t*set Prest +15\n\n\t\t*goto_scene displayOutcome", "griftlow-2-4-natogone": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nPresident Disaster is so thoroughly confident of the success of this idea that he gets you some month-old pizza from his stash and insists on delivering the offer himself.\n\n\n*page_break\n\nTrouble is that both China and Russian understand something that Disaster does not: he doesn't have the power to dissolve NATO. The US can't even exit NATO without an act of Congress. China and Russian now, however, have the power to reveal to his NATO allies that America has violated existing treaties by attempting to negotiate with them against NATO nations. They don't hesitate to do so, tanking the American reputation for loyalty along with Disaster's hopes and dreams. \n\n\nWhat do you do?\n\n*choice\n\t#Double down: make a public promise to help Russia colonize any Eastern European nation of their choosing.\n    \n\t\t*set Outcome \"NATO's love-need relationship with America is now a hate-need relationship: as much as NATO countries hate Disaster and his foreign policy, they still need America to carry out their missions effectively. All other NATO nations promise to pay more into NATO in exchange for abandoning these crack-pot plans.\"\n\t\t*set Prest -15\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Offer to take Disaster out for a Happy Meal. Your treat!  \n\n\t\t*set Outcome \"You can't fix what he's done--today or any day of the last few years--to damage America's reputation abroad, but you're pretty certain you can improve his mood. That's a win for you and your likelihood of survival if not also for America's.\" \n\t\t*set Rage -15\n\n\t\t*goto_scene displayOutcome\n\n\t#Announce an era of New Protectionism: America Not Just First, But Alone. \n\n\t\t*set Outcome \"Disaster's supporters, against all the teachings of history and the logic of laissez-faire capitalism, love this kind of talk.\"\n\t\t*set App +15\n\n\t\t*goto_scene displayOutcome", "introducethejob": "\nPresident Disaster snaps his fingers at the Secret Service and then points at you “Right, ${name}. Congratulations. I’m appointing you my new Chief of Staff.”\n\nWhat do you do?\n\n*choice\n\t#Turn to run out the door. You actually like having a heartbeat.\n\t\tThe Secret Service are ready: they tackle you and drag you back into the Oval Office. \n\t\t*finish\n\t#Fist pump like you hit a hole in one. This’ll be a wild ride!\n\t\tPresident Disaster is convinced he’s found one of “his own,” and beckons you delightedly into his inner sanctum (aka the Oval Office). \n\t\t*finish\n\t#You nod solemnly. This may be your only chance to help save democracy.\n\t\tPresident Disaster expresses surprise that you’re not more excited about the distinct honor of working under him, with emphasis on “under.” Since nobody else seems excited by the prospect, though, he beckons you in. \n\t\t*finish\n", "introducethejob2": "Here are the President's stats:\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nIt's your job to give him the best advice, the most WINNING advice. If you don't steer him well, you may end up a 'sad loser' and cause big problems.\n\nEvery day, something 'very important' happens to President Disaster, like receiving this dinner invitation, which just came in the mail from the Embassy of Ecuador (which he painfully pronounces as Ee-kew-a-dor). \n\nWhat do you do?\n\n*choice\n\n\t#Advise him to accept the invitation from Ee-kew-a-dor.\n\n\t\t*set Outcome \"The President sticks his foot in his mouth all night, but the other nations are impressed that he's finally getting out and mingling. His prestige rises, which you can see in the stats! You'd better be careful about letting any stats get too high, though, or it could go to the President's head.\"\n\t\t*set Prest +10\n\t\t*goto_scene introduceTheJob3\n\n\t#Correct his pronunciation.\n\n\t\t*set Outcome \"Whoa! That correction made the President hopping mad, which you can see in the increase of his rage. Better not let any stats get too high, though, or the President might do something super reckless.\"\n\t\t*set Rage +5\n\t\t*goto_scene introduceTheJob3\n\n\t#Call the Ecuadorian embassy and suggest that the President might attend... if they make it worth his while.\n\n\t\t*set Outcome \"Ecuador hears you loud and clear, offering a cool $10 million for a new Disaster mini golf complex in Quito. The President's grift is on its way up, which you can see here! But don't let any stats get too high, or the President might do something even more dangerous.\"\n\t\t*set Grift +5\n\t\t*goto_scene introduceTheJob3\n", "introducethejob3": "${Outcome}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\n*page_break\n\nNext, the President shows you a picture of his children. He says that one of them has been filling his shoes with shaving cream and demands that you find out who.\n\nWhat do you do?\n\n*choice\n\n\t#Get the NSA on it right away.\n\n\t\t*set Outcome \"President Disaster visibly calms at your assertive use (abuse?) of power. You should be careful not to let his rage or any other stat slip too low, though, or he might surprise you. And not in a good way.\"\n\t\t*set Rage -5\n\t\t*goto_scene introduceTheJob4\n\n\t#Tell him it's probably his conniving daughter, Duchess.\n\n\t\t*set Outcome \"The President goes on Moose News to smear his daughter, and the family tension causes Disaster stocks to drop. Avoid letting grift (or any stat) drop too low, or it could spell, well, d-i-s-a-s-t-e-r.\"\n\t\t*set Grift -5\n\t\t*goto_scene introduceTheJob4\n\n\t#Alert the media and publicly shame the kids into stopping.\n\n\t\t*set Outcome \"People are disgusted by the childish behavior of the Disaster family. Approval drops. Better not let any stat go too low or you could really screw the pooch... and yourself along with it.\"\n\t\t*set App -5\n\t\t*goto_scene introduceTheJob4\n", "introducethejob4": "${Outcome}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nAnd that's the job. You've got 30 days until election day to keep the President -- and the country -- in balance. Good luck!\n\n*page_break\n\n*goto_scene scenarioController", "presthigh-1-1-economicforum": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nSTAT ALERT!\n\nHaving managed to ingratiate himself, by hook and mostly probably by crook, with other world leaders, President Disaster has gotten himself an invitation to speak as a 'lead innovator' at the World Economic Forum.\n\nWhat do you do?\n\n*choice\n\t#Tell him this is his chance to pitch his idea for mining the moon.\n\t\t*set App +20\n\t\t\n\t\t*goto_scene prestHigh-1-2-MineMoon\n\n\t#Hire the Game of Thrones writers to craft his speech.\n\n\t\t*set Rage -20\n\n\t\t*goto_scene prestHigh-1-3-FireAndBlood\n\n\t#Shock the world and turn down the invitation. Make them beg!\n\t\t*set Grift -20\n\n\t\t*goto_scene prestHigh-1-4-LoanRequest", "presthigh-1-2-minemoon": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nPresident Disaster makes up a bunch of exciting claims about gold, gems, and all manner of riches awaiting us beneath the moon's surface. Americans are thrilled about this new venture!\n\n*page_break\n\nUh-oh. NASA scientists leaked that our claims about moon-riches were, um, not technically correct. \n\n\nWhat do you do?\n\n*choice\n\t#Prove the haters wrong by sending the President's sons Smith and Wesson to open a mining operation.\n\n\t\t*set Outcome \"Smith and Wesson went bankrupt on the rocket ship alone, which turned out to be more of a hot air balloon. The family is out a lot of cash.\"\n\t\t*set Grift -20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Fire everyone at NASA.\n\n\n\t\t*set Outcome \"The President loves firing a bunch of people. You show him photos of the scientists crying and he sleeps like a baby.\"\n\t\t*set Rage -20\n\n\t\t*goto_scene displayOutcome\n\n\t#Claim that aliens stole all the moon gold, and we need a Space Force to take it back.\n\n\t\t*set Outcome \"The American love affair with space exploration is rekindled, and the country unites behind the quest for our rightful moon inheritance.\"\n\t\t*set App +20\n\n\t\t*goto_scene displayOutcome", "presthigh-1-3-fireandblood": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nPresident Disaster's 'Fire and Blood' address is by far the most terrifying speech in World Economic Forum history. By the end of it, the President is exhausted, having ranted about disemboweling his enemies and demanding more boobs on TV for a solid 45 minutes. For the first time in a while, he seems to have spent most of his anger. \n\n*page_break\n\nThe President is still spent; he can't seem to muster any energy at all right now. Something might be wrong.\n\n\nWhat do you do?\n\n*choice\n\t#Call the President's personal physician, Dr. Quack, and order an immediate checkup. \n\n\t\t*set Outcome \"Doctor Quack prescribes the President a dose of pills made from painite, the rarest mineral on Earth (look it up!). The President perks up, but paying for those pills sends his bank account in the other direction.\"\n\t\t*set Grift -20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Ask a real doctor to take a look.\n\n\n\t\t*set Outcome \"The doctor reviews the President's medical history and faints. When he comes to, the doc runs to the press to declare President Disaster totally unfit for office. Ouch!\"\n\t\t*set App -20\n\n\t\t*goto_scene displayOutcome\n\n\t#You've trained for this! Grab his calendar and scribble in several visits from foreign dignitaries. Then, get out the costume box!\n\n\t\t*set Outcome \"One by one, you dress up as the Russian minister of finance, the President of Japan, the prime mistress to the President of France, etc. until your costumes run out. Your accents are remarkably believable as you complete one visit after another, heaping praise on the Disaster in an endless litany of lies about his accomplishments. He laps up every word, never happier.\"\n\t\t*set Rage -20\n\n\t\t*goto_scene displayOutcome", "presthigh-1-4-loanrequest": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe press calls President Disaster a coward, claiming that no actual financial genius would refuse the speech. His stocks and companies take a huge financial hit on the embarrassment. \n\n*page_break\n\nLeveraging his strong international popularity, the President demands that all of our allies give him interest-free loans to get him back on his feet.\n\n\nWhat do you do?\n\n*choice\n\t#Go to NATO with hat in hand for your boss.\n\n\t\t*set Outcome \"The international press has a field day with 'The Beggar President.' His reputation is brutally trashed once again, and his companies tumble even farther in value, if that's possible.\"\n\t\t*set Grift -20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Tell him Russia might be more amenable to a loan request.\n\n\n\t\t*set Outcome \"The Russian President says he will consider a loan to the President. But first the President has to beg and bark like a dog. The President grudgingly complies...and afterwards rages furiously at the humiliation caused by you and your idea.\"\n\t\t*set Rage +20\n\n\t\t*goto_scene displayOutcome\n\n\t#Dip into the campaign war-chest first; it's just sitting there!\n\n\t\t*set Outcome \"Without the funds to run ads lying about our great and noble President, his poll numbers take a huge hit. Making up this lost ground will take awhile.\"\n\t\t*set App -20\n\n\t\t*goto_scene displayOutcome", "presthigh-2-1-uncoup": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nSTAT ALERT!\n\nWith fascists and creepazoids winning elections all over the world, the President has newfound support from a boatload of world leaders who begin referring to him as Dear Leader Disaster. They offer their support for a military takeover of the United Nations starting tonight!\n\nWhat do you do?\n\n*choice\n\t#Invade! It's right down the street from Disaster Towers, anyway.\n\n\t\t*set App -20\n\t\t\n\t\t*goto_scene prestHigh-2-2-flagBurning\n\n\t#Outsource this to the President's sons Smith & Wesson. They love an adventure! \n\n\t\t*set Grift -20\n\n\t\t*goto_scene prestHigh-2-3-zombieMovie\n\n\t#Secretly alert the world's democratic leaders that this is in the works. \n\n\t\t*set Rage +20\n\n\t\t*goto_scene prestHigh-2-4-noPhones", "presthigh-2-2-flagburning": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nAs the President's tanks roll up to the UN building, they are stopped by a massive crowd of Americans putting themselves in harm's way to prevent this attack. \n\n*page_break\n\nWith so many Americans angered by the bungled UN coup attempt, people start burning flags all over the country in protest.\n\n\nWhat do you do?\n\n*choice\n\t#Sell flags! Every flag burnt is another one sold, after all.\n\n\t\t*set Outcome \"Flag-burning coverage dominates the news 24-7, and the bad press costs President Disaster as much from his other businesses as he gained from flag sales. He's so furious he rips down every flag in the White House.\"\n\t\t*set Rage +20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Order every law enforcement agency to put a stop to it.\n\n\t\t*set Outcome \"The crackdowns go over as poorly as the UN coup did, and now the President is almost as unpopular at home as he is loved by fascists abroad.\"\n\t\t*set App -20\n\n\t\t*goto_scene displayOutcome\n\n\t#Have the Moose News graphic designers create a new flag for America.\n\n\t\t*set Outcome \"Moose News promptly rolls out the new American flag: a red, white, and blue plaid pattern that looks like the President's golf pants. The fascists abroad love it, and they order a ton of them!\"\n\t\t*set Grift +20\n\n\t\t*goto_scene displayOutcome", "presthigh-2-3-zombiemovie": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nSmith and Wesson buy all of the coolest Bond villain weapons ever made to pull off the coup. There's only one problem: they're all movie props. So now the Disasters are out millions and there's no coup (that last part is probably a good thing).\n\n*page_break\n\nWith all these amazing weapons props, Smith and Wesson want to finance a movie about the two of them fighting off a zombie invasion.\n\n\nWhat do you do?\n\n*choice\n\t#Greenlight this can't-miss action thriller immediately.\n\n\t\t*set Outcome \"The boys decided to buy an iconic movie studio to produce their film, then immediately get bored of the idea and forget about it. So now the President owns a broken-down old company that's bleeding cash and has no movie to produce.\"\n\t\t*set Grift -20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Leak this project to the Hollywood press for some advance buzz.\n\n\t\t*set Outcome \"The Hollywood tabloids have a field day the next morning with this incredibly silly movie idea, and the humiliation takes a major political toll on the whole family.\"\n\t\t*set App -20\n\n\t\t*goto_scene displayOutcome\n\n\t#Send some fake zombies after Smith and Wesson to scare them off the idea. And maybe film that?\n\n\n\t\t*set Outcome \"The video of Smith and Wesson shrieking and running from 'zombies' until they pass out goes instantly viral on GoofTube, making the whole family seem hilarious and so much more relatable. The public eats it up!\"\n\t\t*set App +20\n\n\t\t*goto_scene displayOutcome\n\n", "presthigh-2-4-nophones": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe President fields a bunch of outraged phone calls from democracies around the world, and each one makes him angrier than the last until he smashes up the entire Oval Office phone system. \n\n*page_break\n\nAfter all those mean calls from his 'allies,' President Disaster says that phones are an evil tool of the liberal mafia. He demands that you shut down the whole United States phone system right away.\n\n\nWhat do you do?\n\n*choice\n\t#Ignore the President. This is just another one of his weird ideas he'll forget.\n\n\t\t*set Outcome \"The President spends all morning on Moose News delivering a deranged rant about phone-related conspiracies. The public is...not impressed.\"\n\t\t*set App -20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Suggest that threatening to ennact this policy might get the President a nice off-the-books 'donation' from the phone companies.\n\n\t\t*set Outcome \"Sometimes things are as they seem. And in this case, the phone companies definitely believe the President seems crazy enough to take down the phone system. They pay up.\"\n\t\t*set Grift +20\n\n\t\t*goto_scene displayOutcome\n\n\t#Go ahead and announce that you plan to shut down the phone system.\n\n\t\t*set Outcome \"Wow! People really hate the phone companies. Most people think the President simply wants to break up the monopolies, and the poll numbers shoot right up.\"\n\t\t*set App +20\n\n\t\t*goto_scene displayOutcome\n\n", "prestlow-1-1-warwithcanada": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nSTAT ALERT!\n\nOur international prestige has hit a crisis point. We are so universally reviled that Canada just publicly declared that they are considering invading *us*!\n\nWhat do you do?\n\n*choice\n\t#Build a wall up north, STAT!\n\t\t*set Grift +20\n\t\t\n\t\t*goto_scene prestLow-1-2-NorthernWall\n\n\t#Send the President's daughter Duchess in secret to open a dialogue with the Canadians.\n\t\t*set Rage +20\n\n\t\t*goto_scene prestLow-1-3-SecretMarriage\n\n\t#Invade first! They will never see it coming.\n\t\t*set App -20\n\n\t\t*goto_scene prestLow-1-4-WarProtests", "prestlow-1-2-northernwall": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nPresident Disaster redirects a ton of our tax dollars to his construction companies, and overnight a giant, messy wall goes up across the Canadian border. We might not be much safer but he's a lot richer!\n\n*page_break\n\nSurprised by our defensive move, Canada admits through a CIA contact that they were trying to provoke us into striking first so the rest of the world would join them. They want to call the whole thing off.\n\n\nWhat do you do?\n\n*choice\n\t#Agree...but only if the Canadians make a private donation to the President.\n\n\t\t*set Outcome \"Canada agrees. Being internationally unpopular isn't fun, but it sure has made the President rich!\"\n\t\t*set Grift +20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Tell the President we have them where we want them. Invade!\n\n\n\t\t*set Outcome \"Realizing this might be the end of the world, the military leaders refuse and go to the press to shame the President into peace. Voters seem pretty mad at the President's recklessness.\"\n\t\t*set App -20\n\n\t\t*goto_scene displayOutcome\n\n\t#Agree, and promise publicly to be better world citizens.\n\n\t\t*set Outcome \"The rest of the world doesn't buy it, but our voters seem to like the idea of us acting less criminally insane. Who knew?\"\n\t\t*set App +20\n\n\t\t*goto_scene displayOutcome", "prestlow-1-3-secretmarriage": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nDuchess meets the Canadian Prime Minister in secret...and they fall in love! They announce they're leaving their spouses and getting married. The President rages in a jealous fury, the implications of which you try not to think too deeply about.\n\n*page_break\n\nWe're no longer on the brink of war, but President Disaster demands you kidnap Duchess and bring her back from her tryst with the Canadian PM. \n\nWhat do you do?\n\n*choice\n\t#Send the Navy SEALS to get Duchess back.\n\n\t\t*set Outcome \"Duchess is recaptured, but she refuses to speak to her father. His rage blasts through the roof as she locks herself in her room and plays sad Richard Marx songs.\"\n\t\t*set Rage +20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Bribe the Canadian Prime Minister to call it off.\n\n\n\t\t*set Outcome \"It costs a fortune, but everyone has a price, including the Canadian PM. Duchess seems heartbroken. Fortunately her husband Casper slept through the whole ordeal.\"\n\t\t*set Grift -20\n\n\t\t*goto_scene displayOutcome\n\n\t#Tell the President to get his daughter back the old-fashioned way and invade!\n\n\t\t*set Outcome \"Reluctant military leaders leak your demands to the press. Voters seem pretty mad that you might have ended the world and a wonderful love story at the same time, and you're forced to call it off.\"\n\t\t*set App -20\n\n\t\t*goto_scene displayOutcome", "prestlow-1-4-warprotests": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nAs our troops line up at the border, massive anti-war protests break out across the country demanding peace. For some reason, voters don't seem excited about the end of the world.\n\n*page_break\n\nYour military advisors agree that we must call off the invasion and reduce tensions with the Canadians. The President counters by demanding that they all be fired. \n\nWhat do you do?\n\n*choice\n\t#Get the live stream up and running! The President loves to make a public show of force.\n\n\t\t*set Outcome \"The President issues his termination with all due solemnity. The Join Chiefs of Staff all fall out of their chairs laughing. The hilarity only increases as the President tries and fails to shut off the live stream, turning beet red in the process. Will the President ever comprehend the American system of checks and balances?\"\n\t\t*set Rage +20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Hunt down a video of the Canadian PM doing something scandalous and release it! \n\n\n\t\t*set Outcome \"The best you can come up with is a news segment showing the Canadian PM clipping the ribbon on a new oil pipeline that utterly disregards First Nations' rights. It's old news, but it goes viral. President Disaster actually ends up looking really good by contrast, having never managed to pull something like that off.\"\n\t\t*set App +20\n\n\t\t*goto_scene displayOutcome\n\n\n\t#Encourage the President to see this, instead, as an opportunity to dissolve the US-Mexico-Canada trade agreement.  \n\n\t\t*set Outcome \"He loves the idea, acting immediately on your advice. Trouble is that he's forgotten how he forced his staff to work all kinds of personal financial benefits into that deal. His assets take a sizable hit.\"\n\t\t*set Grift -20\n\n\t\t*goto_scene displayOutcome", "prestlow-2-1-firesale": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nSTAT ALERT!\n\nThings are not looking good for America on the world stage. The Chinese president is so enraged by President Disaster's latest bullying in the ongoing trade war that he's threatening to sell off the bulk of their U.S. treasury bonds, whatever the cost. \n\nThose sweet, sweet bonds are valued at over $1 trillion. If China sells, the value of the dollar could collapse, dragging world markets down with it. \n\nWhat do you do?\n\n*choice\n\t#Send the President's daughter Duchess to re-negotiate.\n\t\t*set Rage +20\n\t\t\n\t\t*goto_scene prestLow-2-2-duchessSpy\n\n\t#Now's your chance to pull a George Soros and short the dollar!\n\t\t*set App -20\n\n\t\t*goto_scene prestLow-2-3-christmasSong\n\n\t#Double down and levy another $100 billion in tariffs against China. \n\t\t*set Grift -20\n\n\t\t*goto_scene prestLow-2-4-liveAid", "prestlow-2-2-duchessspy": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nDuchess makes fast friends with the Chinese diplomats and averts the crisis. But she tells Daddy she intends to go to China for a few weeks to negotiate some awesome business deals. He can't stand the thought of her being gone and throws a massive fit!\n\n*page_break\n\nPresident Disaster feels so betrayed by Duchess's impending trip abroad that he decides she must be a secret traitor. He wants you to investigate.\n\n\nWhat do you do?\n\n*choice\n\t#Pretend to investigate, and then tell the President everything's fine.\n\n\t\t*set Outcome \"Someone on staff must've overheard you briefing the President and leaked the 'investigation' to the media! Half the public is outraged that there might be a spy in the family, and the other half is outraged that the President would investigate his own kid.\"\n\t\t*set App -20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Use this as a chance to get rid of that nosy daughter! Tell him she might be a spy.\n\n\n\t\t*set Outcome \"The President and Duchess argue all night. She convinces him she's not a spy, but he refuses to let her go to China out of spite. That costs their business millions in lost deals.\"\n\t\t*set Grift -20\n\n\t\t*goto_scene displayOutcome\n\n\t#Tell Duchess her Dad's getting paranoid and she needs to fix it.\n\n\t\t*set Outcome \"Duchess coos in her Dad's ear all night (YIKES). By the morning he's totally cool with her trip and the millions of dollars it will bring the family's businesses.\"\n\t\t*set Grift +20\n\n\t\t*goto_scene displayOutcome", "prestlow-2-3-christmassong": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nChina decided not to wreck the US (and by extension, the world) economy. But word of the President's panic-move to short the dollar enrages the public. It's positively unpatriotic, even for him!\n\n*page_break\n\nIn a desperate attempt to win back public sentiment after shorting the dollar, President Disaster decides to record a Christmas song right away.\n\nWhat do you do?\n\n*choice\n\t#Gently remind the President he sings like a drunk rooster.\n\n\t\t*set Outcome \"The President turns rooster red. He demands you crow and caw for him the rest of the day. And he makes you wear a chicken suit while you do it.\"\n\t\t*set Rage +20\n\n\t\t*goto_scene displayOutcome\n\n\t#Hire a real singer to record it and tell the President it's his voice.\n\n\t\t*set Outcome \"President Disaster loves the sound of his own voice! ...Which isn't technically his, but no one reminds him of that. He's so at peace now that he's got a talent. It's almost charming!\"\n\t\t*set Rage -20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Suggest he make the song non-denominational so everyone can enjoy it.\n\n\t\t*set Outcome \"Non-denominational?! The President laughs you out of the room. He records a rambling screed about how the Baby Jesus loves him the most, and of course his supporters pay obscene prices to download it.\"\n\t\t*set Grift +20\n\n\t\t*goto_scene displayOutcome", "prestlow-2-4-liveaid": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nChina did not appreciate those tariffs! In return, they've threatened to ban all Disaster-branded merchandise from the country. Disaster Inc. stock prices take a massive nose dive right away.\n\n*page_break\n\nTo improve his worldwide reputation and stock valuation after the tariff debacle, the President tells you to organize a massive series of concerts to 'help those starving kids or whatever.' And he wants them all held at Disaster-branded venues.\n\n\nWhat do you do?\n\n*choice\n\t#Make music! Get on the phone with all the cool bands right away.\n\n\t\t*set Outcome \"The bands all refuse to participate in anything organized by this President. But word gets out about the President's emerging empathy and the public clings to it like a life-raft of hope.\"\n\t\t*set App +20\n\n\t\t*goto_scene displayOutcome\n\n\t#Gently imply that golf courses aren't the best concert venues.\n\n\t\t*set Outcome \"President Disaster grabs his golf club and chases you out onto his new putting green (aka the White House lawn). He forces you to sing Ted Nugent songs while he putts at you violently.\"\n\t\t*set Rage +20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Look into whether the money would actually go to help any children.\n\n\t\t*set Outcome \"You make some calls and find out that of course the money would all be re-routed to Disaster offshore accounts. Even worse, a few of the people you talk to realize that the President is planning a scam and alert the media and a fuming public.\"\n\t\t*set App -20\n\n\t\t*goto_scene displayOutcome", "ragehigh-1-1-nukes": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nSTAT ALERT!\n\nWell, now you've done it. The President is hopping mad. Alarms sound as DEFCON drops to 2 (1 = end of the world!). You rush to the situation room to find President Disaster throwing darts at a map: he's desperate to nuke somebody, anybody. \n\nWhat do you do?\n\n*choice\n\t#You step in front of the map, a single tear falling from your cheek.\n\n\t\t*set Prest +20\n\t\t\n\t\t*goto_scene rageHigh-1-2-NobelPrize\n\n\t#You point to where the dart landed on the map. With a sly wink to the Joint Chiefs, you say, 'You know what to do, fellas.'\n\n\t\t*set Prest -20\n\n\t\t*goto_scene rageHigh-1-3-DayAfterTomorrow\n\n\t#You quietly start live-streaming the President's tantrum to your Fakebook page.\n\n\t\t*set App -20 \n\n\t\t*goto_scene ragehigh-1-4-DonateToOpponent\n", "ragehigh-1-2-nobelprize": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe dart hits you square in the forehead...and the President bursts out laughing. \n\nHe's still mad, but at least he's laughing. And he completely forgets about the whole 'starting a war' thing. DEFCON goes back to 4. \n\nThe phone rings. It's the President of Finland, who is so relieved that the chaos has ended that he says he's nominating President Disaster for the Nobel Prize. \n\n*page_break\n\nThe Nobel Prize! What an honor that would be! President Disaster turns to you and immediately orders you to 'make sure this happens.' Wink, wink, nudge, nudge. '...Or else.'\n\nWhat do you do?\n\n*choice\n\t#You wink back. But no way you're gonna fix it.\n\n\t\t*set Outcome \"He loses the Nobel in a landslide but never notices because you've ordered Moose News to declare that he won anyway. The late night comedians have a field day.\"\n\t\t*set App -15\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Why not? Let's rig this sucker.\n\n\n\t\t*set Outcome \"You hop on the phone with every voter and remind them that the surest deterrent to war is President Disaster winning the Nobel. It works! So at least he's won one popular vote.\"\n\t\t*set Prest +20\n\n\t\t*goto_scene displayOutcome\n\n\t#Remind him that the other nominee is the President of Russia.\n\n\t\t*set Outcome \"President Disaster decides to throw the election to his buddy for a handsome price. He makes a killing.\"\n\t\t*set Grift +20\n\n\t\t*goto_scene displayOutcome", "ragehigh-1-3-dayaftertomorrow": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe Joint Chiefs start making a bunch of fake computer noises. They pull out a huge (fake) red button and ask the President to push it. He does, cackling.\n\nYou quickly pull up the end of the movie 'The Day After Tomorrow' on your phone, telling him it's live footage of the result. Of course he buys it.\n\n*page_break\n\nThe President demands a military parade to celebrate his victory.\n\nWhat do you do?\n\n*choice\n\t#Schedule that parade.\n\n\t\t*set Outcome \"The parade costs a fortune! You're forced to divert millions that were supposed to quietly go into the President's pocket to pay for it.\"\n\t\t*set Grift -20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Suggest he go on Moose News to celebrate, instead.\n\n\n\t\t*set Outcome \"The President crows about winning a war that didn't happen. It's a bad look. Lots of people have become convinced he's gone totally senile.\"\n\t\t*set App -20\n\n\t\t*goto_scene displayOutcome\n\n\t#Ask the First Lady to handle it.\n\n\t\t*set Outcome \"The First Lady throws a rockin' shindig on the White House lawn. Since nothing bad actually happened, people love the party! It's a ratings hit.\"\n\t\t*set App +20\n\n\t\t*goto_scene displayOutcome", "ragehigh-2-1-martiallaw": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nSTAT ALERT!\n\nThe President's fury is off the charts! In a tantrum, he's threatening to declare martial law.\n\nWhat do you do?\n\n*choice\n\t#Declare it. Screw the people!\n\n\t\t*set App -20\n\t\t\n\t\t*goto_scene rageHigh-2-2-MartialLawDeclared\n\n\t#Bribe the President of Russia to sweet-talk him out of it.\n\n\t\t*set Grift -20\n\n\t\t*goto_scene rageHigh-2-3-RussiaBribe\n\n\t#You slip something in his drink to calm him down.\n\n\t\t*set Prest -20 \n\n\t\t*goto_scene rageHigh-2-4-SlipSomething", "ragehigh-2-2-martiallawdeclared": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nChaos ensues for several hours after the President makes his pronouncement on Twitter. But then an online parody goes viral, and nobody seems to take the news seriously. That includes the generals, who ignore this as they have so many other things on their plates. But the President's reputation has somehow found a new low.\n\n*page_break\n\nPresident Disaster demands his insubordinate general be fired! He even makes his stupid hand gesture. \n\nWhat do you do?\n\n*choice\n\t#Fire the bastards!\n\n\t\t*set Outcome \"The rest of the world rejoices as the planet's biggest superpower demilitarizes. Flower power, baby!\"\n\t\t*set Prest +20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Suggest a better idea: Any general can keep his job...if he pays the exorbitant membership fee to Disast-a-Lago.\n\n\n\t\t*set Outcome \"Apparently these generals have plenty of grift of their own! Most are happy to pay up and hit the links.\"\n\t\t*set Grift +20\n\n\t\t*goto_scene displayOutcome\n\n\t#Remind him that he can't have a Space Force without his generals.\n\n\t\t*set Outcome \"President Disaster gets hella fired up about Space Force again, calling our allies 24/7 to join the effort. It's a huge embarrassment.\"\n\t\t*set Prest -20\n\n\t\t*goto_scene displayOutcome", "ragehigh-2-3-russiabribe": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe President of Russia is happy to help, but it costs you a ridiculous, outrageous, almost offensive amount from the Disaster slush funds. \n\n*page_break\n\nSo martial law is averted, but you need to replace the bribe funds ASAP.\n\nWhat do you do?\n\n*choice\n\t#Offer Puerto Rico to Russia to recoup the money.\n\n\t\t*set Outcome \"Once the press gets wind of this, the Latinx community unites in opposition across the country. Not only does Russia laugh and hang up, but you've tanked approval numbers once again.\"\n\t\t*set App -20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#You launch Disaster Cruise Lines to build a new fortune.\n\n\n\t\t*set Outcome \"Four trips sell out overnight! Unfortunately, all four boats sink on their maiden voyages, doubling your losses.\"\n\t\t*set Grift -20\n\n\t\t*goto_scene displayOutcome\n\n\t#Pretend his youngest son Afterthought has cancer and start a fundraiser!\n\n\t\t*set Outcome \"People love a sad story. Nobody donates much, but you win a lot of hearts and minds.\"\n\t\t*set App +20\n\n\t\t*goto_scene displayOutcome", "ragehigh-2-4-slipsomething": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nHe's no longer demanding martial law, congrats. But did you read the label closely? Because he's hiding behind the curtains and dialing world leaders to ask if they know about the reptile people.\n\n*page_break\n\nPresident Disaster is now convinced that a secret cabal of reptile people are trying to take over the world. \n\nWhat do you do?\n\n*choice\n\t#Go public with this incredibly important revelation.\n\n\t\t*set Outcome \"People laugh and laugh at our reptile-phobe in chief.\"\n\t\t*set App -20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#You call the UN Secretary General to talk the President out of this delusion.\n\n\n\t\t*set Outcome \"The Secretary General talks him down...but then tells the story to every other member nation as a reminder to stay off drugs.\"\n\t\t*set Prest -20\n\n\t\t*goto_scene displayOutcome\n\n\t#Tell him there's only one thing to do: submit to your new overlords.\n\n\t\t*set Outcome \"The President empties several bank accounts and wires them to all kinds of weirdos before the drugs wear off.\"\n\t\t*set Grift -20\n\n\t\t*goto_scene displayOutcome", "ragelow-1-1-twittermissing": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nSTAT ALERT!\n\nSomething is VERY wrong. \n\nDisaster slept late, missing his early morning Twitter session. He hasn't tweeted since yesterday and rumors are circulating. A rightwing conspiracy theorist wildly speculates that the youngest member of Congress--a Democrat--has kidnapped him. His followers start threatening retaliation, but Disaster refuses to come out of his room. \n\nWhat do you do?\n\n*choice\n\t#Get him a can of Disaster Cola and spike it with a triple dose of uppers.\n\n\t\t*set Grift +25\n\t\t\n\t\t*goto_scene rageLow-1-2-ColaRevolution\n\n\t#Kidnap the youngest member of Congress for a little 'questioning.'\n\n\t\t*set Rage -15\n\n\t\t*goto_scene rageLow-1-3-KidnapDisaster\n\n\t#Put the Vice President in charge for now.\n\t\t*set Prest -25 \n\n\t\t*goto_scene rageLow-1-4-MissionaryMadness", "ragelow-1-2-colarevolution": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThat did the trick! The President bounds out of his room full of energy...but it's positive energy? There's a first time for everything, apparently. Anyway, he's now in love with Disaster Cola and starts tweeting about it at length. Sales skyrocket!\n\n*page_break\n\nAfter the eager response from his Twitter bots--err, fans--President Disaster orders you to mass-produce the new (upper-laden) formula for Disaster Cola for the military to help them focus.\n \n\nWhat do you do?\n\n*choice\n\t#Crank out that Cola!\n\n\t\t*set Outcome \"Hepped up on goofballs, the military starts randomly invading other countries. Fortunately, the sugar crash stops them after a few miles, but our reputation abroad takes a huge hit.\"\n\t\t*set Prest -20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Refuse, citing the minor health concerns of 'possible stroke' and 'spontaneous implosion' on the Disaster Cola label.\n\n\n\t\t*set Outcome \"Without that mass production in the wake of all the hype, Disaster Cola becomes a rare collector's item and jumps 10x in price. Chalk up another accidental billion for the boss!\"\n\t\t*set Grift +20\n\n\t\t*goto_scene displayOutcome\n\n\n\t#Save some dough by buying cheap knock-off Cola and passing it off as the real deal.\n\n\t\t*set Outcome \"Whoa, the knockoff Cola is actually far tastier than Disaster Cola (probably because it has less dirt in it). American troops talk up their new favorite beverage in the media, and people love it!\"\n\t\t*set App +20\n\n\t\t*goto_scene displayOutcome", "ragelow-1-3-kidnapdisaster": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nYou manage to pull off the kidnapping without incident. Disaster leaps out of bed with the vivacity of a genuinely fit and healthy person when he wakes to find her bound and gagged in a chair by his bed. You don't understand why she just rolls her eyes so very dramatically until you pull out the gag.   \n\n*page_break\n\nShe smiles, her eyes glinting mischievously from behind a very cool pair of glasses, and informs you calmly that she's wearing the brand new model of Goggle Glasses. Everything that's happened is being live-streamed straight to Instagram from a tiny camera on the frame. \n \n\nWhat do you do?\n\n*choice\n\t#You call the President's fixer and tell him to doctor a sex tape featuring the President and the youngest member of Congress and to release it immediately. Her live-stream might then just look like foreplay. \n\n\t\t*set Outcome \"Absolutely nobody believes that the youngest member of Congress--a brilliant, articulate and passionately ethical firebrand from the Bronx--would ever sleep with the President. She calls for a boycott of all Disaster products and people seem to agree after this debacle.\"\n\t\t*set Grift -20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Pull off the glasses and crush them under your foot.\n\n\n\t\t*set Outcome \"Too late. The youngest member of Congress has more followers than the Gods of all world religions combined. The internet is ablaze and there's no putting out that fire.\"\n\t\t*set App -20\n\n\t\t*goto_scene displayOutcome\n\n\n\t#Unsure what else to do, you untie her and let her go. \n\n\t\t*set Outcome \"You hop on instagram and cannot find the live-stream. Was she bluffing? While contemplating this, she tweets out that she's got the President on video promising to donate $10 million a year each to Planned Parenthood and the ACLU. If he ever fails to make the donation, she'll release the video.\"\n\t\t*set Grift -20\n\n\t\t*goto_scene displayOutcome", "ragelow-1-4-missionarymadness": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nVP McPious uses his time in the spotlight to evangelize. Aggressively. He calls every world leader to proselytize to them at length. It goes over quite poorly.\n\n*page_break\n\nDisappointed with the worldwide rejection of his fundamentalist rants, VP McPious demands that the US send armed missionaries all over the world to preach the faith. \n \n\nWhat do you do?\n\n*choice\n\t#Send out the missionaries.\n\n\t\t*set Outcome \"As you might expect, this makes the international situation even worse. The 'missionaries' are treated as invading forces by some countries, and the UN condemns your forceful approach. A humbled VP hands the reins back over to the President once he finally re-emerges.\"\n\t\t*set Prest -20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Frame Vice President McPious for a scandal to put him in his place.\n\n\n\t\t*set Outcome \"People were shocked to learn that VP McPious is a serial peeping tom--and the President's supporters love it! When the President wakes up, he high-fives the confused VP in solidarity and gets back to work.\"\n\t\t*set App +20\n\n\t\t*goto_scene displayOutcome\n\n\n\t#Ask him to pray on the decision with you. \n\n\t\t*set Outcome \"VP McPious calls in the most expensive megachurch pastor in the world to lead the prayer session. It costs so much that you can no longer even afford your zealot army. When the President finally emerges, you doctor the books and hope he never notices.\" \n\t\t*set Grift -20\n\n\t\t*goto_scene displayOutcome", "ragelow-2-1-whtour": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nSTAT ALERT!\n\nYou find President Disaster trailing cheerily behind a group of visitors on a tour of the White House. When you ask him what he's doing, he says that he's 'just visiting the President's house.' When you try to remind him that he is the President and that he lives here, he laughs. You've never seen him so happy. Or so confused. \n\nWhat do you do?\n\n*choice\n\t#Join the tour. When it ends, show him the exit. \n\n\t\t*set Grift -20\n\t\t\n\t\t*goto_scene rageLow-2-2-lostPresident\n\n\t#Call the doctor.\n\n\t\t*set App +15\n\n\t\t*goto_scene rageLow-2-3-brainMites\n\n\t#Detain all of these visitors until they sign NDAs about the President's minor episode.\n\t\n\t\t*set Prest -20 \n\n\t\t*goto_scene rageLow-2-4-germanBlackmail", "ragelow-2-2-lostpresident": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nPresident Disaster stumbled out of the White House with the crowd, shaking hands and just kind of moving with the mob...until the Secret Service lost sight of him! Now the President is missing, and his stocks take a huge hit on the rumors.\n\n*page_break\n\nIt's the next morning and the President is still missing.\n \n\nWhat do you do?\n\n*choice\n\t#Send out the army to look for him.\n\n\t\t*set Outcome \"People really hate the army pouring into the streets. They do find the President wedged into a Burger Queen bathroom stall and passed out from over-eating, though. So that's...good news?\"\n\t\t*set App -20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Remind Vice President McPious he is now the acting President.\n\n\n\t\t*set Outcome \"McPious hops on the phone and begs our allies to use their satellites to help. They quickly locate President Disaster, who's sitting in the Potomac and arguing loudly with a goose. They find it in their hearts take great pity on our once-great nation.\"\n\t\t*set Prest +15\n\n\t\t*goto_scene displayOutcome\n\n\n\t#Call Moose News and have them beg the President to phone home.\n\n\t\t*set Outcome \"You never realized how much the President looked like E.T. until the internet started generating a bunch of phone home memes with the two of them photoshopped together. Suddenly people find the President adorable, especially when he turns up in a pile of stuffed animals.\"\n\t\t*set App +15\n\n\t\t*goto_scene displayOutcome", "ragelow-2-3-brainmites": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe White House doctor isn't really a doctor, he's more of a quack. He diagnoses the President with terminal brain mites, and the public sympathy comes flooding in.\n\n*page_break\n\nThe President thinks he's going to die from this ridiculous diagnosis of 'brain mites.'\n\nWhat do you do?\n\n*choice\n\t#Give him some kind of fake cure.\n\n\t\t*set Outcome \"You feed the President some oatmeal with blue food coloring in it, and he declares he's never felt better! He then starts selling Magic Blue Oatmeal to his supporters, who immediately order tons of it.\"\n\t\t*set Grift +20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Fire that doctor and bring in a real one to explain things.\n\n\n\t\t*set Outcome \"Unfortunately, President Disaster threatened the doctor's life if the doctor didn't go on Moose News and declare that brain mites are real. Within a few hours, everyone realized the President is just confused, which scares even more investors from his businesses.\"\n\t\t*set Grift -15\n\n\t\t*goto_scene displayOutcome\n\n\n\t#Prepare a new will for the dying President.\n\n\t\t*set Outcome \"The President insists that upon his death the United States must declare war on literally everyone. You are assured that this is unenforceable in a will, but our allies weren't happy to hear about it.\"\n\t\t*set Prest -15\n\n\t\t*goto_scene displayOutcome", "ragelow-2-4-germanblackmail": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nIt turns out that most of the White House visitors were German tourists. Detaining them has caused an international incident, and our allies are up in arms!\n\n*page_break\n\nGermany has demanded the immediate release of their citizens, and they have threatened to release major blackmail material on the President if you do not comply.\n\nWhat do you do?\n\n*choice\n\t#Let them release it. How bad can it be?\n\n\t\t*set Outcome \"The Germans promptly release their video of the President humping an American flag to...completion. But they completely underestimated how many Americans would find this deeply patriotic. \"\n\t\t*set App +20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Let the Germans go and apologize for the misunderstanding.\n\n\n\t\t*set Outcome \"The outraged Germans do a media tour of Europe, and unfortunately a few of them are very good at impersonating a disoriented President Disaster. The world has a good laugh at his expense.\"\n\t\t*set Prest -15\n\n\t\t*goto_scene displayOutcome\n\n\n\t#Try to buy that blackmail material back from the Germans\n\n\t\t*set Outcome \"The Germans agree to sell you their dirty video file of the President, and it's not cheap. You ask to see it but the President quickly swallows the memory card before you get a look.\"\n\t\t*set Grift -15\n\n\t\t*goto_scene displayOutcome", "ragehigh-1-4-donatetoopponent": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nHe blusters so long he exhausts himself and falls asleep in the situation room. By the time he wakes up, he's forgotten about his rant, but the people haven't. Millions pour into his opponents' election coffers.\n\n*page_break\n\nThe President demands that he raise even more money than his suddenly flush opponents. He gives you 24 hours.\n\nWhat do you do?\n\n*choice\n\t#You secretly divert all ICE funding to his election account.\n\n\t\t*set Outcome \"An ICE spokesperson blows the whistle on Moose News. The President's base is outraged.\"\n\t\t*set App -20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#You sell a couple of his most profitable hotels to pay for it.\n\n\n\t\t*set Outcome \"The election accounts are full, but suddenly the President's personal finances are a mess. Luckily he doesn't do his own books.\"\n\t\t*set Grift -20\n\n\t\t*goto_scene displayOutcome\n\n\t#You take the existing election funds and bet them all on the big game.\n\n\t\t*set Outcome \"Winner winner chicken dinner! Funding secured.\"\n\t\t*set Grift +20\n\n\t\t*goto_scene displayOutcome", "scenariocontroller": "*set checkdelay +1\n\n*comment Avoid any counters going above 100 or below 0.\n\n*if Rage > 100\n\t*set Rage 100\n\n*if Rage \u003c 0\n\t*set Rage 0\n\n*if Grift > 100\n\t*set Grift 100\n\n*if Grift \u003c 0\n\t*set Grift 0\n\n*if App > 100\n\t*set App 100\n\n*if App \u003c 0\n\t*set App 0\n\n*if Prest > 100\n\t*set Prest 100\n\n*if Prest \u003c 0\n\t*set Prest 0\n\n*comment We must calculate if there's an end scenario.\n\n*comment Rage Checks:\n\n*if (Rage > 89) and (Grift > 89)\n\t*set Outcome \"With the President's rage and theft out of control, an angry mob attacks the White House and burns it to the ground.\"\n\t*goto_scene endMob\n\n*if (Rage > 89) and (Grift \u003c 11)\n\t*set Outcome \"President Disaster is now ultra-furious and super poor, a truly toxic combination for him.\"\n\t*goto_scene endCombust\n\n*if (Rage > 89) and (App > 89)\n\t*set Outcome \"President Disaster is incredibly popular, but he's also never been angrier.\"\n\t*goto_scene endFascism\n\n*if (Rage > 89) and (App \u003c 11)\n\t*set Outcome \"With his approval hitting record lows and his fury hitting record highs, the President makes his final move: pinning all of his crimes on you.\"\n\t*goto_scene endPins\n\n*if (Rage > 89) and (Prest > 89)\n\t*set Outcome \"President Disaster's epic rage has become wildly popular as a governing model around the world. Our civilization is about to collapse!\"\n\t*goto_scene endAliens\n\n*if (Rage > 89) and (Prest \u003c 11)\n\t*set Outcome \"President Disaster is now beyond furious at how much the world hates him.\"\n\t*goto_scene endNukes\n\n*if (Rage \u003c 11) and (Grift > 89)\n\t*set Outcome \"The President has never been richer or calmer. He reaches a new state of capitalist zen.\"\n\t*goto_scene endChina\n\n*if (Rage \u003c 11) and (Grift \u003c 11)\n\t*set Outcome \"You've turned President Disaster into a whole new man. He's so calm! And so honest; he's renounced all theft and corruption.\"\n\t*goto_scene endGod\n\n*if (Rage \u003c 11) and (App > 89)\n\t*set Outcome \"The President's popularity has just peaked, and so has his mastery over his emotions.\"\n\t*goto_scene endReelection\n\n*if (Rage \u003c 11) and (App \u003c 10)\n\t*set Outcome \"The President has never been more despised, and thanks to you he's finally made peace with it all.\"\n\t*goto_scene endRussia\n\n*if (Rage \u003c 11) and (Prest > 89)\n\t*set Outcome \"You've turned the President into a whole new man, so calm and respected across the globe!\"\n\t*goto_scene endNWO\n\n*if (Rage \u003c 11) and (Prest \u003c 11)\n\t*set Outcome \"Improbably, President Disaster has become extremely relaxed about how much the world hates him. He finally realizes he's not fit to govern; in fact, no human is!\"\n\t*goto_scene endAliens\n\n*comment Grift Checks:\n\n*if (Grift > 89) and (Rage > 89)\n\t*set Outcome \"With the President's rage and theft out of control, an angry mob attacks the White House and burns it to the ground.\"\n\t*goto_scene endMob\n\n*if (Grift > 89) and (Rage \u003c 11)\n\t*set Outcome \"The President has never been richer or calmer. He reaches a new state of capitalist zen.\"\n\t*goto_scene endChina\n\n*if (Grift > 89) and (App > 89)\n\t*set Outcome \"Wow! President Disaster has set new marks for popularity *and* the brazen theft of billions of dollars. He's really feeling himself!\"\n\t*goto_scene endFascism\n\n*if (Grift > 89) and (App \u003c 11)\n\t*set Outcome \"Maybe President Disaster is really unpopular, but he's also never been richer.\" \n\t*goto_scene endSteal\n\n*if (Grift > 89) and (Prest > 89)\n\t*set Outcome \"The President's become so good at massive grift that the rest of the planet can't help but admire him.\"\n\t*goto_scene endNWO\n\n*if (Grift > 89) and (Prest \u003c 11)\n\t*set Outcome \"With all this money and so many enemies around the globe, President Disaster decides to splurge -- on a team of mercenaries to kill all the other world leaders!\"\n\t*goto_scene endAnarchy\n\n*if (Grift \u003c 11) and (Rage > 89)\n\t*set Outcome \"President Disaster is now ultra-furious and super poor, a truly toxic combination for him.\"\n\t*goto_scene endCombust\n\n*if (Grift \u003c 11) and (Rage \u003c 11)\n\t*set Outcome \"You've turned President Disaster into a whole new man. He's so calm! And so honest; he's renounced all theft and corruption.\"\n\t*goto_scene endGod\n\n*if (Grift \u003c 11) and (App > 89)\n\t*set Outcome \"President Disaster has become President Integrity, and his popularity is now through the roof.\"\n\t*goto_scene endReelection\n\n*if (Grift \u003c 11) and (App \u003c 11)\n\t*set Outcome \"With no money and no love from his people, President Disaster has finally hit rock bottom.\" \n\t*goto_scene endMove\n\n*if (Grift \u003c 11) and (Prest > 89)\n\t*set Outcome \"You've now made the President poor as hell, but also extremely popular around the globe. He decides he needs a new job!\" \n\t*goto_scene endUN\n\n*if (Grift \u003c 11) and (Prest \u003c 11)\n\t*set Outcome \"With no money and universal contempt from his peers around the globe, President Disaster has finally hit rock bottom.\" \n\t*goto_scene endMove\n\n*comment App Checks:\n\n*if (App > 89) and (Rage > 89)\n\t*set Outcome \"President Disaster is incredibly popular, but he's also never been angrier.\"\n\t*goto_scene endFascism\n\n*if (App > 89) and (Rage \u003c 11)\n\t*set Outcome \"The President's popularity has just peaked, and so has his mastery over his emotions.\"\n\t*goto_scene endReelection\n\n*if (App > 89) and (Grift > 89)\n\t*set Outcome \"Wow! President Disaster has set new marks for popularity *and* the brazen theft of billions of dollars. He's really feeling himself!\"\n\t*goto_scene endFascism\n\n*if (App > 89) and (Grift \u003c 11)\n\t*set Outcome \"President Disaster has become President Integrity, and his popularity is now through the roof.\"\n\t*goto_scene endReelection\n\n*if (App > 89) and (Prest > 89)\n\t*set Outcome \"Look at you! You've now made President Disaster the most popular person in the country and around the globe.\"\n\t*goto_scene endNWO\n\n*if (App > 89) and (Prest \u003c 11)\n\t*set Outcome \"President Disaster has now polarized the entire planet. All Americans support him, and the rest of the world demands his immediate removal.\"\n\t*goto_scene endNukes\n\n*if (App \u003c 11) and (Rage > 89)\n\t*set Outcome \"With his approval hitting record lows and his fury hitting record highs, the President makes his final move: pinning all of his crimes on you.\"\n\t*goto_scene endPins\n\n*if (App \u003c 11) and (Rage \u003c 11)\n\t*set Outcome \"The President has never been more despised, and thanks to you he's finally made peace with it all.\"\n\t*goto_scene endRussia\n\n*if (App \u003c 11) and (Grift > 89)\n\t*set Outcome \"Maybe President Disaste
