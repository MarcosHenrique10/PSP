. Except maybe that time he got to tour the biggest holding cell for immigrant children stopped at the border. The rest of the world is...less enthused.\"\n\t\t*set Rage -15\n\t\t*set App -15\n\t\t*set Prest -15\n\n\t\t*goto_scene displayOutcome", "70fitnesstracker": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\n\nA fan of the President has sent him the latest fitness tracking ring, with good wishes for a 'long and happy life.' \n\nWhat do you do?\n\n*choice\n\n\t#Keep it for yourself. The President doesn't believe in exercise.   \n\t\t*set Outcome \"You're actually pretty excited about committing to a more active lifestyle. But, after a series of audio recordings of closed-door meetings with the President get leaked to the press, you realize the tracker is actually a bug. You crush it beneath your heal, but it's too late—for both the President's ratings and your left pinky finger. Sad.\"\n\t\t*set Rage +5\n\t\t*set App -5\t\n\t\t*achieve wellness\t\n\n\t\t*goto_scene displayOutcome\n\n\t#Convince the President it's the latest in anti-spy tech. \n\t\t*set Outcome \"He's thrilled and immediately slides it onto the only finger big enough for a snug fit—the middle one. He takes to waving it around anytime anybody walks into the room, which means he's getting more activity than the past 10 months combined but also has the effect of conveying a rather rude gesture to several foreign heads of state and other until-now loyal members of Congress.\"\n\t\t*set App -5\n\t\t*set Prest -5\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Give it to the President's daughter, Duchess.\n\t\t*set Outcome \"She's thrilled and so is her father. He loves it when you give her gifts. She sends it immediately to her team of underpaid engineers in India, who copy the design and start selling it on the black market for a fraction of the price. Sales soar.\" \n\t\t*set Grift +10\n\t\t*set Rage -5\n\t\t*achieve duchess\n\t\t\n\n\t\t*goto_scene displayOutcome\n\n\n", "71republicansbreak": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nSeveral Republicans discover that they aren't complete bigots and openly condemn the President's latest racist ravings. \n\nWhat do you do?\n\n*choice\n\n\t#Tweet out an apology. From the President's account.   \n\t\t*set Outcome \"You feel like you might have saved yourself from eternal damnation. He is enraged, of course. What you don't expect is that he spends the rest of the night snorting Adderal and tweeting out some of the most bigoted bile of his entire Presidency. You feel so bad that you donate your entire paycheck to the ACLU.\"\n\t\t*set Rage +10\n\t\t*set App -5\n\t\t*achieve charity\n\n\t\t*goto_scene displayOutcome\n\n\t#Try to distract the President with a six-pack of Diet Coke.  \n\t\t*set Outcome \"It works. He drinks every one and starts tweeting out raving encomiums to Coke, which his supporters misunderstand as a reference to drugs that frighten them. At least the President isn't angry.\"\n\t\t*set Rage -5\n\t\t*set App -5\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Encourage the President to explain himself.\n\t\t*set Outcome \"He loves the spotlight and enthusiastically take an invitation from Moose News to share his latest views on eugenics. Turns out that his supporters--at home and abroad--love this stuff. You try to open a vein with a filing folder. It doesn't work. Unfortunately.\" \n\t\t*set Rage -5\n\t\t*set App +5\n\t\t*set Prest +5\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "72automakers": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nAmerica's biggest auto-makers have threatened to halt production in protest of tariffs that are gutting their industry. \n\nWhat do you do?\n\n*choice\n\n\t#Suggest an emergency reduction of tariffs.   \n\t\t*set Outcome \"The President is enraged but he knows he cannot risk losing the favor of Michigan voters who work in that industry. He agrees to the reduction, giving himself a boost in domestic and international approval in the bargain, but insists on taking a pound of your flesh (literally) to make himself feel even better. You pretend it's kinda like a diet--you didn't really need that chunk of your thigh, did you?\"\n\t\t*set Rage +5\n\t\t*set App +5\n\t\t*set Prest +5\n\t\t*goto_scene displayOutcome\n\n\t#Recommend nationalizing the auto industry. \n\t\t*set Outcome \"The President loves the idea and immediately signs an executive order that also names Disaster Inc. as the exclusive subcontractor. He might lose Michigan in 2020, but you're not sure he'll actually care given how bigly he is going to win in the grift department. Good going?\"\n\t\t*set App -5\n\t\t*set Grift +10\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Immediately buy a new car before the prices skyrocket.\n\t\t*set Outcome \"Didn't you take this job because you care about America more than yourself? Guess not. Everybody but you is gonna lose, which in the case of Disaster isn't the worst thing if you want to save America. So, actually, are congratulations in order?\" \n\t\t*set Rage +5\n\t\t*set Grift -5\n\t\t*set App -5\n\t\t*set Prest -5\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "73sixfortynine": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\n\nSixFortyNine--the media outlet that infamously, incorrectly predicted Disaster's loss in 2016--is predicting his loss again(?) in 2020.  \n\nWhat do you do?\n\n*choice\n\n\t#Put several copies of the article on the President's bathroom bookshelf.   \n\t\t*set Outcome \"He does spend an inordinate amount of time in there, but he can barely write let alone read. He does notice his unflattering picture at the head of the article, though, and tries to string up his bathroom curator. You manage to get her out through the kitchens.\"\n\t\t*set Rage +10\n\t\t*goto_scene displayOutcome\n\n\n\t#Convince the editor at SixFortyNine to publish a retraction. \n\t\t*set Outcome \"He does it, but for a big price. On the plus side, it turns out that moderates are actually motivated by the terrifying prospect of another four years of Disaster. Passionate pleas by people who admit being generally too lazy to vote go viral, causing a dip in approval ratings.\"\n\t\t*set App -5\n\t\t*set Grift -5\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Release your own completely made up poll analysis. \n\t\t*set Outcome \"You're a terrible writer, but the President loves it. As do other autocratic foreign leaders who see right through the sham and totally support the idea that fake news that benefits them should be protected by press freedom.\" \n\t\t*set Prest +5\n\t\t*set Rage -5\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "74professorharvard": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe President demands that you get him a professorial appointment at Harvard.\n\nWhat do you do?\n\n*choice\n\n\t#Call them up and tell them to do it. Or else.   \n\t\t*set Outcome \"Idiot! Harvard is a hedge fund that runs a university as a tax write-off and are thus untouchable. They think the proposal is hilarious, though, and hand the scoop off to the school newspaper, The Crimson, whose story goes viral. The President is enraged and Disaster's supporters hate the idea that he tried to cosy up to the snowflake university crowd.\"\n\t\t*set Rage +5\n\t\t*set App -5\n\t\t*goto_scene displayOutcome\n\n\n\t#Buy an ivy-clad brick building in Cambridge, slap on a sign that says REAL HARVURD, and fill it with paid actors.\n\t\t*set Outcome \"He can't tell the difference and is thrilled to deliver his first lecture-rally: an incoherent account of the best Presidency--his own of course--in the history of everything.\"\n\t\t*set Rage -10\n\t\t*set Grift -10\n\t\t*goto_scene displayOutcome\n\n\n\t#Remind him that his supporters hate lefty University types. \n\t\t*set Outcome \"He's annoyed but knows you are right. He hops on Twitter and claims that he's declined an offer from Harvard to become their next President so he can focus on the American people. His supporters don't believe Harvard's fake news that they made no such offer.\" \n\t\t*set App +5\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "75frostiadvice": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe First Lady, Frosti, has decided she wants to publish a book of advice for immigrant women.\n\nWhat do you do?\n\n*choice\n\n\t#Enthusiastically endorse this, suggesting the title: 'Dying to Cross the Border.'    \n\t\t*set Outcome \"She thinks it's too long and settles on: 'Not Rich? Die!' The President's supporters love this kind of hard line on immigration. Pre-sales go through the roof.\"\n\t\t*set App +5\n\t\t*set Grift +10\n\t\t*achieve frosti\t\n\n\t\t*goto_scene displayOutcome\n\n\n\t#Suggest instead that she write a guide to surviving marriage to a bully.\n\t\t*set Outcome \"The President catches wind and is so mad that she'd even consider such a thing that he berates her for hours, forcing her to polish all the golf trophies he has awarded to himself. There are hundreds.\"\n\t\t*set Rage +5\n\t\t*goto_scene displayOutcome\n\n\n\t#Tell her to make it a comic book. Nobody reads anymore. \n\t\t*set Outcome \"She and the President love the idea. But, after submitting a draft filled with racist caricatures, the publisher insists the Disasters pay back the advance and cover all costs associated with the initial PR push. Racism may be thriving, but it doesn't sell.\" \n\t\t*set Grift -5\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "76attractiveforeigner": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nYou head to a bar on your one night off a month. A good-looking foreigner takes the seat next to you.\n\nWhat do you do?\n\n*choice\n\n\t#Buy 'em a drink.   \n\t\t*set Outcome \"They spend the night nursing one martini while watching you drown your sorrows and spin out your tale of woe. The tell-all expose that runs in the next day's Beltway Post is your punishment. That and having to clean the President's toilet with your tooth-brush.\"\n\t\t*set Rage +5\n\t\t*goto_scene displayOutcome\n\n\n\t#Why would you risk talking to someone who is probably a spy? Go back to work.\n\t\t*set Outcome \"Turns out your swift departure has grievously offended a Russian military attache. Your behavior reflects very poorly on both you and the White House. Good going, champ!\"\n\t\t*set Prest -5\n\t\t*goto_scene displayOutcome\n\n\n\t#Calmly tell them about the President's many violations of the Constitution. \n\t\t*set Outcome \"You spend three hours monologuing only to discover the lovely loner doesn't speak a word of English. In the meantime, you've run up such a large bill that your credit card gets declined. And because you feel bad about talking the ear off a perfectly nice tourist, you pay for both your bar tabs out of the slush fund--a very costly affair!\"\n\t\t*set Grift -5\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "77whitemuseum": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nWhile visiting the Museum of the Native American, the President muses, 'You know, we really should have one of these for real Americans.' \n\nWhat do you do?\n\n*choice\n\n\t#Get that museum built. Hire David Duke as head curator.   \n\t\t*set Outcome \"The museum opens to great fanfare from fascists and neo-Nazis the world over.\"\n\t\t*set Rage -5\n\t\t*set Prest +5\n\t\t*goto_scene displayOutcome\n\n\n\t#Tell the President: YOU ARE IN IT. \n\t\t*set Outcome \"The President breaks an Apache relic over your head and feeds you nothing but dry maize for a week.\"\n\t\t*set Rage +5\n\t\t*goto_scene displayOutcome\n\n\n\t#First: nod solemnly. Second: divert campaign funds to ALL the Native American voting rights orgs. \n\t\t*set Outcome \"The President doesn't understand how money works and doesn't notice. But, he is very confused when he receives thank you notes for his generous donations.\"\n\t\t*set Grift -10\t\n\t\t*achieve voting\n\t\n\t\t*goto_scene displayOutcome\n\n\n", "78belatedadolescence": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nIn a fit of fifth-stage adolescence, the President's sons Smith and Wesson declare it's time to 'find themselves.' \n\nWhat do you do?\n\n*choice\n\n\t#Suggest a night of hookers and blow. \n\t\t*set Outcome \"If that's all it took, the boys would have found themselves last Wednesday. But you've inspired them to get into the escort business. And sex always sells.\"\n\t\t*set Grift +10\n\t\t*goto_scene displayOutcome\n\n\n\n\t#Suggest an ashram you heard about, a 20 day hike from a remote Bengali village. \n\t\t*set Outcome \"You thought you were just getting rid of them for a while. But, when the press catch wind, all those tech bros who pretend to be liberal recommit to 4 more years of Disaster.\"\n\t\t*set App +10\t\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Tell them to eat shit. \n\t\t*set Outcome \"They think this must be one of those newfangled remedies--like stuffing jade eggs in your vagina or something--and do it. When it lands them both in the hospital, the President tries to make you eat his poop.\"\n\t\t*set Rage +5\n\t\t*goto_scene displayOutcome\n\n\n", "79platinumtees": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nAn expose has revealed that millions of dollars raised through GiveMeMoney for the border wall have primarily funded the President's platinum golf tee collection. \n\nWhat do you do?\n\n*choice\n\n\t#Bring in the press to photograph that very extensive collection.   \n\t\t*set Outcome \"Disaster's supporters love all aspects of his grift.\"\n\t\t*set App +10\n\t\t*goto_scene displayOutcome\n\n\n\t#Refund the money.\n\t\t*set Outcome \"The President's coffers take a hit as do the President's approval ratings--according to his supporters, giving in to the liberal media makes him look weak.\"\n\t\t*set Grift -5\n\t\t*set App -10\n\t\t*goto_scene displayOutcome\n\n\n\t#Slap a MAGA hashtag on those golf tees and sell them for 10x their worth. \n\t\t*set Outcome \"They sell faster than you'd expect for an accessory only old white men would want and could afford.\"\n\t\t*set Grift +5\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "7marrycanmp": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe President's daughter Duchess announces she's leaving her twerpy husband Casper for Prime Minister Chindimple of Canada.\n\nWhat do you do?\n\n*choice\n\t#When the President tells you, you yell 'Up top, buddy!' And go in for the high five.\n\n\t\t*set Outcome \"The President tries to swipe your hand out the air, grabbing it in his tiny paw so he can crush it. But, his hands are so tiny and so weak, it feels more like a massage. You know your mistake, though, and yell out in fake pain anyway.\"\n\t\t*set Rage +5\n\t\t*set Prest +5\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Convince him to send the CIA in to 'take care of it.'\n\n\t\t*set Outcome \"He whips out his personal phone. He's got them on speed dial.\"\n\t\t*set Rage -5\n\t\t*set Prest -15\n\n\t\t*goto_scene displayOutcome\n\n\t#Tell him to buy up all the Canadian oil shares he can get his tiny hands on. You also manage to turn the word 'tiny' into a cough so he doesn't notice. Phew! \n\n\t\t*set Outcome \"He looks befuddled at first, but then hollers for the fixer sitting right outside the Oval Office for situations precisely like this one!\"\n\t\t*set Rage -10\n\t\t*set Grift +10\n\n\t\t*goto_scene displayOutcome", "80lawyerbribes": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe German government hints that President Disaster's lawyer, Joey Confusiani, might be on the take from the Russians.\n\nWhat do you do?\n\n*choice\n\n\t#Tell Joey to clean up his act or you'll cut off his TV interviews.\n\t\t*set Outcome \"Nothing scares Mr. Confusiani more than losing access to Moose News, so he cuts off ties with the Russians. Germany spreads word among other allies that things might be improving at the White House.\"\n\t\t*set Prest +10\n\t\t*achieve wurst\n\n\t\t*goto_scene displayOutcome\n\n\t#Ask Joey to cut you in on the action.\n\t\t*set Outcome \"Mr. Confusiani doesn't like to share his bribes, so he has the Russians make a deepfake video of you insulting the President's base. It goes viral on Fakebook and tanks him in the polls.\"\n\t\t*set App -10\n\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Suggest that the President cut ties with Mr. Confusiani.\n\t\t*set Outcome \"Turns out Mr. Confusiani was bleeding the family dry with an obscene hourly rate. Getting him off the payroll saves a fortune!\" \n\t\t*set Grift +10\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "81spacechicken": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe President's son-in-law Casper wants to open a Chik-N-Shak franchise on the International Space Station. \n\nWhat do you do?\n\n*choice\n\n\t#Order NASA to get those nuggets into space right away.\n\t\t*set Outcome \"Designing the fast food fryer to work in zero gravity costs a fortune. But many patriotic Americans are thrilled to see us put fried foods in space first.\"\n\t\t*set Grift -10\n\t\t*set App +10\n\t\t*goto_scene displayOutcome\n\n\t#Suggest that a pizza joint will make more money.\n\t\t*set Outcome \"Italy is thrilled at the idea of international space pizza and asks to join the project. Plus, it turns out that tech billionaires love the idea of swinging by the space station in their private spacecraft to grab a slice, so a couple of them agree to underwrite all the costs!\"\n\t\t*set Prest +10\n\t\t*set Grift +5\n\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Tell Casper's wife Duchess about his hare-brained scheme.\n\t\t*set Outcome \"Duchess flips out on Casper for trying to cost them yet another billion dollars, dressing him down in front of the whole family. The President hasn't laughed that hard in weeks.\" \n\t\t*set Rage -10\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "82adoptpet": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nSleeping on your cot in the back office every night is getting lonely. One of the President's cosmetologists suggests you get a pet. \n\nWhat do you do?\n\n*choice\n\n\t#Adopt a cat.\n\t\t*set Outcome \"Unfortunately, your new cat Rufus loves hanging out in the Oval Office, where he power-sheds all over the couches. His fur causes several visiting dignitaries such serious allergic reactions that they accuse the President of trying to poison them.\"\n\t\t*set Prest -10\n\t\t*goto_scene displayOutcome\n\t\t*achieve wildlife\n\n\t#Adopt a dog.\n\t\t*set Outcome \"Your new dog Bluto is an overnight sensation on social media, and he's immediately exploited by the campaign fundraising email team to raise millions!\"\n\t\t*set Grift +10\n\t\t*goto_scene displayOutcome\n\t\t*achieve wildlife\n\n\n\t#Get a fish.\n\t\t*set Outcome \"Oh dear. You wake up to find your fish Peanut passed away overnight. The President's astrologist sees this as a terrible omen and goes on Moose News to tell everyone that the President is doomed.\" \n\t\t*set App -10\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "83emailphishing": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nIn a moment of distraction, you accidentally click a link in a phishing email. Now you're worried that some other person or country has gained access to all of your emails.\n\nWhat do you do?\n\n*choice\n\n\t#Change your password and alert the IT team.\n\t\t*set Outcome \"Unfortunately, you were too late—your emails get leaked to the world overnight. Fortunately, people love the comfort food recipes your Mom has been sending you!\"\n\t\t*set App +5\n\t\t*set Prest +5\n\t\t*goto_scene displayOutcome\n\n\t#Pretend this never happened.\n\t\t*set Outcome \"Overnight, the President gets a ransom letter that includes part of an email you sent that referred to him as 'unhinged.' He's pretty upset, and it costs the campaign a few hundred thousand to pay off the ransom and cover this all up.\"\n\t\t*set Rage +5\n\t\t*set Grift -5\n\t\t*goto_scene displayOutcome\n\n\n\t#Start sending out fake emails that make you look awesome.\n\t\t*set Outcome \"Your fake emails make you come off as a shallow attention-seeker who tries too hard. Americans hate that unless you have a reality TV show.\" \n\t\t*set App -10\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "84moosenewsoffer": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nMoose News owner Wrinklert Mudmunch offers you a sweet deal to join the network as an analyst after the election. \n\nWhat do you do?\n\n*choice\n\n\t#Tell him you'll take the job!\n\t\t*set Outcome \"Wrinklert is so thrilled that he donates another couple million to the President's dark money PAC.\"\n\t\t*set Grift +10\n\t\t*goto_scene displayOutcome\n\n\t#Turn him down and shame him for his crappy 'news' network.\n\t\t*set Outcome \"Wrinklert doesn't seem the least bit phased by your criticism. But just for fun he calls the President and tell him you're a Deep State plant. It takes a while to calm the President down after that.\"\n\t\t*set Rage +10\n\t\t*goto_scene displayOutcome\n\n\n\t#Call the other networks and see if they'll beat his offer.\n\t\t*set Outcome \"One of the networks leaks your shameless job hunt to the rest of the media. Voters and donors both assume your attempt to jump ship means the President is in trouble.\" \n\t\t*set App -5\n\t\t*set Grift -5\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "8charitycloses": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe President's 'charity' is forced to close by Attorney General Doormat for 'insanely illegal accounting practices.'\n\nWhat do you do?\n\n*choice\n\t#You remind him that he's never let failure stop him from failing all over again!\n\n\t\t*set Outcome \"The President sniffs proudly at first and then realizes what you mean. He throws his Diet Coke at you. Luckily you dodge, but that only makes him madder.\"\n\t\t*set Rage +10\n\t\t*set Grift -5\n\t\t*set App -5\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#You try to lighten the mood by telling him, using dramatic air quotes, that you'll donate your bonus to his new charity.\n\n\t\t*set Outcome \"Not understanding what air quotes mean, The President laughs, saying he's glad to take any savings you have and that he'll call his guy. You're out your retirement, but he's happy at least.\"\n\t\t*set Rage -10\n\t\t*set Grift +10\n\n\t\t*goto_scene displayOutcome\n\n\t#Blame it on his dumb sons, Smith and Wesson.  \n\n\t\t*set Outcome \"People are so impressed that the President holds his own sons accountable! What a model father.\"\n\t\t*set App +10\n\t\t*set Prest +10\n\n\t\t*goto_scene displayOutcome", "9frenchass": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nPresident Disaster has too many cokes and tells the President of France that his wife has the tightest ass this side of the Urals.\n\nWhat do you do?\n\n*choice\n\t#You react by screaming 'bomb!' \n\n\t\t*set Outcome \"You managed to distract everyone from the President's gaffe. But you're ordered to take a psych eval and it's unlikely that the President of France will be returning to the U.S. anytime soon.\"\n\t\t*set Rage +5\n\t\t*set Prest -10\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Stay out of it.\n\n\t\t*set Outcome \"The President of France is shocked into silence. His wife responds that if she liked impotent narcissists, she might take the compliment.\"\n\t\t*set Prest -10\n\n\t\t*goto_scene displayOutcome\n\n\t#You fumble about trying to explain that the President is referring to donkeys. \n\n\t\t*set Outcome \"Your bumbling concern comes off as charming to the French, and everyone laughs with you more than at you.\"\n\t\t*set Prest +5\n\n\t\t*goto_scene displayOutcome", "apphigh-1-1-brandingfrenzy": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nSTAT ALERT!\n\nThanks to you, tons of people now love President Disaster. \n\nTo capitalize on this popularity, he's demanding that you roll out a bunch of new Disaster-branded merch and/or services ASAP.\n\nWhat do you do?\n\n*choice\n\t#Get on the phone with China and start cranking out knick-knacks.\n\n\t\t*set Prest -20\n\t\t\n\t\t*goto_scene appHigh-1-2-ChinaDoubleCross\n\n\t#Start buying up legacy media companies for a new Disaster Media conglomerate.\n\n\t\t*set Grift -20\n\n\t\t*goto_scene appHigh-1-3-MediaCollapse\n\n\t#Remind the President that this is beneath him as a world leader.\n\n\t\t*set Rage +20 \n\n\t\t*goto_scene appHigh-1-4-BobbleHead", "apphigh-1-2-chinadoublecross": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nChina cranks out a bunch of merch...but they gave President Disaster googly eyes in all of it! They say it's a mistake, but the whole world has a good laugh at President GoofyEyes.\n\n*page_break\n\nThe President demands major retaliation against China for the googly-eyed insult. \n\nWhat do you do?\n\n*choice\n\t#Send the navy to form a barricade in the South China Sea.\n\n\t\t*set Outcome \"The world condemns this reckless military escalation over a couple of googly eyes. The international pressure forces our retreat.\"\n\t\t*set Prest -20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Use our seeing-eye satellites to get blackmail material on the Chinese President.\n\n\n\t\t*set Outcome \"Wow! Whatever the Chinese President is into, it's so alarming that the military brass redacted your report. But whatever it is, it works! President Disaster gets a zillion new lucrative patents in China out of nowhere.\"\n\t\t*set Grift +20\n\n\t\t*goto_scene displayOutcome\n\n\t#Suggest the President insult China publicly on Moose & Friends, his favorite morning 'news' show.\n\n\t\t*set Outcome \"The President blows off a bunch of steam. Most of it is nonsensical, some of it is definitely racist, and all of it seems very cathartic. He's much more relaxed now.\"\n\t\t*set Rage -20\n\n\t\t*goto_scene displayOutcome", "apphigh-1-3-mediacollapse": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nAs much as Disaster loves Twitter he also hates young people and their 'new-fangled ways.' At first, he's thrilled that you've managed to score some print-only tabloid companies and a couple of AM radio stations. Predictably, his subscriber and listener base can't get past single digits. The investment is a bust!\n\n*page_break\n\nDisaster refuses to sell. He's used to losing money. He's also used to hiding those losses. Now that he's President, though, the purchases were too high profile for him to back out now.  \n\nWhat do you do?\n\n*choice\n\t#Double down. Throw in prime-time slots on a few rural public access TV stations and start producing Disaster Hour, the President's own news-commentary program.\n\n\t\t*set Outcome \"Nobody, not even Disaster's most ardent fans, listens to AM radio. And while his news-commentary program is popular, it doesn't bring in revenue. Duh: it's public access.\"\n\t\t*set Grift -20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Convince him to go on Moose News and use his losses to garner sympathy by complaining about all the young socialists who don't care about the good old days. \n\n\n\t\t*set Outcome \"His base loves hating on young people. The irony being, of course, that those young people, and their social security contributions, are the only thing keeping Boomers from the poor house.\"\n\t\t*set App +20\n\n\t\t*goto_scene displayOutcome\n\n\t#Cut Disaster's losses and sell it all\n\n\t\t*set Outcome \"You manage to staunch the gaping wound in Disaster's bottom line. But there's no way to keep this from the Press. Even the folks at Moose News have a good laugh about what an ill-advised purchase that was. Disaster couldn't be angrier.\"\n\t\t*set Rage +20\n\n\t\t*goto_scene displayOutcome", "apphigh-1-4-bobblehead": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe President grabs the bobblehead of himself that he keeps on his desk and throws it at you.  \n\n*page_break\n\nIt breaks in half on impact and, in the process, cuts open your forehead. You start bleeding onto the weirdly shiny carpet that the First Lady, Frosti Disaster, insisted on bringing into the Oval Office. You can't tell what he's more furious about. \n\nWhat do you do?\n\n*choice\n\t#Stay as still as possible. Maybe he'll think he's killed you.  \n\n\t\t*set Outcome \"Nice try. He's stupid, but he's not that stupid. You only manage to make him angrier.\"\n\t\t*set Rage +20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Run out of the room yelling that you have just the thing!\n\n\n\t\t*set Outcome \"The blow to your head sparked a brain wave! You mass produce two bobbleheads--one with flames that jump of the head when it bobbles, which progressives buy in bulk, and another with a machine gun that fires actual mini bullets. Sales soar and Disaster's campaign coffers fill to bursting.\"\n\t\t*set Grift +20\n\n\t\t*goto_scene displayOutcome\n\n\t#Yell for the First Lady as loud as you've ever yelled for anything.\n\n\t\t*set Outcome \"Frosti Disaster comes running in and seeing the blood all over her carpet grabs a brass bust of Afterthought Disaster and flings it at her husband, knocking him out cold. His rage-wheezing abates, turning immediately into a loud snore. Can't be mad when you're unconscious!\"\n\t\t*set Rage -20\n\n\t\t*goto_scene displayOutcome", "apphigh-2-1-worldlove": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nSTAT ALERT!\n\nWhoa, President Disaster's popularity at home is sky high!\n\nHe orders you to make him as popular abroad as he is at home. \n\nWhat do you do?\n\n*choice\n\t#Have Disasterlands--kind of like Disneyland--built on each continent: let's Make Fascism Fun Again! \n\n\t\t*set Grift -20\n\t\t\n\t\t*goto_scene appHigh-2-2-DisasterLand\n\n\t#Annex Central and South America so they can join the party!\n\n\t\t*set Prest -20\n\n\t\t*goto_scene appHigh-2-3-ReduxColonialism\n\n\t#Send his sons and daughters on an epic goodwill tour.\n\n\t\t*set Rage +15 \n\n\t\t*goto_scene appHigh-2-4-WorldProtests", "apphigh-2-2-disasterland": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nPeople flock to the new theme parks. Visitors have a blast in the Polar Bear experience where they celebrate global warming by shooting live bullets at real polar bear cubs. A good time is had by all at the 3D VR survival challenge Immigrant Invasion. The most popular amusement at Disasterland is a roller coaster designed after Ayn Rand's classic novel Fountainhead, which features a free-fall at the end from skyscraper. \n\n*page_break\n\nSince Disaster didn't pay the contractors he hired to build the parks, they didn't complete the final safety checks. 15 people die at Disasterland Dubai three days after it opens. Disaster Inc. is forced to close the parks and pay damages to the families.   \n\nWhat do you do?\n\n*choice\n\t#Rebuild. \n\n\t\t*set Outcome \"This time you force Disaster to pay those workers. But when visitors don't turn up--traumatized by gruesome images of the victims shared on social media--Disaster loses a fortune.\"\n\t\t*set Grift -15\n\t\t\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Blame the Saudis.\n\n\t\t*set Outcome \"It's true that they are at least partly responsible for abusing those workers. But, the Saudis were one of Disaster's only remaining allies. No longer!\" \n\t\t*set Prest -15 \n\n\t\t*goto_scene displayOutcome\n\n\n\t#Tell President Disaster he must make a public apology.\n\n\t\t*set Outcome \"He hates taking responsibility and is furious at you for making him do it. Despite being unable to properly pronounce the world apologize, however, he manages to sounds sincere enough to come off looking like a not totally evil human. It's a Christmas miracle for Disaster!\"\n\t\t*set Prest +10\n\t\t*set Rage +15\n\n\t\t*goto_scene displayOutcome", "apphigh-2-3-reduxcolonialism": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nYou're surprised to find that several Central and South American countries are amenable to what the President has dubbed the Great American Penetration. A few are positively enthusiastic. As deals start going through, though, he's furious to discover that folks previously demanding refugee status from those countries now believe they have a claim to American citizenship. \n\n*page_break\n\nWhen the President declares that he won't allow it, the UN steps in. While they generally turn a blind-eye to neo-imperialism, President's plans suggest old-school, exploitative European colonialism which it is the UN's mission to prevent. The UN threatens to impose sanctions if the Great American Penetration does not come to an immediate end. \n\nWhat do you do?\n\n*choice\n\t#Pay those sanctions.  \n\n\t\t*set Outcome \"The financial hemorrhage begins. You won't be able to sustain this for long.\"\n\t\t*set Grift -15\n\t\t\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Announce plans to begin pulling out.\n\n\t\t*set Outcome \"When the President finds out what you've done, he throws himself on a ground in full-on toddler tantrum mode. You'd think he'd be used to abbreviated unions and premature foreclosures by now. Oh well.\" \n\t\t*set Rage +15 \n\n\t\t*goto_scene displayOutcome\n\n\t#Force the folks at Moose News to begin broadcasting exposés of imperialist relations between security council nations and the territories and peoples they exploit.  \n\n\t\t*set Outcome \"You instigate a world-wide reckoning with the persistence of everything from client states to cultural imperialism, which none of our allies appreciates!\"\n\t\t*set Prest -15\n\n\t\t*goto_scene displayOutcome", "apphigh-2-4-worldprotests": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe tour starts off pretty well in countries with far-rightwing governments. The rallies are as big and beautiful as President Disaster could hope for. Word gets out that host governments are, however, forcing attendance on pain of imprisonment and torture. Plus, photos are leaked of the President's sons, Smith and Wesson, blowing rails with underage, underdressed girls in a Moscow nightclub.\n\n\n*page_break\nSoon, everywhere they go, the meet with protests, each more creatively brutal in their mocking of the President and his family. British protestors take it to the next level when they start following the Disasters from one country with an enormous, inflatable baby that is the spitting image of President Disaster.   \n\nWhat do you do?\n\n*choice\n\t#Take to Twitter and make fun of local leaders in each place the Disaster children meet with criticism.    \n\n\t\t*set Outcome \"None of what you say about the Mayor of London or the Prime Minister of New Zealand, for example, has any basis in fact, but Disaster's supporters love when he tries to demean brown people, women and anyone who doesn't blindly support the American President.\"\n\t\t*set App +15\n\t\t\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Try to dig up dirt about the Obama children to distract.\n\n\t\t*set Outcome \"The best you can come up with is a story about Malia Obama skipping school to volunteer alongside former President Jimmy Carter building houses for poor people. Being reminded of what the world was like with a decent, competent American President fans the flames of protest and the current President's rage.\" \n\t\t*set Rage +15 \n\n\t\t*goto_scene displayOutcome\n\n\t#Launch a drone to blow up that inflatable baby! \n\n\t\t*set Outcome \"It turns out that the term 'surgical strike' implies an exaggerated precision. 25 protestors die. It's not a good look for America's pretensions to democracy.\"\n\t\t*set Prest -15\n\n\t\t*goto_scene displayOutcome", "applow-1-1-mediablitz": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nSTAT ALERT!\n\nThis approval crisis is getting serious. President Disaster demands you set up a media blitz for him to win back the hearts of all these 'dumb idiots and losers' who need to vote for him soon.\n\nWhat do you do?\n\n*choice\n\t#Get him out there! He's a media icon.\n\n\t\t*set Grift +20\n\t\t\n\t\t*goto_scene appLow-1-2-SalesFrenzy\n\n\t#Call Moose News and set up a softball interview.\n\n\t\t*set Prest -20\n\n\t\t*goto_scene appLow-1-3-RefugeeRant\n\n\t#Tell him the last thing he needs is more exposure right now.\n\n\t\t*set Rage +20 \n\n\t\t*goto_scene appLow-1-4-YourInterviews", "applow-1-2-salesfrenzy": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe President forgets to mention much in the way of governance, but he does spend every interview pitching the family's new line of adult diapers, DisasterPants. His base excitedly buys every last pair, of course.\n\n*page_break\n\nUh oh. #DisasterPants is now becoming quite the obnoxious meme amongst the kids on social media. The President demands you block the hashtag immediately.\n\nWhat do you do?\n\n*choice\n\t#Show him the funniest ones.\n\n\t\t*set Outcome \"The President grabs your phone and throws it through the window into the Rose Garden, then tries to wrap his hands around your neck. Fortunately, they're too small and he gives up. For now.\"\n\t\t*set Rage +20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Call the social media companies and try to cajole them into a ban.\n\n\n\t\t*set Outcome \"You get laughed off the phone each time. So you decide to join with the Europeans in demanding a total overhaul of social media rules and regulations in retaliation. Now who's getting a thumbs up from the rest of the world, eh?\"\n\t\t*set Prest +20\n\n\t\t*goto_scene displayOutcome\n\n\t#Flood the hashtag with more ads for DisasterPants and drown them out.\n\n\t\t*set Outcome \"Wow, apparently the President's opponents really like peeing on his image. Now they're all buying DisasterPants too. Jackpot!\"\n\t\t*set Grift +20\n\n\t\t*goto_scene displayOutcome", "applow-1-3-refugeerant": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nMoose News tries to feed him some softballs, but President Disaster can't stop himself from going on a pretty embarrassing (and definitely racist) tirade about refugees. It's a bad look on the world stage.\n\n*page_break\n\nNow the President wants to turn around his image on the world stage, too. He demands a summit of all world leaders be organized and hosted at Disast-A-Lago immediately!\n\nWhat do you do?\n\n*choice\n\t#Organize that summit, baby.\n\n\t\t*set Outcome \"As you'd expect on the heels of his refugee rant, no one but the Russians agree to come. Word of this second global humiliation spreads quickly.\"\n\t\t*set Prest -20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Remind him how much work it will be to host the summit.\n\n\t\t*set Outcome \"Upon realizing that it's actually much less work to be hated than loved, the President relaxes considerably.\"\n\t\t*set Rage -20\n\n\t\t*goto_scene displayOutcome\n\n\t#Ask the President's daughter Duchess to put it together.\n\n\t\t*set Outcome \"Holy crap, she spent a fortune on decorations, food, and social media influencers. And it was still tacky!\"\n\t\t*set Grift -20\n\n\t\t*goto_scene displayOutcome", "applow-1-4-yourinterviews": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe President launches into a tirade about how nobody else understands the media like he does! To prove his point, he forces you to do a media blitz and then replays your clips and makes fun of your voice in front of all the other staff.\n\n*page_break\n\nThe President asks if this humiliation has taught you a lesson.\n\nWhat do you do?\n\n*choice\n\t#You bow and scrape, begging forgiveness.\n\n\t\t*set Outcome \"The President is further enraged by your pathetic display. He makes everyone in the office call you Jellyfish now and for all time.\"\n\t\t*set Rage +20\n\t\t*set name \"Jellyfish\"\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#You say that it has: You're a future TV star!\n\n\n\t\t*set Outcome \"President Disaster applauds your confidence and taking his hazing on the chin. He even invites you for golf next weekend!\"\n\t\t*set Rage -20\n\n\t\t*goto_scene displayOutcome\n\n\t#You reply to President Disaster, \"Yes! You should be a professional roaster!\"\n\n\t\t*set Outcome \"Being mean is about all he's good at. Technically he's not paid on his Presidential comedy roast circuit, but, c'mon. He's totally getting paid.\"\n\t\t*set Grift +20\n\n\t\t*goto_scene displayOutcome", "applow-2-1-russianpr": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nSTAT ALERT!\n\nUh oh! The President's approval ratings have hit an all-time low. He orders you to ask the Russians to launch an online PR campaign through their digital troll army to make him look good.\n\nWhat do you do?\n\n*choice\n\t#Ask the Russians to get out the good word!\n\n\t\t*set Prest -20\n\t\t\n\t\t*goto_scene appLow-2-2-CaughtByAllies\n\n\t#Remind President Disaster that this might be illegal.\n\n\t\t*set Rage +20\n\n\t\t*goto_scene appLow-2-3-MobFixers\n\n\t#Tell his sons Smith and Wesson to do the dirty work so none of it comes back on you.\n\n\t\t*set Grift -20 \n\n\t\t*goto_scene appLow-2-4-StupidSons", "applow-2-2-caughtbyallies": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nOops! Turns out our NATO allies intercepted your communications with the Russians. They agree to keep it on the down-low for the sake of world stability but are super, super upset. \n\n*page_break\n\nPresident Disaster is annoyed that NATO was listening in on us and wants you to find a way to steal emails from *all* the European leaders in response so he can use them as blackmail.\n\nWhat do you do?\n\n*choice\n\t#Alk-tay to the ussians-Ray in ode-cay to et-gay ose-they mails-e-ay.\n\n\t\t*set Outcome \"You're really terrible at this spy thing. NATO again finds out about your little scheme. ${name}, you're banned from traveling to Germany and France now.\"\n\t\t*set Prest -20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Fake a bunch of emails and hand them over.\n\n\n\t\t*set Outcome \"Our impatient President immediately hops on the phone and starts auctioning them off to the highest bidders. Your fakes are so good they make him a small fortune!\"\n\t\t*set Grift +20\n\n\t\t*goto_scene displayOutcome\n\n\t#Tell the NATO leaders they need to calm him down if they want NATO to continue.\n\n\t\t*set Outcome \"We're so close to the election that the NATO leaders agree to suck it up and semi-apologize to the President, who eats it up. But they warn you that someone else better be in the White House in ${max_turns_to_play} days...or else.\"\n\t\t*set Rage -20\n\n\t\t*goto_scene displayOutcome", "applow-2-3-mobfixers": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nPresident Disaster bellows furiously at your cowardice. Nobody else who works for him is scared of a little jail time, and you shouldn't be either!\n\n*page_break\n\nPresident Disaster demands you show some spine. Instead of going to the Russians, he now wants you to go directly to the mob for an even more illegal fix on the polls.\n\nWhat do you do?\n\n*choice\n\t#Pay that guy Vinnie you know from down the block to do his thing.  \n\n\t\t*set Outcome \"Vinnie's crew attaches a huge price-tag to their efforts, and it turns out they have no idea how to fix modern political polls. So it's a dud...and the President's slush fund is out quite a bit of moolah. Frickin' Vinnie.\"\n\t\t*set Grift -20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Go big. Get actual Sicilians involved.\n\n\n\t\t*set Outcome \"You struggle to find any real Sicilian mobsters but your search opens meaningful communication channels with several Mediterranean countries, who assume you're trying to help them root out La Cosa Nostra. The President loves all their gift baskets so much he forgets about the polls. For now.\"\n\t\t*set Prest +20\n\n\t\t*goto_scene displayOutcome\n\n\t#Refuse. You won't commit crimes for this President or any other.\n\n\t\t*set Outcome \"The President is furious and accuses you of being a future rat. He makes you eat your lunch facing the wall with a 'kick me' sign on your back.\"\n\t\t*set Rage +20\n\n\t\t*goto_scene displayOutcome", "applow-2-4-stupidsons": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nSmith and Wesson try to send private DMs to the Russians on Twitter but accidentally send them as public posts. The Justice Department immediately freezes all assets tied to those Russians that are held by the Disaster family. Which turns out to be a lot!\n\n*page_break\n\nSmith and Wesson are desperate to make up for their Twitter debacle and please their dad. They beg you for a splashy new assignment.\n\nWhat do you do?\n\n*choice\n\t#Lock them in the basement. They can't be trusted!  \n\n\t\t*set Outcome \"They might be dumbs, but those boys run a lot of the Disaster Inc businesses. Their disappearance causes losses across the company, and you're forced to allow them back into the sunlight again.\"\n\t\t*set Grift -20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Tell them to design a Disaster monument that will do their father honor.\n\n\n\t\t*set Outcome \"Smith and Wesson enthusiastically agree...and are apprehended overnight trying to spray-paint their dad's face on the roof of the Sistine Chapel. Papers from around the world express their outrage.\"\n\t\t*set Prest -20\n\n\t\t*goto_scene displayOutcome\n\n\t#Ask them to throw a fancy fundraiser for the re-election.\n\n\t\t*set Outcome \"When President Disaster walks into his sons' toga-themed 'Kegger for Dad', he storms out of the empty banquet hall with a face more red than orange.\"\n\t\t*set Rage +20\n\n\t\t*goto_scene displayOutcome", "choicescript_description": "You arrive at the White House for your first day as an intern. President Disaster snaps his fingers and points at you: “Hey! You! I’m appointing you my new Chief of Staff.” Now you have one month to get us to election day and save the world from the worst president ever. Are you up to the task?\n\nPresident Disaster is an 35,000-word interactive humorous novel by Maeve Adams and Marc Faletti, that puts you in the middle of the messiest drama in American history. You'll play diplomat, crisis manager, creative accountant, and national babysitter. Experience new scenarios and combinations every time you play. Decide if you'll resist the dark side...or give into it.\n\n• Play as any gender and any sexuality as you try to get us to election day alive.\n• Begin your political career as President Disaster's 34th Chief of Staff.\n• Make the life-or-death decisions that could save the world...or doom it.\n• Wrangle the strangest presidential family in history.\n• Choose fortune and infamy, or ethics and responsibility.\n• Dodge the President's wrath or you might find yourself short a body part or parent.\n• Strike deals with other world leaders who look to you to save us all.\n• Defend our constitutionally guaranteed freedoms while we still have them.\n• Experience new scenarios and combinations every time through the game!\n• Exercise control or lean into the chaos as America hurtles towards catastrophe.", "choicescript_stats": "This is a stats screen!\n\n*stat_chart\n  percent Rage\n  percent Grift \n  percent App Domestic Approval\n  percent Prest International Prestige\n", "death": "You have died.\n\n*goto_scene ending", "displayoutcome": "${Outcome}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\n*page_break\n*goto_scene scenarioController\n\n", "endaliens": "*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\n${Outcome}\n\nThen the sky suddenly grows dark. Are those... flying saucers?\n\nA voice booms across the sky: 'SUBMIT, EARTHLINGS. WE ARE IN CONTROL NOW.'\n\nIt appears things have gotten so bad that aliens have descended to save us from ourselves. You'd think that be good news, except for the part where they are fitting us all with shock collars.\n\n-- G A M E -- O V E R --\n\nPlease try again! Who knows what scenarios will come up next time through...\n\n*goto_scene ending", "endanarchy": "*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\n${Outcome}\n\nThe world descends into anarchy. I hope you liked the movie Fury Road!\n\n-- G A M E -- O V E R --\n\nPlease try again! Who knows what scenarios will come up next time through...\n\n*goto_scene ending", "endchina": "*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\n${Outcome}\n\nWhen you arrive at the White House the next morning for work, your entry is barred. Confused, you notice on your walk back to your car that the flag flying overhead is...China's?\n\nThat's when you spot a very satisfied-looking President Disaster relaxing in a lounge chair in the front yard.\n\n'I sold the whole thing to Gina,' he says, beaming.\n\nYou reply hesitantly, '...The White House?'\n\nPresident Disaster smirks. 'The country, moron!' \n\n-- G A M E -- O V E R --\n\nPlease try again! Who knows what scenarios will come up next time through...\n\n*goto_scene ending", "endcombust": "*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\n${Outcome}\n\nYou hear a rumbling from the Oval Office, and then: BOOM! \n\nScreams from inside: 'Oh my god, there are guts everywhere!'\n\nYou rush in to find the President spontaneously combusted. \n\nVice President McPious is sworn in and immediately declares a theocracy. I hope you like praying for change! Because you'll never again have the chance to vote for it.\n\n-- G A M E -- O V E R --\n\nPlease try again! Who knows what scenarios will come up next time through...\n\n*goto_scene ending", "endfascism": "*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\n${Outcome}\n\nThe President calls up Moose News to announce his latest plan: an end to elections!\n\nNobody seems able to stop him. Nobody seems to want to. Welcome to fascism, chump.\n\n-- G A M E -- O V E R --\n\nPlease try again! Who knows what scenarios will come up next time through...\n\n*goto_scene ending", "endgod": "*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\n${Outcome}\n\n\nHe celebrates turning over this new leaf by joining a church. And then going every day. And then going three times a day. \n\nThen he convinces all the generals and the admirals to join the church. And suddenly the whole military's going. And then they all start marching in the streets, armed to the teeth, asking if we'd like to go to services too. \n\nI wouldn't say no if I were you. That doesn't go over too well in the Theocratic States of America. \n\n-- G A M E -- O V E R --\n\nPlease try again! Who knows what scenarios will come up next time through...\n\n*goto_scene ending", "endmob": "*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\n${Outcome}\n\nIn the chaos, martial law is declared, and the country descends into madness and civil war. But you miss that part because you burned up in the fire. \n\n-- G A M E -- O V E R --\n\nPlease try again! Who knows what scenarios will come up next time through...\n\n*goto_scene ending", "endmove": "*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\n${Outcome}\n\nHe takes a field trip to the Federal Reserve, pulls the fire alarm, and uses the distraction to steal all of our nation's money. Literally all of it!\n\nLater, when you're waiting for sixteen hours in a bread line, you see a picture of President Disaster on Instagram at a beach resort off the Crimean Peninsula. Looks expensive!\n\n-- G A M E -- O V E R --\n\nPlease try again! Who knows what scenarios will come up next time through...\n\n*goto_scene ending", "endnwo": "*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\n${Outcome}\n\nWorld leaders all over begin to emulate the President. They heartily endorse his dissolution of the UN. They can't wait to sign up for the replacement: Disaster World Order.\n\nNow President Disaster runs the whole planet!\n\n-- G A M E -- O V E R --\n\nPlease try again! Who knows what scenarios will come up next time through...\n\n*goto_scene ending", "endnukes": "*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\n${Outcome}\n\nYou come back from lunch to find the President in the Oval Office sitting over a Big Red Button. \n\nIs that...the nuclear launch system?\n\nBefore you can say anything, he presses it. \n\nIn your remaining time left on Earth, you ponder your regrets.\n\n-- G A M E -- O V E R --\n\nPlease try again! Who knows what scenarios will come up next time through...\n\n*goto_scene ending", "endpins": "*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\n${Outcome}\n\nAll this time you thought you were keeping things level, but your fingerprints are now on every decision. You've become President Disaster's perfect patsy in his time of crisis. \n\nWith you taking all the blame, the President avoids impeachment and rebounds in the polls. He might even get a Medal of Honor for taking down the monster in his own White House: you!\n\nRe-election, here we come. You can enjoy it from a jail cell!\n\n-- G A M E -- O V E R --\n\nPlease try again! Who knows what scenarios will come up next time through...\n\n*goto_scene ending", "endreelection": "*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\n${Outcome} \n\nWith these developments, he's sure to win re-election!\n\nWhich he does. And then he goes right back to being the worst, only this time he makes sure we never get around to having an election again. Whoops!\n\n-- G A M E -- O V E R --\n\nPlease try again! Who knows what scenarios will come up next time through...\n\n*goto_scene ending", "endrussia": "*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\n${Outcome}\n\nWith placid clarity, President Disaster realizes he'll never win back the people. \n\nSo he's decided to hand over all the secrets, all the codes, even the keys to the White House private bathrooms to the Russians. It's their country now. \n\nDosvedanya!\n\n-- G A M E -- O V E R --\n\nPlease try again! Who knows what scenarios will come up next time through...\n\n*goto_scene ending", "endsteal": "*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\n${Outcome}\n\nAnd money may not buy you love, but it can buy you an election. Which he steals, blatantly. He's also bribed everyone who could stop him. \n\nThis seems like the start of a long reign...\n\n-- G A M E -- O V E R --\n\nPlease try again! Who knows what scenarios will come up next time through...\n\n*goto_scene ending", "endun": "*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\n${Outcome}\n\nPresident Disaster becomes the UN Secretary General, and everyone celebrates as he uses the peacekeeping forces as his personal bodyguards and spends the world's wealth on hair products and cheeseburgers.\n\nSoon the whole world falls under his sway, becoming a single, unified Disastrous people.\n\n-- G A M E -- O V E R --\n\nPlease try again! Who knows what scenarios will come up next time through...\n\n*goto_scene ending", "ending": "*page_break End\nWe hope you've enjoyed playing [i]President Disaster.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "endingsuccess": "\n\nCongratulations, ${name}! It looks as though you saved America from another four years of Disaster. Frankly, we weren't sure you'd pull it off. What an unlikely hero you turned out to be! A hero, nonetheless. \n\nWho'd you vote for, by the way?\n\n*input_text nextPresident\n\n*page_break\n\nThe next morning, your phone rings. Caller ID is unavailable. You answer it. When you pick up the phone, you hear:\n\n${name}, this is President-Elect ${nextPresident}. I wanted to call and thank you personally for the service you have rendered to this great country of ours. I thank you. America thanks you. Democracy will forever be in your debt. How would you like an internship at the White House?\n\n*goto_scene ending", "explainthejob": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nOnce inside the Oval Office, President Disaster looks down at you: the tiny stool in front of his desk seems designed for a kindergartener. \n\nHe barks at you: “We’re 30 days out from Election Day, ${name}. Don’t screw this up!” He pauses before adding: “Or you’ll end up like all the other losers I fired.”\n\nHe flings a binder of documents at you. When you catch it, a tiny sealed envelope slips out. Fairly certain he hasn't seen it, you slip it into your pocket and hustle out of the office. Once you make it to your basement cubicle, you open the envelope. In it you find a hastily scribbled letter:\n\n*page_break\n\n\nTo the Person Unlucky Enough to Open This Letter:\n\nIf you’ve found this note, it means you're my new replacement as Chief of Staff. Congrats? \n\nEvery day, it seems like some fresh new debacle befalls the President, and things could go very badly if you don’t help him do the right thing. He’s a rage-aholic and a total grifter, so try to keep those in check. But don't let him get too happy or too poor either, or he gets unpredictable. He's obsessed with approval numbers, and also craves international prestige. If you let him get too much of either, it could be bad news for democracy. If you let them fall too far, it could be bad news for your neck.\n\nHonestly, you could probably survive any one of these things. But any two of them together? That's certain doom, my friend. Anyway, I'm probably pushing daises at this point, so, really, do whatever you want! Good luck saving the world and all.\n\nIn solidarity,\n\nChuck, (34th) Chief of Staff to the President of the United States\n\n________\n\nYou pause to consider before deciding:\n\n*choice\n\t#You've always wanted to play the hero.\n\t\tYou spend a moment imagining yourself as Supergirl (love those tights!) before getting down to business! \n\t\t*finish\n\t#What have you got to lose?\n\t\tOther than your life? You shed a preemptive tear but brush it away before settling on your mission. America is worth it!\n\t\t*finish\n\t#If you could get in on the grift, maybe you'd be able to pay off your student loans sometime this century.\n\t\tYou're not really that big of an asshat. You've never been more ready to do the right thing! \n\t\t*finish\n\n", "grifthigh-1-1-dollarsigns": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nSTAT ALERT!\n\nPresident Disaster is so excited about the success of his near-constant grift that he's  turning purple with smug satisfaction. Are those actual dollar signs in his eyes? Blinded by his success and those weird dollar-sign contact lenses he's wearing, he says he wants to announce his latest financial wins on live TV.\n\nWhat do you do?\n\n*choice\n\t#Encourage him to do just that.\n\n\t\t*set App -20\n\t\t\n\t\t*goto_scene griftHigh-1-2-BabyMoney\n\n\t#On your break, you call President Disaster, disguising your voice so you sound vaguely Russian, and make him an offer you're sure can't refuse: to get in on the ground floor of Martian Railways. \n\n\t\t*set Prest -20\n\n\t\t*goto_scene griftHigh-1-3-RailwayMars\n\n\t#Send an email to the press telling them about Disaster's unbelievable profit margin and his plans to donate 75% of it to the nonprofit Don't Let the Children Starve.  \n\n\t\t*set Prest +20\n\n\t\t*goto_scene griftHigh-1-4-VergleFurred", "grifthigh-1-2-babymoney": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe President gets a prime time interview on Moose News with Ann Ghoulter and in the midst of bragging about how much money he's made, he screams, 'when you're me you can do whatever you want! I could steal money from babies--really little babies--hell, I could even shoot those babies and I wouldn't lose any voters.' \n\n*page_break\n\nPresident Disaster actually manages to shock Ann Ghoulter, but only temporarily, before she gives him a high five. \n\nWhat do you do?\n\n*choice\n\t#Absolutely nothing. Maybe this will finally spell the end of Disaster.   \n\n\t\t*set Outcome \"Turns out that a lot of American voters definitely don't want the President to execute live babies.\"\n\t\t*set App -20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Run onto stage, laughing maniacally as if President Disaster has just told the funniest joke ever.\n\n\n\t\t*set Outcome \"America loves a good joke. America also loves a con man. It's a match made in heaven.\"\n\t\t*set App +20\n\n\t\t*goto_scene displayOutcome\n\n\t#Tweet out a GIF of President Disaster kissing a baby. But the angle makes it look like he's actually trying to EAT the baby. It goes viral.\n\n\t\t*set Outcome \"President Disaster can't figure out who originally tweeted out the GIF because he's not that tech savvy, but he's mostly furious because the GIF makes his hands look really, really small--as in smaller than the baby's head.\"\n\t\t*set Rage +20\n\n\t\t*goto_scene displayOutcome", "grifthigh-1-3-railwaymars": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nPresident Disaster is sold! You've told him that all he has to do is sell $30 trillion worth of shares in Mars Railways and, in exchange, he'll get a 25% stake in the company as well as exclusive rights to build hotels near each station. You don't really expect people to be so dumb. \n\n*page_break\n\nUnfortunately, the international stock sale is a huge success. And then NASA tweets out videos of the winds of Mars with an explanation that they would obliterate all trains and railroad infrastructure, the stocks plummet and people from all overt he world are on the verge of losing everything. The international community is up in arms.  \n \n\nWhat do you do?\n\n*choice\n\t#Make a quick stop-animation video of your childhood train set rumbling through a red playdough landscape and tweet it out.  \n\n\t\t*set Outcome \"The stock bounces back long enough for most people to get out and before the media reveals that the video is an obvious fake. Disaster is furious. He was sure he'd make a killing on those hotels.\" \n\t\t*set Rage +20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#You recorded the call you made pretending to be the President of Russia and you send it to Moose News.   \n\n\t\t*set Outcome \"The international community calls out the President of Russia for bullying and corruption, demanding that Moscow pay reparations. Almost everyone except for you feels bad for President Disaster--the innocent victim!\"\n\t\t*set Prest +20\n\n\t\t*goto_scene displayOutcome\n\n\t#Just sit back and see what happens.\n\t\t*set Outcome \"There's a fire sale, but Americans are the last to sell, convinced that their Commander (Conman) in Chief wouldn't steer them wrong. The ratings agencies have to downgrade the American economy. Even Tucker Bowtie expresses his concerns about the President's judgment.\"\n\t\t*set App -20\n\n\t\t*goto_scene displayOutcome", "grifthigh-1-4-verglefurred": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nPresident Disaster is angrier than you've ever seen him when he finds out. He's so apoplectic with rage that he tries to fire you but he can hardly breath. The words come out 'yerglefurred.' But then the phones start ringing. All of them. At the same time...  \n\n*page_break\n\nIt turns out that every world leader is calling to congratulate President Disaster on his magnanimous charity. He's so delighted by all the praise that he calms down. He even tries to give you a bro hug before insisting that you celebrate.\n\nWhat do you do?\n\n*choice\n\t#Insist on celebrating. You grab your secret, extra-large stash of Adderall, crush it up and blow rails with the President until dawn.  \n\n\t\t*set Outcome \"You've never seen the President more in his element. He even  orders a pizza for himself and lets you eat the leftovers from an old Happy Meal you find in the fridge.\" \n\t\t*set Rage -20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Share the good news on Twitter. \n\n\n\t\t*set Outcome \"His fan base is over the moon. They always knew he was a decent guy!\"\n\t\t*set App +20\n\n\t\t*goto_scene displayOutcome\n\n\t#Tell him that you bet Justice Kegstand is free. He's the biggest party animal in existence. \n\t\t*set Outcome \"They have a blast. You manage to get some video, which you promptly send to the press, of President Disaster and Justice Kegstand pretending to hump the Lincoln Memorial before pissing in the Reflecting Pool. His base is furious since they mistakenly see Lincoln as one of their own.\"\n\t\t*set App -20\n\n\t\t*goto_scene displayOutcome", "grifthigh-2-1-goldmonument": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nSTAT ALERT!\n\nThe President is crazy rich now, mostly thanks to you! He decides to commission a sold-gold monument of himself that will dwarf the Statue of Liberty.\n\nWhat do you do?\n\n*choice\n\t#Buy gold, and lots of it! The President's about to drive the price way up.\n\n\t\t*set App -20\n\t\t\n\t\t*goto_scene griftHigh-2-2-FederalReserve\n\n\t#Hire every sculptor in America to get this built overnight.\n\n\t\t*set Rage +15\n\n\t\t*goto_scene griftHigh-2-3-ArtistStrike\n\n\t#Save President Disaster some cash by replacing the face of the actual Statue of Liberty with the President's, then spray-painting the rest.\n\n\t\t*set Prest +15 \n\n\t\t*goto_scene griftHigh-2-4-WelcomeImmigrants", "grifthigh-2-2-federalreserve": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nYou're terrible at keeping secrets. Soon everyone you know and everyone they know hears about this incredible opportunity. The price of gold starts climbing and you begin fantasizing about the new life you'll build for yourself when this national nightmare is over.\n\n*page_break\n\nDon't be ridiculous. The President never pays for anything, announcing his plans to 'borrow' it from the Federal Reserve Bank of New York. Even though the Feds issue a statement that they would never, ever do something so utterly idiotic, rumors of liquidation cause the value of gold, and thus of the dollar, to plummet. Disaster's supporters are finally beginning to wonder if this administration really has their economic interests at heart. \n\nWhat do you do?\n\n*choice\n\t#You can't save the economy, or yourself from bankruptcy, but you can give the President your gold.    \n\n\t\t*set Outcome \"You spent your entire savings and maxed out your credit cards, but the artist is only able to make something the size of a garden gnome. It thoroughly inflames the President's Napoleon complex. You can't tell if he turns beet-red from rage or the effort to throw it at you or both.\"\n\t\t*set Rage +15\n\t\t\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Double down: empty the reelection coffers and buy more gold at its historic low.\n\n\t\t*set Outcome \"Disaster is furious at first, but when you remind him that the economy could rebound if he claimed it was all a big joke--something like, you know, locker room talk--he's thrilled. You've made his day. For now.\" \n\t\t*set Rage -15 \n\n\t\t*goto_scene displayOutcome\n\n\t#Get your (former) friends to help you steal the gold. You love heist movies!\n\n\t\t*set Outcome \"You're caught before you get in the door, but reporting on the attempted theft causes a huge rebound in approval ratings: it reminds Disaster's supporters of how gloriously he wins through cheating and stealing.\"\n\t\t*set App +15\n\n\t\t*goto_scene displayOutcome", "grifthigh-2-3-artiststrike": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nNot a single real artist in America supports the Disaster Administration. Artists in America and all over the globe stage of week-long walkout in protest. Because they are artists, they do it beautifully. One particularly compelling image is formed by Midwestern artists who carve lewd messages about the President into wheat fields--the messages are so large they can be seen from space. \n\n\n*page_break\n\nDisaster retaliates by permanently shutting down both the National Endowment for the Arts and the National Endowment for the Humanities. Thousands of employees lose their jobs overnight and all current grants programs cease payments immediately.  \n\nWhat do you do?\n\n*choice\n\t#Redirect those funds to build Disaster's wall on the southern border.    \n\n\t\t*set Outcome \"Disaster's supporters rejoice, not even caring that repeated cuts to the NEA's and NEH's budgets by Republicans over the years means that there's only enough money to build a few hundred feet of wall.\"\n\t\t*set App +15\n\t\t\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Imprison the strike's organizers and torture them until they agree to build the statue. \n\n\t\t*set Outcome \"They build it. But they are apparently insufficiently moved by your torture tactics. They add a tiny diamond encrusted codpiece to the statue that, sparkling in the sun, glaringly announces the President's minuscule manhood. Disaster is so enraged that he threatens to have them sent to jail for life. Unfortunately (or fortunately), people cannot go to jail for telling the truth.\" \n\t\t*set Rage +15 \n\n\t\t*goto_scene displayOutcome\n\n\t#Burn those wheat fields.\n\n\t\t*set Outcome \"You have gutted this year's wheat harvest, sending shock waves through the economy. Nobody can believe Disaster's lies about caring about farm workers now.\"\n\t\t*set App -15\n\n\t\t*goto_scene displayOutcome", "grifthigh-2-4-welcomeimmigrants": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nYou manage to do a very convincing job. President Disaster hosts a party for the media and all his richest donors to celebrate the unveiling. With the entire world watching, he reveals the new design: Disaster of Liberty.\n\n\n*page_break\n\nSince you didn't alter any other part of the statue, Disaster appears to stand above and therefore endorse the message welcoming immigrants on the statue's base. The world celebrates the statue's change of face and Disaster's apparent change of heart.\n\n\nWhat do you do?\n\n*choice\n\t#Have acid poured on the statue to remove Disaster's face. \n\n\t\t*set Outcome \"You only manage to make Disaster of Liberty look like he's crying. Disaster is eager to remind you that he NEVER CRIES. After a few hours at the end of a cattle prod, you remind him that you do.\"\n\t\t*set Rage +15\n\t\t\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Revise the poem to read 'give me your white richest yearning to earn freely.'\n\n\t\t*set Outcome \"Disaster's white supremacist supporters rejoice. There appear to be more and more of them.\" \n\t\t*set App +15 \n\n\t\t*goto_scene displayOutcome\n\n\n\t#Lean into it: make Disaster sign an executive order increasing immigration admittance at all borders.\n\n\t\t*set Outcome \"By tomorrow night, Disaster will announce that he never made such promises even though the media broadcast the event live. In the meantime, he'll continue to bask in the glory of the world's adulation.\"\n\t\t*set Prest +15\n\n\t\t*goto_scene displayOutcome", "griftlow-1-1-publiceducation": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nSTAT ALERT!\n\nSomething is very wrong. You find the President digging around in the 'swear jar' he made you install in the Situation Room. \n\nGripping a few dollars in his tiny fists, he turns to you and yells that education in this country is a disaster. He plans to close down public schools and re-open them as Disaster Camps. He's clearly broke and willing to try anything to refill his coffers. \n\nWhat do you do?\n\n*choice\n\t#Remind him that sending people to re-education camps has the whiff of fascism.\n\n\t\t*set Rage +20\n\t\t\n\t\t*goto_scene griftLow-1-2-ChinaCamps\n\n\t#Suggest an alternative: redirecting funds from the EPA to Disaster Safaris. He can start with Yosemite. \n\n\t\t*set Rage -20\n\n\t\t*goto_scene griftLow-1-3-JoshuaTree\n\n\t#Tell the President to squeeze smaller countries for cash, especially those desperate for our attention.  \n\n\t\t*set Prest -20\n\n\t\t*goto_scene griftLow-1-4-NationBlackmail", "griftlow-1-2-chinacamps": "Days before election: ${max_turns_to_play}\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nHe makes you put another dollar in the swear jar, which he then pockets before insisting that you get the President of China on the phone. Now. \n\n*page_break\n\nAfter a nearly three-hour strategy session with the President of China, President Disaster  slams down the phone, pulling out his favorite pen, and begins scrawling a hand-written executive order to redirect funding for public schools to Disaster Camps. \n  \nWhat do you do?\n\n\n*choice\n\t#Set it ablaze with the emergency lighter you keep in your pocket.   \n\n\t\t*set Outcome \"The President's sleeves get singed, which he blows way out of proportion for the Press, and everyone feels sorry for the fact that he has to work with such incompetent idiots.\"\n\t\t*set App +20\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#C
