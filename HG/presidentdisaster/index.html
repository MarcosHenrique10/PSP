<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>President Disaster — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "presidentdisaster", "title": "President Disaster", "scenes": {"10hitlerstache": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe President has decided to grow a Hitler mustache. You know, for kids! \n\nWhat do you do?\n\n*choice\n\t#You convince all of his other staffers to do the same.\n\n\t\t*set Outcome \"You start a trend among President Disaster's base. Hitler 'staches go viral.\"\n\t\t*set Rage -10\n\t\t*set App -5\n\t\t*set Prest -10\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#You try to wax it off when he's sleeping.\n\n\t\t*set Outcome \"You only manage to get off half before he wakes from the pain. He locks you in the basement, intending to leave you there until you die. Thankfully, another staffer lets you out.\"\n\t\t*set Rage +15\n\t\t*achieve mustache\n\n\t\t*goto_scene displayOutcome\n\n\t#You tell him RuPaul had also grown one. \n\n\t\t*set Outcome \"It's a lie, but President Disaster hates drag queens more than he likes Hitler. He shaves it off immediately. Crisis averted!\"\n\t\t*set App +5\n\t\t*set Prest +5\n\n\t\t*goto_scene displayOutcome\n", "11borderwalllego": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nPresident Disaster demands that a border wall be built in a week 'OR EVERYONE'S FIRED.' \n\nWhat do you do?\n\n*choice\n\t#You start a nationwide Lego drive. \n\n\t\t*set Outcome \"Legos start pouring in. His supporters send those really big ones, soon filling the mail room. The President is thrilled!\"\n\t\t*set Rage -5\n\t\t*set App +5\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Hire mimes to suggest that an invisible wall has already been built.\n\n\t\t*set Outcome \"The President tweets out a video of the mimes, jubilant with success, until a critic fires back another video showing herself running back and forth over the border in the precise spot where the original video was shot.\"\n\t\t*set Rage +10\n\t\t*set App -10\n\t\t*achieve sheriff\n\n\t\t*goto_scene displayOutcome\n\n\t#Do nothing. Maybe he'll forget.   \n\n\t\t*set Outcome \"He does forget, distracted temporarily by a video posted by one of this supporters of cats in MAGA onesies. Meow!\"\n\t\t*set Rage -5\n\t\t*set App +5\n\t\t*set Prest -5\n\t\t*achieve sheriff\n\n\t\t*goto_scene displayOutcome\n", "12socialsecuritycasino": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe President signs an executive order to invest all Social Security funds in his new casino business. \n\nWhat do you do?\n\n*choice\n\t#Copy-edit the order, channeling funds to your own offshore account. \n\n\t\t*set Outcome \"Mass protests by retirees force Congress to reverse the order before you're found out. You return the money in the nick of time.\"\n\t\t*set Rage +15\n\t\t*set Grift -10\n\t\t*set App -15\n\t\t*achieve socialsecurity\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Try to persuade him to change course.\n\n\t\t*set Outcome \"No luck. The First Lady, Frosti, arrives in Paris for fashion week in a brand new jet that she claims to have borrowed from a Russian cousin that you're certain doesn't exist. How gauche.\"\n\t\t*set Grift +15\n\t\t*set Prest -5\n\n\t\t*goto_scene displayOutcome\n\n\t#Release a copy of the President's tax returns to the press.\n\n\t\t*set Outcome \"President Disaster is furious at first. But, his base couldn't give a shit; they love a grifter! And since the Boomers won't make it through the winter without their Social Security checks, the President doesn't care either!\"\n\t\t*set Rage -10\n\t\t*set Grift +15\n\t\t*set App +5\n\t\t*achieve tax\n\n\t\t*goto_scene displayOutcome\n", "13hairstylistdead": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe only person who knows how to do The President's hair drops dead. \n\nWhat do you do?\n\n*choice\n\t#Offer to cut his hair, swearing that you're actually really talented. \n\n\t\t*set Outcome \"You shave it all off and tweet out a photo of your handiwork. Memes fill the internet of the President as a skinhead.\"\n\t\t*set Rage +10\n\t\t*set App -10\n\t\t*set Prest -10\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Invite the guys from Queer Eye to the White House.\n\n\t\t*set Outcome \"The President thinks they've come for the conversion camp. And delightedly says so. On national television. Didn't they say they were rolling?\"\n\t\t*set App -5\n\n\t\t*goto_scene displayOutcome\n\n\t#Scatter pictures of an orange-tinted Jesus around the White House.   \n\n\t\t*set Outcome \"The President decides to grow his hair long and changes his twitter handle to @Godsonlybegottenson.\"\n\t\t*set Rage -10\n\t\t*set App -5\n\t\t*set Prest -5\n\n\t\t*goto_scene displayOutcome", "14saudihotel": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nA Saudi billionaire offers a cool billion for one of the President's Washington DC hotels. \n\nWhat do you do?\n\n*choice\n\t#Tell him to take that deal! Emoluments Clause be damned!\n\n\t\t*set Outcome \"He does. His base loves it. You consider resigning to end this horrible nightmare. But, you must press on! #resist!\"\n\t\t*set Rage -10\n\t\t*set Grift +10\n\t\t*set App +5\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Call your fixer and have the hotel burned to the ground. \n\n\t\t*set Outcome \"Video of the conflagration goes viral, but President Disaster convinces Moose News to release a photo of himself from 10 years ago standing in front of the hotel to suggest it's absolutely still standing. The Saudi is not that big of an idiot.\"\n\t\t*set Rage +15\n\t\t*set Grift -10\n\n\t\t*goto_scene displayOutcome\n\n\t#Blast President Disaster's listserv with PDF copies of Herman Melville's terrifying prescient story 'The Confidence-Man.'   \n\n\t\t*set Outcome \"Turns out his base does actually read. The President's Twitter feed is flooded with furious former supporters.\"\n\t\t*set Rage +10\n\t\t*set Grift -10\n\t\t*set App -10\n\t\n\n\t\t*goto_scene displayOutcome", "15burntsienna": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nPresident Disaster's preferred brand of foundation in 'macho tangerine' has just been discontinued. \n\nWhat do you do?\n\n*choice\n\t#You appropriate EPA funds and bribe the company to restart production.\n\n\t\t*set Outcome \"The President thinks that you really get him, but he threatens to have your parents taken care of if you reveal that he wears makeup.\"\n\t\t*set Rage -10\n\t\t*set Grift +5\n\t\t*set App -5\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#You persuade him that he's really more of a Burnt Sienna.\n\n\t\t*set Outcome \"Turns out Burnt Sienna goes on reeeal dark. His base loves blackface comedy, though.\"\n\t\t*set Rage -10\n\t\t*set App -10\n\n\t\t*goto_scene displayOutcome\n\n\t#You say it might be time that he give up doing his own makeup and hire a professional.   \n\n\t\t*set Outcome \"He smirks and dismisses you. The next weekend, when you call your mom, you find her number's been disconnected. Nobody knows where she is. \"\n\t\t*set Rage +10\n\t\t\n\t\n\n\t\t*goto_scene displayOutcome", "16afterthoughtsecretary": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage cent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nGermany is insisting that President Disaster denounce the social media giant Fakebook over their repeated privacy violations.\n\nWhat do you do?\n\n*choice\n\t#Show the German Prime Minister those compromising photos the CIA took.\n\n\t\t*set Outcome \"The German P.M. will do anything to keep those photos a secret. Suddenly, Germany's talking up President Disaster at every summit, and our allies seem impressed. Blackmail works!\"\n\t\t*set Prest +10\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Agree to take Fakebook to task.\n\n\t\t*set Outcome \"Turns out Fakebook had a lot of incriminating files on the whole Disaster family and they leak them to the press.\"\n\t\t*set Rage +5\n\t\t*set App -10\n\t\t*achieve tech\n\n\t\t*goto_scene displayOutcome\n\n\t#Call Fakebook and offer a political alliance.\n\n\t\t*set Outcome \"How devious! The President loves criminal-ish (and criminal) moves, and the Fakebook algorithms help you trick even more voters into loving the President.\"\n\t\t*set Grift +5\n\t\t*set App +10\n\t\t*set Rage -10\n\n\t\t*goto_scene displayOutcome\n", "31detentioncenters": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nPresident Disaster announces a new strategy for handling refugee children: 'shelter' them in Disaster Factories where they are only provided food and water after 25 hours of forced labor making Disaster products.\n\nWhat do you do?\n\n*choice\n\t#Send the President's son Afterthought Disaster to spend a week in one of them. \n\n\t\t*set Outcome \"The President thinks it's a fine idea, but his base hates being confronted with the moral turpitude of his administration.\"\n\t\t*set Rage -5\n\t\t*set App -10\n\t\t*set Prest -5\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Suggest that this might be a good model for his plans to replace inner-city public schools with Disaster Technical Colleges.\n\n\t\t*set Outcome \"President Disaster loves the idea, letting you eat the wilted lettuce from yesterday's cheeseburger to recognize your brilliance. The trouble is that nobody is willing to attend.\"\n\t\t*set Grift -10\n\t\t*set Rage -10\n\n\t\t*goto_scene displayOutcome\n\n\t#Grant the Press full access. \n\n\t\t*set Outcome \"President Disaster is furious. He doesn't really care what media sees, but he loathes it when people don't speak highly of him and even Moose News can't figure out a way to spin this horror show in his favor.\"\n\t\t*set Rage +10\n\t\t*set Grift -10\n\t\t*set App -10\n\t\t*set Prest -10\n\t\t*achieve sheriff\n\n\t\t*goto_scene displayOutcome\n", "32golfdeath": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nA golf caddy dies from exhaustion at one of Disaster's resorts. The media uncovers that the caddy was an undocumented immigrant, working four jobs, all at the resort, where he was being paid 50 cents an hour. \n\nWhat do you do?\n\n*choice\n\t#Close the resort and pay off the family.\n\n\t\t*set Outcome \"President Disaster hates paying people for any reason. But, your quick thinking has probably saved the brand. The family, threatened with deportation and forced to wear MAGA hats every day for the next year in exchange for Green Cards, paints a glowing portrait of life working at Disaster Resorts. You feel very dirty.\"\n\t\t*set Rage +5\n\t\t*set Grift -10\n\t\t*set App +10\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Launch a totally bogus smear campaign against the caddy.\n\n\t\t*set Outcome \"Well, that backfires catastrophically. It turns out that the caddy had been a heroically successful human rights lawyer in his home country before fleeing persecution for being gay. The Press eats it up, every headline more viciously pithy than the last about Disaster's ongoing crimes against basic human decency.\"\n\t\t*set App -10\n\t\t*set Prest -10\n\n\t\t*goto_scene displayOutcome\n\n\t#Organize a week-long fundraiser at the resort for Disaster's reelection campaign.  \n\n\t\t*set Outcome \"It's not hard to spin the caddy's death as just desserts to his wealthy donor-base. They've never been more certain of anything that the caddy totally got what he deserved. And the resort, profits falling until now, becomes a kind of mecca for Disaster's supporters.\"\n\t\t*set Grift +10\n\t\t*set App +5\n\t\n\t\t*goto_scene displayOutcome", "33minorityrally": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nDisaster decides he wants to host a rally in Jacksonville to focus on his 'minority supporters.' \n\nWhat do you do?\n\n*choice\n\t#Tell him you think it's an absolutely spectacular idea. \n\n\t\t*set Outcome \"A grand total of 25 people show up. Moose News tries and fails to get video from an angle that makes the turnout look bigger. Disaster is furious.\"\n\t\t*set Rage +10\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Release the internal memo that President Disaster wrote about the event. \n\n\t\t*set Outcome \"That memo is less a memo than a badly drawn set of racial caricatures with slurs scrawled underneath. The polls plummet. Even some of his die-hard supporters aren't comfortable with that level of explicit racism.\"\n\t\t*set App -10\n\n\t\t*goto_scene displayOutcome\n\n\t#Suggest he hold it at a border town and make it a wall-building fundraiser party.  \n\n\t\t*set Outcome \"Disaster loves the idea of putting his base to work for him. The problem is that after 6 hours working in unrelenting heat while Disaster and his family lounge, sipping cold beverages, on a covered dais, his supporters don't feel particularly munificent. Merch sales are likewise pathetic.\"\n\t\t*set Rage -5\n\t\t*set Grift -10\n\n\t\n\t\t*goto_scene displayOutcome", "34schoollunches": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nPresident Disaster calls you first thing in the morning with his latest brilliant plan: replace all school lunches with Disaster Bars. \n\nWhat do you do?\n\n*choice\n\t#Get those bars in cafeterias across this great land!\n\n\t\t*set Outcome \"You sell a ton to all the schools! But the lack of Disaster food inspection leads to a nationwide salmonella outbreak. Parents are irate.\"\n\t\t*set Grift +5\n\t\t*set App -10\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Remind him that children need nutrition, not sugar.\n\n\t\t*set Outcome \"The President hurls his Oreos at you in a seething rage until you apologize for implying sugar is not nutritious.\"\n\t\t*set Rage +10\n\t\t*achieve health\n\n\t\t*goto_scene displayOutcome\n\n\t#Send samples to Disaster's biggest donors to tout the new program. \n\n\t\t*set Outcome \"Those donors couldn't have cared less if poor children had to eat those bars, but they're insulted that Disaster would suggest they eat something so disgusting. The reelection coffers take a hit.\"\n\t\t*set Grift -10\n\n\t\t*goto_scene displayOutcome\n", "35edconference": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nA group of teachers ask the White House to host a worldwide education summit.\n\nWhat do you do?\n\n*choice\n\t#Remind them that this president doesn't stand for wimpy stuff like education.\n\n\t\t*set Outcome \"The teachers are outraged and go on a media tour. The problem is that most Americans seem to agree with the President. Sad!\"\n\t\t*set App +10\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Get that conference going and slap the Disaster brand on everything.\n\n\t\t*set Outcome \"Americans don't pay much attention, but the rest of the world still cares about knowledge and applauds President Disaster. The coffee mugs sell pretty well, too!\"\n\t\t*set Grift +5\n\t\t*set Prest +10\n\n\t\t*goto_scene displayOutcome\n\n\t#Have these teachers fired for making extra work for you.\n\n\t\t*set Outcome \"In retaliation, teachers everywhere boycott all Disaster brands. The pocketbook suffers.\"\n\t\t*set Grift -10\n\n\t\t*goto_scene displayOutcome", "36gridhacked": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nUh oh. Some rogue nation has been hacking our electric grid. They could wreck our infrastructure with the flip of a switch.\n\nWhat do you do?\n\n*choice\n\t#Get all the security agencies on this problem right away.\n\n\t\t*set Outcome \"Crisis averted! And while the public will never learn of this secret success, other international leaders are impressed.\"\n\t\t*set Prest +10\n\t\t*achieve electrician\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Blow it off. What's the worst that could happen?\n\n\t\t*set Outcome \"The hackers flip that switch, and a day of chaos sends the stock market plummeting.\"\n\t\t*set Grift -10\n\t\t*set App -5\n\n\t\t*goto_scene displayOutcome\n\n\t#Purchase a bunch of Silicon Valley startups and task them with solving the issue.\n\n\t\t*set Outcome \"It's expensive, but it works. The public hails this innovative partnership between government and the private sector. Too bad these companies never turn a profit, eh?\"\n\t\t*set Grift -10\n\t\t*set App +10\n\n\t\t*goto_scene displayOutcome\n", "37gayafterthought": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nPresident Disaster agrees to let Moose News conduct a softball, solo interview with his son Afterthought Disaster. Halfway through, however, Afterthought announces that he is gay! \n\nWhat do you do?\n\n*choice\n\t#Lean into it! Maybe it’ll play well in the polls.\n\n\t\t*set Outcome \"The President isn’t happy, but you were right! There seem to be many voters who think this makes him more relatable.\"\n\t\t*set Rage +5\n\t\t*set App +5\n\t\t*achieve lgbtqia\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Convince Disaster’s daughter Duchess to say that she 'experimented' with girls in college. \n\n\t\t*set Outcome \"Any effect on the polls seems, on balance, negligible. When the President hears about his daughter’s admission, though, he hustles off to his room for Disaster Time. You now feel like you need to bathe in lye!\"\n\t\t*set Rage -10\n\t\n\t\t*goto_scene displayOutcome\n\n\t#Force Moose News to edit the interview so it sounds like Afterthought says he's really into yodeling.\n\n\t\t*set Outcome \"Americans love musical talent, the President included!\"\n\t\t*set Rage +5\n\t\t*set App +10\n\n\t\t*goto_scene displayOutcome\n", "38divingteam": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nPresident Disaster announces that he’s inviting the US National Women’s Diving Team to the White House, but they all refuse when they hear he expects them to show up in their bathing suits.\n\nWhat do you do?\n\n*choice\n\t#Tell Disaster this is his opportunity to show America what he really cares about.\n\n\t\t*set Outcome \"Disaster loves the idea and decides to host a state dinner for the former Team coach, against whom there are thoroughly credible claims of sexual abuse. Disaster’s base thinks consent is a liberal conspiracy meant to strip men of their God-given prerogatives. Predictably, they’re thrilled.\"\n\t\t*set App +10\n\t\t*set Rage -10\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Hire look-alikes. Disaster won’t know the difference. \n\n\t\t*set Outcome \"Disaster has a fantastic day. He doesn’t understand the sport, confusing diving for water dancing, but the women (who are all, in actual fact, Eastern European models) do a mock bathing suit competition, which he takes great pleasure in judging.\"\n\t\t*set Rage -10\n\t\n\t\t*goto_scene displayOutcome\n\n\t#Threaten to deport the entire team if they don’t show up. \n\n\t\t*set Outcome \"A few of the divers were born abroad, so they all grudgingly show up. But when Disaster tries to convince a couple of them to stay overnight for a little Disaster Time, the team storms out and plasters social media with the story. His base doesn't much care, but the ongoing competition coverage guarantees that the world hears all about it.\"\n\t\t*set Rage +5\n\t\t*set Prest -5\n\n\t\t*goto_scene displayOutcome", "39kweentroll": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nDuring a state visit to the UK, the Queen of England makes a public gift to President Disaster of an Illustrated History of the British Military. Turns out it’s a kid’s book and the late-night talk show hosts rejoice, dubbing Her Royal Majesty the Kween of Trolls.\n\nWhat do you do?\n\n*choice\n\t#Tell Disaster to declare it an act of war! \n\n\t\t*set Outcome \"An intern chokes on some water halfway through Disaster’s declaration. Nobody interrupts Disaster! The intern’s body is found three days later floating face down in the Potomac, but the interruption also gave the Joint Chiefs a chance to talk Disaster out of attacking one of America’s most longstanding allies.\"\n\t\t*set Rage +10\n\t\t*set Prest -5\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Try to convince him it’s actually a gift for his son Afterthought Disaster. \n\n\t\t*set Outcome \"At first he can’t remember who the hell you’re talking about, but then settles down somewhat when you show him the family portrait you keep in your wallet for precisely these occasions.\"\n\t\t*set Rage -5\n\t\n\t\t*goto_scene displayOutcome\n\n\t#Start immediate production on a mobile AR game called Corgi Killer Go, where players find and kill animated puppies. \n\n\t\t*set Outcome \"Disaster Inc. pours a fortune into the project, but nobody—not even Disaster’s most loyal fans—wants to pretend to kill those adorable stumpy-legged dogs. The Kween of Trolls actually finds the game mildly funny, congratulating the President on a sick burn. Must be nice to have a leader with a sense of humor!\"\n\t\t*set Grift -10\n\t\t*set Prest +5\n\n\t\t*goto_scene displayOutcome", "3deadjourno": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nIt seems a journalist has died. Another one.\n\nWhat do you do?\n\n*choice\n\t#You sell 'In Memoriam' pins at every Disaster Hotel.\n\n\t\t*set Outcome \"Tacky sells.\"\n\t\t*set Rage -10\n\t\t*set Grift +10\n\n\t\t*goto_scene displayOutcome\n\n\t#You laugh loudly. Too loudly. In public.\n\n\t\t*set Outcome \"Your insensitivity is so off the charts you made the President seem kind.\"\n\t\t*set App +5\n\t\t*set Rage -5\n\t\t*set Prest -5\n\n\t\t*goto_scene displayOutcome\n\n\t#You make The President hold a press conference to mourn the loss.\n\n\t\t*set Outcome \"He forgot that journalist's name and went on a rant about Moose News again.\"\n\t\t*set Rage -10\n\t\t*set App -10\n\n\t\t*goto_scene displayOutcome\n", "40duchessastronaut": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe President's daughter Duchess has decided she wants to become an astronaut.\n\nWhat do you do?\n\n*choice\n\t#Put her into the training program and see how long she lasts.\n\n\t\t*set Outcome \"Duchess may not be wise but she is persistent. She makes it through astronaut training, charming people at home and abroad with her adventurous spirit.\"\n\t\t*set Prest +5\n\t\t*set App +5\n\t\t*achieve duchess\t\t\n\n\t\t*goto_scene displayOutcome\n\n\t#Alert the President that his daughter wants to run away to the moon.\n\n\t\t*set Outcome \"The President claps his tiny hands in delight, saying that he's been looking for a way to break up Duchess and her husband. Sending her to space could be the perfect solution!\"\n\t\t*set Rage -10\n\t\n\t\t*goto_scene displayOutcome\n\n\t#Tell her that the space program is just a ruse and that we've never actually left the planet before. \n\n\t\t*set Outcome \"Duchess knows a good scam when she sees one. She immediately forms a new 'space technology' firm (wink wink) that bilks the government for billions.\"\n\t\t*set Grift +10\n\n\t\t*goto_scene displayOutcome\n", "41democratinfighting": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe Democrats are arguing in public about the best way to impeach President Disaster.\n\nWhat do you do?\n\n*choice\n\n\t#Get some dirt on the Democrats to try and shut them up.\n\n\t\t*set Outcome \"Your ham-fisted efforts to shut up the opposition are easily discovered by the media. Public ire rises.\"\n\t\t*set App -10\n\t\n\t\t*goto_scene displayOutcome\n\n\t#Sow more chaos by injecting a few new scandals into the discourse!\n\n\t\t*set Outcome \"With all this new information about the President's grifting and political foibles, the Democrats collapse into major infighting. What's bad for them is good for the President, and his poll numbers jump!\"\n\t\t*set App +10\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Call in a bomb scare at the Capitol to distract them.\n\n\t\t*set Outcome \"The (fake!) terror threat draws the sympathy of the world and brings a few more Americans together, for a little while at least.\"\n\t\t*set Prest +5\n\t\t*set App +5\n\n\t\t*goto_scene displayOutcome", "42afterthoughtracoon": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe President's youngest child Afterthought found a raccoon outside and demands to keep it as a pet.\n\nWhat do you do?\n\n*choice\n\n\t#Use it as a wildlife conservation photo op!\n\n\t\t*set Outcome \"Alas, as soon as the cameras start snapping, the wild raccoon attacks the Disaster family. Cuts, bites, and hilarious photos that are ridiculed worldwide ensue.\"\n\t\t*set Prest -5\n\t\t*set App -5\n\t\n\t\t*goto_scene displayOutcome\n\n\t#Introduce the new White House pet to the President.\n\n\t\t*set Outcome \"The raccoon and President Disaster form an instant bond. The President is soothed greatly by his wise trash panda, and stuffed toys of the little rascal sell well.\"\n\t\t*set Rage -10\n\t\t*set Grift +5\n\t\t*achieve wildlife\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Have the Secret Service 'take care' of the little fella, Old Yeller-style.\n\n\t\t*set Outcome \"Sadly, Afterthought walked in right as the Secret Service put a bullet between the raccoon's eyes. The years of therapy bills will cost a fortune.\"\n\t\t*set Grift -10\n\n\t\t*goto_scene displayOutcome\n", "43rallyrainstorm": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nPresident Disaster has heard it's going to rain during his next rally, and he has ordered you to stop the thunderstorm from happening.\n\nWhat do you do?\n\n*choice\n\n\t#Look into whether we actually have a top-secret way to control the weather.\n\n\t\t*set Outcome \"Turns out, the United States has been controlling the weather for decades! You fix the rally, which goes smashingly! And you begin sharing our secret tech with our grateful allies...for a price.\"\n\t\t*set Prest +5\n\t\t*set App +5\n\t\t*set Grift +10\n\t\n\t\t*goto_scene displayOutcome\n\n\t#Move the rally to a sunnier location and don't tell the President.\n\n\t\t*set Outcome \"Oops! Turns out not many Californians want to hear the Orange Menace speak. The President is furious at turnout and blames you.\"\n\t\t*set Rage +10\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Tell the President you fixed it. You totally didn't.\n\n\t\t*set Outcome \"Rain pours down on the hapless President, drawing some sympathy from the public for the first time in a while.\"\n\t\t*set App +5\n\n\t\t*goto_scene displayOutcome", "44chernobylshow": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nPresident Disaster just watched the Chernobyl miniseries and thought it was the news. He insists on sending billions in aid to the Russians right away.\n\nWhat do you do?\n\n*choice\n\n\t#Send Russia a mountain of cash for Chernobyl cleanup.\n\n\t\t*set Outcome \"Honestly, Chernobyl cleanup efforts never stop, and the huge infusion of cash radically improves the long-term outlook for the area. The world rejoices!\"\n\t\t*set Prest +15\n\t\t*set App +5\n\t\n\t\t*goto_scene displayOutcome\n\n\t#Explain to the President that this happened over 30 years ago. And he should probably remember it, as it was kind of a big deal at the time.\n\n\t\t*set Outcome \"The President refuses to believe that nuclear fallout is not on its way. He spends a fortune outfitting all of his residences with fallout shelters.\"\n\t\t*set Grift -10\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Change the President's HBO Go password.\n\n\t\t*set Outcome \"The President gets upset that he can't watch that awful Axios show, and he loses face with the public by claiming Game of Thrones is 'still good.'\"\n\t\t*set Rage +5\n\t\t*set App -5\n\n\t\t*goto_scene displayOutcome", "45bankcensus": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nPresident Disaster wants the 2020 census to ask for everyone's bank account information.\n\nWhat do you do?\n\n*choice\n\n\t#Bribe the Supreme Court to make this legal. \n\n\t\t*set Outcome \"4 of the 9 justices take that sweet bribe...just enough to cost you a lot and still wind up with a 5-4 decision against you.\"\n\t\t*set Grift -10\n\t\t*achieve accident\n\t\n\t\t*goto_scene displayOutcome\n\n\t#Leak this bad idea to the press.\n\n\t\t*set Outcome \"The Press alerts the public right away. Predictably, everybody hates the idea of handing over their bank account information to the government.\"\n\t\t*set App -10\n\t\t*achieve sheriff\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Add the question and hope nobody notices.\n\n\t\t*set Outcome \"Turns out, people pay attention to the census! Your stealthy efforts are exposed, and the President is outraged at your incompetence.\"\n\t\t*set Rage +10\n\n\t\t*goto_scene displayOutcome\n", "46civilwar": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe President demands you set up a massive Civil War re-enactment on the White House grounds, but this time he wants the Confederacy to win.\n\nWhat do you do?\n\n*choice\n\n\t#Set it up! Let the Confederacy win. \n\n\t\t*set Outcome \"It ain't cheap, and the public dislikes it, but you pull it off. A few of the more totalitarian-minded world leaders applaud the President's bravado.\"\n\t\t*set Grift -5\n\t\t*set App -5\n\t\t*set Prest +5\n\t\n\t\t*goto_scene displayOutcome\n\n\t#Tell the President the Confederates wore blue and let the Union win.\n\n\t\t*set Outcome \"The President is clueless about Civil War history. He's delighted when 'his boys in blue' come out on top, and the public swoons, mistakenly thinking he's turned over a new leaf.\"\n\t\t*set App +10\n\t\t*achieve history\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Show the President Ken Burns documentaries until he falls asleep.\n\n\t\t*set Outcome \"The President gets the soundest sleep of his life. He's never found such a perfect cure for his insomnia. If it were possible for him to show gratitude, he would.\"\n\t\t*set Rage -10\n\n\t\t*goto_scene displayOutcome\n", "47fourseasons": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nWhile Duchess Disaster and her family are glamping at the Four Seasons, their puppy, Chanel, is taken by dog-nappers who are demanding $1.5 million to return the dog unharmed.\n\nWhat do you do?\n\n*choice\n\n\t#Remind the President how much his daughter loves that dog. \n\n\t\t*set Outcome \"Disaster would definitely prefer kicking the dog to saving its hide, but he really loves his daughter—to a rather inappropriate degree. He sucks it up, sells off some stocks and pays up. The dog makes it home in one piece!\"\n\t\t*set Grift -10\n\t\t*set Rage +5\n\t\t*achieve wildlife\n\t\t*achieve duchess\n\t\n\t\t*goto_scene displayOutcome\n\n\t#Refuse to pay. There are plenty of puppy farms happy to supply another. \n\n\t\t*set Outcome \"The kidnappers mail pieces of the dog to all of Disaster’s biggest donors. The press gets wind of what’s happened and Disaster’s polls take a big hit. His \t\t\n\t\t*goto_scene displayOutcome\n\n\t#Suggest that Disaster Inc. try to corner the market on condom production.\n\n\t\t*set Outcome \"The President is thrilled, immediately going public with the news of his new venture! It turns out, however, that American women would rather never have sex again than contribute to Disaster’s bottom line. Social media is filled with quotes from Lysistrata—the original sex-strike story—and Disaster’s investors take a BIG step back.\"\n\t\t*set Grift -10\n\t\t*achieve feminism\n\n\t\t*goto_scene displayOutcome\n", "49hoodrat": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nWhile sailing in the Adriatic, the President’s eldest sons, Smith and Wesson, meet a rich Turkish entrepreneur who totally sells them on his new business venture: Hoodie Cat—a selfie stick for your car that uses AR to 'gamify the driving experience.'  \n\n\nWhat do you do?\n\n*choice\n\n\t#Sounds fun! Encourage the President to GO IN HARD with his sons.  \n\n\t\t*set Outcome \"Between the three of them, the Disasters hold a majority share and are poised to make an absolute killing when it goes public. The night before, a beta tester, distracted by trying to add animated googly eyes to his passengers, drives his car off a cliff, killing himself and three others. Hoodie Cat dies the death it no doubt deserves and Disaster’s accounts hit a painful new low.\"\n\t\t*set Grift -10\n\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Divert the promised funds to your own retirement account—you deserve it! \n \n\t\t*set Outcome \"You manage to hide the transfer well enough for the President’s accountant not to notice—he’s almost as smart as the President. But Disaster is furious when the money goes missing and realizes he isn’t liquid enough to invest now.\"\n\t\t*set Rage +10\n\t\t*set Grift -5\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Have the CIA take out the Turkish entrepreneur.\n\n\t\t*set Outcome \"Oops! It turns out that Turkish entrepreneur was the second cousin of the wife of a Russian diplomat. Not a great look!\"\n\t\t*set Prest -10\n\n\t\t*goto_scene displayOutcome", "4peetape": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThere is a pee tape. It's online.\n\nWhat do you do?\n\n*choice\n\t#Release the other, much worse sex tape to distract.\n\n\t\t*set Outcome \"The nickname President Teenie Weenie appears to be sticking.\"\n\t\t*set Rage +15\n\t\t*set App -5\n\n\t\t*goto_scene displayOutcome\n\n\t#Take down the internet for a week. Hope it passes.\n\n\t\t*set Outcome \"Whoops! Turns out the economy kind of needs the internet.\"\n\t\t*set Grift -10\n\t\t*set App -10\n\t\t*set Prest -5\n\n\t\t*goto_scene displayOutcome\n\n\t#Sell copies -- with Director's Commentary!\n\n\t\t*set Outcome \"The President now owns Golden Showers Inc., the most successful porn company on the planet.\"\n\t\t*set Rage -10\n\t\t*set Grift +15\n\n\t\t*goto_scene displayOutcome\n", "50sickwriter": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe President's speech writer falls gravely ill, landing himself in the hospital two days before Disaster is set to speak at a donor's dinner.\n\n\nWhat do you do?\n\n*choice\n\n\t#The President's son, Afterthought Disaster, is in debate club. He can handle it.  \n\n\t\t*set Outcome \"You realize about 10 seconds into the speech that there's a reason Afterthought has been benched all year. The majority of the speech is in Slovene, which the teleprompter guy has written out phonetically so the President can read it. Even though the President switches to his own incomprehensible English, most of the donors think he was addressing them in Russian and hustle out before dessert. Word gets out and his polls and campaign finances take hit.\"\n\t\t*set Grift -10\n\t\t*set App -10\n\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Write it yourself.\n \n\t\t*set Outcome \"You do a pretty good job imitating the speech writer's style, lacing in a reference to the Union Army's VERY UNFAIR use of satellites for precision bombing in the Civil War. A video of the speech leaks and Twitter goes wild mocking the President's ignorance. The President tries to blame the teleprompter, but he wants your head.\"\n\t\t*set Rage +10\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Inject the speech writer with military-grade performance drugs.\n\n\t\t*set Outcome \"Turns out those drugs really do work. The President comes off sounding fairly competent and trustworthy. The speech writer ends up dying from the strain, but Disaster rakes in millions and his supporters are thrilled.\"\n\t\t*set App +10\n\t\t*set Grift +10\n\n\t\t*goto_scene displayOutcome", "51newmemoir": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe President has asked you to ghost-write his new memoir.\n\nWhat do you do?\n\n*choice\n\n\t#Refuse.\n\n\t\t*set Outcome \"President Disaster throws a minor fit that you won't do his work for him. But his daughter Duchess steps in and writes an articulate and heart-warming tale about his childhood. Her totally fictional story sells like hotcakes in airport book stores.\"\n\t\t*set Rage +5\n\t\t*set Grift +10\n\t\t*achieve duchess\n\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Do it. Call it 'When You're Famous, They Let You!'\n \n\t\t*set Outcome \"Your tell-all exposé of President Disaster's abuse of women and workers sells about a billion copies abroad. Turns out that's because various translations make it seem like an apology instead of a bragging session. You decide to keep that part to yourself.\"\n\t\t*set Prest +10\n\t\t*set Grift +10\n\t\t*achieve history\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Plagiarize 8chan. \n\n\t\t*set Outcome \"You thought you were doing something really artsy and radical, showing the world the horrors that Disaster has made. Unfortunately, the stuff on 8chan has increasingly become the norm--the international alt-right celebrates their victory! You kinda want to die and, if this horror continues, you might!\"\n\t\t*set Prest +10\n\t\t*set App +5\n\t\t\n\n\t\t*goto_scene displayOutcome\n", "52happyfamily": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nOpposition research is reveling in new discoveries about President Disaster's terrible treatment of former wives. The hashtags NotAFamilyMan and CreepInChief are trending. \n\nWhat do you do?\n\n*choice\n\n\t#Announce plans to repeal the 19th Amendment. \n\n\t\t*set Outcome \"American women take to the streets in another inspiring, inter-generational protest. Among the international alt-right, however, misogyny is also trending. New fascist leaders around the globe praise the reactionary stance!\"\n\t\t*set App -10\n\t\t*set Prest +10\n\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Launch a Twitch channel called 'Everybody Loves Disaster,' with a daily dinnertime livestream. \n \n\t\t*set Outcome \"People are slightly grossed out that the President's daughter often eats dinner sitting on his lap. The channel doesn't get many subscribers. But you do get a rather large donation from an offshore account under the name Epery Jeffstein.\"  \n\t\t*set App -5\n\t\t*set Grift +5\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n\t#DENY DENY DENY.\n\n\t\t*set Outcome \"The President finds your lies soothing. And several of our more gullible allies abroad find them believable! You realize you might be getting a little too good at the whole 'lying' thing.\"\n\t\t*set Prest +10\n\t\t*set Rage -5\n\t\t\n\n\t\t*goto_scene displayOutcome\n", "53massshooting": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThere have been four mass shootings in 48 hours. President Disaster tweets out if the Dems don't agree to build his gargantuan border wall, 'very bad things' will continue happening. \n\nWhat do you do?\n\n*choice\n\n\t#Tell Speaker Stiletto to get that wall built.\n\n\t\t*set Outcome \"Speaker Stiletto refuses to even consider the wall, laughing out loud over speakerphone before hanging up on you and the President. Disaster is never anything but violently enraged when women refuse to do what he wants.\"\n\t\t*set Rage +10\n\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Start distributing swag bags to every White House visitor filled with MAGA-themed bump stocks. \n \n\t\t*set Outcome \"The only people who come to the White House anymore are alt-right goofs and world leaders who want to be more like President Disaster. Unfortunately, that latter group seems to be getting bigger all the time.\"  \n\t\t*set App +5\n\t\t*set Prest +10\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Remind him that these are acts of home-grown, white-supremacist terrorism.\n\t\t*set Outcome \"The President begins calling several world leaders to brag about how our terrorists are the best terrorists. Several of them misinterpret this as accepting responsibility for the tragedies and congratulate him heartily.\"\n\t\t*set Prest +10\n\t\t*achieve guns\n\t\t\n\n\t\t*goto_scene displayOutcome\n", "54whitemen": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe President has decided that he wants to replace all gender-neutral references to American citizens on .gov websites with 'white man'/'white men.'\n\nWhat do you do?\n\n*choice\n\n\t#Do it! White guys could use a break.\n\t\t*set Outcome \"Jerks at home and abroad are thrilled, and they let everyone hear about it.\"\n\t\t*set App +5\n\t\t*set Prest +5\n\t\n\t\t*goto_scene displayOutcome\n\n\n\t#In a '90s throw-back, replace all references to women/woman with the term 'womxn.' \n \n\t\t*set Outcome \"For some reason the President thinks you're making fun of women (womxn?) and seems happy. Meanwhile, middle-aged lefties also find the move, like, totally radical, dude.\"  \n\t\t*set Rage -5\n\t\t*set App +5 \n\t\t*achieve feminism\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Announce that the change comes with plans to rename our nation Gilead. \n\t\t*set Outcome \"Disaster doesn't read and so has no idea what you are talking about. But support starts pouring in from alt-right world leaders. You're now utterly terrified of what's happening around the world.\"\n\t\t*set Prest +10\n\t\t\n\n\t\t*goto_scene displayOutcome\n", "55officelunch": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nSeveral of the lower-level office staff are heading out to lunch. One of the schedulers asks if you'd like to join.\n\nWhat do you do?\n\n*choice\n\n\t#Grab a bite! Sounds like fun.\n\t\t*set Outcome \"You return to find the President anxiously putting up 'missing' posters with your face on it. When he sees you, he's so relieved! But he makes you wear a kiddie leash for the rest of the week so he can keep you safe.\"\n\t\t*set Rage -10\n\t\t*achieve you\n\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Shame your co-workers for taking personal time. \n \n\t\t*set Outcome \"One of your co-workers taped your rant and put it online. They meant to shame you, but some people prefer their government employees worked to the bone!\"  \n\t\t*set App +5 \n\t\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Suggest you order in and hang out in the Oval Office while the President golfs. \n\t\t*set Outcome \"A few members of the press stumble onto your epic lunch spread, which is filled with food from around the world. It makes for some great puff pieces abroad.\"\n\t\t*set Prest +10\n\t\t\n\n\t\t*goto_scene displayOutcome\n", "56nightmares": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nYou've been having some troubling nightmares about the end of the world.\n\nWhat do you do?\n\n*choice\n\n\t#Visit a psychic to determine if you can see the future. \n\t\t*set Outcome \"The psychic charges $10 to tell you that you're simply stressed out. But when the social media world finds out the President's Chief of Staff is into horoscopes and tarot cards, the President's approval shoots up among the spiritual types.\"\n\t\t*set App +10\n\t\t*achieve religion\n\n\t\t*goto_scene displayOutcome\n\n\t#Ask for a vacation.\n\t\t*set Outcome \"The President demands that you grovel for his forgiveness for even asking such a thing! He says every moment with him is the best vacation ever, and he can't stand the idea that you might not agree!\"\n\t\t*set Rage +10\n\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Find the White House psychologist and have a chat.\n\t\t*set Outcome \"Bad news: President Disaster named himself the official White House psychologist. He gets quite a kick out of your nightmare descriptions, which he thinks are hilarious!\" \n\t\t*set Rage -5 \n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "57datingapp": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nPresident Disaster's manicurist says you're looking uptight. She suggests you loosen up and try out a dating app. \n\nWhat do you do?\n\n*choice\n\n\t#Give it a go! Sign up for one and start swiping.\n\t\t*set Outcome \"Word quickly gets out that the Chief of Staff is just a normal person looking for love like the rest of us. Folks are charmed! You even find a date.\"\n\t\t*set App +10\n\t\t*achieve love\n\n\t\t*goto_scene displayOutcome\n\n\t#Hit on her. \n\t\t*set Outcome \"Not cool! Even President Disaster shames you for your inappropriateness, and he's a monster.\"\n\t\t*set Rage +5\n\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Thank her for the idea and pitch the President on launching a Disaster Dating app.\n\t\t*set Outcome \"It turns out that nobody wants to join a service called 'Disaster Dating' and the President loses his entire investment.\" \n\t\t*set Grift -10 \n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "58birdcostumes": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nPresident Disaster's daughter Duchess strongly encourages you to invest in her latest enterprise, a company that makes costumes for pet birds.\n\nWhat do you do?\n\n*choice\n\n\t#Laugh in her face. This is a terrible idea.\n\t\t*set Outcome \"Duchess doesn't bat an eye and tells you you're missing out. Sure enough, her Fakebook announcement goes viral. Pre-orders abound and the Disaster family rakes in the cash. Never doubt pet people.\"\n\t\t*set Grift +10\n\t\t*goto_scene displayOutcome\n\n\t#Hand over half your savings. You love birds!\n\t\t*set Outcome \"Bird-lovers the world over celebrate the Disaster family online after the company is announced. You aren't sure your savings will recover, but animal lovers are pleased.\"\n\t\t*set Prest +10\n\t\t*set Grift -5\n\t\t*achieve duchess\n\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Ask to see the company financials.\n\t\t*set Outcome \"Ouch. Turns out that Duchess has been siphoning a ton of family funds into her new bird obsession. You cut her off but the damage has been done.\" \n\t\t*set Grift -10 \n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "59fbibug": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nYou accidentally stumble onto an FBI agent planting a bug in the Oval Office.\n\nWhat do you do?\n\n*choice\n\n\t#Call the Secret Service in and arrest him!\n\t\t*set Outcome \"It's chaos within the executive branch! The public is taking sides and stressed out, and the President looks almost as incompetent as he actually is.\"\n\t\t*set App -10\n\t\t*goto_scene displayOutcome\n\n\t#Ask him if you can help.\n\t\t*set Outcome \"The 'FBI agent' rips off his mask to reveal Casper, the President's weasel son-in-law. He says he knew you were a turncoat, and when he tells President Disaster, you get an hour-long tongue lashing.\"\n\t\t*set Rage +10\n\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Offer to bribe the agent not to plant it.\n\t\t*set Outcome \"The agent accepts, but the price is steep. You better hope the President doesn't notice that particular line item anytime soon.\" \n\t\t*set Grift -10 \n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "5womenprotest": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThousands of women are protesting again. The President tweets out a picture of some of the marchers with the caption: “I’ve got an idea about where Iran can put its weapons of mass destruction.”\n\nWhat do you do?\n\n*choice\n\t#Suggest an attack on Iran to make it seem like this was hawkish, not sexist.\n\n\t\t*set Outcome \"The peace-niks join the women. It turns out to be the biggest protest in the history of everything.\"\n\t\t*set Rage +5\n\t\t*set App -10\n\t\t*set Prest -5\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Join the protest! They've got a point!\n\n\t\t*set Outcome \"Luckily the President is too busy watching TV--it’s always Personal Disaster time!--to notice your absence. Everyone else applauds the administration for hearing them out.\"\n\t\t*set App +10\n\t\t*set Prest +5\n\t\t*achieve feminism\n\n\t\t*goto_scene displayOutcome\n\n\t#Sell knock-off t-shirts of the march. If you can't beat 'em, profit off 'em!\n\n\t\t*set Outcome \"President Disaster is so happy that he orders fast food burgers for the entire staff to celebrate.\"\n\t\t*set Rage -10\n\t\t*set Grift +5\n\n\t\t*goto_scene displayOutcome\n", "60stressrash": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nYou look in the mirror and realize your neck is getting red and blotchy. It appears to be some kind of stress rash!\n\nWhat do you do?\n\n*choice\n\n\t#Plan a vacation to Greece.\n\t\t*set Outcome \"The President gets wind of your travel plans and nixes the whole thing. But the Greeks are flattered by the effort and talk you up as the voice of reason inside the White House.\"\n\t\t*set Prest +5\n\t\t*goto_scene displayOutcome\n\n\t#Take the edge off with a martini or three.\n\t\t*set Outcome \"You get nice and sauced, totally missing the fact that President Disaster is on Twitter sending romantic gifs to the President of Russia. He thinks they're DMs, but they're not! The public is concerned, but the President's in a great mood!\"\n\t\t*set App -5\n\t\t*set Rage -10\n\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Call the newspapers to anonymously to let off some steam.\n\t\t*set Outcome \"You rant about the President's ridiculous plan to solve climate change by dropping a giant ice cube in the ocean. But it turns out people love that idea! Anything to keep us from staring down the truth, apparently.\" \n\t\t*set App +10 \n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "61impeachrumors": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nYou hear a rumor that the House Speaker, Ms. Stiletto, is finally planning impeachment hearings.\n\nWhat do you do?\n\n*choice\n\n\t#Call her and talk her out of it.\n\t\t*set Outcome \"Someone from Ms. Stiletto's office leaks your call audio, and you sound a little panicked. All Disaster stocks take a tumble as they realize the White House is running scared on impeachment.\"\n\t\t*set Grift -10\n\t\t*goto_scene displayOutcome\n\n\t#Call her and talk her into it.\n\t\t*set Outcome \"You call Ms. Stiletto and beg her to pull the trigger. She think this is some kind of trick, that you're setting her up to look like an idiot. She delays impeachment (again!) and the President looks like a safer bet than ever to make it to election day.\"\n\t\t*set App +10\n\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Tell the President to start behaving better if he wants to keep his job.\n\t\t*set Outcome \"Nobody tells President Disaster what to do! He makes you his footstool for the rest of the day.\" \n\t\t*set Rage +10 \n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "62boxingmatch": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nOne of President Disaster's opponents, Joe Chompers, has been talking tough in the press about wanting to fight the President. Like in a boxing match!\n\nWhat do you do?\n\n*choice\n\n\t#Try and set up the fight.\n\t\t*set Outcome \"The President is outraged that you would try and make him do anything that breaks a sweat! Plus, he seems a little scared of Joe Chompers. And do they even make boxing gloves for hands that small? No dinner for you!\"\n\t\t*set Rage +10\n\t\t*goto_scene displayOutcome\n\n\t#Make some hilarious gifs of old Joe Chompers forgetting which day it is.\n\t\t*set Outcome \"Your gifs are age-ist! It ruffles a few feathers in the senior citizen crowd.\"\n\t\t*set App -5\n\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Call out this barbarism in the press.\n\t\t*set Outcome \"It's not often the President can look like the bigger man. His ratings jump!\" \n\t\t*set App +10 \n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "63cookingstaff": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThe White House cooking staff has threatened to go on strike over the President's absurd late-night cravings.\n\nWhat do you do?\n\n*choice\n\n\t#Tell them it's their job to keep the President fed and happy.\n\t\t*set Outcome \"The staff back down, but one of them leaks a menu of the President's demands. Americans aren't surprised, but the rest of the world is really turned off by his fried bologna obsession.\"\n\t\t*set Prest -10\n\t\t*goto_scene displayOutcome\n\n\t#Ask the President to stop hassling the staff for six-foot-long hoagies at 2am.\n\t\t*set Outcome \"Initially, the President wants you fired. But it turns out that not eating 40 pounds of sandwich meat nightly does wonders for his digestive health and thus his mood.\"\n\t\t*set Rage -10\n\t\t*achieve labor\n\t\t\n\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Fill in for the cooks and give them a night off.\n\t\t*set Outcome \"You make a terrible version of the President's favorite ice cream and macaroni dish. In his anger, he sells off all his ice cream and pasta stocks at a huge loss.\" \n\t\t*set Grift -10\n\t\t*set Rage +5\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "64confusedmodels": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nYou find a gaggle of confused Eastern European supermodels wandering the White House halls.\n\nWhat do you do?\n\n*choice\n\n\t#Direct the Secret Service to get them out of here quietly.\n\t\t*set Outcome \"The supermodels do not go quietly. Something about payment owed? It takes a lot of cash from the slush fund to calm them down.\"\n\t\t*set Grift -10\n\t\t*goto_scene displayOutcome\n\n\t#Ask them if they'd like to party with you.\n\t\t*set Outcome \"They have a great time at your shindig and spread the word on the international fashion scene that the White House is a cool place to hang out.\"\n\t\t*set Prest +5\n\t\t*set Rage -5\n\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Send them to the President's bedroom.\n\t\t*set Outcome \"Oof. The First Lady was in the bedroom, and boy was she mad. She takes the President to task, and he takes it out on you. Next time, he says, send the models to the Oval Office! Duh.\" \n\t\t*set Rage +10\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "65shootprotestors": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nA few right-wing world leaders have issued a joint statement saying 'it's totally fine to shoot protestors.' You find Disaster crying real tears of FOMO.   \n\nWhat do you do?\n\n*choice\n\n\t#Call the Chinese diplomat and insist that Disaster get added to that statement. \n\t\t*set Outcome \"They agree, but for a price: an immediate and permanent reduction of all tariffs. Disaster's stocks will take a hit, but the boost to his approval ratings and international prestige among the fascism-inclined will serve as a happy distraction.\"\n\t\t*set Rage -5\n\t\t*set Grift -10\n\t\t*set App +5\n\t\t*set Prest +5\n\t\t*goto_scene displayOutcome\n\n\t#Fire back by issuing a statement of condemnation. \n\t\t*set Outcome \"Left-leaning world leaders--the few remaining--invite him to sign another joint statement in support of democracy. His approval ratings see a boost from Republicans who were actually starting to fear the genuine possibility of a fascist USA.\"\n\t\t*set Prest +5\n\t\t*set App +5\n\t\t*achieve assembly\n\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Offer to stress eat with him. \n\t\t*set Outcome \"You consume three extra-large pizzas in as many hours. You both feel a lot better afterward.\" \n\t\t*set Rage -10\n\t\t*achieve you\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "66morningcalls": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nYou're next in line to join the President on his morning calls.    \n\nWhat do you do?\n\n*choice\n\n\t#Spontaneously vomit on the carpet in the Oval Office. \n\t\t*set Outcome \"In an uncharacteristic act of charity, the President gives you the day off. In your absence, though, he manages to commit treason at least three times in one morning--all of which is somehow leaked to the Press.\"\n\t\t*set App -10\n\t\t*goto_scene displayOutcome\n\n\t#Blurt out that the other staff refer to this task as babysitting. \n\t\t*set Outcome \"The President forces you to wear nothing but a diaper for the rest of the day.\"\n\t\t*set Rage +10\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Suck it up, buttercup.\n\t\t*set Outcome \"It's your job, after all. The upside: on three out of the five phone calls, you mute his phone so he can neither hear nor be heard. He doesn't notice the difference since most of these calls involve him monologuing incoherently the entire time. And you take an opportunity to put your diplomacy skills to work, brokering a few really beneficial trade deals in the process.\" \n\t\t*set Prest +10\n\t\t*set Grift +5\n\t\t*achieve sheriff\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "67whitehousewine": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nYou're feeling really sorry for yourself--and for America--and get tanked on White House wine. You wake up in the Oval Office with the worst hangover of your life and the President standing over you.     \n\nWhat do you do?\n\n*choice\n\n\t#Blame it on Justice Kegstand, hollering triumphantly that boys will be boys. \n\t\t*set Outcome \"The President loves ALL the aphorisms that prop up toxic masculinity and tries to give you a bro-hug, which you narrowly avoid by looking like you are about to barf.\"\n\t\t*set Rage -5\n\t\t*goto_scene displayOutcome\n\n\n\t#Blame it on the President's teen son, Afterthought Disaster. \n\t\t*set Outcome \"The President is furious that you would try to corrupt his son and makes you drink a bottle of rubbing alcohol as punishment. You hope the blindness is temporary.\"\n\t\t*set Rage +5\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Blame it on visiting diplomats from China, yelling ganbei (cheers in Chinese).\n\t\t*set Outcome \"Disaster tweets out a video of you doing this with the explanation: this is what China is doing to the American economy! Nobody really understands what he's talking about, but Disaster's supporters love the idea that China is responsible for all their woes. The Chinese are less than thrilled.\" \n\t\t*set Prest -5\n\t\t*set App +5\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "68divingteam": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\n\nThe President issues an executive order declaring that his son Afterthought will be joining the Junior Olympic diving team.\n\n\nWhat do you do?\n\n*choice\n\n\t#Remind the President that Afterthought cannot swim.  \n\t\t*set Outcome \"Enraged at the suggestion that his son in anything but the best swimmer in the history of presidential children, he invites the media to witness Afterthought swim across the Potomac. The poor kid nearly drowns -- as do you when, after saving him, the President holds you under water for 2 minutes. His base loves the display of manly aggression, though.\"\n\t\t*set Rage +10\n\t\t*set App +5\n\t\t*goto_scene displayOutcome\n\n\t#Suggest that boxing might be a better fit. \n\t\t*set Outcome \"The President couldn't agree more and quickly amends the order. His base is likewise thrilled: they much prefer violence to wimpy sports like diving.\"\n\t\t*set Rage -5\n\t\t*set App +5\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Immediately start production of Disaster branded speedos.\n\t\t*set Outcome \"The President is thrilled by your entrepreneurial instincts.   It turns out, though, that nobody wants to wear a tiny bathing suit that has the word DISASTER emblazoned suggestively across the front.\" \n\t\t*set Grift -10\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "69grandsonmeasles": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\n\nBecause the President has managed to convince his daughter that vaccines cause cancer, his grandson ends up contracting measles. \n\nWhat do you do?\n\n*choice\n\n\t#Suggest that he bring in a shaman. Modern medicine is for suckers.   \n\t\t*set Outcome \"The President agrees even though it costs a fortune. But, when the media catches wind, the choice comes across as a bit too 'witchy' for the religious right. His approval numbers take a hit.\"\n\t\t*set Grift -5\n\t\t*set App -10\n\t\t*achieve religion\n\n\t\t*goto_scene displayOutcome\n\n\t#Propose that he leverage the kid's illness for the sympathy vote. \n\t\t*set Outcome \"He loves when you turn lemons into lemonade! He hops on Twitter with a tearful video announcement. Support and well-wishing starts pouring in from all around the world.\"\n\t\t*set App +10\n\t\t*set Prest +5\t\n\t\t*goto_scene displayOutcome\n\n\n\t#Secretly bring in a real doctor.\n\t\t*set Outcome \"It costs a fortune to pay for the Doctor's services and silence, but the treatments work. Obviously they do; because science. Disaster is convinced, however, that it's a sign that God wants him re-elected. Unfortunately, his base eats it up.\" \n\t\t*set Grift -5\n\t\t*set App +5\n\t\t*achieve parent\n\t\t\n\t\t*goto_scene displayOutcome\n\n\n", "6whleak": "Days before election: ${max_turns_to_play}\n\n*set max_turns_to_play -1\n\n*stat_chart\n\tpercent Rage\n\tpercent Grift \n\tpercent App Domestic Approval\n\tpercent Prest International Prestige\n\nThere's a leak in the White House. And it ain't coming from the roof.\n\nWhat do you do?\n\n*choice\n\t#Take the fall. You're a team player.\n\n\t\t*set Outcome \"The President slams his hand down on the oversized red button in the center of his desk and the sirens blare. Eventually you talk your way out of it with the Secret Service, and the President forgets the whole thing by the next day.\"\n\t\t*set Rage -5\n\t\t*set App +5\n\t\t*set Prest +5\n\t\t\n\t\t*goto_scene displayOutcome\n\n\t#Get that mole a higher security clearance!\n\n\t\t*set Outcome \"After the next article lands on the President's desk, exposing his back-alley dealings with Middle-Eastern resort developers, he threatens to burn down the White House with all of you in it. Luckily, he has no idea how to light a fire.\"\n\t\t*set Rage +10\n\t\t*set Grift -10\n\t\t*set App -10\n\n\t\t*goto_scene displayOutcome\n\n\t#String him up! Everyone loves a public execution. \n\n\t\t*set Outcome \"You've never seen The President so excited about anything before
