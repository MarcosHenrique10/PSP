uthern accent, \"You were at the beach yesterday!\" \n    \n    Indeed, it's definitely not one of the people you were in the bunker with. No, this is one of the people you saw on the beach yesterday, too, but don't remember seeing him afterwards, which means he was left outside. How did he manage to survive the tsunami? \n    \n    \"Are you okay, sugar? Do you need help?\" a woman with the \"Louisiana\" dog tag in front of you addresses him in a friendly manner.\n    \n    The man spits on the floor and gives her a murderous look, \"You bastards left me there to die!\"\n    \n    You notice another notable thing about him….\n    *page_break He is holding a gun.\n    The loud gunshot prompts you to cover your ears on reflex. The woman from Louisiana falls lifelessly on the wooden floor as the man points his gun at the survivor from Arkansas with pure bloodlust in his eyes and pulls the trigger…\n    \n    Before you see what happens next, your fight or flight response kicks in and you run out of the building. Seconds later, you hear gunshots behind you and feel a striking pain in your arm.\n    \n    Miraculously, only one bullet scrapes your arm, but you fall anyway, partially out of desire to pretend to be dead. Hopefully, he bought it.\n    \n    As you drop on the ground the white sand fills your eyes and nostrils. You cover your head from the ear-rupturing sounds of gunfire and screams behind you.\n    \n    You bury your head even deeper in the sand and wait, listening for the sounds of the approaching gunman. You try to filter out the sounds of gunshots and falling bodies, looking for those rhythmic steps. You can almost sense them, or perhaps it's just your heart beating?\n    \n    A few seconds later (or maybe minutes?) you feel someone approach. Out of the corner of your eye you see the boots belonging to the man with the gun, he is standing mere inches from you!\n    \n    You gotta do something, but what? Pretending to be dead is safer, but you can use this opportunity to unleash a sneak attack. What do you do?\n    *choice\n        #I stay low.\n            *set wisconsinkilled true\n            You stay low, holding your breath and trying not to even think, as if your thoughts themselves can draw attention to you. You hear another gunshot and then the sound of a body falling in front of you. You take a peek.\n            \n            You see Virge with a crowbar in his hands standing over the dead body of the gunman, which now has a nasty wound on his neck, blood gushing out of it. The sight is shocking, but you are weirdly unaffected by it as the sight is just too surreal for you to comprehend.\n            \n            Another surreal thing is the dog tag on the man's neck. It reads \"Wisconsin\". His face does look familiar, you realize. He was that guy who fell in front of you as you ran towards the bunker. You didn't stop to help him out. What a weird coincidence.\n            *page_break\n            \"Where the fuck did he get that gun?\" Jersey spits as he walks up to you and checks the dead body.\n            \n            \"Probably somewhere in that building. If they're there, we should find them,\" Virge responds.\n            \n            \"They're all dead,\" Utah interjects, pointing at the lifeless bodies of five other survivors lying on the beach.\n            \n            \"God fucking dammit!\" Jersey spits and kicks the gunman's corpse.\n            \n            You follow the others into the house, now much more cautiously. Though it is unlikely there would be anyone else in the building, you prepare for action just in case.\n            *page_break\n            You get closer to the large map on the wall.\n            \n            \"This must be the map of the island!\" York exclaims, studying the map excitedly.\n            \n            The map shows some kind of atoll, which is thin and almost looks like a pair of earphones with their central cord missing, or like a twisted, Salvador Dali-esque horseshoe.\n            \n            Unfortunately, it only shows the physical geography of the island, so you can't locate any other buildings by looking at it. Virge examines the map closely before ripping it off the wall and rolling it into a scroll.\n            *page_break\n            In the back of the building you find a sturdy metallic door left ajar, which leads to a small dark room.\n            \n            You try to turn the lights on, but they don't work. However, the room is small enough for you to make out what's inside anyway.\n            \n            It's filled with guns. Lots of them! Lining the walls, there are various rifles, pistols and even some things that look like grenades.\n            \n            \n            *goto guncloset\n        #I attack.\n            You will attack him as soon as the opportunity arises, you decide and wait for the perfect opportunity…\n            \n            The gunman's boots turn in another direction; now he is standing with his back towards you!\n            \n            You leap from the sand like some kind of ninja and tackle him to the ground. He is shocked at your attack and you manage to push the gun out of his hand, sending it sliding down towards the water.\n            \n            Luckily for you, the man's other arm is limp from all the injuries it withstood (from the tsunami, you presume), so he can only flight you with one hand. That said, his other arm is still functional and he pulls something out of his belt.\n            \n            It hits you; he is holding a large knife! And then it hits you, literally, in the stomach…\n            \n            You feel enormous pain in you torso, as if an elephant has pierced you with its tusk. You fall onto the sand, clutching at your stomach, but all you can feel now is pain.\n            \n            The man gets up and steps away from you, but it doesn't matter much when all you can see is the sand around you turning to a dark shade of brown. \n            \n            Game over, man…\n            *page_break Game over…\n            *achieve bloodonthesand\n            *check_achievements\n            *if (((((((((((((((((((((((((((((choice_achieved_firstdeath and choice_achieved_abyss) and choice_achieved_eliminated) and choice_achieved_timber) and choice_achieved_bloodonthesand) and choice_achieved_gotexploded) and choice_achieved_snakeeyes) and choice_achieved_sharkbait) and choice_achieved_lightning) and choice_achieved_hellfire) and choice_achieved_bangbang) and choice_achieved_exterminated) and choice_achieved_oceanwater) and choice_achieved_monstermadness) and choice_achieved_kamikaze) and choice_achieved_ivory) and choice_achieved_betrayal) and choice_achieved_rockbottom) and choice_achieved_frozen) and choice_achieved_shipwrecked) and choice_achieved_mutineer) and choice_achieved_hoosier) and choice_achieved_solesurvivor) and choice_achieved_castaway) and choice_achieved_laststraw) and choice_achieved_letitdie) and choice_achieved_fallguy) and choice_achieved_badluck) and choice_achieved_burnbabyburn) and choice_achieved_outsmarted)\n                *achieve alldeaths\n            [b]DEAD END[b]\n            \n            You've met with a terrible fate, haven't you? Try again and see if you can make it further! :)\n            *ending\n*if savewisconsin = true\n    You get closer to the large map on the wall.\n    \n    \"This must be the map of the island!\" York exclaims, studying the map excitedly.\n    \n    The map shows some kind of atoll, which is thin and almost looks like a pair of earphones with their central cord missing, or like a twisted, Salvador Dali-esque horseshoe.\n    \n    Unfortunately, it only shows the physical geography of the island, so you can't locate any other buildings by looking at it. Virge examines the map closely before ripping it off the wall and rolling it into a scroll.\n    \n    In the back of the building you find a black, sturdy-looking door. You try to open it, but it is locked.\n    *choice\n        #Pry it open with the crowbar.\n            You ask Virge for his crowbar, place it between the door and the wall and put all of your wait onto it. It's tough, but the door is budging, just slowly.\n            \n            You press even harder and manage to break the lock of the door as it swings open. The inside is dark and you hear a faint beeping sound coming from within.\n            \n            What could that be?\n            *page_break BOOOOOM!!!\n            *achieve gotexploded\n            *check_achievements\n            *if (((((((((((((((((((((((((((((choice_achieved_firstdeath and choice_achieved_abyss) and choice_achieved_eliminated) and choice_achieved_timber) and choice_achieved_bloodonthesand) and choice_achieved_gotexploded) and choice_achieved_snakeeyes) and choice_achieved_sharkbait) and choice_achieved_lightning) and choice_achieved_hellfire) and choice_achieved_bangbang) and choice_achieved_exterminated) and choice_achieved_oceanwater) and choice_achieved_monstermadness) and choice_achieved_kamikaze) and choice_achieved_ivory) and choice_achieved_betrayal) and choice_achieved_rockbottom) and choice_achieved_frozen) and choice_achieved_shipwrecked) and choice_achieved_mutineer) and choice_achieved_hoosier) and choice_achieved_solesurvivor) and choice_achieved_castaway) and choice_achieved_laststraw) and choice_achieved_letitdie) and choice_achieved_fallguy) and choice_achieved_badluck) and choice_achieved_burnbabyburn) and choice_achieved_outsmarted)\n                *achieve alldeaths\n            [b]DEAD END[b]\n            \n            You've met with a terrible fate, haven't you? Try again and see if you can make it further! :)\n            *ending\n        #Look around for a key.\n            You look through the cabinets in the room with the map and manage to find a small, rusty key in one of them. \n            \n            You get back to the door and try it. It works! \n            \n            Well that was easy!\n            \n            You find a small dark room within. You try to turn the lights on, but they don't work. However, the room is small enough for you to make out what's inside anyway.\n            \n            It's filled with guns. Lots of them! Lining the walls, there are various rifles, pistols and even some things that look like grenades.\n            *goto guncloset\n*label guncloset\n*choice\n    #Take a gun.\n        *set violence +10\n        *set mainegun true\n        You take a pistol from one of the shelves and examine it. It is surprisingly heavy for its size and looks quite intimidating. \n        \n        You make sure it's on safety mode and stuff it in your pocket.\n        \n        Your companions follow suit as they grab the various weapons stacked on the walls.\n        *if savewisconsin = true\n            *page_break\n            *goto mutiny\n        \n        \n        *goto sleepytime\n    #Don't take a gun.\n        *set violence -10\n        You decide not to mess with a deadly weapon and leave guns be.\n        \n        Your companions aren't as hesitant as they grab the various weapons stacked on the walls.\n        *if savewisconsin = true\n            *page_break\n            *goto mutiny\n        \n        \n        *goto sleepytime\n*label mutiny\nYou explore the building further, but after searching to and fro without finding anything of interest, decide to go back outside.\n\n\"You're not coming?\" Virge turns to a group of survivors who stopped at the doorway behind you. \n\n\"No need, we're taking this spot for ourselves,\" a tough-looking muscular woman with \"Minnesota\" dog tag speaks as the four survivors next to her nod silently.\n\n\"Says who?\" Virge looks at them with scorn.\n\n\"I do,\" the woman responds and points her gun at him, \"Now get the fuck out of our property or I'll shoot!\"\n\nVirge frowns, but backs away, signaling you and the others to do the same.\n\n\"You're making a mistake,\" he says, \"This island is a death trap; you'll just end up dying on your own.\"\n\n\"Shut the fuck up!\" she spits, \"Everyone is sick of your shit, Virge, and you know it. I bet the others would rather join us than stay with you,\" she adds, looking in your direction.\n\nVirge turns to you and the others.\n*if (rebellion >= 80)\n    \n    You never liked his bossy pants attitude much, so you have been dying for an opportunity to get away from him.\n*choice\n    #She's right; I'll join them!\n        *set rebellion 100\n        \"I'm with you!\" you raise your hand and Minnesota nods approvingly. \n        \n        \"Smart move, come over here!\" she beckons you.\n        \n        \"Are you serious?\" Virge looks at you with pure disgust.\n        \n        \"They do have a point,\" you smirk and walk up to the group of mutineers.\n        \n        \"Anyone else?\" Minnesota overlooks the remaining survivors.\n        \n        But no one follows your example. Even Florida says, \"Sorry, Minn, they've got food there.\"\n        \n        \"Fine, go back to your little camp! Now!\" Minnesota shoots her shotgun into the air to drive the point across. \n        \n        Virge and the others leave the premises and go back to the beach. You wonder if you'll ever see them again.\n        \n        Either way, you are not with them anymore.\n        *page_break\n        *set joinedmimal true\n        *goto mutineers\n    *selectable_if (rebellion \u003c 80) #No thanks!\n        You shake your head and the others do the same. Even Florida says, \"Sorry, Minn, they've got food there.\"\n        \n        \"Fine, go back to your little camp! Now\" Minnesota shoots her shotgun into the air to drive the point across. \n        \n        You leave the premises and walk back to the beach, now five survivors short as Minnesota's group takes over the building.\n        *page_break\n        *goto tennes\n*label mutineers\n\"Welcome aboard, Maine!\" Minnesota slaps you hard on the shoulder as she points at her companions:\n\n\"That's Iowa,\" she points at a young man with dark skin and glasses, who is reading a book in the corner. \"Sup?\" he says curtly, not looking at you.\n\n\"Missouri,\" she points at a young kid who looks super excited to be holding a real weapon. They look about twelve or so, and give you a salute, saying, \"Nice to meet ya, Maine! Welcome to the best squad ever!\"\n\n\"Arkansas,\" she points at a slack-jawed hayseed who gives you a broad smile and says, \"How are ya, pumpkin?\"\n\n\"And Louisiana!\" she points at an elegant black woman who gives you a charming smile, \"I was almost worried you forgot about me, dear! Real pleasure to meet you, Maine!\" \n\nWith the introductions out of the way, Missouri turns to Minnesota, \"So what's the plan, boss?\"\n\n\"We need to set up our base here, let's get to work!\" she declares.\n*page_break\nYou follow the others as they explore the house further. The place is old and shabby, but you try to make do with what you've got.\n\n\"We don't really have any supplies. Would be nice to get something to eat,\" Louisiana raises a valid point. \n\n\"We'll find them tomorrow, right now we should make ourselves home!\" Minnesota argues.\n\nYou ponder these options, but the sound of a rumbling stomach distracts you from your thoughts. It wasn't you, though it could have been.\n\n\"Aw, I'm hungry!\" Arkansas moans, \"Can't we go steal the others' supplies?\"\n\n\"No, you idiot!\" Minnesota bonks him on the head, \"I told you we'll get food tomorrow!\"\n\n\"Hey, no need to act so aggressive, darling,\" Louisiana interjects, \"You start acting like that Virge fella!\" \n\n\"I wouldn't if you weren't so goddamn difficult!\" Minnesota spits.\n\n\"Not the best idea to argue with people who have guns, sugar,\" Louisiana responds, pointing at her weapon.\n\n\"Oh yeah? You wanna try me?\" Minnesota points her weapon at her. Louisiana returns the gesture.\n\n\"Hey, I got guns too!\" Arkansas chimes in, smiling broadly as he points two assault rifles at Minnesota and Louisiana at the same time.\n\n\"Ooh, me too! Me too!\" Missouri shouts excitedly as they point their shotgun at Arkansas.\n\nEven the quiet Iowa points his gun in Minnesota's direction without even looking at her as he is reading some old book.\n\nWithin seconds, all five survivors are pointing their weapons at each other, ready to fire. Luckily, none of them are pointed at you, so what do you do? \n*choice\n    #Grab the popcorn!\n        *set cooperation 0\n        Unfortunately, you don't have that here, but that doesn't stop you from enjoying the escalation of their bickering.\n        \n        Until one of them finally fires… \n        \n        The room bursts into a loud skirmish as bullets fly everywhere, piercing the entire room!\n        *page_break Including your head…\n        *achieve mutineer\n        *check_achievements\n        *if (((((((((((((((((((((((((((((choice_achieved_firstdeath and choice_achieved_abyss) and choice_achieved_eliminated) and choice_achieved_timber) and choice_achieved_bloodonthesand) and choice_achieved_gotexploded) and choice_achieved_snakeeyes) and choice_achieved_sharkbait) and choice_achieved_lightning) and choice_achieved_hellfire) and choice_achieved_bangbang) and choice_achieved_exterminated) and choice_achieved_oceanwater) and choice_achieved_monstermadness) and choice_achieved_kamikaze) and choice_achieved_ivory) and choice_achieved_betrayal) and choice_achieved_rockbottom) and choice_achieved_frozen) and choice_achieved_shipwrecked) and choice_achieved_mutineer) and choice_achieved_hoosier) and choice_achieved_solesurvivor) and choice_achieved_castaway) and choice_achieved_laststraw) and choice_achieved_letitdie) and choice_achieved_fallguy) and choice_achieved_badluck) and choice_achieved_burnbabyburn) and choice_achieved_outsmarted)\n            *achieve alldeaths\n        [b]DEAD END[b]\n        \n        You've met with a terrible fate, haven't you? Try again and see if you can make it further! :)\n        *ending\n    #I convince them to stop!\n        *set cooperation 100\n        \"Guys! Guys!\" you shout, walking between them; a brave move considering there are at least five guns pointed in your direction now.\n        \n        \"Piss off, Maine! This doesn't concern you!\" Minnesota barks.\n        \n        \"Of course it does!\" you say, \"You are my pals! My comrades! My new home! I don't want to see you guys threaten each other for no good reason! Can't we just solve this without guns?\"\n        \n        \"Without guns? I don't like the sound of that!\" Arkansas moans, utterly disappointed.\n        \n        \"Shut up, Arkie!\" Minnesota hisses at him, \"Let Maine speak!\"\n        \n        \"It's okay!\" you say, trying to prevent another conflict, \"I get that we're all hungry; we've been through A LOT today, but we can figure it out like adults, can't we?\" \n        \n        *if mainegender = 1\n            \"They do have a point,\" Louisiana comments.\n            \n            \"Yay! Maine is so smart! They should be the new boss!\" Missouri exclaims.\n        *if mainegender = 2\n            \"She does have a point,\" Louisiana comments.\n            \n            \"Yay! Maine is so smart! She should be the new boss!\" Missouri exclaims.\n        *if mainegender = 3\n            \"He does have a point,\" Louisiana comments.\n            \n            \"Yay! Maine is so smart! He should be the new boss!\" Missouri exclaims.\n            \n        Minnesota and Arkansas exchange glances, than slowly put away their weapons. Iowa does too, never looking away from his book.\n        \n        Minnesota walks up to you, gives you an intense look, then grabs you in a tight bear hug, \"Oh, you're good!\" she yells, \"You should be the one in charge; I mostly just wanted to get away from Virge and the others, but I don't really have much of a plan      \n        \"You can never be too cautious in a place like this,\" she responds. \n        \n        \"I guess you're right,\" you admit, \"Thank you for keeping us safe.\"\n        \n        \"No problem, Maine,\" she smiles, \"Thanks again for helping us not to shoot each other, I appreciate it,\" she says and pats you on the back.\n        *page_break\n        After your little chat, you decide that it's time to go to bed as it is getting dark outside.\n        \n        \n        *goto mimalsleep\n    #I speak to Iowa\n        *set iowa +10\n        You find Iowa on the first floor, next to the partially collapsed bookshelf. He picks up one of the books and reads it with great interest.\n        \n        \"Look, I don't mean to interrupt but I just wanted to talk to you, if you don't mind,\" you say politely. \n        \n        Iowa puts the book back on the shelf and looks at the others. \n        \n        He did not respond, but did not tell you to go away either, so you proceed, \"I know we don't know each other at all yet; we don't even remember our own names, but I hope we can learn to trust each other,\" you say.\n        \n        Iowa pauses for a second, then shakes his head as he picks another book from the shelf.\n        \n        \"Look, I get it. I'm a complete nobody and suddenly I'm put in the position to be your leader, I'll be upset too, but I promise you that I will do my best!\" you say with true conviction.\n        \n        Iowa turns to you and looks deep into your eyes, as if looking into your very soul…\n        \n        \"Did you say something?\" he asks nonchalantly.\n        \n        Uh…\n        \n        \"No, sorry, just wondered if you have any books to recommend?\" you say, lying through your teeth.\n        \n        \"Well, I would, but I can't read,\" he says calmly.\n        \n        \"Wha..?\" you utter in sheer amazement. \n        \n        \"They're in French. I can't read French,\" he explains calmly.\n        \n        \"Oh, okay…\" you say and slowly walk away, deciding not to bother him any longer as he continues looking over the dusty books.\n        *page_break\n        After your little chat (if you can even call it that), you decide that it's time to go to bed as it is getting dark outside.\n        \n        \n        *goto mimalsleep\n    #I speak to Missouri\n        *set missouri +10\n        You find Missouri in their \"room\", which is just an empty space with lots of dust everywhere, which is par for the course in this house.\n        \n        Missouri is playing with some rocks they picked at the beach as you approach them.\n        \n        They jump to their feet when they notice your presence and give you a salute, \"Good evening, boss! It's an honor to be in your squad, boss!\"\n        \n        \"It's okay, we're all friends here,\" you reassure them. \n        \n        \"Of course, boss! You are my best friend, boss!\"\n        \n        You sigh, but decide not to press the issue.\n        \n        \"Are you.. why did you leave the other group?\" you ask, wondering how a kid got into this mess. \n        \n        \"No, boss, don't send me back!\" they plead, \"I won't let you down, honest!\" \n        \n        \"I.. okay,\" you say, not getting the answer you hoped for, \"I'm not going to send you back, Missouri, don't worry.\"\n        \n        \"Thanks, boss! You're the best!\" they smile.\n        \n        With that, you leave them be and exit the room.\n        *page_break\n        After your little chat, you decide that it's time to go to bed as it is getting dark outside.\n        \n        \n        *goto mimalsleep\n    #I speak to Arkansas\n        *set arkansas +10\n        You find Arkansas in the closet; the gun closet, to be exact, as he admires the numerous weapons lining the walls.\n        \n        \"Oh, hey!\" he turns to you and gives you a wide smile, \"These lovelies are so cute!\" he pats a few assault rifles next to him.\n        \n        \"They sure.. are?\" you say, trying to be polite. \n        \n        \"I call this one Lum, and this one is Abner!\" he points at the two guns, which look exactly the same to you.\n        \n        \"That's very sweet of you!\" you comment.\n        \n        \"It is?\" he looks at you with concern, \"My ma said that I shouldn't eat too much sweets, they make my teeth no good…\"\n        \n        \"No, I meant that it's nice of you to take care of them!\" you say, pointing at the guns, feeling like you're talking about kittens all of a sudden.\n        \n        \"Thanks! I thank yer pretty nice too!\" he beams and gives you a big hug. \n        \n        Oh dear…\n        *page_break\n        After your little chat, you decide that it's time to go to bed as it is getting dark outside.\n        \n        \n        *goto mimalsleep\n    #I speak to Louisiana\n        *set louisiana +10\n        You find Louisiana lounging outside on the house's porch. She used the only chair in the house to set up her resting spot, stretching her legs over the porch's railing.\n        \n        \"How are you feeling, darling?\" Louisiana addresses you in her sultry Southern drawl as you approach.\n        \n        \"I'm alright, just trying to get accustomed to the place,\" you admit.\n        \n        \"It'll be alright, I think..\" she pauses, \"I know the others may seem a bit.. much, but they aren't as bad as it appears at first glance.\"\n        \n        \"You're right, I just hope there won't be any more.. confrontations,\" you say. \n        \n        \"Aw, don't you worry your little pretty head! We've just all been under a [i]lot[/i] of stress lately, you know how it is,\" she explains.\n        \n        You sure do, and speaking of stress, you feel pretty exhausted at this point after all of the stuff that happened today.\n        *page_break\n        After your little chat, you decide that it's time to go to bed as it is getting dark outside.\n        \n        \n        *goto mimalsleep\n    #I don't speak to any of them; they're idiots.\n        *set egoism +10\n        You wisely decide not to waste your time on these people and focus on getting ready for bed as it is getting dark outside.\n        \n        \n        *goto mimalsleep\n*label mimalsleep\nYou get to your room, which is actually the largest one in the house (they wanted to reward you for being the new leader), though there isn't much to write home about as the room is completely empty, unless dust counts as something.\n\nYou bring a pile of palm leaves from the outside and set up something akin to a futon and lie down, staring at the holey ceiling above you. You can even see the stars through them! A little bit…\n\nThe leafy bed is not as comfortable as the bunk bed, but the view sure is better. Just how many stars are there? \n*if wenttocontrol = true\n    Yet, you cannot help but wonder what that letter you found in the bunker meant. Who is this \"D.C.\" person? Are they behind all of this? Why would the place contain nothing but that letter? Were you meant to find it? If so, why?\n    \nYou continue pondering this as the numerous southern constellations are in full view on the night's sky. You are not sure if you have ever seen it this clear before and you get a strange sense of connection to the stars, as if you and the others being stranded on this tiny island is reminiscent to the way humanity is stranded on Earth with no other lifeforms in sight. Although in your case, there has to be someone out there, right? \n*page_break Next Chapter\n*goto_scene fivestooges\n*label sleepytime\nYou explore the building further, but after searching to and fro without finding anything of interest, decide to go back outside and make your way back to the beach.\n*page_break\n*label tennes\n*set mettennessee true\nAs you get back, you see one of the survivors, a woman in her thirties or forties doing something with a bunch of twigs in the middle of the \"O\" of your makeshift \"SOS\" signal. \n\n\"If I know my camping essentials, this should work,\" the woman smiles at you. She has the \"Tennessee\" dog tag on her neck.\n\nIn a minute, the pile of twigs in front of her turns into a fire and the woman takes a seat in front of it, the other survivors follow suit. Some even carry something resembling food, which is mostly just leftover canned food from the bunker.\n\nYou and the others take seats around the fire and have yourselves a \"dinner\".\n*if savewisconsin = false\n    You explain what happened to the other survivors and the encounter with \"Wisconsin\". Yeah, it would be hard to sleep tonight…\n*if savewisconsin = true\n    You explain what happened to the other survivors and their mutiny. Hopefully, you wouldn't have to cross paths with them again.\n*if wenttocontrol = false\n    *page_break\n    Utah turns to you and hands you a file document, \"Here. This is what we've found at the bunker, take a look.\"\n    \n    You open it and look through its pages; there is a map of the United States with every state being marked with \"X\" and a piece of paper, which seems to be some kind of printed email, but some of its contents have been crossed over with black ink, making them impossible to read.\n    \n    The letter reads: \n    \n    [b]Our research confirms that [REDACTED] DNA could be used on the same subject, giving them various [REDACTED]. However, since there is roughly one [REDACTED] per fifty thousand people, the research is not to be taken without scrutiny.[b]\n    \n    [b]We have secured fifty subjects for this test, though I have to say it seems like a waste of time. We don’t need a bunch of [REDACTED] running around if all we need is their DNA.[b]\n    \n    [b]What are you planning, D.C.?[b]\n    \n    \"I think this 'D.C.' might be responsible for us being here,\" Utah comments.\n    \n    You rack your brain thinking over the file's contents. Why would they need your DNA? You do not recall anything particularly strange about your physical health. No chronic diseases or weird pathologies. The others don't seem like they are any different, so what's going on?\n*page_break\nYork, the young guy from New York, points at the night sky excitedly, \"Look! There's the Crux!\" he shouts.\n\n\"What?\" Al asks.\n\n\"The Southern Cross! It's a constellation. The fact that we can see it means we are likely in the Southern Hemisphere!\"\n\n“Cool, that only leaves about a half of the fucking planet for us to figure out where we are,” Jersey comments.\n\n\"Whoa, there's Polaris too! How could that be?\" York shouts again, this time more confused than excited.\n\n\"So we can view both?\" Utah inquires.\n\n\"We must be on or near the equator then!\" York concludes.\n\n\"And that means?\" Virge interjects.\n\n“We know that we’re not on the mainland US, or likely in another country entirely,” Utah explains.\n\n*if savekansas = true\n    “Yup, definitely not in Kansas anymore,” Florida jokes, giving Kansas a playful look. They do not react.\n    \n    \n\"Why would we be brought all the way here?\" Al asks.\n\nNobody responds, not knowing how to answer that question, and the conversation quickly shifts to figuring out who will be doing the shifts tonight. Luckily for you, you ended up not being one of the survivors who have to do it.\n*page_break\n*if savewisconsin = true\n    You think about the other group again, wondering how they are holding up without any supplies. What if they end up starving to death?\n    \n    As if on cue, you hear the muffled sounds of gunfire in the distance, which silence as rapidly as they began. Virge and Indiana run off to see what happened and return after a few minutes, saying that the other group died in a shootout, likely due to some kind of disagreement between themselves.\n    \n    As disturbing of a conclusion as that is, you can't help but feel tired and ready to go to bed. That said, you have an opportunity to talk to one of the other survivors if you want.\n*if savewisconsin = false\n    You and the others spend some more time next to the fire, before deciding to finally go to bed. That said, you have an opportunity to talk to one of the other survivors if you want.\n*choice\n    #I check up on Al.\n        *set al +10\n        You sit next to all, who is lulling Delaware to sleep. \n        \n        \"Today was… crazy,\" Al says.\n        \n        \"Yeah,\" you agree, \"I kind of miss South, even though I didn't know him.\"\n        \n        \"You know, I hoped that yesterday was the worst of it, but boy was I wrong!\" Al lets out a sad chuckle, \"What do we do if things get even worse? I'm not sure how I made it this far, and what about this child? If adults can barely make it, how can a little baby?\" he laments.\n        \n        \"I think Delaware will be fine as long as you're around to protect them. Plus, I would like to help as well, if you don't mind,\" you say.\n        \n        \"It would be nice to have some help, but you shouldn't put yourself in a tough position. The situation we're in is bad enough; it's no good for you to stress out about others,\" Al says, seemingly oblivious to his own altruism.\n        \n        \"Thank you, but I want to make sure you're both safe,\" you say, \"Tell me if you need any help, okay?\"\n        \n        \"Alright, thank you, Maine,\" Al smiles, putting Delaware into their makeshift bed made of palm leaves.\n        \n        You let the two rest and get back to your own spot.\n        *page_break\n        *goto underthestars\n    #I check up on Florida.\n        *set florida +10\n        You find her lounging on her leaves and staring at the sky with a content expression on her face.\n        \n        \"Hey, Maine, wazzup?\" she winks at you, noticing your presence.\n        \n        \"Just checking on you,\" you say. \n        \n        \"I'm good, really good, actually. Look at that sky!\" she comments, \"So nice to see it after the concrete ceilings all the time,\" she says, possibly referring to her life as a prisoner.\n        \n        \"I guess it's nicer than a prison,\" you say, \"But aren't we kind of like prisoners on this island?\" \n        \n        Florida frowns at your words, \"Yeah, maybe so, but it's more fun, at least. It would be cool to see how many folks manage to get out of here,\" she gives you a devilish smirk.\n        \n        \"Are you not worried about your own chances?\" you ask.\n        \n        \"Nope!\" she states, \"Life is short, you know? No point worrying about when it ends; you just gotta get as much fun out of it as you can, and get out when things get boring,\" she declares, punctuating the last word with a yawn.\n        \n        \"Interesting perspective,\" you say, not sure whether you agree or not.\n        \n        You wait for Florida to say something else, but hear snoring sounds coming from her instead. Guess she is a fast sleeper. \n        \n        You decide not to wake her and get back to your own spot.\n        *page_break\n        *goto underthestars\n    *if (kansasdies = false) #I check up on Kansas.\n        *set kansas +10\n        You walk up to Kansas, who is sitting by themselves staring at the ocean.\n        \n        \"Hey,\" you say.\n        \n        They look up at you and say, \"The stars here look a lot like they did back home, just the constellations are different.\"\n        \n        \"Yeah, I miss home too,\" you say. \n        \n        \"I don't,\" Kansas says bluntly, \"There wasn't anything worthwhile there.\"\n        \n        \"Where would you rather be?\" you ask. \n        \n        Kansas thinks for a moment, than responds, \"I don't know, but I would like to see what is out there.\"\n        \n        \"Yeah, the world is a big place, I wouldn't mind being pretty much anywhere else right now,\" you say.\n        \n        Kansas doesn't say anything else and you two enjoy the gorgeous night sky together, before you finally decide to go to bed.\n        *page_break\n        *goto underthestars\n    #I check up on Jersey.\n        *set jersey +10\n        \"Hey, what's up?\" you say as you approach Jersey, who is looking at his newly acquired gun with great interest. \n        \n        \"Ah, hey, you need something?\" he says, without turning in your direction.\n        \n        \"Just wondered how you are doing,\" you admit.\n        \n        \"The shit sucks, what else is there to say?' he responds, \"At least now we have some way to defend ourselves and maybe this whole SOS thing works out, though I wouldn't get my hopes up.\"\n        \n        \"It's got to work, right?\" you say.\n        \n        Jersey doesn't respond and looks at the gun, the says, \"Damn, a real gun is way heavier than I thought. I have a couple of prop ones, but they are just for show.\"\n        \n        \"What for?\"\n        \n        \"Needed them for a movie,\" he explains.\n        \n        \"A movie?\" you ask.\n        \n        \"Yeah,\" he sighs and looks at the sky, \"I've always wanted to make movies, you know. Never thought I'd end up in one.\" \n        \n        \"Yeah, I feel that I can relate to horror movies more now,\" you joke.\n        \n        \"Yup,\" he nods, \"I bet the sick fuck who put us here has some hidden cameras everywhere. If you want to watch a movie so much, go do that and go fuck yourself in the meantime!\" he shouts in the direction of the trees, as if there is a secret camera there. Then again, who knows?\n        \n        \"Anyway, nice talking to ya,\" he gives you a smile, \"I'm gonna crush for now, good fucking night.\"\n        *page_break\n        *goto underthestars\n    #I check up on Utah.\n        *set utah +10\n        You walk up to Utah, who is massaging her forehead in concentration.\n        \n        \"Are you okay?\" you ask, worried for her health.\n        \n        \"I can't figure out why they would need our DNA and what does that have to do with us being stuck on this island? It just doesn't add up,\" she says.\n        \n        \"Maybe us being here is some kind of accident? An experiment gone wrong or such?\" you suggest, not sure whether you believe in that theory yourself.\n        \n        \"Like we were some test subjects and ended up shipwrecked on the way to our destination?\" Utah ponders out loud, \"No chance. Why would there be that conspicuous letter then? It's either an intentional clue or some bizarre mishap on the part of the kidnapper,\" she concludes.\n        \n        \"Well.. I'm sure we'll find out the truth soon,\" you say.\n        \n        \"Maybe, though by that point we might all be dead,\" Utah says grimly.\n        \n        You pause, thinking her words over. \"Remember what South said? 'Don't lose hope or you ain't making it out', or something like that,\" you say, \"I think he might've been onto something.\"\n        \n        \"And how did that.. \" Utah pauses and takes a deep breath, \"No, you're probably right. We need to stay positive. We should try, at least.\"\n        \n        Your conversation ends there as Utah prepares to go to bed and you return to your own spot.\n        *page_break\n        *goto underthestars\n    #I keep to myself.\n        *set egoism +10\n        You don't feel like talking to others, so you rest on your own. However, your solitude is interrupted when another survivor approaches you. It's Indiana.\n        \n        \"Not interested,\" you tell him coldly.\n        \n        \"I know, you prefer to keep to yourself. That's why I wanted to talk to you,\" he replies in a friendly voice.\n        \n        \"What do you want?\" you ask, getting more and more annoyed with this guy.\n        \n        \"A partnership,\" he says as he sits on the leaves next to you, \"I think we both know that we won't all make it alive out of here.\"\n        \n        \"So?\" \n        \n        \"I believe whoever is behind all ight's sky. You are not sure if you have ever seen it this clear before and you get a strange sense of connection to the stars, as if you and the others being stranded on this tiny island is reminiscent to the way humanity is stranded on Earth with no other lifeforms in sight. Although in your case, there has to be someone out there, right? \n*finish\n", "totalrecall": "*set trueself true\nThis place… \n\nYou know where you are, right?\n\nYou are..?\n\nYou are… Oblivion..\n\nYes! That's it! \n\nYou are Oblivion; you are an augmented individual with the ability to erase the memories of others!\n\nAnd your own too…\n\nYou were a supervillain and.. they captured you and many other augmented for.. some kind of.. experiment?\n\nYou have to get out!\n*page_break YOU MUST GET OUT!!!\n\"What's that?!\" someone shouts, pointing at the ocean behind you. \n\nYou turn and see a massive wave, must be at least fifty feet in height, emerge on the horizon and move towards you.\n\n\"You are all augmented!\" you shout to the others, \"One of you must have caused this by mistake, you can stop it!!!\" you yell even louder. \n\n\"What?\" an old man with \"Virginia\" dog tag looks at you puzzled, but seems to start remembering something.\n\n\"I.. I think I might have caused it,\" a young girl speaks up, her dog tag reads \"Hawaii\".\n\n\"You can stop it! Just concentrate!\" you tell her.\n\nShe hesitates, but nods in agreement and faces the upcoming wave. \n\nThe others stand dumbfounded, but strangely, do not attempt to escape.\n\nThe girl concentrates, but nothing seems to happen as the giant wave is still moving towards you at the same speed. \n\n\"You can do it!\" you shout again, your voice sounding more certain than you actually are. \n\nThe girl concentrates even harder as the wave is mere feet away from you and the others now…\n*page_break It freezes!\nThe giant wave of tsunami stands still as if on pause button, though you can see some drops of water dripping from it.\n\n\"Whoa. an try..\"\n\n\"You can do this!\" you reassure her, \"Just try to concentrate.\"\n\nThe girl closes her eyes and points her arms toward the ocean, she then slowly moves her arms sideways, as if opening a curtain.\n\nAnd the sea responds!\n*page_break\nIn a scene straight out of a mythical epoch, the water splits into two separate pools, leaving a narrow slip of nothing in-between, as if there is an invisible wall where the water should be.\n\nThe others stare in awe, but you know that you do not have that much time, \"Let's go!\" you shout, beckoning them to follow. \n\nThe girl from Hawaii opens her eyes and continues to concentrate on the water, while also slowly following behind you.\n\nYou enter the rift between the masses of water, hoping that Hawaii's concentration will not falter. Otherwise, you will all likely be crushed by the tons of liquid.\n\n\"How the fuck do you know so much about all of this?\" a young man with \"New Jersey\" dog tag addresses you as you walk ahead. \n\n\"I'll explain later,\" you say and lead the crowd towards the other side.\n\nAs you walk through the bottom of the lagoon, you can sea fish swimming on either side of the rift. Wait, was that a shark?\n*page_break\nAfter a tense walk through the lagoon, which took a good thirty minutes or so, you finally manage to get back to the surface on the other side of the atoll.\n\nHawaii drops the pools of water back and faints from exhaustion. Thankfully, the man with \"Nebraska\" dog tag catches her in time and carries her in his arms.\n\nYou see the thing you were trying to get to: a large ship, which brought all of you here. You remember what they told you when you were aboard it; \"Wipe their memories out; names, augmentations, anything that may proof dangerous.\" \n\nYou did what they said, but not anymore. You won't let them control you any longer!\n\n\"Whoa, dude! That thing is huge!\" the man with \"West Virginia\" dog tag whistles at the sight. \n\n\"Hey, it's called Hawaii!\" the young man from \"New York\" points at the large \"USS HAWAII\" letters written on the ship's side.\n\nNebraska man looks at the girl from Hawaii he is still carrying in his arms, \"Must be yours, huh?\" he jokes. Hawaii girl smiles as she recovers from her ocean-parting feat.\n\n\"How did you know about this?\" the woman with \"Utah\" dog tag addresses you, as you board the ship.\n\n\"I remember when I was brought there, we were all brought here on this ship,\" you explain.\n\n\"Yeah, I think I'm starting to remember,\" the man with \"Alaska\" dog tag comments, scratching his head, \"How could we forget?\"\n\n\"It was me,\" you admit, \"My power erases the memories of others. I was kidnapped just like all of you, but they gave me an ultimatum to erase all of our memories in exchange for freedom,\" you explain.\n\n\"What?!\" several voices exclaim at the same time.\n\n\"Why should we trust you then?\" the man with \"Idaho\" dog tag eyes you with suspicion. \n\n\"I..\" you begin, but are interrupted when another survivor yells, \"What's that?!\" and points at the sky ahead.\n*page_break It's them...\nThree black helicopters are flying towards you. You doubt they would be interested in negotiation, so you have to stop them! \n\n\"Is that rescue?\" the man from Alaska says hopefully. \n\n\"Nope,\" you say, \"They want to eliminate all of the witnesses. Prepare to fight.\"\n\n\"What?! How do we do that?\" the man exclaims.\n\n\"I got this,\" the woman with a face tattoo and \"Florida\" dog tag steps forward, cracking her knuckles. \n\nShe points her hands in finger guns gesture at the two helicopters in the front, then…\n*page_break ZAP!!!\nTwo bright lightning bolts shoot out of her fingers and pierce the two helicopters, which start careening towards the ground before crashing into the water. \n\n\"Whoa…\" the man from Iowa utters.\n\n\"Look out!\" the woman from Alabama shouts, pointing at a soldier with a grenade launcher hanging out of the remaining helicopter. \n\n\"May I?\" the woman from Utah steps forward and points her hand at the helicopter, which starts falling apart mid-air, raining its metallic parts all over the ocean and sending the grenade launcher guy falling towards the water below.\n\n\"Damn! Good job!\" the guy from Jersey whistles approvingly.\n\nWith the helicopters taken care of, you breathe a sigh of relief as your ship continues its course through the ocean.\n*page_break Until…\n\"I.. I can't let you go..\" you hear a faltering voice from behind and see a timid-looking young woman with the \"California\" dog tag looking at you.\n\n\"What do you mean?\" you ask as the others gather around you two.\n\n\"I.. I'l have to destroy the ship.. Unless you turn back..\" she puts her arms to the sides and you feel the entire ship rising out of the waters. It's flying?!\n\n\"What the fuck are you doing?!\" the man from Jersey shouts, barely able to stand from the sudden jolt of the ship.\n\n\"They… they told me to put you there..\" the woman speaks in a quiet voice, \"It's the same with you, isn't it?\" she looks you in the eyes, \"They made you do it.\"\n\nShe put you there? You remember seeing a bunch of metallic rubble strewn about the beach when you woke up, was it her doing? With that and what's happening to the ship.. Can this girl manipulate metal?\n\n\"You don't have to listen to them any longer!\" you yell as the ship starts flying in the direction you came from. \n\n\"Should I zap her?\" Florida turns to you, finger guns ready. \n\n\"No!\" you shout at her, then turn to the girl, \"Look, whatever they told you, you don't have to listen to them! I mean, they left you on a deserted island to die, they don't care about you!\" \n\n\"I know.. But.. they said they will kill my family if I don't listen to them..\" the girl admits, tears flowing from her eyes.\n\n\"We won't let them!\" you shout, \"We will make sure they are safe, I promise!\"\n\nThe girl hesitates, which is punctuated with the ship's sudden halt mid-air, which almost causes you to fall over. \n\n\"I.. I don't know what to do…\" she puts her hands to her face, wiping the tears away as the ship falls back down, making a large splash. \n\nThankfully, the girl from Hawaii is quick to get the water off the deck, though you are all now soaking wet.\n\n\"We'll make those bastards pay, alright?\" the man from Jersey addresses the girl, patting her on the back. \n\nShe doesn't respond, but slowly nods in agreement.\n\nWell, that was something…\n*page_break\nYou set the ship's course back away from the island, sailing in the northeastern direction.\n\nYou look at the picturesque sunset as the old man with \"South Carolina\" dog tag walks up to you and pats you on the shoulder, \"I don't know who ya are, but ya saved us all today. I know it ain't much, but I thank you.\"\n\n\"I did what I had to do,\" you admit.\n\n\"So.. where do we go now?\" the man from Alaska asks, turning to you.\n\nYou turn towards the open ocean ahead and simply say..\n*page_break \"Home.\"\n*achieve totalrecall\n*goto_scene finalscreen"}};
