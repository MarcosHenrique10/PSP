slept. Should be enough for all of us,\" he comments.\n\nAs you look around the bunk beds, hoping to find something in the storage containers next to them, the door at the end of the room opens and in come the other survivors, the ones who went the other way. \n\n\"We found some supplies back there,\" South is the first one to speak.\n\n\"Supplies!\" Florida yells jokingly as she downs a can of something edible. At least you assume it's edible.\n\n\"Good, this will be our stay for the night, we'll figure out what this place is tomorrow,\" Virge declares.\n\n\"Why not now? Do you wanna be stuck in this pile of garbage for hours?\" Jersey objects. \n\n\"This place is dangerous,\" Virge responds, \"Better take it slow for now, we've already lost some people.\"\n\nJersey sighs, \"Yeah, we got into some crazy shit on the way here too.\" \n\nIndeed, you notice a couple of people missing from their group. What is wrong with this place?!\n\nWith that, the mood in the room becomes even heavier than before. Everyone starts silently walking around and choosing beds to occupy. Only Florida's loud munching can be heard.\n*page_break\n*goto endofdayone\n*label rebelteam\nYou decide against following Virge and instead follow the only other available way, which is another staircase on the other side of the room. You are joined by a dozen more people, including the angry guy from New Jersey and the scary-looking girl from Florida. Unlike the other group, this one doesn't seem to have an obvious leader. \n\nYou go down the staircase, which circles downwards in an elevator shaft-like room until you get to the bottom. \n*page_break\nYou find a large circular room, the floor of which seems to have deteriorated so much with time that parts of it have fallen through, revealing a deep vertical tunnel going downwards. It almost looks like a shaft for some kind of huge rocket or a missile, and knowing that you are in some sort of abandoned military facility, it could very well be the case. \n\nYou can make out another door at the end of this room.\n\n\"We should head back, I have a bad feeling about this place,\" South comments.\n\n\"We can make it through if we're careful, just don't step on the edges,\" the big guy from Nebraska reassures him.\n\nYou and the others start crossing carefully as you hear the screeching of the metallic floor under your feet.\n*choice \n    #I proceed forward.\n        *goto silo\n    #I turn back.\n        You decide to go back to the entrance, but as you turn around the metallic screeching underneath you gets even louder. \n        \n        You freeze in place on instinct and the floor gives way under you. You let out a confused yelp as you fall towards the abyss below.\n        *page_break Whoops…\n        *achieve abyss\n        *check_achievements\n        *if (((((((((((((((((((((((((((((choice_achieved_firstdeath and choice_achieved_abyss) and choice_achieved_eliminated) and choice_achieved_timber) and choice_achieved_bloodonthesand) and choice_achieved_gotexploded) and choice_achieved_snakeeyes) and choice_achieved_sharkbait) and choice_achieved_lightning) and choice_achieved_hellfire) and choice_achieved_bangbang) and choice_achieved_exterminated) and choice_achieved_oceanwater) and choice_achieved_monstermadness) and choice_achieved_kamikaze) and choice_achieved_ivory) and choice_achieved_betrayal) and choice_achieved_rockbottom) and choice_achieved_frozen) and choice_achieved_shipwrecked) and choice_achieved_mutineer) and choice_achieved_hoosier) and choice_achieved_solesurvivor) and choice_achieved_castaway) and choice_achieved_laststraw) and choice_achieved_letitdie) and choice_achieved_fallguy) and choice_achieved_badluck) and choice_achieved_burnbabyburn) and choice_achieved_outsmarted)\n            *achieve alldeaths\n        [b]DEAD END[b]\n        \n        You've met with a terrible fate, haven't you? Try again and see if you can make it further! :)\n        *ending\n*label silo\nYou carefully walk forward on the screeching metal and manage to make it to the center of the room safely.\n\nThen all hell breaks loose…\n\nThe floor behind you collapses, separating you from where you came from as the rest of the floor starts falling behind you.\n\n\"RUN!!!\" Jersey shouts on top of his lungs.\n\nYou and the others dash forward towards the exit as the floor behind you collapses completely. \n\nThe girl with the face tattoo, Florida, jumps from one exposed beam to another, seemingly unfazed by the horror as she's laughing like it's some sort of game or something.\n\n\"What the hell are you doing, you crazy bitch?!\" Jersey shouts at her.\n\nYou get to the exit as quickly as possible while jumping over the gaps that start appearing in the floor ahead. You hear a loud scream behind you which quickly gets quieter. You decide not to look back and finally make it to the exit.\n\n\"Man, this place sucks more shit than a fucking vacuum cleaner made of feces!\" Jersey exclaims, always the eloquent one.\n\nYou look back at this horrid room and now that the floor is gone, it really does look like some kind of giant vertical tunnel or a missile silo. You can't make out the bottom and you feel relieved, considering that one or two people definitely fell down just seconds ago.\n\n\"Let's get the fuck out of here,\" Jersey storms out of the room and you and the others follow him, not having much of a choice.\n*page_break \nYou walk through an empty looking hallway lined with doors, most of which are locked, but you eventually manage to locate one that isn't and it turns out to be some kind of small warehouse. You go through the various boxes stacked against the walls and discover hundreds of canned foods in them.\n\n\"Yummy!\" Florida comments jokingly and slams the can into the wall, making a dent in it and starts slurping its contents with a content expression. \n\n\"It could have expired, you know,\" Jersey comments, though Florida ignores his concerns.\n\n\"Well, it ain't much, but at least we shouldn't starve now,\" South comments, picking up a box full of canned food.\n*page_break\n*set calided true\nYou proceed further into the hallway and reach a huge room with dozens of bunk beds lining the walls. Virge and the others are already looking around the room as they notice your arrival.\n\n\"We found some supplies back there,\" South is the first one to speak.\n\n\"Supplies!\" Florida yells jokingly as she downs another can of something edible. At least you assume it's edible.\n\n\"Good, this will be our stay for the night, we'll figure out what this place is tomorrow,\" Virge declares.\n\n\"Why not now? Do you wanna be stuck in this pile of garbage for hours?\" Jersey objects. \n\n\"This place is dangerous,\" Virge responds, \"Better take it slow for now, we've already lost some people.\" \n\nIndeed, you notice a couple of people missing from their group, including that girl from California. What is wrong with this place?!\n\nJersey sighs, \"Yeah, we got into some crazy shit on the way here too.\"\n\nWith that, the mood in the room becomes even heavier than before. Everyone starts silently walking around and choosing beds to occupy. Only Florida's loud munching can be heard.\n*page_break\n*goto endofdayone\n*label endofdayone\nAfter looking around the barracks for any remaining items (which you don't find), you and the others get some food from the supply room, which consists of various kinds of canned foods and army rations.\n\nYou get yourself something that resembles a stew in a can. It's actually not too bad! Then again, hunger is the best condiment, as they say. \n\nYou feel a bit awkward eating by yourself, so you decide to join one of the other survivors:\n*choice\n    #I join Al.\n        *set al +10\n        You sit next to Al, who is preoccupied with giving baby \"Delaware\" some food from the can. It looks like some kind of puree.\n        \n        \"Oh, hey!\" he looks up at you, \"Sorry, I managed to find some food which looks like it should be okay for an infant to eat. Surprised there was one at all here.\" \n        \n        \"It's nice of you to take care of them,\" you comment.\n        \n        \"I guess. I was hoping one of the others is their parent or relative, but it doesn't seem like it. Not sure what to do with them now. I've never dealt with children before, but it feels wrong to just leave them be,\" he sighs.\n        \n        \"Hopefully we'll find their family as soon as we get out of here,\" you reassure him. \n        \n        He gives you a warm smile and gets back to feeding Delaware. You decide not to bother him any further.\n        *page_break\n        *goto endofchapterone\n    #I approach Florida.\n        *set florida +10\n        As you approach her, you hear Virge address her, \"So what's with the get-up?\" he points at her orange jumpsuit. \n        \n        \"Not my color, but it goes well with my eyes, don't you think?\" she jokes. \n        \n        \"Cut the crap! What were you in for?\" Virge presses on. \n        \n        \"Couple of arsons, a few robberies, a theft of an elephant, once. The usual,\" Florida announces with pride. You're not sure whether she is serious or not.\n        \n        \"I'm watching you,\" Virge gives her a stare and walks away, almost knocking you off your feet as he passes by.\n        \n        \"Hey there,\" Florida winks at you, \"If you want my stew, I ain't sharin'!\" she jokes, showing you her emptied can. \n        \n        \"Thanks, I'm good,\" you respond, \"How are you holding up?\"\n        \n        \"Well, it's more fun than being in prison, that's for sure,\" she gives you a toothy grin.\n        \n        \"Even with all the…\" you begin, searching for the right words.\n        \n        \"The deaths? Oh, they are the best part!\" Florida adds without a hint of sarcasm. You feel cold sweat appear on your back. Is she for real?\n        \n        You decide not to press the matter further and leave her be, seeing that she's already done with her food anyway.\n        *page_break\n        *goto endofchapterone\n    #I sit next to Kansas.\n        *set kansas +10\n        You approach them as they are eating their canned food calmly, seemingly unperturbed by the goings-on around them.\n        \n        \"Hi, can I join you?\" you ask politely.\n        \n        Kansas looks at you without an obvious expression and simply says, \"Sure, whatever.\"\n        \n        You take a seat next to them and start eating your food as well, occasionally looking at them, expecting some kind of comment or question, but they simply continue eating without acknowledging your presence.\n        \n        \"You seem to be taking the whole situation fairly well. What's your secret?\" you ask, not sure whether it was a rude question or not.\n        \n        \"I don't care,\" they say. You look for a sign of a joke in their facial expression, but there is none.\n        \n        \"I see. That's pretty useful,\" you comment. \n        \n        They continue on, ignoring your attempts at dialogue. You finish your food and decide to leave them be. Baby steps, I suppose…\n        *page_break\n        *goto endofchapterone\n    #I get closer to Jersey.\n        *set jersey +10\n        \"Fuck!\" you hear him yell as he throws his food can on the floor and kicks it away for good measure. \n        \n        \"Not a fan of stew?\" you joke.\n        \n        \"What?\" he turns to you, \"We should be out there trying to find the way out of this shithole, not just sticking around here like it's some fucking sleepover!\" he yells. \n        \n        \"We''ll find the way out. Tomorrow,\" you reason.\n        \n        Jersey sighs, \"I know, I know. This whole mess is just… I don't like it.\" \n        \n        You nod in agreement and decide to leave him be as Jersey starts cleaning up the floor.\n        *page_break\n        *goto endofchapterone\n    #I take a seat next to Utah.\n        *set utah +10\n        You approach the young woman who stares at her notepad intently. She barely touched her food. Utah notices you approach and gives you a pained smile, \"Hi.. Do you need something?\" \n        \n        \"Sorry, just wanted to check up on you,\" you admit.\n        \n        \"Ah, don't want to lie, I've had better days,\" she says, \"We've already lost \n        *if savewisconsin = false\n            twelve \n        *if savewisconsin = true\n            eleven\n        people today and we've only been awake for a few hours,\" she puts her hands on her face and breathes deeply.\n        \n        *if savewisconsin = false\n            \"Twelve?! Really?\" you ask dumbfounded. \n        *if savewisconsin = true\n            \"Eleven?! Really?\" you ask dumbfounded.\n        \n        Utah hands you her notepad, which is covered in state names, which you assume are the names of the survivors. \n        \n        \"To be fair, I don't remember how many people were at the beach exactly, but seeing that we all have different states, I'm guessing there are fifty of us,\" she explains, \"Four people died inside the bunker, and there are thirty \n        *if savewisconsin = false\n            eight \n        *if savewisconsin = true\n            nine \n        of us left alive, though probably not for long..\"\n        \n        \"We'll make it out of here. We have to,\" you reassure her.\n        \n        \"I get what you're trying to do and I appreciate it, but let's be real; the odds of us making it out of here are miniscule. Whoever is responsible for us ending up here made sure to take any way of escape away from us,” Utah concludes.\n        \n        \"Do you think someone brought us here on purpose?\" you ask.\n        \n        \"Think about it; we've lost our memories, we all have these tags on us and we're in the middle of some abandoned death trap. Sounds like too much to be a coincidence, no?\" she responds.\n        \n        You want to say something more reassuring, but you can't offer anything, so you decide to leave her be for now.\n        *page_break\n        *goto endofchapterone\n    #I eat alone anyway.\n        *set egoism +10\n        *set metidaho true\n        You decide to stay on your own and eat alone. Most people seem to be doing the same, either out of distrust towards others or a faint hope that they wouldn't need to get to know the others if they will be rescued soon.\n        \n        Speaking of distrust, you witness a confrontation between the guy in the fancy suit, Washington, and some man in his forties, whose dog tag reads \"Idaho\".\n        \n        \"Are you insane?\" Washington shouts, flabbergasted.\n        \n        \"Yeah, keep pretending!\" the Idaho man says, pointing a finger at him, \"You are one of the freaks behind this, aren't ya? I know you rich billionaire types!\" \n        \n        \"I almost died too! What are you saying?\" Washington exclaims, raising his arms in frustration.\n        \n        \"You sick bastards enjoy all kinds of weird shit. You probably got too bored from all the money you've never earned!\" the man continues.\n        \n        At this point, South walks up between the two men and turns to Idaho, \"Ain't nice to accuse people for no reason, boy. Whoever is behind this would love to see us all at each other's throats; let's not let them have that pleasure, ya hear?\"\n        \n        Idaho sighs and gives Washington an accusatory look before returning to his bunk bed. Washington crosses his arms in frustration, but doesn't say anything and gets back to his food.\n        \n        Well, the fun is over, it seems…\n        *page_break\n        *goto endofchapterone\n*label endofchapterone\nAfter your \"dinner\" you and the others prepare for the night, though you are not sure whether it's actually nighttime outside as there are no windows here. \n\nYou take one of the bunk beds and try to go to sleep, which is far harder than you expected, and you expected it to be hard. How can one sleep in a situation like this? You are stuck on an island god knows where with a bunch of people you don't know in an abandoned army facility which is filled with deadly traps! \n\nSeveral people have already died today. Will you be next? You feel somewhat lucky for surviving, but then again, perhaps the ones who died already are the lucky ones?\n*choice\n    #I feel desperate. How can I possibly get out of here alive?\n        *set hope -10\n        As bad as your current predicament is, you get a nasty feeling in your gut that it's about to get a whole lot worse.\n        \n        \n        *goto niftyend\n    #The situation is dire, but I'm sure we'll find a way out of this mess!\n        *set hope +10\n        You know what they say; hope dies last. The question is; will you too?\n        \n        \n        *goto niftyend\n*label niftyend\nThis whole situation just feels so unreal. Could it all just be some twisted nightmare your tired brain has conjured up? Maybe you are in a coma and this is just a hallucinations of your delirious brain? Sounds far-fetched, but seems far more plausible than being put here by some unknown entity, right?\n\nAs you ruminate on that, you can hear muffled cries coming from the other bunk beds. It seems you're not the only one having a hard time sleeping tonight. \n\nSomehow, the notion that people around you are struggling too gives you a brief sense of belonging and it helps you fall asleep.\n*gosub trial_end\n*finish\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n    *label purchased\n    *return\nRemember earlier how we told you that the first two chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n    *subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2021-06-10 $3.99 $2.99 purchased\n*abort\n\n", "finalscreen": "*check_achievements\n*if (((((((((choice_achieved_albadend and choice_achieved_algoodend) and choice_achieved_floridabadend) and choice_achieved_floridagoodend) and choice_achieved_kansasbadend) and choice_achieved_kansasgoodend) and choice_achieved_jerseybadend) and choice_achieved_jerseygoodend) and choice_achieved_utahgoodend) and choice_achieved_utahbadend)\n    *achieve allendings\n[b]The End![b]\n\nCongratulations on making it this far! \n\nHave you gotten a Good Ending yet? Learning more about the island may reveal more than just its secrets, it may even get you a \"better\" outcome.\n\nI hope you enjoyed the game and I sincerely thank you for playing it! ^_^\n\n*page_break End\nWe hope you've enjoyed playing [i]Fifty.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "fivestooges": "[b]Chapter 2.5: Five Stooges of Grief[b]\n\n[b]Survivors: 30[b]\n    \nThe dawn of the third day arrives as the rays of sunshine wake you up with their brightness through the holey ceiling of the abandoned house. Well, formerly abandoned, that is.\n\nYou enjoy a few moments of ignorant bliss before it dawns on you that nearly a half of the people who ended up on this forsaken island with you are now dead. Not only that, you have chosen to separate yourself from the main group and joined a group of rebels, managing to somehow become their leader in the process.\n\n\"Good morning, boss!\" Missouri greets you with a wide smile, \"What are we going to do today?\"\n\nThe top priority right now is to get some food, you think.\n*page_break\nYou get up and walk downstairs, where the others already await you with their guns, ready for action.\n\n\"Alright, let's get those suckers' supplies!\" Minnesota grins, referring to the other group of survivors.\n\n\"Yay! Food!\" Arkansas and Missouri both celebrate excitedly.\n\nYou are hungry enough that raiding the other group and stealing their food doesn't sound like a bad idea, but you're hoping you will be able to just, well, ask them to give you some. \n\nYou and your squad walk out of your home base and make your way to the beach.\n*page_break\nHowever, whatever your plan was, it didn't account for the possibility of them missing as their beach \"camp\" stands empty. The only remainders of their presence are the giant \"SOS\" sign made of palm leaves and the extinguished bonfire. \n\n\"My my!\" Louisiana speaks, \"The other fellas plum disappeared somewhere! Where did they go?\"\n\n\"Huh, maybe Virge was smart enough to know they shouldn't mess with us, so they fleed!\" Minnesota belly laughs.\n\n\"Whoa! Is that true, boss!\" Missouri turns to you, wide-eyed.\n\n\"Uhm..\" you begin, but are cut off when Arkansas yells, \"Aww. there's nothing in here!\" \n\nYou find him rummaging through an apparently empty supply crate, which some survivors brought out here yesterday, salvaging it from the bunker before it went kaboom.\n\n\"Guess we'll have to get the food the hard way,\" Minnesota comments, gripping her weapon.\n\n\"We'll eat each other?\" Iowa asks, sounding serious.\n\n\"What?! No! I meant hunting, you idiot! Are you crazy?\" Minnesota looks at him with disbelief.\n\n\"Ah, that works too,\" he nods.\n\n\"Hey, boss! What's that?\" Missouri points in the hill's direction.\n\nYou look where they're pointing and see a strange pinkish glow coming from behind the fallen trees on the hill, near where the bunker once stood. \n\n\"Let's check it out,\" you say, sounding all leader-like. Sick!\n*page_break\nYou cautiously go up the hill and hide behind the fallen palm trees as you witness a bizarre scene:\n\nSeveral flying machines are hovering around the dead bodies left from the explosion yesterday. They look like drones, but have strange tentacle-like attachments on them. \n\nThe strange pink light you saw earlier is emitting from one of them as it points it at a dead body beneath it, and you are shocked to see it disintegrate into nothingness within seconds, leaving no traces of it ever being there.\n\nAnother drone flies to a different body and pricks the corpse with its tentacle-like appendage and seems to be drawing blood from it. After completing the procedure, it too shines the bright pink light on the body and it dissolves into nothing like the other one before. \n\n\"What the hay are these tin cans doing?\" Louisiana comments.\n\n\"Whatever it is, we gotta stop them!\" Minnesota responds and shoots one of the drones, before you can even attempt to stop her.\n*page_break Oh boy...\nThe bullet bursts through the drone and it falls to the ground, while the others instantly turn in your direction.\n\n\"Let me at 'em, boss! Let me at 'em!\" Missouri yells, excitedly clutching their shotgun as the drones fly towards you.\n\nYour fellow companions start shooting at them, trying to defend themselves. You follow suit, as it's clearly too late for dialogue.\n\nHowever, the drones learned their lesson as they avoid your shots with extreme precision, utilizing the environment for cover as well as their flight advantage.\n\nYou and your squadmates manage to down most of them, but the two remaining drones succeed in ambushing you from two separate sides as they shine their bright pink lights on you…\n*page_break Yikes!\n*achieve exterminated\n*check_achievements\n*if (((((((((((((((((((((((((((((choice_achieved_firstdeath and choice_achieved_abyss) and choice_achieved_eliminated) and choice_achieved_timber) and choice_achieved_bloodonthesand) and choice_achieved_gotexploded) and choice_achieved_snakeeyes) and choice_achieved_sharkbait) and choice_achieved_lightning) and choice_achieved_hellfire) and choice_achieved_bangbang) and choice_achieved_exterminated) and choice_achieved_oceanwater) and choice_achieved_monstermadness) and choice_achieved_kamikaze) and choice_achieved_ivory) and choice_achieved_betrayal) and choice_achieved_rockbottom) and choice_achieved_frozen) and choice_achieved_shipwrecked) and choice_achieved_mutineer) and choice_achieved_hoosier) and choice_achieved_solesurvivor) and choice_achieved_castaway) and choice_achieved_laststraw) and choice_achieved_letitdie) and choice_achieved_fallguy) and choice_achieved_badluck) and choice_achieved_burnbabyburn) and choice_achieved_outsmarted)\n    *achieve alldeaths\n[b]DEAD END[b]\n\nYou've met with a terrible fate, haven't you? Try again and see if you can make it further. :)\n*ending\n", "fivews": "[b]Chapter 5. The Five Ws[b]\n*check_achievements\n*if choice_achieved_ubermensch\n    *set cangoodend true\n\n[b]Survivors: Maine[b]\n*if aldies = false\n    [b], Al , Delaware[b]\n*if floridadies = false\n    [b], Florida[b]\n*if kansasdies = false\n    [b], Kansas[b]\n*if jerseydies = false\n    [b], Jersey[b]\n*if utahdies = false\n    [b], Utah[b]\n\nYou wake up, but struggle to find a reason to get up. What's the point? The horror of yesterday flashes before your eyes over and over again like an endless movie of despair. \n\nSo many people have already died, and you are going to be next, so what's the point of wasting time getting up, eating, breathing? \n\nJust end it already, whoever is behind this!\n*choice\n    #I find a modicum of hope and get up.\n        *if (hope \u003c= 90)\n            *set hope +10\n        Despite everything you have been through and anything you might have to go through, there is a small part of you which still believes you can get out of this mess. And hey, at least you're not alone!\n        \n        You get out of bed, put on your clothes (which are quite disgusting after all the crazy shit you've been through) and go downstairs.\n        *page_break\n        *goto fighton\n    #I feel completely devastated.\n        *if (hope >= 10)\n            *set hope -10\n        *if (hope \u003c= 10)\n            *set hope 0\n            You cannot bear dealing with this bullshit any longer… \n            \n            Your hand searches behind your pillow for the gun you've kept from yesterday and pulls the pistol out. \n            \n            You slowly put it against your temple as you stare at the empty white ceiling above.\n            *page_break You pull the trigger.\n            *achieve laststraw\n            *check_achievements\n            *if (((((((((((((((((((((((((((((choice_achieved_firstdeath and choice_achieved_abyss) and choice_achieved_eliminated) and choice_achieved_timber) and choice_achieved_bloodonthesand) and choice_achieved_gotexploded) and choice_achieved_snakeeyes) and choice_achieved_sharkbait) and choice_achieved_lightning) and choice_achieved_hellfire) and choice_achieved_bangbang) and choice_achieved_exterminated) and choice_achieved_oceanwater) and choice_achieved_monstermadness) and choice_achieved_kamikaze) and choice_achieved_ivory) and choice_achieved_betrayal) and choice_achieved_rockbottom) and choice_achieved_frozen) and choice_achieved_shipwrecked) and choice_achieved_mutineer) and choice_achieved_hoosier) and choice_achieved_solesurvivor) and choice_achieved_castaway) and choice_achieved_laststraw) and choice_achieved_letitdie) and choice_achieved_fallguy) and choice_achieved_badluck) and choice_achieved_burnbabyburn) and choice_achieved_outsmarted)\n                *achieve alldeaths\n            [b]DEAD END[b]\n            \n            You've met with a terrible fate, haven't you? Try again and see if you can make it further! :)\n            *ending\n        You feel awful, but manage to drag yourself out of bed, put on your clothes (which are quite disgusting after all the crazy shit you've been through) and go downstairs.\n        *page_break\n        *goto fighton\n*label fighton\n*if (egoism >= 90)\n    *set egoism 100\n    This is it, you have made it this far, but you need to be the only one left alive.\n    \n    Indiana had one thing right; the only way to get off this island is to be the sole survivor, and you are not going to die out here! \n    \n    But in order to do so you'll need to take care of..\n    *choice\n        *if (aldies = false) #..Al.\n            How did a weakling like him even make it this far? Let alone with a baby. God, it's so annoying!\n            \n            You get your gun and hide it in your pocket before heading out and locating Al and Delaware.\n            *page_break\n            *set al 0\n            You find the two on a small boat in the harbor. Al is desperately trying to figure out how to unmoor the boat, but he stops and greets you when he notices your presence.\n            \n            \"Hey, I'm getting closer to operating this thing, we might be able to get out!\" he says excitedly.\n            \n            \"I see,\" you smirk, \"I'm afraid that's not gonna work.\" \n            \n            \"Why?\" he says puzzled, \"I'm sure the boat is not that old yet.\"\n            \n            \"Oh, not that,\" you say menacingly, \"I will make it out of here, but not you and that fucking baby,\" you spit as you point your gun at him. \n            \n            Al's eyes widen, than his expression fills with sorrow. \n            \n            \"Any last words?\" you ask mockingly. \n            \n            \"Yes,\" he looks at you, \"I'm sorry.\"\n            \n            Before you can retort, he moves quickly and punches the gun out of your hand before sending you flying with a roundhouse kick.\n            \n            You attempt to get up as he walks up to you with your gun in his hand, pointed at you.\n            \n            \"I really hoped we could get out of here together,\" he says, his eyes filled with tears, \"I thought I could trust you!\" \n            \n            You get up and try to smooth talk him as you back away, \"Look, it was just a prank, ok?\" you say unconvincingly.\n            \n            He points the gun at your chest and pulls the trigger. \n            \n            Your body falls back and into the water. The beautiful blue sky is the last thing you see.\n            *page_break \"Goodbye...\"\n            *achieve letitdie\n            *check_achievements\n            *if (((((((((((((((((((((((((((((choice_achieved_firstdeath and choice_achieved_abyss) and choice_achieved_eliminated) and choice_achieved_timber) and choice_achieved_bloodonthesand) and choice_achieved_gotexploded) and choice_achieved_snakeeyes) and choice_achieved_sharkbait) and choice_achieved_lightning) and choice_achieved_hellfire) and choice_achieved_bangbang) and choice_achieved_exterminated) and choice_achieved_oceanwater) and choice_achieved_monstermadness) and choice_achieved_kamikaze) and choice_achieved_ivory) and choice_achieved_betrayal) and choice_achieved_rockbottom) and choice_achieved_frozen) and choice_achieved_shipwrecked) and choice_achieved_mutineer) and choice_achieved_hoosier) and choice_achieved_solesurvivor) and choice_achieved_castaway) and choice_achieved_laststraw) and choice_achieved_letitdie) and choice_achieved_fallguy) and choice_achieved_badluck) and choice_achieved_burnbabyburn) and choice_achieved_outsmarted)\n                *achieve alldeaths\n            [b]DEAD END[b]\n            \n            You've met with a terrible fate, haven't you? Try again and see if you can make it further! :)\n            *ending\n        *if (floridadies = false) #..Florida.\n            That crazy bitch is still alive despite all of her antics. Time to put a stop to that.\n            \n            You get your gun and hide it in your pocket before heading out and locating Florida.\n            *page_break\n            *set florida 0\n            You find Florida in the small hangar not too far away from the mansion. She is fidgeting with some wires underneath the small aircraft as you approach her.\n            \n            \"Hey, how you doing?\" she winks at you, \"Mind helping me out here?\"\n            \n            \"No, I Just wanted to say goodbye,\" you say and point your gun at her.\n            \n            Florida raises her eyebrows in surprise, \"Oh really? You want to play that game, huh?\"\n            \n            \"No. No more games,\" you say coldly as you aim it at her head. \n            \n            Florida tears some wire out of the plane and the door of the aircraft suddenly slams open and falls on top of you, pinning you to the ground.\n            \n            Florida gets up on her feet and crouches near you, \"You shouldn't mess with someone in control of the airplane, baby,\" she smiles, \"Now, what should I do with you now?\"\n            \n            She ponders it with amusement as you lose consciousness from the heavy blow.\n            *page_break\n            When you come to, you cannot believe what you see. \n            \n            You are flying! Or rather, you are tied to the left wing of the plane that Florida is piloting as you are ascending away from the island, higher and higher.\n            \n            \"You woke up just in time for the best part!\" Florida shouts out of the cockpit of the plane as she gives you a mocking wave.\n            \n            You try to speak but the wind doesn't allow you to and it is getting hard to breathe.\n            \n            \"Hello everybody! The temperature outside is a lovely fifty degrees as we are setting course to freedom!\" Florida says in an announcer-like voice, \"Just gotta take care of the trash before we leave,\" she adds and opens the window of her cockpit.\n            \n            She takes out a knife and cuts the ropes tying you to the wing of the plane. You try to stop her, but cannot move.\n            \n            \"No..!\" is all you can say as your body falls thousands of feet towards the azure sea below.\n            *page_break AAAaaaaa...!!!\n            *achieve fallguy\n            *check_achievements\n            *if (((((((((((((((((((((((((((((choice_achieved_firstdea e fate, haven't you? Try again and see if you can make it further! :)\n            *ending\n        *if (jerseydies = false) #..Jersey.\n            God, that motherfucker's constant swearing is so fucking annoying! Now you can finally make it stop.\n            \n            You get your gun and hide it in your pocket before heading out and locating Jersey.\n            *page_break\n            *set jersey 0\n            You find Jersey in the weapons' warehouse, surrounded by various weaponry and equipment. This might complicate things.\n            \n            \"What's up?\" you ask him nonchalantly.\n            \n            He turns to you, \"We'll need bigger guns than that if we want to have a shit stain's chance at a laundromat to kill these fuckers,\" he says, pointing at the gun in your pocket. Damn…\n            \n            \"It's more practical,\" you say, trying to remain calm.\n            \n            \"Practical my ass,\" he says with a frown.\n            \n            \"Okay, what would you suggest?\" you ask.\n            \n            \"Well, how about this shotgun,\" he says and hands the large weapon to you. \n            \n            You assess it in your hands as he examines another weapon, which looks like some kind of fire extinguisher. \n            \n            You switch off the safety mode on the shotgun and point it at Jersey. \n            \n            \"What the fuck are you doing?\" he asks, noticing your actions. \n            \n            \"Nothing, just doing some laundry,\" you smirk and pull the trigger…\n            \n            Nothing.\n            \n            \"Ow, I guess I forgot to reload it,\" Jersey says with genuine surprise, \"Well, thanks for the heads-up!\" he says and points his weapon at you, \"How about this for practical?\"\n            \n            It's a flamethrower…\n            \n            You scream in agony as you burn alive until your very timely death…\n            *page_break Shit.\n use.\n            \n            \"What?\" you raise an eyebrow at her. \n            \n            \"There is a nuke underneath the island and it is about to go off in a few minutes!\" \n            \n            \"How do you know that?\"\n            \n            She hands you something that looks like a business card, \"It's a key card I found in the mansion. It leads to a lab in the basement, there is a countdown there and the control panel to prevent the explosion!\"\n            \n            \"Oh yeah? Why didn't you turn it off then?\" you ask with suspicion.\n            \n            \"It requires two people to turn the keys simultaneously, that's what I wanted to ask you for,\" she explains.\n            \n            \"Alright, lead the way,\" you say, deciding that it's better to be safe than sorry if there is indeed a nuclear explosion waiting to happen.\n            *page_break\n            She nods and you follow her to the mansion's basement, where you find a sturdy metallic door with a card reader next to it. \n            \n            Utah slides the card over it and the door clicks, allowing her to push it open.\n            \n            You go inside and find what looks to be some kind of laboratory. There are monitors, cabinets and a large glass wall which leads to another, larger room with a large metallic cylinder at the center. Is that the missile?\n            \n            You are taken aback by what you see and, even more when the lights suddenly turn bright red. \n            \n            \"What the..?\" you shout, noticing Utah's sudden disappearance. \n            \n            You turn back and see that the door you came through just closed. You try to open it, but it doesn't budge. \n            \n            You hear a clicking sound behind you and see several machines popping out of the ceiling all around you.\n            \n            Those are security turrets and they are pointed at you…\n            *page_break Clever girl...\n            *achieve outsmarted\n            *check_achievements\n            *if (((((((((((((((((((((((((((((choice_achieved_firstdeath and choice_achieved_abyss) and choice_achieved_eliminated) and choice_achieved_timber) and choice_achieved_bloodonthesand) and choice_achieved_gotexploded) and choice_achieved_snakeeyes) and choice_achieved_sharkbait) and choice_achieved_lightning) and choice_achieved_hellfire) and choice_achieved_bangbang) and choice_achieved_exterminated) and choice_achieved_oceanwater) and choice_achieved_monstermadness) and choice_achieved_kamikaze) and choice_achieved_ivory) and choice_achieved_betrayal) and choice_achieved_rockbottom) and choice_achieved_frozen) and choice_achieved_shipwrecked) and choice_achieved_mutineer) and choice_achieved_hoosier) and choice_achieved_solesurvivor) and choice_achieved_castaway) and choice_achieved_laststraw) and choice_achieved_letitdie) and choice_achieved_fallguy) and choice_achieved_badluck) and choice_achieved_burnbabyburn) and choice_achieved_outsmarted)\n                *achieve alldeaths\n            [b]DEAD END[b]\n            \n            You've met with a terrible fate, haven't you? Try again and see if you can make it further! :)\n            *ending\nYou step outside the mansion and breathe in the fresh air. It smells like.. freedom. Yes, despite everything that happened, you have a feeling that today you will finally get out of this forsaken island, you just know it!\n\n*if aldies = false\n    Al walks up to you and says, \"Hey, I'm thinking we can untie that boat and, if we are careful, we should be able to reach the nearest land. Could you help me? I'll be at the harbor when you're ready,\" he explains and walks away, not giving you the time to answer. How uncharacteristically rude of him.\n\n*if floridadies = false\n    Florida waves you hello, \"Hey, did ya sleep well? I hope so, 'cause I need your help with somethin'. There is a plane in the hangar over there, if we work on it we should be able to fly it. That, or we die horribly in a plane crash. Either way, sounds better than being stuck here, doesn't it?\" she smirks and walks to the mansion, likely to grab some food or something.\n\n*if kansasdies = false\n    You feel a tap on your shoulder and find Kansas standing next to you, \"I'll be inside. No point in trying to get off the island if the help is on their way, better to wait for them,\" they say in their usual unreadable manner and enter the mansion behind you.\n    \n*if jerseydies = false\n    Jersey walks up to you, covered in various weaponry he must have procured from that warehouse, making him look like some cheesy action hero from the 80's.\n    \n    \"These bastards will show up to get the rest of us, and when they do, let's make sure we give them a warm welcome!\" he adds with a determined look, than heads back towards the warehouse.\n\n*if utahdies = false\n    *if sawcard = false\n        You hear Utah's footsteps as she walks towards you then hands you something that looks like a business card. \n        \n        \"This is a key card I found in the mansion. It must be the way to open that door in the basement,\" she explains, \"I'm going to check it out, you can join me if you are interested,\" she says as she walks inside the mansion, presumably to get to the basement.\n    *if sawcard = true\n        You hear Utah's footsteps as she walks towards you, then hands you the key card from yesterday. \n        \n        \"It's time,\" she says, \"I'll be waiting in the basement.\" With that, she walks inside the mansion.\n\nYou consider your options:\n*choice\n    *if (aldies = false) #I follow Al.\n        *goto alend\n    *if (floridadies = false) #I follow Florida.\n        *goto floridaend\n    *if (kansasdies = false) #I follow Kansas.\n        *goto kansasend\n    *if (jerseydies = false) #I follow Jersey.\n        *goto jerseyend\n    *if (utahdies = false) #I follow Utah.\n        *goto utahend\n*label alend \nYou find Al where you expected to find him: trying to unmoor the boat. He waves to you and invites you to get on board.\n\n\"Where's Delaware?' you ask, not seeing the baby around. \n\n\"They are inside, I figured it's too sunny for them to stay on the bridge,\" he explains, \"Hop in! The sooner we leave, the sooner we'll find help, I hope.\"\n\nYou consider whether you'll need to pack anything for the trip, but seeing how you don't have any possessions and there's little useful equipment on the island, you follow his suggestion.\n*page_break\nAs your preparations are done you leave the harbor and soon the island itself behind. It is only a distant memory now. The kind of memory that will haunt you for the rest of your days…\n\nAl brings Delaware out to enjoy the views, though they sleep peacefully in his arms and he decides not to wake them.\n\n\"What do you think we should name them? I mean, of course we should probably find their parents.. They probably have a name, after all, but still.\"\n\n\"Fair enough,\" you say, \"How about…\"\n*input_text delname\n\"It's beautiful,\" Al says and gives the baby a warm smile, \"What do you think, ${delname}? Do you like it?\"\n\nBaby ${delname} does not respond as they stare into the distance. You suddenly hear the sounds of a helicopter's blades and turn to look in that direction as well. \n\nYou see three helicopters flying towards you.\n\n\"Look! Help is on the way!\" Al smiles broadly, then shouts to the helicopters as he starts slightly jumping up and down, flailing his arm for them to notice.\n*choice\n    #I follow Al's example.\n        *goto albadend\n    *if (cangoodend = true) #Wait a second...\n        *goto algoodend\n*label albadend\nYou both raise your arms (one arm in Al's case) as you try to attract the helicopters' attention for a good few minutes. And eventually…\n\nYou succeed!\n\nUnfortunately…\n\nYou now realize that the helicopters look quite intimidating, all three of them look like they belong on a battlefield.\n\nA man pops out of the side of one of them.\n\nHe is holding a grenade launcher.\n\n\"No!\" Al shouts in desperation as you force him to lie down with you and cover ${delname} with your body.\n\nHowever, it does little when the missile hits the boat… \n*achieve albadend\n*page_break ...\n*goto_scene finalscreen\n*label algoodend\n*set trueself true\n\"Wait! We have to stop them or they'll kill us!\" you shout, memories flooding your brain like a tsunami.\n\n\"What?! How?\" Al asks confused.\n\n\"I.. I remember now!\" you shout as if possessed, \"We are augmented, we have powers! We should use them!\" \n\n\"What..?\" Al asks, but you see a spark of recognition in his eyes, \"I.. I think.. My power wouldn't really…\" he looks at you hopingly.\n\n\"My power won't do us good here either,\" you say, recalling the damage your power has already caused. \n\n\"Wait!\" Al shouts, \"${delname} is speaking to me!\"\n\n\"What?!\" you say dumbfounded and slightly tired of hearing that word.\n\n\"My augmentation is telepathy!\" Al shouts with a weird smile, \"I can hear ${delname}'s thoughts, they can help!\"\n\nHe presents you ${delname}, who looks at you with a curious expression on their little face.\n\n\"How?\" you say, replacing the other possible word.\n\n\"I'm not sure, but they can do it!\" Al says, then puts his forehead against ${delname}'s head and closes his eyes. \n\n${delname}'s body starts to glow with bright light and Al raises them up as if presenting them to the helicopters, which are closing in on you.\n*page_break\nYou cannot believe what you see as a bright beam of light strikes from ${delname}'s mouth and pierces one of the helicopters, cutting it in half!\n\n\"What the…\" is all you can say as you see a man pop out of the side of the remaining helicopter and aim what looks like a grenade launcher at your boat. \n\nHowever, ${delname} uses their power again and another laser beam blasts out of their body, hitting a missile mid-air as it leaves the grenade launcher, exploding it and the nearby helicopter with it.\n\nWithin a few seconds, all of your adversaries are nothing but burning chunks of metal floating in the ocean and ${delname}'s body stops glowing, turning to their normal self. Al kisses them on the forehead, \"Thank you, I'm really sorry you had to be dragged into this, ${delname}.\" \n\n${delname} doesn't respond and instead falls asleep, seemingly tired from all of the excitement. \n\nPart of you wonders whether any of this was even real, but the remaining parts of the helicopters floating in the water remind you that it, in fact, is.\n\n\"Alright,\" Al turns to you, \"Let's hope we wouldn't have to do this ever again,\" he says and returns to the boat's control room for you to continue your journey.\n*page_break Weeks later...\n*achieve algoodend\nAfter about a day at sea, you landed in Sri Lanka, where you spent a few days before heading north, to India. \n\nYou found yourselves moving from place to place all over the country, hiding from the people that occasionally try to capture you. \n\nThanks to your combined powers: Al's telepathy, which tells you if there are any spies around, your ability to wipe their memories, and of course, ${delname}'s incredible laser powers, you are virtually untraceable and you manage to live with relative comfort and peace. \n\nAnd what can be better than living with someone you love, even if it means living at the edge of the world? Not to mention you have this little and quite literal ray of sunshine with you!\n\nYou can't think of anything better.\n*page_break\n*goto_scene finalscreen\n*label floridaend\nYou find Florida fidgeting with a plane in the large hangar. \n\n\"Hey, mind helping me out here?\" she addresses you from underneath the plane, surrounded by numerous wires.\n\n\"You sure it will work?\" you ask, looking at the dangling wires with concern. \n\n\"Yeah, I'm like.. 80% sure,\" she smirks, \"S'alright, I've done something similar before, only it was a bus, but hey, same difference, no?\" \n\nYou decide not to question her any further to not lose your last traces of sanity and help her out when she asks you to bring her any tools. \n*page_break Hours later...\n\"It works!\" she shouts triumphantly as you are both sitting inside the cockpit of the plane, \"Alright, let's see how it controls…\" \n\nYour stomach sinks thinking about the likelihood of your untimely doom, but she is right; this is better than being stuck on this cursed island. Slightly better…\n\nFlorida actually manages to make the plane move and you leave the hangar, then perfectly align yourself with the runway. Almost perfectly…\n\n\"Alright, let's do this!\" she shouts and presses the button.\n\nNothing happens… \n\n\"Whoops, wrong button,\" she adds sheepishly and presses another button. Now the plane starts moving and as you ponder the wisdom of this action, picks up the speed as you approach the edge of the runway…\n*page_break You take off!\n\"Yeah!\" Florida shouts and laughs happily, \"I wanna fly high!\" she starts singing an obscure tune as you look out of the window. \n\nThe island really does look like a bizarro horseshoe from above and knowing that you are not there anymore makes you feel as happy as can be, the danger of the current predicament not withstanding.\n\n\"What's that?\" Florida points ahead, \"Birds or something?\"\n\nYou squint and realize that those aren't birds, they are three helicopters flying towards you!\n*choice\n    #\"Let's try to avoid them!\" you shout.\n        *goto floridabadend\n    *if (cangoodend = true) #Wait a second...\n        *goto floridagoodend\n*label floridabadend\n\"Alright, hold on to something!\" she yells and steers the plane down and to the side. \n\nYou are launched to the side of the cockpit against your best efforts, but this is nothing compared to the danger those helicopters pose.\n\nThey are here to stop you. They will likely capture you and put you back on the island, and that's probably the best case scenario. You can't let them do that!\n\nYour plane flies past the black military helicopters and you feel a tinge of relief. Perhaps you can outfly them?\n\n\"Yeah, get that, you men in black weirdos!\" Florida shouts, as if they can hear her. \n\nYou turn to look at the helicopters, which are getting smaller in size as you fly away from them.\n\nHowever, you can make out a tiny figure of a soldier hanging out of one of them. He is holding a grenade launcher… \n*page_break\n*achieve floridabadend\n\"He's gonna shoot us down!!!\" you shout on top of your lungs.\n\nFlorida tries to steer the plane in even crazier directions, even forcing it to do a barrel roll to dodge the missile.\n\nAnd she actually manages to dodge it!\n\n\"Yay!\" Florida shouts and you give her a high five.\n\nSadly, the soldier shoots another one. \n\nAnd this time his aim is true…\n\nYou are tossed to the side by the explosion as the left wing of your tiny plane is falling towards the ocean. The rest of the plane follows suit. \n\n\"Well,\" Florida turns to you as you both plummet downwards, \"At least we'll go out with a bang!\" she smiles.\n*page_break BANG!!!\n*goto_scene finalscreen\n*label floridagoodend\n*set trueself true\n\"I remember!!!\" you shout on top of your lungs, even startling Florida in the process. \n\n\"What the?\" she asks, dumbfounded. \n\n\"We're augmented! We can use our powers to stop them!\" you yell excitedly.\n\n\"Augmen.. what?\" she pauses, then seems to have remembered something also, \"Yeah, I know whatcha mean!\" she adds with a devilish smirk.\n\n\"You remembered your power?\" you ask.\n\n\"Yup. They didn't call me 'Lightning Bird' for nothing!\" she brags, then opens the window of the cockpit, letting the strong winds blow your hair around.\n\n\"What are you..?\" you say, confused, but then see a tiny figure of a soldier hanging out of one of the helicopters. He is holding a grenade launcher… \n\n\"Watch out!\" you shout, but Florida just gives you a toothy grin.\n\n\"It's alright. Watch in awe!\" she yells, then pulls herself out of the window and aims her index finger at the helicopter, as if holding an invisible gun.\n\n\"Pew!\" she adds as a blinding bolt of lightning emits out of her finger and strikes the helicopter, which starts falling to the ocean below.\n\nThe grenade launcher guy still manages to fire his shot, but Florida simply aims her lightning gun of a finger at it and blows the missile up mid-air, then takes care of the remaining helicopters.\n\nIncredible…\n\nSoon, there are no adversaries left as they are nothing but chunks of burning metal floating in the water. Florida gets back in her seat and continues to pilot the plane as if nothing happened.\n\nShe notices you staring and raises an eyebrow, \"What? You wanna say something?\"\n\nYou gulp and simply confess, \"I love you!\"\n*page_break Weeks later...\n*achieve floridagoodend\nYou, somehow, managed to not crash your plane as you landed in Madagascar, which is a much more pleasant island to be compared to where you came from. \n\nBut you couldn't stay there for long as your pursuers tried to capture and/or kill you again, so you continued your journey and ended up somewhere in eastern Africa. You then spent weeks traveling all across the continent, while outrunning and outsmarting your would-be captors. \n\nThankfully, they eventually lost you or just gave up.\n\nHowever, you know full well that there is no way for you to go back home anymore, but you have found a new life with someone you deeply care about. \n\nAnd isn't that what life is all about?\n*page_break\n*goto_scene finalscreen\n*label kansasend\nYou meet Kansas in the middle of the mansion as they are figuring out how to turn the large TV set on. \n\nThey acknowledge your presence by saying, \"We might as well relax here while we wait for help.\"\n \n\"Alright, what's the plan?\" you ask, admiring the cozy decor of the room.\n \n\"Well, I thought we could watch a few movies or something. I found a few DVDs,\" they explain and present you with a few movies. How quaint.\n*choice\n    #You agree and relax.\n        *goto kansasbadend\n    *if (cangoodend = true) #Wait a second...\n        *goto kansasgoodend\n*label kansasbadend\nYou pick the movie you like and join Kansas as you relax on the couch in front of the large television set.\n\nAs you watch the movie, you share a few laughs and enjoy yourselves. Kansas' laughter is beautiful, you find out.\n*page_break\n*achieve kansasbadend\nYou barely react when several heavy armored men bust the front door open and point their automatic rifles at the two of you.\n\nYou are going to die, but you will die together with the person you care about the most. What more is there to ask for?\n\nYou and Kansas embrace each other lovingly as the bullets pierce your skin.\n*page_break Goodnight…\n*goto_scene finalscreen\n*label kansasgoodend\n*set trueself true\n\"We have to stop them or they'll kill us!\" you shout.\n\n\"How?\" Kansas asks you calmly, though with a hint of confusion.\n\n\"I.. I remember now!\" you shout as if possessed, \"We are augmented, we have powers! We should use them!\" \n\n\"Augmen.. ted?\" Kansas utters, but you see a spark of recognition in their face.\n\n\"Yes, we are augmented! My power won't do much, though...\" you admit, remembering all the damage it has already done to both of you, not to mention the others…\n\n\"It's okay,\" Kansas speaks, \"I will stop them,\" they say with determination in their eyes. \n\nYou nod and follow Kansas as they sit on the couch, \"So what's the plan?\" you ask.\n\n\"You'll see,\" they say in their typical deadpan manner. \n\nYou decide to trust them and try to relax. It's easier said than done.\n*page_break Minutes later...\nThe door busts open and several armed men in heavy armor enter the room.\n\nKansas stares at them defiantly as they pull the triggers on their rifles…\n\nYou were about to say your goodbyes, but the bullets don't reach you. In fact, it seems like the armed goons missed, somehow.\n\nNo, it's not that, another shot rings and you can barely see the bullet disintegrate a few feet in front of you. Kansas continues staring down the men, one of whom decides to get close and personal. \n*page_break Bad idea.\nHe tries to grab you and you see the front of his arm disintegrate in the air a few feet away from you, as if there is some kind of forcefield surrounding you.\n\nThe man falls to the ground, clutching the remaining part of his arm in agony as the other soldiers shoot again, even more vigorously than before. Like before, the bullets do not reach you.\n\n\"Let's go,\" Kansas says simply as they get up. You obey and follow them as they calmly walk towards the soldiers. \n\nThe room itself starts disintegrating as soon as any part of it reaches the distance of six feet around you. Thankfully, the floor is still intact.\n\nThe men seem to have caught on to what's going on as they run off out of the mansion. \n\nYou follow Kansas as they walk towards the front door, which itself disappears as if burning up in atmosphere.\n*page_break\nOutside you see a crowd of armed men pointing various weaponry at you.\n\nKansas proceeds calmly, so do you.\n\nThe soldiers barrage you, but all of their weapons do nothing as the shots disintegrate mid-air.\n\nBullets? Don't reach you.\n\nGas bombs? The gas disintegrates around you. \n\nFlash bangs? The light doesn't reach beyond the spherical area around you. You're not sure how that's even possible.\n\nYou two proceed further, getting closer to the sea. A helicopter flies ahead of you and you see two missiles flying towards your face.\n\nBut…\n\nThey disintegrate as well and you follow Kansas as they enter the water, or rather, the water disappears around you as if instantly vaporised. You go deeper, and now the water is all around you, yet there is an ample space between you two and the tons of liquid all around you. \n\nYou can now see that Kansas' power creates a sphere-like area of disintegrating effect around them. It is akin to the Earth's atmosphere in that way. Thankfully, you are close enough to them to be fully protected as well, just try to keep in step with them.\n\n\"So.. What's the plan?\" you turn to them and ask inquisitively.\n\n\"We will walk to safety,\" they say calmly.\n\n\"We will.. walk?\"\n\n\"Yes,\" they say simply, without offering any further explanation.\n\nIt's going to be a long walk…\n*page_break Much later...\n*achieve kansasgoodend\nAfter walking for what felt like a full day (which it probably was), you manage to resurface on another seemingly abandoned island.\n\nLuckily, you find a small fishing boat, the owner of which was pretty surprised to see you two, but kind enough to agree to take you to the nearby civilization, which turned out to be the Maldives archipelago. \n\nSuffice to say, ending up on what many consider to be a paradise on Earth right after the hellish island you came from is a pretty jarring experience, but a huge relief for both of you.\n\nSo far, you haven't had any pursuers chasing you yet, so for the time being you and Kansas decided to relax, managing to find a place to live and even some basic jobs for you to sustain yourselves on this tropical paradise.\n\nNot bad, not bad at all…\n*page_break\n*goto_scene finalscreen\n*label jerseyend\nYou find Jersey at the weapons' warehouse, where he is currently assembling some sort of a barricade out of various crates around the place. \n\n\"These bastards won't expect us to fight back, let's show 'em how wrong they are!\" he states with a determined look on his face.\n*choice\n    #You help him set everything up.\n        *goto jerseybadend\n    *if (cangoodend = true) #Wait a second...\n        *goto jerseygoodend\n*label jerseybadend\nYou join Jersey as you grab all the weaponry you can find in the warehouse and start setting up several sturdy barricades all around the airfield.\n\nSoon, you hear the sounds of helicopters above and see three black military machines land some few hundred feet away from you, a small army of armed soldiers run out of them, pointing their weapons at you.\n\n\"FUCKERS!!!\" Jersey shouts on top of his lungs as he shoots at them and even manages to throw a grenade in the process.\n\nSuffice to day, they did not expect such a welcome and several of them die instantly while the others begin to shoot in your direction.\n\nYou are not a professional soldier (nor is Jersey, for that matter), but you do your best unleashing the firepower of your chosen weapons and felling several men at once. \n\n\"FUCKERS!!!\" Jersey shouts again as he pulls out a grenade launcher (where did he find that?! Was that even at the warehouse?).\n\nHe pulls the trigger and a missile flies out, sending him flying from the inertia.\n\nHis aim was true and the missile hits one of the helicopters, causing a raucous explosion which kills several soldiers standing nearby. \n*page_break\n*achieve jerseybadend\nYou continue your rampage, but eventually the forces of the incoming soldiers become larger and smarter, staying out of your line of sight and cautiously getting closer.\n\n\"DIE, YOU  MOTHERFUCKERS!!!!\" Jersey yells, tearing his throat out as he shoots out of a machine gun he found in the basement of the warehouse. Yup, there was a basement, apparently.\n\nA bullet pierces his chest and he falls to the ground, clutching the wound.\n\nYou run up to him to help as he pulls out another grenade out of nowhere. \n\nThe armed men are closing in on you and they pull the trigger of their weapons, piercing your body with their bullet. \n\nBefore you lose consciouses from the pain, you see Jersey manage to drop the grenade, however…\n\n\"If I'm going to hell, I'm taking you fuckers with me!\" he shouts as it explodes.\n*page_break BOOOM!!!\n*goto_scene finalscreen\n*label jerseygoodend\n*set trueself true\n\"That won't be enough,\" you say, \"But we have something even better!\" \n\n\"And what's that?\" Jersey looks at you suspiciously.\n\n\"We're augmented, remember? We can use our powers to beat them!\" \n\n\"What the fuck are you talking about?\" Jersey spits, but his eyes suddenly light with recognition.\n\n\"Yes! You remember now, right?\" you shout hopingly. \n\nJersey nods repeatedly with a determined look on his face, \"Yeah, I've got something they won't expect, alright!\"\n*page_break Later...\nThey arrive just as expected, three black military helicopters on the horizon. \n\nYou hide behind the barricade with your chosen weapon ready as Jersey stares them down defiantly next to you. You know that your power won't do much good here, not to mention all the damage it has already done, but Jersey… He's got something special in his sleeve!\n\nSeveral dozen men drop out of the helicopters as they land, pointing their weapons in your direction.\n\n\"Hold on to these for me, alright?\" Jersey turns to you and hands you his glasses. He then walks towards the men and he is… he is changing! \n\nHis usual white skin turns to a bright shade of red and his body grows to several times its size, ripping his clothes apart. He now looks like some demonic red ape creature, making him virtually unrecognizable.\n*page_break RAWWWWRRRRRR!!!!\nThe soldiers shoot at him, but their bullets do little as Jersey jumps on top of them, crushing some of them and swatting the others with his arms. \n\nIn a scene straight out of a comic book, he jumps to one of the helicopters, grabs its tail with his beefy arms and spins it around like some sort of toy before throwing it at another helicopter, causing them both to explode in the process. \n\nOne of the soldiers fires a grenade launcher at him, but Jersey catches the missile mid-air with his mouth and it explodes. However, he seems to be completely unharmed and roars at the soldier so hard, the poor guy is sent flying backwards from the sound alone.\n\nThe big ape-like creature continues to smash everything nside.\n*page_break\nYou find yourselves in a brightly-lit spacious room with several screens and cabinets all around. The back of the room is a glass wall, which reveals a large room on the other side. There are various machines and medical equipment inside the room and a cylindrical tube in the middle of it, though you cannot see what's inside.\n\nYou get the sense that this is some kind of medical facility or..\n\n\"A laboratory!\" Utah says, looking around the place, \"There's gotta be something here which will tell us what's going on!\"\n\nShe starts eagerly rummaging through the cabinets and you decide to follow suit. \n*hide_reuse\n*label explorelab\n*choice\n    #I look through the cabinets.\n        You look through several of them, but all you find are some papers with cryptic numbers and scientific equations on them. As hard as you try, you cannot figure out what they mean.\n        \n        You feel like giving up on the cabinets until you find something that peaks your interest. It is an old, torn newspaper article which reads:\n        \n        [i]..the island was purchased by the United States' army after the dissolution of the United Kingdom in the 2020's and subsequent roll back of its colonial possessions.[/i]\n        \n        [i]Despite the widespread protests from the former indigenous people of the island, the territory will continue to be used as an overseas military base of the United States in the foreseeable future.[/i]\n        \n        You have a hunch that must be referring to the island you are currently standing on, though the text doesn't include the name of the island, if it even has one.\n        *goto explorelab\n    #I check the computer.\n        You sit in front of the high-tech monitor and touch it, opening a desktop filled with various file icons. You try to look through them, but they are all encrypted with a password. You try to input a couple of passwords off the top of your head, but it's no use.\n        *goto explorelab\n    #I look through the glass.\n         You press your face to the glass wall, examining the room on the other side. It looks a bit like something you'd see at a hospital, only with more weird machines, whose purpose you can only speculate about.\n         \n         The metallic cylinder in the middle looks vaguely like a large aquarium, though you're not sure you want to know what's inside of it.\n         *goto explorelab\n    #I look for anything else...\n        *goto morelab\n*label morelab\nAs you try to figure out what to do next, a monitor near the celling comes to life and you see the face of a man in his fifties. At first you think it's some sort of video footage, but the man's obvious acknowledgment of your presence begs otherwise.\n\n\"So you made it this far, huh? Impressive!\" he says in a mocking voice.\n\n\"Are you 'D.C.'?\" Utah addresses him cautiously.\n\n\"So you have found the little clue left for you? Good to know it wasn't a waste of time to put it there,\" he smiles menacingly.\n\nYou get the sense that this man is dangerous, but you also want to get answers out of him.\n*choice\n    #Speak to the man.\n        *goto utahbadend\n    *if (cangoodend = true) #Wait a second...\n        *goto utahgoodend\n*label utahbadend\nTired of the man's meandering, you decide to get as much information out of him as you can, \"Stop messing around, are you behind this or not?\" you shout, though the question seems somewhat pointless. \n\n\"No need to get feisty with me, Maine. But, I have to say I'm impressed that you managed to survive, so I'll answer whatever questions you may have, as a reward,\" he adds with a smirk.\n*hide_reuse\n*label fivequestions\n*choice\n    #\"Who are you?\" \n        \"My name is David Cooper. I am a five-star general in the army of the United States of America.\"\n        \n        \"So the army is okay with all of this?\" Utah shouts in disbelief. \n        \n        \"Why not? This is a matter of national security. No, the matter of humanity's existence, to be exact,\" he responds with conviction in his voice.\n        *goto fivequestions\n    #\"What is going on here?'\n        \"You are a part of a classified experiment. You and the others were the fifty augmented subjects we have collected.\"\n        \n        \"Augmented?\" you ask, trying to figure out the meaning of the word.\n        \n        \"What did you do to us? Why can't we remember anything?\" Utah asks in frustration.\n        \n        *if mainegender = 1\n            \"That is something you should ask your friend,\" Cooper says with a grin, \"They are the ones who suppress your memory, and their own.\"\n        \n        *if mainegender = 2\n            \"That is something you should ask your friend,\" Cooper says with a grin, \"She is the one who suppresses your memory, and her own.\"\n        \n        *if mainegender = 3\n            \"That is something you should ask your friend,\" Cooper says with a grin, \"He is the one who suppresses your memory, and his own.\"\n            \n        \"What are you talking about?\" Utah asks, dumbfounded. \n        \n        \"I'll show you,\" Cooper says calmly, \"See that computer? Go to the 'Test Subjects' file and you will see. The password is 'Ubermensch'.\"\n        \n        You eye him with suspicion, but decide to see for yourself whether he is making any sense.\n        \n        \n        *goto testsubjects\n        *label morecd\n        \"So is that true?\" Utah turns to you, \"You erased everyone's memories?\"\n        \n        \"That… can't be..\" you utter and look at Cooper in confusion. \n        \n        \"So you still don't remember? How ironic!\" Cooper laughs, \"Try to rack your brain; does the name Oblivion ring any bells?\"\n        \n        What…?\n        *page_break Oblivion...\n        *set trueself true\n        The memories of your \"past\" life flood your mind.\n        \n        Oblivion… \n        \n        That was your name, no, the \n        \"Today is November 5th, 2050. About 3 pm, to be exact,\" Cooper responds nonchalantly.\n        \n        It's November already?! You don't recall anything beyond September…\n        *goto fivequestions\n    #\"Where are we?\"\n        \"We are on the United States' property in the Indian Ocean. The island of Diego Garcia, to be exact. Never liked that name, to tell you the truth.\"\n        \n        \"Why?\" Utah asks, \"Couldn't find a closer spot to torture us?\"\n        \n        \"You're not that important, sweetheart,\" Cooper retorts coldly, \"You are here because the sole reason your DNA is relevant is here.\"\n        *goto fivequestions\n    #\"Why are you doing all of this?\"\n        \"An insurance for the future. You see, out of the ten billion people that reside on Earth currently, one in fifty thousand is born with superpowers, and that number will likely rise even more. Augmented are appearing everywhere and one day they may rise up. If that day comes, we'll have a weapon of our own; an augmented so powerful she will destroy any threat to the world's stability,\" Cooper explains. Although what he said sounds like a joke, he doesn't seem to be joking.\n        \n        \"What?\" you and Utah exclaim simultaneously.\n        \n        \"I can show you, actually,\" Cooper responds and seems to be pressing something to his side. \n        \n        The cylinder in the room behind the glass wall starts to change, a metallic cover retracts from its top and you can see inside. \n        *page_break It's..\n        .. a young girl. Can't be older than five, she is peacefully floating in the cylindrical tank with numerous cords attached to her body. Her eyes are closed.\n        \n        \"Behold, project 'Übermensch'!\" Cooper announces with pride, \"Also known as my dear daughter.\"\n        \n        \"What? How could you do this to your own family?\" Utah says shocked.\n        \n        \"Indeed, how could I give my daughter the best birthday gift she could ever want?\" he says, his words make your stomach turn, \"What a better gift can a father provide for his daughter than abilities which will make her the most powerful being in history?\"\n        \n        \"And that's why you need our DNA? For this?!\" you exclaim.\n        \n        \"We were all brought here to die just because of that?! Even the little baby?\" Utah chimes in. \n        \n        \"Oh, Delaware's DNA is one of the most important. You see, there are seven power types for augmented, and theirs is the rarest — the Mixed type, which means both of their parents were augmented themselves, though they didn't make it.\"\n        \n        \"What? What did you do to them?\" Utah asks quietly, likely not wanting to know the answer. \n        \n        \"They were.. a bit too reluctant to go, to put it briefly. Regardless, it was essential for the project to get all of the power types, even the filthy Corporals like that elephant bitch,\" he spits.\n        *page_break\n        \"Than what was the point of all this survival bullshit?\" you ask, getting madder with every second.\n        \n        \"Oh that? That was mostly just for fun,\" he smirks.\n        \n        \"What?\" this time it is you who cannot believe his words.\n        \n        \"We have extracted all of your DNA material we need, so we were going to get rid of the test subjects after the experiment. It is a standard procedure, after all, but why not have a little fun?\"\n        \n        \"A little fun? How crazy are you?\" Utah yells in frustration.\n        \n        \"If you have a bunch of lab rats you don't need anymore, why not let them fight for your amusement?\"\n        *goto fivequestions\n    #\"How do we get out of here?\"\n        *achieve ubermensch\n        Cooper smiles with a devilish grin, \"How naive of you. Simply put, you don't. Although we have your DNA material, you are still useful test subjects.\"\n        \n        \"What?!\" Utah shouts, horrified, \"We made it this far, we deserve to be released!\" \n        \n        \"Who promised you that?\" Cooper sounds genuinely surprised.\n        \n        \"Come on, Maine!\" Utah grabs your hand, leading you to the door. \n        \n        \"I'm afraid it's a bit too late for that,\" Cooper says as you feel dizzy for some reason, \"While we were having our little chat, the room was filled with tranquilizing gas. I can't let my overachieving test subjects leave so soon, can I?\" \n        \n        You try to keep upright, but your feet give in and you both fall to the ground.\n        \n        Your eyes close on their own as you drift off to sleep…\n        *page_break\n        *goto labrats\n*label testsubjects\nYou get in front of the computer and click on the folder titled \"TEST SUBJECTS\".\n\nThe password window pops up and you input the password Cooper gave you. \n\nIt works!\n\nYou see five files labeled with different letters, likely some kind of list.\n*label codenames\n*choice\n    #A-G\n        *label atog\n        *choice\n            #ALABAMA\n                CODENAME: ALABAMA\n                \n                AUGMENTATION: ENHANCED VISION\n                \n                STATUS: DECEASED. DIED TO THE TSUNAMI CAUSED BY CODENAME: HAWAII\n                *goto atog\n            #ALASKA\n                CODENAME: ALASKA\n                \n                AUGMENTATION: INTERPERSONAL ABILITY TO TELEPATHICALLY CONNECT WITH PEOPLE AROUND HIM\n                \n                STATUS: DECEASED. DROWNED IN THE SWAMP\n                \n                He was a genuinely good person; a shame he had to go out like that.\n                *goto atog\n            #ARIZONA\n                CODENAME: ARIZONA\n                \n                AUGMENTATION: ELEMENTAL ABILITY TO MANIPULATE MILK\n                \n                STATUS: DECEASED. DIED DURING THE LIGHTNING STORM CAUSED BY CODENAME: FLORIDA\n                *goto atog\n            #ARKANSAS\n                CODENAME: ARKANSAS\n                \n                AUGMENTATION: ENHANCED IMMUNITY TO ALCOHOL\n                \n                *if savewisconsin = false\n                    STATUS: DECEASED. KILLED BY CODENAME: WISCONSIN\n                *if savewisconsin = true\n                    STATUS: DECEASED. DIED IN THE SKIRMISH WITH CODENAME: IOWA, CODENAME: MISSOURI, CODENAME: MINNESOTA AND CODENAME: LOUISIANA\n                *goto atog\n            #CALIFORNIA\n                CODENAME: CALIFORNIA\n                \n                AUGMENTATION: ELEMENTAL ABILITY TO MANIPULATE METAL\n                \n                STATUS: DECEASED. KILLED BY THE SECURITY TURRET AT SITE 50\n                *goto atog\n            #COLORADO\n                CODENAME: COLORADO\n                \n                AUGMENTATION: DYNAMIC POWER WHICH GRANTS HER VARIOUS ABILITIES THE HIGHER IN ALTITUDE SHE GETS\n                \n                STATUS: DECEASED. KILLED BY CODENAME: INDIANA\n                *goto atog\n            #CONNECTICUT\n                CODENAME: CONNECTICUT\n                \n                AUGMENTATION: ENVIRONMENTAL ABILITY TO MAKE INANIMATE OBJECTS INCORPOREAL\n                \n                STATUS: DECEASED. FELL THROUGH THE FLOOR AT SITE 50 DUE TO THEIR OWN POWER\n                *goto atog\n            #DELAWARE\n                CODENAME: DELAWARE\n                \n                AUGMENTATION: MIXED ABILITIES OF PHOTOKINESIS AND LASER PROJECTION\n                \n                STATUS: DECEASED. DIED DUE TO A CAVE IN CAUSED BY CODENAME: NEBRASKA\n                \n                Being just a little baby, it's not shocking that Delaware didn't make it through, but it is still devastating.\n                *goto atog\n            #FLORIDA\n                CODENAME: FLORIDA\n                \n                AUGMENTATION: ELEMENTAL ABILITY TO MANIPULATE LIGHTNING AND ELECTRICITY\n                \n                STATUS: DECEASED. DIED DUE TO A LIGHTNING STRIKE CAUSED BY HER OWN POWER\n                \n                So that lightning storm was her doing? \n                \n                She didn't know she was causing it, of course, though a part of you fears she probably would've done it on purpose if she knew she could.\n                *goto atog\n            #GEORGIA\n                CODENAME: GEORGIA\n                \n                AUGMENTATION: CORPORAL ABILITY TO FLY\n                \n                STATUS: DECEASED. DIED DURING THE EXPLOSION OF SITE 50\n                *goto atog\n            #Go back.\n                *goto codenames\n    #H-M\n        *label HtoM\n        *choice\n            #HAWAII\n                CODENAME: HAWAII\n                \n                AUGMENTATION: ELEMENTAL ABILITY TO MANIPULATE WATER\n                \n                STATUS: DECEASED. DIED TO THE TSUNAMI CAUSED BY HER OWN POWER\n                \n                So she was the reason there was that huge tsunami? The extent of augmented power is truly stunning, even when said augmented doesn't remember their own abilities.\n                *goto HtoM\n            #IDAHO\n                CODENAME: IDAHO\n                \n                AUGMENTATION: ENVIRONMENTAL ABILITY TO TURN ANY OBJECT BLUE\n                \n                STATUS: DECEASED. DIED IN THE FIRE AT CANNON POINT\n                *goto HtoM\n            #ILLINOIS\n                CODENAME: ILLINOIS\n                \n                AUGMENTATION: ELEMENTAL ABILITY TO MANIPULATE CRYSTAL\n                \n                STATUS: DECEASED. DIED IN THE EXPLOSION OF USS HAWAII\n                *goto HtoM\n            #INDIANA\n                CODENAME: INDIANA\n                \n                AUGMENTATION: INTERPERSONAL ABILITY TO TELEPATHICALLY COMMUNICATE WITH SNAKES\n                \n                *if indyshot = true\n                    STATUS: DECEASED. KILLED BY CODENAME: MAINE\n                    \n
