  \n        Your idyllic morning is interrupted again as Virge walks up to you, \"Don't like to socialize?\" he asks.\n        \n        \"I can ask you the same thing,\" you retort.\n        \n        Virge smirks, \"I've been busy figuring out what to do next.\"\n        \n        \"Why not just wait here? We made that \"SOS\" sign and all,\" you say.\n        \n        \"In my experience, help rarely arrives when you need it,\" he says grimly. \n        \n        \"Your experience?\"\n        \n        \"Yes, I've been in my fair share of crisis situations during the war, you could only rely on yourself when things get rough,\" he explains.\n        \n        \"So you're a soldier?\" \n        \n        \"Former, but you don't forget that stuff. Sometimes I feel like I'm still in Afghanistan,\" he laments. \n        \n        Afghanistan? That was decades ago! How old is this guy?\n        \n        \"So what's the plan then?\" you ask, changing the subject.\n        \n        \"I'll explain shortly, come,\" he beckons you to follow him.\n        \n        You decide that there is no point in sitting around any longer, so you both walk up to the other survivors, who are resting around the fire from yesterday.\n        *page_break\n        \"We were trying to recall more details about ourselves,\" Utah explains, looking at Virge, \"Maybe we can remember how we ended up here that way.\"\n        \n        \"Did you recall anything?\" he asks.\n        \n        \"Nope!\" Florida chimes in a she munches on a loaf of bread.\n        \n        \"Well, your plan didn't work out, then, so let's try mine,\" Virge comments coldly, \"We've only seen a small portion of the island so far, let's go out further. We might find some way to contact the outside world.\"\n        \n        \"Where do we go?\" Utah asks.\n        \n        Virge presents the map from yesterday, the one with the island's physical geography on it, and points at a spot on the eastern side of the atoll, t. It seems to be mostly made up of people who don't like Virge. It all feels very familiar. \n\nYou wonder who to join:\n*choice\n    #I will go north.\n        *set rebellion +10\n        Utah, Florida and Washington welcome you to their group.\n        *if kansasdies = false\n            Kansas joins your side as well.\n            \n            \n        \"Why y'all don't just swim to the other side?\" a woman with \"Texas\" dog tag speaks up.\n            \n        Virge frowns at her, \"The lagoon is too wide to safely swim to the other side.\"\n            \n        \"Bullshit! There! You can even see the other shore from here!\" she smirks and takes a running start before jumping into the water and swimming towards the shore on the other side of the island. \n            \n        Maybe she's right? You can actually see the other side from here, so how hard could it be?\n        \n        The woman from Texas continues swimming and is now far enough for you to barely make her out in the water. \n        \n        However, you see well enough and something ain't right…\n        *page_break She struggles...\n        *set mettexas true\n        \"Shit, is that a shark?!\" Jersey shouts.\n        \n        There is definitely something in the water with her and the woman is trying her best to fight it.\n        \n        \"Maybe we can shoot it?\" Idaho suggests.\n        \n        \"No, we might hit her!\" Al stops him.\n        \n        You all watch in horror as the woman disappears under the water, never to resurface again.\n        \n        \"Oh god!\" North Dakota covers her mouth in disbelief.\n        \n        \"Let's go,\" Virge says grimly.\n        *page_break\n        *goto northpath\n    #I will go south.\n        *set rebellion -10\n        *set tooknorth false\n        Virge, Al and Jersey welcome you to their group.\n        *if kansasdies = false\n            Kansas joins your side as well.\n            \n            \n        \"Why y'all don an atoll, the island is bordered by water on both outside and inside, creating narrow strips of land like that all throughout the island. The water has a beautiful turquoise hue to it and the weather is sunny and nice. Not too hot, just right.\n\nThis whole scenery fits a stereotypical description of a paradise-like island, yet you don’t feel like you are in heaven. More like the opposite. \n*page_break\nAfter walking through a dense forest for what feels like several hours, you enter a clearing and see something resembling a lighthouse in the distance. \n\nIt is a narrow metallic tower which stands on the edge of the northern tip of this side of the atoll. You can see what lies ahead of you, a shallow stretch of water with several smaller islands speckled throughout it, leading to the other side of the island, which you can barely make out from this distance.\n\n\"Do you think there's anyone up there?\" Utah asks, pointing at the top of the lighthouse. \n\nAs you climb over some rocks to get closer to it, you notice something odd about the tower. It has some kind of weapon at the top…\n\n\"RUN!\" Utah shouts as the tower begins to shoot at you!\n*choice\n    #Run back!\n        You leap back over the rocks to avoid the bullets and run in the direction you came from. You hear gunshots and screams behind you, but you dare not look back.\n        \n        The trees are getting closer, but there is still some distance between you and safety. \n        \n        You can only hope that the turret doesn't reach that far.\n        *page_break Your hope was in vain…\n        *goto bangdeath\n    #Hide behind the rocks!\n        *goto deathtower\n*label deathtower\n*set metidaho true\nYou leap over the large rock behind you and crouch, closing your ears from the loud gunshots and screaming. Several other survivors managed to hide beside you.\n\nSeconds feel like minutes as the gunshots eventually seize, after the turret took care of those who didn't manage to hide with you.\n\n\"What.. What are we supposed to do?!\" the man with the \"Idaho\" dog tag shouts.\n\n\"I think.. I might know what it is!\" Washington speaks up suddenly. You are frankly surprised he is still alive; his appearance is disheveled, his green tie hanging on his neck haphazardly.\n\n\"What do you mean?\" Utah asks.\n\n\"I think my company made these!\" he responds.\n\n\"You bastard! Are you behind all of this?!\" Idaho yells at him.\n\n\"I'm not, okay! All I know is that a few years ago we had the army coming to us and making a request to develop these things! I wasn't in charge of the project, but I know that the turrets have an advanced targeting system and can predict movements! We were quite proud of it, actually,\" he explains.\n\nThough you cannot recall Washington's name, you remember that he is a CEO of some tech company responsible for development of next-gen robotics. \n\n\"Why is it here anyway?\" Utah inquires.\n\n\"Probably to monitor the skies, I'd guess,\" Washington shrugs his shoulders.\n\n\"Do you know how to bypass it?\" you ask.\n\n\"Well.. I'm not sure it's possible..\" \n\nGreat…\n\nWhat should you do then?\n*choice\n    #\"Let's try to shoot it!\" you say.\n        \"Are you crazy?\" Utah exclaims.\n        \n        \"It's better then doing nothing,\" the woman with \"Kentucky\" dog tag chimes in as she prepares her pistol, \"Let's do it!\"\n        \n        You both stand up and unload your weapons at the turret, but whether your shots miss or the turret is much tougher than it looks, it is left unharmed.\n        *page_break Now it's the turret's turn…\n        *goto bangdeath\n    #\"There's gotta be a way to run past it!\" you say.\n        \"I'm not sure…\" Washington ponders.\n        \n        \"Screw that! We gotta shoot it before it shoots us!\" the survivor with \"Kentucky\" dog tag shouts and gets up with her gun pointed at the turret. She manages to fire a few shots, but the turret remains functional and deadly.\n        \n nd proceed to the other shore. \n                \n                The storm is still strong, but you manage to proceed without any more incidents.\n                *page_break\n                *goto forestsleep\n    #I slow down cautiously, like Utah.\n        You turn back and try to retrace your steps to the other side.\n        \n        \"This is abnormal! I've never seen this much lightning before!\"  Utah shouts, trying to speak over the storm, \"We should turn back!\"\n        \n        It's disheartening to go back to where you came from, but the storm is just too strong! That said, the waters are getting rougher and you recall there being some rocks in this part, which might be dangerous.\n        *choice\n            #I follow Utah.\n                You proceed on, but the wind is getting stronger and the waves pummel you from the side, almost causing you to fall off. \n                \n                Soon, another, larger wave sweeps you and the others off your feet and you are submerged underwater, where you hit a large rock with your head…\n                *page_break  The water takes you…\n                *achieve oceanwater\n                *check_achievements\n                *if (((((((((((((((((((((((((((((choice_achieved_firstdeath and choice_achieved_abyss) and choice_achieved_eliminated) and choice_achieved_timber) and choice_achieved_bloodonthesand) and choice_achieved_gotexploded) and choice_achieved_snakeeyes) and choice_achieved_sharkbait) and choice_achieved_lightning) and choice_achieved_hellfire) and choice_achieved_bangbang) and choice_achieved_exterminated) and choice_achieved_oceanwater) and choice_achieved_monstermadness) and choice_achieved_kamikaze) and choice_achieved_ivory) and choice_achieved_betrayal) and choice_achieved_rockbottom) and choice_achieved_frozen) and choice_achieved_shipwrecked) and choice_achieved_mutineer) and choice_achieved_hoosier) and choice_achieved_solesurvivor) and choice_achieved_castaway) and choice_achieved_laststraw) and choice_achieved_letitdie) and choice_achieved_fallguy) and choice_achieved_badluck) and choice_achieved_burnbabyburn) and choice_achieved_outsmarted)\n                    *achieve alldeaths\n                [b]DEAD END[b]\n                \n                You've met with a terrible fate, haven't you? Try again and see if you can make it further.\n                *ending\n            #I convince her to turn back.\n                *set utah +50\n                You catch up to her and shout, \"We can make it! It's too late to back away now!\"\n                \n                \"But..\" Utah turns to you, pure fear in her eyes, \"What about the storm?\"\n                \n                \"We can make it through!\" you reassure her.\n                \n                Utah sighs and nods, \"Okay, let's go!\"\n                \n                You both dash back towards the opposite shore and shortly after feel a powerful wave sweeping the people right behind you.\n                \n                You turn to see what happened, and don't see them anywhere.\n                *page_break The sea took them...\n                *set floridadies true\n                *achieve floridaded\n                You turn back, managing to dodge a strong gust of wind and witness a surreal scene as Florida is dancing on a tiny island in the middle of the lagoon ahead of you. \n                \n                You question her judgement, but what happens next is even more insane.\n                \n                A lightning strikes her…\n                \n                You stare at her lifeless body on the sand as you bypass the island entirely and continue moving forward.\n                *page_break\n                *goto forestsleep\n    #I proceed at my own pace.\n        *if (egoism \u003c= 80)\n            *set egoism +20\n        *set utahdies true\n        *achieve utahded\n        *set floridadies true\n        *achieve floridaded\n        You continue moving forward at the same speed as before.\n        \n        You hear a sound of a large wave crashing behind you and turn around, witnessing Utah and a few other survivors who decided to turn back, being swept by the large wave and pushed under the water, never to resurface again.\n        \n        You continue on, making steady progress as you get closer to a small island where Florida is already prancing around celebratorily as lightnings strike all around her.\n        \n        Moments later, one of the lightnings strikes her as well, leaving her lifeless body lying on the sand in front of you.\n        \n        You move forward, getting closer and closer to the other side.\n        *page_break\n        *goto forestsleep\n*label forestsleep\nAs you move towards the other shore, you spot something you did not expect to see anytime soon — a settlement.\n\nArranged neatly in a small cluster near the shore, the one-storey houses are standing in front of you, their dark windows looking like the empty eye sockets of a skull.\n\nYou and the remaining survivors reach the shore, where the storm is not as severe, and examine the small settlement.\n*page_break\nYou get inside one of the houses and find it to be empty inside, aside from a table and a bedframe.\n\nAfter looking through the other houses, you conclude that the place is abandoned, no people in sight or even any traces of anyone living here at any point.\n\nWell, at least you have a place to sleep now. The others pick the houses they like and start preparing for the night. \n\nYou decide to do the same, but before you go to bed you have a chance to speak to another survivor if you wish.\n*fake_choice\n    *if (floridadies = false) #I speak to Florida.\n        *set florida +10\n        \"Hoo boy! That was one hell of a show, wasn't it?\" she shouts as she wrings her orange jumpsuit in front of you, not at all bothered by the fact that she is barely clothed.\n        \n        \"You almost got yourself killed out there,\" you reprimand her, \"Please don't do that again!\"\n        \n        \"Oh?\" she turns to you with a surprised expression and raises her arms to her cheeks, \"Aww! You care about me, don't you? That's so sweet!\"\n        \n        \"Of course I do,\" you say, surprised and slightly offended by this reaction, \"The question is; do you care about yourself?'\n        \n        Florida's smile disappears as her expression becomes more serious, \"There isn't much out there for me, you know. If I get back, I'll just end up in prison again. What's the point? At least here I can have some fun.\"\n        \n        \"I.. I think I know what you mean,\" you say, not sure where that feeling came from, \"But you shouldn't throw your life away. I.. I don't want you to get hurt.\"\n        \n        \"Thanks,\" she says calmly a she prepares her bed, \"I don't want you to get hurt either..\"\n        \n        You stand there for a few moments in silence, not knowing what else to say, then leave her alone, pondering the words she said. Somehow, they feel important. It's as if you have spoken to the real Florida for the first time since you've known her.\n        \n        \n        *goto lightrest\n    *if (kansasdies = false) #I speak to Kansas.\n        *set kansas +10\n        *if cahootswithindy = false\n            You find them in another room sitting on the barren bed.\n            \n            They look more spaced out than usual and you decide to break the ice, \"How are you holding up?\"\n            \n            Kansas doesn't respond right away, but then turns to you, \"So many people.. They all died.\"\n            \n            You sigh, not sure what to say next, but to your surprise, Kansas continues:\n            \n            \"I.. It reminds me of what happened.. Back home.\"\n            \n            \"Do you remember how you got here?\" you ask hopingly.\n            \n            \"No. But.. I remember why I don't want to go back…\" they say as their expression sours, \"I hurt them.. My family. They are… dead. Just like the others.\" \n            \n            You study their face for a moment before speaking quietly, \"What happened?\"\n            \n            Kansas frowns for a few moments, looking lost, \"I.. Can't remember. Why? I.. killed them. It was an accident.. I think? Why can't I remember how it happened?\" \n            \n            They look distraught and you give them a hug, \"It's okay, we'll find out the truth when we get out of here,\" you say, reassuringly.\n            \n            Kansas nods and lies down on their bed. You decide to let them rest.\n            \n            \n            *goto lightrest\n        *if cahootswithindy = true\n            You find them in another room sitting on the barren bed.\n            \n            You sit next to Kansas, who turns to you and looks straight into your eyes. \n            \n            \"I know what you are planning,\" they say.\n            \n            What? Are they talking about what you think they're talking about? No way! \n            \n            Right?\n            \n            \"Don't worry, I'm not going to tell anyone,\" Kansas says calmly.\n            \n            \"You want to join us then?\" you ask.\n            \n            \"No, I simply don't care one way or the other. If you want to be the only one left alive, go ahead.\"\n            \n            \"Do you realize that means I'm going to have to kill you?\" you say quietly.\n            \n            \"Do as you wish. You chose to prevent me from dying, might as well choose to prevent me from living as well.\"\n            \n            You frown at the cryptic statement, but decide to leave them be. They are probably telling the truth about keeping your secret, but you never know for sure. Perhaps you'll have to take care of them soon…\n            \n            \n            *goto lightrest\n    *if (utahdies = false) #I speak to Utah.\n        *set utah +10\n        Utah looks petrified and barely registers your presence as you approach her.\n        \n        \"This seems so.. suspicious,\" she says, speaking to herself more than to you.\n        \n        \"What is?\" you ask.\n        \n        \"This.. town.. Why is it here? Why was it abandoned? What if it's a trap? We can't sleep here, we need to keep moving!\" she mumbles. \n        \n        \"I understand, but it's too dangerous to continue in this storm and we're all tired,\" you explain.\n        \n        \"I know. It's just… this place is too weird. It's like.. last thing I remember I was at my apartment in Provo and now.. I'm here.. It just doesn't feel real, you know?' she turns to you.\n        \n        \"Yeah..\" you sigh, \"But at least we're getting closer to.. finding a way out.\"\n        \n        \"Do you really think so? The way things are going so far, the only thing we'll find on this side of the island is more death and misery,\" she states grimly.\n        \n        \"That is.. possible,\" you admit, \"But we will be fine, as long as we don't give up and look out for each other,\" you say.\n        \n        \"Thank you,\" she sigh, \"I feel a bit better now, guess a little conversation goes a long way, huh?\"\n        \n        You smile and she gives you a hug, before starting to prepare for bed. \n        \n        \n        *goto lightrest\n    #I keep to myself.\n        *if (egoism \u003c= 90)\n            *set egoism +10\n        You keep to yourself and overhear a conversation between Washington and Idaho coming from another room. \n        \n        \"So why do you think you ended up here?\" Idaho asks him.\n        \n        \"I don't know, but I start to suspect that my colleagues wanted to get rid of me.\" Washington responds. \n        \n        \"Why?\"\n        \n        \"Look, I know that the technology we've developed, as advanced as it may be, has been devastating to workers whose jobs were automated. I proposed a solution in which the workers whose jobs were replaced are compensated by the company and are offered parts of my company's shares. The board of directors wasn't a fan of that idea..\"\n        \n        \"And you think they put you here for that?'\n        \n        \"It's possible,\" Washington sighs. \n        \n        \"You know, I really thought you were an asshole, but you seem alright.\" Idaho says and gives Washington a pat on the shoulder. \n        \n        Aww, it's nice to see these two being friendly to each other, but how long would that last?\n        \n        \n        *goto lightrest\n*label lightrest\nYou return to your own room and try to fall asleep. The storm isn't getting any weaker; lightnings flash rapidly outside. Nonetheless, you do your best to ignore the sound of rolling thunder and howling winds  as you try to rest.\n*page_break\n*goto firestarts\n*label firestarts\nYou jolt awake in the middle of the night from a distinct smell of something burning. You look out the window and are horrified to see one of the buildings engulfed in fire!\n\nYou run outside, where you find some of the other survivors. \n\n\"The lightning struck it and started a fire!\" Idaho shouts.\n\n\"Is anyone inside?\" you ask. \n\n\"I.. I think that lady from North Dakota and the old man from Vermont are in there..\" he says, his voice trembling.\n*choice\n    #I run in to save them! \n        You run outside and jump into the window of the burning building, where you find the woman from North Dakota desperately trying to wake up the old man lying on the bed.\n        \n        You run up to help her, but Vermont is unconscious and doesn't wake up no matter how hard you try. \n        \n        You decide to carry him out of the building together, but just when you two pick him up, the roof suddenly collapses on top of you.\n        \n        You cover your mouth to prevent yourself from inhaling the smoke, but you have another problem…\n        \n        You are on fire…\n        \n        The hellish pain strikes you; it almost feels like being doused with ice-cold water, only far worse. You scream in pain as the rest of your body engulfs in flames, before losing consciousness due to overwhelming pain.\n        *page_break It burns!!!\n        *achieve hellfire\n        *check_achievements\n        *if (((((((((((((((((((((((((((((choice_achieved_firstdeath and choice_achieved_abyss) and choice_achieved_eliminated) and choice_achieved_timber) and choice_achieved_bloodonthesand) and choice_achieved_gotexploded) and choice_achieved_snakeeyes) and choice_achieved_sharkbait) and choice_achieved_lightning) and choice_achieved_hellfire) and choice_achieved_bangbang) and choice_achieved_exterminated) and choice_achieved_oceanwater) and choice_achieved_monstermadness) and choice_achieved_kamikaze) and choice_achieved_ivory) and choice_achieved_betrayal) and choice_achieved_rockbottom) and choice_achieved_frozen) and choice_achieved_shipwrecked) and choice_achieved_mutineer) and choice_achieved_hoosier) and choice_achieved_solesurvivor) and choice_achieved_castaway) and choice_achieved_laststraw) and choice_achieved_letitdie) and choice_achieved_fallguy) and choice_achieved_badluck) and choice_achieved_burnbabyburn) and choice_achieved_outsmarted)\n            *achieve alldeaths\n        [b]DEAD END[b]\n        \n        You've met with a terrible fate, haven't you? Try again and see if you can make it further! :)\n        *ending\n    #No, it's too late for them.\n        *set nddies true\n        *set idahodies true\n        \"Let's go! it's too dangerous!\" Washington shouts. \n        \n        \"That ain't right!\" Idaho responds as he runs into the burning building through its open window. \n        \n        Moments later, the roof of the house collapses, right on top of him and the two survivors inside.\n        \n        \"Come on!\" Washington shouts to you and you run out of this forsaken town as the other houses catch on fire, soon engulfing the entire settlement in flames.\n        \n        The sky is lighting up with the early light of dawn. No point of trying to sleep now, not that you would be able to anyway after what happened. You and the remaining survivors press on, headed south, towards your destination.\n        *finish\n*label southpath\n\"See you on the other side!\" Florida waves to you as you follow Virge and the others southward and the other group soon disappears out of your view.\n\nYou walk along a narrow strip of land and can see the water some twenty feet or so on either side from you. It's quite picturesque, actually.\n\nBeing an atoll, the island is bordered by water on both outside and inside, creating narrow strips of land like that all throughout the island. The water has a beautiful turquoise hue to it and the weather is sunny and nice. Not too hot, just right.\n\nThis whole scenery fits a stereotypical description of a paradise-like island, yet you don’t feel like you are in heaven. More like the opposite. \n*page_break\nA shout distracts you from your musings. \n\n\"Hey, what's that!\" York points at something on the ground.\n\n\"What the…\" Jersey utters.\n\nYou come closer and see something that looks like a series of circular indentations in the sand. Upon closer inspection, you realize that those are tracks and they are not human.\n\n\"What kind of critter is this?\" Nebraska comments, \"Doesn't look like anything I've ever seen.\"\n\n\"Could it be a bear or something?\" Al wonders.\n\n\"Not with tracks like these,\" Virge shake his head.\n\n\"Hey guys, what if it's bigfoot?!\" York interjects, looking worried.\n\nJersey gives him a dirty look.\n\n\"Hold on to your weapons, people,\" Virge commands as you proceed forward, approaching the forest ahead.\n*page_break\nYou enter the forest as there is no other way to bypass it and continue on. The sounds of the forest surround you, leaves rustling, bugs flying around and the numerous twigs you crush under your feet a you walk forward. \n\nEven though you haven't been walking all that long, the combination of scorching sun and dense, difficult to cross terrain of the forest make you feel pretty tired already. \n\n\"I'm sure the forest isn't too big; we should be more than halfway through by now,\" Al speaks up, as if he's soothing your concerns. Delaware sleeps peacefully in his arms..\n\n\"Did you hear that?\" Indiana stops, looking around.\n\nEveryone stops in their tracks as well. For a moment there's no sound, but then the rustling of leaves and the sound of broken branches can be heard ahead. \n\nThe sounds get closer and closer… \n\nThen they stop.\n*page_break \"ROOOOO!!!!'\nThe bloodcurdling sound assaults your ears and you instinctively cover them. It sounds like some kind of haunted trumpet. One of the survivors screams and you see her body fly in front of you before it hits the trees.\n\nYou want to look, but decide to run instead, away from the giant creature. You barely get a glimpse at it, but it's definitely larger than a normal human and has a gray skin tone.\n\nYou run through the forest as tree branches and shrubs scratch at your legs and arms. You manage to get far enough to feel somewhat safer and you look back.\n*page_break\nThe bushes in front of you rustle again, the survivor next to you points his gun and shoots at them in panic. You hear a low moan of pain coming from that direction, then it stops.\n\nThat did not sound like the creature. \n\nThe trees near you fall over as the giant creature suddenly lands near you. It's body is gray, but it looks quite humanoid, the head of the monster looks like that of an elephant and it is large and bulky. It turns to you with its black eyes, staring intently. \n\nYou hear a gunshot come from the survivor from earlier. At least this time he hit the right target. The monster lets out another trumping sound like that of a pissed off elephant and unleashes its attack on the man who shot it. \n\nYou take the chance to run away and quickly cross paths with Jersey and Delaware.\n\n\"We gotta kill this fucking thing!\" Jersey shouts as he wipes the sweat off his glasses.\n\n\"It's too dangerous, we need to get out of here!\" Al argues as he clutches baby Delaware in his arms, who seems to be looking at you with curiosity.\n\n\"Forget it, I'll do it myself then!\" Jersey responds and runs off to attack the monster, while Al starts making his way out of the forest. \n\nWhat do you do?\n*choice\n    #I attack the monster with Jersey.\n        *if (violence \u003c= 90)\n            *set violence +10\n        You run after Jersey, who is making his way forward with his gun at the ready. You hear screams and sounds of combat ahead and you proceed. \n        \n        You get to a clearing and find a gored body of one of the survivors in the middle of it with the monstrous creature standing above it. It turns towards you.\n        \n        Jersey cocks his gun, but doesn't shoot yet. He glances in your direction.\n        *choice\n            #\"Let's do it!\"\n                Jersey nods and shoots at the monster. The creature lets out a pained moan, but only seems to get angrier as it moves in your direction.\n                \n                *if mainegun = true\n                    You try to shoot at the monster too, but it simply stops the bullet with its \"hand\", than grabs your arm with the gun and crushes it.\n                    \n                    You feel an unbelievable pain in your arm, but it passes quickly as the monster does the same to your head…\n                    *page_break Ouch…\n                    *achieve monstermadness\n                    *check_achievements\n                    *if (((((((((((((((((((((((((((((choice_achieved_firstdeath and choice_achieved_abyss) and choice_achieved_eliminated) and choice_achieved_timber) and choice_achieved_bloodonthesand) and choice_achieved_gotexploded) and choice_achieved_snakeeyes) and choice_achieved_sharkbait) and choice_achieved_lightning) and choice_achieved_hellfire) and choice_achieved_bangbang) and choice_achieved_exterminated) and choice_achieved_oceanwater) and choice_achieved_monstermadness) and choice_achieved_kamikaze) and choice_achieved_ivory) and choice_achieved_betrayal) and choice_achieved_rockbottom) and choice_achieved_frozen) and choice_achieved_shipwrecked) and choice_achieved_mutineer) and choice_achieved_hoosier) and choice_achieved_solesurvivor) and choice_achieved_castaway) and choice_achieved_laststraw) and choice_achieved_letitdie) and choice_achieved_fallguy) and choice_achieved_badluck) and choice_achieved_burnbabyburn) and choice_achieved_outsmarted)\n                        *achieve alldeaths\n                    [b]DEAD END[b]\n                    \n                    You've met with a terrible fate, haven't you? Try again and see if you can make it further! :)\n                    *ending\n                *if mainegun = false\n                    You dodge the monster's attack and consider what to do as Jersey keeps shooting at it from behind to no avail.\n                    \n                    The monster swats him aside, then turns towards you.\n                    \n                    You try to back away from it, but end up tripping over a tree branch and falling prone in front of it. Shit!\n                    \n                    The monster raises its stumpy leg and is about to stomp on you when Jersey jumps on its back and shoves something in its mouth.\n                    \n                    \"Die, you motherfucker!!!\" he shouts through his teeth.\n                    \n                    You realize that Jersey just put a grenade in the elephant man's mouth and you both are mere feet away from it. Great…\n                    *page_break BOOOM!!!\n                    *achieve kamikaze\n                    *check_achievements\n                    *if (((((((((((((((((((((((((((((choice_achieved_firstdeath and choice_achieved_abyss) and choice_achieved_eliminated) and choice_achieved_timber) and choice_achieved_bloodonthesand) and choice_achieved_gotexploded) and choice_achieved_snakeeyes) and choice_achieved_sharkbait) and choice_achieved_lightning) and choice_achieved_hellfire) and choice_achieved_bangbang) and choice_achieved_exterminated) and choice_achieved_oceanwater) and choice_achieved_monstermadness) and choice_achieved_kamikaze) and choice_achieved_ivory) and choice_achieved_betrayal) and choice_achieved_rockbottom) and choice_achieved_frozen) and choice_achieved_shipwrecked) and choice_achieved_mutineer) and choice_achieved_hoosier) and choice_achieved_solesurvivor) and choice_achieved_castaway) and choice_achieved_laststraw) and choice_achieved_letitdie) and choice_achieved_fallguy) and choice_achieved_badluck) and choice_achieved_burnbabyburn) and choice_achieved_outsmarted)\n                        *achieve alldeaths\n                    [b]DEAD END[b]\n                    \n                    You've met with a terrible fate, haven't you? Try again and see if you can make it further! :)\n                    *ending\n                *ending\n            #\"Wait, maybe it'll go away?\"\n                Jersey raises an eyebrow at your words, but does not shoot at the monster. The monster stares at the two of you with its large, black eyes, but then turns around and walks away from you.\n                \n                Before you can decide your next course of action, an explosion rocks the ground in front of you and you both fall on your backs. When you get up, you see the creature lying lifeless on the ground and hear several footsteps approaching you.\n                \n                It's Virge with a few other survivors. Virge is holding another grenade in his arm, prepared to use it, while the people around him point their guns at the fallen monster.\n                \n                \n                *goto monsterdown\n    #I get to safety with Al.\n        *if (violence >= 10)\n            *set violence -10\n        You run after Al, who is making his way in the direction opposite to that of where the monster was last heard. You're not sure whether this is the path out of the forest and you bet Al doesn't either, but it's gotta be better than dealing with the creature.\n        \n        You continue like this, then you hear loud rustling noises coming from behind you. You turn around, hoping to see the other survivors following your example, but instead see the ominous figure of the elephant man approaching you quickly.\n        *choice\n            #Run!\n                You both wisely decide to run as quickly as possible, away from the creature.\n                \n                However, no matter how fast you try to run, you can feel the creature catching up to you quickly.\n                \n                You push yourself as hard as possible, running and jumping over fallen trees and rocks and soon see a beach in the distance, visible through the foliage!\n                \n                !!!\n                \n                An immense pain bursts through your stomach as you see the long white tusk protruding from it.\n                \n                You've been impaled!\n                \n                You feel your body being lifted off the ground by the monster's head and lose your consciousness as it shakes you off its tusk…\n                *page_break Forever…\n                *achieve ivory\n                *check_achievements\n                *if (((((((((((((((((((((((((((((choice_achieved_firstdeath and choice_achieved_abyss) and choice_achieved_eliminated) and choice_achieved_timber) and choice_achieved_bloodonthesand) and choice_achieved_gotexploded) and choice_achieved_snakeeyes) and choice_achieved_sharkbait) and choice_achieved_lightning) and choice_achieved_hellfire) and choice_achieved_bangbang) and choice_achieved_exterminated) and choice_achieved_oceanwater) and choice_achieved_monstermadness) and choice_achieved_kamikaze) and choice_achieved_ivory) and choice_achieved_betrayal) and choice_achieved_rockbottom) and choice_achieved_frozen) and choice_achieved_shipwrecked) and choice_achieved_mutineer) and choice_achieved_hoosier) and choice_achieved_solesurvivor) and choice_achieved_castaway) and choice_achieved_laststraw) and choice_achieved_letitdie) and choice_achieved_fallguy) and choice_achieved_badluck) and choice_achieved_burnbabyburn) and choice_achieved_outsmarted)\n                    *achieve alldeaths\n                [b]DEAD END[b]\n                \n                You've met with a terrible fate, haven't you? Try again and see if you can make it further! :)\n                *ending\n            #Stand your ground!\n                *if mainegender = 1\n                    You quickly get your gun out and shoot at the monster. Whether you are a trained marksperson or just that darn lucky, you hit it in the eye.\n                    \n                *if mainegender = 2\n                    You quickly get your gun out and shoot at the monster. Whether you are a trained markswoman or just that darn lucky, you hit it in the eye.\n                    \n                *if mainegender = 3\n                    You quickly get your gun out and shoot at the monster. Whether you are a trained marksman or just that darn lucky, you hit it in the eye.\n                \n                The monster roars and backs away from you, giving you the time to resume your running, but before you can get even thirty feet away from it, a powerful shock wave sends you and Al falling on the forest floor.\n                \n                Thankfully, Al managed not to hurt Delaware in the fall, though he paid for it with his shoulder, which hit a tree with a loud thump.\n                \n                As you get up, you see the creature lying lifeless on the ground and hear several footsteps approaching you.\n                \n                Its Virge and a few other survivors. Virge is holding another grenade in his arm, prepared to use it, while the people around him point their guns at the fallen monster.\n                \n                \n                *goto monsterdown\n*label monsterdown\nYou fully get back on your feet and try to stop your knees from shaking, which doesn't work.\n\nYou get closer to the creature's mangled body and notice something bizarre, even more bizarre than a humanoid elephant-man lying before you. \n*page_break It has a dog tag on its neck.\n*set montanakilled true\nIt reads \"Montana\".\n\n\"What can that possibly mean?\" Indiana looks it over.\n\n\"This is..\" York tries to speak, but struggles, \"There wasn't a survivor with this dog tag from the ones we've seen, but if this was one of the fifty, they ran off before we all woke up.\"\n\n\"I thought I saw something like that,\" the usually quiet Nebraska speaks, \"I figured it was just a nightmare or something, but I saw a silhouette like that when I woke up that day, I was close to the bunker, near the forest.\"\n\n\"So this was one of the survivors, but what is.. are they?\" Al asks, walking up to you.\n\n\"It's gotta be some sort of experiment, this whole place has gotta be some kinda freaky science lab and we are the lab rats!\" Jersey responds.\n\n\"Are we gonna end up like that too?\" York is worried.\n\n\"If Nebraska is telling the truth, than this fella was already like this, so maybe not,\" the woman from Tennessee comments.\n\n\"We need to continue on, we can't stay here,\" says Virge.\n\n\"What if there are more monsters out there?\" York asks.\n\n\"We know what to do with them,\" Virge responds, reloading his shotgun.\n*page_break\nYou and the remaining survivors continue on and soon finally make it out of the forest. \n\nThe sight is almost teasing: it's a beautiful day as you find yourselves on a narrow beach, surrounded by water on both sides. It's as if the island is mocking you with its serenity, considering what just happened. \n\nThat said, when you look north you notice dark clouds on the horizon. The storm is coming, so you'd better hurry.\n\nSoon, you enter another overgrown area, this one is partially underwater, turning it into a swamp. \n\nThankfully, there seems to be a path going through the swamp, so your progress is not slowed down as you make your way through it.\n*if cahootswithindy = true\n    You stay behind the crowd, so that you and Indiana have more opportunity to discuss your strategy.\n    \n    He walks closer to you and says, \"I'm guessing the people who put us here are extremely powerful, and what would be the point to capture random people like us? Some kind of game, I'm guessing. I wouldn't be surprised if they put bets on each of us, and whoever is left alive wins.\"\n    \n    \"But how many survivors could there be at the end?\" you ask.\n    \n    \"Probably just one, but for the sake of our partnership, let's hope it's at least two,\" he smiles.\n    \n    \"So when do we do it?\"\n    \n    \"Not now, as you can see people are pretty good at dying on their own anyway, but it might change if there is something on the other side. For now we'll wait and observe,\" he explains.\n    \n    \"Oh and one more thing,\" he says, turning to you, \"When the time comes, we'll need to be ready to be ruthless, no matter how much sympathy you might have for the other survivors or any particular one of them, you need to be ready to take action. Do you understand?\" he puts his arms on your shoulders in a friendly manner, his voice sounding way too warm for the subject matter. \n    *choice\n        #\"I understand.\"\n            *if (cooperation >= 20)\n                *set cooperation -20\n            \"I'm glad you understand how serious this situation is,\" he says, looking into your eyes.\n            \n            You nod and proceed forward, where you see the other survivors standing in a small crowd, hesitant to move forward.\n            *page_break\n            *goto swampdilemma\n        #\"I can't do it.\"\n            \"You have a good heart,\" he says understandingly, \"I'm sorry I dragged you into this. It's a real shame…\" he looks into your eyes, \"..for you.\"\n            \n            You lose your balance as he pushes you off the precarious walking path and you fall into the dirty swamp water. You try to get up, but feel your legs sinking in the viscous quicksand below.\n            \n            \"Help!!! Maine fell into the swamp!!!\" Indiana shouts on top of his lungs, overpowering your own screams as you curse him for his treachery.\n            *page_break \"You betrayed me!\"\n            *achieve betrayal\n            *check_achievements\n            *if (((((((((((((((((((((((((((((choice_achieved_firstdeath and choice_achieved_abyss) and choice_achieved_eliminated) and choice_achieved_timber) and choice_achieved_bloodonthesand) and choice_achieved_gotexploded) and choice_achieved_snakeeyes) and choice_achieved_sharkbait) and choice_achieved_lightning) and choice_achieved_hellfire) and choice_achieved_bangbang) and choice_achieved_exterminated) and choice_achieved_oceanwater) and choice_achieved_monstermadness) and choice_achieved_kamikaze) and choice_achieved_ivory) and choice_achieved_betrayal) and choice_achieved_rockbottom) and choice_achieved_frozen) and choice_achieved_shipwrecked) and choice_achieved_mutineer) and choice_achieved_hoosier) and choice_achieved_solesurvivor) and choice_achieved_castaway) and choice_achieved_laststraw) and choice_achieved_letitdie) and choice_achieved_fallguy) and choice_achieved_badluck) and choice_achieved_burnbabyburn) and choice_achieved_outsmarted)\n                *achieve alldeaths\n            [b]DEAD END[b]\n            \n            You've met with a terrible fate, haven't you? Try again and see if you can make it further! :)\n            *ending\n*goto swampdilemma\n*label swampdilemma\nYou notice something that looks concerning — a rickety wooden bridge going across a large chunk of the swamp. \n\nThe water looks dirty green and is filled with lilies. It's almost beautiful, but you wouldn't want to fall into it.\n\nThe others are hesitant to move forward as the bridge looks too old and decrepit, with parts of it deteriorated completely.\n\n\"So what do we do now?\" York asks with audible concern in his voice.\n\n\"This seems risky, there's gotta be another path,\" Tennessee comments, touching the bridge cautiously.\n\n\"Perhaps, but we should press forward if we don't want to deal with the storm,\" Virge responds. \n\n\"Fuck it, I'll check if it's safe,\" Jersey spits and steps forward. \n\n\"I'm with you,\" Al says and hands baby Delaware to Tennessee, \"Hold on to them, please.\" \n\nThe two approach the bridge and start crossing it slowly. The bridge creaks like an old door, but seems to be sturdy enough, until they get to the middle…\n\nCRACK!!!\n\nBoth men fall into the murky waters as the middle segment of the bridge falls away completely.\n\nThey try to swim out, but are seemingly stuck. Quicksand!\n\n\"No! We gotta save them!\" York shouts. \n*choice\n    #I run to help Al.\n        *set jerseydies true\n        *set al +50\n        *if (egoism >= 10)\n            *set egoism -10\n        *achieve jerseyded\n        You dash towards the old bridge and get to the broken middle part of it, from which you stretch out your hand towards Al for him to grab on.\n        \n        Thankfully, the bridge doesn't collapse any further and you manage to pull him up.\n        \n        \"Thank you!\" he shouts, then turns back, \"We need to get him out!\"\n        \n        However, when you try to look for Jersey, all you see is his arm stretching out of the water before submerging into the deadly depths below. Only his glasses remain afloat; a grim remainder of his existence.\n        \n        You help Al get back on his feet, the murky swamp water dripping from his clothes, as you get back to the other survivors, who look at the scene in horror.\n        \n        \"We need to move forward,\" Virge says grimly, and you follow his advice.\n        *page_break\n        *goto cavesleep\n    #I run to help Jersey.\n        *set aldies true\n        *set jersey +50\n        *if (egoism >= 10)\n            *set egoism -10\n        *achieve alded\n        You dash towards the old bridge and get to the broken middle part of it, from which you stretch out your hand towards Jersey for him to grab on.\n        \n        Thankfully, the bridge doesn't collapse any further and you manage to pull him up.\n        \n        \"I owe you one!\" he shouts, then turns back, \"Fuck, we need to get him out!\"\n        \n        However, when you try to look for Al, all you see is his arm stretching out of the water before submerging into the deadly depths below. It's over…\n        \n        You help Jersey get back on his feet, the murky swamp water dripping from his clothes, as you get back to the other survivors, who look at the scene in horror.\n        \n        Delaware looks at the swamp with an unreadable expression as Tennessee clutches him in her arms.\n        \n        \"We need to move forward,\" Virge says grimly, and you follow his advice.\n        *page_break\n        *goto cavesleep\n    #I stay where I am.\n        *if (egoism \u003c= 80)\n            *set egoism +20\n        *set aldies true\n        *set jerseydies true\n        *achieve jerseyded\n        *achieve alded\n        You stay put and observe as the other survivors rush to Al and Jersey's rescue. \n        \n        Despite their best efforts, both men succumb to the horrifying quicksands of the swamp.\n        *if cahootswithindy = true\n            Indiana walks up to you and pats you on the shoulder, giving you an approving smile.\n        *page_break Al and Jersey are no more…\n        *goto cavesleep\n*label cavesleep\nYou and the remaining survivors press on and, after some searching, you manage to find a way to bypass the broken bridge entirely.\n*if cahootswithindy = false\n    If only you knew about it an hour ago…\n\nYou make your way out of the swamp and continue walking on the narrow sand bar heading north as you see the clouds getting even darker in the distance. They are getting closer…\n\n*if aldies = true\n    \"The weather is worsening, we need to find some shelter!\" Tennessee shouts, shielding Delaware from the intensifying wind.\n    \n*if aldies = false\n    \"We need to find shelter! It's too dangerous to continue in the rain!\" Al shouts, shielding Delaware from the intensifying wind.\n\n*if cahootswithindy = false\n    The dark clouds came from the north, you hope the other group is alright, but you have to worry about yourself as well.\n\nYou speed up your pace and see a cave entrance in the distance.\n\n\"Let's check it out!' Virge says and you follow him. \n\nYou get to the entrance and find a large enough cave for you and the other survivors inside. \n\n\"Not a five star hotel, but it should do,\" Indiana comments.\n\nYou get inside the spacious cave and try to find the most comfortable place for the night. You don't find any, but your options are limited so you make do with what you've got, finding a place to sleep on some rocks in the corner of the \"room\".\n\nThe howling of the wind outside is getting stronger and you hear the sounds of thunder in the distance.\n\n\"The storm is coming from the north; I hope the other team is okay,\" York comments, curled up in the corner.\n\n\"We'll meet them tomorrow, don't worry,\" Nebraska reassures him.\n\nIt's hard to fall asleep at a place like this, so you wonder if you should spend some time talking to another survivor?\n*fake_choice\n    *if (aldies = false) #I talk to Al.\n        *set Al +10\n        You shuffle closer to Al, who has a sorrowful expression on his face. He doesn't notice your presence at first, then turns to you and gives you a tired smile.\n        \n        \"Are you.. Is your spot okay? We can switch if it's too rough,\" he says.\n        \n        \"No, thanks, I just wanted to talk to you,\" you say, though admittedly, a part of you wouldn't mind sleeping on Al's spot, preferably with him next to you.\n        \n        \"Thank you,\" he smiles, \"I'm not entirely sure what to talk about, frankly, although being in this cave does remind me of the time I went camping with my parents. I was not much older than Delaware here,\" he looks at the sleeping infant cradled in his arms. \n        \n        \"You also camped in a cave?\" you ask.\n        \n        \"No, I don't remember a cave, but it's just..\" he looks at the other survivors, most of whom are already sleeping or attempting to, \"It's just that we are all like.. almost like a family now, I feel.\"\n        \n        \"Yeah, I think I know what you mean,\" you say, looking at the others as well. These people, whom you've only known for just a few days, seem like someone close to you now. That's what makes every loss of life that much more painful…\n        \n        \"I don't want to see anyone else get hurt,\" he says, as if reading your thoughts, \"I hope we can all get out of here safely.\" \n        \n        You nod in agreement, not knowing what else to say, and with that, your conversation seems to be over.\n        *page_break\n        *goto caveceiling\n    *if (kansasdies = false) #I talk to Kansas.\n        *set kansas +10\n        *if cahootswithindy = false\n            You take a seat next to them, which is to say you sit on a more prominent rock next to theirs\n            \n            They look more spaced out than usual and you decide to break the ice, \"How are you holding up?\"\n            \n            Kansas doesn't respond right away, but then turns to you, \"So many people.. They all died.\"\n            \n            You sigh, not sure what to say next, but to your surprise, Kansas continues:\n            \n            \"I.. It reminds me of what happened.. Back home.\"\n            \n            \"Do you remember how you got here?\" you ask hopingly.\n            \n            \"No. But.. I remember why I don't want to go back…\" they say as their expression sours, \"I hurt them.. My family. They are… dead. Just like the others.\" \n            \n            You study their face for a moment before speaking quietly, \"What happened?\"\n            \n            Kansas frowns for a few moments, looking lost, \"I.. Can't remember. Why? I.. killed them. It was an accident.. I think? Why can't I remember how it happened?\" \n            \n            They look distraught and you give them a hug, \"It's okay, we'll find out the truth when we get out of here,\" you say, reassuringly.\n            \n            Kansas nods and lies down on their bed. You decide to let them rest and get back to your spot.\n            *page_break\n            *goto caveceiling\n        *if cahootswithindy = true\n            You sit next to Kansas, who turns to you and looks straight into your eyes. \n            \n            \"I know what you are planning,\" they say.\n            \n            What? Are they talking about what you think they're talking about? No way! \n            \n            Right?\n            \n            \"Don't worry, I'm not going to tell anyone,\" Kansas says calmly.\n            \n            \"You want to join us then?\" you ask.\n            \n            \"No, I simply don't care one way or the other. If you want to be the only one left alive, go ahead.\"\n            \n            \"Do you realize that means I'm going to have to kill you?\" you say quietly.\n            \n            \"Do as you wish. You chose to prevent me from dying, might as well choose to prevent me from living as well.\"\n            \n            You frown at the cryptic statement, but decide to leave them be. They are probably telling the truth about keeping your secret, but you never know for sure. Perhaps you'll have to take care of them soon…\n            *page_break\n            *goto caveceiling\n    *if (jerseydies = false) #I talk to Jersey.\n        *set jersey +10\n        \"How are you holding up?\" you address him.\n        \n        Jersey gives you a frown and speaks, \"What do you think? I'm fucking done with this shithole!\"\n        \n        \"We'll find a way out,\" you say, trying to reassure him.\n        \n        \"Nah, that's not enough. I will find the asshole who put us in this putrid pile of piss and I'll shove a grenade up their ass!\" he says with a twinkle of bloodlust in his eyes. Even his skin has seemingly gotten redder with rage.\n        \n        \"O-kay.. I would like to see that,\" you say and pat him on the shoulder. He doesn't respond and you decide to leave him be. He probably needs rest even more than you do.\n        *page_break\n        *goto caveceiling\n    #I stay by myself.\n        *if (egoism \u003c= 90)\n            *set egoism +10\n        You lie down on your makeshift bed (if you can even call it that) and stare at the cave's ceiling as you overhear a quiet conversation between two other survivors. \n        \n        \"I miss them both. A lot,\" the man from Nebraska speaks.\n        \n        \"I know, I miss my wife so much,\" the woman from Tennessee responds, \"She must be so confused that I'm not around; the poor thang can barely cook on her own!\" she adds with a chuckle.\n        \n        \"Do you have kids?\" Nebraska asks.\n        \n        *if aldies = false\n            \"No, do you?\"\n            \n            \"Yeah, a daughter. I.. I just wish I could see her again,\" the man sighs and sobs quietly.\n            \n        *if aldies = true\n            \"Nope. That's why I'm taking care of this little thang now,\" she looks at baby Delaware in her arms, \"We'll call it practice, okay?\"\n            \n            Delaware doesn't react as they sleep peacefully.\n            \n            \"I see. It's a miracle this fella made it so far,\" Nebraska says, \"Reminds me of my daughter.. I.. I just wish I could see her again,\" the man sighs and sobs quietly.\n            \n        Tennessee comforts him and their conversation seems to be over. You close your eyes and slowly drift off to sleep as you listen to the sounds of the storm outside.\n        *page_break\n        *goto quake\n*label caveceiling\nYou get back to your rough sleeping spot and lie down on your makeshift bed (if you can even call it that) and stare at the cave's ceiling.\n\nYou close your eyes and slowly drift off to sleep as you listen to the sounds of the storm outside.\n*page_break\n*goto quake\n*label quake\nYou jolt awake in the middle of the night as you feel strong vibrations underneath you, no, the entire cave is shaking!\n\n\"An earthquake?\" you hear York's confused voice.\n\nSeveral survivors around you jump to their feet and rush for the exit, but what if it's too dangerous to go outside? What do you do?\n*choice\n    #I run!\n        You get up and dash towards the exit, rocks falling all round you. One of them falls right on another survivor, who dies in her sleep.\n        \n        A guy in front of you almost reaches it when the rocks fall onto him. However, he manages to keep on standing as he holds them on his shoulders, unable to move. He must be extremely strong as he manages to hold so many boulders above him.\n        \n        He turns to you and you recognize him as Nebraska. He shouts, \"Run!!!\" and tilts his head towards the exit. You follow his order and slip under his arms, just in time for more rocks to fall onto him, crushing him beneath their combined weight.\n        \n        You turn around, but all you can see is a huge pile of boulders, making it hard to believe there was a cave just moments ago.\n        *page_break\n        *set nebraskadies true\n        *set yorkdies true\n        *set tenndies true\n        *if jerseydies = false\n            \"What the hell happened?!' Jersey exclaims, dressed in nothing but his white underwear.\n            \n        *if jerseydies = true\n            \"What was that?\" Indiana asks.\n        \n        \"Must be an earthquake,\" Virge responds, looking like he just saw a ghost. \n        \n        *if aldies = false\n            \"We should try to get them out!\" Al shouts, clutching baby Delaware in his arms, who sleeps peacefully despite the commotion.\n            \n            \"It's no use. Whoever was in there is now gone,\" Indiana speaks up, looking at the rubble with a weird expression.\n            \n        *if aldies = true\n            *set deldies true\n            Your heart sinks realizing that Tennessee and Delaware are not around anymore. Delaware was just a baby, and they didn't have much of a chance to survive, but still. This is devastating…\n        \n        The sky lights up with the early light of dawn as you look at the pile of rocks which is now your fellow survivors' resting place. \n        \n        \"Let's go! We can make it to the goal in a few hours,\" Virge speaks grimly and walks away. \n        \n        No point in trying to sleep now, not that you would be able to anyway after what happened. You and the remaining survivors press on, headed north, towards your destination.\n        *finish\n    #I stay in!\n        You remember hearing that you should not run outside in case of an earthquake. \n        \n        Unfortunately, you seem to have forgotten that you are in a cave, and with that comes a very likely possibility of a cave in.\n        \n        You proceed to ponder the wisdom of remaining inside in these circumstances as a large rock falls on your head.\n        *page_break Wham!\n        *achieve rockbottom\n        *check_achievements\n        *if (((((((((((((((((((((((((((((choice_achieved_firstdeath and choice_achieved_abyss) and choice_achieved_eliminated) and choice_achieved_timber) and choice_achieved_bloodonthesand) and choice_achieved_gotexploded) and choice_achieved_snakeeyes) and choice_achieved_sharkbait) and choice_achieved_lightning) and choice_achieved_hellfire) and choice_achieved_bangbang) and choice_achieved_exterminated) and choice_achieved_oceanwater) and choice_achieved_monstermadness) and choice_achieved_kamikaze) and choice_achieved_ivory) and choice_achieved_betrayal) and choice_achieved_rockbottom) and choice_achieved_frozen) and choice_achieved_shipwrecked) and choice_achieved_mutineer) and choice_achieved_hoosier) and choice_achieved_solesurvivor) and choice_achieved_castaway) and choice_achieved_laststraw) and choice_achieved_letitdie) and choice_achieved_fallguy) and choice_achieved_badluck) and choice_achieved_burnbabyburn) and choice_achieved_outsmarted)\n            *achieve alldeaths\n        [b]DEAD END[b]\n        \n        You've met with a terrible fate, haven't you? Try again and see if you can make it further! :)\n        *ending", "fiftynifty": "*image title.png\n[b]Chapter 1: Fifty Nifty Unfortunate Souls[b]\n\n[b]Survivors: 50[b]\n\nAs you look around, you are somewhat relieved to see that the others are getting up on their feet as well. Whether its your innate kindness or just raw desire to survive, you feel somewhat encouraged to not be surrounded by corpses.\n\nYour thoughts are interrupted by a loud noise, which you recognize as the sound of a baby's crying. Did someone lose their child? What's going on here?\n*choice\n    #I have to find them!\n        *set egoism -5\n        You look for where the sound came from and notice a small bundle of cloth lying some thirty feet away from you. You see some guy approach the bundle and examine it cautiously before picking it up. Hopefully, that's the kid's dad.\n        *page_break\n        *goto tsunami\n    #Great, as if this situation wasn't awful enough!\n        *set egoism +5\n        You don't waste your time on the child and examine the beach further. There is a lot of weird metallic rubble lying around. Could those be pieces of an airplane or a ship? If so, how did you and the others manage to survive something that destroyed your mode of transport?\n        *page_break\n        *goto tsunami\n*label tsunami\n\"What is that?!\" someone shouts, pointing at the ocean behind you. \n\nYou quickly turn around and see a massive wave, at least fifty feet in height, emerge on the horizon. You instinctively run from the beach, while someone else shouts for everyone to move to the higher ground.\n\nYou see that the beach is close to a large hill, upon which you can make out some gray structure, which almost looks like some kind of hangar or warehouse from this distance. \n\nYou see many people run ahead of you and several behind you. \n\nA man in his thirties right in front of you trips from all the metallic rubble strewn about the beach and falls to the ground.\n*choice\n    #I help him out.\n        *set cooperation +10\n        *set savewisconsin true\n        You quickly stop and grab the man's hand, pulling him on his feet. He bears a similar dog tag to yours, his reads \"Wisconsin\". \n        \n        He thanks you profusely for your help as you run together towards the building in the distance.\n        \n        \n        *goto runrunrun\n    #I can't risk it. I need to get to the hill!\n        *set cooperation -10\n        You don't look at him as you jump over his sprawled body and proceed to run towards the building in the distance.\n        \n        \n        *goto runrunrun \n*label runrunrun\nYou run like you have never run before in your life and you make it to the top of the hill within seconds. You now see that the structure indeed looks like some sort of bunker or other militaristic facility and you run towards the large garage door, which serves as its entrance. It's so large a small plane can probably make it through.\n\nSeveral dozen people have already made it inside and they look at you with looks of pure horror, or, more likely, they are staring at the giant mass of water approaching them at a deadly speed behind you.\n*page_break\n\"We gotta close the door!\" you can hear one of them shout.\n\n\"But there are people there!\" someone objects, blocking his path.\n\nThe first one punches the other in the face and pushes him out of the way, then presses something on the wall and the door starts sliding down to the ground, about to close!\n\nYou need to get to the door as quickly as possible! However, the quickest path is over some large boulders, which could be too risky\n*choice \n    #I jump over the large rocks. It's risky, but quick.\n        You exhibit feats worthy of an avid parkour enthusiast as you jump onto a boulder and then to the next one, cutting your path to the building.\n        \n        \n        *goto throughthedoor\n    #It's too risky, I run around them.\n        You take a safer path, run as fast as you can and manage to get to the door extremely quickly.\n        \n        Unfortunately, you just weren't quick enough as you watch the door lower to the ground. You contemplate crawling through the gap, but it would likely result in you being crushed by the mass of metal. \n        \n        You turn around to look at the approaching wave as the other few people who were left behind with you reach the door and bang at it helplessly, screaming for the people inside to open it. It's not very effective…\n        \n        You are mesmerized by the sight of the approaching tsunami. The wave looks majestic, it easily has the height of a two-storey building and washes away all the metallic rubble on the beach as it approaches you with immense speed.\n        *page_break Oh well…\n        *achieve firstdeath\n        *check_achievements\n        *if (((((((((((((((((((((((((((((choice_achieved_firstdeath and choice_achieved_abyss) and choice_achieved_eliminated) and choice_achieved_timber) and choice_achieved_bloodonthesand) and choice_achieved_gotexploded) and choice_achieved_snakeeyes) and choice_achieved_sharkbait) and choice_achieved_lightning) and choice_achieved_hellfire) and choice_achieved_bangbang) and choice_achieved_exterminated) and choice_achieved_oceanwater) and choice_achieved_monstermadness) and choice_achieved_kamikaze) and choice_achieved_ivory) and choice_achieved_betrayal) and choice_achieved_rockbottom) and choice_achieved_frozen) and choice_achieved_shipwrecked) and choice_achieved_mutineer) and choice_achieved_hoosier) and choice_achieved_solesurvivor) and choice_achieved_castaway) and choice_achieved_laststraw) and choice_achieved_letitdie) and choice_achieved_fallguy) and choice_achieved_badluck) and choice_achieved_burnbabyburn) and choice_achieved_outsmarted)\n            *achieve alldeaths\n        [b]DEAD END[b]\n        \n        You've met with a terrible fate, haven't you? Try again and see if you can make it further! :)\n        *ending\n*label throughthedoor\nYou jump from the final big rock and run even faster, which you didn't even know was possible, and manage to slide under the door just as it closes. This probably would have looked cool in a movie, but you just feel like you might throw up and you almost peed your pants. \n\nSome people inside rush to help you while others, including the guy who closed the door on you, watch with suspicion. \n\nPart of you wants to give the guy a piece of your mind, but your thoughts are interrupted by deafening screams from the outside as you hear the mass of water slam into this sturdy building. You can't help but feel like you've heard the sound of bones crushing mixed in with the loud splashes of tons of salt water, but you hope it was just an auditory hallucination.\n*page_break\n\"What the fuck was that shit?!\" you hear a loud voice, punctuated with an accent that sounds like New York or Philly and see a young man in his late twenties or early thirties. He has short brown hair, blue eyes behind glasses and an extremely angry expression on his face, with which he stares at the guy who shut the door. \n\n\"I had to do it, otherwise we'd all be dead now,\" the man responds. He is clearly old, possibly fifty or older, yet his physique is that of a bodybuilder. His face is stern and marked with a couple of scars.\n\nYou feel torn. On the one hand, he almost killed you. On the other hand, if the door remained opened you and the others would have either drowned or been severely injured, so you decide against antagonizing him. Also, you hate to admit it, but he can probably kick your butt.\n\nTheir confrontation is interrupted by the baby's crying. You turn and see a young man holding the baby you've heard before. \n\n\"Is that yours?\" the old man asks.\n\n\"No, I didn't want them to drown so I grabbed them,\" the guy responds. His dog tag reads \"Alaska\". He has black hair, brown eyes and a worried expression on his face.\n\n\"Well, can you make it shut up, please?\" the buff dude spits.\n\n\"I'll try,\" the young man from Alaska says resignedly and starts swaying the baby in his arms. It seems to work. You notice that the baby also has a dog tag, it reads \"Delaware\".\n*page_break\n\"Excuse me, who is in charge here?\" you hear a voice of a man dressed in an expensive-looking suit. His face seems familiar. \"What is happening here? How did you bring me here?\" he asks incredulously.\n\n\"That's the question on everyone's mind,\" a young woman in the front comments. She has blonde hair and tired green eyes. She presents her dog tag which reads \"Utah\" on it, \"I assume all of us have these, right?\" \n\n\"Yup, are they all different states?\" says some guy in the back.\n\n\"Seems like it, I'm pretty sure there was about a fifty of us on the beach, might be one state per person,\" the woman from Utah reasons.\n\n\"Let me guess, we all live in the states on our dog tags?\" the old scary guy speaks up again.\n\nSeveral people nod in confirmation. One awkward-looking guy with big glasses raises his hand, \"Umm.. not originally. I'm from overseas, but I study.. studied? in NYC,\" he says. His tag reads \"New York\" on it. You don't know why, but you get the urge to punch this guy for some reason, but decide against it.\n\n\"Is it just me or do y'all struggle to recall your names either?\" the old man from South Carolina addresses the room.\n\n\"Yup,\" a big guy in the front nods in agreement. His tag reads \"Nebraska\".\n\nSeveral voices and confirming nods come from across the room. Again.\n\n\"Fine, let's use these to distinguish ourselves,\" the old bodybuilder-looking guy points at his dog tag. \n\n\"Sounds stupid, but alright. Call me Jersey,\" the rude young man points at his \"New Jersey\" tag.\n\n\"And I'm.. York!\" the young guy from New York adds sheepishly.\n\nYou take the chance to look around at the other folks, and though it is hard to get an accurate head count, you estimate that there's more than forty of you here. Some draw your attention:\n*hide_reuse\n*label faces\n*choice\n    #The old man who helped me on the beach.\n        He notices you looking and meets your gaze. \n        \n        \"How are you holding up, kid?\" he asks you, \"A shame we can't give each other a proper introduction since we don't recall our names. Glad it's not the old age acting up. You can call me 'South' if you like,\" he points at his dog tag which reads \"South Carolina\". \n        *goto faces\n    #A girl with a face tattoo.\n        Her appearance is indeed striking; her hair is dyed in various shades of purple and pink and is shaved in parts. She has tan skin and her eyes are yellow; must be contacts. \n        \n        Her face tattoo looks like a lightning bolt and goes across her face. Her clothes look like those of a prisoner; an orange jumpsuit.\n        \n        Overall, she looks like she might be some kind of criminal. Her dog tag says \"Florida\" on it. Charming.\n        *goto faces\n    #A guy in the expensive suit.\n        You stare at him intently for a few moments, then it hits you; that guy you felt you recognized is a well-known tech billionaire!\n        \n        Weirdly enough, you cannot recall his name even though you've likely heard it several times before. Guess you'll have to stick to calling him \"Washington\" for now as that's what it says on his dog tag.\n        *goto faces\n    #The woman from Utah. \n        She studies her dog tag with intensity, then pulls out a small notepad out of her jacket and starts writing things down vigorously, periodically looking at everyone in the room one by one, including you.\n        *goto faces\n    #I look at the girl in the back, who looks very tense.\n        She looks even more uncomfortable to be here than anyone else. Her dog tag reads \"California\".\n        *goto faces\n    #The person with Kansas on their dog tag catches my eye.\n        They keep to themselves and have an androgynous appearance to them. Their hair is dark and shoulder-length. Their eyes are black and look at the world with indifference.\n        *goto faces\n    #I'm done looking around.\n        *goto teamsplit\n*label teamsplit\n*set knowledge 1\n\"And what would you be? 'Virginia'?\" the girl with a face tattoo and \"Florida\" dog tag asks the old buff guy, barely stifling laughter.\n\nThe intimidating old man looks at his dog tag with the state of Virginia's name written on it. \n\n\"Virge is fine,\" he responds coldly.\n\n\"Wow, that's even funnier!\" she giggles.\n\nVirge looks like he's about to throw a punch (which he might do as he already did it with the other guy earlier), but lets it slide. He walks up to the button on the wall and presses it, but the door doesn't open.\n\n\"Maybe it got jammed from the water?\" Utah suggests.\n\nVirge frowns, then turns towards the opposite side of the room, which leads to two separate staircases on either side.\n\n\"We should figure out what this compound is for, maybe we'll find some answers,\" he barks and walks away, expecting people to follow him. \n\nSome do. In fact, most of the people around you, while others stay behind.\n\n\"What an asshole!\" the angry guy with the glasses comments. His \"name\" is Jersey, you recall.\n\n\"Might as well check out the other path?\" South reasons. \n\n\"Guys, should we really be splitting up?\" the guy holding a baby asks.\n\n\"It's alright, Al, we'll be careful,\" Florida responds jokingly.\n\n\"Al?\" he exclaims in confusion.\n\n\"It sounds better than 'Alaska', doesn't it? Plus, it fits you,\" she responds.\n\n\"Okay..\" Al sighs, accepting his new nickname. \n*choice\n    #I follow Virge; he seems to know what he's doing.\n        *set rebellion -10\n        *set followedvirge true\n        *goto virgeteam\n    #Screw that guy! I take the other path.\n        *set rebellion +10\n        *goto rebelteam\n*label virgeteam\nAl and California join you as you follow Virge and the others who are walking ahead of you to the staircase. \n\nThe steps go directly downwards before reaching a long hallway, which seems to be separated into several segments. \n\nYou get closer to the group as you hear Virge, who is in the front, speak, \"This bunker must have been used to station service members, so there should be some supplies and barracks for us to sleep.\"\n\nYou notice that the walls of the hallway have some machines installed near the ceiling, your stomach sinks as you realize that they look like some sort of turrets. \n*choice\n    #This looks sketchy, I turn back. \n        You and two others decide not to get further into this gun-filled hallway and you turn back, but a sudden loud siren stops you in your tracks. \n        \n        You react quickly and run towards the exit, which you are mere steps from when you hear a screeching metallic sound coming from above you. \n        \n        Miraculously, you manage to stop and step backwards right before a large metallic door drops from the ceiling, blocking your path. \n        \n        You turn back and see another door drop down, separating you from the others and isolating you in a small square \"room\" between the two doors. \n        \n        You contemplate how to get out of this one as you see a turret on the wall come to life and point its guns at you.\n        *page_break Shoot...\n        *achieve eliminated\n        *check_achievements\n        *if (((((((((((((((((((((((((((((choice_achieved_firstdeath and choice_achieved_abyss) and choice_achieved_eliminated) and choice_achieved_timber) and choice_achieved_bloodonthesand) and choice_achieved_gotexploded) and choice_achieved_snakeeyes) and choice_achieved_sharkbait) and choice_achieved_lightning) and choice_achieved_hellfire) and choice_achieved_bangbang) and choice_achieved_exterminated) and choice_achieved_oceanwater) and choice_achieved_monstermadness) and choice_achieved_kamikaze) and choice_achieved_ivory) and choice_achieved_betrayal) and choice_achieved_rockbottom) and choice_achieved_frozen) and choice_achieved_shipwrecked) and choice_achieved_mutineer) and choice_achieved_hoosier) and choice_achieved_solesurvivor) and choice_achieved_castaway) and choice_achieved_laststraw) and choice_achieved_letitdie) and choice_achieved_fallguy) and choice_achieved_badluck) and choice_achieved_burnbabyburn) and choice_achieved_outsmarted)\n            *achieve alldeaths\n        [b]DEAD END[b]\n        \n        You've met with a terrible fate, haven't you? Try again and see if you can make it further! :)\n        *ending\n    #I continue on.\n        *goto hallway\n*label hallway\nYou proceed forward. Not much use going back if the main door is closed, right?. Plus, what are the odds there would be another tsunami? Is it usually one wave or several?\n\nRoughly at the middle of the hallway, a sound of a siren pierces your eardrums. You look around panicked and see that the hallway behind you starts getting smaller as the security doors pop from the ceiling and appear one after the other, getting closer and closer. \n\n\"RUN!!!\" Virge shouts as he dashes forward. You and the others follow suit, making your way to the end of the hallway in seconds.\n\nYou hear muffled sounds of gunshots behind you. Luckily, the turrets seem to only shoot after the doors in their segment of the hallway are closed, but does that mean someone was trapped?\n\nYou make it through the hallway, quicker than most, yet still behind Virge, who ran as fast as an athlete despite his age. \n\nYou turn behind you and see that one person is still behind. They are walking calmly towards you, seemingly unfazed by the closing security doors behind them. \n*page_break\n*set calided true\nEveryone shouts to them to hurry up, but they just proceed to walk nonchalantly, ignoring the obvious danger behind them.\n\nMiraculously, they manage to get out of the hallway right before the final door shuts mere inches behind them.\n\n\"Are you insane?! You could have been killed!\" the woman with \"Utah\" dog tag yells at them.\n\nThe person looks at her with an empty expression, \"So what?\" You look at their dog tag, which reads \"Kansas\".\n\n\"How the fuck did you survive the tsunami?!\" Virge asks incredulously.\n\n\"Tsunami? I went here to avoid the sun, then you ran inside as well,\" they respond, unfazed. It sure sounds like a joke, but they seem to be dead serious.\n\n\"There were gunshots earlier, do you think someone..\" Al begins, looking back.\n\nYou can't say for sure, but you feel like there are some people missing from your group.\n\n\"The girl from California was there and the guy from Maryland..\" Utah utters, looking over her notepad frantically. \n\nYou get goosebumps thinking that you saw that California girl just moments ago, and now she's dead…\n\n\"It's too late for them now. Let's move on,\" Virge speaks and opens the door in front of him, entering the next room.\n*page_break\nYou see a large room filled with many dozens of simple bunk beds. Must be the barracks Virge was talking about.\n\n\"This is where the soldiers
