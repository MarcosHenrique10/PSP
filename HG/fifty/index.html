<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fifty — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "fifty", "title": "Fifty", "scenes": {"choicescript_description": "You are one of the 50 strangers stranded on a mysterious island. None of you remember how you got here or even your names, so you use the names on the dog tags you all have on your necks – the names of the fifty states. Will you survive and uncover the island’s secrets or perish to its many dangers?\n\n[i]Fifty[/i] is a 56,000-word interactive thriller novel by Rustem Khafizov. It is entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n \n• Play as male, female, or non-binary.[n/]\n• Will you save others from certain death or let them die to ensure your own survival?[n/]\n• No character is immune to death. Will they live? Will they die? It’s up to you![n/]\n• Romance one of the five other survivors. Will you date a convict from Florida or a foul-mouthed Jerseyite?[n/]\n• Will you uncover the island’s true purpose as well as your own dark past?[n/]\n• Will you find the saboteur among you?[n/]\n• Ten unique endings, as well as a secret one.[n/]\n• Will you stay hopeful or fall into despair?[n/]\n• Will you uncover the island’s true purpose as well as your own dark past or perish to the island’s countless death traps?[n/]\n• Will you become the sole survivor? [n/]\n \nWho lives? Who dies? You decide!\n", "choicescript_stats": "*if trueself = false\n    *if mainegender = 1\n        You are a person with \"Maine\" written on your dog tag.\n    *if mainegender = 2\n        You are a woman with \"Maine\" written on your dog tag.\n    *if mainegender = 3\n        You are a man with \"Maine\" written on your dog tag.\n*if trueself = true\n    You are Oblivion.\n*stat_chart\n        opposed_pair Egoism\n            Altruism\n        opposed_pair Hope\n            Despair\n        opposed_pair Rebellion\n            Authority\n        opposed_pair Cooperation\n            Competition\n        opposed_pair Violence\n            Peace\n*line_break\n*if joinedmimal = false\n    *if aldies = false\n        *stat_chart\n            percent Al\n    *if floridadies = false\n        *stat_chart\n            percent Florida\n    *if kansasdies = false\n        *stat_chart\n            percent Kansas\n    *if jerseydies = false\n        *stat_chart\n            percent Jersey\n    *if utahdies = false\n        *stat_chart\n            percent Utah\n*if joinedmimal = true\n    *stat_chart\n        percent Minnesota\n        percent Iowa\n        percent Missouri\n        percent Arkansas\n        percent Louisiana\n*if knowledge > 0\n    *choice\n        *if (joinedmimal = false) #Survivors\n            *label survivors\n            *choice\n                #Maine\n                    *if trueself = false\n                        That's you, dummy.\n                    *if trueself = true \n                        You are Oblivion — a supervillain who terrorized New England for years, using your augmentation to wipe out the memories of those you robbed and those who tried to stop you.\n                    *goto survivors\n                #Al\n                    *if aldies = true\n                        [b]DECEASED[b]\n                        \n                    The young man from Alaska has black hair, brown eyes and tends to be concerned for others.\n                    \n                    Seems like a nice guy, but might have a savior complex since he carries baby \"Delaware\" around despite having no relation to them.\n                    *goto survivors\n                #Florida\n                    *if floridadies = true\n                        [b]DECEASED[b]\n                        \n                    The weird girl from Florida has tan skin and yellow eyes. Her hair is dyed in various shades of purple and pink and is shaved in parts.\n                    \n                    Her face tattoo looks like a lightning bolt and goes across her face. She is probably a criminal as her clothes look like those of a prisoner; an orange jumpsuit.\n                    \n                    Overall, she's having way too much fun considering the circumstances.\n                    *goto survivors\n                #Kansas\n                    *if kansasdies = true\n                        [b]DECEASED[b]\n                        \n                    The person from Kansas keeps to themselves and has an androgynous appearance to them. Their hair is dark and shoulder-length. Their eyes are black and look at the world with indifference.\n                    \n                    They seem to be pretty apathetic to everything that's going on around them. What's their problem?\n                    *goto survivors\n                #Jersey\n                    *if jerseydies = true\n                        [b]DECEASED[b]\n                        \n                    This loud-mouthed angry dude from New Jersey is in his late twenties or early thirties. He has short brown hair, blue eyes behind glasses and often has a pissed off expression on his face.\n                    \n                    The question is; is he actually a jerk or is it just a self-defense mechanism?\n                    *goto survivors\n                #Utah\n                    *if utahdies = true\n                        [b]DECEASED[b]\n                        \n                    A young woman from Utah has blonde hair and tired green eyes. \n                    \n                    She seems to be the smartest person around and that's probably why she is also the most anxious. \n                    *goto survivors\n                #Virge\n                    *if virgedies = true\n                        [b]DECEASED[b]\n                        \n                    The old man from Virginia is about fifty or older, yet despite his age, his physique is that of a bodybuilder. His face is stern and is marked with a couple of scars. \n                    \n                    He likes to boss people around and is probably too dangerous to deal with.\n                    *goto survivors\n                #Delaware\n                    *if deldies = true\n                        [b]DECEASED[b]\n                        \n                    Literally a baby. How did a baby end up in a situation like this?\n                    *goto survivors\n                #South\n                    *if southdies = true\n                        [b]DECEASED[b]\n                        \n                    He is from South Carolina and seems to be the oldest person around. Probably in his sixties or older. Though you don't know him, you get the sense that he is trustworthy.\n                    *goto survivors\n                #Washington\n                    *if washdies = true\n                        [b]DECEASED[b]\n                        \n                    He's definitely that tech billionaire from the Pacific Northwest. What does someone like him do in a place like this?\n                    *goto survivors\n                *if (metidaho = true) #Idaho\n                    *if idahodies = true\n                        [b]DECEASED[b]\n                        \n                    A man in his thirties or forties. Seems like a salt of the earth kind of guy. He really doesn't like Washington.\n                    *goto survivors\n                #York\n                    *if yorkdies = true\n                        [b]DECEASED[b]\n                        \n                    He is some awkward geeky guy from New York. What a dork.\n                    *goto survivors\n                #California\n                    *if calided = true\n                        [b]DECEASED[b]\n                        \n                    This timid girl mostly keeps to herself.\n                    *goto survivors\n                *if (wisconsinkilled = true) #Wisconsin\n                    [b]DECEASED[b]\n                    \n                    The psycho who tried to kill you for leaving him to die on the first day.\n                    *goto survivors\n                #Nebraska\n                    *if nebraskadies = true\n                        [b]DECEASED[b]\n                        \n                    Big and quiet guy. Seems trustworthy, but you know what they say about the quiet ones, right?\n                    *goto survivors\n                *if (metindiana = true) #Indiana\n                    *if indydies = true\n                        [b]DECEASED[b]\n                        \n                    His appearance could be described as tall, dark and handsome, except for the tall part as he is shorter than average. \n                    \n                    He wears suit and tie, making him look like an office worker or some other white-collar type.\n                    *if cahootswithindy = true\n                        \n                        You agreed to help him get rid of the other survivors to ensure you two are the only ones left alive.\n                    *goto survivors\n                *if (mettennessee = true) #Tennessee\n                    *if tenndies = true\n                        [b]DECEASED[b]\n                        \n                    She seems to be the most experienced with the outdoors-y stuff around here.\n                    *goto survivors\n                *if (metnd = true) #North Dakota\n                    *if nddies = true\n                        [b]DECEASED[b]\n                        \n                    She is a nice middle-aged lady with a noticeable Midwestern accent.\n                    *goto survivors\n                *if (montanakilled = true) #Montana\n                    [b]DECEASED[b]\n                    \n                    The monstrous creature that looked like some sort of humanoid elephant.\n                    *goto survivors\n                *if (mettexas = true) #Texas\n                    [b]DECEASED[b]\n                    \n                    She was a brave woman. Perhaps too brave…\n                    *goto survivors\n                *if (metilli = true) #Illinois\n                    *if illidies = true\n                        [b]DECEASED[b]\n                    \n                    A history professor from Illinois who knows a lot about battleships.\n                    *goto survivors\n        *if (joinedmimal = true) #Your Squad\n            *label survivorz\n            *choice\n                #Minnesota\n                    She is tough and intimidating and is the muscle of the group, as well as its de facto leader.\n                    *goto survivorz\n                #Iowa\n                    He is a young black man of few words and he likes to read. That's pretty much all you know about him.\n                    *goto survivorz\n                #Missouri\n                    They are a young kid who looks twelve or so, making them the youngest person you've seen on the island, aside from Delaware.\n                    *goto survivorz\n                #Arkansas\n                    He is a Southern-fried young fella with an unhealthy obsession with guns.\n                    *goto survivorz\n                #Louisiana \n                    She is an elegant black woman and is the most charming member of the group.\n                    *goto survivorz\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 3 through 9[/b]\n  \n  Unlock chapters 3 through 9, including the thrilling conclusion!\n  \n  *purchase_discount adfree 2021-06-10 $3.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 3 through 9[/b]\n  \n  You've paid to unlock chapters 3 through 9.\n", "death": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nYou have died.\n\n*ending", "ending": "", "fifthcolumn": "[b]Chapter 4. Fifth Column[b]\n\n[b]Survivors: 10[b]\n\n*if tooknorth = true\n    It feels like it's been an hour since you have left the burning settlement, but judging by the Sun, which is barely peeking over the horizon, it has only been about thirty minutes or so. \n    \n    Something peculiar catches your attention; your path has now turned from a decrepit road to a smooth, long stretch of asphalt. \n    \n    \"It's an airport!\" Washington exclaims, \"We can get out of here!\"\n    \n    Whether it's true or not, the possibility alone gives you and the others the burst of energy you need to run forward.\n    *page_break\n    *set montanakilled true\n    *set yorkdies true\n    *set nebraskadies true\n    *set aldies true\n    *set deldies true\n    *set jerseydies true\n    *set tenndies true\n    You notice some dots moving towards you in the distance and they shortly reveal themselves to be the other group of survivors, the one that took the southern path yesterday. The group is noticeably smaller than it was, however…\n    \n    You greet Virge and the remaining survivors behind him. Between the two groups, the overall head count reveals that there is only ten of you left standing now — one fifth of the amount of people there was at the beginning.\n    \n    Virge's group explains what happened to them. Apparently, they ran into some kind of monster in the woods who looked like a humanoid elephant, no less, and it even had a similar dog tag to yours, only its was \"Montana\". They claim that they slayed the beast, but many didn't survive the encounter.\n    \n    *if utahdies = false\n        Utah takes out her notepad and looks at it intently, \"There wasn't a survivor with this dog tag from the ones we've seen, so if we assume that there is one for each state, then this 'monster' was one of the fifty, but they ran off before we all woke up.\"\n        \n        \"Yeah, Nebraska claimed he saw it when he woke up,\" Virge says grimly.\n        \n        You would've liked to ask Nebraska more about it, but the man didn't make it through the night, turns out.\n        \n    Sadly, Al, Delaware and Jersey didn't make it out either…\n    *page_break\n    *goto exploreiland\n*if tooknorth = false\n    It feels like it's been an hour since you have left the cave, but judging by the Sun, which is barely peeking over the horizon, it has only been about thirty minutes or so. \n    \n    Something peculiar catches your attention; your path has now turned from an abandoned highway to a smooth, long stretch of asphalt. \n    \n    \"Looks like an airfield,\" Virge comments, \"The main base must be nearby.\"\n    \n    You and the others pick up the pace, now knowing that a sure sign of civilization is near.\n    *page_break\n    *set floridadies true\n    *set utahdies true\n    *set nddies true\n    *set idahodies true\n    You notice some dots moving towards you in the distance and they shortly reveal themselves to be the other group of survivors, the one that took the northern path yesterday. The group is noticeably smaller than it was, however…\n    \n    You greet Washington and the remaining survivors behind him. Between the two groups, the overall head count reveals that there is only ten of you left standing now — one fifth of the amount of people there was at the beginning.\n    \n    Washington's group explains what happened to them. Apparently, the storm caught them right as they were crossing through the shallow waters in the island's north. Many people didn't make it through. Sadly, Florida and Utah were among them…\n    *page_break\n    *goto exploreiland\n*label exploreiland\nYou and the others walk along the runway before spotting something incredible:\n\nA large metallic battleship is docked not too far away from the airfield. It's likely a military craft as it has \"USS HAWAII\" written in bold white letters on its side. The ship is large enough to traverse the ocean on, you presume. You don't see any crew on it, but perhaps there is someone in there who could help?\n\nAside from the ship and the harbor nearby, you spot several prominent buildings; one that looks like a hangar, one that seems to be some kind of warehouse, a strange angular building and, most interestingly, an ostentatious mansion located in a picturesque spot near the lagoon.\n\nWhere do you go?\n*hide_reuse\n*label exploremore\n*choice\n    #I check out the hangar.\n        As you get inside, the building indeed reveals itself to be a large hangar, though you only see a single small plane inside. It looks like something resembling a seaplane or a crop duster. \n        \n        You consider using it to fly off the island, but it's clearly not big enough for all of you.\n        *if floridadies = false\n            \n            Florida is already here as she sizes the plane up, no doubt trying to figure out how to fly this thing.\n        *goto exploremore\n    #I check out the warehouse.\n        You enter the building and find a plethora of wooden crates filled with various weaponry lying around the place. \n        \n        The gun closet in that house on the other side of the island would be put to shame compared to this. \n        *if jerseydies = false\n            \n            You see Jersey looking over various weapons and trying them in his hands. \n            \n            He even managed to procure some clothes here as he is now wearing camo instead of nothing but underwear he wore this morning,\n        *goto exploremore\n    #I check out the mansion.\n        The mansion is truly the strangest structure to be found here, despite all the other buildings. It just seems so.. nice, compared to everything else on this island. \n        \n        The inside is cozy, with opulent decorations all around the main hall. There is a prominent portrait of a family of three; mother, father and a little girl. Were they the owners of the house?\n        \n        There is even a large TV set in the back with a big couch in front of it. \n        *if kansasdies = false\n            \n            Kansas walks past you as they go to the mansion's kitchen; they must have gotten hungry. \n            \n            Actually, you should probably get a bite as well, though you're not sure whether there could be anything edible found in an abandoned mansion, even if it's as nice as this one.\n        *page_break\n        *if utahdies = true\n            You look around some more and locate an unassuming door next to the stairs\n            \n            You open it and discover that it leads to a spacious basement.\n            \n            More importantly, you find a sturdy-looking metallic door there, which has something resembling a card reader next to it.\n            \n            You try to open it, pushing on it as hard as you can, but it doesn't budge. \n            \n            Seems like you will need that key card after all…\n            \n            With that, you leave the basement alone and exit the mansion.\n        *if utahdies = false\n            \"There's something strange in the basement,\" you hear Utah address you out of nowhere, almost making you jump.\n            \n            \"What?\" you ask, regaining your bearings.\n            \n            \"I'll show you,\" she leads you to a staircase and enters the door to its side, which leads to a spacious basement.\n            \n            More importantly, you find a sturdy-looking metallic door there, which has something resembling a card reader next to it.\n            \n            \"What's behind it?\" you ask.\n            \n            \"I don't know, I was too afraid to try it alone,\" Utah admits.\n            \n            You try to open the door together, pushing on it as hard as you can, but it doesn't budge. \n            \n            \"Guess we'll need to find the key card after all,\" she says.\n            \n            With that, you leave the basement alone and exit the mansion.\n        *goto exploremore\n    #I check out the strange building.\n        You walk inside and are surprised to find yourself inside of a church. Although the interior of the building is somewhat unconventional from the outside, the inside looks like a typical church you'll find in any small town America.\n        \n        Also, you are not alone. \n        \n        You find Indiana sitting in the front row, quietly praying.\n        *if cahootswithindy\n            \n            You can't help but smile at the strange juxtaposition as you walk toward him. \n            \n            \"Hoping the sky daddy will forgive your sins?\" you joke.\n            \n            Indiana turns to you, looking serious, \"I'm doing what I have to do to survive, that's all.\" \n            \n            You shrug and leave him be. If he wants to play an innocent soul, that's on him. You know the guy enough to know he doesn't have an innocent bone in his body.\n            *goto exploremore\n        *choice\n            #I speak to him.\n                \"Hi,\" you say awkwardly, \"Sorry for interrupting.\"\n                \n                Indiana turns to you with a sorrowful expression, \"It's okay, I just found this place by accident, felt like maybe it's a sign.\"\n                \n                \"Okay, I think the others went to check out the ship,\" you say, \"Just so you know.\"\n                \n                \"It's okay, I'll be there soon,\" he says and returns to his prayers. \n                \n                You decide to leave him alone and exit the building.\n                *goto exploremore\n            #I leave him be. \n                You decide not to interrupt his prayers and quietly exit the building, wondering where to go next.\n                *goto exploremore\n    #I check out the harbor.\n        The picturesque harbor is overshadowed by the large ship, but it actually contains another boat, this one much smaller, the size of a yacht or so. \n        \n        *if aldies = false\n            Al is holding Delaware in his arms as he looks at the boat, pondering something.\n        *goto exploremore\n    #I get on the ship, of course!\n        *goto bigship\n*label bigship\nYou walk up the ramp of the large ship, which was conveniently left untouched, as if inviting you on board.\n\nThe others have already assembled on the bridge, looking around for any signs of life, but to no avail.\n\nYou search through the ship further for a good hour, but all you find are the disturbing signs of the ship's true purpose: there are dozens of jail cells in the lower decks, as well as a room filled with various \"enhanced interrogation\" equipment, which is to say; torture devices.\n\n\"That must be how we were brought here!\" Washington comments, studying one of the jail cells.\n\n\"Perhaps, but more importantly this is our ticket to freedom!\" Virge announces excitedly.\n\n\"If we're planning to swim on this thing, I'm gonna go check whether its operational,\" the woman with \"Illinois\" dog tag speaks up.\n\n\"Are you an engineer?\" Virge raises an eyebrow at her.\n\n\"A historian, but I've seen my fair share of battleships,\" Illinois responds.\n\n\"Alright, go ahead then,\" Virge nods in approval.\n\n\"I'm going to go see whether there's any food left on the ship,\" Indiana chimes in, \"Maine, wanna help me out?\" he turns to you.\n\n*if cahootswithindy = true\n    Knowing Indiana, this is likely a veiled way of saying, \"We need to talk.\" You assume it's related to the plan, so you agree.\n*choice\n    #I go with Indiana.\n        *if cahootswithindy = true\n            After walking in silence through the echoey hallways of the ship for a few minutes, Indiana finally turns to you and simply says, \"We'll strike tonight.\"\n            \n            \"What's the plan?\" you ask, trying to keep your voice low. \n            \n            \"I'll show you,\" he says and leads you to the lowest deck of the ship, where you find yourselves in a darkly-lit narrow room with a cylindrical object in the center. \n            \n            It takes you a few moments to realize that it is a missile.\n            \n            \"I'll get some ranged explosives from the warehouse,\" he says, \"We'll be outside when it explodes; it should take care of most of them.\" \n            \n            You size up the missile, hoping that it's not something too powerful or radioactive, but it doesn't seem big enough for something like that. \n            \n            With your covert meeting over, you get back to your cabin.\n            *page_break\n            *goto finalshowdown\n        \"I'm fairly certain there's going to be some kind of storage closet here or a freezer,\" he explains as you walk through the echoey hallways of the ship.\n        \n        True to his word, you eventually find a door that leads to a large freezer, filled with meat carcasses and cans, and boxes.\n        \n        \"Well, hopefully there's something edible here,\" he says as you get inside and start looking for anything you can consume.\n        \n        You inspect the far side of the freezer where you find a large refrigerator. Yes, a refrigerator inside of a freezer. How necessary.\n        \n        The screech of the entrance door distracts you from your thoughts and you walk back towards it. You try to open it from the inside, but it's locked.\n        \n        You bang on it and find Indiana staring at you from the other side. He gives you a cheeky hand wave and walks away. \n        \n        That bastard!\n        \n        You try everything you can to bust the door open or to attract attention of anybody who can open it from the outside, but it's no use. \n        \n        You quickly succumb to the cold.\n        *page_break Brr...\n        *achieve frozen\n        *check_achievements\n        *if (((((((((((((((((((((((((((((choice_achieved_firstdeath and choice_achieved_abyss) and choice_achieved_eliminated) and choice_achieved_timber) and choice_achieved_bloodonthesand) and choice_achieved_gotexploded) and choice_achieved_snakeeyes) and choice_achieved_sharkbait) and choice_achieved_lightning) and choice_achieved_hellfire) and choice_achieved_bangbang) and choice_achieved_exterminated) and choice_achieved_oceanwater) and choice_achieved_monstermadness) and choice_achieved_kamikaze) and choice_achieved_ivory) and choice_achieved_betrayal) and choice_achieved_rockbottom) and choice_achieved_frozen) and choice_achieved_shipwrecked) and choice_achieved_mutineer) and choice_achieved_hoosier) and choice_achieved_solesurvivor) and choice_achieved_castaway) and choice_achieved_laststraw) and choice_achieved_letitdie) and choice_achieved_fallguy) and choice_achieved_badluck) and choice_achieved_burnbabyburn) and choice_achieved_outsmarted)\n            *achieve alldeaths\n        [b]DEAD END[b]\n        \n        You've met with a terrible fate, haven't you? Try again and see if you can make it further! :)\n        *ending\n    *selectable_if (cahootswithindy = false) #I go with Illinois.\n        *set metilli true\n        \"I'm with you,\" you say, walking up to her.\n        \n        \"Great, this would be just like one of those museum field trips I used to take my students on,\" she comments sarcastically.\n        \n        \"You're a teacher?\" you ask, trying to make conversation as you walk through the ship's many hallways.\n        \n        \"History professor, but paid about just as little, I suppose,\" she jokes dryly. \n        \n        You enter the lowest deck of the ship, which looks rather deserted, like an empty warehouse.\n        \n        \"This is weird,\" Illinois speaks again, \"Large cruiser ships like this one don't just get abandoned.\"\n        \n        \"Do you think it was left here on purpose?\" you ask.\n        \n        \"You mean for us to get out? That would be awfully nice of them to do, but I'm guessing it's just here to taunt us, or worse. We gotta watch out for any traps in here.\"\n        \n        You ponder her words, hoping this ship is not some sick death trap left by the kidnappers.\n        \n        \"Wait, what's that?\" she points at a darkly-lit narrow room in the back. \n        \n        You look inside the room and find a cylindrical object in the center. \n        \n        \"What the.. is that a missile?\" Illinois exclaims as she studies this missile-like object.\n        \n        \"Alright, the good news is it's not a nuclear warhead,\" she concludes after a few minutes, \"The bad news is that this thing is gonna have to stay here; removing it will likely end very badly for us.\"\n        \n        \"We should tell the others,\" you suggest. Illinois nods and you go back where you came from. \n        *page_break\n        *goto finalshowdown\n*label finalshowdown\nYou get back to the others as you overhear their conversation: \n\n\"Why not rest at that mansion?\" Washington proposes.\n\n\"It doesn't seem big enough for all of us, and we should leave as soon as we can,\" Virge responds.\n\n\"It's better to leave in the morning, though, it would be too dark at night,\" Illinois joins the conversation.\n\n\"I agree, that's why it's better to go to the mansion,\" Washington chimes in again.\n\n\"What if we sleep here tonight to see if the ship needs anything else and leave in the morning?\" Indiana suggests.\n\n\"That's reasonable, we'll get any supplies we might need in the morning and leave right away,\" Illinois agrees.\n\n\"And we didn't get much sleep last night,\" Washington laments, yawning as if to punctuate his point.\n\n\"None of us did,\" Virge nods.\n\n\"So it's goodnight then?\" Indiana suggests.\n\n\"Yup,\" several voices echo his sentiment.\n\n*if cahootswithindy = true\n    The woman from Illinois mentions the missile you already know about to others and they react with concern (you pretend to be shocked as well), though thankfully it doesn't affect everyone's decision to sleep on the ship tonight, thus your plan stands.\n    \n    With that, you go to your chosen cabin and decide to rest your head until it is time to set your plan into motion. You now truly realize just how little sleep you got last night as you fall asleep in seconds. \n*if cahootswithindy = false\n    You bring up the missile to others and they react as expected — with extreme concern. However, it doesn't affect everyone's decision to sleep on the ship tonight, so you go to your chosen cabin and decide to finally rest your head. \n    \n    Finally, things seem to be looking brighter; tomorrow you will leave this forsaken island for good! \n    \n    You truly realize just how little sleep you got last night as you fall asleep in seconds.\n*page_break\n*if cahootswithindy = true\n    You wake up from the quiet knocking sound coming from your cabin's door, and you open it to reveal Indiana, who walks into your cabin and you nod in understanding. \n    \n    It's time.\n    \n    Together, you quietly get to the bottom of the ship and into the room with a missile, where Indiana sets up an explosive right underneath it. \n    \n    With that done, you quietly leave the ship in the cover of the night and get to a safe distance away. \n    \n    \"Would you do the honors?\" Indiana turns to you and presents you the detonator, inviting you to press the switch and activate the explosive. \n    *choice\n        #Do it.\n            You take the detonator from him and press the button. \n            \n            The large battleship is rocked with a bright explosion on its side, illuminating the night sky. Even from this distance you get the urge to cover your ears as the sound of the explosion overwhelms your senses.\n            \n            \n            *goto indyshoot\n        #Let him do it.\n            You reject the detonator and Indiana shrugs as he presses the button himself. \n            \n            The large battleship is rocked with a bright explosion on its side, illuminating the night sky. Even from this distance you get the urge to cover your ears as the sound of the explosion overwhelms your senses.\n            \n            \n            *goto indyshoot\n*if cahootswithindy = false\n    *set illidies true\n    A deafening sound forces you awake as the rocking of the ship causes you to fall off your bed. \n    \n    What the hell was that? An explosion?!\n    \n    You get on your feet and notice that the room is now tilted to the right. What is going on here?\n    \n    You stumble out of your cabin into a hallway now lit with emergency lights and see some of the other survivors doing the same. \n    \n    \"Was it the missile?\" Washington asks, standing in nothing but his underwear. \n    \n    \"Either way, we need to get out of here!\" Virge shouts and runs to the end of the hallway. He opens the door at its end and is swept back by a stream of water which starts flooding the entire hallway. \n    \n    That's where the explosion must have happened and it led to a breech in the ship's hull. Your heart aches realizing that a few survivors were staying in that part of the ship.\n    \n    \"Quick! This way!\" Washington shouts as he runs to the other end of the hallway.\n    \n    \"Wait! If the explosion came from that side it might be easier to swim outside that way!\" Virge points at the direction he was just swept from.\n    *if (rebellion \u003c= 20)\n        You trust his judgement and follow him without question.\n    *choice\n        *selectable_if (rebellion > 20) #Follow Washington through the hallway.\n            *goto faceoff\n        #Follow Virge through the water.\n            You get as much air in your lungs as you can and dive into the water, swimming after Virge, who manages to swim pretty well for a man of his age.\n            \n            You swim through the doorway and find a large hole below which leads out of the ship.\n            \n            Not wasting time, Virge swims through it and you follow suit, making your way out of the ship.\n            \n            Unfortunately, you were just a few seconds too slow as when you swim out of the hole, the ship careens in your direction, pinning you to the bottom of the harbor with its side. \n            \n            Your legs hurt so bad you almost faint as they are crushed by several tons of metal. Virge tries to pull you out, but it's no use. \n            \n            You quickly run out of air in your lungs and succumb to your watery grave.\n            *page_break Bloop...\n            *achieve shipwrecked\n            *check_achievements\n            *if (((((((((((((((((((((((((((((choice_achieved_firstdeath and choice_achieved_abyss) and choice_achieved_eliminated) and choice_achieved_timber) and choice_achieved_bloodonthesand) and choice_achieved_gotexploded) and choice_achieved_snakeeyes) and choice_achieved_sharkbait) and choice_achieved_lightning) and choice_achieved_hellfire) and choice_achieved_bangbang) and choice_achieved_exterminated) and choice_achieved_oceanwater) and choice_achieved_monstermadness) and choice_achieved_kamikaze) and choice_achieved_ivory) and choice_achieved_betrayal) and choice_achieved_rockbottom) and choice_achieved_frozen) and choice_achieved_shipwrecked) and choice_achieved_mutineer) and choice_achieved_hoosier) and choice_achieved_solesurvivor) and choice_achieved_castaway) and choice_achieved_laststraw) and choice_achieved_letitdie) and choice_achieved_fallguy) and choice_achieved_badluck) and choice_achieved_burnbabyburn) and choice_achieved_outsmarted)\n                *achieve alldeaths\n            [b]DEAD END[b]\n            \n            You've met with a terrible fate, haven't you? Try again and see if you can make it further.\n            *ending\n*label indyshoot\nThe ship is quickly starting to sink as flames erupt all around it. \n\nIndiana turns to you and hands you a pistol, \"Let's go, we'll need to take out any survivors.\"\n\nThe thought of someone surviving despite all of this seems laughable to you, but you take the gun and follow.\n*page_break\n*set virgedies true\n*set illidies true\n*set washdies true\nYou get to the harbor as the majority of the ship is now submerged under water. You can even spot a few dead bodies floating nearby. However, not all of the survivors are dead…\n\nVirge is the first one to get back on the shore. Of course the old bastard is still alive! However, Indiana takes care of that as he shoots the old man in the head and his body falls into the water. Good riddance.\n\n*if aldies = false\n    *set aldies true\n    *set deldies true\n    Al runs out of one of the doors in the upper deck of the ship, clutching Delaware in panic. \n    \n    Indiana points his gun at him, then shoots and Al falls to the ground with a horrified expression. \n    \n    \"How could you..?\" he utters, before closing his eyes forever.\n    \n    He lets go of Delaware and the baby falls into the water. Considering their age, you doubt they are able to swim. Nighty-night.\n    \n*if floridadies = false\n    *set floridadies true\n    Florida bursts through the flames and out of the large hole left from the explosion as she falls into the water, her hair partially on fire. \n    \n    When she resurfaces to get some air, she is met with Indiana's gun pointed at her.\n    \n    \"Ah, so that's who dun it, huh? Gotta admit, I'm impressed!\" she smiles, seemingly unbothered by the weapon.\n    \n    Whether she is being truthful or is just trying to get on your good side, she is met with a bullet to the head from Indiana's gun and floats lifelessly on the murky water.\n\n*if kansasdies = false\n    *set kansasdies true\n    You notice one of the bodies floating towards you. It's Kansas. Though they look dead, their eyes clearly move in an almost creepy fashion as they stare at both of you as they drift on the dark water. \n    \n    \"Do it…\" Kansas says, staring into your soul. \n    \n    Their wish is granted as Indiana shoots them between the eyes. Now they are closed. For good.\n\n*if jerseydies = false\n    *set jerseydies true\n    \"YOU MOTHERFUCKERS!!!\" you hear Jersey's booming voice as he stands on top of the sinking ship with a shotgun pointed in your direction, \"What is wrong with you?! What the fuck were you thinking?!\" \n    \n    \"You talk too much,\" Indiana says calmly and shoots Jersey in the chest, sending him flying overboard, never to resurface again.\n    \n*if utahdies = false\n    *set utahdies true\n    Utah rises out of the water near the edge of the harbor and gasps for air, then notices the two of you.\n    \n    \"Look, I won't tell anyone, I promise!\" she shouts pleadingly, \"Please!\"\n    \n    \"You know that it won't work,\" Indiana says coldly as he points his gun at her.\n    \n    \"Why are you doing this? We can all make it out of here!\" Utah shouts.\n    \n    \"Don't you understand? There can be only one,\" Indiana says and shoots her in the head. \n    \n    Utah is no more…\n\nWithin minutes, all of the remaining survivors are dead.\n*page_break The deed is done.\n\"Good job,\" you say, turning to Indiana, who is still staring at the dead bodies in the water with an unreadable expression.\n\nNow to the final part…\n\nYou are well aware that only one of you can be the sole survivor, and it's going to be you.\n*choice\n    #I shoot him.\n        *goto solesurvivor\n    #I kill him with my bare hands.\n        *set egoism 100\n        *set violence 100\n        *set hope 0\n        *set rebellion 100\n        *set cooperation 0\n        *set indydies true\n        You don't waste time and tackle Indiana, making sure to separate him from his weapon.\n        \n        He tries to push you off, but you manage to overpower him as you wrap your hands around his throat and squeeze it with all your might.\n        \n        Indiana tries to fight back, but his punches and kicks quickly weaken as he slumps on the ground.\n        \n        It's over..\n        \n        You get up on your feet and take a look around, taking in the beautiful sight around you; a flaming wreck of a ship is partially submerged in the dark water, flames on its decks the only source of light, aside from the full moon overhead. \n        \n        Dead bodies float in the water; all of them your fellow survivors. Their names never learned or remembered.\n        *page_break You are the only one left.\n        *achieve liveandletdie\n        *goto castaway\n*label solesurvivor\nYou point your gun at his head as he turns his eyes toward you.\n\n\"Thanks for everything,\" you say, \"But there can be only one sole survivor, don't you agree?\" \n\n\"You're right,\" he smiles, \"Go ahead.\"\n\nYou aim between his eyes and pull the trigger.\n*page_break Click...\n\"What?\" you exclaim in shock as nothing happens. No bullets?!\n\nYou are hit in the chest as Indiana fires his own gun at you and you fall to the ground, clutching your ribs.\n\n\"You're right, there can be only one sole survivor, and I wouldn't be dumb enough to give you a loaded gun,\" he smirks.\n\nYou try to respond, but cannot overbear the pain you are in.\n\n\"Goodnight, Maine,\" Indiana says in a calm, almost sad voice as he points his gun at your head.\n*page_break Bang...\n*achieve solesurvivor\n*check_achievements\n*if (((((((((((((((((((((((((((((choice_achieved_firstdeath and choice_achieved_abyss) and choice_achieved_eliminated) and choice_achieved_timber) and choice_achieved_bloodonthesand) and choice_achieved_gotexploded) and choice_achieved_snakeeyes) and choice_achieved_sharkbait) and choice_achieved_lightning) and choice_achieved_hellfire) and choice_achieved_bangbang) and choice_achieved_exterminated) and choice_achieved_oceanwater) and choice_achieved_monstermadness) and choice_achieved_kamikaze) and choice_achieved_ivory) and choice_achieved_betrayal) and choice_achieved_rockbottom) and choice_achieved_frozen) and choice_achieved_shipwrecked) and choice_achieved_mutineer) and choice_achieved_hoosier) and choice_achieved_solesurvivor) and choice_achieved_castaway) and choice_achieved_laststraw) and choice_achieved_letitdie) and choice_achieved_fallguy) and choice_achieved_badluck) and choice_achieved_burnbabyburn) and choice_achieved_outsmarted)\n    *achieve alldeaths\n[b]DEAD END[b]\n\nYou've met with a terrible fate, haven't you? Try again and see if you can make it further. :)\n*ending\n*label faceoff\nYou and the other survivors follow Washington as you run out of the hallway, having to balance yourselves as the entire ship is now tilted to something like fifty degrees. \n\nYou manage to get to the top deck of the ship and are horrified to see the entire place ablaze. \n\n\"We have to jump into the water!\" Washington shouts as he does so. \n\nHowever, you hear a loud crunch, followed by his pained scream as you see that he hit a chunk of metal hidden below the water as he landed, breaking his leg in the process. He is now desperately trying to swim to the shore despite the injury.\n\nYou decide to avoid such fate as you take a running start and leap several feet forward and out of the deck, flying past the large pieces of the ship submerged in the sea and manage to land safely in the dark water.\n\nWhen you resurface, you find that Virge is already on land as he climbs onto the docks and waves for you to come.\n\nThat guy sure is something! You swim towards him, avoiding large pieces of the ship floating around.\n\nVirge walks towards you to give you a hand, then…\n*page_break BANG!\n*set virgedies true\nVirge's lifeless body falls into the water and you see Indiana standing behind him with a pistol in his hand!\n\nYou instinctively hide behind a piece of the ship floating in the water as you watch Indiana shoot the other survivors as they swim away from the burning ship.\n\nThis is madness! \n\nYou manage to stealthily get out of the water, hiding behind the docks' railing as you consider what to do next. \n\nIndiana needs to be stopped, that's for sure, but how do you stop someone with a gun? \n*if mainegun = true\n    You left yours at the ship, so shooting him is not an option. Yet.\n\nYou can either utilize the element of surprise and attack him while he is distracted. \n\nOr…\n\nYou could try to talk him down. Yes, it's incredibly risky, but you simply cannot understand why he would go on this rampage for no reason. Perhaps there is a way to get through to him?\n\nEither way, you'd better focus on what you're good at.\n*choice\n    #Attack him.\n        *if (violence \u003c 50)\n            You leap out of your hiding place while Indiana is too busy shooting the other survivors as they escape the ship. \n            \n            You tackle him from behind, pinning him to the ground, and manage to punch the gun out of his hand. It lands some ten feet away.\n            \n            Indiana manages to quickly get up on his feet as he punches you in the face, forcing you to stumble backwards. \n            \n            \"You're not gonna stop me, Maine!\" he spits blood as he talks, \"I will be the one who lives!\"\n            \n            \"What is wrong with you?!\" you shout. \n            \n            \"Don't you get it? This is a sick game! We're gonna be stuck here until there's only one of us left, and it's gonna be me!\" he shouts and leaps towards his gun.\n            \n            You do the same, and you both end up fighting for it, your hands mere inches from the pistol. \n            \n            As desperately as you fight, your strength is just not enough to overpower him and Indiana eventually headbutts you in the face, breaking your nose as he clutches the weapon.\n            \n            Then points it at you…\n            *page_break Headshot.\n            *goto hoosierdeath\n        *if (violence >= 50)\n            *set indydies true\n            *set indyshot true\n            You leap out of your hiding place while Indiana is too busy shooting the other survivors as they escape the ship. \n            \n            You tackle him from behind, pinning him to the ground, and manage to punch the gun out of his hand. It lands some ten feet away.\n            \n            Indiana manages to quickly get up on his feet as he punches you in the face, forcing you to stumble backwards. \n            \n            \"You're not gonna stop me, Maine!\" he spits blood as he talks, \"I will be the one who lives!\"\n            \n            \"What is wrong with you?!\" you shout. \n            \n            \"Don't you get it? This is a sick game! We're gonna be stuck here until there's only one of us left, and it's gonna be me!\" he shouts and leaps towards his gun.\n            \n            You do the same, and you both end up fighting for it, your hands mere inches from the pistol. \n            \n            He fights viciously, but you are strong enough to overpower him and you punch him in the temple, which gives you the chance to grab the weapon.\n            \n            You point it at him as he leaps toward you, ready to end you. Bad idea.\n            \n            You pull the trigger and shoot him in the heart. His lifeless corpse falls back on the ground, a wrathful expression stuck on its face.\n            *page_break It's over…\n        *goto mansionnight\n    #Try to reason with him.\n        *if (violence > 50)\n            \"Why are you doing this?\" you ask, walking out of your hiding place with your hands raised above your head.\n            \n            Indiana quickly turns to you, but thankfully doesn't shoot right away, instead replying, \"I have no choice. This is kill or be killed. Whoever is behind this designed it that way and I'm not gonna be the one who dies!\" he shouts and points his gun at you. \n            \n            \"That's insane!\" you shout, unable to restrain yourself, \"You killed them all just because of your crazy theory?!\"\n            \n            Indiana smirks, \"I may be crazy, but at least I'm not dead,\" he states as he pulls the trigger.\n            *page_break It's over...\n            *goto hoosierdeath\n        *if (violence \u003c= 50)\n            *set indydies true\n            \"Why are you doing this?\" you ask, walking out of your hiding place with your hands raised above your head.\n            \n            Indiana quickly turns to you, but thankfully doesn't shoot right away, instead replying, \"I have no choice. This is kill or be killed. Whoever is behind this designed it that way and I'm not gonna be the one who dies!\" he shouts and points his gun at you. \n            \n            \"Look, you don't have to do this!\" you reason, \"Just.. please calm down and end this madness!\"\n            \n            \"You're only saying it to get me to give up my weapon, don't you? So you can kill me instead?!\" he yells.\n            \n            \"No! I don't want anyone to die! I'm sick of everyone dying all the time!\" you confess.\n            \n            \"Really? And how are you planning to stop me then?\" Indiana asks sarcastically. \n            \n            \"I'm not here to fight you! What you've done is horrible, but I don't want you to die because of it! It's the island's fault this is happening!\" you shout.\n            \n            Indiana pauses, thinking your words over, \"I'm doing what I have to do to survive…\" he mumbles.\n            \n            \"You don't have to do this, we can all get out of here!\" you reason, not sure whether it's actually true or not.\n            \n            \"We.. Could have…\" Indiana hesitates, \"But I rigged the ship to explode, so we can't anymore…\" he pauses, looking at the ship's wrecked remains in the water. \n            \n            \"We can find another way! There's gotta be something out there!\" you reassure him.\n            \n            \"No… There is no other way..\" he utters grimly, \"We had the only way out and I took it away.. I've doomed us… I doomed myself!\" he yells.\n            \n            \"No, there's gotta be something else!\" you yell.\n            \n            \"I can't anymore…\" he presses a palm of his hand against his face, \"This fucking place…\" he looks at the gun in his hand for a moment, then presses it against his skull.\n            \n            \"No!\" you shout, but it's too late. \n            \n            BANG!\n            \n            His lifeless body falls to the ground.\n            *page_break It's over…\n        *goto mansionnight\n*label hoosierdeath\n*achieve hoosier\n*check_achievements\n*if (((((((((((((((((((((((((((((choice_achieved_firstdeath and choice_achieved_abyss) and choice_achieved_eliminated) and choice_achieved_timber) and choice_achieved_bloodonthesand) and choice_achieved_gotexploded) and choice_achieved_snakeeyes) and choice_achieved_sharkbait) and choice_achieved_lightning) and choice_achieved_hellfire) and choice_achieved_bangbang) and choice_achieved_exterminated) and choice_achieved_oceanwater) and choice_achieved_monstermadness) and choice_achieved_kamikaze) and choice_achieved_ivory) and choice_achieved_betrayal) and choice_achieved_rockbottom) and choice_achieved_frozen) and choice_achieved_shipwrecked) and choice_achieved_mutineer) and choice_achieved_hoosier) and choice_achieved_solesurvivor) and choice_achieved_castaway) and choice_achieved_laststraw) and choice_achieved_letitdie) and choice_achieved_fallguy) and choice_achieved_badluck) and choice_achieved_burnbabyburn) and choice_achieved_outsmarted)\n    *achieve alldeaths\n[b]DEAD END[b]\n    \nYou've met with a terrible fate, haven't you? Try again and see if you can make it further. :)\n*ending\n*label mansionnight\n*set illidies true\n*set washdies true\nThat's it. Indiana is dead as well as the victims of his desperation…\n*if aldies = false\n    \n    Al walks up to you, holding sleeping Delaware in his hands, \"Why did it have to end this way?\" he utters, tears flowing all over his face.\n*if floridadies = false\n    \n    Florida gets closer and pokes at Indiana's corpse, making sure he is really dead, then says, \"Well, that guy was a total psycho, and that's coming from me!\" \n*if kansasdies = false\n    \n    Kansas joins you as you watch the ship's wreckage burn in the water; your hopes of getting off this island dying with it.\n*if jerseydies = false\n    \n    Jersey runs up to you and kicks Indiana's corpse, sending it flying straight into the murky, dark sea, as he shouts, \"Ass! I knew there was something wrong with this guy. What the hell was he thinking?!\"\n*if utahdies = false\n    \n    Utah approaches you and puts her hand on your shoulder sympathetically. \"Let's go, \" she says, \"We need to rest.\"\n*if (((((aldies = true) and (floridadies = true)) and (kansasdies = true)) and (jerseydies = true)) and (utahdies = true))\n    *achieve liveandletdie\n    \n    You look around and realize one simple, but tragic reality — you are the only one left alive…\n    \n    \n    *goto castaway\n*page_break\nYou leave the damned harbor and stumble toward the opulent mansion, which looks quite creepy at night as it is illuminated by moonlight, making its dark windows look like empty eye sockets.  \n\nYou get inside, feeling completely exhausted after everything you have been through. Not just the recent events, but the entire gamut of bullshit you have experienced over the past four days that you have spent on this miserable pile of sand in the middle of nowhere. \n\nAll that pain and suffering left a permanent scar on your soul, and you doubt you will ever forget what you had to endure. You ponder that as you go upstairs and take one of the available rooms, where you find a comfy bed and a childlike decorum. This must have been the little girl's room. \n\nAll you really want at this point is to get some well-earned rest, but you feel extremely uncomfortable to be alone right now.\n*choice\n    *if (aldies = false) #I spend the night with Al.\n        *set al +20\n        *if (egoism >= 15)\n            *set egoism -15\n        You walk to the room Al picked for himself and Delaware as you see Al walking out of it. \n        \n        \"Hey,\" he says, looking at you, \"Delaware is sleeping, but I.. can't right now. I'm so tired, and yet.. I just can't fall asleep.\"\n        \n        You invite Al to join you and you walk downstairs, where you spend the night sitting on the couch and talking to each other about.. everything, until you both fall asleep with the early light of dawn…\n        *page_break\n        *goto gorge\n    *if (floridadies = false) #I spend the night with Florida\n        *set florida +20\n        *if (egoism >= 15)\n            *set egoism -15\n        You walk to the room she picked for herself and find Florida already standing in the doorway in nothing but underwear, looking at you with a smug expression.\n        \n        \"Took you long enough,\" she smirks and pulls you into her room, then pushes you onto her bed, before joining you herself.\n        \n        It is the best night of your life.\n        *page_break\n        *goto gorge\n    *if (kansasdies = false) #I spend the night with Kansas.\n        *set kansas +20\n        *if (egoism >= 15)\n            *set egoism -15\n        You were about to leave your room when you found Kansas standing at your doorway. \n        \n        \"Sorry,\" they say, \"I didn't want to be alone.. I'll go away if you are tired.\" \n        \n        \"No, it's okay,\" you say and invite them in. \n        \n        They take a seat on the beanbag in the corner of the room.\n        \n        \"What would you like to do?\" you ask them.\n        \n        \"I don't know.. I just.. wanted to be with you,\" they admit and you see them blush slightly.\n        \n        \"No problem,\" you say, and decide to tell them more about yourself, your childhood and your life story. All the things you can remember, at least.\n        \n        Kansas, as quiet as they usually are, follows your example and tells you everything about themselves; the good, the bad and the ugly. \n        \n        You both fall asleep with the early light of dawn…\n        *page_break\n        *goto gorge\n    *if (jerseydies = false) #I spend the night with Jersey.\n        *set jersey +20\n        *if (egoism >= 15)\n            *set egoism -15\n        You walk to the room Jersey picked for himself and knock on the door. \n        \n        Jersey opens it and eyes you with suspicion, \"The fuck do you need?\" he says, as charming as ever.\n        \n        \"Sorry, I… I just didn't want to be alone,\" you admit.\n        \n        \"Oh…\" he pauses, \"Alright then.. come on in,\" he invites you in. \n        \n        His room must have belonged to the man on the portrait; it has a lot of army paraphernalia and several photos of the little girl from the portrait. \n        \n        \"So.. uhm.. Do you want to talk about something?\" Jersey says, seemingly unsure of what to do.\n        \n        \"Whatever is okay with you,\" you say.\n        \n        \"Well, I had a lovely fucking day, I guess. All of the people I've met on this dog shit island are now dead. Well, almost everyone…\" he laments. \n        \n        \"What do you think will happen to us now?\" you wonder. \n        \n        \"I don't know about you, but I'm hoping that whoever is behind this will show up, now that almost everyone is dead,\" he responds.\n        \n        \"You believe they'll let us go?\" you ask.\n        \n        \"No, I believe my fist would love to meet their face!\" he spits and punches a wall, leaving a noticeable indent.\n        \n        \"Ouch!\" he yells as he grabs his hand.\n        \n        \"Wait, let me see,\" you walk up to him and examine his hand. It seems fine, but he should probably let it rest. You grab a white shirt from the room's closet and wrap it around his hand.\n        \n        \"Uhm.. thanks,\" he says awkwardly and you notice he is blushing a little. \n        \n        \"You should let it rest,\" you say.\n        \n        \"Yeah, we both should rest,\" he agrees and opens the door for you, \"Thank you, really,\" he adds somewhat sheepishly.\n        \n        You leave him be and go back to your room.\n        *page_break\n        *goto gorge\n    *if (utahdies = false) #I spend the night with Utah.\n        *set utah +20\n        *set sawcard true\n        *if (egoism >= 15)\n            *set egoism -15\n        You find Utah downstairs, staring at the large portrait of the three inhabitants of the house. \n        \n        Utah hugs you when you approach her, \"Don't leave; I don't want to be alone right now,\" she admits.\n        \n        \"I won't, I promise,\" you say.\n        \n        \"Thank you.. I..\" she turns to look at the portrait again, \"I wonder what kind of people would live in a place like this?\"\n        \n        You ponder that as well, studying the portrait closely.\n        \n        Then you notice something…\n        \n        The portrait is slightly askew, just by an inch or so, but when you notice it, it's jarring.\n        \n        Utah seems to have noticed it too as she walks up to the portrait and takes it off, causing something behind it to fall on the floor.\n        \n        You look down and find a key card!\n        \n        \"This must be the one!\" Utah exclaims as she picks it up.\n        \n        \"Do you want to go check?\" you suggest.\n        \n        \"Yes, but it's better to do it tomorrow. I.. I've had enough excitement for one day,\" she admits.\n        \n        You echo her sentiment and go back to your room.\n        *page_break\n        *goto gorge\n    #I spend the night alone.\n        *if (egoism \u003c= 90)\n            *set egoism +10\n        You lie on your bed, thinking over everything you have been through so far. It's been one hell of a journey, and it's not even technically over as you are still stuck on this crazy island, unable to escape.\n        \n        That said, after the crazy events of today, you are on cloud nine to be sleeping in a comfortable bed for once. \n        \n        Being in this luxurious mansion with a scenic view of the tropical island gorgeousness right outside the window, you almost feel like you are on a vacation of a lifetime. \n        \n        It's a nice thought, regardless of how far-fetched it is considering the circumstances.\n        *finish\n*label gorge\nAfter these crazy events, you are on cloud nine to be sleeping in a comfortable place for once. \n\nBeing in this luxurious mansion with a scenic view of the tropical island gorgeousness right outside the window, you almost feel like you are on a vacation of a lifetime. \n\nIt's a nice thought, regardless of how far-fetched it is considering the circumstances.\n*finish\n*label castaway\nYou stumble toward the opulent mansion, which looks quite creepy at night as it is illuminated by moonlight, making its dark windows look like empty eye sockets.  \n\nYou get inside, feeling completely exhausted after everything you have been through. Not just the recent events, but the entire gamut of bullshit you have experienced over the past four days that you have spent on this miserable pile of sand in the middle of nowhere. \n\nAll that pain and suffering left a permanent scar on your soul, and you doubt you will ever forget what you had to endure. You ponder that as you go upstairs and take one of the bedrooms, where you find a comfy bed and a childlike decorum. This must have been the little girl's room. \n\nYou crash on the comfy bed and fall asleep almost instantly. Your dreams are wrought with disturbing imagery; the faces of the people you've met on the island rotting away to nothing but skeletons.\n*page_break Days later...\nYou have not received any signal or indication that you are free. You are still stuck on the island, though you have a pretty comfy place all to yourself. \n\nHowever, you don't have much provision left and if the help ain't coming, you've gotta do something.\n*hide_reuse\n*label nouse\n*choice\n    #I get the small boat and swim off the island.\n        You tried to operate the small boat left in the harbor, but ended up capsized a few hundred feet off the island and had to swim back, leaving the boat floating in the open ocean.\n        *goto nouse\n    #I fly the plane off the island.\n        The small plane in the hangar looked promising, but you couldn't get it to work no matter how many times you tried. This must be why it never left the hangar, you figure.\n        *goto nouse\n    #I open that door in the basement.\n        There is definitely something behind that door, but you couldn't find the damn key card to open it and banging on the door didn't help. Whatever is behind it, it is out of your reach.\n        *goto nouse\n    #I wait for help to arrive.\n        You keep waiting for someone to come and save you, or at least tell you why any of this had to happen.\n        \n        After a full week without food, you can barely move as you lie on your bed in the mansion.\n        \n        You lie there hoping for someone to show up soon to save you, lest you succumb to starvation..\n        *page_break ..but nobody came.\n        *achieve castaway\n        *check_achievements\n        *if (((((((((((((((((((((((((((((choice_achieved_firstdeath and choice_achieved_abyss) and choice_achieved_eliminated) and choice_achieved_timber) and choice_achieved_bloodonthesand) and choice_achieved_gotexploded) and choice_achieved_snakeeyes) and choice_achieved_sharkbait) and choice_achieved_lightning) and choice_achieved_hellfire) and choice_achieved_bangbang) and choice_achieved_exterminated) and choice_achieved_oceanwater) and choice_achieved_monstermadness) and choice_achieved_kamikaze) and choice_achieved_ivory) and choice_achieved_betrayal) and choice_achieved_rockbottom) and choice_achieved_frozen) and choice_achieved_shipwrecked) and choice_achieved_mutineer) and choice_achieved_hoosier) and choice_achieved_solesurvivor) and choice_achieved_castaway) and choice_achieved_laststraw) and choice_achieved_letitdie) and choice_achieved_fallguy) and choice_achieved_badluck) and choice_achieved_burnbabyburn) and choice_achieved_outsmarted)\n            *achieve alldeaths\n        [b]DEAD END[b]\n        \n        You've met with a terrible fate, haven't you? Try again and see if you can make it further. :)\n        *ending\n", "fiftyfifty": "[b]Chapter 3: Fifty-fifty[b]\n\n[b]Survivors: 25[b]\n\nThe dawn of the third day arrives and the rays of sunshine wake you up with their brightness. You enjoy a few moments of ignorant bliss before it dawns on you that half of the people who ended up on this forsaken island with you are now dead.\n\n\"Hey, you alright there?\" the guy from New York walks up to you and offers you a bottle of water.\n*fake_choice\n    #\"I'm holding up, more or less, considering the circumstances,\" you say.\n        *if (hope \u003c= 90)\n            *set hope +10\n    #\"How can I be after what happened yesterday?\" you respond.\n        *if (hope >= 10)\n            *set hope -10\n\"Yeah, it's… awful.\" he says, \"I'm York, by the way. Not that it's my name, just.. you know.. memory loss and all..\" he says sheepishly, \"Look, me and the others are having breakfast together, would you like to join us?\"\n*choice\n    #\"Sure.\"\n        *if (cooperation \u003c= 90)\n            *set cooperation +10\n        *set metnd true\n        You follow him and see a circle of more than a dozen of other survivors sitting, eating and chatting together around the fire. Virge is missing, however.\n        \n        \"We thought it would be nice to really get to know everyone,\" a middle-aged woman with the \"North Dakota\" dog tag speaks as she looks at you, \"Maine, was it? Do you mind telling us more about yourself?\"\n        \n        \"Okay,\" you say, taking a seat in the circle. York joins you.\n        \n        \"Alright, I'll start,\" North Dakota beams, \"What's your sign?\"\n        \n        \"My what?\" you ask, dumbfounded. \n        \n        \"Your zodiac sign,\" York explains.\n        *fake_choice\n            #Aries\n                *goto zodiresp\n            #Taurus\n                *goto zodiresp\n            #Gemini\n                *goto zodiresp\n            #Cancer\n                *goto zodiresp\n            #Leo\n                *goto zodiresp\n            #Virgo\n                *goto zodiresp\n            #Libra\n                *goto zodiresp\n            #Scorpio\n                *goto zodiresp\n            #Saggitarius\n                *goto zodiresp\n            #Capricorn\n                *goto zodiresp\n            #Aquarius\n                *goto zodiresp\n            #Pisces\n                *goto zodiresp\n    #\"Nope.\"\n        *if (cooperation >= 10)\n            *set cooperation -10\n        \"Ah, okay… Have a nice day!\" he says awkwardly and scurries away.\n        \n        You breathe a sigh of relief and enjoy the beautiful view. The sky is clear and you see a bird flying overhead. At least you assume it's a bird; it's too hard to tell from this distance. \n
