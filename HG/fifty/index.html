 You still remember his face when you pulled the trigger. \n                    \n                    You have never killed anyone before, and even though he was a monster, it still feels devastating to take someone's life.\n                *if indyshot = false\n                    STATUS: DECEASED. COMMITtED SUICIDE BY SHOOTING HIMSELF\n                    \n                    His last moments still haunt you…\n                    \n                    Sure, he was insane, but he was likely driven to that state by the cruel circumstances you have all found yourselves in.\n                *goto HtoM\n            #IOWA\n                CODENAME: IOWA\n                \n                AUGMENTATION: ENVIRONMENTAL ABILITY TO SILENCE ANY SOUND AROUND HIM\n                \n                *if savewisconsin = false\n                    STATUS: DECEASED. KILLED BY CODENAME: WISCONSIN\n                *if savewisconsin = true\n                    STATUS: DECEASED. DIED IN THE SKIRMISH WITH CODENAME: MINNESOTA, CODENAME: MISSOURI, CODENAME: ARKANSAS AND CODENAME: LOUISIANA\n                *goto HtoM\n            #KANSAS\n                CODENAME: KANSAS\n                \n                AUGMENTATION: ENVIRONMENTAL ABILITY TO CREATE A DISINTEGRATING FORCEFIELD AROUND THEM\n                \n                STATUS: \n                *if kansasdies = false\n                    ALIVE\n                *if kansasdies = true\n                    DECEASED. DIED DURING THE EXPLOSION OF SITE 50\n                    \n                    You remember the last time you saw them; they were truly ready to die. \n                    \n                    In a way, they had the luxury to choose to end their life, rather than being robbed of it like the rest.\n                *goto HtoM\n            #KENTUCKY\n                CODENAME: KENTUCKY\n                \n                AUGMENTATION: CORPORAL ABILITY OF NIGHT VISION\n                \n                STATUS: DECEASED. SHOT BY THE SECURITY TOWER AT BARTON POINT\n                *goto HtoM\n            #LOUISIANA\n                CODENAME: LOUISIANA\n                \n                AUGMENTATION: ENVIRONMENTAL ABILITY TO GIVE INANIMATE OBJECTS EXPLOSIVE PROPERTIES\n                \n                *if savewisconsin = false\n                    STATUS: DECEASED. KILLED BY CODENAME: WISCONSIN\n                *if savewisconsin = true\n                    STATUS: DECEASED. DIED IN THE SKIRMISH WITH CODENAME: IOWA, CODENAME: MISSOURI, CODENAME: ARKANSAS AND CODENAME: MINNESOTA\n                *goto HtoM\n            #MAINE\n                CODENAME: MAINE\n                \n                AUGMENTATION: INTERPERSONAL ABILITY TO ERASE MEMORIES OF ORGANISMS\n                \n                STATUS: ALIVE\n                \n                This…\n                \n                It can't be!\n                \n                It has to be some kind of joke, right?\n                *goto HtoM\n            #MARYLAND\n                CODENAME: MARYLAND\n                \n                AUGMENTATION: INTERPERSONAL ABILITY TO INCREASE THE HEALING PROPERTIES OF ORGANISMS AROUND HER\n                \n                STATUS: DECEASED. KILLED BY THE SECURITY TURRET AT SITE 50\n                *goto HtoM\n            #Go back.\n                *goto codenames\n    #M-N\n        *label MtoN\n        *choice\n            #MASSACHUSETTS\n                CODENAME: MASSACHUSETTS\n                \n                AUGMENTATION: ENHANCED INTELLIGENCE\n                \n                STATUS: DECEASED. DIED DURING THE EXPLOSION OF SITE 50\n                *goto MtoN \n            #MICHIGAN\n                CODENAME: MICHIGAN\n                \n                AUGMENTATION: ENVIRONMENTAL ABILITY TO DISABLE ELECTRONIC DEVICES AROUND THEM\n                \n                STATUS: DECEASED. FELL THROUGH THE FLOOR AT SITE 50\n                *goto MtoN\n            #MINNESOTA\n                CODENAME: MINNESOTA\n                \n                AUGMENTATION: ENHANCED ABILITY TO WITHSTAND COLD TEMPERATURES\n                \n                *if savewisconsin = false\n                    STATUS: DECEASED. KILLED BY CODENAME: WISCONSIN\n                *if savewisconsin = true\n                    STATUS: DECEASED. DIED IN THE SKIRMISH WITH CODENAME: IOWA, CODENAME: MISSOURI, CODENAME: ARKANSAS AND CODENAME: LOUISIANA\n                *goto MtoN\n            #MISSISSIPPI\n                CODENAME: MISSISSIPPI\n                \n                AUGMENTATION: ENVIRONMENTAL ABILITY TO ACCELERATE THE GROWTH OF VEGETATION AROUND HIM\n                \n                STATUS: DECEASED. DIED DURING THE EXPLOSION OF SITE 50\n                *goto MtoN\n            #MISSOURI\n                CODENAME: MISSOURI\n                \n                AUGMENTATION: ENVIRONMENTAL ABILITY TO BRING INANIMATE OBJECTS TO LIFE AROUND THEM\n                \n                *if savewisconsin = false\n                    STATUS: DECEASED. KILLED BY CODENAME: WISCONSIN\n                *if savewisconsin = true\n                    STATUS: DECEASED. DIED IN THE SKIRMISH WITH CODENAME: IOWA, CODENAME: MINNESOTA, CODENAME: ARKANSAS AND CODENAME: LOUISIANA\n                *goto MtoN\n            #MONTANA\n                CODENAME: MONTANA\n                \n                AUGMENTATION: CORPORAL AUGMENTATION WHICH GIVES HER THE APPEARANCE OF A HUMANOID ELEPHANT\n                \n                STATUS: DECEASED. KILLED VIA AN EXPLOSION CAUSED BY CODENAME: VIRGINIA.\n                \n                *if tooknorth = true\n                    So that \"monster\" everyone was talking about was also an augmented?\n                *if tooknorth = false\n                    So that \"monster\" that almost killed you was actually one of these augmented people?\n                *goto MtoN\n            #NEBRASKA\n                CODENAME: NEBRASKA\n                \n                AUGMENTATION: ELEMENTAL ABILITY TO MANIPULATE EARTH\n                \n                STATUS: DECEASED. DIED DUE TO A CAVE IN CAUSED BY HIS OWN POWER.\n                \n                *if tooknorth = false\n                    So that's what caused that earthquake, huh?\n                    \n                    Seems quite ironic that he died to his own augmentation.\n                *goto MtoN\n            #NEVADA\n                CODENAME: NEVADA\n                \n                AUGMENTATION: CORPORAL AUGMENTATION WHICH GIVES HER THE ABILITIES TO DOWNLOAD, STORE AND TRANSFER DIGITAL INFORMATION\n                \n                STATUS: DECEASED. DIED DURING THE EXPLOSION OF SITE 50\n                *goto MtoN\n            #NEW HAMPSHIRE\n                CODENAME: NEW HAMPSHIRE\n                \n                AUGMENTATION: ELEMENTAL ABILITY TO MANIPULATE GRANITE\n                \n                STATUS: DECEASED. DIED TO THE TSUNAMI CAUSED BY CODENAME: HAWAII\n                *goto MtoN\n            #NEW JERSEY\n                CODENAME: NEW JERSEY\n                \n                AUGMENTATION: CORPORAL ABILITY WHICH ALLOWS HIM TO TURN INTO A POWERFUL APE-LIKE CREATURE.\n                \n                STATUS: DECEASED. DROWNED IN THE SWAMP\n                \n                It was a nasty way to go, even for someone as foul-mouthed as him.\n                *goto MtoN\n            #Go back.\n                *goto codenames\n    #N-S\n        *label NtoS\n        *choice\n            #NEW MEXICO\n                CODENAME: NEW MEXICO\n                \n                AUGMENTATION: CORPORAL ABILITY TO REPLICATE ANY SOUND.\n                \n                STATUS: DECEASED. DIED IN THE EXPLOSION OF USS HAWAII\n                *goto NtoS\n            #NEW YORK\n                CODENAME: NEW YORK\n                \n                AUGMENTATION: ENVIRONMENTAL ABILITY TO TELEPORT TO LOCATIONS PREVIOUSLY VISITED\n                \n                STATUS: DECEASED. DIED DUE TO CAVE IN CAUSED BY CODENAME: NEBRASKA.\n                \n                So he had the ability to teleport? Is it possible that he perhaps teleported away instead of dying?\n                \n                You're not sure which outcome you prefer.\n                *goto NtoS\n            #NORTH CAROLINA\n                CODENAME: NORTH CAROLINA\n                \n                AUGMENTATION: ENHANCED ABILITY TO SPOT FLAWS IN WORKS OF FICTION\n                \n                STATUS: DECEASED. DIED TO THE TSUNAMI CAUSED BY CODENAME: HAWAII\n                *goto NtoS\n            #NORTH DAKOTA\n                CODENAME: NORTH DAKOTA\n                \n                AUGMENTATION: ENVIRONMENTAL ABILITY TO ENLARGE INANIMATE OBJECTS IN SIZE\n                \n                STATUS: DECEASED. DIED IN THE FIRE AT CANNON POINT\n                *goto NtoS\n            #OHIO\n                CODENAME: OHIO\n                \n                AUGMENTATION: ENHANCED COURAGE AND MENTAL STABILITY\n                \n                STATUS: DECEASED. KILLED BY CODENAME: INDIANA\n                *goto NtoS\n            #OKLAHOMA\n                CODENAME: OKLAHOMA\n                \n                AUGMENTATION: INTERPERSONAL ABILITY TO COMMUNICATE WITH CATS\n                \n                *if savekansas = false\n                    STATUS: DECEASED. KILLED BY CODENAME: MONTANA\n                *if savekansas = true\n                    STATUS: DECEASED. DIED DURING THE EXPLOSION OF SITE 50\n                *goto NtoS\n            #OREGON\n                CODENAME: OREGON\n                \n                AUGMENTATION: ENVIRONMENTAL ABILITY TO LOWER THE GRAVITY AROUND HER\n                \n                STATUS: DECEASED. DIED DURING THE EXPLOSION OF SITE 50\n                *goto NtoS\n            #PENNSYLVANIA\n                CODENAME: PENNSYLVANIA\n                \n                AUGMENTATION: ENHANCED PRESTIDIGITATION\n                \n                *if savekansas = false\n                    STATUS: DECEASED. DIED IN THE EXPLOSION OF USS HAWAII\n                *if savekansas = true\n                    STATUS: DECEASED. KILLED BY CODENAME: MONTANA\n                *goto NtoS\n            #RHODE ISLAND\n                CODENAME: RHODE ISLAND\n                \n                AUGMENTATION: INTERPERSONAL ABILITY TO COMMUNICATE WITH BIRDS\n                \n                STATUS: DECEASED. DIED TO THE TSUNAMI CAUSED BY CODENAME: HAWAII\n                *goto NtoS\n            #SOUTH CAROLINA\n                CODENAME: SOUTH CAROLINA\n                \n                AUGMENTATION: ENHANCED PREMONITION\n                \n                STATUS: DECEASED. DIED DURING THE SELF-DESTRUCTION OF SITE 50.\n                \n                Your heart sinks remembering the old man.\n                *goto NtoS\n            #Go back.\n                *goto codenames\n    #S-W\n        *label StoW\n        *choice\n            #SOUTH DAKOTA\n                CODENAME: SOUTH DAKOTA\n                \n                AUGMENTATION: ENVIRONMENTAL ABILITY TO REDUCE INANIMATE OBJECTS IN SIZE\n                \n                STATUS: DECEASED. DIED TO THE TSUNAMI CAUSED BY CODENAME: HAWAII\n                *goto StoW\n            #TENNESSEE\n                CODENAME: TENNESSEE\n                \n                AUGMENTATION: ENHANCED VOCAL CORDS\n                \n                STATUS: DECEASED. DIED DUE TO CAVE IN CAUSED BY CODENAME: NEBRASKA.\n                *goto StoW\n            #TEXAS\n                CODENAME: TEXAS\n                \n                AUGMENTATION: CORPORAL ABILITY TO BREATHE UNDERWATER\n                \n                STATUS: DECEASED. DIED TO A DEADLY SHARK ATTACK\n                *goto StoW\n            #UTAH\n                CODENAME: UTAH\n                \n                AUGMENTATION: MOLECULAR MANIPULATION OF INANIMATE OBJECTS\n                \n                STATUS: ALIVE\n                \n                You read the entry with curiosity, though you are not sure what it even means. \n                \n                You turn to look at Utah, but she seems to be just as lost as you are.\n                *goto StoW\n            #VERMONT\n                CODENAME: VERMONT\n                \n                AUGMENTATION: ELEMENTAL ABILITY TO MANIPULATE MAPLE SYRUP\n                \n                STATUS: DECEASED. DIED IN THE FIRE AT CANNON POINT\n                *goto StoW\n            #VIRGINIA\n                CODENAME: VIRGINIA\n                \n                AUGMENTATION: ENHANCED STRENGTH AND ENDURANCE\n                \n                STATUS: DECEASED. KILLED BY CODENAME: INDIANA\n                \n                That would explain why the old man seemed so athletic despite his age. \n                \n                You do miss him, just a little bit.\n                *goto StoW\n            #WASHINGTON\n                CODENAME: WASHINGTON\n                \n                AUGMENTATION: ENVIRONMENTAL ABILITY TO INCREASE AUTONOMY AND INTELLIGENCE OF MACHINES AND ELECTRONIC DEVICES\n                \n                STATUS: DECEASED. KILLED BY CODENAME: INDIANA\n                *goto StoW\n            #WEST VIRGINIA\n                CODENAME: WEST VIRGINIA\n                \n                AUGMENTATION: DYNAMIC POWER WHICH CHANGES BASED ON THE SEASON\n                \n                STATUS: DECEASED. DIED DURING THE EXPLOSION OF SITE 50\n                *goto StoW\n            #WISCONSIN\n                CODENAME: WISCONSIN\n                \n                AUGMENTATION: ENHANCED REGENERATION\n                \n                *if savewisconsin = false\n                    STATUS: DECEASED. KILLED BY CODENAME: VIRGINIA.\n                    \n                    You recall the crazy bastard who almost killed you and the other survivors in blind vengeance.\n                *if savewisconsin = true\n                    STATUS: DECEASED. DIED DURING THE EXPLOSION OF SITE 50\n                    \n                    If the status is true, then his regenerative powers clearly weren't enough to survive the explosion.\n                *goto StoW\n            #WYOMING\n                CODENAME: WYOMING\n                \n                AUGMENTATION: ENVIRONMENTAL ABILITY TO EMIT EXTREME HEAT FROM HIS BODY\n                \n                STATUS: DECEASED. DIED DURING THE EXPLOSION OF SITE 50\n                *goto StoW\n            #Go back.\n                *goto codenames\n    #I'm done reading.\n        You leave the computer and Cooper addresses you again, \"So? Do you believe me now?\"\n        \n        \n        *goto morecd\n*label labrats\n*set trueself true\nYou come to your senses inside of what looks like a prison cell, only without the typical iron bars and instead a glass wall which separates you from the room with Cooper's daughter floating in a cylinder. You find Utah next to you as she also wakes up. \n\n\"What do we do now?\" you say, hoping for some reason that she might have a plan.\n\n\"I…\" Utah tries to speak, but doesn't have the strength to do so, she closes her eyes and faints again. You try to wake her up, but to no avail.\n*page_break Then they came...\nSeveral men in hazmat suits. They enter your cell and forcefully pick you up.\n\nThough you try to resist, your body is too weak to do so. \n\nThey lead you to another room, one with bright white light and a table in the middle, which they place you on top of.\n\nThen the experiments begin…\n\nThey cut you, draw your blood, inject you with various substances and study your every reaction.\n\nYou wonder how Utah is doing, but judging by the screams coming from another room, she isn't doing any better…\n*page_break It's a nightmare.\n*achieve utahbadend\nYou cannot tell how long it has been since you were put here. \n\nWeeks? \n\nMonths?\n\nYou have tried to escape several times, but were always prevented from doing so with ample doses of tranquilizer. You were experimented on by machines, people and god knows what else. \n\nYou got used to the pain pretty quickly, though you don't have much of a will to live anymore. \n\nApparently, Utah passed away during one of the \"routine\" experiments. Good for her.\n\nYou were less lucky as you suffered for a few more days, or was it weeks?\n\nThankfully, one of the experiment drugs you were injected with did something that your body didn't like and you died in agony.\n*page_break Free at last…\n*goto_scene finalscreen\n*label utahgoodend\n\"We need to run!\" you shout. \n\n\"What?\" Utah turns to you, confused, \"But we can find out what happened!\"\n\n\"No! Don't waste your time on him, think of your powers! We're augmented, remember!\"\n\n\"What?\" Utah sounds even more confused, but you see a spark of recognition in her eyes. \n\n\"Ah, so you've finally remembered! Good job!\" the man on the screen says mockingly. \n\n\"We need to get out of here, think of your power!\" you shout to Utah, who grabs her head with both of her hands anxiously. \n\n\"I'm afraid it's not going to happen,\" Cooper smirks as turrets pop out of the ceiling all around you.\n\n\"Please!\" you shout to Utah desperately, who seems to be concentrating hard.\n\nJust when the turrets are about to shoot, Utah comes to her senses and points her arms at them. \n\nInstantly, the turrets fall apart as if they were plastic models.\n\nShe then turns towards the metallic door and points her hand at it, making the door fold apart into several sheets of metal like it's been torn apart. \n\n\"Whoa…\" you utter.\n\n\"Come on! Let's got!\" Utah shouts and grabs your hand, leading you out of the laboratory. \n*page_break\n\"What was that?\" you ask her as you make your way out of the basement.\n\n\"I remember it now; my power allows me to assemble and disassemble things,\" she explains as you run out of the mansion, \"And I think I know how we can get out of here!\"\n\nUtah leads you to the island's harbor and you remember all of the atrocious events that occurred here yesterday. \n\n\"Wait.. are you..?\" you ask, thinking whether Utah thought of the same thing.\n\n\"I think I can fix it!\" she yells excitedly. \n\nShe stops in front of the the ship's wreckage and points her arms at it in great concentration. \n\nAt first it seems that it did nothing, but slowly the ship rises out of the ocean, its broken parts fixing up by themselves right in front of you. The large hole left in its hull from the explosion is rapidly closing with metal and the damage from the fire is disappearing on the ship's bridge.\n*page_break It's a magical sight!\n*set trueself true\nShortly after, the ship looks as if it's brand new and Utah invites you on board, \"Welcome to USS Utah!\" she adds jokingly. \n\nYou smile, though you cannot shake a sinking feeling in your stomach.\n\n\"What's wrong?\" Utah looks at you with concern, \"I mean.. A lot of things are, of course, but.. I think we can make it out of here now!\"\n\n\"I..\" you begin, but struggle to find words, \"It's all my fault, you know? I made everyone forget who they were and now they're all dead.\"\n\n\"What do you mean?\" Utah's eyes widen.\n\n\"I'm Oblivion. I have the power to make people forget things. I was a supervillain; robbed banks, made people forget my face to avoid persecution.. And when I was finally caught, they gave me an ultimatum; erase the memories of the test subjects and you may go free.\" \n\n\"I see,\" Utah frowns, thinking your words over, \"Regardless of what you did, I don't think you are the same person anymore.\"\n\n\"How could you say that?' you say.\n\n*if mainegender = 1\n    She puts her hands on your shoulders and looks you in the eyes, \"The person I know did their best to help everyone, that's the real you. Your past does not define you. You can start over, you don't have to be Oblivion anymore!\"\n    \n*if mainegender = 2\n    She puts her hands on your shoulders and looks you in the eyes, \"The woman I know did her best to help everyone, that's the real you. Your past does not define you. You can start over, you don't have to be Oblivion anymore! \"\n\n*if mainegender = 3\n    She puts her hands on your shoulders and looks you in the eyes, \"The man I know did his best to help everyone, that's the the real you. Your past does not define you. You can start over, you don't have to be Oblivion anymore!\"\n\n\"Thank you,\" you say, stifling the bitter-sweet tears.\n\n\"Alright, let's get out of here!\" Utah smiles and you help her set everything up for departure, though it's mostly her doing as her powers prove extremely valuable around the ship. \n*page_break\nAs you leave the harbor, headed east, you spot something concerning; three black military helicopters flying towards you.\n\n\"Guess we have company,\" you say, \"Do you think they are friendly?\"\n\nUtah shakes her head, \"I wish, but it's unlikely, I'll have to stop them.\"\n\nShe walks up to the main mast of the ship and points her arms in the direction of the helicopters. \n\nBut nothing happens…\n\n\"Hmm, guess they are too far for me still…\" Utah ponders out loud as you watch the helicopters slowly approach you. There is now a man hanging out of one of them.\n\nHe is holding a grenade launcher!\n\n\"Would be a great time for some disassembly, don't you think?\" you say, trying to mask your concern with humor.\n\n\"I'm trying!\" Utah says, her eyes concentrated on the target. \n\nBut the helicopters seem to still be too far for her and the grenade launcher guy doesn't wait as he fires a shot. \n\n'The missile!\" you yell. \n\nUtah grits her teeth and points her arms at the missile, but nothing happens.\n*page_break Until...\nThe missile is within a few hundred feet away as it splits apart in two and the separate parts land on either side of the ship, creating small explosions in the water and causing waves that shake the ship, but do not harm it!\n\n\"Phew!\" you say, wiping the sweat off your forehead.\n\n\"Alright, now they've done it!\" Utah shouts and points her arms at the two helicopters that are the closest to you. This time her power works and the helicopters collapse in on themselves and fall apart mid-air, raining their metallic parts all over the ocean. You'd hate to be inside one of them right now...\n\nThe third helicopter seems to have gotten the memo as it turns around and attempts to escape.\n\n\"I'm afraid I can't let you do that!\" Utah says and forces the helicopter's tail to fall off, making it spin wildly in the air until it crashes into the water. \n\nWith that, all of the helicopters are gone and Utah breathes a sigh of relief, then stumbles toward you before falling in your arms, exhausted. \n\nYou help her get to the medical bay of the ship and help her rest. \n*page_break Days later...\n*achieve utahgoodend\nYou sailed for days until you finally disembarked somewhere on the island of Sumatra in Indonesia. \n\nYou try to keep low profile as you travel around South-East Asia with Utah, knowing that you cannot go back home any time soon, if ever. \n\nHowever, you are together and thus manage to pull through any difficulties you face. \n\nAnd hey, isn't being with someone you love the most important thing anyway?\n*page_break\n*goto_scene finalscreen\n", "screenshots": "*set mainegender 1\n*set Egoism 50\n*set Cooperation 50\n*set Violence 50\n*set Hope 50 \n*set Rebellion 50 \n*set Al 0\n*set Florida 0\n*set Kansas 0 \n*set Jersey 0 \n*set Utah 0\n\"Fine, let's use these to distinguish ourselves,\" the old bodybuilder-looking guy points at his dog tag. \n\n\"Sounds stupid, but alright. Call me Jersey,\" the rude young man points at his \"New Jersey\" tag.\n\n\"And I'm.. York!\" the young guy from New York adds sheepishly.\n\nYou take the chance to look around at the other folks, and though it is hard to get an accurate head count, you estimate that there is more than forty of you here. Some of the survivors draw your attention:\n*fake_choice\n    #The old man who helped me on the beach.\n    #A girl with a face tattoo.\n    #A guy in the expensive suit.\n    #The woman from Utah. \n    #I look at the girl in the back, who looks very tense.\n    #The person with Kansas on their dog tag catches my eye.\n    #I'm done looking around.\n*page_break\n*set mainegender 2\n*set knowledge 1\n*set Egoism 40\n*set Cooperation 50\n*set Violence 50\n*set Hope 60 \n*set Rebellion 50 \n*set Al 0\n*set Florida 0\n*set Kansas 0 \n*set Jersey 0 \n*set Utah 0\n*script changeBackgroundColor(\"black\")\n\nAfter looking around the barracks for any remaining items (which you don't find), you and the others get some food from the supply room, which consists of various kinds of canned foods and army rations.\n\nYou get yourself something that resembles a stew in a can. It's actually not too bad! Then again, hunger is the best condiment, as they say. \n\nYou feel a bit awkward eating by yourself, so you decide to join one of the other survivors:\n*fake_choice\n    #I join Al.\n    #I approach Florida.\n    #I sit next to Kansas.\n    #I get closer to Jersey.\n    #I take a seat next to Utah.\n    #I eat alone anyway.\n*page_break\n*set mainegender 3\n*set knowledge 1\n*set Egoism 70\n*set Cooperation 30\n*set Violence 50\n*set Hope 20 \n*set Rebellion 60 \n*set Al 0\n*set Florida 0\n*set Kansas 50 \n*set Jersey 20\n*set Utah 0\n*script changeBackgroundColor(\"sepia\")\n\nThe remaining survivors split into two groups, about a dozen people in each. The south one is led by Virge with Jersey, Al (with Delaware), York and Indiana in it, among others. \n\nThe north one is led by Utah with Florida, Washington, Idaho and others in it. It seems to be mostly made up of people who don't like Virge. It all feels very familiar. \n\nYou wonder who to join:\n*fake_choice\n    #I will go north.\n    #I will go south.\n    #Screw that; I'll swim across!\n*page_break\n*set mainegender 2\n*set knowledge 1\n*set Egoism 10\n*set Cooperation 40\n*set Violence 70\n*set Hope 80 \n*set Rebellion 20 \n*set Al 50\n*set Florida 10\n*set Kansas 20 \n*set Jersey 0\n*set Utah 10\nAside from the ship and the harbor nearby, you spot several prominent buildings; one that looks like a hangar, one that seems to be some kind of warehouse, a strange angular building and, most interestingly, an ostentatious mansion located in a picturesque spot near the lagoon.\n\nWhere do you go?\n*fake_choice\n    #I check out the hangar.\n    #I check out the warehouse.\n    #I check out the mansion.\n    #I check out the strange building.\n    #I check out the harbor.\n    #I get on the ship, of course!\n*page_break\n*set mainegender 3\n*set knowledge 1\n*set Egoism 10\n*set Cooperation 40\n*set Violence 70\n*set Hope 80 \n*set Rebellion 20 \n*set Al 0\n*set Florida 10\n*set Kansas 0 \n*set Jersey 0\n*set Utah 10\nAfter your \"dinner\" you and the others prepare for the night, though you are not sure whether it's actually nighttime outside as there are no windows here. \n\nYou take one of the bunk beds and try to go to sleep, which is far harder than you expected, and you expected it to be hard. How can one sleep in a situation like this? You are stuck on an island god knows where with a bunch of people you don't know in an abandoned army facility which is filled with deadly traps! \n\nSeveral people have already died today. Will you be next? You feel somewhat lucky for surviving, but then again, perhaps the ones who died already are the lucky ones?\n*fake_choice\n    #I feel desperate. How can I possibly get out of here alive?\n    #The situation is dire, but I'm sure we'll find a way out of this mess!\n*page_break\n*goto_scene finalscreen", "startup": "*title Fifty\n*author Rustem Khafizov\n\n*scene_list\n    startup\n    fiftynifty\n    $ takethefifth\n    $ fiftyfifty\n    $ fifthcolumn\n    $ fivews\n    $ finalscreen\n    $ fivestooges\n    $ totalrecall\n    $ ending\n\n*create mainegender 1\n*create followedvirge false\n*create calided false\n*create wenttocontrol false\n*create southdies false\n*create savekansas false\n*create nebraskadies false\n*create tenndies false\n*create yorkdies false\n*create nddies false\n*create kansasdies false\n*create aldies false\n*create floridadies false\n*create jerseydies false\n*create utahdies false\n*create deldies false\n*create washdies false\n*create idahodies false\n*create virgedies false\n*create indydies false\n*create savewisconsin false\n*create wisconsinkilled false\n*create cahootswithindy false\n*create montanakilled false\n*create mainegun false\n*create Egoism 50\n*create Cooperation 50\n*create Violence 50\n*create Hope 50 \n*create Rebellion 50 \n*create Al 0\n*create Florida 0\n*create Kansas 0 \n*create Jersey 0 \n*create Utah 0\n*create knowledge 0\n*create trueself false\n*create joinedmimal false\n*create Minnesota 0\n*create Iowa 0\n*create Missouri 0 \n*create Arkansas 0 \n*create Louisiana 0\n*create tooknorth true\n*create metindiana false\n*create metidaho false\n*create metnd false\n*create mettennessee false\n*create mettexas false\n*create metilli false\n*create totalend false\n*create illidies false\n*create cangoodend false\n*create indyshot false\n*create sawcard false\n*create delname \"???\"\n\n*achievement firstdeath hidden 10 First Death\n    hidden\n    Large waves and metallic doors don't mix very well…\n*achievement abyss hidden 10 Abyss\n    hidden\n    You're not quite sure if there was a bottom to this pit.\n*achievement eliminated hidden 10 Eliminated\n    hidden\n    The security system seems to be working well. Too well.\n*achievement timber hidden 10 Timber!\n    hidden\n    Good news: you managed to survive the explosion. Bad news: you did not survive its aftermath.\n*achievement alded visible 25 Looking for Al \n    Goodbye, Al…\n*achievement floridaded visible 25 Florida Woman\n    Goodbye, Florida…\n*achievement kansasded visible 25 Dust in the Wind\n    Goodbye, Kansas…\n*achievement jerseyded visible 25 Blue Hole \n    Goodbye, Jersey…\n*achievement utahded visible 25 Great Basin\n    Goodbye, Utah…\n*achievement bloodonthesand hidden 10 Blood on the Sand\n    hidden\n    It was a good try, but not good enough…\n*achievement gotexploded hidden 10 Got Exploded\n    hidden\n    Seems you were destined to explode that day…\n*achievement snakeeyes hidden 10 Snake Eyes\n    hidden\n    Welp, at least you died in your sleep. \n*achievement exterminated hidden 10 Exterminated\n    hidden\n    The cleaners don't leave ANY traces.\n*achievement sharkbait hidden 10 Shark Bait\n    hidden\n    You'll need a bigger boat, or any boat for that matter.\n*achievement lightning hidden 10 Lightning Rod\n    hidden\n    Shocking, I know.\n*achievement hellfire hidden 10 Hellfire\n    hidden\n    You definitely felt the burn…\n*achievement bangbang hidden 10 Bang-bang!\n    hidden\n    The turret's aim was true…\n*achievement oceanwater hidden 10 Watery Grave\n    hidden\n    Maine drowned.\n*achievement monstermadness hidden 10 Monster Madness\n    hidden\n    At least you died quickly…\n*achievement kamikaze hidden 10 Kamikaze\n    hidden\n    You have killed the monster, but at what cost?\n*achievement ivory hidden 10 Ivory\n    hidden\n    So that's how a shish kebab feels?\n*achievement betrayal hidden 10 Betrayal!\n    hidden\n    This game SUCKS!!!\n*achievement rockbottom hidden 10 Rock Bottom\n    hidden\n    You've certainly hit it, or rather, it hit you.\n*achievement frozen hidden 10 Frozen\n    hidden\n    You really let your life go…\n*achievement shipwrecked hidden 10 Shipwrecked\n    hidden\n    Your ship has sailed…\n*achievement mutineer hidden 10 Mutineer\n    hidden\n    Your mutiny went about as well as expected…\n*achievement hoosier hidden 10 The Hoosier\n    hidden\n    You've traversed the crossroads of death.\n*achievement solesurvivor hidden 10 Sole Survivor\n    hidden\n    You were so close and yet so far…\n*achievement castaway hidden 10 Castaway\n    hidden\n    You died alone in the middle of nowhere. Good riddance.\n*achievement laststraw hidden 10 Last Straw\n    hidden\n    It's over, isn't it?\n*achievement letitdie hidden 10 Body in the Water\n    hidden\n    You shall not mess with Al, pal!\n*achievement fallguy hidden 10 Fall Guy\n    hidden\n    You did not qualify to be a passenger.\n*achievement badluck hidden 10 Bad Luck\n    hidden\n    Extra! Extra! Karma strikes again!\n*achievement burnbabyburn hidden 10 Burn, Baby, Burn\n    hidden\n    You went to hell before you died. And afterwards too.\n*achievement outsmarted hidden 10 Outsmarted\n    hidden\n    Messed with the smart; now have to restart!\n*achievement albadend visible 25 Bad Day\n    See Al's Bad Ending.\n*achievement floridabadend visible 25 Lightning Crashes\n    See Florida's Bad Ending.\n*achievement kansasbadend visible 25 Together Forever\n    See Kansas' Bad Ending.\n*achievement jerseybadend visible 25 Cinematic Massacre\n    See Jersey's Bad Ending.\n*achievement utahbadend visible 25 Lab Rats\n    See Utah's Bad Ending.\n*achievement algoodend visible 30 Golden Child\n    See Al's Good Ending.\n*achievement floridagoodend visible 30 Lightning Bird\n    See Florida's Good Ending.\n*achievement kansasgoodend visible 30 Stay Away\n    See Kansas' Good Ending.\n*achievement jerseygoodend visible 30 Jersey Devil\n    See Jersey's Good Ending.\n*achievement utahgoodend visible 30 USS Utah\n    See Utah's Good Ending.\n*achievement allendings visible 50 Ten out of Ten\n    See ten endings.\n*achievement ubermensch hidden 50 Project \"Übermensch\"\n    hidden \n    You have discovered the island's secret.\n*achievement liveandletdie visible 50 Live and Let Die\n    Be the only one left alive.\n*achievement alldeaths visible 50 So Many Good Ways to Die\n    Discover all Dead Ends.\n*achievement totalrecall hidden 100 Total Recall\n    hidden\n    You have discovered the secret ending. Bravo!\n\n*if choice_is_omnibus_app\n    *comment skip description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n    You are one of the 50 strangers stranded on a mysterious island. None of you remember how you got here or even your names, so you use the names on the dog tags you all have on your necks – the names of the fifty states. Will you survive and uncover the island’s secrets or perish to its many dangers?\n\n    [i]Fifty[/i] is a 56,000-word interactive thriller novel by Rustem Khafizov. It is entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n     \n    • Play as male, female, or non-binary.[n/]\n    • Will you save others from certain death or let them die to ensure your own survival?[n/]\n    • No character is immune to death. Will they live? Will they die? It’s up to you![n/]\n    • Romance one of the five other survivors. Will you date a convict from Florida or a foul-mouthed Jerseyite?[n/]\n    • Will you uncover the island’s true purpose as well as your own dark past?[n/]\n    • Will you find the saboteur among you?[n/]\n    • Ten unique endings, as well as a secret one.[n/]\n    • Will you stay hopeful or fall into despair?[n/]\n    • Will you uncover the island’s true purpose as well as your own dark past or perish to the island’s countless death traps?[n/]\n    • Will you become the sole survivor? [n/]\n     \n    Who lives? Who dies? You decide!\n\n    *if choice_prerelease and not(choice_is_ios_app)\n        [i]You can play the first two chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n        *choice\n            #Sign up to be notified when the game is available.\n                *subscribe {\"now\": true}\n                *restart\n            #Play the first two chapters now for free.\n                *goto purchased\n\n    [i]You can play the first two chapters of the game for free. Purchase the rest of the game below.[/i]\n    *if choice_is_advertising_supported\n        [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n    *purchase_discount adfree 2021-06-10 $3.99 $2.99 purchased\n    *if choice_is_advertising_supported\n      *page_break_advertisement\n    *if not(choice_is_advertising_supported)\n      *page_break Play Now for Free\n\n\n*label purchased\n\n*if choice_is_omnibus_app\n    Content warning: may contain natural disaster, suicide, infant mortality.\n    *page_break\n\n\n*check_achievements\n*if choice_achieved_allendings\n    *set totalend true\nYou wake up from the scorching sun and the taste of sand in your mouth. Your head feels like you have been hit by a bus. You open your bleary eyes and look around.\n\nThe sight is surreal.\n\nYou are on an unfamiliar beach with at least a couple dozen more people lying not too far away from you. Some of them are getting back on their feet while others are still unconscious. At least, you hope they are unconscious.\n\nWhat is this place?\n\nYou feel a tugging on your neck, you touch it and find a small dog tag with the single word \"Maine\" inscribed on it.\n\nThough you struggle to recall your own name, you do remember that Maine is the place you are from, though the details are blurry. \n\nYou examine the dog tag some more, but don't find any other information on it. You try to recall more details about yourself.\n*fake_choice\n    #\"You alright there, girl?\" you hear an old man's voice addressing you.\n        *set mainegender 2\n    #\"You alright there, boy?\" you hear an old man's voice addressing you.\n        *set mainegender 3\n    #\"You alright there, kid?\" you hear an old man's voice addressing you.\n    *if (totalend = true) #Wait a minute...\n        *goto_scene totalrecall\nYou look up and see an old black man with gray hair. He looks like he's about sixty or older. He gives you his hand and helps you get up on your feet. You notice he has a similar dog tag to yours on his neck, his reads \"South Carolina\".\n\nAs you get up, you immediately get stricken with a sense of dizziness, which you manage to ignore as you look around some more. \n\n\"I reckon you don't recall what happened either?\" he asks in a deep Southern drawl, \"The place looks decent, but I get the hunch we'd better get somewhere else and quick,\" he adds and walks away to help another person.\n\nYou scan the surroundings, trying to understand what happened, though you find it hard to fully process the situation. It looks like you and a bunch of other people just ended up shipwrecked on this beach, though you don't see any boats around or remember being on one.\n\nYou try to look around and figure out just how many people are here with you.\n*finish Looks like there's about…", "takethefifth": "[b]Chapter 2: Take the Fifth[b]\n\n[b]Survivors: 40[b]\n\nAs you wake up, you enjoy a moment of blissful ignorance before the reality of your current predicament sets in again. You are on an unknown island; stuck on some abandoned military base. You do not know the rest of your fellow survivors, and on top of that, you cannot even remember your own name!\n\n\"Alright, what do you want! Whatever ransom you have in mind, I can pay it! You know it; I know it, so stop this madness already!\" Washington shouts as he stares at the ceiling, looking from one side of the room to the other. Is he looking for a hidden camera or something?\n\nThere is no answer. Then again, even if there was some kind of concealed camera, how would the people watching be able to communicate with you?\n\nWashington proceeds to plead with an invisible kidnapper. Surprisingly, no one stops him as the rest of the survivors are just sitting on their bunk beds or walking around aimlessly. Perhaps everyone secretly hopes that there is indeed a secret kidnapper who will end this whole mess after Washington agrees to pay some astronomical sum of money?\n\n\"Maine, come here!\" Virge addresses you, bringing you back to reality. It takes you a moment to remember that this is what people will call you here, as you cannot recall your own name.\n*choice\n    #Go with Virge.\n        *set rebellion -10\n        You consider telling him to go away, but Washington's incessant pleading is starting to get old, so you take the opportunity to leave the room.\n        \n        \n        *goto crowdoor\n    #Decline.\n        *set rebellion +10\n        \"No thanks,\" you say curtly.\n        \n        \"Alright, suit yourself,\" Virge responds and leaves the barracks.\n        \n        He returns a few minutes later and addresses the room, \"Alright, we should head out and look for the control room for the doors to open! We won't make it outside otherwise. You can stay here if you want, but I'll need at least a couple folks to help out!\"\n        \n        \n        *goto nogo     \n*label crowdoor\n*if followedvirge = false\n    \"You seem like the capable sort, let's see if we can pull these doors open,\" Virge says as he leads you to a closed door right outside the barrack rooms. This must be the way Virge and the others went through yesterday.\n    \n    \"There was a hallway here,\" he explains, \"It got shut closed when we entered, let's try to pry these doors open,\" he says as he hands you a crowbar. Where did he find that?\n    \n    You take the crowbar and nudge it below the door. Together with Virge, you pull both of your weights onto the crowbar, trying to open it, but it doesn't budge.\n    \n    \"Damn, I was afraid that this would happen,\" he states as he wipes a bead of sweat from his eyebrow, \"We'll need to find the control room to turn the emergency mode off. The doors won't open otherwise.\"\n    \n    You think of the path you came through, but wince when you recall the floor falling before your eyes and the screams of those who fell down that bottomless pit.\n    *page_break\n    *goto assembleteam\n*if followedvirge = true\n    \"You seem like the capable sort, let's see if we can pull these doors open,\" Virge says as he leads you to a closed door right outside the barrack rooms. You wince at the memories of doors closing on your group yesterday and the sound of those freaking turrets. You get a sickening feeling in your stomach thinking about getting to the part where two people were trapped and shot yesterday.\n    \n    \"Let's try to pry these open,\" Virge says and hands you a crowbar. Where did he find that?\n    \n    You take the crowbar and nudge it below the door. Together with Virge, you pull both of your weights onto the crowbar, trying to open it, but it doesn't budge.\n    \n    \"Damn, I was afraid that this would happen,\" he states as he wipes a bead of sweat from his eyebrow, \"We'll need to find the control room to turn the emergency mode off. The doors won't open otherwise.\"\n    \n    \"Wasn't there another path?\" you ask, recalling that the other group went through a different path yesterday and also ended up in the barracks.\n    \n    Virge shakes his head, \"Nope, I checked. The floor is gone and there's about a fifty feet gap between the exits. You can't even see the bottom,\" he explains.\n    *page_break\n    *goto assembleteam\n*label assembleteam\n*set metindiana true\nYou and Virge return to the barracks and he addresses the room, \"Alright, we should head out and look for the control room for the doors to open! We won't make it outside otherwise. You can stay here if you want, but I'll need at least a couple folks to help out!\"\n\n*label nogo\nThe room is silent and most don't respond. You feel like you are in a classroom and the teacher just asked a question nobody wants to answer. Well, almost nobody.\n\n\"Alright, let's get this shit over with!\" Jersey jumps from his bunk bed and joins Virge as he adjusts his glasses with a determined look behind them. \n\nFlorida struts to his side as well, yawning and stretching her arms nonchalantly. Why does she look like she's joining them for breakfast and not on a potentially deadly mission?\n\nThey are also approached by a man in his thirties. His dog tag reads “Indiana”. His appearance could be described as tall, dark and handsome, except for the tall part as he is shorter than average. Similarly to Washington, he wears suit and tie, though his is considerably less expensive-looking. \n\nA couple more folks join the group, including Utah, who looks pensive, and Al, who left Delaware sleeping quietly on his bunk bed. \n\nSouth walks up to them as well, \"I may not be much help, but I can't let you kids get yourselves killed,\" he explains.\n\nYou ask yourself whether you should join this potentially suicidal mission; you could conceivably find a way out, but the probability of you dying in some horrific manner is also something to consider.\n*choice\n    #I go with them.\n        *set wenttocontrol true\n        *set hope +10\n        The desire to get out of this place overturns your survival instincts. If there is a way out, you are going to find it, even if you have to risk your life for it!\n        \n        \n        *goto findcontrolroom\n    #I stay at the barracks.\n        *set hope -10\n        You make a wise decision to remain in the safety of the barracks. Plus, it gives you a chance to get to know some of the other survivors better.\n        \n        You get yourself something resembling breakfast out of the supply crate as you overhear a conversation between two other survivors:\n        \n        \"I'm telling you, West, this is some twisted reality show like in that 80's movie!\" the young woman with the \"Oregon\" dog tag exclaims.\n        \n        \"Nah, dude, it's way too complex to be something like that,\" the young man with the \"West Virginia\" dog tag responds, \"I think it's like.. we are the chosen ones! Think about it; we've got people from different states and backgrounds here. We're like.. the representation of humanity or something! Well, of the United States more like, but that's basically the same thing.\"\n        \n        \"Right, why would anybody choose us for that?\" Oregon asks snarkly.\n        \n        \"Um.. maybe they want to see if humanity is worth saving or something? It's like.. if we survive, then humanity is spared!\"\n        \n        \"By who?\" Oregon raises an eyebrow.\n        \n        \"I dunno, aliens?\" West shrugs.\n        \n        With that, their conversation moves to a different topic and you get back to your bunk bed.\n        *page_break\n        After awhile, Virge and the others return with weird looks on their faces. \n        \n        \"So? How did it go?\" you ask them.\n        \n        \"We need to get out! Quick!\" Al responds frantically as he briskly walks towards his bunk bed. \n        \n        \"What?\" you ask, confused. \n        \n        \"Listen, everyone, \" Virge addresses the room, \"The good news is: we've found the control panel to open the main door. The bad news is: the base would have to be set to self-destruct mode in order for them to open, which means we need to run as fast as we can when it happens.\"\n        \n        The room is stunned with that revelation, then people start frantically picking their humble belongings as they prepare to leave. \n        \n        \"Where's South? the man with the \"Idaho\" dog tag asks Virge.\n        \n        \"Someone has to press the self-destruct button manually. He volunteered,\" Virge explains grimly.\n        \n        What? Sure, you barely know the old man, but is he really going to die like that?\n        *page_break Minutes later...\n        \"Alright, let's go!\" Virge barks and everyone follows him to the exit. \n        \n        Everyone, except Kansas, that is, who is still lying on their bunk bed, staring into the ceiling with an empty expression on their face. \n        \n        \"You're not coming?\" you ask them.\n        \n        \"What's the point?\" they respond, \"If we're gonna die anyway, might as well get this over with,\" they state bluntly.\n        *choice\n            #I leave them be.\n                *set egoism +10\n                You decide to leave their fate to their own hands and leave them. They continue lying on the bed and staring at the ceiling above them without any discernible emotion.\n                \n                You get to the blocked door which leads to a turret-lined hallway and find everyone assembled here.\n                \n                You suddenly hear South's voice coming over the speakers, \"Alright, folks, I'm about to press this here button, hope y'all ready. Be careful out there and make sure not to lose hope, ya hear? There ain't much chance to make it out of here without it.\"\n                \n                In a moment, his voice is replaced with a loud siren which blasts through the room and you see the lights turn to a menacing red.\n                \n                \"Alright, here goes nothing!\" Virge shouts.\n                \n                The door in front of you opens, revealing a long hallway that leads to the exit. You and the others run through. To your surprise, you don't see any bodies left from yesterday despite there definitely being two people who were trapped here with the turrets. You don't even see any traces of blood, though that might be due to the whole room now looking blood red thanks to the emergency lighting.\n                *page_break\n                *goto wheretorun\n            #I grab them and take them with me.\n                *set egoism -10\n                *set savekansas true\n                Partially due to not wanting South's sacrifice to be in vain and partially due to liking Kansas, you take their hand and force them out of the bunk bed. They don't resist, but they don't help you either, so you have to drag them to the escape door with you.\n                \n                Kansas sighs and rolls their eyes, \"You're wasting your time,\" they state.\n                \n                You don't respond and get to the door which leads to a turret-lined hallway and find everyone already assembled here. Virge raises an eyebrow seeing you holding Kansas' hand.\n                \n                You suddenly hear South's voice coming over the speakers, \"Alright, folks, I'm about to press this here button, hope y'all ready. Be careful out there and make sure not to lose hope, ya hear? There ain't much chance to make it out of here without it.\"\n                \n                In a moment, his voice is replaced with a loud siren which blasts through the room and you see the lights turn to a menacing red.\n                \n                \"Alright, here goes nothing!\" Virge shouts.\n                \n                The door in front of you opens, revealing a long hallway that leads to the exit. You and the others run through. To your surprise, you don't see any bodies left from yesterday despite there definitely being a few people who were trapped here with the turrets. You don't even see any traces of blood, though that might be due to the whole room now looking blood red thanks to the emergency lighting.\n                *page_break\n                *goto wheretorun\n*label findcontrolroom\nYou and your group leave the barracks and enter another hallway. Is this whole base just a mess of different hallways or something? \n\nThis one doesn't have any turrets in it, at least. You and the others try opening the doors lining the hallway, some of which turn out to be bathrooms and storage closets, though you don't find anything incredibly useful in there, just some mops and buckets.\n\nYou proceed further, Virge taking the lead, which is fine by you as that puts you at a safer distance from whatever is ahead.\n\nSouth walks up to you and hands you a chocolate bar, \"Here, no good walking around hungry at this time,\" he explains.\n\nYou take it, somewhat apprehensively. \n\n*if mainegender = 1\n    \"Sorry for being a bother, you just remind me of my grandkid. Hope they're doing alright. Gotta be doing better than their gramps at least,\" he smiles. \n\n*if mainegender = 2\n    \"Sorry for being a bother, you just remind me of my granddaughter. Hope she's doing alright. Gotta be doing better than her gramps at least,\" he smiles. \n    \n*if mainegender = 3\n    \"Sorry for being a bother, you just remind me of my grandson. Hope he's doing alright. Gotta be doing better than his gramps at least,\" he smiles. \n\nThe chocolate bar tastes delicious and you feel like you are regaining some of the energy you lost.\n*page_break\nAnother door and you find yourself at the top of a spiraling staircase. You look to the bottom of it and find that it has partially collapsed.\n\n\"Who designed this place? It's fucking horrible!\" Jersey comments, spitting from the top of the staircase. It takes a few seconds for the spit to hit the floor. Well, at least there's definitely a bottom to this room.\n\n\"If there is a control room in this bunker, it can only be down there,\" Utah comments, overlooking the staircase with suspicion.\n\n\"We better watch out for one another. Whoever is the scumbag behind all this, they ain't gonna let us out of here that easily,\" South adds.\n\nYou and your fellow survivors proceed downward, descending the spiraling staircase, while carefully stepping over its collapsed steps and avoiding its rusty railing. \n*page_break\nYou get to the bottom of the staircase, or whatever is left of it as the bottom flight of it has fallen through completely, requiring you to jump about six feet down to get to the floor.\n\nYou take it slowly and manage to get down, though some of you requiring help (mostly South) and find yourself in front of a door with the \"Control Room\" written on it.\n\n\"Bingo!\" Virge shouts, almost smiling. He jerks the door open, which thankfully wasn't locked, and you find a room lined with computer monitors, security camera screens and filing cabinets lining its wall within. \n*choice\n    #Examine the control panels.\n        The control panels in front of the monitors have hundreds of buttons on them. You try to figure out what they might do, but don't see any clear way to tell them apart. Part of you wants to just start pressing random buttons to see what happens, but you restrain yourself.\n        \n        \"This looks complex as shit, what if we just break this damn thing?\" Jersey says as he picks up a crowbar which Virge left on the floor and prepares for a swing.\n        \n        \"May I?\" Utah interjects, interrupting him as she takes a seat in front of the panel, \"I'm a programmer; I think I might be able to figure this out,\" she explains.\n        \n        You're not sure what to say, so you let her take charge and step back. Jersey shrugs his shoulders and throws the crowbar back on the floor.\n        \n        \n        *goto letter\n    #Look through the cabinets.\n        You help Al and Indiana sift through several large filing cabinets stacked against the wall, but find nothing of interest in any of them. \n        \n        \"This place has been thoroughly cleared, it seems,\" Indiana comments.\n        \n        \"Perhaps there was nothing in them to begin with?\" Al wonders out loud.\n        \n        \n        *goto letter\n    #Check out the monitors.\n        They are playing security camera footage, but something is off about it. You look at the monitor showing the room you are currently in, but the room on the footage is empty.\n        \n        \"Must be old footage,\" South comments.\n        \n        \n        *goto letter\n*label letter\nYou look around the room and find Florida fidgeting with something on the wall, which upon closer inspection turns out to be a hidden safe. \n\n\"What?\" she notices you staring, \"There might be something important in there. Don't you want to know this place's secrets?\" she adds facetiously. She's right, though you suspect useful information is not what she is after.\n\n\"Voila!\" Florida exclaims after something clinks inside of the safe and she presents the now opened safe to you with a dramatic twirl. \n*page_break You look inside.\nAt first you think that the safe is empty, before noticing a single file document within it. You get it out and look through its pages; there is a map of the United States with every state being marked with \"X\" and a piece of paper, which seems to be some kind of printed email, but some of its contents have been crossed over with black ink, making them impossible to read. \n\nThe others walk up to you as you read the letter: \n\n[b]Our research confirms that [REDACTED] DNA could be used on the same subject, giving them various [REDACTED]. However, since there is roughly one [REDACTED] per fifty thousand people, the research is not to be taken without scrutiny.[b]\n\n[b]We have secured fifty subjects for this test, though I have to say it seems like a waste of time. We don’t need a bunch of [REDACTED] running around if all we need is their DNA.[b]\n\n[b]What are you planning, D.C.?[b]\n*page_break\n\"So this 'D.C.' might be responsible for us being here,\" Al ruminates.\n\n\"Why the fuck do they need our DNA?\" Jersey shouts.\n\n\"What do you think 'D.C.' stands for? District of Columbia?\" Utah ponders out loud. \n\n\"Nah, it stands for Dick Cunt,\" Jersey spits. \n\nFlorida sniggers as Utah rolls her eyes at the joke.\n\n\"May I look at that?\" Indiana addresses you.\n\nYou hand the file over to him and he studies it with great interest as you rack your brain thinking over its contents. Why would they need your DNA indeed? You do not recall anything particularly strange about your physical health. No chronic diseases or weird pathologies. The others don't seem like they are any different. What's going on?\n*page_break\n\"Do you know how to turn off the emergency mode?\" Virge asks Utah, who is now laboring over the control panel, trying to figure it out.\n\n\"I think I have an idea, but it's risky,\" she responds, \"The sure way to do it is to initiate the self-destruct mode; it should automatically open all of the locked doors in the base,\" she explains. \n\n\"Should?!\" Jersey asks incredulously, \"How about something a bit more reassuring!\" \n\n\"I know, but it's the best we've got,\" she says with a heavy sigh, \"We'll have about thirty seconds before the explosion.\" \n\n\"What?! How do we run from the explosion in that time?\" Al asks.\n\n\"By being fast as shit,\" Jersey responds.\n\n\"There's one more thing,\" Utah adds grimly, \"Someone needs to be here to press the self-destruct button.\"\n\n\"There's no way you can make it out of here in thirty seconds!\" Al exclaims, \"There's gotta be another option! Why can't we just wait here? We've got food and shelter, we just gotta wait for some rescue team to arrive!\" he reasons.\n\nVirge shakes his head, \"We don't know whether anyone even knows that we're here and the food is already running out,\" he explains.\n\n\"This is obviously intentional; the sick fuck behind this designed it to be a death trap!\" Jersey yells.\n\n\"It's alright, y'all; I'll take care of it,\" South steps forward, \"Just gotta press this thing here?\" he points at the big red button, hidden behind a plastic cover. \n\n\"Yes..\" Utah confirms.\n\n\"What the hell, man?\" Jersey shouts, \"You're gonna just kill yourself like that? Come on! There's gotta be another exit or something!\" \n\n\"Seems unlikely. The scumbag who put us here knew what they were doing,\" South responds. \n\n\"Maybe we should just ask Kansas? They seem to have a death wish,\" Virge suggests. \n\n\"Are you sure they won't just press the self-destruct button before we even leave the room?\" Indiana chimes in.\n\n\"It's alright, someone has to do it and it might as well be me. No good for an old fella like me to live when youngins are dying,\" South responds and takes a seat next to the control panel.\n*choice\n    #If this is the only way, so be it.\n        *set egoism +10\n        *set rebellion -10\n        \"We'll need about ten minutes to get everyone next to the blocked hallway,\" Virge speaks up.\n        \n        \"Alright,\" South takes out a small bottle of something, pops it open and takes a swig. The room fills with the smell of whiskey. Where did he find that?\n        \n        \"Not the kind of coffin I expected, but it'll do,\" he jokes and takes another swig. He turns to Utah and points at a microphone in front of him on the panel, \"Does this thing work?\"\n        \n        \"I.. Yes, it should,\" she says, wiping her eyes.\n        \n        South nods and presses the button next to the mic, \"This is South speakin'; hope y'all can hear me,\" he says and you hear his voice coming from outside of the room, \"Good news, folks, the door to the outside will soon open, but you gotta make it quick. This place will be gone shortly after, so make sure to run as far as ya can, alright?\"\n        \n        Virge turns to you and the others, \"Let's go!\" he barks and motions you to follow him before walking out of the room.\n        \n        You feel your heart pounding like crazy. Is this really the best way to get out of this forsaken bunker? Will the self-destruct mode plan even work out or will you just all die in a giant explosion? \n        \n        Well, at least it would be a quick death, right?\n        *page_break\n        You get back to the barracks and tell everyone to follow you to the exit, further explaining that the doors will open, but there will be an explosion which you need to get away from.\n        \n        Everyone is shocked at the prospect of outrunning a deadly blast, to say the least, but they follow you without too much resistance. Everyone, except for Kansas, that is, who is still lying on their bunk bed, staring into the ceiling with an empty expression on their face. \n        \n        \"You're not coming?\" you ask them.\n        \n        \"What's the point?\" they respond, \"If we're gonna die anyway, might as well get this over with,\" they state bluntly.\n        *choice\n            #I leave them be.\n                *set egoism +10\n                You decide to leave their fate to their own hands and leave them. They continue lying on the bed and staring at the ceiling above them without any discernible emotion.\n                \n                You get to the blocked door which leads to a turret-lined hallway and find everyone assembled here.\n                \n                You hear South's voice coming over the speakers, \"Alright, folks, I'm about to press this here button, hope y'all ready. Be careful out there and make sure not to lose hope, ya hear? There ain't much chance to make it out of here without it.\"\n                \n                In a moment, his voice is replaced with a loud siren which blasts through the room as you see the lights turn to a menacing red.\n                \n                \"Alright, here goes nothing!\" Virge shouts.\n                \n                The door in front of you opens, revealing a long hallway that leads to the exit. You and the others run through. To your surprise, you don't see any bodies left from yesterday despite there definitely being two people who were trapped here with the turrets. You don't even see any traces of blood, though that might be due to the whole room now looking blood red thanks to the emergency lighting.\n                *page_break\n                *goto wheretorun\n            #I grab them and take them with me.\n                *set egoism -10\n                *set savekansas true\n                Partially due to not wanting South's sacrifice to be in vain and partially due to liking Kansas, you take their hand and force them out of the bunk bed. They don't resist, but they don't help you either, so you have to drag them to the escape door with you.\n                \n                Kansas sighs and rolls their eyes, \"You're wasting your time,\" they state.\n                \n                You don't respond and get to the door which leads to a turret-lined hallway and find everyone already assembled here. Virge raises an eyebrow seeing you holding Kansas' hand.\n                \n                You hear South's voice coming over the speakers, \"Alright, folks, I'm about to press this here button, hope y'all ready. Be careful out there and make sure not to lose hope, ya hear? There ain't much chance to make it out of here without it.\"\n                \n                In a moment, his voice is replaced with a loud siren which blasts through the room as you see the lights turn to a menacing red.\n                \n                \"Alright, here goes nothing!\" Virge shouts.\n                \n                The door in front of you opens, revealing a long hallway that leads to the exit. You and the others run through. To your surprise, you don't see any bodies left from yesterday despite there definitely being two people who were trapped here with the turrets. You don't even see any traces of blood, though that might be due to the whole room now looking blood red thanks to the emergency lighting.\n                *page_break\n                *goto wheretorun\n    #I can't let him sacrifice himself like that!\n        *set egoism -10\n        *set rebellion +10\n        \"This won't do, let's find another option!\" you say and try to pull South off the chair gently.\n        \n        *if mainegender = 1\n            \"I appreciate your kindness, kid, but there ain't no other option,\" he gives you a warm smile.\n        *if mainegender = 2\n            \"I appreciate your kindness, girl, but there ain't no other option,\" he gives you a warm smile.\n        *if mainegender = 3\n            \"I appreciate your kindness, kid, but there ain't no other option,\" he gives you a warm smile.\n        \n        \"Alright, we'll need about ten minutes to get everyone next to the blocked hallway,\" Virge speaks up, then pulls you by the shoulder. \n        \n        You try to resist and he says, \"You leave me no choice,\" as he forcefully turns you towards him and your face meets his fist.\n        *page_break Everything goes black…\n        You come to your senses on the floor in front of the locked door next to the barracks. The other survivors are standing around you. South is not one of them…\n        \n        You hear Al's voice, \"Wait, where's Kansas?\" \n        \n        \"They're at the barracks. Leave them, they don't want to be rescued,\" Virge responds.\n        *choice\n            #If that's what they want, so be it.\n                *set egoism +10\n                You are done playing the hero and decide to leave their fate to their own hands as you get on your feet.\n                \n                You hear South's voice coming over the speakers, \"Alright, folks, I'm about to press this here button, hope y'all ready. Be careful out there and make sure not to lose hope, ya hear? There ain't much chance to make it out of here without it.\"\n                \n                In a moment, his voice is replaced with a loud siren which blasts through the room as you see the lights turn to a menacing red.\n                \n                \"Alright, here goes nothing!\" Virge shouts.\n                \n                The door in front of you opens, revealing a long hallway that leads to the exit. You and the others run through. To your surprise, you don't see any bodies left from yesterday despite there definitely being two people who were trapped here with the turrets. You don't even see any traces of blood, though that might be due to the whole room now looking blood red thanks to the emergency lighting.\n                *page_break\n                *goto wheretorun\n            #I can't let them kill themselves!\n                *set egoism -10\n                *set savekansas true\n                You get on your feet and run to the barracks where you find Kansas, lying on their bed and staring at the ceiling.\n                \n                \"Why are you still here? Come on! Let's go!\" you shout.\n                \n                Kansas turns to you with tired, emotionless expression in their eyes and simply says, \"What's the point? We'll be dead either way, might as well end this quickly.\"\n                \n                You sigh and grab their hand, pulling them out of their bunk bed. South is giving his life away not for people to waste theirs, you think. That, and you feel something towards Kansas, even though you don't know them well. Regardless, you can't just let them die like that!\n                \n                They don't resist, but they don't help you either, so you have to drag them to the escape door with you.\n                \n                Kansas sighs and rolls their eyes, \"You're wasting your time,\" they state.\n                \n                You don't respond and get back to the exit. Virge raises an eyebrow seeing you holding Kansas' hand.\n                \n                You hear South's voice coming over the speakers, \"Alright, folks, I'm about to press this here button, hope y'all ready. Be careful out there and make sure not to lose hope, ya hear? There ain't much chance to make it out of here without it.\"\n                \n                In a moment, his voice is replaced with a loud siren which blasts through the room and you see the lights turn to a menacing red.\n                \n                \"Alright, here goes nothing!\" Virge shouts.\n                \n                The door in front of you opens, revealing a long hallway that leads to the exit. You and the others run through. To your surprise, you don't see any bodies left from yesterday despite there definitely being two people who were trapped here with the turrets. You don't even see any traces of blood, though that might be due to the whole room now looking blood red thanks to the emergency lighting.\n                *page_break\n                *goto wheretorun\n*label wheretorun\nYou run upstairs and towards the big door. Thankfully, it is opening as well, but slowly. You and the other survivors don't waste time as you slide underneath it while it opens. \n\nNow you are outside and have to figure out where to run next to escape the incoming explosion. You consider your next move:\n*choice\n    #Run to the forest!\n        *goto forestrun\n    #Run to the ocean!\n        *goto oceanrun\n*label forestrun\nYou and several other survivors run to the right and into the dense forest, hoping that the trees will provide you some coverage from the blast. \n\nYou climb over several fallen trees, which is likely the result of yesterday's giant tsunami. It is quite a miracle you managed to survive that at all, though you hope your luck has not run out just yet.\n\nYou make it as deep into the forest as you can, though it is not exactly easy to move through the thick lines and layers of trees and bushes. \n\nAfter a few seconds, you hear a deafening sound behind you and your body is thrown forward, smashing into a tree ahead of you. You feel sharp pain in your shoulder as you try to get back on your feet. \n\nYou turn around to look at the remains of the base and instead see a large tree falling on top of you…\n*page_break Oh fu...\n*achieve timber\n*check_achievements\n*if (((((((((((((((((((((((((((((choice_achieved_firstdeath and choice_achieved_abyss) and choice_achieved_eliminated) and choice_achieved_timber) and choice_achieved_bloodonthesand) and choice_achieved_gotexploded) and choice_achieved_snakeeyes) and choice_achieved_sharkbait) and choice_achieved_lightning) and choice_achieved_hellfire) and choice_achieved_bangbang) and choice_achieved_exterminated) and choice_achieved_oceanwater) and choice_achieved_monstermadness) and choice_achieved_kamikaze) and choice_achieved_ivory) and choice_achieved_betrayal) and choice_achieved_rockbottom) and choice_achieved_frozen) and choice_achieved_shipwrecked) and choice_achieved_mutineer) and choice_achieved_hoosier) and choice_achieved_solesurvivor) and choice_achieved_castaway) and choice_achieved_laststraw) and choice_achieved_letitdie) and choice_achieved_fallguy) and choice_achieved_badluck) and choice_achieved_burnbabyburn) and choice_achieved_outsmarted)\n    *achieve alldeaths\n[b]DEAD END[b]\n        \nYou've met with a terrible fate, haven't you? Try again and see if you can make it further! :)\n*ending\n*label oceanrun\n*set southdies true\n*if savekansas = false\n    *set kansasdies true\nThe irony of running away from the ocean to the compound yesterday and now running towards the ocean instead, is not lost on you. You jump into the water and swim as far away from the shore as you can. \n\nAfter a few seconds or so, you hear a deafening sound behind you. You get the urge to look back, but stop yourself and dive into the water instead. \n\nAfter a few more seconds, you resurface and turn around towards the base. Or what's left of it, as the compound is now gone as is most of the hill it was standing on. You look up and spot large chunks of metal raining around you. Thankfully, most of them fall way ahead of where you are, but it's still a terrifying sight to see these colossal pieces of metal falling all over the place like some bizarre confetti.\n*page_break\n\"Well, things certainly went south for him!\" Florida jokes as you get back on the shore. \n\nThough you didn't know South well, it still feels awful to hear someone make fun of his death, especially after he sacrificed himself to give you all a chance to escape.\n*choice\n    #I confront her.\n        *set violence +5\n        \"We wouldn't be here if it wasn't for his sacrifice,\" you comment coldly.\n        \n        \"So? You want me to cry about it?\" she turns to you. \n        \n        \"It's better than joking about someone's death,\" you argue.\n        \n        \"For you, maybe, but I'd rather laugh than cry,\" she gives you a wink.\n        \n        You decide not to pursue this matter further. No point in reprimanding someone as far gone as Florida.\n        \n        \n        *goto ifkansas\n    #I let it slide.\n        *set violence -5\n        You decide there is no point in reprimanding someone as far gone as Florida.\n        \n        \n        *goto ifkansas\n*label ifkansas\n*if kansasdies = true\n    *achieve kansasded\n    You can't help but think about Kansas. They chose to die instead of trying to save themselves. Is your situation really that desperate? It's scary to think that perhaps they made the wisest decision…\n    \n    \n    *goto virgeonforest\n*if savekansas = true\n    Kansas turns to you and studies your face for a moment before speaking, \"Why did you do it?\" \n    \n    You look at them. You know what they mean; why did you risk your life to get them out of the bunker when they have already accepted their imminent death?\n    *choice\n        #\"There's too much death already; I couldn't stand it.\"\n            *set kansas +50\n            *set cooperation +10\n            \"I see,\" they say, deep in thought, \"Why do you care about others so much?\" they ask.\n            \n            You consider your answer, but before you can speak up, you hear a familiar voice:\n            \n            \n            *goto virgeonforest\n        #\"I don't know you well, but I care about you, even if you don't care about yourself.\"\n            *set egoism -10\n            *set kansas +50\n            You see a twinkle of light in Kansas' eyes before their expression returns to its normal emotionless state. \n            \n            \"I see,\" they say, taking a moment to think, \"Thank you.\"\n            \n            You are almost taken aback by this reaction, but before you can say anything else, you hear a familiar voice:\n            \n            \n            *goto virgeonforest\n*label virgeonforest\n\"Some folks ran into the forest; the blast might have gotten them; we should check,\" Virge says.\n\nUtah nods and follows him while Jersey heads to a pile of fallen palm trees nearby and starts pulling leaves off of them. What is he doing?\n*choice\n    #I follow Utah and Virge.\n        As you walk behind them up the hill, you don't notice any bodies or rubble from yesterday. Were they destroyed by the explosion?\n        \n        You look around the fallen trees and notice several bodies of your fellow survivors, crushed underneath the mighty wooden giants. Your stomach turns, but you haven't eaten much anyway, so you regain your bearings.\n        \n        Utah takes notes in her notepad as she examines the dead bodies. \n        \n        She notices you staring and says, \"I want to make sure we know exactly how many of us are here.\" \n        \n        \"Why?\" you ask. \n        \n        \"The main reason is that I want to understand what's going on, but we should also at least try to find out who they were. Maybe we can find their family members when we get out of here,\" she pauses, \"[i]If[/i] we get out of here...\"\n        \n        \"We should probably head back,\" Virge speaks up and walks back toward the beach. You and Utah follow suit.\n        *page_break\n        As you walk back to the beach, you see that Jersey and the others have arranged a giant \"SOS\" message out of palm leaves on the sand. Impressive, though you are not sure what the likelihood of anyone noticing it truly is.\n        \n        \n        *goto gunhouse\n    #I help Jersey with what he's doing.\n        You get closer to the forest, noticing just how many trees were toppled from the explosion, though some might have been knocked down by the tsunami yesterday.\n        \n        You help Jersey gather more leaves of the palm tress, which he proceeds to place around the beach in some kind of pattern.\n        \n        At first, you are not sure what he's doing, but as you get higher up the hill to get more palm leaves, you get a better vantage point at his creation, which is a giant \"SOS\" message spelled with palm leaves.\n        \n        Virge and Utah walk back down and you give them an inquisitive look.\n        \n        \"They didn't make it,\" he says.\n        *page_break\n        *goto gunhouse\n*label gunhouse\n\"So where do we sleep?\" a woman from Illinois raises a poignant question.\n\nVirge points at the leaves arranged on the beach, \"This should do. We'll make camp here for the night. It's the only option right now.\"\n\n\"Wonderful!\" the woman responds sarcastically, \"I really needed more sand in my ass!\" she grumbles as she walks away.\n\n\"What if there's another tsunami?\" Utah inquires.\n\n\"We'll take shifts. I'll take the first one,\" Virge answers. \n\nAfter figuring the matter of your lodging, you and the others head to explore the surrounding area, hoping to find something of use or perhaps even some help.\n*page_break\nAfter walking north for about ten minutes, you notice something peeking out of the foliage.\n\nGetting closer, you see a building; this one is smaller in size and looks like an actual house, unlike the bunker you were in. Its architecture makes it look like a building straight out of an antebellum Southern plantation, only much smaller. It looks abandoned.\n\n\"Hello?\" Al shouts, but no one responds. \n\nYou proceed inside and find a dusty office-like interior with a computer and a large map on the wall. \n\n*if savewisconsin = false\n    Before you can enter another room, however, you hear…\n    \n    \"You motherfuckers!\" a blood-curling shout rings your ears and you see a figure of a man approaching you from the right. This man looks disheveled, his clothes are torn and his left arm is limp and looks like it's broken. He looks vaguely familiar.\n    \n    \"Oh, I remember you!\" a guy from Arkansas next to you says in a thick So
