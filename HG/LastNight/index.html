<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>What Happened Last Night? — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "LastNight", "title": "What Happened Last Night?", "scenes": {"choicescript_description": "A dark but occasionally humorous action murder mystery multiple-choice text-based game.\n\n[i]What Happened Last Night?[/i] is a 5,000-word interactive novel by Kie Brooks. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.", "choicescript_stats": "These are your statistics!\n*temp Just\n*set Just justice\n\n\n*stat_chart\n    opposed_pair justice\n        Just\n        Forgiving\n    opposed_pair Friendly\n        Aggressive\n    opposed_pair Brave\n        Cautious\n*stat_chart\n    text minor_crimes Minor Crimes Committed\n    text major_crimes Major Crimes Committed\n    text people_killed People Killed\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  ADVERTISING\n  \n  Remove advertisements.\n  \n  *purchase adfree $0.99 start\n\n*if choice_purchased_adfree\n  ADVERTISING\n  \n  You've paid to remove advertisements.\n", "discovery.choice": "*comment Copyright 2010 by Kie Brooks\n\n*temp home_visit\n*temp pub_visit\n*temp knife\n*temp wallet\n*temp unarmed\n*temp cowboy\n\n*set home_visit true\n*set pub_visit true\n*set knife false\n*set wallet false\n*set unarmed true\n*set cowboy true\n\nYou quickly get off the main road and into a quiet alley.\n*label alley_decision\n\nYou need to decide what to do next.\n*choice\n    *if (pub_visit)\n        #I need a stiff drink, find the nearest pub.\n            *goto pub\n\n    #Quietly leave the country and never mention this incident to anyone ever again.\n        *if (home_visit)\n            OK, you decide to go back home to pick up your passport and pack a suitcase.\n            *goto home\n        *else\n            Your passport is at home but the house is being watched.\n            Leaving the country is not an option.\n            *goto alley_decision\n\n\n    #Investigate the nightclub named on the ticket.\n        You decide to investigate the night club mentioned on the ticket\n        *if coco_named\n            and the background of poor deceased Coco.\n\n        *goto night_club\n    #Go to the police\n        You can always trust the police. Right?\n\n        *goto police2\n\n    *comment next section bug workaround, should have been an elseif below\n    *if (unarmed) and (home_visit != true)\n        #Check what the situation is at my house\n            *goto home_visit2\n\n    *if (home_visit)\n        #Carry on with your everyday life as if nothing ever happened.\n            *goto home\n\n*label home\n*set home_visit false\nYou will try to put the incident behind you and soothe your frayed nerves. You wander home feeling paranoid and uneasy.\n*goto home_visit2\n\n*label home_visit2\n\nAs you approach your house you notice several unfamiliar vehicles outside filled with men. It looks like they are waiting for you.\n*choice\n    #Leave as quickly and quietly as possible.\n        *set brave -1\n        Your instinct tell you that they are not your friends!\n        *goto alley_decision\n    #Try to separate one of the men from the group, then kidnap and interrogate him.\n        This is going to be a dangerous endeavour.\n        *choice\n            #Create a distraction\n                How are you going to create a distraction?\n                *choice\n                    #Call the fire-brigade and report a fire at your house\n                        *goto call999\n                    #Call the police and report an armed robber at your house\n                        *label call999\n                        You call the emergency services who turn up at the property,\n                        find nothing wrong and leave again (annoyed).\n                        It does not do anything except make the men outside more alert.\n                        *goto home_visit2\n                    #Convince someone to dress in your clothes and ask them to go into the building\n                        You don't mind putting others in danger, do you?\n                        Still it is easier said than done.\n                        You are unable to convince anyone to help you in this way.\n                        *goto home_visit2\n            #Wait for one of them to take a toilet break\n                You wait for one of the men to leave the others and you grab him and drag him into the bushes nearby.\n                He is ruffled but not talking.\n                *label talk_to_me\n\n                How are you going convince him to talk?\n                *choice\n                    #Ask him nicely.\n                        He politely declines before spitting in your face.\n                        *set friendly +1\n                        *goto talk_to_me\n                    #Soften him up a bit\n                        You slap him around a bit, but he's a tough nut and refuses to talk.\n                        *set friendly -1\n                        *set minor_crimes +1\n                        *goto talk_to_me\n                    *if (unarmed)\n                        #Search him\n                            You find that he is carrying a knife and a wallet.\n                            His wallet has a few notes but nothing identifiable and the knife looks sharp.\n                            *set knife true\n                            *set wallet true\n                            *set unarmed false\n                            *goto talk_to_me\n                    *if (knife)\n                        #Stab him\n                            He looks pleadingly as you put the knife to his throat.\n                            He claims that he is a hired hand and he doesn't know anything.\n\n                            Really stab him?\n                            *choice\n                                #Yes\n                                    *set justice +15\n                                    *set major_crimes +1\n                                    *set people_killed +1\n                                    *set friendly -20\n                                    He bleeds everywhere.  He is dead.  He isn't going to tell you anything else now.\n                                    *goto alley_decision\n                                #No\n                                    *set justice -15\n                                    You knock him out and leave.\n                                    *goto alley_decision\n                    #I give up.\n                        You knock him out and leave\n                        *goto alley_decision\n            #I think this is a bad idea, I would rather sneak away and live to fight another day.\n                *goto alley_decision\n    #Pretend to be unaware of them and see what they want.\n        *set brave +10\n        You brazenly wander up to your front door and are quickly accosted by several men.\n        *goto torture\n\n\n\n*label pub\n*set pub_visit false\nYou wander into a local brewery and order a shot to calm your shattered nerves. The pub looks like it has an area for bands but they probably only play in the evening.\n\nThe landlord looks at you and says \"You have a lot of nerve coming in here after last night.\"\n*choice\n    #Apologise and quickly exit the pub.\n        *set brave -10\n        You mumble an apology and hastily leave the pub.\n        *goto alley_decision\n    #Ask the landlord what happened last night.\n        You earnestly ask what happened last night and explain that you have lost all memory of the incident.\n\n        The landlord is somewhat suspicious of this explanation, he points to a scar above his right eyebrow.\n        Yes apparently you did that last night.\n        You came in drunk, became violent when the landlord refused to serve you more drinks and\n        \"resisted\" when the landlord tried to eject you from the establishment.\n\n        You apologise profusely to the landlord who seems a little happier.\n        A young woman who was handling some of the stage equipment notices you talking to the landlord\n        and quickly exits into the back of the establishment.\n        *choice\n            #Follow her into the back.\n                You casually make as if you are going to the toilet, but actually follow her into the back.\n                *goto singer\n            #Ask the landlord about her.\n                The landlord says that she is the lead singer for the local band that plays there.\n                *choice\n                    #Go after her.\n                        You casually make as if you are going to the toilet, but actually follow her into the back.\n                        *goto singer\n                    #Finish your drink and leave.\n                        Your thirst is quenched.\n                        *goto alley_decision\n            #Ignore her, finish your drink and leave.\n                *goto alley_decision\n\n    #Ask the landlord if he is going to keep babbling or do his job and serve you with some alcohol.\n        *set brave +5\n        *set friendly -10\n        The landlord is not happy but he stops talking and serves you a drink.\n        He has a sour expression, as if he just ate a lemon.\n\n        You look around and see some of the regulars, no-one pays any attention to you.\n\n        A young woman who was handling some of the stage equipment notices you\n        and quickly exits into the back of the establishment.\n        *choice\n            #Follow her into the back.\n                You casually make as if you are going to the toilet, but actually follow her into the back.\n                *goto singer\n            #Ask the landlord about her.\n                The landlord would rather eat broken glass than help you.\n                *fake_choice\n                    #Go after her.\n                        The landlord asks \"Where are you going? That's for staff only!\"\n                        He bars your way.  You finish your drink and leave.\n                    #Break down into tears.\n                        You are a poor actor and the landlord has no sympathy.\n                        You leave the pub embarrassed while the regulars stare at you.\n                    #Finish your drink and leave.\n                        *set brave -5\n                        Your thirst is quenched.\n                *goto alley_decision\n            #Ignore her, finish your drink and leave.\n                *set brave -5\n                *goto alley_decision\n\n*label singer\nYou see that she is in a hurry to leave, but you catch up to her.\n\nWhat is your approach.\n*choice\n    #Friendly\n        *set friendly +5\n        I love your music, do you sell CDs? Could I buy an autographed version?\n        *page_break\n        \"I'm sorry\", she stammers \"live music only.\"\n        *line_break\n        \"Why are you nervous?\" you ask.\n        *line_break\n        \"No reason, sorry I'm in a hurry.\" she replies\n        *label friendly_singer\n        *choice\n            #Be more confrontational\n                *goto confront_singer\n\n            #Press her for help.\n                You explain that you need some bad things happened last night and you need some help.\n                She seemed to recognise you and you think she knows more than she is letting on.\n\n                It could be a matter of life and death.\n                *page_break\n                She turns a little white. \"I don't know anything\".\n                *line_break\n                You grab her shoulders. \"Please\", you urge.\n                *label coco_singer\n                *if (coco_named)\n                    \"Think of Coco!\"\n\n                    \"I didn't think anything bad would happen.  It's not my fault, I had no choice.\n                    I just put a little something in your drink, and brought you to the club.\"\n                    *line_break\n                    \"Tall Tango?\" you interject.\n                    *line_break\n                    \"Yes, I left after that.  Oh God, they would kill me if they knew I talked, please don't tell them I said anything.\"\n                    She runs out of the building, distraught.\n\n                    You wonder how many times she has done this before.\n                    *goto alley_decision\n\n                *else\n                    \"You might find some answers at the Tall Tango\" she blurts, \"but you didn't hear it from me.\"\n                    *line_break\n                    You reluctantly watch her leave.\n                    *goto alley_decision\n\n            #Let her leave\n                *goto alley_decision\n    #Flirty\n        What's a pretty girl like you doing in a place like this?\n        *page_break\n        \"Get lost jerk, I have a boyfriend you know.\" she replies.\n        *line_break\n        \"Sorry, I just thought that you recognised me.\" you reply.\n        *line_break\n        \"I've heard all the pickup lines before\" she retorts.\n        *choice\n            #Be more confrontational\n                *goto confront_singer\n            #Let her leave\n                You reluctantly watch her leave with the suspicion that she knows more than she is letting on.\n                *goto alley_decision\n\n\n\n    #Confrontational\n        *set friendly -10\n        *label confront_singer\n        Tell me about last night!\n        *page_break\n        \"I don't know anything, leave me alone!\" she cries.\n        She calls for the landlord.\n        You leave before the situation worsens.\n        *goto alley_decision\n\n*label night_club\n\nYou find the nightclub listed on the ticket in your pocket.\nThe heavy front door is closed, it is shut during the daytime.\n\n*if (home_visit) or (pub_visit)\n    You have a gut instinct that you should probably leave visiting the nightclub until you have a better idea of what you are dealing with.\n\n*choice\n    #Wait until evening and try and slip in with the other guests.\n        You line up with other patrons to get into the night-club\n        and hope that you will not be recognised by the security at the front door.\n        *page_break\n        You gain entry to the club and after going in suffer a sharp blow to the back of the head.\n        *line_break\n        You were recognised after all.\n        *goto torture\n    #Break and enter.\n        *set minor_crimes +1\n        You walk around the building and see both the fire exit and some small windows.\n        The windows are small and high up, but the fire exit is open.\n        *page_break\n        You walk into the premises.\n        There are several guys all dressed in black, and one guy who looks like he is the boss.\n\n        They look up and recognise you.\n        *line_break\n        What now?\n        *choice\n            #Challenge the boss to a duel.\n                *set friendly -10\n                *set brave +10\n                *set justice +10\n                How honourable.\n                The boss laughs while his men slowly close in on you.\n                You are overwhelmed by them.\n                *goto torture\n\n            #Bluff and negotiate.\n                *label bluff_and_negotiate\n\n                Things could go badly wrong if your bluff fails, but there is no backing out now.\n\n                \"You have messed with the wrong guy\" you exclaim.\n                *choice\n                    #I am a black-belt in kung-fu.\n                        Unfortunately you are not, but some of his men are.\n                        *goto torture\n                    #The police are on their way.\n                        They lock the door and wait for a while.\n\n                        Are the police really on their way?\n                        *fake_choice\n                            #I also have evidence of your activities\n                                They are no longer inclined to believe anything you say.\n                            #I am also a black-belt in kung-fu.\n                                Unfortunately you are not although you do actually have a black leather belt.\n                                *line_break\n                                They are no longer inclined to believe anything you say.\n                        *goto torture\n\n                    #I have evidence of your activities.\n                        If you harm me, the evidence will be in the hands of the police and the newspapers tomorrow.\n\n                        The boss looks violently displeased.\n                        \"So what do you want?\" he barks.\n\n                        *label compensation\n                        *choice\n                            #Compensation\n                                What are you going to ask for?\n                                *choice\n                                    #A pony\n                                        \"I want a pony\" you shout.\n\n                                        The boss agrees to your demand.\n                                        While you never get a full explanation of the previous night's events you do have a pony.\n                                        *set career \"Pony Owner\"\n                                        *goto_scene evaluation.choice\n\n                                    #A share of the club\n                                        *set friendly -10\n                                        The boss is really unhappy.\n                                        He negotiates you down to a one time payment provided you leave the city that day.\n\n                                        While you never get a full explanation of the previous night's events\n                                        and the cheque bounces, at least you escaped with your life.\n                                        *set career \"Unemployed Traveller\"\n                                        *goto_scene evaluation.choice\n\n                                    #A billion dollars\n                                        *set friendly -10\n                                        The boss realises that your demands are impossible to meet.\n                                        He takes a chance that you were lying.\n\n                                        You feel a sharp blow to the back of the head\n                                        *goto torture\n\n                            *if (unarmed != true)\n                                #Revenge\n                                    *goto revenge\n\n                            #An explanation\n                                *set justice +10\n                                You sit down in a nearby leather chair.\n                                *line_break\n                                \"I would appreciate clarification of some of the events that occurred last night\" you say.\n                                \"Please give me a detailed description in the order in which they occurred\".\n\n                                You touch your finger tips together, let your eyelids droop and listen to his explanation.\n\n                                *page_break\n                                Coco was one of the most talented dancers at the club, she was also very tall.\n                                She also knew the boss' two Achilles heels, that he hated to be teased about his dancing and his height.\n\n                                After a night of dancing and being tall, she bumped into the boss on her way to get changed before leaving.\n                                She was tired and unwisely insulted him calling him \"shorty, fatty and a terrible dancer\".\n\n                                The boss realised that he was also sensitive about his weight and could not let the insult pass.\n                                He arranged for a random Joe, i.e. you to be drugged, brought to the club to take the fall.\n                                She was taken back to her apartment and killed and you were left there as the scapegoat.\n                                Your house was watched in case you left the premises without calling the police to ensure no loose ends.\n\n                                You leave the club and decide to set up a detective agency.\n                                *set career \"Sherlock Holmes wannabe\"\n                                *goto_scene evaluation.choice\n\n                            #All of the above\n                                Compensation, revenge, an explanation and a pony!\n                                *line_break\n                                Please be reasonable.\n                                *goto compensation\n\n            *if (unarmed != true)\n                #All out attack.\n                    *label revenge\n                    *set friendly -10\n                    *set brave +10\n                    *set major_crimes +1\n                    *set people_killed +1\n                    Although you are not sure exactly what part he played in last nights events, you are fairly sure that he was responsible for the murder.\n\n                    \"Revenge\" you cry and pull out your dagger stabbing him in the chest.\n                    His men become your men and you take over the club \"Tall Tango\".\n\n                    While you never get a full explanation of the previous night's events you now own a club.\n                    You rename it to \"Average Height Tango\" which you feel is more catchy.\n                    *set career \"Club owner\"\n                    *goto_scene evaluation.choice\n\n    #Try to bluff your way in.\n        There is a fancy dress shop nearby.\n        *if (wallet)\n            *label fancy_dress\n            You can use some of the money from the wallet that you took earlier.\n            *choice\n                #Dress up as a fireman\n                    You decide to go as a fire and safety inspector.\n                    *line_break\n                    You adjust your false moustache and bang on the door.\n                    *goto recognised\n\n                #Dress up as a gorilla\n                    You decide to go as a gorilla-gram.\n                    On the plus side the mask covers your face, on the minus side you are dressed as a gorilla.\n                    *line_break\n                    It's so crazy it just might work.\n\n                    You go to the front door, box of candy in hand and ring the bell.\n                    *page_break\n                    You are shown into the premises.\n                    There are several guys all dressed in black, and one guy who looks like he is the boss.\n                    He is amused by your gorilla suit.\n                    *label gorilla\n\n                    What now?\n                    *choice\n                        #Do the gorilla dance.\n                           The boss is amused by your gorilla dance.\n                           *goto gorilla\n                        #Confront the boss\n                           You rip off your gorilla mask and confront the boss.\n                           *goto bluff_and_negotiate\n                        #Gorilla dance out of the club\n                           While you never get a full explanation of the previous night's events, you begin a lucrative and fulfilling life long career as a dancing gorilla.\n                           *set career \"Dancing Gorilla\"\n                           *goto_scene evaluation.choice\n\n                #Dress up as a cowboy\n                    *label cowboy\n\n                    Yes, the cowboy costume rental is on sale.  Are you serious?\n                    *if cowboy\n                        *choice\n                            #Yeehaw! Yes I am.\n                                You can't be serious!\n                                *set cowboy false\n                                *goto cowboy\n                            #No, I just wanted to try all the options in the game!\n                                Your thoroughness is appreciated.\n\n                                *goto fancy_dress\n                    *else\n                        *choice\n                            #Your doubting eyes leave me colder than a witch's tit.\n                                You must be kidding me!\n                                *set cowboy true\n                                *goto cowboy\n                            #No, I just wanted to try all the options in the game!\n                                Your thoroughness is appreciated.\n                                *goto fancy_dress\n        *else\n            Unfortunately you have no money.\n            *choice\n                #Pretend to be a pizza delivery guy\n                    You grab some an old pizza box from the trash cans at the back of the building.\n                    *line_break\n                    You go to the front door and ring the bell.\n                    *goto recognised\n                #Pick an alternative method of entry.\n                    *goto night_club\n\n    #Visit some other locations first.\n        *set brave -1\n        You decide to stay away from the nightclub for the moment.\n        *goto alley_decision\n\n*label recognised\n*page_break\nA security person lets you in.\nAfter entering in you suffer a sharp blow to the back of the head.\n*line_break\nYou were recognised after all.\n*goto torture\n\n*label torture\n\nYou wake up in a small room.\nYou suffer several days of torture without questions before your body is unable to take it any more.\nYou are dead.\n\nGame Over.\n*goto_scene ending\n\n*label police2\n\nYou turn yourself in at the local department and are shown into an interview room.\nYou tell them that you are being pursued.  You come across as a paranoid murderer.\n\nYour claims of ignorance of the murder are widely disbelieved\nand after a short trial you are convicted of a brutal murder that you did not commit.\n\nYou spend the rest of your life in jail.\n\nGame Over.\n*goto_scene ending\n\n\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]What Happened Last Night?[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\nIf you like this game please go to http://www.taichipro.com and buy Kie's Tai Chi CD.\n\n*ending\n", "evaluation.choice": "*comment Copyright 2010 by Kie Brooks\n\n*page_break\nWell done! You have completed the game without dying or landing in jail.\n*line_break\nYour final career this time was '${career}'.\n\n*temp forgiving\n*temp aggressive\n*temp cautious\n*set forgiving (100 - justice)\n*set aggressive (100 - friendly)\n*set cautious (100 - brave)\n\nYour statistics were:\n*line_break\nJust vs. forgiving ${justice}:${forgiving}\n*line_break\nFriendly vs. aggressive ${friendly}:${aggressive}\n*line_break\nBrave vs. cautious ${brave}:${cautious}\n*line_break\n*if (minor_crimes > 0)\n    Minor Crimes ${minor_crimes}\n    *goto major_crimes\n*else\n    No Minor Crimes\n*label major_crimes\n*line_break\n*if (major_crimes > 0)\n    Major Crimes ${major_crimes}\n    *goto people_killed\n*else\n    No Major Crimes\n*label people_killed\n*line_break\n*if (people_killed > 0)\n    Killed ${people_killed}\n    *goto crime_record\n*else\n    Nobody Killed :)\n\n*label crime_record\n\nCrime Record Summary:\n*line_break\n*if (minor_crimes = 0) and ((major_crimes = 0) and (people_killed = 0))\n    Despite the awful initial circumstances, your time has been crime free.\n    *goto ending\n*elseif (minor_crimes = 1) and ((major_crimes = 0) and (people_killed = 0))\n    Despite the awful initial circumstances, you committed very little crime.\n    *goto ending\n*elseif (major_crimes = 0) and (people_killed = 0)\n    You have committed some minor crimes let's hope this doesn't lead to major crimes.\n    *goto ending\n*elseif (major_crimes > 0) and (people_killed = 0)\n    You have committed some major crime but at least you didn't kill anyone.\n    *goto ending\n*elseif (people_killed = 1)\n    You began the adventure without blood on your hands, let's hope you don't kill again.\n    *goto ending\n*else\n    You have killed more than once, I hope you are not a serial killer in the making.\n    *goto ending\n\n*label ending\n\nGame Over.\n*goto_scene ending", "lastnight_intro.choice": "*reset", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\nWhat happened last night?\n\nThe aim of this adventure is to figure out what happened on the previous night, while staying alive and out of jail.\n\nDuring the game, you will face many decisions, there isn't always a best or worst one. This may draw out the good or the evil in you, the choice is as always yours.\n\nThis story has some adult themes, if you are of a nervous disposition, easily frightened, too young or too old then you might not want to play this game.\n\nThere is also some humour, which you might not enjoy. In addition the spelling and grammar are appalling.\n\nDo you still want to continue?\n*fake_choice\n    #Yes, just let me play the darn game already!\n    #No.  Maybe when I am older or braver.  It's  already past my bed time.\n\n*script changeBackgroundColor(\"black\")\n\n*set brave +10\n*set friendly -20\n*set justice +5\n*set people_killed 1\n\nYou will try to put the incident behind you and soothe your frayed nerves. You wander home feeling paranoid and uneasy.\n\nAs you approach your house you notice several unfamiliar vehicles outside filled with men. It looks like they are waiting for you.\n*fake_choice\n    #Leave as quickly and quietly as possible.\n    #Try to separate one of the men from the group, then kidnap and interrogate him.\n    #Pretend to be unaware of them and see what they want.\n\n*script changeBackgroundColor(\"sepia\")\n*set brave 38\n*set friendly 66\n*set justice 51\n*set minor_crimes 2\n\nYou wander into a local brewery and order a shot to calm your shattered nerves. The pub looks like it has an area for bands but they probably only play in the evening.\n\nThe landlord looks at you and says \"You have a lot of nerve coming in here after last night.\"\n*fake_choice\n    #Apologise and quickly exit the pub.\n    #Ask the landlord what happened last night.\n    #Ask the landlord if he is going to keep babbling or do his job and serve you with some alcohol.\n*goto_scene ending", "startup.choice": "*comment Copyright 2010 by Kie Brooks\n\n*temp blood_covered\n*temp police_called\n*set blood_covered true\n*set police_called false\n*set coco_named false\n\n*label wakeup\n\nYou wake up feeling groggy in a strange bed.\nWhile you try to clear your head you notice that you are not alone,\nthere is someone else in the bed with you.\n\nBy the way, what is your gender?\n\n*fake_choice\n    #Male\n        You are a handsome young man.\n    #Female\n        You are a handsome young woman.\n    #Other\n        You leave me confused, but let us carry on nevertheless.\n        *set brave -5\n\nAs things come into focus, you see the voluptuous naked back of a young woman in the bed.\nYou can't remember her name or anything about last night.\n\nThis could be embarrassing.\n\n*temp sleep\n*temp breakfast\n*set sleep true\n*set breakfast true\n*label sleeping_beauty\n*choice\n    *if sleep\n        #I will sleep a little longer and hope that she is gone when I wake up.\n            You go back to sleep for a while, but when you wake up she is still there.\n            *set brave -10\n            *set friendly -5\n            *set sleep false\n            *goto sleeping_beauty\n    #I will kiss her on the neck\n        *set brave +5\n        *goto cold\n    #I will lightly caress her shoulder\n        *set brave -5\n        *set friendly +5\n        *label cold\n        When your skin touches hers, you find that she is cold, too cold.\n        Adrenaline pumping, you turn her over and see a glazed stare from her eyes. She is dead!\n        *goto dead_sleeping_beauty\n    *if breakfast\n        #I will ask her to get up and make me breakfast\n            *set friendly -10\n            There is no response.\n\n            Either she is still asleep or she doesn't like your proposal.\n            *set breakfast false\n            *goto sleeping_beauty\n\n\n*label dead_sleeping_beauty\n\nYour heart is beating violently.\n*choice\n    #I search the room for all of my clothes to make a hasty exit.\n        *set brave -10\n        Panicked you grab your clothes and shoes and rush hastily towards the door.\n        *goto exit_room\n    #I examine the body to see if I can determine the cause of death.\n        *set brave +10\n        You try to calm yourself and you look at the body.\n        *line_break\n        She has a big cavity in her chest and the bed is covered in blood.\n        She did not die from natural causes.\n        *choice\n            #Examine the body further for more clues to her death.\n                *set brave +10\n                You really have nerves of steel, but unfortunately you have no experience in pathology.\n                *choice\n                    #Search the room for clues.\n                        You begin searching the room.\n                        *goto knock_at_door\n                    #Call the authorities.\n                        OK, enough playing detective, it's time to call the police.\n                        *line_break\n                        *goto call_police\n            #I think I had better make a quick exit.\n                You pick up all your clothes\n                *goto exit_room\n            #I think I should call the authorities.\n                *goto call_police\n    #I look around for a phone to call the police.\n        *label call_police\n        You look around for your mobile phone but cannot find it.\n        *line_break\n        There is no phone in the bedroom.\n        *goto knock_at_door\n\n*label knock_at_door\n\nYou hear a rap at the door and a female voice asks \"Coco, are you going to join me for breakfast?\"\n*set coco_named true\n*choice\n    #Stay silent and hope she leaves.\n        *set brave -5\n        You remain silent and hope that she will leave.\n        The woman knocks more insistently.\n        *choice\n            #Stay silent and hope she leaves.\n                You hear \"Lazy cow\", and you think the woman has left.\n                *goto exit_room\n            #Open the door.\n                *set brave +5\n                *goto open_bedroom_door\n    #Open the door.\n        *label open_bedroom_door\n        You open the bedroom door and you see a young woman.\n        She sees you and begins quivering, she turns tail and runs screaming.\n\n        Bad hair day?\n        *set brave +5\n        *goto woman_panicked\n    #Answer \"No thanks\".\n        You get no reply.  You hear some hurried footsteps ascending stairs and a door slam.\n        *set brave +5\n        *goto woman_panicked\n\n*label exit_room\n\nYou slowly turn the handle of the room and peer out.\nYou notice that your hand is covered in blood.\n\nYou are on the ground floor.\nThere is a white corridor which has several adjoining rooms, you see the front door and a staircase.\n*choice\n    #Go into one of the adjoining rooms.\n        *label bathroom\n        You go try an adjoining room, but the door is locked.\n        You try another, it is a bathroom.\n\n        You see yourself in the mirror, you are covered in blood.\n        You hurriedly wash yourself clean.\n        *set blood_covered false\n        *choice\n            #You see a phone in the corridor, call the police.\n                *label corridor_phone\n                You call the police using the phone in the corridor.\n                *goto jail\n            #Leave the house.\n                *goto leave_house\n            #Go back into the bedroom.\n                *if (police_called)\n                    *goto jail\n                *else\n                    You return to the bedroom, but find that the door is locked.\n                    *choice\n                        #You see a phone in the corridor, call the police.\n                            *goto corridor_phone\n                        #Leave the house.\n                            *goto leave_house\n                        #Explore the house.\n                            *set brave +5\n                            *label explore_house\n                            *if (police_called)\n                                *goto jail\n                            *else\n                                You find nothing of interest in the house, you decide to leave.\n                                *goto leave_house\n    #Go up the staircase.\n        You see a young woman walking down the stairs.\n        *if (blood_covered)\n            She takes a look at you then runs back up the stairs and you hear a door slam.\n            *label woman_panicked\n            *set police_called true\n            *choice\n                #Go knock on her door to ask her what the problem is.\n                    You cannot get any sensible reply from the woman in the room.\n                    *set friendly +10\n                    *goto jail\n                #Leave the house.\n                    *goto leave_house\n                #Go into one of the adjoining rooms.\n                    *goto bathroom\n        *else\n            She ignores you.\n            *goto explore_house\n    #Leave through the front door.\n        *goto leave_house\n\n*label leave_house\n*if (blood_covered)\n    You leave the house but notice that people are staring at you.\n    You realise that you are covered in blood.\n    *goto jail\n*else\n    You stumble out of the house trying to look as innocuous as possible.\n\n    As you walk away from the house you discover a ticket to the night club \"Tall Tango\" in your pocket.\n    *finish\n\n\n*label jail\nWithin a few minutes sirens and flashing blue lights appear.\nDespite your protests you are arrested.\n\nYour claims of ignorance of the murder are widely disbelieved\nand after a short trial you are convicted of a brutal murder that you did not commit.\n\nYou spend the rest of your life in jail.\n\nGame Over.\n*goto_scene ending\n", "startup": "*title What Happened Last Night?\n*author Kie Brooks\n*comment Copyright 2010 by Kie Brooks\n\n*scene_list\n  startup\n  startup.choice\n  discovery.choice\n  evaluation.choice\n\n*create justice 50\n*create friendly 50\n*create brave 50\n*create minor_crimes 0\n*create major_crimes 0\n*create people_killed 0\n*create career \"\"\n*create coco_named false\n\n*label intro\nWhat happened last night?\n\nThe aim of this adventure is to figure out what happened on the previous night,\nwhile staying alive and out of jail.\n\nDuring the game, you will face many decisions, there isn't always a best or worst one.\nThis may draw out the good or the evil in you, the choice is as always yours.\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and (not(choice_purchased_adfree) and not(choice_is_web))\n    This game is supported by advertisements, but you can buy the unlimited version\n    to turn off ads forever.\n\n    *purchase adfree $4.99 purchased\n    *page_break_advertisement\n\n*label purchased\n\n\n*label start\nThis story has some adult themes, if you are of a nervous disposition,\neasily frightened, too young or too old then you might not want to play this game.\n\nThere is also some humour, which you might not enjoy.\n*line_break\nIn addition the spelling and grammar are appalling.\n\nDo you still want to continue?\n*choice\n    #Yes, just let me play the darn game already!\n        *set brave +10\n        A brave choice, let us hope you do not live to regret it.\n        *goto_scene startup.choice\n    #No.  Maybe when I am older or braver.  It's  already past my bed time.\n        A cautious choice, but perhaps better safe than sorry.\n        *set brave -50\n        \n        Game Over.\n        *goto_scene ending\n"}};
</script>
<script>
/* ChoiceScript runtime — vanilla-JS port of the Python engine in cs/.
 *
 * Faithful reimplementation of parser + expr + interpolate + engine. The
 * engine is I/O-agnostic: it talks to an `io` object exposing text(), choose(),
 * page_break(), input_text(), input_number(), achievement(), stat_chart().
 *
 * Exposed as a global `CS` object (no modules, no build step).
 */
(function (root) {
  "use strict";

  // ---- errors ----------------------------------------------------------- //

  class CSError extends Error {
    constructor(message, scene, line) {
      super(formatLoc(scene, line) + message);
      this.raw_message = message;
      this.scene = scene === undefined ? null : scene;
      this.line = line === undefined ? null : line;
      this.name = "CSError";
    }
  }
  function formatLoc(scene, line) {
    if (scene == null && line == null) return "";
    return (scene == null ? "?" : scene) + " line " + (line == null ? "?" : line) + ": ";
  }
  class ExprError extends CSError { constructor(m, s, l) { super(m, s, l); this.name = "ExprError"; } }
  class GameOver extends Error { constructor(label) { super(label || ""); this.label = label || ""; this.name = "GameOver"; } }
  class QuitGame extends Error { constructor() { super("quit"); this.name = "QuitGame"; } }
  class LoadGame extends Error { constructor(state) { super("load game"); this.state = state; this.name = "LoadGame"; } }
  class RestartGame extends Error { constructor() { super("restart"); this.name = "RestartGame"; } }

  // ---- parser ----------------------------------------------------------- //

  const COMMAND_RE = /^\s*\*(\w+)\b[ \t]?([\s\S]*)$/;
  const INDENT_RE = /^([ \t]*)/;

  class Line {
    constructor(num, indent, command, arg, text) {
      this.num = num;
      this.indent = indent;
      this.command = command; // null for plain text
      this.arg = arg;
      this.text = text;
    }
    get is_blank() {
      return this.command == null && this.text.trim() === "";
    }
  }

  function getIndent(raw) {
    const m = INDENT_RE.exec(raw);
    const ws = m ? m[1] : "";
    if (ws.indexOf("\t") !== -1 && ws.indexOf(" ") !== -1) {
      throw new CSError("mixed tabs and spaces in indentation");
    }
    return ws.length;
  }

  function parseScene(text) {
    const lines = [];
    const rawLines = text.split("\n");
    for (let i = 0; i < rawLines.length; i++) {
      let raw = rawLines[i].replace(/\r$/, "");
      const num = i + 1;
      if (raw.trim() === "") {
        lines.push(new Line(num, 0, null, "", ""));
        continue;
      }
      const indent = getIndent(raw);
      const m = COMMAND_RE.exec(raw);
      if (m) {
        lines.push(new Line(num, indent, m[1], m[2], raw.trim()));
      } else {
        lines.push(new Line(num, indent, null, "", raw.trim()));
      }
    }
    return lines;
  }

  // ---- value coercion --------------------------------------------------- //

  function isNum(v) { return typeof v === "number"; }
  function isBool(v) { return typeof v === "boolean"; }
  function isStr(v) { return typeof v === "string"; }

  function toNum(value) {
    if (isBool(value)) throw new ExprError("Expected number, got boolean: " + value);
    if (isNum(value)) return value;
    const s = String(value).trim();
    if (/^-?\d+$/.test(s)) return parseInt(s, 10);
    // Match Python float(): the whole string must be a valid float literal.
    if (/^[+-]?(\d+\.?\d*|\.\d+)([eE][+-]?\d+)?$/.test(s)) {
      const f = Number(s);
      if (!isNaN(f)) return f;
    }
    throw new ExprError('Expected number, but got string: "' + value + '"');
  }

  function toBool(value) {
    if (isBool(value)) return value;
    if (isNum(value)) throw new ExprError("Expected boolean, got number: " + value);
    const s = String(value).trim().toLowerCase();
    if (s === "true") return true;
    if (s === "false") return false;
    throw new ExprError('Expected boolean, but got string: "' + value + '"');
  }

  function csStr(value) {
    if (isBool(value)) return value ? "true" : "false";
    if (isNum(value)) {
      // integers render without a decimal point
      if (Number.isInteger(value)) return String(value);
      return String(value);
    }
    return String(value);
  }

  // ---- expression tokenizer --------------------------------------------- //

  const TOKEN_SPECS = [
    ["OPEN_PARENTHESIS", /^\(/],
    ["CLOSE_PARENTHESIS", /^\)/],
    ["OPEN_CURLY", /^\{/],
    ["CLOSE_CURLY", /^\}/],
    ["OPEN_SQUARE", /^\[/],
    ["CLOSE_SQUARE", /^\]/],
    ["FUNCTION", /^(not|round|timestamp|log|length|auto)\s*\(/],
    ["NUMBER", /^\d+(\.\d+)?\b/],
    ["CURLY_QUOTE", /^[“”]/],
    ["WHITESPACE", /^\s+/],
    ["NAMED_OPERATOR", /^(and|or|modulo)\b/],
    ["VAR", /^\w+/],
    ["FAIRMATH", /^%[+\-]/],
    ["OPERATOR", /^[+\-*/&%^#]/],
    ["INEQUALITY", /^[!<>]=?/],
    ["EQUALITY", /^=/],
    ["COMMA", /^,/],
  ];
  const FUNC_NAME_RE = /^\w+/;

  class Token {
    constructor(name, value, pos, func) {
      this.name = name;
      this.value = value;
      this.pos = pos;
      this.func = func || null;
    }
  }

  function tokenize(expr) {
    let s = expr;
    let pos = 0;
    const tokens = [];
    while (s) {
      // String literal with backslash escapes.
      if (s[0] === '"') {
        let i = 1;
        let found = false;
        while (i < s.length) {
          const c = s[i];
          if (c === "\\") { i += 1; }
          else if (c === '"') { found = true; break; }
          i += 1;
        }
        if (!found) throw new ExprError("Invalid string, open quote with no close quote: " + s);
        const matched = s.slice(0, i + 1);
        pos += matched.length;
        tokens.push(new Token("STRING", matched, pos));
        s = s.slice(matched.length);
        continue;
      }
      let matched = null;
      for (const [name, rx] of TOKEN_SPECS) {
        const m = rx.exec(s);
        if (m && m[0]) { matched = [name, m[0]]; break; }
      }
      if (matched === null) throw new ExprError("Invalid expression, could not tokenize at: " + s);
      const [name, value] = matched;
      pos += value.length;
      s = s.slice(value.length);
      if (name === "CURLY_QUOTE") throw new ExprError("Invalid use of curly smart quote: " + value);
      if (name === "WHITESPACE") continue;
      let func = null;
      if (name === "FUNCTION") func = FUNC_NAME_RE.exec(value)[0];
      tokens.push(new Token(name, value, pos, func));
    }
    return tokens;
  }

  // ---- operators -------------------------------------------------------- //

  function fairAdd(v1, v2) {
    v1 = toNum(v1); v2 = toNum(v2);
    if (!(v1 >= 0 && v1 <= 100)) throw new ExprError("Can't fairAdd to non-percentile value: " + v1);
    if (v2 > 0) {
      const mult = (100 - v1) / 100.0;
      const value = Math.floor(v1 + v2 * mult);
      return value > 99 ? 99 : value;
    }
    const mult = v1 / 100.0;
    const value = Math.ceil(v1 - (-v2) * mult);
    return value < 1 ? 1 : value;
  }
  function fairSub(v1, v2) { return fairAdd(v1, -toNum(v2)); }

  function equals(v1, v2) {
    if (isBool(v1) || isBool(v2)) {
      return v1 === v2 || String(v1).toLowerCase() === String(v2).toLowerCase();
    }
    return v1 === v2 || String(v1) === String(v2);
  }
  function divide(a, b) {
    b = toNum(b);
    if (b === 0) throw new ExprError("can't divide by zero");
    return toNum(a) / b;
  }
  function concat(a, b) { return csStr(a) + csStr(b); }
  function numBin(fn) { return (a, b) => fn(toNum(a), toNum(b)); }
  // The `#` operator: 1-based character index into a string (e.g. name#1
  // returns the first character). Mirrors Scene.operators['#'] in scene.js.
  function charAt(v1, v2) {
    const s = csStr(v1);
    const i = toNum(v2);
    if (i !== Math.floor(i)) throw new ExprError("There is no character at position " + i + "; the position must be a whole number.");
    if (i < 1) throw new ExprError("There is no character at position " + i + "; the position must be greater than or equal to 1.");
    if (i > s.length) throw new ExprError('There is no character at position ' + i + '. "' + s + '" is only ' + s.length + " characters long.");
    return s.charAt(i - 1);
  }

  const OPERATORS = {
    "+": numBin((a, b) => a + b),
    "-": numBin((a, b) => a - b),
    "*": numBin((a, b) => a * b),
    "/": (a, b) => divide(a, b),
    "^": numBin((a, b) => Math.pow(a, b)),
    "modulo": numBin((a, b) => ((a % b) + b) % b),
    "&": (a, b) => concat(a, b),
    "#": charAt,
    "%+": fairAdd,
    "%-": fairSub,
    "=": equals,
    "!=": (a, b) => !equals(a, b),
    "<": numBin((a, b) => a < b),
    ">": numBin((a, b) => a > b),
    "<=": numBin((a, b) => a <= b),
    ">=": numBin((a, b) => a >= b),
    "and": (a, b) => toBool(a) && toBool(b),
    "or": (a, b) => toBool(a) || toBool(b),
  };

  // ---- evaluator -------------------------------------------------------- //

  class Evaluator {
    constructor(resolver) { this.resolver = resolver; }

    evalString(expr) { return this.evalTokens(tokenize(expr)); }
    evalTokens(tokens) { return this._evalExpr(tokens.slice(), null); }

    evalValueToken(stack) { return this._evalValueToken(stack.shift(), stack); }

    evaluateReference(stack, toLower) {
      if (toLower === undefined) toLower = true;
      const norm = (name) => toLower ? String(name).toLowerCase() : name;
      const findClosing = (kind, offset) => {
        let opens = 0;
        const openName = "OPEN_" + kind, closeName = "CLOSE_" + kind;
        for (let i = offset || 0; i < stack.length; i++) {
          if (stack[i].name === openName) opens += 1;
          else if (stack[i].name === closeName) {
            if (opens) opens -= 1; else return i;
          }
        }
        return -1;
      };
      if (!stack.length) throw new ExprError("Invalid expression, expected a name");
      const head = stack[0];
      if (head.name === "OPEN_CURLY") {
        stack.shift();
        const closing = findClosing("CURLY", 0);
        if (closing === -1) throw new ExprError("Invalid expression, no closing curly bracket");
        const name = this.evalTokens(stack.slice(0, closing));
        stack.splice(0, closing + 1);
        return norm(name);
      }
      if (head.name === "NUMBER") { stack.shift(); return head.value; }
      if (head.name !== "VAR") {
        throw new ExprError("Invalid expression; expected name, found " + head.name + " at char " + head.pos);
      }
      let name = String(head.value);
      stack.shift();
      while (stack.length && stack[0].name === "OPEN_SQUARE") {
        const closing = findClosing("SQUARE", 1);
        if (closing === -1) throw new ExprError("Invalid expression, no closing array bracket");
        const index = this.evalTokens(stack.slice(1, closing));
        name += "_" + csStr(index);
        stack.splice(0, closing + 1);
      }
      return norm(name);
    }

    _evalExpr(stack, parenthetical) {
      if (!stack.length) throw new ExprError("no expression specified");
      let value1 = this._evalValueToken(stack.shift(), stack);
      if (!stack.length) {
        if (parenthetical) throw new ExprError("Invalid expression, expected " + parenthetical);
        return value1;
      }
      let token = stack.shift();
      if (parenthetical && parenthetical === token.name) return value1;
      const op = OPERATORS[token.value];
      if (op === undefined) {
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected OPERATOR, was: " + token.name + " [" + token.value + "]");
      }
      if (!stack.length) throw new ExprError("Invalid expression, expected something after a " + token.value);
      const value2 = this._evalValueToken(stack.shift(), stack);
      const result = op(value1, value2);
      if (parenthetical) {
        if (stack.length) {
          token = stack.shift();
          if (parenthetical === token.name) return result;
          throw new ExprError("Invalid expression at char " + token.pos + ", expected " +
            parenthetical + ", was: " + token.name + " [" + token.value + "]");
        }
        throw new ExprError("Invalid expression, expected " + parenthetical);
      } else if (stack.length) {
        token = stack.shift();
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected no more tokens, was: " + token.name + " [" + token.value + "]");
      }
      return result;
    }

    _evalValueToken(token, stack) {
      const name = token.name;
      if (name === "OPEN_PARENTHESIS") return this._evalExpr(stack, "CLOSE_PARENTHESIS");
      if (name === "OPEN_CURLY") {
        const value = this._evalExpr(stack, "CLOSE_CURLY");
        return this.resolver.get_var(value);
      }
      if (name === "FUNCTION") {
        const value = this._evalExpr(stack, "CLOSE_PARENTHESIS");
        return this._callFunc(token.func, value);
      }
      if (name === "NUMBER") {
        return /^\d+$/.test(token.value) ? parseInt(token.value, 10) : parseFloat(token.value);
      }
      if (name === "STRING") {
        let inner = token.value.slice(1, -1);
        inner = inner.replace(/\\(.)/g, "$1");
        return this.resolver.replace_variables(inner);
      }
      if (name === "VAR") {
        let variable = String(token.value);
        while (stack.length && stack[0].name === "OPEN_SQUARE") {
          stack.shift();
          const idx = this._evalExpr(stack, "CLOSE_SQUARE");
          variable += "_" + csStr(idx);
        }
        return this.resolver.get_var(variable);
      }
      throw new ExprError("Invalid expression at char " + token.pos +
        ", expected NUMBER, STRING, VAR or PARENTHETICAL, was: " + name + " [" + token.value + "]");
    }

    _callFunc(func, value) {
      if (func === "not") return !toBool(value);
      if (func === "round") return Math.floor(toNum(value) + 0.5);
      if (func === "length") return csStr(value).length;
      if (func === "log") return Math.log10(toNum(value));
      if (func === "timestamp") return parseTimestamp(csStr(value));
      if (func === "auto") throw new ExprError("auto() must come after a < or > symbol");
      throw new ExprError("Unknown function " + func);
    }
  }

  function parseTimestamp(value) {
    const t = Date.parse(value.trim());
    if (isNaN(t)) throw new ExprError("timestamp() could not parse date: " + value);
    return Math.floor(t / 1000);
  }

  // ---- interpolation ---------------------------------------------------- //

  const REPLACER = /[$@](!?!?)\{/g;

  function replaceVariables(line, evaluator) {
    line = String(line);
    const output = [];
    let index = 0;
    while (true) {
      REPLACER.lastIndex = index;
      const m = REPLACER.exec(line);
      if (!m) { output.push(line.slice(index)); break; }
      output.push(line.slice(index, m.index));
      const sigil = line[m.index];
      const capitalize = m[1];
      const exprStart = m.index + m[0].length;
      let curlies = 0, closing = -1, i = exprStart;
      while (i < line.length) {
        const c = line[i];
        if (c === "{") curlies += 1;
        else if (c === "}") { if (curlies) curlies -= 1; else { closing = i; break; } }
        i += 1;
      }
      if (closing === -1) throw new CSError("invalid " + line.slice(m.index, exprStart) + " variable substitution");
      const body = line.slice(exprStart, closing);
      let value = sigil === "$" ? evaluator.evalString(body) : evalMultireplace(body, evaluator);
      value = csStr(value);
      if (capitalize === "!") value = value.slice(0, 1).toUpperCase() + value.slice(1);
      else if (capitalize === "!!") value = value.toUpperCase();
      output.push(value);
      index = closing + 1;
    }
    return output.join("");
  }

  function evalMultireplace(body, evaluator) {
    let expr, options;
    if (/^\s*\(/.test(body)) {
      let parens = 0, closingParen = -1;
      for (let i = 1; i < body.length; i++) {
        const c = body[i];
        if (c === "(") parens += 1;
        else if (c === ")") { if (parens) parens -= 1; else { closingParen = i; break; } }
      }
      if (closingParen === -1) throw new CSError("invalid @{} multireplace; missing closing parenthesis");
      if (closingParen + 1 >= body.length || body[closingParen + 1] !== " ")
        throw new CSError("invalid @{} multireplace; there should be a space after )");
      expr = body.slice(1, closingParen);
      options = body.slice(closingParen + 2).split("|");
    } else {
      if (!/^\S+ /.test(body))
        throw new CSError("invalid @{} multireplace; there should be a space after the first word");
      const spaceIndex = body.indexOf(" ");
      expr = body.slice(0, spaceIndex);
      options = body.slice(spaceIndex + 1).split("|");
    }
    if (options.length < 2) throw new CSError("invalid @{} multireplace; need at least one pipe |");
    let value = evaluator.evalString(expr);
    if (isBool(value) || (isStr(value) && (value.toLowerCase() === "true" || value.toLowerCase() === "false"))) {
      value = toBool(value) ? 1 : 2;
    }
    value = Math.trunc(toNum(value));
    if (value < 1) throw new CSError("invalid @{} multireplace; '" + expr + "' = " + value + " is not positive");
    if (value > options.length)
      throw new CSError("invalid @{} multireplace; '" + expr + "' = " + value +
        " but there are only " + options.length + " options");
    return replaceVariables(options[value - 1], evaluator);
  }

  const MARKUP_RE = /\[\/?(i|b|lie|key|val|stat|suspiciously|optimistically)\]/g;
  // Mirror the game's replaceBbCode for the tags that carry layout meaning:
  // [n/] is a hard line break and [c/] is a "continue, no space" marker that
  // renders as nothing. The remaining styling tags are simply dropped. The
  // resulting "\n" survives paragraph joining (which only collapses spaces and
  // tabs) and shows as a line break wherever text is rendered pre-wrap.
  function stripMarkup(text) {
    return String(text)
      .replace(/\[n\/\]/g, "\n")
      .replace(/\[c\/\]/g, "")
      .replace(MARKUP_RE, "");
  }

  root.CS = { CSError, ExprError, GameOver, QuitGame, LoadGame, RestartGame,
    Line, parseScene, getIndent, toNum, toBool, csStr, Token, tokenize, OPERATORS,
    Evaluator, replaceVariables, stripMarkup };

  // ---- state serialization ---------------------------------------------- //
  // Mirrors the Python _to_jsonable/_from_jsonable. JS also has Map values
  // (_choice_ends/_choice_used with integer keys) which JSON can't hold, so a
  // Map is encoded as {__map__: [[k, v], ...]} and restored to a Map on load.

  function toJsonable(obj) {
    if (obj instanceof Map) {
      return { __map__: Array.from(obj.entries()).map(([k, v]) => [k, toJsonable(v)]) };
    }
    if (Array.isArray(obj)) return obj.map(toJsonable);
    if (obj && typeof obj === "object") {
      const out = {};
      for (const k of Object.keys(obj)) out[k] = toJsonable(obj[k]);
      return out;
    }
    return obj;
  }

  function fromJsonable(obj) {
    if (Array.isArray(obj)) return obj.map(fromJsonable);
    if (obj && typeof obj === "object") {
      const keys = Object.keys(obj);
      if (keys.length === 1 && keys[0] === "__map__") {
        const m = new Map();
        for (const [k, v] of obj.__map__) m.set(keyFrom(k), fromJsonable(v));
        return m;
      }
      const out = {};
      for (const k of keys) out[k] = fromJsonable(obj[k]);
      return out;
    }
    return obj;
  }

  function keyFrom(k) {
    if (typeof k === "string" && /^-?\d+$/.test(k)) return parseInt(k, 10);
    return k;
  }

  // Plain deep copy for already-jsonable data (checkpoints/state). Must NOT
  // use fromJsonable, which would turn serialized {__map__} into live Maps and
  // corrupt the jsonable form.
  function deepCopy(obj) { return JSON.parse(JSON.stringify(obj)); }

  // ---- engine ----------------------------------------------------------- //

  function truthy(value) { return toBool(value); }

  const INITIAL_COMMANDS = new Set([
    "create", "create_array", "scene_list", "title", "author", "comment",
    "achievement", "product", "ifid",
  ]);

  const NOOP_COMMANDS = new Set([
    "page_break_advertisement", "finish_advertisement", "advertisement",
    "check_purchase", "restore_purchases", "purchase", "looplimit",
    "purchase_discount", "print_discount", "check_registration", "login",
    "subscribe", "share_this_game", "more_games", "feedback",
    "check_achievements",
    "sound", "youtube", "link",
    "link_button", "track_event", "timer", "ifid", "product",
    "show_password", "author", "delay_break",
    "end_trial", "script", "achievement",
  ]);

  const ENV_VARS = {
    choice_subscribe_allowed: () => true,
    choice_register_allowed: () => false,
    choice_registered: () => false,
    choice_is_web: () => false,
    choice_is_steam: () => false,
    choice_is_steam_deck: () => false,
    choice_is_ios_app: () => false,
    choice_is_ipad_app: () => false,
    choice_is_android_app: () => false,
    choice_is_omnibus_app: () => false,
    choice_is_amazon_app: () => false,
    choice_is_advertising_supported: () => false,
    choice_is_trial: () => false,
    choice_prerelease: () => false,
    choice_kindle: () => false,
    choice_randomtest: () => false,
    choice_quicktest: () => false,
    choice_nightmode: () => false,
    choice_purchase_supported: () => false,
    choice_purchased_adfree: () => true,
    choice_purchased_everything: () => true,
    choice_restore_purchases_allowed: () => false,
    choice_save_allowed: () => true,
    choice_release_date: () => "release day",
  };

  class Scene {
    constructor(name, lines) {
      this.name = name;
      this.lines = lines;
      this.labels = {};
      this._indexLabels();
    }
    _indexLabels() {
      for (let i = 0; i < this.lines.length; i++) {
        const ln = this.lines[i];
        if (ln.command && ln.command.toLowerCase() === "label") {
          const label = ln.arg.trim().toLowerCase();
          if (/\s/.test(label)) {
            throw new CSError("label '" + label + "' is not allowed to contain spaces", this.name, ln.num);
          }
          if (label in this.labels) {
            throw new CSError("label '" + label + "' already defined on line " +
              this.lines[this.labels[label]].num, this.name, ln.num);
          }
          this.labels[label] = i;
        }
      }
    }
  }

  class Engine {
    constructor(io, sceneLoader) {
      // sceneLoader(name) -> array of Line (parsed). Replaces filesystem access.
      this.io = io;
      this._loader = sceneLoader;
      io.engine = this;
      this.stats = {};
      this.temps = this._freshTemps();
      this.scene_list = [];
      this.scene_cache = {};
      this.evaluator = new Evaluator(this);

      this.scene = null;
      this.line_num = 0;
      this.indent = 0;
      this.finished = false;
      this.initial_commands = true;

      this._para = [];
      this.achievements = {};
      this.unlocked = new Set();
      this.checkpoints = {};
      this._resume = null;
      this._pending_scene = null;
      this._in_stats = false;
      this._rng = Math.random;  // overridable for deterministic tests
    }

    _freshTemps() {
      return {
        choice_reuse: "allow",
        param: [],
        _choice_ends: new Map(),
        _choice_used: new Map(),
        _choice_substack: [],
        _fake_choice_depth: 0,
      };
    }

    // ---- resolver interface ---- //

    get_var(variable) {
      variable = String(variable).toLowerCase();
      if (variable && /^-?\d+$/.test(variable)) return parseInt(variable, 10);
      if (variable === "true") return true;
      if (variable === "false") return false;
      const env = ENV_VARS[variable];
      if (env !== undefined) return env(this);
      if (variable === "choice_linenum") return this.line_num;
      if (variable === "choice_scene") return this.scene ? this.scene.name : "";
      if (variable.startsWith("choice_saved_checkpoint")) return !!this.stats[variable];
      if (variable.startsWith("choice_achieved_"))
        return this.unlocked.has(variable.slice("choice_achieved_".length));
      if (variable.startsWith("choice_purchased_")) return true;
      if (variable === "choice_user_restored" && !(variable in this.temps)) return false;
      if (variable === "choice_just_restored_checkpoint" && !(variable in this.temps)) return false;
      let value;
      if (variable in this.temps) value = this.temps[variable];
      else if (variable in this.stats) value = this.stats[variable];
      else {
        if (variable === "implicit_control_flow") return false;
        throw new CSError("Non-existent variable '" + variable + "'",
          this.scene ? this.scene.name : null, this._curNum());
      }
      if (value === null || value === undefined) {
        throw new CSError("Variable '" + variable + "' exists but has no value",
          this.scene ? this.scene.name : null, this._curNum());
      }
      return value;
    }

    replace_variables(text) { return replaceVariables(text, this.evaluator); }

    set_var(variable, value) {
      variable = String(variable).toLowerCase();
      if (variable in this.temps) this.temps[variable] = value;
      else if (variable in this.stats) this.stats[variable] = value;
      else throw new CSError("Non-existent variable '" + variable + "'",
        this.scene ? this.scene.name : null, this._curNum());
    }

    _validateVariable(variable) {
      if (!variable || !/^[a-zA-Z]/.test(variable))
        throw this._err("Invalid variable name, must start with a letter: " + variable);
      if (!/^\w+$/.test(variable))
        throw this._err("Invalid variable name: '" + variable + "'");
      if (/^(and|or|true|false|scene|scenename)$/i.test(variable))
        throw this._err("Invalid variable name, '" + variable + "' is a reserved word");
      if (variable.startsWith("choice_"))
        throw this._err("variables may not start with 'choice_'");
    }

    _curNum() {
      if (this.scene && this.line_num >= 0 && this.line_num < this.scene.lines.length)
        return this.scene.lines[this.line_num].num;
      return null;
    }
    _err(msg) { return new CSError(msg, this.scene ? this.scene.name : null, this._curNum()); }
    _safeGet(name) { try { return this.get_var(name); } catch (e) { if (e instanceof CSError) return null; throw e; } }

    // ---- scene loading + run ---- //

    load_scene(name) {
      name = name.toLowerCase();
      if (!(name in this.scene_cache)) {
        const lines = this._loader(name);
        this.scene_cache[name] = new Scene(name, lines);
      }
      return this.scene_cache[name];
    }

    run(startScene) {
      this._enterScene(this.load_scene(startScene || "startup"));
      this._runUntilEnd();
    }

    resumeFromState(state) {
      this._applyState(state);
      this._runUntilEnd();
    }

    // Run choicescript_stats against the *already-applied* engine state, as a
    // single scene. Unlike showStats() this does NOT snapshot/restore — it's
    // meant for a throwaway engine whose state was set via _applyState. Because
    // stats screens are often interactive (*choice menus of stat categories),
    // the io is free to throw StopReplay at a prompt; that propagates to the
    // caller, which records the answer and re-runs from the top. Mirrors the
    // single-scene model of engine.py show_stats (labels/goto within the scene
    // work; goto_scene out of stats is not followed, by ChoiceScript convention).
    runStatsScene() {
      this.scene = this.load_scene("choicescript_stats");
      this.line_num = 0;
      this.indent = 0;
      this.finished = false;
      this.temps = this._freshTemps();
      this._para = [];
      this._pending_scene = null;
      this._resume = null;
      this._in_stats = true;
      this._runStatsLoop();
      this._in_stats = false;
    }

    // Drive the stats overlay to completion. Unlike a single _printLoop() call,
    // this follows *gosub_scene transitions (e.g. magics' appearance text calls
    // out to utils) and the *return that comes back, so the whole stats scene
    // renders. Unlike _mainLoop it never advances into the next scene in the
    // scene list: when the stats scene finishes with no pending transition,
    // we're done.
    _runStatsLoop() {
      try {
        while (true) {
          this._printLoop();
          if (this._pending_scene !== null) {
            const nxt = this._pending_scene;
            this._pending_scene = null;
            this._enterScene(nxt);
            continue;
          }
          break;
        }
      } catch (e) {
        if (!(e instanceof GameOver)) throw e;
      }
      this._flushParagraph();
    }

    // Run choicescript_stats as a read-only overlay against current state, then
    // restore everything (the stats scene may *set globals as harmless
    // normalizations, so we snapshot stats too). Mirrors engine.py show_stats.
    // The caller must have made "choicescript_stats" loadable; if the loader
    // can't find it, the CSError propagates.
    showStats() {
      const saved = {
        scene: this.scene, line_num: this.line_num, indent: this.indent,
