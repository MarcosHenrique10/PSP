You see ${daughter} on the doorway, gun in hand. You are about to explain when...BANG! \n  \n  GAME OVER\n  *goto_scene finish\n  \n*label passion \n*choice\n #You decide to continue\n  You find it difficult to control your thoughts. Right now its all about ${daughter}. You can feel the heat grow. You decide that you can no longer keep your emotions caged. You decide to let it get the better of you. \n  *page_break\n  When you wake up next morning, there is a man in your room. ${traitor}. He smiles at you. You look at ${daughter}. She is still asleep.\n\n  \"I always knew that you were a tiger, Klaw. I am impressed and that's why I haven't killed you yet. I thought it befitting for you to decide your fate.\"\n\n  He throws a knife at you. \n\n  \"Do me a favour. Kill her and I will let you join my gang.\"\n  *goto suicide\n  \n #You decide to control your emotions\n  You know that this is not the time to indulge in such pleasures. ${traitor} and his men may arrive here any moment. You must find a secure location. You break off the kiss and take her to a safe place. The Church.\n  *set lover daughter\n  *goto_scene chap8\n  \n*label suicide\n*choice\n #Kill her\n  You decide that its your life that is most important. She is after all just a gangster. You plunge the knife into her heart. She gives a blood chilling scream and then falls back into the bed. You look at your hands covered in the blood of the women to whom you just made love. Was it love? You scorn at yourself. What have you become? A monster. Or something far worse than that. You look at ${traitor} He is got a smile on his face.\n\n  \"Good. Follow me.\"\n  *set nleader traitor\n  *set tlife life\n  *set tres respect\n  *set tint intelligence\n  *set tstr strength\n  *goto_scene clinic  \n #Kill yourself\n  Kill ${daughter}? She just saved your life! You just made love to her! No, you will die before you fall to such low depths. You plunge the dagger into your belly. Whatever chivalry you had left you immediately. The pain was unbearable. You thought you had die fast and without much pain. But it seemed there was no easy way out of your troubles. You lay there for about fifteen minutes twisting and writhing in pain. Was this really worth sending your soul to eternal hell? You die in a fit of rage and unbearable pain watching ${traitor} torture ${daughter}. \n  \n  GAME OVER\n  *goto_scene finish\n #Kill ${traitor}\n  What a fool, you think. He has given me a knife. You decide to kill him with it. You hurl the knife at ${traitor}. It strikes him at the heart. But unfortunately its the hilt that hits him. Obviously, he is enraged. He decides to give you a slow and painful death. After being boiled alive, your limbs are cut and then you are buried alive. You should have just stabbed yourself. That was your last thoughts.\n  \n  GAME OVER\n  *goto_scene finish\n  \n*label killed\nYou feel the life force ebb out of you. You make a final attempt to get up but you succumb to your injuries. The pain is unbearable. As you lay there waiting for the hands of Death to wrap around you, you wonder whether it was worth it. What did you achieve by sacrificing a promising career and a loving wife? You wonder how life would have turned out if you had declined this mission.  \n\nGAME OVER\n*goto_scene finish", "chap8": "*page_break\nYou decide to call in a few favours. You lost your mobile during the firing. So you no longer have the contact list. You decide to use the telephone in the Church.\n\n*goto call\n*label call\n*line_break\n\nDial the no. : X X X X X X X _ _ _(000 to exit) \n*input_text number\n*if (number = \"580\")\n *goto gp\n*else\n *if (number = \"273\")\n  *goto bill\n *else\n  *if (number = \"955\")\n   *goto slane\n  *else\n   *goto call2\n*label call2\n*if (number = \"618\")\n *goto sophie\n*else\n *if (number = \"111\")\n  *goto lil\n *else\n  *if (number = \"000\")\n   *goto exit\n  *else\n   WRONG NUMBER\n   *goto call\n\n*label lil\n\"This mobile number is out of coverage area.\" says the operator.\n*goto call\n\t  \n*label sophie\n*if (sophie=1)\n *goto sophie1\n*else\n The phone keeps ringing but nobody picks it up.\n *goto call\n*label sophie1\n\"Hello, Dr. Sophie speaking.\"\n\n\"Sophie, its me ${name}.\"\n\n\"Hello, ${name}. How are you?\"\n\n\"Feeling well.\"\n\n\n*choice\n *if (love=1) #Tell her that you love her\n  *goto love\n #Thank her once again\n  You thank her once again for her kindness and bid her goodbye.\n  *goto call\n\n*label love\n\"I love you, Sophie.\"\n*if (respect>70) and (truth=1)\n \"I...I love you too, ${name}.\"\n *set mil4 1\n *set mil +1\n\n Those magical words keep ringing in your head. She is the only woman who understood you. Have you finally found true love? You feel completely renewed. You will finish this mission and gain back your honour. You will then ask for her hand in marriage.\n *goto call\n*else\n \"What? Do you really think I will love a thug like you? Its true that I saved your life. That was because you saved mine. Don't ever call me again.\"\n\n She hangs the phone.\n *goto call\n  \n*label gp\n\"Hello, Officer Harrison speaking.\"\n\n\"Luke, its me Klaw.\"\n\n\"Klaw. Thank God. I was worried about you. I heard there has been a mutiny in your gang.\"\n\n\"Yes. I need your help, Luke. I want the police to attack a particular godown.\"\n\n\"I would like to help you, Klaw. But the superiors have ordered not to get involved in the power struggle. Naturally they don't mind a few gangsters killing each other.\"\n\n\"Its more than that, Luke. The Blue Bloods are taking over all the other gangs. Derek is striking of his opponents and putting his puppets in their place. Soon Old Camp will be under his control. If you want to stop him, you must act now.\"\n\n\"Klaw, even if we attack the godown, we won't find anything. I have done such raids before. Even before we leave the Headquarters, news of the raid reaches the gangs. In the end we make a complete fool of us and the media lambastes our incompetence.\"\n*page_break \n\"What if we keep the raid a secret till the end?\"\n\n\"You know we can't do that. We have got rules.\"\n\n\"I think I know a way.\"\n\n\"What are you getting at?\"\n\n\"What will you do if some thug attacks the police headquarters?\"\n\n\"No one will be that mad.\"\n\n\"But what if it happens?\"\n\n\"The whole police force will be on his tail. But who will be- You rascal!\"\n\nLuke suddenly understood what you were suggesting. He agrees to help you. You put the receiver down.\n*goto call\n\n*label bill\n*if bill=0\n The phone keeps ringing but nobody picks it up.\n *goto call\n*else  \n Bill picks up the phone. You remind him of his promise. He agrees. That's another member in your gang. A very risky member at that. He could be the back stabber or the life saver. Only time will tell whether your decision was wise.\n *set callbill 1\n *goto call\n\n*label slane\n*if slane=0\n \"Slane here.\"\n\n \"Hi, its me Klaw.\"\n\n \"I am sorry but I don't know you.\n *goto call\n*else\n \"Hello, Slane here\" \n\n \"Hey, Tom. Its me, ${name}. Good to know that you got out of prison.\"\n\n \"What's up, mate?\"\n\n \"I need a favour.\"\n\n You tell him your plan. He readily agrees and you have one more member in your gang.\n *set callslane 1\n *goto call\n\n*label exit\n*set opponent 150\nYou put the receiver down. It seems that's all the help you will get. You tell ${daughter} of your plan.\n\n\"I think its a suicide mission, Klaw. But what the hell? Its our only chance. I will attack the police headquarters. I have always been good with cars.\"\n\n*page_break\nAnd so the much awaited night arrives. ${daughter} has already left for Headquarters. You are outside ${traitor}'s mansion. Of course it didn't belong to him. He bought it from a millionaire... at gun point. ${leader} never resorted to such heinous crimes. He was satisfied with what he earned from his trade. But ${traitor}'s policy was different. He believed in taking what he wanted.\n\nRight now the mansion was heavily guarded but you are banking on ${daughter} to deal with that. Once the godown is attacked, ${traitor} will sent most of his men to protect the goods. He knows that if he lets one godown to be raided then there will be raids on other as well. So he will take it as an opportunity to sent a message. Besides it will increase his respect among the gangs. That atleast is what you thought.\n\nAt half past midnight you see cars coming out of the mansion. It seems the attack on the godown has begun. You watch if ${traitor} is  going. It seems he has sent his men away but stayed back himself. Maybe he knows that its nothing worth losing his sleep. With the artillery in his command, the ill equipped forces of OCPD didn't stand a chance against the gangs. Still, the plan has served its purpose. The mansion is left quite unprotected. \n\nYou decide to make your move. How do you approach the mansion?\n*choice\n #From the front.\n  You decide to go all guns blazing. You slip in through the front gates before it closes.\n  *goto front\n #Through the back.\n  *goto back\n  \n*label back  \nThe back door is understandably locked.\n*choice\n #Pick the lock\n  *goto lock\n #Go to front side\n  *goto front\n *if (callslane=1) #Let Slane handle it\n  *goto inside\n  \n*label lock\n*set try 0\n*choice\n #Try to unlock the door\n  *goto lock1\n #Go to front side\n  *goto front \n  \n*label lock1\n*if (try=0)\n You look closely at the lock. You see the letters: EQPUI\n *goto try\n*else\n *if(try=1)\n  This seems to be harder than you thought.\n  *goto try\n *else\n  *if(try=2)\n   You ought to try harder. You look at it again : EQPUI. \n   *goto try\n  *else\n   *if(try=3)\n    *goto lock\n\t  \n*label try\n*input_text answer\n*if answer= \"PIQUE\"\n *goto inside\n*else\n  *set try +1 \n  *goto lock1\n\n*label inside\nStealthily you make your way to the dining room. There is a room downstairs. There is also a stair leading to the top floor.\n*choice\n #Upstairs\n  You decide that ${traitor} must be upstairs. So you take the stairs. \n  *goto upstairs\n #Room\n  You open the door. Oops! Wrong room. A fat guy stares at you. Dimitri Isovic! When did he get out of prison? Before you can do anything, a punch lands onyour face.\n  *goto fat\n  \n*label fat\n*choice\n #Deal with the Dimitri\n  You decide to deal with Dimitri.\n  *set respect +10\n  *goto fight  \n *if (callbill=1) #Let Bill deal with him\n  *set dimit 1\n  *goto upstairs  \n*label fight\nLife:${life}\tOpponent:${opponent}\n\n*stat_chart\n  percent life\n  percent opponent\n*line_break\n*rand move 1 4\n*if intelligence >=25\n *if move = 1\n  He raises his hand ready to deliver another blow.\n  *goto next\n *elseif move = 2\n  He pulls back his hand ready to strike again.\n  *goto next\n *elseif move = 3\n  He puts a leg backwards ready to evade any attack.\n  *goto next\n *else\n  His hands rise to guard his face.\n  *goto next\n\n*label next \n*choice\n #Punch Head\n  *set counter 4\n  *goto hit\n #Punch Stomach\n  *set counter 3\n  *goto hit\n #Duck\n  *set counter 1\n  *goto hit\n #Dodge\n  *set counter 2\n  *goto hit\n\n*label hit\n*if move=counter\n For every action there is an equal and opposite reaction. A blow is thrown and it is well defended. No one gets the upper hand.\n *goto fight\n*elseif move\u003c3\n That blow takes you by surprise. You had no answer to that. You find your energy draining away from you. \n *set life -20\n *goto strhit\n*else\n *goto strhit\n\n*label strhit\nYou give a power packed punch, inflicting maximum damage. Your opponent lets out a cry in pain.\n*if counter>2\n *if strength>=40\n  *set opponent -20\n  *goto check\n *else\n  *if strength>=20\n   *set opponent -15\n   *goto check\n  *else\n   *set opponent -10\n   *goto check\n*else\n *goto check\n\n*label check\n*if life>0\n *if opponent > 0\n  *goto fight\n *else\n  *goto wincheck\n*else\n *goto loss\n\n*label wincheck\n*set dimit 1\nWith a final blow you take down your opponent. You look around. The house is still quiet.\n*if room=1\n You make your way upstairs.\n *goto upstairs\n*else\n You turn your attention to ${traitor}. He begs for mercy. You decide to get it over with. You put a bullet through his head.\n *goto meet\n \n*label loss\n\n*line_break\nThe blow batters your body. You lose consciousness. You vaguely here the murmur of people. Then feel light as a feather. Then you hit something hard. There is a loud splash. You open your eyes. There is water around you. You try to move your hands but you cannot. With horror, you see yourself sink to the bottom of River Oslem. The water gushes into your lungs choking you. You hit the bottom of the river-the final resting place for losers like you.\n\nGAME OVER\n*goto_scene finish\n\n*label front\nYou see two guards approach you. \n*choice\n #Shoot\n  You take out you gun and fire. It hits the first guard. The other guy takes out his revolver and shoots back. The bullet hits you square on the chest. But the bullet proof vest saves you. You put a bullet through his head.\n  *set life -10\n  *if life\u003c1\n   *goto killed\n  *else\n   *line_break\n   You run to the mansion, knowing fully well that you don't have much time. You break open a french window and enter the building.\n   *goto inside\n #Negotiate\n  You raise your hands and decide to negotiate. The guard puts a bullet through your head. What were you thinking? These are cold blooded psychopaths not law abiding citizens.\n  GAME OVER \n  *goto_scene finish\n*label upstairs\nThere are three doors. One leading to a bathroom. Another to the bedroom. Another to the balcony.\n*choice\n #Bedroom\n  *set room 0\n  *goto bed\n #Bathroom\n  You try the knob. Someone is in there. You wait outside. Soon the door opens and a woman comes out. You hit her on the head. She faints.\n  *set bath 1\n  *goto bed\n #Balcony\n  You go to the balcony. There is no one out there. You go back into the house.\n  *goto upstairs\n  \n*label bed\nYou enter the bedroom. Unfortunately, ${traitor} is awake. He takes out his gun and fires a shot.\n*set life -10\n*if life\u003c1\n *goto killed\n*else\n Your bullet proof vest comes to the rescue. You shoot his hand. The gun flies out of his grasp. He is now lying on the ground writhing in pain.\n *choice\n  #Just Shoot him.\n   You do not waste any time. You put a bullet through his head and get it over with.\n   *goto meet\t\n  #Remind him of his crimes.\n   *set respect +5\n   \"You aren't going to die easily, ${traitor}. I will ensure that you pay for all your sins.\"\n\n   \"This is for ${leader}.\"\n\n   You shoot his leg. He gives a cry of pain.  \n   *page_break\n   *if bath=0\n    You here the sound of a pot breaking. There is an explosion in the back of your head. Blood pours down your face. You turn around. There is a woman standing behind you. Now where did she come from? \n    *goto pot\n   *else \n    *if dimit=0\n     Someone hits you on the back. You fall to the ground. You look at your opponent. Dimitri stands in front of you. How the hell did he get here?\n     *set dimit 1\n     *set room 0\t \n     *goto fight\n    *else\n     You shoot him again on the arm. Then you shoot him on the belly. He moans and groans in pain. You watch him twist and turn. He dies a slow and painful death.\n     *goto meet\n\t  \n\t  \n*label pot\n*set life -20\n*if life = 0\n *goto dead\n*else\n You shoot the woman. You decide not to get it over with. You put a bullet through ${traitor}'s head.\n *goto meet\n\n*label meet\t \n*page_break\nThe Council stands around you.\n\n\"What are you doing here? Where is ${traitor}?\"\n\nYou don't utter a word. Instead you throw the package onto the table. The Council members are horrified by what they see.\n\n\"It seems you need a new head.\"\n\n\n*line_break\n \nThey look at you in rage and pull out their guns. \n\n\"You don't become a leader overnight, kid. You have to earn it!\"\n\n\"He is not your leader. I am.\"says a voice from the shadows.\n\nEvery eye in the room turn to the figure that emerges from the shadows. ${daughter}. The guns are lowered. As one the Council members swear their allegiance to the new leader. You watch in the background. \n*set nleader daughter\n*set he \"she\"\n*set his \"her\"\n*set him \"her\"\n*set He \"She\"\n*set His \"Her\"\n*set Him \"Her\"\n*set tlife life\n*set tres respect\n*set tint intelligence\n*set tmil mil\n*set tstr strength\n*goto_scene clinic\n \n*label dead\n*line_break\nThe blow batters your body. You lose consciousness. You vaguely here the murmur of people. Then feel light as a feather. Then you hit something hard. There is a loud splash. You open your eyes. There is water around you. You try to move your hands but you cannot. With horror, you see yourself sink to the bottom of the River Oslem. The water gushes into your lungs choking you. You hit the bottom of the river-the final resting place for losers like you.\n\nGAME OVER\n*goto_scene finish\n\n*label killed\nYou feel the life force ebb out of you. You make a final attempt to get up but you succumb to your injuries. The pain is unbearable. As you lay there waiting for the hands of Death to wrap around you, you wonder whether it was worth it. What did you achieve by sacrificing a promising career and a loving wife? You wonder how life would have turned out if you had declined this mission.  \n\nGAME OVER\n*goto_scene finish\n", "choicescript_description": "Undercover, you are on your own! Embark on the deadliest quest of your life. Death awaits you at every corner. Battle thugs, find love, solve puzzles and piece together the story to unravel the mysterious mastermind. Is the legend of the Lone Wolf a mere myth? Will you come out with your soul unscathed? Or will you become the very monster you planned to bring down? Do you have what it takes to complete all eight milestones? Find out in this action packed interactive tale of love, duty and betrayal.\n\n[i]The Gangs of Old Camp[/i] is a 35,000-word interactive novel by Amith Shaju. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.", "choicescript_stats": "\n\n*stat_chart\n  percent life\n  percent respect\n  percent strength\n  percent intelligence\n\nPHONE DIARY\n*line_break\n-------------------\n*if ( phone =1)\n *line_break\n Lily Chan: XXXXXXX111\n *line_break\n Luke Harrison:XXXXXXX580\n*if (slane=1)\n *line_break\n Tommy Slane:XXXXXXX955\n*if(bill=1)\n *line_break\n Bill Hogan : XXXXXXX273\n*if(sophie=1)\n *line_break\n Sophie Rutherton: XXXXXXX618\n\n*line_break\n\n \nCOMPLETED MILESTONES(${mil}/8)\n*line_break\n----------------------------------------\n*if (mil1=1)\n *line_break\n THE DARK WARS \n*if(mil2=1)\n *line_break\n THE LONE WOLF LEGEND\n*if(mil3=1)\n *line_break\n BRAVE IN THE FACE OF DEATH\n*if(mil4=1)\n *line_break\n ROMEO\n*if(mil5=1)\n *line_break\n A GRAVE TALE\n*if (mil6=1)\n *line_break\n DOUBTING THOMAS\n*if(mil7=1)\n *line_break\n DERWIN JONAS\n*if(mil8=1)\n *line_break\n MORGANS DON'T FORGIVE \n\n\n\n \n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game.\n\n  *purchase adfree $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n\n", "clinic": "*page_break\n*set life tlife\n*set respect tres\n*set intelligence tint\n*set strength tstr\n*set mil tmil\n*set checkpoint 2\n\n*set love 0\n*set luke 0\n*set apex 0\n*set felix 0\n*set grave 0\n\n\nYou are now a powerful member in the gang. After ${nleader} became head of the gang, ${he} rebuild the whole gang. Threats were removed and fresh blood infused into the gang. ${He} took a liking for you and so you found yourself as second in command. You have recruited Tommy into the gang. After all, he did teach you how to pick locks and it did come in handy.\n\nOnce ${nleader} was the undisputed head of the ${gang}, ${he} decided to do something unbelievable. Uniting the four gangs for an all out war against the Blue Bloods. Not even in his wildest dreams would Derek have imagined such a turn around of circumstances when he helped ${traitor} kill ${leader}. Needless to say, you did have something to do with it. Now the four gangs are a real threat to the ambitions of the Death Dealer. They have formed an alliance called the Apex.\n\n*page_break\n*set life +20\nYou are back in the clinic. Getting your wounds stitched by the beautiful Sophie Rutherton. \n\n\"Officer Luke told me to give you this.\" \n\nShe gives you an envelope.\n\n\"How did he know I would come to you?\"\n\n\"I don't know, he may have realised that a thug like you would always have a wound to stitch.\" chuckles Sophie. \n\n\"Well then doc, I must get going.\"\n\n\"So, you really are an undercover cop!\"\n\n\"Ah, atlast! Anyway doc, its time for me to leave.\"\n\n*if(respect > 70)\n \"Oh, ${name}.\"\n \n \"Yes.\"\n \n \"Would you like to have lunch with me on Tuesday?\"\n *set lover \"Sophie\"\n \n *choice\n  #Sure\n   *set love 1\n   *goto letter\n  #Sorry. But I have other plans. \n   *goto letter\n \n*else\n *goto letter\n\n \n*label letter\n*page_break\nYou open the envelope.\n\n\"MEET ME AT MIDNIGHT IN ST.MICHAEL'S CEMETERY ON PALM SUNDAY. URGENT!\" \n\nPalm Sunday. That's tomorrow. But why would Luke want to meet you in person? Should you go? Or is this a trap? A rendezvous in a graveyard may not be uncommon but still its strange. What could have made Luke take such a drastic step?\n*if(kill=0) \n *goto dec\n*else\n This might have something to do with Lily's death. Its better if you don't go.\n *goto palm\n\n*label dec\n*choice\n #Go to the spot.\n  *set luke 1\n  You decide to go anyway. If Luke wrote it then he must be pretty desperate. If its someone else then you can find out who it is.\n  *goto palm\n #Ignore the message.\n  Luke would never write such a message and give it to Sophie. That would be reckless and it puts Sophie at risk. No. This letter is a trap. Its better to ignore it.\n  *goto palm\n #Call Luke.\n  You call Luke but the phone is switched off.  \n  *goto dec\n \n*label palm\n*page_break\nIts Palm Sunday. One of the few days when the Church returns to its old glories. The Church is quite full. The Palm Leaf Procession begins. \n\nYou are in the procession when you hear your name being called. You look behind and see Rick Angels. He comes up beside you.\n\n\"Derek's got a proposition for you.\"\n\n\"What is it?\"\n\n\"Help him destroy the Apex and he will give you wealth beyond your wildest dreams.\" \n\n\"How much?\"\n\n\"More than you can imagine.\"\n\n\"I want a number.\"\n\n\"50 grand.\"\n\n\"That's 'wealth beyond your wildest dreams'?\"\n\n\"O.k. 1 million.\"\n\n\"2 million.\" \n\n\"That's too much!\"\n\n\"Take it or leave it.\"\n\n\"O.K. Two million.\"\n\n\"I will meet him under the Oslem Bridge at midnight on Monty Thursday.\"\n\n\"Why Monty Thursday?\"\n\n\"Is there a better day to betray your friends?\" you ask with an evil grin.\n\n*if(luke=1)\n *goto palm2\n*else\n *goto mon\n \n*label palm2\n*page_break\nIts midnight. You are in the cemetery but there is no sign of Luke.\n*choice\n #Wait for him.\n  *set grave 1\n  Maybe he is a bit late. You decide to wait for him. You spend your time reading the names on the tombstones. Suddenly someone puts a gun to your back.\n  \n  \"Don't move. Throw your gun away.\"\n  *goto grav1\n  \n #Leave.\n  You leave the grave. Surely, all this was Sophie's idea of a prank.\n  *goto mon\n #Be on the alert.\n  *set grave 1\n  You sense danger. Something is not right. Its silent as a grave. Then again its a grave but if you are not careful, this grave will become your grave. You keep your ear out for the slightest noise. And then you here the crackle of leaves behind you.\n  *goto grav2\n\n*label grav1\n*choice\n #Throw your gun away\n  You decide that its best to do as he says. After all, he won't miss a shot from this range. Besides if he wanted to kill you, you would have been dead by now. You throw the gun away and slowly turn around to take a look at the attacker.\n  *goto who1\n #Attack\n  You know that once you throw away that gun, you are completely at the mercy of the attacker. You decide to mount one last attack while you can. You go for your gun but before your hand reaches the gun, something blunt strikes the back of your head and you lose consciousness. When you finally wake up, you are tied to a tombstone. You look at the assailant.\n  *set life -10\n  *goto who1\n\n*label grav2\n*choice\n #Fire a shot\n  You turn and fire a shot. It misses the guy by a fraction. He fires. The gun falls out of your hand. \n  *set life -5\n  *goto who1\n #Draw your gun and warn the guy\n  You quickly draw your gun and get ready to fire. \n  \n  \"Its me, Klaw.\" you recognise the voice. Its Luke. \n\n  You lower the gun.\n  \n  \"Why did you try to sneak on me like that.\"\n\n  \"I couldn't see who it was in the dark.\"\n\n  \"Well, it was you who wanted me to come. Who else did you expect?\"\n  *goto who1\n  \n\n #Do nothing. Just wait. \n  You decide its just your imagination. You go on to read the names on the tombstone but suddenly someone puts a gun to your back.\n  \n  \"Don't move. Throw your gun away.\"\n  *goto grav1\n  \n*label who1  \n*set mil5 1\n*set mil +1\n\"I heard rumours, Klaw. I heard that you were responsible for the death of Lily.\" says Luke.\n  \n\"What? Lily is dead!\" \n\nYou can't take in the news. But you warned her! It doesn't make sense. Then suddenly you understand why the doctor testified that it was Lily who died. Because it was Lily who died! Oh God! What have you done?\n \n*if(bomb=1)\n \"CCTV footage shows you going to her house minutes before the explosion.\"\n\n \"I was there. I planted the bomb.But I warned her a day before the attack.She said she would discuss it with the Chief. I thought she escaped.\"\n\t\n \"Well, she didn't. Forensics confirmed that its her. If you warned her and you wanted to save her then why did you shoot her in the head?\"\n\t\n \"What?\"\n\t\n \"Lily didn't die of the blast. Someone put a bullet in her head before the explosion took place. It was cold blooded murder.\"\n *goto who\n*else\n \"CCTV footage shows you leaving the scene soon after the shooting.\"  \n   \n \"I was there. I shot her.But I warned her a day before the attack. I told her to wear a bulletproof vest. She said she would discuss it with the Chief. I thought she escaped.\"\n   \n \"Well, she is dead. She died in my arms. The vest she was wearing was defective.\"\n *goto who\n \n*label who\n\"You think I killed her?\"\n\t\n\"That was what I thought when I came here.\"\n\t\n\"You still think so?\"\n\t\n\"No. If you killed her, then I would be dead by now.\"\n\t\n\"Who do you think is behind it then?\"\n   \n\"I don't know but I will soon find out. How is the case going?\"\n\n\"Derek wants to cut me a deal.\"\n\n\"Good. I must go now.\"\n*goto mon \n\n\n*label mon\n*page_break\n\nIts Monday and you have an important decision to make. You have an important decision to make. Who are you going to side with? Derek or the Apex. If you decide to help Derek, you will gain his trust and also get a shot at him. But if you fail, the city will be in the Death Dealers grasp. No one will be able to stop Derek. If you side with the Apex, chances are that Derek will find another traitor and destroy the Apex. The way things are going on in the Apex, Derek won't have to do much. The leaders can't cooperate. If you are lucky, the Apex will remain united for a week. You think about it all day and finally come to a decision. So what do you decide?\n*choice\n #Betray the Apex\n  You decide that the Apex will never be able to beat the Blue Bloods. You will get a shot at Derek only if you make the apex a scapegoat.\n  *set apex 1\n  *goto tue\n #Betray Derek\n  You decide that its better to help Apex. Once Derek is killed, the Apex will split. The police can then take them out at their leisure.\n  *goto tue\n  \n*label tue\n*page_break\n*if(love=1)\n *goto din\n*else\n *if(lover=daughter)\n  *goto dau\n *else\n  *goto kat\n  \n*label dau\nIts Tuesday. You here a knock on the door. Its ${daughter}. She looks distraught.\n\n\"Can I come in, ${name}?\"\n\n\"Of course. ${daughter}, you look disturbed.\"\n\n\"I'm tired, ${name}. Tired of all this bloodshed. First my brother! Now my father! I don't think I can take it any longer. I want to leave all this. I want to lead a normal life.\"\n\nYou don't know what to say. Till yesterday she was a lioness. Strong and brave. Yet all of a sudden she has changed. You pull her close to you.\n\n*goto wed\n\n*label kat\nIts Tuesday. You know that your mission is coming to an end. Soon you will be able to return to a new life. You close your eyes. Suddenly the smiling face of Kate appears before you. You think about her for a moment. She left you but then again the fault is on your side. You should have told her the whole truth. How can you expect her to trust you when you didn't trust her? Maybe there is still time to make everything right. After all this is the season of forgiveness.\n*goto wed\n \n*label din\n*page_break\nTuesday finally arrives. Sophie has invited you to her place for lunch. You are excited. You decide to buy her some\n*fake_choice\n #Flowers\n #Choclates\n #A necklace\n\"Thank you, ${name}. You really shouldn't have.\"\n\n\"Its my pleasure.\"\n\nSophie invites you into her house. Its quite modest for a billionaire's daughter. Both of you are about to sit for lunch when the doorbell rings. She at once goes to see who it is. You pray that it is the postman or a delivery boy and that they would make a quick exit. But no such luck. Thomas Rutherton walks into the room. From Sophie's expression its clear that she was not expecting her dad.\n\n\"Ah, who have we here? Isn't it the undercover cop?\"\n\nYou are dumbstruck. Sophie told her dad about you! Ah, women! They can never keep a secret. Wonder who else knows about your secret. \n\n\"Hello, Mr. Rutherton.\" you say.\n\n\"Father, what are you doing here?\" asks Sophie nervously.\n\n\"Oh, c'mon. Can't a dad visit his sweetie pie?\"\n\n\"I will make a cup of tea for you, dad.\" says Sophie as retreats to the kitchen leaving you with her father.\n\nMr. Rutherton takes Sophie's seat.\n\n\"So, kid. Who are you?\" he asks in a threatening tone.\n\n\"You know me. I am ${name} Klaw. The cop who saved your daughter from that kidnapper.\"\n\n\"Cut the crap, kid. ${name} Klaw is dead. Its true you look like him but he is dead. I know that my daughter can't see that. She is madly in love with you. But I am her father and I am not going to let her fall for some street thug like you. You can fool her buy saying you are an undercover cop but I checked with a few officials in OCPD. They tell me there is no such mission. So, listen. Stay away from her. Or you will end up being food for the fish. Do you get me?\"\n\n*set mil6 1\n*set mil +1\nYou give a small nod. You know that he means every word that he says. This is not the respectable businessman Thomas Rutherton you are used to. This is someone else. Someone more ruthless. Someone who doesn't mind getting his hands dirty. You suddenly remember all those gossips you heard about him. It was said that Thomas Rutherton once had a partner. A man named Jonah Loew. Both were equal partners in Loew & Rutherton's. Then one day the whole Loew family was killed in a mysterious fire. But some say that Rutherton had a hand in it. No one knows for sure. \n\n*page_break\n\n\"Hey, you look like you have seen the devil.\"says Sophie.\n\nYou jump out of your thoughts. \n\n\"Where is your dad?\"\n\n\"Oh! Was he the devil? He said he didn't want to interrupt us, so he left.\"\n\n\"Why did you have to tell him that I was a cop?\"\n\n\"Did you really think he would let me have lunch with a thug? You do remember a man named Jacob Scarr, don't you? \"\n\n\"Oh, that's you two met. Over a date!\"\n\nShe burst into laughter and you join her.You have lunch and then talk about your interests and hobbies. As you leave, she gives you a kiss. You decide then and there that this is the woman you want to be your partner. Maybe this will be just another disaster but you are not going to give her up like a coward. You are going to finish this case and regain your honour. Then you will ask for her hand.\n*goto wed\n\n*label wed \n*if(apex=1)\n *goto thu\n*else\n *goto apex\n\n\n*label apex\n*page_break\nIts Wednesday.You meet ${nleader} and tell ${him} about your plan to finish the Death Dealer once and for all. ${He} is quite pleased with your plan and calls a secret meeting of the gang leaders. You tell them your idea and they agree to meet at ${card} on Good Saturday. \n*goto thu\n\n*label thu\n*page_break\nIts Monty Thursday. You meet Derek Jones at the appointed place. \n\n\"So, what have you decided?\"\n\n\"The Apex will meet at ${card} on Good Saturday at 9 p.m. The place will be guarded but if you strike then you can take them all out with one blow. I just hope you have enough manpower to get the job done. Otherwise the gangs will hunt you down.\"\n\n\"You don't have to worry about that, Klaw.\"\n\n\"And my money?\"\n\n\"You will get it once the job is done.\"\n\n\"Then I better get going.\"\n\n*goto fri\n\n*label fri\n*page_break\nGood Friday began with a bad news. \n\n\"TOP COP KILLED IN CAR ACCIDENT!\"\n\nThat was the headlines that greeted you. Officer Luke was killed in a car accident as he returned from Chief Goldman's house. The car lost its brakes and went over a cliff. The first thought that comes to your mind is that\n*choice \n #The road to Chief's hilltop bungalow is really dangerous.\n  You have been to Chief's bungalow. The road has many steep turns and once it begins to rain it is very slippery. The downhill drive is especially dangerous during the night time when visibility is quite poor due to fog. Besides you knew Luke. He was always a rash driver. More than once he had almost got himself killed with his reckless driving. Somehow you knew that this was the way he would end up.\n  *goto tom  \n #Luke was on to something.\n  *if(grave=1) \n   When Luke went left the cemetery, he was onto someone. He seemed to know who was responsible for Lily's death. \n   *goto luke1\n  *else\n   What was it that Luke wanted to tell you? You regret your decision to ignore Luke's message.\n   *goto tom\n*label luke1\n*if(kill=0)\n *goto chief\n*else\n *goto tom\n*label chief\nCould it have been the Chief?\n*choice\n #Yes\n  Now it suddenly hits you and the truth is hard to digest. It was the Chief all along. Who else knew of the Lone Wolf? Who else knew that you would kill Lily? Luke went to Chief's house to interrogate him. When he learned that Luke knew too much he silenced him. Now only you know the truth. But who will believe you now? The only person left who knows about this mission is Felix. You can't afford to lose him.\n  *set felix 1\n  *goto tom\n #No\n  Of course not! You have known him your whole life. Chief would never do such a thing. He would never kill a cop. Luke may have gone to the Chief to air his suspicions. Somehow the killer got the wind of things and put an end to Luke.\n  *goto tom\n\n*label tom\nYou are about to  put the newspaper back on the table when Tommy stops takes the paper from you. He looks closely at the photo of Luke. Its a file photo of him receiving a medal.\n\n\"I know this guy.\"he tells you. \"He was there that night.\"\n\n\"Which night?\"\n\n\"The night they slaughtered the Morgans. He was there with Derek Jones.\"\n\n*page_break\n\nLuke! Luke Harrison! He was working for the Death Dealer! You never saw that coming. Luke was known for his efforts to destroy the Blue Bloods. He had captured many of their top men. He had stopped many of their crimes. And then you realised the truth. All that was a mere sham. Derek was planting his mole in the force. The purpose of this whole operation was not to capture Derek. It was to get Rick Angels out of prison. By convincing the Chief that it was a plan to get you out of prison, he let the force standby as Rick escaped. What a plan.\n\n\"Then its good that he is dead!\" you remark.\n\n\"What do you mean? Isn't it the other guy who is dead?\"\n\n\"No its Officer Luke who is dead. The guy receiving the medal.\"\n\n\"I was talking about the guy who is giving the medal.\"\n\nYou blood freezes in your veins. You know him well. The officer who is giving the medal is none other than Chief Felix Goldman.  \n*if(felix=0)\n Now it suddenly hits you and the truth is hard to digest. It was the Chief all along. Who else knew of the Lone Wolf? Who else knew that you would kill Lily? Luke went to Chief's house to interrogate him. When he learned that Luke knew too much he silenced him. Now only you know the truth. But who will believe you now? The only person left who knows about this mission is Felix. You can't afford to lose him.\n *set felix 1\n *goto sat\n*else\n That confirms your doubts. The man you thought of as a father has put this cross on you. He has left you to die to save Derek Jones. You wonder why? Why would Felix do this? What wrong have you done to him? Why punish you like this? Its not like Derek is going to change. His soul is beyond saving. The Chief's treachery breaks your heart.\n *goto sat\n\n*label sat\n*page_break\nGood Saturday arrives. The day that decides your future or whether you will have a future. You meet Derek at the appointed place. On the roof of a building overlooking ${card}. Derek has got all his men in the adjacent buildings.\n\n\"When will the bosses arrive?\" Derek asks impatiently.\n\n\"In about five minutes. Where is my money?\"\n\nRick opens the briefcase he is holding. A smile spreads on your face. \n\nSoon the bosses arrive one by one accompanied by their gang members. Once they enter the building Derek gives his men the signal. In a minute, the building is surrounded.\n\n\"I want the leaders alive. Kill the rest.\" cries Derek.\n\nThe Blue Bloods open fire.\n\n*if(apex=1) \n There is heavy gun fire from within but the Blue Bloods have the element of surprise. The guards didn't stand a chance but the ones inside put up a better defence. Slowly but steadily the Blue Bloods make their advance. After an hour's fight, the guns fall silent. Rick gets a call.\n \n \"The area is secure. We have captured the leaders alive.\" he tells Derek.\n \n \"Good. Well done, Klaw. Take your money. There is three million.\"\n \n \"Three?\"\n \n \"Rutherton offered me a million for your head.\"\n \n Rutherton? You are a bit surprised. Maybe you got a bit too close to his daughter. But you can worry about that later. You have more serious issues at hand.\n \n \"So are you going to kill me now?\"\n \n \"If I wanted to kill you, then you would be dead already. Besides I wouldn't even bother to offer you the two million, let alone three.\"\n \n You look at your options. Derek's kept his part of the bargain. You can leave with the money. Leave all this behind and start a new life. Or you can finish your mission. You are unarmed. There are four of them. Derek, Rick and two thugs. All armed with revolvers. But there is something they don't know. Tommy Slane has his rifle trained on them. He is just waiting for your signal. Or you can simply wait and see what happens.\n \n *choice\n  #Give the signal\n   *goto signal\n  #Wait and see what happens\n   *goto wait\n  #Walk away with the money\n   *page_break\n   Right now you have three million in your hand. That is more than enough to start a new life in a new city. Good Saturday. The day of New Fire and New Water. What better day to start a new life? You take the money and leave. Just as you reach the road, you here a gun shot. Tommy. He must have been the Lone Wolf. Its none of your business. The Blue Bloods no longer have a leader. Without a leader to control them, they will lay waste to the city. But that is none of your business. Old Camp will burn. Innocent lives will be lost. For a moment, you think of ${lover}. Then your grip on the suitcase tightens. You walk away. \n   *goto credits\n*else\n There is heavy gun fire from within but the Blue Bloods have the element of surprise. The guards didn't stand a chance but the ones inside put up a better defence. Slowly but steadily the Blue Bloods make their advance. After an hour's fight, the guns fall silent. Rick gets a call.\n \n \"The area is secure. But the leaders are missing.\" says Rick.\n \n The leaders escaped through a secret tunnel within the building. You decide its time to act. You look at your options. You are unarmed. There are four of them. Derek, Rick and two thugs. All armed with revolvers. But there is something they don't know. Tommy Slane has his rifle trained on them. He is just waiting for your signal. You take out your phone and press the button. A huge explosion rocks the place. ${card} lies in ruin. The nearby buildings are burning. The Blue Bloods wiped out at the press of a button. Before anyone can react, Tommy guns down the two thugs. Derek fires at you.\n *set life -10\n You pick the gun of one of the dead thugs and fire back at him. He goes down with a cry. His shoulder bone is broken. Rick aims at you but Tommy's shot hits him on the head.\n \n \n *choice\n  #Kill Derek\n   \"Adios, Amigo!\"\n  \n   You put a bullet in his head.\n   *goto easter\n  #Arrest Derek\n   \"Justice will take its course.\" you say as you tie him up.\n   *goto easter\n  \n \n \n \n \n\n*label wait\n*page_break\n\n\"Then why are you offering it to me?\"\n \n\"It so happened that I had a personal score to settle with Mr. Rutherton. I'm giving you the money because you just delivered to me the man I wanted to kill all my life. Truth was that I didn't know it till yesterday. When Rutherton came to me with the job, I was more than willing to agree. You know, I like to tie up loose ends. Nothing personal.\"\n\nYou gulp. Never ever make a pact with the devil!\n\n\"But all that is a matter of the past, ${name}. Now if anyone even dares to pluck a hair from your head, I will personally ensure that he will regret the act for the rest of his life.\"\n\n\"I better warn my hair stylist.\" \n\nDerek chuckles.\n\n\"So who should I thank for this sudden turnaround?\"\n\n\"Scotch.\"\n\n\"Scotch?\"\n\n\"A glass of fine scotch. It so happened that after the deal I offered my illustrious client a small drink. The things that wine do to a man! The old man was recounting his daring acts when he let slip a tiny secret. This is my night, Klaw. The night I complete my revenge.\"\n\n\"Revenge?\"\n\n\"Oh! You think I am a cold blooded killer, don't you?\"\n\n*fake_choice\n #\"Yes.\"\n #\"No.\"\n #You remain silent\n*page_break\n\n\"Never mind. Everyone sees me as the devil. The Death Dealer. That's what they call me. That's what I have become. Obviously, I am the villain of this story. But did anyone care to think what made me into this hideous monster?\" \n\nYou shake your head.\n\n*set mil7 1\n*set mil +1\n\n\"You know me as Derek Jones, the criminal. I had a life before that, ${name}. I was Derwin Jonas. Derwin Jonas Loew. Son of the richest man in Old Camp. Mine was one happy family. Then the Wolves came. And in one moment my world was turned upside down. I still remember that night. The night Clive Morgan and his Wolves tore apart my family. They tortured my parents right before my eyes. I was a child then. I didn't realise why the Wolves did it. I never gave it a thought. All I knew was that the Morgans killed my family and burned down our mansion. All I wanted was to see the Wolves pay!\"\n\n\"How did you escape?\"\n\n\"It was during the festive season. I had invited a friend of mine for a sleepover. They killed him thinking it was me.\"\n\n\"Why did you not go to the police?\"\n\n\"Do you really think that a child, who had just witnessed the cruel fate of his parents, would be in a mental state to walk into the police station and tell his story? I was afraid. Afraid of men. For months, I hid in the slums. Living on the mercy of strangers. Then I met Rick and he taught me the ways of the street. But all the time I had only one thought in my heart. Revenge! I waited. I waited for ten years. Finally I got my chance. Mat Morgan invited me to his gang. Then as fate would have it, an ambitious officer decided to cut a deal with me. I played my part well and got my sweet revenge.\"\n\nAn ambitious officer! Chief Goldman! Now it all fit in! But Derek hadn't finished his tale.\n\n\"Or so I thought, till yesterday. Yesterday, Rutherton opened my eyes. Revenge had blinded me. I was baffled. Why did I never think about Morgan's motive? After all, every murder is solved by finding the motive. It was with horror that I heard Rutherton narrate his own rags to riches tale. How he started of as a mere manager in my father's company and then worked his way up to become partner and finally sole owner of Loew & Rutherton's by butchering my family. You should have heard him narrate it. He said he gave my father a choice. Either sign over his whole wealth to him or see his family tortured to death. Rutherton was a man of his word. Once he got what he wanted he didn't torture them to death. He merely shot them in the head.\"\n\nWas that a tear in his eyes?\n\n\"But today! Today I will have my revenge and no one will stop me.\"\n\n\"What about the Lone Wolf?\" you ask.\n\n\"That's just an urban myth. There is no Lone Wolf. Even if there is, he cannot escape death.\" \n \n*choice\n #Give the signal.\n  *goto signal\n #Let Derek go.\n  *goto sig\n  \n*label sig\n*page_break\nYou think Derek is justified in his actions. Maybe you would have done the same thing, if you were in his place. Right now you have three million in your hand. That is more than enough to start a new life in a new city. Good Saturday. The day of New Fire and New Water. What better day to start a new life? You take the money and leave. Just as you reach the road, you here a gun shot. Tommy. He must have been the Lone Wolf. Its none of your business. The Blue Bloods no longer have a leader. Without a leader to control them, they will lay waste to the city. But that is none of your business. Old Camp will burn. Innocent lives will be lost. For a moment, you think of ${lover}. Then your grip on the suitcase tightens. You walk away. \n*goto credits\n\n*label signal\nYou decide its time to give the signal. You take out your phone and press the button. A huge explosion rocks the place. ${card} lies in ruin. The nearby buildings are burning. The Blue Bloods wiped out at the press of a button. Before anyone can react, Tommy guns down the two thugs. Derek fire at you.\n*set life -10\nYou pick the gun of one of the dead thugs and fire back at him. He goes down with a cry. His shoulder bone is broken. Rick aims at you but Tommy's shot hits him on the head.\n\n\"Where is Rutherton?\" you ask Derek.\n\n\"He is in that burning building.\"\n\n*choice\n #Kill Derek\n  \"Adios, Amigo!\"\n  \n  You put a bullet in his head.\n  *goto ruth  \n #Arrest Derek\n  \"Justice will take its course.\" you say as you tie him up.\n  *goto ruth \n  \n*label ruth\n*page_break\nNow the next dilemma awaits you. Do you save Rutherton? He is a cold blooded killer. But then he is Sophie's father. \n*choice\n #Let him pay for his sins.\n  The guy wanted to kill you. You have no reason to save him. Besides with him out of the way...You grin.\n  *goto easter\n #Save him.\n  How can you let him die? He is Sophie's father. You know you won't be able to look her in the eye if you let him die.  The man may have done many wrong deeds but he will be punished according to the law. You run to the burning building.\n  *goto fire\n  \n*label fire\n*page_break\nYou are about to enter when someone shoots you from behind. The bullet breezes past you. You turn around to see Tommy Slane pointing a gun at you. Suddenly the legend of the Lone Wolf comes to your mind. Who is the only White Wolf you have ever met? Who is the guy who told you about the Lone Wolf. Who was the first to shoot Derek? Is Tommy going to rebuild the White Wolves?\n*choice\n #Shoot Tommy\n  You fire a shot. Blood sprouts out of Tommy's chest. He looks surprised. Then he falls to the ground. You turn around but before you can enter the building, an explosion takes place inside the building and the whole building comes crashing down. Did Tommy just accidentally save your life? You wonder.\n  *goto easter\n #Try to save Rutherton\n  You turn around to save Rutherton. Tommy fires a shot it hits you on the leg. \n  *set life -10\n  You watch as an explosion takes place inside the building and the whole building comes crashing down before you. Tommy slowly comes towards you, gun in his hand. He places the gun on your head.\n  \n  \"What were you thinking when you wanted to go in there?\" asks Tommy.\n  \n  You don't know. You realise that Tommy just saved your life.\n  *goto easter\n #Do nothing\n  You stand still. \n  \n  \"What are you doing, Tommy?\"\n  \n  Before he can answer an explosion takes place inside the building and the building comes crashing down. You realise that Tommy just saved your life. Had you gone in, you would be dead by now.\n  *goto easter\n  \n*label easter\n*page_break\nAnother Easter Sunday has arrived. You remember your Easters. Most of them had been spent in this house. Those were the happiest moments of your life. Yet here you are, in this very house, to hurt the man who once brought you joy. Chief Felix Goldman switches on the light. \n\n\"Klaw!\"\n\n\"Surprised to see me, Chief?\"\n\n\"Not at all. Come in. What brings you here at such an early hour? Its only three in the morning.\"\n\n\"I want to know what you have to do with Derek Jones.\"\n\n\"Nothing. He is a criminal. I am a cop. That's the only relation we have.\"\n\nYou know he is lying. A bead of sweat flows down his forehead. He is nervous.\n\n\"What do you know about the White Wolves?\"\n\n\"They were the most dangerous gang in Old Camp before Derek wiped them out. Why are you asking these questions?\"\n\n\"Why did you hate the White Wolves so much?\"\n\n\"Who told you that?\" \n\nFelix was alert now. He sensed danger. He took a step backwards.\n\n\"Why did you kill the Morgans?\"\n\n\"I did not! It was Derwin!\"\n\n\"Derwin?\"\n \n\"I-I..\"\n\n\"You knew who Derek was! You helped him take his revenge. Don't tell me you helped a cold blooded killer kill innocents just to make sure you got a promotion.\"\n\n\"What do you know, Klaw? What do you know about my suffering? Do you think it was all about career advancement? No. It was about revenge. My son was Derwin's friend. They killed him. The Morgans. The night they eliminated Loews. They made it appear as if it was a fire. But I knew. Yet I was helpless.\"         \n\n\"The kid who went for the sleepover!\"\n\n\"Yes, my poor Samson. He was the only one in the world I had to call my own after Judith's death. I loved him. They took him away. I wanted revenge but I couldn't touch the Morgans. They were two powerful. I waited. Waited for my opportunity. Then I met Derek. I knew at once who he was. He was the spitting image of his father. We decided to take our revenge together. We butchered their family, just like they did ours. But I realised that it wouldn't bring back the dead. When my vengeance was satiated, I found that I had become a monster. The dead bodies haunted me. I decided to atone for my sins. I tried. Yes, I tried. But Derek, he had other plans. He blackmailed me. Said he would reveal my secrets if I betrayed him. I had no choice, Klaw.\"\n\nYou know that he has goodness left in him but that does not atone for his crimes. He killed Luke. \n*if(kill=0)\n He killed Lily\n *goto gold\n*else\n *goto gold\n \n*label gold\nHe left you out there to die. He made you a scapegoat. Does he deserve to live? Luke had a family too. On the other hand, he is the reason you stand here now. He is the reason you are a cop. Should you bite the hand that fed you? Besides he is the only one who knows that you are an undercover cop. If you kill him, you will forever be a gangster. The gun is in your hand. The choice is yours.\n*choice\n #Kill him\n  You shoot him in the head. You have lost faith in justice. There is no reason to go back to leading a normal life. There is no one waiting for you. This is where you belong. This city will know your name. This city will learn to respect. This city will fear your name.\n  \n  Till yesterday, you were a honest cop. You may have done some unpleasant things but you knew that you were doing it for the right cause. You had the determination to bring the Death Dealer to justice. You dreamt of the day when you would capture Derek Jones red handed and punish him for his crimes. But today's events have changed your perspective. Your dreams lay shattered and you have been rudely awaken to the harsh realities of the world. To survive among wolves, you must first become one of them. You live in a world of treachery and double crossing. There is only one rule : There are no rules. Survival is the sole goal. And you have learned your lesson.\n  *goto credits  \n #Arrest him\n  You decide to arrest him. But before you can do so, a shot is fired. Goldman collapses to the ground. You rush to his side. The bullet pierced through his heart.\n  \n  \"He deserves to die.\"\n  \n  You look behind you. A person is standing out on the porch. The killer's face is covered by a hood. He/she is holding a gun. It is now aimed at you. You think you know who it is. You call the killer.\n  *goto over\n  \n*label over\n*page_break\n*input_text wolf\n*if(wolf=\"LUKE\")\n *set mil8 1\n *set mil +1\n The killer removes the hood, revealing the face of Luke Harrison. \n \n \"You are supposed to be dead!\"\n \n \"Today is Easter. Don't you believe in Resurrection?\" he says with a grin. \"How did you know it was me?\"\n \n \"Operation Lone Wolf. What were the chances that an operation to kill the Death Dealer be so appropriately named? My first suspicion was the Chief. But since Felix couldn't have shot himself from that range it ought to have been you. Blame it on Hollywood but I don't believe in dead men until I see their bodies.\" \n \n Luke seems to be impressed but there was still one thing you didn't understand.\n \n \"Why? Why did you do all this?\" I ask.\n \n \"Morgans don't forgive.\"\n \n \"So the Lone Wolf legend is true!\"\n \n \"My name was George Morgan. On taking my vows I changed my name to Fr. Luke. When I heard that my family had been mercilessly butchered, I decided to set aside my priestly vows. I left the Church and joined the force. Then I met one of my father's men. He told me that Felix Goldman had a role to play in the murder.\"\n\n \"Tommy Slane!\n\n \"Yes. Did you think it was a mere coincidence that he was your cell mate? I put him there to keep an eye on you.\" \n \n \"I planned this whole mission, ${name}. I made you my tool. You thought you were making all the decisions. But you were merely dancing to my tune. You were my cover. Remember the Great Escape? It was my master stroke. You see there was one person whose identity I did not know. The cop who made the deal with Derek. It was classified information which even I couldn't access. Evidently the Department wanted it all hushed up. Since I couldn't ask the Chief, I asked the only other witness, Derek.\"\n \n \"And he told you?\"\n \n \"That's were you came in. Rick Angels was my bargaining chip. I made a deal with Derek. Freedom for Rick in exchange of classified information. While getting the nod of Derek was the easy part, I needed to convince Chief to let Angels escape. So I came up with this crazy plan. You were the perfect cover. A scapegoat. Truth be told I never expected you to get this far.\"\n\n \"Why kill Lily? Did she find out your plans?\"\n\n \"No. I found out her past. Her ambition killed her. She was the one who decided to make the deal with Derek. She started the Dark Wars. \n *goto over1\n*else\n The killer shoots the tyre of your car and escapes in a motorbike. You are left there wondering who it was. Was it the Lone Wolf? Is the legend true? You will never know. But right now, you have more pressing matters at hand. The Chief is dead and your car is parked in front of the house. The police may arrive any moment now.   \n *goto path\n \n*label path\n*choice\n #Go back to the gangs.\n  You decide to face the harsh reality. You are a gangster now. There is no way the police will believe your tale of a mystery assassin. You are trapped in this life for ever. Better make the best of it then. You decide to go back to the ${gang}. Maybe this was your destiny. To be known as the Cop Killer. \n  *goto_scene finish\n #Run away from this life\n  You are tired of it all. All this time you worked undercover to bring the most dreaded criminal in Old Camp to justice, only to find yourself take his place. Tomorrow all the cops in the city will be on your tail. Your best chance of survival is in fleeing this city. You still have the money in the trunk of the car. Maybe you can escape and start a new life far away from this wretched city.\n  *goto_scene finish\n #Look for some proof\n  The mystery man has fled the seen leaving with a dead cop. No one is going to believe the truth. So you better find some proof of your innocence before the police arrive. You glance around the room. There is a camera which may prove that you didn't kill the Chief. But that won't be very helpful given the fact that you are a convicted criminal who is supposed to be dead. Not the best circumstance for a man standing on the crime scene.\n  *goto computer\n #Surrender\n  You decide that the best option would be to surrender. If you are lucky they will cut a deal with you. Maybe you can trade information about the gangs. The cops maybe willing to offer witness protection. Who knows? Maybe you can even start a new life.\n  *goto_scene finish\n\n*label computer\n*line_break\nThat's when you notice Chief's laptop. Maybe you will find something there. You switch on the lap. Shit! There is a password! You take the hint. It is \"Hair\".\n*set try 0\n*goto try\n\n*label lock\n*if (try=1)\n Wrong guess. A warning appears. You have too more chances. If you don't get it right, the lap will self destruct.\n *goto try\n*else\n *if(try=2)\n  You can hear the sirens approaching. You have to do this fast.\n  *goto try\n *else\n  *if(try=3)\n   Last chance.\n   *goto try\n  *else\n   *if(try=4)\n    The lap self destructs. The police arrive in the scene and you are caught red handed. You should have escaped while you still had the chance.\n    *goto_scene finish\n\n  \n*label try\n*input_text answer\n*if answer= \"SAMSON\"\n *goto free\n*else\n  *set try +1 \n  *goto lock\n   \n*label free\nThe password is correct. You find a folder called Lone Wolf. With its help, you are able to prove your innocence. You return to the force once again. \n  \nLuke Harrison disappears into thin air, not to be heard of again. As far as the world is concerned he is dead. And you decide to leave it at that. \n  \nFelix was given a ceremonial burial. You never reveal the truth about him. True, he may have been responsible for the slaughter of the Morgans but still he had already paid for it. Maybe you still have a soft spot for him or maybe its because it will look bad on the force.  \n  \nThe Blue Bloods disband after the fall of their leaders. The Apex follow suit because of internal squabbling. Law and order is once again restored in Old Camp. And everything seems to be going well but little did you know that you had just set a ball in motion which would have catastrophic effects.\n\nTHE END  \n*goto credits\n\n\n\n\n    \n*label over1 \n*if(kill=0) \n She came to me when you told her about the attempt to kill her. Killing her was so easy.\n *goto over3\n*else\n  *goto deal\n  \n*label over3  \n*if(bomb=1)  \n All I had to do was shoot her in her own house. \n *goto deal\n*else\n All I had to do was give her a faulty bulletproof vest.\n *goto deal\n \n*label deal\nYou ensured that she was dead.\"\n\n\"So, are you going to shoot me now?\"\n\n\"Why should I? You have done me no wrong. I would like to make a deal with you.\"\n\n\"I am listening.\"\n\n\"If you keep your mouth shut, I will give you the files which prove your innocence.\"\n\n\"Or?\"\n\n\"Or I will just kill you now. You choose!\"\n\n\n\n*choice\n #Shoot him.\n  *if(sharp=1) and (strength>30)\n   You shoot him in the head. You have lost faith in justice. There is no reason to go back to leading a normal life. There is no one waiting for you. This is where you belong. This city will know your name. This city will learn to respect you. \n   \n   With a heart set in stone, you walk out of the house. Two officers lay dead behind you. One of them supposedly died yesterday. But you don't care. Your eyes are set on the road that lies ahead. There is a city before you and you will become its uncrowned king. \n  \n   Till yesterday, you were a honest cop. You may have done some unpleasant things but you knew that you were doing it for the right cause. You had the determination to bring the Death Dealer to justice. But today's events have changed your perspective of things. No one cares about justice any more. Everyone are after their own selfish goals.\n   \n   You have been rudely awaken to the harsh realities of the world. To survive among wolves, you must first become one of them. You live in a world of treachery and double crossing. There is only one rule : There are no rules. Survival is the sole goal. And you have learned your lesson. \n   \n   \n   THE END\n   \n   *goto credits\n  *else\n   You miss.\n   \n   \"Wrong choice, ${name}\"\n   \n   He puts a bullet in your head.\n   \n   GAME OVER\n   *goto_scene finish\n   \n  \n #Agree to the offer. \n  You think about ${lover}. If you want to marry her and lead a normal life, you must clear your name first. You agree to his offer. He gives you the files. With its help, you are able to prove your innocence. You return to the force once again. \n  \n  Luke Harrison disappears into thin air, not to be heard of again. As far as the world is concerned he is dead. And you decide to leave it at that. \n  \n  Felix was given a ceremonial burial. You never reveal the truth about him. True, he may have been responsible for the slaughter of the Morgans but still he had already paid for it. Maybe you still have a soft spot for him or maybe its because it will look bad on the force.  \n  \n  The Blue Bloods disband after the fall of their leaders. The Apex follow suit because of internal squabbling. Law and order is once again restored in Old Camp. And everything seems to be going well but little did you know that you had just set a ball in motion which would have catastrophic effects.\n\n  THE END  \n  *goto credits\n\n*label credits\n*line_break\n\nStory by Amith Shaju\n\nSpecial thanks to Choice of Games and Hosted Games.\nSincere thanks to Jason Stevan Hill for his whole-hearted support.\nSincere thanks to all my mates on the COG forums for their valuable advice. \n\n*page_break\nWe hope you've enjoyed playing [i]The Gangs of Old Camp[/i]. We release new games on a regular basis.\n*subscribe\n*page_break\n\n*goto_scene finish\n\n \n  \n  \n", "daughter": "\n*page_break \nYou rush to ${daughter}'s side. \n\n\"We must get out of here immediately.\"\n\n\"Who were those men?\"\n\n\"They are Derek's men and more will be coming. We must escape from here fast or else we die.\"\n\n\"We can't abandon ${traitor}. He is still in there.\"\n\n\"Didn't you begin your attack on his signal?\"\n\n\"Yes.\"\n\n\"Look. The guards in the building are dead. Still there is no sign of him. I saw five men going to the back of the factory to attack them. Our whole plan has been compromised. The only thing we can do right now, is save ourselves.\"\n\n\"I won't let ${traitor}'s death go in vain. Pull back, men. We are going to burn this factory down. ${name}, open the crates.\"\n\nShe had just given the orders when shots are fired at you from the other side of the factory.\n*choice\n #Open the crates\n  *set respect +5\n  *set crates 1\n  You follow the order even though you are under fire. But what you see leaves you stunned. Its filled with toys! The crates are filled with toys. There are no weapons here. The whole thing was a trap. We had been set up. Set up by someone of our own. A bullet hisses past your ears. You make a run for it. You slip and hit your head on a crate. Blood flows down your forehead.\n  *set life -10\n  *if life\u003c1\n   *goto killed\n  *else\n   But there is no time to think of pain. You get up and run as fast as your legs can carry you. ${daughter} and the rest of the gang is waiting for you in the car. You narrowly miss another bullet. You dive into the car and make good your escape.\n   *goto betrayal\n  \n #Pull her out of the factory\n  *set intelligence +5\n  *set crates 0\n  \"Don't you see, ${daughter}? The whole things a set up. There is a traitor among our ranks. We must find him first and we must warn your father. So lets get out of here while we still can.\"\n  *line_break\n  She sees sense at last and you make your retreat.\n  *goto betrayal\n\n*label betrayal\n*page_break \n${leader} looked at the men who had returned. \n\n\"Eleven men left for the mission. Only four returned. One of my best men died today. We were supposed to attack but instead we were the ones who were attacked. It can mean only one thing. Betrayal. ${daughter}, collect all their mobile phones. Find out who they have been contacting. Edward, check their rooms thoroughly. I want to know who is behind this treachery.\"\n*goto check\n\n*label check\n*if(mobile=1)\n ${daughter} collects all the phones. She checks the contact lists. While searching your phone, she pauses, then glares at you. She whispers something into her father's ears and clearly ${leader} is not impressed.\n\n \"Care to explain this?\" he asks you.\n\n You immediately realise your mistake. You have saved Officer Harrison's number and there have been a few exchanges between you.\n\n \"I...I can explain.\"\n\n \"I don't want to here your explanations, you rascal. Take him to the cellar, ${daughter}. We will give him a proper death.\"\n *goto cellar\n\n*else\n ${daughter} collects all the phones. She checks the contact lists. But there is nothing.\n *goto talk\n \n*label talk\n\n*choice\n #Remain silent\n  *goto_scene chap7\n #Air your suspcions\n  *page_break \n  You decide the time to air your suspicions has arrived. \n\n  \"What if the traitor is not here?\"\n\n  \"What do you mean, Klaw?\"\n\n  \"What if the traitor was in the group that ${traitor} lead?\"\n\n  \"What are you implying?\"\n  \"These men standing before you, fought bravely. The reason we survived was because there were no traitors amongst us. Think about all this from the beginning. Who was it who suggested we attack the factory? ${traitor}. Who was it who told that there were only ten men guarding the facility? ${traitor}. Why couldn't it be he who betrayed us?\"\n\n  \"Do you have any proof?\"\n\n  *if (crates=1)\n   \"Yes, I do. I opened one of the crates marked explosives. All that was in it was toys. There was no weapons cache in that factory. I believe that it was Derek's ploy all along. He is going to start a gang war.\"\n\n   That created a buzz in the room. ${leader} was perturbed. At last he spoke.\n\n   \"If what you say is true, then we must be prepared. Edward, sent word to the Council members. We must discuss this immediately. ${daughter}, take Klaw to the clinic.\n   *goto_scene chap7\n  *else\n   \"No, I don't.\"\n\n   \"Then shut your mouth. I knew ${traitor} since he was a child. He will not betray us. Take this slanderer to the cellar. See that he is punished.\"\n   *goto cellar\n   \n*label cellar\n*page_break \nYou are in a dark room. Your hands are tied. Edward stands before you.\n\n\"Listen, Edward you are making a big mistake. I am not the traitor.\"\n\nEdward replies with a punch on your stomach. You cry out in pain. But your cry is cut short by a jab at your face. You don't remember how long he tortured you.\n*set life -30\n*if life\u003c1\n *goto killed\n*else\n After taking a few blows on the head, you lose consciousness. Then you were rudely awaken by a pale of cold water. You opened your eyes. One eye was a bit swollen. You could make out barely make out Edward's face.\n *line_break\n *goto edward\n \n*label edward \n*choice\n #Beg for mercy\n  *page_break \n  \"Edward, please believe me. I am no traitor.\"\n\n  Your plea is met with a laugh.\n\n  \"I believe you, Klaw. You are no traitor. I am.\"\n\n  A gunshot is heard, followed by that maniacal laughter. Your shirt is soaked in blood. To your horror you realise that its not your blood. Before you lies the lifeless body of Edward. Over it stands, ${traitor} with a gun in his hand.\n\n  \"You know, Klaw, I came here to save you. I thought you were a strong man. It seems I was mistaken. So I am gonna leave you here to rot.\"\n\n  \"You will never get away with this treachery, ${traitor}. ${leader} will hunt you down when he hears this.\"\n\n  \"About that, Klaw. I don't think he will be hearing anything from now on. I sent him on a long journey.\"\n\n  An evil smile unfurled on his evil face. You knew the implications. The ${gang} has fallen. Derek is taking over the whole city. You watch ${traitor} leave the room. Patterson has to be warned. If Derek is not stopped before he takes over all the gangs, then the city will fall into a reign of terror. You must escape at any cost.\n  *goto_scene chap6\n  \n #Ask whether that's all he has got.  \n  \"Is that all you got, Gentle Hands?\"\n\n  \"Well said, Klaw. I always knew you were a tough guy. That's why I came for you.\"\n\n  You sigh. All this was a test. ${leader} was just testing your courage. Of course you had heard of such things being done in spy agencies all over the world. You just didn't expect it to happen here. Anyway, all is well. Or so you think. For at that very moment, a gunshot is heard.  Your shirt is soaked in blood. To your horror you realise that its not your blood. Before you lies the lifeless body of Edward. Over it stands, ${traitor} with a gun in his hand.\n\n  \"You know, Klaw, I always knew you were a tough guy. So, I am giving you a choice. The days of the ${gang} is over. The reign of the Blue Bloods will soon begin. Its time you made a choice. Do you choose life or death?\"\n  *goto decision\n\n*label decision\n*choice\n #Life\n  \"I will join you.\"\n\n  \"Good. That's what I thought. Come with me.\"\n  *set nleader traitor\n  *set tlife life\n  *set tres respect\n  *set tint intelligence\n  *set tstr strength\n  *set tmil mil\n  *goto_scene clinic  \n #Death \n  *set mil3 1\n  *set mil +1\n  \"I will never join a traitor like you. Just go ahead and kill me.\"\n\n  \"Well, as you wish.\"\n\n  ${traitor} takes out his gun and places it on your head.\"\n\n  Then he laughs.\n\n  \"No easy way out for you. You will rot here, die of hunger. That is what you deserve.\"\n  *goto_scene chap6  \n  \n*label killed\nYou feel the life force ebb out of you. You make a final attempt to get up but you succumb to your injuries. The pain is unbearable. As you lay there waiting for the hands of Death to wrap around you, you wonder whether it was worth it. What did you achieve by sacrificing a promising career and a loving wife? You wonder how life would have turned out if you had declined this mission.  \nGAME OVER\n*goto_scene finish\n  \n  ", "ending": "*page_break End\nWe hope you've enjoyed playing [i]The Gangs of Old Camp.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "finish": "*label top\n*page_break\n\n*choice\n #Last Checkpoint\n  *if(checkpoint=2)\n   *goto_scene clinic\n  *else\n   *if(checkpoint=1)\n    *goto_scene chap2\n   *else\n    *goto_scene startup\n #Finish\n  *goto_scene ending\n #Show incomplete milestones\n  *goto miles\n\n*label miles\nINCOMPLETE MILESTONES\n*line_break\n-----------------------------------\n*if (mil1=0)\n *line_break\n THE DARK WARS \n*if(mil2=0)\n *line_break\n THE LONE WOLF LEGEND\n*if(mil3=0)\n *line_break\n BRAVE IN THE FACE OF DEATH\n*if(mil4=0)\n *line_break\n ROMEO\n*if(mil5=0)\n *line_break\n A GRAVE TALE\n*if (mil6=0)\n *line_break\n DOUBTING THOMAS\n*if(mil7=0)\n *line_break\n DERWIN JONAS\n*if(mil8=0)\n *line_break\n MORGANS DON'T FORGIVE \n\n*goto  top", "prologue": "*page_break\n\n*line_break\nYou reach home. There is a large file before you. You decide to see what you are up against. Old Camp is ruled by five factions- The Green Hammers, The Red Dragons,The Black Panthers, The Golden Cross and The Blue Bloods. Each one is responsible for a particular vice. The Green Hammers control the liquor trade. The Red Dragons are into human trafficking. The Black Panthers are responsible for the weed trade. The Golden Cross runs the casinos and the Blue Bloods supply the arms and ammunition to all the gangs. None of the gangs interfere in each others business. Your target, Derek Jones is the leader of the Blue Bloods. The Green Hammers are lead by Robbie Newman. The Red Dragon's by Tony Wong. The Black Panther's are headed by Samuel Godwin and the Golden Cross by Don Miguel. These five are the lords of Old Camp. You gather info on each and every member of their gangs. \n\nYou look at the time. Its past midnight. There is a long day ahead of you. You could use some rest. But you have to also have to read the file and get familiarised with the plan. What do you do?\n*choice\n #Take a small nap and then look at the plan.\n  You close the file and go to bed. You fall to sleep immediately. You wake up next morning feeling rejuvenated. You decide to read the plan in the office.\n  *set strength +5\n  *goto arrest\n #Continue reading. Its not good to postpone things. \n  *set file 1\n  *set intelligence +5\n  *set mil1 1\n  *set mil +1\n  You continue reading the file.You read about how Derek Jones became the Death Dealer. He began his criminal life as a pickpocket. He got arrested for theft when he was thirteen. From then on he has been in and out of juvenile correctional homes. Each time he came out, his crimes increased in magnitude. From theft to vandalism. From vandalism to kidnapping which finally culminated in murder. This was when Mat Morgan spotted him. Mat was the eldest son of Clive Morgan, the leader of the White Wolves. In those days, the White Wolves were the most powerful of the gangs of Old Camp. Once Derek joined the White Wolves, his star was on the rise. Soon he became one of Morgan's trusted men. Then he made a secret pact with the police. He would give them intel on the activities of the Wolves if they turned a blind eye to his own shady arms dealings. The police were only glad to agree. With the help of Derek they were able to start a gang war. They called it The Dark War. Old Camp burned. Each gang was on another's throat. Many lives were lost in the crossfire. The White Wolves were greatly weakened by the War. The police were priding themselves on their genius when Derek struck. In one single night, he destroyed the White Wolves. He killed the Morgans, every last one of them, man, woman and child . The White Wolves were disbanded and the Blue Bloods formed. The police watched in utter shock as the monster they created took over the city. They tried to stop Derek but it was too little too late.\n\n  You then read the 'ingenious' plan. Truth be told, you are shell shocked. In a few days, you will be arrested and put in prison on charges of corruption. There you will start your new life as a criminal. What a crazy plan! Who the hell came up with this idea? You decide that you will meet the Chief and change the plan first thing tomorrow. You decide that that's enough for one day and retire to bed. You wake up at the sound of the alarm and hastily get dressed for work.\n  *goto arrest\n\n*label arrest\n*page_break\nYou are on your way to work as usual. But something doesn't seem right. Are you being followed? You feel so but you are not sure. What do you do?\n*choice\n #Act normal. But be on your guard.\n  *set intelligence +5\n  You see two men talking in the street cornor. They are taking quick glances at you. The tramp is whispering something. Is he wired? You quicken your pace. There is definitely something going on. \n  *goto fbi\n #Confront the stalker.\n  *set intelligence -5\n  You sharply turn around to confront the stalker. Then you realise that you don't know him... or her. The crowd flows past you. Maybe you are making this up.\n  *goto fbi\n #Its the mission getting into your head.Shrug it off.\n  You calmly continue your walk. There is no reason for anyone to stalk you.\n  *goto fbi\n\n*label fbi\n*page_break\nSuddenly a car screeches in front of you. Two men get out of the car. They are armed.\n*choice\n #You try to fight them.\n  *set strength -5\n  You put up a fight. Punch the first guy in the head. The men are taken by surprise. It seemed they expected you to surrender meekly. The other guy goes for his gun. But you are faster on the draw. Suddenly you feel a pin prick on your neck. The world seems to float. When you come to your senses, you are in an interrogation room.\n  *goto ir\n #You make a run for it.\n  *set respect -5\n  But you are not far away when a lady in the crowd takes you out with a tazer. You feel a shock wave run through your whole body, numbing you. When you wake up, you are in an interrogation room.\n  *goto ir\n *if (file=1) #You surrender meekly.\n  *set respect +5\n  You remember the plan. They will arrest you. This must be it. You surrender without protest. They escort you to an interrogation room.\n  *goto ir\n \n*label ir\n*page_break\nOfficer Harrison enters the room. He motions the other officers to leave the room.\n\n\"What the hell do you think you are doing, arresting me like this?\" \n\n\"Everything is going according to plan, ${name}. Your arrest got the public eye. The media are coming up with all sorts of cooked up stories. Its better you stop reading the paper for a few days. Everyone in Old Camp now thinks you are a corrupt cop. \"\n\n\"You mean just like that?\" You are clearly surprised. After all, just a few days ago, you were the local hero.\n\n\"You know how the media works. Give them a cracker and they will turn it into a nuclear bomb. You are getting a lot of coverage right now.\"  \n\n\"Have you met Kate?\"\n\n\"Yes.\" Luke's smile vanishes.\n\n\"What does she think?\"\n\nFor a moment there is pin drop silence. Then Luke reaches into his pocket. \"She told me to give this to you.\"\n\nYou stare in disbelief at the object in your hand. The engagement ring. You hold back a tear. Its for the good of the city. Sacrifices are to be made. \n\n\"I know that I should have told her, Klaw. But it would compromise the whole operation.\"\n\n\"Its not your fault, Luke. I thought she would have more faith in me. Anyway its better this way. Atleast, I know that nobody will miss me if I fail this mission.\"\n\n\"Come on, ${name}. You know that's not true. Lets wrap this case quickly and then we can make this right. Now listen to the plan.\"\n*choice\n #Think about Kate.\n  How could she do this? We were in love. True love. How could she forget all the moments we had shared together? Did I mean nothing to her? Your thoughts wander. The day you first met her. The day you asked her out for a date. The first kiss. Memories flood your mind. \n  *goto attention \n
