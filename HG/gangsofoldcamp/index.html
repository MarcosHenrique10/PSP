<script>
/* ChoiceScript runtime — vanilla-JS port of the Python engine in cs/.
 *
 * Faithful reimplementation of parser + expr + interpolate + engine. The
 * engine is I/O-agnostic: it talks to an `io` object exposing text(), choose(),
 * page_break(), input_text(), input_number(), achievement(), stat_chart().
 *
 * Exposed as a global `CS` object (no modules, no build step).
 */
(function (root) {
  "use strict";

  // ---- errors ----------------------------------------------------------- //

  class CSError extends Error {
    constructor(message, scene, line) {
      super(formatLoc(scene, line) + message);
      this.raw_message = message;
      this.scene = scene === undefined ? null : scene;
      this.line = line === undefined ? null : line;
      this.name = "CSError";
    }
  }
  function formatLoc(scene, line) {
    if (scene == null && line == null) return "";
    return (scene == null ? "?" : scene) + " line " + (line == null ? "?" : line) + ": ";
  }
  class ExprError extends CSError { constructor(m, s, l) { super(m, s, l); this.name = "ExprError"; } }
  class GameOver extends Error { constructor(label) { super(label || ""); this.label = label || ""; this.name = "GameOver"; } }
  class QuitGame extends Error { constructor() { super("quit"); this.name = "QuitGame"; } }
  class LoadGame extends Error { constructor(state) { super("load game"); this.state = state; this.name = "LoadGame"; } }
  class RestartGame extends Error { constructor() { super("restart"); this.name = "RestartGame"; } }

  // ---- parser ----------------------------------------------------------- //

  const COMMAND_RE = /^\s*\*(\w+)\b[ \t]?([\s\S]*)$/;
  const INDENT_RE = /^([ \t]*)/;

  class Line {
    constructor(num, indent, command, arg, text) {
      this.num = num;
      this.indent = indent;
      this.command = command; // null for plain text
      this.arg = arg;
      this.text = text;
    }
    get is_blank() {
      return this.command == null && this.text.trim() === "";
    }
  }

  function getIndent(raw) {
    const m = INDENT_RE.exec(raw);
    const ws = m ? m[1] : "";
    if (ws.indexOf("\t") !== -1 && ws.indexOf(" ") !== -1) {
      throw new CSError("mixed tabs and spaces in indentation");
    }
    return ws.length;
  }

  function parseScene(text) {
    const lines = [];
    const rawLines = text.split("\n");
    for (let i = 0; i < rawLines.length; i++) {
      let raw = rawLines[i].replace(/\r$/, "");
      const num = i + 1;
      if (raw.trim() === "") {
        lines.push(new Line(num, 0, null, "", ""));
        continue;
      }
      const indent = getIndent(raw);
      const m = COMMAND_RE.exec(raw);
      if (m) {
        lines.push(new Line(num, indent, m[1], m[2], raw.trim()));
      } else {
        lines.push(new Line(num, indent, null, "", raw.trim()));
      }
    }
    return lines;
  }

  // ---- value coercion --------------------------------------------------- //

  function isNum(v) { return typeof v === "number"; }
  function isBool(v) { return typeof v === "boolean"; }
  function isStr(v) { return typeof v === "string"; }

  function toNum(value) {
    if (isBool(value)) throw new ExprError("Expected number, got boolean: " + value);
    if (isNum(value)) return value;
    const s = String(value).trim();
    if (/^-?\d+$/.test(s)) return parseInt(s, 10);
    // Match Python float(): the whole string must be a valid float literal.
    if (/^[+-]?(\d+\.?\d*|\.\d+)([eE][+-]?\d+)?$/.test(s)) {
      const f = Number(s);
      if (!isNaN(f)) return f;
    }
    throw new ExprError('Expected number, but got string: "' + value + '"');
  }

  function toBool(value) {
    if (isBool(value)) return value;
    if (isNum(value)) throw new ExprError("Expected boolean, got number: " + value);
    const s = String(value).trim().toLowerCase();
    if (s === "true") return true;
    if (s === "false") return false;
    throw new ExprError('Expected boolean, but got string: "' + value + '"');
  }

  function csStr(value) {
    if (isBool(value)) return value ? "true" : "false";
    if (isNum(value)) {
      // integers render without a decimal point
      if (Number.isInteger(value)) return String(value);
      return String(value);
    }
    return String(value);
  }

  // ---- expression tokenizer --------------------------------------------- //

  const TOKEN_SPECS = [
    ["OPEN_PARENTHESIS", /^\(/],
    ["CLOSE_PARENTHESIS", /^\)/],
    ["OPEN_CURLY", /^\{/],
    ["CLOSE_CURLY", /^\}/],
    ["OPEN_SQUARE", /^\[/],
    ["CLOSE_SQUARE", /^\]/],
    ["FUNCTION", /^(not|round|timestamp|log|length|auto)\s*\(/],
    ["NUMBER", /^\d+(\.\d+)?\b/],
    ["CURLY_QUOTE", /^[“”]/],
    ["WHITESPACE", /^\s+/],
    ["NAMED_OPERATOR", /^(and|or|modulo)\b/],
    ["VAR", /^\w+/],
    ["FAIRMATH", /^%[+\-]/],
    ["OPERATOR", /^[+\-*/&%^#]/],
    ["INEQUALITY", /^[!<>]=?/],
    ["EQUALITY", /^=/],
    ["COMMA", /^,/],
  ];
  const FUNC_NAME_RE = /^\w+/;

  class Token {
    constructor(name, value, pos, func) {
      this.name = name;
      this.value = value;
      this.pos = pos;
      this.func = func || null;
    }
  }

  function tokenize(expr) {
    let s = expr;
    let pos = 0;
    const tokens = [];
    while (s) {
      // String literal with backslash escapes.
      if (s[0] === '"') {
        let i = 1;
        let found = false;
        while (i < s.length) {
          const c = s[i];
          if (c === "\\") { i += 1; }
          else if (c === '"') { found = true; break; }
          i += 1;
        }
        if (!found) throw new ExprError("Invalid string, open quote with no close quote: " + s);
        const matched = s.slice(0, i + 1);
        pos += matched.length;
        tokens.push(new Token("STRING", matched, pos));
        s = s.slice(matched.length);
        continue;
      }
      let matched = null;
      for (const [name, rx] of TOKEN_SPECS) {
        const m = rx.exec(s);
        if (m && m[0]) { matched = [name, m[0]]; break; }
      }
      if (matched === null) throw new ExprError("Invalid expression, could not tokenize at: " + s);
      const [name, value] = matched;
      pos += value.length;
      s = s.slice(value.length);
      if (name === "CURLY_QUOTE") throw new ExprError("Invalid use of curly smart quote: " + value);
      if (name === "WHITESPACE") continue;
      let func = null;
      if (name === "FUNCTION") func = FUNC_NAME_RE.exec(value)[0];
      tokens.push(new Token(name, value, pos, func));
    }
    return tokens;
  }

  // ---- operators -------------------------------------------------------- //

  function fairAdd(v1, v2) {
    v1 = toNum(v1); v2 = toNum(v2);
    if (!(v1 >= 0 && v1 <= 100)) throw new ExprError("Can't fairAdd to non-percentile value: " + v1);
    if (v2 > 0) {
      const mult = (100 - v1) / 100.0;
      const value = Math.floor(v1 + v2 * mult);
      return value > 99 ? 99 : value;
    }
    const mult = v1 / 100.0;
    const value = Math.ceil(v1 - (-v2) * mult);
    return value < 1 ? 1 : value;
  }
  function fairSub(v1, v2) { return fairAdd(v1, -toNum(v2)); }

  function equals(v1, v2) {
    if (isBool(v1) || isBool(v2)) {
      return v1 === v2 || String(v1).toLowerCase() === String(v2).toLowerCase();
    }
    return v1 === v2 || String(v1) === String(v2);
  }
  function divide(a, b) {
    b = toNum(b);
    if (b === 0) throw new ExprError("can't divide by zero");
    return toNum(a) / b;
  }
  function concat(a, b) { return csStr(a) + csStr(b); }
  function numBin(fn) { return (a, b) => fn(toNum(a), toNum(b)); }
  // The `#` operator: 1-based character index into a string (e.g. name#1
  // returns the first character). Mirrors Scene.operators['#'] in scene.js.
  function charAt(v1, v2) {
    const s = csStr(v1);
    const i = toNum(v2);
    if (i !== Math.floor(i)) throw new ExprError("There is no character at position " + i + "; the position must be a whole number.");
    if (i < 1) throw new ExprError("There is no character at position " + i + "; the position must be greater than or equal to 1.");
    if (i > s.length) throw new ExprError('There is no character at position ' + i + '. "' + s + '" is only ' + s.length + " characters long.");
    return s.charAt(i - 1);
  }

  const OPERATORS = {
    "+": numBin((a, b) => a + b),
    "-": numBin((a, b) => a - b),
    "*": numBin((a, b) => a * b),
    "/": (a, b) => divide(a, b),
    "^": numBin((a, b) => Math.pow(a, b)),
    "modulo": numBin((a, b) => ((a % b) + b) % b),
    "&": (a, b) => concat(a, b),
    "#": charAt,
    "%+": fairAdd,
    "%-": fairSub,
    "=": equals,
    "!=": (a, b) => !equals(a, b),
    "<": numBin((a, b) => a < b),
    ">": numBin((a, b) => a > b),
    "<=": numBin((a, b) => a <= b),
    ">=": numBin((a, b) => a >= b),
    "and": (a, b) => toBool(a) && toBool(b),
    "or": (a, b) => toBool(a) || toBool(b),
  };

  // ---- evaluator -------------------------------------------------------- //

  class Evaluator {
    constructor(resolver) { this.resolver = resolver; }

    evalString(expr) { return this.evalTokens(tokenize(expr)); }
    evalTokens(tokens) { return this._evalExpr(tokens.slice(), null); }

    evalValueToken(stack) { return this._evalValueToken(stack.shift(), stack); }

    evaluateReference(stack, toLower) {
      if (toLower === undefined) toLower = true;
      const norm = (name) => toLower ? String(name).toLowerCase() : name;
      const findClosing = (kind, offset) => {
        let opens = 0;
        const openName = "OPEN_" + kind, closeName = "CLOSE_" + kind;
        for (let i = offset || 0; i < stack.length; i++) {
          if (stack[i].name === openName) opens += 1;
          else if (stack[i].name === closeName) {
            if (opens) opens -= 1; else return i;
          }
        }
        return -1;
      };
      if (!stack.length) throw new ExprError("Invalid expression, expected a name");
      const head = stack[0];
      if (head.name === "OPEN_CURLY") {
        stack.shift();
        const closing = findClosing("CURLY", 0);
        if (closing === -1) throw new ExprError("Invalid expression, no closing curly bracket");
        const name = this.evalTokens(stack.slice(0, closing));
        stack.splice(0, closing + 1);
        return norm(name);
      }
      if (head.name === "NUMBER") { stack.shift(); return head.value; }
      if (head.name !== "VAR") {
        throw new ExprError("Invalid expression; expected name, found " + head.name + " at char " + head.pos);
      }
      let name = String(head.value);
      stack.shift();
      while (stack.length && stack[0].name === "OPEN_SQUARE") {
        const closing = findClosing("SQUARE", 1);
        if (closing === -1) throw new ExprError("Invalid expression, no closing array bracket");
        const index = this.evalTokens(stack.slice(1, closing));
        name += "_" + csStr(index);
        stack.splice(0, closing + 1);
      }
      return norm(name);
    }

    _evalExpr(stack, parenthetical) {
      if (!stack.length) throw new ExprError("no expression specified");
      let value1 = this._evalValueToken(stack.shift(), stack);
      if (!stack.length) {
        if (parenthetical) throw new ExprError("Invalid expression, expected " + parenthetical);
        return value1;
      }
      let token = stack.shift();
      if (parenthetical && parenthetical === token.name) return value1;
      const op = OPERATORS[token.value];
      if (op === undefined) {
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected OPERATOR, was: " + token.name + " [" + token.value + "]");
      }
      if (!stack.length) throw new ExprError("Invalid expression, expected something after a " + token.value);
      const value2 = this._evalValueToken(stack.shift(), stack);
      const result = op(value1, value2);
      if (parenthetical) {
        if (stack.length) {
          token = stack.shift();
          if (parenthetical === token.name) return result;
          throw new ExprError("Invalid expression at char " + token.pos + ", expected " +
            parenthetical + ", was: " + token.name + " [" + token.value + "]");
        }
        throw new ExprError("Invalid expression, expected " + parenthetical);
      } else if (stack.length) {
        token = stack.shift();
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected no more tokens, was: " + token.name + " [" + token.value + "]");
      }
      return result;
    }

    _evalValueToken(token, stack) {
      const name = token.name;
      if (name === "OPEN_PARENTHESIS") return this._evalExpr(stack, "CLOSE_PARENTHESIS");
      if (name === "OPEN_CURLY") {
        const value = this._evalExpr(stack, "CLOSE_CURLY");
        return this.resolver.get_var(value);
      }
      if (name === "FUNCTION") {
        const value = this._evalExpr(stack, "CLOSE_PARENTHESIS");
        return this._callFunc(token.func, value);
      }
      if (name === "NUMBER") {
        return /^\d+$/.test(token.value) ? parseInt(token.value, 10) : parseFloat(token.value);
      }
      if (name === "STRING") {
        let inner = token.value.slice(1, -1);
        inner = inner.replace(/\\(.)/g, "$1");
        return this.resolver.replace_variables(inner);
      }
      if (name === "VAR") {
        let variable = String(token.value);
        while (stack.length && stack[0].name === "OPEN_SQUARE") {
          stack.shift();
          const idx = this._evalExpr(stack, "CLOSE_SQUARE");
          variable += "_" + csStr(idx);
        }
        return this.resolver.get_var(variable);
      }
      throw new ExprError("Invalid expression at char " + token.pos +
        ", expected NUMBER, STRING, VAR or PARENTHETICAL, was: " + name + " [" + token.value + "]");
    }

    _callFunc(func, value) {
      if (func === "not") return !toBool(value);
      if (func === "round") return Math.floor(toNum(value) + 0.5);
      if (func === "length") return csStr(value).length;
      if (func === "log") return Math.log10(toNum(value));
      if (func === "timestamp") return parseTimestamp(csStr(value));
      if (func === "auto") throw new ExprError("auto() must come after a < or > symbol");
      throw new ExprError("Unknown function " + func);
    }
  }

  function parseTimestamp(value) {
    const t = Date.parse(value.trim());
    if (isNaN(t)) throw new ExprError("timestamp() could not parse date: " + value);
    return Math.floor(t / 1000);
  }

  // ---- interpolation ---------------------------------------------------- //

  const REPLACER = /[$@](!?!?)\{/g;

  function replaceVariables(line, evaluator) {
    line = String(line);
    const output = [];
    let index = 0;
    while (true) {
      REPLACER.lastIndex = index;
      const m = REPLACER.exec(line);
      if (!m) { output.push(line.slice(index)); break; }
      output.push(line.slice(index, m.index));
      const sigil = line[m.index];
      const capitalize = m[1];
      const exprStart = m.index + m[0].length;
      let curlies = 0, closing = -1, i = exprStart;
      while (i < line.length) {
        const c = line[i];
        if (c === "{") curlies += 1;
        else if (c === "}") { if (curlies) curlies -= 1; else { closing = i; break; } }
        i += 1;
      }
      if (closing === -1) throw new CSError("invalid " + line.slice(m.index, exprStart) + " variable substitution");
      const body = line.slice(exprStart, closing);
      let value = sigil === "$" ? evaluator.evalString(body) : evalMultireplace(body, evaluator);
      value = csStr(value);
      if (capitalize === "!") value = value.slice(0, 1).toUpperCase() + value.slice(1);
      else if (capitalize === "!!") value = value.toUpperCase();
      output.push(value);
      index = closing + 1;
    }
    return output.join("");
  }

  function evalMultireplace(body, evaluator) {
    let expr, options;
    if (/^\s*\(/.test(body)) {
      let parens = 0, closingParen = -1;
      for (let i = 1; i < body.length; i++) {
        const c = body[i];
        if (c === "(") parens += 1;
        else if (c === ")") { if (parens) parens -= 1; else { closingParen = i; break; } }
      }
      if (closingParen === -1) throw new CSError("invalid @{} multireplace; missing closing parenthesis");
      if (closingParen + 1 >= body.length || body[closingParen + 1] !== " ")
        throw new CSError("invalid @{} multireplace; there should be a space after )");
      expr = body.slice(1, closingParen);
      options = body.slice(closingParen + 2).split("|");
    } else {
      if (!/^\S+ /.test(body))
        throw new CSError("invalid @{} multireplace; there should be a space after the first word");
      const spaceIndex = body.indexOf(" ");
      expr = body.slice(0, spaceIndex);
      options = body.slice(spaceIndex + 1).split("|");
    }
    if (options.length < 2) throw new CSError("invalid @{} multireplace; need at least one pipe |");
    let value = evaluator.evalString(expr);
    if (isBool(value) || (isStr(value) && (value.toLowerCase() === "true" || value.toLowerCase() === "false"))) {
      value = toBool(value) ? 1 : 2;
    }
    value = Math.trunc(toNum(value));
    if (value < 1) throw new CSError("invalid @{} multireplace; '" + expr + "' = " + value + " is not positive");
    if (value > options.length)
      throw new CSError("invalid @{} multireplace; '" + expr + "' = " + value +
        " but there are only " + options.length + " options");
    return replaceVariables(options[value - 1], evaluator);
  }

  const MARKUP_RE = /\[\/?(i|b|lie|key|val|stat|suspiciously|optimistically)\]/g;
  // Mirror the game's replaceBbCode for the tags that carry layout meaning:
  // [n/] is a hard line break and [c/] is a "continue, no space" marker that
  // renders as nothing. The remaining styling tags are simply dropped. The
  // resulting "\n" survives paragraph joining (which only collapses spaces and
  // tabs) and shows as a line break wherever text is rendered pre-wrap.
  function stripMarkup(text) {
    return String(text)
      .replace(/\[n\/\]/g, "\n")
      .replace(/\[c\/\]/g, "")
      .replace(MARKUP_RE, "");
  }

  root.CS = { CSError, ExprError, GameOver, QuitGame, LoadGame, RestartGame,
    Line, parseScene, getIndent, toNum, toBool, csStr, Token, tokenize, OPERATORS,
    Evaluator, replaceVariables, stripMarkup };

  // ---- state serialization ---------------------------------------------- //
  // Mirrors the Python _to_jsonable/_from_jsonable. JS also has Map values
  // (_choice_ends/_choice_used with integer keys) which JSON can't hold, so a
  // Map is encoded as {__map__: [[k, v], ...]} and restored to a Map on load.

  function toJsonable(obj) {
    if (obj instanceof Map) {
      return { __map__: Array.from(obj.entries()).map(([k, v]) => [k, toJsonable(v)]) };
    }
    if (Array.isArray(obj)) return obj.map(toJsonable);
    if (obj && typeof obj === "object") {
      const out = {};
      for (const k of Object.keys(obj)) out[k] = toJsonable(obj[k]);
      return out;
    }
    return obj;
  }

  function fromJsonable(obj) {
    if (Array.isArray(obj)) return obj.map(fromJsonable);
    if (obj && typeof obj === "object") {
      const keys = Object.keys(obj);
      if (keys.length === 1 && keys[0] === "__map__") {
        const m = new Map();
        for (const [k, v] of obj.__map__) m.set(keyFrom(k), fromJsonable(v));
        return m;
      }
      const out = {};
      for (const k of keys) out[k] = fromJsonable(obj[k]);
      return out;
    }
    return obj;
  }

  function keyFrom(k) {
    if (typeof k === "string" && /^-?\d+$/.test(k)) return parseInt(k, 10);
    return k;
  }

  // Plain deep copy for already-jsonable data (checkpoints/state). Must NOT
  // use fromJsonable, which would turn serialized {__map__} into live Maps and
  // corrupt the jsonable form.
  function deepCopy(obj) { return JSON.parse(JSON.stringify(obj)); }

  // ---- engine ----------------------------------------------------------- //

  function truthy(value) { return toBool(value); }

  const INITIAL_COMMANDS = new Set([
    "create", "create_array", "scene_list", "title", "author", "comment",
    "achievement", "product", "ifid",
  ]);

  const NOOP_COMMANDS = new Set([
    "page_break_advertisement", "finish_advertisement", "advertisement",
    "check_purchase", "restore_purchases", "purchase", "looplimit",
    "purchase_discount", "print_discount", "check_registration", "login",
    "subscribe", "share_this_game", "more_games", "feedback",
    "check_achievements",
    "sound", "youtube", "link",
    "link_button", "track_event", "timer", "ifid", "product",
    "show_password", "author", "delay_break",
    "end_trial", "script", "achievement",
  ]);

  const ENV_VARS = {
    choice_subscribe_allowed: () => true,
    choice_register_allowed: () => false,
    choice_registered: () => false,
    choice_is_web: () => false,
    choice_is_steam: () => false,
    choice_is_steam_deck: () => false,
    choice_is_ios_app: () => false,
    choice_is_ipad_app: () => false,
    choice_is_android_app: () => false,
    choice_is_omnibus_app: () => false,
    choice_is_amazon_app: () => false,
    choice_is_advertising_supported: () => false,
    choice_is_trial: () => false,
    choice_prerelease: () => false,
    choice_kindle: () => false,
    choice_randomtest: () => false,
    choice_quicktest: () => false,
    choice_nightmode: () => false,
    choice_purchase_supported: () => false,
    choice_purchased_adfree: () => true,
    choice_purchased_everything: () => true,
    choice_restore_purchases_allowed: () => false,
    choice_save_allowed: () => true,
    choice_release_date: () => "release day",
  };

  class Scene {
    constructor(name, lines) {
      this.name = name;
      this.lines = lines;
      this.labels = {};
      this._indexLabels();
    }
    _indexLabels() {
      for (let i = 0; i < this.lines.length; i++) {
        const ln = this.lines[i];
        if (ln.command && ln.command.toLowerCase() === "label") {
          const label = ln.arg.trim().toLowerCase();
          if (/\s/.test(label)) {
            throw new CSError("label '" + label + "' is not allowed to contain spaces", this.name, ln.num);
          }
          if (label in this.labels) {
            throw new CSError("label '" + label + "' already defined on line " +
              this.lines[this.labels[label]].num, this.name, ln.num);
          }
          this.labels[label] = i;
        }
      }
    }
  }

  class Engine {
    constructor(io, sceneLoader) {
      // sceneLoader(name) -> array of Line (parsed). Replaces filesystem access.
      this.io = io;
      this._loader = sceneLoader;
      io.engine = this;
      this.stats = {};
      this.temps = this._freshTemps();
      this.scene_list = [];
      this.scene_cache = {};
      this.evaluator = new Evaluator(this);

      this.scene = null;
      this.line_num = 0;
      this.indent = 0;
      this.finished = false;
      this.initial_commands = true;

      this._para = [];
      this.achievements = {};
      this.unlocked = new Set();
      this.checkpoints = {};
      this._resume = null;
      this._pending_scene = null;
      this._in_stats = false;
      this._rng = Math.random;  // overridable for deterministic tests
    }

    _freshTemps() {
      return {
        choice_reuse: "allow",
        param: [],
        _choice_ends: new Map(),
        _choice_used: new Map(),
        _choice_substack: [],
        _fake_choice_depth: 0,
      };
    }

    // ---- resolver interface ---- //

    get_var(variable) {
      variable = String(variable).toLowerCase();
      if (variable && /^-?\d+$/.test(variable)) return parseInt(variable, 10);
      if (variable === "true") return true;
      if (variable === "false") return false;
      const env = ENV_VARS[variable];
      if (env !== undefined) return env(this);
      if (variable === "choice_linenum") return this.line_num;
      if (variable === "choice_scene") return this.scene ? this.scene.name : "";
      if (variable.startsWith("choice_saved_checkpoint")) return !!this.stats[variable];
      if (variable.startsWith("choice_achieved_"))
        return this.unlocked.has(variable.slice("choice_achieved_".length));
      if (variable.startsWith("choice_purchased_")) return true;
      if (variable === "choice_user_restored" && !(variable in this.temps)) return false;
      if (variable === "choice_just_restored_checkpoint" && !(variable in this.temps)) return false;
      let value;
      if (variable in this.temps) value = this.temps[variable];
      else if (variable in this.stats) value = this.stats[variable];
      else {
        if (variable === "implicit_control_flow") return false;
        throw new CSError("Non-existent variable '" + variable + "'",
          this.scene ? this.scene.name : null, this._curNum());
      }
      if (value === null || value === undefined) {
        throw new CSError("Variable '" + variable + "' exists but has no value",
          this.scene ? this.scene.name : null, this._curNum());
      }
      return value;
    }

    replace_variables(text) { return replaceVariables(text, this.evaluator); }

    set_var(variable, value) {
      variable = String(variable).toLowerCase();
      if (variable in this.temps) this.temps[variable] = value;
      else if (variable in this.stats) this.stats[variable] = value;
      else throw new CSError("Non-existent variable '" + variable + "'",
        this.scene ? this.scene.name : null, this._curNum());
    }

    _validateVariable(variable) {
      if (!variable || !/^[a-zA-Z]/.test(variable))
        throw this._err("Invalid variable name, must start with a letter: " + variable);
      if (!/^\w+$/.test(variable))
        throw this._err("Invalid variable name: '" + variable + "'");
      if (/^(and|or|true|false|scene|scenename)$/i.test(variable))
        throw this._err("Invalid variable name, '" + variable + "' is a reserved word");
      if (variable.startsWith("choice_"))
        throw this._err("variables may not start with 'choice_'");
    }

    _curNum() {
      if (this.scene && this.line_num >= 0 && this.line_num < this.scene.lines.length)
        return this.scene.lines[this.line_num].num;
      return null;
    }
    _err(msg) { return new CSError(msg, this.scene ? this.scene.name : null, this._curNum()); }
    _safeGet(name) { try { return this.get_var(name); } catch (e) { if (e instanceof CSError) return null; throw e; } }

    // ---- scene loading + run ---- //

    load_scene(name) {
      name = name.toLowerCase();
      if (!(name in this.scene_cache)) {
        const lines = this._loader(name);
        this.scene_cache[name] = new Scene(name, lines);
      }
      return this.scene_cache[name];
    }

    run(startScene) {
      this._enterScene(this.load_scene(startScene || "startup"));
      this._runUntilEnd();
    }

    resumeFromState(state) {
      this._applyState(state);
      this._runUntilEnd();
    }

    // Run choicescript_stats against the *already-applied* engine state, as a
    // single scene. Unlike showStats() this does NOT snapshot/restore — it's
    // meant for a throwaway engine whose state was set via _applyState. Because
    // stats screens are often interactive (*choice menus of stat categories),
    // the io is free to throw StopReplay at a prompt; that propagates to the
    // caller, which records the answer and re-runs from the top. Mirrors the
    // single-scene model of engine.py show_stats (labels/goto within the scene
    // work; goto_scene out of stats is not followed, by ChoiceScript convention).
    runStatsScene() {
      this.scene = this.load_scene("choicescript_stats");
      this.line_num = 0;
      this.indent = 0;
      this.finished = false;
      this.temps = this._freshTemps();
      this._para = [];
      this._pending_scene = null;
      this._resume = null;
      this._in_stats = true;
      this._runStatsLoop();
      this._in_stats = false;
    }

    // Drive the stats overlay to completion. Unlike a single _printLoop() call,
    // this follows *gosub_scene transitions (e.g. magics' appearance text calls
    // out to utils) and the *return that comes back, so the whole stats scene
    // renders. Unlike _mainLoop it never advances into the next scene in the
    // scene list: when the stats scene finishes with no pending transition,
    // we're done.
    _runStatsLoop() {
      try {
        while (true) {
          this._printLoop();
          if (this._pending_scene !== null) {
            const nxt = this._pending_scene;
            this._pending_scene = null;
            this._enterScene(nxt);
            continue;
          }
          break;
        }
      } catch (e) {
        if (!(e instanceof GameOver)) throw e;
      }
      this._flushParagraph();
    }

    // Run choicescript_stats as a read-only overlay against current state, then
    // restore everything (the stats scene may *set globals as harmless
    // normalizations, so we snapshot stats too). Mirrors engine.py show_stats.
    // The caller must have made "choicescript_stats" loadable; if the loader
    // can't find it, the CSError propagates.
    showStats() {
      const saved = {
        scene: this.scene, line_num: this.line_num, indent: this.indent,
        finished: this.finished, temps: this.temps, _para: this._para,
        _pending_scene: this._pending_scene, _resume: this._resume,
        initial_commands: this.initial_commands, stats: Object.assign({}, this.stats),
      };
      try {
        this.scene = this.load_scene("choicescript_stats");
        this.line_num = 0;
        this.indent = 0;
        this.finished = false;
        this.temps = this._freshTemps();
        this._para = [];
        this._pending_scene = null;
        this._resume = null;
        this._in_stats = true;
        this._runStatsLoop();
      } finally {
        this._in_stats = false;
        this.scene = saved.scene;
        this.line_num = saved.line_num;
        this.indent = saved.indent;
        this.finished = saved.finished;
        this.temps = saved.temps;
        this._para = saved._para;
        this._pending_scene = saved._pending_scene;
        this._resume = saved._resume;
        this.initial_commands = saved.initial_commands;
        this.stats = saved.stats;
      }
    }

    _runUntilEnd() {
      while (true) {
        try {
          this._mainLoop();
          return;
        } catch (e) {
          if (e instanceof RestartGame) {
            this._resetAll();
            this._enterScene(this.load_scene("startup"));
            continue;
          }
          if (e instanceof LoadGame) { this._applyState(e.state); continue; }
          if (e instanceof QuitGame) {
            try { this.autosave(); } catch (_) { /* never mask quit */ }
            throw e;
          }
          throw e;
        }
      }
    }

    _mainLoop() {
      try {
        while (true) {
          this._printLoop();
          if (this._pending_scene !== null) {
            const nxt = this._pending_scene;
            this._pending_scene = null;
            this._enterScene(nxt);
            continue;
          }
          const nxt = this._nextSceneName(this.scene.name);
          if (!nxt) break;
          this.temps = this._freshTemps();
          this._enterScene(this.load_scene(nxt));
        }
      } catch (e) {
        if (e instanceof GameOver) { this._flushParagraph(); return; }
        throw e;
      }
    }

    _enterScene(scene) {
      this.scene = scene;
      this.finished = false;
      this._pending_scene = null;
      const resume = this._resume;
      if (resume !== null && resume[0] === scene.name) {
        const [, lineNum, indent] = resume;
        this.line_num = lineNum != null ? lineNum : 0;
        this.indent = indent != null ? indent : scene.lines[this.line_num].indent;
      } else {
        this.line_num = 0;
        this.indent = 0;
      }
      this._resume = null;
      if (scene.name !== "startup") this.initial_commands = false;
    }

    _nextSceneName(current) {
      const i = this.scene_list.indexOf(current);
      if (i === -1) return null;
      if (i + 1 < this.scene_list.length) return this.scene_list[i + 1];
      return null;
    }

    // ---- save / load state ---- //

    _baseState() {
      return {
        version: 1,
        scene: this.scene ? this.scene.name : null,
        line_num: this.line_num,
        indent: this.indent,
        initial_commands: this.initial_commands,
        scene_list: this.scene_list.slice(),
        stats: toJsonable(this.stats),
        temps: toJsonable(this.temps),
        unlocked: Array.from(this.unlocked).sort(),
      };
    }

    captureState() {
      const state = this._baseState();
      if (Object.keys(this.checkpoints).length) state.checkpoints = deepCopy(this.checkpoints);
      return state;
    }

    _applyState(state) {
      this.scene_list = (state.scene_list || []).slice();
      this.stats = fromJsonable(state.stats);
      this.temps = fromJsonable(state.temps);
      this.unlocked = new Set(state.unlocked || []);
      this.checkpoints = deepCopy(state.checkpoints || {});
      this.initial_commands = state.initial_commands === undefined ? false : state.initial_commands;
      this._pending_scene = null;
      this._resume = null;
      this._para = [];
      this.finished = false;
      this.scene = state.scene ? this.load_scene(state.scene) : null;
      this.line_num = state.line_num || 0;
      this.indent = state.indent || 0;
    }

    _resetAll() {
      this.stats = {};
      this.temps = this._freshTemps();
      this.scene_list = [];
      this.unlocked = new Set();
      this.checkpoints = {};
      this.initial_commands = true;
      this._pending_scene = null;
      this._resume = null;
      this._para = [];
      this.finished = false;
      this.scene = null;
      this.line_num = 0;
      this.indent = 0;
    }

    autosave() {
      if (this.scene === null) return;
      if (this.io.on_autosave) this.io.on_autosave(this.captureState());
    }

    requestRestart() { throw new RestartGame(); }

    // ---- main interpreter loop (mirrors Scene.prototype.printLoop) ---- //

    _printLoop() {
      const lines = this.scene.lines;
      this.finished = false;
      while (!this.finished && this.line_num < lines.length) {
        const line = lines[this.line_num];
        if (line.is_blank) { this._flushParagraph(); this.line_num += 1; continue; }

        const indent = line.indent;
        if (indent > this.indent) {
          if (line.command && line.command.toLowerCase() === "comment") { this.line_num += 1; continue; }
          throw this._err("increasing indent not allowed, expected " + this.indent + " was " + indent);
        }

        const end = this.temps._choice_ends.get(this.line_num);
        if (end !== undefined &&
            (truthy(this._safeGet("implicit_control_flow")) || this.temps._fake_choice_depth > 0)) {
          this.line_num = end + 1;
          if (this.temps._fake_choice_depth > 0) this.temps._fake_choice_depth -= 1;
          continue;
        }

        this.indent = indent;

        if (line.command == null && line.text.startsWith("#")) {
          throw this._err("It is illegal to fall out of a *choice statement; " +
            "you must *goto or *finish before the end of the indented block.");
        }

        if (line.command == null) {
          this.initial_commands = false;
          this._printText(line.text);
        } else {
          this._runCommand(line);
        }
        this.line_num += 1;
      }
      this._flushParagraph();
      if (!this.finished) this.finished = true;
    }

    _runCommand(line) {
      const cmd = line.command.toLowerCase();
      const data = line.arg.trim();
      if (INITIAL_COMMANDS.has(cmd)) {
        if (this.scene.name !== "startup" || !this.initial_commands) {
          if (cmd !== "comment")
            throw this._err("Invalid " + cmd + " instruction, only allowed at top of startup.txt");
        }
      } else {
        this.initial_commands = false;
      }
      const handler = DISPATCH[cmd];
      if (handler === undefined) {
        if (NOOP_COMMANDS.has(cmd)) return;
        throw this._err("Non-existent command '" + cmd + "'");
      }
      handler.call(this, data, line);
    }

    _printText(text) { this._para.push(stripMarkup(this.replace_variables(text))); }

    _flushParagraph() {
      if (this._para.length) {
        let joined = this._para.filter((p) => p !== "").join(" ");
        joined = joined.replace(/[ \t]+/g, " ").replace(/ *\n */g, "\n").trim();
        if (joined) this.io.text(joined);
      }
      this._para = [];
    }
  }

  // ---- command handlers (mirror engine._cmd_*) ---- //
  const E = Engine.prototype;

  E._evalLiteral = function (expr, line) {
    if (expr === "") throw this._err("no value specified: " + line.text);
    return this.evaluator.evalString(expr);
  };

  E._cmd_create = function (data, line) {
    const m = /^(\w*)([\s\S]*)$/.exec(data);
    let variable = m[1];
    this._validateVariable(variable);
    variable = variable.toLowerCase();
    this.stats[variable] = this._evalLiteral(m[2].trim(), line);
    return false;
  };

  E._cmd_temp = function (data, line) {
    const m = /^(\w*)([\s\S]*)$/.exec(data);
    let variable = m[1];
    this._validateVariable(variable);
    variable = variable.toLowerCase();
    const rest = m[2].trim();
    this.temps[variable] = rest ? this._evalLiteral(rest, line) : null;
    return false;
  };

  E._cmd_create_array = function (data, line) { this._defineArray(data, line, false); return false; };
  E._cmd_temp_array = function (data, line) { this._defineArray(data, line, true); return false; };

  E._defineArray = function (data, line, temp) {
    const m = /^(\w+)([\s\S]*)$/.exec(data);
    if (!m) throw this._err("Invalid array instruction, no name specified: " + line.text);
    let variable = m[1];
    this._validateVariable(variable);
    variable = variable.toLowerCase();
    const stack = tokenize(m[2].trim());
    if (!stack.length) throw this._err("Invalid array instruction, missing length: " + line.text);
    let length = Math.trunc(toNum(this.evaluator.evalValueToken(stack)));
    if (length < 1) throw this._err("Invalid array instruction, length must be a whole number > 0");
    let values = [];
    while (stack.length) values.push(this.evaluator.evalValueToken(stack));
    if (!values.length) throw this._err("Invalid array instruction, no value specified: " + line.text);
    if (values.length === 1) { const v = values[0]; values = new Array(length).fill(v); }
    else if (values.length !== length)
      throw this._err("array expected 1 or " + length + " values, got " + values.length);
    const target = temp ? this.temps : this.stats;
    for (let i = 0; i < length; i++) target[variable + "_" + (i + 1)] = values[i];
    target[variable + "_count"] = length;
  };

  E._cmd_set = function (data, line) {
    const stack = tokenize(data);
    const variable = this.evaluator.evaluateReference(stack);
    this._requireVar(variable);
    if (!stack.length) throw this._err("Invalid set instruction, no expression: " + line.text);
    this._applySet(variable, stack);
    return false;
  };

  E._cmd_setref = function (data, line) {
    const stack = tokenize(data);
    const variable = String(this.evaluator.evalValueToken(stack)).toLowerCase();
    this._requireVar(variable);
    this._applySet(variable, stack);
    return false;
  };

  E._applySet = function (variable, stack) {
    // Leading operator => implicitly based on the variable's current value.
    if (stack.length && (stack[0].name === "OPERATOR" || stack[0].name === "FAIRMATH")) {
      stack.unshift(new Token("VAR", variable, "(implicit)"));
    }
    this.set_var(variable, this.evaluator.evalTokens(stack));
  };

  E._cmd_delete = function (data) {
    const variable = String(this.evaluator.evaluateReference(tokenize(data)));
    delete this.temps[variable];
    delete this.stats[variable];
    return false;
  };

  E._cmd_rand = function (data) {
    const stack = tokenize(data);
    if (!stack.length) throw this._err("Invalid rand statement, expected: varname min max");
    const variable = this.evaluator.evaluateReference(stack);
    this._requireVar(variable);
    const minimum = this.evaluator.evalValueToken(stack);
    const maximum = this.evaluator.evalValueToken(stack);
    if (stack.length) throw this._err("Invalid rand statement, expected three args");
    const lo = toNum(minimum), hi = toNum(maximum);
    const diff = hi - lo;
    if (diff < 0) throw this._err("rand min must be <= max: " + lo + " > " + hi);
    if (diff === 0) this.set_var(variable, lo);
    else if (Number.isInteger(lo) && Number.isInteger(hi))
      this.set_var(variable, lo + Math.floor(this._rng() * (diff + 1)));
    else this.set_var(variable, lo + this._rng() * diff);
    return false;
  };

  E._requireVar = function (variable) {
    if (!(variable in this.temps) && !(variable in this.stats))
      throw this._err("Non-existent variable '" + variable + "'");
  };

  // ---- control flow ---- //

  E._cmd_goto = function (data) { this._gotoLabel(this._resolveLabelName(data)); return true; };
  E._cmd_gotoref = function (data) {
    this._gotoLabel(String(this.evaluator.evalString(data)).toLowerCase()); return true;
  };
  E._resolveLabelName = function (data) {
    if (/[\[\{]/.test(data)) return String(this.evaluator.evaluateReference(tokenize(data)));
    return String(data).toLowerCase();
  };
  E._gotoLabel = function (label) {
    if (!(label in this.scene.labels)) throw this._err("bad label " + label);
    this.line_num = this.scene.labels[label];
    this.indent = this.scene.lines[this.line_num].indent;
  };
  E._cmd_label = function () { return false; };

  E._cmd_if = function (data) {
    if (truthy(this.evaluator.evalString(data))) this.indent = this._nextNonblankIndent();
    else this._skipBranch(false);
    return true;
  };
  E._cmd_else = function (data) {
    if (data) {
      if (/^if\b/.test(data)) throw this._err("'else if' is invalid, use 'elseif'");
      throw this._err("nothing should appear on a line after 'else': " + data);
    }
    this._skipBranch(true);
    return true;
  };
  E._cmd_elseif = function () { this._skipBranch(true); return true; };

  E._nextNonblankIndent = function () {
    const lines = this.scene.lines;
    let i = this.line_num + 1;
    while (i < lines.length && lines[i].is_blank) i += 1;
    return i < lines.length ? lines[i].indent : this.indent;
  };

  E._skipBranch = function (inElse) {
    const startIndent = this.indent;
    let nextIndent = null;
    const lines = this.scene.lines;
    while (true) {
      this.line_num += 1;
      if (this.line_num >= lines.length) return;
      const line = lines[this.line_num];
      if (line.is_blank) continue;
      const indent = line.indent;
      if (nextIndent === null) {
        if (indent <= startIndent) throw this._err("expected at least one line in 'if' true block");
        nextIndent = indent;
      }
      if (indent <= startIndent) {
        let parsed = null;
        if (indent === startIndent && line.command) parsed = [line.command.toLowerCase(), line.arg.trim()];
        if (!parsed || inElse) { this.line_num = this._previousNonblank(); this.indent = indent; return; }
        const [command, cdata] = parsed;
        if (command === "else") {
          if (cdata) {
            if (/^if\b/.test(cdata)) throw this._err("'else if' is invalid, use 'elseif'");
            throw this._err("nothing should appear after 'else': " + cdata);
          }
          this.indent = this._nextNonblankIndent();
        } else if (command === "elseif" || command === "elsif") {
          if (truthy(this.evaluator.evalString(cdata))) this.indent = this._nextNonblankIndent();
          else { this.indent = indent; this._skipBranch(false); return; }
        } else if (command === "comment") {
          continue;
        } else {
          this.line_num = this._previousNonblank(); this.indent = indent;
        }
        return;
      }
    }
  };

  E._previousNonblank = function () {
    let i = this.line_num - 1;
    const lines = this.scene.lines;
    while (i > 0 && lines[i].is_blank) i -= 1;
    return i;
  };

  // ---- gosub / return / scene transitions ---- //

  E._cmd_gosub = function (data) {
    const m = /\S+/.exec(data);
    const label = m[0];
    const rest = data.slice(label.length);
    const args = this._evalArgList(rest);
    // Some games (e.g. magics) draw their stat meters with a *gosub to a
    // coloredbar routine whose body is a raw *script DOM block we can't run.
    // Emit a structured bar instead so the front-end can paint it; if the IO
    // opts out (console), fall through and run the label as a normal no-op.
    if (label.toLowerCase() === "coloredbar" && this._emitColoredBar(args)) return true;
    this.temps._choice_substack.push([this.line_num, this.indent]);
    this.temps.param = args;
    this._gotoLabel(/[\[\{]/.test(label) ? String(this.evaluator.evaluateReference(tokenize(label)))
      : label.toLowerCase());
    return true;
  };

  // coloredbar params: textwidth, label, colorhex, width ("NN%"), black.
  // The score printed under the game's bar is stats[label.toLowerCase()].
  E._emitColoredBar = function (args) {
    if (!this.io.colored_bar) return false;
    const label = csStr(args[1] != null ? args[1] : "");
    const color = csStr(args[2] != null ? args[2] : "");
    const pct = toNum(String(args[3] != null ? args[3] : "0").replace(/%/g, "").trim());
    const key = label.toLowerCase();
    const value = Object.prototype.hasOwnProperty.call(this.stats, key) ? this.stats[key] : "";
    this._flushParagraph();
    this.io.colored_bar({ label: label, color: color, pct: pct, value: csStr(value) });
    return true;
  };

  E._cmd_return = function () {
    const substack = this.temps._choice_substack;
    if (substack.length) {
      [this.line_num, this.indent] = substack.pop();
      return;
    }
    const subscene = this.stats._choice_subscene_stack;
    if (subscene && subscene.length) {
      const frame = subscene.pop();
      this.temps = frame.temps;
      this._pending_scene = this.load_scene(frame.name);
      this.finished = true;
      this._resume = [frame.name, frame.line_num, frame.indent];
      return true;
    }
    throw this._err("Invalid *return; without any *gosub");
  };

  E._cmd_gosub_scene = function (data, line) {
    if (!this.stats._choice_subscene_stack) this.stats._choice_subscene_stack = [];
    this.stats._choice_subscene_stack.push({
      name: this.scene.name, line_num: this.line_num + 1, indent: this.indent, temps: this.temps,
    });
    this._cmd_goto_scene(data, line);
    return true;
  };

  E._cmd_goto_scene = function (data) {
    const [sceneName, label, param] = this._parseGotoScene(data);
    const target = this.load_scene(sceneName);
    this.temps = this._freshTemps();
    this.temps.param = param;
    this._pending_scene = target;
    this.finished = true;
    if (label != null) {
      const idx = target.labels[label.toLowerCase()];
      if (idx === undefined) throw this._err("bad label " + label);
      this._resume = [sceneName, idx, null];
    } else {
      this._resume = [sceneName, 0, null];
    }
    this.initial_commands = true;
    return true;
  };

  E._parseGotoScene = function (data) {
    let param = [];
    if (/[\[\{]/.test(data)) {
      const stack = tokenize(data);
      const sceneName = this.evaluator.evaluateReference(stack, false);
      let label = null;
      if (stack.length) label = this.evaluator.evaluateReference(stack);
      while (stack.length) param.push(this.evaluator.evalValueToken(stack));
      return [String(sceneName), label, param];
    }
    const m = /(\S+)\s+(\S+)\s*([\s\S]*)/.exec(data);
    if (m) return [m[1], m[2], this._evalArgList(m[3])];
    if (data === "") throw this._err("missing scene name");
    return [data.trim(), null, param];
  };

  E._evalArgList = function (rest) {
    const args = [];
    const stack = tokenize(rest);
    while (stack.length) args.push(this.evaluator.evalValueToken(stack));
    return args;
  };

  E._cmd_params = function (data) {
    let param = this.temps.param || [];
    this.temps.param_count = param.length;
    param = param.slice();
    let n = 1;
    let rest = data;
    while (true) {
      const m = /^\w+/.exec(rest);
      if (!m) break;
      const varName = m[0].toLowerCase();
      this._validateVariable(varName);
      if (!param.length) throw this._err("No parameter passed for " + varName);
      const val = param.shift();
      this.temps[varName] = val;
      this.temps["param_" + n] = val;
      n += 1;
      rest = rest.slice(varName.length).replace(/^\s+/, "");
    }
    for (let i = 0; i < param.length; i++) this.temps["param_" + (n + i)] = param[i];
    return false;
  };

  // ---- endings / restart ---- //

  E._cmd_finish = function () {
    this._flushParagraph();
    this.finished = true;
    if (!this._nextSceneName(this.scene.name)) throw new GameOver();
    return true;
  };
  E._cmd_ending = function () { this._flushParagraph(); this.finished = true; throw new GameOver("ending"); };
  // *delay_ending 1200 $5.99 $0.99 — shows a timed paywall then falls through to
  // *ending (Scene.delay_ending calls this.ending()); either way it terminates
  // the game. Without this the ending scene runs off its end and the main loop
  // advances into the next scene in *scene_list (e.g. greattournament:
  // ending -> death -> *goto_scene ending), looping forever.
  E._cmd_delay_ending = function () { this._flushParagraph(); this.finished = true; throw new GameOver("ending"); };
  E._cmd_abort = function () { this._flushParagraph(); this.finished = true; throw new GameOver("abort"); };
  E._cmd_restart = function () { this._flushParagraph(); this.finished = true; throw new RestartGame(); };

  // ---- reuse defaults ---- //

  E._cmd_hide_reuse = function () { this.temps.choice_reuse = "hide"; return false; };
  E._cmd_disable_reuse = function () { this.temps.choice_reuse = "disable"; return false; };
  E._cmd_allow_reuse = function () { this.temps.choice_reuse = "allow"; return false; };

  // ---- save/load game + checkpoints ---- //

  E._cmd_save_game = function (data) {
    const handler = this.io.on_save_game;
    if (handler) {
      this.line_num += 1;
      try { handler.call(this.io, this, data.trim()); }
      finally { this.line_num -= 1; }
    }
    return false;
  };

  E._cmd_restore_game = function (data) {
    let cancelLabel = null;
    data = data.trim();
    if (data) {
      const m = /^cancel=(\S+)$/.exec(data);
      if (!m) throw this._err("invalid restore_game line: " + data);
      cancelLabel = m[1];
    }
    // *restore_game may be followed by an indented sub-block declaring
    // "timejump" save-slot messages (restoring saves from an earlier
    // installment). We don't support cross-game restores, so consume and
    // ignore that block — otherwise the print loop would hit its deeper
    // indent and throw "increasing indent not allowed".
    this._skipIndentedBlock();
    if (this.io.on_restore_game) this.io.on_restore_game(this); // may throw LoadGame
    if (cancelLabel != null) { this._gotoLabel(cancelLabel.toLowerCase()); return true; }
    return false;
  };

  // Advance line_num past any lines indented deeper than the current command,
  // leaving it on the last such line (the main loop's trailing increment then
  // steps to the first line at the command's own indent or shallower).
  E._skipIndentedBlock = function () {
    const lines = this.scene.lines;
    const startIndent = this.indent;
    let i = this.line_num + 1;
    while (i < lines.length && (lines[i].is_blank || lines[i].indent > startIndent)) i++;
    this.line_num = i - 1;
  };

  E._checkpointSlot = function (data) {
    let slot = data.trim();
    if (slot) {
      if (!/^[A-Za-z0-9_]+$/.test(slot)) return [null, null];
      slot = slot.toLowerCase();
      return [slot, "choice_saved_checkpoint_" + slot];
    }
    return ["checkpoint", "choice_saved_checkpoint"];
  };

  E._cmd_save_checkpoint = function (data) {
    const [slot, stat] = this._checkpointSlot(data);
    if (slot === null)
      throw this._err("Invalid *save_checkpoint slot, must be only letters, numbers, and _ underscores: " + data.trim());
    this.stats[stat] = true;
    this.temps.choice_just_restored_checkpoint = false;
    this.line_num += 1;
    try { this.checkpoints[slot] = this._baseState(); }
    finally { this.line_num -= 1; }
    return false;
  };

  E._cmd_restore_checkpoint = function (data) {
    const [slot, stat] = this._checkpointSlot(data);
    if (slot === null)
      throw this._err("Invalid *restore_checkpoint slot, must be only letters, numbers, and _ underscores: " + data.trim());
    if (!this.stats[stat] || !(slot in this.checkpoints))
      throw this._err("*restore_checkpoint failed; we haven't saved a checkpoint. Use *if " + stat);
    const state = Object.assign({}, this.checkpoints[slot]);
    state.checkpoints = deepCopy(this.checkpoints);
    const temps = fromJsonable(state.temps);
    temps.choice_just_restored_checkpoint = true;
    state.temps = toJsonable(temps);
    throw new LoadGame(state);
  };

  // ---- text / input ---- //

  E._cmd_print = function (data) {
    const value = this.evaluator.evalString(data);
    this._para.push(stripMarkup(this.replace_variables(csStr(value))));
    return false;
  };
  E._cmd_line_break = function () { this._para.push("\n"); return false; };
  E._cmd_page_break = function (data) {
    this._flushParagraph();
    this.io.page_break(data ? this.replace_variables(data) : "Next");
    return false;
  };
  E._cmd_input_text = function (data) {
    const stack = tokenize(data);
    const variable = this.evaluator.evaluateReference(stack);
    this._requireVar(variable);
    this._flushParagraph();
    this.set_var(variable, this.io.input_text(variable));
    return false;
  };
  E._cmd_input_number = function (data) {
    const stack = tokenize(data);
    const variable = this.evaluator.evaluateReference(stack);
    const lo = this.evaluator.evalValueToken(stack);
    const hi = this.evaluator.evalValueToken(stack);
    this._flushParagraph();
    this.set_var(variable, this.io.input_number(variable, toNum(lo), toNum(hi)));
    return false;
  };

  // ---- images ---- //
  // *image file [alignment]           (its own line/block, e.g. a divider)
  // *text_image file [alignment] alt  (inline illustration with alt text)
  // *kindle_image file [alignment] alt
  // Args are space-separated; the source may contain {var} interpolation.
  E._cmd_image = function (data) {
    if (!this.io.image) return false;   // IO opts out: behave as a no-op
    const parts = this.replace_variables(data.trim()).split(/\s+/);
    const src = parts.shift() || "";
    if (!src) return false;
    let align = "center", alt = "";
    const ALIGN = { left: 1, right: 1, center: 1, none: 1 };
    if (parts.length && ALIGN[parts[0].toLowerCase()]) align = parts.shift().toLowerCase();
    alt = parts.join(" ");
    this._flushParagraph();
    this.io.image({ src: src, align: align, alt: alt });
    return false;
  };

  // ---- achievements / misc ---- //

  E._cmd_achievement = function (data) {
    const m = /(\w+)\s+(\S+)\s+(\d+)\s+([\s\S]*)/.exec(data);
    if (m) this.achievements[m[1]] = m[4];
    this._collectIndentedBlock();
    return false;
  };
  E._cmd_achieve = function (data) {
    const name = data.trim();
    if (!this.unlocked.has(name)) {
      this.unlocked.add(name);
      this.io.achievement(this.achievements[name] || name);
    }
    return false;
  };
  E._cmd_bug = function (data) { throw this._err("*bug: " + this.replace_variables(data)); };
  E._cmd_comment = function () { return false; };
  E._cmd_scene_list = function () { this.scene_list = this._parseSceneList(); return true; };
  E._cmd_title = function (data) { this.stats.choice_title = data.trim(); return false; };
  E._cmd_author = function (data) { this.stats.choice_author = data.trim(); return false; };
  E._cmd_arg0 = function () { return false; };

  E._parseSceneList = function () {
    const scenes = [];
    const lines = this.scene.lines;
    const startIndent = this.indent;
    let nextIndent = null;
    while (true) {
      this.line_num += 1;
      if (this.line_num >= lines.length) break;
      const line = lines[this.line_num];
      if (line.is_blank) continue;
      const indent = line.indent;
      if (nextIndent === null) {
        if (indent <= startIndent) throw this._err("invalid indent, expected at least one row");
        nextIndent = indent;
      }
      if (indent <= startIndent) { this.line_num -= 1; break; }
      let text = line.text.trim();
      const m = /^\$(\w*)\s+([\s\S]*)/.exec(text);
      if (m) text = m[2];
      text = text.toLowerCase();
      if (!scenes.length && text !== "startup") scenes.push("startup");
      scenes.push(text);
    }
    return scenes;
  };

  E._collectIndentedBlock = function () {
    const rows = [];
    const lines = this.scene.lines;
    const startIndent = this.indent;
    while (true) {
      this.line_num += 1;
      if (this.line_num >= lines.length) { this.line_num -= 1; break; }
      const line = lines[this.line_num];
      if (line.is_blank) continue;
      if (line.indent <= startIndent) { this.line_num -= 1; break; }
      rows.push([line.indent, line.text]);
    }
    return rows;
  };

  // ---- stat_chart ---- //

  E._cmd_stat_chart = function () {
    this._flushParagraph();
    const block = this._collectIndentedBlock();
    this.io.stat_chart(this._parseStatChart(block));
    return true;
  };

  E._parseStatChart = function (block) {
    const rows = [];
    let i = 0;
    while (i < block.length) {
      const [indent, text] = block[i];
      const m = /^(text|percent|opposed_pair)\s+([\s\S]*)$/.exec(text);
      if (!m) { i += 1; continue; }
      const kind = m[1];
      const rest = m[2].trim();
      if (kind === "opposed_pair") {
        const labels = [];
        let j = i + 1;
        while (j < block.length && block[j][0] > indent && labels.length < 2) {
          labels.push(this.replace_variables(block[j][1].trim()));
          j += 1;
        }
        const value = this._safeGet(rest);
        rows.push({ kind: "opposed_pair", labels, value: value != null ? toNum(value) : 0 });
        i = j;
        continue;
      }
      let varExpr, label;
      if (rest.startsWith("(")) {
        let depth = 0, close = -1;
        for (let k = 0; k < rest.length; k++) {
          if (rest[k] === "(") depth += 1;
          else if (rest[k] === ")") { depth -= 1; if (depth === 0) { close = k; break; } }
        }
        varExpr = rest.slice(1, close);
        label = rest.slice(close + 1).trim() || varExpr;
      } else if (rest.indexOf(" ") !== -1) {
        const sp = rest.indexOf(" ");
        varExpr = rest.slice(0, sp); label = rest.slice(sp + 1);
      } else { varExpr = rest; label = rest; }
      const value = this.evaluator.evalString(varExpr);
      rows.push({ kind, label: this.replace_variables(label.trim()), value });
      let j = i + 1;
      if (j < block.length && block[j][0] > indent) j += 1;
      i = j;
    }
    return rows;
  };

  // ---- choices ---- //

  E._cmd_choice = function (data) { this._doChoice(data, false); };
  E._cmd_fake_choice = function (data) { this.temps._fake_choice_depth += 1; this._doChoice(data, true); };

  E._doChoice = function (data, fake) {
    const startIndent = this.indent;
    const options = this._parseOptions(startIndent);
    const visible = options.filter((o) => !o.hidden);
    if (!visible.length) throw this._err("No displayable options");
    this._flushParagraph();
    const chosen = this.io.choose(visible);
    const option = visible[chosen];
    const optLine = option.line;
    this.line_num = optLine;
    this.indent = this._bodyIndent(optLine);
    if (option.reuse && option.reuse !== "allow") this.temps._choice_used.set(optLine, 1);
    this.finished = false;
  };

  E._bodyIndent = function (optLine) {
    const lines = this.scene.lines;
    let i = optLine + 1;
    while (i < lines.length && lines[i].is_blank) i += 1;
    return i < lines.length ? lines[i].indent : this.indent;
  };

  E._parseOptions = function (startIndent) {
    const lines = this.scene.lines;
    const choiceLine = this.line_num;
    const options = [];
    const choiceEnds = [];
    let nextIndent = null;
    while (true) {
      this.line_num += 1;
      if (this.line_num >= lines.length) break;
      const line = lines[this.line_num];
      if (line.is_blank) continue;
      const indent = line.indent;
      if (nextIndent === null) {
        if (indent <= startIndent) throw this._err("invalid indent, expected at least one option");
        nextIndent = indent;
        this.indent = indent;
      }
      if (indent <= startIndent) { this.line_num -= 1; break; }
      if (indent > this.indent) continue;
      this.indent = indent;
      const opt = this._parseOneOption(line, choiceEnds);
      if (opt !== null) { options.push(opt); choiceEnds.push(opt.line); }
    }
    const end = this._choiceBlockLastLine(choiceLine, startIndent);
    for (const ce of choiceEnds) this.temps._choice_ends.set(ce, end);
    this.line_num = choiceLine;
    return options;
  };

  E._choiceBlockLastLine = function (choiceLine, startIndent) {
    const lines = this.scene.lines;
    let last = choiceLine, i = choiceLine + 1;
    while (i < lines.length) {
      if (lines[i].is_blank) { i += 1; continue; }
      if (lines[i].indent <= startIndent) break;
      last = i; i += 1;
    }
    return last;
  };

  E._parseOneOption = function (line, choiceEnds) {
    let reuse = this.temps.choice_reuse || "allow";
    let unselectable = false;
    let selectableReason = null;
    let command = line.command ? line.command.toLowerCase() : null;
    let text = line.text;

    if (command) {
      let rest = line.arg.trim();
      while (command === "hide_reuse" || command === "disable_reuse" ||
             command === "allow_reuse" || command === "random_weight") {
        if (command === "hide_reuse") reuse = "hide";
        else if (command === "disable_reuse") reuse = "disable";
        else if (command === "allow_reuse") reuse = "allow";
        else if (command === "random_weight") rest = this._stripParenthetical(rest);
        const r = this._stripModifier(rest);
        text = r[0]; command = r[1]; rest = r[2];
      }
      if (command === "if") {
        choiceEnds.push(this.line_num);
        const parsed = this._parseOptionIf(rest);
        if (parsed === null) { this._cmd_if(rest, line); return null; }
        if (!parsed.result) return null;
        text = parsed.line; command = null;
      } else if (command === "elseif" || command === "elsif" || command === "else") {
        choiceEnds.push(this.line_num);
        this._cmdIfChainInChoice(command, rest);
        return null;
      } else if (command === "selectable_if") {
        const parsed = this._parseOptionIf(rest);
        if (parsed === null) throw this._err("Couldn't parse *selectable_if: " + rest);
        text = parsed.line;
        if (!parsed.result) { unselectable = true; selectableReason = "requirement not met"; }
      } else if (command === "print") {
        text = "#" + csStr(this.evaluator.evalString(rest));
      } else if (command === "comment") {
        return null;
      } else if (command) {
        throw this._err("Expected an #option here, not *" + command);
      }
    }

    if (reuse !== "allow") {
      if (this.temps._choice_used.get(this.line_num)) {
        if (reuse === "hide") return null;
        unselectable = true; selectableReason = "already chosen";
      }
    }

    text = text.trim();
    if (!/^#\s*\S/.test(text)) throw this._err("Expected option starting with #: " + text);
    const name = this.replace_variables(text.slice(1).trim());
    const opt = { name: stripMarkup(name), line: this.line_num, selectable: !unselectable, reason: selectableReason };
    if (reuse !== "allow") opt.reuse = reuse;
    return opt;
  };

  E._cmdIfChainInChoice = function (command) {
    if (command === "else") this._skipBranch(true);
    else if (command === "elseif" || command === "elsif") this._skipBranch(true);
  };

  E._parseOptionIf = function (data) {
    const m = /^\s*\(([\s\S]*)\)\s+(#[\s\S]*)/.exec(data);
    if (!m) return null;
    return { result: truthy(this.evaluator.evalString(m[1])), line: m[2] };
  };

  E._stripModifier = function (rest) {
    rest = rest.trim();
    const m = /^\*(\w+)([\s\S]*)/.exec(rest);
    if (m) return [rest, m[1].toLowerCase(), m[2].trim()];
    return [rest, null, rest];
  };

  E._stripParenthetical = function (rest) {
    const openI = rest.indexOf("(");
    if (openI === -1) return rest;
    let depth = 0;
    for (let i = openI; i < rest.length; i++) {
      if (rest[i] === "(") depth += 1;
      else if (rest[i] === ")") { depth -= 1; if (depth === 0) return rest.slice(i + 1).trim(); }
    }
    throw this._err("missing closing parenthesis");
  };

  // ---- dispatch table ---- //

  const DISPATCH = {
    create: E._cmd_create,
    create_array: E._cmd_create_array,
    temp: E._cmd_temp,
    temp_array: E._cmd_temp_array,
    set: E._cmd_set,
    setref: E._cmd_setref,
    config: E._cmd_set,
    delete: E._cmd_delete,
    delete_array: E._cmd_delete,
    rand: E._cmd_rand,
    goto: E._cmd_goto,
    gotoref: E._cmd_gotoref,
    label: E._cmd_label,
    if: E._cmd_if,
    else: E._cmd_else,
    elseif: E._cmd_elseif,
    elsif: E._cmd_elseif,
    gosub: E._cmd_gosub,
    return: E._cmd_return,
    gosub_scene: E._cmd_gosub_scene,
    goto_scene: E._cmd_goto_scene,
    redirect_scene: E._cmd_goto_scene,
    params: E._cmd_params,
    finish: E._cmd_finish,
    ending: E._cmd_ending,
    delay_ending: E._cmd_delay_ending,
    abort: E._cmd_abort,
    restart: E._cmd_restart,
    hide_reuse: E._cmd_hide_reuse,
    disable_reuse: E._cmd_disable_reuse,
    allow_reuse: E._cmd_allow_reuse,
    save_game: E._cmd_save_game,
    restore_game: E._cmd_restore_game,
    save_checkpoint: E._cmd_save_checkpoint,
    restore_checkpoint: E._cmd_restore_checkpoint,
    print: E._cmd_print,
    line_break: E._cmd_line_break,
    page_break: E._cmd_page_break,
    input_text: E._cmd_input_text,
    input_number: E._cmd_input_number,
    image: E._cmd_image,
    text_image: E._cmd_image,
    kindle_image: E._cmd_image,
    achievement: E._cmd_achievement,
    achieve: E._cmd_achieve,
    bug: E._cmd_bug,
    comment: E._cmd_comment,
    scene_list: E._cmd_scene_list,
    title: E._cmd_title,
    author: E._cmd_author,
    stat_chart: E._cmd_stat_chart,
    choice: E._cmd_choice,
    fake_choice: E._cmd_fake_choice,
    arg0: E._cmd_arg0,
  };

  root.CS.Engine = Engine;

  if (typeof module !== "undefined" && module.exports) module.exports = root.CS;

})(typeof window !== "undefined" ? window : globalThis);
