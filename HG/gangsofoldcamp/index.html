<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Gangs of Old Camp — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "gangsofoldcamp", "title": "The Gangs of Old Camp", "scenes": {"chap1": "*set bullet 0\n\n\n*page_break\n\n*label house\n*line_break\nYou change into rags and make it back to the city without getting caught. All the news channels are filled with the news of the hijack. It was reported that the cops found seven bodies, which meant that only one person escaped. The police think it was Rick Angels. Luckily, Derek wanted to make it appear as though Rick had died in the blast. He had put a corpse in the van. So now the police think that you are dead. That takes of some heat from you. But not for too long. Once the forensic reports arrive, the police will know what happened. But you have lots of other things to worry about. Right now, it buys you time and you have work to do. For starters, you are on the street with no cash, no shelter and no weapon. You have a few injuries to tend to and you haven't eaten anything for two days. You need help. Where will you go?\n*goto house1\n\n\n*label house1\n*choice\n #Your house. You have money, food and a gun. That's all you need right now.\n  You go to your house. It looks empty. Atleast you don't have to worry about the police. But you can't go through the front door. If someone sees you, you will be in big trouble. You go through the back. The door is locked. You see that Tommy's trade is proving to be very useful in your day to day activities. You quickly set about working on the lock.\n  *goto lock\n    \n #Luke's house. After all, he was the guy who came up with this stupid plan.\n  You make your way to Luke's house. As you reach the house, you see Luke drive past in his car.\n  *goto greg\n  \n\n #Lily's house. She knows that you are undercover. Besides she has a warm smile.\n  You decide to try your luck with Lily. But there seems to be a problem that you did not foresee. You don't know her address.\n  *goto house1\n\n #Kate's house. Maybe she will still help you. After all you were engaged.\n  You decide to go to Kate. On seeing you she is surprised.\n\n  \"${name}? I thought you were dead.\" \n\n  \"No, honey. Listen to me. This was all part of a mission.\"\n \n  \"What?\"\n\n  \"I love you, Kate. I was to go undercover. That's why I broke of the engagement and got myself arrested.\"\n\n  \"Oh, ${name}. Let me get you something to eat.\"\n\n  You ravenously eat all that you get but suddenly you here sirens in the distance.\n  *set life +30\n\n  Their is an evil smile on Kate's face.\n\n  \"You thought you could  fool me, didn't you? Guess what? I called the police.\"\n \n  You know you have very little time. So you hold back your urge to hit Kate and instead make a hasty escape.\n  *goto street\n  \n #A hospital. First, I need to get my wounds stitched.\n  You decide to go to a hospital. Your search takes you to a shabby clinic. \"St. Alphonsa's Clinic\" reads the sign. You cautiously enter the clinic knowing fully well that if someone recognises you, then its all over. Thankfully most people in the clinic have their own set of problems to deal with. You look at the statue of Christ holding his hands out. \"Let the poor and the needy come to me\" is inscribed below the statue. You suddenly feel the floor slip from under your feet. You lose balance and fall to the ground. The last thing you remember is the smile of Christ.\n\n  *set life +50\n  *set strength +5  \n  When you wake up you are in a bed. Your wounds have been taken care of. Glucose is being administrated to you. You no longer feel tired or hungry. In fact, you feel like you are reborn. That is when the doctor arrives. You recognise her at once. How could you forget those blue eyes? Sophie Rutherton! Many questions pop into your head. What is the daughter of a billionaire doing in a place like this? Did she recognise you? Was she the one who tended your wounds? Did she call the police? On an unrelated note, kidnapping her might be your chance to make it big in the Underworld. What do you do?\n  *goto kidnap\n\n #Sam's house. If anyone would believe your innocence, its her. She was your partner for two years.\n  You make your way to your old partner's house. On reaching her home, you find it deserted. Its then that you remember that she took a vacation to recover from her injury.\n  *goto house1 \n  \n #The police station.\n  You walk into the police station and make a clean breast of the events. Unfortunately for you, the Chief and your partners deny your story. Possibly they didn't want to look like idiots. Needless to say, you are promptly escorted back to prison.\n  *goto jail  \n\n\n*label greg\n*choice\n #Go to his house anyway.\n  You decide to wait for him at his house. After all, there is nothing better to do. You see an open window and make your way into the house. Its his study. You open the door and enter a corridor. Suddenly you here a scream. Shit! You forgot about Mrs. Harrison. You quickly go back into the room and jump out of the window. You get a cut on the shoulder but you manage to escape.\n  *set life -5\n  *goto street\n #Follow him.\n  You decide to follow him. But you soon realise it was a bad choice. How long can a starved man follow a Pyrus? You see the car zoom away.\n  *set strength -5\n  *goto house\n #Go somewhere else.\n  *goto house\n\t\n*label kidnap\n*choice\n #Attack her and take her hostage.\n  You decide that kidnapping her will make your name. \n\n  Sophie opens her mouth to say something but you instantly stuff her mouth with a piece of cloth. You tie her hands and then stop to think about your next move when suddenly the door bursts open and you are surrounded by cops. The game's up.\n  *goto jail\n #Thank her for her kindness.\n  You are about to thank her but she stops you.\n  *set  respect +5\n  *line_break\n  \"${name}, you ought to get out of here quickly. One of the nurses recognised you. The police will arrive here shortly. Here is my number. Call me if you need anything.\" She gives you a piece of paper and unceremoniously ushers you out of the clinic through a window. Two minutes later the room is filled with cops. You look at the paper in your hand: XXXXXXX618.\n  *set sophie 1\n  *goto street\n\t\n*label lock\n*set try 0\n*if (try=0)\n You look closely at the lock. You see the letters: NERTE\n *goto try\n*else\n *if(try=1)\n  It must be something else.Something simple.\n  *goto try\n *else\n  *if(try=2)\n   You ought to try harder. You look at it again : NERTE. Oh! The answer is at your finger tips.\n   *goto try\n  *else\n   *if(try=3)\n    *goto quit\n\n  \n*label quit\n*choice\n #Keep trying\n  *goto lock\n #Go somewhere else\n  *goto house1\n\t  \n*label try\n*input_text answer\n*if answer= \"ENTER\"\n *goto free\n*else\n  *set try +1 \n  *if (try\u003c4)\n   *goto lock\n  \n*label free\n*set life +40\nYou are able to unlock the door. You enter the kitchen. Thank God, you always stock some canned food in the fridge. You hurriedly eat up all that you can get. Once your hunger is satisfied, you tend to your wounds. You may not be an expert but that will be enough for now. Now for the cash and the pistol. The cash is in the living room safe. The gun is in the bedroom.\nWhere do you go first?\n*choice\n #Living room\n  You go to the living room and open the drawer. There is a hundred bucks. That will do for now. You are about to go for the gun when you here sirens in the distance. Shit! Someone must have noticed you. They may have called the police thinking it was a burglary. No time for the gun. You leave with the cash you have.  \n  *goto street\n #Bedroom\n  You go to the bedroom and open the drawer. You are surprised to find that the gun is missing. Maybe the police took it after your arrest. You are about to go for the cash when you here sirens in the distance. Shit! Someone must have noticed you. They may have called the police thinking it was a burglary. No time to take the cash. You leave with the house empty handed.  \n  *goto street\n \n*label street\n*line_break\n*page_break\nYour days in the police force ensured that you know Old Camp like the back of your hand. You know the patrol routine of the police. You know the criminal hangouts. You know every street and dark alley in Old Camp.  You are making your way to Cheapstakes when you here a cry from a back alley near you.\n*choice\n #Its none of your business\n  *set priest 2\n  You walk away. Why risk your life? Besides you are a thug not a do gooder. Its none of your business to help the needy. That's the job of the police. Suddenly, there is a terrible cry from the alley. It seems another poor soul escaped this god forsaken city.\n  *goto bar\n #Go see what it is\n  *goto priest\n\n*label priest\n*page_break\n\n*line_break\nYou see a group of thugs beating up a poor priest.\n\n\"Who are you to preach to us, you son of a bitch?\" asks the leader kicking the priest on the stomach.\n\n\"In the name of Christ, have mercy on me.\" pleads the priest.\n\n\"Ha,ha. Ask Christ to save you, padre.\" retorts the bully.\n*choice\n #Walk away\n  *set respect -5\n  *goto bar\n #Help the priest\n  *set respect +10\n  *goto fight\n #Join the thugs\n  *set respect -10\n  *goto torture\n\n\n*label fight\n*page_break \n\n*line_break\n\"Hey, rascals. Pick someone your own size.\" you shout.\n\n\"Who do you think you are?\"asks the gang leader.\n\n\"The name is ${name} Klaw.\"\n\n\"Oh you are that officer who got kicked out of the force, aren't you? Scamper, kid. There is not going to be any backup coming to save your sorr-\"\n\nYou don't let him finish that sentence. You punch him in the stomach. You have set the ball in motion. The thugs encircle you. You should have walked away. \nThe gang leader barks,\"He is mine.\" This fight will decide your fate. You get ready to face your first test - earning respect.\n*page_break\n*set enemy \"thug\"\n*set opponent 50\n*goto combat\n*label over\nA well placed punch on the face does the trick.The leader falls like a dead log. Seeing their leader's fate the others lose courage. They hesitate for a moment giving you ample time to knock another guy down. The other two flee the scene. \nThe padre thanks you. He also tells you that his name is Father Emmanuel Rodriguez and that he is the vicar of St. Michael's Church. He asks you to visit him if you are in need of help. \n*set priest 1\n*goto bar\n\n*label torture\n*page_break\n\n*line_break\n*set respect -5\nThe old man had no reason to preach to these guys. He is responsible for his fate. Maybe you can join these guys by beating up the priest. You hit the priest on the chest. The man spits blood and faints. The thugs flee the scene and so do you.\n\n*goto bar\n\n*label bar\n*page_break\n\n*line_break\nYou enter Cheapstakes, the local pub owned by Frank Shelby. You order a peg and look around. This is neutral territory. The hangout of the criminal class. You see pickpockets, small time thieves and criminals just released from prison, all mingling freely with each other and having a jolly good time. Among them are the scouts of the four gangs looking for potential recruits. You are sure that this is the best place to start your quest. Just when you are thinking of starting a fight, the fight comes to you.\n\n\"Hey, isn't it my old pal, Klaw. The rascal who took away three years of my life away.\" says a voice behind you.\n\nYou turn around to see Billy Hogan. Billy was a thug you arrested for arson some three years back and from the look of it, he has just finished his sentence. You can't blame him for being pissed. \n\n\"Hello, Bil-\"\n\nBut before you can complete the sentence, Billy's fist lands on your face throwing you out of the chair.\n*set enemy \"hulk\"\n*set opponent 100\n\n*choice \n #Flee\n  *set respect -5\n  *goto flee\n #Fight\n  *set respect +5\n  *goto combat\n\n\n*label flee\n*page_break\n\n*line_break\nYou turn around to run but you feel a hand grip on your shirt. Next thing you know, you are pulled backwards and a punch lands on your stomach. You can't flee from this fight. \n\n\n*goto combat\n\n*label combat\nLife:${life}\tOpponent:${opponent}\n*stat_chart\n  percent life\n  percent opponent\n*line_break\n*rand move 1 4\n*if intelligence >=25\n *if move = 1\n  He raises his hand ready to deliver another blow.\n  *goto next\n *elseif move = 2\n  He pulls back his hand ready to strike again.\n  *goto next\n *elseif move = 3\n  He puts a leg backwards ready to evade any attack.\n  *goto next\n *else\n  His hands rise to guard his face.\n  *goto next\n\n*label next \n*choice\n #Punch Head\n  *set counter 4\n  *goto hit\n #Punch Stomach\n  *set counter 3\n  *goto hit\n #Duck\n  *set counter 1\n  *goto hit\n #Dodge\n  *set counter 2\n  *goto hit\n\n*label hit\n*if move=counter\n For every action there is an equal and opposite reaction. A blow is thrown and it is well defended. No one gets the upper hand.\n *goto combat\n*elseif move\u003c3\n That blow takes you by surprise. You had no answer to that. You find your energy draining away from you. \n *set life -20\n *goto strhit\n*else\n *goto strhit\n\n*label strhit\nYou give a power packed punch, inflicting maximum damage. Your opponent lets out a cry in pain.\n*if counter>2\n *if strength>=40\n  *set opponent -20\n  *goto check\n *else\n  *if strength>=20\n   *set opponent -15\n   *goto check\n  *else\n   *set opponent -10\n   *goto check\n*else\n *goto check\n \n\n*label check\n*if life>0\n *if opponent > 0\n  *goto combat\n *else\n  *goto wincheck\n*else\n *goto loss\n\n*label wincheck\n*if enemy=\"thug\"\n *goto over\n*if enemy=\"hulk\"\n *goto win\n\n*label loss\n*page_break\n\n*line_break\nThe blow batters your body. You lose consciousness. You vaguely here the murmur of people. Then feel light as a feather. Then you hit something hard. There is a loud splash. You open your eyes. There is water around you. You try to move your hands but you cannot. With horror, you see yourself sink to the bottom of River Oslem. The water gushes into your lungs choking you. You hit the bottom of the river-the final resting place for losers like you.\nGAME OVER\n*goto_scene ending\n\n*label win\n*page_break\n*line_break\nWith one final punch, you bring down your opponent. You cherish the moment of victory. Suddenly someone throws a knife. \"Kill him! Kill him!\",shouts the crowd.\n*choice\n #Kill\n  You plunge the knife through his heart. Death is instant. You wipe his blood off your face. For a moment there is silence. Then the crowd bursts into cheers. There is no law here. Only one rule exists. Kill or be killed.\n  *set bill 0\n  *goto card  \n #Spare\n  You may have come a long way from what you were but you are no murderer. This man was not in his senses. You decide to spare him. You throw the knife away. For a moment there is absolute silence. Then the crowd burst into cheers.\n  *set bill 1\n  *goto card\n  \n*label card\nPeople around you shout your name. You just proved a point. You earned your place at Cheapstakes. You go back to your seat. You see two cards on your table. You take a look at both.\n*if (bill=0)\n *goto kill\n*else\n *goto spare\n\n*label kill\nOne has a golden cross engraved on it. The other has the image of a red dragon.\n*choice\n #Golden Cross\n  *set card \"PEPE'S\"\n  *set leader \"Miguel\"\n  *set traitor \"Pablo\"\n  *set daughter \"Isabel\"\n  *set gang \"Golden Cross\"\n  *set four 1\n  *goto night\n #Red Dragon\n  *set card \"MING'S\"\n  *set leader \"Wong\"\n  *set traitor \"Lee\"\n  *set daughter \"Crystal\"\n  *set gang \"Red Dragon\"\n  *set four 2\n  *goto night\n*label spare\nOne has a green hammer engraved on it. The other has the image of a black panther.\n*choice\n #Black Panthers\n  *set card \"KING'S\"\n  *set leader \"Godwin\"\n  *set traitor \"Harper\"\n  *set daughter \"Naomi\"\n  *set gang \"Black Panther\"\n  *set four 3  \n  *goto night\n #Green Hammer\n  *set card \"McGEE'S\"\n  *set leader \"Newman\"\n  *set traitor \"Shane\"\n  *set daughter \"Rebecca\"\n  *set gang \"Green Hammer\"\n  *set four 4\n  *goto night\n  \n*label night\n*set tlife life\n*set tres respect\n*set tint intelligence\n*set tstr strength\n*set tmil mil\n*line_break\nMEET ME AT ${card} AT MIDNIGHT. \n*line_break\nA Well Wisher\n*line_break\nWho could have left this card? Could it be your entry pass to the Underworld? Or could it be a one-way ticket to Netherworld? There is only one way to find out make a choice.\n*choice\n #Go to ${card}\n  You are ready for the challenges to come. Till now you were a law abiding citizen. A law enforcer. But what will you become tomorrow? Will you be able to hold on to your ideals? Or will you have to transform into a ruthless killer to survive? \n  *goto_scene chap2\n #Ignore the note  \n  You are not yet ready to take such a dangerous risk. But if you are to enter the dark belly of the Underworld, you will have to take a few risks. So when you are ready come again.\n  GAME OVER\n  *finish \n\n\n*label jail\nYou are now in a maximum security prison. You have been sentenced to three years in prison. You had a dream job, a beautiful girl and the perfect life. You should never have accepted this case.\nGAME OVER\n*finish\n\n\n\n", "chap2": "*page_break\n*set life tlife\n*set respect tres\n*set intelligence tint\n*set strength tstr\n*set checkpoint 1\n*set mil tmil\n\n*set mobile 0\n*set truth 0 \n*set love 0\n*set crates 0\n*set callbill 0\n*set callslane 0\n*set dimit 0\n*set bath 0\n*set room 0\n\nYou look at your watch. The time is 12 o'clock. You are in front of ${card}. Its closed. No one seems to be there. Was the card a joke? Any way you decide to wait a bit longer. Suddenly something hard makes contact with the back of your head followed by an eruption of pain. You feel yourself drifting. You try to turn around. You see a man with a blood coated club in his hand.\n\nWhen you open your eyes, you are in a dark room. You try to move your hands but they are tied. Suddenly the lights are turned on. You are in a room full of wooden boxes. You are tied to a chair. \n\n\"Hahaha. Who do we have here? Isn't it Officer ${name} Klaw of OCPD?\"\n\nYou look at the source of the voice. You recognise him immediately. ${leader}. The leader of the ${gang}. He looks just like he does in the file. A bit older perhaps.\n*if(four=1)\n The dark brown hair has got a few streaks of grey and the olive skin is not as smooth as it used to be. But who cares? Its his nose that you ought to worry about. Its still Roman. When Miguel first set foot in Old Camp, he was a nobody. All he had was his brain and his Italian family ties. He put both of them to good use. He saw the potential in Summer Sands. Rich men with lots of money and nothing to do. Why rob them when you can milk them? He decided to start Old Camp's first casino- The Golden Heights. Of course, Don Vincent was only too willing to help out his nephew. Especially when Miguel agreed to give him 60% of the profits. The profits were so high that Miguel added three more casinos to the tally. Summer Sands soon became a social symbol and Miguel became its uncrowned king.\n *goto lead\n*else\n *if(four=2)\n  The clean shaven head and pierced ear could not hide the age in his eyes. His black eyes had a tired look in them. His body seemed fragile. But looks can be deceiving. Many a time the 'Chinese Dragon' had taken advantage of his rival's complacency. Tony Wong is adept in kung fu. If you think you can trifle with this small guy, you are mistaken. The man can kill with his bare hands. He is a soft killer whose weapon is not force but precision. He doesn't bother with breaking bones or hurling powerful punches. He punctures a vein here and an artery there. Or he gets straight onto your nerves, literally. \n  *goto lead\n *else\n  *goto further\n*label further\n*if(four=3)\n The leather overcoat, the sunglasses. Its as if they took his photo now and put it in the file. Though he is the head of the Black Panthers, when you look at Samuel Godwin, it is the serpent that comes into your mind. He is as slippery as a snake and poisonous too. He has evaded capture many a time and has killed anyone who has dared to cross his path. He is indeed a cold blooded creature.\n *goto lead\n*else\n *if(four=4)\n  The fiery red hair is fast receding but the bright green eyes still retains the proud look. Of all the gangs of Old Camp, the Green Hammers is the oldest. Set up by two Irish bootleggers during the times of the Prohibition, the gang has complete monopoly over the liquor trade in Old Camp. Yet its star has been on the decline and Robbie Newman has had to watch as the gang lost its influence and power in Old Camp. Still he is the most honourable among the four gangs and is well loved by his people.\n  *goto lead\n\t\n*label lead\n\n\"What...what do you want with me?\"\n\n\"Nothing. Nothing at all.\"\n\n\"Then why have you tied me up?\"\n\n\"Oh come on, boy. You are a police officer! We are thugs! What do you think we want from you? We want to beat the pulp out of you and offer you to the depths of River Oslem. Do you know how many of my guys you have beaten up? Do you remember?\"\n*page_break\n\n\"I am not a cop. Not now! Not anymore!\"\n\n\"Once a cop, always a cop.\" says ${leader} with a broad grin.\n\n\"I want to join you.\"\n\n\"Hahaha. Hear that guys. The cop wants to join our gang. Why is it, officer? So that you can tell our little secrets to your friends in the department?\"\n\n*choice\n #Show off your shooting skills\n  *goto sharp1\n #Negotiate\n  *if(neg=1)and(intelligence>20)\n   *goto neg1\n  *else\n   *goto neg2\n\n\n\n*label neg2\n\"I will never tell your secrets. I promise.\"\n\n${leader} bursts into laughter. \n\n\"So, you want me to take you into the gang because you will 'never' tell my secrets to the police. Is that what you are saying?\"\n\n\"Yes. I mean no.\"\n\n\"Give me one reason why I should take you into my gang. Just one reason.\"\n*goto sharp1\n*label sharp1\n\"I am good with the gun.\" you blurt.\n\n\"Really?\" ${leader} smirks. \"Then lets see your skill. Edward, toss him a gun and go open the window. Now, see that lamppost over there. I want you to shoot it.\"\n\nYou look at the lamppost. Its quite far away. You are not sure if you can hit it from this range. \n\n*choice\n #Shoot the lamppost\n  You decide to give it a try.\n  *if(sharp=1) and (strength>20)\n   You hit the lamp. But something is not right. Rubber bullets. Thank God you didn't try to shoot ${leader}.\n   *goto task\n  *else \n   You miss but ${leader} does not. Even before you can turn around he puts a hole in your head.\n   *goto_scene finish\n #Shoot ${leader}\n  You decide that there is no way you can hit the lamppost. The fool did give you a gun. Maybe you can blast your way out of here. With a sudden cry, you turn around and shoot ${leader}. He stares at you in disbelief. The bullet hits him square on the chest and he collapses to the ground. Edward comes rushing at you. Before you can fire a shot his fist makes contact with your jaw. When you wake up you are tied onto a table. In front of you stands ${leader} with an evil grin on his face.\n  \n  \"You-\"you don't know what to say.\n  \n  \"Rubber bullets. Did you think I was dumb enough to give you a gun? You showed your true colours. You don't deserve a quick death. Edward, ensure that he remembers his death even in his afterlife.\"\n  \n  You see the meat cleaver in Edward's hand and the murderous look in his eyes. You shut your eyes tight. But that is not going to stop the inevitable. With a swoosh, the cleaver lands on your right hand. You give a ear piercing scream but it only falls on deaf ears. You no longer feel that part of your body. You open your eyes but everything is a blur. Suddenly pain erupts on your right leg. You here the snap of a bone. You try to beg for mercy. You ask for a quick death but the torture continues for over an hour before you or whatever is left of you fall to the comforting arms of death.\n  \n  GAME OVER\n  *goto_scene finish\n  \n    \n  \n  \n  \n*label neg1  \n\n\"They are not my friends, ${leader}. They arrested me. Put me in prison. Tortured me. Do you think I will still be loyal to them? I want my revenge. I want to show those dogs that they messed with the wrong guy. I know many of your secrets. I know many of their secrets. I know many of the secrets of this city. Its upto you whether to use them  or to flush them down the pipe.\"\n\n\"Oh, yeah! Then let daddy here a secret, kid.\"\n\n\"There is a mole in your gang.\"\n\n\"What nonsense is this? I know my men very well. They are all loyal to me.\"\n\n\"What if I prove to you that there is a mole?\" \n\n\"Then, you are in.\"\n\n*choice\n #Bob Louis. The original mole.\n  *set intelligence -5\n  *set respect +10\n  You spit the truth out. Bob was one of the best informers you had. But as far as you are concerned he is expendable and you are not.\n\n  \"And why should I trust you?\"\n\n  \"Check it out for yourself. He meets a police officer every week at around 7 a.m at Central Park.\"\n\n  \"If you are telling the truth, you are in. Otherwise, you will suffer a death that is fit for a big fat liar like you.\"\n\n  ${leader} leaves the room. You feel a tinge of guilt for betraying Bob. You knew his family. He had a wife and four kids. Bob was the sole bread winner of the family. You shake your head. You shouldn't let such negative thoughts enter your head. You had no choice, you say to yourself. You had to choose between your life and his. Definitely yours was the one worth saving.\n\n  The thugs keep you imprisoned for two days. On the third, ${leader} arrives. He puts a pistol to your head.\n\n  \"Seems you were wrong. Bob is clean.\"\n  \n  You shut your eyes. What went wrong? Did you get the name wrong? Was James Cole the informer? You wish you had paid more attention to the plan.\n\n  He pulls the trigger. Nothing happens.   \n\n  \"Haha. Got you. ${traitor}, untie him. \"\n\n  A man comes forward. You recognise him instantly. ${traitor}, the right hand man of ${leader}.\n\n  \"Welcome to the ${gang}.\"\n\n  You are treated with a sumptuous meal.\n\n  \"${name}, don't you want to know how I punished that traitor?\"\n\n  \"You killed him, didn't you?\"\n\n  \"Nope.\"\n\n  \"What?\"\n\n  \"I made an example out of him. Tortured and killed his family right in front of his eyes and then left him there with a pistol with one bullet. Serves him well, I would say. That would make those moles think again before they mess with the ${gang}.\"\n\n  You smile and nod your head. Inside, your mind is in turmoil. What have you done? Where will you wash away these sins? The delicious food before you suddenly seems to turn into ash. You have lost your hunger. You know that you will never be the same man again.  \n  *goto task\n  \n  \n #${traitor}. ${leader}'s right hand man.\n  You know that ${traitor} is ${leader}'s most trusted man. Still if you can cause a misunderstanding between them, so much the better.\n\n  \"And why should I trust you?\"\n\n  You hesitate for a moment and thats all the proof that ${leader} needed. Before you can open your mouth the shot is fired. It pierces through your skull, killing you instantly.\n  *line_break\n  GAME OVER\n  *goto_scene finish\n  \n #James Cole. A psychopath.\n  *set intelligence +10\n  *set respect -5\n  You know that Cole is a rookie in the gang. If there is anyone that ${leader} would believe as an informer then its him. This guy doesn't have many friends. So there is a chance that the other members of the gang will easily accept it.\n\n  \"And why should I trust you?\"\n\n  \"Every Friday night he goes to Lady Xin's.\"\n\n  \"Visiting a brothel doesn't make him an informer.\"\n\n  \"True. But is it a mere coincidence that Officer McTrevor of the OCPD also visits the same place on the same day?\"\n\n  \"Hmm.\" \n\n  ${leader} leaves the room. But you know your ploy has worked. The seeds of doubt has been sown in the minds of the leader of the ${gang}.\n\n  The rascals keep you imprisoned for two days. On the third, ${leader} arrives. He puts a pistol to your head.\n\n  \"Seems you were wrong. Cole is clean.\"\n  \n  Shit! You bungled your chance by going for a bluff. You should have given up Bob. Why the hell did you gamble with your life?\n\n  He pulls the trigger.  Nothing happens.   \n\n  \"Haha. Got you. ${traitor}, untie him.\"\n\n  A man comes forward. You recognise him instantly. ${traitor}, the right hand man of  ${leader}.\n\n  \"Welcome to the ${gang}.\"\n\n  You are treated with a sumptuous meal.\n\n  \"${name}, don't you want to know how I punished that traitor?\"\n\n  \"You killed him, didn't you?\"\n\n  \"Yes. And I made him suffer for his treachery. Do you know that ${traitor} here is an excellent butcher? He had a good time with Cole. I am sure that the cries of Cole will deter any would be moles for a long time to come.\"\n\n  You know that Cole's fate was a bit cruel. May be he was punished for a crime he didn't commit. But he deserved the punishment anyway. He had done a lot of barbarian acts in his day. The only reason he escaped the noose was because there were no witnesses to his crime.\n\n  *goto task\n  \n*label task\n*set life +10\n*page_break\nAfter the meal is over, ${leader} gets to more serious matters.\n\n\"You have already proved your strength and your loyalty. But now we need to know whether you are of the gangster mould or will you always remain the good guy that you used to be.\" says ${leader}.\n\n\"What do you want me to do?\" you ask.\n\n\"Break the law.\"\n\n\"Which law?\"\n\n\"That choice is yours. You are what you are. Your actions will reveal your true nature.\"\n*goto task1\n*label task1\n*choice\n #Break a traffic rule.\n  *set respect -15\n  \"Al right, I will break a traffic rule.\"\n\n  \"Hahaha...The cop has only guts to break traffic rules.\" ${traitor} makes fun of you.\n\n  ${leader} is watching you intently.\n  *goto traff  \n \n #Rob a man.\n  *set respect -10 \n  You decide to begin with something simple. You decide to rob a man. Of course, it turns out to be a simple affair. You don't even break sweat. You return to the ${gang} hideout. But ${leader} doesn't seem to be pleased.\n\n  \"Hmm. So you are a pickpocket.\" he mutters.\n  *goto task2\n #Rob a house.\n  *set respect -5\n  You decide to break into a house. You did do you homework. The occupants of the house are out. The job was a walk in the park. You return to the ${gang} hideout.${leader} is satisfied but not impressed.\n\n  \"Good. Atleast you are not useless.\"\n  *goto task2\n #Kill a man.\n  You have proved that you are not afraid to get your hands dirty.\n  \n  \"Why did you kill this man?\" \n\n  \"For no reason.\"\n   \n  *if(four=4) or (four=3)\n   \"Then let me return the favour, ${name}.\"\n   \n   The next moment, ${leader} takes out his pistol and shoots you through the head.\n  \n   GAME OVER\n   *goto_scene finish\n  *else\n   \"Well done. You are the right guy for this job. Conscience will only give you sleepless nights. You kill when you are told to.\"\n   *goto task2\n   \n   \n #Say you will not.\n  \"Then what use are you to us?\"\n\n  ${leader} takes out his pistol and shoots you through the head.\n  \n  GAME OVER\n  *goto_scene finish\n  \n #Ask for more specifics.\n  \"You want more specifics? Hmm. A man who can't make decisions of his own is of no use to me.\"\n  *set respect -5\n  *goto task1\n \n*label traff\n*choice\n #\"I was just joking.You really didn't think I was gonna do that, did you?\"\n  *set respect -5\n  The thugs stare at you angrily. It seems they don't have a funny bone.\n  *goto task1\n #Go get a speeding ticket\n  Your eyes meet the eyes of ${leader}. He seems to be the only guy to understand you. The point that everyone else in the room missed. You leave the room. \n\n  Out in the streets, you see a Ferrari approaching you. You ask for a lift and the teenager obliges. As soon as you enter the car you put a gun to the boy's head. You then make a call to the kid's family asking for a small ransom. The family readily agrees. But once the exchange is made, the police arrive at the scene. It seems the family didn't really appreciate your kind act. Soon you have the cops chasing you through the city. But you are too hot for them. When you lose heat and return to the ${gang} hideout, you are a celebrity.\n\n  \"I thought you said you wanted to break a traffic rule.\" said ${leader} with a smile.\n\n  \"Yes, sir. But then I realised I didn't have a car.\"\n  *set respect +30\n  *goto task2\n  \n  \n\t\n*label task2\n*page_break\nFor a month you take part in petty crimes with the gang but still most of the gang eye you with suspicion. Everyone knows you were a cop. They think you are undercover. Well, you are, but they don't need to know that. Anyway, you are beginning to think that this whole plan was a stupid idea. That's when ${traitor} informs you that ${leader} wants to meet you in private. You wonder what it could be. Did he find out the truth? \n\nYou go and meet him .\n\n\"${name}, you may be aware that your entry into the gang has caused a few problems for me. My men have begun to doubt my leadership.\"\n\nYou gulp. What is he getting at? Behind, you sense a movement. ${traitor} is standing right behind you. Is this your Lucas Brasi moment? You feel fear grip your heart but you keep it within and put a brave smile. Fear will not save you, here. Its better to die with a smile.\n\n\"Well, I am going to give you a chance.\" says ${leader} \" A chance to prove to my men that they were wrong and that I made the right decision by taking you in.\"\n\n\"What do you want me to do?\"\n\n\"I want you to kill a cop.\"\n\nHe looks into your eyes as he says it. You give away nothing.\n\n\"I have been waiting for this. Those guys, they put me in prison. They destroyed my name. I will have my revenge. Tell me, who do I kill?\" you ask enthusiastically.\n\n\"This officer.\" \n\n${leader} hands you an envelope. You open the envelope and look at the photo of the officer. Your heart skips a beat. You recognise her immediately. Yes , its a she. Its your partner. Officer Lily Chan.\n\n\"Is there any problem?\" asks ${leader}.\n\n\"Of course. Its just sad that such beauty has to go to waste.\" you say with a grin.\n\n\"So, how are you going to do it?\"\n\n\"I believe that you want to make a statement by killing her.\"\n\n\"Yes, every cop must think twice before he or she decides to mess with us.\"\n\n\"Well, then we sent a strong message.\"\n\n*choice\n #Shoot her in public\n  *set bomb 0\n  \"I believe that there is nothing better than shooting her in public.\"\n  \n  \"Don't you think that is risky?\"\n  \n  \"I want to make it clear that I am ready to put my life at risk for the ${gang}.\"\n  \n  \"Well, its your choice.\"\n  *goto dil\n  \n #Kill her at home \n  *set bomb 1\n  \"I believe that there is nothing better than blowing her house up and her with it. It will catch the headlines.\"\n  \n  \"You really are evil, aren't you? Where were you all these years?\"\n  *goto dil\n  \n*label dil\n*page_break\nAs you lie on your bed that night, you wonder what to do next.\n*choice\n #You must save her.\n  *set kill 0\n  You decide that you must save her at any cost. Only if you could find some way to communicate with her.\n  *goto comm\n #Trying to save her is too risky.\n  *set kill 1\n  This is your chance to gain the trust of ${leader} and the whole gang. If you kill a cop, no one will see you as an ex-cop. They will only see you as a cop killer. If you botch this up you are a dead guy. Why save her and condemn yourself? You sacrificed your life for this case. Isn't it only fair that she sacrifices her life as well?\n  *goto copkill\n  \n*label copkill\n*if(bomb = 1)\n The fatal night finally arrives. You go with ${traitor} to the house. Lily arrived at around 7 p.m. You look at your watch. Its 11 p.m. The last light is switched off. You tell ${traitor} to keep watch. You sneak into the compound and place the C4. Ten minutes later, you press the trigger and the whole house is blown to bits. Both of you return to ${leader}.\n *goto fur1\n*else\n The fatal day arrives. It is noon and Lily is leaving for lunch accompanied by Luke. You take your shot.\n *if(sharp=1) and (strength>30) \n  Lily falls to the ground.\n  *goto fur1\n *else\n  The bullet misses Lily. You fire again. This time Lily falls to the ground.\n  *goto fur1  \n \n*label fur1\n*if(kill= 0)\n But you know that Lily is safe. You had told her the exact time of the blast. By now she might be in some far away location. Everything went according to plan. You just can't stop smiling at the ingenious plan.\n \n \"What are you grinning at, kid?\" asks ${leader}.\n \n \"Nothing. I am just happy to have pleased you. Atleast now everyone will understand that I mean business.\"\n *goto daugh\n*else\n \"The job is over. The cop will never bother you again.\" you say to ${leader}.\n *goto daugh\n\n*label daugh\n\n\"Not so fast, kid. We must see if she is really dead.\"\n\nOfcourse, you had forseen this and made necessary arrangements. Tomorrow's papers will carry the news of the cold blooded murder of Officer Lily Chan.  \n*page_break\nAs expected, when the papers arrived next day the killing of OCPD officer Lily Chan got the front page. \n\n\"So, are you happy now?\" you ask ${leader}.\n\nHe simply chuckled. \n\n\"If you want some advice, kid, listen. Never trust the papers. If you are an undercover cop, then it would be easy to rig the papers. I have sent my daughter to meet the forensics expert. Actually, she has gone to meet his family. Have a small chit chat. I am sure Dr. Wilfred will give us a true account of the events of last night.\"\n\n*page_break\n\nYou fear a chill go down your spine. If Dr. Wilfred cracks then you are as good as dead. The Chief may have ensured Dr. Wilfred's silence for the moment but the doc will talk if his family is threatened. You should not have saved Lily. You ought to have let her die. As you regret the decisions you made, ${leader}'s daughter, ${daughter} arrives. A stark realisation hits you. You have seen her before. She was in the Church. You have seen her quite a few times in the streets too. Come to think of it she has been at most of the places you visited. This woman was the one who was shadowing you! All this time you were looking for an ugly thug! No wonder you couldn't catch the stalker. You ought to be a lucky man to be stalked by such a beautiful nymph.\n*goto lady\n \n*label lady\n*if(four=1)\n Isabel has inherited her father's hazel nut eyes. But unlike Miguel's terrorising eyes , Isabel's have a hypnotic power. You feel like you can stare into them for eternity. Once you look into those eyes, you are her slave. You pull your eyes from hers. Isabel has a slender frame. She looks thin but on second thought, that's because she is tall. A little above six foot, you think. She has shoulder length hair. Brown like her father's. As for her attire, she is clad in a full sleeve top and tight jeans. She doesn't have a muscular body but from the gun strapped on her hip, you guess its not her punch you ought to worry about. \n *goto lady1\n*else\n *if(four=2)\n  When you first heard that Tony Wong had a daughter, you were expecting a girl with waist length hair clad in a red kimono partially covering her face with a paper fan. Of course that's just a stereotype but you were least expecting a woman with mushroom-cut hair clad in an executive suit and knee length skirt. Maybe it was one of Crystal's guises while shadowing. You may still be lucky to see the girl in the kimono. That is if you lucky to make it alive in one piece today. \n  *goto lady1\n *else\n  *goto further2\n*label further2\n*if(four=3)\n Naomi. Godwin's Black Pearl. That's what your co-thugs would called her in their discussions. The name seemed to do full justice to her. Her dark skin had a certain steel in it that no amount of fair skin could ever provide. She had her hair pulled back and tied up in a bun. Though she was Godwin's daughter and though they shared the same features, their faces were surprisingly dissimilar. The beauty and the beast. Both from the same clay!\n *goto lady1\n*else\n *if(four=4)\n  You wonder how you didn't recognise Rebecca. Even in a crowd, she would stand out because of her blood red hair. When you first saw Newman, you thought he was a red head but you were wrong. His hair is orange or so it looks when Rebecca stands beside him. She also inherited her father's green eyes which gives her an unearthly appearance. Its as if a goddess is standing before you.\n  *goto lady1\n\n*label lady1\n\"So what did you find, my dear? Did he kill her or was this all merely a drama to mislead us?\"\n\nShe gives you a cold stare.\n\n\"He is speaking the truth.\" says she.\n\n\"Are you sure?\" asks ${traitor} suspiciously.\n\n\"Yes. The doc also showed me a few files.\n*if(bomb=1)\n Her body was charred beyond recognition but they did a dental match. Its her all right.\"\n *goto lady3\n*else\n She got shot in the heart. Death was instantaneous.\"\t\n *goto lady3\n\n*label lady3\n*if(kill=0)\n You give a sigh of relief. Lily did her homework well. Thank God. Or you would have lost your head, literally.\n *goto lady4\n*else\n *goto lady4\n \n*label lady4\n\"See. Now do you trust me?\" you ask defiantly. \"Have I not done enough? Has any of your thugs ever dared to kill a cop? Haven't I proved my mettle?\"\n\nThere is silence.\n\n\"You have done well, kid. ${traitor}, send the word out that if anyone messes with ${name}, he is messing with me. Go take some rest, kid. You have earned it.\"\n*goto task4\n  \n*label comm\n*page_break\n${leader} has given you a weeks time to carry out the mission.You need to find a way to warn Lily before its too late. God alone knows whether they know you are dead or alive. The problem is that you feel someone is watching you. A pair of eyes seems to follow you wherever you go. You don't know who it is but you are sure someone is shadowing you.  \n*goto task3\n*label task3\n*choice\n #Pray God to show a way.\n  You believe that God will show you a way. So you decide to pray.\n  *goto pray\n #Try to make a call to Lily.\n  *set intelligence +10\n  You decide its time to take the risk and call Lily. \n  *goto phone\n \n   \n*label pray\n*choice\n #Pray at home\n  *set respect -5\n  *set intelligence -5\n  *set kill 1\n  You pray fervently but nothing seems to happen. Maybe you should just leave it in God's hands. He will save her.\n  *goto copkill\n #Go to St.Michael's\n  *set respect +5\n  While praying in the Church, you happen to see the priest. He is staring at you.\n  *if (priest \u003c2)\n   It seems you have met him before. Then suddenly it hits you. Its the same priest who was attacked by a group of thugs in the alley. Your eyes follow the priest. He goes to the confession box. You get up.\n   *goto confession\n  *else\n   *set kill 1\n   You leave the Church quite troubled by the priest's glare. Its as if he doesn't want you there. Why? You don't even know that guy! Anyway it seems everything is in God's hands now.\n   *goto copkill  \n\n*label phone\n*choice\n #Use mobile\n  *set kill 0\n  *set mobile 1\n  You decide to call Lily from your mobile. She picks up the call.\n  *set intelligence +10\n  *goto coptalk  \n #Use telephone\n  *set kill 0\n  *set intelligence -5\n  You decide to call her from a telephone in ${card}. You close the doors and ensure that no one is watching. Though you had a feeling that someone was following you, it turned out to be your paranoia. Everything went well and you passed all information to Lily. But when you come out of the room, ${daughter}, ${leader}'s daughter is waiting for you. \n\n  \"Didn't think there would be an extension, did you? Take care of him, ${traitor}.\"\n\n  ${traitor} takes out his knife and slits your throat. You die their twisting and writhing in pain. Should have used your mobile.\n  GAME OVER\n  *goto_scene finish\n  \n*label coptalk\n\"Officer Chan, OCPD.\"\n\n\"Hey, this is Klaw.\"\n\n\"What you are alive?\"\n\n\"Yes and I have infiltrated the ${gang}. They don't trust me yet, so I want your help.\"\n\n\"What should I do?\"\n\n\"I need you to fake your death. This is the plan.\n*if(bomb=1)\n I will plant a bomb in your house next Sunday. You are to get out of your house and put a dead body in your place.\"\n *goto copkill1\n*else\n I will shoot you as you come out of the office on Saturday. Just wear a bulletproof vest. I will shoot you in the heart.\"\n *goto copkill1\n \n*label copkill1\n\"O.K, Klaw. Got it. I will discuss this with the Chief.\"\n\nYou end the call. That was simple, wasn't it?\n\n*goto copkill \n  \n  \n  \n  \n*label confession\n*choice \n #Confess your sins\n  *set respect +10\n  *set intelligence +15  \n  You confess your sins. The priest tells you the penance. He is about to get up when you make your request.\n  *line_break\n  *if (priest=1)\n   \"Father, I need your help.\"\n\n   \"What is it, my son?\"\n\n   \"I am an undercover cop. I need to communicate with my partners. But someone is shadowing me. I need you to pass a message to Officer Lily Chan of OCPD.\"\n   *goto message\n  *else\n   \"Father, I need your help. I know that I don't deserve your help after what I did to you but it is urgent and there is no other way.\"\n\n   \"Your sins have already been forgiven son. So do not worry about them. Tell me what is it that you need. I will see what I can do.\"\n\n   \"I am an undercover cop. I need to communicate with my partners. But someone is shadowing me. I need you to pass a message to Officer Lily Chan of OCPD.\"\n   *goto message\n   \n #Leave the Church\n  *set respect -5\n  *set intelligence -5\n  You see that you will get no help here. It would be better of you to leave before the priest stirs up trouble..\n  *goto copkill\n  \n*label message\nYou give an envelope to the priest. It contains all the details regarding the assassination. Father Emmanuel agrees to help you. From then on, you make it your habit to go to Mass on Sundays. Later, you confess all your sins and share all the intel with the padre.\n*goto task4\n  \n*label task4\n*if bill=1\n *page_break\n One day you are sitting at Cheapstakes, when suddenly someone taps you on the back. You turn around to see Bill Hogan. Your hand immediately goes to the gun in your pocket.\n\n \"There is no need for that, Officer. I come in peace.\"\n\n \"Stop calling me an officer, Bill. I am done with that life. What is it that you want?\"\n\n \"I want to apologise. I was out of my mind that day. I had drunk too much. Frank told me how you spared my life that day. I want to thank you. Here is my number. Call me if you need any help.\"\n\n He gives you a piece of paper. You read it. XXXXXXX273.\n *goto task41\n*else\n *goto task41\n \n\n*label task41\n*page_break\n*set life +50\nAs the months pass, your stature in the gang grows. Your police training means you are an asset to the gang. The gang always remains one step ahead of the police, thanks to your valuable inputs. Soon you become one of ${leader}'s trusted men. It is six months after your entry that you are called to the gang meeting. This is where the important decisions are made. You have finally made your breakthrough.\n\nThe Gang Council, as it is called consists of nine members. ${leader}, his daughter ${daughter}, ${traitor} and six other top men. You are not exactly made a council member yet but ${leader} said he wanted you to be present. Of course, no one dares to challenge his word. So here you are.\n\n\"Men, its time we made a few important decisions. You know that after the Dark Wars we have divided this city among the five gangs. Till this day, we have abided by the pact. Yet it seems that not everyone wishes to follow the pact. Derek Jones has been creeping into our territory for sometime now. We ignored it because we didn't want to start another war. But yesterday one of the Blue Bloods committed a murder in our territory. Killed one of our own. I think its time we send them a message. I want to know where all of you stand on the matter.\"\n\nFor a minute, no one spoke. Then ${daughter} stood up. This is the first time you are seeing her. The boss' daughter. She is a woman like nothing you have ever seen before. Beautiful. Brave. Cunning. They say that she hunts her enemies without pity. A she-wolf that is what they call her. \n\n\"I don't think war is a good idea. You know what the last war did to us. Many of us lost our loved ones in that war. I lost my brother. ${traitor} lost his father. We would only be starting another bloodbath.\" says she.\n\n\"Its true that war is a bad thing. But some things just can't be avoided. You ought to put an end to their transgressions or we will be wiped out.\"says a voice to your right.\n\nIt is ${traitor}. He is your text book thug. Rough. Ruthless. Daring. He is got that charm which sways people and make them agree with you.\n\n\"Father, its war that Derek wants. If we attack them in their territory, he will be accusing us of breaking the pact. We won't have the support of the other gangs.\" protests ${daughter}.\n\n\"What do we need their support for? We are the ${gang}, we can take care of our business. No one messes with the ${gang}. Am I not right men?\" asks ${traitor}.\n\nNeedless to say his words are met with applause. At that moment, you see ${leader} look at you. What do you do?\n*choice\n #Remain silent\n  You decide to remain neutral. You are relatively a new member. You don't want to create any enemies.\n  *goto task5\n #Support ${daughter}\n  *set respect +5\n  You decide that supporting the leader's daughter may get you a few favours. So you decide to take her side, though you are sure to get earn ${traitor}'s ire. \n  *goto task5\n #Support ${traitor}\n  *set respect -5\n  You decide to support ${traitor}. You see that his stars are on the rise. Besides it would be unwise to oppose the council just to please ${daughter}.\n  *goto task5\n  \n*label task5\n\"Alright, everyone, after hearing your arguments, I have finally come to the decision that ${traitor} is right.\"\n\n\"But Father-\"\n\n\"No buts. Its time the Blue Bloods learned who they are dealing with. Tonight we attack. ${traitor}, get the men ready.\"\n*goto task6\n\n*label task6\n*page_break\nIts midnight and you are standing outside an old factory house in Blue Blood territory. ${traitor} briefs you regarding the mission.\n\n\"Listen. This is the weapon stronghold. If we take this place down, its like cutting of Derek's right hand. But we are gonna do better than that. We are gonna take the weapons for ourselves.\"\n\n\"Won't it be guarded?\"\n\n\"Yes. There are ten guards. Two guard the front gates. Three are inside. The rest will be in a room in the back of the factory. But they are not gonna expect an attack. So this is what we are gonna do. We split up into two groups. I will lead my men through the back. ${daughter}, you will lead the rest through the right flank. Wait for my signal and then you will attack from the flank. They will be dead before they know what hit them.\"\n\n\"Where did you get all this info?\"\n\n\"Its not only the police who know to infiltrate gangs, Klaw. I have my sources too but thats not important. Now go with her.\"\n\n${traitor} leaves with his men and you get ready to join ${daughter}.\n\"No, you are not coming with us.\"\n\n\"What? Don't you trust me?\"\n\n\"Its not about trust. You stay here and watch out for cops. Give us a signal if they come.\"\n\n\"What's the signal?\"\n\n\"Two shots into the sky. Everyone get moving.\"\n\nHow the hell are they going to discern my gunshots from theirs? Before you can pop the question she disappears into the darkness with her men. Maybe she doesn't trust you. Watching for cops was a mere excuse. You know these parts well. Its been half a decade since cops patrolled this area. It is Derek's domain. Only one law exists here. The Death Dealer's law: Kill or be killed. Then you see that one of the thugs have dropped something.\n*choice \n #Watch out for cops\n  *set respect +5\n  You know that the cops aren't going to come. Still you don't have anything better to do. Being a little alert won't hurt anyone.\n  *goto assault\n #Pick the thing\n  You see that its a cigarette packet. Of course you have never smoked a cigarette before. But there is always a first time, isn't thee?\n\n  \"Smoking is injurious to health.\" You chuckle. \"Really? Even marijuana is legalised now. You ain't going to die if you take a puff.\"\n  *goto cigar  \n  \n*label cigar\n*choice\n #Throw it away\n  *set intelligence +5\n  You take a long look at it. \"Deliver us from all temptations.\" You say and then you throw it away. You decide to watch for cops.\n  *goto assault\n #Take a puff\n  You light a cigarette and take a puff. For a moment, you forget everything. You forget your surroundings, your sufferings and give in to the pleasure. But suddenly you choke. You cough. You feel a bit of discomfort but you know that you want more. You take another puff. I feels like you are in heaven. Then you choke again. You try to cough but you can't. You try to breathe but its getting difficult and then you realise it. Someone is behind you. Someone is strangling you. You try to put up a resistance but its in vain. The grip is too tight. You can't raise your hands. You know that its all over if you don't do something soon.\n  *set life -10\n  *goto check2\n  \n*label check2\n*if(life>0)\n You remain still for a moment and let your legs slip underneath you. The grip loosens for a moment. That's all the time you need. You draw your gun and fire. The attacker falls down. You feel a sudden terror seize you. Are you being ambushed? Then you must warn them immediately. \n *choice\n  #Save ${daughter}\n   *goto run\n  #Save ${traitor}\n   *goto_scene traitor\n*else\n *goto killed   \n\n*label assault\n*page_break\nThe street is quite empty or so you thought. Just then you see too cars arrive at the front of the factory. Around fifteen well armed men arrive. They may not be the cops, but you know that they are equally dangerous. You are about to fire the shots when the firing starts within the factory. The armed men split into groups of five. One goes towards the back where ${traitor} is. Another to the flanks where ${daughter} is. The last group stands guard at the front blocking the last exit. You know that if ${daughter} and ${traitor} are not warned, they stand no chance against a rear attack. But there is not enough time to warn both of them. So, its time for you to make a choice.\n*choice\n #Save ${traitor}\n  *goto_scene traitor\n #Save ${daughter}\n  *goto run\n  \n*label run\n*page_break\nYou decide to save ${daughter}. Why? Because she is ${leader}'s daughter and he would be really pissed if you stood and watched his daughter die. Besides she is beautiful. You never know what may happen, if you get out of here alive.\n\nYou stealthily creep behind the five who are heading to the flanks. The one in the lead has already spotted ${daughter}'s men and is taking aim. If you don't shoot him, he might kill her. On the other hand shooting him would mean the closest to you would be alerted and you might become a sitting duck. What do you do?\n*choice\n #Shoot the nearest guy\n  *set intelligence +5\n  You shoot the one closest to you. The rest are surprised and begin to fire at you. But you are well covered. The shooting alerts ${daughter} and they fire at the attackers. Sandwiched between you and ${daughter}, they don't stand a chance. \n  *goto_scene daughter  \n #Shoot the farthest guy\n  *set respect +5 \n  *set life -10\n  *if life\u003c1\n   *goto killed\n  *else\n   You shoot the farthest guy. At once the guy closest to you fires a round. The bullet grazes your arm. Before he can fire the next shot, you put a bullet in his head. The commotion alerts ${daughter} and soon the attackers find themselves attacked from the rear. Pressed from both sides, they didn't stand a chance. \n   *goto_scene daughter\n\n*label killed\nYou feel the life force ebb out of you. You make a final attempt to get up but you succumb to your injuries. The pain is unbearable. As you lay there waiting for the hands of Death to wrap around you, you wonder whether it was worth it. What did you achieve by sacrificing a promising career and a loving wife? You wonder how life would have turned out if you had declined this mission.  \nGAME OVER\n*goto_scene finish\n  \n  \n \n\n\n\n\n \n", "chap6": "\n*page_break \nWhen you wake up, you are in a bed. Your wounds have been cleaned and bandaged. You look around. You are in a clinic and the smiling face of Dr. Sophie Rutherton greets you.\n\n\"How did I reach here?\"\n\n\"A woman brought you here on the night the Blue Bloods took over. She didn't say her name but I think it was ${leader}'s daughter.\"\n\n\"Is she alright?\"\n\n\"I don't know. The Blue Bloods have been combing the whole town for her. Nobody knows where she is. If she had sense she would have left the town long ago.\"\n\n\"How long have I been here?\"\n\n\"Three days.\"\n\n\"Three days?\"\n\n\"Yes. You were nearly dead when she brought you here. I almost refused to take you in thinking that you were another thug. Then I saw it was you and I decided to take the risk. ${traitor}'s men came here thrice looking for ${daughter} and anyone loyal to her.\"\n\n\"And they didn't find me?\"\n\n\"Of course, they saw you.\"\n\n\"Then why am I still alive?\"\n\n\"I decided to cover you up in bandages. Told them you were an old man who had a bad accident. They bought the story.\"\n\n\"How can I ever thank you, Sophie?\"\n\n\"You don't have to. You saved my life once. Now we are even. Do not expect me to help you again.\" she says with a scorn.\n\nShe thinks you are a thug. A cold blooded criminal. Should you reveal the truth to her? Her help may cone in handy. On the other hand, telling the truth may compromise the mission. What do you do?\n*choice\n #Tell the truth\n  *set respect +10\n  *set truth 1\n  You decide it would be good to have an ally. Someone you can trust. She saved your life once. She may save it again if you trust her.\n  \n  \"Sophie, there is something I need to tell you.\"\n  \n  \"Yes.\"\n  \n  \"I'm a cop.\"\n  \n  \"I know you were a cop.\"\n  \n  \"No. I still am. I am working undercover. I am on a mission.\"\n  \n  \"Oh, c'mon. Do you really think I will buy that?\"\n  \n  \"Its the truth, Sophie. You can ask Officer Luke Harrison of OCPD if you doubt me.\"\n  \n  \"And why are you telling me all this?\"\n  \n  \"Because I trust you and I may need your help.\"\n  \n  \"That's nice to know, Officer.\" \n  \n  She says with a laugh. You don't know if she bought it or not. Only time will give an answer to that. Right now you decide to change the topic.\n  *goto sophie1\n #Tell nothing\n  You decide its better to keep your mouth shut. If she tells it to someone, your game is over. You decide to ask her something else.\n  *goto sophie1\n*label sophie1 \n\"There is something I don't understand. Tell me, Sophie, what is a rich girl like you doing in a place like this? Your father is a billionaire. You have all the luxury at your finger tips. Why choose to serve the poor?\"\n\n\"Even if you gain the whole world, what good is it if you lose your soul?\"\n\n\"Oh, come on, don't preach to me.\"\n\nBut it seems she wanted to tell her story.\n*choice\n #Pay attention\n  *set respect +10\n  *line_break\n  \"The truth is my father had only one aim in life. Making money. He wanted to be the richest man in the world. I learned the hard way that money alone can't buy happiness. My mother was the opposite of my father. She devoted her time in prayer.\"\n\n  \"Oh. I get it. So you became devotional and thought this was the best way to serve God. Am I right?\"\n\n  \"Not exactly. She spent so much time in prayer that she too didn't have much time for me. I was brought up by a nanny. She taught me that the greatest joy came from spreading joy.She would say that if I became a doctor, she could come to me for treatment.\"\n\n  \"So that's how you decided to be a doctor. Now you set up this clinic so that you can take care of her.\" \n\n  \"By the time I completed my studies and returned home, my parents had sent her away. I was a doctor but I had no reason to work. Life was one big party from then on. I don't know if I was happy. I don't remember. Its all a blur. Then one day the letter came. My nanny had died. I learned that she had died of high fever. Died of fever! I was appalled. I could have saved her. That day I decided that I would start a clinic here. A clinic for the needy and the destitute.  Thanks for listening, ${name}.\"\n\n  \"You are a brave woman, Sophie. Not all women can make such a decision.\"\n\n  \"Now I must go, ${name}. There are other patients to attend to.\"\n  *set love 1\n  *set lover \"Sophie\"\n  \n  Before she leaves, she gives you a peck on the cheek. You watch her walk out of the room. \n  *goto visitor\n #Ignore\n  *set respect -5\n  \"Now I must go, ${name}. There are other patients to attend to.\"\n  *line_break\n  She walks away in a hurry. Did she know that you were not listening? Who cares?\n  *goto visitor\n \n\n*label visitor\n*page_break\nThe next day, a visitor arrives. You expect it to be ${daughter} but it turns out to be Father Emmanuel.\n\n\"Good morning, Father.\"\n\n\"Good morning, son. How are you feeling?\"\n\n\"Better.\"\n\n\"Good. When you are ready to leave come to the Church. ${daughter} will be waiting for you there.\"\n\n\"What? She is hiding there! Haven't ${traitor}'s men searched there yet?\"\n\n\"Most of them have never set foot in a church. I knew ${leader}. He was an honourable man. He had done a lot of wrong deeds but he had some principles. ${traitor} has none whatsoever. He is filling the cemetery with dead bodies. He must be stopped. Get well soon. I will pray for you.\"\n*page_break\nAfter two weeks you leave the clinic and meet ${daughter} at the Church. It seems the church walls couldn't change her. She is still a vengeful soul. \n\n\"${traitor} must pay for his sins. My father's death must be avenged.\"\n\nYou too feel that ${traitor} must be killed but for an entirely different reason. He has his allegiance to Derek. If your instinct is anything to go by then such coups will be happening or might have happened in the other gangs as well. To the outside world, there will still be five gangs in Old Camp. But truth is there will soon be only one gang : The Blue Bloods. Once that happens Derek will unleash a reign of terror which will devour the whole city. The only way to stop him is to stop ${traitor}.\n\n\"If we need to stop him then we need a gang.\"\n\n\"All my dad's men are dead.\"\n\n\"That's not true. ${traitor}'s gang is not fully composed of traitors. Some of them obey him because of fear. If we finish him, most of them will be willing to accept you as their leader.\"\n\n\"So where do we get a gang from?\"\n\n\"Leave that to me\"\n*goto_scene chap8\n \n  \n\n\n", "chap7": "\n*page_break\n*set life +50\nYou go to St. Alphonsa's Clinic. Sophie seems to be away. The duty doctor tends to your wounds. They don't ask how you got them. They know. But they are wise enough to keep their mouths shut. \n\n\"So, Klaw, Father just called. He said it would be better if I came to your place. He thinks that because of tonight's episode it may not be safe for me to go home.\"\n\nYou look at her. Is it true? Or is she just making it up? You really can't tell. She is good at masking her feelings.\n*choice\n #Tell her its a bad idea.\n  *set respect +10\n  But then you remember that she did not receive any recent phone calls. Its true that she is a beautiful women and that part of your heart wants to carry her to your apartment but you know that it would be a foolish thing to do especially at times like this.\n  \n  \"Look. I think its a bad idea for me to come over to your place. And Derek is not going to attack your home. That would be foolish. If he attacks your home then all the other gangs will turn against him. Home is off limits. He knows that. Its the only place you will be safe.\"\n\n  \"No one follows those codes any more. You can get killed even in your bedroom.\"\n\n  Is she really hinting at something or is it just you? \n\n  \"Listen. My apartment's nearby. I can come to your rescue at the first sign of trouble. So just go home.\"\n\n  \"You really are an idiot, aren't you?\"\n\n  So saying she gives you a quick kiss and disappears into the night. You are left wondering what the hell you were thinking when you let her go home.\n  *goto midnight\n  \n #O.K. Come if you wish.\n  You know exactly what she is doing but how can you decline an offer like that. You know what will happen if ${leader} becomes aware of this but sometimes heart suppresses the protests of the brain. You take her to your apartment which incidentally happens to be just a few blocks away from her home.\n  *goto passion\n  \n*label midnight\nYou walk back to your apartment, a bit disappointed with yourself. You eat some food and watch TV when you suddenly here a loud explosion. You jump to the nearby window and look outside. You watch in horror as you see ${leader}'s home go up in smoke. ${daughter}! Oh my God! What have you done? You sent her to her death. She was not lying. Man, you have been a fool. {leader}'s home would be the first place anyone would attack. If they came for him, then no one is safe. You must escape as soon as possible. \n*line_break\nSuddenly there is a knock on the door. \n*choice\n #You open the door\n  You open the door. There are two men with guns pointed at your head. \n  *goto negotiate\n #Go for the gun\n  You decide that its in your best interest to be armed right now. Death maybe waiting for you on the other side of that door. You just take your gun from the drawer when the door bursts open and two men armed with guns enter the room. You know you have to play your cards right. You will get only one chance. Either join Derek or go against him. If you put a bullet in their head then there is no turning back.\n  *goto shootout\n  \n*label shootout\n*choice\n #Shoot \n  You decide that they may kill you even if you try to negotiate. Why not die with all guns blazing? You shoot the first guy before he even sees you. But the other guy shoots.\n  *set life -10\n  *if life\u003c1\n   *goto killed\n  *else\n   The gun flies out of your hands. You know that no one can save you now. But exactly at that moment someone puts a bullet in his head. You look at the doorway. Its ${daughter}.\n\n   \"You are alive.\"\n\n   \"Yes. I was lucky. The place blew up just before I reached home.\"\n\n   You can't hide your joy at seeing her. You give her a hug and kiss her passionately on the lips. She looks into your eyes.\n\n   \"So, you do love me.\" \n\n   Then she kisses you back. You savour the moment. \n   *goto passion  \n  \n #Negotiate\n  You get up. \n\n  \"Oh, its you guys. For a moment I thought ${leader} found out about my treachery. Has Derek killed him yet?\"\n\n  The men are confused. \n  *goto kill\n  \n*label negotiate\nYou get up. \n\n\"Oh, its you guys. For a moment I thought ${leader} found out about my treachery. Has Derek killed him yet?\"\n\nThe men are confused. \n*goto kill\n\n*label kill\n*choice\n #Shoot\n  You decide to go for your gun. But before you can reach it, they put a few holes in your head.\n  GAME OVER\n  *goto_scene finish\n  \n #Talk your way out. \n  You decide to continue with your story.\n\n  \"I did just as he told me to do. I sent ${daughter} home. Now she is probably dead.\"\n\n  The guys lower their gun. But then something unexpected happens. BANG! BANG! Two shots, two bodies. You look at the doorway.
