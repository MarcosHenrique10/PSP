 #Pay attention.\n  *set phone 1\n  You listen to the plan. You will be put into Old Camp Prison until the trial is over. After that you will be moved to a maximum security prison in Nest County. It is during the prison transfer that you will get your opportunity to escape. Intelligence report suggests that Derek will hijack the prison van to get a member of his own gang released. During the confusion you will get your chance to escape.\n\n  \"Remember we are letting a convict escape just to give you a shot at Derek. Don't mess this up. If you need me, call on my private number. Its XXXXXXX580 and Officer Chan's is XXXXXXX111.\"\n  *goto attention\n \n*label attention\nline_break\n\n\"Are you paying attention, ${name}?\"\n\n\"Oh, yes!\"\n\n\"Good. My times up. Got to go. Keep the plan in mind.\"\n\n*page_break\nOLD CAMP PRISON\n\nYou know this prison very well. Most of its inmates hold a grudge against you. You are the reason why they are here. Now you are here and the guys are excited. You can here the shouts for your head. Lunch time ain't gonna be pretty.\n\nYou look at your cell mate. An old man. He has his long grey hair in a pony tail. The guy is lean and looks quite weak. A tattoo of a wolf is etched on his arm. He may have been strong once but that was a long time ago. You wonder what he is doing here.\n*choice\n #You try to talk to him.\n  Friends are what you will be needing if you need to get out of here in one piece. Lets start with this one. \"Hey. What brings you here?\". The old man gives you a cold stare. So much for friendship.\n  *goto thrash\n #You ignore him.\n  You have got your own worries. You don't want a garrulous weakling to distract you.\n  *goto thrash\n #You abuse him.\n  You punch him on the face. \"Don't stare at me, old fool. Mind your own business.\" The guy glares at you.\n  *set slane 1\n  *goto thrash\n  \n\n \n*label thrash\n*page_break\nIts lunch time. You are quietly eating your food when a burly guy comes and spits into it. You look at him. He is a hulk of a man. A beast. Muscles bulging. Hair cropped short in navy style. You remember him. Dimitri Isovic. You arrested him for man slaughter. No doubt he has a grudge on you. \n*choice\n #Hit him on the face.\n  You punch him hard. He retaliates with equal force. You just started a fight.\n  *goto figt\n #Leave it and go back to your cell.\n  *set respect -10\n  Picking a fight on your very first day, is not a good idea. Especially when everyone who joins in will want a piece of your flesh. You put your plate down and walk back to your cell.\n  \n  The old man watches you carefully. A few minutes later he comes near you and gives a small portion of his food. \n  \n  \"That's the right thing you did there, kid. You ought to control your temper if you need to survive.\"\n  \n  You thank the old man.\n  \n  \"My name is ${name} Klaw.\"\n\n  \"Tommy. Tommy Slane.\"\n  \n  *goto keys\n \n*label figt\nLife:${life}\tOpponent:${opponent}\n*stat_chart\n  percent life\n  percent opponent\n\n*rand move 1 4\n*if intelligence >=25\n *if move = 1\n  He raises his hand ready to deliver another blow.\n  *goto next\n *elseif move = 2\n  He pulls back his hand ready to strike again.\n  *goto next\n *elseif move = 3\n  He puts a leg backwards ready to evade any attack.\n  *goto next\n *else\n  His hands rise to guard his face.\n  *goto next\n*label next\n*choice\n #Punch Head\n  *set counter 4\n  *goto hit\n #Punch Stomach\n  *set counter 3\n  *goto hit\n #Duck\n  *set counter 1\n  *goto hit\n #Dodge\n  *set counter 2\n  *goto hit\n\n*label hit\n*if move=counter\n For every action there is an equal and opposite reaction. A blow is thrown and it is well defended. No one gets the upper hand.\n *goto figt\n*elseif move\u003c3\n That blow takes you by surprise. You had no answer to that. You find your energy draining away from you. Your body hurts.\n *set life -20\n *goto strhit\n*else\n *goto strhit\n\n*label strhit\nYou give a power packed punch, inflicting a great deal of pain. Your opponent lets out a cry.\n*if counter>2\n *if strength>=40\n  *set opponent -20\n  *goto check\n *else\n  *if strength>=25\n   *set opponent -10\n   *goto check\n  *else\n   *set opponent -5\n   *goto check\n*else\n *goto check\n \n\n*label check\n*if life>0\n *if opponent > 0\n  *goto figt\n *else\n  *goto wincheck\n*else\n *goto loss\n \n*label wincheck\n*if(life\u003c50)\n\n *goto rest\n \n*label rest \n*set life +10\nWith a final blow you take down your opponent. You look around. You have sent a message. No one will mess with you now. You walk back to your cell. A few minutes later, the old man comes in. \"That was a good thing you did. That guy deserved it. The names Tom. Tommy Slane.\" \n*choice \n #Ignore him\n  Oh! Now he wants friendship! You ignore him.\n  *set strength +10\n  *set intelligence +10\n  *goto escape\n #Befriend him\n  *set slane 1\n  *set mil2 1\n  *set mil +1\n  \"Klaw. ${name} Klaw.\"\n  \n  \"I know. They say you are a police officer.\"\n\n  \"I was. Now I am just another criminal.\"\n\n  \"What happened?\"\n\n  \"Thought I was smart. Tried to make a bit of cash on the side. But the word reached the authorities and here I am. But why are you here?\"\n\n  \"I am to be released in a few months. They think I am no longer a threat. So shifted me here.\"\n\n  \"I see that. But why did they imprison you?\"\n\n  \"I was a White Wolf.\"\n\n  \"A White Wolf?\"\n\n  \"You haven't heard of them, have you?\"\n\n  You shake your head. It may be better to act ignorant and gain info.\n\n  \"You know kid, there was once a time when this city was not as crooked as this. Gangsters used to have a code then. Certain crimes were not to be committed. Those were the days of the White Wolves. Clive Morgan was our leader. He loved Old Camp. He cared for its poor. All those who were denied of justice came to the Wolves and the wrong was swiftly made right. Old Camp was a city of peace. That was until the Death Dealer came. That rogue gained the trust of Clive's son and then back stabbed his own master. They say he tortured them for days. He handed the Morgan women over to his barbaric goons. After each one of those double crossing bastards had satiated their lust, they threw the bodies to the hungry hounds. As for Clive Morgan his fate was even worse. The Death Dealer starved him for a few days and then gave him some stew. He repeated this for over a month, barely keeping him alive. Then one day the old man found a finger in the stew. His own son's finger! They say Clive killed himself by breaking his head against the wall. But Derek Jones will pay for his crimes. He made a big mistake when he let a wounded wolf live. Morgans don't forgive! He should have known that.\"\n\n  \"He spared one?\"\n  *page_break\n  \"No. One escaped. Young master George.\"\n\n  \"How did he escape?\"\n\n  \"Master George was the youngest son of Clive. When he was two, he was taken critically ill. His mother prayed fervently and pledged her child to the Lord. The child miraculously recovered. The boy was to become a priest, she said, so as to undo the sins of the family. The child was sent to a seminary at a young age. Derek didn't know of him.\"\n\n  \"So, where is this George now? Did he become a priest?\"\n\n  \"I do not know. Some say he did. But others say he is waiting. Waiting for the right time. The day will come when the Lone Wolf shall return and take revenge for the blood that has been shed.\"\n\n  You dismiss it as the tale of an old man who basks in the glory of his bygone days. But still you have a doubt. Why is this mission called Operation Lone Wolf? Is it a mere coincidence? Or does the Chief know more than what he told you?\n  \n  *set intelligence +10\n  *set strength +10\n  *set respect +10\n  *goto keys\n\n*label loss\n*set life +20\nWith a final blow he knocks you out. When you regain your senses, you are back in your cell. The old man looks at you. \"It seems you haven't had much hand to hand combat.Do you want some advice, kid?\"\n*choice\n #Take advice from the old man.\n  *set slane 1\n  He tells you how to watch and respond according to the opponents move.\n  \n  \"Read his body language. Observe his arms, eyes and legs. They will reveal his mind.\"\n  *set intelligence +10\n  *goto keys\n #You were weak. Increase your strength. \n  You pay no heed to the old man. You workout and increase your strength. \n  *set strength +20\n  *goto escape\n \n*label keys\nAs the days pass, your friendship deepens. You recount your days as a police officer. He tells you about his days as a master thief. \"Listen, kid. Every lock is like a scrambled word. You gotta think and carefully put each letter in its place. And the lock will open.And remember if you ever manage to get out of here give me a call. My number is XXXXXXX955.\"\n*goto escape\n\n*label escape\n*page_break\nA month passes. Luke ensured that no one bothered you after the first day. But you can't wait to get out. The trial went against you as expected. Lily wanted it to look as a real case not a staged drama. The media ensured that you get the title of the most corrupt man in Old Camp. The jury sentenced you to three years in prison. The trial is over and you are to be transferred to a maximum security prison in Nest County.\n\nIt is the day of the prison transfer. You are handcuffed and taken to the prison van. There are four other prisoners. You recognize one of them. Rick Angels. He is the right hand man of Derek. You wonder how you are going to escape. With dread you think of what would happen to you if you fail to escape. Three years in maximum security prison doesn't seam rosy. Especially not for an ex-cop. Other than the four prisoners, there are three guards. You hope Lily's plan works.\n\nAs the van reaches the middle of a highway, a Lamborghini overtakes it, followed by a Ferrari. Soon enough gunshots are heard. The van suddenly crashes onto something. You hit your head. For a moment all you can hear is a buzzing sound. It is rudely interrupted by an explosion. In a blur, you see armed men enter the van. BANG! BANG! The prison guards are killed. The hijackers then release Rick.\n*choice\n #Ask for help\n  *gosub end_trial\n  You decide to ask for help. Rick turns around. He comes near you. For a moment you think you made the right choice.\n  \n  \"Why should I help you?\" he asks.\n  \n  *if((neg=1) and (intelligence>20))\n   \"We can share the heat.\" you quip, \"Do you want the whole force on your tail?\"\n   \n   Rick thinks for a moment then raises his gun.\n   *goto esc\n  *else\n   \"Because I am a fellow con?\"\n   \n   Rick chuckles and then hits you on the face. You lose consciousness. You wake up a few minutes later.\n   *set try 2\n   *goto lock\n #Try to get out\n  *gosub end_trial\n  You try to get out. But you find you are handcuffed to the rail. You must unlock it before you can escape.\n  *goto lock\n \n*label esc\n*fake_choice\n #Beg for mercy\n #Say your prayers\n #Look into his eyes\nRick fires the gun. The handcuff brakes.\n\n\"Good luck, evading the cops.\" he shouts as he gets into the waiting Ferrari.\n\nYou smile. Fool! He forgot about the body they dumped in the van to make it appear as if no one escaped. You put your jacket over the body and make a run for it. This van is about to blow. You are only a few feet away before the van explodes.\n*goto_scene chap1 \n \n*label lock\n*if (try=0)\n You look closely at the lock. You see the letters: \n *goto try\n*else\n *if(try=1)\n  You watch Rick escape. Its only a matter of time before the cops arrive. You have to try harder.\n  *goto try\n *else\n  *if(try=2)\n   You here the sirens in the distance. If you don't get it right this time, you are going back to prison.\n   *goto try\n  *else\n   *if(try=3)\n    The police arrive in the scene. You are still stuck in the cuffs.\n    *goto jail\n\n  \n*label try\nLKUOCN\n*input_text answer\n*if answer= \"UNLOCK\"\n *goto free\n*else\n  *set try +1 \n  *if (try\u003c4)\n   *goto lock\n  \n*label free\n*if (try=3)\n The police cars are approaching. In a final attempt, you unlock the cuff. You get out of the van and run in the opposite direction. Behind you the van explodes. You here a cop shouting at you to stop. You do not pay heed. You run for your life. Suddenly you feel a shot of pain in your leg. You fall to the ground. You lose consciousness.\n *goto jail   \n*else\n You manage to unlock the cuffs in time. You hastily make your escape. Behind you the van bursts into flames. Evidently Derek doesn't leave any loose ends. \n *goto_scene chap1\n\n*label jail\nYou are now in a maximum security prison. You have been sentenced to three years in prison. You had a dream job, a beautiful girl and the perfect life. You should never have accepted this god-forsaken mission.\nGAME OVER\n*goto_scene ending\n\n*label end_trial\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n  *label purchased\n  *return\nRemember earlier how we told you that the first two chapters are available for free? This is the end of the free content.\n\n[b]To find out what happens next, please purchase the remaining chapters.[/b]\n\n*purchase adfree $2.99 purchased\n*abort", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set life 100\n*set strength 30\n*set intelligence 10\n*set respect 0\n\nYou make up your mind and take a step forward when suddenly, you hear a gunshot, followed by the yell of your partner. You turn around quickly. The kidnapper is standing in the entrance of the room holding Sophie as a human shield. Sam is on the floor. She has been shot on the arm. You point your gun at the kidnapper, ready to pull the trigger. You know him well. Of course, who doesn't? Its Jacob Scarr. A gangster who has been orchestrating kidnappings all his life. Yes, this is not his first crime. He has been in and out of prison his whole life. He was released from prison only a month ago. The guy wouldn't think twice before pulling that trigger. He already made his intent clear by shooting Sam. \n\n\"Freeze! OCPD! Let the hostage go!\" you warn him.\n\nScarr doesn't even flinch. \n\n\"Put your gun down, Officer or I will shoot this bitch.\"\n\n\nYou stare into his eyes. There is murder written in it. What should you do? If you put the gun down, you are a sitting duck. You would be dead in a minute. If you don't, it won't end well for Sophie. You have to make a choice. What will you do?\n*fake_choice\n #Put the gun down\n #Hold your position\n #Admire Sophie\n\n*script changeBackgroundColor(\"black\")\n\n*set life 80\n*set strength 50\n*set intelligence 35\n*set respect 15\n\n*set sophie 1\n*set phone 1\n*set slane 1\n\n*set mil1 1\n*set mil2 1\n\nYour days in the police force ensured that you know Old Camp like the back of your hand. You know the patrol routine of the police. You know the criminal hangouts. You know every street and dark alley in Old Camp.  You are making your way to Cheapstakes when you here a cry from a back alley near you.\n*fake_choice\n #Its none of your business\n #Go see what it is\n \n*script changeBackgroundColor(\"sepia\")\n\n*set life 20\n*set strength 50\n*set intelligence 35\n*set respect 10\n\n*set sophie 1\n*set phone 1\n*set slane 1\n\n*set mil1 1\n*set mil2 1 \n\nWith one final punch, you bring down your opponent. You cherish the moment of victory. Suddenly someone throws a knife. \"Kill him! Kill him!\" shouts the crowd.\n*fake_choice\n #Kill\n #Spare\n\n*set traitor \"Pablo\"\n*set daughter \"Isabel\"\n*set life 80\n*set strength 50\n*set intelligence 35\n*set respect 30\n\n*set sophie 1\n*set phone 1\n*set slane 1\n\n*set mil1 1\n*set mil2 1 \nThe street is quite empty or so you thought. Just then you see too cars arrive at the front of the factory. Around fifteen well armed men arrive. They may not be the cops, but you know that they are equally dangerous. You are about to fire the shots when the firing starts within the factory. The armed men split into groups of five. One goes towards the back where ${traitor} is. Another to the flanks where ${daughter} is. The last group stands guard at the front blocking the last exit. You know that if ${daughter} and ${traitor} are not warned, they stand no chance against a rear attack. But there is not enough time to warn both of them. So, its time for you to make a choice.\n*fake_choice\n #Save ${traitor}\n #Save ${daughter}\n\n*set traitor \"Lee\"\n*set daughter \"Crystal\"\n\n*set life 130\n*set strength 50\n*set intelligence 45\n*set respect 30\n\n*set sophie 1\n*set phone 1\n*set slane 1\n\n*set mil1 1\n*set mil2 1 \n\nWhen you wake up next morning, there is a man in your room. ${traitor}. He smiles at you. You look at ${daughter}. She is still asleep.\n\n\"I always knew that you were a tiger, Klaw. I am impressed and that's why I haven't killed you yet. I thought it befitting for you to decide your fate.\"\n\nHe throws a knife at you. \n\n\"Do me a favour. Kill her and I will let you join my gang.\"\n*fake_choice\n #Kill her\n #Kill yourself\n #Kill ${traitor}\n\n*set life 120\n*set strength 50\n*set intelligence 40\n*set respect 40\n\n*set sophie 1\n*set phone 1\n*set slane 1\n\n*set mil1 1\n*set mil2 1  \n\nYou decide to call in a few favours. You lost your mobile during the firing. So you no longer have the contact list. You decide to use the telephone in the Church.\n\nDial the no. : X X X X X X X _ _ _(000 to exit) \n*input_text number\n\n  \n\n  \n", "startup": "*title The Gangs of Old Camp\n*author Amith Shaju\n\n*scene_list\n  startup\n  prologue\n  $ chap1\n  $ chap2\n  $ daughter\n  $ chap6\n  $ chap7\n  $ chap8\n  $ traitor\n  $ clinic\n  finish\n\n*create life 100\n*create money 50\n*create answer \"LOCKED\"\n*create respect 0\n*create bullet 6\n*create skill 0\n*create try 0\n*create card \"Null\"\n*create leader \"NULL\"\n*create traitor \"NULL\"\n*create daughter \"NULL\"\n*create gang \"NULL\"\n*create strength 0\n*create intelligence 0\n*create story 0\n*create enemy \"thug\"\n*create opponent 100\n*create move 1\n*create counter 1\n*create number \"NULL\"\n*create lover \"Kate\"\n*create name \"David\"\n*create four 0\n*create checkpoint 0\n*create tlife 0\n*create tstr 0\n*create tint 0\n*create tres 0\n\n*create tmil 0\n*create mil 0\n*create mil1 0\n*create mil2 0\n*create mil3 0\n*create mil4 0\n*create mil5 0\n*create mil6 0\n*create mil7 0\n*create mil8 0\n\n\n*create sharp 0\n*create neg 0\n\n*create nleader \"NULL\"\n*comment Dan deleted duplicate *create variables -- they're not case sensitive\n*comment *create he \"he\"\n*comment *create his \"his\"\n*comment *create him \"him\"\n*create He \"He\"\n*create His \"His\"\n*create Him \"Him\"\n\n*create apex 0\n*create grave 0\n*create phone 0\n*create sophie 0\n*create wolf \"NULL\"\n*create felix 0\n*create luke 0\n*create truth 0\n*create love 0\n*create bomb 0\n*create kill 0\n*create file 0\n*create slane 0\n*create priest 0\n*create bill 0\n*create mobile 0\n*create crates 0\n*create callbill 0\n*create callslane 0\n*create room 1\n*create dimit 0\n*create bath 0\n\n*set skill 100\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  *image cover.jpg right\n  \n  Embark on the deadliest quest of your life. Death awaits you at every corner. Battle thugs, find love, solve puzzles and piece together the story to unravel the mysterious mastermind. Is the legend of the Lone Wolf a mere myth? Will you come out with your soul unscathed? Or will you become the very monster you planned to bring down? Do you have what it takes to complete all eight milestones? Find out in this action packed interactive tale of love, duty and betrayal. \n\n  [i]You can play the first two chapters of the game for free. Purchase the rest of the game below.[/i]\n  *if choice_is_advertising_supported\n    [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n  *purchase adfree $2.99 purchased\n  *label page_break\n  *if choice_is_advertising_supported\n    *page_break_advertisement\n  *if not(choice_is_advertising_supported)\n    *page_break Play Now for Free\n\n\n*label purchased\n\n\nWelcome, Officer.\n\nIts time to go undercover! So choose your skills wisely because you will be stuck here for a long time. Make your decisions carefully. Some may seem to have no immediate impact. But who knows what the future has in store for you? \n\nHere is a small tip in skill selection.Intelligence will make more data available to you. Strength will increase the damage caused by your attacks. Respect will help you influence people. (Please enter all answers except your name in BLOCK letters).\n\nSo, get ready to break some rules!\n*page_break\n\nEnter your first name:\n*input_text name\n\n\nName       : ${name} Klaw\n\nOccupation : Police Officer, OCPD\n\nCity       : Old Camp\n\nYou regularly visit the\n*choice\n #mall\n  You like to spend most of your free time in the mall. You are always stylishly dressed and keep up with the latest fashion trends.\n  *set respect +20\n  *goto off\n #library\n  'Knowledge is Power' is your motto. You spend your free time in the library gathering information ranging a whole lot of fields. Your colleagues think you are a bookworm but who cares? \n  *set intelligence +20\n  *goto off\n #gym\n  You believe that brawn trumps brain. In the field, strength and agility is what keeps you alive. So you regularly workout at the gym and keep your body in fine shape.\n  *set strength +20\n  *goto off\n\n\n*label off\n\n*line_break\nOn holidays you visit the\n*choice\n #gym\n  You also go to the gym on your holidays. A few additional muscles always come in handy.\n  *set strength +10\n  *goto offi\n #library\n  You spend your holidays going through crime archives trying to learn the criminal mindset.\n  *set intelligence +10\n  *goto offi\n #mall\n  You spend your holidays attending social gatherings and often spend your nights partying. \n  *set respect +10\n  *goto offi\n*label offi\n\n*line_break\nDuring your training days, you took a special course to hone your\n*choice\n #negotiating capabilities\n  *set intelligence +10\n  *goto negclass\n  \n #sharp shooting skills\n  *set strength +10\n  *goto shootclass\n*label negclass\n*set neg 1\n*if(intelligence>25)\n You had taken a lesson on criminal psychology and you are the best negotiator the department has.\n *goto hostage\n*else\n *if(intelligence>15)  \n  You are quite alright but your instructor feels that there is lots of space for improvement.\n  *goto hostage\n *else\n  You should never have signed up for this course. Thats what the instructor thinks.\n  *goto hostage\n\n*label shootclass\n*set sharp 1\n*if(strength>25)\n You are an expert marksman and adept at using all sorts of guns. And to add to your skills, you are ambidextrous.\n *goto hostage\n*else\n *if(strength>15)\n  You are quite good with the gun and can hit the target within a certain range.\n  *goto hostage\n *else\n  Your instructor suggests you use the gun only to threaten. You seem to be a bad shot.\n  *goto hostage \n\n\t\t\n*label hostage\n\n*page_break\n\n\nYou and your partner, Samantha Storm, enter the old house. Someone had kidnapped Sophie, daughter of Thomas Rutherton,the CEO of Loew & Rutherton's. Since the billionaire businessman literally owned half the city, the Chief put the top cops in Old Camp on the case. That means you and Sam. An hour ago, the kidnapper called Mr.Rutherton and demanded one million dollars in cash as ransom. You were able to successfully trace the call to this house.\n\nWhoever the kidnapper is, he is a dangerous man. So you search the rooms cautiously, guns on the ready. The living room is empty. The cobwebs have gathered and the paint is peeling off. It seems no one has lived here for ages. Maybe you came to the wrong house. You look at your partner. The look in her eyes tell you that she is having the same thought. You make your way to the next room. The hall too looks old and unused. You find that there is a door which seems to be leading to the kitchen and a staircase which leads to the next floor. Where do you search first?\n*choice\n #Kitchen\n  You decide that its best to check the ground floor before you go up. \n  \n  \"Sam, stay here while I check the other rooms. Be on the ready.\"\n  \n  \"OK, ${name}.\"\n  \n  You cautiously search the kitchen. There seems to be no one there but there is something on the table.\n  *goto down\n #Upstairs\n  You decide to first go upstairs. Something tells you that you will find the kidnapper there. Call it a cop's intuition.\n  *goto up\n  \n  \n*label down\n*choice\n #Take a closer look\n  A half filled glass of beer and some leftovers in a plate. Someone was in this room a few minutes ago. Chances are that he/she is still here. Most probably they saw you and went to get the hostage. You decide to try your luck upstairs. You go back to the dining room where Sam is waiting impatiently for you.\n  \n  \"I heard footsteps from above.\" She informs you. \n  *line_break \n  *goto up\n #Go back \n  You decide that there is nothing useful here. Most probably the kidnapper has left with his victim. That phone call might have been used to mislead the police. Anyway, it won't do much harm checking upstairs. You go back to the dining room where Sam is waiting impatiently for you.\n  \n  \"I heard footsteps from above.\" She informs you.\n  \n  *line_break\n  \n  *goto up\n\t\n  \n*label up\nYou reach the top. There are three doors. One to a bedroom. Another to a study. The last to a closet. Where would the kidnapper be?\n*fake_choice\n #Bedroom\n #Study\n #Closet\n*page_break\nYou make up your mind and take a step forward when suddenly, you hear a gunshot, followed by the yell of your partner. You turn around quickly. The kidnapper is standing in the entrance of the room holding Sophie as a human shield. Sam is on the floor. She has been shot on the arm. You point your gun at the kidnapper, ready to pull the trigger. You know him well. Of course, who doesn't? Its Jacob Scarr. A criminal who has been orchestrating kidnappings all his life. Yes, this is not his first crime. He has been in and out of prison his whole life. He was released from prison only a month ago. The guy wouldn't think twice before pulling that trigger. He already made his intent clear by shooting Sam. \n\n\"Freeze!OCPD!Let the hostage go!\" you warn him.\n\nScarr doesn't even flinch. \n\n\"Put your gun down, Officer or I will shoot this bitch.\"\n\n\nYou stare into his eyes. There is murder written in it. What should you do? If you put the gun down, you are a sitting duck. You would be dead in a minute. If you don't, it won't end well for Sophie. You have to make a choice. What will you do?\n*choice\n #Put the gun down\n  You put the gun down hoping against hope that he will release Sophie.\n  *goto death\n #Hold your position\n  You decide not to give away the only leverage you have.\n  *goto decision\n #Admire Sophie\n  Even though she is frightened and in deep shock, you can't help noticing that she is a beauty to behold. Even in such a tense moment you just can't pull yourself from enjoying her flawless body. The deep blue eyes. The flowing golden hair. Those little red lips. Your heart skips a beat. She is an absolute angel. For a moment you wish you were not engaged, with Scarr... and also to your fiancée.\n \n  Unfortunately for you, your present situation doesn't give you the luxury of ogling a young lady. Scarr sees that you are distracted and makes his move. He takes a shot at you. Lucky for you, he can't take a good aim because of Sophie. The bullet strikes you on the arm but the wound is not fatal. Now might be a good time to act.\n  *set life -15\n  *goto decision\n\n\n*label death\n\nYou hear a gunshot. You feel your whole body go numb. Your uniform is soaked in blood. Your head feels light and you feel the ground slipping under your feet. Before you lose consciousness you hear another gunshot. Sam was shot on the head. It must have been a quick death. You hit the floor. You see Sophie's face. Fear written all over her face. You failed her. You failed Sam. You failed them all.\n\nGAME OVER\n*goto_scene ending \n\n*label decision\n\n*line_break\nFrom the corner of your eye you see Sam wince in pain. Obviously, she is in no condition to assist you. Sophie looks into your eyes pleading to save her. Scarr has murder in his eyes. He won't think for a moment before he pulls that trigger again. You have to make a decision and fast!\n*choice\n #Take a shot\n  *if (strength >=20) and (sharp=1)\n   *set intelligence +5\n   *goto goodshot\n  *elseif strength>=10\n   *set strength -5\n   *goto medshot\n  *else\n   *goto badshot\n #Negotiate\n  *if (intelligence >=20) and (neg=1)\n   *set intelligence +5\n   *goto goodneg   \n  *elseif intelligence >=10\n   *set intelligence -5\n   *goto medneg\n   \n  *else\n   *goto badneg\n\n*label goodshot\n\n*line_break\n*set bullet -1\nYou take the shot. It hits Scarr on the head. He drops dead with a thud. Clearly he didn't expect it. Poor guy. He should have surrendered while he had the chance. Sophie breaks down. You gather her in your arms and comfort her. You then call the Chief and update him with the situation. You check on Sam. The wound is not severe. Soon the paramedics arrive. Mr.Ruthertron is grateful for what you have done. He promises to ensure a fast recovery for Sam.\n*goto p0\n\n*label medshot\n\n*line_break\n*set bullet -1\nYou take the shot. But only an expert could have hit the target from this range. The bullet misses Scarr by an inch. Damn, you should have practised more.\n\n\"Is that all you can do, Officer?\" asks Scarr.\n\nHe bursts into laughter, giving you time to make a quick decision.\n*goto quick\n\n*label quick\n*choice\n #Shoot\n  *if strength>=15\n   *goto goodshot\n  *else\n   *goto badshot\n #Negotiate\n  *if intelligence>=15\n   *goto goodneg\n  *else \n   *goto badneg\n\n*label badshot\n\n*line_break\nYou take the shot. But you never really learned to shoot properly. So the bullet hits the head...the head of Sophie Rutherton. She drops dead instantly. You are horrified at what you have done. You should never have taken that shot if you were not cent per cent confident. Now you are a murderer. But luckily, you don't have to live with it. While you are still recovering from the shock, Scarr makes his move.\n*goto death \n\n*label goodneg\n\"Officer, don't take a step closer or I will shoot her.\" growls Scarr. \n\n\"Go ahead, Scarr. Shoot her. I don't care. Right now all I want to do is kill you. You crossed the limits when you shot my partner.\"\n\n\"Stay back, Officer.\" \n\n\"Shoot her, Scarr. Then I will get a medal for killing you. I said shoot her.\"\n\nScarr panicks. He pushes the hostage aside to take a good shot at you. But you were prepared.\n*goto goodshot\n\n*label medneg\n\n*line_break\n\"Don't do anything stupid, Scarr. If you pull that trigger, you are a murderer. You will be sentenced to death. Think of your family, Scarr.\"\n\n\"I don't have a family, Officer.\"says Scarr with a laugh. Then for a fraction of a minute, his mind wanders to a far off place giving you time to make a quick decision.\n*goto quick\n\n*label badneg\n\n*line_break\nYou open your mouth to say something. But nothing comes to your mind. You should have taken the negotiation classes more seriously. As you chide yourself for missing those classes, Scarr takes his aim.\n*goto death \n\n*label p0\n*page_break \nThe alarm rings. You wake up and look at the time. Its 7 o'clock. You look at the date: 8th February 2016. You realise that today is your birthday. You just turned \n*choice \n #23\n  You just turned 23. You look at your badge which is placed neatly on your table. You are just getting acclimatised to your job. You may not have the experience of your colleagues but you strongly believe that you have what it takes to make your name in this city. Well, that will be your birthday resolution. Criminals beware! \n  *set strength +5\n  *goto p1\n #27\n  You just turned 27. You look at your badge which is lying on the table with a few other things. You remember how you joined the force as an enthusiastic lad. It has been five years now and you still haven't made your mark. Maybe this is your year, you say to yourself. You were young then. Inexperienced. But now you have experience on your side and the strength to put it into use. Yes, the time has come. The time to make a name.\n  *set strength +2\n  *set intelligence +2\n  *goto p1\n #32\n  You just turned 32. Now where did you put that badge of yours? You search for it on the table. You can't find it. You open the drawer. Its not there. Then you see it lying under the bed. You pick it up and place it on the table. You have served the force for ten years now. You have gained a lot of experience. But time has robbed you off your enthusiasm. That vigour which you had in your early days is now missing. The only regret you have is that you have still not made your name. But who knows what the year has in store for you?  \n  *set intelligence +5\n  *goto p1\n  \n*label p1\n*line_break\n\nYou go to the bathroom. Look at yourself in the mirror. You decide to \n*choice\n #Take a minute for some self indulgence\n  *goto p2\n #Finish your daily chores and get straight to work\n  *goto p3\n  \n*label p2\nYour hair is \n*fake_choice \n #Black \n #Brown\n #Golden\n #Red\nYou wonder whether its grown too long and decide that\n*choice\n #it hasn't. \n  You like to have long hair. That means you can choose any hairstyle you want. After all, your wedding is just a few months away. \n  *goto p4\n #it needs to be cut short\n  You hate it when your hair grows long. You make a mental note to visit the hair saloon and get it cut short. That way, you want have to waste your time combing your hair.\n  *goto p4\n #its time to get a new style\n  You decide its time for a cooler hairstyle.  You make a mental note to visit the hair saloon in the evening.\n  *goto p4\n\n*label p4\nYour skin is\n*fake_choice\n #dark\n #light\n #fair\n #olive\nand you are proud of it. You are no racist but you believe that its the best colour any skin can have. Then you take a look at your body.\n\n*line_break\n*if(strength>25)\n All those time in the gym has really paid off. The muscles are quite visible. You flex your muscles for a moment, admiring the biceps.\n *goto p5\n*else\n *if(strength>10)\n  You have a healthy and fit body but its time you spend some time in the gym and got a few muscles.\n  *goto p5\n *else\n  You realise that you have been neglecting your fitness. You have begun to put on some weight. Its time you paid a visit to the gym.\n  *goto p5 \n \n \n*label p5\n*if(intelligence>20)\n The hours you spent bend over books and files have taken a toll on your eyes. You now wear specs. Should you keep it or should you switch over to lens? You wonder which would better suit your\n *fake_choice\n  #blue eyes.\n  #black eyes.\n  #green eyes. \n  #brown eyes.\n You look at the time. That's enough! Its time to get to work. You hastily finish your daily chores and get to work. \n *goto p3\n\n*label p3\n*line_break\n\nOn your way to work, you check your smartphone. Birthday wishes have been pouring in from your friends and colleagues. Your fiancée has sent a beautiful selfie holding a birthday cake. It sort of makes your day. Katherine Walker is the best thing that has happened to you. Kate is \n*fake_choice\n #a teacher in the local school.\n #a supermodel.\n #a waitress in the local pub.\n #an employee in an IT firm.\nYou first met each other in a friend's party three years ago. You were 'just friends' at first, then 'best' friends but finally you found your courage to propose to her. It came as quite a surprise to you when she accepted your proposal. You always thought her as an independent woman who didn't believe in the institution of marriage. But who are we if we do not have someone to call our own? The marriage is scheduled to take place in a month's time and both of you are busy making plans for the future. You were so immersed in your thoughts that you didn't realise you had reached your office.\n*goto office\n\n\n*label office\n*page_break\n\n*line_break\n\n\n\"${name},the Chief wants to have a word with you.\" says Officer Williams as you enter your office.\n\nWhat could it be? You wonder. Maybe another case. You are already a local hero after the Rutherton case. You have solved three high profile cases in the last two months. You enter the Chief's office with enthusiasm. \n\nChief Felix Goldman is a hard task master or so they say but to you he is more of a fatherly figure. You have known him since your days in the Don Bosco Orphanage. He was one of its generous patrons and also your sponsor. He was the one who urged you to become a police officer and has been keeping a keen eye on you ever since you joined the force. He is in his fifties and nearing retirement.\n\nHe always has a sad forlorn look in his eyes.He lost his only son in an accident. That was a long time ago. He doesn't talk about it. No one knows the exact details of the event but since that day Goldman has been working day in and day out to make the city a better place.\n\n\"Sit down,${name}.\"\n\nThe Chief puts a file in front of you. OPERATION LONE WOLF.\n*page_break\n\"Son,I know that you have planned your wedding for this March so I am not going to force you. But the people in this city will forever be in your debt if you accept this mission.\"\n\n\"What do you want me to do, Chief?\"\n\n\"The crime in this city is growing day by day. If we don't check it now, it will consume the whole city. I want you to go undercover and infiltrate the criminal network. The Death Dealer must be brought to justice. You are the only one I can trust this mission with, ${name}.\"\n\n\"The Death Dealer?\"\n\n\"He is the most wanted man in Old Camp. We have got reliable information that he is plotting to take over all the other gangs in the city. If that happens, he will be unstoppable.\"\n\nYou think for a moment. Your wedding is coming up in a month. If you accept this case you will have to call off the marriage. Yet the Chief is right. Crime in this city is on the rise. You have to nip it in the bud or else it will destroy the city. Its a choice between love and duty. What do you choose?\n\n*choice\n #Decline the case.\n  *goto william\n #Accept the case.\n  *goto derek\n   \n*label william\n*page_break\n*set respect -10\n\n\"Chief,I cannot accept this mission. My family is more important to me. I love Kate. I can't afford to lose her.\"\n\nYou reject the case. The Chief understands you and puts no further pressure. He reluctantly gives the case to Officer Williams. Two weeks later, Williams ends up dead.\n\nYou can't believe Williams is dead. He was a good man. He had a family too, a wife and three kids. Yet he put his duty above all else. Had you done yours, he would still have been alive. A part of you cries for vengeance. Yet there is another part of you- the one who is about to be married which doesn't want you to take the case. Had you chosen the case, it would be you who would have ended up dead. Declining this case was a wise decision, it says. Again you are in a dilemma.\n*choice\n #You seek vengeance. You accept the case.\n  *goto derek\n #The case is too dangerous. You are happy you didn't take it.\n  *goto misery\n\n\n\n*label misery\n*page_break\n\nYou marry Kate and lead a happy life. The crime in the city grows. But that is for others to worry about. You are a happy man and that is all that matters to you. What do you care about who runs the underworld? \n*page_break\nFive years have passed. Now you are leading a contented life with Kate and your 2 kids. Some days you still think of the case you declined. The one case that you ever declined in your life. You think it was the best decision you ever made. Going after a street thug was just not worth losing Kate. You live a satisfied life. That is until that fateful Friday when you hear the dreadful news that your family has been kidnapped by the Blue Bloods. A futile rescue attempt results in the death of your wife and kids. You swear vengeance against the culprits. But the Blue Bloods are too powerful now. They are untouchable. Their leader is the most dreaded criminal that Old Camp has ever seen. Derek \"Death Dealer\" Jones is the uncrowned king of the city. The fact that he was the very gangster you were meant to bring to justice five years ago does not ease your pain! You retire from the force and take to drinking. In the end, you die in a back alley sad and lonely.\n\nGAME OVER\n*goto_scene ending\n\n\n*label derek\n*page_break\n\n\"I am ready to take the case, Chief.\"\n\n\"Good. You will be working with Officer Luke Harrison and Officer Lily Chan. Now this is a top secret mission. Only the four of us know about it and I would like it to remain that way. Not a word to Kate, do you understand? Here is your file. Best of luck, ${name}.\"\n\nYou open the file. Derek \"Death Dealer\" Jones. He is your target. A stone hearted killer, he is known for the brutality with which he deals with his enemies.He first kills the family of his foes right before their eyes and then tortures them to death. This guy is a killing machine.             \n\nDo you want to go against such a dreadful criminal? You may end up losing your life. You could still choose to decline the case and lead a happy married life with Kate.\n*choice\n #Accept the case.\n  *goto greg\n #Decline the case.\n  *goto misery\n\n*label greg\n*page_break\nYou cannot back out now. No. You have accepted this case, now everything else is secondary. You make your way out of the room and go to meet your new partners. You have heard a lot about Officer Harrison. Honest, smart and hard working. They say he is the most dedicated officer in town. You could never have asked for a better partner. As for Officer Lily Chan, you do not know much about her except that she is a covert ops specialist. She is one of those elite officers who knows everything about you and yet of whom you know nothing. \n\nYou enter the conference room a bit tense. This is your entry into the big league. You see the two officers talking to each other. You appraise them. Luke is a man in his late forties. There is a determined look in his face. He was once the poster boy of the Police Department. But age seems to have taken its toll. He no longer seems to have any enthusiasm for his work. Still he is a master strategist and an asset to have on your side. As for Lily, she is the exact opposite of Luke. A woman in her mid thirties, she looks pretty young for her age. She is smart and charming. There is an Oriental touch to her features. She smiles at you and waves you in. \n\nAfter the introductions and other formalities are over, Luke begins the proceedings.\n\n\"OK, Klaw, I hope you are ready for this. The Blue Bloods controls the centre of Old Camp.\" \n\n\"The Blue Bloods?\"you ask.\n\n\"Thats what Derek's gang call themselves.\" clarifies Lily.\n\n\"As I was saying, the Blue Bloods control the central part of the city, the Grand Central region. There are four other smaller gangs in Old Camp. The Red Dragons, The Green Hammers, The Black Panthers and The Golden Cross. The Red Dragons are based in the harbour region around Port Seamoor. The Green Hammers are based in the Hill Park region. The Black Panthers control Down Town. The Golden Cross is located in Starry Sands. You will find a detailed report on all the gangs in your file.\" He points to the file you are carrying.\n\n\"But how do I infiltrate the Blue Bloods?\" .\n*page_break\n\n\"That's the hard part. Derek doesn't take in newcomers. You will have to built your reputation slowly and climb up the criminal ladder.\" adds Lin.\n\n\"That's the usual way, isn't it?\" you ask.\n\n\"Yes, but the trouble is, how will you make your reputation? You can't do crimes in Grand Central without Derek's permission. Its his territory. He doesn't like intruders. Only the Blue Bloods have the right to Grand Central. Atleast that's what he says.\" says Harrison.\n\n\"Then that seems to be the perfect way to built my reputation.\"\n\n\"Yes, you can make a reputation alright. But Derek doesn't take such guys in his gang. Instead, he makes an example out of them. Believe me, you don't want to be one of his examples.\"\n\n\"Then what's the plan?\"\n\n\"You infiltrate one of the other four gangs. Its a lot more easier. They jump at the chance to hire any new thug in town. All you have to do is go to Cheapstakes Bar and start a fight. The gangs always have their eye out for fresh talent. If you manage to impress them, you will get a call.\"\n\n\"That sounds simple. So what's my new identity?\" \n\nLily looks at you and gives you a wicked smile. Luke gives a nod to Lily . \n\n\"Thats the beauty of the plan. You will go as ${name} Klaw.\" she reveals.\n\n\"What? Are you crazy? They will shoot me straight away.\"\n\n\"Look, ${name}, you have been quite popular these past few months, especially after the Rutherton episode. The papers have been splashing your face on the front pages. Nearly everyone in Old Camp will recognise you. So making a false identity will only get you into trouble. The gangs only need to Google your pic to find out all about you. Concealing your identity is pointless. We no longer live in the seventies. Its the Internet age. Fake identities will get you no where. You have got to improvise.\"\n\n\"Then, how do I infiltrate the gangs? Should I go to the boss and introduce myself as 'Undercover Cop ${name} Klaw'?\"\n\n\"No. Just read the file. The whole plan is in it. Burn the file after you read it.\" says Luke in a stern tone.\n\n\"All the best, ${name}.\" adds Lily .\n*goto kate\n\n \n   \n*label kate\n*page_break\nYou decide to take the case even though it sounds like a suicide mission. Your duty is more important to you than your happiness. If people don't do there duties, the world turns into chaos. You are sure Kate will understand.\n*choice\n #Say goodbye to Kate\n  *set respect +10   \n  You go to Kate's apartment. She opens the door enthusiastically. She is busy making the wedding plans.\n\n  You look at Kate knowing very well that this might be the last time you will see her in a very long time. Ah! Those big hazel nut eyes have always captivated you. She has her splendid brown hair flowing majestically over her shoulders. Standing there in her beautiful red evening dress, she is a delight to the eyes. \n\n  \"Honey, you look upset. Trouble at work?\" asks a worried Kate.\n\n  \"We have to call off the marriage.\" you say knowing fully well that you will break her heart. There is no easy way to say it. So its better to get straight to the matter and get it done with.\n\n  \"What? Wh- What are you saying, ${name}?\" \n\n  \"Look, dear, I love you. So listen carefully. Something has come up at work. I will be out of town for a few days.\"\n  \n  \"Oh, that's all right. I will take care of the wedding plans. You just do your duty. By the time you return everything will be perfect.\"\n  \n  \"I may not make it in time for the wedding.\"\n\n  \"Wait. Is this it? Are you breaking up with me?\" Her eyes were fill with tears. \n  *goto truth\n   \n #Go without saying goodbye\n  *set respect -5\n  You just don't know how to tell this to Kate. She has been so eagerly waiting for this wedding. On second thoughts its better not to tell her. Why scare her by telling her about this dangerous assignment? I'll just leave a note telling her to postpone the marriage and explain everything when I get back.\n  *goto_scene prologue\n  \n*label truth\n*choice\n #Yes. This is it. We are breaking up.\n  You know this is wrong. But you know there is no other way. What has to be done has to be done. You can't jeopardise the mission by revealing it to Kate.\n\n  \"Get out of my house. OUT!!\" She screams at you. You know that she is heart broken. But you didn't have a choice. You walk out of the house wondering whether you are making the right decisions. Is this really what you want to do with your life?\n  *goto_scene prologue\n #No,Honey. I was joking.\n  \"Never ever say such jokes. You frightened me.\" Kate hugs you and gives you a passionate kiss. You decide to make the most of the situation and then leave quietly. Maybe you will tell her some other time.\n  *set respect -10\n  *goto_scene prologue\n", "traitor": "*page_break \nYou decide to save ${traitor}. You see that his star is on the rise. Saving him would be to your advantage. You stealthily make your way to the back of the factory. The sight that greets you there leaves you stunned. ${traitor} is talking to the enemy. Then you realise that he is not talking, he is ordering the enemy! You have a choice to make. One that will set you upon a path from where there is no comeback.\n*choice\n #Warn ${daughter}\n  You realise that if ${traitor} is a traitor then ${daughter}'s life is in grave danger. The whole charade was set up just to kill her. \n  *goto_scene daughter\n #Join ${traitor}\n  You realise that if ${traitor} has made a pact with Derek, then the  days of the ${gang} are over. Its then to your best interest to join the winning side. You put your hands in the air and walk up to ${traitor}.\n  *goto pact\n #Wait and see what happens\n  Another man arrives. Someone you recognise. Rick Angels. This is serious. You must make a decision soon or you will end up dead.\n  *goto join\n  \n*label join\n*choice\n #Join ${traitor}\n  *goto pact\n #Save ${daughter}\n  *goto save\n  \n*label save\n*page_break \nYou run to save ${daughter} but its all over. You see her lifeless body on the ground. You are late. Suddenly you feel the barrel of a gun at the base of your head. You know its all over for you. A figure stands before you. You recognise him immediately. Rick Angels. \n\n\"Who do we have hear? Isn't it the cop that ${traitor} was telling me about?\"\n\n\"You will never get away with this, Rick. When ${leader} finds out, he will kill you.\"\n\n\"By the time he finds out, he will be dead. Tie him up, boys. We don't want him dead yet.\"\n\nSomebody hits you on the head.\n*goto execute\n\n*label execute\n*page_break\nWhen you wake up, you find that you eyes are covered and that you are tied to a pole. Suddenly someone removes the mask covering your face. There is an angry crowd in front of you. They are shouting for your head. ${traitor} begins to address the crowd.\n\n\"Calm down. Calm down. We will have our revenge. This man here, he betrayed us. Killed our leader in cold blood. We trusted him. But he double crossed us. He was in fact an undercover cop and he just proved how bad the cops are. They knew that we all loved ${leader}. They knew they couldn't arrest him. So they hatched this treacherous plot to destroy us. But we will have our revenge. From today, the tyranny of the cops end. We will join the Blue Bloods and get this city rid of every last police officer. Lets begin with him.\"\n\nThe crowd cheers. You are horrified. You just made him a hero and disgraced the force. Damn. You have ruined everything.\n\n\"Thanks for everything, Klaw. Couldn't have done it without you.\"\n\n${traitor} pulls the trigger. \n\nGAME OVER\n*goto_scene finish\n\n*label pact\n*page_break \n\"Ah, who do we have here.\"\n\n\"Look. I want to join you, ${traitor}.\"\n\n\"And why would you want to do that?\"\n\n\"Because I can see where the wind is blowing.\"\n\n\"So you want to join us?\"\n\n\"Yes.\"\n\n\"Well, you will have to do a job first.\"\n\n\"What?\"\n\n\"Kill ${leader}.\"\n*choice\n #Kill\n  You can't say you enjoyed doing it but if you didn't do it, someone else would have done it. Most of the Council members have already changed sides. So you inform the old man of his daughter's death and then put a bullet through his heart. You return to ${traitor} to tell him the news.\n\n  \"Good work, Klaw.\"\n\n  *set nleader traitor\n  *set tlife life\n  *set tres respect\n  *set tmil mil\n  *set tint intelligence\n  *set tstr strength\n  *goto_scene clinic \n #Refuse\n  \"I will never-\"\n\n  Someone hits you on the head.\n\n  \"Too bad. Now you have to die for a crime you didn't commit.\"\n  *goto execute  \n \n "}};
