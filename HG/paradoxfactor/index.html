edroom and lie down beside ${lover_himher}.\n\n\t\t\t\t\"I... don't know,\" you answer, confused and a little scared.\n\n\t\t\t\t\"So, a train ride, you were saying?\" ${lover_heshe} says.\n\t\t\t\t*set drugsfound false\n\t\t\t\t*goto typical_day_35_loop\n\t\t\t#Continue searching.\n\t\t\t\t*set drugsfound true\n\t\t\t\tYou suddenly find what you were looking for. A small plastic baggie hidden between the mattress and box spring of his bed.\n\n\t\t\t\t\"I hate you!\" he yells when you show him the baggie.\n\n\t\t\t\t\"We'll talk about this in the morning,\" you say, leaving his room and taking the illegal drugs with you.\n\n\t\t\t\t\"What was all that about?\" ${lover_name} asks when you return to your bedroom and lie down beside ${lover_himher}.\n\n\t\t\t\tYou show ${lover_himher} what you found.  $!{lover_heshe} shakes ${lover_hisher} head sadly.\n\n\t\t\t\t\"What are we going to do with him?\" you mutter as you get back into bed.\n\t\t\t\t*goto typical_day_35_loop\n\t*if (typical_day_35_used_canceltrip=false) #Cancel the trip.\n\t\t*set typical_day_35_used_canceltrip true\n\t\t*set tripcanceled true\n\t\t*set traininjury false\n\t\t*set bad_died false\n\t\tYou decide that you will cancel the trip.\n\n\t\t*if (badmatch)\n\t\t\t\"Whatever,\" ${lover_name} says with obvious disinterest.\n\t\t*if (badmatch=false)\n\t\t\t\"That's too bad, the kids would have loved it,\" ${lover_name} says.\n\t\t*if (((kidnap_gunclub) and (kidnap_fighter)) and (kidnap_workout))\n\t\t\t\"I'm not surprised, though: you never have time to do anything together these days.\"\n\n\t\tYou continue to lie in bed with ${lover_himher}.\n\t\t*goto typical_day_35_loop\n\t*if (typical_day_35_used_canceltrip=false) #Continue with the trip as planned.\n\t\tYou decided that you will go through with the trip.\n\t\t*set typical_day_35_used_canceltrip true\n\t\t*set tripcanceled false\n\t\t*set bad_died true\n\t\t*set traininjury true\n\t\t*if (shooter_name=lover_name)\n\t\t\t*set asylum_37 false\n\t\t*goto typical_day_35_loop\n\t#I remember a time...\n\t\t*goto TimeTravel_ns\n\n*comment ------------------------------------------------- Age 35 Train\n*label BoardTrain\n*set lifestage \"train35\"\n*set seen_boardtrain true\n*set age 35\n*if ((usedlottery_19) or (usedstocks_19))\n\tThe train station is busy, but you aren't pressed in by the crowds.  You stand apart: the first class passengers will board first and aren't forced into tight lines like the others.  Your porter stands nearby, ready to carry your luggage onto the train.\n\t*if (badmatch)\n\t\t*goto BoardTrain_AfterWealth\n\t*if (usedlottery_19=false)\n\t\tYour children, ${firstchild_name} and ${secondchild_name}, stand nearby, looking at the approaching\n\t\ttrain with wide eyes.  At 13 and 11, respectively, they are still young enough to find wonder in a train ride.\n\t\t*goto BoardTrain_AfterWealth\n\t*else\n\t\tYour children, ${firstchild_name} and ${secondchild_name}, stand nearby,\n\t\tlooking bored and unimpressed.  At 13 and 11, respectively, they have been all around the world\n\t\ton your lottery winnings and aren't happy to be traveling by train.\n\t\t*goto BoardTrain_AfterWealth\n*else\n\tThe train station is busy and the crowds press you in.  \n\t*if (badmatch)\n\t\tYour luggage is piled next to you, ready to be carried on board. \n\t*if (badmatch=false)\n\t\t${firstchild_name} and ${secondchild_name} stand nearby, looking at the approaching\n\t\ttrain with wide eyes.  At 13 and 11, respectively, they are still young enough to find wonder in a train ride.\n\t\t*goto BoardTrain_AfterWealth\n*label BoardTrain_AfterWealth\n*if (timemachineused)\n\tYour head aches slightly, causing you to rub your temples.\n${lover_name}, with a schedule in ${lover_hisher} hands, watches the train pull into the station.\n*fake_choice\n\t#Board the train.\n\t\t*goto Accident_After_Crash\n\t*if (trainresearch) #Start yelling about the broken brakes.\n\t\t*if (badmatch)\n\t\t\t${lover_name} looks at you with obvious embarrassment on ${lover_hisher} face as you tell everyone that the train is going to crash due to a broken pneumatic control cable.  The passengers look at you strangely as they file onto the train.  The train attendants eventually come by, but instead of listening to you, they detain you as the train drives away.\n\n\t\t\t\"Well, you've finally completely lost it,\" ${lover_name} says acidly as ${lover_heshe} sits with you in the security office.\n\n\t\t\tA few minutes later, while you are still being detained, news of the crash reaches you.  Everyone wonders how you knew.  After a lengthy investigation, it is determined that you somehow saw the broken cable from the platform.\n\t\t\t*set traininjury false\n\t\t\t*set bad_died false\n\t\t\t*goto TimeTravel\n\t\t*if ((badmatch=false) and (timemachineused))\n\t\t\tYou feel like the famed prophet Cassandra.  No matter how much you yell and scream, the passengers board the train anyway.  ${lover_name} watches as the train attendants begin to take you away.  ${secondchild_name} begins crying and clings to your legs.  The attendants finally relent, allowing you to board the train if you wish.\n\t\t\t*if ((realizesomethingwrong) and (seen_detained))\n\n\t\t\t\tYour head throbs in pain. Thoughts of grief, tragedy, and loneliness wash over you. If only you had never made plans to go on this trip at all...  The memories fade as your headache gets even worse.\n\t\t\t*set seen_detained true\n\t\t\t*fake_choice\n\t\t\t\t#Board the train with my family.\n\t\t\t\t\t*goto Accident_After_Crash\n\t\t\t\t#Allow myself to be detained while my family continues the trip.\n\t\t\t\t\t*set traininjury false\n\t\t\t\t\tYou watch the train pull out of the station from the security office.  When it crashes a few minutes later, you are forgotten in all the excitement.  Tears stream from your eyes as you return to your empty home.\n\t\t\t\t\t*goto TimeTravel\t\t\t\t\n\t*if ((seen_accident_after_crash) and (timemachineused)) #Don't board the train.\n\t\t*set traininjury false\n\t\t*set bad_died true\n\t\tYou look around anxiously, but you don't know why.\n\n\t\t\"We can't go,\" you say to ${lover_name}.  \"This isn't right.\"\n\n\t\t\"Why not?\" ${lover_heshe} asks, but you don't know the answer.\n\n\t\tThe train pulls up, but you hesitate.  \n\t\t*if (badmatch)\n\n\t\t\t\"Oh, for god's sake,\" ${lover_name} says in exasperation as ${lover_heshe} boards without you.\n\n\t\t\tThe doors close and you see ${lover_name} looking at you in surprise as the train pulls away.\n\t\t*if (badmatch=false)\n\t\t\t${lover_name} and your children get on board, but you still hesitate.  ${lover_name} turns toward the door as it closes... with you on the other side!  You bang on the glass, but it's too late. The train pulls away, taking your ${lover_husbandwife} and children with it.\n\t\t*goto TimeTravel\n\t#I remember a time...\n\t\t*goto TimeTravel_ns\n\n*label Accident_After_Crash\n*set traininjury true\n*set bad_died true\n*set seen_accident_after_crash true\n*set age 35\nNothing makes sense.  The seats of the train are all on the ceiling.  As you look out the window, you see burning, twisted wreckage everywhere.  The train has derailed and flipped over!  Bodies lie all around you, and blood runs down your face.  You try to stand, but you can't. There's something badly wrong with your legs.  You see ${lover_name} first, ${lover_hisher} body lying among the others.\n*if (badmatch=false)\n\tNearby, you see two smaller bodies: ${firstchild_name} and ${secondchild_name}.\n\nDazed and stunned,\n*if (badmatch)\n\tyou crawl to your ${lover_husbandwife} and begin shaking ${lover_himher}, but nothing happens.\n*if (badmatch=false)\n\tyou crawl to your ${lover_husbandwife} and children and begin shaking them, but nothing happens.\nThe emergency crew arrives and takes you away.  Numb, you allow them to transport you to a hospital.\n*goto TimeTravel\n\n*label FamilyFuneral\n*set lifestage \"funeral\"\n*set age 35\n*if (badmatch)\n\tA casket sits at the front of the church holding your deceased ${lover_husbandwife}, ${lover_name}.\n*if (badmatch=false)\n\tThree caskets sit at the front of the church.  One large and two small.  \n*if (traininjury)\n\tYou sit in a wheelchair, a box of tissues on your lap.\n*if (traininjury=false)\n\tYou stand nearby, a box of tissues in your hand.\n*if (jimdead_20 = false)\n\tJim and Terry are with you, but there are no words adequate to comfort you.\n*if (jimdead_20)\n\tTerry is with you, but there are no words adequate to comfort you.\n*if ((professor_alive) and (professor_friend))\n\tProfessor Deakin sits quietly nearby as well.\n*if (badmatch)\n\t*goto TimeTravel\n*if (badmatch=false)\n\tYour face is dry of tears, as though there is no liquid left for you to shed.\n*if (timemachineused)\n\n\tThe speakers play soft music in the background, songs that ${lover_name} liked.  ${firstchild_name} and ${secondchild_name}\trest in their tiny coffins.  All because of a random train accident.  Your eyes flow with fresh tears.\n\t*goto TimeTravel\n*else\n\t*goto TimeTravel\n\n*comment ------------------------------------------------- Age 36 Flat Tire\n*label Flattire\t\n*set lifestage \"roadside_36\"\n*set age 36\nYou sit in a car along the roadside, rubbing your temples as you battle one of your frequent headaches.  You aren't sure why you drove out here or even where you are.  Your head hurts very badly.  You look up into the rearview mirror and see a thin trickle of blood running from your nose.  You take a tissue from the glove box and wipe it away.\n\nAhead of you, you see a small red car pulled to the side of the road.  It looks lopsided, and you realize that someone has put a\njack under it.  You gather from the two legs sticking out from under the car that someone is changing a tire.  \n*choice\n\t#Do what I came to do.\n\t\tWithout knowing why, you get out of your own car and\n\t\t*if (traininjury=false)\n\t\t\twalk over to the other car.  You kick the jack and watch\n\t\t*if (traininjury)\n\t\t\tpull your wheelchair from the backseat.  You wheel yourself over to the motorist. He's so busy, you can take your time.  You reach out and release the jack, watching\n\t\tas the car falls abruptly downward.\n\n\t\tA puddle of blood slowly creeps across the road from under the car, but you pay it no heed as you get back into your own car and drive away. You hear the sound of rain, even though it's a clear day.  The memory of what just happened fades behind a veil of pain as your head throbs with unrelenting torment.\n\t\t*set terrydead_36 true\n\t\t*goto TimeTravel\n\t#Drive away without doing anything.\n\t\tYou try to shake the strange thoughts from your head as you pull out into traffic, leaving the stranded motorist behind.\n\t\t*set terrydead_36 false\n\t\t*goto TimeTravel\n\t\t\n*comment ------------------------------------------------- Age 37 Rooftop\n*label Rooftop\n*set lifestage \"rooftop\"\n*set age 37\n*label NewShooter\n*if (terrydead_36=false)\n\t*set shooter_name \"Terry\"\n\t*set shooter_heshe \"he\"\n\t*set shooter_himher \"him\"\n\t*set shooter_hisher \"his\"\n\t*goto Rooftop_ShooterSet\n*if (jimdead_20=false)\n\t*set shooter_name \"Jim\"\n\t*set shooter_heshe \"he\"\n\t*set shooter_himher \"him\"\n\t*set shooter_hisher \"his\"\n\t*goto Rooftop_ShooterSet\n*if ((tripcanceled) or ((bad_died=false) and (badmatch)))\n\t*set shooter_name lover_name\n\t*set shooter_heshe lover_heshe\n\t*set shooter_himher lover_himher\n\t*set shooter_hisher lover_hisher\n\t*goto Rooftop_ShooterSet\n*set shooter_name \"Nobody\"\n*label Rooftop_ShooterSet\nThe cold rain pours down.\n*if (traininjury)\n\tYou can hardly see, but you can tell that you are sitting in your wheelchair on a rooftop.\n*if (traininjury=false)\n\tYou can hardly see, but you can tell that you are standing on a rooftop.\nIt's pitch black out, the world illuminated only by the occasional bolt of lightning across the sky.\n*if (shooter_name=\"Nobody\")\n\tYou have a gun in your hand, and your head feels like it's about to split open.  Blood pours freely from your nose and ears, although you have no apparent wounds.\n\n\tYou are all alone. Everything that ever mattered to you has been taken away.\n\t*if (badmatch)\n\t\tYour friends, Terry and Jim, both dead from fluke accidents, and your ${lover_husbandwife}, taken from you in a terrible train accident.  Although you were married to ${lover_name}, you can't help thinking that you were meant to be with someone else.\n\t*if (badmatch=false)\n\t\tYour friends, Terry and Jim, both dead from fluke accidents, and your ${lover_husbandwife} and children, taken from you in a terrible train accident.\n\t*goto rooftop_choice\n*if (firstplay)\n\n\tA man with short black hair and a black mustache stands a few feet away.  You aren't sure who he is or why he is yelling at you.\n*if (firstplay=false)\n\t${shooter_name} stands a few feet away.\n\t*if (timemachineused)\n\t\tYou have a terrible headache and feel very confused.  You aren't sure why ${shooter_heshe} is yelling at you.\n\t*if (timemachineused=false)\n\t\tYou are very confused and unsure why ${shooter_heshe} is yelling at you.\n*if (name=\"None\")\n\t*label Pick_Name_Again\n\tYou aren't even certain who you are.\n\n\tNo, wait... a name floats to the surface of your memory.  Your name is...\n\t*input_text name\n\t*if (name=\"LastUpdate\")\n\t\tThis version was made May 15th, 2022.\n\n\t\t*goto Pick_Name_Again\n\t\"Put the gun down, ${name},\" the man says.\n\n\tYou look down at your hand, surprised to see that he is right: you DO have a gun. Everything is mixed up.  You wonder...\n\t*choice\n\t\t#...why a man like me is doing this.\n\t\t\t*set gender \"male\"\n\t\t\t*set fathermother \"father\"\n\t\t\t*goto Rooftop_2_ns\n\t\t#...why a woman like me is doing this.\n\t\t\t*set gender \"female\"\n\t\t\t*set fathermother \"mother\"\n\t\t\t*goto Rooftop_2_ns\n\t\t#...why a person like me is doing this.\n\t\t\t*set gender \"nonbinary\"\n\t\t\t*set fathermother \"parent\"\n\t\t\t*goto Rooftop_2_ns\n*if (shooter_name=\"Jim\")\n\n\tWhy is Jim here?  A small trickle of blood runs from one of your ears. Of course it couldn't be Terry; he died in a freak roadside accident... Now it's Jim who is stopping you... Oddly, you remember your wedding day.  If only...\n*if (shooter_name=lover_name)\n\n\t${lover_name}?  Blood flows freely from your nose and ears. What happened to Jim and Terry? Sickening images flood your mind.  Why won't everyone just leave you alone to do what needs to be done?  Searing hot pain rips through your head and takes away the impossible, half-formed thoughts.\n\n*label Rooftop_2_ns\n\"I... I don't know what's happening,\" you\n*if (timemachineused=false)\n\ttell ${shooter_himher}.\n*if (timemachineused)\n\ttell ${shooter_himher} as a thousand memories of false lives fill your mind.\n\n*if (shooter_name=lover_name)\n\t*if (badmatch)\n\t\t\"You're crazy, that's what,\" ${lover_name} says with a look of disgust.\n\t*if (badmatch=false)\n\t\t\"It's okay, ${name},\" ${shooter_heshe} says.  \"Just calm down, we can work this out.\"\n*if (shooter_name!=lover_name)\n\t\"It's okay, ${name},\" ${shooter_heshe} says.  \"Just calm down, we can work this out.\"\n*if (timemachineused=false)\n\n\tNo, none of this makes sense.  This hasn't happened yet... or it will happen... or it could happen... Your head hurts so badly that you can hardly think.\n\t*goto TimeTravel\n*label rooftop_choice\n*set seen_roofterry true\n*set terrydead_roof false\n*if (shooter_name=\"Jim\")\n\t*set seen_roofjim true\n*set jimdead_roof false\n*set loverdead_roof false\n*set shotfriend false\n*set asylum_37 false\n*choice\n\t*if (shooter_name!=\"Nobody\") #Shoot ${shooter_name}.\n\t\t*if (shooter_name=\"Jim\")\n\t\t\t*set jimdead_roof true\n\t\t*if (shooter_name=\"Terry\")\n\t\t\t*set terrydead_roof true\n\t\t*if (shooter_name=lover_name)\n\t\t\t*set loverdead_roof true\n\t\t*set shotfriend true\n\t\t*set asylum_37 true\n\t\tYou raise the gun and watch as ${shooter_name} takes a step back in surprise.  You pull the trigger.  There's a loud bang, and ${shooter_heshe} grabs ${shooter_hisher} chest.  A look of astonishment fills ${shooter_hisher} face as ${shooter_hisher} legs give out from under ${shooter_himher}.  ${shooter_name} falls to the ground, ${shooter_hisher} bright red blood running across the rooftop and turning pink in the driving rain.\n\n\t\tBefore you are able to do anything else, the door to the roof opens and a dozen police officers rush forward.  You don't know who called them, but they quickly take the gun from your hand and\n\t\t*if (traininjury)\n\t\t\tyank you out of your wheelchair.  They aren't gentle as they throw you to the ground while the rain continues to pour down.\n\t\t*if (traininjury=false)\n\t\t\ttackle you to the ground while the rain continues to pour down.\n\t\tYou don't know who called them. Your head throbs painfully as they turn you onto your stomach and handcuff your hands behind your back.  You see others rushing to ${shooter_name}, but you can see that it's futile.  $!{shooter_heshe} is dead.\n\n\t\t\"Why did you do it?\" one of them asks, but you have no answer.\n\t\t*goto TimeTravel\n\t#Shoot yourself.\n\t\t*set asylum_37 true\n\t\tYou put the gun to your temple as tears stream down your face.\n\t\t*if (shooter_name=\"Nobody\")\n\t\t\t*goto TheEnd\n\t\tBut, before you are able to pull the trigger, ${shooter_name} takes the gun away from you!  If only ${shooter_heshe} hadn't been there, you think in frustration. Almost immediately after, the rooftop door opens and a dozen policemen rush out. @{traininjury They pull you out of your wheelchair, throwing you to the ground.|They tackle you to the ground.}\n\n\t\t*if (shooter_name=lover_name)\n\t\t\t*if (badmatch)\n\t\t\t\t\"You aren't leaving me alone to deal with a mess like that, you\n\t\t\t\t*if ((gender=\"male\") or (gender=\"nonbinary\"))\n\t\t\t\t\tasshole,\"\n\t\t\t\t*if (gender=\"female\")\n\t\t\t\t\tbitch,\"\n\t\t\t\t${lover_name} says to you, ${lover_hisher} voice full of contempt.\n\t\t\t*if (badmatch=false)\n\t\t\t\t\"Oh, ${name}, there has to be a better way,\" ${lover_name} says to you, tears of compassion running down ${lover_hisher} face.\n\t\t*if (shooter_name!=lover_name)\n\t\t\t${shooter_name} stands behind the police with his arms crossed, a look of worry on his face.\n\t\t*goto TimeTravel\n\t#Do nothing.\n\t\tYour head throbs miserably and everything feels terribly wrong.\n\t\t*goto TimeTravel\n\n*comment ------------------------------------------------- Age 38 Typical Day\n*label Typical_Day_38\n*set age 38\n*if (asylum_37)\n\t*set lifestage \"day_38_asylum\"\n\t*Comment Shot self or shooter.\n\tYou sit\n\t@{traininjury in your wheelchair|on a wooden chair} in a small, tidy room. There are bars on the window, and the door is locked.  You look down to see that you are wearing a white robe and paper slippers.  You try to move your arms, but to your frustration, you realize that you can't.  You're wearing a straitjacket. Your mind is fuzzy; they keep you on a lot of drugs, here in the asylum.\n\n\t\"I'm not supposed to be here!\" you yell through the locked door.  \"This isn't supposed to be happening!\"\n\n\t*if ((tripcanceled) or ((badmatch) and (bad_died=false)))\n\t\t*if (badmatch)\n\t\t\tThe days are long and lonely, when you are able to remember them.\n\t\t\t*if (loverdead_roof=false)\n\t\t\t\t${lover_name}, your ex-${lover_husbandwife}, never comes to visit you.  Not surprisingly, ${lover_heshe} started the divorce proceedings the day you were committed.\n\t\t\t*if (loverdead_roof)\n\t\t\t\tHaving killed ${lover_name}, your ${lover_husbandwife}, you receive no visitors at all.\n\t\t*if (badmatch=false)\n\t\t\t*if (loverdead_roof=false)\n\t\t\t\t${lover_name} visits you every day.\n\t\t\t*if (loverdead_roof)\n\t\t\t\tHaving killed ${lover_name}, your ${lover_husbandwife}, you receive no visitors at all.\n\t\t\tYour children, ${firstchild_name} and ${secondchild_name}, aren't allowed in.  The doctors say that if you make progress, you may be allowed to see them again.\n\n\t\t\tUnfortunately, your memories have continued to fragment and your actions have become even more erratic since the original incident that sent you here. Between the drugs and your headaches, you have trouble keeping calm and speaking the way that you're supposed to.\n\t*if (((tripcanceled) or ((badmatch) and (bad_died=false)))=false)\n\t\tThe days are long and lonely, when you are able to remember them.  You have difficulty telling the doctors about that day on the roof.  Your head hurts from the headaches, and everything seems out of place in your mind.\n\t*goto TimeTravel\n*set lifestage \"day_38_regularday\"\n*if (((bad_died=false) and (badmatch)) or (tripcanceled))\n\t*comment Train didn't crash, so Lover and Children(if exist) are alive.\n\t*if (badmatch)\n\t\t*if ((usedlottery_19) or (usedstocks_19))\n\t\t\tYou sit in the parlor with the large flat-screen television turned on.\n\t\t*if ((usedlottery_19=false) and (usedstocks_19=false))\n\t\t\tYou sit in the living room with the television turned on.\n\t\t${lover_name} is out, somewhere.  You hardly ever talk and almost never know where ${lover_heshe} spends ${lover_hisher} time. You know you aren't in a good marriage, but it seems better than being alone.\n\t\t*if (knowofdiary)\n\t\t\tA strange memory comes to you.\n\t\t*if (knowofdiary=false)\n\t\t\t*goto Typical_Day_38_nocrash_preloop\n\t\t*choice\n\t\t\t*if ((knowofdiary) and (lover_hisher=\"her\")) #Search the jewelry box on her dresser.\n\t\t\t\tYou don't know why, but something draws you into the bedroom you share with ${lover_name}.  You go straight to her jewelry box and open it up.  Inside, you find a little black book hidden in the bottom.\n\t\t\t\t*goto Typical_Day_38_readingdiary\n\t\t\t*if ((knowofdiary) and (lover_hisher=\"his\")) #Search the cigar box on his dresser.\n\t\t\t\tYou don't know why, but something draws you into the bedroom you share with ${lover_name}.  You go straight to his cigar box and open it up.  Inside, you find a little black book hidden in the bottom.\n\t\t\t\t*goto Typical_Day_38_readingdiary\n\t\t\t*if (((professor_warnedonce) and (professor_friend)) and ((professor_alive=false) and (professor_knowcancer=false))) #Research the type of cancer that killed Professor Deakin.\n\t\t\t\t*gosub Research_Cancer_sub\n\t\t\t\t*goto Typical_Day_45_loop\n\n\t\t\t\t*label Research_Cancer_sub\n\t\t\t\tYou aren't really certain what makes you think of your old college professor and good friend.  Perhaps it's your failing marriage.  He was probably around sixty-five when he came to your wedding; that'd make him\n\t\t\t\t*if (lifestage=\"day_38_regularday\")\n\t\t\t\t\tover eighty\n\t\t\t\t*if (lifestage=\"day_45\")\n\t\t\t\t\taround ninety\n\t\t\t\tyears old, if he were still alive today.\n\n\t\t\t\tIt's surprisingly easy to find the information you're looking for.  As you suspected, early detection would likely have saved his life.  The old man probably thought he simply had a long-lasting flu, until it was too late.  You shake your head sadly.  If only he had gone to the doctor and had it checked out properly.\n\t\t\t\t*set professor_knowcancer true\n\t\t\t\t*return\n\t\t\t#I remember a time...\n\t\t\t\t*goto TimeTravel_ns\t\t\t\n\t\t*label Typical_Day_38_readingdiary \n\n\t\tMemories of torn out pages briefly flash through your mind, but you can see that's all in your head.  The book is fully intact.  You read about steamy meetings at lewd hotels and late-night trysts.  The handwriting is ${lover_name}'s.  Unable to help yourself, you read more.  The sheer number of affairs is staggering.  $!{lover_heshe}'s been cheating on you for years!\n\t\t*choice\n\t\t\t#I decide that I will divorce ${lover_himher}.\n\t\t\t\t*set divorced_38 true\n\t\t\t\t*goto TimeTravel_ns\n\t\t\t#Angry, I get drunk and stew about it, knowing that I'll never confront ${lover_himher}.\n\t\t\t\t*set divorced_38 false\n\t\t\t\t*if ((usedlottery_19) or (usedstocks_19))\n\t\t\t\t\tEmpty martini glasses are strewn beside your chair. You eventually sent your butler home for the night, telling him to make you a full tray of drinks and get out.  He was worried for you, but he knows his place and did as he was told.\n\t\t\t\t\t*goto fromnocrashdrunk\n\t\t\t\t*else\n\t\t\t\t\tYou have a bottle of vodka in one hand and a carton of orange juice in the other.  You have long since run out of orange juice, and now you are close to running out of vodka as well.\n\t\t\t\t\t*goto fromnocrashdrunk\n\t*else\n\t\t*Comment Badmatch is false, train didn't crash, (Kids are 16 and 14)\n\t\t*if (usedstocks_19)\n\t\t\t*comment (Kids are 16 and 14)\n\t\t\tYou are relaxing on a lounge chair next to your sparkling pool.  Beside you, ${lover_name} is doing the same.  It's a beautiful day.  ${firstchild_name} and ${secondchild_name} are visiting your parents,\n\t\t\t*if ((((kidnap_gunclub) and (kidnap_fighter)) and (kidnap_workout)) = false)\n\t\t\t\tso you took the week off to enjoy some alone time with your ${lover_husbandwife}.\n\t\t\t*if (((kidnap_gunclub) and (kidnap_fighter)) and (kidnap_workout))\n\t\t\t\tso you took the day off to train.  Your martial arts and physical conditioning have never been better.\n\t\t\t*if (kidnap_seen_police)\n\t\t\t\tA feeling of dread comes over you.\n\n\t\t\tYour butler opens the sliding glass door and approaches you, a silver tray in his hand.  On the tray you see a cordless telephone, which he offers you without a word.\n\t\t\t*if (seen_farmhouse)\n\n\t\t\t\tYou stare numbly at the phone.  You've done this before; you know who it is.\n\t\t\t\t*choice\n\t\t\t\t\t#Follow the plan in my mind.\n\t\t\t\t\t\tYou walk away from the phone without answering it, totally confusing your butler.  ${lover_name} gets to ${lover_hisher} feet and follows you.  This is good: you know you can't leave ${lover_himher} at the house.  You work quickly, explaining what has happened.  You and ${lover_name} change out of your swimsuits.  You don't bother with the suitcase of money; you have other plans.\n\t\t\t\t\t\t*if (kidnap_owngun)\n\t\t\t\t\t\t\tInstead, you grab the handgun that you purchased a few years ago, slipping it into your coat pocket.\n\n\t\t\t\t\t\tAn hour later, you find yourself in your BMW, about a mile away from the farmhouse.  Your head is hurting very badly.  You experience a brief moment of doubt but continue anyway, telling ${lover_name} to wait in the car.  You then cut across the field to the abandoned farmhouse that figures so prominently in your strange memories.\n\t\t\t\t\t\t*set kidnap_attempt_nolover false\n\t\t\t\t\t\t*goto Kidnapping_38_sneakinbackdoor\n\t\t\t\t\t#Answer the phone.\n\t\t\t\t\t\t*goto kidnap_answerthephone\n\t\t\t*label kidnap_answerthephone\n\t\t\tYou nod thanks to him and take it.\n\n\t\t\t\"Hello, this is ${name}.\"\n\n\t\t\t\"I have your children,\" the voice on the other end says gruffly.  \"If you ever want to see them again, you'll be quiet and listen to my instructions.  If you call the police, they both die.\"\n\t\t\t*choice\n\t\t\t\t*if (kidnap_seen_police) #A memory of a farm comes to me... I go there immediately.\n\t\t\t\t\t*set kidnap_someonedead true\n\t\t\t\t\tYou finish listening to the man, trying to remember all of his instructions as accurately as you can. Even though it doesn't make sense, you feel that you know where your children are.  You get up and start walking into the house... without calling the police.  ${lover_name} walks with you as you explain what the caller said.\n\n\t\t\t\t\t\"I... I'm going to go stop them,\" you say.\n\n\t\t\t\t\t\"Shouldn't we call the police?\"\n\n\t\t\t\t\t\"No!\" you say, louder than you mean to, as the memory of a white van inexplicably fills your mind. \"They told me where they are. I think it's better if I go there myself.\"\n\n\t\t\t\t\tIt's a lie: they didn't say where they were.  They said that they'd call back with further details and that you were supposed to get the money ready.  But somehow, you know anyway.\n\n\t\t\t\t\t\"I'm coming with you,\" ${lover_name} says.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Refuse to allow ${lover_name} to come.\n\t\t\t\t\t\t\t\"No, you aren't.\"\n\n\t\t\t\t\t\t\tYou adamantly refuse to allow ${lover_himher} to come with you.\n\t\t\t\t\t\t\t*set kidnap_attempt_nolover true\n\t\t\t\t\t\t\t*goto Kidnapping_38\t\n\t\t\t\t\t\t#Take ${lover_name} with me.\n\t\t\t\t\t\t\t\"Okay, you can come, but you have to do exactly as I say.\"\n\n\t\t\t\t\t\t\t*set kidnap_attempt_nolover false\n\t\t\t\t\t\t\t*goto Kidnapping_38\t\t\t\t\n\t\t\t\t#Call the police.\n\t\t\t\t\t*set kidnap_someonedead true\n\t\t\t\t\t*set kidnap_daughterdead true\n\t\t\t\t\t*set kidnap_sondead true\n\t\t\t\t\t*set kidnap_injury false\n\t\t\t\t\t*set kidnap_seen_police true\n\t\t\t\t\t*set kidnap_loverdead false\n\t\t\t\t\tYou finish listening to the man, trying to remember all of his instructions as accurately as you can.  Immediately afterward, you call the police.  Over the next several days, they completely take over your mansion.  All of the phones are tapped, police surveillance is set up, and they coach you on how to speak to the kidnappers.  Your stocks have soared over the years.  The police don't find it too surprising that you and your family have become a target.\n\n\t\t\t\t\tA week later, you are told of the exchange.  It will take place in an old farmhouse just outside of town.  It's the most terrifying day of your life.  The police have you wear a listening device and a bulletproof vest.  ${lover_name} insists on accompanying you, even though you were told to come alone.\n\t\t\t\t\t*page_break\n\t\t\t\t\tIt's a disaster.  A man with red hair and bad acne scars is waiting for you.  Beside him, a large man with a shaved head and sunglasses watches emotionlessly.  They are both wearing earpieces and they both have guns.\n\n\t\t\t\t\tYou hand them the briefcase full of money and wait for them to return your children.  Instead, the bald man suddenly puts his hand to his ear as he receives a report.  It's a blur after that. Everyone suddenly starts shooting and screaming as the police burst onto the scene.\n\n\t\t\t\t\tThe only good thing is that you and ${lover_name} escaped unharmed.  Unfortunately, the bodies of your children are found in an empty white van in the barn.  The kidnappers killed them both the second they saw the police.  Reports later indicate that were only three assailants.  The two men you met were both killed, and the third got away.\n\t\t\t\t\t*goto TimeTravel\n\t\t\t\t#Use my money to hire mercenaries.\n\t\t\t\t\t*set kidnap_someonedead true\n\t\t\t\t\t*set kidnap_daughterdead true\n\t\t\t\t\t*set kidnap_sondead false\n\t\t\t\t\t*set kidnap_injury false\n\t\t\t\t\t*set kidnap_loverdead false\n\t\t\t\t\tYou finish listening to the man, trying to remember all of his instructions as accurately as you can.  Immediately afterward, you start calling around.  Needless to say, the first thing everyone recommends is that you should call the police.  But, after a few tries, you get in touch with people who say they can help.\n\n\t\t\t\t\tOver the next several days, a group of mercenaries completely take over your mansion.  All of the phones are tapped and surveillance is set up as they coach you on how to speak to the kidnappers.  A week later, you are told of the exchange.  The team you hired tells you to stay home while they go out to deal with it.\n\n\t\t\t\t\tSeveral hours pass as you wait for word of how the mission went.  You are extremely worried when the mercenary captain returns to your house with the police.  They tell you that it didn't go as smoothly as they had hoped.  All of the kidnappers were killed, but your daughter was hit by a stray bullet.  Your son rushes into your arms as you and ${lover_name} slowly realize that ${secondchild_name} won't be coming home.\n\t\t\t\t\t*goto TimeTravel\n\t\t\t\t#Don't call the police.\n\t\t\t\t\t*set kidnap_someonedead true\n\t\t\t\t\t*set kidnap_daughterdead false\n\t\t\t\t\t*set kidnap_sondead true\n\t\t\t\t\t*set kidnap_injury false\n\t\t\t\t\t*set kidnap_loverdead false\n\t\t\t\t\tYou finish listening to the man, trying to remember all of his instructions as accurately as you can.  They want money, of course, and a lot of it.  Naturally, you tell ${lover_name}. After a long conversation, ${lover_heshe} agrees to not involve the police.  You make some more telephone calls and prepare the money.\n\n\t\t\t\t\tA week later, you and ${lover_name} go to an old farmhouse just outside of town with a briefcase full of cash. A man with red hair and bad acne scars is waiting for you.  Beside him, a large man with a shaved head and sunglasses watches emotionlessly.  They are both wearing earpieces and carrying guns.  You hand them the briefcase full of money and wait as they count it.\n\n\t\t\t\t\tAfter an agonizing length of time, a third man drives a white van toward you from the nearby barn.  The two men get into it and dump two bodies out the back. The van quickly drives away, leaving you and ${lover_name} with the bodies. You rush them both to the hospital, but unfortunately, it's too late.\n\t\t\t\t\t*goto TimeTravel\t\t\t\t\t\n\t\t\t\t#I remember a time...\n\t\t\t\t\t*goto TimeTravel_ns\t\n\t\t*if ((usedlottery_19=false) and (usedstocks_19=false))\n\t\t\t*comment lottery not used, kids good, firstchild dies\n\t\t\tYou sit in a run-down old apartment, but it's the best you can afford. ${lover_name} sits silently next to you.  $!{lover_heshe} has dark circles under ${lover_hisher} eyes from lack of sleep despite laying in bed most of the day.  It has been a very difficult year, ever since ${firstchild_name} was diagnosed with a congenital heart defect.  Although his suffering is over now, it feels like your own has just begun.\n\n\t\t\tYour research company is close to bottoming out as well, and your own money is gone.  The hospital bills grew impossibly high as you waited for a heart donation that never came.  Although a two-tiered health system wasn't supposed to exist, you believe if you had been wealthy enough, you could have gotten him the heart transplant he needed to save his life.\t\n\t\t\t*goto Typical_Day_38_nocrash_preloop\t\t\t\n\t\t*comment lottery used, kids off the rails\n\t\t*set seen_drugcharges true\n\t\tThe kids are at boarding school, one of the best in the country.  ${lover_name} sits cuddled next to you. $!{lover_heshe} is looking much older than ${lover_heshe} should.  Things haven't been going well with the kids. As though this thought were a premonition, the phone begins to ring.\n\n\t\t\"Hello?\" you say into the receiver.\n\n\t\t*if (drugsfound=false)\n\t\t\tYou listen to the caller, a frown falling over your face.  ${firstchild_name} has been arrested.  You listen as the police officer tells you about the drug charges.  Despite all of your money, he's been dealing dope at his boarding school!  Needless to say, he's been expelled as well.\n\t\t\t*goto Typical_Day_38_nocrash_preloop\n\t\t*else\n\t\t\tYou drop the phone when you hear the words from the other end.  Your whole world suddenly goes grey as disbelief washes over you.  ${firstchild_name} has been shot, but will live.  The police officer doesn't know all of the details yet, but apparently, alcohol and drugs were involved.\n\n\t\t\tYou knew that ${firstchild_name} was having troubles in his fancy boarding school, but you never expected this. It just doesn't make any sense. Because you won the lottery so many years ago, ${firstchild_name} had never wanted for anything.\n\t\t\t*goto Typical_Day_38_nocrash_preloop\t\n\t\t\t\n\t\t*label Typical_Day_38_nocrash_preloop\n\t\t*comment No crash, badmatch or not, poor or lottery, but not stocks.\n\t\t*choice\n\t\t\t*if (((professor_warnedonce) and (professor_friend)) and ((professor_alive=false) and (professor_knowcancer=false))) #Research the type of cancer that killed Professor Deakin.\n\t\t\t\t*gosub Research_Cancer_sub\n\t\t\t\t*goto Typical_Day_45_loop\n\t\t\t*if ((seen_dawson) and (usedlottery_19)) #I remember... a man named Dawson.\n\t\t\t\tIt's fuzzy in your mind, but you know that a man named Dawson will someday hurt your daughter.  It's strange, how the memory comes to you now, when you should be thinking about your son.  But there it is.  That night, when ${lover_name} is sound asleep in bed, you slip out of the house.\n\n\t\t\t\tUsing the Internet, it's easy to find Dawson's address, but first, you slip by the lab.  You grab the largest needle you can find and fill it with a lethal dose of tranquilizer. There will be no connection to you; in fact, even you aren't sure what the connection is.  All you know is that Dawson has to die.\n\n\t\t\t\tYou check the windows and find one unlocked.  After slipping inside, you check the bedrooms. Your luck is in: you find Dawson immediately.  He is sound asleep in his bed.  Something is different though. He seems... younger.  Yes, he's only 18 years old, something is wrong here.\n\t\t\t\t*choice\n\t\t\t\t\t#Kill him anyway.\n\t\t\t\t\t\tYou plunge the needle into him.  The tranquilizer is very powerful: although he wakes briefly, he falls back into unconsciousness immediately.  You quickly leave the house, your head throbbing, as you try to recall what made you do such a heinous thing.\n\t\t\t\t\t\t*set killedyoungdawson true\n\t\t\t\t\t\t*set killeddawson_45 false\n\t\t\t\t\t\t*goto TimeTravel\n\t\t\t\t\t#Go home.\n\t\t\t\t\t\tYou look down at the sleeping boy in horror at what you almost did.  You return home and squirt the contents of the needle down the toilet.  You don't know what came over you.  After many sleepless hours, you eventually fall into a troubled sleep.\n\t\t\t\t\t\t*set killedyoungdawson false\n\t\t\t\t\t\t*goto TimeTravel\t\t\t\t\n\t\t\t#I remember a time...\n\t\t\t\t*goto TimeTravel_ns\t\t\n*comment Train crashed, Lover and Children (if exist) are gone.\t\t\n*if ((usedlottery_19) or (usedstocks_19))\n\tYou sit in the parlor with the large flat-screen television turned on.  Empty martini glasses are strewn beside your chair. You eventually sent your butler home for the night, telling him to make you a full tray of drinks and get out.  He was worried for you, but knows his place and did as he was told.\n\t*goto Typical_Day_38_AfterWealth\n*else\n\tYou sit in the living room with the television turned on.  You have a bottle of vodka in\n\tone hand and a carton of orange juice in the other.  You have long since run out of orange juice, and now you are close to running out of vodka as well.\n\t*goto Typical_Day_38_AfterWealth\n*label Typical_Day_38_AfterWealth\n*if (badmatch)\n\n\tYou sometimes wonder how things would have been had ${lover_name} not been on that train.  Your marriage wasn't perfect, but it was better than being alone.  Things should have turned out differently.  You feel a nagging emptiness, but you aren't entirely sure what you are missing.  There's a ballgame on the screen, but you aren't really watching.  Everything seems\n\tmeaningless.\n*if (badmatch=false)\n\tTears stream down your face as you watch the television.\n\n\tLittle ${firstchild_name} and ${secondchild_name} are throwing handfuls of bread to the ducks in a pond while ${lover_name} laughs at them.  It was a beautiful day, but now it is just a bittersweet memory.  They are gone and you are alone.\n*label fromnocrashdrunk\n*comment Use of Time Machine, for both crash or no crash (so with and without lover and friends)\n\n*if (urgetoendit=false)\n\t*if ((usedlottery_19) or (usedstocks_19))\n\t\tYou throw the empty tray at the television, smashing the screen into a thousand pieces.\n\t\t*goto Typical_Day_38_AfterWealth_2\n\t*else\n\t\tYou throw the empty vodka bottle at the television, smashing the screen into a thousand pieces.\n\t\t*goto Typical_Day_38_AfterWealth_2\n\t*label Typical_Day_38_AfterWealth_2\t\t\n\t*if (traininjury)\n\t\tEnough is enough.  Right or wrong, this isn't going to happen, you think to yourself as as you sit up straighter in your wheelchair, ready to take action.\n\t*if (traininjury=false)\n\t\tEnough is enough.  Right or wrong, this isn't going to happen, you think as you stand up.\n*label Typical_Day_38_Loop\n*comment Train crashed, Lover and Children (if exist) are gone.\n*choice\n\t#Go to the lab and do something foolish.\n\t\t*goto TimeMachine\n\t*if (((seen_accident_after_crash) and (timemachineused)) and (trainresearch=false)) #Research the train accident.\n\t\t*if (traininjury)\n\t\t\tYou roll over to your computer and turn it on.\n\t\t*if (traininjury=false)\n\t\t\tYou walk over to your computer and turn it on.\n\t\tIt takes mere seconds to find the newspaper articles about the wreck.\n\t\t*if (badmatch)\n\t\t\tYou read about the death of your ${lover_husbandwife}.\n\t\t*if (badmatch=false)\n\t\t\tYou read about the deaths of your ${lover_husbandwife} and children.\n\t\tIt's hard to do, but you force yourself to continue.\n\n\t\tYou learn that the investigation eventually found that the control line to the pneumatic brakes was loose due to poor maintenance and snagged when the train pulled into the station.  Five minutes after pulling out of the station, the train tried to decelerate while taking a sharp turn, but it couldn't.  It derailed, and over a hundred people were killed.\n\t\t*set trainresearch true\n\t\t*goto Typical_Day_38_Loop\n\t#I remember a time...\n\t\t*goto TimeTravel_ns\n\n*label TimeMachine\n*set age 38\n*if (traininjury)\n\tYou roll into the lab,\n*if (traininjury=false)\n\tYou stumble into the lab,\n*if ((usedlottery_19=false) and (usedstocks_19=false))\n\tremembering the looks the taxi driver gave you as you drunkenly yelled your destination at him.\n\t*goto TimeMachine_AfterWealth\n*else\n\tremembering how your chauffeur had repeatedly questioned your orders.  He didn't know why you\n\twould want to go to the lab in your drunken condition.\n\t*goto TimeMachine_AfterWealth\n*label TimeMachine_AfterWealth\t\nYou move among the machines, turning them on one at a time.  The Schrödinger Box sits nearby, beckoning you with temptation.\n\nHuman trials are still many years off, but you can wait no longer.  You have even created a program, in secret, to enable you to run the machines without having to be at the console.  You activate the program and crawl into the large metal box.\n\nThe machines hum as they power up.  You sit in the dark, feeling surprisingly sober as you second-guess your actions.  It's too late.  \n*if (timemachineused)\n\tSuddenly, you remember... everything...\n*if (timemachineused=false)\n\t*set timemachineused true\n\t*achieve timetraveler\n\t*page_break Suddenly, you remember... everything...\n\t*goto TimeTravel_ns\n*if (urgetoendit)\n\t*choice\n\t\t#Continue to make changes.\n\t\t\t*goto TimeTravel_ns\n\t\t#Accept my life.\n\t\t\t*if (badmatch=false)\n\t\t\t\tAlthough you still miss ${truelove} and your children with every fiber of your being, you find yourself cherishing the time you had together before the train accident. You wipe your eyes and put away the alcohol.  This isn't the way ${lover_name} would have wanted you to act.  It was better to have loved and lost than never to have loved at all.\n\t\t\t\t*set achievement_cherish true\n\t\t\t\t*achieve cherish\n\t\t\t*if (badmatch=true)\n\t\t\t\tYou long for a person you never met.  Your one true love.  The name ${truelove} floats into your mind.  You remember a different time.  A time with kids... a train... a kidnapping...  So much pain, so much heartache. Perhaps this is for the best.  Your children were never\n\t\t\t\t*if ((((lover_hisher=\"his\") and (gender=\"male\")) or ((lover_hisher=\"her\") and (gender=\"female\"))) or (gender=\"nonbinary\"))\n\t\t\t\t\tadopted by you \n\t\t\t\t*if (((lover_hisher=\"his\") and (gender=\"female\")) or ((lover_hisher=\"her\") and (gender=\"male\")))\n\t\t\t\t\tconceived\n\t\t\t\tand you never met the love of your life, so they never knew these losses.\n\t\t\t\t*set achievement_noloss true\n\t\t\t\t*achieve noloss\n\n\t\t\tAs the Schrödinger Box opens, your memories of the future and of the alternativee pasts fade away.  You look at the computer and see that it claims there is a Paradox Factor of zero.\n\n\t\t\tYou wonder if there's an error with the experiment, because you have no recollection of having a past any different than the one you have now.  Perhaps time travel for humans really is impossible after all?\n\t\t\t*page_break The End\n\t\t\t*goto retire\n*else\n\t*goto TimeTravel\n\n*label Kidnapping_38\nYou work quickly.\n*if (kidnap_attempt_nolover)\n\tFirst, you go to your bedroom and change out of your swimsuit.\n*if (kidnap_attempt_nolover=false)\n\tFirst, you and ${lover_name} go to your bedroom and change out of your swimsuits.\nThen, you grab a briefcase, open the safe in your bedroom and fill it with all the money you have on hand.  It isn't as much as they asked for, but it will have to do.\n*if (kidnap_owngun)\n\tSitting next to the stacks of money, you see the handgun that you purchased several years ago.  You grab it and put it in your coat pocket.\nYou rush out to your garage and get into the BMW.\n\nYour odd memories continue to guide you as you drive to an abandoned old farm on the outskirts of town.\n*if (seen_attempt_unready)\n\tYou pull over to the side of the road, a few farms away from your destination.\n\t*if (kidnap_attempt_nolover=false)\n\n\t\t\"Is this it?\" ${lover_name} asks.\n\n\t\t\"No, it's another mile down the road,\" you answer thoughtfully.\n\t*choice\n\t\t#Continue driving.\n\t\t\t*goto Kidnapping_38_frontlane\n\t\t#Sneak through the field to the farmhouse.\n\t\t\t*if (kidnap_attempt_nolover)\n\t\t\t\tSuddenly, the sound of police sirens fill the air.  ${lover_name} must have called them the moment you left!  You aren't certain how they followed you: perhaps the GPS anti-theft device in the car?  Your cell phone?  Satellite surveillance?  Either way, they are here now.  In the distance, you can hear gunshots coming from the abandoned farm you were approaching.  Moments later, you see a white van racing down the road.\n\n\t\t\t\tThe kidnappers were spooked by the police and managed to escape.  The farmhouse is filled with officers when you arrive, but it's too late. Your children are dead.\n\t\t\t\t*set kidnap_injury false\n\t\t\t\t*set kidnap_daughterdead true\n\t\t\t\t*set kidnap_sondead true\n\t\t\t\t*set kidnap_loverdead false\n\t\t\t\t*goto TimeTravel\n\t\t\t\"I need you to stay here,\" you tell ${lover_name} as you get out of the car.  To your surprise, ${lover_heshe} listens. There must be something in your eyes that makes ${lover_himher} agree.\n\n\t\t\tYou cut through the fields, approaching the farmhouse from behind.  It looks like it's been abandoned for many years.\n\t\t\t*choice\n\t\t\t\t#Sneak in the back door.\n\t\t\t\t\t*label Kidnapping_38_sneakinbackdoor\n\t\t\t\t\t*set kidnap_injury true\n\t\t\t\t\t*set kidnap_daughterdead true\n\t\t\t\t\t*set kidnap_sondead true\n\t\t\t\t\t*set kidnap_loverdead false\n\t\t\t\t\tYou try the back door.\n\t\t\t\t\t*if (kidnap_backdoorlocked)\n\t\t\t\t\t\tThe door doesn't open.\n\n\t\t\t\t\t\t*goto Kidnapping_38_doorlocked\n\t\t\t\t\t*set seen_farmhouse true\n\t\t\t\t\tThe lock has been smashed apart.  Your headache is so fierce that it threatens to drop you to your knees. Ignoring the pain, you push open the door and enter the farmhouse.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*if (kidnap_tvworking=false)\n\t\t\t\t\t\tAll is silent as you walk past a rusty washer and dryer next to the door.  The farmhouse isn't large. To your surprise, you see three men sitting at the kitchen table playing cards.  They look up at you as you walk in on them.  The red-haired man takes a handgun from the table, aims it at you, and fires!\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou\tfall to the ground, blackness filling your vision.  If only they had been distracted somehow. Your head threatens to split apart. Hadn't there been a television playing? No, the TV was broken.\n\t\t\t\t\t\t*goto Kidnapping_38_shot\n\t\t\t\t\tYou can hear the television playing inside as you walk past a rusty washer and dryer next to the door.  The farmhouse isn't large.  Two people sit on the couch, a large bald man and a red-haired man with bad acne scars.\n\t\t\t\t\t\n\t\t\t\t\tNext to them, on a @{kidnap_chairdestroyed kitchen chair|padded upright chair}, is a tall, thin man.\n\t\t\t\t\t*if (kidnap_owngun=false)\n\t\t\t\t\t\tThe bald man, still sitting down, picks up a semi-automatic rifle from the floor beside him, aims it at you, and pulls the trigger.  You put your hands up in front of yourself helplessly as the bullets plunge into your stomach.  If only you had owned a gun.\n\t\t\t\t\t\t*set seen_nogunfail true\n\t\t\t\t\t\t*goto Kidnapping_38_shot\n\n\t\t\t\t\tYou pull the gun from your coat pocket and fire.\n\t\t\t\t\t*if (kidnap_gunclub=false)\n\t\t\t\t\t\t*set seen_nogunclub true\n\t\t\t\t\t\tThree holes explode into the wall above the men on the sofa.  The bald man, still sitting down, picks up a semi-automatic rifle from the floor beside him and aims it at you.  He pulls the trigger, and unlike you, he doesn't miss.  It's obvious as he guns you down that he's had some training with the rifle. You own a gun, but you never learned to use it properly.\n\t\t\t\t\t\t*goto Kidnapping_38_shot\n\t\t\t\t\tAll of those years at the shooting range pay off as the large bald man is thrown back onto the couch with three bloody holes in his forehead.\n\t\t\t\t\t*if (kidnap_chairdestroyed)\n\t\t\t\t\t\tThe red-haired man sprints across the room toward the stairs as the\tthin man gets up from a chair that he likely brought in from the kitchen.  He raises his gun and fires.  You feel the bullets pierce your stomach as you collapse to the ground.  Why was he in a kitchen chair? Your aching head seems to remember an upright chair, perhaps only slightly broken.\n\t\t\t\t\t\t*goto Kidnapping_38_shot\n\t\t\t\t\t*if (kidnap_chairslightlybroken=false)\n\t\t\t\t\t\tThe red-haired man sprints across the room toward the stairs as the\tthin man gets up from the upright chair, raises his gun, and fires.  You feel the bullets pierce your stomach as you collapse to the ground.  The sight of the unbroken chair makes your head ache.  Could it have been different?\n\t\t\t\t\t\t*goto Kidnapping_38_shot\n\t\t\t\t\tThe red-haired man sprints across the room toward the stairs as the\tthin man attempts to get up from the upright chair, lifting his gun as he does so.  The chair cracks loudly and breaks under his sudden shifting of weight,\ttumbling him to the floor as his shot goes wide.  You pull the trigger twice more, killing the thin man before he is able to get to his feet.\n\n\t\t\t\t\t*if (kidnap_stairsbroken=false)\n\t\t\t\t\t\tYou hear a pair of gunshots upstairs, where the red-haired man went.  Your stomach clenches tightly as you rush up after him.  He is standing in a bedroom next to a bed where two bodies lie.  His gun is aimed right at you.  He fires his gun twice, punching twin holes into your stomach.  The stairs...  If only...\n\t\t\t\t\t\t*goto Kidnapping_38_shot\n\t\t\t\t\tThe red-haired man curses as he stumbles on the broken stairs.  You rush after him, right on his heels, as he bursts into a bedroom at the top of the stairs.\n\t\t\t\t\t*if (kidnap_workout=false)\n\t\t\t\t\t\t*set seen_noworkout true\n\t\t\t\t\t\tHe raises his gun and fires it toward your children, who are tied up and lying on the bed.  You fire your gun at him, blowing off the top of his head, but it's too late. You were too slow climbing the stairs.  Back in college, you were in shape.  But married life has been too comfortable and you have let yourself go.\n\t\t\t\t\t\t*set kidnap_sondead true\n\t\t\t\t\t\t*set kidnap_daughterdead false\n\t\t\t\t\t\t*set kidnap_injury false\n\t\t\t\t\t\t*goto Kidnapping_38_loverarrives\n\n\t\t\t\t\tYou see your children.  They are tied up and lying across a bed, and the man is raising his gun toward them! You leap forward, grabbing his arm with your free hand as you raise your own gun toward him.\n\t\t\t\t\t*if (kidnap_fighter=false)\n\t\t\t\t\t\t*set seen_nofight true\n\t\t\t\t\t\tHe pulls back, knocking you off balance, and then punches you with his own free hand.  Stunned, you lose your grip as he pushes his gun\tinto your stomach and fires.  You never were a violent person and never had a reason to learn how to fight, before today.\n\t\t\t\t\t\t*goto Kidnapping_38_shot\n\t\t\t\t\tHe pulls back, but you expect this. Your years of training in martial arts take over your movements as you raise your gun-holding hand to block his incoming punch.  You follow this with a sharp elbow to his face, which makes him release you and stagger back.  You place the barrel of your gun between his eyes and pull the trigger, splattering his brains over the wall behind him.  It's over. Your children are safe.\n\t\t\t\t\t*set kidnap_injury false\n\t\t\t\t\t*set kidnap_daughterdead false\n\t\t\t\t\t*set kidnap_sondead false\n\t\t\t\t\t*set kidnap_loverdead false\n\t\t\t\t\t*set kidnap_someonedead false\n\t\t\t\t\t*goto TimeTravel\n\t\t\t\t#Sneak in the front door.\n\t\t\t\t\tYou circle around and try the front door, but the door doesn't open.\n\n\t\t\t\t\t*goto Kidnapping_38_doorlocked\n\t\t\t\t\t\n\t*label Kidnapping_38_doorlocked\n\t\"Who's there?\" a voice calls, hearing you trying to open the locked door.\n\n\tThe door is suddenly unlocked and thrown wide open.  You see a large bald man with a semi-automatic rifle.  He lowers it and fires immediately.  You feel the bullets enter your stomach as you are thrown backwards, landing flat on your back. It all happens so quickly... if only you'd had time to prepare...\n\t*goto Kidnapping_38_shot\t\n*label Kidnapping_38_frontlane\n*set seen_attempt_unready true\nYou drive down the lane and park next to the house.  You can see that a white van is parked in the garage. Boldly, you\n*if (kidnap_attempt_nolover=false)\n\tand ${lover_name}\nwalk up to the front door and knock.  A man with red hair and bad acne scars answers it, his eyes wide open in surprise.  Beside him, a large man with a shaved head holds a semi-automatic rifle in his hands.  A third man, tall and thin, watches from inside.  You hand over the briefcase.\n\n*if (kidnap_attempt_nolover)\n\tSuddenly, the sounds of police sirens fill the air.  ${lover_name} must have called them the moment you left!  You aren't certain how they followed you: perhaps the GPS anti-theft device in your car?  Your cell phone?  Satellite surveillance?  Either way, they are here now.  The bulky bald man lowers his rifle and fires.  You can feel the bullets enter your stomach as you are thrown backwards, landing flat on your back in the dirt.\n\t*set kidnap_injury true\n\t*set kidnap_daughterdead true\n\t*set kidnap_sondead true\n\t*set kidnap_loverdead false\n\n\tYou wake up five days later in a hospital.  ${lover_name} is sitting in a chair at your side, sound asleep.  You later learn that the bodies of ${firstchild_name} and ${secondchild_name} were found on the farm.  The fact that the bullets missed all your vital organs, but shattered your spine as they exited your body, hardly seems to matter compared to that news.  You will never walk again, you are told.  This thought seems strangely familiar.\n\t*goto TimeTravel\n\"This is... unexpected,\" the red-haired man says as he passes the suitcase to the tall man.\n\nYou and ${lover_name} wait patiently while he counts the money.  After an agonizing wait, he states the amount.\n\n\"That's a start, but not what we agreed to,\" the leader says.\n\n\"Please, that's all I have on hand... I can get you more.\"\n\n\"Very well. Return with more and we will talk.\"\n*choice\n\t#Attack the man.\n\t\t*if (kidnap_owngun=false)\n\t\t\tYour rage overtakes your good sense, and you lunge at him.  The bald man\n\t\t*if (kidnap_owngun)\n\t\t\tYour rage overtakes your good sense, and you pull the gun from your coat pocket.  Unfortunately, the bald man is ready for such an action. He\n\t\tpulls the trigger on his rifle and sprays you and ${lover_name} with bullets.  You fall to the ground, unconscious.\n\t\t*set kidnap_injury true\n\t\t*set kidnap_daughterdead true\n\t\t*set kidnap_sondead true\n\t\t*set kidnap_loverdead true\n\t\t*goto Kidnapping_38_shot\n\t#Do as he says.\n\t\tReluctantly, you and ${lover_name} leave the farmhouse empty-handed.  Unfortunately, when you return with more money, the kidnappers and your children are gone.  They probably didn't like you knowing where they were, so they took the money and cut their losses.  You never do see your children again, leaving you to assume the worst.\n\t\t*set kidnap_injury false\n\t\t*set kidnap_daughterdead true\n\t\t*set kidnap_sondead true\n\t\t*set kidnap_loverdead false\n\t\t*goto TimeTravel\n*label Kidnapping_38_shot\n\nYou wake up five days later in a hospital.  \n*if (kidnap_loverdead=false)\n\t${lover_name} is sitting in a chair at your side, sound asleep.\nYou later learn that you were left for dead and found by the police, \n*if (kidnap_loverdead=false)\n\twho were called by ${lover_name} when ${lover_heshe} heard the gunshots.\n*if (kidnap_loverdead)\n\twho were called by neighbors who heard the gunshots.\n*if ((kidnap_sondead) and (kidnap_daughterdead))\n\tYou also learn that the bodies of ${firstchild_name} and ${secondchild_name}\n*if ((kidnap_sondead=false) and (kidnap_daughterdead))\n\tYou also learn that the body of ${secondchild_name}\n*if ((kidnap_sondead) and (kidnap_daughterdead=false))\n\tYou also learn that the body of ${firstchild_name}\n*if (kidnap_loverdead)\n\thad been found on the farm, along with your ${lover_husbandwife}'s.\n*if (kidnap_loverdead=false)\n\thad been found on the farm.\n\nThe fact that the bullets missed all your vital organs, but shattered your spine as they exited your body,\nhardly seems to matter compared to that news.  You will never walk again, you are told.  This thought seems strangely familiar.\n*goto TimeTravel\n*label Kidnapping_38_loverarrives\n\n*if ((kidnap_sondead) and (kidnap_daughterdead))\n\tThe police show up fifteen minutes later to find you cradling the dead bodies of your children.  ${lover_name} called them the instant ${lover_heshe} heard the gunshots.\n*if ((kidnap_sondead) and (kidnap_daughterdead=false))\n\tThe police show up fifteen minutes later to find you cradling the dead body of your son while ${secondchild_name} sits mutely next to you.  ${lover_name} called for help the instant ${lover_heshe} heard the gunshots.\n*if ((kidnap_sondead=false) and (kidnap_daughterdead))\n\tThe police show up fifteen minutes later to find you cradling the dead body of your daughter while ${firstchild_name} sits mutely next to you.  ${lover_name} called for help the instant ${lover_heshe} heard the gunshots.\n*goto TimeTravel\n\n*comment ------------------------------------------------- Age 45\n*label Typical_Day_45_asylum_or_badmatch\n*comment train never crashed with badmatch only or asylum\n*set age 45\n*if (asylum_37)\n\t*set lifestage \"day_45_asylum\"\n\tYou sit in\n\t*if (traininjury)\n\t\tyour wheelchair\n\t*if (traininjury=false)\n\t\ta wooden chair\n\tin a small, tidy room, as you have for many years.  There are bars on the window, and the door is locked.  You look down to see that you are wearing a white robe and paper slippers.  Your mind is fuzzy; they keep you on a lot of drugs, here in the asylum.  At least you haven't had to wear the straitjacket for the last few years. Age has calmed you.\n\t*if ((tripcanceled) or ((badmatch) and (bad_died=false)))\n\t\t*if (badmatch)\n\t\t\tThe days are long and lonely, when you are able to remember them.\n\t\t\t*if (loverdead_roof=false)\n\t\t\t\t${lover_name} divorced you a long time ago, leaving you to rot alone in your cell.\n\t\t\t*if (loverdead_roof)\n\t\t\t\tHaving killed ${lover_name}, your ${lover_husbandwife}, you receive no visitors at all.\n\t\t*if (badmatch=false)\n\t\t\t*if (loverdead_roof=false)\n\t\t\t\t${lover_name} still visits you every day. You are amazed by ${lover_hisher} faithfulness.\n\t\t\t*if (loverdead_roof)\n\t\t\t\tHaving killed ${lover_name}, your ${lover_husbandwife}, you receive no visitors at all.\n\t\t\tYour children, ${firstchild_name} and ${secondchild_name}, send cards and letters, which is nice, but you haven't actually seen them face-to-face since you were admitted to the hospital.\n\t*if (((tripcanceled) or ((badmatch) and (bad_died=false)))=false)\n\t\tThe days are long and lonely, when you are able to remember them. You have difficulty telling the doctors about that day on the roof.  Your head hurts, and everything seems out of place in your mind.\n\n\t\"You have a visitor,\" one of the orderlies says.\n\n\tYou look up to see Braedan Davenport, the lead investor who gave you the grant to start your research facility.  Despite the promising live tests, there has never been a successful human experiment.\n\t*if (terrydead_roof)\n\t\tWith Terry dead and you locked in the asylum, the team lost two valuable members.\n\t*if (jimdead_roof)\n\t\tWith Jim dead and you locked in the asylum, the team lost two valuable members.\n\t*if (loverdead_roof)\n\t\tWith ${lover_name} dead and you locked in the asylum, the team lost two valuable members.\n\t*if (((terrydead_roof=false) and (jimdead_roof=false)) and (loverdead_roof=false))\n\t\tWith you in the asylum instead of working in the lab, the team lost a valuable member.\n\t*if ((terrydead_36) and (jimdead_20=false))\n\n\t\tOr perhaps it's because Terry was killed in that tire-changing accident.  His replacement isn't nearly as good as he was.  Your head threatens to begin aching, as it always does when you think about Terry's death.\n\t*if ((terrydead_36) and (jimdead_20))\n\n\t\tOr perhaps it's because Terry was killed in that tire-changing accident and Jim by food poisoning.  Their replacements weren't nearly as good as they had been.  Your head threatens to begin aching, as it always does when\n\t\tyou think about their deaths.\n\t*if ((terrydead_36=false) and (jimdead_20))\n\n\t\tOr perhaps it's because Jim was killed all those years ago by food poisoning.  His replacement isn't nearly as good as he was.  Your head threatens to begin aching, as it always does when you think about Jim's death.\n\t\n\tUsing his connections, Mr. Davenport has gotten the hospital staff to give you a day pass to visit your old lab.  Your old research team is desperate for any help you might be able to give them.  You're very excited to go, although you aren't exactly sure why.\t\n\t*page_break\n\tA few days later, you find yourself at the lab.\n\t*if (traininjury)\n\t\tYou wheel yourself from machine to machine while Mr. Davenport stands nearby.\n\t*if (traininjury=false)\n\t\tYou walk from machine to machine while Mr. Davenport stands nearby.\n\t*if (((terrydead_36) or (terrydead_roof)) and ((jimdead_20) or (jimdead_roof)))\n\t\tThere are many new scientists working in the lab whom you don't know.\n\t\t*goto timemachineunderguard_afterfriends\n\t*if (((terrydead_36) or (terrydead_roof)) and ((jimdead_20=false) and (jimdead_roof=false)))\n\t\tThere are many new scientists working in the lab whom you don't know, although Jim stands nearby, not making eye contact with you.  He will\n\t*if (((terrydead_36=false) and (terrydead_roof=false)) and ((jimdead_20) or (jimdead_roof)))\n\t\tThere are many new scientists working in the lab whom you don't know, although Terry stands nearby, not making eye contact with you. He will\n\t*if (((terrydead_36=false) and (terrydead_roof=false)) and ((jimdead_20=false) and (jimdead_roof=false)))\n\t\tThere are many new scientists working in the lab whom you don't know, although Jim and Terry stand nearby, not making eye contact with you.  They will\n\t*if (shotfriend)\n\t\tnever forgive you for killing ${shooter_name}.\n\t\t*goto timemachineunderguard_afterfriends\n\tnever be comfortable around you since that day on the rooftop.\n\t*label timemachineunderguard_afterfriends\n\t*if ((tripcanceled) or ((badmatch) and (bad_died=false)))\n\t\tYou notice a new scientist standing where ${lover_name} should be.\n\t\t*if (loverdead_roof)\n\t\t\tThis is your ${lover_husbandwife}'s replacement.\n\t\t*if (loverdead_roof=false)\n\t\t\tYour ${lover_husbandwife} left the team when you were committed to the asylum.\n\t\t\t*if (badmatch)\n\t\t\t\t$!{lover_heshe} was ashamed to be associated with you in any way.\n\t\t\t*if (badmatch=false)\n\t\t\t\t$!{lover_heshe} felt that you needed ${lover_himher} more than the team did.\n\tSeveral armed police officers keep an eye on you as well. Nobody wants to take the chance that you might do something to damage the expensive equipment.\n\n\tAfter an hour of this, everyone grows used to your presence and relaxes.  You know that it will only take a second to do what you really came to do.  When Mr. Davenport slips out to go to the washroom and the others are focused elsewhere, you look through the computer system.  Your program is still there, the one you created in secret to allow you to run the machines without anyone at the console. You turn it on and quickly @{traininjury wheel yourself|walk} over to the Schrödinger Box, crawling inside before anyone can stop you.\n\n\tThe machines hum as they power up.  You sit in the dark, knowing that any change must be an improvement on how life is now. You can hear people rushing over to stop the machine, but it's too late.  You feel the power surging through the box and suddenly you remember... everything...\n\t*goto TimeTravel\n*comment train never crashed with badmatch only\n*set lifestage \"day_45\"\n*if (divorced_38)\n\t*if ((usedlottery_19) or (usedstocks_19))\n\t\t*if (prenup)\n\t\t\tYou sit in the living room of your large home.  The room is messy, despite the hard work of the staff. Ever since the divorce, your headaches have been getting worse.  The staff knows not to intrude upon you when you are in a bad mood and your temples are throbbing.  Things haven't been going well with your research.\n\t\t\t*goto Typical_Day_45_AfterWealth\n\t\tYou sit in a modest house with a rather small television.  Your ex-${lover_husbandwife}\ttook most of your money in the divorce.  As if that wasn't enough, your research has been running into some serious troubles.\n\t\t*goto Typical_Day_45_AfterWealth\n\t*else\n\t\t*if (prenup)\n\t\t\tYou sit in a small apartment.  The wallpaper is peeling and the television doesn't work.  Your ex-${lover_husbandwife}\tdidn't get any of the money you had, but there hadn't been very much to protect. As if that wasn't enough, your research has been running into some serious troubles.\n\t\t\t*goto Typical_Day_45_AfterWealth\n\t\tYou sit in a run-down old apartment.  The wallpaper is peeling and the television doesn't work.  Your ex-${lover_husbandwife} didn't take much, but there hadn't been much left to take.  As if that wasn't enough, your research has been running into some serious troubles.\n\t\t*goto Typical_Day_45_AfterWealth\n*else\n\t*if ((usedlottery_19) or (usedstocks_19))\n\t\tYou sit in the living room of your large home.  The room is messy, despite the hard work of the staff. ${lover_name} is out again, which is for the best, since all you ever do is fight when you're together.  As if that wasn't enough, your research has been running into some serious troubles.\n\t\t*goto Typical_Day_45_AfterWealth\n\t*else\n\t\tYou sit in a small apartment.  The wallpaper is peeling and the television doesn't work.  ${lover_name} is out again, which is for the best, since all you ever do is fight when you're together.  To make matters worse, the human trials at the lab have all failed spectacularly.  \n\t\t*goto Typical_Day_45_AfterWealth\n*label Typical_Day_45_AfterWealth\n\nAfter the massive success of the live animal trials, you were eventually given the go-ahead for human testing. Unfortunately every single human test subject caused the computer to create a Paradox Factor so high that the machine aborted, stopping them from traveling in time.  The investors all pulled out, believing that intelligent time travel was impossible. You started using your own money to continue the research for as long as you could.\n*if (divorced_38=true)\n\t*if (prenup=false)\n\t\t*if ((usedlottery_19) and (usedstocks_19=false))\n\t\t\tBut even your half of the lottery money, after ${lover_name} took ${lover_hisher} half, didn't last very long.\n\t\t*if ((usedstocks_19) and (usedlottery_19=false))\n\t\t\tBut even your half of your remarkably successful investments, after ${lover_name} took ${lover_hisher} half, didn't last very long.\n\t\t*if ((usedstocks_19) and (usedlottery_19))\n\t\t\tBut even your half of your remarkably successful investments and lottery winnings, after ${lover_name} took ${lover_hisher} half, didn't last very long.\n\t*if (prenup)\n\t\t*if ((usedlottery_19) and (usedstocks_19=false))\n\t\t\tBut even all of your lottery money, after protecting it from your ex-${lover_husbandwife}, didn't last very long.\n\t\t*if ((usedstocks_19) and (usedlottery_19=false))\n\t\t\tBut even all of your investment money, after protecting it from your ex-${lover_husbandwife}, didn't last very long.\n\t\t*if ((usedstocks_19) and (usedlottery_19))\n\t\t\tBut even all of your lottery and investment money, after protecting it from your ex-${lover_husbandwife}, didn't last very long.\n*if (divorced_38=false)\n\t*if ((usedlottery_19) and (usedstocks_19=false))\n\t\tBut even all of your lottery money didn't last very long.\n\t*if ((usedstocks_19) and (usedlottery_19=false))\n\t\tBut even all of your investment money didn't last very long.\n\t*if ((usedstocks_19) and (usedlottery_19))\n\t\tBut even all of your lottery and investment money didn't last very long.\n\nYour best guess is that humans are too intelligent to properly travel through time.  They don't make small changes. Upon seeing their entire life in a moment with the ability to change anything they want, they make too many large changes and cause a paradox.  Once this happens, the computer reports a Paradox Factor and aborts the process, and the time travel never takes place.  But regardless, it's all over now. The funds are completely gone, and the lab is going to be disassembled and sold off in the morning.\n*if ((terrydead_36) and (jimdead_20=false))\n\tPerhaps it was because Terry was killed in that tire-changing accident.  His replacement wasn't nearly as good as he had been.  Your head threatens to begin aching, as it always does when you think about Terry's death.\n*if ((terrydead_36) and (jimdead_20))\n\tPerhaps it was because Terry was killed in that tire-changing accident and Jim by food poisoning.  Their replacements weren't nearly as good as they had been.  Your head threatens to begin aching, as it always does when you think about their deaths.\n*if ((terrydead_36=false) and (jimdead_20))\n\tPerhaps it was because Jim was killed all those years ago by food poisoning.  His replacement wasn't nearly as good as he had been.  Your head threatens to begin aching, as it always does when you think about Jim's death.\n*set typical_day_45_used_proftalk false\n*set typical_day_45_used_invite false\n*comment Badmatch and no crash, rich or poor, divorced or not\n*label Typical_Day_45_loop\n*choice\n\t*if ((divorced_38=false) and (knowofdiary=false)) #Contemplate my marriage.\n\t\t*set knowofdiary true\n\t\tA twenty-six year marriage is impressive to most people, but it has been difficult for you.  Although you were certain you were in love with ${lover_name} when you married ${lover_himher}, now it feels like you live with a stranger.  Frustrated, you get up and walk around the room. Your marriage troubles were made obvious when the two of you started sleeping in separate bedrooms a few years ago.\n\n\t\tYou walk to ${lover_name}'s bedroom door without really thinking about what you are doing.\n\t\t*if (lover_hisher=\"her\")\n\t\t\tHer open jewelry box sits on the dresser.  You can see her wedding band and engagement ring from the doorway.  Full of sadness and melancholy, you walk over to it. Hidden under the jewelry\n\t\t*if (lover_hisher=\"his\")\n\t\t\tYou see his wedding band sitting on a cigar box on his dresser.  Full of sadness and melancholy, you walk over to it. He doesn't smoke cigars often, but he's owned the box for as long as you've known him.  Hidden under the cigars\n\t\tis a small black book.\n\n\t\tYou're surprised to have found ${lover_hisher} diary; you didn't even know ${lover_heshe} kept one. Without thinking, you open it up and look through it. Many of the pages are missing, having been torn out.  You wonder what secrets ${lover_name} has removed.  You leave the diary where you found it and return to the living room.\n\t\t*goto Typical_Day_45_loop\n\t*if ((professor_readobit=false) and ((divorced_38=true) and (professor_friend))) #Reminisce about my failed marriage.\n\t\tYou were so naive, back then.  Becoming melancholy, you dig out your wedding album and flip through the pictures. You see Professor Deakin in one of them and wonder what ever happened to him.  It only takes a moment online to learn that he died of cancer shortly after the wedding.\n\t\t*set professor_readobit true\n\t\t*goto Typical_Day_45_loop\n\t*if (((professor_warnedonce) and (professor_friend)) and ((professor_alive=false) and (professor_knowcancer=false))) #Research the type of cancer that killed Professor Deakin.\n\t\t*gosub Research_Cancer_sub\n\t\t*goto Typical_Day_45_loop\n\t*if ((((professor_alive) and (divorced_38=false)) and ((typical_day_45_used_proftalk=false) and (professor_friend))) and (typical_day_45_used_invite=false)) #Invite Professor Deakin over.\n\t\t*set typical_day_45_used_invite true\n\t\tThe ninety-year old professor is like a second father to you. Unfortunately, ${lover_name} never liked him, and after several arguments during visits in the past, Professor Deakin will not come to your house. He has apologized many times, but he won't change his mind. While you are with ${lover_name}, your old friend won't visit you.\n\t\t*goto Typical_Day_45_loop\n\t*if (((professor_alive) and (divorced_38)) and ((typical_day_45_used_proftalk=false) and (professor_friend))) #Invite Professor Deakin over.\n\t\tThe professor is like a second father to you.  He's a very healthy ninety-year-old man and is more than happy to come visit you.\n\t\t*set typical_day_45_used_proftalk true\n\t\t*if (((usedlottery_19) or (usedstocks_19)) and (prenup))\n\t\t\tYou tell your driver to go get him.\n\t\t*if ((((usedlottery_19) or (usedstocks_19)) and (prenup))=false)\n\t\t\tYou send a cab to go get him.\n\t\tAn hour later, you find yourself sitting in your living room with Professor Deakin across from you.  You've told him about the end of your research and the dismantling of the lab.\n\n\t\t\"Perhaps it's just too soon in human history for such a great discovery,\" he says.  \"Either way, you, Marty, and the gang will still make the history books.\"\n\n\t\t\"It isn't just that,\" you tell him as you rub your temples, feeling another headache coming on.  \"Do you ever feel like your life isn't happening the way it's supposed to?\"\n\n\t\t\"Do you mean your @{divorced_38 ex-|}${lover_husbandwife}?\" he asks astutely.\n\t\t\n\t\t\"I don't know what I mean,\" you answer.  \"I just... I just think that things went off the rails somewhere.\"\n\t\t\n\t\t\"God has a plan for us all,\" he responds, which is surprising: you don't think of him as a religious man.  \"But sometimes, He lets us take the long path to where He wants us to go.\"\n\t\t\n\t\tThe rest of the visit goes well, although it's still a sad day.  A few hours later he returns home, leaving you alone once more.  His words echo in your head, ringing very true.  Despite what he said, you begin to realize that something very wrong is happening in your life.\n\t\t*if (lover_name!=truelove)\n\t\t\tMemories of a different\n\t\t\t*if (lover_heshe=\"he\")\n\t\t\t\tman\n\t\t\t*if (lover_heshe=\"he\")\n\t\t\t\twoman\n\t\t\tdrift up from the deepest recesses of your mind... ${truelove}?  The thoughts fade almost immediately.\n\t\t*set realizesomethingwrong true\n\t\t*goto Typical_Day_45_loop\n\t#Go to the lab, planning to do something foolish.\n\t\t*comment Only reached if no crash, so never injured and badmatch.\n\t\tWith no children and @{divorced_38 no ${lover_husbandwife}|a terrible marriage}, your career has become your life. You walk among the machines, turning them on one at a time.  It's a foolish move, but sometimes great risks are necessary. You have even secretly created a program to run the machines without anyone at the console.  You activate the program and crawl into the large metal box.\n\n\t\tThe machines hum as they power up.  You sit in the dark, telling yourself over and over that you will only make one small change.  Something insignificant, nothing else.  You won't fall down a slippery slope, making changes willy-nilly. That would cause a Paradox Factor and shut down the machine, making you not travel in time and rendering your life's work a failure.  You feel the power surging through the box and suddenly you remember... everything...\n\t\t*if (urgetoendit)\n\t\t\t*choice\n\t\t\t\t#Continue to make changes.\n\t\t\t\t\t*goto TimeTravel_ns\n\t\t\t\t#Accept my life.\n\t\t\t\t\tYou long for a person you never met.  Your one true love.  The name ${truelove} floats into your mind.  You remember a different time.  A time with kids…a train…a kidnapping…so much pain, so much heartache. Perhaps this is best.  Your children were never\n\t\t\t\t\t*if ((((lover_hisher=\"his\") and (gender=\"male\")) or ((lover_hisher=\"her\") and (gender=\"female\"))) or (gender=\"nonbinary\"))\n\t\t\t\t\t\tadopted\n\t\t\t\t\t*if (((lover_hisher=\"his\") and (gender=\"female\")) or ((lover_hisher=\"her\") and (gender=\"male\")))\n\t\t\t\t\t\tconceived\n\t\t\t\t\tand your soulmate never fell in love with you. They would never know the pain and suffering of their unlived lives.\n\n\t\t\t\t\tAs the Schrödinger Box opens, your memories of the future and of the alternative pasts fade away.  You look to the computer, seeing that it claims that there is a Paradox Factor of zero.  You wonder if there's an error with the experiment, because you have no recollection of having a past any different than the one you have now.  Perhaps time travel for humans really is impossible after all?\n\t\t\t\t\t*set achievement_noloss true\n\t\t\t\t\t*achieve noloss\n\t\t\t\t\t*page_break The End\n\t\t\t\t\t*goto retire\n\t\t*else\n\t\t\t*goto TimeTravel\n\t#I remember a time...\n\t\t*goto TimeTravel_ns\n\n*label Typical_Day_45_nodaughter\n*set lifestage \"day_45\"\n*comment Has stocks,goodmatch.\n*set age 45\nIt's no use, you think to yourself as you turn off the computer screen and lean back in your chair. The desk in your study is top of the line, filled with three different computer monitors and a touch-pad keyboard.\n*if (kidnap_loverdead=false)\n\t${lover_name} is asleep; the years haven't been kind to ${lover_himher}.\nYou've been going over the data from the human trials for weeks now, but to no avail.  Every human test subject has registered a Paradox Factor and shut down the process.  It's starting to look like time travel really is impossible, at least for humans.\n\nYou look at the screen saver on the center monitor and see the youthful faces\n*if (kidnap_loverdead=false)\n\tof ${firstchild_name} and ${secondchild_name} smiling back at you.  Of course, that was the reason why ${lover_name} was sleeping in the middle of the afternoon.  $!{lover_heshe} has been suffering greatly from the grief of losing your\n\t*if (kidnap_sondead)\n\t\tchildren.\n\t*if (kidnap_sondead=false)\n\t\tdaughter.\n*if (kidnap_loverdead)\n\tof ${lover_name}, ${firstchild_name}, and ${secondchild_name} smiling back at yo
