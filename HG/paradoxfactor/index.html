<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paradox Factor — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>

  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>

    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

\"his\")\n\t\tguy\n\t*if (lover_hisher=\"her\")\n\t\tgirl\n\tyou've been dating for about two years.  Your best friends are Jim, a computer science student, and Terry, a biology student.\n\t*if (professor_friend)\n\t\tProfessor Deakin, one of your teachers, is a good friend of yours as well.\n\t*if (usedlottery_19)\n\t\tA year ago, you won the lottery.\n\t*finish\n*if (lifestage=\"grant\")\n\tYou are a student at a prestigious college, studying for an advanced degree in physics and mathematics, although if the meeting with the investors goes well, you intend to leave school before graduating.  You are married to ${lover_name}, a fellow student and a member of your new research team.  \n\t*if (jimdead_20=false)\n\t\tYour best friends, also on your newly formed research team, are Jim, a computer science student, and Terry, a biology student.\n\t*if (jimdead_20)\n\t\tYour best friend, also on your newly formed research team, is Terry, a biology student.\n\t*if (professor_friend)\n\t\tProfessor Deakin, one of your former teachers, is a good friend of yours as well.\n\t*if ((usedlottery_19) and (usedstocks_19=false))\n\t\tTwo years ago, you won the lottery.\n\t*if ((usedlottery_19) and (usedstocks_19))\n\t\tTwo years ago, you won the lottery and began to invest in the stock market.\n\t*if ((usedlottery_19=false) and (usedstocks_19))\n\t\tTwo years ago, you began to invest in the stock market.\t\t\n\t*finish\n*if (lifestage=\"firstchild\")\n\tYou work for a private research company studying the possibility of time travel.  You are married to ${lover_name}, a fellow member of your research team.  \n\t*if (jimdead_20=false)\n\t\tYour best friends Jim, a computer scientist, and Terry, a biologist, also work with you.\n\t*if (jimdead_20)\n\t\tYour best friend Terry, a biologist, also works with you.\n\t*if (professor_friend)\n\t\tProfessor Deakin, one of your former teachers, is a good friend of yours as well.\n\t*if ((usedlottery_19) and (usedstocks_19=false))\n\t\tThree years ago, you won the lottery.\n\t*if ((usedlottery_19) and (usedstocks_19))\n\t\tThree years ago, you won the lottery and began to invest in the stock market.\n\t*if ((usedlottery_19=false) and (usedstocks_19))\n\t\tThree years ago, you began to invest in the stock market.\n\t*finish\n*if (lifestage=\"secondchild\")\n\tYou work for a private research company studying the possibility of time travel.  You are married to ${lover_name}, a fellow member of your research team.\n\t*if (timemachineused=false)\n\t\tYou have a two-year-old son and a newborn little girl.\n\t*if (timemachineused)\n\t\tYou have a two-year-old son named ${firstchild_name} and a newborn little girl named ${secondchild_name}.\n\t*if (jimdead_20=false)\n\t\tYour best friends Jim, a computer scientist, and Terry, a biologist, also work with you.\n\t*if (jimdead_20)\n\t\tYour best friend Terry, a biologist, also works with you.\n\t*if (professor_friend)\n\t\tProfessor Deakin, one of your former teachers, is a good friend of yours as well.\n\t*if ((usedlottery_19) and (usedstocks_19=false))\n\t\tFive years ago, you won the lottery.\n\t*if ((usedlottery_19) and (usedstocks_19))\n\t\tFive years ago, you won the lottery and began to invest in the stock market.\n\t*if ((usedlottery_19=false) and (usedstocks_19))\n\t\tFive years ago, you began to invest in the stock market.\n\t*finish\n*if (lifestage=\"livetrials\")\n\tYou work for a private research company studying the possibility of time travel.\n\t*if (badmatch)\n\t\tYou are unhappily married to ${lover_name}, a fellow member of your research team.\n\t*if (badmatch=false)\n\t\tYou are married to ${lover_name}, a fellow member of your research team and the\n\t\t*if (((lover_hisher=\"his\") and (gender=\"male\")) or ((lover_hisher=\"her\") and (gender=\"female\")))\n\t\t\tother\n\t\t*if (lover_hisher=\"his\")\n\t\t\tfather\n\t\t*if (lover_hisher=\"her\")\n\t\t\tmother\n\t\tof your children, ${firstchild_name} and ${secondchild_name}.\n\t*if (jimdead_20=fal hterdead))\n\t\t\t\tYour daughter was killed by kidnappers a few years ago.\n\t\t\t*if ((kidnap_sondead) and (kidnap_daughterdead))\n\t\t\t\tYour children were killed by kidnappers a few years ago.\n\t*if ((kidnap_loverdead) and (usedstocks_19))\n\t\t*if ((kidnap_sondead) and (kidnap_daughterdead=false))\n\t\t\t${lover_name} and your son were killed by kidnappers a few years ago. You and your daughter still miss them.\n\t\t*if ((kidnap_sondead=false) and (kidnap_daughterdead))\n\t\t\t${lover_name} and your daughter were killed by kidnappers a few years ago. You and your son still miss them.\n\t\t*if ((kidnap_sondead) and (kidnap_daughterdead))\n\t\t\t${lover_name} and your children were killed by kidnappers a few years ago.\n\t*if ((jimdead_20=false) and (terrydead_36=false))\n\t\tYour best friends Jim, a computer scientist, and Terry, a biologist, also work with you.\n\t*if ((jimdead_20=false) and (terrydead_36))\n\t\tYour best friend, Jim, is a computer scientist who also works with you.\n\t*if ((jimdead_20) and (terrydead_36=false))\n\t\tYour best friend, Terry, is a biologist who also works with you.\n\t*if ((professor_friend) and (professor_alive))\n\t\tProfessor Deakin is a good friend of yours from college.\n\t*if ((usedlottery_19) and (usedstocks_19=false))\n\t\tYou have become very wealthy from your lottery win.\n\t*if ((usedlottery_19) and (usedstocks_19))\n\t\tYou have become very wealthy from your lottery win and the stock market.\n\t*if ((usedlottery_19=false) and (usedstocks_19))\n\t\tYou have become very wealthy from the stock market.\n\t*if (kidnap_injury)\n\t\tYou were paralyzed from the waist down in the kidnapping and now use a wheelchair.\n\t*finish\n*if (lifestage=\"paradox\")\n\tYou work for a private research company studying the possibility of time travel. You are widowed. ${truelove} and your children, William and Brittany, were killed in a terrible train crash three years ago.  Your best friends Jim, a computer scientist, and Terry, a biologist, both work with you.\n\n\tYou aren't rich, being a scientist for a research company, but you have enough money to support yourself.  You were paralyzed from the waist down in the train accident and now use a wheelchair.\n\t*finish\t\nERROR!  THIS SHOULD NEVER BE REACHED.  IF YOU SEE THIS MESSAGE, PLEASE REPORT IT SAYING THAT \"lifestage\" WASN'T FOUND.\n*finish\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game.\n\n  *purchase_discount adfree 2023-02-23 $2.99 $1.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n\n", "info_sheet": "*comment Copyright 2013 by Mike Walter.\n*comment Paradox Factor\n*comment info_sheet.txt\n\nTerry: Biologist.  \nJim: Computer scientist (Tall, gangly, with curly brown hair) with Susan (short and quiet).\n\nOriginal Kids:  William and Brittany\nLover:  \n\tBeth (good): She has brown hair and is wearing a tight sweater and glasses.\n\tGwen (bad): Wearing a low-cut tank top and tight jeans.\n\tTom (good): A tall, athletic blond boy.\n\tGreg (bad): Wears top-of-the-line clothing and looks to be in great shape.\n\nDawson: Abusive son-in-law.\n\nProfessor Deakin: A bald man with a fringe of grey hair around the back and sides of his head.\n\nBraedan Davenport: Lead investor.\n", "paradox": "*comment Copyright 2013 by Mike Walter.\n*comment Paradox Factor\n*comment paradox.txt\n*comment\n\n*comment ------------------------------------------------- Age 18 College Class\n*label College_class\n*set lifestage \"class\"\n*set seen_college_class true\n*set age 18\n\"Now let us imagine an absurdity,\" the professor says.\n\nYou are in a large room with nearly two hundred students sitting behind tables in the amphitheater-like lecture hall.  Professor Deakin is a bald man with a fringe of grey hair around the back and sides of his head.  He is droning on as the students listen.\n*if (timemachineused=false)\n\tThe pen lying on your notebook begins to roll and falls to the floor.  A few students look over at you with bored expressions on their faces.  You reach under your desk and pick it up again.\n*if (timemachineused)\n\tYour head hurts slightly; you have been having bad headaches lately.  The pen lying on your notebook rolls off the desk and into your waiting hand.  You set it down next to your notebook and continue listening to the lecture.\n\n*if (realizesomethingwrong)\n\tYou really can't explain it, but as you listen to Professor Deakin speak, your mind is full of other thoughts.  His voice seems to trigger a memory.  You imagine him very old...  Your head begins to throb with the headaches that have plagued you since childhood.\n\n\"Imagine a sealed box,\" the professor says from the front of the class.  \"And inside this box, a cat and a vial of poison.  Now, further imagine that this poison will be released randomly, such that there is no way to tell whether the poison has been released or not.\"\n\n\"I wonder what PETA would think of that?\" a voice quips from behind you, followed by a few snickers.\n*page_break\n*if (timemachineused)\n\t*if (likesboys)\n\t\tYou turn toward the voice, but just before you make eye contact, another blinding headache streaks through your brain. You close your eyes for a moment.\n\n\t\t*if (realizesomethingwrong)\n\t\t\t\"Hey, you okay?\" the guy beside you asks.  Strangely, you realize that you know his name's Greg, although he hasn't said it yet.\n\n\t\t\tYou nod as you turn toward him.  He's wearing top-of-the-line clothing and looks to be in great shape.  He smiles a perfect\tsmile at you and slides closer.\n\t\t\t*choice\n\t\t\t\t#Speak to Greg.\n\t\t\t\t\t*goto College_class_choosegreg\n\t\t\t\t#Turn away from Greg and look for Tom.\n\t\t\t\t\tTom?  You hardly know the guy, but yes, he's the one who made the joke.  You turn to look at the tall, athletic, blond-haired boy.  Yes, there he is.  He's a player on the school football team.\n\t\t\t\t\t*goto College_class_choosetom\n\t\t\"Hey, you okay?\" the guy beside you asks.\n\n\t\tYou nod as you turn toward him.  He's wearing top-of-the-line clothing and looks to be in great shape.  He smiles a perfect smile at you and slides closer.\n\n\t\t*label College_class_choosegreg\n\t\t\"Hi, I'm Greg,\" he says.  \"You look a little green.  Come on, let's get out of here and get some fresh air.\"\n\n\t\t\"No, I'm fine,\" you smile back.  \"Maybe after the lecture.\"\n\n\t\tThat was the day you met your future husband.\n\t\t*set lover_name \"Greg\"\n\t\t*set lover_hisher \"his\"\n\t\t*set lover_himher \"him\"\n\t\t*set lover_heshe \"he\"\n\t\t*set lover_handsomebeautiful \"handsome\"\n\t\t*set lover_boyfriendgirlfriend \"boyfriend\"\n\t\t*set lover_husbandwife \"husband\"\n\t\t*set badmatch true\n\t\t*goto College_Class_2\n\t*if (likesgirls)\n\t\tYou turn toward the voice, but just before you make eye contact, another blinding headache streaks through your brain. You close your eyes for a moment.\n\n\t\t*if (realizesomethingwrong)\n\t\t\t\"Hey, you okay?\" the girl beside you asks.  Strangely, you seem to recall her name, although you've never met her before.\n\n\t\t\t\"Gwen?\" you say without thinking.  She's wearing a low-cut tank top and tight jeans.\n\n\t\t\tShe nods, obviously thinking you must know her from somewhere, although you know that this is the first time you've ever met.\n\t\t\t*choice\n\t\t\t\t#Listen to Gwen.\n\t\t\t\t\t*goto College_class_choosegwen\n\t\t\t\t#Turn away from Gwen and look for Beth.\n\t\t\t\t\tBeth?  You don't know a Beth.  Gwen turns back to the lecture.  On the other side of you there is a girl with brown hair wearing a tight sweater and glasses.  \n\t\t\t\t\t*goto College_class_choosebeth\n\t\t\"Hey, you okay?\" the girl beside you asks.\n\n\t\tYou nod, turning toward her.  She's wearing a low-cut tank top and tight jeans.\n\n\t\t\"I'm Gwen,\" she says.\n\t\t*label College_class_choosegwen\n\t\t\"This guy is soooo boring.  Want to go get a drink?\"\n\n\t\t\"Sure,\" you smile back.  \"After the lecture.\"\n\n\t\tThat was the day you met your future wife.\n\t\t*set lover_name \"Gwen\"\n\t\t*set lover_hisher \"her\"\n\t\t*set lover_himher \"her\"\n\t\t*set lover_heshe \"she\"\n\t\t*set lover_handsomebeautiful \"beautiful\"\n\t\t*set lover_boyfriendgirlfriend \"girlfriend\"\n\t\t*set lover_husbandwife \"wife\"\n\t\t*set badmatch true\n\t\t*goto College_Class_2\n*if (likesboys)\n\tThe class comedian is a tall, athletic, blond-haired boy.  You recognize him immediately as a player on the school football team.\n\t*label College_class_choosetom\n\tYou heard a rumor that he's also very smart, having earned a full academic scholarship.  Despite the class clown behaviour, he is actually taking careful notes and paying full attention to the lecture.\n\n\tHe sees you watching and smiles.  To your surprise, he gets up, hops over the seat behind you, and sits down next to you.\n\n\t\"${name}, right?\" he asks.\n\n\tYou nod, amazed that he knows your name.\n\n\t\"I'm Tom.\"\n\n\tYou nod again, already finding yourself lost in his bright blue eyes.  And that was how you met your future husband, the love of your life.\n\t*set badmatch false\n\t*set lover_name \"Tom\"\n\t*set lover_hisher \"his\"\n\t*set lover_himher \"him\"\n\t*set lover_heshe \"he\"\n\t*set lover_handsomebeautiful \"handsome\"\n\t*set lover_boyfriendgirlfriend \"boyfriend\"\n\t*set lover_husbandwife \"husband\"\n\t*goto College_Class_2\n*if (likesgirls)\n\tThe girl sitting next to you laughs lightly at the joke, but continues listening to the lecture.  She has brown hair and is wearing a tight sweater and glasses. The professor drones on as you look at her.  \n\t*label College_class_choosebeth\n\tBefore you can turn\taway, she turns her head and locks eyes with you.\n\n\t\"Hi,\" you say in a knee-jerk kind of way.\n\n\t\"Shouldn't you be taking notes?\" she asks with a smirk.\n\n\t\"Schrödinger's cat,\" you say with a smile.  \"These first-year quantum physics classes are all the same.\"\n\n\t\"Oh, do you take a lot of first-year quantum physics classes?\"\n\n\t\"I sure do, you meet a lot of nice people in them.  My name's ${name}.\"\n\n\tTo your surprise, the girl laughs at your feeble joke.\n\n\t\"I'm Beth,\" she says with a friendly smile.  \"Maybe you should be in my study group, since you're\n\tan expert on this class?\"\n\n\t\"That's a good idea,\" you reply.  And that was how you met your future wife, the love of your life.\n\t*set badmatch false\n\t*set lover_name \"Beth\"\n\t*set lover_hisher \"her\"\n\t*set lover_himher \"her\"\n\t*set lover_heshe \"she\"\n\t*set lover_handsomebeautiful \"beautiful\"\n\t*set lover_boyfriendgirlfriend \"girlfriend\"\n\t*set lover_husbandwife \"wife\"\n\t*goto College_Class_2\n\n*label College_Class_2\n*temp college_class_used_payattention\n*set college_class_used_payattention false\n*label college_Class_Loop\n*choice\n\t*if (college_class_used_payattention=false) #Pay attention to the lecture.\n\t\t*set college_class_used_payattention true\n\t\t\"Erwin Schrödinger, 1935,\" the professor continues.  \"The thought experiment helps us to understand the idea of a blurred model of reality.  Until the box is opened, we cannot say that the cat is alive or that the cat is dead.  In fact, both statements are equally valid and equally true.\"\n\n\t\t\"This blurred model is hard for us to accept.  We are used to believing in X or in Y.  Our natural world rarely gives us the opportunity to experience simultaneous realities, where both X and Y are true, yet inherently anathema to each other's existence.  In quantum mechanics, such phenomena are routine...\"\n\t\t*goto college_Class_Loop\n\t*if (professor_readobit) #Tell the professor that he's going to die of cancer.\n\t\tWhat a strange thought.  Your head aches, and it makes no sense for you to do such a thing.  After the lecture ends, you walk down to the front of the lecture hall where Professor Deakin is still standing.  ${lover_name} waits for you at the door while you speak to the professor.\n\n\t\t\"You're going to die of cancer,\" you tell him boldly.\n\n\t\t\"Excuse me?\" Professor Deakin responds incredulously.  \"That isn't funny.  If you need to speak to me about a school related issue, you can see me during my regular office hours.  Good day.\"\n\n\t\tThe old man gathers his things and leaves the class, giving you a dirty look over his shoulder as he goes.\n\n\t\t*if (badmatch)\n\t\t\t\"That was hilarious,\" ${lover_name} says from the door with a smile on ${lover_hisher} face.\n\t\t*if (badmatch=false)\n\t\t\t\"What was that all about?\" ${lover_name} asks from the door with a curious look on ${lover_hisher} face.\n\n\t\tYou shake your head as you leave the classroom, not sure what came over you.\n\t\t*set professor_friend false\n\t\t*goto TimeTravel\n\t*if (timemachineused) #Speak to Professor Deakin after class.\n\t\tIt's strange, you've never felt a need to speak to any of your professors before.  Your head aches as you make your way to the front of the classroom.  ${lover_name} waits for you at the door while you speak to the teacher.\n\n\t\t\"I found your ideas very interesting,\" you tell Professor Deakin.  \"Do you think it would be possible to use the blurred model of reality in a more macro-biological sense?  For a person to actually know many realities at one time?  And if so, what would happen if they changed these realities?\"\n\n\t\tThe bald professor looks at you strangely for a moment before speaking.  \"It's an interesting idea.  Why don't you come by the college bar tomorrow after class?  I usually stop in for a drink and chat with students about theoretical ideas.\"\n\n\t\tIt might be nice to have a friend like the professor, even though he's so old.\n\t\t*choice\n\t\t\t#Say yes, I'd be delighted.\n\t\t\t\t*set professor_friend true\n\t\t\t\t*goto TimeTravel_ns\n\t\t\t#Say no, I'm too busy.\n\t\t\t\t*set professor_friend false\n\t\t\t\t*goto TimeTravel_ns\n\t#I remember a time...\n\t\t*goto TimeTravel_ns\n\n*comment ------------------------------------------------- Age 19 Coffee Shop\n*label College_Coffee\n*set lifestage \"coffee\"\n*set age 19\n\"Well, why not?\" Terry asks, his black mustache flapping in his excitement.\n\n\"Well,\" Jim answers, tapping his long fingers on the table.  \"For one thing, it would kill the subject.\"\n\nIt's a regular weekday afternoon.  You, Terry, Jim, and ${lover_name} sit around the small table in your favourite coffee shop, chatting about your classes and hypothetical scenarios.  Today's topic of heated debate is time travel. It is a topic that has been growing less and less theoretical as your college days continue.\n\n\"I agree with Terry,\" you add.  \"If we can remember the past without it hurting us, once we remove the neural blocks,\n*if (professor_friend)\n\tremembering the future should cause no additional strain.  Professor Deakin thinks such a state should be attainable, although perhaps not common in the natural world.\"\n*if (professor_friend=false)\n\tremembering the future should cause no additional strain.\"\t\n\nIt's an exciting conversation.  You recently read about the newly created neural block in a scientific journal.  After many late-night sessions with your friends, you came up with the idea of using the memory erasing device in reverse, to create an effect that the original creators never intended.\n*page_break\n\"Okay, assuming that it doesn't lobotomize the subject,\" Jim says,  \"it makes sense that while living their entire life all at once, no particular moment would be different than any other.  So sure, they should be able to make changes at any point in their life…as long as they don't cause a paradox.  Then, to bring them back, we put the blocks back in place and they forget the future, bringing them back to the present.  But why are we calling it a Schrödinger Box?\"\n\nAs he speaks, Jim leans over the coffee table and bumps into his tea.\n*if ((timemachineused) and (seen_college_coffee))\n\tThe cup begins falling to the ground.  But, quick as lightning, your hand shoots out and catches it in midair.  Terry applauds your quick reflexes.  Smiling, you return his tea to the table.\n\t*goto After_Coffee_Spill\n*else\n\tThe cup falls to the ground, smashing on the floor.  He gets some napkins from the dispenser and begins cleaning it up as the conversation continues.  Your tall friend has always been accident prone.\n\t*set seen_college_coffee true\n\t*goto After_Coffee_Spill\n\n*label After_Coffee_Spill\n\n\"Because the subject would experience a blurred model of reality,\" ${lover_name} says,  \"every decision that the subject could make occurs simultaneously as they experience their life all at once.  This is what allows the computer to read those decisions to determine the Paradox Factor.\"\n*if (badmatch=false)\n\n\t${lover_name} reaches over and takes your hand.  \"And, it was the topic of the lecture where we first met.\"\n\n\tJim and Terry both roll their eyes good-naturedly at this statement, causing everyone to laugh.\n*temp college_coffee_used_checktickets false\n*temp college_coffee_used_lottery false\n*temp college_coffee_used_financial false\n*temp college_coffee_used_ads false\n*temp college_coffee_used_fight false\n*temp college_coffee_jimtalk false\n*temp already_knows_lottery knowlottery_19\n*temp justwon false\n*label College_Coffee_Loop\n*choice\n\t*if ((college_coffee_used_checktickets=false) and (already_knows_lottery)) #Check my lottery ticket.\n\t\t*set college_coffee_used_checktickets true\n\t\tYou open the newspaper and check the numbers, one at a time.\n\t\t*if ((timemachineused=false) or (already_knows_lottery=false))\n\t\t\tNope, no winner today, you think to yourself.\n\t\t\t*goto College_Coffee_Loop\n\t\t*set usedlottery_19 true\n\t\t*set justwon true\n\n\t\t\"I won,\" you say quietly under your breath before the full realization hits you.  \"I won!!\"\n\n\t\tThe others don't believe you at first, but there it is, right in front of you.  Your life is going to change dramatically!\n\t\t*goto College_Coffee_Loop\n\t*if ((college_coffee_used_checktickets=false) and (already_knows_lottery)) #Throw away the lottery ticket.\n\t\t*set usedlottery_19 false\n\t\t*set college_coffee_used_checktickets true\n\t\tYou aren't even sure why you bought the silly thing.  It was cheap, so you aren't too worried about it.  You toss it into the trash with the rest of the garbage when you clear the table.\n\t\t*goto College_Coffee_Loop\n\t*if (college_coffee_jimtalk=false) #Ask Jim about his date last night.\n\t\t*set college_coffee_jimtalk true\n\t\t*if (justwon)\n\t\t\t\"My date?\" he says excitedly.  \"How can you talk about my date?  You just won the lottery!\"\n\t\t\t*goto College_Coffee_Loop\n\t\tThe tall boy blushes so brightly that you are afraid he is going to pass out.\n\n\t\t\"Susan seems really nice,\" he says after a short pause, pushing his glasses up his nose once more.\n\n\t\tJim is tall, with curly brown hair.  He seems to have two left feet and is all elbows.  Susan, a short, quiet student, had finally asked him out after months of the two of them flirting awkwardly.\n\t\t*goto College_Coffee_Loop\n\t*if ((((college_coffee_used_lottery=false) and (already_knows_lottery)) or (college_coffee_used_financial=false)) or ((college_coffee_used_ads=false) or (college_coffee_used_fight=false))) #Read the newspaper.\n\t\tYou skim through the paper as the others continue to talk.\n\t\t*label College_coffee_newspaper_loop\n\t\t*choice\n\t\t\t*if (college_coffee_used_fight=false) #Read the sports section.\n\t\t\t\t*set college_coffee_used_fight true\n\t\t\t\tYou flip through the baseball, basketball, and football scores.  The New Daria Wizards are having an especially good year.  The results of last night's mixed martial arts tournament are displayed as well.\n\t\t\t\t*if (seen_nofight)\n\t\t\t\t\tStrange thoughts fill your mind.  Memories of events that never occurred...  You rub your head as you look at the paper.  Why would you want to take up martial arts?  You're already so busy with school, but you find the idea intriguing.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Join a martial arts school.\n\t\t\t\t\t\t\tIt will be a lot of work, but you make a personal goal to learn how to fight.\n\t\t\t\t\t\t\t*set kidnap_fighter true\n\t\t\t\t\t\t\t*goto College_coffee_newspaper_loop\n\t\t\t\t\t\t#Ignore the thought.\n\t\t\t\t\t\t\tIt makes no sense, so you put the thought out of your mind.\n\t\t\t\t\t\t\t*set kidnap_fighter false\n\t\t\t\t\t\t\t*set kidnap_someonedead true\n\t\t\t\t\t\t\t*set kidnap_injury true\n\t\t\t\t\t\t\t*set kidnap_sondead true\n\t\t\t\t\t\t\t*set kidnap_daughterdead true\n\t\t\t\t\t\t\t*goto College_coffee_newspaper_loop\n\t\t\t\t*goto College_coffee_newspaper_loop\n\t\t\t*if (college_coffee_used_financial=false) #Read the financial section.\n\t\t\t\t*set college_coffee_used_financial true\n\t\t\t\t*if (knowstocks_19=false)\n\t\t\t\t\tThe entire section is a mystery to you.  You've never spent much time learning about stocks or business. Maybe some other day, but today, you just aren't interested.\n\t\t\t\t\t*goto College_coffee_newspaper_loop\n\t\t\t\tSomehow, you recognize a lot of the abbreviations in the paper, even though you have never followed stocks before.  Certain names, companies you've never heard of before, seem even more familiar.  Your head aches as you contemplate the meaning behind the knowledge.\n\t\t\t\t*choice\n\t\t\t\t\t#Invest in the familiar stocks.\n\t\t\t\t\t\t*set usedstocks_19 true\n\t\t\t\t\t\tYou decide that you will begin investing everything you can spare into the stock market, following these strange hunches.\n\t\t\t\t\t\t*goto College_coffee_newspaper_loop\n\t\t\t\t\t#Don't use the knowledge.\n\t\t\t\t\t\t*set usedstocks_19 false\n\t\t\t\t\t\tYou decide that you will ignore the hunches, which makes sense, considering that you've never studied business before.\n\t\t\t\t\t\t*goto College_coffee_newspaper_loop\n\t\t\t*if (college_coffee_used_ads=false) #Read the classified ads.\n\t\t\t\t*set college_coffee_used_ads true\n\t\t\t\tYou flip through the various advertisements.  There seems to be a little bit of everything, including a gun club, French classes, tutors in a variety of subjects, and even a kite club.\n\t\t\t\t*if (seen_nogunclub)\n\n\t\t\t\t\tYour eyes are strangely drawn to the gun club.  You've never been much of a gun enthusiast before, but for some reason, it seems strangely compelling.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Join the gun club.\n\t\t\t\t\t\t\tYou decide that you will join a gun club tomorrow.\n\t\t\t\t\t\t\t*set kidnap_gunclub true\n\t\t\t\t\t\t\t*goto College_coffee_newspaper_loop\n\t\t\t\t\t\t#Don't join the gun club.\n\t\t\t\t\t\t\tGuns have never interested you before, and you don't really have time for a new hobby at the moment, so you ignore the idea.\n\t\t\t\t\t\t\t*set kidnap_gunclub false\n\t\t\t\t\t\t\t*goto College_coffee_newspaper_loop\n\t\t\t\t*goto College_coffee_newspaper_loop\n\t\t\t*if ((college_coffee_used_lottery=false) and (timemachineused)) #Read today's winning lottery numbers.\n\t\t\t\t*set college_coffee_used_lottery true\n\t\t\t\t*if (already_knows_lottery)\n\t\t\t\t\t*if (college_coffee_used_checktickets=false)\n\t\t\t\t\t\tIt's strange, as you read through the numbers: they sound familiar. It seems as though you've been feeling déjà vu quite a bit lately.\n\t\t\t\t\t\t*goto College_coffee_newspaper_loop\n\t\t\t\t\t*if (usedlottery_19)\n\t\t\t\t\t\tYou look through the numbers, confirming that you really have won the lottery.\n\t\t\t\t\t\t*goto College_coffee_newspaper_loop\n\t\t\t\tYou are unsure why the numbers would have any meaning to you, but you force yourself to memorize them anyway.\n\t\t\t\t*set knowlottery_19 true\n\t\t\t\t*goto College_coffee_newspaper_loop\n\t\t\t#Close the newspaper.\n\t\t\t\tYou close the paper and return to the conversation with your friends.\n\t\t\t\t*goto College_Coffee_Loop\n\t#I remember a time...\n\t\t*goto TimeTravel_ns\n*comment ------------------------------------------------- Age 20 Wedding\t\t\n*label Wedding\n*set lifestage \"wedding\"\n*set age 20\n*if (usedlottery_19)\t\n\tThe music plays in the large church.  Beautiful white bows decorate the pews as your friends and family watch the ceremony.  The orchestra in the loft plays Pachelbel's Canon.\n\t*goto Wedding_AfterWealth\nThe music plays in the small church.  Beautiful white bows decorate the pews as your friends and family watch the ceremony.  A young girl with curly brown hair and a white dress shirt sits in front of a large golden harp as she plays Pachelbel's Canon.\n*if (usedstocks_19)\n\tThe harpist was expensive, but your stocks are doing well, so you aren't too worried about the cost.\n*label Wedding_AfterWealth\n*if (firstplay)\n\tYou knew that someday you would marry...\n\t*choice\n\t\t#...the man of my dreams.\n\t\t\t*set likesboys true\n\t\t\t*set lover_name \"Tom\"\n\t\t\t*set truelove lover_name\n\t\t\t*set lover_hisher \"his\"\n\t\t\t*set lover_himher \"him\"\n\t\t\t*set lover_heshe \"he\"\n\t\t\t*set lover_handsomebeautiful \"handsome\"\n\t\t\t*set lover_boyfriendgirlfriend \"boyfriend\"\n\t\t\t*set lover_husbandwife \"husband\"\n\t\t\t*goto Wedding_2\n\t\t#...the woman of my dreams.\n\t\t\t*set likesgirls true\n\t\t\t*set lover_name \"Beth\"\n\t\t\t*set truelove lover_name\n\t\t\t*set lover_hisher \"her\"\n\t\t\t*set lover_himher \"her\"\n\t\t\t*set lover_heshe \"she\"\n\t\t\t*set lover_handsomebeautiful \"beautiful\"\n\t\t\t*set lover_boyfriendgirlfriend \"girlfriend\"\n\t\t\t*set lover_husbandwife \"wife\"\n\t\t\t*goto Wedding_2\n*if (timemachineused)\n\t*if (badmatch)\n\t\t${lover_name} looks ${lover_handsomebeautiful} standing next to you.  You rub your temples as a familiar dull throb pounds inside your head.\n\n\t\t\"Are you serious?\" ${lover_name} says with a distinct note of irritation.\n\n\t\t\"It's nothing. I'm okay,\" you respond.\n\t*if (badmatch=false)\n\t\t${lover_name} looks ${lover_handsomebeautiful} standing next to you.  You rub your temples as a familiar dull throb pounds inside your head.\n\n\t\t\"Another headache?\" ${lover_name} asks with concern.\n\n\t\tYou nod, but smile to make light of the situation, not wanting ${lover_himher} to worry on your wedding day.\n\n*label Wedding_2\n*set firstplay false\nYour best friends Terry and Jim sit in the pews, watching the ceremony with large smiles on their faces.  Next to Jim is Susan, his date.\n*if (professor_friend)\n\tA few rows back, you see Professor Deakin, wearing an impossibly out-of-date tweed suit.\n*if (badmatch=false)\n\tYou turn back to your soon-to-be ${lover_husbandwife} ${lover_name} and smile again.\n\nA few hours later, you and your guests are gathering in the hall for the wedding reception.\n*temp wedding_used_prenup false\n*temp wedding_used_proftalk false\n*temp wedding_used_jimtalk false\n*temp wedding_used_terrytalk false\n*temp wedding_used_workout false\n*temp wedding_used_poisonjim false\n*label wedding_loop\n*choice\n\t*if ((wedding_used_poisonjim=false) and (seen_roofjim)) #Look at Jim's drink.\n\t\t*set wedding_used_poisonjim true\n\t\tYou circulate through your reception, greeting people and smiling.  When you reach Jim and Susan's table, you pause.  His drink has been left unattended while the couple dance.  You look numbly at the drink.  Your head has never ached so badly. You contemplate the powder in your pocket as memories of a rain-filled roof fill your mind.\n\t\t*choice\n\t\t\t#Put the powder into Jim's drink.\n\t\t\t\tYou empty the small paper pouch of powder into the drink and walk away.\n\n\t\t\t\t\"Are you okay?\" ${lover_name} asks in a worried voice.  \"You're bleeding from your ear!\"\n\n\t\t\t\t\"Oh, it's nothing,\" you mumble as your head throbs relentlessly.\n\n\t\t\t\tYou slip away to the washroom and wash off the blood.  You spend a few minutes staring into the bathroom mirror, wondering what is wrong with you.  Your head blazes in pain to the point that you can barely think.  After a few minutes, you return to your wedding reception, the memory of what you did already fading from your mind.\n\t\t\t\t*if (wedding_used_jimtalk)\n\n\t\t\t\t\tLater that night, Jim says he isn't feeling well and goes home early.  It was the last time you saw your friend alive.\n\t\t\t\t*set jimdead_20 true\n\t\t\t\t*goto wedding_loop\n\t\t\t#Leave the drink alone.\n\t\t\t\tYou mumble to yourself, wondering what's happening to your mind.  Finally, you walk away.  Later that night, you flush the powder down the toilet, unused.\n\t\t\t\t*set jimdead_20 false\n\t\t\t\t*goto wedding_loop\n\t*if ((seen_noworkout) and (wedding_used_workout=false)) #I feel winded from dancing.\n\t\t*set wedding_used_workout true\n\t\tIt isn't that you're in bad shape, but you feel that you could be more healthy.  Do all newlyweds feel such intense motivation for self improvement like this? Your headache batters the inside of your skull, stronger than ever.  \n\t\t*choice\n\t\t\t#Start living a more active lifestyle.\n\t\t\t\tYou decide to work out every day and look into getting a membership at the local gym.\n\t\t\t\t*set kidnap_workout true\n\t\t\t\t*goto wedding_loop\n\t\t\t#Ignore this odd thought.\n\t\t\t\tYou smile at the absurdity of such random thoughts.\n\t\t\t\t*set kidnap_workout false\n\t\t\t\t*set kidnap_daughterdead true\n\t\t\t\t*set kidnap_someonedead true\n\t\t\t\t*goto wedding_loop\n\t*if (((divorced_38) and (wedding_used_prenup=false)) and (badmatch)) #${lover_name} is still angry over the prenup.\n\t\t*set prenup true\n\t\t*set wedding_used_prenup true\n\t\tAlthough you are in love with ${lover_name}, nobody can see the future.  As such, you asked ${lover_himher} to sign a prenuptial agreement a week ago.\n\t\t*if ((usedlottery_19) and (usedstocks_19=false))\n\t\t\tConsidering your large lottery win last year, it only made sense.\n\t\t*if ((usedlottery_19=false) and (usedstocks_19))\n\t\t\tConsidering your rapidly growing investments, it only made sense.\n\t\t*if ((usedlottery_19) and (usedstocks_19))\n\t\t\tConsidering your rapidly growing investments and large lottery win, it only made sense.\n\t\t*goto wedding_loop\n\t*if (((divorced_38) and (wedding_used_prenup=false)) and (badmatch)) #${lover_name} is happy that there is no prenup.\n\t\t*set prenup false\n\t\t*set wedding_used_prenup true\n\t\tAlthough you are in love with ${lover_name}, nobody can see the future.  As such, you asked ${lover_himher} to sign a prenuptial agreement a week ago.\n\t\t*if (usedlottery_19)\n\t\t\tConsidering your large lottery win last year, it only made sense.\n\t\t*if (usedstocks_19)\n\t\t\tConsidering your rapidly growing investments, it only made sense.\n\t\t$!{lover_heshe} was enraged at the mere suggestion, so you eventually relented and tore up the document.\n\t\t*goto wedding_loop\n\t*if (wedding_used_jimtalk=false) #Speak to Jim.\n\t\t*set wedding_used_jimtalk true\n\t\t*if (wedding_used_poisonjim)\n\t\t\t\"Congratulations,\" Jim says weakly.  He looks to be sweating and shaking slightly.\n\t\t*if (wedding_used_poisonjim=false)\n\t\t\t\"Congratulations,\" Jim says with a large smile.\n\n\t\tYou aren't sure where your tall, gangly friend rented his tuxedo, but it doesn't look like it was fitted right.  Despite his goofy appearance, his date is an attractive and well-dressed girl named Susan.  She gives you a hug and also congratulates you.\n\n\t\t*if (wedding_used_poisonjim)\n\t\t\t\"I'm not feeling well,\" Jim says after a moment.  \"Too much wine, I guess.  We're going to call it a night.\"\n\n\t\t\t\"No problem,\" you respond with a tight smile on your face.  \"I hope you feel better.\"\n\n\t\t\tLittle do you realize in the moment that this will be the last time you see Jim alive.\n\t\t\t*goto wedding_loop\n\t\t*if ((gender=\"male\") or (gender=\"nonbinary\"))\n\t\t\t\"Well, your wedding proposal worked,\" Jim says happily as he drinks from a glass of wine.  \"So maybe our research proposal will too.\"\n\t\t*if (gender=\"female\")\n\t\t\t\"Well, you know how to accept a proposal,\" Jim says happily as he drinks from a glass of wine.  \"So maybe you can figure out what we need to do to get our research proposal accepted.\"\n\n\t\tYou laugh at your friend's remark.  Considering that you're still two years away from graduating, the research proposal is a bold move.  Jim, who had doubted the project the most when you were first putting it together, is now one of the group's strongest supporters. It's nice to have good friends like Jim and Terry at your wedding.\n\t\t*goto wedding_loop\n\t*if (wedding_used_terrytalk=false) #Speak to Terry.\n\t\t*set wedding_used_terrytalk true\n\t\t*if (gender=\"female\")\n\t\t\t\"It was a nice service,\" Terry says as he hugs you after the ceremony.\n\t\t*if ((gender=\"male\") or (gender=\"nonbinary\"))\n\t\t\t\"It was a nice service,\" Terry says as he shakes your hand after the ceremony.\n\n\t\t\"Thanks,\" you say with a smile.\n\t\t*if (timemachineused)\n\n\t\t\t\"Are the headaches still bothering you?\" Terry asks.\n\n\t\t\t\"Only a little,\" you lie.\n\n\t\t\"You look great,\" Terry says.  \"You clean up well.\"\t\t\n\t\t*goto wedding_loop\n\t*if ((professor_friend) and (wedding_used_proftalk=false)) #Speak to Professor Deakin.\n\t\t*set wedding_used_proftalk true\n\t\t\"You look great,\" the professor says with a smile.  \"Thank you for inviting me. Although I have to say, I'm surprised that you're getting married now, before you finish school.\"\n\n\t\t\"No offense, professor,\" you say with a smile.  \"But if we get our research grant, you know we'll have to cut our studies short.\"\n\n\t\t\"Of course,\" he says.  \"As much as I'll miss you, I truly hope that you get that grant.  Your work looks amazing; I think you're going to change the world.\"\n\n\t\t\"I sure hope so,\" you say.\n\t\t*if (professor_readobit=false)\n\t\t\t*goto wedding_loop\n\t\t*choice\n\t\t\t#Tell the professor that he is going to die of cancer.\n\t\t\t\t*set professor_warnedonce true\n\t\t\t\tYour head aches at the mere thought, but you hear yourself saying the words anyway.\n\n\t\t\t\t\"What an odd thing to say,\" Professor Deakin says with a puzzled look on his face.\n\n\t\t\t\t\"I... I'm sorry, I don't know why I said that,\" you respond, flustered.  \"Just... take care of yourself.\"\n\n\t\t\t\t\"I most certainly will. Don't worry yourself with dark thoughts like that,\" he says.  \"Especially not on your wedding day.\"\n\n\t\t\t\tIt isn't difficult to guess that he has no intention of seeing a doctor.\n\t\t\t\t*if (professor_knowcancer)\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Insist that Professor Deakin see a doctor immediately.\n\t\t\t\t\t\t\t*set professor_alive true\n\t\t\t\t\t\t\t*achieve saveprof\n\t\t\t\t\t\t\t\"Seriously, Professor Deakin,\" you try again.  \"I... have a very strong feeling about this.  Promise me that you'll see a doctor immediately.\"\n\n\t\t\t\t\t\t\tYou go on to tell him the exact survival rates for various types of cancer, with both early and late detection.  You find yourself incredibly knowledgeable, considering that you can't seem to recall having read very much about cancer before.\n\n\t\t\t\t\t\t\t\"Oh, very well,\" he says, sounding exasperated yet resigned to your strange pleading.\n\n\t\t\t\t\t\t\tYou wonder why you're so insistent, but it seems very important.\n\t\t\t\t\t\t\t*goto wedding_loop\n\t\t\t\t\t\t#Let it go.\n\t\t\t\t\t\t\t*goto wedding_loop\n\t\t\t\tPerhaps he would listen if you had more details.\n\t\t\t\t*goto wedding_loop\n\t\t\t#Speak to someone else and don't mention the professor's death.\n\t\t\t\t*set professor_alive false\n\t\t\t\t*goto wedding_loop\n\t#I remember a time...\n\t\t*goto TimeTravel_ns\n\n*comment ------------------------------------------------- Age 21 Grant\n*label Grant\n*set lifestage \"grant\"\n*set age 21\n*if (lover_hisher=\"her\")\n\t*if (jimdead_20=false)\n\t\tTerry and Jim are wearing suits and ties, \n\t*if (jimdead_20)\n\t\tTerry is a wearing suit and tie, \n\twhile ${lover_name} is wearing a professional-looking skirt and blouse.\n*if (lover_hisher=\"his\")\n\t*if (jimdead_20=false)\n\t\tTerry, Jim,\n\t*if (jimdead_20)\n\t\tTerry \n\tand ${lover_name} are wearing suits and ties.\nThey look to you in anticipation.  It was agreed that you would do the talking.  The six men and women on the other side of the table flip through the handouts and information that you have given them. Braedan Davenport, the lead investor, finally looks up at you.\n\n\"Okay, let me get this straight,\" he says.  \"If we get you a neural blocker, you think you can rewire it to work in reverse.  Supposedly, this will allow a person to 'remember' the future.\"\n\n\"That's correct, Mr. Davenport,\" you say.  \"We're built to only remember the past, but it doesn't have to be this way.  Once the subject has all of their future memories restored, it will have a retroactive effect, allowing the subject to live every moment of their life instantaneously. Not just in the present, but at all points in their life.\"\n*page_break\n\"And you believe that this will allow a younger version of the subject to change the past?\"\n\n\"Exactly.  Once the change has been made, the neural pathways will be reblocked.  This will force the subject to forget the future and return them to the present.  But the changes made will still have taken place.\"\n\n\"Time travel is impossible,\" the man next to Mr. Davenport blurts.  \"What if your subject forces their ten-year-old self to jump in front of a bus?  Then they never would have been alive to be a test subject!  Besides, I've read the patents on the neural blocker.  They saw this possibility as well, but all of their tests came up with nothing.  It doesn't work.\"\n\n\"That's because they didn't have a Schrödinger Box,\" Terry says smugly.\n\n\"It's a paradox,\" you explain patiently.  \"That's why time travel is difficult... but not impossible.  We have it covered. We've designed a device that uses a computer to calculate a statistic we call the Paradox Factor.  This is the probability that a paradox is about to occur.  If the computer detects a paradox, as it would if our suicidal subject tried to kill themselves in the past, it will close the neural pathways so quickly that the subject won't be able to make the change that created the paradox to begin with.\"\n*page_break\nYou take a deep breath and continue.  \"And, because the neural pathways are closed before the change is made, the time travel won't happen.\"\n\n\"That doesn't make any sense at all,\" the man says flatly, sitting back in his chair.\n\n\"This is what the others haven't dealt with,\" you say, ignoring the man.  \"Once the subject is guaranteed not to create a paradox, time travel is completely possible.\"\n\n\"It's like the event horizon of a black hole,\" Terry offers excitedly.  \"Nature abhors a vacuum... and also time paradoxes.  This technology eliminates the chance of a paradox and allows time travel to occur.\"\n\nThe rest of the presentation is a breeze.\n*goto TimeTravel\n\n*comment ------------------------------------------------- Age 22 First Child, Age 24 Second Child\n*label FirstChild\n*set lifestage \"firstchild\"\n*set age 22\n*if ((((lover_hisher=\"his\") and (gender=\"male\")) or ((lover_hisher=\"her\") and (gender=\"female\"))) or (gender=\"nonbinary\"))\n\tYou can still hardly believe the news: the adoption agency has found you and ${lover_name} a newborn baby to adopt.  A little boy, only a few days old and without a name.\n\t*goto FirstChild_2\n*else\n\t*if (gender=\"female\")\n\t\tThe pain of giving birth is excruciating as you cry out during the latest contraction.  You bear down, pushing as hard as you can while ${lover_name} holds your hand and encourages you.  The doctor between your legs is doing something, but you can't see what.  And then, you hear your baby crying for the first time.\n\t\t*goto FirstChild_2\n\t*else\n\t\tYour wife, ${lover_name}, lies on the bed with her feet in the stirrups.  You are holding her hand as she cries out in pain.  The doctor is between her legs and shouting encouragement.  And then, you hear your baby crying for the first time as the doctor holds him in the air.\n\t\t*goto FirstChild_2\n*label FirstChild_2\n*if (timemachineused)\n\tYour head aches slightly, but the moment is too precious to let such a little thing bother you.\n*choice\n\t#\"${firstchild_name},\" I say, naming our precious baby boy.\n\t\t*if ((firstchild_name=\"Jimmy\") and (jimdead_20=false))\n\t\t\tYour good friend Jim is honored when he learns that you've named your firstborn child after him.\n\n\t\t*goto secondchild_ns\n\t*if (jimdead_20) #We name our son Jimmy, after my deceased friend.\n\t\t*set firstchild_name \"Jimmy\"\n\t\t*goto secondchild\n\t*if (timemachineused) #We name him something else.\n\t\tYou name your little boy...\n\t\t*input_text firstchild_name\n\t\t*goto secondchild\n\n*label secondchild\n\"${firstchild_name},\" you say, naming your precious baby boy.\n\n*label secondchild_ns\n*set lifestage \"secondchild\"\n*set age 24\n*if ((((lover_hisher=\"his\") and (gender=\"male\")) or ((lover_hisher=\"her\") and (gender=\"female\"))) or (gender=\"nonbinary\"))\n\tTwo years later, the adoption agency calls you and ${lover_name} again.  You are the luckiest couple in the world, as they have a second newborn baby for you to adopt.\n*if (((lover_hisher=\"his\") and (gender=\"female\")) or ((lover_hisher=\"her\") and (gender=\"male\")))\n\tTwo years later, you find yourself in the delivery room once again.\n*choice\n\t#We name our sweet little girl \"${secondchild_name}.\"\n\t\t*goto TimeTravel_ns\n\t*if (timemachineused) #We name our sweet little girl something else.\n\t\t*input_text secondchild_name\n\t\t*goto TimeTravel_ns\n\n*comment ------------------------------------------------- Age 30 Live Trials Begin\n*label Typical_Day_30\n*set lifestage \"livetrials\"\n*set seen_typical_day_30 true\n*set show_college_coffee true\n*set age 30\n*if ((usedlottery_19) or (usedstocks_19))\n\tYou and ${lover_name} sit on the deck just outside your kitchen, looking out over the ocean.  A silver tray with poached eggs, toast, freshly squeezed orange juice, and hash browns sits before you, where the cook placed it.\n\t*if (badmatch=false)\n\t\tThe nanny has packed lunches for you and the kids.  They sit on the end table near the entrance, ready to go.  You can hear ${firstchild_name} and ${secondchild_name} watching cartoons in the living room.\n\t*goto Typical_Day_30_AfterWealth\n*else\n\tYou sit in your kitchen with a bowl of cereal on the counter, ${lover_name} sitting beside you.\n\t*if (badmatch=false)\n\t\t$!{lover_heshe} has packed lunches for you and the kids. You can hear ${firstchild_name} and ${secondchild_name} watching cartoons in the living room.\n\t*goto Typical_Day_30_AfterWealth\n*label Typical_Day_30_AfterWealth\n*if (badmatch)\n\tYou can smell the liquor in the drink that ${lover_name} has in front of ${lover_himher}.  It's early morning, but that doesn't seem to matter these days.  So far, ${lover_hisher} drinking hasn't caused any troubles in the lab, so you haven't said anything to ${lover_himher}.\n\n\tIt's an exciting day: you've been given the go-ahead to begin live trial testing.  You consider discussing this with ${lover_name}, but don't bother.  Things have become strained lately.  You rarely talk, and breakfast is often spent in silence.\n*if (badmatch=false)\t\n\n\t\"Excited?\" ${lover_heshe} asks.\n\n\tYou grin and nod.  \"Nine long years... But yes, very excited.\"\n\n\t\"Oh, you've loved every minute of it,\" ${lover_heshe} says as ${lover_heshe} comes over and hugs you.\n\n\t$!{lover_heshe} is right, of course.  Even the computer simulations and inanimate trials have been exciting.  But today is special. Today you will be using a live subject.\n*temp typical_day_30_used_obit false\n*temp typical_day_30_used_financial false\n*temp typical_day_30_used_considergun false\n*label typical_day_30_loop\n*choice\n\t#Go to work.\n\t\t\"Well, we'd better get to the lab; it's a big day today,\" you say, getting to your feet.\n\t\t*goto Typical_workday_30\n\t*if ((typical_day_30_used_obit=false) or ((typical_day_30_used_financial=false) or (typical_day_30_used_considergun=false))) #Read the paper.\n\t\tYou open the newspaper and begin to read.\n\t\t*label typical_workday_30_newspaper_loop\n\t\t*choice\n\t\t\t*if (typical_day_30_used_considergun=false) #Read the classified ads.\n\t\t\t\t*set typical_day_30_used_considergun true\n\t\t\t\tYou see a full-page ad for Mason's Firearms, a local gun and ammunition store.\n\t\t\t\t*if (seen_nogunfail=false)\n\t\t\t\t\t*if (kidnap_gunclub=false)\n\t\t\t\t\t\tYou've never been a hunter or a gun enthusiast, so you don't bother reading any further.\n\t\t\t\t\t\t*goto typical_workday_30_newspaper_loop\n\t\t\t\t\t*if (kidnap_gunclub)\n\t\t\t\t\t\tAlthough you've been going to the shooting range since college, you've never felt a need to have a gun in the house.  You've always left your firearms at the gun club.\n\t\t\t\t\t\t*goto typical_workday_30_newspaper_loop\n\t\t\t\t*if (kidnap_gunclub=false)\n\t\t\t\t\tYou've never been a hunter or a gun enthusiast before, but today, a strange thought comes over you.\n\t\t\t\t*if (kidnap_gunclub)\n\t\t\t\t\tAlthough you've been going to the shooting range since college, you've never felt a need to have a gun in the house.  You've always left your firearms at the gun club.  But today, a strange thought comes over you.\n\t\t\t\tPerhaps you SHOULD buy a gun?\n\t\t\t\t*choice\n\t\t\t\t\t#Buy yourself a gun.\n\t\t\t\t\t\tThe world is a dangerous place, so some 'home security' seems like a good idea.  You make plans to pick up a firearm sometime next week.\n\t\t\t\t\t\t*set kidnap_owngun true\n\t\t\t\t\t\t*goto typical_workday_30_newspaper_loop\n\t\t\t\t\t#Dismiss this odd idea.\n\t\t\t\t\t\tYou shake your head in wonder.  Such strange thoughts, you think to yourself.\n\t\t\t\t\t\t*set kidnap_owngun false\n\t\t\t\t\t\t*set kidnap_someonedead true\n\t\t\t\t\t\t*set kidnap_injury true\n\t\t\t\t\t\t*set kidnap_sondead true\n\t\t\t\t\t\t*set kidnap_daughterdead true\n\t\t\t\t\t\t*goto typical_workday_30_newspaper_loop\t\t\t\t\n\t\t\t*if (typical_day_30_used_financial=false) #Read the financial section.\n\t\t\t\t*set typical_day_30_used_financial true\n\t\t\t\tA lot of the top-earning stocks are Internet companies, of course.\n\t\t\t\t*if (usedstocks_19)\n\t\t\t\t\tYou're pleased to see that your stocks are all doing well.  Many of the unknown startup companies you invested in have since become household names, making you a very wealthy\n\t\t\t\t\t*if (gender=\"male\")\n\t\t\t\t\t\tman.\n\t\t\t\t\t*if (gender=\"female\")\n\t\t\t\t\t\twoman.\n\t\t\t\t\t*if (gender=\"nonbinary\")\n\t\t\t\t\t\tperson.\n\t\t\t\t\t*goto typical_workday_30_newspaper_loop\n\t\t\t\tThe entire process of investing into the stock market seems like a lot of work.\n\t\t\t\t*if (usedlottery_19)\n\t\t\t\t\tLuckily, you won the lottery, so you have no need for such labour.  If you hadn't won, perhaps such a means to wealth would be of more interest.\n\t\t\t\t\t*goto typical_workday_30_newspaper_loop\n\t\t\t\t*if ((seen_drugcharges) and (seen_dawson))\n\t\t\t\t\tEven so, you begin the arduous task of studying which companies have done well over the years and when.  You slowly memorize the highs and lows of all of the major stocks.\n\t\t\t\t\t*set knowstocks_19 true\n\t\t\t\t\t*goto typical_workday_30_newspaper_loop\n\t\t\t\t*else\n\t\t\t\t\tPerhaps there is an easier way to make money, you think to yourself.\n\t\t\t\t\t*goto typical_workday_30_newspaper_loop\n\t\t\t*if (typical_day_30_used_obit=false) #Read the obituaries.\n\t\t\t\t*set typical_day_30_used_obit true\n\t\t\t\t*set professor_readobit true\n\t\t\t\t*if (professor_alive)\n\t\t\t\t\tYou don't recognize any of the names.\n\t\t\t\t\t*goto typical_workday_30_newspaper_loop\n\t\t\t\t*if (professor_friend=false)\n\t\t\t\t\tOne of the names stands out: Edwin Deakin.  It rings a bell, and after a few moments of thinking, you remember where you've heard the name before.  He was your old college professor.  You only had him for a class or two, since you left college early to begin your research company. You make a mental note to not mention it to Terry.  He's a superstitious fellow and would probably see the professor's obituary as a bad omen on the day your live trials are to begin.\n\t\t\t\t\t*if ((jimdead_20) and (badmatch))\n\t\t\t\t\t\tOn your wedding day, before Jim died, Terry was miserable at trying to hold his tongue and kept telling you that your marriage was doomed to failure.  He eventually got over it, but it caused a lot of stress on your friendship.\n\t\t\t\t\t*if ((jimdead_20) and (badmatch=false))\n\t\t\t\t\t\tOn your wedding day, when Jim died, Terry told everyone who would listen that it was because Terry had broken a mirror the day before.\n\n\t\t\t\t\t\"Old Professor Deakin died,\" you comment to ${lover_name} as you read the article.\n\n\t\t\t\t\t*if (badmatch)\n\t\t\t\t\t\t\"Oh?\" ${lover_heshe} says without any hint of interest.  \"His classes were boring.\"\n\n\t\t\t\t\t\tYou shrug and turn the page, the name fading out of your mind quickly.  You haven't seen him in years, so his death doesn't really bother you.\n\t\t\t\t\t\t*goto typical_workday_30_newspaper_loop\n\t\t\t\t\t\"Oh, that's too bad,\" ${lover_heshe} says.  \"We met in one of his lectures, do you remember?\"\n\n\t\t\t\t\t\"Of course I do,\" you respond with a fond smile as you turn the page.  You haven't seen him in years, so his death doesn't really bother you.\n\t\t\t\t\t*goto typical_workday_30_newspaper_loop\n\t\t\t\t\"Oh no,\" you say sadly.  \"Professor Deakin passed away.\"\n\n\t\t\t\t*if (badmatch)\n\t\t\t\t\t\"Old men do that,\" ${lover_name} says cruelly.\n\n\t\t\t\t\t*if (professor_warnedonce)\n\t\t\t\t\t\t\"His cancer finally got the best of him,\" you say, as you read through the obituary.\n\t\t\t\t\t*if (professor_warnedonce=false)\n\t\t\t\t\t\t\"Cancer,\" you say, as you read through the obituary.  \"I didn't even know he was sick.\"\n\n\t\t\t\t\tThe silence between the two of you returns, as there isn't much left to say.  You make a mental note to not mention it to Terry.  He's a superstitious fellow and would probably see the professor's obituary as a bad omen on the day your live trials are to begin.\n\t\t\t\t\t*if (jimdead_20)\n\n\t\t\t\t\t\tOn your wedding day, before Jim died, Terry was miserable at trying to hold his tongue \n\t\t\t\t\t\tand kept telling you that your marriage was doomed to failure.  He eventually got over it, but it \n\t\t\t\t\t\tcaused a lot of stress on your friendship.\n\t\t\t\t\t*goto typical_workday_30_newspaper_loop\n\t\t\t\t\"Oh, no!\" ${lover_name} says, jumping to ${lover_hisher} feet and rushing over to read the obituary over your shoulder.\n\n\t\t\t\t*if (professor_warnedonce)\n\t\t\t\t\t\"His cancer finally got the best of him,\" you say sadly.\n\n\t\t\t\t\t\"Poor man,\" ${lover_name} says as you read the rest of the obituary.\n\t\t\t\t*if (professor_warnedonce=false)\n\t\t\t\t\t\"I didn't even know he was sick.\"\n\n\t\t\t\t\t\"Cancer,\" you say, as you read the rest of the obituary.\n\n\t\t\t\tYou make a mental note to not mention it to Terry.  He's a superstitious fellow and would probably see the professor's obituary as a bad omen on the day your live trials are to begin.\n\t\t\t\t*if (jimdead_20)\n\t\t\t\t\tOn your wedding day, when Jim died, Terry told everyone who would listen that it was because Terry had broken a mirror the day before.\n\t\t\t\t*goto typical_workday_30_newspaper_loop\n\t\t\t#Close the paper.\n\t\t\t\tYou close the newspaper.\n\t\t\t\t*goto typical_day_30_loop\n\t#I remember a time...\n\t\t*goto TimeTravel_ns\n\n*label Typical_workday_30\n*set age 30\n\nAn hour later...\n\n*set show_grant true\n*if (jimdead_20=false)\n\t\"So, this is it,\" Jim says from beside you as he fiddles with the buttons on the camera in his hands.\n*if (jimdead_20)\n\tThe new scientist you hired after Jim passed away is holding the camera that will be used to document the event.\n\nHe is wearing a white lab coat, just like you, Terry, and ${lover_name}. The lab itself is large, full of computers, books, desks, and filing cabinets.  The cage housing Marty is relatively new, having arrived only two months ago, the day after the board of directors granted you permission to begin live trials.\n\nThe other new feature in the lab is a large wooden box with a padlock on it.  On either side of the wooden box there is a small door the size of a mouse.  It has taken great willpower to not look inside the wooden box for the last two months.\n*page_break\nTerry carefully opens the cage and takes out the mouse.  He carries the rodent to the other box in the room.  It's very large, made of metal, and hooked up to various machines, including the modified neural blocker.  This is your Schrödinger Box.  It seems excessively large for such a small mouse, but if the live trial works and you are given permission to use larger subjects, you will need the extra space.\n\n\"I am placing Marty into the Schrödinger Box,\" Terry says clearly for the camera.\n\nOnce Terry has placed the mouse into the metal box and closed the door, you begin typing commands into the computer.  ${lover_name} stands across the lab, reading the indicator lights on the machines.\n*if (badmatch=false)\n\t$!{lover_heshe} flashes you a quick smile, which you return without the camera seeing it.\n\n\"Powering up...\" you say as you read the computer screen.  \"We have full power.  I'm now opening the neural pathways.  Paradox Factor is still zero.\"\n*page_break\nTerry watches you, since the box containing the mouse does nothing that can be seen from the outside.  \n*if (jimdead_20=false)\n\tJim\n*if (jimdead_20)\n\tThe scientist hired to replace Jim\nnow stands behind you, recording the screen as well as your voice.\n*if (timemachineused)\n\tYour head hurts slightly, but the excitement of the situation makes your familiar headache easy to ignore.\n\n\"Paradox Factor is still zero.  Reblocking future neural pathways and powering down.…Clear.\"\n\nTerry walks over and opens the box.  He bends down and takes out the mouse.  Marty seems okay, his little nose twitching happily.  The four of you look at each other in excitement.\n\n\"Does that mean it worked?\" Terry asks from behind the camera.\n\nWordlessly, you go to the wooden box.  Two months ago, Terry had placed Marty into the box for the first time.  An hour later, the mouse had come out the other side and the box had been locked with a padlock without anyone looking at the results.  It was the same day your group had received the completely untrained mouse.\n\nInside the wooden box there are two levers, a green one and a red one.  They both drop food into the box.  Every time the rodent pulled a lever, it had been recorded, but the results were hidden from the researchers until the box was opened. An untrained mouse would pull both levers an equal number of times.\n*page_break\nFor the last two months, Terry had used a different copy of the wooden box to train Marty.  In the training box, the green lever still delivered treats, while the red lever gave a mild, but uncomfortable, electric shock.  By the end of the two months, Marty only pulled the green lever.\n\n\"We'll know in a moment,\" you answer Terry, using the key to open the padlock.\n\nYou swing open the door and read the results of the experiment that took place two months ago when Marty had been placed in the wooden box for the first time.  The small mouse had pulled the green lever thirty-seven times and the red lever zero times.  He had used his knowledge of the future... in the past.\n\nThe four of you break into cheers, amazed at what you have done!  Terry uncorks a bottle of champagne and begins handing out glasses.  Marty the Mouse would be known as the world's first time traveler!\n*temp typical_workday_30_used_terrytalk false\n*temp typical_workday_30_used_jimtalk false\n*temp typical_workday_30_used_lovertalk false\n*temp typical_workday_30_used_toast false\n\n*label Typical_workday_30_loop\n*choice\n\t*if ((jimdead_20) and (typical_workday_30_used_toast=false)) #Make a toast in Jim's memory.\n\t\t*set typical_workday_30_used_toast true\n\t\t\"To Jim!\" you say, lifting the glass of champagne.  \"I wish he could have been here.\"\n\n\t\t\"To Jim!!\" the others say, clinking glasses sadly.\n\n\t\tJim died in his girlfriend's arms on the morning after your wedding.  The doctors weren't certain what his illness had been, although they guessed that it was a strong case of food poisoning.  Nobody else had gotten sick at the wedding, so it was assumed that he had picked it up elsewhere.  The truth behind Jim's death is something you don't like to remember.  Whenever you try to, a blazing headache tears through your head, making it impossible to think about. You still miss your tall friend and truly wish that he could have been there today for your amazing success.\n\t\t*goto Typical_workday_30_loop\t\n\t*if (typical_workday_30_used_terrytalk=false) #Speak to Terry about the experiment's success.\n\t\t*set typical_workday_30_used_terrytalk true\n\t\t\"Well, we did it,\" you say to Terry.\n\n\t\t\"It's amazing,\" Terry says with a twinkle in his eye.  \"Can you imagine how this will change the world?  Every mistake we've made as a species can be corrected, a true utopia formed.\"\n\n\t\t\"We're still a long ways off,\" you respond with a smile.  \"We'll still need to get approval for human trials, assuming that the data comes back positive for Marty.\"\n\t\t*goto Typical_workday_30_loop\n\t*if ((typical_workday_30_used_jimtalk=false) and (jimdead_20=false)) #Speak to Jim about the experiment's success.\n\t\t*set typical_workday_30_used_jimtalk true\n\t\t\"I think I'm going to ask Susan to marry me,\" Jim says with a big goofy grin.\n\n\t\t\"Why now?\" you ask good-naturedly.\n\n\t\t\"We're going to be famous!  I want her to be a part of my life from the\n\t\t*if (badmatch=false)\n\t\t\tbeginning.  I want what you and ${lover_name} have.\"\n\t\t*if (badmatch)\n\t\t\tbeginning.\"\n\n\t\t\"Congratulations,\" you say again, tinkling your champagne glass against his.\n\t\t*goto Typical_workday_30_loop\n\t*if (typical_workday_30_used_lovertalk=false) #Speak to ${lover_name} about the experiment's success.\n\t\t*set typical_workday_30_used_lovertalk true\n\t\t*if (badmatch)\n\t\t\tYou move next to ${lover_name}, wrapping your arms around ${lover_himher}, intending to give ${lover_himher} a big kiss.  $!{lover_heshe} pulls away before you do, glaring at you.  You should have known better.  Even though today was a great success, ${lover_heshe} still doesn't like public displays of affection.\n\t\t\t*goto Typical_workday_30_loop\n\t\tYou move next to ${lover_name}, wrapping your arms around ${lover_himher} and giving ${lover_himher} a big kiss.  $!{lover_heshe} pulls you close, and you share a private moment.  You both smile broadly as you look into each other's eyes.  Today's success was a dream come true.\n\t\t*goto Typical_workday_30_loop\n\t#I remember a time...\n\t\t*goto TimeTravel_ns\n\n*comment ------------------------------------------------- Age 35 In Bed\n*label Typical_Day_35\n*set lifestage \"inbed35\"\n*set age 35\nYou are lying in bed with ${lover_name}.\n*if ((usedlottery_19) or (usedstocks_19))\n\t*if (badmatch=false)\n\t\tThe kids are sound asleep in their bedrooms.\n\tThe four-pillar king-size bed with its soft Egyptian cotton sheets is cozy and luxurious.  The flat-screen television on the wall is on mute as you talk about the upcoming family vacation.\n\t*goto Typical_Day_35_AfterWealth\n*else\n\tThe queen-sized bed with cotton sheets is soft and cozy.  The small television on the stand at the end of the bed is on mute as you talk about the upcoming family vacation.\n\t*goto Typical_Day_35_AfterWealth\n*label Typical_Day_35_AfterWealth\n*line_break\n*line_break\n*if (badmatch)\n\t\"By train?\" ${lover_name} says with an obvious tone of contempt in ${lover_hisher} voice.\n\n\t\"Sure, it'll be fun,\" you say patiently.\n\t*if (((kidnap_gunclub) and (kidnap_fighter)) and (kidnap_workout))\n\n\t\t\"You'll actually make time for this trip?\" ${lover_name} asks.\n*if (badmatch=false)\n\t\"By train?\" ${lover_name} says with a hint of amusement in ${lover_hisher} voice.\n\n\t\"Sure, it'll be fun,\" you say with a smile.\n\n\t*if (((kidnap_gunclub) and (kidnap_fighter)) and (kidnap_workout))\n\t\t\"You'll actually make time for this trip?\" ${lover_name} asks.\n\t*if ((((kidnap_gunclub) and (kidnap_fighter)) and (kidnap_workout))=FALSE)\n\t\t\"I think the kids would love to ride a real train,\" ${lover_heshe} replies.\n\nYou rub your head.  Something about the entire idea seems... wrong.\n*temp typical_day_35_used_roomsearch false\n*temp typical_day_35_used_canceltrip false\n*temp typical_day_35_used_farmsearch false\n*label typical_day_35_loop\n*choice\n\t*if (((typical_day_35_used_farmsearch=false) and (seen_attempt_unready)) and ((badmatch=false) and (usedstocks_19))) #Go for a night drive to a nearby abandoned farmhouse.\n\t\t*set typical_day_35_used_farmsearch true\n\t\t\"Let's talk about it tomorrow,\" you say, as the oddest thoughts fill your mind.  \"I can't sleep.  I think I'm going to swing by the lab and reset those calibrations.\"\n\n\t\t${lover_name} nods reluctantly.  $!{lover_heshe} knows you are obsessed with your research and has no reason to doubt what you've said.  You get dressed and go out to the tool shed.  You seem to be on autopilot as you grab a sturdy crowbar before going into your garage and getting into one of your cars.  A few hours later, you arrive at an old, abandoned farmhouse.  You walk around it, wondering why you are here.\n\n\t\tYour head hurts worse than ever before. The doors are locked, but looking through the window, you can see a living room with a sofa, a padded upright chair with upholstered arms, and a television set.  You heft the crowbar in your hands.\n\t\t*set kidnap_backdoorlocked true\n\t\t*set kidnap_tvworking true\n\t\t*set kidnap_chairslightlybroken false\n\t\t*set kidnap_chairdestroyed false\n\t\t*set kidnap_stairsbroken false\n\t\t*label typical_day_35_farmhouse_loop\n\t\t*choice\n\t\t\t*if (kidnap_backdoorlocked) #Smash the lock on the back door.\n\t\t\t\t*set kidnap_backdoorlocked false\n\t\t\t\tThe lock shatters easily under your crowbar.\n\t\t\t\t*goto typical_day_35_farmhouse_loop\n\t\t\t*if (kidnap_tvworking) #Smash the television.\n\t\t\t\t*if (kidnap_backdoorlocked)\n\t\t\t\t\tYou'll need to break in first.\n\t\t\t\t\t*goto typical_day_35_farmhouse_loop\n\t\t\t\tThe television screen implodes, scattering glass all over the floor.\n\t\t\t\t*set kidnap_tvworking false\n\t\t\t\t*goto typical_day_35_farmhouse_loop\n\t\t\t*if ((kidnap_chairslightlybroken=false) and (kidnap_chairdestroyed=false)) #Smash the upright chair.\n\t\t\t\t*if (kidnap_backdoorlocked)\n\t\t\t\t\tYou'll need to break in first.\n\t\t\t\t\t*goto typical_day_35_farmhouse_loop\n\t\t\t\tThe chair is solid, but you break some of the supports on your first swing.\n\t\t\t\t*set kidnap_chairslightlybroken true\n\t\t\t\t*goto typical_day_35_farmhouse_loop\n\t\t\t*if ((kidnap_chairslightlybroken) and (kidnap_chairdestroyed=false)) #Smash the upright chair again.\n\t\t\t\tThe chair crumbles into pieces as you hit it again.\n\t\t\t\t*set kidnap_chairdestroyed true\n\t\t\t\t*goto typical_day_35_farmhouse_loop\n\t\t\t*if (kidnap_stairsbroken=false) #Smash the stairs going up to the second floor.\n\t\t\t\t*if (kidnap_backdoorlocked)\n\t\t\t\t\tYou'll need to break in first.\n\t\t\t\t\t*goto typical_day_35_farmhouse_loop\n\t\t\t\tYou break the old wooden steps into splinters, making it dangerous for anyone wishing to climb them.\n\t\t\t\t*set kidnap_stairsbroken true\n\t\t\t\t*goto typical_day_35_farmhouse_loop\n\t\t\t#Return home.\n\t\t\t\tYou rub your head, unsure what has come over you.  You begin to wonder if you might be losing your mind.\n\t\t\t\t*if (badmatch=false)\n\t\t\t\t\tYou return home and find that ${lover_name} is still lying in bed waiting up for you.\n\t\t\t\t*if (badmatch)\n\t\t\t\t\tYou return home and find ${lover_name} sound asleep.  You try to be quiet, but as you walk to bed, a floorboard creaks.  $!{lover_heshe} wakes up and glares at you, angry that you've disturbed ${lover_himher}.\n\t\t\t\t*if ((((kidnap_backdoorlocked) or (kidnap_tvworking=false)) or ((kidnap_chairdestroyed) or (kidnap_chairslightlybroken=false))) or (kidnap_stairsbroken=false))\n\t\t\t\t\t*set kidnap_someonedead true\n\t\t\t\t\t*set kidnap_injury true\n\t\t\t\t\t*set kidnap_sondead true\n\t\t\t\t\t*set kidnap_daughterdead true\n\t\t\t\t*goto typical_day_35_loop\n\t*if (((seen_drugcharges) and (typical_day_35_used_roomsearch=false)) and ((usedlottery_19) and (badmatch=false))) #Search my son's room for drugs.\n\t\t*set typical_day_35_used_roomsearch true\n\t\tYou have no idea why the thought occurs to you, but suddenly, you feel very strongly about it.  You storm into your son's room and begin searching frantically.  ${firstchild_name} wakes up and starts yelling at you to get out of his room. You rub your head at the return of your familiar headache and wonder if you're going crazy.  He's only 13, after all.  Sure, he's been getting mouthy and disrespectful, but he's a teenager; such things are to be expected.  \n\t\t*choice\n\t\t\t#Apologize and leave him alone.\n\t\t\t\t\"Get out of my room!\" he yells at you, slamming the door behind you as you leave.\n\n\t\t\t\t\"What was all that about?\" ${lover_name} asks when you return to your b
