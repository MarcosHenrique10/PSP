u.  You immediately break down crying, lashing out at the monitor.  The screen cracks and you bruise your hand.  You wonder why you even bother to continue with your research.  Without them, your life is meaningless.\n*choice\n\t*if (kidnap_loverdead) #Go to the lab the next day, planning to do something foolish.\n\t\tYou walk among the machines, turning them on one at a time.  It's a foolish move, but you are desparate.  You have even secretly created a program to run the machines without anyone at the console.  You activate the program and crawl into the large metal box.\n\n\t\tThe machines hum as they power up.  You sit in the dark, hardly caring what the outcome will be: any change would be an improvement on the hell you now call life.  You feel the power surging through the box and suddenly you remember... everything...\n\t\t*goto TimeTravel\n\t#I remember a time...\n\t\t*goto TimeTravel_ns\n\n*label OutsideApartment\n*set lifestage \"day_45\"\n*set age 45\n*comment train never crash, good match only, daughter is alive (Kids are 23 and 21)\n*if ((usedstocks_19=true) and (kidnap_someonedead=false))\n\t*Comment Your own apartment, you've been divorced.\n\tYou sit in your limousine next to your new apartment building, having just returned from the lab.  You look numbly at the papers in your lap, stunned to see that ${lover_name} went through with the divorce.  $!{lover_heshe} claims 'irreconcilable differences,' which seems to be the catch-all phrase for most divorces.  You had hoped that you could work out your problems, but looking at the finalized papers, you see now that it wasn't meant to be.\n\n\tEver since the kidnapping, ${firstchild_name} and ${secondchild_name} have looked at you differently.  They have become withdrawn and sullen, suffering from anxiety disorders and nightmares.  ${lover_name} claims that the problems between you began long before that.  $!{lover_heshe} says that you were a stranger to them.  Between your running, working out, martial arts practice, shooting range time, and research, you were never there for your family.  You had briefly considered leaving the research team, but that was the only time you spent with ${lover_name} as it was.  How could you have been so oblivious?  Your family was always the most important thing to you, yet you never spent time with them.\n\n\tTears run down your face as you sit back in your limousine, wondering where it all went wrong.\n\t*choice\n\t\t#Begin to realize...\n\t\t\tThe thought comes to you as a surprise.  For a brief moment, thousands of confusing and contradictory ideas rush into your mind.  You scream out as a jagged pain tears through your brain.\n\n\t\t\t\"Are you okay?\" the chauffeur asks from the front seat.\n\n\t\t\tYou take a few slow, deep breaths before calling back to him.  \"Yes, I'm fine.\"\n\n\t\t\tBut no, you aren't.  Something has gone terribly wrong.  Images of a train crash,\n\t\t\t*if (likesboys)\n\t\t\t\tof being married to a different man,\n\t\t\t*if (likesgirls)\n\t\t\t\tof being married to a different woman,\n\t\t\t*if (terrydead_36)\n\t\t\t\tof your good friend Terry alive and dead,\n\t\t\tand of countless funerals overlap in your mind.  Everything you've tried to fix has been a failure.  You've been running the Red Queen's race with no hope of ever getting out.  But there has to be a way out...  And then, it comes to you.\n\n\t\t\tYour headache is beyond any you've ever had before, but a smile spreads slowly across your face anyway.  The end is in sight.  Images of a dark night, pouring rain, and a rooftop fill your mind.  This scene overlaps with the conversation you had with your investors on the day you got your grant.  If a paradox were to have occurred before your headaches began, none of this would have happened.\n\n\t\t\tIt's either that, or acceptance... Maybe you should go to the lab and do something foolish?  Again?  You groan as your head feels like it's about to tear itself in half.\n\t\t\t*set urgetoendit true\n\t\t\t*goto TimeTravel\n\t\t#Return to the lab, planning to do something foolish.\n\t\t\tYou walk among the machines, turning them on one at a time.  It's a foolish move, but you have lost all hope.  You have even secretly created a program to run the machines without anyone at the console.  You activate the program and crawl into the large metal box.\n\n\t\t\tThe machines hum as they power up.  You sit in the dark, hardly caring what the outcome will be.  Your life has lost all meaning.  You feel the power surging through the box and suddenly you remember... everything...\n\t\t\t*if (urgetoendit)\n\t\t\t\t*choice\n\t\t\t\t\t#Continue to make changes.\n\t\t\t\t\t\t*goto TimeTravel_ns\n\t\t\t\t\t#Accept my life.\n\t\t\t\t\t\tYour life is far from perfect, but your children are safe and alive.  The money you made had allowed ${firstchild_name} to get the heart transplant he needed.  Although you aren't in their lives, ${lover_name} is with them and they are together.\n\n\t\t\t\t\t\tAs the Schrödinger Box opens, your memories of the future and of the alternative pasts fade away.  You look at the computer, seeing that it claims that there is a Paradox Factor of zero.\n\n\t\t\t\t\t\tYou wonder if there's an error with the experiment, because you have no recollection of having a past any different than the one you have now.  Perhaps time travel for humans really is impossible after all?\n\t\t\t\t\t\t*set achievement_livingapart true\n\t\t\t\t\t\t*achieve livingapart\n\t\t\t\t\t\t*page_break The End\n\t\t\t\t\t\t*goto retire\n\t\t\t*else\n\t\t\t\t*goto TimeTravel\n\t\t#I remember a time...\n\t\t\t*goto TimeTravel_ns\n*if ((usedlottery_19=true) or (usedstocks_19=true))\n\tYou sit in your limousine next to ${lover_name}, looking out at the rundown apartment building where \n\t${secondchild_name} now lives.\n*if ((usedlottery_19=false) and (usedstocks_19=false))\n\tYou sit in your rusty car next to ${lover_name}, looking out at the rundown apartment building where \n\t${secondchild_name} now lives.\nYour grandson is in there, along with your daughter's boyfriend.  You take a deep breath and go to the door with ${lover_name} at your side.  $!{lover_heshe} looks very old and exhausted.  The years have not been kind to ${lover_himher}.\n\n*if (usedlottery_19=false)\n\t*comment No stock, no lottery.\n\t\"Hi,\" ${secondchild_name} says as she opens the door, your grandson Leo on her hip.\n\n\t*if (usedstocks_19=true)\n\t\tYou can't help but notice how tired she looks.  She's never been the same since the kidnapping. Nightmares and depression are only the tip of the iceberg.\n\t\t*if (kidnap_sondead)\n\t\t\tAlthough ${secondchild_name} doesn't like to talk about her brother, you know that his death weighs heavily upon her.\n\t\t*if (kidnap_sondead=false)\n\t\t\t${firstchild_name} is much the same.  Withdrawn, silent, and sad.\n\n\t\t\"Hi honey,\" you respond, reaching out to take your grandson as you enter the rundown apartment.\n\t\t*choice\n\t\t\t#I remember a time...\n\t\t\t\t*goto TimeTravel_ns\n\tYou can't help but notice how tired she looks.  You also can't help but see the holes in her clothing, and in the baby's too.  You've never had a lot of money, but since the failure of the human trials at the lab, things have gotten worse.  As the grants shrunk, so did your paychecks.  ${secondchild_name} tries to keep upbeat, but since her boyfriend got laid off, your daughter's small family has fallen even deeper into poverty.\n\n\t\"Hi honey,\" you respond, reaching out to take your grandson as you enter the rundown apartment.  The small boy begins to cough, emitting a deep rattle from within his little chest.\n\t*choice\n\t\t#I remember a time...\n\t\t\t*goto TimeTravel_ns\n*comment Used Lottery (can use stock too, only if kidnapping goes bad)\n*set seen_dawson true\n*if (killedyoungdawson)\n\tYou knock at the door and wait.  ${secondchild_name} answers the door, a cigarette hanging from her lips.\n\n\t\"Go away,\" she says petulantly.  \"Unless you have some money to help us out?\"\n\n\tYou don't know what turned your daughter into this money-grubbing monster.  Some deep trouble that was left unnoticed until it was too late?\n\t*if (usedstocks_19=true)\n\t\t*if (kidnap_sondead)\n\t\t\tHer experiences of the kidnapping and her brother's death?\n\t\t*if (kidnap_sondead=false)\n\t\t\tHer experiences while kidnapped?\n\tOr perhaps it was the free, easy money that she grew up with? ${lover_name} is devastated by the words, but holds back tears.\n\t*choice\n\t\t#Offer her money.\n\t\t\tYou offer her a sizeable amount, once again.  As before, she takes the money without shame and lets you into the apartment to see your grandson.  Despite all of the financial help you've given, there are still holes in his clothing and the apartment looks like a disaster.  It seems like no matter how much money you give her, she spends it right away.\n\t\t\t*goto TimeTravel\n\t\t#I remember a time...\n\t\t\t*goto TimeTravel_ns\nThe door opens before you are able to knock.  Dawson stands before you, drunk as a skunk, despite the fact that it's only two in the afternoon.  He has a can of beer in his hand and leans against the door, food stains all across his shirt.  You don't understand how ${secondchild_name} could have gotten into such a terrible predicament.\n*page_break\n\"Did you bring the rent money?\" he asks belligerently.\n\nBehind him, you hear a baby crying.  You know that it's your grandson, whom you've never met.  You don't see ${secondchild_name} anywhere, which sends a chill down your spine.  ${lover_name}, looking tired and used up, nods to the drunk man.\n\nYou hand over the envelope. You've used up most of your remaining lottery winnings over the years, but this payment is necessary to ensure that your daughter and grandson have a place to live.\n\n\"Uh huh,\" Dawson says, taking the money without thanking you.  \"I'll make sure she gets it.  Now get outta here.\"\n\nHe slams the door in your face.\n*temp outsideapartment_nostock_policecall false\n*temp OutsideApartment_nostock_picalled false\n\n*label OutsideApartment_nostock_loop\n*choice\n\t#Kill Dawson.\n\t\tYou can't stand the idea of the man hurting your daughter any longer.  That night, you slip away from your home while ${lover_name} is sound asleep.\n\t\t*if (kidnap_gunclub=false)\n\t\t\tIt's easy enough to get a gun.\n\t\t*if (kidnap_gunclub)\n\t\t\tYou remember the gun you purchased a few years ago and take it out of the safe.\n\t\tYou go back to your daughter's apartment and stand in the street, trying to decide if you should go through with it or not.\n\t\t*choice\n\t\t\t#Yes, kill the bastard.\n\t\t\t\tDawson answers the door, drunk again.  You can hear\tyour crying grandson inside.  The boorish man's eyes widen in surprise as you point the gun at his face.  You can't help but feel exhilarated when you pull the trigger.\n\t\t\t\t*set killeddawson_45 true\n\t\t\t\t*goto TimeTravel\n\t\t\t#No, don't kill him.\n\t\t\t\tYou leave the street, taking the gun home with you.  There has to be another way.\n\t\t\t\t*set killeddawson_45 false\n\t\t\t\t*goto TimeTravel\n\t*if (OutsideApartment_nostock_policecall=false) #Call the police.\n\t\t*set outsideapartment_nostock_policecall true\n\t\tYou call the police.  This isn't the first time you've called.  They tell you again that there's nothing they can do. As long as ${secondchild_name} is unable to leave him or press charges, they won’t help.\n\t\t*goto OutsideApartment_nostock_loop\n\t#I remember a time...\n\t\t*goto TimeTravel_ns\n\n*comment ------------------------------------------------- Age 50\n*label Typical_Day_50\n*comment Goodmatch only.  (Kids are 28 and 26, grandson is 6, if alive)\n*set age 50\n*if ((killeddawson_45) and (usedlottery_19))\n\t*set lifestage \"injail_50\"\n\tYou sit in your tiny cell, looking at the bars that keep you locked inside.  The orange prisoner outfit still chafes and likely always will.\n\n\t\"You have a visitor,\" one of the guards says from outside your cell.\n\n\tYou are taken to the visitors' lounge, where a there is row of booths with telephones in front of glass walls.  You are escorted to your booth and see Braedan Davenport, the lead investor in your research company, sitting on the other side.\n\n\t\"Hello, ${name},\" he says when you pick up the phone.  \"Let me get to the point.  I can't get you out, obviously, but I can get you some perks in there.\"\n\t*page_break\n\tHe goes on to say that the human trials are still having major troubles and that the research company has gone bankrupt.  He's pulled some strings and has managed to get a day pass for your release.  He'd like you to come to the lab one last time, in case you have any final ideas to try before they give up and sell off all of the equipment. An idea forms in your mind, and you quickly agree to the plan.\n\n\tA few days later, you find yourself at the lab.\n\t*if (traininjury)\n\t\tYou wheel yourself from machine to machine while Mr. Davenport stands nearby.\n\t*if (traininjury=false)\n\t\tYou walk from machine to machine while Mr. Davenport stands nearby.\n\t*if ((terrydead_36) and (jimdead_20))\n\t\tThere are many new scientists working in the lab whom you don't know, including Terry and Jim's replacements.\n\t*if ((terrydead_36) and (jimdead_20=false))\n\t\tThere are many new scientists working in the lab whom you don't know, although Jim stands nearby and gives you a sad nod of greeting.\n\t*if ((terrydead_36=false) and (jimdead_20))\n\t\tThere are many new scientists working in the lab whom you don't know, although Terry stands nearby and gives you a sad nod of greeting.\n\t*if ((terrydead_36=false) and (jimdead_20=false))\n\t\tThere are many new scientists working in the lab whom you don't know, although Jim and Terry stand nearby, both of them giving you a sad nod of greeting.\n\tAlthough everyone understands your reasons for killing your daughter's abusive husband, there is little they can do to help. Several armed police officers keep an eye on you as well.\n\t*page_break\n\tAfter an hour of this, everyone becomes used to your presence, and their attention returns to other things.  You know that it will only take a second to do what you really came to do.  When Mr. Davenport slips out to go to the washroom and the others are focused elsewhere, you look through the computer system.  Your program is still there, the one you created in secret to run the machines without anyone at the console.\n\t*if (traininjury)\n\t\tYou turn it on and quickly wheel yourself over to the Schrödinger Box, crawling inside before anyone can stop you.\n\t*if (traininjury=false)\n\t\tYou turn it on and quickly walk over to the Schrödinger Box, crawling inside before anyone can stop you.\n\n\tThe machines hum as they power up.  You sit in the dark, knowing that any change must be an improvement on how life is now. You can hear people rushing over to stop the machine, but it's too late.  You feel the power surging through the box and suddenly you remember... everything...\n\t*goto TimeTravel\n*comment Goodmatch only.\n*set lifestage \"day_50_onlygood\"\n*if ((usedlottery_19) or (usedstocks_19))\n\tIt's a beautiful sunny day, but you can't enjoy it. You sit @{kidnap_injury in your wheelchair|} on your yacht in the middle of the tranquil blue sea.\n*if ((usedlottery_19=false) and (usedstocks_19=false))\n\tYou sit @{kidnap_injury in your wheelchair|} in a run-down old apartment.  The wallpaper is peeling and the television doesn't work.\nIt's the two-year anniversary of your ${lover_husbandwife}'s death.  You found the note before you found the body. Although the police report says suicide, you know that ${lover_heshe} died of a broken heart.\n*if ((usedlottery_19=false) and (usedstocks_19=false))\n\tEver since ${firstchild_name} and your grandson died, ${lover_heshe} had never been the same.\n*if ((usedstocks_19) and ((kidnap_daughterdead) and (kidnap_sondead)))\n\t$!{lover_heshe} had never been the same after ${firstchild_name} and ${secondchild_name} were killed during the kidnapping all those years ago.\n*if ((usedstocks_19) and ((kidnap_daughterdead=false) and (kidnap_sondead=true)))\n\t$!{lover_heshe} had never been the same after ${firstchild_name} was killed during the kidnapping all those years ago.\n*if ((usedstocks_19) and ((kidnap_daughterdead=true) and (kidnap_sondead=false)))\n\t$!{lover_heshe} had never been the same after ${secondchild_name} was killed during the kidnapping all those years ago.\n\n*if (usedstocks_19=false)\n\tThe funeral was private and small.\n\t*if (usedlottery_19)\n\t\tYou tried to get ${firstchild_name} released from prison on a day pass, but his list of\n\t\tcharges had been too long and too severe.\n\t\t*if (lover_hisher=\"his\")\n\t\t\tYou hadn't even been able to find ${secondchild_name} to let her know about her father's passing.\n\t\t*if (lover_hisher=\"her\")\n\t\t\tYou hadn't even been able to find ${secondchild_name} to let her know about her mother's passing.\n\t*if (usedlottery_19=false)\n\t\tUnfortunately, ${secondchild_name} didn't come.  She was still grieving the loss of her son and wasn't able to bear her \n\t\t*if (lover_hisher=\"his\")\n\t\t\tfather's funeral as well.\n\t\t*if (lover_hisher=\"her\")\n\t\t\tmother's funeral as well.\n\n*if ((terrydead_36=false) and (jimdead_20=false))\n\t\"Things will get better,\" Terry says.\n\n\tIt's such a ridiculous statement that you don't even bother to correct him. It's nice to have Terry and Jim with you, although you wish it were for a better reason.\n*if ((terrydead_36) and (jimdead_20=false))\n\t\"Things will get better,\" Jim says.\n\n\tIt's such a ridiculous statement that you don't even bother to correct him. It's nice to have Jim with you, although you wish it were for a better reason.\n*if ((terrydead_36=false) and (jimdead_20))\n\t\"Things will get better,\" Terry says.\n\n\tIt's such a ridiculous statement that you don't even bother to correct him. It's nice to have Terry with you, although you wish it were for a better reason.\t\n*if (((terrydead_36) and (jimdead_20)) and ((professor_alive) and (professor_friend)))\n\t\"Things will get better,\" Professor Deakin says.\n\n\tIt's such a ridiculous statement that you don't even bother to correct him. It's nice to have the old professor with you, although you wish it were for a better reason.\n*if (((terrydead_36=false) or (jimdead_20=false)) and ((professor_alive) and (professor_friend)))\n\tEven old Professor Deakin managed to join you for the sad occasion.\t\nYou have just been told that your research company has gone bankrupt.  The overextended loans have finally run out, with no research grants coming in to save the day.  The lab will be broken down and the equipment will be sold off in a few weeks.\n\n*temp typical_Day_50_terrytalk false\n\n*label Typical_Day_50_loop\n*choice\n\t*if ((((drugsfound) and (killedyoungdawson)) and ((usedlottery_19) and (typical_Day_50_terrytalk=false))) and ((usedstocks_19=false) and (terrydead_36=false))) #Talk to Terry privately.\n\t\t*set typical_day_50_terrytalk true\n\t\t\"I just don't understand how things turned out so poorly,\" you tell your good friend Terry.  \"I had it all.  A wonderful ${lover_husbandwife}, two great kids, lots of money, and a chance to put my name in the history books.\"\n\n\t\tTerry smiles weakly at you and shrugs.  \"Maybe you really can have too much of a good thing.\"\n\n\t\tIt makes you think.  Is it possible?  Had winning the lottery at such a young age somehow corrupted things?  What if your fortune had come slowly, perhaps through something that required skill, like investing?  Would that have instilled better morals into your children? They're the thoughts of a foolish old\n\t\t*if (gender=\"male\")\n\t\t\tman,\n\t\t*if (gender=\"female\")\n\t\t\twoman,\n\t\t*if (gender=\"nonbinary\")\n\t\t\tperson,\n\t\twhich seems a pity for someone as young as you.\n\t\t*goto Typical_Day_50_loop\t\t\t\n\t#Go to the lab the next day, planning to do something foolish.\n\t\tYou walk among the machines, turning them on one at a time.  It's a foolish move, but you have lost all hope.  You have even secretly created a program to run the machines without anyone at the console.  You activate the program and crawl into the large metal box.\n\n\t\tThe machines hum as they power up.  You sit in the dark, hardly caring what the outcome will be.  Your life has lost all meaning.  You feel the power surging through the box and suddenly you remember... everything...\n\t\t*goto TimeTravel\n\t#I remember a time...\n\t\t*goto TimeTravel_ns\n\n*label TimeTravel\n*if ((asylum_37) and (shotfriend))\n\t*if ((((terrydead_36) and (shooter_name=\"Terry\")) or ((jimdead_20) and (shooter_name=\"Jim\"))) or (((professor_alive=false) and (shooter_name=\"Professor Deakin\")) or ((professor_friend=false) and (shooter_name=\"Professor Deakin\"))))\n\t\t*set asylum_37 false\n\t*if (((tripcanceled=false) or ((bad_died) and (badmatch=false))) and (shooter_name=lover_name))\n\t\t*set asylum_37 false\n\n*label TimeTravel_ns\nYou remember a time...\n*choice\n\t*if (firstplay=false) #Age 18: A college lecture.\n\t\t*goto College_Class\n\t*if (show_college_coffee) #Age 19: A coffee shop.\n\t\t*goto College_coffee\n\t#Age 20: My wedding.\n\t\t*goto Wedding\n\t*if (show_grant) #Age 21: Meeting with the investors.\n\t\t*goto Grant\n\t*if ((firstplay=false) and (badmatch=false)) #Age 22: The day I became a ${fathermother}.\n\t\t*goto firstchild\n\t*if (((firstplay=false) and (seen_college_class)) and (seen_accident_after_crash)) #Age 30: The day we began live trials.\n\t\t*goto typical_day_30\n\t*if ((realizesomethingwrong) and (seen_detained)) #Age 35: Lying in bed.\n\t\t*goto typical_day_35\n\t*if ((firstplay=false) and (tripcanceled=false)) #Age 35: A train.\n\t\t*goto BoardTrain\n\t*if ((((bad_died=true) and (badmatch)) or ((badmatch=false) and (tripcanceled=false))) and (firstplay=false)) #Age 35: A funeral.\n\t\t*goto familyfuneral\n\t*if (seen_roofterry) #Age 36: A flat tire.\n\t\t*goto Flattire\n\t*if (urgetoendit) #Age 37: A rooftop.\n\t\t*goto Rooftop\n\t*if ((seen_college_class) and ((seen_typical_day_30) and (seen_accident_after_crash))) #Age 38: A regular day.\n\t\t*goto typical_day_38\n\t*if (((bad_died=false) and (badmatch)) or (asylum_37)) #Age 45: A regular day at home.\n\t\t*goto Typical_Day_45_asylum_or_badmatch\n\t*if (((badmatch=false) and (usedstocks_19)) and ((kidnap_daughterdead) and (asylum_37=false))) #Age 45: A regular day at home.\n\t\t*goto Typical_Day_45_nodaughter\n\t*if (((badmatch=false) and (asylum_37=false)) and ((tripcanceled) and (((kidnap_daughterdead=false) and (usedstocks_19)) or (usedstocks_19=false))))  #Age 45: Outside an apartment.\n\t\t*goto OutsideApartment\n\t*if ((((tripcanceled) and (badmatch=false)) and ((asylum_37=false) and (kidnap_loverdead=false))) and ((kidnap_someonedead) or (usedstocks_19=false))) #Age 50: The day the company went bankrupt.\n\t\t*goto Typical_Day_50\n*label TheEnd\nYou hear the gun fire... and then all is silent.\n*page_break Silence\n*set age 38\n*set lifestage \"paradox\"\nYou feel no pain.  You open your eyes but see nothing. It's dark.\n\n\"${name}?\" a voice calls from a distance.\n\nYou are practically blinded by the bright light when the Schrödinger Box is opened.  Terry and Jim stand in the lab, looking down at you with looks of worry on their faces.  You can see the computer flashing the words: \"Paradox Factor 100% - Experiment Aborted.\"\n\n\"Security said someone was in here,\" Terry says, a look of concern on his face.  \"You okay?\"\n\nSurprisingly, you feel that you are.  Although you still miss ${truelove} and your children with every fiber of your being, you find yourself cherishing the time you had together before the train accident.  You let Jim and Terry help you out of the Schrödinger Box and back into your wheelchair, although you could have maneuvered back into it yourself.\n\n\"So, it didn't work,\" Jim says, looking at the computer screen.  \"It's no wonder. We aren't ready for human trials yet.\"\n*page_break\nNobody mentions the elephant in the room, that you tried to use the machine despite the risks to yourself.  You chalk it up to having good friends: they know that you are hurting and still grieving the loss of your ${lover_husbandwife} and kids.\n\n\"No, it didn't,\" you agree quietly.\n\n\"Something must have happened that caused a paradox,\" Terry says as he too looks at the machinery.\n\n\"I don't think humans will ever be able to time travel,\" you say serenely.  \"We have too many hopes, dreams, desires, and ambitions.  No, time travel isn't the answer.  I think we need to learn to accept the past so we can live with the future.\"\n\nTerry and Jim look at you oddly, but you believe what you said.  You decide that you will leave the research team tomorrow. You'll never forget your lost family, but it's time to live the life you've been given.  You smile at the thought, all memories of a headache completely gone.\n*set achievement_paradox true\n*achieve paradoxfactor\n*page_break The End\n*goto retire\n\n*label Retire\n*if (achievement_paradox)\n\t[b]Paradox Factor Ending Achieved[/b]: You created a time paradox and prevented time travel from ever occurring.\n*if (achievement_livingapart)\n\t[b]Living Apart, But Still Living Ending Achieved[/b]:  Your family lives a happy and full life. Unfortunately, you aren't a part of it.\n*if (achievement_noloss)\n\t[b]No Loss Ending Achieved[/b]:  You spent your life away from your soulmate and children in order to spare them pain and suffering.\n*if (achievement_cherish)\n\t[b]Cherish the Time Together Ending Achieved[/b]:  You allowed fate to take your soulmate and children away from you in the train accident, so they don't suffer the torments that would plague them later in life.\n\nWe hope you've enjoyed playing [i]Paradox Factor.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nCongratulations on finishing the game.  Did you know that there are multiple endings?\n*ending\n", "screenshots": "*comment Copyright 2013 by Mike Walter\n*comment Paradox Factor - Screen Shots\nscreenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\nYou open the newspaper and check the numbers, one at a time. \n*line_break\n*line_break\n\"I won,\" you say quietly under your breath before the full realization hits you. \"I won!!\" \n*line_break\n*line_break\nThe others don't believe you at first, but there it is, right in front of you. Your life is going to change drastically! \n*fake_choice\n\t#Ask Jim about his date last night.\n\t#Read the newspaper.\n\t#You remember a time...\n\n*script changeBackgroundColor(\"black\")\n\n\"You look great,\" the professor says with a smile. \"Thank you for inviting me, although I have to say, I'm surprised that you're getting married now, before you finish school.\" \n*line_break\n*line_break\n\"No offense, professor,\" you say with a smile. \"But if we get our research grant, you know we'll have to cut our studies short.\" \n*line_break\n*line_break\n\"Of course,\" he says. \"As much as I'll miss you, I truly hope that you get that grant. Your work looks amazing; I think you're going to change the world.\" \n*line_break\n*line_break\n\"I sure hope so,\" you say. \n*fake_choice\n\t#Tell the professor that he is going to die of cancer.\n\t#Speak to someone else and don't mention the professor's death.\n\n*script changeBackgroundColor(\"sepia\")\n\nThe train station is busy, but you aren't pressed in by the crowds. You stand apart: the first class passengers will board first and aren't forced into tight lines like the others. Your porter stands nearby, ready to carry your luggage onto the train. Your children, William and Brittany, stand nearby, looking bored and unimpressed. At 13 and 11, respectively, they have been all around the world on your lottery winnings and aren't happy to be traveling by train. Your head aches slightly, causing you to rub your temples. Tom has a schedule in his hands as he watches the train pull into the station. \n*fake_choice\n\t#Board the train.\n\t#Start yelling about the broken brakes.\n\t#Don't board the train.\n\t#You remember a time...\n\t\nYou are laying in bed with Jessica. The kids are sound asleep in their bedrooms. The four-pillar king-size bed with its soft Egyptian cotton sheets is cozy and luxurious. The flat-screen television on the wall is on mute as you talk about the upcoming family vacation. \n*line_break\n*line_break\n\"By train?\" Jessica says with a hint of amusement in her voice. \n*line_break\n*line_break\n\"Sure, it'll be fun,\" you say with a smile.\n*line_break\n*line_break\nYou rub your head. Something about the entire idea seems... wrong. \n*fake_choice\n\t#Go for a night drive to a nearby abandoned farmhouse.\n\t#Cancel the trip.\n\t#Continue with the trip as planned.\n\t#You remember a time...\n\nYou see a full page ad for Mason's Firearms, a local gun and ammunition store. You've never been a hunter or a gun enthusiast before, but today, a strange thought comes over you. Perhaps you SHOULD buy a gun? \n*fake_choice\n\t#You decide to buy yourself a gun.\n\t#You dismiss this crazy idea.\n\nA few hours later, you arrive at an old, abandoned farmhouse. You walk around it, wondering why you are here. Your head hurts worse than ever before. The doors are locked, but looking through the window, you can see a living room with a sofa, a padded upright chair, and a television set. You heft the crowbar in your hands. \n*fake_choice\n\t#Smash the lock on the back door.\n\t#Smash the television.\n\t#Smash the upright chair.\n\t#Smash the stairs going up to the second floor.\n\t#Return home.\n\t\nThe music plays in the small church. Small white bows are placed on each pew as your friends and family watch the ceremony. A young girl with curly brown hair and a white dress shirt sits in front of a large golden harp as she plays Pachelbel's Canon. You knew that someday you would marry... \n*fake_choice\n\t#...the man of your dreams.\n\t#...the woman of your dreams.\n\t\nThe bald professor looks at you strangely for a moment before speaking. \"It's an interesting idea. Why don't you come by the college bar tomorrow after class? I usually stop in for a drink and chat with students about theoretical ideas.\" \n*line_break\n*line_break\nIt might be nice to have a friend like the professor, even though he's so old. \n*fake_choice\n\t#You say yes, you'd be delighted.\n\t#You say no, you're too busy.\n\t\nThe cold rain pours down. You can hardly see, but you can tell that you are sitting in your wheelchair on a rooftop. It's pitch black out, the world illuminated only by the occasional bolt of lightning across the sky. A man with short black hair and a black mustache stands a few feet away. You aren't sure who he is or why he is yelling at you. You aren't even certain who you are. No, wait... a name floats to the surface of your memory. Your name is... \n*input_text name\n*finish\n", "startup": "*comment Copyright 2013 by Mike Walter.\n*comment Paradox Factor\n*comment startup.txt\n\n*title Paradox Factor\n*author Mike Walter\n*scene_list\n\tparadox\n\n*create name \"None\"\n*create gender \"None\"\n*create lover_name \"None\"\n*create truelove \"None\"\n*create lover_hisher \"None\"\n*create lover_heshe \"None\"\n*create lover_himher \"None\"\n*create lover_handsomebeautiful \"None\"\n*create lover_boyfriendgirlfriend \"None\"\n*create lover_husbandwife \"None\"\n*create fathermother \"None\"\n*create firstchild_name \"William\"\n*create secondchild_name \"Brittany\"\n*create shooter_name \"Terry\"\n*create shooter_heshe \"he\"\n*create shooter_himher \"him\"\n*create shooter_hisher \"his\"\n*create terrydead_roof false\n*create jimdead_roof false\n*create loverdead_roof false\n*create shotfriend fa alse\n*create jimdead_20 false\n*create achievement_paradox false\n*create achievement_livingapart false\n*create achievement_noloss false\n*create achievement_cherish false\n*create lifestage \"None\"\n*create seen_roofterry false\n*create seen_roofjim false\n*create typical_day_45_used_proftalk false\n*create typical_day_45_used_invite false\n\n*achievement cherish visible 100 Cherish the Time Ending\n\tCherish the Time Ending\n*achievement livingapart visible 100 Living Apart Ending\n\tLiving Apart Ending\n*achievement noloss visible 100 No Loss Ending\n\tNo Loss Ending\n*achievement paradoxfactor visible 100 Paradox Factor Ending\n\tParadox Factor Ending\n*achievement timetraveler visible 50 Time Traveler\n\tUse the time machine.\n\tYou used the time machine.\n*achievement saveprof visible 50 Save the Professor\n\tSave the professor.\n\tYou saved the professor.\n*comment sm_init paradox | 5\n\n*allow_reuse\n*label Start_loop\n*if (choice_randomtest)\n\t*goto BeginPlaying\n*choice\n\t#Begin playing [b]Paradox Factor[/b].\n\t\t*comment Current src tags: lh1, lh2, lh3, mobster, lastwizard, lifewizard, paradox, captain\n\t\t*goto BeginPlaying\n\t*allow_reuse #Check out [b]Daria: A Kingdom Simulator[/b] by Mike Walter\n\t\t*image kingdom_sim.jpg\n\t\t[b]Daria: A Kingom Simulator[/b] by Mike Walter\n\t\t*line_break\n\t\tStep into a richly detailed world where your dreams of ruling a thriving kingdom become a reality. This captivating resource management game seamlessly blends storytelling with strategic gameplay. Begin your journey with no more than a vision and gradually shape the destiny of a nation.\n\t\t*line_break\n\t\t*link https://www.choiceofgames.com/user-contributed/daria-kingdom-simulator/\n\t\t*goto Start_loop\n\t*allow_reuse #Check out [b]Life of a Space Force Captain[/b] by Mike Walter\n\t\t*image spaceforce.jpg\n\t\t[b]Life of a Space Force Captain[/b] by Mike Walter\n\t\t*line_break\n\t\tHave you ever wanted to be the captain of a faster-than-light starship? You will live a full life starting as a young child of the future.\n\n\t\tPlay as human, various species of alien, or even a robot. With the help of your friends and your loyal, upgradable robo-pet, you will go to school to learn skills of your own choosing before taking a position as a lowly cadet.\n\n\t\tYou’ll choose which department to join and rise within as the Solar System trembles in fear when a powerful foe threatens its very existence.\n\n\t\t\"Life of a Space Force Captain\" is a 335,000 word interactive novel by Mike Walter, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n\t\tWill you master the psionic arts or use technology to enhance yourself with cybernetics? Will you follow the rules or will you do whatever is necessary? The choice is yours in Life of a Space Force Captain!\n\t\t*line_break\n\t\t*link https://www.choiceofgames.com/user-contributed/life-of-a-space-force-captain/redirect.php?src=paradox\n\t\t*goto Start_loop\n\t*allow_reuse #Check out [b]The Last Wizard[/b] by Mike Walter\n\t\t*image lastwizard.jpg\n\t\t[b]The Last Wizard[/b] by Mike Walter\n\t\t*line_break\n\t\tIt’s a regular Tuesday evening when you are pulled from the Earth and sent to a place where magic still exists. You are given a wizard's tower filled with arcane knowledge that you are expected to learn. Thrust into a war between two nations, it's up to you to save the kingdom where you now live.\n\n\t\t\"The Last Wizard\" is a 185,000 word interactive fantasy novel by Mike Walter, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n\t\tYour choices will influence who rules the land and what happens to the civilians living there. Will you find love or will you strive to return to the life you were forced to leave behind? Will you save the kingdom,
