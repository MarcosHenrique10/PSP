<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>It Takes Three to Tango — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "threetotango", "title": "It Takes Three to Tango", "scenes": {"chapt1": "*image c01.png none\n\nThe sun blazes through the windshield as you inch through traffic, the packed highway stretching out in front of you like an endless ribbon of frustration. You sigh and grip the steering wheel tighter, trying not to lose your calm as you make your way toward the cabin. \n\nYou've been on the road for hours, and the impatience in your chest is starting to build. The cabin is close now, only a few more miles, but this final stretch feels endless.\n\nIt's meant to be a weekend of sorting through your uncle's belongings, deciding what to keep and what to let go. But what it will really offer is a chance to escape—some peace and quiet far from the city, and far from this maddening traffic, if it would only start to move.\n\n*fake_choice\n #\"Ugh, come on!\"\n  *set var1 \"Ugh, come on!\"\n #\"Please move. I just need to reach my exit.\"\n  *set var1 \"Please move. I just need to reach my exit,\"\n #\"Just a few more miles.\"\n  *set var1 \"Just a few more miles,\"\n\n\"${var1}\" you mutter under your breath as the cars ahead continue their snail-like procession.\n\nBut the gridlock holds firm, indifferent to your frustration, trapping you on the highway that is slowly transforming into an endless sea of red brake lights. \n\nWith nothing else to do, you fiddle with the radio dial, seeking some form of entertainment to fill the silence. Finally, you land on a station that seems promising. The cheery voice of the host fills your car as he begins to introduce the next song.\n\n\"[i]All right, folks, we've got a real tearjerker coming up for you. If you've ever been through a breakup, this one's for you! It's called 'Take Me Back,' and let me tell you, it's a powerful reminder of lost love. I'm sure there's someone out there just begging for a second chance, so if you're listening, will you take them back?[/i]\"\n\nYou shake your head at the dramatic introduction but decide to give the song a chance.\n\n[i]Take me back, oh, won't you try[/i]\n\n[i]Our love is strong, don't say goodbye[/i]\n\n*fake_choice\n #\"Shit!\"\n #\"What the—?\"\n #\"Huh!\"\n #\"Oh…\"\n\nAs the first few notes start to play, a pang of recognition hits you—this was a song you and your ex used to listen to together. \n\n[i]Take me back, oh, won't you try[/i]\n\n[i]Our love is strong, don't say goodbye[/i]\n\n[i]The nights are cold without your touch[/i]\n\n[i]I'm missing you, it's just too much[/i]\n\nThe lyrics cut through the air, stirring emotions you've been trying to bury. Your heart clenches, and that familiar ache resurfaces deep within your chest. \n\nJust like that, memories of the relationship that ended a few months ago flood your mind.\n\nThe relationship with:\n\n*fake_choice\n #The man who was my everything.\n  *set nexhe_she \"he\"\n  *set nexhim_her \"him\"\n  *set nexhis_her \"his\"\n  *set nexhisz_herz \"his\"\n  *set nexhimself_herself \"himself\"\n  *set nexgend \"man\"\n #The woman who was my everything.\n  *set nexhe_she \"she\"\n  *set nexhim_her \"her\"\n  *set nexhis_her \"her\"\n  *set nexhisz_herz \"hers\"\n  *set nexhimself_herself \"herself\"\n  *set nexgend \"woman\"\n\n*label name09\n\n$!{nexhis_her} name is…\n\n*fake_choice\n *if (nexgend=\"man\")\n  #Emmett.\n   *set nexname \"Emmett\"\n  #Ivan.\n   *set nexname \"Ivan\"\n  #Hamid.\n   *set nexname \"Hamid\"\n  #Sean.\n   *set nexname \"Sean\"\n  #Input my own.\n   What is the name of your ex?\n   *input_text nexname\n   *if ((nexname=\"Sydney\") or (nexname=\"sydney\"))\n    This name is used for the best friend. Please enter another name.\n    *goto name09\n *if (nexgend!=\"man\")\n  #Emma.\n   *set nexname \"Emma\"\n  #Ivy.\n   *set nexname \"Ivy\"\n  #Maya.\n   *set nexname \"Maya\"\n  #Keisha.\n   *set nexname \"Keisha\"\n  #Input my own.\n   What is the name of your ex?\n   *input_text nexname\n   *if ((nexname=\"Sydney\") or (nexname=\"sydney\"))\n    This name is used for the best friend. Please enter another name.\n    *goto name09\n\n$!{nexname}'s favorite nickname for you is:\n\n*fake_choice\n #Kitten.\n  *set bunny \"Kitten\"\n #Bunny.\n  *set bunny \"Bunny\"\n #Bear.\n  *set bunny \"Bear\"\n #Babe.\n  *set bunny \"Babe\"\n #Input your own.\n  $!{nexname}'s nickname for me is:\n  *input_text bunny\n\n$!{nexname} was the ${nexgend} of your dreams. You remember everything about ${nexhim_her} as if it were yesterday: ${nexhis_her} laughter, the soft sound of ${nexhis_her} voice, the feel of ${nexhis_her} touch. The late-night conversations, the stolen glances, the quiet moments when the world seemed to shrink to just the two of you—those memories cling to you like a second skin.\n\nBut beneath the perfect surface, cracks began to show. Little disagreements turned into heated arguments, and the connection that once felt unbreakable slowly unraveled.\n\nEven now, thinking about ${nexhim_her}, there's a bittersweet tug in your heart—both longing and loss. As if taunting you, the song keeps playing, and you fight the urge to sing along.\n\n[i]Bout the way we used to be[/i]\n\n[i]And how I miss your touch, your kiss, your company[/i]\n\n[i]I know I made mistakes, I was wrong[/i]\n\n[i]Without you I can't move on[/i]\n\n[i]I need you back in my life[/i]\n\n[i]So take me back[/i]\n\n*fake_choice\n #\"Ugh, enough of this.\" \n  *set var1 \"Ugh, enough of this,\" \n #\"Nope! Not happening.\" \n  *set var1 \"Nope! Not happening,\" \n #\"This is going to be stuck in my head all night, isn't it?\" \n  *set var1 \"This is going to be stuck in my head all night, isn't it?\" \n\n\"${var1}\" you grumble to yourself as your hand shoots out to change the station. \n\nYou're not in the mood for a trip down memory lane, and you certainly don't need any reminders of your past relationship right now. The next station you find is playing a more melancholic tune, one that seems to match your current mood. After all, you've just lost your uncle. Sure, you're not overwhelmed by grief, but you're also not in the mood to sing along to the song you and your ex used to listen to.\n\nAhead, the traffic finally moves, allowing you to take your exit and leave the highway behind. The world immediately shifts around you. The noise of the interstate fades, replaced by the whisper of wind through leaves and the occasional chirp of a bird.\n\nThis is familiar territory—this winding, narrow road that leads to the cabin by the lake. The trees here are older, their branches arching overhead like an ancient, protective canopy. The asphalt is rougher too, worn by time and the passage of seasons.\n\nThe road dips and curves in a way that feels like a dance, guiding you closer to the place where you've always felt safe.\n\n*fake_choice\n #The place I cherish and love.\n #The place that holds so many memories.\n #The place where I belong.\n\nAfter a few more miles, you finally pull into the gravel driveway and cut the engine. For a moment, you remain in the car, hands still gripping the steering wheel. The wind rustles through the trees, its soothing sound a welcome contrast to the hum of the highway. You take a deep breath, savoring the fresh, earthy scent of the forest.\n\nReluctantly, you open the car door and step out. The air is cool and crisp, and you can hear the leaves crackling beneath your feet. \n\nThere are only two cabins on this stretch of road: Tanner's and Selma's. Selma, a widow who recently bought her own little piece of paradise, is someone you've only met recently but who seems like a friendly soul, easy to chat with. \n\nHer car is already in the driveway, a sign that you're not the only one seeking a weekend escape from the city. You plan to visit her cabin later today or tomorrow to say hello, but for now, you grab your travel bag from the car and head to the dock, your footsteps slow and deliberate.\n\nAs you approach the water's edge, you pause for a moment, taking in the view.\n\n*fake_choice\n #This is home.\n #Exactly where I want to be.\n #It's so calm and relaxing.\n\nQuietness and peacefulness are all you can feel as the serenity of the lake stretches out for miles around. You smile, thinking about how this cabin by the lake has always provided you with a sense of safety.\n\nFor many years, this place has been your refuge from the chaos of life. However, today, you are not seeking solace; instead, you have come to confront a daunting task.\n\nIt has only been a week since your uncle passed, and he was the only living relative you had.\n\nTanner…\n\n[i]Choose your last name:[/i]\n\n*fake_choice\n #Pollack.\n  *set surnamemc \"Pollack\"\n #Crowley.\n  *set surnamemc \"Crowley\"\n #Campton.\n  *set surnamemc \"Campton\"\n #Pepignan.\n  *set surnamemc \"Pepignan\"\n #Cruz.\n  *set surnamemc \"Cruz\"\n #Al Saud.\n  *set surnamemc \"Al Saud\"\n #Hart.\n  *set surnamemc \"Hart\"\n #Enter your own.\n  *gosub new02\n\n\nTanner $!{surnamemc} had no children of his own. In many ways, you became his surrogate child. Some people speculate that he took you in out of love for his little sister—your mother.\n\nYou've always been unsure about the truth of this, because the Tanner you knew never seemed to have an ounce of affection in his heart. Perhaps, in a strange twist of fate, you were fortunate that his wealth ensured you never lacked anything in life.\n\nYou went to the best schools, had the best nannies, and experienced the best things money could buy. But none of that made up for losing the love of your parents and not having someone who genuinely cared for you.\n\nPerhaps your relationship with Tanner would have been different if…\n\n*fake_choice\n #He wasn't such a strict man.\n  Tanner would always demand and command that you follow his rules, going so far as even putting them in writing. What an asshole. In retrospect, so many things could have been different if he wasn't so strict, but it's too late now, and you'll never get a chance to know anoth
