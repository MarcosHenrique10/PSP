t to do.  What can you do, really? You can't begin to imagine how to get everyone out of this room alive.  Paralyzed with fear, you do the one thing you feel you can: you pray for guidance, protection, peace, and for an impossible rescue that never arrives.\n\n\t\t*goto ManyFunerals \n\t#I try to bail out the window.\n\t\t*goto Bailout2\n\t#I try to get ${NPname} out the window.\n\t\tThere's no time for discussion. You break the window with whatever tool you have available, and grab ${NPfname}'s arm. \"You have to bail-out.  Do it now!\" you yell, urgently.\n\n\t\t\"What about you?\" ${NPpronoun1} asks.\n\n\t\t\"I'll be right behind you,\" you promise.  Those famous last words.  \n\n\t\t\"Go!  Go!\" you urge, pulling the hook from ${NPpronoun2}'s bail-out kit yourself and jamming it in the window frame to save time.  \"Just like in training,\" you point out, reassuringly.  And then: \"I love you\" as ${NPpronoun1} goes over the window ledge to safety.\n\n\t\t*page_break\n\n\t\tAnd you do intend to follow behind ${NPpronoun3}.  You really do.  In fact, you have the hook out of your own kit and are just about ready to go, but then there is fire everywhere, burning and searing.  And the floor gives out from beneath you.  And there is nothing you can do.\n\t\t*goto HeroDeath\n\n\n\n*label HeroDeath \n\nThat house fire will go down in $!{town_name} history as being one of the worst of such tragedies to strike the small community. A 16-year old boy died in that incident, and his grandfather passed away a few days later from complications due to smoke inhalation.  \n\nOn top of that, the town lost two firefighters that day: Firefighter Juan Velez and you.\n\n*page_break\n\nYou don't know it, of course, but you have a very grand funeral.  Firefighter tradition requires honoring their own, and you sacrificed your life to save that of a fellow firefighter.  You are regarded as nothing short of a hero. In fact, fire departments towns as far as several hours away send representatives to take part in your funeral procession.  \n\nThe whole of $!{town_name} is in mourning for several days, with flags flown at half mast. The mayor herself as well as many other local politicians attend your funerals, and the story is broadcast several times on the evening news. \n\n${NPfname}, of course, is heartbroken.  $!{NPpronoun1} wears the card from your funeral in ${NPpronoun2} fire helmet from that day forth and visits your grave every year thereafter on the anniversary of your death. \n\n*page_break\n\n*if motivation=\"tradition\"\n\tYou come from family of firefighters.  They understand the risks, but that doesn't make it any easier to lose a loved one, especially one so young.  Your mother has a particularly difficult time of it, but she channels her grief into tasks like fire prevention education and setting up a memorial fund in your honor.\n\n\t*goto YourDeathConclusion\n\n*elseif motivation=\"grudging\"\n\tYou didn't really want to be a firefighter, but, in the end, you did the best that you could.  Your family's expectations and even those of some of the people in the fire department were a heavy burden to bear, but you made them proud, and you will be remembered with pride.  \n\n\t*goto YourDeathConclusion\n\n*elseif motivation=\"service\"\n\tYou wanted very much to live the sort of life in which you could contribute to your community and help the people around you, and, in the end, you accomplished this on a higher level than you could have imagined.  Your death may be tragic, but you will be remembered and honored for a long time to come.\n\n\t*goto YourDeathConclusion\n\n*elseif motivation=\"hero\"\n\tYou wanted so much to be a hero, and you certainly got your wish.  News coverage of the fire and your death goes on for days, and you have your picture in several different papers. People leave flowers and candles with your family.  You will be remembered and honored for a long time to come.  It's rather too bad you won't be able to enjoy it.\n\n\t*goto YourDeathConclusion\n\n\n\n*label ManyFunerals\n*page_break\n\nThat house fire will go down in $!{town_name} history as being one of the worst of such tragedies to strike the small community. A 16-year old boy died in that incident, and his grandfather passed away a few days later from complications due to smoke inhalation.  \n\nOn top of that, the town lost three firefighters that day: Firefighter Juan Velez, Probationary Firefighter ${NPfname} ${NPname}, and you.\n\n*page_break\n\nYou don't know it, of course, but you all have a very grand funerals.  Firefighter tradition requires honoring their own.  In fact, firefighters come from towns as far as several hours away to take part in the funeral processions and pay homage to their fallen comrades.  \n\nThe whole of $!{town_name} is in mourning for several days, with flags flown at half mast. The mayor herself as well as many other local politicians attend the funerals of the victims and firefighters alike.  \n\n*goto Graveside\n\n\n*label Bailout2\n\nYou have an emergency bail-out system and the training to use it. When the flashover begins, your instinct to survive overtakes everything else. With your heart hammering in your chest, you open your bail-out kit pouch, grab the hook, slam it into the window sill, release the descender and fling yourself over the sill.\n\nThe self-breaking descender catches to control your descent. You can feel your harness digging into your thighs as you slowly lower yourself down to the ground. Your bunker gear is so hot that smoke is coming off your back. Fire shoots through the window above you, consuming the room entirely as you land in a heap on the ground, in shock.\n\nSoon, you are surrounded by voices and gentle hands. Then somehow you are on a stretcher and in an ambulance, blinking and confused. Then you sleep.\n\n*goto Hospital2\n\n*label Hospital2\n*set hospitalized true\n\nYou wake up sometime later in the hospital.  Your mother is there.  Chief Gordon is also there. \n\nEverything is fuzzy.  They must have given you pain medication. \n\nYour mother sees you open your eyes.  She breathes a sigh of relief, and comes over to kiss your brow. \"Thank goodness you're awake, ${Fname}. I was so worried.\"\n\n\"What's going on?\" you ask, blearily. \"What happened? ${NPfname}?\" You can feel your heart skip a beat as you ask the question of the Chief, and you can see it on the monitor too. \n\nThe Chief is gentle but blunt. \"$!{NPpronoun1} didn't make it.\"\n\n\"Oh, God,\" you say and close your eyes tightly.  \n\n*page_break\n\nThat house fire will go down in $!{town_name} history as being one of the worst of such tragedies to strike the small community. A 16-year old boy died in that incident, and his grandfather passed away a few days later from complications due to smoke inhalation.  \n\nAdditionally, both Firefighter Juan Velez and Probationary Firefighter ${NPfname} ${NPname} lost their lives that day in the line of duty. \n\n*page_break\n\nIn the firefighter tradition, they are both given very grand funerals to honor their lives and the sacrifice of their deaths. You insist on being part of Firefighter Velez's honor guard, standing at attention by the coffin of the man who had been a mentor to you since your first days as a probie.  You ride in one of the fire trucks in the funeral procession and stand solemnly at the graveside while Chief Gordon soberly speaks of Firefighter Velez's decades of service as a volunteer firefighter.\n\nAt ${NPfname}'s funeral, you can only stand there, heartbroken and numb.  Your fellow firefighters stand with you, silently lending strength through their shared grief, but nobody will every be able to take away the guilt. The day passes in a blur, and, afterwards, you feel more exhausted than you did the day of the fire.\n\n*finish\n\n\n\n*label ProbieMayday\n*set velez_rescue true\n\n\"I can't breath!\" ${NPfname} calls.  Clearly, ${NPpronoun1} is on the verge of a full-blown panic attack. \"I can't --\"  \n\n*if relationship_firefighters > 60\n\tYou've heard stories about firefighters who have panicked in fires.  They start to hyperventilate.  They think they can't breathe so some of them try to take off their masks.  Trying to breathe in the hot, acrid smoke is not only a direct path to suffocation but can result in some serious internal burns and other damage.\n\nWhat do you do?\n*fake_choice\n\t#I stay with Velez and continue to talk to ${NPfname} calmly.\n\t\t\"You can breath,\" you tell ${NPpronoun3}.  \"You have a bottle full of air.  Just take slow breaths.  And, whatever you do, don't take off your mask.  You're gonna be just fine.  Just keep your mask on and breathe.\"\n\t#I try to reach ${NPpronoun3}.\n\t\t\"Just stay calm!\" you tell ${NPpronoun3}, and you continue following a right-hand lead in ${NPpronoun2} direction.  \"I'm coming to get you.\"\n\t#I break the window so the RIT can get inside more easily and help.\n\t\tYou pick up a halligan and are about to break the window.\n\nBut, before you can do anything else, the Chief's voice comes over the radio again.  \"Chief to Mayday.\"\n\n\"${Lname} here,\" you reply. \n\n\"Move away from the window, if you can. They're going to break the glass with the ladder. Be prepared to leave.\"\n\n\"Roger that, Chief.\"  And then you call to ${NPfname}, \"Did you hear that? They're coming to get us.  Just a couple more moments...\"\n\n*page_break\n\nThe next few minutes are a blur.  Glass breaks.  Air rushes into the room.  A familiar face shows up at the top of the ladder and jumps into the room with you, followed by a second firefighter.  They find another victim in the room, one you completely missed.  They get Velez down the ladder.  They help guide the probie out.  Then you're next, down the ladder, until your boots touch grass.\n\n*page_break\n\nThe two RIT members follow right behind you just as a rush of flame shoots out from the second story window where you just were, consuming the room and right up into the roof. Paramedics surround Firefighter Velez and the victim who is the teenage boy, and transport them to the hospital in ambulances, with lights and sirens wailing.  You and Probie ${NPname} are checked out too, and both of you are fine.  \n\n*page_break\n\nYou watch the rest of the operations from the rehab area, drinking water while the other firefighters \"surround and drown\" the house, fighting the fire from the outside only. It is too hot now, and the structure is too unstable for anyone to go inside.\n\n*goto VelezDeath5\n\n\n\n*label ProbieHospital\n\nYou're just fine.  Other than a few slight burns and a bruise or two, you're given a clean bill of health from the ER doctor.  As soon as you are allowed, you rush to ${NPfname}'s side, where ${NPpronoun1} lies in a bed in another section of the emergency room. \n\n*page_break\n\nYour heart skips a beat to see ${NPpronoun3} sitting up.  $!{NPpronoun1} looks somewhat dazed, but ${NPpronoun1} is smiling.\n\n\"${NPfname}!\" you call.  \"Are you okay?\"\n\n\"Seems like it,\" ${NPpronoun1} replies, looking a little sheepish.  \"Just this,\" ${NPpronoun1} holds up ${NPpronoun3} arm in a cast, \"Broke my wrist and got a little burned.  That's all.  I can go home as soon as the doctor clears me. \" \n\nRelieved beyond measure, you give ${NPpronoun3} a gentle hug.\n\n*page_break\n\n*goto VelezDeath5\n\n*label SearchVelez\n\nBy the time you get into to the room, conditions have deteriorated even further.  Even from the sill, you can see orange licks of flame where the wall between two of the bedrooms has started to burn.\n\n\"VELEZ!\" you yell loudly, hoping for an immediate response. But you hear nothing.\n\nWhat do you do?\n*choice\n\n\t#I drop from the sill the room and get down as low as I can to stay below the heat and smoke.\n\t\tIdeally, you should always test the floor of a burning building to see if it can still hold your weight.  But you don't have a halligan or a hook nor do you have the time to be excessively cautious.  \n\n\t\tFortunately, the floor seems stable enough.  You get down as low as possible below the worst of the heat and smoke.\n\n\t\tSwiftly, like in your training, you perform a quick search of the room, passing your thick-gloved hand over all the surfaces in the room, including the bed, under the bed, a chair, a desk, a closet -- anywhere a victim might be found.  \n\n\t\tSomewhere in the distance and certainly not in this room, you can hear Velez's PASS (Personal Alert Safety System) start out a high-pitched alarm to indicate the firefighter is in distress.  Either Velez activated the alarm manually or he's been immobile for 15 seconds, and it's not a good sign. \n\n\t\t*page_break \n\t\t*goto FlashoverAlone  \n\n\t*selectable_if (sequipment = \"irons\") #I carefully test the floor before entering the room to make sure it is stable.\n\t\tLike Velez had done before you, you use your halligan to test the solidity of the floor beneath the window to make sure it will be able to hold your weight.  It seems solid enough so you climb through and quickly get as low as possible beneath the thick smoke. In conditions like this, you might as well be blind. \n\n\t\tSwiftly, like in your training, you perform a quick search of the room, passing your thick-gloved hand over all the surfaces in the room, including the bed, under the bed, a chair, a desk, a closet -- anywhere a victim might be found.  Somewhere in the distance and certainly not in this room, you can hear Velez's PASS (Personal Alert Safety System) start out a high-pitched alarm to indicate the firefighter is in distress.  Either Velez activated the alarm manually or he's been immobile for 15 seconds, and it's not a good sign. \n\t\t*goto FlashoverAlone  \n\n\t#This is beyond what I can handle alone. I holler for Captain Simmons.\n\t\tWhen Velez doesn't reply, you start to get very concerned. \n\t\t*goto VelezRIT\n\n\n*label FlashoverAlone\n\nConditions in this room are pretty bad at this point, and you don't even know where Velez went or how to begin to find him. Overall, the situation is looking pretty grim.\n\n*if (flashovertraining) or (fire_knowledge > 65) \n\tWith a sudden feeling of dread, you glimpse fingers of flame curling near the ceiling and realize that the room is about to flashover.  What do you do?\n\t*choice\n\t\t#I press myself as low to the floor as possible and shield my face.\n\t\t\tFor whatever reason, you remain in place. You have the instinct to protect yourself as much as possible, but your PPE can only protect you for a few seconds in the conditions that follow.  Once the gases in the room ignite around you, you are lost in the conflagration. The heat is enormous.  Then there is too much pain.  Then there is darkness.\n\t\t\t*goto ManyDeaths\n\t\t*selectable_if (sequipment = \"watercan\") #I use the water can to spray water at the ceiling and try to cool things down.\n\t\t\tYou have a water can.  You may as well use it. \n\n\t\t\tYou start spraying water up at the ceiling, trying to cool down the ambient temperature to buy at least a few precious moments.  \n\n\t\t\tYou head for the ladder yourself as the last of your water runs out and remember your training regarding ladder bailout. You go head first out onto the ladder until you can pivot around and slide down the rest of the ladder in seconds. \n\n\t\t\tJust as your feet touch the ground, orange flame bursts out of window above your head and the whole second floor of the house is a raging conflagration.  At some officer's command, the fire trucks begin sounding the evacuation tones. You collapse to your knees in exhaustion.\n\t\t\t*set delay_water_can true\n\t\t\t*goto VelezDeath1\n\n\n\n\t\t#I try to get the hell out of there.\n\t\t\tWhen an enclosed space is about to flashover, you only have a few seconds to get to safety. You dash back toward the ladder and start climbing over the window sill.\n\n\t\t\tOne of the Chief's see the situation. You hear his voice boom loud and clear over all others, \"Grab ${Lname}! Get ${pronoun3} out of there!\" just before a searing blast hits your back.  A strong hand grabs one of your straps and helps pull you onto the ladder. \n\n\t\t\tWith smoke coming of your bunker gear, you slide down the ladder head-first. The others are jumping out of your way as you land in an unceremonious pile on the ground.  You hear a lot of shouting going on and then the world goes black.\n\t\t\t*set saved_by_RIT true\n\t\t\t*goto ExplanationPart1\n*else\n\tA few seconds later you notice tendrils of orange flame licking across the top of the room. It is mesmerizing, really. And  exceedingly beautiful.  You wonder why the fire is behaving in this manner and observe this strange beauty for the moment you have before the entire room ignites in a flashover.\n\n\tYou have a split second to act. What do you do?\n\t*choice\n\t\t#I lay on my stomach and try to protect my head.\n\t\t\tIn the moment when the room exploded into flame, you panicked. Instinct told you to shelter in place, as your last, best hope, but your bunker gear just isn't designed for that kind of heat.   Once the gases in the room ignite around you, you are lost in the conflagration. The heat is enormous. Then there is too much pain.  Then there is darkness.\n\t\t\t*goto ManyDeaths\n\n\t\t#I fling myself toward the window to try to escape.\n\t\t\tOnce you belatedly recognize the flashover, you know you have only a split second get out of the room or you will die.  The heat is searing as you throw yourself toward the window and scramble over the sill.  Your bunker gear is smoking as you tumble down the ladder and land in an unceremonious heap on the ground.  There is pain. And then there is darkness.\n\t\t\t*set nearly_died true\n\t\t\t*goto ExplanationPart1\n\n\t\t*selectable_if (sequipment = \"watercan\") #I use the water can to spray water at the ceiling and try to cool things down.\n\n\t\t\tYou have a water can.  You may as well use it.  In an act of desperation, you direct a strong spray of water up at the ceiling and try to cool down the ambient temperature to buy at least a few precious moments.  \n\n\t\t\tYou really only buy everyone a couple seconds, two or maybe three. But, in these circumstances, that can be enough to save a life. The heat is terrible, searing and bright. You go head first out onto the ladder with your bunker gear smoking and tumble down to land in an unceremonious heap on the ground.  \n\n\t\t\tIn the same moment, orange flame bursts out of window above your head and the whole second floor of the house is a raging conflagration.  At some officer's command, the fire trucks begin sounding the evacuation tones. You collapse to your knees in exhaustion.\n\t\t\t\n\t\t\t*goto ExplanationPart1\n\t\n\t\n\n\n*label VelezRIT\n\n\"Captain Simmons!\" you yell, waving your hand to try to get her attention.  Probie ${NPname} can't help but notice your effort and joins in the yelling and waving.  \n\nOf course, Captain Simmons sees all the commotion and comes running over.  \"What's going on?\" she asks.\n\n*page_break\n\n\"I can't find Velez,\" you explain.  \"He went in by himself, and I lost contact with him. Can you raise him on the radio?\" \n\nShe immediately tries.  \"Simmons to Velez. What's your status?\" \n\nNo reply.\n\n*page_break\n\nShe repeats the message. \"Simmons to Velez. What's your status?\"\n\nStill no reply.\n\n*page_break\n\nMore firetrucks are arriving now and the scene is swarming with firefighters.  Captain Simmons activates her radio again. \"This is Captain Simmons. We have a possible firefighter down.  Repeat: We have a possible firefighter down.  Second story, exposure 1.  Assemble the RIT. ${Lname} will lead you in.\"  \n\nSuddenly, you're at the head of a Rapid Intervention Team.  Three other firefighters are swiftly up the ladder after you.  So you slide off the sill and get as low as you possibly can in the smoke-filled room.  Somewhere in the distance, not in this room, you can hear Velez's PASS (Personal Alert Safety System) toning out a high-pitched alarm to indicate the firefighter is in distress. Either Velez activated the alarm manually or he's been immobile for 15 seconds, and it's not a good sign. \n\n*page_break\n\nYou notice that the wall between this bedroom and the next is burning at this point. It's hot in here, considerably hotter than it was even a few moments before. \n\n\n\n*if (flashovertraining) or (fire_knowledge > 65) \n\tWith a sudden feeling of dread, you glimpse fingers of flame curling near the ceiling and realize that the room is about to flashover.  What do you do?\n\t*choice\n\t\t#I press myself as low to the floor as possible and shield my face.\n\t\t\tFor whatever reason, you remain in place. You have the instinct to protect yourself as much as possible, but your PPE can only protect you for a few seconds in the conditions that follow.  Once the gases in the room ignite around you, you are lost in the conflagration. In a swirl of red, you catch a glimpse of the RIT members bailing out the window.  The heat is enormous.  Then there is too much pain.  Then there is darkness.\n\t\t\t*goto ManyDeaths\n\t\t*selectable_if (sequipment = \"watercan\") #I use the water can to spray water at the ceiling and try to cool things down.\n\t\t\tYou have a water can.  You may as well use it. \n\n\t\t\tYou start spraying water up at the ceiling, trying to cool down the ambient temperature to buy at least a few precious moments.  \"ROOM'S ABOUT TO FLASH!\" you yell at the top of your lung to the next firefighter to climb up onto the window sill. \"GO! GO! GO!\" You can't even tell who the firefighter is, but they don't ask any questions. They repeat your message loudly and disappear back down the ladder.\n\n\t\t\tYou head for the ladder yourself as the last of your water runs out and remember your training regarding ladder bailout. You go head first out onto the ladder until you can pivot around and slide down the rest of the ladder in seconds. \n\n\t\t\tJust as your feet touch the ground, orange flame bursts out of window above your head and the whole second floor of the house is a raging conflagration.  At some officer's command, the fire trucks begin sounding the evacuation tones. You collapse to your knees in exhaustion.\n\t\t\t*goto VelezDeath1\n\n\n\t\t#I yell to the firefighters climbing into the room in the hope that they will get out in time.\n\t\t\t\"GO BACK!\" you yell at the top of your lung to the next firefighter to climb up onto the window sill. \"FLASHOVER! GO! GO!\" You can't even tell who the firefighter is, but they don't ask any questions. They repeat your message loudly and disappear back down the ladder.\n\n\t\t\tYou make a dive for the ladder as well, just as the super-heated gases in the room start to ignite all at once. With a fireball at your back, searing in its heat, you fling yourself over the sill and slide down the ladder head first until you land in an unceremonious pile on the ground.  You hear a lot of shouting going on and then the world goes black.\n\t\t\t*set saved_RIT true\n\t\t\t*set leadership %+10\n\t\t\t*goto ExplanationPart1\n\n\t\t#I try to get the hell out of there.\n\t\t\tWhen an enclosed space is about to flashover, you only have a few seconds to get to safety. You dash back toward the ladder only to find yourself face-to-face with the next member of the RIT. \"ROOM'S ABOUT TO FLASH!\" you yell. The other firefighter seems momentarily confused. \"GO BACK DOWN!\" you tell them, even as you try to get one foot on the ladder yourself. There is no time. \n\n\t\t\tFinally, the other person gets the hint and yells down to the others. \"COMING DOWN!\" \n\n\t\t\tOne of the Chief's see the situation. You hear his voice boom loud and clear over all others, \"Grab ${Lname}! Get ${pronoun3} out of there!\" just before a searing blast hits your back.  A strong hand grabs one of your straps and helps pull you onto the ladder. \n\n\t\t\tWith smoke coming of your bunker gear, you slide down the ladder head-first. The others are jumping out of your way as you land in an unceremonious pile on the ground.  You hear a lot of shouting going on and then the world goes black.\n\t\t\t*set saved_by_RIT true\n\t\t\t*goto ExplanationPart1\n\n*else\n\nA few seconds later you notice tendrils of orange flame licking across the top of the room. It is mesmerizing, really. And exceedingly beautiful.  You observe the strange beauty of the fire in the moment you have before the entire room ignites in a flashover.\n\nWhat do you do?\n*choice\n\t#I lay on my stomach and try to protect my head.\n\t\tIn the moment when the room exploded into flame, you panicked. For some reason, instinct told you to shelter in place, as your last, best hope, but your bunker gear just isn't designed for that kind of heat.   Once the gases in the room ignite around you, you are lost in the conflagration. In a swirl of red, you catch a glimpse of the RIT members bailing out the window.  The heat is enormous. Then there is too much pain.  Then there is darkness.\n\t\t*goto ManyDeaths\n\n\t#I fling myself toward the window to try to escape.\n\t\tOnce you belatedly recognize the flashover, you know you have only a split second get out of the room or you will die.  The heat is searing as you throw yourself toward the window and scramble over the sill.  Your bunker gear is smoking as you tumble down the ladder and land in an unceremonious heap on the ground.  There is pain. And then there is darkness.\n\t\t*set nearly_died true\n\t\t*goto ExplanationPart1\n\n\t*selectable_if (sequipment = \"watercan\") #I use the water can to spray water at the ceiling and try to cool things down.\n\n\t\tYou have a water can.  You may as well use it.  In an act of desperation, you direct a strong spray of water up at the ceiling and try to cool down the ambient temperature to buy at least a few precious moments.  \"ROOM'S GONNA FLASH!\" you yell at the top of your lungs as another firefighter climbs over the window sill. \"GO! GO! GO!\" You can't even tell who the firefighter is, but they don't ask any questions. They repeat your message loudly and disappear back down the ladder.\n\n\t\tYou really only buy everyone a couple seconds, two or maybe three. But, in these circumstances, that can be enough to save a life. Once the last of the RIT people have dropped out of your sight, you head for the ladder yourself.  The heat is terrible, searing and bright. You go head first out onto the ladder with your bunker gear smoking and tumble down to land in an unceremonious heap on the ground.  In the same moment, orange flame bursts out of window above your head and the whole second floor of the house is a raging conflagration.  At some officer's command, the fire trucks begin sounding the evacuation tones. You collapse to your knees in exhaustion.\n\t\t*set delay_water_can true\n\t\t*goto ExplanationPart1\n\t\n*label VelezDeath1\n\nThat house fire was a terrible event, started by, of all things a halogen desk lamp left on next to some curtains.  While the elderly man was rescued by the second search team, he passed away a few days later at the hospital from complications due to smoke inhalation.  The teenage boy was pronounced dead at the scene.  And Firefighter Velez was found to have had a heart attack in the room across the hall from where he had begun the search.  \n\nThere was no way you could have gotten to him in time. You and the others certainly tried.\n\n\n*set teenager_dead true\n*goto VelezFuneral\n\n*label VelezDeath2 \n\nThat house fire was a terrible event, started by, of all things a halogen desk lamp left on next to some curtains.  While the elderly man was rescued by the second search team, he passed away a few days later at the hospital from complications due to smoke inhalation  The teenage boy was pronounced dead at the scene.  And the coroner determined that Firefighter Velez died of a heart attack well before the fire got him. \n\n*page_break\n\nNo one blames you for not being able to save either of them.  Everyone knows you tried. But your own heart hurts with the tragedy of it all, the helplessness, and the loss.\n\n\n*set teenager_dead true\n\n\n*goto VelezFuneral\n\n*label VelezDeath3\n\nThat house fire was a terrible event, started by, of all things a halogen desk lamp left on next to some curtains. While the elderly man was rescued by the second search team, he passed away a few days later at the hospital from complications due to smoke inhalation.  The body of the teenage boy had to be retrieved from the rubble after the fire was put out.  And, despite all your efforts to rescue Firefighter Velez, you are devastated to learn that he had died from cardiac arrest well before you got to him, before you risked so much to save him and left the teenage boy behind.  \n\n*page_break\n\nNobody blames you. You made the best decisions you could.  But your own heart aches with the tragedy of it all, the helplessness, and the loss.\n\n\n*set teenager_dead true\n\n\n*goto VelezFuneral\n\n*label VelezDeath4 \n\nThat house fire was a terrible event, started by, of all things a halogen desk lamp left on next to some curtains.  While the elderly man was rescued by the second search team, he passed away a few days later at the hospital from complications due to smoke inhalation.  The teenage boy was pronounced dead at the scene.  And you are devastated to learn that Firefighter Velez had died from cardiac arrest even before you got to him, even before you had to make the terrible choice to leave him behind.  \n\n*page_break\n\nNobody blames you. You made the best decisions you could.  But your own heart aches with the tragedy of it all, the helplessness, and the loss.\n\n\n*set teenager_dead true\n\n*goto VelezFuneral\n\n*label VelezDeath5 \n\nThat house fire was a terrible event, started by, of all things a halogen desk lamp left on next to some curtains.  While the elderly man was rescued by the second search team, he passed away a few days later at the hospital from complications due to smoke inhalation.  The teenage boy was pronounced dead at the scene.  And you are devastated to learn that Firefighter Velez had died from cardiac arrest even before you got to him.  \n\nBut, thanks to your efforts and that of the well-trained Rapid Intervention Team, [i]you[/i] got out alive.  And so did Probie ${NPname}, who is deeply grateful.\n\nStill, it is little consolation when you have a funeral to attend.\n\n\n*set teenager_dead true\n\n*goto VelezFuneral\n\n*label ManyDeaths\n\n*page_break\n\nThat house fire was thereafter considered one of the greatest tragedies in the recent history of $!{town_name}, started by, of all things a halogen desk lamp left on next to some curtains. Two victims died that day, an elderly man and his grandson, a teenage boy.  And two firefighters lost their lives: Velez, who was later found to have died of a heart attack and you, of course, who died in the flashover.\n\n*goto YourFuneral\n\n*label YourFuneral\n\nYou don't know it, of course, but you have a very grand funeral, even though you were a fairly new firefighter.  Firefighter tradition requires honoring one of their own. During the viewing, the fire department's chaplain gives a short service and your fellow firefighters form an honor guard.  Afterwards, your coffin is transported to the cemetery atop an antique firetruck and followed by a small procession of firetrucks and then mourners.\n\n*page_break\n\n*if SO and ProbieSO\n\t${SOname} is heart-broken and weighed down with terrible guilt. $!{SOpronoun1} was there, right there, at the bottom of the ladder.  $!{SOpronoun1} should have been able to save you or warn you or do something that would have meant you would still be here today. $!{SOpronoun1} is inconsolable, and nothing anybody says seems to make a difference. $!{SOname} ends up resigning from the fire service and eventually even moving to a different town for a fresh start.\n\t*page_break\n\t*goto Graveside \n*elseif SO\n\t${SOname} is heart-broken by your death. $!{SOpronoun1} stands pale-face and terribly sad throughout your funeral. $!{SOpronoun1} cannot speak, and nobody forces ${SOpronoun3} to do so.  It's a difficult time for all. \n\t*goto Graveside\n*else\n\t*goto Graveside\n\n*label Graveside\n\n*if motivation=\"tradition\"\n\tYour mother, an ex-chief of the $!{town_name} Fire Department, speaks at your graveside, her face pale and somber. Afterwards, she sets up a fund in your honor to help volunteer fire departments purchase life-saving equipment. It seems a fitting memorial.\n\t*goto YourDeathConclusion\n\n*elseif motivation=\"grudging\"\n\tYour mother, a retired firefighter, speaks at your graveside, her face pale and somber. Afterwards, she sets up a fund in your honor to help volunteer fire departments purchase life-saving equipment. It seems a fitting memorial.\n\t*goto YourDeathConclusion\n\n*elseif motivation=\"service\"\n\n\tAll you wanted to do was serve your community and be a good citizen, and that's what Chief Gordon says as he speaks soberly at your graveside. Afterwards, some of the department members set up a memorial fund to help volunteer fire departments purchase life-saving equipment. It seems a fitting memorial.\n\t*goto YourDeathConclusion\n\n*elseif motivation=\"hero\"\n\tYou always wanted to be famous, and, in a way, you achieved that with your death. Your story was on the evening news and in the local papers, along with your obituary. Several people wrote online articles about your death and how it possibly could have been avoided. \n\n\tAlso, some of the department members got together to set up a fund in the memory of you and Juan Velez to help volunteer fire departments purchase life-saving equipment. It seems a fitting memorial.\n\n\t*goto YourDeathConclusion\n\n*label YourDeathConclusion\n\n*page_break\n\nSo that was your short but eventful career as a firefighter.\n*goto_scene 13awardparty ending\n\n*label VelezFuneral\n*page_break\n\nIn the tradition of firefighters, Juan Velez has a very grand funeral to honor his life and the sacrifice that was his death in the line of duty.  You attend, of course, with the rest of your fire department, dressed in your formal Class-A uniform with white gloves and a mourning band over your badge.\n\nHow are you feeling that day?\n\n*choice\n\t#Like I just wanted to dissappear into the crowd.\n\t\tYou know it's important for you to be there, to pay hommage to the life and death of your fellow firefighter, but you are so numb with sorrow that it is difficult for you to really look at anyone else much less talk or interact.  You miss Velez terribly.  He had been a mentor to you since your first days as a probie. It's hard to believe that he's gone.\n\n\t\t*page_break\n\n\t\tYou watch from afar as an honor guard of firefighters stand at attention by Velez's coffin at the memorial service.  You say nothing and just stare out the window as you ride one of the fire trucks in the funeral procession.  At the cemetery, you stand solemnly at the graveside while Chief Gordon soberly speaks of Firefighter Velez's decades of service as a volunteer firefighter.\n\n\t\t*page_break\n\n\t\tThe Velez family forms a large, sorrowful crowd, gathered to mourn a man who was their father, son, brother, husband, uncle, nephew, and friend.  Martina, Velez's wife, is pale-faced and very quiet, supported by her teenage son, Eduardo, and holding the hands of two younger daughters, Mariana and Sofia.\n\n\t\tYou feel more exhausted after the funeral than you did the day of the fire.\n\t\t*finish\n\n\t#Like I wanted to participate in every way I could to honor Velez.\n\t\tYou insist on being part of the honor guard during the memorial service, standing at attention by the coffin of the man who had been a mentor to you since your first days as a probie.  You ride one of the fire trucks in the funeral procession and stand solemnly at the graveside while Chief Gordon soberly speaks of Firefighter Velez's decades of service as a volunteer firefighter.\n\n\t\t*page_break\n\n\t\tThe Velez family forms a large, sorrowful crowd, gathered to mourn a man who was their father, son, brother, husband, uncle, nephew, and friend.  Martina, Velez's wife, is pale-faced and very quiet, supported by her teenage son, Eduardo, and holding the hands of two younger daughters, Mariana and Sofia.  You talk to his wife, briefly, and hold her hands in yours while you tell her what an honor it was to have known Velez and how sorry you felt that you couldn't have done more. \n\n\t\t*page_break\n\n\t\t\"Velez spoke fondly of you, you know,\" Martina tells you with a sad smile. Her eyes are bloodshot from crying. \"You did all you could, ${Fname}. Know that we don't blame you for what happened. Please don't blame yourself.\"\n\n\t\tYou feel more exhausted after the funeral than you did the day of the fire.\n\t\t*finish\n\n\n*label ExplanationPart1\n\n\n*set teenager_dead true\n\n*set hospitalized true\n\nYou wake up sometime later in the hospital.  Your head is pounding and you feel like you were run over by a truck, then eaten by a bear, then thrown up by the bear and run over by the truck all over again.  At first everything is blurry, but then people's faces start coming into focus.\n\n*if ProbieSO\n\t\"${Fname}!\" ${SOname} cries, with tears in ${SOpronoun2} eyes as ${SOpronoun1} reaches to gently take your hand. \"You're awake. We were so worried.\" Your mother is there as well, and you can see the lines of concern etched in her face. \n\n\tWhat do you say to them?\n\t*choice\n\t\t#What happened? Why am I here?\n\t\t\t\"What -- what's going on?  Why am I here?\" you ask in a raspy voice. \n\n\t\t\tYour mother pours a glass of water and tilts it to your lips, and that helps a lot.\t\"There was a bad fire, dear. Do you remember it?\" she asks gently.  ${SOname} looks like ${SOpronoun1}'s going to cry.\n\n\t\t\tSuddenly, the memories return like a ton of rocks. \"Oh,\" you state numbly. \"Yeah. What happened?\" you ask ${SOname} because ${SOpronoun1} was there.\n\n\t\t\t*goto ProbieSOExplains\t\t\t\n\n\t\t#I need a stiff drink.\n\t\t\t\"Whiskey, please,\" you whisper, hoarsely.  Your mother pours a glass of water and tilts it to your lips. You suppose it's better than nothing.  Everyone looks so serious.  \"What happened?\" you dare to ask.\n\n\t\t\t\"There was a bad fire,\" your mother says, gently. \"Do you remember it?\"\n\n\t\t\tSuddenly, the memories return like a ton of rocks. \"Oh,\" you state numbly.  \"Yeah.\" Then you look to ${SOname} for more information because ${SOpronoun1} was there.\n\n\t\t\t*goto ProbieSOExplains\t\n\n\t\t#Who am I? Who are you? Just kidding!\n\t\t\t\"Who are you people?\" you choke out dramatically. \"Who am I?\" Instead of laughing, your mother and ${SOname} look instantly alarmed. \n\n\t\t\tYou'd better not torture them so you say, \"Hey, guys. Lighten up!  I'm just kidding around. Why all the long faces?\"\n\n\t\t\t\"There was a bad fire,\" your mother says, gently. \"Do you remember it?\"\n\n\t\t\tSuddenly, the memories return like a ton of rocks. \"Oh,\" you state numbly.  \"Yeah.  Sorry.\" Then you look to ${SOname} for more information because ${SOpronoun1} was there.\n\n\t\t\t*goto ProbieSOExplains\t\n\n*elseif SO\n\n\t\"${Fname}!\" ${SOname} cries, with tears in ${SOpronoun2} eyes as ${SOpronoun1} reaches to gently take your hand. \"You're awake. We were so worried.\" Your mother is there as well, and you can see the lines of concern etched in her face. The 2nd Assistant Chief, Bob Kalinowski, is there as well.\n\n\t*goto AskChiefforExplanation\n\n\n\n*else\n\n\tYour mother is at your bedside.  Seeing you stir, she takes your hand gently. \"You're awake. We were so worried.\" You can see the lines of concern etched in her face. The 2nd Assistant Chief, Bob Kalinowski, is there as well.\n\n\t*goto AskChiefforExplanation\n\n\t\n*label AskChiefforExplanation\n\nWhat do you say to them?\n\n*choice\n\t#What happened? Why am I here?\n\n\t\t\"What -- what's going on?  Why am I here?\" you ask in a raspy voice. \n\n\t\tYour mother pours a glass of water and tilts it to your lips, and that helps a lot.\t\"There was a bad fire, dear. Do you remember it?\" she asks gently.  ${SOname} looks like ${SOpronoun1} might to cry.\n\n\t\tSuddenly, the memories return like a ton of rocks. \"Oh,\" you state numbly. \"Yeah. What happened?\" you ask Chief Kalinowski because he was there.\n\n\t\t*goto KalinowskiExplains\n\n\t#I need a stiff drink.\n\n\t\t\"Whiskey, please,\" you whisper, hoarsely.  Your mother pours a glass of water and tilts it to your lips. You suppose it's better than nothing.  Everyone looks so serious.  \"What happened?\" you dare to ask.\n\n\t\t\"There was a bad fire,\" your mother says, gently. \"Do you remember it?\"\n\n\t\tSuddenly, the memories return like a ton of rocks. \"Oh,\" you state numbly.  \"Yeah.\" Then you look to you Chief Kalinowski for an explanation because he was there.\n\t\t*goto KalinowskiExplains\n\n\t#Who am I? Who are you? Just kidding!\n\n\t\t\"Who are you people?\" you choke out dramatically. \"Who am I?\" Instead of laughing, your mother and ${SOname} look instantly alarmed. \n\n\t\tYou'd better not torture them so you say, \"Hey, guys. Lighten up!  I'm just kidding around. Why all the long faces?\"\n\n\t\t\"There was a bad fire,\" your mother says, gently. \"Do you remember it?\"\n\n\t\tSuddenly, the memories return like a ton of rocks. \"Oh,\" you state numbly.  \"Yeah.  Sorry.\" Then you look to you Chief Kalinowski for an explanation because he was there.\n\n\t\t*goto KalinowskiExplains\n\n*label ProbieSOExplains\n\n\"The house was a total loss,\" ${SOpronoun1} reports. \"Turns out the fire started because someone left a halogen desk lamp on overnight, right next to some curtains. And the smoke detectors weren't working. Both victims died. And we lost Velez. He had a heart attack while doing the search.\" \n\n*if saved_RIT\n\n\tThe rest of ${SOpronoun2} words come more quickly, \"But the Chief says we could've lost more people if you hadn't seen the signs of the flashover. You barely got out in time, yourself. I've never been so scared.\"\n\t*goto ExplanationPart2\n\n*elseif saved_by_RIT\n\n\tThe rest of ${SOpronoun2} words come more quickly, \"Firefighter Reynolds grabbed you just in time. I've never been so scared.\"\n\t*goto ExplanationPart2\n\n*elseif nearly_died\n\n\tThe rest of ${SOpronoun2} words come more quickly, \"We nearly lost you too.  When I saw those flames coming out the window...\" ${SOname} gets choked up with emotion and has to stop speaking for a moment.  Then ${SOpronoun1} takes a deep breath. \"I'm just glad you made it out, ${Fname}.\" $!{SOpronoun1} leans over to place a gentle kiss on your brow.\n\t*goto ExplanationPart2b\n\n*elseif no_air\n\n\t\"You gave us quite the scare, yourself, letting your air get so low,\" ${SOpronoun1} says more quietly.  \"I'm so glad Warner was with you and knew what to do.\"\n\t*goto ExplanationPart2\n\n*elseif delay_water_can \n\n\tThe rest of ${SOpronoun2} words come more quickly, \"We nearly lost you too.  If you didn't have that water can with you...\" ${SOname} gets choked up with emotion and has to stop speaking for a moment.  Then ${SOpronoun1} takes a deep breath. \"I'm just glad you made it out, ${Fname}.\" $!{SOpronoun1} leans over to place a gentle kiss on your brow.\n\t*goto ExplanationPart2b\n\n*label KalinowskiExplains\n\n\"The house was a total loss,\" he reports. \"Turns out the fire started because someone left a halogen desk lamp on overnight, right next to some curtains. And the smoke detectors weren't working. Both victims died.  We got the old man out, but he had breathed in too much smoke.\" He bows his head a moment. \"And we lost Velez. He had a heart attack while doing the search.\" \n\n*if saved_RIT\n\n\tThe rest of his words come more quickly, \"But the Chief says we could've lost more people if you hadn't seen the signs of the flashover. You barely got out in time, yourself. \"\n\n\t\"Look,\" he continues, a little uncomfortably. \"Don't beat yourself up over Velez. He knew he was taking a risk. There was nothing you could have done.\"\n\t*goto ExplanationPart2\n\n*elseif saved_by_RIT\n\tThe rest of his words come more quickly, \"Firefighter Reynolds grabbed you just in time. We nearly lost you too...\"\n\n\t\"Look,\" he continues, a little uncomfortably. \"Don't beat yourself up over Velez. He knew he was taking a risk. There was nothing you could have done.\"\n\t*goto ExplanationPart2\n\n*elseif nearly_died\n\t\"We nearly lost you too,\" the Chief says, looking away for a moment to gather himself. \"When I saw those flames shooting out the window... I'm really glad you made it. So just hang in there, kid.\"\n\t*goto ExplanationPart2b\n\n*elseif no_air\n\t\"You gave us quite the scare, yourself, letting your air get so low,\" the Chief says quietly.  \"Luckily, Warner was with you and knew what to do.\"\n\t*goto ExplanationPart2\n\n*elseif delay_water_can\n\t\"We nearly lost you too,\" the Chief says, looking away for a moment to gather himself. \"If you didn't use the water can to buy yourself and the others more time, I don't even want to think about what would have happened.  So you just hang in there, kid.  You're going to be okay.\"\n\t*goto ExplanationPart2b\n\n*label ExplanationPart2\n\nIt's a lot to take in.  You lie there in silence for a while. Eventually, you ask some more questions, and the people with you answer as best they can. \n\nThe doctor comes in some time later and explains that you have some minor burns, several sprained muscles, and a few ugly bruises, but that you rather remarkably escaped any serious harm. \"You're lucky,\" she tells you and schedules you for release that evening.  \n\nYou don't feel lucky.  And in a few days' time, you have to attend a funeral.\n*goto VelezFuneral\n\n*label ExplanationPart2b\n\n\nIt's a lot to take in.  You lie there in silence for a while. Eventually, you ask some more questions, and the people with you answer as best they can. \n\nThe doctor comes in some time later and explains how they intend to treat the burns on your back and arms. You also have some ugly bruises and some strained muscles, which, as the doctor explains, \"You don't feel right now because of the medication we gave you for the pain.\"  Assuming no complications, she expects to have you out of the hospital in three or four days to rest and recover the rest of the way at home.  \"You're lucky,\" the doctor informs you, \"This could have been a lot worse.\"\n\nYou don't feel lucky.  In a few days' time, you have a funeral to attend.\n*goto VelezFuneral\n", "12afterfire": "The days after Velez's funeral pass in a blur.  Your mind feels like its wrapped in fuzz. You're not hungry.  When you try to eat, you feel nauseous. \n\nYou are tired all the time, but you can't sleep.  For when you sleep, you dream of fire.  The people you could not save call out to you for help you could not provide.\n\n*page_break\n\n*if hospitalized\n\n\tWhen you were still in the hospital, someone came to talk to you.  \n\t*goto CISMIvan \n\n*else\n\n\tWhile you were at the firehouse, right after that awful fire, someone came to talk to you.  You had just put your gear on the rack. Your face and hands were black with soot.\n\t*goto CISMIvan\n\n*label CISMIvan\n\n*page_break\n\nThe man's name was Ivan, and he introduced himself as a member of the country's Critical Incident Stress Management (CISM) team.  He seemed kind and knowledgable and certainly filled with the best of intentions.  But the last thing you wanted to talk about was what you had just been through.\n\nHow did you react to Ivan's approach?\n\n*fake_choice\n\t#I got angry at him.\n\t\tYou were still both numb and reeling from the shock of everything that just went on.  The last thing you needed was some idiot know-it-all trying to help you \"process\" this \"traumatic incident.\"  Hell, he hadn't even been there! \n\n\t\t\"Fuck off,\" you told Ivan and glared icily at him.\n\n\t\t*page_break\n\n\t\tIvan didn't push matters, nor did he seem the slightest bit offended.  You have the feeling he's been treated like this a thousand times before by people just like you.  \n\n\t#I tried to be polite.\n\t\tYou really didn't want to deal with this on top of everything else that just went on.  You couldn't even begin to process it in your own mind, much less with someone who wasn't even there.  But you knew this fellow meant well and also that he was doing his job.  So you tried to be polite, but you just couldn't bring yourself to focus on the conversation.\n\n\t\t*page_break\n\n\t\tIvan didn't push matters, nor did he seem the slightest bit offended.  You have the feeling he's dealt with people like you a thousand times before.  \n\n\t#I ignored him.\n\t\tYou were still both numb and reeling from the shock of everything that just went on.  The last thing you needed was some pestering know-it-all trying to help you \"process\" this \"traumatic incident.\"\n\n\t\tSo you ignored him.  Everytime Ivan tried to say something to you, you stared with great interest at the new sooty crud under your fingernails or at something on the far wall. \n\n\t\t*page_break\n\n\t\tHe didn't push matters, nor did he seem the slightest bit offended.  You have the feeling Ivan's been treated like this a thousand times before by people just like you.\n\nHe just handed you a thin, white pamphlet, and said, \"Have a look at this, when you get a chance.  And the hotline number's good 24/7.\" \n\nAnd then he turned away and left you in peace.\n\n*page_break\n\n*goto Pamphlet\n\n*label Pamphlet\n\nThe pamphlet was straight-forward enough and actually pretty interesting. It contained a whole list of things you might experience after a traumatic event: everything from physical reactions (fatigue, difficulty sleeping, headaches, etc.) to cognitive reactions (blaming, having trouble paying attention and making decisions, etc.) to emotional reactions (anger, grief, anxiety, depression, etc.).  Flashbacks, which are intrusive and realistic memories of the event, are apparently also part of the coping process.\n\n*page_break\n\nThe most curious part, really, was the emphasis that these are normal reactions to abnormal events.  Firefighters must sometimes deal with horrible situations that most other people will hopefully never encounter in their lives.  \n\nIn the end, however, they are still human beings, and it is entirely understandable to have a perfectly human reaction to tragedy.  It does not imply any kind of weakness or mental health issue; quite the contrary, really. They are just reminders that, with all that you do for others, you also sometimes need to take the time to take care of yourself.\n\n*page_break\n\nThe pamphlet also had some suggestions for how you might best take care of yourself and minimize the negative impact of the traumatic stress on your lives.  These suggestions included reaching out to people who care, maintaining as normal a schedule as possible, getting plenty of rest, and avoiding excessive use of alcohol. \n\nBut if, after a couple of months, you are still having difficulties, (or at any time if you feel your reactions may be harmful to yourself or others) you are urged to use the 24/7 hotline and get in touch with the CISM team.  There are ways they can help.\n\n*page_break\n\nWhat do you think of the information?\n*fake_choice\n\t#It's really interesting, actually.\n\t\tYou find the information in the pamphlet to be surprisingly useful, actually.  And you'll be sure to keep it in mind.\n\t#Whatever.\n\t\tYou don't see how a stupid pamphlet is supposed to help anyone. So you stuff it into one of your jacket pockets or maybe you tossed it into the trash. Either way, you pretty much just forget about it.\n\n\n*if saved_RIT \n\n\t*page_break\n\tSometimes you think about what might have happened if you hadn't seen the signs of the flashover and made sure the Rapid Intervention Team members retreated in time.  \n\t\n\tAnd then there's Velez. \n\t*gosub VelezReflection\n\t*goto BacktoWork\n\n*elseif saved_by_RIT \n\t*page_break\n\tSometimes you think about what might have happened if the Rapid Intervention Team hadn't saved you.  You would be dead now, like Velez, and your whole family would be in mourning.\n\n\t*gosub VelezReflection\n\t*goto BacktoWork\n*elseif nearly_died \n\t*page_break\n\tIt's hard to forget the fact that you very nearly died in that fire.  After an experience like that, it's hard to look at anything the same way again.\n\n\tAnd then there's Velez.  He didn't make it.\n\n\t*gosub VelezReflection\n\t*goto BacktoWork\n*elseif delay_water_can \n\t*page_break\n\tSometimes you think about what might have happened if you hadn't chosen to bring the water can into the fire with you that day.  It would have been all the more terrifying, having to face the flames without any water at all.  Would you even have survived?\n\n\tVelez didn't.\n\n\t*gosub VelezReflection\n\t*goto BacktoWork\n*else\n\t*gosub VelezReflection\n\t*goto BacktoWork\n\n*label VelezReflection\n\n*page_break\n\nYou can still see his face in your mind and hear his voice as clear as day.  You wonder how things might have been different if you made different decisions. Could you have saved him?  Could you have saved the boy?  You might never know. \n\nIn real life, unlike a game, you don't get to go back and try again.  But, oh how you wish you could!\n*page_break\n*return\n\n*label BacktoWork\n\nYou almost expect the whole world to stop or at least slow down after something terrible like that happens, but it doesn't.  Before you know it, you have to go back to work.  \n\n*if career=\"construction\"\n\tAnd now there's another big project that's behind  because of an unreasonable deadline (as usual).  Your supervisor wants you and your team to come in on your day off to try to get a little ahead.  \n\t*goto WorkChoice\n\n*elseif career=\"lawyer\"\n\tAnd now there's another big case nearing the court date and an overwhelming amount of work for a normal time when you can actually focus.  You have no idea how you can possibly manage.\n\t*goto WorkChoice\n\n*elseif career=\"dispatcher\"\n\tAnd now it seems that one of your fellow dispatchers is out on maternity leave so, instead of hiring an extra new person, your supervisor expects everyone to pick up the slack and work extra hours. That would be difficult even under normal circumstances.\n\t*goto WorkChoice\n\n*elseif career=\"teacher\"\n\tAnd now you're supposed to get your classroom ready for the new school year, but you just can't seem to wrap your mind around what you need to do.  It all seems so overwhelming.\n\t*goto WorkChoice\n\n*elseif career=\"engineer\"\n\tAnd now you're about to reach an important milestone in the development of your recent project, but you just can't seem to focus on the requisite statistical analyses.\n\t*goto WorkChoice\n\n*label WorkChoice\n\nPlus, you're exhausted lately, however, and it's all you can do to try to maintain your usual schedule without doing extra work.\n\nSo what do you do?\n*choice\n\t#I explain the situation to my boss.\n\t\t*goto Explain\n\n\n\t#I ignore the situation.\n\t\t*goto Ignore\n\n\t#I try to do the extra work. \n\t\t*goto ExtraWork\n\n*label Explain\n\n*page_break\n\n*if career=\"construction\" \n\tYou expect your supervisor to be really unhappy with you, to tell you to suck it up and be a contributing member of the team if you want to keep your job.  But, actually, he's quite sympathetic.\n\n\tHe's seen the news reports on TV about the fire, and, actually, his sister and her family live on that very street, only about five houses down from the fatal fire.  \n\n\tYour supervisor surprises you further by thanking you for responding to that incident.  \"It had to have been a difficult one,\" he decides.  And then he goes further and apologizes for insensitively asking you to come in on your day off.  \"Rest and take care of yourself,\" he insists. \"And just let me know if you need any time off.\"\n\n\tSo that goes very well.\n\t*goto Relationships1\n\t\t\t\n*elseif career=\"lawyer\"\n\tYou decide that the best thing to do would be to meet with one of the law firm's partners and explain your situation, preferably before you mess anything up too badly or keel over from exhaustion.\n\n\tYou aren't sure how they will react, really, but, in the end, you are very pleasantly surprised.  The partner you speak with has seen the news reports on TV about the fire, and, actually, her friend's mother lives right on the next street and could see the flames from the house from her bedroom window. \n\n\tShe thanks you for the work you do in emergency services, admitting, \"I don't know how you manage. It must be so difficult.\"  Then she assigns you a legal aid to help you with your preparations and insists that you let her know if you need any time off.\n\n\tSo that goes very well.\n\t*goto Relationships1\n\n*elseif career=\"dispatcher\"\n\tAs usual, your supervisor is a big pile of apathy wrapped up in a steaming package of terrible manners.  If you're not injured, he doesn't see why you can't bother to get yourself to work and help out just like everyone else.  Additionally, he comes out with this endearing declaration: \"If you can't handle fires, maybe you shouldn't be a firefighter.\"\n\n\tOf course, this makes you pretty angry, but, curiously enough, your anger is nothing compared to the wave of fury that motivates all of your coworkers (even the one on leave) to both write angry letters to the mayor demanding respect for a firefighter who is going through a tough time and reporting the situation to the local news.  Some of them are EMTs.  They would want nothing less for themselves.\n\n\t*page_break\n\n\tOnce the media got involved, things quickly changed.  Your supervisor was sacked and replace by a new supervisor, a  former firefighter and emergency management expert who made it a point to formally thank you for the work you did during that incicident. \n\n\tFurthermore, she apologized for your former supervisor's rudeness, and, much to everyone's delight, hired a new dispatcher to temporarily replace the one on leave. \"And, if you need some time off,\" she tells you, \"Just let me know, and we'll work it out.\"\n\n\tSo that ended up going very well.\n\t*goto Relationships1\n\n*elseif career=\"teacher\"\n\tSo you decide to talk to the school's principal about your situation.  You aren't sure how it will go over, really, especially considering that a new school year is just around the corner, but you end up being pleasantly surprised.  It's a small town so of course the principal has heard about the terrible fire.  She's seen the news reports and, as it happens, her brother-in-law's family lives only a few blocks away.\n\n\tShe thanks you for the work you do in emergency services, admitting, \"I don't know how you manage. It must be so difficult.\"  Then she assigns you a teaching assistant to help you get your classroom ready and insists that you let her know if you need any time off.\n\n\tSo that ended up going very well.\n\t*goto Relationships1\n\n*elseif career=\"engineer\"\n\tSo you decide to talk to your manager about the situation. You aren't sure how it will go over, really, especially considering that such a big milestone is just around the corner, but you end up being pleasantly surprised.\n\n\tIt's a small town so of course your boss has heard about the terrible fire.  She's seen the news reports and, as it happens, she lives with her family only a few streets away and woke up to the sounds of all the sirens that fateful night..\n\n\tShe thanks you for the work you do in emergency services, admitting, \"I don't know how you manage. It must be so difficult.\"  Then she assigns you an intern to help with your work load and has another engineer work on the pending analyses.  Furthermor, she insists that you let her know if you need any time off.\n\n\tSo that ended up going very well.\n\t*goto Relationships1\n\n*label Ignore\n\n*page_break\n\nYou just can't deal with anything else right now.  Maybe if you ignore your work demands they will just go away. \n\nBut they don't, of course.\n\n*if career=\"construction\"\n\tWhen you sleep through your day off and ignore all the phone calls, your supervisor actually gets very worried about you.  He ends up calling the firehouse to see if you might be busy there, which leads to him having a good, long conversation with Chief Gordon about how you might be having a rough time due to that tragic fire.\n\n\tWith new understanding, your supervisor doesn't give you a hard time about missing a day of work, especially since it was your day off anyway.  And eventually you are able to get back into the swing of things.\n\t*goto Relationships1\n\n\tFiles and papers just keep piling up on your desk faster than you can possibly go through them.  In a normal time, maybe it would be easier to concentrate or at least ask for help, but it's all just completely overwhelming.  \n\n\tOne afternoon, you walk out the door, ostensibly to go get a cup of coffee, and you don't come back.  You even turn off your phone so nobody will bother you.\n\n\tOne of the firm partner's actually ends upcalling the firehouse to see if you might be busy there, which leads to her having a good, long conversation with Chief Gordon about how you might be having a rough time due to that tragic fire.\n\n\tWith new understanding, the partner doesn't give you a hard time about walking out. Instead, when you do return the next day, you find an intern assigned to you to help you with the extra workload.  And eventually you are able to get back into the swing of things.\n\t*goto Relationships1\n\n*elseif career=\"dispatcher\"\n\tAs you well know, your supervisor has zero tolerance for that sort of attitude.  You receive a termination notice in the mail shortly thereafter.   Which is just great. Fabulous. Exactly what you need.\n\n\tA few days later, you get a call from someone at the county dispatch center, informing you that your supervisor had been fired and that they were reviewing the circumstances of your own termination.  Evidently, they know about the fire, your role in it, and the ways that a traumatic experience can affect a person.  \n\n\tIn essence, you are given two weeks off to recover and a job to return to if you want it.  You have bills to pay, and you have a feeling your job would be a thousand times more enjoyable without the a-hole supervisor in the picture.  So of course you accept.\n\t*goto Relationships1\n\n*elseif career=\"teacher\"\n\tYou do nothing to set up your classroom for the new year, and your fellow teachers start to get concerned.  You ignore their phone calls, just not wanting to deal with anything right now.  \n\n\tEventually, when the principal can't get ahold of you, she tries calling the fire house to see perhaps if she can track you down there.  This leads to her having a good, long conversation with Chief Gordon about how you might be having a rough time due to that tragic fire.\n\n\tWith new understanding, the principal doesn't give you a hard time about falling behind. Instead, when you do show up at the school, you find a teaching assistant assigned to you to help you get everything in order in a timely manner.  Plus, your fellow teachers and the school admin are suprisingly understanding.  With all this support, you are soon able to get back into the swing of things.\n\t*goto Relationships1\n\n*elseif career=\"engineer\"\n\tThere are so many project deadlines and due dates on your calender at this point that you have no idea how to even begin to sort anything out.  \n\n\tOne afternoon, you walk out the office door, ostensibly to go get a cup of coffee, and you don't come back.  You even turn off your phone so nobody will bother you.\n\n\tYour manager actually thinks to call the firehouse to see if you might have gotten sidetracked there, which leads to her having a good, long conversation with Chief Gordon about how you might be having a rough time due to that tragic fire.\n\n\tWith new understanding, your manager doesn't give you a hard time about walking out. Instead, when you do return the next day, you find an intern assigned to you to help you with the extra workload.  And eventually you are able to get back into the swing of things.\n\t*goto Relationships1\n\n*label ExtraWork\n\n*page_break\n\nThe last thing you want to do right now is be home doing nothing, left along with your thoughts.  It feels good to work. It's a welcome distraction.  So you throw yourself into it like never before.\n\n*if career=\"construction\" \n\tYou work even more hours than are on your schedule, offering to do plenty of overtime to help get this project done.  Having heard about the tragic fire (how could they not in such a small town?), your coworkers worry that you might be working a little too hard for your own good.  Every so often, your supervisor makes you take a break, if only so you don't hurt yourself.  Construction work is very labor intensive!\n\t*goto Relationships1\n\n*elseif career=\"lawyer\"\n\tYou spend hours researching every possible nuance of the case you will be presenting and read the applicable laws so many times you nearly have them memorized.  Having heard about the tragic fire (how could they not in such a small town?), your colleagues keep an eye on you.  They make sure you eat regular meals and take a break now and then.\n\t*goto Relationships1\n\n*elseif career=\"dispatcher\"\n\tFor once, your supervisor has nothing to complain about.  You show up for work early and stay late if necessary.  Plus, you volunteer for all the extra shifts at times that nobody else really wants to work.  Having heard about the tragic fire (how could they not in this line of work?), your fellow dispatchers keep an eye on you. They make sure you eat regular meals and take a break now and then.\n\t*goto Relationships1\n\n*elseif career=\"teacher\"\n\tThis year, your classroom is more prepared than every before.  Everything is perfectly cleaned and organized.  You even have new shelves and hooks put up, as well as fresh new posters decorating the walls. You also have several weeks of lesson plans drawn up in advance. Having heard about the tragic fire (how could they not in such a small town?), your fellow teachers keep an eye on you.  They make sure you eat regular meals and take a break now and then.\n\t*goto Relationships1\n\n*elseif career=\"engineer\"\n\tYou finish your statistical analyses ahead of schedule and go one step further by running additional tests, just to make sure everything is perfect.  You show up at work early, before just about everyone else, and you're the last one to leave.  Having heard about the tragic fire (how could they not in such a small town?), your colleagues keep an eye on you.  They make sure you eat regular meals and take a break now and then.\n\t*goto Relationships1\n\n\n*label Relationships1\n\n*page_break\n\nStill, you feel it might be really good to have somebody to talk to who would understand what you have experienced. \n\n*if cat\n\t${catname}, your cat, has been cuddly and sweet and glued to your side almost every moment when you're home, but, of course, it's just not the same as talking to a person.\n\t*page_break\n\t*goto Relationships1a\n*else\n\t*goto Relationships1a\n\n*label Relationships1a \n\n*if relationship_firefighters >= 65\n\n\tYou are pretty close with a lot of the other firefighters at this point.  \n\n\t*goto ReachingOut\n\t\n*elseif (relationship_firefighters  \u003c= 64) and (relationship_firefighters >= 50)\n\tYou get along pretty decently with a lot of the other firefighters at this point. \n\n\t*goto ReachingOut\n\n*else\n\tYou haven't managed to form a very good relationship with any of the other firefighters at this point.  That makes it all the more difficult to reach out to them if you think you might like to.  After all, most non-emergency workers or non-military people hopefully never experience nearly as much tragedy as firefighters face on a fairly regular basis.  So who better to talk to than other firefighters?\n\n\tDo you try to reach out?\n\t*choice\n\t\t#Yeah.  I think I'd better.\n\t\t\t\n\n\t\t\tSometimes you feel like your thoughts are caught in an endless loop, that you keep repeating the same memories and questions over.  You think you might feel better if you can talk to someone who understands.\n\n\t\t\tUnfortunately, you haven't put much effort into making friends around the firehouse so it's difficult to even know who to approach.\n\n\t\t\tWhat do you think?\n\t\t\t*choice\n\t\t\t\t#I'll talk to Gina Zlenko.  She seems nice.\n\t\t\t\t\tGina has always been nice to you, even when you haven't always been particularly nice yourself.   When you try to seek her out, you learn that she's decided to take a leave of absence to think about whether or not she wants to continue to be a firefighter.  Apparently you're not the only one having a difficult time of things.  \n\n\t\t\t\t\tDo you try talking to someone else? \n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Yeah, I'll try to talk to the Chief.\n\t\t\t\t\t\t\t*goto ChiefTalk\n\t\t\t\t\t\t#I think I'll try to talk to McCollaugh.\n\t\t\t\t\t\t\t*goto McCollaughTalk\n\t\t\t\t\t\t#I think I'd better just talk to the Chaplain.\n\t\t\t\t\t\t\t*goto ChaplainTalk\n\t\t\t\t#I'll see if Chief Gordon wants to talk. Why not go to the top?\n\t\t\t\t\t*goto ChiefTalk\n\t\t\t\t#I'll try talking to Guy McCollaugh. He has a lot of experience.\n\t\t\t\t\t*goto McCollaughTalk\n\t\t\t\t#I'll seek out the Fire Chaplain, Olivia Foster. Isn't that part of her job.\n\t\t\t\t\t*goto ChaplainTalk\n\t\t#No. I'd rather not.\n\t\t\tIf you aren't able to really connect with the other firefighters during everday experiences, you really don't think that it will work out well if you suddenly start sobbing on someone's sleeve.  Besides, you can deal with this yourself, right?  No big deal.\n\t\t\t*goto Groceries\n\n\n*label ChiefTalk\n\n*page_break\n\nSo one evening at the fire house, when the Chief's in his office, you go and knock on the door.  He seems surprised to see you there but waves you on in.  \"What can I do for you, ${Fname}?\" he asks, informally.\n\nSo you try to explain the problem. \"I've been having trouble, you know, thinking about the scene the other day.\"\n\n\"Ah,\" Chief Gordon says, knowingly.  \"Well, come on in and sit down.  We can certainly chat for a bit.\"\n\n*page_break\n\n\"A bit\" turns into two hours of talking.  The Chief has some amazing stories to share, from heartbreakingly sad to astonishingly brave. A couple were downright hilarious. \n\nAnd he was perfectly happy to toss aside anything else he had been working on to just spend time with you, listening to what you are going through and explaining how he's learned to deal with some of the more difficult things himself.  You even both share some stories about Firefighter Velez, including all the way back to when he was a new probie and was in such a rush to respond to a fire one day that he tried to put his helmet on backwards. The thought makes you smile.\n\nYou leave the conversation feeling lighter in spirit and stronger for being part of a organization with such a personable leader.\n*set relationship_officers %+30 \n*goto SO\n\n*label McCollaughTalk\n\nSo one evening at the fire house, you catch Firefighter Guy McCollaugh just before he's getting ready to leave.\n\n\"Yeah?  What's up?\" he asks you, curiously.\n\nYou try to explain your situation.   \"I was wondering if we could talk about that fire the other day. It's been weighing on my mind.\"\n\n\"Oh?  What's there to talk about?\" McCollaugh replies, seemingly uninterested. \"It's a fire. We're firefighters.  That's what we do.  Shame about Velez, though.\"\n\n\"Yeah, it is,\" you agree and stand there awkwardly as McCollaugh heads on his way.\n\n\"Have a good night,\" he says at least.\n\n\"You too.\"\n\n*page_break\n\nYou're feeling more lonely than you were before.  What was the point of that?\n\nDo you try to talk to someone else?\n*choice\n\t#Nah.  I feel dumb enough as it is.\n\t\t*goto Groceries\n\n\t#I guess I could try to talk to the Chief.\n\t\t*gosub ChiefTalk\n\t\t*goto SO\n\n\t#Maybe I'll talk to the Chaplain.\n\n\t\t*gosub ChaplainTalk\n\t\t*goto SO\n\n\n*label ChaplainTalk\n\nSo you approach the Chaplain one day at the fire house and ask if she has a few minutes to talk.\n\n\"Of course!\" Chaplain Foster says immediately, and she brings you to a quiet meeting room for some privacy.  \"What's on your mind?\"\n\nSo you try to explain the problem. \"I've been having trouble, you know, thinking about the scene the other day.\"\n\n\"Ah,\" she replies.  \"Yeah, that was a rough one.\" \n\n*page_break\n\nYou end up talking with the Chaplain for over two hours, having quickly discovered her to be a very good listener. She asked just the right questions to help you express yourself more clearly and only offered her own viewpoint every  now and then where it made sense and was helpful for her to do so.  \n\nWhen the topic focused on Velez, she had some interesting stories to tell, and you find yourself laughing at some of the funnier ones.\n\nReally, you feel so very much better for just having found a sympathetic ear.  You tell her so, and she smiles. \n\n*page_break \n\nThen she asks you if you would like to pray with her -- no pressure though!\n\nWould you?\n*fake_choice\n\t#Yes.  I would like that.\n\t\tSo you and the Chaplain bow your heads in prayer while she speaks the following words:\n\n\t\t\"Merciful Father in heaven, look down in Your love upon all those who protect us and ours from the ravages of fire and flame. Grant them the courage and skills to carry out their duties well and safely. When they must go into the face of danger, be by their side in the smoke and flames. Watch over their families, ever reminding them that those who fight fire are also in Your loving care. Amen.\"\n\n\t\tIt is a simple prayer, but nevertheless the words do lift your spirits considerably.\n\n\t#No, thank you.\n\t\tChaplain Foster isn't offended. She does write her cell phone number down for you in case you need to talk again.  Somehow, it feels reassuring to know you have that option.\n\n*goto SO\n\n*label ReachingOut\n\nSome of them are having a pretty rough time of things too.  Do you reach out and try to talk with them?\n\n*choice\n\t#Yes.  Of course.\n\t\t\n\t\tYou remember from the pamphlet that it's advisable to reach out to others who care, and, at some point, it occurs to you that you might be able to help your firefighters as well as yourself by working through this together. Some of them have been through bad fires before, and some have not.  \n\n\t\tYou are confused by the veterans who make jokes that seem inappropriate to you, but you suspect this is their own way of coping.   \n\n\t\t*page_break\n\n\t\tFirefighters McCollaugh, Zlenko, and Warner all seem willing to have some serious conversations about what happened that day.  McCollaugh and Warner have been around long enough that they can share some of their experiences with you regarding how they learned to cope with the aftermath of difficult fires and accidents. \n\n\t\tYou feel noticably better after talking with them and are even able to pass some of their wisdom along to poor Firefighter Zlenko who has been pale-faced and teary-eyed since that day.  \n\t\t*set relationship_firefighters %+20\n\t\t*goto SO\n\t#No. I'd rather not.\n\t\tYou know you should probably try to talk to some people about what happened, if only to get the thoughts out of your head where they seem stuck in an endless loop.  But you just can't bring yourself to do so.  Maybe it's too soon.  \n\n\t\tThe other firefighters notice your withdrawal and give you the space you need, although they do keep a watchful and protective eye over you, as you are one of their own.\n\t\t*set relationship_firefighters %-10\n\t\t*goto Groceries\n\n*label Groceries\n\t\nYour feeling of isolation strikes you at the strangest times.  One day you stop at the local grocery store to pick up some basic supplies.  You actually spend 10 minutes staring at the selection of salad dressings, highly annoyed, because a part of you can't even believe that you have to waste your time and energy on such a stupid, pointless decision.\n\nAnd then you see other people walking around, picking out food, as if this is all so important, as if everyone doesn't just die in the end.\n\nYou're really feeling very down.\n*goto SO\n\n\n\n*label SO\n\n*page_break\n\n*if (probie_fire)\n\n\tOf course, you have ${NPfname} through all this as well.  $!{NPpronoun1} was with you in the very worst of the fire, and ${NPpronoun1} is having a pretty tough time dealing with everything that went on.  This was ${NPpronoun2} first fire, after all.\n\n\tDo you think this makes it easier or harder to talk to ${NPpronoun3}?\n\t*choice\n\t\t#Easier. We went through the same thing.\n\t\t\tIn all the world, there is one person who knows exactly how bad it was in that room that night, how close you both came to dying.  This brings you closer together, emotionally, then you ever thought possible.\n\t\t\t*set relationship_SO %+40\n\t\t\t*goto CISD\n\n\t\t#Harder. Looking at ${NPpronoun3} reminds me of the nightmare.\n\t\t\tAnd how can you be in a relationship if you can't even look at the other person?  These are hard times, really hard.  You do care about  ${NPpronoun3} very much, however.  There has to be a way to get through this.\n\t\t\t*set relationship_SO %-20\n\t\t\t*goto SOProbieTalk\n\n*elseif (ProbieSO)\n\tOf course, you have ${NPfname} through all this as well.  $!{NPpronoun1} is having a pretty tough time dealing with everything that went on.  This was ${NPpronoun2} first fire, after all.\n\n\tDo you find it easy or difficult to talk to ${NPpronoun3} about it?\n\t*choice\n\t\t#Easy, actually. \n\t\t\t$!{NPpronoun1} is a firefighter too.  Therefore, you can discuss the situation with ${NPpronoun3} from a firefighting perspective.  There are emotional moments, of course.  How could there not be?  But talking and sharing, even during the harder moments help bring you closer together and strengthen your relationship in this difficult time. \n\t\t\t*set relationship_SO %+40\n\t\t\t*goto CISD\n\t\t#Difficult.\n\t\t\tYou were in the fire, inside the burning building. ${NPfname} wasn't.  However upset ${NPpronoun1} might be, it's nothing compared to what you are going through right now.  You are finding it hard to even talk to ${NPpronoun3}, and you're not even sure why.  \n\n\t\t\tYou do care about  ${NPpronoun3} very much, however.  There has to be a way to get through this.\n\t\t\t*set relationship_SO %-20\n\t\t\t*goto SOProbieTalk2\n\n*elseif fiance\n\n\tNow you've been through something that your fiance ${SOname} will never be able to understand.  And you wouldn't want ${SOpronoun3} to understand the horror of what you've been through.  You want to protect ${SOpronoun3}.  But, at the same time, it puts some distance between you that seems impossible to cross.\n\n\t${SOname} is trying so hard to support you, even so, making sure you have regular meals without having to worry about preparing anything.  And a thousand times ${SOpronoun1} mentioned ${SOpronoun2} willingness to listen if you are ever willing and able to talk.  ${SOname} is worried about you and loves you, but how can you share something so hard?\n\t*goto FianceTalk\n\t\n*elseif SO\n\n\tNow you've been through something that your significant other ${SOname} will never be able to understand.  And you wouldn't want ${SOpronoun3} to understand the horror of what you've been through.  You want to protect ${SOpronoun3}.  But,
