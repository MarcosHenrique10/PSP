would not miss this for the world.\n\t\t*set funeral \"yes\"\n\t\t*goto FuneralYes\n\n\t#I can't possibly.\n\t\tIt is an extremely important tradition for firefighters to honor one of their own who have passed away in the line of duty.\n\n\t\tBut you can't go. You just can't. Whether you are sad or angry or guilty, however you are feeling, you can't bring yourself to go. \n\n\t\tSo you don't.\n\n\t\t*set funeral \"no\"\n\t\t*set relationship_firefighters %-40\n\t\t*set relationship_officers %-40\n\t\t*goto FuneralNo\n\n*label FuneralYes\n*page_break\n\nFirefighter Tamara Schmidt has a very grand funeral, and you make it a point to attend.  Tradition requires firefighters to honor one of their own. They all wear their formal, Class-A uniforms, with white gloves and a black mourning bank over their badges. During the viewing, the fire department's chaplain gives a short service and firefighters from your department form an honor guard.  \n\nAfterwards, the coffin is transported to the cemetery atop an antique firetruck and followed by a small procession of firetrucks and then mourners. Chief Gordon speaks at the graveside. None of Tamara's family members can meet your eye, and you don't really blame them. You survived, after all, but their loved one did not.\n\n*goto Court\n\n*label FuneralNo\n*page_break\n\nYou hear that Firefighter Tamara Schmidt has a very grand funeral.  Tradition requires firefighters to honor one of their own. \n\nAfter the viewing, the coffin was transported to the cemetery atop an antique firetruck and followed by a small procession of firetrucks and then mourners. Chief Gordon spoke at the graveside. \n\nIt is an extremely important tradition for firefighters to honor one of their own who have passed away in the line of duty.  Your absence is noted by the others. They greatly disapprove. \n\n*goto Court\n\n*label Court\n\n*temp guiltyorinnocent 50\n*comment (>50 = innocent, \u003c50 = guilty)\n\n*if funeral = \"yes\"\n\t*set guiltyorinnocent +10\n\t*goto ChiefVisit\n*elseif funeral = \"no\"\n\t*set guiltyorinnocent -10\n\t*goto ChiefVisit\n\n*label ChiefVisit\n*page_break\n\nTwo days later, the Chief shows up at your house to see how you're doing.  \n\nAfter some more general conversation over a cup of coffee, Chief Gordon begins in a serious tone, \"Look, ${Fname}, I know you're having a tough enough time as it is,  and this is the last thing you'll want to deal with, but I wanted to be the one to tell you that Tamara's family -- well, they're understandably angry and grieving, and they've decided to make this into a law suit. Now, you're going to get more information in the coming days, since obviously you were there and all, but I thought you should hear it from me first.\"\n\n*page_break\n\nSo you ended up going to court as a witness in Schmidt versus the $!{town_name} Fire Department, in which your volunteer fire department is being charged with gross negligence of training that led to Firefighter Schmidt's death. \n*goto LawyerCheck\n\n*label LawyerCheck\n\n*if career = \"lawyer\"\n\tAs you are a lawyer yourself, you are very familiar with the court system and what you are going to be facing during this trial. So when the court date arrives, at least you know what to expect.\n\t*set guiltyorinnocent +10\n\t*goto CourtDate\n\n*else\n\t*goto CourtDate\n\n*label CourtDate\n\nSince you were a big part of the moments leading up to Firefighter Schmidt's death, you are the prime witness in the case. The way you answer the questions that are asked of you will have a strong impact on the outcome of the case.\n\nHow did you answer the following questions:\n\n*page_break\n\n*if company = \"Truck\"\n\t*goto ElectricQuestions\n*elseif company = \"Engine\"\n\t*goto WaterQuestions\n\n*label ElectricQuestions\n\n1) \"Did you ever receive any training advising firefighters to pull electrical meters in certain situations?\"\n\n*choice\n\t#\"I never received any such training.\" (True)\n\t\t*set guiltyorinnocent +20\n\t\t*goto ElectricQuestion2\n\n\t#\"I'd heard about the practice from other firefighters, but it wasn't included in my official training.\" (True)\n\t\t*set guiltyorinnocent +10\n\t\t*goto ElectricQuestion2\n\n\t#\"Well, nothing official, but everyone knows it's done from time to time.\" (True)\n\t\t*set guiltyorinnocent -10\n\t\t*goto ElectricQuestion2\n\n\t#\"Sure, I did. Firefighters do that sort of thing all the time.\" (False)\n\t\t*set guiltyorinnocent -20\n\t\t*goto ElectricQuestion2\n\n*label ElectricQuestion2\n\n2) \"Did you ever receive training regarding electrical hazards that included mention of the dangers of pulling electrical meters?\"\n\n*choice\n\t#\"No, I did not.\" (True)\n\t\t*set guiltyorinnocent -20\n\t\t*goto ElectricQuestion3\n\n\t#\"No. It should be common sense, don't you think?\" (True)\n\t\t*set guiltyorinnocent -10\n\t\t*goto ElectricQuestion3\n\n\t#\"Sure, I did. Or at least I think so. It's hard to remember everything.\" (Confused)\n\t\t*goto ElectricQuestion3\n\n*label ElectricQuestion3\n*temp truckleader false\n*if teamposition = \"TruckLeader\"\n\t*set truckleader true\n\n3) \"In so much as you were aware, did Firefighter Schmidt receive orders to pull the electrical meter?\"\"\n\n*choice\n\t*selectable_if (truckleader) #\"Yes. I asked her to pull the meter.\" (Leader Only)\n\t\tDid you have the authority to give orders to Firefighter Schmidt?\n\t\t*choice\n\t\t\t#Yes. I have more experience than she does. (Lie)\n\t\t\t\t*set guiltyorinnocent -20\n\t\t\t\t*goto CourtConclusion\n\n\t\t\t#No, not really. That's just how it worked out. (True)\n\t\t\t\t*set guiltyorinnocent -10\n\t\t\t\t*goto CourtConclusion\n\n\t#\"No. We received general orders to shut down the building's power but nothing specific.\" (True)\n\t\t*set guiltyorinnocent +10\n\t\t*goto CourtConclusion\n\n\t#\"No. We came up with the idea ourselves.\" (True)\n\t\t*set guiltyorinnocent +20\n\t\t*goto CourtConclusion\n\n\t#\"Yes. We were told to pull the meter.\" (False)\n\t\t*set guiltyorinnocent -20\n\t\t*goto CourtConclusion\n\n*label WaterQuestions\n\n1) Were you aware the donut shop was in danger of collapse when you entered it?\n\n*choice\n\n\t#No. I had no idea. I thought it was a small kitchen fire.  We all did. (True)\n\t\t*set guiltyorinnocent +20\n\t\t*goto WaterQuestion2\n\n\t#Of course not. Why would I enter a building I thought was going to fall on my head? (Sarcastic)\n\t\t*set guiltyorinnocent +10\n\t\t*goto WaterQuestion2\n\n\t#Yes. It looked pretty unstable. (False)\n\t\t*set guiltyorinnocent -20\n\t\t*goto WaterQuestion2\n\n\t#I had my suspicions. Those kinds of buildings are always dangerous. (False)\n\t\t*set guiltyorinnocent -10\n\t\t*goto WaterQuestion2\n\n*label WaterQuestion2\n\n2) Was the order to evacuate given in a timely manner?\n\n*choice\n\n\t#Yes, I believe so. As soon as there was any sign of danger, Captain Simmons called for the shop to be evacuated.\n\t\t*set guiltyorinnocent +20\n\t\t*goto WaterQuestion3\n\n\t#No. The commanding officer should have been more aware of the situation and got us out of there sooner.\n\t\t*set guiltyorinnocent -20\n\t\t*goto WaterQuestion3\n\n\n*label WaterQuestion3\n\n3) In your opinion, how would things have worked out differently if an officer had been present to lead your hose team?\n\n*choice\n\n\t#An officer would have insisted we looked for fire over our heads and made us evacuate the moment it was discovered. I clearly didn't have sufficient experience or knowledge, myself.\n\t\t*set guiltyorinnocent -20\n\t\t*goto CourtConclusion\n\n\t#I don't know that it would have worked out any differently. We all do our best in any given circumstances.\n\t\t*set guiltyorinnocent +20\n\t\t*goto CourtConclusion\n\n\t#Is there any point to this speculation? How I can have any idea? (Upset)\n\t\t*goto CourtConclusion\n\n\n*label CourtConclusion\n*temp verdict \"\"\n\n*if guiltyorinnocent >= 50\n\tFor obvious reasons, your testimony held a lot of weight in this particular case, and consideration of your words led to the $!{town_name} Fire Department receiving the verdict of \"not guilty\" of the charge of \"gross negligence resulting in the death of Firefighter Tamara Schmidt.\"\n\n\tRelief is, of course, tempered by the ongoing grief for the loss of one of their own, but no good would have come from the department dealing with legal penalties on top of that. \n\n\t*page_break\n\n\tAs a more fitting memorial, some of the department members start work to set up a memorial fund in Schmidt's honor to help sponsor and promote additional educational training for firefighters regarding safety protocols so that hopefully nobody would ever lose a loved one in the same way again.\n\t*set relationship_firefighters %+30\n\t*set relationship_officers %+30\n\t*set verdict \"notguilty\"\n\t*goto FutureDecision\n\n*elseif guiltyorinnocent \u003c 50\n\tFor obvious reasons, your testimony held a lot of weight in this particular case, and consideration of your words led to the $!{town_name} Fire Department receiving the verdict of \"guilty\" of the charge of \"gross negligence resulting in the death of Firefighter Tamara Schmidt.\"\n\n\tNow, on top of the loss of one of their own, the fire department will likely be subject to a great deal more extensive legal investigations and penalties, not to mention a seriously damaged morale. It is a difficult time.\n\t*set relationship_firefighters %-30\n\t*set relationship_officers %-30\n\t*set verdict \"guilty\"\n\t*goto FutureDecision\n\n*label FutureDecision\n\n*if relationship_officers \u003c= 30\n\t*goto KickedOut\n\n*elseif relationship_officers > 30\n\n\tThese recent events have been extremely emotionally draining, to say the least. So here's an important question for your consideration:\n\n\tAfter everything that's happened lately, do you still want to be a firefighter?\n\t*choice\n\t\t#Yes.\n\t\t\tYou want to stay a firefighter.\n\n\t\t\tWhy?\n\n\t\t\t*if motivation=\"tradition\"\n\n\t\t\t\t*choice\n\t\t\t\t\t#Because difficult times are part of the job.\n\t\t\t\t\t\tThings have been really tough lately, certainly, but, in your mind, that's all the more reason not to give up.  It's the truly difficult times that can bring out the best in people and knit them more closely together as a family and a team. \n\n\t\t\t\t\t\tYou have no intention of resigning and firmly believe that you will be stronger for this experience.\n\t\t\t\t\t\t*finish \n\n\t\t\t\t\t#Because I can't let my family down.\n\t\t\t\t\t\tThings have been so tough lately that you don't even know if you're heart's in firefighting anymore. It would be so easy to take a break for a while or even resign and just focus on your job and your personal life. Maybe you could even take a vacation somewhere tropical with white beaches and blue water.\n\n\t\t\t\t\t\tBut you know for a fact that your mother has been through worse, much worse, and she never resigned. Neither did your grandfather who had almost 40 years as an active volunteer. They wouldn't understand. And you don't have it in you to disappoint them on top of everything else.\n\n\t\t\t\t\t\tSo you will soldier on and remain in the fire service, even if you're pretty sure you no long want to.\n\t\t\t\t\t\t*set motivation \"grudging\"\n\t\t\t\t\t\t*finish\n\n\t\t\t\t\t#Because I'm not a quitter.\n\t\t\t\t\t\tThings have been tough lately, sure, but that's how life is sometimes. That doesn't make it okay to throw in the towel and take off for supposedly greener pastures. \n\n\t\t\t\t\t\tYou took an oath to serve $!{town_name} as a volunteer firefighter and you intend to honor that promise to your community and to your fire department.  That is all.\n\t\t\t\t\t\t*finish\n\n\t\t\t*elseif motivation=\"grudging\"\n\n\t\t\t\t*choice\n\n\t\t\t\t\t#Because I'm not a quitter.\n\t\t\t\t\t\tThings have been tough lately, sure, but that's how life is sometimes. That doesn't make it okay to throw in the towel and take off for supposedly greener pastures. \n\n\t\t\t\t\t\tYou took an oath to serve $!{town_name} as a volunteer firefighter and you intend to honor that promise to your community and to your fire department.  That is all.\n\t\t\t\t\t\t*finish\n\n\t\t\t\t\t#Because my family would hate me if I quit.\n\t\t\t\t\t\tYou can just imagine what your mother would think of you if you quit just when the going got tough. You know for a fact she'd been through a lot worse when she was a firefighter, and she never gave up. Neither did your grandfather who had almost 40 years as an active volunteer. They wouldn't understand.\n\n\t\t\t\t\t\tBut it's just so damn hard. A firefighter died. It could have been you. Life's dangerous enough without having to literally throw yourself into the heat of the fire. \n\n\t\t\t\t\t\tYou wish you could resign and do something else for a while, maybe focus on your work or travel around the world for a few months. You always wanted to do that.  But you can't.\n\t\t\t\t\t\t*finish\n\n\t\t\t\t\t#Because I actually kind of like being a firefighter.\n\t\t\t\t\t\tThings have been really tough lately, certainly. In fact, it's been harder than you had imagined it could be, losing a fellow firefighter like that. \n\n\t\t\t\t\t\tBut, at the same time, there's something really inspiring about being part of a team, a family of firefighters that shares these experiences together, that watches each other's backs and makes a real difference in the lives of the people in this community.\n\n\t\t\t\t\t\tAlthough you certainly didn't expect to feel this way, you find you actually like being a firefighter and following the tradition of your family.\n\t\t\t\t\t\t*set motivation \"tradition\"\n\t\t\t\t\t\t*finish\n\n\t\t\t*elseif motivation=\"service\"\n\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#Because I'm not a quitter.\n\t\t\t\t\t\tThings have been tough lately, sure, but that's how life is sometimes. That doesn't make it okay to throw in the towel and take off for supposedly greener pastures. \n\n\t\t\t\t\t\tYou took an oath to serve $!{town_name} as a volunteer firefighter and you intend to honor that promise to your community and to your fire department.  That is all.\n\t\t\t\t\t\t*finish\n\n\t\t\t\t\t#Because difficult times are part of the job.\n\t\t\t\t\t\tThings have been really tough lately, certainly, but, in your mind, that's all the more reason not to give up.  It's the truly difficult times that can bring out the best in people and knit them more closely together as a family and a team. \n\n\t\t\t\t\t\tYou have no intention of resigning and firmly believe that you will be stronger for this experience.\n\t\t\t\t\t\t*finish\n\n\t\t\t\t\t#Because I still want to help people.\n\t\t\t\t\t\tYou didn't decide to become a volunteer firefighter because you thought the job would be easy. You wanted to do this work because it is important and because it would allow you to make a positive difference in your community. That hasn't changed. You just know firsthand now how hard this can be sometimes. \n\n\t\t\t\t\t\tInstead of driving you away, you feel all the more determined to continue your service in the fire department.\n\t\t\t\t\t\t*finish\n\n\t\t\t*else\n\t\t\t\t*choice\n\t\t\t\t\t#Because this job is important.\n\t\t\t\t\t\tWhen you first signed up to become a volunteer firefighter, you were in it for the glory. You wanted to be a hero and be on the news and attract lots of attention for your noble deeds. \n\n\t\t\t\t\t\tBut now something has changed.\n\n\t\t\t\t\t\t*page_break\n\n\t\t\t\t\t\tYou realize how this job is actually really important, how it has nothing to do self-aggrandizement and everything to do with being part of something bigger than yourself and making a real different in the lives of others. \n\n\t\t\t\t\t\tAnd that is going to be your focus from now on.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*set motivation \"service\"\n\t\t\t\t\t\t*finish\n\n\t\t\t\t\t#Because I'm not a quitter.\n\t\t\t\t\t\tThings have been tough lately, sure, but that's how life is sometimes. That doesn't make it okay to throw in the towel and take off for supposedly greener pastures. \n\n\t\t\t\t\t\tYou decided to be a firefighter, and you intend to stick with it.  That is all.\n\t\t\t\t\t\t*finish\n\n\t\t\t\t\t#Because I still want to be a hero.\n\t\t\t\t\t\tYou signed up for the fire department with the limelight in mind, and that still hasn't changed. Sure, recent times have been pretty crappy, but that doesn't mean there isn't glory just around the corner. \n\n\t\t\t\t\t\tWho knows when you'll get a chance to save a life and be appropriate rewarded for your efforts? It could be tomorrow!\n\t\t\t\t\t\t*finish\n\n\t\t#No.\n\t\t\tThere comes a point when it's just too much. Nobody even gives you a hard time when you resign from the fire department. They understand. You need to try to move past this, to move on to other things and give yourself time to heal and grow. \n\n\t\t\tStill, your time as a firefighter will remain an important part of your life. In less than two years, you learned far more more than just technical emergency services skills; you learned a great deal about yourself.\n\t\t\t*goto_scene 13awardparty ending\n\n\n\n\n*label KickedOut\n\nIn light of everything that's happened lately, Chief Gordon asks you to meet with him in his office.  When you arrive, the Chief is behind his desk, a great bear of a man, looming somberly. He doesn't offer you a chair so you remain on your feet, feeling the weight of his dark gaze upon you.\n\n*if motivation=\"tradition\"\n\t\"${Fname},\" he begins, familiarly. \"Your family's been part of this department for how many generations now?\"\n\n\t\"I'm the fourth, sir,\" you reply.\n\n\t\"The fourth.\" He smooths his mustache with his finger, looking troubled. \"Well, I don't know how to say this nicely so I'm gonna go ahead and be to the point. There are all kinds of boots in this world because not everyone's feet fit in the same ones.\" \n\n\tThat was to the point? The Chief seems to realize the vagueness of his language because he tries again. \"What I'm trying to say here -- and it isn't easy for me, believe me -- is that, well, quite frankly, I don't think you're particularly well suited to being a firefighter.\"\n\n\t*page_break\n\n\tYou're not quite sure how to respond to that statement so you remain silent and he continues: \n\n\t\"Now, that's not to say you're a bad firefighter, but -- oh, hell.\" He smooths his mustache again, and smirks. \"I never thought I'd say this, but you're a terrible firefighter, ${Lname}. In fact, you might be one of the worst firefighters I've ever encountered, and that's saying a lot. You should just -- really, just go try something else. Get a hobby. Maybe try fishing?\" \n\n\t*page_break\n\n\tYou sense he's genuinely trying to be helpful in his way, but it's borderline ridiculous. In any case, it's clear that your time as a firefighter is done. How will you explain this to your family?\n\n\tRegardless, your experiences in the fire service will remain an important part of your life. In less than two years, you learned far more more than just technical emergency services skills; you learned a great deal about yourself.\n\t*goto_scene 13awardparty ending\n\n*elseif motivation=\"grudging\"\n\n\t\"${Fname},\" he begins, familiarly. \"Your family's been part of this department for how many generations now?\"\n\n\t\"I'm the fourth, sir,\" you reply.\n\n\t\"The fourth.\" He smooths his mustache with his finger, looking troubled. \"Well, I don't know how to say this nicely so I'm gonna go ahead and be to the point. There are all kinds of boots in this world because not everyone's feet fit in the same ones.\" \n\n\t*page_break\n\n\tThat was to the point? The Chief seems to realize the vagueness of his language because he tries again:\n\n\t\"What I'm trying to say here -- and it isn't easy for me, believe me, because you know I had such high hopes for you -- is that, well, quite frankly, I don't think you're particularly well suited to being a firefighter.\"\n\n\t*page_break\n\n\tYou're not quite sure how to respond to that statement so you remain silent and he continues: \"Now, that's not to say you're a bad firefighter, but -- oh, hell.\" \n\n\tHe smooths his mustache again, and smirks. \"I never thought I'd say this, but you're a terrible firefighter, ${Lname}. In fact, you might be one of the worst firefighters I've ever encountered, and that's saying a lot. And to think: your mother was one of the best in her time. It's a darn shame, really.\" He is shaking his head now, looking somewhat emotional. \" A darn shame. I'm truly sorry, Champ, but I just don't think we have a place for you here.\"\n\t*page_break\n\n\tIt seems clear that your time as a firefighter is done. Thank goodness! Now, you can finally move on and maybe do something you actually want to do with your time.\n\n\tRegardless, your experiences the fire service will remain an important part of your life. In less than two years, you learned far more more than just technical emergency services skills; you learned a great deal about yourself.\n\t*goto_scene 13awardparty ending\n\n*elseif motivation=\"service\"\n\n\t\"${Fname},\" he begins, familiarly. \"I remember when you first spoke to me about joining this fire department. You had all the right reasons, all the best intentions.\" \n\n\tHe pauses for a moment and smooths his mustache with his fingertip as he collects his thoughts.  \"But, to be honest, I just don't think it's working out. I had high hopes for you, and I never thought I'd say this, but, quite frankly, you're a terrible firefighter. In fact, you might be one of the worst firefighters I've ever encountered, and that's saying a lot.\" The Chief's words may be harsh, but his tone is gentle. \"I'm genuinely sorry, ${Lname}, but I just don't think we have a place for you here.\"\n\n\t*page_break \n\n\tIt seems clear that your time as a firefighter is done.\n\n\tRegardless, your experiences the fire service will remain an important part of your life. In less than two years, you learned far more more than just technical emergency services skills; you learned a great deal about yourself.\n\t*goto_scene 13awardparty ending\n\n*else\n\n\t\"${Fname},\" he begins, familiarly. \"I remember when you first started out as a probie, all gung-ho and rearing to go. I wasn't sure whether or not you'd do well, but you were so enthusiastic I thought I'd give you a chance to prove yourself.\"\n\n\t\"But, to be honest, I just don't think it's working out.  Quite frankly, you're a terrible firefighter. In fact, you might be one of the worst firefighters I've ever encountered, and that's saying a lot.\" The Chief actually looks a little impressed. \"I just don't think we have a place for you here.\"\n\n\t*page_break \n\n\tIt seems clear that your time as a firefighter is done.\n\n\tRegardless, your experiences the fire service will remain an important part of your life. In less than two years, you learned far more more than just technical emergency services skills; you learned a great deal about yourself.\n\n\t*goto_scene 13awardparty ending\n\n\n*label TruckFollower\n\nSo you and Probie ${NPname} follow Firefighter Schmidt around to the back of the building where the electrical meter is located. \"All right, you two, \"Schmidt is saying, \"By the time we poke around this smokey building to find the circuit breaker, the fire's gonna get a lot worse. So we're going to save ourselves a lot of time and effort by doing this the old-fashioned way: we're going to pull the meter.\" \n\nBy \"pull the meter,\" she means physically removing the meter from the side of the building to cut off the electricity to the building.\n\n*if (fire_skills > 70) or (relationship_firefighters > 80)\n\tActually, you remember some of the stories about pulling meters, and a few of them involved the dangers of electrocution and some people getting hurt. That could be why this method is considered \"old-fashioned;\" people probably try not to do it anymore, unless there really isn't any other choice.\n\t*goto Meterchoice\n*else\n\t*goto MeterChoice\n\n*label MeterChoice\n\n\"Firefighter ${Lname}, are you feeling up to the task?\" Schmidt asks you this with a challenge in her eye. She knows you're a fairly inexperienced firefighter, after all.\n\nSo [i]are[/i] you feeling up to the task?\n\n*choice\n\t#Yes. I like a good challenge.\n\t\t\"Sure. I'll give it a try,\" you agree, reaching for a pair of wire cutters out of the tool box.\n\n\t\tBut Probie ${NPname} is frowning. \"I'm not sure anybody should be pulling a live meter like that,\" ${NPpronoun1} declares. \"It seems really dangerous.\"\n\n\t\tDo you have second thoughts?\n\t\t*choice\n\t\t\t#No. I focus on the task at hand.\n\t\t\t\t\"It will be okay,\" you insist. \"We need to work quickly, however. The hose team is depending on us.\"\n\t\t\t\t*goto YouPullMeter\n\n\t\t\t#Yes. What ${NPpronoun1} says makes sense.\n\t\t\t\tYou think about it for a moment and then nod. \"Yeah. I think you may be right, ${NPname}.  I'm not sure I'm comfortable messing with a live meter, Schmidt. What if I mess up?\"\n\n\t\t\t\t\"Fine. I'll do it myself,\" Firefighter Schmidt replies, with frustration. \"Get me the wire cutters.\" \n\t\t\t\t*goto SchmidtMeter\n\t\t\n\t#No. I'm not comfortable with that assignment.\n\t\t\"Respectfully, Schmidt,\" you tell the senior firefighter, \"I'm not sure I'm comfortable messing with a live meter. What if I mess up?\"\n\n\t\t\"Fine. I'll do it myself,\" Firefighter Schmidt replies, clearly annoyed with you. \"It's not that complicated.  Get me the wire cutters.\" \n\t\t*page_break\n\t\t*goto SchmidtMeter\n\n\n*label Engine\n\nYou climb into the back of the ladder truck along with five other firefighters, with the driver and Captain Simmons in the front. \n\nLights flashing and sirens blaring, you rush quickly to Downtown Donuts a couple miles away.\n\nA crowd of employees, customers, and gawkers have gathered outside the evacuated donut shop.  You can spot the customers right away because most of them thought to take their donuts and coffee with them when they left.\n\n*page_break\n\nYour company captain, Jennifer Simmons, is in charge of the scene. She is quick to confer with a woman who is probably a manager. \"Sounds like there's heavy smoke in the kitchen,\" she informs the responding firefighters. \" I've radioed for the gas and electric to be shut off, but that'll take a while so I'm going to help the truck company see if we can't find the breaker ASAP.  McCollaugh, hit the hydrant. Schmidt, ${Lname}, ${NPname}, pull a crosslay off the truck and get in there.\"\n*page_break\n\nYou and the others pull the heavy length of hose from the truck and flake it out in an \"S\" pattern toward the front of the building so that it doesn't get tangled. \n\n*if leadership > 60\n\t*set teamposition \"EngineLeader\"\n\t*goto EngineLeader\n*else\n\t*set teamposition \"EngineFollower\"\n\t*goto EngineFollower\n\n*label EngineLeader\n\nIt seems like you're developing somewhat of a reputation for being a leader. Although she is your senior, Schmidt motions for you to take the nozzle of the still uncharged hose line.  She follows as your back-up person, and Probie ${NPname} takes the rear to make sure the hose doesn't get tangled or kinked as you enter the building.\n\nDo you want to have your hoseline charged with water before you enter the building or do you want to wait until you get to the kitchen first?\n*temp hose \"\"\n\n*choice\n\n\t#I'd rather have water now.\n\t\tYou signal McCollaugh to charge the line, and you open the nozzel long enough to bleed out all the air.  All set! Now, however, you have to drag the heavy hoseline with you as you enter the building.\n\t\t*set hose \"charged\"\n\t\t*goto EngineEntrance\n\n\t#I'd rather reach the fire faster and then charge the hoseline.\n\t\tYou opt for greater speed and mobility and figure that will give you more than enough time to charge the hoseline once you find the fire.\n\t\t*goto EngineEntrance\n\t\t*set hose \"notcharged\"\n\n*label EngineEntrance\n\n\"Masks on,\" you say as you step over the threshold of the front entrance to the donut shop. Smoke conditions are worsening by the moment, and you certainly don't want to be breathing any of it into your lungs.\n\n*if fire_knowledge > 70\n\tYou remember from your training and studies that one of the greatest dangers in a commercial building of this type is that the fire could be spreading through the space between the drop ceiling and the light-truss construction of the roof. If it gets hot enough up there and the truss fails at any point, the whole building could collapse. \n\t*goto EntranceChoice\n*else\n\t*goto EntranceChoice\n\n*label EntranceChoice\n*temp CeilingCheck \"\"\nWhat's the first thing you do when you enter?\n\n*choice\n\n\t#Check in with my team members to make sure they're doing okay.\n\t\t\"Scmidt? ${NPname}? You guys doing okay?\" you ask, thoughtfully.\n\n\t\t\"Yeah, I'm fine. Thanks for asking,\" Schmidt replies, a little impatiently.\n\n\t\t\"All good here,\" the probie replies. \n\n\t\t*set leadership %+10\n\t\t*set relationship_firefighters %+10\n\n\t\t*page_break\n\n\t\tFirefighter Schmidt then asks; \"Hey, ${Lname}, do you think maybe we should poke a hole in a ceiling tile and see if anything's up there?\"\n\n\t\tIs that a good idea?\n\n\t\t*choice\n\n\t\t\t#No. We don't have time for that.\n\t\t\t\t\"We have to keep moving,\" you insist. \"The ceiling looks fine,\" you add. Because it does.\n\t\t\t\t*set CeilingCheck \"no\"\n\t\t\t\t*goto Advance\n\t\t\t#Sure. Why not have a look?\n\t\t\t\t\"That's not a bad idea,\" you agree.\n\t\t\t\t*set leadership %+10\n\t\t\t\t*goto CeilingHoles\n\t\t\t\t*set CeilingCheck \"yes\"\n\t\t\t\t*goto Advance\n\n\t#Have one of my team members use a pike poll to poke a hole in the ceiling above.\n\t\tAs you already know, in this sort of a commercial building, it is extremely important to poke some holes through the drop ceiling to make sure that the fire isn't spreading where you can't see it, in the considerable space between the drop ceiling and the light truss roof.\n\n\t\t*set CeilingCheck \"yes\"\n\t\t*goto CeilingHoles\n\t\n\t#Make sure my radio is working properly.\n\t\t\"${Lname} to Command: Radio check,\" you transmit, just to be extra sure that everything is in order.\n\n\t\t\"Command to ${Lname}: you're coming through loud and clear.\"\n\n\t\tWell, that's good to know!\n\n\t\t*page_break\n\n\t\tFirefighter Schmidt then asks; \"Hey, ${Lname}, do you think maybe we should poke a hole in a ceiling tile and see if anything's up there?\"\n\n\t\tIs that a good idea?\n\n\t\t*choice\n\n\t\t\t#No. We don't have time for that.\n\t\t\t\t\"We have to keep moving,\" you insist. \"The ceiling looks fine,\" you add. Because it does.\n\t\t\t\t*set CeilingCheck \"no\"\n\t\t\t\t*goto Advance\n\t\t\t#Sure. Why not have a look?\n\t\t\t\t\"That's not a bad idea,\" you agree.\n\t\t\t\t*set CeilingCheck \"yes\"\n\t\t\t\t*set leadership %+10\n\t\t\t\t*goto CeilingHoles\n\n\n\n\n*label CeilingHoles\n*temp CeilingCheck \"\"\n*page_break\n\nAccordingly, you have Probie ${NPname} use a long 6-foot pike pole to poke a hole in a ceiling tile near the entrance to make sure you will not be walking directly under a hidden inferno.\n\n*set CeilingCheck \"once\"\n*page_break\n\nSo ${NPname} pokes the hole, as instructed, releasing an enormous amount of dust, but you don't see any sign of fire.  \n\nIs that good enough, do you think, or should ${NPpronoun1} keep checking?\n\n*choice\n\n\t#No, that's fine. \n\t\tIf you spend all night poking holes in the ceiling, you're pretty much guaranteed to find fire there eventually since you're not doing anything to actually put it out! It's time to get moving again and you motion for your team to fall in behind you and continue the advance.\n\t\t*goto Advance\n\n\t#Yes, ${NPpronoun1} should keep checking.\n\t\t*set leadership %+20 \n\t\tJust because there's no fire right above the door doesn't mean the fire isn't up there somewhere. And you want to be damn sure you know what's going on up there. Your lives could depend on it.\n\n\t\t\"Probie, as we advance, keep testing the ceiling like that,\" you tell ${NPname}. Schmidt and I can handle the hose on our own for the moment. We need to make sure the fire hasn't spread where we can't see,\" you explain so that ${NPpronoun1} can learn the importance of this check as well.\n\n\t\t*page_break\n\n\t\tSo, as your team advances further into the donut shop, Probie ${NPname} pokes a new hole every 5 feet or so. And, lo and behold, at the 15 foot mark, the hole in the ceiling creates a window to a flicker of boiling orange flames. \n\n\t\t\"Shit,\" you mutter in a heartfelt sort of way. Then what do you do?\n\n\t\t*choice\n\t\t\t#I radio the CO for instructions.\n\t\t\t\t\"${Lname} to command,\" you say upon activating your radio.\n\n\t\t\t\t\"Simmons here,\" comes the swift reply.\n\n\t\t\t\t\"Captain, we just discovered heavy fireload above the drop ceiling. Request further instructions.\"\n\n\t\t\t\t\"Above the ceiling? Get your team out of there. Now.\" The Captain's tone sounds urgent. \n\n\t\t\t\t*page_break\n\n\t\t\t\tA second later, her voice comes over the radio again, calling the driver of the engine. \"Blow the horn. Sound the evacuation tones.\" \n\n\t\t\t\tYou hear the loud air horn of the engine blowing three times consecutively, a pause, and then three times again.\n\n\t\t\t\tBy that time, you and your team are almost to the door, taking the hose with you as you go. Then you are outside, putting distance between yourselves and the building. \n\n\t\t\t\t*goto Evacuation\n\n\t\t\t#I get my team out of there!\n\t\t\t\t*set leadership %+20\n\n\t\t\t\tThe moment you see the fire above your head, you don't hesitate for a moment. \"We're getting out of here. Now. Keep the hose with us.  Hurry now.\" \n\n\t\t\t\tHearing the tone of your voice, nobody asks any questions.  You retreat quickly and efficiently.\n\n\t\t\t\t*page_break\n\n\t\t\t\tOnce your team is safely out of the building, you radio the CO: \"${Lname} to command,\" you say upon activating your radio.\n\n\t\t\t\t\"Simmons here,\" comes the swift reply.\n\n\t\t\t\t\"Captain, we discovered heavy fireload above the drop ceiling. I got my team out of there.\"\n\n\t\t\t\t\"Roger that,\" the Captain replies.\n\n\t\t\t\t*page_break\n\n\t\t\t\tA second later, her voice comes over the radio again, calling the driver of the engine. \"Blow the horn. Sound the evacuation tones.\" \n\n\t\t\t\tYou hear the loud air horn of the engine blowing three times consecutively, a pause, and then three times again.\n\n\t\t\t\tShortly thereafter, the truck company team comes running out from inside the building.\n\t\t\t\t\n\t\t\t\t*goto Evacuation\n\n\t\t\t#I put water on the fire. That's why I'm here.\n\t\t\t\t*if hose = \"notcharged\"\n\t\t\t\t\tYou radio for the driver of the engine to charge the hose line. Soon, you feel the reassuring weight of the water expand and fill the hose you hold firmly in your arms.  You open the nozzle slowly until the air bleeds out. Now you're ready to get to work.\n\t\t\t\t\t*goto HoseCeiling\n\t\t\t\t*elseif hose = \"charged\"\n\t\t\t\t\t*goto HoseCeiling\n\n\n\t\t\t\n*label HoseCeiling\n\nYou open the nozzle fully and turn a powerful stream of water up to the ceiling just ahead of you, breaking through numerous ceiling tiles and allowing you to reach the flames above.  Billows of steam join the dark smoke in the room and water from your hoseline rains down from above. You are aware of Firefighter Schmidt right behind you, backing you up and helping to keep the hose steady.\n\n*goto McCollaughWarning\n\n*label McCollaughWarning\n\n*page_break\n\nThen, while you are working, the radio crackles to life with a voice: \n\n\"McCollaugh to Captain Simmons.\"\n\n\"Go ahead, McCollaugh,\" comes Simmons voice.\n\n\"Captain, there's smoke venting from the roof of the building. I recommend you get the hell out of there.\" McCollaugh speaks with the voice of experience, having 20+ years in the fire service.\n\n*page_break\n\nA second later, Captain Simmons' voice comes over the radio again, calling the driver of the engine. \"Blow the horn. Sound the evacuation tones.\" \n\nYou hear the loud air horn of the engine blowing three times consecutively, a pause, and then three times again.\n\n*if teamposition = \"EngineLeader\"\n\t*goto LeaderQuestions\n*elseif teamposition = \"EngineFollower\"\n\t*goto FollowerEvacuation\n\n*label LeaderQuestions\n\nWhat do you do?\n\n*choice\n\t#I get my team out of there ASAP!\n\t\tOnce the evacuation tones sound, you don't hesitate. You don't even take a moment to think. You inform your team, and together you head for the door. \n\n\t\tIn fact, you almost make it there when the ceiling starts to buckle in from above. \"RUN!\" you yell to the others right before you feel a crushing pain and everything goes black.\n\n\t\t*goto Hospital\n\n\t#I'm in the building. I know it's not that bad. I stay.\n\t\tYou genuinely feel like conditions inside the building are bad enough to warrant an evacuation. So you make the call to stay and try to get a handle on the fire from here.\n\n\t\tHowever, Firefighter Schmidt doesn't agree. \"You hear those tones?\" she yells over all the noise. \"That means we get our asses out of here NOW. No debate. Let's go!\" She doesn't seem willing to be flexible on this point, and arguing in the middle of a burning building would, quite frankly, be stupid. \n\n\t\t*page_break\n\n\t\tSo you and your team rush for the door.\n\n\t\tYou even almost make it there when the ceiling starts to buckle in from above. \"RUN!\" you yell to the others right before you feel a crushing pain and everything goes black.\n\t\t\n\t\t*set leadership %-20 \n\t\t*goto Hospital\n\t\t\n\t#I radio for more information.\n\t\tThat's strange. It doesn't seem that bad in there to you. So you radio command for more informations.\n\n\t\t\"${Lname} to command.  What's going on?\"\n\n\t\t\"${Lname}, get your team out of there! The building could collapse any moment now!\" Captain Simmons replies with great urgency. Her tone makes you think this might not be the best time to ask a lot of questions.\n\n\t\t\"10-4,\" you reply simply. And, with that, you urge your team toward the door.\n\n\t\t*page_break\n\n\t\tYou even almost make it there when the ceiling starts to buckle in from above. \"RUN!\" you yell to the others right before you feel a crushing pain and everything goes black.\n\t\t\n\t\t*set leadership %-20 \n\t\t*goto Hospital\n\n\n*label Hospital\n*page_break\n*set SchmidtDead true\nYou wake up groggy to fluorescent lighting and the smell of strong disinfectant. Something is beeping. You can hear voices in the distance. \n\nAre you in the hospital?\n\n*if SO = \"yes\"\n\t${SOname}'s voice. You hear ${SOpronoun3} calling your name. \"${Fname}? Are you awake? Oh! Thank goodness! Don't try to talk, my dear. There's a tube in your throat. Let me ring for the nurse.\"\n\t*goto HospitalExplanation\n*else\n\tYour mother's voice. You hear her calling your name. \"${Fname}? Are you awake? Oh! Thank goodness! Don't try to talk, sweetheart. There's a tube in your throat. Let me ring for the nurse.\"\n\t*goto HospitalExplanation\n\n*label HospitalExplanation\n*page_break\n\nSo you [i]are[/i] in the hospital. The nurse has to explain the situation to you several times because whatever medicine they are giving you for the pain makes it difficult to remember what they are saying.\n\nAt some point the doctor arrives to remove your breathing tube. You gag and choke, but it is over with very quickly. Afterwards, things get a little better.\n\n*page_break\n\nYou are made to understand that you have two broken ribs, a broken arm, and a serious concussion. One of your lungs had collapsed. It feels like you have bruises everywhere, but the doctors assure you that you're going to be just fine eventually.\n\nApparently, the whole damn building had collapsed on you and your team. \"You're lucky to be alive,\" they say. \n\n\"How are the others?\" you ask. They turn away without answering.\n\n*page_break\n\nEventually, someone tells you that Probie ${NPname} is just fine and suffered only a few scrapes and bruises.  Firefighter Schmidt, however is dead. By the time the Rapid Intervention Team (RIT) pulled the three of you from the burning rubble, it was too late to save her.\n\n\nHow do you feel about what happened?\n\n*choice\n\t#Numb. I feel numb.\n\t\tIt doesn't seem real. How could this have happened? It's all one horrible nightmare. You hope it will all go away soon.\n\t\t*goto HospitalRelease\n\n\t#Guilty. She's dead because of me.\n\t\tYou should have left the building sooner. Why didn't you? Why were you so stupid? In your eyes, this is all your fault. You killed her. You are to blame.\n\t\t*goto HospitalRelease\n\n\t#Angry. This is unacceptable.\n\t\tHow were you supposed to know conditions were going to deteriorate so quickly? One minute everything seemed fine, and the next -- you were almost at the door, for goodness sake! It's not fair! It's not right! \n\t\t*goto HospitalRelease\n\n*label HospitalRelease\n\nIn a couple days, you are released from the hospital with a good amount of pain medicine and a lot of follow-up instructions, including several appointments with doctors and a physical therapist.\n\nYou learn from your fellow firefighters that Firefighter Schmidt's memorial service will be in a couple days, on Saturday.\n\n*goto FuneralQuestion\n\n*label Evacuation\n\nJust in time! First, thick smoke begins pouring up through holes that are melting through the roof. Less than a minute later, the light-weight metal trusses holding up the roof of the donut shop start to bend and fail in the enormous heat of the fire. \n\nThe building collapses in on itself, consumed in a mass of hungry, raging flames.\n\n*page_break\n\nFortunately, everyone has evacuated safely. The operation switches smoothly to a \"surround and drown,\" meaning that the fire is extinguished by hose lines from the outside only. One hose is pre-set-up to spray water down from an aerial ladders. Others are managed on the ground by engine company teams, with extra assistance from truck company members.\n\nIt's a long evening and a lot of work, but, at the end of the day, everyone went home and it was another job well done.\n*finish\n\n\n*label Advance\n*page_break\n\nYou and your team make your way through the public area of the shop. You can clearly see the black smoke rolling and billowing up toward the ceiling from somewhere in the kitchen. The three of you head in that direction, past the counter, pulling the hose along as you go.\n\nConditions in the kitchen are pretty hot. From the look of things,  you would guess the fire started in one of the commercial appliances, but, at this point, it has spread to the wall, and, worse yet, up into the ceiling. \n\nWhat do you do?\n\n*choice\n\t#We put out the fire. That's why we're here.\n\t\t*if hose = \"notcharged\"\n\t\t\tYou radio for the driver of the engine to charge the hose line. Soon, you feel the reassuring weight of the water expand and fill the hose you hold firmly in your arms.  You open the nozzle slowly until the air bleeds out. Now you're ready to get to work.\n\t\t\t*goto HoseKitchen\n\t\t*elseif hose = \"charged\"\n\t\t\t*goto HoseKitchen\n\n\t\t*goto HoseKitchen\n\t\t*comment -- Above goto for RandomTest --\n\n\t#We get the heck out of there!\n\t\tThere's no shame in a strategic retreat! You confidently feel that you and your team are in way over your heads. Something doesn't feel right. You motion to your team members and bravely head for the door.\n\n\t\tYou even almost make it there when the ceiling starts to buckle in from above. \"RUN!\" you yell to the others right before you feel a crushing pain and everything goes black.\n\t\t\n\t\t*goto Hospital\n\n\t#I radio command to report the situation.\n\t\t\"${Lname} to command,\" you say upon activating your radio.\n\n\t\t\"Simmons here,\" comes the swift reply.\n\n\t\t\"Captain, the kitchen's pretty hot at this point. The whole wall is burning and the fire's going up into the ceiling. I'm not sure how far Request further instructions.\"\n\n\t\t\"Above the ceiling? Get your team out of there. Now.\" The Captain's tone sounds urgent. \n\n\t\t*page_break\n\n\t\tA second later, her voice comes over the radio again, calling the driver of the engine. \"Blow the horn. Sound the evacuation tones.\" \n\n\t\tYou hear the loud air horn of the engine blowing three times consecutively, a pause, and then three times again.\n\n\t\tAnd, with that, you urge your team toward the door.\n\n\t\t*page_break\n\n\t\tYou even almost make it there when the ceiling starts to buckle in from above. \"RUN!\" you yell to the others right before you feel a crushing pain and everything goes black.\n\t\t\n\t\t*set leadership %-20 \n\t\t*goto Hospital\n\n*label HoseKitchen\n\nThere's fire here, and you have water you can use to put it out. It's as simple as that. With the other two backing you up, you hit the fire with a steady, powerful stream. You make sure to cool the entire room off as well, directing your hose stream in clockwise loops to lower the ambient temperature. \n\nThe fire hisses angrily, large visible portions of it shifting to steam as they are struck with water.\n\nThis is what you trained to do! This is real work!\n\n*page_break\n\nEverything is going very well, until, of course, it isn't.  At first, you notice something odd about the ceiling. It looks like it's starting to warp.\n\n*goto McCollaughWarning\n\n*label EngineFollower\n\nFirefighter Schmidt, being the most senior firefighter in the group, naturally takes the lead.  You follow as her back-up person, and Probie ${NPname} takes the rear to make sure the hose doesn't get tangled or kinked as you enter the building.\"\n\nMasks on,\" she says as you step over the threshold of the front entrance to the donut shop. Smoke conditions are worsening by the moment, and you certainly don't want to be breathing any of it into your lungs.\n\n*if fire_knowledge > 60\n\tYou remember from your training and studies that one of the greatest dangers in a commercial building of this type is that the fire could be spreading through the space between the drop ceiling and the light-truss construction of the roof. If it gets hot enough up there and the truss fails at any point, the whole building could collapse. \n\t*goto KnowledgeableSuggestions\n*else\n\t*goto Suggestions\n\n*label Suggestions\n\nAs you peer through your mask at the smoke-filled donut shop, you have a strong feeling that your team should be doing something other than heading straight for the kitchen where the fire is located.\n\nWhat do you think your team is forgetting?\n\n*choice\n\n\t#Schmidt should have tested her radio to make sure it works.\n\t\tYou strongly feel that Firefighter Schmidt ought to have made sure her radio was charged and tuned into the correct frequency before leading this team into the burning building.\n\n\t\tDo you tell her so?\n\t\t*choice\n\t\t\t#Um. No. It either works or it doesn't at this point.\n\t\t\t\tThat's a valid point. So you don't say anything and continue further into the building.\n\t\t\t\t*goto Advance2\n\n\t\t\t#Yes, of course. She can still test it.\n\t\t\t\t\"Schmidt,\" you call, tapping her on the shoulder.\n\n\t\t\t\t\"What?\" she replies loudly so as to be heard through her mask.\n\n\t\t\t\t\"Did you test your radio?  Is it okay?\"\n\n\t\t\t\t*page_break\n\n\t\t\t\t\"Uh. Yeah, it's fine, ${Lname}. I tested it a few minutes ago. Unless you know something I don't?\"\n\n\t\t\t\t\"No,\" you say, shaking your head. \"Sorry. I was just checking.\"\n\n\t\t\t\tYour team continues further into the donut shop.\n\t\t\t\t*goto Advance2\n\n\t#The probie should have brought in a set of irons (firefighter's ax and halligan) just in case.\n\t\tSo you think the probie should have brought more tools into this fire. Do you say something about it?\n\n\t\t*choice\n\n\t\t\t#No. It's too late now.\n\t\t\t\tThere's no point going back when you're already masked up and inside. So you don't say anything and continue further into the building.\n\t\t\t\t*goto Advance2\n\n\t\t\t#Yes. Absolutely. It's important.\n\t\t\t\t\"Hey, Probie,\" you call to ${NPname} who is behind you.\n\n\t\t\t\t\"Yeah?\" ${NPpronoun1} replies, ${NPpronoun2} voice muffled through ${NPpronoun2} mask.\n\n\t\t\t\t\"You forgot to bring a set of irons,\" you inform ${NPpronoun3}.\n\n\t\t\t\t\"I didn't know I needed that!\" \n\n\t\t\t\t\"$!{NPpronoun1} doesn't,\" Schmidt interrupts. \"Now quit chatting.  Let's do our job, shall we?\"\n\n\t\t\t\tYour team continues further into the donut shop.\n\t\t\t\t*page_break\n\t\t\t\t*goto Advance2\n\n\t#We forgot to silence the fire alarm. The sound is awful.\n\t\t\tThat annoying sound keeps shrieking in your ears. Obviously there's a fire! Didn't anyone think to turn off the alarm?\n\n\t\t\tDo you complain about it?\n\n\t\t\t*choice\n\n\t\t\t\t#No. What's the point?\n\t\t\t\t\tTrue. Everyone else has to hear it too, after all, and pointing it out isn't going to make it any better.  So you don't say anything and continue further into the building with your team.\n\t\t\t\t\t*goto Advance2\n\n\t\t\t\t#Yes. I refuse to suffer in silence!\n\t\t\t\t\t\"Ugh!\" you declare dramatically, loudly enough to be heard through the masks. \"Why don't they turn off that horrible sound? It's killing my ears!\"\n\n\t\t\t\t\tSchmidt doesn't seem impressed. \"We all have to hear it, and now we have to hear you whining too. Do you want me to call you a wah-mbulance, or can we continue with our work?\"\n\n\t\t\t\t\tYou glare at her, but luckily she can't see your expression, given the circumstances. Sullenly, you focus on the task at hand, and your team continues further into the donut shop.\n\t\t\t\t\t*set relationship_firefighters %-10\n\t\t\t\t\t*goto Advance2\n\n\n*label KnowledgeableSuggestions\n*page_break\n\nMaybe Schmidt doesn't realize this or remember it herself because she doesn't seem to be giving any orders regarding checking above the ceiling. Maybe she intends to do it further into the room, but you'd kind of like to know what you're walking into from the start.\n\nDo you bring it up?\n\n*choice\n\n\t#No. Schmidt has more experience than I do. She knows what she's doing.\n\t\tYou don't say anything for now. Firefighter Schmidt most assuredly has done this before and knows more than you do. So you should watch and learn. Besides, this isn't really an appropriate moment for conversation.\n\t\t*goto Advance2\n\n\t#Yes. Better to ask now than be sorry later.\n\t\tYou decide this is important enough to mention.\n\n\t\t\"Hey, Schmidt,\" you call out, casually, \"do you think maybe we should poke a hole in a ceiling tile and see if anything's up there?\"\n\n\t\t\"Yeah, we should probably do that,\" Schmidt agrees.\n\t\t*set leadership %+10\n\t\t*goto CeilingHoles2\n\n*label CeilingHoles2\n*temp CeilingCheck \"\"\n*page_break\n\nAccordingly, she has Probie ${NPname} use a long 6-foot pike pole to poke a hole in a ceiling tile near the entrance to make sure you will not be walking directly under fire without realizing it.\n\n*set CeilingCheck \"once\"\n*page_break\n\nSo ${NPname} pokes the hole, as instructed, releasing an enormous amount of dust, but you don't see any sign of fire.  \n\n\"Looks good,\" Schmidt agrees. \"Let's keep moving.\"\n\nIs that good enough, do you think, or should ${NPpronoun1} keep checking?\n\n*choice\n\t#No, that's fine. \n\t\tThe probie checked. There was no fire. It should be fine. You focus once more on backing Schmidt up on the hoseline so you can go put out the actual fire before it gets any worse.\n\t\t*goto Advance2\n\n\t#Yes, he should keep checking.\n\t\t\"Shouldn't we check the ceiling a few more times?\" you suggest to Firefighter Schmidt as your team advances.\n\n\t\t\"Look, ${Lname},\" she replies, matter-of-factly. \"If we spend all night poking holes in the ceiling, we're pretty much guaranteed to find fire there eventually since we're not doing anything to actually put it out! Let's keep moving.\"\n\t\t*set leadership %+10\n\t\t*goto Advance2\n\n*label Advance2\n\nYour team makes its way through the public area of the shop. You can clearly see the black smoke rolling and billowing up toward the ceiling from somewhere in the kitchen. The three of you head in that direction, past the counter, pulling the hose along you as you go.\n\nConditions in the kitchen are pretty hot. From the look of things,  you would guess the fire started in one of the commercial appliances, but, at this point, it has spread to the wall, and, worse yet, up into the ceiling. \n\n*page_break\n\nAs is your purpose here, you begin to fight this fire. Schmidt opens up the nozzle and begins\nputting water on the flames. She makes sure to cool the entire room off as well, directing the hose stream in counter-clockwise loops to lower the ambient temperature. \n\nWhat do you do?\n\n*choice\n\n\t#I stay behind her, providing steady back-up on the hose.\n\t\tYou are the back-up person so you back up the nozzleman, exactly as you're supposed to be doing. It would be extremely difficult, after all, for a firefighter to control a hose stream on their own. You can feel the heavy hose fight you both, wanting to thrash about with the pressure of the water, but you hold the thing steady as Schmidt steadily drowns out sections of flaming kitchen.\n\t\t*goto McCollaughWarning\n\t\t*set relationship_firefighters %+10\n\n\t#I helpfully point out places I think she's missed.\n\t\t\"Schmidt, what about over there, by the fridge?\" you suggest, trying to be helpful. A few moments later, you point out, \"You missed a part, up there in the corner.\" And then, \"Oh, watch those burning embers on the floor!\"\n\n\t\tAt this point, Schmidt snaps, \"Shut it, ${Lname}. I got this.\" You take the hint that you're being annoying and let your team work in peace.\n\t\t*set relationship_firefighters %-10\n\t\t*goto McCollaughWarning\n\n\t#I let the probie take my place and step aside to see if I can figure out how far the fire has spread.\n\t\t\"I wonder how far this has spread...\" you wonder, curiously. \"Here, Probie. Back Schmidt up a moment, would you?\" You make sure that ${NPname} has the hose firmly in ${NPpronoun2} grasp, and then you take a few steps over toward one side of the kitchen.\n\n\t\t\"Where the hell are you going, ${Lname}?\" Schmidt yells after you to be heard over the sound of the water and fire. \"Are you trying to get yourself hurt? Get back to the hoseline and out of the way of the water!\"\n\n\t\tYou feel a little embarrassed and quickly return to the hoseline, this time taking up a place behind Probie ${NPname} as your team continues to fight this fire.\n\t\t*set relationship_firefighters %-20\n\t\t*goto McCollaughWarning\n\n*label FollowerEvacuation\n\nOnce the evacuation tones sound, nobody hesitates. You don't even take a moment to think. You've had this drilled into you a hundred times in training. Once you hear those horns, your team heads straight for the door. \n\nAnd, in fact, you almost make it there when the ceiling starts to buckle in from above. \"RUN!\" Schmidt yells right before you feel a crushing pain and everything goes black.\n\n*goto Hospital\n\n\n*label FireHouse\n\nSo the next day, after work, you head to the firehouse, as you often do, just to see what's going on and to verify that your gear is in working condition.  You hear voices in the rec room so you stop by to say hello.\n\n\"Hey, ${Lname},\" they greet you. \n\n\"Where were you last night?\" Gina Zlenko wonders, cheerfully, \"You missed a big one!\" She's a newer firefighter, and you don't know her very well.\n\nWhere do you say you were?\n\n*choice\n\n\t#It's none of their business.\n\t\t\"What's it to you?\" you reply, clearly annoyed. \n\n\t\t\"Hey. Easy now,\"  Zlenko replies, raises her hands defensively. \"I didn't mean to hit a sore spot.\" \n\n\t\t\"Downtown Donuts,\" Juan Velez explains, curtly. \"There was a big fire. Building was a total loss.\"\n\n\t\tThe conversation has become awkward now that you've brought your attitude into it. So people start to wander off.  \n\n\t\t\"Catch you later,\" Velez says to you as he heads off as well. You finish checking your gear and go home. You didn't really want to talk to those people anyway.\n\n\t\t*set relationship_firefighters %-20\n\t\t*goto Warning\n\n\t#I had a hot date!\n\t\t*if SO = \"yes\"\n\t\t\t\"It was ${SOname}'s and my anniversary,\" you explain. \"I didn't want to let ${SOpronoun3} down. What happened?\"\n\n\t\t\t*goto FireExplanation\n\n\t\t*else\n\t\t\t\"I had a special date,\" you report with a not-so-subtle wink. \"So I was otherwise occupied. What happened?\"\n\n\t\t\t*goto FireExplanation\n\n\t#I was \"busy.\"\n\t\tYou don't really feel comfortable discussing your personal life with these people so you shrug a bit. \"I was busy,\" you say noncommittally. \"What happened?\"\n\n\t\t*set relationship_firefighters %-10\n\n*label FireExplanation\n\n\"Downton Donuts,\" Juan Velez explains. \"There was a big fire. Building was a total loss.\"\n\nSchmidt shakes her head, \"I thought for sure someone was going to get hurt or worse when that building collapsed.\"\n\nGina Zlenko, a newer firefighter, looks wide-eyed about it, \"That's the worst fire I've seen by far. Those flames must have been 40-feet in the air at one point.\"\n\n\"At least,\" Velez agrees. \"It was a hot one, that's for sure. We ended up doing a surround and drown operation after the roof caved in. Thankfully we got everyone out of there in time.\"\n\nWhat do you have to say about it?\n\n*choice\n\n\t#I'm sorry I missed it.\n\t\t\"Yeah, I'm sorry I wasn't there to help out,\" you say with genuine regret. \"It sounds like everything worked out okay though. I look forward to hearing more about it sometime!\"\n\n\t\t\"We'll have more time to talk after drill night on Tuesday,\" Velez says, patting your shoulder. \"I don't know about you guys, but it's time for me to go home and eat dinner.\" \n\n\t\tEveryone says their goodbyes at that point and goes on their separate ways.\n\t\t*set relationship_firefighters %+10\n\t\t*goto Warning\n\n\t#I'm grateful everyone is okay.\n\t\t\"Wow. That sounds pretty crazy,\" you agree. \"I'm really glad no one was hurt.  I look forward to hearing more about it sometime!\"\n\n\t\t\"We'll have more time to talk after drill night on Tuesday,\" Velez says, patting your shoulder. \"I don't know about you guys, but it's time for me to go home and eat dinner.\" \n\n\t\tEveryone says their goodbyes at that point and goes on their separate ways.\n\t\t\n\t\t*set relationship_firefighters %+10\n\t\t*goto Warning\n\t\t\n\t#I'm glad I wasn't there.\n\t\t\"That sounds horrible,\" you say, wincing as you imagine it. \"I'm so glad I wasn't part of that mess.\" Your declaration earns you some odd looks.\n\n\t\t\"You are a firefighter, you know,\" Velez points out. \"Someone who's [i]supposed[/i] to fight fires.  If you don't like it, you can always do something else.\"\n\n\t\tYou really don't know how to respond to that, but it makes you think.  At that point, the conversation has become somewhat awkward so people start to wander off.  \n\n\t\t\"Catch you later,\" Velez says to you as he heads off as well. You finish checking your gear and go home.\n\t\t*set relationship_firefighters %-20\n\t\t*goto Warning\n\n\n*label Suspended\n\nAh, but you're suspended, -- remember? Why do you even have your pager on, anyway?\n*page_break\n\n*if SO \n\n\tYou turn it off now, looking pained about it, but ${SOname} kisses a smile back onto your lips and, for several hours, you forget about the fire department and anything beyond the scope of this one room and the one person who fills all your senses with delight.\n\n\tYou spend the whole night with ${SOname}, and let's just say you get very little sleep for all the most wonderful reasons. What a great anniversary celebration!\n\t*page_break\n\t*goto SuspendedExplanation\n\n*else\n\n\t\"What's that?\" ${Dname} asks, both startled and curious.\n\n\t\"That's my pager. I'm a firefighter,\" you reply, simply.\n\n\t\"That's sexy,\" ${Dname} declares. \"But please tell me you don't have to leave.\"\n\n\t*page_break\n\n\t\"Tonight, I'm your firefighter,\" you whisper, with feeling. It's not like you can respond on that call anyway so you might as well make the most of it.\n\n\t${Dpronoun1} smiles, pleased. \"My firefighter. I like that.\"\n\n\tYou turn off your pager. Most likely that was just another false alarm anyway. With no further delay, you wrap ${Dpronoun3} in your arms once again and lose yourself in another kiss.\n\n\tYou spend the whole night with ${Dname}, and let's just say you get very little sleep for all the most wonderful reasons. What an amazing first date!\n\n\t*goto SuspendedExplanation\n\n*label SuspendedExplanation\n\nThe next day you happen to see Probie ${NPname} at the Great Groceries supermarket.\n\n\"Hey, ${Lname}. How are you doing? You missed a big fire last night,\" ${NPpronoun1} informs you.\n\n\"Call me, ${Fname}, Probie,\" you reply. \"We're in a store, after all. What happened?\"\n\n*page_break\n\n\"Sure thing, ${Fname}.  Maybe I can get you to call me by my first name too?\" ${NPpronoun1} replies, with a grin.\n\nDo you know what ${NPpronoun2} first name is?\n\n*choice\n\t\n\t#Avery\n\t\t\"Sure thing, Avery,\" you reply, agreeably. \"So what happened with that fire?\"\n\n\t\t*set NPFname \"Avery\"\n\t\t*goto ProbieExplanation\n\n\t#Jamie\n\n\t\t\"Sure thing, Jamie,\" you reply, agreeably. \"So what happened with that fire?\"\n\n\t\t*set NPFname \"Jamie\"\n\t\t*goto ProbieExplanation\n\n\t#Morgan\n\n\t\t\"Sure thing, Morgan,\" you reply, agreeably. \"So what happened with that fire?\"\n\n\t\t*set NPFname \"Morgan\"\n\t\t*goto ProbieExplanation\n\n\t#None of the above.  \n\t\t*goto NPTextName\n\n\t#I don't remember.\n\t\t\"I'm sorry,\" you say, somewhat sheepishly. \"I've always called you 'Probie' or '${NPname}'' or 'Probie ${NPname}'.  I don't think I even know what your first name is!\"\n\n\t\t\"That's quite all right,\" ${NPpronoun1} replies good-naturedly. \"My name is Sam.\"\n\n\t\tYou offer your hand for a handshake. \"Nice to meet you, Sam.  So what happened with that fire?\"\n\t\t*set NPFname \"Sam\"\n\t\t*goto ProbieExplanation\n\n*label NPTextName\n\nOkay!  What's ${NPpronoun2} name, then?\n\n*input_text NPFname\n*comment capitalization check\n*if (\"${NPFname}\" != \"$!{NPFname}\")\n\tSo the probie's first name is $!{NPFname}. Is that correct?\n\t*choice\n\t\t#Yes. $!{NPFname}.\n\t\t\tGot it. Thanks.\n\t\t\t*set NPFname \"$!{NPFname}\"\n\t\t\t*page_break\n\n\t\t\t\"Sure thing, ${NPFname}, \" you reply, agreeably. \"So what happened with that fire?\"\n\t\t\t*goto ProbieExplanation\n\t\t#No, my name is ${NPFname}, just as I typed it before.\n\t\t\tOkay. I was just checking!\n\n\t\t\t*page_break\n\n\t\t\t\"Sure thing, ${NPFname}, \" you reply, agreeably. \"So what happened with that fire?\"\n\n\t\t\t*goto ProbieExplanation\n\t\t#Oops. That's not right! Let me try that again!\n\t\t\t*goto NPTextName\n\n*label ProbieExplanation\n*page_break\n\n\"Did you hear anything about it?\" ${NPFname} wonders. \"It was at Downtown Donuts on Main Street. The whole roof ended up collapsing.\" ${NPpronoun1} shakes ${NPpronoun2} head. \"That was crazy. We're so lucky no one got hurt.\"\n\nWhat do you have to say about it?\n\n*choice\n\n\t#I'm sorry I missed it.\n\t\t\"Wow. I'm sorry I couldn't have been there to help out,\" you say with genuine regret. \"It sounds like everything worked out okay though.\"\n\n\t\t\"Yeah, it was fine,\" ${NPFname} affirms. \"Just the biggest fire I've seen so far. It was really something. Hey, I'll catch you later, okay? My ice cream is going to melt.\"  ${NPpronoun1} grins and points to the container of rocky road ice cream in ${NPpronoun2} cart.\n\n\t\t\"No worries,\" you reply.  \"See you around.\"  Then you go your separate ways to finish your shopping.\n\t\t*set relationship_firefighters %+10\n\t\t*finish\n\n\t#I'm glad everyone is okay.\n\t\t\"Wow. That sounds pretty crazy,\" you agree. \"I'm really glad no one was hurt.\"\n\n\t\t\"Yeah, it was fine,\" ${NPFname} affirms. \"Everyone was fine.  It was just the biggest fire I've seen so far. It was really something. Hey, I'll catch you later, okay? My ice cream is going to melt.\"  ${NPpronoun1} grins and points to the container of rocky road ice cream in ${NPpronoun2} cart.\n\n\t\t\"No worries,\" you reply.  \"See you around.\"  Then you go your separate ways to finish your shopping.\n\t\t\n\t\t*set relationship_firefighters %+10\n\t\t*finish\n\t\t\n\t#I'm glad I wasn't there.\n\t\t\"That sounds horrible,\" you say, wincing as you imagine it. \"I'm so glad I wasn't part of that mess.\" Your declaration earns you some odd looks.\n\n\t\t\"Really?\" ${NPFname} seems surprised. \"I think you would have been able to help out a lot. That was the biggest fire I've seen so far. It was really something. Hey, I'll catch you later, okay? My ice cream is going to melt.\"  ${NPpronoun1} grins and points to the container of rocky road ice cream in ${NPpronoun2} cart.\n\n\t\t\"No worries,\" you reply.  \"See you around.\"  Then you go your separate ways to finish your shopping. \"\n\t\t*set relationship_firefighters %-10\n\t\t*finish\n\n\n*label Warning\n\n*page_break\n\n\n*if (responses \u003c= 3) and (warning = 0)\n\n\tSometime in the afternoon, your hear from your lieutenant.\n\n\t\"So, ${Lname},\" he begins after the usual formalities. \"As I'm sure you're aware, in order to remain active firefighters, department members have to maintain a certain quota of alarms they attend. You missed that big fire last night, I noticed. I'm keeping an eye on your quota, and it's a little below the minimum requirement now.  Anything going on that I should know about?\"\n\t*goto Reply\n\n*elseif (responses \u003c= 3) and (warning = 1)\n\n\tLater in the afternoon, you hear from your lieutenant again. He doesn't sound very happy.  \"So I was looking at the quota just now, and it looks like you're not really doing any better with responses than last time we spoke. Is there anything you'd like to tell me?\"\n\t*goto Reply2\n\n*else\n\t*if relationship_officers > 45\n\t\tYour Lieutenant calls you later that day in the afternoon. \"Hey, ${Lname}. I hate to have to tell you this, but you have three warnings on your record now, and you know what that means. You have a lot of potential so it's a darn shame, but I understand if you have different priorities in your life right now. It happens. Just drop off your ID card, keys, and pager at the firehouse sometime in the next few days. I'm sorry it didn't work out.\"\n\n\t\tAre you really surprised? Firefighters are supposed to respond to emergencies, and you were never able to fit that into your busy schedule. Perhaps you're just not meant to volunteer in emergency services at this point in your life.\n\n\t\tAnd so ended your time as a volunteer firefighter.\n\t\t*goto_scene 13awardparty ending\n\t\t\n\t*else\n\t\tYour Lieutenant calls you later that day in the afternoon. You haven't been very pleasant to him so he doesn't feel the need to be overly pleasant to you. \"Come to the fire house this evening and drop off your ID card and pager,\" he says, nevertheless sounding generally unhappy to be having this conversation. \"That's three warnings on your record now. So you're out. I'm sorry. We'll see you later when you turn in your stuff.\"\n\n\t\tAre you really surprised? Firefighters are supposed to respond to emergencies, and you were never able to fit that into your busy schedule. To top, you have a really crappy attitude about it all. Perhaps you're just not meant to volunteer in emergency services at this point in your life or maybe ever.\n\n\t\tAnd so ended your time as a volunteer firefighter.\n\t\t*goto_scene 13awardparty ending\n\n\n*label Reply\n\nHow do you reply?\n\n*choice\n\n\t#\"I'm sorry, Lieutenant.  I've just been really busy lately. I'll try to do better.\"\n\t\t*if relationship_officers > 45\n\t\t\tYou apologize, and the Lieutenant seems sympathetic.  \"We all get busy from time to time. Just try to make some more of these alarms -- okay?  I have to write you down for a warning because that's the policy, but I'm confident you'll be more involved from this point on.\"\n\n\t\t\t\"I'll make a point of it,\" you promise.\n\t\t\t*set warning +1\n\t\t\t*finish\n\t\t*else\n\t\t\tThe Lieutenant doesn't seem moved by your apology. \"We're all busy, kid.  If being part of the fire department is important to you, then you have to learn to make it a priority.  Now, the policy is that I have to issue you a warning. Try to do better from now on -- okay?\"\n\n\t\t\t\"I'll try to do better,\" you promise.\n\t\t\t*set warning +1\n\t\t\t*finish\n\n\t#\"I've having some trouble balancing all my priorities. I'm not sure how to manage it.\"\n\t\t*if relationship_officers > 45\n\t\t\tThe Lieutenant seems to appreciate your honesty.  \"It's not always easy finding time for everything,\" he sympathizes. \"Sometimes it takes a while to work it all out and get your friends and family and workplace to understand that you can't be in two places at once.  You're a good kid, however; I'm confident you'll figure it out.  Just let me know if you ever need to talk.\n\n\t\t\t\"Oh, and I have to write you down for a warning because that's the policy, but just try to make some more of these alarms -- okay?\"\n\n\t\t\t\"I'll make a point of it,\" you promise.\n\t\t\t*set warning +1\n\t\t\t*finish\n\t\t*else\n\t\t\tThe Lieutenant doesn't seem to care about your trials and woes. \"We all have jobs and family, kid. If being part of the fire department is important to you, then you have to learn to make it a priority.  Now, the policy is that I have to issue you a warning. Get your stuff sorted out and try to make some more of these alarms.\"\n\n\t\t\t\"I'll try,\" you promise.\n\t\t\t*set warning +1\n\t\t\t*finish\n\n\t#I had an important date. I didn't want to run out on it.\n\t\t*if relationship_officers > 45\n\t\t\t\"Life happens,\" the lieutenant accepts. \"And sometime we have to choose our priorities, but there has to be some point where responding to emergencies is the priority you choose. Otherwise, it's hard to be a firefighter -- you know?  I have to give you a second warning on your record. That's the last one you get so please be careful.\"\n\n\t\t\t\"I understand,\" you assure. \"I'll do better.\"\n\t\t\t*set warning +1\n\t\t\t*finish\n\t\t*else\n\t\t\tYou can almost hear the lieutenant's smirk. \"Oh. A date. I'm sorry. I didn't realize because I was too busy fighting a fire.  You have a second warning on your record now. That's your last one so be careful!\"\n\n\t\t\t\"I'll do better,\" you promise.\n\t\t\t*set warning +1\n\t\t\t*finish\n\t#\"No.  I honestly don't give a fig about my quota.\"\n\t\t\"I see,\" replies the Lieutenant, unimpressed.  \"Anyway.  I'm supposed to call you up to give you an official warning.  So consider this your official warning. Take care, now.\" He hangs up at that point, clearly not interested in having an extended conversation with you and your attitude.\n\t\t*set warning +1\n\t\t*set relationship_officers %-20\n\t\t*finish\n\n\n*label Reply2\n\nHow do you reply?\n\n*choice\n\n\n\t#\"I'm sorry, Lieutenant.  I'll work on being better.\"\n\t\t*if relationship_officers > 45\n\t\t\tYour apology is sincere, and your lieutenant doesn't seem inclined to give you a hard time of it. \"All right, ${Lname}. I have to give you another warning. That's two now so be careful. We don't particularly want to have to kick you out. We can use all the good people we can get.\"\n\n\t\t\t\"I won't let you down,\" you promise.\n\t\t\t*set warning +1\n\t\t\t*finish\n\t\t*else\n\t\t\tThe Lieutenant doesn't seem impressed. \"We've been through this before. Shape up and start taking this seriously. You have a second warning on your record so be careful.\"\n\n\t\t\t\"I'll do better,\" you promise.\n\t\t\t*set warning +1\n\t\t\t*finish\n\n\t#I had an important date. I didn't want to run out on it.\n\t\t*if relationship_officers > 45\n\t\t\t\"Life happens,\" the lieutenant accepts. \"And sometime we have to choose our priorities, but there has to be some point where responding to emergencies is the priority you choose. Otherwise, it's hard to be a firefighter -- you know?  I have to give you a second warning on your record. That's the last one you get so please be careful.\"\n\n\t\t\t\"I understand,\" you assure. \"I'll do better.\"\n\t\t\t*set warning +1\n\t\t\t*finish\n\t\t*else\n\t\t\tYou can almost hear the lieutenant's smirk. \"Oh. A date. I'm sorry. I didn't realize because I was too busy fighting a fire.  You have a second warning on your record now. That's your last one so be careful!\"\n\n\t\t\t\"I'll do better,\" you promise.\n\t\t\t*set warning +1\n\t\t\t*finish\n\n\t#\"Not particularly. I have better things to do with my time than be lectured by you again.\"\n\t\t\"Fine,\" he says, clearly out of patience with your lack of manners and respect. \"I'll make this short. You have a second warning on your record. Have a nice day.\" And then he hangs up.\n\t\t*set warning +1\n\t\t*set relationship_officers %-30\n\t\t*finish\n\t\t\n\n\n\n", "09relationships": "\n*if SchmidtDead\n\tThe weeks and even months after Firefighter Schmidt died are difficult for the fire department as a whole. The gray cloud of grief seems to cast shadows over department events, and it takes a long time for things to start to feel \"normal\" again. \n\n\tThe department even brings in the CISM (Critical Incident Management) counselors to help everyone deal with the loss, and those counselors give out hotline numbers for anyone to call if they want to talk to someone any time, 24/7. \n\n\tIt's strange, almost, how greatly one person's death can affect so many people, even if most of them didn't know her all that well. Regardless, a line-of-duty death is a reminder to all of just how dangerous a firefighter's job can be.\n\n\tHow are you feeling about the situation yourself?\n\t*fake_choice\n\t\t#Fragile.\n\t\t\tYou've really been reflecting lately on how fragile life can be.  It could all be over in a moment and when you least expect it. \n\n\t\t\tThese are sobering thoughts, indeed, but they also remind you to cherish your own life and the time that you have in this world.\n\t\t#I'm doing okay.\n\t\t\tSo many people are having a rough time of it, but, at this point, you're doing as well as anyone can be after someone on your own team has died.  You're doing okay.  It was very difficult, and the memories probably always will be, but it's time to move on as best you can.\n\t\t#I just want to move past this already.\n\t\t\tIt's starting to get on your nerves how people won't stop talking about Schmidt like she was some sort of saint.  And you're tired of hearing her name read aloud at a dozen different memorial services. There's even talk of putting up a plaque somewhere.  As far as you're concerned, Schmidt is dead and doesn't care anymore about all this pomp and ritual. You wish people could just move on already and focus on life. It's all so very morbid.\n\t*goto DateCheck\n\n*else\n\t*goto DateCheck\n\n*label DateCheck\n\n*if SO = false\n\t*page_break\n\tFor whatever reason, ${Dname} never returned any of your calls after that one date.  Eventually you hear from a friend of a friend that ${Dname} is seeing someone else. Go figure!\n\t*goto SuspensionCheck\n*else\n\t*goto SuspensionCheck\n\n*label SuspensionCheck\n\n\n*if suspended\n\t*page_break\n\tFortunately, your suspension period goes by quickly, and soon you can return to active service. You have the distinct feeling that the officers are keeping an eye on you, especially to make sure you haven't been drinking.\n\n\tHow do you feel about that?\n\n\t*choice\n\t\t#It's understandable.\n\t\t\tYou know full well you messed up and that there are lingering consequences for letting everyone down. You accept the added scrutiny with grace and make a careful point not to respond to any calls or attend any drills if you've had so much as a sip of alcohol. You intend to earn their trust again as soon as possible, and your dedication to this purpose is not lost on them. They seem to appreciate it, actually.\n\t\t\t*set relationship_officers %+20\n\t\t\t*goto CareerCheck\n\n\t\t#Quite frankly, I'm offended.\n\t\t\tYou messed up. And then you paid the price for it by being suspended. So why is everyone still looking at you like you're a drunkard or something? You've made it a point not to respond to any calls or attend any drills if you've had so much as a sip of alcohol.  Why the heck is everyone still giving you a hard time about it? You glare each time you catch an officer looking at you, which they don't seem to appreciate.\n\t\t\t*set relationship_officers %-20\n\t\t\t*goto CareerCheck\n\n\t\t#I go and breathe on them pointedly from time to time so they'll get off my back.\n\t\t\tSheesh. You thought you were helping out by responding on that call, even though you had a few beers, but everyone freaked out, and you got suspended for your efforts. Now you're back and they're still giving you the stink eye, like you're a drunkard or something similarly reprehensible. It's like they expect you to be drunk, when you've made it a point not to respond to any calls or attend any drills if you've had so much as a sip of alcohol. So, after a while, every time you think someone is looking at you with suspicion, you just walk over to them and say \"Hello!\" in an exaggerated, breathy sort of way so they can know without a doubt that you're sober.  Nobody seems to like that, however. You just can't win.\n\t\t\t*set relationship_officers %-40\n\t\t\t*goto CareerCheck\n\n*else \n\t*goto CareerCheck\n\n*label CareerCheck\n*page_break\n\nThankfully, things at your job have been going very well, lately. \n\n*if career=\"construction\" \n\n\tYou and your team completed a major construction project and are already on the schedule for another one. More work means more pay, and having money is always very helpful!  Plus, you take pride in your work and enjoy seeing the results of your labor standing strong for years to come.\n\t*goto FitnessCheck\n\n*elseif career=\"lawyer\"\n\n\tYour firm has won a few big cases this year, which, of course, improves their reputation and brings in more wealthy clients and higher profile cases. You have a steady stream of clients yourself, and the partners look favorably on your contributions to the law firm. \n\t*goto FitnessCheck\n\n*elseif career=\"dispatcher\"\n\n\tThe only aspect of your job you don't really like is your cranky supervisor.  However, at some point in the year he got a new supervisor himself, and this newcomer seems to have the power to at least occasionally impose the voice of human decency, at least when it comes to emergency responders. Since then, you find your work environment to be entirely more friendly, and you certainly don't get as much grief after those very rare times when you're late to work because of an alarm.  \n\n\tAfter all, dispatchers are there to provide support for emergency services and help everything run smoothly.  It doesn't make much sense for them to penalize an emergency responder for responding to an emergency.\n\t*goto FitnessCheck\n\n*elseif career=\"teacher\"\n\n\tYou have a really good class this year, and you get along well with just about all of the students who seem to like you just as much as you do them. You'll be both proud to see them moving on to high school next year and sad to see them go. \n\t*goto FitnessCheck\n\n*elseif career=\"engi
