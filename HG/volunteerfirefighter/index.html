 at the same time, it puts some distance between you that seems impossible to cross.\n\n\t${SOname} is trying so hard to support you, even so, making sure you have regular meals without having to worry about preparing anything.   And a thousand times ${SOpronoun1} mentioned ${SOpronoun2} willingness to listen if you are ever willing and able to talk.  ${SOname} is worried about you and loves you, but how can you share something so hard?\n\t*goto SOTalk\n*else\n\t*goto CISD\n\n\n*label SOTalk\n\nDo you try anyway, even though it's difficult?\n*choice\n\t#Yes. For the sake of our relationship, I try.\n\t\tIn some ways, this might be more difficult than the actual fire, opening yourself up like this, reliving the decisions you made, how you wish you could have done things differently, how it all made you feel -- and, mostly, how much you miss Velez.  \n\n\t\t*page_break\n\n\t\tTo your surprise, you discover that you are actually angry at him for running off on his own like that and putting himself in so much danger.  \"Why did he do that?! Why?\" you ask, rhetorically, and tears blur your vision for the first time since the night of the fire.\n\n\t\t*page_break\n\n\t\t${SOname} holds you for a long time, listening to all you have to say, and letting you cry. Eventually, the painful emotions transform into passion, and you spend a long, beautiful, tender night in each other's arms, feeling closer to each other than you ever have before.\n\t\t*set relationship_SO %+40\n\t\t*goto CISD\n\n\t#No. I just can't.\n\t\tYou know you should talk to ${SOname}.  You can see very well how much it hurts ${SOpronoun3} that you keep pushing ${SOpronoun3} away and shutting ${SOpronoun3} out of your whirlwind of thoughts.  But how can you expose someone you love to such a nightmare?  Is it not your own burden to bear? \n\t\t*set relationship_SO %-40\n\t\t*page_break\n\t\t\n\t\t*if relationship_SO > 50\n\t\t\tThere is no way a relationship can endure this indefinitely, especially one that wasn't doing particularly well as it was.  At first, ${SOname} just gives you some space for a while, to give you a chance to think about whether you still want ${SOpronoun3} in your life.  And, after that, eventually, you just drift too far apart to make things right.\n\t\t\t*set SO false \n\t\t\t*goto CISD \n\t\t*else\n\t\t\t${SOname} seems to accept that you just can't talk about these things for the time being.  Although you know it is difficult for ${SOpronoun3}, ${SOname} stays by your side and does ${SOpronoun2} best to stand by you during this difficult time.  You are moved by the level of ${SOpronoun2} devotion.  At times you wonder what you ever could have done to deserve such a partner.\n\n\t\t\tDo you tell ${SOpronoun3} so?\n\t\t\t*choice\n\t\t\t\t#Yes. ${SOname} deserves to hear it.\n\t\t\t\t\tYou tell ${SOpronoun3}, \"How could I ever be worthy of such a devoted partner?\" \n\n\t\t\t\t\t${SOname} smiles gently and replies. \"Relationships are hard work. I love you, and I'm not giving up on you.\"\n\n\t\t\t\t\tThings go a lot better from then on.\n\t\t\t\t\t*set relationship_SO %+30\n\t\t\t\t\t*goto CISD\n\n\t\t\t\t#No. What's the point?\n\t\t\t\t\tYou're not a sappy person by nature.  Why should you start now?  So you say nothing, but sometimes, quietly, you marvel, even so. \n\n\t\t\t\t\tYou have the nagging suspicion that ${SOname} understands.\n\t\t\t\t\t*set relationship_SO %+10\n\t\t\t\t\t*goto CISD\n\n\n*label FianceTalk\n\nDo you try anyway, even though it's difficult?\n*choice\n\t#Yes. For the sake of our future together, I try.\n\n\t\tIn some ways, this might be more difficult than the actual fire, opening yourself up like this, reliving the decisions you made, how you wish you could have done things differently, how it all made you feel -- and, mostly, how much you miss Velez.  \n\n\t\t*page_break\n\n\t\tTo your surprise, you discover that you are actually angry at him for running off on his own like that and putting himself in so much danger.  \"Why did he do that?! Why?\" you ask, rhetorically, and tears blur your vision for the first time since the night of the fire.\n\n\t\t*page_break\n\n\t\t${SOname} holds you for a long time, listening to all you have to say, and letting you cry. Eventually, the painful emotions transform into passion, and you spend a long, beautiful, tender night in each other's arms, feeling closer to each other than you ever have before.\n\t\t*set relationship_SO %+40\n\t\t*goto CISD\n\n\t#No. I just can't.\n\n\t\tYou know you should talk to ${SOname}.  You can see very well how much it hurts ${SOpronoun3} that you keep pushing ${SOpronoun3} away and shutting ${SOpronoun3} out of your whirlwind of thoughts.  But how can you expose someone you love to such a nightmare?  Is it not your own burden to bear? \n\n\t\t*page_break\n\n\t\t${SOname} gives you plenty of time and all the space you need.  $!{SOpronoun2} devotion amazes you.  There are times when you wonder how you could ever deserve such a partner.\n\n\t\tDo you tell ${SOpronoun3} so?\n\t\t*choice\n\t\t\t#Yes. ${SOname} deserves to hear it.\n\t\t\t\tYou tell ${SOpronoun3}, \"How could I ever be worthy of such a devoted partner?\" \n\n\t\t\t\t${SOname} smiles gently and replies. \"Relationships are hard work. I love you, and I'm not giving up on you.  I'm gonna marry you some day, remember?\"\n\n\t\t\t\tThings go a lot better from then on.\n\t\t\t\t*set relationship_SO %+30\n\t\t\t\t*goto CISD\n\n\t\t\t#No. What's the point?\n\t\t\t\tYou're not a sappy person by nature.  Why should you start now?  So you say nothing, but sometimes, quietly, you marvel, even so. \n\n\t\t\t\tYou have the nagging suspicion that ${SOname} understands.\n\t\t\t\t*set relationship_SO %+10\n\t\t\t\t*goto CISD\n\n*label SOProbieTalk\n\nDo you try anyway, even though it's difficult?\n*choice\n\t#Yes. For the sake of our relationship, I try.\n\t\tIn some ways this might be more difficult than the actual fire, sitting down to talk about what happened with ${NPfname}.  In the end, curiously enough, there isn't all that much to be said. But you do spend a lot of time holding each other and also a fair bit of time crying when nobody else can see.  \n\n\t\t*page_break\n\n\t\t${SOname} tells you how scary it was for ${SOpronoun3} when you went after Velez alone, and you tell ${NPpronoun3} how very brave it was for ${NPpronoun3} to have followed you into the inferno.  There is no judgment here, no \"what if\"s, just shared sorrow, admiration, grief, and the deepening of love.\n\n\t\t*set relationship_SO %+40\n\t\t*goto CISD\n\n\t#No. I just can't.\n\t\tEverything about ${SOname} reminds you of that fire, ${SOpronoun2} face, ${SOpronoun2} voice, even the way that ${SOname} moves.  You can tell ${NPpronoun1} is suffering, both from the trauma of the experience and from the way you are pushing ${NPpronoun3} away, but what can you do? You just can't face it right now.  You need more time.\n\n\t\t*set relationship_SO %-40\n\t\t*goto Intervention\n\n\n*label SOProbieTalk2\n\n*page_break\n\nDo you try anyway, even though it's difficult?\n*choice\n\t#Yes. For the sake of our relationship, I try.\n\t\tIn some ways this might be more difficult than the actual fire, sitting down to talk about what happened with ${NPfname}.  In the end, curiously enough, there isn't all that much to be said. But you do spend a lot of time holding each other and also a fair bit of time crying when nobody else can see.  \n\n\t\t*set relationship_SO %+40\n\t\t*goto CISD\n\n\t#No. I just can't.\n\t\tYou need more time and more space. You really don't feel up to a warm, fuzzy heart-to-heart conversation right now so you just keep pushing ${NPfname} away.\n\n\t\t*set relationship_SO %-40\n\t\t*goto Intervention\n\n\n\n\n\n*label Intervention\n\n*page_break\n\nThe fire department is a small community within a small town.  Eventually, they figure out what's going on and how both of you are hurting.  So the Fire Chaplain, Olivia Foster, asks you both to join her at the fire house to talk things out.\n\nAre you up for that?\n*choice\n\t#Sure.  Why not?\n\t\tThe Chaplain leads you both to an empty meeting room and makes sure everyone has comfortable seats.  At first, it's just Chaplain Foster talking, with you looking down at your hands and ${NPfname} looking out the window.  But, eventually, she asks a few very simple questions that are easy enough for both of you to answer and which pave the way to addressing more serious concerns.\n\n\t\t*page_break\n\n\t\t*if probie_fire\n\n\t\t\tBefore you know it, ${NPname} is talking about how scared {NPpronoun1} was when you went after Velez alone, and you tell ${NPpronoun3} how very brave it was for ${NPpronoun3} to have followed you into the inferno.  \n\n\t\t\tNow, the floodgates of conversation are opened, and there seems to be a million things you each want to say.  Chaplain Foster politely excuses herself, and you and ${NPfname} are left in peace to talk and cry and hug each other for hours.  Afterwards, you both feel enormously restored and strong in your relationship once again.\n\t\t\t*set relationship_SO %+40\n\t\t\t*goto CISD\n\n\t\t*else\n\n\t\t\tBefore you know it, ${NPname} is talking about how scared {NPpronoun1} was when you went after Velez alone, and you tell ${NPpronoun3} how there was a moment in that fire when  you thought you might not see ${NPpronoun3} or anybody else ever again. \n\n\t\t\tNow, the floodgates of conversation are opened, and there seems to be a million things you each want to say.  Chaplain Foster politely excuses herself, and you and ${NPfname} are left in peace to talk and cry and hug each other for hours.  Afterwards, you both feel enormously restored and strong in your relationship once again.\n\t\t\t*set relationship_SO %+40\n\t\t\t*goto CISD\n\n\t#No.\n\t\tYou're not interested in talking to ${NPfname} without anyone's intervention; and you're certainly not going to talk to ${NPpronoun3} now that someone is trying to corner you into it. \n\n\t\tYou have a lot of time alone with your thoughts, and eventually it occurs to you that you're angry with ${NPfname}.  Think about it: if ${NPpronoun1} hadn't followed you into that fire with no experience and become a problem ${NPpronoun3}self, then maybe you would have been able to save someone else.  It all seems so pointless.\n\n\t\t*page_break\n\n\t\tSince you aren't willing to talk with ${NPfname}, you certainly can't sustain a relationship. Sooner, rather than later, it's pretty clear that you don't have one anymore.\n\n\t\t*set SO false\n\t\t*set ProbieSO false\n\t\t*set probie_breakup true\n\t\t*goto CISD\n\n*label CISD\n*page_break\n\nSo, with everything the fire department has been through with that bad fire, members certainly are provided with more support than just a pamphlet.  Within a few days of the incident, everyone who was there is required to gather at the fire house for what people are calling a \"Critical Incident Stress Debriefing.\"  \n\n*page_break\n\nYou really don't know what to expect, but it seems you have to attend if you want to still be on active duty. \n\nDo you?\n*choice\n\t#Yes. Whatever it takes.\n\t\tFirefighters are often faced with difficult and tragic situations.  If this is part of how they cope with traumatic events, then you need and and want to be a part of it.\n\t\t*goto CISD2 \n\t#No. I don't want to be a firefighter anymore.\n\t\tIt's not exactly easy to admit this to yourself much less to anyone else, you don't want to do this anymore. It's too hard. It's too dangerous.  And it's definitely too sad.\n\n\t\t*if (motivation = \"tradition\") or (motivation =\"grudging\")\n\t\t\tYou can't fathom how your mother and your grandfather ever managed to do this for decades without being completely broken down. So you ask them. And they take your question very seriously.\n\n\t\t\tYour grandfather rubbed his beard thoughtfully, as you sat together on his front porch. \"Well,\" he begins. \"I did it because it was the right thing to do. It wasn't easy, but, heck, neither was the war.  In fact, the war was a thousand times worse.  Did I ever tell you about the time when we were up to our knees in mud in those trenches and --? \"  He went on to tell his favorite war stories for an hour.\n\n\t\t\t*page_break\n\n\t\t\tLater that day: \"It was hard, the hardest job I've ever done,\" your mother admits, her expression troubled, as she sits with you on her couch.  She knows better than anyone what you are going through lately. \"As firefighters, we see things that no one should ever have to see.  And it can eat at your soul, that's for certain. I've seen good men and women fall apart and turn to drugs and alcohol because they just couldn't deal with it anymore.  \n\n\t\t\t\"But, ${Fname}, here's the thing: somebody's gotta do the job.  Otherwise, what chance do we have as a civilization even, if there's no one who can help our neighbors, friends, and loved ones when they get into a car crash or are trapped in some burning house?  It's not easy, but someone's gotta step up and do this job.  Do you understand?\"\n\n\t\t\t*goto CISDDecision\n\t\t\t\n\t\t*elseif motivation=\"service\"\n\t\t\tYou spend some time reflecting on your original reasons to choose this path.  You wanted to serve your community, to be a helpful and contributing individual who gives back to the world and helps the people of this town. Did you think it would be easy?  No.  Did you think it would be all fun and games?  Of course not.  Why did you choose to be a firefighter?  Because you could.  Because you thought you'd be good at it.  Because somebody has to do this job.\n\n\t\t\t*goto CISDDecision\n\n\t\t*elseif motivation=\"hero\"\n\t\t\tYou remember when you first signed up.  You couldn't wait to make a heroic rescue and get your picture in the news. You loved the attention, the thrill, the modern-day chance for glory that is so much more meaningful than dumb hobbies like playing video games all evening or just playing your average run-of-the-mill-sport.  \n\n\t\t\tAnd you knew there was always a risk that people would die.  People do that sometimes.  You figured it was part of the job, that you could just take things in stride.  You didn't expect it to be so heart-breakingly difficult.  \n\n\t\t\tYou spend an evening thinking about all these things and reflecting upon your decision.\n\n\t\t\t*goto CISDDecision\n\n\n*label CISDDecision\n\n*page_break\n\nDo you change your mind and go to the firehouse for the CISD?\n\t\n*choice\n\t#Yeah. I guess I'll see how it goes.\n\t\tYou've come this far. You might as well see this through a while longer.\n\t\t*goto CISD2\n\t#No. I'm through.\n\t\tYou've given it some thought, and you're just not cut out to be a firefighter. Not everyone is, after all.  \n\t\t*goto Resignation\n\n*label CISD2\n\nYou aren't sure what to expect from the Critical Incident Stress Debriefing.  When you show up, however, it's pretty clear that a lot of people wouldn't be there at all if it wasn't mandatory. You realize that this is probably the point; it's much easier to access helpful services, even grudgingly, if it's required of you.  Many people have trouble openly admitting they could use some extra support.\n\n*page_break\n\nIn any case, the debriefing isn't some sort of uncomfortable emotional out-pouring. It's exactly what it claims to be: a debriefing.  \n\nAfter Ivan, the CISM guy, gives a short introduction, Chief Gordon takes over and gives everyone a general overview of the scene.  Then Captain Simmons, as the first incident commander to arrive, talks about what happened from her perspective, detailing the issues with the water supply.  The hose team talks about facing such a big fire with no and low water pressure, both the technical struggles and how frustrated they felt about the situation.\n\n*page_break\n\nYou are to speak for the search team.  Nobody makes you say anything you're not comfortable sharing.  Nobody judges.\n\nWhat, if anything, do you share with the group?\n*choice\n\t#You stick to the facts, the decisions you made and why you made them. \n\t\t*set relationship_firefighters %+20\n\n\t\t*if saved_RIT\n\t\t\tYou talk about what you observed leading up to the flashover, how you recognized the pending flashover for what it was, and what you decided to do about it.\n\t\t\t*goto CISD3\n\t\t*elseif saved_by_RIT \n\t\t\tYou talk about the actions of the Rapid Intervention Team team and how you're not sure you would have survived without them. You have an opportunity to thank them, and you do.\n\t\t\t*goto CISD3\n\t\t*elseif nearly_died \n\t\t\tYou share all the events that you can remember, up to and including when you woke up at the hospital and learn the full extent of the damage the fire caused to life and property.\n\t\t\t*goto CISD3\n\t\t*elseif delay_water_can \n\t\t\tYou talk about your decision to bring a water can in with you and how you felt that choice may have saved your life.\n\t\t\t*goto CISD3\n\t\t*elseif saved_by_hoset\n\t\t\tYou talk about how you were able to hold out until the hose team arrived and how Firefighter Warner helped you from that point on.\n\t\t\t*goto CISD3\n\t\t*elseif do_nothing\n\t\t\tYou talk about how you were waiting for orders from Firefighter Velez because that's what you felt you were expected to do in that situation.\n\t\t\t*goto CISD3\n\t\t*else \n\t\t\tYou talk about your own experience as factually as possible in order to contribute as best you can to everyone's understanding of what happened during that difficult call.\n\t\t\t*goto CISD3\n\t#You talk about how your experiences made you feel.\n\t\t*set relationship_firefighters %+20\n\t\t*if saved_RIT\n\t\t\tYou talk about how terrified you felt when you saw the signs of the impending flashover and how you somehow managed not to completely panic when you started yelling for the Rapid Intervention Team to back out. You also share how you felt when you realized you could not save Velez, how helpless and horrified you felt in that moment.\n\t\t\t*goto CISD3\n\t\t*elseif saved_by_RIT \n\t\t\tYou talk about how grateful you are to all the members of the Rapid Intervention Team and how you're not sure you would have survived without them. You have an opportunity to thank them each individually, and you do. You also share how you felt when you realized you could not save Velez, how helpless and horrified you felt in that moment.\n\t\t\t*goto CISD3\n\t\t*elseif nearly_died \n\t\t\tYou share with the group how it felt to be so close to death that it seemed inevitable, how it felt both terrifying and strangely peaceful at at once.  You also talk about how disorienting it was to wake up at the hospital and then your heartache upon learning the full extent of the damage the fire caused to life and property.  You also share how you felt when you realized you could not save Velez, how helpless and horrified you felt in that moment.\n\t\t\t*goto CISD3\n\t\t*elseif delay_water_can \n\t\t\tYou talk about lucky you feel to have brought a water can in with you and how you felt that decision may have saved your life.  You also share how frightening it was to be faced with so much fireload in the moments you were alone.  You also share how you felt when you realized you could not save Velez, how helpless and horrified you felt in that moment.\n\t\t\t*goto CISD3\n\t\t*elseif saved_by_hoset\n\t\t\tYou talk about how you were scared you were going to die and that you weren't sure the hose team would be able to make the push up the stairs.  You also thank Firefighter Warner for his assistance because don't think you would have made it out without him.\n\t\t\t*goto CISD3\n\t\t*elseif do_nothing\n\t\t\tYou talk about how it felt to be left at the bottom of the ladder without orders, how you didn't know what to do and assumed that the right thing to do was to wait for further instructions.  Then you share the horror of watching the flames burst forth from the window above your head, believing Velez to be in the middle of it.\n\t\t\t*goto CISD3\n\t\t*else \n\t\t\tYou talk about your own experience that day, how confusing the scene became and how helpless you felt.\n\t\t\t*goto CISD3\n\t#You share a combination of facts and your emotional experience.\n\t\t*set relationship_firefighters %+20\n\t\t*if saved_RIT\n\t\t\tYou talk about what you observed leading up to the flashover, how you recognized the pending flashover for what it was, and what you decided to do about it. You also share how you felt when you realized you could not save Velez, how helpless and horrified you felt in that moment.\n\t\t\t*goto CISD3\n\t\t*elseif saved_by_RIT \n\t\t\tYou talk about the actions of the Rapid Intervention Team team and how you're not sure you would have survived without them. You have an opportunity to thank them, and you do. You also share how you felt when you realized you could not save Velez, how helpless and horrified you felt in that moment.\n\t\t\t*goto CISD3\n\t\t*elseif nearly_died \n\t\t\tYou share all the events that you can remember, up to and including when you woke up at the hospital and learn the full extent of the damage the fire caused to life and property. You also share how you felt when you realized you could not save Velez, how helpless and horrified you felt in that moment.\n\t\t\t*goto CISD3\n\t\t*elseif delay_water_can \n\t\t\tYou talk about your decision to bring a water can in with you and how you felt that decision may have saved your life. You also share how you felt when you realized you could not save Velez, how helpless and horrified you felt in that moment.\n\t\t\t*goto CISD3\n\t\t*elseif saved_by_hoset\n\t\t\tYou talk about how you were able to hold out until the hose team arrived, even though you weren't sure they would be able to make the push up the stairs.  You also thank Firefighter Warner for his assistance because you don't think you would have made it out without him.\n\t\t\t*goto CISD3\n\t\t*elseif do_nothing\n\t\t\tYou talk about how you were waiting for orders from Firefighter Velez because that's what you felt you were expected to do in that situation.  Then you share the horror of watching the flames burst forth from the window above your head, believing Velez to be in the middle of it.\n\t\t\t*goto CISD3\n\t\t*else \n\t\t\tYou talk about your own experience as factually as possible in order to contribute as best you can to everyone's understanding of what happened during that difficult call.  You also share briefly how confusing the scene became and how helpless you felt.\n\t\t\t*goto CISD3\n\t#You choose not to share anything.\n\t\tYou choose not to share anything about your experiences at this time, and that is your right. Nobody presses you to talk when you're not ready to do so.  In any case, you can learn a lot just by listening to others.\n\t\t*goto CISD3\n\n*label CISD3\n\n*page_break\n\nYou get to hear from the other search team at this debriefing, the ones who rescued the elderly man from the first floor, as well as from members of the Rapid Intervention Team and other people who were on scene that day.  It paints a clear picture for everyone about what happened and why.  \n\n*page_break\n\nIn the final section, Chief Gordon leads a talk about the lessons learned from this fire, what, if anything, people will do differently in the future because of their experiences that day.  The hardest part of the talk, for you, was when the Chief talked about Firefighter Velez's decisions that prompted him to go into the fire alone and without issuing clear orders to the rest of his search team.  \"That put you in an extraordinarily difficult position, ${Lname},\" he says, somberly, meeting your eyes. \"And I'm sorry. I know you did your best, regardless.\"  \n\n*page_break\n\nJust hearing the Chief say that changed a lot for you, to have him openly acknowledge that you had been put in an unreasonable situation and apologize for it.  You find you feel enormously better to know that this was not a normal circumstance and somehow, in the only way you could be, to be freed from blame.\n\n*page_break\n\nIvan concludes with a reiteration of the example list of normal reactions to such a traumatic event, along with warning signs to look out for.  This time he also has refrigerator magnets to pass around that display the CISM hotline number.\n\n*if velez_rescue\n\tMuch to your surprise, several firefighters come to you afterwards to thank you for you part in helping to remove Firefighter Velez from the burning home.  \"I'd trust you to have my back in a fire, any day,\" one veteran offered by way of a compliment.\n\t*goto Pager\n*elseif teenager_alive\n\tThe Chief also passes around a thank you card from the family of the teenager, Joshua, who you helped save from that fire.  It includes a picture of Joshua in his hospital bed, smiling for the camera and giving a thumb's up. The card mentions your name specifically as well as general gratitude to the fire department as a whole.\n\t*goto Pager\n*else\n\t*goto Pager\n\n*label Resignation\n*page_break\n\nYou gave it your all, but your heart's just not in it anymore.  So you write up a resignation letter and place it on the Chief's desk.\n\n*page_break\n\nChief Gordon offers you a leave-of-absence, instead, to give you more time to think, but you've already made up your mind.  You turn in your ID, your gear, and your pager and leave the fire house feeling lighter and sadder all at once.  A chapter of your life is over, and now you must move on to other things.\n\n*if ProbieSO and SO\n\tYou'll still have some connection to the firehouse, in any case, through ${NPfname}, who you will support as best as you possibly can. But you look forward to having a more peaceful life, yourself.  It feels right. \n\t*goto Ending\n*elseif SO\n\tAs you head out to you car, Firefighter Zlenko runs out after you to say some final words. \"We're going to miss you, ${Fname}.  You know that, right?  If you ever want to talk about what happened or anything else, just give me a call. You'll always be one of us, in our eyes.\"\n\n\tYou thank Firefighter Warner, whole-heartedly, and then, as you drive way, you call ${SOname} and make arrangements to meet ${SOpronoun3} at your favorite restaurant.  \n\n\tYou look forward to having a more peaceful life. It feels right.\n\t*goto Ending\n*else\n\t*goto Ending\n\n*label Ending\n*page_break\n\nAnd thus ends your short but eventful career as a firefighter.\n*goto_scene 13awardparty ending\n\n*label Pager\n\n*page_break\n\nDo you think the Critical Incident Stress Debriefing was a helpful experience?\n\n*fake_choice\n\n\t#Definitely.\n\t\tDespite your uncertainties, you found the CISD to be a helpful experience. You feel it was particularly interesting to hear what happened from the other firefighter's perspectives; they helped fill in the gaps of what happened that night and give you a more complete picture of the incident.\n\n\t\tThe most cathartic moment for you was when Chief Gordon acknowledged that Firefighter Velez's actions, may he rest in peace, put you in an impossibly difficult position and that you did your best given the circumstances.\n\n\t#Hard to tell.\n\t\tYou don't regret going, but it's hard to tell if you feel any better for the experience. In any case, it was interesting to hear what happened from the other firefighter's perspectives; they helped fill in the gaps of what happened that night and give you a more complete picture of the incident.\n\n\t#No, but it might have helped others.\n\t\tYou're pretty sure that you don't feel any better for having been made to sit through the several hours of debriefing.  However, you can't truly regret going because it's clear that other people found it beneficial to go over the incident in detail. \n\n\t\tIn any case, you found it interesting to hear what happened from the other firefighter's perspectives; they helped fill in the gaps of what happened that night and give you a more complete picture of what went on.\n\n\t#It was pointless.\n\n\t\tSome parts of the debriefing felt okay at the time, especially when Chief Gordon acknowledged how you were put in such a difficult position.  Upon later reflection, however, you realize it was really kind of tormenting to have to listen to the story of that fire again and again from every firefighter's perspective.\n\n\t\tNow you can't stop thinking about it all over again, and, for a while, the nightmares were terrible.\n\n*page_break\n\nLife goes on.  You find your routine again.  One Saturday morning you wake up and realize you had your first good night of sleep in a while.  You enjoy a relaxing morning.  The weather is fine, sunny and warm but with a pleasant cool breeze.\n\nYou are about to sit down and eat a delicious lunch.\n\n*if cat\n\t${catname} the cat is curled up at your feet.  \n\n\nWhat's on the menu?\n\n*fake_choice\n\t#Grilled cheese and tomato soup.\n\t\tMmm. Sounds delicious!\n\t#A hot steak sandwich.\n\t\tThat sounds great!\n\t#Caesar salad.\n\t\tLight and delicious!\t\n\n*page_break\n\nJust as you are about to have your first bite, your pager goes off.\n\nOh well.  You can stick it in the fridge for later.\n\n*page_break\n\nAnyway.  Where were we?  Ah, yes.  Your pager goes off:\n\n\"$!!{town_name} FIRE DEPARTMENT, YOU HAVE A REPORTED GASOLINE LEAK AT 14 HAZELNUT DRIVE, NEAR THE CROSS STREET OF PLUM STREET. REPEATING FOR $!!{town_name} FIRE DEPARTMENT: YOU HAVE A REPORTED GASOLINE LEAK AT 14 HAZELNUT DRIVE, NEAR THE CROSS STREET OF PLUM STREET. TIME NOW IS 1223.\"\n\n*page_break\n\nNow, usually, you get to a choice about whether or not you respond to these calls, but you did promise Chief Smith that you would respond today.  It seems several members of the department will be out of district for some sort of fishing trip, and they wanted to ensure they had adequate coverage.\n\nSo off you go!\n\n*page_break\n\nYou drive to the firehouse, gear up, and get on the first due firetruck with several other people, including Firefighters McCollaugh, Warner, Cohen, and Lt. Delfino.  Moments later, you are arriving at 14 Hazelnut Drive, where a middle-aged man stands out on his driveway, wearing an undershirt and shorts.  A woman, possibly his wife, stands on the front porch. She looks unhappy.\n\n*page_break\n\n\"Good afternoon, sir.  My name is Vinny.  What's the problem here?\" Lt. Delfino addresses the man who is closest to where the firetruck is parked in the street.\n\n\"It's the damn rats!  They're everywhere!\" the man declares, waving his arms emphatically. \"I tried everything I could to get rid of the bastards, but they keep on coming back!  Can you get rid of them?\" \n\nMcCollaugh grumbles under his breath. \"Oh, so it's gonna be one of these calls.\"\n\n*page_break\n\n\"Sir, we received a call regarding a gasoline spill,\" Lt. Delfino informs the man, patiently. \n\n\"What?  I can't hear you?\" he replies, cupping his ear and leaning in closer.\n\nDelfino clears his throat and tries again more loudly. \"WE RECEIVED A CALL REGARDING A GASOLINE SPILL.  IS THERE A GASOLINE SPILL?\" \n\n\"What?  Oh!  Yeah.  I poured a few gallons of gasoline into the crawlspace, trying to chase out those rats.  Now my wife's saying the whole house smells like gasoline.\" He points at his wife, there on the porch, looking somewhere between exasperated and mortified. \"She's the one that called you.  I figured maybe you could help me out with them rats, while you're at it.\"\n\n*page_break\n\nMcCollaugh coughs in disbelief.  More loudly now, he says, \"You poured gasoline in your crawlspace?\"\n\n\"Yep,\" comes the homeowner's cheerful reply. \" I thought the fumes would make them want to go away. Heh. I think it's just working on my wife though.\"\n\nWhat do you say?\n*choice\n\t#Nothing. This is ridiculous enough just as it is.\n\t\tYou decide that the situation is comical enough without your added commentary. So you just stand there patiently, waiting for orders.\n\t\t* ne from spreading or catching fire if it comes in contact with any kind of spark. The Fire Marshall makes certain that the homeowner understands that he is responsible for hiring professionals to clean up the mess within one week's time or face a fine and promises she will be back herself to check.\n\n*page_break\n\n\"But did you get the rats?\" the homeowner inquires anxiously.\n\n\"Probably,\" the Fire Marshall admits.\n\n\"Yes!\" The man fist-pumps and does a happy-dance on his driveway for all to see.\n\nThe scene is finally secure and declared a \"non-emergency.\" \n*page_break\n \n\nYou are standing on the front lawn when the man's wife comes over to you looking distraught.\n\n\"What's the matter, ma'am?\" you ask politely.\n\n\"It's my husband.  He's -- he's crazy!  I don't know what to do with him anymore.  I'm at my wit's end. It's just one ridiculous thing after the next.  I had the doctor check him out because I thought it might be something wrong with him, like  dementia, except that he's always been like this, since the day I first met him. I used to think it was cute!  Ha!  Doctor says he's fine.   What am I supposed to do?\"\n\nWell.  This is kind of awkward.  How do you reply?\n\n*choice\n\t#I reply a little rudely. How am I supposed to know what to do about her crazy husband?\n\t\t\"How am I supposed to know?\" you reply bluntly. \"He's a danger to everything around him, with poor judgment like that. It's a wonder your house didn't explode today.\" The woman makes a sound of despair, covers her face with her hands, and silently sobs.  \n\n\t\tLuckily, it's not your problem!  You get to walk away and help put all the tools back in the truck.\n\t\t*set relationship_firefighters %-15\n\t\t*set relationship_officers %-20\n\t\t*goto SceneEnd\n\n\t#I try to offer some reassurance.\n\t\t\"Well,\" you begin, trying to think of a way to be reassuring. \"We all make bad decisions sometimes, ma'am.  Hopefully tomorrow will be a better day.\" \n\n\t\tYou offer
