 alarm go off, meaning he hasn't moved for 30 seconds, likely injured or unconscious.  \n\nBehind you, you hear the welcome sounds of the hose team coming up the stairs.  Just as your can is running out, they open a full stream of water on the flames and really start to beat them back.  \n\n*page_break\n\n\"Velez is in that room!\" you call, pointing at the closed door. \"I think he's in trouble!\" \n\nThe hose team leader is able to radio in for additional manpower, while you and the third hose team member, Firefighter Warner, guarded by the active hose line, try to get into that other bedroom to find Velez.\n\n*page_break\n\nHow are you holding up?\n*fake_choice\n\t#Fine. Let me focus on my work.\n\t\tSorry for the interruption.  Carry on, then.\n\t#Holy carp. This is terrifying!\n\t\tIt really is. You're doing great, though.  Keep it up.\n\t#I have no idea.\n\t\tHowever you are feeling (or not feeling), you're doing a great job. Keep it up.\n\n*page_break\n\nThe room is filled with heavy smoke so you have to stay down near the ground. \"Velez?\" you call. \"Can you hear me?\"  \n\nThere is no reply.\n\n*page_break\n\nYou and Warner perform a quick search of the room, feeling the floor, over and under furniture, and in a closet, until you are the one who finds Velez' prone body near the room's only window. \n\n\"I got him!\" you call to Warner, who follows your voice to join you.  \n\n\"There's another victim here,\" he discovers. \"Civilian.\"  It's likely the teenage boy that Velez was looking for.  You and Warner both take lengths of webbing from your bunker gear pockets, and get the two victims hastily tied into make-shift harnesses. \"We gotta get them out of here!  It's getting too hot!\" he calls.\n\n*if air = \"good\" \n\t*goto DoubleRescue \t\n*elseif air = \"ok\"\n\tAt this point, your vibration alert goes off to warn you that you only have a couple minutes left of air. \n\n\tDo you mention this to Warner?\n\t*fake_choice\n\t\t#Of course I do.\n\t\t\t\"I'm running out of air!\" you yell to Warner.\n\n\t\t\t\"It's okay. Stay calm,\" he replies with the voice of experience. \"Breathe carefully. We'll all be out of here in a moment.\"\n\t\t#No. It's not the priority right now.\n\t\t\tIf you're all not out of here in a couple minutes, your air supply will only be one of many problems. So you work on controlling your breathing and remaining calm to focus on the task at hand.\n\t*goto DoubleRescue\n*elseif air = \"warning\"\n\tYou've been ignoring your vibe alert, but eventually the air you are breathing starts to get thin and you start to feel light-headed. \"Warner,\" you begin, trying to let your fellow firefighter know what's going on. \"We have a problem.\" And then you pass out.\n\t*set no_air true\n\t*goto ExplanationPart1\n\n*label DoubleRescue\n*page_break\n\nDo you want to be in charge of the boy or Firefighter Velez?\n\n*choice\n\t#The teenage boy.\n\t\t*if strength > 60\n\t\t\tThere isn't time for discussion.  You feel like Firefighter Warner might be stronger than you are so you grab the boy's harness and quickly drag him out of the room.  Warner is right behind you, straining with the weight of the fallen firefighter in 50 pounds of full gear, but he manages.\n\t\t\t*goto DoubleRescueRIT\n\t\t*else \n\t\t\tThere isn't time for discussion.  You feel like Firefighter Warner is much stronger than you are so you grab the boy's harness and pull him as quickly as you can out of the room.  Even this is difficult because he feels like a dead weight in the harness, dragging along a plush rug. Warner is right behind you, straining with the weight of the fallen firefighter in 50 pounds worth of full gear, but he manages.\n\t\t\t*goto DoubleRescueRIT\n\t#Firefighter Velez\n\t\t*if strength > 70\n\t\t\tThere isn't time for discussion.  You feel confident that you're strong enough to move Firefighter Velez, 50 pounds of gear and all, so you grab his harness and pull him with all your might toward the bedroom door.  Firefighter Warner follows behind you with the unconscious teenager.\n\t\t\t*goto DoubleRescueRIT\n\t\t*else\n\t\t\tAs a fellow member of the search team, you feel personally responsible for Firefighter Velez.  So you grab his harness and try to drag him out of the room.  But Velez is not a small man, and with the additional 50 pounds of gear, it is simply more than you can manage. \n\n\t\t\tSo you grab Warner's sleeve.  \"Too heavy.  Can't -- \" you begin, and Warner doesn't miss a beat. He grabs Velez's harness and passes the other victim off to you.  You have a much easier time of bringing him to the bedroom door.\n\t\t\t*goto DoubleRescueRIT\n\n*label DoubleRescueRIT\n\n*page_break\n\nLieutenant Delfino must have called for the RIT (Rapid Intervention Team) because they meet you at the threshold of the room.  With the extra help, everyone is down the stairs and out of the burning structure in no time.  You fall to your knees on the front lawn and grab the mask off your face so you can take deep breaths of fresh air.  \n\nParamedics quickly surround the unconscious teenager and Firefighter Velez, working hard to save their lives.  While they are doing so, the whole second floor of the house goes up in flame, and the fire truck horns begin sounding the evacuation tones.  From that point on, the operation becomes a \"surround and drown,\" meaning the fire will be extinguished from the outside of the building only.\n\n*page_break\n\nMiraculously, other than a few bumps and bruises, you are not injured.  A couple days of rest does you a world of good.  In that time, you learn that the boy you and Warner pulled from the fire is named Joshua and that he will survive. His recovery will be difficult and take a long time.  He suffered 1st and 2nd degree burns over much of his body in addition to lung damage from smoke inhalation, but he will recover.  \n\nWhen his mother comes to thank you in person, the news reporters and their cameras are nearby. You and Firefighter Warner have your picture in the paper and on the evening news. Random people from $!{town_name} and beyond send you cards of gratitude.  You receive several bouquets of flowers and some considerable donations in your name to a major foundation that helps burn victims.\n\n*set teenager_dead false\n*set teenager_alive true\n*set velez_rescue true\n\n*page_break\n\n*if motivation = \"hero\"\n\tIt's everything you ever wanted when you first decided to join the fire department, but your newfound heroism is bittersweet.\n\n*page_break\n\n*goto Afternotes\n\n\n*label SecondRoom\n*temp velez_harness false\n*temp teen_harness false\n\n*if ProbieSO\n\t*set probie_fire true\n\nThis second bedroom is also filled with heavy smoke so you have to stay down near the ground. \"Velez?\"\nyou call. \"You in here?\" \n\nThere's still no reply.  \n\n*page_break\n\nThen Velez's PASS (Personal Alert Safety System) alarm starts emitting a piercing, high-pitch tone.  You know from your training that this happens in order to alert others when a firefighter stops moving for 30 seconds.  In the middle of a structure fire, this usually means something is terribly wrong.\n\n \n*if ProbieSO\n\tSuddenly, you hear a familiar voice -- not Velez. It's ${NPname}. \n\n\t\"${Fname}?\" ${NPpronoun1} calls.\n\n\t\"Here!\" you call back, reaching to touch ${NPpronoun2} heavily padded arm. \"What are you doing here?\"\n\n\t*page_break\n\n\t$!{NPpronoun2} reply is simple: \"There's no way in hell I'm letting you deal with this alone.\"\n\n\t\"Thank you,\" you say, sincerely. There's no time for casual chatting so you simply tell ${NPpronoun1}, \"Help me search.\"\n\t*goto ProbieHelp\n\n*else\n\t*goto SearchAlone\n\n*label SearchAlone\n*temp mayday false\n*page_break\n\nYou perform a quick search of the room.  From the number of toys and the crib present, you know this must be a nursery.  It also helps that you can follow the sound of the PASS alarm until you feel Velez's boot and then the rest of him, lying prone on the floor. \n\n*page_break\n\nBeside him, partially sheltered by the firefighter's body, is another victim, quite possibly the teenage boy. You shake your mentor gently. \"Velez!\" you call, but he doesn't move or respond in any way.\n\n*page_break\n\nThe temperature is rising in the room, and conditions are deteriorating rapidly. You can see places on the wall between two rooms that are orange with flame.  The fire in the hallway must have spread quickly because it is starting to burn through the door. You don't have much time.\n\nWhat do you do?\n\n*choice\n\n\t*if (fire_knowledge \u003c 60) #Break the window to let some smoke out and provide a path for escape.\n\t\tIt's getting so hot in here, and the thick black smoke has banked almost down to the floor. If anyone has any chance of surviving, you feel the best thing to do will be to break the window and try to air out the room.  Plus, as far as you can tell, the window will be the best and closest path for all of you to get the hell out of there. \n\n\t\t*if sequipment = \"irons\"\n\t\t\tSo you use the pointed end of your halligan to break the top and bottom sections of bedroom window. It shatters into pieces and a rush of fresh air floods the room.\n\t\t\t*goto FlashoverDeaths\n\n\t\t*else \n\t\t\tSo you use the pointed end of Velez's halligan to break the top and bottom sections of bedroom window. It shatters into pieces and a rush of fresh air floods the room.\n\t\t\t*goto FlashoverDeaths\n\n\t*if (sequipment = \"irons\") #Use my axe and halligan to break through the non-burning wall to a safer place.\n\t\tYou have a set of irons, and you are relatively certain that the room adjacent to this one is not on fire at all. If you could breach the wall and somehow get everyone through, you will buy everyone valuable time.\n\t\t*gosub Harness\n\t\t*goto WallBreach\n\n\t*if (sequipment != \"irons\") #Use Velez's axe and halligan to break through the non-burning wall to a safer place.\n\t\tVelez has a set of irons, and you are relatively certain that the room adjacent to this one is not on fire at all. If you could breach the wall and somehow get everyone through, you will buy everyone valuable time.\n\t\t*gosub Harness\n\t\t*goto WallBreach\n\n\t*selectable_if (sequipment = \"watercan\") #Use my water can to lower the temperature in the room and buy us more time.\n\t\tYou have a water can with you.  It occurs to you that you might be able to buy a few more precious seconds for everyone if you can cool down the room enough to prevent it from flashing over.  \n\n\t\tSo you open up the spray, sending a blast of water toward the ceiling.  It is the only thing you can think to have done, but it was a bad choice. With this much fire and heat, all your few gallons of water can do is create a searing burst of steam, which, of course, doesn't help anything at all.  \n\n\t\tWhat do you do now?\n\n\t\t*choice\n\t\t\t*if (fire_knowledge \u003c 60) #Break the window to let some smoke out and provide a path for escape.\n\t\t\t\tIt's getting so hot in here, and the thick black smoke has banked almost down to the floor. If anyone has any chance of surviving, you feel the best thing to do will be to break the window and try to air out the room.  Plus, as far as you can tell, the window will be the best and closest path for all of you to get the hell out of there. \n\n\t\t\t\tSo you use the pointed end of Velez's halligan to break the top and bottom sections of bedroom window. It shatters into pieces and a rush of fresh air floods the room.\n\t\t\t\t*goto FlashoverDeaths\n\n\t\t\t*if (fire_knowledge > 60) #Break the window to let some smoke out as a last ditch effort to cool down the room.\n\t\t\t\tIt's getting so hot in here, and the thick black smoke has banked almost down to the floor. If anyone has any chance of surviving, you feel the best thing to do will be to break the window and try to air out the room.  Plus, as far as you can tell, the window will be the best and closest path for all of you to get the hell out of there. \n\n\t\t\t\tSo you use the pointed end of Velez's halligan to break the top and bottom sections of bedroom window. It shatters into pieces and a rush of fresh air floods the room.\n\t\t\t\t*goto FlashoverDeaths\n\n\t\t\t#Use Velez's axe and halligan to break through the non-burning wall to a safer place.\n\t\t\t\tVelez has a set of irons, and you are relatively certain that the room adjacent to this one is not on fire at all. If you could breach the wall and somehow get everyone through, you will buy everyone valuable time.\n\t\t\t\t*gosub Harness\n\t\t\t\t*goto WallBreach\n\n\n\t#Pray.\n\t\tThe situation is so overwhelmingly bad that you really just have no idea what to do. You can't begin to imagine how to get everyone out of this room alive.  Paralyzed with fear, you do the one thing you feel you can: you pray for guidance, protection, peace, and the lives and souls of those depending on you.\n\n\t\tWhat do you do next?\n\n\t\t*choice\n\t\t\t#Nothing. What can I do?\n\t\t\t\tPerhaps you are paralyzed with indecision. Maybe you just lack the knowledge and training to know your options.  Whatever the reason, you don't try to do anything. You just lie there with Velez and the boy while the nursery grows to be hot enough for the spontaneous ignition of all combustible materials and gas in the area.  The room flashes over in a swirl of red and black. The intense heat is unbearable.  But then, mercifully, there is darkness.\n\t\t\t\t*goto ManyDeaths\n\n\t\t\t#I remember Velez's radio and use it.\n\t\t\t\t*gosub Mayday\n\t\t\t\t*page_break\n\t\t\t\tAnd if you had thought to use the radio first, it might have made all the difference. Instead, however, you chose to use precious seconds in spiritual communion with the divine.  During that time, the temperature in the nursery grows to be hot enough for the spontaneous ignition of all combustible materials and gas in the area.  The room flashes over in a swirl of red and black. The intense heat is unbearable.  But then, mercifully, there is darkness.\n\t\t\t\t*goto ManyDeaths\n\n\t\t\t*if (fire_knowledge \u003c 60) #I break the window for air.\n\t\t\t\tIt's getting so hot in here, and the thick black smoke has banked almost down to the floor. If anyone has any chance of surviving, you feel the best thing to do will be to break the window and try to air out the room.  Plus, as far as you can tell, the window will be the best and closest path for all of you to get the hell out of there. \n\n\t\t\t\t*if sequipment = \"irons\"\n\t\t\t\t\tSo you use the pointed end of your halligan to break the top and bottom sections of bedroom window. It shatters into pieces and a rush of fresh air floods the room.\n\t\t\t\t\t*goto FlashoverDeaths\n\n\t\t\t\t*else \n\t\t\t\t\tSo you use the pointed end of Velez's halligan to break the top and bottom sections of bedroom window. It shatters into pieces and a rush of fresh air floods the room.\n\t\t\t\t\t*goto FlashoverDeaths\n\t\t\t\t\t\n\n\t\t\t*if (sequipment = \"irons\") #I use my axe and halligan to break through the non-burning wall to a safer place.\n\t\t\t\tYou have a set of irons, and you are relatively certain that the room adjacent to this one is not on fire at all. If you could breach the wall and somehow get everyone through, you will buy everyone valuable time.\n\n\t\t\t\tAnd if you had thought to try this earlier, it might have made all the difference. Instead, however, you chose to use precious seconds in spiritual communion with the divine.  During that time, the temperature in the nursery grows to be hot enough for the spontaneous ignition of all combustible materials and gas in the area.  The room flashes over in a swirl of red and black. The intense heat is unbearable.  But then, mercifully, there is darkness.\n\t\t\t\t*goto ManyDeaths\n\t\t\t\t\n\t\t\t*if (sequipment != \"irons\") #I use Velez's axe and halligan to break through the non-burning wall to a safer place.\n\t\t\t\tVelez has a set of irons, and you are relatively certain that the room adjacent to this one is not on fire at all. If you could breach the wall and somehow get everyone through, you will buy everyone valuable time.\n\t\t\t\t\n\t\t\t\tAnd if you had thought to try this earlier, it might have made all the difference. Instead, however, you chose to use precious seconds in spiritual communion with the divine.  During that time, the temperature in the nursery grows to be hot enough for the spontaneous ignition of all combustible materials and gas in the area.  The room flashes over in a swirl of red and black. The intense heat is unbearable.  But then, mercifully, there is darkness.\n\t\t\t\t*goto ManyDeaths\n\n\t#Use Velez's radio to call for help.\n\t\t*set mayday true\n\t\t*gosub Mayday\n\n\t\tWhat do you do next?\n\t\t*choice\n\t\t\t*selectable_if (sequipment = \"irons\") #Use my axe and halligan to break through the non-burning wall to a safer place.\n\t\t\t\tYou have a set of irons, and you are relatively certain that the room adjacent to this one is not on fire at all. If you could breach the wall and somehow get everyone through, you will buy everyone valuable time.\n\t\t\t\t*goto WallBreach\n\t\t\t*selectable_if (sequipment != \"irons\") #Use Velez's axe and halligan to break through the non-burning wall to a safer place.\n\t\t\t\tVelez has a set of irons, and you are relatively certain that the room adjacent to this one is not on fire at all. If you could breach the wall and somehow get everyone through, you will buy everyone valuable time.\n\t\t\t\t*goto WallBreach\n\t\t\t*selectable_if (sequipment = \"watercan\") #Use my water can to lower the temperature in the room and buy us more time.\n\t\t\t\tYou have a water can with you.  It occurs to you that you might be able to buy a few more precious seconds for everyone if you can cool down the room enough to prevent it from flashing over.  \n\n\t\t\t\tSo you open up the spray, sending a blast of water toward the ceiling.  It is the only thing you can think to have done, but it was a bad choice. With this much fire and heat, all your few gallons of water can do is create a searing burst of steam, which, of course, doesn't help anything at all.\n\n\t\t\t\tThe room is still getting hotter.  You have to get out of here now before your mask starts to melt.  \n\n\t\t\t\tHow are you going to do that?\n\t\t\t\t*choice\n\t\t\t\t\t#I'll breach the wall and try to get him to the next room.\n\t\t\t\t\t\t*goto Wallbreach\n\t\t\t\t\t#We're going out the window. It's faster.\n\t\t\t\t\t\t*goto WindowRescue\n\n\n\t\t\t#Use Velez's length of webbing to fasten a five-point harness.\n\t\t\t\t*gosub Harness\n\n\t\t\t\tNow where are you taking him?\n\t\t\t\t*choice\n\t\t\t\t\t#I'll breach the wall and try to get him to the next room.\n\t\t\t\t\t\t*goto Wallbreach\n\t\t\t\t\t#We're going out the window. It's faster.\n\t\t\t\t\t\t*goto WindowRescue\n\n\t\t\t\t\t\n\n\t\t\t#Pray.\n\t\t\t\t*goto LastPrayer\n\n*label WindowRescue\n\nAs far as you can tell, going out the window is going to be the quickest and safest option in these rapidly worsening conditions, but it is far from a sure thing.\n\nFortunately, you have a radio with you now, and you can use it to receive ample guidance and instruction:  \n\n*if fire_knowledge >60\n\tIt occurs to you that the moment you break that window you will only have a few moments before the addition of fresh air causes the fire in the room to flair up considerably.\n\n*page_break\n\n\"Mayday to Chief: We need to go out the window. Things are pretty bad in here.\"\n\n\"Copy that, ${Lname}.  We're getting into place. Stand by.\"\n\n\"Okay, Chief.  Hurry, please.\"  You do your best to keep the panic from rising in your voice.  You have to keep calm, but your blood is pounding in your ears.\n\n*gosub Air\n\n\n\"Chief to Mayday:\" Chief Gordon's voice crackles over the radio.  \"We have the ladder in place and RIT members standing by outside to assist you. I'm gonna walk you through this, ${Fname}.  You're going to be okay.\"\n\n*if velez_harness \n\t*goto VelezHarnessWindow\n\n\n*elseif teen_harness \n\t*goto TeenHarnessWindow\n\n*else\n\t*goto VictimDecision\n\n*label VictimDecision\n\n\nHere's an important decision: do you try to take Velez or the victim with you or do you feel there is only enough time to save yourself?\n\n*choice\n\t#I'm not even sure I have enough time to save myself, but I want to live!\n\t\t*set save_victim \"self\"\n\t\t*goto QuickWindowExit\n\t#I refuse to leave without Velez.\n\t\t*set save_victim \"Velez\"\n\t\t*goto QuickWindowExit\n\t#I refuse to leave without the teenager that Velez was trying to save.\n\t\t*set save_victim \"teen\"\n\t\t*goto QuickWindowExit\n\t#I'm going to try to save everyone!\n\t\t*set save_victim \"all\"\n\t\t*goto QuickWindowExit\n\n\n\n*label QuickWindowExit\n\nThe Chief's voice remains calm and steady.  \"Now the first step is you have to use a tool and break the window.  Once the glass is clear, someone will be up to help you. Got it?\"\n\n\"Got it, Chief!\" you reply.\n\n*if air = \"warning\"\n\tAt this moment, your vibe alert goes off, informing you that you have only a few minutes left of air. \n\n\tDo you inform the Chief?\n\t*fake_choice\n\t\t#Yes, of course I do.\n\t\t\t\"Chief, I'm running low on air.\"\n\n\t\t\t\"You have enough to finish the job,\" he assures you.  \"Just stay calm.  You'll be out of there in just a couple minutes.\" \n\n\t\t\tThis must be the longest couple minutes of your life!\n\t\t#No. I focus on my job.\n\t\t\tIf you're not out of this house in a couple minutes, your air supply will only be one of many problems. You focus on the task at hand.\n\n*if save_victim = \"self\"\n\t*goto DowntheLadder\n\n*elseif save_victim = \"Velez\"\n\t\"I'm getting Velez out of here,\" you inform the Chief.\n\n\t\"Copy that,\" the Chief replies.\n\t*goto VelezHarnessWindow2\n*elseif save_victim = \"teen\"\n\t\"I'm getting the kid out of here,\" you inform the Chief.\n\t\"Copy that,\" the Chief replies.\n\t*goto  TeenHarnessWindow2\n*elseif save_victim = \"all\"\n\t\"I need to get the victims out of here first,\" you inform the Chief.\n\t\"Copy that,\" the Chief replies.\n\n\tBut who first?  Pick one.\n\t*choice\n\t\t#I'll try to save Velez.\n\t\t\t*goto VelezHarnessWindow2\n\t\t#I'll try to save the teenager.\n\t\t\t*goto  TeenHarnessWindow2\n\n\n*label TeenHarnessWindow\n\nYou take a deep (but not too deep) breath.  \"I've got the civilian victim in a harness,\" you report to the Chief. \"So I can move him.\"\n\n\"Good job,\" the Chief replies.  \"Now you have to use a tool and break the window.  Once the glass is clear, someone will be up to help you. Got it?\"\n\n\"Got it, Chief!\" you reply.\n\n*page_break\n\nYou pick up a halligan and use the pointed end of it to break the glass and then the whole tool to brush away shards of broken glass until the entire window, top and bottom, is clear. A flood of fresh air rushes in to feed the fire.  The ladder is placed, as promise, with a lot of emergency responders waiting down below.\n\n\"Good!\" comes the Chief's voice over the radio.\n\n*if air = \"warning\"\n\tAt this moment, your vibe alert goes off, informing you that you have only a few minutes left of air. \n\n\tDo you inform the Chief?\n\t*fake_choice\n\t\t#Yes, of course I do.\n\t\t\t\"Chief, I'm running low on air.\"\n\n\t\t\t\"You have enough to finish the job,\" he assures you.  \"Just stay calm.  You'll be out of there in just a couple minutes.\" \n\n\t\t\tThis must be the longest couple minutes of your life!\n\t\t#No. I focus on my job.\n\t\t\tIf you're not out of this house in a couple minutes, your air supply will only be one of many problems. You focus on the task at hand.\n\t*goto TeenHarnessWindow2\n*else\n\t*goto TeenHarnessWindow2\n\n*label TeenHarnessWindow2\n*set saved_by_RIT true\n\n\"Can you get him up over the sill safely?\" the Chief asks next.\n\n*choice\n\t*selectable_if (strength > 60) #Yes. You have trained for this moment.  You know you are strong enough.\n\t\t\n\t\t\"Yes, Chief.  I'm on it.\"\n\n\t\t\"Great.  An RIT member is coming up to help you get him down the ladder.\"\n\n\t\t*set relationship_officers %+20\n\n\t\t*page_break\n\n\t\tAll those hours spent working out have been entirely worth it, if only for this moment. You lift the unconscious teenager in your arms get him on the windowsill, facing out.  His head falls forward limply. A member of the RIT is there on the ladder, ready to help guide him down, with the unconscious victim's legs draped over his arm.\n\n\t\t*goto DowntheLadder\n\n\t*selectable_if (strength \u003c 61) #No.  You're not strong enough.\n\t\tWhether you've been lazy with your work-outs or you're just not physically able to do it, there's no way you can heft a a person over a window sill in a burning room.  You just can't.  It's not possible.\n\n\t\t\"No, Chief.  He's too heavy.\"\n\n\t\t\"Okay.  Don't worry. An RIT member is coming up to help you out.\"\n\n\t\t*page_break\n\n\t\tAs promised, two firefighters are climbing up the ladder swiftly.  One jumps into the room with you and helps you lift the victim onto the windowsill, facing outward.  His head falls forward limply. Another firefighter is there on the ladder, ready to help guide him down, with the unconscious boy's legs draped over his arm.\n\n\t\t*goto DowntheLadder\n\n\t*selectable_if (fire_knowledge > 60) # Yes. Moving people isn't always about strength. (High Fire Knowledge)\n\t\t\"I can do it, Chief.\"\n\n\t\t\"Great.  An RIT member is coming up to help you get him down the ladder.\"\n\n\t\t*set relationship_officers %+20\n\n\t\t*page_break\n\n\t\tYou know how to lift people properly, balancing the weight and using the harness to your advantage. It isn't easy, but there's not a second to waste.  You get the boy up onto the windowsill, facing out. His head falls forward limply. His head falls forward limply. Another firefighter is there on the ladder, ready to help guide him down, with the unconscious victim's legs draped over his arms. \n\t\t*goto DowntheLadder\n\n\t*selectable_if (career = \"engineer\") #Yes. There is a such thing as mechanical advantage. (Engineer)\n\t\t\"I can do it, Chief.\"\n\n\t\t\"Great.  An RIT member is coming up to help you get him down the ladder. \"\n\n\t\t*set relationship_officers %+20\n\n\t\t*page_break\n\n\t\tAs an engineer, you have an idea how to balance the boy's weight and using the harness to your advantage. It isn't easy, but there's not a second to waste.  You get the victim up onto the windowsill, facing out.  His head falls forward limply. His head falls forward limply. An RIT member is there on the ladder, ready to help guide him down, with the unconscious teenager's legs draped over his arms.\n\t\t*goto DowntheLadder\n\n\n\n*label VelezHarnessWindow\n\nYou take a deep (but not too deep) breath.  \"I've got Firefighter Velez in a harness,\" you report to the Chief. \"So I can move him.\"\n\n\"Good job!\" he encourages you.  \"Now you have to use a tool and break the window.  Once the glass is clear, someone will be up to help you. Got it?\"\n\n\"Got it, Chief!\" you reply.\n\n*page_break\n\nYou pick up a halligan and use the pointed end of it to break the glass and then the whole tool to brush away shards of broken glass until the entire window, top and bottom, is clear. A flood of fresh air rushes in to feed the fire.  The ladder is placed, as promise, with a lot of emergency responders waiting down below.\n\n\"Good!\" comes the Chief's voice over the radio.\n\n*if air = \"warning\"\n\tAt this moment, your vibe alert goes off, informing you that you have only a few minutes left of air. \n\n\tDo you inform the Chief?\n\t*fake_choice\n\t\t#Yes, of course I do.\n\t\t\t\"Chief, I'm running low on air.\"\n\n\t\t\t\"You have enough to finish the job,\" he assures you.  \"Just stay calm.  You'll be out of there in just a couple minutes.\" \n\n\t\t\tThis must be the longest couple minutes of your life!\n\t\t#No. I focus on my job.\n\t\t\tIf you're not out of this house in a couple minutes, your air supply will only be one of many problems. You focus on the task at hand.\n\t*goto VelezHarnessWindow2\n*else\n\t*goto VelezHarnessWindow2\n\n*label VelezHarnessWindow2\n\n\"Can you get him up over the sill safely?\" the Chief asks next.\n\n*choice\n\t*selectable_if (strength > 75) #Yes. You have trained for this moment.  You know you are strong enough.\n\t\t\n\t\t\"Yes, Chief.  I'm on it.\"\n\n\t\t\"Great.  An RIT member is coming up to help you get him down the ladder.\"\n\n\t\t*set relationship_officers %+20\n\n\t\t*page_break\n\n\t\tAll those hours spent working out have been entirely worth it, if only for this moment. You lift Firefighter Velez all by yourself and get him on the windowsill, facing out.  Velez's head falls forward limply. His head falls forward limply. Another firefighter is there on the ladder, ready to help guide him down, with the unconscious firefighter's legs draped over his arm.\n\n\t\t*goto DowntheLadder\n\n\t*selectable_if (strength \u003c 75) #No.  You're not strong enough.\n\t\tWhether you've been lazy with your work-outs or you're just not physically able to do it, there's no way you can heft a fairly large man plus 50 pounds of his firefighting bunker gear over a window sill in a burning room.  You just can't.  It's not possible.\n\n\t\t\"No, Chief.  He's too heavy.\"\n\n\t\t\"Okay.  Don't worry. An RIT member is coming up to help you out. \"\n\n\t\t*page_break\n\n\t\tAs promised, two firefighters are climbing up the ladder swiftly.  One jumps into the room with you and helps you lift Firefighter Velez onto the windowsill, facing outward.  Velez's head falls forward limply. Another firefighter is there on the ladder, ready to help guide him down, with the unconscious firefighter's legs draped over his arm.\n\n\t\t*goto DowntheLadder\n\n\t*selectable_if (fire_knowledge > 70) # Yes. Moving people isn't always about strength. (High Fire Knowledge)\n\t\t\"I can do it, Chief.\"\n\n\t\t\"Great.  An RIT member is coming up to help you get him down the ladder. Remove the regulator last. He won't need it outside.\"\n\n\t\t*set relationship_officers %+20\n\n\t\t*page_break\n\n\t\tYou know how to lift people properly, balancing the weight and using the harness to your advantage. It isn't easy, but there's not a second to waste.  You get Velez up onto the windowsill, facing out.  You remove the regulator, and air hisses loudly. Velez's head falls forward limply. His head falls forward limply. Another firefighter is there on the ladder, ready to help guide him down, with the unconscious firefighter's legs draped over his arms. \n\t\t*goto DowntheLadder\n\n\t*selectable_if (career = \"engineer\") #Yes. There is a such thing as mechanical advantage. (Engineer)\n\t\t\"I can do it, Chief.\"\n\n\t\t\"Great.  An RIT member is coming up to help you get him down the ladder. Remove the regulator last. He won't need it outside.\"\n\n\t\t*set relationship_officers %+20\n\n\t\t*page_break\n\n\t\tAs an engineer, you have an idea how to balance the firefighter's weight and using the harness to your advantage. It isn't easy, but there's not a second to waste.  You get Velez up onto the windowsill, facing out.  You remove the regulator, and air hisses loudly. Velez's head falls forward limply. His head falls forward limply. Another firefighter is there on the ladder, ready to help guide him down, with the unconscious firefighter's legs draped over his arms.\n\t\t*goto DowntheLadder\n\n*label DowntheLadder\n\n*if (velez_harness) or (save_victim = \"velez\")\n\n\n\tOnce Velez is safely on the ground, he is quickly moved out of the way and surrounded by a swarm of paramedics.  While this is happening, the room behind you starts to spontaneously ignite in a phenomenon called a flashover.  There is simply no time to try to rescue the second victim.\n\n\t\"Get out of there, ${Fname}!\" Chief Gordon yells loudly enough for you to hear both on the radio and with your ears.  He doesn't have to tell you twice!  You go out the window head first, righting yourself on the ladder and sliding quickly away as boiling flames shoot eight feet out the window over your head.  You make it out just in time.\n\n\t*page_break\n\n\tIt was a terrible fire.\n\n\tUnfortunately, despite the best efforts of you and everyone else at the scene, they were unable to revive Firefighter Velez.  It was later determined that he suffered a massive cardiac arrest during his search and that there was no way you could have done anything that would have made any difference.  \n\n\tThe teenage boy was pronounced dead at the scene, and the elderly man, despite being rescued from his ground floor bedroom, was very frail and died a few days later in the hospital from complications due to smoke inhalation.\n\n\t*set saved_by_RIT true\n\t*set velez_rescue true\n\n\t*goto VelezFuneral\n\n*elseif (teen_harness) or (save_victim = \"teen\")\n\n\tOnce the teenager is safely on the ground, he is quickly moved out of the way and surrounded by a swarm of paramedics.  While this is happening, the room behind you starts to spontaneously ignite in a phenomenon called a flashover.  There is simply no time to try to rescue Velez.\n\n\t\"Get out of there, ${Fname}!\" Chief Gordon yells loudly enough for you to hear both on the radio and with your ears.  He doesn't have to tell you twice!  You go out the window head first, righting yourself on the ladder and sliding quickly away as boiling flames shoot eight feet out the window over your head.  You make it out just in time.\n\n\t*goto HeroismRewarded\n\n*else\n\tThere just isn't enough time to save everybody and do everything.  You've decided you don't want to die in this fire today.  You want to live. \n\n\tSo you remember your training regarding ladder bailout. You go head first out onto the ladder until you can pivot around and slide down the rest of the ladder in seconds. \n\n\tJust as your feet touch the ground, orange flame bursts out of window above your head and the whole second floor of the house is a raging conflagration.  At some officer's command, the fire trucks begin sounding the evacuation tones. You collapse to your knees in exhaustion.\n\n\t*page_break\n\n\tThere is a firefighter saying that goes \"No one left behind.\" You left Velez behind. \n\n\tIt was a tough situation. No one is going to give you a hard time about it.  But you know what you did, and they know it too.\n\t*set relationship_officers %-30\n\t*set relationship_firefighters %-30\n\t*goto VelezDeath4\n\n*label LastPrayer\n\nThe situation is so overwhelmingly bad that you really just have no idea what to do.  What can you do, really? You can't begin to imagine how to get everyone out of this room alive.  Paralyzed with fear, you do the one thing you feel you can: you pray for guidance, protection, peace, and that the RIT will get to you in time.\n\n*page_break\n\nBut it doesn't.  \n\nThe fire is too hot, and the structure of the house is becoming unstable. If they send more people in, there's too high a probability that they will not survive.  Chief Gordon tells you so on the radio.  \"Bail out the window,\" he orders you.  \"Go now.  Go! Go!\"\n\nDo you bail out the window or stay with Velez and the victim?\n*choice\n\t#I bail out the window.\n\t\tThere no time for hesitation or internal debate.  You follow the Chief's orders. You want to live.\n\t\t*goto Bailout\n\t#I choose to stay.\n\t\tYou can't leave Firefighter Velez. You wouldn't be able to live with yourself. Maybe your bunker gear will be enough to protect everyone.\n\n\t\tYou use your own body to cover that of the unconscious teenager and part of Velez as an added buffer against the heat and flame.  Then the room flashes over in a swirl of red and black. The intense heat is unbearable.  Soon, mercifully, there is darkness.\n\t\t*goto ManyDeaths\n\n\n\n*label Mayday\nAs team leader, Velez carries a radio. You feel around his bunker coat until you can unclip the speaker mic, hold it to your mouth, and press the button.  \"MAYDAY! MAYDAY! MAYDAY!\" you call three times, as you were trained to do. Once the mayday comes in, the chatter of radio traffic suddenly quiets and the focus is on you.  \n\n*page_break\n\n\"Mayday, go ahead.\"  You recognize Chief Gordon's voice. He must have just arrived.\n\n\"${Lname} here, from the search team. Firefighter Velez incapacitated. Second unconscious victim present. We're in a room on the second floor, exposure 3. Conditions deteriorating rapidly.\"\n\n*page_break\n\n\"Copy that,\" comes the reply.  \"We're putting a ladder up to your position, and we'll send in the RIT to see if they can get to you. Hang in there, ${Lname}.\" The chief's voice is calm and reassuring. You tell yourself he must have been in this sort of situation a hundred times.  If he could survive, you can too.\n\n*return\n\n*label Mayday2\n\nAs team leader, Velez carries a radio. You feel around his bunker coat until you can unclip the speaker mic, hold it to your mouth, and press the button.  \"MAYDAY! MAYDAY! MAYDAY!\" you call three times, as you were trained to do. Once the mayday comes in, the chatter of radio traffic suddenly quiets and the focus is on you.  \n\n\"Mayday, go ahead.\"  You recognize Chief Gordon's voice. He must have just arrived.\n\n*page_break\n\n\"${Lname} here, from the search team. Firefighter Velez incapacitated. Second unconscious victim in adjacent bedroom. We're in a bathroom on the second floor, exposure 3. Conditions deteriorating rapidly.\"\n\n\"Copy that,\" comes the reply.  \"We'll send in the RIT to see if they can get to you. Hang in there, ${Lname}.\" The chief's voice is calm and reassuring. You tell yourself he must have been in this sort of situation a hundred times.  If he could survive, you can too.\n\n*return\n\n*label Mayday3 \n\nAs team leader, Velez carries a radio. You feel around his bunker coat until you can unclip the speaker mic, hold it to your mouth, and press the button.  \"MAYDAY! MAYDAY! MAYDAY!\" you call three times, as you were trained to do. Once the mayday comes in, the chatter of radio traffic suddenly quiets and the focus is on you.  \n\n\"Mayday, go ahead.\"  You recognize Chief Gordon's voice. He must have just arrived.\n\n*page_break\n\n\"${Lname} here, from the search team, with Probie ${NPname}. Firefighter Velez is incapacitated, unconscious.  We're in a room on the second floor, exposure 3. Conditions deteriorating rapidly.\"\n\n\"Copy that,\" comes the reply.  \"We're putting a ladder up to your position, and we'll send in the RIT to see if they can get to you. Hang in there, ${Lname}.\" The chief's voice is calm and reassuring. You tell yourself he must have been in this sort of situation a hundred times.  If he could survive, you can too.\n\n*return\n\n\n*label Harness\n\t\t\t\t\nWherever you go, you're determined to bring your victims with you.  This process would be far more efficient and safe with the mechanical advantage of a five-point harness. \n\nVelez, being the experienced firefighter that he is, has a loop of webbing in his bunker gear pocket that would be perfect for a single harness, but all you have is a search rope which is too thin to support anyone's body weight.  So you can only make one harness.  \n\nWho is it for?\n\n*choice\n\t#Velez. Firefighters watch each other's backs.\n\t\tThe harsh truth is that you just might not be able to save everybody.  So you have a tough decision to make. You wouldn't want another firefighter to leave you behind when you were unconscious.  The least you can do is help out Velez. \n\t\tSo, with clumsy gloved hands, you take the loop of webbing and wrap him in a make-shift five-point harness, legs first, then arms, securing the webbing behind his shoulders with a carabiner.  He's all ready to go!  \n\t\t*set velez_harness true\n\t\t*return\n\t#The teenager. Velez would want you to.\n\t\tThe harsh truth is that you just might not be able to save everybody.  So you have a tough decision to make.  \n\n\t\tYou see it like this: Velez was willing to risk his life to try to save this teenage boy.  If you rescue Velez and the teenager dies, he might never forgive you.  So you have to try to save the boy first.  Besides, Velez can last longer in harsh conditions because, like you, he is wearing his PPE.\n\n\t\tSo, with clumsy gloved hands, you take the loop of webbing and wrap him in a make-shift five-point harness, legs first, then arms, securing the webbing behind his shoulders with a carabiner.  He's all ready to go! \n\n\t\t*set teen_harness true\n\t\t*return\n\n*label Air\n*page_break\n\nBy the way, this is a pretty stressful situation and you only have so much air in your pack.  \n\n*if (strength >= 60) or (fire_skills >= 60)\n\tBut you are careful to breathe calmly and slowly. Mindful breathing is key.  You need to conserve your air so that it lasts as long as possible. \n\t*set air \"good\"\n\t*return\n\n*elseif (fire_skills >= 40) and  (fire_skills \u003c 60)\n\tYou don't have enough experience yet to have a feel for how to pace yourself, but you're doing the best you can in a bad situation. It's perfectly understandable to be breathing heavily with so much physical exertion in a life-threatening scenario. Just be careful. Your air is limited, and you know full well what will happen if you run out.\n\t*set air \"ok\"\n\t*return\n\n*else\n\tDespite your training, you are having a hard time moderating your breathing.  Between the all the physical exertion and the knowledge that you could die at any moment, it's perfectly understandable that you would be breathing more quickly and deeply than if you are lounging on the couch at home.  However, your air is limited, and you know full well what will happen if you run out. Be careful.\n\t*set air \"warning\"\n\t*return\n\n\n*label WallBreach\n\nWorking quickly, you take the axe in one hand and head for the far wall. You have to shove the crib aside.  Then you hit the dry wall with your fist until you're pretty sure you find an area without a stud. \n\nYou swing your axe. It goes through the wall.  You kick with your heavy boot and create a larger hole.  With a great sense of urgency, you kick and chop your way through the dry wall and one of the wooden studs until you make a space barely large enough for a person to squeeze through.  It will have to do.\n\n*gosub Air\n\nBreaking through the wall took a lot of time. If you have 30 seconds before the room flashes over, you'd consider yourself lucky. So it's definitely time to get out of here.\n\n*if air = \"warning\"\n\tAnd, to make matter's worse, now your vibe-alert is going off, which means you only have a couple minutes left of air.  Does this change your plans at all?\n\t\t\n\t*choice\n\t\t#Unfortunately, yes. I need to try to save myself.\n\t\t\tIf you run out of air and lose consciousness, you, Velez, and the teenage victim will probably die. But, if you try to leave now, there's still a chance that you might make it out alive. \n\n\t\t\tSo you make the terrible choice to leave the others behind and go through the breach in the wall by yourself.  Once on the other side, you move a large hamper over to block the hole.  You are able to open the bathroom door and crawl out into the hallway.  Following a left-hand lead, you soon find the stairs.  \n\n\t\t\tAs fast as you can manage, you scramble down the stairs as fast and find yourself surrounded by fellow firefighters in the foyer.  They help you outside onto the lawn where you rip off your mask and take great big gulps of fresh air. \n\n\t\t\tTears stream down your face as the second story of the house is completely consumed by flame, and the loud horns of the fire engines start sounding the tones to evacuate.\n\t\t\t*goto VelezDeath2\n\t\t#No. I carry on with my plan.\n\t\t\tYou are committed to your rescue plan, and you're sticking to it.  You don't particularly want to die, but you couldn't live with the guilt if you left others behind to save yourself.\n\t\t\t*goto WallBreach2\n\n*label WallBreach2\n\n*if velez_harness \n\tYou have Velez in a harness so you just summon all your strength and pull and drag and yank with all your might until you have him through the breach in the wall and into the bathroom beyond. Once on the other side, you move a large hamper over to block the hole.\n\t*if mayday\n\t\t*goto MayDayRescueVelez\n\t*else\n\t\tWhat do you do now?\n\n\t\t*choice\n\t\t\t#Use Velez's radio to call in a mayday.\n\t\t\t\t*gosub Mayday2\n\n\t\t\t\t\"Chief to Mayday,\" comes the transmission a few moments later. \"What's your status?\" It's important to remain in radio contact at this point.\n\n\t\t\t\t*goto MayDayRescueVelez\n\n\t\t\t#Try to pull Velez out the bathroom door, into a safer part of the hallway, and hopefully meet the hose team on the stairs.\n\t\t\t\tThe hallway is hot when you open the bathroom door again. Dark smoke rushes into the previously closed-in bathroom.  You grab Velez's harness and drag him out into the hall.  \n\n\t\t\t\tWith immense relief, you hear the sound of the hose team coming up the stairs. \"Help!\" you call to them. \"Firefighter down!\"\n\n\t\t\t\tThe hose team leader quickly radios for additional manpower, and the third man on the hose line, Firefighter Warner, moves to help you move Velez.\n\n\t\t\t\t*page_break\n\n\t\t\t\t*if air = \"good\" \n\t\t\t\t\t*goto WarnerHelpswithVelez \t\n\t\t\t\t*elseif air = \"ok\"\n\t\t\t\t\tAt this point, your vibration alert goes off to warn you that you only have a couple minutes left of air. \n\n\t\t\t\t\tDo you mention this to Warner?\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#Of course I do.\n\t\t\t\t\t\t\t\"I'm running out of air!\" you yell to Warner.\n\n\t\t\t\t\t\t\t\"It's okay. Stay calm,\" he replies with the voice of experience. \"Breathe carefully. We'll all be out of here in a moment.\"\n\t\t\t\t\t\t#No. It's not the priority right now.\n\t\t\t\t\t\t\tIf you're all not out of here in a couple minutes, your air supply will only be one of many problems. So you work on controlling your breathing and remaining calm to focus on the task at hand.\n\t\t\t\t\t*goto WarnerHelpswithVelez \t\n\t\t\t\t*else\n\t\t\t\t\tYou've been ignoring your vibe alert, but eventually the air you are breathing starts to get thin and you start to feel light-headed. \"Warner,\" you begin, trying to let your fellow firefighter know what's going on. \"We have a problem.\" And then you pass out.\n\t\t\t\t\t*set no_air true\n\t\t\t\t\t*goto ExplanationPart1\n\n\n\t\t\t#I stay put and wait for help.\n\n\t\t\t\tNow all you can do really is wait.  \n\n\t\t\t\tWith immense relief, you hear the sound of the hose team coming up the stairs. \"Help!\" you call to them, opening up the bathroom door. \"Firefighter down! I need help here!\"\n\n\t\t\t\tThe hose team leader quickly radios for additional manpower, and the third man on the hose line, Firefighter Warner, moves to help you with the Velez.\n\n\t\t\t\t*page_break\n\n\t\t\t\t\"There's another victim in that bedroom!\" you inform the other firefighters, indicating the room in question. They look grimly at the roaring flames.  \n\n\t\t\t\tYou know they'll do their best, but you doubt it will be possible for anyone to enter the bedroom at this point, much less for the unconcious teenager to survive.\n\n\t\t\t\t*page_break\n\n\t\t\t\t*if air = \"good\" \n\t\t\t\t\t*goto WarnerHelpswithVelez\t\n\t\t\t\t*elseif air = \"ok\"\n\t\t\t\t\tAt this point, your vibration alert goes off to warn you that you only have a couple minutes of air remaining. \n\n\t\t\t\t\tDo you mention this to Warner?\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#Of course I do.\n\t\t\t\t\t\t\t\"I'm running out of air!\" you yell to Warner.\n\n\t\t\t\t\t\t\t\"It's okay. Stay calm,\" he replies with the voice of experience. \"Breathe carefully. We'll all be out of here in a moment.\"\n\t\t\t\t\t\t#No. It's not the priority right now.\n\t\t\t\t\t\t\tIf you're all not out of here in a couple minutes, your air supply will only be one of many problems. So you work on controlling your breathing and remaining calm to focus on the task at hand.\n\t\t\t\t\t*goto WarnerHelpswithVelez \t\n\t\t\t\t*else\n\t\t\t\t\tYou've been ignoring your vibe alert, but eventually the air you are breathing starts to get thin and you start to feel light-headed. \"Warner,\" you begin, trying to let your fellow firefighter know what's going on. \"We have a problem.\" And then you pass out.\n\t\t\t\t\t*set no_air true\n\t\t\t\t\t*goto ExplanationPart1\n\n\n\n*elseif teen_harness\n\tYou have the teenager in a harness so you just summon all your strength and pull and drag and yank with all your might until you have him through the breach in the wall and into the bathroom beyond. Once on the other side, you move a large hamper over to block the hole.\n\t\t\n\t*if mayday\n\t\t*goto MayDayRescueTeen\n\t*else\n\t\tNow all you can do really is wait.  \n\n\t\tWith immense relief, you hear the sound of the hose team coming up the stairs. \"Help!\" you call to them, opening up the bathroom door. \"I have a victim! I need help here!\"\n\n\t\tThe hose team leader quickly radios for additional manpower, and the third man on the hose line, Firefighter Warner, moves to help you with the victim.\n\n\t\t*if air = \"good\" \n\t\t\t*goto WarnerHelpswithTeen \t\n\t\t*elseif air = \"ok\"\n\t\t\tAt this point, your vibration alert goes off to warn you that you only have a couple minutes of air remaining. \n\n\n\t\t\tDo you mention this to Warner?\n\t\t\t*fake_choice\n\t\t\t\t#Of course I do.\n\t\t\t\t\t\"I'm running out of air!\" you yell to Warner.\n\n\t\t\t\t\t\"It's okay. Stay calm,\" he replies with the voice of experience. \"Breathe carefully. We'll all be out of here in a moment.\"\n\t\t\t\t#No. It's not the priority right now.\n\t\t\t\t\tIf you're all not out of here in a couple minutes, your air supply will only be one of many problems. So you work on controlling your breathing and remaining calm to focus on the task at hand.\n\t\t\t*goto WarnerHelpswithTeen \t\n\t\t*else\n\t\t\tYou've been ignoring your vibe alert, but eventually the air you are breathing starts to get thin and you start to feel light-headed. \"Warner,\" you begin, trying to let your fellow firefighter know what's going on. \"We have a problem.\" And then you pass out.\n\t\t\t*set no_air true\n\t\t\t*goto ExplanationPart1\n\n\n\n*else\n\t*page_break\n\tIf you want to move an unconscious victim, you'll need the mechanical advantage of a five-point harness. \n\n\tVelez, being the experienced firefighter that he is, has a loop of webbing in his bunker gear pocket that would be perfect for a single harness, but all you have is a search rope which is too thin to support anyone's body weight.  So you can only make one harness, and you have to do it fast.  Who will it be for?\n\n\t*choice\n\t\t#Velez. Firefighters watch each other's backs.\n\t\t\tThe harsh truth is that you just might not be able to save everybody.  So you have a tough decision to make. You wouldn't want another firefighter to leave you behind when you were unconscious.  The least you can do is help out Velez. \n\t\t\tSo, with clumsy gloved hands, you take the loop of webbing and wrap him in a make-shift five-point harness, legs first, then arms, securing the webbing behind his shoulders with a carabiner.  He's all ready to go!  \n\t\t\t*set velez_harness true\n\t\t\t*page_break\n\t\t\t\n\t\t\tYou summon all your strength and pull and drag and yank with all your might until you have him through the breach in the wall and into the bathroom beyond. Once on the other side, you move a large hamper over to block the hole.\n\n\t\t\t*page_break\n\t\t\t\t\n\t\t\t*if mayday\n\t\t\t\t\"${Fname} to Chief Gordon,\" you transmit over the radio. \n\n\t\t\t\t\"Chief here.  What's your status, ${Fname}?\"\n\t\t\t\t*goto MayDay2RescueVelez\n\t\t\t*else\n\n\t\t\t\tThis seems like a really good time to use Velez' radio and call for help.\n\n\t\t\t\t*gosub MayDay2\n\n\t\t\t\t\"Chief to Mayday,\" comes the transmission a few moments later. \"What's your status?\" It's important to remain in radio contact at this point.\n\n\t\t\t\t*goto MayDayRescueVelez\n\n\t\t#The teenager. Velez would want you to.\n\t\t\tThe harsh truth is that you just might not be able to save everybody.  So you have a tough decision to make.  \n\n\t\t\tYou see it like this: Velez was willing to risk his life to try to save this teenage boy.  If you rescue Velez and the teenager dies, he might never forgive you.  So you have to try to save the boy first.  Besides, Velez can last longer in harsh conditions because, like you, he is wearing his PPE.\n\n\t\t\tSo, with clumsy gloved hands, you take the loop of webbing and wrap him in a make-shift five-point harness, legs first, then arms, securing the webbing behind his shoulders with a carabiner.  He's all ready to go! \n\n\t\t\t*set teen_harness true\n\n\t\t\t*page_break\n\n\t\t\tSo you summon all your strength and pull and drag and yank with all your might until you have him through the breach in the wall and into the bathroom beyond. Once on the other side, you move a large hamper over to block the hole.\n\t\t\t\t\n\t\t\t*if mayday\n\t\t\t\t*goto MayDayRescueTeen\n\n\t\t\t*else\n\n\t\t\t\tNow all you can do really is wait.  \n\n\t\t\t\tWith immense relief, you hear the sound of the hose team coming up the stairs. \"Help!\" you call to them, opening up the bathroom door. \"I have a victim! I need help here!\"\n\n\t\t\t\tThe hose team leader quickly radios for additional manpower, and the third man on the hose line, Firefighter Warner, moves to help you with the victim.\n\n\t\t\t\t*if air = \"good\" \n\t\t\t\t\t*goto WarnerHelpswithTeen \t\n\t\t\t\t*elseif air = \"ok\"\n\t\t\t\t\tAt this point, your vibration alert goes off to warn you that you only have a couple minutes of air remaining. \n\n\t\t\t\t\tDo you mention this to Warner?\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#Of course I do.\n\t\t\t\t\t\t\t\"I'm running out of air!\" you yell to Warner.\n\n\t\t\t\t\t\t\t\"It's okay. Stay calm,\" he replies with the voice of experience. \"Breathe carefully. We'll all be out of here in a moment.\"\n\t\t\t\t\t\t#No. It's not the priority right now.\n\t\t\t\t\t\t\tIf you're all not out of here in a couple minutes, your air supply will only be one of many problems. So you work on controlling your breathing and remaining calm to focus on the task at hand.\n\t\t\t\t\t*goto WarnerHelpswithTeen \t\n\t\t\t\t*elseif air = \"warning\"\n\t\t\t\t\tYou've been ignoring your vibe alert, but eventually the air you are breathing starts to get thin and you start to feel light-headed. \"Warner,\" you begin, trying to let your fellow firefighter know what's going on. \"We have a problem.\" And then you pass out.\n\t\t\t\t\t\n\t\t\t\t\t*set no_air true\n\t\t\t\t\t*goto ExplanationPart1\n\n*label WarnerHelpswithVelez\n*set saved_by_hoset true\n*page_break\n\nSoon, with Firefighter Warner's help, you are able to get Velez outside the burning structure.  As the paramedics surround him, you fall to your knees on the lawn, pull off your mask, and take in great gulps of fresh air.  Above you, the second story of the house goes up in flames, with no possibility of returning for the teenage boy.\n\nThe fire engine horns blast out the evacuation tones.  From that point on, it becomes a \"surround and drown\" operation, in which the fire is fought only from the outside.\n\n\n*goto VelezDeath3\n\n*label WarnerHelpswithTeen\n\nSoon, with Firefighter Warner's help, you are able to get the unconscious teenager outside the burning structure.  As the paramedics surround him, you fall to your knees on the lawn, pull off your mask and take in great gulps of fresh air.  Above you, the second story of the house goes up in flames, with no possibility of returning for Firefighter Velez. \n\nThe fire engine horns blast out the evacuation tones.  From that point on, it becomes a \"surround and drown\" operation, in which the fire is fought only from the outside.\n\n*goto HeroismRewarded\n\n\n*label MayDayRescueVelez\n\n\t\n*if air = \"warning\"\n\t\"Been better, Chief,\" you reply, starting to feel dizzy. \"Running out of air. I have Velez. In upstairs bathroom.\"\n\n\t\"Copy that. RIT should be with you any second now. You'll be out of there before you know it.\" \n\n\tYou try to take heart from his words. All you can do now is wait.\n\t*goto RescueV\n\n*elseif air = \"ok\"\n\tJust then, you feel the tell-tale vibration alert that warns you that you have only a few minutes left of air.\n\n\t\"Running low on air, Chief,\" you report. \"But I have Velez. We're in the upstairs bathroom.\"\n\n\t\"Copy that. RIT should be with you any second now. You'll be out of there before you know it.\" \n\n\tYou try to take heart from his words. All you can do now is wait.\n\t*goto RescueV\n\n*else\n\t\"I'm okay, Chief,\" you report, with \"okay\" being relative to your situation. \"I have Velez with me in the upstairs bathroom.\"\n\n\t\"Copy that. RIT should be with you any second now. You'll be out of there before you know it.\" \n\n\tYou try to take heart from his words. All you can do now is wait.\n\t*goto RescueV\n\n*label MayDay2RescueVelez\n\n\t\n*if air = \"warning\"\n\t\"Been better, Chief,\" you reply, starting to feel dizzy. \"Running out of air.\"\n\n\t\"Copy that. RIT should be with you any second now. You'll be out of there before you know it.\" \n\n\tYou try to take heart from his words. All you can do now is wait.\n\t*goto RescueV\n*elseif air = \"ok\"\n\tJust then, you feel the tell-tale vibration alert that warns you that you have only a few minutes left of air.\n\n\t\"Running low on air, Chief,\" you report. \n\n\t\"Copy that. RIT should be with you any second now. You'll be out of there before you know it.\" \n\n\tYou try to take heart from his words. All you can do now is wait.\n\t*goto RescueV\n*else\n\t\"I'm okay, Chief,\" you report, with \"okay\" being relative to your situation. \n\n\t\"Copy that. RIT should be with you any second now. You'll be out of there before you know it.\" \n\n\tYou try to take heart from his words. All you can do now is wait.\n\t*goto RescueV\n\n*label MayDayRescueTeen\n\t\n\"$Fname to Chief Gordon,\" you transmit over the radio. \n\n\"Chief here.  What's your status, ${FName}?\"\"\n\t\n*if air = \"warning\"\n\t\"Been better, Chief,\" you reply, starting to feel dizzy. \"Running out of air. I have a victim with me. In upstairs bathroom.\"\n\n\t\"Copy that. RIT should be with you any second now. You'll be out of there before you know it.\" \n\n\tYou try to take heart from his words. All you can do now is wait.\n\t*goto RescueT\n*elseif air = \"ok\"\n\tJust then, you feel the tell-tale vibration alert that warns you that you have only a few minutes left of air.\n\n\t\"Running low on air, Chief,\" you report. \"But I have the victim, the boy. We're in the upstairs bathroom.\"\n\n\t\"Copy that. RIT should be with you any second now. You'll be out of there before you know it.\" \n\n\tYou try to take heart from his words. All you can do now is wait.\n\t*goto RescueT\n*else\n\t\"I'm okay, Chief,\" you report, with \"okay\" being relative to your situation. \"I have the victim with me in the upstairs bathroom.\"\n\n\t\"Copy that. RIT should be with you any second now. You'll be out of there before you know it.\" \n\n\tYou try to take heart from his words. All you can do now is wait.\n\t*goto RescueT\n\n*label RescueV\n*set velez_rescue true\t\n*set saved_by_RIT true\n\n*page_break\nAlthough it seems like a long time, the Rapid Intervention Team arrives shortly thereafter to assist you.  One person quickly switches out your air pack, while two other firefighters strap Firefighter Velez into a slide-able stretcher. After a flurry of activity, everyone is out on the front lawn.  You and Velez are quickly surrounded by paramedics, just as the second story of the house goes up in flame. \n\n*page_break\n\nThe fire engine horns blast out the evacuation tones.  From that point on, it becomes a \"surround and drown\" operation, in which the fire is fought only from the outside.\n\n*page_break\n*goto VelezDeath3\n\n*label RescueT\n\nAlthough it seems like a long time, the Rapid Intervention Team arrives shortly thereafter to assist you.  One person quickly switches out your air pack, while two other firefighters strap the unconscious teen into a slide-able stretcher. After a flurry of activity, everyone is out on the front lawn.  You and the victim are quickly surrounded by paramedics, just as the second story of the house goes up in flame. \n\nThe fire engine horns blast out the evacuation tones.  From that point on, it becomes a \"surround and drown\" operation, in which the fire is fought only from the outside.\n\n*goto HeroismRewarded\n\n*label HeroismRewarded\n\n*page_break\n*set teenager_dead false\n*set teenager_alive true\n\nMiraculously, other than a few bumps and bruises, you are not injured.  A couple days of rest does you a world of good.  In that time, you learn that the boy you pulled from the fire is named Joshua and that he will survive. His recovery will be difficult and take a long time.  He suffered 1st and 2nd degree burns over much of his body in addition to lung damage from smoke inhalation, but he will recover.  \n\nWhen his mother comes to thank you in person, the news reporters and their cameras are nearby. You have your picture in the paper and on the evening news. Random people from $!{town_name} and beyond send you cards of gratitude.  You receive several bouquets of flowers and some considerable donations in your name to a major foundation that helps burn victims.\n\n*if motivation = \"hero\"\n\tIt's everything you wanted when  you first joined the fire department, but your newfound heroism is bittersweet.\n\n*page_break\n\n*goto Afternotes\n\n*label Afternotes\n\nOther firefighters had rescued the elderly man, Joshua's grandfather, but he was too frail and passed away shortly thereafter in the hospital from complications due to smoke inhalation.  They didn't get any of the accolades that you did, and it just doesn't seem fair.\n\nWorse than anything else, however, is the death of Firefighter Velez.  The coroner said he had had a massive heart attack, that he was probably beyond saving by the time you reached him.  Other firefighters reassure you that you did everything you could.  But the guilt lingers inside you like a shroud.  You don your formal Class-A uniform to pay your respects.\n\n*goto VelezFuneral\n\n\n*label FlashoverDeaths\n\n*page_break\n\nIf you had paid more attention during your training opportunities or perhaps just studied the basic nature of fire, you would have realized that breaking the window like that was probably one of the worst things you could have possibly done.\n\nThe new air you introduced to the room serves only to feed the ravenous fire. It swirls and rises, casting tendrils of flame across the super-heated space which promptly bursts into an inferno.  You have maybe half a second to act. \n\nWhat do you do?\n*choice\n\t#I use my emergency bail-out rope and throw myself out of the window.\n\t\t*goto Bailout\n\t\n\t#I use my own body to try to protect the victim and Velez.\n\t\tYou use your own body to cover that of the unconscious teenager and part of Velez as an added buffer against the heat and flame.  Then the room flashes over in a swirl of red and black. The intense heat is unbearable.  Soon, mercifully, there is darkness.\n\t\t*goto ManyDeaths\n\n\t*selectable_if (sequipment = \"watercan\") #I use my water can to try to buy us some more time.\n\t\tYou have a water can with you.  It occurs to you that you might be able to buy a few more precious seconds for everyone if you can cool down the room enough to prevent it from flashing over.  \n\n\t\tSo you open up the spray, sending a blast of water toward the ceiling.  It is the only thing you can think to have done, but it was a bad choice. With this much fire and heat, all your few gallons of water can do is create a searing burst of steam, which, of course, doesn't help anything at all.  \n\n\t\tThe intense heat is unbearable.  Soon, mercifully, there is darkness.\n\t\t*goto ManyDeaths\n\t#I pray.\n\t\t*goto LastPrayer\n\n*label Bailout\n\nYou have an emergency bail-out system and the training to use it. When the flashover begins, your instinct to survive overtakes everything else. With your heart hammering in your chest, you open your bail-out kit pouch, grab the hook, slam it into the window sill, release the descender and fling yourself over the sill.\n\nThe self-breaking descender catches to control your descent. You can feel your harness digging into your thighs as you slowly lower yourself down to the ground. Your bunker gear is so hot that smoke is coming off your back. Fire shoots through the window above you, consuming the nursery as you land in a heap on the ground, in shock.\n\nSoon, you are surrounded by voices and gentle hands. Then somehow you are on a stretcher and in an ambulance, blinking and confused. Then you sleep.\n\n*goto Hospital\n\n*label Hospital\n*set hospitalized true\n\nYou wake up sometime later in the hospital.  Your mother is there.  Chief Kalinowski is also there. \n\nEverything is fuzzy.  They must have given you pain medication. \n\nYour mother sees you open your eyes.  She breathes a sigh of relief, and comes over to kiss your brow. \"Thank goodness you're awake, ${Fname}. I was so worried.\"\n\n\"What's going on?\" you ask, blearily. \"What happened? Velez?\" You can feel your heart skip a beat as you ask the question of Chief Kalinowski, and you can see it on the monitor too. \n\nThe Chief is gentle but blunt. \"That fire was a bad one. He didn't make it.\"\n\n\"Oh, God,\" you say and close your eyes tightly.  \n\n*if ProbieSO\n\t\"And what about ${NPfname}?\" you asked, fearing the worst.\n\n\t\"$!{NPpronoun1}'s fine, ${Fname}.  You got ${NPpronoun3} out in time.\"  \n\n\t\"I'm right here,\" ${NPfname} says, coming over to take your hand.  You can see the emotion in ${NPpronoun2} eyes. \"Thank you.  I've been so worried.\"\n\n*page_break\n\nSo Firefighter Velez died, as did the teenage boy. The elderly man was rescued but died later in the hospital from complications due to smoke inhalation.  The house was a total loss.  \n\nYou are treated for 1st and 2nd degree burns and released a couple days later. The doctors all say you are lucky, but you don't feel anything of the sort.  You have a funeral to attend.\n\n*goto VelezFuneral\n\n\n*label ProbieHelp\n\n*temp velez_harness false\n\nThe room is filled with heavy smoke so you have to stay down near the ground and urge ${NPname} to do the same. \"Velez?\" you call. \"You in here?\"  \n\nThere is no reply.\n\n*page_break\n\n\"Do a left-hand search,\" you instruct ${NPname}, \"And I'll go right. Yell if you find him.  Got it?\" \n\n$!{NPpronoun1} nods. \"Got it.\"\n\n\"Let's go!\"  You follow the wall with your right hand and ${NPpronoun1} goes left.  You can't see anything in the thick smoke so you are both feeling with your thick-gloved hands as quickly as possible, over and under furniture until you are the one who finds Velez' prone body near the room's only window. He is unconscious, and you're not sure he is breathing.\n\n\"I got him!\" you call to ${NPname}.  \"Follow the sound of my voice until you reach me.\"  You hear shuffling about, but you don't feel ${SOpronoun3} near.  \n\n\"I can't find you! I don't know where I am!\" ${NPname} cries out after a moment, and you can hear the rising panic in ${NPpronoun2} voice. \n\n*page_break\n\nIt might be strange for a non-firefighter to imagine that anyone could get lost in a small bedroom, but when you are virtually blind from the smoke, breathing from an air mask, and crawling around with around 50 pounds of gear on you, it's all too easy for even an experienced firefighter to get disoriented.  And Probie ${NPname} hardly has any experience at all.\n\nSo what do you do?\n\n*choice\n\t#I talk ${NPpronoun3} through this.\n\t\tYou decide that the best thing to do is to calmly talk ${NPpronoun3} through this.  If ${NPpronoun1} panics, ${NPpronoun1}  might hyperventilate and use up ${NPpronoun2} air too quickly or, even worse, take off ${NPpronoun2} mask.  \n\n\t\t\"You're going to be okay, ${NPname}.  Just listen to me.  Take a moment to calm yourself down.  Take a slow breath.  You're in a little bedroom.  You can't get very lost, okay?  I'm right here, not more than 10 feet away. Do you hear me?\"\n\n\t\t\"Yes,\" comes ${NPname}'s voice in reply, sounding slightly less shaky.\n\n\t\t*page_break\n\n\t\tYou feel encouraged by this. \"Great!  Now put your left hand on the wall.  It doesn't matter which way you're facing.  Remember it's a small bedroom.  Now keep your left hand on the wall at all times and crawl until you reach me.\"\n\n\t\tYou can hear ${NPpronoun3} crawling, making slow progress, and you are painfully aware that the temperature in the room is increasing steadily.  Then, too quickly, the part of the ceiling collapses, bringing fireload with the rubble, into the room.  The temperature in the room starts to increase dramatically at this point. You can see tendrils of flames, like long fingers, start to brush along the ceiling.\n\n\t\t*if (flashovertraining) or (fire_knowledge > 65) \n\t\t\tYou have enough training and awareness to recognize the warning signs of a flashover and that you have only a few seconds before all the superheated contents of the room spontaneously ignite.\n\t\t\t*goto ProbieFlashover1\n\t\t*else\n\t\t\t*goto ProbieFlashover2\n\n\t#I leave Velez's side to find ${NPpronoun3}.\n\n\t\t\"Stay right there,\" you tell ${NPname}. \"I'm coming to get you.\"  More quietly, you say, \"Hang in there, Velez. I'll be right back.\" Then you put your right hand back on the wall and follow it around until you reach the closet where ${NPname}  has gotten ${NPpronoun3}self confused and disoriented. \"I got you.\" You squeeze ${NPpronoun3} gloved hand reassuringly.  \"You okay?\" \n\n\t\t*{NPname} nods but doesn't seem entirely convinced.\n\n\t\t\"Good. Now, keep your hand on my ankle so you don't lose me and follow me back to Velez.\"  You put ${NPname}'s hand on your bunker pants leg and turn to head back toward the window.  This time you keep your left hand on the wall.\n\n\t\tAs you crawl along, part of the ceiling collapses, bringing fireload with the rubble, into the room.  The temperature in the room starts to increase dramatically at this point. You can see tendrils of flames, like long fingers, start to brush along the ceiling.\n\n\t\t*if (flashovertraining) or (fire_knowledge > 65) \n\t\t\tYou have enough training and awareness to recognize the warning signs of a flashover and that you have only a few seconds before all the superheated contents of the room spontaneously ignite.\n\t\t\t*goto ProbieFlashover1\n\t\t*else\n\t\t\t*goto ProbieFlashover2\n\n\t#I tell ${NPpronoun3} to stay calm and stay put while I help Velez first.\n\n\t\t\"You're gonna be fine, ${NPname},\" you reassure ${NPpronoun3}. \"Slow your breathing. Stay calm. You're less than 10 feet away from me. We're just in a small bedroom. You're not lost. Just stay put if you need to. I'm going to help Velez. He's unconscious.\" You keep talking calmly so that ${NPpronoun1} can focus on your voice and hopefully avoid a full panic attack.\n\n\t\tHow do you help Velez?\n\t\t*choice\n\t\t\t#I check his bunker gear pockets for anything that could help.\n\t\t\t\tYou quickly go through his pockets and find a utility knife, a loop webbing that could be used to make a harness, and an extra carabiner. What now?\n\t\t\t\t*choice\n\t\t\t\t\t#I try to make a harness from the loop of webbing so it will be easier to move him.\n\t\t\t\t\t\t*if fire_skills > 60\n\t\t\t\t\t\t\tYou very quickly tie a hasty harness around Velez's prone body so that he will be easier to move.\n\t\t\t\t\t\t\t*set velez_harness true\n\t\t\t\t\t\t\t*goto ProbieMayday\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou attempt to tie a hasty harness around Velez's prone body so that he will be easier to move, but you just can't remember which loop goes where and in what order.  You end up with some useless arrangement of webbing that doesn't even remotely resemble any kind of harness.\n\t\t\t\t\t\t\t*goto ProbieMayday\n\n\t\t\t\t\t#I use his radio to call for help.\n\t\t\t\t\t\t*gosub Mayday3\n\t\t\t\t\t\t*goto ProbieMayday\n\n\t\t\t#I use his radio to call in a mayday.\n\t\t\t\t*gosub Mayday3\n\t\t\t\t*goto ProbieMayday\n\t\t\t#I shake him gently to see if he will respond.\n\t\t\t\tYou shake him gently and call his name again, but Velez doesn't respond. You are going to have to find a way to get him out of here yourself.  \n\n\t\t\t\tWhat do you try next?\n\t\t\t\t*choice\n\t\t\t\t\t#I use Velez's radio to call for help.\n\t\t\t\t\t\t*gosub Mayday3\n\t\t\t\t\t\t*goto ProbieMayday\n\t\t\t\t\t#I check to see if Velez's gear to see if he has anything I can use to help him.\n\t\t\t\t\t\tYou quickly go through his pockets and find a utility knife, a loop webbing that could be used to make a harness, and an extra carabiner. What now?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I try to make a harness from the loop of webbing so it will be easier to move him.\n\t\t\t\t\t\t\t\t*if fire_skills > 60\n\t\t\t\t\t\t\t\t\tYou very quickly tie a hasty harness around Velez's prone body so that he will be easier to move.\n\t\t\t\t\t\t\t\t\t*set velez_harness true\n\t\t\t\t\t\t\t\t\t*goto ProbieMayday\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tYou attempt to tie a hasty harness around Velez's prone body so that he will be easier to move, but you just can't remember which loop goes where and in what order.  You end up with some useless arrangement of webbing that doesn't even remotely resemble any kind of harness.\n\t\t\t\t\t\t\t\t\t*goto ProbieMayday\n\t\t\t\t\t\t\t#I use his radio to call for help.\n\t\t\t\t\t\t\t\t*gosub Mayday3\n\t\t\t\t\t\t\t\t*goto ProbieMayday\n\n*label ProbieFlashover1\n\n\"Oh, shit!\" you mutter under your breath.  You recognize what's happening, and you trained for this moment.  You know what you need to do, but it's terrifying.  And Probie ${NPname}, dear ${NPfname}, is here too. Both of you need to get out of here ASAP.  You both have bail-out kits as part of your gear. But will you go first or will you have ${NPpronoun3} go ahead of you? You can't think or discuss; you have to decide.\n\n*choice\n\t#I go first.\n\t\tIf you go first, you can help guide ${NPname} out the window as well.  That's your reasoning.  It makes sense.  \"${NPFname},\" you tell ${NPpronoun3}. \"We have to bail-out of this room NOW.  I'm going first.  You follow me. I'll help guide you. You've done this all before in training. Don't be scared.  I love you.\"\n\n\t\t\"What about Velez?\" ${NPpronoun1} asks.\n\n\t\t\"No time,\" you reply, not wanting to think about it.\n\n\t\t*page_break\n\n\t\tYou use the point of a halligan to shatter both panes of the window glass and brush the shards away with the shaft. Then, with your heart hammering in your chest, you open your bail-out kit pouch, grab the hook, slam it into the window sill, release the descender and fling yourself over the sill.\n\n\t\t*page_break\n\n\t\tThe self-breaking descender catches to control your descent. You can feel your harness digging into your thighs as you slowly lower yourself down to the ground.  \"${NPfname}! Bail-out! NOW!\" you yell up.  You can see ${NPpronoun2} masked face standing in the window, hesitating, scared.  \"GO NOW! GO NOW!\" you call urgently as the flames begin to boil and surge behind ${NPpronoun2} head.\n\n\t\tSlowly, too slowly, ${NPpronoun1} jams the hook into the window casement and climbs over the sill --\n\n\t\t*page_break\n\n\t\t-- only to be blasted from behind by a surge of fire. \n\n\t\t\"${NPfname}!!!\" you scream ${NPpronoun2} name as ${NPpronoun1} plunges from the window, ${NPpronoun2} fall broken suddenly by the harness and rope.   $!{NPpronoun1} hits the side of the house a couple times and then just hangs there, dangling, unmoving but for the smoke rising from ${NPpronoun2} gear.\n\n\t\t*page_break\n\n\t\t\"What the --\" Chief Gordon begins, momentarily startled by this new development, but a second later he is issuing orders, and people are racing around, bringing ${NPname} down off the rope and administering emergency medical care. \n\t\t\n\t\tDimly, you are aware of the fire truck horns sounding the evacuation tones to clear all firefighters from the building.  The Chief lets you ride in the ambulance with ${NPname}.  You need to get checked out yourself, anyway.\n\t\t*page_break\n\n\t\t*goto ProbieHospital\n\n\t#I make ${NPpronoun3} go first.\n\t\tYou know you need to have ${NPname} go first. $!{NPpronoun1} has much less experience than you, and, besides, you could never live with yourself if you left ${NPpronoun3} behind.\n\n\t\t${Fname},\" you tell ${NPpronoun3}. \"We have to bail-out of this room NOW. You're going first so I can help guide you.  You've done this all before in training. Don't be scared.  I love you.\"\n\n\t\t\"What about Velez?\" ${NPpronoun1} asks.\n\n\t\t\"No time,\" you reply, not wanting to think about it.\n\n\t\t*page_break\n\n\t\tYou use the point of a halligan to shatter both panes of the window glass and brush the shards away with the shaft. You help ${NPpronoun3} pull the hook from ${NPpronoun2} bailout kit and jam it securely into the window casement.  \"Go now,\" you tell ${NPpronoun3}.  \n\n\t\t*page_break\n\n\t\t${NPname} can tell from your tone of voice that there's no time to debate this.  $!{NPpronoun1} keeps ${NPpronoun2} head low, as per training, and goes over the window sill.  You provide guidance every step of the way, and are relieved to see other firefighters running to meet ${NPpronoun3}. \n\n\t\t*page_break\n\n\t\tNow it's your turn.  But the flashover is already beginning.  You can feel the heat of it even through your thick bunker gear.  With your heart hammering in your chest, you open your bail-out kit pouch, grab the hook, slam it into the window sill, and fling yourself over the sill.\n\n\t\t*page_break\n\n\t\tThe self-breaking descender catches to control your descent. You can feel your harness digging into your thighs as you slowly lower yourself down to the ground. Your bunker gear is so hot that smoke is coming off your back. Fire shoots through the window above you, consuming the bedroom behind you as you land in a heap on the ground, in shock.\n\n\t\tSoon, you are surrounded by voices and gentle hands. Then somehow you are on a stretcher and in an ambulance, blinking and confused. Then you sleep.\n\n\t\t*set leadership %+20\n\n\t\t*goto Hospital\n\n*label ProbieFlashover2\n\nYou find it odd behavior for a fire, really.  And, in a strange way, it is very beautiful.  \n\n*page_break\n\nA part of you remembers learning about this phenomenon during some point of your training, but you can't recall any of the specifics.  In any case, you definitely notice the increasing temperature, and, if you can feel that despite your bunker gear, then it's probably a good idea to get out of here sooner rather than later. \n\n*page_break\n\nSuddenly, fire is everywhere, exploding, swirling, rushing, [i]burning[/i].  The room is flashing over, meaning everything flammable has reached the temperature at which it spontaneously combusts.  You have only a few seconds at most before your face mask melts and you die.\n\nWhat do you do?\n\n*choice\n\t#I try to protect ${NPname}.\n\t\tYour last, dying thought is to try to protect ${NPfname} from the conflagration.  So you cover ${NPpronoun2} body with your own, hoping it will be enough to save ${NPpronoun3}.\n\n\t\tBut it isn't.\n\t\t*goto ManyFunerals\n\t#I pray.\n\t\tThe situation is so overwhelmingly bad that you really just have no idea wha
