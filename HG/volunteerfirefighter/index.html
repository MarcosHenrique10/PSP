ersonally for your part in helping his stepson.\n\n\t\t*page_break\n\n\t\t*if childinjury = \"footloss\"\n\t\t\t\"Brian's going to be okay,\" the principal tells you, looking only partially convinced. \"They're trying to save his foot, but it looks like they might have to amputate. And his brain was bleeding pretty badly; he had to have surgery. That went very well, they said. He's talking again, thankfully, forming whole sentences now, and he recognizes his parents and such, which is good.\n\n\t\t\t\"Would you know I bought him three different helmets?  The stubborn boy always took them off right after he got on his bike, right after I stopped looking.  In any case, thank you. Without your help, this could have been so much worse.\"\n\n\t\t\t*finish\n\n\t\t*else\n\t\t\t\"Brian's going to be okay,\" the principal tells you, looking only partially convinced. \"His brain was bleeding pretty badly; he had to have surgery. That went very well, they said. He's talking again, thankfully, forming whole sentences now, and he recognizes his parents and such, which is good. \n\n\t\t\t\"Would you know I bought him three different helmets?  The stubborn boy always took them off right after he got on his bike, right after I stopped looking.  In any case, thank you. Without your help, this could have been so much worse.\"\n\n\t\t\t*finish\n\n\t*elseif career=\"engineer\"\n\n\t\tSo, needless to say, you are late for work.  Actually, you don't manage to show up until almost noon. You explain to your manager the reason you are late, and she is very understanding. While you don't have time to make those changes you wanted to make before your design review, you do have a few moments to compile a list of those changes to include with your presentation.\n\n\t\t*page_break\n\n\t\tAt the design review, everything goes very well!  The gathered specialists watch your presentation with interest and seem to really like your design.  You spend a few minutes discussing those small changes you'd still like to make, and they have some suggestions for you, of course, but, overall, your design is received very well.  You'll be receiving more feedback in the coming days, but things look very promising.\n\n\t\t*page_break\n\n\t\tHowever, it turns out that the child you helped save was the stepson of one of the managers at your company, Mei Li.  She called you into her office some weeks later to thank you personally for your part in helping her stepson.\n\n\t\t*page_break\n\n\t\t*if childinjury = \"footloss\"\n\t\t\t\"Brian's going to be okay,\" Mei Li tells you, looking concerned nevertheless. \"They're trying to save his foot, but it looks like they might have to amputate. And his brain was bleeding pretty badly; he had to have surgery. That went very well, they said. He's talking again, thankfully, forming whole sentences now, and he recognizes his parents and such, which is good.\n\n\t\t\t\"Would you know I bought him three different helmets?  The stubborn boy always takes them off right after he gets on his bike, right after I stop looking.  In any case, thank you,\" she says, offering her hand to shake. \"Without your help, this could have been so much worse.\"\n\t\t\t*finish\n\n\t\t*else\n\t\t\t\"Brian's going to be okay,\" Mei Li tells you, looking concerned nevertheless. \"His brain was bleeding pretty badly; he had to have surgery. That went very well, they said. He's talking again, thankfully, forming whole sentences now, and he recognizes his parents and such, which is good. \n\n\t\t\t\"Would you know I bought him three different helmets?  The stubborn boy always takes them off right after he gets on his bike, right after I stop looking.  In any case, thank you,\" she says, offering her hand to shake. \"Without your help, this could have been so much worse.\"\n\n\t\t\t*finish\n\n\n\n*label \tMissedWork\n\nNeedless to say, you missed work that day and all of the next week.  First you were treated in the hospital, and then, when they released you the next morning, you looked like a real mess, with bandages on your face like some kind of real-life zombie.  \n\nAnd not that you're any kind of wimp, but those burns hurt like anything.  You couldn't get comfortable enough to sleep well for several days, and whatever pain pills they gave you made you loopy.\n\n*page_break\n\n*if career=\"construction\" \n\n\tYour supervisor is very sympathetic to your situation.  You receive a big basket of fruit from him and the rest of your team members, along with a \"Get Well Soon\" card.  One of your coworkers visits you to thank you in person; it turns out that the little boy you helped save was his nephew, and he is extremely grateful.\n\n\tThey had to hire a temporary worker to fill in for your absence, and everyone agrees he is neither as skilled nor as amusing as you are. They'll be expecting you back at work Monday morning, a little over a week after your injury.  The loss of a week's worth of pay is unfortunate, but you feel grateful that your injuries were as relatively minor as they were. \n\n\tYour doctors tell you the burn scars will mostly fade away in time.\n\t*finish\n\n*elseif career=\"lawyer\"\n\n\tObviously, you miss your day in court.  Somebody else at the law firm stands in for you and requests an extension based on extraordinary circumstances.  The judge is sympathetic to your work in emergency services and your related injuries and grants a two week extension, which is more than enough for you to heal, rest up, and then properly represent your client.\n\n\tYou receive flowers and a \"Get Well Soon\" card from your bosses and coworkers. One of the partners in the law firm makes a personal visit. It turns out that the kid you helped save is her stepson, and she is extremely grateful. Your doctors tell you that your burns scars will mostly fade away in time.\n\t*finish\n\t*finish\n\n*elseif career=\"dispatcher\"\n\n\tYour supervisor seems to look for any excuse to get mad at his workers so of course he gets mad at you for responding to an emergency call instead of going to work and getting yourself into this mess to begin with.\n\n\tThankfully, your coworkers are a lot more supportive.    You learn that it was actually the nephew of your coworker Janice who was the little boy you helped save, and so everyone at the dispatch center (except your supervisor, of course) now regards you as something of a hero. They fill in for you and cover all your shifts, working over time so that the phone lines are always properly covered.  They also send you a funny card that makes you laugh.\n\n\tYou'll be back at work on Monday, and your doctors tell you the burn scars will mostly fade away in time.\n\t*finish\n\n*elseif career=\"teacher\"\n\n\tYou learn later that it was your principal's stepson, Brian, who was the young victim in the accident. He has a long recovery ahead of him, but he will most likely be okay.  You are showered with gifts of flowers and fruit baskets from your students and coworkers who applaud you as a hero. \n\n\tThe school calls in a substitute teacher to take over your classes for a week until you can return, and your doctors tell you the burns scars will mostly fade away in time.\n\t*finish\n\n*elseif career=\"engineer\"\n\tWhen your manager learns the reason for your extended absence, and she reschedules your design review for two weeks from it's original date. You also get a fruit basket with a \"Get Well Soon\" card signed by everyone at work. \n\n\tWhen you final do return to work, everyone wants to talk to you to hear about what happened. It turns out that the injured child is the nephew of one of your managers, Mei Li, and she makes it a point to thank you in person for helping him.\n\n\t*page_break\n\n\tAt your rescheduled design review, everyone really seems to like your design, and you are particularly glad for the extra time you had to work on those finishing touches.  They make a few suggestions here and there for minor changes, but the concepts are sound.  You are commended for a job well done. \n\n\tYour doctors tell you the burn scars will mostly fade away in time.\n\t*finish\n\n\n*label Work\n*page_break\n\n*if career=\"construction\" \n\n\tSo you finish driving into work and spend a good 12 hours at the construction site.  You and your work crew make the extra effort to finish the one section of the new office building on schedule, and your boss is very pleased! \n\n\tBy the time you get home, you're exhausted.  You have just enough energy to eat three slices of pizza, and then you fall into bed sound asleep, never mind that it's Friday.  If your pager goes off again, you don't even hear it.\n\t*goto Lieutenant\n\n*elseif career=\"lawyer\"\n\n\tSo you drive the rest of the way into work and study your files closely. Your meeting with the witness goes well so you are feeling optimistic about going to court.  When the hour of reckoning finally arrives, you stand confidently before the judge and present your case.  \n\n\tThe prosecuting attorney is very well-prepared as well, and it isn't until the jury presents its verdict that you let out the breath you didn't realize you had been holding.  You won!\n\t*goto Lieutenant\n\n*elseif career=\"dispatcher\"\n\n\tSo you drive the rest of the way into work and arrive on time for your shift.  You handle several emergency calls smoothly, and your supervisor is pleased.  Keep up the good work!\n\t*goto Lieutenant\n\n*elseif career=\"teacher\"\n\n\tSo you drive the rest of the way into work and have plenty of time to set up your classroom for the big exam.  By the time your students arrive, all they need to do is take their seats.  You hand out the exams and the morning passes by smoothly.\n\t*goto Lieutenant\n\n*elseif career=\"engineer\"\n\n\tSo you drive the rest of the way to your office and get to work right away putting the finishing touches on your design.  After a couple of hours, you finally feel satisfied with the end result and are anxious to get to your design review.  You spend 20 minutes pacing and another 5 drinking a cup of tea, and finally you can make your way to the meeting room where the review is being held.\n\n\tAnd all your hard work pays off!  In general, everyone really likes your design.  They make a few suggestions here and there for minor changes, but the concepts are sound.  You are commended for a job well done.\n\t*goto Lieutenant\n\n\n*label Lieutenant\n*if responses=\"0\"\n\t*set warning +1\n\t*page_break\n\n\tBut this isn't the first time you've not responded to an alarm because getting to work on time has taken priority.  \n\n\tThe next day, you receive a phone call from your lieutenant.  \"So, ${Lname},\" he begins after the usual formalities. \"As I'm sure you're aware, in order to remain active firefighters, department members have to maintain a certain quota of alarms they attend. You weren't at the call yesterday, and I'm noticing that your quota is starting to drop.  Anything going on that I should know about?\"\n\n\t*page_break\n\n\tHow do you reply?\n\n\t*choice\n\n\t\t#\"I'm sorry, Lieutenant.  I've just been really busy lately at work, and I didn't want to be late. I'll try to do better.\"\n\t\t\t*if relationship_officers > 45\n\t\t\t\tYou apologize, and the Lieutenant seems sympathetic.  \"We all get busy from time to time, and I know as well as anyone how important work can be. Just try to make some more of these alarms -- okay?  I have to write you down for a warning because that's the policy, but I'm confident you'll be more involved from this point on.\"\n\n\t\t\t\t\"I'll make a point of it,\" you promise him.\n\t\t\t\t*finish\n\t\t\t*else\n\t\t\t\tThe Lieutenant doesn't seem moved by your apology. \"We're all busy, kid.  If being part of the fire department is important to you, then you have to learn to make it a priority.  Now, the policy is that I have to issue you a warning. Try to do better from now on -- okay?\"\n\n\t\t\t\t\"I'll try to do better,\" you promise him.\n\t\t\t\t*finish\n\t\t#\"I've having some trouble balancing all my priorities. I'm not sure how to manage it.\"\n\t\t\t*if relationship_officers > 45\n\t\t\t\tThe Lieutenant seems to appreciate your honesty.  \"It's not always easy finding time for everything,\" he sympathizes. \"Sometimes it takes a while to work it all out and get your friends and family and workplace to understand that you can't be in two places at once.  You're a good kid, however; I'm confident you'll figure it out.  Just let me know if you ever need to talk.\n\n\t\t\t\t\"Oh, and I have to write you down for a warning because that's the policy, but just try to make some more of these alarms -- okay?\"\n\n\t\t\t\t\"I'll make a point of it,\" you promise him.\n\t\t\t\t*finish\n\t\t\t*else\n\t\t\t\tThe Lieutenant doesn't seem to care about your trials and woes. \"We all have jobs and family, kid. If being part of the fire department is important to you, then you have to learn to make it a priority.  Now, the policy is that I have to issue you a warning. Get your stuff sorted out and try to make some more of these alarms.\"\n\n\t\t\t\t\"I'll try,\" you promise him.\n\t\t\t\t*finish\n\t\t#\"No.  I honestly don't give a fig about my quota.\"\n\t\t\t\"I see,\" replies the Lieutenant, unimpressed.  \"Anyway.  I'm supposed to call you up to give you an official warning.  So consider this your official warning. Take care, now.\" \n\n\t\t\tHe hangs up at that point, clearly not interested in having an extended conversation with you and your attitude.\n\t\t\t*set relationship_officers %-20\n\t\t\t*finish\n\n*else\n\t*finish\n", "07littletots": "\nOne Saturday evening, you're at your friend Andy's house with a bunch of friends. You order a pizza and knock back a few beers.  Later, someone puts on some music, and you're all just hanging out, looking through some old pictures from school, and laughing over some fun (and ridiculous) memories.\n\nWhich is your favorite picture?\n\n*fake_choice\n\n\t#The one taken at the summit of a mountain a group of you hiked, raising water bottles in celebration of the climb.\n\n\t\tWhat a great moment that was!  For a while, you didn't think you'd make it one step further, what with all the steep rocks and hazardous ledges, not to mention the hot sun beating down on your shoulders. But you did make it, and the view from the top of the mountain was [i]amazing[/i]. \n\n\t\tOf course, then you had to hike back down.\n\n\t#The group picture from the prom.  Were sequins ever fashionable?\n\n\t\tSequins like that were never fashionable. But you certainly [i]felt[/i] fantastic and had a great time.  That's what matters -- right?\n\n\t#The \"action shot\" of everyone on the log ride as you plunge five stories down a waterfall.\n\n\t\tHow could you have so much fun while looking so terrified?  And how can some people not even hold on? These are some of life's great mysteries. And the expressions on your faces are hilarious.\n\n\t#I don't have a favorite. The pictures are stupid.\n\n\t\tYou'd rather drink more beer than look at a bunch of old pictures.  Your friends know this about you, and they're cool with it.\n\n*page_break\n\nAt some point, Andy brings out the more interesting alcohol and starts pouring shots.  You've already had a few beers.  \n\nHow about some shots as well?\n\n*temp totallydrunk false\n*choice\n\t#Heck yeah!\n\n\t\tOf course you'll do some shots!  Every so often this is how you like to have a good time: by getting crazy drunk with good music playing and surrounded by people you trust.\n\t\t*set totallydrunk true\n\t\t*goto Pager\n\n\t#No, I've already had more than enough.\n\n\t\tAt this point in your life, you know when it's a good idea to stop drinking. You've already got a \"comfortable buzz\" going, and you certainly don't need to make yourself sick.  Your friends encourage you to at least try one shot because that's what they do, but they really don't pressure you overly much; they're your friends.\n\t\t*goto Pager\n\n\t#More beer!\n\n\t\tYou don't do shots.  You like beer and lots of it!  Bring out another six pack!\n\t\t*goto Pager\n\n*label Pager\n*page_break\n\nOf course, at some point in your evening, your pager goes off:\n\n\"$!!{town_name} FIRE DEPARTMENT, YOU HAVE AN AUTOMATIC FIRE ALARM AT LITTLE TOTS DAYCARE CENTER, 143 CARNELIAN ROAD AT THE INTERSECTION OF 8TH STREET. REPEATING FOR $!!{town_name} FIRE DEPARTMENT: YOU HAVE AN AUTOMATIC FIRE ALARM AT LITTLE TOTS DAYCARE CENTER, 143 CARNELIAN ROAD THE INTERSECTION OF 8TH STREET. TIME NOW IS 2341.\"\n\n*page_break\n\nDo you respond to the alarm?\n\n*choice\n\t#Of course. Duty calls!\n\t\tEven though you're at a party and having a good time, you're serious about your commitment to emergency services.  Someone out there needs your help, and you intend to help them!  You grab your car keys and head to the firehouse.\n\t\t*goto Responding\n\n\t#Not this time.\n\t\tYou're not even sure you could drive safely right now much less respond to an emergency. Wisely, you exercise good judgment and stay right where you are.\n\t\t*goto NotResponding\n\n\t#My pager went off?  When?  What did it say again?\n\t\tIf you can't even remember that your pager went off much less figure out what it toned out, then you accept that you have no business responding to the emergency.  You probably shouldn't even be driving.  Wisely, you exercise good judgment and stay right where you are.\n\t\t*goto NotResponding\n\n*label Responding\n\nSo you put your drink aside, stand up, say bye to your friends, and head for your car.  A couple people ask you if you're okay to drive, but you wave off their concern.  You feel just fine, after all. \n\nYou make the five-minute drive to the fire house in good time, park, and rush inside to get into your bunker gear.\n\n*page_break\n\nThat's when Juan Velez, who is gearing up next to you, gets a whiff of your breath.  \"Hey, ${Fname},\" he starts, \"Have you been drinking?\"\n\nHow do you reply?\n\n*choice\n\t#\"A little, but I'm fine.\"\n\n\t\tYou tell Velez that you're fine, but he doesn't seem to believe you. \"You can't respond on calls when you're drunk.\"  He seems annoyed. \n\t\t*goto Reaction\n\t\t\n\t#\"Nah. I had one beer hours ago. I must have spilled some on my clothes.\"\n\n\t\tVelez doesn't look convinced. \"Yeah. That must be it,\" he returns with obvious sarcasm. \"You know you can't respond on calls when you're drunk -- right?\"\n\t\t*goto Reaction\n\t\t\n\t#\"Yeah. Why?\"\n\n\t\t\"Because you can't respond on calls when you're drunk.  That's why.\" Velez seems annoyed with you for lacking basic common sense.\n\t\t*goto Reaction\n\n*label Reaction\n\nHow do you react?\n*fake_choice\n\t#I insist that I'm fine.\n\t\t\"I'm fine,\" you reassure him as you fumble a little with the clasps on your bunker coat. \n\n\t\t\"Sure you are,\" he replies and walks away.\n\t\t\t\t\n\t#I admit to being a little drunk.\n\t\tWell, maybe I had more than one beer, but really I'm fine,\" you insist as you fumble with the clasps on your bunker coat.\n\n\t\t\"I don't think so,\" he replies and walks away.\n\t\t\t\t\n\t#I get mad at him for nagging.\n\t\t\"Quit giving me a hard time, already,\" you respond irritably. \"Are you my babysitter or something?\"\n\n\t\t\"Not for a million dollars,\" Velez replies and walks away.\n\n*page_break\n\nVelez must have gone to talk to one of the officers because, just when you are about to climb onto one of the soon-to-depart fire trucks, you hear a loud, booming voice call your name. \"${Lname}, get over here NOW.\"\n\nThat can only First Assistant Chief Django Smith, and, from his tone, it can't be good.  As you approach the tall, imposing man, he glares at you darkly. \"In my office,\" he says simply. And you don't dare disobey.\n\n*page_break\n\nChief Smith shares his office with the other assistant chief, Robert Kalinowski, who isn't presently here.  You don't have too much of a chance to notice the details of the decor because Chief Smith is eying at you with barely restrained contempt. You are nevertheless aware of the analog wall clock ticking loudly and a nicely framed picture of an antique fire truck hanging on the nearby wall.\n\n*page_break\n\n\"You're drunk,\" he begins the conversation without beating around the bush. \"Why are you here?\"  He doesn't ask you to sit down, and you certainly don't feel comfortable doing so. You stand there awkwardly, suddenly aware that you don't feel all that well.\n\nWhat's your reply?\n\n*fake_choice\n\t#\"I thought I was okay to respond, sir.\"\n\t\tAll things considered, you decide to exercise a bit of humility and reply as respectfully as possible.  However, the chief doesn't seem so easily mollified.\n\n\t\t\"You thought you were okay to respond? Really? And what does that say about your sense of judgment? You can barely stand up straight!\" Okay, so you're wobbling a little. You try to steady yourself with a deep breath. \n\n\t\tHe's not finished. \"You show up at this firehouse stinking like a one-person frat party and barely able to walk straight, and just what do you think we're going to let you do, put everyone else's lives at risk because you don't have the good sense to know when to stay home?\"\n\t#\"I'm not drunk!\"\n\t\tYou persist in claiming sobriety, but that only makes the chief more angry. \"What do you think I am?  An idiot?  You show up at this firehouse stinking like a one-person frat party and barely able to walk straight, and just what do you think we're going to let you do, put everyone else's lives at risk because you don't have the good sense to know when to stay home?\"\n\t#\"You ordered me to come in here!\"\n\t\tThe chief stares at you for a moment, probably considering how to reply to your rude reply.  \n\n\t\t\"Well,\" he begins then, in an icy tone. \"I thought that talking to you would be a more civilized than hauling your drunk ass out to the garbage dump so I afforded you that courtesy. You show up at this firehouse stinking like a one-person frat party and barely able to walk straight. Do you think we're going to let you put everyone's lives at risk because you don't have the good sense to know when to stay home?\"\n\n*page_break\n*set relationship_firefighters %-40\n*set relationship_officers 10\n\nAt this point you feel it's probably better to keep your mouth shut until the chief says everything he's going to say.\n\n*if warning = 1\n\tHe's pulling your file from the drawer now and frowning down at the page. \"You already have a warning for not maintaining your quota, but this is not how you were suppose to make things right.\" \n\n\tHe shakes his head and sighs.\n\n\t*if motivation=\"tradition\"\n\n\t\t\"Look. I know you have a family history in the fire department, and I hate to do this to you, but you made your own bed, as the saying goes. We take this sort of thing very seriously.  \n\n\t\t\"Even beyond the fact that you're a danger to yourself and others in this condition, consider the legal liabilities, not to mention the reputation of the fire department. I'm going to have to suspend you from active status indefinitely, pending review from the board. I'm sorry.  I know your mother will be disappointed.\"\n\n\t\tAnd thus ended your brief but nevertheless interesting career as a firefighter.\n\t\t*goto_scene 13awardparty ending\n\t*elseif motivation=\"grudging\"\n\t\t\"Look.  I know your heart has never really been into firefighting, that you were pressured into by family.  Trust me. I get that. I appreciate that you tried. But believe me when I tell you we have to take this sort of thing very seriously.\n\n\t\t\"Even beyond the fact that you're a danger to yourself and others in this condition, consider the legal liabilities, not to mention the reputation of the fire department. I'm going to have to suspend you from active status indefinitely, pending review from the board. I'm sorry.  I know your mother will be disappointed.\"\n\n\t\tAnd thus ended your brief but nevertheless interesting career as a firefighter.\n\t\t*goto_scene 13awardparty ending\n\t*elseif motivation=\"service\"\n\t\t\"Look.  I know how much it means for you to be a firefighter.  I can see it in the way you train and in the look in your eyes when you respond to calls -- well, when you're sober, at least.\" He smirks. \"Believe me.  I wish we weren't having this conversation, but we have to take this sort of thing very seriously.\n\n\t\t\"Even beyond the fact that you're a danger to yourself and others in this condition, consider the legal liabilities, not to mention the reputation of the fire department. I'm going to have to suspend you from active status indefinitely, pending review from the board. I'm sorry.  Maybe you can reapply in the future, if you're inclined to give it another try.\"\n\n\t\tAnd thus ended your brief but nevertheless interesting career as a firefighter.\n\t\t*goto_scene 13awardparty ending\n\n\t*else\n\t\t\"Look.  You have an attitude. You think you're better than everyone else, some sort of big shot super hero. You don't get what it really means to be a firefighter, to be part of a rich tradition, to help other people for the sake of helping them. Maybe you would've figured it out in time, but,\" he shrugs, looking genuinely regretful, \"You're not even really giving yourself a chance.\n\n\t\t\"I think it goes without saying that we have to take this sort of thing very seriously. Even beyond the fact that you're a danger to yourself and others in this condition, consider the legal liabilities, not to mention the reputation of the fire department. I'm going to have to suspend you from active status indefinitely, pending review from the board.\"\n\n\t\tAnd thus ended your brief but nevertheless interesting career as a firefighter.\n\t\t*goto_scene 13awardparty ending\n\n*else\n\n\t\"I think it goes without saying that we have to take this sort of thing very seriously. Even beyond the fact that you're a danger to yourself and others in this condition, consider the legal liabilities, not to mention the reputation of the fire department.\n\n\t\"Listen to me carefully: You CANNOT respond to the firehouse when drunk. Don't even respond if you think you sort of kind of might be even a little drunk. It isn't worth it.\"\n\n\t*page_break\n\n\tHe pulls your file from the drawer and looks through it for a moment. \"Your record is clean. You seem like you have every potential to be a good firefighter. But you messed up this time.  What do you have to say for yourself?\"\n\n\t*choice\n\t\t#At this point, I think I'd better just apologize.\n\t\t\t\"I made a mistake, Chief,\" you say, looking down at your feet. \"I'm very sorry.  I promise I'll be much more careful in the future.\"\n\n\t\t\t\"All right, then,\" he replies. \"You're suspended for one month. This counts as two warnings on your record as well. And you'll have to work on re-earning everyone's trust. If you mess up again, I don't think I have to tell you that I won't be so gracious next time. Now give me your car keys.\" \n\n\t\t\tYou do so.  \n\n\t\t\t\"Find someone to give you a ride home.  Dismissed.\"\n\n\t\t\tDespite how miserable that was, you can't help but feel it could have been so much worse.\n\t\t\t*set suspended true\n\t\t\t*set warning +2\n\t\t\t*goto RideHome\n\t\t\t\n\t\t#I didn't do anything wrong!\n\t\t\tYou don't feel you did anything so terrible so you don't intend to apologize for it. \"I just had a few drinks. Is that a crime?\" you argue back rather stupidly, but, then again, you are a bit drunk. \n\n\t\t\tThe chief stares at you for what seems like a long time.  \"Give me your keys, get a ride home, and sober up. \"You're suspended for one month. This counts as two warnings on your record as well. And you'll have to work on re-earning everyone's trust. Don't mess up again. I won't be so gracious.  You are dismissed.\"\n\t\t\t*set suspended true\n\t\t\t*set warning +2\n\t\t\t*goto RideHome\n\n*label RideHome\n*page_break\n*set relationship_NP +20\n\nAs seems to happen often to probies, Probie ${NPname} had responded promptly to the call but was bumped off the truck to make room for a more experienced firefighter.  So that's why ${NPpronoun1} happened to be around when you left the Assistant Chief's office looking like you had been punched in the gut.\n\n\"You look like you've had a rough evening.\" $!{NPpronoun1} seems sympathetic, which is a nice contrast to all the yelling.\n\n\"Yeah,\" you reply glumly, not really wanting to go into details. \"Can you give me a ride home, by any chance?\"\n\n\"Sure,\" ${NPname} replies agreeably, mercifully not asking any questions.\n\n*page_break\n\n*if totallydrunk = \"yes\"\n\t$!{NPpronoun1} even takes it in stride when you throw up in ${NPpronoun2} car just when ${NPpronoun1} is pulling into your drive way.  You probably shouldn't have had those shots, after all.  \n\n\t${NPname} then walks you inside your house, brings you a glass of water, and tucks you in bed. \n\t${NPpronoun1} also texts you the next day (not too early) to see if you're okay.  Despite everything that went wrong last night, you feel grateful to have such a friend.\n\t*finish\n\n*else \n\tSo ${NPname} drives you home, and you sleep it off. The next day, you get a text from ${NPname} (not too early) to see if you're doing okay. Despite everything that went wrong last night, you feel grateful to have such a friend.\n\t*finish\n\n\t\t\n*label NotResponding\n\n*page_break\n\nThe next day your head is pounding, and you feel exhausted, but, really, you have no regrets about drinking last night and spending some quality time with your friends. \n\n\n*if (responses \u003c= 2) and (warning = 0)\n\n\tSometime in the afternoon, your hear from your lieutenant.\n\n\t\"So, ${Lname},\" he begins after the usual formalities. \"As I'm sure you're aware, in order to remain active firefighters, department members have to maintain a certain quota of alarms they attend. You didn't respond to the call last night, and I'm a little concerned about your quota in general.  Anything going on that I should know about?\"\n\t*goto Reply\n\n*elseif (responses \u003c= 2) and (warning = 1)\n\n\tLater in the afternoon, you hear from your lieutenant again. He doesn't sound very happy.  \"So I was looking at the quota just now, and it looks like you're not really doing any better with responses than last time we spoke. Is there anything you'd like to tell me?\"\n\t*goto Reply2\n\n*elseif (responses = 3)\n\n\tSometime in the afternoon, your hear from your lieutenant.\n\n\t\"So, ${Lname},\" he begins after the usual formalities. \"As I'm sure you're aware, in order to remain active firefighters, department members have to maintain a certain quota of alarms they attend. You didn't respond to the call last night, and I'm just checking in with you to make sure everything's okay.  Anything going on that I should know about?\"\n\t*goto Reply\n\n\n*label Reply\n\nHow do you reply?\n\n*choice\n\n\t#\"I'm sorry, Lieutenant.  I've just been really busy lately. I'll try to do better.\"\n\t\t*if relationship_officers > 50\n\t\t\tYou apologize, and the Lieutenant seems sympathetic.  \"We all get busy from time to time. Just try to make some more of these alarms -- okay?  I have to write you down for a warning because that's the policy, but I'm confident you'll be more involved from this point on.\"\n\n\t\t\t\"I'll make a point of it,\" you promise.\n\t\t\t*set warning +1\n\t\t\t*finish\n\t\t*else\n\t\t\tThe Lieutenant doesn't seem moved by your apology. \"We're all busy, kid.  If being part of the fire department is important to you, then you have to learn to make it a priority.  Now, the policy is that I have to issue you a warning. Try to do better from now on -- okay?\"\n\n\t\t\t\"I'll try to do better,\" you promise.\n\t\t\t*set warning +1\n\t\t\t*finish\n\n\t#\"I was drinking last night. I didn't think it would be a good idea for me to respond.\"\n\t\t*if relationship_officers > 50\n\t\t\tThe Lieutenant seems to appreciate your honesty.  \"Well, that was probably the best decision you could've made in those circumstances.  Thank you for making the smart choice.  I'm not going to give you a warning, all things considered. I'm sure you'll be plenty active in the future.\"\"\n\n\t\t\t\"Thank you, Lieutenant\" you reply.\n\t\t\t*finish\n\t\t*else\n\t\t\tYou imagine you can hear the Lieutenant smirking. \"Yeah, that was probably for the best. The last thing anyone needs is your drunk self trying to show up for calls. Thanks for making the smart choice.  I won't give you a warning, considering. Just try to be more active in the future, when you aren't drinking, of course.\"\n\n\t\t\t\"Of course,\" you agree. \"Thanks, Lieutenant.\"\n\t\t\t*finish\n\t#\"No.  I honestly don't give a fig about my quota.\"\n\t\t\"I see,\" replies the Lieutenant, unimpressed.  \"Anyway.  I'm supposed to call you up to give you an official warning.  So consider this your official warning. Take care, now.\" He hangs up at that point, clearly not interested in having an extended conversation with you and your attitude.\n\t\t*set warning +1\n\t\t*set relationship_officers %-20\n\t\t*finish\n\n\n*label Reply2\n\nHow do you reply?\n\n*choice\n\n\n\t#\"I'm sorry, Lieutenant.  I'll work on being better.\"\n\t\t*if relationship_officers > 45\n\t\t\tYour apology is sincere, and your lieutenant doesn't seem inclined to give you a hard time of it. \"All right, ${Lname}. I have to give you another warning. That's two now so be careful. We don't particularly want to have to kick you out. We can use all the good people we can get.\"\n\n\t\t\t\"I won't let you down,\" you promise.\n\t\t\t*set warning +1\n\t\t\t*finish\n\t\t*else\n\t\t\tThe Lieutenant doesn't seem impressed. \"We've been through this before. Shape up and start taking this seriously. You have a second warning on your record so be careful.\"\n\n\t\t\t\"I'll do better,\" you promise.\n\t\t\t*set warning +1\n\t\t\t*finish\n\n\t#\"I was drinking last night. I didn't think it would be a good idea for me to respond.\"\n\t\t*if relationship_officers > 45\n\t\t\tThe Lieutenant seems to appreciate your honesty.  \"Well, that was probably the best decision you could've made in those circumstances.  Thank you for making the smart choice.  I'm not going to give you a warning, all things considered. I'm sure you'll be plenty active in the future.\"\"\n\n\t\t\t\"Thank you, Lieutenant\" you reply.\n\t\t\t*finish\n\t\t*else\n\t\t\tYou imagine you can hear the Lieutenant smirking. \"Yeah, that was probably for the best. The last thing anyone needs is your drunk self trying to show up for calls. Thanks for making the smart choice.  I won't give you a warning, considering. Just try to be more active in the future, when you aren't drinking, of course.\"\n\n\t\t\t\"Of course,\" you agree. \"Thanks, Lieutenant.\"\n\t\t\t*finish\n\t#\"Not particularly. I have better things to do with my time than be lectured by you again.\"\n\t\t\"Fine,\" he says, clearly out of patience with your lack of manners and respect. \"I'll make this short. You have a second warning on your record. Have a nice day.\" And then he hangs up.\n\t\t*set warning +1\n\t\t*set relationship_officers %-30\n\t\t*finish\n\n\n\n\n\n\n\n\n", "08downtowndonuts": "\n*if SO \n\t*goto Anniversary\n*else\n\t*goto Date\n\n\t\n\n*label Anniversary\n\nCongratulations! Today is your and ${SOname}'s 1.5-year anniversary, and you both want to celebrate.  Where do you go for dinner?\n\n*fake_choice\n\n\t#Chez Sebastian -- for classy French cuisine.\n\t\tYou and ${SOname} love to dress up sometimes and, on very special occasions, you enjoy going to a restaurant that has candlelight, separate waiters for wine and bread, and dishes on the menu that you can't possibly pronounce correctly. You have a wonderful time. [i]Magnifique![/i]\n\n\t#Oishii Japanese Restaurant-- you both love sushi.\n\t\tThere's no better way to celebrate a special occasion than with a dinner box for two filled with melt-in-your-mouth selections of the finest sushi. You even have green tea ice cream for desert! [i]Subarishii![/i]\n\n\t#Don Luigi's -- pizza is the way to go!\n\t\tNeither you nor ${SOname} enjoy anything overly fancy, but there's this one little Italian place that's got a wonderful atmosphere and the most delicious pizza both of you have ever tasted in your lives. So that's where you both decide to go to celebrate this special occasion. [i]Magnifico![/i]\n\n*page_break\n\nDo you give ${SOname} any kind of special gift?\n\n*fake_choice\n\n\t#The gift of my company.\n\t\tThat's nice. One might assume ${SOpronoun1} enjoys your company.\n\n\t#A nice bracelet.\n\t\tThat was thoughtful! I hope ${SOpronoun1} likes it!\n\n\t#Tickets to a concert we both had been talking about.\n\t\tWhat a thoughtful gift that you both can enjoy!  \n\nDid ${SOpronoun1} give you anything?\n\n*fake_choice\n\t#$!{SOpronoun2} light in my life.\n\t\tAssuming you don't mean that sarcastically, that's very poetic!\n\n\t#A survival bracelet.\n\t\tOh, that's one of those bracelets made of braided paracord that you can unravel in case of emergency, isn't it? That's a thoughtful gift, and it might just come in handy one day!\n\n\t#Tickets to a local amusement park.\n\t\tHow fun! Plus, it's something you can experience together.\n\n*page_break\n\n*if SOgender = \"neutral\"\n\tSo, anyway, after dinner, you're both feeling pretty good when you get back to your house.  You kiss ${SOname} with feeling. $!{SOpronoun1} kiss you back with desire.  \n\n\tSoon you are up against the wall, pressed up against each other.  Breathless, you slip your hands up under ${SOpronoun2} shirt, brushing fingertips along ${SOpronoun2} skin. You can feel how ${SOname} reacts to your touch.  The heady rush of excitement is exhilarating.\n\n\t*goto Pager\n\n*else\n\n\tSo, anyway, after dinner, you're both feeling pretty good when you get back to your house.  You kiss ${SOname} with feeling. $!{SOpronoun1} kisses you back with desire.  \n\n\tSoon you are up against the wall, pressed up against each other.  Breathless, you slip your hands up under ${SOpronoun2} shirt, brushing fingertips along ${SOpronoun2} skin. You can feel how ${SOpronoun1} reacts to your touch.  The heady rush of excitement is exhilarating.\n\n\t*goto Pager\n\n*label Date\n\nSo this evening you have a date!  \n\nIt's been a while since you and ${SOname} had broken up, and you're more than ready to start seeing someone else. Now, this is not necessarily going to turn into anything serious, but, at the very least, you intend to have a good time and to show your date a good time as well.\n\nIs your date for the evening a lady or a gentleman?\n\n*choice\n\t#She's very much a lady and very lovely at that!\n\t\tExcellent!\n\t\t*set Dgender \"female\"\n\t\t*set Dpronoun1 \"she\"\n\t\t*set Dpronoun2 \"her\"\n\t\t*set Dpronoun3 \"her\"\n\t\tAnd her name is?\n\t\t*goto Dname\n\n\t#He's definitely a man and extremely good looking too!\n\t\tSounds good!\n\t\t*set Dgender \"male\"\n\t\t*set Dpronoun1 \"he\"\n\t\t*set Dpronoun2 \"his\"\n\t\t*set Dpronoun3 \"him\"\n\t\tAnd his name is?\n\t\t*goto Dname\n\n\t#My date does not identify with a binary gender, and they are beautiful!\n\t\tThat's fine!\n\t\t*set Dgender \"neutral\"\n\t\t*set Dpronoun1 \"they\"\n\t\t*set Dpronoun2 \"their\"\n\t\t*set Dpronoun3 \"them\"\n\t\tAnd their name is?\n\t\t*goto Dname\n\n\n*label Dname\n\n*input_text Dname\n*comment capitalization check\n*if (\"${Dname}\" != \"$!{Dname}\")\n\tSo, just to be sure: your date's name is $!{Dname}. Is that correct?\n\t*choice\n\t\t#Yes. $!{Dname}.\n\t\t\t*set Dname \"$!{Dname}\"\n\t\t\t*goto Date\n\n\t\t#No, my date's name is ${Dname}, just as I typed it before.\n\t\t\t*goto DateFood\n\n\t\t#Oops. That's not right! Let me try that again!\n\t\t\tSure. What's the name again?\n\t\t\t*goto Dname\n\n*label DateFood\n\nSo you pick ${Dname} up at 7pm. Where do you go for dinner?\n\n*fake_choice\n\n\t#Chez Sebastian -- for classy French cuisine.\n\t\t${Dname} seems like someone who would enjoy a fancy dinner, and you wanted to make a good impression.  So you dress up for the occasion and bring ${Dpronoun3} to this new place that opened up fairly recently and has very good reviews.  You are both enchanted by the candlelight, the separate waiters for wine and bread, and  all the dishes on the menu that you can't possibly pronounce correctly. You have a wonderful time. [i]Magnifique![/i]\n\n\t#Oishii Japanese Restaurant-- you both love sushi.\n\t\tWhat better way to impress someone on a first date than with a dinner box for two filled with melt-in-your-mouth selections of the finest sushi. (Of course, you checked first to make sure ${Dpronoun1} Japanese food.) You even shared green tea ice cream for desert! [i]Subarishii![/i]\n\n\t#Don Luigi's -- pizza is the way to go!\n\t\tYou don't want to bring ${Dname} to any place overly fancy, since that would seem a little excessive for a first date, but you thought of one place where you could talk and get to know each other a little better:  There's this little Italian place that's got a wonderful atmosphere and the most delicious pizza you have ever tasted in your life. So that's where you both decide to go to celebrate this special occasion. [i]Magnifico![/i]\n\n*page_break\n\n*if Dgender = \"neutral\"\n\tAfter dinner, you're both feeling pretty good when you get back to ${Dpronoun2} house.  You kiss ${Dname} with feeling. $!{Dpronoun1} kiss you back with desire.  \n\n\tSoon you are up against the wall, pressed up against each other.  Breathless, you slip your hands up under ${Dpronoun2} shirt, brushing fingertips along ${Dpronoun2} skin. You can feel how ${Dname} reacts to your touch.  The heady rush of excitement is exhilarating.\n\t*goto Pager\n\n*else\n\n\tAfter dinner, you're both feeling pretty good when you get back to ${Dpronoun2} house.  You kiss ${Dpronoun3} with feeling. $!{Dpronoun1} kisses you back with desire.  \n\n\tSoon you are up against the wall, pressed up against each other.  Breathless, you slip your hands up under ${Dpronoun2} shirt, brushing fingertips along ${Dpronoun2} skin. You can feel how ${SOpronoun1} reacts to your touch.  The heady rush of excitement is exhilarating.\n\t*goto Pager\n\n\n*label Pager\n*page_break\n\nAlthough you probably shouldn't be surprised at this point, you jump a little as your pager starts blaring out the tones of an emergency:\n\n\"$!!{town_name} FIRE DEPARTMENT, YOU HAVE AN AUTOMATIC FIRE ALARM AT DOWNTOWN DONUTS, 139 MAIN STREET. REPEATING FOR $!!{town_name} FIRE DEPARTMENT: YOU HAVE AN AUTOMATIC FIRE ALARM AT DOWNTOWN DONUTS, 139 MAIN STREET. TIME NOW IS 2213.\"\n\n*if suspended \n\t*goto Suspended\n*else\n\t*goto ResponseCheck\n\n\n*label ResponseCheck\n\nDo you respond on the call?\n\n*if SO \n\t*goto SOResponseCheck\n\n*else\n\t*goto DateResponseCheck\n\n\n*label DateResponseCheck\n\n*choice\n\t#Yes, of course. I have to.\n\t\t\t\n\t\tYou tell ${Dpronoun3} that you're a firefighter and that you have to respond.\n\n\t\t$!{Dname} seems impressed.  \"A firefighter?\" your date replies, touching you suggestively. \"That's totally sexy. Are you sure you have to leave?\" \n\n\t\tYou smile. \"Trust me. I want to stay. But I have to go. I'll call you as soon as I can.\"\n\t\t\n\t\t*goto Respond\n\t\t\t\n\t#No way! Are you kidding me?\n\n\t\t\"What's that?\" ${Dname} asks, both startled and curious.\n\n\t\t\"That's my pager. I'm a firefighter,\" you reply, simply.\n\n\t\t\"That's sexy,\" ${Dname} declares. \"But please tell me you don't have to leave.\"\n\n\t\t*page_break\n\n\t\t\"Tonight, I'm your firefighter,\" you whisper, with feeling.\n\n\t\t$!{Dpronoun1} smiles, pleased. \"My firefighter. I like that.\"\n\n\t\tYou turn off your pager. Most likely that was just another false alarm anyway. With no further delay, you wrap ${Dpronoun3} in your arms once again and lose yourself in another kiss.\n\t\t*goto Stay\n\n*label SOResponseCheck\n\n*choice\n\t#Yes, of course. I have to.\n\t\t*if SOfeeling = \"encouraging\" \n\t\t\t${SOname} looks understandably disappointed, but ${SOpronoun1} kisses you meaningfully before you go. \"Be safe, dear,\" ${SOpronoun1} says, touching your cheek and looking into your eyes. \"Come back to me when you can.\" \n\n\t\t\t\"I will,\" you say with a smile. \"I love you.\" And then you dash to your car to head to the firehouse. \n\t\t\t\n\t\t\t*goto Respond\n\n\t\t*elseif SOfeeling = \"worriedtime\"\n\t\t\t${SOname} tries to plead with you. \"This is our evening, my love, our anniversary. Surely you can stay? I'll make it worth your while,\" ${SOpronoun1} offers, suggestively.\n\n\t\t\tDo you change your mind?\n\n\t\t\t*choice\n\t\t\t\t\t\n\t\t\t\t#No, I really have to go.\n\t\t\t\t\tDespite the persuasive argument, you gently untangle yourself from ${SOname}'s arms, apologize, and dash to your car.\n\t\t\t\t\t\n\t\t\t\t\t*set relationship_SO %-20\n\t\t\t\t\t*goto Respond\n\n\t\t\t\t#Yes. I decide to stay.\n\t\t\t\t\t${SOname}'s argument is very persuasive.  Besides, it's probably just another false alarm, anyway. \"I'm gonna hold you to that promise,\" you reply with a glint in your eyes, taking ${SOpronoun3} into your arms again and losing yourself in another kiss.\n\t\t\t\t\t*set relationship_SO %+20\n\t\t\t\t\t*goto Stay\n\t\t\t\t\t\t\n\t\t*elseif SOfeeling = \"worriedrespectful\"\n\t\t\t\"Do you have to go?\" ${SOname} asks, ${SOpronoun3} eyes looking hopeful. \"It's our anniversary. We should be together tonight.\"\n\n\t\t\tDo you change your mind?\n\n\t\t\t*choice\n\n\t\t\t\t#No, I really have to go.\n\t\t\t\t\tDespite ${SOname}'s wishes, you gently untangle yourself from ${SOpronoun3}'s arms, apologize, and dash to your car.\n\t\t\t\t\t*set relationship_SO %-20\n\t\t\t\t\t\n\t\t\t\t\t*goto Respond\n\n\t\t\t\t#Yes. I decide to stay.\n\t\t\t\t\tYou find ${SOname}'s argument to be persuasive.  Besides, it's probably just another false alarm, anyway. \"You're right,\" you reply with a glint in your eyes. \"So let's make this time matter.\"  You sweep ${SOpronoun3} into your arms again and lose yourself in another kiss.\n\t\t\t\t\t*set relationship_SO %+20\n\t\t\t\t\t*goto Stay\n\n\n\t\t*else\n\t\t\t\"Oh no!\" ${SOname} exclaims with dismay as your pager goes off. \"Please don't go, tonight of all nights,\" ${SOpronoun1} implores. \" I want you safe in my arms. I need you here. Please stay.\"\n\n\t\t\tDo you change your mind?\n\t\t\t\t\n\t\t\t*choice\n\t\t\t\t\t\n\t\t\t\t#No, I really have to go.\n\t\t\t\t\tDespite ${SOname}'s pleas, you gently untangle yourself from ${SOpronoun3}'s arms, apologize, and dash to your car.\n\t\t\t\t\t*set relationship_SO %-20\n\t\t\t\t\t\n\t\t\t\t\t*goto Respond\n\n\t\t\t\t#Yes. I decide to stay.\n\t\t\t\t\tYou find ${SOname}'s argument to be persuasive.  Besides, it's probably just another false alarm, anyway. \"Alright,\" you reply with a glint in your eyes. \"I'll stay. Let's make this a night to remember.\"  You sweep ${SOpronoun3} into your arms again and lose yourself in another kiss.\n\t\t\t\t\t*set relationship_SO %+20\n\t\t\t\t\t*goto Stay\n\t\t\t\n\t#No way! Are you kidding me?\n\t\tMore likely than not, it's just another false alarm.  Besides, the only fire on your mind right now is between you and ${SOname}.  \"Tonight, I'm yours,\" you whisper, with feeling. Ignoring your pager, you wrap ${SOpronoun3} in your arms again and lose yourself in another kiss.\n\t\t*goto Stay\n\n*label Stay\n*page_break\n\n*if SO = \"yes\"\n\n\tYou spend the whole night with ${SOname}, and let's just say you get very little sleep for all the most wonderful reasons. What a great anniversary celebration!\n\t*goto FireHouse\n\n*else\n\n\tYou spend the whole night with ${Dname}, and let's just say you get very little sleep for all the most wonderful reasons. What an amazing first date!\n\t*goto FireHouse\n\n\n*label Respond\n*set responses +1\n*page_break\n\nYou use the drive to the firehouse to redirect your thoughts from your original evening plans to your sudden emergency response.  When you arrive, you rush into the truck bay and join the others gearing up. First you step into your boots and pull up your bunker pants until you can pull your suspenders over your shoulders. Then you don your coat and grab your helmet and mask with one hand while you are doing up your clasps with the other.  \n\nIt's time to go!\n*temp teamposition \"\"\n\n*page_break\n\n*if company = \"Truck\"\n\t*goto Truck\n*else\n\t*goto Engine\n\n*label Truck\n*temp BreakerDelay false\n\n\nYou climb into the back of the ladder truck along with five other firefighters, with the driver and Captain in the front.  Lights flashing and sirens blaring, you rush quickly to Downtown Donuts a couple miles away.\n\nA crowd of employees, customers, and gawkers have gathered outside the evacuated donut shop.  You can spot the customers right away because most of them thought to take their donuts and coffee with them when they left.\n\n*page_break\n\nYour company captain, Yasuhiko Sagami is in charge of the scene. He is quick to talk to a woman who is probably a manager. \n\n\"Sounds like there's heavy smoke in the kitchen,\" he informs the responding firefighters. \" I've radioed for the gas and electric to be shut off, but that'll take a while. Schmidt, ${Lname}, ${NPname}: Go shut off the electric locally. I'll be helping engine company can get to work.\"\n\n*page_break\n\n*if leadership > 60\n\t*set teamposition \"TruckLeader\"\n\t*goto TruckLeader\n*else\n\t*set teamposition \"TruckFollower\"\n\t*goto TruckFollower\n\n*label TruckLeader\n\t\nYou must be developing a reputation for being a decent leader because the two others instinctively seem to look at you for instruction.  In this sort of situation, it's not like you can sit around thinking about it for a while, either. So you have to make a decision.\n\n*page_break\n\nThe way you see it, you have three options: You could do things \"by the book\" and go inside the burning building to try to find the breaker and shut it down.  \n\nYou've also heard stories, especially from the older firefighters about how they just go pull the meter off the side of the building. That's dangerous but effective, and you wouldn't have to bring your team inside. \n\nThirdly, you always have the option to ask an officer for further instructions.\n\n*page_break\n\n*if (fire_skills > 70) or (relationship_firefighters > 80)\n\tOf course, you do remember that some of the stories about pulling meters involved the dangers of electrocution and some people getting hurt. That could be why they don't teach that technique anymore in training, if ever they did!\n\t*goto ElectricalChoice\n*elseif fire_knowledge > 70\n\tOf course, you might also consider that you've never been taught anything about pulling an electrical meter, not in any of your classes or trainings, and it hasn't come up in anything extra you've read online, either.  Why could that be?\n\t*goto ElectricalChoice\n*else\n\t*goto ElectricalChoice\n\n*label ElectricalChoice\n\nWhat do you choose to do?\n*choice\n\t#We'll pull the meter.\n\t\tFinding the circuit breaker inside a smoke-filled building could take a long time and potentially be dangerous.  It's so much easier to just go deal with the meter outside, usually in the back of the building. So that's what you do.\n\t\t*goto MeterPull\n\n\t#We'll find the breaker.\n\t\tYou never really learned any meter-pulling techniques, but you imagine, even with experience, that sort of thing would be dangerous. You look at Schmidt and ${NPname}'s faces, and you have no intention of putting them in any more danger than necessary. You tell the others to mask up because you are all headed inside.\n\t\t*set leadership %+10\n\t\t*goto FindBreaker\n\n\t#I'll ask Captain Sagami.\n\t\tYou're not really sure what to do, and, since the stakes are so high, you feel the best thing to do is simply to ask someone with more experience. Besides, everyone in this fire department has always encouraged asking rather than guessing, and this time is no exception.\n\n\t\tWhen you ask the Captain the best way to shut off the building's electricity, his orders are simple. \"Mask up and head inside. Look for the breaker. It's usually in some sort of utility closet in the back so you'll probably want to go in that way.\"\n\n\t\tSo that's what you do.\n\t\t*goto FindBreaker\n\n*label MeterPull\n\nWhile the engine team prepares the hose lines, you lead Schmidt and ${NPname} to the back of the building where you find the commercial meter exactly where you'd expect it to be. Your first impression is that the meter looks pretty old. The procedure seems like it would be straightforward enough; you need to cut and remove the simple seal, unscrew the cover, then pull meter free from its contacts.\n\nDo you do the task yourself or guide one of the others in doing the task?\n\n*choice\n\t#I do it.\n\t\tIf there's any danger at all, you want to assume that risk for yourself. You can't imagine having a fellow firefighter get hurt because of something you ask them to do. You have the others bring you a pair of wire cutters to break the seal. And you wear your fire gloves for extra protection.\n\n\t\tProbie ${NPname} is frowning. \"I'm not sure anybody should be pulling a live meter like that,\" ${NPpronoun1} declares. \"It seems really dangerous.\"\n\n\t\tDo you take ${NPpronoun2} advice?\n\t\t*choice\n\t\t\t#No. I focus on the task at hand.\n\t\t\t\t\"It will be okay,\" you insist. \"We need to work quickly, however. The hose team is depending on us.\"\n\t\t\t\t*goto YouPullMeter\n\n\t\t\t#Yes. What ${NPpronoun1} says makes sense.\n\t\t\t\tYou think about it for a moment and then have to agree that it's not worth the possible risk. \"Yeah. Actually, I think you may be right, ${NPname}.  Okay, then. Let's mask up. We're going inside to find that breaker.\"\n\t\t\t\t*set relationship_NP +10\n\t\t\t\t*set BreakerDelay true\n\t\t\t\t*goto FindBreaker\n\t\t\n\t#I ask Firefighter Schmidt to do it.\n\t\tYou feel that an important part of being a leader is not doing everything yourself. Sometimes you have to delegate tasks to others, and this seems like a perfectly good time to do that.  So you ask Schmidt, \"Do you think you're up to the task? I'll help guide you.\" \n\n\t\tShe looks nervous about it, but she agrees. \"I'll give it a try.\"\n\n\t\tBut Probie ${NPname} is frowning. \"I'm not sure anybody should be pulling a live meter like that,\" ${NPpronoun1} declares. \"It seems really dangerous.\"\n\n\t\tDo you take ${NPpronoun2} advice?\n\t\t*choice\n\t\t\t#No. I focus on the task at hand.\n\t\t\t\t\"It will be okay,\" you insist. \"We need to work quickly, however. The hose team is depending on us. Schmidt, you ready for this?\"\n\n\t\t\t\t\"As ready as I can be,\" she says. \"Let's do this.\"\n\t\t\t\t*goto SchmidtMeter\n\n\t\t\t#Yes. What ${NPpronoun1} says makes sense.\n\t\t\t\tYou think about it for a moment and then nod. \"Yeah. I think you may be  right, ${NPname}.  All right, then. Let's mask up. We're going inside to find that breaker.\"\n\t\t\t\t*set relationship_NP +10\n\t\t\t\t*set BreakerDelay true\n\t\t\t\t*goto FindBreaker\n\n\t#I order Probie ${NPname} to do it.\n\t\tWhat are probies for if not to do the grunt work sometimes? So you order ${NPname} to pull the meter with you and Firefighter Schmidt to supervise ${NPpronoun2} work. \n\n\t\t\"Respectfully,\" ${NPname} replies, \"I really don't feel comfortable doing something like this.\"\n\n\t\tHow do you react?\n\t\t*choice\n\t\t\t#With understanding. \n\t\t\t\t\"Sure, I understand,\" you say with a shrug. \"Schmidt, are you feeling up to the task?\" \n\n\t\t\t\tSchmidt looks anxious about it, but she nods. \"I'll give it a try.\"\n\n\t\t\t\tProbie ${NPname} is frowning. \"I'm not sure anybody should be pulling a live meter like that,\" ${NPpronoun1} advises. \"It seems really dangerous.\"\n\n\t\t\t\tDo you take ${NPpronoun2} advice?\n\t\t\t\t*choice\n\t\t\t\t\t#No. I focus on the task at hand.\n\t\t\t\t\t\t\"It will be okay,\" you insist. \"We need to work quickly, however. The hose team is depending on us. Schmidt, you ready for this?\"\n\n\t\t\t\t\t\t\"As ready as I can be,\" she says. \"Let's do this.\"\n\t\t\t\t\t\t*goto SchmidtMeter\n\t\t\t\t\t#Yes. What ${NPpronoun1} says makes sense.\n\t\t\t\t\t\tYou think about it for a moment and then nod. \"Yeah. I think you may be right, ${NPname}.  All right, then. Let's mask up. We're going inside to find that breaker.\"\n\t\t\t\t\t\t*set relationship_NP +10\n\t\t\t\t\t\t*set BreakerDelay true\n\t\t\t\t\t\t*goto FindBreaker\n\t\t\t\t\n\t\t\t#With annoyance. \n\t\t\t\t\"Fine. I'll do it myself,\" you say, with frustration. \"Bring me some wire cutters.\" You'll need them to cut the seal.\n\t\t\t\t*set relationship_NP -10\n\t\t\t\t*goto YouPullMeter\n\n\t\t\t#With anger.\n\t\t\t\t\"You're a probie,\" you reply, glaring at ${NPname}. You're supposed to follow orders.\"\n\n\t\t\t\t\"I'm sorry,\" ${NPname} apologizes, but ${NPpronoun1} holds his ground. \"I'm not going to pull a live meter, and I don't think anyone else should either.\"\n\n\t\t\t\tDo you listen to ${NPpronoun2} advice?\n\n\t\t\t\t*choice\n\t\t\t\t\t#Yes, he has a point. \n\t\t\t\t\t\tYou glare at ${NPname} a moment longer. ${NPpronoun1} meets your gaze, pressingly.  \"Fine,\" you agree. \"Let's mask up then and go find that breaker. Quickly now!\"\n\t\t\t\t\t\t*set relationship_NP -10\n\t\t\t\t\t\t*set leadership %+10\n\t\t\t\t\t\t*set BreakerDelay true\n\t\t\t\t\t\t*goto FindBreaker\n\n\t\t\t\t\t#I'll just do it myself.\n\t\t\t\t\t\t\"If you don't do it, I will,\" you declare, still fuming. \"And you might as well go sit on the curb, since you're not going to be at all helpful.\" \n\n\t\t\t\t\t\tWith a shrug, Probie ${NPname} turns and does just that. You ask Firefighter Schmidt for a pair of wire cutters so you can break the seal on the meter.\n\t\t\t\t\t\t*set relationship_NP -20\n\t\t\t\t\t\t*goto YouPullMeter\n\n\t\t\t\t\t#I ask Firefighter Schmidt to do it instead.\n\n\t\t\t\t\t\t\"Well, thanks a lot for your help, Probie.  You might as well go sit on the curb, since you're not going to be at all helpful.\" You turn to the other firefighter. \"What about you, Schmidt?  Are you feeling up to the task?\" \n\n\t\t\t\t\t\tSchmidt looks anxious about it, but she nods. \"I'll give it a try.\"\n\t\t\t\t\t\t*set relationship_NP -20\n\t\t\t\t\t\t*goto SchmidtMeter\n\n*label YouPullMeter\n\nUsing a pair of wire cutters with rubber grips, you carefully cut and remove the seal on the meter. Then you remove the retaining ring that holds the meter in place, which allows you to lift the cover to reveal the inner workings of the meter. \n\nAt this point, you take a moment to consider what you are doing and how best to do it safely. The truth of the matter is that you're not really sure! \n\nBut the other truth is that the engine company firefighters are probably already in the building with their hose line, and if you don't get the electricity shut off before they turn on the water, there's every chance that one or all of those people could get seriously hurt. An electrical fire can be very dangerous, and they're counting on you to get this done.\n\n*page_break\n\nSo how will you be pulling the meter?\n*choice\n\t#As quickly as possible.\n\t\tThe way you see it, the faster you detach the meter from the building the less likely there will be any kind of danger.  \"Stand back,\" you warn before you inwardly count to three. Then you give a mighty yank to try to pull the meter in a single motion.\n\n\t\t*page_break\n\n\t\tIt doesn't work, however. You end up having to rock the meter back and forth before it finally begins to detach from the connectors.\n\t\t*goto YouDie\n\n\t#Very slowly and carefully.\n\t\tYou figure that you'd best be careful and go slowly. So you gently rock the meter back and forth until it finally begins to detach from the connectors.\n\t\t*goto YouDie\n\n\t#I'm having second thoughts.\n\t\tYou study the meter for a long moment.  Suddenly, you don't feel very good about this whole process.  In fact, you feel a very strong sense of foreboding. \"You know what?\" you say. \"I don't think this is such a good idea, actually. Let's mask up and go find that breaker.\"\n\t\t*set BreakerDelay true\n\t\t*goto FindBreaker\n\n*label YouDie\n\nThe meter comes lose into your hands, and you feel a profound sense of relief.  \n\nYou did it!  \n\n*page_break\n\nA white flash.  \n\nIt's so bright you can't see anything.  \n\nThen there is darkness. \n\n*page_break\n\nSomeone is screaming your name. \n\nAnd something smells very wrong: the odor of burnt flesh. \n\nPain slams into you suddenly, encompassing you, a thousand times more excruciating than the worst pain you ever felt before.\n\nThen, mercifully, you die.\n\n*page_break\n\nAlthough your death was terribly painful, it was, at least, quick. But that is small comfort to the members of your fire department who lost one of their own in the line of duty. And that fact dose little to console your family, friends, and coworkers.  \n\nThe fire at Downtown Donuts is swiftly brought under control using regular hose lines.  There were no additional injuries.\n\n*page_break\n\nYou don't know it, of course, but you have a very grand funeral, even though you were a fairly new firefighter.  Firefighter tradition requires honoring one of their own. During the viewing, the fire department's chaplain gives a short service and your fellow firefighters form an honor guard.  Afterwards, your coffin is transported to the cemetery atop an antique firetruck and followed by a small procession of firetrucks and then mourners.\n\n*page_break\n\n*if SO \n\t${SOname} is heart-broken. ${SOpronoun1} had been waiting for you, that evening of your interrupted anniversary date, when ${SOpronoun1} heard the news of your death.\n\t*goto Graveside \n*else\n\t*goto Graveside\n\n*label Graveside\n\n*if motivation=\"tradition\"\n\tYour mother, who is an ex-chief of the $!{town_name} Fire Department, spoke at your graveside, her face pale and somber. Afterwards, she set up a memorial fund in your honor to help sponsor and promote additional educational training for firefighters regarding safety protocols so that hopefully nobody would ever lose a loved one in the same way again.\n\t*goto YourDeathConclusion\n\n*elseif motivation=\"grudging\"\n\tYour mother, a retired firefighter, spoke at your graveside, her face pale and somber. Afterwards, she set up a memorial fund in your honor to help sponsor and promote additional educational training for firefighters regarding safety protocols so that hopefully nobody would ever lose a loved one in the same way again.\n\t*goto YourDeathConclusion\n*elseif motivation=\"service\"\n\n\tAll you wanted to do was serve your community and be a good citizen, and that's what your Chief said as he spoke soberly at your graveside. Afterwards, some of the department members set up a memorial fund in your honor to help sponsor and promote additional educational training for firefighters regarding safety protocols so that hopefully nobody would ever lose a loved one in the same way again.\n\t*goto YourDeathConclusion\n\n*elseif motivation=\"hero\"\n\tYou always wanted to be famous, and, in a way, you achieved that with your death. Your story was on the evening news and in the local papers, along with your obituary. Several people wrote online articles about your death and how it could have  been  avoided. \n\n\tSome of the department members even set up a memorial fund in your honor to help sponsor and promote additional educational training for firefighters regarding safety protocols so that hopefully nobody would ever lose a loved one in the same way again.\n\n\t*goto YourDeathConclusion\n\n*label YourDeathConclusion\n\n*if company = \"Truck\"\n\n\tAt least your death served a lesson for others as to the dangers of pulling electrical meters and why that should never be done these days, especially in the case of a commercial building.\n\n\tSo that was your short but eventful career as a firefighter.\n\t*goto_scene 13awardparty ending\n\n*else\n\n\tSo that was your short but eventful career as a firefighter.\n\t*goto_scene 13awardparty ending\n\n\n*label SchmidtMeter\n\nUsing a pair of wire cutters with rubber grips, Firefighter Schmidt carefully cuts and removes the seal on the meter. Then she remove the retaining ring that holds the meter in place, which allows her to lift the cover to reveal the inner workings of the meter.\n\n*if teamposition = \"TruckLeader\" \n\t*goto InstructSchmidt\n\n*else\n\tShe studies the assembly for a moment, looking thoughtful as she considers the best way to go about this. Then, very carefully, she rocks the meter back and forth until it finally begins to detach from the connectors.\n\t*page_break\n\t*goto SchmidtDies\n\n\n*label InstructSchmidt\n\nAt this point, Schmidt pauses and looks to you for instruction. The truth of the matter is that you're not really sure! But you've always heard that confidence is an important leadership trait so you smile reassuringly. \"Looks good so far,\" you tell her. \"Now, they're probably already inside with the hose line at this point so we'd better hurry up and get this taken care of before they get the water flowing. They're counting on us to get this done!\"\n\n*page_break\n\nHow will instruct Schmidt to pull the meter?\n*choice\n\t#As quickly as possible.\n\t\tThe way you see it, the faster she detaches the meter from the building the less likely there will be any kind of danger. And that's what you tell Firefighter Schmidt.\n\n\t\t\"Stand back,\" you warn Probie ${NPname}. \"Schmidt, on the count of three! One, two, THREE!\" She gives a mighty yank to try to pull the meter in a single motion.\n\n\t\t*page_break\n\n\t\tIt doesn't work, however. She end up having to rock the meter back and forth before it finally begins to detach from the connectors.\n\t\t*goto SchmidtDies\n\n\t#Very slowly and carefully.\n\t\t\"Just go nice and easy,\" you advise Firefighter Schmidt. \"Take it slow.\" \n\n\t\t\"Keep your distance,\" you warn Probie ${NPname}, waving for ${NPpronoun3} to take a few steps backward.\n\n\t\tSchmidt then gently rocks the meter back and forth until it finally begins to detach from the connectors.\n\t\t*goto SchmidtDies\n\n\t#I'm having second thoughts.\n\t\tYou study the meter for a long moment.  Suddenly, you don't feel very good about this whole process.  In fact, you feel a very strong sense of foreboding. \"You know what?\" you say. \"I don't think this is such a good idea, actually. Let's mask up and go find that breaker.\"\n\t\t*set BreakerDelay true\n\t\t*goto FindBreaker\n\n*label FindBreaker\n\n*page_break\n\nSo before you and your team can look for the circuit breaker, you have to get inside the building.  Of course, the back door is locked.  \n\nYou remember learning about forcible entry in your training and do a quick size-up of the door. It's a outward-opening metal door with a cylinder lock. The hinges are sealed so that the pins cannot be removed.\n\n*page_break\n\nWhat warning signs should you look for as part of the size-up?\n\n*fake_choice\n\n\t#The temperature of the door and if there is any smoke pushing out through the cracks.\n\t\tJust so! Before you even think of opening a door like this, it's important to get a sense of whether or not there is fire directly behind the door or if the room or corridor is filled with pressurized smoke that might trigger an explosion when you let it more air.\n\n\t\tIn your case, the door is cool to touch and you see no smoke so you're good to go!\n\n\t#An electronic security system.\n\t\tThe existence of a security system (or lack thereof) is pretty much irrelevant in a situation like this. You're here on official fire department business to help put out a fire!\n\n\t\tHowever, before you even think of opening a door like this, it's important to get a sense of whether or not there is fire directly behind the door or if the room or corridor is filled with pressurized smoke that might trigger an explosion when you let it more air.\n\n\t\tIn your case, the door is cool to touch and you see no smoke so you're good to go!\n\t#A warning sign for \"Authorized Personnel Only\"\n\t\tAny such signs are pretty much irrelevant in a situation like this. You're here on official fire department business to help put out a fire!\n\n\t\tHowever, before you even think of opening a door like this, it's important to get a sense of whether or not there is fire directly behind the door or if the room or corridor is filled with pressurized smoke that might trigger an explosion when you let it more air.\n\n\t\tIn your case, the door is cool to touch and you see no smoke so you're good to go!\n\n*page_break\n\nWhat tools will you need to open the door?\n*choice\n\t#My trusty bolt cutters and a hammer.\n\t\tWhen you reach into the tool box for the bolt cutters, Schmidt gives you a funny look. \"Why do you need those?\" she asks. \"This is a job for irons.\" By \"irons\" she means a combination of firefighter's ax and halligan tool, which is what she hands you so you can get started on that door.\n\t\t*set fire_knowledge %+10\n\t\t*goto ForcetheDoor\n\n\t#The jaws of life, of course.\n\t\tWhen you reach for the bulky jaws of life, Schmidt gives you a funny look. \"Why do you need that?\" she asks. \"This is a job for a K tool and irons.\"  By \"irons\" she means a combination of firefighter's ax and halligan tool, which is what she hands you so you can get started on that door.\n\t\t*set fire_knowledge %+10\n\t\t*goto ForcetheDoor\n\n\t#The key. Duh.\n\t\tWell, that would be great if you had the key. But you don't.  So think again.\n\n\t\tWhat tools will you need?\n\t\t\n\t\t*choice\n\t\t\t#Bolt cutters and a hammer.\n\t\t\t\tWhen you reach into the tool box for the bolt cutters, Schmidt gives you a funny look. \"Why do you need those?\" she asks. \"This is a job for irons.\" By \"irons\" she means a combination of firefighter's ax and halligan tool, which is what she hands you so you can get started on that door.\n\t\t\t\t*set fire_knowledge %+10 \n\t\t\t\t*goto ForcetheDoor \n\n\t\t\t#The jaws of life, of course.\n\t\t\t\tWhen you reach for the rotary saw, Schmidt gives you a funny look. \"Why do you need that?\" she asks. \"This is a job for irons.\"  By \"irons\" she means a combination of firefighter's ax and halligan tool, which is what she hands you so you can get started on that door.\n\t\t\t\t*set fire_knowledge %+10\n\t\t\t\t*goto ForcetheDoor \n\n\t\t\t#The essential ax and halligan.\n\t\t\t\tYou reach for your ax and halligan, known together as a set of \"irons.\" These are the most basic and most useful tools that firefighters use for forcible entry. \n\t\t\t\t*set leadership %+10\n\t\t\t\t*goto ForcetheDoor \n\n\t\t\t#I'm not sure.\n\t\t\t\tThat's okay. That's why you work as a team! Firefighter Schmidt sees you hesitate and, without missing a beat, she picks up the ax and halligan, known together as a set of \"irons.\" She offers a quick reminder of the basic technique, which you do actually remember now from your training.\n\t\t\t\t*set fire_knowledge %+10 \n\t\t\t\t*goto ForcetheDoor \n\n\t#The essential ax and halligan.\n\t\tYou immediately reach for your ax and halligan, known together as a set of \"irons.\" These are the most basic and most useful tools that firefighters use for forcible entry. \n\t\t*set leadership %+10\n\t\t*goto ForcetheDoor\n\n\t#I'm not sure.\n\t\tThat's okay. That's why you work as a team! Firefighter Schmidt sees you hesitate and, without missing a beat, she picks up the ax and halligan, known together as a set of \"irons.\" \n\t\t*set fire_knowledge %+10 \n\t\t*goto ForcetheDoor\n\n*label ForcetheDoor\n*temp DoorControl \"\"\n*page_break\n\nSo Firefighter Schmidt will place the adz end of the halligan into the door frame, near the locking mechanism, and you will use the flat part of your ax to strike the halligan and wedge it further into crack so that the door can be pried. \n\nWhat should Probie ${NPname} be doing?\n\n*choice\n\t#Watching and learning.\n\t\tA probie should watch and learn these important skills needed to be a competent firefighter.  Following orders, Probie ${NPname} keeps ${NPpronoun2} distance several paces away, awaiting further instructions.\n\t\t*goto ForcetheDoor2\n\n\t#Controlling the door.\n\t\tAlthough it is arguably more important to control an inward-opening door, it is nevertheless important to have Probie ${NPname} control the door while you and Schmidt force it open so ${NPpronoun1} can both prevent the door from slamming open in someone's face and close it quickly again if that proves necessary.\n\t\t*set DoorControl \"yes\"\n\t\t*page_break\n\t\t*goto ForcetheDoor2\n\n\t#Cheering us on.\n\t\tSupportive team members are good for moral! While you don't expect Probie ${NPname} to pull out the pom-poms, ${NPpronoun2} silently supportive presence is just fine. \n\t\t*goto ForcetheDoor2\n\n*label ForcetheDoor2\n\nYou've done this in training more than a few times so it doesn't take you and Firefighter Schmidt very long to pry open the back door. \n\n*if DoorControl = \"yes\"\n\tIt comes open very suddenly, but, fortunately, Probie ${NPname} has ${NPpronoun2} shoulder against it, allowing you to open the door more slowly and cautiously.\n\t*page_break\n\t*goto BreakerSearch\n\n*else\n\tThe door swings free all at once and with considerable force, hitting Schmidt on her shoulder and clipping the side of her helmet. She staggers momentarily.\n\n\t\"You all right?\" you ask her.\n\n\t\"I'm fine,\" she says, after a moment. \"I'm ready to head in when you are.\"\n\t*page_break\n\t*goto BreakerSearch\n\n*label BreakerSearch\n\n*if BreakerDelay = false\n\tSmoke conditions are not too bad in the back corridor. Regardless, your team turns on the air flow to their masks as they enter the building. Just in case, you have Probie ${NPname} stick a pike pole into the drop ceiling to make sure there's no fire overhead.\n\n\t*page_break\n\n\tWithin just a few moments, you are able to find the clearly-marked utility closet. \tIt's locked, of course, but you and Schmidt have no trouble getting through it. You shut down the main breaker for the building and then switch on your helmet light as everything goes dark. \"Power's off, Chief,\" you radio in to command.\n\n\t\"10-4,\" comes the reply. \"Come on back around to the front. We'll need your help with overhaul shortly.\" After this transmission ends, the hose team gets the order to open the hose line.  As you and your team head back toward the exit, you can hear the crackle and hiss of the dying fire in the next room.\n\t*set relationship_officers %+10\n\t*page_break\n\n\tIt seems like the fire was no big deal once electricity was taken out of the picture. Thanks to your good work, the engine company was able to extinguish the flames very quickly. Afterwards, everyone pitched in with overhaul work. It was a job well done.\n\t*finish\n\n*elseif BreakerDelay = true\n\tSince it took you a while to get to this point, smoke conditions are getting pretty bad in the back corridor. You and your team turn on the air flow to your masks and, as per your training, get down low so your heads are below the smoke so that you can begin your search. \n\n\tYou follow a right-hand lead through the corridor. The first door you encounter is an unlocked storage room of some sorts. There's no circuit breaker here.  The second door is a janitor closet.\n\n\t*page_break\n\n\tThe third door is locked, but you and Schmidt have no trouble forcing your way through it to what is, thankfully, the utility closet. \tYou shut down the main breaker for the building and then switch on your helmet light as everything goes dark. \"Power's off, Chief,\" you radio in to command.\n\n\t\"10-4,\" comes the reply. \"What took you so long? We're losing control of this fire. Get out of that building ASAP and come back to the trucks.\"\n\t*set relationship_officers %-20\n\t*page_break\n\n\tThe fire ended up burning through the roof so the interior firefighters were evacuated and operations switched to a \"surround and drown\" tactic, using the aerial ladder to pour water from above.  Overhaul took hours, as you and your fellow firefighters had to make sure that every bit of smoldering ember had been thoroughly extinguished.  It was a long night, but, thankfully, no one was injured.\n\t*finish\n\n*label SchmidtDies\n*set SchmidtDead true\n\nThe meter comes lose into her hands, and, you feel a profound sense of relief.  \n\nShe did it!  \n\n*page_break\n\nA white flash.  \n\nIt's so bright you can't see anything for a moment. You instinctively cover your face with your hands. Then your vision starts to return, hazily. \n\nProbie ${NPname} is screaming Schmidt's name. Everything is blurry, dream-like. You watch as her body convulses violently and then drops to the ground, lifeless and limp. \n\nAnd something smells very, very wrong. It is the pungent odor of burning flesh. \n\n*page_break\n\nShit. Oh, shit. \n\n\"${NPname}, get help,\" you order the probie, but ${NPpronoun1} is already running toward the others at the front of the building.\n\n\"Firefighter down!\" ${NPpronoun1} is yelling. \"Help! We need help!\" \n\n*page_break\n\nYou fall to your knees and check Schmidt's pulse. Nothing. She looks very pale. Within moments, other firefighters and EMTs arrive. \n\n\"She's not breathing!\" you say to them, in shock. Someone is gently but firmly pulling you away from the fallen firefighter, while others surround her and start CPR. \n\n*page_break\n\nYou are taken to an ambulance to be evaluated and then transported to the hospital as a precaution, especially for your eyes. You feel numb while the doctors poke you and perform their tests. You answer their questions as best you can.  \n\nThey keep you for a few hours and then release you with instructions to follow up with your own doctor tomorrow. Your mother comes to take you home to her house, and you go with her. \n\nShe puts you in bed, and you drift into a fitful sleep. By the time you wake up to a new day, you've convinced yourself it's all just a dream.\n\n*page_break\n\nBut it isn't. \n\nIn the morning, you find out that Schmidt is dead. You also learn that the fire at Downtown Donuts was extinguished with no additional injuries.\n\nHow do you feel about what happened?\n\n*choice\n\n\t#Numb. I still feel numb.\n\t\tIt doesn't seem real. How could this have happened? It's all one horrible nightmare. You hope it will all go away soon. \n\n\t\tBut it doesn't.\n\t\t*goto FuneralQuestion\n\n\t#Guilty. I should be the one who died.\n\t\t*if teamposition = \"TruckLeader\"\n\t\t\tYou asked Firefighter Schmidt to pull the meter. You assured her it would be okay. In your eyes, this is all your fault. You killed her. You are to blame.\n\t\t\t*goto FuneralQuestion\n\t\t*else\n\t\t\tIf you had followed Schmidt's orders and pulled the meter yourself, you'd be the one who was dead or maybe you would have done something differently and you would both be alive.\n\t\t\t*goto FuneralQuestion\n\t\n\t#Angry. How could we have known that would happen?\n\t\tYou heard plenty of stories about firefighters pulling meters to quickly shut off a building's power. Sure, there's bound to be some risk, but firefighting is risky! No one ever told you not to pull a meter. You were just told to shut off the electricity. How were you supposed to know?\n\t\t*goto FuneralQuestion\n\n\n*label FuneralQuestion\n*page_break\n\nIn a few days' time, you are forced to consider the following question: Do you attend the funeral?\n*temp funeral \"\"\n\n*choice\n\n\t#Of course I do.\n\t\tIt is an extremely important tradition for firefighters to honor one of their own who have passed away in the line of duty. No matter how you are feeling personally, you
