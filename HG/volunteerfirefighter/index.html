 that's ridiculous. Of course it was a big deal. I'm so sorry I let you down.  I'm so sorry I hurt you. I'm an idiot sometimes, and I'm sure I'll make mistakes again, but I never mean to hurt you.  Please remember that. I promise I'll try to be more considerate in the future.\n\n\t\t\t\tDid ${SOpronoun1} accept your apology?\n\n\t\t\t\t*choice\n\t\t\t\t\t#Yes.\n\n\t\t\t\t\t\tThank goodness.  $!{SOpronoun1} did, and you believe you grew stronger as a couple for the experience.\n\t\t\t\t\t\t*set relationship_SO %+20\n\t\t\t\t\t\t*finish\n\n\t\t\t\t\t#No. It was too late.\n\n\t\t\t\t\t\t\"I'm sorry too,\" $!{SOname} replied. \"I'm sorry I wasted my time with someone who obviously has other priorities in life and who waits two whole weeks to think, 'Maybe I did something wrong,' and get up the nerve to even talk to me at all. I can't deal with that crap.  I deserve better.\"\n\n\t\t\t\t\t\tYou had messed up too badly, and ${SOname} was ready to move on. So ${SOpronoun1} broke up with you. You guess you deserved it.\n\t\t\t\t\t\t*set SO false\n\t\t\t\t\t\t*finish\n\n\t\t\t\t\t#Eventually.\n\n\t\t\t\t\t\t$!{SOpronoun1} continued to be angry at you for several days, but you kept apologizing and eventually ${SOpronoun1} forgave you. Ultimately, you believe you grew stronger as a couple for the experience.\n\t\t\t\t\t\t*set relationship_SO %+20\n\t\t\t\t\t\t*finish\n\n\t\t\t#I told ${SOpronoun2} to quit being so melodramatic.\n\t\t\t\t${SOname} told you to quit being an asshole.  Neither of you took the other's advice so, after much name-calling and colorful language, you broke up.  It was probably better that way. \n\t\t\t\t*set SO false\n\t\t\t\t*finish\n\n\t\t\t#I hung up.  I didn't have time for that crap.\n\t\t\t\tApparently ${SOname} didn't have time for that crap either.  $!{SOpronoun1} broke up with you shortly thereafter, via text message.\n\t\t\t\t*set SO false\n\t\t\t\t*finish\n\n\t#No. Too much drama. I dumped ${SOpronoun3}.\n\t\tYou already had enough on your plate, what with all the fire department stuff on top of work and friends and family obligations.  The last thing you needed was a high-maintenance SO who always needed to be at the center of attention.  Without the added complications of a relationship, you felt a burden lift from your shoulders and your schedule cleared up considerably.\n\t\t*set SO false\n\t\t*finish\n\n\n\n*label HappySO\n*set relationship_SO %+20\n*set relationship_firefighters %-10\n*set relationship_officers %-10\n\nSo you went to the movies that night with ${SOname}, and you had a wonderful time!  \"The Lord of the String\" turned out to be highly entertaining, filled with a lot of funny one-liners that cropped up from time to time in conversation for weeks to come.  You shared a huge tub of popcorn and your favorite soda.  Some parts of the movie were so funny you could barely catch your breath for all the laughing.  The whole evening was a marvelous demonstration of just how much fun you and  ${SOname} can have together. Really, you had no regrets.\n\n*page_break\n*goto Explanation\n\n*label Explanation\n\nOf course, they did miss you down at the fire house. In fact, your Lieutenant called you up the next day to find out why you missed the drill.  \n\nWhat did you say?\n\n*choice\n\n\t#I explained I needed to keep a promise to my SO.\n\t\t*if relationship_officers > 50\n\t\t\tA lot of people have significant others, the Lieutenant included.  So he was very sympathetic.  He understood that sometimes you need to make your SO a priority.  However, you were asked next time to inform someone in advance if you knew you were going to miss a training you were expected to attend.  Luckily, you didn't get in any sort of trouble about it, but you had a feeling you didn't want to push your luck again as a probie.\n\t\t\t*finish\n\t\t*else\n\t\t\tThe Lieutenant reminded you that you took an oath of service to the fire department as well. He did understand that sometimes you need to make your SO a priority.  However, you were asked next time to inform someone in advance if you knew you were going to miss a training you were expected to attend.  Luckily, you didn't get in any sort of trouble about it, but you had a feeling you didn't want to push your luck again as a probie.\n\t\t\t*finish\n\n\t#I told him I went to the opening night of \"The Lord of the String.\"\n\t\tThe Lieutenant was not impressed.  \"I see,\" he said disapprovingly.  Then he simply asked you to inform someone in advance if you knew you were going to miss a training you were expected to attend. Luckily, you didn't get in any sort of trouble about it, but you had a feeling you didn't want to push your luck again as a probie.\n\t\t*set relationship_officers %-10\n\t\t*finish\n\n\t#I declared I needed a break from drills.\n\t\tThe Lieutenant was not impressed.  \"I see,\" he said disapprovingly.  Then he simply asked you to inform someone in advance if you knew you were going to miss a training you were expected to attend. Luckily, you didn't get in any sort of trouble about it, but you had a feeling you didn't want to push your luck again as a probie.\n\t\t*set relationship_officers %-10\n\t\t*finish\n\t\t\n\t#I lied and said I hadn't been feeling well.\n\t\t*if relationship_officers > 50\n\t\t\tThat can happen to anyone, and, since nobody should be pushing themselves to do a physically challenging drill when they're sick, your absence was belatedly excused.  However, you were asked next time to inform someone in advance if you knew you were going to miss a training you were expected to attend.  You were given the benefit of the doubt, and nobody questioned your lie, but you had a feeling you didn't want to push your luck again as a probie.\n\t\t\t*set relationship_officers %-10\n\t\t\t*finish\n\t\t*else\n\t\t\tAnd your explanation might have been taken at face value except that you didn't have a particularly great reputation with the officers to begin with. If that wasn't bad enough, one of the officer's wives saw you at the movie theater the night before so you were totally, utterly, and thoroughly busted. \n\n\t\t\tIn order to redeem yourself, you were ordered to come to the firehouse early one Sunday morning and wash all the fire trucks until they were spotlessly clean. You did this whether you liked it or not.  The alternative was being thrown out of the fire department.\n\t\t\t*set relationship_officers %-30\n\t\t\t*finish\n\n*label TalkSO\n\nSince you were dealing with such a difficult conflict of obligations, and you really didn't know what was best to do, you brought it up a few days before the night in question, over lunch.\n\n${SOname} listened to what was on your mind and seemed to sympathize with your confusion.\n\n\"Well, what do you want to do?\" ${SOpronoun1} asked you.\n\nHow did you reply?\n\n*choice\n\t#\"I want to spend that evening with you, as I promised.\"\n\t\t${SOname} seemed touched that you felt that way.\n\n\t\t*if SOfeeling=\"encouraging\"\n\t\t\t*goto Respectful\n\t\t*elseif SOfeeling=\"worriedtime\"\n\t\t\t*goto Worried\n\t\t*elseif SOfeeling=\"worriedrespectful\"\n\t\t\t*goto Safety\n\t\t*else\n\t\t\t*goto Terrified\n\n\t\t\n\t#\"I want to go to the drill because it's important and could help me save a life one day. But I feel bad because we had plans.\"\n\n\t\t*if SOfeeling=\"encouraging\"\n\n\t\t\t\"I understand,\" ${SOpronoun1} reassured, with sincerity.  \"We both know how important it is for you to get the training you need as a firefighter so you can learn the best way to safely do what you have to do.  I admit I'm disappointed about the movie, but let's see if we can have the best of both worlds -- shall we?\" $!{SOpronoun1} smiled and reached for your hand.  \"Go to your drill night.  How about we make our date Friday instead?  We'll do dinner too, my treat.\"\n\n\t\t\tYou were really touched by ${SOname}'s support and encouragement, and you feel your relationship grew stronger for being able to talk openly about what was on your mind.\n\n\t\t\t*page_break\n\n\t\t\tYou went to your drill night, and you learned some very important potentially life-saving skills. You had the chance to go up the 24-foot ladder multiple times, carrying a weighted, life-size dummy on your way down, practicing several different methods of doing so safely.  Afterwards, you hung out in the rec room for a couple hours, chatting with your fellow firefighters, and all was well. \n\n\t\t\t*page_break\n\n\t\t\tOn Friday, you went to dinner and to see the movies with ${SOname}, and you had a wonderful time!  \"The Lord of the String\" turned out to be highly entertaining, filled with a lot of funny one-liners that cropped up from time to time in conversation for weeks to come.  You shared a huge tub of popcorn and your favorite soda.  Some parts of the movie were so funny you could barely catch your breath for all the laughing.  The whole evening was a marvelous reminder of just how much fun you and  ${SOname} can have together. Really, everything worked out perfectly.\n\n\t\t\t*set relationship_SO %+20\n\t\t\t*set relationship_firefighters %+10\n\t\t\t*set relationship_officers %+10\n\t\t\t*set fire_skills %+20\n\t\t\t*set fire_knowledge %+20\n\t\t\t*finish\n\n\n\t\t*elseif SOfeeling=\"worriedtime\"\n\t\t\t*goto Worried\n\t\t*elseif SOfeeling=\"worriedrespectful\"\n\t\t\t*goto Respectful\n\t\t*else\n\t\t\t*goto Terrified\n\n\n\t#\"I wish I could both go to the drill and spend that time with you.  They are both important.\"\n\t\t*if SOfeeling=\"encouraging\"\n\t\t\t*goto Respectful\n\t\t*elseif SOfeeling=\"worriedtime\"\n\t\t\t*goto Worried\n\t\t*elseif SOfeeling=\"worriedrespectful\"\n\t\t\t*goto Safety\n\t\t*else\n\t\t\t\"To be honest,\" ${SOname} began, \"I would rather you be on our date than falling off ladders and hurting yourself.\"\n\n\t\t\tYou tried to explain to ${SOpronoun3} that the whole point of training was to learn to do these things in a safe, controlled environment so that you will be that much more skilled during an actual emergency.  But ${SOpronoun1}  seemed even less reassured by the thought of you responding to an alarm, skilled or otherwise, so there was really no consoling ${SOpronoun2}.\n\n\t\t\t\"Besides,\" ${SOname} added, \"you promised me this date, and I would like if your promise meant something. You can always go to the next drill, but there's only one opening night to this movie.\"\n\n\t\t\tDid you go to your drill anyway or hang out with your SO?\n\n\t\t\t*choice\n\t\t\t\t#I went to the drill.\n\t\t\t\t\tSo you went to the drill and you learned some very important potentially life-saving skills. You had the chance to go up the 24-foot ladder multiple times, carrying a weighted, life-size dummy on your way down, practicing several different methods of doing so safely.  Afterwards, you hung out in the rec room for a couple hours, chatting with your fellow firefighters, and all was well, except that your SO wasn't terribly happy with you. You remember feeling concerned about how this was all going to work out in the long run.\n\n\t\t\t\t\t*set relationship_SO %-20\n\t\t\t\t\t*set relationship_firefighters %+10\n\t\t\t\t\t*set relationship_officers %+10\n\t\t\t\t\t*set fire_skills %+20\n\t\t\t\t\t*set fire_knowledge %+20\n\t\t\t\t\t*finish\n\n\t\t\t\t#I went on the date. \n\n\t\t\t\t\tSo you went to the movies that night with ${SOname}, and admittedly you had a wonderful time.  \"The Lord of the String\" turned out to be highly entertaining, filled with a lot of funny one-liners that cropped up from time to time in conversation for weeks to come.  You shared a huge tub of popcorn and your favorite soda.  Some parts of the movie were so funny you could barely catch your breath for all the laughing.  The whole evening was a marvelous demonstration of just how much fun you and  ${SOname} can have together. But, still, you remember feeling concerned about how this was all going to work out in the long run.\n\n\t\t\t\t\t*set relationship_SO %+20\n\t\t\t\t\t*set relationship_firefighters %-10\n\t\t\t\t\t*set relationship_officers %-10\n\t\t\t\t\t*goto Explanation\n\n\n\n*label Respectful\n\n\"Thank you,\" ${SOpronoun1} said, with sincerity.  \"I'm glad to know I'm that important to you.  But we both also know how important it is for you to get the training you need as a firefighter so you can learn the best way to safely do what you have to do -- you know?\" $!{SOpronoun1} smiled and reached for your hand.  \"Go to your drill night.  How about we make our date Friday instead?  We'll do dinner too, my treat.\"\n\nYou were really touched by ${SOname}'s support and encouragement, and you feel your relationship grew stronger for being able to talk openly about what was on your mind.\n\n*page_break\n\nYou did end up going to the drill night, and you learned some very important potentially life-saving skills. You had the chance to go up the 24-foot ladder multiple times, carrying a weighted, life-size dummy on your way down, practicing several different methods of doing so safely.  Afterwards, you hung out in the rec room for a couple hours, chatting with your fellow firefighters, and all was well. \n\n*page_break\n\nOn Friday, you went to dinner and to see the movies with ${SOname}, and you had a wonderful time!  \"The Lord of the String\" turned out to be highly entertaining, filled with a lot of funny one-liners that cropped up from time to time in conversation for weeks to come.  You shared a huge tub of popcorn and your favorite soda.  Some parts of the movie were so funny you could barely catch your breath for all the laughing.  The whole evening was a marvelous reminder of just how much fun you and  ${SOname} can have together. Really, everything worked out perfectly.\n\n*set relationship_SO %+20\n*set relationship_firefighters %+10\n*set relationship_officers %+10\n*set fire_skills %+20\n*set fire_knowledge %+20\n*finish\n\n\n\n*label Worried\n\n\"I knew this was going to happen,\" ${SOpronoun1} said, looking down at ${SOpronoun2} food and poking at it with a fork.  \"You can't be in two places at once, and you can't really compare going to a movies with a training drill in terms of importance -- right? You go to your drill, and I'll find someone else to go with me to the movies.\"\n\nIs that what happened?\n\t\t\t\n*choice\n\t#Yes. I ended up going to the drill.\n\n\t\tSo you went to the drill and you learned some very important potentially life-saving skills. You had the chance to go up the 24-foot ladder multiple times, carrying a weighted, life-size dummy on your way down, practicing several different methods of doing so safely.  Afterwards, you hung out in the rec room for a couple hours, chatting with your fellow firefighters, and all was well, except that your SO wasn't terribly happy with you.\n\n\t\t*set relationship_SO %-20\n\t\t*set relationship_firefighters %+10\n\t\t*set relationship_officers %+10\n\t\t*set fire_skills %+20\n\t\t*set fire_knowledge %+20\n\t\t*finish\n\n\t#No.  I used this chance prove my commitment to ${SOname}.\n\n\t\tYou knew at the beginning of this relationship that ${SOname} had concerns about being in a relationship with a busy firefighter.  So you saw this decision as an opportunity to prove your dedication.\n\n\t\t*page_break\n\n\t\tSo you went to the movies that night with ${SOname}, and you had a wonderful time.  \"The Lord of the String\" turned out to be highly entertaining, filled with a lot of funny one-liners that cropped up from time to time in conversation for weeks to come.  You shared a huge tub of popcorn and your favorite soda.  Some parts of the movie were so funny you could barely catch your breath for all the laughing.  The whole evening was a marvelous demonstration of just how much fun you and  ${SOname} can have together. Really, you had no regrets.\n\n\t\t*set relationship_SO %+20\n\t\t*set relationship_firefighters %-10\n\t\t*set relationship_officers %-10\n\t\t*goto Explanation\n\n\n\n*label Safety\n\n\"Thank you,\" ${SOpronoun1} said, with sincerity.  \"I'm glad to know I'm that important to you.  But we both also know how important it is for you to get the training you need as a firefighter so you can learn the best way to safely do what you have to do -- you know?\" $!{SOpronoun1} smiled and reached for your hand.  \"Go to your drill night.  Just please call me afterwards so I know you're safe. Okay?  And I'll take a rain check on that movie date.\"\n\nYou were really touched by ${SOname}'s encouragement, and you feel your relationship grew stronger for being able to talk openly about what was on your mind.\n\n*page_break\n\nYou did end up going to the drill night, and you learned some very important potentially life-saving skills. You had the chance to go up the 24-foot ladder multiple times.   Each time you climbed down, you had to carry a weighted, life-size dummy to represent an unconconscious victim.  You learned several different methods of doing so safely.  Afterwards, you hung out in the rec room for a couple hours, chatting with your fellow firefighters, and all was well. \n\n*page_break\n\nOn Friday, you went to dinner and to the movies with ${SOname}, and you had a wonderful time!  \"The Lord of the String\" turned out to be highly entertaining, filled with a lot of funny one-liners that cropped up from time to time in conversation for weeks to come.  You shared a huge tub of popcorn and your favorite soda.  Some parts of the movie were so funny you could barely catch your breath for all the laughing.  The whole evening was a marvelous demonstration of just how much fun you and  ${SOname} can have together. Really, everything worked out perfectly.\n\n*set relationship_SO %+20\n*set relationship_firefighters %+10\n*set relationship_officers %+10\n*set fire_skills %+20\n*set fire_knowledge %+20\n*finish\n\n\n\t\n\n*label Terrified\n\n\"You'll be climbing up ladders that are [i]how[/] high?\" ${SOname} fretted, looking deeply concerned.  \"That sounds really dangerous!\"\n\nYou tried to explain to ${SOpronoun3} that the whole point of training was to learn to do these things in a safe, controlled environment so that you will be that much more skilled during an actual emergency.  But $!{SOpronoun1} seemed even less reassured by the thought of you responding to an alarm, skilled or otherwise, so there was really no consoling $!{SOpronoun2}.\n\nDid you go to your drill anyway or hang out with your SO?\n\n*choice\n\t#I went to the drill.\n\t\tSo you went to the drill and you learned some very important potentially life-saving skills. You had the chance to go up the 24-foot ladder multiple times, carrying a weighted, life-size dummy on your way down, practicing several different methods of doing so safely.  Afterwards, you hung out in the rec room for a couple hours, chatting with your fellow firefighters, and all was well, except that your SO wasn't terribly happy with you.\n\n\t\t*set relationship_SO %-20\n\t\t*set relationship_firefighters %+10\n\t\t*set relationship_officers %+10\n\t\t*set fire_skills %+10\n\t\t*set fire_knowledge %+10\n\t\t*finish\n\n\t#I went on the date. \n\n\t\tSo you went to the movies that night with ${SOname}, and admittedly you had a wonderful time.  \"The Lord of the String\" turned out to be highly entertaining, filled with a lot of funny one-liners that cropped up from time to time in conversation for weeks to come.  You shared a huge tub of popcorn and your favorite soda.  Some parts of the movie were so funny you could barely catch your breath for all the laughing.  The whole evening was a marvelous demonstration of just how much fun you and  ${SOname} can have together. But, still, you remember feeling worried about how this was all going to work out in the long run.\n\n\t\t*set relationship_SO %+20\n\t\t*set relationship_firefighters %-10\n\t\t*set relationship_officers %-10\n\t\t*goto Explanation\n\n\n\n\n*label BigMess\n*page_break\n\nYou woke up the next afternoon feeling incredibly nauseous.  Your head was pounding like a stomping elephant.  One of your socks was missing.  Someone had written their phone number in pen on your right forearm.  Inexplicably, there was a watermelon with a happy face drawn on it, sitting on your nightstand, silently mocking you.\n\nYou had no idea how you had gotten home or even what really happened last night other than drinking and dancing and something involving a mechanical bull.\n\n*page_break\n\nWhen you rolled over to check your cell phone, you had 12 missed phone calls from ${SOname} and one from the firehouse. After you got yourself cleaned up and had a cup of coffee or five, who did you call back first?\n\n*temp phoneorder \n\n*choice\n\t#My SO. I'd better get that crap over with.\n\n\t\t*set phoneorder \"SOfirst\"\n\t\t*goto SODread\n\t\t\t\t\t\t\n\t#My SO. I feel really bad.\n\t\t*set phoneorder \"SOfirst\"\n\t\t*goto SOGuilt\n\n\t\t\t\n\t#The fire house. Business first.\n\t\t*set phoneorder \"FDfirst\"\n\t\t*goto BigMessFD\n\n\t\t\t\n\n\t#Neither.\n\n\t\tYou really are a model citizen, aren't you?  After learning that you weren't dead or in some kind of trouble, ${SOname} was actually even more furious at you than ${SOpronoun1} would have been if you had actually talked to ${SOpronoun3} or done something other than avoid communication entirely. \n\n\t\tSo ${SOpronoun1} dumped you.  ${SOpronoun1} had to do so in a voice mail because you wouldn't pick up the phone.  Sad.\n\n\t\t*set SO false\n\t\t*page_break\n\n\t\tAs for the fire house, when you finally showed your face there, nobody there was happy with you either. Nobody gave you much trouble over it this time.  You were simply asked to inform someone in advance if you knew you were going to miss a training you were expected to attend. But you got the distinct impression it wouldn't be a good idea to push your luck again.\n\n\t\t*set relationship_firefighters %-30\n\t\t*set relationship_officers %-30\n\n\t\t*finish\n\n\n*label SOSecond\n\nNext it was time to call ${SOname}.  How did you feel about it?\n\n*choice\n\t#Dread. I expected to be yelled at.\n\t\t*goto SODread\n\t#Guilt. I really messed up.\n\t\t*goto SOGuilt\n\n\n*label SODread\n\nYou knew it wasn't going to be pretty when you finally called ${SOname} back.  After learning that you weren't dead or in some kind of trouble, ${SOname} was actually pretty furious. You stood ${SOpronoun3} up for a date, didn't even talk ${SOpronoun3} at all until the next day, and now you were acting like it's completely unreasonable for ${SOpronoun3} to be upset.\n\nAnd it [i]was[/i] completely unreasonable, wasn't it?  You were mad too.  If it weren't for your SO, you wouldn't have been in that tough position to begin with, and now all ${SOpronoun1} can do is yell at you while you had this massive headache? \n\nScrew that.  You don't need that of garbage in your life.  You dumped ${SOname} then and there.  And it felt so very good to be single again.\n\n*set SO false\n\t\t\t\n*page_break\n\n*if phoneorder=\"SOfirst\"\n\t*goto BigMessFD\n*else\n\t*finish\n\n\n*label SOGuilt\n\t\nOverwhelmed with feelings guilt, you called ${SOname}.  Once ${SOpronoun1} learned you weren't dead or in some kind of trouble, ${SOname} was actually pretty mad.  \n\nYou realized how much it bothered me that you that you had hurt ${SOpronoun3}.  You cared more than you realized you did, and you told ${SOpronoun3} so.   You swallowed your pride, did what was right, and apologized from the heart.\n\nDid ${SOpronoun1} accept your apology?\n\n*choice\n\t#Yes.\n\t\tThank goodness.  $!{SOpronoun1} did.  You vowed to try to be more considerate in the future, and you believe you grew stronger as a couple for the experience.\n\t\t*set relationship_SO %+20\n\t\t*page_break\n\t\t*if phoneorder=\"SOfirst\"\n\t\t\t*goto BigMessFD\n\t\t*else\n\t\t\t*finish\n\n\t#No. It was too late.\n\t\tYou had messed up too badly, and ${SOname} was ready to move on. So ${SOpronoun1} broke up with you. You guess you deserved it.\n\t\t*set SO false\n\t\t*page_break\n\t\t*if phoneorder=\"SOfirst\"\n\t\t\t*goto BigMessFD\n\t\t*else\n\t\t\t*finish\n\t\t\t\t\t\n\t#Eventually.\n\t\t$!{SOpronoun1} continued to be angry at you for several days, but you kept apologizing and eventually ${SOpronoun1} forgave me. I vowed to try to be more considerate in the future, and I believe we grew stronger as a couple for the experience.\n\t\t*set relationship_SO %+20\n\t\t*page_break\n\t\t*if phoneorder=\"SOfirst\"\n\t\t\t*goto BigMessFD\n\t\t*else\n\t\t\t*finish\n\n*label BigMessFD\n\nThe call to the firehouse was an important one.  You were able to speak to your Lieutenant who said you had been missed at the drill last night and wanted to know the reason for your absence.  \n\nWhat did you tell him?\n\n*choice\n\t#\"I had a rough night and I wasn't able to make it.\"\n\t\tThe Lieutenant was not impressed.  \"I see,\" he said disapprovingly.  Then he simply asked you to inform someone in advance if you knew you were going to miss a training you were expected to attend. Luckily, you didn't get in any sort of trouble about it, but you had a feeling you didn't want to push your luck again as a probie.\n\t\t*set relationship_officers %-15\n\t\t*page_break\n\n\t\t*if phoneorder=\"SOfirst\"\n\t\t\t*finish\n\t\t*else\n\t\t\t*goto SOSecond\n\n\t#\"I had to work.\"\n\t\tThe Lieutenant was not impressed.  \"I see,\" he said disapprovingly.  Then he simply asked you to inform someone in advance if you knew you were going to miss a training you were expected to attend. Luckily, you didn't get in any sort of trouble about it, but you had a feeling you didn't want to push your luck again as a probie.\n\t\t*set relationship_officers %-10\n\t\t\t\t\t\n\t\t*if phoneorder=\"SOfirst\"\n\t\t\t*finish\n\t\t*else\n\t\t\t*goto SOSecond\n\t\t\t\t\n\t#\"I wasn't feeling well.\"\n\t\tThat can happen to anyone, and, since nobody should be pushing themselves to do a physically challenging drill when they're sick, your absence was belatedly excused.  However, you were asked next time to inform someone in advance if you knew you were going to miss a training you were expected to attend.  You were given the benefit of the doubt, and nobody questioned your lie, but you had a feeling you didn't want to push your luck again as a probie.\n\t\t*set relationship_officers %-10\n\t\t\t\t\t\n\t\t*if phoneorder=\"SOfirst\"\n\t\t\t*finish\n\t\t*else\n\t\t\t*goto SOSecond\n\t\t\t\t\t\n\t#\"I needed a break from all the training.\"\n\t\tThe Lieutenant was not impressed.  \"I see,\" he said disapprovingly.  Then he simply asked you to inform someone in advance if you knew you were going to miss a training you were expected to attend. Luckily, you didn't get in any sort of trouble about it, but you had a feeling you didn't want to push your luck again as a probie.\n\t\t*set relationship_officers %-20\n\t\t\t\t\t\n\t\t*if phoneorder=\"SOfirst\"\n\t\t\t*finish\n\t\t*else\n\t\t\t*goto SOSecond\n\n", "05oneyearlater": "\nThere were times when the weeks seemed to drag on forever and other times when months flew by, but, before you knew it, a whole year had passed.\n\n*page_break\n\nAnd what happened at the end of that year?\n\n*page_break\n\nYou became a full-fledged firefighter, of course!\n\n*page_break\n\n*if motivation=\"tradition\"\n\n\tLike your mother, your grandfather, and your great-grandfather before him, you have earned your place in the volunteer fire department.  You felt a distinct sense of pride when they switched out your blue probie helmet for a yellow one. Several other firefighters gave you pats on the back and words of encouragement.  \n\n\t*page_break\n\n\tNow, after that first real structure fire, you've got some ash on your helmet and soot under your nails.  And when your family starts bringing out all the old firefighting stories after holiday dinners, you'll finally have one of your own to share.\n\t\n\t*page_break\n\t*goto ProbieTreatment\n\n*elseif motivation=\"grudging\"\n\n\tAnd it's about damn time.  You thought you were going to implode if you were treated like dirt for another day.  Of course, being off probation isn't an instant ticket to popularity, but it does give you seniority over all probies and anyone who becomes a firefighter after you.\n\n\t*page_break\n\n\tFinally, after that first real structure fire, you've got some ash on your helmet and soot under your nails.  Now that you're not so green behind the ears, maybe you'll be treated with a little more respect.\n\n\t*page_break\n\t*goto ProbieTreatment\n\n*elseif motivation=\"service\"\n\n\tAlthough the probationary period wasn't always easy, it was an important part of both your training and your initiation into the culture and brotherhood of firefighters. You felt a distinct sense of pride when they switched out your blue probie helmet for a yellow one. Several other firefighters gave you pats on the back and words of encouragement.\n\n\t*page_break\n\n\tNow, after that first real structure fire, you've got some ash on your helmet and soot under your nails.  You have a little bit of experience now, which will hopefully allow you to help out even more effectively in the future.\n\n\t*page_break\n\t*goto ProbieTreatment\n\n*elseif motivation=\"hero\"\n\n\tYou've done your time as a probie, and now you can finally find find a way to shine.  You looked forward to every elderly lady you can rescue from the second story window of a burning building and every cute, fuzzy kitten you can carry down out of a tree.  Some people are just born to be heroes, and you are absolutely sure you are one of them.\n\n\t*page_break\n\n\tNow, after that first real structure fire, you've got some ash on your helmet and soot under your nails.  You have some experience now, and some interesting anecdotes to talk about at parties.\n\n\n\t*page_break\n\t*goto ProbieTreatment\n\n\n*label ProbieTreatment\n\nSo you might not be a probie anymore, but there are a few folks still at some point of their probationary year and new people joining every now and then.  As a full firefighter now, how do you treat them?\n\n*choice\n\n\t#I try to be a positive role model.\n\n\t\tMany would say that the best way to ensure that newcomers become the kind of firefighters you'd want to have your back in a fire is to be the kind of firefighter you want them to be, to lead by example, to show them the ropes by following them yourself.  \n\n\t\tYou're also laying the foundations for a good relationship with the new members and helping to build stronger ties with the more experienced firefighters. Good job!\n\n\t\t*set relationship_firefighters %+15\n\t\t*page_break\n\t\t*goto NewProbieGender\n\n\t#I give them a hard time because I can.\n\n\t\tYou feel that you had to suffer a great deal of indignity when you were a probie so now it's your turn to shovel it out.  In any case, playing pranks on the probies is fun, especially since they try so hard to fit in and not get kicked out!  \n\n\t\tYou'll never forget the look on that one kid's face when he discovered that you put chocolate pudding in his boots.  It was hilarious! \n\n\t\t*set relationship_firefighters %-10\n\t\t*page_break\n\t\t*goto NewProbieGender\n\n\t#I can be a positive role model and still yank their chains on occasion.\n\n\t\tMany would say that the best way to ensure that newcomers become the kind of firefighters you'd want to have your back in a fire is to be the kind of firefighter you want them to be, to lead by example, to show them the ropes by following them yourself. \n\n\t\tOf course, part of the tradition with probies is to play a couple pranks now and then and give them a difficult time on occasion just as part of their informal initiation into the group.  It's all in good fun, in any case.  \n\n\t\tEveryone had a good laugh the day you had three probies searching far and wide for that good ol' non-existent \"hose-stretcher.\"  They tried so hard!  \n\n\t\t*set relationship_firefighters %+20\n\t\t*page_break\n\t\t*goto NewProbieGender\n\n\t#I don't have time for probies.\n\n\t\tProbies are the ignorant newcomers who barely know how to handle a hose line. Now that you've done your time as a probie, you want nothing to do with them.  Now you can finally hang out with the real firefighters.\n\n\t\tSo you mostly ignore the probationary firefighters, unless, of course, you are delegating work to them that you'd rather not do yourself. \n\n\t\t*set relationship_firefighters %+10\n\t\t*page_break\n\t\t*goto NewProbieGender \n\n*label NewProbieGender\n\n*if SOgender=\"male\"\n\t*set NPgender \"male\"\n\t*set NPpronoun1 \"he\"\n\t*set NPpronoun2 \"his\"\n\t*set NPpronoun3 \"him\"\n\t*goto NewProbie\n*elseif SOgender=\"female\"\n\t*set NPgender \"female\"\n\t*set NPpronoun1 \"she\"\n\t*set NPpronoun2 \"her\"\n\t*set NPpronoun3 \"her\"\n\t*goto NewProbie\n*elseif SOgender=\"neutral\"\n\t*set NPgender \"neutral\"\n\t*set NPpronoun1 \"they\"\n\t*set NPpronoun2 \"their\"\n\t*set NPpronoun3 \"them\"\n\t*goto NewProbie\n\n\n*label NewProbie \n\nOne of the new probies catches your attention, actually, in a positive way. $!{NPpronoun1} is a good worker, always punctual and dedicated but able to laugh at the pranks and roll with the punches.  You have a feeling ${NPpronoun1} will make an excellent firefighter.\n\nWhat is ${NPpronoun2} last name?\n\n*goto ProbieName\n\n\n*label ProbieName\n*input_text NPname\n*comment capitalization check\n*if (\"${NPname}\" != \"$!{NPname}\")\n\tLet's make sure I got that right.  The new probie's last name is $!{NPname}. Is that correct?\n\t*choice\n\t\t#Yes. $!{NPname}.\n\t\t\t*set NPname \"$!{NPname}\"\n\t\t\t*goto NewProbie2\n\t\t#No, the probie's name is ${SOname}, just as I typed it before.\n\t\t\t*goto NewProbie2\n\t\t#Oops. That's not right! Let me try that again!\n\t\t\tSure. What's the name again?\n\t\t\t*goto ProbieName\n\n\n*label NewProbie2\n*page_break \nAnd there was something striking about the new probie's appearance too.  What was it again?\n\n*fake_choice\n\t#$!{NPpronoun2} beautiful eyes.\n\t\tWhat color were they?\n\t\t*fake_choice\n\t\t\t#Brown\n\t\t\t\tAh, yes. $!{NPpronoun2} eyes were a dark, soulful brown.\n\t\t\t\t*goto NewProbie3 \n\t\t\t#Blue\n\t\t\t\tRight. $!{NPpronoun2} eyes were such a lovely shade of pale turquoise blue.\n\t\t\t\t*goto NewProbie3\n\t\t\t#Green\n\t\t\t\tOh, yes. $!{NPpronoun2} eyes were deep green, like a forest. Very striking.\n\t\t\t\t*goto NewProbie3\n\t\t\t#Hazel\n\t\t\t\t$!{NPpronoun2} eyes were the sort of hazel that seemed to change color with the weather or the color of shirt ${NPpronoun1} was wearing on any particular day.\n\t\t\t\t*goto NewProbie3\n\t\t\t#Violet\n\t\t\t\t$!{NPpronoun2} eyes were bright violet, like you had never seen before. $!{NPpronoun1} assured you they were natural and not contact lenses.\n\t\t\t\t*goto NewProbie3\n\t#$!{NPpronoun2} fit physique.\n\t\tThe new probie seemed to be very much in shape, toned and muscular, with a healthy glow suggestive of a healthy lifestyle.\n\t\t*goto NewProbie3\n\t#An interesting tattoo.\n\t\tOh, yes. The tattoo on ${NPpronoun2} upper right arm.  What was it again?\n\t\t*fake_choice\n\t\t\t#A Maltese cross.\n\t\t\t\tAh, yes.  And it seemed odd for a firefighter to have a tattoo of a Maltese cross when they were still a probie so you asked ${NPpronoun3} about it, and ${NPpronoun2} explained that ${NPpronoun2} had wanted to be a firefighter ever since ${NPpronoun2} was a young child.  Probie ${NPname} certainly takes firefighting seriously!\n\t\t\t\t*goto NewProbie3\n\t\t\t#A tree.\n\t\t\t\tRight.  It was a Tree of Life tattoo, complete with roots and branches, very intricate and detailed.\n\t\t\t\t*goto NewProbie3\n\t\t\t#A dragon.\n\t\t\t\tIndeed.  It was a tattoo of a green and silver dragon, very beautifully detailed.\n\t\t\t\t*goto NewProbie3\n\t\t\t#A geometric design.\n\t\t\t\tOh, right. It was a fairly elaborate geometric designed that flattered the shape of ${NPpronoun2} arm.\n\t\t\t\t*goto NewProbie3\n\t\t\t#What can only be described as an upside down spaceship with a cat sitting on it.\n\n\t\t\t\tRight!  The bizarre upside-down-spaceship-with-a-cat-sitting-on-it tattoo was so strange. Did you feel compelled to ask ${NPpronoun3} about it?\n\n\t\t\t\t*fake_choice\n\t\t\t\t\t#Yes. How could I not?\n\t\t\t\t\t\t\"Oh that,\" ${NPpronoun2} replied with a grin.  \"It's actually supposed to be a bird sitting on a branch, if you would believe it, but I think the tattoo artist was drunk.  I got my money back and learned to have a sense of humor about it.\"\n\n\t\t\t\t\t\tI guess you would have to!\n\t\t\t\t\t\t*goto NewProbie3\n\t\t\t\t\t#No. Some things I was better off not knowing.\n\t\t\t\t\t\tAnd this was definitely one of those things.  Moving on now...\n\t\t\t\t\t\t*goto NewProbie3\n\t#$!{NPpronoun2} style of dress.\n\t\tProbie ${NPname} had a really nice clothing style that you admired.  It was both functional and very flattering.\n\n\t\t*goto NewProbie3\n\n*label NewProbie3\n*set relationship_NP 40\n*page_break\n\nOne night, the trucks had just returned to the fire house after a particularly exhausting drill at the fire academy. The instructors had set up a combination labyrinth and obstacle course that you had to navigate on your hands and knees, wearing 60+ pounds of gear and equipment. You are so tired you can hardly think, and all your limbs feel like jelly. \n\n\"That was a tough one!\" you hear Firefighter Gina Zlenko say cheerfully as she climbs down from the truck. \n\nFirefighter David Cohen just groans as if in pain. \"I feel like I've been run over by a train,\" he complains.\n\n\"Poor baby,\" Firefighter Guy McCollaugh sympathizes with pointed sarcasm.\n\n*page_break\n\nYou're just about to walk away and get some water to drink when you see Probie ${NPname} miss a step while climbing out of the firetruck. The probie is falling, and you have a split second to react.  \n\nWhat do you do?\n\n*choice\n\t#I try to catch ${NPpronoun3}, of course.\n\t\tAlmost without th ple of sodas, sharing many a laugh.  You find yourself looking forward to those evenings. There's something about ${NPname} that seems so full of life. Good times!\n\n*page_break\n\nBut there are still challenging times as well.\n\n*goto BirthdayDinner\n\n*label BirthdayDinner\n\nFor example, it seems like your pager keeps going off at the worst moments possible.\n\n*if SO = true\n\t*goto SOBirthday\n*else\n\t*goto FamilyBirthday\n\n*label SOBirthday\n\nYou are just sitting down for ${SOname}'s birthday dinner with ${SOpronoun2} family. $!{SOpronoun2} Grandma spent all day cooking this wonderful meal, and it smells absolutely delicious. \n\n*page_break \n\nWhat did she make again?\n*temp dinner \"\"\n\n*choice\n\t#Lasagna\n\t\tAh, that delicious, savory cheesiness that is lasagna!\n\t\t*set dinner \"lasagna\"\n\t\t*goto DinnerInterrupted\n\t#Steak\n\t\tCenter-cut steak cooked to perfection and oven-roasted potatoes -- excellent!\n\t\t*set dinner \"steak and potatoes\"\n\t\t*goto DinnerInterrupted\n\t#Quiche\n\t\tAh, all that melt-in-your-mouth quiche goodness!\n\t\t*set dinner \"quiche\"\n\t\t*goto DinnerInterrupted\n\n*label DinnerInterrupted\n\n*page_break\n\nYour mouth was watering as you took your seat beside ${SOname} and prepared to dig in.  Of course, that's when your pager started beeping and the following message was announced:\n\n\"$!!{town_name} FIRE DEPARTMENT, YOU HAVE AN AUTOMATIC FIRE ALARM AT PARADISE PIZZA, 66 CHURCH ROAD. REPEATING FOR $!!{town_name} FIRE DEPARTMENT: YOU HAVE AN AUTOMATIC FIRE ALARM AT PARADISE PIZZA, 66 CHURCH ROAD. TIME NOW IS 1812.\"\n\n*page_break\n\nThat's your cue, your signal to depart, your call to duty!  \n\nWith a sigh of regret, you get up to leave.  Your SO looks disappointed but says nothing.  However, the rest of ${SOpronoun2} family begs you to stay put:\n\n\"It's ${SOname}'s birthday.  Surely you don't have to run out like that,\" declares ${SOpronoun2} father, a little ominously.\n\n\"Come on, ${Fname}. It's ${SOname}'s birthday. They'll understand,\" urges ${SOpronoun2} mother, persuasively.\n\n\"You haven't eaten your ${dinner} yet, dear. You can't go anywhere on an empty stomach,\" argues ${SOpronoun2} Grandma, reasonably.\n\n*if SOfight\n\t\"Really?\" ${SOpronoun2} sister says, not hiding her anger. \"You stood ${SOpronoun3} up for the movie, and now you're going to do this? How delightful.\"\n\n\t${SOname} glares daggers at ${SOpronoun2} sister to get her to shut-up, but it's already too late.\n\t*goto DinnerChoice\n\t\n\n*label DinnerChoice\n\n*page_break\n\nWhat do you do?\n*choice\n\t#I stay. It's ${SOname}'s birthday! And I'm really hungry!\n\t\t\"Of course,\" you say, silencing your pager as you sit back down. \"Sorry about that,\" you apologize with a sheepish grin. \"It's becoming habit, I guess.  But ${SOname}'s birthday is my priority right now.  And so is this delicious ${dinner}!\"\n\n\t\tThe ${dinner}, as predicted, is incredible, and you're sure to tell ${SOname}'s grandmother that several times until she's blushing happily.  Everyone has a good time, including, most importantly, ${SOname}.  As you all sing \"Happy Birthday,\" and ${SOname} blows out the candles, you feel sure that you made the right choice. Some of life's moments are just too important to miss.\n\n\t\tPlus, you find out later that the call was just a false alarm.\n\t\t*set relationship_firefighters %-10\n\t\t*set relationship_SO %+10\n\t\t*finish\n\n\t#I have to go immediately. I'm a firefighter, and it's my job.\n\t\t\"I'm sorry,\" you apologize, \"but I really do have to go.\"  \n\n\t\tSo, despite everyone's protests, you dash to your car and head to the firehouse in time to gear up and make the first due truck. You and the crew race, lights and sirens, down to Paradise Pizza on Church Road, only to find everything in order. There was no smoke, no fire -- only a malfunction with the fire alarm system. \n\n\t\tBack at the fire house a little while later, you get a cup of coffee.  And there's a message on your phone from ${SOname} to say that ${SOpronoun2} Grandma saved you a plate of ${dinner} that she'll heat up for you whenever you manage to stop by.  How sweet is that! \n\n\t\tYour SO didn't sound all that happy, however.  $!{SOpronoun1} spent ${SOpronoun2} birthday dinner missing you.\n\n\t\t*set responses +1\n\t\t*set relationship_firefighters %+10\n\t\t*set relationship_SO %-20\n\t\t*finish\n\n\t#I politely take a moment to explain to them why I need to go.  Then I go.\n\t\t\"I'm sorry,\" you apologize, \"but I really do have to go.  I'd rather stay here with you guys, I assure you, but I'm a firefighter and this is my job.\"\n\n\t\t\"You can't make an exception just this once?\" ${SOpronoun2} mother asked.\n\n\t\t\"No. Lives could be at stake. And, really, every person counts when fighting a fire.  I'll try to get back here as soon as I can -- all right?\"  \n\n\t\tYou look at your SO. \"${SOname}, I'm sorry.  I'll make it up to you somehow.  I promise.\"\n\n\t\t*page_break\n\n\t\tBy the time you finish your sorrowful parting and drive over to the firehouse, the first due truck is long gone and the second due truck has a full crew and is just about to depart.  You wait around a little while to see if they will call for another crew, but it turns out that it was just a false alarm at Paradise Pizza. \n\n\t\tAt least there's a message on your phone from ${SOname} to say that ${SOpronoun2} Grandma saved you a plate of ${dinner} that she'll heat up for you whenever you manage to stop by again.\n\n\t\t*set responses +1\n\t\t*set relationship_SO %-10\n\t\t*finish\n\t\n\n\n*label FamilyBirthday\n\nYou are just sitting down for your cousin's birthday dinner with family.  Your Grandma spent all day cooking this wonderful meal, and it smelled absolutely delicious. \n\n*page_break \n\nWhat did she make again?\n*temp dinner \"\"\n\n*choice\n\t#Lasagna\n\t\tAh, that delicious, savory cheesiness that is lasagna!\n\t\t*set dinner \"lasagna\"\n\t\t*goto Dinne \t\tYou look at your cousin. \"I'm sorry.  I'll make it up to you somehow.  I promise.\"\n\n\t\t*page_break\n\n\t\tBy the time you finish your sorrowful parting and drive over to the firehouse, the first due truck is long gone and the second due truck has a full crew and is just about to depart.  You wait around a little while to see if they will call for another crew, but it turns out that it was just a false alarm at Paradise Pizza. \n\n\t\tAt least there's a message on your phone from your aunt to say that Grandma saved you a plate of ${dinner} that she'll heat up for you whenever you manage to stop by again.\n\t\t\n\t\t*set relationship_firefighters %-10\n\t\t*set responses +1\n\t\t*finish\n\n", "06vehiclepedestrian": "\n*if career=\"construction\" \n\tIt's early Friday morning, and you've just left for work.  You and your crew are under pressure to finish building a good portion of an office building by this weekend, but you're already well behind schedule because it was pouring rain for three days straight.  For some reason, your supervisor doesn't think this should affect your deadline so it's going to be real challenge to get everything done on time!\n\t*goto Pager\n*elseif career=\"lawyer\"\n\tIt's early Friday morning, and you've just left for work.  Today is an important day.  The court date for the big case you've been working on for months is this afternoon.  \n\n\tIf you win this one, you'll likely be up for a promotion.  If you lose it, it might take you a while before you can gain your boss' trust once again. Most of the work is done already, of course, but you do need to do some final reviews of the information and meet with your expert witness.\n\t*goto Pager\n*elseif career=\"dispatcher\"\n\tIt's early Friday morning, and you've just left for the county dispatch center where you work.  While your job is often boring for hours on end, when a 911 call comes in, suddenly everything is a rush of activity and your words can mean the difference between lives being saved or a bungled up emergency response. \n\n\tPerhaps it is because your work is so important that your supervisor is a real stickler for punctuality.  You even have your watch synchronized with the clock at work, as you're likely to get an earful if you arrive even a minute past the time your shift begins.  In addition to getting yelled at, you might even get penalized further since your annual review is coming up shortly. You really don't want to be late!\n\t*goto Pager\n*elseif career=\"teacher\"\n\tIt's early Friday morning, and you've just left for the local middle school where you work.  The kids have a big test this morning so you want to be certain you have a little extra time to set up your classroom.  You want to have all the desks and papers arranged before they get there to make sure they have the maximum amount of time to actually work on their exam.\n\t*goto Pager\n*elseif career=\"engineer\"\n\tIt's early Friday morning, and you've just left for the office.  You were up late last night working on the final details of your design, and now you're up early with butterflies in your stomach.  \n\n\tIn a few hours, your boss is holding a design review meeting where specialists from different engineering fields will discuss your design in terms of what is satisfactory and what could use some improvement. There are still some minor changes you'd like to make before this happens.  \n\n\tIf the review goes well, they might even approve your design for production which would do amazing things for your career.  That would be so exciting!\n\t*goto Pager\n\n*label Pager\n*page_break\n\nSo, of course, your pager goes off:\n\n\"$!!{town_name} FIRE DEPARTMENT, YOU HAVE A VEHICLE VERSUS PEDESTRIAN AT THE CROSSROADS OF MAPLE AVENUE AND 6TH STREET. VICTIM IS AN 8-YEAR-OLD MALE ON A BICYCLE. REPEATING FOR $!!{town_name} FIRE DEPARTMENT: YOU HAVE A VEHICLE VERSUS PEDESTRIAN AT THE CROSSROADS OF MAPLE AVENUE AND 6TH STREET. TIME NOW IS 0632.\"\n\n*page_break\n\n*if motivation=\"tradition\"\n\tAh, duty calls. But you also have a duty to your work.\n\t*goto Response\n*elseif motivation=\"grudging\"\n\tOh, for the love! It figures this would happen today of all days.\n\t*goto Response\n*elseif motivation=\"service\"\n\tThe moment your pager goes off, you feel a surge of adrenaline and a sense of purpose.  And, yet, work is very important too!\n\t*goto Response\n*elseif motivation=\"hero\"\n\tA child is injured! Surely this will make the newspapers. But your job is important too. You feel torn between work and heroism.\n\t*goto Response\n\n*label Response\n\nDo you respond to the call?\n\n*choice\n\t#Of course I do! Yes!\n\t\tYou are a firefighter, and, when your pager goes off, you respond if at all possible. In this case, how could you possibly focus on work knowing that you turned away from an injured child?  So you make the next turn and head quickly in the direction of the fire house!\n\t\t*set responses +1\n\t\t*goto VVP\n\t#No way.  I don't want to lose my job!\n\t\tYou feel bad for the kid, but, if you lose your job, you won't be able to pay your bills. \n\n\t\tYou continue on to work to focus on what you have to do there.  You'll be available for emergency response later.\n\t\t*set relationship_firefighters %-10\n\t\t*goto Work\n\n\n*label VVP\n*page_break\n*temp injured \"\"\n*temp childinjury \"\"\n\nJust a handful of volunteers show up at the fire house for this call, probably because it's so early on a work day. You and three other firefighters, including Captain Simmons, gear up and climb onto the heavy rescue truck, which is an apparatus that contains specialized equipment for technical rescues. \n\nProbie ${NPname} turns up as well, just as the truck is getting ready to pull out of the bay, and the Captain lets ${NPpronoun3} grab  ${NPpronoun2} gear and jump on the truck, because you need all the help you can get.\n\n*page_break\n\nFirefighter Cohen drives the heavy rescue truck to the scene of the accident and parks at an angle so as to block traffic and protect the scene of the accident.  A police car pulls up shortly thereafter, and an officer begins setting up a more effective road block and redirecting the cars that are hoping to make the turn.\n\nThe first thing you see when you climb down out of the truck is an old station wagon half on the sidewalk. From underneath the front bumper, you can see part of a child's bicycle with the wheel still spinning from the impact. Behind the wheel of the car, an elderly woman sits pale-faced, looking shocked.\n\nThe police officer begins setting flares and redirecting traffic. You can hear the sirens of more than one ambulance closing in on the scene.  They should be here any moment. \n\n*page_break\n\nYou take a deep breath. There's a lot of work to do.\n\nWhere do you start?\n\n*fake_choice\n\t#I rush to help the elderly woman.\n\t\tThe elderly woman is the first victim you see so you hurry over to her car to assess her situation.  She looks very familiar. You have a feeling she's the lady who you see walking down the street every afternoon with her little brown fluffy dog.  What is her name again? Mrs. Watson.  That's it.\n\t\t\n\t\tSince the station wagon is an older model, there are no air bags or anything of the sort, nor does the driver look injured in any obvious way.  Gently, you open the door.  \"Mrs. Watson? It's me, ${Fname}.  I live on your street -- remember?\"\n\n\t\t*page_break\n\n\t\tShe stares at you blankly, looking confused, \"Did I hurt him?\" she asks.  \"Is he hurt?\" Her hands are shaking and her face is very pale.\n\n\t\t\"We're going to take good care of him, Mrs. Watson,\" you reassure her, kindly. \"And we're going to take care of you as well.\"  You wave over one of the EMTs from an ambulance that has just arrived on scene, and she approaches at a job, medical bag in hand.\n\n\t\t*page_break\n\n\t\tFirefighter Cohen is checking on the younger victim, crouching down low to get a glimpse of what's going on and to talk to the young victim quietly. \"He's alive!\" he declares loudly to the others. \"Semi-conscious, for now.\"\n\n\t\t*page_break\n\n\t\tIn the next moment, the Captain is issuing orders: \n\n\t\t\"McCollaugh, check under the car.  See what we're dealing with. Cohen, you and the probie start pulling the air bags and cribbing out of the truck. ${Lname}, get the chocks and wedges.  We're gonna have to create a pivot point opposite from where we have to lift, to keep the vehicle stable.\"\n\n\t#I get down on the ground to see what exactly is going on underneath the station wagon.\n\t\tYou take a few steps toward the vehicle and then lie down on your stomach so you can assess the situation.  From what you can tell, there is a child pinned under there, along with his bicycle. There is also a lot of blood. For a moment, you fear the worst, but then you hear the child groan. \n\n\t\t\"He's alive!\" you declare loudly to the others.  Then you lower your voice to be more gentle, \"Hang in there, kid,\" you say. \"We're firefighters, and we're gonna get you out of this. You're gonna be okay.\"\n\n\t\t*page_break\n\t\t\n\t\tWhen you get back on your feet, the Captain is issuing orders: \n\n\t\t\"McCollaugh, check on the driver.  Cohen, you and the probie start pulling the air bags and cribbing out of the truck. ${Lname}, get the chocks and wedges.  We're gonna have to create a pivot point opposite from where we have to lift, to keep the vehicle stable.\"\n\n\t#I wait for Captain Simmon's orders.\n\t\tAnd she is quick to delegate tasks:\n\n\t\t\"McCollaugh, check on the driver.  ${Lname}, check under the car and see what's going on.  Cohen, you and the probie start pulling the air bags and cribbing out of the truck.\"\n\n\t\tAs ordered, you take a few steps toward the vehicle and then lie down on your stomach so you can assess the situation.  From what you can tell, there is a child pinned under there, along with his bicycle. There is also a lot of blood. For a moment, you fear the worst, but then you hear the child groan. \n\n\t\t*page_break\n\n\t\t\"He's alive!\" you declare loudly to the others.  Then you lower your voice to be more gentle, \"Hang in there, kid,\" you say. \"We're firefighters, and we're gonna get you out of this. You're gonna be okay.\"\n\n\t\tWhen you get back on your feet, Captain Simmons says, \"Come with me.  We've got to get the chocks and wedges. We're gonna have to create a pivot point opposite from where we have to lift, to keep the vehicle stable.\"\n\n*page_break\n\nTwo of the EMTs tend to the elderly driver, first talking to her quietly and checking her vitals, and then they help her on a stretcher and take her away in one of the two ambulances that responded to the scene.  The rest of the EMTs wait for access to the second patient, the child who is trapped under the car.\n\nYou and the other firefighters have to give them that access.  In this case, it means you have to lift the vehicle off the victim, using rescue-lift air bags, cribbing, and wedges to support the weight of the car.  And, of course, you have to do this fast so that the child can receive medical care as quickly as possible. \n\nHowever, any wrong move could shift even more of the vehicle's weight onto the little boy you are trying to save!\n\n*page_break\n\nFor this rescue operation, McCollaugh is paired with Probie ${NPname}, Captain Simmons is paired with Cohen, and you're a team on your own.  You've been charged with setting up the pivot point opposite of where the air bags will be lifting the car.  You will use the cribbing and wedges you and the officer pulled from the heavy rescue truck.  \n\nThe cribbing consists of solid 2-foot long 4x4 pieces of wood with loops of rope on the end of each one. How do you arrange the cribbing under the car?\n\n*temp cribbing \"\"\n\n*if fire_knowledge >50\n\n\t*choice\n\t\t#Stacked carefully, one on top of the other.\n\t\t\tQuickly you place the solid pieces of wood, one on top of the other until they just about reach the underside of the station wagon. You fill in the smaller gap with a wedge and signal to the pair with the air bags that you're ready for them to start inflating them.\n\t\t\t*set cribbing \"unstable\"\n\t\t\t*goto Lift\n\t\t#Stacked to form a square.\n\t\t\tQuickly you arrange the solid pieces of wood like a square, much in the same way a child would construct a house out of log blocks, two by two, first parallel and then perpendicular to the edge of the car. This is called \"box cribbing.\" You fill in the smaller gap with a wedge and signal to the pair with the air bags that you're ready for them to start inflating them.\n\t\t\t*set fire_skills %+10\n\t\t\t*set cribbing \"stable\"\n\t\t\t*goto Lift\n\t\t#I'm not sure so I ask the Captain.\n\t\t\tYou can't quite remember what you learned in your training about setting up this sort of cribbing so you call to your officer for quick instructions.  She reminds you to use what's called \"box cribbing,\" and this is enough to jog your memory.\n\n\t\t\tQuickly you arrange the solid pieces of wood like a square, much in the same way a child would construct a house out of log blocks, two by two, first parallel and then perpendicular to the edge of the car. This is called \"box cribbing.\" You fill in the small gap at the top with a wedge and signal to the pair with the air bags that you're ready for them to start inflating them.\n\t\t\t*set fire_skills %+10\n\t\t\t*set cribbing \"stable\"\n\t\t\t*goto Lift\n\n*else\n\n\t*choice\n\t\t#Stacked carefully, one top of the other.\n\t\t\tQuickly you place the solid pieces of wood, one on top of the other until they just about reach the underside of the station wagon. Then you signal to the pair with the air bags that you're ready for them to start inflating them.\n\t\t\t*set cribbing \"unstable\"\n\t\t\t*goto Lift\n\t\t#Shoved in a pile.\n\t\t\tYou're either too nervous to get your wits together or entirely incompetent.  Whatever the reason, you create a haphazard pile of cribbing that more or less fills some of the space under the station wagon.\n\t\t\tThen you signal to the pair with the airb ags that you're ready for them to start inflating them.\n\t\t\t*set cribbing \"unstable\"\n\t\t\t*goto Lift\n\t\t#The heck if I know!\n\t\t\tYou look at the pile of cribbing and wedges and wave your arms with confusion.  \"What am I supposed to do with these things?\" you ask, rather than make a worse mess of things by trying to guess.\n\n\t\t\tIt's not a good time to discuss the pitiful fact that you have no idea what you're doing so Captain Simmons just dashes over and puts together what he calls \"box cribbing,\" explaining to you each step as she goes so that hopefully you'll know better for next time.  \n\n\t\t\tBasically, she arranges the solid pieces of wood like a square, much in the same way a child would construct a house out of log blocks, two by two, first parallel and then perpendicular to the edge of the car. Then she fills in the small gap at the top with a wedge and calls to the pair in charge of the air bags that they can start inflating them slowly.\n\t\t\t*set cribbing \"stable\"\n\t\t\t*set fire_knowledge %+10\n\t\t\t*set relationship_officers %-10\n\t\t\t*goto Lift\n\n*label Lift\n*page_break\n\nAt the signal, Firefighter Cohen begins to let air into the carefully positioned air bags.  As they inflate, Firefighter McCollaugh and Captain Simmons arrange additional cribbing to support the vehicle as it is lifted.  \n\nAlthough it feels like a small eternity, it only takes a minute or so for both the air bags to be fully inflated.  Everyone is keenly aware of the young victim trapped beneath the car and anxiously awaiting the moment when he can be pulled out and begin receiving medical attention.\n\n*page_break\n\n*if cribbing=\"stable\"\n\t*goto StableCribbing\n*elseif cribbing=\"unstable\"\n\t*goto UnstableCribbing\n\n*label StableCribbing\n\nEveryone waits with baited breath.  Although it only takes a few minutes, it seems like an eternity until the Captain calls a halt on the lift because there is now enough room for someone to fit (if barely) under the vehicle, better assess the situation, and, at the very least, try to stabilize the boy's neck.\n\n*page_break\n\nYou are given the task.  Quickly, with a flashlight in hand, you get down on your stomach and slither into the confined space to better see what's going on.  \n\n\"Hey there,\" you say, gently and conversationally to the poor child as you're assessing his situation. \"My name is ${Fname}. What's your name?\"\n\nThe boy isn't conscious enough to reply, but you think you hear a tiny groan. \n\n*page_break\n\nOne thing you can immediately see is that the child wasn't wearing a helmet, and, consequently, he very likely has part of his skull crushed against the street. You can see numerous abrasions from being dragged over the asphalt, and there is quite a bit of blood on the ground.  Additionally, the child's left leg seems to be tangled up in the mangled frame of his bicycle.  He looks pretty bad, but he is still breathing and clinging to life.\n\n*page_break\n\nWhile you are noting all these important details, you notice the strong smell of gasoline and trace it to a slow leak of dark liquid from the gas tank. \"Crap,\" you say, under your breath and with feeling.\n\nWhat, if anything, do you do about it?\n*temp gasleak \"\"\n\n*choice\n\t#I know now that speed is more important than ever. We have to get the kid out ASAP.\n\t\tSince any spark has the potential to ignite the fumes from the gasoline on fire and make a bad situation even worse, you know it has just become even more important to get the boy out to a safer location as a priority, even if it means you don't have time to stabilize his injuries as much as would be ideal.\n\n\t\tQuickly, you hold your hands carefully on either side of the patients head with your thumbs along his jaw and your fingers holding the back of his head to keep it stable.  Then you call over Firefighter McCollaugh who is able to reach in and apply a cervical collar. \n\t\t*set gasleak \"ignore\"\n\t\t*goto SpeedExtrication\n\t#I call for the probie to bring some sand and a broom over ASAP.\n\t\tYou call for some sand and a broom and Probie ${NPname} is quick to bring them over. Then you instruct ${NPpronoun3} to use the broom to push some sand under the car in a manner that creates a dam and will protect both the patient and  yourself from getting contaminated with the flammable liquid.\n\n\t\tWhile the probie is doing this, you hold your hands carefully on either side of the patients head with your thumbs along his jaw and your fingers holding the back of his head to keep it stable.  Then you call over Firefighter McCollaugh who is able to reach in and apply a cervical collar. \n\n\t\tCaptain Simmons watches approvingly and orders Firefighter Cohen to retrieve the foam extinguisher and have it on hand, just in case!\n\t\t*set leadership %+20\n\t\t*goto Extrication\n\t#I tell Captain Simmons.\n\t\tYou report the gas leak to the Captain, and she immediately calls for Probie ${NPname} to bring over some sand and a broom from the truck. Then she instructs ${NPpronoun3} to use the broom to push some sand under the car in a manner that creates a dam and will protect both the patient and yourself from getting contaminated with the flammable liquid.\n\n\t\tWhile the probie is doing this, you hold your hands carefully on either side of the patients head with your thumbs along his jaw and your fingers holding the back of his head to keep it stable.  Then you call over Firefighter McCollaugh who is able to reach in and apply a cervical collar.\n\n\t\tJust to be extra careful, Captain Simmons orders Firefighter Cohen to retrieve the foam extinguisher and have it on hand.\n\t\t*set fire_knowledge %+10\n\t\t*goto Extrication\n\t#This changes nothing. \n\t\tCertainly, a gas leak can be serious, but the real priority here is to focus on getting the poor kid out from under the car and not be side-tracked by everything that could possibly go wrong.\n\n\t\tYou hold your hands carefully on either side of the patients head with your thumbs along his jaw and your fingers holding the back of his head to keep it stable.  Then you call over Firefighter McCollaugh who is able to reach in and apply a cervical collar.\n\t\t*set gasleak \"ignore\"\n\t\t*goto Extrication\n\n*label Extrication\n*page_break\n\nSo the next problem in the fact that the boy's leg is caught up in the metal spokes of his bicycle's wheel. The bicycle is wedged up pretty good into the undercarriage of the car so you will have to find a way to get the boy free.  \n\n*goto Spokes\n\n*label Spokes\n\nYour reasonable options would be either to cut the metal spokes with a tool or try to simply pry the spokes further apart using brute strength.\n\nWhich do you choose?\n\n*choice\n\t#A tool would be more efficient.\n\n\t\tThe most straightforward course of action would be to use cutters to remove enough of the metal so that the patient can be moved from underneath the car. \n\n\t\t*goto Cutters\n\n\t\t\n\t#My two hands would be safer.\n\t\tRather than risk using a metal tool that could potentially cause further harm to the fragile victim or, goodness forbid, create a spark that causes problems with that gasoline that's leaking, you choose to use brute force to try to pry the spokes of the wheel far enough apart that you can untangle the boy's leg.\n\n\t\t*if strength >60\n\n\t\t\tSo you get a good grip on the spokes, take a deep breath, and pull!\n\n\t\t\t*page_break\n\n\t\t\tIt takes a good amount of effort, but soon you have spread the spokes far enough apart that you have just enough space to slide the boy's leg free.\n\n\t\t\tYou notify the others, and they are able to very carefully move the boy out from under the vehicle and onto a backboard to stabilize his spine. \n\n\t\t\tAt this point, the EMTs take over and the police officer finishes writing notes for his report.  You and the other firefighters can finally take a deep breath, get a bottle of water, and then go about cleaning up your equipment from the scene so that a tow truck can remove the station wagon and the road can once again be open to traffic. \n\n\t\t\tCaptain Simmons commends you and the others for a job well done.\n\n\t\t\t*set relationship_officers %+10\n\t\t\t*set relationship_firefighters %+10\n\t\t\t*set fire_skills %+10\n\t\t\t*goto WorkConsequences\n\n\t\t*else\n\t\t\tSo you get a good grip on the spokes, take a deep breath, and pull! \n\n\t\t\t*page_break\n\n\t\t\tBut, try as you might, it doesn't work. After three solid attempts, your arm muscles are trembling, and you're forced to admit you need another plan.  \n\n\t\t\tYou know time is important so you decide to take a chance using a tool, so you call out to request the appropriate one.\n\n\t\t\t*goto Cutters\n\n\n*label Cutters\n\nSomeone passes you the metal cutters.  You take a deep breathe and try to keep your hands steady as you find what you feel would be a good place to make the first cut.  \"We'll have you out of here in no time,\" you reassure your patient as you apply pressure to slice through the twisted metal.\n\n*page_break\n*temp injured \"\"\n\n*if gasleak=\"ignore\"\n\tUnfortunately, the metal blades of the cutters create a spark as they strike the metal spokes of the bicycle wheel. And that spark is enough to set the fumes from the leaking gas aflame. If only you hadn't ignored the flammable liquid. \n\n\tYou scream as the air around you ignites.\n\n\t*page_break\n\n\tStrong hands yank you out from under the vehicle even before you are finished crying out for help.  EMTs rush in to assist you.  Luckily, you were wearing full PPE (personal protective equipment) so the burns are limited to your face. You are transported right away to the nearest hospital for treatment.  \n\n\tWhile your injuries are not as bad as they could have been, you still spend 2 weeks on medical leave. You learn from Captain Simmons that they had been able to save the young boy as well.  He most likely lost his foot because he had to be dragged out from under the station wagon so suddenly, and , as you suspected, he had suffered serious head injuries as well. \n\n\t*page_break \n\n\tYou also learn that the entire fire department got together that next training night to discuss what could have been done better during that incident, specifically in regard to how a gasoline leak should never be ignored. Although you eventually make a full recovery,  it was an all around difficult experience. You do make it a point to thank Captain Simmons for saving your life.\n\n\t*set injured \"yes\"\n\t*set fire_knowledge %+10\n\t*set leadership %-20\n\t*goto WorkConsequences\n\n*else\n\n\tYou make one cut and then a second. Soon you are able to free the boy's leg.  You notify the others, and they are able to very carefully move the boy out from under the vehicle and onto a backboard to stabilize his spine. \n\n\tAt this point, the EMTs take over and the police officer finishes writing notes for his report.  You and the other firefighters can finally take a deep breath, get a bottle of water, and then go about cleaning up your equipment from the scene so that a tow truck can remove the station wagon and the road can once again be open to traffic. \n\n\tCaptain Simmons commends you and the others for a job well done.\n\n\t*set relationship_officers %+10\n\t*set relationship_firefighters %+10\n\t*set relationship_NP +10\n\t*set fire_skills %+10\n\t*page_break\n\t*goto WorkConsequences\n\n\n*label SpeedExtrication\n\n*page_break \t\n\n\"We've got to get this kid out of here, ASAP,\" you tell McCollaugh with some urgency. \"It's pretty bad under here,\" you state, without being overly specific.\n\nOne major obstacle you see in removing the patient is the fact that the boy's leg is caught up in the metal spokes of his bicycle's wheel.\n\nIs it more important to just pull him out quickly, risking a serious leg injury, or will you take some few precious moments to try to get him free?\n\n*choice\n\t#Better a leg injury than burned. I get him out of there now!\n\t\tYou make the decision that you just have to get the little boy out of there before the situation gets worse. You make the call, and you tell the others who help you pull the child out on the count of three:\n\n\t\tONE, TWO, THREE!\n\n\t\t*page_break\n\n\t\tYou push gently.  Two others pull. Shortly thereafter, you have the boy out. He's being placed on a backboard, and the EMTs have gathered around him to begin taking vitals and stabilizing him for transport.\n\n\t\tThe child has a serious head injury, possible spinal damage, and his foot looks pretty mangled. He may well lose it.  If he survives, his recovery will be long and difficult.\n\n\t\t*page_break\n\n\t\tIt's a tough alarm to begin the day.  You and the others work on cleaning up the fuel leak and packing up your equipment so the tow truck can come remove the station wagon and the road can once again be open to traffic.\n\t\t*set leadership %+10\n\t\t*set childinjury \"footloss\"\n\t\t*goto WorkConsequences\n\n\t#It's worth a few moments to try to save the boy's leg.\n\t\t*goto Spokes\n\n*page_break\n\n*label UnstableCribbing\n\nAs the air bags slowly lift the car from atop the victim, more weight is placed upon the pivot point you constructed.  As you keep an eye on your cribbing, you are suddenly strongly suspect that it's not as stable as it should be.  You're not quite sure it will hold the weight of the station wagon.\n\nDo you say something to that end?\n\n*choice\n\t#Of course I do!\n\t\t\"Halt!\" you call loudly, causing the lift operation to pause. \"This pivot point's not going to work,\" you explain to Captain Simmons when she jogs over to see what's going on.\n\n\t\t\"Did you expect it to?\" she asks you with one eyebrow raised.  \"McCollaugh, get over here and show ${Lname} how it's done.\"\n\n\t\t*page_break\n\n\t\tYou watch carefully as Firefighter McCollaugh reconstructs a proper pivot point out of box cribbing.  This means he arranges the solid pieces of wood like a square, much in the same way a child would construct a house out of log blocks, two by two, first parallel and then perpendicular to the edge of the car. He uses a couple of the wedges to securely fill in the small gap between the top of the cribbing and the bottom of the car.\n\n\t\tWhen he is done, the Captain gives the signal for the lift operation to continue.\n\t\t*set relationship_officers %-20\n\t\t*set fire_knowledge %+10\n\t\t*goto StableCribbing\n\n\t#Nah.  It will probably be fine.\n\t\tWhat's the worst that can happen -- right?  You don't want to ask for help and risk the Captain thinking you're an idiot.\n\n\t\t*page_break\n\n\t\tSo instead you prove to the Captain that you're an idiot. Once the station wagon is lifted to the point that some of the weight should rest on your shabbily constructed cribbing, the heavy wooden blocks simply topple under pressure, with a clatter loud enough to make you wince.\n\n\t\t\"What the hell?\" Captain Simmons yells as she runs over to assess the situation grimly.  \"Really, ${Lname}?  Did you really expect this to turn out well? You better hope you didn't just further injure out patient. McCollaugh, get over here and show ${Lname} how it's done.\"\n\n\t\t*page_break\n\n\t\tYou watch carefully as Firefighter McCollaugh reconstructs a proper pivot point out of box cribbing.  This means he arranges the solid pieces of wood like a square, much in the same way a child would construct a house out of log blocks, two by two, first parallel and then perpendicular to the edge of the car. He uses a couple of the wedges to securely fill in the small gap between the top of the cribbing and the bottom of the car.\n\n\t\tWhen he is done, the Captain gives the signal for the lift operation to continue.\n\n\t\t*set relationship_officers %-40\n\t\t*set fire_knowledge %+10\n\t\t*goto StableCribbing\n\n\n*label WorkConsequences\n\n*if injured=\"yes\"\n\t*goto MissedWork\n\n*else\n\n\t*if career=\"construction\"\n\n\t\tSo, needless to say, you are late for work.  You don't manage to show up until almost noon.  Plus, by the time you arrive at the work site, you are already pretty exhausted.\n\n\t\t*page_break\n\n\t\tIt's not like your supervisor isn't understanding about your emergency services work.  He can hardly get mad at you for taking a few hours out of your day to save a child's life, after all.  But the project is going to suffer further delays for your absence and, even though nobody blames you for doing what you do, everyone on your team is going to be penalized because of it.\n\n\t\tIt looks like you'll all be working through the weekend.\n\n\t\t*page_break\n\n\t\tHowever, it turns out that the child you helped save was your coworker Jonathan's stepson.  Some time after the accident, he pulled you aside to thank you personally for your part in helping the boy.\n\n\t\t*page_break\n\n\t\t*if childinjury = \"footloss\"\n\t\t\t\"Brian's going to be okay,\" Jonathan tells you, looking only partially convinced. \"They're trying to save his foot, but it looks like they might have to amputate. And his brain was bleeding pretty badly; he had to have surgery. That went very well, they said. He's talking again, thankfully, forming whole sentences now, and he recognizes his parents and such, which is good.\n\n\t\t\t\"Would you know I bought him three different helmets?  The stubborn boy always takes them off right after he gets on his bike, right after he's' out of my sight.  In any case, thank you,\" he says, offering his hand to shake. \"Without your help, this could have been so much worse.\"\n\t\t\t*finish\n\t\t\t\n\t\t*else\n\t\t\t\"Brian's going to be okay,\" Jonathan tells you, looking only partially convinced. \"His brain was bleeding pretty badly; he had to have surgery. That went very well, they said. He's talking aga n boy always took them off right after he got on his bike, right after I stopped looking.  In any case, thank you,\" she says, offering her hand to shake. \"Without your help, this could have been so much worse.\"\n\t\t\t*finish\n\n\t\t*else\n\t\t\t\"Brian's going to be okay,\" Theresa tells you, looking concerned nevertheless. \"His brain was bleeding pretty badly; he had to have surgery. That went very well, they said. He's talking again, thankfully, forming whole sentences now, and he recognizes his parents and such, which is good. \n\n\t\t\t\"Would you know I bought him three different helmets?  The stubborn boy always took them off right after he got on his bike, right after I stopped looking.  In any case, thank you,\" she says, offering her hand to shake. \"Without your help, this could have been so much worse.\"\n\t\t\t*finish\n\n\t*elseif career=\"dispatcher\"\n\n\t\tSo, needless to say, you are late for work.  You don't manage to show up until almost noon.  Plus, by the time you arrive at the call center, you are already exhausted. \n\n\t\t*page_break\n\n\t\tYour supervisor is furious. He had to call in another dispatcher to take over your shift, and you are put on notice.  911 Dispatchers are an essential part of emergency services. If you're this late for work again without even calling in about it, regardless of the reason, you'll have to be let go.\n\n\t\t*page_break\n\n\t\tHowever, it turns out that the child you helped save was your coworker Jonathan's stepson.  Some time after the accident, he pulled you aside to thank you personally for your part in helping the boy.\n\n\t\t*page_break\n\n\t\t*if childinjury = \"footloss\"\n\t\t\t\"Brian's going to be okay,\" Jonathan tells you, looking only partially convinced. \"They're trying to save his foot, but it looks like they might have to amputate. And his brain was bleeding pretty badly; he had to have surgery. That went very well, they said. He's talking again, thankfully, forming whole sentences now, and he recognizes his parents and such, which is good.\n\n\t\t\t\"Would you know I bought him three different helmets?  The stubborn boy always took them off right after he got on his bike, right after he was out of my sight.  In any case, thank you,\" he says, offering his hand to shake. \"Without your help, this could have been so much worse.\"\n\t\t\t*finish\n\n\t\t*else\n\t\t\t\"Brian's going to be okay,\" Jonathan tells you, looking only partially convinced. \"His brain was bleeding pretty badly; he had to have surgery. That went very well, they said. He's talking again, thankfully, forming whole sentences now, and he recognizes his parents and such, which is good. \n\n\t\t\t\"Would you know I bought him three different helmets?  The stubborn boy always took them off right after he got on his bike, right after I stopped looking.  In any case, thank you,\" he says, offering his hand to shake. \"Without your help, this could have been so much worse.\"\n\t\t\t*finish\n\n\n\t*elseif career=\"teacher\"\n\n\t\tSo, needless to say, you are late for work.  You don't manage to show up until almost noon.  Plus, by the time you arrive at the school, you are already exhausted.\n\t\tFortunately for you, you have some of the most wonderful and supportive coworkers and administrative staff around.  \n\n\t\tOne of the other teachers had noticed the car crash and road block on the way to work. When you didn't show up when you said you were going to, they figured you were busy responding to the emergency and let the staff know.  \n\n\t\t*page_break\n\n\t\tWithout missing a beat, one of the vice principals had come in to set up your classroom and get your students started with their exam.  Everything went smoothly, and, when you finally showed up, a lot of your coworkers took a moment to thank you for your service to the community.  \n\n\t\tIt turns out that the child you helped save was the principal's stepson, Brian.  He called you into his office some weeks later to thank you p
