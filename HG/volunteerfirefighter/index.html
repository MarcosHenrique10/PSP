 the accomplishments of the actual award winner. This firefighter has been a delight, ever since she joined the department.  She is a dedicated firefighter who takes the job very seriously, and her positive attitude and cheerful demeanour has improved everyone's morale.  I'm sure everyone will join me in a warm round of applause for Firefighter of the Year: Gina Zlenko!\"\n\t*page_break\n\n\tZlenko jumps up from her chair so quickly that she accidently knocks it backwards.  She jumps up and down and then skips her way to the podium to the sound of everyone's applause.  Happily, she shakes Chief Gordon's hand and receives her engraved plaque.  After blowing a few kisses to the room, she hurries back to her seat, smiling from ear to ear.\n\n\t*page_break\n\n\t*goto Party\n\t\n*elseif (relationship_officers >= 85) and (relationship_firefighters > 60)\n\n\t*set award 1\n\t*set award_name \"ffyear\"\n\t*set relationship_firefighters %+10\n\n\t\"Now, ${pronoun1} hasn't been a firefighter for more than a couple years now, but, even so, ${pronoun1} has been an invaluable member of our team, dedicated, contributing however possible, and an all-around good person to have around.  I'm proud to announce this years Firefighter of the Year to be ${Fname} ${Lname}!\"\n\n\t*goto AcceptAward\n\n*else\n\n\t\"Now, the winner of this year's award has been a delight, ever since she joined the department.  She is a dedicated firefighter who takes the job very seriously, and her positive attitude and cheerful demeanour has improved everyone's morale.  I'm sure everyone will join me in a warm round of applause for Firefighter of the Year: Gina Zlenko!\"\n\n\tZlenko jumps up from her chair so quickly that she accidently knocks it backwards.  She jumps up and down and then skips her way to the podium to the sound of everyone's applause.  Happily, she shakes Chief Gordon's hand and receives her engraved plaque.  After blowing a few kisses to the room, she hurries back to her seat, smiling from ear to ear.\n\n\t*goto Party\n\n\n*label Party\n\nOnce the speeches and awards are over, the rest of the evening involves delicious food and dancing.  \n\nWhich menu option do you choose?\n*fake_choice\n\t#The steak.\n\t\tAn excellent choice!  Your prime rib steak is perfectly cooked and mouth-wateringly delicious, served with a side of steamed veggies and a baked potato.\n\t#The salmon.\n\t\tGood choice!  Your salmon is served with a honey glaze sauce and is absolutely delicious, served with a side of steamed squash and rice pilaf.\n\t#The vegetarian stir-fry.\n\t\tNice choice!  The stir-fry is a delicious mix of tofu and Chinese vegetables served on a bed of brown rice.  You enjoy it very much!\n\n*page_break\n\nAfter dinner, you enjoy a desert buffet with an ice cream bar, fresh fruit, a hundred kinds of cookies, cake, and pie.  It's really spectacular!\n\n*if SO\n\tWhen the lights dim and the DJ turns up the music, you sweep ${SOname} into your arms and onto the dance floor to dance the night away.\n\t*goto Party2\n*else\n\tWhen the lights dim and the DJ turns up the music, you hit the dance floor with a group of other people to dance the night away.\n\t*goto Party2\n\n\n\n*label Party2\n*page_break\n\n*if relationship_firefighters >=70\n\tYou're with a great group of people, some of the best you've known.  It feels so wonderful to be such an accepted member of the community.  You have a great time at the party, dancing and laughing and making some new happy memories. \n\t*goto Party3 \n\n*elseif (relationship_firefighters  >= 50) and (relationship_firefighters \u003c 69)\n\tYou're with a good group of people, and you get along pretty well with just about all of them.  You have a wonderful time at the party, dancing and laughing and making some new happy memories together.\n\t*goto Party3\n\n*elseif (relationship_firefighters \u003c 49)\n\tYou haven't really become particularly close with anyone else in the fire department. In fact, through the evening, you find yourself occasionally having to ask people to remind you of their name.  Still, you manage to have a pretty good time evening.\n\t*goto Party3\n\n\n*label Party3\n*page_break\n\n*if (award = 1)\n\t*goto AwardReflection\n*else\n\t*goto NoAwardReflection\n\n\n*label AwardReflection\n*if award_name = \"leadership\"\n\tAnd one of the best parts is that you were given an award for leadership skills in acknowledgment of a talent you didn't even realize you had!  Now more than one person is encouraging you to run for lieutenant of your company in the next few years, which is extremely flattering.  After a couple years, a lieutenant will often run for company captain, and, a couple years after that, second assistant chief! \n\n\tWould that be something you would seriously consider?  Only time will tell! But one thing is for certain: despite the numerous challenges, you've had a brilliant start to your firefighting career. \n\n\tYou are very much looking forward to continuing to be a volunteer firefighter for many years to come.  But this is the end of our story for today.\n\t\n\t*goto ending\n\t\n*elseif award_name = \"dedication\"\n\tAnd one of the best parts is that you were given an award in appreciation for your dedication to the volunteer fire service.  \n\tYou find it incredibly inspiring to be acknowledged in this manner and, despite numerous obstacles, you feel as if you've had a fairly brilliant start to your firefighting career. \n\n\tYou are very much looking forward to continuing to be a volunteer firefighter for many years to come. But this is the end of our story for today.\n\t*goto ending\n*else\n\tAnd one of the best parts is that you were named Firefighter of the Year!  This is an incredible honor.   \n\n\tYou find it inspiring to be acknowledged in this manner and, despite numerous obstacles, you feel as if you've had a fairly brilliant start to your firefighting career. \n\n\tYou are very much looking forward to continuing to be a volunteer firefighter for many years to come. But this is the end of our story for today.\n\t*goto ending\n\n*label NoAwardReflection\n\nYou may not have won any awards this year, but there's a sense of accomplishment nevertheless.  You are part of something bigger than yourself, and organization dedicated to the service of the community.  You are doing good work.  \n\nCertainly, you have a lot to learn and a lot of experience yet to be gained, but you are very much looking forward to continuing to be a volunteer firefighter for many years to come. But this is the end of our story for today.\n\n*label ending\n*page_break End\nWe hope you've enjoyed playing [i]The Volunteer Firefighter.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing! Why not try again and see what happens when you make some different choices?\n*ending\n", "choicescript_description": "An action-packed firefighting game, filled with humor, heartache, adventure, and romance!  Fight fires! Save lives! Do you have what it takes to be a hero?\n\n[i]The Volunteer Firefighter[/i] is an epic 130,000-word interactive fantasy novel by Stefanie Handshaw, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.", "choicescript_stats": "\n*if name_set \n\t${Fname} ${Lname}\n\t*goto Company\n*else\n\t[i](Character Name Pending)[/i]\n\t*goto Company\n\n\n*label Company\n*line_break\n*if company_set\n\t${fullcompany} \n\t*goto FD\n*else \n\t[i](Company Choice Pending)[/i]\n\t*goto FD\n\n\n*label FD\n*line_break\n$!{town_name} Fire Department\n*line_break\n*if career_set\n\t*if career=\"construction\" \n\t\tCareer: Construction Worker\n\t\t*goto Next\n\t*elseif career=\"lawyer\"\n\t\tCareer: Lawyer\n\t\t*goto Next\n\t*elseif career=\"dispatcher\"\n\t\tCareer: Emergency Dispatcher\n\t\t*goto Next\n\t*elseif career=\"teacher\"\n\t\tCareer: Middle School Teacher\n\t\t*goto Next\n\t*elseif career=\"engineer\"\n\t\tCareer: Mechanical Engineer\n\t\t*goto Next\n\n*label Next\n\n*stat_chart\n\t\n\tpercent Strength\n\tpercent Leadership  \n\tpercent fire_knowledge Fire Knowledge\n\tpercent fire_skills Fire Skills\n\tpercent relationship_officers Standing with Officers\n\tpercent relationship_firefighters Standing with Firefighters\n\n*if SO\n\t*stat_chart\n\t\t\n\t\tpercent relationship_SO Relationship with SO\n\n*if SO\n\t*stat_chart\n\t\ttext SOname SO's Name\n\n*if cat\n\t*stat_chart\n\t\ttext catname Cat's Name\n\n*stat_chart\n\ttext responses Emergency Responses (out of 6)\n\ttext warning Warnings\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game.\n\n  *purchase adfree $4.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*set Fname \"Marvin\"\n*set Lname \"Grumpsalot\"\n*set name_set true\n*set fullcompany \"Engine Company\"\n*set company_set true\n*set town_name \"Littleton\"\n*set career \"construction\"\n*set career_set true\n*set strength 70\n*set leadership 35\n*set fire_knowledge 50\n*set relationship_officers 40\n*set relationship_firefighters 50\n*set SO true\n*set SOname \"David\"\n*set relationship_SO 60\n*set responses 1\n*set warning 0\n\nAs with all new probies, the first few weeks were rough.  You found whipped cream in your boots, flour in your helmet, and had been sent on a tiresome number of quests to fetch non-existent equipment, such as the \"left-handed screwdriver,\" the \"water hammer,\" and your personal favorite: the \"hose stretcher.\"\n\nOne evening you were just about to head home after a long evening at the fire house, you opened your locker to stash some of your gear only to find that someone had stuffed it with what seemed like a billion packing peanuts that spilled out all over the floor.  What a pain!  \n\nHow did you deal with that, Probie?\n\n*fake_choice\n\t#I cleaned it up, just like a good probie.\n\t#To heck with it.  I left it there!\n\t#Oh, I cleaned it up.  But I also plotted revenge.\n\n*script changeBackgroundColor(\"black\")\n\n*set Fname \"Chris\"\n*set Lname \"Sullivan\"\n*set name_set true\n*set fullcompany \"Engine Company\"\n*set company_set true\n*set town_name \"Eureka\"\n*set career \"engineer\"\n*set career_set true\n*set strength 60\n*set leadership 40\n*set fire_knowledge 65\n*set relationship_officers 50\n*set relationship_firefighters 50\n*set SO false\n*set responses 1\n*set warning 0\n\nUgly black smoke pours from the side of a two-story dwelling just down the street from the house where you grew up. The acrid smell of fire is powerful and harsh.  You are a member of the engine company, which means it's your company's job to set up the hoseline and get water on that fire. \n\n\"Take the nozzle!\" the officer shouts, indicating for you to be at the front of the attack line, with the others there to back you up.  You've only ever been the nozzleman twice before and never for a structure fire.  \n\nHow do you feel about it now?\n\n*fake_choice\n\t#Heck yeah!  This is the chance I've been waiting for!\n\t#I'm nervous, but this is a good opportunity for me to gain experience.\n\t#Hell no!  I'm still just learning the ropes.  If I mess up, someone could really get hurt!\n\n*script changeBackgroundColor(\"sepia\")\n\n\n*set Fname \"Jane\"\n*set Lname \"Doe\"\n*set name_set true\n*set fullcompany \"Truck Company\"\n*set company_set true\n*set town_name \"Small Town\"\n*set career \"teacher\"\n*set career_set true\n*set strength 50\n*set leadership 60\n*set fire_knowledge 55\n*set relationship_officers 40\n*set relationship_firefighters 75\n*set SO true\n*set SOname \"Jeremy\"\n*set relationship_SO 80\n*set responses 3\n*set warning 1\n\n\n\nAfter celebrating your anniversary at a fancy restaurant, you and your significant other are both feeling pretty good when you get back to your house. You kiss him with feeling. He kisses you back with desire.  Soon you have your back to the wall, pressed up against each other.  Breathless, you slip your hands up under his shirt, brushing fingertips along his skin. You can feel how he reacts to your touch.  Of course, this is the moment that your pager starts blaring out the tones of an emergency:\n\n\"SMALLTOWN FIRE DEPARTMENT, YOU HAVE AN AUTOMATIC FIRE ALARM AT DOWNTOWN DONUTS, 139 MAIN STREET. TIME NOW IS 2213.\"\n\nDo you respond on the call?\n\n*fake_choice\n\t#Yes, of course. I have to.\n\t#No way! Are you kidding me?\n\n\n\n\n*set Fname \"Andy\"\n*set Lname \"Myers\"\n*set name_set true\n*set fullcompany \"Engine Company\"\n*set town_name \"Small Town\"\n*set career \"lawyer\"\n*set career_set true\n*set strength 50\n*set leadership 60\n*set fire_knowledge 50\n*set relationship_officers 55\n*set relationship_firefighters 65\n*set SO true\n*set SOname \"Jo\"\n*set relationship_SO 75\n*set responses 2\n*set warning 1\n\n\n\n\"We've got to get this kid out of here, ASAP,\" you tell Firefighter McCollaugh with some urgency, regarding the child who is trapped underneath a car. A gasoline leak makes the situation all the more urgent.  One major obstacle you see in removing the patient is the fact that the boy's leg is caught up in the metal spokes of his bicycle's wheel.\n\nIs it more important to just pull the child out quickly from underneath the car, risking a serious leg injury, or will you take some extra time to try to get his leg free and risk a spark igniting the gas?\n\n*fake_choice\n\n\t#Better a leg injury than seriously burned. I get him out of there now!\n\t#It's worth a few moments to try to save the boy's leg.\n\n\n\n*set Fname \"Katherine\"\n*set Lname \"Smith\"\n*set name_set true\n*set fullcompany \"Truck Company\"\n*set company_set true\n*set town_name \"Hamilton\"\n*set career \"dispatcher\"\n*set career_set true\n*set strength 45\n*set leadership 60\n*set fire_knowledge 70\n*set relationship_officers 60\n*set relationship_firefighters 60\n*set SO true\n*set SOname \"Alexa\"\n*set relationship_SO 80\n*set responses 4\n*set warning 2\n*set cat true\n*set catname \"Fuzzy\"\n\n\nYou perform a quick search of the room.  From the number of toys and the crib present, you know this must be a nursery.  It also helps that you can follow the sound of the PASS alarm until you feel Velez's boot and then the rest of him, lying prone on the floor. You shake your mentor gently. \"Velez!\" you call, but he doesn't move or respond in any way. The temperature is rising in the room, and conditions are deteriorating rapidly. You can see places on the wall between two rooms that are orange with flame.  You don't have much time.\n\nWhat do you do?\n\n*fake_choice\n\t#Break the window to let some smoke out and provide a path for escape.\n\t#Use Velez's axe and halligan to break through the non-burning wall to a hopefully safer place.\n\t#Use my water can to lower the temperature in the room and buy us more time.\n\t#Pray.\n\n\n\n*set Fname \"Sebastian\"\n*set Lname \"Dubois\"\n*set name_set true\n*set fullcompany \"Engine Company\"\n*set company_set true\n*set town_name \"Eureka\"\n*set career \"teacher\"\n*set career_set true\n*set strength 40\n*set leadership 50\n*set fire_knowledge 65\n*set relationship_officers 45\n*set relationship_firefighters 5\n*set SO true\n*set SOname \"Kate\"\n*set relationship_SO 65\n*set responses 4\n*set warning 0\n*set cat true\n*set catname \"Alfred\"\n\nAfter the convention hall is closed for the evening, you and the other attendees from your fire department (and accompanying significant others) all head to an Italian restaurant to hang out, discuss the day's events, and generally have a good time.  Afterwards, Gina Zlenko, Damon Warner, and Chief Rob Kalinowski all want to check out some of the local nightlife. They invite you along.\n\nWhat do you choose to do with your evening?\n\n*fake_choice\n\t#I go hang out with the gang and enjoy city nightlife!\n\t#I plan a romantic evening in the hotel room with Kate.\n\t#I discuss the options with Kate.\n\t#It's been a long day. I head back to my hotel room.\n\n", "startup": "*title The Volunteer Firefighter\n*author Stefanie Handshaw\n\n*scene_list\n  startup\n  02probie\n  03firstalarm\n  $ 04culture\n  $ 05oneyearlater\n  $ 06vehiclepedestrian\n  $ 07littletots\n  $ 08downtowndonuts\n  $ 09relationships\n  $ 10kittenconvention\n  $ 11bigfire\n  $ 12afterfire\n  $ 13awardparty\n\n*create name_set false\n*create Fname \"\"\n*create Lname \"\"\n*create gender \"\"\n*create pronoun1 \"\"\n*create pronoun2 \"\"\n*create pronoun3 \"\"\n\n*create town_name \"\"\n\n*create SO false\n*create SOgender \"\"\n*comment SOgender=male, female, neutral\n*create SOpronoun1 \"\"\n*create SOpronoun2 \"\"\n*create SOpronoun3 \"\"\n*create SOname \"\"\n*create SOfeeling \"\"\n*comment SO feeling=encouraging, worriedtime, worriedrespectful, terrified\n\n\n*create Dgender \"\"\n*comment Dgender=male, female, neutral\n*create Dname \"\"\n*create Dpronoun1 \"\"\n*create Dpronoun2 \"\"\n*create Dpronoun3 \"\"\n\n*create NPgender \"\"\n*comment NPgender=male, female, neutral\n*create NPname \"\"\n*create NPFname \"\"\n*create NPpronoun1 \"\"\n*create NPpronoun2 \"\"\n*create NPpronoun3 \"\"\n*create relationship_NP 0\n*create ProbieAwkward false\n*create ProbieSO false\n*create probie_breakup false\n*create EXname \"\"\n\n*create company_set false\n*create company \"\"\n*comment company=Truck or Engine\n*create fullcompany \"\"\n*create strength 50\n*create fire_knowledge 20\n*create fire_skills 20\n*create leadership 50\n*create relationship_firefighters 50\n*create relationship_officers 50\n*create relationship_SO 0\n\n*create responses 0\n*comment responses = Number of calls out of 6\n*create warning 0\n*create suspended false\n*create motivation \"\"\n*comment motivation = tradition, grudging, service, or hero\n*create career_set false\n*create career \"\"\n*comment career = teacher, engineer, dispatcher, lawyer, construction\n\n*create SchmidtDead false\n*create fitnessbuff true\n*create SOfight false\n*create fiance false\n*create nicebreakup false\n\n*create cat false\n*create catname \"\"\n*create catgender \"\"\n*create Cpronoun1 \"\"\n*create Cpronoun2 \"\"\n*create Cpronoun3 \"\"\n\n*create flashovertraining false\n*create probie_fire false\n\n\n\n\n*comment The following attributes are associated with \"11bigfire\" and the effects thereafter.\n*create teenager_dead false\n*create teenager_alive false\n*create saved_RIT false\n*create saved_by_RIT false\n*create saved_by_hoset false\n*create nearly_died false\n*create delay_water_can false\n*create hospitalized false\n*create velez_rescue false\n*create do_nothing false\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  An action-packed firefighting game, filled with humor, heartache, adventure, and romance!  Fight fires! Save lives! Do you have what it takes to be a hero?\n\n  [i]The Volunteer Firefighter[/i] is an epic 130,000-word interactive fantasy novel by Stefanie Handshaw, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n  [i]You can play the first three chapters of the game for free. Purchase the rest of the game below.[/i]\n  *if choice_is_advertising_supported\n    [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n  *purchase adfree $4.99 purchased\n  *if choice_is_advertising_supported\n    *page_break_advertisement\n  *if not(choice_is_advertising_supported)\n    *page_break Play Now for Free\n\n\n*label purchased\n\n\n*temp position\n\nChoose a town name:\n*choice\n  #Small Town\n      *set town_name \"Small Town\"\n      *goto Pager\n  #Eureka\n      *set town_name \"Eureka\"\n      *goto Pager\n  #Littleton\n      *set town_name \"Littleton\"\n      *goto Pager\n  #None of the above.\n      *goto TownNameText\n\n*label TownNameText\nOkay!  Type in a town name here:\n*input_text town_name\n*comment capitalization check\n*if (\"${town_name}\" != \"$!{town_name}\")\n  *set town_name \"$!{town_name}\"\n  *goto Pager\n\n*label Pager\n\n\"$!!{town_name} FIRE DEPARTMENT, YOU HAVE A REPORTED STRUCTURE FIRE AT 39 MAPLE AVENUE. REPEATING FOR $!!{town_name} FIRE DEPARTMENT: YOU HAVE A REPORTED STRUCTURE FIRE AT 39 MAPLE AVENUE. TIME NOW IS 0248.\"\n\nIt's 2:48 am. You awaken with a start.  Your emergency pager has been activated, and  blaring tones precede the announcement of a structure fire.  It's time to spring into action!\n\n*page_break\n\nYou're still half asleep as you stumble out of your warm, comfortable bed.   Blearily, you rub your eyes and try to force yourself from dreams into reality.  You throw on some jeans and a sweatshirt, slip on some shoes, and jump in your car to drive quickly to the nearby firehouse.\n\n*page_break  \n\nOnce there, you take your gear from the rack.  You swiftly slip out of your shoes, step into the thick fire boots, and pull the thick black bunker pants up until you can secure them with bright red suspenders. Then you pull on the padded jacket, fastening the clasps with one hand as you grab your helmet with the other. \n\nYou are just in time to be on the first crew to head out of the truck bay on a massive fire truck, \"lights and sirens,\" rushing to the scene of the fire.\n\n*page_break\n\nYou arrive only a couple of minutes later, and you're still not quite awake.  Ugly black smoke pours from the side of a two-story dwelling just down the street from the house where you grew up.  The burning home has light-colored siding and a big wrap-around porch.  There is an impressively carved jack-o-lantern on the porch step. The acrid smell of fire is powerful and harsh.\n\nSirens wail, and blue and red emergency lights from all the arriving vehicles surround a scene of organized chaos.  \n\n*page_break\n\nYou see a middle-aged man kneeling on the front lawn, staring at his home in disbelief.  He is holding two small children in his arms and staring up at the house in shock.  \n\nAs it's the middle of the night, they are all wearing pajamas. The littlest one is wrapped in a blanket and clutching a teddy bear, looking sleepy and too confused to cry.  A police officer is gently but assertively urging the man to stand up.  He then guides the family out of harm’s way and to an ambulance to be checked out.\n\nYou and your crew waste no time getting to work, but let's take a moment to clarify what it is you will be doing.\n\n*page_break\n\nYou have two choices:\n\nMembers of the truck company gear up with face masks and air packs and prepare to enter the smoke-filled house in order to rescue possible victims and locate the fire.\n\nEngine company members work swiftly to secure a water source from the nearby hydrant and charge a hose line to prepare for an interior attack once the fire is located.\n\nTo which company do you belong?\n\n*choice\n  #I am a proud member of Truck Company 1.\n    An excellent choice.  You want to be the firefighter who runs into a burning building without a hoseline, finds the fire, and helps people get out alive. \n\n    And there's no time like the present!\n    *set company \"Truck\"\n    *set company_set true\n    *set fullcompany \"Truck Company 1\"\n    *page_break\n    *goto TruckCompany\n  #I am a proud member of Engine Company 2.\n    An excellent choice. You can't fight a fire without water, after all, and you want to be on the front line of the battle.\n    \n    And there's no time like the present!\n    *set company \"Engine\"\n    *set company_set true\n    *set fullcompany \"Engine Company 2\"\n    *page_break\n    *goto EngineCompany\n\n\n*label TruckCompany\n\nA police officer has informed your commanding officer that all the people have gotten out safely but that the family pet is still somewhere in the house.  Your primary goal will be to locate the fire, which, from a quick outside inspection, seems to be located on the ground floor of the house.  If at all possible, you will also try rescue Winston, a friendly Miniature Schnauzer.\n\nYou and several of your company members form a search team, and the officer indicates for you to take the lead.  You have only ever been a search team leader in a few drills so this would be your first time filling this role in a real fire.  How do you feel about it?\n\n*choice\n  #Heck yeah!  This is the chance I've been waiting for!\n    You jump at the chance to lead the search team. When the officer gives the order, you pull your mask into place, turn on the flow from your SCBA (self-contained breathing apparatus), and make your way carefully into the burning building. \n    *set leadership %+10\n    *set relationship_officers %+10\n    *set position \"tleader\"\n    *page_break\n    *goto Why\n  #I'm nervous, but this is a good opportunity for me to gain experience.\n    And it's perfectly reasonable to feel anxious about walking into a house that's on fire.  Who wouldn't be?  You're also keenly aware that your leadership decisions will affect the safety of those on your team.\n\n    Still, you've had plenty of training, and you don't want to miss this chance.  When the officer gives the order, you pull your mask into place, turn on the flow from your SCBA (self-contained breathing apparatus), and lead your team into the burning building. \n    *set leadership %+10\n    *set position \"tleader\"\n    *page_break\n    *goto Why    \n  #Hell no!  I'm still just learning the ropes.  If I mess up, someone could really get hurt!\n    You shake your head and insist that another more experienced firefighter take the lead.  The officer looks a little annoyed with you, but this is not the time to argue.  He assigns a more experienced person, Firefighter Velez, to lead the team into the building. \n\n    When the officer gives the order, you pull your mask into place, turn on the flow from your SCBA (self-contained breathing apparatus), and follow Velez carefully into the burning home.  Firefighter Schmidt takes up the rear, behind you.\n    *set leadership %-10\n    *set relationship_officers %-10\n    *set position \"not_tleader\"\n    *page_break\n    *goto Why\n\n*label Why\n\nBefore we go any further, let's pause our story briefly so we can sort a few things out.  \n\nFirstly, why are you a firefighter?  Firefighting is a very important job, but it's also extremely dangerous, and, quite honestly, it's not for everyone.  \n\nSo what's your story?\n\n*choice\n  #I am proud to be part of a volunteer firefighting tradition in my family that goes back several generations.\n    Your mother was a firefighter, and so was your grandfather and his father before him.  You practically grew up in the firehouse and played with toy fire trucks for as long as you can remember.  There was never any doubt in your mind that you would be a firefighter too when you were old enough. \n\n    Unfortunately, the current chief is an old rival of your mother's and has decided not to like you on principle.  His opinion of you has affected that of the rest of the officers as well so you might have to work a bit harder to prove yourself.\n    *set relationship_firefighters +20\n    *set relationship_officers -10\n    *set fire_knowledge +10\n    *set motivation \"tradition\"\n    *page_break\n    *goto Gender\n  #A lot of people in my family were volunteer firefighters so it is expected of me too, even though I'm not really interested.\n    You don't really want to be a firefighter, but everyone always assumed you would be.  After all, your mother was a firefighter, as was your grandfather and his father before him. So here you are. You've known many of the members of the fire department since you were a kid, but your negative attitude hasn't won you any popularity contests.\n\n    To make matters worse, the chief has high hopes that you'll follow in your mother's footsteps.  Over the years, she has been awarded medals many times for exemplary service and heroically saving lives.  No pressure or anything.\n    *set relationship_firefighters -10\n    *set relationship_officers +20\n    *set fire_knowledge +5\n    *set motivation \"grudging\"\n    *page_break\n    *goto Gender\n  #I feel that being a volunteer firefighter is the best way I can be a good person and serve my community, and I am the first in my family to be a firefighter.\n    You truly want to be a helpful, contributing citizen of your home town, and, after much thought and consideration, you've decided this is the way to go.  You read a couple books and visited the fire house several times to talk to folks there before volunteering so you are fairly confident you can be reasonably good at this.\n    *set fire_knowledge +10\n    *set relationship_firefighters +10\n    *set motivation \"service\"\n    *page_break\n    *goto Gender\n  #I want to be a hero!\n    You want to be a real life super hero, saving lives, battling infernos, and maybe even making the evening news! If you do things just right, firefighting could be your key to instant popularity and fame, and you'll even do good in the process!  Oh, yeah!  \n\n    If only everyone else in the department was as enthusiastic about your attitude.\n    *set relationship_firefighters -10\n    *set relationship_officers -10\n    *set motivation \"hero\"\n    *page_break\n    *goto Gender\n\n*label Gender\n\nThis may seem like a silly question, but are you a man or a woman?\n\n*choice\n  #Last time I checked, I was a man.\n    Good to know.\n    *set gender \"male\"\n    *set pronoun1 \"he\"\n    *set pronoun2 \"his\"\n    *set pronoun3 \"him\"\n    *goto FName\n    \n  #I am definitely a woman.\n    Okay.  Thanks!\n    *set gender \"female\"\n    *set pronoun1 \"she\"\n    *set pronoun2 \"her\"\n    *set pronoun3 \"her\"\n    *goto FName\n\n    *goto FName\n  #I don't subscribe to binary gender labels.\n    No problem!\n    *set gender \"neither\"\n    *set pronoun1 \"they\"\n    *set pronoun2 \"their\"\n    *set pronoun3 \"them\"\n    *goto FName\n    *goto FName\n\n*label FName\n\nAnd what is your first name?\n\n*if gender=\"male\"\n  *choice\n    #Thomas\n      Nice to meet you, Thomas!  May I call you \"Tom\"?\n      *choice\n        #Sure!\n          Thanks, Tom!\n          *set Fname \"Tom\"\n          *goto Lname\n        #I'd rather you didn't.\n          No problem, Thomas!\n          *set Fname \"Thomas\"\n          *goto Lname\n    #Noah\n      Nice to meet you, Noah!\n      *set name_set true\n      *set Fname \"Noah\"\n      *goto Lname\n    #Diego\n      Nice to meet you, Diego!\n      *set Fname \"Diego\"\n      *goto Lname\n    #None of the above.\n      *goto TextName\n    \n*elseif gender=\"female\"\n  *choice\n    #Josephine\n      Nice to meet you, Josephine!  \n\n      May I call you \"Jo\"?\n      *choice\n        #Sure!\n          Thanks, Jo!\n          *set Fname \"Jo\"\n          *goto Lname\n        #I'd rather you didn't.\n          No problem, Josephine!\n          *set Fname \"Josephine\"\n          *goto Lname\n    #Alice\n      Nice to meet you, Alice!\n      *set Fname \"Alice\"\n      *goto Lname\n    #Maria\n      Nice to meet you, Maria!\n      *set Fname \"Maria\"\n      *goto Lname\n    #None of the above.  \n      *goto TextName\n                  \n*elseif gender=\"neither\"\n  *choice\n    #Sam\n      Nice to meet you, Sam!\n      *set name_set true\n      *set Fname \"Sam\"\n      *goto Lname\n    #Alex\n      Nice to meet you, Alex!\n      *set Fname \"Alex\"\n      *goto Lname\n    #Pat\n      Nice to meet you, Pat!\n      *set Fname \"Pat\"\n      *goto Lname\n    #None of the above.  \n      *goto TextName\n\n*label TextName\nOkay!  What's your name, then?\n*input_text Fname\n*comment capitalization check\n*if (\"${Fname}\" != \"$!{Fname}\")\n  Let's make sure I have it right.  Your first name is $!{Fname}. Is that correct?\n  *choice\n    #Yes. $!{Fname}.\n      *set Fname \"$!{Fname}\"\n      *goto Lname\n    #No, my name is ${Fname}, just as I typed it before.\n      *goto Lname\n    #Oops. That's not right! Let me try that again!\n      *goto TextName\n \n*label Lname\n\nHow about your last name?\n\n*choice\n  #Ramirez\n    *set Lname \"Ramirez\"\n    *set name_set true\n    *goto Continue\n  #Marino\n    *set Lname \"Marino\"\n    *set name_set true\n    *goto Continue\n  #Jones\n    *set Lname \"Jones\"\n    *set name_set true\n    *goto Continue\n  #None of the above.\n    *label input_Lname\n    Okay!  What's your last name, then?\n    *input_text Lname\n    *set name_set true\n    *comment capitalization check\n    *if (\"${Lname}\" != \"$!{Lname}\")\n\n      Let's make sure I have it right.  Your last name is $!{Lname}. Is that correct?\n      \n      *choice\n        #Yes. $!{Lname}.\n          *set Fname \"$!{Lname}\"\n          *set name_set true\n          *goto Continue\n        #No, my name is ${Lname}, written just like that.\n          *set name_set true\n          *goto Continue\n        #Oops. That's not right! Let me try that again!\n          *goto input_Lname\n          \n*label Continue\n           \nSo, in summary, your name is ${Fname} ${Lname}, and you're a member of the ${Company} Company in the $!{town_name} Fire Department.\n\n*if motivation=\"tradition\"\n  You're continuing a proud family tradition in the volunteer fire service.\n  *goto Return\n*elseif motivation=\"grudging\"\n  You don't necessarily want to be a volunteer firefighter, but it's expected of you.  So here you are.\n  *goto Return\n*elseif motivation=\"service\"\n  You have an admirable desire to serve your community through volunteer service and to help other people as best you can in their moments of greatest need.\n  *goto Return\n*elseif motivation=\"hero\"\n  You want to be a hero.\n  *goto Return\n\n*label Return\n\nAnd now we'd better get back to this house fire!\n\n*page_break\n\n*if company=\"Truck\" \n  *goto Search\n*elseif company=\"Engine\"\n  *goto Attack\n\n\n*label Search\n*temp winstonwaits \"\"\n\nSo you enter the small foyer. \n\nThe smoke conditions are getting pretty bad and visibility is rapidly deteriorating.  Through your protective face mask, you can barely make out the outlines of family photographs decorating the walls.  A staircase with a wooden banister leads upwards to the second floor.  Thick black smoke banks down from the ceiling in the living room beyond. You can clearly hear the piercing drone of the smoke alarms that likely saved the family's life.\n\n*page_break\n\n*if position=\"tleader\"\n  *goto TruckLeader\n\n*else\n  *goto TruckFollower\n\n*label TruckFollower\n\nYou follow your team leader, Firefighter Velez into the living room. Firefighter Schmidt follows some distance behind you.  Like the others on your team, you crawl on your hands and knees to keep your head below the line of smoke both so you can see where you are going for as long as possible and to stay lower than the worst of the heat.  You all follow what is called a \"right hand lead,\" staying close to the wall on your right so as to remain oriented, direction-wise, even if the smoke gets worse.\n\nAre you doing okay?\n\n*fake_choice \n  #I'm fine. Let me focus on my work. \n    Oh.  Sorry.  Carry on, then.\n  #I'll be better when my job is done.\n    I'll let you focus on your search, then.\n  #I'm at least moderately terrified.\n    You'll be fine.  Just keep on going. \n  \n*page_break\n\nAs you search, you shine your flashlight through the dark haze and barely make out at least two couches in the living room, what looks like a flat-screen TV on a stand of some sort, and some dark furniture.  The bay window in the front of house is filled with a variety of plants.\n\nThen, suddenly, you all hear the frightened whimper of what sounds like a dog.  Your whole team stops moving so you can listen more carefully.  The dog whimpers again, sounding plaintive and scared.  \n\nFirefighter Velez radios the commanding officer to inform him that the dog has been found, and you are assigned the task of coaxing Winston out from behind the couch.\n\n*page_break\n*goto Winston\n\n*label TruckLeader\n\n\nSince you are the head of the search team, you lead the way into the living room, following a left hand lead so you don't get turned around and lost.  Behind you are Firefighters Velez and Schmidt.\n\nKeeping your left hand on a wall at all times, you crawl on your hands and knees to keep your head below the line of smoke both so you can see where you are going for as long as possible and to stay lower than the worst of the heat.  \n\nYou move as quickly as possible while doing a thorough search.  Your heart is pounding steadily in your chest, and you do your best to keep your breathing calm and regular to preserve your air.\n\nAre you doing okay?\n\n*fake_choice \n  #I'm fine. Let me focus on my work. \n    Oh.  Sorry.  Carry on, then.\n  #I'll be better when my job is done.\n    Of course. I'll let you focus on your search, then.\n  #I'm at least moderately terrified.\n    You'll be fine.  Just keep on going.\n\n*page_break\n\nAs you search, you shine your flashlight through the dark haze and barely make out at least two couches in the living room, what looks like a flat-screen TV on a stand of some sort, and some dark furniture.  The bay window in the front of house is filled with a variety of plants.\n\nThen, suddenly, you hear the frightened whimper of what sounds like a dog.  You stop moving so you can listen more carefully.  The dog whimpers again, sounding plaintive and scared.  You're pretty sure he's crammed behind one of the couches, and a quick sweep with your light confirms this to be true.  \n\n*page_break\n\nNow, your primary goal is to find the location of the fire as soon as possible.  However, now that you know where the dog can be found, you could get him out of the house quickly and hopefully avoid any medical problems from smoke inhalation.  \n\nEvery second counts.  Quickly now, what do you choose to do?\n\n*choice\n\n  #Let's find the fire, and then rescue the dog!\n    It should be no problem at all for your team to bring Winston out once you report the location of the fire. And the fire is your first priority -- right? The sooner the hose team knows where to go, the sooner they can put out the fire and limit the damage.\n    *set leadership %-10\n    *set winstonwaits \"yes\"\n    *goto Finding\n\n  #The sooner we get the dog out the better. I will assign someone to the task.\n    You have a soft place in your heart for dogs, and you want to make sure this fellow gets out okay!  \n\n    Using your radio, you update your commanding officer as to your plans.  He informs you that he'll have someone waiting at the front door to take the dog so you can continue your search.\n    *set leadership %+10\n    *goto Winston\n\n  #I will report the situation to my commanding officer and follow his orders.\n    You radio the officer in charge and inform him that you found Winston.  He instructs you to have someone from your team bring the dog to the front door. He'll have another firefighter waiting there to take the dog so your team can continue your search for the fire.\n    *set leadership %+5\n    *goto Winston\n\n\n*label Winston\n\n*if position = \"tleader\"\n  You ask Firefighter Schmidt to coax Winston out from behind the couch and take him to the door.  She ends up having to move the couch a little in order to scoop the trembling Miniature Schnauzer into her arms.  \n\n  Keeping as low to the ground as possible, Schmidt heads for the front door to pass the little dog out into the fresh, clean air and the waiting arms of a fellow firefighter.\n  *page_break\n  *goto Finding\n\n*else\n  You're pretty sure he's crammed behind one of the couches, and a quick sweep with your light confirms this to be true. You end up having to move the couch a little in order to scoop the trembling Miniature Schnauzer into your arms.  Keeping as low to the ground as possible, you head for the front door to pass the little dog out into the fresh, clean air and the waiting arms of a fellow firefighter. Then you rejoin the others inside the house.\n  *set relationship_firefighters %+10\n  *page_break\n  *goto Finding\n\n*label Finding\n\n*if winstonwaits = \"yes\"\n  *goto FireFirst\n*else\n  *goto FireSecond\n\n*label FireSecond\n\nWhile Winston is bring taken outside, you and the others focus on the task of finding that fire! You make your way through the kitchen, feeling the hard tile floor beneath your thick knee pads and gloves.  Ahead, in what must be the laundry room, an ominous red glow announces the location of the fire, which started in the dryer.  \n\nIn your training sessions, you learned that dryer fires are fairly common yet avoidable; people tend to forget to clean the lint trap.  \n\n*page_break\n\nFortunately, despite all the smoke, the fire seems relatively small and limited to the dryer and a nearby pile of clothes.  \n\n*page_break\n\nNow that your team has found the fire, you can radio in the location as you back your way out into the kitchen again, away from the worst of the heat and smoke.  \n\nBut do you close the laundry room door behind you?\n\n*fake_choice\n  #Of course I do! I don't want the fire to spread!\n    Good call!  You want to contain the fire to that one room, hopefully long enough for the hose team to arrive and put it out!\n  #Of course I don't. I don't want to block the route to the fire!\n    If you close the laundry room door, it will take that much longer for the hose team to reach the fire!  \n\n    Or, at least, that was your opinion on the matter until Firefighter Velez closes the door.  He explains to you later that closing the door will help contain the smoke and flames to that one room, hopefully long enough for the hose team to arrive and put out the fire.\n  #It doesn't matter.\n    Oh, yes, it does!  Since you don't do anything either way, Firefighter Velez closes the laundry room door as your team leaves.   \n\n    Later, he explains to you that closing the door will help contain the smoke and flames to that one room, hopefully long enough for the hose team to arrive and put out the fire.\n\n\nOnce the details are reported to command, the hose team arrives promptly to put a quick stop to the fire.  \n\nThe primary task of the truck company members now becomes ventilation so you break certain windows so that the smoke and heat can escape the building.\n  \n*page_break\n*goto Overhaul\n\n\n*label FireFirst\n\nQuickly, your team advances further into the home.  You make your way through the kitchen, feeling the hard tile floor beneath your thick knee pads and gloves.  Ahead, in what must be the laundry room, an ominous red glow announces the location of the fire, which started in the dryer. \n  \nIn your training sessions, you learned that dryer fires are fairly common yet avoidable; people tend to forget to clean the lint trap.  \n\n*page_break\n\nDespite all the smoke, the fire seems relatively small and limited to the dryer and a smoldering pile of children's clothes.  \n\nNow that you've found the fire, you radio in the location.  Carefully, you back your way out into the kitchen, away from the worst of the heat and smoke.  The hose team isn't far behind. \n\nDo you close the laundry room door behind you?\n\n*fake_choice\n\n  #Of course I do! I don't want the fire to spread!\n    Good call!  You want to contain the fire to that one room, hopefully long enough for the hose team to arrive and put it out!\n  #Of course I don't. I don't want to block the route to the fire!\n    If you close the laundry room door, it will take that much longer for the hose team to reach the fire!  Or, at least, that was your opinion on the matter until Firefighter Juan Velez closes the door.  He explains to you later that closing the door will help contain the smoke and flames to that one room, hopefully long enough for the hose team to arrive and put out the fire.\n  #It doesn't matter. \n    Oh, yes, it does!  Since you don't do anything either way, Firefighter Velez closes the laundry room door as your team leaves.   \n\n    Later, he explains to you that closing the door will help contain the smoke and flames to that one room, hopefully long enough for the hose team to arrive and put out the fire.\n  \nOnce the details are reported to command, the hose team arrives promptly to put a quick stop to the fire.  \n  \n*page_break\n\nThe moment the hose team springs into action, you and your team members rush to get Winston out of the smoke-filled house. \n\nYou end up having to move the couch a little in order to scoop the trembling Miniature Schnauzer into your arms.  Keeping as low to the ground as possible, you head for the front door to bring the little dog out into the fresh, clean air.\n\n*page_break\n\nUnfortunately, Winston is suffering from smoke inhalation.  The EMTs are able to provide a pet oxygen mask and help him to breathe more easily, but he will have to be transported to the emergency veterinarian for further care. Even so, his family is very grateful that he is alive.\n\nWith the rescue complete, the primary task of the truck company members now becomes ventilation so you break certain windows so that the smoke and heat can escape the building.\n\n*page_break\n*goto Overhaul\n\n\n\n*label Overhaul\n\nAfterwards, you and your team begin the exhausting task of \"overhaul.\"   \n\nSomeone from your company comes in with the thermal imaging camera to check for hot spots in the walls and ceiling, and then you and the others come in with halligans and pike poles to pull away the plaster and allow the hose team to spray water on any remaining burning sections of the wall.\n  \n*page_break\n\nThanks to the efficient efforts of your fire department, the destruction was limited to the laundry room with only mild to moderate smoke damage to the rest of the house.  It could have been so much worse!\n*goto News\n\n\n\n\n*label EngineCompany\n\nWhile two firefighters work to hook the supply line to the fire hydrant, you and two other firefighters pull a crosslay, meaning you unload a long length of heavy hose packed across the width of the truck. Once the hose is \"flaked\" out toward the front door so it doesn't kink when it's charged with water, you have only to await word from the officer in charge before you can go in and show the fire who's boss.\n\n*page_break\n\n\"Take the nozzle!\" the officer shouts, indicating for you to be at the front of the attack line, with the others there to back you up.  You've only ever been the nozzleman twice before and never for a structure fire.  \n\nHow do you feel about it now?\n\n*choice\n  #Heck yeah!  This is the chance I've been waiting for!\n    You jump at the chance to take the lead and prove you are up to the task. When the officer gives the order, you pull your mask into place, strap on your helmet, and clip the regulator into place on your mask, thereby activating your SCBA (self-contained breathing apparatus).  Then you make your way carefully into the burning home, with the nozzle in your thick-gloved hand. \n\n    An experienced firefighter, Juan Velez follows behind you, helping to hold the thick, heavy hose as your back-up person, while a third firefighter, Tamara Schmidt, stays behind to help push the hose into the house and ensure no kinks form in the line.\n    *set leadership %+10\n    *set relationship_officers %+10\n    *set position \"eleader\"\n    *page_break\n    *goto Why\n  #I'm nervous, but this is a good opportunity for me to gain experience.\n    That's the spirit! When the officer gives the order, you pull your mask into place, strap on your helmet, and clip the regulator into place on your mask, thereby activating your SCBA (self-contained breathing apparatus).  Then you make your way carefully into the burning home, with the nozzle in your thick-gloved hand. \n\n    An experienced firefighter named Juan Velez follows behind you, helping to hold the heavy 1.75\" hose as your back-up person, while a third firefighter, Tamara Schmidt, stays behind to help push the hoseline into the house and ensure no kinks form in the line.\n    *set leadership %+10\n    *set position \"eleader\"\n    *page_break\n    *goto Why\n  #Hell no!  I'm still just learning the ropes.  If I mess up, someone could really get hurt!\n    You shake your head and insist that another firefighter take the lead.  The officer looks annoyed, but he doesn't seem inclined to argue with you right now.  \n\n    He orders Juan Velez, a more experienced firefighter to move to the front and you into third position, behind the back-up \"man,\"\" Tamara Schmidt.  When the officer gives the order, your job is to help push the heavy hoseline into the house and ensure ensure no kinks form in the line so it can successfully charge with water before you mask up and follow the others in.  You pull your mask into place, strap on your helmet, and clip the regulator into place on your mask, thereby activating your SCBA (self-contained breathing apparatus).  Then you follow the others in your team into the burning home. \n    *set leadership %-10\n    *set relationship_officers %-10\n    *set position \"not_eleader\"\n    *page_break\n    *goto Why\n \n\n*label Attack\n\nThe Truck Company just reported their findings so you and your team know that the fire is located in the laundry room, which is in the back left corner of the house.  By this point, the thick mpany comes in the thermal imaging camera to check for hot spots in the walls and ceiling, and others come in with halligans and pike poles to pull away the plaster and allow you to spray water on any remaining burning sections of the wall.  Everything and everybody are sooty, dirty and soaked.\n  *page_break\n  *goto Results\n*elseif fire=\"burning\"\n\n  You and your team find the fire quickly, but, because of the delay, it is now significantly worse than only moments before when the search team first called in the location.  The flames angrily hiss and spit steam when you douse them with water, as members of the truck company break the windows in the room to vent smoke and heat outside. \n\n  Afterwards, you and the others take plenty of time with overhaul.   Someone from the truck company comes in the thermal imaging camera to check for hot spots in the walls and ceiling, and others come in with halligans and pike poles to pull away the plaster and allow you to spray water on any remaining burning sections of the wall. Everything and everybody are sooty, dirty and soaked.\n  *page_break\n  *goto Results\n\n*label Results\n\n*if fire=\"out\"\n\n  Thanks to the efficient efforts of your fire department, the destruction was limited to the laundry room with only mild to moderate smoke damage to the rest of the house.  It could have been so much worse!\n  *goto WinstonEnd\n\n*elseif fire=\"burning\"\n\n  The laundry room is completely destroyed as is a small portion to the living room, with moderate smoke damage to the rest of the house.  It could have been much worse, but, had you focused on your job, things could have gone much better.  \n\n  Later, your officer will sit down and chat with you about what happened so you can learn and improve when you respond to future incidents.  Ideally, you should always communicate with your commanding officer and tell him or her what's going on.  There are enough firefighters on scene that others could have been helping the dog uld have destroyed this family home.  We were all very worried for a while there, but you seemed to have everything very quickly under control.  You saved the family home, and you'll forever be a hero to this family, I'm sure. How are you feeling right now?\"\n\n  So how [i]are[/i] you feeling about the whole situation?  \n\n  *choice\n    #Hero? Of course I'm a hero! \n      \"It's moments like these that make it all worth while,\" you say with fervent emotion, looking directly into the camera. \"When I was putting water on the fire and the flames were shooting over my head and the black smoke was thick as death, I swore I wasn't going to let this family lose their home I promised myself as a firefighter and a human being that I just wasn't going to let that happen on my watch.\"\n      *set relationship_firefighters %-20\n      *set leadership %-10\n      *set relationship_officers %-10\n      *page_break\n      *goto HeroEnd\n\n    #I'm part of a team just doing my job.\n      \"As firefighters, our duty is to protect life and property,\" you explain to the interviewer. \"We worked as a team, and we did the job we are trained to do. I'm really glad that nobody got hurt and that we were able to put a quick stop to the fire and save the family home.\"\n      *set relationship_firefighters %+20\n      *set leadership %+10\n      *set relationship_officers %+10\n      *page_break\n      *goto ModestEnd\n\n    #This interview is ridiculous.\n      You just stare at the reporter for a moment, at the fake tears in his eyes and his plastic smile, feeling deeply disgusted.  The condescending language and tone just make your revulsion worse.  \n\n      \"This family's been through hell tonight,\" you remind him. \"This isn't some dramatic story for your viewers' entertainment.  For decency's sake, take your cameras and lights, and get the hell out of here.\"\n      *set relationship_firefighters %+10\n      *set leadership %+10\n      *set relationship_officers %-10\n      *page_break\n      *goto HarshEnd\n\n*label HeroEnd\n  \nThe news team might have liked your melodramatic speech, and your mother probably loved seeing you on television, but, really, nobody in your fire department cared for it at all.  Your self-centered attitude isn't winning you any friends among the firefighters, but how much do you really care about that?  \n\n*fake_choice\n  #I do care!\n    Then maybe it's time to start showing it.\n\n    Anyway, let's move on -- shall we?\n  #I honestly don't give a rat's eye what they think of me.\n    I'm really not surprised.  \n\n    Anyway, let's move on -- shall we?\n\n*finish\n\n*label ModestEnd\n\nYour humble words are well-received by your fellow firefighters and earned you some pats on the back in heartfelt camaraderie.  Everyone is feeling good about tonight's work, and, despite the fact that the sun is starting to rise by the time you finally get back to bed and you are utterly exhausted, you feel satisfied and proud to be a member of this fire department.\n\n*finish\n\n*label HarshEnd\n\nDespite the fact that you really did feel strongly about what you told that reporter, you couldn't help but feel amused by the look on his face when you told him what to do with himself.  \n\nOf course, the only line of your interview that actually made the evening news was the line about the family having been through hell, which is fine by you.  \n\n*page_break\n\nYour stance in this situation actually earned you some respect from your fellow firefighters, although some of the officers did seem ticked off at what they considered to be \"unprofessional conduct.\"\n\nIn any case, when you finally do get to bed, the sun is starting to rise and you feel satisfied about a job well done.\n\n*finish\n"}};

<script>
/* ChoiceScript runtime — vanilla-JS port of the Python engine in cs/.
 *
 * Faithful reimplementation of parser + expr + interpolate + engine. The
 * engine is I/O-agnostic: it talks to an `io` object exposing text(), choose(),
 * page_break(), input_text(), input_number(), achievement(), stat_chart().
 *
 * Exposed as a global `CS` object (no modules, no build step).
 */
(function (root) {
  "use strict";

  // ---- errors ----------------------------------------------------------- //

  class CSError extends Error {
    constructor(message, scene, line) {
      super(formatLoc(scene, line) + message);
      this.raw_message = message;
      this.scene = scene === undefined ? null : scene;
      this.line = line === undefined ? null : line;
      this.name = "CSError";
    }
  }
  function formatLoc(scene, line) {
    if (scene == null && line == null) return "";
    return (scene == null ? "?" : scene) + " line " + (line == null ? "?" : line) + ": ";
  }
  class ExprError extends CSError { constructor(m, s, l) { super(m, s, l); this.name = "ExprError"; } }
  class GameOver extends Error { constructor(label) { super(label || ""); this.label = label || ""; this.name = "GameOver"; } }
  class QuitGame extends Error { constructor() { super("quit"); this.name = "QuitGame"; } }
  class LoadGame extends Error { constructor(state) { super("load game"); this.state = state; this.name = "LoadGame"; } }
  class RestartGame extends Error { constructor() { super("restart"); this.name = "RestartGame"; } }

  // ---- parser ----------------------------------------------------------- //

  const COMMAND_RE = /^\s*\*(\w+)\b[ \t]?([\s\S]*)$/;
  const INDENT_RE = /^([ \t]*)/;

  class Line {
    constructor(num, indent, command, arg, text) {
      this.num = num;
      this.indent = indent;
      this.command = command; // null for plain text
      this.arg = arg;
      this.text = text;
    }
    get is_blank() {
      return this.command == null && this.text.trim() === "";
    }
  }

  function getIndent(raw) {
    const m = INDENT_RE.exec(raw);
    const ws = m ? m[1] : "";
    if (ws.indexOf("\t") !== -1 && ws.indexOf(" ") !== -1) {
      throw new CSError("mixed tabs and spaces in indentation");
    }
    return ws.length;
  }

  function parseScene(text) {
    const lines = [];
    const rawLines = text.split("\n");
    for (let i = 0; i < rawLines.length; i++) {
      let raw = rawLines[i].replace(/\r$/, "");
      const num = i + 1;
      if (raw.trim() === "") {
        lines.push(new Line(num, 0, null, "", ""));
        continue;
      }
      const indent = getIndent(raw);
      const m = COMMAND_RE.exec(raw);
      if (m) {
        lines.push(new Line(num, indent, m[1], m[2], raw.trim()));
      } else {
        lines.push(new Line(num, indent, null, "", raw.trim()));
      }
    }
    return lines;
  }

  // ---- value coercion --------------------------------------------------- //

  function isNum(v) { return typeof v === "number"; }
  function isBool(v) { return typeof v === "boolean"; }
  function isStr(v) { return typeof v === "string"; }

  function toNum(value) {
    if (isBool(value)) throw new ExprError("Expected number, got boolean: " + value);
    if (isNum(value)) return value;
    const s = String(value).trim();
    if (/^-?\d+$/.test(s)) return parseInt(s, 10);
    // Match Python float(): the whole string must be a valid float literal.
    if (/^[+-]?(\d+\.?\d*|\.\d+)([eE][+-]?\d+)?$/.test(s)) {
      const f = Number(s);
      if (!isNaN(f)) return f;
    }
    throw new ExprError('Expected number, but got string: "' + value + '"');
  }

  function toBool(value) {
    if (isBool(value)) return value;
    if (isNum(value)) throw new ExprError("Expected boolean, got number: " + value);
    const s = String(value).trim().toLowerCase();
    if (s === "true") return true;
    if (s === "false") return false;
    throw new ExprError('Expected boolean, but got string: "' + value + '"');
  }

  function csStr(value) {
    if (isBool(value)) return value ? "true" : "false";
    if (isNum(value)) {
      // integers render without a decimal point
      if (Number.isInteger(value)) return String(value);
      return String(value);
    }
    return String(value);
  }

  // ---- expression tokenizer --------------------------------------------- //

  const TOKEN_SPECS = [
    ["OPEN_PARENTHESIS", /^\(/],
    ["CLOSE_PARENTHESIS", /^\)/],
    ["OPEN_CURLY", /^\{/],
    ["CLOSE_CURLY", /^\}/],
    ["OPEN_SQUARE", /^\[/],
    ["CLOSE_SQUARE", /^\]/],
    ["FUNCTION", /^(not|round|timestamp|log|length|auto)\s*\(/],
    ["NUMBER", /^\d+(\.\d+)?\b/],
    ["CURLY_QUOTE", /^[“”]/],
    ["WHITESPACE", /^\s+/],
    ["NAMED_OPERATOR", /^(and|or|modulo)\b/],
    ["VAR", /^\w+/],
    ["FAIRMATH", /^%[+\-]/],
    ["OPERATOR", /^[+\-*/&%^#]/],
    ["INEQUALITY", /^[!<>]=?/],
    ["EQUALITY", /^=/],
    ["COMMA", /^,/],

  const FUNC_NAME_RE = /^\w+/;

    constructor(name, value, pos, func) {

      this.value = value;
      this.pos = pos;
      this.func = func || null;

    let pos = 0;
    const tokens = [];

        let found = false;

          i += 1;

        pos += matched.length;
        tokens.push(new Token("STRING", matched, pos));
        s = s.slice(matched.length);
        continue;
      }

      for (const [name, rx] of TOKEN_SPECS) {

        if (m && m[0]) { matched = [name, m[0]]; break; }
