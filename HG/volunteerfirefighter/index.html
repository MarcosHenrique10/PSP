e of the kittens.  Hi, little fellow!  Aren't you incredibly dirty yet somehow still cute? Come here, little guy.  I'm here to help. That's it.  Here we go.\"  And then she carefully makes her way up the compact ladder until she can hold up a kitten covered in black gunk. \"Here's one!\" she declares. \n\nThe kitten cries, \"Mew!\" \n\n*page_break\n\nYou quickly take the kitten and wrap it in a towel so you can rub off the worst of the filth. Firefighter Zlenko goes back down the ladder twice to retrieve two more scared but friendly little kittens. You and the probies clean them off as best you can and give them kitten food (provided by a helpful neighbor) and some fresh water.  \n\nIn the end, Zlenko needs to be cleaned off a bit as well and given a bottle of water to drink, which everyone finds amusing.  The gathered neighbors are delighted by the rescue attempt, and one news photographer even takes some pictures for the local paper. \n\nIt's a job well done!\n\n*set relationship_firefighters %+20\n*set leadership %+20\n*goto AdoptionOption\n\n*label RopeRescue\n\nWhen you shine your flashlight down the storm drain, you can see metal rungs built into the side of it.  But they could be slippery, and you don't particularly trust them.  So, in the interest of safety, you have everyone set up a high-point pulley system using a ladder at a 45-degree angle that is anchored to a nearby tree.  \n\n*page_break\n\nFirefighter Zlenko volunteers to go down into the drain.  She argues that she's the smallest of the four of you so she would best be able to maneuver in the confined space.\n\nAre you okay with that?\n*fake_choice\n\t#Sure.  That's fine with me.\n\t\tThat makes sense to you so you agree to let Zlenko be the one to fit down into the small space. \n\t#I want to do this myself, but I'm not sure about the space.\n\t\tYou would rather do this yourself, truth be told, but space is an issue, and Zlenko really is tiny. So you grudgingly agree.\n\nYou do insist that she wears EMS gloves and a helmet with a light in addition to her bunker gear.  Firefighter Zlenko takes all these precautions.  Then you help her into the harness and attach it to two redundant rope and pulley systems.  \n\n*page_break\n\nZlenko grins cheerfully to everyone and then looks serious as she climbs down the metal rungs into the darkness of the drain. Two people mind the ropes to follow her descent.  They can pull her up in moments, if necessary.\n\nYou shine an extra light down to help her out. \"What do you see down there?\" you ask, wanting to maintain constant voice contact.\n\n*page_break\n\n\"Well,\" Zlenko replies, \"It's kind of gross down here, actually. And I don't see any sign of the -- oh!  Wait!  Here's one of the kittens.  Hi, little fellow!  Aren't you incredibly dirty yet somehow still cute? Come here, little guy.  I'm here to help. That's it.  Here we go.\"  And then she carefully makes her way back up the metal ladder until she can hold up a kitten covered in black gunk. \"Here's one!\" she declares. \n\nThe kitten cries, \"Mew!\" \n\n*page_break\n\nYou quickly take the kitten and wrap it in a towel so you can rub off the worst of the filth. Firefighter Zlenko goes back down twice to retrieve two more scared but friendly little kittens. You and the probies clean them off as best you can and give them kitten food (provided by a neighbor) and some fresh water.  \n\nIn the end, Zlenko needs to be cleaned off a bit as well and given a bottle of water to drink, which everyone finds amusing.  The gathered neighbors are delighted by the rescue attempt, and one news photographer even takes some pictures for the local paper. \n\nIt's a job well done!\n\n*set relationship_firefighters %+20\n*set leadership %+20\n*goto AdoptionOption\n\n*label AdoptionOption\n*page_break\n\nSo now there are three small kittens and no momma cat to be found. One is a red tabby, one is calico, and one is grey, all short-haired.  They look to be around 7 weeks old and need to either find homes or be taken to the local shelter. \n\n*page_break\n\nWith the permission of her father, Adele claims the little grey one for her own.\n\n\"What's your name?\" she asks you as she carefully holds the towel-wrapped creature in her arms.\n\n\"${Fname},\" you tell her.\n\nAdele thinks for a moment.  \"Okay. I'm going to name my cat ${Fname} then. Thank you for saving them!\"  \n\nSo now you have a cat named after you.\n\n*page_break\n\nTwo more kittens remain.  One of the neighbors expressed interest, but he'll defer to any of the firefighters if they want first pick.\n\nDo you want to adopt a kitten?\n\n*choice\n\t#No kitten for me.\n\t\t\"No, thank you,\" you reply, when asked. \"They're cute and all, but I don't really have the time to take care of a pet right now.\"  \n\n\t\tIn the end, Gina Zlenko ends up being chosen by the calico kitten who climbs up the arm of her bunker coat to sit on her shoulder possessively.  \"I guess I have a cat!\" she proclaims, both amused and happy about it.  The interested neighbor claims the red tabby.  So all the kittens have homes, and none of them have to go to the shelter.  \n\n\t\tAll in a good day's work!\n\n\t\tThe firefighters clean up all the equipment from the scene and make sure the storm drain grill is securely in place before climbing back on the heavy rescue truck.  You wave to Adele as the truck pulls away from the scene and heads back to the firehouse, with the addition of one calico kitten riding in Zlenko's helmet.\n\t\t*goto Convention\n\n\t#Yes, actually.\n\t\t*set cat true\n\t\tAs it happens, you had been thinking of adopting a pet, but you had just never gotten around to actually doing so. So this seems like destiny!\n\n\t\tWhich kitten interests you?\n\t\t*choice\n\t\t\t#The spunky calico kitten.\n\t\t\t\tYou look at them both for a long moment, and they eye you back.  For whatever reason, you feel drawn to the little calico kitten with the multicolored patches. She apparently feels the same way because she lets out a tiny \"mew!\" and climbs up the arm of your bunker gear to sit on your shoulder.  \n\n\t\t\t\t\"I think this one picked me,\" you declare, both amused and happy about it. \n\n\t\t\t\t*page_break\n\n\t\t\t\tThe interested neighbor claims the red tabby.  \n\n\t\t\t\tSo now all the kittens have homes, and none of them have to go to the shelter.  \n\n\t\t\t\tAll in a good day's work!\n\n\t\t\t\t*page_break\n\n\t\t\t\tThe firefighters clean up all the equipment from the scene and makes sure the storm drain grill is securely in place before climbing back on the heavy rescue truck.  \n\n\t\t\t\tYou wave to Adele as the truck pulls away from the scene and heads back to the firehouse, with the addition of one calico kitten riding in your helmet.\n\n\t\t\t\t*set catgender \"female\"\n\t\t\t\t*set Cpronoun1 \"she\"\n\t\t\t\t*set Cpronoun2 \"her\"\n\t\t\t\t*set Cpronoun3 \"her\"\n\t\t\t\t*goto CatName\n\t\t\t\t\n\t\t\t#The brave red tabby.\n\t\t\t\tYou look at them both for a long moment, and they eye you back.  For whatever reason, you feel drawn to the little red tabby kitten with the bright yellow eyes. He apparently feels the same way because he lets out a tiny \"mew!\" and climbs up the arm of your bunker gear to sit on your shoulder.  \n\n\t\t\t\t\"I think this one picked me,\" you declare, both amused and happy about it. \n\n\t\t\t\t*page_break\n\n\t\t\t\tThe interested neighbor claims the little calico.  \n\n\t\t\t\tSo now all the kittens have homes, and none of them have to go to the shelter.  \n\n\t\t\t\tAll in a good day's work!\n\n\t\t\t\t*page_break\n\n\t\t\t\tThe firefighters clean up all the equipment from the scene and makes sure the storm drain grill is securely in place before climbing back on the heavy rescue truck.  \n\n\t\t\t\tYou wave to Adele as the truck pulls away from the scene and heads back to the firehouse, with the addition of one red tabby kitten riding in your helmet.\n\n\t\t\t\t*set catgender \"male\"\n\t\t\t\t*set Cpronoun1 \"he\"\n\t\t\t\t*set Cpronoun2 \"his\"\n\t\t\t\t*set Cpronoun3 \"him\"\n\t\t\t\t*goto CatName\n\t\t\t\t\n\t*if (SO) #Not for me, but I think ${SOname} might be interested.\n\t\tYou don't want to take of a cat right now yourself, but you remember that ${SOname} had mentioned something about looking into adopting one sometime soon.  So this might be a great opportunity!  You give ${SOpronoun3} a quick call to ask.\n\n\t\t*page_break\n\n\t\t\"Yes! I'd love one!\" ${SOname} exclaims, sounding very excited.  \"A kitten that you helped rescue!  What could be better? What colors are they?\" You explain all the particulars, and ${SOpronoun1} ends up choosing the little red tabby. ${SOpronoun1}'ll meet you at the firehouse as soon as ${SOpronoun1} can get there to pick the cat up.\n\n\t\t*page_break\n\n\t\tThe interested neighbor claims the little calico.  So now all the kittens have homes, and none of them have to go to the shelter.  \n\n\t\tAll in a good day's work!\n\n\t\t*page_break\n\n\t\tThe firefighters clean up all the equipment from the scene and makes sure the storm drain grill is securely in place before climbing back on the heavy rescue truck.  \n\n\t\tYou wave to Adele as the truck pulls away from the scene and heads back to the firehouse, with the addition of one red tabby kitten riding in your helmet.\n\n\t\t*set relationship_SO %+30\n\t\t*goto Convention\n\n*label CatName\n\n*page_break\n\nThe next day, you take the kitten to the vet for a check-up and shots, and ${Cpronoun1} gets a clean bill of health. $!{Cpronoun1}'s' playful, affectionate, adorable, and an all-around nice cat to have around.\n\nWhat do you name ${Cpronoun3}, by the way? \n\n*label CatName2\n\n*input_text catname\n\n*comment capitalization check\n*if (\"${catname}\" != \"$!{catname}\")\n\tJust to be sure: you typed in \"${catname}.\" Did you mean to capitalize the first letter?\n\t*choice\n\t\t#Yes. I did mean \"$!{catname}.\"\"\n\t\t\t*set catname \"$!{catname}\"\n\t\t\t*goto Convention\n\t\t#No, my cat's name is \"${catname},\" just as I typed it before.\n\t\t\t*goto Convention\n\t\t#Oops. That's not right at all! Let me try that again!\n\t\t\tSure. What's the name again?\n\t\t\t*goto CatName2\n*else\n\t*goto Convention\n\n\n*label Warning\n\n*page_break\n\n\n*if (responses \u003c= 4) and (warning = 0)\n\n\tSometime in the afternoon, your hear from your lieutenant.\n\n\t\"So, ${Lname},\" he begins after the usual formalities. \"As I'm sure you're aware, in order to remain active firefighters, department members have to maintain a certain quota of alarms they attend. I'm noticing that yours is falling below the minimum requirement these days.  Anything going on that I should know about?\"\n\t*goto Reply\n\n*elseif (responses \u003c= 4) and (warning = 1)\n\n\tLater in the afternoon, you hear from your lieutenant again. He doesn't sound very happy.  \"So I was looking at the quota just now, and it looks like you're not really doing any better with responses than last time we spoke. Is there anything you'd like to tell me?\"\n\t*goto Reply2\n\n*elseif (responses \u003c= 4) and (warning = 2)\n\t*if relationship_officers > 45\n\t\tYour Lieutenant calls you later that day in the afternoon. \"Hey, ${Lname}. I hate to have to tell you this, but you have three warnings on your record now, and you know what that means. You have a lot of potential so it's a darn shame, but it seems like you have different priorities in your life right now. It happens. Just drop off your ID card, keys, and pager at the firehouse sometime in the next few days. I'm sorry it didn't work out.\"\n\n\t\tAre you really surprised? Firefighters are supposed to respond to emergencies, and you were never able to fit that into your busy schedule. Perhaps you're just not meant to volunteer in emergency services at this point in your life.\n\n\t\tAnd so ended your time as a volunteer firefighter.\n\t\t*goto_scene 13awardparty ending\n\t\t\n\t*else\n\t\tYour Lieutenant calls you later that day in the afternoon. You haven't been very pleasant to him so he doesn't feel the need to be overly pleasant to you. \"Come to the fire house this evening and drop off your ID card and pager,\" he says, nevertheless sounding generally unhappy to be having this conversation. \"That's three warnings on your record now. So you're out. I'm sorry. We'll see you later when you turn in your stuff.\"\n\n\t\tAre you really surprised? Firefighters are supposed to respond to emergencies, and you were never able to fit that into your busy schedule. To top, you have a really crappy attitude about it all. Perhaps you're just not meant to volunteer in emergency services at this point in your life or maybe ever.\n\n\t\tAnd so ended your time as a volunteer firefighter.\n\t\t*goto_scene 13awardparty ending\n\n\n*label Reply\n\nHow do you reply?\n\n*choice\n\n\t#\"I'm sorry, Lieutenant.  I've just been really busy lately. I'll try to do better.\"\n\t\t*if relationship_officers > 45\n\t\t\tYou apologize, and the Lieutenant seems sympathetic.  \"We all get busy from time to time. Just try to make some more of these alarms -- okay?  I have to write you down for a warning because that's the policy, but I'm confident you'll be more involved from this point on.\"\n\n\t\t\t\"I'll make a point of it,\" you promise.\n\t\t\t*set warning +1\n\t\t\t*goto Convention\n\t\t*else\n\t\t\tThe Lieutenant doesn't seem moved by your apology. \"We're all busy, kid.  If being part of the fire department is important to you, then you have to learn to make it a priority.  Now, the policy is that I have to issue you a warning. Try to do better from now on -- okay?\"\n\n\t\t\t\"I'll try to do better,\" you promise.\n\t\t\t*set warning +1\n\t\t\t*goto Convention\n\n\t#\"I've having some trouble balancing all my priorities. I'm not sure how to manage it.\"\n\t\t*if relationship_officers > 45\n\t\t\tThe Lieutenant seems to appreciate your honesty.  \"It's not always easy finding time for everything,\" he sympathizes. \"Sometimes it takes a while to work it all out and get your friends and family and workplace to understand that you can't be in two places at once.  You're a good kid, however; I'm confident you'll figure it out.  Just let me know if you ever need to talk.\n\n\t\t\t\"Oh, and I have to write you down for a warning because that's the policy, but just try to make some more of these alarms -- okay?\"\n\n\t\t\t\"I'll make a point of it,\" you promise.\n\t\t\t*goto Convention\n\t\t*else\n\t\t\tThe Lieutenant doesn't seem to care about your trials and woes. \"We all have jobs and family, kid. If being part of the fire department is important to you, then you have to learn to make it a priority.  Now, the policy is that I have to issue you a warning. Get your stuff sorted out and try to make some more of these alarms.\"\n\n\t\t\t\"I'll try,\" you promise.\n\t\t\t*goto Convention\n\n\t#I apologize. I slept through my pager going off. I was exhausted.\n\t\t*if relationship_officers > 45\n\t\t\t\"Yeah, that happens to all of us from time to time,\" the lieutenant admits. \"Just try to be more attentive about responding in the future -- okay?  Just so you know, I have to give you a warning on your record. Try to get in the habit of responding to more alarms..\"\n\n\t\t\t\"I understand,\" you assure. \"I'll do my best.\"\n\t\t\t*set warning +1\n\t\t\t*goto Convention\n\t\t*else\n\t\t\tYou can almost hear the lieutenant's smirk. \"Oh. You were sleepy. I didn't realize you had such a good excuse. I have to give put a warning on your record. Try to do better from now on -- okay?\"\n\n\t\t\t\"I'll do better,\" you promise.\n\t\t\t*set warning +1\n\t\t\t*goto Convention\n\t#\"No.  I honestly don't give a fig about my quota.\"\n\t\t\"I see,\" replies the Lieutenant, unimpressed.  \"Anyway.  I'm supposed to call you up to give you an official warning.  So consider this your official warning. Take care, now.\" He hangs up at that point, clearly not interested in having an extended conversation with you and your attitude.\n\t\t*set warning +1\n\t\t*set relationship_officers %-20\n\t\t*goto Convention\n\n*label Reply2\n\nHow do you reply?\n\n*choice\n\n\n\t#\"I'm sorry, Lieutenant.  I'll work on being better.\"\n\t\t*if relationship_officers > 45\n\t\t\tYour apology is sincere, and your lieutenant doesn't seem inclined to give you a hard time of it. \"All right, ${Lname}. I have to give you another warning. That's two now so be careful. We don't particularly want to have to kick you out. We can use all the good people we can get.\"\n\n\t\t\t\"I won't let you down,\" you promise.\n\t\t\t*set warning +1\n\t\t\t*goto Convention\n\t\t*else\n\t\t\tThe Lieutenant doesn't seem impressed. \"We've been through this before. Shape up and start taking this seriously. You have a second warning on your record so be careful.\"\n\n\t\t\t\"I'll do better,\" you promise.\n\t\t\t*set warning +1\n\t\t\t*goto Convention\n\n\t#I apologize. I slept through my pager going off. I was exhausted.\n\t\t*if relationship_officers > 45\n\t\t\t\"Yeah, that happens to all of us from time to time,\" the lieutenant admits. \"Just try to be more attentive about responding in the future -- okay?  I have to give you a second warning on your record. That's the last one you get so please be careful.\"\n\n\t\t\t\"I understand,\" you assure. \"I'll do better.\"\n\t\t\t*set warning +1\n\t\t\t*goto Convention\n\t\t*else\n\t\t\tYou can almost hear the lieutenant's smirk. \"Oh. You were sleepy. I didn't realize you had such a good excuse. I have to give you a second warning on your record. That's the last one you get so please be careful.\"\n\n\t\t\t\"I'll do better,\" you promise.\n\t\t\t*set warning +1\n\t\t\t*goto Convention\n\n\t#\"Not particularly. I have better things to do with my time than be lectured by you again.\"\n\t\t\"Fine,\" he says, clearly out of patience with your lack of manners and respect. \"I'll make this short. You have a second warning on your record. Have a nice day.\" And then he hangs up.\n\t\t*set warning +1\n\t\t*set relationship_officers %-30\n\t\t*goto Convention\n\n\n*label Convention\n\n*page_break\n\nOnce every year, there's a big firefighting/EMS convention located a few hours away in the city.  In addition to vendor booths, attendees get the chance to see the newest advances in technology, as well as the latest designs of firetrucks.  Plus, you get the chance to sign up for all sorts of interesting training sessions and classes offered by experienced firefighters from around the country.  \n\nEven better, the department will pay for one night in the convention center hotel, your entrance fee and whatever classes you choose to take.  Plus, you'd get a free t-shirt!\n\n*page_break\n\nThis year, the convention weekend coincides with the date of the local Summer Festival, which has been a favorite of yours ever since you can remember. You love the games, the rides, the fresh strawberry lemonade, and the funnel cake. It's everything you adore about summer time, really. \n\nPlus, this time, one of your best friends is a runner up for the time-honored position of Summer Queen!  She is trying to muster all her friends and family for their votes and support, and is counting on you to be there.\n\n*page_break\n\nSadly, you can't be in two places at once.  Which do you attend?\n\n*choice\n\t#I choose the firefighting/EMS convention.\n\t\tAlthough you love the summer festival, you decide to go to the convention.  Not only will you probably learn a lot of useful information, but it also sounds like a lot of fun!\n\t\t*goto ConventionPlanning\n\n\t#I choose the Summer Festival.\n\t\tThe Summer Festival only comes once a year, and you've been going ever since you were a child. It wouldn't really feel like summer if you don't get the chance to ride the ferris wheel and get a brain freeze from rainbow water ice!  \n\n\t\tBesides, you devote enough of your time to the fire department.  This is something that's important to you, a tradition going back to your childhood, and a support for a dear friend.  And it's not like back when you were on summer break from school and could go any day of the week.  Work obligations mean you can only go the first weekend, and you don't want to miss the chance!\n\n\t\t*page_break\n\n\t\tSo you go to the Summer Festival.  And you have a wonderful time.  \n\n\t\t*if SO \n\t\t\t${SOname} goes with you, of course.  You hit the bulls-eye at the archery contest and win a large stuffed alligator with a top hat, which you generously present to ${SOname} primarily for the joy and amusement of watching ${SOpronoun3} carry the thing around for the rest of the evening. \n\n\t\t\t*page_break\n\n\t\t\t\"Ricardo\" the alligator even joins you on the ferris wheel and takes up a good portion of a bench while you and ${SOname} share some funnel cake. Some of the resulting pictures are downright hilarious.  And, speaking of pictures, you even manage to creatively sneak Ricardo into the pictures of when your friend is being joyfully crowned Summer Queen. What a fun day!\n\t\t\t*set relationship_SO %+20\n\t\t\t*finish\n\n\t\t*else\n\t\t\tYou meet some friends there, as per the annual tradition.  This year you actually hit the bulls-eye at the archery contest and win a large stuffed alligator with a top hat.  You generously present the plush monstrosity to one of your friends primarily for the joy and amusement of watching him lug the thing around for the rest of the evening.\n\n\t\t\t\"Ricardo\" the alligator even joins you on the ferris wheel and takes up a good portion of a bench while everyone has to remain standing to enjoy their funnel cake. Some of the resulting pictures are downright hilarious.  And, speaking of pictures, you even manage to creatively sneak Ricardo into the pictures of when your friend is being joyfully crowned Summer Queen. What a fun day!\n\t\t\t*finish\n\n\n*label ConventionPlanning\n*temp conventionSO false\n\n*if SO \n\tDo you invite ${SOname}?\n\t*choice\n\t\t#Of course! \n\t\t\t*set conventionSO true\n\t\t\tThis would be a great opportunity to spend some time together and have a fun weekend away so of course you invite ${SOname}.\n\n\t\t\t*if fiance \n\t\t\t\tBesides, you never really had a chance to properly celebrate your engagement.  So what better than a nice hotel and treating ${SOpronoun3} dinner out in the city? \n\n\t\t\t\tYou call ${SOname} to gauge ${SOpronoun2} interest in going. And ${SOpronoun1} happily leaps at the chance to be able to spend a weekend away with you, even if you will be in classes for part of the time. \n\t\t\t\t*set relationship_SO %+20\n\t\t\t\t*goto ConventionTraining\n\n\t\t\t*elseif ProbieSO \n\t\t\t\tYou call ${SOname} to gauge ${SOpronoun2} interest in going, and it turns out that ${SOname} was planning on calling you and asking you the very same thing! So it looks like you both will be attending the convention this year.  Plus, you can choose at least some of the same classes and walk around the exhibition hall together.  It should be a great experience!\n\t\t\t\t*set relationship_SO %+20\n\t\t\t\t*goto ConventionTraining\n\n\t\t\t*else\n\t\t\t\tGoodness knows you've been through some tough times with ${SOname}, and you're hoping that a weekend away will be just the ticket to improving your relationship. Sure, you'll be in classes for part of the time, but there are plenty of ways for ${SOname} to enjoy ${SOpronoun2} free time in whatever way interests ${SOpronoun3}, including shopping, local museums, and the hotel's own spa services.\n\t\t\t\t*set relationship_SO %+20\n\t\t\t\t*goto ConventionTraining\n\n\t\t#Maybe next time.\n\t\t\tThis is an opportunity to get away for a while, to be free! Why would you spoil it by bringing a significant other along with you? \n\n\t\t\t*if ProbieSO \n\t\t\t\tOf course, in this case, your significant other is also a member of the fire department.  You find out ${SOname} is attending along with several other people from both the truck and engine company.  So there goes that idea.\n\t\t\t\t*set conventionSO true\n\t\t\t\t*goto ConventionTraining\n\n\t\t\t*else\n\t\t\t\tYou're looking forward to having very a good time.\n\t\t\t\t*goto ConventionTraining\n\n*else \n\n\t*goto ConventionTraining\n\n*label ConventionTraining\n\n*page_break\n\nSo you're at the convention!  The atmosphere is bustling and vibrant.  You've spent hours just wandering through the exhibition hall, climbing into the driver's seat of at least a dozen different brand new fire trucks and talking to vendors of any number of fire service related products. You get your free t-shirt and also purchase a new LED flashlight to attach to your bunker gear.  \n\nOf course, the exhibition hall is only part of the experience.  You also have many opportunities for training and classwork, but you only have time for three of them.  Let's see which ones (if any) you choose to attend!\n\n*temp contraining 0\n*comment -- max contraining is 3\n\n*page_break\n\nIn the morning time slot for Day 1, you have a choice of two different classes.  What do you choose to do?\n\n*choice\n\t#Class - Taking Command: Considerations for Incident Commanders in Fire/Rescue Scenarios\n\t\tThe longer you remain in the fire service, the more likely it is for you to find yourself in command of various emergency responses.  \n\n\t\tSo you attend the class designed to help define and improve leadership skills.  You learn about setting priorities at a fire scene and approaching the various issues and goals in an orderly and efficient manner. You also discuss the benefit of emergency pre-planning to have basic guidelines in place before you are even on scene.  The instructor is very knowledgeable, and you feel like you learn a lot.\n\t\t*set contraining +1\n\t\t*set leadership %+30\n\t\t*goto ConventionTraining2\n\n\t#Class - Flashover Warning: What to Look for and How to Survive\n\t\tFrom the first days of training, every firefighter is taught to recognize the signs of an impending flashover. Along with the other probies at the fire academy, you were even put through a flashover simulator with an instructor present so you could experience pre-flashover-like conditions and fire behavior in a carefully controlled environment.\n\n\t\tWhen an enclosed area gets hot enough, around 930 degrees F, all of its combustible contents have the potential nearly simultaneously ignite, which, as anyone can imagine, is pretty much deadly for any living being in the vicinity. \n\n\t\t*page_break\n\n\t\tThe instructor of this class you choose to attend reviews a lot of the points you already know but also expands up that knowledge, using both science and the real-life experience of veteran firefighters to illustrate various points.  The sobering reality is that a firefighter, upon first seeing the signs of an impending flashover, even if they are wearing full PPE, will have only a few seconds to evacuate an area that once it begins to flashover.  You are grateful for all the potentially life-saving knowledge that you can get.\n\t\t*set contraining +1\n\t\t*set flashovertraining true\n\t\t*set fire_knowledge %+30\n\t\t*set fire_skills %+20\n\t\t*goto ConventionTraining2\n\n\t#I prefer to spend extra time in the exhibition hall.\n\t\tSure, you could attend a class, but, for the meantime, you're really interested in checking out all the different firefighting technology.  You experiment with a thermal imagining camera and an interesting kind of heavy extrication cutting tool.  You also try on a new design for a light-weight fire helmet, which is amazingly comfortable, and learn about the interesting functionalities of an amphibious rescue vehicle. You have a great morning!\n\t\t*goto ConventionTraining2\n\n\n*label ConventionTraining2\n*page_break\n\nIn the afternoon time slot for Day 1, you have a choice of three different classes/training sessions.  What do you decide to do?\n\n*choice\n\t#Class/Training - Firehouse Fitness: Staying in Shape for Safety and Health\n\t\tBeing in decent shape be a matter of life and death in certain emergency situations.  At the very least, in most circumstances, being in good physical condition can improve your general response efficiency and significantly reduce the possibility of injury.  \n\n\t\tIn this class, you learn how to create a fitness plan that will work with your lifestyle and help you perform at your best as a firefighter. The class itself involves a work-out that inspires you to incorporate a new, very reasonable exercise program into your daily schedule.\n\t\t*set contraining +1\n\t\t*set strength %+20\n\t\t*goto ConventionNight\n\n\t#Class - Firefighting and Considerations for Modern Construction Techniques\n\t\tBuildings aren't built like they used to be, and the new construction styles and materials have a big impact on firefighters and the strategies they must use to safely fight fires.  For example, light-weight truss roof supports are inexpensive to construct but extremely vulnerable to collapse when on fire.  Plus, all the latest synethetic materials, while beautiful and practical in an architectural sense, release all manner of harmful gasses and toxins when they combust.  \n\n\t\tIn this class, you learn all about these concerns and how to best protect yourself and your fellow firefighters from these modern dangers.\n\t\t*set contraining +1\n\t\t*set fire_knowledge %+30\n\t\t*goto ConventionNight\n\n\t#Training - Airbags and Extrication Exercises\n\t\tPractice makes perfect!  And with the way automotive technology is changing rapidly these days, you relish the opportunity to learn how to cut apart some modern car models in a way that is save for both the patient to be extricated and the rescue personnel who are working to help them. You find this training session to be highly informative, and you feel certain the skills you gain will be put to good use.\n\t\t*set contraining +1\n\t\t*set fire_skills %+30\n\t\t*goto ConventionNight\n\n\t*if (conventionSO) #I choose to go to lunch and a couple's massage with ${SOname}.\n\t\tPart of the point of this weekend trip is to spend time with ${SOname} so you intend to make it a priority to actually do so!  In that spirit, you take ${SOpronoun3} to lunch at a trendy brewery overlooking the river, then a walk along said river, where you hold hands, talk about a little bit of everything, and enjoy the scenery.  Afterwards, you head back to the hotel for a romantic couple's massage.  What a beautiful afternoon!\n\t\t*set relationship_SO %+35\n\t\t*goto ConventionNight\n\n\t#I want to try out the hotel's swimming pool.\n\t\tThere's a swimming pool!  You want to swim!  So you spend your afternoon doing laps, jumping off the diving board, and basking in the sun.  This is the life!\n\t\t*goto ConventionNight\n\n*label ConventionNight\n\n*page_break\n*temp SOmad false\n\nAfter the convention hall is closed for the evening, you and the other attendees from your fire department (and accompanying significant others) all head to an Italian restaurant to hang out, discuss the day's events, and generally have a good time.  Afterwards, Gina Zlenko, Damon Warner, and Chief Rob Kalinowski all want to check out some of the local nightlife. They invite you along.\n\nWhat do you choose to do with your evening?\n*choice\n\t#I go hang out with the gang and enjoy city nightlife!\n\t\t*if conventionSO\n\t\t\tWhat about ${SOname}?  Do you invite ${SOpronoun3} to come along?\n\t\t\t*choice\n\t\t\t\t#Of course!\n\t\t\t\t\tIf you're going out, of course you're going to invite ${SOname} along. To do otherwise would be exceedingly rude!  Besides, you enjoy spending time together.\n\n\t\t\t\t\tYou ask ${SOname} if ${SOpronoun1} would like to check out the local bars and clubs with you and the others, and ${SOname} enthusiastically agrees, excited to see what the city has to offer.\n\t\t\t\t\t*set relationship_SO %+20\n\t\t\t\t\t*set relationship_firefighters %+10\n\t\t\t\t\t\n\t\t\t\t\t*goto NightLife\n\ ck at the hotel, ${SOname} is more than happy to cheerfully decline the invitation to go out with the others.\n\t\t*goto RomanticEvening\n\t*if (conventionSO) #I discuss the options with ${SOname}.\n\t\tThe way you see it, this isn't entirely your decision to make. So you talk to ${SOname} to come up with some plans for the evening together.  After all, there are several options:  You could go out with the gang, you and ${SOname} could go out, just the two of you, or you and ${SOname} could spend a cozy, quiet evening alone in your hotel room.  \n\n\t\t\"Well,\" ${SOname} begins, thoughtfully. \"Who's to say we can't do more than one of those things?  How about we go out with the others for a couple hours and see what the nightlife is like around here?  But let's not stay out too late.  I'd love to spend some time with you in private too.\" ${SOname} gives you a pointed look, a smile, and a kiss.\n\n\t\tIt sounds like a good plan to you!\n\t\t*set relationship_SO %+20\n\t\t*goto NightlifeRomance\n\t*if not (conventionSO) \n\t\t#It's been a long day. I head back to my hotel room.\n\t\t\tYou're tired, both physically and mentally.  It's been a long day.  And you want to enjoy your hotel room!  \n\n\t\t\tSo you say good night to everyone and head back to the hotel on your own. You have a king-size bed all to yourself, plus a TV with several hundred channels.  There's also a whirlpool tub that you plan on giving a try. \n\n\t\t\tYou have a very relaxing and luxurious evening and wake up the next morning rejuvenated and ready for a brand new day.\n\n\t\t\t*goto ConventionTraining3\n\n\n*label Nightlife\n*page_break\n\n*if (SOmad)\n\tSo you and ${SOname} spend the evening out with Gina, David, Rob (who you still call \"Chief\" because it's a hard habit to break), and Chief Rob's wife Leah. The first bar you visit is not a good experience. It's so loud that you can hardly hear yourselves think much less engage in any sort of conversation, and that's not even mentioning the funny smell. \n\n\tThe group quickly moves on to a quieter bar/lounge.  The ambience is a lot classier, with live jazz musicians and comfortqble leather couches. You stay here for several hours, with everyone talking, drinking, and getting along generally very well. Unfortunately, ${SOname} is still kind of ticked off that you wanted to exclude ${SOpronoun3} so ${SOname} spends most of ${SOpronoun2} time focused on conversation with the others.  \n\n\tAt some point, it does occur to you to apologize for being a jerk and the two of you end up sitting together and holding hands.\n\n\t*page_break\n\n\tLater that night (or more like very earlier the next morning), everyone heads back to their hotel rooms. You and ${SOname} are both exhausted and tumble unceremoniously onto the luxury king-sized bed.  Half-asleep, you make love tenderly and then drift off into dreams.\n\n\t*set relationship_SO %+20\n\t*set relationship_firefighters %+30\n\t*set relationship_officers %+20\n\t*goto ConventionTraining3\n\n*elseif (conventionSO)\n\tSo you and ${SOname} spend the evening out with Gina, David, Rob (who you still call \"Chief\" because it's a hard habit to break), and Chief Rob's wife Leah. The first bar you visit is not a good experience. It's so loud that you can hardly hear yourselves think much less engage in any sort of conversation, and that's not even mentioning the funny smell. \n\n\tThe group quickly moves on to a quieter bar/lounge.  The ambiance is a lot classier, with live jazz musicians and comfortable leather couches. You stay here for several hours, with everyone talking, drinking, and getting along very well. You sit right next to ${SOname}, hold ${SOpronoun2} hand, and smile at each other adoringly from time to time. \n\n\t*page_break\n\n\tLater that night (or more like very earlier the next morning), everyone heads back to their hotel rooms. You think you are exhausted, but then ${SOname} takes you in ${SOpronoun2} arms and kisses you in a way that makes you realize you still have a little more energy after all. You hastily pull off each other's clothes, until, skin against skin, you fall together into the luxurious king-sized bed. Together you spend the sweetest, most passionately memorable night.\n\n\t*set relationship_SO %+40\n\t*set relationship_firefighters %+30\n\t*set relationship_officers %+20\n\t*goto ConventionTraining3\n\n\n*else\n\tSo you spend the evening out with Gina, David, Rob (who you still call \"Chief\" because it's a hard habit to break), and Chief Rob's wife Leah. The first bar you visit is not a good experience. It's so loud that you can hardly hear yourselves think much less engage in any sort of conversation, and that's not even mentioning the funny smell. \n\n\tThe group quickly moves on to a quieter bar/lounge.  The ambience is a lot classier, with live jazz musicians and comfortable leather couches. You stay here for several hours, with everyone talking, drinking, and getting along generally very well.\n\n\t*page_break\n\n\tLater that night (or more like very earlier the next morning), everyone heads back to their hotel rooms. You have a king-size bed all to yourself, plus a TV with several hundred channels that you are too exhausted to watch.  You fall asleep very quickly, and, before you know it, it's time to get up and begin a new day.\n\n\t*set relationship_firefighters %+30\n\t*set relationship_officers %+20\n\t*goto ConventionTraining3\n\n*label RomanticEvening\n*temp rose_color \"\"\n\n*page_break\n\nSo you set ${SOname} up with a drink in the hotel lounge and ask ${SOpronoun3} to join you upstairs in your room in 20 minutes. You smile all mysteriously at ${SOpronoun3} so ${SOpronoun1} can't help but humor you in this matter.  You leave ${SOpronoun3} with a single red rose and a chivalrous bow.  Then you race up to the room for some final preparations!\n\n*page_break\n\nLet's sort a few things out, then. Shall we?\n\nFirstly, what color roses do you choose for this occasion?\n*choice\n f silence before ${SOname} replies, \"Of course, ${fname}. There's no one else in the world I'd rather be with.\" \n\n\tYou place the ring on ${SOpronoun2} finger and sweep ${SOpronoun3} into your arms for a tender, passionate kiss.\n\t*goto RomanticEvening6\n\n*elseif gift = \"necklace\"\n\tYou reach into a bag and pull out a small jewelry gift box tied with a decorative bow, which you hand to ${SOpronoun3}. \"For you,\" you declare.\n\n\t*page_break\n\n\t\"Goodness, ${fname}.\" ${SOname} seems taken aback by all of your efforts. \"You really went above and beyond here!\" ${SOname} carefully opens the box to reveal a sterling silver pendant dog-tag-style pendant, inscribed on the underside with both your names.\n\n\t\"I just wanted to get you a little something so you could wear it and never forget how important you are to me, how much you are loved,\" you explain.\n\n\t\"I love it!\" ${SOname} declares. \"Thank you.\"  ${SOname} puts on the necklace right away and models for your approval.\n\n\t\"You look wonderful, as always,\" you state, with heartfelt sincerety.  Then you take into your arms for a tender, passionate kiss.\n\t*goto RomanticEvening6\n\n*elseif gift = \"boxers\"\n\n\tYou reach into a bag and pull out a flat gift box tied with a decorative bow, which you hand to ${SOpronoun3}. \"For you,\" you declare.\n\n\t*page_break\n\n\t\"Goodness, ${fname}.\" ${SOname} seems taken aback by all of your efforts. \"You really went above and beyond here!\" He carefully opens the box to reveal sexy, silky boxer shorts. \n\n\t*page_break\n\n\tHe looks at you, and you grin back at him, with an interesting combination of shyness and anticipation. \"I hope you like them. I saw these and I couldn't help but image how amazing you would look in them,\" you admit, a little sheepishly, as you are still uncertain about how he will react to your gift.\n\n\t*page_break\n\n\t\"Well, you won't have to imagine any longer,\" he states at that and promptly disappears into the bathr  with an interesting combination of shyness and anticipation. \"I hope you like it. I saw this and I just couldn't help but image how amazing you would look in it,\" you admit, a little sheepishly, as you are still uncertain about how ${SOname} will react to your gift.\n\n\t*page_break\n\n\t\"Well, you won't have to imagine any longer,\" ${SOname} states at that and promptly disappears into the bathroom to change.  \n\n\tWhen ${SOname} emerges, your breath catches in your throat.  You stare. \"Wow,\" you manage to whisper. \"Just wow.\" \n\n\t${SOname} seems very pleased by your reaction.  \"You're not so bad yourself,\" they proclaim.  Then ${SOname} crosses the room to sweep you into their arms for a decidedly passionate kiss.\n\n\t*goto RomanticEvening6\n*elseif gift = \"scrapbook\"\n\tYou reach into a bag and pull out a flat gift box tied with a decorative bow, which you hand to ${SOpronoun3}. \"For you,\" you declare.\n\n\t*page_break\n\n\t\"Goodness, ${fname}.\" ${SOname} seems taken aback by all of your efforts. \"You really went above and beyond here!\" ${SOname} carefully opens the box to reveal the scrapbook that you had worked so hard to create.  Page by page, ${SOname} goes through the book, admiring the collection of photos, ticket stubs, and other assorted memories from your relationship so far, up to and including a photograph of the two of you together at the restaurant earlier this evening. \"Wow!\" your beloved breathes, genuinely amazed.  \"This is incredible. I can't imagine how much work you put into making this for me. Thank you so much!\"\n\n\t*page_break\n\n\t\"You're very welcome,\" you reply sincerely. \"Our memories are so important to me. I don't want to forget a single moment of the happy times I spend with you.  And you'll notice that I've left plenty of blank pages for the future.\"\n\n\t\"I did notice that,\" ${SOname} assures. \"And I'm looking forward to future adventures -- speaking of which, how about we start on that right now?\" \t${SOname} wraps you in ${SOpronoun2} arms for a tender, passionate kiss. \n\t*goto RomanticEvening6\n\n\n*label RomanticEvening6\n\n*page_break\n\nWhen you pause to catch your breath, you see your desire reflected in your beloved's eyes. ${SOname} gasps as you touch ${SOpronoun3} just so and pulls you to ${SOpronoun3} again, and this time ${SOpronoun2} kiss is urgent with need. \n\n\"I don't think we'll be getting much sleep tonight,\" you murmur.\n\n\"Neither do I,\" ${SOname} agrees, pulling you down with ${SOpronoun3} into the luxurious king-sized bed.\n\n*page_break\n\nThe night passes in a blur of heat, with astonishing heights of pleasure and a depth of tenderness that amazes you both. Eventually, hours later, you drift to sleep in each others arms, satisfied and enormously content. \n\nWhen the alarm clock goes off, it is extremely difficult for you to crawl out of the warm bed. Sure, you might feel a little sore, but you feel better than you have in a very long time as you shower, dress, and prepare for this new day. \n\n*set relationship_SO %+80\n*goto ConventionTraining3\n\n\n*label NightlifeRomance\n\nSo you and ${SOname} spend part of the evening out with Gina, David, Rob (who you still call \"Chief\" because it's a hard habit to break), and Chief Rob's wife Leah. The first bar you visit is not a good experience. It's so loud that you can hardly hear yourselves think much less engage in any sort of conversation, and that's not even mentioning the funny smell. \n\nThe group quickly moves on to a quieter bar/lounge.  The ambiance is a lot classier, with live jazz musicians and comfortable leather couches. You stay here for a while, with everyone talking, drinking, and getting along very well. You sit right next to ${SOname}, hold ${SOpronoun2} hand, and smile at each other adoringly from time to time. \n\n*page_break\n\nAfter a couple hours, you and ${SOname} bid everyone good night and head back to your hotel room together.  It's been a very long day, and you are feeling pretty exhausted. But then ${SOname} takes you in ${SOpronoun2} arms and kisses you in a way that makes you realize you still have more energy after all. You hastily pull off each other's clothes, until, skin against skin, you lie down together into the luxurious, king-sized bed. Together you spend a sweet and most passionately memorable night, until, hours later, you drift to sleep in each others arms, satisfied and enormously content. \n\n*set relationship_SO %+40\n*set relationship_firefighters %+30\n*set relationship_officers %+20\n*goto ConventionTraining3\n\n\n*label ConventionTraining3\n\n*page_break\n\nIn the morning and only time slot for Day 2, you have a choice of three different classes/training sessions.  What do you wish to do?\n\n*choice\n\t#Class - Basement Fires: Special Considerations and Tactics\n\t\tYou have yet to experience a basement fire yourself, but, from your training, you know that they bring with them a unique set of factors and concerns.  In this class, you learn about how fires can spread in basements both vertically and horizontally, potentially damaging the overall stability of the structure above.  You learn about proper search procedures and basement-specific ventilation techniques, among other things.  Overall, it's a very informative class.\n\t\t*set contraining +1\n\t\t*set fire_knowledge %+30\n\t\t*set fire_skills %+20\n\t\t*goto ConventionEnd\n\n\t#Training - Bailout Techniques: How to Get Out of a Burning Building Quickly and Not Die\n\t\tSometimes the situation in a burning building can take a turn for the worse, be it because of an impending flashover, structural instability, or any number of other hazardous events.  In these situations, you have to get out of there immediately or you will most likely not survive.\n\n\t\t*page_break\n\n\t\tIn this training, a specially constructed tower with a second story window is used so firefighters can take their technical knowledge of bailout methods and, in a controlled environment, actually experience the sensation of going head first out a window.  The class covers the use of \"bailout kits,\" that consist of a harness incorporated into the bunker pants and a hook to jam into the side of the window frame before jumping out. You also get to experience firsthand in which multiple firefighters need to rapidly evacuate from a second story using a ladder placed at the window for this purpose.\n\n\t\tIt's a scary and exhilerating training session, but you know very well that the skills you gain now could very well save your life one day.  So it's definitely worth it!\n\t\t*set contraining +1\n\t\t*set strength %+20\n\t\t*set fire_skills %+35\n\t\t*goto ConventionEnd\n\n\t#Class - Firefighting Lessons from History \n\t\tThis classroom experience involves a collection of news reports, fireground recordings, photographs, and stories told firsthand from firefighters who have experienced any number of assorted grave and potentially avoidable tragedies in the line of duty. While in many cases these accounts are difficult to hear, the goal is to learn from mistakes in the past that they might never be repeated in the future.  You leave the classroom feeling solemn and thoughtful but undoubtedly wiser for the experience.\n\t\t*set contraining +1\n\t\t*set relationship_firefighters %+20\n\t\t*set fire_knowledge %+30\n\t\t*goto ConventionEnd\n\n\t*if (conventionSO) #I want to spend this last morning away having breakfast with ${SOname} and maybe checking out some local points of interest together.\n\t\tThis is the last morning of your stay in the city so it's important to make spending time with ${SOname} a priority.  So you have a lovely breakfast together in a restaurant on the 40-somethingth floor of the hotel, with an amazing view of the cityscape and the river gleaming in the sunlight. Afterwards, the two of you head to a couple different places you wanted to experience together, to see the sights and take some pictures to preserve the happy memories.\n\t\t*set relationship_SO %+20\n\t\t*goto ConventionEnd\n\n\t*if not (conventionSO) \n\t\t#I'd like to spend some time exploring the city.\n\t\t\tIt's not every weekend you get to go to city!  So you want to make the most of your time here.  You leave the convention a little early so you can explore the city for a few hours and see the sights.  You find an amazing ice cream parlor with 88 different flavors, most of which were rather unusual. So you end up enjoying scoops of grapefruit and winter melon ice cream while sitting in a park and basking in the sun.  What a great morning!\n\t\t\t*goto ConventionEnd\n\n*label ConventionEnd\n\n*page_break\n\n*if contraining = 3\n\tYou certainly made good use of your time at the convention. You took advantage of every class you could squeeze into your schedule and return to $!{town_name} with a breadth of new knowledge and skills that you can use to be a better firefighter. \n\t*finish\n\n*elseif contraining = 2\n\tYou made good use of your time at the convention, while also taking a little bit of time to enjoy your weekend in other ways.  You return to $!{town_name} refreshed and with a breadth of new knowledge and skills that you can use to be a better firefighter. \n\t*finish\n\n*elseif contraining = 1\n\tYou managed to squeeze one class into your busy schedule of doing other things.  Since your fire department paid for you to go to this convention, the officers are not all too terribly pleased that you only attended that one class and otherwise just enjoyed yourself.  At least you learned some things, however!\n\t*set relationship_officers %-20\n\t*finish\n\n*elseif contraining = 0\n\tYour fire department paid for you to attend this convention, and you pretty much took it as a mostly expense-paid vacation, courtesy of your town's taxpayers.  Not cool, ${Lname}.  Your officers are not too terribly pleased about this.  But, hey, at least you got a free fire convention t-shirt!\n\t*set relationship_officers %-40\n\t*set relationship_firefighters %-20\n\t*finish\n\n\n\n\n\n\n", "11bigfire": "*temp air \"\"\nOne Saturday afternoon in the fall, the members of the $!{town_name} Fire Department opens their doors to the community so that all who wish can gather together for a memorial service to honor firefighters from around the country who in the past year had lost their lives in the line of duty. \n\nBefore everyone present, Chief Gordon gives a short introduction and reads a list of names of fallen firefighters, and, after each name, one of the fire commissioners rings a bell in solemn remembrance. Fire Chaplain Olivia Foster talks about honor, sacrifice, courage, and loss from a more spiritual perspective.  Everyone together salutes the flag and remains standing for a recording of the national anthem, followed by Taps played by a lone trumpeter. \n\n\n\n*if SchmidtDead \n\t*page_break\n\tPerhaps the most difficult part of the ceremony for everyone was when the Chief read the name of $!{town_name}'s own: Firefighter Tamara Schmidt.  There is also the unveiling of a plaque in her honor to be displayed at the fire house hereafter, with a slightly smaller version presented to the Schmidt family to keep at her home.\n\t*goto CeremonyEnd\n\n*else\n\t*goto CeremonyEnd\n\n*label CeremonyEnd\n*page_break\n\nAll and all, it was a sober but dignified event.  And that evening you went to sleep feeling proud to be a volunteer firefighter.\n*page_break\n\n*goto Pager\n\n*label Pager\n\nOf course, sometime in the middle of the night, when you are deeply asleep and very comfortable, your pager goes off:\n\n\"$!!{town_name} FIRE DEPARTMENT, YOU HAVE STRUCTURE FIRE AT 4 ROANOKE ROAD, MULTIPLE VICTIMS TRAPPED. REPEATING FOR $!!{town_name} FIRE DEPARTMENT: YOU HAVE STRUCTURE FIRE AT 4 ROANOKE ROAD, MULTIPLE VICTIMS TRAPPED. TIME NOW IS 0437.\"\n\nThere is no way you can even call yourself a firefighter if you don't respond to a fire call in which victims are trapped.  This is serious business. This is life and death.\n*set responses +1\n*page_break\n\nEvery second is crucial.  You jump out of bed, grab your clothes, and race to the door while you are still pulling on your shirt.  Never mind tying your shoes.  You run out the door, get into your car, and drive to the firehouse as quickly as you possibly can while still being reasonably safe.\n\nYou make good time.  Several other firefighters are pulling up in their cars as you arrive: Engine Company Captain Simmons is among them, as are Firefighters Velez, McCollaugh, and Zlenko, all of them bleary-eyed and pulling on their bunker gear as quickly as possible.  Probie ${NPname} arrives just in time to make the truck.\n\n*page_break\n\nWith this level of urgency, it doesn't matter what company you're in.  Everyone present climbs in the first due fire engine. The next group that arrives will bring the ladder truck. \n\nYou sit by the window in the engine, and quickly pull the straps of your SCBA over your shoulders and into place.  The emergency lights reflect off the passing scenery.  You can hear the radio chatter from the front of the cab.  \n\nChiefs Gordon and Smith are en route to the scene in their respective chief's cars. Mutual aid requests are going out to neighboring fire departments.  They can be canceled if additional manpower isn't required, but it's better to be over-prepared than not have enough help.\n\n*page_break\n\nFrom blocks away, you can already see the black column of smoke. As you near the address of the fire, you can see neighbors standing out on their lawns, huddled together, curious, horrified, and silently thankful that their own homes are okay.\n\nYou soon come to a two-story colonial home with rose bushes blooming on the front lawn. At least half of the home is on fire, first and second floor. It looks bad.  In fact, it's the worst fire you've ever seen.  \n\n*page_break\n\nTwo police cars pull up hastily just after your truck comes to a stop. One of the police cars parks half on someone's front lawn to keep some space free on the street.\n\nThe firefighters climb down and start grabbing hose line and tools even as they wait for the captain's orders.  Everyone looks grim.  This call is serious.  \n\n*page_break\n\nA half-dressed woman comes running over to Captain Simmons. \"Help!\" she cries, her voice torn with panic.  There's soot smeared on her face and bathrobe. She's holding a screaming infant in her arms.  \"Oh, God!  They're still in there!  Help them!\"\n\nThe words chill you to the bone.\n\n*page_break\n\n*if company = \"Truck\"\n\t*goto TruckCompany\n*elseif company = \"Engine\"\n\t*goto EngineCompany\n\n*label EngineCompany\n\nAs the current ranking officer on scene, Captain Simmons immediately takes charge.  She points to you, Velez, and ${NPname}.  \"Search team,\" she says simply. \"I'll join you in a minute.\" \n\nAlthough you are a member of the Engine Company, she needs a full team for the rescue operation, and it seems you are a part of it. Firefighters Zlenko and McCollaugh start pulling lengths of hose from the truck to get a supply line to the hydrant ASAP.\n\n*goto SearchTeam\n\n\n*label TruckCompany\n\nAs you are in the Truck Company, Captain Simmons points to you, Velez, and ${NPname}.  \"Search team,\" she says simply. \"I'll join you in a minute.\"  Firefighters Zlenko and McCollaugh start pulling lengths of hose from the truck to get a supply line to the hydrant ASAP.\n\n*goto SearchTeam\n\n*label SearchTeam\n\n*temp sequipment \"\"\n*temp no_air false\n*temp save_victim \"\"\n\n\nVelez grabs a set of irons from the truck (ax and halligan).  The probie takes a search hook.  What equipment do you choose?\n\n*choice\n\t#Another set of irons.\n\t\tYou grab another ax and halligan, as these are the basic tools when it comes to forcible entry and breaking through walls.\n\t\t*set sequipment \"irons\"\n\t\t*goto MoreInfo\n\n\t#A pike pole.\n\t\tPike poles are usually used for overhaul, for checking ceilings for fire overhead, and for assessing the stability of the floor. You think one might come in handy during this search. You heft a 6-foot pike pole over one shoulder.\n\t\t*set sequipment \"pikepole\"\n\t\t*goto MoreInfo\n\t#A water can.\n\t\tYou figure you might need water before the hose team can get properly positioned so you pull a water can from the truck.  Sure, it's heavy, but it just might save someone's life.\n\t\t*set sequipment \"watercan\"\n\t\t*goto MoreInfo\n\n*label MoreInfo\n*page_break\n\nThe captain and a police officer try get more information from the distraught woman. \n\n\"My boy, my son, Joshua.  He sleeps upstairs.  I couldn't get to him!  The smoke was too thick.  The fire!  Oh, god!  I couldn't breathe!  \n\n\"And my father.  He sleeps in the downstairs bedroom, at the back of the house.  He can't walk.  He needs a wheelchair. There was no time.  I had to get my baby out. Oh, God!  Please save them!\"\n\n*page_break\n\n\"Let's get going, people!\" Captain Simmons orders, frowning at the house.  Half of it is fully involved at this point, an inferno with flames bursting through several of the windows.\n\nAnd something is wrong with the engine pump.  They can't get the water to flow properly. Without water,the whole operation is doomed; the fire will continue to rage uncontrolled. \n\n*page_break \n\n\"Damn it!\" the Captain curses. \"Go without me. Go!\" she orders the search team, your team.  You and the others are already near the front porch, ready.\n\nHow are you feeling?\n\n*fake_choice\n\t#I feel determined.\n\t\tYou just might have the ability to help save a life or multiple lives, and you're determined to do just that. \n\t#I admit that I'm scared.\n\t\tYou're about to enter a building that's very much on fire to try to save people whose lives might be entirely dependent on whether or not you can get to them in time.  Any way you look at it, this is scary business.\n\t#I'm not feeling right now. I just need to do.\n\t\tYou know better than to feel right now.  There's a job to be done, and you're here to do it.\n\n*page_break\n\n\"What's the plan?\" you ask Velez because you need to know.  He's the senior firefighter in the group, which means he's in charge of the search team. Being in charge in this department also means he has the only radio in the group and will be the point of communication between your team and the incident commander.\n\n\"It will be harder to reach the boy upstairs,\" he says, looking grim, \"which is why we have to try to get there first.\"\n\n*if fire_knowledge >60\n\t*page_break\n\n\tYou look up at the house.  You can see flames and smoke from almost every window on the second floor at this point, and now they are licking through the top of the roof.  No firefighter in their right mind would enter a structure so fully involved unless there was someone trapped and a chance of saving of them.  \n\n\tEven so, you have a strong feeling that there's no safe way to get into that second floor at this point.  And now, with the roof on fire, a structural collapse could happen at any moment. In your opinion, the best bet is to try to save the victim on the ground floor.  Otherwise, you might save no one at all.\n\n\tDo you share your thoughts with Velez?\n\n\t*choice\n\t\t#Yes.  This is important.\n\t\t\t\"Velez,\" you say, after a moment, tapping his arm. \"I think we need to try to go after the old man.\"  You explain your reasoning as quicky as you can. \n\n\t\t\tVelez takes your words seriously and looks deeply troubled.  This is a terrible call to have to make. In fact, you know he has a teenage son, himself.  \"We're this kid's only chance, ${Lname},\" he tells you. \"We have to try.\"\n\t\t\t*set Leadership %+10\n\t\t\t*goto LadderApproach\n\n\t\t#No.  I keep my mouth shut.\n\t\t\tThe last thing you need to be doing right now is questioning orders.  Velez has at least two decades more experience than you do.  He knows what he's doing.\n\t\t\t*goto LadderApproach\n*else\t\n\t*goto LadderApproach\n\n*label LadderApproach\n*temp delay false\n*page_break\n\n\"${Lname}, ${NPname}, go get the ladder, quickly now,\" he orders, and you and the probie run to do just that.\n\nYou both hurry back to Velez with the unwieldy ladder on your shoulders. \"Where should we put this?\" you ask, looking uncertainly up at the selection of flaming windows.\n\n\"The last one on the far left,\" Velez decides as he peers up at the house.  The window in question has smoke pouring out but no active flames. \"We're going to do a Vent-Enter-Isolate-Search.  Remember that from your training?\" \n\n*page_break \n\nYou do.  The search procedure involves setting up a ladder at a second story window, breaking the window glass for ventilation, entering the room, closing the door to isolate the space from the fireload, searching the room for victims, then exiting the room via the ladder and moving it to the next window to search another room.  \n\n*page_break\n\nYou help Probie ${NPname} to get the ladder set up quickly, using the end of it to shatter the remaining glass from the window and break away the frame until it can be used as an entrance.  Broken shards fall to the ground. Smoke pours out more vigorously. It looks horribly dangerous. \n\nFirefighter Velez is up the ladder faster than you've ever seen anyone climb before.  You just know he's thinking of his own teenage son. \n\n*page_break\n\nYou watch Velez straddle the sill and carefully sweep the floor beneath him with his halligan tool, as victims are often found near windows and doors overcome by smoke while attempting to escape. You can tell he finds nothing, however, and in the next moment he is sounding the floor with the halligan, making sure it will still hold his weight.  Evidently he decides that it does because, a moment later, he disappears into the room, without issuing any instructions to you.\n\nThis is highly unusual. What do you do?\n*choice\n\t#I go up the ladder after him. We're a search [i]team[/i], after all.\n\t\t*goto JoinSearch\n\t#I wait at the base of the ladder for further instructions.\n\t\tYou stand at the base of the ladder attentively. You aren't sure if you're supposed to follow Velez or not, but you figure it's better to wait until somebody tells you what to do than to go about freelancing. \n\t\t*goto Delay\n\t#I see if I can find Captain Simmons.\n\t\tYou look around for the Captain, figuring that she would have some idea of what you ought to be doing.  Standing around idly doesn't seem to be the best use of your time, after all.\n\t\t*goto Delay\n\t#There's no way I'm going in there!\n\t\tAs far as you can tell, this fire looks far worse than any you've been in before.  In your expert opinion, there is no way you should be going in there.  You don't want to die!  \n\n\t\tSo you stay right where you are.\n\t\t*goto Idling\n\n*label Delay\n\n*page_break\n\nYou spot Captain Simmons at a distance, intermittently struggling with the hydrant and issuing commands on her radio.  She looks intensely busy and unlikely to be joining you any time soon.  In any case, she's Captain of the Engine Company. And the hose team has already stretched the hose into the house, but they have no water.  \n\nWhat do you do now?\n*choice\n\t#I head up the ladder after Velez.\n\t\t*set delay true\n\t\t*goto JoinSearch\n\t#I wait for further instructions.\n\t\tSince Velez is your team leader and he doesn't reappear in the window, you basically stand around at the bottom of the ladder doing nothing.  Hopefully Captain Simmons or another officer will come to issue you proper orders very soon.\n\t\t*goto Idling\n\n*label Idling\n*set do_nothing true\n*page_break\n\n*if probieSO\n\tYou chat a bit with ${NPname}, talking about how bad the fire looks and how cute ${NPpronoun1} looks in their bunker gear.\n\t*goto DoNothing\n*else\n\tYou do this for a couple minutes, pretty much just looking around at everyone else as they hurriedly go about doing all manner of important things.  It occurs to you that maybe you ought to be doing something too and you also wonder what the deal is with Velez since he never came back or told you to do anything in particular.\n\t*goto DoNothing\n\n*label DoNothing\n\nSuddenly, orange flame bursts from the window where you had place the ladder.  The entire second floor is promptly consumed in a conflagration of red, orange, and black.  Captain Simmons starts issuing orders into her radio. The engine's horn sounds three long times to indicate that everyone should evacuate the building.\n\nThere is no sign of Firefighter Velez.\n\n*page_break\n\n\"Where is Velez?\" the Captain demands, having run over to you and Probie ${NPname}.  \"You're on his team.  Where is he?\"\n\nWhat do you tell her?\n\n*fake_choice\n\t#\"I don't know.\"\n\t\t\"I don't know,\" you stammer. Everything's happening at once.\n\n\t\t\"What do you mean you don't know?\" Captain Simmons yells, furious.  \"You're supposed to be with him!\" \n\n\t\t\"He climbed up into the room and disappeared,\" you explain. \"I was waiting for orders.\"\n\n\t\tThe Captain stares at you in disbelief, as if wondering how you could possibly be so stupid.  \n\t\t\n\t#\"I think he's still in the house.\"\n\t\t\"You [i]think[/i]?  You don't [i]know[/i]?\" Captain Simmons seems baffled. \"Aren't you supposed to be with him?\"\n\n\t\t\"I -- uh -- well --\" you reply, suddenly feeling a thousands kinds of awful.\n\n\t\t\"Firefighter Velez went up the ladder into the house, Ma'am,\" Probie ${NPname} offers, far more intelligently.  \"Firefighter ${Lname} was waiting for orders, but he didn't come back.\"\n\n\t\tThe Captain stares at you in disbelief, as if wondering how you could possibly be so stupid.\n\n\t#I can't even speak.\n\t\t\"I -- uh -- well -- um -- he -- I was -- \" Your reply is not impressive.\n\n\t\t\"Firefighter Velez went up the ladder into the house, Ma'am,\" Probie ${NPname} offers, far more intelligently.  \"Firefighter ${Lname} was waiting for orders, but he didn't come back.\"\n\n\t\tThe Captain stares at you in disbelief, as if wondering how you could possibly be so stupid.\n\n*set relationship_officers %-40\n*set relationship_firefighters %-40\n*goto FirefighterDown\n\n*label FirefighterDown\n*page_break\n\n\"Firefighter down,\" Simmons says into her radio.  \"I repeat: Firefighter down.  Velez is still in the house. Second story bedroom, exposure one.\"\n\nThe Rapid Intervention Team gathers, but nobody can enter the house at this point. It is a great wall of flame with a tower of black smoke bleeding up into the sky.  \n\nOnly some time later, once the tower ladders have been brought in and the fire reduced to more manageable proportions can the search begin.  At that point, this is no longer a rescue operation; it's a recovery of bodies.\n\nThree people died in that terrible fire that day, the teenage boy, his disabled grandfather, and Firefighter Velez. And you will never know if there was anything you could have done that would have made a difference.\n\n*goto VelezFuneral\n\n*label JoinSearch\n\n*if delay\n\n\tYou have Probie ${NPname} stay behind to foot the ladder and make sure it's secure, while you climb up after Velez, gloved hands on the outside of the ladder, one foot after the next until you reach the smoky window.  At this point, you have to put your mask on and turn on the air. You can see nothing inside the smoke-filled room.  \n\n\t\"Velez?\" you holler through your mask, but there is no reply.  As the team leader, Velez is the only one of your group equipped with a radio so you cannot contact him that way.  He is clearly not following protocol for Vent-Enter-Isolate-Search.\n\n\tWhat do you do next?\n\n\t*choice\n\t\t*selectable_if (sequipment = \"irons\") #I test the floor with my halligan to see if I can enter.\n\t\t\tLike Velez did before you, you use your halligan to test the solidity of the floor beneath the window to make sure it will be able to hold your weight.  It seems solid enough so you climb through and quickly get as low as possible beneath the thick smoke. In conditions like this, you might as well be blind.  \n\n\t\t\t\"Velez?\" you call again. There is no reply.\n\t\t\t*goto SearchVelez\n\n\t\t#I dive in through the window to try to stay below the smoke.\n\t\t\tYou very dramatically dive in through the window and hit the floor hard with your right shoulder.  That was really kind of ridiculous. Fortunately the floor holds your weight, you didn't land on anybody, and you seem to be more or less okay. \n\n\t\t\t\"Velez?\" you call again, keeping your head beneath the smoke and pausing a second for the pain in your shoulder to subside a bit. There is no reply.\n\t\t\t*goto SearchVelez\n\n\t\t#This is more than I can deal with alone. I yell for Captain Simmons.\n\t\t\tWhen Velez doesn't reply, you start to get very concerned. \n\t\t\t*goto VelezRIT\n*else\n\t\"Velez?\" you call out to the veteran firefighter as you reach the top of the ladder.  \n\n\t\"Over here,\" he replies.  \"I completed primary search of this room.  No victims in here.  I'm headed across the hall. I can make it to the other room.\"  As he speaks those words, you can already hear him moving further away, out into the hallway. He is clearly not following protocol for Vent-Enter-Isolate-Search.\n\n\t*page_break\n\n\tYou might be a new firefighter, but you know for certain that what Velez is doing is extremely dangerous when so much of the second floor is on fire already. For one, if he gets trapped in the other room, he'll have no ladder for egress.  Plus, he really shouldn't be venturing forth alone -- not to mention the fact that Velez is completely diverging from the Vent-Enter-Isolate-Search plan he designated only a moment before.  You have a bad feeling about this.\n\n\tDo you try to follow him?\n\t*choice\n\t\t#Yes, of course.\n\t\t\t*goto Hallway\n\t\t#No, it's too dangerous.\n\t\t\tIt's extremely dangerous and getting hotter every moment.  You have no intention of putting yourself in that position.\n\n\t\t\tWhat do you do instead?\n\t\t\t*choice\n\t\t\t\t#I call to Velez for him to come back, that it's too dangerous.\n\t\t\t\t\t\"Come back!\" you call to him in muffled tones through your mask. \"It's too dangerous! You have to come back!\"\n\n\t\t\t\t\tThere's no reply. \n\n\t\t\t\t\tDo you try to go after him now or retreat?\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I'm not leaving him behind.\n\t\t\t\t\t\t\t*goto Hallway\n\n\t\t\t\t\t\t#I head back to the window. I need reinforcements.\n\t\t\t\t\t\t\t\"Velez, it's getting too hot!\" you call to the senior firefighter. \"I'm heading back to the ladder.\"\n\n\t\t\t\t\t\t\tThere's no reply.\n\n\t\t\t\t\t\t\tIt takes you a few moments to even find the window again through the black smoke, with the room getting hotter all the while. You pull yourself up and over onto the ladder and start yelling for the officer in charge.\n\t\t\t\t\t\t\t*goto VelezRIT \n\n\t\t\t\t#I retreat back to the window.\n\t\t\t\t\t\"Velez, it's too hot!\" you call to the senior firefighter. \"I'm heading back to the window.\" \n\n\t\t\t\t\tThere's no reply.\n\n\t\t\t\t\tIt takes you a few moments to even find the window again through the black smoke, with the room getting hotter all the while. You pull yourself up and over onto the ladder and start yelling for the officer in charge.\n\n\t\t\t\t\t*goto VelezRIT\n\n*label Hallway\n*page_break\n\nYour heart is beating wildly, but you do your best to moderate your breathing so you don't use too much of your air too quickly.  You feel your way to the door, open it in a controlled manner, and stick your head out to see what is going on.\n\nThe hallway is on fire and the fire is hungry, crackling and consuming the walls and the ceiling and the floor below. The area directly outside the bedroom where you entered is still clear, but it won't be for long. You're pretty sure you can get to the room across the hall safely, but it's likely to be a one way trip. And you don't know the state of the other bedroom.\n\nWhat do you do?\n\n*choice\n\n\t#It's too dangerous. I retreat and seek help.\n\t\tVelez might be trapped.  You don't want to be trapped too. \n\n\t\t\"Velez, it's getting too hot!\" you call to the senior firefighter, in case he can hear you. \"I'm heading back to the ladder.\"\n\n\t\tYou close the door behind you to keep the fire contained and crawl your way back to the window where the ladder is waiting.\n\n\t\t*goto VelezRIT \n\n\t#I press onward.  Velez needs me.\n\t\tYou imagine yourself in Velez's boots.  You wouldn't want to be abandoned while doing a search in these conditions. And you don't think there's a single firefighter in the department that would knowingly do that to one of their own. \n\n\t\tSo you're just going to have to get to that room across the hall, regardless of the risk. \"I'm headed your way, Velez,\" you call across the way.  \n\n\t\tThere's no reply. \n\n\t\t*page_break\n\n\t\tQuickly, you scramble across the hallway, closing the one door behind you and carefully opening the next, feeling carefully in front of you before you close that one behind you as well.\n\t\t*goto SecondRoom\n\n\t*if (sequipment = \"watercan\") #I make a stand in the hallway with my water can.\n\t\tWith the main water supply delayed for whatever reason, you feel that the best hope for both you and Velez is to keep the fire in the hallway at bay with the water can you have with you.  \n\n\t\t\"Velez!\" you yell, \"I'm holding the hallway clear with the water can! This fire is bad! You better get back here now!\"  If Velez heeds your warning, you could both be back into the first bedroom and out the window in a matter of moments.\n\t\t*goto WatercanHallway\n\n\n*label WatercanHallway\n*temp watercan \"\"\n*page_break\n\nSo you make your stand.  You know the water you have won't last long or go very far so you must use it as judiciously as possible.  \n\n*gosub Air\n\n*if fire_skills >60\n\t*set watercan \"success\"\n\t*goto WatercanHallwaySuccess\n\n\n*else\n\t*set watercan \"fail\"\n\t*goto WatercanHallwayFail\n\n\n\n*label WatercanHallwayFail\n\n*if air = \"good\"\n\t*goto WatercanHallwayFail2  \t\n*elseif air = \"ok\"\n\t*goto WatercanHallwayFail2  \n*elseif air = \"warning\"\n\t*goto WatercanHallwayAirAlert\n\n*label WatercanHallwayFail2\n\n*page_break\n\nYou vaguely remember learning about how to use a water can in your training classes.  The concept it a fairly basic one; put water on the fire.  So, in theory, your task should be a simple one.\n\nBut somehow it isn't.\n\n*page_break\n\nYou open the water can and spray water onto the fire, and this terrible mist of hissing steam boils up into the room.  You put some water over there and then a little water over here and a swirl of water at the tips of the dancing flames.  As far as you can tell, your efforts are not making a difference.  In fact, the fire is advancing toward you, hungrily consuming the walls and licking at the ceiling overhead.  \n\nYou take one step backwards and then another.  You are losing ground. The path to the second bedroom is lost to flame.  There's no sign of Velez.  A moment later, you hear his PASS alarm go off, meaning he hasn't moved for 30 seconds, likely injured or unconscious.  \n\n*page_break\n\nYou are about to have to make another very difficult decision, but then you hear the hose team behind you.  Presumably, they finally have water.  They stop at the top of the stairs.  \"$Fname!\" Lieutenant Delfino yells. \"What the hell are you doing?  Get behind the hose line!\"\n\nWhat do you do?\n\n*fake_choice\n\t#I get behind the hose line!\n\t\tThe lieutenant gave you an order so you stop with your useless efforts with the water can and fall back behind the others.\n\t#I tell them about Velez.\n\t\t\"Velez is in that room!\" you call back, trying to be heard. \"I couldn't get to him!\"\n\n\t\t\"We know,\" Delfino replies. \"Now get out of the way. I'm opening the hose line.\"\n\n\t\tYou quickly fall back behind the others so as not to impede their efforts.\n\t#I get mad because he shouldn't be yelling at me like that.\n\t\t\"I'm trying to put out this fucking fire!\" you yell back, angrily. \"Where the hell were you?  Velez is in that room!  I can't get to him!\"\n\n\t\t\"We know about Velez,\" Delfino replies calmly. \"Now get out of the way. I'm opening the hose line.\"\n\n\t\tYou quickly move out of the way, behind the others.\n\n*page_break\n\nLieutenant Delfino opens up the hose line and the fire in the hallway is met with a blast of water.  He expertly pushes back the flames in a matter of seconds. \n\n*if air = \"warning\"\n\tYou've been ignoring your vibe alert, but eventually the air you are breathing starts to get thin and you start to feel light-headed. \"Hey,\" you begin, trying to let a fellow firefighter know what's going on. \"I have a problem.\" And then you pass out.\n\t*set no_air true\n\t*goto ExplanationPart1\n\n*else\n\n\tAs soon as it is possible, the lieutenant sends you and Firefighter Warner into the room in search of Velez.  You and Warner perform a quick search of the room, feeling the floor, over and under furniture, and in a closet, until you are the one who finds Velez' prone body near the room's only window. \n\n\t\"I got him!\" you call to Warner, who follows your voice to join you.  \n\n\t\"There's another victim here,\" he discovers. \"Civilian.\"  It's likely the teenage boy that Velez was looking for.  You and Warner both take lengths of webbing from your bunker gear pockets, and get the two victims hastily tied into make-shift harnesses. \"We gotta get them out of here!  It's getting too hot!\" he calls.\n\n\t*if air = \"good\" \n\t\t*goto DoubleRescue \t\n\t*elseif air = \"ok\"\n\t\tAt this point, your vibration alert goes off to warn you that you only have a couple minutes left of air. \n\n\t\tDo you mention this to Warner?\n\t\t*fake_choice\n\t\t\t#Of course I do.\n\t\t\t\t\"I'm running out of air!\" you yell to Warner.\n\n\t\t\t\t\"It's okay. Stay calm,\" he replies with the voice of experience. \"Breathe carefully. We'll all be out of here in a moment.\"\n\t\t\t#No. It's not the priority right now.\n\t\t\t\tIf you're all not out of here in a couple minutes, your air supply will only be one of many problems. So you work on controlling your breathing and remaining calm to focus on the task at hand.\n\t\t*goto DoubleRescue\n\n\n*label WatercanHallwaySuccess\n\n*if air = \"good\"\n\t*goto WatercanHallwaySuccess2  \t\n*elseif air = \"ok\"\n\t*goto WatercanHallwaySuccess2  \n*elseif air = \"warning\"\n\t*goto WatercanHallwayAirAlert\n\n*label WatercanHallwayAirAlert\n\n*page_break\n\nAt this moment, of all moments, your vibration alert goes off signifying that you have only a couple minutes left of air. \n\nWhat do you do?\n\n*choice\n\t#I carry on with my plan to use the water can.\n\t\t*if watercan = \"success\"\n\t\t\t*goto WatercanHallwaySuccess2 \n\t\t*else\n\t\t\t*goto WatercanHallwayFail2\n\t#It's time to retreat.\n\t\tIt's not a easy decision, but you feel that the only thing you can reasonably do now is retreat. You can't do any one any good if you become another person in indeed of rescue. \n\n\t\tTaking your water can with you, you make your way back into the first bedroom and close the door behind you. You follow a right-hand lead back to the window, pull yourself up over the sill, and then you climb down the ladder, pulling your mask off as you go. \"Velez needs help!\" you call, gasping for air as your boots hit the grass. \"He went into a room on exposure 3, but I couldn't reach him!\" You're drenched with sweat and covered with soot. The Chief sends you to rehab while others go after Firefighter Velez.\n\n\t\t*goto VelezDeath2 \n\n\n*label WatercanHallwaySuccess2  \n\nSo you aim the spray for the base of the fire and try to keep it from advancing. For now, it seems to be working.  There's no sign of Velez.  A moment later, you hear the high-pitched sound of his PASS
