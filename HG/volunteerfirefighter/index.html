neer\"\n\n\tYour latest project is moving into production phase soon, and you were able to get not one but two patents registered this year so far. That's quite an accomplishment! Your employer agrees and rewards you with a nice bonus accordingly.\n\n\t*goto FitnessCheck\n\n*label FitnessCheck\n\n*page_break\n\nSo, with all that's going on with your job and the fire department, not to mention trying to have some semblance of a social life, you have quite the busy schedule! What are you doing to keep in shape these days?\n\n*choice\n\t*if (fitnessbuff) #Working out has always been a priority for me and it still is.\n\t\tWhen you were first a probie, you recognized the benefits of being in shape and worked very hard to maintain a high level of fitness. Your dedication to working out hasn't changed since then. It's still extremely important. You can't imagine letting a single day go by without at least one session of serious exercise.\n\t\t*set strength +10\n\t\t*goto Icecream\n\n\t#I try to work out several times a week whenever possible.\n\t\tExercise is important, not only for your work as a volunteer firefighter but for your general health as well, and you don't forget that. You make it a point to work out several times a week, even if it just means taking a jog around the block! \n\t\t*set strength +5\n\t\t*goto Icecream\n\n\t#I work out when I can but never as much as I should.\n\t\tSometimes you feel like you hardly have time to relax so the thought of using your free time to work out can often seem unbearably exhausting.  Sure, you hit the gym from time to time, and you're not in terrible shape, but you know you could do better.  If only there were more hours in a day!\n\t\t*goto Icecream\n\n\t#Does walking to and from my car count as exercise?\n\t\tNope. It really doesn't. \n\n\t\tBut you work hard and invest a lot of time in your volunteer department so sometimes you just have to take some time to rest, relax, and enjoy yourself a little.  It's how you maintain your sanity!\n\t\t*set strength -5\n\t\t*goto Icecream\n\n*label Icecream\n\n*page_break\n\n*temp dessert \"\"\n\nSo one Tuesday after drill night, you and a bunch of other firefighters decide to go out for ice cream for the simple reasons that the evening is warm and ice cream is delicious. So why not? \n\nJuan Velez is there, along with Gina Zlenko and Probie ${NPname}.  You all sit in a booth together, Juan and Gina on one side, and you and the probie on the other. You consider the menu for a few minutes and then place your orders.\n\nWhat do you get?\n*fake_choice\n\t#A double fudge sundae with extra whipped cream.\t\n\t\tA decadent choice!\n\n\t\tSo, when it's your turn, you order your double fudge sundae (with extra whipped cream).\n\t\t*set dessert \"double fudge sundae\"\n\t\t*goto TalkCheck\n\t#A banana split.\n\t\tSounds delicious!\n\n\t\tSo when it's your turn, you order your banana split.\n\t\t*set dessert \"banana split\"\n\t\t*goto TalkCheck\n\t#A strawberry milkshake.\n\t\tAn excellent choice!\n\n\t\tSo, when it's your turn, you order a strawberry milkshake with whipped cream on top.\n\t\t*set dessert \"strawberry milkshake\"\n\t\t*goto TalkCheck\n\t#A lemon sorbet.\n\t\tHow refreshing and delicious!\n\n\t\tSo, when it's your turn, you order your lemon sorbet.\n\t\t*set dessert \"lemon sorbet\"\n\t\t*goto TalkCheck\n\n*label TalkCheck\n\n*if suspended\n\t*goto GroupTalk\n\n*else\n\tAs you're chatting with the others, whose first names you all know, you keep calling the probie by ${NPpronoun2} last name, ${NPname}, out of habit.  \"Am I ever going to get you to call me by my first name?\"  ${NPpronoun1} asks, clearly amused.  \"Do you even know what it is?\" \n\n\tDo you?\n\n\n*choice\n\t\n\t#Avery\n\t\t\"Sure I do.  It's Avery,\" you reply, with a grin.\n\t\t*set NPFname \"Avery\"\n\t\t\n\t\t\"So you [i]do[/i] know.\" ${NPFname} seems pleased.\n\n\t\t\"But of course!\" you proclaim, suavely.\n\n\t\t*goto GroupTalk\n\n\t#Jamie\n\n\t\t\"Sure I do.  It's Jamie,\" you reply, with a grin.\n\t\t*set NPFname \"Jamie\"\n\n\t\t\"So you [i]do[/i] know.\" ${NPFname} seems pleased.\n\n\t\t\"But of course!\" you proclaim, suavely.\n\n\t\t*goto GroupTalk\n\n\t#Morgan\n\n\t\t\"Sure I do.  It's Morgan,\" you reply, with a grin.\n\t\t*set NPFname \"Morgan\"\n\t\t\n\t\t\"So you [i]do[/i] know.\" ${NPFname} seems pleased.\n\n\t\t\"But of course!\" you proclaim, suavely.\n\n\t\t*goto GroupTalk\n\n\t#None of the above.  \n\t\t*goto NPTextName\n\n\t#I actually don't know!\n\t\t\"I'm sorry,\" you say, somewhat sheepishly. \"I've always just called you 'Probie' or '${NPname}'' or 'Probie ${NPname}'.  I don't think I even know what your first name is!\"\n\n\t\t\"That's quite all right,\" ${NPpronoun1} replies good-naturedly. \"My name is Sam.\"\n\n\t\tYou offer your hand for a handshake. \"Good to meet you, Sam!\"\n\t\t*set NPFname \"Sam\"\n\t\t*goto GroupTalk\n\n*label NPTextName\n\nOkay!  What's ${NPpronoun2} name, then?\n\n*input_text NPFname\n*comment capitalization check\n*if (\"${NPFname}\" != \"$!{NPFname}\")\n\tSo the probie's first name is $!{NPFname}. Is that correct?\n\t*choice\n\t\t#Yes. $!{NPFname}.\n\t\t\tGot it. Thanks.\n\t\t\t*set NPFname \"$!{NPFname}\"\n\t\t\t*page_break\n\n\t\t\t\"Sure I do.  It's ${NPFname},\" you reply, with a grin.\n\n\t\t\t\"So you [i]do[/i] know.\" ${NPFname} seems pleased.\n\n\t\t\t\"But of course!\" you proclaim, suavely.\n\n\t\t\t*goto GroupTalk\n\n\t\t#No, ${NPpronoun2} name is ${NPFname}, just as I typed it before.\n\t\t\tOkay. I was just checking!\n\n\t\t\t*page_break\n\n\t\t\t\"Sure I do.  It's ${NPFname},\" you reply, with a grin.\n\n\t\t\t\"So you [i]do[/i] know.\" ${NPFname} seems pleased.\n\n\t\t\t\"But of course!\" you proclaim, suavely.\n\n\t\t\t*goto GroupTalk\n\t\t#Oops. That's not right! Let me try that again!\n\t\t\t*goto NPTextName\n\n\n*label GroupTalk\n*set suspended false\n*page_break\n\nSoon everyone gets their order. You are thoroughly enjoying your ${dessert}.\n\n\"Are you guys going to the anniversary parade?\" Gina Zlenko wonders at one point in the conversation. Next week, the $!{town_name} Fire Department is celebrating the 85th anniversary since its founding.\n\n\"I'll be there, as usual,\" Juan Velez assures.\n\n\"I'm definitely going,\" ${NPFname} ${NPname} declares.\n\n*if relationship_firefighters >= 50\n\n\t\"What about you, ${Fname}?\" Gina asks, cheerfully.\n\n\t*choice\n\t\t#Of course I'm going!\n\t\t\t\"Of course I'm going!\" you proclaim, as if shocked that anyone would think otherwise. They grin at your enthusiasm.\n\n\t\t\t\"I'm glad to hear it!\" Gina replies, laughing a bit. \"We'd miss you if you didn't.\"\n\t\t\t*set relationship_firefighters %+20\n\t\t\t*goto GroupTalkEnd\n\n\t\t#I'll try to make it.\n\t\t\t\"I'll try to make it,\" you promise them. \"You know how crazy holidays can get.\"\n\n\t\t\t\"I sure do,\" Gina sympathizes. \"I hope you make it though. We'd miss you if you weren't there.\"\n\t\t\t*goto GroupTalkEnd\n\n\t\t#Ick. Another parade?\n\t\t\t\"Didn't we just have a parade?\" you ponder, reflectively.\n\n\t\t\t\"Well, they do come up from time to time,\" Velez points out.\n\n\t\t\t\"I like the parades,\" Gina pipes in. \"I love seeing everyone get dressed up and all the flags and floats and such. It's a lot of fun!\"\n\n\t\t\t\"Some people do seem to enjoy them,\" you concede, clearly not being one of those people. And then the conversation moves on.\n\t\t\t*set relationship_firefighters %-10\n\t\t\t*goto GroupTalkEnd\n\n\n*elseif relationship_firefighters \u003c 49\n\n\t\"What about you, ${Fname}?\" Gina asks politely.\n\n\t*choice\n\t\t#Of course I'm going!\n\t\t\t\"I will be there,\" you promise. Everyone seems surprised, for some reason. You aren't usually so enthusiastic, after all.\n\n\t\t\t\"Well, great!\" Gina replies in her usual cheerful manner, easily smoothing over any potential awkwardness. \"I'm sure it will be a lot of fun.\"\n\t\t\t*set relationship_firefighters %+20\n\t\t\t*goto GroupTalkEnd\n\n\t\t#I'll try to make it.\n\t\t\t\"I'll try to make it,\" you promise them. \"You know how crazy holidays can get.\" Nobody seems surprised that you are making excuses to try to find a way out of this.\n\n\t\t\t\"I sure do,\" Gina sympathizes, in her easy-going way. \"You should come though, if you can. It's a good way to gain public support for the department.\"\n\t\t\t*goto GroupTalkEnd\n\n\t\t#Ick. Another parade?\n\t\t\t\"Didn't we just have a parade?\" you groan with a pained expression on your face.\n\n\t\t\t\"Well, they do come up from time to time,\" Velez points out.\n\n\t\t\t\"I like the parades,\" Gina pipes in. \"I love seeing everyone get dressed up and all the flags and floats and such. It's a lot of fun!\"\n\n\t\t\tYou look at Gina like she has two heads and her cheerful grin fades into awkwardness.\n\n\t\t\t\"They're a silly waste of time,\" you declare.\n\n\t\t\t\"Well, some of us like them,\" Velez states, irritably. Then Gina quickly changes the topic.\n\t\t\t*set relationship_firefighters %-20\n\t\t\t*goto GroupTalkEnd\n\n\n*label GroupTalkEnd\n\n*page_break\n\nAfter a while of chatting and enjoying desert, Juan brings out his wallet and puts down money for his ice cream and a generous portion of tip. \"Well, I have to be at work early tomorrow morning,\" he says as he stands to leave. \"Have a good night, folks.\" \n\nOh! What time is it?\" Gina wonders, quickly checking her cell phone. \"Almost 9! Yikes! I probably should get going too.\" She fishes some cash from her pocket and adds it to Juan's on the table. \"Good night, guys!\" She heads out shortly after Juan does.\n\n*page_break\n\n*if relationship_NP >= 60\n\t${NPFname} doesn't seem ready to leave just yet. $!{NPpronoun1} considers for a moment and then asks, \"I know it's late, but would you like to stay a while longer and have a cup of coffee before we head out?\"\n\n\tWould you?\n\n\t*choice\n\t\t#Sure. Why not?\n\t\t\t*set relationship_NP +5\n\t\t\t*goto ProbieCoffe at do you say? You wanna go out with me?\"\n\n\t\tHow do you reply?\n\n\t\t*choice\n\t\t\t#Uh. No. But let's kiss more!\n\t\t\t\t\"Nah,\" you say casually, leaning in for another kiss.\n\n\t\t\t\t\"Nah?\" ${NPpronoun1} repeats confused.  Incidentally, ${NPpronoun1} also dodges your kiss.\n\n\t\t\t\tYou shrug. \"I don't really want a relationship right now. But that doesn't mean we can't be close, if you know what I mean.\"\n\n\t\t\t\t*page_break\n\n\t\t\t\t${NPfname} lifts an eyebrow and gives you a weird look.  \"You're not the kind of person I thought you were,\" ${NPpronoun1} decides, sounding disappointed. \"I really should go.\"\n\n\t\t\t\t\"Aw, don't be like that,\" you protest, but ${NPpronoun1} is already putting money down for ${NPpronoun2} coffee. \n\n\t\t\t\t\"See you around,\" ${NPfname} says and heads out, leaving you on your own.\n\n\t\t\t\t*set relationship_NP -40\n\t\t\t\t*goto ChiefTalk\n\n\t\t\t#Why did you have to go and ruin the moment?\n\t\t\t\t\"Ugh,\" you reply with a distinct lack of eloquence.\n\n\t\t\t\t\"Ugh?\" ${NPfname} repeats, looking confused.\n\n\t\t\t\t\"We were having such a nice time here, and then you had to go and ruin it.\"\n\n\t\t\t\t${NPfname} looks startled. \"I beg your pardon?\"\n\n\t\t\t\t*page_break\n\n\t\t\t\tYou shrug. \"Whatever.  Anyway.  I don't want a relationship like that just now -- okay?   But that doesn't mean we can't still be close, if you know what I mean.\"  \n\n\t\t\t\t${NPfname} lifts an eyebrow and gives you a weird look.  \"You're not the kind of person I thought you were,\" ${NPpronoun1} decides, sounding disappointed. \"I really should go.\"\n\n\t\t\t\t\"Aw, don't be like that,\" you protest, but ${NPpronoun1} is already putting money down for ${NPpronoun2} coffee. \n\n\t\t\t\t\"See you around,\" ${NPfname} says and heads out, leaving you on your own.\n\n\t\t\t\t*set relationship_NP -40\n\t\t\t\t*goto ChiefTalk\n\n\t\t\t#I changed my mind. \"Yes!\"\n\t\t\t\tYou walked into this evening absolutely con t about other things for a while as you finish up your coffee and then part ways a little later on.\n\n\t\t*goto ChiefTalk\n\n\n*label ProbieRomance\n\n*page_break\n\nSo you let your affection and desire fill your eyes and draw ${NPpronoun2} into an achingly sweet kiss that feels too good to possibly be true.\n\n*if NPgender = \"male\"\n\t\"Will you be my boyfriend?\" you ask then, breathless and hopeful.\n\n\t\"Of course I will,\" he replies and kisses you again.\n\n\tAnd that's how you and ${NPfname} got together.\n\n\t*set SO true\n\t*set EXname SOname\n\t*set SOname NPfname\n\t*set ProbieSO true\n\t*set relationship_SO 80\n\t*goto ChiefTalk\n\n\n*elseif NPgender = \"female\"\n\t\"Will you be my girlfriend?\" you ask then, breathless and hopeful.\n\n\t\"Of course I will,\" she replies and kisses you again.\n\n\tAnd that's how you and ${NPfname} got together.\n\n\t*set SO true\n\t*set EXname SOname\n\t*set SOname NPfname\n\t*set ProbieSO true\n\t*set relationship_SO 80\n\t*goto ChiefTalk\n\n\n\n*elseif NPgender = \"neutral\"\n\t\"Will you go out with me?\" you ask then, breathless and hopeful.\n\n\t\"Of course I will,\" they reply and kiss you again.\n\n\tAnd that's how you and ${NPfname} got together.\n\n\t*set SO true\n\t*set EXname SOname\n\t*set SOname NPfname\n\t*set ProbieSO true\n\t*set relationship_SO 80\n\t*goto ChiefTalk\n\n\n\n*label ProbieNoTalk\n\nFor whatever reason, you don't want to talk to ${NPfname} about your hesitations. You just want to enjoy the moment, and you certainly do! \n\nBut at every point in the conversation where you could have easily asked ${NPfname} out, you talk about something else instead.  And every time ${NPpronoun1} seems about to bring something up to that end, you deflect. \n${NPfname} isn't stupid.  ${NPpronoun1} gets the hint after a while and doesn't make a fuss about it, just like the easy-going person you know ${NPpronoun3} to be.  \n\n*page_break\n\nAt the end of the evening, ${NPpronoun1} gives you a friendly, affec lk\n\n*page_break\n\n*if relationship_SO >= 70\n\t*goto SOGoodTimes\n*elseif (relationship_SO \u003c 70) and (relationship_SO > 50)\n\t*goto SOOKTimes\n*elseif relationship_SO \u003c=50\n\t*goto SOBadTimes\n\n*label SOGoodTimes\n\nSo you've been together with ${SOname} for a while now, and things have been going very well!  \n\n*if SOfeeling=\"encouraging\" \n\n\tEven though sometimes you have been insanely busy between work and your commitment to the fire service, ${SOname} has always been supportive and loving and pretty much the best partner that you could imagine. You make time for each other whenever possible and, even if you can't see each other every day, you always make it a point to at least talk on the phone and share your thoughts. \n\t*page_break\n\t*goto SOProposal\n\n\n*elseif SOfeeling=\"worriedtime\"\n\n\tEven though you've had some challenges finding time in your life for everything important, you've managed to make your relationship work. You make time for each other whenever possible and, even if you can't see each other every day, you always make it a point to to at least talk on the phone and share your thoughts.  And you never let ${SOname} forget ${SOpronoun2} importance in your life.\n\t*page_break\n\t*goto SOProposal\n\n*elseif SOfeeling=\"worriedrespectful\"\n\n\tAlthough ${SOpronoun1} will probably never stop being worried about the dangers of firefighting,  ${SOname} respects your commitment to the fire service. And ${SOname} has also taken steps to learn more about safety measures and firefighting techniques to help allay some of ${SOpronoun2} own concerns.  Despite both your busy schedules, you make time for each other whenever possible and, even if you can't see each other every day, you always make it a point to at least talk on the phone and share your thoughts. \n\t*page_break\n\t*goto SOProposal\n\n*elseif SOfeeling=\"terrified\"\n\t${SOname} will probably never stop being terrified about the dangers of firefighting, but you've come to accept that this is because your significant other genuinely cares for you and worries for your safety.  Much to your delight, ${SOname} has taken steps to learn more about safety measures and firefighting techniques to help allay some of ${SOpronoun2} concerns. Despite both your busy schedules, you make time for each other whenever possible and, even if you can't see each other every day, you always make it a point to at least talk on the phone and share your thoughts. \n\t*page_break\n\t*goto SOProposal\n\n*label SOProposal\n\nOne evening, close to dusk, you and ${SOname} are taking a walk together in the park, enjoying some time together. The weather is perfect, warm with a slight cool breeze, and the fireflies are just beginning to twinkle all around you.\n\nAt one point, you come around a corner in the path to a gazebo where you and ${SOName} have come more than once to talk and sometimes to kiss and once to do a picnic lunch.  Only this time the gazebo looks different.\n\n*page_break\n\nFor one, the interior is lit up with strings of hundred of tiny white lights, and you notice the ground leading up to it is strewn with red rose petals. \n\nYou look to ${SOname} questioningly. ${SOname} takes your hand and leads you the rest of the way into the gazebo.  There, like in a dream, your beloved drops to one knee and looks up to you with ${SOpronoun2} face shining with love.\n\n*page_break\n\n\"${Fname}, in the time I've known you, I've been the happiest I've ever been in my life. I admire you so much for all you do in life, for everything that you are. If you will have me, I would consider myself the luckiest person in the world if we could be together for a lifetime.  ${Fname} ${Lname}, will you marry me?\"\n\n*choice\n\t#Yes!\n\t\tFor a moment you are too overwhelmed by joy to even speak.  Then you find your voice and say \"Yes! Yes!  Of course, yes!\" ${SOname} pulls from ${SOpronoun2} pocket the most beautiful ring to place on your finger.  \n\n\t\tWhat does it look like?\n\n\t\t*fake_choice\n\t\t\t#A white gold band with a diamond solitaire.\n\t\t\t#A tungsten carbide band.\n\t\t\t#An ornate rose gold ring set with a sapphire.\n\n\t\tHow lovely!\n\n\t\tYou pull ${SOname} up into your arms then and kiss ${SOpronoun3} deeply. \"I love you so much,\" you tell ${SOpronoun3}.  \"I love you too, dear,\" ${SOname} replies.\n\n\t\tAnd that's how the two of you got engaged!\n\n\t\t*set relationship_SO 90\n\t\t*set fiance true\n\t\t*goto ChiefTalk\n\t\n\t#No!\n\t\tOh?  Why not?\n\t\t*choice\n\t\t\t#I'm not ready to think about marriage.\n\t\t\t\tThis was so not what you expected to happen this evening!  You stand there for a while, undoubtedly looking startled, which might be a good thing at first, but eventually it becomes awkward.\n\n\t\t\t\t\"${Fname}?\" ${SOname} speaks your name. \"You okay there?\"\n\n\t\t\t\t\"I'm fine,\" you whisper hoarsely because your voice doesn't come out quite right. \"I just . . .\"\n\n\t\t\t\t\"Ah.\" ${SOname} stands up and takes a deep breath. \"I guess that's my answer.\"\n\n\t\t\t\t*page_break\n\n\t\t\t\t\"I'm sorry,\" you apologize. \"I honestly wasn't thinking about marriage at this point in my life. Don't get me wrong.  This is so beautiful.  And I love you.  You know that.  It's just -- you caught me by surprise.\"\n\n\t\t\t\t${SOname} sighs. \"It was supposed to be a happy surprise.\"\n\n\t\t\t\t\"And I'm sorry I'm being such a dingleberry about it.\" That word never fails to make ${SOpronoun3} smile, and it works very well this time too. \n\n\t\t\t\t\"Will you forgive me, dear?\" you ask quickly in that moment. \"And try to be patient with me, despite all my numerous failures and shortcomings?\"\n\n\t\t\t\t*page_break\n\n\t\t\t\t${SOname} thinks for a moment and then throws ${SOpronoun2} arms around you and holds you in a tight hug. \"Of course, ${Fname}.  Of course I will.\"\n\n\t\t\t\tAnd that's what happened the day you almost got engaged.\n\n\t\t\t\t*goto ChiefTalk\n\t\t\t#I'm not sure if I found the right person yet.\n\n\t\t\t\tThis was so not what you expected to happen this evening!  You stand there for a while, undoubtedly looking startled, which might be a good thing at first, but eventually it becomes awkward.\n\n\t\t\t\t\"${Fname}?\" ${SOname} speaks your name. \"You okay there?\"\n\n\t\t\t\t\"I'm fine,\" you whisper hoarsely because your voice doesn't come out quite right. \"I just . . .\"\n\n\t\t\t\t\"Ah.\" ${SOname} stands up and takes a deep breath. \"I guess that's my answer.\"\n\n\t\t\t\t*page_break\n\n\t\t\t\t\"I'm so sorry. I guess -- I guess I just never thought of us that way,\" you stutter awkwardly.\n\n\t\t\t\t${SOname} seems surprised and a little hurt. \"You never imagined a future together?\"\n\n\t\t\t\t\"I didn't really think of it,\" you admit sheepishly. \"I figured marriage would happen sometime down the road in the far future when everything just fell right into place.\"\n\n\t\t\t\t\"When you met the right person, I suppose.\"\n\n\t\t\t\t\"That's not what I said,\" you protest.\n\n\t\t\t\t\"But that's what you meant.\" ${SOname} shrugs.  \"I'm sorry I wasted your time. Clearly we both have very different ideas about what we want from our relationship.\" \n\n\t\t\t\t*page_break\n\n\t\t\t\tClearly that's true. So the two of you spend several hours in the gazebo talking about those differences and how you both envision your future.  \n\n\t\t\t\tAfter a while, it becomes clear that your relationship isn't going to work anymore. You both want very different things out of life.  So, instead, you take the time to reminisce about the good times you share shared together.\n\n\t\t\t\tAt the very end, you hug each other for a good long while and give ${SOpronoun3} a kiss on the cheek before you part ways.\n\n\t\t\t\t*set SO false\n\t\t\t\t*set relationship_SO 60\n\t\t\t\t*goto ChiefTalk\n\n\t\t\t#I don't know! Total panic mode!!!\n\t\t\t\tThis was so not what you expected to happen this evening!  You stand there for a while, undoubtedly looking startled, which might be a good thing at first, but eventually it becomes awkward. Your face flushes hotly.  \n\n\t\t\t\t\"${Fname}?\" ${SOname} calls your name, confused at your reaction. \"You okay there?\"\n\n\t\t\t\t\"I think-- \" you squeak hoarsely because your voice doesn't come out quite right. You break out in a sweat. \"I just --\n\n\t\t\t\t\"Ah.\" ${SOname} stands up and takes a deep breath. \"I guess that's my answer.\"\n\n\t\t\t\t*page_break\n\n\t\t\t\t\"No, I -- I just -- I --\" If only your words would come out properly!  If only you knew what you were trying to say!  \n\n\t\t\t\t\"It's okay,\" ${SOname} says, turning away from you and breathing a sigh. \"Don't even bother. You'll hurt yourself. I get the idea.  Let's just walk back to the car before this evening gets any worse.\"\n\n\t\t\t\tAnd that's what happened the day you almost got engaged.\n\n\t\t\t\t*set relationship_SO %-20\n\t\t\t\t*goto ChiefTalk\n\n*label SOOKTimes\n\n*if SOfeeling=\"encouraging\" \n\tSo ${SOname} continues to be a warm and supportive presence in your life. Everything isn't always perfect, but what in life ever is?  You enjoy each other's company very much and make it a point to spend time together regularly.  ${SOname} even attends all the family events at your fire department.  \n\n\tYou asked ${SOpronoun3} once if ${SOpronoun1}ever considered becoming a firefighter.  ${SOpronoun1} grinned and was flattered but said it wasn't for ${SOpronoun3}.\n\n\t*goto ChiefTalk\n\n*elseif SOfeeling=\"worriedtime\"\n\tSo ${SOname} continues to be a warm presence in your life. Sure, sometimes things get kind of rocky when it comes to trying to make sure you have time in your supremely busy schedule to hang out with ${SOpronoun3} enough to keep ${SOpronoun3} happy, but you're always glad when you do.  And sometimes a phone call will have to do in a pinch!\n\t*goto ChiefTalk\n\n*elseif SOfeeling=\"worriedrespectful\"\n\tSo ${SOname} will probably never stop being worried about the dangers of firefighting but, despite this, continues to respect your commitment to the fire service, which is something you really appreciate. ${SOname} even attends a lot of the family events at your fire department. In general, the two of you still get along really well and enjoy each other's company very much.\n\t*goto ChiefTalk\n\n*else\n\tSo ${SOname} will probably never stop being terrified about the dangers of firefighting, and sometimes you have to admit that ${SOpronoun2}'s excessive fretting really gets on your nerves.  However, you realize that it's just that ${SOpronoun1} genuinely cares for you and worries for your safety. In general, the two of you still get along really well and enjoy each other's company very much.\n\t*goto ChiefTalk\n\n*label SOBadtimes\n\n*if SOfeeling=\"encouraging\" \n\n\tSo ${SOname} has been supportive of your volunteer work, and that's wonderful, but everything else between the two of you hasn't been going so well.  Sometimes days go by when you don't see each other and sometimes don't even talk on the phone, and neither one of you really minds.  When you do hang out, things are usually pleasant, but sometimes you argue about stupid stuff like the hurtful thing ${SOpronoun1} said (but doesn't remember saying) three months ago or even what to do on a Friday night.\n\n\t*goto SODecision2\n\n*elseif SOfeeling=\"worriedtime\"\n\n\tFrom the very start of your relationship, ${SOname} was concerned about whether or not you'd have enough time in your life for both the fire service and ${SOpronoun3}, and that continues to be an issue. It seems like every time you go to a drill or a meeting or, goodness forbid, have to respond on a call while the two of you are hanging out, you have to follow it up with an extra effort to make sure ${SOname} feels special and loved.  Quite frankly, you're tired of it.  \n\n\tThe fire department is a big part of your life, and if ${SOpronoun1} can't accept that without having some sort of anxiety attack every other day, then maybe it's just not going to work out.\n\n\t*goto SODecision2\n\n*elseif SOfeeling=\"worriedrespectful\"\n\n\tSo ${SOname} has always been generally respectful of your volunteer work, but a lot of times ${SOname} seems sad or lonely when you just don't have a chance to hang out with ${SOpronoun3} as much as ${SOpronoun1} would like.  When you do hang out, things are usually pleasant, but sometimes you argue about stupid stuff like the hurtful thing ${SOpronoun1} said (but doesn't remember saying) three months ago or even what to do on a Friday night. \n\n\t*goto SODecision2\n\n*else\n\n\tFrom the very start of your relationship, ${SOname} has been terrified every time you respond to an alarm or even when you climb a ladder during a drill.  Sometimes you feel like you're spending a downright ridiculous amount of time trying to reassure ${SOpronoun3}, only to have ${SOpronoun3} start a little while later with infuriating statements  like \"If you really loved me you wouldn't keep putting yourself in danger like that,\" and your personal favorite: \"Are you suicidal or something?\"  \n\n\tAnd the, when you do hang out, things are usually pleasant, but sometimes you argue about stupid stuff like the hurtful thing ${SOpronoun1} said (but doesn't remember saying) three months ago or even what to do on a Friday night. \n\n\t*goto SODecision2\n\n*label SODecision2\n\nSo what do you do about this?\n\n*choice\n\t#It seems like it's time to break up.\n\t\tAre you mean about it or nice?\n\t\t*choice\n\t\t\t#Nice, of course.\n\t\t\t\t*goto NiceBreakup\n\t\t\t#Mean. Because that's how I roll.\n\t\t\t\t*goto MeanBreakup\n\n\t#I'm not giving up yet!\n\t\t*goto Reaffirmation\n\t#I do absolutely nothing.\n\t\t*goto SOBreaksUp\n\n*label SOBreaksUp\n\nYour complete apathy doesn't help matters.  And ignoring the pink elephant in the room certainly doesn't mean it will go away.  Eventually, you are both so unhappy that ${SOname} comes over one evening to have The Talk.\n\n*page_break\n\n\"I just can't do this anymore,\" ${SOname} tells you.\n\n\"All right,\" you say with a shrug.\n\n\"That's it?\"  ${SOname} asks.\n\n\"I guess so,\" you reply, being the great communicator that you are.\n\n${SOname} sighs and turns to leave.  \"Okay.  It's been a blast. See you around, I guess. \"\n\n\"Yeah.  See you.\"  You're already turning on the TV to watch a stupid show.\n\n*page_break\n\nAnd that was how you and ${SOname} broke up.\n\n*goto ChiefTalk\n\n*label Reaffirmation\n\t\nYou may not be an expert on relationships, but you do know that they're not always easy.  Relationships take work.  Loving someone truly isn't always rainbows and roses.  There are difficult times, and, with the right attitude, you can often use those difficult times to strengthen your relationship in the end.\n\nSo you're not giving up so easily.  And, in fact, you sit down with ${SOname}, look into ${SOpronoun2} eyes, hold ${SOpronoun2} hands in yours, and tell ${SOpronoun2}, with all your heart, that you want things to work.\n\n*page_break\n\n\"I'm sorry things have been so difficult between us lately,\" you tell ${SOname}.  \"I know it's been rough on both of us, but I want you to know that I'm committed to making things work.  I really love you, ${SOname}.  I think we have something worth fighting for.\"\n\n${SOname} smiles and a tear glistens in ${SOpronoun2} eye.  \"I feel the same way.  I love you too, ${Fname}.  I want this to work out.\"\n\n*page_break\n\nSo, for the next few hours, you have a heart-to-heart about how both of you can make the other feel happier, more loved, more cherished.  By the end of the conversation, you feel closer than ever, and spend the night tenderly in each others arms.\n\n*set relationship_SO %+40\n*page_break\n*goto ChiefTalk\n\n*label NiceBreakup\n\nYou've had some good times, and it might sound awful to admit, but lately your relationship has just been more trouble than it's worth. Neither of you are really happy.  The best thing you could possibly do for both of you seems to be to break up and move on. \n\n*page_break \n\nWhen you sit down to have The Talk, ${SOname} doesn't seem at all surprised.\n\n\"I guess I kind of knew this was coming,\" ${SOname} admits, looking at nothing on a blank wall.  \"We haven't been doing very well for a while now, I guess.\"\n\n\"Yeah,\" you agree, feeling kind of sad because these sorts of endings are always somewhat melancholy. \"I think we might both be better off now.\"\n\n\"Probably,\" ${SOname} agrees. \"It doesn't make this particularly easy though.\"\n\n*page_break \n\n\"I don't think it's supposed to be,\" you reply. \"Let's not lose touch -- okay? And we'll still see each other around from time to time.  Right?\"\n\n${SOname} can't help but smile a little. \"Is that the 'Let's still be friends' part of this conversation?\"\n\nYou find yourself grinning as well. \"Why, yes,\" you declare. \"I suppose it is.\"\n\nAnd that was the very civilized way in which you and ${SOname} broke up.\n\n*set nicebreakup true\n*set SO false\n*set relationship_SO 60\n*goto ChiefTalk\n\n\n*label MeanBreakup\n\nSure, things were pretty okay for a while, but now things are just a mess and you're totally ready to just be done with this crap so you can move on.\n\nSo one day, you just come right out and say it: \"${SOname}, I think we should break up.\"\n\n\"Excuse me?\" ${SOname} replies, raising both eyebrows.  \"Why?\"\n\nWhat reason do you give ${SOpronoun3}?\n*choice\n\t#I'm sick of you.\n\t\tYou shrug. \"I'm just sick of being with you, I guess. I need to move on.\"\n\n\t\t\"Sick of being with me?\" ${SOname} doesn't seem to believe ${SOpronoun2} ears. \"Sick of being with me?\" ${SOname} repeats, starting to sound angry. \"I'll tell you what's sick: the way you talk to me like you're so much better than I am.\"\n\n\t\t*page_break\n\n\t\t${SOname} stands up and starts pacing the room. \"You know what?  I deserve better than this shit. Get out.  Get the fuck out of my apartment. I don't want to see you again. Get out!\" \n\n\t\t${SOpronoun2} cold, angry tone chills you to the bone. You get out of there as quickly as possible.  \n\n\t\tBut, hey, that's what you wanted, right?  Thankfully, you won't have to deal with [i]that[/i] anymore.\n\t\t*set SO false\n\t\t*set relationship_SO 0\n\t\t*goto ChiefTalk\n\n\t#I'm bored.\n\t\tYou shrug. \"I think I'm just bored. We've been together for so long that nothing's really new or exciting anymore, you know?  Not like it used to be. I'm ready to move on.\"\n\n\t\t${SOname} stares at you for a moment, like ${SOpronoun1} can't believe ${SOpronoun2} ears. \"Are you kidding me?  Did you really just say that?\"\n\n\t\tThat seems like a rhetorical question.  You decide to keep your mouth shut.\n\n\t\t*page_break\n\n\t\t\"And, to think, I thought things were going pretty good with us. I thought we had something worth keeping.  But not you, I guess. You're bored. Not enough excitement. So instead of talking to me about what's going on, you just break up with me, like what we shared can be tossed away like a piece of garbage. \n\n\t\t\"You know what?  Get out.  Get the fuck out of my apartment. I don't want to see you again. Get out!\" ${SOpronoun2} cold, angry tone chills you to the bone. You get out of there quickly.\n\n\t\tBut, hey, that's what you wanted, right?  Thankfully, you won't have to deal with [i]that[/i] anymore.\n\n\t\t*set SO false\n\t\t*set relationship_SO 0\n\t\t*goto ChiefTalk\n\n\n\n\t#Just because.\n\t\tYou shrug. \"I just think it's time to move on.  That's all.\"\n\n\t\t\"That's all?  All the time we've been together, and you can't even pull together a respectable excuse for dumping me? What kind of excuse for a human being are you?\"\n\n\t\tThat seems like a rhetorical question.  You decide to keep your mouth shut.\n\n\t\t*page_break\n\n\t\t\"And, to think, I felt like things were going pretty good with us. I thought we had something worth keeping.  But not you, I guess. You're finished, done, ready to move on just like that.  So instead of talking to me about what's going on, you just break up with me, like what we shared can be tossed away like a piece of garbage. \n\n\t\t\"You know what?  Get out.  Get the fuck out of my apartment. I don't want to see you again. Get out!\" \n\n\t\t${SOpronoun2} cold, angry tone chills you to the bone. You get out of there as quickly as you can.\n\n\t\tBut, hey, that's what you wanted, right?  Thankfully, you won't have to deal with [i]that[/i] anymore.\n\n\t\t*set SO false\n\t\t*set relationship_SO 0\n\t\t*goto ChiefTalk\n\n\n*label ChiefTalk\n\n*page_break\n\nOne day, after the monthly department meeting, Chief Gordon calls you off to the side for a chat.  \n\nHow do you feel you're you getting along with the officers these days, by the way?\n*choice\n\t#Pretty well, actually.\n\t\tThen you have no need to be nervous, right?\n\t\t*set relationship_officers %+30\n\t\t*goto OfficerCheck\n\t#Not too badly.\n\t\t*set relationship_officers %+10\n\t\tThat's good. \n\n\t\tYou wonder what the Chief could have to say to you. \n\t\t*goto OfficerCheck\n\t#Eh.\n\t\tThat doesn't sound so good!  \n\n\t\tYou worry about what the Chief could have to say to you.\n\t\t*set relationship_officers %-20\n\t\t*goto OfficerCheck\n\n\n*label OfficerCheck\n\n*page_break\n\nSo you walk with Chief Gordon, out of earshot of the others, to see what he has to tell you.\n\n*if motivation = \"tradition\"\n\t*goto Tradition\n*elseif motivation = \"grudging\"\n\t*goto Grudging\n*elseif motivation = \"service\"\n\t*goto Service\n*elseif motivation = \"hero\"\n\t*goto Hero\n\n\n*label Tradition\n\n*if relationship_officers >= 70\n\t\"Hey, ${Lname},\" the Chief starts out. \"I just wanted to say: you're not doing too badly -- for a ${Lname}, that is.  Keep up the good work.\" \n\n\tA lofty compliment indeed!\n\n\t\"Thanks, Chief,\" you tell him.  He pats you on the shoulder and walks away.\n\n\t*goto Parade\n\t\n*elseif (relationship_officers \u003c 70) and (relationship_officers >= 50)\n\n\t\"Hey, ${Lname},\" the Chief starts out. \"I hear you're doing okay. I expected more from you, of course,\" he adds enigmatically. \n\n\t\"Thanks, Chief,\" you tell him.  What can you really say to that?  He eyes you quizzically and then walks away.\n\n\t*goto Parade\n\t\n*elseif relationship_officers \u003c 50\n\n\t\"Hey, ${Lname},\" the Chief starts out. \"Living up to your name, I see. More trouble than you're worth, as I expected. You'd better step up your game. I have my eye on you.\" \n\n\t\"Thanks, Chief,\" you tell him, with a shrug. What can you really say? \n\n\tHe peers at you a moment and then walks away.  Very strange.\n\n\t*goto Parade\n\n\n*label Grudging\n\n*if (relationship_officers >= 70)\n\t\"Hey, Champ!\" the Chief starts out. \"I hear you're doing great! Your mother must be so proud. I know I am.  Keep up the good work.\" \n\n\t\"Thanks, Chief,\" you tell him, while secretly gagging.  He pats you on the shoulder and walks away.\n\n\t*goto Parade\n\t\n*elseif (relationship_officers \u003c 70) and (relationship_officers >= 50)\n\t\"Hey, Champ!\" the Chief starts out. \"I hear you're not doing all that badly around here. Keep up the good work.\" \n\n\t\"Thanks, Chief,\" you tell him, while secretly gagging.  He pats you on the shoulder and walks away.\n\n\t*goto Parade\n\t\n*elseif (relationship_officers \u003c 50)\n\n\t\"Hey, Champ!\" the Chief starts out. \"I hear you're not doing so well here.\" He seems concerned. \"Look. If you ever need anything, you know you can talk to me, right?  Believe it or not, way back when I was a young fellow, I went through a time when I was really struggling to get by at the fire house. I almost quit! So I know it isn't always easy.  Just let me know if there's anything I can do for you.\n\n\t\"Thanks, Chief,\" you tell him.  What else can you really say to that?  He pats you on the shoulder and walks away.\n\n\t*goto Parade\n\n*label Service\n\n*if (relationship_officers >= 70)\n\n\t\"Hey, ${Lname},\" the Chief starts out. \"I just want to let you know that I've noticed all the time and effort you've been putting in at the fire department, and it's really paying off.  You're doing great here.  Keep up the good work!\"\n\n\n\t\"Thanks, Chief,\" you tell him, and you can't help but smile.  He pats you on the shoulder and walks away.\n\t*goto Parade\n\n*elseif (relationship_officers \u003c 70) and (relationship_officers >= 50)\n\n\t\"Hey, ${Lname},\" the Chief starts out. \"I hear you're doing a pretty decent job around here.  We really appreciate it.  Keep up the good work.\"\n\n\t\"Thanks, Chief,\" you tell him, and you can't help but smile.  He pats you on the shoulder and walks away.\n\t*goto Parade\n\n*elseif (relationship_officers \u003c 50)\n\n\t\"Hey, ${Lname},\" the Chief starts out. \"It's come to my attention that you haven't been doing so well around here lately.  I know your heart's in the right place so don't give up.  All right?  And  just let me know if there's anything I can do to help you out.\"\n\n\t\"Thanks, Chief,\" you tell him, respectfully.  He pats you on the shoulder and walks away.\n\n\t*goto Parade\n\n*label Hero\n\n*if (relationship_officers >= 70)\n\n\t\"Hey, ${Lname},\" the Chief starts out. \"I just want to let you know that I've noticed all the time and effort you've been putting in at the fire depart, and it's really paying off.  You're doing great here.  Keep up the good work!\"\n\n\n\t\"Thanks, Chief,\" you tell him, and you can't help but beam from ear to ear.  He pats you on the shoulder and walks away.\n\t*goto Parade\n\t\n*elseif (relationship_officers \u003c 70) and (relationship_officers >= 50)\n\n\t\"Hey, ${Lname},\" the Chief starts out. \"I hear you're doing a pretty decent job around here.  We really appreciate it.  Keep up the good work.\"\n\n\t\"Thanks, Chief,\" you tell him, and you can't help but smile broadly.  He pats you on the shoulder and walks away.\n\t*goto Parade\n\n\t\n*elseif (relationship_officers \u003c 50)\n\n\t\"Hey, ${Lname},\" the Chief starts out. \"It's come to my attention that you haven't been doing so well around here lately.  So I want you to let me know if there's anything I can do to help you out. Okay?\"  It sounds like the standard obligatory pep talk to you.\n\n\t\"Thanks, Chief,\" you tell him, respectfully, but only because you know better than to glare at him. \n\n\t*goto Parade\n\n*label Parade\n\n*page_break\n\nDo you end up going to the anniversary parade, by the way?\n\n*choice\n\t#Yes, I want to support my fire department!\n\t\tYou attend the parade.  The weather is perfect.  You look smart and polished in your formal Class-A uniform.  With a marching band to keep time, you march in formation with the rest of your fire department. Members of the community have gathered by the side of the road to cheer you on.  \n\n\t\tYou spy your family in the crowd.  They call your name and clap loudly as you pass. \n\n\t\tAfterwards, there are various speeches and ceremonies, followed by a community-wide barbeque with live music and carnival games. It is a good day!\n\t\t*set relationship_firefighters %+20\n\t\t*set relationship_officers %+20\n\t\t*finish\n\t#No way. \n\t\tYou'd rather do just about anything else than suffer through another parade and all the hokey pomp and circumstance that goes with it. So you hide in your house for most of the day and pretend not to be home. You have a new computer game to play and six-pack of beer. It is a good day!\n\t\t*finish\n\n\n\n", "10kittenconvention": "You're still comfortably asleep one Sunday morning when your pager goes off: \n\n\"$!!{town_name} FIRE DEPARTMENT, YOU HAVE A UNKNOWN RESCUE IN FRONT OF 4 CHERRY STREET, NEAR THE INTERSECTION OF PINE ROAD. REPEATING FOR $!!{town_name} FIRE DEPARTMENT: YOU HAVE A UNKNOWN RESCUE IN FRONT OF 4 CHERRY STREET, NEAR THE INTERSECTION OF PINE ROAD. TIME NOW IS 0753.\"\n\nDo you respond to the call?\n\n*choice\n\t#Yes, of course.\n\t\tYou've slept in enough.  There's work to be done!\n\t\t*set responses +1\n\t\t*goto Respond\n\t#No way. Sunday is my one day to sleep in.\n\t\tWith a groan, you reach over to silence your pager. You work hard five days a week, and, quite frankly, you're exhausted. You need to sleep in just this once. Is it so much to ask? \n\n\t\tYou wrap yourself in your fluffy comforter, roll over, and go back to sleep.\n\t\t*goto Warning\n\n\n*label Respond\n\nSo you pull on your clothes and head to the firehouse to put on your gear. It seems like a lot of people are otherwise occupied this morning because only three other people show up.  Gina Zlenko has less experience than you do, and the other two people are Probies Meyer and Garcia. So that means you're in charge! \n\n*page_break\n\nBecause you have no idea exactly what sort of rescue scenario you will be facing, you have Zlenko pull the heavy rescue truck out of the bay. You climb into the officer's seat, while two probies seat themselves in the back.  It's a big truck for just the four of you, but you will have to make do! In a pinch, you know you can always call upon a neighboring town's fire department for help if you need to.\n\n*page_break\n\nAs per protocol, you radio to dispatch that you have a minimal crew and that you're en route to the scene. This is your first time in charge of a scene.  How do you feel about it?\n\n*fake_choice\n\t#It's very exciting!\n\t\tYou enjoy the feeling of being in command and feel certain that you'll be able to handle whatever challenges come your way.  If not, you could always feign confidence.  Hopefully no one will know the difference!\n\n\t#It's a little intimidating!\n\t\tYou might be the most senior firefighter present, but that hardly means you have a ton of experience. So, admittedly, you're a little anxious about taking charge of this call. You know you will fulfill your duties to the best of your ability.  Hopefully your best is good enough!\n\n\t#It's not a big deal.\n\t\tMost calls that come in are false alarms or not particularly serious.  In any case, you're not worried.  You'll just take things as they come and do the best you can.\n\n*page_break\n\nSo you pull up to the address that was toned out.  You see nothing out of the ordinary.  A little girl, maybe 7 years old, stands on the front lawn.  She's wearing shorts, pink sparkly sandals, and an over-sized sweatshirt.  Her eyes grow wide as the huge rescue truck pulls up to the side of the street with emergency lights flashing.\n\nThere's an adult male, potentially a family member, sitting on the front porch, surveying the situation with a cup of coffee in hand.  He has friendly blue eyes and looks to possibly still be in his pajamas. Seeing no other \"grown-ups\" around, you climb down from the truck and head in his direction.  The others stay back near the rescue truck, awaiting your orders.\n\nHow do you approach the man?\n\n*choice\n\n\t#Courteously.\n\t\t\"Good morning, sir,\" you greet the man as you near the porch. \"We got a 911 call for this address.  Is everything okay?\"\n\n\t\t\"Good morning to you,\" he says politely. \"I think you'd better talk to my daughter, Adele.\" He looks somewhat amused as he gestures to the little girl who has turned now to watch you.  \"She's the one who called you.\"\n\n\t\tYou raise your eyebrows, perplexed, but turn to go speak with Adele.\n\t\t*set leadership %+15\n\t\t*goto Adele\n\n\t#Suspiciously.\n\t\t\"Uh, hello there,\" you call from some distance away.  Something feels weird about this whole situation. \"Did somebody call 911?\"\n\n\t\t\"That would be my daughter, Adele,\" the man replies, looking faintly amused.  He gestures toward the little girl who has now turned to watch you.  \"You'd better go talk to her.\"\n\t\t\n\t\t*goto Adele\n\n\t#Angrily.\n\t\tNothing is out of the ordinary here.  Everything looks fine!  You really can't stand when people abuse the system and call 911 for no good reason.  \n\n\t\t\"Who called 911?\" you demand of the man on the porch.\n\n\t\t\"That would be my daughter, Adele,\" the man replies, looking surprised at your abrupt tone of voice. He gestures toward the little girl who has now turned to watch you. \"You'd better go talk to her.\"\n\n\t\t*set leadership %-10\n\t\t*goto Adele\n\n\n*label Adele\n\n*page_break\n\nSo you go over to Adele.  \"Hi there,\" you greet gently because, come on, it's a little kid.  And you're wearing lots of strange gear.  Plus, you just arrived in a big fire truck with flashing lights.  \n\n\"Hi,\" she replies, looking up at you with wide eyes.\n\n\"Did you call 911?\" you ask her, to the point.\n\n\"Yes,\" she answers, nodding in emphasis.  You have a feeling this is going to take a while. \n\n*page_break \n\n\"Why did you call 911?\" you ask, patiently.\n\n\"Come see,\" she instructs you and takes your hand, tugging you in the direction of the street.\n\nAre you okay with that?\n\n*fake_choice\n\t#Sure.  Why not.\n\t\tIt's your duty to investigate this call. So you might as well see what the kid has to show you.  \n\n\t\tYou let Adele lead you toward the street and down a little way until you reach a storm drain.\n\t#No.\n\t\tYou pull your hand away.  \"Come see what?\" you insist.  You're not feeling up to playing games.\n\n\t\t\"You'll see,\" she promises. \"Please come.\"  \n\n\t\tWell, you can't exactly leave without at least seeing what this is about. So you shrug and inwardly sigh, and follow Adele toward the street and down a little way until you reach a storm drain.\n\n*page_break\n\n\"Okay.  Here we are.  What's going on?\" You bring out your flashlight and shine it down into the dark depths of the drain.  \"I don't see anything.\"\n\nAdele puts her finger to her lips.  \"Shhhh,\" she hushes you.  \"[i]Listen.[/i]\"\n\nDo you?\n\n*choice\n\n\t#Yes.\n\t\t*goto HearKittens\n\n\t#No. This is ridiculous.\n\t\t*temp Refusal \"\"\n\t\tThis is a complete waste of your time, and you refuse to stand around here any longer doing absolutely nothing.  And clearly this child needs a lesson on what constitutes an actual emergency.  You can at least do that much.\n\n\t\tAre you nice about it or stern?\n\n\t\t*choice\n\t\t\t#I'm nice, of course.  This is a little girl.\n\t\t\t\t\n\t\t\t\t\"Look.  Adele, is it?\" The child nods.  \n\n\t\t\t\tYou get down on one knee so you can talk to her more on her level. \"Okay, Adele. I'm going to tell you something important.  I'm very glad that you know how to call 911.  It's good to know that number in case of emergency.  Do you know what an emergency is?\"\n\n\t\t\t\tAdele nods.  \"Tell me,\" you encourage her.\n\n\t\t\t\t\"When there's a fire or when someone's hurt,\" she replies promptly.\n\n\t\t\t\t*page_break\n\n\t\t\t\tYou reward her with a smile. \"That's great, Adele! And you should never hesitate to call 911 when there's really an emergency.  But, as you can see, there's no fire here, and there's nobody hurt, right?\"\n\n\t\t\t\tThe little girl hesitates. \"Right,\" she agrees, after a moment.\n\n\t\t\t\t\"So you shouldn't have called 911,\" you explain. \"Remember for next time.  Okay, kid?\" \n\n\t\t\t\t\"Okay.\" \n\n\t\t\t\t*page_break\n\n\t\t\t\tAdele looks fairly unhappy at this point, but that isn't really your concern.  You head back to the truck. \"Nothing here,\" you report to the others.  \"Just a kid who called 911 for fun, I guess. Let's head back.\"  \n\n\t\t\t\tSo you all climb back on the heavy rescue truck and return to the fire house.\n\n\t\t\t\t*set Refusal \"nice\"\n\t\t\t\t*goto Chastisement\n\n\t\t\t#I'm harsh. Fake emergency calls are a big deal.\n\t\t\t\t\"Look, kid,\" you begin sternly, glaring down at the child. \"You can't just call 911 whenever you feel like it. It's for real emergencies.  Do you know what real emergencies are?\"\n\n\t\t\t\tAdele's eyes fill up with tears.  She just stares at you.  You take this to mean she doesn't know.\n\n\t\t\t\t*page_break\n\n\t\t\t\tSo you explain it to her: \"It means your house is on fire.  Or someone is very hurt.  You know.  Like they are bleeding all over the place or they can't breathe or you think they might be dead. 911 is for [i]serious[/i] matters.  If you call us for nothing and we have to stand around talking to you, someone else might not be getting help when they need it.  Then they could die, and it might be partly your fault.  Do you want that to happen?\"\n\n\t\t\t\t*page_break\n\n\t\t\t\tAfter that long and terrifying lecture, the little girl just bursts into tears and runs away from you, back to her father.  You shrug and head back to the truck. \"Nothing here,\" you report to the others.  \"Just a stupid kid who called 911 for fun, I guess.\"  \n\n\t\t\t\tSo you all climb back on the heavy rescue truck and head back to the fire house.\n\n\t\t\t\t*set Refusal \"mean\"\n\t\t\t\t*set relationship_firefighters %-20\n\t\t\t\t*set leadership %-20\n\t\t\t\t*goto Chastisement\n\n*label Chastisement\n\n*page_break\n\nThe next Tuesday, after your search drill, First Assistant Chief Kalinowski calls you aside to talk to him in other room, away from the others.\n\n\"So, ${Lname}, I got a call yesterday from a Mr. Kay. Does the name ring a bell?\"\n\nYou think about it a moment. \"Uh.  No, sir,\" you reply because you're pretty sure you have no idea who that person is.\n\n*page_break\n\n\"Mr. Kay's daughter called for the fire department this past Sunday,\" the Chief explains, \"I believe you were in charge of the alarm.\"\n\n\"Oh! Yes,\" you reply, suddenly realizing what he is talking about. \"It was nothing.  The kid was just playing around.\"\n\n*page_break\n\nThe assistant chief smirks. \"Actually, it wasn't nothing,\" he informs you. \"That kid found some kittens in the storm drain and, when she told her father, he suggested that she call the fire department, that we were the ones who could help her.\n\n*if Refusal = \"nice\"\n\n\t\"We didn't help her. Furthermore, apparently the little girl was told she was wrong for having called at all. I'm hoping you have a really good reason for this, ${Lname}, a really good reason.\" Chief Kalinowski both looks and sounds very unhappy with you.\n\n\tWhat's your explanation?\n\n\t*choice\n\t\t#I thought she was just messing around.\n\t\t\t*goto KittenConfusion\n\n\t\t#I didn't realize there were kittens.\n\t\t\t*goto KittenConfusion\n\n\t\t#We're supposed to rescue kittens?\n\t\t\t\"Kittens?\" you repeat, incredulously. \"Really, Chief?\"\n\n\t\t\tHe lifts both his eyebrows. \"What?  Are you so above rescuing baby cats? Were you doing something so important that you couldn't spare a half hour to help a little girl? We're supposed to serve the community. Remember the oath you took?\" \n\n\t\t\t*page_break\n\n\t\t\tYou nod slowly and have no idea what to say, but clearly the assistant chief hasn't finished his lecture: \"Sure, some people abuse the system. It happens. But you have to give people the benefit of the doubt.  And we had no other calls at that time. You could've helped the kid out, for Pete's sake. And because you didn't do your job, now you've made us all look like a bunch of a-holes.  Thanks a lot.\"\n\t\t\t*page_break\n\n\t\t\t\"I'm sorry.  I didn't realize --\" you begin, but the assistant chief cuts you off.\n\n\t\t\t\"That's the whole point!  You didn't realize. Your actions, or inaction, as the case may be, reflect upon the fire department as a whole.\"\n\n\t\t\t\"I'm sorry, Chief,\" you apologize, thoroughly chastised and more than a little embarrassed. \"I'll do better next time.\"\n\n\t\t\t\"See that you do,\" he replies, thus ending your conversation.\n\n\t\t\t*set leadership %-20\n\t\t\t*set relationship_officers %-10\n\t\t\t*set relationship_firefighters %-20\n\t\t\t*goto Convention\n\n*elseif Refusal = \"mean\"\n\t\n\t\t\"We didn't help her. Furthermore,\" the assistant chief continues, \"I hear that you made the little girl cry. Way to go, ${Lname}. Thanks to you, that child's gonna grow up thinking all firefighters are complete a-holes. You made us all look really bad.  Chief Gordon had to go and meet with Mr. Kay personally to apologize, and that's embarrassing for all of us.  What do you have to say for yourself?\"\n\n\t\tWell?\n\n\t\t*choice\n\t\t\t#I'm sorry. That was inappropriate.\n\t\t\t\t\"I'm sorry, Chief,\" you apologize, feeling pretty ashamed of yourself. \"I behaved badly. I wasn't thinking, and I made a mistake. I'll talk to Chief Gordon, and I'll apologize to Mr. Kay and his daughter, if he wants me too.\"\n\n\t\t\t\tAssistant Chief Kalinowski continues to look stern, but his anger has softened somewhat with your sincere apology. \"All right, ${Lname}. That's one step in the right direction, at least. Go talk to the Chief, then. I think he's in his office.\"\n\n\t\t\t\t*page_break\n\n\t\t\t\tYou do that immediately.  The Chief also accepts your heartfelt apology, and, a few days later, so do Mr. Kay and his daughter Adele. You bring her a plastic toy fire helmet and arrange for her to have her picture taken behind the wheel of a firetruck to try to associate the fire department with more positive experiences.  By the end of the meeting, everyone is smiling, and you've learned an important lesson yourself.\n\n\t\t\t\t*set relationship_officers %+10\n\t\t\t\t*set relationship_firefighters %+20\n\t\t\t\t*set leadership %+10\n\t\t\t\t*goto Convention\n\n\t\t\t#The little girl should apologize -- not us!\n\t\t\t\t*goto GirlLesson\n\n\t\t\t#I was just trying to teach her a lesson.\n\t\t\t\t*goto GirlLesson\n\n*label GirlLesson\n\t\t\t\t\n\"I don't understand why everyone is apologizing,\" you say, both surprised and confused. \"The kid is the one who called 911 and wasted the resources of the fire department.  What if there had been a real emergency?  She should be the one to say she's sorry.  How's the kid going to learn?\"\n\n*page_break\n\nAssistant Chief Kalinowski stares at you for a long moment, frowning. Then he shifts into lecture mode:  \"${Lname}, listen to what I'm going to tell you, and we'll see if we can get some of this to sink in. \n\"Remember the oath you took when you became a firefighter?\" It's a rhetorical question. You keep quiet.  \"You promised to serve your community with compassion, courage, and integrity. Under no circumstance can that be interpreted to mean 'make a special effort to terrify little kids'. I mean, seriously, we had no other calls at the time, and you were already there. Would it have pained you so greatly to be nice and help out?\"  He's looking straight at you now so you probably should say something.\n\n*page_break\n\n\"I didn't realize --\" you begin, but the assistant chief cuts you off.\n\n\"That's the whole point!  You didn't realize. Your actions, or inaction, as the case may be, reflect upon the fire department as a whole. Now, if you know what's good for you, you'll go talk to Chief Gordon about this and apologize. He's in his office now.\"  \n\nYou do that immediately, before the assistant chief can give you any more grief.  Chief Gordon accepts your apology, but doesn't seem all that convinced by it.  Still, you made the best of a crappy situation.\n\n*set relationship_officers %-20\n*goto KittenWarning\n\n\n*label KittenConfusion\n\nYou try your best to explain: \"I talked to the father. I talked to the kid. Chief, I honestly didn't see any sign of any emergency, and, really and truly, nobody said anything about kittens.  So I thought it was another case of a kid dialing 911 to see what would happen.\"\n\n\"When you're in charge of a response,\" the assistant chief begins, transitioning to lecture mode, \" one of the first things you need to do is get to the bottom of an alarm, figure out what it's about.  You get my drift?\"\n\nYou nod.  That makes sense.\n\n*page_break\n\nBut you continue to get an earful. \"Well, you didn't do that, ${Lname}! You assumed it was a bullshit call so you didn't get the details. Now you made us all look like a bunch of stuck-up a-holes who can't be bothered to help a little girl save a kitten.\"\n\n\"I didn't realize --\" you begin, but the assistant chief cuts you off.\n\n\"That's the whole point!  You didn't realize. Your actions, or inaction, as the case may be, reflect upon the fire department as a whole.  We exist to serve our community. Remember the oath you took? Sure, some people abuse the system. It happens. But you have to give people the benefit of the doubt.  And we had no other calls at that time. You could've helped the kid out, for Pete's sake.\"\n\n*page_break\n\n\"I'm sorry, Chief,\" you apologize, thoroughly chastised and more than a little embarrassed. \"I'll do better next time.\"\n\n\"See that you do,\" he replies, thus ending your conversation.\n\n*set leadership %-20\n*set relationship_officers %-10\n*set relationship_firefighters %-20\n*goto KittenWarning\n\n*label KittenWarning\n*page_break\n\n\nTo make matters worse, you get a warning on your record for your \"unprofessional conduct.\"\n\n*if warning = 0\n\tThis is your first warning so it's hardly the end of the world, but the situation leaves you with a bad taste in your mouth. You can but try to do better next time.\n\t*set warning +1\n\t*goto Convention\n*elseif warning = 1\n\tThis is your second warning, which, quite frankly, sucks. If you get another warning, you will be asked to resign from the fire department. You can but try to do better next time.\n\t*set warning +1\n\t*goto Convention\n*elseif warning = 2\n\tUnfortunately, you already have two warnings.  So you were already on your last chance to improve your standing as a member of the department. \n\t*page_break\n\n\t*if relationship_officers > 45\n\t\tYour lieutenant looks grim as you stand before him in the line officer's office. \"You know what that means, ${Lname},\" he says, referring to your two previous warnings.  \"It's a shame.  I thought you had a lot of potential, but I guess it just didn't work out. That happens sometimes. I'll need you to hand over your ID card, keys, and pager.\" You do so, very soberly, and then your lieutenant shakes your hand.  \"I'm sorry it didn't work out.\"\n\n\t\t*page_break\n\n\t\tAre you really surprised?  Perhaps you're just not meant to volunteer in emergency services at this point in your life.\n\n\t\tAnd so ended your time as a volunteer firefighter.\n\t\t*goto_scene 13awardparty ending\n\t\t\n\t*else\n\t\tYour lieutenant looks grim as you stand before him in the line officer's office. You haven't been very pleasant to him so he doesn't feel the need to be overly pleasant to you. \"I'll need your ID card, keys, and pager,\" he says, nevertheless sounding generally unhappy to be having this conversation. \"That's three warnings on your record now. So you're out. I'm sorry.\" He does shake your hand and wish you well before you leave.\n\n\t\t*page_break\n\n\t\tAre you really surprised? You never really had a good attitude during your time in the fire department. Perhaps you're just not meant to volunteer in emergency services at this point in your life or maybe ever.\n\n\t\tAnd so ended your time as a volunteer firefighter.\n\t\t*goto_scene 13awardparty ending\n\n*label HearKittens\n\nYou stop talking and listen.  At first, you hear nothing at all but the wind in the trees and some cars in the distance.  \n\nAnd then there's a small sound. You might even be imagining it. But then it happens again! And then again! There are tiny, plaintive squeaks coming from somewhere in the storm drain.\n\n*page_break\n\nYou look again with your flashlight, but there's nothing to be seen but some damp muck and a scattering of garbage.  So you turn to Adele, your expression quizzical.  \"What is that?\" you ask her.\n\n\"Baby kittens,\" she replies, very seriously. \"I saw three before you came, but now I guess they ran down the pipe to hide.\" The squeaking continues, sounding fairly weak.  \"Will you save them?\"\n\nWill you?\n\n*choice\n\t#Of course!\n\t\t*goto Kitten_Rescue\n\t#No.\n\t\tWhy not?\n\t\t*choice\n\t\t\t#It's not a real emergency.\n\t\t\t\tIn your mind, department resources should be used for emergencies only, and, however cute kittens might be, this isn't really an emergency.  The heavy rescue truck needs to be ready and available in case it's really needed!  But, still, you can be nice about it.\n\n\t\t\t\t*page_break\n\n\t\t\t\t\"Kittens! What color are they?\" you ask with a smile. \n\n\t\t\t\t\"I'm not sure. It was hard to see them. Maybe gray or tan,\" Adele reports.\n\n\t\t\t\t\"They sound adorable.  But, here's the thing, Adele,\" you explain, getting down on one knee so you can talk to her more on her level. \"They don't really need to be saved. Sometimes cats are born outdoors in all sorts of interesting places.  If we move the babies, their mommy might not be able to find them.  So we need to leave them be.\"\n\n\t\t\t\t*page_break\n\n\t\t\t\tAdele still looks concerned. \"What if it rains?\" she frets, looking pointedly at a cloud overhead. \n\n\t\t\t\t\"Then they'll get a little damp, maybe. But they'll be okay. No need to worry. But it was good that you called the fire department so we could come and check them out, just in case! So thank you for that!  But now we have to get going and go back to the fire house so that we're ready in case someone else needs to call us for help.  Okay?\"\n\n\t\t\t\t\"Okay,\" Adele agrees, looking reassured now.  \"Thank you.\"\n\n\t\t\t\t\"You're welcome!\" you reply as you stand up and turn to leave.  \"Bye!\"\n\n\t\t\t\t*page_break \n\n\t\t\t\tYou head back to the truck. \"There are a few kittens somewhere in the storm drain,\" you report to the others.  \"I don't think they need saving, but it was cute that she had us check them out.\"\n\n\t\t\t\t\"Looks like it might rain,\" Probie Garcia notes. \"Will the kittens be okay?\"\n\n\t\t\t\t\"They'll be fine,\" you assure her. \"Animals are very resourceful.\"\n\n\t\t\t\tAnd all of you wave to Adele as you depart.\n\n\t\t\t\t*set leadership %+10\n\t\t\t\t*set relationship_firefighters %+10\n\t\t\t\t*goto Convention\n\n\t\t\t#I don't like cats.\n\n\t\t\t\t\"Kittens?\" you repeat, unhappily, trying to look friendly even though you don't care for cats at all, ever since that one incident in your childhood with your friend's cat, bubble gum and that purple unicycle . . . You shudder at the memory.\n\n\t\t\t\t\"Well? Will you help them?\" Adele asks.  \"It looks like it might rain.\" She looks pointedly up to the cloud above.\n\n\t\t\t\t*page_break\n\n\t\t\t\tYou hesitate for a moment.  The last thing you want to do right now is retrieve the squirming vermin from the filthy storm drain. Plus, they'd probably try to claw your eyes out as their way of expressing gratitude.  No thank you!  But you don't want to be a jerk about it.\n\n\t\t\t\t\"Here's the thing, Adele,\" you explain, getting down on one knee so you can talk to her more on her level. \"The kittens don't really need to be saved. Sometimes cats are born outdoors in all sorts of interesting places.  And if we move the babies, their mommy might not be able to find them.  So we need to leave them be.\"  That sounds like a good a reason as any, right?\n\n\t\t\t\t*page_break\n\n\t\t\t\t\"What about the rain?\"  she frets, looking pointedly at a cloud overhead. \n\n\t\t\t\t\"Then they'll get a little damp, maybe. But they'll be okay. No need to worry. But it was good that you called the fire department so we could come and check them out, just in case! So thank you for that!  But now we have to get going and go back to the fire house so that we're ready in case someone else needs to call us for help.  Okay?\"\n\n\t\t\t\t\"Okay,\" Adele agrees, looking reassured now.  \"Thank you.\"\n\n\t\t\t\t\"You're welcome!\" you reply as you stand up and turn to leave.  \"Bye!\" \n\n\t\t\t\t*page_break\n\n\t\t\t\tYou head back to the truck. \"There are a few kittens somewhere in the storm drain,\" you report to the others.  \"I don't think they need saving.\"\n\n\t\t\t\t\"Looks like it might rain,\" Probie Garcia notes. \"Will the kittens be okay?\"\n\n\t\t\t\t\"They'll be fine,\" you assure her. \"Animals are very resourceful.\"\n\n\t\t\t\tAnd all of you wave to Adele from the fire truck as you depart.\n\n\t\t\t\t*set leadership %+10\n\t\t\t\t*set relationship_firefighters %+10\n\t\t\t\t*goto Convention\n\n\t\t\t#There are many other things I'd rather be doing.\n\n\t\t\t\tThe last thing you want to do with your Sunday morning is crawl down into a filthy storm drain to retrieve kittens who probably neither need nor want to be rescued.  But, at the same time, you don't want to be a jerk about it.\n\n\t\t\t\t\"Here's the thing, Adele,\" you explain, getting down on one knee so you can talk to her more on her level. \"The kittens don't really need to be saved. Sometimes cats are born outdoors in all sorts of interesting places.  And if we move the babies, their mommy might not be able to find them.  So we need to leave them be.\"  That sounds like a good a reason as any, right?\n\n\t\t\t\t*page_break\n\n\t\t\t\t\"What about if it rains?\"  she frets, looking pointedly at a cloud overhead. \n\n\t\t\t\t\"Then they'll get a little damp, maybe. But they'll be okay. No need to worry. But it was good that you called the fire department so we could come and check them out, just in case! So thank you for that!  But now we have to get going and go back to the fire house so that we're ready in case someone else needs to call us for help.  Okay?\"\n\n\t\t\t\t\"Okay,\" Adele agrees, looking reassured now.  \"Thank you.\"\n\n\t\t\t\t\"You're welcome!\" you reply as you stand up and turn to leave.  \"Bye!\" \n\n\t\t\t\t*page_break\n\n\t\t\t\tYou head back to the truck. \"There are a few kittens somewhere in the storm drain,\" you report to the others.  \"I don't think they need saving.\"\n\n\t\t\t\t\"Looks like it might rain,\" Probie Garcia notes. \"Will the kittens be okay?\"\n\n\t\t\t\t\"They'll be fine,\" you assure her. \"Animals are very resourceful.\"\n\n\t\t\t\tAnd all of you wave to Adele from the fire truck as you depart.\n\n\t\t\t\t*set leadership %+10\n\t\t\t\t*set relationship_firefighters %+10\n\t\t\t\t*goto Convention\n\n\n*label Kitten_Rescue\n\n\"Of course, we'll save them!\" you assure Adele right before you wave over Zlenko and the two probies. \n\n\"This is Adele,\" you inform the other firefighters as they gather around you.  \"She found some kittens in this storm drain.  If you listen closely, you can hear them mewing a bit. They sound kind of weak to me so I think we'd better get them out of there, especially since it looks like it might rain.\" You glance briefly up at the clouds forming above your heads. \"I think you'll agree this is an excellent chance to practice our rescue skills.\" \n\n*page_break\n\nThe others do look pretty enthusiastic at the notion, but it's up to you to direct them!  First things first: \"Adele, I need you to go wait over on the porch with your father. I promise we'll give you updates and let you see the kittens when we find them.  Okay?\" Apparently, she's fine with this because she skips over to join her father on the porch. \n\n*page_break\n\nOnce the kid is at a safe distance, you use a pry bar and teamwork to remove the grate from the storm drain. It looks to be a pretty tight space you're dealing with.  So what's the plan?\n\n*choice \n\t#We'll put down a ladder.\n\t\tWhy make this any more complicated than it needs to be?  \n\t\t*goto LadderRescue\n\n\t#We'll send someone down on a rope.\n\t\tUsing a rope seems like the simplest way to proceed.\n\t\t*goto RopeRescue\n\n\t*if (career = \"construction\") #We'll build a spiral-type walkway so the kittens can climb out themselves. (Construction Worker)\n\t\tYou choose to go with what you know and that's how to build things!  And, besides, the narrow space of the storm drain is more than enough room for kittens to fit through, but it would be considerably more of a challenge to squeeze in a person. \n\n\t\t*page_break\n\n\t\tSo you gather some scrap wood and nails to fashion a crude yet functional \"kitty ladder\" that you carefully lower down into the drain.\n\n\t\tWhile this is going on, a cat-loving neighbor thoughtfully provides you with cat treats and a laser pointer. You use both to try to coax the kittens toward the kitty ladder.  \n\n\t\tIt takes a good 10 minutes and a lot of ridiculous kissy sounds and calls, but eventually a brave orange tabby kitten wanders out of the shadows of the drain pipe to see what all of the fuss is about. He dashes back into the darkness quickly thereafter, but, with a great deal of patience, you coax the little fellow into climbing up onto the bottom of the kitty ladder to eat a strategically placed treat.\n\n\t\t*page_break\n\n\t\tThen Probie Meyers sneezes.  The tiny cat takes off back down the pipe like the world was coming to an end.  You glare at the apologetic probie and decide it's time to try a different strategy.  \n\n\t\tWhat will it be?\n\n\t\t*choice\n\n\t\t\t#We'll put down a ladder.\n\t\t\t\tIt will be a tight squeeze, that's for sure, but maybe someone can fit down there on a ladder. \n\t\t\t\t*goto LadderRescue\n\t\t\t#We'll send someone down on a rope.\n\t\t\t\tUsing a rope seems like the simplest thing to try.  It will certainly take up less room than trying to get a ladder down there.\n\t\t\t\t*goto RopeRescue\n\n\t*if (career = \"lawyer\") #We'll contact the town hall to see what regulations are applicable here. (Lawyer)\n\t\tYou already have the number for the town hall programmed into your phone so you think to give them a quick call just to see if there are any rules when it comes to dealing with storm drains.  First, you navigate through an extensive automated menu. Then you are transfered three times to different people who have no idea how to answer your question.  Finally, you get somebody on the line who says, \"Do what you need to do. Just put the grate back on when you're done.\"  \n\n\t\t*page_break\n\n\t\tWell, that was certainly a waste of time.  Oh well.  What now?\n\n\t\t*choice\n\n\t\t\t#We'll put down a ladder.\n\t\t\t\tWhy make this any more complicated than it needs to be?  \n\t\t\t\t*goto LadderRescue\n\t\t\t#We'll send someone down on a rope.\n\t\t\t\tUsing a rope seems like the simplest way to proceed.\n\t\t\t\t*goto RopeRescue\n\n\t*if (career = \"dispatcher\") #We'll call in the county's technical rescue task force! (Dispatcher)\n\t\tBecause of your work as an emergency dispatcher, you have many connections in emergency services.  In fact, one of your good friends, Pietro, is a member of the county's technical rescue task force, and you just know he'd get a kick out of having his team help out with these kittens.  So you give him a call, and, sure enough, he's eager to help.  \n\n\t\t*page_break\n\n\t\tThe entire technical rescue team gets activated and soon shows up with their specialized rescue truck. Your team is tasked with setting up a perimeter and establishing lighting enough to illuminate a small sports stadium.  \n\n\t\tThe technical rescue people set up a high point  pulley system using a ladder that is anchored to a nearby tree.  While one of their team members puts on a low-level haz-mat suit, another uses specialized equipment to test the air in the storm drain for any toxic gas.\n\n\t\t*page_break\n\n\t\tAt this point, quite a crowd has gathered to see what's going on, and you spy at least one news reporter with a big camera standing off to the side.  This has quickly become a big event! \n\n\t\tSo they hook the guy in the haz-mat suit up to a harness and the rope/pulley system.  The team lowers a special low-profile ladder called an \"attic ladder\" down into the storm drain.  With all the onlookers watching closely, the guy climbs down into the narrow space, and everyone waits with baited breath.\n\n\t\t*page_break\n\n\t\tHe climbs up three times, and with each trip he appears with a tiny, filthy looking kitten in his hand. The kittens each get passed off to other team members who wipe them off with towels and give them a quick medical check-up while they wiggle and squeak with indignation.  The crowd is incredibly endeared by the whole scenario, and, in addition to the news crew, many others are taking pictures and videos with their cell phones.\n\n\t\t*page_break\n\n\t\tWith Adele's father's permission, you make sure she gets to see the kittens firsthand and be in a number of pictures as well. She even gets interviewed by the local news so she can explain her part in alerting rescuers to the kittens' plight. \n\n\t\tAll in all, it's a fun and exciting Sunday morning for everyone involved, definitely good for general morale, and you have to admit that the kittens are pretty adorable.\n\n\t\t*set leadership %+20\n\t\t*set relationship_firefighters %+20\n\t\t*set relationship_officers %+10\n\t\t*goto AdoptionOption \n\n\t*if (career = \"teacher\") #We'll turn this into an educational experience for Adele. (Teacher)\n\t\tAs a teacher, you feel inclined to use this opportunity make this event a positive educational experience for the little girl.  So each step of the process you either take the time to explain what's going on yourself or send one of probies with a kid-friendly update. Your efforts seem greatly appreciated!\n\n\t\t*set leadership %+20\n\t\t*set relationship_firefighters %+20\n\t\t*set relationship_officers %+10\n\n\t\t*page_break\n\n\t\tBut what rescue technique will you choose?\n\n\t\t*choice\n\n\t\t\t#We'll put down a ladder.\n\t\t\t\tIt will be a tight squeeze, that's for sure, but maybe someone can fit down there on a ladder. \n\t\t\t\t*goto LadderRescue\n\t\t\t#We'll send someone down on a rope.\n\t\t\t\tUsing a rope seems like the simplest thing to try.  It will certainly take up less room than trying to get a ladder down there.\n\t\t\t\t*goto RopeRescue\n\n\t*if (career = \"engineer\") #We'll build a contraption with a pulley and rope to lower a cage down into the storm drain and lure the kittens into it with treats. (Engineer)\n\t\tYour idea is so complicated that you end up having to draw out a series of diagrams to explain it properly to the others who do their best to follow along. After that, the next step is to gather supplies.  You have most of the things you need with you on the truck.  Fortunately, a cat-loving neighbor is on hand and provides you with the requisite cage and treats. \n\n\t\t*page_break\n\n\t\tYou have Zlenko and the others anchor a ladder at an angle to a tree in order to create a high point where you can secure the pulley through which is threaded a good long length of rope.  At one end of the rope, you tie the cage with a secure knot.  At this point, you decide that redundancy might be best so you have everyone install a secondary pulley and rope system to also attach to the cage, just in case.  \n\n\t\tNext, you put some cat treats in the back of the cage and set up a trigger that will cause the cage door to close once the kittens are inside.  Then, with two people on each rope system, you carefully lower the cage down to the bottom of the storm drain.\n\n\t\t*page_break\n\n\t\tAnd then you wait.  And you also wait.  And then you wait some more. As you are waiting, an elderly neighbor brings out some cookies for everyone, which you all munch on appreciatively.\n\n\t\t*page_break\n\n\t\tFinally, there's movement down at the bottom of the storm sewer! \n\n\t\tYou shine a light down, and not one but two kittens are inside the cage you had lowered, blithely enjoying the treats. You motion with your hand for everyone to be quiet so as not to startle the kittens and to slowly start bringing up the cage.\n\n\t\tEverything goes smoothly enough.  The two kittens are dirty and a little skinny, but they seem to be in overall good shape.  The probies wrap them in towels to wipe them off and hold them up for Adele and the small crowd of gathered neighbors to see. There is much cooing and applause.\n\n\t\t*page_break\n\n\t\tOf course, when you shine your light back down into the darkness of the storm drain, what do you see but another kitten staring up at you! \n\n\t\tSo you have to repeat the whole process, which requires a lot of patience and a few more cookies happily provided by the elderly neighbor.  Eventually, however, all three baby cats are safely retrieved.\n\n\t\t*set leadership %+20\n\t\t*set relationship_firefighters %+20\n\t\t*set relationship_officers %+10\n\t\t*goto AdoptionOption\n\n\n*label LadderRescue\n\nAnd, in fact, you have a special kind of ladder for just these sorts of moments where space is an issue.  It's called an \"attic ladder,\" used, most often for -- yes, you guessed it -- climbing up into attics! \n\nSo you have one of the probies bring over the attic ladder, while you ask the other to see if they can't obtain a box and maybe some cat treats from one of the neighbors who have now gathered to watch.  You lower the ladder down carefully.  You estimate it to be about a 10-foot drop.  \n\n*page_break\n\nFirefighter Zlenko volunteers to climb down because she's the smallest person among you.  \n\nAre you okay with that?\n*fake_choice\n\t#Sure.  That's fine with me.\n\t\tThat makes sense to you so you agree to let Zlenko be the one to fit down into the small space. \n\t#I want to do this myself, but I'm not sure about the space.\n\t\tYou would rather do this yourself, truth be told, but space is an issue, and Zlenko really is tiny. So you grudgingly agree.\n\nYou do insist that she wears EMS gloves and a helmet with a light in addition to her bunker gear.  Zlenko takes all these precautions, and then, without hesitation, she climbs down into the storm drain.  \n\n*page_break\n\nYou shine an extra light down to help her out. \"What do you see down there?\" you ask, wanting to maintain constant voice contact.\n\n\"Well,\" Zlenko replies, \"It's kind of gross down here, actually. And I don't see any sign of the -- oh!  Wait!  Here's on
