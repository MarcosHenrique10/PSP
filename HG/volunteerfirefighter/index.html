<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Volunteer Firefighter — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "volunteerfirefighter", "title": "The Volunteer Firefighter", "scenes": {"02probie": "\nNow that we are starting to have a sense of who you are and how you deal with emergencies, let's take a few steps back to where this story really begins.  \n\nYou remember that day, of course.  So let's go back there now, to that cold, rainy day in September. You and three others were being sworn in as probationary firefighters, AKA \"probies.\"  \n\n*page_break\n\n*if motivation=\"tradition\"\n\t*goto Tradition\n*elseif motivation=\"grudging\"\n\t*goto Grudging\n*elseif motivation=\"service\"\n\t*goto Service\n*elseif motivation=\"hero\"\n\t*goto Hero\n\n\n*label Tradition\n\nYou felt so proud standing there in your new Class-A uniform with family members there to support you, knowing that both your mother and your grandfather had stood in this very place to take the same oath of service.  \n\nYour mother, an ex-Chief, had her picture on the wall right over there with those of all the other ex-Chiefs in the department.  She may not be an active firefighter anymore, but she was there for you on that day in her full uniform, and her reassuring gaze gives you the courage to speak in unwavering tones as you took your oath of service:\n*page_break \n*goto Oath\n\n*label Grudging\n\nAnd there you were.  Your formal Class-A uniform collar was itchy, and your shoes felt just a little bit too big for your feet. You wished you could be somewhere else, anywhere else, really, rather than there with your family watching you along with so many other members of the community. \n\nYou were pretty sure you could be a decent firefighter.  Hell, you've been immersed in this world your whole life.  It's just that, frankly, you don't really want to be in the fire service. There are so many other things you'd rather be doing. \n\nHopefully, after you put in a year or so here, everyone else would understand that too.  At least you were giving it a try -- right?  \n\nWith a heavy heart, you took your oath of service:\n*page_break \n*goto Oath\n\n*label Service\n\nYou felt so proud standing there in your new, formal Class-A uniform.  Your whole family came out that day to be there for you, the first in the family to become a firefighter.  Your poor mother was up all night worrying, as is her way, but in the morning she gave you a small Maltese cross pendant as a sign of her support.\n\nYou knew that you have so much to learn and that the work wasn't going to be easy, to say the least, but it was so very important.  Passionate about your commitment, you lift your chin and speak in clear tones as you took your oath of service:\n*page_break \n*goto Oath\n\n*label Hero\n\nYou looked positively dashing in your new, formal Class-A uniform or so you had convinced yourself.  You had a charming smile for everyone, especially anyone who wanted to take your picture. This was such a big day for you!  You couldn't wait to get in on the action, put out some fires, save a few lives -- that sort of thing.  When it came time to take your oath of service, you spoke with confidence and enthusiasm.\n*page_break \n*goto Oath\n\n*label Oath\n\n\"I, ${Fname} ${Lname}, do solemnly swear to do my duty as a Volunteer Firefighter for $!{town_name} to the best of my ability; to follow the direction of my commanding officers; to serve the citizens of $!{town_name} with compassion, courage and integrity; to respect and uphold the traditions of professionalism in the fire service; and to uphold the laws and constitution of the United States of America and the by-laws of the $!{town_name} Fire Department; so help me God.\"\n*page_break\n*goto SOGender\n\n*label SOGender\n*set SO true\n\nAs it happens, you had another very important person there to support you that day.  Let's learn a little about them!\n\nFirstly, is your significant other male or female?\n\n*choice\n\t#My girlfriend is a girl!\n\t\tGot it!\n\t\t*set SOgender \"female\"\n\t\t*set SOpronoun1 \"she\"\n\t\t*set SOpronoun2 \"her\"\n\t\t*set SOpronoun3 \"her\"\n\t\tAnd her first name is?\n\t\t*goto SOname\n\n\t#My better half is male.\n\t\tOkay!\n\t\t*set SOgender \"male\"\n\t\t*set SOpronoun1 \"he\"\n\t\t*set SOpronoun2 \"his\"\n\t\t*set SOpronoun3 \"him\"\n\t\tAnd his first name is?\n\t\t*goto SOname\n\t#My beloved does not identify with a binary gender.\n\t\tThat's fine!\n\t\t*set SOgender \"neutral\"\n\t\t*set SOpronoun1 \"they\"\n\t\t*set Sopronoun2 \"their\"\n\t\t*set SOpronoun3 \"them\"\n\t\tAnd their first name is?\n\t\t*goto SOname\n\n\n*label SOname\n*input_text SOname\n*comment capitalization check\n*if (\"${SOname}\" != \"$!{SOname}\")\n\tLet's make sure I have it right.  Your SO's first name is $!{SOname}. Is that correct?\n\t*choice\n\t\t#Yes. $!{SOname}.\n\t\t\t*set SOname \"$!{SOname}\"\n\t\t\t*goto SO\n\t\t#No, my SO's name is ${SOname}, just as I typed it before.\n\t\t\t*goto SO\n\t\t#Oops. That's not right! Let me try that again!\n\t\t\tSure. What's the name again?\n\t\t\t*goto SOname\n\n*label SO\n\nSo ${SOname} was there to support you the day you became a firefighter.  ${SOname} was the first to give you a congratulatory hug after the swearing in ceremony, and ${SOpronoun1} stayed by your side proudly the entire rest of the evening.  Your parents even invited ${SOpronoun3} to join you for a celebration dinner afterwards, which, of course, ${SOpronoun1} accepted. \n\nAt that point, you and ${SOname} had been together for around three months.  How did you feel about the relationship at that point?\n\n*choice\n\t#Everything was great!\n\t\tI'm glad to hear it!  It's always a plus to have a wonderful, romantic partnership!\n\t\t*set relationship_SO 80\n\t\t*page_break\n\t\t*goto SOSupport\n\t#We had some rough moments, but overall things were good.\n\t\tAll relationships have their ups and downs.  However, I'm glad to hear that things were mostly good!\n\t\t*set relationship_SO 60\n\t\t*page_break\n\t\t*goto SOSupport\n\t#Meh.\n\t\tI'm sorry to hear that things weren't going so well.  At least ${SOname} was there for you the day you were sworn in.\n\t\t*set relationship_SO 40\n\t\t*page_break\n\t\t*goto SOSupport\n\n*label SOSupport\n\nHow did ${SOname} feel about you being a volunteer firefighter?\n\n*choice\n\t#Supportive and encouraging.\n\t\tSo ${SOname} fully supported your decision to be a firefighter, and you found you were able to talk about firefighting-related subjects with ${SOpronoun3}, even the technical ones.   ${SOname} always seems interested.  Plus, you had strong evidence to indicate that ${SOpronoun1} found you rather sexy in your uniform!\n\t\t*set SOfeeling \"encouraging\"\n\t\t*set relationship_SO %+20\n\t\t*goto Transition\n\t#Supportive but concerned about the time commitment.\n\t\tAlthough ${SOname} was very supportive about your decision to become a firefighter, ${SOpronoun1} expressed concern on more than one occasion that you will end up spending so much time at the fire house and on fire-related business that you really won't have enough time or energy for a relationship.\n\t\t*set SOfeeling \"worriedtime\"\n\t\t*set relationship_SO %-10\n\t\t*goto Transition\n\t#Worried about my safety and concerned about the time commitment, but respectful of my decision all the same.\n\t\tSo ${SOname} respected your choice to be a firefighter but didn't really the idea of it.  Not only is firefighting an extremely dangerous activity, but it's also very time-consuming (and often suddenly, at the most inconvenient moments).  Still, ${SOname} was there for you at your swearing in, despite all ${SOpronoun2} concerns.\n\t\t*set SOfeeling \"worriedrespectful\"\n\t\t*set relationship_SO %-10\n\t\t*goto Transition\n\t#Terrified that something bad would happen to me.\n\t\tThere are stories on the news now and then of firefighters dying when a roof collapsed or of suffering terrible burns.  No matter how much you reassured ${SOname} that firefighters look after their own and that serious injuries and death are relatively rare, ${SOname} was very afraid something awful would happen to you.  Despite ${SOpronoun2} fear, ${SOpronoun1} was there for you at your swearing in to support you, but you knew this was going to be a difficult obstacle in your relationship.\n\t\t*set SOfeeling \"terrified\"\n\t\t*set relationship_SO %-20\n\t\t*goto Transition\n\t\n\n*label Transition\n\n*if motivation=\"tradition\"\n\t*page_break\n\t*goto ChiefTalk1\n*elseif motivation=\"grudging\"\n\t*page_break\n\t*goto ChiefTalk2\n*else\n\t*page_break\n\t*goto ProbieTest1\n\n*label ChiefTalk1\n\nRight after the ceremony, you'll never forget how Chief Gordon came right up to you with his distinctively thick grey mustache and his thumbs hooked in his belt.  \"So, now I guess I have to deal with another ${Lname},\" he grumbled with apparent consternation. \n\nFrom his tone, it sounded like he might be joking, but you knew full well that the man has never really gotten over losing an election to your mother all those years ago when she became the first female Chief of the department.  And now somehow that bitterness had been transferred to you by association.  \n\n\"Are you going to be more trouble for me?\" he asked, and his expression distinctly contained a challenge.\n\nHow did you reply?\n*choice\n\t#Respectfully.  I didn't need to cause more problems, especially not on my first day as a firefighter.\n\t\t\"I hope not, Chief,\" you replied simply and in a tone that you hoped came across as somewhat deferential. You didn't want to get off to a bad start, after all.\n\n\t\t\"Well, I'll be watching you,\" Chief Gordon grunted before turning away to go talk to somewhat else.  He seemed almost disappointed that he didn't have an opportunity to get mad at you.  It definitely could've gone worse!  \n\t\t*set relationship_officers %+10\n\t\t*page_break\n\t\t*goto ProbieTest1\n\t#With a witty retort.  After all, sometimes humor can help people lighten up.\n\t\t\"Only the best kind of trouble,\" you replied in your most charming tone. \n\n\t\t\"More like the worst kind of of crap,\" Chief Gordon grunted in reply.  Then he eyed you disapprovingly before he turned away to talk to someone else.  It just didn't bode well for your future interactions with the command staff.\n\t\t*set relationship_officers %-10\n\t\t*page_break\n\t\t*goto ProbieTest1\n\t#Equally impolite. I hadn't done anything wrong, and he had no right to talk to me like that.\n\t\t\"Only as much trouble as you are to me,\" you said, narrowing your eyes as you boldly return the challenge and not very respectfully either.\n\n\t\t\"Watch yourself, ${Lname},\" Chief Gordon replied, and there was an undercurrent of real anger there. He glared at you briefly and then turned away to talk to somebody else.  That just didn't seem to bode well for your future interactions with the command staff.\n\t\t*set relationship_officers %-20\n\t\t*page_break\n\t\t*goto ProbieTest1\t\n\n*label ChiefTalk2\n\nRight after the ceremony, Chief Gordon came up to you with his distinctively thick grey mustache shaped by his smile and his thumbs hooked in his belt. \"Hey there, Champ!\" He'd been calling you \"Champ\" for as long as you remember, and you never could stand the nickname.  \"I've been looking forward to having another ${Lname} in the department.  It's been too long!\" He patted you on the back just a little bit too hard to be comfortable.\n\nHow did you reply?\n\n*choice\n\t#Respectfully. I didn't need to cause more problems, especially not on my first day as a firefighter.\n\t\t\"I've been looking forward to being here, Chief,\" you replied, hoping your enthusiasm sounded genuine.  If you're going to have to be here, you might as well get off to a decent start.\n\n\t\t\"Well, we're glad to have you, ${Fname},\" Chief Gordon replied sincerely. He grinned at you a bit and then turned away to talk to someone else.\n\n\t\tSo that was fine.\n\t\t*set relationship_officers %+20\n\t\t*page_break\n\t\t*goto ProbieTest1\n\t#Sarcastically. If he could be sickeningly enthusiastic, so could you.\n\t\t\"I know -- right?\" you replied expressively and with a wide grin. \"It's about time another ${Lname} graced these hallowed halls!\"\n\n\t\t\"All right, then.\" Chief Gordon gave you a strange look and looked as if he were going to say something more, but then he just smiled and turned away to talk to someone else.\n\n\t\tSo that wasn't too bad.\n\t\t*set relationship_officers %+5\n\t\t*page_break\n\t\t*goto ProbieTest1\n\t#Rudely.  You're not the same person as your mother.  The sooner he realized this the better.\n\t\t\"My name isn't 'Champ,'\" you informed Chief Gordon for what must have been the thousand time, not that he ever listened. \"I'm ${Fname}.  And I'm not 'another ${Lname}.' I'm my own person.\"\n\n\t\tChief Gordon seemed momentarily taken aback, as if surprised you would be so rude, but then he just replied, \"Whatever you say, Champ,\" and turned away to talk to someone else.\n\n\t\tSo that could've been worse.\n\t\t*set relationship_officers %-10\n\t\t*page_break\n\t\t*goto ProbieTest1\n\n*label ProbieTest1\n\nAnyway, as a probie, you were on the very bottom of the totem pole, the lowest rung of the hierarchical ladder, and were ordered about accordingly.  \n\nProbies get a year to prove that they can be valuable members of the team, and, during that time, they have a lot to learn about more than just firefighting skills.  They need to learn about professionalism, firehouse culture and organization, and even basic information such as the location of tools on the trucks.\n\n*page_break\n\nAs with all new probies, the first few weeks were rough for you.  You were given countless menial tasks to do often, forced to demonstrate your devotion every other moment, and the worst -- really, the worst part was the practical jokes.\n\nYou found whipped cream in your boots, flour in your helmet, and had been sent on a tiresome  number of quests to fetch non-existent equipment, such as the \"left-handed screwdriver,\" the \"water hammer,\" and your personal favorite: the \"hose stretcher.\"\n\n*page_break\n\nIn one particular instance, you were just about to head home after a long evening at the fire house, and this was already after a long day at work. To top it off, you'd been feeling a little achy and a scratchy throat suggested you were probably coming down with something.  So you were especially anxious to get home!\n\nYou opened your locker to stash some of your gear, and, as it turned out, someone had stuffed it with what seemed like a billion packing peanuts that spilled out all over the floor.  What a pain!  \n\nHow did you deal with it?\n\n*fake_choice\n\t#I cleaned it up, just like a good probie.\n\t\tProbies get pranks played on them.  It's all part of the experience.  The best way to show you can be part of the team was to roll with the punches and have a good attitude. The probationary year would be over soon enough.\n\t\t*set relationship_firefighters %+10\n\t#To heck with it.  I left it there!\n\t\tYou were tired and getting sick.  There was no flipping way you were going to stay around for another hour trying to sweep up all these peanuts because somebody thought they were being cute by tormenting the probie.  Someone else could deal with the mess.  You went home.\n\t\t*set relationship_firefighters %-20\n\t#Oh, I cleaned it up.  But I also plotted revenge.\n\t\tProbies get pranks played on them.  It's all part of the experience.  The best way to show you can be part of the team wa to roll with the punches and have a good attitude. The probationary year would be over soon enough.\n\n\t\tHowever, it would have been a shameful waste to just throw away all these perfectly good peanuts -- wouldn't it? \n\n\t\t*page_break\n\n\t\tSo you swept them up and piled them into the shape of a smiley face atop the pool table in the rec room for all to see.  \n\n\t\tTruth be told, the other firefighters were amused by your creativity, but, alas, you did have to clean up all the peanuts a second time.\n\t\t*set relationship_firefighters %+10\n*page_break\n\nOne day, while you were at the firehouse going over the trucks, an alarm came in for a structure fire in the area, blaring over the loudspeaker with urgency.  Being right there in the truck bay, you geared up with your bunker pants, boots, and coat, grabbed your helmet, and were pretty much the first firefighter to hop into the firetruck. \n\nSeveral others arrived shortly thereafter and quickly filled up the remaining seats.  Your pulse raced with a surge of adrenaline -- your first real call and a structure fire at that!\n\n*page_break\n\nJust when the truck was about ready to leave, veteran firefighter Guy McCollaugh appeared at the truck door with his broad shoulders and steely gaze, already in full gear. You had a sinking feeling in your gut right away.\n\nPredictably, McCollaugh pointed a finger at you and brusquely ordered, \"Probie. Out.\"\n\nHow did you respond?\n\n*choice\n\t#I was disappointed, but I followed orders.\n\t\t\"Sure thing,\" you said with as much grace and dignity as you could manage, relinquishing your seat to the senior firefighter.  \"Don't have too much fun without me,\" you jested to the crew.  They waved at you amicably as the truck door slammed shut and the truck raced off, lights and sirens blaring, to the scene of the fire without you.\n\t\t*set relationship_firefighters %+10\n\t\t*page_break\n\t\t*goto ProbieTest2\n\t#Fine. I didn't really want to go anyway.\n\t\tYou glared swords at McCollaugh.  Then you just shrugged it off and removed yourself from the truck with as much grace and dignity as you could muster under the circumstances.  The truck door slammed behind you, and the firetruck pulled out of the station, lights and sirens blaring, and you were left behind to twiddle your thumbs alone.\n\t\t*set relationship_firefighters %-10\n\t\t*page_break\n\t\t*goto ProbieTest2\n\t#Damn it!  That bastard!  He had no right!\n\t\tHe had every right, actually.  He is a firefighter, after all.  And you were just a probie.  \n\n\t\t*page_break\n\n\t\tBut you took too long with your sulking and moping so McCollaugh actually grabbed you by your coat and none-too-gently removed you from the truck himself.  The truck door slammed behind you, and the firetruck pulled out of the station, lights and sirens blaring, leaving you behind.  \n\n\t\tYou were left feeling embarrassed and angry and more than a little disappointed. And, unfortunately, you probably managed to piss of some of the other firefighters as well with both your attitude and that you delayed their response to a fire.  \n\t\t*set relationship_firefighters %-20\n\t\t*page_break\n\t\t*goto ProbieTest2\n\n*label ProbieTest2\n\nAnd then, some weeks later, it was the night of the big football game.  Everyone in the department was going to gather in the rec room to watch the game on the big screen.  Even the people who didn't like football planned to attend because there would be plentiful pizza and sandwiches, best of all, root beer floats!  You'd been looking forward to this for weeks.\n\nOf course, only 15 minutes before kick-off, your Captain ordered you and a couple of the other probies to wash one of the trucks for an upcoming parade before you could come to join the others in the rec room.  This meant you would miss the beginning of the game or even more, depending on how long it took you to complete the task.\n\nHow did you deal with this injustice?\n\n*choice\n\t#This Captain clearly had some sort of bug up his ass against me. I wondered what his problem was, but I knew my place.  Still, I didn't have to like it or even pretend to like it, for that matter.\n\t\t\"Whatever you say, Captain,\" you replied in a tone that clearly expressed your discontent.  \n\n\t\tYou sighed dramatically and were clearly sulking the whole time you labored to scrub the truck with soapy water and hose it down as quickly and ineffectively as possible.  With your attitude, the whole process actually took much longer than it could have because you ended up having to redo sections that you had already washed but badly.\n\n\t\tBy the time you finished cleaning the truck, it was half-time, the few remaining slices of pizza were cold, and the root beer was gone.\n\t\t*set relationship_officers %-20\n\t\t*page_break\n\t\t*goto Job\n\t#The fire department was more important to me than a football game.  Besides, I enjoy washing trucks.\n\t\t\"Sure thing, Captain,\" you replied agreeably and set off to get the cleaning supplies set up.  You knew that if you worked together with the other probies and got the the job done right, then you probably wouldn't miss more than a few minutes of the game.  And so it was!\n\n\t\tYou were able to watch most of the game, eat some delicious pizza, and enjoy a root beer float.  Admittedly, you also found a certain satisfaction in seeing the truck gleaming and clean, ready to be part of a parade. \n\t\t*set relationship_officers %+20\n\t\t*page_break\n\t\t*goto Job\n\t#The hell if I was going to be scrubbing tires during kick-off!\n\t\t\"But I'll miss the game!\" you protested in despair, unable to expect that your Captain could really be inflicting this unimaginably cruel punishment upon you just because you're a probie and he can.\n\n\t\t\"You'll miss it for sure if you spend the whole time complaining,\" the Captain replied, unimpressed.  \"Get to work.\"\n\n\t\tBy the time you're done taking a walk to cool down so you don't hit anyone [i]and[/i] wash the truck, the game is nearly over and the food is gone.  What a crappy afternoon.\n\t\t*set relationship_officers %-20\n\t\t*page_break\n\t\t*goto Job\n\n*label Job\n\nNow, of course, this fire department stuff isn't your whole life.  You still need to pay the bills after all, and a volunteer position doesn't help at all with that.\n\nSo what is it that you do for your \"day job\"?\n\n*choice\n\t#I'm a construction worker.\n\t\tA construction worker, you say?  That's hard work!  All that physical labor means you've got an extra edge when it comes to physical strength, and that will certainly come in handy for a firefighter.\n\t\t*set career \"construction\"\n\t\t*set strength +20\n\t\t*page_break\n\t\t*goto Training\n\t#I'm a lawyer.\n\t\tA lawyer, you say?  That means you're probably very good at standing up in front of people and saying what needs to be said.  Surely this will give you an edge when it comes to your leadership skills as a firefighter.\n\t\t*set career \"lawyer\"\n\t\t*set leadership +20\n\t\t*page_break\n\t\t*goto Fitness\n\t#I'm an emergency dispatcher.\n\t\tAn emergency dispatcher, you say? Well, then, you already have your foot in the world of emergency services and probably know a lot more than the average probie right off the bat!\n\t\t*set career \"dispatcher\"\n\t\t*set fire_knowledge +20\n\t\t*page_break\n\t\t*goto Fitness\n\t#I'm a middle school teacher.\n\t\tA teacher, you say?  That means you're probably very good at standing up in front of people and saying what needs to be said, not to mention making order out of chaos!\n\t\t*set career \"teacher\"\n\t\t*set leadership +20\n\t\t*page_break\n\t\t*goto Fitness\n\t#I'm a mechanical engineer.\n\t\tAn engineer, you say?  Your grasp of physics and other practical knowledge will give you an immediate advantage when it comes to learning firefighting-relate skills.\n\t\t*set career \"engineer\"\n\t\t*set fire_skills +20\n\t\t*page_break\n\t\t*goto Fitness\n\n\n\n*label Fitness\n\n*set career_set true\n\nSo now that we know what you do for a living and that obviously you're interested in firefighting, I'm curious to know what, if anything, you do to keep in shape.\n\n*choice\n\n\t#I try to work out in the mornings, at least a few times every week.\n\t\tSometimes you go jogging.  Sometimes you lift weights.  Your activities vary, but you always try to make some time to keep healthy and fit because it's important!\n\t\t*set strength +10\n\t\t*goto Training\n\t#I work out occasionally, but other things often seem to take priority.\n\t\tWhen you can manage to find the time, you enjoy lifting some weights or taking a jog around the neighborhood, but it's not really part of your daily routine.\n\t\t*goto Training\n\t#Does pushing buttons on the TV remote count as working out?\n\t\tNo, it really doesn't.\n\t\t*set strength -10\n\t\t*goto Training\n\t#My body is my temple. I work out regularly and mind my diet.\n\t\tGood for you! Being healthy and in shape is important for everyone, but it's especially important for firefighters because of the physically demanding nature of their job.\n\t\t*set strength +20\n\t\t*set fitnessbuff true\n\t\t*goto Training\n\n\n*label Training\n\n\nAlso, in addition to all the time you spent at the fire  house, you still had to invest a significant amount of time in your official training, which served an important foundation for all of your firefighting skills and knowledge.  \n\n*page_break\n\nAfter you passed a background check and a physical exam, you were sent to the nearest Fire Academy to complete the required Firefighter 1 training, which is over 100 hours of both classroom and hands-on training sessions.  That's a pretty huge time commitment!\n\nYou studied many different topics including the history of firefighting, fireground operations, fire suppression techniques, use of firefighter personal protective equipment (PPE), rescue equipment, and tools.  On top of all that, you had to get certified in a special course of First Aid and CPR. \n\nIt was a lot to take in!\n\n*page_break\n\nSo, after all that work, you passed a written and practical exam and were finally ready to get to some real firefighting!\n\nOf course, there are always opportunities available for additional training.  Which, if any, did you take?\n\n*choice\n\n\t#I thought the hands-on training was particularly helpful. So I attended extra drills.\n\t\tGood for you!  You were able to participate in training that included more information on subjects like rescue knots, ladder rescue, vehicle extrication, radio communications, and more.\n\n\t\tTaking the time to hone your skills in a training environment can make the difference between life-and-death in the scene of an actual emergency, which is what you had to deal with next!  \n\t\t*set fire_skills %+30\n\t\t*set fire_knowledge %+20\n\t\t*set strength +10\n\t\t*finish\n\t#When talking with more experienced firefighters, I found they had so many interesting stories to tell and advice to share.  So I spent some extra time learning from them.\n\n\t\tAnd you picked up many interesting and helpful bits of information this way! \n\n\t\tFor example, one firefighter regaled you with a tale of how his fellows made fun of him for years when he spotted a trapped firefighter with his thermal imaging camera and called in a mayday, only to discover it was his own image he had seen, reflected in a mirror!\n\n\t\tAnother firefighter relayed a more sobering memory of her comrade who was goofing around in the firehouse one day while carrying SCBA air bottles.  One slipped from his grip, hit the floor, and the resulting explosion not only killed him but left an indentation in the wall of the truck bay that remains to this day.\n\n\t\t*page_break \n\n\t\tTaking time to talk to people who have had years of experience is an excellent way to both pick up useful tips and improve your relationships with the people you'll be working with during an actual emergency, which is what you had to deal with next!\n\t\t*set relationship_firefighters %+40\n\t\t*set fire_knowledge %+20\n\t\t*finish\n\t#I love to read.  So I spent some extra hours just reading books on firefighting, browsing through articles online, and participating in firefighting forums.\n\t\tThese days there is so much information out there to be found by anyone who's willing to look for it.  You actually learned a good amount just sitting in front of your computer and reading.  This extra knowledge could very well help you when responding to an actual emergency, which is what you had to deal with next!\n\t\t*set fire_knowledge %+30\n\t\t*finish\n\t#There was so much to learn!  So I tried to do a little bit of everything: extra drills, talking with more experienced firefighters, and reading interesting articles when I found them.\n\t\tSo you made time in your schedule to attend a few extra trainings on subjects like rescue knots and vehicle extrication.  You subscribed to firefighting magazines and participated in an online forum for firefighters all around the country.  \n\n\t\tWhen you were at the fire house, you made a special effort to talk with other firefighters and listen to their many and varied stories.  For example, one firefighter regaled you with a tale of how his fellows made fun of him for years after he spotted a trapped firefighter with his thermal imaging camera and called in a mayday, only to discover it was his own image he had seen, reflected in a mirror!\n\n\t\t*page_break \n\n\t\tWith all the information out there, it seemed like the well-rounded approach to your extra training might be the best way to go.  In that way, you can get to know more people and learn a little bit more about everything!  All this effort could give you an extra edge when dealing with an actual emergency, which is what you had to deal with next!\n\t\t*set fire_skills %+20\n\t\t*set fire_knowledge %+20\n\t\t*set relationship_firefighters %+20\n\t\t*finish\n\t#Uh.  I just did 107 hours of training. I needed a break already!\n\t\tAfter all that training, you just needed to rest for a little while and absorb all that you learned.  It was certainly an understandable decision.  There's no resting during an actual emergency, however, which is what you had to deal with next!\n\t\t*finish\n", "03firstalarm": "\n3:04 am.  Your pager started blaring at top volume:\n\n\"$!!{town_name} FIRE DEPARTMENT, THERE IS A REPORT OF A VEHICLE FIRE AT 4 OAK STREET. REPEATING FOR $!!{town_name} FIRE DEPARTMENT: YOU HAVE A REPORTED STRUCTURE FIRE AT 4 OAK STREET. TIME NOW IS 0304.\"\n\n*page_break\n\nA part of your mind was waiting for this to happen, hoping for it, even as the rest of you slept deeply, dreaming about --\n\nWhat had you been dreaming about again?\n\n*fake_choice\n\t#Chocolate-covered marshmallow men playing bingo.\n\t\tHuh?  That's weird.\n\n\t\tAnyway...\n\t\t*page_break\n\t#I don't remember.  It was a while ago.\n\t\tFair enough.\n\n\t\tLet's move on with our story.\n\t\t*page_break\n\t#Firefighting, of course.\n\t\tI'm not surprised!\n\n\t\tLet's move on with our story.\n\t\t*page_break\n\t#Your mom.\n\t\tHey, now.  There's no need to be rude.\n\n\t\tLet's move on with our story.\n\t\t*page_break\n\n\n\nSo your pager toned out a vehicle fire in a residential area only a few blocks from the firehouse.  With your pulse racing, you quickly threw on some clothes, slipped on your shoes, and ran out the door.\n\n*set responses +1  \n\nWhen you arrived at the firehouse, a few firefighters were there before you, pulling on their gear while half asleep, but you were still in time to make the first crew out.  Although you half expected to be disappointed, this time nobody took your seat.  Actually, not too many other firefighters showed up at all, possibly because it was so late/early on a work night.  So this was really happening.  \n\nYou can still clearly remember the rumble of the truck, the loud wailing of the siren as you passed through intersections, and the almost eerie way the emergency lights flickered against the front yards and houses that you passed on the way to the scene.\n\n*page_break\n\nVery soon you arrived at the scene of the fire.  The driver prudently stopped the truck about 60 feet uphill and upwind of the fire scene and the firefighters quickly got out to survey the situation.\n\nA fairly new sedan was on fire, with a big tall column of black smoke pouring up into the sky above.  The vehicle was parked in the driveway of a two-story colonial home, and the driveway sloped down toward the street.  The police had arrived before you to set up a large safety perimeter, and a pale-faced woman, possibly the home owner, was yelling at a police officer who was very patiently trying to get her to calm down.\n\n*page_break\n\n*temp performance\n*if company=\"Truck\"\n\t*goto Truck\n*else\n\t*goto Engine\n\n*label Truck\n\nAs a member of the truck company, you would get to help rescue any victims, if there were any.  Fortunately, this time, no one is trapped in the car!  So, instead, one of your jobs would be to carefully pry open the hood so that the engine company can get water on that fire and put it out!  You'd also need to put chocks under the wheels to prevent the car from rolling anywhere.  Plus, you'd have to watch for fuel links and keep an eye out for other potential hazards.  There was plenty to be done!  \n\n*page_break\n\n\nThe Engine Company hose teams were quickly setting up and charging their hose lines, one main attack line and a back-up line, as well as an additional hose line to protect the nearby home.  \n\nAt that point, you just needed your officer's orders to find out where you were to start.\t \n\n*page_break\n\nNow, one of the other probies was ordered to fetch the chocks from the truck and block the wheels, and you were given the chance to use your set of irons to very carefully pry open the hood of the car so that water could be sprayed directly into the engine compartment. At this point, the engine company had already been spraying underneath the car to cool things down considerably, extinguishing all visible flames.  You just need to get in there with your halligan pry bar and give them access from the top.  \n\nOf course, it would have been much simpler if you could just get into the passenger compartment and pull the hood-release lever, but, with so much of the car either melted or on fire, that really wasn't going to work.  So you masked up, turned on your air, and in you went with your halligan. \n\n*page_break\n\n*if fire_knowledge > 40\n\tBecause of your diligence in training, you were already well aware of the dangers present in fighting car fires, not the least of which being that the bumpers and tires can explode outwards with terrifying force if they get hot enough.  So it's very important to be extra careful!\n\n\tWith this in mind, how did you approach the burning vehicle?  \n\t*choice\n\t\t#I ran quickly to the front of the hood to pry it up where the latch is located -- hopefully before anything dangerous could explode!\n\t\t\t*gosub end_trial\n\t\t\tThat kind of wishful thinking could get you killed!  Safety should always be your first priority.  Thankfully, your officer was there to set you straight:\n\n\t\t\t\"${Lname}, get the hell away from that bumper!  Go in at a 45-degree angle!\"\n\n\t\t\tCome to think of it, you did remember learning that you should do that.  Quickly, you adjusted your approach to a 45-degree angle, as instructed.\n\t\t\t*set performance \"stupid\"\n\t\t\t*page_break\n\t\t\t*goto Pry\n\t\t#I approached cautiously from a 45 degree angle to be out of the way of anything that that could blow out from the heat.\n\t\t\t*gosub end_trial\n\t\t\tAnd that's exactly what you should have been doing.  Your officer supervises your approach approvingly.\n\t\t\t*set performance \"smart\"\n\t\t\t*page_break\n\t\t\t*goto Pry\n\t\t#I wasn't sure so I asked my officer.\n\t\t\t*gosub end_trial\n\t\t\tWhen in doubt, it's always a good idea to ask, especially during your time as a probie when you're still learning the basics!  Your officer advised you to approach the vehicle from a 45-degree angle so you'd be more or less out of the way of the wheels or bumper if they should blow.  And so that's what you did!\n\t\t\t*set performance \"smart\"\n\t\t\t*page_break\n\t\t\t*goto Pry\n*else \n\tYou tried to remember everything you learned in training as you hurried to complete your designated task, but there was so much information and, at that point, you had so little experience to back it up. Still, your officer gave you an order so you had to do your best!\n\n\tHow did you approach the vehicle?\n\t*choice\n\t\t#I ran quickly to the front of the hood to pry it up where the latch is located.\n\t\t\t*gosub end_trial\n\t\t\tNow, it made perfect sense to you to go and try to pry up the hood in the front, where the latch is located, but, as you head in that direction, your officer seems to have a very strong, differing opinion on the matter.\n\n\t\t\t\"${Lname}, get away from that bumper!  Go in at a 45-degree angle!\"\n\n\t\t\tHuh?  \n\n\t\t\tIn the back of your mind, you then vaguely remembered reading something about a car bumper exploding out during a vehicle fire and killing a firefighter who was standing 20 feet away.  And, since you didn't particularly want to become a \"what not to do\" story in someone else's training class, you quickly adjusted your direction to a 45-degree angle, as instructed.\n\t\t\t*set performance \"stupid\"\n\t\t\t*page_break\n\t\t\t*goto Pry\n\t\t#I ran quickly to the passenger side of the vehicle, which was upwind, to try to pry the hood up from there.\n\t\t\t*gosub end_trial\n\t\t\tNow, it made perfect sense to you to go and try to pry up the hood from the side, but, as you headed in that direction, your officer seemed to have a very strong, differing opinion on the matter.\n\n\t\t\t\"${Lname}!  Get away from that tire!  Go in at a 45-degree angle!\"\n\n\t\t\tHuh?  In the back of your mind, you then vaguely remembered reading something about a super-heated car tire bursting during a vehicle fire and injuring a nearby firefighter.  And, since you didn't particularly want to become a story in someone else's training class, you quickly adjusted your direction to a 45-degree angle, as instructed.\n\t\t\t*set performance \"stupid\"\n\t\t\t*page_break\n\t\t\t*goto Pry\n\t\t#I wasn't sure so I asked my officer.\n\t\t\t*gosub end_trial\n\t\t\tWhen in doubt, it's always a good idea to ask, especially during your time as a probie, when you're still learning the basics!  Your officer advised you to approach the vehicle from a 45-degree angle so you'd be more or less out of the way of the wheels or bumper if they should blow.  And so that's what you did!\n\t\t\t*set performance \"smart\"\n\t\t\t*page_break\n\t\t\t*goto Pry\n\n\n\t*label Pry\n\n\tWhen you got to the vehicle, you were particularly grateful for your face mask. The thick black smoke seemed unhealthful at best.  At least it is mostly blowing away from you at this point. \n\n\t*if strength > 50 \n\n\t\tWith the hose team right behind you, you used the spiked end of your halligan to pierce the metal hood.  Then you put your weight into it and pried it up  just enough to get a good stream of water into the engine compartment.  You did your best to avoid getting blasted with water and steam while staying near in case your help was needed again.\n\n\t\t*page_break\n\t\t*goto TruckFinish\n\n\t*else\n\n\t\tWith the hose team right behind you, you used the back of your ax to wedge your halligan into the narrow line of the edge of the hood.  Then you put your weight into it to try to pry up the hood, but, try as you might, you couldn't get it to budge!  You were mortified with embarrassment as someone else had to step in, grab your irons, and do the job instead.\n\n\t\t*page_break\n\t\t*goto TruckFinish\n\n*label TruckFinish\n\nOnce the fire was extinguished, you waited a few minutes for the smoke and steam to dissipate.  Then it came time for the dirty business of overhaul.  Before you went to work, Firefighter Velez put a gloved hand on your shoulder and asked you:\n\n\"Hey, ${Lname}, you remember what you have to watch out for with this overhaul -- right?\"\n\n\"Sure,\" you replied.  \n\n*fake_choice \n\t#\"I have to be careful about the airbags because they could explode.\"\n\t\t\"Seems like you remember your training,\" Velez replied, sounding at least mildly impressed.  \n\n\t\tOf course, it's always important to watch your head and try not to step on anyone's toes too.\n\t#\"I have to try not to hit my head in the confined space.\"\n\t\t\"That's a generally good rule of thumb, yeah, but I was talking more about the airbags.  They could deploy without warning, and you could get hurt if you're in the way.  So just be careful,\" Velez advised.\n\t#\"I have to be careful not to get in anyone else's way.\"\n\t\t\"Heh. That's a good philosophy for a probie, I admit, but I meant watch for the airbags.  They could deploy without warning, and you could get hurt if you're in the way.  So just be careful,\" Velez advised.\n\n*page_break\n\nYou, Velez, and a couple others helped remove some burnt upholstery that the hose team soaked with water as well as get behind the dashboard and anywhere that sparks might linger.  Every component in the engine compartment is fully soaked before the officer officially declares the fire out and the scene under control.\n\n*goto End\n\n\n\n*label Engine\n\nAs a member of the engine company, your very important job, as always, was to get water on the fire.  Also, if the officer in charge deemed it necessary, there could also be a hose team assigned to protect the nearby house by spraying it with water as well.  \n\nFor a small fire like this, it is usually sufficient to draw from the engine's own water tank so no one had to stretch a supply line to the hydrant.   The driver stepped up to the platform to take charge of the pump panel. \n\n*page_break\n\nYou were assigned to lead the hose team under the close supervision of Firefighter Velez.  The main attack line was quickly flaked out to avoid kinking and, once you had a good grip on the nozzle, Velez called for the line to be charged while you were still a good distance from the actual fire.  \n\nYou could feel the hose grow stiff and heavy with water as you held it in your arms.  You opened the nozzle briefly, as you were taught.  It sputtered loudly as you bled the air from the line.  \n\nThen you masked up and turned on your air. Finally, it was time to go get that fire.  \n\n*page_break\n\n*if fire_knowledge > 50\n\tBecause of your diligence in training, you were already well aware of the dangers present in fighting car fires, not the least of which being that the bumpers and tires can explode outwards with terrifying force if they get hot enough.  So it's very important to be extra careful!\n\n\tWith this in mind, how did you approach the burning vehicle?  \n\t*choice\n\t\t#I attempted to approach the vehicle head on.  Ideally, I could put out the fire before anything got too hot..\n\t\t\t*gosub end_trial\n\t\t\tThat kind of wishful thinking could get you killed!  Safety should always be your first priority.  Thankfully, Velez was there to set you straight:\n\n\t\t\t\"${Lname}, are you out of your freakin' mind?  Go in at a 45-degree angle on the side!\"\n\n\t\t\tCome to think of it, you did remember learning that you should do that.  Quickly, you adjusted your approach to a 45-degree angle, as instructed.\n\t\t\t*set performance \"stupid\"\n\t\t\t*page_break\n\t\t\t*goto Douse\n\t\t#I lead the approach cautiously from a 45 degree angle to be out of the way of anything that ruptures or blows out from the heat.\n\t\t\t*gosub end_trial\n\t\t\tAnd that's exactly what you should have been doing.  Velez surveyed your approach approvingly as he backed you up on the line.\n\t\t\t*set relationship_firefighters %+10\n\t\t\t*set performance \"smart\"\n\t\t\t*page_break\n\t\t\t*goto Douse\n\t\t#I wasn't sure so I asked Velez.\n\t\t\t*gosub end_trial\n\t\t\tWhen in doubt, it's always a good idea to ask, especially during your time as a probie when you're still learning the basics!  \n\n\t\t\tVelez advised you to approach the vehicle from a 45-degree angle so you'd be more or less out of the way of the wheels or bumper if they should blow.  And so that's what you did!\n\t\t\t*set performance \"smart\"\n\t\t\t*page_break\n\t\t\t*goto Douse\n*else \n\tYou tried to remember everything you learned in training as you hurried to complete your designated task, but there was so much information and, at that point, you had so little experience to back it up. Still, your officer gave you task so you had to do your best!\n\n\tHow did you approach the vehicle?\n\t*choice\n\t\t#I figured it would make sense to bring the hoseline straight to the engine compartment since that's where the fire was burning.\n\t\t\t*gosub end_trial\n\t\t\tNow, it made perfect sense to you to go directly for the front of the car, but, as you head in that direction, Velez seems to have a very strong, differing opinion on the matter.\n\n\t\t\t\"${Lname}, are you out of your freakin' mind?  Get the hell away from that bumper!  Go in at a 45-degree angle!\"\n\n\t\t\tHuh?  \n\n\t\t\tIn the back of your mind, you then vaguely remembered reading something about a car bumper exploding out during a vehicle fire and killing a firefighter who was standing 20 feet away.  And, since you didn't particularly want to become a \"what not to do\" story in someone else's training class, you quickly adjusted your direction to a 45-degree angle, as instructed.\n\t\t\t*set performance \"stupid\"\n\t\t\t*page_break\n\t\t\t*goto Douse\n\t\t#I tried to bring the hose to the passenger side of the vehicle, which was upwind, to be out of the way of all the smoke.\n\t\t\t*gosub end_trial\n\t\t\tNow, it made perfect sense to you to try that approach, but, as you head in that direction, Velez seems to have a very strong, differing opinion on the matter.\n\n\t\t\t\"${Lname}, are you out of your freakin' mind?  Get the hell away from that tire!  Go in at a 45-degree angle!\"\n\n\t\t\tHuh?  In the back of your mind, you then vaguely remembered reading something about a car tire exploding out during a vehicle fire and killing a firefighter who was standing 20 feet away.  And, since you didn't particularly want to become a story in someone else's training class, you quickly adjusted your direction to a 45-degree angle, as instructed.\n\t\t\t*set performance \"stupid\"\n\t\t\t*page_break\n\t\t\t*goto Douse\n\t\t#I wasn't sure so I asked my officer.\n\t\t\t*gosub end_trial\n\t\t\tWhen in doubt, it's always a good idea to ask, especially during your time as a probie, when you're still learning the basics!  \n\n\t\t\tVelez advized you to approach the vehicle from a 45-degree angle so you'd be more or less out of the way of the wheels or bumper if they should blow.  And so that's what you did!\n\t\t\t*set performance \"smart\"\n\t\t\t*page_break\n\t\t\t*goto Douse\n\n*label Douse\n\nAt around 30 feet from the vehicle, upwind and uphill and approaching from that very important 45 degree angle, you opened the nozzle and started putting water on the fire, also occasionally sweeping water across the bottom of the vehicle to cool down those bumper pistons, shock absorbers, and the hydraulic struts before they got hot enough to blow out and, equally important, the fuel tank before it ruptured.  A second hose team got into place to wet down the side of the house closest to the vehicle to reduce the risk of the fire spreading.  \n\nAs you neared the vehicle, you attacked all the orange flames that you could see.  Black smoke continued to billow up from under the hood.  You noticed that some darker colored liquid was leaking from the engine compartment, creating a small trail of flame that was slowly creeping its way toward you.  \n\nWhat, if anything, did you do about it? \n\n*choice\n\n\t#I knew it was a fuel leak! I quickly pointed it out to Velez.\n\t\tHe saw it too.  He reminded you to widen the spray to a fog pattern and yelled to the officer in charge about the fuel.\n\t\t*page_break\n\t\t*goto extinguish\n\t#I thought it was probably nothing. The water would take care of it.\n\t\tYou really took that chance? \n\n\t\tFortunately, it wasn't up to you. Velez noticed it too and instructed you to open the nozzle to a wide fog pattern.  He then yelled to the officer in charge that there might be fuel.\n\t\t*page_break\n\t\t*goto extinguish\n\t#Whatever the substance it was obviously flammable.  I widened the spray on the nozzle to a fog pattern.\n\t\tVelez spotted the possible fuel leak at the same time that you did, but you were one step ahead of him with the water, using that fog pattern to try to keep it under control and prevent the fuel from lighting anything else on fire.  He yelled to the officer in charge to alert them to the situation.\n\t\t*page_break\n\t\t*goto extinguish\n\t#I yelled, \"It's gonna blow!\" Then I dropped the hose line and ran for cover.\n\t\tMaybe you were really scared, or maybe you were just being terrible.  Whatever the case, hearing your warning, the other probies and several experienced firefighters ran for cover as well. \n\n\t\t\"It's just a small fuel leak!\" Velez called to the others.  \"Jensen, come over here,\" he waved another firefighter over to back him up on the hose line. \n\n\t\tThe captain of your company, Jennifer Simmons, looked downright furious.  \"${Lname}, get the hell out of my face now,\" she ordered you.  \n\n\t\tSo you were forced to go stand with others who were on hand in case they were needed for something but otherwise were just pretty much watching from the sidelines. It's not like you weren't given a chance.  Hopefully you'll do better next time!\n\n\t\t*set performance \"awful\"\n\t\t*set relationship_firefighters %-40\n\t\t*set relationship_officers %-40\n\t\t*page_break\n\t\t*goto extinguish\n\n\n*label extinguish\n\nWithin a few minutes, the fire was completely knocked down. Some members of the engine company spread sand to absorb the spilled fuel while others worked with the truck team to spray water on any smoldering material uncovered during overhaul.  The car, the house, and really the entire area was thoroughly soaked.\n\n*goto End\n\n\n*label End \n\nYou were pretty soaked as well and covered with soot and probably exhausted, but all of that faded beneath the thrill of your first fire.  You had taken the oath, gotten your gear, and pushed through all the training, but only then, at that moment in time, did you truly begin to feel like a firefighter.\n\n*page_break\n\nAfter rehab and back at the fire house, Juan Velez took you aside for a talk. Velez was a slightly overweight middle-aged man, an instantly likeable fellow with striking dark eyes, salt-and-pepper hair. It seemed like it was natural for him to take you under his wing.\n\n\"So that was your first fire, was it?\" he started out, handing you a cold bottle of water.  \"How do you feel about it?\"\n\nSo how did you feel about it?\n\n*fake_choice\n\n\t#I felt pretty good about it.\n\t\tIt's unreasonable to have expected you would have done everything perfectly on your first (or even your 50th) fire call, but, all things considered, you felt you did well. So that's what you told Velez.\n\t\t*page_break\n\t#I could have done better.\n\t\tYou strongly feel that you should have known better about some things and could have done a better job overall.  So that's what you told Velez.\n\t\t*page_break\n\t#I really messed up.\n\t\tYou feel like you blew it.  Maybe everyone hates you now, and, for all you know, your career as a firefighter is over.  So that's what you told Velez.\n\t\t\n\t\t*page_break\n\n*if performance=\"smart\"\n\n\tAnd Velez replies, \"Well, I think you did a good job, probie.\"  \n\n\tYou remember his advice clearly to this day: \"The most important thing is to learn from your experience for next time and never be afraid to ask questions. Heck, I've been at this for over 10 years now, and I'm still learning new things every time.  This job'll keep you on your toes, that's for sure.\"\n\t*finish\n\t\n*elseif performance=\"stupid\"\n\n\tAnd Velez replies, \"Well, that wasn't so awful, Probie.  Trust me.  I've seen worse.\" \n\n\tYou remember his advice clearly to this day: \n\n\t\"The most important thing is to learn from your experience for next time and never be afraid to ask questions. Heck, I've been at this for over 10 years now, and I'm still learning new things every time.  This job'll keep you on your toes, that's for sure.\"\n\t*finish\n\t\n*else\n\n\t\"You definitely lost your cool out there, probie,\" Velez replies. \"And keeping your wits about you is probably the most important thing you'll ever learn as a firefighter.\" \n\n\tYou remember his next words clearly to this day: \n\n\t\"Learn from your experience for next time and never be afraid to ask questions. Heck, I've been at this for over 10 years now, and I'm still learning new things every time.  This job'll keep you on your toes, that's for sure.\"\n\t*finish\n\n*label end_trial\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first three chapters are available for free? This is the end of the free content.\n\n[b]To find out what happens next, please purchase the remaining chapters.[/b]\n\n*purchase adfree $4.99 purchased\n*abort\n", "04culture": "\nSo that was your first fire call.  Everyone always remembers that one. \n\nBut, even though emergency response is the primary purpose of any fire department, a whole culture has developed around that, with traditions, social events, and a multitude of ceremonies.\n\n*page_break\n\n*if motivation= \"tradition\" \n\tOf course, you've grown up in that culture your whole life so you have been attending 4th of July parades, Memorial Day ceremonies, and Breakfast with Santa since you were a little kid. You've lost count of how many times you've had your picture taken in the driver's seat of the fire truck and how many times you spent \"helping\" your mother on Fire Prevention Evening, when the fire house opened its doors to the community.\n\n\tNow that you're older and actually a member of the fire department yourself, you experience things from a different perspective.  There are drills every Tuesday night, either lecture-style or hands-on, as well as both department and company meetings monthly.\n\t*page_break\n\t*goto Time  \n\n*elseif motivation=\"grudging\"\n\tOf course, you've grown up in that culture your whole life so you have been attending endless 4th of July parades, boring Memorial Day ceremonies, and the ridiculous Breakfast with Santa ever since you were a little kid. You've lost count of how many times your parents made you have picture taken in the driver's seat of the fire truck and how many times you tried not to help your mother on Fire Prevention Evening, when the fire house opened its doors to the community.\n\n\tNow that you're older and actually a member of the fire department yourself, you experience things from a different perspective.  There are drills every Tuesday night, either lecture-style or hands-on, as well as both department and company meetings monthly. \n\t*page_break\n\t*goto Time\n\n*elseif motivation=\"service\"\n\tWelcome to a world of community service that, in addition to dealing with fires and motor vehicle accidents, will also have you marching in 4th of July parades, standing at attention for Memorial Day ceremonies, and helping to manage all the excited children at Breakfast with Santa. Not only will you fight fires, but you will take up the cause of fire prevention, speaking in schools and giving important demonstrations at the annual Fire Prevention Evening at the fire house.\n\n\tIn addition to community events, you will continue your training with drills every Tuesday night, either lecture-style or hands-on, and help to manage fire department business at the monthly department and company meetings.\n\t*page_break\n\t*goto Time\n\n*elseif motivation=\"hero\"\n\tWelcome to a world of community service that, in addition to heroically saving lives with fires and motor vehicle accidents, will also have you marching smartly in 4th of July parades, looking dashingly solemn as you stand at attention for Memorial Day ceremonies, and hopefully getting your picture taken while helping children at Breakfast with Santa. Not only will you fight fires, but you will take up the noble cause of fire prevention, speaking in schools and giving important demonstrations at the annual Fire Prevention Evening at the fire house so that the next generation will recognize you as the budding super hero that you are.\n\n\tIn addition to community events, you will continue your training with drills every Tuesday night, either lecture-style or hands-on, and help to manage fire department business at the monthly department and company meetings.\n\t*page_break\n\t*goto Time\n\n*label Time\n\nNow it stands to reason that all these activities take up a great deal of time.  So, in addition to your career and the unavoidable reality that you sometimes need to sleep, you're a pretty busy person.  Inevitably you will sometimes end up with scheduling conflicts.\n\nDo you remember that one time during your probationary year when ${SOname} had been talking for months about the new movie that was coming out soon -- what was it called again?  Ah, yes.  \"The Lord of the String.\"  \n\n*page_break\n\nIt seemed like [i]everyone[/i] and their mother was talking about that movie and how it starred the dreamy So-and-So What's-$!{SOpronoun2}-Face and how the special effects were out of this world.  \n\nDo you remember how you felt about it?\n\n*fake_choice\n\t#I'd rather get dental surgery than to watch that movie.\n\t\tStrong convictions can be admirable.\n\t#What's-$!{SOpronoun2}-Face is definitely good looking. \n\t\tIt's no crime to want to watch a movie just to admire a pretty face.\n\t#Are you kidding? I couldn't wait to see it!\n\t\tIt's great that you shared your SO's enthusiasm!\n\t#I'll watch anything if it makes ${SOname} happy.\n\t\tAw. That's the spirit!\n\n*page_break\n\nAnyway, you promised ${SOpronoun3} that you would go to see \"The Lord of the String\" together on open night, and ${SOname} was excited about this date, to say the least!\n\n*page_break\n\nWith everything else going on, you put the date in the back of your mind, at least until that fateful moment when you realized that opening night was on a Tuesday. (What the heck kind of movie opens on a Tuesday?)\n\nThat's your drill night!  And, as a probie, it was particularly important to attend as many drills, meetings, alarms, and events as you possibly could.  Plus, this particular drill was going to be a special training offered once a year involving ladders and methods for extricating an unconscious patient via a second story window.\n\nWhat did you do?\n\n*choice\n\n\t#I attended the important drill.\n\t\tWhat was your primary reason for going to the drill?\n\t\t*choice\n\t\t\t#I want to be the best probie I can be.\n\t\t\t\tThere's no way around it.  Taking the oath to be a firefighter is a life-changing commitment.  Your first year as a probie firefighter was particularly important because not only did you have so much to learn about firefighting, but you also had to get to know the other firefighters and let them get to know you. This takes a lot of time and energy, and sometimes other things, like your personal life, are inevitably pushed down on the priority list.\n\t\t\t\t*page_break\n\t\t\t\t*goto UnhappySO\n\t\t\t#Life-saving skills are more important than a movie.\n\t\t\t\tIn your eyes, learning a new way to rescue a victim from a burning building was infinitely more worthwhile a way than paying a lot of money to spend two and a half hours in a crowded movie theater, whether or not the movie is any good.  After all, there will be plenty of other opportunities to go to the movies -- right?\n\t\t\t\t*page_break\n\t\t\t\t*goto UnhappySO\n\t\t\t#I wanted to piss off my SO.\n\t\t\t\t${SOname} had to realize that some things were just more important than ${SOpronoun3}.\n\t\t\t\t*set relationship_SO %-20\n\t\t\t\t*page_break\n\t\t\t\t*goto UnhappySO\n\t#I went to the movies on opening night.\n\t\tWhat was your primary reason for going to see the movie?\n\t\t*choice\n\t\t\t#I really wanted to see it!\n\t\t\t\tThere's just something about catching a movie you really want to see on opening night: the excitement, the crowd, the not having to worry about spoilers from people you know who saw it before you.  You chose to go to the movies that night because that's what you really wanted to do, and, seriously, life's too short not to have fun.\n\t\t\t\t*page_break\n\t\t\t\t*goto HappySO\n\t\t\t#I promised my SO.\n\t\t\t\tYou made a promise to ${SOpronoun3}, and you wanted your promise to mean something.  ${SOname} has stuck by you despite your many meetings and drills to date. ${SOname} deserves this special evening out.  You want to make sure your beloved is happy and keeping your promise for this date night seems like both the right and fun thing to do.\n\t\t\t\t*page_break\n\t\t\t\t*goto HappySO\n\t\t\t#I couldn't have cared less about the drill.\n\t\t\t\tYou had already been to what feels like a million drills.  Missing one wasn't going to be the end of the world. Besides, you felt you deserved to have a little fun once in a while!\n\t\t\t\t*page_break\n\t\t\t\t*goto HappySO\n\t#I talked about it with ${SOname}.\n\t\tSince you felt it important to attend this special drill and you also made a promise to ${SOname}, it seemed like the best idea would be to sit down and talk to ${SOpronoun3} about it. So that's what you did.\n\t\t*goto TalkSO\n\t#Screw it all. I went to a bar.\n\t\tInstead facing up to the scheduling conflict and handling it responsibly, you blew off both the fire department and your SO entirely and went drinking.  Sure, you avoided having to actually deal with anything for one night of loud music and beer, but you had a hell of a mess to deal with the next day.\n\t\t*goto BigMess\n\n*label UnhappySO\n*set relationship_SO %-20\n*set relationship_firefighters %+20\n*set relationship_officers %+20\n*set fire_skills %+20\n*set fire_knowledge %+20\n*set SOfight true\n\nSo you sent a text message to your SO, went to the drill, you learned some very important potentially life-saving skills. You had the chance to go up the 24-foot ladder multiple times, carrying a weighted, life-size dummy on your way down, practicing several different methods of doing so safely.  Afterwards, you hung out in the rec room for a couple hours, chatting with your fellow firefighters, and all was well. \n\n*page_break\n\nExcept for the fact that you stood up your SO in order to be there.  You didn't even talk to ${SOpronoun3} about it.  There was no discussion.  You just texted ${SOname} that you had an important drill and went.  \n\n*page_break\n\n*if SOfeeling =\"worriedtime\"\n\t\n\tIn essence, this seemed like a confirmation of all that ${SOname} was worried about when you first became a firefighter. \n\n\t\"If you didn't want to go to the movies with me or if the drill was [i]that[/i] important, you could have just told me,\" ${SOpronoun1} told you frankly, looking more sad than angry about it. \"I would rather you have just been honest rather than blow me off entirely. You're at the firehouse so much as it is.  I was really looking forward to having some time set aside specifically for us.  It was important to me.\" \n\n\tIf you wouldn't or couldn't learn to make ${SOpronoun3} a priority in your life, things didn't look so promising for your future together.\n\t*page_break\n\t*goto Apology\n\n*else\n\n\tSo when you finally talked to ${SOname}, it was an awkward conversation.\n\n\t\"If you didn't want to go to the movies with me or if the drill was [i]that[/i], you could have just told me,\" ${SOpronoun3} told you frankly, looking more sad than angry about it. \"I would rather you have just been honest rather than blow me off entirely.\"\n\n\t*page_break\n\t*goto Apology\n\n*label Apology\n\nDid you apologize?\n\n*choice\n\n\t#I did, actually.  I felt really bad.\n\t\tHaving stood up your SO for a date with the fire department, a heartfelt apology seemed only reasonable.  And, at this point, it was probably the best you could do to try to salvage things.  You realized too late that you should have talked to ${SOname} about the whole situation, not just blow ${SOpronoun3} off entirely.  So you apologize, and ${SOpronoun1} listened.\n\n\t\tBut did ${SOpronoun1} accept your apology?\n\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\t$!{SOpronoun1} heard your apology, and you listened while ${SOpronoun1} explained the hurtfulness of your actions.  You vowed to do better in the future, and ${SOpronoun1} forgave you.  You feel your relationship became stronger for the experience.\n\t\t\t\t*set relationship_SO %+20\n\t\t\t\t*finish\n\t\t\t#No.\n\t\t\t\tYou talked for a good long time, and both of you did your best to listen to each other with an open heart, but, in the end, ${SOpronoun1} decided ${SOpronoun1} didn't want to be second fiddle to the fire department anymore.  So you broke up.\n\t\t\t\t*set SO false\n\t\t\t\t*finish\n\t\t\t#Eventually.\n\t\t\t\t${SOname} was angry at you for several days, but eventually, thank goodness, ${SOpronoun1} forgave you. You promised to be more considerate in the future and ultimately you feel your relationship became stronger for the experience.\n\t\t\t\t*finish\n\t\t\t\n\t#Of course I did.  Two words: Make-up Sex.\n\t\tIsn't that three words? \n\n\t\tIn any case, you made a seemingly sincere and elaborate apology to your SO.  You brought ${SOpronoun3} flowers and candy and vowed, hand-to-heart, that you would never be such a jerk again.  You even gave ${SOpronoun3} that puppy-dog-eyes look that you considered to be simply irresistible. \n\n\t\tDid it work?\n\n\t\t*choice\n\n\t\t\t#You bet!\n\t\t\t\tYou didn't doubt for a moment that it would. $!{SOpronoun1} appreciated the flowers and loved the candy (you got the good stuff).  Before long, ${SOname} was back in you arms again.  And it was an altogether excellent night.  You thought maybe you should make ${SOpronoun3} angry more often.\n\t\t\t\t*set relationship_SO %+20\n\t\t\t\t*finish\n\n\t\t\t#Nah.\n\t\t\t\t${SOname} didn't want the flowers or the candy.  $!{SOpronoun1} said ${SOpronoun1} wanted some respect.  $!{SOpronoun1} then said it seemed like you didn't have any to give and that ${SOpronoun1} had better things to do with ${SOpronoun2} life.  $!{SOpronoun1} dumped you.  It was harsh, and it sucked, but you guess you kind of deserved it.\n\t\t\t\t*set SO false\n\t\t\t\t*finish\n\n\t\t\t#Eventually.\n\t\t\t\t${SOname} was angry at you for several days, but you kept apologizing and eventually ${SOpronoun1} forgave you. You promised to be more considerate in the future and so on. You also took ${SOpronoun3} out for a fancy dinner, with candles and wine and everything, which you're sure helped a lot.\n\t\t\t\t*set relationship_SO %+20\n\t\t\t\t*finish\n\n\t#Apologize for what?\n\n\t\tYou didn't think you did anything wrong so why would you apologize?  In fact, you and ${SOname} pretty much ignored each other entirely for two whole weeks, both too proud to actually talk about the situation.  \n\n\t\tEventually, the two of you finally had an awkward phone conversation in which ${SOname} explained why ${SOpronoun1} felt so unhappy that you broke your promise and, on top of that, couldn't even accept that your actions had been hurtful. \n\n\t\t*page_break\n\n\t\tAt this point, it was time for you to say something.  So how did you reply?\n\n\t\t*choice\n\n\t\t\t#I realize I had messed up so I apologized.\n\t\t\t\t${SOname} seemed really hurt by what you did, and you realized how much it bothered you that you had hurt ${SOpronoun3}.  You cared more than you realized you did, and you told ${SOpronoun3} so.  And you finally swallowed you pride, did what was right, and apologized.\n\n\t\t\t\t\"I'm sorry,\" you began, with heartfelt sincerity. \"I honestly didn't think it was a big deal at the time, and
