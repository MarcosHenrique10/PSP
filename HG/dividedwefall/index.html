\t\t*set ambushdead true\n\t\t*goto morales  \n\t#Leave it.\n\t\tShe slowly moves around the truck, trying to be as quiet as possible. She waits. The firing begins to die down. She can hear voices getting closer. From the snippets of conversation she can overhear, it sounds like the guerrillas. Her heart is pounding.\n\t\t*page_break\n\t\tA shabbily dressed figure armed with a submachine gun turns the corner. He's a partisan. Maria throws her hands up,\n\t\t*line_break\n\t\t\"Please, please, don't shoot\".\n\t\t*line_break\n\t\tThe guerrilla looks her over.\n\t\t*line_break\n\t\t\"Fascist are you?\" he says, pushing his gun against the distinctive yoke and arrows, the Falange's symbol, which adorns her nurse's uniform. \n\t\t*line_break\n\t\t\"No, please Senor, don't, I beg you...\"\n\t\t*line_break\n\t\tHe mutters something and shoves Maria to the ground. But that's the worst he does. Maria pants heavily, heart beating against her rib cage. She throws up. What now?\n\t\t*goto morales\n*label morales\n*if moralesdead = true\n\t*finish\n*page_break\n*image number11.png\n2.14 P.M.\n*line_break\n24th December 1937\n*line_break\nTeruel\n*line_break\nCaptain Adrian Morales\n\nThe telephone is ringing. Morales strides over and answers it. \n*line_break\n\"Yes. Yes. Yes, Sir, we're doing our best,\" he sighs, \"Yes, we're doing our best. Viva la Republica\".\n*line_break\nHe puts down the phone, exhales heavily and runs his fingers through his hair. Having to manage every need from food to post to hygiene of 120 men would be stressful in the best of circumstances. But in the middle of a war it's nigh on impossible. That's even without taking into account actually fighting the war.\nHe sits down. This family living room in a modest town house has become his company headquarters. He stands up again when the commissar enters the room.\n*line_break\n\"Problem Captain?\"\n*line_break\n\"No Commissar Vela, not at all. Just more problems than we need\".\n*line_break\n\"Nobody said the war would be easy\". All Popular Army officers have been assigned political commissars, the majority of whom are communists, to oversee them and make sure they're politically sound.\n*if prietowithyou = true\n\tPrieto arrives in the room. He salutes to the commissar and whispers in Morales' ear,\n\t*line_break\n\t\"Can we talk, in [i]private[/i]\".\n\t*page_break\n\tThey go out into a side street.\n\t*line_break\n\t\"I hope you got me out in the cold for a good reason,\" Morales jokes, teeth threatening to chatter.\n\t*line_break\n\t\"Well Sir, it's just I didn't want our communist friend to hear\".\n\t*line_break\n\t\"Right...\"\n\t*line_break\n\t\"I was just thinking, with it being Christmas and all...\"\n\t*line_break\n\t\"Don't mention Christmas! Religion is most certainly not the flavour of the month\".\n\t*line_break\n\t\"Well this is it,\" Prieto sighs, \"Of course the men want to do a little something to celebrate and I think it would be good for morale. What I'm suggesting is a small group of us go out to a bakers, about two streets away and see if there's anything there with which we could scrape together a half decent meal. You know how hungry the men are. I just think it would do them the world of good\".\n\t*line_break\n\t\"It's a good idea Prieto but it's a risk. How would it look if we lost men looking for Christmas dinner?\"\n\t*line_break\n\t\"I know, I know, that's why I suggested only a small group\".\n\t*choice\n\t\t#Do it.\n\t\t\t\"What's the worst that can happen? We'll go for it. Get together ten or so men and we'll set off on the hour\".\n\t\t\t*line_break\n\t\t\t\"Very good Sir!\"\n\t\t\t*goto priop\n\t\t#Don't.\n\t\t\t\"I'm sorry Prieto, I just can't justify it\".\n\t\t\t*line_break\n\t\t\t\"But I can,\" commissar Vela steps out from the shadows, making them both jump, \"I think it's a brilliant idea from Lieutenant Prieto. He's right, the men need cheering up, morale has been low recently\".\n\t\t\t*line_break\n\t\t\t\"Since when were communists bothered about Christmas?\"\n\t\t\t*line_break\n\t\t\t\"I may not be, but the men certainly are\".\n\t\t\t*line_break\n\t\t\tWith great reluctance, Morales agrees.\n\t\t\t*goto priop \n*if alonsowithyou = true\n\t*line_break\n\t\"Well I hate to be the bringer of bad news but we've got another problem\".\n\t*line_break\n\tMorales looks up, \"What?\"\n\t*line_break\n\t\"I'm afraid Alonso has a bit of a problem\".\n\t*line_break\n\t\"He took his unit out on midday patrol and they haven't come back. Well one of them has, a young private, white as a sheet he was. He managed to get through the lines but the rest of them have been cut off. They're trapped in an office building, under fire, four streets away\".\n\t*line_break\n\t\"Brilliant. That's fucking fantastic!\" this was a big problem. To be truthful, Alonso hadn't taken well to the rigours of command. He'd had a few scrapes, made a few mistakes, but this was his most serious error, \"Well what can I do? I can't justify risking half the company to save a handful of men, can I?\"\n\t*line_break\n\t\"That's what you have to do. Losing Alonso would be a big blow to the unit. He may not be especially able but he's popular. He makes the men laugh\".\n\t*line_break\n\t\"And you suggest I risk the lives of my men for a few laughs?\"\n\t*choice\n\t\t#Set out to save Alonso.\n\t\t\t\"I suppose we must. Ok, prepare a detachment of 25 men. We leave in half an hour\".\n\t\t\t*line_break\n\t\t\t\"Very good Sir\".\n\t\t\t*goto alonop\n\t\t#It's too risky.\n\t\t\t\"No, I can't justify it. We haven't had reinforcements for days, this would jeopardise the whole company\".\n\t\t\t*line_break\n\t\t\t\"I must insist Captain, I think a successful operation would be very good for morale and for your reputation\".\n\t\t\t*line_break\n\t\t\t\"That's not what I'm thinking about right now\".\n\t\t\t*line_break\n\t\t\t\"But it's what the party is thinking about. And to treat your men with the callousness as to abandon them to their fate, well that wouldn't go down well. What a way to celebrate Christmas\".\n\t\t\t*line_break\n\t\t\t\"Are you trying to overrule me? And since when were communists bothered about Christmas?\"\n\t\t\t*line_break\n\t\t\t\"No Captain the decision is yours, but if you fail to follow my advice...\"\n\t\t\t*line_break\n\t\t\t\"What?\"\n\t\t\t*line_break\n\t\t\t\"Let's just say I'd have to report it to my superiors. And as for Christmas, well the men care about it I should think\".\n\t\t\t*line_break\n\t\t\tWith great reluctance, Morales agrees.\n\t\t\t*goto alonop \n\n*label alonop\n*page_break\nThey move out, scuttling from building to building, cover to cover, staying as low as possible through the snow and slush. The dead and dying litter the streets. The faces of the frozen corpses are covered in frost. The fight for Teruel has been a fierce one and it's not over yet. But today, things seem to be quieter than usual, with only the occasional rifle shot or machine gun burst interrupting the otherwise still winter's afternoon. They reach a house they have to get through to pass into the next street in order to avoid a Nationalist machine gun nest. Morales has lost a lot of men in house to house fighting in recent days so he takes precautions.\n*line_break\n\"Ok, this section of the street is no-man's land but if the fascists have any sense they'll have occupied these buildings. So we're going to do this properly, we're going to...\"\n*choice\n\t#Throw a grenade through the window\".\n\t\t\"Pass me a grenade\".\n\t\t*line_break\n\t\tOne of his soldiers obliges. Morales crawls below one of the shattered windows, pulls out the pin of the grenade and tosses it inside. Then some shouts and screams. Then the explosion. Then all is quiet.\n\t\t*page_break\n\t\tThey cautiously move inside the house. The scene that greets them is truly horrific. Blood has painted the walls red. Limbs lie around lamely. And in the middle of the room is what is left of a family. Three small children, two parents and an elderly grandmother. \n\t\t*line_break\n\t\t\"Oh God\".\n\t\t*line_break\n\t\t\"What do we do Captain?\"\n\t\t*choice\n\t\t\t#\"Nothing, there's nothing we can do\".\n\t\t\t\t*set morbrutal -5\n\t\t\t\t\"But Sir...\"\n\t\t\t\t*line_break\n\t\t\t\t\"No buts, we can't do anything, they're dead! And if the commissar gets a whiff of this we're all in for it, so don't you dare tell anyone. It was like this when we got here all right?\"\n\t\t\t\t*line_break\n\t\t\t\t\"Yes Sir\".\n\t\t\t\t*goto alnext\n\t\t\t#\"Report it Battalion, they deserve a proper burial at least\".\n\t\t\t\t*set morbrutal +5\n\t\t\t\t\"But Sir, commissar Vela might...\"\n\t\t\t\t*line_break\n\t\t\t\t\"I don't care what Vela thinks, he'd probably want to blame it on the fascists. We've got to do what's right, whatever the consequences. Make a note of the house number and let's get out of here\".\n\t\t\t\t*line_break\n\t\t\t\t\"Yes Sir\".\n\t\t\t\t*goto alnext\n\t#Spray the place with machinegun fire\".\n\t\tMorales takes the safety off on his Russian PPD34 submachine gun and prepares himself. Then he breaks down the front door and empties the magazine into the house's interior. There are shouts and screams.\n\t\t*page_break\n\t\tAs the smoke clears they move inside. The scene that greets them is truly horrific. The walls are splattered with blood. In the middle of the room lie the bodies of a mother and two small children. A third child and an elderly grandmother stand over the bodies. As does a man who is clearly the husband and is weeping uncontrollably. He looks up and sees Morales and his men,\n\t\t*line_break\n\t\t\"What the fuck do you think you're doing! Get out of my house! Why did you kill them? Why did they have to die?\"\n\t\t*line_break\n\t\t\"Please Senor, calm down, I...\"\n\t\t*line_break\n\t\t\"Calm down? Calm fucking down? You can see what you've done and you ask me to calm down?\"\n\t\t*line_break\n\t\tThe man, his clothes soaked through with his family's blood, draws a knife. He takes a step towards Morales, \"Get out!\" he screams.\n\t\t*line_break\n\t\tMorales...\n\t\t*choice\n\t\t\t#Shoots him.\n\t\t\t\t*set morbrutal -10\n\t\t\t\tHe has no choice, the man is threatening him. Another short burst from his automatic downs the husband. The child screams. The grandmother wails.\n\t\t\t\t*line_break\n\t\t\t\t\"Not a word of this to the commissar!\" Morales warns his men. They move out.\n\t\t\t\t*goto alnext\n\t\t\t#Tries to calm him down.\n\t\t\t\t*set morbrutal -5\n\t\t\t\t\"Please Senor, I can't do anything expect apologise with all my heart. But I can't bring your family back. Now please put down the knife before anyone else gets hurt\".\n\t\t\t\t*line_break\n\t\t\t\t\"You're sorry? You expect me to calm down because you said you're sorry?\"\n\t\t\t\t*line_break\n\t\t\t\t\"What more do you want me to say?\" Morales puts his weapon down, \"I wish I hadn't...\"\n\t\t\t\t*line_break\n\t\t\t\tWith Morales unarmed, the man makes a lunge at him with his knife. Before he reaches him, Morales has drawn his sidearm and shot him. The child screams. The grandmother wails.\n\t\t\t\t*line_break\n\t\t\t\t\"Not a word of this to the commissar!\" Morales warns his men. They move out.\n\t\t\t\t*goto alnext\n\t\n\t#Listen through the door\".\n\t\tMorales puts his ear to the front door and indicates for quiet. He listens. He hears a male voice speaking quickly, anxiously. He can't quite make out what it's saying. Then he hears a child's voice. It must be a family. Hopefully they're the only occupants. Morales opens the door carefully and beckons for his men to follow.\n\t\t*page_break\n\t\tInside, there is indeed a family, who huddle into a corner as Morales enters.\n\t\t*line_break\n\t\t\"Please don't shoot Capitan!\"\n\t\t*line_break\n\t\tThere is a husband and wife, three small children and an elderly grandmother.\n\t\t*line_break\n\t\t\"At ease men,\" Morales orders, \"Senor, are there any fascists in the building?\"\n\t\t*line_break\n\t\t\"No Capitan, no fascists. They were here but they left yesterday\".\n\t\t*line_break\n\t\t\"Very good,\" Morales looks at the cowering family. He's torn.\n\t\t*choice\n\t\t\t#Send them back behind the lines with a few of his men.\n\t\t\t\t*set morbrutal +5\n\t\t\t\t\"C Section, take the Senor and his family back to Headquarters would you? See that they're well fed and ring Battalion to see if we can have them evacuated\".\n\t\t\t\t*line_break\n\t\t\t\t\"Thank you Senor Capitan, you are most kind\".\n\t\t\t\t*line_break\n\t\t\t\tMorales smiles and moves on with his troops.\n\t\t\t\t*goto alnext\n\t\t\t#Leave them, they're not his priority, he needs his soldiers.\n\t\t\t\t*set morbrutal -5\n\t\t\t\t\"Come on, we're moving out\".\n\t\t\t\t*line_break\n\t\t\t\tThey move out, leaving the family shivering in the cold of their ruined home.\n\t\t\t\t*goto alnext\n\n*label priop \n*page_break\nThey move out, scuttling from building to building, cover to cover, staying as low as possible through the snow and slush. The dead and dying litter the streets. The faces of the frozen corpses are covered in frost. The fight for Teruel has been a fierce one and it's not over yet. But today, things seem to be quieter than usual, with only the occasional rifle shot or machine gun burst interrupting the otherwise still winter's afternoon. They reach a house they have to get through to pass into the next street in order to avoid a Nationalist machine gun nest. Morales has lost a lot of men in house to house fighting in recent days so he takes precautions.\n*line_break\n\"This could be dangerous,\" Prieto warns, \"I bet this house is crawling with them\".\n*line_break\nMorales addresses his team, \n*line_break\n\"Ok, this section of the street is no-man's land but if the fascists have any sense they'll have occupied these buildings. So we're going to do this properly, we're going to...\"\n*choice\n\t#Throw a grenade through the window\".\n\t\t\"Pass me a grenade\".\n\t\t*line_break\n\t\tOne of his soldiers obliges. Morales crawls below one of the shattered windows, pulls out the pin of the grenade and tosses it inside. Then some shouts and screams. Then the explosion. Then all is quiet.\n\t\t*page_break\n\t\tThey cautiously move inside the house. The scene that greets them is truly horrific. Blood has painted the walls red. Limbs lie around lamely. And in the middle of the room is what is left of a family. Three small children, two parents and an elderly grandmother. \n\t\t*line_break\n\t\t\"Oh God\".\n\t\t*line_break\n\t\tPrieto has tears in his eyes,\n\t\t*line_break\n\t\t\"What do we do Captain?\"\n\t\t*choice\n\t\t\t#\"Nothing, there's nothing we can do\".\n\t\t\t\t*set morbrutal -5\n\t\t\t\t\"But Sir...\" Prieto protests.\n\t\t\t\t*line_break\n\t\t\t\t\"No buts, we can't do anything, they're dead! And if the commissar gets a whiff of this we're all in for it, so don't you dare tell anyone. It was like this when we got here all right?\"\n\t\t\t\t*line_break\n\t\t\t\t\"Yes Sir\".\n\t\t\t\t*goto prnext\n\t\t\t#\"Report it Battalion, they deserve a proper burial at least\".\n\t\t\t\t*set morbrutal +5\n\t\t\t\t\"But Sir, commissar Vela might...\"\n\t\t\t\t*line_break\n\t\t\t\t\"I don't care what Vela thinks, he'd probably want to blame it on the fascists. We've got to do what's right, whatever the consequences. Make a note of the house number and let's get out of here\".\n\t\t\t\t*line_break\n\t\t\t\t\"Yes Sir\".\n\t\t\t\t*goto prnext\n\t#Spray the place with machinegun fire\".\n\t\tMorales takes the safety off on his Russian PPD34 submachine gun and prepares himself. Then he breaks down the front door and empties the magazine into the house's interior. There are shouts and screams.\n\t\t*page_break\n\t\tAs the smoke clears they move inside. The scene that greets them is truly horrific. The walls are splattered with blood. In the middle of the room lie the bodies of a mother and two small children. A third child and an elderly grandmother stand over the bodies. As does a man who is clearly the husband and is weeping uncontrollably. He looks up and sees Morales and his men,\n\t\t*line_break\n\t\t\"What the fuck do you think you're doing! Get out of my house! Why did you kill them? Why did they have to die?\"\n\t\t*line_break\n\t\t\"Please Senor, calm down, I...\"\n\t\t*line_break\n\t\t\"Calm down? Calm fucking down? You can see what you've done and you ask me to calm down?\"\n\t\t*line_break\n\t\tThe man, his clothes soaked through with his family's blood, draws a knife. He takes a step towards Morales, \"Get out!\" he screams.\n\t\t*line_break\n\t\tMorales...\n\t\t*choice\n\t\t\t#Shoots him.\n\t\t\t\t*set morbrutal -10\n\t\t\t\tHe has no choice, the man is threatening him. Another short burst from his automatic downs the husband. The child screams. The grandmother wails.\n\t\t\t\t*line_break\n\t\t\t\t\"Not a word of this to the commissar!\" Morales warns his men.\n\t\t\t\t*line_break\n\t\t\t\t\"What do you think you're doing Adrian!\" Prieto is genuinely upset.\n\t\t\t\t*line_break\n\t\t\t\t\"He was threatening me, he was out of control, I had no choice!\"\n\t\t\t\t*line_break\n\t\t\t\t\"No choice? No choice? The man had just lost his wife, his children? Did you expect him to be placid?\"\n\t\t\t\t*line_break\n\t\t\t\t\"No but...\"\n\t\t\t\t*line_break\n\t\t\t\t\"No but what?\"\n\t\t\t\t*line_break\n\t\t\t\tMorales regains his composure,\n\t\t\t\t*line_break\n\t\t\t\t\"I'm the senior officer, so just shut it alright? And not a word of this to the commissar, do you understand?\"\n\t\t\t\t*line_break\n\t\t\t\tPrieto nods slowly. They move out.\n\t\t\t\t*goto prnext\n\t\t\t#Tries to calm him down.\n\t\t\t\t*set morbrutal +5\n\t\t\t\t\"Please Senor, I can't do anything expect apologise with all my heart. But I can't bring your family back. Now please put down the knife before anyone else gets hurt\".\n\t\t\t\t*line_break\n\t\t\t\t\"You're sorry? You expect me to calm down because you said you're sorry?\"\n\t\t\t\t*line_break\n\t\t\t\t\"What more do you want me to say?\" Morales puts his weapon down, \"I wish I hadn't...\"\n\t\t\t\t*line_break\n\t\t\t\tPrieto intervenes, laying down his own weapon and approaching the man, \n\t\t\t\t*line_break\n\t\t\t\t\"What's your name Senor?\"\n\t\t\t\t*line_break\n\t\t\t\t\"David\".\n\t\t\t\t*line_break\n\t\t\t\t\"There there David,\" says Prieto soothingly, \"I know what it's like. I lost my wife to a bombing raid on Madrid a few months back. It's so hard, I know\".\n\t\t\t\t*line_break\n\t\t\t\tThe husband is sobbing now. He falls to his knees and drops the knife. Prieto embraces him.\n\t\t\t\tAfter some time, they move out.\n\t\t\t\t*line_break\n\t\t\t\t\"Was that true about your wife?\" Morales asks.\n\t\t\t\t*line_break\n\t\t\t\t\"Yes,\" Prieto replies.\n\t\t\t\t*line_break\n\t\t\t\t\"You didn't tell me...\"\n\t\t\t\t*goto prnext\n\t\n\t#Listen through the door\".\n\t\tMorales puts his ear to the front door and indicates for quiet. He listens. He hears a male voice speaking quickly, anxiously. He can't quite make out what it's saying. Then he hears a child's voice. It must be a family. Hopefully they're the only occupants. Morales opens the door carefully and beckons for his men to follow.\n\t\t*page_break\n\t\tInside, there is indeed a family, who huddle into a corner as Morales enters.\n\t\t*line_break\n\t\t\"Please don't shoot Capitan!\"\n\t\t*line_break\n\t\tThere is a husband and wife, three small children and an elderly grandmother.\n\t\t*line_break\n\t\t\"At ease men,\" Morales orders, \"Senor, are there any fascists in the building?\"\n\t\t*line_break\n\t\t\"No Capitan, no fascists. They were here but they left yesterday\".\n\t\t*line_break\n\t\t\"Very good,\" Morales looks at the cowering family. He's torn.\n\t\t*choice\n\t\t\t#Send them back behind the lines with a few of his men.\n\t\t\t\t*set morbrutal +5\n\t\t\t\t\"C Section, take the Senor and his family back to Headquarters would you? See that they're well fed and ring Battalion to see if we can have them evacuated\".\n\t\t\t\t*line_break\n\t\t\t\t\"Thank you Senor Capitan, you are most kind\".\n\t\t\t\t*line_break\n\t\t\t\tMorales smiles and moves on with his troops.\n\t\t\t\t*goto prnext\n\t\t\t#Leave them, they're not his priority, he needs his soldiers.\n\t\t\t\t*set morbrutal -5\n\t\t\t\t\"Come on, we're moving out\".\n\t\t\t\t*line_break\n\t\t\t\t\"What about them?\" Prieto asks.\n\t\t\t\t*line_break\n\t\t\t\t\"There's only ten of us as it is, I can't spare any men escorting them back to the lines. We'll inform Battalion of their situation when we return\".\n\t\t\t\t*line_break\n\t\t\t\tThey move out, leaving the family shivering in the cold of their ruined home.\n\t\t\t\t*goto prnext\n\n\n*label alnext\n*page_break\nThey reach the square on the edge of which the office building sits. Alonso and his men are pinned down by Nationalist fire coming from two buildings opposite as well as troops advancing up the street. It appears that Morales and his men have so far gone unnoticed. Assessing the situation quickly, Morales orders...\n*choice\n\t#A mortar strike to clear out the enemies.\n\t\t\"Field telephone, to me please!\"\n\t\t*line_break\n\t\tMorales winds up the telephone and waits for a response.\n\t\t*line_break\n\t\t\"Get me Battalion please... Yes, this is Captain Morales, I need mortar fire on grid reference E-19. Yes... ok, thank you,\" he puts the phone down, \"Brace yourselves men, incoming in sixty seconds and counting!\"\n\t\t*line_break\n\t\tThey hunker down and wait. Sure enough, a minute later, the shrieking of incoming shells can be heard.\n\t\t*line_break\n\t\t\"Stay low men!\"\n\t\t*line_break\n\t\tThe mortar shells explode with a deep boom and already the whistle of more approaching. The barrage goes on like this for over a minute. Finally it stops and the dust begins to settle...\n\t\t*page_break\n\t\tThe fascists have been wiped out, that's for sure. But as the smoke clears, Morales realises with horror that the building Alonso and his men were sheltering in has also been levelled.\n\t\t*line_break\n\t\t\"Oh no...\"\n\t\t*line_break\n\t\t\"Sir, there could be some survivors, we've got to search the wreckage\".\n\t\t*line_break\n\t\t\"No, there won't be...\"\n\t\t*line_break\n\t\tMorales stands and stares, speechless for a few moments at the smouldering ruins. But soon the sound of approaching armoured vehicles brings him back. \n\t\t*line_break\n\t\t\"Come on, we've got to move, the fascists will be coming to investigate, let's go!\"\n\t\t*line_break\n\t\tAs they make their way back through the lines, Morales feels guilty in the extreme. He feels guilty not only for condemning Alonso to his fate but also for putting him here in the first place. He had never been a good soldier. And if he hadn't asked to have him in his unit, Alonso would still be an Assault Guard, probably be spending his Christmas in some small, sleepy town, miles behind the lines. Instead he was now almost certainly dead. And that was on Morales.\n\t\t*finish \n\n\t#His men to flank the Nationalist positions.\n\t\t\"Ok, A section move to the left, B section to the right, we're going to clear out these building and rescue Alonso!\"\n\t\t*line_break\n\t\t\"Yes Sir!\"\n\t\t*line_break\n\t\tThey split up and move to engage the fascists. Leading B section, Morales first of all clears the street. With relative ease they pick off the exposed soldiers. Next they move into one of the Nationalist occupied buildings. A well placed grenade clears the ground floor of what clearly used to be a barber's. Then Morales leads the way up the stairs. \n\t\t*page_break\n\t\tUpon reaching the top, a soldier comes at Morales with a knife but the Captain is too quick with his SMG. A ferocious close range firefight develops as they move from one bedroom to the next. Losses are heavy for both sides. Finally, they get to the bathroom, into which Morales empties his clip, shattering china and riddling a pair of fascists with bullets.\n\t\t*line_break\n\t\t\"Good job men,\" the Captain pants, \"Now let's see about Alonso\".\n\t\t*page_break\n\t\tHaving secured the area, they cross to the office building where Alonso and his men have been holed up. \n\t\t*line_break\n\t\t\"Boy are we glad to see you Captain!\" a sergeant greets them.\n\t\t*line_break\n\t\t\"The pleasure's all ours Sergeant, now where's the Lieutenant?\"\n\t\t*line_break\n\t\tThe sergeants face drops,\n\t\t*line_break\n\t\t\"You best come and see Captain...\"\n\t\t*line_break\n\t\tUpstairs, Morales is shown Alonso. He's been shot twice in the stomach. He's dead. His green uniform is stained a dark red. Someone so full of life now looks so very dead. He doesn't look like Alonso. Morales checks his dogtags just to make sure, even though he knows full well it's him. Morales feels himself welling up and fights it back.\n\t\t*line_break\n\t\t\"Right, let's move out, it won't be long until the fascists are back\".\n\t\t*line_break\n\t\t\"Yes Sir\".\n\t\tThey make their way back through the lines with the rescued patrol. Morales, carrying Alonso over his back, feels guilty in the extreme. He feels guilty for putting Alonso here in the first place. He had never been a good soldier. And if he hadn't asked to have him in his unit, Alonso would still be an Assault Guard, probably spending his Christmas in some small, sleepy town, miles behind the lines. Instead he was now dead. And that was on Morales.\n\t\t*finish \n\n\t#A withdrawal, they're outnumbered, there's no point in risking more lives.\n\t\t\"We're pulling back, there's too many of them. Hopefully Alonso and his men will be able to slip away after dark\".\n\t\t*line_break\n\t\t\"But they won't last that long Sir\".\n\t\t*line_break\n\t\t\"That's an order soldier, I'm not wasting lives on a hopeless rescue mission!\"\n\t\t*line_break\n\t\tAs they make their way back through the lines, Morales feels guilty in the extreme. He feels guilty not only for abandoning Alonso to his fate but also for putting him here in the first place. He had never been a good soldier. And if he hadn't asked to have him in his unit, Alonso would still be an Assault Guard, probably spending his Christmas in some small, sleepy town, miles behind the lines. Instead he was now almost certainly dead. And that was on Morales.\n\t\t*finish \n*label prnext\n*page_break\nThey reach the bakers. Sure enough, it's full of all sorts of luxuries they aren't used to enjoying, like bread less than a week old. They get to work bagging as much of it as possible. \n*line_break\n\"I told you didn't I Adrian,\" Prieto jokes, \"I told you it'd be worthwhi...\"\n*line_break\nA shot rings out. Before he can finish his sentence, Prieto is dead. He's been shot through the head. \n*line_break\n\"Sniper, get down!\"\n*line_break\nMorales stares incessantly at Prieto's twitching corpse. At the ever expanding pool of blood it lies in. He been so alive a second ago. So very alive.\n*line_break\n\"Fuck, fuck, fuck...\" Morales murmurs. He's got to do something. His whole unit is at risk now. He steels himself, \"Did anyone see where the shot came from?\"\n*line_break\n\"It must have been that church tower Sir!\"\n*line_break\nMorales remembers seeing a church tower out of the large front window of the baker's shop. He daren't get a look at it now. Instead, he orders...\n*choice\n\t#A mortar strike to level church.\n\t\t\"Field telephone, to me please!\"\n\t\t*line_break\n\t\tThe Private with the telephone crawls up to the Captain. Morales winds up the telephone and waits for a response.\n\t\t*line_break\n\t\t\"Get me Battalion please... Yes, this is Captain Morales, I need mortar fire on grid reference D-17. Yes... ok, thank you,\" he puts the phone down, \"Brace yourselves men, incoming in sixty seconds and counting!\"\n\t\t*line_break\n\t\tThey hunker down and wait. Sure enough, a minute later, the shrieking of incoming shells can be heard.\n\t\t*line_break\n\t\t\"Stay low men!\"\n\t\t*line_break\n\t\tThe mortar shells explode with a deep boom and already the whistle of more approaching. The barrage goes on like this for over a minute. Finally it stops and the dust begins to settle...\n\t\t*page_break\n\t\tMorales ever so slowly peers out the window. Where the church once was there is now just smouldering ruins. He stands and stares, speechless for a few moments. But soon the sound of approaching armoured vehicles brings him back. \n\t\t*line_break\n\t\t\"Come on, we've got to move, the fascists will be coming to investigate, let's go!\"\n\t\t*line_break\n\t\tAs they make their way back through the lines, carrying Prieto over his back, Morales feels guilty in the extreme. He feels guilty not only for letting Prieto get killed but also for putting him here in the first place. He was getting on, in his late-thirties, a family man. And if he hadn't asked to have him in his unit, Prieto would still be an Assault Guard, probably spending his Christmas in some small, sleepy town, miles behind the lines. Instead he was now dead. And that was on Morales.\n\t\t*finish \n\n\t#His men to flank the church and clear it out.\n\t\t\"Ok, A section move to the left, B section to the right, we're going to clear out that church and get the bastard who did this!\"\n\t\t*line_break\n\t\t\"Yes Sir!\"\n\t\t*line_break\n\t\tThey split up and move to engage the sniper. But immediately things go wrong. As soon as they stand, another one of his men is taken down, falling right next to where Prieto lies. As they try and get close to the church, things don't improve. Despite trying to put suppressive fire on the tower, every time that rifle fires, invariably another of his men goes down. And he'd only brought 10 to begin with.\n\t\t*page_break\n\t\tThey're about fifty metres from the church now. There's only five of them left, including Morales. He spots a sidestreet, leading back in the direction of Republican lines and relatively sheltered from the church tower. He makes a judgement.\n\t\t*line_break\n\t\t\"Ok men, go for that alley, we're not losing anymore today!\"\n\t\t*page_break\n\t\tThe men are only too happy to get out of there. They sprint across the street, avoiding the sniper's fire and make for their own lines.\n\t\tOf course the bodies of Prieto and the other soldiers have had to have been left. Morales feels guilty in the extreme. He feels guilty not only for letting Prieto get killed but also for putting him here in the first place. He was getting on, in his late-thirties, a family man. And if he hadn't asked to have him in his unit, Prieto would still be an Assault Guard, probably spending his Christmas in some small, sleepy town, miles behind the lines. Instead he was now dead. And that was on Morales.\n\t\t*finish \n\n\t#A withdrawal, they've got what they came for, there's no point in risking more lives.\n\t\t\"We're pulling back, we've got what we need, now let's get out of here!\"\n\t\t*line_break\n\t\t\"But what about the sniper Sir?\"\n\t\t*line_break\n\t\t\"That's an order soldier, I'm not wasting lives on pointless revenge mission!\"\n\t\t*line_break\n\t\tAs they make their way back through the lines, Morales carrying Prieto over his back, he feels guilty in the extreme. He feels guilty not only for letting Prieto get killed but also for putting him here in the first place. He was getting on, in his late-thirties, a family man. And if he hadn't asked to have him in his unit, Prieto would still be an Assault Guard, probably spending his Christmas in some small, sleepy town, miles behind the lines. Instead he was now dead. And that was on Morales.\n\t\t*finish\n", "chapterfour": "*temp gababort false\n*temp gabneednew false\n*temp gabwait false\n*temp stepaside false\n*temp shots false\nMadrid was saved by a combination of Soviet help, international volunteers and the resilience of the Madrilenos themselves. But as fierce attritional fighting continued on the fringes of the capital, it became clear to both sides that the war would not be a short one.\n*image number7.png\nGermany and Italy increased their support to the Nationalists dramatically, although the Italians were humiliated at the battle of Guadalajara in March 1937, the Republic's first real victory. Franco therefore turned his attention to the Northern Front, hoping to crush the Basque Country quickly and free up troops for other operations.\n*page_break\nMeanwhile, all was not well within the two opposing camps. Franco was in the process of subjugating the various rightist groups to his personal control, he was to be supreme leader, Caudillo, in the vein of Hitler and Mussolini. The CEDA, the Carlists, monarchists all were to be absorbed into an emasculated Falange, suppressed and forced to accept Army overlordship.\n\nAt the same time, the Republican zone was divided between those who thought the war must be the number one priority (the Republicans, Socialists and most of all the Communists) and others who saw a full blown revolution as essential before the war could be won, namely the Anarchists and Trotskyist POUM.\n*image number9.png\nIronically, the Communists have become the champions of private property and the small businessman, defending capitalist democracy against anarchist revolution. The Republican government began trying to reassert their control in areas where the CNT had seized power in the chaotic first few days of the Rising. This was to come to a head in the CNT's heartland, Barcelona, where they controlled everything from the tram network to the munitions factories, and of course the telephone exchange.\n*goto maria\n*label maria\n*page_break\n7.33 A.M.\n*line_break\n25th April 1937\n*line_break\nNationalist hospital, 70 KM SE of Bilbao, Basque Country\n*line_break\nSister Maria Farfan\n\nThey had come for Vidal at dawn. Army soldiers had broken in to the hospital with little regard for the resting wounded and demanded to be taken to Carlos Vidal of the Falange. The previous week, Franco had united all political movements in the Nationalist zone into his new Movimiento, with and without their compliance. Since then, anyone who opposed this new arrangement were being rounded up. Today, the Falange leader Hedilla and his \"Old Shirt\" supporters are being dealt with. Vidal happens to be one of them.\n\nMaria and Gabrielle see the soldiers dragging Vidal, kicking and screaming, into the back of a lorry,\n*line_break\n\"What do you think you're doing? Get your hands off me, I'm a Jefe in the Falange for Christ's sake, I'm not a Red!\"\n*line_break\n\"Shut up and get in the truck!\"\n*if (vidrship = false)\n\tGabrielle is besides herself, having jumped in after Maria's rejection of the Falangist,\n\t*line_break\n\t\"They can't do this!\" she wails, tears in her eyes, \"Please, we've got to stop them Maria!\"\n\t*line_break\n\tMaria has tight ahold of her friend. She looks into her eyes and...\n\t*choice\n\t\t#Tries to calm her friend down, nothing can be done.\n\t\t\t\"Gabrielle, look at me, look at me. There is nothing you can do. [i]Nothing[/i]! Doing anything stupid now will condemn both of you\".\n\t\t\t*line_break\n\t\t\t\"Maria, you don't understand, I love him!\" he's being hauled into the truck now, \"I've got to help him!\"\n\t\t\t*line_break\n\t\t\t\"You can't. You just can't, I'm sorry...\" they're leaving now, the truck's engine roars to life, \"Don't look Gabrielle, it'll only hurt more\".\n\t\t\t*line_break\n\t\t\tGabrielle is weeping profusely, \"He can't go Maria, you don't understand, he can't\".\n\t\t\t*line_break\n\t\t\t\"I do understand, I do, but please, there's nothing to be done\".\n\t\t\t*line_break\n\t\t\t\"No you [i]don't[/i] Maria, you don't understand, he can't go because...\" she looks at the floor, \"Because I'm pregnant\".\n\t\t\t*goto gabpregs\n\t\t#Let's Gabrielle go.\n\t\t\tShe watches as Gabrielle sprints out to the truck. The soldiers block path, whilst Vidal tries to reach, held back by his guards. Gabrielle is shouting something. Vidal for a moment pauses, like he can't believe what's been said, before redoubling his efforts to get to Gabrielle. The soldier responds by smacking the nurse across the face with his rifle butt, causing her to fall to the ground, bleeding heavily. \n\t\t\t\n\t\t\tThis doesn't succeed in calming Vidal down, the soldiers have to beat him repeatedly before he his hauled into the truck and driven off. Once everything has calmed down, Maria runs out to pick up her friend.\n\t\t\t*line_break\n\t\t\t\"Oh God Gabrielle, I'm so sorry, I... I,\" she tries to stem the bleeding from her friend's nose, \"What did you say? What did you say to him to cause that reaction?\"\n\t\t\t*line_break\n\t\t\t\"I told him...\" Gabrielle looks away, composing herself, \"I told him that I'm pregnant\"\n\t\t\t*goto gabpregs\n\t\t#Agrees to help try and save Vidal.\n\t\t\t\"Come on, we've got to stop them\".\n\t\t\t*line_break\n\t\t\t\"Thank you Maria!\"\n\t\t\t*line_break\n\t\t\tThe two of them run out to the truck but their path is blocked by a cordon of soldiers. Upon seeing them, Vidal tries to break free,\n\t\t\t*line_break\n\t\t\t\"Gabrielle! Please, stop them!\"\n\t\t\t*line_break\n\t\t\t\"Let him go! Please why are you doing this!\" cries Gabrielle hysterically, throwing herself at the guards. They shove her away,\n\t\t\t*line_break\n\t\t\t\"This man is involved in a conspiracy to assassinate General Franco, so fuck off you little whore!\"\n\t\t\t*line_break\n\t\t\t\"Carlos!\"\n\t\t\t*line_break\n\t\t\t\"Gabrielle, I'll come back for you, I promise, once all this nonsense has been cleared up,\" they're bundling him into the truck now.\n\t\t\t*line_break\n\t\t\t\"Carlos, I...\" she looks away, tears in her eyes, the engine roars to life and begins to pull away, \"Carlos, I'm pregnant!\"\n\t\t\t*line_break\n\t\t\t\"What?\" Vidal desperately tries to overpower his guards, to no avail, and they drive off.\n\t\t\t*goto gabpregs\n*if (vidrship = true)\n\tMaria is...\n\t*choice\n\t\t#Upset, she can't watch this.\n\t\t\tMaria moves away from the window, wiping a tear from her eye. Gabrielle tries to comfort her, \n\t\t\t*line_break\n\t\t\t\"It's alright Maria, he... well he'll probably be fine, like he says, he's no Red\".\n\t\t\t*line_break\n\t\t\t\"I know, I know, it's silly of me, but, it's just...\"\n\t\t\t*line_break\n\t\t\tGabrielle embraces her, \"It's just what?\"\n\t\t\t*line_break\n\t\t\t\"This isn't what I thought it'd be like. This isn't what I joined for\".\n\t\t\t*if (forcedto = true)\n\t\t\t\t*line_break\n\t\t\t\t\"Well, you didn't really join up did you?\"\n\t\t\t\t*line_break\n\t\t\t\t\"Time and a place Gabrielle!\"\n\t\t\t\t*line_break\n\t\t\t\t\"Sorry\".\n\t\t\t*if (forcedto = false)\n\t\t\t\t*line_break\n\t\t\t\t\"What do you mean [i]this[/i]?\"\n\t\t\t\t*line_break\n\t\t\t\t\"Are you blind Gabrielle, can you not see what's happening?\"\n\t\t\t\t*line_break\n\t\t\t\t\"What's happening is Franco is taking control, and I for one think it's a good thing. He's the right man to lead us, if Hedilla and his cronies want to oppose him, this is what happens\".\n\t\t\t\t*line_break\n\t\t\t\t\"Sometimes you are unbelievable Gabrielle, you know that?\"\n\t\t\t*goto martwo\n\t\t#Besides herself, she must stop this.\n\t\t\tShe makes for the door. Gabrielle stops her,\n\t\t\t*line_break\n\t\t\t\"What do you think you're doing?\"\n\t\t\t*line_break\n\t\t\t\"And how exactly are you going to do that? Talk them out of it?\"\n\t\t\t*line_break\n\t\t\t\"If I can yes,\" she wrests free of Gabrielle's grasp and runs outside. Her path is blocked by a cordon of soldiers. Upon seeing her, Vidal tries to break free,\n\t\t\t*line_break\n\t\t\t\"Maria! Please, stop them!\"\n\t\t\t*line_break\n\t\t\t\"Let him go! Please why are you doing this!\" cries Maria hysterically, throwing herself at the guards. They shove her away,\n\t\t\t*line_break\n\t\t\t\"This man is involved in a conspiracy to assassinate General Franco, so fuck off you little whore!\"\n\t\t\t*line_break\n\t\t\t\"Carlos!\"\n\t\t\t*line_break\n\t\t\t\"Maria, I'll come back for you, I promise, once all this nonsense has been cleared up,\" they're bundling him into the truck now.\n\t\t\t*line_break\n\t\t\t\"Carlos, I...\" she looks away, tears in her eyes, the engine roars to life and begins to pull away, \n\t\t\t*fake_choice\n\t\t\t\t#\"Carlos, I love you!\"\n\t\t\t\t\t\"I love you too Maria!\" And with that he is gone.\n\t\t\t\t#\"Carlos, you're getting what's coming to you\".\n\t\t\t\t\t\"You little shit!\" he tries to get at her but the guards pull him back. And with that he is gone\n\t\t\t\t#\"Carlos, good luck\".\n\t\t\t\t\t\"Thank you Maria, I'll be back!\" And with that he is gone.\n\t\t\t*goto martwo\n\t\t#Unmoved, he's getting what was coming to him.\n\t\t\t\"He backed the wrong team and now he's paying the price. If he's stupid enough to side with Hedilla over Franco then he shouldn't be surprised\".\n\t\t\t*line_break\n\t\t\t\"I agree Maria. He was cute though\".\n\t\t\t*line_break\n\t\t\t\"Cute doesn't even come in to it\".\n\t\t\t*line_break\n\t\t\t\"Well, quite\".\n\t\t\t*line_break\n\t\t\tThe soldiers haul the Falangist into the truck and drive him away. And that is that.\n\t\t\t*goto martwo\n*label gabpregs\n*page_break\nMaria takes Gabrielle back inside,\n*line_break\n\"Pregnant, you can't be!\"\n*line_break\n\"Unfortunately I can...\"\n*line_break\n\"And it's definitely his? Vidal's?\"\n*line_break\n\"What do you take me for Maria?\" replies Gabrielle, incensed, \"This isn't really helping! What am I going to do?\"\n*line_break\nTo have a child outside of marriage would be disastrous for Gabrielle. She would certainly lose her post here, she would probably have the child taken from her and she may even be shunned by her own family. Maria considers her friend's dilemma before...\n*choice\n\t#Advising her to find someone else to marry, and quickly.\n\t\t\"Gabrielle, I know this is not what you're going to want to hear right now, but you must consider, well, you must consider finding someone else...\"\n\t\t*line_break\n\t\t\"What do you mean?\"\n\t\t*line_break\n\t\t\"Well, when you have this baby, you're going to have to be married, or else terrible things could happen. You need to find someone to marry before it becomes obvious you're pregnant\".\n\t\t*line_break\n\t\tGabrielle, wiping tears from her eyes, listens to Maria's suggestion, \"I know what you say is true, but...\" she sobs, \"But I can't. I can't marry someone else while Vidal is still alive. Besides...\"\n\t\t*line_break\n\t\t\"What?\"\n\t\t*line_break\n\t\tShe lowers her voice even further, \"I'm not sure I want the baby anyway, it would mean leaving here to start with...\"\n\t\t*line_break\n\t\tMaria can't believe what she's hearing, \"Gabrielle, how can you say things like that? You don't seriously want an abortion do you?\"\n\t\t*line_break\n\t\t\"Maybe\".\n\t\t*line_break\n\t\t\"So an eternity in Hell is worth a few extra years free from motherhood? You really have changed Gabrielle, either that or you aren't thinking straight. Where would you have it done anyway? It's not like you can ask for one from your doctor!\"\n\t\t*line_break\n\t\t\"What else I am supposed to do?\"\n\t\t*line_break\n\t\t\"Like I say, you have no choice. You [i]must[/i] find someone else, as difficult as that must be, it's your only option\".\n\t\t*line_break\n\t\t\"I suppose you're right...\"\n\t\t*set gabneednew true\n\t\t*goto martwo\n\t#Advising her to wait for Vidal, he may well be released.\n\t\t\"Gabrielle, you mustn't give up hope. They'll not kill him, he's nobody really\".\n\t\t*line_break\n\t\t\"He was somebody to me!\"\n\t\t*line_break\n\t\t\"Well yes, but the point is, he'll most likely get away with a slap on the wrist or a few weeks in gaol\".\n\t\t*line_break\n\t\t\"Yes,\" Gabrielle sniffs, \"I guess you're probably right\".\n\t\t*line_break\n\t\t\"You just have to sit tight, and, for the moment, wait and see\".\n\t\t*line_break\n\t\tGabrielle embraces her friend, \"Thank you, Maria. Honestly, I'm not sure what I would do some times without you\".\n\t\t*set gabwait true\n\t\t*goto martwo\n\t#Advising her to get an abortion.\n\t\t\"Gabrielle, I know this is going to be difficult to hear, but, well, you've not really got many options. Having that baby [i]will[/i] ruin you\".\n\t\t*line_break\n\t\t\"But Carlos, I can, I will marry him, then it'll all be ok\".\n\t\t*line_break\n\t\tMaria embraces her friend, \"Gabrielle, I don't want to have to say this,\" she sighs, \"But I don't think you're going to see Vidal again\".\n\t\t*line_break\n\t\t\"Don't say that!\"\n\t\t*line_break\n\t\t\"But I have to. I only want the best for you. And waiting six months to find out what's happened to him? It's not an option. By then it'll be too late. So you see, you really must\".\n\t\t*line_break\n\t\t\"Ok,\" Gabrielle sniffs, \"But how?\"\n\t\t*line_break\n\t\t\"It's going to be difficult. And expensive. But I'll try and find a doctor willing to do it on the quiet\". \n\t\t*line_break\n\t\t\"Thank you, Maria, thank you. Honestly, I'm not sure what I would do some times without you\".\n\t\t*set gababort true\n\t\t*set abortion true\n\t\t*goto martwo\n*label martwo\n*page_break\nNot long after, they are all summoned to the staff mess. Head Nurse Carrel stands at the front. Everyone is whispering to each other about what had happened this morning. Presently, Carrel clears her throat,\n*line_break\n\"Quiet please, quiet! Now, as some of you will I'm sure already know, Senor Vidal has left us this morning. I am delighted to present his replacement, Captain Jimenez\".\n*line_break\nA tall, thin, rather gaunt Army officer enters the room. He stands, surveying his audience for a moment before beginning,\n*line_break\n\"Good morning ladies. As your Head Nurse has said, I am Captain Jimenez. I'm sure you'll be all too aware of the events of the last few days. I'm sure you'll be aware of its repercussions for your organisation. But I must reassure you that you've nothing to fear\".\n*line_break\nHis gaze is cold and hard and fixed on his audience, \"If you have done nothing wrong, you have nothing to fear. In fact this is a fantastic opportunity. The Falange is not being suppressed but absorbed. In fact, the Caudillo envisages that the Falange will form the central pillar of his new Movimiento. And the Seccion Femenina of the Falange can, and indeed must, carry on its vital work\".\n*page_break\n\"Once this war is won,\" he continues, \"The SF will take on the role of being the nation's women's organisation. To represent all women in the new state we're building. Think about what that could mean for your careers. For you, recent events have been a blessing in disguise\".\n*line_break\nHe concludes and makes for the door, Carrel orders a round of applause. Just as Jimenez is about to leave, he stops, slowly turns and raises his hand to ask for silence,\n*line_break\n\"Just one last thing,\" he smirks, \"From now on, it's 'Viva Franco', not 'Viva Espana' or anything else like that. You are to use this whenever addressing a superior officer and also as a greeting and goodbye. Viva Franco!\" He gives the fascist salute. Everyone leaps to their feet, raises their right arm and calls back,\n*line_break\n\"Viva Franco!\"\n*line_break\nMaria...\n*choice\n\t#Does the same.\n\t\tThere is no option but to conform. She's seen what happened to Vidal. This is Franco's Spain now.\n\t\t*goto dlr\n\t#Says 'Viva Espana'.\n\t\tNo one hears her, her voice is lost amongst the crowd. Gabrielle does and stands on her foot,\n\t\t*line_break\n\t\t\"Couldn't help yourself, could you Maria?\"\n\t\t*line_break\n\t\t\"Viva Espana,\" she repeats under her breath.\n\t\t*line_break\n\t\t\"Don't you get it? Franco [i]is[/i] Spain now. We all better get used to it\".\n\t\t*goto dlr\n\t#Remains seated.\n\t\t\"What are you doing?\" Gabrielle hisses.\n\t\t*line_break\n\t\tBefore Maria can respond, Jimenez has spotted her, \n\t\t*line_break\n\t\t\"Senorita, would you care to explain why you've remained seated, whilst everyone else is standing?\"\n\t\t*line_break\n\t\t\"I... No, Senor Captain\".\n\t\t*line_break\n\t\t\"Well then would you care to join us?\"\n\t\t*line_break\n\t\tMaria leaps out of her chair, extends her right arm and palm emphatically and shouts, \"Viva Franco!\"\n\t\t*line_break\n\t\t\"Very good Senorita, very good. What's your name?\"\n\t\t*line_break\n\t\t\"Farfan Captain, Maria Farfan\".\n\t\t*line_break\n\t\t\"I'll make a note of that Sister Farfan, as you were,\" he leaves, Carrel gives her a vicious glare, everyone is staring at her.\n\t\t\"Couldn't help yourself, could you Maria?\"\n\t\t*line_break\n\t\t\"Viva Espana,\" she mutters under her breath.\n\t\t*line_break\n\t\t\"Don't you get it? Franco [i]is[/i] Spain now. We all better get used to it\".\n\t\t*goto dlr\n*label dlr\n*if (dlrdead = true)\n\t*goto marthree\n*page_break\n*image number8.png\n7.07 P.M.\n*line_break\n26th April 1937\n*line_break\nGuernica, the Basque Country\n*line_break\nWing Commander Jose De La Rosa\n\nThe flames can be seen from kilometres away. Even over three thousand metres above, De La Rosa can smell the burning. The ancient town of Guernica is a sight to behold. The historical and cultural centre of the Basque people is burning. A defenceless town firebombed for the purpose of causing terror and breaking Basque morale. Yet another wave of German bombers is rolling in. The attack has been going on for over two and a half hours now. The skies have been clear and De La Rosa has had nothing to do but watch the destruction unfold. He is...\n*fake_choice\n\t#Sickened, this is horrific.\n\t\t*set dlrbrutal +10\n\t\tHow could they have ordered something like this? It's totally disproportionate, it could even be a war crime. The Basques aren't Reds and yet we're slaughtering them like cattle. He of course shares none of these thoughts with his Wing flying alongside him, such thoughts could get him arrested.\n\t#Heavy-hearted, this is terrible but necessary.\n\t\t*set dlrbrutal -5\n\t\tIt is probably a war crime, what he is witnessing. Yet, the Basques have brought this on themselves, they chose to side with the Reds, they must pay the price. And if this breaks their morale and brings the war on the Northern Front to a speedy conclusion, it will save thousands of lives.\n\t#Satisfied, this is the first time that something like this has been done.\n\t\t*set dlrbrutal -10\n\t\tThis is ground-breaking, the war could be over in weeks if they repeat this all over Spain. If this breaks Basque morale, the Northern Front could collapse and thousands of Nationalist lives may well be saved. As for the Basques, De La Rosa feels no sympathy. If you side with the Reds, this is what is going to happen.\n*line_break\nThe radio crackles into life, it's Rodriguez,\n*line_break\n\"Blue Three, I think I see a column escaping, on the road to the North-West of the town\".\n*line_break\nTheir orders are not just to keep the skies clear for the bombers to do their work but also strafe anyone trying to escape the destruction. There are thought to be several Republican units passing through the area.\n*line_break\n\"Ok Blue Five, let's go in for a closer look\".\n*line_break\nThey bring their Fiats lower to get out of the smoke rising from inferno. On further examination, the column appears to be mostly civilians making a run for it. But there may well be soldiers mixed in with them too. And besides, the whole point of this operation is to kill civilians. But can De La Rosa order killing like this?\n*fake_choice\n\t#Yes, he leads the Wing down.\n\t\t*set dlrbrutal -10\n\t\t\"On my lead Blue Wing, we're going in for a strafing run\".\n\t\t*line_break\n\t\tThey swoop down machine guns blazing, spreading destruction and terror. Families, the elderly, the sick, the wounded, they're all there and Fiats' machine guns aren't discerning. And yet this is still killing at a distance. De La Rosa cannot see what he has done as they regain altitude.\n\t#Yes, he orders Rodriguez to attack.\n\t\t*set dlrbrutal -5\n\t\t\"Blue Five, take Blue Six on a strafing run of the column, we'll cover you from up here\".\n\t\t*line_break\n\t\t\"Roger that Blue Three\".\n\t\t*line_break\n\t\tRodriguez peels away and swoops down, machine guns blazing, spreading destruction and terror. Families, the elderly, the sick, the wounded, they're all there and Fiats' machine guns aren't discerning. And yet this is still killing at a distance. De La Rosa cannot see the effects his orders have had as he cruises fifteen hundred metres above the chaos.\n\t#No, that's beyond the pale.\n\t\t*set dlrbrutal +5\n\t\t\"Looks like it's just civvies Blue Five, we'll let them run, tell the good people of Bilbao what's going to happen to their city if they don't surrender\".\n\t\t*line_break\n\t\t\"But what if there's military personnel escaping amongst them Sir?\"\n\t\t*line_break\n\t\t\"We can't say that for sure, leave it Rodriguez, that's an order\".\n*page_break\nWith all their attention focused ground-wards, nobody had noticed a pair of Ratas approaching high above them. They still haven't been spotted when they descend on the Fiats, taking two out in their first pass, one being De La Rosa's.\n*if shotdown = true\n\tIt isn't without a certain sense of deja vu that the Wing Commander finds his Fiat falling out of the sky thanks to a Rata. Those things are too damn good, give him a fighter of that standard and he could be an ace. But he's got more pressing things on his mind.\nThe falling biplane is now too low for De La Rosa to bail out safely, he's going to have to go for an emergency landing. The engine has gone and the controls are unresponsive but at least his aircraft isn't on fire.\n*line_break\n\"This is Blue Three, I'm going to have to go in for an emergency landing, what's the situation on the ground?\"\n*line_break\n\"This is enemy territory but our troops are advancing nearby, I'll send a message back to HQ, sit tight and you should be ok!\"\n*line_break\n\"Well that's all very reassuring\" he replies sarcastically.\n*line_break\nDe La Rosa switches his radio off and concentrates on flying what is left of his plane. The ground is coming very fast, far too fast. He does his best to level the aircraft out to slow it down and glide a little. The landscape is one of rolling hills, not ideal to try and put down on. But there's nothing else for it. Here it comes. The plane smashes into the ground with a tremendous thud. The landing gear snaps and the aircraft skids along the turf, propeller shredded. De La Rosa is unconscious.\n*goto marthree\n*label marthree\n*page_break\nThree days later...\n\nHead Nurse Carrel calls Maria and Gabrielle over, \n*line_break\n\"Sisters, we've got a new patient coming in, he's just had major surgery, his left arm was completely shattered. He'll be with us for several months of R and R. Please take him to the non-critical ward\".\n*line_break\n\"Yes Ma'am,\" they say in unison.\n*line_break\nOnce they're out of earshot, Gabrielle whispers to Maria,\n*line_break\n\"Did you see him come in?\"\n*line_break\n\"No\".\n*line_break\n\"He's a fighter pilot, really very dashing indeed!\" that glint in her eyes is back again.\n*line_break\n\"Is he now...\"\n*if (gababort = true)\n\t*line_break\n\tGabrielle changes the subject, \"About my, er... problem...\"\n\t*line_break\n\t\"Yes, don't worry, I've got it all in hand, I've got you a doctor tonight. It's going to cost the best part of a month's wages but I've paid the advance. He's promised to keep it quiet so it should be ok\".\n\t*line_break\n\t\"Thanks again Maria, I'm sorry to have to drag you into all this\".\n\t*line_break\n\t\"What do you think friends are for? Now let's go and see about this young pilot...\"\n*if (gabneednew = true)\n\t*line_break\n\t\"What? Don't give me that look Maria, you know I [i]need[/i] to find someone, sooner rather than later\".\n\t*line_break\n\t\"When I said soon, I just didn't think it would be so quickly...\"\n\t*line_break\n\tGabrielle stops dead, her face serious now,\n\t*line_break\n\t\"I have not 'moved on'. Don't you dare suggest that. God knows it's still as raw as the moment he was taken away but I have to be practical. What am I going to do about this?\" she points to her belly, \"If Vidal's not coming back, I need someone else, and quickly, before anyone realises\".\n\t*line_break\n\t\"It's ok Gabrielle, I understand\".\n\t*line_break\n\t\"No, you really don't. Everything depends on me getting married within the next two to three months tops. You do not 'understand' what that's like\".\n\t*line_break\n\t\"You're right, I guess I don't...\"\n*if (gabwait = true)\n\t*line_break\n\t\"What's that look for Maria?\"\n\t*line_break\n\t\"Nothing, it's just you said you'd wait for him, for Vidal I mean\".\n\t*line_break\n\t\"Who says I'm not. And besides, what if I need to investigate other [i]options[/i], there's no guarantee he's ever coming back\".\n\t*line_break\n\t\"I suppose you're right. I'm just a little surprised how quickly you've moved on....\"\n\t*line_break\n\tGabrielle stops dead, her face serious now,\n\t*line_break\n\t\"I have not 'moved on'. Don't you dare suggest that. God knows it's still as raw as the moment he was taken away but I have to be practical. What am I going to do about this?\" she points to her belly, \"If Vidal's not coming back, I need someone else, and quickly, before anyone realises\".\n\t*line_break\n\t\"It's ok Gabrielle, I understand\".\n\t*line_break\n\t\"No, you really don't. Everything depends on me getting married within the next two to three months tops. You do not 'understand' what that's like\".\n\t*line_break\n\t\"You're right, I guess I don't...\"\n\t*set gabneednew true\n*page_break\n*if (dlrdead = true)\n\t*goto joqmar\nSome time later...\n\nDe La Rosa opens his eyes. His surroundings are unfamiliar. He's in a hospital, that's for sure. To his left and right are rows of beds, occupied by service personnel with all manner of wounds. He tries to remember what's happened to him. It's a blur of ambulances and operating theatres. He remembers Guernica burning. He remembers that vividly. But very little else about how he has ended up here. Has he been here hours, days, even weeks? He tries to sit up but is greeted by a sharp pain in his left arm. He notices said arm is completely encased in a cast, which is suspended above the bed.\n*line_break\n\"I wouldn't try and move that if I were you,\" comes a voice to the Wing Commander's right. He jumps slightly when he turns to see a nurse standing over him. She's pretty and fair haired.\n*line_break\n\"Who are you?\"\n*line_break\n\"What a rude question,\" the nurse smiles, \"I'm quite obviously a nurse. As for my name, I've already told you, can't you remember?\"\n*line_break\nDe La Rosa can feel himself going red,\n*line_break\n\"Yes of course, you're...\" he really can't remember talking to this girl in his life, it must be the concussion, \"Why yes, you're...\n*fake_choice\n\t#Maria\".\n\t\t\"No silly, Maria's the other one. I'm Gabrielle, for the hundredth time!\"\n\t\t*line_break\n\t\t\"How long have I been here?\"\n\t\t*line_break\n\t\t\"Only a few days. Still, most of you lot have remembered [i]my[/i] name by then\".\n\t\t*line_break\n\t\t\"And why might that be?\"\n\t\t*line_break\n\t\t\"All in good time Jose, all in good time...\" she slinks away as Jose fades back out of consciousness.\n\t#Gabrielle\".\n\t\t\"You remembered! That's a first for you. Yes, I am Gabrielle\".\n\t\t*line_break\n\t\t\"How long have I been here?\"\n\t\t*line_break\n\t\t\"Oh, only a few days. I'm not surprised [i]my[/i] name is one of the few things you can recall\".\n\t\t*line_break\n\t\t\"And why might that be?\"\n\t\t*line_break\n\t\t\"All in good time Jose, all in good time...\" she slinks away as Jose fades back out of consciousness.\n*page_break\nIt's dark. Gabrielle is standing over him. She's unbuttoning her blouse. She notices Jose is awake. She leans in and whispers,\n*line_break\n\"You'll remember [i]this[/i], trust me...\"\n*page_break\nHe opens his eyes. It's the daytime. Was that a dream? It must have been. Or was it a memory? How long had he been asleep? Hours? Days? Another nurse is attending to him. It must be Maria,\n*line_break\n\"You're Maria, right?\"\n*line_break\nThe nurse smirks, \"Only the best for you, eh? I'm not going to bother introducing myself again but clearly Maria's more memorable than me, I'll get her\".\n*line_break\nShe strolls off leaving Jose very embarrassed. A few minutes later, a nurse who must be Maria comes over, she wears a crucifix around her neck,\n*line_break\n\"You wanted to see me?\"\n*line_break\n\"Er... well not exactly...\"\n*page_break\n\"Oh don't worry, the concussion and confusion, that should probably fade within a few days. You had quite a nasty blow\".\n*line_break\n\"What about the arm?\"\n*line_break\n\"Oh you don't want to know. Suffice to say, there's now more metal in there than bone.\nBut you're right-handed aren't you?\"\n*line_break\n\"Yes\".\n*line_break\n\"Well you'll be fine. You should make a full recovery anyway\".\n*line_break\n\"How long?\"\n*line_break\n\"Eight to ten weeks at least. But all you need is plenty of bed rest and some practice once your arm is a bit more mobile\".\n*line_break\nDe La Rosa looks around, trying to think of something to say,\n*line_break\n\"So how did you end up doing this?\" he asks rather lamely.\n*if forcedto = true\n\t*line_break\n\tMaria laughs, \"Well it's quite a story. Let's just say it wasn't entirely consensual\".\n\t*line_break\n\t\"Oh, so you didn't want to become a nurse?\"\n\t*line_break\n\t\"Not at first, but I've got used to it now. I even occasionally enjoy it would you believe!\"\n*if marfas = true\n\t*line_break\n\t\"I wanted to do something to help the war effort. I needed to. This war is of such importance, I couldn't just sit at home, I had to do my bit\".\n\t*line_break\n\t\"How very noble of you. You're right of course, there has never been a war in Spain's history with so much at stake. If only all Spaniards had your attitude\".\n\t*line_break\n\tMaria blushes, \"Thank you Wing Commander\".\n\t*line_break\n\t\"Jose, it's Jose\".\n*line_break\nMaria smiles and leaves,\n*line_break\n\"I'll see you soon, Jose, I've got things to do\".\n*page_break\nGabrielle is waiting for her,\n*line_break\n*set surname \"De La Rosa\"\n\"Taken a shine to De La Rosa have you?\"\n*line_break\n\"Well, I...\"\n*if (gabneednew = true)\n\t*line_break\n\t\"I can't believe you'd do that, when you know what's at stake for me! He's perfect and in his state he'll probably believe he's got me pregnant if I tell him\".\n\t*line_break\n\t\"That would be immoral!\"\n\t*line_break\n\t\"So's being pregnant without being married but I can't help that now! Please Maria, would you lay off it and let me... let me do what I need to\".\n\t*fake_choice\n\t\t#\"Yes, I suppose I must\".\n\t\t\t*set marbrutal +5\n\t\t\t\"Thank you, thank you Maria!\" Gabrielle hugs her friend, \"You always are so kind, I'll find some way of paying you back\".\n\t\t\t*line_break\n\t\t\t\"I'm just doing what I think is right. That's reward enough for me\".\n\t\t\t*set stepaside true\n\t\t#\"No, I'm going where my heart leads me\".\n\t\t\t*set marbrutal -5\n\t\t\t\"You little bitch!\"\n\t\t\t*line_break\n\t\t\t\"There's no need for that sort of language, besides he might choose you over me anyway. You'll just have to try harder\".\n*if (gababort = true)\n\t*line_break\n\t\"Listen, I don't mean to be... Look, I'll just come out with it, since the [i]procedure[/i], I've been feeling very, well, very down. And Jose, he's made me happy again. So I'd really appreciate it if you could just, I don't know, give us some space?\"\n\t*fake_choice\n\t\t#\"Yes, I suppose I should\".\n\t\t\t*set marbrutal +5\n\t\t\t\"Thank you, thank you Maria!\" Gabrielle hugs her friend, \"You always are so kind, I'll find some way of paying you back\".\n\t\t\t*line_break\n\t\t\t\"I'm just doing what I think is right. That's reward enough for me\".\n\t\t\t*set stepaside true\n\t\t#\"No, I'm going where my heart leads me\".\n\t\t\t\"Maria, I need this right now!\"\n\t\t\t*line_break\n\t\t\t\"It's your own fault for getting yourself in that mess, I've already risked everything to get you that procedure. I don't owe you anything\".\n\t\t\t*line_break\n\t\t\t\"You little bitch!\"\n\t\t\t*line_break\n\t\t\t\"There's no need for that sort of language, besides he might choose you over me anyway. You'll just have to try harder\".\n*if (vidrship = true)\n\t*line_break\n\t\"You moved on quickly then\".\n\t*line_break\n\t\"Gabrielle, I...\"\n\t*line_break\n\t\"No you're right, it's none of my business,\" she turns away, \"The thing is though, you don't know how lucky you were with Vidal. I would have killed to have him. And now it looks like you're taking another one away from me\".\n\t*line_break\n\tMaria is...\n\t*fake_choice\n\t\t#Angry.\n\t\t\t\"Away from you? You're making it sound like it's deliberate! I've done nothing wrong, I can't help that he seems to like me!\"\n\t\t\t*line_break\n\t\t\t\"You get everything, it's not so easy for the rest of us!\"\n\t\t\t*line_break\n\t\t\t\"But he likes you too. You never know, he might choose you over me anyway. You'll just have to try harder\".\n\t\t#Sympathetic.\n\t\t\t*set marbrutal +5\n\t\t\t\"Look, I guess I could swap patients with someone if you like so it's just you...\"\n\t\t\t*line_break\n\t\t\t\"Thank you, thank you Maria!\" Gabrielle hugs her friend, \"You always are so kind, I'll find some way of paying you back\".\n\t\t\t*line_break\n\t\t\t\"I'm just doing what I think is right. That's reward enough for me\".\n\t\t\t*set stepaside true\n*page_break\nDe La Rosa lies thinking about the two girls. Maria, so well-spoken, so kind to him, Gabrielle, so pretty and well... so forward. He'd never been too bothered about women before. All that time in Morocco probably did that to him. But now, for the first time in his life he felt vulnerable. Death could be just around the corner. Wouldn't he be missing out if he never, well. What if he were to die without having children? The De La Rosa line would die out. That would be on him. Of course, he knows who he likes more. It's...\n*choice\n\t#Maria.\n\t\tOver the following days and weeks, De La Rosa insists that Maria cares for him, much to Gabrielle's barely-concealed displeasure. They become very close indeed. There's a spark between them, an understanding. \n\t\t*if vidrship = true\n\t\t\tMaria is so besotted that by the time she is completely unmoved by news of Vidal's lengthy prison sentence. He's in her past. She doesn't reply to his letters.\n\t\t*if gabneednew = true\n\t\t\tBefore it became too blatant she was with child, Gabrielle managed to work her way into Captain Jimenez's bedroom. But De La Rosa was the one she had wanted and she didn't forget that.\n\t\t*if stepaside = true\n\t\t\t*set gabbitter true\n\t\t*if gababort = true\n\t\t\tGabrielle got over her post abortion blues by working her way into Captain Jimenez's bedroom. She seems to have a thing about men in positions of minor authority. But De La Rosa was the one she had wanted.\n\t\t*set dlrship true\n\t\t*achieve dlrmar\n\t\t*set girl \"Maria\"\n\t\t*set man \"Jose\"\n\t\t*goto morales\n\t#Gabrielle.\n\t\tOver the following days and weeks, De La Rosa insists that Gabrielle cares for him,\n\t\t*if stepaside = true\n\t\t\tmuch to Maria's satisfaction, although not without a pang of regret.\n\t\t*if stepaside = false\n\t\t\tmuch to Maria's barely-concealed displeasure.\n\t\t\t*set marregret true\n\t\tJose and Gabrielle become very close indeed. There's a spark between them, a passion. \n\t\t*if vidrship = true\n\t\t\tMaria heard that Vidal had merely received a lengthy prison term. But she had no desire to continue their relationship. In her mind, she'd already come to terms with their separation. She doesn't reply to his letters.\n\t\t*if gabneednew = true\n\t\t\tGabrielle is able to convince De La Rosa to marry her before it becomes too blatant she is with child, thus saving her reputation. \n\t\t*set girl \"Gabrielle\"\n\t\t*achieve dlrgab\n\t\t*set man \"Jose\"\n\t\t*goto morales\n*label joqmar\n*if (joqdead = true)\n\t*goto rodmar\n*page_break\n*set surname \"Joaquin\"\nMaria attends to the handsome young pilot, Wing Commander Joaquin.\n*line_break\n\"Why can't I remember what's been happening to me for the last few days?\" he asks, \"I can't seem to remember the names of any of the nurses who attend to me, it's very embarrassing!\"\n*line_break\n\"You remembered my name though didn't you?\"\n*line_break\n\"Oh yes, of course Maria, but it'd be hard to forget you,\" he grins.\n*line_break\n\"Oh really,\" she smirks, blushing slightly, \"The memory loss is concussion, that should probably fade within a few days. You had quite a nasty blow\".\n*line_break\n\"What about the arm?\"\n*line_break\n\"Oh you don't want to know. Suffice to say, there's now more metal in there than bone.\nBut you're right-handed aren't you?\"\n*line_break\n\"Yes\".\n*line_break\n\"Well you'll be fine. You should make a full recovery anyway\".\n*line_break\n\"How long?\"\n*line_break\n\"Eight to ten weeks at least. But all you need is plenty of bed rest and some practice once your arm is a bit more mobile\".\n*line_break\nJoaquin looks around, trying to think of something to say, it's clear he wants Maria to stay a bit longer,\n*line_break\n\"So how did you end up doing this?\" he asks rather lamely.\n*if forcedto = true\n\t*line_break\n\tMaria laughs, \"Well it's quite a story. Let's just say it wasn't entirely consensual\".\n\t*line_break\n\t\"Oh, so you didn't want to become a nurse?\"\n\t*line_break\n\t\"Not at first, but I've got used to it now. I even occasionally enjoy it would you believe!\"\n*if marfas = true\n\t*line_break\n\t\"I wanted to do something to help the war effort. I needed to. This war is of such importance, I couldn't just sit at home, I had to do my bit\".\n\t*line_break\n\t\"How very noble of you. You're right of course, there has never been a war in Spain's history with so much at stake. If only all Spaniards had your attitude\".\n\t*line_break\n\tMaria blushes, \"Thank you Wing Commander\".\n\t*line_break\n\t\"Diego, it's Diego Joaquin\".\n*line_break\nMaria smiles and leaves,\n*line_break\n\"I'll see you soon, Diego\".\n*page_break\nGabrielle is waiting for her,\n*line_break\n\"Taken a shine to Joaquin have you?\"\n*set man \"Diego\"\n*line_break\n\"Well, I...\"\n*if (gabneednew = true)\n\t*line_break\n\t\"I can't believe you'd do that, when you know what's at stake for me! He's perfect and in his state he'll probably believe he's got me pregnant if I tell him\".\n\t*line_break\n\t\"That would be immoral!\"\n\t*line_break\n\t\"So's being pregnant without being married but I can't help that now! Please Maria, would you lay off it and let me... let me do what I need to\".\n\t*fake_choice\n\t\t#\"Yes, I suppose I must\".\n\t\t\t*set marbrutal +5\n\t\t\t\"Thank you, thank you Maria!\" Gabrielle hugs her friend, \"You always are so kind, I'll find some way of paying you back\".\n\t\t\t*line_break\n\t\t\t\"I'm just doing what I think is right. That's reward enough for me\".\n\t\t\t*set stepaside true\n\t\t\t*line_break\n\t\t\tOver the following days and weeks, Maria insists that Gabrielle cares for him,\n\t\t\t*if stepaside = true\n\t\t\t\tmuch to Maria's satisfaction, although not without a pang of regret.\n\t\t\t*set marregret true\n\t\t\tDiego and Gabrielle become very close indeed. There's a spark between them, a passion. \n\t\t\t*if vidrship = true\n\t\t\t\tMaria heard that Vidal had merely received a lengthy prison term. But she had no desire to continue their relationship. In her mind, she'd already come to terms with their separation. She doesn't reply to his letters.\n\t\t\t*if gabneednew = true\n\t\t\t\tGabrielle is able to convince Joaquin to marry her before it becomes too blatant she is with child, thus saving her reputation. \n\t\t\t*goto morales\n\t\t#\"No, I'm going where my heart leads me\".\n\t\t\t*set marbrutal -5\n\t\t\t\"You little bitch!\"\n\t\t\t*line_break\n\t\t\t\"There's no need for that sort of language, besides he might choose you over me anyway. You'll just have to try harder\".\n\t\t\t*line_break\n\t\t\tOver the following days and weeks, Joaquin insists that Maria cares for him, much to Gabrielle's barely-concealed displeasure. They become very close indeed. There's a spark between them, an understanding. \n\t\t\t*if vidrship = true\n\t\t\t\tMaria is so besotted that by the time she is completely unmoved by news of Vidal's lengthy prison sentence. He's in her past. She doesn't reply to his letters.\n\t\t\t*if gabneednew = true\n\t\t\t\tBefore it became too blatant she was with child, Gabrielle managed to work her way into Captain Jimenez's bedroom. But Joaquin was the one she had wanted and she didn't forget that.\n\t\t\t*set dlrship true\n\t\t\t*goto morales\n*if (gababort = true)\n\t*line_break\n\t\"Listen, I don't mean to be... Look, I'll just come out with it, since the [i]procedure[/i], I've been feeling very, well, very down. And Jose, he's made me happy again. So I'd really appreciate it if you could just, I don't know, give us some space?\"\n\t*fake_choice\n\t\t#\"Yes, I suppose I should\".\n\t\t\t*set marbrutal +5\n\t\t\t\"Thank you, thank you Maria!\" Gabrielle hugs her friend, \"You always are so kind, I'll find some way of paying you back\".\n\t\t\t*line_break\n\t\t\t\"I'm just doing what I think is right. That's reward enough for me\".\n\t\t\t*set stepaside true\n\t\t\t*line_break\n\t\t\tOver the following days and weeks, Maria insists that Gabrielle cares for him,\n\t\t\t*if stepaside = true\n\t\t\t\tmuch to Maria's satisfaction, although not without a pang of regret.\n\t\t\t*set marregret true\n\t\t\tDiego and Gabrielle become very close indeed. There's a spark between them, a passion. \n\t\t\t*if vidrship = true\n\t\t\t\tMaria heard that Vidal had merely received a lengthy prison term. But she had no desire to continue their relationship. In her mind, she'd already come to terms with their separation. She doesn't reply to his letters.\n\t\t\t*if gabneednew = true\n\t\t\t\tGabrielle is able to convince Joaquin to marry her before it becomes too blatant she is with child, thus saving her reputation. \n\t\t\t*goto morales\n\t\t#\"No, I'm going where my heart leads me\".\n\t\t\t\"Maria, I need this right now!\"\n\t\t\t*line_break\n\t\t\t\"It's your own fault for getting yourself in that mess, I've already risked everything to get you that procedure. I don't owe you anything\".\n\t\t\t*line_break\n\t\t\t\"You little bitch!\"\n\t\t\t*line_break\n\t\t\t\"There's no need for that sort of language, besides he might choose you over me anyway. You'll just have to try harder\".\n\t\t\t*line_break\n\t\t\tOver the following days and weeks, Joaquin insists that Maria cares for him, much to Gabrielle's barely-concealed displeasure. They become very close indeed. There's a spark between them, an understanding. \n\t\t\t*if vidrship = true\n\t\t\t\tMaria is so besotted that by the time she is completely unmoved by news of Vidal's lengthy prison sentence. He's in her past. She doesn't reply to his letters.\n\t\t\t*if gabneednew = true\n\t\t\t\tBefore it became too blatant she was with child, Gabrielle managed to work her way into Captain Jimenez's bedroom. But Joaquin was the one she had wanted and she didn't forget that.\n\t\t\t*if gababort = true\n\t\t\t\tGabrielle got over her post abortion blues by working her way into Captain Jimenez's bedroom. She seems to have a thing about men in positions of minor authority. But Joaquin was the one she had wanted.\n\t\t\t*set dlrship true\n\t\t\t*goto morales\n*if (vidrship = true)\n\t*line_break\n\t\"You moved on quickly then\".\n\t*line_break\n\t\"Gabrielle, I...\"\n\t*line_break\n\t\"No you're right, it's none of my business,\" she turns away, \"The thing is though, you don't know how lucky you were with Vidal. I would have killed to have him. And now it looks like you're taking another one away from me\".\n\t*line_break\n\tMaria is...\n\t*fake_choice\n\t\t#Angry.\n\t\t\t\"Away from you? You're making it sound like it's deliberate! I've done nothing wrong, I can't help that he seems to like me!\"\n\t\t\t*line_break\n\t\t\t\"You get everything, it's not so easy for the rest of us!\"\n\t\t\t*line_break\n\t\t\t\"But he likes you too. You never know, he might choose you over me anyway. You'll just have to try harder\".\n\t\t\t*line_break\n\t\t\tOver the following days and weeks, Joaquin insists that Maria cares for him, much to Gabrielle's barely-concealed displeasure. They become very close indeed. There's a spark between them, an understanding. \n\t\t\t*if vidrship = true\n\t\t\t\tMaria is so besotted that by the time she is completely unmoved by news of Vidal's lengthy prison sentence. He's in her past. She doesn't reply to his letters.\n\t\t\t*if gabneednew = true\n\t\t\t\tBefore it became too blatant she was with child, Gabrielle managed to work her way into Captain Jimenez's bedroom. But Joaquin was the one she had wanted and she didn't forget that.\n\t\t\t*if gababort = true\n\t\t\t\tGabrielle got over her post abortion blues by working her way into Captain Jimenez's bedroom. She seems to have a thing about men in positions of minor authority. But Joaquin was the one she had wanted.\n\t\t\t*set dlrship true\n\t\t\t*goto morales\n\t\t#Sympathetic.\n\t\t\t*set marbrutal +5\n\t\t\t\"Look, I guess I could swap patients with someone if you like so it's just you...\"\n\t\t\t*line_break\n\t\t\t\"Thank you, thank you Maria!\" Gabrielle hugs her friend, \"You always are so kind, I'll find some way of paying you back\".\n\t\t\t*line_break\n\t\t\t\"I'm just doing what I think is right. That's reward enough for me\".\n\t\t\t*set stepaside true\n\t\t\t*line_break\n\t\t\tOver the following days and weeks, Maria insists that Gabrielle cares for him,\n\t\t\t*if stepaside = true\n\t\t\t\tmuch to Maria's satisfaction, although not without a pang of regret.\n\t\t\t*set marregret true\n\t\t\tDiego and Gabrielle become very close indeed. There's a spark between them, a passion. \n\t\t\t*if vidrship = true\n\t\t\t\tMaria heard that Vidal had merely received a lengthy prison term. But she had no desire to continue their relationship. In her mind, she'd already come to terms with their separation. She doesn't reply to his letters.\n\t\t\t*if gabneednew = true\n\t\t\t\tGabrielle is able to convince Joaquin to marry her before it becomes too blatant she is with child, thus saving her reputation. \n\t\t\t*goto morales\n*label rodmar\n*page_break\n*set surname \"Rodriguez\"\nMaria attends to the handsome young pilot, Wing Commander Rodriguez.\n*line_break\n\"Why can't I remember what's been happening to me for the last few days?\" he asks, \"I can't seem to remember the names of any of the nurses who attend to me, it's very embarrassing!\"\n*line_break\n\"You remembered my name though didn't you?\"\n*line_break\n\"Oh yes, of course Maria, but it'd be hard to forget you,\" he grins.\n*line_break\n\"Oh really,\" she smirks, blushing slightly, \"The memory loss is concussion, that should probably fade within a few days. You had quite a nasty blow\".\n*line_break\n\"What about the arm?\"\n*line_break\n\"Oh you don't want to know. Suffice to say, there's now more metal in there than bone.\nBut you're right-handed aren't you?\"\n*line_break\n\"Yes\".\n*line_break\n\"Well you'll be fine. You should make a full recovery anyway\".\n*line_break\n\"How long?\"\n*line_break\n\"Eight to ten weeks at least. But all you need is plenty of bed rest and some practice once your arm is a bit more mobile\".\n*line_break\nRodriguez looks around, trying to think of something t
