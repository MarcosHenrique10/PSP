o say, it's clear he wants Maria to stay a bit longer,\n*line_break\n\"So how did you end up doing this?\" he asks rather lamely.\n*if forcedto = true\n\t*line_break\n\tMaria laughs, \"Well it's quite a story. Let's just say it wasn't entirely consensual\".\n\t*line_break\n\t\"Oh, so you didn't want to become a nurse?\"\n\t*line_break\n\t\"Not at first, but I've got used to it now. I even occasionally enjoy it would you believe!\"\n*if marfas = true\n\t*line_break\n\t\"I wanted to do something to help the war effort. I needed to. This war is of such importance, I couldn't just sit at home, I had to do my bit\".\n\t*line_break\n\t\"How very noble of you. You're right of course, there has never been a war in Spain's history with so much at stake. If only all Spaniards had your attitude\".\n\t*line_break\n\tMaria blushes, \"Thank you Wing Commander\".\n\t*line_break\n\t\"Diego, it's Diego Rodriguez\".\n*line_break\nMaria smiles and leaves,\n*line_break\n\"I'll see you soon, Diego\".\n*page_break\nGabrielle is waiting for her,\n*set man \"Diego\"\n*line_break\n\"Taken a shine to Rodriguez have you?\"\n*line_break\n\"Well, I...\"\n*if (gabneednew = true)\n\t*line_break\n\t\"I can't believe you'd do that, when you know what's at stake for me! He's perfect and in his state he'll probably believe he's got me pregnant if I tell him\".\n\t*line_break\n\t\"That would be immoral!\"\n\t*line_break\n\t\"So's being pregnant without being married but I can't help that now! Please Maria, would you lay off it and let me... let me do what I need to\".\n\t*fake_choice\n\t\t#\"Yes, I suppose I must\".\n\t\t\t*set marbrutal +5\n\t\t\t\"Thank you, thank you Maria!\" Gabrielle hugs her friend, \"You always are so kind, I'll find some way of paying you back\".\n\t\t\t*line_break\n\t\t\t\"I'm just doing what I think is right. That's reward enough for me\".\n\t\t\t*set stepaside true\n\t\t\t*line_break\n\t\t\tOver the following days and weeks, Maria insists that Gabrielle cares for him,\n\t\t rielle managed to work her way into Captain Jimenez's bedroom. But Rodriguez was the one she had wanted and she didn't forget that.\n\t\t\t*if gababort = true\n\t\t\t\tGabrielle got over her post abortion blues by working her way into Captain Jimenez's bedroom. She seems to have a thing about men in positions of minor authority. But Rodriguez was the one she had wanted.\n\t\t\t*set dlrship true\n\t\t\t*goto morales\n*if (vidrship = true)\n\t*line_break\n\t\"You moved on quickly then\".\n\t*line_break\n\t\"Gabrielle, I...\"\n\t*line_break\n\t\"No you're right, it's none of my business,\" she turns away, \"The thing is though, you don't know how lucky you were with Vidal. I would have killed to have him. And now it looks like you're taking another one away from me\".\n\t*line_break\n\tMaria is...\n\t*fake_choice\n\t\t#Angry.\n\t\t\t\"Away from you? You're making it sound like it's deliberate! I've done nothing wrong, I can't help that he seems to like me!\"\n\t\t\t*line_break\n\t\t\t\"You get everything, it's not so easy for the rest of us!\"\n\t\t\t*line_break\n\t\t\t\"But he likes you too. You never know, he might choose you over me anyway. You'll just have to try harder\".\n\t\t\t*line_break\n\t\t\tOver the following days and weeks, Rodriguez insists that Maria cares for him, much to Gabrielle's barely-concealed displeasure. They become very close indeed. There's a spark between them, an understanding. \n\t\t\t*if vidrship = true\n\t\t\t\tMaria is so besotted that by the time she is completely unmoved by news of Vidal's lengthy prison sentence. He's in her past. She doesn't reply to his letters.\n\t\t\t*if gabneednew = true\n\t\t\t\tBefore it became too blatant she was with child, Gabrielle managed to work her way into Captain Jimenez's bedroom. But Rodriguez was the one she had wanted and she didn't forget that.\n\t\t\t*set dlrship true\n\t\t\t*goto morales\n\t\t#Sympathetic.\n\t\t\t*set marbrutal +5\n\t\t\t\"Look, I guess I could swap patients with someone if you vernment and military conversations. Who knows what they've been doing with that information. Certainly we think the POUM have been secretly aiding the enemy. So, when we get to the exchange, in about...\" he looks at his watch, \"Thirty seconds, we're...\"\n*choice\n\t#Going in hard. Kill anyone who resists\".\n\t\t*goto gohard\n\t#Going to be diplomatic, the CNT aren't the enemy\".\n\t\t*goto diplo\n\t#Going to scare them into cooperation with a show of force\".\n\t\t*goto showforce\n*label gohard\n\"Weapons ready?\" Prieto asks, \"Good, they won't give it up without a fight, so be ready\".\n*line_break\n\"Right you are Sir,\" Alonso primes his rifle.\n*line_break\nThe lorry screeches to a halt outside the telefonica and the Assault Guards leap out. They burst through the front doors, Morales fires a shot into the air with his pistol,\n*line_break\n\"Everybody freeze, we're taking control of this building!\"\n*line_break\n\"On whose authority?\" demands a uniformed anarchist. \n*line_break\n\"The authority of the government of the Spanish Republic!\"\n*line_break\n\"Fucking Stalinists!\" the anarchist pulls a pistol from his desk. Before he can use it, Morales shoots him where he stands. One shot is enough to start a firefight. A confused battle develops. Most people in the building are unaware of what is happening. Morales dispatches one, two, three more anarchists. Somebody, a militiawoman, comes out with a white cloth,\n*line_break\n\"Please, Asaltos, we aren't the enemy, whatever information brings you here is false. We want to help you, not kill you!\"\n*line_break\nMorales...\n*fake_choice\n\t#Shoots her.\n\t\t*set morbrutal -10\n\t\tHe raises his sidearm and shoots her in the chest. She goes down. The firing starts again. He feels no remorse. They [i]are[/i] the enemy. They must be stopped if the war is to be won.\n\t\t*set shots true\n\t\t*goto alba\n\t#Negotiates with her.\n\t\t*set morbrutal +5\n\t\t\"Ok Senorita, what do you want us to do?\"\n\t\t*line_break\n\t\t\"Please, leave the building and approach the CNT through official channels. I'm sure they will cooperate fully with your investigation\".\n\t\t*line_break\n\t\t\"I'm afraid we can't leave Senorita, we have our orders and we must take control of this facility\".\n\t\t*line_break\n\t\t\"Ok...\" she pauses, \"Well, how about I call our CNT representatives and the Catalonian government and we get them down here to sort all this out? We can wait for an official verdict before we do any killing\".\n\t\t*line_break\n\t\t\"Well, it won't do you any good, I can assure you we are doing the business of the government, but if you insist, yes, we can wait. Stand down men\".\n\t\t*goto alba\n\t#Arrests her.\n\t\t*set morbrutal -5\n\t\t\"Please, come here Senorita\".\n\t\t*line_break\n\t\t\"Just do as I say!\" he raises her pistol.\n\t\t*line_break\n\t\t\"Ok, alright,\" she comes over, \"I'm unarmed\".\n\t\t*line_break\n\t\tMorales gets out his handcuffs. On seeing this, the anarchist disposes of her cloth and pulls out a concealed knife. Before she can do anything else, Morales has shot her. The firing starts again. He has no doubts now. They [i]are[/i] the enemy. They must be stopped if the war is to be won.\n\t\t*set shots true\n\t\t*goto alba\n*label diplo\n\"Weapons ready?\" Prieto asks, \"Good, they won't give it up without a fight, so be ready\".\n*line_break\n\"Right you are Sir,\" Alonso primes his rifle.\n*line_break\n\"Hey,\" Morales interjects, \"We're not looking for a fight here. We've got to carry out our orders but we must also do our best to avoid bloodshed\".\n*line_break\nThe lorry screeches to a halt outside the telefonica and the Assault Guards leap out. Morales leads the way through the front doors, striding up to the front desk,\n*line_break\n\"This is a warrant Senorita,\" he tells the secretary, \"We have orders to take control of this facility for the Government of the Republic of Spain. Would you kindly inform a superior of our arrival?\"\n*line_break\n\"Yes Sir...\" she replies meekly, picking up the phone, \"Hello? There's some Asaltos here to see you. What do they want? They want the telefonica. Ok, right,\" she puts the phone down, \"My boss said to tell you to fuck off\".\n*line_break\n\"Typical bloody anarchists,\" Prieto grumbles, \"No respect for authority\".\n*line_break\n\"Excuse me Senorita but I'm afraid we can't just 'fuck off'. We're going nowhere. We need to talk to someone about this. It's a matter of great importance\".\n*line_break\n\"I'll talk to you,\" a CNT militiawoman approaches them, white cloth in hand, to indicate she comes in peace, Morales guesses, \"Please, Asaltos, we aren't the enemy, whatever information brings you here is false\".\n*line_break\n\"It's a trap Morales, you can't trust her, I've heard all sorts about theses anarchist women,\" Prieto warns.\n*line_break\nMorales...\n*fake_choice\n\t#Shoots her.\n\t\t*set morbrutal -10\n\t\tHe raises his sidearm and shoots her in the chest. She goes down. From all around, firing starts. It must have been a trap. They [i]are[/i] the enemy. They must be stopped if the war is to be won.\n\t\t*set shots true\n\t\t*goto alba\n\t#Negotiates with her.\n\t\t*set morbrutal +5\n\t\t\"Ok Senorita, what do you want us to do?\"\n\t\t*line_break\n\t\t\"Please, leave the building and approach the CNT through official channels. I'm sure they will cooperate fully with your investigation\".\n\t\t*line_break\n\t\t\"I'm afraid we can't leave Senorita, we have our orders and we must take control of this facility\".\n\t\t*line_break\n\t\t\"Ok...\" she pauses, \"Well, how about I call our CNT representatives and the Catalonian government and we get them down here to sort all this out? We can wait for an official verdict before we do any killing\".\n\t\t*line_break\n\t\t\"Well, it won't do you any good, I can assure you we are doing the business of the government, but if you insist, yes, we can wait. Stand down men\".\n\t\t*goto alba\n\t#Arrests her.\n\t\t*set morbrutal -5\n\t\t\"Please, come here Senorita\".\n\t\t*line_break\n\t\t\"Just do as I say!\" he raises her pistol.\n\t\t*line_break\n\t\t\"Ok, alright,\" she comes over, \"I'm unarmed\".\n\t\t*line_break\n\t\tMorales gets out his handcuffs. On seeing this, the anarchist disposes of her cloth and pulls out a concealed knife. Before she can do anything else, Morales has shot her. From all around firing starts. He has no doubts now. They [i]are[/i] the enemy. They must be stopped if the war is to be won.\n\t\t*set shots true\n\t\t*goto alba\n*label showforce\n\"Weapons ready?\" Prieto asks, \"Good, they won't give it up without a fight, so be ready\".\n*line_break\n\"Right you are Sir,\" Alonso primes his rifle.\n*line_break\n\"Hey,\" Morales interjects, \"We're not looking for a fight here, just a few shots should be enough to frighten them into playing ball\".\n*line_break\n\"I hope you're right,\" Prieto replies.\n*line_break\nThe lorry screeches to a halt outside the telefonica and the Assault Guards leap out. They burst through the front doors, Morales fires a shot into the air with his pistol. His men match this, peppering the ceiling with bullets.\n*line_break\n\"Everybody freeze, we're taking control of this building! Men, move up!\"\n*line_break\n\"Fucking Stalinists!\" an anarchist pulls a pistol from his desk. Before he can use it, Morales shoots him where he stands. Other CNT militiamen are in position though, armed to the teeth. Very quickly, they are in the middle of a confused firefight. The Assault Guards, spread out and taken by surprise are cut down one by one. Morales dispatches one, two, three more anarchists. Somebody, a militiawoman, comes out with a white cloth,\n*line_break\n\"Please, Asaltos, we aren't the enemy, whatever information brings you here is false. We want to help you, not kill you!\"\n*line_break\nMorales...\n*choice\n\t#Shoots her.\n\t\t*set morbrutal -10\n\t\tHe raises his sidearm and shoots her in the chest. She goes down. The firing starts again. He feels no remorse. They [i]are[/i] the enemy. They must be stopped if the war is to be won.\n\t\t*set shots true\n\t\t*goto alba\n\t#Negotiates with her.\n\t\t*set morbrutal +5\n\t\t\"Ok Senorita, what do you want us to do?\"\n\t\t*line_break\n\t\t\"Please, leave the building and approach the CNT through official channels. I'm sure they will cooperate fully with your investigation\".\n\t\t*line_break\n\t\t\"I'm afraid we can't leave Senorita, we have our orders and we must take control of this facility\".\n\t\t*line_break\n\t\t\"Ok...\" she pauses, \"Well, how about I call our CNT representatives and the Catalonian government and we get them down here to sort all this out? We can wait for an official verdict before we do any killing\".\n\t\t*line_break\n\t\t\"Well, it won't do you any good, I can assure you we are doing the business of the government, but if you insist, yes, we can wait. Stand down men\".\n\t\t*goto alba\n\t#Arrests her.\n\t\t*set morbrutal -5\n\t\t\"Please, come here Senorita\".\n\t\t*line_break\n\t\t\"Just do as I say!\" he raises her pistol.\n\t\t*line_break\n\t\t\"Ok, alright,\" she comes over, \"I'm unarmed\".\n\t\t*line_break\n\t\tMorales gets out his handcuffs. On seeing this, the anarchist disposes of her cloth and pulls out a concealed knife. Before she can do anything else, Morales has shot her. The firing starts again. He has no doubts now. They [i]are[/i] the enemy. They must be stopped if the war is to be won.\n\t\t*set shots true\n\t\t*goto alba\n*label alba\n*page_break\n10.57 A.M.\n*line_break\n3rd May 1937\n*line_break\nBarcelona, Catalonia\n*line_break\nMiliciana Alba Reyes\n\nAfter months at the front, Alba and her militia were finally granted leave at the beginning of May. They returned, of course, to their native Barcelona for some much needed rest and recuperation. They enjoyed the luxuries of living in a city run by the CNT; free public transport, free accommodation and free meals for militiamen. Earlier that year a government directive had ordered women out of frontline duty. Unsurprisingly, Alba hadn't implemented that legislation in her unit. Presently, as was their custom, most of them, Alba and $!{friend} included, are having a late breakfast in the Ritz, another CNT-controlled establishment. \n\nThey're having a debate about the course of the war over croissants and coffee. At first it had felt strange to Alba eating in a place like this, but now she was just enjoying it. If this was what the anarchist utopia was like, she was in. \n*line_break\n\"Yes,\" $!{friend} is saying, \"But if the workers rose up across the nation, the fascists would be overpowered and the war would be won. Revolution is the key to victory!\"\n*line_break\n\"Rubbish, the workers rose up when the Rising began but got slaughtered in the Nationalist zone. It would be a pointless waste of life for them to rise up now\".\n*line_break\n\"No, but what happened then was, the Army simply marched into each village and town one by one and murdered all the leftists. On their own, they didn't stand a chance, but if it was simultaneous, across the whole country, the fascists wouldn't be able to do anything about it. Neither would the communists for that matter\".\n*line_break\n\"Oh, here we go with your conspiracies about the communists wanting us dead. Sure we might have our differences but why would they try and take us out in the middle of a war? They're the ones saying we've got to concentrate on the war effort and not the revolution\".\n*line_break\nAlba decides she should interject, she's just not quite sure what she wants to say.\n*fake_choice\n\t#She says that $!{friend} is right, revolution is the most important.\n\t\t\"I couldn't agree more $!{friend}, if the power of the workers can be harnessed into a single action, there's no doubt the war would be won in weeks, or even days\".\n\t#She says that all efforts should be on concentrated on defeating the fascists.\n\t\t\"We can't sit around arguing about revolutionary theory when every day, more and more of our comrades are murdered by the fascists. We've got to beat them on the battlefield, rid Spain of the fascist cancer before we can think about what happens next\".\n\t#She says that the CNT should strike first and take out the communists before it happens the other way round.\n\t\t\"I think we should deal with the communists once and for all. It's clear as day they can't stand us and are looking for any excuse to exclude us from the government, deny us weapons and maybe worse. I say, we harness the revolutionary power of the workers against them. It won't be so hard given all their anti-revolutionary rhetoric\".\n*line_break\nJust then, Salazar runs in, very nearly colliding with a waiter, sweat dripping from his brow,\n*line_break\n\"Alright Salazar, you're not that late for lunch you know!\" $!{friend} jokes.\n*line_break\nFor a moment, Salazar can't speak, he's panting, bent over, he's clearly in some distress, \"They're, they're attacking the telefonica!\"\n*line_break\n\"Who? The fascists? In Barcelona?\"\n*line_break\n\"No! The police! Asaltos!\"\n*line_break\nIt takes a moment for everyone to digest this news. The confusion turns into anger,\n*line_break\n\"Those fucking communists! See I told you didn't I?\"\n*line_break\n\"Oh do give it a rest, come on let's go!\"\n*line_break\nThey rush out the hotel restaurant, knocking over several tables as they do so, sending porcelain flying.\n*page_break\nOutside, they board a tram,\n*line_break\n\"Stay calm everyone,\" Alba orders, \"We're commandeering this tram,\" and then, to the operator, \"Placa de Catalunya, now!\"\n*line_break\n\"I can't believe they're doing this. If the war is the number one priority, why are they fighting their own?\"\n*line_break\n\"I'll tell you why,\" $!{friend} replies, \"Because they're afraid of us. Afraid of our success. They see what we've done in Barcelona and they worry it'll happen to all of Spain, and they'll be an irrelevance\".\n*line_break\n\"Quiet everyone, listen,\" Alba addresses her militia, \"We fought hard for that building ten months ago. We lost good friends there. I'll be damned if we're going to let it slip from our fingers now. It doesn't matter how this has happened, just that we're going to take it back!\"\n*line_break\n\"No pasaran!\" everyone raises their clenched fists. Everyone except Salazar, who is peering out the window,\n*line_break\n\"Er, Reyes, you might want to see this\".\n*line_break\nOutside, a confrontation is taking place between a group of anarchists and some police officers who are attempting to seal off an adjacent road. It looks like the situation is boiling over.\n\"What should we do?\"\n*choice\n\t#Carry on, we've got to get to the exchange.\n\t\t\"We've no time to stop, let them sort it out, we're getting to that telephone exchange!\"\n\t\t*goto moralestwopre\n\t#Stop and try and calm things down.\n\t\t\"Stop the tram!\"\n\t\t*line_break\n\t\tThe vehicle grinds to a sudden halt, causing all those not seated to fall forwards,\n\t\t*line_break\n\t\t\"Safeties on, we've got to try and calm things down here,\" Alba orders.\n\t\t*line_break\n\t\tThey dismount and approach the scene. The anarchists are shouting and threatening. The Assault Guards are holding their ground.\n\t\t*line_break\n\t\t\"What's the problem here?\" Alba asks.\n\t\t*line_break\n\t\t\"Problem? They're trying to take over the city, that's the problem!\" one of the anarchists responds.\n\t\t*line_break\n\t\t\"We're just doing our job,\" the officer replies, \"We have orders to seal off this road to any and all traffic\".\n\t\t*line_break\n\t\t\"And why are you doing that?\"\n\t\t*line_break\n\t\t\"Because those are our orders\".\n\t\t*line_break\n\t\tThere seems to be something of an impasse. Alba decides to try and persuade...\n\t\t*choice\n\t\t\t#The Assault Guard.\n\t\t\t\t\"Please, tell your men to stand down, can't you see you're only causing aggravation?\"\n\t\t\t\t*line_break\n\t\t\t\t\"If you have a problem, you'll have to take it up with my superiors, there really is nothing I can do\".\n\t\t\t\t*line_break\n\t\t\t\tAlba is frustrated, \"Look, we're not the enemy! Just stand aside and all this could be resolved peacefully!\"\n\t\t\t\t*line_break\n\t\t\t\t\"We're not moving Senorita\".\n\t\t\t\t*line_break\n\t\t\t\tAlba...\n\t\t\t\t*choice\n\t\t\t\t\t#Uses force.\n\t\t\t\t\t\tAlba raises her rifle.\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tThe officer remains completely still,\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"I don't think that would be a very good idea Senorita\".\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tIt may not be, but she does it anyway. She shoots him in the head from less than ten metres away. The rest of her militia are firing and the Assault Guards make lovely targets, lined up as they are in the open along the road. In less than a minute, they've eliminated them.\n\t\t\t\t\t\t*goto moralestwopre\n\t\t\t\t\t#Talks to the anarchist.\n\t\t\t\t\t\t\"Comrade, there's no persuading that bastard. He's not going to move. I think we all just need to calm down and walk away from this situation before things get nasty\".\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"And let them win? Not a chance, this is a fight for survival, they won't stop until the anarchist movement has been crushed!\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Well if you want to fight for our cause, come with us to the telephone exchange. They're trying to seize it\".\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"No? The bastards! Alright, we're in!\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tThey re-board the tram and leave the Assault Guards to guard their road.\n\t\t\t\t\t\t*goto moralestwopre\n\t\t\t\t\t#Leaves. \n\t\t\t\t\t\t\"So be it, work it out amongst yourselves, we have more important things to do\".\n\t\t\t\t\t\t*goto moralestwopre\n\t\t\t#The Anarchist.\n\t\t\t\t\"Comrade, there's no persuading that bastard. He's not going to move. I think we all just need to calm down and walk away from this situation before things get nasty\".\n\t\t\t\t*line_break\n\t\t\t\t\"And let them win? Not a chance, this is a fight for survival, they won't stop until the anarchist movement has been crushed!\"\n\t\t\t\t*line_break\n\t\t\t\t\"Well if you want to fight for our cause, come with us to the telephone exchange. They're trying to seize it\".\n\t\t\t\t*line_break\n\t\t\t\t\"No? The bastards! Alright, we're in!\"\n\t\t\t\t*line_break\n\t\t\t\tThey re-board the tram and leave the Assault Guards to guard their road.\n\t\t\t\t*goto moralestwopre\n\t#Stop and help the anarchists.\n\t\t\"Stop the tram!\n\t\t*line_break\n\t\tThe vehicle grinds to a sudden halt, causing all those not seated to fall forwards,\n\t\t*line_break\n\t\t\"Safeties off, if they don't back off, we're taking them out!\" Alba orders.\n\t\t*line_break\n\t\tThey dismount and approach the scene. The anarchists are shouting and threatening. The Assault Guards are holding their ground.\n\t\t*line_break\n\t\t\"Fuck off Asaltos!\" Alba demands, \"Fuck off or we shoot!\" she's aiming her rifle at the Assault Guards' officer, a young Lieutenant.\n\t\t*line_break\n\t\t\"Really Senorita? I don't think pointing that thing at me is a good idea. Do you even know how to use it? No, what you're doing is going to get you in a lot of trou...\"\n\t\t*line_break\n\t\tBefore he can complete his sentence, Alba has shot him in the head. The rest of her militia are firing and the Assault Guards make lovely targets, lined up as they are in the open along the road. In less than a minute, they've eliminated them.\n\t\t*goto moralestwopre\n*label moralestwopre\n*page_break\nThe tram pulls into Placa de Catalunya. There is chaos all around, militia running back and forth, a fierce firefight developing, lorries and trams of Assault Guards and CNT arriving in the square. \n*line_break\n\"Stop, we'll get off here, before we get too close,\" Alba orders, before turning to the passengers, \"Er... sorry about this, try and stay low and whatever you do, don't go outside!\"\n*line_break\nShe leaps off and waves her militia off the vehicle, directing them to cover. \n*goto moralestwo\n*label moralestwo\n*if (moralesdead = true)\n\t*goto albatwo\n*page_break\n\"Sir!\" Alonso shouts, \"Militia, outside! Looks like there's a lot of them!\"\n*line_break\n\"Oh shit!\" Morales rushes to the windows. Dozens of CNT militiamen and women are crowding round the building, armed with all manner of weaponry, \"Get to the windows men!\"\n*if (shots)\n\t*line_break\n\tLeaving a few men to hold off those inside, Morales moves the majority of his troops to the windows of the exchange to engage these new attackers. Soon, the sound of a hundred rifles exchanging fire drowns out the din of hundreds of ringing telephones. Morales spots what he thinks must be the leader of the CNT attack, directing militiamen back and forth. He aims his rifle.\n\t*goto nextonthis\n*elseif (shots = false)\n\t*line_break\n\t\"They're going to attack us Sir!\" Prieto protests, \"We've got to take them out before we get overwhelmed!\"\n\t*line_break\n\t\"Hold your fire! We don't want this to turn nasty!\"\n\t*line_break\n\tA shot rings out. Morales can't be sure which side fired it. But one shot is enough. Soon, the sound of a hundred rifles exchanging fire drowns out the din of hundreds of ringing telephones. Morales spots what he thinks must be the leader of the CNT attack, directing militiamen back and forth. He aims his rifle.\n\t*goto nextonthis\n*label nextonthis\n*line_break\n\"There Sir, machine gun!\" Prieto shouts. Morales diverts his aim to a team of anarchists bringing a heavy machinegun into the Placa de Catalunya. He looks back at the commander. He shoots\n*fake_choice\n\t#The Leader.\n\t\t*set albadead true\n\t\tHe squeezes the trigger. The anarchist commander is hit square in the chest. She goes down. Morales allows himself a smile of satisfaction before swinging his rifle round to deal with the machine gunners.\n\t\t*goto albatwo\n\t#The machine gunners.\n\t\tHe pulls the trigger and the first anarchist goes down. Then, the next. And finally the third. He swings his rifle round to try and spot the leader again. He can't see her. \n\t\t*line_break\n\t\t\"Damn!\"\n\t\t*goto albatwo\n*label albatwo\n*page_break\n*if (albadead = true)\n\tAlba feels the shot hit her in the chest. She looks down at it and sees the blood flowing from the open wound, soaking her overalls. She sees all this and sinks to her knees. She lets her rifle drop. Her overriding emotion is anger. Anger at how unfair it is. This is it. She's not even twenty and this is it. Her life over. Like this. She puts her hand to the wound, something which seems to take enormous effort. It's painful to touch. She looks up to see $!{friend} standing over her. She's saying something. Alba doesn't really understand. She just smiles weakly. She either can't bring herself to speak or can't physically do so, she's not sure which. Fucking hell. This isn't fair. But it's the way it is.\n\t*goto morthree\nAlba spots a machine gun crew moving into position, \n*line_break\n\"Get that over here!\" she shouts.\n*line_break\nThen the first one is shot down. Alba throws herself to the ground. The second and third fall in quick succession. The weapon is left stranded in the middle of the road. They're pinned down. A large number of Assault Guards are now moving into the square, supported by an armoured car.\n*line_break\n\"We're getting cut up here Alba, we have to move!\" $!{friend} calls.\n*line_break\n\"Yeah!\" Salazar agrees, \"We've got no chance, this is going to be a bloodbath!\"\n*line_break\n\"Ok, let's get out of here!\"\n*line_break\nThey make a dash for the sidestreets.\n*goto morthree\n*label morthree\n*if moralesdead = true\n\t*goto albanext\n*page_break\nReinforcements had arrived just in time to save Morales and his men. Hundreds of Assault Guards flooded the city to put down the unrest. \n*page_break\nThree hours later...\n\nMorales sits in a rather bland looking office. A military map of Spain is pinned to one of the walls. On the other, a detailed map of Barcelona. He doesn't know why he's here. In the corner sits an aged man in a Soviet military uniform. Morales tried talking to him but it appears he doesn't speak Spanish. He merely shrugged when Morales asked him why he was here.\n\nPresently, the door opens and a man wearing the uniform of a Lieutenant-Colonel enters. Morales recognises him instantly although he has never seen him in person. It is Juan Modesto, a hero of Madrid and Guadalajara. Morales stands bolt upright and salutes.\n*line_break\n\"At ease Lieutenant\".\n*line_break\nMorales sits, but can't think of anything to say. \n*line_break\n\"Oh, please excuse the rudeness of Comrade General Zaponov here, I'm afraid he doesn't speak much Spanish, do you Zaponov?\"\n*line_break\nZaponov grunts and says something in Russian, to which Modesto replies in the same language. Then, he turns back to Morales,\n*line_break\n\"Morales, you may be wondering why you're here,\" Morales doesn't say anything, \"Well, are you?\"\n*line_break\n\"Oh, yes Sir\".\n*page_break\n\"Well, the reason is twofold. First and foremost, I wished to congratulate you personally on you and your unit's performance at the Telephone Exchange. That was the centrepiece of our operation today and, well to be frank, it could have gone very wrong indeed. But now we are in possession of the building and have won an important victory over the anarchists\".\n*line_break\n\"Thank you Sir, we just did our best and held on as long as we could\".\n*line_break\n\"That's what they all say. Anyhow, the second reason... well, I'll put it like this. Having risen up through the militias into the upper ranks of the Republican army, I would say I have gained the ability to know a good soldier when I see one. And we are going to need good soldiers. The new Popular Army will be a conscript one...\"\n*line_break\n\"Conscripts?\" Morales interrupts, then immediately he recoils, realising he's spoken out of line. But Modesto is unoffended and indicates for the Lieutenant to continue, \"We're introducing conscription?\" \n*line_break\n\"But of course Lieutenant. How else are we to win this war?\"\n*line_break\n\"It's just, I thought...\"\n*line_break\n\"Let me tell you something. Franco has something like 350,000 Spanish conscripts in the field. Add to that his Foreign Legion and Moroccan Regulares. Plus the Falange and Carlist militias. And then he's got at least 60,000 Italians from Mussolini and 8,000 Germans from Hitler. Do you think, do you [i]really[/i] think we can beat them with a few volunteer militiamen?\"\n*line_break\n\"No, I guess not\".\n*line_break\n\"No we can't. And unless every man, woman and child in the Republican zone is mobilised for the war effort, we [i]will[/i] lose. That's what these anarchists and Trotskyists just don't get. Everything [i]they're[/i] fighting for will be lost if we don't beat Franco. And to beat him we need to imitate him. We need hierarchy, organisation, discipline\".\n*line_break\n\"Yes Sir\".\n*page_break\n\"So, going back to my original point, we're building a conscript army. We'll need high quality officers to lead these conscripts if we want the Popular Army to be an effective fighting force. And in your actions today, I see both an able officer and someone politically committed to our cause,\" Modesto goes over to his desk and picks up a file, handing it to Morales, \"You will be promoted to the rank of Captain and appointed a company commander in the newly formed Palafox Battalion of the 150th International Brigade\".\n*line_break\n\"International Brigade Sir?\"\n*line_break\n\"Don't worry Morales, you won't have to learn Polish or any other language for that matter. The trouble with the international volunteers is, they're very brave, but they're also very good at getting themselves killed because of it. We're having to fill up the ranks of the International Brigades with Spanish conscripts. Yours will be a Spanish company\".\n*line_break\n\"Very good Sir\".\n*line_break\n\"Oh, and one last thing, Morales. You're not a member of any political party are you?\"\n*line_break\n\"No Sir, I thought it best to remain neutral as an officer of the law\".\n*line_break\n\"Right, well you're not a policeman anymore, so if you want to accept this assignment, you'll have to join the Communist Party\".\n*line_break\n\"What?\"\n*line_break\n\"Here, I've had all the paperwork done for, I've even had your membership card printed, just sign here and you're all set!\"\n*line_break\nMorales dithers before...\n*fake_choice\n\t#Signing.\n\t\t\"Very good Lieutenant, or should I say Captain. You'll go far, trust me,\" Modesto shakes Morales' hand, \"And since you've been so cooperative, I was wondering, is there anyone in your unit you'd like to take with you as your Second-in-Command?\"\n\t\t*line_break\n\t\t\"Er, yes...\"\n\t\t*choice\n\t\t\t#Sergeant Prieto\".\n\t\t\t\t\"Very good, I'll have him transferred and promoted to Lieutenant. I'm expecting great things from you Morales, don't disappoint me\".\n\t\t\t\t*set prietowithyou true\n\t\t\t\t*goto albanext\t\t\t\t\n\t\t\t#Private Alonso\".\n\t\t\t\t\"Very good, I'll have him transferred and promoted to Lieutenant. I'm expecting great things from you Morales, don't disappoint me\".\n\t\t\t\t*set alonsowithyou true\n\t\t\t\t*goto albanext\n\t#Refusing.\n\t\t\"No, I can't do that Sir, I will take the posting but I can't join the Communists\".\n\t\t*line_break\n\t\t\"Why would that be then?\"\n\t\t*line_break\n\t\t\"Well, to be frank, because I don't believe in their ideology\".\n\t\t*line_break\n\t\t\"Right...\" Modesto walks behind his desk, and mutters something to the Russian, \"Well, I'm afraid it's not a case of one or the other. If you want the position, you'll have to join up\".\n\t\t*line_break\n\t\t\"With all due respect Sir, I thought you said I was a good soldier? What does it matter if I join the party or not?\"\n\t\t*line_break\n\t\t\"You are a good soldier Morales, which is why I'm certain you'll hate every minute of your new Assault Guard posting. I'll make sure you're sent to some quaint little town on the South coast, where you'll be rescuing cats, helping old ladies across the road and handing out speeding tickets. You won't see any more of this war, I'll make sure of that\".\n\t\t*line_break\n\t\tMorales moves uncomfortably in his seat. Ever since they'd been transferred away Madrid, he'd been at his wits end. He had craved the fighting, the war seemed to have been passing him by all those months in Valencia. And now here was the chance to get right in the thick of it again. Fighting fascists, not anarchists. He doesn't really have a choice, does he?\n\t\t*choice\n\t\t\t#Sign up.\n\t\t\t\t\"Ok, alright, I'll do it, give me the form\".\n\t\t\t\t*line_break\n\t\t\t\t\"Ah, we got there in the end didn't we? Now, you'll need a second-in-command, would you like to choose someone from your unit?\"\n\t\t\t\t*line_break\n\t\t\t\t\"Er, yes...\"\n\t\t\t\t*choice\n\t\t\t\t\t#Sergeant Prieto\".\n\t\t\t\t\t\t\"Very good, I'll have him transferred and promoted to Lieutenant. I'm expecting great things from you Morales, don't disappoint me\".\n\t\t\t\t\t\t*set prietowithyou true\n\t\t\t\t\t\t*goto albanext\t\t\t\t\n\t\t\t\t\t#Private Alonso\".\n\t\t\t\t\t\t\"Very good, I'll have him transferred and promoted to Lieutenant. I'm expecting great things from you Morales, don't disappoint me\".\n\t\t\t\t\t\t*set alonsowithyou true\n\t\t\t\t\t\t*goto albanext\n\t\t\t\t\n\t\t\t#Refuse.\n\t\t\t\t\"No, I won't be intimidated by you or anyone else, I can't agree to that!\"\n\t\t\t\t*line_break\n\t\t\t\t\"My my, you are stubborn aren't you. It's a quality I look for in my soldiers. Look, I'll make this clear for you. If you refuse to sign, the moment you step out that door, you'll be arrested. Your records will read, and it will be reported in the press, that what actually happened today at the telephone exchange was you switched sides and fought with the CNT,\" Modesto pauses for a second, \"Yes, and we'll say you killed some of your own squad mates. And of course we'll have to have them actually killed for the story to add up,\" Modesto goes back to his file, \"Yes, this Sergeant Prieto should do nicely. Anyway, you'll be tried, almost certainly found guilty and most likely sentenced to death. How does that sound to you?\"\n\t\t\t\t*line_break\n\t\t\t\tAfter a long pause, Morales resigns himself to his fate, \"Alright, I'll sign\".\n\t\t\t\t*line_break\n\t\t\t\t\"Very good, you've seen sense at last! Now, I would like to think of myself as a fair man, so is there anyone in your present unit you'd like to come with you to be your second-in-command?\"\n\t\t\t\t*line_break\n\t\t\t\t\"Er, yes...\"\n\t\t\t\t*choice\n\t\t\t\t\t#Sergeant Prieto\".\n\t\t\t\t\t\t\"Very good, I'll have him transferred and promoted to Lieutenant. What an afternoon he's had, from death sentence to promotion in thirty seconds! I'm expecting great things from you Morales, don't disappoint me\".\n\t\t\t\t\t\t*set prietowithyou true\n\t\t\t\t\t\t*goto albanext \t\t\t\n\t\t\t\t\t#Private Alonso\".\n\t\t\t\t\t\t\"Very good, I'll have him transferred and promoted to Lieutenant. I'm expecting great things from you Morales, don't disappoint me\".\n\t\t\t\t\t\t*set alonsowithyou true\n\t\t\t\t\t\t*goto albanext\n*label albanext\n*if (albadead = true)\n\t*finish\n*page_break\nAlba and her militia regroup in a back alley. The sound of fighting is all around them.\n*line_break\n\"Oh shit, what are we going to do? We're dead. It's over, everything, we're finished!\" Salazar moans.\n*line_break\n\"Put a sock in it!\" $!{friend} replies, \"This is our heartland, they won't win, we'll take back that exchange, mark my words!\"\n*line_break\n\"The CNT might,\" Alba interrupts, \"But we won't\".\n*line_break\n\"What do you mean?\"\n*line_break\n\"We're leaving\".\n*line_break\n\"And where exactly do you plan on going?\"\n*line_break\n\"Somewhere where it won't matter if you're an anarchist or a communist or whatever. Somewhere where the only foe we'll be fighting will be the fascists. We're going behind the lines. We're going to be guerrileros\".\n*finish\n", "chapterseven": "*temp d1 false\n*temp d2 false\n*temp d3 false\n*temp bombers 12\n*temp pair \"none\"\n*temp pairdead false\n*temp planes false\n*temp fuel false\n*temp ammo false\n*temp guards false\n*temp run false\n*temp ambush false\n*temp trap false\n*temp preg false\n*temp dis false\n*temp mis false\n*temp captain \"none\"\n*temp burns false\n*temp tank true\n*temp arty true\n*temp at 5\n*temp mg 5\n*temp bad 0\n*temp pullback false\nAnd so the Battle of the Ebro followed the same pattern as Brunete, Belchite and Teruel. Franco stemmed the Republican tide and slowly but surely went about winning back every last metre of lost ground. But Modesto was not willing to yield all his gains without a fight.\n\nFrom August through to November, the Popular Army clung on in the face of overwhelming Nationalist superiority in numbers of men, tanks, guns and aircraft. 13,500 shells rained down on the Republican positions every day. One by one, the objectives that had been so rapidly won, Corbera, Camposines, the Sierra Pandols, were lost.\n\nThe fighting descended into World War One style trench warfare in which both sides paid a terrible price. But it was a price the Republicans could ill afford.\n*page_break\n*image number14.png\nIn September, Prime Minister Negrin voluntarily withdrew the International Brigades and sent them home, to the fifty-five different countries from whence they'd came. It was an unsuccessful attempt to force the Nationalists to do the same, by now the numbers of volunteers was relatively small compared to the number of German and Italian troops in the country, the simple reason being that so many of the Brigaders had been killed.\n\nFranco was having none of it and played down the role of foreigners in his army. And to add insult to injury, Negrin's hopes of a European war seemed to be dashed when Hitler and British PM Chamberlain signed the Munich Agreement in the same month, securing \"peace in our time\".\n*goto dlr\n\n*label dlr\n*if dlrdead = true\n\t*goto alba\n*page_break\n*image number13.png\n1.41 P.M.\n*line_break\n13th August 1938\n*line_break\nNationalist Airbase, 35 KM South-West of the Ebro Front\n*line_break\nSquadron Leader Jose De La Rosa\n\n\"Scramble!\" had been the order and they'd dropped what they'd been doing; chairs were knocked over, playing cards went flying, places in books were lost. De La Rosa and 11 Squadron had sprinted with all their worth to their shining new Messerschmitts.\n\nThe ground crew had already started the engines, enemy bombers were inbound. Clambering into the cramped cockpit of the 109, Jose checks all the dials, ensures the radio is working and signals to the crew to remove the chocks.\n*page_break\nHe taxis his fighter to the end of the runway, ramps up the power and takes off. The process of getting the whole squadron into the air is painfully slow, each plane must wait for its turn on the runway. Circling impatiently around the airbase, the enemy surely getting closer all the time, De La Rosa decides to...\n*choice\n\t#Go on without the others, they'll catch up.\n\t\t\"Blue squadron, move to intercept the bombers as soon as you're in the air, follow my lead\".\n\t\t*line_break\n\t\t\"Roger that Blue Leader\".\n\t\t*line_break\n\t\tDe La Rosa accelerates and gains altitude, rapidly covering the short distance between the airfield and the Nationalist supply depot which is presumed to be the bombers' target. And there they are. De La Rosa spots the twin-engined Red bombers approaching, tightly packed in a defensive formation. There's at least a dozen. They're Russian-built Tupolev SBs, light, nippy and well armed with four defensive MGs.\n\t\t\n\t\tMoving high above them, De La Rosa dives down on them, impressed by his new 109's speed and handling. Getting into range he opens fire and watches as the bomber in his sights is literally torn in two.\n\n\t\tThe Messerschmitt is armed with two 20mm cannons, which fire explosive rounds. Whilst you could spend all day shooting up an aircraft with a machine gun and achieve nothing but fill it with holes (so long as you hit nothing important) these cannons tear the structure of an aircraft apart.\n\n\t\tBut as Jose sweeps past, the gunners on the surrounding bombers open fire. With so many guns trained on him, he inevitably takes hits. Fortunately nothing too serious but he does notice the 109 is not handling so smoothly.\n\t\t*set bombers -1\n\t\t*set d1 true\n\t\t*goto bombers\n\t#Wait for his Wing to be in the air before leaving.\n\t\t\"Wing One, form up on me and we'll move to immediately intercept the bombers, the rest of you follow once you're in the sky\".\n\t\t*line_break\n\t\t\"Roger that Blue Leader\".\n\t\t*line_break\n\t\tOnce the four fighters of his own Wing are airborne, De La Rosa accelerates and gains altitude, rapidly covering the short distance between the airfield and the Nationalist supply depot which is presumed to be the bombers' target. And there they are. De La Rosa spots the twin-engined Red bombers approaching, tightly packed in a defensive formation. There's at least a dozen. They're Russian-built Tupolev SBs, light, nippy and well armed with four defensive MGs.\n\t\t*line_break\n\t\t\"Follow my lead,\" he orders.\n\t\t*line_break\n\t\tMoving high above them, De La Rosa dives down on them, impressed by his new 109's speed and handling. Getting into range he opens fire and watches as the bomber in his sights is literally torn in two. The rest of the Wing are close behind follow suit, downing two more of the Tupolevs.\n\n\t\tThe Messerschmitt is armed with two 20mm cannons, which fire explosive rounds. Whilst you could spend all day shooting up an aircraft with a machine gun and achieve nothing but fill it with holes (so long as you hit nothing important) these cannons tear the structure of an aircraft apart.\n\n\t\tAs they sweep past, the gunners on the surrounding bombers open fire. But with four targets to aim at, the gunners are unable to cause any real damage.\n\t\t*set bombers -3\n\t\t*goto bombers\n\t#Wait for the whole squadron to get airborne.\n\t\t\"Come on Blue squadron, double time! We need to intercept those bombers!\"\n\t\t*line_break\n\t\t\"We're going as quick as we can Sir!\"\n\t\t*line_break\n\t\tAfter an agonising ten minutes or so, they set off, De La Rosa accelerating and gaining altitude, rapidly covering the short distance between the airfield and the Nationalist supply depot which is presumed to be the bombers' target. \n\n\t\tAnd it's not a pretty sight when they get there. Far below them, the depot is ablaze, munitions and petrol providing amble fuel for the fires started by the bombs. A massive column of black smoke rises miles into the sky. \n\n\t\tDe La Rosa spots the twin-engined Red bombers making off for Republican lines, tightly packed in a defensive formation. There's at least a dozen. They're Russian-built Tupolev SBs, light, nippy and well armed with four defensive MGs.\n\t\t*line_break\n\t\t\"They are not getting away with this, Blue squadron move to engage!\"\n\t\t*goto bombers\n*label bombers\n*page_break\nThe full squadron forms up just out of range of the bombers, menacing them.\n*line_break\n\"How are we going to do this Jose?\" Rodriguez asks.\n*choice\n\t#\"All attack at once, overwhelm them\".\n\t\t\"Yes Sir, moving to engage!\"\n\t\t*line_break\n\t\tThe fighters of 11 Squadron swarm around the bombers in a chaotic melee. De La Rosa snaps onto one of the bombers and opens fire. The SB's left engine is blown to pieces and explodes in a ball of flames. With it, the Tupolev's left wing snaps off and the plane goes spinning out of control.\n\t\t*if bombers >11\n\t\t\tThe Messerschmitts are armed with two 20mm cannons, which fire explosive rounds. Whilst you could spend all day shooting up an aircraft with a machine gun and achieve nothing but fill it with holes (so long as you hit nothing important) these cannons tear the structure of an aircraft apart.\n\n\t\tAs the 109s buzz around the Tupolevs their defensive gunners fire, desperately trying to fend off the attacks. As De La Rosa swoops past attacking again (and ripping apart another bomber) he hears the distinctive ping of bullets hitting his aircraft.\n\t\t*if d1 = true\n\t\t\t*set d1 false\n\t\t\t*set d2 true\n\t\t\tOne of them must have hit the engine because he notices immediately his 109 has lost about 20% power.\n\t\t*if d1 = false\n\t\t\t*set d1 true\n\t\t\tFortunately nothing too serious but he does notice the 109 is not handling so smoothly.\t\n\t\t\n\t\t*set bombers -5\n\t\tThe shattered bomber squadron heads for home, only ${bombers} remain, most of them damaged.\n\t\t*goto dogfight\n\t#\"Pick off the ones on the edges first and work our way in\".\n\t\t\"Yes Sir, moving to engage!\"\n\t\t*line_break\n\t\tThe fighters of 11 Squadron attack the Tupolevs on the edge of the formation, bringing them down quickly. De La Rosa snaps onto one of the bombers and opens fire. The SB's left engine is blown to pieces and explodes in a ball of flames. With it, the Tupolev's left wing snaps off and the plane goes spinning out of control.\n\t\t*if bombers >11\n\t\t\tThe Messerschmitts are armed with two 20mm cannons, which fire explosive rounds. Whilst you could spend all day shooting up an aircraft with a machine gun and achieve nothing but fill it with holes (so long as you hit nothing important) these cannons tear the structure of an aircraft apart.\n\t\t\n\t\t*set bombers -6\n\t\tThey 109s work efficiently moving from one bomber to the next and bringing them down. The shattered bomber squadron heads for home, only ${bombers} remain, most of them damaged.\n\t\t*goto dogfight\n\t#\"Enter chain formation and dive on them from above\".\n\t\t\"Yes Sir, moving to engage!\"\n\t\t*line_break\n\t\tMoving high above the bombers and entering a long chain, the 109s dive down on the massed bombers, one by one in a continuous stream. De La Rosa descends on one of the bombers and opens fire. The SB's left engine is blown to pieces and explodes in a ball of flames. With it, the Tupolev's left wing snaps off and the plane goes spinning out of control.\n\t\t*if bombers >11\n\t\t\tThe Messerschmitts are armed with two 20mm cannons, which fire explosive rounds. Whilst you could spend all day shooting up an aircraft with a machine gun and achieve nothing but fill it with holes (so long as you hit nothing important) these cannons tear the structure of an aircraft apart.\n\t\t\n\t\t*set bombers -7\n\t\tThe 109s are highly effective; before the Tupolev's defensive gunners can get a bead on them, they've zoomed past and the next one is already on them. The shattered bomber squadron heads for home, only ${bombers} remain, most of them damaged.\n\t\t*goto dogfight\n*label dogfight\n*page_break\n\"This is Blue Leader to Ground Control, hostile bombers intercepted, awaiting further orders\".\n*line_break\n\"Affirmative Blue Leader, new orders are air superiority mission. We've got one hundred plus hostile fighters moving over Ebro front, all available units are being scrambled to intercept\".\n*line_break\n\"Copy that Ground Control, on our way!\"\n*if joqdead = false\n\t*line_break\n\t\"Sounds like the Reds are trying to win back control of the skies,\" Joaquin observes.\n*line_break\n\"Good, I like a challenge!\" Rodriguez adds bullishly.\n\nThe skies over the Ebro are full. De La Rosa has never seen anything like this, upwards of two hundred fighters are engaged in an epic struggle. Ratas and Super-Ratas going head to head with Fiats and 109s. In practically every direction for kilometres, the struggle continues, a clear blue sky turned murky grey with aviation fuel, tracer and smoke.\n*line_break\n\"Right, you know the drill, pair up!\"\n*line_break\nThey'd been introduced to a new tactic by the Germans, dogfighting in pairs. Rather than the traditional method of fighting in formation, the German Condor Legion was innovating a new, more flexible way of flying; hunting in pairs.\n*line_break\nDe La Rosa pairs up with...\n*choice\n\t#Rodriguez.\n\t\t\"Rodriguez, you're with me, let's go!\"\n\t\t*line_break\n\t\t\"Roger that Blue Leader, I'm right behind you\".\n\t\t*set pair \"Rodriguez\"\n\t\t*line_break\n\t\tThe squadron splits up into their respective pairs and they plunge into the fight.\n\t\t*goto dog2\n\t*if joqdead = false\n\t\t#Joaquin.\n\t\t\t\"Joaquin, you're with me, let's go!\"\n\t\t\t*line_break\n\t\t\t\"Don't you worry Jose, I'm right behind you\".\n\t\t\t*set pair \"Joaquin\"\n\t\t\t*line_break\n\t\t\tThe squadron splits up into their respective pairs and they plunge into the fight.\n\t\t\t*goto dog2\n\t#A rookie, Silva.\n\t\t\"Silva, you stick with me and you'll be ok\".\n\t\t*line_break\n\t\t\"Yes Blue Leader,\" there's a definite hint of fear in his voice.\n\t\t*line_break\n\t\t\"Just stay with me no matter what\".\n\t\t*line_break\n\t\tThe squadron splits up into their respective pairs and they plunge into the fight.\n\t\t*set pair \"Silva\"\n\t\t*goto dog2\n*label dog2\n*line_break\n*line_break\nDe La Rosa weaves through the chaos, $!{pair} close behind. The 109 is without doubt the best fighter in Spain, although he hasn't gone up against any Super-Ratas yet. Presently, the Squadron Leader gets himself behind a Red. The way it accelerates away, he knows it must be Super-Rata.\n*line_break\n\"Right, we've got ourselves a bit of a challenge!\"\n*line_break\nHe sets off in pursuit.\n*line_break\n\"Ok $!{pair}, let's...\n*choice\n\t#Get in close\".\n\t\t*if pair = \"Silva\"\n\t\t\t\"Till we see the whites of his eyes Sir\".\n\t\t\t*line_break\n\t\t\t\"You're learning fast kid\".\n\t\t*if pair = \"Joaquin\"\n\t\t\t\"The way you like it Jose\".\n\t\t\t*line_break\n\t\t\t\"You know me too well Joaquin\".\n\t\t*if pair = \"Rodriguez\"\n\t\t\t\"The usual drill?\"\n\t\t\t*line_break\n\t\t\t\"Indeed Blue Six, and hopefully the usual result\".\t\t\n\t\t*line_break\n\t\tThey stick to the Red's tail, slowly closing the gap. Not even a Super-Rata can outrun a 109. He's very close now, right on his six, he's about to fire when the radio comes on,\n\t\t*line_break\n\t\t*if pair = \"Silva\"\n\t\t\t\"Blue Leader I'm in trouble!\" it's Silva, \"I've lost you and I've got two of them on me!\"\n\t\t*if pair = \"Joaquin\"\n\t\t\t\"Shit, Jose two of them came from nowhere and they're all over me!\"\n\t\t*if pair = \"Rodriguez\"\n\t\t\t\"Oh shit, I've got two all over me, I need assistance!\"\n\t\t*choice\n\t\t\t#Jose helps $!{pair} immediately.\n\t\t\t\tDespite working hard for the kill, De Le Rosa lets the Red go and pulls round, looking for $!{pair}. He spots him quickly, two Ratas are indeed on his tail. The Squadron Leader sweeps up behind them, dispatching the first with such ease that the second gives up the chase and makes a run for it. Seeing this $!{pair} gets on his tail and the tables are turned. He quickly closes the gap and a short burst from the 109's cannons sees off the Red.\n\t\t\t\t*line_break\n\t\t\t\t*if pair = \"Silva\"\n\t\t\t\t\t\"Yes, I got him!\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Nice kill Silva but stay close to me ok?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Yes, sorry Blue Leader\".\n\t\t\t\t*if pair = \"Joaquin\"\n\t\t\t\t\t\"Thanks Jose, not sure what got into me there, I just switched off for a second\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"It's ok, I've got your back, just make sure you've got mine ok?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Affirmative\".\n\t\t\t\t*if pair = \"Rodriguez\"\n\t\t\t\t\t\"Sorry Blue Leader,\" Rodriguez sighs, \"Stupid mistake on my part\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"That's ok, just make sure it doesn't happen again\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Affirmative\".\n\t\t\t\t*goto tail\n\t\t\t#Jose gets his kill first, $!{pair}'s a good enough pilot.\n\t\t\t\tDe La Rosa has worked hard for this kill and he sees it through, lining up the shot and opening fire. His 109's cannons rip the compact Rata to shreds with alarming ease. Next, he looks up for $!{pair}. Where is he?\n\t\t\t\t*temp ishedead\n\t\t\t\t*rand ishedead 0 100\n\t\t\t\t*line_break\n\t\t\t\t*if pair = \"Silva\"\n\t\t\t\t\t*if (ishedead \u003c75)\n\t\t\t\t\t\t\"Silva, where are you? Silva?\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tNo response.\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Silva, this is Blue Leader, please respond Goddamnit!\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tBut he doesn't respond. Silva is gone.\n\t\t\t\t\t\t*set pairdead true\n\t\t\t\t\t*if (ishedead >74)\n\t\t\t\t\t\tHe spots him quickly, two Ratas are indeed on his tail. The Squadron Leader sweeps up behind them, dispatching the first with such ease that the second gives up the chase and makes a run for it. Seeing this $!{pair} gets on his tail and the tables are turned. He quickly closes the gap and a short burst from the 109's cannons sees off the Red.\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Yes, I got him!\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Nice kill Silva but stay close to me ok?\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Yes, sorry Blue Leader\".\n\t\t\t\t*if pair = \"Joaquin\"\n\t\t\t\t\t*if (ishedead \u003c25)\n\t\t\t\t\t\t\"Joaquin, where are you? Joaquin?\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tNo response.\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Blue Four, this is Blue Leader, please respond Goddamnit!\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tBut he doesn't respond. Joaquin is gone.\n\t\t\t\t\t\t*set joqdead true\n\t\t\t\t\t\t*set pairdead true\n\t\t\t\t\t*if (ishedead >24)\n\t\t\t\t\t\tHe spots him quickly, two Ratas are indeed on his tail. The Squadron Leader sweeps up behind them, dispatching the first with such ease that the second gives up the chase and makes a run for it. Seeing this $!{pair} gets on his tail and the tables are turned. He quickly closes the gap and a short burst from the 109's cannons sees off the Red.\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Thanks Jose, not sure what got into me there, I just switched off for a second\".\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"It's ok, I've got your back, just make sure you've got mine ok?\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Affirmative\".\n\t\t\t\t*if pair = \"Rodriguez\"\n\t\t\t\t\t*if (ishedead \u003c50)\n\t\t\t\t\t\t\"Rodriguez, where are you? Rodriguez?\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tNo response.\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Blue Six, this is Blue Leader, please respond Goddamnit!\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tBut he doesn't respond. Rodriguez is gone.\n\t\t\t\t\t\t*set roddead true\n\t\t\t\t\t\t*set pairdead true\t\t\n\t\t\t\t\t*if (ishedead >49)\n\t\t\t\t\t\tHe spots him quickly, two Ratas are indeed on his tail. The Squadron Leader sweeps up behind them, dispatching the first with such ease that the second gives up the chase and makes a run for it. Seeing this $!{pair} gets on his tail and the tables are turned. He quickly closes the gap and a short burst from the 109's cannons sees off the Red.\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Sorry Blue Leader,\" Rodriguez sighs, \"Stupid mistake on my part\".\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"That's ok, just make sure it doesn't happen again\".\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Affirmative\".\n\t\t\t\t*goto tail\n\t#Take it out from distance with the cannons\".\n\t\t*if pair = \"Silva\"\n\t\t\t\"Are you sure Sir, training states we should see the whites in their eyes...\"\n\t\t\t*line_break\n\t\t\t\"Was training done in a 109?\"\n\t\t\t*line_break\n\t\t\t\"Er, no Sir\".\n\t\t\t*line_break\n\t\t\t\"Exactly, now get in line and don't question my orders\".\n\t\t*if pair = \"Joaquin\"\n\t\t\t\"Are you sure Jose?\"\n\t\t\t*line_break\n\t\t\t\"Yes I'm sure Joaquin, and you know better than to question orders\".\n\t\t*if pair = \"Rodriguez\"\n\t\t\t\"Not the usual drill then?\"\n\t\t\t*line_break\n\t\t\t\"Yes Blue Six, I'm mixing it up a bit, got a problem with that?\"\n\t\t\t*line_break\n\t\t\t\"Of course not Sir\".\n\t\t*line_break\n\t\tFrom a reasonable distance, De La Rosa attempts to score a hit with his 20mm cannons. But the cannon shells travel, relatively speaking, far slower than machine gun bullets and the Squadron Leader finds it nigh-on impossible to hit his target. The Red pilot takes evasive action, diving, dodging and weaving, making it even harder for Jose. With all his attention focused forward, he temporarily forgets about checking his tail until the radio comes to life,\n\t\t*line_break\n\t\t*if pair = \"Silva\"\n\t\t\t\t\"Blue Leader I'm in trouble!\" it's Silva, \"I've lost you and I've got two of them on me!\"\n\t\t*if pair = \"Joaquin\"\n\t\t\t\t\"Shit, Jose two of them came from nowhere and they're all over me!\"\n\t\t*if pair = \"Rodriguez\"\n\t\t\t\t\"Oh shit, I've got two all over me, I need assistance!\"\n\t\t*choice\n\t\t\t\t#Jose helps $!{pair} immediately.\n\t\t\t\t\tDespite working hard for the kill, De Le Rosa lets the Red go and pulls round, looking for $!{pair}. He spots him quickly, two Ratas are indeed on his tail. The Squadron Leader sweeps up behind them, dispatching the first with such ease that the second gives up the chase and makes a run for it. Seeing this $!{pair} gets on his tail and the tables are turned. He quickly closes the gap and a short burst from the 109's cannons sees off the Red.\n\t\t\t\t\t*line_break\n\t\t\t\t\t*if pair = \"Silva\"\n\t\t\t\t\t\t\"Yes, I got him!\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Nice kill Silva but stay close to me ok?\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Yes, sorry Blue Leader\".\n\t\t\t\t\t*if pair = \"Joaquin\"\n\t\t\t\t\t\t\"Thanks Jose, not sure what got into me there, I just switched off for a second\".\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"It's ok, I've got your back, just make sure you've got mine ok?\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Affirmative\".\n\t\t\t\t\t*if pair = \"Rodriguez\"\n\t\t\t\t\t\t\"Sorry Blue Leader,\" Rodriguez sighs, \"Stupid mistake on my part\".\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"That's ok, just make sure it doesn't happen again\".\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Affirmative\".\n\t\t\t\t\t*goto tail\n\t\t\t\t#Jose gets his kill first, $!{pair}'s a good enough pilot.\n\t\t\t\t\tDe La Rosa has worked hard for this kill and he isn't willing to give up on it so easily. But after another minute of futile attempts to hit the Rata from range, he is forced to give up when the Red pilot gives him the slip. Next, he looks up for $!{pair}. Where is he?\n\t\t\t\t\t*temp ishedead\n\t\t\t\t\t*rand ishedead 0 100\n\t\t\t\t\t*line_break\n\t\t\t\t\t*if pair = \"Silva\"\n\t\t\t\t\t\t*if (ishedead \u003c75)\n\t\t\t\t\t\t\t\"Silva, where are you? Silva?\"\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\tNo response.\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\"Silva, this is Blue Leader, please respond Goddamnit!\"\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\tBut he doesn't respond. Silva is gone.\n\t\t\t\t\t\t\t*set pairdead true\n\t\t\t\t\t\t*if (ishedead >74)\n\t\t\t\t\t\t\tHe spots him quickly, two Ratas are indeed on his tail. The Squadron Leader sweeps up behind them, dispatching the first with such ease that the second gives up the chase and makes a run for it. Seeing this $!{pair} gets on his tail and the tables are turned. He quickly closes the gap and a short burst from the 109's cannons sees off the Red.\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\"Yes, I got him!\"\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\"Nice kill Silva but stay close to me ok?\"\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\"Yes, sorry Blue Leader\".\n\t\t\t\t\t*if pair = \"Joaquin\"\n\t\t\t\t\t\t*if (ishedead \u003c25)\n\t\t\t\t\t\t\t\"Joaquin, where are you? Joaquin?\"\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\tNo response.\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\"Blue Four, this is Blue Leader, please respond Goddamnit!\"\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\tBut he doesn't respond. Joaquin is gone.\n\t\t\t\t\t\t\t*set joqdead true\n\t\t\t\t\t\t\t*set pairdead true\n\t\t\t\t\t\t*if (ishedead >24)\n\t\t\t\t\t\t\tHe spots him quickly, two Ratas are indeed on his tail. The Squadron Leader sweeps up behind them, dispatching the first with such ease that the second gives up the chase and makes a run for it. Seeing this $!{pair} gets on his tail and the tables are turned. He quickly closes the gap and a short burst from the 109's cannons sees off the Red.\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\"Thanks Jose, not sure what got into me there, I just switched off for a second\".\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\"It's ok, I've got your back, just make sure you've got mine ok?\"\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\"Affirmative\".\n\t\t\t\t\t*if pair = \"Rodriguez\"\n\t\t\t\t\t\t*if (ishedead \u003c50)\n\t\t\t\t\t\t\t\"Rodriguez, where are you? Rodriguez?\"\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\tNo response.\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\"Blue Six, this is Blue Leader, please respond Goddamnit!\"\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\tBut he doesn't respond. Rodriguez is gone.\n\t\t\t\t\t\t\t*set roddead true\n\t\t\t\t\t\t\t*set pairdead true\t\t\n\t\t\t\t\t\t*if (ishedead >49)\n\t\t\t\t\t\t\tHe spots him quickly, two Ratas are indeed on his tail. The Squadron Leader sweeps up behind them, dispatching the first with such ease that the second gives up the chase and makes a run for it. Seeing this $!{pair} gets on his tail and the tables are turned. He quickly closes the gap and a short burst from the 109's cannons sees off the Red.\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\"Sorry Blue Leader,\" Rodriguez sighs, \"Stupid mistake on my part\".\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\"That's ok, just make sure it doesn't happen again\".\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\"Affirmative\".\n\t\t\t\t\t*goto tail\n\t#Work as a team\".\n\t\t*if pair = \"Silva\"\n\t\t\t\"Sorry Sir, but what do you mean by that?\"\n\t\t\t*line_break\n\t\t\t\"I'll keep him busy on his tail here, while you loop round and come up in front of him, that way he's got nowhere to run\".\n\t\t\t*line_break\n\t\t\t\"Ok, I'll try Sir\".\n\t\t\t*line_break\n\t\t\t\"You'll not just try, you'll succeed\".\n\t\t\t*line_break\n\t\t\t\"Ok,\" Silva doesn't sound confident.\n\t\t*if pair = \"Joaquin\"\n\t\t\t\"What were you thinking?\"\n\t\t\t*line_break\n\t\t\t\"I'll keep him busy on his tail here, while you loop round and come up in front of him, that way he's got nowhere to run\".\n\t\t\t*line_break\n\t\t\t\"Oh you are clever Jose\".\n\t\t\t*line_break\n\t\t\t\"And you think I don't know that?\" he laughs.\n\t\t*if pair = \"Rodriguez\"\n\t\t\t\"How exactly?\"\n\t\t\t*line_break\n\t\t\t\"I'll keep him busy on his tail here, while you loop round and come up in front of him, that way he's got nowhere to run\".\n\t\t\t*line_break\n\t\t\t\"Right you are Sir\".\n\t\t*line_break\n\t\t$!{pair} zooms off whilst De La Rosa continues to pester the Rata from behind. \n\t\t*if pair = \"Joaquin\"\n\t\t\tThirty seconds later, Jose spots $!{pair} reappear in front of their target. Constantly looking over his shoulder, the Red pilot hasn't even noticed him. It's all too easy, $!{pair} quickly closes the gap, coming head on, and with a short burst from his cannons, rips the Rata to shreds.\n\t\t\t*line_break\n\t\t\t\"Ha! He didn't see that coming! Your plan worked a treat Jose!\"\n\t\t\t*line_break\n\t\t\t\"What did you expect? It was [i]my[/i] plan, of course it worked!\"\n\t\t*if pair = \"Rodriguez\"\n\t\t\tThirty seconds later, Jose spots $!{pair} reappear in front of their target. Constantly looking over his shoulder, the Red pilot hasn't even noticed him. It's all too easy, $!{pair} quickly closes the gap, coming head on, and with a short burst from his cannons, rips the Rata to shreds.\n\t\t\t*line_break\n\t\t\t\"Haha! Great team kill, I'll give you at least some of the credit Jose!\"\n\t\t\t*line_break\n\t\t\t\"It was [i]my[/i] plan, I think I deserve a bit more than 'some' of the credit!\"\n\t\t*if pair = \"Silva\"\n\t\t\t\tBut to Jose's frustration, Silva doesn't reappear. He gets on the radio,\n\t\t\t\t*line_break\n\t\t\t\t\"Silva, where are you? I can't keep this Red here forever!\"\n\t\t\t\t*line_break\n\t\t\t\t\"Blue Leader I'm in trouble!\" he replies, \"I've lost you and I've got two of them on me!\"\n\t\t\t\t*fake_choice\n\t\t\t\t\t#Jose helps $!{pair} immediately.\n\t\t\t\t\t\tDespite working hard for the kill, De Le Rosa lets the Red go and pulls round, looking for $!{pair}. He spots him quickly, two Ratas are indeed on his tail. The Squadron Leader sweeps up behind them, dispatching the first with such ease that the second gives up the chase and makes a run for it. Seeing this $!{pair} gets on his tail and the tables are turned. He quickly closes the gap and a short burst from the 109's cannons sees off the Red.\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Yes, I got him!\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Nice kill Silva but stay close to me ok?\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Yes, sorry Blue Leader\".\n\t\t\t\t\t#Jose gets his kill first, $!{pair}'s a good enough pilot.\n\t\t\t\t\t\tDe La Rosa has worked hard for this kill and he sees it through, lining up the shot and opening fire. His 109's cannons rip the compact Rata to shreds with alarming ease. Next, he looks up for $!{pair}. Where is he?\n\t\t\t\t\t\t*temp ishedead\n\t\t\t\t\t\t*rand ishedead 0 100\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t*if (ishedead \u003c75)\n\t\t\t\t\t\t\t\"Silva, where are you? Silva?\"\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\tNo response.\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\"Silva, this is Blue Leader, please respond Goddamnit!\"\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\tBut he doesn't respond. Silva is gone.\n\t\t\t\t\t\t\t*set pairdead true\n\t\t\t\t\t\t*if (ishedead >74)\n\t\t\t\t\t\t\tHe spots him quickly, two Ratas are indeed on his tail. The Squadron Leader sweeps up behind them, dispatching the first with such ease that the second gives up the chase and makes a run for it. Seeing this $!{pair} gets on his tail and the tables are turned. He quickly closes the gap and a short burst from the 109's cannons sees off the Red.\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\"Yes, I got him!\"\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\"Nice kill Silva but stay close to me ok?\"\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\"Yes, sorry Blue Leader\".\n\t\t*goto tail\n*label tail\n*page_break\nDe La Rosa racks up another three kills\n*if pairdead = false\n\t, $!{pair} a further two\n, as the 109s zip through the aerial battle. But one of the biggest flaws of the 109 is from the cockpit, you can't really see behind you. And all of a sudden, De La Rosa hears bullets hitting his plane. He immediately swings round to try and see what's happening. On his tail he's got what must be a Super-Rata, its four MGs chattering away.\n*if pairdead = false\n\t$!{pair} seems to have gone walkabouts at exactly the wrong time.\n*if pairdead = true\n\tIt would have been handy to have $!{pair} around now.\nBut no matter, he pushes the 109 as hard as it can go, trying his best to lose the Red, spinning, diving, rolling. But the bastard stays glued to his tail, the pilot clearly a talented one.\nDe La Rosa...\n*choice\n\t#Calls for help.\n\t\t\"This is Blue Leader, I'm in trouble, need assistance\".\n\t\t*line_break\n\t\t*if pairdead = false\n\t\t\t\"It's ok,\" $!{pair} responds, \"I see you, I'm on my way!\"\n\t\t\t*line_break\n\t\t\t\"And where exactly have you been?\"\n\t\t\t*if pair = \"Silva\"\n\t\t\t\t*line_break\n\t\t\t\t\"Er, sorry Sir, I just lost you for a moment\".\n\t\t\t*if pair = \"Joaquin\"\n\t\t\t\t*line_break\n\t\t\t\t\"Sorry Jose, I just saw an easy kill on offer and couldn't resist\".\n\t\t\t*if pair = \"Rodriguez\"\n\t\t\t\t*line_break\n\t\t\t\t\"Sorry Blue Leader, I got caught up chasing a crippled Rata\".\n\t\t\t*line_break\n\t\t\t\"This pairs system is never going to work if we don't stick together!\"\n\t\t\t*line_break\n\t\t\t$!{pair} responds with actions, not words, diving down on the pursuing Super-Rata and dispatching it with consummate ease.\n\t\t\t*line_break\n\t\t\t*if pair = \"Silva\"\n\t\t\t\t\"Got him Sir, sorry about that\".\n\t\t\t\t*line_break\n\t\t\t\t\"You're forgiven Silva\".\n\t\t\t*if pair = \"Joaquin\"\n\t\t\t\t\"There you go Jose, too easy!\"\n\t\t\t\t*line_break\n\t\t\t\t\"Don't get complacent Joaquin\".\n\t\t\t\t*line_break\n\t\t\t\t\"Oh, there's no danger of that with you around!\"\n\t\t\t*if pair = \"Rodriguez\"\n\t\t\t\t\"Hostile destroyed, you're all clear Blue Leader\".\n\t\t\t\t*line_break\n\t\t\t\t\"Thanks for the assist, but don't go wandering off next time Blue Six!\"\n\t\t\t\t*line_break\n\t\t\t\t\"Understood\".\n\t\t\t*goto leader\n\t\t*if pairdead = true\n\t\t\tBut no help is forthcoming. Nobody responds to De La Rosa's appeals. The Red gets close and unleashes a short burst from his machine guns that hits home.\n\t\t\t*if d2 = true\n\t\t\t\tThe effect is devastating on De La Rosa's already damaged Messerschmitt. A crucial flaw in the design is that the fuel tank is located just below the pilot's seat. And it's this flaw that costs the Squadron Leader. The tank sets alight and flames quickly envelop the cockpit. The heat is of an unimaginable intensity. The smoke makes it impossible to breath. He tries desperately to open the hatch to bail out. But the metal lever is so hot he can't get a hold of it, his gloves disintegrating.\n\n\t\t\t\tThis can't be it, surely not? But as his 109 falls out of the sky, De La Rosa realises it almost certainly is.\n\t\t\t\t*if dlrship = true\n\t\t\t\t\t*if ambushdead = true\n\t\t\t\t\t\tAt least he'll get to be with Maria now. That's what he tells himself. It won't all be so bad. Because he'll get to see the woman he loves, the woman who died eight months ago. He'll get to see her again. It's going to be alright.\n\t\t\t\t\t*if ambushdead = false\n\t\t\t\t\t\tHe thinks about Maria. She hasn't been seen since the Reds took Camposines. Is she dead? He didn't know, but De La Rosa begins to hope she is. Because that means he'll be with her very shortly. He's going to see her again. It's going to be alright.\n\t\t\t\t*if dlrship = false\n\t\t\t\t\t*if gabdead = true\n\t\t\t\t\t\tAt least he'll get to be with Gabrielle now. That's what he tells himself. It won't all be so bad. Because he'll get to see the woman he loves, the woman who died eight months ago. \n\t\t\t\t\t\t*if vidrship = false\n\t\t\t\t\t\t\t*if abortion = false\n\t\t\t\t\t\t\t\tAnd not forgetting baby $!{baby}. Poor little $!{baby}. He'll get to see his child for the very first time. That'll be special.\n\t\t\t\t\t\tHe'll get to see her again. It's going to be alright.\n\t\t\t\t\t*if gabdead = false\n\t\t\t\t\t\tBut what about Gabrielle? He can't die, he mustn't. But he is about to. And he's never going to see the woman he loves ever again.\n\t\t\t\t\t\t*if vidrship = false\n\t\t\t\t\t\t\t*if abortion = false\n\t\t\t\t\t\t\t\tAnd not forgetting baby $!{baby}. Poor little $!{baby}. $!{baby} is going to grow up an orphan. It's not fair.\n\t\t\t\t\t\tWhy was he so stupid? Why has he let himself get killed when he had so much to live for? But there's nothing he can do about it now.\n\t\t\t\t*set dlrdead true\n\t\t\t\t*goto alba\n\t\t\t*if d1 = true\n\t\t\t\t*set d1 false\n\t\t\t\t*set d2 true\n\t\t\t\tOne of the bullets must have hit the engine because he notices immediately his 109 has lost about 20% power. But before the Red can do anymore damage, fate intervenes. A stricken Fiat, spinning out of control slams into the side of the Super-Rata, taking it well and truly out of the fight.\n\t\t\t\t*goto leader\n\t\t\t*if d1 = false\n\t\t\t\t*set d1 true\n\t\t\t\tFortunately the damage isn't too serious but he does notice the 109 is not handling so smoothly. Before the Red can do anymore damage, fate intervenes. A stricken Fiat, spinning out of control slams into the side of the Super-Rata, taking it well and truly out of the fight.\n\t\t\t\t*goto leader\n\t\t*goto leader\n\t#Flies into the middle of the melee.\n\t\tDe La Rosa leads the Super-Rata right into the thick of the action with fighters, hostile and friendly, flying in every direction. With skill, and some considerable luck, he manages to dodge and weave his way through the chaos. The Red pilot is not so lucky; a stricken Fiat, spinning out of control slams into the side of the Super-Rata, taking it well and truly out of the fight.\n\t\t*goto leader\n\t#Flies to the edge of the melee.\n\t\tDe La Rosa leads the Super-Rata out of the thick of the action so he can fight him on equal terms. But he's at an immediate disadvantage given that the Red is behind him. The Red gets close and unleashes a short burst from his machine guns that hits home.\n\t\t*if d2 = true\n\t\t\t\tThe effect is devastating on De La Rosa's already damaged Messerschmitt. A crucial flaw in the design is that the fuel tank is located just below the pilot's seat. And it's this flaw that costs the Squadron Leader. The tank sets alight and flames quickly envelop the cockpit. The heat is of an unimaginable intensity. The smoke makes it impossible to breath. He tries desperately to open the hatch to bail out. But the metal lever is so hot he can't get a hold of it, his gloves disintegrating.\n\n\t\t\t\tThis can't be it, surely not? But as his 109 falls out of the sky, De La Rosa realises it almost certainly is.\n\t\t\t\t*if dlrship = true\n\t\t\t\t\t*if ambushdead = true\n\t\t\t\t\t\tAt least he'll get to be with Maria now. That's what he tells himself. It won't all be so bad. Because he'll get to see the woman he loves, the woman who died eight months ago. He'll get to see her again. It's going to be alright.\n\t\t\t\t\t*if ambushdead = false\n\t\t\t\t\t\tHe thinks about Maria. She hasn't been seen since the Reds took Camposines. Is she dead? He didn't know, but De La Rosa begins to hope she is. Because that means he'll be with her very shortly. He's going to see her again. It's going to be alright.\n\t\t\t\t*if dlrship = false\n\t\t\t\t\t*if gabdead = true\n\t\t\t\t\t\tAt least he'll get to be with Gabrielle now. That's what he tells himself. It won't all be so bad. Because he'll get to see the woman he loves, the woman who died eight months ago. \n\t\t\t\t\t\t*if vidrship = false\n\t\t\t\t\t\t\t*if abortion = false\n\t\t\t\t\t\t\t\tAnd not forgetting baby $!{baby}. Poor little $!{baby}. He'll get to see his child for the very first time. That'll be special.\n\t\t\t\t\t\tHe'll get to see her again. It's going to be alright.\n\t\t\t\t\t*if gabdead = false\n\t\t\t\t\t\tBut what about Gabrielle? He can't die, he mustn't. But he is about to. And he's never going to see the woman he loves ever again.\n\t\t\t\t\t\t*if vidrship = false\n\t\t\t\t\t\t\t*if abortion = false\n\t\t\t\t\t\t\t\tAnd not forgetting baby $!{baby}. Poor little $!{baby}. $!{baby} is going to grow up an orphan. It's not fair.\n\t\t\t\t\t\tWhy was he so stupid? Why has he let himself get killed when he had so much to live for? But there's nothing he can do about it now.\n\t\t\t\t*set dlrdead true\n\t\t\t\t*goto alba\n\t\t*if d1 = true\n\t\t\t\t*set d1 false\n\t\t\t\t*set d2 true\n\t\t\t\tOne of the bullets must have hit the engine because he notices immediately his 109 has lost about 20% power. But before the Red can do anymore damage, fate intervenes. A stricken Fiat, spinning out of control slams into the side of the Super-Rata, taking it well and truly out of the fight.\n\t\t\t\t*goto leader\n\t\t*if d1 = false\n\t\t\t\t*set d1 true\n\t\t\t\tFortunately the damage isn't too serious but he does notice the 109 is not handling so smoothly. Before the Red can do anymore damage, fate intervenes. A stricken Fiat, spinning out of control slams into the side of the Super-Rata, taking it well and truly out of the fight.\n\t\t\t\t*goto leader\n\t\t*goto leader\n\t\t\n*label leader\n*page_break\nDe La Rosa has an idea. He switches his radio to the Republican channel and listens. \n*line_break\n\"This is Red Leader calling all Red units, heads up, we've got a squadron of hostile Fiats coming in from the South-East\".\n*line_break\n\"Roger that Red Leader, moving to intercept\".\n*if vasdead = false\n\t*line_break\n\tDe La Rosa recognises that voice instantly even though he hasn't heard it for over two years. It's the one and only man who has ever outfoxed him. It's Vasquez. Vasquez is Red Leader. He...\n\t*choice\n\t\t#Challenges Vasquez to a one on one dogfight.\n\t\t\t\"Vasquez,\" De La Rosa calls out, \"I know you can hear me, this is Squadron Leader Jose De La Rosa of the Aviacion Nacional\".\n\t\t\t*line_break\n\t\t\t\"Oh, De La Rosa, what a pleasant surprise. It's been too long\".\n\t\t\t*line_break\n\t\t\t\"Enough with the jokes, fight me Vasquez, one on one!\"\n\t\t\t*line_break\n\t\t\tVasquez laughs,\n\t\t\t*line_break\n\t\t\t\"Are you serious Jose? You do know you're making a fool of yourself in front of the whole Republican Air Force? This isn't the Middle Ages, we're not chivalric knights. So no, I'm not going to joust with you...\"\n\t\t\t*line_break\n\t\t\t\"Don't mock me Vasquez, you Red...\"\n\t\t\t*line_break\n\t\t\t\"Excuse me, you didn't allow me to finish, I said I won't joust with you, but that doesn't mean I wouldn't shoot you out of the sky!\"\n\t\t\t*line_break\n\t\t\t\"What do you...\" De La Rosa answers his own question as he sees a Super-Rata hurtling towards him. Before he can react, its four machine guns are firing and De La Rosa's 109 is riddled with bullets. The effect is devastating on De La Rosa's already damaged Messerschmitt. A crucial flaw in the design is that the f
