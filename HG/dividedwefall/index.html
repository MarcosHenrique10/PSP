<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Divided We Fall — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>

        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

eally do\".\n\t\t\t\t*line_break\n\t\t\t\tDe La Rosa leaves them struggling on in the snow and the cold.\n*page_break\nOnce back inside, the Wing Commander takes off his overcoat, twice as heavy as usual thanks to a coating of snow. He removes his leather gloves and blows on his hands to try and warm them up.\n*if (joqdead = true)\n\t*line_break\n\t\"Cold out there is it?\" Rodriguez asks.\n\t*line_break\n\t\"What do you think?\"\n\t*line_break\n\t\"Oh, I don't know,\" Rodriguez laughs, \"I thought it was rather brightening up a bit!\"\n\t*line_break\n\t\"Very funny\".\n\t*line_break\n\t\"Alright, alright, sorry, but seriously, no chance of us getting up today?\"\n\t*line_break\n\t*if outside = true\n\t\t\"Not yet, but I've left the boys out there to try and get her started\".\n\t\t*line_break\n\t\tRodriguez looks confused, \"You left them out there? Even if they got it started the runway's covered in foot deep snow, we'd not be able to take off!\"\n\t\t*line_break\n\t\t\"So what do you suggest Rodriguez?\" Jose responds angrily, \"Are we really just supposed to sit around and wait for something to happen, wait for the Reds to take Teruel?\"\n\t\t*line_break\n\t\t\"Unfortunately, that's all we can do right now. We can't control the weather\".\n\t\t*line_break\n\t\t\"You're right but I can't stand it. This is torture. Give me a rifle and I'd go to the frontlines like that\".\n\t\t*line_break\n\t\tRodriguez laughs, \"I'd like to see that. You wouldn't last two minutes on the ground!\"\n\t*if outside = false\n\t\t\"No, I think today is going to be another right off. I let the crew have a break, there's little point in leaving them out there\".\n\t\t*line_break\n\t\tRodriguez nods, \"Exactly. Even if they got it started the runway's covered in foot deep snow, we'd not be able to take off!\"\n\t\t*line_break\n\t\t\"So what are we supposed to do Rodriguez?\" Jose responds, frustrated, \"Are we really just supposed to sit around and wait for something to happen, wait for t right but I can't stand it. This is torture. Give me a rifle and I'd go to the frontlines like that\".\n\t\t*line_break\n\t\tJoaquin laughs, \"Now that would be a waste of your talent\".\n*line_break\nFed up with the conversation (they hadn't had much to do but chat in recent days) he leaves for his own quarters.\n*page_break\nHis sits down on his bed and lights a cigarette before pulling out his wallet.\n*if dlrship = true\n\tFrom it, he takes out a photograph of Maria and the latest letter she has sent. The corners of the photograph are crumbled. He's had it for most of the ten months he's known her. Despite the creases and the fading, it is undoubtedly his most treasured possession. When she had written to say she was being transferred to the Teruel front, his heart had leapt. It would only be a few days before she arrived. Pilots enjoyed a relatively relaxed lifestyle compared to ordinary soldiers. They were an elite. So he hoped regular visits would be a possibility.\n*if dlrship = false\n\tFrom it, he takes out a photograph of Gabrielle and the latest letter she has sent. The corners of the photograph are crumbled. He's had it for most of the ten months he's known her. Despite the creases and the fading, it is undoubtedly his most treasured possession. \n\t*if vidrship = false\n\t\t*if abortion = false\n\t\t\t*achieve father\n\t\t\tThen there's the photograph of the child. He wished he could have been there when baby...\n\t\t\t*fake_choice\n\t\t\t\t#Abigail\n\t\t\t\t\t*set baby \"Abigail\"\n\t\t\t\t#Felip\n\t\t\t\t\t*set baby \"Felip\"\n\t\t\t\t#Jose\n\t\t\t\t\t*set baby \"Jose\"\n\t\t\t\t#Clara\n\t\t\t\t\t*set baby \"Clara\"\n\t\t\t...was born. Gabrielle has written that she is to visit for Christmas. She's going to stay with the three-week old child at a hospital not far away which Maria is being transferred to.\t\nHe puts the letter to one side and picks up a newspaper, ABC, and flicks through absent-mindedly. His eye is caught by an article about a day in the life of an average fighter pilot:\n*line_break\n\"8.30 Breakfast with family\n*line_break\n9.30 Take-off for the front\n*line_break\n11.00 Return, round of golf \n*line_break\n12.30 Sunbathing on the beach, quick dip in the Sea\n*line_break\n13.30 Shellfish and beer along with a friendly chat in the cafe\n*line_break\n14.00 Lunch at home\n*line_break\n15.00 Short Siesta\n*line_break\n16.00 Another sortie to the Front\n*line_break\n18.30 Cinema\n*line_break\n21.00 Scotch at the bar, animated atmosphere\n*line_break\n22.15 Dinner at local restaurant, war songs, camaraderie, enthusiasm\"\n\nDe La Rosa smirks, the article is...\n*fake_choice\n\t#Largely accurate.\n\t\tThey really do have things much better than most. With so much time on his hands, he's sure he'll be able to visit his beloved whenever he wishes.\n\t#An exaggeration.\n\t\tHe's never got to sunbathe, although he sure he wouldn't like to in this weather. They've forgotten about the briefings, debriefings, overseeing the maintenance of his aircraft and much else but it is true they have a lot of time on their hands.  He's sure he'll be able to visit his beloved whenever he wishes.\n\t#Preposterous.\n\t\tThis article is ridiculous and insulting. What about the briefings, debriefings, overseeing the maintenance of his aircraft, keeping his uniform pristine, reconnaissance... He could go on. Even so he thinks he might just be able to find time to visit his beloved when she arrives.\n\nHe decides to write a letter to her. That would be a good use of his time. He gets out a pen and some paper and sits at his desk, filling the pen in the ink well. Now, it's always tricky to decide how to start.... He goes for:\n*fake_choice\n\t#To my Dearest $!{girl}.\n\t#To my beloved $!{girl}.\n\t#Dear $!{girl}.\nThat's a nice start. He writes...\n*fake_choice\n\t#Every moment without you is torture.\n\t#I hope you're keeping well.\n\t#I cannot express my love for you in mere words.\nHe decides to write a paragraph on how he has been doing. He has been...\n*fake_choice\n\t#Perfectly well, in good health.\n\t#Enjoying my work immeasurably.\n\t#A little on the cold side.\nHe asks how she is,\n*if dlrship = false\n\t*if vidrship = false\n\t\t*if abortion = false\n\t\t\thow the baby is of course,\n*if dlrship = true\n\thow Gabrielle is,\nand what things are like where she is. Right, he's done all the essentials, now he's got a bit of freedom. He writes about...\n*fake_choice\n\t#The state of the war.\n\t\tThis Red offensive is merely buying time, he writes, it will not be long before we have driven them back yet further. Surely the war will be won next year.\n\t\t*set war true\n\t\t*set blue false \n\t#The latest films.\n\t\tI recently saw an old film, the name escapes me, at the local cinema (we fortunately have time for that sort of thing!), it was a classic, with Katherine Hepburn, you really must see it some time.\n\t\t*set film true\n\t\t*set blue false \n\t#Something blue.\n\t\tThat really is quite filthy, he hopes the censors don't happen to open this letter.\nLast but not least, he signs off with...\n*fake_choice\n\t#All my love and affection, Jose x\n\t#Viva Franco, Jose x\n\t\t*set franc true\n\t#God be with you, Jose x\nDe La Rosa folds the letter, slots it into an envelope, affixes a stamp and heads for the letterbox. That of course means going outside again. He puts his coat back on and braces himself.\n*label alba\n*if (albadead = true)\n\t*goto maria\n*page_break\n8.44 A.M.\n*line_break\n23rd December 1937\n*line_break\nBehind Nationalist lines, 15 KM W of Teruel\n*line_break\nGuerrillera Alba Reyes\n*set militia -6\n\n\"I'm just saying, I don't think we should trust him!\" hisses Salazar.\n*line_break\n\"And why would that be?\" replies $!{friend}, \"What's the worst that can happen?\"\n*line_break\n\"They could be trying to kill us!\"\n*line_break\nAlba laughs, \"So you think we can all be taken by a couple of ingleses? Please, there's ${militia} of us. If they even put a foot out of line they'll be dead\".\n\nThey are lying, stomachs down in the snow, on the edge of a forest. They're waiting for a rendezvous with a pair of International Brigade guerrilla operatives.\n*line_break\n\"Why do we even need their help?\" Salazar asks, \"We were doing fine on our own\".\n*line_break\n\"We've been through this already,\" Alba is impatient and very cold, \"They have weapons and supplies. And food\".\n*page_break\nOut of the corner of her eye she spots movement. Just a flash of dark, and then it is gone. \n*line_break\n\"Ssshhh, I think I saw something\".\n*line_break\nTwo figures in long great coats are moving from tree to tree, getting closer and closer. \n*line_break\n\"Is it them?\" $!{friend} asks.\n*line_break\n\"I hope so,\" Alba replies.\n*line_break\nThey're within 100 metres now, the militia's rifles are trained on them. Then comes the call,\n*line_break\n\"Azana!\"\n*line_break\n\"What? What are they on about?\" asks Salazar.\n*line_break\n\"That's the password, so we know it's them. Azana!\" she calls back.\n*line_break\n\"And how do we know they haven't been captured, interrogated and given up the password to the fascists. How do we know these aren't a pair of...\" Salazar stops because they're here now.\n*line_break\n\"Lieutenant William Aalto, and this is Sergeant Irving Goff. But he prefers Irv\".\n*line_break\n\"Still think they're fascists Salazar?\" $!{friend} jokes. The first one, William, is a young man in his early twenties with high cheekbones and chiselled features. Irv is a bit older, mid-thirties with a rounder face. They speak in heavily accented Spanish.\n*line_break\nAlba decides to be...\n*fake_choice\n\t#Friendly.\n\t\t\"Greetings ingleses,\" she says, getting to her feet, \"I am Alba Reyes and these are my guerrillero\".\n\t\t*line_break\n\t\t\"It's a pleasure, although we aren't English, we're American,\" Aalto corrects.\n\t\t*line_break\n\t\t\"Oh, sorry,\" Alba tries to pretend she isn't embarrassed, \"Anyway, we should move, standing around isn't good for your health in this weather\".\n\t\t*line_break\n\t\t\"Agreed!\"\n\t#Careful.\n\t\t*set know true\n\t\t\"Greetings ingleses,\" she says getting to her feet, \"Would you kindly put down your weapons and packs so we can search them\".\n\t\t*line_break\n\t\t\"Is that really necessary? And we're American not English\".\n\t\t*line_break\n\t\t\"Please just drop it and don't get cheeky with me, from now on I'm in charge, that fancy officer's uniform means nothing out here\".\n\t\t*line_break\n\t\t\"Ok, ok, just stop pointing the gun at us\".\n\t\t*line_break\n\t\t\"I'm keeping it where it is until I decide it's safe,\" and then, \"$!{friend}, search them would you?\"\n\t\t*line_break\n\t\t$!{friend} looks through their equipment, \n\t\t*line_break\n\t\t\"They've got a machine gun, ammunition, a whole lot of food and fire fuel, grenades, explosives and... well, what have we here... Nationalist uniforms...\"\n\t\t*line_break\n\t\t\"What are those for?\" Alba demands, eyes narrowing. \n\t\t*line_break\n\t\tThe two men look at each other, Aalto answers, \"You never know when they might come in useful\".\n\t\t*line_break\n\t\t\"We aren't with the fascists,\" Goff assures them, \"Look,\" he says, going into his pocket (causing everyone to raise their weapons), \"I can show you our Communist Party memberships\".\n\t\t*line_break\n\t\t\"Not fucking communists,\" Salazar moans.\n\t\t*line_break\n\t\tAlba takes the papers and examines them. They seem genuine enough. She turns to Salazar,\n\t\t*line_break\n\t\t\"We're just going to have to get along Salazar, no point in fighting out here, that's what we tried to get away from,\" and then, to the Americans, \"Right, come with us\".\n\t#Suspicious.\n\t\t*set know true\n\t\t\"Drop your weapons ingleses,\" she says getting to her feet, \"And put your hands on your heads\".\n\t\t*line_break\n\t\t\"Is that really necessary? And we're American not English\".\n\t\t*line_break\n\t\t\"Just drop it and don't get cheeky with me, from now on I'm in charge, that fancy officer's uniform means nothing out here\".\n\t\t*line_break\n\t\t\"Ok, ok, just stop pointing the gun at us\".\n\t\t*line_break\n\t\t\"I'm keeping it where it is until I decide it's safe,\" and then, \"$!{friend}, search them would you?\"\n\t\t*line_break\n\t\t$!{friend} looks through their equipment, \n\t\t*line_break\n\t\t\"They've got a machine gun, ammunition, a whole lot of food and fire fuel, grenades, explosives and... well, what have we here... Nationalist uniforms...\"\n\t\t*line_break\n\t\t\"What are those for?\" Alba demands, eyes narrowing. \n\t\t*line_break\n\t\tThe two men look at each other, Aalto answers, \"You never know when they might come in useful\".\n\t\t*line_break\n\t\t\"We aren't with the fascists,\" Goff assures them, \"Look,\" he says, going into his pocket (causing everyone to raise their weapons), \"I can show you our Communist Party memberships\".\n\t\t*line_break\n\t\t\"Not fucking communists,\" Salazar moans.\n\t\t*line_break\n\t\tAlba takes the papers and examines them. They seem genuine enough. She turns to Salazar,\n\t\t*line_break\n\t\t\"We're just going to have to get along Salazar, no point in fighting out here, that's what we tried to get away from,\" and then, to the Americans, \"Right, come with us\".\n*page_break\nThey warm up around a camp fire whilst Goff explains the mission they've been assigned,\n*line_break\n\"We're to hit a, a...\" he struggles for the word and asks Aalto in English, \"Convoy, yes that's the word. We're to attack fascist convoys moving to the front. Our forces are trying to take Teruel and it's vital that we limit the amount of reinforcements Franco can bring up\".\n*line_break\n\"Exactly,\" Aalto picks up the narrative, \"There's a main road a couple of kilometres North of here, do you know it?\"\n*line_break\n\"Yes, the fascists use it all the time,\" Alba replies.\n*line_break\n\"Perfect, that's where we'll hit them\".\n*line_break\n\"Hang on a second, why are we going to risk our lives with an attack like that?\" Salazar asks.\n*line_break\nAlba replies...\n*fake_choice\n\t#\"Because we're fighting a war, risking our lives is what we do\".\n\t\t\"So if that's not for you Salazar, you can go home. I thought you would have got over your cowardly streak by now!\"\n\t\t*line_break\n\t\t\"Well excuse me for not wanting to die\".\n\t\t*line_break\n\t\t\"Don't listen to him,\" Alba tells the Americans, \"We're in\".\n\t#\"Because we're getting something in return\".\n\t\t\"I'm right aren't I,\" see asks Aalto, \"Those supplies are for us? And the machine gun?\"\n\t\t*line_break\n\t\t\"Yes, we'll certainly be able to provide you with some equipment. But also think about the loot you'll get from the convoy. It'll keep you going for weeks\".\n\t\t*line_break\n\t\t\"We're in\".\n*page_break\nThey make their way through the forest, struggling through the snow. \n*line_break\n\"So you're communists are you?\" Alba asks.\n*line_break\n\"Yes,\" replies Goff, \"Why, is that a problem round here?\"\n*line_break\n\"We were with the CNT\".\n*line_break\n\"Oh, I see\".\n*line_break\n\"We came out here to get away from all that. All the infighting. It's simpler here. Just us and the fascists. And no politics\".\n*line_break\n\"It's not so bad now you know,\" Aalto interjects, \"The CNT have been reconciled, it shouldn't be too long before they're back in the government. The POUM were the guilty ones, they were helping the fascists. They paid the price\". \n*line_break\nAlba isn't sure she believes that but she can't dwell on it too long as $!{friend}, who's in the lead, puts up their hand. Everyone throws themselves to the ground. Alba crawls through the snow up to $!{friend},\n*line_break\n\"What is it?\"\n*line_break\n\"There look, mounted patrol\".\n*line_break\n\"I see them\".\n*line_break\nA few hundred metres ahead, a troop of about a dozen horse-mounted cavalrymen is moving through the woods. They haven't spotted the guerrillas.  \n*fake_choice\n\t#\"We let them pass\".\n\t\t\"Everyone stay low, we let them go. This isn't our fight\".\n\t\t*line_break\n\t\tEveryone does except Goff, who takes issue with the order, \n\t\t*line_break\n\t\t\"Are you kidding? We don't want any fascists for miles around when we hit the convoy. Otherwise we risk being hit in the arse!\"\n\t\t*line_break\n\t\tIs he just trying to undermine Alba? She considers what he has said before...\n\t\t*choice\n\t\t\t#Sticking to her guns.\n\t\t\t\t\"Hey, this is my call. Your rank means nothing behind the lines. I'm not going to risk my men on an unnecessary attack\".\n\t\t\t\t*line_break\n\t\t\t\t\"It'll be your funeral...\"\n\t\t\t\t*line_break\n\t\t\t\tThey wait and watch the patrol slowly move out of view.\n\t\t\t\t*set cav true\n\t\t\t\t*goto albanext\n\t\t\t#Deciding to launch an ambush.\n\t\t\t\t*goto ambush\n\t\t\t#Deciding to take them out silently\n\t\t\t\t*goto silent\n\t#\"We ambush them\".\n\t\t*label ambush\n\t\t\"Right, take up positions to the left and right. On my signal, open fire, but not before. I want this to be quick and clean, no survivors\".\n\t\t*line_break\n\t\tThey get into position. Alba holds up her hand, makes sure everyone can see and then drops it. They open fire. The Americans use the machine gun. Alba fires taking out one of the cavalrymen, then another. It's all over in a matter of moments. Horses and soldiers litter the area. The snow is stained red. Alba sees a horse galloping away through the trees. Is there a soldier on it? She doesn't take any risks. She aims, steadies herself, exhales slowly and squeezes the trigger gently. The horse goes down. There was a soldier on it.\n\t\t*page_break\n\t\tThey strip weapons and ammo from the fallen fascists and as well as meat from the horses. Alba goes over to the horse she shot down. The rider is still alive. His leg is trapped by the fallen beast, probably broken. Upon seeing Alba he desperately tries to get his submachine gun. But it's just out of reach. \n\t\t*line_break\n\t\t\"Please, please don't,\" he begs, Alba picks up the automatic weapon, a German MP28, \"No, don't, I, I have a family!\"\n\t\t*if albabrutal >49\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Well what do you think I should do? You won't last an hour out here with your leg in that state\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"But, you could take me with you...\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tAlba smiles, \"No, I don't think so. We barely have enough medical supplies for ourselves. And what would happen when you're fit? Do you really think we could just let you go, so you can tell all your friends where we're hiding?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tThe soldier's eyes are welling up. He doesn't say anything but nods pathetically. Alba pulls back the bolt on the submachine gun, making a satisfying click-clunk.\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"So you see,\" she realises she's shaking slightly, \"I really have no choice\".\n\t\t\t\t\t*line_break\n\t\t\t\t\tShe pulls the trigger.\n\t\t*if albabrutal \u003c50\n\t\t\t\t\t*line_break\n\t\t\t\t\tAlba doesn't even think about it. She pulls back the bolt on the submachine gun, making a satisfying click-clunk. Then she shoots him in cold blood.\n\t#\"We take them out silently\".\n\t\t*label silent\n\t\t\"Alright, bayonets out, firing could bring down half the Nationalist army on us. We get as close as we can and then we take them, quick and clean, no survivors\".\n\t\t*line_break\n\t\t\"I don't think that's a good idea,\" Aalto interjects, \"There's no way we'll take them all out without being spotted. Then we'll be badly exposed. A hand to hand fight isn't what we want right now\".\n\t\t*line_break\n\t\tIs he just trying to undermine Alba? She considers what he has said before...\n\t\t*choice\n\t\t\t#Sticking to her guns.\n\t\t\t\t\"Hey, this is my call. Your rank means nothing behind the lines. We do it our way. Quietly\".\n\t\t\t\t*line_break\n\t\t\t\t\"It'll be your funeral...\"\n\t\t\t\t*line_break\n\t\t\t\t*set militia -4\n\t\t\t\tThey creep forward, the crunch of the snow under their feet painfully load. The patrol halt and dismount. The guerrillas get as close as they dare. Alba, concealed behind a tree, calms herself. A soldier is standing just a few metres in front of the tree, lighting a cigarette. She closes her eyes and goes through what she is going to do. She tightens her grip on the bayonet. \n\t\t\t\t*page_break\n\t\t\t\tThen she goes, slipping out from behind the tree, taking a couple of steps forward and then with one hand covering the soldier's mouth and the other slitting his throat from behind. The bayonet severs his neck with ease and she sees the snow below them turn red.\n\t\t\t\t*line_break\n\t\t\t\t\"Partisans!\" comes the shout and then the firing begins. Half the guerrillas are caught in no man's land, neither in cover, nor yet within striking distance of their foes. And they have the added disadvantage of not having their firearms drawn. In the first few seconds one, two, three, four go down. Alba gets herself behind the tree, bullets hitting the snow around her.\n\t\t\t\t*line_break\n\t\t\t\t\"I told you didn't I?\" Aalto shouts.\n\t\t\t\t*line_break\n\t\t\t\t\"Not the fucking time!\"\n\t\t\t\t*line_break\n\t\t\t\tAlba fires taking out one of the cavalrymen, then another. It's all over in a matter of moments. Horses and soldiers litter the area. The snow is stained red. Alba sees a horse galloping away through the trees. Is there a soldier on it? She doesn't take any risks. She aims, steadies herself, exhales slowly and squeezes the trigger gently. The horse goes down. There was a soldier on it.\n\t\t\t\t*page_break\n\t\t\t\tThey strip weapons and ammo from the fallen fascists and as well as meat from the horses. Alba goes over to the horse she shot down. The rider is still alive. His leg is trapped by the fallen beast, probably broken. Upon seeing Alba he desperately tries to get his submachine gun. But it's just out of reach. \n\t\t\t\t*line_break\n\t\t\t\t\"Please, please don't,\" he begs, Alba picks up the automatic weapon, a German MP28, \"No, don't, I, I have a family!\"\n\t\t\t\t*if albabrutal >49\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Well what do you think I should do? You won't last an hour out here with your leg in that state\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"But, you could take me with you...\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tAlba smiles, \"No, I don't think so. We barely have enough medical supplies for ourselves. And what would happen when you're fit? Do you really think we could just let you go, so you can tell all your friends where we're hiding?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tThe soldier's eyes are welling up. He doesn't say anything but nods pathetically. Alba pulls back the bolt on the submachine gun, making a satisfying click-clunk.\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"So you see,\" she realises she's shaking slightly, \"I really have no choice\".\n\t\t\t\t\t*line_break\n\t\t\t\t\tShe pulls the trigger.\n\t\t\t\t*if albabrutal \u003c50\n\t\t\t\t\t*line_break\n\t\t\t\t\tAlba doesn't even think about it. She pulls back the bolt on the submachine gun, making a satisfying click-clunk. Then she shoots him in cold blood.\n\t\t\t\t*goto albanext\n\t\t\t#Deciding to launch an ambush.\n\t\t\t\t*goto ambush\n*label albanext\n*page_break\n\"Ok, let's keep moving\".\n*line_break\nThey push on through the forest to the edge of the road. \n*line_break\n\"Right, anyone got any ideas?\" Salazar asks.\n*line_break\n\"We wait for a convoy to come past, obviously,\" $!{friend} replies.\n*line_break\n\"Really $!{friend}? But what about when it does come past, have we got a plan other than just shoot at anything that passes?\"\n*line_break\nAlba looks to the Americans,\n*line_break\n\"Isn't this your area?\"\n*line_break\n\"Well, we've got several options,\" Aalto ponders, \"The simplest would be just to lay explosives on the edge of the road\".\n*line_break\n\"There's a bridge near here isn't there?\" Goff asks.\n*line_break\nAlba nods, \"About two kilometres up the road\".\n*line_break\n\"Well we could blow the bridge. Tricky but very effective. We'd cut this road for days\".\n*line_break\n\"One last option,\" Aalto adds,\n*if know = false\n\t\"We've got Nationalist uniforms in our packs. Dress a couple of your men as fascists and set up a fake checkpoint. That way we get the convoy to stop without firing a shot and do with it what we wish\".\n\t*line_break\n\t\"Hey,\" Salazar interjects, \"Why two of us, why not you two?\"\n\t*line_break\n\t\"They'd know we aren't Spanish. From our accents\".\n*if know = true\n\t\"Those Nationalist uniforms we've got. Dress a couple of your men as fascists and set up a fake checkpoint. That way we get the convoy to stop without firing a shot and do with it what we wish\".\n\t*line_break\n\t\"Hey,\" Salazar interjects, \"Why two of us, why not you two?\"\n\t*line_break\n\t\"They'd know we aren't Spanish. From our accents\".\n*line_break\nAlba must make a decision.\n*fake_choice\n\t#Blow the bridge.\n\t\t\"Right, we'll go for the bridge. Everyone get your kit and let's move. We won't get another shot at this\".\n\t\t*line_break\n\t\tThey get going. Snow has just begun to fall lightly.\n\t\t*set bridge true\n\t#Lay explosives on the road.\n\t\t\"Ok, let's set up explosive charges on the road. We'll place them to try and take out the first and last lorries so they're trapped\".\n\t\t*line_break\n\t\tThey get to work. Snow has just begun to fall lightly.\n\t\t*set road true\n\t#Set up a fake checkpoint.\n\t\t\"Ok Salazar, get that uniform on, you better brush up on your acting!\"\n\t\t*line_break\n\t\t\"Me?! Are you kidding?\"\n\t\t*line_break\n\t\tShe isn't. They get to work preparing the ambush. Snow has just begun to fall lightly.\n\t\t*set check true\n*label maria\n*page_break\n*image number10.png\n9.32 A.M.\n*line_break\n23rd December 1937\n*line_break\nBehind Nationalist lines, 18 KM W of Teruel\n*line_break\nSister Maria Farfan\n\nThe trucks rattle past a rather sorry group of soldiers shivering in the cold. It's not much warmer in the military truck, only protected from the elements by thin canvass and completely open at the back. Maria shivers. \n*if vidrship = false\n\t*if dlrship = false\n\t\t*if abortion = false\n\t\t\tGabrielle is sitting opposite her. She's more entertained by her young baby than talking to Maria, which makes Maria question why she's even bothered visiting.\n\t\t\t*line_break\n\t\t\t\"Yes $!{baby}, yes you are! Yes you are the cutest thing in the world!\"\n\t\t\t*if marregret = true\n\t\t\t\t*line_break\n\t\t\t\tIt could have been her cradling $!{man}'s child Maria thinks to herself. Then again, that's not actually $!{man}'s child.\n\t\t\t*line_break\n\t\t\t\"You haven't told him I suppose?\" asks Maria tentatively.\n\t\t\t*line_break\n\t\t\tGabrielle looks slightly confused, \"Told him what?\"\n\t\t\t*line_break\n\t\t\tMaria leans closer and lowers her voice, \"About the baby I mean. About whose it is\".\n\t\t\t*line_break\n\t\t\t\"Oh God no. Don't even mention that, you can't tell anyone, least of all him!\"\n\t\t\t*goto reading\n\t\t*if abortion = true\n\t\t\tGabrielle is sitting opposite her, looking wistfully into the middle distance.\n\t\t\t*line_break\n\t\t\t\"What are you thinking\" Maria asks her.\n\t\t\t*line_break\n\t\t\t\"Well, and this is going to sound rather silly...\"\n\t\t\t*line_break\n\t\t\tMaria notices Gabrielle has a tear in her eye, \"It's just, sometimes I wish I'd never had the [i]procedure[/i]\".\n\t\t\t*line_break\n\t\t\t\"Oh Gabrielle, you can't think like that. You mustn't be hard on yourself. You had no choice. That's the truth. Don't tell yourself anything different\".\n\t\t\t*line_break\n\t\t\t\"But with me and $!{man}, I just think, we're so happy, he'd have had the baby with me. It would all have been ok in the end\".\n\t\t\t*line_break\n\t\t\t\"Please Gabrielle, pull yourself together, this was how it had to be. Do you really think $!{man} would have wanted a bastard child?\"\n\t\t\t*line_break\n\t\t\t\"You're right I know, but it's not so easy for me as to just banish the thoughts from my mind\".\n\t\t\t*if marregret = true\n\t\t\t\t*line_break\n\t\t\t\tIt was an unenviable position to be in, Maria knew that. But her sympathy for her friend was tempered by the fact she had what Maria had wanted. $!{man}. She kept telling herself she was over it. But she wasn't.\n\t\t\t*goto reading\n\t*if dlrship = true\n\t\t*if abortion = false\n\t\t\tGabrielle is sitting opposite her. She's more entertained by her young baby than talking to Maria, which makes Maria question why she's even bothered visiting.\n\t\t\t*line_break\n\t\t\t\"Yes $!{baby}, yes you are! Yes you are the cutest thing in the world!\"\n\t\t\t*if gabbitter = true\n\t\t\t\t*line_break\n\t\t\t\tMaria temporarily meets her friend's gaze. Gabrielle's smile disappears, all the love goes from her eyes. If she really still angry about Maria not standing aside for her to get $!{man}. It was all alright in the end after all. She wonders whether Gabrielle has ever confessed to her husband, Jimenez, that the child is not his.\n\t\t\t*line_break\n\t\t\t\"You haven't told him I suppose?\" asks Maria tentatively.\n\t\t\t*line_break\n\t\t\tGabrielle looks slightly confused, \"Told him what?\"\n\t\t\t*line_break\n\t\t\tMaria leans closer and lowers her voice, \"About the baby I mean. About whose it is\".\n\t\t\t*line_break\n\t\t\t\"Oh God no. Don't even mention that, you can't tell anyone, least of all him!\"\n\t\t\t*goto reading\n\t\t*if abortion = true\n\t\t\tGabrielle is sitting opposite her, looking wistfully into the middle distance.\n\t\t\t*line_break\n\t\t\t\"What are you thinking\" Maria asks her.\n\t\t\t*line_break\n\t\t\t\"Well, and this is going to sound rather silly...\"\n\t\t\t*line_break\n\t\t\tMaria notices Gabrielle has a tear in her eye, \"It's just, sometimes I wish I'd never had the [i]procedure[/i]\".\n\t\t\t*line_break\n\t\t\t\"Oh Gabrielle, you can't think like that. You mustn't be hard on yourself. You had no choice. That's the truth. Don't tell yourself anything different\".\n\t\t\t*line_break\n\t\t\t\"But with me and Jimenez, I just think, we're so happy, he'd have had the baby with me. It would all have been ok in the end\".\n\t\t\t*line_break\n\t\t\t\"Please Gabrielle, pull yourself together, this was how it had to be. Do you really think $!{man} would have wanted a bastard child?\"\n\t\t\t*line_break\n\t\t\t\"You're right I know, but it's not so easy for me as to just banish the thoughts from my mind\".\n\t\t\t*if gabbitter = true\n\t\t\t\t*line_break\n\t\t\t\tWas Gabrielle still bitter about Maria 'stealing' $!{man} from her? Perhaps she was but she was hiding it relatively well. They'd continued to work well together over the last nine months.\n\t\t\t*goto reading\n\n*if vidrship = true\n\t*if dlrship = false\n\t\tGabrielle is sitting opposite her, looking wistfully into the middle-distance. \n\t\t*line_break\n\t\t\"What are you thinking?\"\n\t\t*line_break\n\t\tGabrielle smirks, \"Oh nothing. I was just thinking about $!{man}\".\n\t\t*line_break\n\t\t\"Ah, I see\".\n\t\t*line_break\n\t\t*if marregret = true\n\t\t\tMaria does some contemplation of her own. Of course jealousy is a sin. And she should feel happy that her best friend is happy. But she's envious. Maria liked $!{man}, she liked him a lot. And of course Vidal is gone now. She actually feels somewhat alone.\n\t\t*line_break\n\t\t\"Isn't he stationed near hear?\" Maria asks.\n\t\t*line_break\n\t\t\"Oh yes, not far at all. He's promised to visit!\"\n\t\t*line_break\n\t\t\"Great\".\n\t\t*goto reading\n\t*if dlrship = true\n\t\tGabrielle is sitting opposite her, looking wistfully into the middle-distance.\n\t\t*line_break\n\t\t\"What are you thinking?\"\n\t\t*line_break\n\t\tGabrielle smirks, \"Oh nothing. I was just thinking about Jimenez\".\n\t\t*line_break\n\t\t\"Ah, I see\".\n\t\t*line_break\n\t\tMaria suspects that isn't true. She doesn't like Jimenez that much, or at least Maria reckons she doesn't. It's $!{man} she's envious of. She had been jealous of Maria getting Vidal and now she was jealous she'd got $!{man}.\n\t\t*line_break\n\t\t\"He's stationed near here isn't he? $!{man} I mean,\" Gabrielle asks.\n\t\t*line_break\n\t\t\"Oh yes, not far at all. He's promised to visit!\"\n\t\t*line_break\n\t\t\"Right. Not as close as actually working in our hospital though eh?\" Gabrielle asks, grinning.\n\t\t*line_break\n\t\tMaria shakes her head, \"No Gabrielle, not that close,\" envy and now pride, two deadly sins in a minute Maria thinks to herself.\n\t\t*goto reading\n*label reading\n*page_break\n\"How much further do you think it is?\" Gabrielle asks.\n*line_break\n\"Oh, it shouldn't be too far now, the new hospital is a safe distance behind the lines\".\n*line_break\n\"I do always like it when we move somewhere new, I can get fed up of staying in the same place for months\".\n*line_break\n*if vidrship = false\n\t\"Yes, except you're not really moving are you? You're just visiting. And I'm not so sure this is going to be a happy move,\" Maria continues,\n\"It's going to be rough here, they reckon Teruel is going to end up being one of the bloodiest battles of the whole war. The Reds are throwing everything they have at it but Franco's going to do everything to stop them\".\n*line_break\n\"Viva Franco,\" Gabrielle replies, \"And why did the bloody Reds have to do their big show over Christmas anyway, it's not fair\".\n*line_break\n\"Didn't you hear? They don't have God anymore\".\n*line_break\n\"Typical\".\n*if dlrship = false\n\t*line_break\n\tGabrielle rustles around in her pocket, pulling out an envelope,\n\t*line_break\n\t\"I got this letter from $!{man} the other day. Would you like to hear it?\"\n\t*line_break\n\t\"Er...\"\n\t*line_break\n\t\"I'll read it out!\" Gabrielle begins reading out the contents of the letter from her beloved. Maria isn't really listening.\n\t*if marregret = true\n\t\tThis isn't exactly helping her get over $!{man}.\n\t*line_break\n\t*if war = true\n\t\t\"...This Red offensive is merely buying time, it will not be long before we have driven them back yet further. Surely the war will be won next year,\" Gabrielle reads, \"Well isn't that good news Maria! He's an optimist!\"\n\t*if film = true\n\t\t\"...I recently saw an old film, the name escapes me, at the local cinema (we fortunately have time for that sort of thing!), it was a classic, with Katherine Hepburn, you really must see it some time,\" Gabrielle reads, \"Well, it's alright for some isn't it? Going to the cinema while he's supposed to be fighting a war!\"\n\t*if blue = true\n\t\t\"... the next time I see you... oh,\" Gabrielle stops reading, \"I don't think I should I read that aloud,\" she giggles, \"Oh $!{man}! How scandalous!\"\n\t*line_break\n\tMaria nods politely. \n\t*if franc = true\n\t\t*line_break\n\t\t\"He ends with 'Viva Franco'. How very patriotic!\"\n\t\t*line_break\n\tOnce she has finished, she looks up expectantly at Maria,\n\t*line_break\n\t\"Well? What did you think?\"\n\t*line_break\n\tMaria hasn't been listening. She says the letter was...\n\t*choice\n\t\t#Very nice.\n\t\t\t\"Yes, it was wasn't it! He's just so marvellous isn't he!\"\n\t\t\t*line_break\n\t\t\tMaria smiles and nods again. The lorry rattles on.\n\t\t\t*goto albaattack\n\t\t#Lovely.\n\t\t\t\"Yes, he is so lovely. So kind to me, so caring. I do love him, he's just so marvellous isn't he!\"\n\t\t\t*line_break\n\t\t\tMaria smiles and nods again. The lorry rattles on.\n\t\t\t*goto albaattack\n\t\t#A bit short. \n\t\t\t\"What do you mean? A bit short, what's that supposed to mean?\"\n\t\t\t*line_break\t\n\t\t\t\"Well, he's a pilot, he's got a lot of time on his hands\".\n\t\t\t*line_break\n\t\t\t\"Meaning?\"\n\t\t\t*line_break\n\t\t\t\"Meaning, I just think he might have had time to write a little bit more, that's all\".\n\t\t\t*line_break\n\t\t\t\"You are unbelievable sometimes Maria! You're just jealous anyway\".\n\t\t\t*line_break\n\t\t\tMaria laughs and nods, yes that must be it, she thinks. The lorry rattles on.\n\t\t\t*goto albaattack\n*if dlrship = true\n\t*line_break\n\tMaria rustles around in her pocket, pulling out an envelope. It's a letter she got from $!{man} yesterday. She shows Gabrielle.\n\t*line_break\n\t\"How sweet\".\n\t*line_break\n\tMaria proceeds to...\n\t*choice\n\t\t#Read it aloud.\n\t\t\t\"Oh, you're going to read it out?\"\n\t\t\t*line_break\n\t\t\t\"Yes,\" says Maria, looking up, \"Why, is that a problem?\"\n\t\t\t*if vidrship = false\n\t\t\t\t*if abortion = false\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Oh, nothing, it's just, well, $!{baby} is trying to get to sleep\".\n\t\t\t*line_break\n\t\t\tMaria presses on regardless.\n\t\t\t*if gabbitter = true\n\t\t\t\t*line_break\n\t\t\t\t\"You know, you really don't need to read me this,\" Gabrielle looks ever so slightly annoyed.\n\t\t\t\t*line_break\n\t\t\t\t\"Really, it's no bother, besides, there's not much else to do\".\n\t\t\t*line_break\n\t\t\t*if war = true\n\t\t\t\t\"...This Red offensive is merely buying time, it will not be long before we have driven them back yet further. Surely the war will be won next year,\" Maria reads,\n\t\t\t\t*if marfas = false\n\t\t\t\t\t\"He's awfully hung up about the war isn't he\".\n\t\t\t\t*if marfas = true\n\t\t\t\t\t\"He really does care. He cares about the war and what's going to happen to Spain. That's one of the reasons I like him\".\n\t\t\t*if film = true\n\t\t\t\t\"...I recently saw an old film, the name escapes me, at the local cinema (we fortunately have time for that sort of thing!), it was a classic, with Katherine Hepburn, you really must see it some time,\" Maria reads, \"I hope we have as much free time whilst we're here! I can't believe the standard of living those pilots get!\"\n\t\t\t*if blue = true\n\t\t\t\t\"... the next time I see you... oh,\" Maria stops reading, \"I don't think I should I read that aloud,\" she giggles, \"Oh $!{man}! How scandalous!\"\n\t\t\t*line_break\n\t\t\tGabrielle nods politely.\n\t\t\t*line_break\n\t\t\t*if franc = true\n\t\t\t\t*if marfas = true\n\t\t\t\t\t\"He ends with 'Viva Franco'. How very patriotic!\"\n\t\t\t\t\t*line_break\n\t\t\t\t*if marfas = false\n\t\t\t\t\t\"He ends with 'Viva Franco'. I wonder if he's just doing that for the censors. He does seem to be awfully hung up on these sorts of things\".\n\t\t\t\t\t*line_break\n\t\t\t\"So, what did you think?\" Maria asks her.\n\t\t\t*line_break\n\t\t\t\"It was very... [i]nice[/i]\".\n\t\t\t*line_break\n\t\t\t\"What do you mean [i]nice[/i]?\"\n\t\t\t*line_break\n\t\t\t\"Well it was lovely and all that, I just thought it was a little, well, short\".\n\t\t\t*line_break\n\t\t\t\"What do you mean short?\"\n\t\t\t*line_break\t\n\t\t\t\"Well, he's a pilot, he's got a lot of time on his hands. I just think he might have had time to write a little bit more, that's all\".\n\t\t\t*line_break\n\t\t\t\"You are unbelievable sometimes Maria! You're just jealous anyway\".\n\t\t\t*line_break\n\t\t\tGabrielle laughs. The lorry rattles on.\n\t\t\t*goto albaattack\n\t\t#Read it to herself.\n\t\t\tThe letter is filled with love and affection. It makes Maria feel warm inside to think that those words have been written about her.\n\t\t\t*if gabbitter = true\n\t\t\t\tGabrielle looks on enviously, deducing who the letter must be from.\n\t\t\t*if vidrship = false\n\t\t\t\t*if abortion = false\n\t\t\t\t\tBaby $!{baby} seems to be drifting off. \n\t\t\tMaria reads down the page.\n\t\t\t*line_break\n\t\t\t*if war = true\n\t\t\t\t\"...This Red offensive is merely buying time, it will not be long before we have driven them back yet further. Surely the war will be won next year,\" Maria reads,\n\t\t\t\t*if marfas = false\n\t\t\t\t\tHe's awfully hung up about the war isn't he she thinks to herself.\n\t\t\t\t*if marfas = true\n\t\t\t\t\tHe really does care. He cares about the war and what's going to happen to Spain. That's one of the reasons I like him she thinks to herself.\n\t\t\t*if film = true\n\t\t\t\t\"...I recently saw an old film, the name escapes me, at the local cinema (we fortunately have time for that sort of thing!), it was a classic, with Katherine Hepburn, you really must see it some time,\" Maria reads. I hope we have as much free time whilst I'm here she thinks. The pilots' lifestyle is so relaxed, a world away from her own.\n\t\t\t*if blue = true\n\t\t\t\t\"... the next time I see you... oh,\" Maria stops reading, the next paragraph is rather scandalous. She thinks it would be best not to read it. But she can't help herself. Gabrielle wonders what it is exactly that Maria is reading, as her friend bites her lip, \n\t\t\t\t*line_break\n\t\t\t\t\"Something wrong?\" she asks.\n\t\t\t\t*line_break\n\t\t\t\t\"Oh, no,\" replies Maria, going red, \"Just a letter from $!{man}\".\n\t\t\t\t*line_break\n\t\t\t\t\"Ah, I see...\" Gabrielle laughs.\n\t\t\t*if franc = true\n\t\t\t\t*if marfas = true\n\t\t\t\t\tHe ends with 'Viva Franco'. How very patriotic!\n\t\t\t\t*if marfas = false\n\t\t\t\t\tHe ends with 'Viva Franco'. Maria wonders if he's just doing that for the censors. He does seem to be awfully hung up on these sorts of things.\n\t\t\tThe lorry rattles on.\n\t\t\t*goto albaattack\n\t\t\t\n*label albaattack\n*if albadead = true\n\t*goto partattack\n*page_break\n*if bridge = true\n\t\"Are we ready?\" Alba shouts, \"Can't you hear that? They're not far!\"\n\t*line_break\n\t\"We're nearly done!\" the Americans are wiring the explosives on the underside of the small stone bridge.\n\t*line_break\n\t\"You've got to hurry!\"\n\t*line_break\n\t\"Ok, we're done, let's get to cover!\" they sprint back into the treeline, Goff trailing a detonator cable.\n\t*line_break\n\tThey wait. They can hear the convoy approaching long before they can see it, visibility isn't great. And then it emerges from the snow. Alba counts seven lorries trundling along the icy road, headlights shining. They wait as the vehicles draw nearer to the bridge. Goff's hands tighten around plunger on the detonator. The first truck moves onto the bridge, then the second. Just as the first is about to reach the other side, Goff pushes down the plunger.\n\t*page_break\n\tA huge explosion somewhere up the road. The lorry slams on the breaks and Maria and Gabrielle are thrown forward. \n\t*line_break\n\t\"What was that?\"\n\t*line_break\n\t\"We're under attack! An ambush!\" replies Gabrielle\n\t*if vidrship = false\n\t\t*if abortion = false\n\t\t\t, tightening her hold on her baby\n\t, panic in her eyes, \"How have the Reds advanced this far?\"\n\t*line_break\n\t\"It won't be their army, it'll be partisans, guerrillas!\"\n\t*line_break\n\t\"Oh God!\"\n\t*goto marchoice\n*if road = true\n\t\"Are we ready?\" Alba shouts, \"Can't you hear them? They're not far!\"\n\t*line_break\n\t\"We're nearly done!\" the Americans are wiring the explosives on the side of the road.\n\t*line_break\n\t\"You've got to hurry!\"\n\t*line_break\n\t\"Ok, we're done, let's get to cover!\" they sprint back into the treeline, Goff trailing a detonator cable.\n\t*line_break\n\tThey wait. They can hear the convoy approaching long before they can see it, visibility isn't great. And then it emerges from the snow. Alba counts seven lorries trundling along the icy road, headlights shining. They wait as the vehicles draw nearer to the explosives. Goff's hands tighten around plunger on the detonator. They wait for the first and last vehicle to align with the two separate charges. As they do so, Goff pushes down the plunger.\n\t*page_break\n\tTwo huge explosions, one in front, one behind. The lorry slams on the breaks and Maria and Gabrielle are thrown forward. \n\t*line_break\n\t\"What was that?\"\n\t*line_break\n\t\"We're under attack! An ambush!\" replies Gabrielle\n\t*if vidrship = false\n\t\t*if abortion = false\n\t\t\t, tightening her hold on her baby\n\t, panic in her eyes, \"How have the Reds advanced this far?\"\n\t*line_break\n\t\"It won't be their army, it'll be partisans, guerrillas!\"\n\t*line_break\n\t\"Oh God!\"\n\t*goto marchoice\n*if check = true\n\t\"Are we ready?\" Alba shouts, \"Can't you hear them, they're not far!\"\n\t*line_break\n\t\"Alright, alright, I'm ready!\" Salazar replies, straightening out his Army uniform. He slings his rifle over his back and stands in the middle of the road with another of the militiamen, also dressed in Nationalist uniform. The rest of them try and conceal themselves on the edge of the treeline.\n\t*line_break\n\t\"I hope your friend took drama at school,\" whispers Aalto.\n\t*line_break\n\t\"None of us went to school,\" $!{friend} replies.\n\t*line_break\n\t\"Ah\".\n\t*line_break\n\t\"He's good at being dishonest though,\" Alba chips in.\n\t*line_break\n\t\"Well that might help him\".\n\t*line_break\n\tThey wait. They can hear the convoy approaching long before they can see it, visibility isn't great. And then it emerges from the snow. Alba counts seven lorries trundling along the icy road, headlights shining. Salazar steps forward, raising his hand to indicate for the trucks to stop.\n\t*line_break\n\t\"Come on Salazar, hold your nerve...\" Alba whispers.\n\t*page_break\n\tThe lorry slowly grinds to a halt. \n\t*line_break\n\t\"What's going on?\" Gabrielle asks.\n\t*line_break\n\t\"I don't know...\" replies Maria peering out of the back of the truck. Then the firing starts.\n\t*line_break\n\t\"We're under attack! An ambush!\" replies Gabrielle\n\t*if vidrship = false\n\t\t*if abortion = false\n\t\t\t, tightening her hold on her baby\n\t, panic in her eyes, \"How have the Reds advanced this far?\"\n\t*line_break\n\t\"It won't be their army, it'll be partisans, guerrillas!\"\n\t*line_break\n\t\"Oh God!\"\n\t*goto marchoice \n*label marchoice\n*page_break\n*if bridge = true\n\tThe first two lorries had been completely destroyed in the blast, the last couple clumsily turn around and make off up the road. Soldiers leap off the remaining trucks but out in the open don't stand a chance against the concealed guerrillas. There's panic and confusion. A soldier comes to Maria and Gabrielle's vehicle,\n\t*line_break\n\t\"Come on Senorita, we've got to get out of here!\" he reaches out his hand to help Maria down. As she takes hold of it, he's shot through the neck. Maria recoils and screams.\n\t*if vidrship = false\n\t\t*if abortion = false\n\t\t\tThe baby cries.\n\t*line_break\n\t\"What the fuck are we going to?\" asks Gabrielle, breathing heavily.\n\t*line_break\n\tMaria, regaining her composure, suggests...\n\t*choice\n\t\t#They stay put.\n\t\t\t*goto stayput\n\t\t#They make a run for it.\n\t\t\t*goto run\n\t\t#She goes out to see if it's safe.\n\t\t\t*goto marbrave\n*if road = true\n\tThe first and last lorries had been completely destroyed in the blast, other try and clumsily move off the road but quickly get stuck in the thick snow. Soldiers leap off the remaining trucks but out in the open don't stand a chance against the concealed guerrillas. There's panic and confusion. A soldier comes to Maria and Gabrielle's vehicle,\n\t*line_break\n\t\"Come on Senorita, we've got to get out of here!\" he reaches out his hand to help Maria down. As she takes hold of it, he's shot through the neck. Maria recoils and screams.\n\t*if vidrship = false\n\t\t*if abortion = false\n\t\t\tThe baby cries.\n\t*line_break\n\t\"What the fuck are we going to?\" asks Gabrielle, breathing heavily.\n\t*line_break\n\tMaria, regaining her composure, suggests...\n\t*choice\n\t\t#They stay put.\n\t\t\t*goto stayput\n\t\t#They make a run for it.\n\t\t\t*goto run\n\t\t#She goes out to see if it's safe.\n\t\t\t*goto marbrave\n*if check = true\n\tSalazar shoots the driver of the first lorry and the chaos begins. The guerrillas try and do the same, aiming for the cabs of the trucks. One of the vehicles reverses back up the road. Another couple try and get off the road but quickly become stuck in the thick snow. Soldiers leap off the remaining trucks but out in the open don't stand a chance against the concealed guerrillas. There's panic and confusion. A soldier comes to Maria and Gabrielle's vehicle,\n\t*line_break\n\t\"Come on Senorita, we've got to get out of here!\" he reaches out his hand to help Maria down. As she takes hold of it, he's shot through the neck. Maria recoils and screams.\n\t*if vidrship = false\n\t\t*if abortion = false\n\t\t\tThe baby cries.\n\t*line_break\n\t\"What the fuck are we going to?\" asks Gabrielle, breathing heavily.\n\t*line_break\n\tMaria, regaining her composure suggests...\n\t*choice\n\t\t#They stay put.\n\t\t\t*goto stayput\n\t\t#They make a run for it.\n\t\t\t*goto run\n\t\t#She goes out to see if it's safe.\n\t\t\t*goto marbrave\n*label stayput\n\"Going out there's suicide, we've got to sit tight\".\n*line_break\nGabrielle nods\n*if vidrship = false\n\t*if abortion = false\n\t\t, she holds baby $!{baby} even tighter\n, tears in her eyes. Maria's eyes are drawn to the dead soldier's rifle. It's lying there in the snow, just outside the truck. If she could reach out and get it, they'd be a whole lot safer. Or would they? Would that make them fair targets, combatants? Do guerrillas even care about the rules of engagement anyway?\n*fake_choice\n\t#Pick up the rifle.\n\t\t*set rifle true\n\t#Leave it.\nAlba and her militia advance confidently across the open ground between the woods and the road. A soldier pops out from behind one of the trucks. She's shot him before he can fire.\n*if cav = true\n\tThen comes the shout,\n\t*line_break\n\t\"Cavalry!\"\n\t*line_break\n\tThe mounted patrol they'd let pass is back.\n\t*line_break\n\t\"The cavalry had to fucking arrive didn't it!\" Alba sighs.\n\t*line_break\n\tThe horses gallop towards them and Alba's men flee in panic, several are cut down.\n\t*set militia -5\n\t*line_break\n\tShe knells, calmly waits for one to get close and fires. The soldier is shot clean off his horse. She picks up the cavalryman's submachine gun, a German MP28. It makes a satisfying click-clunk as she pulls the bolt back. But more are on their way. The convoy is now closer than the trees, so she makes for the shelter of the trucks.\n*if cav = false\n\t*line_break\n\t\"Ok, spread out and search the trucks, take anything that could be useful!\"\n\t*line_break\n\t\"And survivors?\" $!{friend} asks.\n\t*line_break\n\t\"Well we can't take them with us...\"\n*page_break\nAlba moves from truck to truck. Most are either empty or their occupants are dead. She keeps her weapon primed just in case. Anything could be around the corner. She raises the submachine gun to her shoulder and moves around to the back of the next lorry.\n*if rifle = true\n\t*line_break\n\t*set mariadead true\n\t*set ambushdead true\n\tShe sees a rifle raised at her and pulls the trigger. A short burst of machinegun fire issues from her weapon. Her target goes down. A scream. She swings her weapon round. There's another. But she isn't armed. She's wearing a nurses uniform. She's shaking and crying.\n\t*if vidrship = false\n\t\t*if abortion = false\n\t\t\tThere's a baby in her arms.\n\tAlba looks back at the person she's just killed. Aside from the chest, which has been ripped apart, she too wears a nurse's uniform. On the uniform is the distinctive yoke and arrows of the Falange. They're fascists. Alba turns back to the other one. The alive one. She...\n\t*choice\n\t\t#Shoots her.\n\t\t\t*set albabrutal -10\n\t\t\tShe aims at the other one. The nurse shuts her eyes tightly. \n\t\t\t*line_break\n\t\t\t\"Viva Franco,\" she whimpers, barely audibly.\n\t\t\t*line_break\n\t\t\tShe pulls the trigger again. The other nurse is killed instantly.\n\t\t\t*if vidrship = false \n\t\t\t\t*if abortion = false\n\t\t\t\t\tThe baby stops crying.\n\t\t\t\t\t*set babydead true \n\t\t\tAlba changes the magazine in her weapon and walks away. She kills fascists, that's what she's good at.\n\t\t\t*set gabdead true\n\t\t\t*goto morales\n\t\t#Walks away.\n\t\t\t*set albabrutal +5\n\t\t\tLowering her weapon. Alba slowly backs away. She can't quite believe what she's done. Why did she have a weapon? That question is quite easy to answer. Alba throws up. \n\t\t\t*goto morales\n*if rifle = false\n\t*line_break\n\tInside are two nurses.\n\t*line_break\n\t\"Please, please, don't shoot, we're unarmed!\"\n\t*if vidrship = false\n\t\t*if abortion = false\n\t\t\t*line_break\n\t\t\tOne of them has a baby in her arms.\n\t*line_break\n\tOn their uniforms is the distinctive yoke and arrows of the Falange. They're fascists. Alba...\n\t*choice\n\t\t#Shoots them.\n\t\t\tOne of them whispers \"Viva Franco\", barely audibly.\n\t\t\tAlba sprays the inside of the truck with machinegun fire. The nurses' pretty uniforms are ripped apart.\n\t\t\t*if vidrship = false \n\t\t\t\t*if abortion = false\n\t\t\t\t\tThe baby stops crying.\n\t\t\t\t\t*set babydead true\n\t\t\tAlba changes the magazine in her weapon and walks away. She kills fascists, that's what she's good at.\n\t\t\t*set mariadead true\n\t\t\t*set ambushdead true\n\t\t\t*set gabdead true\n\t\t\t*set albabrutal -10\n\t\t\t*goto morales \n\t\t#Walks away.\n\t\t\t*set albabrutal +5\n\t\t\tShe can't kill them. Of course she can't. Alba lowers her weapon and slowly backs away. The nurses' frightened eyes remain fixed on her. And then she slips away.\n\t\t\t*goto morales \n*label run\n\"Staying here's suicide, we've got to go\".\n*line_break\nGabrielle nods\n*if vidrship = false\n\t*if abortion = false\n\t\t, she holds baby $!{baby} even tighter\n, tears in her eyes. As they dismount, Maria's eyes are drawn to the dead soldier's rifle. It's lying there in the snow, just outside the truck. If she takes it they'd be a whole lot safer. Or would they? Would that make them fair targets, combatants? Do guerrillas even care about the rules of engagement anyway?\n*fake_choice\n\t#Pick up the rifle.\n\t\t*set rifle true\n\t#Leave it.\nAlba and her militia advance confidently across the open ground between the woods and the road. A soldier pops out from behind one of the trucks. She's shot him before he can fire.\n*if cav = true\n\tThen comes the shout,\n\t*line_break\n\t\"Cavalry!\"\n\t*line_break\n\tThe mounted patrol they'd let pass is back.\n\t*line_break\n\t\"The cavalry had to fucking arrive didn't it!\" Alba sighs.\n\t*line_break\n\tThe horses gallop towards them and Alba's men flee in panic, several are cut down.\n\t*set militia -5\n\t*line_break\n\tShe knells, calmly waits for one to get close and fires. The soldier is shot clean off his horse. She picks up the cavalryman's submachine gun, a German MP28. It makes a satisfying click-clunk as she pulls the bolt back. But more are on their way. The convoy is now closer than the trees, so she makes for the shelter of the trucks.\n*if cav = false\n\t*line_break\n\t\"Ok, spread out and search the trucks, take anything that could be useful!\"\n\t*line_break\n\t\"And survivors?\" $!{friend} asks.\n\t*line_break\n\t\"Well we can't take them with us...\"\n*page_break\nAlba moves from truck to truck. Most are either empty or their occupants are dead. She keeps her weapon primed just in case. Anything could be around the corner. Then she sees two figures making a run for it. \n*if rifle = true\n\t*set mariadead true\n\t*set ambushdead true\n\tOne of them is carrying a rifle. \n\t*if vidrship = false\n\t\t*if abortion = false\n\t\t\tThe other a bundle of some sort.\n\tAlba raises her submachine gun to her shoulder and let's off two short bursts. The automatic weapon rattles. The armed one goes down. The other stops to attend to their friend.\n\t*page_break\n\tIt takes Alba about thirty seconds to walk over to them. Once she's close she realises they're women. They're nurses. The one that isn't dead scrambles away as Alba gets close,\n\t*line_break\n\t\"Please, don't!\"\n\t*if vidrship = false\n\t\t*if abortion = false\n\t\t\tThe bundle, Alba realises, is a baby. It cries quietly. \n\tThe nurses' uniform bears the distinctive yoke and arrows of the Falange. They're fascists. The armed one is quite clearly dead. The snow around her is soaked red and her uniform is shredded. She lies motionless, face down in the snow. The other is now frozen still, staring at Alba with frightened eyes. Alba...\n\t*choice\n\t\t#Shoots her.\n\t\t\t*set albabrutal -10\n\t\t\tShe raises her weapon again. The nurse whispers 'Viva Franco', barely audibly. She pulls the trigger again. The other nurse is killed instantly.\n\t\t\t*if vidrship = false \n\t\t\t\t*if abortion = false\n\t\t\t\t\tThe baby stops crying.\n\t\t\t\t\t*set babydead true \n\t\t\tAlba changes the magazine in her weapon and walks away. She kills fascists, that's what she's good at.\n\t\t\t*set gabdead true\n\t\t\t*goto morales\n\t\t#Walks away. \n\t\t\t*set albabrutal +5\n\t\t\tLowering her weapon. Alba slowly backs away. She can't quite believe what she's done. Why did the nurses have a weapon? That question is quite easy to answer. Alba throws up. \n\t\t\t*goto morales\n*if rifle = false\n\tThey appear to be unarmed. \n\t*if vidrship = false\n\t\t*if abortion = false\n\t\t\tOne carries a bundle of some sort.\n\t*choice\n\t\t#Shoot them.\n\t\t\t*set albabrutal -10\n\t\t\t*set mariadead true\n\t\t\t*set ambushdead true\n\t\t\t*set gabdead true\n\t\t\tAlba raises her submachine gun to her shoulder and let's off two short bursts. The automatic weapon rattles. They go down.\n\t\t\tIt takes Alba about thirty seconds to walk over to them. Once she's close she realises they're women. They're nurses. \n\t\t\t*if vidrship = false\n\t\t\t\t*if abortion = false\n\t\t\t\t\tThe bundle, Alba realises, is, or was, a baby.\n\t\t\t\t\t*set babydead true \n\t\t\tThe nurses' uniform bears the distinctive yoke and arrows of the Falange. They're fascists. The snow around them is soaked red and their uniforms are shredded. They lie motionless, face down in the snow. One's eyes are open, wide and frightened looking, staring straight at Alba. She is...\n\t\t\t*choice\n\t\t\t\t#Horrified.\n\t\t\t\t\t*set albabrutal +5\n\t\t\t\t\tAlba slowly backs away. She can't quite believe what she's done. Why did she do that? It's not her fault, she tells herself, she couldn't have known. But it is her fault. She pulled the trigger. She throws up. \n\t\t\t\t\t*goto morales\n\t\t\t\t#Satisfied.\n\t\t\t\t\t*set albabrutal -5\n\t\t\t\t\tAlba changes the magazine in her weapon and walks away. She kills fascists, that's what she's good at.\n\t\t\t\t\t*goto morales\n\n\t\t#Lets them go.\n\t\t\t*set albabrutal +5\n\t\t\tShe's not in the business of killing in cold blood. She leaves that to the fascists. She watches as they stumble through the snow towards the shelter of some trees. A part of Alba hopes they make it.\n\t\t\t*goto morales\n*label marbrave\n\"Ok, you stay here Gabrielle \n*if vidrship = false\n\t*if abortion = false\n\t\tyou've got $!{baby} after all\n, I'll go and see if it's safe\".\n*line_break\nGabrielle nods\n*if vidrship = false\n\t*if abortion = false\n\t\t, she holds baby $!{baby} even tighter\n, tears in her eyes. As Maria dismounts, her eyes are drawn to the dead soldier's rifle. It's lying there in the snow, just outside the truck. If she takes it she'd be whole lot safer. Or would she? Would that make them fair targets, combatants? Do guerrillas even care about the rules of engagement anyway?\n*fake_choice\n\t#Pick up the rifle.\n\t\t*set rifle true\n\t#Leave it.\nAlba and her militia advance confidently across the open ground between the woods and the road. A soldier pops out from behind one of the trucks. She's shot him before he can fire.\n*if cav = true\n\tThen comes the shout,\n\t*line_break\n\t\"Cavalry!\"\n\t*line_break\n\tThe mounted patrol they'd let pass is back.\n\t*line_break\n\t\"The cavalry had to fucking arrive didn't it!\" Alba sighs.\n\t*line_break\n\tThe horses gallop towards them and Alba's men flee in panic, several are cut down.\n\t*set militia -5\n\t*line_break\n\tShe knells, calmly waits for one to get close and fires. The soldier is shot clean off his horse. She picks up the cavalryman's submachine gun, a German MP28. It makes a satisfying click-clunk as she pulls the bolt back. But more are on their way. The convoy is now closer than the trees, so she makes for the shelter of the trucks.\n*if cav = false\n\t*line_break\n\t\"Ok, spread out and search the trucks, take anything that could be useful!\"\n\t*line_break\n\t\"And survivors?\" $!{friend} asks.\n\t*line_break\n\t\"Well we can't take them with us...\"\n*page_break\nAlba moves from truck to truck. Most are either empty or their occupants are dead. She keeps her weapon primed just in case. Anything could be around the corner. Then someone comes out from behind a crate of ammunition. \n*if rifle = true\n\t*set mariadead true\n\t*set ambushdead true\n\tThey're carrying a rifle. \n\tInstinctively, Alba raises her submachine gun to her shoulder and let's off two short bursts. The automatic weapon rattles.\n\t*page_break\n\tIt's a woman. She's standing just a few metres in front of Alba. She looks down in horror at her ruined torso. She falls to the ground. She's wearing a nurse's uniform. It bears the distinctive yoke and arrows of the Falange. She's a fascist. Presently, another woman runs round. She's wearing the same uniform. She screams when she sees her friend.\n\t*if vidrship = false\n\t\t*if abortion = false\n\t\t\tShe's carrying a bundle. \n\tShe looks up at Alba, eyes wide with fear. \n\t*line_break\n\t\"Please, don't!\" she whimpers.\n\t*if vidrship = false\n\t\t*if abortion = false\n\t\t\tThe bundle, Alba realises, is a baby. It cries quietly. \n\tAlba...\n\t*choice\n\t\t#Shoots her.\n\t\t\t*set albabrutal -10\n\t\t\tShe raises her weapon again. The nurse whispers 'Viva Franco', barely audibly. She pulls the trigger again. The other nurse is killed instantly.\n\t\t\t*if vidrship = false \n\t\t\t\t*if abortion = false\n\t\t\t\t\tThe baby stops crying.\n\t\t\t\t\t*set babydead true \n\t\t\tAlba changes the magazine in her weapon and walks away. She kills fascists, that's what she's good at.\n\t\t\t*set gabdead true\n\t\t\t*goto morales\n\t\t#Walks away.\n\t\t\t*set albabrutal +5 \n\t\t\tLowering her weapon. Alba slowly backs away. She can't quite believe what she's done. Why did the nurses have a weapon? That question is quite easy to answer. Alba throws up. \n\t\t\t*goto morales\n*if rifle = false\n\tShe's unarmed. Alba raises her MP28,\n\t*line_break\n\t\"Freeze!\"\n\t*line_break\n\tThe woman stops dead. She wears a nurse's uniform. It bears the distinctive yoke and arrows of the Falange. She's a fascist.\n\t*line_break\n\t\"Please, p...please don't...\" she whimpers.\n\t*line_break\n\tAlba...\n\t*choice\n\t\t#Shoots her.\n\t\t\t*set albabrutal -10\n\t\t\tAlba steels herself, aiming straight at the nurse's chest. The nurse closes her eyes.\n\t\t\t*if marfas = true\n\t\t\t\t*line_break\n\t\t\t\t\"Viva Franco,\" she murmurs.\n\t\t\tAlba pulls the trigger. The other nurse is killed instantly, her torso ripped apart. The nurse's pretty uniform is shredded. \n\t\t\tAlba changes the magazine in her weapon and walks away. She kills fascists, that's what she's good at.\n\t\t\t*set mariadead true\n\t\t\t*set ambushdead true\n\t\t\t*goto morales\n\t\t#Walks away.\n\t\t\t*set albabrutal +5\n\t\t\tLowering her weapon. Alba slowly backs away. She can't shoot someone like this. That's what the fascists might do but not her.\n\t\t\t*line_break\n\t\t\t\"Thank you,\" the nurse whispers, \"Thank you for showing mercy\".\n\t\t\t*goto morales\n*label partattack\n*page_break\nA huge explosion somewhere up the road. The lorry slams on the breaks and Maria and Gabrielle are thrown forward. \n*line_break\n\"What was that?\"\n*line_break\n\"We're under attack! An ambush!\" replies Gabrielle\n*if vidrship = false\n\t*if abortion = false\n\t\t, tightening her hold on her baby\n, panic in her eyes, \"How have the Reds advanced this far?\"\n*line_break\n\"It won't be their army, it'll be partisans, guerrillas!\"\n*line_break\n\"Oh God!\"\n*page_break\nThere's panic and confusion. And lots of firing. A soldier comes to Maria and Gabrielle's vehicle,\n*line_break\n\"Come on Senorita, we've got to get out of here!\" he reaches out his hand to help Maria down. As she takes hold of it, he's shot through the neck. Maria recoils and screams.\n*if vidrship = false\n\t*if abortion = false\n\t\tThe baby cries.\n*line_break\n\"What the fuck are we going to?\" asks Gabrielle, breathing heavily.\n*line_break\nMaria, regaining her composure, suggests...\n*choice\n\t#They stay put.\n\t\t*goto stayputpart\n\t#They make a run for it.\n\t\t*goto runpart\n\t#She goes out to see if it's safe.\n\t\t*goto marbravepart\n\n*label stayputpart\n\"Going out there's suicide, we've got to sit tight\".\n*line_break\nGabrielle nods\n*if vidrship = false\n\t*if abortion = false\n\t\t, she holds baby $!{baby} even tighter\n, tears in her eyes. Maria's eyes are drawn to the dead soldier's rifle. It's lying there in the snow, just outside the truck. If she could reach out and get it, they'd be a whole lot safer. Or would they? Would that make them fair targets, combatants? Do guerrillas even care about the rules of engagement anyway?\n*choice\n\t#Pick up the rifle.\n\t\tShe takes wrests the rifle from the grips of the dead soldier and they get back as far inside the vehicle as possible. They wait. The firing begins to die down. They can hear voices getting closer. A figure, roughly dressed, comes behind the truck, he's armed. Maria goes to shoot him.\n\t\t*page_break\n\t\tBut nothing happens. She can't work out how to use the weapon. The guerrilla turns, sees the weapon and shoots Maria with his submachine gun. Maria's torso is ripped apart. She slumps, dropping the rifle. She doesn't really have time to think about dying. The last thing she hears is Gabrielle begging for mercy. The last thing she sees is the bloody mess that used to be her chest and her golden crucifix stained with blood.\n\t\t*set mariadead true\n\t\t*set ambushdead true\n\t\t*goto morales \n\t#Leave it.\n\t\tThey huddle together and get back as far inside the vehicle as possible. They wait. The firing begins to die down. They can hear voices getting closer. A figure, roughly dressed, comes behind the truck, he's armed. He's a guerrilla.\n\t\t*page_break\n\t\tMaria and Gabrielle close their eyes and silently pray for their lives, holding each other tightly. Their hearts are pounding. After what seems to be an eternity, Maria opens her eyes. The man is gone. She doesn't know if he saw them and took pity or whether they went unnoticed. Either way, they're alive.\n\t\t*goto morales\n*label runpart\n\"Staying here's suicide, we've got to go\".\n*line_break\nGabrielle nods\n*if vidrship = false\n\t*if abortion = false\n\t\t, she holds baby $!{baby} even tighter\n, tears in her eyes. As they dismount, Maria's eyes are drawn to the dead soldier's rifle. It's lying there in the snow, just outside the truck. If she takes it they'll be whole lot safer. Or would they? Would that make them fair targets, combatants? Do guerrillas even care about the rules of engagement anyway?\n*choice\n\t#Pick up the rifle.\n\t\tShe takes wrests the rifle from the grips of the dead soldier and they set off through the snow across open country. They can hear voices calling out to them, telling them to stop. Maria turns to see the guerrillas pursuing them. They don't stop, they don't wait.\n\t\t*page_break\n\t\tAnd then the shots ring out. An automatic weapon of some sort chatters away. Maria's torso is ripped apart. She slumps, dropping the rifle. She doesn't really have time to think about dying. The last thing she hears is Gabrielle's screams. The last thing she sees is the bloody mess that used to be her chest and her golden crucifix stained with blood.\n\t\t*set mariadead true\n\t\t*set ambushdead true\n\t\t*set gabdead true\n\t\t*goto morales \n\t#Leave it.\n\t\tThey set off through the snow across open country. They can hear voices calling out to them, telling them to stop. Maria turns to see the guerrillas pursuing them. They don't stop. Maria waits for the shots, waits to be cut down, accepts her fate. But the shots don't come. They make it to the relative safety of the trees and stop to catch their breath. Gabrielle throws up. \n\t\t*line_break\n\t\t\"What do we do now?\" she asks.\n\t\t*line_break\n\t\t\"I don't Gabrielle, I don't know\".\n\t\t*goto morales\n*label marbravepart\n\"Ok, you stay here Gabrielle \n*if vidrship = false\n\t*if abortion = false\n\t\tyou've got $!{baby} after all\n, I'll go and see if it's safe\".\n*line_break\nGabrielle nods\n*if vidrship = false\n\t*if abortion = false\n\t\t, she holds baby $!{baby} even tighter\n, tears in her eyes. As Maria dismounts, her eyes are drawn to the dead soldier's rifle. It's lying there in the snow, just outside the truck. If she takes it she'd be whole lot safer. Or would she? Would that make them fair targets, combatants? Do guerrillas even care about the rules of engagement anyway?\n*choice\n\t#Pick up the rifle.\n\t\tShe takes wrests the rifle from the grips of the dead soldier and slowly moves around the truck, trying to be as quiet as possible. She waits. The firing begins to die down. She can hear voices getting closer. From the snippets of conversation she can overhear, it sounds like the guerrillas. Her heart is pounding.\n\t\t*page_break\n\t\tA shabbily dressed figure armed with a submachine gun turns the corner. He's a partisan. Maria goes to fire the rifle. But her reactions are found wanting. The guerrilla fires first. Maria's torso is ripped apart. She slumps, dropping the rifle. She doesn't really have time to think about dying. The last thing she hears is Gabrielle begging for mercy. The last thing she sees is the bloody mess that used to be her chest and her golden crucifix stained with blood.\n\t\t*set mariadead true\n
