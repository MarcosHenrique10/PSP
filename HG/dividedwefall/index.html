e does so.\n\t*line_break\n\t\"Blue Four standing by,\" continues Joaquin and so on and so on.\n\t*goto nextybity\n*else\n\tSquadron Leader Vasquez's voice crackles over the radio. Vasquez has taken over as squadron leader after Lopez's untimely end,\n\t*line_break\n\t\"This is Blue Leader calling Blue squadron, do you copy?\"\n\t*line_break\n\t\"Blue One standing by\".\n\t*line_break\n\t\"Blue Two standing by\".\n\t*line_break\n\t\"Blue Three standing by,\" De La Rosa responds, breathing an insult under his breath as he does so.\n\t*line_break\n\t\"Blue Four standing by,\" continues Joaquin and so on and so on.\t\n*label nextybity\n*page_break\nDe La Rosa is growing patient with his new commanding officer. This is the third time they've been through this pointless drill.\n*line_break\n\"Ok squadron, tight v-formation alongside the transports\".\n*line_break\nDe La Rosa is exasperated, that makes no sense; on an escort mission they should be spread out wide in order to spot approaching enemies from all directions. He...\n*choice\n\t#Stays where he is.\n\t\t*goto staysput\n\t#Protests over the radio.\n\t\t*goto protest\n\t#Follows orders and gets in formation.\n\t\t*goto formation\n*label staysput\nDe La Rosa watches his comrades gather in a V about 500 metres below him. After a few seconds, the radio crackles into life again,\n*if (vasdead = true)\n\tit's Tello,\n\t*line_break\n\t\"Where is Blue Three, are you ok?\"\n\t*line_break\n\t\"This is Blue Three, I have no issues\".\n\t*line_break\n\t\"Then why aren't you in formation?\"\n\t*goto choicy\n*else\t\n\tit's Vasquez,\n\t*line_break\n\t\"De La Rosa, where are you?\"\n\t*line_break\n\t\"It's a stupid order Vasquez!\"\n\t*line_break\n\t\"Get in formation right now Flying Officer!\"\n\t*goto choicy\n*label choicy\n*line_break\nDe La Rosa proceeds to...\n*choice\n\t#Switch off his radio.\n\t\t*goto radoff\n\t#Get in formation.\n\t\t*goto formation\n*label formation\nReluctantly, De La Rosa takes his place on the right side of the V, in behind his squadron leader and in front of his wingman Joaquin.\n\nAfter flying for some time, De La Rosa sees something out of the corner of his eye. Just for a moment, he thinks he sees movement high above them. He turns his head, looking up over his right shoulder, squinting in the bright sunlight. If there was something there it has disappeared into one of the myriad of high clouds. Did he just imagine that? A trick of the light?\n*choice\n\t#One can't be too careful, call it in.\n\t\t*goto callin\n\t#It was probably nothing, it's more important to stay close to the transports.\n\t\t*goto ignore\n*label protest\n*if (vasdead = true)\n\t\"Blue leader, that's not a good idea, if we go tight we leave ourselves vulnerable\".\n\t*line_break\n\tTello is incensed, \"This is the sort of petulant attitude that has seen the airforce side with the Republic, a problem with authority! Get in formation now Blue Three!\"\n\t*goto choicy\n*else\n\t\"Vasquez, that's not a good idea, if we go tight we leave ourselves vulnerable\".\n\t*line_break\n\tVasquez is incensed, \"Get in formation Jose, that is a direct order!\"\n\t*goto choicy\n*label radoff\nFlying high above the others, De La Rosa has a considerably better view of the sky. Presently, he spots a flight of fighters approaching the air convoy from behind, coming in high, with the sun behind them. De La Rosa quickly...\n*choice\n\t#Warns the rest of the squadron\n\t\t*goto warn\n\t#Tries to distract the enemy fighters.\n\t\t*goto distract\n*label callin\n\"Blue leader, hostiles spotted, four o'clock high\".\n*line_break\nAfter a moment, \"Negative, I can't see anything Blue Three, are you sure?\"\n*line_break\n\"I saw something, just for a moment, but I'm sure I saw something\".\n*line_break\n*if (vasdead = true)\n\t\"Ok, take Blue Four and investigate\".\n\t*goto investigate\n*else\n\t\"I know what you're trying to do Jose, stay put, no one else saw anything\".\n\t*goto ignore\n*label ignore\n*page_break\nSeveral minutes pass. Then, out of nowhere, a flight of Republican fighters swoop over 11 squadron, machine guns chattering. Instantly, two of the nationalist NiDs go down in flames, sitting ducks flying in tight formation. The radio comes alive with the despairing screams of the burning pilots. \n*line_break\n\"For fuck's sake, break formation and engage hostiles Blue squadron!\"\n*line_break\nDe La Rosa doesn't need a second invitation as he and Joaquin swoop upwards to gain altitude. He turns up the engine power to 100% and the noise of the engine rises from a drone to a roar.\n*goto dogfight\n*label investigate\nDe La Rosa and Joaquin peel away, climbing up into the clouds to try and identify the mystery plane. They reach 4000 metres just in time to watch a flight of Republican fighters descend, with the sun behind them, on the transports. Very quickly, two of the transports are falling out of the sky in flames. Tiny specs, evidently soldiers, are tumbling out of the flaming fuselages, some of them are on fire. None of them have parachutes.\n*goto dogfight\n*label warn\nTurning on his radio, De La Rosa hurriedly informs his comrades, \n*line_break\n\"Hostiles inbound, check your four o'clock high!\"\n*line_break\n\"Shit, break formation and engage immediately!\"\n*line_break\nThe aged biplanes split simultaneously and turn awkwardly 180 degrees, the hum of their strained engines filling the air. He moves his own engine up to 100% power and the engine moves up from a dull drone to defiant roar. Joaquin moves into position behind De La Rosa and the pair enter the maelstrom.\n*goto dogfight\n*label distract\nKeeping his radio stubbornly turned off, De La Rosa moves his engine power up to 100%, it responds by moving up from a dull drone to a defiant roar. Quickly gaining speed, he approaches the Republican biplanes from behind. Spotting him immediately, three of them peel away and turn to meet him head on. De La Rosa...\n*choice\n\t#Meets all three of them head on.\n\t\tAccelerating towards the Republicans, machine guns blazing, De La Rosa dies a heroic death.\n\t\t*set dlrdead true\n\t\t*finish\n\t#Tries to evade them by diving into the clouds.\t\n\t\tRealising he has little chance against such odds, De La Rosa pushes his NiD into a steep dive, aiming for a patch of cloud 500 metres below him. Very quickly, De La Rosa's NiD is into the clouds and he can see nothing. He keeps diving, keeps accelerating. A moment later, he is out and stabilising speed and altitude.\n\t\t\n\t\tBefore he can react, the three Republican NiDs are out of the cloud and on him. De La Rosa's aircraft is riddled with bullets. The fuel tank is hit and fire takes hold. He may have been able to bail out, if it weren't for the fact that several bullets had passed through his chest. He is unconscious by the time his flaming fighter hits the sea at over 300 kmph. Blue Three is down.\n\t\t*set dlrdead true\n\t\t*finish\n*label dogfight\n*page_break\nThe skies, just moments ago so still and serene, are filled with fire, smoke and tracer. As De La Rosa enters the fray, he spots a pair of Republican fighters breaking off to attack the unguarded transports. Just as he begins to peel off towards them, his radio crackles into life,\n*line_break\n\"Jose!\" it's Joaquin, \"I've got three of them on me, I can't shake them, assistance needed!\"\n*line_break\nWhat should De La Rosa do?\n*choice\n\t#Protect the transports, they are the number one priority.\n\t\t*set dlrbrutal -5\n\t\t*goto transports\n\t#Save Joaquin, he's not just his wingman but his friend.\n\t\t*set dlrbrutal +5\n\t\t*goto joaquin\n*label transports\n\"Negative Blue Four, cannot assist, hostiles engaging the transports\".\n*line_break\n\"You bastard Jose! Fucking hell, I'm not going to last two minutes!\"\n*line_break\nDe La Rosa dives on the unsuspecting Red fighters from behind, waiting until the last moment to open fire. When he does so, his machine guns rip through the leading Red, shredding its tail and leaving it plummeting seawards. \n\nThe second one tries to evade, going into a sharp dive then an equally sudden climb but De La Rosa sticks stubbornly to his tail, not quite close enough to open fire but not letting him get away. Despite his desperate dodging and weaving, Jose stays glued to his tail, forcing the Red pilot into an error. \n*page_break\nThe Red temporarily loses control of his aircraft as he attempts to perform a barrel roll. The Flying Officer needs no second invitation and lines up his sights. At that moment, he sees Joaquin's NiD emerge from a stream of smoke at eleven o'clock high, two Republicans on him, fuel leaking from the tank.\n*choice\n\t#De La Rosa immediately goes to aid Joaquin.\n\t\t*goto jofirst\n\t#De La Rosa holds his nerve and his target.\n\t\t*set dlrbrutal -5\n\t\t*goto fighterfirst\n*label fighterfirst\nNot giving up a hard won opportunity, De La Rosa presses the fire button on his joystick. The machine guns burst into life and in a matter of seconds, the Red is aflame. Pulling away sharply, he searches the skies for his wingman. He sees what is left of Blue Four falling out of the sky, fuel tank on fire. He can see Joaquin jump out and pull his parachute. But Joaquin is on fire as well, desperately writhing, trying to put the flames out with his hands. It doesn't take long for the flames to spread up to the canopy of his parachute. It burns away with startling speed, leaving a burning Joaquin to tumble towards the sea, getting smaller and smaller until he's merely a brightly burning spec.\n*set joqdead true\n*goto endofthisbit\n*label jofirst\nHe can't bring himself to abandon his wingman and he lets the Red off the hook, he's clearly not a talented pilot anyway. Intersecting Joaquin's trajectory, De La Rosa closes in on the Reds from below. One of them sees his approach and turns off to meet him head on. \n\nThe two biplanes fly at each other at 200 kmph. The Red begins firing too soon, clearly a rookie. The majority of the rounds zip past his head. De La Rosa waits until he can virtually see the whites in the eyes of the Red pilot before letting out a short burst of fire from his machine guns and yanking the stick back to pull up and avoid a head on collision. The Red fighter misses him by mere inches, its engine crippled. \n*page_break\nDe La Rosa is on the tail of the fighter pursuing Joaquin. With the pilot constantly looking over his shoulder, it isn't long before Joaquin is able to shake him, leaving Jose free to hunt his prey. \n*line_break\n\"Thanks for the assist Jose,\" Joaquin begins, \"But did you have to leave it so bloody late! They nearly had me!\"\n*line_break\nDe La Rosa would reply but his pursuit was reaching a critical phase. A few moments later, when the Red has been dispatched, he replies, \n*line_break\n\"I've got to keep you on your toes Joaquin!\"\n*line_break\n\"Not fucking funny!\"\n*goto endofthisbit\n*label joaquin\nHe can't bring himself to abandon his wingman. Intersecting Joaquin's trajectory, De La Rosa closes in on the Reds from below. It seems Joaquin in his panic may have been exaggerating, there are only two Reds on him, not three. One of them sees his approach and turns off to meet him head on. \n\nThe two biplanes fly at each other at 200 kmph. The Red begins firing too soon, clearly a rookie. The majority of the rounds zip past his head. De La Rosa waits until he can virtually see the whites in the eyes of the Red pilot before letting out a short burst of fire from his machine guns and yanking the stick back to pull up and avoid a head on collision. The Red fighter misses him by mere inches, its engine crippled. \n*page_break\nDe La Rosa is on the tail of the fighter pursuing Joaquin. With the pilot constantly looking over his shoulder, it isn't long before Joaquin is able to shake him, leaving Jose free to hunt his prey. \n*line_break\n\"Thanks for the assist Jose,\" Joaquin begins, \"But did you have to leave it so bloody late! They nearly had me!\"\n*line_break\nDe La Rosa would reply but his pursuit was reaching a critical phase. A few moments later, when the Red has been dispatched, he replies, \n*line_break\n\"I've got to keep you on your toes Joaquin!\"\n*line_break\n\"Not fucking funny!\"\n*goto endofthisbit\n*label endofthisbit\n*page_break\n*if (vasdead = false)\n\tVery abruptly, the fighting seems to die down. At this point, the squadron leader would usually call in to check which planes are still in the air. But nothing comes from Vasquez. De La Rosa attempts to hail him,\n\t*line_break\n\t\"Blue Leader, this is Blue Three, do you copy?\"\n\t*line_break\n\tSilence, \"Blue Leader, do you copy?\" still nothing, \"Did anyone see Vasquez go down?\"\n\t*line_break\n\t\"Negative Blue Three\".\n\t*line_break\n\tDe la Rosa...\n\t*choice\n\t\t#Keeps the radio on the Nationalist channel, in the hope Vasquez will call in.\n\t\t\t*goto natrad\n\t\t#Tunes into the Republican channel to see if he can garner any information of Vasquez's whereabouts.\n\t\t\t*goto reprad\n*else\n\tVery abruptly, the fighting seems to die down. At this point, the squadron leader would usually call in to check which planes are still in the air. And Tello does just that,\n\t*line_break\n\t\"This is Blue Leader, do you copy Blue squadron?\"\n\t*line_break\n\t\"Blue Two standing by\" and so on. And so on. Why couldn't this idiot have been taken out? Jose wonders, he really is useless.\n\t*finish\n*label natrad\nHe and what is left of the squadron take up position protecting what remains of the transport convoy. Without any response from Vasquez, they can only assume he's bought it. \n*page_break\nSuddenly, he's under fire and three NiDs zoom past. Instantly, De La Rosa recognises Vasquez's plane, flanked by two Reds. It doesn't take long to put two and two together, even under fire. If only he'd killed the treacherous bastard in Morocco when he'd had the chance. With flames quickly enveloping the cockpit, De la Rosa realises that he cannot release his safety harness. It's become jammed somehow. His heart rate accelerates very quickly. He yanks at it repeatedly without success. Condensation on his goggles obscures his vision. It's getting awfully hot. He pulls with all his strength but it won't budge. This is so very unfair. But this is how it ends for Flying Officer Jose De La Rosa.\n*set dlrdead true\n*finish\n*label reprad\nFor a few moments the Republican channel is silent. Then it comes to life. \n*line_break\n\"This is squadron leader Vasquez of the Spanish Air Force, do any air force units copy?\"\n*line_break\n\"This is Red Five, identify yourself Vasquez\".\n*line_break\n\"My unit was stationed in Morocco, I had no chance but to obey army orders, however my loyalty is with the Republic. I am flying a NiD with markings of Nationalist 11 squadron, Blue Leader\".\n*line_break\n\"Copy that Vasquez, fly to coordinates 35.947019 by -5.374354 and you'll be escorted from there to a Republican air base\".\n*line_break \n\"Copy that\".\n*line_break\nDe La Rosa has a decision to make. He must...\n*choice\n\t#Take Vasquez out.\n\t\tThey leave the JU52s and move to the designated location. But when they get there, Vasquez is nowhere to be seen. At that moment, the radio comes alive,\n\t\t*line_break\n\t\t\"Mayday mayday! This is transport convoy, we're under attack! The Reds are back!\"\n\t\t*line_break\n\t\t\"No no no!\" De La Rosa howls, \"He's tricked us again!\"\n\t\t*line_break\n\t\tBy the time they get back to the transports, just three remain and the Reds are long gone.\n\t\t*line_break\n\t\t\"He'll pay for this...\" Jose murmurs, \"I won't let him get away with it. I [i]won't[/i]\".\n\t\t*finish\n\t#Let him go, the transports must be protected.\n\t\tAs much as he'd love to kill the snake, De La Rosa has to prioritise the transports over personal rivalries. They stick close the JU52s and see out the mission.\n\t\t*finish\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first two chapters are available for free? This is the end of the free content.\n\n[b]To find out what happens next, please purchase the remaining chapters.[/b]\n\n*purchase_discount adfree 2022-02-23 $4.99 $2.99 purchased\n*abort", "choicescript_description": "The Spanish Civil War is the setting of Divided We Fall. You will shape the lives of 4 Spaniards on both sides of the divide; will they be brutalised, stay true to their principles or even survive? You decide in this 130k word illustrated interactive epic.\n\n[i]Divided We Fall[/i] is a 140,000-word interactive novel by Alex Clifford. It's entirely text-based, fueled by the vast, unstoppable power of your imagination.\n\nIn 1936, Spain was a nation bitterly divided by politics, religion and class. These tensions exploded into one of the most brutal and ideological conflicts in history, the Spanish Civil War.\n\nIn this interactive novel, you will follow and shape the lives of four young Spaniards on both sides of the divide. There's a left-leaning police officer, a good Catholic girl who becomes a nurse, a patriotic fighter pilot and an anarchist militiawoman who takes up arms in the name of revolution.\n\nThrown into the hellish world of civil war, will our characters be brutalised, stay true to their principles or even make it out alive? Experience first-hand the intolerance, cruelty and courage of a conflict that still provokes strong emotions to this day in this 130,000 word illustrated interactive epic.", "choicescript_stats": "[b]Encyclopedia[/b]\n*label menu\n\nWelcome to the Divided We Fall Encyclopedia.\n*if july\n\t*image map1.png\n*if nov\n\t*image map2.png\n*if dec\n\t*image map3.png\n*if jul\n\t*image map4.png\n*if march\n\t*image map5.png\nCurrent War Situation\n*line_break\nRed = Republican-held territory\n*line_break\nBlue = Nationalist-held territory\n\nWhat would you like to look up?\n*choice\n\t*if jul = true\n\t\t#Map of the Ebro Front\n\t\t\t*goto ebro\n\t#Parties and Organisations\n\t\t*goto part\n\t#Military Units\n\t\t*goto milit\n\t#Leaders\n\t\t*goto lead\n\t#Firearms\n\t\t*goto fire\n\t#Aircraft\n\t\t*goto air\n\t#Picture Credits\n\t\t*goto piccred\n\t#Return to the story\n\t\t*goto return\n*label milit\n[b]Republican Units[/b]\n\n*image poparm.png left\n[b]Popular Army[/b]- Formed with heavy Communist influence in early 1937 to replace the various Republican militias, the Popular Army was the Popular Front government's attempt to form a regular army to fight the Nationalists. At its height, it had 750,000 men under arms and performed admirably considering the speed of its conception and the pressures it was under.\n\n*image pala.png left\n[b]Palafox Battalion[/b]- a battalion of the Popular Army, put together in June 1937. Initially it was part of 150th International Brigade and was made up of Poles, Russians and Spaniards, being transferred to the 13th International Brigade in October 1937. When the Internationals were demobilised in September 1938, 13th Brigade was reformed as an entirely Spanish conscript unit, and the same happened to Palafox.\n\n[b]Assault Guards[/b]- the Assault Guards were an urban armed police force, created in 1932 by the Republican government as the existing Civil Guard was seen as too conservative and reactionary. At the outbreak of the civil war, about two thirds of the organisation stayed loyal to the Republic. Those that did often played a vital role in securing various cities, such as Madrid and Barcelona, for the government in the first few days of the conflict. They later gained infamy for their role in putting down radical elements in the so-called \"May Days\".\n\n*image cnt.png left\n[b]CNT Militia[/b]- The anarchist trade union, the CNT, like other left wing parties and unions, formed armed militias at the outbreak of war. In Barcelona, where they were strongest, arms were distributed to them by the local Assault Guards. The militias succeeded in defeating the army in Barcelona and Catalonia, however were unable to make much headway on the Aragon Front. During 1937, most militias were incorporated into the Popular Army, although any women in the militias were at this time forced to take non-combat roles.\n\n[b]Nationalist Units[/b]\n\n*image aofa.png left\n[b]Army of Africa[/b]- Spain formally acquired a protectorate in Northern Morocco in 1912, although their presence there predated that. Between 1909 and 1926, Spain fought a bitter war in the protectorate against the natives. During that time, the Army of Africa became a brutalised frontier organisation, a law-unto-itself, running Morocco as their own military fiefdom. By the time of the war it was composed of 30,000 men of the Spanish Foreign Legion and the Moroccan Regulares.\n\n*image sfl.png left\n[b]Spanish Foreign Legion[/b]- La Legion was necessitated by the unexpected challenges that the army faced in Morocco and was established in 1920. Although actually composed for the most part of Spaniards, they considered themselves an elite and were certainly distinctive from the regular army with their ferocity and cruelty in battle. Francisco Franco earned his formidable reputation as commander of La Legion.\n\n[b]Regulares[/b]- Effectively mercenaries, the Regulares were recruited from the native Moroccan population and given Spanish officers. They had already gained infamy with their violence in putting down the 1934 General Strike and were widely feared for their brutality as well as their fighting ability. Of all the Nationalist forces in the war, the Regulares were regarded as the most savage and bloodthirsty, raping and pillaging their way across Southern Spain through 1936.\n\n*image avnac.png left\n[b]Aviacion Nacional[/b]- the Nationalist Air Force, made up of rebel elements of the Spanish Air Force (which itself had backed the Republic), the German Condor Legion and the Italian Aviazione Legionaria. It was heavily reliant on both German and Italian planes and pilots. They were particularly noted for their ruthless bombing of civilian populations, first in Madrid, and later in the notorious bombing of Guernica.\n*page_break\n*goto menu \n*label fire\n[b]Sidearms[/b]\n\n*image astra.png left\n[b]Astra 400[/b]- Standard issue sidearm of the Spanish military before, during and after the war. Used extensively by both sides.\n\n*image as900.png right\n[b]Astra 900[/b]- Spanish copy of the iconic C96 Mauser Pistol, popular amongst officers of both the Nationalist and Republican armies.\n\n[b]Rifles[/b]\n\n*image destroy.png left\n[b]Destroyer Carbine[/b]- Compact bolt-action rifle which utilised 9mm pistol rounds. Employed by the Spanish police forces, such as the Assault Guards.\n\n*image mosin.png right\n[b]Mosin-Nagant M91-30[/b]- Russian bolt-action rifle, thousands were supplied to the Republic by the Soviet Union.\n\n*image mauser.png left\n[b]Spanish Mauser M1916[/b]- Spanish version of the German Mauser rifle, was the standard rifle of the Spanish Army and therefore very common in both armies.\n\n[b]Submachine Guns[/b]\n\n*image mp28.png right\n[b]MP-28[/b]- Updated version of the MP-18, the world's first SMG, developed by Germany in WWI. Supplied to the Nationalists by the Germans but copies were also manufactured by the Republicans.\n\n*image ppd.png left\n[b]PPD-34[/b]- Soviet SMG provided to the Republicans. Could be fitted with a box or drum magazine, had an extremely high rate of fire.\n\n*image beretta.png right\n[b]Beretta M38[/b]- The Italian army's main SMG, used by the Italian forces in Spain and also supplied to the Nationalists.\n\n[b]Machine Guns[/b]\n\n*image hotch.png left\n[b]Hotchkiss M1914[/b]- French machine gun used during WWI. Was manufactured under licence in Spain and was the Spanish army's standard machine gun.\n\n*image dp.png right\n[b]Degtyaryov DP-28[/b]- Russian light machine gun with a distinctive pan-shaped magazine. Many examples were sold to the Republicans and the Civil War saw its first combat usage.\n\n*image maxim.png left\n[b]Maxim machine gun[/b]- The very first real machine gun, invented in Britain and manufactured all over the world, including in Spain, Russia and Germany. Was the most common Republican machine gun.\n*page_break\n*goto menu\n\n*label part\n*choice\n\t#Parties and Organisations loyal to the Republic\n\t\t*goto reppart\n\t#Parties and Organisations opposed to the Republic\n\t\t*goto natpart\n*label reppart\n[b]Parties and Organisations loyal to the Republic[/b]\n\n*image popfront.png right\n[b]The Popular Front[/b]- Initially being simply the reformation of the Republican-Socialist coalition, the Popular Front also enjoyed the participation of groups further to the Left, such as the Communists. Its victory in the February 1936 elections was also helped by the support of the Anarchists.\n\n*image cnt.png right\n[b]The Anarchists (CNT)[/b]- The CNT was the anarcho-syndicalist trade union. Spain was unique in having a large and genuinely popular anarchist movement, although support was concentrated on Barcelona, Catalonia and parts of the rural South. Anarchists believe in doing away with the state.\n\n*image pce.png right\n[b]The Communists (PCE)[/b]- The Spanish Communist party was relatively small at the beginning of the war but grew rapidly in power, influence and size for a number of reasons. Importantly they had control over Soviet aid and attracted white-collar workers with their moderation and discipline in the face of Anarchist revolution.\n\n*image psoe.png right\n[b]The Socialists (PSOE)[/b]- The Socialists were Spain's largest workers' party, their trade union, the UGT had over a million members. They were however fiercely divided between a revolutionary and a moderate wing. They dominated the Republican governments during the war and were a key pillar of the Popular Front.\n\n[b]The Republicans (IR + UR)[/b]- The IR (Republican Left) and UR (Republican Union) were moderate centre/centre-left middle-class liberal parties which joined the Popular Front. They were a key part all the governments from 1931-33 and 1936-39 (during the war), giving the workers' parties a respectable face. \n\n[b]The Trotskyists (POUM)[/b]- The POUM was a small Marxist party that rejected Stalinism and the Spanish Communists. They were only really strong in Barcelona however celebrated British author George Orwell fought in their militia. They were suppressed by the Communists in the events of the 'May Days' and their leader was killed by Soviet agents.\n\n*image basque.png right\n[b]The Basque Country (Euskadi)[/b]- A distinctive region in North-West Spain with its own language and culture, the Basque Country was promised autonomy by the Republic and granted independence in October 1936. Although generally a Catholic and Conservative people, the Basques fought with the Republic in return for self-governance. At an immediate disadvantage being cut off from the rest of the Republican zone, the Basques fought doggedly against Mola's Army of the North until their surrender in August 1937. Their independence had lasted 10 months.\n*page_break\n*goto menu\n*label natpart\n[b]Parties and Organisations opposed to the Republic[/b]\n\n*image falange.png right\n[b]The Falange[/b]- Spain's fascist party, founded by Jose Antonia Prima de Rivera in 1933. They took to violence to oppose the Second Republic and followed closely Hitler and Mussolini's example. Before 1936 they were a relatively small organisation, but after the defeat of the Alliance of the Right in the February 1936 elections, their ranks swelled considerably. Franco was later to take personal control of the party and use it as the basis for his Movimiento.\n\n*image ceda.png right\n[b]The CEDA[/b]- The Spanish Confederation of Autonomous Right-wing Groups. Formed in 1933 and led by Gil Robles, CEDA dominated parliament from 1933-36. Their aim was to forge a new, corporative, undemocratic state, bringing together ideas from both traditional Catholic conservatism and modern fascist ideology. Ultimately failed to take over the Republic from the inside and consigned to irrelevance by both defeat in February 1936 and the war.\n\n*image carlists.png right\n[b]The Carlists[/b]- A traditionalist and Catholic political movement with its origins the nineteenth-century Carlist Wars over the rightful heir to the Spanish throne. Carlism was strong in the rural North, especially Navarre. Carlist militias provided some of the Nationalists' bravest soldiers and wore distinctive red berets. The movement was forcibly incorporated into Franco's new Falange in April 1937.\n\n[b]The Movimiento Nacional[/b]- Formed in April 1937 when Franco forcibly merged all the political groups on the Nationalist side into one single movement under his personal control. The Movimiento was composed of the new Falange (FET y de las JONS) which was to be the instrument of his one-party state and a trade union, the Sindicato Vertical.\n\n[b]The Seccion Femenina[/b]- The Women's Section of the Falange, created in 1934. Initially it was merely intended to promote women's domestic role but was forced to take on more activities in war time. From 1937, it became the official state women's institution, educating women in Francoist ideology and religious morality. There were originally three branches, the Movimiento Femenino, Auxilio Social and Frentes y Hospitales but these were merged in 1938. \n*page_break\n*goto menu\n*label lead\n[b]Republican Leaders[/b]\n\n*image azana.png left \n[b]Manuel Azana[/b]- Leader of the Republican party and Prime Minister from 1931-33 and from February-May 1936, after which he became president. He served as president until March 1939, when, with the Republic on the brink of defeat, he fled to France. He was the key architect of the Popular Front and the Republican-Socialist coalition but played a limited role during the war itself. He died in November 1940, in Nazi-occupied France. \n\n*image prieto.png left \n[b]Indalecio Prieto[/b]- leader of the more moderate, social democratic wing of the Socialists (PSOE), Prieto was a strong ally of Azana and key in creating the Popular Front. He worked his way up from being a newspaper seller, to a journalist, to become one of the leading figures of Spanish politics. In the early months of the war, Prieto effectively acted as Prime Minister and in May 1937 he became Defence Minister, controlling the war effort. He resigned from this post in March 1938 and left for exile in Mexico, where he died in 1962.\n\n[b]Juan Negrin[/b]- Socialist and supporter of Prieto, Negrin was well-educated and from a middle-class background. He served as finance minister from September 1936 until May 1937, when he was appointed by Azana as Prime Minister, a position he held until the Republic's defeat in March 1939. Additionally, he took on the role War Minister after Prieto's departure. Negrin's policy was effectively to hold on as long as possible in the hope that a European war would break out and the democracies would come to the Republic's aid. To this end, he aligned himself closely with the Communists. He died in Paris in 1956.\n\n[b]Juan Modesto[/b]- Born in 1906, Modesto worked in a sawmill before joining the Spanish Foreign Legion and fighting in Morocco. After leaving the army, he joined the Communist party and in 1933 became head of their paramilitary organisation in Madrid. He attended a military training course in Moscow and passed with flying colours and so naturally led the Communist militia, the Fifth Regiment, when the war broke out. He was to become one of the Popular Army's most able commanders and was famed for not being afraid to lead from the front. Following the Republic's defeat, he left Spain for the Soviet Union and served in the Red Army in World War Two. He died in Czechoslovakia in 1969. \n\n[b]Nationalist Leaders[/b]\n\n*image franco.png left\n[b]General Francisco Franco[/b]- Europe's youngest general, Franco shot to fame for his exploits with the Spanish Foreign Legion in the Moroccan War. He was strongly patriotic, hated politicians and turned against the Republic when Manuel Azana shut down his military academy in 1931. In the CEDA-dominated governments of 1935 he served as Chief of Staff but was dismissed by the Popular Front. Although he was on the periphery of the plot against the Republic, he was of vital importance when the war began thanks to his reputation in the Army of Africa. From September 1936 to April 1937, he went about consolidating his personal leadership of the Nationalists, aided by the separate deaths of three of his main rivals. Militarily he was a competent, if unspectacular commander, preferring to fight a long, attritional war in order to purge his country of Reds. Upon his victory in March 1939 he became supreme leader (Caudillo) until his death in 1975.\n\n*image mola.png left\n[b]General Emilio Mola[/b]- Director of the coup against the Republican government launched in July 1936. Like Franco, he was a veteran of the Moroccan Wars and an able commander. He secured much of the North of the country in the early days of the rebellion and led the Armies of the North. The official leader of the rebels was General Sanjurjo, but he had died in a plane crash in July 1936, leaving Mola as the only credible rival to Franco to lead the Nationalists. Conveniently, Mola himself was killed in June 1937 when his own plane crashed in bad weather.\n\n*image primo.png left\n[b]Jose Antonio Primo de Rivera[/b]- son of General Miguel Primo de Rivera, military dictator of Spain from 1923-30, Jose Antonio founded Spain's fascist party, the Falange, in 1933. A charismatic leader, Rivera modelled himself on Hitler and Mussolini and shared their vision of a modern, corporative fascist state. The Falange was also of course strongly Catholic, patriotic and anti-communist. When the party took to street violence to oppose the Popular Front government, it was declared illegal and Rivera was arrested. He spent the early part of the war in a Republican gaol before being executed in November 1936. Before his death he had warned his supporters against allowing Franco to take control of the Falange.\n\n[b]Manuel Hedilla[/b]- described as an unsophisticated fascist thug, and even thought of by Franco as \"too Nazi\", Hedilla was Primo de Rivera's successor as leader of the Falange. He was played by Franco and his supporters, made to think he would be leader of the new Movimiento before being sidelined himself. Unwilling to accept his fate, he ordered the Falange to obey his, not Franco's orders and so he and his 'Old Shirt' supporters were arrested on 25th April 1937. He was sentenced to death on a charge of plotting to assassinate Franco and served four years in prison before being released.\n*page_break\n*goto menu\n*label piccred\n[b]Picture Credits[/b]\n\n[b]Maps:[/b]\n1- Map of the Spanish Civil War in July 1936 CC BY-SA 3.0\n*line_break\nNordNordWest, modifications by user:Sting, Grandiose (talk . contribs) - File:Iberian Peninsula location map.svg\n*line_break\nhttp://creativecommons.org/licenses/by-sa/3.0/\n*line_break\nColours edited\n\n2- Map of the Spanish Civil War in September 1936 CC BY-SA 3.0\n*line_break\nNordNordWest, modifications by user:Sting, Grandiose (talk) - File:Iberian Peninsula location map.svg\n*line_break\nhttp://creativecommons.org/licenses/by-sa/3.0/\n*line_break\nColours edited\n\n3- Map of the Spanish Civil War in October 1937 CC BY-SA 3.0\n*line_break\nNordNordWest, modifications by user:Sting, Grandiose (talk) - File:Iberian Peninsula location map.svg\n*line_break\nhttp://creativecommons.org/licenses/by-sa/3.0/\n*line_break\nColours edited\n\n4- Map of the Spanish Civil War in July 1938 CC BY-SA 3.0\n*line_break\nNordNordWest, modifications by user:Sting, Grandiose (talk) - File:Iberian Peninsula location map.svg\n*line_break\nhttp://creativecommons.org/licenses/by-sa/3.0/\n*line_break\nColours edited\n\n5- Map of the Spanish Civil War in February 1939 CC BY-SA 3.0\n*line_break\nNordNordWest, modifications by user:Sting, Grandiose (talk) - File:Iberian Peninsula location map.svg\n*line_break\nhttp://creativecommons.org/licenses/by-sa/3.0/\n*line_break\nColours edited\n\n6- Map of Ebro Front- In the Public Domain\n\n[b]Pictures[/b]\n\n1- Proclamacion de la II Republica CC BY-SA 2.0\n*line_break\nAlfonso Sanchez Portela - La proclamacion de la Segunda Republica (Madrid, 1931)\n*line_break\nhttp://creativecommons.org/licenses/by-sa/2.0/\n*line_break\nAn edited and recoloured verision of this image is used in the cover art. Additionally, this image is also seen on the final page with the date added.\n\n2- Foreign Legion with Heads, In the Public Domain\n\n3- Pilots in front of JU52 on airfield, In the Public Domain\n\n4- Women firing rifles at the Seige of the Alcazar, Toledo, In the Public Domain\n\n5- Republican militia advance 1936, In the Public Domain\n\n6- Fiat CR.32s in formation, In the Public Domain\n\n7- Italian Spanish Civil War poster, In the Public Domain\n\n8- CNT-FAI Spanish Civil War poster, In the Public Domain\n\n9- Bundesarchiv Bild 183-H25224, Guernica, Ruinen CC-BY-SA-3.0-de\n*line_break\nUnknown -  This image was provided to Wikimedia Commons by the German Federal Archive (Deutsches Bundesarchiv) as part of a cooperation project.\n*line_break\nhttp://creativecommons.org/licenses/by-sa/3.0/de/deed.en\n\n10- Bundesarchiv Bild 183-2006-1204-514, Spanien, Schlacht um Guadalajara,  CC-BY-SA-3.0-de\n*line_break\nStudnitz, von H.G. -  This image was provided to Wikimedia Commons by the German Federal Archive (Deutsches Bundesarchiv) as part of a cooperation project.\n*line_break\nhttp://creativecommons.org/licenses/by-sa/3.0/de/deed.en\n\n11- Bundesarchiv Bild 183-2006-1204-510, Spanien, Schlacht um Guadalajara CC-BY-SA-3.0-de\n*line_break\nStudnitz, von H.G. -  This image was provided to Wikimedia Commons by the German Federal Archive (Deutsches Bundesarchiv) as part of a cooperation project.\n*line_break\nhttp://creativecommons.org/licenses/by-sa/3.0/de/deed.en\n\n12- Republican T-26 tank with riders, In the Public Domain\n\n13- Finnish Bf-109s on the ground, In the Public Domain\n\n14- Polish International Brigaders on parade, In the Public Domain\n\n15- Polikarpov I-16-Spain (clipped) CC BY 2.0\n*line_break\nAlvaro from Getafe, Espana - cropped from File:Polikarpov I-16-Spain.jpg, original at Polikarpov I-16 Uploaded by Petronas\n*line_break\nhttp://creativecommons.org/licenses/by/2.0/\n\n16- Republican troops crossing the Ebro, In the Public Domain\n\n17- Franco in dress uniform 1960s, In the Public Domain\n\n18- Manifestacion republicana en Sol (2 de junio de 2014) CC BY-SA 3.0\n*line_break\nAsqueladd - Own work\n*line_break\nhttp://creativecommons.org/licenses/by-sa/3.0/\n*line_break\nDate added to the corner\n\nAll pictures within the Encyclopedia are in the public domain, with the following exceptions:\n\nFlag of the Basque Country CC BY-SA 2.5\n*line_break\nDaniele Schirmo aka Frankie688 - own work (modification of the former image at this page)\n*line_break\nhttp://creativecommons.org/licenses/by-sa/2.5/\n\nPortrait of Jose Antonio Primo de Rivera\n*line_break\nJoseAntonioFEJONS CC BY-SA 3.0\n*line_break\nFondo Marin. Pascual Marin - http://www.guregipuzkoa.net/photo/1113095?lang=es\n*line_break\nhttp://creativecommons.org/licenses/by-sa/3.0/\n\nDP-28 Picture, source: http://www.wp.mil.pl Polish Ministry of National Defence copyright.\n\nMP-28 Picture\n*line_break\nBergmann MP18.1 CC BY-SA 3.0\n*line_break\nQuickload at English Wikipedia (Original text: \"Edmond HUET (talk)\") - Edmond HUET\n*line_break\nhttp://creativecommons.org/licenses/by-sa/3.0/\n\nDestroyer Carbine Picture, source: http://www.adamsguns.com/\n\nAstra 900 Picture, source: http://www.adamsguns.com/\n\n*page_break\n*goto menu\n\n*label air\n[b]Fighters[/b]\n\n*image nid.png left\n[b]Nieuport-Delage NiD 52[/b]- French built biplane fighter from the Twenties, used by the Spanish Air Force. Armed with two machine guns, capable of 225 km/h (140 mph). Slow, unagile and unreliable and used by both the Republicans and Nationalists in the early stages of the war.\n\n*image fiat.png left\n[b]Fiat CR.32[/b]- Italian biplane fighter supplied to the Nationalists in great numbers by Italy. Armed with two machine guns, capable of 356 km/h (221 mph). It was well liked by pilots for its manoeuvrability and was probably the best biplane fighter in the world. By 1936 however, monoplane fighters such as the I-16 were leading the way. Was still used by Franco's airforce into the Fifties.\n\n*image rata.png left\n[b]Polikarpov I-16[/b]- Monoplane fighter from the Soviet Union, nearly 500 were supplied to the Republicans during the war. Armed with 2 machine guns, capable of 362 km/h (225 mph). Difficult to fly but faster and more agile than anything the Nationalists had until the Bf-109 came along. Nicknamed Rata (rat) by the Nationalists and Mosca (fly) by the Republicans.\n\n*image 109.png left\n[b]Messerschmitt Bf 109[/b]- German monoplane fighter, developed in the mid-late Thirties, saw first combat usage in Spain. Armed with 2 machine guns and 2 20mm cannons, capable of 470 km/h (292 mph). The first 109s saw action with the German Condor Legion in Spain in the spring of 1937 although it wasn't until 1938 that they appeared in large numbers. The 109 was far and away the most advanced fighter of the war and remained in production in Spain until 1958. Was Germany's main fighter in World War Two.\n\n[b]Bombers[/b]\n\n*image ju52.png left\n[b]Junkers Ju52[/b]- German transport aircraft, used by the Condor Legion in Spain as a bomber. Three man crew, three defensive machine guns, capable of carrying up to 500kg of bombload, top speed of 265 km/h (165 mph). Saw extensive use by the Luftwaffe in WWII.\n\n*image sm81.png left\n[b]Savoia-Marchetti SM.81[/b]- Italian medium bomber used by Italian and Nationalist forces in Spain. Six man crew, 6 defensive machine guns, capable of carrying up to 2000kg of bombload, top speed of 340 km/h (211 mph). Cutting edge for the mid-thirties, by the time WWII came about it was outdated.\n\n*image sb.png left\n[b]Tupolev SB[/b]- Soviet light twin-engined bomber, 93 examples were supplied to the Republic. Three man crew, four defensive machine guns, capable of carrying 1100kg of bombload, top speed of 450 km/h (280 mph). A remarkably fast bomber that could outrun most Nationalist fighters, with the exception of the 109. \n*page_break\n*goto menu\n\n*label ebro\n*image ebro.png\nThe Ebro Front as of 24th July 1938.\n*page_break\n*goto menu\n\n*label return\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game.\n\n  *purchase_discount adfree 2022-02-23 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n\n", "epilogue": "*temp married false\n*set jul false\n*set march true\n*image map5.png\n*if moralesdead = true\n\t*if mariadead = true\n\t\t*if dlrdead = true\n\t\t\t*if albadead = true\n\t\t\t\t*achieve alldead\n*if moralesdead = false\n\t*if mariadead = false\n\t\t*if dlrdead = false\n\t\t\t*if albadead = false\n\t\t\t\t*achieve bulletproof\n*if morbrutal \u003c50\n\t*if marbrutal \u003c50\n\t\t*if dlrbrutal \u003c50\n\t\t\t*if albabrutal \u003c50\n\t\t\t\t*achieve brutal\n*if morbrutal >49\n\t*if marbrutal >49\n\t\t*if dlrbrutal >49\n\t\t\t*if albabrutal >49\n\t\t\t\t*achieve moral\nOver four months of bitter fighting on the Ebro, the Popular Army was completely shattered, losing vast quantities of men and equipment that simply couldn't be replaced.\n\nIn January 1939, Franco launched his offensive into Catalonia and the broken Republicans crumbled. Outnumbered six to one, the Popular Army gave up Barcelona, which was taken by the Nationalists on 26th January. 500,000 Republican soldiers and refugees fled across the Pyrenees to an uncertain future in France.\n*page_break\n30% of Spain was still in Republican hands but their army and morale was broken. Prime Minister Negrin insisted they keep fighting, keep resisting. The European War he was hoping for could surely not be far away. But not everyone agreed. On 5th March factions within the Republican government and army launched a coup against Negrin. They naively hoped that a negotiated peace with Franco was still possible.\n\nFranco watched on with glee as his enemies killed one another in a civil war within the civil war. Negrin fled and on 26th March, Franco launched his final offensive. The Nationalists faced virtually no resistance, marching unopposed into Madrid, the city so many had fought and died to defend. On 1st April 1939, General Francisco Franco declared victory. The war was over and Spain was his.\n*page_break\nJust five months later, the World War the Republicans had been so desperately hoping for began in earnest, as Germany invaded Poland. While the globe burnt in seven years of brutal war, Franco wisely kept out of it and set about consolidating his dictatorship. He did so through terror and repression. 400,000 of his political enemies were imprisoned in labour camps and as many as 200,000 were murdered.\n*page_break\n*if moralesdead = true\n\tAdrian Morales was one of an estimated 115,000 who died defending the Republic. Republican war dead were the vanquished and so were denied the basic honours befit of war dead. No graves, no memorials, no ceremonies. Morales' parents didn't know where he was buried, didn't have a grave to visit. He didn't have any children or a wife. He was forgotten.\n\t*goto alba\n*else\n\t*if morbrutal \u003c50\n\t\t6.26 P.M.\n\t\t*line_break\n\t\t18th April 1942\n\t\t*line_break\n\t\tMauthausen Concentration Camp, Austria\n\t\t*line_break\n\t\tAdrian Morales\n\n\t\tLike so many thousands of others, in January 1939 Morales had fled across the Pyrenees mountains on foot to France. There they had expected, or at least hoped for a warm welcome. Instead they were herded into makeshift Internment camps. Morales' had been merely an unsheltered section of beach enclosed by barbed wire.\n\n\t\tBut then the Nazis had come. France surrendered on 22nd June 1940, meaning tens of thousands of Spaniards fell into German hands. In early 1941, Morales along with over 7,000 other Spanish Republicans were transferred to Mauthausen, a concentration camp in Austria.\n\t\t*page_break\n\t\tThe inmates were mostly left-wingers from across Nazi-occupied Europe as well as Polish and Soviet prisoners of war. They worked as slave labourers making munitions.\n\n\t\tThe alarm for the end of the day's work goes,\n\t\t*line_break\n\t\t\"Come on, let's get moving!\" Morales barks in heavily accented German. The inmates trudge past the conveyor belts towards the huge steel doors, \"Come on you filthy shits, I haven't got all day!\"\n\t\t*line_break\n\t\tHe brushes some dirt from his uniform. It's the uniform of a camp Kapo. He helps with the administration, supervision of forced labour and maintaining order. In exchange he gets extra food rations, alcohol, cigarettes and access to the camp's more shady facilities known as the Joy Division...\n\t\t\n\t\tAs one of the inmates files past him, he spits on Morales' boot,\n\t\t*line_break\n\t\t\"Traitor,\" he hisses under his breath, in Spanish.\n\t\t*line_break\n\t\tMorales grabs him and knees him in the stomach, before throwing him to the ground\n\t\t*line_break\n\t\t\"Say that again! Say that again and see what happens!\"\n\t\t*line_break\n\t\t\"Traitor\".\n\t\t*line_break\n\t\tMorales brings down his leather crop across his face, drawing blood.\n\t\t*line_break\n\t\t\"Say it again!\"\n\t\t*line_break\n\t\t\"...traitor...\"\n\t\t*line_break\n\t\tThis time Morales kicks the grounded man full in the face with all his strength. He collapses onto his back. There's a flicker of recognition as he gets a proper look at the man's face. Beaten and bloodied it is, but somewhere Morales thinks he sees someone he knows. A soldier who served under him. It doesn't matter now. He walks away.\n\n\t\tHe wasn't proud of what he'd become. But he was surviving. And that was what was most important. For six years now he'd been living a hellish existence surrounded by violence, suffering and death. Over that time he'd learnt that human life is cheap, expendable, at least in his world. It was a horrific nightmare from which there seemed no prospect of waking up.  \n\t\t*goto alba\n\t*else\n\t\t6.26 P.M.\n\t\t*line_break\n\t\t8th April 1942\n\t\t*line_break\n\t\tMauthausen Concentration Camp, Austria\n\t\t*line_break\n\t\tAdrian Morales\n\n\t\tLike so many thousands of others, in January 1939 Morales had fled across the Pyrenees mountains on foot to France. There they had expected, or at least hoped for a warm welcome. Instead they were herded into makeshift Internment camps. Morales' had been merely an unsheltered section of beach enclosed by barbed wire.\n\n\t\tBut then the Nazis had come. France surrendered on 22nd June 1940, meaning tens of thousands of Spaniards fell into German hands. In early 1941, Morales along with over 7,000 other Spanish Republicans were transferred to Mauthausen, a concentration camp in Austria.\n\t\t*page_break\n\t\tThe inmates were mostly left-wingers from across Nazi-occupied Europe as well as Polish and Soviet prisoners of war. They worked as slave labourers making munitions.\n\n\t\tThe alarm for the end of the day's work goes,\n\t\t*line_break\n\t\t\"Come on, get moving!\" the Kapo barks in German.\n\t\t*line_break\n\t\tMorales files out through the huge steel doors, out into the open. He's a shadow of his former self, gaunt, losing his hair and teeth as well. The food rations were not enough to survive on considering how hard they were worked. That was deliberate policy.\n\t\t\n\t\tThe evening sun is shining and Morales feels the warm rays beat down on his back. He smiles, the first time he's done that for a while. He's been giving half his food to a mother with an infant child in his block for the last few weeks. But it's taken its toll on him physically.\n\n\t\tFor the past six years now, he'd been living a hellish experience surrounded by violence, suffering and death. It was a horrific nightmare that he was longing to wake up from. But when he opened his eyes every morning he was still in hell.\n\t\t*goto alba\n*label alba\n*page_break\n*if albadead = true\n\tAlba Reyes was one of thousands of women in the Republican zone who took up arms in defence of democracy and revolution. Despite the fact that women with guns was considered too revolutionary by the government and most had been taken out of the line by 1937, this marked a watershed for women's role in society. A new organisation, Mujeres Libres (Free Women) was created calling for women's liberation and attracting over 30,000 members. \n\n\tBut all that was wiped out by Franco, whose Fascist Catholic state put women firmly back in their place. Women would have to wait nearly forty years for progress.\n\t*goto maria\t\n*else\n\t\t10.47 P.M.\n\t\t*line_break\n\t\t9th March 1944\n\t\t*line_break\n\t\tOutskirts of Lyon, Southern France\n\t\t*line_break\n\t\tAlba Reyes\n\n\t\tAlba had escaped from Catalonia to France in early 1939 and like so many of her compatriots, had ended up in an internment camp. However, when the Nazis had arrived, she had no intention of staying locked up.\n\n\t\tSo she organised a break out with about fifty others. On the run in a foreign country where she knew no one in the middle of a global war against fascism, she did what seemed to her to be the only logical thing to do; she joined the French Resistance.\n\n\t\tCurrently she is making her way through the night to rendezvous with a British agent, Docherty, who has been aiding them. She sees him lurking in the shadows behind a Tabac. She approaches him in complete silence, and presses her pistol into the back of his neck.\n\t\t*line_break\n\t\t\"Don't move\".\n\t\t*line_break\n\t\t\"Alba, I don't think I've met anyone quite like you,\" he replies, they converse in French.\n\t\t*line_break\n\t\t\"No, I don't think I have either...\"\n\t\t*line_break\n\t\t\"Well, how did it go with our friend Mayor Richard?\"\n\t\t*line_break\n\t\tThe local mayor was a collaborator par excellence. Alba had paid him a visit tonight to [i]dissuade[/i] him from further cooperation with the local Nazis.\n\t\t*if albabrutal \u003c50\n\t\t\t*line_break\n\t\t\t\"Well,\" Alba begins, \"Let's just say he won't be bothering us anymore,\" she had strangled him with his own neck tie, \"I did have one or two problems...\" the mayor's two young children had seen her leave his bedroom after she had killed him, \"But I cleaned up after myself,\" she had disposed of them.\n\t\t\t*line_break\n\t\t\t\"Did you have to kill him?\"\n\t\t\t*line_break\n\t\t\tAlba shrugs her shoulders,\n\t\t\t*line_break\n\t\t\t\"Why not?\"\n\t\t*if albabrutal >49\n\t\t\t*line_break\n\t\t\t\"I broke in while he and his family were out this evening. I left a note in his underwear draw. I think he might take note when he reads it...\" the note had read 'Keep working with the Nazis and your wife will find out what you do on Friday evenings'.\n\t\t\t*line_break\n\t\t\t\"Do you think he'll pay any attention?\"\n\t\t\t*line_break\n\t\t\t\"I know he will\".\n\t\t*page_break \n\t\t\"Anyway,\" Docherty continues, \"There's been a change of plan tonight. Our American friends have finally decided to join us, a couple of operatives from their OSS. So, we best go and welcome them to France\".\n\t\t*line_break\n\t\tThey go to the edge of town, to a small, quiet bar that is to be the meeting point. To avoid suspicion, the two of them buy drinks and sit down together, posing as a couple. Presently a pair of rather well-built, stocky men enter. Alba recognises one of them instantly. It's Goff. They sit down with Alba and Docherty.\n\t\t*line_break\n\t\t\"Alba, you are the last person I expected to see here\".\n\t\t*line_break\n\t\t\"I could say the same about you! I see your United States have found a use for you then? What you learnt in Spain useful is it?\"\n\t\t*line_break\n\t\t\"Very useful indeed, a lot of us American Internationals have ended up in OSS. You could say I'm in a way responsible for that, I recruited most of them. I'm a Captain now\".\n\t\t*line_break\n\t\t\"Impressive,\" Alba doesn't recognise the other American, \"And what about Aalto, you recruited him too surely?\"\n\t\t*line_break\n\t\tGoff shifts uncomfortably in his seat.\n\t\t*line_break\n\t\t\"What?\" Alba questions, \"You didn't recruit Aalto? But he was the best!\"\n\t\t*line_break\n\t\t\"We did alright,\" Goff replies, \"We did recruit him. But he was dismissed\".\n\t\t*line_break\n\t\t\"But why? He was a great soldier!\"\n\t\t*line_break\n\t\t\"Because,\" Goff lowers his voice, \"He confessed to me that he was a homosexual\".\n\t\t*line_break\n\t\tAlba is taken aback.\n\t\t*line_break\n\t\t\"I had no choice but to report it to my superiors,\" Goff continues, \"And they had no choice but to dismiss him\".\n\t\t*line_break\n\t\t\"And that was more important than him being good at his job?\" Alba is outraged.\n\t\t*if les = true\n\t\t\tShe is about to mention about her and Isabel but she holds her tongue. It's probably best not to let Goff know about that.\n\t\t*line_break\n\t\t\"Look, I hate to interrupt this little reunion,\" Docherty interrupts, \"But we do actually have a job to do tonight other than reminisce\".\n\t\t*line_break\n\t\t\"He's right,\" Goff says, \"We'll talk about this later. Now are you still as good a fighter as I remember?\"\n\t\t*line_break\n\t\t*if albabrutal \u003c50\n\t\t\tAlba smirks,\n\t\t\t*line_break\n\t\t\t\"Goff, for the last eight years killing fascists has been my full-time occupation. I have no intention of stopping yet\".\n\t\t*if albabrutal >49\n\t\t\tAlba sits back in her chair,\n\t\t\t*line_break\n\t\t\t\"Goff, the last eight years of my life have been devoted to fighting the fascists. They wear a different uniform here but they're the same inside. I have no intention of stopping just yet\".\n\t\t*goto maria\n*label maria\n*page_break\n*if mariadead = true\n\tMaria Farfan was one of an estimated 50,000 Nationalist civilians to be murdered in the Spanish Civil War. The so-called Red Terror saw many of the Republic's enemies murdered, often by angry mobs or fighters taking the law into their own hands as central authority broke down. Included in that figure is almost 7,000 members of the clergy; priests, monks, nuns, Jesuits, killed for their crimes, real or imagined, against the Republic.\n\t*goto next\n*else\n\t*if dlrship = false\n\t\t*if raped = true\n\t\t\t*goto bad\n\t\t*else\n\t\t\t*goto good\n\t*if dlrship = true\n\t\t*if surname = \"De La Rosa\"\n\t\t\t*if dlrdead = true\n\t\t\t\t*goto bad\n\t\t\t*else\n\t\t\t\t*set married true\n\t\t\t\t*goto good\n\t\t*else\n\t\t\t*set married true\n\t\t\t*goto good\n\n*label good\n11.06 A.M.\n*line_break\n12th September 1947\n*line_break\nPamplona, Navarre\n*line_break\n*if dlrship = true\n\tMaria $!{surname}\n*if dlrship = false\n\tMaria Farfan\n\n*if marbrutal \u003c50\n\t\"And that's why the only good Red is a dead one. They did the most unspeakable things. Rape, murder, theft of every kind\".\n\t*line_break\n\t\"My mother said that Franco was just as bad\".\n\t*line_break\n\t\"Well your mother is wrong. Franco led a crusade, a holy war against the atheists. The Pope blessed us and our cause. The Reds on the other hand murdered thousands of clergy. The Reds were subhuman\".\n\t*line_break\n\t\"Oh\".\n*if marbrutal >49\n\t\"And that is why Franco triumphed. His faith and that of his followers was what allowed him to prevail over the atheist Reds\".\n\t*line_break\n\t\"My mother said that Franco was just as bad as the Reds though\".\n\t*line_break\n\t\"Well I'm not sure that is true. The Reds lacked any basic morality. The Pope blessed our cause. Their cause was blessed by Stalin\".\n\t*line_break\n\t\"Oh\".\n*line_break\n\"Ok class,\" Maria announces, that'll do for today. For your homework, I want you to read the chapter on Franco's early career in your textbooks and make notes\".\n*line_break\nA moan goes around the classroom,\n*line_break\n\"I'll be testing you on it next time so don't even think about not doing it!\"\n*line_break\nAfter the war, Maria had been at a loss for a while. Eventually she found her calling in teaching. There was a big demand for special Falange SF teachers to 're-educate' the thousands of orphans of Reds killed or imprisoned.\n*line_break\n\"Ma'am,\" one of her pupils, a ten year-old girl named Dolores, \"You know how you've been teaching us about marriage and all that?\"\n*line_break\n\"Yes, marriage is the foundation of society. It is a woman's role to find an appropriate husband and raise his children as good Christians\".\n*line_break\n\"Yes, I was just wondering, are you married Ma'am?\"\n*if married = false\n\t*line_break\n\tMaria folds her arms, shifting uncomfortably and avoiding the children's gaze,\n\t*line_break\n\t\"Well... I... No, I am not married if you must know Dolores\".\n\t*line_break\n\t\"Why Ma'am?\"\n\t*line_break\n\tMaria is slightly cross,\n\t*line_break\n\t\"That's quite enough Dolores, to be frank, it is none of your business. Class dismissed!\"\n\t\n\tOnce they're gone Maria sits down. Dolores had caught her off guard. To be truthful to herself, that question had troubled her for some time and she was still no closer to the answer. Gabrielle was long gone with her new man. She was going to be thirty this year. She didn't know any other thirty year-old women who weren't married. She wipes a single tear from her eye.\n\t*goto next\n*else \t\n\t*line_break\n\tMaria smiles, \n\t\"Yes I am as it happens\".\n\t*line_break\n\t\"Oh, what's his name? What does he do?\"\n\t*line_break\n\t\"His name is $!{man}. I met him during the war. He was a fighter pilot, he's still in the airforce actually. He's very important\".\n\t*line_break\n\t\"Do you have any children?\"\n\t*line_break\n\t\"But of course, I have a little girl and a little boy\".\n\t*line_break\n\t\"And...\"\n\t*line_break\n\t\"Now now, I think that's quite enough Dolores, you'll have to wait until tomorrow if you want any more stories from me. Class dismissed!\"\n\t*goto next \n\n\n\n*label bad\n*page_break\n11.06 A.M.\n*line_break\n12th September 1947\n*line_break\nPamplona, Navarre\n*line_break\nMaria Farfan\n\nMaria had been saved from the Reds by the advancing Nationalist army. But that was when her problems had begun.\n*if dlrship = true\n\tThe news that $!{man} had been killed had been an immense shock. At first she had simply refused to believe it. But as the weeks went on, she was faced with no choice but to accept reality, how ever dreadful that may be. An abortion was of course out of the question in a Catholic state. She would have to have $!{man}'s child.\n\t*if raped = true\n\t\tAnd of course the possibility that the child was in fact a product of her rape hangs over her like a shadow. It makes her feel physically sick at times.\n\tBut she wouldn't be allowed to have the child for very long.\n*if dlrship = false\n\tAn abortion was of course out of the question in a Catholic state. She would have to have the child which was the unwanted product of her rape. But she wasn't allowed to have it very long. \n\nShe had gone through the trauma of giving birth, held her new-born baby for the first and last time and then never seen him again. She hadn't even been allowed to name him. She wasn't allowed to make contact of any sort or know where he was. He'll be eight now.\n\nMaria meanwhile, had been taken to a correctional institute for 'fallen women'. Effectively kept prisoner by the nuns, she lives a mundane existence revolving around prayer and menial labour.\n\n*if marbrutal \u003c50\n\tShe hadn't taken it lying down. Maria is a violent, defiant inmate. Over the years she's injured no less than nine of the sisters through various creative methods; everything from sharpened pencils to making a blade by slowly whittling the end of her toothbrush. But her resistance had achieved little.\n*if marbrutal >49\n\tShe had been a model prisoner, always excellently behaved, polite and respectful to the sisters. She partook fully in the religious side of things, she kept her faith; she had always been a sincere Catholic. And yet so far, it had done her little good.\n\nShe is of course deeply unhappy. Not just with her confinement, which is driving her slowly mad. \n*if dlrship = true\n\tAnd it's not just the immense grief she still feels for $!{man}. It seems like a different lifetime ago when she was last with him, that beautiful, halcyon week in July 1938. It feels like it was a different woman who lived through that.   \nBut far more painful is the knowledge that somewhere, with some other parents, or in some orphanage is her son. And she can never see him. Ever. \n*goto next\n\n\n*label next\n*page_break\nThrough the fifties and sixties, Franco's Spain modernised and prospered, thanks in no small part to aid from and trade with the United States. In the context of the Cold War, successive U.S. administrations were willing to back Franco; better a fascist dictatorship than a Red Republic.\n*image franco2.png\nAs Franco aged, he was troubled by the problem of succession. The royal family had been invited back to Spain in 1948, although given no real power, the Caudillo had kept that for himself. In 1969 he chose Prince Juan Carlos to be his successor as head of state.\n\nWhen the dictator finally died in 1975, King Juan Carlos was expected to continue the dictatorship. But he didn't. He set about undertaking a transition to democracy, turning the fascist state into a constitutional monarchy. On 15th June 1977, the first elections to be held in Spain for forty-one years took place. The result was a victory for the Union of the Democratic Centre. \n\nBut as the new government went about dismantling the dictatorship, many of the elite of the old regime were left disillusioned. Plans for a coup were hatched...\n*page_break\n*if dlrdead = true\n\tJose De La Rosa, like around 90,000 other Nationalist military personnel, gave their lives for Franco and for the Nationalist cause. Franco honoured those who died for him with grand war memorials and cemeteries. He himself chose to be buried at the monumental 'Valley of the Fallen', the main memorial to the Nationalist war dead.  \n\t*goto final\n1.12 A.M.\n*line_break\n24th February 1981\n*line_break\nCentral Madrid\n*line_break\nAir Marshall Jose De La Rosa\n\nDe La Rosa sits in the dimly lit office, telephone to his ear, waiting for a response. Things were not going to plan. He taps nervously on the table. Still no reply. The phone keeps on ringing. But Tejero isn't picking up.\n\nThe last Jose had heard, Tejero had succeeded in taking the parliament building. And in Valencia Bosch has put tanks on the streets and declared a state of emergency. But the King hadn't come out for them yet. De La Rosa is getting more and more worried. This reminds of the last coup he was involved in, over forty years ago, when he learnt that the airforce hadn't joined it.\n\nFrustrated, he puts down the phone and turns on the television. There he is. The King. He's on the television in full military uniform, addressing the nation. Is this it?\n*line_break\n\"The crown, symbol of the permanence and unity of the nation, cannot tolerate, in any form, actions or attitudes attempting to interrupt the democratic process\".\n*line_break\nResignedly De La Rosa switches off the television, runs his fingers through his hair and sighs heavily. That's it then.\n*page_break\n*if dlrbrutal \u003c50\n\tOr is it? Maybe with just a few more prominent military figures they could just pull it off... Jose snatches the phone back up and rapidly punches in a number. But nothing happens. He can't get through. The police must have cut off the Airforce ministry's phones.\n\t\n\tThen, from outside he hears police cars pulling up. They've come for him. He can't go to prison at his age. He looks at the pistol on the desk. He'd promised himself he would if it all went wrong. \n\t*if mariadead = false\n\t\t*if girl = \"Maria\"\n\t\t\tTo tell the truth, he had had very little to live for since Maria had passed away nearly a decade ago.\n\t*if girl = \"Gabrielle\"\n\t\t*if gabdead = false\n\t\t\tTo tell the truth, he had had very little to live for since Gabrielle had passed away nearly a decade ago.\t\t\t\n\n\tHe picks up the Astra 900. He's had this since the war, over forty years ago. The police are inside the building now, he can hear them. He puts the pistol in his mouth. This is going to be his last breath, he tells himself. \n\n\tThe police are right outside the door now and he's still not done it. That's at least three more breaths he's stolen. Ok, this one, this is going to be the last one. Jose inhales deeply, savouring his last lung-full of oxygen. Right. He's ready now. The policemen outside hear a shot.\n\t*goto final\n*else\n\tOr is it? \n\t*if mariadead = false\n\t\t*if girl = \"Maria\"\n\t\t\tHe wishes Maria was here. She would have known what to do. She had passed away nearly a decade ago.\n\t*if girl = \"Gabrielle\"\n\t\t*if gabdead = false\n\t\t\tHe wishes Gabrielle was here. She would have known what to do. She had passed away nearly a decade ago.\t\t\t\n\n\n\tA thought enters De La Rosa's mind, an idea. There's one more thing he can do, one more card he can play. He can't go to prison at his age. Jose snatches the phone back up and rapidly punches in a number.\n\n\tHe rings the police and tells them everything he knows about the coup; the names of all the conspirators he knows of, the military units involved, the schedule set out by the plotters.\n\n\tJose's change of heart was enough to have his gaol sentence for Treason reduced from thirty to five years. He was released after two on compassionate grounds, his health failing. \n\n\n*label final\n*page_break\nThe attempted military coup of 23rd-24th February 1981, known as 23-F, had aimed to turn back the clock and restore the Francoist system. It had been the intention that the King was to take on the role of Caudillo. But when it became clear that the King was not willing to back them, the conspiracy quickly collapsed and the plotters were rounded up.\n\nThe coup marked a watershed, after which, Spain's transition to democracy was finally secure. The new nation was welcomed into Europe, Catalonia and the Basque Country were granted self-government, the past was forgiven and forgotten. On 19th June 2014, King Juan Carlos I abdicated, age 76, to allow his son to succeed to the throne. Across the country, there were protests on the streets calling for the reestablishment of the Republic. So far, their demands have been ignored.\n*line_break\nViva la Republica! Viva Espana!\n*image final.png\n*page_break End\nWe hope you've enjoyed playing [i]Divided We Fall.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*image number4.png\nFrom the commanding position of the rooftop, Alba and her comrades can spot easily the soldiers in the telephone exchange. However, their lack of marksmanship lets them down; trained soldiers would have had a field day, but the amateur anarchists struggle to hit anything at this range. Presently, one of their number is picked off. They all go to ground. There must be a sniper! Alba orders her militia...\n\n*fake_choice\n\t#Off the roof, this position is too exposed.\n\t#To suppress the sniper and force him to retreat.\n\t#Stay low and try and spot him.\n\n*script changeBackgroundColor(\"black\")\n\n[b]Encyclopedia[/b]\nWelcome to the Divided We Fall Encyclopedia.\n*image map4.png\nCurrent War Situation\n*line_break\nRed = Republican-held territory\n*line_break\nBlue = Nationalist-held territory\n\nWhat would you like to look up?\n*fake_choice\n\t#Map of the Ebro Front\n\t#Parties and Organisations\n\t#Military Units\n\t#Leaders\n\t#Firearms\n\t#Aircraft\n\t#Picture Credits\n\t#Return to the story\n\n*script changeBackgroundColor(\"sepia\")\n\n\"Rodriguez, there's a bastard Rata on my tail, can't shake him, I need an assist\".\n*line_break\n\"I can't see you Blue Three, and I'm kind of busy here, got one on me as well!\"\n*line_break\n\"Anyone, I need cover!\"\n*line_break\nThere's no response. Well there is, it's just there's so much going on it's impossible to tell who's saying what, there's so much chatter. De La Rosa has to do something, so he...\n*fake_choice\n\t#Barrel rolls.\n\t#Loops the loop.\n\t#Dives.\n\n\"No, it'll do more good on this side, we need all the firepower we can get if we want to hold on\".\n*line_break\n\"Very well Commander\".\n*line_break\n\"Now, for the rest of our resources...\" Morales considers his options.\n*image ebro2.png\n\"I think we'll put the anti-tank guns...\n*fake_choice\n\t#With First and Second Company\".\n\t#With Third Company\".\n\t#With Fourth Company\".\n\t#In reserve with Fifth Company\".\n\nThey are assigned three of the fresh batch of wounded to attend to. \n*line_break\n\"This one has been shot through the leg several times. Wounds have been well dressed, they've stopped the bleeding at least,\" Eskarne reports.\n*line_break\n\"And this one's got, well these must be third degree burns. Pretty bad, all over his body\".\n*line_break\nThe final casualty wears a different uniform to the others. It's a Republican uniform. He's a Basque. Eskarne examines him,\n*line_break\n\"He's got very serious wounds, he's been shot in the chest,\" she puts her head to his chest, \"I think he's got a collapsed lung!\"\n*line_break\nOfficial orders are that Nationalist casualties are to be treated before Reds in any and all circumstances. They both know that all too well.\n*line_break\n\"This man [i]will[/i] die if he isn't operated on immediately,\" Eskarne protests.\n*line_break\nMaria hesitates. The other two injuries are probably not life-threatening, although the burns are very severe and it is possible that he may be suffering from smoke inhalation. The inside of his lungs might be burnt. If that is the case, his life may well be in danger. Maria decides to...\n*fake_choice\n\t#Take the Basque to theatre\n\t#Take the burns victim for further examination.\n\t#Treat the soldier with the wounded leg.", "startup": "\n*title Divided We Fall\n*author Alex Clifford\n*scene_list\n\tstartup\t\n\tchaptertwo\n\t$ chapterthree\n\t$ chapterfour\n\t$ chapterfive\n\t$ chaptersix\n\t$ chapterseven\n\t$ epilogue\n\t\n\n*create babydead false\n*create prietodead false\n*create moralesdead\tfalse\t\n*create marfas false\n*create medictrain false\n*create polmed false\n*create vasdead false\n*create prisdead false\n*create lopdead false\n*create friend \"NOT\"\n*create militia 40\n*create albalead false\n*create sniperdead false\n*create pristaken false\n*create alonsopinned false\n*create correct 0\n*create forcedto false\n*create fanjulcap false\n*create fanjulkilled false\n*create fanjulsuicide false\n*create answertoten false\n*create vidrship false\n*create dlrdead false\n*create mariadead false\n*create albadead false\n*create joqdead false\n*create gonewrong false\n*create goingwell false\n*create usehim false\n*create date false\n*create helpbasque false\n*create albaread false\n*create shotdown false\n*create gabbitter false\n*create marregret false\n*create dlrship false\n*create prietowithyou false\n*create alonsowithyou false\n*create july true\n*create nov false\n*create dec false\n*create jul false\n*create march false\n*create marjoq false\n*create marrod false\n*create baby \"Clara\"\n*create girl \"none\"\n*create abortion false\n*create man \"he\"\n*create gabdead false\n*create gowalt false\n*create morbrutal 50\n*create raped false\n*create blancap false\n*create garcap false\n*create ambushdead false\n*create murderer false\n*create roddead false\n*create marbrutal 50\n*create dlrbrutal 50\n*create albabrutal 50\n*create surname \"none\"\n*create les false\n\n*achievement bulletproof visible 30 Bulletproof\n\tAll characters survive the war.\n\tAll characters survived the war.\n*achievement alldead visible 20 Don't Look Back in Anger\n\tAll characters die in the war.\n\tAll characters killed in the war.\n*achievement brutal visible 20 Reason is Treason\n\tChoose the path of violence.\n\tAll characters become brutalised.\n*achievement moral visible 20 Time for Heroes\n\tChoose the path of morality.\t  \n\tAll characters remain moral.\n*achievement lawyer visible 10 Legal High\n\tDefend yourself in court.\n\tSuccessfully defended yourself in court.\n*achievement winvote visible 10 Electioneer\n\tBe victorious when it comes to a vote.\n\tWon the vote.\n*achievement dlrgab visible 10 Gentlemen prefer blondes\n\tSelf-explanatory, no?\n\tRomanced Gabrielle.\n*achievement dlrmar visible 10 Take Me Out\n\tHow could you resist?\n\tRomanced Maria.\n*achievement badstart visible 10 Bad Start\n\tGet off to a flyer.\n\tGot Morales killed in Chapter One.\n*achievement basque visible 10 Basquing in it\n\tSave the life of a Basque\n\tSaved the wounded Basque\n*achievement lifesaver visible 10 Lifesaver\n\tBe careful with your men and women.\n\tTwenty or more of Alba's militia survived.\n*achievement father visible 10 Father in the Fatherland\n\tBecome a father.\n\tOne way or another, Jose ends up with a child.\n*achievement exper visible 10 You can't win anything with kids\n\tPut your faith in experience.\n\tChoose to promote Prieto and Garcia.\n*achievement kids visible 10 Student of Sir Alex\n\tPut your faith in youth.\n\tChoose to promote Alonso and Blanco.\n*achievement killer visible 10 Extreme Measures\n\tWhen cornered, take drastic action.\n\tAs Maria, murder the Republican Captain.\n*achievement sala visible 10 Home is where the heart is\n\tChoose to be reunited with your friends.\n\tChose to go back to the militia with Salazar.\n*achievement aalto visible 10 Road to Ruin\n\tChoose to carry on the fight.\n\tChose to go with Aalto.\n*achievement spare visible 10 Turn the Other Cheek\n\tLet your nemesis live.\n\tAs De La Rosa, spared Vasquez, twice.\n*achievement student visible 10 Straight A's\n\tPass the exam with flying colours.\n\tScored 100% in the Falange test.\n*achievement defence visible 10 The Best Form of Defence\n\t...Is defence in depth.\n\tConducted a perfect defence of Ribaroja.\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tThe Spanish Civil War is the setting of [i]Divided We Fall[/i]. You will shape the lives of 4 Spaniards on both sides of the divide; will they be brutalised, stay true to their principles or even survive? You decide in this 130,000 word illustrated interactive epic.\n\n\tIn 1936, Spain was a nation bitterly divided by politics, religion and class. These tensions exploded into one of the most brutal and ideological conflicts in history, the Spanish Civil War.\n\t \n\tIn this interactive novel, you will follow and shape the lives of four young Spaniards on both sides of the divide. There's a left-leaning police officer, a good Catholic girl who becomes a nurse, a patriotic fighter pilot and an anarchist militiawoman who takes up arms in the name of revolution.\n\n\tThrown into the hellish world of civil war, will our characters be brutalised, stay true to their principles or even make it out alive? Experience first-hand the intolerance, cruelty and courage of a conflict that still provokes strong emotions to this day in this 130,000 word illustrated interactive epic.\n\n\t[i]You can play the first two chapters of the game for free. Purchase the rest of the game below.[/i]\n\t*if choice_is_advertising_supported\n\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n\t*purchase_discount adfree 2022-02-23 $4.99 $2.99 purchased\n\t*label page_break\n\t*if choice_is_advertising_supported\n\t\t*page_break_advertisement\n\t*if not(choice_is_advertising_supported)\n\t\t*page_break Play Now for Free\n\n\n*label purchased\n\n*image page1.png\t\nOn 13th April 1931 Spaniards went to bed living in a monarchy and woke up in a Republic. Following a landslide victory for Republican forces in the municipal elections, the King and government quietly fled the country and the Spanish Second Republic was born in a bloodless revolution.\nAn 8 year period of crown-backed military dictatorship was brought to an end and a government of Republicans and Socialists came to power, embarking on an ambitious reform programme. The aim was to bring a backward, agrarian and Catholic nation into the 20th Century.  \n\nHowever, despite initial enthusiasm, the Republic soon began to divide Spaniards. Many were horrified by the assault on the Church's dominant position in Spanish life and state. Both large and small landowners felt threatened by land reform aimed at helping Spain's desperately poor landless peasantry. The Army, which saw itself as the guardian of Spain and Spanishness, felt under attack when the government made attempts to reduce its size and power.\nNationalists and patriots were outraged at promises of autonomy for the Catalan and Basque provinces.\n*page_break\nAgainst the backdrop of fervent opposition and an abortive military cou
