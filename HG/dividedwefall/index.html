our dorm before we report you to the head nurse\".\n\t\t*line_break\n\t\t\"I can't imagine, what old Carrel would make of this, seeing you in this shameful state Senorita, you've not even got any shoes!\"\n\t\t*line_break\n\t\tThe guards take Maria back to her dorm and put her to bed. Her incoherent protests only succeed in waking up half the other nurses.\n\t\t*set sawlight true\n\t\t*goto interview\n\t#Ignores it, it could be anything.\n\t\tIt's probably the drink she thinks, besides, what are the guards paid to do? Reaching her own dormitory, she collapses into bed and falls asleep almost immediately, without changing out of her evening gown.\n\t\t*set sawlight true\n\t\t*goto interview\n*label investigate\t\n*page_break\nMaria looks around the hospital, avoiding the nurses on nightshift. She doesn't want to be caught sneaking around and be accused of stealing the supplies herself. She unlocks the storeroom and looks inside. There's no one here. Everything seems to be present and correct. Then, from behind her, Maria hears footsteps and a pair of voices approaching,\n*line_break\n\"I can't believe they've assigned us to guard a storeroom, it's a joke!\"\n*line_break\n\"Would you rather be getting blown up at the front?\"\n*line_break\n\"No, but at least anti-partisan duties or something, anything's more exciting than standing around all day in a fucking hospital, not to mention the smell!\"\n*line_break\n\"You're missing the point, think about all the nurses!\"\n*line_break\n\"Well, I suppose when you put it like that...\"\n*line_break\nMaria...\n*choice\n\t#Hides, she can't be caught in here.\n\t\t*goto hide\n\t#Walks out calmly, she's a nurse, they won't know \tshe shouldn't be here.\n\t\t*goto walkout\n*label walkout\nShe walks out the storeroom confidently,\n*line_break\n\"Good evening Senores\".\n*line_break\n\"Good evening Senorita, and who might you be then?\"\n*line_break\n\"Why, what a silly question! I'm a nurse of course!\"\n*line_break\n\"Really? You don't look like one\".\n*line_break\nFor a moment, Maria is confused. Then she looks down. It is with a very real sense of horror that she realises she's not in her uniform. Of course she isn't, she's off duty. Furthermore, her identity papers are in the dormitory.\n*line_break\n\"Senores, I can explain...\"\n*line_break\n\"Can you? Because we've been told to look out for people sneaking around the supplies room\".\n*line_break\n\"I'm off duty, I...\"\n*line_break\n\"Yes, that's what we're looking for, off duty staff stealing morphine. I think you've just been caught in the act missy\".\n*goto interrog\n*label hide\nMaria hides behind a shelf as the guards take up position either side of the door. She genuinely doesn't know what to do. Too much time has passed for this to be innocently explained. She realises she's off duty, she isn't wearing her uniform. She has to get out of here, but how?\n*choice\n\t#Use a general anaesthetic to knock them out.\n\t\tShe prepares a pair of syringes with the most powerful anaesthetic they've got. She's seen it used, it only takes a few seconds to take effect. Normally, the dosage is determined by the patient's height and weight, but she has to guess for these two. Once Maria's ready, she sneaks up behind them,\n\t\t*line_break\n\t\t\"...yeah, and the thing is, she said that if...\"\n\t\t*line_break\n\t\tMaria injects them both in the neck simultaneously. It only takes a few seconds and they're down. She can't really believe she's just down that. She steps over the guards and slips away.\n\t\t*page_break\t\n\t\tAs she's walking back to her dormitory, Maria notices a light in the woods behind the hospital.\n\t\tShe cautiously approaches the source the light is emanating from. As she draws near, she can make out several silhouettes.\n\t\t\n\t\tThree armed men, one holding a lantern, are deep in conversation with a female figure. They're speaking a language Maria can't understand. It takes her a few seconds to realise it must be Basque. It really is nothing like Spanish! She takes another step forward to see if she can make out who the woman is. \n\t\t*page_break\n\t\tThe woman passes a bundle over to the men. Then, a snap. Maria looks down and realises stood on a twig. The Basques have heard. They scatter, putting the lantern out. Maria catches a brief glimpse of the woman's face. It was Eskarne. She's almost certain it was. \n\t\t*set sawinwood true\n\t\t*goto interview\t\t\n\t#Use her womanly ways.\n\t\tMaria pulls her skirt up a bit, revealing her knees and unbuttons the top of her blouse. \n\t\t*line_break\n\t\t\"Hello boys...\" she mumbles, trying to be alluring.\n\t\t*line_break\n\t\t\"Fuck me!\" the guards jump, taken by surprise, \"What the fuck are you doing?\"\n\t\t*line_break\n\t\t\"Er...\" this hasn't gone as she was expecting. What is she doing? She doesn't really know, nor know what exactly she expected to happen. She's not a seductress, what's she supposed to do? She doesn't really know.\n\t\t*line_break\n\t\t\"Did you not hear me? What the fuck are you doing here?\"\n\t\t*line_break\n\t\tMaria has no explanation.\n\t\t*goto interrog\n\t#Wait for something to happen.\n\t\tMaria waits. And she waits. And she waits. She has no way of knowing how long she's been there, it seems like hours. Eventually though, the guards get bored and go off for a coffee. Patience is a virtue Maria thinks to herself as she slips away.\n\t\t*page_break\n\t\tAs she's walking back to her dormitory, Maria notices a light in the woods behind the hospital.\n\t\tShe cautiously approaches the source the light is emanating from. As she draws near, she can make out several silhouettes.\n\t\t\n\t\tThree armed men, one holding a lantern, are deep in conversation with a female figure. They're speaking a language Maria can't understand. It takes her a few seconds to realise it must be Basque. It really is nothing like Spanish! She takes another step forward to see if she can make out who the woman is. \n\t\t*page_break\n\t\tThe woman passes a bundle over to the men. Then, a snap. Maria looks down and realises stood on a twig. The Basques have heard. They scatter, putting the lantern out. Maria catches a brief glimpse of the woman's face. It was Eskarne. She's almost certain it was. \n\t\t*set sawinwood true\n\t\t*goto interview\t\t\n*label interrog\n*page_break\nThe next morning, after a sleepless night in a cell, Maria is brought before Head Nurse Carrel. Carrel is a severe, stout woman in her fifties. \n*line_break\n\"Sister Farfan, you have been caught, late at night, off duty, sneaking into the medical storeroom. As you know, we have had a significant quantity of medical supplies stolen in recent weeks. Was it you every time?\"\n*line_break\n\"No Ma'am, it was not, nor was I stealing last night\".\n*line_break\n\"Oh really? \n*if (helpbasque = true)\n\tWell it says here that only yesterday you broke the rule about enemy casualties, resulting in the death of a Nationalist soldier.\nA Basque sympathiser are you?\"\n*line_break\n\"No Ma'am\n*if (helpbasque = true)\n\t. The Basque was merely in need of attention most urgently\n\".\n*line_break\n\"Furthermore, I've been informed by Senor Vidal that you are quote unquote 'politically suspect' and that this is not your first transgression\".\n*line_break\nThat little... Maria thinks, \"That simply is not true Ma'am he's made that up\".\n*line_break\n\"Extraordinary! You expect me to believe you over a senior Falange officer when you've just been caught red handed! Need I remind you that aiding the enemy is a capital offence?\"\n*line_break\n\"No Ma'am,\" Maria is in a tight spot. She considers her options before...\n*choice\n\t#Telling the truth about what happened last night.\n\t\t\"You were investigating the theft? And you got caught? Honestly, how gullible do you think I am? I've heard some excuses in my time but that tops the lot. You're digging yourself a very deep whole indeed. Now get out of my sight. I shall gather testimonies from the other sisters before coming to my verdict\".\n\t\t*line_break\n\t\t\"Thank you Ma'am\".\n\t\t*goto esksacrif\n\t#Saying Eskarne is the thief to save herself.\n\t\t*set marbrutal -10\n\t\t\"Really? What proof do you have?\"\n\t\t*line_break\n\t\t\"She's a Basque for a start. Why would I be helping them, they're a filthy race\".\n\t\t*line_break\n\t\t\"You're going to need more than just that Farfan\".\n\t\t*line_break\n\t\t\"Yes, I've seen her though, at night,\" Maria lies, \"She snuck out her dorm and went off to the woods with a package. She came back without it\".\n\t\t*line_break\n\t\tCarrel considers this for a moment. She thinks Maria is lying. But it also seems unlikely she would be helping the Basques. It would be easy to charge a Basque with this, no questions would be asked, no real evidence would be required. And that way, it wouldn't reflect badly on her or the hospital. It would be a blemish on her own record to have one of her own nurses found guilty of aiding the enemy. And even if this Eskarne isn't guilty, killing her will probably frighten the perpetrator into stopping. Yes, this is a very neat solution, \n\t\t*line_break\n\t\t\"Very well Sister Farfan, send for this Es...\"\n\t\t*line_break\n\t\t\"Eskarne?\"\n\t\t*line_break\n\t\t\"Yes, send for the Basque would you?\"\n\t\t*line_break\n\t\t\"Yes Ma'am\".\n\t\t*goto eskbetray\n*label interview\n*page_break\nThe next day, Maria is called in to see Head Nurse Carrel. Carrel is a severe, stout woman in her fifties. \n*line_break\n\"There's nothing to worry about Sister Farfan, I am interviewing all the Nurses about the theft of medical supplies. We think it was one of the Basques, do you happen to know anything about it? Have you seen anything suspicious? I must remind you that lying to me here would be tantamount to aiding the enemy, which as I'm sure I don't have to remind you, is a capital offence\".\n*line_break\nMaria pauses then...\n*choice\n\t*if (sawinwood = true)\n\t\t#Tells Carrel about the woods last night.\n\t\t\t*set marbrutal -5\n\t\t\t\"Sister Farfan, I must congratulate you, you appear to have caught our perpetrator on your own initiative. I will be sure to credit you when I put together my report. Now could you send for the Basque please\".\n\t\t\t*line_break\n\t\t\t\"Yes Ma'am\".\n\t\t\t*goto eskbetray\n\t*if (sawinwood = false)\n\t\t#Says Eskarne has been acting suspiciously.\n\t\t\t*set marbrutal -5\n\t\t\t\"Suspiciously how exactly? What proof do you have?\"\n\t\t\t*line_break\n\t\t\t\"She's a Basque for a start. Why would I be helping them, they're a filthy race\".\n\t\t\t*line_break\n\t\t\t\"We need a little more than that Farfan\".\n\t\t\t*line_break\n\t\t\t\"Yes, I've seen her though, at night,\" Maria lies, \"She snuck out her dorm and went off to the woods with a package. She came back without it\".\n\t\t\t*line_break\n\t\t\tCarrel considers this for a moment. She thinks Maria is lying. But it would be easy to charge a Basque with this, no questions would be asked, no real evidence would be required. And that way, it wouldn't reflect badly on her or the hospital. It would be a blemish on her own record to have one of her own nurses found guilty of aiding the enemy. And even if this Eskarne isn't guilty, killing her will probably frighten the perpetrator into stopping. Yes, this is a very neat solution, \n\t\t\t*line_break\n\t\t\t\"Very well Sister Farfan, send for this Es...\"\n\t\t\t*line_break\n\t\t\t\"Eskarne?\"\n\t\t\t*line_break\n\t\t\t\"Yes, send for the Basque would you?\"\n\t\t\t*line_break\n\t\t\t\"Yes Ma'am\".\n\t\t\t*goto eskbetray\n\t*if (sawlight = true)\n\t\t#Tells Carrel about the light last night.\n\t\t\t\"Well that is all very illuminating Sister Farfan but I'm afraid other than asking the guards to see if they notice from now on, there is not much we can do with that evidence\".\n\t\t\t*line_break\n\t\t\t\"Sorry Ma'am\".\n\t\t\t*line_break\n\t\t\t\"Oh no, don't be sorry, you've been a damn sight more helpful than half the girls I've talked to so far\".\n\t\t\t*goto eskcaught\n\t#Says she doesn't know anything.\n\t\t\"Just like the other then, well if you've nothing more to say, please see yourself out\".\n\t\t*line_break\n\t\t\"Thank you Ma'am\".\n\t\t*goto eskbest\n*label eskcaught\n*page_break\nTwo nights later, the same light appeared and the sentries investigated. They came across Eskarne handing over supplies to the guerrillas and she was shot there and then. Her husband was executed for her crimes and her children were put in a Nationalist orphanage and 're-educated' to hate the Basque people and their own parents.\n*goto alba\n*label eskbest\n*page_break\nWhen Maria emerges from the Head Nurse's office, Eskarne is waiting for her.\n*line_break\n\"What did you say?\" she asks in a hushed tone.\n*line_break\n\"I said I didn't know anything\".\n*line_break\nEskarne embraces her, \"Thank you, thank you so much Maria! Listen, do you know what Eskarne means in Basque?\"\n*if (sawlight = true)\n\t*line_break\n\tInitially, Maria is slightly bemused but she soon puts two and two together,\n*line_break\n\"No, what does it mean?\"\n*line_break\n\"It means mercy. Thank you for showing it\".\n\nEskarne was caught red-handed by Nurse Carrel five weeks later. She was found guilty of aiding the enemy and shot the same day. In those five weeks however, her husband had escaped to Basque-held territory, taking their children with them. The children were evacuated to Britain along with four-thousand other Basque children before the Basque Country fell to the Nationalists. \n*goto alba\n*label eskbetray\n*page_break\n*if marfas = false\n\tMaria is close to tears as she leaves the Head Nurse's office. Eskarne is there waiting for her. Gabrielle is conspicuous in her absence. \n\t*line_break\n\tEskarne embraces Maria, \"What did she say? What's going to happen to you?\"\n\t*line_break\n\t\"I've done something terrible. Something really terrible\".\n\t*line_break\n\t\"What is it Maria?\" concern, possibly fear creeping into Eskarne's voice.\n\t*line_break\n\t\"I... I can't say. But you've got to see Carrel now,\" Maria sobs.\n\t*line_break\n\tEskarne quickly puts two and two together, \"It's ok Maria, it's ok. Listen, do you know what Eskarne means in Basque?\"\n\t*line_break\n\t\"No, why?\"\n\t*line_break\n\t\"It means mercy. Just remember that will you. It means mercy\".\n\t*line_break\n\t\"I'll remember\".\n\t*line_break\n\t\"Promise me\".\n\t*line_break\n\t\"I promise, I'll remember\".\n\t*line_break\n\tEskarne leaves their embrace and knocks on the Head Nurse's door. She enters. Once inside, she confesses to stealing the morphine and supplying it to Basque resistance fighters. Less than an hour later, she is executed. Her husband is executed for her crimes and her children are put in a Nationalist orphanage and 're-educated' to hate the Basque people and their own parents.\n*if marfas = true\n\tMaria leaves the office to find Eskarne waiting for her. Maria avoids her gaze.\n\t*line_break\n\t\"What did she say?\" the Basque asks.\n\t*line_break\n\t\"You're rumbled alright Eskarne, you haven't got away with it. You're going to pay for what you've done\".\n\t*line_break\n\tEskarne quickly puts two and two together and realises what has transpired. She begins to well up. \n\t*line_break\n\t\"Do you know what Eskarne means in Basque, Maria?\"\n\t*line_break\n\t\"No, I don't speak any Basque, why?\"\n\t*line_break\n\t\"It means mercy. Just remember that will you. It means mercy\".\n\t*line_break\n\tAnd with that she knocks on the Head Nurse's door. She enters. Once inside, she confesses to stealing the morphine and supplying it to Basque resistance fighters. Less than an hour later, she is executed. Her husband is executed for her crimes and her children are put in a Nationalist orphanage and 're-educated' to hate the Basque people and their own parents.\n*goto alba\n*label esksacrif\n*page_break\nMaria is close to tears as she leaves the Head Nurse's office. Eskarne is there waiting for her. Gabrielle is conspicuous in her absence. \n*line_break\nEskarne embraces Maria, \"What did she say?\"\n*line_break\n\"She thinks it was me, the theft, aiding the enemy, she wants to have me executed!\" Maria sobs.\n*line_break\n\"Oh God\".\n*line_break\n\"What am I going to do?\"\n*line_break\nEskarne doesn't say anything, she's thinking, she contemplates this decision carefully before making it, \"May I ask how old you are Maria?\"\n*line_break\n\"I'm twenty, why?\"\n*line_break\n\"Oh, nothing. Listen, do you know what Eskarne means in Basque?\"\n*line_break\n\"No, why?\"\n*line_break\n\"It means mercy. Remember that Maria, please promise me you'll remember it\".\n*line_break\n\"I will\".\n*line_break\n\"Promise me\".\n*line_break\n\"I promise. Why is it so important?\"\n*line_break\n\"Just remember it\".\n*line_break\nEskarne leaves their embrace and knocks on the Head Nurse's door. She enters. Once inside, she confesses to stealing the morphine and supplying it to Basque resistance fighters. She insists Maria had nothing to do with it. Less than an hour later, she is executed. Her husband is executed for her crimes and her children are put in a Nationalist orphanage and 're-educated' to hate the Basque people and their own parents.\n*goto alba\n*label alba\n*page_break\n*image number5.png\n7.49 A.M.\n*line_break\n10th November 1936\n*line_break\nAragon Front, 50 KM N of Zaragoza\n*line_break\nMiliciana Alba Reyes\n\nLike thousands of others, Alba and her militia had marched out into the countryside once Barcelona was secure. It had been a novel experience; Alba had never left the city in her life. The novelty had quickly worn off when it came to digging trenches, sleeping out in the cold and having to forage for food. They'd been in the in this same position for over two months now. It was tedious in the extreme. The real fighting is happening further south, around Madrid. \n\nThey sit in their makeshift trench, looking across the valley at the fascist positions. All day, every day. To pass the time, Alba had been...\n*fake_choice\n\t#Learning to read and write.\n\t\tThe CNT have offered a programme for militiamen and women at the front, the majority of whom are illiterate or have very limited education, to learn to read and write in their spare time. Alba has relished the chance, never having been to school. She's really rather happy with her progress. She's a fast learner and they've had a lot of spare time.\n\t\t*set albaread true\n\t#Familiarising herself with their new weaponry.\n\t\tThey have received a limited amount of outdated weaponry, mostly late nineteenth century rifles. They aren't very good but ammunition for the Spanish weapons they seized at the outbreak of the war is running low.\n\t#Studying the lay of the land.\n\t\tThe area is a mixture of flat planes and shallow valleys. The anarchist trenches sit on the Eastern lip of this valley. The fascists are about 300 metres away on the opposite lip. Between the two lines is the valley itself with a small stream and light foliage. About a kilometre North is a tiny village, Los Santos.\n\t#Spending time with $!{friend}.\n\t\tAlba is luckier than most in having someone like $!{friend} close to her. And with so little to do they've become very close indeed. It also helps with keeping warm at night.\n*line_break\n*line_break\nPresently, everyone has gathered for breakfast. Alba's militia now contains ${militia} men and women. They are responsible for a 400 metre section of the front.\n*if (albaread = true)\n\tAlba, keen to show off her newly acquired literacy, reads out an article from a newspaper to them as they eat. It is a piece by Indalecio Prieto, a senior Socialist and cabinet minister,\n*if (albaread = false) \n\tSalazar, one of the few in the group blessed with the ability to read, reads out to them as they eat. It is a piece by Indalecio Prieto, a senior Socialists and a cabinet minister,\n*line_break\n\"Even if the terrible and tragic reports about what has happened and is happening in the areas dominated by our enemies are true, even if day after day we receive lists of the names of comrades, of beloved friends, whose attachment to an ideal was enough to ensure them a treacherous death, do not, I beg you, do not imitate their behaviour. Meet their cruelty with your pity, meet their savagery with your mercy, meet the excesses of the enemy with generous benevolence\".\n*line_break\n\"I call for toughness in combat, breasts of steel as some of our brave militias call it, but responsive hearts, capable of shuddering in the face of human suffering, capable of pity and tender-feeling, without which is lost the very essence of human greatness. The life of an adversary who surrenders is unassailable, no combatant can dispose of that life. That is how the rebels behave? It matters not. That is how we should behave\".\n*page_break\nSalazar evidently doesn't agree with the piece, \n*line_break\n\"That's rubbish, he's in bed with the bourgeoisie anyway is Prieto. All he wants is to hold back the revolution, which has already begun, and try and limit the power of the Anarchist movement\".\n*line_break\nSome agree with Salazar, others don't,\n*line_break\n\"So are you saying you disagree with him Salazar?\" $!{friend} ask, \"Are you saying we should be cruel, be brutal?\"\n*line_break\n\"That's exactly what I'm saying, we mustn't have any mercy for our enemies, otherwise we'll go soft and lose this war. Besides, they have no mercy for us, they kill us like dogs and enjoy it!\"\n*line_break\nAlba \n*if (albalead = true)\n\tsteps in as leader.\n*if (albalead = false)\n\tsteps in. After what had happened at the telephone exchange, a vote was held as to who should lead the militia. Alba won easily.\n*line_break\n\"Neither me, nor you Salazar have the right to decide our stance on this. It has to be put to a vote, like all our decisions\".\n*line_break\n\"Agreed\".\nAlba advocates...\n*choice\n\t#Follow the official line and take prisoners.\n\t\t*set albabrutal +5\n\t\t\"Comrades,\" Alba begins, \"What Prieto says is right. We are not barbarians like them. This is war but killing in cold blood is a crime. How can we convince the masses of the justice of our cause if we are unjust in our actions\".\n\t\t*line_break\n\t\tThere are mutters of approval, before $!{friend} stands up to speak,\n\t\t*line_break\n\t\t\"Alba is right, we must not let our passions get the better of us. Every prisoner taken is a potential convert to our cause\".\n\t\t*line_break\n\t\tSalazar speaks for the opposition,\n\t\t*line_break\n\t\t\"They are talking nonsense. The idea that we can 'convert' the fascists to our cause is ridiculous. How many have we lost to their cruelty? So many good friends and comrades. We must match our enemy's cruelty if we are to win this war. This is not a noble or honourable conflict, this is a fight to the death. And I don't know about you but I don't want [i]our[/i] Spain to die\".\n\t\t*line_break\n\t\tAfter further deliberation, a vote is held through a show of hands. \n\t\t*if albaread = true\n\t\t\t*temp winvote\n\t\t\t*rand winvote 0 100\n\t\t\t*if (winvote \u003c 25)\n\t\t\t\tBy a slim majority, Salazar's supporters win the day. The decision is to execute any prisoners taken.\n\t\t\t\t*set killpris true\n\t\t\t\t*goto findfood\n\t\t\t*if (winvote > 24)\n\t\t\t\tA significant majority vote in favour of Alba. Reading all those political pamphlets has turned her in to quite the orator.\n\t\t\t\t*achieve winvote\n\t\t\t\t*goto findfood \n\t\t*if albaread = false\n\t\t\t*temp winvote\n\t\t\t*rand winvote 0 100\n\t\t\t*if (winvote \u003c 50)\n\t\t\t\tBy a slim majority, Salazar's supporters win the day. The decision is to execute any prisoners taken.\n\t\t\t\t*set killpris true\n\t\t\t\t*goto findfood\n\t\t\t*if (winvote > 49)\n\t\t\t\tA significant majority vote in favour of Alba.\n\t\t\t\t*achieve winvote\n\t\t\t\t*goto findfood\n\t\t*goto findfood\n\t#Ignore the instructions and execute prisoners.\n\t\t*set bloody true\n\t\t*set albabrutal -10\n\t\tAlba speaks first, \n\t\t*line_break\n\t\t\"Comrades, each of us has given so much already. Many of our friends have given their lives. The time for talk, persuasion, compromise, that time is over. The fascists started the war. They must pay the consequences\".\n\t\t*line_break\n\t\tSalazar picks up the argument,\n\t\t*line_break\n\t\t\"Reyes is, for once, right. Deeds not words comrades, that is what will make the difference in this war\".\n\t\t*line_break\n\t\tMurmurs of approval. $!{friend} steps up to speak next,\n\t\t*line_break\n\t\t\"Unfortunately,\" he pauses and glances at Alba, \"I cannot agree with Reyes and Salazar. What they are proposing is barbaric. Our enemy is barbaric, yes, but we are at war with them because of it. I see no reason why we should try and match the fascists in their cruelty, we imitate them in no other way, so why in this one?\"\n\t\t*line_break\n\t\tAlba gives her friend a long, hard stare. $!{friend} shrugs,\n\t\t*line_break\n\t\t\"I'm not just your yes-man Alba, I have opinions too\".\n\t\t*line_break\n\t\tAfter further deliberation, a vote is held through a show of hands. \n\t\t*if albaread = true\n\t\t\t*temp winvote\n\t\t\t*rand winvote 0 100\n\t\t\t*if (winvote \u003c 25)\n\t\t\t\tBy a slim majority, $!{friend}'s supporters win the day. The decision is final, no prisoners are to be executed. Alba is seething.\n\t\t\t\t*goto findfood\n\t\t\t*if (winvote > 24)\n\t\t\t\tA significant majority vote in favour of Alba and Salazar. Reading all those political pamphlets has turned her in to quite the orator.\n\t\t\t\t*achieve winvote\n\t\t\t\t*set killpris true\n\t\t\t\t*goto findfood\n\t\t*if albaread = false\n\t\t\t*temp winvote\n\t\t\t*rand winvote 0 100\n\t\t\t*if (winvote \u003c 50)\n\t\t\t\tBy a slim majority, $!{friend}'s supporters win the day. The decision is final, no prisoners are to be executed. Alba is seething.\n\t\t\t\t*goto findfood\n\t\t\t*if (winvote > 49)\n\t\t\t\tA significant majority vote in favour of Alba and Salazar.\n\t\t\t\t*achieve winvote\n\t\t\t\t*set killpris true\n\t\t\t\t*goto findfood\n\t\t*goto findfood\n\t#Judge the situation when it arises.\n\t\t\"Comrades, this is war. War is not black and white, there is no good and bad. We will all have to do things we'd rather not. But those things are necessary all the same. To say we must spare all prisoners is naive. To kill all of them would be barbaric. We must make decisions based on circumstances, not always principle\".\n\t\t*line_break\n\t\tSalazar speaks next,\n\t\t*line_break\n\t\t\"Reyes is sitting on the fence. Deeds not words comrades, that is what will make the difference in this war\".\n\t\t*line_break\n\t\t\"Unfortunately,\" he pauses and glances at Alba, \"I cannot agree with Reyes or Salazar. What they are proposing is barbaric. Our enemy is barbaric, yes, but we are at war with them because of it. I see no reason why we should try and match the fascists in their cruelty, we imitate them in no other way, so why in this one?\"\n\t\t*line_break\n\t\tAlba gives her friend a long, hard stare. $!{friend} shrugs,\n\t\t*line_break\n\t\t\"I'm not just your yes-man Alba, I have opinions too\".\n\t\t*line_break\n\t\tAfter further deliberation, a vote is held through a show of hands. \n\t\t*if albaread = true\n\t\t\t*temp winvote\n\t\t\t*rand winvote 0 100\n\t\t\t*if (winvote \u003c 25)\n\t\t\t\tWith those who usually back Alba and $!{friend} split, by a slim majority, Salazar's supporters win the day. The decision is to execute any prisoners taken.\n\t\t\t\t*set killpris true\n\t\t\t\t*goto findfood\n\t\t\t*if (winvote > 24)\n\t\t\t\tA significant majority vote in favour of Alba. Reading all those political pamphlets has turned her in to quite the orator.\n\t\t\t\t*achieve winvote\n\t\t\t\t*set discretion true\n\t\t\t\t*goto findfood\n\t\t*if albaread = false\t\n\t\t\t*temp winvote\n\t\t\t*rand winvote 0 100\n\t\t\t*if (winvote \u003c 50)\n\t\t\t\tWith those who usually back Alba and $!{friend} split, by a slim majority, Salazar's supporters win the day. The decision is to execute any prisoners taken.\n\t\t\t\t*set killpris true\n\t\t\t\t*goto findfood\n\t\t\t*if (winvote > 49)\n\t\t\t\tA significant majority vote in favour of Alba.\n\t\t\t\t*achieve winvote\n\t\t\t\t*set discretion true\n\t\t\t\t*goto findfood\n\t\t*goto findfood\n*label findfood\n*page_break\nOnce that issue has been decided, a rather more pressing one comes up in discussion. As usual, they're running low on food. A few suggestions are made of ways to supplement their paltry rations. Salazar has found a farm only a kilometre or so behind the lines. Alternatively they could search the surroundings for foodstuffs.\n*choice\n\t#Requisition food from the farm.\n\t\t*goto farm\n\t#Forage for food in the area.\n\t\t*goto forage\n\t#Accept the food they're supplied with.\n\t\t\"We're not risking any lives on a pointless excursion for food just because some of you are hungry, we'll have to make do with what we've got\".\n\t\t*line_break\n\t\tAfter a few muted complaints they accept it.\n\t\t*goto orderattack\n*label farm\nAlba leaves $!{friend} in charge and goes with Salazar to the farm. After a fifteen minute walk they find it. It is a modest plot with a cottage accompanied by s small barn. There are a number of animals and stores of fruit and animal feed. As they look around for things to take, the farmer, a small, elderly man, approaches them. He has a shotgun. \n*line_break\n\"What do you think you're doing?\"\n*line_break\n\"We're taking...\" Salazar begins before Alba stamps on his foot,\n*line_break\n\"We were just looking Senor,\" Alba reassures him, \"We wondered if we might be able to acquire some food. Our militia is hungry and the fascists are close\".\n*line_break\n\"Good,\" he mutters, \"The sooner they arrive, the sooner I'll be free of scum like you intruding my property, stealing my livelihood\".\n*line_break\nThe situation is really rather tense. It is clear this man doesn't like them but will he cooperate?\n*choice\n\t#Threaten him, scare him into cooperating.\n\t\tAlba raises her rifle,\n\t\t*line_break\n\t\t\"I didn't want to have to do this Senor, but we need food. Hand it over or I'll take it by force\".\n\t\t*line_break\n\t\tPredictably, rather than calm the things down, this move only serves to escalate the situation. The farmer loads his shotgun,\n\t\t*line_break\n\t\t\"Please stop that Senor!\"\n\t\t*line_break\n\t\tHe aims it at Alba. She has no choice but to pull the trigger. The farmer's wife screams. She had been watching from her home, now she runs out to her husband. She weeps profusely. Alba and Salazar take what they need and leave.\n\t\t*goto orderattack\n\t#Ask to buy the food off him.\n\t\t\"Please Senor, we'll pay you for it. I'll pay you for the food\".\n\t\t*line_break\n\t\t\"You haven't got any money, look at you!\"\n\t\t*line_break\n\t\t\"No, you're right, we don't have the money on us but I will see to it that you're compensated by the CNT for whatever we take\".\n\t\t*line_break\n\t\tThe farmer considers this, \"...Ok,\" he says, lowering the shotgun, \"What do you need?\"\n\t\t*line_break\n\t\t\"Thanks you Senor! We need...\"\n\t\t*line_break\n\t\tThey return laden with fresh produce. The militia are besides themselves with excitement. They eat well today.\n\t\t*goto orderattack\n\t#Persuade him to hand over the food\n\t\t\"Please Senor, we mean no harm, we just need a few supplies. We'll be gone before you know it, if you just stand aside\".\n\t\t*line_break\n\t\t\"What do you take me for? I'm not going to stand aside and let you take my livelihood, my property, without a fight\".\n\t\t*line_break\n\t\t\"Please Senor, it is all of our livelihoods, very soon your farm will be collectivised by the CNT and you'll be provided with everything you need in return for what you can provide\".\n\t\t*line_break\n\t\t\"This is my land, my farm and you're going to leave right now,\" he loads his shotgun and aims it at Alba.\n\t\t*line_break\n\t\t\"Well played Reyes,\" Salazar says under his breath.\n\t\t*line_break\n\t\t\"Oh fuck off Salazar, not now!\"\n\t\t*line_break\n\t\tAlba...\n\t\t*choice\n\t\t\t#Shoots the farmer before he shoots them.\n\t\t\t\tShe has no choice but to pull the trigger. The farmer's wife screams. She had been watching from her home, now she runs out to her husband. She weeps profusely. Alba and Salazar take what they need and leave.\n\t\t\t\t*goto orderattack\n\t\t\t#Does as he says and leaves.\n\t\t\t\t\"Very well Senor, if that is your wish, we will leave you in peace. I will report your lack of cooperation to the CNT regional authority though\".\n\t\t\t\t*line_break\n\t\t\t\t\"Fuck off!\"\n\t\t\t\t*line_break\n\t\t\t\tThey fuck off, empty handed, to the disappointment of the militia upon their return.\n\t\t\t\t*goto orderattack\n\t#Leave empty handed.\n\t\t\"Very well Senor, we will leave you in peace. I will report your lack of cooperation to the CNT regional authority though\".\n\t\t*line_break\t\t\t\t\n\t\t\"Fuck off!\"\n\t\t*line_break\n\t\tThey fuck off, empty handed, to the disappointment of the militia upon their return.\n\t\t*goto orderattack\n*label forage\n*page_break\nAlba and $!{friend} go off in search of food, leaving Salazar in charge. They move swiftly and silently over the plains, trying to keep as low as possible. A series of animal traps were here when they first occupied this position and they've been using them ever since. They move between the trap locations, looking at several before they find one in a patch of bushes that has caught a rabbit. \n*line_break\n\"This'll do nicely,\" Alba says, carefully lifting the stricken animal out and resetting the trap. The sound of other voices causes them both to freeze.\n*line_break\n\"Fascists\" whisper $!{friend}, pointing. Three Nationalist are walking towards them. They haven't spotted them though, they're idly chatting to each other, walking confidently, not crouched, rifles slung.\n*line_break\n\"...Yes, I've just had a letter from her actually, she's such a sweet girl\".\n*line_break\n\"Where did you say she lives?\"\n*line_break\n\"Pamplona. I was trained there in August and September, that's how I met her\".\n*line_break\nThey're getting closer, are they coming to check the trap? Have they been taking the fascists' food all this time? $!{friend} leans over,\n*line_break\n\"What are we going to do?\"\n*choice\n\t#Wait, they're just passing.\n\t\t\"Are you sure?\"\n\t\t*line_break\n\t\t\"Yes, now shut up!\"\n\t\t*line_break\n\t\tThe three soldiers get closer and closer. Twenty metres,\n\t\t*line_break\n\t\t\"She has to see reason, it's for the best, it has to be,\" ten metres, \"I know, but it's a very difficult decision. Do her parents know?\" five metres, \"Oh God no, I'm sure they don't and I'd rather keep it that way, the sooner we're married, the more innocent it'll all look\".\n\t\t*line_break\n\t\tThey're so close Alba could reach out and touch them,\n\t\t*line_break\n\t\t\"It's a mess, that's for sure, you should never have done her Gomez!\" \n\t\t*line_break\n\t\tAnd they're past and walking on. They weren't after the trap. Alba breathes a sigh of relief. She's not sure she's drawn breath for the last minute or so.\n\t\t*line_break\n\t\t\"You're fucking lucky Alba,\" $!{friend} chuckles, \"How did you know?\"\n\t\t*line_break\n\t\t\"Instinct. Of course they were going to pass, it was obvious!\" she jokes.\n\t\t*line_break\n\t\t\"Not from the look on your face it wasn't!\"\n\t\t*goto orderattack\n\t#Shoot them.\n\t\t\"We shoot them now!\"\n\t\t*line_break\t\n\t\t\"But there's three of them!\"\n\t\t*line_break\n\t\t\"I'll shoot the one on the left, you the one on the right and then we'll both go for the one in the middle\".\n\t\t*line_break\n\t\t\"Right\".\n\t\t*line_break\n\t\tAlba counts down from three to zero. They both fire and then fire again. In seconds, all three of the soldiers are down. The shots ring out across the bleak plain. Silence.\n\t\t*goto orderattack\n\t#Surprise them, hopefully they'll surrender.\n\t\tAlba and $!{friend} jump out of the bush, rifles raised,\n\t\t*line_break\n\t\t\"Freeze fascist pigs!\"\n\t\t*line_break\n\t\tThey jump, surprised and quickly throw their hands up,\n\t\t*line_break\n\t\t\"Don't shoot, don't shoot!\" one screams.\n\t\t*line_break\n\t\tAnother, clearly more self-assured than his friend, asks, \"What were you two doing in there? Filthy Reds!\"\n\t\t*line_break\n\t\t\"You cheeky little shit!\" Alba shoves her rifle butt into his stomach, he collapses into a crumpled heap.\n\t\t*if (killpris = true)\n\t\t\t*if bloody\n\t\t\t\t*line_break\n\t\t\t\t\"So, do you practice what you preach Alba?\" $!{friend} asks, \"It's our militia's policy to kill prisoners isn't it?\"\n\t\t\t\t*line_break\n\t\t\t\t\"No prisoners,\" she replies, raising her rifle and shooting the cheeky one.\n\t\t\t\t*line_break\n\t\t\t\t\"What the fuck Alba? What are you doing? That wasn't a challenge?\"\n\t\t\t\t*line_break\n\t\t\t\t\"Sounded like one to me,\" she says, aiming at the second one. $!{friend} stands in front of Alba, \n\t\t\t\t*line_break\n\t\t\t\t\"Think about what you're doing, think for a second Alba!\"\n\t\t\t\t*line_break\n\t\t\t\tAlba rolls her eyes, \"[i]Fine[/i]! It'll not do them any good though\".\n\t\t\t\t*line_break\n\t\t\t\tThey take the rabbit, and the two rather frightened soldiers back with them.\n\t\t\t\t*goto orderattack\n\t\t\t*else\n\t\t\t\t*line_break\n\t\t\t\t\"So now we're supposed to kill them I guess...\" $!{friend} mutters hesitantly.\n\t\t\t\t*line_break\n\t\t\t\t\"No, please, don't!\" one of the soldiers begs.\n\t\t\t\t*line_break\n\t\t\t\t\"Shut it!\" Alba growls, before turning to $!{friend}. They look into each other's eyes. Neither of them want to do it.\n\t\t\t\t*line_break\n\t\t\t\t\"What if we don't?\" $!{friend} suggests, \"I could take them back behind the lines while you go back. Just say I've gone out further to look for more food, we don't have to mention their being here\".\n\t\t\t\t*line_break\n\t\t\t\t\"Sounds like a plan to me...\"\n\t\t\t\t*line_break\n\t\t\t\t\"Thank you, thank you!\" the soldier whimpers.\n\t\t\t\t*line_break\n\t\t\t\t\"Oh for God's sake, shut up, don't make me change my mind!\" Alba replies.\n\t\t\t\t*goto orderattack \n\t\t*if (discretion = true)\n\t\t\t*line_break\n\t\t\t\"So you said we have to judge it on circumstances, what shall we do in these circumstances?\"\n\t\t\t*line_break\n\t\t\t\"Well obviously we're not just going to kill them like this, we'll take them back\".\n\t\t\t*line_break\n\t\t\t\"As I said...\"\n\t\t\t*line_break\n\t\t\t\"It won't always be like this though\".\n\t\t\t*line_break\n\t\t\tThey take the rabbit and the three rather frightened soldiers back with them.\n\t\t\t*goto orderattack\n\t\t*if (killpris = false)\n\t\t\t\"Come on lads, you're coming with us, you're lucky!\"\n\t\t\t*line_break\n\t\t\t\"Lucky why?\"\n\t\t\t*line_break\n\t\t\t\"We voted not to kill prisoners today\".\n\t\t\t*line_break\n\t\t\t\"Voted?\"\n\t\t\t*line_break\n\t\t\t\"Don't question it, democracy's saved your lives today\".\n\t\t\t*line_break\n\t\t\tThey take the rabbit and the three rather bemused soldiers back with them.\n\t\t\t*goto orderattack\n\t\t*goto orderattack\n*label orderattack\n*page_break\nA short while later, an order comes through from HQ. They are to take and hold the village of Los Santos, a small settlement of no more than forty homes about one kilometre away.\n*line_break\n\"Ok, this is the plan comrades,\" Alba begins.\n*line_break\n\"Wait a second,\" $!{friend} interrupts, \"Aren't we supposed to have a vote?\"\n*line_break\n\"What?\"\n*line_break\n\"A vote. We have to hold a vote on all orders we receive, that's how we do things\".\n*line_break\nAlba looks daggers at $!{friend}, \"Right, if you insist, all those in favour of taking the fight to the fascists?\"\n*line_break\n\"Shouldn't we have a discussion first? Before we decide how to vote?\"\n*line_break\n\"Ok, anyone who wants to discuss it, raise their hand now,\" nobody does, \"Good, now everyone in favour of the attack, raise your hands\".\n*line_break\nEveryone does, even, reluctantly, $!{friend}.\n*page_break\nAfterwards, Alba takes $!{friend} to one side, \n*line_break\n\"Why were you doing that, undermining me?\"\n*line_break\n\"You don't get it do you Alba? Are our principles just to be used when it's convenient? Orders, officers, uniforms, salutes, that's everything we're fighting against\".\n*line_break\n\"But we've got a war to fight, it won't win itself!\"\n*line_break\n\"The revolution and the war are inseparable. We cannot win this war if we do not also undertake the revolution\".\n*line_break\n\"I agree with you $!{friend}, but sometimes we have to act quickly, before we can have a vote or...\"\n*line_break\n\"I think we'll have to agree to disagree\".\n*line_break\n\"Yes, I think we might\".\n*page_break\nTwelve hours later. \n\nThey had attacked at night to achieve surprise. The plan had worked perfectly; the village was lightly defended and most of the fascists had fled when they realised what was happening. Rifles flash in the night as the anarchists push into the centre of the village. \n*line_break\n\"They're retreating into the church!\"\n*line_break\n\"Cowards, we've got them now!\"\n*line_break\n*set militia -3\nAlba gathers her troops at the entrance. A quick headcount reveals they've lost three, not bad all things considered. \n*line_break\n\"Ok, let's go!\"\n*page_break\nThey push down the doors and run inside. At the other end of the building, by the alter, there are four Nationalist soldiers. Each holds a civilian in front of them as human shields. They are family, two middle-aged parents and two children. \n*line_break\n\"Please don't shoot!\" shouts the mother.\n*line_break\n\"That's right Reds, don't move a muscle,\" calls the fascist officer. It's clear they have no way out. But they're not going to give up without a fight either.\n*line_break\n\"Now here's what you're going to do,\" the fascist continues, \"You're going to go out the way you came in and let us go\".\n*line_break\n\"No fucking way!\" Salazar responds.\n*line_break\n\"You've got one more chance, get out or you'll regret it\".\n*line_break\n\"Put down your weapons or you're dead men!\" Alba shouts back.\n*line_break\n\"Oh, on the contrary Senorita,\" and then, looking up at the gallery, \"Now!\"\n*line_break\nFollowing the fascist's gaze, Alba sees a priest, revolver in hand. He fires, hitting the militiawoman next to her. Alba returns fire, taking the priest down before he can do any more harm. Once the firing starts, it's hard to stop and very quickly, two of the soldiers and civilians are gunned down, including the officer. The two remaining throw down their weapons and let the hostages go.\n*line_break\n\"Don't shoot, please!\"\n*line_break\n*if (killpris = true)\n\tAlba's troops pay no attention to the pleas and cut them down where they stand. That is what they've been told to do. So they do it.\n*if (killpris = false)\n\t*if (discretion = true)\n\t\tAlba's troops pay no attention to the pleas and cut them down where they stand.\n\t\t*line_break\n\t\t\"What happened to discretion?\" $!{friend} protests.\n\t\t*line_break\n\t\t\"After pulling a fast one like that, they got what they deserved!\" Salazar replies.\n\t*if (discretion = false)\n\t\tAlba's troops don't. They do what they've been told to do. They take them away.\n*page_break\nThe militia secure the perimeter of the village and leave Alba and $!{friend} in the church, surveying the scene,\n*line_break\n\"I just can't believe they'd do something like that,\" $!{friend} begins.\n*line_break\n\"I wouldn't put anything past them. They're beyond the pale. And do know what these lot call it?\" she looks around the church, \"They call it a holy war, a crusade. They say they're doing God's work!\"\n*line_break\n\"I don't know which God\".\n*line_break\n\"Do you know what I want to do $!{friend}? I want to do something outrageous, here in 'God's house'. To show him what I think of his followers, his faithful. I want to be appalling\".\n*line_break\n\"What do you have in mind?\"\n*fake_choice\n\t#Desecrate the church.\n\t\tThey smash up the various ornaments and trinkets, snap the cross, vandalise the icon of Christ and Mary, burn the bibles, piss in the holy water. \n\t\t*line_break\n\t\t\"That appalling enough for you?\"\n\t\t*line_break\n\t\t\"Oh yes, I think we've made our point\".\n\t#Make love in the church.\n\t\t\"I tell you what we're going to do, we're going to fuck in the confession box\".\n\t\t*line_break\n\t\t\"I'm quite sure God won't like that\".\n\t\t*line_break\n\t\t\"Exactly...\"\n\t\t*if friend = \"Isabel\"\n\t\t\t*set les true\n\t#Burn this place to the ground.\n\t\t\"We're going to burn it to the ground, this symbol of oppression, we're going to wipe it off the map\".\n\t\t*line_break\n\t\tThey do it, leaving the priest and the soldiers' corpses in there to go up in flames with the rest of it.\n\t#Decide against it.\n\t\t\"Forget it, what's the point anyway?\"\n\t\t*line_break\n\t\t\"What did Prieto say? We should never imitate them. Make this into a public space. Pointless destruction won't achieve anything\".\n\t\t*line_break\n\t\t\"I suppose you're right. Come on, we'll get the wounded in here\".\n*goto morales\n*label morales\n*if (moralesdead = true)\n\t*goto dlr\n*page_break\n10.59 A.M.\n*line_break\n14th November 1936\n*line_break\nUniversity City, Madrid\n*line_break\nLieutenant Adrian Morales\n\n\"There it is,\" Morales points, looking through his binoculars. As if to emphasise the point, the machine gun opens up, spraying the campus with tracer.\n*line_break\n\"It's got a commanding view of the entire complex,\" Prieto comments. The weapon is set up on the top floor of the Philosophy and Letters building, where a shell has blown away a section of the wall.\n*line_break\n\"That's why we've got to take it out\".\n*line_break\n\"You're kidding? The militia have been trying to take Philosophy for days!\"\n*line_break\n\"Modesto's Fifth Regiment will be attacking from the South, we'll move in from the North\". The Fifth Regiment is the Communist militia, far and away the most disciplined and well-equipped of the ragtag militia units. Juan Modesto is their commander, who has already built up quite a reputation, reaching the rank of Major aged just thirty.\n*line_break\n\"Bloody communists,\" Prieto grumbles.\n*line_break\n\"The communists are all we've got right now. Without them, Madrid would have fallen weeks ago\". The Republican government had fled Madrid for the relative safety of Valencia eight days ago. In the vacuum, the communists have stepped in to organise the desperate defence of the capital. Once the Nationalist offensive on the city began, every available man and woman has been mobilised in one way or another.\n*page_break\nPrieto and Morales climb back through the remains of the library, through discarded typewriters and half-written dissertations to where their unit is stationed on the ground floor of the Faculty of Arts and Humanities. The red brick metropolis of the newly built University City complex on the Western outskirts of Madrid has become the unlikely battlefield upon which the city's fate is to be decided. \n\nMorales and his fifty or so Assault Guards are holding the building alongside a group of Polish volunteers, some of the first International Brigaders. Communication with them has been difficult, although the discovery of a Polish-Spanish dictionary in the library by Alonso has helped things considerably. \n*line_break\n\"Listen up men,\" Morales begins, \"We have our orders, we're to make an attack on Philosophy. We'll be getting support from Modesto. This is my plan...\"\n*fake_choice\n\t#Try and approach undetected and surprise them.\n\t\t\"We'll go across in small groups of four or five, staying low and moving from cover to cover. We won't use the main entrance but instead try and flank round to the West side of the building\".\n\t#Call for an artillery barrage and attack under the cover of the bombardment.\n\t\t\"We'll call in an artillery strike to soften them up a bit and whilst they are sheltering from the bombardment, move up as close as we dare to the building. Once the barrage stops, we'll charge the last one hundred metres or so before they have time to get back to their positions\".\n\t#Launch a mass charge to overwhelm the defenders.\n\t\t\"They've been fighting for days in there, cut off from supplies and reinforcements, there can't be many left. We'll attack all together, sprint the three hundred metres or so between here and the building and overwhelm them. Hopefully they'll surrender when they see they're so badly outnumbered\".\n*line_break\n\"What about the Poles?\" Alonso asks.\n*line_break\n*fake_choice\n\t#\"We can't take them, good communication is essential if the plan is to succeed\".\n\t\t\"There's no point in even trying to explain it to them, if we want this to go smoothly, we'll have to leave them\".\n\t\t*set polehome true\n\t\t*line_break\n\t\t\"But Sir, surely there aren't enough of us without the Poles!\"\n\t\t*line_break\n\t\t\"Would you like to try and explain the plan to them Alonso? With your little dictionary? No, I thought not. We'll have the Fifth Regiment to provide all the support we need, Modesto won't let us down\".\n\t#\"They're coming, we'll need all the men we can get\".\n\t\t\"You go and explain the plan to them Alonso\".\n\t\t*line_break\n\t\t\"Me?\"\n\t\t*line_break\n\t\t\"Yes, you! Take that dictionary of yours and if there are any misunderstandings, I'll hold you personally responsible\".\n\t\t*line_break\n\t\tAlonso scuttles off grumbling.\n*line_break\n\"Ok then,\" Morales concludes, \"We attack at Twelve, in the meantime...\"\n*fake_choice\n\t#Improve the defences of this position\".\n\t\t\"In the meantime, get fortifying this position\".\n\t\t*line_break\n\t\t\"Why? We're about to leave it\".\n\t\t*line_break\n\t\t*set build true\n\t\t\"You never know when we might be back...\" They get to work, using stacks of thick, heavy textbooks to barricade the doors and windows. There's something rather comic about fighting amongst all this academia however they haven't got anything else to use.\n\t\t*set prepare +1\n\t#Check and double check your weapons and ammo\".\n\t\t\"Check and double check your weapons and ammo. I want them gleaming, cleaned, greased and oiled. And do you know what I want you to do when you're finished?\"\n\t\t*line_break\n\t\t\"What?\"\n\t\t*line_break\n\t\t\"Check them again!\"\n\t\t*line_break\n\t\t\"Yes Sir!\"\n\t#Take potshots at the enemy positions\".\n\t\t\"See if you can hit a few of the buggers, get them on the back foot before we've even started\".\n\t\t*line_break\n\t\t\"But Sir, won't that alert them?\"\n\t\t*line_break\n\t\t\"Not if you kill them it won't\".\n\t\t*line_break\n\t\tVery soon, a fierce exchange of rifle fire is taking place,\n\t\t*line_break\n\t\t\"That's it lads, don't let them get comfortable for a moment!\"\n*page_break\nThe roar of aircraft engines comes overhead. \n*line_break\n\"Theirs or ours?\" Prieto asks.\n*line_break\n\"Can't tell, they're too far off,\" Morales replies, trying to make out their markings with his binoculars, \"They're bombers, three engined. Shit, I think they're Italian. Yep, Nationalist insignia. It looks like they're heading straight for us, get to cover!\"\n*line_break\nBombs begin to fall, making a high pitched whistle as they do so before exploding with an almighty boom. The bombs are falling closer and closer. Fifty metres. Thirty metres. Ten metres. The whole building is shaking,\n*line_break\n\"Get down!\"\n*goto dlr\n*label dlr\n*if (dlrdead = true)\n\t*goto mortwo\n*page_break\n*image number6.png\n11.36 A.M.\n*line_break\n14th November 1936\n*line_break\nUniversity City, Madrid\n*line_break\nWing Commander Jose De La Rosa\n\nDe La Rosa watches as the bombs fall on the University. He's babysitting a flight of Italian SM81 bombers. He's been doing a lot of that in recent days. Madrid has been bombed into the ground. It's a novel experience; a city has never been bombarded like this from the air before in the history of the world. He decides to...\n*fake_choice\n\t#Go down for a closer look.\n\t\tDe La Rosa swoops down through the light cloud to assess the damage. His Fiat CR32 biplane responds nicely. These machines are gifts from Mussolini and are easily the best biplane fighters in the world, a far cry from the aged NiDs they had been flying.\n\t\t*line_break\n\t\t\"Where are you going Blue Three?\" that's Rodriguez.\n\t\t*line_break\n\t\t\"Stay on your flight path Blue Six, I'm observing the effectiveness of the bombardment\".\n\t\t*line_break\n\t\t\"Roger that\".\n\t\t*line_break\n\t\tDe La Rosa has been promoted to Wing Commander, in charge of three other pilots. He is still annoyed he hasn't been appointed squadron leader.\n\t\t*page_break\n\t\tMoving out of the cloud, below 1,000 metres, he can see the University clearly. It's a mess. The building they've targeted is taking a pounding. The poor buggers in there don't have much of a chance. Satisfied, he returns to the other Fiats.\n\t#Stay on course.\n\t\t\"Stay on course Blue Wing\".\n\t\t*line_break \n\t\t\"Roger that,\" responds Rodriguez.\n\t\t*line_break\n\t\tDe La Rosa has been promoted to Wing Commander, in charge of three other pilots. He is still annoyed he hasn't been appointed squadron leader. He adjusts their altitude slightly. His Fiat CR32 biplane responds nicely. These machines are gifts from Mussolini and are easily the best biplane fighters in the world, a far cry from the aged NiDs they had been flying.\n*line_break\n\"The bombers are on their way home but our orders are to patrol the sector and engage any hostiles we encounter\".\n*line_break\n\"Well we're not going to have to wait very long, bogeys, Nine o'clock\".\n*page_break\n\"Good spot Rodriguez!\"\n*line_break\n\"Looks like Monoplanes Sir\".\n*line_break\n\"We're in luck,\" De La Rosa replies sarcastically, \"They're Ratas, three of them\".\n*line_break\nRatas (rats) is the nickname Nationalist pilots have given to the Russian I-16, perhaps the most advanced fighter in the world, due to their ugly appearance. They're faster and more agile than the Nationalists' Fiats. De La Rosa...\n*choice\n\t#Calls for back up.\n\t\t\"Blue Leader, this is Blue Three, we've got three Ratas, should be your seven o'clock low\".\n\t\t*line_break\n\t\tTello, the replacement squadron leader, gets on the radio,\n\t\t*line_break\n\t\t\"We see them Blue Three, moving to engage, you hold your current bearing\".\n\t\t*line_break\n\t\tThe Ratas have seen De La Rosa and his flight and enter attack formation, forming a line and moving above the Wing Commander, preparing to dive.\n\t\t*line_break\n\t\t\"They must think we haven't seen them,\" De La Rosa thinks, \"Fools!\"\n\t\t*line_break\n\t\tJust before the Reds dive, they are beset upon by four more Fiats, led by Tello. Taken by surprise, two go down almost instantly. The third, realising he's got no chance, makes a run for it.\n\t\t*line_break\n\t\t\"Let him go, we'll never catch him in the Fiats\".\n\t\t*line_break\n\t\tTello is on the radio again,\n\t\t*line_break\n\t\t\"Blue Three, this is Blue Leader, we've got a major dogfight developing three kilometres North-East, move to engage!\"\n\t\t*line_break\n\t\t\"Roger that Sir, we're on our way\".\n\t\t*goto bigdogfight\n\t#Orders his wing to attack formation.\n\t\t\"Attack formation, move to engage\".\n\t\t*line_break\n\t\t\"Is that wise Sir?\" Rodriguez asks.\n\t\t*line_break\n\t\t\"Attack formation Blue Five, we outnumber them, we'll have them\".\n\t\t*line_break\n\t\tThe Fiats form a strung out line of four and gain altitude to try and pounce on the Reds. The Ratas have clearly spotted them and mirror their moves, going to meet the Nationalists head on. \n\t\t*page_break\n\t\t\"Hold you fire until we get as close as we can,\" De La Rosa reminds his pilots. The two groups of fighters rush at each other at great pace. The Reds open up first. Just as De La Rosa smiles in satisfaction at the Republicans' error, a stray bullet strikes his engine. It must have hit a fuel line because the front of his Fiat instantly catches fire. \n\t\t*line_break\n\t\t\"Mayday, mayday, this is Blue Three, I'm going down\".\n\t\t*line_break\n\t\t\"Roger that,\" responds replacement squadron leader Tello, \"You're over our lines, you should be alright\".\n\t\t*line_break\n\t\t*if (joqdead = false)\n\t\t\t\"Leaving us so soon?\" Joaquin, now a Wing Commander himself, teases, \"You're getting sloppy!\"\n\t\t\t*line_break\n\t\tDe La Rosa doesn't bother responding, he's got more pressing concerns, namely getting out of the plane. He unbuckles his safety harness as the Fiat begins to rapidly lose altitude. Then he's out and watching his new plane plummet to earth. The parachute doesn't fail, to the Wing Commander's relief.\n\t\t*set shotdown true\n\t\t*goto mortwo\n\t#Uses the cloud to surprise them.\n\t\t\"Ok Blue Wing, move into the clouds at eleven o'clock, we're going to give them a nasty surprise\".\n\t\t*line_break\n\t\t\"Roger that\".\n\t\t*line_break\n\t\tThey move into the cloud cover and of course can't see anything. De La Rosa has to guess how far to go and how long to stay in the cloud itself. He times it to perfection; they exit the cloud just as the three Ratas are passing directly above it and engage immediately. The Wing Commander quickly has one in his sights and wastes no time in dispatching it.\n\t\t*line_break\n\t\t\"Got him!\"\n\t\t*line_break\n\t\tThe Red spirals away in flames, \n\t\t*line_break\n\t\t\"Good kill Blue Three, good kill\".\n\t\t*line_break\n\t\tRodriguez has succeeded in damaging another, whilst the third makes a run for it. The damaged Rata attempts to follow, limping northwards, engine stuttering.\n\t\t*line_break\n\t\t\"Shall I finish him Blue Three?\" Rodriguez asks.\n\t\t*fake_choice\n\t\t\t#\"Let him go\".\n\t\t\t\t\"Don't bother Rodriguez, we've got better things to do, I doubt he'll even make it back to his own lines\".\n\t\t\t\t*line_break\n\t\t\t\t\"I could have in a matter of seconds Sir\".\n\t\t\t\t*line_break\n\t\t\t\t\"Follow order Blue Five\".\n\t\t\t\t*line_break\n\t\t\t\t\"Roger that\".\n\t\t\t#\"Finish him off\".\n\t\t\t\t\"Go on Rodriguez, take him down\".\n\t\t\t\t*line_break\n\t\t\t\t\"With pleasure Sir\".\n\t\t\t\t*line_break\n\t\t\t\tRodriguez swoops up high, moving directly above the wounded Red, before descending rapidly. The Rata makes a desperate attempt to try and dodge Blue Five's move but Rodriguez follows him all the way. Once he gets close, a short burst of machine gun fire is enough to shred the enemy's rudder and he has no choice but to bail out.\n\t\t\t\t*line_break\n\t\t\t\t\"Nice work Blue Five, textbook!\"\n\t\t*line_break\n\t\tTello, the replacement squadron leader, is on the radio,\n\t\t*line_break\n\t\t\"Blue Three, this is Blue Leader, we've got a major dogfight developing three kilometres North-East, move to engage!\"\n\t\t*line_break\n\t\t\"Roger that Sir, we're on our way\".\n\t\t*goto bigdogfight\n*label bigdogfight\n*page_break\nThey reach the battle in record time. Ahead of them is the largest dogfight De La Rosa has ever witnessed, upwards of fifty fighters are battling for control of the skies. The air is thick with burning aviation fuel and the radio is alive with screams and orders to the extent that nothing is comprehensible. De La Rosa orders his wing to...\n*fake_choice\n\t#Split up and engage hostiles.\n\t\t\"Alright Blue Wing, identify and eliminate hostiles at will\".\n\t\t*line_break\n\t\t\"Let's get some kills boys!\"\n\t\t*line_break\n\t\tDe La Rosa dives straight into the melee, moving from one target to the next expertly tailing them, closing, closing until he opens fire and brings down two Red fighters in quick succession.\n\t#Stay in formation and attack as a unit.\n\t\t\"Ok Blue Wing, stay with me, we're going in tight\".\n\t\t*line_break\n\t\tThey gain some altitude before peeling off in line into the melee, De La Rosa leading. He swoops past a Red fighter, just catching it with his machine guns. Blue Five and Six coming straight after him finish it off. As Blue Seven comes in, he collides with another Nationalist fighter that was pursuing the same Red. Both aircraft explode in a fireball.\n\t\t*line_break\n\t\t\"Oh shit!\" De La Rosa realises coming in formation was a mistake, \"Blue Five, Six, where are you?\"\n\t\t*line_break\n\t\t\"I can't see you Blue Three, I can't see you!\" comes the reply from Rodriguez.\n\t\t*line_break\n\t\t\"Fuck!\" De La Rosa realises he's a bad mistake. He hasn't built his career on making mistakes like this.\n\t#Stay on the periphery and pick off stragglers.\n\t\t\"Move around the edges of the dogfight and pick off anyone trying to make a run for it\".\n\t\t*line_break\n\t\t\"Yes Sir, easy pickings!\"\n\t\t*line_break\n\t\tDe La Rosa flies his Fiat around the perimeter of the melee, and, seeing Red biplane attempting to limp away, swoops down and takes out the unsuspecting Republican with ease and speed. \nPresently, a Rata comes up behind De La Rosa. He tries to shake him, but the pilot's clearly no dummy and stays close on his tail.\n*line_break\n\"Rodriguez, there's a bastard Rata on my tail, can't shake him, I need an assist\".\n*line_break\n\"I can't see you Blue Three, and I'm kind of busy here, got one on me as well!\"\n*line_break\n\"Anyone, I need cover!\"\n*line_break\nThere's no response. Well there is, it's just there's so much going on it's impossible to tell who's saying what, there's so much chatter. De La Rosa has to do something, so he...\n*choice\n\t#Barrel rolls.\n\t\tPulling the joystick sharply to the right, he sends his Fiat into a quick roll, then another, then one more just be sure. Levelling out again, he looks behind to see the Red, still glued to his tail.\n\t\t*line_break\n\t\t\"Fuck! Is there anyone out there?\"\n\t\t*if (joqdead = false)\n\t\t\t*line_break\n\t\t\tAt that moment, a Fiat zooms straight past him, narrowly avoiding a head on collision. It opens up on the Rata immediately behind De La Rosa, riddling it with bullets, which set the engine ablaze. \n\t\t\t*line_break\n\t\t\t\"You wanted some help?\" Joaquin's familiar voice (he's now a Wing Commander himself) is music to Jose's ears, \"I don't see any Reds!\" he jokes.\n\t\t\t*line_break\n\t\t\t\"You little shit Joaquin!\"\n\t\t\t*line_break\n\t\t\t\"Hey, now you know how it feels! Come on, there's a fair few still in the skies, let's clear the skies!\"\n\t\t\t*goto mortwo\n\t\t*if (joqdead = true)\n\t\t\t*line_break\n\t\t\tNobody is. The Red closes what's left of the gap, and opens fire. A bullet strikes his engine. It must have hit a fuel line because the front of his Fiat instantly catches fire. \n\t\t\t*line_break\n\t\t\t\"Mayday, mayday, this is Blue Three, I'm going down\".\n\t\t\t*line_break\n\t\t\t\"Roger that,\" responds squadron leader Tello, \"You're over our lines, you should be alright\".\n\t\t\t*line_break\n\t\t\tDe La Rosa doesn't bother responding, he's got more pressing concerns, namely getting out of the plane. He unbuckles his safety harness as the Fiat begins to rapidly lose altitude. Then he's out and watching his new plane plummet to earth. The parachute doesn't fail, to the Wing Commander's relief.\n\t\t\t*set shotdown true\n\t\t*goto mortwo\n\t#Loops the loop.\n\t\tPulling the joystick sharply backward, he sends his Fiat into a steep climb, all the way up and up until he's effectively upside down. From this position he can see the Rata trying to follow. The Red's superior aircraft is having no problems.\n\t\t*line_break\n\t\t\"Fuck! Is there anyone out there? I need assistance!\"\n\t\t*line_break\n\t\tBefore any sort of reply comes, another Fiat zooms past De La Rosa, narrowly avoiding a head on collision. It doesn't avoid the Rata just behind however. The two planes are lost in a fire ball in an instant. Jose breathes out a sigh of relief.\n\t\t*if (joqdead = false)\n\t\t\t*line_break\n\t\t\t\"Where's this Red then?\" it's the familiar voice of Joaquin, now a Wing Commander himself, \"Crying wolf Jose, you must be getting sloppy!\" his former wingman jokes. \n\t\t\t*line_break\n\t\t\t\"You little shit Joaquin, where were you ten seconds ago?\"\n\t\t\t*line_break\n\t\t\t\"We've got plenty more Reds to shoot down Jose, get back in the fight!\"\n\t\t*goto mortwo\n\t#Dives.\n\t\tPushing the joystick sharply forward, he sends his Fiat into a steep dive, losing altitude rapidly. He hopes the Red won't bother following him this far, or that he can outpace him in the dive.  Levelling out again, he looks behind to see the Red, still glued to his tail.\n\t\t*line_break\n\t\t\"Fuck! Is there anyone out there?\"\n\t\t*if (joqdead = false)\n\t\t\t*line_break\n\t\t\tAt that moment, a Fiat zooms straight past him, narrowly avoiding a head on collision. It opens up on the Rata immediately behind De La Rosa, riddling it with bullets, which set the engine ablaze. \n\t\t\t*line_break\n\t\t\t\"You wanted some help?\" Joaquin's familiar voice (he's now a Wing Commander himself) is music to Jose's ears, \"I don't see any Reds!\" he jokes.\n\t\t\t*line_break\n\t\t\t\"You little shit Joaquin!\"\n\t\t\t*line_break\n\t\t\t\"Hey, now you know how it feels! Come on, there's a fair few still in the skies, let's clear the skies!\"\n\t\t\t*goto mortwo\n\t\t*if (joqdead = true)\n\t\t\t*line_break\n\t\t\tNobody is. The Red closes what's left of the gap, and opens fire. A bullet strikes his engine. It must have hit a fuel line because the front of his Fiat instantly catches fire. \n\t\t\t*line_break\n\t\t\t\"Mayday, mayday, this is Blue Three, I'm going down\".\n\t\t\t*line_break\n\t\t\t\"Roger that,\" responds squadron leader Tello, \"You're over our lines, you should be alright\".\n\t\t\t*line_break\n\t\t\tDe La Rosa doesn't bother responding, he's got more pressing concerns, namely getting out of the plane. He unbuckles his safety harness as the Fiat begins to rapidly lose altitude. Then he's out and watching his new plane plummet to earth. The parachute doesn't fail, to the Wing Commander's relief.\n\t\t\t*set shotdown true\n\t\t\t*goto mortwo\n*label mortwo\n*if (moralesdead = true)\n\t*finish\n*page_break\n\"It's stopped, I think it's stopped!\" Morales murmurs, breathing out a sigh of relief.\n*line_break\n\"Casualty report!\" Prieto shouts.\n*line_break\n\"Six killed, fourteen wounded Sir\".\n*line_break\n\"Get a stretcher bearer, now!\"\n*line_break\nMost of the upper two floors of the Arts and Humanities building are gone, but Morales and his men have come off relatively lightly. His first priority is to...\n*fake_choice\n\t#Prepare the men for the attack on Philosophy.\n\t\t\"Get ready men, our attack must still go ahead, Modesto is counting on us!\"\n\t\t*line_break\n\t\t\"I thought we were counting on Modesto?\" Alonso replies cheekily.\n\t\t*line_break\n\t\t\"There's a time and a place and this is neither Alonso\".\n\t\t*line_break\n\t\t\"Strip down your weapons, make sure none of the dust that's been thrown up is in the mechanisms,\" Prieto demands, then turning to Morales, \"What about the wounded Sir?\"\n\t\t*line_break\n\t\t\"They can't be our priority right now, we've got to take that building\".\n\t#Deal with the casualties.\n\t\t\"Let's get these wounded out, come on, everyone attend to someone!\"\n\t\t*line_break\n\t\tMorales attends to a Guard who has lost a large section of his right arm. He's bleeding heavily,\n\t\t\"Oh God, oh God, oh my fucking God, I've lost my arm!\"\n\t\t*line_break\n\t\t\"You're going to be alright, keep still,\" Morales rips some fabric from the man's tunic and fashions a bandage, applying it to the wound, \"Can I have some help here, we need to keep pressure on the wound!\"\n\t\t*line_break\n\t\tA couple of men come over and assist Morales. With much effort, they seem to succeed in stemming the bleeding.\n\t#Reinforce the position against enemy attack.\n\t\t*set prepare +1\n\t\t\"Come on, get fortifying this position!\"\n\t\t*line_break\n\t\t\"Why? We're about to leave it\".\n\t\t*line_break\n\t\t\"We're not attacking in this state, and after that bombardment, I wouldn't be surprised if they attack us first\". \n\t\t*if build = false\n\t\t\tThey get to work, using stacks of thick, heavy textbooks to barricade the doors and windows and make up as best they can for the damage done by the bombing. There's something rather comic about fighting amongst all this academia however they haven't got anything else to use.\n*line_break\nThey are interrupted by the whistle of incoming shells,\n*line_break\n\"Get to cover!\"\n*line_break\nEven before the first salvo hits home, the whistles of the next one on its way can be heard.\n*line_break\n\"Mortar fire, short range,\" Prieto shouts above the din.\n*line_break\n\"They're launching an attack!\" Morales replies, his face covered in red brick dust as masonry falls around them. He's got to organise a defence,\n*line_break\n\"We're under attack, get in position! I want A and B sections upstairs, C and D stay down here\".\n*line_break\n\"Sir,\" Prieto asks, \"Where should we position the machine gun?\" \n*line_break\nThey've been equipped with a Russian DP 28 light machinegun but where should it be deployed?\n*fake_choice\n\t#Upstairs, with a better field of fire.\n\t\t*set prepare +1\n\t\t*set mgup true\n\t#Downstairs, able to take out enemies as they get close.\n\"Right you are Sir!\" the team run off to set up their weapon,\n*line_break\n\"Short controlled bursts, remember, don't let it overheat!\"\n*line_break\nMorales climbs over the rubble up the stairs. It seems as well as explosives, some of the mortars have been firing smoke shells. A light fog hangs over the campus' main square. Then they hear it, a roar of hundreds of men at once,\n*line_break\n\"Viva Espana!\"\n*line_break\n\"They're coming!\"\n*line_break\n\"It sounds like there's a whole bloody battalion descending on us!\" \n*line_break\nOut of the fog, the first few of what is obviously many emerge, charging at the Assault Guards' positions. They wear the distinctive light green uniform of the Spanish Foreign Legion.\n*fake_choice\n\t#Open fire!\n\t\t\"Open fire! No Pasaran!\"\n\t\t*line_break\n\t\t\"No Pasaran!\" comes the cry back, they shall not pass, a phrase that has become something of a watchword for the Republicans in recent weeks. The rifles and machine gun burst into life. At this range, they pick off few enemies but it's not until they get closer that the fire is effective\n\t#Wait until they're closer!\n\t\t\"Hold your fire me, wait until they are within effective range\".\n\t\t*line_break\n\t\tMore and more are coming, getting closer and closer, bayonets fixed.\n\t\t*line_break\n\t\t\"Open fire! No Pasaran!\"\n\t\t*line_break\n\t\t\"No Pasaran!\" comes the cry back, they shall not pass, a phrase that has become something of a watchword for the Republicans in recent weeks. The rifles and machine gun burst into life. The first wave of legionnaires is quickly cut down, put more and more take their place.\n\t#Hold fire until they're nearly on us!\n\t\t\"Hold your fire men! Hold it until the last possible moment!\"\n\t\t*line_break\n\t\tMore and more are coming, getting closer and closer, bayonets fixed. Here they come, fifty metres, twenty metres, they're almost as the walls...\n\t\t*line_break\n\t\t\"Open fire! No Pasaran!\"\n\t\t*line_break\n\t\t\"No Pasaran!\" comes the cry back, they shall not pass, a phrase that has become something of a watchword for the Republicans in recent weeks. The rifles and machine gun burst into life. The deadly volley cuts down a vast swathe of fascists in an instant, taking the wind out of the sails of the attack.\n\t\t*if (mgup = true)\n\t\t\tFrom its advantageous positioning, the machine gun sweeps from left to right, cutting down legionnaires in astonishing numbers.\n\t\t*if (mgup = false)\n\t\t\tThe machine gun chatters away, but from its low siting, its effectiveness is reduced as many of the rounds fly harmlessly over the heads of the legionnaires.\n*page_break\n*if (polehome = true)\n\tPresently, the Nationalist attack is dealt a blow as enfilading fire from the right begins,\n\t*line_break\n\t\"That's the Poles Sir!\"\n\t*line_break\n\t\"Thank God for the bloody Poles!\"\n\t*line_break\n\tThe Legionnaires' attack begins to run out of steam, under fire from two sides.\n*if (polehome = false)\n\t\"Where are the fucking Poles? Why aren't they firing Alonso?\"\n\t*line_break\n\t\"I don't know Sir, they must have left for the attack on Philosophy\".\n\t*line_break\n\t\"Oh shit, they'll get slaughtered, and we've been left exposed!\"\n\t*line_break\n\tDespite their best efforts, the Legionnaires are beginning to close in.\nMorales keeps firing, again and again, to the point where smoke is rising from his rifle. A bullet strikes the barricade Morales is sheltering behind, causing him to jump. A copy of Ulysses has saved his life. It's so thick, it stopped the bullet dead. \n\nAlmost inevitably, the attackers reach the building and force their way into the ground floor. The sound of fierce hand to hand fighting can be heard. \n*line_break\n\"Stay here and stop any more from reaching us,\" Morales orders, before heading down the stairs himself. Into the fray he takes...\n*fake_choice\n\t#His trusty rifle.\n\t\tIt's never failed him so far. Clambering down the stairs, he witnesses a ferocious melee but the tenacity of the Legionnaires seems to be overcoming the Assault Guards. He raises his rifle and picks off one of the fascists, then another. A third comes at him with a bayonet, Morales parries with his rifle before jabbing the butt at the legionnaire, shattering his jaw. \n\t\t\n\t\tHowever, two more take his place and Morales finds himself backed into a corner. Before they can attack, they are cut down by machine gun fire. The Fifth Regiment has arrived! Led by a Soviet T-26 tank, the communists sweep into the square, routing the Nationalists.\n\t\t*line_break\n\t\t\"You're late!\" Morales jokes. They either don't hear or ignore him, given their professionalism. \n\t#His bayonet.\n\t\tMorales clambers down the stairs and witnesses a ferocious melee but the tenacity of the Legionnaires seems to be overcoming the Assault Guards. He sees one of his men about to be overpowered by a fascist. Wielding his bayonet like a dagger, he stabs the Legionnaire repeatedly in the back.\n\t\t*line_break\n\t\t\"Th...thank you Sir\".\n\t\t*line_break\n\t\tBut there's no time for pleasantries as two more fascists come at them. One goes to stab the young Guard but as he does so Morales sinks his blade into the attacker's arm, then quickly withdrawing it and stabbing the fascist in the chest. \n\t\t\n\t\tThe other makes a lunge at Morales, who kicks out violently, causing the Legionnaire to stumble. This mistake allows the Lieutenant to grab him and slit his throat. Whilst Morales deals with this attacker, another two come forward, dispatching the young Assault Guard.\n\n\t\tHe finds himself backed into a corner. But before they can attack him, they are cut down by machine gun fire. The Fifth Regiment has arrived! Led by a Soviet T-26 tank, the communists sweep into the square, routing the Nationalists.\n\t\t*line_break\n\t\t\"You're late!\" Morales jokes. They either don't hear or ignore him, given their professionalism.  \n\t#A discarded shotgun.\n\t\tPicking up a double-barrelled shotgun, Morales clambers down the stairs. He witnesses a ferocious melee but the tenacity of the Legionnaires seems to be overcoming the Assault Guards. He sees one of his men about to be overpowered by a fascist. He fires the shotgun and although the attacker is ripped apart, so too is the Assault Guard. \n\t\t\n\t\tSeeing this, two more soldiers go for him. He waits for them to get close before emptying the second barrel at point blank range, taking them both down. But now the shotgun is spent. A Legionnaire armed with a bayonet comes at him and Morales finds himself backed into a corner.\n\t\t*line_break\n\t\tBefore they can attack, they are cut down by machine gun fire. The Fifth Regiment has arrived! Led by a Soviet T-26 tank, the communists sweep into the square, routing the Nationalists.\n\t\t*line_break\n\t\t\"You're late!\" Morales jokes. They either don't hear or ignore him, given their professionalism. \n*if (prepare = 1)\n\tMorales surveys the scene. It isn't a pretty sight. The unit has suffered very badly indeed. More Assault Guards are casualties than not. Morales can't help but feel some of those young lads died because of decisions he made. But they've held. And the fascists have paid a high price.\n*if (prepare = 2)\n\tMorales surveys the scene. It's not a pretty sight. The unit has suffered heavy casualties, close to fifty percent losses by the looks of it. Could Morales have done better? He thinks so. And maybe they wouldn't have lost so many had Morales done differently. But they've held. And the fascists have paid a high price.\n*if (prepare = 3)\n\tMorales surveys the scene. They've done ok, all things considered. The fascists have certainly paid a far higher price, their own loses have been relatively light. They've held.\n*if (prepare = 4)\n\tMorales surveys the scene. The corpses of dozens of Legionnaires litter the area. They've done extremely well, Morales realises, they've exacted a high price on the enemy for just a few loses on their own side. The humble Assault Guards have humbled the elite Foreign Legion.\n", "chaptertwo": "*image map1.png\nThe first few days of the Rising saw Spain split in two. The Colonies, most of the rural North and a section of the South of Spain very quickly fell to the Nationalist rebels. Central and Southern Spain, Catalonia in the North-East and the Basque Country in the North-West remained loyal to the Government. The Republic enjoyed the advantage of controlling all of Spain's key industrial centres, Barcelona, Bilbao, Madrid and Valencia.\n\nFurthermore, with the Navy siding with the Republic, the elite Army of Africa was trapped in Morocco. But very soon the balance began to change. Realising that he had no way of moving his troops and with the rebellion at a critical stage, General Franco appealed to Europe's fascist dictators, Hitler and Mussolini. Within days, help from Germany and Italy was arriving.\n\nBut in the meantime, the fate of Spain's vital cities was still in the balance...\n*page_break\n2.17 P.M.\n*line_break\n19th July 1936\n*line_break\nBarcelona, Catalonia\n*line_break\nMiliciana Alba Reyes\n\nThe anarchists managed to hitch a ride on a commandeered tram in the direction of the telefonica. The road is blocked however by a large crowd. The militia dismount to see what is going on.\n\n*if albalead = false\n\tSalazar forces his way to the front, where two armed militiamen are trying to keep order. The crowd is animated and angry. It transpires that shots are said to have been fired from the bell tower of the Santa Madrona. The priest has been seized and accused of firing the shots. \n\t*line_break\n\tThe priest is kneeling, praying in a hushed tone. He speaks quickly, so quickly and quietly that it is incomprehensible. His eyes are tight shut and he rocks backward and forward. The mob is baying for blood. Salazar pauses for a moment. Alba encourages him to...\n\t*choice\n\t\t#Execute him, even if he isn't guilty he probably allowed the sniper up there.\n\t\t\t*set albabrutal -10\n\t\t\t*goto execute\n\t\t#Leave him, let the crowd do as they see fit.\n\t\t\t*set albabrutal -5\n\t\t\t*goto leave\n\t\t#Take him to safety, he deserves a fair trial at least.\n\t\t
