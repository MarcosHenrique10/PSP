\t#Calls for artillery fire.\n\t\t\t\tMorales rings up Battalion to call in an artillery strike from the other side of the river,\n\t\t\t\t*if arty = false\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Brigade, I need artillery on the positions of Fourth Company, heavy enemy attacks on this sector\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Negative Palafox, we're out of ammunition, we used up the last of our shells on the previous bombardment\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"You've got to be joking! Nothing at all?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Negative\".\n\t\t\t\t\t*line_break\n\t\t\t\t\tMorales slams the phone down.\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Right, well we better get them out of there\".\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto withdraw\n\t\t\t\t*else\n\t\t\t\t\t\"Ok Lieutenant, get your men down, I'm calling in Brigade artillery on your positions\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Very good Sir, Garcia out\".\n\t\t\t\t\t*line_break\n\t\t\t\t\tMorales hangs up,\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Get me Brigade on the phone, now!\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tAnother telephone is brought to him,\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Brigade, I need artillery fire support on the positions of Fourth Company. Give them everything you've got\".\n\t\t\t\t\t*line_break\n\t\t\t\t\tThe guns on the far side of the Ebro roar into life. After ten minutes of intensive bombardment, he calls up Garcia,\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Situation?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Situation stable, the artillery has wiped out the attackers, infantry decimated, seven panzers out of action. Remaining fascist forces are retreating\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"That's what I like to hear, stellar work Captain, keep me informed\".\n\t\t\t\t\t*goto nxt3\n\t\t\t#Orders a withdrawal into Ribaroja.\n\t\t\t\t\t*label withdraw\n\t\t\t\t\t*set bad +1\n\t\t\t\t\t\"Get yourselves out of there,\" Morales advises, \"Pull back to the line around Ribaroja\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"We'll do our best to retreat in good order Sir\".\n\t\t\t\t\t*line_break\n\t\t\t\t\tThe retreat is messy, chaotic and costly. Trying to run from tanks across open ground is never a good idea. Severely depleted, they make it to Fifth Company's defensive lines, where the fascists are held, for now.\n\t\t\t\t\t*if at = 5\n\t\t\t\t\t\tThe anti-tank guns there do a good job of driving the Nationalist armour back.\n\t\t\t\t\t*goto nxt3\n\n*label nxt3\n*page_break\nWith fascist pressure continuing, Morales ordered a general withdrawal to the line of Fifth Company of the edge of Ribaroja. \n*if pullback = true\n\tGiven the early withdrawal of First and Second companies, Three Company was left terribly exposed and virtually wiped out as they tried to make it back to the new position.\n*if bad = 3\n\tThe Palafox Battalion had paid a high price indeed to hold their ground.\n*if bad = 2\n\tThe Palafox Battalion had done their job, but it had cost them a lot of men.\n*if bad = 1\n\t*achieve defence\n\tThe Palafox Battalion was fulfilling its task with great skill, casualties had so far been manageable.\n*if bad = 0\n\t*achieve defence\n\tThe Palafox Battalion was fulfilling its task with great skill and guile, casualties had so far been light.\n\nBut the attacks just kept on coming and through sheer weight of numbers, the fascists forced their way into the town itself. With the situation quickly deteriorating, Morales abandons his underground HQ,\n*line_break\n\"Let's get moving!\"\n*line_break\nThey come out into the rain. Dusk is beginning to draw in and it's still pouring. \n*if tank = true\n\tMorales orders the T-26 be ferried across the river before seeing to it that the ropes are cut.\n*if arty = true\n\tHe orders an intense artillery bombardment on the town to come in twenty minutes time.\nThen he gives the order,\n*line_break\n\"All units of the Palafox Battalion, conduct a fighting retreat through Ribaroja and across the Ebro\".\n*page_break\n\"Commander,\" Vela asks, \"Surely someone's got to provide cover for the withdrawal, there's got to be a rearguard!\"\n*line_break\n\"Yes, I'm quite aware of that Commissar, now get your sorry arse across the river and let me do my job!\"\n*line_break\nHe hurries away. All around Morales the men of the Palafox, his men, are running through the streets for the narrow, makeshift footbridge which is the last link to the Republican side of the Ebro. The last chance of escape. If they're to make it, someone needs to hold the fascists up.\n*choice\n\t#Morales orders Garcia to lead the rearguard.\n\t\t*set morbrutal -5\n\t\tMorales finds Garcia in the crowd.\n\t\t*line_break\n\t\t\"Garcia, I need you to do one last thing for me, ok? Gather together thirty or so men and cover our retreat\".\n\t\t*line_break\n\t\tThe ageing officer knows the fate being handed to him and accepts it,\n\t\t*line_break\n\t\t\"Y... Yes, very good Sir, I'll get on it right away!\" he begins to walk away, but turns back, Morales can see a solitary tear running down his cheek, \"Could you just promise me something, do me a favour\".\n\t\t*line_break\n\t\t\"Of course\".\n\t\t*line_break\n\t\t\"Give this,\" he takes out a small pocket watch, \"Or at least make sure it gets to my eldest son. He's twelve next week. He'll be the man of the house now, the breadwinner. This is just something of an heirloom, something to remember...\"\n\t\t*line_break\n\t\tGarcia's hands are shaking so Morales takes the watch from him, worried he might drop it,\n\t\t*line_break\n\t\t\"Yes, of course I'll do that,\" Morales offers the man his hand, \"It was an honour fighting alongside you Garcia\".\n\t\t*line_break\n\t\tGarcia takes Morales hand and salutes,\n\t\t*line_break\n\t\t\"And the same to you Sir\".\n\t\t*line_break\n\t\tThen he turns and heads towards the fighting,\n\t\t*line_break\n\t\t\"Right, who wants to die for the Republic? Today's as good a day as any!\"\n\t\t*page_break\n\t\tOnce he and most of the Battalion are safely on the far bank, Morales is handed the detonator for the charges laid on the bridge. He looks out across the river. The sound of fighting can be heard from Ribaroja. Fires have started in the town.\n\t\t*line_break\n\t\t\"Give them hell old man,\" Morales whispers. He blows the bridge.\n\t\t*page_break\n\t\tOf course there was little triumphal celebration. They had succeeded, but only in escaping the enemy, for now. This was no victory. Victory seemed a very distant prospect now.\n\n\t\tCan a cause be just if it fails, Morales wonders. How can they be in the right if they are to lose? How can you give everything you have and end up with nothing? What had been the point of giving so much, fighting so hard, if it was all to be futile? \n\n\t\tMorales had fought for the Republic for well over two years now. He had served it for a further three before the war in the Assault Guards. Very shortly, the Republic will no longer exist. What then? Everything that Morales has worked towards, fought for, believed in will be gone. The Republic and the war has been his life for so long it's hard to remember what it was like before. What is to become of him? \n\t\t*finish\n\t#Morales orders Blanco to lead the rearguard.\n\t\t*set morbrutal -5\n\t\tMorales finds Blanco in the crowd.\n\t\t*line_break\n\t\t\"Blanco, I need you to do one last thing for me, ok? Gather together thirty or so men and cover our retreat\".\n\t\t*line_break\n\t\tThe teenage officer knows the fate being handed to him. He's frightened,\n\t\t*line_break\n\t\t\"Y... Yes, very good Sir,\" he looks around, \"Actually, what the hell, no! I don't want to die today!\"\n\t\t*line_break\n\t\tMorales grabs his arm and tries to calm him down,\n\t\t*line_break\n\t\t\"You won't die Blanco, I promise. Once we're all across you can surrender. What you're doing is of the upmost importance to the war, we have to save as many men as possible\".\n\t\t*line_break\n\t\t\"Importance to the war? The war's already lost for Christ's sake!\"\n\t\t*line_break\n\t\t\"Now now, talk like that is just going to get you shot by Vela,\" Morales takes him by the shoulders and looks directly into his eyes, \"Blanco listen to me. What you're about to do is going to save the lives of all the men you see around you. And you don't have to die, our propaganda lies, the fascists do take prisoners, where do you think they got all their good officers from?\"\n\t\t*line_break\n\t\tTears are running down Blanco's cheeks but he's regained his composure,\n\t\t*line_break\n\t\t\"Just do one thing for me, would you?\"\n\t\t*line_break\n\t\t\"Yes of course, anything\".\n\t\t*line_break\n\t\t\"Go to see my mother, personally, and tell her what I did. Tell her I was the hero, ok?\"\n\t\t*line_break\n\t\t\"I will, I promise,\" Morales offers Blanco his hand, \"It's been an honour fighting alongside you Blanco\".\n\t\t*line_break\n\t\tBlanco takes Morales hand and salutes,\n\t\t*line_break\n\t\t\"And the same to you Sir\".\n\t\t*line_break\n\t\tThen he turns and heads towards the fighting,\n\t\t\"Right, I've got a suicide mission, any volunteers?\"\n\t\t*page_break\n\t\tOnce he and most of the Battalion are safely on the far bank, Morales is handed the detonator for the charges laid on the bridge. He looks out across the river. The sound of fighting can be heard from Ribaroja. Fires have started in the town.\n\t\t*line_break\n\t\t\"Give them hell kid,\" Morales whispers. He blows the bridge.\n\t\t*page_break\n\t\tOf course there was little triumphal celebration. They had succeeded, but only in escaping the enemy, for now. This was no victory. Victory seemed a very distant prospect now.\n\n\t\tCan a cause be just if it fails, Morales wonders. How can they be in the right if they are to lose? How can you give everything you have and end up with nothing? What had been the point of giving so much, fighting so hard, if it was all to be futile? \n\n\t\tMorales had fought for the Republic for well over two years now. He had served it for a further three before the war in the Assault Guards. Very shortly, the Republic will no longer exist. What then? Everything that Morales has worked towards, fought for, believed in will be gone. The Republic and the war has been his life for so long it's hard to remember what it was like before. What is to become of him? \n\t\t*finish\n\t#Morales leads the rearguard himself.\t\n\t\t\"Ok, anyone wanting to die for the Republic, come with me!\"\n\t\t*line_break\n\t\tMorales gathers thirty or so men, some of them more willing than others. He sees Blanco and Garcia to the bridge. Garcia turns back,\n\t\t*line_break\n\t\t\"Sir, you really don't have to do this, we need you!\"\n\t\t*line_break\n\t\t\"Oh but I do Garcia. And I have a feeling they won't need me for much longer anyway, but don't tell Vela I said that eh?\" he winks to Garcia and heads back into the town.\n\t\t*page_break\n\t\tFifteen minutes later...\n\n\t\tMorales hurriedly loads a fresh clip into his PPD. It's his last one.\n\t\t*line_break\n\t\t\"Come on, come on...\" he looks out across the river. They still haven't blown the bridge yet. What's taking them so long?\n\t\t*line_break\n\t\tTwo fascists are moving up the street. From his position in a window, he mows them down. Most of his makeshift rearguard are gone now. The rest he's managed to get cut off from.\n\n\t\tA whole new Nationalist platoon is coming towards him now.\n\t\t*line_break\n\t\t\"Oh no you don't!\"\n\t\t*line_break\n\t\tHe empties his magazine into them sending half of them to hell and the other half running for cover in all directions. \n\n\t\tThe PPD clicks, it's empty. He grabs a fallen rifle, takes aim and takes out one of the advancing fascists. He pulls the bolt up and back, pushes it forward and down. He picks off another, they're getting close now. Another two rounds, another two hits but the rifle is finished now too.\n\n\t\tThrowing it away, he crouches down and draws his Astra 900. He checks the pistol. Ten bullets. He can hear them getting closer. There must be dozens of them moving up the street now. This is what he's been doing for two and a half years now; killing people. And he has no intention of stopping quite yet.\n\t\t*set moralesdead true\n\t\t*finish\n", "chaptersix": "*set dec false\n*set jul true\n*temp weapons true\n*temp help false\n*temp losses false\n*temp moreloss false\n*temp losttanks false\n*temp crisis false\n*temp rest false\n*temp arm false\n*image map4.png\nThe Republican offensive at Teruel ground to a halt in freezing conditions. Franco's counter-attack came on 29th December with the weather improving. After much toing and froing, the Popular Army finally evacuated the city on 22nd February 1938. The Republic had lost 60,000 men to take a city, then lose it and be pushed back behind their start lines. \n\nIn March, the Nationalists launched an all-out offensive on the Aragon Front and the exhausted Popular Army crumbled before them. The fascists made huge advances, over 150 kilometres in places. Crucially, on 15th April, Nationalist forces reached the Mediterranean at Vinaroz. The Republic was now cut in two, with Catalonia left stranded.\n*page_break\nDefeat for the Republic seemed certain, a matter of when not if. Stalin began to reduce support to what he saw as a lost cause. Franco pushed on towards Valencia but the Republicans found new resolve; resistance stiffened and the advance was slowed to a crawl. The Republic had one last trick up its sleeve. \n\nThanks to the temporary opening of the French border in March, weapons and supplies has flowed into Catalonia. Conscription was widened to include those as young as 16 and as old as 45. The Popular Army was rebuilt from the ruins of Teruel. For Prime Minister Negrin, to resist was to win. So long as they could hold out until the inevitable European war between the fascist states and the democracies, they might just be saved.\n\nA bold plan was drawn up. Modesto was given command of the new Army of the Ebro. There was to be one last roll of the dice...\n*goto alba\n\n*label alba \n*if albadead = true\n\t*goto morales\n*page_break\n00.24 A.M.\n*line_break\n23rd May 1938\n*line_break\nOff the coast of Carchuna, 100 KM East of Malaga\n*line_break\nGuerrillera Alba Reyes\n\nThe boat's motor chugs quietly away as they glide across what is a remarkably calm sea. The wind is relatively light and they are making good progress.\n*line_break\n\"You know Aalto, this might just work\".\n*line_break\n\"What did you expect?\"\n*line_break\nAlba chuckles. She's on a small fishing boat with thirty other armed guerrillas and Republican soldiers. Alongside them is another similar vessel with thirty more men. This is the most audacious operation the Republic has ever attempted, the brainchild of Aalto and Goff. Two weeks ago, a message had got through to Alba's guerrillas deep behind the lines. It was a message from Lieutenant William Aalto asking if Alba would lead a team in an ambitious plan. She had agreed at once and gone with $!{friend} back through the lines to the Republican zone, leaving Salazar in charge of the guerrilla band, temporarily.\n*line_break\n\"You ok?\" she asks $!{friend} sitting next to her, \"You seem a bit...\"\n*line_break\n\"No, I'm fine, I'm ok. I just get a bit seasick, you know?\"\n*line_break\n\"Good. Not far now\".\n*page_break\nThey move through the still night. The decorum is interrupted by the sound of spluttering. \n*line_break\n\"Hang about,\" Goff murmurs, \"I think we've got a problem...\"\n*line_break\nThe engine on the other boat appears to have conked out. The troops on-board are making signals at Aalto and Goff, but they can't shout, they must remain as quiet as possible. \n*line_break\n\"Shit...\" Aalto takes his frustration out on the boat, \"We can't stop, we can't take any more on this one. We'll have to leave them. And do this with half as many men\".\n*line_break\n\"Sir,\" the boat's pilot hisses, \"That's Carchuna straight ahead\".\n*line_break\nThey move to the front of the boat. There it is. A stone-built coastal fort dating from the 1700s in which over 300 Republican prisoners of war are being held by the fascists. That's their objective. Alba goes back to her five man team, $!{friend} included,\n*line_break\n\"Right, you know the plan, we're to secure the Western side of the fort, we're...\"\n*choice\n\t#Going in all guns blazing\".\n\t\t\"Yes Ma'am,\" one of the soldiers, Private Perez replies.\n\t\t*line_break\n\t\t\"Ma'am, really? Just Alba will be fine\".\n\t\t*line_break\n\t\t\"Yes... Alba\".\n\t\t*line_break\n\t\tThe boat is approaching the beach now, the sound of the waves lapping against the shore can be heard.\n\t\t*line_break\n\t\t\"Ok, thirty seconds\".\n\t\t*line_break\n\t\tThe boat goes in as shallow as it dares and they jump out into waist-deep water. Wading ashore, the different teams dart off in different directions, securing the perimeter.\n\t\t*line_break\n\t\t\"Good luck, see you on the other side Alba,\" Aalto waves.\n\t\t*line_break\n\t\t\"We'll be there,\" Alba replies.\n\t\t*page_break\n\t\tThey move to the Western walls, spotting a pair of Nationalist soldiers patrolling the beach, torches in hand.\n\t\t*line_break\n\t\t\"Open fire!\"\n\t\t*line_break\n\t\tAlba lets off a few rounds from her MP28 and the soldiers are down before they know what's happening. But the shots have been heard elsewhere. Shouts come from the fort and several searchlights snap into life. They move up and down the beach and spot one of the Republican teams. Alba watches as a machine gun in the fort cuts down the exposed guerrillas.\n\t\t*line_break\n\t\t\"Fuck, we've put our foot in it now!\" $!{friend} curses.\n\t\t*line_break\n\t\tThe night is filled the report of gun fire in all directions. Confusion reigns. Alba and her team move up to the Western walls of the complex.\n\t\t*goto walls\n\t#Doing this quietly\".\n\t\t\"Yes Ma'am,\" one of the soldiers, Private Perez replies.\n\t\t*line_break\n\t\t\"Ma'am, really? Just Alba will be fine\".\n\t\t*line_break\n\t\t\"Yes... Alba\".\n\t\t*line_break\n\t\tThe boat is approaching the beach now, the sound of the waves lapping against the shore can be heard.\n\t\t*line_break\n\t\t\"Ok, thirty seconds\".\n\t\t*line_break\n\t\tThe boat goes in as shallow as it dares and they jump out into waist-deep water. Wading ashore, the different teams dart off in different directions, securing the perimeter.\n\t\t*line_break\n\t\t\"Good luck, see you on the other side Alba,\" Aalto waves.\n\t\t*line_break\n\t\t\"We'll be there,\" Alba replies.\n\t\t*page_break\n\t\tThey move to the Western walls, spotting a pair of Nationalist soldiers patrolling the beach, torches in hand.\n\t\t*line_break\n\t\t\"Ok, $!{friend}, with me, the rest of you, wait here\".\n\t\t*line_break\n\t\tAlba and $!{friend} crouch low and slowly move up behind the soldiers. They walk on their toes, feeling the sand move beneath them. They are now just a few metres behind the fascists. If they were to turn round, it would be curtains. She nods to $!{friend}. They'll each take one simultaneously. Alba's heart is racing. She tries to make her breathing as quiet as possible, in fact she decides to hold her breath. She...\n\t\t*fake_choice\n\t\t\t#Snaps the man's neck.\n\t\t\t\tIn one smooth movement, she takes a step forward, rises to standing, grabs the fascist's head and before he can so much as scream yanks sharply to the right with all her strength. She hears the snap. The soldier goes limp in her arms. She eases him to the ground. Their eyes briefly meet as she does so. The soldier is a young man, he doesn't look older than twenty. His eyes look strange, empty, panicked. Trying to put that out of her mind, she looks over to $!{friend}. \n\t\t\t\t*if friend = \"Isabel\"\n\t\t\t\t\tShe's done the same.\n\t\t\t\t*if friend = \"Jorge\"\n\t\t\t\t\tHe's done the same.\n\t\t\t#Slits the man's throat.\n\t\t\t\tIn one smooth movement, she takes a step forward, rises to standing, places one hand over the fascist's mouth and with the other pulls her knife violently across his neck. The soldier's head yawns back much further than it should. He goes limp in her arms. She eases him to the ground. Their eyes briefly meet as she does so. He can't say anything, other than a pathetic gurgle, but his eyes cry out to Alba, begging. She drops him. She's got blood on her hands. Trying to put that out of her mind, she looks over to $!{friend}.\n\t\t\t\t*if friend = \"Isabel\"\n\t\t\t\t\tShe's done the same.\n\t\t\t\t*if friend = \"Jorge\"\n\t\t\t\t\tHe's done the same.\n\t\t*goto walls\n*label walls\n*page_break\nThey move up to small gate on the Western walls of the Fort itself. It has been boarded up, as the escapees Aalto had interviewed had said it would be.\n*line_break\n\"Ok, Private, show us what you can do\".\n*line_break\n\"Yes Ma... I mean Alba,\" Perez is a sapper, an explosives specialist. He takes off his pack and gets to work. The rest of them cover him as he begins placing the charges. It seems to take forever.\n*line_break\n\"Anytime soon Perez!\"\n*line_break\n\"Yes, ok, it's ready, let's go\".\n*line_break\nThey retreat back a safe distance and lie flat on the sand. Alba looks at her watch, a military model Aalto had provided upon her arrival in the Republican zone.\n*line_break\n\"Twenty seconds...\" the second hand ticks towards 00.45, when all the charges are to be blown simultaneously, \"Ten... five, four, three, two, one, now!\"\n*line_break\nPerez pushes the detonator and the door is blasted open. All around the fort similar explosions can be heard.\n*line_break\n\"Let's go!\"\n*page_break\nThey get inside. In the interior courtyard of the fort confused guards are running back and forth. Alba opens up with her MP28. They move into an alcove. Their task is to...\n*choice\n\t#Free the prisoners.\n\t\t\"Come on, we're going downstairs to the cells!\"\n\t\t*line_break\n\t\tThey find the staircase and go down deep into the fort's innards. They meet a soldier running up the other way. Alba dispatches him with her SMG. They get to the bottom to find the prisoners unguarded. They are of course locked up but the guards seem to have deserted their posts. \n\t\t*line_break\n\t\t\"The keys, do you know where the keys are kept?\" Alba asks the rather surprised looking men in the first cell.\n\t\t*line_break\n\t\t\"The warden has them, he ran off up the stairs about a minute ago\".\n\t\t*line_break\n\t\t\"It must have been that one on the staircase!\" $!{friend} realises.\n\t\t*line_break\n\t\tAlba goes back up but where the guard should be is a pool of blood. Then a red trial going up the stairs. She follows it to the top where she finds the guard desperately trying to pull himself up.\n\t\t*fake_choice\n\t\t\t#Shoot him again.\n\t\t\t\tAlba makes no mistake this time, shooting the soldier clean through the head. She rifles through his pockets and finds the ring of keys.\n\t\t\t#Take what she needs.\n\t\t\t\tAlba respects the man's determination. The soldier writhes as she searches his pockets, eventually pulling out the ring of keys.\n\t\t\t\t*line_break\n\t\t\t\t\"Thanks!\"\n\t\t*line_break\n\t\tShe gets back downstairs and moves from cell to cell opening in the doors. She gets tired of hearing 'Thank you', 'Viva la Republica' and other greetings and thanks as she frees each group of soldiers.\n\t\t*line_break\n\t\t\"Right, that's the last of them, let's get moving!\"\n\t\t*goto courtyard\n\t#Clear out the guards.\n\t\t\"Right, let's get up onto the walls and clear the area!\"\n\t\t*line_break\n\t\tThey find a staircase leading up to the battlements. They meet a soldier running the other way. Alba dispatches him with her SMG. Panting, they reach the top. After taking out several soldiers up there, they spread out.\n\t\t*line_break\n\t\t\"Here Alba, a machine gun!\" $!{friend} shouts over.\n\t\t*line_break\n\t\t\"Perfect!\"\n\t\t*line_break\n\t\tAlba dashes over and assesses the Maxim. Presently, a truck comes into view approaching the fort.\n\t\t*line_break\n\t\t\"Quick $!{friend}, you feed, I fire!\"\n\t\t*line_break\n\t\t$!{friend} feeds the belt of MG rounds into the weapon and makes sure it doesn't jam. Alba takes aim and fires. The machine gun chatters violently. 500 rounds per minute can be fired from a weapon like this and the truck is quickly ripped to shreds, the cab and with it the driver taken out and the rear riddled with bullets. A few soldiers jump out but they don't last long on the open beach.\n\t\t*line_break\n\t\t\"Ok, it looks like the area is secure, let's get to the rendezvous!\"\n\t\t*goto courtyard\n\t#Secure the armoury.\n\t\t\"Ok, we're to take the armoury, that's on this side of the fort\".\n\t\t*line_break\n\t\tThey move swiftly along a corridor in the direction of the armoury. They meet a soldier running the other way. Alba dispatches him with her SMG. They reach a solid metal door. Trying to kick it down doesn't work. Alba...\n\t\t*fake_choice\n\t\t\t#Gets Perez to blow it open.\n\t\t\t\t\"Get a small charge on the door Perez!\"\n\t\t\t\t*line_break\n\t\t\t\t\"Right you are\".\n\t\t\t\t*line_break\n\t\t\t\tHe sets it hurriedly and get back. Alba nods. He blows the door. A small boom is followed by several more and then more and more. Clearly that was the door to the armoury. And now all the armaments within are going off. \n\t\t\t\t*line_break\n\t\t\t\t\"Oh shit...\" Alba realises she's made something of an error, \"Let's get out of here!\"\n\t\t\t\t*line_break\n\t\t\t\tThey scuttle away from the inferno, empty-handed.\n\t\t\t\t*set weapons false\n\t\t\t\t*goto courtyard\n\t\t\t#Finds another way around.\n\t\t\t\t\"We're not getting through here, let's find another way in\".\n\t\t\t\t*line_break\n\t\t\t\tThey double back on themselves and turn left down another of the passageways. In front of them is a Nationalist patrol. \n\t\t\t\t*line_break\n\t\t\t\t\"Shit!\"\n\t\t\t\t*line_break\n\t\t\t\tThey throw themselves against the walls and spray the corridor with bullets. A well placed grenade clears their path. Turning the corner they find another entrance to the armoury. This one's also protected by a solid steel door. But a careless guard has left this one wide open.\n\t\t\t\t*line_break\n\t\t\t\t\"Right, pick up as much as you can carry, and let's get to the rendezvous!\"\n\t\t\t\t*line_break\n\t\t\t\tThey grab all manner of weapons and ammunition plus a sack of grenades.\n\t\t\t\t*goto courtyard\n*label courtyard\n*page_break\nThey regroup with Aalto, Goff and the others in the central courtyard. The fort is all but secure it seems. The prisoners are being assembled,\n*line_break\n\"Come on,\" Aalto shouts, \"Get yourselves in groups of ten, we're leaving now!\"\n*if weapons = false\n\t*line_break\n\t\"Have you got the guns Alba?\" Goff asks.\n\t*line_break\n\t\"Well... no\".\n\t*line_break\n\t\"Shit,\" he turns to the prisoners, \"Ok, you're just going to have to arm yourselves with anything you can find, look for weapons on dead guards\".\n\t*line_break\n*if weapons = true\n\t*line_break\n\tSeized arms are distributed to the prisoners.\nThen, a guerrilla up on the walls shouts down,\n*line_break\n\"We've got fascists incoming, looks like several trucks coming from the village!\"\n*line_break\n\"Right, time is of the essence, get out onto the beach and move up the coastline as quickly possible,\" Aalto orders, \"We'll lead the way, Alba can your team cover the retreat?\"\n*line_break\n\"Of course, we've got your back!\"\n*line_break\n\"I knew I could rely on you, now let's move!\"\n*page_break\nAs quickly as possible, the raiding party, which has been swelled from thirty to over three hundred, files out of the fort. Alba and her men are last out. As they are about to leave, there comes a shout,\n*line_break\n\"Wait! Wait!\" a Nationalist sergeant and half a dozen men emerge from a side passage, \"Wait, we want to come with you!\"\n*line_break\n\"What?\"\n*line_break\n\"We want to come! To the Republic! We have no sympathy for the fascists, we want to fight for the Republic!\"\n*line_break\nWhat are they up to? Are they genuine Republicans who have been unfortunate enough to find themselves in Nationalist territory or is this an elaborate trap?\n*choice\n\t#\"We take them but keep them under guard\".\n\t\t\"Right you are Alba,\" Perez acknowledges, \"I won't let them out of my sight\".\n\t\t*line_break\n\t\t\"Is this really necessary Senorita? We're on your side!\" the sergeant protests.\n\t\t*line_break\n\t\t\"Firstly yes it's necessary, second don't call me senorita, third we haven't got time for this, let's get the fuck out of here\".\n\t\t*line_break\n\t\tWith fascist reinforcements fast approaching, they make a run for it.\n\t\t*goto ohno\n\t#\"Arm them so they can fight with us\".\n\t\t*set albabrutal +5\n\t\t\"Perez, give that sergeant your rifle\".\n\t\t*line_break\n\t\t\"What? Why?\"\n\t\t*line_break\n\t\t\"He's bound to be a better shot than you\".\n\t\t*line_break\n\t\t\"How do you know?\"\n\t\t*line_break\n\t\t\"I think just about anyone would be, now stop complaining and let's get the fuck out of here!\"\n\t\t*line_break\n\t\tWith fascist reinforcements fast approaching, they make a run for it.\n\t\t*goto ohno\n\t#\"Kill them, it's a trap\".\n\t\t*set albabrutal -5\n\t\t\"Please no, Senorita, we are Republicans!\"\n\t\t*line_break\n\t\t\"You're not convincing anyone\".\n\t\t*line_break\n\t\tAlba mercilessly shoots them down where they stand. Typical of the fascists to try and pull a trick like that.\n\t\t*line_break\n\t\t\"Stop gawping Perez, we haven't got time for it, have you never seen blood before? Now let's get the fuck out of here!\"\n\t\t*line_break\n\t\tWith fascist reinforcements fast approaching, they make a run for it.\n\t\t*goto ohno\n*label ohno\n*page_break\nThey run across the beach in the moonlight. \n*line_break\n\"We did it, we fucking did it!\" shouts $!{friend} exuberant.\n*line_break\nAhead of them is the relative safety of a series of caves on the cliff-side. Alba can just make out Aalto standing at the entrance of one of them, waving to her, indicating where they have gone. \n*line_break\n\"You're right. I thought it would be impossible but we've done it!\"\n*line_break\nThen, from across the beach they hear a low boom. Then moments later a high-pitched whine. Then before they can even throw themselves to the floor an explosion that throws Alba off her feet.\n*page_break\nShe coughs out a mouthful of sand. She's ok, she realises, she's ok. She's back on her feet and running again. She looks around, her team are with her, there's Perez, God he looks frightened. But where's $!{friend}? She turns her head. $!{friend} is lying on the beach where the shell struck, motionless.\n*line_break\n\"Come on!\" she can hear Aalto shout, \"We've got to go! Now!\"\n*line_break\nAnother shell whizzes past them and strikes the cliff face. She doesn't think about it, she...\n*fake_choice\n\t#Keeps on running.\n\t\tWithout looking back she sprints as hard as she can for the cave. Once inside she doesn't look back. $!{friend} was dead she tells herself. She does that to make herself feel better. But convincing herself that $!{friend} is dead doesn't calm her down. And what if $!{friend} isn't dead? Abandoned by Alba and left to her fate behind fascist lines, probably wounded. No, Alba tells herself, they've completed their mission. They've done what they had to do. Losses have been light. One loss has been particularly heavy though.\n\t#Goes back for $!{friend}.\n\t\tShe sprints as hard as she can to where $!{friend} lies. It's so much worse than she thought when she gets there. Where legs should be there is a horrible tangled mess of bone, muscle and shrapnel. Alba stares in disbelief for a moment, crouching down beside $!{friend}. That moment becomes a number of seconds. She has frozen. She hadn't frozen like this since the first day of the war, behind that wretched barricade in Barcelona. That seemed an awfully long way away now. Just like then, it is $!{friend}'s voice that wrests her back to reality,\n\t\t*line_break\n\t\t\"G...g...go,\" $!{friend} manages to gasp.\n\t\t*line_break\n\t\t\"No, I... I, I won't leave you!\"\n\t\t*line_break\n\t\t\"D...don't get killed on my account,\" $!{friend} splutters. \n\t\t*if friend = \"Isabel\"\n\t\t\tHer eyes close.\n\t\t*if friend = \"Jorge\"\n\t\t\tHis eyes close.\n\t\t*line_break\n\t\tAlba is crying,\n\t\t*line_break\n\t\t\"No, no, please!\" she puts her ear to $!{friend}'s chest. $!{friend} isn't breathing. $!{friend}'s heart isn't beating. Nationalists are advancing across the beach now. How do you say goodbye to a corpse? There's nothing there. It's just a husk. You can say whatever you like or nothing at all but it makes not one jot of difference. Somebody once described it as like trying to say goodbye to a statue and Alba knew exactly how that felt now. Everything positive, everything alive is gone. It's not like a film or a novel. There's no lengthy, heartfelt farewell. Just a sickening emptiness. \n\t\t*line_break\n\t\tDespite every fibre in her body screaming at her not to, Alba rises to her feet and runs. She sprints with everything she's worth for the caves.\n*page_break\nFour hours later...\n\nThe three hundred strong party trudge wearily across open country. They had managed to shake their pursuers hours back thanks to Aalto's meticulous planning of the escape route. The sun is just beginning to rise on the horizon, casting a queer semi-light.\n*line_break\n\"Ok, take a few minutes rest,\" he orders, \"We're only a few kilometres from the Republican lines now, we're almost home!\"\n*line_break\nHe sees Alba sitting on her own. He approaches her,\n*line_break\n\"Don't,\" she warns pre-emptively.\n*line_break\n\"I just...\"\n*line_break\n\"Fuck off alright. Leave me be\".\n*line_break\nAnd then she cries. And she keeps on crying. She can't stop. She won't. The pain of the loss hurts to the point where she feels physically sick. And it doesn't go away. She can't just flick a switch and stop feeling it. It's persistent. The crying doesn't make it better, but it's entirely involuntary. She has no control over her emotions.\n\nShe wants to be angered by it, be impassioned to carry on the fight and avenge $!{friend}. To punish those who did this. But she doesn't feel anger or fire in her belly. Rather emptiness and hopelessness. What was the point of it all, she kept asking herself. She knew the answer, that they were fighting for the Republic, for democracy and most of all against fascism. But knowing the answer isn't enough to answer the question.\n\nShe thought about all the people she had seen die. Hundreds. Or was it thousands by now? Did this all exist, this whole war, this hellish world she had been living in for the past two years, did it merely exist to destroy and consume? Nothing more, nothing more noble. Perhaps principles had existed at the start, she knew they had, she remembered the heady days of July '36. But where had those principles led?\n\nAlba realises at this point that she has been broken, mentally, by this. She will never be the same again. Becoming aware of this fact has a strangely comforting, calming effect. She feels like she now has ownership of being 'changed' or 'broken'. It is no longer something to be feared but something that has already happened.\n*page_break\nA concerned Aalto sits down next to Alba. She hasn't so much as blinked in five minutes. \n*line_break\n\"We're leaving Alba. You need to come with us now\".\n*line_break\n\"No, I'm staying\".\n*line_break\n\"What do you mean?\"\n*line_break\nShe finally moves, turning to look directly at Aalto,\n*line_break\n\"My militia. My guerrillas. They're out there, not back in the Republic. I've got to get back to them\".\n*line_break\nAalto sighs,\n*line_break\n\"Alba, I think it would be best you come back with us. I can't just let you go off by yourself into the Sierra, not like this\".\n*line_break\n\"What are you trying to say?\"\n*line_break\n\"Nothing, I'm not trying to say anything. But please, come with us. At least for the time being\".\n*choice\n\t#Go with Aalto back to the Republic.\n\t\t*achieve aalto\n\t\t\"Ok. I suppose you're right...\"\n\t\t*line_break\n\t\t\"Come on Reyes, we're nearly there. Let's get home\".\n\t\t*line_break\n\t\tAalto offers his hand and helps Alba to her feet. They set off on the last leg of their journey.\n\t\t*set gowalt true\n\t\t*goto morales\n\t#Stay behind the lines and find Salazar and the others.\n\t\t*achieve sala\n\t\t\"I'm going, alright? I'm not coming with you or your communist friends\".\n\t\t*line_break\n\t\t\"Alba wait, look around you. Look at all these people we've saved\".\n\t\t*line_break\n\t\t\"It won't make any difference will it though?\" Alba asks, staring blankly straight ahead of her.\n\t\t*line_break\n\t\t\"What do you mean? Look what we've achieved! What we've achieved together!\" Aalto retorts.\n\t\t*line_break\n\t\t\"But it won't make a difference. We'll still lose. Three hundred extra soldiers won't win a war. Franco will still win. And then it'll be over, for all of us,\" she turns to Aalto and Goff, \"But not you two. No, you lot can go back to your America, your land of the free. This has all just been one big game for you hasn't it?\" she's getting angry now, \"And when you lose the game, you can just put it away and get on with your lives. But me? Us? We'll have to live with it! Live in Franco's Spain. Or else live somewhere else, in exile, without a place to call home. You might get your medals Aalto but I won't get anything. And I'll lose everything\".\n\t\t*line_break\n\t\t\"Please Alba, reconsider!\"\n\t\t*line_break\n\t\tShe doesn't. She strides off, alone, into the countryside in the opposite direction to the others. She knows where she belongs.\n\t\t*goto morales\n\n\n*label morales\n*if moralesdead = true\n\t*goto delarosa\n*page_break\n1.40 A.M.\n*line_break\n25th July 1938\n*line_break\nThe banks of the Ebro, 2 KM downstream from Asco, Catalonia\n*line_break\nCaptain Adrian Morales\n\n\"Steady as she goes Corporal,\" Morales warns. He sits in the leading rowing boat with ten of his men. To both right and left are dozens of other such boats. The entire 13th International Brigade is crossing the river Ebro. And they're doing so in complete silence. The moon is near-full and the sky is clear. If the fascists are looking, they'll see them. But so far, nothing. That was a good thing.\n*line_break\n\"Captain,\" hisses Lieutenant Blanco, \"Where are the fascists, why aren't they firing?\"\n*line_break\n\"Keep your voice down Lieutenant or they will be firing soon\".\n*line_break\nFollowing the losses at Teruel\n*if alonsowithyou = true\n\t, Alonso included\n*if prietowithyou = true\n\t, Prieto included\n, the Palafox Battalion had been completely reformed and was now part of the 13th International Brigade. Morales had been given new Lieutenants. He hadn't quite believed his eyes when he saw them. \n*page_break\nHe had been sitting in his office several weeks ago when there had been a knock at the door. Two contrasting figures had entered.\n*line_break\n\"Lieutenant Blanco, Sir, reporting for duty\".\n*line_break\n\"Lieutenant Garcia Sir\".\n*line_break\nBlanco looked incredibly young, still troubled by acne, and rather scrawny. Garcia was surely middle-aged, face weathered, hair thinning and greying.\n*line_break\n\"How old are you two?\" Morales had asked.\n*line_break\n\"Er... sixteen Sir,\" Blanco had answered.\n*line_break\n\"Forty-three,\" Garcia had replied.\n*line_break\n\"You're conscripts, new recruits, correct?\"\n*line_break\n\"Yes Sir\".\n*line_break\n\"No military experience?\"\n*line_break\n\"No Sir\".\n*line_break\n\"And so on what basis have you been given Officers' commissions?\"\n*line_break\n\"Well we performed best in our basic training cohort,\" Blanco explains, \"Sir,\" he remembers to add, \"The drill Sergeant said we showed 'tactical promise' Sir\". \n*line_break\n\"And how long was basic training?\"\n*line_break\n\"Six weeks\".\n*line_break\n\"Fuck me...\"\n*page_break\nMorales tries to forget that his men are woefully underprepared for this most daring of offensives. Once their full orders had come through earlier that night, he had addressed the 120 men of One Company, Palafox Battalion. His men. His speech was...\n*fake_choice\n\t#Inspiring.\n\t\t\"Officers and Men of the Army of the Ebro,\" Morales reads from the official orders, \"We are about to undertake the greatest military operation the Spanish Republic has ever attempted\". \n\t\t*line_break\n\t\tThe men start murmuring excitedly to one another. Morales continues,\n\t\t*line_break\n\t\t\"From midnight, 100,000 men will cross the Ebro along a 70 KM front. Our primary objective is simple: to draw as many of Franco's forces as possible away from the attack on Valencia. To this end, we are to advance as far as we can\". \n\t\t*line_break\n\t\t\"But, I'm ambitious. I don't think our biggest ever operation is merely meant to be a diversion. If you are like me, you believe we are capable of so much more. Because if we achieve a breakthrough here, anything's possible. To reconnect the two Republican zones is not an impossible goal. If we achieve it, the whole balance of the war will shift. Victory is within our grasp. Victory can be grasped tonight! Viva la Republica!\"\n\t\t*line_break\n\t\t\"Viva la Republica!\" comes the shout back from 120 mouths.\n\t#Rousing.\n\t\t\"Officers and Men of the Army of the Ebro,\" Morales reads from the official orders, \"We are about to undertake the greatest military operation the Spanish Republic has ever attempted\". \n\t\t*line_break\n\t\tThe men start murmuring excitedly to one another. Morales continues,\n\t\t*line_break\n\t\t\"Tonight, 100,000 men will cross the Ebro along a 70 KM front. It's our biggest, most ambitious attack. We're not just going to distract Franco from Valencia, we're going to sweep him away!\"\n\t\t*line_break\n\t\tThe men cheer,\n\t\t\"We're going to cut a swathe right through his army! We're going to reunite the two Republican zones! We're about to change the course of this war, tonight! Viva la Republica!\"\n\t\t*line_break\n\t\t\"Viva la Republica!\" comes the shout back from 120 mouths.\n\t#Moving.\n\t\t\"Officers and Men of the Army of the Ebro,\" Morales reads from the official orders, \"We are about to undertake the greatest military operation the Spanish Republic has ever attempted\". \n\t\t*line_break\n\t\tThe men start murmuring excitedly to one another. Morales continues,\n\t\t*line_break\n\t\t\"Now, officially all we're trying to do is draw troops away from Franco's attack on Valencia. But we can do so much more. We must. This war has been going for two years now. And for almost its entire duration, the Republic has been suffering defeat after defeat. There's going to come a time very soon when we can't retreat any further\".\n\t\t*line_break\n\t\t\"We have to start winning battles. We [i]have[/i] to start gaining ground. We [i]have[/i] to start taking the fight to the fascists. Or else everything we fight for will be lost. Everything we believe in. Expect no mercy from Franco. He will not be a gracious victor. This is where things start to change, tonight. Not one step backwards now. Viva la Republica!\"\n\t\t*line_break\n\t\t\"Viva la Republica!\" comes the shout back from 120 mouths.\n*page_break\nThey reach the Nationalist bank of the Ebro and hurriedly disembark. So far, so good. \n*line_break\n\"We know our orders, let's move to secure...\n*choice\n\t#The bridge at Asco\".\n\t\tThey move upstream in the direction of the village of Asco. Just south of the town is a steel road bridge that will be vital if they want to get armour across. Morales' Company has been tasked with capturing the bridge before the fascists can blow it. After a hurried advance upstream, still encountering no opposition, the bridge comes into view out of the inky darkness.\n\t\t*line_break\n\t\t\"There it is Sir,\" Blanco points out.\n\t\t*line_break\n\t\t\"Yes, thank you Lieutenant, I'm not blind\".\n\t\t*line_break\n\t\t\"Sorry Sir\".\n\t\t*line_break\n\t\t\"Just listen up alright? Garcia, take your men and...\n\t\t*choice\n\t\t\t#Check the underside of the bridge for explosives\".\n\t\t\t\t\"Yes Sir\".\n\t\t\t\t*line_break\n\t\t\t\tThe rest of them watch as Garcia leads a Platoon of thirty men down to the edge of the river and along towards the bridge. Before they can get there, they're spotted by fascist sentries. A hidden MG nest opens fire on them. Caught in the open with no cover, they take heavy casualties.\n\t\t\t\t*line_break\n\t\t\t\t\"Well don't just sit and watch, let's take out that MG!\"\n\t\t\t\t*page_break\n\t\t\t\tMorales leads the rest of the men around in a loop, out of view of the machine gun position. Slowly, silently they creep forward to the bunker. The machine gun is chattering away. He can hear soldiers barking instructions inside. He takes a grenade from his belt and passes it to a teenage private lying beside him.\n\t\t\t\t*line_break\n\t\t\t\t\"Go on son, pull the pin and get that through the firing slit\".\n\t\t\t\t*line_break\n\t\t\t\t\"Me Captain?\"\n\t\t\t\t*line_break\n\t\t\t\t\"Yes, now go!\"\n\t\t\t\t*line_break\n\t\t\t\tHe rises to a crouched position, takes a deep breath and then dashes forward. Just before he gets there, the MG crew see him and swivel their weapon. As he throws the grenade the machine gun let's off a burst at close range.\n\t\t\t\t*line_break\n\t\t\t\tThe grenade finds its target and blows the bunker to pieces, silencing the MG. \n\t\t\t\t*line_break\n\t\t\t\t\"God I thought I'd lost my arm there!\" the Private pants.\n\t\t\t\t*line_break\n\t\t\t\tHe hasn't realised. His right arm is swinging from left to right, hanging by a single tendon.\n\t\t\t\t*line_break\n\t\t\t\t\"Come on Private,\" Morales rushes over to him, \"Let's get you back...\"\n\t\t\t\t*line_break\n\t\t\t\tFrom the look on Morales' face, the Private realises something is wrong. He looks down.\n\t\t\t\t*line_break\n\t\t\t\t\"Oh God, oh God!\" he looks at the Captain in panic,\" B...b...but what am I going to do in civilian life?\"\n\t\t\t\t*page_break\n\t\t\t\tQuickly they clear the bridge and get to Garcia. He's alright but his platoon has suffered close to 50% losses and they're only half an hour into the offensive. But the bridge is secure.\n\t\t\t\t*set arm true\n\t\t\t\t*set losses true\n\t\t\t\t*goto advance\n\t\t\t#Check for any defences on this side of the river\".\n\t\t\t\t\"Yes Sir\".\n\t\t\t\t*line_break\n\t\t\t\tThe rest of them watch as Garcia leads a Platoon of thirty men along the side of the road. Suddenly they throw themselves flat. Garcia turns, still lying and makes a series of signals to Morales.\n\t\t\t\t*line_break\n\t\t\t\t\"Machine gun nest,\" Morales sighs, \"Right, they're trapped, if they move, they could easily be spotted\".\n\t\t\t\t*line_break\n\t\t\t\tMorales leads the rest of the men around in a loop, out of view of the machine gun position. Slowly, silently they creep forward to the bunker. He can hear soldiers casually chatting inside. He takes a grenade from his belt and passes it to a teenage private lying beside him.\n\t\t\t\t*line_break\n\t\t\t\t\"Go on son, pull the pin and get that through the door\".\n\t\t\t\t*line_break\n\t\t\t\t\"Me Captain?\"\n\t\t\t\t*line_break\n\t\t\t\t\"Yes, now go!\"\n\t\t\t\t*line_break\n\t\t\t\tHe rises to a crouched position, takes a deep breath and then dashes forward, tossing the explosive through the gapping door. A few shouts of confusion. Then an explosion. Then silence.\n\t\t\t\t*line_break\n\t\t\t\t\"God, I did it!\"\n\t\t\t\t*line_break\n\t\t\t\t\"Stellar job private, now let's secure this bridge\".\n\t\t\t\t*line_break\n\t\t\t\tQuickly they clear the bridge and get to Garcia. The crossing is secure and so far things have all gone according to plan.\n\t\t\t\t*goto advance\n\t#The road to Camposines\".\n\t\tThe move up to the main road between the villages of Asco and Venta de Camposines. They push forward for about a quarter of an hour without seeing a soul. Then Garcia and his platoon, who are in the lead, throw themselves flat. The rest of the Company do the same. Garcia turns, still lying and makes a series of signals to Morales.\n\t\t*line_break\n\t\t\"Enemy position...\" Morales reads the hand signals, \"MG nest, listening station, fuel dump. Well we've hit the jackpot\".\n\t\t*choice\n\t\t\t#Bypass the position.\n\t\t\t\t\"We'll leave this for the armour following up, let's try and move past without being spotted\".\n\t\t\t\t*line_break\n\t\t\t\tReluctantly, Garcia leads his men on, keeping as low as possible and totally silent. They don't succeed. The MG nest opens fire on them. Caught in the open with no cover, they take heavy casualties.\n\t\t\t\t*line_break\n\t\t\t\t\"Well don't just sit and watch, let's take out that MG!\"\n\t\t\t\t*page_break\n\t\t\t\tMorales leads the rest of the men around in a loop, out of view of the machine gun position. Slowly, silently they creep forward to the bunker. The machine gun is chattering away. He can hear soldiers barking instructions inside. He takes a grenade from his belt and passes it to a teenage private lying beside him.\n\t\t\t\t*line_break\n\t\t\t\t\"Go on son, pull the pin and get that through the firing slit\".\n\t\t\t\t*line_break\n\t\t\t\t\"Me Captain?\"\n\t\t\t\t*line_break\n\t\t\t\t\"Yes, now go!\"\n\t\t\t\t*line_break\n\t\t\t\tHe rises to a crouched position, takes a deep breath and then dashes forward. Just before he gets there, the MG crew see him and swivel their weapon. As he throws the grenade the machine gun let's off a burst at close range.\n\t\t\t\t*line_break\n\t\t\t\tThe grenade finds its target and blows the bunker to pieces, silencing the MG. \n\t\t\t\t*line_break\n\t\t\t\t\"God I thought I'd lost my arm there!\" the Private pants.\n\t\t\t\t*line_break\n\t\t\t\tHe hasn't realised. His right arm is swinging from left to right, hanging by a single tendon.\n\t\t\t\t*line_break\n\t\t\t\t\"Come on Private,\" Morales rushes over to him, \"Let's get you back...\"\n\t\t\t\t*line_break\n\t\t\t\tFrom the look on Morales' face, the Private realises something is wrong. He looks down.\n\t\t\t\t*line_break\n\t\t\t\t\"Oh God, oh God!\" he looks at the Captain in panic,\" B...b...but what am I going to do in civilian life?\"\n\t\t\t\t*page_break\n\t\t\t\tQuickly they clear the position, taking a number of positions, and get to Garcia. He's alright but his platoon has suffered close to 50% losses and they're only half an hour into the offensive. But the checkpoint is secure.\n\t\t\t\t*set losses true\n\t\t\t\t*set arm true\n\t\t\t\t*goto advance \n\t\t\t#Clear it out.\t\t\t\n\t\t\t\tMorales indicates for Garcia and his men to stay where they are so they aren't spotted before leading the rest of the men around in a loop, out of view of the machine gun position. Slowly, silently they creep forward to the bunker. He can hear soldiers casually chatting inside. He takes a grenade from his belt and passes it to a teenage private lying beside him.\n\t\t\t\t*line_break\n\t\t\t\t\"Go on son, pull the pin and get that through the door\".\n\t\t\t\t*line_break\n\t\t\t\t\"Me Captain?\"\n\t\t\t\t*line_break\n\t\t\t\t\"Yes, now go!\"\n\t\t\t\t*line_break\n\t\t\t\tHe rises to a crouched position, takes a deep breath and then dashes forward, tossing the explosive through the gapping door. A few shouts of confusion. Then an explosion. Then silence.\n\t\t\t\t*line_break\n\t\t\t\t\"God, I did it!\"\n\t\t\t\t*line_break\n\t\t\t\t\"Stellar job private, now let's secure this bridge\".\n\t\t\t\t*line_break\n\t\t\t\tQuickly they clear the position, taking a number of prisoners and get to Garcia. The checkpoint is secure and so far things have all gone according to plan.\n\t\t\t\t*goto advance\n\n\n\n*label advance\n*page_break\n*image number12.png\nAnd then they were moving, advancing down the road to Camposines through the early hours of the morning, till dawn and beyond. There is a thrill that goes with the speed of an advance. Watching kilometre after kilometre go past as they ride the tanks. Wind through his air, the enemy fleeing in their wake. By 8 A.M. they had reached Venta de Camposines. Twenty kilometres in six hours! It's unheard of. The town's garrison wasn't expecting them and surrendered rapidly when they realised the size of the Republican force. They had captured the HQ of the Nationalist 50th Division and said Division's commanding officer. Morales felt something he hadn't for a long time. Optimism.\n*goto maria\n\n*label maria\n*if mariadead = true\n\t*goto delarosa\n*page_break\n8.14 A.M.\n*line_break\n25th July 1938\n*line_break\nVenta de Camposines, Catalonia\n*line_break\nSister Maria Farfan\n\nThe attack had come as a surprise to everyone. This was supposed to be a quiet sector. Nobody knew what to do. They were awoken at six by the sound of battle. Carrel had decided they must remain at their posts; they'd received no orders to evacuate, this was probably just a minor skirmish. But when fleeing troops had started passing through the town, everyone had begun to get nervous. Captain Jimenez declared that it was impossible the Reds would reach them, this was merely the death throes of a broken army. \n\nBut by eight in the morning, the panic had become very real. Maria is trying as calmly as possible to apply a new dressing to an amputee. Gabrielle bursts into the ward,\n*if vidrship = false\n\t*if abortion = false\n\t\tthe baby, now seven months old, was back in Pamplona in the care of Gabrielle's parents.\n*line_break\n\"The Reds are here!\"\n*line_break\n\"Shhh!\" Maria responds angrily, half the patients on the ward are still asleep.\n*line_break\n\"Didn't you hear me?\" Gabrielle hisses, \"They're here, in Camposines, we've got to go!\"\n*line_break\n\"They can't be...\" Maria replies, uninterested, returning to the dressing, \"We're twenty kilometres from the front\".\n*line_break\n\"Maria, would I joke about this? Carrel is going off it, we're leaving in five minutes!\"\n*line_break\nDistracted, Maria makes a mistake and accidently breaks one of the stitches. The soldier takes a sharp intake of breath. The wound reopens and starts bleeding heavily.\n*line_break\n\"Shit...\"\n*line_break\n\"Maria, we're going right now!\"\n*line_break\nMaria...\n*choice\n\t#Leaves.\n\t\t\"Alright, I'm coming!\"\n\t\t*line_break\n\t\tShe haphazardly reapplies the dressing without bothering to sew up for wound.\n\t\t*line_break\n\t\t\"Wait!\" the soldier whimpers. She doesn't.\n\t\t*line_break\n\t\t\"Come on!\" Gabrielle sprints off. \n\t\t*goto fal\n\t#Stitches the wound back up first. \n\t\t\"Gabrielle, I've got to deal with this, I can't leave him like this\".\n\t\t*line_break\n\t\t\"Ok, I'll see you outside!\"\n\t\t*line_break\n\t\t\"Gabrielle!\" she's gone, \"You cowardly little...\"\n\t\t*line_break\n\t\t\"Th...thank you,\" the soldier manages.\n\t\t*line_break\n\t\tShe hurriedly re-stitches the wound and reapplies the dressing,\n\t\t*line_break\n\t\t\"You'll be alright,\" she assures him, \"They'll not touch the wounded,\" she's not sure if that's true. It certainly isn't based on the propaganda she's heard. The soldier smiles wryly,\n\t\t*line_break\n\t\t\"Get yourself out of here!\"\n\t\t*set help true\n\t\t*line_break\n\t\t*goto fal\n\n*label fal\nShe goes for the door. As Maria is passing the last bed in the ward, a hand reaches out and grabs her. She jumps. The patient is a Falangist with his head bandaged.\n*line_break\n\"Please,\" he says, \"Don't let the Reds have me. I don't want to die at the hands of a filthy communist. Kill me now,\" he points to his dose of anaesthetic by the bedside, \"Please, I can't do it, I'm too weak\".\n*line_break\n\"I... I can't...\"\n*line_break\n\"You've heard what they do with people like me, just do it, I beg of you!\"\n*choice\n\t#Give him the overdose.\n\t\t\"Ok, I'll do it!\" she rapidly prepares a syringe, fills it with four time the ordinary dose, finds a vein on his arm, sticks the needle in.\n\t\t*line_break\n\t\t\"Are you sure you want me to do this?\" Maria has never taken a life before. And this is effectively killing someone.\n\t\t*line_break\n\t\t\"Yes I'm sure, now get on with it!\"\n\t\t*line_break\n\t\tShe injects the lethal dose, removes the syringe,\n\t\t*line_break\n\t\t\"Rest in peace Senor...\"\n\t\t*line_break\n\t\t\"Thank you\".\n\t\t*if help = false\n\t\t\t*goto martrap\n\t\t*else\n\t\t\tBefore she can even leave the room, three Republican soldiers storm in. She puts her hands up. They take her out into the corridor\n\t\t\t*line_break\n\t\t\t*goto theatre\n\t#Don't.\n\t\t\"I'm sorry I really don't have time\".\n\t\t*line_break\n\t\t\"Please Senorita!\" he shouts after her, \"Think about what they're going to do to me!\"\n\t\t*line_break\n\t\tShe does her best to block out the shouts and runs after Gabrielle.\n\t\t*if help = true\n\t\t\t*goto martrap\n\t\t*else\n\t\t\t*goto marrun\n\n*label martrap\n*page_break\nMaria turns the corner to be greeted by three soldiers. They are wearing Republican uniforms. Maria puts her hands up. \n*label theatre\n\"Get in there!\" the soldier barks, pointing with his rifle to the operating theatre. Maria complies. They lock her in. She feels strangely calm.\n*if dlrship = true\n\tShe pushes what's happening to her out of her mind. She thinks about $!{man}. He had got leave and visited for a few days last week. It had been perfect. She was sure that she loved him. She thought about that certainty rather than the uncertainty that faced her now. \n\nShe can hear chattering outside. She presses her ear to the door and tries to make out what they're saying.\n*line_break\n\"There's a lot of wounded Sir, what are we supposed to do with them?\"\n*line_break\n\"Leave them, they're not our responsibility, I'm sure Commissar Vela will decide what should happen to them once he finally catches up with us\".\n*line_break\n\"One more thing Captain, the staff seem to have left but we found one of them\".\n*line_break\n\"Oh?\"\n*line_break\n\"She's in the theatre Sir\".\n*line_break\nMaria moves away from the door. The door opens. \n*page_break\n*if moralesdead = false\n\tA Republican officer in his mid-twenties enters. He's tall, immaculately turned out and has sleek black hair.\n\t*line_break\n\t\"Good morning Senorita, I'm Captain Morales. I trust my men haven't been too rough. Please sit down\".\n\t*line_break\n\tMaria sits on the operating table.\n\t*if morbrutal \u003c50\n\t\t\"Now, I'm going to make this very simple for you. You need to give me a reason to keep you alive. Because at the moment, all I'm seeing is that great big red Falange symbol on your chest there. That says to me fascist. So you're my enemy\".\n\t\t*line_break\n\t\tMaria swallows hard. She avoids his gaze. It's at that moment she spots on the trolley next to the table is a medical scalpel. \n\t\t*line_break\n\t\t\"Come on then Senorita, what have you got for me?\"\n\t\t*choice\n\t\t\t#Maria goes for the scalpel.\n\t\t\t\tShe shoves the Captain and makes a lunge for the trolley, grabbing the scalpel. She turns to see Morales aiming his pistol at her. \n\t\t\t\t*line_break\n\t\t\t\t\"So it has to be like this does it? Senorita, if you don't put the blade down, I [i]will[/i] shoot you\".\n\t\t\t\t*line_break\n\t\t\t\tMaria...\n\t\t\t\t*choice\n\t\t\t\t\t#Drops it.\n\t\t\t\t\t\tShe lets it slip from her hand. \n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Very good Senorita, very good. Now come with me...\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tMorales puts her on a truck bound for the Republican side of the Ebro. She's a prisoner of war.\n\t\t\t\t\t\t*goto delarosa\n\t\t\t\t\t#Goes at him.\n\t\t\t\t\t\tSumming up her courage, Maria decides she is going to kill this man. She lowers the blade, feigning that she is about to put it down. Then she leaps at the Morales, thrusting the blade towards his neck. Before she can get there, Morales has fired. Maria drops the scalpel. Then she drops to the ground. \n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Such a shame,\" Morales sighs, \"But they make you like this don't they\". \n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tHe puts the gun to her head and pulls the trigger. The operating theatre is covered in blood.\n\t\t\t\t\t\t*set mariadead true\n\t\t\t\t\t\t*goto delarosa\n\t\t\t#Maria starts to undress.\n\t\t\t\tShe undoes the buttons on her blouse.\n\t\t\t\t*line_break\n\t\t\t\t\"That wasn't what I meant Senorita...\" Morales protests, half-heartedly. The protests don't last very long. As Maria removes her long skirt, the Captain closes the door and undoes his belt. He places it on the table. Maria notices that his pistol is inside the holster, attached to said belt. She looks back at the scalpel.\n\t\t\t\t*choice\n\t\t\t\t\t#Take the scalpel.\n\t\t\t\t\t\tAs discreetly as possible, Maria picks up the blade as Morales struggles with his trousers. Once he's freed himself he steps closer to her,\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"You don't know how long it's been...\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tBefore he can finish his sentence, Maria has sunk the scalpel into his neck. He looks rather taken aback. But he can't say anything. Maria pulls the blade out violently. It's very messy. The operating theatre is covered in blood as is Maria's half-naked body. She watches him die, not really feeling anything at all.\n\t\t\t\t\t\t*set marbrutal -5\n\t\t\t\t\t\t*achieve killer\n\t\t\t\t\t\t*set murderer true\n\t\t\t\t\t\t*set moralesdead true\n\t\t\t\t\t\t*goto delarosa \n\t\t\t\t\t#Leave it.\n\t\t\t\t\t\tShe leaves it. She isn't a killer. Morales fucks her on the operating table. Does she enjoy it? Of course not. It's the most horrible things she's ever experienced. But it's saved her life.\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tBefore she's even had a chance to get herself properly dressed, she's bundled onto a truck bound for the Republican side of the Ebro. She's a prisoner of war.\n\t\t\t\t\t\t*set raped true\n\t\t\t\t\t\t*goto delarosa\n\t\t\t#Maria gives him military information.\n\t\t\t\t\"I... I know... I have information\".\n\t\t\t\t*line_break\n\t\t\t\t\"Really? Like what?\"\n\t\t\t\t*line_break\n\t\t\t\tMaria is just a nurse. In reality she knows very little of any importance. She doesn't know what to say.\n\t\t\t\t*line_break\n\t\t\t\t\"The next town along the road, Corbera, that's held by Regulares, you know, the Arabs\".\n\t\t\t\t*line_break\n\t\t\t\t\"Thank you Senorita, I do know what Regulares are, anything else, because that's not more than I already knew\".\n\t\t\t\t*line_break\n\t\t\t\tShe can't think of anything. Her mind has gone blank, not that she knew any military secrets anyway.\n\t\t\t\t*line_break\n\t\t\t\t\"No? Nothing? Well I'm afraid you're going to have to do better than that if you want your life\".\n\t\t\t\t*choice\n\t\t\t\t\t#Maria goes for the scalpel.\n\t\t\t\t\t\tShe shoves the Captain and makes a lunge for the trolley, grabbing the scalpel. She turns to see Morales aiming his pistol at her. \n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"So it has to be like this does it? Senorita, if you don't put the blade down, I [i]will[/i] shoot you\".\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tMaria...\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Drops it.\n\t\t\t\t\t\t\t\tShe lets it slip from her hand. \n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\"Very good Senorita, very good. Now come with me...\"\n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\tMorales puts her on a truck bound for the Republican side of the Ebro. She's a prisoner of war.\n\t\t\t\t\t\t\t\t*goto delarosa\n\t\t\t\t\t\t\t#Goes at him.\n\t\t\t\t\t\t\t\tSumming up her courage, Maria decides she is going to kill this man. She lowers the blade, feigning that she is about to put it down. Then she leaps d her life.\n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\tBefore she's even had a chance to get herself properly dressed, she's bundled onto a truck bound for the Republican side of the Ebro. She's a prisoner of war.\n\t\t\t\t\t\t\t\t*set raped true\n\t\t\t\t\t\t\t\t*goto delarosa\n\t\t\t\t\t#Maria says nothing.\n\t\t\t\t\t\t\"Nothing to say? Nope? Well that puts me in a very difficult position,\" he takes his pistol out from its holster and points it at her head, \"Does that help jog your memory?\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tMaria remains silent except for a pathetic whimper. Morales pulls the trigger. The operating theatre is covered in blood.\n\t\t\t\t\t\t*set mariadead true\n\t\t\t\t\t\t*goto delarosa\n\t\t\t#Maria says nothing.\n\t\t\t\t\"Nothing to say for yourself?\" Morales asks, \"Well I must say that isn't terribly helpful,\" he takes his pistol out from its holster and points it at her head, \"Does that help jog your memory?\"\n\t\t\t\t*line_break\n\t\t\t\tMaria stares straight at him. Would he shoot her? She thinks he probably would...\n\t\t\t\t*choice\n\t\t\t\t\t#Maria goes for the scalpel.\n\t\t\t\t\t\tShe shoves the Captain and makes a lunge for the trolley, grabbing the scalpel. She turns to see Morales aiming his pistol at her. \n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"So it has to be like this does it? Senorita, if you don't put the blade down, I [i]will[/i] shoot you\".\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tMaria...\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Drops it.\n\t\t\t\t\t\t\t\tShe lets it slip from her hand. \n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\"Very good Senorita, very good. Now come with me...\"\n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\tMorales puts her on a truck bound for the Republican side of the Ebro. She's a prisoner of war.\n\t\t\t\t\t\t\t\t*goto delarosa\n\t\t\t\t\t\t\t#Goes at him.\n\t\t\t\t\t\t\t\tSumming up her courage, Maria decides she is going to kill this man. She lowers the blade, feigning that she is a b, keep law and order and [i]you[/i] killed him\". \n\t*line_break\n\tMaria tries to think of something to say but can't. She looks at the ground. She's very scared.\n\t*line_break\n\t\"So, like I say Senorita, you need to give me a reason to keep you alive\".\n\t*choice\n\t\t\t#Maria goes for the scalpel.\n\t\t\t\tShe shoves the Captain and makes a lunge for the trolley, grabbing the scalpel. She turns to see Prieto aiming his pistol at her. \n\t\t\t\t*line_break\n\t\t\t\t\"So it has to be like this does it? Senorita, if you don't put the blade down, I [i]will[/i] shoot you\".\n\t\t\t\t*line_break\n\t\t\t\tMaria...\n\t\t\t\t*choice\n\t\t\t\t\t#Drops it.\n\t\t\t\t\t\tShe lets it slip from her hand. \n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Very good Senorita, very good. Now come with me...\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tPrieto puts her on a truck bound for the Republican side of the Ebro. She's a prisoner of war.\n\t\t\t\t\t\t*goto delarosa\n\t\t\t\t\t#Goes at him.\n\t\t\t\t\t\tSumming up her courage, Maria decides she is going to kill this man. She lowers the blade, feigning that she is about to put it down. Then she leaps at the Prieto, thrusting the blade towards his neck. Before she can get there, Prieto has fired. Maria drops the scalpel. Then she drops to the ground. \n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Such a shame,\" Prieto sighs, \"But they make you like this don't they\". \n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tHe puts the gun to her head and pulls the trigger. The operating theatre is covered in blood.\n\t\t\t\t\t\t*set mariadead true\n\t\t\t\t\t\t*goto delarosa\n\t\t\t#Maria starts to undress.\n\t\t\t\tShe undoes the buttons on her blouse.\n\t\t\t\t*line_break\n\t\t\t\t\"That wasn't what I meant Senorita...\" Prieto protests, half-heartedly. The protests don't last very long. As Maria removes her long skirt, the Captain closes the door and undoes his belt. He places it on the table. Maria notices that his pistol is inside the holster, attached s straight at him. Would he shoot her? She thinks he probably would...\n\t\t\t\t*choice\n\t\t\t\t\t#Maria goes for the scalpel.\n\t\t\t\t\t\tShe shoves the Captain and makes a lunge for the trolley, grabbing the scalpel. She turns to see Prieto aiming his pistol at her. \n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"So it has to be like this does it? Senorita, if you don't put the blade down, I [i]will[/i] shoot you\".\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tMaria...\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Drops it.\n\t\t\t\t\t\t\t\tShe lets it slip from her hand. \n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\"Very good Senorita, very good. Now come with me...\"\n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\tPrieto puts her on a truck bound for the Republican side of the Ebro. She's a prisoner of war.\n\t\t\t\t\t\t\t\t*goto delarosa\n\t\t\t\t\t\t\t#Goes at him.\n\t\t\t\t\t\t\t\tSumming up her courage, Maria decides she is going to kill this man. She lowers the blade, feigning that she is about to put it down. Then she leaps at the Prieto, thrusting the blade towards his neck. Before she can get there, Prieto has fired. Maria drops the scalpel. Then she drops to the ground. \n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\"Such a shame,\" Prieto sighs, \"But they make you like this don't they\". \n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\tHe puts the gun to her head and pulls the trigger. The operating theatre is covered in blood.\n\t\t\t\t\t\t\t\t*set mariadead true\n\t\t\t\t\t\t\t\t*goto delarosa\n\t\t\t\t\t#Maria starts to undress.\n\t\t\t\t\t\tShe undoes the buttons on her blouse.\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"That wasn't what I meant Senorita...\" Prieto protests, half-heartedly. The protests don't last very long. As Maria removes her long skirt, the Captain closes the door and undoes his belt. He places it on the table. Maria notices that his pistol is inside the holster, attached to said belt. She looks back at the scalpel.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Take the scalpel.\n\t\t\t\t\t\t\t\tAs discreetly as possible, Maria picks up the blade as Prieto struggles with his trousers. Once he's freed himself he steps closer to her,\n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\"You don't know how long it's been...\"\n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\tBefore he can finish his sentence, Maria has sunk the scalpel into his neck. He looks rather taken aback. But he can't say anything. Maria pulls the blade out violently. It's very messy. The operating theatre is covered in blood as is Maria's half-naked body. She watches him die, not really feeling anything at all.\n\t\t\t\t\t\t\t\t*set marbrutal -5\n\t\t\t\t\t\t\t\t*achieve killer\n\t\t\t\t\t\t\t\t*set murderer true\n\t\t\t\t\t\t\t\t*goto delarosa \n\t\t\t\t\t\t\t#Leave it.\n\t\t\t\t\t\t\t\tShe leaves it. She isn't a killer. Prieto fucks her on the operating table. Does she enjoy it? Of course not. It's the most horrible things she's ever experienced. But it's saved her life.\n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\tBefore she's even had a chance to get herself properly dressed, she's bundled onto a truck bound for the Republican side of the Ebro. She's a prisoner of war.\n\t\t\t\t\t\t\t\t*set raped true\n\t\t\t\t\t\t\t\t*goto delarosa\n\t\t\t\t\t#Maria says nothing.\n\t\t\t\t\t\tMaria remains silent except for a pathetic whimper. Prieto pulls the trigger. The operating theatre is covered in blood.\n\t\t\t\t\t\t*set mariadead true\n\t\t\t\t\t\t*goto delarosa\n\t\t\t\t\t#Maria gives him military information.\n\t\t\t\t\t\t\"I... I know... I have information\".\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Really? Like what?\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tMaria is just a nurse. In reality she knows very little of any importance. She doesn't know what to say.\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"The next town along the road, Corbera, that's held by Regulares, you know, the Arabs\".\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Thank you Senorita, I do know what Regulares are, anything else, because that's not more than I already knew\".\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tShe can't think of anything. Her mind has gone blank, not that she knew any military secrets anyway.\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"No? Nothing? Well I'm afraid you're going to have to do better than that if you want your life\".\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Maria goes for the scalpel.\n\t\t\t\t\t\t\t\tShe shoves the Captain and makes a lunge for the trolley, grabbing the scalpel. She turns to see Prieto aiming his pistol at her. \n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\"So it has to be like this does it? Senorita, if you don't put the blade down, I [i]will[/i] shoot you\".\n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\tMaria...\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Drops it.\n\t\t\t\t\t\t\t\t\t\tShe lets it slip from her hand. \n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t\"Very good Senorita, very good. Now come with me...\"\n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\tMorales puts her on a truck bound for the Republican side of the Ebro. She's a prisoner of war.\n\t\t\t\t\t\t\t\t\t\t*goto delarosa\n\t\t\t\t\t\t\t\t\t#Goes at him.\n\t\t\t\t\t\t\t\t\t\tSumming up her courage, Maria decides she is going to kill this man. She lowers the blade, feigning that she is about to put it down. Then she leaps at the Prieto, thrusting the blade towards his neck. Before she can get there, Prieto has fired. Maria drops the scalpel. Then she drops to the ground. \n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t\"Such a shame,\" Prieto sighs, \"But they make you like this don't they\". \n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\tHe puts the gun to her head and pulls the trigger. The operating theatre is covered in blood.\n\t\t\t\t\t\t\t\t\t\t*set mariadead true\n\t\t\t\t\t\t\t\t\t\t*goto delarosa\n\t\t\t\t\t\t\t#Maria starts to undress.\n\t\t\t\t\t\t\t\tShe undoes the buttons on her blouse.\n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\"That wasn't what I meant Senorita...\" Prieto protests, half-heartedly. The protests don't last very long. As Maria removes her long skirt, the Captain closes the door and undoes his belt. He places it on the table. Maria notices that his pistol is inside the holster, attached to said belt. She looks back at the scalpel.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Take the scalpel.\n\t\t\t\t\t\t\t\t\t\tAs discreetly as possible, Maria picks up the blade as Prieto struggles with his trousers. Once he's freed himself he steps closer to her,\n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t\"You don't know how long it's been...\"\n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\tBefore he can finish his sentence, Maria has sunk the scalpel into his neck. He looks rather taken aback. But he can't say anything. Maria pulls the blade out violently. It's very messy. The operating theatre is covered in blood as is Maria's half-naked body. She watches him die, not really feeling anything at all.\n\t\t\t\t\t\t\t\t\t\t*set marbrutal -5\n\t\t\t\t\t\t\t\t\t\t*achieve killer\n\t\t\t\t\t\t\t\t\t\t*set murderer true\n\t\t\t\t\t\t\t\t\t\t*goto delarosa \n\t\t\t\t\t\t\t\t\t#Leave it.\n\t\t\t\t\t\t\t\t\t\tShe leaves it. She isn't a killer. Prieto fucks her on the operating table. Does she enjoy it? Of course not. It's the most horrible things she's ever experienced. But it's saved her life.\n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\tBefore she's even had a chance to get herself properly dressed, she's bundled onto a truck bound for the Republican side of the Ebro. She's a prisoner of war.\n\t\t\t\t\t\t\t\t\t\t*set raped true\n\t\t\t\t\t\t\t\t\t\t*goto delarosa\n\t\t\t\t\t\t\t#Maria says nothing.\n\t\t\t\t\t\t\t\t\"Nothing to say? Nope? Well that puts me in a very difficult position,\" he takes his pistol out from its holster and points it at her head, \"Does that help jog your memory?\"\n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\tMaria remains silent except for a pathetic whimper. Prieto pulls the trigger. The operating theatre is covered in blood.\n\t\t\t\t\t\t\t\t*set mariadead true\n\t\t\t\t\t\t\t\t*goto delarosa\n\n*label marrun\n*page_break\nMaria sprints along the corridors of the hospital, weaving through discarded trolleys and stretchers. \n*line_break\n\"Gabrielle!\" she calls. No response. There's her exit, the double doors of the back entrance, she's almost there. \n*line_break\n\"Freeze!\"\n*line_break\nShe stops dead. Slowly she turns around. Three soldiers have their rifles trained on her. They're wearing Republican uniform. She's taken away.\n*page_break\n*goto theatre\n\n*label delarosa\n*if dlrdead = true\n\t*goto moralestwo\n*page_break\n3.07 P.M.\n*line_break\n25th July 1938\n*line_break\nThe skies over the Ebro, Catalonia\n*line_break\nSquadron Leader Jose De La Rosa\n\n\"Blue squadron this is Blue Leader, tight formation, we're approaching the combat zone, eyes peeled for hostiles,\" De La Rosa informs the twelve pilots of his squadron. He'd finally won that promotion. It is with great satisfaction that he watches the Fiats coalesce around him.\n*if joqdead = false\n\t*line_break\n\t\"This is Blue Four,\" Joaquin replies, \"Wing Two ready and waiting\".\n*line_break\n\"This is Blue Six,\" that's Rodriguez, \"Wing Three awaiting orders,\" De La Rosa had had him promoted to Wing Commander.\n*line_break\n\"Affirmative Blue Wings, stay on present course, but keep those eyes open, we're expecting heavy resistance\".\n*line_break\nThe skies had been oddly quiet considering what had happened on the ground. \n*if dlrship = false\n\t*if gabdead = false\n\t\tJose is worried. He knew that Camposines, where $!{girl} is stationed is right on the frontline at the moment. It may even have fallen to the Reds. He prays she's ok. But he can't let that affect him. He tries to focus on the task at hand. And focus he does.\n\t*if gabdead = true\n\t\tJose finds himself temporarily distracted. He's thinking about $!{girl}. It's been seventh months now. But even now there will be moments in which is overcome with grief. \n\t*if vidrship = false\n\t\t*if abortion = false\n\t\t\t*if babydead = true\n\t\t\t\tAnd baby $!{baby} too. How could they have done that? Heartless Red bastards!\n\tBut he can't let that affect him. He tries to focus on the task at hand. And focus he does.\n*if dlrship = true\n\t*if ambushdead = false\n\t\tJose is worried. He knew that Camposines, where $!{girl} is stationed is right on the frontline at the moment. It may even have fallen to the Reds. He prays she's ok. But he can't let that affect him. He tries to focus on the task at hand. And focus he does.\n\t*if ambushdead = true\n\t\tJose finds himself temporarily distracted. He's thinking about $!{girl}. It's been seventh months now. But even now there will be moments in which is overcome with grief. But he can't let that affect him. He tries to focus on the task at hand. And focus he does. \nHe spots what looks to be a Red reconnaissance aircraft at two o'clock high. He shakes his head; he's still got the best eyes in the squadron, no one else seems to have spotted it.\n*page_break\n\"Blue Squadron, you're getting sloppy, Red recon plane at two o'clock\".\n*line_break\n\"Seen it Blue Leader,\" Rodriguez replies, \"Looks like a twin engined Russian model\".\n*line_break\n\"Copy that Blue Six. Everyone on alert, this could be a trap. We've had reports of new Super-Ratas on this front\".\n*if joqdead = false\n\t*line_break\n\t\"And what's a Super-Rata when it's at home?\" Joaquin asks.\n*if joqdead = true\n\t*line_break\n\t\"What's one of them Sir?\"\n*line_break\n\"They're improved I-16s, newly delivered by the Russians, a lot faster and twice as many machine guns. So steer clear of them. If Ratas were tough to take on in the Fiats, these bastards will be impossible\".\n*line_break\n\"How do we know if we see one?\"\n*line_break\n\"We don't. They look pretty much exactly like
