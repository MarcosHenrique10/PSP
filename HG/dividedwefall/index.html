\t*set albabrutal +10\n\t\t\t*goto safety\n*if albalead = true\n\tAlba forces her way to the front, where two armed militiamen are trying to keep order. The crowd is animated and angry. It transpires that shots are said to have been fired from the bell tower of the Santa Madrona. The priest has been seized and accused of firing the shots. \n\t*line_break\n\tThe priest is kneeling, praying in a hushed tone. He speaks quickly, so quickly and quietly that it is incomprehensible. His eyes are tight shut and he rocks backward and forward. The mob is baying for blood. Reyes pauses for a moment. She decides to...\n\t*choice\n\t\t#Execute him, even if he isn't guilty he probably allowed the sniper up there.\n\t\t\t*set albabrutal -10\n\t\t\t*goto execute\n\t\t#Leave him, let the crowd do as they see fit.\n\t\t\t*set albabrutal -5\n\t\t\t*goto leave\n\t\t#Take him to safety, he deserves a fair trial at least.\n\t\t\t*set albabrutal +10\n\t\t\t*goto safety\n*label execute\n*if albalead = false\n\t\t\"We can't afford to show any mercy to our enemies Salazar, regardless of if they're clergy. The Church is with the enemy, the Church [i]is[/i] the enemy! Every day they lie to the workers and say their suffering on Earth will be redeemed in Heaven. They deserve none of our sympathy!\"\n\t\t*line_break\n\t\t\"You're right Reyes, this filthy priest may have killed one of our own. I'm not about to let him get away with it\".\n\t\t*line_break\n\t\tSalazar doesn't shirk his responsibility. He aims his rifle at the back of the priest's head, the barrel just a centimetre or so away from his skull. Alba...\n\t\t*choice\n\t\t\t#Looks away.\n\t\t\t\tShe averts her eyes. All she hears is the shot, the priest falling to the ground and the crowd cheering. \n\t\t\t\t*goto arrival\n\t\t\t#Holds her gaze.\n\t\t\t\tTo look away would be cowardly. Alba stares intensely at the quaking priest. In a moment he is transformed from a shaking, mumbling wreck into a limp and lifeless corpse. The crowd roars. Alba wipes blood off her face. Salazar looks at her and grimaces. She gives the clenched fist salute. He does the same.\n\t\t\t\t*goto arrival\n*if albalead = true\n\t\"We can't afford to show any mercy to our enemies, regardless of if they're clergy. The Church is with the enemy, the Church [i]is[/i] the enemy! Every day they lie to the workers and say their suffering on Earth will be redeemed in Heaven. They deserve none of our sympathy!\"\n\t*line_break\n\tAs she's in charge it falls to Alba to perform the grizzly act. Of course she could always make someone else do it...\n\t*choice\n\t\t#No, it's her responsibility.\n\t\t\tReyes doesn't shirk her responsibility. She aims her rifle at the back of the priest's head, the barrel just a centimetre or so away from his skull. Alba stares intensely at the quaking priest. In a moment he is transformed from a shaking, mumbling wreck into a limp and lifeless corpse. The crowd roars. Alba wipes blood off her face. Salazar looks at her and grimaces. She gives the clenched fist salute. He does the same.\n\t\t\t*goto arrival\n\t\t#Yes, she'd rather not, let Salazar do it.\n\t\t\tSalazar doesn't complain or shirk his duty. He aims his rifle at the back of the priest's head, the barrel just a centimetre or so away from his skull. Alba...\n\t\t\t*choice\n\t\t\t\t#Looks away.\n\t\t\t\t\tShe averts her eyes. All she hears is the shot, the priest falling to the ground and the crowd cheering. \n\t\t\t\t\t*goto arrival\n\t\t\t\t#Holds her gaze.\n\t\t\t\t\tTo look away would be cowardly. Alba stares intensely at the quaking priest. In a moment he is transformed from a shaking, mumbling wreck into a limp and lifeless corpse. The crowd roars. Alba wipes blood off her face. Salazar looks at her and grimaces. She gives the clenched fist salute. He does the same.\n\t\t\t\t\t*goto arrival\n*label leave\n\"This isn't our concern, let these lot sort it out, we've got to get to the telephone exchange!\"\n*if albalead = false\n\t\t*line_break\n\t\t\"What's wrong with you Reyes? This filthy priest may have killed one of our own. I'm not about to let him get away with it\".\n\t\t*line_break\n\t\tSalazar doesn't shirk his responsibility. He aims his rifle at the back of the priest's head, the barrel just a centimetre or so away from his skull. Then he stops, and turns to Alba,\n\t\t*line_break\n\t\t\"No, I won't do this. You Reyes, you do it\".\n\t\t*line_break\n\t\t\"What? Why?\"\n\t\t*line_break\n\t\t\"Prove to me you're not a fascist sympathiser, kill him!\"\n\t\t*line_break\n\t\t\"But...\"\n\t\t*line_break\n\t\t\"You heard me, kill him, that's an order\".\n\t\t*line_break\n\t\tAlba looks to her comrades but they avert her gaze. All except $!{friend},\n\t\t*line_break\n\t\t\"I'll do it\".\n\t\t*line_break\n\t\tAlba...\n\t\t*choice\n\t\t\t#Takes responsibility.\n\t\t\t\t\"No $!{friend}, he asked me\".\n\t\t\t\t*line_break\n\t\t\t\tReyes doesn't shirk her responsibility. She aims her rifle at the back of the priest's head, the barrel just a centimetre or so away from his skull. Alba stares intensely at the quaking priest. In a moment he is transformed from a shaking, mumbling wreck into a limp and lifeless corpse. The crowd roars. Alba wipes blood off her face. $!{friend} looks at her and grimaces. Alba gives the clenched fist salute. $!{friend} does the same.\n\t\t\t\t*goto arrival\n\t\t\t#Allows $!{friend} to do it.\n\t\t\t\t$!{friend} steps up and takes aim with his rifle. Alba...\n\t\t\t\t*choice\n\t\t\t\t\t#Looks away.\n\t\t\t\t\t\tShe averts her eyes. All she hears is the shot, the priest falling to the ground and the crowd cheering. \n\t\t\t\t\t\t*goto arrival\n\t\t\t\t\t#Holds her gaze.\n\t\t\t\t\t\tTo look away would be cowardly. Alba stares intensely at the quaking priest. In a moment he is transformed from a shaking, mumbling wreck into a limp and lifeless corpse. The crowd roars. Alba wipes blood off her face. $!{friend} looks at her and grimaces. She gives the clenched fist salute. $!{friend} responds in kinds.\n\t\t\t\t\t\t*goto arrival\t\t\t\t\t\n*if albalead = true\n\t*line_break\n\tThere are one or two grumbles but they accept your decision. As they board the tram, Alba notices the flicker of flames; the crowd are setting the church alight.\n\t*goto arrival\n*label safety\n\"We don't have any evidence to judge this man, he deserves a trial at least. Let's get the poor bugger out of here\".\n*if albalead = false\n\t\t*line_break\n\t\t\"What's wrong with you Reyes? This filthy priest may have killed one of our own. I'm not about to let him get away with it\".\n\t\t*line_break\n\t\tSalazar doesn't shirk his responsibility. He aims his rifle at the back of the priest's head, the barrel just a centimetre or so away from his skull. Then he stops, and turns to Alba,\n\t\t*line_break\n\t\t\"No, I won't do this. You Reyes, you do it\".\n\t\t*line_break\n\t\t\"What? Why?\"\n\t\t*line_break\n\t\t\"Prove to me you're not a fascist sympathiser, kill him!\"\n\t\t*line_break\n\t\t\"But...\"\n\t\t*line_break\n\t\t\"You heard me, kill him, that's an order\".\n\t\t*line_break\n\t\tAlba looks to her comrades but they avert her gaze. All except $!{friend},\n\t\t*line_break\n\t\t\"I'll do it\".\n\t\t*line_break\n\t\tAlba...\n\t\t*choice\n\t\t\t#Takes responsibility.\n\t\t\t\t\"No $!{friend}, he asked me\".\n\t\t\t\t*line_break\n\t\t\t\tReyes doesn't shirk her responsibility. She aims her rifle at the back of the priest's head, the barrel just a centimetre or so away from his skull. Alba stares intensely at the quaking priest. In a moment he is transformed from a shaking, mumbling wreck into a limp and lifeless corpse. The crowd roars. Alba wipes blood off her face. $!{friend} looks at her and grimaces. Alba gives the clenched fist salute. $!{friend} does the same.\n\t\t\t\t*goto arrival\n\t\t\t#Allows $!{friend} to do it.\n\t\t\t\t$!{friend} steps up and takes aim with his rifle. Alba...\n\t\t\t\t*choice\n\t\t\t\t\t#Looks away.\n\t\t\t\t\t\tShe averts her eyes. All she hears is the shot, the priest falling to the ground and the crowd cheering. \n\t\t\t\t\t\t*goto arrival\n\t\t\t\t\t#Holds her gaze.\n\t\t\t\t\t\tTo look away would be cowardly. Alba stares intensely at the quaking priest. In a moment he is transformed from a shaking, mumbling wreck into a limp and lifeless corpse. The crowd roars. Alba wipes blood off her face. $!{friend} looks at her and grimaces. She gives the clenched fist salute. $!{friend} responds in kinds.\n\t\t\t\t\t\t*goto arrival\t\t\t\t\t\n\t\t\t\t\t\n*if albalead = true\n\t*line_break\n\tThere are one or two grumbles but they accept your decision. As they board the tram, Alba notices the flicker of flames; the crowd are setting the church alight.\n\t*goto arrival\n*label arrival\n*page_break\nUpon their arrival at Placa de Catalunya, they are directed to one of the office buildings opposite the telephone exchange. A siege has developed. Army soldiers take potshots from their positions in the tall, multi-story stone telephone exchange. On all sides, anarchist militias are gathering trying to probe for a weakness.\n*if albalead = false\n\tSalazar sends Alba with a detachment of troops to the roof.\n*if albalead = true\n\tAlba leaves Salazar with a few men on the ground floor and takes the rest of them up to the roof.\n*page_break\n*image number4.png\nFrom the commanding position of the rooftop, Alba and her comrades can spot easily the soldiers in the telephone exchange. However, their lack of marksmanship lets them down; trained soldiers would have had a field day, but the amateur anarchists struggle to hit anything at this range. Presently, one of their number is picked off. They all go to ground. There must be a sniper! Alba orders her militia...\n*set militia -1\n*choice\n\t#Off the roof, this position is too exposed.\n\t\t*goto retreat\n\t#To suppress the sniper and force him to retreat.\n\t\t*goto suppress\n\t#Stay low and try and spot him.\n\t\t*goto low\n*label retreat\n\"Let's get off this roof!\"\n*line_break\nThey make a mad dash for the stairs. The sniper's rifle rings out three times and two go down. Once the rest of them are safely in the cover of the staircase, $!{friend} asks for a word,\n*set militia -2\n*line_break\n\"Come on Alba, that was foolish, if we hadn't run like that we wouldn't have lost those guys...\"\n*line_break\nAlba knows this is true but can't admit it, \"Alright, just lay off, do you think I wanted that?\"\n*line_break\n\"I was just...\"\n*line_break\n\"Well don't $!{friend}, don't bother pointing out the fucking obvious just to make me feel shit!\"\n*goto nextbit\n*label suppress\n\"Open fire!\"\n*line_break\nA cacophony of noise as the whole militia open up in the general direction of the telefonica roof. They've no idea where the sniper is, but hopefully this barrage will drive him back. The sniper rifle rings out and another militiaman goes down.\n*set militia -4\n*line_break\n\"Where did that come from?\"\n*line_break\nNobody knows, all are too busy with their own rifles. Very quickly another two are picked off and Alba is losing control of the situation.\n*line_break\n\"We've got to do something Alba!\" $!{friend} shouts.\n*line_break\n\"Well thanks for pointing out the fucking obvious $!{friend}, really very fucking helpful!\"\n*line_break\nAlba orders everyone to...\n*choice\n\t#Make a run for it.\n\t\t*goto retreat\n\t#Keep firing.\n\t\t*goto keepfire\n\t#Get down.\n\t\t*goto low\n*label keepfire\nThey keep up the same tactic and pay the price. Another three go down $!{friend} is caught on the left arm. \n*line_break\n\"Ah fuck,\" $!{friend} curses, \"We need to get out of here Alba, we're being cut up!\"\n*line_break\nEveryone makes a mad run for it and Alba is forced to play catch-up. In the rush, two more are shot down. Once the rest of them are safely in the cover of the staircase, $!{friend} asks for a word,\n*set militia -5\n*line_break\n\"Come on Alba, that was foolish, we never stood a chance. We should have got out of there as soon as the sniper turned up\".\n*line_break\nAlba knows this is true but can't admit it, \"Alright, just lay off, do you think I wanted that?\"\n*line_break\n\"I was just...\"\n*line_break\n\"Well don't $!{friend}, don't bother pointing out the fucking obvious just to make me feel shit!\"\n*goto nextbit\n*label low\n\"Keep your heads down everyone!\" then, turning to $!{friend}, \"Well, any ideas?\"\n*line_break\n\"We need to find out where he is. Our best bet is if I make a run for it. He'll fire and you should be able to spot where the shot came from\".\n*choice\n\t#Sounds like a plan.\n\t\t*goto plan\n\t#I should go, you try and spot him.\n\t\t*goto mego\n*label plan\n\"Ok, on the count of three, one, two, three!\"\n*line_break\n$!{friend} sprints out from cover in the direction of the staircase, leaving his rifle behind. Alba pops up aiming her rifle and looking for a flash. The sniper's rifle cracks, $!{friend} goes down, clutching their neck. But Alba spotted the flash, spotted the glint of the sniper scope in the sun. She sees him and...\n*choice\n\t#Fires, quickly and instinctively, before the chance is gone.\n\t\t*goto instinct\n\t#Takes time to steady herself before pulling the trigger.\n\t\t*goto taketime\n*label mego\n\"Are you sure Alba?\"\n*line_break\n\"Yes, positive, you just make sure you get the bastard alright?\"\n*line_break\n\"Of course\".\n*line_break\n\"On the count of three? One, two, three!\"\n*line_break\nAlba sprints as fast as she can for the safety of the staircase, leaving her rifle behind. She hears the crack of the sniper's rifle and throws herself to the ground. The bullet misses her by centimetres as she dives. She hears the rifle of $!{friend} respond. \n*line_break\n\"Did you get him?\"\n*temp ishedead\n*rand ishedead 0 100\n*if (ishedead \u003c 50)\n\t*line_break\n\t\"No...\"\n\t*line_break\n\t\"For fuck's sake!\"\n\t*line_break\n\tThe sniper will have changed position now and he won't fall for the same trick again. Without any other options, Alba orders a retreat off the roof, fortunately the sniper seems to have pulled back, meaning the withdrawal cost no more casualties.\n\t*goto nextbit\n*if (ishedead > 49)\n\t*line_break\n\t\"Got him!\"\n\t*line_break\n\tAlba breathes a sigh of relief.\n\t*set sniperdead true\n\t*goto nextbit\n*label instinct\n*temp ishedead\n*rand ishedead 0 100\n*if (ishedead \u003c 50)\n\tShe pulls the trigger. Less than a second later, the bullet strikes a vent, centimetres from the sniper's head. Said sniper ducks down and retreats, probably changing position, now he knows he's been spotted.\n\t*line_break\n\t\"I'm ok!\" $!{friend} shouts, \"The bullet, it just grazed me\".\n\t*line_break\n\t\"You lucky bugger!\"\n\t*line_break\n\tLucky is an understatement. The sniper won't fall for the same trick again. Alba takes the opportunity to get her troops off the roof. Staying up there would have been suicide.\n\t*goto nextbit\n*if (ishedead > 49)\n\tShe pulls the trigger and less than a second later, the sniper is hit, collapsing backwards, dropping his rifle. Any thoughts of celebration are curtailed by concern for $!{friend}. Alba runs over.\n\t*line_break\n\t\"I'm ok, I'm ok, the bullet, it just grazed me\".\n\t*line_break\n\t\"You lucky bugger!\"\n\t*line_break\n\tLucky is an understatement. Alba decides to move her troops back downstairs to reunite with the others. \n\t*set sniperdead true\n\t*goto nextbit\n*label taketime\n*temp ishedead\n*rand ishedead 0 100\n*if (ishedead \u003c 25)\n\tAlba takes a moment, breathes in deeply, holds her breath and pulls the trigger. Less than a second later, the bullet strikes a vent, centimetres from the sniper's head. Said sniper ducks down and retreats, probably changing position, now he knows he's been spotted.\n\t*line_break\n\t\"I'm ok!\" $!{friend} shouts, \"The bullet, it just grazed me\".\n\t*line_break\n\t\"You lucky bugger!\"\n\t*line_break\n\tLucky is an understatement. The sniper won't fall for the same trick again. Alba takes the opportunity to get her troops off the roof. Staying up there would have been suicide.\n\t*goto nextbit\n*if (ishedead > 24)\n\tAlba takes a moment, breathes in deeply, holds her breath and pulls the trigger. Less than a second later, the sniper is hit, collapsing backwards, dropping his rifle. Any thoughts of celebration are curtailed by concern for $!{friend}. Alba runs over.\n\t*line_break\n\t\"I'm ok, I'm ok, the bullet, it just grazed me\".\n\t*line_break\n\t\"You lucky bugger!\"\n\t*line_break\n\tLucky is an understatement. Alba decides to move her troops back downstairs to reunite with the others. \n\t*set sniperdead true\n\t*goto nextbit\n*label nextbit\n*page_break\nThe militia gather on the ground floor. The plan is to rush the telephone building. They gather at the windows and doors ready to make the short sprint across the exchange. Alba's heart is beating very hard indeed.\n*line_break\n\"Go, go, go!\"\n*line_break\nThey dash from cover and into a hail of bullets. But the gap between the buildings is narrow, and it's only a matter of seconds before Alba slams into the wall of the telefonica. Miraculously, everyone seems to be ok. \n*page_break\nJust above her head, a soldier aims his rifle out of the window and shoots dead a wounded anarchist lying in the road. She grabs the rifle and pulls hard. The surprised soldier falls forward onto the pavement and Alba brings down the rifle on him before he can react. And then again. And a third time. There isn't much left of the soldier's skull as she brings down the rifle butt for a fourth and final time.\n*line_break\n\"Come on!\" Alba screams and jumps up through the window. The rest follow her lead. Taken by surprise, the soldiers are overpowered by the militiamen and women. After the first few are killed in a frantic melee, the remaining five surrender.\n*if albalead = false\n\tSalazar has been knocked unconscious in the struggle. Alba assumes command.\nImmediately, there is a problem. What to do with the prisoners?\n*choice\n\t#Kill them, we've got to clear out the building, not guard this scum.\n\t\t*set albabrutal -5\n\t\t\"We'll have to dispose of the prisoners, we can't guard them, we can't let them go. The building's crawling with fascists\".\n\t\t*line_break\t\n\t\tNo one objects. A few look away as the deed is done. Will Alba ever forget the looks on their faces as they're executed? The wedding ring on the finger? She steels herself against such thoughts. It is necessary. She has no choice. Would the enemy have done any differently?\n\t\t\n\t\tTrying to put all that to the back of her mind, she considers their options.\n\t\t*line_break\n\t\t\"What now?\" $!{friend} asks.\n\t\t*choice\n\t\t\t#Clear out the upper floors to stop them sniping our men.\n\t\t\t\t*goto upper\n\t\t\t#Clear out the basement, they can't have enemies behind us.\n\t\t\t\t*goto basement\n\t\t\t#Secure the main entrance to allow reinforcements to get in.\n\t\t\t\t*goto entrance\n\t#Kill them, show no mercy to fascists.\n\t\t*set albabrutal -10\t\n\t\t\"We'll dispose of the prisoners, they're fascists, nothing more, nothing less\".\n\t\t*line_break\t\n\t\tNo one objects. A few look away as the deed is done. Will Alba ever forget the looks on their faces as they're executed? The wedding ring on the finger? She steels herself against such thoughts. It is necessary. More than that, it was the right thing to do. Would the enemy have done any differently?\n\t\t\n\t\tTrying to put all that to the back of her mind, she considers their options.\n\t\t*line_break\n\t\t\"What now?\" $!{friend} asks.\n\t\t*choice\n\t\t\t#Clear out the upper floors to stop them sniping our men.\n\t\t\t\t*goto upper\n\t\t\t#Clear out the basement, they can't have enemies behind us.\n\t\t\t\t*goto basement\n\t\t\t#Secure the main entrance to allow reinforcements to get in.\n\t\t\t\t*goto entrance\n\t#Leave a couple of men behind to guard them, they're probably conscripts anyway.\n\t\t*set albabrutal +10\n\t\t\"Gomez, Toledo, stay here and guard them\".\n\t\t*line_break\n\t\t\"Why us?\"\n\t\t*line_break\n\t\t\"Because I say so! Just do it alright!\"\n\t\t*line_break\n\t\tTrying to put their petulance to the back of her mind, she considers their options.\n\t\t*line_break\n\t\t\"What now?\" $!{friend} asks.\n\t\t*set pristaken true\n\t\t*choice\n\t\t\t#Clear out the upper floors to stop them sniping our men.\n\t\t\t\t*goto upper\n\t\t\t#Clear out the basement, we can't have enemies behind us.\n\t\t\t\t*goto basement\n\t\t\t#Secure the main entrance to allow reinforcements to get in.\n\t\t\t\t*goto entrance\n*label upper\n*set militia -5\n\"Let's move, everyone with me, up the main stairs\".\n*line_break\nThey meet no opposition on the stairs but the first floor is teeming with soldiers. Alba puts her finger over her lips. The fascists appear not to have noticed them. She pulls out a makeshift grenade. The CNT had seized a stockpile of dynamite last night and hastily put them together. Pulling the pin, she rolls it towards the soldiers, whose attention is consumed by the firefight outside.\n*page_break\nAfter a few seconds, the explosive goes off, with greater force than any of them were expecting. The fascists disappear in a cloud of smoke and blood. Very little is left of the position when the smoke clears. \n*line_break\n\"Floor clear, let's keep going!\"\n*page_break\nOn the second floor, the fascists are waiting for them and it's a struggle just to get up the stairs under fire. Having lost five men and women, they eventually get themselves established on the floor. A fierce, frenetic, close range firefight ensues. \n\nEach time Alba momentarily pops out of cover to take a shot, she can see the whites of the eyes of her target. She can see the fear, the hatred, the determination in each. She can see the change in expression as they are shot. With more anarchists pouring in, the soldiers are soon outnumbered. Superior marksmanship does them no good at this range. They throw down their arms.\n*if sniperdead = false\n\t*line_break\n\t\"Ok, secure this floor and the prisoners. I'm going up to the roof to see if I can get that bastard sniper\".\n\t*line_break\n\tAlba ascends the stairs with $!{friend} in tow. Upon reaching the top, she kicks down the door and bursts onto the roof. The sniper is taken by surprise. Alba aims her rifle and pulls the trigger.\n\t*page_break\n\tNothing happens. She realises, with dread, she hasn't loaded the next round. The sniper is turning around, aiming. She is panicking. What does she do?\n\t*choice\n\t\t#Push the bolt forward, then up, then pull it back and down.\n\t\t\t*gosub trial_end\n\t\t\t*goto wrong\n\t\t#Pull the bolt up and back, then push it forward and down.\n\t\t\t*gosub trial_end\n\t\t\t*goto right\n\t\t#Pull the bolt back, then push it forward.\n\t\t\t*gosub trial_end\n\t\t\t*goto wrong\n\t\t#Go at the sniper with her rifle butt.\n\t\t\t*gosub trial_end\n\t\t\t*goto riflebutt\n*if sniperdead = true\n\t*line_break\n\tAlba notices a door in the corner of the room. It is closed. She puts her ear to the door. Is there somebody in there? Only one way to find out. She kicks it down and bursts in. A fascist officer stands across the room, speaking frantically on the phone. Seeing Alba, he goes for his submachine gun, which rests on the desk beside him. Alba aims her rifle and pulls the trigger.\n\t*page_break\n\tNothing happens. She realises, with dread, she hasn't loaded the next round. The officer is turning around, aiming. She is panicking. What does she do?\n\t*choice\n\t\t#Push the bolt forward, then up, then pull it back and down.\n\t\t\t*gosub trial_end\n\t\t\t*goto wrongo\n\t\t#Pull the bolt up and back, then push it forward and down.\n\t\t\t*gosub trial_end\n\t\t\t*goto righto\n\t\t#Pull the bolt back, then push it forward.\n\t\t\t*gosub trial_end\n\t\t\t*goto wrongo\n\t\t#Go at the officer with her rifle butt.\n\t\t\t*gosub trial_end\n\t\t\t*goto riflebutto\n*label wrong\nShe struggles madly with the action, pushing and pulling but achieving nothing but to jam the weapon. The sniper raises his rifle. He is about to pull the trigger, Alba accepts her fate. $!{friend} fires first. The sniper goes down. \n*if friend = \"Jorge\"\n\t$!{friend} pulls the bolt on his rifle up and backwards, before pushing it forward and then down. He then shoots the sniper again, just to be sure.\n*if friend = \"Isabel\"\n\t$!{friend} pulls the bolt on her rifle up and backwards, before pushing it forward and then down. She then shoots the sniper again, just to be sure. \n*line_break\n\"Th...thanks...\" is all Alba can muster. She exhales deeply. Today has been quite a day.\n*if pristaken = true\n\t*line_break\n\tSalazar, who has clearly recovered, runs up to them,\n\t*line_break\n\t\"The prisoners, they've got away!\"\n\t*line_break\n\t\"What? How?\" Alba replies, confused, \"Gomez and Toledo, they were guarding them\".\n\t*line_break\n\t\"They must've overpowered them...\"\n\t*line_break\n\t\"Where are they?\"\n\t*line_break\n\t\"They're dead\".\n\t*line_break\n\tAlba throws up. That was her decision. And now her friends are dead.\n*goto morales\n*label right\nAlba works the action as if she's been doing it for years. It takes less than a second to load the next round, aim and shoot the sniper in the chest. The sniper goes down. She loads the next round and fires again. Just to make sure. \n*line_break\n\"Nice reactions...\" is all a rather taken aback $!{friend} can manage. Alba wants to say something back, to smile, to hold $!{friend}. But she can't. She just stands there. A single tear runs down her cheek. Today has been quite a day.\n*if pristaken = true\n\t*line_break\n\tSalazar, who has clearly recovered, runs up to them,\n\t*line_break\n\t\"The prisoners, they've got away!\"\n\t*line_break\n\t\"What? How?\" Alba replies, confused, \"Gomez and Toledo, they were guarding them\".\n\t*line_break\n\t\"They must've overpowered them...\"\n\t*line_break\n\t\"Where are they?\"\n\t*line_break\n\t\"They're dead\".\n\t*line_break\n\tAlba throws up. That was her decision. And now her friends are dead.\n*goto morales\n*label riflebutt\nForgetting the mechanism, she turns the rifle around and runs straight at the sniper. He raises his own weapon to fire and goes to pull the trigger. Alba closes her eyes and accepts her fate. She waits for the shot, to be hit. She hears the shot. And waits. And waits. And waits. She opens her eyes. The sniper is falling backwards. She turns to see $!{friend} aiming at the sniper. \n*if friend = \"Jorge\"\n\t$!{friend} pulls the bolt on his rifle up and backwards, before pushing it forward and then down. He then shoots the sniper again, just to be sure.\n*if friend = \"Isabel\"\n\t$!{friend} pulls the bolt on her rifle up and backwards, before pushing it forward and then down. She then shoots the sniper again, just to be sure. \n*line_break\n\"Th...thanks...\" is all Alba can muster. She exhales deeply. Today has been quite a day.\n*if pristaken = true\n\t*line_break\n\tSalazar, who has clearly recovered, runs up to them,\n\t*line_break\n\t\"The prisoners, they've got away!\"\n\t*line_break\n\t\"What? How?\" Alba replies, confused, \"Gomez and Toledo, they were guarding them\".\n\t*line_break\n\t\"They must've overpowered them...\"\n\t*line_break\n\t\"Where are they?\"\n\t*line_break\n\t\"They're dead\".\n\t*line_break\n\tAlba throws up. That was her decision. And now her friends are dead.\n*goto morales\n*label wrongo\nShe struggles madly with the action, pushing and pulling but achieving nothing but to jam the weapon. The officer raises his weapon. He is about to pull the trigger, Alba accepts her fate. $!{friend} fires his own rifle first. The officer goes down. $!{friend} pulls the bolt on his rifle up and backwards, before pushing it forward and then down. He then shoots the officer again, just to be sure. \n*line_break\n\"Th...thanks...\" is all Alba can muster. She exhales deeply. Today has been quite a day.\n*if pristaken = true\n\t*line_break\n\tSalazar, who has clearly recovered, runs up to them,\n\t*line_break\n\t\"The prisoners, they've got away!\"\n\t*line_break\n\t\"What? How?\" Alba replies, confused, \"Gomez and Toledo, they were guarding them\".\n\t*line_break\n\t\"They must've overpowered them...\"\n\t*line_break\n\t\"Where are they?\"\n\t*line_break\n\t\"They're dead\".\n\t*line_break\n\tAlba throws up. That was her decision. And now her friends are dead.\n*goto morales\n*label righto\nAlba works the action as if she's been doing it for years. It takes less than a second to load the next round, aim and shoot the officer in the chest. The officer goes down. She loads the next round and fires again. Just to make sure. \n*line_break\n\"Nice reactions...\" is all a rather taken aback $!{friend} can manage. Alba wants to say something back, to smile, to hold $!{friend}. But she can't. She just stands there. A single tear runs down her cheek. Today has been quite a day.\n*if pristaken = true\n\t*line_break\n\tSalazar, who has clearly recovered, runs up to them,\n\t*line_break\n\t\"The prisoners, they've got away!\"\n\t*line_break\n\t\"What? How?\" Alba replies, confused, \"Gomez and Toledo, they were guarding them\".\n\t*line_break\n\t\"They must've overpowered them...\"\n\t*line_break\n\t\"Where are they?\"\n\t*line_break\n\t\"They're dead\".\n\t*line_break\n\tAlba throws up. That was her decision. And now her friends are dead.\n*goto morales\n*label riflebutto\nForgetting the mechanism, she turns the rifle around and runs straight at the officer. He raises his own weapon to fire and goes to pull the trigger. Alba closes her eyes and accepts her fate. She waits for the shot, to be hit. She hears the shot. And waits. And waits. And waits. She opens her eyes. The officer is falling backwards. She turns to see $!{friend} aiming at the officer. $!{friend} pulls the bolt on his rifle up and backwards, before pushing it forward and then down. He then shoots the officer again, just to be sure. \n*line_break\n\"Th...thanks...\" is all Alba can muster. She exhales deeply. Today has been quite a day.\n*if pristaken = true\n\t*line_break\n\tSalazar, who has clearly recovered, runs up to them,\n\t*line_break\n\t\"The prisoners, they've got away!\"\n\t*line_break\n\t\"What? How?\" Alba replies, confused, \"Gomez and Toledo, they were guarding them\".\n\t*line_break\n\t\"They must've overpowered them...\"\n\t*line_break\n\t\"Where are they?\"\n\t*line_break\n\t\"They're dead\".\n\t*line_break\n\tAlba throws up. That was her decision. And now her friends are dead.\n*goto morales\n*label basement\n*set militia -6\nThe rest of the ground floor seems to be secure and Alba gathers her militia at the top of the stairs to the basement. From the shouting and general consternation going on down there, it appears to be the command centre. Phones ring, telegraph machines chatter and snippets of orders can be heard.\n*line_break\n\"Ok, the best thing to do is burn them out, get your molotovs ready\". \n*line_break\nA few of them had prepared molotov cocktails the night before for such an eventuality. A lighter is passed around. Once everyone is ready, Alba orders, \n\"On my signal...\" before counting down from five on her fingers. On zero, half a dozen molotovs fly down into the basement, unleashing an inferno as they shatter.\n*page_break\nAnyone standing by the doorway didn't stand much chance, several burning soldiers try and get up the stairs. The militia shoot them down. Their screams are uniquely terrified. Their skin is a strange reddy black. The smell of burning flesh is not one that Alba was familiar with and is not a pleasant one. \n\nOnce the flames have abated somewhat, Alba leads them down. The fascists are ready for them. A frenetic firefight ensues. They lose a few in the funnel that is the single entrance to the basement.  \n*page_break\nEach time Alba momentarily pops out of cover to take a shot, she can see the whites of the eyes of her target. She can see the fear, the hatred, the determination in each. She can see the change in expression as they are shot. She shares her cover with the smouldering corpse of a fascist soldier. His face is black, his open eyes a brilliant white. The eyes look scared. \n\nWith more anarchists pouring in, the soldiers are soon outnumbered. Superior marksmanship does them no good at this range. They throw down their arms. Alba surveys the scene. They have lost six, although the fascists have paid a far heavier price.\n*if sniperdead = false\n\t*line_break\n\t\"Ok, secure this floor and the prisoners. I'm going up to the roof to see if I can get that bastard sniper\".\n\t*line_break\n\tAlba ascends the stairs with $!{friend} in tow. Upon reaching the top, she kicks down the door and bursts onto the roof. The sniper is taken by surprise. Alba aims her rifle and pulls the trigger.\n\t*page_break\n\tNothing happens. She realises, with dread, she hasn't loaded the next round. The sniper is turning around, aiming. She is panicking. What does she do?\n\t*choice\n\t\t#Push the bolt forward, then up, then pull it back and down.\n\t\t\t*gosub trial_end\n\t\t\t*goto wrong\n\t\t#Pull the bolt up and back, then push it forward and down.\n\t\t\t*gosub trial_end\n\t\t\t*goto right\n\t\t#Pull the bolt back, then push it forward.\n\t\t\t*gosub trial_end\n\t\t\t*goto wrong\n\t\t#Go at the sniper with her rifle butt.\n\t\t\t*gosub trial_end\n\t\t\t*goto riflebutt\n*if sniperdead = true\n\t*line_break\n\tAlba notices a door in the corner of the room. It is closed. She puts her ear to the door. Is there somebody in there? Only one way to find out. She kicks it down and bursts in. A fascist officer stands across the room, speaking frantically on the phone. Seeing Alba, he goes for his submachine gun, which rests on the desk beside him. Alba aims her rifle and pulls the trigger.\n\t*page_break\n\tNothing happens. She realises, with dread, she hasn't loaded the next round. The officer is turning around, aiming. She is panicking. What does she do?\n\t*choice\n\t\t#Push the bolt forward, then up, then pull it back and down.\n\t\t\t*gosub trial_end\n\t\t\t*goto wrongo\n\t\t#Pull the bolt up and back, then push it forward and down.\n\t\t\t*gosub trial_end\n\t\t\t*goto righto\n\t\t#Pull the bolt back, then push it forward.\n\t\t\t*gosub trial_end\n\t\t\t*goto wrongo\n\t\t#Go at the officer with her rifle butt.\n\t\t\t*gosub trial_end\n\t\t\t*goto riflebutto\n*label entrance\n*set militia -4\nAs quietly as possible, the militia make their way to the front entrance of the telephone exchange. This is a fearsome position, the fascists have barricaded the door and set up a machine gun which has a commanding view of the square. Smoke rises from the barrel as the deadly weapon chatters away.\n\nJust as Alba is about to give the order to fire, a fascist private runs down the stairs, ammo crate in hands. He drops it when he sees the anarchists. $!{friend} shoots him before he can say anything but the shot alerts the machine gunners.\n*page_break\nA fierce, frenetic, close range firefight ensues. Each time Alba momentarily pops out of cover to take a shot, she can see the whites of the eyes of her target. She can see the fear, the hatred, the determination in each. She can see the change in expression as they are shot. Superior marksmanship does them no good at this range. Taken by surprise, the fascists surrender when they realise the game is up. Alba and her comrades pull down the barricades and shout out across the square,\n*line_break\n\"We've taken the entrance, come on comrades, come on!\"\n*line_break\nHundreds of anarchists pour in, moving upstairs and down to clear out the building.\n*if sniperdead = false\n\t*line_break\n\t\"Ok, secure this floor and the prisoners. I'm going up to the roof to see if I can get that bastard sniper\".\n\t*line_break\n\tAlba ascends the stairs with $!{friend} in tow. Upon reaching the top, she kicks down the door and bursts onto the roof. The sniper is taken by surprise. Alba aims her rifle and pulls the trigger.\n\t*page_break\n\tNothing happens. She realises, with dread, she hasn't loaded the next round. The sniper is turning around, aiming. She is panicking. What does she do?\n\t*choice\n\t\t#Push the bolt forward, then up, then pull it back and down.\n\t\t\t*gosub trial_end\n\t\t\t*goto wrong\n\t\t#Pull the bolt up and back, then push it forward and down.\n\t\t\t*gosub trial_end\n\t\t\t*goto right\n\t\t#Pull the bolt back, then push it forward.\n\t\t\t*gosub trial_end\n\t\t\t*goto wrong\n\t\t#Go at the sniper with her rifle butt.\n\t\t\t*gosub trial_end\n\t\t\t*goto riflebutt\n*if sniperdead = true\n\t*line_break\n\tAlba notices a door in the corner of the room. It is closed. She puts her ear to the door. Is there somebody in there? Only one way to find out. She kicks it down and bursts in. A fascist officer stands across the room, speaking frantically on the phone. Seeing Alba, he goes for his submachine gun, which rests on the desk beside him. Alba aims her rifle and pulls the trigger.\n\t*page_break\n\tNothing happens. She realises, with dread, she hasn't loaded the next round. The officer is turning around, aiming. She is panicking. What does she do?\n\t*choice\n\t\t#Push the bolt forward, then up, then pull it back and down.\n\t\t\t*gosub trial_end\n\t\t\t*goto wrongo\n\t\t#Pull the bolt up and back, then push it forward and down.\n\t\t\t*gosub trial_end\n\t\t\t*goto righto\n\t\t#Pull the bolt back, then push it forward.\n\t\t\t*gosub trial_end\n\t\t\t*goto wrongo\n\t\t#Go at the officer with her rifle butt.\n\t\t\t*gosub trial_end\n\t\t\t*goto riflebutto\n*label morales\n*if moralesdead\n\t*goto maria\n*page_break\n10.30 A.M.\n*line_break\n20th July 1936\n*line_break\nMontana Barracks, Madrid\n*line_break\nLieutenant Adrian Morales\n\nMorales and his men shelter behind a low wall on the corner of the Plaza de Espana and Calle de Ferraz. Ahead of them is their objective, the Montana barracks. They've been camped out here for two days now. The barracks are a large, stone structure with high walls and several machine guns.\n\nYesterday the fascists attempted to break out but were quickly driven back inside the safety of the walls. Without heavy weapons, there was nothing to do but settle in for a siege. Along with a few other Assault Guard units, the barracks are surrounded by thousands of and thousands of workers. Men and women crouch behind park benches and trees as rifle fire is periodically exchanged. A lucky few have weapons, ranging from rifles seized from military personnel to antique revolvers stolen from gun shops.\n*page_break\nPrieto crawls over up to Morales,\n*line_break\n\"We're not going anywhere fast\".\n*line_break\n\"Thank you for stating the bloody obvious Prieto,\" Morales replies, \"There's no way this mob can get through those walls. And the Army has no chance of breaking out. So yes, for now, we're not going anywhere\".\n*line_break\nThe men are beginning to get bored and chat amongst themselves. Morales reacts by...\n*choice\n\t#Ordering them to lay down suppressive fire, the enemy must be kept under pressure.\n\t\t*goto pressure\n\t#Send a couple of men forward to scout for any weaknesses in the walls.\n\t\t*goto forward\n\t#Allow them these few minutes rest, they'll need it.\n\t\t*goto rest\n*label pressure\n\"Alright, that's enough of that, I want suppressive fire on that machine gun nest. This is a war, not a picnic!\"\n*line_break\n\"But sir,\" protests Alonso, the baby of the squad at just eighteen, \"We'll only provoke them to start firing again\".\n*line_break\n\"Good, then they'll run out of ammunition quicker!\"\n*line_break\nThe Assault Guards snap into action and begin a steady stream of fire on the enemy position. The soldiers in the barracks reply in kind and a firefight flares up once again. Those civilians not in proper cover scatter, many are hit.\n*goto arty\n*label forward\n\"Alright, that's enough of that, I want two volunteers to get a better look at the fortifications,\" nobody seems keen, \"Don't all put your hands up at once,\" another pause, \"Thank you Iglesias, now who's going to join him?\"\n*line_break\nNo one wants to.\n*line_break\n\"Right, thank you for volunteering Alonso, you go with him\".\n*line_break\n\"What? I never volunteered!\" Alonso, the baby of the squad at just eighteen, protests, \"We can see the fascists perfectly fine from here!\"\n*line_break\n\"I won't accept subordination Alonso, even from you, now go, we'll lay down some covering fire\".\n*line_break\nA storm of fire descends on the pair as they sprint forward, running in zig zags to try and dodge the incoming bullets. Just as they reach a ditch to dive in to, Iglesias is hit. He staggers, falling to his knees. He's hit again. And a third time. He collapses to the ground. Alonso cowers in the ditch, stunned, face white, fear chalked on his face. He sits completely still, staring at the twitching corpse of Iglesias.\n*line_break\n\"Shit,\" Morales curses. There's no way anyone can get to help them. Prieto glances over and grimaces. Is he questioning his superior's decision? Then Morales notices something. A small party of civilians are making their way towards the pair. They're trying to rescue them. They're going to get themselves killed. \n*line_break\n\"Stop! Please, come back!\" he shouts. They ignore him. The machine gun opens up and they are cut down in an instant. \n*line_break\n\"Fuck!\" Morales shouts in frustration. He's angry at them. But more than anything, he's angry at himself. \n*set alonsopinned true\n*goto arty\n*label rest\nMorales says nothing and allows the men to chat for a short while. He listens in on the conversation between Alonso, the baby of the squad at just eighteen, and Sergeant Prieto.\n*line_break\n\"Are you married Sergeant?\"\n*line_break\n\"Oh yes, been married twelve years, for my sins!\"\n*line_break\n\"Go, on then, what's it like? To be married?\"\n*line_break\n\"Well...\"\n*line_break\nBefore Prieto can divulge the secrets of married life, the firing flares up again. In their boredom, a group of civilians has tried to make an advance on the barracks. They are quickly cut down by machine gun fire.\n*goto arty\n*label arty\n*page_break\nEveryone's attention is diverted to a large artillery piece being towed into position. Morales recognises it as a 155mm Howitzer. This is exactly the breakthrough they need. He rushes over to the team moving it. They are workers from a nearby munitions factory. \n*line_break\n\"Comrade Teniente, can you help us, we have no idea how to operate this beast!\"\n*line_break\n\"We'll give it a go!\"\n*line_break\n\"Good, where should we position it?\"\n*line_break\nMorales is only a police officer. He may be trained in how to use a rifle but an artillery piece is another matter. He orders the workers to move it...\n*choice\n\t#To within 200 metres of the barracks, to blast down the walls.\n\t\t*goto 200\n\t#To about 400 metres from the barracks, so the crew will be safe from hostile fire.\n\t\t*goto 400\n\t#600 metres away, so it can fire up and over the walls.\n\t\t*goto 600\n*label 200\n\"Get it right in close, 200 metres or so, we need to flatten those walls!\"\n*line_break\n\"Are you sure so close sir?\"\n*line_break\n\"I'm sure, this'll be the breakthrough we've been waiting for,\" then, turning to his troops, \"I want three men on the gun!\"\n*line_break\nThree scuttle over and along with the workers push it into position, dangerously close to the barracks. Fascist fire rains down on them. A couple of them, workers not guards, are hit. Under withering machine gun fire, they set up close to the massive building. Morales and the three guards hunch behind the gun shield. Bullets ping off the steel with alarming regularity. Frantically, they aim the gun at the walls. Morales aims down the sights. \n*line_break\n\"Load the shell!\"\n*line_break\nThey load the shell.\n*line_break\n\"Fire!\"\n*line_break\nEven covering his ears, the boom is unspeakably loud. A huge chunk of concrete is blasted out of the wall. \n*line_break\n\"Reload...and...fire!\"\n*line_break\nThey fire twice more, enlarging the breach they've made. Then Morales spots something. From one of the first floor windows, an improvised white flag is being waved. The crowd have spotted it too. They cheer and surge forward.\n*goto crowd\n*label 400\n\"About 400 metres should do, we can't risk getting too close!\"\n*line_break\n\"Right you are sir!\"\n*line_break\nTurning to his troops, Morales shouts, \"I need three men to crew this gun!\"\n*line_break\nThree scuttle over and along with the workers push it into position. Fascist fire rains down on them but the gun shield provides adequate at this range. A pair of workers bring up the ammunition and the first shell is loaded. Morales looks down the gun sights, aiming at the thick walls.\n*line_break\n\"Fire!\"\n*line_break\nEven covering his ears, the boom is unspeakably loud. A chunk of concrete is blasted out of the wall. \n*line_break\n\"Reload...and...fire!\"\n*line_break\nThe bombardment lasts about ten minutes and the breach is turned into a ten foot hole in the first floor wall. Half an office is visible, files and furniture everywhere. Then Morales spots something. From one of the first floor windows, an improvised white flag is being waved. The crowd have spotted it too. They cheer and surge forward.\n*goto crowd\n*label 600\n\"Let's move it back a bit, get it to 600 metres range\".\n*line_break\n\"Won't we be too far to bring down the walls Teniente?\"\n*line_break\n\"I want to try and fire over the walls and force the garrison into submission\".\n*line_break\n\"Very good sir\".\n*line_break\nMorales turns to his troops, \"I need three men to crew this gun!\"\n*line_break\nThree men scuttle over. Once the gun is in position, Morales tries to accustom himself to the gunsight. He has no experience or training but fiddles around until he thinks he's got it right. \n*line_break\n\"Fire!\"\n*line_break\nMorales waits for the explosion inside the barracks. It doesn't come. Instead, it explodes above a large group of civilians camped just a few hundred metres ahead of them. Morales is speechless. The carnage is terrible. Shrapnel wounds are terrible things. Limbs are taken off. Many are dead. The screams of the wounded are the worst. Morales orders his men to provide first aid. But it isn't long before the crowd make the connection. The atmosphere gets very hostile. \n*line_break\n\"Are you with the fascists?\" With the Army?\" asks a worker accusingly.\n*line_break\n\"No, it was an accident!\" insists Morales.\n*line_break\n\"He's a liar!\" weapons are drawn. Before anyone can react, all eyes turn skywards. A flight of bombers roar overhead. The crowd cheer their approval, the air force of course, is with the Republic. Everyone throws themselves flat as the bombs start to rain down on the barracks. The bombardment is short and sharp and, as the dust settles, it seems as though several fires have broken out in the building. From one of the first floor windows, an improvised white flag is being waved. The crowd have spotted it too. They cheer and surge forward.\n*goto crowd\n*label crowd\n*page_break\nThe mass charge at the gates, shouting and cheering. But the firing from the barracks continues unabated. The white flag disappears and the machine gun opens up. The slaughter is terrible. Screaming and panic, they turn and run. The machine gun keeps firing. By the time the workers are back in the relative shelter of their makeshift positions, dozens of bodies litter the open ground in front of the walls. The grass is stained red. All the cries and screams of the wounded merge into one like a conversation in s crowded room, making one horrible, unending cry for help.\n*line_break\n\"Fucking fascist pigs...\"\n*line_break\n\"Only the lowest form of scum would pull a trick like that!\"\n*line_break\nThen, to surprise and bemusement all round, the main gates open. An army sergeant is pushing them open.\n*line_break\n\"Come on!\" he yells, \"Quickly!\"\n*line_break\nThe crowd are suspicious after the last ploy. But as they consider their options, the sergeant is shot from behind. Realising what has happened and knowing they may not get another opportunity, they rush forward once again. Morales quickly gathers his men and joins the hurried advance. The workers are at the gates now, pushing them open and surging into the barracks.  \n*if (alonsopinned = true)\n\tThey pick up a quaking Alonso on the way.\n*page_break\nInside the barracks is a large enclosed courtyard. Havoc is being wreaked. Thousands of workers are piling in, overwhelming the hundreds of soldiers. Even those who surrender are being beaten to a pulp. Soldiers are being thrown off balconies. Workers are stealing weapons and using them against their owners. Morales grabs a cowering private. \n*line_break\n\"Why did you fly the white flag? Why the fuck did you do that!\"\n*line_break\n\"It was just one of the soldiers...\" he splutters, \"He wanted to surrender, we all did, but the officers wouldn't give up... they, they shot him...\"\n*line_break\nIt had all been a misunderstanding. A terrible, bloody misunderstanding. Or this man may just be lying to save his own skin. A massacre is going on behind them. Morales orders his men to...\n*choice\n\t#Try and stop it and control the crowds, this is illegal.\n\t\t*set morbrutal +10\n\t\t*goto stopit\n\t#Stand aside, to intervene would endanger his own men in this atmosphere.\n\t\t*set morbrutal +5\n\t\t*goto standaside\n\t#Join in, at least shooting the fascists will give them a quick death.\n\t\t*set morbrutal -10\n\t\t*goto join\n*label stopit\n\"Stop, I order you, in the name of the Republic to stop!\"\n*line_break\nNobody pays any attention. \n*line_break\n\"For God's sake, where is your civilisation!\"\n*line_break\n\"Civilisation?\" retorts one of the workers in earshot, \"These fascist pigs have none! How could they kill people like that, with that flag stunt?\"\n*line_break\n\"It was a mistake, just one soldier trying to surrender\".\n*line_break\n\"Oh yeah, of course it was, fucking snakes they are, would never admit to anything. It's time to get revenge!\"\n*line_break\nIf persuasion isn't working, force could be the only way to stop them. But is Morales willing to risk turning this crowd against him? There are only twenty men in his unit and literally thousands of armed workers.\n*choice\n\t#Use force to stop the massacre, it is the right thing to do.\n\t\t*goto useforce\n\t#Stand aside, to intervene would endanger his own men in this atmosphere.\n\t\t*goto standaside\n*label standaside\n\"Stand down men\".\n*line_break\nPrieto protests, \"But sir, we can't let this happen, look what they're doing!\"\n*line_break\n\"And what would you have me do? If we try and stop them, we risk becoming their target. We've no chance. Regrettably, there is nothing we can do\".\n*line_break\nThey stand and watch. It's horrible. The lucky ones are just shot. But many are beaten. The crowd's fury is relentless and in the soldiers they have a legitimate target to focus it on. It feels as if the workers are avenging not just the bloodshed today but the last few months of street violence, the '34 rising, the '33 election, the Primo dictatorship, every frustration, every defeat for the working class. It's horrible. Morales can't stand it.\n*line_break\n\"Come on, our orders are to arrest the officers, let's see if we can find any\".\n*goto officers\n*label useforce\nMorales fires his pistol in the air.\n*line_break\n\"Everyone stop! These men are to be arrested. Please but down your arms!\"\n*line_break\n\"Are you on our side Teniente?\"\n*line_break\n\"Yes, of course, but many of these men are just conscripts\".\n*line_break\nThey don't stop, they aren't paying attention. The killing carries on unabated. \n*line_break\n\"Right men, open fire!\"\n*line_break\n\"But sir...\"\n*line_break\n\"That's an order!\"\n*line_break\nThey fire a volley but all the shots seem to miss. Surely they have done that deliberately. They do succeed however, in attracting the crowd's attention. And anger. Shots begin to be fired at them. \n*line_break\n\"Fucking hell!\" Alonso is shot in the leg. It's time to get out of here before things get ugly. They make a run for it and manage to get away without sustaining any more casualties.\n*set fanjulkilled true\n*goto maria\n*label join\n\"Go on, enjoy yourselves,\" Morales tells his men. They go.\n*line_break\n\"Sir,\" Prieto protests, \"What are you doing? This is totally illegal!\"\n*line_break\n\"This is war Prieto, law doesn't really come in to it\".\n*line_break\n\"If it's war, then theses are war crimes!\"\n*line_break\n\"Yes, that's right Prieto. And we can't do anything about it\".\n*line_break\nMorales draws his pistol and executes the soldier he has been questioning. \n*line_break\nPrieto shakes his head, \"And now you're a war criminal\".\n*line_break\nMorales considers this. Prieto was right he supposed. But this was no ordinary war. Ordinary rules don't apply. Rather than dwell any further on the further, Morales decides to move on,\n*line_break\n\"Our orders are to get the officers, let's see if we can find any\".\n*goto officers\n*label officers\n*page_break\nMorales and Prieto enter the officer's mess hall.\n*line_break\n\"Oh God...\"\n*line_break\nAround the main table are more than a dozen corpses. Officers of every rank sit slumped, pistols in mouths. The table is a pool of blood. In the centre sits a rather rotund man. He is distinguished from the others by both his high rank and the fact he is not dead. He is General Fanjul, leader of the Rising in Madrid.\n\nHe sits, trembling, pistol in mouth. The blood of his comrades drips of the tabletop onto his lap. He whimpers as Morales approaches. How does the Lieutenant react?\n*choice\n\t*if morbrutal >49\n\t\t#His orders are to arrest Fanjul, and that is what he must do.\n\t\t\tMorales reaches over and slowly, gently, eases the gun out of Fanjul's hand. The general doesn't react, or say anything. He merely stares dumbly at Morales. \n\t\t\t*line_break\n\t\t\t\"General, you're going to come with me now\".\n\t\t\t*line_break\n\t\t\tThe general nods meekly and allows himself to be cuffed. The Guards take him quickly out of the complex for fear the mob may realise who he is. Fanjul was found guilty of treason and executed on 19th August 1936.\n\t\t\t*set fanjulcap true\n\t\t\t*goto maria\n\t#He leaves him to his fate, if the man has any courage, he will kill himself.\n\t\t\"Come on Prieto, we'll let this coward decide his own fate, not that there's much of a choice...\"\n\t\t*line_break\n\t\tThe two of them leave. A few moments later, they hear a single shot. Morales finds a telegraph machine and sends a message to HQ.\n\t\t\n\t\tMONTANA BARRACKS SECURED STOP OFFICERS NEUTRALISED STOP AWAITING FURTHER ORDERS FULL STOP\n\t\t*set fanjulsuicide true\n\t\t*goto maria\n\t#He executes him, it will happen anyway at some point, why waste time?\n\t\t*set morbrutal -5\n\t\tNot wasting any time, Morales draws his pistol, aims at the general's head, bringing his other hand up to shield his face and pulls the trigger. Blood splatters his raised hand. The general has joined his comrades. Morales finds a telegraph machine and sends a message to HQ.\n\t\t\n\t\tMONTANA BARRACKS SECURED STOP OFFICERS NEUTRALISED STOP AWAITING FURTHER ORDERS FULL STOP\n\t\t*set fanjulkilled true\n\t\t*goto maria\n*label maria\t\n*if (moralesdead = true)\n\t*set fanjulkilled true\n*page_break\n12.42 P.M.\n*line_break\n25th July 1936\n*line_break\nFalange Regional Headquarters, Pamplona\n*line_break\nNurse-in-Training Maria Farfan\n\nThe clock on the wall ticks inexorably from one second to the next. The ceiling fan whirs. The blinds flutter in the breeze. Maria looks around her. Twenty or so other trainee nurses sit at the individual desks. Each is focused on their own work. The sound of dozens of pencils scribbling frantically is strangely therapeutic.\n\nMaria looks down at her own paper. Falange SF preliminary assessment.\n*if (polmed = true)\n\tPaper One- Political Education. The first few days of her time with the Falange had been consumed with her political training. She'd been identified as politically suspect. Hence, the medical side of her training had been put on hold.\n*if (medictrain = true)\n\tPaper Two- Initial Medical Training. The first few days of her time with the Falange had been devoted to her medical education. She'd already passed the political side with flying colours upon her admission.\n\nGabrielle is sitting to her right, working away. They exchange a glance but Gabrielle quickly gets back to her work, not wanting to be accused of cheating. Maria looks down at her own paper.\n*if polmed = true\n\t*goto poltest\n*if medictrain = true\n\t*goto medtest\n*label poltest\n*page_break\nQ8. We fighting the great crusade against Bolshevism have collectively called ourselves \"Nacionales\" (Nationalists). What is the significance of this term?\n*fake_choice\n\t#a) It highlights our patriotism in contrast to the Reds' lack of it.\n\t\tShe writes in her answer and hopes for the best.\n\t#b) It emphasises our status as the only true Spaniards, fighting for true Spanish values.\n\t\t*set correct +1\n\t\tShe writes in her answer and hopes for the best.\n\t#c) It reminds our enemies that they are pawns of international Bolshevism and Free Masonry.\n\t\tShe writes in her answer and hopes for the best.\n\t#She tries to copy Gabrielle.\n\t\t*set correct +1\n\t\tMaria peers over at her friend's paper, making sure that Vidal isn't looking. He isn't, he's sitting at the front reading a newspaper. For question eight, Gabrielle has put B. She hopes it's right.\n*line_break\nQ9. The Spanish Army undertook the Rising because...\n*fake_choice\n\t#a) The Red government is illegitimate.\n\t\tShe circles a, she's pretty sure she's got this one right.\n\t#b) The Red government is a front for a Jewish-Bolshevik-Free Mason conspiracy to take over Spain.\n\t\tShe circles b, she's pretty sure she's got this one right.\n\t#c) The Red government deliberately failed to maintain law and order.\n\t\tShe circles c, she's pretty sure she's got this one right.\n\t#d) All of the above.\n\t\t*set correct +1\n\t\tShe circles d, she's pretty sure she's got this one right.\n\t#She tries to copy Gabrielle.\n\t\tMaria attempts to see what Gabrielle has put for this question, but her friend is leaned right over her paper, preventing anyone but herself from seeing it. Maria answers...\n\t\t*fake_choice\n\t\t\t#a) The Red government is illegitimate.\n\t\t\t\tShe circles a, she's pretty sure she's got this one right.\n\t\t\t#b) The Red government is a front for a Jewish-Bolshevik-Free Mason conspiracy to take over Spain.\n\t\t\t\tShe circles b, she's pretty sure she's got this one right.\n\t\t\t#c) The Red government deliberately failed to maintain law and order.\n\t\t\t\tShe circles c, she's pretty sure she's got this one right.\n\t\t\t#d) All of the above.\n\t\t\t\t*set correct +1\n\t\t\t\tShe circles d, she's pretty sure she's got this one right.\n*line_break\t\t\t\t\nQ10. Finally, why did you join the SF of the Falange? This is your personal motivation and as such is not multiple choice. Why are you here today? Maria writes...\n*fake_choice\n\t#To serve my country and the cause as best I can.\n\t\t*set correct +1\n\t\tHopefully that will satisfy them.\n\t#To fulfil my Christian duty and help defend Spain from the forces that threaten the faith.\n\t\t*set correct +1\n\t\tHopefully that will satisfy them.\n\t#To provide medical care to those who need it most.\n\t\tHopefully that will satisfy them.\t\t\n\t*if forcedto = true \n\t\t#I was forced to.\n\t\t\tWell, that's the honest answer to why she is here today...\n\t\t\t*set answertoten true\n*goto afterexam\n*label medtest\n*page_break\nQ8. A patient is complaining of a sharp pain in his arm. There is no surface wound or swelling. Moving the arm is very painful for him. What should you do?\n*fake_choice\n\t#a) Refer the patient to the doctor, it is unclear what his injury is.\n\t\tShe writes in her answer and hopes for the best.\n\t#b) Put his arm in a brace, it is clearly broken.\n\t\tShe writes in her answer and hopes for the best.\n\t#c) It is most likely just a dislocation, pop the arm back into the joint.\n\t\t*set correct +1\n\t\tShe writes in her answer and hopes for the best.\n\t#She tries to copy Gabrielle.\n\t\t*set correct +1\n\t\tMaria peers over at her friend's paper, making sure that Vidal isn't looking. He isn't, he's sitting at the front reading a newspaper. For question eight, Gabrielle has put C. She hopes it's right.\n*line_break\nQ9. A badly wounded soldier has confided in you that he is in terrible pain and wants to die. His chances of recovery are slight. What should you do? \n*fake_choice\n\t#a) Give him a large dose of morphine in the hope he will pass away peacefully.\n\t\tShe circles a, she's pretty sure she's got this one right.\n\t#b) Increase his dose of painkiller but make sure remains alive, he still has a chance, albeit a small one.\n\t\tShe circles b, she's pretty sure she's got this one right.\n\t#c) Report the soldier to the military authorities on the grounds of conspiracy to desert his duty.\n\t\t*set correct +1\n\t\tShe circles c, she's pretty sure she's got this one right.\n\t#She tries to copy Gabrielle.\n\t\tMaria attempts to see what Gabrielle has put for this question, but her friend is leaned right over her paper, preventing anyone but herself from seeing it. Maria answers...\n\t\t*fake_choice\n\t\t\t#a) Give him a large dose of morphine in the hope he will pass away peacefully.\n\t\t\t\tShe circles a, she's pretty sure she's got this one right.\n\t\t\t#b) Increase his dose of painkiller but make sure remains alive, he still has a chance, albeit a small one.\n\t\t\t\tShe circles b, she's pretty sure she's got this one right.\n\t\t\t#c) Report the soldier to the military authorities on the grounds of conspiracy to desert his duty.\n\t\t\t\t*set correct +1\n\t\t\t\tShe circles c, she's pretty sure she's got this one right.\n*line_break\t\t\t\t\nQ10. A lightly wounded soldier in your care makes advances of a vulgar nature towards you. How do you respond?\n*fake_choice\n\t#a) Report the soldier to the head nurse, she will see to it that his superiors are informed.\n\t\t*set correct +1\n\t\tHopefully that will satisfy them.\n\t#b) Increase his dose of painkiller to sedate him.\n\t\tHopefully that will satisfy them.\n\t#c) Acquiesce to his demands.\n\t\tHopefully that will satisfy them.\t\t\n*goto afterexam\n*label afterexam\n*page_break\n*if correct = 3\n\t*achieve student\nSeveral hours later, the trainees wait in the atrium for their results. Gabrielle is chatting away as usual,\n*line_break\n\"... and did you hear about Madrid?\"\n*line_break\n\"No, what about it?\"\n*line_break\n\"Not about what happened at the Army barracks?\"\n*line_break\n\"No\".\n*line_break\n\"It was a terrible business, truly barbaric!\"\n*line_break\n\"Go on,\" this was typical Gabrielle, deliberately holding her friend in suspense for as long as possible.\n*line_break\n\"I read in El Debate that a mob of Reds stormed the barracks and slaughtered the soldiers. Really very brutal\".\n*line_break\n\"Well that is terrible, I'm surprised I didn't hear about it. When did it happen?\"\n*line_break\n\"Oh, nearly a week ago now\".\n*line_break\n\"The horror stories just don't stop do they?\"\n*line_break\n\"Just like I told you,\" Gabrielle replies smugly, taking pleasure from being correct despite the macabre nature of the revelations, \"And did you hear about General Fanjul?\"\n*line_break\n\"Nope\".\n*line_break\n*if (fanjulkilled = true)\n\t\"He was butchered along with the rest of them at Montana. Think about that. A general, a hero of the Moroccan war, treated like a common criminal, in fact, worse, murdered without a trial\".\n\t*line_break\n\tMaria...\n\t*choice\n\t\t#Points out Gabrielle's hypocrisy in opposing murder without trial.\n\t\t\t\"What about the massacre in Pamplona?\"\n\t\t\t*line_break\n\t\t\t\"What do you mean 'massacre'?\"\n\t\t\t*line_break\n\t\t\t\"We shot all those Reds! They didn't get a trial and yet, you didn't seem too concerned about due process then!\"\n\t\t\t*line_break\n\t\t\tGabrielle rolls her eyes, \"That's obviously different!\"\n\t\t\t*line_break\n\t\t\t\"Go on then, how?\"\n\t\t\t*line_break\n\t\t\tBefore Gabrielle can elaborate further, they are interrupted by Vidal's distinctive call,\n\t\t\t*line_break\n\t\t\t\"Senorita Farfan, in my office please!\"\n\t\t\t*line_break\n\t\t\tGabrielle raises her eyebrows. Maria is rather nervous, does this mean she's done very well, or very badly?\n\t\t\t*goto vidaloffice\n\t\t#Agrees how terrible it is.\n\t\t\t\"Yes, that truly is barbarous. It's a crying shame as well, Fanjul was a good general\".\n\t\t\t*line_break\n\t\t\t\"What's worse is that I'm sure the perpetrators will get away with it. It was a mob of thousands, how can you tell who did it? Not that the Red government will have any interest in convicting anyone\".\n\t\t\t*line_break\n\t\t\tBefore Gabrielle can elaborate further, they are interrupted by Vidal's distinctive call,\n\t\t\t*line_break\n\t\t\t\"Senorita Farfan, in my office please!\"\n\t\t\t*line_break\n\t\t\tGabrielle raises her eyebrows. Maria is rather nervous, does this mean she's done very well, or very badly?\n\t\t\t*goto vidaloffice\n*if (fanjulsuicide = true)\n\t\"He killed himself rather than being taken by the mob. I guess that's the noble thing to do. I should think I'd do the same in a similar situation\".\n\t*line_break\n\tMaria...\n\t*choice\n\t\t#Agrees.\n\t\t\t\"Oh yes, I agree, to be taken by the Reds would be a fate worse than death\".\n\t\t\t*line_break\n\t\t\t\"Can you even imagine it? Truly the stuff of nightmares\".\n\t\t\t*line_break\n\t\t\t\"It's a crying shame as well, Fanjul was a good general\".\n\t\t\t*line_break\n\t\t\tBefore Gabrielle can elaborate further, they are interrupted by Vidal's distinctive call,\n\t\t\t*line_break\n\t\t\t\"Senorita Farfan, in my office please!\"\n\t\t\t*line_break\n\t\t\tGabrielle raises her eyebrows. Maria is rather nervous, does this mean she's done very well, or very badly?\n\t\t\t*goto vidaloffice\n\t\t#Disagrees.\n\t\t\t\"Really? Suicide? But that's a one way ticket to hell, forbidden by God!\"\n\t\t\t*line_break\n\t\t\t\"Oh, but trust me, being taken by the Reds would be a fate worse than death\".\n\t\t\t*line_break\n\t\t\t\"Worse than hell?\"\n\t\t\t*line_break\n\t\t\t\"Hell on Earth!\"\n\t\t\t*line_break\n\t\t\tBefore Gabrielle can elaborate further, they are interrupted by Vidal's distinctive call,\n\t\t\t*line_break\n\t\t\t\"Senorita Farfan, in my office please!\"\n\t\t\t*line_break\n\t\t\tGabrielle raises her eyebrows. Maria is rather nervous, does this mean she's done very well, or very badly?\n\t\t\t*goto vidaloffice\n*if (fanjulcap = true)\n\t\"They spared him, took him prisoner. The Reds have charged him with treason, I mean really, how ridiculous is that?\"\n\t*line_break\n\tMaria...\n\t*choice\n\t\t#Points out that it is treason to rebel against the government.\n\t\t\t\"What's so ridiculous about that?\"\n\t\t\t*line_break\n\t\t\t\"What do you mean?\"\n\t\t\t*line_break\n\t\t\t\"Well, you said the government charged him with treason,\" Maria reasons, \"The same government he has rebelled against. It's hardly surprising they see it as treason\".\n\t\t\t*line_break\n\t\t\t\"That's not the point! The government is illegitimate, so opposing it cannot be treason\".\n\t\t\t*line_break\n\t\t\t\"I don't think that's the way they'll see it in Madrid\".\n\t\t\t*line_break\n\t\t\t\"Keep your voice down Maria!\" Gabrielle scolds, \"Do I have to keep telling you about the dangers of talking like that?\"\n\t\t\t*line_break\n\t\t\tBefore Gabrielle can elaborate further, they are interrupted by Vidal's distinctive call,\n\t\t\t*line_break\n\t\t\t\"Senorita Farfan, in my office please!\"\n\t\t\t*line_break\n\t\t\tGabrielle raises her eyebrows. Maria is rather nervous, does this mean she's done very well, or very badly?\n\t\t\t*goto vidaloffice\n\t\t#Agrees.\n\t\t\t\"Yes, quite. How can it be treason to rebel against an illegitimate government?\"\n\t\t\t*line_break\n\t\t\t\"That's exactly what I thought!\"\n\t\t\t*line_break\n\t\t\t\"And he was only rebelling in an attempt to restore law and order, so he was doing them a favour anyway\".\n\t\t\t*line_break\n\t\t\tBefore Gabrielle can elaborate further, they are interrupted by Vidal's distinctive call,\n\t\t\t*line_break\n\t\t\t\"Senorita Farfan, in my office please!\"\n\t\t\t*line_break\n\t\t\tGabrielle raises her eyebrows. Maria is rather nervous, does this mean she's done very well, or very badly?\n\t\t\t*goto vidaloffice\n*label vidaloffice\n*page_break\n\"Please take a seat Senorita Farfan\".\n*line_break\nMaria sits at Vidal's desk. He sits opposite her in a large leather chair, all the exam papers spread out in front of him. \n*if (correct = 3)\n\t\"I have called you in to congratulate you Maria, you've done exceptionally well!\"\n\t*line_break\n\t\"Thanks you Senor Vidal\".\n\t*line_break\n\t\"Please, it's Carlos\".\n\t*line_break\n\t\"Oh, that you... Carlos\".\n\t*line_break\n\t\"Yes, amazingly well in fact, you scored 100%. Every question correct.\n\t*if (forcedto = true)\n\t\tDespite you initial [i]doubts[/i] about joining up, it seems you're settling well. Very well indeed.\n\t*if (polmed = true)\n\t\tYour political commitment to our cause is beyond dispute!\"\n\t*if (medictrain = true)\n\t\tYour medical judgment is exemplary!\"\n\t*line_break\n\tThis wasn't so bad, Maria enjoyed receiving praise,\n\t*line_break\n\t\"I do my best Senor Vidal...\"\n\t*line_break\n\t\"Carlos!\"\n\t*line_break\n\t\"... Carlos, yes, I think I'm fitting in well\".\n\t*line_break\n\t\"Indeed you are considering you've only been with us a matter of days...\"\n\t*goto proposal\n*if (correct = 2)\n\t\"I have called you in to congratulate you Maria, you've done well!\"\n\t*line_break\n\t\"Thanks you Senor Vidal\".\n\t*line_break\n\t\"Please, it's Carlos\".\n\t*line_break\n\t\"Oh, that you... Carlos\".\n\t*line_break\n\t\"Yes, very well in fact, you scored 70%. Very impressive.\n\t*if (forcedto = true)\n\t\tDespite you initial [i]doubts[/i] about joining up, it seems you're settling well. Very well indeed.\n\t*if (polmed = true)\n\t\tYour political commitment is very strong\".\n\t*if (medictrain = true)\n\t\tYour medical judgment is generally very good\".\n\t*line_break\n\tThis wasn't so bad, Maria enjoyed receiving praise,\n\t*line_break\n\t\"I do my best Senor Vidal...\"\n\t*line_break\n\t\"Carlos!\"\n\t*line_break\n\t\"... Carlos, yes, I think I'm fitting in well\".\n\t*line_break\n\t\"Indeed you are considering you've only been with us a matter of days...\"\n\t*if (answertoten = true)\n\t\t*line_break\n\t\t\"There was just one reason for concern. Your answer to question 10 worries me though. It seems you still seem convinced that you are here against your will,\" Maria is silent and avoids Vidal's gaze, so he continues, \"Maria, I think you would benefit from some time spent with me\".\n\t\t*line_break\n\t\t\"What do you mean?\"\n\t\t*line_break\n\t\t\"Well...\"\n\t*goto proposal\t\n*if (correct = 1)\n\t\"I'm afraid I have to be the bearer of bad news. You've not done very well in this exam\".\n\t*line_break\n\t\"Sorry Senor Vidal\".\n\t*line_break\n\t\"Please, it's Carlos\".\n\t*line_break\n\t\"Oh, sorry... Carlos\".\n\t*line_break\n\t\"Yes, not dreadfully, but not very well either, you scored 30%.\n\t*if (forcedto = true)\n\t\tBut despite you initial [i]doubts[/i] about joining up, I think you have come a long way in a short time.\n\t*if (polmed = true)\n\t\tYour political commitment to our cause is still not clear\".\n\t*if (medictrain = true)\n\t\tYour medical judgment needs some improvement it seems\".\n\t*line_break\n\tThis wasn't so bad, she was expecting a far more severe reprimand,\n\t*line_break\n\t\"I do my best Senor Vidal...\"\n\t*line_break\n\t\"Carlos!\"\n\t*line_break\n\t\"... Carlos, yes, I think I'm fitting in well\".\n\t*line_break\n\t\"Indeed you are considering you've only been with us a matter of days. There is just one thing though...\"\n\t*line_break\n\t\"Oh?\"\n\t*if (answertoten = true)\n\t\t*line_break\n\t\t\"Your answer to question 10 worries me. It seems you still seem convinced that you are here against your will,\" Maria is silent and avoids Vidal's gaze, so he continues, \"Maria, I think you would benefit from some time spent with me\".\n\t\t*line_break\n\t\t\"What do you mean?\"\n\t\t*line_break\n\t\t\"Well...\"\n\t*goto proposal\n*if (correct = 0)\n\t\"I'm afraid I have to be the bearer of bad news. You've not done very well in this exam. Not well at all\".\n\t*line_break\n\t\"Sorry Senor Vidal\".\n\t*line_break\n\t\"Please, it's Carlos\".\n\t*line_break\n\t\"Oh, sorry... Carlos\".\n\t*line_break\n\t\"Yes, utterly dreadfully in fact, you scored 0%.\n\t*if (forcedto = true)\n\t\tIt seems you haven't shook off your initial [i]doubts[/i] about joining up.\n\t*if (polmed = true)\n\t\tYour political commitment to our cause is clearly non-existent\".\n\t*if (medictrain = true)\n\t\tYour medical judgment needs some serious work it seems\".\n\t*line_break\n\tShe didn't know what to say,\n\t*line_break\n\t\"I'm so sorry Senor Vidal, it won't happen again.\"\n\t*line_break\n\t\"Please, it's Carlos, I insist!\"\n\t*line_break\n\t\"... Carlos, yes, I do think I'm fitting in well though\".\n\t*line_break\n\t\"Indeed you are considering you've only been with us a matter of days. There is just one thing though...\"\n\t*line_break\n\t\"Oh?\"\n\t*if (answertoten = true)\n\t\t*line_break\n\t\t\"Your answer to question 10 worries me. It seems you still seem convinced that you are here against your will,\" Maria is silent and avoids Vidal's gaze, so he continues, \"Maria, I think you would benefit from some time spent with me\".\n\t\t*line_break\n\t\t\"What do you mean?\"\n\t\t*line_break\n\t\t\"Well...\"\n\t*goto proposal\n*label proposal\n*page_break\nVidal decidedly pauses before continuing, avoiding eye contact and shuffling his papers, \n*line_break\n\"I was wondering whether you might have taken a shine to more than just this [i]place[/i]\".\n*line_break\n\"I'm sorry Senor Vidal, I'm afraid I don't follow\".\n*line_break\n\"I am to attend a local Falange function tonight. There will be many important military, political and Church representatives in attendance. I want you to accompany me\".\n*line_break \nAlthough taken aback, Maria responds quickly,\n*choice\n\t#Yes of course, it would be an honour and a pleasure!\n\t\t*goto yesofc\n\t#I will, but you need to do something for me...\n\t\t*goto maybe\n\t#I'm afraid I must decline, I've only know you a matter of days!\n\t\t*goto reject\n*label yesofc\n\"Brilliant, I hoped you'd say that. I shall collect you this evening. I'll have a suitable dress bought in the town and brought round this afternoon\".\n*line_break\n\"That sounds delightful, most kind of you!\"\n*line_break\n\"The pleasure is all mine, I shall see you this evening. Now, could you please send Gabrielle in?\"\n*line_break \nIt transpires that Gabrielle did very well, however when Maria tells her of Senor Vidal's advances, she doesn't hide her jealousy very well.\n*set vidrship true\n*goto delarosa\n*label maybe\n\"What do you mean?\"\n*if (correct = 3)\n\t*line_break\n\t\"I want you to guarantee me now, that I'll get 100% in all my examinations, from now on\".\n\t*goto nxtbt\n*else\n\t*line_break\n\t\"You will change my marks for the exam. I got 100%\".\n\t*goto nxtbt\n*label nxtbt\n*line_break\n\"Are you having a laugh?\" Vidal protests, \"You can't be serious, I can't do that!\"\n*line_break\n\"I think you can. And you will. You will if you want me to accompany you this evening\".\n*line_break\n\"But...\" his protests fade as he gives the proposal serious thought,\n*temp vidalch\n*rand vidalch 0 100\n*if (vidalch \u003c 50)\n\t\"No, what am I thinking, you're being totally unreasonable. In fact, you should consider yourself lucky I'm not reporting you for this! Now get out of my sight and send Gabrielle in\".\n\t*goto gabbyend\n*if (vidalch > 49)\n\t\"... look\"\n\t*line_break\n\t\"Yes or no?\"\n\t*line_break\n\t\"Ok, ok, I'll do it\".\n\t*line_break\n\t\"Perfect, what time should I expect you?\"\n\t*line_break\n\t\"I'll be round at 7.30, wear your best dress. Now would you leave me and send in Gabrielle\".\n\t*line_break\n\t\"Of course Carlos,\" and then she adds sarcastically, \"Anything for you!\"\n\t*line_break\n\tIt transpires that Gabrielle did very well, however when Maria tells her of Senor Vidal's advances, she doesn't hide her jealousy very well.\n\t*set vidrship true\n\t*goto delarosa\n*label reject\n\"Well that's true, but please Maria...\"\n*line_break\n\"Don't call me that!\"\n*line_break\n\"Please senorita, I urge you to reconsider, making a friend of me could have certain [i]benefits[/i]\".\n*line_break\n\"You make me sick Vidal, you can attend your function alone!\"\n*line_break\n\"Well if that's the way you are going to respond to a perfectly kind and well-intentioned gesture, I'd like you to leave, get out now and send Gabrielle in!\"\n*goto gabbyend\n*label gabbyend\n*page_break\nMaria storms out, sends Gabrielle in and returns to her quarters. Half an hour later, Gabrielle comes to see her, evidently excited. It transpires that she did very well in the test but also, that Vidal made the same proposal to her. And of course, Gabrielle accepted. \n*line_break\n\"... and who knows, maybe I might accompany him for more than just the function...\"\n*line_break\n\"What?\" Maria is genuinely shocked, \"You're not serious, what's wrong with you?\"\n*line_break\n\"Oh come on Maria, you prude! You didn't think I was a virgin did you? Besides, he's charming, handsome and well, can you imagine the advantages for my career?\"\n*line_break\n\"Not if you fall pregnant!\"\n*line_break\n\"Oh come off it Maria, you're so naive!\"\n*line_break\n\"And since when did you turn Red?\"\n*line_break\n\"What? I fuck a Falangist and you call me a Red?\"\n*line_break\n\"Two words Gabrielle, free love. That's what the Reds believe in, and that's everything we're fighting against.\"\n*line_break\n\"I'll tell you what you are Maria, you're jealous. Plain and simple!\"\n*line_break\nAnd with that she storms out. Maria feels betrayed.\n*goto delarosa\n*label delarosa\n*page_break\n12.22 P.M.\n*line_break\n28th July 1936\n*line_break\nThe Straits of Gibraltar\n*line_break\nFlying Officer Jose De La Rosa\n\nThe midday sun shines brightly over the perfect deep blue of the Mediterranean. 3000 metres high, a cluster of black specs glide effortlessly across the sky. Eight German JU52 transport aircraft fly in tight formation. They have just arrived, help from Mr Hitler to General Franco. They are loaded with troops of the Army of Africa being taken from Morocco to the mainland. Buzzing around them are the fighters of 11 squadron. \n\nDe La Rosa brings his NiD 52 over the transports. It's a struggle to say the least, the aged French NiD biplanes are helplessly slow and difficult to handle. \n*if (vasdead = true)\n\tSquadron Leader Tello's voice crackles over the radio. Tello has been appointed by the Army who refuse to entrust command to air force personnel given the current situation,\n\t*line_break\n\t\"This is Blue Leader calling Blue squadron, do you copy?\"\n\t*line_break\n\t\"Blue One standing by\".\n\t*line_break\n\t\"Blue Two standing by\".\n\t*line_break\n\t\"Blue Three standing by,\" De La Rosa responds, breathing an insult under his breath as h
