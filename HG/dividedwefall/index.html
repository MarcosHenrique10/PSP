uel tank is located just below the pilot's seat. And it's this flaw that costs the Squadron Leader. The tank sets alight and flames quickly envelop the cockpit. The heat is of an unimaginable intensity. The smoke makes it impossible to breath. He tries desperately to open the hatch to bail out. But the metal lever is so hot he can't get a hold of it, his gloves disintegrating.\n\n\t\t\tThis can't be it, surely not? But as his 109 falls out of the sky, De La Rosa realises it almost certainly is. And to have been shot down by Vasquez makes it all the worse.\n\t\t\t*if dlrship = true\n\t\t\t\t*if ambushdead = true\n\t\t\t\t\tAt least he'll get to be with Maria now. That's what he tells himself. It won't all be so bad. Because he'll get to see the woman he loves, the woman who died eight months ago. He'll get to see her again. It's going to be alright.\n\t\t\t\t*if ambushdead = false\n\t\t\t\t\tHe thinks about Maria. She hasn't been seen since the Reds took Camposines. Is she dead? He didn't know, but De La Rosa begins to hope she is. Because that means he'll be with her very shortly. He's going to see her again. It's going to be alright.\n\t\t\t*if dlrship = false\n\t\t\t\t*if gabdead = true\n\t\t\t\t\tAt least he'll get to be with Gabrielle now. That's what he tells himself. It won't all be so bad. Because he'll get to see the woman he loves, the woman who died eight months ago. \n\t\t\t\t\t*if vidrship = false\n\t\t\t\t\t\t*if abortion = false\n\t\t\t\t\t\t\tAnd not forgetting baby $!{baby}. Poor little $!{baby}. He'll get to see his child for the very first time. That'll be special.\n\t\t\t\t\tHe'll get to see her again. It's going to be alright.\n\t\t\t\t*if gabdead = false\n\t\t\t\t\tBut what about Gabrielle? He can't die, he mustn't. But he is about to. And he's never going to see the woman he loves ever again.\n\t\t\t\t\t*if vidrship = false\n\t\t\t\t\t\t*if abortion = false\n\t\t\t\t\t\t\tAnd not forgetting baby $!{baby}. Poor little $!{baby}. $!{baby} is going to grow up an orphan. It's not fair.\n\t\t\t\t\tWhy was he so stupid? Why has he let himself get killed when he had so much to live for? But there's nothing he can do about it now.\n\t\t\t*set dlrdead true\n\t\t\t*goto alba\n\t\t#Tries to seek out and destroy Vasquez.\n\t\t\tListening to the chatter on the Republican channel, De La Rosa slowly pieces together where Vasquez must be. He must be high above the battle to see everything going on. And Jose deduces he's slightly further North, ready to flee back to Red territory if things go wrong. Then he sees him. Or what he thinks must be Vasquez. \n\t\t\t*image number15.png\n\t\t\tA Super-Rata flying high, all on its own. He goes in for the kill.\n\t\t\t*page_break\n\t\t\tSpotting him late, Vasquez desperately puts his plane into a dive, but it's too little, too late. De La Rosa has him in his sights and opens fire. His cannons fire off a few rounds but then click- they're empty! He switches to his machine guns and lands several more hits before breaking off. He still has the Republican channel tuned,\n\t\t\t*line_break\n\t\t\t\"Mayday, mayday, this is Red Leader, I've been hit, losing power and altitude! I should be able to make it back to our lines!\"\n\t\t\t*line_break\n\t\t\tNow that he has Vasquez at his mercy, De La Rosa decides to...\n\t\t\t*choice\n\t\t\t\t#Let him go, but let him know he is.\n\t\t\t\t\t*achieve spare\n\t\t\t\t\t\"Roger that Red Leader, this is Blue Leader, or as you may know me better, Jose De La Rosa of the Aviacion Nacional\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Fucking hell Jose, you bastard!\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Curse all you like Vasquez but I just thought you'd like to know the name of the pilot who beat you today and who decided to give you your life\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"What?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"You heard me, now fuck off\".\n\t\t\t\t\t*line_break\n\t\t\t\t\tDe La Rosa switches his radio back to the Nationalist channel, not bothering to wait for his rival's response.\n\t\t\t\t\t*goto dlrend \n\t\t\t\t#Finish him off, and tell him who's doing it.\n\t\t\t\t\t\"Vasquez, I thought you'd appreciate knowing the name of the man who kills. His name is Squadron Leader Jose De La Rosa\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Fucking hell Jose, you bastard!\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Curse all you like Vasquez, it's not going to save you\".\n\t\t\t\t\t*line_break\n\t\t\t\t\tAnd with that, De La Rosa switches his radio back to the Nationalist channel and moves in to finish him off. An extended burst of machine gun fire is enough to down the Rata. He got Vasquez in the end.\n\t\t\t\t\t*goto dlrend\n\t\t#Orders Blue Squadron to find Vasquez.\n\t\t\tSwitching back to the Nationalist channel, De La Rosa hails his squadron,\n\t\t\t*line_break\n\t\t\t\"Blue Squadron this is Blue Leader, I've identified the Red commander, keep your eyes peeled for a Red on the edge of the fight, directing things\".\n\t\t\t*if pairdead = false\n\t\t\t\t*line_break\n\t\t\t\tAfter less than a minute, $!{pair} is on the radio,\n\t\t\t\t*line_break\n\t\t\t\t\"I think I see him Blue Leader, just North of the dogfight, my three o'clock high\".\n\t\t\t\t*line_break\n\t\t\t\t\"Great spot $!{pair}\".\n\t\t\t\t*line_break\n\t\t\t\t\"Shall I move to engage?\"\n\t\t\t\t*line_break\n\t\t\t\t\"No, he's mine. Leave him to me...\"\n\t\t\t*if pairdead = true\n\t\t\t\t*if pair = \"Silva\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tAfter less than a minute, Rodriguez is on the radio,\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"I think I see him Blue Leader, just North of the dogfight, my three o'clock high\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Great spot Blue Six\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Shall I move to engage?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"No, he's mine. Leave him to me...\"\n\t\t\t\t*if pair = \"Joaquin\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tAfter less than a minute, Rodriguez is on the radio,\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"I thi oing to grow up an orphan. It's not fair.\n\t\t\t\t\tWhy was he so stupid? Why has he let himself get killed when he had so much to live for? But there's nothing he can do about it now.\n\t\t\t*set dlrdead true\n\t\t\t*goto alba\n\t\t#Tries to seek out and destroy Red Leader.\n\t\t\tListening to the chatter on the Republican channel, De La Rosa slowly pieces together where Red Leader must be. He must be high above the battle to see everything going on. And Jose deduces he's slightly further North, ready to flee back to Red territory if things go wrong. Then he sees him. Or what he thinks must be him. \n\t\t\t*image number15.png\n\t\t\tA Super-Rata flying high, all on its own. He goes in for the kill.\n\t\t\t*page_break\n\t\t\tSpotting him late, the Red desperately puts his plane into a dive, but it's too little, too late. De La Rosa has him in his sights and opens fire. His cannons fire off a few rounds but then click- they're empty! He switches to his machine guns and lands several more hits before breaking off. He still has the Republican channel tuned,\n\t\t\t*line_break\n\t\t\t\"Mayday, mayday, this is Red Leader, I've been hit, losing power and altitude! I should be able to make it back to our lines!\"\n\t\t\t*line_break\n\t\t\tNow that he has him at his mercy, De La Rosa decides to...\n\t\t\t*choice\n\t\t\t\t#Let him go.\n\t\t\t\t\t*set dlrbrutal +5\n\t\t\t\t\t\"Roger that Red Leader, this is Blue Leader, Jose De La Rosa of the Aviacion Nacional\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Fucking fascist pig, get off our channel!\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Curse all you like but I just thought you'd like to know the name of the pilot who beat you today and who decided to give you your life\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"What?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"You heard me, now fuck off\".\n\t\t\t\t\t*line_break\n\t\t\t\t\tDe La Rosa switches his radio back to the Nationalist channel, not bothering to wait for his rival's response.\n\t\t\t\t\t high\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Great spot Blue Six\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Shall I move to engage?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"No, he's mine. Leave him to me...\"\n\t\t\t\t*if pair = \"Rodriguez\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tAfter less than a minute, Silva is on the radio,\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"I think I see him Blue Leader, just North of the dogfight, my three o'clock high\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Great spot Silva\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Shall I move to engage?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"No, he's mine. Leave him to me...\"\n\t\t\t*page_break\n\t\t\t*image number15.png\n\t\t\tThere he is, a Super-Rata flying high, all on its own. He goes in for the kill.\n\t\t\t\n\t\t\tSpotting him late, the Red desperately puts his plane into a dive, but it's too little, too late. De La Rosa has him in his sights and opens fire. His cannons fire off a few rounds but then click- they're empty! He switches to his machine guns and lands several more hits before breaking off. He still has the Republican channel tuned,\n\t\t\t*line_break\n\t\t\t\"Mayday, mayday, this is Red Leader, I've been hit, losing power and altitude! I should be able to make it back to our lines!\"\n\t\t\t*line_break\n\t\t\tNow that he has him at his mercy, De La Rosa decides to...\n\t\t\t*choice\n\t\t\t\t#Let him go.\n\t\t\t\t\t*set dlrbrutal +5\n\t\t\t\t\t\"Roger that Red Leader, this is Blue Leader, Jose De La Rosa of the Aviacion Nacional\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Fucking fascist pig, get off our channel!\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Curse all you like but I just thought you'd like to know the name of the pilot who beat you today and who decided to give you your life\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"What?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"You heard me, now fuck off\".\n\t\t\t\t\t*line_break\n\t\t\t\t\tDe La Rosa switches his radio back to the Nationalist channel, not bothering to wait for his rival's response.\n\t\t\t\t\t*goto dlrend \n\t\t\t\t#Finish him off.\n\t\t\t\t\t*set dlrbrutal -5\n\t\t\t\t\t\"Red Leader, I thought you'd appreciate knowing the name of the man who kills. His name is Squadron Leader Jose De La Rosa\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Fucking fascist pig!\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Curse all you like, it's not going to save you\".\n\t\t\t\t\t*line_break\n\t\t\t\t\tAnd with that, De La Rosa switches his radio back to the Nationalist channel and moves in to finish him off. An extended burst of machine gun fire is enough to down the Rata. He got his man.\n\t\t\t\t\t*goto dlrend\n*label dlrend\n*page_break\nWith his ammunition running low, De La Rosa heads for home. The dogfight continues to rage but the Nationalists have a clear advantage now. It's only a matter of time before they regain control of the skies. As he guides his 109 home, De La Rosa finds himself thinking about $!{girl}.\n*if dlrship = true\n\t*if ambushdead = false\n\t\tMaria has been missing for over two weeks now, ever since Camposines fell to the Reds. He can't help but worry. He's heard about the sort of things they do to women in the propaganda. When he had fallen in love with her (at least he presumed the emotions he feels are love) he had worried. He had worried about having something to lose should he die. Now he was worried he'd lost something, something very precious gone forever. He'd visited her about a week before this whole battle kicked off. The memories of those few days are ones he will cherish, he reassures himself.\n\t*if ambushdead = true\n\t\tShe is the only woman he's ever loved and she's dead. It's been nearly eight months. Seven months and twenty-two days to be exact. Not that he was counting or anything. Sometimes he wondered whether it would be better to be killed. Then he'd be with her. They'd both be martyrs for the cause and he'd get to be with her. But he's still alive. And he's guiding his 109 in to land.\n*if dlrship = false\n\t*if gabdead = true\n\t\tShe is the only woman he's ever loved and she's dead. It's been nearly eight months. Seven months and twenty-two days to be exact. Not that he was counting or anything. \n\t\t*if vidrship = false\n\t\t\t*if abortion = false\n\t\t\t\tAnd not forgetting baby $!{baby}. Poor little $!{baby}. He'd never even seen his own child.\n\t\tSometimes he wondered whether it would be better to be killed. Then he'd be with her. They'd both be martyrs for the cause and he'd get to be with her. But he's still alive. And he's guiding his 109 in to land.\n\t*if gabdead = false\n\t\tHe had been ever so worried when Camposines fell to the Reds. It really was a miracle that she escaped. The trouble with loving someone however, was that he now had something to lose. He had always been a consummate professional, devoted to and focused on his job, what he's good at, flying fighter planes. And he'd never really been worried by a glorious, patriotic death.\n\t\t*if vidrship = false\n\t\t\t*if abortion = false\n\t\t\t\tBut to die now would leave $!{baby} an orphan. And Gabrielle a widow.\n\t\tTo die now would leave the woman he loves alone. And prevent him from loving her. And that was something he was scared of. But he's alive, still and he's guiding his 109 in to land.\n*goto alba\n*label alba\n*if albadead = true\n\t*goto maria\n*elseif albadead = false\n\t*if gowalt = true\n\t\t*goto alt\n\t*else\n\t\t*goto wood\n*label alt\n*page_break\n2.33 P.M.\n*line_break\n13th August 1938\n*line_break\nNationalist Airbase, 35 KM South-West of the Ebro Front\n*line_break\nGuerrillera Alba Reyes\n\nThe truck eases to a stop at the checkpoint. Alba, Aalto, Goff and the others in the back listen.\n*line_break\n\"Where are you going?\"\n*line_break\n\"We're headed for the Airbase,\" the driver replies, \"There's been reports of guerrilla activity in the area so we're reinforcing their defences\".\n*line_break\nThey hear the guard walking round to the back of the lorry. He looks in. Aalto nods to him. Alba pulls her helmet low over her eyes. If he sees she's a woman then surely the game will be up. But he doesn't. The soldier nods,\n*line_break\n\"Very good, on your way!\"\n*line_break\nThe driver pulls away. They all breathe a sigh of relief. The Nationalist uniforms had worked like a treat. Not far to go now. Alba steels herself. The death of $!{friend} had...\n*fake_choice\n\t#Motivated her.\n\t\tYes, she could do this, she was going to do this. For $!{friend}. They were going to pay for what they did. Alba had lost $!{friend}, she's not going to lose this war as well. She checks over her MP28 yet again. It's working fine, it's ready. She's ready. \n\t#Made her ruthless.\n\t\tAalto had told her she seemed different. And she knew she was. She was colder, harder, more ruthless. The emotions had been so painful that she had started to suppress emotions altogether. She has nothing to lose now, except the war, and she has no intention of losing that. She checks over her MP28 yet again. It's working fine, it's ready. She's ready.\n\t#Hurt her immensely.\n\t\tThe last few months had been painful in the extreme. But she was recovering, slowly. Aalto had been there for her, he was kind and thoughtful but also ruthlessly good at his job. And Alba liked that, she liked being able to focus on something bigger than herself, the war. She checks over her MP28 yet again. It's working fine, it's ready. She's ready.\n*line_break\n\"Ok, one minute,\" Goff tells everyone, \"You all know what you're doing, so do it, quickly and cleanly\".\n*line_break\nEveryone goes about their own personal routines of preparing themselves. Some of them look like they're praying; the ban on religion has been lifted now. Others check over every last piece of their equipment. Alba does nether. She closes her eyes and runs through in her head what her job is. She has to...\n*fake_choice\n\t#Blow up the fuel tank.\n\t\t*set fuel true\n\t#Blow up the planes on the ground.\n\t\t*set planes true\n\t#Blow up the base's ammo dump.\n\t\t*set ammo true\nThey disembark as the lorry arrives in the base. The Messerschimitts are coming in to land, from the look of them from battle, and the ground crew are rushing out to meet them. All focus is on the runway and away from them. There's the guard hut, where no doubt the bored soldiers assigned to patrol the base are sitting around playing cards or some such pastime.\n*choice\n\t#Move past the guard post without arousing suspicion.\n\t\t\"Leave them be, we don't want to raise the alarm\".\n\t\t*line_break\n\t\t\"Good call Alba,\" Aalto replies.\n\t\t*line_break\n\t\t*goto task\n\t#Throw a grenade through the window.\n\t\t\"Let's deal with them...\"\n\t\t*line_break\n\t\tAlba moves up to the side of the hut and gets out a grenade. She pulls the pin and drops it through the window. A couple of seconds later, there's shouting. Then there's the explosion and the shouting stops. Everyone on the airfield looks to see what has happened. \n\t\t*line_break\n\t\t\"Shit, they're on to us, bright idea Alba!\" Aalto scolds.\n\t\t*line_break\n\t\t*set guards true\n\t\t*goto task\n\t#Take the guards hostage. \n\t\tThey burst inside,\n\t\t*line_break\n\t\t\"Alright hands up or you all get it!\"\n\t\t*line_break\n\t\tThey put their hands up. They looked confused, only slowly realising what is happening,\n\t\t*line_break\n\t\t\"Are you a bloody woman?\"\n\t\t*line_break\n\t\t\"Yes, I'm a bloody woman. I'm a bloody woman with a machine gun so if I say shut up, you stay quiet!\"\n\t\t*line_break\n\t\tThey shut up, Alba assigns a couple of men to guard them and they move on.\n\t\t*goto task\n\n*label task\n*if guards = true\n\tSuddenly things are turning nasty as the crew and staff of the airfield find any weapons that are to hand and fight back against the guerrillas. Alba shoots down a mechanic coming at her with a wrench. Quickly, she moves to her objective.\n\t*if fuel = true\n\t\t*page_break\n\t\tShooting several fascists as she goes, Alba makes her way to the huge metal aviation fuel tank. It's about the size of a small house, providing the fuel for all the aircraft on the base. She checks there's no one around before getting to work.\n\n\t\tTaking the explosive from her backpack, she attaches it to the side of the tank and makes sure it's secure. Then she inserts the detonator, winding the timer round,\n\t\t*line_break\n\t\t\"There we are, two minutes,\" she sets it and gathers up her things and begins to sprint off.\n\t\t*line_break\n\t\t\"Freeze!\" comes a voice behind her, \"Stay where you are!\"\n\t\t*line_break\n\t\t\"Oh shit...\" she says under her breath, not turning round. She tightens her grip on her SMG.\n\t\t*page_break\n\t\t*if dlrdead = false\n\t\t\tDe La Rosa walks towards the soldier, pistol drawn,\n\t\t\t*line_break\n\t\t\t\"This area is off limits for Army personnel, you do know that don't you? Or are you with them?\"\n\t\t\t*line_break\n\t\t\tThe soldier doesn't reply. Looking at him, his back turned, he's really rather slight. The shape of his body is almost... De La Rosa takes the safety off his Astra 900,\n\t\t\t*line_break\n\t\t\t\"You are with them aren't you?\" he asks. A tense pause. Neither is sure what to do. Alba can hear the timer on the explosive ticking away...\n\t\t\t*choice\n\t\t\t\t#Alba shoots De La Rosa.\n\t\t\t\t\tSpinning on her heels, Alba brings round her MP28 and opens fire. Reacting quickly, De La Rosa fires his own weapon, the bullet striking Alba in the shoulder. But the SMG is merciless and at such close range, the Squadron Leader doesn't have much of a chance. He goes down as multiple bullets strike his chest. Before he's hit the floor, Alba is up and running.\n\t\t\t\t\t*set dlrdead true\n\t\t\t\t\t*goto albaend\t\n\t\t\t\t#De La Rosa shoots Alba.\n\t\t\t\t\tJose doesn't hesitate, he fires into the woman's back and fires again and a third time. She collapses, crying out in agony.\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Fascist shit!\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tDe La Rosa goes over to look at her. She's young, doesn't even look twenty. She's wearing a baggy Nationalist army uniform. He looks into her eyes. It isn't fear he sees but anger. She spits in his face. Jose recoils, standing up and wiping his face. It's then he hears the ticking.\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"What the...?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tIt doesn't take him long to work it out. He sprints as fast as he can away from the tank. It explodes, throwing him off his feet.\n\t\t\t\t\t*set albadead true\n\t\t\t\t\t*goto maria \n\t\t\t\t#Alba makes a run for it.\n\t\t\t\t\tAlba grabs her pack and throws it at De La Rosa. Before the bag has even hit him, she is up and running for everything she's worth, discarding her heavy helmet. The heavy backpack strikes Jose in the stomach, knocking the wind out of him. He regains his balance and composure and is about to shoot Alba when he hears a ticking. He looks back to the fuel tank.\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"What the...?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tIt doesn't take him long to work it out. He sprints as fast as he can away from the tank. It explodes, throwing him off his feet.\n\t\t\t\t\t*goto albaend\n\t\t*else\n\t\t\tShe looks back. A pilot is coming over to her. For the moment, his pistol pointed at her. As he gets closer the pilot begins to see through Alba's disguise,\n\t\t\t*line_break\n\t\t\t\"You're with them! Don't move!\"\n\t\t\t*line_break\n\t\t\tA tense pause. Neither is sure what to do. Alba can hear the timer on the explosive ticking away...\n\t\t\t*choice\n\t\t\t\t#Alba shoots him.\n\t\t\t\t\tSpinning on her heels, Alba brings round her MP28 and opens fire. Reacting quickly, the fascist fires his own weapon, the bullet striking Alba in the shoulder. But the SMG is merciless and at such close range, the pilot doesn't have much of a chance. He goes down as multiple bullets strike his chest. Before he's hit the floor, Alba is up and running.\n\t\t\t\t\t*set dlrdead true\n\t\t\t\t\t*goto albaend\t\n\t\t\t\t#Alba makes a run for it.\n\t\t\t\t\tAlba grabs her pack and throws it at the fascist. Before the bag has even hit him, she is up and running for everything she's worth, discarding her heavy helmet. The heavy backpack strikes the pilot in the stomach, knocking the wind out of him. He regains his balance and composure and is about to shoot Alba when he hears a ticking. He looks back to the fuel tank.\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"What the...?\"\t\t\t\t\t\n\t\t\t\t\t*goto albaend\n\t*elseif planes = true\n\t\t*page_break\n\t\tShooting several fascists as she goes, Alba makes her way to where the 109s are lined up in a row. She checks there's no one around before getting to work.\n\n\t\tTaking the explosive from her backpack, she attaches it to the side of the plane and makes sure it's secure. Then she inserts the detonator, winding the timer round,\n\t\t*line_break\n\t\t\"There we are, two minutes,\" she sets it and gathers up her things and begins to sprint off. She moves onto the next Messerschmitt and does the same, this time setting the timer for one minute thirty. Then she's onto the third and sets it for one minute.\n\t\t*line_break\n\t\t\"Freeze!\" comes a voice behind her, \"Stay where you are!\"\n\t\t*line_break\n\t\t\"Oh shit...\" she says under her breath, not turning round. She tightens her grip on her SMG.\n\t\t*page_break\n\t\t*if dlrdead = false\n\t\t\tDe La Rosa walks towards the soldier, pistol drawn,\n\t\t\t*line_break\n\t\t\t\"What were you doing to my bird? Are you with them?\"\n\t\t\t*line_break\n\t\t\tThe soldier doesn't reply. Looking at him, his back turned, he's really rather slight. The shape of his body is almost... De La Rosa takes the safety off his Astra 900,\n\t\t\t*line_break\n\t\t\t\"You are with them aren't you?\" he asks. A tense pause. Neither is sure what to do. Alba can hear the timer on the explosive ticking away...\n\t\t\t*choice\n\t\t\t\t#Alba shoots De La Rosa.\n\t\t\t\t\tSpinning on her heels, Alba brings round her MP28 and opens fire. Reacting quickly, De La Rosa fires his own weapon, the bullet striking Alba in the shoulder. But the SMG is merciless and at such close range, the Squadron Leader doesn't have much of a chance. He goes down as multiple bullets strike his chest. Before he's hit the floor, Alba is up and running.\n\t\t\t\t\t*set dlrdead true\n\t\t\t\t\t*goto albaend\t\n\t\t\t\t#De La Rosa shoots Alba.\n\t\t\t\t\tJose doesn't hesitate, he fires into the woman's back and fires again and a third time. She collapses, crying out in agony.\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Fascist shit!\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tDe La Rosa goes over to look at her. She's young, doesn't even look twenty. She's wearing a baggy Nationalist army uniform. He looks into her eyes. It isn't fear he sees but anger. She spits in his face. Jose recoils, standing up and wiping his face. It's then he hears the ticking.\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"What the...?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tIt doesn't take him long to work it out. He sprints as fast as he can away from his plane. It explodes, throwing him off his feet.\n\t\t\t\t\t*set albadead true\n\t\t\t\t\t*goto maria \n\t\t\t\t#Alba makes a run for it.\n\t\t\t\t\tAlba grabs her pack and throws it at De La Rosa. Before the bag has even hit him, she is up and running for everything she's worth, discarding her heavy helmet. The heavy backpack strikes Jose in the stomach, knocking the wind out of him. He regains his balance and composure and is about to shoot Alba when he hears a ticking. He looks back to the fuel tank.\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"What the...?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tIt doesn't take him long to work it out. He sprints as fast as he can away from the plane. It explodes, throwing him off his feet.\n\t\t\t\t\t*goto albaend\n\t\t*else\n\t\t\tShe looks back. A pilot is coming over to her. For the moment, his pistol pointed at her. As he gets closer the pilot begins to see through Alba's disguise,\n\t\t\t*line_break\n\t\t\t\"You're with them! Don't move!\"\n\t\t\t*line_break\n\t\t\tA tense pause. Neither is sure what to do. Alba can hear the timer on the explosive ticking away...\n\t\t\t*choice\n\t\t\t\t#Alba shoots him.\n\t\t\t\t\tSpinning on her heels, Alba brings round her MP28 and opens fire. Reacting quickly, the fascist fires his own weapon, the bullet striking Alba in the shoulder. But the SMG is merciless and at such close range, the pilot doesn't have much of a chance. He goes down as multiple bullets strike his chest. Before he's hit the floor, Alba is up and running.\n\t\t\t\t\t*set dlrdead true\n\t\t\t\t\t*goto albaend\t\n\t\t\t\t#Alba makes a run for it.\n\t\t\t\t\tAlba grabs her pack and throws it at the fascist. Before the bag has even hit him, she is up and running for everything she's worth, discarding her heavy helmet. The heavy backpack strikes the pilot in the stomach, knocking the wind out of him. He regains his balance and composure and is about to shoot Alba when he hears a ticking. He looks back to the plane.\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"What the...?\"\t\t\t\t\t\n\t\t\t\t\t*goto albaend\n\t*else \n\t\t*page_break\n\t\tShooting several fascists as she goes, Alba makes her way to the base's ammo dump. A small warehouse, it's packed to the rafters with bullets and bombs of all shapes and sizes, providing for all the aircraft on the base. She checks there's no one around before getting to work.\n\n\t\tTaking the explosive from her backpack, she attaches it to the side of a box of shells and makes sure it's secure. Then she inserts the detonator, winding the timer round,\n\t\t*line_break\n\t\t\"There we are, two minutes,\" she sets it and gathers up her things and begins to sprint off.\n\t\t*line_break\n\t\t\"Freeze!\" comes a voice behind her, \"Stay where you are!\"\n\t\t*line_break\n\t\t\"Oh shit...\" she says under her breath, not turning round. She tightens her grip on her SMG.\n\t\t*page_break\n\t\t*if dlrdead = false\n\t\t\tDe La Rosa walks towards the soldier pistol drawn,\n\t\t\t*line_break\n\t\t\t\"This area is off limits for Army personnel, you do know that don't you? Or are you with them?\"\n\t\t\t*line_break\n\t\t\tThe soldier doesn't reply. Looking at him, his back turned, he's really rather slight. The shape of his body is almost... De La Rosa takes the safety off his Astra 900,\n\t\t\t*line_break\n\t\t\t\"You are with them aren't you?\" he asks. A tense pause. Neither is sure what to do. Alba can hear the timer on the explosive ticking away...\n\t\t\t*choice\n\t\t\t\t#Alba shoots De La Rosa.\n\t\t\t\t\tSpinning on her heels, Alba brings round her MP28 and opens fire. Reacting quickly, De La Rosa fires his own weapon, the bullet striking Alba in the shoulder. But the SMG is merciless and at such close range, the Squadron Leader doesn't have much of a chance. He goes down as multiple bullets strike his chest. Before he's hit the floor, Alba is up and running.\n\t\t\t\t\t*set dlrdead true\n\t\t\t\t\t*goto albaend\t\n\t\t\t\t#De La Rosa shoots Alba.\n\t\t\t\t\tJose doesn't hesitate, he fires into the woman's back and fires again and a third time. She collapses, crying out in agony.\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Fascist shit!\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tDe La Rosa goes over to look at her. She's young, doesn't even look twenty. She's wearing a baggy Nationalist army uniform. He looks into her eyes. It isn't fear he sees but anger. She spits in his face. Jose recoils, standing up and wiping his face. It's then he hears the ticking.\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"What the...?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tIt doesn't take him long to work it out. He sprints as fast as he can. It explodes, throwing him off his feet.\n\t\t\t\t\t*set albadead true\n\t\t\t\t\t*goto maria \n\t\t\t\t#Alba makes a run for it.\n\t\t\t\t\tAlba grabs her pack and throws it at De La Rosa. Before the bag has even hit him, she is up and running for everything she's worth, discarding her heavy helmet. The heavy backpack strikes Jose in the stomach, knocking the wind out of him. He regains his balance and composure and is about to shoot Alba when he hears a ticking. He looks back to the warehouse.\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"What the...?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tIt doesn't take him long to work it out. He sprints as fast as he can. It explodes, throwing him off his feet.\n\t\t\t\t\t*goto albaend\n\t\t*else\n\t\t\tShe looks back. A pilot is coming over to her. For the moment, his pistol pointed at her. As he gets closer the pilot begins to see through Alba's disguise,\n\t\t\t*line_break\n\t\t\t\"You're with them! Don't move!\"\n\t\t\t*line_break\n\t\t\tA tense pause. Neither is sure what to do. Alba can hear the timer on the explosive ticking away...\n\t\t\t*choice\n\t\t\t\t#Alba shoots him.\n\t\t\t\t\tSpinning on her heels, Alba brings round her MP28 and opens fire. Reacting quickly, the fascist fires his own weapon, the bullet striking Alba in the shoulder. But the SMG is merciless and at such close range, the pilot doesn't have much of a chance. He goes down as multiple bullets strike his chest. Before he's hit the floor, Alba is up and running.\n\t\t\t\t\t*set dlrdead true\n\t\t\t\t\t*goto albaend\t\n\t\t\t\t#Alba makes a run for it.\n\t\t\t\t\tAlba grabs her pack and throws it at the fascist. Before the bag has even hit him, she is up and running for everything she's worth, discarding her heavy helmet. The heavy backpack strikes the pilot in the stomach, knocking the wind out of him. He regains his balance and composure and is about to shoot Alba when he hears a ticking. He looks back to the warehouse.\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"What the...?\"\t\t\t\t\t\n\t\t\t\t\t*goto albaend\n*if guards = false\n\tStill undetected, the team stride confidently across the airfield while everyone else is busy with their own jobs. The 109s are parking up and their pilots are clambering out.\n\t*if fuel = true\n\t\t*page_break\n\t\tAlba makes her way as anonymously as possible to the huge metal aviation fuel tank. It's about the size of a small house, providing the fuel for all the aircraft on the base. She checks there's no one around before getting to work.\n\n\t\tTaking the explosive from her backpack, she attaches it to the side of the tank and makes sure it's secure. Then she inserts the detonator, winding the timer round,\n\t\t*line_break\n\t\t\"There we are, two minutes,\" she sets it and gathers up her things.\n\t\t*line_break\n\t\t\"Excuse me,\" comes a voice behind her, \"Excuse me, what are doing here?\"\n\t\t*line_break\n\t\t\"Oh shit...\" she says under her breath, not turning round, still crouched over her pack. She slowly picks up her SMG.\n\t\t*page_break\n\t\t*if dlrdead = false\n\t\t\tDe La Rosa walks towards the soldier,\n\t\t\t*line_break\n\t\t\t\"This area is off limits for Army personnel, you do know that don't you?\"\n\t\t\t*line_break\n\t\t\tThe soldier doesn't reply. Looking at him, his back turned, he's really rather slight. The shape of his body is almost... De La Rosa moves to take his Astra 900 from its holster,\n\t\t\t*line_break\n\t\t\t\"Don't move!\" he warns. A tense pause. Neither is sure what to do. Alba can hear the timer on the explosive ticking away...\n\t\t\t*choice\n\t\t\t\t#Alba shoots De La Rosa.\n\t\t\t\t\tSpinning on her heels, Alba brings round her MP28 and opens fire. Reacting quickly, De La Rosa fires his own weapon, the bullet striking Alba in the shoulder. But the SMG is merciless and at such close range, the Squadron Leader doesn't have much of a chance. He goes down as multiple bullets strike his chest. Before he's hit the floor, Alba is up and running.\n\t\t\t\t\t*set dlrdead true\n\t\t\t\t\t*goto albaend\t\n\t\t\t\t#De La Rosa shoots Alba.\n\t\t\t\t\tJose doesn't hesitate, he fires into the woman's back and fires again and a third time. She collapses, crying out in agony.\n\t\t
