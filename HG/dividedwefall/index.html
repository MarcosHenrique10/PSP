 La Rosa. Before the bag has even hit him, she is up and running for everything she's worth, discarding her heavy helmet. The heavy backpack strikes Jose in the stomach, knocking the wind out of him. He regains his balance and composure and is about to shoot Alba when he hears a ticking. He looks back to the warehouse.\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"What the...?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tIt doesn't take him long to work it out. He sprints as fast as he can away. Then the explosion and he's thrown off his feet.\n\t\t\t\t\t*goto albaend\n\t\t*else\n\t\t\tShe looks back. A pilot is coming over to her. For the moment, his pistol his in its holster. As he gets closer the pilot begins to see through Alba's disguise,\n\t\t\t*line_break\n\t\t\t\"Wait a second, don't move!\"\n\t\t\t*line_break\n\t\t\tA tense pause. Neither is sure what to do. Alba can hear the timer on the explosive ticking away...\n\t\t\t*choice\n\t\t\t\t#Alba shoots him.\n\t\t\t\t\tSpinning on her heels, Alba brings round her MP28 and opens fire. Reacting quickly, the fascist fires his own weapon, the bullet striking Alba in the shoulder. But the SMG is merciless and at such close range, the pilot doesn't have much of a chance. He goes down as multiple bullets strike his chest. Before he's hit the floor, Alba is up and running.\n\t\t\t\t\t*set dlrdead true\n\t\t\t\t\t*goto albaend\t\n\t\t\t\t#Alba makes a run for it.\n\t\t\t\t\tAlba grabs her pack and throws it at the fascist. Before the bag has even hit him, she is up and running for everything she's worth, discarding her heavy helmet. The heavy backpack strikes the pilot in the stomach, knocking the wind out of him. He regains his balance and composure and is about to shoot Alba when he hears a ticking. He looks back to the warehouse.\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"What the...?\"\t\t\t\t\t\n\t\t\t\t\t*goto albaend\n\n*label albaend\n*if albadead = true\n\t*goto maria\n*page_break\nIn the safety of some nearby woods, the guerrillas observe their day's work. The Airbase is ablaze, fire spreading quickly.\n*if fuel = true\n\tThe explosion the fuel tank had made was enormous. A column of black smoke rises from it high into the sky.\n*if ammo = true\n\tExplosions were still going off in the ammo dump as it burns. A column of black smoke rises from it high into the sky.\n*if planes = true\n\tRow upon row of shiny new 109s are now just smouldering wreckage. The fascists' best planes lie mangled on the ground.\n*line_break\n\"How were casualties?\" Aalto asks.\n*line_break\n*if guards = true\n\t*line_break\n\t\"Pretty light,\" Goff replies, \"These fly boys don't know how to shoot straight\".\n\t*line_break\n\t\"Excellent. A job well done I'd say\".\n*if guards = false\n\t\"We lost about half,\" Goff replies, \"Once the alarm was raised, the guards cut off a whole group of us\".\n\t*line_break\n\t\"Well we got the job done. That's all that really matters\".\n*line_break\n\"It won't make any difference will it though?\" Alba asks, staring blankly at the carnage she's helped create.\n*line_break\n\"What do you mean? Look what we've achieved!\" Aalto retorts.\n*line_break\n\"But it won't make a difference. We'll still lose on the Ebro. And then it'll be over, for all of us,\" she turns to Aalto and Goff, \"But not you two. No, you lot can go back to your America, your land of the free. This has all just been one big game for you hasn't it?\" she's getting angry now, \"And when you lose the game, you can just put it away and get on with your lives. But me? Us? We'll have to live with it! Live in Franco's Spain. Or else live somewhere else, in exile, without a place to call home. You might get your medals Aalto but I won't get anything. And I'll lose everything\".\n*line_break\nGoff is going to say something but Aalto stops him. They say nothing and instead get moving. Alba doesn't look back.\n*goto maria\n*label wood\n*page_break\n2.33 P.M.\n*line_break\n13th August 1938\n*line_break\nMonfrague, Extremadura, 230 KM West of Madrid, behind Nationalist Lines\n*line_break\nGuerrillera Alba Reyes\n\nThere they are. Alba can see them through the trees. A pair of fascist soldiers moving through the trees. They're looking around, alert, scared. Alba steadies herself, her MP28 resting on a fallen log. She steels herself as well. The death of $!{friend} had...\n*fake_choice\n\t#Motivated her.\n\t\tYes, she could do this, she was going to do this. For $!{friend}. They were going to pay for what they did. Alba had lost $!{friend}, she's not going to lose this war as well. She checks over her MP28 yet again. It's working fine, it's ready. She's ready. \n\t#Made her ruthless.\n\t\tAalto had told her she seemed different. And she knew she was. She was colder, harder, more ruthless. The emotions had been so painful that she had started to suppress emotions altogether. She has nothing to lose now, except the war, and she has no intention of losing that. She checks over her MP28 yet again. It's working fine, it's ready. She's ready.\n\t#Hurt her immensely.\n\t\tThe last few months had been painful in the extreme. But she was recovering, slowly. Aalto had been there for her, he was kind and thoughtful but also ruthlessly good at his job. And Alba liked that, she liked being able to focus on something bigger than herself, the war. She checks over her MP28 yet again. It's working fine, it's ready. She's ready.\n*line_break\nThe soldiers keep on walking. They reach a patch where sunlight is streaming through a gap in the trees, dazzling them slightly. Alba squeezes the trigger gently. And then again. Crows in the trees above squawk in protest and fly off en masse. \n\nAlba gets up and moves quickly over to the bodies. She's searching through their pockets. She pulls out a photograph of what must be the young man's wife or girlfriend. Or maybe fiance. It doesn't matter now. Then she finds what she's looking for, extra clips for her SMG. She pockets them and discards of the picture.\n*page_break\n*set militia -5\nWhen she had left Salazar in charge, she had told him to keep a low profile. He'd done the complete opposite and attacked a train line. Unsurprisingly, the fascists hadn't taken too kindly to it and had been hunting them down for weeks now. There's only ${militia} of them left now. \n\nAlba makes her way back up the hill to the sheltered cave where they've been staying for the last few days. They're going to have to move. The fascists will come looking for those men. And the dozen or so they'd killed that morning.\n\nPresently, she arrives.\n*line_break\n\"Where's Salazar?\"\n*line_break\n\"Somewhere in the cave Alba\".\n*line_break\n\"Thanks\".\n*line_break\nShe finds Salazar looking over their limited supplies. He's a shadow of his former self, looking pale and far thinner than he used to. It seems he hasn't coped well with their rather desperate existence over the last few months.\n*line_break\n\"Come on Salazar, why aren't you getting ready, you know we're...\n*choice\n\t#\"Making a run for it\".\n\t\t*set run true\n\t\t\"Yes, yes I know, but just look at it. We've barely got enough food to last a week, virtually no medical supplies and as for ammunition...\"\n\t\t*line_break\n\t\t\"Stop worrying Salazar, we've got more important things to do than worry. Now let's get going!\"\n\t\t*line_break\n\t\tGathering up what's left of the militia and their equipment, they attempt to cover up any evidence they've been here and head up the hill.\n\t\t*goto hill\n\t#\"Booby trapping the cave\".\n\t\t*set trap true\n\t\t\"Yes, yes I know, but just look at it. We've barely got enough food to last a week, virtually no medical supplies and as for ammunition...\"\n\t\t*line_break\n\t\t\"Stop worrying Salazar, we've got more important things to do than worry. Now let's get to work!\"\n\t\t*line_break\n\t\tWith the little explosives they have left, they improvise a trip wire deep inside the cave. If it works, it should trigger explosives to blow the entrance and trap the fascists in there. The only trouble is none of them really know how to use explosives...\n\t\t*goto trap\n\t#\"Setting up an ambush\".\n\t\t*set ambush true\n\t\t\"Yes, yes I know, but just look at it. We've barely got enough food to last a week, virtually no medical supplies and as for ammunition...\"\n\t\t*line_break\n\t\t\"Stop worrying Salazar, we've got more important things to do than worry. Now let's get to work!\"\n\t\t*line_break\n\t\tThey set up their DP28, supplied to them by Aalto and Goff way back in December, on top if the cave, disguised with rocks and shrubbery. It's seen a lot of wear and tear but more importantly, they're down to their last pan of ammunition.\n\t\t*goto ambush\n*label ambush\n*page_break\nEveryone is in position, hidden around the clearing at the entrance to the cave. Salazar has bravely volunteered to position himself further down the slope, to give them warning when the fascists are on their way.\n\nAlba sits as still as she possibly can, keeping her breathing as quiet. Spiders and ants crawl over her. But she doesn't flinch. The birds sing merrily. The sky is bright and blue. A deer crosses the clearing, oblivious to the carnage which is about to unfold. Then they see Salazar further down the hill. He's making signals with his hands...\n*line_break\n\"Thirty plus fascists... Some on horseback... two machine guns... two officers,\" Alba nods to say she has got the message and waves for Salazar to come back. He slowly makes his way up the slope, trying not to disturb any rocks or plants beneath his feet, lest he alert the enemy to their location.\n*line_break\nAlba double checks the machine gun. It's fine. Now they wait, not long now...\n*page_break\nAnd there they are, the horses in the lead, the machine guns slung over the soldiers' backs. They move into the clearing. Alba's heart is pounding against her ribcage, against the forest floor as she lies flat on her front. She's given orders that no one fire until she does. One of the officers tells the men to halt. He points over to the cave. A couple of soldiers set off cautiously towards it.\n\nAlba pulls the trigger and the MG chatters into life. All around the clearing, her men and women do the same. In thirty intense seconds the patrol is wiped out. They didn't even see them. Alba exhales heavily. Other patrols must have heard that. They've got to move.\n*goto hill\n*label trap\n*temp explo\n*rand explo 0 100\n*page_break\nEveryone is in position, hidden around the clearing at the entrance to the cave. Salazar has bravely volunteered to position himself further down the slope, to give them warning when the fascists are on their way.\n\nAlba sits as still as she possibly can, keeping her breathing as quiet. Spiders and ants crawl over her. But she doesn't flinch. The birds sing merrily. The sky is bright and blue. A deer crosses the clearing, oblivious to the carnage which is about to unfold. Then they see Salazar further down the hill. He's making signals with his hands...\n*line_break\n\"Thirty plus fascists... Some on horseback... two machine guns... two officers,\" Alba nods to say she has got the message and waves for Salazar to come back. He slowly makes his way up the slope, trying not to disturb any rocks or plants beneath his feet, lest he alert the enemy to their location.\n*line_break\nNot long now, Alba thinks, tightening her grip on the detonator.\n*page_break\nAnd there they are, the horses in the lead, the machine guns slung over the soldiers' backs. They move into the clearing. Alba's heart is pounding against her ribcage, against the forest floor as she lies flat on her front. She's given orders that no one fire until she does. One of the officers tells the men to halt. He points over to the cave. A couple of soldiers set off cautiously towards it.\n\nThey enter and have a look inside. But two isn't enough. They leave the cave,\n*line_break\n\"There's nothing there Sir\".\n*line_break\n\"Nothing there?\" the officer replies, \"You mustn't be looking hard enough! Ramos, take your men and conduct a thorough search\".\n*line_break\n\"Yes Sir,\" the second officer, who must be Ramos, replies. He takes about half the soldiers in with him. Now is the moment. Alba presses the detonator...\n*page_break\n*if explo \u003c50\n\tAnd nothing happens.\n\t*line_break\n\t\"Shit,\" she curses under her breath.\n\t*line_break\n\tTime for plan B. She slides forward, as quietly as she possibly can and pulls out a grenade from her pack. Well placed, this should set off the charges. She moves to just above the cave entrance, pulls the pin and drops it down. \n\n\tBoom! It works a treat, the front section caves in and half the soldiers are trapped. Meanwhile, the rest of the militia are under orders to open fire as soon as the explosives go off, and they do so, firing on the other half of the patrol still standing in the clearing. \n\n\tIn twenty intense seconds the patrol is wiped out. They didn't even see them. Alba exhales heavily. Other patrols must have heard that. They've got to move.\n*if explo >49\n\tBoom! It works a treat, the front section caves in and half the soldiers are trapped. Meanwhile, the rest of the militia are under orders to open fire as soon as the explosives go off, and they do so, firing on the other half of the patrol still standing in the clearing. \n\n\tIn twenty intense seconds the patrol is wiped out. They didn't even see them. Alba exhales heavily. Other patrols must have heard that. They've got to move.\n*goto hill\n*label hill\n*page_break\nThey make their way to the summit of the wooded hill and look out across the summer's afternoon. From this vantage point, it's clear the whole forest is crawling with fascists looking for them. They seem to be converging on the hill, although so far it appears they haven't located the guerrillas yet. They're running out of time and options.\n*choice\n\t#Stand and fight.\n\t\t\"We'll make our stand here\".\n\t\t*line_break\n\t\t\"But, we could still get away Alba!\" Salazar protests, \"If we go West we could slip between them\".\n\t\t*line_break\n\t\t\"And then what? We'll just go through the whole process again, running and running until we lose this war\".\n\t\t*line_break\n\t\t\"The war's lost anyway Alba!\"\n\t\t*line_break\n\t\t\"Well then, we've no time to waste if we want to die for the cause\".\n\t\t*line_break\n\t\tReluctantly, Salazar agrees. They set up the DP28. Just half a pan of ammo left. They set up makeshift defences with rocks and logs. And then they wait.\n\t\t*page_break\n\t\tHere they come. Another patrol, moving up the hillside, right at them. Alba waits until they're close, very close. And then she opens up with the DP, firing in short, controlled bursts to save ammunition. She racks up the kills, one, two, three, four, five. The fascists are running for cover now. \n\n\t\tBut there's more than she thought. A group make a dash up on her left. She swings the weapon around and cuts them down. Bullets are now zipping over her head and hitting the ground in front of her. She brings the MG back to face the main group of enemies, pushing up the centre of the hill. The machine gun fire has them sheltering behind rocks and trees.\n\n\t\tThen 'click'. The DP is empty. She pushes it to one side and grabs her MP28. She's got three clips.\n\t\t*page_break\n\t\tHalf an hour later and the SMG is finished as well. In fact all of them are running out of ammo. The hillside is crawling with fascists now, any possibility of escape is gone.\n\t\t*line_break\n\t\t\"It's over Alba!\" Salazar moans, \"We're never getting out of here\".\n\t\t*line_break\n\t\t\"Here,\" Alba says, ignoring Salazar's negativity, passing her grenades round, \"Roll them down the hill\".\n\t\t*line_break\n\t\tThe explosions have the fascists running in panic. Trees splinter, sending razor-sharp shards of bark flying. The enemy are running for cover. \n\t\t*line_break\n\t\t\"Ok, everyone get down!\" she orders.\n\t\t*line_break\n\t\t\"Why?\" Salazar asks.\n\t\t*line_break\n\t\t\"We make them think we've done a runner, now shut up!\"\n\t\t*line_break\n\t\tAs the dust settles from the grenades, the firing slowly dies down. The fascists realise no one's firing back at them. Cautiously, tentatively, the Nationalists move up the hill to where the guerrillas are hiding. Alba holds her breath. She takes her Astra 400 pistol, checking the clip. Eight rounds, then that's it.\n\t\t*page_break\n\t\t\"They've gone Sir! They must have made a run for it!\" are the last words of a fascist private as Alba sits up and shoots him in the back. The rest of the militia do the same, emptying what's left of their ammo on the mass of soldiers in the open on the slope. Alba clambers out of their makeshift position and strides down the hillside, knowing what is coming and accepting it. \n\n\t\tA soldier comes out from behind a tree, she shoots him with the Astra. Then there's a couple huddling behind a rock, two more rounds gone. And then there's an officer, pointing at shouting, if she can get him, she'll be happy. She raises her pistol and takes it in two hands. For a moment her eyes meet those of the fascist. She pulls the trigger.\n\t\t*set albadead true\n\t\t*goto maria\n\t#Keep on running.\n\t\t\"Come on, there's no time to lose, we've got to keep moving!\"\n\t\t*line_break\n\t\tThey make their way through the forest, heading West, hopefully away from the fascists. As she runs between the trees, she hears a shot ring out. \n\n\t\tAlba feels it, like someone punching her in the thigh as hard as they can, but so much worse. She falls to the ground. Her comrades shoot the lone soldier. She looks at her leg. It's bleeding heavily. She's sure she won't be able to stand. Her comrades come over. Alba...\n\t\t*choice\n\t\t\t#To leave her, she'll only hold them back.\n\t\t\t\t*if militia >19\n\t\t\t\t\t*achieve lifesaver\n\t\t\t\t\"No, leave me here, I'll just be a hindrance!\"\n\t\t\t\t*line_break\n\t\t\t\t\"Come on Alba,\" Salazar protests, \"We can't leave you!\"\n\t\t\t\t*line_break\n\t\t\t\t\"You must, if you try and take me, we'll all die. Better it just be me\".\n\t\t\t\t*line_break\n\t\t\t\t\"Are you sure?\"\n\t\t\t\t*line_break\n\t\t\t\t\"Yes I'm sure! Don't let me change my mind! Here, have this,\" she hands them her MP28, \"It's a good gun. You'll need it\".\n\t\t\t\t*line_break\n\t\t\t\tSalazar thanks her. He has tears in his eyes. She's never seen him like that. And then they're gone and Alba is all alone.\n\t\t\t\t*page_break\n\t\t\t\tShe concentrates on not losing consciousness. She doesn't know how long it's been but the firing on the top of the hill has stopped now and she's lost a lot of blood. But she's strong. She checks over her Astra 400 pistol again. Eight rounds, that's all. She's going to make them count.\n\n\t\t\t\tHere they come, she can make out a group of soldiers following the trail the militia has left. They're coming towards her. Her vision is beginning to blur at the edges but she focuses. Don't die now. Not just yet. She raises the pistol and fires at the officer at the front of them. He goes down, the fascists scatter.\n\n\t\t\t\tShe fires again and a third time. Then she spots a soldier behind a tree. Steadying her shaking arm, she fires, hitting the tree. She curses and tries again, this time missing completely. This time she concentrates hard and waits for the fascist to present a bigger target. As he moves out of cover, she pulls the trigger and he goes down.\n\n\t\t\t\tOne round left now and she has no doubt what she's going to do with it. She breathes out deeply, listening to her own thumping heart. She puts the Astra in her mouth and closes her eyes.\n\t\t\t\t*set albadead true\n\t\t\t\t*goto maria\n\t\t\t#To pick her up and carry her.\n\t\t\t\t\"Come on help me!\"\n\t\t\t\t*line_break\n\t\t\t\tSalazar and another of her comrades hoist her up, one supporting each arm and Alba, with their help hops with her good leg. They are still making good progress, at least she hopes they are. The sound of the firing up on the hill has stopped now. She concentrates on not losing consciousness. She's lost a lot of blood but she knows she's strong. She's not going to give up, not just yet.\n\t\t\t\t\n\t\t\t\tBehind them, they can hear the pounding of hoofs. Oh no, Alba thinks, they've no chance of outrunning cavalry. Salazar is looking over his shoulder, eyes wide with fear. The sound of the horses is getting louder and louder. They're almost upon them. Alba closes her eyes and waits for what she knows is inevitable.\n\t\t\t\t*set albadead true \n\t\t\t\t*goto maria \n\n\t#Alba asks Salazar and a few men to hold them here while the rest escape.\n\t\t\"Salazar, if we're to have a chance of making it out of here, some of us are going to have to stay here and buy us some time\".\n\t\t*line_break\n\t\t\"You mean...\" Salazar swallows, \"You mean you want me to stay and you to go?\"\n\t\t*line_break\n\t\t\"Don't say it like that, I...\"\n\t\t*line_break\n\t\t\"No, it's fine. We'll hold here for as long as we can, you go while you still can\".\n\t\t*line_break\n\t\t\"Thank you Salazar,\" she embraces him, \"Honestly, thank you. Here, have the DP. And give them hell for me!\"\n\t\t*line_break\n\t\tSalazar has tears in his eyes, Alba's never seen him like this. He raises his fist in salute. Alba returns the gesture and then dashes off into the trees with the rest of them.\n\t\t*page_break\n\t\tAs they make their way through the forest, the sound of battle can be heard behind them. They stop for a moment to listen, trying to deduce how Salazar is doing. Then there's a shot much closer.\n\n\t\tAlba feels it, like someone punching her in the thigh as hard as they can, but so much worse. She falls to the ground. Her comrades shoot the lone soldier. She looks at her leg. It's bleeding heavily. She's sure she won't be able to stand. Her comrades come over. Alba...\n\t\t*choice\n\t\t\t#To leave her, she'll only hold them back.\n\t\t\t\t*if militia >19\n\t\t\t\t\t*achieve lifesaver\n\t\t\t\t\"No, leave me here, I'll just be a hindrance!\"\n\t\t\t\t*line_break\n\t\t\t\t\"Come on Alba, we can't leave you!\"\n\t\t\t\t*line_break\n\t\t\t\t\"You must, if you try and take me, we'll all die. Better it just be me\".\n\t\t\t\t*line_break\n\t\t\t\t\"Ok...\"\n\t\t\t\t*line_break\n\t\t\t\t\"Here, have this,\" she hands them her MP28, \"It's a good gun. You'll need it\".\n\t\t\t\t*line_break\n\t\t\t\tAnd then they're gone and Alba is all alone.\n\t\t\t\t*page_break\n\t\t\t\tShe concentrates on not losing consciousness. She doesn't know how long it's been but the firing on the top of the hill has stopped now and she's lost a lot of blood. But she's strong. She checks over her Astra 400 pistol again. Eight rounds, that's all. She's going to make them count.\n\n\t\t\t\tHere they come, she can make out a group of soldiers following the trail the militia has left. They're coming towards her. Her vision is beginning to blur at the edges but she focuses. Don't die now. Not just yet. She raises the pistol and fires at the officer at the front of them. He goes down, the fascists scatter.\n\n\t\t\t\tShe fires again and a third time. Then she spots a soldier behind a tree. Steadying her shaking arm, she fires, hitting the tree. She curses and tries again, this time missing completely. This time she concentrates hard and waits for the fascist to present a bigger target. As he moves out of cover, she pulls the trigger and he goes down.\n\n\t\t\t\tOne round left now and she has no doubt what she's going to do with it. She breathes out deeply, listening to her own thumping heart. She puts the Astra in her mouth and closes her eyes.\n\t\t\t\t*set albadead true\n\t\t\t\t*goto maria\n\t\t\t#To pick her up and carry her.\n\t\t\t\t*if militia >19\n\t\t\t\t\t*achieve lifesaver\n\t\t\t\t\"Come on help me!\"\n\t\t\t\t*line_break\n\t\t\t\tTwo of her comrades hoist her up, one supporting each arm and Alba, with their help hops with her good leg. They are still making good progress, at least she hopes they are. The sound of the firing up on the hill has stopped now. She concentrates on not losing consciousness. She's lost a lot of blood but she knows she's strong. She's not going to give up, not just yet.\n\t\t\t\t*goto maria \n\t#Alba volunteers to stay here to buy time for the others to get away.\n\t\t*if militia >19\n\t\t\t*achieve lifesaver\n\t\t\"Alba you can't, we can still all...\"\n\t\t*line_break\n\t\t\"Don't bother trying to persuade me otherwise!\" Alba interrupts, \"My mind's made up. Now go!\"\n\t\t*line_break\n\t\tThey move off into the trees. Salazar looks back,\n\t\t*line_break\n\t\t\"Thank you Alba...\"\n\t\t*line_break\n\t\t\"Go or you'll miss your chance!\"\n\t\t*line_break\n\t\tAnd they're gone. Alba is all alone on the hilltop. She sets up the DP28, just half a pan of ammo left now. She puts her MP28 and her remaining grenades to her left and right in easy reach. The she protects her position with a log and a few rocks. And then she waits.\n\t\t*page_break\n\t\tHere they come. Another patrol, moving up the hillside, right at her. Alba waits until they're close, very close. And then she opens up with the DP, firing in short, controlled bursts to save ammunition. She racks up the kills, one, two, three, four, five. The fascists are running for cover now. \n\n\t\tBut there's more than she thought. A group make a dash up on her left. She swings the weapon around and cuts them down. Bullets are now zipping over her head and hitting the ground in front of her. She brings the MG back to face the main group of enemies, pushing up the centre of the hill. The machine gun fire has them sheltering behind rocks and trees.\n\n\t\tThen 'click'. The DP is empty. She pushes it to one side and grabs her MP28. She's got three clips.\n\t\t*page_break\n\t\tTen minutes later and the SMG is finished as well. There's now dozens of fascists advancing cautiously up the slope. She's managed to take a good number of them. But there's too many. She picks up the grenades and rolls then down the hill, one by one. The explosions have the fascists running in panic. Trees splinter, sending razor-sharp shards of bark flying. \n\n\t\tThat's then used up. All that's left is her pistol, an Astra 400. She checks the clip. Eight rounds. And then that's it. The fascists are still recovering from the grenades. She stands up and strides forward confidently, knowing what is coming and accepting it. Or at least suppressing the more obvious emotion to feel right now, which wouldn't be helpful. \n\n\t\tA soldier comes out from behind a tree, she shoots him with the Astra. Then there's a couple huddling behind a rock, two more rounds gone. And then there's an officer, pointing and shouting, if she can get him, she'll be happy. She raises her pistol and takes it in two hands. For a moment her eyes meet those of the fascist. She pulls the trigger.\n\t\t*set albadead true\n\t\t*goto maria\n*label maria\n*if mariadead = true\n\t*goto morales\n*else\n\t*if murderer = true\n\t\t*goto court\n\t*else\n\t\t*goto rephos\n*label rephos\n*page_break\n6.19 P.M.\n*line_break\n14th November 1938\n*line_break\nRepublican Hospital, Mora de Ebro, Catalonia\n*line_break\nSister Maria Farfan\n\nIt's raining hard outside and the sky is black. The rain drops are throwing themselves at the windows without success. Inside, the scene was not much prettier. The hospital was like an abattoir. Blood and the smell of blood was everywhere. At first Maria had found herself slipping with alarming regularity. She'd got used to it now.\n\nUpon being taken back to Republican lines, the authorities hadn't really known what to do with her. And then the casualties had started to come in as the Reds' attack on Gandesa went horribly wrong and she'd been pressed into their medical service. At first it had only been a temporary arrangement but the casualties had kept coming and coming. Thousands of them, more than she'd ever seen while working for the Nationalists. And the authorities had simply forgotten about her. The other nurses didn't talk to her even after all this time. She wasn't trusted or accepted. But she was alive. On the whole, she'd found it...\n*fake_choice\n\t#Hellish.\n\t\tThe numbers that they'd had to deal with were extreme. The Reds' medical system seems to be woefully under-equipped and understaffed. Furthermore, they'd given Maria all the horrible work, changing the bed pans, washing the soldiers who weren't able to themselves. She had hated every minute of it.\n\t#Challenging.\n\t\tIt had been a difficult few months, without doubt. The Reds seem to be short on medical supplies and staff, making her job even harder. And for the most part she'd been assigned the work no one else wanted, changing the bed pans, washing the soldiers who weren't able to themselves. She had not enjoyed it to say the least.\n\t#Tolerable. \n\t\tOk, so the Reds were short on everything from morphine to nurses but it hadn't been so bad. She was often given the dirty jobs, like changing the bed pans and washing the soldiers who weren't able to themselves. But they were unpleasant rather than demanding tasks. She had managed to get by and that was the most important thing.\n*if dlrship = true\n\t*set preg true\n\tAnd then there was her secret as well. It had transpired fairly early on that there had been unintended consequences of $!{man}'s visit to her a few days before she'd been captured, that July week where everything had been so perfect. She was now four months pregnant.\n\t*if raped = true\n\t\tOf course as soon as she had realised, a terrible thought had entered her head. That Red who had raped her. It was only a few days after. It would be impossible to know whose the child was. That had depressed her greatly to the point where she had considered aborting the child. But she couldn't, not when there was a chance it was $!{man}'s.\n*if dlrship = false\n\t*if raped = true\n\t\t*set preg true\n\t\tAnd then there was her secret as well. It had transpired fairly early on that there had been unintended consequences of that horrendous July morning where the Red Captain had cornered her. She was four months pregnant. The memories of that day still haunted at night. She had intended to have the baby aborted, but it was impossible in her current situation, there was no one she could ask.\n*if preg = true\n\t*line_break\n\t*line_break\n\tShe had been able to hide her so far modest bump fairly well, having stolen a larger sized uniform from the store cupboard one night. She is pretty confident no one knows yet. But that doesn't really help her. It may not matter here in the Republican zone, but if and when (it's surely when) the Nationalists are back, she'll need to be married before it becomes obvious she'd pregnant. Otherwise she'll be completely disgraced.\n*page_break\nPresently, she is attending to a young officer, with minor burns across the top half of his body, including his face. To say 'young officer' would be an understatement Maria thinks, he looks about sixteen. He looks up at Maria.\n*line_break\n\"How do I look?\"\n*if marbrutal >49\n\t*line_break\n\t\"Fine, this should clear up nicely,\" she lies, dabbing the wound with a damp cloth, \"You'll have a nice war wound to show the ladies\".\n\t*line_break\n\t\"But I thought you said it'll clear up?\"\n\t*line_break\n*if marbrutal \u003c50\n\t*line_break\n\t\"Terrible, you'll probably scare children for the rest of your life\".\n\t*line_break\n\t\"What?\"\n\t*line_break\n\"How old are you?\" she asks, changing the subject.\n*line_break\n\"I'll be seventeen next month\".\n*line_break\nMaria is genuinely taken aback,\n*line_break\n\"God the Reds are getting desperate...\"\n*page_break\n\"Blanco,\" the boys says.\n*line_break\n\"Sorry?\"\n*line_break\n\"My name is Blanco,\" says Blanco, \"And I've got a favour to ask\".\n*line_break\n\"I know what you're thinking and I can tell you the answer's no\".\n*line_break\n\"No, it's not [i]that[/i]. I'm due to go back tomorrow. They're sending the ones with minor wounds back to the front, that's how desperate we are. But I...\"\n*line_break\n\"Go on, you can trust me\".\n*line_break\n\"I can't go back. I just can't. You don't know what it's like!\" he looks around, then lowers his voice, \"I need you to make it worse,\" he points to his burns, \"Just so I'm kept here for a few more weeks and then the war will probably be over anyway\".\n*line_break\nMaria considers this proposal. She could potentially both help this boy and help the Nationalists by keeping a Red soldier away from the front. On the other hand, if she were caught, God only knows what would happen to her. And she had taken the Hippocratic Oath, swearing to \"do no harm\". Maria decides to...\n*choice\n\t#Make the wound slightly worse.\n\t\t\"Ok, I'll do it\".\n\t\t*line_break\n\t\t\"Thank you!\" he whispers, grinning from ear to ear.\n\t\t*line_break\n\t\tMaria sneaks off to the medical supplies cupboard. She roots around for something that could aggravate the burns. She finds a bottle of ethanol, normally used for cleaning medical instruments. This'll do nicely.\n\t\t\n\t\tMaking sure the coast is clear, she returns to Blanco with the bottle tucked under her arm. \n\t\t*line_break\n\t\t\"Now this is going to hurt, so bite on this,\" she gives him a piece of wood to bite down on, \"Whatever you do, don't scream\".\n\t\t*line_break\n\t\tBlanco nods nervously. Maria fills a pipette with ethanol and begins dropping it onto the open wound. He writhes and moans.\n\t\t*line_break\n\t\t\"Shh!\" Maria reminds him. He does his best to keep quiet. Once she's finished, with the burns looking very raw indeed, she reapplies the dressing.\n\t\t*line_break\n\t\t\"There you are, you'll be here for another week at least\".\n\t\t*line_break\n\t\t\"Th.. thanks I guess...\"\n\t\t*goto morning \n\n\t#Make the would much worse.\n\t\t*set marbrutal -5\n\t\t*set burns true\n\t\tOk, I'll do it\".\n\t\t*line_break\n\t\t\"Thank you!\" he whispers, grinning from ear to ear.\n\t\t*line_break\n\t\tMaria sneaks off to the medical supplies cupboard. She roots around for something that could aggravate the burns. She finds a bottle of ethanol, normally used for cleaning medical instruments. This'll do nicely.\n\t\t\n\t\tMaking sure the coast is clear, she returns to Blanco with the bottle tucked under her arm. \n\t\t*line_break\n\t\t\"Now this is going to hurt, so bite on this,\" she gives him a piece of wood to bite down on, \"Whatever you do, don't scream\".\n\t\t*line_break\n\t\tBlanco nods nervously. Maria puts her thumb over the end of the bottle, leaving a gap for it to drip out. She proceeds to pour it all over Blanco's burns.\n\t\t*line_break\n\t\t\"Fucking hell!\" he protests, writhing in agony, \"What are you doing to me!\"\n\t\t*if marbrutal \u003c50\n\t\t\t*line_break\n\t\t\tMaria can't help herself but feel a slight twang of pleasure at getting back at the enemy in this way.\n\t\t*if marbrutal >49\n\t\t\t*line_break\n\t\t\t\"Sorry, just stay quiet all right?\"\n\t\t*line_break\n\t\t\"What do you think you're doing?\" comes a voice from behind Maria. It's one of the Red nurses, Gil, standing in the doorway. She realises what is happening and runs off.\n\t\t*line_break\n\t\t\"No wait!\" Maria gives chase, dropping the bottle on Blanco. She catches up with the nurse in the corridor. Maria...\n\t\t*choice\n\t\t\t#Tells her that Blanco wanted it done.\n\t\t\t\t\"Please, he asked me to do it, alright?\"\n\t\t\t\t*line_break\n\t\t\t\t\"And if he asked you to walk into the Ebro would you do it?\"\n\t\t\t\t*line_break\n\t\t\t\t\"Look, I'm sorry,\" Maria is desperate, \"But please, don't tell the Head Nurse. Please!\"\n\t\t\t\t*line_break\n\t\t\t\tGil smirks,\n\t\t\t\t*line_break\n\t\t\t\t\"Of course I'm going to tell the Head Nurse, what do you take me for Farfan? I hope they send you off to a prison camp!\"\n\t\t\t\t*line_break\n\t\t\t\tMaria protests in vain. The Red bitch won't change her mind. Maria hides herself away in her quarters. She's informed she has a disciplinary hearing with the Head Nurse the following morning.\n\t\t\t\t*set dis true\n\t\t\t\t*goto morning\n\t\t\t#Threatens her not to tell anyone or else.\n\t\t\t\t\"Don't you dare tell the Head Nurse or I'll...\"\n\t\t\t\t*line_break\n\t\t\t\t\"You'll what exactly? I'm sorry Farfan but I'm telling the Head Nurse no matter what you say, you don't frighten me\".\n\t\t\t\tMaria...\n\t\t\t\t*choice\n\t\t\t\t\t#Tells her that Blanco wanted it done.\n\t\t\t\t\t\t\"Please, he asked me to do it, alright?\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"And if he asked you to walk into the Ebro would you do it?\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Look, I'm sorry,\" Maria is desperate, \"But please, don't tell the Head Nurse. Please!\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tGil smirks,\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"I'll do nothing of the sort. I hope they send you off to a prison camp!\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tMaria protests in vain. The Red bitch won't change her mind. Maria hides herself away in her quarters. She's informed she has a disciplinary hearing with the Head Nurse the following morning.\n\t\t\t\t\t\t*set dis true\n\t\t\t\t\t\t*goto morning\n\t\t\t\t\t#Kills her to make sure she doesn't tell.\n\t\t\t\t\t\t*set marbrutal -10\n\t\t\t\t\t\tMaria had stolen a scalpel in her first days in the hospital and kept it on her person ever since. \n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Look Gil, I was just...\" she looks at the ground, tightening her grip on the blade.\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"You were what?\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tMaria grabs Gil and brings the scalpel across the Red nurse's neck. She looks very shocked. It's messy, but then the hospital is. A little more blood in the corridor will probably go unnoticed. Maria lowers Gil onto a trolley and quickly takes her outside. Fortunately it's a quiet time of day and the night is drawing in. She dumps the body in the Ebro and watches it slowly float away.\n\t\t\t\t\t\t*if marbrutal \u003c49\n\t\t\t\t\t\t\tThe Red got what she deserved.\n\t\t\t\t\t\t*if marbrutal >50\n\t\t\t\t\t\t\tMaria wipes a tear from her eye. She struggles to comprehend what she'd just done. She's covered in another woman's blood.\n\t\t\t\t\t\t*set mis true\n\t\t\t\t\t\t*goto morning \t\n\t\t\t#Kills her to make sure she doesn't tell.\n\t\t\t\t*set marbrutal -10\n\t\t\t\tMaria had stolen a scalpel in her first days in the hospital and kept it on her person ever since. \n\t\t\t\t*line_break\n\t\t\t\t\"Look Gil, I was just...\" she looks at the ground, tightening her grip on the blade.\n\t\t\t\t*line_break\n\t\t\t\t\"You were what?\"\n\t\t\t\t*line_break\n\t\t\t\tMaria grabs Gil and brings the scalpel across the Red nurse's neck. She looks very shocked. It's messy, but then the hospital is. A little more blood in the corridor will probably go unnoticed. Maria lowers Gil onto a trolley and quickly takes her outside. Fortunately it's a quiet time of day and the night is drawing in. She dumps the body in the Ebro and watches it slowly float away.\n\t\t\t\t*if marbrutal \u003c49\n\t\t\t\t\tThe Red got what she deserved.\n\t\t\t\t*if marbrutal >50\n\t\t\t\t\tMaria wipes a tear from her eye. She struggles to comprehend what she'd just done. She's covered in another woman's blood.\n\t\t\t\t*set mis true\n\t\t\t\t*goto morning \n\t#Refuse to do it.\n\t\t*set marbrutal +5\n\t\t\"No, I can't do that, sorry\".\n\t\t*line_break\n\t\t\"What, no please, I'll do anything!\"\n\t\t*line_break\n\t\t\"Don't you know what no means? Have you never heard of the Hippocratic Oath? I'm not going to do it, end of story!\"\n\t\t*line_break\n\t\tShe walks off, leaving Blanco rather disappointed and dreading his return to the front.\n\t\t*goto morning\n*label morning\n*page_break\nThe next morning, Maria wakes up with a certain sense of Deja Vu. There is chaos and panic all around. The Nationalists are closing in and the whole hospital is being evacuated to the other side of the Ebro. Maria can't help but take a certain satisfaction from the mayhem around her. The Reds were getting a taste of their own medicine now.\n*line_break\n\"We're leaving, all medical staff to the front courtyard, board the trucks!\"\n*line_break\n*if dis = true\n\tAll thoughts of a certain disciplinary hearing have gone out the window.\n*if mis = true\n\tAny concerns about a missing nurse have been forgotten in the rush to get away.\n\nEveryone's leaving now. In the confusion, she could quite easily slip away, Maria thinks to herself. No one's going to lose any sleep about leaving her behind...\n*choice\n\t#Maria goes with them.\n\t\tShe dutifully climbs into the lorry and sits with the other nurses. They give her odd looks. What's wrong, Maria wonders. Was she not meant to be here or something?\n\t\t\n\t\tA gruff looking Republican officer comes round to the back of the truck.\n\t\t*line_break\n\t\t\"Senorita Farfan?\" he asks.\n\t\t*line_break\n\t\t\"Yes,\" Maria puts her hand up, \"That's me\".\n\t\t*line_break\n\t\t\"If you'd just like to come with me Senorita,\" the officer says, putting his leather gloves on. He leads her round to the back of the hospital. Then he takes his sidearm out of its holster and points it at Maria's head.\n\t\t*line_break\n\t\t\"What are you doing?\" she screams.\n\t\t*line_break\n\t\t\"I'm sorry Senorita, but we're not taking any prisoners back with us to the other side of the river. We just can't afford to feed you anymore\".\n\t\t*line_break\n\t\tHe's so matter of fact, Maria thinks to herself, about killing someone. Then again, he is a soldier. But this is so unfair. She's not done anything wrong. And she could have got away so easily. It could have all been so different.\n\t\t*if dlrship = true\n\t\t\tShe thinks about $!{man}. Thinking about him makes her cry.\n\t\t*if preg = true\n\t\t\tWhat about the baby. The poor unborn baby in her belly, punished for no fault of its own.\n\t\tMaria shuts her eyes and whispers,\n\t\t*line_break\n\t\t\"Viva Espana\".\n\t\t*set mariadead true\n\t\t*goto morales\n\t#Maria says she's staying with the patients.\n\t\tShe finds the Head Nurse, scuttling to one of the waiting lorries. \n\t\t*line_break\n\t\t\"Ma'am, I'm going to stay here with the wounded who can't be moved\".\n\t\t*line_break\n\t\tThe Nurse looks at her, as if not comprehending what she has said,\n\t\t*line_break\n\t\t\"Yes, yes, right, very good,\" she scuttles off again. Maria decides to take that as a yes.\n\n\t\tShe goes back inside and watches as the staff and patients fit enough to walk are loaded into the trucks. A gruff looking Republican officer goes from lorry to lorry asking questions of those inside. Everyone he asks shakes their head. He seems to give up and jumps in the cab of the last truck. And then they leave. \n\n\t\tAfter the pandemonium of the morning, everything is suddenly very still and quiet. She looks out the window and waits for the Nationalists to arrive. It's going to be alright. Franco has prevailed and she's going to be alright.\n\t\t*if dlrship = true\n\t\t\tShe'll see $!{man} soon.\n\t\t\t*if preg = true\n\t\t\t\tShe'll tell him he's to be a father.\n\t\t\t\t*achieve father\n\t\tIt's all going to be alright.\n\t\t*goto morales \n\t#Maria quietly slips away.\n\t\tIt isn't hard amidst the disarray and disorder to quietly take a back exit and just walk away. She hides in some bushes outside the hospital and waits. She watches as the staff and patients fit enough to walk are loaded into the trucks. A gruff looking Republican officer goes from lorry to lorry asking questions of those inside. Everyone he asks shakes their head. He seems to give up and jumps in the cab of the last truck. And then they leave. \n\n\t\tAfter the pandemonium of the morning, everything is suddenly very still and quiet. She looks out the window and waits for the Nationalists to arrive. It's going to be alright. Franco has prevailed and she's going to be alright.\n\t\t*if dlrship = true\n\t\t\tShe'll see $!{man} soon.\n\t\t\t*if preg = true\n\t\t\t\tShe'll tell him he's to be a father.\n\t\t\t\t*achieve father\n\t\tIt's all going to be alright.\n\t\t*goto morales \t\n*label court\n*page_break\n9.19 A.M.\n*line_break\n14th November 1938\n*line_break\nWomen's Prison, Barcelona, Catalonia\n*line_break\nPrisoner Number 1473 (M. Farfan)\n\nOut of the barred window, Maria watched the rain lashing down. The sky is almost black. The bare, damp interior of her cell wasn't much more inviting. She sits on her bed, says a short prayer and kisses her crucifix.\n\nThe last few months had been barely tolerable. Maria had found daily life in the prison a struggle. She had occupied her time by...\n*fake_choice\n\t#Reading.\n\t\tThe prison's library (if you could call it that) did have a few tattered books which she had rapidly devoured. She was now on her third reading of an aged translation of Jane Austen's Emma. The nineteenth-century rural idyll gave her an escape from her twentieth-century hell.\n\t#Writing.\n\t\tShe had been granted a pencil and paper and had filled her days quietly writing away in her room. At first she had kept a diary but not much really happened and so it had become an increasingly fanciful tale about a young girl escaping from a prison and being reunited with her beloved.\n\t#Praying.\n\t\tIncreasingly she had devoted her time to God. Alone in her cell she'd found solace in prayer. She hadn't been allowed a bible at first but the ban on religion in the Republic had been lifted and now she had one.\n*if vidrship = false\n\t*if abortion = true\n\t\tWas this her punishment for persuading Gabrielle to do what she had done? If only she had access to a priest to confess. \n*if dlrship = true\n\t*set preg true\n\tAnd then there was her secret as well. It had transpired fairly early on that there had been unintended consequences of $!{man}'s visit to her a few days before she'd been captured, that July week where everything had been so perfect. She was now four months pregnant.\n*if preg = true\n\t*line_break\n\t*line_break\n\tShe had been able to hide her so far modest bump fairly well, having stolen a larger sized prison uniform from the store cupboard one evening. She is pretty confident no one knows yet. But that doesn't really help her. It may not matter here in the Republican zone, but if and when the Nationalists are back, she'll need to be married before it becomes obvious she'd pregnant. Otherwise she'll be completely disgraced. But it's a big if. She has no idea how the war is going and although Barcelona is bombed by the Nationalists most days, she has no access to news from the front.\n\nAll she hears of the war is the whispers of the prison wardens. More and more, Maria has heard 'hold', 'defence' and 'withdrawal' in the conversations she has overheard. That can only be a good thing.\n*if preg = true\n\t*line_break\n\t*line_break\n\tBut even so, she had faced a terrible dilemma. She had to decide whether to gamble with her own future by trusting that the Nationalists would take Barcelona and save her before too long. Or else, do the unthinkable. Maria had decided to...\n\t*fake_choice\n\t\t#Abort the baby.\n\t\t\tEight weeks into her time in gaol and despairing, she had thrown herself down the stairs in the hope of inducing a miscarriage. But it hadn't worked and only earned Maria cuts, bruises and a fractured wrist. Instead, a few days later, she'd pinched a wire coat hanger from one of wardens' locker room. \n\n\t\t\tIt had been very messy and deeply unpleasant. The worst thing that Maria had ever experienced. But what kind of life would it have been for her and the baby otherwise? It would probably have been taken off her and she would have been put in a correctional institute. At least when the Nationalists finally arrived.\n\t\t\t*set preg false\n\t\t#Keep the baby.\n\t\t\t*achieve father\n\t\t\tShe couldn't harm the child, even if it was going to doom her to life in a correctional institute, that wasn't the baby's fault. And it was $!{man}'s child. How could she possibly wish ill of it? No, she was going to have the baby and face the consequences.\n*page_break\nBut today was going to be different. Today was her day in court. To be honest, she had been surprised when she'd been handed her court summons. She'd been surprised when she'd been taken to prison in the first place. When the soldiers had come in and found her standing over the body of that Captain, soaked in his blood, she had fully expected to be taken outside and shot. And when she was taken to prison, she was expecting any day to be executed.\n\nAnd yet, here she was, being taken, handcuffed and under guard, for her trial.\n\nShe's taken to the courts, which have clearly recently been bombed. Inside it is rather chaotic; legal documents litter the floor, lawyers dash about from left to right, there are gaping holes in the roof, under which buckets have been placed to catch the driving rain.\n\nMaria is taken into a half-empty courtroom and sat down. Other than her and her guards, there are couple of official-looking men and a scribe who is already scribbling away. Then the judge enters and they all stand. He is a man in his mid-sixties, slightly hunched, wearing his judicial robes and spectacles.\n*page_break\nThey all sit as he sits. He picks up a document in front of him and reads it, glasses halfway down his nose,\n*line_break\n\"Maria Farfan, you are charged with the murder of a Captain of the Popular Army, who is not be named for security purposes, on 25th July 1938 in Venta de Camposines, Catalonia. How do you plead?\"\n*line_break\nMaria is about to answer when the judge interrupts,\n*line_break\n\"And please make it quick, I've got seven cases to hear this morning\".\n*line_break\nMaria pleads...\n*choice\n\t#Guilty.\n\t\t\"Guilty your, but I would like to plead that there are mitigating circumstances\".\n\t\t*line_break\n\t\t\"And what might those be?\"\n\t\t*choice\n\t\t\t#\"It was self-defence\".\n\t\t\t\t\"And in what way was the Captain threatening you that made it essential for you to cut his throat?\"\n\t\t\t\t*line_break\n\t\t\t\t*if morbrutal = true\n\t\t\t\t\t\"He said he'd shoot me if I didn't give him information. I didn't know anything, nothing that he wanted to know anyway, so I had no choice\".\n\t\t\t\t\t*goto convo\n\t\t\t\t*elseif morbrutal = false\n\t\t\t\t\t\"He said he'd shoot me if I didn't give him information,\" Maria lies, \"I didn't know anything, nothing that he wanted to know anyway, so I had no choice\".\n\t\t\t\t\t*goto convo\n\t\t\t\t*else\n\t\t\t\t\t\"He said he'd shoot me if I didn't give him information. I didn't know anything, nothing that he wanted to know anyway, so I had no choice\".\n\t\t\t\t\t*goto convo\n\t\t\t\t*label convo\n\t\t\t\t*line_break\n\t\t\t\t\"Do have any evidence to back this up Senorita Farfan?\"\n\t\t\t\t*line_break\n\t\t\t\t*if morbrutal = true\n\t\t\t\t\tMaria goes into great detail about what happened. Those terrifying few minutes are so imprinted on her mind that she can virtually recall word for word the events of 25th July. The judge seems to be impressed by Maria's sincerity,\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Well I must say Senorita Farfan, you are quite an eloquent speaker. The military police reports are unclear on what happened in that room between the Captain entering and room and his death. You are the only living witness to those events and I for one believe your account\".\n\t\t\t\t\t*line_break\n\t\t\t\t\tMaria breathes a sigh of relief,\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Thank you your honour\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"It is on that basis that I commute the charge from murder to manslaughter, a charge which I find you guilty of, as you yourself have admitted killing the Captain. Hence, I sentence you to nine years in prison\".\n\t\t\t\t\t*line_break\n\t\t\t\t\tMaria doesn't know whether to laugh or cry.\n\t\t\t\t\t*goto prison\n\t\t\t\t*elseif morbrutal = false\n\t\t\t\t\tMaria struggles to fabricate a situation in which Morales had pointed a gun at her and given her ten seconds to say everything she knew. She said at ten, she had grabbed the scalpel and stabbed him before he could react. The judge seems sceptical,\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"How exactly did you manage to kill the Captain before he shot you?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tMaria has one last trick up her sleeve, she begins to cry,\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"I... I don't know, it all happened so quickly...\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tBut the judge has seen it all before and is unmoved, \n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Senorita, if you think the sight of a woman weeping is enough to obscure my impartial view of events, I'm afraid you are very much mistaken,\" he looks over the evidence before him, \"On the basis of the reports filed by the military police, and taking into account your version of events, I hereby find you guilty of murder\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"What?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Silence please. I therefore sentence you to death by firing squad\".\n\t\t\t\t\t*goto deathsent\n\t\t\t\t*else\n\t\t\t\t\tMaria goes into great detail about what happened. Those terrifying few minutes are so imprinted on her mind that she can virtually recall word for word the events of 25th July. The judge seems to be impressed by Maria's sincerity,\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Well I must say Senorita Farfan, you are quite an eloquent speaker. The military police reports are unclear on what happened in that room between the Captain entering and room and his death. You are the only living witness to those events and I for one believe your account\".\n\t\t\t\t\t*line_break\n\t\t\t\t\tMaria breathes a sigh of relief,\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Thank d one that will not wash with me. Given that you show now remorse whatsoever, I do not hesitate in finding you guilty of murder and sentencing you to death by firing squad. Court dismissed!\"\n\t\t\t\t\t*goto deathsent\n\t#Not guilty.\n\t\t\"Not guilty your honour\".\n\t\t*line_break\n\t\t\"Well that is quite a claim considering,\" he flicks through his file, \"The evidence against you is rather damning. He went into a room with you and then he had his throat cut. And you were covered in his blood,\" the judge looks up, \"Do you mean to say that although you carried out the killing, it wasn't murder?\"\n\t\t*line_break\n\t\t\"Er... yes,\" Maria manages to stutter.\n\t\t*line_break\n\t\t\"Go on then, what is your defence?\"\n\t\t*choice\n\t\t\t#\"It was self-defence\".\n\t\t\t\t\"And in what way was the Captain threatening you that made it essential for you to cut his throat?\"\n\t\t\t\t*line_break\n\t\t\t\t*if morbrutal = true\n\t\t\t\t\t\"He said he'd shoot me if I didn't give him information. I didn't know anything, nothing that he wanted to know anyway, so I had no choice\".\n\t\t\t\t\t*goto convo2\n\t\t\t\t*elseif morbrutal = false\n\t\t\t\t\t\"He said he'd shoot me if I didn't give him information,\" Maria lies, \"I didn't know anything, nothing that he wanted to know anyway, so I had no choice\".\n\t\t\t\t\t*goto convo2\n\t\t\t\t*else\n\t\t\t\t\t\"He said he'd shoot me if I didn't give him information. I didn't know anything, nothing that he wanted to know anyway, so I had no choice\".\n\t\t\t\t\t*goto convo2\n\t\t\t\t*label convo2\n\t\t\t\t*line_break\n\t\t\t\t\"Do have any evidence to back this up Senorita Farfan?\"\n\t\t\t\t*line_break\n\t\t\t\t*if morbrutal = true\n\t\t\t\t\tMaria goes into great detail about what happened. Those terrifying few minutes are so imprinted on her mind that she can virtually recall word for word the events of 25th July. The judge seems to be impressed by Maria's sincerity,\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Well I must say Sen s no way out now.\n\t\n\t\t\t*if dlrship = true\n\t\t\t\tShe thinks about $!{man}. Thinking about him makes her cry.\n\t\t\tMaria shuts her eyes tight and whispers,\n\t\t\t*line_break\n\t\t\t\"Viva Espana\".\n\t\t#Refuses it.\n\t\t\tNo, she doesn't want it. He's so matter of fact, Maria thinks to herself, about killing someone. Then again, he is a soldier. She doesn't look at the soldiers lining up opposite her, she looks at the dark, overcast sky. In the far distance, above the noise of the city, she thinks she can hear the familiar sound of fighting. Perhaps the Nationalists aren't far? But that doesn't matter now.\n\n\t\t\tShe's crying now, but doesn't want them to hear and so whimpers rather pathetically. She got through everything for it to end like this? Surely not? And yet, there's no way out now.\n\t\t\t*if dlrship = true\n\t\t\t\tShe thinks about $!{man}. Thinking about him makes her cry.\n\t\t\tMaria shuts her eyes tight and whispers,\n\t\t\t*line_break\n\t\t\t\"Viva Espana\". \n\t*set mariadead true\n\t*goto morales\n*label prison\n*page_break\n*achieve lawyer\nMaria is taken back to her cell, which she supposes is to be her home for some considerable time now. It doesn't feel very homely. She sits on her bed looking out of the window. They better come, she prays, they better. Franco must win soon. He must.\n*goto morales\n*label morales\n*if moralesdead = true\n\t*finish\n*page_break\n*image number16.png\n3.49 P.M.\n*line_break\n15th November 1938\n*line_break\nRibaroja de Ebro, Catalonia\n*line_break\nCommander Adrian Morales\n\nThe sound of the pouring rain was being drowned out by the rain of artillery shells. The bombardment of their position is almost constant now, the whine and then the boom in one continuous loop repeated in every direction all around them. Fortunately, the weather was too bad for the fascist planes to be up. At least for now. The only other sound that is getting through to Morales' ears is the constant ringing of telephones in his HQ, the basement of a house in Ribaroja on the banks of the Ebro. Presently, Commissar Vela enters, soaked in the rain, holding his cap in place having been running.\n*line_break\n\"Bad news I'm afraid\".\n*line_break\n\"You only ever bring bad news Vela,\" Morales replies, not looking up from his map.\n*line_break\n\"Well, you're not going to like this, but Thirteenth Brigade is going to be the last unit across the Ebro. All along the line, most of the army is back across, our footbridge is one of the last ones open\".\n*line_break\n\"I said you only brought bad news!\"\n*line_break\n\"There's worse to come, we've had our orders through, Palafox Battalion is to provide the rearguard for the Thirteenth to cross. So we're going to be the very last ones across out of the whole of the Army of the Ebro\".\n*line_break\nMorales sighs heavily. As if his day could get any better. \n*line_break\n\"So Commander, we better prepare a defence in depth, shouldn't we?\"\n*line_break\n\"Yes Vela, alright, I know how to do my job\".\n*line_break\nMorales looks back to his map.\n*page_break\n*if garcap = true\n\t*set captain \"Garcia\"\n*if garcap = false\n\t*set captain \"Blanco\"\n*image ebro2.png\n\"Ok,\" Morales begins, \"We've got to protect the bridge for as long as is humanly possible to buy time for Thirteenth Brigade to escape\".\n*line_break\n\"And don't forget we've got the rope ferry for vehicles alongside it\".\n*line_break\n\"Yes, of course I haven't forgotten that. Now, Fifth Company is currently in a reserve line around the town. At the front we've got First and Second Companies either side of the road into Ribaroja. That's where I expect the main fascist attack to come from, Captain $!{captain} is in charge there\".\n*line_break\n\"Good, we're in safe hands then\".\n*line_break\n\"On the right, we've got Third Company, on the left flank Fourth Company\n*if captain = \"Blanco\" \n\t, I've had to put Lieutenant Garcia in command there\".\n*if captain = \"Garcia\"\n\t, I've had to put Lieutenant Blanco in command there\".\n*line_break\n\"But I thought you didn't rate him?\"\n*line_break\n\"I don't,\" Morales replies, \"But since the Internationals were withdrawn, we've been desperately short of officers with any kind of experience. He'll have to do\".\n*page_break\n\"By the way, didn't Blanco have those nasty burns? I didn't think he'd be back yet\".\n*line_break\n\"Oh he's back, they sent all the wounded who could walk and hold a rifle back to us.\n*if burns = true\n\tHave you seen him though, the burns are horrific, far worse than I remembered them!\"\n*if burns = false\n\tHave you seen him? The burns are, well, not pleasant but slightly better than I remembered them being\".\n*line_break\n\"Poor lad\".\n*line_break\n\"Anyway,\" Morales continues, \"We've also got the Battalion forces, namely a T-26 tank, a couple of AT guns and the Machine Gun platoon. Plus we've got access to artillery support from the far bank\".\n*line_break\n\"I really think we should withdraw the tank while we still can, get it across on the rope ferry, it's an important asset\".\n*line_break\nMorales knows the tank is important for the army, they have so few, but he's reluctant to let it go, it could come in very useful in his defence. He decides to...\n*fake_choice\n\t#Send it across the Ebro.\n\t\t\"Ok, you're right, send it for evacuation\".\n\t\t*set tank false\n\t\t*line_break\n\t\t\"Very wise decision Sir, Modesto will appreciate it\".\n\t\t*line_break\n\t#Keep it here.\n\t\t\"No, it'll do more good on this side, we need all the firepower we can get if we want to hold on\".\n\t\t*line_break\n\t\t\"Very well Commander...\"\n\t\t*line_break\n\"Now, for the rest of our resources...\" Morales considers his options.\n*image ebro2.png\n\"I think we'll put the anti-tank guns...\n*fake_choice\n\t#With First and Second Company\".\n\t\t*set at -3\n\t#With Third Company\".\n\t\t*set at -2\n\t#With Fourth Company\".\n\t\t*set at -1\n\t#In reserve with Fifth Company\".\n\"Ok,\" Vela affirms, \"I'll give the orders to have them moved into position. But what about our Maxim MGs?\"\n*line_break\n\"Yes, I've thought about that, I'm going to station them with...\"\n*fake_choice\n\t#First and Second Company\".\n\t\t*set mg -3\n\t#Third Company\".\n\t\t*set mg -2\n\t#Fourth Company\".\n\t\t*set mg -1\n\t#Fifth Company, in reserve\".\n\"I'll see to it at once\".\n*line_break\n\"Now all we can do is wait...\"\n*page_break\nThey didn't have to wait long. An increase in the intensity of the Nationalist bombardment indicated an attack was on its way. Soon the telephones are going mad.\n*line_break\n\"Sir, Third Company on the field telephone\".\n*line_break\nMorales takes the receiver,\n*line_break\n\"Morales\".\n*line_break\n\"Sir, this is Three Company, we're under attack!\" the panic in his voice is palpable, despite the crackly nature of the line, \"Fascist infantry, and lots of them!\"\n*line_break\n*if mg = 3\n\t\"You've got the Maxims haven't you?\"\n\t*line_break\n\t\"Yes Sir\".\n\t*line_break\n\t\"And isn't that enough? You should have no problem with infantry. Pull yourself together man, you've got to hold on. I've given you what you need, so don't let me down, understand?\"\n\t*line_break\n\t\"Yes Sir, we'll be alright I think, that's the machine guns opening up now, can you hear them?\"\n\t*goto nxtbit\n*else\n\t\"You've got to hold that flank comrade, otherwise you'll leave half the Battalion exposed!\"\n\t*line_break\n\t\"I'm not sure we can Sir, we need MGs, there's too many of them\".\n\t*line_break\n\t\"Fight to the last man, hold that position at all costs! If you fold, the whole of Thirteenth Brigade could be put at risk. So hold your ground, understood?\"\n\t*line_break\n\t\"Yes Sir, we'll do our best\".\n\t*set bad +1\n\t*goto nxtbit \n\n*label nxtbit\n*line_break\nBefore there's time to say anymore, Vela is holding another phone to Morales, he takes it,\n*line_break\n\"Commander Morales\".\n*if captain = \"Garcia\"\n\t*line_break\n\t\"Commander, this is $!{captain}, the fascists are trying to break through up the main road, massed infantry supported by half a dozen Panzers\".\n\t*line_break\n\tThe most common tank in the Franco's army is the German Panzer I, quick but with thin armour and only machine guns as armament.\n\t*line_break\n\t\"And are you holding them $!{captain}?\"\n\t*if at = 2\n\t\t*line_break\n\t\t\"Of course Sir, the AT guns are cutting up the Panzers. \n\t\t*if mg = 2\n\t\t\tAnd the MGs are making short work of their infantry.\n\t\tI think we've got them on the run!\"\n\t\t*line_break\n\t\t\"That's what I like to hear, stellar work Captain, keep me informed\".\n\t\t*goto nxtbit2\n\t*else\n\t\t*line_break\n\t\t\"We're struggling Sir, taking heavy casualties. Without AT or tank support, we can't do much about the panzers.\n\t\t*if mg = 2\n\t\t\tThe MGs are making short work of their infantry. But\n\t\tI'd say we can only hold them for another five to ten minutes max\".\n\t\t*line_break\n\t\t\"We've got to hold that road. I'll see what I can do...\"\n\t\t*line_break\n\t\t*choice\n\t\t\t*if tank = true\n\t\t\t\t#Send in the T-26 tank.\n\t\t\t\t\t*set tank false\n\t\t\t\t\t\"We're sending the T-26 down, hold on $!{captain}, it'll be with you shortly\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Very good Sir\".\n\t\t\t\t\t*line_break\n\t\t\t\t\tThe T-26 makes short work of the fascist panzers. Its 37mm cannon can take them out from close to kilometre away, whilst their machine guns are completely ineffectual against the Russian tank's armour.\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Situation Captain?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Situation stable, the tank has got the enemy infantry running scared, four panzers out of action. Remaining fascist forces are retreating\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"That's what I like to hear, stellar work $!{captain}, keep me informed\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"One small issue Sir\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Go on\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"It's the tank Sir, it went over a mine and it's been immobilised. It is still operational, it just can't move\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Shit\".\n\t\t\t\t\t*goto nxtbit2\n\t\t\t#Call in artillery support.\n\t\t\t\t*set arty false\n\t\t\t\t\"Ok $!{captain}, get your men down, I'm calling in Brigade artillery on your positions\".\n\t\t\t\t*line_break\n\t\t\t\t\"Very good Sir, $!{captain} out\".\n\t\t\t\t*line_break\n\t\t\t\tMorales hangs up,\n\t\t\t\t*line_break\n\t\t\t\t\"Get me Brigade on the phone, now!\"\n\t\t\t\t*line_break\n\t\t\t\tAnother telephone is brought to him,\n\t\t\t\t*line_break\n\t\t\t\t\"Brigade, I need artillery fire support on the positions of First and Second Company. Give them everything you've got\".\n\t\t\t\t*line_break\n\t\t\t\tThe guns on the far side of the Ebro roar into life. After ten minutes of intensive bombardment, he calls up $!{captain},\n\t\t\t\t*line_break\n\t\t\t\t\"Situation?\"\n\t\t\t\t*line_break\n\t\t\t\t\"Situation stable, the artillery has wiped out the attackers, infantry decimated, four panzers out of action. Remaining fascist forces are retreating\".\n\t\t\t\t*line_break\n\t\t\t\t\"That's what I like to hear, stellar work Captain, keep me informed\".\n\t\t\t\t*goto nxtbit2\n\t\t\t#Pull back to Fifth Company's reserve positions.\n\t\t\t\t*set bad +1\n\t\t\t\t\"You're going to have to withdraw $!{captain}, move your men back in good order to Fifth Company's positions, we'll have to hold them on the outskirts of town\".\n\t\t\t\t*line_break\n\t\t\t\t\"Will do Sir, $!{captain} out\".\n\t\t\t\t*if at = 5\n\t\t\t\t\t*line_break\n\t\t\t\t\tThe AT guns stationed with Fifth Company make short work of the advancing panzers and the Nationalist attack runs out of steam. \n\t\t\t\t*set pullback true\n\t\t\t\t*goto nxtbit2\n*else\n\t*line_break\n\t\"Morales, it's $!{captain}, the fascists are pushing up the road, infantry, half a dozen Panzers!\"\n\t*line_break\n\tThe most common tank in the Franco's army is the German Panzer I, quick but with thin armour and only machine guns as armament.\n\t*line_break\n\t\"And are you holding them $!{captain}?\"\n\t*if at = 2\n\t\t*line_break\n\t\t\"Are we? The AT guns are having a field day! This is great fun to watch, ha, there goes another one! \n\t\t*if mg = 2\n\t\t\tAnd the MGs are making short work of their infantry too.\n\t\tI think we've got them on the run!\"\n\t\t*line_break\n\t\t\"That's what I like to hear, stellar work Captain, keep me informed\".\n\t\t*goto nxtbit2\n\t*else\n\t\t*line_break\n\t\t\"With all due respect, what do you think Sir? How are we supposed to fight tanks without armour or AT support?\n\t\t*if mg = 2\n\t\t\tThe MGs are making short work of their infantry. But\n\t\tI'd say we can only hold for five minutes max. We're in real trouble here!\"\n\t\t*line_break\n\t\t\"We've got to hold that road. I'll see what I can do...\"\n\t\t*line_break\n\t\t*choice\n\t\t\t*if tank = true\n\t\t\t\t#Send in the T-26 tank.\n\t\t\t\t\t*set tank false\n\t\t\t\t\t\"We're sending the T-26 down, hold on $!{captain}, it'll be with you shortly\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Finally some good news!\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tThe T-26 makes short work of the fascist panzers. Its 37mm cannon can take them out from close to kilometre away, whilst their machine guns are completely ineffectual against the Russian tank's armour.\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Situation Captain?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Haha, we've got them running scared! Multiple panzers down, fascist infantry running for their lives!\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"That's what I like to hear, stellar work $!{captain}, keep me informed\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Er, one small issue Sir\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Go on\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"It's the tank Sir, it went over a mine and it's been immobilised. The gun's still working fine, it just can't move\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Shit\".\n\t\t\t\t\t*goto nxtbit2\n\t\t\t#Call in artillery support.\n\t\t\t\t*set arty false\n\t\t\t\t\"Ok $!{captain}, get your men down, I'm calling in Brigade artillery on your positions\".\n\t\t\t\t*line_break\n\t\t\t\t\"Just make it quick ok?\"\n\t\t\t\t*line_break\n\t\t\t\tMorales hangs up,\n\t\t\t\t*line_break\n\t\t\t\t\"Get me Brigade on the phone, now!\"\n\t\t\t\t*line_break\n\t\t\t\tAnother telephone is brought to him,\n\t\t\t\t*line_break\n\t\t\t\t\"Brigade, I need artillery fire support on the positions of First and Second Company. Give them everything you've got\".\n\t\t\t\t*line_break\n\t\t\t\tThe guns on the far side of the Ebro roar into life. After ten minutes of intensive bombardment, he calls up $!{captain},\n\t\t\t\t*line_break\n\t\t\t\t\"Situation?\"\n\t\t\t\t*line_break\n\t\t\t\t\"We got them Sir, artillery has completely cut them up, tanks, infantry, all wiped out\".\n\t\t\t\t*line_break\n\t\t\t\t\"That's what I like to hear, stellar work Captain, keep me informed\".\n\t\t\t\t*goto nxtbit2\n\t\t\t#Pull back to Fifth Company's reserve positions.\n\t\t\t\t*set bad +1\n\t\t\t\t\"You're going to have to withdraw $!{captain}, move your men back in good order to Fifth Company's positions, we'll have to hold them on the outskirts of town\".\n\t\t\t\t*line_break\n\t\t\t\t\"About time! We're on our way\".\n\t\t\t\t*if at = 5\n\t\t\t\t\t*line_break\n\t\t\t\t\tThe AT guns stationed with Fifth Company make short work of the advancing panzers and the Nationalist attack runs out of steam. \n\t\t\t\t*set pullback true\n\t\t\t\t*goto nxtbit2\n\t\t\t\t\n*label nxtbit2\n*page_break\n*if bad = 2\n\tThey'd weathered the storm of the first hour of fascist attacks, just. The problem was, now that First and Second Companies had withdrawn back to Ribaroja, Three and Four companies have been left out on a limb, with their flanks dangerously exposed. Casualties have been high but at least the bridge is still open, allowing more and more troops to escape.\n*if bad = 1\n\tThey'd managed to weather the storm of the first hour of fascist attacks. \n\t*if pullback = true\n\t\tThe problem was, now that First and Second Companies had withdrawn back to Ribaroja, Three and Four companies have been left out on a limb, with their flanks dangerously exposed.\n\tCasualties have been just about tolerable and the bridge is still open, allowing more and more troops to escape.\n*if bad = 0\n\tTo say they'd weathered the storm of the first hour of fascist attacks would be to do Palafox Battalion a disservice. They'd thrown back the enemies wherever they'd made advances and inflicted heavy casualties for relatively few on their own side.\tAnd most importantly of all, the bridge is still open, allowing more and more troops to escape.\t\nBut that was only just the start...\n*page_break\nHalf an hour later...\n\n\"Sir we've enemy thrusts against our centre and left\".\n*line_break\n\"Get me $!{captain}!\"\n*line_break\n$!{captain} is promptly contacted. This time, Morales can barely hear him over artillery shells exploding at the front,\n*line_break\n\"What's your situation Captain?\"\n*line_break\n\"We're under heavy bombardment but the attack is just a few infantry platoons, nothing we can't deal with. I think this must be a diversion!\"\n*line_break\nMorales hangs up,\n*line_break\n\"Shit, get me \n*if captain = \"Garcia\"\n\tBlanco, over at Fourth Company! That's where the real attack's headed!\"\n\t*line_break\n\tBlanco sounds pretty worried on the phone,\n\t*line_break\n\t\"We're in the shit here Sir,\" the sound of an intense firefight can be heard down the line, \"More panzers than I can count, hundreds of fascist infantry!\"\n\t*line_break\n\t\"Are you holding them Lieutenant?\"\n\t*if at = 4\n\t\t*line_break\n\t\t\"The AT gun crews are working their arses off. Three, ha! Make that four panzers down. They're walking right into the trap Sir, this isn't going to be pretty!\"\n\t\t*line_break\n\t\t\"That is perfection itself Blanco, Fourth Company are single-handedly holding up the fascist advance\".\n\t\t*line_break\n\t\t\"Music to my ears Sir!\"\n\t\t*goto nxt3\n\t*else\n\t\t*line_break\n\t\t\"With all due respect, what do you think Sir? We haven't got any way of taking out those tanks! We need support or this position [i]will[/i] fall!\"\n\t\t*line_break\n\t\t\"Alright, do your best for now Lieutenant, I'll get back to you\".\n\t\t*line_break\n\t\tMorales...\n\t\t*choice\n\t\t\t*if tank = true\n\t\t\t\t#Sends the tank in.\n\t\t\t\t\t\"Move the T-26 over to Four Company's position, double time!\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tThe T-26 makes short work of the fascist panzers. Its 37mm cannon can take them out from close to kilometre away, whilst their machine guns are completely ineffectual against the Russian tank's armour.\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Situation Lieutenant?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"It's a tough fight Sir but we should hold! The T-26 is tearing the panzers to shreds! And their infantry are running scared too!\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"That's what I like to hear, stellar work $!{captain}, keep me informed\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Er, well there is one small issue Sir\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Go on\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"It's the tank Sir, it went over a mine and, erm... It is still fires and everything, it just can't move\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Shit\".\n\t\t\t\t\t*goto nxt3\n\t\t\t#Calls for artillery fire.\n\t\t\t\tMorales rings up Battalion to call in an artillery strike from the other side of the river,\n\t\t\t\t*if arty = false\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Brigade, I need artillery on the positions of Fourth Company, heavy enemy attacks on this sector\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Negative Palafox, we're out of ammunition, we used up the last of our shells on the previous bombardment\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"You've got to be joking! Nothing at all?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Negative\".\n\t\t\t\t\t*line_break\n\t\t\t\t\tMorales slams the phone down.\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Right, well we better get them out of there\".\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto withdraw2\n\t\t\t\t*else\n\t\t\t\t\t\"Ok Lieutenant, get your men down, I'm calling in Brigade artillery on your positions\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Finally some good news!\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tMorales hangs up,\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Get me Brigade on the phone, now!\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tAnother telephone is brought to him,\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Brigade, I need artillery fire support on the positions of Fourth Company. Give them everything you've got\".\n\t\t\t\t\t*line_break\n\t\t\t\t\tThe guns on the far side of the Ebro roar into life. After ten minutes of intensive bombardment, he calls up Garcia,\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Situation?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"We got them Sir, artillery has completely cut them up, tanks, infantry, pretty much wiped out\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"That's what I like to hear, stellar work Captain, keep me informed\".\n\t\t\t\t\t*goto nxt3\n\t\t\t#Orders a withdrawal into Ribaroja.\n\t\t\t\t\t*label withdraw2\n\t\t\t\t\t*set bad +1\n\t\t\t\t\t\"Get yourselves out of there,\" Morales advises, \"Pull back to the line around Ribaroja\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"We're on our way Sir!\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tThe retreat is messy, chaotic and costly. Trying to run from tanks across open ground is never a good idea. Severely depleted, they make it to Fifth Company's defensive lines, where the fascists are held, for now.\n\t\t\t\t\t*if at = 5\n\t\t\t\t\t\tThe anti-tank guns there do a good job of driving the Nationalist armour back.\n\t\t\t\t\t*goto nxt3\n*else\n\tGarcia, over at Fourth Company! That's where the real attack's headed!\"\n\t*line_break\n\tGarcia sounds pretty worried on the phone,\n\t*line_break\n\t\"This is a major attack Sir,\" the sound of an intense firefight can be heard down the line, \"A dozen or more panzers, maybe three companies of fascist infantry!\"\n\t*line_break\n\t\"Are you holding them Lieutenant?\"\n\t*if at = 4\n\t\t*line_break\n\t\t\"The AT guns are working overtime but they're doing well. Three, oh make that four panzers down. I'm confident we've got a grip of the situation Sir\".\n\t\t*line_break\n\t\t\"That is perfection itself Garcia, Fourth Company are single-handedly holding up the fascist advance\".\n\t\t*line_break\n\t\t\"We're doing our best to Sir\".\n\t\t*goto nxt3\n\t*else\n\t\t*line_break\n\t\t\"Unfortunately not Sir, my men are defenceless against the panzers. We need support or this position [i]will[/i] fall!\"\n\t\t*line_break\n\t\t\"Alright, do your best for now Garcia, I'll get back to you\".\n\t\t*line_break\n\t\tMorales...\n\t\t*choice\n\t\t\t*if tank = true\n\t\t\t\t#Sends the tank in.\n\t\t\t\t\t\"Move the T-26 over to Four Company's position, double time!\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tThe T-26 makes short work of the fascist panzers. Its 37mm cannon can take them out from close to kilometre away, whilst their machine guns are completely ineffectual against the Russian tank's armour.\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Situation Lieutenant?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"They're pushing us hard but we should just about hold on! The T-26 is ripping through the panzers and it's got their infantry running for cover too!\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"That's what I like to hear, stellar work $!{captain}, keep me informed\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"One small issue Sir\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Go on\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"It's the tank Sir, it went over a mine and it's been immobilised. It is still operational, it just can't move\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Shit\".\n\t\t\t\t\t*goto nxt3\n\t\t
