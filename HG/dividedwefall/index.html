p, the government began to run out of steam; the Republican-Socialist coalition collapsed in 1933 and the forces of the Right won the subsequent election. The new parliament was dominated by CEDA, a hard-line right-wing Catholic party which sought to bring down democracy from the inside, just as Hitler and Mussolini had done.\n\nThe entry of CEDA into government in October 1934 prompted an ill-prepared revolutionary general strike by the Socialists which was brutally put down by the Army of Africa, with over 4,000 killed and 30,000 arrested.\nThe Army of Africa was Spain's greatest military asset. Hardened veterans of a brutal colonial war in Morocco from 1909-1926, with perhaps the fiercest units being the Spanish Foreign Legion. Despite the name, the majority of its personnel were Spaniards, not least the co-founder General Francisco Franco. With their motto \"Long live death!\" La Legion was perhaps the most brutal and nationalistic branch of the Army; during the Moroccan War they paraded with heads of their enemies.\n*image number2.png\n*page_break\nAfter October 1934, everything changed. Both Right and Left saw each other as existential threats; the Left feared it would only be a matter of time before CEDA seized total power and crushed them. The Right saw the October rising as evidence that a Bolshevik revolution was imminent. \nAs a result, the elections of February 1936 were a bitter and polarised contest. The old Republican-Socialist alliance was re-formed and with the support of far Left groups such as the Communists and Anarchists, the Popular Front was created. \n\nThe Alliance of the Right, with CEDA at the fore, opposed them. In the end, it was extremely close, but the Popular Front won a narrow victory. The Right did not accept the result and immediately began planning a military coup. CEDA members moved in their droves to the Falange, Spain's Fascist party, which took to violence to oppose the Popular Front government.\nElements on the Left also began talking the language of revolution and the situation quickly deteriorated. \n*page_break\nOn 12th July, a Falange terror squad murdered a left-wing officer of the Assault Guard, the Republic's urban police force. That evening, the officer's comrades kidnapped and murdered the prominent right-winger Calvo Sotelo. This was the excuse the plotters had been looking for. On 18th July 1936, the Army, Falange and other right-wing groups rose up against the democratically elected government. In response, the government distributed weapons to the workers. The Spanish Civil War had begun.  \n*page_break\n6.07 A.M.\n*line_break\n18th July 1936\n*line_break\nThe Outskirts of Madrid\n*line_break\nLieutenant Adrian Morales \n\nThe telegraph machine chatters into life, causing Lieutenant Adrian Morales to jolt with a start from a distant daydream. It has been a quiet night by the standards of the last few months. As Assault Guards, they had had to cope with the wave of violence that had swept Spain of late.\n*line_break\n\"Aren't you going to get that?\" enquires Sergeant Prieto, Morales' second-in-command, and something of a stickler for detail.\nThe machine keeps on chattering and a long spool of ticker tape begins to emerge.\n*line_break\nMorales lazily rises from his seat, \"What does it look like I'm doing?\" \n*line_break\nHe tears the telegram from the machine and reads:\n*line_break\nSTATE OF EMERGENCY STOP MILITARY RISING STOP GOVERNMENT ORDERS DISSOLUTION OF ARMY STOP PROCEED TO MONTANA BARRACKS STOP ARREST OFFICERS AND DISMISS MEN FULL STOP\n*line_break\n\"Shit.\"\nMorales immediately...\n*choice\n\t#Rings HQ to make sure this isn't a hoax.\n\t\t*goto HQ\n\t#Assembles the men to inform them of the gravity of the situation.\n\t\t*goto assemble\n\t#Proceeds to Montana barracks without delay.\n\t\t*goto montana\n*label HQ\nSending Prieto to gather the men, Morales dials for Central Station. It seems to take an eternity for the dialler to turn back to zero after each number is entered. To his dismay the operator informs Morales that the telephone line is busy with multiple calls queued. It is impossible to get through. What now?\n*choice\n\t#Remain here, refuse to follow the orders until they are confirmed\n\t\t*goto remain\n\t#Assemble the men to inform them of the gravity of the situation.\n\t\t*goto assemble\n\t#Proceed to Montana barracks without delay.\n\t\t*goto montana\n\n*label assemble\n\"Assault Guards, less than 10 minutes ago I was informed that the Army has begun an uprising against the democratically elected government of the Republic\".\n*line_break\nThe men look at each other and murmur, Morales indicates he wants silence and continues, \"We have orders to seize the Montana barracks and arrest the officers found there. I cannot stress enough the importance of the next few hours and days. The fate of the Republic is in our hands. I expect all of you to honour and exceed your oaths to defend the Republic with your lives. Viva la Republica!\"\n*line_break\nThe men return the battle cry, some with their right hand raised in a clenched fist, the salute of the Left. Morales is slightly unnerved by this. He may be a Republican but he's no communist. \n*goto montana\n*finish\n*label montana\nMorales' 20 strong unit of Assault Guards forms up with their navy blue uniforms and Destroyer Carbines. How should they advance to their objective?\n*choice\n\t#Cautiously, the enemy could be just around the corner.\n\t\t*goto caution\n\t#In formation, to maintain discipline.\n\t\t*goto formation\n\t#As quickly as possible, time is of the essence.\n\t\t*goto quick\n*label remain\nA sweating Prieto re-enters, \"The men are ready sir!\"\n*line_break\n\"Stand them down for now Sergeant\".\n*line_break\n\"What Sir?\"\n*line_break\n\"You heard me, we're not going anywhere until I know for sure this was real. Besides,\" he continues, \"Do they really expect us to just stroll into an army barracks and arrest everyone?\"\n*line_break\nMorales waits for about an hour, intermittently trying to get through to HQ, without success. Presently, 3 armed men burst through the door. Recognising their blue uniforms as that of the Falange, Morales makes a lunge for his pistol, resting on the desk. Before he can reach it, he is gunned down by the Falangists. Adrian Morales' civil war is over before it has even begun.\n*set morbrutal -10\n*achieve badstart  \n*set moralesdead true\n*goto navarre\n\t\t\n*label caution\nMorales splits his Troop in two and each group advances on either side of the street, scuttling from doorway to doorway, alarming a number housewives. In the distance, shots ring out through an otherwise still, crisp morning. Then, a group of armed Falangists appear at the end of the road. They don't seem to have spotted the Assault Guards and advance confidently up the street.\n*line_break\nMorales decides to...\n*choice\n\t#Call on them to throw down their arms.\n\t\t*goto surrender\n\t#Ambush them.\n\t\t*goto ambush\n\t#Let them pass, the objective is the barracks, this is merely a distraction.\n\t\t*goto pass\n*label formation\nMarching in column in the centre of the road, with Morales at the head, the Troop of Guards attracts much attention. Numerous on-lookers watch, some cheer, others retreat into their homes.\n\nThen a shot. A group of armed Falangists at the end of the road. Morales goes to order his men to disperse but can't. He realises he's been shot in the neck. Lieutenant Adrian Morales' civil war is over. It didn't last very long.\n*set morbrutal -10\n*achieve badstart\n*set moralesdead true\n*goto navarre\n*label quick\nThrowing caution to the wind, the Assault Guards advance at a jog up the main road. Numerous on-lookers watch, some cheer, others retreat into their homes. Presently a group of armed Falangists appears at the end of the road. Morales and his men are too exposed to conceal themselves and are spotted instantly. What should Morales do?\n*choice\n\t#Open Fire!\n\t\t*goto firefight\n\t#Call on them to throw down their arms.\n\t\t*goto surrender\n\n\n*label pass\nThe Lieutenant signals to his men to halt and conceal themselves as best they can. There isn't much cover in the open street though. Sergeant Prieto is unhappy,\n*line_break\n\"You don't intend to let them pass do you, Lieutenant?\"\n*line_break\n\"That is precisely what I intend to do, the barracks are our goal, leave these amateurs to someone else!\"\n*line_break\n\"With all due respect, should we, as law enforcement officers, allow armed members of an illegal party straight past us?\"\n*line_break\nMorales pauses for a moment, deciding to...\n*choice\n\t#Hold his nerve and stand by his decision.\n\t\t*goto standby\n\t#Ambush the Falangists.\n\t\t*goto ambush\n\t#Demand the Falangists surrender.\n\t\t*goto surrender\n*label standby\n\"No Sergeant, they are my orders and you are to obey them!\"\n*line_break\nBefore he can reply, Prieto is shot in the arm. Chaos erupts. Morales, still shaken, is dragged by one of his men behind a parked car.\n*set prietodead true\n*goto firefight\n*label firefight\n*page_break\nMorales crouches with his back against the car. Bullets zip over his head. Calmly, he pulls up the bolt on his Destroyer carbine and pulls the action back. He takes a stripper clip of 5 rounds from his pouch and pushes them into the magazine. Then he pushes the bolt forward and then down, loading the first 9mm round into the chamber.\n*line_break\nThen, in one smooth movement, he brings the rifle to his shoulder and raises the sight to his eye-line, whilst simultaneously swivelling around and rising to his feet.\n*line_break\nInstinctively, he snaps to a target, a Falangist firing from a doorway. He pulls the trigger and an instant later the bullet slams into the Fascist's thigh. He goes down screaming. Already, Morales is pulling the bolt up and back again, ejecting the spent cartridge before pushing the bolt forward and then down, loading the next round. He does this in less than a second.\n*line_break\nHis next target goes down clutching his midriff and Morales is again pulling the bolt up and back, pushing forward and down. He aims at a shooter in a first floor window. His shot strays wide, hitting the window frame. The Falangist ducks away from the window. Up and back, forward and down and firing again, narrowly missing as the Fascist leans out for a second.\n*line_break\nUp and back, forward and down, last round of the magazine, Morales takes a deep breath in, then breathes out slowly, before holding his breath and steadying himself. He aims exactly where the Falangist's head had been. The moment the Fascist's head comes back into view, Morales squeezes the trigger gently. The Falangist is hit in the side of the head, a splatter of blood and brains appears on the wall behind him. He loads 5 more rounds and goes again.\n*goto navarre\n*label surrender\n\"Halt!\" Morales shouts, striding confidently down the road, weapons slung, \"Put down your weapons!\"\n*line_break\nOne of them, clearly their leader, steps forward, \"Are you with us Tenente? Are you for the Rising?\"\n*line_break\n\"We have orders to crush an illegal rebellion against the legitimate Republican government. The Army is officially dissolved and the Falange was declared illegal in March. For those reasons I think it best you put down your weapons,\" and then, unable to resist, he adds, \"Does that answer your initial question?\"\n*line_break\nSeveral tense seconds tick by as the Falangist considers his options.\n*line_break\n\"We have 20 rifles trained on you and your men. I would suggest you put down your weapons and come with us,\" Morales insists.\n*line_break\nThe two men stand 10 metres apart in the centre of the road. The Falangist holds his rifle in both hands, lowered but primed. Morales notices the safety is off. His own rifle is slung on his back but one of his hands has been moving very gradually to his holster. Presently, he unbuttons it and wraps his fingers around the grip of his Astra 900 pistol.\n*line_break\nWhat does he do next?\n*choice\n\t#Gun down the Falangist.\n\t\t*goto gundown\n\t#Hold his ground and his nerve.\n\t\t*goto hold\n\t#Slowly back away.\n\t\t*goto backaway\n*label gundown\nMorales goes to draw his sidearm but before he can bring it to bear, the Falangist raises his rifle and shoots Morales in the chest. Then again in the stomach. Lieutenant Adrian Morales' civil war is over. It didn't last very long.\n*set morbrutal -10\n*achieve badstart\n*set moralesdead true\n*goto navarre\n*label backaway\nMorales takes a deep breath and a step backwards, eyes still locked with the Falangist. Then another step. Then another. Just as he reaches his own men, one side or the other, he couldn't be sure which, opens fire. Chaos. Several Falangists, including the officer, are gunned down in an instant. The rest scatter, running for cover.\n*goto firefight\n*label ambush\nThere isn't much cover in the street and although Morales' men try to conceal themselves as best they can, they're soon spotted. A firefight quickly breaks out as the Falangists dash for cover, some of them forcing their way into nearby houses. Morales takes up a position behind a parked car.\n*goto firefight\n*label hold\nA painfully drawn out standoff. It might have been 20 seconds, it might have been 2 minutes. It seems like an eternity before the Falangist speaks.\n*line_break\n\"Please Tenente, I implore you, Spain is going to the dogs! The forces of anti-Spain want to destroy everything we hold dear; the Church, the Army, the Empire. Do you want to live in a Bolshevik Soviet?\"\n*line_break\n\"I am carrying out my orders and enforcing the law. Put down your weapons or we will be obliged to use deadly force\".\n*line_break\n\"So be it,\" the Falangist raises his rifle and fires as Morales desperately attempts to dive for cover. The bullet grazes his neck, centimetres away from severing the Carotid artery. \n\nThe Assault Guards open fire and in an instant several Falangists, including the officer, are gunned down. The rest of them scatter, dashing for cover, several forcing their way into nearby houses. Morales takes up position behind a parked car.\n*goto firefight\n*label navarre\n*page_break\n9.24 A.M.\n*line_break\n19th July 1936\n*line_break\nPamplona, Navarre\n*line_break\nMaria Farfan\n\nNews of the state of war had spread like wildfire and been met with a mixture of apprehension and excitement. 19 year-old Maria Farfan is making her way to the town square with her best friend Gabrielle. Navarre, a mostly rural province in the far North of Spain is proudly traditionalist, deeply conservative and devoutly Catholic. And Maria is no exception. \n\nIn the town square, a large crowd has gathered and more people are joining all the time. Thousands of young men in their scarlet berets are queuing to volunteer for the Carlist militia. The Rising, it seems, has gone without a hitch here. General Mola stands on a platform addressing the crowd. But he can't be heard over the shouting and singing.\n*line_break\n\"Give me my beret,\n*line_break\nGive me my rifle,\n*line_break\nI'm going to kill more Reds,\n*line_break\nThan there are flowers in April!\"\n\nHow does Maria feel about this display of patriotic fervour?\n*choice\n\t#Disgusted, any good Christian abhors violence.\n\t\t*goto disgust\n\t#It is not pleasant, but it is necessary, Spain must be saved from the Red threat.\n\t\t*goto necessary\n\t#Proud, Navarre has always provided Spain's bravest and best in the fight for Christian values.\n\t\t*goto proud\n*label disgust\nShe turns to Gabrielle, \"Isn't it just awful?\"\n*line_break\n\"What?\"\n*line_break\n\"All these men, craving blood. It's unchristian!\"\n*line_break\n\"It's the blood of Reds Maria,\" Gabrielle retorts, \"They have no faith, their lives aren't worth a thing in the eyes of God\".\n*line_break\nMaria looks unconvinced, so Gabrielle continues, \"What do you think would happen if the Reds were victorious? What would they do to us? If the Red mob marched into Pamplona , all the churches would be burnt to the ground, they would take anything they could lay their filthy hands on and I should think we'd be raped!\"\n*line_break\n\"Really?\"\n*line_break\n\"I shouldn't be surprised\".\n*line_break\nMaria nods meekly rather taken aback at her friend's bluntness\n*goto next\n\n*label necessary\n\"I know that we cannot give any quarter to the Reds but doesn't this all seem a bit much?\" Maria asks tentatively of her friend.\n*line_break\n\"What?\"\n*line_break\n\"They just seem so... bloodthirsty. It's unchristian!\"\n*line_break\nGabrielle smirks, \"The Reds are unchristians par excellence\".\n*line_break\n\"Are we to judge ourselves against the Reds?\"\n*line_break\n\"Maria, I don't think you grasp the seriousness of the situation!\" Gabrielle scolds her friend, \"This is a fight to the death between us and the Reds, Spain and anti-Spain. What would the Reds do to us? They'd burn down all our churches, steal everything we own and I shouldn't be surprised if we would be raped\".\n*line_break\nMaria nods meekly, rather taken aback by her friend's bluntness.\n*goto next\n\n*label proud\n\"Isn't it just terrific, Gabrielle?\"\n*line_break\n\"What?\"\n*line_break\n\"All our young men so willing to lay down their lives for Church and Country!\"\n*line_break\n\"Of course!\" Gabrielle concurs, \"And we must pray to God that we win. God only knows what would happen if the Reds win\".\n*line_break\n\"What do you suppose would happen if they won?\" \n*line_break\n\"If the Red mob marched into Pamplona? It doesn't bear thinking about,\" but Gabrielle does, \"They would burn all the churches down, take everything they could lay their hands on, and I shouldn't be surprised if all the women were raped!\"\n*line_break\nMaria nods, further convinced that their cause is just.\n*goto next\n\n*label next\n*page_break\nPresently, a group of men is brought into the square by some soldiers. They have their hands on their heads and wide, frightened eyes. There are about 50 of them. Maria recognises one of them. He's a boy she went to school with, Mikel. She points this out to Gabrielle.\n*line_break\n\"Didn't you hear?\" she asks, Maria hadn't, \"He's a Red. His parents are, the whole family I should think. Did you know his uncle was a candidate for the Popular Front?\" Maria didn't.\n*line_break\n\"Yes, I think they're all Red, through and through that family!\"\n*line_break\nAn officer addresses the audience, \"Before you is an assortment of Reds; Anarchists, Communists, Socialists, Trade Unionists,\" the crowd shouts and howls in anger, \"Men and women who would destroy everything we hold dear and turn Spain into a Russian Soviet. The human embodiment of Anti-Spain!\"\n*line_break \nThe crowd are at fever pitch booing and hissing, full of unadulterated hatred.\n*line_break\n\"We are now at war with these people,\" the officer continues, \"The struggle we are engaged in is a fight to the death. We must show no mercy!\"\n*page_break\nThe crowd roars their approval. The officer proceeds to have the Reds lined up against a long wall on the side of the square. The firing squad is only big enough to execute 6 of them at a time. As each set of anti-Spaniards is shot down, the masses erupt, baying for more blood.\n\nA few shout \"Viva la Republica\" as they are executed however they are drowned out by the chanting of \"Viva Espana! Arriba Espana!\" Maria is...\n*choice\n\t#Joining in the cheering.\n\t\t*set marbrutal -5\n\t\t*goto join\n\t#Sickened, she can't watch this.\n\t\t*set marbrutal +5\n\t\t*goto sick\n\t#Enraged, this is not right, she must do something.\n\t\t*set marbrutal +10\n\t\t*goto rage\n*label join\nMaria and Gabrielle shout at the top of their voices, swept up in the euphoria, celebrating each round of killing more fervently than the last. Suddenly, one of the prisoners attempts to make a run for it. Maria recognises him as Mikel.\n\nHe attempts to barge past a guard who blocks his path, however the soldier knocks him to the ground with his rifle butt and proceeds to shoot him there and then. The crowd roars even loader.\n*line_break\nA part of Maria is saddened; he had always seemed like a nice boy. But if he truly was a Red he got what was coming to him see reassures herself, brushing her anxiety to one side. Mikel's mother is weeping loudly. His father holds her tightly, tears in his own eyes, attempting to console her.\n*line_break\nThey don't have to wait long to be put out of their misery. The crack of rifles rings out once again.\n*goto nextjoin\n*label sick\n\"I think I'm going to throw up,\" Maria manages to stutter, \"We've got to go, now\".\n*line_break\n\"What are you talking about?\" replies Gabrielle, grapping her friend by the arm. She had been shouting at the top of her voice like the rest of them, \"You aren't going anywhere, this is an historic moment. We're not missing it\".\n*line_break\nMaria covers her eyes but that insuppressible human instinct to watch something terrible unfolding forces her to part her fingers. Suddenly, one of the prisoners attempts to make a run for it. Maria recognises him as Mikel.\n\nHe attempts to barge past a guard who blocks his path, however the soldier knocks him to the ground with his rifle butt and proceeds to shoot him there and then. The crowd roars even loader. Maria vomits. An old woman standing in front of her turns around and castigates her for having a weak composition. Gabrielle looks away, pretending not to know her.\n*line_break\nMikel's mother is weeping loudly. His father holds her tightly, tears in his own eyes, attempting to console her. They don't have to wait long to be put out of their misery. The crack of rifles rings out once again.\n*goto sicknext\n*label rage\n\"This isn't right, there should at least be a trial of some sort!\" Maria protests.\n*line_break\n\"Are you crazy?\" replies Gabrielle, \"Would the Reds give us a trial? I don't think so! Look what happened to Calvo Sotelo!\"\n*line_break\n\"So are we measuring ourselves against our enemies, and matching their brutality?\"\n*line_break\n\"If necessary, yes!\"\n*line_break\nMaria holds her tongue momentarily. Suddenly, one of the prisoners attempts to make a run for it. Maria recognises him as Mikel.\n\nHe attempts to barge past a guard who blocks his path, however the soldier knocks him to the ground with his rifle butt and proceeds to shoot him there and then. The crowd roars even loader. \n*line_break\nMikel's mother is weeping loudly. His father holds her tightly, tears in his own eyes, attempting to console her.\nThey don't have to wait long to be put out of their misery. The crack of rifles rings out once again. \n*line_break\n\"Well I won't accept that!\" Maria declares. She pushes through the crowd, Gabrielle chasing behind, begging her to stop. She reaches the cordon of soldiers and throws herself at them,\n*line_break\n\"Stop! You can't do this!\"\n*line_break\nThe soldiers apprehend her, \"Another Red wanting to die for what they believe in?\" sneers the officer.\n*line_break\nGabrielle stands speechless as Maria is taken to be lined up with the rest of the prisoners. As she is manhandled to the ground, her large crucifix necklace comes loose.\n*line_break\n\"Wait!\" shouts a voice which Maria doesn't recognise. She looks up to see a uniformed officer of the Falange step forward. He converses quietly with the Army officer. The crowd murmurs, wondering what it happening.\n*line_break\nEventually, after what seems like a lifetime to Maria, the officer calls out, \"Let her go!\"\n*line_break\nThe soldiers push her back into the crowd. Gabrielle rushes over and helps her to her feet. \n*line_break\n\"Come with me,\" says the Falangist, ominously.\n*goto escort\n\n*label nextjoin\n*page_break\nMaria and Gabrielle leave the square still high on patriotic fervour. \n*line_break\n\"I wish we could join up,\" Maria sighs, \"I just feel like we need to do something. The future of Spain is at stake and we're just going to be sitting at home\".\n*line_break\n\"Excuse me ladies,\" calls out a voice behind them, \"But I think I may be of assistance in that regard\".\n*line_break\nThe girls turn to see a young, uniformed Falange officer, \"Allow me to introduce myself, my name Carlos Vidal of the Pamplona Falange\".\n*line_break\n\"A pleasure to meet you Senor Vidal\".\n*line_break\n\"And may I say what a pleasure it is to make your acquaintance of two such delightful young ladies as yourselves\"\n*line_break\nMaria blushes, Gabrielle remains more level headed and enquires, \"You said you could help us?\"\n*line_break\n\"Ah yes, well, you see, given the current situation, the Falange are looking to recruit the finest of Spain's womanhood to serve as nurses. Unfortunately,\" he continues, \"Many of those brave lads queuing up to volunteer may end up as casualties and we need medical staff to care for them. And I couldn't pass up the opportunity to recruit two of the finest examples of Spanish womanhood I've had the good fortune of coming across. So, what do you say?\"\n*set marfas true\n*choice\n\t#Sign up, it's the right thing to do.\n\t\t\"It would be an honour and a privilege to serve Spain in such a way, yes, I will also join up!\"\n\t\t*line_break\n\t\t\"Well that is terrific, come with me ladies and I shall get the paperwork sorted out\".\n\t\t*set medictrain true\n\t\t*goto morocco\n\t#Sign up, she has no choice in this situation.\n\t\t\"Well...\" she hesitates, \"I suppose, yes, I will join Gabrielle. May I ask just one question?\"\n\t\t*line_break\n\t\t\"But of course senorita, what is it that troubles you?\"\n\t\t*line_break\n\t\t\"It will be purely medical work we will be engaged in, will it not?\n\t\t*line_break\n\t\t\"I can assure you senorita that your role as a Falange nurse will be entirely medical, you shall be aiding our wounded and assisting our doctors as best you can. It will be difficult work, but it will be valuable, Christian work\"\n\t\t*line_break\n\t\tWith some persistent doubts, Maria signs up with her friend.\n\t\t*set polmed true\n\t\t*goto morocco\n\n*label sicknext\n*page_break\n\"What were you thinking?\" Gabrielle demands.\n*line_break\n\"What do you mean? It was disgusting!\"\n*line_break\n\"Don't let people hear you saying that!\" Gabrielle grabs her friend, \"They'll think you're a Red sympathiser!\"\n*line_break\nBefore Maria can reply, the two girls are approached by young, uniformed Falange officer.\n*line_break\n\"Allow me to introduce myself, my name Carlos Vidal of the Pamplona Falange\".\n*line_break\n\"A pleasure to meet you Senor Vidal\".\n*line_break\n\"And may I say what a pleasure it is to make the acquaintance of two such delightful young ladies as yourselves\"\n*line_break\nMaria blushes, Gabrielle remains more level headed and enquires, \"For what reason?\"\n*line_break\n\"Ah yes, well, you see, given the current situation, the Falange are looking to recruit the finest of Spain's womanhood to serve as nurses. Unfortunately,\" he continues, \"Many of those brave lads queuing up to volunteer may end up as casualties and we need medical staff to care for them. And I couldn't pass up the opportunity to recruit two of the finest examples of Spanish womanhood I've had the good fortune of coming across\".\n*line_break\nMaria isn't sure, she looks at Gabrielle, trying to convey her doubt in her eyes. She can't say anything in front of the Falangist. Gabrielle either doesn't read her meaning or deliberately ignores it, as she turns, smiling, to Vidal, \"I would be delighted Senor Vidal, I've been waiting for such an opportunity to come along!\"\n*line_break\n\"Perfect!\" Vidal responds, \"And you senorita?\" he says, looking to Maria. She doesn't know how to respond.\n*choice\n\t#Sign up, it's the right thing to do.\n\t\t\"It would be an honour and a privilege to serve Spain in such a way, yes, I will also join up!\"\n\t\t*line_break\n\t\t\"Well that is terrific, come with me ladies and I shall get the paperwork sorted out\".\n\t\t*set medictrain true\n\t\t*goto morocco\n\t#Sign up, she has no choice in this situation.\n\t\t\"Well...\" she hesitates, \"I suppose, yes, I will join Gabrielle. May I ask just one question?\"\n\t\t*line_break\n\t\t\"But of course senorita, what is it that troubles you?\"\n\t\t*line_break\n\t\t\"It will be purely medical work we will be engaged in, will it not?\n\t\t*line_break\n\t\t\"I can assure you senorita that your role as a Falange nurse will be entirely medical, you shall be aiding our wounded and assisting our doctors as best you can. It will be difficult work, but it will be valuable, Christian work\"\n\t\t*line_break\n\t\tWith some persistent doubts, Maria signs up with her friend.\n\t\t*set polmed true\n\t\t*goto morocco\n\t#Refuse to sign up, she can't sign up for something she doesn't believe in.\n\t\t\"Regrettably Senor Vidal, I can't make such a commitment right now...\"\n\t\t*line_break\n\t\tGabrielle is taken aback and makes her disapproval clear with her expression, Vidal on the other hand is calm, \"Are you sure Senorita? I am quite sure you're passing up a great opportunity\".\n\t\t*line_break\n\t\t\"I cannot, I would have to ask my parents...\"\n\t\t*line_break\n\t\t\"Where do you live, we could go and ask them now?\" Vidal's tone is slightly more forceful now.\n\t\t*line_break\n\t\t\"May I just have a word with my friend?\" Gabrielle intervenes, taking her to one side, \"Look, Maria, I don't know what's got into you but if you're not careful, you're going to end up like the Reds in the square, you don't say no to a Falange officer like him. He could do whatever he likes to you if he wanted\".\n\t\t*line_break\n\t\t\"What do you want me to do? I'm not joining the Falange\".\n\t\t*line_break\n\t\t\"Look, it's not as if you'll be killing anymore, quite the opposite, you'll be helping people, caring for them, that's all. What can you object to about that?\"\n\t\t*line_break\n\t\tMaria hesitates for a moment...\n\t\t*choice\n\t\t\t#Sign up, she has no choice in this situation.\n\t\t\t\t\"Well...\" she hesitates, \"I suppose, yes, I will join Gabrielle. May I ask just one question?\"\n\t\t\t\t*line_break\n\t\t\t\t\"But of course senorita, what is it that troubles you?\"\n\t\t\t\t*line_break\n\t\t\t\t\"It will be purely medical work we will be engaged in, will it not?\n\t\t\t\t*line_break\n\t\t\t\t\"I can assure you senorita that your role as a Falange nurse will be entirely medical, you shall be aiding our wounded and assisting our doctors as best you can. It will be difficult work, but it will be valuable, Christian work\"\n\t\t\t\t*line_break\n\t\t\t\tWith some persistent doubts, Maria signs up with her friend.\n\t\t\t\t*set polmed true\n\t\t\t\t*goto morocco\n\t\t\t#Refuse, this is a matter of principle.\n\t\t\t\t\"No, I won't do it!\"\n\t\t\t\t*line_break\n\t\t\t\tVidal hears this and responds by striding over, pistol drawn, and grabbing Maria by violently by the arm, \"You are coming with us Senorita, whether you want to or not!\"\n\t\t\t\t*line_break\n\t\t\t\tAnd that was that, Maria Farfan is to be a nurse in the Falange.\n\t\t\t\t*set polmed true\n\t\t\t\t*set forcedto true\n\t\t\t\t*goto morocco\n*label escort\n*page_break\nThey follow the Falangist, who introduces himself as Carlos Vidal. Once they are clear of the crowd and in a quieter sidestreet, Maria regains her composure and asks, \"Why did you do that?\"\n*line_break\n\"I could see you weren't a Red Senorita\".\n*line_break\n\"How could you tell?\"\n*line_break\n\"The crucifix,\" he indicates. It had always been considered a family good luck charm, it seemed to have worked.\n*line_break\n\"But with that little scene you kicked up,\" Vidal continues, \"I shouldn't think showing your face around here will do you much good, not in this atmosphere\".\n*line_break \n\"What do you suggest?\" asks Maria anxiously.\n*line_break\nVidal pauses for a moment before continuing, keeping the girls in suspense, \"Well, you see, given the current situation, the Falange are looking to recruit the finest of Spain's womanhood to serve as nurses. Unfortunately,\" he continues, \"Many of those brave lads queuing up to volunteer may end up as casualties and we need medical staff to care for them. And I couldn't pass up the opportunity to recruit two of the finest examples of Spanish womanhood I've had the good fortune of coming across\".\n*line_break\nMaria isn't sure, she looks at Gabrielle, trying to convey her doubt in her eyes. She can't say anything in front of the Falangist. Gabrielle either doesn't read her meaning or deliberately ignores it, as she turns, smiling, to Vidal, \"I would be delighted Senor Vidal, I've been waiting for such an opportunity to come along!\"\n*line_break\n\"Perfect!\" Vidal responds, \"And you senorita?\" he says, looking to Maria. She doesn't know how to respond.\n*choice\n\t#Sign up, it's the right thing to do.\n\t\t\"It would be an honour and a privilege to serve Spain in such a way, yes, I will also join up!\"\n\t\t*line_break\n\t\t\"Well that is terrific, come with me ladies and I shall get the paperwork sorted out\".\n\t\t*set medictrain true\n\t\t*goto morocco\n\t#Sign up, she has no choice in this situation.\n\t\t\"Well...\" she hesitates, \"I suppose, yes, I will join Gabrielle. May I ask just one question?\"\n\t\t*line_break\n\t\t\"But of course senorita, what is it that troubles you?\"\n\t\t*line_break\n\t\t\"It will be purely medical work we will be engaged in, will it not?\n\t\t*line_break\n\t\t\"I can assure you senorita that your role as a Falange nurse will be entirely medical, you shall be aiding our wounded and assisting our doctors as best you can. It will be difficult work, but it will be valuable, Christian work\"\n\t\t*line_break\n\t\tWith some persistent doubts, Maria signs up with her friend.\n\t\t*set polmed true\n\t\t*goto morocco\n\t#Refuse to sign up, she can't sign up for something she doesn't believe in.\n\t\t\"Regrettably Senor Vidal, I can't make such a commitment right now...\"\n\t\t*line_break\n\t\tGabrielle is taken aback and makes her disapproval clear with her expression, Vidal on the other hand is calm, \"Are you sure Senorita? I am quite sure you're passing up a great opportunity\".\n\t\t*line_break\n\t\t\"I cannot, I would have to ask my parents...\"\n\t\t*line_break\n\t\t\"Where do you live, we could go and ask them now?\" Vidal's tone is slightly more forceful now.\n\t\t*line_break\n\t\t\"May I just have a word with my friend?\" Gabrielle intervenes, taking her to one side, \"Look, Maria, I don't know what's got into you but you very nearly ended up like the Reds in the square. I don't know what's got in to you! You don't say no to a Falange officer like him. He could do whatever he likes to you if he wanted\".\n\t\t*line_break\n\t\t\"What do you want me to do? I'm not joining the Falange\".\n\t\t*line_break\n\t\t\"Look, it's not as if you'll be killing anymore, quite the opposite, you'll be helping people, caring for them, that's all. What can you object to about that?\"\n\t\t*line_break\n\t\tMaria hesitates for a moment...\n\t\t*choice\n\t\t\t#Sign up, she has no choice in this situation.\n\t\t\t\t\"Well...\" she hesitates, \"I suppose, yes, I will join Gabrielle. May I ask just one question?\"\n\t\t\t\t*line_break\n\t\t\t\t\"But of course senorita, what is it that troubles you?\"\n\t\t\t\t*line_break\n\t\t\t\t\"It will be purely medical work we will be engaged in, will it not?\n\t\t\t\t*line_break\n\t\t\t\t\"I can assure you senorita that your role as a Falange nurse will be entirely medical, you shall be aiding our wounded and assisting our doctors as best you can. It will be difficult work, but it will be valuable, Christian work\"\n\t\t\t\t*line_break\n\t\t\t\tWith some persistent doubts, Maria signs up with her friend.\n\t\t\t\t*set polmed true\n\t\t\t\t*goto morocco\n\t\t\t#Refuse, this is a matter of principle.\n\t\t\t\t\"No, I won't do it!\"\n\t\t\t\t*line_break\n\t\t\t\tVidal hears this and responds by striding over, pistol drawn, and grabbing Maria by violently by the arm, \"You are coming with us Senorita, whether you want to or not!\"\n\t\t\t\t*line_break\n\t\t\t\tAnd that was that, Maria Farfan is to be a nurse in the Falange.\n\t\t\t\t*set polmed true\n\t\t\t\t*set forcedto true\n\t\t\t\t*goto morocco\n*label morocco\n*page_break\n*image number3.png\n9.47 A.M.\n*line_break\n18th July 1936\n*line_break\nAn airfield in Spanish Morocco\n*line_break\nFlying Officer Jose De La Rosa\n\nDe La Rosa and Joaquin cross the sun-soaked runway to the mess room. The air is still. Inside, the various pilots, ground crew and staff of the Spanish Air Force airfield have gathered. It had been clear that something was afoot yesterday but it hadn't been until this morning that the Rising had begun in Spain itself. The men murmur frenetically, all sorts of rumours circulating. \n\nDe La Rosa may not have been one of the highest ranking officers at the base, but he certainly had the respect of his colleagues due to his undeniable talent. He is also a fervent Nationalist. He and his wingman Joaquin have just heard over the radio that the Air Force has declared for the government, against the Rising. \n*page_break\n\"Gentlemen please...\" a hush descends, \"The situation is as serious as we feared. The Army has risen up against the Red government in Madrid\".\n*line_break\nDe La Rosa's audience erupts into life, a mixture of animation and anxiety.\n*line_break\n\"Let the man speak!\" Joaquin shouts. \n*line_break\nAs the chatter dies down again, the Flying Officer continues, \"The Air Force has officially declared for the Republic,\" Once again the room is full of noise but Jose carries on regardless, \"This is an historic moment. We truly are a blessed generation, for we have been presented with the unique opportunity to sweep away the forces that have slowly brought our once proud nation to ruin. The separatists, the Communists, the Liberals, Anti-Spain! The coming fight will be about nothing less than the future of Spain. I extoll you to join the National Crusade and save our country. Viva Espana!\" \n*page_break\nThere is now chaos and several men nearly come to blows, pulled apart by their comrades. It appears the room is split perhaps 50:50 between those for and against the Republic. From the Republican side, De La Rosa's wing commander, Vasquez, speaks up, \n*line_break\n\"Surely, Flying Officer, as a military man, a man of honour, you are bound by your orders. And your orders are to fight for the Republic,\" Vasquez's supporters roar their approval, \"Any other action would surely result in a court martial. The penalty for disobeying a direct order is death!\"\n*line_break\nWas that a threat? It is clear Vasquez enjoys the support of the Republican half of the room, a few shouts of \"Viva La Republica!\" go up. The situation is tense and finely poised. De La Rosa suspects that Vasquez's following are not necessarily committed Republicans, most likely they aren't politically aware. They are probably siding with Vasquez out of instinct, or personal loyalties. Does that make them more or less dangerous? With persuasion could they be brought round?\n*choice\n\t#Try and reason with Vasquez. If he can be won round to the reality of the situation, the rest will follow.\n\t\t*goto reason\n\t#Take Vasquez outside and shoot him. Leaderless, the mob will fall into line.\n\t\t*goto shoot\n*label shoot\n\"Vasquez, may I have a word with you,\" De La Rosa enquires, \"In private\".\n*set vasdead true\n*line_break\nVasquez nods and leaves the mess hall, De La Rosa follows, nodding to Joaquin. After going through the double doors, De La Rosa kicks Vasquez in the back of the knee, bringing him to the ground. Before Vasquez has a chance to react, De La Rosa draws his sidearm and shoots his superior in the back of the head. The shot rings out across the still morning. De La Rosa holsters his pistol and wipes blood and brains off his glove.\n*page_break\nThe mess hall is quiet when he returns. \n*line_break\n\"Would anyone else like to declare for the Republic?\" he asks. No one does. As he turns to leave however, a member of the ground crew speaks up,\n*line_break\n\"Yes, I would!\" he says, standing defiantly.\n*line_break\n\"Oh really?\"\n*line_break\n\"And me!\" another rises, then 3 more of them. The bravery of these men impresses De La Rosa, but he feels no sympathy for their cause. What action does he take?\n*choice\n\t#Apprehend them.\n\t\tDe La Rosa has the men seized and locked in a storage unit.\n\t\t*goto nextbit\n\t#Execute them.\n\t\tDe La Rosa has the 5 mechanics executed by firing squad immediately. The looks on their faces as they are lined up are a mixture of resolution and sheer terror. At the moment De La Rosa orders his men to fire, one is sobbing, another outright wailing. \n\t\t*line_break\n\t\tThe more resolute mechanic, the one who stood up first, shouts, \"Viva la Republica!\" at the moment of execution.\n\t\t\n\t\tDe La Rosa thinks he should feel satisfaction as the 5 men slump simultaneously to the ground. He told himself that he should. But he didn't. He had never seen dead bodies before. They just lay there, limp and lifeless, not looking real.\n\t\t*set prisdead true\n\t\t*goto nextbit\n*label reason\n\"I'm afraid obeying those particular orders is simply not an option for us,\" De La Rosa responds, \"Not only because the Red government in Madrid has no legitimacy...\"\n*line_break\n\"Bollocks!\" interjects Vasquez.\n*line_break\n\"Well, if on principal you don't support the Rising, think about the practicalities. The Army of Africa has declared for the rebellion. Army units will likely be here shortly, especially given the fact the Air Force is now officially their enemy. Therefore you are all faced with a very simple choice. Either die here today or fight for Spain. We have no hope of fighting off Foreign Legionnaires, with only a few rifles and even less ammunition. We don't have enough fuel to fly back to Spain. So, once again, the choice is yours\".\n*line_break\nThe Republican half of the room considers these words.\n*line_break\n\"So,\" he continues, \"Are there any of you willing to give your lives for the Republic today?\"\n*line_break\nA member of the ground crew speaks up, \"Yes, I would!\" he says, standing defiantly.\n*line_break\n\"Oh really?\"\n*line_break\n\"And me!\" another rises, then 3 more of them. Crucially Vasquez is not among them. He's got more sense than that. The bravery of these men impresses De La Rosa, but he feels no sympathy for their cause. What action does he take?\n*choice\n\t#Apprehend them.\n\t\tDe La Rosa has the men seized and locked in a storage unit.\n\t\t*goto nextbit\n\t#Execute them.\n\t\tDe La Rosa has the 5 mechanics executed by firing squad immediately. The looks on their faces as they are lined up are a mixture of resolution and sheer terror. At the moment De La Rosa orders his men to fire, one is sobbing, another outright wailing. \n\t\t*line_break\n\t\tThe more resolute mechanic, the one who stood up first, shouts, \"Viva la Republica!\" at the moment of execution.\n\t\t\n\t\tDe La Rosa thinks he should feel satisfaction as the 5 men slump simultaneously to the ground. He tells himself that he should. But he doesn't. He had never seen dead bodies before today. They just lay there, limp and lifeless, not looking real.\n\t\t*set prisdead true\n\t\t*goto nextbit\n\t\n\t\n*label nextbit\n*page_break\nJoaquin asks De La Rosa discreetly, \"What about Lopez?\"\n*line_break\nThe Flying Officer allows himself a wry smile. He has already decided what he is going to do about the aged and ineffectual Colonel Lopez, commander of the air base. As was his habit, he had not yet risen from his slumber. De La Rosa had decided to...\n*choice\n\t#Murder him.\n\t\t*goto murdlop\n\t#Arrest him.\n\t\t*set dlrbrutal -5\n\t\t*goto arrlop\n\t#Inform him of developments.\n\t\t*set dlrbrutal +5\n\t\t*goto inflop\n\t\t\n*label murdlop\nJoaquin protests but De La Rosa's mind is made up. He enters Lopez's quarters to find him still asleep. He lies, snoring gently. He can't be younger than 60 years old. But De La Rosa is convinced of his Republican allegiance. He raises his pistol and aims it at the old man's head. He hesitates for just a second. Should he do this?\n*choice\n\t#Yes, kill him.\n\t\t*set dlrbrutal -10\n\t\tDe La Rosa feels no remorse when he pulls the trigger. The Colonel is dead. He holsters his pistol and slowly walks away.\n\t\t*set lopdead true\n\t\t*goto endofmor\n\t#No, arrest him.\n\t\t*set dlrbrutal -5\n\t\tDe La Rosa kicks the Colonel's bed to wake him, pistol still trained on its target. \n\t\t*line_break\n\t\t\"What is the meaning of this?\" Lopez exclaims, looking rather pathetic in his pyjamas.\n\t\t*line_break\n\t\t\"Regrettably Colonel, I'm arresting you, in the name of the Rising\".\n\t\t*line_break\n\t\tThe aged officer makes a lunge for his bedside table, upon which his pistol lies. Before he can reach it, De La Rosa has drawn his own sidearm and pulled the trigger. The old man collapses, clutching his stomach. Jose quickly picks up Lopez's weapon, using it to finish his commander off. Blood splatters back onto his own face. He slowly holsters his pistol and walks away.\n\t\t*set lopdead true\n\t\t*goto endofmor\n\t#No, inform him of developments.\n\t\t*set dlrbrutal +5  \t\t\n\t\tDe La Rosa clears his throat loudly to wake the Colonel. He has holstered his pistol  \n\t\t*line_break\n\t\t\"What is it?\" Lopez is slightly taken aback, \"What's going on?\"\n\t\t*line_break\n\t\t\"Important news, sir!\"\n\t\t*line_break\n\t\t\"Well what is it? Spit it out man!\"\n\t\t*line_break\n\t\t\"Well Sir,\" he pauses for a moment, \"There has been a rising by the Army against the Republic\".\n\t\t*line_break\n\t\tLopez says nothing. He looks worried. De La Rosa continues, \"The Air Force has declared for the Republic. However, the officers and men feel it best, given our geographic situation, that we side with the Nationalists\".\n\t\t*line_break\n\t\tAfter a lengthy pause, clearly weighing up his options, he replies, \"Yes, I suppose that is perhaps the wisest course of action. I shall inspect the men in half an hour, have them ready\".\n\t\t*line_break\n\t\t\"Very good sir\".\n\t\t*goto endofmor\n\n\n*label arrlop\nDe La Rosa bursts into Lopez's quarters and he awakes with a start.\n*line_break\n\"What is the meaning of this?\" he exclaims, looking rather pathetic in his pyjamas.\n*line_break\n\"Regrettably Lopez, I'm arresting you, in the name of the Rising\".\n*line_break\nThe aged officer makes a lunge for his bedside table, upon which his pistol lies. Before he can reach it, De La Rosa has drawn his own sidearm and pulled the trigger. The old man collapses, clutching his stomach. Jose quickly picks up Lopez's weapon, using it to finish his commander off. Blood splatters back onto his own face. He slowly holsters his pistol and walks away.\n*set lopdead true\n*goto endofmor\n*label inflop\nDe La Rosa knocks on the Colonel's door. There is no response. He knocks again, loudly. He hears the old man awake with a start.\n*line_break\n\"What is it?\" he calls.\n*line_break\n\"Important news, sir!\"\n*line_break\n\"Yes?\"\n*line_break\n\"May I come in, sir?\"\n*line_break\n\"That won't be necessary, just tell me\".\n*line_break\n\"Well Sir,\" he pauses for a moment, \"There has been a rising by the Army against the Republic\".\n*line_break\nSilence from the other side of the door. De La Rosa continues, \"The Air Force has declared for the Republic. However, the officers and men feel it best, given our geographic situation, that we side with the Nationalists\".\n*line_break\nAfter a lengthy pause, he replies, \"Yes, I suppose that is perhaps the wisest course of action. I shall inspect the men in half an hour, have them ready\".\n*line_break\n\"Very good sir\".\n*goto endofmor\n*label endofmor\n*page_break\nDe La Rosa and Joaquin watch the arrival of the Army convoy. \n*line_break\n\"Open the gates!\" Joaquin orders.\n*line_break\nThe lorries park up and troops of the Spanish Foreign Legion pour out. An officer approaches them.\n*line_break\n\"Flying Officer Jose De La Rosa, sir, I wish to declare the allegiance of this squadron to the Rising\".\n*line_break\n\"That's all well and good, Flying Officer, however the Air Force has declared for the Reds, this base is now Army property. Do you know the location of a Colonel Lopez?\"\n*line_break\n*if lopdead = true\n\t\"He is dead Captain\".\n\t*line_break\n\t\"Doing our job for us? You'll go far De La Rosa! Any other Reds?\"\n\t*if prisdead = true\n\t\t*line_break\n\t\t\"Yes Sir, they have also been dealt with\".\n\t\t*line_break\n\t\t\"Stellar work Flying Officer! I shall pass on the good news to my superiors and I shouldn't be surprised if your own name gets a mention. We need people like you if we are to win the quick victory Spain needs\".\n\t\t*goto barca\n\t*if prisdead = false\n\t\t*line_break\n\t\t\"Yes Sir, we are holding them in the storage rooms\".\n\t\t*line_break\n\t\t\"Very good, we shall have them executed at once!\"\n\t\t*line_break\n\t\tHow does De La Rosa react?\n\t\t*choice\n\t\t\t#Protest.\n\t\t\t\t\"But Sir...\" Jose begins to protest.\n\t\t\t\t*line_break\n\t\t\t\t\"Flying Officer, the Air Force is ridden with Communists, anarchists, Freemasons, Reds of all sorts. The only way to deal with such detritus is extermination. If you truly are committed to the crusade against anti-Spain, you will understand the necessity of our brutality\".\n\t\t\t\t*goto execution\n\t\t\t#Acquiesce.\n\t\t\t\t\"Very good Sir, I will show you where they are being held\".\n\t\t\t\t*goto execution\n*if lopdead = false\n\t\"Yes, he is currently in his quarters, preparing to carry out an inspection. He has declared for the Rising\".\n\t*line_break\n\t\"He is a Red. We shall execute him immediately. Are there any other Reds on the base?\"\n\t*if prisdead = true\n\t\t*line_break\n\t\t\"Yes Sir, they have also been dealt with\".\n\t\t*line_break\n\t\t\"Stellar work Flying Officer! I shall pass on the good news to my superiors and I shouldn't be surprised if your own name gets a mention. We need people like you if we are to win the quick victory Spain needs. Now, take me to Lopez\".\n\t\t*line_break\n\t\tHow does De La Rosa react?\n\t\t*choice\n\t\t\t#Protest.\n\t\t\t\t\"But Sir...\" Jose begins to protest.\n\t\t\t\t*line_break\n\t\t\t\t\"Flying Officer, the Air Force is ridden with Communists, anarchists, Freemasons, Reds of all sorts. The only way to deal with such detritus is extermination. If you truly are committed to the crusade against anti-Spain, you will understand the necessity of our brutality\".\n\t\t\t\t*goto executionjustlop\n\t\t\t#Acquiesce.\n\t\t\t\t\"Very good Sir, I will show you where they are being held\".\n\t\t\t\t*goto executionjustlop\t\t\t\n\t*if prisdead = false\n\t\t*line_break\n\t\t\"Yes Sir, we are holding them in the storage rooms\".\n\t\t*line_break\n\t\t\"Very good, we shall have them executed at once!\"\n\t\t*line_break\n\t\tHow does De La Rosa react?\n\t\t*choice\n\t\t\t#Protest.\n\t\t\t\t\"But Sir...\" Jose begins to protest.\n\t\t\t\t*line_break\n\t\t\t\t\"Flying Officer, the Air Force is ridden with Communists, anarchists, Freemasons, Reds of all sorts. The only way to deal with such detritus is extermination. If you truly are committed to the crusade against anti-Spain, you will understand the necessity of our brutality\".\n\t\t\t\t*goto execwlop\n\t\t\t#Acquiesce.\n\t\t\t\t\"Very good Sir, I will show you where they are being held\".\n\t\t\t\t*goto execwlop\t\t\n*label execution\t\t\t\n*page_break\nThe 5 mechanics are executed by firing squad immediately. The looks on their faces as they are lined up are a mixture of resolution and sheer terror. At the moment the order to fire is given, one is sobbing, another outright wailing. \n*line_break\nThe more resolute mechanic, the one who stood up first, shouts, \"Viva la Republica!\" at the moment of execution.\n\t\t\nDe La Rosa thinks he should feel satisfaction as the 5 men slump simultaneously to the ground. He tells himself that he should. But he doesn't. He has never seen dead bodies before today. They just lay there, limp and lifeless, not looking real.\n*goto barca\n*label executionjustlop\n*page_break\nA half-dressed Lopez is shoved up against a wall by the Legionnaires. A 5 man firing squad seems a bit excessive. The old man stands tall and to attention. He looks dignified. Until he is shot. Nobody who is shot has dignity in death.\n*goto barca\n*label execwlop\n*page_break\nThe 5 mechanics and Lopez are executed by firing squad immediately. The looks on their faces as they are lined up are a mixture of resolution and sheer terror. The old man stands tall and to attention. He looks dignified. At the moment the order to fire is given, one of the mechanics is sobbing, another outright wailing. \n*line_break\nThe more resolute mechanic, the one who stood up first, shouts, \"Viva la Republica!\" at the moment of execution.\n\t\t\nDe La Rosa thinks he should feel satisfaction as the 6 men slump simultaneously to the ground. He tells himself that he should. But he doesn't. He has never seen dead bodies before. They just lay there, limp and lifeless, not looking real. Lopez had looked dignified. He doesn't anymore. Nobody who is shot has dignity in death.\n*goto barca\n*label barca\n*page_break\n11.47 A.M.\n*line_break\n19th July 1936\n*line_break\nBarcelona, Catalonia\n*line_break\nMiliciana Alba Reyes\n\nAlba Reyes is crouched behind the barricade feeling more scared than she ever has in her life. It is a far cry from the excitement and enthusiasm that had gripped the city the previous night. The Unions had taken control of Barcelona in response to the Nationalist Rising and arms had been distributed to the workers. \n*line_break\nAlba and her colleagues worked in a textile factory, at least until yesterday. She had spent most of her time using sowing machines. Now she found herself with a heavy and cumbersome rifle in her hands.\n*page_break\nLike many of Barcelona's poorest slum dwellers, Alba was a member of the anarchist trade union, the CNT. She had worked since she was 11, been a Union member since she was 15. That was over 2 years ago now.\n\nA bullet strikes the barricade centimetres from her head, causing her to recoil and retreat further into her shell. She tries to block out what is happening around her. The stench of her own piss wrests her back to reality. That and a familiar voice shouting,\n*line_break\n\"Alba! Alba!\"\n*line_break\nShe snaps out of her inertia and turns to...\n*choice\n\t#Her best friend Isabel.\n\t\t*set friend \"Isabel\"\n\t\t*goto friendbit\n\t#Her boyfriend Jorge.\n\t\t*set friend \"Jorge\"\n\t\t*goto friendbit\n*label friendbit\n\"Alba!\" $!{friend} shouts from a few metres away, struggling to be heard above the din, \"What's wrong?\"\n*line_break\n\"Nothing,\" she replies, and as if to emphasise the point she pops up and fires a shot off in the general direction of the enemy. She isn't holding her rifle properly and it kicks back painfully against her shoulder. She ducks back down and attempts to work the bolt to load the next round.\n*line_break\nAn hour ago she had never held a gun before, now she was fighting with one. $!{friend} shuffles over and shows her how to work the bolt for a third time, pull the bolt up and back, then push it forward and down.\n*page_break\nPresently, an enemy machine gun opens fire and they all duck a little lower. Manning this barricade are the workers of Level 09 of the Harbour textile works. There are about 40 of them, they have known one another and worked together for years. They wear their blue factory overalls, only distinguished as combatants by their red and black CNT armbands. They huddle behind the makeshift barricade, constructed from paving stones and furniture. \n\nThat morning, the Army had attempted to secure the city. So far, they have been held back.\n*line_break\n\"We've got to do something! We can't just sit here!\" shouts Salazar, one of Alba's co-workers.\n*line_break\n\"We can't hold them on our own,\" another, Marzo, replies, \"We've got to make a run for it\".\n*line_break\n\"Coward!\" retorts $!{friend},\"We can't let them through!\"\n*line_break\nAnarchists are all for collective leadership but in this situation it could be a bit tricky to hold a vote. Alba decides she should...\n*choice\n\t#Demand they hold their ground, not one step backwards.\n\t\t*goto demand\n\t#Encourage a retreat, staying here's suicide.\n\t\t*goto retreat\n\t#Try and achieve a consensus, otherwise they risk splitting the group.\n\t\t*goto vote\n*label demand\n\"Marzo you spineless shit, we're not going anywhere!\"\n*line_break\n\"Fuck off Reyes!\" Marzo replies, \"What would a woman know about war anyway?\"\n*line_break\n\"I know that if all our fighters are like you this war won't last very long!\" \n*line_break\nThat shuts him up, $!{friend} pats Alba on the shoulder. The group sit tight for now.\n*label lorry\n*page_break\nA heavy goods lorry daubed with CNT on the sides turns at the crossroads and approaches them slowly. Plates of steel have been welded onto the sides. Bullets ping off. 10 more CNT militiamen and women jump off the back and join Alba's group at the barricade.\n*line_break\n\"What's the situation?\" one of them asks.\n*line_break\nAlba, who has unwittingly become spokeswoman for the group, replies, \"We're pinned by a Fascist machine gun in the commerce building,\" she points. As if to emphasise the point, said machine gun opens up once again, its violent chatter causing the group to duck even lower.\n*line_break\nThe militiaman nods and dashes back to the lorry, conversing briefly with the driver. He returns, \"We'll sort it out,\" he declares confidently.\n*line_break\nThe lorry revs up its engine and sets off, heading straight for the enemy position. The machine gun switches target to the approaching behemoth however the bullets bounce harmlessly away.\n\nWith an almighty crash, the lorry slams into the commerce building, throwing up a cloud of dust and masonry. The facade of the building collapses crushing the fascists, the lorry crumpling under the weight. The driver collapses out of the cab with a severe head wound. A couple of militiamen run over and drag him back behind the relative safety of the barricade. He's slipping in and out of consciousness.\n*goto arty\n*label retreat\n\"Marzo is right,\" Alba interjects, \"Losing our lives here will do nobody any favours\".\n*line_break\n\"Exactly!\" Marzo concurs triumphantly.\n*line_break\n\"We can't just make a run for it,\" Alba continues, \"We've got to be organised. One group should fire and cover the others while they retreat\".\n*line_break\n\"Ok, Reyes, I'll lead the first group out, you cover us,\" says Marzo, clearly hoping to get out as quickly as possible.\n*line_break\nAfter deciding who will go, Alba gives the order for covering fire and Marzo and around half of the 40 strong group sprint off in the direction of some houses about 200 metres up the road. As soon as the militia leave the cover of the barricade, the fascist machine gun opens up again. Its fire is indiscriminate and very quickly Alba sees her comrades mowed down. The inaccurate cover fire is totally ineffective. Only a handful of them make it to the safety of the house.\n*set militia -10\n*goto lorry\n*label vote\n\"We should have a vote,\" Alba insists.\n*line_break\n\"What? Are you joking?\" Salazar replies.\n*line_break\n\"How else are we to make decisions?\" Reyes responds, \"Are we willing to cast aside our principles in wartime?\"\n*line_break\n\"Look,\" Marzo begins, \"How are we even going to organise this?\" He rises to his feet, still crouched, making his way over to Alba, \"It's just not...\" midsentence, he is shot in the head and killed instantly.\n*line_break\n\"Oh shit!\" Salazar exclaims, \"See what your vote has achieved Reyes?\"\n*line_break\n\"Fuck off Salazar!\" $!{friend} responds, defending Alba, \"It's the fascists fault, not hers! She didn't shot him!\"\n*line_break\nA tense silence follows. Silence if you don't take into account the constant fire being laid down on their position.\n*set militia -1\n*goto lorry\n*label arty\n*page_break\nThere is no time for contemplation however as firing begins again. \n*line_break\n\"Shit, they've got artillery!\" $!{friend} warns.\n*line_break\nFascist soldiers are taking up position in a house opposite, a field gun in the road outside. \n*line_break\n\"Take cover!\"\n*line_break\nThe first shell whistles past the barricade, slamming into a building behind them. They are immersed in dust and brickwork. The blast is the loudest sound that Alba has ever heard. Her ears are ringing to the extent that she is temporarily (she hopes) deaf. \n*set militia -2\n\nA few of their number turn to run, a couple of them are shot down, Marzo included. Salazar is clutching his head, he's been hit by a piece of falling masonry. Alba peeks over the barricade. The gun crew is loading another shell. Surely they wouldn't survive a direct hit. They're all looking at Alba now. Nobody knows what to do and now they need leadership. There are literally seconds to make a decision and her ears are still ringing.\n*choice\n\t#Run!\n\t\t*goto runaway\n\t#Open fire!\n\t\t*goto openfire\n\t#Cover me, I've got an idea!\n\t\t*goto idea\n\t\t\n*label runaway\nThey don't need a second invitation. Sprinting as fast as they can up the street, they are miraculously able to dodge the majority of the fascist fire. The injured lorry driver has been forgotten in the rush. Breathless, they reach the relative safety of the next anarchist barricade 500 metres up the road. \n*set militia -4\n*line_break\n\"What's going on?\" demands the commander of the position.\n*line_break\n\"They've got artillery,\" Alba pants, \"We didn't stand a chance!\"\n*line_break\nShe does a quick headcount. Of the 40 or so who had made up the syndicate this morning, there are ${militia} left, a few, like Salazar, with minor injuries. $!{friend} congratulates Alba, \n*line_break\n\"You did well Alba, very well. We could have lost a lot more people there\".\n\nThe militiaman in charge cuts short the chit chat,\n*line_break\n\"We've got this position covered, but we need more men over at the telephone exchange. The fascists have barricaded themselves in there\".\n*line_break\nAlba looks around at the group. Salazar nods his approval. $!{friend} is obviously on her side. For the moment, she has the support of the group.\n*line_break\n\"Right, we're going to the telephone exchange. The fascists are trapped there. Barcelona, hell the whole of Spain, is there for the taking. We just need to seize this opportunity. Who's with me?\"\n*line_break\nThey all are.\n*set albalead true\n*finish\n*label openfire\nThey all open fire in a concerted attempt to suppress the field gun. However, the gun crew crouch low behind the fire shield of the artillery piece and get their second round away. \n\nIt strikes the left section of the barricade and throws the militia to the ground. Dazed, Alba looks over to where the shell hit. As the dust settles, it looks as if at least 5 of her comrades are down. There are several dismembered limbs lying around. The heroic lorry driver is missing the lower half of her body.\n*set militia -10\n*line_break\n\"Run!\" Alba shouts, \"Run for it!\" \n*line_break\nThey don't need a second invitation and they are running . But Alba isn't joining them. She wants to but, to her horror, she realises she isn't able to stand. She is willing herself to but her body isn't responding. She feels a dull, throbbing pain in the back of her head. She puts her hand to it and pulls it away, seeing it is covered in blood. \n*line_break\n\"Alba, are you alright?\" $!{friend} is in front of her now. She can't formulate a sentence with which to reply. She is in shock. $!{friend} pulls her to her feet and does their best to drag Alba along with her. \n\nA third shell strikes the barricade and the pair are knocked off their feet. $!{friend} desperately lifts Alba up. Salazar has run back and is helping. Miraculously, they reach the relative safety of the next anarchist barricade, 500 metres up the road. Alba has regained a level of her senses. Salazar explains to the commander of the position that the fascists have artillery. Alba's head is bandaged. She looks around. Of the 40 or so who had made up the syndicate this morning, ${militia} are left. Almost everyone has a wound of some sort, ranging from cuts and bruises to a broken arm. She makes a conscious effort to tune into Salazar's conversation,\n*line_break\n\"We've got this position covered,\" the commander begins, \"But we need more men over at the telephone exchange. The fascists have barricaded themselves in there\".\n*line_break\nSalazar looks around the group. For the moment, he has the support of the group.\n*line_break\n\"Right, we're going to the telephone exchange. The fascists are trapped there. I know we've had a rough ride but the fight isn't over. Who's with me?\"\n*line_break\nThey all are.\n*finish\n*label idea\nThe militia open fire on the soldiers, keeping them pinned down whilst Alba goes to leap over the barricade. Just as she is about to vault the structure, $!{friend} pulls her back,\n*line_break\n\"What are you doing?\"\n*line_break\n\"I'm going to persuade them of the justness of our cause!\" Alba replies.\n*line_break\n\"That's insane!\"\n*line_break\nIs it?\n*choice\n\t#Yes.\n\t\tThinking better of it, Alba ducks back behind the barricade. However, the initiative has been lost and the field gun is ready to fire again.\n\t\tThe shell strikes the left section of the barricade and throws the militia to the ground. Dazed, Alba looks over to where the shell hit. As the dust settles, it looks as if at least 5 of her comrades are down. There are several dismembered limbs lying around. The heroic lorry driver is missing the lower half of her body.\n\t\t*set militia -10\n\t\t*line_break\n\t\t\"Run!\" Alba shouts, \"Run for it!\" \n\t\t*line_break\n\t\tThey don't need a second invitation and they are running . But Alba isn't joining them. She wants to but, to her horror, she realises she isn't able to stand. She is willing herself to but her body isn't responding. She feels a dull, throbbing pain in the back of her head. She puts her hand to it and pulls it away, seeing it is covered in blood. \n\t\t*line_break\n\t\t\"Alba, are you alright?\" $!{friend} is in front of her now. She can't formulate a sentence to reply. She is in shock. $!{friend} pulls her to her feet and does their best to drag Alba along with her. \n\n\t\tA third shell strikes the barricade and the pair are knocked off their feet. $!{friend} desperately lifts Alba up. Salazar has run back and is helping. Miraculously, they reach the relative safety of the next anarchist barricade, 500 metres up the road. Alba has regained a level of her senses. Salazar explains to the commander of the position that the fascists have artillery. Alba's head is bandaged. She looks around. Of the 40 or so who had made up the syndicate this morning, ${militia} are left. Almost everyone has a wound of some sort, ranging from cuts and bruises to a broken arm. She makes a conscious effort to tune into Salazar's conversation,\n\t\t*line_break\n\t\t\"We've got this position covered,\" the commander begins, \"But we need more men over at the telephone exchange. The fascists have barricaded themselves in there\".\n\t\t*line_break\n\t\tSalazar looks around the group. For the moment, he has the support of the group.\n\t\t*line_break\n\t\t\"Right, we're going to the telephone exchange. The fascists are trapped there. I know we've had a rough ride but the fight isn't over. Who's with me?\"\n\t\t*line_break\n\t\tThey all are.\n\t\t*finish \n\t#No.\n\t\tAlba pulls herself free, \n\t\t*line_break\n\t\t\"Trust me!\"\n\t\t*line_break\n\t\tShe vaults the barricade and sprints across the crossroads, rifle held above her head to indicate she isn't attacking. She reaches the field gun, to the confusion and consternation of the crew.\n\t\t*line_break\n\t\t\"Stop!\" she pants, breathing heavily.\n\t\t*line_break\n\t\t\"What?\"\n\t\t*line_break\n\t\t\"Stop, don't shoot!\"\n\t\t*line_break\n\t\t\"What is wrong with you woman!\"\n\t\t*line_break\n\t\t\"Please don't fire on your brothers and sisters,\" she begins, and before they can respond, she continues, \"You are conscripts, no?\"\n\t\t*line_break \n\t\tThey nod. \"The Army is a poisonous institution that eats up our youth. They are making you fight in the class war against your own. The officers and the fascists, they are your real enemy, not the workers,\" tears of emotion are running down her cheeks, \"Therefore, I implore you, stop killing us and join us in the fight for freedom!\"\n\t\t\n\t\tShe stands before them, panting, certain that she is about to die. After a painfully long pause, one of the gun crew speaks,\n\t\t*line_break\n\t\t\"You are a crazy bitch but you are right, this isn't our fight\". The others nod in concurrence. They begin to manoeuvre the gun around so it is facing the fascist position rather than the anarchist barricade. One artillery round from near point blank range levels the building. A triumphal roar comes up from behind the barricade. $!{friend} sprints out and embraces Alba, \n\t\t*line_break\n\t\t\"Why... how on Earth did you... that was amazing!\"\n\t\t*page_break\n\t\tPresently, a group of militiamen from further up the street arrive.\n\t\t*line_break\n\t\t\"What's going on?\" their leader enquires. What has occurred is explained to him, \"Outstanding comrade, truly outstanding! We have this road covered, but we need more men over at the telephone exchange. There is a large group of fascists holed up inside. Soldiers of your calibre would be of more use there than here\".\n\t\t*line_break\n\t\tAlba Reyes looks around the group. Of the 40 or so in the syndicate this morning, she counts ${militia}. A few like Salazar have minor wounds but otherwise they are fighting fit. They look at Alba expectantly. They are her militia now and they expect leadership.\n\t\t*line_break\n\t\t\"Right, we're going to the telephone exchange. The fascists are trapped there. Barcelona, hell the whole of Spain, is there for the taking. We just need to seize this opportunity. Who's with me?\"\n\t\t*line_break\n\t\tThey all are.\n\t\t*set albalead true\n\t\t*finish\n"}};
