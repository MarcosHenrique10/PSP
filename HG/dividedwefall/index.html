 normal I-16s\".\n*if joqdead = false\n\t*line_break\n\t\"Brilliant,\" Joaquin sighs, \n*if joqdead = true\n\t*line_break\n\t\"Ah...\" Rodriguez sighs, \n*line_break\n\"The sooner the Germans finally get round to delivering us some 109s the better!\"\n*line_break\n\"They'll come soon enough\".\n*line_break\nIn the meantime, De La Rosa must decide, is it a trap, or is that lone recon plane an easy kill? It's a fine day and the skies appear to be clear...\n*fake_choice\n\t#De La Rosa sends a wing up to take it out.\n\t\t\"Rodriguez, take Wing Three and eliminate the hostile, the rest of us will remain on course\".\n\t\t*line_break\n\t\t\"Roger that\".\n\t\t*line_break\n\t\tRodriguez and the three other Fiats under his command peel away and climb towards the lonely recon plane. Seeing this move, it takes evasive action trying to out-climb the Fiats and get to an altitude where it can't be reached. But the lumbering two-enginer doesn't have the speed. Rodriguez and his men set upon it, machine guns blazing. Before too long, it's plummeting out of the sky, fuel tank aflame.\n\t\t*line_break\n\t\t\"Got him!\"\n\t\t*line_break\n\t\t\"Good kill, good kill Blue Six, now get back in formation\".\n\t#De La Rosa takes it out himself.\n\t\t\"Ok, I'm going to deal with him, Wing One, on me, the rest of you, stay on course and eyes sharp!\"\n\t\t*line_break\n\t\t\"Roger that\".\n\t\t*line_break\n\t\tDe La Rosa and the three other Fiats in his wing peel away and climb towards the lonely recon plane. Seeing this move, it takes evasive action trying to out-climb the Fiats and get to an altitude where it can't be reached. But the lumbering two-enginer doesn't have the speed. De La Rosa gets himself behind the struggling Red and closes the gap. \n\n\t\tIt tries to turn left then right but being over twice the size of the nippy little Fiat, the Squadron Leader has no problem sticking with him. Getting as close as he dare, De La Rosa opens up with his twin machine guns. The large glass cockpit of the recon plane is shattered and the pilot must be hit because it very quickly spins out of control and plummets out of the sky.\n\t\t*line_break\n\t\t\"Good kill Blue Leader!\"\n\t\t*line_break\n\t\t\"Too easy!\"\n\t\t*line_break\n\t\tHe returns to formation and they carry on towards the river.\n\t\t*line_break\n\t#De la Rosa decides it best to ignore it.\n\t\t\"Best leave it Blue squadron, it could be a trap, not worth risking any of our planes for. Besides, it isn't hurting anyone up there\".\n\t\t*if joqdead = false\n\t\t\t*line_break\n\t\t\t\"Yeah, looks suspicious to me,\" Joaquin concurs, \"Unarmed recon plane all on its own at low altitude. Stinks of a Red trap\".\n\t\t*line_break\n\t\tThe Nationalists stay in formation and carry on towards the river.\n*page_break\n\"Not far to the river now, there's the bombers\".\n*line_break\nThey fly over a squadron of Italian SM81s heading the other way.\n*line_break\n\"They've just hit the bridge at Asco, our job is to assess the damage and make sure the Reds don't fix it in a hurry\".\n*line_break\nThe river Ebro and the village of Asco come into view on the horizon. As they get closer, the damage the bombing raid has done becomes evident.\n*line_break\n\"The bombers have done a fine job,\" Rodriguez laughs, \"The Reds are going to be trapped for days!\"\n*if joqdead = false\n\t*line_break\n\t\"Look at that, there's already a pile up on the opposite bank!\" Joaquin adds.\n*line_break\nSure enough, a large queue of military vehicles of all types is building up on the Republican side of the river. The bridge has been broken in several places, a mess of twisted metal and melted tarmac. Their observation is rudely interrupted by the dull thud of anti-aircraft fire.\n*line_break\n\"Flak!\" De La Rosa exclaims as black shell bursts begin appearing around them, \"Spread out, we don't want to give them an easy target!\"\n*line_break\nSeveral AA guns have been set up on the Red side of the river. They pound away at the approaching Fiats, the anti-air shells leaving vapour trails in their wake, quickly painting the canvas of the sky with wild brush strokes of grey and white. Shells whizz past Jose's aircraft, exploding all around, each one causing the Fiat to shudder violently.\n*line_break\n\"Pretty heavy flak Sir\".\n*line_break\n\"Yes Blue Six, it is, you better...\"\n*fake_choice\n\t#Take it out\".\n\t\t\"That's suicide Sir!\"\n\t\t*line_break\n\t\t\"So's ignoring it! Take down your wing and take out those guns!\"\n\t\t*line_break\n\t\tRodriguez and his pilots descend on the anti-air position but very quickly things go wrong. Flying straight at them, the flimsy Fiats make easy targets for the gunners. The lead fighter takes a direct hit and there isn't much left of it, just fragments of aircraft falling out the sky.\n\t\t*line_break\n\t\t\"Shit, we're getting cut up Jose!\"\n\t\t*line_break\n\t\t\"Hold your nerve Rodriguez!\"\n\t\t*line_break\n\t\tNext, a shell explodes dangerously close to Blue Seven, ripping one of its wings in half. It spins out of control.\n\t\t*line_break\n\t\t\"Mayday, this is Blue Seven, I'm going down!\" the radio goes silent when the Fiat hits the water.\n\t\t*line_break\n\t\tThe last two open up with their MGs and unleash a storm of bullets on the flak guns. Strafing run complete, Wing Three regains altitude.\n\t\t*line_break\n\t\t\"Well satisfied De La Rosa? Was it worth losing two of my pilots for that?\"\n\t\t*line_break\n\t\tSeveral of the guns seem to be out of action but three more are still firing. \n\t\t*line_break\n\t\t\"Enough of that Blue Six, back in formation\".  \n\t#Stay on your toes\".\n\t\t\"Yes Sir, will do\".\n\t\t*line_break\n\t\tThe Fiats approach the bridge in a round-about manner, dodging this way and that, keeping the gunners on the ground guessing as to which way they'll turn next. A few Fiats suffer some damage but all remain in the air as they close on their target.\n*page_break\n\"Ok, I can make out what appears to be engineering teams already working to repair the bridge, this is what we're expecting\".\n*if joqdead = false\n\t*line_break\n\t\"The Reds desperately need that bridge,\" Joaquin adds, \"They're going to keep fixing it every time we bomb it\".\n*line_break\n\"So that's where we come in then?\"\n*line_break\n\"Exactly, we're going to strafe the bridge and clear it of enemy personnel, hamper their repair works as much as possible\".\n*line_break\n\"Yes Sir, what formation should we attack in?\"\n*choice\n\t#V formation.\n\t\t\"Blue squadron, V formation, we attack as a unit\".\n\t\t*line_break\n\t\tMoving into a 'V' the squadron descend on the bridge. But it doesn't go well. Bunched up as they are, they present a great target for the AA and in the first pass, two Fiats are hit. Furthermore, in such a tight formation, they can't target the engineers scrambling about the wreckage merely fire where the leader is firing.\n\t\t\n\t\tA second attempt doesn't improve things and a third Fiat is lost.\n\t\t*if joqdead = false\n\t\t\t*line_break\n\t\t\t\"This isn't working Jose, we need to get out of here,\" Joaquin demands, \"I'm sure they'll have called for air support and we're in no fit state to take on Ratas\".\n\t\t*if joqdead = true\n\t\t\t*line_break\n\t\t\t\"Fucking hell Jose, this is a disaster,\" Rodriguez complains, \"If we don't get out of here soon, we'll have Ratas or even Super-Ratas all over us!\"\n\t\t*line_break\n\t\t\"Ok, you're right, Blue squadron, make for home, this is a dead loss\".\n\t\t*line_break\n\t\tBattered and bruised 11 Squadron head for home.\n\t\t*goto convoy\n\t#Chain formation. \n\t\t\"Blue squadron, chain formation, we attack continuously\".\n\t\t*line_break\n\t\tChain formation involved all the fighters loosely lining up like a chain and attacking the bridge one by one, in a continuous line. That way, the bridge is never not under attack; as one Fiat finishes their strafing run, the next is beginning it.\n\t\t\n\t\tDe La Rosa leads the way, swooping over the steel structure, machine guns chattering away. Below, Republican engineers scatter as bullets rain down on the bridge. As soon as De La Rosa pulls up, \n\t\t*if joqdead = false\n\t\t\tJoaquin\n\t\t*if joqdead = true\n\t\t\tRodriguez \n\t\tis beginning his attack. Flying individually and at speed, the little Fiats present difficult targets for the AA gunners and aside from a few glancing blows, the squadron comes off lightly.\n\n\t\tAfter ten minutes of relentless attack, the Nationalists are running low on ammunition.\n\t\t*line_break\n\t\t\"Great job Blue squadron, I think we set the repair work back a few hours there. Let's head for home!\"\n\t\t*line_break\n\t\tSatisfied, 11 Squadron return home. \n\t\t*goto convoy\n\t#Attack individually.\n\t\t\"Move to attack the bridge individually, getting in formation would make us sitting ducks for the flak gunners\".\n\t\t*line_break\n\t\tThe Fiats swirl and swoop around the steel structure, descending frequently to spray it with MG fire and send the Republican engineers running. The AA struggles to hit any of the fighters as they whizz around unpredictably. \n\n\t\tNaturally, there are lulls of a few moments when no one is attacking the bridge but De La Rosa is satisfied they're having a good impact. In one such lull, two fighters swing down to attack at the same time, from opposite directions.\n\t\t*line_break\n\t\t\"Blue Eight, Blue Nine, watch out...\"\n\t\t*line_break\n\t\tBefore he can stop them, the two fighters collide, not head on, but their wings clip each other, sending both into fatal spins. One hits the water, the other explodes in flames as it crashes into the bank.\n\t\t*line_break\n\t\t\"Shit\".\n\t\t*line_break\n\t\tAfter this cock up, De La Rosa decides to head for home. 11 Squadron have done some real damage but suffered unnecessary losses.\n\t\t*goto convoy\n*label convoy\n*if mariadead = true\n\t*goto moralestwo\n*if mariadead = false\n\t*if murderer = true\n\t\t*goto moralestwo\n\t*else \n\t\t*goto strafe\n*label strafe\n*page_break\nAs they pass over the newly-captured Republican territory on their way back, Rodriguez spots something,\n*line_break\n\"Blue Leader, I see a convoy, approximately fifteen vehicles, heading towards the Ebro. Must be Reds\".\n*line_break\n\"I see them Blue Six\".\n*if joqdead = false\n\t*line_break\n\t\"Probably their wounded Jose,\" Joaquin observes, \"Otherwise why would they be heading that way?\"\n*line_break\nDe La Rosa orders his men to...\n*choice\n\t#Attack them.\n\t\t*set dlrbrutal -5\n\t\tOn the ground, Maria looks up at the Fiats as the lorries bump along the dusty road. They glide so serenely through the empty blue sky.\n\t\t*if dlrship = true\n\t\t\tShe wonders if $!{man} is up there, flying one of them.\n\t\t\t*if raped = true\n\t\t\t\tShe tries to think about the time they spent together rather than what has just happened to her.\n\t\tBut then they suddenly change course. Maria watches as they swing round and begin to descend rapidly, coming straight at the convoy.\n\t\t*line_break\n\t\t\"Oh no...\" she shakes her head, \"No no no!\"\n\t\t*page_break\n\t\t*temp isshedead\n\t\t*rand isshedead 0 100\n\t\t*if (isshedead \u003c 75)\n\t\t\tMaria regains consciousness. All around her is death. The lorry has been shot to pieces, riddled with bullets. Everyone around her seems to be dead. She sits with a dozen corpses slumped around her. The stench is incredible. Flies begin to descend on them. She is soaked to the bone in other people's blood. But miraculously she's ok. She kisses her crucifix necklace. She recoils as the deeply unpleasant, slightly metallic taste of human blood touches her lips.\n\t\t*if (isshedead > 74)\n\t\t\tAbout an hour later, the wreckage of the convoy is discovered by an advancing Republican unit. There are just a handful of survivors. Maria's mangled body, along with dozens of others, are dumped into a hastily dug pit at the side of the road. Her family never found out what happened to her.\n\t\t*goto moralestwo\t\n\t#Leave them.\n\t\t*set dlrbrutal +5\n\t\tOn the ground, Maria looks up at the Fiats as the lorries bump along the dusty road. They glide so serenely through the empty blue sky.\n\t\t*if dlrship = true\n\t\t\tShe wonders if $!{man} is up there, flying one of them.\n\t\t\t*if raped = true\n\t\t\t\tShe tries to think about the time they spent together rather than what has just happened to her.\n\t\tThey slowly become smaller and smaller, until they are tiny specks on the horizon. They are disappearing from view. Maria feels like her hope is disappearing with them.\n\t\t*goto moralestwo\n\n*label moralestwo\n*if moralesdead = true\n\t*finish\n*page_break\n*image ebro.png\n4.39 P.M.\n*line_break\n25th July 1938\n*line_break\nCorbera d'Ebre\n*line_break\nCaptain Adrian Morales\n\nMorales looks through his binoculars at Corbera, about a kilometre up the road. It's a small, medieval town built on a barren hill. His Company are spread out thinly, tentatively probing for weak points in the defences. After Camposines had been secured, they kept on moving. The men are tired after such a long day, so long spent in the Summer heat. But there's no question of stopping. They've got the fascists on the run. They've covered nearly thirty kilometres today. That's unprecedented. This is their big chance.\n\nThe town is held by a unit of Moroccan Regulares, Arab mercenaries of the Army of Africa. The Regulares have quite a reputation. \n*if losses = true\n\tThey've had to redistribute the remaining men equally between the units, but no reinforcements have come up so the men they lost this morning have yet to be replaced.\nHe summons his officers for an impromptu conference,\n*line_break\n\"Ok, there's no point in advancing up the road, they'll have that covered, maybe even mined,\" Morales begins, \"Our best bet is to...\n*choice\n\t#Attack down the left flank with Blanco's platoon\".\n\t\t\"Ok Sir,\" Blanco tries to sound resolute but his anxiety is palpable.\n\t\t*line_break\n\t\t\"Don't worry Lieutenant, you got good marks for tactical awareness didn't you?\"\n\t\t*line_break\n\t\t\"Yes, I got 82% Sir\".\n\t\t*line_break\n\t\t\"That's very impressive, probably more than I would ever get,\" he reassures the young subaltern, \"Now get your men ready and give them hell!\"\n\t\t*line_break\n\t\tBlanco salutes, hand shaking slightly, \"Very good Sir!\"\n\t\t*line_break\n\t\tHe marches off to prepare his men. Garcia looks sheepish,\n\t\t*line_break\n\t\t\"Sir, are you sure it's a good idea, he's just so young. I feel guilty sending children into battle\".\n\t\t*line_break\n\t\t\"Nonsense Lieutenant, he got 82% for tactical awareness, didn't you hear? He'll be fine,\" Morales has mastered the art, so vital for a commanding officer, of sounding confident in himself, even when he is racked by self-doubt.\n\t\t*line_break\n\t\t\"What are we going to do about the armour Sir?\"\n\t\t*line_break\n\t\t\"Ah, yes...\"\n\t\t*line_break\n\t\tThey have two T-26 tanks attached to the Company to provide armoured support. They sit in the cover of some trees, engines idling. But the Popular Army has precious few tanks and he Morales is under strict orders from Commissar Vela not to lose them under any circumstances.\n\t\t*choice\n\t\t\t#Send them to support Blanco.\n\t\t\t\t*label blctkat\n\t\t\t\t*set losttanks true\n\t\t\t\tMorales and Garcia watch as the Blanco's platoon moves out across the grassland to the East of Corbera, the tanks leading the way. Their advance is unhindered until they get within 500 metres of the town, when the lead tank burst into flames. \n\t\t\t\t*line_break\n\t\t\t\t\"Oh shit, they must have AT guns!\"\n\t\t\t\t*line_break\n\t\t\t\tSure enough, Morales is able to spot two anti-tank guns concealed in an orchard on the edge of the town. The crew of the burning tank are bailing out, clothes burning. They roll around in the grass frantically trying to put themselves out.\n\t\t\t\t*line_break\n\t\t\t\t\"Well this hasn't gone to plan...\" Garcia sighs.\n\t\t\t\t*line_break\n\t\t\t\t\"Thank you Lieutenant, if I want a running commentary I'll ask for one!\"\n\t\t\t\t*line_break\n\t\t\t\tReturning to his binoculars, Morales watches as the guns fire again. The armour-piercing shells rip through the steel hull of the remaining T-26. The shell must have struck the tank's own ammunition because the T-26 explodes with an almighty boom, instantly vaporizing the crew.\n\t\t\t\t*line_break\n\t\t\t\t\"Fucking hell\".\n\t\t\t\t*line_break\n\t\t\t\t\"We've got to do something Captain!\"\n\t\t\t\t*choice\n\t\t\t\t\t#Send Garcia's platoon down the right flank.\n\t\t\t\t\t\t*set crisis true\n\t\t\t\t\t\tMorales observes Garcia's platoon moves out across the plains to the West of Corbera, staying low and moving forward in groups of four or five. Before too long, their advance is halted when three hidden MGs open fire.\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Oh no...\" Morales observes, looking through his binoculars. One of the guns is located on the second floor of a town house, another in a concealed dugout and the third at a barricade on the road into the town.\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"This can't be happening\".\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tThe platoon has already taken casualties as Garcia orders them to stay flat on their stomachs. The air is thick with bright green tracer fire. They're well and truly pinned down.\n\t\t\t\t\t\t*if losses = false\n\t\t\t\t\t\t\t*set losses true\n\t\t\t\t\t\t*if losses = true\n\t\t\t\t\t\t\t*set moreloss true\n\t\t\t\t\t\t\t*set losses false\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"No no no no no!\" \n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tOne Company and Morales are in crisis. He's lost his tanks, nearly all his men are pinned and every moment that passes he's losing more of them.\n\t\t\t\t\t\t*goto arty\n\t\t\t\t\t#Send Garcia's platoon to support Blanco.\n\t\t\t\t\t\t\"Garcia, take your men up, get Blanco back on his feet and push on down that flank\".\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Are you sure that's wise Sir?\"\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Yes, I'm sure, those AT guns may have made short work of the tanks but they're useless against infantry. A determined assault will break through\".\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Very good Sir\".\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tGarcia and his men move up to Blanco's positions, sheltered behind the smouldering tank wrecks. Through his binoculars, Morales can see the two Lieutenants have a brief altercation. Blanco obviously doesn't want to go on. But Garcia seems to persuade him. Together, they lead the men forward en masse.\n\n\t\t\t\t\t\tAT guns are very effective against tanks. But their armour-piercing shells are near enough useless against infantry. Without too much difficulty, Morales' men storm the orchard and seize the guns.\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Fantastic work! Right let's push up and join them,\" Morales orders, \"Company advance!\"\n\t\t\t\t\t\t*goto arty\n\t\t\t#Keep them in reserve.\n\t\t\t\t*label blcnoat\n\t\t\t\tMorales and Garcia watch as the Blanco's platoon moves out across the grassland to the East of Corbera, staying low and moving forward in groups of four or five. Their advance is unhindered until they get within 500 metres of the town, when they come under fire. \n\t\t\t\t*line_break\n\t\t\t\t\"Looks like AT guns\".\n\t\t\t\t*line_break\n\t\t\t\tSure enough, Morales is able to spot two anti-tank guns concealed in an orchard on the edge of the town,\n\t\t\t\t*line_break\n\t\t\t\t\"Good thing we didn't send the tanks up!\" \n\t\t\t\t*line_break\n\t\t\t\tAT guns are very effective against tanks. But their armour-piercing shells are near enough useless against infantry. Morales watches through his binoculars as, without too much difficulty, Blanco's men storm the orchard and seize the guns.\n\t\t\t\t*line_break\n\t\t\t\t\"Fantastic work! Right let's push up and join them,\" Morales orders, \"Company advance!\"\n\t\t\t\t*goto arty\n\t#Attack down the right flank with Garcia's platoon\".\n\t\t\"Yes Sir, we'll see it through,\" Garcia replies, trying to sound resolute. In reality, Morales can see fear in his eyes. He can see him nervously fiddling with his wedding ring.\n\t\t*line_break\n\t\t\"Don't worry Garcia, you're an able officer,\" Morales tries to reassure him, \"The men look up to you, follow you because of your, well, because of your age. Most of them are just kids, you're the closest thing they've got to a father right now\".\n\t\t*line_break\n\t\t\"Thank you for the kind words Sir, I suppose there are some advantages to ageing after all eh?\" he laughs. It's a forced, nervous laugh.\n\t\t*line_break\n\t\t\"Get your men ready and give them hell Lieutenant\".\n\t\t*line_break\n\t\tHe marches off to prepare his men. Blanco looks sheepish,\n\t\t*line_break\n\t\t\"I feel guilty Sir, it should be me, not him\".\n\t\t*line_break\n\t\t\"And why would that be Blanco?\"\n\t\t*line_break\n\t\t\"It's just... he's a father, a husband. He's got four kids he told me. He has a family to support, children to raise. If he dies, what happens to them?\" he looks like he's genuinely concerned, \"If I die, my mother'll be a bit upset but other than that no one's losing any sleep\".\n\t\t*line_break\n\t\t\"Nonsense Lieutenant, he's a good soldier, didn't you hear what I said. He'll be fine,\" Morales has mastered the art, so vital for a commanding officer, of sounding confident in himself, even when he is racked by self-doubt.\n\t\t*line_break\n\t\t\"What are we going to do about the armour Sir?\"\n\t\t*line_break\n\t\t\"Ah, yes...\"\n\t\t*line_break\n\t\tThey have two T-26 tanks attached to the Company to provide armoured support. They sit in the cover of some trees, engines idling. But the Popular Army has precious few tanks and he Morales is under order strict orders from Commissar Vela not to lose them under any circumstances.\n\t\t*choice\n\t\t\t#Send them to support Garcia.\n\t\t\t\t*label gartkat\n\t\t\t\tMorales and Blanco watch as the Garcia's platoon moves out across the plains to the West of Corbera, the tanks leading the way. Their advance is unhindered until they get within 500 metres of the town, when three hidden MGs open fire.\n\t\t\t\t*line_break\n\t\t\t\t\"Looks like they're dug in deep,\" Morales observes, looking through his binoculars. One of the guns is located on the second floor of a town house, another in a concealed dugout and the third at a barricade on the road into the town.\n\t\t\t\t*line_break\n\t\t\t\t\"Together they've got a complete field of fire over the western approaches of the town,\" Blanco adds.\n\t\t\t\t*line_break\n\t\t\t\t\"Yes, very observant Lieutenant. Good thing we sent the armour up\".\n\t\t\t\t*line_break\n\t\t\t\tReturning to his binoculars he sees the soldiers of Garcia's platoon sheltering as best they can behind the tanks. Garcia is shouting at them to keep their heads down. The air is thick with bright green tracer from the machine guns.\n\t\t\t\t*label gararmour \n\t\t\t\tBut the MGs can do nothing about the tanks. The bullets ping harmlessly off the steel hulls of the T-26s. The tanks halt and bring their 40mm cannons to bear. Loading high explosive rounds, the tank gunners aim first at the MG in the house.\n\t\t\t\t*line_break\n\t\t\t\t\"Ha! They've got him!\" Blanco whoops as the house is reduced to rubble, \"Did you see that?\"\n\t\t\t\t*line_break\n\t\t\t\t\"Am I to suppose you've never seen tanks in action before Lieutenant?\"\n\t\t\t\t*line_break\n\t\t\t\t\"No I haven't sure,\" then, \"Oh God look, the next one!\"\n\t\t\t\t*line_break\n\t\t\t\tThe sandbag-constructed checkpoint disappears in an instant. The last MG bravely continues to chatter away, with no hope of success.\n\t\t\t\t*line_break\n\t\t\t\t\"Here we go, here's the last one!\"\n\t\t\t\t*line_break\n\t\t\t\tMorales ignores Blanco's excitement and watches through his binoculars as the tanks fire on the dugout housing the last MG. It is engulfed in a cloud of dust and mud as the shells hit home. With the path clear, the tanks trundle forward towards the town, Garcia's infantry close behind.\n\t\t\t\t*line_break\n\t\t\t\t\"Right let's push up and join them,\" Morales orders, \"Company advance!\"\n\t\t\t\t*goto arty\n\t\t\t#Keep them in reserve.\n\t\t\t\t*label garnoat\n\t\t\t\tMorales and Blanco watch as the Garcia's platoon moves out across the plains to the West of Corbera, staying low and moving forward in groups of four or five. Their advance is unhindered until they get within 500 metres of the town, when three hidden MGs open fire.\n\t\t\t\t*line_break\n\t\t\t\t\"Looks like they're dug in deep,\" Morales observes, looking through his binoculars. One of the guns is located on the second floor of a town house, another in a concealed dugout and the third at a barricade on the road into the town.\n\t\t\t\t*line_break\n\t\t\t\t\"Together they've got a complete field of fire over the western approaches of the town,\" Blanco adds.\n\t\t\t\t*line_break\n\t\t\t\t\"Yes, very observant Lieutenant. But more importantly, Garcia's going to get cut up if he tries to move forward\".\n\t\t\t\t*line_break\n\t\t\t\tSure enough, the platoon has already taken casualties as Garcia orders them to stay flat on their stomachs. The air is thick with bright green tracer fire. They're well and truly pinned down.\n\t\t\t\t*if losses = false\n\t\t\t\t\t*set losses true\n\t\t\t\t*if losses = true\n\t\t\t\t\t*set moreloss true\n\t\t\t\t\t*set losses false\n\t\t\t\t*line_break\n\t\t\t\t\"I could attack down the left in order to split their forces Sir, take the pressure off Garcia\".\n\t\t\t\t*line_break\n\t\t\t\tMorales has a decision to make.\n\t\t\t\t*choice\n\t\t\t\t\t#Send the tanks to help Garcia.\n\t\t\t\t\t\t\"No, we'll send the armour up to help Garcia, we don't want to stretch ourselves too thin\".\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\"Right you are Sir\".\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tThe tanks set off and move up to Garcia's beleaguered position. The machine guns keep up their deadly fire.\n\t\t\t\t\t\t*goto gararmour\n\t\t\t\t\t#Attack down the left flank with Blanco.\n\t\t\t\t\t\t\"Do I get the tanks Sir?\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Send them to support Blanco.\n\t\t\t\t\t\t\t\t*set crisis true\n\t\t\t\t\t\t\t\t*set losttanks true\n\t\t\t\t\t\t\t\tBlanco's platoon moves out across the grassland to the East of Corbera, the tanks leading the way. When they get with half a kilometre of the town things to start to go wrong. The lead tank burst into flames. \n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\"Oh shit, they must have AT guns!\"\n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\tSure enough, Morales is able to spot two anti-tank guns concealed in an orchard on the edge of the town. The crew of the burning tank are bailing out, clothes burning. They roll around in the grass frantically trying to put themselves out.\n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\"Well this hasn't gone to plan...\" Morales sighs.\n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\tReturning to his binoculars, Morales watches as the guns fire again. The armour-piercing shells rip through the steel hull of the remaining T-26. The shell must have struck the tank's own ammunition because the T-26 explodes with an almighty boom, instantly vaporizing the crew.\n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\"Fucking hell\".\n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\tOne Company and Morales are in crisis. He's lost his tanks, nearly all his men are pinned and every moment that passes he's losing more of them.\n\t\t\t\t\t\t\t\t*goto arty\n\t\t\t\t\t\t\t#Keep them in reserve.\n\t\t\t\t\t\t\t\tBlanco's platoon moves out across the grassland to the East of Corbera, staying low and moving forward in groups of four or five. Their advance is unhindered until, about half a kilometre from their objective, they come under fire. \n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\"Looks like AT guns\".\n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\tSure enough, Morales is able to spot two anti-tank guns concealed in an orchard on the edge of the town,\n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\"Good thing we didn't send the tanks up!\" \n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\tAT guns are very effective against tanks. But their armour-piercing shells are near enough useless against infantry. Morales watches through his binoculars as, without too much difficulty, Blanco's men storm the orchard and seize the guns.\n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\"Fantastic work! Right let's push up and join them,\" Morales orders, \"Company advance!\"\n\t\t\t\t\t\t\t\t*goto arty\t\n\t\t\t\t\t\t\n\t#Wait for reinforcements\".\n\t\t\"But what if the enemy bring up their own reserves and strengthen the position?\" Garcia enquires.\n\t\t*line_break\n\t\t\"Yes,\" Blanco concurs, \"We might miss the chance to take the town quickly. We must be decisive whenever the opportunity presents itself\".\n\t\t*line_break\n\t\t\"Is that a line from one of your textbooks Blanco?\" Morales replies condescendingly.\n\t\t*line_break\n\t\tThe young Lieutenant goes red,\n\t\t*line_break\n\t\t\"Yes Sir...\"\n\t\t*line_break\n\t\t\"I see you point, both of you, and your enthusiasm is admirable. But it's my decision,\" he pauses and considers what they've said.\n\t\t*choice\n\t\t\t#Attack down the left flank with Blanco's platoon.\n\t\t\t\t\"Ok Sir,\" Blanco tries to sound resolute but his anxiety is palpable.\n\t\t\t\t*line_break\n\t\t\t\t\"Don't worry Lieutenant, you got good marks for tactical awareness didn't you?\"\n\t\t\t\t*line_break\n\t\t\t\t\"Yes, I got 82% Sir\".\n\t\t\t\t*line_break\n\t\t\t\t\"That's very impressive, probably more than I would ever get,\" he reassures the young subaltern, \"Now get your men ready and give them hell!\"\n\t\t\t\t*line_break\n\t\t\t\tBlanco salutes, hand shaking slightly, \"Very good Sir!\"\n\t\t\t\t*line_break\n\t\t\t\tHe marches off to prepare his men. Garcia looks sheepish,\n\t\t\t\t*line_break\n\t\t\t\t\"Sir, are you sure it's a good idea, he's just so young. I feel guilty sending children into battle\".\n\t\t\t\t*line_break\n\t\t\t\t\"Nonsense Lieutenant, he got 82% for tactical awareness, didn't you hear? He'll be fine,\" Morales has mastered the art, so vital for a commanding officer, of sounding confident in himself, even when he is racked by self-doubt.\n\t\t\t\t*line_break\n\t\t\t\t\"What are we going to do about the armour Sir?\"\n\t\t\t\t*line_break\n\t\t\t\t\"Ah, yes...\"\n\t\t\t\t*line_break\n\t\t\t\tThey have two T-26 tanks attached to the Company to provide armoured support. They sit in the cover of some trees, engines idling. But the Popular Army has precious few tanks and he Morales is under order strict orders from Commissar Vela not to lose them under any circumstances.\n\t\t\t\t*choice\n\t\t\t\t\t#Send them to support Blanco.\n\t\t\t\t\t\t*goto blctkat\n\t\t\t\t\t#Keep them in reserve.\n\t\t\t\t\t\t*goto blcnoat\n\t\t\t#Attack down the right flank with Garcia's platoon.\n\t\t\t\t\"Yes Sir, we'll see it through,\" Garcia replies, trying to sound resolute. In reality, Morales can see fear in his eyes. He can see him nervously fiddling with his wedding ring.\n\t\t\t\t*line_break\n\t\t\t\t\"Don't worry Garcia, you're an able officer,\" Morales tries to reassure him, \"The men look up to you, follow you because of your, well, because of your age. Most of them are just kids, you're the closest thing they've got to a father right now\".\n\t\t\t\t*line_break\n\t\t\t\t\"Thank you for the kind words Sir, I suppose there are some advantages to ageing after all eh?\" he laughs. It's a forced, nervous laugh.\n\t\t\t\t*line_break\n\t\t\t\t\"Get your men ready and give them hell Lieutenant\".\n\t\t\t\t*line_break\n\t\t\t\tHe marches off to prepare his men. Blanco looks sheepish,\n\t\t\t\t*line_break\n\t\t\t\t\"I feel guilty Sir, it should be me, not him\".\n\t\t\t\t*line_break\n\t\t\t\t\"And why would that be Blanco?\"\n\t\t\t\t*line_break\n\t\t\t\t\"It's just... he's a father, a husband. He's got four kids he told me. He has a family to support, children to raise. If he dies, what happens to them?\" he looks like he's genuinely concerned, \"If I die, my mother'll be a bit upset but other than that no one's losing any sleep\".\n\t\t\t\t*line_break\n\t\t\t\t\"Nonsense Lieutenant, he's a good soldier, didn't you hear what I said. He'll be fine,\" Morales has mastered the art, so vital for a commanding officer, of sounding confident in himself, even when he is racked by self-doubt.\n\t\t\t\t*line_break\n\t\t\t\t\"What are we going to do about the armour Sir?\"\n\t\t\t\t*line_break\n\t\t\t\t\"Ah, yes...\"\n\t\t\t\t*line_break\n\t\t\t\tThey have two T-26 tanks attached to the Company to provide armoured support. They sit in the cover of some trees, engines idling. But the Popular Army has precious few tanks and he Morales is under order strict orders from Commissar Vela not to lose them under any circumstances.\n\t\t\t\t*choice\n\t\t\t\t\t#Send them to support Garcia.\n\t\t\t\t\t\t*goto gartkat\n\t\t\t\t\t#Keep them in reserve.\t\n\t\t\t\t\t\t*goto garnoat\n\t\t\t#Wait for reinforcements.\n\t\t\t\t\"No, it's not worth the risk\n\t\t\t\t*if losses = true\n\t\t\t\t\t, we've already lost enough men today\n\t\t\t\t, I have no intention of sacrificing my Company for a tiny town in the middle of nowhere. We wait until we have the resources to take it\".\n\t\t\t\t*line_break\n\t\t\t\t\"And in the meantime Sir?\"\n\t\t\t\t*line_break\n\t\t\t\t\"Get the men out of the sun and give them a few minutes rest\".\n\t\t\t\t*set rest true\n\t\t\t\t*goto arty\n\n*label arty\n*page_break\nPresently, the young Private from earlier runs up to him,\n*line_break\n\"Battalion on the field telephone Sir!\"\n*line_break\n\"Thank you Private...\" before he can ask the soldier's name\n*if arm = false\n\t, it's the same one he'd passed the grenade to that morning \n, the receiver is thrust into his hand, \"Captain Morales, One Company\".\n*line_break\n\"This is Battalion, Thirteenth Brigade's artillery is across the Ebro and in position, awaiting orders\".\n*if crisis = true\n\t*line_break\n\t\"Music to my ears Sir, we're in trouble here, pinned in front of Corbera, we've suffered heavy losses\".\n\t*line_break\n\t\"Ok, we'll see what we can do about that. What do you need Captain?\"\n\t*choice\n\t\t#Level the town.\n\t\t\t\"Wipe Corbera off the map Sir\".\n\t\t\t*line_break\n\t\t\t\"Affirmative, sit back and enjoy the show\".\n\t\t\t*goto level\n\t\t#A limited bombardment.\n\t\t\t\"Can we have a short, sharp strike on the centre of the town?\"\n\t\t\t*line_break\n\t\t\t\"Affirmative, sit back and enjoy the show\".\n\t\t\t*goto limit\n*if rest = true\n\t*line_break\n\t\"Good news indeed Sir, we've been waiting for back up, we're currently waiting outside Corbera\".\n\t*line_break\n\t\"Waiting?\"\n\t*line_break\n\t\"Yes, waiting for reinforcements, we can't take it ourselves\".\n\t*line_break\n\t\"Well you better get your arse into gear Morales because we need to keep moving, there's no time for waiting around. Now what can we do for you?\"\n\t*choice\n\t\t#Level the town.\n\t\t\t\"Wipe Corbera off the map Sir\".\n\t\t\t*line_break\n\t\t\t\"Affirmative, sit back and enjoy the show\".\n\t\t\t*goto level\n\t\t#A limited bombardment.\n\t\t\t\"Can we have a short, sharp strike on the centre of the town?\"\n\t\t\t*line_break\n\t\t\t\"Affirmative, sit back and enjoy the show\".\n\t\t\t*goto limit\n*if crisis = false\n\t*line_break\n\t\"Good news indeed Sir, we're pushing into Corbera as we speak\".\n\t*line_break\n\t\"Fine work Morales, well done, now what can we do for you?\"\n\t*choice\n\t\t#Level the town.\n\t\t\t\"Wipe Corbera off the map Sir\".\n\t\t\t*line_break\n\t\t\t\"Affirmative, sit back and enjoy the show\".\n\t\t\t*goto level\n\t\t#A limited bombardment.\n\t\t\t\"Can we have a short, sharp strike on the centre of the town?\"\n\t\t\t*line_break\n\t\t\t\"Affirmative, sit back and enjoy the show\".\n\t\t\t*goto limit\n\t\t#No need for a strike.\n\t\t\t\"I think we're doing ok Sir, someone else can have the artillery support!\"\n\t\t\t*line_break\n\t\t\t\"Very well, good luck Captain!\"\n\t\t\t*line_break\n\t\t\t\"Thank you Sir!\"\n\t\t\t*goto none\n*label level\n*page_break\nAnd what a show. For half an hour the subjected to an unrelenting bombardment. Dozens of buildings are raised to the ground, fires break out, masonry flies up into the air. Morales almost feels sorry for the fascists. As the shelling begins to ease off, he orders the Company forward,\n*line_break\n\"Come on men, let's not give them any time to get back to their defences, press on!\"\n*line_break\nLeading from the front, Morales advances into the town, the odd shell still landing around them with their characteristic whistle and boom. One such shell lands a bit too close for comfort, causing them all to flinch. The young soldier in front of Morales stops in his tracks.\n*line_break\n\"Come on man,\" Morales shouts, pushing him the back with his pistol, \"For fuck's sake, forward!\"\n*line_break\n\"I'm blind Sir...\" he whimpers, so quietly Morales isn't sure what he said at first. Morales turns him round and recoils at what he sees. The Private's eyes and nose are completely gone, torn away by shrapnel. From what's left of his face Morales recognises him as the Private who handed him the phone.\n*if arm = false\n\tThe same Private who had blown the machine gun post at two o'clock that morning.\n*line_break\n\"Oh God, I... I'm so sorry. Keep walking that way,\" Morales sends him off back towards their lines.\n*page_break\nThere isn't much left of Corbera. Just the ruins of people's homes and shops. All around them are the mangled, dismembered bodies of civilians of all ages. Some crushed in their homes, others torn apart trying to escape. As for the Regulares, well they're nowhere to be seen, presumably wiped out. He had to call in the strike Morales tells himself, how many men would he have lost otherwise? It was justified. Wasn't it?\n*goto pris \n*label limit\nIt is quite a show. For fifteen minutes shells rain down on the medieval heart of the town at the peak of the hill. Buildings are raised to the ground, fires break out, masonry flies up into the air. Morales almost feels sorry for the fascists. As the shelling begins to ease off, he orders the Company forward,\n*line_break\n\"Come on men, let's not give them any time to get back to their defences, press on!\"\n*line_break\nLeading from the front, Morales advances into the town, the odd shell still landing around them with their characteristic whistle and boom. One such shell lands a bit too close for comfort, causing them all to flinch. The young soldier in front of Morales stops in his tracks.\n*line_break\n\"Come on man,\" Morales shouts, pushing him the back with his pistol, \"For fuck's sake, forward!\"\n*line_break\n\"I'm blind Sir...\" he whimpers, so quietly Morales isn't sure what he said at first. Morales turns him round and recoils at what he sees. The Private's eyes and nose are completely gone, torn away by shrapnel. From what's left of his face Morales recognises him as the Private who handed him the phone.\n*if arm = false\n\tThe same Private who had blown the machine gun post at two o'clock that morning.\n*line_break\n\"Oh God, I... I'm so sorry. Keep walking that way,\" Morales sends him off back towards their lines.\n*page_break\nMost of Corbera has escaped relatively lightly. Civilians of all ages come out from their cellars, amazed to see their homes and shops still, largely, intact. A few even cheer as Morales and his men go past. A handful of Regulares hold out near the top of the hill, but with numerical superiority, the Republicans are quickly able to clear out the town.\n*goto pris \n*label none\n*page_break\nThey push into the town but face quite a fight when they get there. \n*if losttanks = false\n\tThe tanks proved vital, levelling fascist strong points at point blank range.\n*if losttanks = true\n\tThe tanks would have been useful in this situation.\n*if moreloss = true\n\tWith so many casualties already suffered, Morales' men are stretched to the limit to win the town, house by house, from the Regulares. \n*if moreloss = false\n\tDespite the Company still relatively intact, Morales' men have to fight hard to win each house from the Regulares.\nThe young private who handed Morales the field telephone\n*if arm = false\n\t, the one who had blown the machine gun post at two o'clock that morning\n, is one of the many casualties, losing a leg in a grenade blast and bleeding out soon afterwards. If Morales had called in the artillery, would he along with so many other men still be alive? At least the quaint little town had been left relatively unscathed. Was that worth it?\n*goto pris\n\n*label pris\n\nOnce the town has been secured, Blanco pulls off something of a coup; he and his platoon capture a group of about eighty Regulares trying to escape the town. \n*line_break\n\"Excellent work Lieutenant, well done!\"\n*line_break\n\"Thank you Sir!\" he looks very pleased with himself, \"One question though...\"\n*line_break\n\"Yes Blanco?\"\n*line_break\n\"What do we do with them?\"\n*line_break\nMorales looks over the crowd of Arabs. The Regulares have an unmatched reputation for rape, pillage and massacre and he can't help but think about all the misery these barbarians have likely caused. But he isn't like them, is he?\n*fake_choice\n\t#Kill them.\n\t\t*set morbrutal -10\n\t\t\"Kill them Blanco. They're scum. Line them up and shoot them\".\n\t\t*line_break\n\t\tMorales can tell Blanco is more than a little distressed by the order, but tries not to show it,\n\t\t*line_break\n\t\t\"Y... Yes Sir!\"\n\t\t*line_break\n\t\tMorales doesn't bother to watch but he hears the rifles ring out again, and again and again.\n\t#Put them to work collecting the dead.\n\t\t*set morbrutal -5\n\t\t\"Send them out to gather our dead Blanco\".\n\t\t*line_break\n\t\t\"But that's against the Geneva Convention Sir\".\n\t\t*line_break\n\t\t\"Would you prefer to send your own men out there to pick up their dead comrades Lieutenant?\"\n\t\t*line_break\n\t\t\"No Sir...\"\n\t\t*line_break\n\t\t\"Then I suggest you temporarily forget about the Geneva Convention\".\n\t#Treat them properly, as prisoners of war.\n\t\t*set morbrutal +5\n\t\t\"Send them back on the next few supply trucks that arrive, they're Battalion's problem now\".\n\t\t*line_break\n\t\t\"Very good Sir\".\n*page_break\nAs the sun is beginning to go down, Commissar Vela finally catches up with them, stepping out of a jeep he immediately goes to see Morales,\n*if losttanks = true\n\t*line_break\n\t\"What the fuck were you thinking? The whole Army of the Ebro only has thirty-odd tanks and you've lost two of them in two minutes! Unbelievable!\"\n\t*line_break\n\t\"And there was me thinking you'd come to congratulate me for advancing thirty kilometres in a day\".\n\t*line_break\n\t\"I'll admit, some congratulation is in order, I've got some words to read to the men. I'll talk to you about this afterwards\".\n*if losttanks = false\n\t*line_break\n\t\"Cometh the hour, cometh the man! Well done Morales, what a day! Thirty kilometres in less than twenty-four hours, remarkable!\n\t*if moreloss = true\n\t\tOk, so we seem to have lost a few more than we would have liked, but even so, it's impressive\".\n\t*if moreloss = false\n\t\tAnd losses so light, all things considered. Impressive is an understatement!\"\n\t*line_break\n\t\"Well, it was not just me, thank my men!\"\n\t*line_break\n\t\"I intend to!\"\n*line_break\nThe men are gathered and the Commissar reads them an official communique from Headquarters:\n*line_break\n\"To the Officers and Men of the Army of the Ebro. Congratulations! Across the entire seventy kilometre front we have achieved a breakthrough and gained much ground. In total, today we have seized an area of over 800 square kilometres\".\n*line_break\nThe men rejoice at the news. Even Morales is taken aback, that's incredible.\n*line_break\n\"But more importantly,\" Vela continues to read, \"We have the fascists well and truly on the run. Franco has no answer to the might of the Popular Army. Sleep well tonight, I know many of you were up early this morning and you've earned a restful night. But tomorrow we go again. And we must go with the same intensity and drive. Victory is there for the taking. Now grab it with both hands.\n*line_break\nLieutenant Colonel Juan Modesto, Commander-in-Chief Army of the Ebro\n*line_break\n7.30 P.M. 25th July 1938\".\n*page_break\nSix days later...\n\nThe next town along the road, just five kilometres away, was Gandesa. For nearly a week they'd been throwing everything they had at it, under the scorching summer sun. Supplies food, water and ammunition are running low with many of the bridges over the Ebro taken out by Nationalist aircraft. So far it had all been to no avail. The offensive had stalled.\n*page_break\nAfter another exhausting day, Morales was summoned to HQ in the early evening. The Headquarters of the Army of the Ebro is in a railway tunnel just outside Asco. Temporary electric lamps provide the illumination. Morales is shown through and finds himself, once again, face to face with Juan Modesto. All he has from which to direct the 100,000 men under his command is a table, a telephone, and a map. And the Russian, Zaponov, by his side, as ever.\n*line_break\n\"Good evening Captain, and let me congratulate you...\"\n*line_break\n\"Thank you Sir\".\n*line_break\n\"Hang on, you don't know what I'm congratulating you for!\"\n*line_break\n\"Oh, sorry Sir\".\n*line_break\n\"I'm congratulating you on your promotion, Commander Morales\".\n*line_break\n\"Oh, thank you Sir\".\n*line_break\n\"It wasn't through choice you must understand. No, your superior was killed this afternoon, an artillery shell landed right on top of his Headquarters\".\n*line_break\n\"Oh\".\n*line_break\n\"But, that means you Morales, are the new commanding officer of the Palafox Battalion. Now, your first orders are to appoint someone to take over your old Company. I see you've got a couple of Lieutenants under you, who would you like to put in charge?\"\n*fake_choice\n\t#Lieutenant Blanco.\n\t\t*set blancap true\n\t\t*if alonsowithyou = true\n\t\t\t*achieve kids\n\t#Lieutenant Garcia.\n\t\t*set garcap true\n\t\t*if prietowithyou = true\n\t\t\t*achieve exper\n\"Right, I'll see to that at once. Now for your second order in your new role, and let me assure you it won't be as easy as the first. As you may have noticed our offensive isn't going to plan\".\n*line_break\n\"Well Sir, we...\"\n*line_break\n\"Don't bother trying to convince me otherwise, I know it's gone rather wrong. We've lost thousands of men and almost all of our tanks trying to take Gandesa. That damned town is the key to the whole operation. But we have a fundamental problem; we are getting weaker and weaker, losing men, equipment et cetera all the time\". \n*line_break\nThe telephone rings, interrupting him. Modesto snatches up the handset and slams it back down without bothering to find out who's calling.\n*line_break\n\"The fascists meanwhile are getting stronger all the time, bringing in more and more reinforcements to the Ebro Front. They've already moved up eight divisions. That's maybe 80,000 extra men and we can only expect more to arrive\".\n*line_break\nMorales doesn't say anything. He can't think of anything intelligent to say.\n*line_break\n\"Which is where you come in Morales. You'll be aware of Hill 481, about a kilometre south of Gandesa?\"\n*line_break\n\"Yes Sir, Death Hill the men call it\".\n*line_break\n\"Right. Well as you will know it has a commanding view of the whole area. And the Nationalists have it, so they can spot any move we make against Gandesa before we've even made it. It's the key to the whole sector. Now, the British Battalion have been throwing themselves at it for five days without much progress. In fact, they've basically been wiped out. But tonight, you're going to have a go!\"\n*line_break\n\"Me Sir?\"\n*line_break\n\"Well not just you personally, your battalion, the Palafox. You're going to succeed where those Brits failed and take that hill for me aren't you?\"\n*line_break\n\"We'll certainly do our best Sir\".\n*line_break\n\"No,\" Modesto replies, suddenly no longer his usual calm self, \"You're going to [i]take[/i] it, aren't you Commander?\"\n*fake_choice\n\t#\"Yes Sir!\"\n\t\t\"Just what I wanted to hear Commander. Good luck, not that you'll need it\".\n\t#\"I can't make any promises\".\n\t\t\"Yes you can Commander, you're going to promise me you'll take that hill by the end of the night!\"\n\t\t*line_break\n\t\t\"I...\"\n\t\t*line_break\n\t\t\"You [i]will[/i] Morales. Now get out of my sight!\"\n*page_break\nFour hours later...\n\nOf course the attack had been an unmitigated disaster. Faced with barbed wire, land mines, machine guns, tripwires not to mention the sheer climb of the hill itself, progress had been nigh on impossible from the start. The advantage of attacking in darkness was negated by the fascists filling the sky with flares. Whole platoons had been mowed down by well-sited MGs, officers taken out by snipers and grenades rolled down the hill at them.\n\nTo make matters worse, half the men of the Palafox Battalion are internationals, mostly Hungarians, Poles, Yugoslavs, many with a limited command of Spanish. If there is a hell on Earth, this is very close to it, Morales thinks. He's managed to get separated from his old Company, who he was advancing with. Under fire, he scrambles behind a boulder alongside the corpse of a Republican soldier.\n*page_break\n\"Fucking hell, this is a complete disaster!\" he pants.\n*line_break\n\"What did you expect?\"\n*line_break\nMorales jumps. What he thought was a corpse has just spoken to him in accented but clear Spanish.\n*line_break\n\"Oh dear, I didn't mean to startle you old chum!\" the corpse continues, \"Lieutenant John Angus, British Battalion\".\n*line_break\nStill slightly wary, Morales shakes his outstretched hand,\n*line_break\n\"Commander Adrian Morales, Palafox Battalion\".\n*line_break\n\"A Commander? My apologies for not saluting Sir!\"\n*line_break\n\"What on Earth are you doing here?\"\n*line_break\n\"Well I'm not here for the view,\" he laughs, choking slightly \"What does it look like?\"\n*line_break\nMorales squints through the semi-darkness, realising Angus' uniform is soaked through with blood.\n*line_break\n\"Oh God, how long have you been like this?\"\n*line_break\n\"About forty-eight hours\".\n*line_break\n\"Hasn't anyone come for you?\"\n*line_break\n\"Well, yesterday I was patched up by a stretcher bearer but he didn't stick around. That's him there,\" he nods to a corpse a couple of metres away, \"And as for my platoon, well they're all around you Commander. They've not moved for a while\".\n*page_break\n\"And to rub salt in the wound, no pun intended, the dressing came a tad loose this afternoon and I've lost rather a lot of blood\".\n*line_break\n\"Let me see to that...\" Morales shuffles over but the Brit waves him away,\n*line_break\n\"Honestly, don't trouble yourself Sir. If you want to do me a favour, I couldn't possibly trouble you for a cigarette could I? I've been gasping for two days!\"\n*line_break\n\"Of course,\" Morales hands the Lieutenant a cig and lights it for him before his attention is drawn by firing further up the hill. Of course there'd been firing going on all this time but this was especially close.\n\nHe peers above the rock and watches as two soldiers, two of his soldiers, make a desperate charge towards the summit, shouting something in an Eastern European tongue. They are cut down mercilessly. Turning back to Angus, Morales asks,\n*line_break\n\"Have you noticed any weak points in your time up here?\"\n*line_break\nAngus doesn't answer. The cigarette has fallen out of his mouth, onto his chest. Lieutenant John Angus is dead.\n*line_break\n\"Oh fuck...\"\n*line_break\nMorales pulls himself together, he decides they must...\n*fake_choice\n\t#Fall back.\n\t\tThe men of the Palafox Battalion need no second invitation to get off Death Hill. In a state of panic and confusion, they retreat, leaving the dead and dying where they fell. Morales isn't proud of it, but he's saved the lives of what's left of his unit. He's sure of that.\n\t#Hold their ground.\n\t\tMorales tries to move around the hill, ordering the pockets of men he finds to hold fast until reinforcements can be brought up. But many are already retreating in the face of an impossible task. After another hour on the hill, with no prospect of support and casualties mounting, he orders a general retreat. The men of the Palafox Battalion need no second invitation to get off Death Hill. In a state of panic and confusion, they retreat, leaving the dead and dying where they fell.\n\t#Push on to the summit.\n\t\tGathering together fifty or so men from various pockets dotted about the hill, Morales leads a doomed charge for the summit. They get agonisingly close, less than twenty metres from the top. But they simply don't have the manpower or the equipment to breach the fascist defences. With no prospect of support and casualties mounting, he orders a general retreat. The men of the Palafox Battalion need no second invitation to get off Death Hill. In a state of panic and confusion, they retreat, leaving the dead and dying where they fell. Could they have kept trying for another hour or so? No, Morales tells himself, he would only have wasted the lives of even more men.\n*page_break\nUpon reaching the foot of the hill, Morales is greeted by the unwelcome sight of Commissar Vela. He expects a reprimand for failing to fulfil his orders.\n*line_break\n\"Bad news Commander\".\n*line_break\n\"You only ever have bad news Vela\".\n*line_break\n\"No, this really is bad news,\" he hands Morales\tan official memorandum.\n*line_break\n\"To all units of the Army of the Ebro. Unprecedented numbers of fascist reinforcements have flooded the Ebro sector. Our brave soldiers are exhausted after seven days of continuous combat in trying conditions. For those reasons, regrettably, it is impossible to advance any further. Therefore, I order all units onto the defensive; dig in and hold your ground. Good luck,\n*line_break\nLieutenant Colonel Juan Modesto\".\n*line_break\n\"Shit!\" Morales curses, scrunching the telegram up and throwing it aside, \"It's over. That's it. We're finished!\"\n*line_break\nFor once, Vela doesn't reproach him for defeatism.\t\n", "chapterthree": "*temp sawinwood false\n*temp sawlight false\n*temp killpris false\n*temp discretion false\n*temp prepare 1\n*temp mgup false\n*temp polehome false\n*temp bloody false\n*temp build false\n*image map2.png\n*set july false\n*set nov true\nOnce the elite Army of Africa was in Spain, they advanced with stunning speed. The disorganised militias were no match for hardened army veterans. They left a trail of terror and destruction in their wake. The Moroccan 'Regulares' were particularly feared, both for their military prowess and their merciless raping and pillaging. \n\nMeanwhile, the Republic was abandoned on the international stage, the Western democracies opting for 'Non-Intervention'. The official rationale was to de-escalate the conflict by cutting off the supply of arms, but the real motivation was to avoid a confrontation with Nazi Germany and a potential European war. The Republic was left unable to purchase weapons, whilst arms and soldiers from Italy and Germany flowed into the Nationalist zone.\n*page_break\nThe Soviet Union had initially supported non-intervention; Stalin hoped to align himself with Britain and France for a future war with Germany. But as Franco's armies reached the gates of Madrid, it appeared that the Republic was on the brink of defeat. Another fascist dictatorship was the last thing Stalin wanted, and with non-intervention clearly not working, the first shipment of Soviet aid arrived on 15th October.  \n\nAnd the Republic was being aided by other arrivals. Thousands of volunteers from across the globe were flooding into Spain to join the fight against fascism. The International Brigades were taking shape.\n*page_break\n3.43 P.M.\n*line_break\n5th November 1936\n*line_break\nNationalist Hospital, 20 KM SW of Vitoria, the Basque Country\n*line_break\nSister Maria Farfan\n\nMaria struggles with the lighter, flicking the ignition several times before she gets a flame and lighting her cigarette. She draws on it deeply. She and Gabrielle stand under the shelter of a tree outside the hospital. Artillery shells can be heard in the distance. \n*if (vidrship = true)\n\t*line_break\n\t\"God, I've needed this for the last hour,\" Maria mutters, jaded.\n\t*line_break\n\t\"Tell me about it,\" Gabrielle replies. They stand for a while before Gabrielle asks, \"How are things going with Vidal then?\"\n\t*line_break\n\tMaria replies, \"...\n\t*choice\n\t\t#It's going very well, we're happy\".\n\t\t\t\"Oh right. Good for you,\" somehow Maria detects that wasn't the answer Gabrielle was hoping for.\n\t\t\t*set goingwell true\n\t\t\t*goto nextone\n\t\t#I get what I want from him...\"\n\t\t\t\"What do you mean?\"\n\t\t\t*line_break\n\t\t\t\"I [i]mean[/i]...\" Maria looks around to make sure no one's in earshot, \"I give him what he wants, and he gives me what I want\".\n\t\t\t*line_break\n\t\t\t\"And what is it that [i]you[/i] want?\"\n\t\t\t*line_break\n\t\t\t\"That's for me to know and me alone\".\n\t\t\t*line_break\n\t\t\t\"Well you are quite the scandal Maria, whatever would your mother say? Using your body for material gain?\"\n\t\t\t*line_break\n\t\t\t\"Oh do be quiet, you're hardly an angel!\"\n\t\t\t*line_break\n\t\t\t\"What's that supposed to mean?\"\n\t\t\t*line_break\n\t\t\t\"I've seen you sneak off to the wards at night,\" Maria smirks.\n\t\t\t*line_break\n\t\t\t\"You...\" Gabrielle laughs, \"Well that's different, I'm helping our brave soldiers recover!\"\n\t\t\t*line_break\n\t\t\t\"That's not what some people would call it!\" Maria chuckles.\n\t\t\t*line_break\n\t\t\t\"Don't you dare tell anyone!\"\n\t\t\t*line_break\n\t\t\t\"As long as you don't say anything I won't\".\n\t\t\t*set usehim true\n\t\t\t*goto nextone\n\t\t#It's not going\".\n\t\t\t\"Oh!\" did Gabrielle just smile then? \"May I ask why?\"\n\t\t\t*line_break\n\t\t\t\"Because he's a twat\".\n\t\t\t*line_break\n\t\t\t\"Ah, I see...\"\n\t\t\t*set gonewrong true\n\t\t\t*goto nextone\n*else\n\t*line_break\n\t\"God, I've needed this for the last hour,\" Maria mutters, jaded.\n\t*line_break\n\t\"Tell me about it,\" Gabrielle replies. They stand for a while before Maria asks, unable to help herself, \"How are things going with Vidal then?\"\n\t*line_break\n\t\"It's going very well, thank you Maria, why do you ask?\"\n\t*line_break\n\t\"Oh, no reason\".\n\t*line_break\n\t\"Come off it, tell me!\"\n\t*line_break\n\t\"Well I just thought it must've petered out or something...\"\n\t*line_break\n\t\"What gave you that impression?\"\n\t*line_break\n\t\"Well...\" Maria smirks, \"Don't think I haven't seen you sneaking off to the wards at night...\"\n\t*line_break\n\t\"You...\" Gabrielle laughs, \"Well that's different, I'm helping our brave soldiers recover!\"\n\t*line_break\n\t\"That's not what some people would call it!\" Maria chuckles.\n\t*line_break\n\t\"Don't you dare tell anyone!\"\n\t*line_break\n\t\"My lips are sealed\".\n\t*goto nextone\n*label nextone\n*line_break\nThey're interrupted, as seems to happen so often, by the Head Nurse, Carrel,\n*line_break\n\"What do you think you two are doing? Put those cigarettes out and get back to work!\"\n*line_break\nThey hurry back inside. \n*page_break\nA little while later, Maria is taking the blood pressure of an amputee. Gabrielle steals a moment to come over,\n*line_break\n\"Little bit of gossip for you, apparently someone's been stealing medical supplies. Carrel thinks someone is supplying the guerrillas\".\n*line_break\nIncreasingly the Nationalist operations in the area have been hampered by Basque guerrilla forces. The Basques are a traditionalist, conservative and devoutly Catholic people. But they haven't sided with the military rebels. The Republic has promised the Basques their autonomy, something that this hardy and independent people are willing to fight and indeed die for.\n*page_break\nTo the Nationalists, autonomy for the Catalan and Basques is anathema. There can be no compromise, despite the similarity of the beliefs of both sides. Maria admires their faith. But they are the enemy. This isn't the straightforward crusade against Reds she might have hoped for.\n*line_break\n\"Who does she suspect?\"\n*line_break\n\"She doesn't know. She's starting an investigation. But if you ask me,\" she draws closer and lowers her voice, \"It's got to be one of the helpers\".\n*line_break\nUpon the establishment of the hospital, a number of locals with varying degrees of medical training have been taken on as support staff. Maria was assigned Eskarne, a woman in her mid thirties, a mother of three and a fully qualified nurse. She's far more talented than Maria, but she's a Basque. \n*line_break\n\"What about that Eskarne?\" Gabrielle asks, \"Has she been acting suspiciously?\"\n*line_break\n\"I haven't noticed anything, she's always been very hard working\".\n*line_break\n\"Well, it might not be her. Even so, I'd keep an eye on her, just in case. We've got to be vigilant, these Basques are treacherous\".\n*page_break\nBefore they can speculate further about the thief's identity, Senor Vidal makes an appearance,\n*if (vidrship = true)\n\t*line_break\n\t\"Maria, may I be impolite,\" he asks, \"May I be impolite and ask for a moment of your time, apologies Gabrielle\".\n\t*line_break\n\tGabrielle smiles politely, \"Of course Senor Vidal,\" however the look she gives Maria is far from polite.\n\t*line_break\n\t\"You're looking very pleasant today Maria\".\n\t*if (goingwell = true)\n\t\t*line_break\n\t\t\"I know I am Carlos, you tell me all the time!\"\n\t\t*line_break\n\t\tHe laughs, \"I can't help myself!\n\t\t*goto proposal\n\t*if (usehim = true)\n\t\t*line_break\n\t\t\"Oh do give it a rest, I'm wearing the same uniform I wear every day!\"\n\t\t*line_break\n\t\t\"Right, yes, of course. But it is nice.\n\t\t*goto proposal\n\t*if (gonewrong = true)\n\t\t*line_break\n\t\t\"Don't bother Carlos, you're not going to win me back with lame compliments\".\n\t\t*line_break\n\t\t\"Right... well I was just trying to be polite\".\n\t\t*line_break\n\t\t\"What, so I don't actually look nice do I?\"\n\t\t*line_break\n\t\t\"That's not what I meant!\t\t\n\t\t*goto proposal\n\t*goto proposal\n*else\n\t*line_break\n\t\"Senorita Farfan, may I be rather impolite and ask that you excuse me and Gabrielle for a moment so we could have a chat privately\".\n\t*line_break\n\t\"Of course Senor Vidal,\" she replies politely, although she is tempted to be anything but polite, \"Just let me finish up with this patient\".\n\t*line_break\n\tShe inflates pumps up the blood pressure monitor as Gabrielle and Vidal stand awkwardly. \n\t*line_break\n\t\"Shall we just go over there?\"\n\t*line_break\n\t\"Yes, I think so, see you later Maria\".\n\t*goto nexttwo\n*label proposal\nListen, I was just wondering whether you might be free tonight?\"\n*line_break\n\"What did you have in mind?\"\n*line_break\n\"I was thinking we might go to the pictures. There's a new film out, about the Rising\".\n*line_break\nMaria doesn't think about it, she responds,\n*choice\n\t*if (gonewrong = false)\n\t\t#\"Yes, it would be a pleasure\".\n\t\t\t\"Great, I'll see you around half seven?\"\n\t\t\t*line_break\n\t\t\t\"See you then!\"\n\t\t\t*set goingwell true\n\t\t\t*set usehim false\n\t\t\t*set date true\n\t\t\t*goto nexttwo\n\t#Yes, but only if you do something for me\".\n\t\t\"What?\"\n\t\t*line_break\n\t\t\"I don't want to be on nights. Not for the next month at least\".\n\t\t*line_break\n\t\tVidal tuts, \"You're so pathetic sometimes Maria\".\n\t\t*line_break\n\t\t\"I may be pathetic, but you find me irresistible. Perhaps that makes you even worse? Besides, if I'm not on nights, think what we might be able to get up to...\"\n\t\t*line_break\n\t\tVidal agrees there and then.\n\t\t*set usehim true\n\t\t*set goingwell false\n\t\t*set date true\n\t\t*goto nexttwo\n\t#\"No I'm busy tonight\".\n\t\t\"Oh, right. Ok, fair enough. I suppose I'll see you around then...\"\n\t\t*line_break\n\t\t\"I'm sure you will\".\n\t\t*if (gonewrong = true)\n\t\t\t*set vidrship false\n\t\t*goto nexttwo\n\t*if (gonewrong = true)\n\t\t#\"You want me to give you a second chance?\"\n\t\t\t\"Yes, that is what I want\".\n\t\t\t*line_break\n\t\t\t\"And why should I give you one?\"\n\t\t\t*line_break\n\t\t\tVidal looks away, \"I'm sorry alright? I'm sorry about what happened\".\n\t\t\t*line_break\n\t\t\t\"Sorry? You're sorry that you humiliated me in front of half the Falange regional committee?\"\n\t\t\t*line_break\n\t\t\t\"You're making it sound worse than it was!\"\n\t\t\t*line_break\n\t\t\t\"Oh really? And how would you feel if your own boyfriend told all his bloody mates that you're easy?\"\n\t\t\t*line_break\n\t\t\t\"All I want is to put that behind us. I'm sorry, I really am. I'd had too much to drink...\"\n\t\t\t*line_break\n\t\t\t\"And that's an excuse is it?\"\n\t\t\t*line_break\n\t\t\t\"No, no. Give me this second chance and I promise you won't regret it\".\n\t\t\t*choice\n\t\t\t\t#\"Fine, what harm can one date do?\"\n\t\t\t\t\t\"Thank you Maria, thank you. You won't regret it\".\n\t\t\t\t\t*line_break \n\t\t\t\t\t\"I better not!\"\n\t\t\t\t\t\"You won't\".\n\t\t\t\t\t*set goingwell true\n\t\t\t\t\t*set gonewrong false\n\t\t\t\t\t*set date true\n\t\t\t\t\t*goto nexttwo\n\t\t\t\t#\"Ok, but you've got to do something for me\".\n\t\t\t\t\t\"What?\"\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"I don't want to be on nights. Not for the next month at least\".\n\t\t\t\t\t*line_break\n\t\t\t\t\tVidal tuts, \"You're so pathetic sometimes Maria\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"I may be pathetic, but you find me irresistible. Perhaps that makes you even worse? Besides, if I'm not on nights, think what we might be able to get up to...\"\n\t\t\t\t\t*line_break\n\t\t\t\t\tVidal agrees there and then.\n\t\t\t\t\t*set usehim true\n\t\t\t\t\t*set gonewrong false\n\t\t\t\t\t*set date true\n\t\t\t\t\t*goto nexttwo\n\t\t\t\t#No, you're deluding yourself if you think we're ever getting together again\".\n\t\t\t\t\t\"Well, you've made your position quite clear, I'll leave you in peace then\".\n\t\t\t\t\t*line_break\n\t\t\t\t\t\"Thank you Carlos, much appreciated!\"\n\t\t\t\t\t*set date false\n\t\t\t\t\t*set vidrship false\n\t\t\t\t\t*goto nexttwo\n*label nexttwo\n*page_break\nAny possibility of further conversation is cut short by the Head Nurse alerting the staff that an ambulance has arrived. This is always one of the hardest times. Maria was physically sick the time she had seen a lorry full of casualties, the sheer amount of human suffering in such a confined space. But she'd been through this dozens of times now. She finds Eskarne in the crowd of medical staff.\n*line_break\n\"Over here, Eskarne!\"\n*line_break\n\"Yes Ma'am\".\n*line_break\nThey are assigned three of the fresh batch of wounded to attend to. \n*line_break\n\"This one has been shot through the leg several times. Wounds have been well dressed, they've stopped the bleeding at least,\" Eskarne reports.\n*line_break\n\"And this one's got, well these must be third degree burns. Pretty bad, all over his body\".\n*line_break\nThe final casualty wears a different uniform to the others. It's a Republican uniform. He's a Basque. Eskarne examines him,\n*line_break\n\"He's got very serious wounds, he's been shot in the chest,\" she puts her head to his chest, \"I think he's got a collapsed lung!\"\n*line_break\nOfficial orders are that Nationalist casualties are to be treated before Reds in any and all circumstances. They both know that all too well.\n*line_break\n\"This man [i]will[/i] die if he isn't operated on immediately,\" Eskarne protests.\n*line_break\nMaria hesitates. The other two injuries are probably not life-threatening, although the burns are very severe and it is possible that he may be suffering from smoke inhalation. The inside of his lungs might be burnt. If that is the case, his life may well be in danger. Maria decides to...\n*choice\n\t#Take the Basque to theatre\n\t\t*set marbrutal +10\n\t\t*achieve basque\n\t\t\"Maria please, this man will die!\" Eskarne is insistent.\n\t\t*line_break\n\t\t\"Ok, ok, let's get him inside\".\n\t\t*line_break\n\t\tAs they lift the stretcher, Maria notices that he wears a crucifix round his neck, not dissimilar to her own. He's immediately taken into surgery and just about makes it. By the time they get back to the burns victim, he's slipped away. He did have smoke inhalation. \n\t\t*set helpbasque true\n\t\t*goto nextthree\n\t#Take the burns victim for further examination.\n\t\t*set marbrutal -5\n\t\t\"Maria please, this man will die!\" Eskarne is insistent.\n\t\t*if marfas = false\n\t\t\t*line_break\n\t\t\t\"I can't help him and you know I can't, so please stop making me feel bad and get over here!\"\n\t\t*if marfas = true\n\t\t\t*line_break\n\t\t\t\"He's a Basque. We don't treat Basques. They are the enemy. So leave him before I report you for insubordination\".\n\t\t*line_break\n\t\tThey lift the stretcher of the burned soldier and take him into the hospital. As they walk past the Basque, Maria notices that he wears a crucifix round his neck, not dissimilar to her own. The Basque had died by the time they get back to him. He is buried in an unmarked grave behind the hospital along with a few dozen others. The burns victim did indeed have smoke inhalation and was quickly treated.\n\t\t*goto nextthree\n\t#Treat the soldier with the wounded leg.\t\n\t\t\"Here, we can dress this wound now, we don't need a doctor for this\".\n\t\t*if marfas = false\n\t\t\t*line_break\n\t\t\t\"I can't help him and you know I can't, so please stop making me feel bad and get over here!\"\n\t\t*if marfas = true\n\t\t\t*line_break\n\t\t\t\"He's a Basque. We don't treat Basques. They are the enemy. So leave him before I report you for insubordination\".\n\t\t*line_break\n\t\t\"I can't help him and you know I can't, so please stop making me feel bad and get over here!\"\n\t\t*line_break\n\t\tThey attend to the soldier's leg. As she walks past the Basque, Maria notices that he wears a crucifix round his neck, not dissimilar to her own. The Basque had died by the time they get back to him. He is buried in an unmarked grave behind the hospital along with a few dozen others. The burns victim did indeed have smoke inhalation and as he wasn't treated quickly, it's unlikely he'll make a full recovery.\n\t\t*goto nextthree\n*label nextthree\n*page_break\nOnce things have died down a bit, Eskarne and Maria take a much needed cigarette break. Light conversation seems inappropriate given the circumstances. Maria remembers the accusations about the medical supplies. She wonders whether she should ask Eskarne about it.\n*fake_choice\n\t#Yes, she asks her if she knows anything about it.\n\t\t\"No, no, I don't, I, who do they think did it?\"\n\t\t*line_break\n\t\t\"They suspect one of the Basque support staff\".\n\t\t*line_break\n\t\t\"And what do you think?\"\n\t\t*line_break\n\t\t\"It has to be the Basques, why would anyone else steal it?\"\n\t\t*line_break\n\t\t\"Yes, of course,\" Eskarne looks uncomfortable, \"I better get back to the wounded\".\n\t\t*line_break\n\t\tShe puts out her cigarette and leaves. Maria waits a little longer. She thinks she might know who did it.\n\t#Yes, she subtly mentions it's been happening.\n\t\t\"There's never enough morphine is there?\"\n\t\t*line_break\n\t\t\"No, the supply situation never seems to be very good,\" Eskarne smiles, nervously.\n\t\t*line_break\n\t\t\"Well it's not just that you know\".\n\t\t*line_break\n\t\t\"Oh?\"\n\t\t*line_break\n\t\t\"Oh no, apparently someone has been stealing medical supplies from the storeroom\".\n\t\t*line_break\n\t\t\"Really? Who?\"\n\t\t*line_break\n\t\t\"We don't know, we think it must be a Basque\".\n\t\t*line_break\n\t\t\"Why?\"\n\t\t*line_break\n\t\t\"It has to be the Basques, why would anyone else steal it?\"\n\t\t*line_break\n\t\t\"One of the Falangists might be addicted to morphine\".\n\t\t*line_break\n\t\t\"Hmmm, seems a bit unlikely\".\n\t\t*line_break\n\t\t\"Or maybe a soldier wanting to top up his dosage?\"\n\t\t*line_break\n\t\t\"Could be I guess\".\n\t\t*line_break\n\t\t\"Nothing is ever as it seems. At least not in this war\".\n\t\t*line_break\n\t\t\"You're right there Eskarne, you're right there\".\n\t#No, it wouldn't be a good idea to let her know there's an investigation.\t\n\t\tShe decides not to mention it. Once they're finished their cigarettes, Eskarne and Maria get back to work.\n*page_break\n7.23 P.M. that evening.\n\n*if (date = true)\n\tMaria sits in front of her mirror applying the final touches to her make-up. She reaches over and turns on the wireless set Carlos had bought her for her birthday last month. General Quieppo De Llano is delivering one of his bulletins from the Southern Front:\n\t*line_break\n\t\"I authorise you to kill like a dog anyone who dares oppose you and I say that if you act in this way, you will be free from all blame\".\n\t*line_break\n\t\"Our brave Legionnaires and Regulares have shown the Red cowards what it means to be a man. And incidentally, the wives of Reds too. These communist and anarchist women, after all, have made themselves fair game by their doctrine of free love. And now they have at least made the acquaintance of real men, and not milksops of militiamen. Kicking their legs about and struggling won't save them!\"\n\t*line_break\n\tMaria...\n\t*fake_choice\n\t\t#Agrees with the General.\n\t\t\tYes, she thinks, the Reds don't deserve any of our sympathy, the women should be treated just as cruelly as the men, they are degenerates.\n\t\t#Thinks his language is a tad strong but agrees in principle.\n\t\t\tWhat Quieppo is getting at is correct, the Reds, both men and women, are degenerates and must be taught a lesson. Perhaps someone in his position shouldn't encourage mass murder and rape, but this is war after all.\n\t\t#Disagrees, that is disgusting.\n\t\t\tRape and murder cannot be condoned in any situation, even against the degenerate Reds. They should be forgiven and re-educated in the Christian way of life, but treating them like filth will only serve to stir up hatred.\n\tMaria switches the wireless off, it's not the sort of thing she wants to be listening to before her rendezvous. Despite herself, she's actually rather excited about the whole thing. \n\t*goto drunk\n*else\n\tMaria sits alone in her dormitory. \n\t*if vidrship = false\n\t\tGabrielle has gone out on a date with Vidal. \n\tShe reaches over and turns on the wireless set, a birthday gift Gabrielle received from her suitor. General Quieppo De Llano is delivering one of his bulletins from the Southern Front:\n\t*line_break\n\t\"I authorise you to kill like a dog anyone who dares oppose you and I say that if you act in this way, you will be free from all blame\".\n\t*line_break\n\t\"Our brave Legionnaires and Regulares have shown the Red cowards what it means to be a man. And incidentally, the wives of Reds too. These communist and anarchist women, after all, have made themselves fair game by their doctrine of free love. And now they have at least made the acquaintance of real men, and not milksops of militiamen. Kicking their legs about and struggling won't save them!\"\n\t*line_break\n\tMaria...\n\t*fake_choice\n\t\t#Agrees with the General.\n\t\t\tYes, she thinks, the Reds don't deserve any of our sympathy, the women should be treated just as cruelly as the men, they are degenerates.\n\t\t#Thinks his language is a tad strong but agrees in principle.\n\t\t\tWhat Quieppo is getting at is correct, the Reds, both men and women, are degenerates and must be taught a lesson. Perhaps someone in his position shouldn't encourage mass murder and rape, but this is war after all.\n\t\t#Disagrees, that is disgusting.\n\t\t\tRape and murder cannot be condoned in any situation, even against the degenerate Reds. They should be forgiven and re-educated in the Christian way of life, but treating them like filth will only serve to stir up hatred.\n\tTurning off the wireless, Maria is bored. A thought enters her head. At first she dismisses it, but it resurfaces. She had always enjoyed reading detective novels. Against her better judgement, she decides to investigate for herself what's been going on with the missing morphine. \n\t*goto investigate\n*label drunk\n*page_break\nVidal drops her off just before midnight. She insists that there's no need for him to walk her home. \n*line_break\n\"What do you think's going to happen? Are the Basques going to get me?\" she laughs.\n*line_break\nAfter the film, a rather dull, patriotic affair, they'd gone for a drink in a local boy. The proprietor had said all drinks for a Falangist officer and his lady would be on the house. The one drink had become several and she was rather tipsy to say the least.\n*line_break\n\"Ok, if you insist, just be careful alright?\"\n*line_break\n\"You be careful, it's you they'll want, a bloody Falangist, not me!\" she giggles. \n*line_break\nLeaving Vidal chuckling to himself, Maria stumbles off into the night. She's walking past the Basque dormitory when she sees it. A light flashing in the wood behind the hospital. She...\n*choice\n\t#Goes to investigate.\n\t\tMaria cautiously approaches the source the light is emanating from. She has discarded her heels but is still rather unsteady on her feet, having to concentrate hard just to walk in a straight line. As she draws near, she can make out several silhouettes.\n\t\t\n\t\tThree armed men, one holding a lantern, are deep in conversation with a female figure. They're speaking a language Maria can't understand. It takes her a few seconds to realise it must be Basque. It really is nothing like Spanish! She takes another step forward to see if she can make out who the woman is. \n\t\t*page_break\n\t\tThe woman passes a bundle over to the men. Then, a snap. Maria looks down and realises stood on a twig. The Basques have heard. They scatter, putting the lantern out. Maria catches a brief glimpse of the woman's face. It might have been Eskarne. But it might not have been. She wishes she hadn't had so much to drink.\n\t\t*set sawinwood true\n\t\t*goto interview\n\t#Raises the alarm.\n\t\tShe hurries over to the sentry post, falling over more than once and discarding her heels. She bursts in looking rather dishevelled,\n\t\t*line_break\n\t\t\"I... there...\" she can't get her words out.\n\t\t*line_break\n\t\t\"What is it senorita?\"\n\t\t*line_break\n\t\t\"A light, a light in the woods!\"\n\t\t*line_break\n\t\t\"God, she's pissed isn't she?\" the guard remarks smirking.\n\t\t*line_break\n\t\t\"Pissed out of her mind,\" the other replies, \"Slurring her words, can't string a sentence together, embarrassing really\".\n\t\t*line_break\n\t\t\"P...please, I...\"\n\t\t*line_break\n\t\t\"Ah, I recognise her, she's Vidal's little whore isn't she? That dirty shit's probably filled her with more drink than she can handle and had his way her\".\n\t\t*line_break\n\t\t\"He'll have his comeuppance in the end, mark my words, man like him makes plenty of enemies\".\n\t\t*line_break\n\t\t\"Shut up you twats!\" a frustrated Maria shouts, \"There's a...\"\n\t\t*line_break\n\t\t\"Alright, there's no need for that missy,\" one of them cuts her off, \"You better get to y
