<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paranoia — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "Paranoia", "title": "Paranoia", "scenes": {"choicescript_description": "When you think your doctor may be trying to kill you, life gets complicated. Survive this multiple choice game if you can.\n\n[i]Paranoia[/i] is a 6,000-word interactive novel by Kie Brooks. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.", "choicescript_stats": "These are your statistics!\n\n*stat_chart\n    opposed_pair paranoia\n        Paranoia\n        Lucidity\n    text money Money\n    text medication Medication Taken Today\n    text day Day\n    text research Research\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  ADVERTISING\n  \n  Remove advertisements.\n  \n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n  *goto purchased_list\n*elseif choice_restore_purchases_allowed\n  RESTORE TRANSACTIONS\n  \n  If you've made purchases on another device, click here to transfer and restore your purchases on this device.\n  \n  *restore_purchases start\n\n*label purchased_list\n\n*if choice_purchased_adfree\n  ADVERTISING\n  \n  You've paid to remove advertisements.\n", "ending.choice": "*comment Copyright 2010 by Kie Brooks\n\nGame Over.\n\n*comment *page_break\n*comment Please support our work by sharing this game with friends!\n*comment The more people play, the more resources we'll have to work on the next game.\n\nWe hope you've enjoyed playing [i]Paranoia.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "evaluation.choice": "*comment Copyright 2010 by Kie Brooks\n\n*page_break\nCongratulations!\n\nYou have completed the game without ending up in an asylum or having your organs harvested.\n\n*if (paranoia = 0)\n\tYou were also very lucky, you consumed more than half the tablets to cure your paranoia.\n\tOne of the tablets in the bottle of medicine was harmful, but by random chance you never took that one.\n\t*goto stats\n\n*if  (day = 4)\n\tYou completed the game in the minimum time possible.\n\tWhy not play it again and try the random research option.\n\t*goto stats\n\n*label stats\n*temp lucid\n*set lucid (100 - paranoia)\n\nYour statistics were:\n*line_break\nParanoia vs. Lucidity ${paranoia}:${lucid}\n*line_break\nMoney Remaining ${money}\n*line_break\nDays in Game: ${day}\n\nPlease support our work by sharing this game with friends!\n\nThe more people play, the more resources we'll have to work on the next game.\n*share_this_game\n*goto_scene ending.choice\n", "paranoia_begins.choice": "*restart", "paranoia_intro.choice": "*reset\n\n*label intro\n[i]Paranoia is a thought process heavily influenced by anxiety or fear, often to the point of irrationality and delusion.[/i]\n*line_break\n—Wikipedia\n\n[i]Just because you're paranoid doesn't mean they aren't out to get you.[/i]\n*line_break\n—Woody Allen\n\nWe could tell you the aim of this adventure but can you really trust the author?\n\n*choice\n\t#Start?\n\t\t*goto_scene paranoia_begins.choice\n\t#About / Disclaimer\n\t\tThis game was written by Kie when he should have been studying.\n\t\t\n\t\tIf you like this game please go to http://www.taichipro.com and buy his Tai Chi CD.\n\n\t\tIt was written in the ChoiceScript programming language created by Dan Fabulich and Adam Morse.\n\t\t\n\t\tCheck out their other great titles at http://www.choiceofgames.com\n\n\t\tYour level of paranoia will increase and decrease throughout the game depending on your choices.\n\t\t\n\t\tDepending on your level of paranoia, you may perceive your choices differently.\n\t\t\n\t\tIt would probably be a good idea to avoid letting your paranoia exceed 90%, right now it is ${paranoia}%\n\n\t\tDisclaimer\n\t\t\n\t\tThis adventure is not intended to poke fun at anyone suffering from paranoia. If you believe you are suffering from any medical condition please consult your doctor. It is highly unlikely that they want to kill you and harvest your organs.\n\n\t\t'Paranoia' is Copyright 2010 Kie Brooks. All rights reserved.\n\t\t*page_break\n\t\t*goto intro\n\n", "paranoia_sting.choice": "*label sting\nYou decide to use yourself as bait in a sting operation.\n\nWhen the doctor tries to harvest and sell your organs you should have sufficient evidence to convince other parties.\n\nThe difficulty will be recording the event while staying alive and keeping all your bits intact. There is no-one that you can trust with this plan, so you are going to have to rely on yourself.\n\nAll that is required is a small video camera, pepper spray, precise planning, guts, and lots of luck.\n*page_break\nYour plan comprises:\n*comment 1. choose the location of the event\n\n1. get the attention of the doctor\n\n2. capture footage\n\n3. escape\n\nWhere are you going to start the plan?\n*temp fake_unconscious\n*set fake_unconscious false\n*choice\n\t#Your home.\n\t\tYou decide that the best place to stage this is at home.\n\n\t\tHow will you get the attention of the doctor?\n\t\t*choice\n\t\t\t#I phone the doctor and tell him that I took an overdose of the pills that he provided.\n\t\t\t\tWithin ten minutes two men arrive in white tunics, they hardly speak a word but hurry you into a white van.\n\t\t\t\t\n\t\t\t\tThe lack of markings on the van is disturbing.\n\t\t\t\t*goto warehouse\n\n\t\t\t#I pretend to take a pill and fall to the floor feigning unconsciousness.\n\t\t\t\t*set fake_unconscious true\n\t\t\t\tYou feign unconsciousness.\n\t\t\t\t\n\t\t\t\tWhile you are on the floor you begin to think that this is a bad idea.\n\t\t\t\tWho knows how long you might need to wait before being discovered?\n\t\t\t\t\n\t\t\t\tTo your surprise within 10 minutes, you hear footsteps and your door opens.\n\t\t\t\tYou realise that you must be under observation and they have keys to your front door!\n\n\t\t\t\tYou pretend to remain unconscious and are carried by two men in white tunics into an unmarked white van.\n\t\t\t\t*goto warehouse\n\n\t#The doctor's surgery.\n\t\tYou decide to take the fight to the enemy and stage this at the doctor's surgery.\n\n\t\tYou notice the friendly young receptionist from your first visit is no longer at the surgery.\n\t\t*choice\n\t\t\t#I tell the doctor that I took an overdose of the pills that he provided.\n\t\t\t\tThe doctor smiles and asks why you did that?\n\n\t\t\t\tHe tells you that you will need some immediate first aid at their emergency centre.\n\t\t\t\t\n\t\t\t\tTwo men in white tunics help you into a white van.\n\t\t\t\t*goto warehouse\n\n\t\t\t#I tell the doctor that I am feeling extremely ill and need immediate medical attention.\n\t\t\t\tThe doctor smiles reassuringly.\n\t\t\t\tHe conducts a few basic tests and then he tells you that you need some immediate first aid at their emergency centre.\n\t\t\t\t\n\t\t\t\tTwo men in white tunics help you into a white van.\n\t\t\t\t*goto warehouse\n\n\t\t\t#I have a bad feeling about this, time to back out.\n\t\t\t\tYou ask about the previous receptionist, but receive a cold \"She no longer works here\".\n\t\t\t\t\n\t\t\t\tYou leave pretending that this was the reason for your visit.\n\t\t\t\t*page_break\n\t\t\t\t*goto sting\n\n\n*label warehouse\n*page_break\nYou are driven to what looks like an abandoned warehouse out of town.\n*if (fake_unconscious)\n\tYou are wheeled into the warehouse and into what looks like an operating room.\n\tYour doctor starts scrubbing up for surgery.\n\n\t\"I thought he would never take the sedative\", the doctor laughs.  \"I have some anxious customers\", he says\n\tas much to himself as to the men in white tunics.\n\n\tYou get ready to make your move.\n\t*page_break\n\t*if (notes_compromised)\n\t\t*label compromised_warehouse\n\t\t\"Hold him down\", he barks to the men in white tunics who instantly obey.\n\t\t\n\t\t\"How did you know?\" you ask.\n\n\t\t*if (compromise_type = \"laptop\")\n\t\t\t\"You almost had me fooled but then you weren't very careful with the notes that you kept during your research.\"\n\t\t\tYou regret your poor computer security choices, but your head is swimming with the prospect of imminent death.\n\t\t\t*goto struggle\n\t\t*elseif (compromise_type = \"website\")\n\t\t\t\"I read your website.\"\n\t\t\tYou regret your excessive posting of information online, but your head is swimming with the prospect of imminent death.\n\t\t\t*goto struggle\n\t\t*else\n\t\t\t\"Well wandering around with that billboard was a dead giveaway.\"\n\t\t\tYou regret your poorly thought out methods of communication, but your head is swimming with the prospect of imminent death.\n\t\t\t*goto struggle\n\n\t\t*label struggle\n\t\tYou struggle but the men in tunics are too strong.\n\t\t*goto factory_death\n\n\n\t*else\n\t\t*label escape\n\t\tThey still think that you're unconscious and your video recorder is still recording.\n\t\t*choice\n\t\t\t#Wait to the last minute before using the spray.\n\t\t\t\tThe men in tunics leave the room and the doctor accompanied by a nurse prepare to begin.\n\t\t\t\tThe doctor raises your eyelid to check your state of consciousness and you pepper spray him in the face.\n\n\t\t\t\tThe nurse is in a state of shock.  You run out the room knowing that you life hangs in the balance.\n\t\t\t\tYou find that one of the cars outside the warehouse still has the keys in the ignition and you leave in a hurry.\n\t\t\t\t*goto inform_world\n\n\t\t\t#Pepper spray the guys in white tunics right now and run.\n\t\t\t\tThis is a risky manoeuvre, as when you spray the first guy the second one reacts and you feel a heavy hand\n\t\t\t\tgrab you and squeeze like a vice.  You convulse in pain and the pepper spray falls to the floor.\n\t\t\t\t*goto factory_death\n\n\t\t\t#I will allow him to remove one organ just to be sure.\n\t\t\t\tThat is really too trusting and you would rather keep your body intact.\n\n\t\t\t\t*goto escape\n\n*else\n\tYou are escorted into the warehouse and into what looks like an operating room.\n\tYour doctor starts scrubbing up for surgery.\n\n\t\"What is going on?\" you ask.\n\t\n\tThe doctor replies, \"I have some anxious customers\".\n\n\t*page_break\n\n\t*if (notes_compromised)\n\t\t*goto compromised_warehouse\n\t*else\n\t\t\"Many people have stood where you are standing now\", the doctor says, \"but none have ever left here alive\".\n\n\t\tYou struggle but the men in tunics are too strong.\n\t\t*goto factory_death\n\n\n*label inform_world\nWith video footage in hand it takes little effort to convince people.\nBefore long the police, newspapers and online forums are all buzzing with activity.\n\nThe world is a slightly safer place thanks to your efforts.\n\nYou can now relax and lower your guard…or can you?\n\n*goto_scene evaluation.choice\n\n\n*label factory_death\n\n*comment Fortunately you are given anaesthesia before the surgery commences.\n*comment Your death enabled someone else to live and your doctor to get very rich.\n*comment You are dead and your organs have been harvested.\nIs this the end for our hero?\n\nWill your organs be harvested like the other unfortunate missing persons?\n\nFortunately after making it this far, the author of the game feels that you deserve another chance.\n\n*if (notes_compromised)\n\t*set notes_compromised false\n\tAlso as your notes have been compromised and thus the doctor forewarned, they will be 'uncompromised' again.\n\nWhy don't you try the sting operation again?\n*page_break\n*goto sting\n\n\n\n\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Mr. Smith\"\n*set tablets 30\n*set day 1\n*set paranoia 58\n*set research \"none\"\n*set money 75\n\nThe letter reads:\n\n[i]${name}, you are in grave danger.[/i]\n*line_break\n[i]Be on your guard as your very life may depend on it.[/i]\n*line_break\n[i]An anonymous friend.[/i]\n\nThat was ominous. Why were they not more explicit about the nature of the danger?\n\n*fake_choice\n\t#Have a slice of cake.\n\t#Put the cake in the fridge.\n\t#Throw the cake away.\n\n*script changeBackgroundColor(\"black\")\n\n*set day 2\n*set name \"Ms. Cohen\"\n*set paranoia 67\n*set money 44\nYou look at the bottle of medicine on your bedside table. It has ${tablets} tablets left.\n\nThe doctor claims that it will help with your paranoid delusions and has prescribed one pill per day.\n\t\nYou think that the doctor may be trying to poison you.\n\nDo you take the medicine that the doctor has given you?\n*fake_choice\n\t#Yes of course.\n\t#Yes reluctantly.\n\t#No.\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Charlie\"\n*set day 4\n*set paranoia 74\n*set money 8\n\nThere may be somebody out there weird enough to want to spend their life with you.\n\nIt could be a welcome break from partnerless lovin'!\n\nHow do you go about trying to find the love of your life?\n*fake_choice\n\t#I look for my partner of choice at a meeting for paranoid skeptics.\n\t#I try to date the friendly receptionist that I met at the doctor's surgery.\n\t#I look for my partner online.\n\t#I decide that I should be concentrating on the main thrust of this adventure not trying to elicit romance.", "startup": "*title Paranoia\n*author Kie Brooks\n*scene_list\n\tstartup\n\tparanoia_sting.choice\n\tevaluation.choice\n\tending.choice\n\n\n\n*create name \"\"\n*create tablets 30\n*create day 0\n*create medication false\n*create poisened_medicine false\n*create paranoia 65\n*create money 50\n*create research \"\"\n*create compromise_type \"\"\n*create notes_compromised false\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and (not(choice_purchased_adfree) and not(choice_is_web))\n\tThis game is supported by advertisements, but you can buy the unlimited version\n\tto turn off ads forever.\n\n\t*purchase adfree $4.99 purchased\n\t*page_break_advertisement\n\n*label purchased\n\n*temp day_type\n*temp die_roll\n*temp poisoned_medicine\n*temp research_place\n*temp research_topic\n*temp research_storage\n*set research_storage false\n\n*comment 0-1000, 1000 most vulnerable\n*temp vulnerability\n*set vulnerability 0\n\n*temp chemical_analysis\n*temp chemical_analysis_equip\n*temp something_to_analyse\n*temp missing_story\n*set missing_story false\n*set chemical_analysis false\n*set chemical_analysis_equip false\n*set something_to_analyse true\n\n*temp organ_story\n*set organ_story false\n*temp gorilla_story\n*set gorilla_story false\n\n*temp cake_fridge\n*set cake_fridge false\n*temp cake_analysed\n*set cake_analysed false\n*temp pills_analysed\n*set pills_analysed false\n\n*temp paranoia_0\n*temp paranoia_100\n*set paranoia_0 false\n*set paranoia_100 false\n\n*temp inform_fail\n*set inform_fail false\n\n*label intro\n[i]Paranoia is a thought process heavily influenced by anxiety or fear, often to the point of irrationality and delusion.[/i]\n*line_break\n—Wikipedia\n\n[i]Just because you're paranoid doesn't mean they aren't out to get you.[/i]\n*line_break\n—Woody Allen\n\nWe could tell you the aim of this adventure but can you really trust the author?\n\n*page_break\n\n*comment this choice is good for testing :)\n*comment I may remove it later or just reduce the adjustments.\n*comment What do you believe your true starting level of paranoia should be?\n*comment *fake_choice\n*comment\t#Not paranoid in the slightest, some would even call me pronoid.\n*comment\t\tYou think everyone likes you.\n*comment\t\t*set paranoia -7\n*comment\t#I have a healthy suspicion of everyone.\n*comment\t\tNot everyone would consider it healthy.\n*comment\t\t*set paranoia +0\n*comment\t#Why do you want to know?\n*comment\t\tIt seems you don't even trust the author of the game.\n*comment\t\t*set paranoia +7\n\n*comment run this everyday\n*label day_begins\n*set day +1\n*set paranoia +5\n*if (paranoia_0 or paranoia_100)\n\t*set paranoia -5\n*set poisoned_medicine false\n*set medication false\n\n*comment if there are no tablets left\n*if (tablets = 0)\n\t*goto check_notes\n\n*comment this if is needed as rand does like rand of only 1\n*if (tablets = 1)\n\t*set poisoned_medicine true\n\t*goto medicine\n\n*rand die_roll 1 tablets\n*if (die_roll = 1)\n\t*set poisoned_medicine true\n\t*comment DEBUG: That is the poisoned tablet!\n\t*goto medicine\n\n*comment plus something special if paranoia level reaches 100 (or zero)\n*if (paranoia > 99)\n\t*set paranoia_100 true\n\t*set paranoia 100\n\tYou experience extreme paranoia.\n\tYou are not sure if you can make it through the day.\n\n\t*temp die_roll5\n\t*rand die_roll5 1 10\n\t*if (die_roll5 > 7)\n\t\tThe people around you are all out to get you and those men in white jackets don't seem to be your friends.\n\t\t*line_break\n\t\tThey give you a straight jacket to wear and you are escorted to the local asylum where you spend the rest of your days.\n\t\t*goto_scene ending.choice\n\t*else\n\t\tYou manage to keep your sanity today, but it is a struggle.  You're not sure how long you can last.\n\t\t*goto medicine\n*elseif (paranoia \u003c 1)\n\tYou feel like you don't need to take the medicine anymore and have no feelings of paranoia.\n\t*set paranoia_0 true\n\t*set paranoia 0\n\t*goto morning\n\n\n*label medicine\n*if (paranoia > 89)\n\tThe bottle of medicine on your bedside table looks at you.\n\t\n\tIt growls, its stomach filled with poison. \n\n\tThere are ${tablets} tablets left.\n\t*goto take_medicine\n\n*elseif (paranoia \u003c 11)\n\tA sweet jar of delicious tablets beckons you to take one.\n\n\tThere are ${tablets} tablets left.\n\t*goto take_medicine\n\n*else\n\tYou look at the bottle of medicine on your bedside table. It has ${tablets} tablets left.\n\n\tThe doctor claims that it will help with your paranoid delusions and has prescribed one pill per day.\n\t\n\tYou think that the doctor may be trying to poison you.\n\t*goto take_medicine\n\n\n*label take_medicine\n*if (paranoia > 89)\n\tThere is no way that you are taking any of the poison from that treacherous doctor.\n\t*goto morning\n*elseif (paranoia \u003c 11)\n\tDo you take the medicine as prescribed by your doctor?\n\t*choice\n\t\t#Yes of course.\n\t\t\tQuite right, it's good for you.\n\t\t\t*set medication true\n\t\t\t*set paranoia -8\n\t\t\t*set tablets -1\n\t\t\t*goto morning\n\t\t#No.\n\t\t\tEven though I probably should, I don't feel like it this morning.\n\t\t\t*set medication false\n\t\t\t*goto morning\n*else\n\tDo you take the medicine that the doctor has given you?\n\t*choice\n\t\t#Yes of course.\n\t\t\tQuite right, why would the doctor be trying to poison you?\n\n\t\t\t*goto take_medicine2\n\t\t#Yes reluctantly.\n\t\t\tYou think you had better take it although you are suspicious of the doctor's motives.\n\n\t\t\t*label take_medicine2\n\t\t\t*set medication true\n\t\t\t*set paranoia -9\n\t\t\t*set tablets -1\n\t\t\t*goto morning\n\t\t#No.\n\t\t\tYou don't take the medicine as you don't trust your doctor.\n\t\t\tBetter safe than sorry.\n\n\t\t\t*set medication false\n\t\t\t*goto morning\n\n\n*label morning\n*if (poisoned_medicine) and (medication)\n\n\tYou start to feel dizzy, was it the medicine?\n\t*line_break\n\tYou collapse on the floor.\n\n\tYou never reawaken to see your doctor dressed in gloves mask and surgical gown, scalpel in hand.\n\tYour death enabled someone else to live and your doctor to get very rich.\n\n\tYou are dead and your organs have been harvested.\n\t*goto_scene ending.choice\n\n\n*comment run this everyday\n*comment *if (os != \"paper\")\n*label check_notes\n*temp die_roll2\n*rand die_roll2 1 1000\n*if (die_roll2 \u003c vulnerability)\n\t*set notes_compromised true\n\t*set compromise_type \"laptop\"\n\t*goto weather\n\n*comment run this everyday\n*label weather\n*if (paranoia \u003c 30)\n\tThe weather is looking fine.\n\t*goto day_check\n*elseif (paranoia \u003c 50)\n\tThe weather is looking fair.\n\t*goto day_check\n*elseif (paranoia \u003c 70)\n\tThe weather is looking gloomy.\n\t*goto day_check\n*elseif (paranoia \u003c 85)\n\tThe weather is looking threatening.\n\t*goto day_check\n*elseif (paranoia \u003c 95)\n\tThe weather is looking frightening.\n\t*goto day_check\n*else\n\tAarrghh, beware the weather.\n\t*goto day_check\n\n\n*label day_check\n*if ((day > 4) and (organ_story = false))\n\n\tHmmm, it might be a good idea to investigate the doctor's background.\n\n\t*goto day_activities\n\n*if ((day > 4) and (missing_story = false))\n\n\tHmmm, you might want to check the local news to see if there has been anything out of the ordinary.\n\n\t*goto day_activities\n\n*if (day > 1)\n\t*goto day_activities\n\n*label doorbell_postman\nThe doorbell rings.\n\nYou are not expecting anyone, what do you do?\n*choice\n\t#Answer the door.\n\t\t*label postman\n\t\tIt is the postman, \"I have a parcel for you, could you sign here please.\"\n\n\t\t*goto assign_name\n\t#Look through the window.\n\t\tYou see the postman.  It looks like he has a parcel.\n\t\t*choice\n\t\t\t#Open the door.\n\t\t\t\t*goto postman\n\t\t\t#Pretend you are not at home.\n\t\t\t\tThe postman rings the doorbell for a while and then leaves the package outside the front door.\n\n\t\t\t\tYou look around after he has left and seeing that no-one is around, you retrieve the parcel.\n\t\t\t\tThe parcel is addressed to, errr...\n\t\t\t\t*goto assign_name\n\t#Go hide under the bed.\n\t\tAre you sure it is even safe to do that? There may be monsters under your bed.\n\t\t*choice\n\t\t\t#Hide under the bed.\n\t\t\t\tUnfortunately there really was a monster under your bed and he was hungry.\n\n\t\t\t\tYou were eaten.\n\t\t\t\t*goto_scene ending.choice\n\n\t\t\t#Pluck up courage and answer the door.\n\t\t\t\t*goto postman\n\n\n*label assign_name\n*if (name = \"\")\n\tWhat do your friends call you?\n\n\t*fake_choice\n\t\t#Friends? I have no friends.  You can refer to me as \"Your Highness\".\n\t\t\t*set name \"Your Highness\"\n\t\t#Why do you need to know my name? I prefer to remain anonymous.\n\t\t\t*set name \"Mr. Smith\"\n\t\t#Alright I will tell you my name but don't write it down anywhere.\n\t\t\tMy name is:\n\t\t\t*input_text name\n\t*goto open_package\n\n\n*label open_package\n*temp open_box1\n*temp read_note1\n*temp warning_letter1\n*temp read_warning_letter1\n*set open_box1 false\n*set read_note1 false\n*set warning_letter1 false\n*set read_warning_letter1 false\n\nThe parcel is covered in brown wrapping paper and tied with string.\n\nYou carefully open it and find a note addressed to you (${name}) and a box.\n*choice\n\t#Read the note.\n\t\t*label read_note\n\t\t*if (open_box1) and (read_note1)\n\t\t\t*goto day_activities\n\n\t\t*set read_note1 true\n\t\tThe note reads \"What's in the box?\"\n\t\t*if (open_box1) and (read_note1)\n\t\t\t*goto day_activities\n\t\t*line_break\n\t\tIntrigued, you open the box.\n\t\t*goto open_box\n\t#Open the box.\n\t\t*label open_box\n\n\t\t*set open_box1 true\n\n\t\tYou carefully examine the box. It is made of thin white cardboard.\n\t\tYou can't hear any ticking and it doesn't look like an explosive device.\n\n\t\t*temp die_roll3\n\t\t*rand die_roll3 1 5\n\t\t*if (die_roll3 = 1)\n\t\t\tThe box is empty.\n\t\t\t*fake_choice\n\t\t\t\t#Examine it more carefully.\n\t\t\t\t\tIntriguing, the box is totally empty, but there are some strange marks on one corner.\n\t\t\t\t\tIt looks like it may have been scuffed by a man in his mid-40's who was left handed and had a limp.\n\n\t\t\t\t\tWho are you kidding? You are not Sherlock Holmes.\n\n\t\t\t\t#Discard it.\n\n\t\t\t\t\tYou make a note to scold the environmentally unsound actions of the sender,\n\t\t\t\t\twhen you find out who sent it.\n\n\t\t\t*goto read_note\n\n\t\t*elseif (die_roll3 > 2)\n\t\t\tThe box contains a delicious looking cake, strangely however an envelope has been dropped on top of the cake.\n\t\t\t*set warning_letter1 true\n\n\t\t\t*choice\n\t\t\t\t#Read the letter.\n\t\t\t\t\t*label read_warning_letter\n\t\t\t\t\t*set read_warning_letter1 true\n\n\t\t\t\t\tThe letter reads:\n\n\t\t\t\t\t[i]${name}, you are in grave danger.[/i]\n\t\t\t\t\t*line_break\n\t\t\t\t\t[i]Be on your guard as your very life may depend on it.[/i]\n\t\t\t\t\t*line_break\n\t\t\t\t\t[i]An anonymous friend.[/i]\n\n\t\t\t\t\tThat was ominous. Why were they not more explicit about the nature of the danger?\n\t\t\t\t\t*goto cake_choice\n\t\t\t\t#Examine the cake.\n\n\t\t\t\t\tWhy read when you can eat?\n\n\n\t\t\t\t\t*goto cake_choice\n\n\t\t*else\n\t\t\t*comment cake without warning letter\n\t\t\tThe box contains a delicious looking cake.\n\t\t\t*goto cake_choice\n\n\n\n*label cake_choice\n*choice\n\t*if ((warning_letter1) and (read_warning_letter1 != true))\n\t\t#Actually I ought to read the letter that came with the cake.\n\t\t\t*goto read_warning_letter\n\n\t#Have a slice of cake.\n\t\tYou have a slice of the cake, it tastes great, although it has a slightly strange aftertaste.\n\n\t\tYou start to feel dizzy, you collapse on the floor.\n\n\t\tYou never reawaken to see your doctor dressed in gloves mask and surgical gown, scalpel in hand.\n\t\tYour death enabled someone else to live and your doctor to get very rich.\n\n\t\tYou are dead and your organs have been harvested.\n\t\t*goto_scene ending.choice\n\n\t#Put the cake in the fridge.\n\t\tYou put the cake in your fridge for later.\n\t\t*set cake_fridge true\n\t\t*goto day_activities\n\n\t#Throw the cake away.\n\t\tWhat a terrible waste.\n\t\t*line_break\n\t\tYou are probably a pie supporter in the cake vs. pie debate.\n\t\t*goto day_activities\n\n\n*label day_activities\n\n*if (paranoia > 79)\n\tDo you wear your tinfoil hat?\n\t*fake_choice\n\t\t#Yes.\n\t\t\tBetter safe than sorry, don't want those aliens interfering with my brainwaves!\n\t\t\t*if (paranoia_100 = false)\n\t\t\t\t*set paranoia +2\n\t\t\t\t*goto day_activities2\n\n\t\t#No.\n\t\t\tParanoid does not equate to stupid.\n\n\t*goto day_activities2\n\n\n*label day_activities2\nOK ${name}, it is time to decide on today's activities.\n*choice\n\t*if ((money \u003c 240) and (chemical_analysis_equip = false))\n\t\t#Earn some money, useful for buying equipment among other things.\n\t\t\t*goto earn_money\n\t*if ((((chemical_analysis = false) or (organ_story = false)) or (missing_story = false)) or (gorilla_story = false))\n\t\t#Do some investigating.\n\t\t\t*if (research_storage)\n\t\t\t\t*goto investigate_place\n\t\t\t*else\n\t\t\t\t*goto research_storage\n\t*if ((((cake_analysed or pills_analysed) or (organ_story and missing_story))) and (inform_fail))\n\t\t#Conduct a sting operation to gather more evidence so that people will believe you.\n\t\t\t*goto_scene paranoia_sting.choice\n\t#Other...\n\t\t*goto other_activities\n\n\n*label other_activities\n\nYou have something else in mind.\n*choice\n\t*if (((cake_analysed or pills_analysed) or missing_story) and organ_story)\n\t\t#I need to get the truth out to the whole world.\n\t\t\t*set day_type \"after an exasperating day\"\n\t\t\t*goto inform_world_without_evidence\n\n\t*if (((chemical_analysis) and (chemical_analysis_equip)) and (something_to_analyse))\n\t\t#Do some chemical analysis.\n\t\t\t*set day_type \"after a day of chemical tests\"\n\t\t\t*goto chem_analysis\n\n\t*if ((chemical_analysis) and (chemical_analysis_equip = false))\n\t\t#Do some chemical analysis.\n\t\t\tYou have the knowledge but not the equipment to do some laboratory tests.\n\t\t\t*choice\n\t\t\t\t#Purchase some chemical analysis equipment.\n\t\t\t\t\t*set day_type \"after a day of shopping\"\n\t\t\t\t\t*if (money > 199)\n\t\t\t\t\t\t*set money -200\n\t\t\t\t\t\t*set chemical_analysis_equip true\n\t\t\t\t\t\tYou spend the day purchasing various equipment which will allow you to analyse all sorts of chemical substances.\n\t\t\t\t\t\t*goto day_ends\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou don't have enough money\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tYou need at least 200 dollars to purchase the equipment you need, you only have ${money} dollars.\n\t\t\t\t\t\t*goto other_activities\n\t\t\t\t#Hold off purchasing equipment for now.\n\t\t\t\t\t*goto other_activities\n\n\t#Find the love of my life.\n\t\t*set day_type \"after a long day of searching for love\"\n\t\t*goto find_love\n\n\t*if (paranoia_0 = false)\n\t\t#Conduct surveillance.\n\t\t\tOne way to investigate the suspicious goings on around you is to watch everyone.\n\t\t\t*line_break\n\t\t\tUnfortunately in your eyes everyone looks suspicious.\n\t\t\t*set day_type \"after a wasted day of watching through your window with binoculars\"\n\t\t\t*set paranoia +4\n\t\t\t*goto day_ends\n\n\t#On second thoughts, I would like the re-examine the previous choices.\n\t\t*goto day_activities2\n\n\n\n*label chem_analysis\nWhat do you want to analyse?\n*choice\n\t*if (cake_fridge)\n\t\t#The cake that is in the fridge.\n\t\t\tYou analyse the cake.  It has some sedatives that you would not expect to find in a cake.\n\n\t\t\tGood thing you didn't eat it!\n\t\t\t*set cake_analysed true\n\t\t\t*set cake_fridge false\n\t\t\t*goto day_ends\n\n\t*if (tablets > 0)\n\t\t#The pills prescribed by my doctor.\n\t\t\tDo you analyse one pill or the whole bottle?\n\t\t\t*choice\n\t\t\t\t#one pill.\n\t\t\t\t\t*if (tablets = 1)\n\t\t\t\t\t\t*set tablets -1\n\t\t\t\t\t\tYou analyse your last pill, it contains a heavy sedative.\n\n\t\t\t\t\t\tGood thing you didn't take it.\n\t\t\t\t\t\t*set pills_analysed true\n\t\t\t\t\t\t*goto day_ends\n\t\t\t\t\t*else\n\t\t\t\t\t\t*rand die_roll 1 tablets\n\t\t\t\t\t\t*if (die_roll = 1)\n\t\t\t\t\t\t\t*set tablets -1\n\t\t\t\t\t\t\t*set pills_analysed true\n\t\t\t\t\t\t\tYou analyse the pill, it contains a heavy sedative.\n\n\t\t\t\t\t\t\tGood thing you didn't take it.\n\t\t\t\t\t\t\t*goto day_ends\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*set tablets -1\n\t\t\t\t\t\t\tThe pill seems to contain the ingredients listed in the lease don't tell me that you never shower.\n\t\t\t#I stash the notepad in a secret place whenever I leave the house.\n\t\t\t\tSeems sensible, Hopefully you will never get burgled.\n\t\t\t#Oh you would like to know wouldn't you. I'm not telling.\n\t\t\t\tFair enough.\n\t\t*goto investigate_place\n\n\t#I use a computer for all my notes.\n\t\tWhat OS your computer run?\n\t\t*fake_choice\n\t\t\t#I run Microsoft windows, (I dream of Steve Balmer at night).\n\t\t\t\tYour system is not very secure.\n\t\t\t\t*set os \"microsoft\"\n\t\t\t\t*set vulnerability 250\n\t\t\t#I run Apple Mac, (Steve Jobs is my daddy).\n\t\t\t\tYour system is not very secure, but it is more secure than Microsoft and easier to use.\n\t\t\t\t*set os \"apple\"\n\t\t\t\t*set vulnerability 50\n\t\t\t#I run GNU/Linux, (RMS is my hero).\n\t\t\t\tYour system is relatively secure.\n\t\t\t\t*set os \"linux\"\n\t\t\t\t*set vulnerability 10\n\n\t\tHow do you keep your files?\n\t\t*fake_choice\n\t\t\t#On the computer of course.\n\t\t\t\tSeems like a reasonable choice.\n\t\t\t\t*set storage \"computer\"\n\t\t\t\t*set vulnerability +0\n\t\t\t#On a USB key.\n\t\t\t\tOoh good idea, careful you don't lose it.\n\t\t\t\t*set storage \"usb\"\n\t\t\t\t*set vulnerability +0\n\t\t\t#On facebook.\n\t\t\t\tA public website? That may not be the most secure storage option.\n\t\t\t\t*set storage \"facebook\"\n\t\t\t\t*set vulnerability +200\n\t\t\t#On myspace.\n\t\t\t\tWell nobody looks at myspace anymore so it may be slightly more secure than facebook.\n\t\t\t\t*set storage \"myspace\"\n\t\t\t\t*set vulnerability +175\n\n\t\t*if (os = \"linux\") and ((storage = \"computer\") or (storage = \"usb\"))\n\n\t\t\tDo you take any further precautions?\n\t\t\t*fake_choice\n\t\t\t\t#Yes, I use an encrypted partition.\n\t\t\t\t\t*set encryption true\n\t\t\t\t\t*set vulnerability -9\n\t\t\t\t#No.\n\t\t\t\t\t*set encryption false\n\t\t\t\t\t*set vulnerability +0\n\n*goto investigate_place\n\n\n*label day_ends\n\nThe sun sets ${day_type} a
