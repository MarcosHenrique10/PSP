rry I can't save you, Kanibor. Me giving you my blood isn't going to prevent...\" Your voice trails off and then you gesture meaningfully at him. \"This. Maybe there's something else I can do.\"\n\t\t\n\t\tKanibor scuttles a few inches closer to you, making Baxter bristle, a hand drifting towards the rolling pin. [b]\"You're [i]sorry[/i][/b],\" he spits contemptuously. [b]\"I'm dying brutally of thirst at the edge of a dessert. You're waving pitchers of ice water in front of my face and offering me a nice place to sit! Why did I ever save you, you repulsive, ungrateful primate?\"[/b]\n\t\t\n\t\tYou recoil slightly, suddenly mildly fearful. Even in this geriatric state, who knows how quickly Kanibor could attack if he was desperate or angry enough? \"${name} isn't repulsive!\" Azure says at the same time as Tariano says, \"Be careful ${name}, his spine is bristling up. Probably a sign of aggression.\"\n\t\t\n\t\tKanibor appears increasingly flustered, his glassy eyes rolling as he swivels his ears in all directions. \"What if you drank someone else's blood?\" Aurora suddenly blurts out. \"I mean, does it really have to be ${name}'s? Maybe it's not as effective. At this point, who cares?\"\n\t\t\n\t\tA low, shrieking growl of frustration comes from Kanibor. [b]\"Dying, dying, and these fools are buzzing in my ears like evil gnats.\"[/b] He slumps face first into the bed, twitching with seizures. [b]\"Fuck you to hell, ${name}. I curse you like I was cursed.\"[/b]\n\t\t\n\t\tHe lets out a rattling gasp, and then falls very still. Aurora claps a hand to her mouth, horrified. The others start all talking at once in panicked, hushed voices. While before you couldn't bear to look at Kanibor after his return, you can't stop looking at his ancient features now that he's gone. You can feel the bile rising in your throat. \"I'm sorry,\" you say hoarsely to deaf ears. \n\t\t*goto grave \n\t\t  \n\t\t*label deception_comfort\n\t\t*set deception_comfort true \n\t\t*set deception +2\n\t\t*set tough +1 \n\t\t*set mysterious +1 \n\t\t*set kanibor -5\n\t\t(+2 Deception, +1 Mysterious, +1 Tough, Kanibor Disapproves)\n\t\t*line_break \n\t\tYou don't owe Kanibor anything. He's not your responsibility, and you certainly don't need to bow to the deranged demands of a dying vampire. He may well desiccate you trying hopelessly to save himself. \"I'm not giving you another drop of my blood,\" you say icily. \"I want you to leave, Kanibor. I can't help you.\"\n\t\t\n\t\tKanibor half scuttles, half lurches another foot closer to you, causing Baxter to grab the rolling pin. [b]\"You can help me, so, so easily, but you won't!\"[/b] he snarls venomously. [b]\"I'm dying a tormented, humiliating death while you reap all the rewards of my efforts and spit in my face, you vile, ungrateful simian.\"[/b]\n\t\t\n\t\tYou pace back cautiously, fully aware of the anger in his tone. Even in his advanced aged state, he might still attack if he gets desperate enough. \"${name} isn't vile!\" Azure protests at the same time as Tariano advises urgently, \"${name}, be careful. His tail is twitching faster and faster.\"\n\t\t\n\t\tKanibor is getting increasingly agitated, his head rolling and his body quaking. \"Everyone, just stop,\" Aurora says, her voice hard yet pleading. \"You're all just making everything worse.\" Then, \"Kanibor, surely you could drink someone else's blood. I mean...\"\n\t\t\n\t\tWhat can only be described as a demonic caterwaul explodes from Kanibor's vocal chords. The hair on his tail blows up, bushy and jagged. [b]\"I'm dying, dying, dying, and these bastards are droning and buzzing in my ears like a plague of insects.\"[/b] He advances another step closer. [b]\"Fuck you to hell and back, ${name},\"[/b] he hisses. [b]\"I curse you now, like I was cursed.\"[/b]\n\t\t\n\t\tYou almost think he's going to leap onto you, trying to sink his teeth into your neck. But then he grows very rigid, exhales a rattling gasp, and collapses face first into the bed. Aurora gasps in horror and the others murmur in hushed, panicked tones. You stare in shocked silence for several seconds, but there's no denying it. Kanibor is dead. \n\t\t*goto grave\n\t\t\n*label grave\n*page_break ... \n\nWhile you were asleep after first arriving at the hotel, the band got a rental vehicle which they used to go back to Rot Fest and retrieve all the gear your band left behind. The rental vehicle is going to come in handy again, because you have to find somewhere to bury Kanibor tonight. You're beginning to think comfort in life is always but a cruel, temporary illusion. \n\nAurora, eyes misty with tears, bundles Kanibor's body, already stiff with rigor mortis, into two white bed sheets. Azure consoles her, hugging her and resting her head against her. \"I know you really miss Nutmeg,\" she whispers.\n\n*if not(intelligence_aurora)\n\tYou wonder who they're talking about. A childhood pet, maybe. \n*if (intelligence_aurora)\n\tYou recall what Aurora shared with you about her grandma's cat on the balcony. No wonder this has been so difficult for her.\n*if (tough_comfort)\n\tYou touch the fresh scars on your arm. They still sting, and the others can't stop staring at you when they think you're not looking. But those are small prices to pay for easing another creature's suffering in his final moments. \n*if (charisma_comfort)\n\tYou brush your fingers across the fresh scars on your arm. They still burn and itch, and everyone can't stop looking at you when they think you won't notice. But you would do it to your other arm too if it meant Kanibor could die a dignified, peaceful death.\n*if (intelligence_comfort)\n\tYou wonder if you could have done anything differently. You doubt it, yet regret still gnaws at your insides. The thought of Kanibor cursing you keeps clanging around in your head. \n*if (deception_comfort)\n\tKanibor shouldn't have even come here. Now you're responsible for dealing with his corpse. You wonder if this nightmarish pact will finally be over when you bury him. Yet the thought of him cursing you keeps reemerging, foreboding, in your head. \n\t\nTariano is the first one to break the room out of its grim stupor. \"I think we should do this as soon as possible,\" he says seriously. \"If anyone else finds Kanibor, we could get into some weird trouble with the authorities. Besides, this strange new species would be all over the news.\"\n\nImagine Larry's sense of vindication then. You shudder at the thought. Baxter runs to the car and returns several minutes later, panting and triumphantly clutching a road map. He lays the map out on his bed, indicating a winding route traced in pencil. \"I found a nearby cemetery. It's huge. It's the perfect place to bury a body and not get caught.\"\n\n*page_break \n\nImages of a moonlit cemetery flash through your mind for the second time, vivid and ominous. You shiver. \"This road hugs the river and leads right to the cemetery,\" Baxter continues. \"Going the opposite direction a few minutes, there's a supermarket where we can pick up a shovel to do the dirty work. No pun intended. Fuck me, that was like a triple entendre. But we need to leave quickly before the store closes.\"\n\n\"I'm going, obviously,\" you say, steeling your nerves for the new misadventure ahead. \"I'm the one who started all this.\" You look around at the group who has been with you through all of it, whether they knew it or not. \"We need to be as secretive as possible, so I can only take one other person with me.\"\n\nThere are no immediate volunteers. \n*if (baxter \u003c= 50)\n\tBaxter paces nervously, hands held behind his back and his brow furrowed pensively. \"Whoever goes should probably be someone stealthy,\" he thinks aloud.\n*if ((baxter > 50) and (baxter_partner = false))\n\tBaxter is making the floorboards creak with his constant nervous pacing. \"I wouldn't say no or anything, if you don't mind having Sasquatch as your partner on a stealth mission.\"\n*if (baxter_partner)\n\tBaxter paces the room, making a sort of orbit around you, eyes regularly flicking in your direction. \"Logically speaking, someone nimble and stealthy should go. But it was my bright idea, and it could be dangerous.\"\n\n*if (azure \u003c= 50)\n\tAzure's eyes keep flicking nervously to the bundle of sheets. \"Well, I'm very nimble and fast under ordinary circumstances. I think I would just need to get used to the bile rising in my throat.\"\n*if ((azure > 50) and (azure_partner = false))\n\tAzure seems to be trying to avoid looking at the bundle of sheets, yet unable to keep snatching furtive glances. \"I can fit through tight spaces, run fast, hide well, everything like that. I would just need to get passed my heebie jeebies.\"\n*if (azure_partner)\n\tAzure can't stop looking bath and forth between the bundle of sheets and anything but the bundle of sheets. Her gaze travels to you several times, her big, pretty eyes filled with worry and courage all at once. \"I would be the perfect cemetery goblin. I just need to shake these jitters.\"\n\n*if (tariano \u003c= 50)\n\tTariano has been busy nervously mutilating a hangnail on his thumb, one of the many perks of guitar playing. \"I have below average stamina, but I have no fears of graveyards considering I used to write poetry in them,\" he says matter of factly.\n*if ((tariano > 50) and (tariano_partner = false))\n\tTariano has been absentmindedly fiddling with his fingers so much that they look like giant tap dancing spiders. \"Even though I happen to love graveyard poetry and graveyards in general, I should warn you that my endurance is objectively subpar.\"\n*if (tariano_partner)\n\tTariano sends a meaningful look your way with those deep brown eyes, fidgeting nervously with his hoodie pocket. \"I actually have spent a lot of time in graveyards writing poetry and whatnot and don't mind them at all. But I have to admit, my stamina sucks.\" \n\n*if (aurora \u003c= 50)\n\tAurora rubs her tears away almost angrily. \"I apologize for being so irrationally emotional. I guess Kanibor just looks like one of my old cats. For some reason, I want to help bury him.\"\n*if ((aurora > 50) and (aurora_partner = false))\n\tAurora wipes her tears away with a self deprecating sort of sigh. \"Sorry for being so freaking emotional. I guess Kanibor really reminds me of one of my old cats. I think I want to help bury him.\"\n*if (aurora_partner)\n\tAurora scrubs her tears away with obvious embarrassment that hurts you somehow. She looks around the room but catches your eyes especially. \"Sorry for being so obnoxiously emotional. I guess Kanibor really reminds me of my old cat, Nutmeg. I think maybe I should help bury him.\"\n\nWho do you decide to take with you to the cemetery to bury Kanibor? What you're going to do is necessary, but a little morbid, potentially dangerous, and definitely illegal. And, ultimately, no one's responsibility but your own. \n*choice\n\t#Baxter\n\t\t*goto tough_grave\n\t\t\n\t#Azure  \n\t\t*goto charisma_grave\n\t\t\n\t#Tariano\n\t\t*goto intelligence_grave \n\t\t\n\t#Aurora\n\t\t*goto deception_grave \n\t\t\n\t\t*label tough_grave\n\t\t*set tough_grave true \n\t\t*set intimidating +1 \n\t\t*set charisma +1 \n\t\t*set tough +2\n\t\t*set baxter +1\n\t\t*set helper \"Baxter\"\n\t\t*set helper_he \"he\"\n\t\t*set helper_his \"his\"\n\t\t*set helper_him \"him\"\n\t\t*set helper_his_plural \"his\"\n\t\t(+2 Tough, +1 Charisma, +1 Intimidating, Baxter Approves)\n\t\t*line_break \n\t\t\"Baxter,\" you say. \"You can dig a grave easily, can't you?\"\n\t\t\n\t\tMap already in hand, Baxter stands beside you, looking so serious that he might have been preparing to go to war. The two of you wish the others goodbye and quickly but carefully carry Kanibor, wrapped in bed sheets but already stinking faintly, to the rental car. \n\t\t\n\t\tThe pink bug-mobile leaves zero doubt in your mind who chose the vehicle. Baxter rolls his eyes with a sardonic grin. \"Fuck us, right? But at least we won't get randomly pulled over in [i]this[/i].\"\n\t\t*goto hypodermic_shot  \n\t\t\n\t\t*label charisma_grave \n\t\t*set charisma_grave true \n\t\t*set charisma +2 \n\t\t*set deception +1 \n\t\t*set mysterious +1\n\t\t*set azure +1\n\t\t*set helper \"Azure\"\n\t\t*set helper_his \"her\"\n\t\t*set helper_he \"she\"\n\t\t*set helper_him \"her\"\n\t\t*set helper_his_plural \"hers\"\n\t\t(+2 Charisma, +1 Mysterious, +1 Deception, Azure Approves)\n\t\t*line_break \n\t\t\"Azure,\" you say. \"You can sneak through a graveyard easily, can't you?\"\n\t\t\n\t\tTaking the map from Baxter, Azure stands by your side, breathing hard with nerves and excitement. The two of you wish the others goodbye and move rapidly but carefully to the rental car. \n\t\t\n\t\tThe bundle of sheets is already starting to reek faintly. The pink bug-mobile you arrive at can only have your present company responsible. She grins dazzlingly and bats her eyelashes dramatically. \"No one would ever suspect us of committing midnight crimes in this iconic thing, right?\"\n\t\t*goto hypodermic_shot \n\t\t\n\t\t*label intelligence_grave\n\t\t*set intelligence_grave true \n\t\t*set intelligence +2 \n\t\t*set charisma +1 \n\t\t*set chill +1 \n\t\t*set tariano +1\n\t\t*set helper \"Tariano\"\n\t\t*set helper_he \"he\"\n\t\t*set helper_his \"his\"\n\t\t*set helper_him \"him\"\n\t\t*set helper_his_plural \"his\"\n\t\t(+2 Intelligence, +1 Chill, +1 Charisma, Tariano Approves)\n\t\t*line_break \n\t\t\"Tariano,\" you say. \"This should be like a stroll in the park for someone of your particular proclivities, right? It may even inspire another poem.\"\n\t\t \n\t\tTariano accepts the map from Baxter and stands beside you, looking simultaneously petrified and excited. The others wish the two of you good luck, and then you're off to the rental car. \n\t\t\n\t\tYou move carefully yet with urgency, already uncomfortably aware of the growing stench of decay coming from the bundle of sheets. The pink bug-mobile can only have been selected by one band member. Tariano rolls his eyes heavily. \"I judged her. Oh, I judged her.\" \n\t\t*goto hypodermic_shot \n\t\t\n\t\t*label deception_grave\n\t\t*set deception_grave true \n\t\t*set deception +2\n\t\t*set charisma +1 \n\t\t*set chill +1 \n\t\t*set aurora +1\n\t\t*set helper \"Aurora\"\n\t\t*set helper_he \"she\"\n\t\t*set helper_his \"her\"\n\t\t*set helper_him \"her\"\n\t\t*set helper_his_plural \"hers\"\n\t\t(+2 Deception, +1 Charisma, +1 Chill, Aurora Approves)\n\t\t*line_break \n\t\t\"Aurora,\" you say. \"I can tell this is important for you to see through to the end too.\"\n\t\t\n\t\tAurora accepts the map from Baxter and stands beside you, looking jittery yet fully committed to the task ahead. The others wish that the two of you break legs, and then you're quickly and quietly off to the rental car. \n\t\t\n\t\tThe gaudy pink bug-mobile can only have your companion's best friend as the culprit. Aurora shakes her head repeatedly with an exaggerated, elongated sigh. \"I would never have authorized this if I was there, trust me.\"\n\t\t*goto hypodermic_shot\n\n*label hypodermic_shot\n\nYou drive well above the speed limit to the store to buy two shovels as well as some water bottles and crackers for sustenance and then immediately head to the cemetery. The narrow, winding roads are thick with curtains of fog coming from the river. \n*if (tough_grave)\n\tBaxter calmly and expertly gives you instructions, making navigating slightly less nerve-wracking. \"Thanks for coming with me, Baxter,\" you say. \"You didn't have to.\"\n\t\t\n\tHe snorts and waves your words away, but you catch him grinning like a fool for the rest of the ride. \n*if (charisma_grave)\n\tAzure tries her best as navigator, but her butchery of the street sign pronunciations makes getting to your destination tricky. \"Thanks for coming with me, Azure,\" you say, massaging your temples and forehead tiredly but not using any sarcasm. \"You really didn't have to.\"\n\t\n\tAzure waves your words away and [i]pshhh[/i]'s tolerantly, but you notice her mood is brighter, her clarity is sharper, and her street sign pronunciations are more useful the remainder of the drive. \n*if (intelligence_grave)\n\tTariano calmly and helpfully gives you instructions with the map, making navigating surprisingly smooth. \"Thanks for coming with me, Tariano,\" you say. \"You know you didn't have to.\"\n\t\n\tHe blushes furiously and simply bobs his head, accepting your thanks in silence. \n*if (deception_grave)\n\tAurora diligently navigates with the map, even finding a short cut to get you to the cemetery a couple minutes faster. \"Thanks for coming with me, Aurora,\" you say. \"You obviously didn't have to.\"\n\t\n\tShe looks almost shocked by your thanks, but grins and bobs her head as if it was a no brainer. \nYou park a block away from the cemetery and cautiously walk to its black, iron gate, slick and shiny with condensation. \n\nThe place appears old fashioned and obviously neglected, unlikely to have very many, if any, security cameras or security guards. You hope. \n*if (tough_grave)\n\tThe two of you climb over the gate, Baxter struggling, grunting and panting loudly. \n*if (charisma_grave)\n\tYou climb over the gate, while Azure, slender and short, literally squeezes through two rungs almost effortlessly like a cat. \n*if (intelligence_grave)\n\tThe two of you climb over the gate, Tariano moving slowly and carefully and muttering reassurances and instructions to himself. \n*if (deception_grave)\n\tThe two of you climb over the gate, Aurora moving with practiced dexterity that suggests she was an avid tree climber or fence hopper when she was younger. \n\t\t\nYour way illuminated with nothing but moonlight, clutching the bundle of sheets and your shovel, you carefully steal across the wide, gaping cemetery with ${helper} at your side. You maneuver around dozens of grave markers, most of them faded or eroding, but some of them bearing still vibrant flowers. After wandering through the darkness for several minutes, you find a suitable enough area to discreetly dig a fresh grave.\n\n*page_break \n\n*if (tough_grave)\n\tBaxter wields his shovel like a weapon, glaring suspiciously at a snapping twig in the distance. \"Let's hurry the fuck up,\" he whispers. \"This place is giving me the major creeps. And I don't scare easily, ${name}.\"\n*if (charisma_grave)\n\tAzure carries her shovel like a ward against evil, looking with wide eyes at a crunching branch in the distance. \"Um, ${name}, we should get this done as quickly as fucking possible and then skedaddle,\" she whispers. \"My sixth sense is ringing its alarms.\"\n*if (intelligence_grave)\n\tTariano grips his shovel with white knuckles, peering around anxiously at rustling leaves in the distance. \"${name}, not to rush you or anything,\" he whispers. \"But we might want to hurry. I keep feeling like someone is watching us.\"\n*if (deception_grave)\n\tAurora holds her shovel like a weapon, looking vigilantly around at a breaking branch in the distance. \"My six sense alarms are starting to go off, ${name}. Big klaxons,\" she whispers warily. \"Lets do this quickly and get the hell out of here. Anyone could be watching.\"  \n\t\t\nYou can't help but agree, and cast one last look around the cemetery to quiet your mind before you start digging. Tendrils of fog snake around the bases of stone and marble grave markers. The silver moonlight shines across the vast yard, revealing nothing but endless possibilities beyond its reach. You shiver, again. \"Right. It shouldn't take very long.\"\n\nThat turns out to be painfully false. Together, you and ${helper} dig a proper, six foot grave. A shallow one won't do when it needs to hide evidence of an alien. It's back breaking, hard labor with the hard, cold, muddy ground and the cheap, small, dull shovels you got at the supermarket. After several hours of work, the grave is finally finished, but you and ${helper} are panting and shivering from exhaustion, and covered in mud and sweat in almost equal measure. \n\nOut of your peripheral vision, you detect a dark figure emerging from behind a large, nearby gravestone. Everything happens very fast as he comes at you from behind. You react too sluggishly with a foggy brain and burning muscles and a hypodermic needle slides right into your neck. You crane it around. [i]Larry.[/i] You call out a horrible, useless, garbled warning as ${helper} is lowering Kanibor, bundled in white sheets like a ghost, into the grave. \n\nLarry kicks ${helper} in the rear, sending ${helper_him} plunging into the gaping black hole with a scream of surprise followed by the heavy thud and large muddy splat of a crash landing. As you're tumbling, tumbling to the ground like a condemned skyscraper demolition, eyes being pulled shut by an unstoppable force despite your mind screaming to stay awake, you witness Larry drawing a pistol equipped with a silencer and pointing it into the grave.\n\n*if (tough_grave)\n\t\"Sorry, big fella,\" he says almost regretfully. \"Had to even the odds against you somehow.\"\n*if (charisma_grave)\n\t\"No hard feelings, toots,\" he says with obvious pleasure.\n*if (intelligence_grave)\n\t\"I actually, honestly feel bad,\" he says almost ruefully, \"but I know for a fact your stickler ass will never let this go.\"\n*if (deception_grave)\n\t\"I'm really sorry about this, Roar,\" he says, his voice tight with emotion. \"I gave you so many chances, and you repeatedly, intentionally chose the wrong side.\"\n\nHe aims the gun and fires into the grave with a shriek of sparks and a muted [i]bang[/i], and then you're swallowed by a warm, fuzzy, drug induced abyss.\n\n*finish ", "chapter8cemetery": "*temp conclusions 0\n\n[b]Chapter Eight of Eight: The Moonlit Cemetery[/b]\n\n*image sunset.jpg\n\nYour eyelids peel open very slowly as though glued shut. Trying to move, you find your body feels like lead. You're tingling all over with pins and needles. Your tongue tastes like mud and feels like it weighs five pounds. Wherever the hell you are is dark, cold, and moving. You shift and find yourself face to face with a pornography magazine and several crushed beer cans.\n\nYou realize with a jolt that you're in Larry's trunk. You suddenly remember what happened and your eyes burn like lava as tears flow out of their own volition. [i]You got  ${helper} killed.[/i] Poor ${helper} never stood a chance. \n*if (tough_grave)\n\tYou cringe at the thought of a man his size falling that hard. Even if the fall miraculously didn't break bones, the bullet would have finished the job. \n*if (charisma_grave)\n\tSomeone as light and agile as her may have been able to avoid serious damage in the fall. But someone that light would also suffer that much more from a gunshot wound. \n*if\t(intelligence_grave)\n\tTariano is slender, so maybe he would have been able to avoid broken bones from the fall. But his vibrant red hair would present him as an easy target for a bullet even in a dark grave. \n*if (deception_grave)\n\tYou dragged Aurora into this, knowing full well she was an ex girlfriend of the psychopath stalking you. Now you can't stop picturing her leg broken at an odd ankle, body bleeding out from a gunshot wound. \n\nSomehow, you repress the urge to vomit. You need to take stock of your surroundings. Your life depends on it. Already, you can feel yourself slowly regaining motor and executive functions. You should be out like a busted light, but maybe Larry botched drugging you, or maybe the injection was simply a dud. \n\nYou don't really care one way or another and gladly accept the miracle. You're not going to die, not like this, not by Larry's hands. By now, your eyes are gradually adjusting to the darkness. You check your pockets, discovering disdainfully that Larry thought to take your phone. You're completely alone. \n\nThen again, you have faced everything alone your whole life. That's not going to stop you. You push the porno mag and alcohol cans away, searching for something more useful to use. There's not even a tire iron, just some half empty cans of motor oil and a couple crumpled up bags of potato chips. Fucking Larry. You're going to have to get creative if you want to get out of this predicament. \n*choice\n\t*selectable_if (tough > 39) #Try to kick out a tail light to get him pulled over (Requires 40 Tough)\n\t\t*goto tough_trunk \n\t\t\n\t#Bang on the trunk and yell your head off, hoping someone will notice\n\t\t*goto charisma_trunk \n\t\t\n\t*selectable_if (intelligence > 39) #Splash his face with motor oil the second he opens the trunk (Requires 40 Intelligence)\n\t\t*goto intelligence_trunk  \n\t\t\n\t*selectable_if (deception_effie) #Bide your time, play dead, and attack him with your pocketknife when you get a chance (Requires Pocketknife)\n\t\t*goto deception_trunk \n\t\t\n\t\t*label tough_trunk \n\t\t*set tough_trunk true \n\t\t*set intelligence +1 \n\t\t*set intimidating +1 \n\t\t*set tough +2\n\t\t(+2 Tough, +1 Intimidating, +1 Intelligence)\n\t\t*line_break \n\t\tGrunting with effort, you roll onto your back and scoot as far back into the small, cramped trunk as you will go. The faint red glow of the brake lights is just visible through gaps in the car's plastic trim as Larry applies the brakes. Bringing your foot back, you slam your ${shoe} with every ounce of strength you can muster into the back of the light. \n\t\t\n\t\tThere's a faint cracking sound, a slight give of the light fixture. You're panting hard, sweat pouring down your forehead and into your eyes. The air suddenly feels stale and oppressively hot in here, and your body is shivering with exertion. You wait for several agonizing seconds, making sure Larry hasn't noticed anything. The car keeps moving. \n\t\t\n\t\tYou reel your leg back and deliver another blow to the light, teeth bared with effort. This time, there's a big [i]crunch[/i] of plastic and a shattering of glass. Powerful vibrations rattle your leg all the way up to the knee, and you gasp as a shard of glass cuts into your ankle. You lurch violently as Larry slams on the brakes, grinding the car to a squealing halt. \n\t\t\n\t\tSuddenly your hands are shaking uncontrollably, your heart nearly beating out of your chest. You realize you're terrified. Then you realize that's a good thing. You should be terrified. Not knowing what else to do, you scrunch up into one corner of the trunk, good leg coiled to deliver a brutal kick to Larry's face the second the door  opens. \n\t\t\n\t\tThe car's driver door opens and slams shut. You tense, mind racing, muscles screaming in  maddening anticipation. The trunk door pops open, and your foot flies right into thin air. Larry is standing several feet back, pistol calmly aimed at you. \"Get the fuck out of the car before I unload, you punk ass bitch.\"\n\t\t*goto revenge \n\t\t\n\t\t*label charisma_trunk \n\t\t*set charisma_trunk true \n\t\t*set charisma +2 \n\t\t*set rebellious +1 \n\t\t*set tough +1\n\t\t(+2 Charisma, +1 Rebellious, +1 Tough)\n\t\t*line_break \n\t\tJust think about it from a kidnapper's perspective: wouldn't you hate if your victim was being all inconvenient and obnoxious by blowing your cover? Taking as deep a breath as you can in this cramped, stale trunk, you yell at the top of your lungs. [i]\"Heeelp! Somebodyyy!\"[/i]\n\t\t\n\t\tYou bang on the trunk with your fists until they're bruised and kick it until your feet hurt, creating a terrible reverberating racket in the confined space. You're about to start hollering again when Larry slams on the brakes. Tires squeal on asphalt and you lurch forward, slamming into the wall, smelly beer cans flying everywhere. \n\t\t\n\t\tYou barely have time to brace yourself before Larry is throwing the driver door open and stomping towards the trunk. You open your mouth to start shouting again but are left with a rock in your throat as the trunk swings open. Larry towers over you, pistol pointing at your face. \"No one's going to hear you. But I dare you to try that again.\"\n\t\t\n\t\tYour spirits sink as you slowly take in your gloomy surroundings. You're not on the highway or even some back road. You're still in the graveyard, on the slender, winding serpent road surrounded by tombstones. Larry presses the barrel of the gun painfully to your forehead. \"Get out nice and easy, silent as a lamb, or I pull the trigger and watch your swollen head explode.\" \n\t\t\n\t\tSuddenly the lump in your throat disappears and you feel able to scream. Yet silently, hopelessly, eyes downcast, refusing to look at Larry's baleful gaze, you slowly and carefully climb out of the trunk as instructed. Then you clench your jaw, resolute. No one's going to come and save you, and you already knew that. You're going to have to save yourself. \n\t\t*goto revenge \n\t\t\n\t\t*label intelligence_trunk \n\t\t*set intelligence_trunk true \n\t\t*set intelligence +2 \n\t\t*set tough +1 \n\t\t*set intimidating +1 \n\t\t(+2 Intelligence, +1 Intimidating, +1 Tough)\n\t\t*line_break \n\t\tYou gather the three motor oil cans together. One of them is nearly empty, not particularly useful for your purposes unless you want to throw it at Larry's head. You'll use it as backup. The others are half-empty, perfect for you to crush their lower halves with rapid, powerful force, expelling the air and the oil with it in a surge onto Larry's unsuspecting face. \n\n\t\tYour plan unfolds exactly as you had envisioned it, like calculating a winning plan in a chess game and watching your opponent happily blunder into it move by move. When Larry slows the car to a halt several agonizing minutes later, you crouch in one corner of the trunk, clutching one motor oil can, the others at the ready. The driver door opens and shuts, and footsteps approach the trunk.\n\t\t\n\t\tYou wait with baited breath, muscles burning with kinetic energy, mind rapt with attention as you wait for the exact moment. It's motor oil versus a gun. Then the trunk is swinging open, and you lean forward with the oil can, crushing it together between your hands with every fiber of strength you can muster. You only have time to register Larry's surprised face and the glint of his gun before he's submerged in a torrent of viscous brown oil. \n\t\t\n\t\tLarry staggers back, clapping a free hand to his face and groaning and retching. His face is shiny with thick oil, and he coughs and splutters, furiously wiping at his eyes as he aims his pistol this way and that. You lift the second can of oil to soak him again, but then he aims his gun into the trunk at random and fires. \n\t\t\n\t\tThe muted bang of the silencer reverberates inside the trunk, bludgeoning your head like fists, and the brief flash of sparks illuminates Larry's face, plastered with oily hair, teeth bared and the tendons in his neck popping with rage. You try to jump out of the trunk, until Larry shoves the barrel of his gun into your cheek. \"Get out nice and easy, and drop that fucking can,\" he wheezes.\n\t\t*goto revenge \n\t\t\n\t\t*label deception_trunk \n\t\t*set deception_trunk true \n\t\t*set deception +2\n\t\t*set tough +1 \n\t\t*set intimidating +1 \n\t\t(+2 Deception, +1 Intimidating, +1 Tough)\n\t\t*line_break \n\t\tYou check your pants, and are flooded with relief to find that Larry must have only stolen your phone rather than doing a thorough search, another small blessing in and of itself, because your knife is still there. Digging it out of your pocket with uncoordinated, numb fingers, you activate the blade and clutch it in front of you like a tiny sword in the darkness. \n\t\t\n\t\tYou try to remain hyper vigilant as you wait, but the darkness and the rhythmic sounds of the wind rushing and car wheels spinning are disturbingly lulling. Damn drugs. As time stretches on, doubts about your plan creep in. One failed attempt with this little toothpick and you'll surely be filled with lead by a trigger happy madman.\n\t\t\n\t\tThe vehicle slows to a stop, quickly followed by the sounds of Larry getting out and shutting the driver door. You conceal the pocketknife behind one arm, keeping one eye barely cracked open as you wait to strike like a cornered viper. The trunk swings open, and still you wait, muscles screaming in anticipation. \"You should be awake by now,\" Larry growls, jamming the barrel of his gun into your ribs.\n\n\t\tYou continue to play dead, fingers slack, trying to keep your breathing deep and rhythmic despite your nervous system being on fire. Larry pulls his pistol back and roughly grabs your collar with his other fist. As he violently hauls you to a sitting position, you open your eyes and drive your pocketknife towards his chest. He twists like a contortionist, and your blade slashes fabric and flesh rather than driving into him.\n\t\t\n\t\tSnarling with pain, Larry brings the pistol back and lashes out with an angry grunt. It's impossible to dodge in your confines, and the pistol grazes your skull. Stars explode in your vision, your head explodes with pain. You're rattled, panicking now, and your next blow is parried harshly by Larry's gun, bashing your fingers and sending the blade flying into the darkness. He angles the barrel at you, panting and clutching at his bleeding wound, eyes enraged. \"Get. Out.\"\n\t\t*goto revenge \n\t\t\n*label revenge \n*page_break \n\nPushing carts in the summer rain at the grocery store. Laughing in secret with your coworkers about Effie's tantrums on your lunch breaks. Cruising in your old clunker when you had nothing better to do. Jamming, producing, traveling, performing, and bonding with Baxter, Azure, Tariano, and Aurora. \n*if (baxter_partner)\n\tEspecially Baxter.\n*if (azure_partner)\n\tEspecially Azure. \n*if (tariano_partner)\n\tEspecially Tariano.\n*if (aurora_partner)\n\tEspecially Aurora.\nYearning for a successful, happy life you never thought you really deserved or was possible for you. All of that is slipping away, a blurred, ruined painting in the rain.\n\n*if (tough_trunk)\n\tNot wanting to entrust your life to Larry's sanity, you climb out of the trunk, jaws clenched. You're dismayed to see that you're still on a narrow asphalt lane surrounded by gravestones. No one would have seen his broken tail light. Your ankle trickles with blood, and it wobbles as you stand there before Larry, glaring at him defiantly. \n*if (charisma_trunk)\n\tMechanically, feeling hollow inside yet strangely accepting of your fate, you climb out of the trunk without looking at Larry. Furtively, you glance around for any sign of maintenance workers, but no one is here. Your screams went unheard. When you finally look at him again, he's smiling victoriously at you. \n*if (intelligence_trunk) \n\tThe air hangs with the odor of oil, burning your nostrils, and you nearly slip and break your neck as you climb out of the oil-slick trunk in near darkness. Larry, having finished scrubbing his face furiously with his hoodie sleeve, vomits into the dirt. You twitch, and he aims the gun at you in warning.  \n*if (deception_trunk)\n\tFeeling deflated and numb, you climb out of the trunk, expressionless as Larry points his gun in your face. You feel a small amount of satisfaction at the blood seeping between his fingertips from his ribs, but it's only a surface wound. As you stand there glumly, you scan your surroundings for your knife, and spot it glinting mockingly under the car. \n\t\n\"I'm going to do you a favor before you die,\" Larry says. \"I'll ease your aching conscience and tell you that ${helper} is still alive. This gun has always had only one bullet loaded. The shot I took at ${helper} was a blank.\" He grins insanely, his teeth and eyes glinting in the moonlight like a werewolf. \"That single bullet was originally intended for me, if things ever got too pointless. Now, it's meant for you.\"\n\t\nIt feels like the air has been ripped from your lungs. You stare at Larry with wide eyes, disbelieving. Is ${helper} really still alive, or is Larry just tormenting you emotionally before putting you down? He starts pacing back and forth in agitation. He shakes his head, scoffing loudly. \"You know, none of this was supposed to happen. But you came in out of nowhere and destroyed everything I ever worked for.\"\n\nHe keeps the gun aimed on you at all times as he paces, but gesticulates animatedly with his other hand. He's like an eccentric orator for an audience of one watching a dimly let tragedy they didn't want to see. \"I knew the band for years in the scene when I was a thrash metal singer. Hell, I dated the drummer. I blew all of those other auditions out of the water. I was finally going to be someone, do something I actually cared about. Then you happened.\"\n\n*page_break \n\n\"I never meant to steal your role from you-\" you say.\n\n\"Shut up!\" Larry snaps, his voice sharp as a slaver's whip. \"I've been constantly ignored and endlessly lied to for weeks, and now someone's finally going to listen.\" He advances a step, fire burning in his eyes. \"I knew you were cheating from the very beginning. But no one believed me, and I got relegated to being your sidekick when I was supposed to be the frontman.\"\n\nYour body trembles and aches with exhaustion, but you're intently focused on Larry's gun as he continues to rant and rave. If there really is only one bullet loaded, you may still have a chance to get away. \"The band adored your horrible burping vocals, when it was so obviously fake. And I was slowly ostracized and ridiculed while you were put on a pedestal. Until you finally kicked me out of my own band for trying to reveal your lies.\"\n\nHe suddenly takes you by the shoulders, shaking you and screaming in your face. \"You ruined my fucking life!\" He lets you go and stomps around again. You're stiff, afraid to move. \"And then I saw you making it big with my band, going on a huge tour with Brain Rot. I knew you were cheating, still fucking cheating. I had to stop you, even if no one else believed me.\"\n\nLarry laughs an unhinged laugh that does not make you feel good for your chances. \"My bimbo boss at the record store wouldn't let me take time off for your concert, so I quit. I couldn't afford the price gouging ticket, so I took out a predatory loan. I sacrificed everything to try to get my dream back from you, and what did I find? You were working with some kind of monster! That explains the fucking monster voice, doesn't it?\"\n\n\"And they still didn't believe me!\" Larry yells in disbelief, a manic grin on his face, his eyes bugging out and the veins prominent on his neck. The gun grins and winks at you threateningly with every reflection of moonlight. \"I thought I was going insane. I thought I was cursed and the whole world was against me no matter what, just like always.\"\n\nHe scoffs and shakes his head, looking down at the ground. Then he raises the gun at your chest. \"It doesn't matter. You know what you did. Now, if you apologize with every ounce of humility in your heart and beg for your life, I may show you mercy you never showed me.\"\n*choice\n\t#Tell him you're never going to beg and grovel to him\n\t\t*goto tough_apologize \n\t\t\n\t*selectable_if (charisma > 39) #Sincerely apologize for your part in this; tell him you never meant for any of it to happen this way (Requires 40 Charisma)\n\t\t*goto charisma_apologize\n\t\t\n\t*selectable_if (intelligence > 39) #Implore him to think about this rationally and consider his future (Requires 40 Intelligence)\n\t\t*goto intelligence_apologize\n\t\t\n\t#Apologize to him to try to save yourself, even if he's the cause of all his problems\n\t\t*goto deception_apologize\n\t\t\n\t\t*label tough_apologize\n\t\t*set tough_apologize true \n\t\t*set charisma +1 \n\t\t*set rebellious +1 \n\t\t*set tough +2\n\t\t*set larry -1\n\t\t(+2 Tough, +1 Rebellious, +1 Charisma, Larry Disapproves)\n\t\t*line_break \n\t\tGrimly, with as much dignity and self-respect as you can muster, you shake your head and look Larry in the eyes. \"I'm never going to beg and grovel for your sadistic amusement. I know you'll just kill me anyway. I'm not making you do this, Larry. Just do whatever the hell you have to do.\" \n\t\t\n\t\tLarry scoffs loudly and shakes his head with a bitter laugh. \"See, this has always been your problem.\" He suddenly lashes out, grasping one fistful of your hair with his free hand and jamming the barrel of his pistol painfully into your face. \"You just have to win. You always wanted everything and couldn't even leave me scraps. Even when your famous, rich life is on the line, you still can't even apologize.\"\n\t\t\n\t\tYour scalp burns like fire, and the cold metal pressed against your face is a harrowing reminder of how close you are to death. Yet only Larry has any real decision making power here. \"You pushed all of your friends and colleagues away,\" you gasp through gritted teeth. \"You chose to sabotage me and make ultimatums because you wanted everything. None of us were going to kick you out or make you insignificant, Larry. You did this to yourself. All of it.\"\n\t\t\n\t\tLarry tightens his grip on your hair until it feels like chunks are going to rip from your scalp, making your eyes swim with tears. \"Shut up!\" he roars. \n\t\t\n\t\tYou're starting to feel more confident now, like you're the one wresting control over this insane conversation. \"You tried to intimidate me from the beginning. You refused to cooperate with us when we tried to keep you in the band and tried to be civil with you, Larry. You treated everyone else like they were beneath you. Then you became violent when you didn't get your way. You ruined your own fucking life, don't you see that?\" \n\t\t\n\t\tLarry looks like he's in physical pain, his mouth open in anguish and his eyes shining with tears of anger. \"I was just reacting to everyone and everything always fucking me over! How am I to blame when you and everyone else in the world is against me?\" he half complains, half screams. Then, shaking his head ruefully, he levels the gun at you. \"Blaming me for everything isn't an apology. Some people never learn, but I guess this bullet will be your final lesson.\"\n\t\t*goto helper\n\t\t\n\t\t*label charisma_apologize \n\t\t*set charisma_apologize true \n\t\t*set charisma +2 \n\t\t*set intelligence +1 \n\t\t*set chill +1\n\t\t*set larry +1\n\t\t(+2 Charisma, +1 Chill, +1 Intelligence, Larry Approves)\n\t\t*line_break \n\t\tYou never intended for any of this to happen. Larry is obviously emotionally and mentally unstable, but you can see how from his perspective, he was treated unfairly and demoted out of the blue. You doubt he ever wanted things to escalate to this life or death situation, but he seemed propelled by righteous anger. \n\t\t\n\t\tYou feel crestfallen with the weight of everything, for the horrible emotional and physical struggles you have had with Larry that you never wanted but could never avoid. A part of you wants to tell him the truth about Kanibor now, but then he might kill you for playing games with him. You look him right in the eyes, voice choked with emotion. \"I'm sorry for everything, Larry. Please, just let me explain.\"\n\t\t\n\t\tHe gestures impatiently with the pistol, so you swallow hard and continue. \"I wish we were never enemies. I didn't mean to steal the singing role of ${band} from you. I was about to be homeless, with no car and no job. I was just trying to survive somehow. I'm sorry the others picked me when they had already picked you. That must have been painful, and it wasn't fair.\"\n\t\t\n\t\t\"It was torture,\" he scoffs disdainfully. \n\t\t\n\t\tYou nod understandingly. \"It wasn't fair to you. But they thought they were just making the best decision for the band. We could have written lyrics together, even shared different vocal roles with our different styles and abilities. I'm sorry you thought I was trying to steal the mic from you. I wish I handled things differently, Larry. But I was fighting for my life. I'm so sorry.\"\n\t\t\n\t\tLarry remains silent for an unnervingly long amount of time, his expression difficult to read in the darkness. When he finally speaks, his voice is husky with bitter emotion. \"That was a beautiful apology. I even kinda believe it. But saying sorry doesn't magically fix everything. Look where we're at, ${name}. Look at the crimes I've committed. I don't think there's any going back from here.\"\n\t\t*goto helper\n\t\t\n\t\t*label intelligence_apologize\n\t\t*set intelligence_apologize true \n\t\t*set intelligence +2 \n\t\t*set charisma +1 \n\t\t*set rebellious +1 \n\t\t*set larry +1\n\t\t(+2 Intelligence, +1 Charisma, +1 Rebellious, Larry Approves)\n\t\t*line_break\n\t\t\"Larry, think about your future,\" you implore. \"Do you really want to become like one of those murderers in your documentaries, spending the rest of your life in prison, or even getting executed? What's your plan, to go out with a bang? To make everyone regret not being on your side? It's not worth throwing your life away. There's still time. It doesn't have to end this way, Larry.\"\n\t\t\n\t\tHe laughs acerbically. \"You're the one who ruined my future! I don't need a lecture from you when my life falling apart is your fault. Besides, who cares if I go to prison for ten years for kidnapping or life for murder? Everything I ever wanted, everything I ever worked for, my freedom, are all going to be gone because of you.\"\n\t\t\n\t\tYour palms are slimy with sweat. Even out here in the night air, you feel like you can't get enough oxygen. Yet you can tell you've got him thinking. \"A rivalry takes two parties,\" you say, voice shivering yet level. \"Can we agree that we both, maybe, are to blame for a competition over a singing role leading to [i]this[/i]? Neither of us wanted this, Larry. So why can't we change courses now? If you pull that trigger, it will be too late for both of us.\"\n\t\t\n\t\t\"So your solution is for me to go to prison and you to go on living your merry life, traveling the country and getting rich playing with my band?\" Larry says in disgust. \n\t\t\n\t\tYou shake your head hurriedly as his pistol gravitates closer to you, its bullet thirsty for your blood and its master's finger itchy. \"No. I propose we let bygones be bygones. If you spare my life and let me go, and ${helper} really is alive, then I would consider us even. We could all go our separate ways. We won't press charges, and you have Kanibor as insurance. We both know the world can't find out about him.\"\n\t\t\n\t\tLarry hesitates, his shoes scuffing indecisively on the asphalt. Then he chuckles bitterly and shakes his head. \"We're not even. We'll never be even, because you can't go back and fix the past. The thing is, ${name}, I don't care about my future anymore. You stole my future from me, and now I'm going to rob you of yours.\"\n\t\t*goto helper\n\t\t\n\t\t*label deception_apologize \n\t\t*set deception_apologize true \n\t\t*set deception +2\n\t\t*set tough +1 \n\t\t*set mysterious +1 \n\t\t*set larry -1\n\t\t(+2 Deception, +1 Tough, +1 Mysterious, Larry Disapproves)\n\t\t*line_break \n\t\tArguing with someone who possesses no self control, no self awareness, and a loaded gun is a death sentence. Even if he's delusional, you have to give yourself a chance. \"Dammit, Larry, I'm sorry,\" you gasp, mind spinning for things to say that will placate him instead of making him escalate. \"I never should have taken ${band} from you, alright?\"\n\t\t\n\t\t\"You're so remorseful and regretful now that I've got a gun in your smug face,\" he sneers with extreme contempt. \"You were so happy to let me be shoved from frontman to backup singer. You got the entire band to turn against me and fire me. Only when I started making you suffer like I suffered did you ever have any regrets about throwing me away like trash.\"  \n\t\t\n\t\t\"I--\" you splutter. This guy is seriously delusional. But the glinting of his gun keeps your tongue moving. \"I shouldn't have just let them demote you, Larry. And I never wanted you to get fired, and certainly not because of me. But your antics at the recording studio was the final straw for the others. I didn't mean for you to be treated badly, but didn't you always treat me antagonistically from the beginning?\"\n\n\t\tYou groan internally at yourself. Some tear jerking, gut spilling apology you're giving here. Larry seems to be having similar sentiments judging by his sarcastic laugh, so you quickly add, \"I promise, if you let me live, and ${helper} really is still alive, I can convince the others to let this go. Beside, you have Kanibor as insurance, right?\"\n\t\t\n\t\tHe shakes his head. \"I don't think so. After what I've done, there's no going back. Wasn't I always right to be suspicious of you? I should have put a stop to you before you ever had a chance. I wanted to kick your ass outside of our practice room, and now I'm going to shoot you in this graveyard.\"\n\t\t*goto helper\n\n*label helper\n*page_break \n\nSuddenly, a source of white light appears down the road. At first, your heart races as you think it must be a car approaching: a maintenance worker, maybe? Yet you hear the sound of rapid footsteps, and as the light gets closer, you see that it's floating several feet above a dark silhouette. \"What the hell is it now?\" Larry seethes in a whisper, the bulk of his attention now on the approaching orb of light. \n\nSlowly, the orb of light and the person beneath it draw closer until more details about them start to take shape. You realize with shock that the light is Kanibor, floating in mid air, surrounded by an ethereal light. You know you can only be staring at his ghost. Beneath him, covered in dirt and looking banged up but otherwise okay, is ${helper}. \"${name}? Larry? What's going on here?\" ${helper_he} says, wide eyes looking back and forth between you and the gun in Larry's hand. \n\nLarry was telling the truth about the blank shot. A million questions about Kanibor's latest form spin through your head, but you sweep them away; you won't be caring about ghosts if you're dead. Jaw agape, Larry stares at the hovering figure with a look of disbelief, his eyes nearly bugging out of their sockets. Kanibor doesn't speak, but just stares at you with those bottomless black eyes. \n\nLaughing in disbelief, Larry finally says, \"This is  beyond unbelievable. So, the monster accomplice you buried is now a ghost? And he brought ${helper} here? You know what? This is perfect. Because truthfully, I have been blaming all of this on ${name}, when in reality, ${band} shares just as much of the responsibility for ruining my fucking life.\"\n\nYou don't like the sound of that at all.\n*if (tough_grave)\n\t\"Larry, please put the gun down,\" Baxter says in a slow, measured tone. \"You're angry about getting fired, right? You don't need to kill anyone over music, man. We'll put you back in the band if that's what you want. Just please, put the gun down, dude.\"\n*if (charisma_grave)\n\t\"Larry, please,\" Azure pleads, her voice husky with emotion and her face shining with tears. \"Don't kill anyone just because of the stupid mistakes we made. We never wanted to hurt you, Larry. Just put the stupid pistol down or how can we talk about this?\"\n*if (intelligence_grave)\n\t\"Larry, you missed me on purpose, didn't you?\" Tariano says, his voice level yet pleading. \"That means you must know there's still time to go back. Please, please just put down that gun before it's too late.\"\n*if (deception_grave)\n\tAurora's voice trembles with emotion and you can see tears glistening in her eyes. \"You still call me Roar. You freaking missed me on purpose back there in the grave. I know you don't really want to do this.\tNow just put that stupid gun down before you seriously kill someone.\"\n\n*page_break \n\nLarry doesn't appear to be listening to ${helper} at all. The moon and Kanibor combine to bathe the scene in an eerie silver light. The ghost still hovers there silently, just staring at you. Did he bring ${helper} here to save you, or to watch you both perish? Gesturing aggressively with his gun, Larry commands to ${helper}, \"Get over there by ${name}.\"\n\n${helper} obediently follows his orders, moving away from Kanibor with a worried backwards glance and nervously sidling up to you. For the first time, the ghost finally speaks, and you know for certain it's still Kanibor. His guttural growl travels easily across the graveyard, yet it sounds strangely distant, with a slight, eerie echo. \n\n[b][i]\"I suppose I could fly at Larry, shrieking at him to frighten him away.[/b][/i]\" Larry looks visibly alarmed at this and, perhaps subconsciously, his gun gravitates towards the ghost. Kanibor continues, [i][b]\"But I think I will allow things to play out exactly as they may. I am free and content now, something you humans clearly have not achieved despite all I gifted you and all opportunities to the contrary.[i][/b]\"\n\nLarry's gun hand is so violently shaking that you half wonder if you should make it a break for it now, banking on him missing by a mile. Then he's rounding on you again, almost seeming to have renewed vigor from encountering Kanibor at last. You realize he's shaking out of excitement. \n*if (tough_apologize)\n\tHis eyes filled with zeal, his smile manic and rueful at once, he says, \"Hear that? There's no hope for you, supernatural or otherwise. Now, here's what's going to happen next.\"\n*if (charisma_apologize)\n\tYou can see regret in his eyes and his rueful smile, yet it's the regret of someone who knows they're going to commit wrong anyway. \"I guess you finally ran out of luck. Of course, your good luck charm died. Now, listen to me very carefully.\"\n*if (intelligence_apologize)\n\tHe almost seems regretful, shrugging with a pained sort of smile. \"So, no more miracles for you. I've thought about it some more. And I decided because I'm going to lose my future, so are one of you. Here's what's happening now.\"\n*if (deception_apologize)\n\tHe gives you a diabolical sort of grin and shrugs sarcastically. \"Your apology was soulless. Your monster is now a ghost who won't help you. Now, finally, you two are going to see what's in store for those who never listen.\"\n\n*if (tough_grave)\n\tBaxter shoots you a sideways glance, his eyes wide with terror. \"What the hell are we gonna do, ${name}?\" he whispers. \"He's homicidally insane.\"\n*if (charisma_grave)\n\tAzure is shivering with fear, and she clutches painfully tight onto your shirt sleeve for comfort. \"I don't know what to do, ${name},\" she squeaks. \n*if (intelligence_grave)\n\tTariano is trembling slightly but taking slow, measured breaths. \"What are we going to do, ${name}?\" he says. \"He's seriously going to kill us.\"\n*if (deception_grave)\n\tAurora's fists are trembling at her sides, her jaw clenched, a scowl on her face. \"I'm sorry I got us all into this,\" she mutters. \"But what the hell do we do now?\"\n*choice\n\t#Tell ${helper} you should both simultaneously charge Larry in a serpentine pattern\n\t\t*goto tough_helper\n\t\t\n\t#Ask ${helper} if ${helper_he}'s hurt\n\t\t*goto charisma_helper\n\t\t\n\t#Tell ${helper} to remain calm and help keep Larry talking \n\t\t*goto intelligence_helper\n\t\t\n\t#Tell ${helper} to run and get help\n\t\t*goto deception_helper\n\t \t\n\t\t*label tough_helper\n\t\t*set tough_helper true \n\t\t*set intimidating +1 \n\t\t*set deception +1 \n\t\t*set tough +2\n\t\t*if (tough_grave)\n\t\t\t*set baxter -1\n\t\t\t(Baxter Disapproves)\n\t\t*if\t(charisma_grave)\n\t\t\t*set azure -1 \n\t\t\t(Azure Disapproves)\n\t\t*if (intelligence_grave)\n\t\t\t*set tariano -1\n\t\t\t(Tariano Disapproves)\n\t\t*if (deception_grave)\n\t\t\t*set aurora -1\n\t\t\t(Aurora Disapproves)\n\t\t(+2 Tough, +1 Intimidating, +1 Deception)\n\t\t*line_break \n\t\t\"We can charge him together,\" you whisper back, voice hard with conviction. \"You on the left, me on the right, moving in a serpentine pattern. He won't be able to hit both of us, or even one of us, and then we'll overwhelm him.\"\n\t\t\n\t\t*if (tough_grave)\n\t\t\tBaxter blanches at your plan. \"Bum rushing a guy with a gun? My fat ass? He'd just shoot me and then pistol whip you for fun afterwards.\" \n\t\t*if (charisma_grave)\n\t\t\tAzure visibly freezes up like a statue. \"Are you serious? What if he has freaky good aim? What if he's lying and has more bullets?\" \n\t\t*if (intelligence_grave)\n\t\t\tMuch to your dismay, Tariano takes a half step backward. \"I'm sorry, but that has to be one of the worst ideas I've ever heard. From a practical standpoint of not getting killed.\"\n\t\t*if (deception_grave)\n\t\t\t\"Bad idea,\" she says immediately, shaking her head vigorously with a frown. \"Knowing Larry, he'd probably just shoot you and then use his gun like a club against me. Maybe fulfill another fantasy.\"\n\t\t\n\t\t\"Stop whispering over there!\" Larry growls. \"You don't think I know you're conspiring against me as always? If either of you even think about attacking me, you're going to make this next juncture very swift and simple, when right now, it's not yet been decided, and it could go in numerous directions.\"\n\t\t\n\t\tHe says this last part with a sort of sinister inflection and a gleeful twitch of the eyebrows and lips, moving the barrel of the gun one way and then the other meaningfully. You have half a mind to surprise attack him anyways and hope that ${helper} would follow suit, but that would be cruel, and too risky in any case. \n\t\t\n\t\tYou can already feel your own resolve diminishing gradually as your chances slip away, and the feeling that ${helper} may have gotten ${helper_him}self into trouble instead of getting you out of it increases. \"Just tell us what you're going to do, Larry,\" you say gruffly, your hands balled into defiant fists. \n\t\t*goto bullet \n\t\t\n\t\t*label charisma_helper\n\t\t*set charisma_helper true \n\t\t*set charisma +2 \n\t\t*set chill +1 \n\t\t*set tough +1\n\t\t*if (tough_grave)\n\t\t\t*set baxter +1\n\t\t\t(Baxter Approves)\n\t\t*if\t(charisma_grave)\n\t\t\t*set azure +1 \n\t\t\t(Azure Approves)\n\t\t*if (intelligence_grave)\n\t\t\t*set tariano +1\n\t\t\t(Tariano Approves)\n\t\t*if (deception_grave)\n\t\t\t*set aurora +1\n\t\t\t(Aurora Approves)\n\t\t(+2 Charisma, +1 Chill, +1 Tough)\n\t\t*line_break\n\t\t\"Are you okay?\" you whisper. \"When Larry shot into the grave I didn't know what else to think but that he'd killed you. And I thought the fall surely...\" Your voice trails off. Then, \"Are you injured?\"\n\t\t\n\t\t*if (tough_grave)\n\t\t\tBaxter shakes his head, smiling at you like you said something funny. \"At first I thought he missed, but there was no bullet impact anywhere,\" he whispers. \"And I'm just a little banged up. The soft soil cushioned my fall.\"\n\t\t*if (charisma_grave)\n\t\t\tAzure smiles at you, seeming really touched by your question. \"The bullet freaking missed me,\" she whispers. \"Or maybe it was a blank. I'm just a little scraped up and rattled is all. I used to be a gymnast so I stuck my landing, mostly.\"\n\t\t*if (intelligence_grave)\n\t\t\tTariano shakes his head in bewilderment. \"I think Larry's shot was blank,\" he whispers. \"It was difficult to tell. And somehow I didn't break or sprain anything, so yeah, I'm okay, physically speaking.\"\n\t\t*if (deception_grave)\n\t\t\tAurora shakes her head, seeming as bewildered as you are by everything. \"I guess Larry was just trying to give me a heart attack,\" she whispers with a shrug. \"Aside from that, and a few bruises and scratches, I survived, didn't I?\"\n\t\t\t\n\t\t\"It's obvious you're conspiring over there!\" Larry yells. \"I make the rules now, and the rule is: you don't talk unless I demand it. You two seem so concerned about one another, acting like I don't fucking exist as always, yet don't seem to realize one of you is about to die and the other is going to watch.\"\n\t\t\n\t\tHe gestures back and forth between you and ${helper} with his gun meaningfully. ${helper} looks mortified, stealing a worried glance at you before glaring back at Larry. There's a sinking feeling in your chest as the quagmire you're in grows darker and thicker. Yet both you and ${helper} are miraculously okay so far, and Larry hasn't broken your spirits yet. \n\t\t\n\t\tYou stand straighter, exchanging worried yet reassuring glances with ${helper}. You feel a tiny bit braver simply by knowing that even though the odds are against you, unlike Larry, you're not alone. You've got someone by your side, and apparently someone from beyond the grave looking after you. \"What are you talking about?\" you say warily.\n\t\t*goto bullet \n\t\t\n\t\t*label intelligence_helper\n\t\t*set intelligence_helper true \n\t\t*set intelligence +2 \n\t\t*set charisma +1 \n\t\t*set rebellious +1 \n\t\t*if (tough_grave)\n\t\t\t*set baxter +1\n\t\t\t(Baxter Approves)\n\t\t*if\t(charisma_grave)\n\t\t\t*set azure +1\n\t\t\t(Azure Approves)\n\t\t*if (intelligence_grave)\n\t\t\t*set tariano +1\n\t\t\t(Tariano Approves)\n\t\t*if (deception_grave)\n\t\t\t*set aurora +1\n\t\t\t(Aurora Approves)\n\t\t(+2 Intelligence, +1 Rebellious, +1 Charisma)\n\t\t*line_break \n\t\t\"I was so close to talking him down before you arrived,\" you whisper. \"No offense.\" $!{helper_he} shakes ${helper_his} head tolerantly so you continue, \"Just try to keep him talking, and maybe we can reason with him. Or find an opportunity to stop him or get away.\"\n\t\t\n\t\t*if (tough_grave)\n\t\t\tBaxter nods eagerly, looking deathly serious. Then he's talking to Larry, his voice carrying easily across the yard, yet wavering with nerves. \"That sounds a little sadistic, even for you, Larry. Are you going to take any teeth or fingertips as souvenirs while you're at it like we're in one of your true crime articles?\"\n\t\t\t\n\t\t\t\"Taking fingertips and teeth sounds excessively sadistic,\" Larry says, unconcerned. \"I'm fine with just a little sadistic. It's not like any of you ever shed a tear after what you did to me. I'm sure you were chortling your way to the bank.\"\n\t\t*if (charisma_grave)\n\t\t\tAzure nods eagerly, but she still looks terrified at the prospect. Then she's talking to Larry in a disarmingly casual voice that she projects easily across the misty graveyard. \"What are you planning to do to the survivor, pistol whip them to death on camcorder to mail to ${band}?\" she says, her voice tinged with outrage and a healthy mix of fear.\n\t\t\t\n\t\t\tLarry laughs acerbically at her. \"That's delightfully creative. But you really know nothing about me. I'm not some sadistic lunatic or some psychopath like you paint me out to be. I just want revenge. After that? I honestly haven't thought that far ahead.\"\n\t\t*if (intelligence_grave)\n\t\t\tTariano bobs his head, looking relieved you didn't suggest something more drastic. Then he's talking to Larry, his voice slightly muffled as it travels across the misty graveyard. \"One simple question: do you think the survivor is just going to let you get away?\" \n\t\t\t\n\t\t\tLarry guffaws spitefully, not seeming intimidated in the slightest. \"Do you think you're in a position of power right now? Maybe you will let me get away if ${name} happens to be bleeding out beside you.\"\n\t\t*if (deception_grave)\n\t\t\tAzure nods repeatedly, looking very relieved you didn't suggest something more radical. Then, speaking loudly to Larry, she says, \"I know what you're doing, Lair. And yes, I'm calling you that, you idiot. You're viewing everything in black and white and taking everything to greater and greater extremes because you didn't get your way. Right?\"\n\t\t\n\t\t\tLarry sneers at her in an exaggerated way that doesn't quite hide the pain in his eyes. \"You think insulting me or trying to manipulate me with old pet names will get you anywhere?\" He scoffs in disgust. \"I'm just done with being thrown away like trash, and after months of trying and failing, I don't care about what anyone thinks is extreme.\"\n\t\t\n\t\t${helper} is certainly keeping Larry talking, but you don't know how wise it is to provoke his anger. \"Can't you just communicate with us, Larry?\" you say. \"You tried to intimidate me, broke beer cans, acted passive aggressively to all of us, and even stole my mic before ever just [i]communicating[/i] with us. And it's still not too late.\"\n\t\t\n\t\t[i]\"Communicate,\"[/i] Larry mocks in a shrill voice that drips with disdain. \"Like you communicated with me when I was relegated to backup singer without being notified? Like when all of you were keeping this monstrous secret,\" he gestures to the ghost, \"together and leaving me in the dark, wondering why I failed? You had your chance. Can you feel it slipping away now?\"\n\t\t*goto bullet \n\t\t\n\t\t*label deception_helper\n\t\t*set deception_helper true \n\t\t*set deception +2\n\t\t*set mysterious +1 \n\t\t*set tough +1 \n\t\t*if (tough_grave)\n\t\t\t*set baxter -1\n\t\t\t(Baxter Disapproves)\n\t\t*if\t(charisma_grave)\n\t\t\t*set azure -1\n\t\t\t(Azure Disapproves)\n\t\t*if (intelligence_grave)\n\t\t\t*set tariano -1\n\t\t\t(Tariano Disapproves)\n\t\t*if (deception_grave)\n\t\t\t*set aurora -1\n\t\t\t(Aurora Disapproves)\n\t\t(+2 Deception, +1 Mysterious, +1 Tough)\n\t\t*line_break \n\t\t\"${helper}, run and get help,\" you whisper. \"If you can just get outside of the gate, you can find the car and get away safely.\" You swallow. \"Larry can't catch two of us, and it's me he really wants.\"\n\t\t\n\t\t*if (tough_grave)\n\t\t\tBaxter looks at you like you just slapped him across the face. \"You want me to leave you alone with Larry?\" he hisses. \"What are you, suicidal?\" He shakes his head vigorously. \"I'm staying beside you, whatever happens.\"\n\t\t*if (charisma_grave)\n\t\t\tAzure recoils, visibly shocked, and shakes her head with a defiant scowl. \"Do you think I followed a ghost here to just abandon you?\" she whispers. \"Either we run away together or we face Larry together.\"\n\t\t*if (intelligence_grave)\n\t\t\tTariano is shaking his head before the final word has even left your lips. \"I don't see what that plan accomplishes,\" he whispers back stubbornly. \"If you're planning on sacrificing yourself, you've resigned too early. It's not over until it's over.\" \n\t\t*if (deception_grave)\n\t\t\tAurora does a double take and then shakes her head avidly. \"That's very brave of you, but hell no,\" she whispers. \"Just because I can't save you doesn't mean I'm going to run away like a coward. Larry isn't getting off that easily.\"\n\t\t\t\n\t\t\"Stop whispering to each other,\" Larry barks angrily. \"Do you really think you can strategize or bluff your way out of this? Do you really think anyone is going to escape from this? Whoever tries anything funny first will ruin the game I have coming up next by making my decision of who to shoot very simple.\"\n\t\t\n\t\tYou realize your plan is going nowhere. All you've managed to do is piss Larry off even more. He glares at you suspiciously, waiting for an answer. ${helper} digs ${helper_his} shoes into the dirt, evidently even less likely to run since you tried talking sense into ${helper_him}.\n\t\t\n\t\tYou suppose you could attempt to run yourself and hope ${helper} gets the idea and follows. Something about that plan seems so unappetizing. Maybe it's the thought of bleeding out alone in a graveyard with a bullet in your back. \"Just tell us what your grand plan for us is,\" you say sourly. \n\t\t*goto bullet \n\t\t\n*label bullet \n*page_break \n\n\"Since I have a captive audience,\" Larry says, \"I'll bother you with a little sob story.\" He paces around nonchalantly but keeps his eyes vigilantly on you and ${helper}. \"I guess I ordinarily bottle my feelings up inside so this might be cathartic for me. Besides, like I said, you don't have anywhere else to go.\"\n\nThe way Larry is waving his gun around like a professor wielding a ruler as he talks makes you hope he'll suffer from friendly fire. ${helper} keeps flinching each time the barrel of the gun points in your general direction again. \"My parents weren't horribly abusive or anything. I can't fully blame them for how I ended up. Although, the constant neglect and all the oppressive religious dogma probably didn't help.\"\n\nHe continues to rant, pacing back and forth under Kanibor's eerie silver light. \"No, the real tragedy is in my lost potential. See, I always knew there was something wrong with me. I just have this festering hate for civilization and our whole species. I grew up not being loved by my parents and simultaneously having 'loving' religious nonsense shoved down my throat from day one, and I escaped by losing myself in true crime.\"\n\nHe wears a distant smile on his face now. \"It always fascinated me how mindbogglingly evil and cruel humans can be to each other in reality. I found myself fantasizing about committing unspeakable crimes of butchery myself against the people I hated. I found myself obsessing, spiraling deeper into that pit. I knew it would happen one day. I was nihilistic enough. And here we are.\" \n\nLarry shakes his head regretfully. \"What I hate is that it didn't have to be this way. This band was going to be my outlet, my way into a brighter future that wasn't just being born with nothing, wallowing in misery and obscurity and building bad habits until I decided to take a voluntary dirt nap simply to escape the monotony and pointlessness of daily life. But now all of that's gone forever, for all of us.\"\n\n*page_break \n\n*if (tough_grave)\n\tBaxter is very still beside you. A sideways glance reveals him standing as stiff as a statue, jaw clenched. Tears sparkle in his eyes but his expression is distant. You realize he's starting to check out mentally from fear as the gravity of the situation hits him. He's no doubt realizing, as you have, that Larry really is prepared to murder.\n*if (charisma_grave)\n\tAzure has gradually sunk behind you, hiding pitifully from Larry's wrath. You don't take it personally, like you're being used as a human shield: nothing like that. She's abjectly terrified into a docile state, her face ghost white, her bottom lip trembling, her eyes glassy with tears, as she realizes what Larry is capable of. \n*if (intelligence_grave)\n\tTariano is motionless beside you, aside from his fingertips trembling. His breath comes out in trembling gasps, and his eyes are clenched shut. You realize he's either fighting off a panic attack or already in the middle of one. Maybe not dissolving into panic in and of itself is an act of courage. \n*if (deception_grave)\n\tAurora's face is glistening with tears, although no gasps escape her lips. Her hands are balled into fists and her expression is one of anger and hopelessness. You wonder if she's regretting all the decisions that lead her here. You wonder if she knows how courageous she was coming back for you anyway.\n\t\nLarry seems to have finally reached what his rant was culminating to because he paces closer, cocking the gun for emphasis. \"The way I see it, my one chance of being successful and finally turning my life around was destroyed by you and your friends. We should have been family, but I was cast out like I didn't matter for the newer, better version.\" \n\nLarry finally falls silent, and the gravity of his words hang heavy over the graveyard. Kanibor still hovers there, shifting ever so slightly from side to side, a silent observer. Larry looks directly at you and points his gun. \"Now I'm making you choose who I shoot: you, or ${helper}. You decide.\" \n\nIt feels like Larry's words have just punched a hole into your chest and ripped out your internal organs. So this is what it's all come to. \n*if (tough_helper)\n\tNow your plan of bum rushing him together sounds more and more sane, but ${helper} has checked out too much for that. You just may have to attack Larry by yourself if you want to survive.\t\n*if (charisma_helper)\n\tEven though ${helper} may be miraculously physically alright, it's obvious the mental toll has broken ${helper_his} resolve. You feel a powerful wave of grim courage rush through you as you realize it's not just yourself you have to protect now, but also ${helper}.\n*if (intelligence_helper)\n\tIt's obvious talking will be no use any longer. Larry is too committed because he seems to think he has painted himself into a corner and has no other way out. \n*if (deception_helper)\n\tYou badly want to tell ${helper} to flee now, to get the hell away while ${helper_he} still has a chance. Yet ${helper_he} already looks defeated, stricken with fear and probably physically incapable of running with jelly legs anyway.\n\n\"Larry, there has to be another way,\" you say in desperation, knowing it won't work. \n\n\"Choose!\" he bellows, interrupting you. He brandishes his pistol at ${helper} and then back at you. \"Who will it be? Someone needs to be punished like I've been punished.\"\n*choice\n\t*selectable_if (tough > 39) #Try to attack him instead of waiting like a coward for you or ${helper} to get shot (Requires 40 Tough)\n\t\t*goto tough_bullet \n\t\t\n\t*selectable_if (larry > 2) #Convince him to take responsibility for his own mistakes instead of blaming everyone else (Requires 3 Larry)\n\t\t*goto charisma_bullet \n\t\t\n\t#Tell him you take responsibility, and to shoot you\n\t\t*goto intelligence_bullet  \n\t\t\n\t#Tell him to shoot ${helper} instead of you \n\t\t*goto deception_bullet \n\t\t\n\t\t*label tough_bullet \n\t\t*set tough_bullet true \n\t\t*set intimidating +1 \n\t\t*set deception +1 \n\t\t*set tough +3\n\t\t*set larry -1\n\t\t*if (tough_grave)\n\t\t\t*set baxter +1\n\t\t\t(Baxter Approves)\n\t\t*if (charisma_grave)\n\t\t\t*set azure +1\n\t\t\t(Azure Approves)\n\t\t*if (intelligence_grave)\n\t\t\t*set tariano +1\n\t\t\t(Tariano Approves)\n\t\t*if (deception_grave)\n\t\t\t*set aurora +1\n\t\t\t(Aurora Approves)\n\t\t(+3 Tough, +1 Intimidating, +1 Deception, Larry Disapproves)\n\t\t*line_break \n\t\tYou're not going to wait around, docile and meek, to be murdered or to watch your friend die in front of you. Steeling your nerves, burying your fear before it takes out your knees like a sweep kick, you launch yourself at Larry. Every fiber in your muscles screams as you push yourself to your limit. You fly across the graveyard at a full sprint despite extreme fatigue and every alarm in your head ringing, screaming wordlessly in defiance. \n\t\t\n\t\tLarry looks utterly perplexed for just a moment, and then he's leveling the gun at you, aiming as you try to zig and zag in your breakneck approach. \n\t\t*if (tough_grave)\n\t\t\t\"What are you doing?\" Baxter bellows in horror, his words distant in your ears. Then, \"Go, ${name}, kick his scrawny little ass!\"\n\t\t*if (charisma_grave)\n\t\t\t\"${name}!\" Azure shrieks in alarm. \"Oh, ${name}, be careful. Duck!\"\n\t\t*if (intelligence_grave)\n\t\t\tTariano lets out a great gasp and splutters in shock. Then he's yelling, \"Yeah, present an erratic target. You can do it, ${name}!\"\n\t\t*if (deception_grave)\n\t\t\t\"Holy shit!\" Aurora exclaims, jerking in surprise. Then she's cheering you on, shouting, \"Take evasive measures. You can do this, ${name}!\"\n\t\t\n\t\tYou're only a few precious feet away from Larry, but he stands defiantly before you, expression screwed up in concentration. He squeezes the trigger, and there are several dull [i]bangs[/i] and a burst of sparks. ${helper} screams. You falter, your heart stops for a beat, and time itself seems to crawl. \n\t\t\n\t\tYet you feel no ripping pain, no flooding of your life force as the bullets invade your flesh and bones. You look down for an instant and see no bullet wounds. More blanks? Your momentum carries you forward at a furious pace. Just before you collide with Larry, he flashes an almost guilty sort of grin of confirmation and waggles the still smoking gun. \"It was empty all along!\" he announces, almost like a defense. \n\t\t\n\t\tYou tackle him with the full force of a football player and all the righteous anger of a mother moose. Larry goes flying into the air underneath you, and then you're crashing to the ground, sliding across the slick grass and nearly colliding with an eroding tombstone. \"[i]What-do-you-mean-it-was-always-empty?!\"\n\t\t\n\t\tYou pound Larry's head, chest, arms, and ribs with each breath as he futilely tries to block. He just starts howling with mocking laughter, and you don't stop beating him until you're gasping for breath and ${helper} is pulling you off. \n\t\t*goto empty\n\t\t\n\t\t*label charisma_bullet \n\t\t*set charisma_bullet true \n\t\t*set charisma +2 \n\t\t*set intelligence +2 \n\t\t*set chill +1\n\t\t*set larry +1\n\t\t*if (tough_grave)\n\t\t\t*set baxter +1\n\t\t\t(Baxter Approves)\n\t\t*if (charisma_grave)\n\t\t\t*set azure +1\n\t\t\t(Azure Approves)\n\t\t*if (intelligence_grave)\n\t\t\t*set tariano +1\n\t\t\t(Tariano Approves)\n\t\t*if (deception_grave)\n\t\t\t*set aurora +1\n\t\t\t(Aurora Approves)\n\t\t(+2 Charisma, +2 Intelligence, +1 Chill, Larry Approves)\n\t\t*line_break \n\t\tYou find your voice is full of compassion and surprisingly calm as you implore, \"Larry, please, don't do this. You must know that ${helper} and myself aren't the cause of your problems. We can all only control ourselves, and your rage, your jealousy is what compelled you to do all of this.\"\n\t\t\n\t\t\"Don't patronize me,\" Larry jeers spitefully. \"The outrageous injustice, the shunning, the endless lies are what [i]compelled[i] me to fight for myself.\"\n\t\t\n\t\tDespite his anger, you notice him lowering the gun slightly. \"I was compassionate with you at virtually every opportunity,\" you continue delicately. \"Avoiding conflict and trying to be civil no matter what you did. I never tried to get you fired, and never meant to take your place. I wish none of this had ever happened. There was always room in ${band} for six members.\"\n\t\t\n\t\t*if (tough_grave)\n\t\t\tBaxter nods earnestly. \"I'm sorry for being a jerk to you sometimes, dude. It was always tough love. Seriously.\"\n\t\t*if (charisma_grave)\n\t\t\tAzure bobs her head earnestly. \"I was never against you, Larry. I even convinced the others to let you have like eighty smoke breaks during your audition, remember?\"\n\t\t*if (intelligence_grave)\n\t\t\tTariano is quick to agree. \"If it ever felt like I was shunning you, I promise I'm just awkward. I always vouched for your creative lyrics too.\"\n\t\t*if (deception_grave)\n\t\t\tAurora nods insistently. \"This is what I've been telling you all along, Larry. We all wanna be on your side, you just have to access your non-crazy side and stop pushing everyone away. I say that with love.\"\n\t\t\n\t\tLarry's expression is filled with self-doubt now, and his gun hand trembles. \"How can you blame me for all of this, for reacting?\" he says, his tone angry yet soft and choked with emotion. \"You stole my role. You all treated me like nothing and expected me to be thankful for it. You fired me, even was I [i]was fucking right! About everything!\"[/i]\n\t\t\n\t\tHe says these final words in a rasped outburst of anguish, stamping his foot in the dirt like an overgrown child having a tantrum. You truly feel pity for him, even understand things from his lonely, angry, perspective. You're suddenly taking a step closer to him, holding out a hand. \"You always treated us as enemies from the beginning. If you take responsibility now, this can all end, and we can help you, Larry.\"\n\t\t\n\t\tYou're taken aback when you notice that tears are streaking down Larry's cheeks. \"I just wanted to stop being alienated, to stop feeling nothing for once. I just wanted it to fucking stop.\" He abruptly puts the gun to his head. \"I think you're right. Maybe I am responsible for it all. So this is
