d. If anything, this one looks like it's begging for retirement.\"\n\t\t\n\t\tLooking more than a little nauseous, Barty swivels around and hurries out of the bus as you continue to bore holes into him with your gaze. Only when he's gone do you let out a tremendous sigh. You may have scared him away, but he may or may not think you're a murderer now. Kanibor cackles. [b]\"Fear is the best illusion. Be gone to that gullible fool and his heinous noises.\"[/b]\n\t\t*goto free  \n\t\t\n\t\t*label normal_turntable\n\t\t*set normal_turntable false \n\t\t*set tough +2\n\t\t*set deception +1\n\t\t*set mysterious +1\n\t\t*set barty -2\n\t\t(+2 Tough, +1 Deception, +1 Mysterious, Barty Disapproves)\n\t\t*line_break\n\t\tYou take a deep breath and then say, \"Go away. Come back another time.\"\n\t\t\n\t\tBarty laughs like you told a hilarious joke and pounds on the door again, making it rattle and shake in its hinges. \"After you ruined my solo? You sound like a spoiled, petulant child,\" he practically snarls. \"I practically paid for this bus that you're hiding in. I guess I just want to know if you're actually a worthy investment or a hack.\"\n\t\t\n\t\tKanibor gurgles and grunts in the sink, sounding like a damaged garbage disposal filled with things it's not supposed to pulverize. Barty seemed like an alright guy before, but now he's acting insane. You recall Baxter talking about Barty's infamous temper, but you decide that Kanibor is a lot more frightening. \"Now I see why Larry came to you with his delusions,\" you say back. \"Are you always this paranoid?\"\n\t\t\n\t\tAnother spiteful laugh, and then the door shakes with great blows like it's being kicked. \"You better not be fucking me over!\" Barty practically screams. \"You already ruined my solo out there with that stunt you pulled. If I found out you're lip-syncing or using voice modulators or anything like that, your entire career is canceled.\"\n\t\t\n\t\tOnly after you're certain Barty is gone do you speak to Kanibor again. Scowling at the crime scene in the sink, you say, \"What the hell is wrong with you?\"\n\t\t\n\t\tKanibor buzzes and gurgles nastily, like a swarm of hornets caught in said garbage disposal. [b]\"That wretched ape and his torturous noises,\"[/b] he snarls back angrily. [b]\"It took you long enough to send him away.[/b]\"\n\t\t*goto free  \n\t\t\n*label free \n*page_break \n\nYou nearly have a heart attack when you hear several voices approaching the tour bus. Hurriedly peeking out of the nearest window, you're flummoxed and horrified in equal measure to see Larry leading your band members your way. You can't believe this is happening, but then again, you can. They trail him by several meters, reluctantly following him with irritated or confused looks as he enthusiastically, almost giddily guides them towards the bus. \n\nIt's then, at the worst possible moment, that Kanibor starts to come out of the Necrophone. You watch with wide eyes, transfixed, as the mouthpiece is ejected and a furry creature begins squeezing himself out. Gradually, impossibly defying the laws of physics, something far larger than the slender microphone handle is emerging from it, wriggling and grunting with effort and desperation. \n\nKanibor has large, pointy ears, one white and one black, and they twitch and rotate as he looks around with great black eyes like voids. The fur in between his ears has jagged lines of a seaweed green hue, like a crown upon his head. His nose is short and squashed on an angular face. He looks up at you, unfocused, saliva dribbling from his mouth, and grins with those razor sharp fangs. [b]\"Freedom!\"[/b] he exclaims jubilantly.\n\nLarry and ${band} are so close now that you can hear their voices more clearly. Larry is shouting excitedly about catching you red handed, while Baxter's booming voice and Aurora's ice cold one seem to be arguing with him. You peek out the window again and see them gathering outside the entrance of the bus. The door is locked and the windows are tinted, but your time is very, very limited. Every band member has a key. \n\nYou whip back around. Kanibor has fully extricated himself from the Necrophone now, and he crouches there, looking both dangerous and vulnerable at once. He hunches in on himself, an orb of fur matted in blood, [i]your[/i] blood, and rakes in greedy gulps of air. Barely the size of a large cat or small dog, he is covered in long, fluffy fur, more than half of it a brilliant white and the rest a glossy jet black. \n\n*image kanibor.jpeg \n\n*page_break \n\nWith the destruction of the Necrophone and your connection with Kanibor broken as a result, you feel the benefits eroding fast in a rush of fatigue. The innate or clairvoyant musical and cultural knowledge, the extreme vocal abilities, and the strange otherworldly charisma have all been stripped away like the paint on a long abandoned vehicle or the color in a recently dead flower.\n\nKanibor straightens out gingerly, although this only increases his stature slightly on four legs almost entirely hidden by his fur. He stares at you with a gaze like two black holes, a long, prehensile tail twitching impatiently behind him. [b]\"Don't look so sorry for yourself. Our bargain has been met: you got your fame and fortune, and I have been liberated from my prison.\"[/b]\n\nYour phone suddenly buzzes and you hurriedly grab it, seeing that you have a text from Barty. \n*if (tough_turntable)\n\t\"You are a genuine bad ass. Sorry for doubting you. If you ever need anything, call me, homie.\"\n*if (charisma_turntable)\n\t\"I promise I'm not unhinged all the time. I'm embarassed for thinking mic theatrics were something nefarious lol.\"\n*if (intelligence_turntable)\n\t\"I never was very good at poker. I just wanted to scare you a little lol. You're a good kid. I think.\"\n*if (deception_turntable)\n\t\"You're a good singer, but I'll be honest, you're hella weird. Keep out of trouble, kid.\"\n*if (normal_turntable)\n\t\"You're a good singer, but you're hella weird, and you're arrogant. Don't make me regret this, kid.\"\n\t\n*if (tough_jam)\n\t\"${name}, you're not hiding a body or anything are you?\" Baxter shouts through the door. \"Larry is making up all these crazy stories. Can we come in? We just want to help.\"\n*if (charisma_jam)\n\t\"${name}, it's okay if you're having stage fright, or if your mic malfunctioned, or anything like that, we promise!\" Azure calls through the door. \"But Larry is saying all these weird things about you. Can we come in? We just want to help.\"\n*if (intelligence_jam)\n\t\"${name}, whatever's going on, I'm sure we'll understand if you just tell us,\" Tariano calls through the door. \"Larry is making up all these grandiose stories about you. Can we come in? We just want to help.\"\n*if (deception_jam)\n\t\"${name}, I don't want to make you claustrophobic or anything  but we need to know what's been going on,\" Aurora says. \"Larry is making up all these laughable stories. Can we come in? I promise we just want to help.\"\n*if (share_jam)\n\t\"${name}, you know we'd all hide a body for you at this point, right?\" Baxter shouts through the door. \"We know something's been going on, but now Larry is making up these insane lies about you. Can we come in? We just wanna help.\"\n*if (spotlight_jam)\n\t\"${name}, what the hell's going on in there?\" Baxter's voice booms through the door. \"You went from wanting to hoard the spotlight to running away like you had stage fright, and now Larry is saying all this insane stuff about you. Can we come in? We want to help.\"\n\nWith so many things going on at once, your brain feels like scrambled tofu in a skillet. Your body is slick with sweat, and your heart is beating alarmingly fast. What do you do? What can you possibly do? The mechanism that allowed your career to exist and function is destroyed, and you're trapped in a bus with an alien. \"Just a second,\" you shout back, stalling desperately. \n \nKanibor is moving about the bus now, almost seeming to hover above the floor except for the scratching of his claws on the linoleum. He stops below the emergency exit on the ceiling, his impossibly black eyes glinting, and his prehensile, monkey-like tail twitching excitedly. He's clearly making an escape plan, but you can only stare. Out of all the extraterrestrial creatures inside the Necrophone, you hadn't predicted a mutant cat.\n*choice\n\t#It occurs to you that you're much larger than the beast who has been tormenting you for weeks, and you should get revenge with a good kick\n\t\t*goto tough_free \n\t\t\n\t#Despite everything that Kanibor has put you through, you find him almost [i]cute[/i]\n\t\t*goto charisma_free  \n\t\t\n\t#You're fascinated by Kanibor's uniqueness, and try to drink in every detail in a precious few seconds\n\t\t*goto intelligence_free \n\t\t\n\t#He's not just a parasite, but evidently a dangerous predator: remain wary \n\t\t*goto deception_free  \n\t\t\n\t\t*label tough_free\n\t\t*set tough_free true \n\t\t*set intelligence +1 \n\t\t*set intimidating +1 \n\t\t*set tough +2\n\t\t*set kanibor -2 \n\t\t(+2 Tough, +1 Intelligence, +1 Intimidating, Kanibor Disapproves)\n\t\t*line_break \n\t\tYour eyes narrow, your jaws clench, and your hands ball into fists as you stare at the surprisingly small creature before you. Dangerous fangs and claws aside, you could throttle him if you got a hold of him. [b]\"I can smell your aggression, and hear your heart beating even faster,\"[/b] Kanibor comments almost lazily. [b]\"Meanwhile, I only want you to open that emergency exit. Can't we be civilized, primate?\"[/b]\n\n\t\tThere's a casual smugness in his tone, a surety that you can't or won't harm him. Yet as you glower darkly at him, an idea comes to you that makes your lips twitch in a smile. He'd better hope he's faster than your foot once you open that exit for him. \"I want you far away from me, but how do I know you won't attack my friends?\"\n\t\t\n\t\tLarry's antagonistic shouts about you making lip syncers look like virtuosos filter through the door, buzzing at your ears like gnats. You do your best to filter him out. Kanibor gives you a contemptuous look, his tail twitching faster across the floor. [b]\"Maybe I will, if they come stampeding through that front door.\"[/b]\n\t\t\n\t\tYou eye the emergency exit lever nervously, but see few alternatives, each of them more unpleasant than the last. With a gruff sigh, you grab the lever and pull, and the ceiling door slides open. Kanibor lets out an odd, throaty chirrup of approval and makes to jump onto a seat. Seeing your chance for a tiny bit of long awaited and well deserved revenge, you dart forward and kick him square in the ribs. \n\t\t\n\t\tHissing and spitting like television static, Kanibor slams into a seat and crumples down. He immediately leaps up, growling at you like a chorus of mountain lions shrieking, his squashed face contorted in fury, spittle flying. His foul, fetid breath washes over you, burning your nostrils and making your stomach heave. You backpedal in alarm, and he scrambles up the side of the wall like a spider and then disappears through the exit. \n\t\t*goto fragments \n\t\t\n\t\t*label charisma_free \n\t\t*set charisma_free true \n\t\t*set charisma +2 \n\t\t*set tough +1 \n\t\t*set rebellious +1\n\t\t*set kanibor +2\n\t\t(+2 Charisma, +1 Tough, +1 Rebellious, Kanibor Approves)\n\t\t*line_break \n\t\tKanibor may have sucked your blood like a vampire; he may sound like a demon possessed by a demon; and he may be some kind of supernatural alien, but damn it if he isn't strangely, undeniably cute. Maybe it's just because you're an animal person, but you can't help but appreciate his unique yet classic beauty. \n\t\t\n\t\tHis eyes, while intimidating, sparkle with intelligence and rich emotion. His silvery white and shiny black fur look almost perfect even under the circumstances. You can't stop staring at the eerie green coloration on his head, or how he seems to be an almost perfect orb when he's not moving about. He looks at you impatiently. [b]\"Surprised I'm not a grotesque, slimy monster with seven eyes? Open the door!\"[/b]\n\t\t\n\t\tSomething about his tone almost makes you burst into laughter, but the gathering outside and the general dire situation make you bite your tongue. Larry jeers loudly, something about you making mannequins look original. You massage your face and then look at Kanibor through spotty vision. \"How do I know I'm not unleashing a cuddly killer armed with murder mittens and vampire fangs onto my friends?\"\n\t\t\n\t\tKanibor glares at you, and with his squashed face, slitted black eyes, and protruding vampire fangs, he truly does look terrifying. And yet still strangely adorable, like a lion you know you can't pet despite all urges to the contrary. [b]\"Would a bear eat half a dozen bison after just waking up from hibernation? I want privacy to tend to myself, obviously!\"[/b]\n\n\t\tWith a sigh, you reluctantly grab the emergency exit lever and pull, and the door on the ceiling slides open. To your surprise, Kanibor chirrups and brushes up against your leg, warm and solid and fuzzy, before leaping onto a seat's headrest. He jumps onto the ceiling, scurrying across it like a spider, and disappears through the emergency exit. \n\t\t*goto fragments \n\t\t\n\t\t*label intelligence_free \n\t\t*set intelligence_free true \n\t\t*set intelligence +2 \n\t\t*set rebellious +1 \n\t\t*set charisma +1 \n\t\t*set kanibor +1\n\t\t(+2 Intelligence, +1 Charisma, +1 Rebellious, Kanibor Approves)\n\t\t*line_break \n\t\tEven though Kanibor has been feeding off you like a pack of leeches for weeks, and you should probably be more frightened by his alien appearance, you can't help but marvel at the one of a kind creature before you. His eyes look like a nocturnal ambush predator's, but blacker than any eyes you've ever seen. You suspect they must be a very deep brown black.\n\t\t\n\t\tA long, sinuous, fuzzy tail twitches and wags behind his head almost of its own volition. His squashed face reminds you of some cats with tiny noses and moon faces, but one vampire fang is clearly visible against the black fur on his left side. He's like a feline from another planet. [b]\"Having fantasies of sticking me in a laboratory, or perhaps a zoo? Or are you going to let me out?\"[/b]\n\t\t\n\t\tYou blink, taken aback. You suppose he hasn't had many healthy relationships in his life and is naturally suspicious. Your relationship included, even if he was the toxic side. \"I'm just observing you,\" you say, which sounds creepier than you intended it. Then, \"What are you going to do when you get out of here?\"\n\t\t\n\t\tLarry mocks and challenges you loudly, saying something about how you're faker than the melted plastic nacho cheese at swimming pool concession stands. Meanwhile, Kanibor glares defensively at you, but then seems to consider your question. [b]\"I intend to find somewhere comfortable and private as soon as possible to recuperate. I will only attack anyone who gets in my way.\"[/b]\n\t\t\n\t\tHe hasn't been hostile to you since escaping the microphone, and he doesn't seem to be at his full abilities. You look at the emergency exit lever hesitantly, and with a heavy sigh, pull it. The door on the ceiling slides open. Kanibor lets out a gurgly sort of trill of delight and leaps onto a headrest. Like an insect, he crawls across the ceiling and then vanishes through the exit.  \n\t\t*goto fragments \n\t\t\n\t\t*label deception_free \n\t\t*set deception_free true \n\t\t*set deception +2\n\t\t*set mysterious +1 \n\t\t*set intelligence +1 \n\t\t*set kanibor -1\n\t\t(+2 Deception, +1 Intelligence, +1 Mysterious, Kanibor Disapproves)\n\t\t*line_break \n\t\tYou expected Kanibor to be a lot larger than he is, for some reason: at least comparable to a wolf, perhaps. Yet you would be foolish to underestimate him just because he's the size of a domestic cat. The common cat has wiped many species of birds, rodents, and other small animals out of existence -into global extinction- for a combination of food, and  predominantly sport. \n\t\t\n\t\tNow, you have an alien vampire cat. You're not letting your guard down for a second. You wince when Larry shouts loudly through the door, something about you just being a petty stage magician. Kanibor growls impatiently, a low rumble that sounds like distant thunder. [b]\"I promise you, I'm more scared of you giant apes than you are of me. Now hurry up and open the door!\"[/b]\n\t\t\n\t\tYou eye the emergency exit lever uncertainly. Somehow it seems reckless to unleash Kanibor onto the world regardless of the dire circumstances, but he's not being overtly threatening now. The alternative of being trapped inside this bus with him when all the current and former members of ${band} come rushing in is too risky to contemplate. \"What will happen to my friends out there?\" you ask sharply. \n\t\t\n\t\tKanibor gives you a very sardonic expression, as though forced to humor a purposefully obnoxious adolescent. [b]\"A lot less than whatever will happen if those baboons come barging in this bus while I'm still in it.\"[/b] Then, less flippantly, and more urgently, [b]\"I only wish to find somewhere peaceful and private to recover, if that wasn't obvious.\"[/b]\n\t\t\n\t\tIt's your turn to be acerbic, and you scoff and roll your eyes. \"Nothing about you is obvious.\"\n\t\t\n\t\tBegrudgingly, you pull the emergency exit lever, and the door on the ceiling slides open. Kanibor purrs like the rattle of a passing freight train, and leaps onto a headrest. He scampers up onto the ceiling like a beetle and then vanishes through the emergency exit. \n\t\t*goto fragments \n\t\t\n*label fragments\n*page_break \n\nKanibor's claws click and scrape loudly against the roof of the bus as he scurries across it, immediately dashing your hopes of him escaping without attracting too much attention. The windows of the bus are tinted, but you only dare peek through to watch your nightmare unfold. Larry is the first one to spot him; he leaps back as though stung by a hornet, waving a finger. \"What the hell is that thing, a walking mop?\"\n\nBaxter and Tariano squeal in surprise, bumping into each other and grabbing each other's arms. Azure lets out a little squeak of shock and slaps a hand to her mouth, while Aurora stares up at the roof of the bus where Kanibor must be, jaw agape, eyes wide in marvel. \"Wow!\" is all she can say, laughing in disbelief. \n\nThen everyone is suddenly scrambling. A second later, Kanibor is in view, dashing across the ground where they just were and scurrying under cars. Larry is losing his mind like a small child who has been given a hundred credits and set loose in a junk food store. He jumps up down, jabbing his finger at the fleeing creature. \"I told you! I fucking told you something was going on! Like, why is a freaky monster crawling around in your tour bus?\" He grins triumphantly, angrily and jabs a finger at the door, demanding breathlessly, \"Just ask ${name}.\"\n\nYour already sinking hopes plummet like an anchor as everyone turns their attention to the door, except for Tariano, who is still looking around nervously for Kanibor. Cautiously, Baxter steps forward, his hand trembling slightly as he extends his key. You snap out of your daze of hopelessness and spring into self-preservation mode, moving feverishly to hide the evidence of your partner. \n\nWadding up a bunch of paper towels, you scoop up the bloody, destroyed Necrophone and bury it beneath the trash at the bottom of the waste basket. As Baxter's key turns the lock, you run the faucet to wash away all the blood in the sink, and dash around madly on the soles of your feet, still trying to be quiet as you throw your bloody clothes into an empty cabinet. Then Baxter is entering the bus, and you snap to attention, panting and trying to keep your heart from beating out of your chest.\n\n*page_break \n\nBaxter hovers by the doorway, seeming hesitant to come in any further as he looks around with wide eyes. Water is all over the floor and counter, and the place is in just noticeable disarray. \"${name}, what was that thing?\" he asks, his bushy eyebrows bunched together in concern. \"What's going on here? Whatever the hell it is, we'll all deal with it together, but we can't do that if you keep harboring secrets.\"\n\nHe startles and then moves forward as the other band members start squeezing themselves in after him. Larry tries to bring up the rear, but Aurora shuts the door in his face before he can enter. Your face is burning with chagrin, your fingertips buzzing with adrenaline; this is how your short career ends, then. It was all just a fever dream, and now your world is crumbling down around you like the immune system before a feverish death. \n\nYou shouldn't be dramatic. You aren't dead. 'But you might wish you were shortly' your intrusive thoughts insist. You collapse into a seat, not knowing what to say, swallowing a growing lump forming in your throat, fighting back a waterfall of tears. When Azure places a warm hand on your shoulder, saying softly, \"${name}, it's okay. You're like family to us. Please, just tell us what's happening...\" you burst into tears and bury your face in your hands. \n\n*if (tough_free)\n\tNow there are others who have seen Kanibor: you aren't entirely alone, forced to keep a secret about the vampire beast who has been abusing you. Relief, anger, and even some lingering fear of Kanibor crumble the rest of your defenses.\n*if (charisma_free)\n\tYou're weeping for all the confusion, pain, fear, and stress you've endured, and having to keep all those secrets. You even feel pity for Kanibor: he's entirely alone on a hostile alien planet. \n*if (intelligence_free)\n\tYou're weeping from sheer relief, a relief so powerful that it's how you imagine someone dying of dehydration in the desert would feel if someone appeared and handed them a cold glass of water. No longer are you alone carrying this impossible burden.\n*if (deception_free)\n\tYou're weeping from the adrenaline crash, from the galactic levels of stress you have been under these past weeks, and even because of the niggling fear and uncertainty about Kanibor, his whereabouts, and future intentions. Yet at least now you have people to share the burden with. \nYou decide to finally tell them everything, for better or worse. \n\nFirst, you briefly tell Baxter, Azure, Tariano, and Aurora about your financial struggles and recent run of life altering bad luck. You explain how you found the Necrophone and how Kanibor has been guiding you through the auditions and empowering you to death growl at live shows and studio sessions in exchange for your blood. You tell them of all Larry's sabotage attempts, and a brief explanation of Kanibor's escape from the Necrophone. \n\nBy the end of your story, Baxter is abnormally pale in the face, and contemplatively silent. Tariano asked to see the broken pieces of the Necrophone, and has been inspecting them with fascination and a mild amount of disgust. Azure has been mortified into a white-knuckled, wide-eyed statue by your tale of Kanibor. \n\nAurora, despite keeping silent so far, appears brimming with questions, with her eyes bright and alert, full of concern for you, and perhaps personal guilt. With Larry still prowling around outside the bus, you only have limited time to explain things in more detail, so you decide to only discuss two topics quickly. \n*label topics \n*if (topics > 0)\n\tWhat else do you talk about?\n*if (topics > 1)\n\t*goto revenge \n*choice\n\t*hide_reuse #Tell them more details about how Kanibor fed on you, and show them your scars\n\t\t*goto tough_fragments \n\t\t\n\t*hide_reuse #Admit to them that you feel ashamed for lying to them and for faking your talents\n\t\t*goto charisma_fragments \n\t\t\n\t*hide_reuse #Describe to them the incredible clairvoyance you had, and how you now only remember fragments \n\t\t*goto intelligence_fragments  \n\t\t\n\t*hide_reuse #Tell them that even more than your career, you're worried about what Kanibor will do next\n\t\t*goto deception_fragments  \n\t\t\n\t\t*label tough_fragments \n\t\t*set tough_fragments true \n\t\t*set chill +1 \n\t\t*set charisma +1 \n\t\t*set tough +2\n\t\t*set baxter +1 \n\t\t*set topics +1 \n\t\t(+2 Tough, +1 Charisma, +1 Chill, Baxter Approves)\n\t\t*line_break \n\t\tYou describe to your band mates how Kanibor fed on you with his vampire fangs. You tell them how white fangs would protrude from the mic and greedily slurp up your blood as payment for using his abilities, sometimes before, sometimes even during, but always after performances. Tariano shivers, grimaces, and buries his hands in his sweater pocket as you speak. \"That's terrible.\"\n\t\t\n\t\tYou show them the multitude of fading scars on your wrists, palms, and forearms. These scars seem to bring Azure to tears, and she stares at each of them with a kind of horror mixed with tenderness. She blinks her tears away with long eyelashes. \"I can't believe everything you went through.\"\n\t\t\n\t\tBaxter's face has lost most of its color, and his expression is deathly serious. Yet he speaks to you in a hushed, almost reverent tone when he asks about the side effects of the feeding. You describe how the feedings left you dizzy, nauseous, and fatigued. Aurora shakes her head ruefully. \"That would explain why you would often seem so tired. Sorry for calling you a zombie once or twice.\"\n\t\t\n\t\tBaxter looks at you with all new eyes, as though you had survived a grizzly bear attack. \"I remember thinking how you didn't look like anything special when I asked you to name our band. No offense. But you're honestly the toughest damn person I've ever met.\"\n\n\t\tSomething about having the respect and admiration of a six foot, six-inch, bear of a metal guitar player, makes you feel irrationally brave and unreasonably proud. \"I didn't feel very brave at the time. I was just trying to survive,\" you say modestly. \n\t\t*if (topics > 1)\n\t\t\tYou sigh and look around at the band. \"You're not going to fire me?\"\n\n\t\t\tEveryone shakes their heads, and Baxter puts a great hand on your shoulder. \"Hell, no. I thought you were a badass [i]before[/i] I knew you were an alien vampire survivor!\"\n\t\t*goto topics \n\t\t\n\t\t*label charisma_fragments \n\t\t*set charisma_fragments true \n\t\t*set charisma +2 \n\t\t*set chill +1 \n\t\t*set intelligence +1\n\t\t*set azure +1 \n\t\t*set topics +1\n\t\t(+2 Charisma, +1 Intelligence, +1 Chill, Azure Approves)\n\t\t*line_break \n\t\tYou realize on some level that the circumstances of your life and the opportunities presented by Kanibor practically forced your hand, but you still feel a pit of shame in your stomach nonetheless. Taking a deep breath, you cast your gaze around at each of them. \"I feel terrible about pretending I was someone I wasn't. I'd never sang like that before I picked up that mic.\"\n\t\t\n\t\tYour face burns with chagrin as an awkward silence falls over the tour bus and everyone exchanges looks. Surely they're communicating telepathically. Baxter is the first one to speak, blurting out, \"I mean, what were you supposed to do, [i]not[/i] pick up the talking alien mic? What are you, crazy? Or a coward? I mean come on.\"\n\t\t\n\t\tA ripple of nervous laughter travels around the room, lightening the tension slightly, but you don't think he was joking. Tariano observes you closely, his gaze almost uncomfortably piercing. \"Maybe you're underestimating how much of that was really you, ${name},\" he says. \"We wrote lyrics with you, and saw those vocals come out of [i]your[/i] mouth.\"\n\t\t\n\t\tYou sigh tiredly. \"It's hard to explain.\" Fidgeting uncomfortably, you continue, \"So many  things, I knew without knowing how. The voice coming out of the Necrophone wasn't me -or, at least, not just me. You were hearing the voice of a monster who was singing with me like he could read my mind.\"\n\t\t\n\t\tAurora is looking at you as though you had just casually conveyed some childhood trauma. \"${name}, that's seriously scary. I don't think anyone is blaming you for not knowing how to handle such an alien situation. [i]No pun intended.[/i] At least, I'm not blaming you.\"\n\t\t\n\t\t\"${name}, I think we've all been experiencing some impostor syndrome lately,\" Azure chimes in, \"but you're having it in galactic proportions. Literally. That's valid. But like Aurora said, I don't think any of us can really blame you.\"\n\t\t\n\t\t*if (topics > 1)\n\t\t\tYou look around at the others with a sigh. \"So, you're not going to fire me?\"\n\t\t\t\n\t\t\tShaking heads all around, Azure's most enthusiastically. \n\t\t\t*if (azure > 50)\n\t\t\t\tShe grabs your hand and squeezes it warmly for a second. \n\t\t\t\"We're not going to abandon you just because you got in way over your head. What kind of people do you think we are, huh?!\"\n\t\t\t\n\t\t\tMore laughter, and this time you join in. \n\t\t*goto topics \n\t\t\n\t\t*label intelligence_fragments\n\t\t*set intelligence_fragments true \n\t\t*set intelligence +2 \n\t\t*set mysterious +1 \n\t\t*set deception +1 \n\t\t*set tariano +1 \n\t\t*set topics +1\n\t\t(+2 Intelligence, +1 Deception, +1 Mysterious, Tariano Approves)\n\t\t*line_break \n\t\tFully aware that what you're going to describe to them will sound impossible or insane, you take your time and choose your words carefully. You tell them how using the Necrophone gave you clairvoyance, but only relating to death metal music and culture in particular. Baxter repeatedly shakes his head in wonder and disbelief. \"That is the most awesome, ridiculous, insanely specific super power.\"\n\t\t\n\t\tYou do your best to describe to the others how you were bursting with effortless creativity, you possessed inherent and extensive theoretical musical knowledge, and you were immediately adept at vocal styles, techniques, and patterns you hadn't even known about before, let alone performed. \"That sounds like natural genius,\" Azure says in hushed marvel. \"Or, unnatural genius, I guess.\"\n\t\t\n\t\tYou continue by glumly admitting that you can only remember a fraction of your clairvoyant knowledge. What's more, you're not sure if you're physically capable of performing those guttural death growls without Kanibor's influence, and you're almost afraid to try. Aurora chews on her lip thoughtfully. \"So you just need to re-invent a new vocal style? Gargling baking soda water and lots of safe practice is my advice.\"\n\t\t\n\t\tYou sigh, rubbing your temples tiredly. \"I just feel like I have amnesia. I keep trying to remember everything, but the musical ideas, the incredible creativity, they're all slipping away like a dream.\"\n\t\t\n\t\tTariano looks strangely haunted for a second, and then he's shaking his head defiantly. \"You literally invented a new vocal style and a new subgenre of death metal to go with it, extraterrestrial assistance or not. Everything you forgot is still out there to discover again, and you have a big head start on everyone else.\"\n\t\t\n\t\tYou blink. You hadn't thought of it that way. But you can leave it to Tariano to give you a unique perspective. \n\t\t*if (topics > 1)\n\t\t\tYou look around at the others. \"So, you're not going to fire me?\"\n\t\t\t\n\t\t\tEveryone shakes their heads, Tariano most of all. He smiles warmly at you. \"We're not going to abandon you just because you had a little set back.\" Then, tongue fully lodged in cheek, he adds, \"It doesn't hurt that Larry is the alternative.\"\n\t\t*goto topics \n\t\t\n\t\t*label deception_fragments\n\t\t*set deception_fragments true \n\t\t*set deception +2\n\t\t*set intelligence +1 \n\t\t*set tough +1 \n\t\t*set aurora +1 \n\t\t*set topics +1\n\t\t(+2 Deception, +1 Tough, +1 Intelligence, Aurora Approves)\n\t\t*line_break \n\t\tGrimly, you look out the window for any sign of Kanibor, but he's long gone. \"I know my career might be in shambles,\" you say with a sigh. \"But right now, all I can think about is what Kanibor might do next. I don't know the full extent of his abilities, but I know he's dangerous.\"\n\t\t\n\t\tYou continue by telling them about Kanibor's vampire fangs, retractable claws that can be used to scale walls and ceilings with ease, and a prehensile tail that can likely be used to swing about like a primate or possibly strangle victims. Despite his small size, he could easily present a deadly threat. Not to mention his supernatural knowledge and obviously human level intelligence. \n\t\t\n\t\tAzure, who already looked frightened before, has now lost a considerable amount of color in her face. \"So, you're telling me that critter might crawl up my ceiling in the middle of the night, lower himself from the fan by his tail, and drain me of blood in my sleep?\"\n\t\t\n\t\tBaxter shakes his head and folds his arms. \"Too convoluted. He'd probably just crawl out from under your bed and go for your pretty little neck.\"\n\t\t\n\t\tAzure looks like she might faint now, but Tariano notices and pats her on the back comfortingly. Aurora shoots Baxter a withering glare, and he shrugs sheepishly. \"${name}, what do you think Kanibor is doing now?\" Tariano asks.\n\t\t\n\t\tYou confess you don't know, although you suspect he's finding somewhere private and comfortable where he can gather his strength and plan for whatever's next. To your surprise, Aurora punches you on the shoulder in a mildly painful gesture of camaraderie. \"Dammit, ${name}. How can anyone be mad at you when you should be scared about losing your career, but all you can do is worry about the safety of us dweebs?\"\n\t\t\n\t\tYou chuckle nervously, rubbing your increasingly sore arm. \n\t\t*if (topics > 1)\n\t\t\t\"So, does that mean you're not going to fire me?\"\n\t\t\t\n\t\t\tShaking heads all around, Aurora's most insistent of all. \"You lied to keep everyone safe. That's understandable, kinda even courageous since you had to face it all by yourself, honestly. But now we need to be honest together. And I honestly still want you in the band.\"\n\t\t*goto topics \n\t\n*label revenge \n*page_break \n\nBaxter suddenly jumps up in the air like he was electrocuted, causing Azure to yelp and adopt a defensive martial arts pose. \"Those shooting stars,\" he says, his voice hushed with wonder. \"Holy hell it was the shooting stars!\"\n\nYou blink. \"What was the shooting stars?\"\n\n\"[i]You[/i]. Or, uh, Kanibor. The Necrophone. All three of you. You know. I wished upon a bunch of shooting stars, and [b]bang[/b]!\" He punches a fist into his palm for emphasis and grins in disbelief. \"My prayers were answered. And that was the first time I ever sincerely prayed in my life!\" \n\nAurora makes a belly laugh and claps her hands, startling the still very nervous Azure and making her cringe and curse. \"I'm going to murder the next person who gives me a heart attack!\" Azure warns in a mousy and exasperated yet serious voice. \n\nBaxter, face scarlet with chagrin, glares defensively at Aurora. \"I'm serious,\" he says, sounding almost hurt. \"Ask Tariano. The night of the audition, we were out smoking weed on the balcony, talking about aliens. Then a cluster of shooting stars went by, so I wished for what I wanted most: an actual real, live, good death metal vocalist who could keep up with our musicianship. And gel with us even if we're not exactly normal.\"\n\nAurora snorts, but Tariano shrugs seriously and backs up Baxter. \"Considering Kanibor came from a meteor, anything is possible. It could be alien technology beyond our wildest dreams, or even aliens from another universe operating by different freaking physics. But, yeah, Baxter did make that wish. Keep in mind, he rarely smokes weed because it tends to make him, ah, overthink things a smidgen.\"\n\n*page_break \n\nTo your immeasurable relief, ${band} seems to decide unanimously not to fire you after all. Baxter, being a capable harsh vocalist who performs occasional backing vocals on your songs, promises to teach you everything he knows. Tariano says that your 'clairvoyance amnesia' may be temporary. \n\nHe predicts some of the musical knowledge and talent you lost when your connection with Kanibor was severed could gradually resurface through various catalysts over time. Aurora insists that regardless of whether you have the Necrophone or not, ${band} will be able to persevere. She also notes that these bizarre, unnatural experiences are perfect for lyrical material and inspiration. \n\nAzure clears her throat daintily. \"Um, I hate to bother everyone, and I'm glad we figured everything out and everything. There's just one problem: Larry's still out there, and with the way he's pacing around so impatiently, he's evoking strong,\" she hand-waves, considers for a second, and continues, \"mass shooter vibes.\"\n\nAll of you look out the window in unison to see Larry stomping around in circles. His expression is so dark and filled with rage that you half expect smoke to start shooting from his ears. Evidently he expected you to be dismissed summarily and dramatically heaved out of the bus instead of getting a group therapy session. After a few minutes of debate, it's decided that the most reliable plan is to simply gaslight him. \n\nIt's time to go deliver the bad news to Larry that what he saw fleeing from the bus was simply a stray cat. \n*if (tough_fragments)\n\tHe hurt you physically nearly as much as Kanibor did, you reflect bitterly. It will be satisfying to see him get humiliated. \n*if (charisma_fragments)\n\tLarry may have been right about you being a fraud or a poser all along, but you were still more of a genuine human being than him, and that's why you won. Maybe this can be a lesson for him.\n*if (intelligence_fragments)\n\tLarry's natural talent never stood a chance against the Necrophone; yet much more detrimental for him was how his relationship with the band couldn't survive his swollen, grimy ego. \n*if (deception_fragments)\t\n\tA part of you wishes Larry had gotten what he asked for and was preyed upon by Kanibor instead of you; but then, you wouldn't have won, and he wouldn't have lost.\n\t\nWho do you take with you as backup? \n*choice\n\t#Baxter, for the intimidation, or muscle when things inevitably go south\n\t\t*goto tough_gaslight\n\t\t\n\t#Azure, because she may be able to keep him calmer\n\t\t*goto charisma_gaslight\n\t\t\n\t#Tariano, because the plan was mostly his idea\n\t\t*goto intelligence_gaslight\n\t\t\n\t#Aurora, because Larry actually seems to like her\n\t\t*goto deception_gaslight\n\t\t\n\t\t*label tough_gaslight\n\t\t*set tough_gaslight true \n\t\t*set deception +1 \n\t\t*set intimidating +1 \n\t\t*set tough +2\n\t\t*set baxter +1\n\t\t(+2 Tough, +1 Intimidating, +1 Deception, Baxter Approves)\n\t\t*line_break \n\t\tBaxter's chest swells with pride when you pick him. He wipes his sweaty palms on his pants and exhales deeply, but wears a determined scowl. The two of you exit the tour bus, making for an imposing pair with Baxter lumbering behind you like a personal bodyguard. \"So, what's the verdict?\" Larry demands impatiently, though you notice him taking a half step back.\n\t\t\n\t\t\"Nothing,\" you reply coldly. Your adrenaline is pumping and you feel ready for a fight. \"The monster you were getting hysterical over was just a stray cat I was trying to take care of.\"\n\t\t\n\t\tLarry laughs in your face, but you just frown back at him unflinchingly. You're not afraid of him, and that pisses him off. He turns to Baxter with an incredulous look. \"That's laughable. You've got to be lying?\"\n\t\t\n\t\tBaxter shrugs and rumbles, \"Nope. This certainly is laughable but we're not lying. Your scrawny ass dragged my fat ass all the way over here for a mangy, feral cat.\"\n\t\t*goto hunker \n\t\t\n\t\t*label charisma_gaslight \n\t\t*set charisma_gaslight true \n\t\t*set charisma +2 \n\t\t*set intelligence +1 \n\t\t*set chill +1\n\t\t*set azure +1\n\t\t(+2 Charisma, +1 Chill, +1 Intelligence, Azure Approves)\n\t\t*line_break \n\t\tAzure squeaks in surprise when you pick her. She looks frightened for half a second, but then stands proudly beside you, arms folded. The two of you exit the tour bus, Azure trailing behind you like a lost duckling once she sees Larry's livid expression. \"So, what's the verdict?\" he demands, softening slightly at the sight of Azure lurking behind you. \n\t\t\n\t\t\"Thrown out of court,\" you reply flippantly. He is worse than the scummiest, slimiest lawyer. \"The monster you were panicking over was literally a stray cat I was trying to save.\"\n\t\t\n\t\tLarry guffaws in your face, and you cringe back with an indignant frown, wiping a speck of spittle from your cheek. He turns to Azure with an extremely skeptical look. \"Tell me this fool is high. You can't possibly believe this?\"\n\t\t\n\t\tAzure returns an exaggerated disbelieving look of her own. \"Aren't you always high? That would explain why you thought a fluffy dumpster kitty was a [i]monster[/i].\" \n\t\t*goto hunker \n\t\t\n\t\t*label intelligence_gaslight \n\t\t*set intelligence_gaslight true \n\t\t*set intelligence +2 \n\t\t*set deception +1 \n\t\t*set mysterious +1 \n\t\t*set tariano +1\n\t\t(+2 Intelligence, +1 Mysterious, +1 Deception, Tariano Approves)\n\t\t*line_break \n\t\tTariano seems surprised when you pick him. Eyes wide, trembling slightly with anticipation, he bravely stands beside you. The two of you exit the tour bus, Tariano matching your footsteps, with his hands stuffed into his hoody pocket but his eyes laser trained on Larry. \"So, what's the verdict?\" Larry demands, sneering contemptuously at Tariano. \n\t\t\n\t\t\"There is none,\" you reply bluntly. You're exhausted with Larry pretending he's smarter than he really is. \"That monster was a figment of your imagination. It was a stray cat I was looking after.\"\n\t\t\n\t\tLarry laughs obnoxiously in your face, and you inch back, clicking your tongue distastefully. He really should stop underestimating you. He turns to Tariano with an overly suspicious expression. \"Your brain has plenty of wrinkles right, Tariano? Are you telling me you really believe this pathetic, childish lie?\"\n\t\t\n\t\t\"I've never had any brain scans to my knowledge, but I imagine so,\" Tariano replies, his voice as dry as a desiccated cactus. \"Your brain appears to be plenty smooth since you sincerely believe a harmless stray cat was some kind of urban legend monster.\"\n\t\t*goto hunker \n\t\t\n\t\t*label deception_gaslight \n\t\t*set deception_gaslight true \n\t\t*set deception +2\n\t\t*set tough +1 \n\t\t*set mysterious +1 \n\t\t*set aurora +1\n\t\t(+2 Deception, +1 Mysterious, +1 Tough, Aurora Approves)\n\t\t*line_break \n\t\tAurora doesn't seem surprised at all when you pick her. She immediately stands beside you, ready for duty, expression grim and serious. The two of you exit the tour bus, Aurora making a point to stomp down the metal stairs with her combat boots. Bristling at the sight of Aurora, Larry demands, \"Well, what's the verdict?\"\n\t\t\n\t\t\"We decided you had no idea what you were talking about,\" you say frostily. You hope you never have to see his smug face again after this. \"That monster you hallucinated was actually just a stray cat I was trying to help. Thanks for botching that, by the way.\"\n\t\t\n\t\tLarry practically shrieks with laughter in your face, but you don't even reward him with so much as an eyebrow twitch. You won't be intimidated by him. He turns to Aurora with an incredulous look. \"Roar, you gotta be kidding me. You can't seriously believe this ridiculous lie.\"\n\t\t\n\t\tAurora blushes furiously, her ordinarily pale complexion burning bright scarlet. Then she's hissing, \"Don't call me that! [i]You[/i] can't seriously believe that stray cat was some sort of mythical monster just because you're obsessively jealous of ${name}.\"\n\t\t*goto hunker \n\t\t\n*label hunker\n\nLarry checks out at that, the lights in his eyes going flat like a robot's. He reaches up with clawed hands, veins bulging on his forehead, tendons popping in his neck. His hands swiftly close around your throat before you have time to react. \"You're already in the cemetery,\" he breathes through gritted teeth, spittle flying from his mouth as he draws you closer. \n\n*finish ", "chapter7dwarf": "*temp talk_baxter 0\n*temp talk_azure 0\n*temp talk_tariano 0\n*temp talk_aurora 0\n*temp group 0\n*temp hotel 0\n*temp aged 0\n\n*comment stat checks: 40\n\n[b]Chapter Seven of Eight: The White Dwarf[/b]\n\n*image moon3.jpg\n\nLarry's fingers tighten around your throat, cutting off your air. His fingernails bite into your skin, and his eyes look as dead as Kanibor's as he draws you closer to him.\n*if (tough_gaslight)\n\tGlaring at him defiantly, you stomp onto his foot with all your might. He groans but only loosens his grip slightly. \n\t\n\tThen Baxter's fist connects with the side of his head, and he goes flying like a cartoon character. \n*if (charisma_gaslight)\n\tYou grip his fingers, trying to pry them off your neck and bend them back. He hisses and growls in pain, but you can't get a good grip and your strength is failing. \n\t\n\tThen Azure launches past you and kicks him square in the groin, and he screams, clutches himself, and staggers away. \n*if (intelligence_gaslight)\n\tYou clap your hands on his face, trying to force him away and dig at his eyes simultaneously. He grunts and twists, but doesn't relent his death grip on your neck. \n\t\n\tThen Tariano is on him, taking two giant fistfuls of his hair and hauling him off as he shouts and curses. \n*if (deception_gaslight)\n\tYou force your hands between his wrists and then grab onto them, prying them apart. Larry gasps and shakes with effort, but his grip is quickly breaking.\n\n\tThen Aurora is attacking him savagely, jabbing him in the ribs and stomach with her drumsticks as though they were knives. Larry yelps and cries out, scrambling away.\nA second later, the door of the tour bus flies open. The rest of the band runs out, yelling at Larry and rushing to your defense. \n\nYou clutch at your neck, coughing painfully and gasping for breath. Larry is backpedaling, his face stormy and cold. \"This isn't over!\" he shouts, pointing directly at you before running running away and vanishing behind a row of catering vans. \n\n\"I'm alright,\" you say, although your voice is weak and hoarse, and your neck is tender and friction burned. \n\nAzure and Aurora usher you back in the bus as though you just suffered a broken leg. Tariano looks at you, his eyes filled with worry. \"${name}, I think we all need to hunker down somewhere safe for a couple days, like a hotel. With Lunatic Larry following us all around the country, and the possibility of Kanibor coming back for unpleasant reasons, it's too dangerous for you to be out in public. In my humble opinion.\"\n\nAs Baxter peels out of the parking lot, you half wonder if Larry will start coming after you in his little red sedan. That conjures up images of a lady bug chasing after a scarab beetle, making you chuckle, yet the thought unsettles you nonetheless. Looking at your neck in the bathroom mirror, you see bruises in the shapes of Larry's fingers actively forming. A moonlit cemetery flashes through your mind. \n\n*page_break\n \nBaxter finds a nearby hotel and makes a point of parking the tour bus beside a dead street lamp. Inside, your group books a five bed suite for two days. You could all afford to get your own individual rooms, even the most expensive ones, but ${band} seemed to agree without saying it aloud that they wouldn't leave you alone. \n\nThe first evening in the hotel, all you can do is sleep. Traveling across the country and playing live music is already exhausting. Combined with being drained of blood by your mic and strangled afterwards by your arch nemesis, it's murder. Fortunately, ${band} has been as thoughtful and considerate as they were understanding.\n\t\t\nYou slept hard, but woke up intermittently from bodily pain, hunger, or to use the restroom. Each time you woke, someone different was there to eagerly take care of you. Baxter made sure the blinds were always drawn and got you some generic painkillers from the hotel shop. Azure offered you some edibles for pain management and even made you a delicious tomato soup. \n\nTariano took the liberty of doing your laundry in the hotel laundry room, although he wasn't able to salvage the clothes Kanibor soiled with your regurgitated blood. Aurora even went out at some point and returned with a heating pad for you to help you sleep and to soothe your aches. You were so busy recovering and being pampered that you hardly had any time to worry about Kanibor or Larry. \n\n...\n\nThe next morning, all of your strength has returned, and there have been no signs of any suspicious activity. Later that day, Tariano proudly displays to everyone the new tattoos he had been keeping secret. He has two full sleeves in your band's jagged death metal font: his left arm reads \n*if ( (tough_band) or (charisma_band))\n\t[i]\"Dead\"[/i]\n*if (intelligence_band)\n\t[i]\"Advocate\"[/i]\n*if (deception_band)\n\t[i]\"Atomic\"[/i]\nwhile his right arm reads\n*if (tough_band)\n\t[i]\"Politicians\"[/i].\n*if (charisma_band)\n\t[i]\"and Dreaming\"[/i].\n*if (intelligence_band)\n\t[i]\"Cannibalism\"[/i].\n*if (deception_band)\n\t[i]\"Decay\"[/i].\nIt's hard to say whether Azure or Baxter cries tears of joy harder. Aurora punches him on the arms multiple times from cute aggression. You have no idea what to say.\n\t\nIs there anyone you would especially like to spend some time with while you're cooped up in this hotel like you're under house arrest?\n*choice\n\t#Spend some time with just Baxter \n\t\t*goto tough_hotel \n\t\t\n\t#Spend some time with just Azure \n\t\t*goto charisma_hotel \n\t\t\n\t#Spend some time with just Tariano \n\t\t*goto intelligence_hotel \n\t\t\n\t#Spend some time with just Aurora  \n\t\t*goto deception_hotel \n\t\t\n\t#Hang out with the entire group\n\t\t*goto general_hotel \n\t\t\n\t\t*label tough_hotel\n\t\t*set tough_hotel true \n\t\t*set charisma +1 \n\t\t*set intimidating +1 \n\t\t*set tough +2\n\t\t*set baxter +1\n\t\t(+2 Tough, +1 Charisma, +1 Intimidating, Baxter Approves)\n\t\t*line_break \n\t\tWhen you tell Baxter you want to talk to him alone for a while, he smiles eagerly and suggests you can talk on the balcony. The two of you go outside, standing close together on the small balcony overlooking the parking lot. A cold breeze rolls through, sending an empty soda can bouncing and tumbling across the ground. \n\t\t\n\t\tBaxter leans against the wooden railing, letting out a long sigh as he looks up at the sky. There's a scattering of pale points of light in the black expanse, occasionally covered by slow moving, wispy gray clouds. \"This night reminds me of the night of the audition, when I wished upon a star for a vocalist,\" he says contemplatively. \n\t\t\n\t\tYou look at him in mild surprise. You wonder if his wish really was the catalyst for all of this, or if there's a more rational explanation. Maybe you'll never really know for certain. Eyeing him closely, you say, \"So, what, are you saying that our friendship is fate?\"\n\t\t\n\t\tBaxter fidgets, brushing against you lightly. His pale face is now a rosy pink. \"Well, I don't normally believe in all that nonsense. But in this case, how can I not?\" He shrugs and chuckles almost bashfully. \"Anyways, it would be cool. You know, for this to be fateful.\"\n\t\t\n\t\tIt seems Baxter hasn't lost a bit of admiration for you since the revelation in the tour bus. He still seems just as nervous as before, which makes you feel a little embarrassed. Why does this giant, badass guitarist respect you so much? He clears his throat and rubs the back of his head. \"So, what did you want to talk with me about, ${name}?\"\n\t\t*label talk_baxter\n\t\t*if (talk_baxter > 0)\n\t\t\n\t\t\tWhat would you like to talk about with Baxter next?\n\t\t*choice \n\t\t\t*if (talk_baxter > 0) \n\t\t\t\t*selectable_if ((attracted_males) and (baxter > 59)) #Boldly ask Baxter to be your boyfriend (Requires 60 Baxter)\n\t\t\t\t\t*goto tough_flirt_baxter\n\t\t\t\n\t\t\t*if (talk_baxter > 0)\n\t\t\t\t*selectable_if ((attracted_males) and (baxter > 59)) #Playfully coax Baxter into asking you to be his ${boyfriend} (Requires 60 Baxter)\n\t\t\t\t\t*goto charisma_flirt_baxter\n\t\t\t\n\t\t\t*hide_reuse #Ask Baxter if he will resent you if you can't live up to the Necrophone\n\t\t\t\t*goto tough_baxter \n\t\t\t\t\n\t\t\t*hide_reuse #Ask Baxter if he'd like for you to grab a couple beers\n\t\t\t\t*goto charisma_baxter\n\t\t\t\t\n\t\t\t*hide_reuse #Ask Baxter about his dreams for the band\n\t\t\t\t*goto intelligence_baxter\n\t\t\t\t\n\t\t\t*hide_reuse #Tease Baxter, suggesting he get high since he ordinarily drinks\n\t\t\t\t*goto deception_baxter \n\t\t\t\t\n\t\t\t\t*label tough_flirt_baxter\n\t\t\t\t*set tough_flirt_baxter true \n\t\t\t\t*set tough +2\n\t\t\t\t*set charisma +1\n\t\t\t\t*set intimidating +1 \n\t\t\t\t*set baxter +3\n\t\t\t\t*set baxter_partner true \n\t\t\t\t*set talk_baxter +1\n\t\t\t\t(+2 Tough, +1 Intimidating, +1 Charisma, Baxter Approves)\n\t\t\t\t*line_break \n\t\t\t\tMaybe you should be intimidated by Baxter, what with his towering height, giant arms, and calloused, huge hands that could literally grip your wrists single handedly...but you've seen that beneath his intimidating exterior, he is simply and undeniably in love with music, and obviously cherishes the ones he cares about. You look him dead in the eyes. \"Baxter, will you be my boyfriend?\"\n\t\t\t\t\n\t\t\t\tBaxter's face turns scarlet, the color rising in his face like it does in cartoon thermostats. But he matches your gaze, his gray eyes smoldering and full of desire. \"Yes,\" he utters, touching your arm. \"I was going to ask you, but-well, I hadn't mustered up the courage yet.\"\n\t\t\t\t\n\t\t\t\tYou tip your chin up, opening your lips in silent invitation. His fingers find yours, rough with callouses yet gentle and full of warmth. Then you're kissing deeply, running your hand through his long hair. Beneath his bushy beard, which smells attractively of sandalwood, his lips are full and plump and wet. \n\t\t\t\t\n\t\t\t\tYou and Baxter hold each other there on the balcony, kissing deeply and without hurry, neither of you wanting to break away. Then a gust of cold wind pushes his hair against your faces like a curtain, making both of you laugh. He shakes his head, laughing again in disbelief. \"I really don't understand it. I'm so fucking lucky.\"\n\t\t\t\t\n\t\t\t\tYou take a deep breath, looking up at the dark, starry sky. You think about where your life used to be, and how you now have financial security, a whole new found family, and now this lovable teddy bear at your side. Letting out a contented sigh, you attempt to loop an arm around his girth. \"Me too.\"\n\t\t\t\t*goto sleep \n\n\t\t\t\t*label charisma_flirt_baxter \n\t\t\t\t*set charisma_flirt_baxter true \n\t\t\t\t*set charisma +2\n\t\t\t\t*set baxter_partner true \n\t\t\t\t*set mysterious +1\n\t\t\t\t*set deception +1\n\t\t\t\t*set baxter +3\n\t\t\t\t*set talk_baxter +1\n\t\t\t\t(+2 Charisma, +1 Mysterious, +1 Deception, Baxter Approves)\n\t\t\t\t*line_break \n\t\t\t\tYou're certain Baxter is into you. He's adorably obvious about it, and now you just need to get him to really admit it. Of course, you might also be totally wrong and making an embarrassment of yourself. You sigh melodramatically. \"I don't know. I guess I've just been feeling lonely lately.\"\n\t\t\t\t\n\t\t\t\tBaxter stays silent for several seconds, and you can practically hear the gears turning furiously in his head. A glance over reveals his complexion is a rosy pink. He looks at you bravely and says, the words tumbling from his lips, \"That's honestly a tragedy, because someone as amazing as you should never have to feel lonely.\"\n\t\t\t\t\n\t\t\t\tOkay, that's as good as you're possibly going to get out of this goober. You lean in, smiling coyly as you press your noses together, and decide to mercifully end his torment. It's only fair, after all; he sort of ended yours. \"Baxter, will you be my boyfriend?\"\n\t\t\t\t\n\t\t\t\tHe looks even happier than he did performing at Rot Fest, his cool eyes sparkling with warmth. He licks his lips nervously, or perhaps in preparation for a kiss. Seeming almost choked up, he bobs his head eagerly, whispers, \"Well, duh,\" and leans in to kiss you. \n\n\t\t\t\tYour kiss lasts for several minutes, slow and careful yet filled with longing. His big hands press into your lower back. Your fingers find their way through his long hair and down onto his powerful arms. The two of you kiss until Azure knocks on the window, making smoochy faces and batting her eyelashes for the others' amusement. You and Baxter laugh and go inside holding hands. \n\t\t\t\t*goto sleep \n\t\t\t\t\n\t\t\t\t*label tough_baxter \n\t\t\t\t*set tough_baxter true \n\t\t\t\t*set hotel +1\n\t\t\t\t*if (hotel > 1) \n\t\t\t\t\t*set tough_baxter_last true \n\t\t\t\t*set baxter +1\n\t\t\t\t*set tough +2\n\t\t\t\t*set charisma +1\n\t\t\t\t*set rebellious +1\n\t\t\t\t*set talk_baxter +1\n\t\t\t\t(+2 Tough, +1 Charisma, +1 Rebellious, Baxter Approves)\n\t\t\t\t*line_break \n\t\t\t\tThere's no easy way to ask this question, so you decide to just ask it before you can change your mind. With a sigh, you admit, \"Baxter, I honestly have no idea if I can live up to the Necrophone's abilities. If I fail miserably, which [i]is[/i] a distinct possibility, aren't you and the others going to resent me?\"\n\t\t\t\t\n\t\t\t\tBaxter does a double take and looks at you as though you had just asked him if the moon was going to suddenly fall out of the sky. \"What?\" he laughs. \"Resent you? If it wasn't for you, we'd still be going through a revolving door of mediocre vocalists and working on demos in storage units. I don't know about the rest of the band, but you're a saint, a scholar, hell, a fucking living legend in my opinion.\"\n\t\t\t\t\n\t\t\t\tYou can only stare at Baxter in bewildered silence for a few seconds. He laughs again and shrugs, saying, \"Oh, come on, ${name}. Don't act so surprised. For better or worse, you took us talented garage musicians and catapulted us into the actual music scene. Personally, I'll never resent you for that.\"\n\t\t\t\t\n\t\t\t\tYou feel a tremendous burden slowly being lifted off your shoulders. One of your greatest fears throughout all of this has been letting down Baxter and the band. Shaking your head in disbelief, you allow yourself to laugh now. \"I don't know what to say, Baxter. Thanks. I won't let you down.\"\n\t\t\t\t\n\t\t\t\tHe snorts and waves your words away. \"If you do, it's not like the apocalypse will begin or something.\" He wiggles his eyebrows and grins toothily, punching an open palm. \"And if Tariano or any of the others give you shit, I'll clobber their ungrateful asses.\"\n\t\t\t\t*if (talk_baxter \u003c 2)\n\t\t\t\t\t*goto talk_baxter\n\t\t\t\t*goto sleep \n\t\t\t\t\n\t\t\t\t*label charisma_baxter\n\t\t\t\t*set charisma_baxter true \n\t\t\t\t*set hotel +1 \n\t\t\t\t*if (hotel > 1)\n\t\t\t\t\t*set charisma_baxter_last true \n\t\t\t\t*set charisma +2\n\t\t\t\t*set chill +1\n\t\t\t\t*set tough +1\n\t\t\t\t*set baxter +1\n\t\t\t\t*set talk_baxter +1\n\t\t\t\t(+2 Charisma, +1 Tough, +1 Chill, Baxter Approves)\n\t\t\t\t*line_break \n\t\t\t\tWhen you offer to fetch a couple of beers from the fridge, Baxter nods eagerly. You return with the bottles, and the two of you clink them together in a toast. \"A fantastic idea,\" he says. \"We deserve them after the hell of a day we've had.\"\n\t\t\t\t\n\t\t\t\tTo your amusement, Baxter challenges you to a race and immediately starts chugging. Not wanting him to have all the fun, you throw your head back and guzzle your beer down. The cold beer and carbonation sting your throat until your eyes burn. Your lungs start to ache for oxygen but you keep drinking until the bottle is empty. \n\t\t\t\t\n\t\t\t\tBaxter finishes his bottle at the same time as you, and the two of you have to take several seconds to catch your breath. Then you're both clutching at your skulls from the brain freeze and laughing at one another. You feel light and warm and your unbridled laughter echoes around the parking lot. \"I'm never going to miss working at Cost Slicer,\" you suddenly declare emphatically. \n\t\t\t\t\n\t\t\t\tBaxter raises his empty bottle to that and then pats you supportively on the back. \"Oh, hell no. This is the dream, escaping our old soul sucking jobs. Did I tell you how I quit my old stocking job? They used to make me do mandatory, unscheduled overtime all the time, so I requested over time and then ghosted them to completely fuck them over.\"\n\t\t\t\t\n\t\t\t\tHe howls with laughter, his baritone belly laugh reverberating around the lot. Baxter laughs so hard that he accidentally drops his beer bottle. He curses meekly but then lets out a sigh of relief when the glass bottle falls harmlessly into the grass below. You smile thoughtfully. \"We're definitely never going back.\"\n\t\t\t\t*if (talk_baxter \u003c 2)\n\t\t\t\t\t*goto talk_baxter\n\t\t\t\t*goto sleep \n\t\t\t\t\n\t\t\t\t*label intelligence_baxter \n\t\t\t\t*set intelligence_baxter true \n\t\t\t\t*set hotel +1 \n\t\t\t\t*if (hotel > 1)\n\t\t\t\t\t*set intelligence_baxter_last true \n\t\t\t\t*set intelligence +2\n\t\t\t\t*set charisma +1\n\t\t\t\t*set rebellious +1\n\t\t\t\t*set baxter +1\n\t\t\t\t*set talk_baxter +1\n\t\t\t\t(+2 Intelligence, +1 Rebellious, +1 Charisma, Baxter Approves)\n\t\t\t\t*line_break \n\t\t\t\tSomething tells you that, perhaps more than any of the other members, ${band} and making music are most important to Baxter. He positively exudes passion for this band and music in general, and you want him to be able to see his dreams come to fruition. You look at him with a smile. \"Tell me about your dreams for the band, Baxter. Where are we going from here?\"\n\t\t\t\t\n\t\t\t\tBaxter seems a little surprised by your question, but an easy smile springs to his lips and his eyes light up with a distant, dreamy look. He tells you about his vision for the band: relentless touring for months on your first album to build a buzzing fan-base and get them hungry for the next album. \n\t\t\t\t\n\t\t\t\tGesticulating excitedly, his face glowing with passion, he goes on to explain how he wants ${band} to continue to craft and release an album every year. \"But not just that,\" he says. \"I want each album to be different, to evolve, to become better and and distinctly different than the previous one.\" He laughs, almost sounding embarrassed. \"I don't know if any of that is possible. But it's what I've been dreaming of for years.\"\n\t\t\t\t\n\t\t\t\tHe looks bashful now, but he shouldn't. \"Those are amazing plans, Baxter,\" you tell him genuinely. \"I don't know if they're going to happen either, but I think that these past few weeks have taught us that literally anything is possible. Why not shoot for the cosmos? We know there's something out there for us.\"\n\t\t\t\t\n\t\t\t\tThe two of you eagerly discuss the possibilities of your musical career for several more minutes, your breath coming out in white puffs. Baxter is certain that you're all on track to be able to play music for a good living for the rest of your lives as long as you continue to grind and deliver. The more you see his passion, the more you believe him.\n\t\t\t\t*if (talk_baxter \u003c 2)\n\t\t\t\t\t*goto talk_baxter\n\t\t\t\t*goto sleep \n\t\t\t\t\n\t\t\t\t*label deception_baxter\n\t\t\t\t*set deception_baxter true \n\t\t\t\t*set hotel +1 \n\t\t\t\t*set talk_baxter +1\n\t\t\t\t*if (hotel > 1)\n\t\t\t\t\t*set deception_baxter_last true \n\t\t\t\t*set deception +2\n\t\t\t\t*set charisma +1\n\t\t\t\t*set mysterious +1\n\t\t\t\t*set baxter -1\n\t\t\t\t(+2 Deception, +1 Mysterious, +1 Charisma, Baxter Disapproves)\n\t\t\t\t*line_break \n\t\t\t\tThe only time you recall Baxter talking about smoking weed was that night he wished on a star, but maybe he'd join you tonight. You could certainly use an injection of euphoria and pain relief right about now. When you suggest this to him, he mulls it over for a second and then shrugs tolerantly. \"Ah, what the hell. Not like my anxiety could get any worse.\"\n\t\t\t\t\n\t\t\t\tYou duck inside for a few moments to ask Azure for a blunt and lighter, and return to the balcony with the acquired goodies. You light it up and take a very long drag, exhaling the smoke slowly in a conical plume that looks like a dragon's breath in the street lamp's glow. \n\t\t\t\t\n\t\t\t\tInstantly, your bodily pain starts fading to the background and your swirling thoughts grow calmer. Baxter accepts the blunt from you and takes a decidedly smaller hit before quickly handing it back. \"I love weed,\" he admits, coughing several times into his elbow, \"but sometimes it gives my [i]anxiety[/i] anxiety. You know?\"\n\t\t\t\t\n\t\t\t\tYou nod understandingly but reassure him that things won't be getting stressful here on this balcony unless he's afraid of heights. By the time you've finished the blunt, a pungent earthy aroma hangs in the air, and you feel like you're hovering on warm clouds. \"You have anxiety?\" you tease. \"I thought you gave people anxiety just from the looks of you.\"\n\t\t\t\t\n\t\t\t\tYou know your eyes must be bloodshot, and Baxter's are glazed over. He rolls them dramatically with a robotic, sarcastic laugh. \"Ha-ha-hah. I may like my death metal knuckle dragging, but that doesn't mean I've got the mindless confidence of a neanderthal. Hence the desperate star wishing.\" \n\t\t\t\t*if (talk_baxter \u003c 2)\n\t\t\t\t\t*goto talk_baxter\n\t\t\t\t*goto sleep \n\t\t\t\t\t\n\t\t*label charisma_hotel \n\t\t*set charisma_hotel true \n\t\t*set charisma +2 \n\t\t*set deception +1 \n\t\t*set chill +1\n\t\t*set azure +1\n\t\t(+2 Charisma, +1 Chill, +1 Deception, Azure Approves)\n\t\t*line_break \n\t\tWhen you ask Azure if you can talk alone with her, she bobs her head and suggests having your conversation on the balcony. Together, you go outside on the decidedly small balcony, shoulders nearly touching. A gust of wind comes through the parking lot, scattering leaves and sticks and causing Azure to shiver and pull her hood up. \n\t\t\n\t\tShe puts her elbows on the wooden railing, resting her chin on her fists with a thoughtful expression. She lets out a sigh for a very long time, looking up at the stars with a contemplative expression. \"There's so much out there. Our lives are completely changing with the band. Aliens are real, or wishes are. Maybe both. I don't know which is crazier.\" \n\t\t\n\t\tShe looks over at you, her expression very serious. \"And creepy Larry and Kanibor are still scuttling around out there somewhere. I don't know how you're keeping your sanity. I think you're the toughest person I've ever met, ${name}. And Aurora's my best friend forever. [i]She's[/i] tough.\"\n\t\t\n\t\tYou blink at Azure in mild surprise. She smiles and rubs your back supportively. Bitter memories of being drained, collapsing on the bathroom floor, and running from the stage in a panic with blood seeping from your pants flash through your mind. \"I didn't feel particularly brave,\" you admit. \"I guess bravery isn't very glamorous.\"\n\t\t\n\t\tAzure nods understandingly and looks off into  the distance again. You wonder if she realizes how brave she has been about Kanibor and your music career, too. She stretches hard, groaning and creating a cloud of crystallized breath that glows in the street lamp. \"So, what did you want to talk about, ${name}?\"\n\t\t*label talk_azure\n\t\t*if (talk_azure > 0)\n\t\t\n\t\t\tWhat would you like to talk about with Azure next?\n\t\t*choice \n\t\t\t*if (talk_azure > 0)\n\t\t\t\t*selectable_if ((attracted_females) and (azure > 59)) #Subtly ask Azure to be your girlfriend (Requires 60 Azure)\n\t\t\t\t\t*goto deception_flirt_azure\n\t\t\t\t\t\n\t\t\t*if (talk_azure > 0)\n\t\t\t\t*selectable_if ((attracted_females) and (azure > 59)) #Confidently ask Azure to be your girlfriend (Requires 60 Azure)\n\t\t\t\t\t*goto charisma_flirt_azure\n\t\t\t\n\t\t\t*hide_reuse #Suggest that she drink some beer with you since she normally smokes weed\n\t\t\t\t*goto tough_azure \n\t\t\t\t\n\t\t\t*hide_reuse #Ask if she'd like to smoke a blunt together\n\t\t\t\t*goto charisma_azure\n\t\t\t\t\n\t\t\t*hide_reuse #Ask her about her pet lizards\n\t\t\t\t*goto intelligence_azure\n\t\t\t\t\n\t\t\t*hide_reuse #Ask her why she likes to people watch so much \n\t\t\t\t*goto deception_azure\n\t\t\t\t\n\t\t\t\t*label deception_flirt_azure\n\t\t\t\t*set deception_flirt_azure true \n\t\t\t\t*set azure_partner true \n\t\t\t\t*set deception +2\n\t\t\t\t*set mysterious +1\n\t\t\t\t*set charisma +1 \n\t\t\t\t*set azure +3\n\t\t\t\t*set talk_azure +1\n\t\t\t\t(+2 Deception, +1 Mysterious, +1 Charisma, Azure Approves)\n\t\t\t\t*line_break \n\t\t\t\tYour stomach swoops and your heart flutters with nerves. Azure's cheeks are rosy from the cold and she's chattering her teeth adorably. No sense in dragging this out in the cold any longer. \"Everyone probably thinks we're a couple right now,\" you say nonchalantly. Then you venture, \"But, you're the expert people watcher. What's your opinion?\"\n\t\t\t\t\n\t\t\t\tAzure does a double take that's impossible not to find endearing. She looks at a family walking through the parking lot and then hugs onto your arm, resting her head warmly on your shoulder. \"Now they definitely think we're together.\" She looks at you bashfully with those big, pretty eyes. \"So, are we?\"\n\t\t\t\t\n\t\t\t\tYour eyes meet. You can practically feel warmth, tenderness, and longing emanating from her. You wonder vaguely what you did to deserve the affection of someone as strikingly beautiful and genuinely sweet as her. She shivers and nuzzles closer against you, looking at you expectantly. \"We are now,\" you utter.\n\t\t\t\t\n\t\t\t\tShe smiles, a dazzling, pearly white smile that makes you melt. She slides her warm, soft fingers between your freezing ones and leans in, her big bow lips parting in invitation. When you kiss, you immediately suspect it's the best kiss you've ever had. She kisses you eagerly, almost hungrily, yet tenderly all at once. Her lips are soft and full and plump, enveloping yours with warmth and wetness and desire. \n\t\t\t\t\n\t\t\t\tAzure is wearing what tastes pleasantly like a sour apple lip balm, and there's the fruity smell of weed on her breath. Her little tongue swirling on yours makes you breathless and stirs spicy thoughts inside of you. But then she sighs regretfully and says, \"We'd better get inside before you freeze that cute butt off.\" She grins and pokes you affectionately in the ribs. \"[i]$!{boyfriend}[/].\"\n\t\t\t\t*goto sleep \n\n\t\t\t\t*label charisma_flirt_azure \n\t\t\t\t*set charisma_flirt_azure true\n\t\t\t\t*set azure_partner true \n\t\t\t\t*set charisma +2\n\t\t\t\t*set intimidating +1\n\t\t\t\t*set intelligence +1\n\t\t\t\t*set azure +3\n\t\t\t\t*set talk_azure +1\n\t\t\t\t(+2 Charisma, +1 Intimidating, +1 Intelligence, Azure Approves)\n\t\t\t\t*line_break \n\t\t\t\tYour stomach is swirling with butterflies, but you remind yourself that Azure, possibly the prettiest and coolest girl you've ever met, has clicked with you remarkably well and flirted with you multiple times. You may as well not embarrass yourself by stringing her along with indecisiveness and dragging her out here for no reason. \"Azure, I brought you out here to ask you to be my girlfriend.\"\n\t\t\t\t\n\t\t\t\tAzure lets out a little gasp and quickly looks away. Then her shoulders start to tremble, and for a horrible second, you're not sure whether you've managed to make her laugh at you or cry in distress. You touch her tentatively on the shoulder, and then feel a rush of relief when she looks at you, giggling with tears of happiness sparkling in her eyes. \n\t\t\t\t\n\t\t\t\tAzure caresses your face with her silky soft hands, guiding your lips to hers. You run your fingers through the buzzed sides and shaggy waves of her hair, kissing her back eagerly. Her kiss is warm and wet; she sucks on you slowly one second and mashes her big lips against yours with fire the next. \"Oh. Yeah. Yes. I'll be your girlfriend. I think I just responded in my head.\"\n\t\t\t\t\n\t\t\t\tYou laugh breathlessly, feeling pleasantly dizzy from your kiss. Then she's laughing along with you, a rich, happy, free, lovely sound you wouldn't mind hearing over and over again. You hear Baxter mimicking you two in a high pitched voice from inside, and anticipate some friendly ribbing later. \n\t\t\t\t\n\t\t\t\tAzure notices too and rolls her eyes with a smile, aiming a middle finger behind her. Then she shivers and looks at you with a pouty expression that makes you want to kiss her again. She sighs. \"Well, I'm not the only one who wants to snatch you up, so I guess we'd better get back inside, huh?\" She winks and slides a hand around your waist. \"[i]$!{boyfriend}.\"\n\t\t\t\t*goto sleep \n\t\t\t\t\n\t\t\t\t*label tough_azure \n\t\t\t\t*set tough_azure true \n\t\t\t\t*set hotel +1 \n\t\t\t\t*if (hotel > 1)\n\t\t\t\t\t*set tough_azure_last true \n\t\t\t\t*set azure -1\n\t\t\t\t*set tough +2\n\t\t\t\t*set rebellious +1\n\t\t\t\t*set charisma +1\n\t\t\t\t*set talk_azure +1\n\t\t\t\t(+2 Tough, +1 Rebellious, +1 Charisma, Azure Disapproves)\n\t\t\t\t*line_break \n\t\t\t\tYou excuse yourself to Azure's mild confusion, and quickly return to the balcony with a couple beers from the fridge. You smile encouragingly at her quizzical expression and offer her one. \"I know you usually smoke instead, but I thought you might like to have a drink with me.\"\n\t\t\t\t\n\t\t\t\tAzure shrugs tolerantly and accepts the bottle, clinking it against yours in a toast. She lifts up her sweater and scrubs the condensation off the bottle. \"Why not?\" she says. \"I was just thinking of lighting one up but I do have dry mouth, and maybe this will help.\"\n\t\t\t\t\n\t\t\t\tYou take a few long drinks, enjoying the familiar toasty flavor and bubbles. As the bottle gets lower, your feel increasingly mellow, and the ambiance adopts a vibrant sheen. Meanwhile, Azure only sips on her drink with mild interest. \"I know I have to drink more to feel anything cause it's so weak. It just tastes like soggy bread.\"\n\t\t\t\t\n\t\t\t\tYou laugh. \"Not everything can taste like lemon candy or fruity cereal.\"\n\t\t\t\t\n\t\t\t\tShe rolls her eyes. You tip your head back and finish off the rest of your beer. Your throat stings nicely from the carbonation and you feel warm and feather light despite the chill. Azure sighs and proceeds to chug her beer down in one go. \n\t\t\t\t\n\t\t\t\tAfter she's done, she squeezes her eyes shut and does a funny little jig. \"Ah! Curse you, brain freeze.\" You can't help but laugh again, but she only appears mildly amused. \"Great. I'm finally feeling buzzed but now I'm freezing and I have to pee.\"\n\t\t\t\t*if (talk_azure \u003c 2)\n\t\t\t\t\t*goto talk_azure\n\t\t\t\t*goto sleep \n\t\t\t\t\n\t\t\t\t*label charisma_azure\n\t\t\t\t*set charisma_azure true \n\t\t\t\t*set hotel +1 \n\t\t\t\t*if (hotel > 1)\n\t\t\t\t\t*set charisma_azure_last true \n\t\t\t\t*set charisma +2\n\t\t\t\t*set intelligence +1\n\t\t\t\t*set chill +1\n\t\t\t\t*set azure +1\n\t\t\t\t*set talk_azure +1\n\t\t\t\t(+2 Charisma, +1 Intelligence, +1 Chill, Azure Approves)\n\t\t\t\t*line_break \n\t\t\t\tYou give her a conspiratorial smile. \"I'm really glad these rooms have balconies. Wanna smoke? I think both of us could unwind after the day we've had.\"\n\t\t\t\t\n\t\t\t\tAzure wiggles her eyebrows and reaches into the fanny pack around her waist. \"A superb idea.\" She bats her eyelashes dramatically. \"Call me lady scout because I always come prepared.\" \n\t\t\t\t\n\t\t\t\tShe procures a little blunt and lights it, taking a couple long drags. She visibly relaxes, her shoulders drooping as she exhales a cloud of aromatic smoke. Coughing, she offers the blunt to you, and you nod gratefully and take a couple pulls. Immediately, a soothing warmth travels through your body and your head feels pleasantly light. \n\t\t\t\t\n\t\t\t\tFor a few minutes, the two of you pass the blunt back and forth in silence, simply enjoying the rapidly increasing high and each other's company. The ambiance takes on a brilliant sheen, making everything mundane look interesting and novel. The rows and columns of cars seem to glow faintly like a rainbow, and the haze of mist around the streetlamps is dazzling. \n\t\t\t\t\n\t\t\t\tAfter you've killed the blunt, Azure's eyes are bloodshot, and yours feel bloodshot too. She sighs wistfully and nudges you with an elbow. \"Can you believe this our life now? Smoking whenever we want, making beaucoup bucks traveling and living our dreams. We fuckin' deserve it, don't we?\" \n\t\t\t\t\n\t\t\t\tYou laugh and nod agreeably, but then something makes you hesitate. \"If anyone does, we do,\" you agree. \"But it's not certain yet. Larry and Kanibor are still out there, and I have to sing with a new mic. But whatever happens, I'll enjoy it while it lasts.\"\n\t\t\t\t*if (talk_azure \u003c 2)\n\t\t\t\t\t*goto talk_azure\n\t\t\t\t*goto sleep \n\t\t\t\t\n\t\t\t\t*label intelligence_azure \n\t\t\t\t*set intelligence_azure true \n\t\t\t\t*set hotel +1 \n\t\t\t\t*if (hotel > 1)\n\t\t\t\t\t*set intelligence_azure_last true \n\t\t\t\t*set intelligence +2\n\t\t\t\t*set charisma +1\n\t\t\t\t*set chill +1\n\t\t\t\t*set azure +1 \n\t\t\t\t*set talk_azure +1\n\t\t\t\t(+2 Intelligence, +1 Charisma, +1 Chill, Azure Approves)\n\t\t\t\t*line_break \n\t\t\t\tYou remember Azure talking about spoiling her pets with her signing money, and ask her about them. Her face positively glows at their mention. She immediately produces a collection of polaroid photographs of them from her purse. \"I miss them so much,\" she says, her eyes suddenly misty. \"That's Bonkers, and that's Alfred, my leopard geckos.\"\n\n\t\t\t\tShe shows you two lizards on a mossy branch in their enclosure. Their scales are white with black dots, and they have thick tails ending in thin points. Bonkers appears to be grinning absentmindedly while Alfred hangs from the side of the branch, his giant pink tongue sticking out of the side of his mouth. \n\t\t\t\t\n\t\t\t\tAzure flips through the pictures with you, giggling as she tells you funny stories about them and points out their unique characteristics. She shows you how Alfred has a cluster of orange scales on the underside of his tail. He's apparently an escape artist who likes to scale walls with his suction pads.\n\n\t\t\t\tShe shows you pictures of her laughing with Bonkers climbing up her arm with his tongue sticking out as far as it will go. He is missing one rear left toe, a deformation he was born with. \"I wish you could feel how amazingly soft their scales are,\" she says. \"You definitely need to meet them soon. They are chillness embodied.\" \n\t\t\t\t\n\t\t\t\t\"I would love to meet them sometime,\" you say, grinning. \"Maybe I can hold them or at least feed them some crickets.\"\n\t\t\t\t\n\t\t\t\tAzure puts her polaroids away with a sigh full of longing, but gives you an appreciative smile. She thanks you for asking about her lizards and becomes bright and cheerful again when she remembers to tell you about their new and improved habitat filled with branches to climb on, rocks to sunbathe on, and plenty of caves to hide in.\n\t\t\t\t*if (talk_azure \u003c 2)\n\t\t\t\t\t*goto talk_azure\n\t\t\t\t*goto sleep \n\t\t\t\t\n\t\t\t\t*label deception_azure\n\t\t\t\t*set deception_azure true\n\t\t\t\t*set hote
