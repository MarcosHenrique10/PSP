<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meteoric — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "meteoric", "title": "Meteoric", "scenes": {"chapter1meteorite": "[b]Chapter One of Eight: The Meteorite[/b] \n\n*comment image title.jpg\n\nDon’t you ever laugh as the hearse goes by\n*line_break \nFor you may be the next one to die\n*line_break \nThey wrap you up in big white sheets\n*line_break \nAnd cover you from head to feet\n*line_break \nThey put you in a big black box\n*line_break \nAnd cover you with dirt and rocks\n*line_break \nAll goes well for about a week\n*line_break \nUntil your coffin begins to leak\n*line_break \nThe worms crawl in, the worms crawl out\n*line_break \nThe worms play pinochle on your spout\n*line_break \nThey eat your eyes, they eat your nose\n*line_break \nThey eat the jelly between your toes\n*line_break \nA big green worm with rolling eyes\n*line_break \nCrawls in your stomach and out your sides\n*line_break \nYour stomach turns a slimy green\n*line_break \nAnd pus pours out like whipping cream\n*line_break \nYou’ll spread it on a slice of bread\n*line_break\nThat’s what you eat when you are dead\n*line_break\nSo don't you ever laugh when the hearse goes by \n*line_break \nOr you just may be the next one to die \n\n- The Hearse Song, a World War One classic\n\n- For Ozzy\n\n*page_break \n\nYou walk carefully to your car, huddling inside your jacket against the cold. A gust of wind stings your cheeks and brings water to your eyes, and you have to squint against the advancing wall of mist. You nearly flinch when the streetlights turn on with a dull [i]click[/i]. \n\nThe tall, black lamps bathe the sidewalk in their harsh artificial glow, creating a yellow haze as thick droplets of fog hang in the air. You tread carefully across the slick sidewalk, avoiding the cracked cement pushed up by large, gnarly tree roots. It's not the inclement weather or the hazardous sidewalks that are making you nervous. \n\nYou finally reach your old black sedan, glumly eyeing the increasingly large patches of rust on its front bumper as you dig into your pocket for your keys. The familiar sharp odor of oil assaults your nostrils, and you can't help but notice a trickle of oil running from under your engine and past your front tire. Light reflects off the liquid, making it shimmer with muted hues of red and purple. Wonderful. And, unfortunately, old news. \n\nThe hinges on your car door groan in protest as you pull it open. You're shivering as you climb inside, and you fumble a bit to get the keys into the ignition with numb, slippery fingers. Something bright in the rear view mirror catches your attention. You squint at the crooked mirror, and it fogs up from your misty breath as you adjust it. \n\nWith a sigh, you reach out and wipe the mirror with the sleeve of your jacket. In the distance, a vehicle swiftly approaches, its headlights glaring brightly through the thick blanket of fog. Taking a deep breath, you turn on your lights and put the car in drive, letting it roll smoothly into the quiet street. The oncoming car vanishes from view as it dips below one of the many hills in your neighborhood. \n\n*page_break \n\nYou feel a strange sense of urgency that doesn't just have to do with you running late for work. Wanting to put more distance between you and that car without fully knowing why, you press firmly on the gas pedal, narrowing your eyes with concentration as you accelerate. The slender road is covered in hairline cracks from years of neglect and temperamental weather. The road is made even narrower by the long rows of cars clinging to the curbs on either side. \n\nTapping the steering wheel absentmindedly, you flip through the radio stations looking for some decent music to distract yourself with. The sharp static that bursts from your speakers is definitely distracting. You quickly turn it off. The car from before appears in your rear view mirror again, drawing nearer by the second with a confidence that unsettles you.\n\nYour eyes flick to the faded speed limit sign on side of the road as it rushes by. 35MPH. Technically you're going two over, but you're going to be late for work, and the vehicle that was blocks behind you a minute ago is approaching rapidly. There's only one lane going each direction, and during late evening rush hour, the majority of traffic is going in the opposite direction of you as more sane or fortunate workers go home. \n\nFlickering red digits glow on your radio, revealing that you've only got a few minutes to get to work. The pit of anxiety nibbling at your stomach grows larger. One more infraction at your job means you'll be fired for certain, and being late counts. In this cruel world, that means your prospects look very bleak. \n\nJust as this grim thought occurs to you, the police sirens turn on, flashing hazy shades of red and yellow. Your tires skid as you take a sharp corner, and you tear your attention away from the cop and back to the road ahead of you just in time to see the roundabout. \n\n*page_break \n\nYour heart leaps into your throat, but your reflexes are quick, and you ease your foot onto the brakes while taking the corner as gracefully as you can. Your poor old sedan struggles to keep up with your maneuvering, sputtering and vibrating ominously. Oil fumes reach your nostrils through the air conditioning vents, stinging your nose and making you gag. \n\nGripping the steering wheel hard, taking in deep breaths, you stare ahead, trying to assess the situation. Somehow, you navigated that roundabout unharmed, but the cop is rounding the corner now. Nervously, you pull over onto the side of the road as he tailgates you, his siren squawking abrasively. What is he pulling you over for? He was driving faster than you were.\n\nThe road suddenly feels a bit lonely even as cars whiz by every few seconds on the left side. You hardly have any time to gather your thoughts, much less your license and registration, before the officer is throwing his door open. Cold sweat springs to your palms as you fumble with the glove compartment. It springs open after a bit of resistance, and a folder spills out onto the floor. \n\nYou snatch the scattered documents off the floor, quickly locating your insurance in the dull overhead light. You experience a split second of panic followed by a self-deprecating chuckle when you can't find your driver's license, but then remember that it's safely tucked away in your wallet as always. \n\nA tall figure climbs out of the police car and confidently strides towards your window. Lengthy strides carry him to your window in seconds, and he raps sharply on the glass, making you flinch involuntarily. Slowly, you crank the window lever and roll the window down a few inches, just enough to see the officer's face. He shines a flashlight into your face, blinding you. \"Good evening. My name's Azam. What's your name?\"\n\nShielding your eyes with your hand, you manage to stammer out a reply. What is your name?\n*fake_choice \n\t#Crimson\n\t\t*set name \"Crimson\"\n\t\t\n\t#Yaler \n\t\t*set name \"Yaler\"\n\t\t\n\t#Varbara \n\t\t*set name \"Varbara\"\n\t\t\n\t#Actually, you're named something else. \n\t\tWhat is your name? \n\t\t*input_text name \n\t\t\nYour eyes are beginning to adjust to the glaring light, and details of the officer slowly take shape. You're mildly surprised to see that he's younger than you are, hardly older than nineteen or twenty. Patchy golden fuzz protrudes from a thin jawline, and the uniform cap on his head and his stern expression don't fully conceal his boyish features. \n\nThe officer clears his throat and holds out a palm through the gap in your window. You recoil slightly from his hand, blinking hard. \"License and registration, uh--\" He pauses, clumsily withdraws his hand through the gap, and then peaks at you through the window questioningly. \n\nYou wonder passingly if this is his first traffic stop, routine or otherwise. He's certainly eager enough. \n*fake_choice \n\t#\"Sir,\" you say. \n\t\t*set male true \n\t\tThe officer nods stiffly and offers his hand outside of the window this time. \"License and registration, sir.\"\n\t\t\n\t#\"Ma'am,\" you say. \n\t\t*set female true \n\t\t*set boy \"girl\"\n\t\t*set him \"her\"\n\t\t*set his \"her\"\n\t\t*set son \"daughter\"\n\t\t*set he \"she\"\n\t\t*set hisplural \"hers\"\n\t\t*set boyfriend \"girlfriend\"\n\t\tThe officer smiles stiffly and offers his hand outside of the window this time. \"License and registration, ma'am.\"\n\t\t\n\t#\"Please?\" you supply helpfully. (Non-binary)\n\t\t*set nonbinary true \n\t\t*set is \"are\"\n\t\t*set boy \"child\"\n\t\t*set him \"them\"\n\t\t*set his \"their\"\n\t\t*set hisplural \"theirs\"\n\t\t*set son \"child\"\n\t\t*set boyfriend \"partner\"\n\t\t*set is \"are\"\n\t\tThe officer's bushy eyebrows go up slightly, and he eyes you closely for a few seconds. You feel your heart-rate quickening. He doesn't have much of a sense of humor. He finally nods, grunts, and mutters, \"License and registration, please.\"\n\t\t\nYou crank down the window a few more inches and pass your license and insurance to the officer. A shiny name tag is pinned to the front of his uniform. [b]Feter[/b]. You don't know if it makes you more comfortable or uncomfortable that he gave you his first name. As he studies your documents, heavy fog swirls around him and thick droplets collect on the brim of his hat. You clear your throat. \"Can I ask what I'm being pulled over for?\"\n\nFeter's teeth are chattering now, and he frowns at you as if you're responsible for the inclement weather. \"Your license plate was improperly displayed. Stay in the car while I run these through the system.\"\n\nYou furrow your brow in confusion as the officer stalks away and disappears from view. Small droplets of rain patter sharply against your windshield. Cars continue to pass by every few seconds, buffeting your old sedan with wind and making it shift slightly. Sighing in exasperation, you pull your phone from your pocket, quickly sending a text to your manager, Effie, that you're going to be very late for getting pulled over. \n\nAlmost instantly, Effie replies with an angry emoji. You know it's bad when she uses emojis because she never uses profanity. You grimace and slide your phone back into your pocket. At least you have a good excuse. Warning symbols illuminate the dashboard like holiday lights, reminding you of the mountain of mechanical issues your car suffers from, and the thousands of credits it would take to fix them. \n\n*page_break \n\nNow that your car is stationary, its issues are even harder to ignore. It hums and rumbles constantly, like a restless child having a fever dream. This vehicle may be a money pit, but it's still technically legal, and you were driving safely until you had to dodge that roundabout because that cop distracted you. So what is this about an improperly displayed license plate? \n\nYou bounce your legs restlessly, looking anxiously in the rear view mirror. You blink hard when you see that the officer is walking briskly back to your window, brushing the wet blonde hair off his forehead. He arrives at your window and hands you your documents, which you're pleasantly surprised to see have been kept rather dry. \"All clear. It's just something we have to check. Now, let me show you why I'm going to have to write you a ticket.\"\n\nA bundle of anxiety and indignation forms in your stomach. This is perfect. You have no idea what you did wrong, and you might be getting a ticket on your way to getting fired from your job. Feter motions for you to get out of the vehicle, smiling wryly as he moves towards the rear of your sedan. You start to open the door, hesitate, and then push it open with a shake of your head. What choice do you have? \n\nCarefully stepping out onto the slick road, you follow the officer to the rear of your vehicle. He squints at you with a smug sort of expression on his face, pointing at your license plate. Puzzled, you see that it's hanging off the bumper from one corner. One of the screws must have fallen off. The license plate is covered in scrapes, and there are even some burn marks that must have happened when you were on the highway. \n\nThe blanket of cold fog hovers around your vehicles, and their headlights create bright beams of yellow light. Officer Feter clears his throat. \"It's hard to read a license plate when it's hanging off like that. How long has it been that way?\"\n\n*page_break \n\nYou note the baton, pepper spray, handcuffs, and holstered gun on the officer's hips as he adjusts his  duty belt with a grunt. It's becoming clear to you that the screw on your license plate must have come loose on the highway earlier today, and you never noticed until now. Feter reaches into a pocket on his chest, taking out a notepad and a pen. That's definitely a blank ticket. \n\nHe clicks his pen several times and then begins to write on the ticket. You suddenly feel uncomfortably hot inside your jacket despite the cold air biting at your ears and the droplets of water trickling down your forehead. You can't afford to be late to work, and you definitely can't afford a ticket. Finally, you manage to make yourself speak. \"Sir, that was just an accident. Do you have to give me a ticket?\" \n\nThe officer looks up briefly to give you a skeptical look but then returns to his notepad. Sweat trickles down your back, and tiny beads of rain cling to your eyelashes, blurring your vision. \"I have more screws in my glove box,\" you add helpfully. \n\nFeter gives you an apologetic shrug. \"Sorry, I'm just doing my job.\" He finishes writing the ticket, tears it off the notepad with practiced motions, and hands it to you. \"Have a good rest of your night and be careful out there.\"\n\nHe gives you a stiff wave, pivots, and paces off towards his cruiser, clearly eager to get out of the heavy fog. You peer down at the ticket and wince when you see the fine: 70 credits. That's nearly a day's worth of work. Feter is opening the door to his vehicle. If he leaves now, your already sad bank account will soon become negative. \n*choice \n\t#Stubbornly insist that you haven't broken the law and shouldn't get a ticket\n\t\t*goto tough_cop\n\t\t\n\t#Try to persuade him to forgive you and forget the ticket\n\t\t*goto charisma_cop \n\t\t\n\t#Politely remind the officer that he broke some laws himself, and tickets can always be contested \n\t\t*goto intelligence_cop \n\t\n\t#Take the ticket: cops make you nervous, and you're already late for work\n\t\t*goto deception_cop \n\t\t\n\t\t*label tough_cop \n\t\t*set tough_cop true \n\t\t*set tough +2 \n\t\t*set intimidating +1\n\t\t*set intelligence +1 \n\t\t*set ticket true \n\t\t(+2 Tough, +1 Intelligence, +1 Intimidating)\n\t\t*line_break \n\t\tYou suddenly feel angry at this whole situation. Your ears and nose are frozen, cold water is dripping into your eyes, and you're clutching an expensive ticket, for what? You raise the ticket high enough for the officer to see. \"Excuse me. This has to be a mistake,\" you say firmly. \n\t\t\n\t\tFeter pauses and then shuts his door, walking back over to you with a stiff sort of saunter. A gust of wind sends a fresh wave of fog spraying into your face, and the minuscule droplets sting your eyes. \"Your license plate was improperly displayed. In fact, it still is. You'll need to secure it before driving again.\"\n\t\t\n\t\tYour face burns with indignation, and you suddenly feel grateful for the soothing cold air swirling against your forehead. \"A screw fell off,\" you state bluntly. \"My license plate wasn't in the back window or blocked by a clouded cover or anything like that.\"\n\t\t\n\t\tThe officer scowls at you, his bushy eyebrows nearly coming together in the middle to form a uni brow. \"Are you on anything? You seem highly argumentative over something that seems pretty clear to me.\" He must not like your incredulous expression, because his hand starts to gravitate towards his duty belt. \"I can get my breathalyzer out, you know.\"\n\t\t\n\t\tYou decide that arguing with this zealot cop has much bigger stakes than a traffic ticket. You're obviously not drunk, but you really don't need to be detained right now. \"No, I'm not on anything,\" you mutter through gritted teeth. \"I'll take the ticket.\"\n\t\t\n\t\t*page_break \n\t\t\n\t\tYou don't tell him that you're probably going to plead \"not guilty\" to this bogus charge rather than being a pushover and eating the fine. The officer gets into his cruiser, slams the door, and quickly drives off down the road. Crumpling the ticket into a ball, you stuff it into your pocket and get back into your car. \n\t\t\n\t\tYou lean back against the headrest, your heavy breaths crystallizing in front of you. Your heart is pounding against your chest, and the tips of your fingers are buzzing with adrenaline. You wanted to tell that overzealous cop what you really thought, but that'd be asking for him to use something other than a breathalyzer on you. \n\t\t\n\t\tWell, it looks like you're probably going to have to pay this outrageous fine later, but at least now you might be able to make it to work and still have an iota of a chance of not getting fired. Plus, you have to admit, it felt good sticking up for yourself even when you knew you were the underdog. Taking another deep breath, you put the car in drive and hit the pedal hard, but not too hard. \n\t\t*goto drive_work \n\t\t\n\t\t*label charisma_cop \n\t\t*set charisma_cop true \n\t\t*set charisma +2 \n\t\t*set chill +1 \n\t\t*set deception +1 \n\t\t(+2 Charisma, +1 Deception, +1 Chill)\n\t\t*line_break\n\t\tIf there's one thing any stickler loves, it's being appreciated for being a stickler, and this cop is a stickler if you've ever seen one. Raising the ticket for him to see, you smile and say, \"Oh, what do I do with this again? I've never gotten a ticket before.\"\n\t\t\n\t\tFeter pauses with his door halfway open and one leg already in the car. He gives you a sort of tolerant yet sarcastic smile, shuts the door, and saunters back over to you. Pointing down at some instructions at the bottom of the ticket, he says, \"You just go to the courthouse there and pay the clerk.\"\n\t\t\n\t\tYou give him your best friendly smile despite your cheeks aching from the cold. A fresh gust of wind sprays fog into your face, and the officer chuckles sympathetically at your expression. You're glad he thinks this is funny. Thinking hard, you gesture at a faded bumper sticker on his cruiser. \"Cool sticker. My uncles all have similar ones.\"\n\t\t\n\t\tHe glances over, smiling widely at the \"cover our cops\" sticker. Tucking his fingers under his bullet proof vest, he puffs out his chest importantly. \"Loud and proud here, even before I joined the force.\" He eyes you curiously. \"Sounds like you have some good uncles.\"\n\t\t\n\t\tYou try to keep your teeth from chattering as you offer him another placating smile. \"They taught me to have a lot of respect for law enforcement,\" you say. Your eyes are rolling out of your head internally, but Feter's expression is becoming more and more agreeable. You don't have any uncles, that you know of. \"They always gave questionable advice, though. Frank was the one who told me to screw my license plates on.\"\n\n\t\t*page_break \n\t\t\n\t\tOfficer Feter throws his head back and lets out a great belly laugh. You're so taken aback that you almost forget to laugh along with him.  Still chortling, he pats you on the shoulder in a friendly way, though the gesture stings your cold body. \"They're old-school,\" he explains sagely. \"If you don't want your license plates falling off, you go with magnets.\"\n\t\t\n\t\t\"Oh, thanks!\" you say a lot more cheerily than you feel. It's beginning to look like you might get away with this after all, but you're shivering hard from the cold, and the clock is ticking. You clear your throat politely and turn to leave, trying to keep your nerves as you say casually, \"Well, goodnight officer.\"\n\t\t\n\t\tHe makes a little noise as though surprised. Head cuddled down against the wall of gray mist, you carefully walk to the front of your car, purposefully taking a long time to rummage the keys out of your pocket. Just as you're getting into your front seat, and your spirits are dipping, Feter calls out, \"Hold on a moment.\"\n\t\t\n\t\tFeter jogs over to you, reaching up to steady his hat as it starts to slide off the back of his head. Almost looking sheepish, he gently plucks the ticket from your hand and proceeds to rip it into pieces. He gives you a conspiratorial wink and a parting salute, pivots, and then vanishes off into the darkness. \n\t\t\n\t\tOnly after the officer has gotten into his car and driven away do you allow yourself to pump your fist into the air and shout in celebration. Now, if only you could pull that sort of magic trick on your manager. You're going to be really late. \n\t\t*goto drive_work \n\t\t\n\t\t*label intelligence_cop \n\t\t*set intelligence_cop true \n\t\t*set intelligence +2 \n\t\t*set tough +1 \n\t\t*set rebellious +1 \n\t\t(+2 Intelligence, +1 Tough, +1 Rebellious)\n\t\t*line_break \n\t\tYou take a deep breath, trying to settle your nerves. You don't have much time, but you need to be delicate. Raising your hand to catch his attention, you say, \"Excuse me, officer. You have your brights on. I could hardly see anything when you were coming up behind me.\"\n\t\t\n\t\tOfficer Feter pauses halfway inside his vehicle, and pulls himself up by one arm to look at you. \"There's fog everywhere. Obviously I'm going to have my brights on.\"\n\t\t\n\t\tIt's your turn to wear a wry smile. You speak carefully, but add the hint of condescension that he deserves. \"Brights are for heavy rain, sir. Bright lights in fog reduces your visibility ahead by reflecting light back at you, and it makes it hard for the drivers ahead of you to see with the light shining in their rear view mirrors.\"\n\t\t\n\t\tFeter's face has turned bright red, and you don't think it's because of the cold weather. Getting out of his vehicle fully, he reaches inside, dimming his front lights with a sheepish expression. While you have the momentum, you decide to press it home. \"Also, I just want to double check, sir. The speed limit is 35MPH, right? I've seen lots of people speed through here and not see the roundabout until it's too late.\"\n\t\t\n\t\t*page_break \n\t\t\n\t\tWhen the officer straightens out to look at you, his expression isn't sheepish anymore. His lips are down-turned with chagrin, and his eyes are narrowed with skepticism. He suspects you're messing with him. But that also means he knows you're right. As he slowly walks back over to you, a heavy gust of wind cuts through your jacket, making you shiver uncontrollably. \n\t\t\n\t\tFeter stops in front of you, staring at you for several seconds with a mysterious expression on his youthful face. His eyes are watery and the tip of his nose is bright red from the cold. Up this close, you can smell his pungent body odor masked poorly with deodorant spray. Not knowing what else to do, you meet his gaze stubbornly. To your surprise, he breaks out into a wide grin. \"You know what?\" he says, suddenly adopting a cheerful tone. \"I'm feeling generous today, so you can forget about the ticket.\" \n\t\t\n\t\tHe promptly plucks the ticket from between your fingers and crumples it into a ball in his palms. Still wearing that ironic smile, he paces to his car, climbs inside, and gives you a parting wave. \"By the way, thanks for the reminder about the lights. Be safe out there.\"\n\t\t\n\t\tIn seconds, the cop is gone, his rear view lights quickly disappearing in the gloom. Only when you're certain you're alone again do you jump back into your car, laughing and pumping your fists with elation. \"Did I seriously just haggle a cop?\" you laugh again. \n\t\t\n\t\tYour spirits drop when you turn on your car and note the time flickering on the radio. You may have successfully avoided the troll guarding the bridge, but you're still probably going to get fired.\n\t\t*goto drive_work \n\t\t\n\t\t*label deception_cop \n\t\t*set deception_cop true \n\t\t*set deception +2 \n\t\t*set tough +1 \n\t\t*set mysterious +1 \n\t\t*set ticket true \n\t\t(+2 Deception, +1 Tough, +1 Mysterious)\n\t\t*line_break \n\t\tWith a sour expression on your face, you fold the ticket up and slip it into your pocket. Feter shuts his car door, and you're alone again. Teeth chattering from the chill, you trudge back to your car and get inside. You turn the heat to maximum, and are blasted with cold air that reeks of oil. Grimacing, you lean back in your seat, covering your nose as you wait. \n\t\t\n\t\tThis whole situation leaves you with a bitter taste in your mouth. Your clothes are wet and itchy from the sea of fog, you're now 70 credits less rich than you were a few minutes ago, and you're still going to be late for work. Gradually, the cold air blowing from the vents becomes lukewarm, and the fog on the windshield slowly recedes. Yet as you're preparing to leave, something makes you hesitate. \n\t\t\n\t\tLooking into your rear view mirror, you see the officer's car still idling. You narrow your eyes, trying to get a better look at Feter through the haze of fog and the unhealthy looking smoke coming from your car's exhaust. Slowly, he comes into focus. He has one hand resting on the center of the steering wheel, and he's staring directly at you. The steering wheel creaks as your grip tightens around it. This is great. Is he really going to watch you until you leave? \n\t\t\n\t\tYour eyes flick to the grainy red radio clock. You're late, but not dreadfully late yet. Then you find yourself shaking your head and laughing at yourself dryly. Why are you so paranoid? You didn't do anything wrong to the contrary of that stupid ticket. You take a deep breath and close your eyes. When you open them again, you find that the officer is still staring at you. Your car finally starts pushing out hot air, but that doesn't stop a shiver from traveling up your spine.\n\t\t\n\t\t*page_break \n\t\t\n\t\tWith a disdainful sigh, you  try to push Feter from your mind. Flipping onto a radio station at random, you put the car into drive and cautiously merge back into the road. You ease forward slowly at first, but then gradually accelerate as the police cruiser grows smaller in your rear view mirror. \n\t\t\n\t\tYour fingers flex on the steering wheel. Your foot feels restless on the gas pedal, itching to press down harder. A part of you wants to speed out of here to make up for all the time that overzealous pirate wasted, but you know that's what he's begging for you to do. \n\t\t\n\t\tWith another heavy sigh, you engage the cruise control to keep the car at legal speeds. The radio clock jumps forward another minute, making the knot of anxiety in your stomach tighten. Still, you got out of his clutches as soon as you possibly could have. Maybe you won't get fired after all. \n\t\t*goto drive_work \n\t\t\n*label drive_work\n*page_break \n\nYou're just a few miles away from the grocery store where you work. Cold sweat springs to your palms and your stomach aches with anxiety when you think about the manager, Effie. She may fool customers with her maternal appearance and sanguine attitude, but you know firsthand that she takes particular pleasure in bullying her underlings at every possible opportunity. \n\nThe worst part is that she seems to have some sort of crush on you despite being twice your age. At least, she used to. A few weeks ago when she was very heavy handed with her flirting, you had to turn her down. Ever since then, she has been abnormally cold and spiteful towards you. You get the sense that she has been itching for a reason to fire you. Well, this is the perfect opportunity. \n\nYou run a hand through your hair, letting out another heavy sigh. The awkwardness with Effie gets you thinking about your social life. It has been difficult to have much of one with a car that may make it to point A but may or may not make it to point B, and a job that takes up all of your free time and doesn't particularly pay the bills. Still, that doesn't mean you don't need human connection like anyone else.  \n*choice \n\t#You want to find a boyfriend \n\t\t*goto attracted_men \n\t\t\n\t#You want to find a girlfriend\n\t\t*goto attracted_women \n\t\t\n\t#You want to find a girlfriend or boyfriend\n\t\t*goto attracted_both \n\t\t\n\t#You're not interested in romance, but you want to make more friends\n\t\t*goto not_attracted \n\t\t\n\t\t*label attracted_men\n\t\t*set attracted_males true \n\t\tYou haven't had a boyfriend in almost a year, and it's beginning to get lonely. \n\t\t*label very_elusive \n\t\tSometimes you think you should wait for the right time to seek out a partner, but so far it has been very elusive. Is everyone's life as chaotic as yours or will you just end up embarrassing yourself if you put yourself out there? \n\t\t*goto effie \n\t\t\n\t\t*label attracted_women \n\t\t*set attracted_females true \n\t\tYou haven't had a girlfriend in almost a year, and it's starting to get lonely. \n\t\t*goto very_elusive \n\t\t\n\t\t*label attracted_both \n\t\t*set attracted_both true \n\t\t*set attracted_females true \n\t\t*set attracted_males true \n\t\tYou haven't had a boyfriend or girlfriend in almost a year, and the loneliness is getting harder to ignore. \n\t\t*goto very_elusive \n\t\t\n\t\t*label not_attracted  \n\t\t*set not_attracted true \n\t\tWith all your obligations, the friends you do have became distant a long time ago, and you have struggled to make new friends. Somehow, you need to make a change. You chuckle wryly, reflecting that getting fired from your job could open all sorts of opportunities. \n\t\t*goto effie \n\t\t\n*label effie \n\nYou're so lost in thought that you don't realize you're at work until you're pulling into the parking lot. A large neon sign displays the grocery store's name, Cost Slicer, in muted red and blue hues that combine to create an indigo sheen in the fog. Your spirits sink as you see the state of the lot.\n\nEvidently it was a busy evening, because dozens of grocery carts are crammed against the corrals, left leaning against light poles, or just left in the middle of the lanes. Your cheeks grow hot with indignation and your stomach lurches with anxiety. Just why, people? Effie is going to skin you alive, and only after making you push all those carts back. \n\nYour only hope is that she's busy lounging in her office or making small talk with customers, which seem to make up the extent of her duties aside from terrorizing employees. If you can just have fifteen minutes out here, you might be able to push most of these carts back to the garage before she ever notices.\n\nThere aren't very many customers about now, but the ones carrying their groceries to their cars glare at you as you drive by, as if somehow aware that you're the cart pusher. You park your car by the rear entrance and quickly sneak towards the door. You just have to clock in without being seen. Your time card will incriminate you later, but the crisis at this moment is those carts. \n\n*page_break \n\nThe rectangular, white grocery store that you have worked at for several years looks modest enshrouded with fog, but reveals its drabness as you get closer. The curb by the door has all but crumbled away, revealing the rusted metal skeleton underneath, and the white paint on the brick walls looks almost gray from years of cigarette smoke damage. \n\nYou're nearly to the door when the sound of heavy breathing and the squeaking of cart wheels grabs your attention. Your spirits sink as a short, squat figure in an awful, frilly pink cardigan with large brass button and brown skirt emerges from the haze of yellow mist created by the harsh street lights. \n\nEffie is visibly struggling as she pushes two mini carts. Your manager's short curly hair is damp with sweat, and she's gasping for breath as she trundles closer. As her dark eyes settle on you, realization dawns on her face, and she throws up her hands with an outraged look on her face. \"Well, look who finally shows up!\" \n\nWaddling aggressively around the carts, she advances on you, one fist planted firmly on her hip and the other wagging a finger at you scoldingly. \"Let me guess, you slept in again. Or was it forgetting your schedule again? I always forget which excuse it is.\"\n\nYou never said those things, but Effie doesn't care about trivialities. Still, if there's any chance you can still salvage your job, you have to try. She wears her signature sneer and taps her foot maddeningly. Choosing your words carefully, you say, \"I was pulled over because my license plate lost a screw.\"\n\n*page_break \n\nBefore you can get another word in, Effie lets out a shrill, spiteful laugh and wags her finger at you. Her nails are several inches long and painted a different color each week. This time, they're acid green, which matches the venom in her tone. \"I don't care. I've had enough with you and your crazy excuses. You're fired, effective immediately.\"\n\t\t\n*if (tough_cop)\n\tFrowning defiantly at her, you reach into your pocket, producing the crumpled up ticket. She stares at you with a flummoxed expression, so you impatiently unroll the paper and show it to her. \"Are you ever going to listen to me?\"\n\t\n\tShe snorts derisively. \"So you're telling the truth for once. All you do is make mistakes. You're still fired.\"\n*if (charisma_cop)\n\tYou blink in surprise. A placating smile quickly forms on your lips even as you feel like you've been punched in the gut. \"I didn't get a ticket because I got the officer to laugh. That's how I still got here so quickly after I texted you.\"\n\t\n\tEffie simpers at you mockingly, a gesture that almost brings vomit to your throat. \"Yes, you always were so charming. To everyone but me. You're still fired for being late one too many times.\"\n*if (intelligence_cop)\n\tYour brow furrows in frustration. Now you wish you had that ticket as evidence. Mind spinning, you can only think to say, \"I convinced the officer that it was just an accident, and he let me go without a ticket, which is how I got here so quickly.\"\n\t\n\tEffie snorts again, one of her favorite ways of showing contempt for her lessers. \"A very convenient story. Even if it were true, I would still fire you for being late.\"\n*if (deception_cop)\n\tStaring back at her stubbornly, you reach into your pocket and take out the ticket, holding it out for her. \"I thought you would say that.\"\n\t\n\tShe squints down at it suspiciously, then chortles, shaking her head. \"Not my fault. Being honest now won't help you. You're still fired.\"\n\t\nWith a triumphant look on her face, Effie turns and marches towards the rear entrance, leaving you standing there taken aback. Just like that, you're out of a job you held for several years. She grabs the door and wrenches it open but then turns to look at you. \"Go on. I can see from that sneer on your lips that you have something to say.\"\t\n\nEffie wears a perpetual sneer herself, so she sees it in everyone else. Clearly, she's not even allowing you to be fired gracefully. \n*choice \n\t#Get all the things you've wanted to say back to her all these years off your chest \n\t\t*goto tough_effie \n\t\t\n\t#Celebrate your new freedom to take her enjoyment out of firing you\n\t\t*goto charisma_effie \n\t\t\n\t#Reveal to her that you joined a union, and will be demanding a severance package\n\t\t*goto intelligence_effie \n\t\n\t#Let her win this one, then slice her tires before you leave\n\t\t*goto deception_effie \n\t\t\n\t\t*label tough_effie \n\t\t*set tough_effie true \n\t\t*set tough +2 \n\t\t*set intimidating +1 \n\t\t*set charisma +1 \n\t\t(+2 Tough, +1 Intimidating, +1 Charisma)\n\t\t*line_break \n\t\tEffie is so arrogant because she only torments those under her, but now that you're fired, you don't have to bite your tongue anymore. \"You're doing me a favor,\" you say bluntly, a hit of sarcasm in your tone. \"I was sick of watching you take naps in your office and then berate me after I've pushed carts all day.\"\n\t\t\n\t\tShe blinks several times, her face contorting in offense. As she opens her mouth to speak, you cut her off. \"You talked to your church friends for hours all day but then practically stalked me to make sure I didn't take one extra minute on my breaks. You're the laziest, pettiest person I ever met.\"\n\t\t\n\t\tThe smug look has vanished completely from your former manager's face. Her expression is stormy now, with her painted eyebrows pushed into a scowl and her chubby face beet-red. She splutters incomprehensibly for a few seconds before finally throwing up her hands with a wordless grunt and storming inside. \n\t\t\n\t\tYou burst into mocking laughter as the door slowly swings shut behind her, and you're pleased to see her retreating faster in chagrin. She probably never knew you had it in you because you had to take her abuse silently for all those years. \n\t\t\n\t\tAs the door clicks shut, you find that you're buzzing with adrenaline despite the satisfaction. Feeling agitated, you shove your hands in your jacket pockets and start to pace back and forth beneath the street light. Shutting Effie down was immensely satisfying, but you almost wish she had argued back so you could keep yelling at her. Exhaling deeply, you trudge back to your car.\n\t\t*goto walk_home \n\t\t\n\t\t*label charisma_effie \n\t\t*set charisma_effie true \n\t\t*set charisma +2 \n\t\t*set chill +1 \n\t\t*set intelligence +1 \n\t\t(+2 Charisma, +1 Chill, +1 Intelligence)\n\t\t*line_break\n\t\tYou break into a wide smile, suddenly feeling very light as you realize that you don't have to see Effie ever again. \"You know what?\" you say. \"Have fun pushing these carts back in yourself and bullying teenage employees or whatever else you plan on doing. I'm going to enjoy my newfound freedom.\"\n\t\t\n\t\tWith a wink and a wave, you pivot and walk to your car, unable to contain the bounce in your step. Not having a job is terrifying, but it's in the back of your mind. Right now, all you can think about is not having to push a hundred carts around in this weather. Effie's laughter is forced and spiteful. \"The freedom to live in your mother's basement, or like a hippie. You'll beg for this job back, and do you know what my answer will be?\"\n\t\t\n\t\tShe's not going to ruin your mood. Rolling your eyes, still smiling, you give her the middle finger without looking back. Effie gasps in horror, and a second later the door slams shut. You look back and see that she has vanished, and double over laughing. \n\t\t\n\t\tYou like to think that some of the employees will have seen this, and then things might change a little around here. Still, it's not your concern now. You take a deep breath and slowly exhale. The high of winning your verbal spar with Effie is quickly fading as you trudge to your car through the mist. \n\t\t*goto walk_home \n\t\t\n\t\t*label intelligence_effie \n\t\t*set intelligence_effie true \n\t\t*set intelligence +2 \n\t\t*set tough +1 \n\t\t*set rebellious +1\n\t\t(+2 Intelligence, +1 Rebellious, +1 Tough)\n\t\t*line_break \n\t\tYou meet her condescending gaze as stiffly as you can. \"You can expect a letter from my union requesting a severance package.\" You allow yourself a small smirk. \"[i]Requesting[/i] is the polite way of putting it.\"\n\t\t\n\t\tJoining a union, and the support and knowledge you gained from it, was one of the only ways you managed to survive this awful job so long. Effie curls her nose as though you had shoved rubbish under it. \n\t\t\n\t\t\"You believe in those things?\" she drawls. \"Any letter you send is going in the garbage.\" A nasty smile replaces her disgusted look. \"You'll have better luck with unemployment benefits. That's usually what people like you resort to.\"\n\t\t\n\t\tIronic, since unions were the ones who secured those benefits long ago. You expected this sort of response, but it still fills you with resentment. Shaking your head, you turn to leave, saying over your shoulder, \"Just so you know, I've documented your continual abuse of workplace conduct for months. This is the icing on the cake. Good luck.\"\n\t\t\n\t\tAs you shove your hands into your jacket pockets and pace towards your car, only silence meets your words. A second later, there's the familiar shriek of rusty hinges as the door swings shut. A tired smile returns to your face. You definitely need to contact your union soon. Tonight.\n\t\t*goto walk_home \n\t\t\n\t\t*label deception_effie  \n\t\t*set deception_effie true \n\t\t*set deception +2 \n\t\t*set rebellious +1 \n\t\t*set tough +1 \n\t\t(+2 Deception, +1 Rebellious, +1 Tough)\n\t\t*line_break \n\t\tYou stare back at Effie impassively. When she arches her badly painted on eyebrows and sneers even wider, you shrug and mutter, \"Whatever.\"\n\t\t\n\t\tEvidently this satisfies Effie's wicked heart, because she sniggers at you and turns to leave, saying over her shoulder, \"That's what I thought.\"\n\t\t\n\t\tYour heart is thudding against your chest and your stomach aches with disdain for your old manager, but you remain motionless until the door finally clicks shut. Spinning on your heels, you hurry towards the side of the store, hugging the deep shadows on the edges of the building.\n\t\t\n\t\tAround the corner, Effie's lime green compact sedan sits right underneath the streetlamp, like it's waiting for you under a spotlight. You half expect a chorus of angels to sing, beckoning you. Covered in countless beads of water, the car seems to glow dully in the flickering light. You quickly search your surroundings and then duck beside the car, slipping the pocket knife from your pocket. \n\t\t\n\t\tYou hold your breath and cringe hard against the car as a grocery cart passes by, but the sound quickly fades around the corner. Your fingers are stiff from the cold, and your breath comes out in white puffs. \n\t\t\n\t\tTaking a deep breath, you drive the blade into the car's two front tires, creating a faint chorus of hissing noises as air escapes the punctures. Unable to hide a satisfied grin, you slip your knife back into your pocket and casually walk back to your vehicle. \n\t\t*goto walk_home \n\n*label walk_home \n*page_break \n\nThe moment you arrive at your car, it's obvious something is wrong. Well, more wrong than usual. The pungent odor of oil hangs in the air, the cold and mist unable to mask it. You get down onto your knees and peer under the car to see oil steadily trickling out. \n\nYou picture the broken transmission and grimace. Resting your head against the side of your car, you let out a long groan of frustration. The cold metal cools your burning skin. You feel a brief urge to escape your flesh prison by melting into the car and accompanying it to the junkyard. That sounds easier than the alternative. You scowl at yourself and shake your head bitterly. It's probably not wise to let your intrusive thoughts run wild. \n\n...\n\nThe walk home is a lonely one. At this time of the evening, few cars pass by on the road, and most of the lights in the businesses and neighborhoods are long since out. Fortunately, the thick gray clouds overhead and the sea of fog from before have given way to a still, peaceful night. \n\nThe pitch black sky has hundreds of pale stars scattered across its expanse. A dull yellow moon lurks behind a few straggling clouds, adding to the light of the ancient streetlamps lining the sidewalk. You can't appreciate the sky's beauty for more than a second or two at a time because you have to walk cautiously on the slick, irregular cement.\n\nShivering hard, you struggle to grab your phone from your pocket with freezing hands. No messages aside from two angry emojis sent from Effie a minute after she sent you the first text. The battery is down to 9% and steadily dropping, and the connection is abnormally spotty despite the clear skies. You wonder if it's experiencing some kind of interference, although it would die before you got much use out if anyway.\n\n*page_break \n\nYou sigh for what seems like the hundredth time today. It will be at least another thirty minutes before you make it home. Your toes and fingers throb from the cold, and your muscles are stiff and sore. Your mind starts to wander back to Effie and your old job. \n\n*if (tough_effie)\n\tYou feel a fraction warmer as your heart rate accelerates, and you feel the need to walk faster. Everything that could have gone wrong today went wrong, but it's all almost worth it just to see the sneer wiped off Effie's arrogant, hateful face.\n*if (charisma_effie)\n\tYou chew on your bottom lip with a pensive look on your face. You newfound freedom doesn't feel worth celebrating anymore. Still, the memory of Effie storming off wordlessly when you gave her the middle finger makes you chuckle loudly. \n*if (intelligence_effie)\n\tDigging your phone out, you type an email to your union representative as quickly as you can with numb fingers. You explain the situation and say that you will call tomorrow to begin taking formal action to receive your rightful compensation from Cost Slicer for the wrongful termination.\n*if (deception_effie)\n\tA satisfied smirk crosses your lips, and your mood lightens at the thrilling memory. It was really stupid. You know there are no cameras in that neglected old parking lot, but Effie will suspect it was you for certain. Yet you know you would do it again. It was worth the risk.\n\t\nSomething bright in the sky just above you catches your attention. Slowing down, you look up to see a shooting star streaking across the sky, a thin yellow tail trailing behind it. It travels in a steep arc towards the horizon and then seems to explode before guttering out as quickly as it had appeared. \n\nYour stomach lurches into your throat as your foot slides across a patch of black ice, and you're suddenly flailing your arms desperately to stay upright. You manage to keep your balance, and glare at the muddy ice as you cautiously avoid it. This night couldn't end any sooner, yet you know there's not much to look forward to tomorrow. \n\nA heavy wind rolls through, rustling the tree branches above your head and showering you with heavy water droplets. The cold air slices through your jacket, making you groan. You need to distract yourself somehow. Fortunately, you remembered to grab something from your car before starting the miserable trek home: \n*choice \n\t#A flask of whiskey \n\t\t*goto tough_walk \n\t\t\n\t#A music player and pair of headphones\n\t\t*goto charisma_walk \n\t\t\n\t#A pocket-sized book with three short horror stories\n\t\t*goto intelligence_walk \n\t\t\n\t#A fanny pack with its secret stash of snacks in a hidden pocket\n\t\t*goto deception_walk  \n\t\t\n\t\t*label tough_walk \n\t\t*set tough_walk true \n\t\t*set tough +2 \n\t\t*set chill +1 \n\t\t*set charisma +1 \n\t\t(+2 Tough, +1 Charisma, +1 Chill)\n\t\t*line_break \n\t\tWith everything weighing on your mind, you had forgotten about your flask until now. You pull it out of your pocket, glancing around the area for any sign of more cops lurking about. That would be ironic but consistent for this night, you reflect with a heavy roll of your eyes. The last thing you need to top tonight off is a stay in jail for public intoxication.\n\t\t\n\t\tYou seem to be alone, so you unscrew the flask and take a healthy swig. Grimacing, you exhale sharply and put the flask away. Once the initial burning subsides, it's replaced with a smooth, warm sensation, and a sweet aftertaste. Almost immediately, you feel slightly warmer and more relaxed. \n\t\t\n\t\tYou take a deep breath until it makes your lungs ache, and then slowly exhale. The cold air feels good on your lungs. Dead leaves scattered across the sidewalk crackle under your feet, and their vibrant orange and yellow hues stand out in the dark. It's almost pleasant out here.  \n\t\t\n\t\tSliding your hand into your pocket, you take out your flask and take an even bigger swig this time. The alcohol burns your throat and nearly brings tears to your eyes, but its warmth travels rapidly through your body. The sweet vanilla taste lingers on your tongue, which tingles pleasantly.\n\t\t\n\t\tThe rustling of branches from somewhere off to your left makes you turn your head hard and hurriedly stow your flask away. A large white owl climbs effortlessly into the sky with soundless flaps of their giant wings. You shake your head, chuckling wryly to yourself at your own paranoia. \n\t\t*goto necrophone \n\t\t\n\t\t*label charisma_walk  \n\t\t*set charisma_walk true \n\t\t*set charisma +2 \n\t\t*set Intelligence +1 \n\t\t*set mysterious +1 \n\t\t(+2 Charisma, +1 Intelligence, +1 Mysterious)\n\t\t*line_break \n\t\tYou reach into your pocket, taking out your music player. The headphones are curled neatly around the player, but the cord is becoming frayed at the top. You carefully unwind the headphones and then slip them comfortably into your ears. Fortunately, your player still has plenty of battery life. \n\t\t\n\t\tYou click through to your most recent playlist and hit play. Immediately, the outside world seems to drift away as your current favorite song blasts in your ears. You have to be careful as you navigate slick foliage and patches of ice on the sidewalk, but you still find yourself dancing. \n\t\t\n\t\tSinging along to the lyrics under your breath, you tap your hands on your thighs and bob your head to the rhythms and melodies. By the time the next track plays, you've walked multiple blocks without even realizing it. Your heavy breaths come out in clouds of white mist, and a faint smile stays on your lips.\n\t\t\n\t\tStill bobbing your head, you take your attention away from the sidewalk to appreciate your surroundings. Along the stretch of grass that separates the woods and sidewalk, you notice several cotton tail rabbits milling around. They poke their heads up as you pass by, wiggling their noses at you and staring with anxious yet curious eyes. \n\t\t\n\t\tA piercing, yipping series of cries from somewhere behind you nearly makes you jump out of your skin. This results in you scrambling madly to maintain your balance on the slippery cement. By the time you finally manage to right yourself, you see a lone coyote jogging away lazily. With a great sigh, you take your headphones off and put them away.\n\t\t*goto necrophone \n\t\t\n\t\t*label intelligence_walk \n\t\t*set intelligence_walk true \n\t\t*set intelligence +2 \n\t\t*set mysterious +1 \n\t\t*set tough +1 \n\t\t(+2 Intelligence, +1 Mysterious, +1 Tough)\n\t\t*line_break \n\t\tReaching into your back pocket, you take out the tiny book, admiring it in the dull, flickering streetlights. It has a dark, vibrant cover depicting a terrified man being pushed into quicksand by hooded cultists. You open the book and begin to read, holding it close enough so that you can read while still being careful.\n\t\t\n\t\tThe story begins with a man going through his workday hungover and on extremely little sleep. You feel sympathetic yet amused as he somehow manages to fumble through the day. On his way home, the character is abducted by several hooded figures who throw sand into his eyes and then throw him into the back of their van. \n\t\t\n\t\tYou glance up to check your surroundings, and just in time. The whole right corner of the section of sidewalk right in front of you is jutting up, pushed by powerful tree roots. You slow down, frowning at the sidewalk as you cautiously walk around it in the grass, and then return to your book. \n\t\t\n\t\tAs the story progresses, the character holds onto slim hope for survival, as he managed to hide a nail he found in his pocket. He is ultimately dragged from the van into an old crypt that has been overgrown with plant life. He stabs a cultist with a nail, but is then thrown into a pit of quicksand to slowly die. \n\t\t\n\t\tThe cultists perform a dark ritual to transform the man into their zombie slave. To their horror, he returns as an intelligent, autonomous zombie and eats their leader alive. The remaining cultists flee for their lives, and the zombie is left to explore and reek havoc on the world. \n\t\t\n\t\tYou grunt and jerk back as a low hanging branch slaps you hard in the face. Cold, dirty water droplets rain down onto your head, and your face stings from several thin scratches. Groaning, you gingerly put your book back into your pocket and proceed cautiously. That story will be on your mind for a long time.  \n\t\t*goto necrophone  \n\t\t\n\t\t*label deception_walk \n\t\t*set deception_walk true \n\t\t*set deception +2 \n\t\t*set chill +1 \n\t\t*set charisma +1 \n\t\t(+2 Deception, +1 Charisma, +1 Chill)\n\t\t*line_break \n\t\tA triumphant smile crosses your lips as you reach down and unzip your black fanny pack. Effie was the one who prompted you to get it after she caught you hiding snacks in another fanny pack at work. This one has a hidden pocket that you never leave empty of snacks. \n\t\t\n\t\tRifling around inside, you find a mini bag of potato chips and a chocolate chip granola bar. Eagerly, you open the bag of chips and start to bring a chip to your mouth when you see that it's giant and green. You smile, turning it over slowly in the light to admire it. \n\t\t\n\t\tJust before you can toss it into your mouth, a burst of cold wind snatches it from your fingers and sends it tumbling into a puddle of mud. You roll your eyes and stuff a handful of chips into your mouth, glaring at the green chip as you navigate around the puddle. \n\t\t\n\t\tThe salty, oily chips are euphoric to your neglected taste buds, and your stomach starts growling before you have even finished chewing. You eat the chips one by one, savoring them by chewing some and letting others soften on your tongue. \n\t\t\n\t\tBy the time your bag of chips is empty, you have traveled multiple blocks without realizing it. You shiver, rubbing your arms as a heavy breeze sends twigs and sticks tumbling. You crumple the bag up and tuck it into your fanny pack. You'll be coming for that granola bar later. \n\t\t*goto necrophone \n\n*label necrophone \n*page_break \n\nYou're not far from home now. Fifteen minutes away and you'll be able to take a long, hot shower. A flash of orange light above your head draws your attention. You crane your head back, and your eyes go wide and your heart-beat races. Something is falling straight for you, some kind of smoldering, ovular object. \n\n*image meteorite.jpg \n\n[i]A meteorite[/i] you realize in astonishment. Then you're scrambling out of the way as fast as your legs will carry you, heading towards the cover of the woods. Your aching, freezing body refuses to respond properly to your commands, moving sluggishly as though you were trapped in a visceral nightmare. \n\nThe meteor slams into the ground behind you with a great [i]whump[/i]. Gritting your teeth, you dive to the ground and cover your head with your hands. Dust, clods of dirt, and even chunks of tree roots and sidewalk fly in all directions. Something sharp slices into your left arm, drawing blood, and the earthen debris rains down on you.\n\nSlowly, after several seconds have passed, you dare to lift your head. Everything is silent except for the rushing of your heart beat in your ears and the sound of you hyperventilating. With shaky arms, you push yourself to your hands and knees and turn around to face the meteorite. Your eyes go wide as the crater comes into view, but then the acrid smoke makes them burn. \n\nWincing, you shield your eyes with one hand and cautiously crawl forward to the edge of the crater. It's not as large as you thought, you realize. The smoking hole gouged in the earth is only about two feet in diameter. In its center is a black, smoldering rock. Or, the charred remains of what used to be a rock. \n\n*page_break\n \nSticking out from the meteorite is what appears to be a thin black handle. It glimmers at you, sparkling with tiny opalescent dots of purple, red, and blue. The metallic object seems entirely unharmed despite being in the center of a smoldering crater. You hurriedly look around in all directions, but you're alone. \n\nDigging a hand into your pocket, you yank out your phone to take a picture or call someone, but groan in dismay when you realize it's dead. You stuff your phone back into your pocket, pacing around the crater, trying to think of what to do. \n\nSuddenly the smoldering meteorite around the handle crumbles away completely, revealing the rest of the mysterious alien object. Unmistakably, a black, grimacing skull is dug face first into the earth. You would expect it to be molten or smashed to pieces, but this half too remains unblemished. \n\nYou swallow hard, and your dry throat stings so badly it makes you wince. What should you do? Can you touch it? Should you touch it? How dangerous is it? How much will you hate your life if you walk away from this and let someone else or the government claim discovery over it?\n\nYour racing thoughts are interrupted by a rumbling, guttural voice that unmistakably, undeniably emanates from the alien microphone. [b]\"Don't be afraid. I am Kanibor, and I'm here to save your miserable life. With your help, I'm going to get out of here. But first, I'm going to make you rich and famous with this microphone.\"[/b]\t\n\n*finish \n\n\n\t\t\n", "chapter2necrophone": "[b]Chapter Two of Eight: The Necrophone[/b]\n\nThis is real. This is actually happening. The monstrous voice coming from the microphone still rings in your ears. The mic seems to glow unnaturally in the smoldering rubble, playing hell with your imagination. Your heart is racing uncomfortably fast, and you realize you need to ground yourself quickly.\n\n*if (tough_walk) \n\tTaking out your flask, you take a giant gulp that burns your throat like fire. As the whiskey travels through you, your insides warm and some of the jitters diminish. \n*if (charisma_walk)\n\tReaching into your pocket, you run your fingers over your music player and are relieved to feel no damage. Unfortunately, one of your earbuds is broken and hanging apart. You suppose that was inevitable, and are only surprised it took this long. \n*if (intelligence_walk)\n\tReaching to your back pocket, you run your fingers over your book with a sigh of relief. You found it at a yard sale in your neighborhood and don't know if you would be able to find another copy considering the owner said they were out of print. \n*if (deception_walk)\n\tWithout even realizing it, you're unzipping your fanny pack and ripping open the wrapper on your granola bar. You inhale the crunchy, sweet snack in a few seconds, and this seems to ground you somehow. \nWhat do you do?\n*choice \n\t#Try to pick the mic up: no one else is taking this alien microphone\n\t\t*goto tough_necrophone \n\t\t\n\t#Ask the mic where he's from and how you can trust him\n\t\t*goto charisma_necrophone\n\t\t\n\t#Get closer to the mic to inspect it and take pictures with your disposable camera \n\t\t*goto intelligence_necrophone \n\t\t\n\t#Run home as fast as your legs will carry you\n\t\t*goto deception_necrophone \n\t\t\n\t\t*label tough_necrophone \n\t\t*set tough_necrophone true \n\t\t*set tough +2 \n\t\t*set rebellious +1 \n\t\t*set deception +1 \n\t\t*set kanibor +2\n\t\t(+2 Tough, +1 Rebellious, +1 Deception, Kanibor Approves)\n\t\t*line_break \n\t\tThe microphone's words echo in your head. [i][b]\"Don't be afraid.\"[/i][/b] \n\t\t\n\t\tYou realize your fingers are trembling and your breaths are coming out in rapid gasps. Clenching your hands into fists, you close your eyes and take slow, deep breaths. When you open your eyes, the mic is still there, grimacing at you. Those eyes seem so dead, yet somehow so alive. \n\t\t\n\t\tGaze fixated on the alien object, you carefully lower yourself into the crater, crouching and waddling awkwardly to avoid the smoking edges. Up close, the mic actually looks hauntingly beautiful. It's a glossy black metal that seems almost unblemished by the crash. With the flames of the meteorite dying, the mic's speckled surface winks eerily at you. \n\t\t\n\t\tCautiously, you reach out one hand, holding an open palm above the microphone. Astonishingly, it seems perfectly cool. Your heart is hammering in your chest. What are you getting yourself into? Swallowing hard, you wrap your fingers around the handle and yank. With some stubborn resistance, the microphone comes free from the ground. \n\t\t\n\t\tImmediately, you're surprised with how light and comfortable it is in your grip. Eyes wide, you hold it up close, turning it over slowly, trying to observe every detail in the low light. The speckles change from cool to warm hues as you shift the mic. \"How are you going to make [i]me[/i] famous?\" you utter with baited breath. \n\t\t\n\t\tYou immediately feel foolish for talking to a microphone. Yet as you turn it over again, its hollow eyes seem to flash a pale red. Then the mic is vibrating gently in your hands. You realize after a few seconds of disturbed confusion that the repetitive guttural grunts emanating from it is laughter. [b]\"By convincing you to pick me up.\"[/b]\n\t\t*goto outfit \n\t\n\t\t*label charisma_necrophone \n\t\t*set charisma_necrophone true \n\t\t*set charisma +2 \n\t\t*set tough +1 \n\t\t*set chill +1 \n\t\t*set kanibor +1\n\t\t(+2 Charisma, +1 Tough, +1 Chill, Kanibor Approves)\n\t\t*line_break \n\t\tYou know you're not crazy. You heard those words come from that microphone just as sure as Effie has a power tripping problem. [i][b]\"My name is Kanibor, and I'm here to save your miserable life.\"[/b][/i] \n\t\t\n\t\tFrowning, you stare at the alien object, trying to think of something profound or clever to say. The microphone glimmers in the lights from the fire and the nearby street lamp. It seems to grin nastily at you, staring at you with one dead eye half buried in the dirt. You look around to make sure no one is watching, although you might not mind some company right about now. \n\t\t\n\t\tTaking a deep breath, you crawl a bit closer to the crater. Your mouth is sour and dry, and you swallow with difficulty. At last, you manage to say in a voice that, to your credit, only tremors slightly, \"What are you? Where are you from? How do I know I can trust you?\" Then, without really meaning to, you add, \"And my life isn't miserable, by the way.\"\n\t\t\n\t\tThe alien microphone stares back at you silently. Gray smoke curls into your eyes, making you wince and jerk away. You're starting to sound delusional, talking to an inanimate object, you reflect glumly. Then your heart leaps into your chest as a low, gravelly noise that might be a gruff sigh comes from the mic. \n\t\t\n\t\tThe sound makes goosebumps crop up all over your arms and neck. [b]\"Return home and don't trouble yourself with questions that are too big for you. I will find another to free me and grant riches and fame.\"[/b]\n\t\t\n\t\tYou pivot in place, torn, your heels scuffing the dirt. You chew on your bottom lip, eyeing the microphone dubiously. With a groan of resignation, you ultimately start to cautiously climb into the crater. What other choice do you have but to accept this miracle, or curse?\n\t\t*goto outfit \n\t\t\n\t\t*label intelligence_necrophone \n\t\t*set intelligence_necrophone true \n\t\t*set intelligence +2 \n\t\t*set tough +1 \n\t\t*set mysterious +1 \n\t\t*set kanibor +1\n\t\t(+2 Intelligence, +1 Mysterious, +1 Tough, Kanibor Approves)\n\t\t*line_break \n\t\tYou absolutely have to document this. Whatever this is could be one of the biggest discoveries in the history of human kind. Right now, you have the unbelievable, terrifying responsibility of having it all to yourself. Who knows how long that luxury could last? Digging into your pocket, you produce your disposable camera.\n\t\t\n\t\tYou're eternally grateful you brought it with you, but are dismayed to see that it's nearly out of film. You'll only be able to take one or perhaps two pictures, so you need to make them count. Taking a giant breath, you stare at the grimacing skull microphone, trying to gather your courage. Maybe you can just take pictures from the safety of the outside of the crater. \n\t\t\n\t\tYou aim your camera as carefully as you can while numb from the cold and shaky from adrenaline. You take a picture of the microphone from the right, briefly lighting the area with the bright flash. As your eyes adjust to the flash, the skull's grin seems to widen menacingly. There's only enough film for one more picture, so you'd better make it count. \n\t\n\t\tYou chew on your bottom lip, accidentally drawing blood as the microphone's words plays in your head. [i][b]\"You're going to get me out of here.\"[/i][/b] \n\t\t\n\t\tClimbing carefully into the crater, you kneel down by the mic, gasping as your hand brushes against a red hot rock. Holding your breath, you nudge the microphone with the tip of one shoe. The microphone breaks free from the rubble and rolls onto its back with the skull's visage facing upwards. \n\t\t\n\t\tYou aim your camera carefully and click, and as the camera flashes on your final shot, the mic speaks. [b]\"Have your souvenirs for posterity. Are you going to actually take control or just be crushed to death by life?\"[/b]\n\t\t\n\t\tYou jerk and nearly drop your camera into the crater, bouncing it between your hands like a hot potato. Gasping, you clutch it tightly to your chest. As much as it scares you, you think you know your answer. \n\t\t*goto outfit \n\t\t\n\t\t*label deception_necrophone \n\t\t*set deception_necrophone true \n\t\t*set deception +2 \n\t\t*set intelligence +1 \n\t\t*set mysterious +1 \n\t\t*set kanibor -1\n\t\t(+2 Deception, +1 Mysterious, +1 Intelligence, Kanibor Disapproves)\n\t\t*line_break \n\t\tWithout another thought, you turn and run madly for the sidewalk. Your knees wobble frustratingly with each step and your feet feel strangely distant and heavy, but you force yourself forward with conviction born of panic. Refusing to look back, you start to pick up speed as your feet hit the pavement. The microphone's hideous voice echoes inside your head as you race across the slick sidewalk. [i][b]\"I am Kanibor.\"[/i][/b] \n\t\t\n\t\tNo matter how desperate you are, you're not going to be the victim of some alien machinery or weapon. Gritting your teeth and narrowing your eyes, you go into a full sprint. The harsh rustling of branches above makes you wince and eye the trees suspiciously. \n\t\t\n\t\tUp ahead, a street lamp is out. You slow down with indignation, the rubber soles of your shoes squeaking shrilly on the wet pavement. A second later you're feeling thankful you slowed as a scraggly, low hanging branch looms into view. You duck it and continue on carefully, eyes straining against the gloom. Another low hanging branch snags onto your shoulder, shaking as you push past it. \n\t\t\n\t\tNow that you've slowed down, doubts about what you're doing start to creep in. You have no idea what you're really running from, but you do know exactly what you're running to. A tiny apartment where you're dangerously late on rent, with no car, no job, and no one and nowhere to turn to. The thought of becoming homeless makes you nauseous. You see those poor souls on the street every day, but never thought you might join them. \n\t\t\n\t\tYou find yourself gradually coming to a stop, panting hard and clutching a stitch in your side. Slowly, you turn around and stare at the faintly smoking crater in the distance. You chew on your bottom lip, scowling pensively. Several seconds pass by, marked by the haunting calls of a nearby owl. With a great, heavy sigh, you reluctantly walk back to the crater. \n\t\t\n\t\tAs you draw nearer
