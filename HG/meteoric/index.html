 account, having already wiped out your rent debt easily and caught you up on all your other bills to boot.\n\nNow, you're seeing what can still be done about your old car, but naturally, your thoughts have drifted to the worlds, experiences, and sheer comfortability opened up by being [i]rich[/i]. Okay, you're not a millionaire yet, but \n*if (barty > 50)\n\t180k\n*if (barty \u003c= 50) \n\t150k\ncredits is more money than you earned in your entire career at Cost Slicer. The van squeaks to a halt as Baxter pulls into a parking space with barely perceptible paint. \"This place sucks,\" he declares flatly. \n\n*page_break \n\nNo sooner have you started unbuckling your seat belt do you notice a certain grocery store manager already marching towards the van with an indignant expression. You told the band enough about Effie that Tariano dives further down into his seat to avoid being seen. Meanwhile, Aurora shamelessly stares out the window with wide eyes and an eager grin, like a storm watcher watching a category five tornado approach. \n\nBaxter lets out an exaggerated sigh and reluctantly cranks down his window as Effie draws nearer. She's wearing a puce cardigan over a frilly yellow blouse, but her gray skirt blends in with her bleak surroundings and the gray weather, almost making her look like her upper half is hovering in mid air, a disembodied phantom. \"Oh, no!\" she yells, wagging a bright orange talon. \"You hoodlums peddle your drugs somewhere else.\"\n\n\"Sativa or indica?\" Baxter replies stupidly.  \n\nThis causes Effie's face to turn a disturbing shade similar to her cardigan, making it look like it's going to explode. Then her beady eyes land on you as you get out of the van. Effie somehow seems far less imposing to you than before, much more like a washed up grocery store manager than the acid spewing dragon she used to be. \"I'm just here to pick up my car,\" you say, an edge to your tone. \"Except it appears to be gone.\"\n\n*if (tough_effie)\n\tEffie bristles and eyes you distrustfully, as though expecting you to yell back at her. Then a familiar gloating glint returns to her eyes. \"Surely you must realize already what happened. After all, I'm petty.\"\n*if (charisma_effie)\n\tEffie crosses her arms over her chest, glaring at you so defensively that it's almost funny. Her tone practically dripping with sarcasm, her expression filled with disdain as she looks at your company, she says, \"Ah, yes, I see you've been making the most of your so-called freedom, consorting with these hooligans.\"\n*if (intelligence_effie)\n\tThe severance package from Cost Slicer that your union was able to secure you arrived a few days ago. It was eclipsed entirely by your signing deal, but nevertheless a nice bonus. \"Maybe I would have waited longer before phoning the tow truck if your union hadn't been harassing me,\" she sniffs, miffed. \n*if (deception_effie)\n\tGlaring at you with open suspicion, she folds her arms across her chest. \"You should count yourself lucky it wasn't stolen. There are criminals around here puncturing tires. No doubt the police will catch up with the culprit sooner than they think.\"\nEffie adopts her customary smug expression. \"I had your car towed twenty-four hours after you abandoned it here. This isn't your personal driveway.\"\n\t\nYou're aware of the band all paying close attention. Azure has her nose pressed to the window, and Tariano, whose curiosity appears to have won out, peaks out from the passenger window. It was only a short time ago that Effie had so much effect and power over your life, but now, soul-sucking grocery store jobs, dead cars, and rude managers seem so insignificant compared to alien microphones and metal stardom. \n*choice\n\t#Bring the mic to your mouth and pretend to be possessed to freak Effie out \n\t\t*goto tough_towed\n\t\t\n\t#Tell Effie that her firing you was the best thing that ever happened to you because you met your band\n\t\t*goto charisma_towed\n\t\t\n\t#Tell Effie that you feel sorry for her, and won't waste any more time or energy on her \n\t\t*goto intelligence_towed\n\t\t\n\t#Try to make her extremely uncomfortable by bursting into crocodile tears and telling her she ruined your life\n\t\t*goto deception_towed  \n\t\t\n\t\t*label tough_towed \n\t\t*set tough_towed true \n\t\t*set deception +1 \n\t\t*set intimidating +1 \n\t\t*set tough +2\n\t\t*set baxter +1 \n\t\t*set kanibor +1\n\t\t(+2 Tough, +1 Deception, +1 Intimidating, Baxter Approves, Kanibor Approves)\n\t\t*line_break \n\t\tYou suddenly adopt a blank, distant expression, and slowly take your microphone out without looking. As Effie stares incredulously, you bring the mic to your lips, rolling your eyes back in your head and letting your jaw hang agape. \"Oh, what are you doing?\" Effie splutters. \"What is this? Have you been taking drugs? Surely you're not possessed.\"\n\t\t\n\t\t[b]\"${name} isn't here anymore,\"[/b] you intone in a deep, booming voice that immediately screams [i]demon[/i]. Slowly lifting a finger, you point it at her, mouth still hanging open. \"[b]And neither are you. You're gone, gone, gone!\"[/b]\n\t\t\n\t\tEffie does a double take and staggers back, clutching at the religious pendant hanging around her neck. She stammers something incomprehensible and then turns and dashes in the opposite direction faster than you've ever seen her move before. When she glances back over her shoulder, you start shaking, and she screams and runs even faster. \n\t\t\n\t\tThe sound of muffled laughter catches your attention, and you look over to see Baxter howling, bent over and slapping the steering wheel. He rolls down the window and starts trying to talk to you, but keeps subsiding into giggles, his eyes swimming with tears. \"Dammit, all I did was key my boss' stupid opalescent car,\" he finally wheezes.\n\t\t\n\t\tThe Necrophone hums gently in your hand, warm and almost pleasant, and you get the impression that Kanibor is chuckling. It's almost endearing, yet a shiver passes up your spine all the same. The whole band is laughing at Aurora miming Effie running away and screaming as you reenter the van. \"Let's get the hell out of here,\" you say with a grin. \n\t\t*goto buy \n\t\t\n\t\t*label charisma_towed \n\t\t*set charisma_towed true \n\t\t*set charisma +2 \n\t\t*set chill +1 \n\t\t*set tough +1\n\t\t*set azure +1 \n\t\t(+2 Charisma, +1 Chill, +1 Tough, Azure Approves)\n\t\t*line_break \n\t\tYou smile knowingly, which seems to infuriate Effie more. Her nostrils flare, and her dark, beady eyes flash balefully. \"You know, Effie, you firing me was the single best thing that ever happened to me,\" you say amicably. \"Without you, I never would have met Azure, Baxter, Aurora, or Tariano. So I want to thank you.\"\n\t\t\n\t\tEffie returns a savage grin that reeks of contempt. \"Yes, I can see that. You're living out of a van with your [i]artist friends[/i].\" She waves her hands dismissively at the faces staring at her through the car windows. \"What are you, some sort of demon worshiping circus troupe?\"\n\t\t\n\t\tYou can hear the sound of a window rolling down and muffled whispers from inside the van. \"We're in a band called ${band},\" you say happily, grinning at her scrunched up nose. \"We're about to go on a tour across the country. You might even still be able to get tickets if you hurry. You know, broaden your musical and cultural horizons a smidgen.\"\n\t\t\n\t\tEffie makes an exaggerated look of disgust and lets out a high-pitched, forced laugh. Waving her hands above her head and shaking it as though trying to ward away a swarm of gnats, and muttering darkly to herself, she stalks off towards the store. Evidently even the thought of attending one of your concerts is too much, and she hasn't even heard your music. \n\t\t\n\t\tWhen you climb back into the van, Baxter is still chuckling at Effie's comments. Azure smiles brightly at you, and you're surprised to see water glistening in her eyes. \"That was sooo sweet,\" she gushes, poking you on the arm repeatedly. She grabs your sleeve possessively. \"She doesn't deserve you. But we do!\" \n\t\t*goto buy \n\t\t\n\t\t*label intelligence_towed \n\t\t*set intelligence_towed true \n\t\t*set intelligence +2 \n\t\t*set mysterious +1 \n\t\t*set charisma +1 \n\t\t*set tariano +1 \n\t\t(+2 Intelligence, +1 Charisma, +1 Intimidating, Tariano Approves)\n\t\t*line_break \n\t\tYou shake your head, suddenly remembering how utterly weary Effie's mere presence makes you feel. Someone so eternally toxic and unpleasant to others can't possibly be happy with their own life. \"Effie, I feel pity for you,\" you say bluntly. \"You're nothing but a petty tyrant who tries to spread her misery like a virus.\"\n\t\t\n\t\tEffie laughs acerbically, pulling her puce cardigan tighter around herself to ward away the chill. \"[i]You[/i] feel sorry for [i]me[/i]?\" she says, laughing again shrilly. \"I have a permanent career, a big beautiful family, a wonderful spiritual community, and what do you have?\" She jabs a finger aggressively at the van. \"These bums?\"\n\t\t\n\t\tYou glance back to see four faces staring at you from inside the van, rapt with attention, the windows fogged up with condensation from their breath. You're about to travel across the country in a tour bus, opening concerts for a giant metal band. Meanwhile, time remains standing still in this grocery store purgatory. You give Effie an irreverent smile. \"Yeah, that's about right.\"\n\t\t\n\t\tYou turn away from her and start to climb back into the van, already feeling like you're shaking off a heavy burden by ridding yourself of your old clunker car and suffocating manager in one swoop. Effie scoffs loudly and stalks off, shouting something over her shoulder about no more loitering before she calls the police. \n\n\t\tYou get back into your seat with a heavy sigh, and a tired, but triumphant smile. Tariano turns to look at you from the passenger seat, offering a supportive look. \"That was really mature,\" he says softly. \"And against the paragon of tolerance and respect, too. Even I wouldn't have been able to bite my tongue. But I bet in a week, you'll have forgotten about your old manager.\"\n\t\t\n\t\tYour life of a week ago seems like an entirely different existence. \"Yeah, maybe,\" you reply thoughtfully. \n\t\t*goto buy \n\t\t\n\t\t*label deception_towed \n\t\t*set deception_towed true \n\t\t*set deception +2\n\t\t*set charisma +1 \n\t\t*set rebellious +1 \n\t\t*set aurora +1 \n\t\t(+2 Deception, +1 Charisma, +1 Rebellious, Aurora Approves)\n\t\t*line_break \n\t\tYou saw it day in and day out and experienced it firsthand working at Cost Slicer: Effie thrives on being cruel to others, and rarely, if ever, stops to consider the consequences. Firing you and towing your car could have destroyed your life. It almost did, except you were saved by a miracle. A part of you just wants to make her second guess herself for once by fucking with her.\n\n\t\tClutching at your head, expression twisted with worry, you start to pace. You tighten your fists in your hair and then let them fall to your sides. \"So my car is [i]gone?[/i]\" you say in disbelief. Effie scoffs and opens her mouth to reply, but you're already collapsing onto your knees and burying your face into your palms. \"No, no, no,\" you groan, tears welling in your eyes. \n\t\t\n\t\tThe tears must be convincing because even Effie sounds taken aback. \"Well what did you expect when you abandoned your property?\" she says defensively, hands on her hips. \n\t\t\n\t\tYou glare at her defiantly through red hot tears. \"Don't you get it?\" you say huskily. \"I'm being evicted from my apartment, with no job to gather money and no car to get me anywhere.\" You rub your face vigorously with your hands, groaning hopelessly. \"I can't believe this is happening. I can't believe this is happening.\"\n\t\t\n\t\tYou're as surprised as Effie when the van door suddenly slides open and Aurora steps out, giving Effie a defensive glare that could wither a cactus. Almost looking embarrassed, Effie clears her throat, spins around, and marches towards the store without another word. Aurora helps you to your feet, grinning toothily at your conspiratorial look. \"That was brilliant. Slightly terrifying, but brilliant.\"\n\t\t*goto buy \n\n*label buy \n*page_break ...\n\nAs it turns out, the absence of a dying car is not terribly inconvenient when you're quickly developing a rockstar lifestyle in its stead. ${band} collectively bought a tour bus for the upcoming tour with Brain Rot. You've already been traveling for a day, and your destination is a week away in Brain Rot's hometown, in a corn field in the middle of nowhere.\n\nAccording to Baxter, such an unassuming venue has been made legendary by Brain Rot's concerts, with the location allowing for giant stage animatronics, pyrotechnics, and space for tens of thousands of rabidly devoted fans. Tens of thousands of fans. The thought of performing in front of such an immense audience almost gives you an out of body experience. \n\nEver present in the back of your mind is the knowledge that more fame, more money, more incredible musical performances will continue to cost you in your own blood. You've had to resort to wearing gloves to hide your multiple fang wounds which, despite healing supernaturally, have left distinct scars. They're reminders that your alien accomplice is undoubtedly getting closer and closer to breaking free. \n\nYou wonder what horrors await you when you finally fulfill your end of the bargain and release Kanibor from his microphone prison. Even though you managed to escape from poverty by a gnat's eyelash, an entirely new form of anxiety you didn't know existed gnaws at your insides: existential dread from the looming clash with an alien spirit, or beast, or whatever he is.\n\nYou're broken out of your grim reverie by Azure tapping you on the shoulder. She gives you a quizzical look from her seat across the isle. \"Has anyone ever told you that you ponder and contemplate [i]a lot[/i]?\" She grins brightly and wiggles her eyebrows up and down. \"I know  good distraction. Let's talk about what we're going to do with all our hard earned moola.\" \n\n*page_break\n\nYou have been so incredibly busy with paying off your rent debt, buying the tour bus, and preparing for the tour that you have hardly had a chance to actually enjoy your newfound wealth. With your concert destination several days away, however, you'll have a few chances to spend your money during breaks in traveling. \n\nAlready, you've noticed the difference the signing money has made for your band mates as well. Baxter got a two hour deep tissue massage at your area's most expensive massage parlor, and has alternated between eating steak and lobster for seemingly every meal. Azure donated her entire wardrobe to charity and then proceeded to drag Aurora along on a shopping spree to all her favorite malls.\n\nTariano got both of his arms covered in tattoo sleeves that are still covered in bandages and plastic wrap, and refused to tell anyone, even Baxter, what the tattoos were. Aurora had extensive shelving and catios installed in her house for her six cats, and bought an entire shopping cart of rum, vodka, and wine to stock her basement bar.  \n\nYou wonder if it's selfish to assume that your band mates don't have as many problems as you if those were apparently their very first purchases. \n*if (tough_towed)\n\tYou decided after scaring Effie half to death that your old vehicle was gone, gone, gone, too. Little could possess you to burn any more money on that cursed thing now that you have so many more appealing options. \n*if (charisma_towed)\n\tBy leaving your car behind, you almost feel like you're leaving your old past behind too. Maybe you could have clung onto it with your new money, but why bother when the future is so much brighter? \n*if (intelligence_towed)\n\tBitter memories of Effie's stifling personality and your car dying on you in the middle of the road on multiple occasions cling to your mind. Yet you feel as though this tour bus is taking you away from your old past so fast that those memories are being gradually flung away.  \n*if (deception_towed)\n\tThose crocodile tears you summoned up to embarrass Effie counter-intuitively required real emotions of fear and despair as inspiration. Yet, aside from perhaps a bit of nostalgia for the old clunker, you don't regret leaving your car in the past where it belongs. \n\t\nYou scratch your chin thoughtfully. \"Honestly, I haven't spent my money on anything but bills so far, so I hadn't thought about it much yet.\"\n\t\t\nTariano, slowly sipping on a beer as he plays chess against himself on a travel-sized, magnetic set, says, \"It's mandatory that you treat yourself. Band policy.\"\n\nWhat do you intend to spend your money on in the short term? You won't have time for everything before the concert, but Baxter managed to squeeze in two recreational stops into the itinerary. Between several options, you were ultimately the tie breaker for both. \n*label stops \n*if (stops = 1)\n\t*line_break \n\tWhat else did you decide to spend your money on during the road trip?\n*if (stops > 1)\n\t*goto weirdo \n*choice\n\t*hide_reuse #An exciting and memorable experience: visiting a geyser field, voted by Baxter\n\t\t*goto tough_buy \n\t\t\n\t*hide_reuse #New clothes, the best food, and expensive hotel rooms, voted by Azure \n\t\t*goto charisma_buy \n\t\t\n\t*hide_reuse #Books, technology, souvenirs, pictures: anything you can get to enrich your mind and life, voted by Tariano\n\t\t*goto intelligence_buy \n\t\t\n\t*hide_reuse #A spooky, otherworldly experience: tickets to a seance hosted by a famous medium, voted by Aurora\n\t\t*goto deception_buy \n\t\t\n\t\t*label tough_buy \n\t\t*set tough_buy true \n\t\t*set stops +1 \n\t\t*set intimidating +1 \n\t\t*set charisma +1 \n\t\t*set tough +2\n\t\t*set baxter +1 \n\t\t(+2 Tough, +1 Intimidating, +1 Charisma, Baxter Approves)\n\t\t*line_break \n\t\tThe geyser field is twice as magnificent in person as it appeared on the brochures. The rocky field stretches on and on, many great plumes of steam rising dozens of feet into the air. The air is crisp and motionless, and a dusting of snow clinging tenaciously to the ground glimmers in the bright sunlight. \n\t\t\n\t\tYour band and the other tourists gather around a hissing pool of water as the guide cheerfully explains that this geyser is the tallest in the whole state. Aurora, wearing a sun hat and sunglasses and carrying an umbrella, eyes the clear, simmering pool almost longingly. \"Is it just my intrusive thoughts, or is anyone else tempted by the forbidden bath?\" \n\t\t\n\t\tAzure chuckles nervously, takes Aurora's shoulders and moving her a couple feet further back from the geyser. Tariano shivers from the chill but waits patiently for the geyser to erupt with bright eyes. There's a faint, growing rumbling noise, and then an upside down waterfall explodes into the air. You laugh as a breeze rolls by and a haze of warm mist sprinkles over you. \n\t\t\n\t\tBaxter stares up at the steaming geyser with a giant grin, his eyes shining with childish fascination. \"I used to be a volcano nerd when I was a kid,\" he says in a hushed tone. \"I mean, obsessed with them. Read every book in the library I could get my hands on. And I don't even like reading that much. Did you know geysers are created from the heat from a nearby volcano's magma?\"\n\t\t\n\t\tHe was so busy excitedly rambling to Tariano earlier about the geysers that he doesn't realize the guide explained that to everyone at the very beginning of the tour. You nod eagerly as you continue to observe the geyser, which has created its own stunning double rainbow in the winter sun. \"This was an awesome destination, Baxter,\" you say. \"I'm never going to forget this.\"\n\t\t*goto stops \n\t\t\n\t\t*label charisma_buy \n\t\t*set charisma_buy true \n\t\t*set stops +1 \n\t\t*set charisma +2 \n\t\t*set intelligence +1 \n\t\t*set chill +1\n\t\t*set azure +1 \n\t\t(+2 Charisma, +1 Intelligence, +1 Chill, Azure Approves)\n\t\t*line_break \n\t\tBefore any of this, your clothes mostly came from thrift stores or discount racks, since Cost Slicer practically paid in grocery discounts and pizza parties. Now, you have the luxury of being able to buy virtually any article of clothing that catches your eye. Baxter refused to let Azure begin one of her notorious and time-consuming shopping sprees, but you still have your priorities for the future. \n\t\t\n\t\tAfter traveling nonstop during the daytime, you stop at hotels some nights, each one equally expensive and splendid. The extensive room service, giant televisions, king sized memory foam beds, heated pools, and jacuzzis make you feel like you truly are a rockstar.  \n\t\t\n\t\tYour band stops by a fine fondue restaurant after Azure kept expressing her wish to drown in cheese. The restaurant is below ground, with patterned paper lamps and fine wooden booths and chairs. Steaming bowls of cheese are brought out, and you enjoy three mouthwatering courses. \n\t\t\n\t\tBread, vegetables, and meat, followed by chocolate fondue with fruit and nuts, tantalize your taste buds and fill your belly. Baxter seems to enjoy skewering and drowning his food, while Aurora teases a reluctant but curious Tariano by trying to convince him that chocolate covered seafood is indeed a popular delicacy. \n\t\t\n\t\tAt the end of the elaborate meal, the waiters bring out glasses of wine and vodka. Azure, slumped back in her seat, pats her tummy with satisfied expression. \"I have successfully drowned myself in cheese and been resurrected to drown myself in chocolate,\" she says, reaching out lazily to grab another chocolate covered strawberry. \n\t\t\n\t\tYou could definitely get used to this, traveling and luxury and performing music to screaming fans. \"I'll resuscitate you when we get to the concert, and maybe we can prop you up on stage like a scarecrow,\" you say, grinning. \"We need to pay for our new glamorous lifestyles somehow, remember?\"\n\t\t\n\t\tBaxter snorts cheese out of his nostrils, causing a chorus of groans and laughs to erupt from the table. \n\t\t*goto stops \n\t\t\n\t\t*label intelligence_buy \n\t\t*set intelligence_buy true \n\t\t*set intelligence +2\n\t\t*set stops +1 \n\t\t*set charisma +1 \n\t\t*set mysterious +1 \n\t\t*set tariano +1 \n\t\t(+2 Intelligence, +1 Charisma, +1 Mysterious, Tariano Approves)\n\t\t*line_break \n\t\tThis is a time where your life is changing forever, and you never want to forget any of it. Tariano meticulously plans out your route, making sure you can efficiently stop by a bookstore, a technology store, and even an observatory without losing too much precious time. \n\t\t\n\t\tYou and Tariano exit the epic, two-story, yet somehow cozy bookstore with tall stacks of books in your arms. Baxter simply bought a poster of his favorite female wrestler, while Aurora and Azure spent most of their time switching religious books from non-fiction to fiction shelves before eventually getting kicked out by the angry manager. \n\t\t\n\t\tAt the tech store, you bought all the gadgets and devices you always wanted before but could never really afford: a giant TV, a camera, a personal computer, a music player with a huge  amount of storage, surround sound speakers, and even a reclining massage chair. With your camera, you took some photos of you and your band in front of the tour bus for posterity. \n\t\t\n\t\tYou were unable to help yourself, and had to purchase a model solar system souvenir from the observatory, although you could scarcely forget the experience. Massive telescopes peering through the glass dome ceiling of the observatory revealed the sprawling asteroid fields and distant, hauntingly beautiful gas giants invisible to the naked eye. \n\t\t\n\t\tYou're surprised when Tariano steps away from a telescope with tears glistening in his eyes. \"It just really gets me sometimes,\" he sniffs, his tone husky with emotion. \"Knowing that the dark ages kept the wonders of science from us for thousands of years.\"\n\t\t\n\t\tYou sigh, patting him on the shoulder without really knowing what to say. \"Well, we're safe from asteroids at least. I checked.\"\n\t\t*goto stops \n\t\t\n\t\t*label deception_buy \n\t\t*set deception_buy true \n\t\t*set stops +1 \n\t\t*set deception +2\n\t\t*set tough +1 \n\t\t*set mysterious +1 \n\t\t*set aurora +1 \n\t\t(+2 Deception, +1 Mysterious, +1 Tough, Aurora Approves)\n\t\t*line_break \n\t\tTickets to the traveling medium's seance cost hundreds of credits each. Evidently communicating with the dead isn't cheap, but fortunately you can afford it now. You and your band members are in a rich purple tent, seated at a carved wooden table with several strangers and a medium clad in several layers of cloaks and shawls. She wears an assortment of crystals around her neck, and shiny bangles on her wrists.\n\t\t\n\t\tThe room smells overpoweringly of incense, which is starting to make your head swim a little. Whereas Azure looks visibly nervous by the occult, and Tariano looks around inquisitively at the strange ornaments on shelves or hanging from the ceiling, Baxter appears almost bored. Suddenly, the candles lighting the tent gutter out. \n\t\t\n\t\tThe medium's crystal orb begins to glow, bathing the room in lavender hues. The tent rustles and flaps without wind, and the animal bones and strange ornaments hanging from the ceiling dance on their strings. Anxious murmurs fill the room and the other guests look around with wide eyes. Aurora is grinning from ear to ear, her eyes shining with anticipation. \n\t\t\n\t\tJust when you're thinking that whatever clever magician tricks the medium conjures up next can't be as scary as a real life alien, the medium leaps up from her chair so hard that it clatters onto the floor. A woman screams shrilly as an animal foot tickles her neck from behind. You look around in confusion before realizing the medium is staring at you.\n\n\t\t*page_break\n\t\t\n\t\tRaising a quivering finger, the medium glares at you, wide set eyes nearly bugging out of their sockets. \"You carry death in your pocket, yet you come to a mere messenger for counsel?\" She snatches up her robes, already hurrying towards the exit. \"I won't be entrapped that easily, you sly bastard. I won't be caught in your nefarious clutches!\"\n\t\t\n\t\tShe reaches into a deep pocket, procures a fistful of black powder, and hurls it behind her, filling the tent with a dark cloud. Coughs and shouts of confusion fill the room as the medium disappears. Tariano shields his mouth with his arm and frowns at the falling cloud. \"Ash. It's just regular old ash.\"\n\t\t\n\t\tAurora looks at you in marvel, despite being covered in soot. \"You're so mysterious. I must know your secrets.\" Then her eyes narrow and flick towards the other band members. \"But not in front of the staff.\"\n\t\t\n\t\tYou almost laugh but instead cough painfully, wiping water from your stinging eyes. The Necrophone feels particularly uncomfortable in your pocket as you wonder how the medium could have known about it. Maybe Kanibor couldn't help himself and was toying with her somehow. \"I have no idea what she was talking about.\"\n\t\t*goto stops \n\n*label weirdo \n*page_break ...\n\nAs you grow closer to your destination, the horizon is increasingly overtaken by vast wheat and corn fields. Frozen stalks jut up from the snow covered ground in a sea of tan lines that seem to undulate as the tour bus whizzes by. It's like a ghost world out here, with the pale sun shining over long stretches of nothing. \n\nBeing stuck inside a bus for over a week with several people has not been as claustrophobic as you initially predicted. There are two beds so you can take turns napping, a bathroom, a TV; a kitchen stocked with alcohol, soda, and snacks; and even a shower. Over the long drive, you have all had to find ways to keep yourselves entertained. \n\n*if (tough_walk)\n\tYou took the liberty of refilling your flask of whiskey, and have helped yourself to the majority of a bottle over the past few days, with some assistance from Aurora. You have been coasting on a warm, mellow mood, although occasionally Baxter's aggressive driving makes you a little nauseous. \n*if (charisma_walk)\n\tYou purchased a new set of headphones after your old ones were broken at the meteor crater, and have been enjoying the nostalgia and familiarity of listening to all your favorite songs while gazing out of the windows. Aurora asked if she could listen to your music to help herself take a nap.\n*if (intelligence_walk)\n\tYou have finally had time to read another short horror story from your pocket-sized book. In this tale, the main character is the final zombie in an apocalypse, fleeing from several human pursuers in a landfill. You strangely feel almost bad when the zombie is eventually dispatched by the human antagonists.\n*if (deception_walk)\n\tYou took the liberty of refilling your fanny pack with snacks from the kitchen cabinet. You and Baxter have also been responsible for much of the refrigerator's and cabinets' contents disappearing, but traveling on a tour bus is boring, starving work.\n\nBaxter, although he has taken on the role of primary bus driver, has been drinking lightly and napping hard during his free time. Tariano, when he's not meticulously practicing on his guitar, has been pouring over science fiction or philosophy books and sipping on mugs of steaming tea. \n\nAzure has been entertaining herself by naming animals she notices out the window, such as Nibbles the coyote or Bud Muncher the cow. You have also noticed her drawing sunsets in a notebook while gazing out at the scenery, only to erase them after she's finished. You have discovered that Aurora hardly ever sleeps, and can spend hours at a time crocheting or playing Sudoku.   \n\n*page_break \n\nOne evening, you're all playing cards in the tour bus, with the exception of Baxter who is driving and consuming a family bag sized of potato chips by himself. Tariano is currently winning handily, but Aurora seems preoccupied, barely paying attention. Finally, she drops her cards on the table, clearing her throat. \"Everyone, I have something to say. Which is that I sort of feel responsible for the whole, um, Larry situation.\"\n\nAurora looks embarrassed, her eyes downcast and her hands fidgeting in her lap. Azure rubs her back warmly and smiles, nodding encouragingly, so Aurora rolls her eyes, groans, and explains, \"I told Larry to audition, and I pressed for him to win. I mean, he actually knew what he was doing, unlike most of the people who auditioned.\" Her eyes flick towards you. \"Well, until ${name} showed up.\"\n\nTariano shrugs. \"Technically, we all voted for Larry too. There were a couple other entrants I preferred more but they weren't willing to put in the time, and couldn't even write their own lyrics decently.\"\n\nShaking her head, Aurora winces and rubs her eyelids. \"No, it's not just that. See, I dated Larry for two months.\"\n\nA horrendous coughing noise comes from the front of the bus, and the vehicle swerves sharply before rapidly straightening out again. \n*if (tough_buy) \n\tYou vividly recall the trip to the geyser field as you witness a string of snot flying from Baxter's nose. His eyes, full of tears and imminently embarrassed, catch yours briefly, and you burst into laughter at his expense. \n*if (charisma_buy) \n\tYou groan, clutching at your seat as your stomach lurches. You imagine a tumultuous sea of cheese inside your belly. Excessive fine dining and motion sickness don't mix.\n*if (intelligence_buy) \n\tYour model solar system bobs and shakes from side to side where it was hanging from the ceiling. You reach up and carefully hold it still.\n*if (deception_buy)\n\tThe bone ornaments that you decided to take from the seance after the medium fled in a panic slide off the table and clatter onto the floor. Wincing, you gingerly scoop them up. \n\"Hold on a second,\" Baxter wheezes. \"You dated Larry? [i]Larry?[/i] How did I not realize this? The guy breaks his neck looking at chicks left and right, and I guarantee you he has anger issues.\"\n\nAlthough Azure apparently already knew this information, Tariano seems taken aback as well, and listens to the conversation with rapt attention, no longer caring about the card game either. Aurora shoots a guilty expression your way and then continues. \"Honestly, I broke up with Larry simply because he seemed more interested in watching true crime documentaries, reading serial killer books, and writing lyrics than paying any attention to me.\" \n\nShe laughs acerbically and shakes her head. \"He even had a notebook full of weird band name ideas. Sleeping Babies, Tool Tosser, Normal Breathing, Carnivorous Cadaver, and my personal favorite, Zero Stab Wounds.\" She clears her throat and rubs the back of her head. \"Sorry, I guess I'm stalling. So, um, sorry, everyone, and especially $\"{name}.\"\n*choice\n\t#Sarcastically thank her for the trial by fire \n\t\t*goto tough_weirdo\n\t\t\n\t#Joke that you all dodged a giant bullet named Larry\n\t\t*goto charisma_weirdo\n\t\t\n\t#Ask her more details about Larry so you can get a clearer idea of your nemesis \n\t\t*goto intelligence_weirdo\n\t\t\n\t#Ask Aurora if Larry might still be dangerous to you and her\n\t\t*goto deception_weirdo \n\t\t\n\t\t*label tough_weirdo \n\t\t*set tough_weirdo true \n\t\t*set intimidating +1 \n\t\t*set charisma +1 \n\t\t*set tough +2\n\t\t*set baxter +1\n\t\t*set aurora -1\n\t\t(+2 Tough, +1 Charisma, +1 Intimidating, Baxter Approves, Aurora Disapproves)\n\t\t*line_break \n\t\tYou're aware of the temperature in your cheeks rising and your heart beating faster. Suddenly all of the stress and conflict with Larry you endured over the past couple weeks feels even more pointless. \"So, you're telling me all of this was avoidable?\" you say. \"Thanks for making joining the band so simple. You sure you don't want me to walk across hot coals or anything?\"\n\t\t\n\t\tAurora furrows her brow and purses her lips, seeming to mull your question over. \"Why, are you offering?\" she finally grunts, staring you down with a deadpan expression. \"That might be entertaining.\"\n\t\t\n\t\tYou give her a deadpan expression in return, replying bluntly, \"I already went through my trial by fire, thanks to you.\"\n\t\t\n\t\tTariano suddenly seems invested in the card game again, staring intently at his cards and pretending to strategize. Azure almost looks guilty for prompting this conversation, and slurps awkwardly and loudly on her soda at the bottom of her cup. Neither you or Aurora budge from your stare down, her gaze frosty and yours equally stubborn. \n\t\t\n\t\tBaxter clears his throat. \"I mean, ${name} has a point, [i]Roar[/i],\" he says. \"You had special insight into the fascinating train wreck that was Larry, and still invited him in. That's kinda sketchy, not going to lie.\"\n\t\t\n\t\tAurora's eyes suddenly appear misty, and she turns her head away with a scowl. Azure rubs her back again and frowns defensively at Baxter and you. \"Hey, she literally apologized. And I freaking talked her into it. It's not her fault Larry is a psycho. How about you leave her alone?\"\n\t\t\n\t\tAurora lets out a beleaguered sigh. \"I almost wish I didn't say anything. But hey, I'm glad I got it off my chest.\"\n\t\t*goto concert \n\t\t\n\t\t*label charisma_weirdo \n\t\t*set charisma_weirdo true \n\t\t*set charisma +2 \n\t\t*set chill +1 \n\t\t*set intelligence +1\n\t\t*set azure +1 \n\t\t*set aurora +1\n\t\t(+2 Charisma, +1 Intelligence, +1 Chill, Azure Approves, Aurora Approves)\n\t\t*line_break \n\t\tYou find that you're not upset. The whole debacle with Larry is hopefully already over, and your life is an epic dream now compared to the daily drudgery of before. You grin amicably. \"Aurora, you don't have to apologize. Look at it this way: we all dodged a giant bullet named Larry.\"\n\t\t\n\t\tEveryone laughs, Azure most of all. \"He was the definition of a loose cannon,\" she says, shaking her head. \"I got immediate slimy vibes from him but I didn't think he would be so [i]obnoxious[/i]. Always complaining, always trying to manipulate things. A total harmony killer.\"\n\n\t\tTariano shrugs. \"Just because someone makes a crappy boyfriend doesn't mean they'd make a crappy band mate.\" He scratches his chin. \"Larry just so happened to check both boxes.\"\n\t\t\n\t\tAurora sighs, smiles ruefully, and massages her face tiredly. \"I guess we did all end everything somewhat quickly, fortunately. Now I'm imagining staying in a lifeless relationship with Larry for years, or not kicking him out of ${band} til he burned our band to the ground for his ego. Yuck.\"\n\t\t\n\t\tYou can't help but feel as though this tour bus is taking you away from Larry and your past life as surely as it's delivering you to your grand, mildly terrifying future. \"See?\" you say. \"Bullet dodged, and apology accepted. Now, maybe we can forget about Larry.\"\n\t\t\n\t\tAurora nods eagerly, looking relieved. \"Already trying.\"\n\t\t*goto concert \n\t\t\n\t\t*label intelligence_weirdo \n\t\t*set intelligence_weirdo true \n\t\t*set intelligence +2 \n\t\t*set mysterious +1 \n\t\t*set rebellious +1 \n\t\t*set tariano +1\n\t\t(+2 Intelligence, +1 Mysterious, +1 Rebellious, Tariano Approves)\n\t\t*line_break \n\t\tYou find yourself intensely curious about Larry. Getting a glimpse into his disturbed mind could be useful if, as you suspect, he holds his grudge against you for a long time to come. \"What kind of documentaries did he watch?\" you ask curiously. \n\t\t\n\t\tAurora shuffles her cards absentmindedly. \"I don't know, that sort of thing never interested me. Watching true crime as a lady sometimes feels like a lamb watching a mountain lion documentary: it's [i]interesting[/i], but not that fun watching yourself get predated.\" She scratches her head thoughtfully. \"It was mostly unsolved kidnappings and murders and stuff, I guess.\"\n\t\t\n\t\t\"Larry did not strike me as much of a reader,\" Tariano comments with mild surprise. \"What kind of books did he read?\"\n\t\t\n\t\tStarting to look slightly miffed, Aurora takes her cup and swirls the ice on the bottom around as she thinks. \"Anything about serial killers. Compilations of prison interviews, books going into all the gory details of the crimes of the world's most infamous serial killers, pleasant things like that.\"\n\t\t\n\t\tYou and Tariano exchange glances, each with an eyebrow raised. He still seems surprised that Larry apparently isn't a complete neanderthal, while you're wondering what lovely inspiration Larry may have received for his own enemies. \"Well, you definitely had good judgment to break up with him,\" you say.\n\n\t\tAurora makes a funny contorted face, making Tariano laugh. \"[i]No[/i], ya think?\"\n\t\t*goto concert \n\t\t\n\t\t*label deception_weirdo \n\t\t*set deception_weirdo true \n\t\t*set deception +2\n\t\t*set intelligence +1 \n\t\t*set mysterious +1 \n\t\t*set aurora +2\n\t\t(+2 Deception, +1 Intelligence, +1 Mysterious, Aurora Approves)\n\t\t*line_break \n\t\tObviously, Larry's abnormal interests don't inherently make him suspicious. However, given his conniving and downright violent behavior towards you, as well as some possibly concerning art made about butchering and violating his exes, maybe it's not paranoid for you to be worried for yourself and Aurora. \n\t\t\n\t\tEvidently the whole bus had gone silent, because Aurora winces with chagrin and says to Azure, \"Ah, shucks. I said too much again, didn't I?\"\n\t\t\n\t\tAzure smiles sympathetically and shrugs, but you come to Aurora's rescue. \"Actually, I was just recalling Larry's concept album idea about killing his exes. Did he come up with that charming idea before or after you split up?\"\n\t\t\n\t\tBaxter cackles loudly, breaking the silence. Aurora snorts, rolls her eyes, and chucks an ice chunk at Baxter, which bounces off his head. He flips her off without taking his attention off the road, but flashes a toothy grin in the rear view mirror. \n\t\t\n\t\tAurora sighs and finally says, \"Before, actually. I didn't think much of it at the time. I kinda thought it was funny because of how immature and over the top it was. But after what he did to you, I'm not so sure what he's capable of anymore.\" She looks at you and arches an eyebrow, smiling slightly. \"Why, are you worried about me?\"\n\t\t\n\t\tYou offer her a little smile. \"Just keep those drum-sticks on you in case you need to jab some eyeballs.\"\n\t\t*goto concert \n\t\t\n*label concert \n*page_break ... \n\nAfter a week of traveling across the country, you have finally arrived at your destination: a frozen corn field turned epic concert venue, otherwise known as Rot Fest. Despite the gray skies and near freezing temperatures, heavy music fans have come in veritable droves to see their favorite nu metal icons and their meteoric death metal proteges put on a hell of a show. \n\nA giant stage has been erected at the front of the field. On the stage, there are multiple levels connected by stairs and ramps, with pyrotechnic devices arranged every several feet. A giant animatronic monster head waits like a statue suspended above the center of the stage. Around the area, there are dozens of portable restrooms and restaurant tents, all with lines of concertgoers. \n\nAs your band is ushered backstage by Brain Rot's sound crew, you observe an ocean of people already gathering by the front stage. You don't know how to feel; you have conflicting emotions, but they're being shoved aside by Kanibor's palpable excitement. It seems to wash over you like a car's exhaust, and it doesn't help that the Necrophone is almost painfully hot in your pocket.\n\nGuttural grunts and snuffles have been emanating from the mic with increasing agitation. You wonder if it's the scent of the audience's blood tormenting and tantalizing Kanibor, or if they're warning signs that he's fixing to break free, or perhaps something else entirely. Your rumination is abruptly interrupted as you collide with Baxter's back with an [i]oomph.[/i] He steadies you, grinning excitedly around at everyone. \"Hold up, everyone.\"\n\nBaxter's face is pale, but he has a manic look in his eyes. Tariano's nervous leg is practically trying to walk off his body. Azure has her sweater bunched up in both hands all the way up to her ribs. Aurora is clenching her jaw and breathing heavily, her expression mortified yet alive. Baxter encircles all four of you with his great wingspan, squashing you into a huddle. \"This is what our entire lives have been leading up to, ladies and germs. Let's fucking do this!\"\n\n*finish ", "chapter6stardom": "*temp topics 0\n\n*comment stat checks: 30\n\n[b]Chapter Six of Eight: Death Metal Stardom[/b]\n\nA legion of heavy metal fans have amassed in front of the great stage. They almost look like a colony of penguins, a mass of people bundled in black clothes huddled together against the wintry conditions. Pyrotechnics blast into the sky overhead, evaporating sleet as it falls from gray clouds. The band's music cascades over the field, impossibly loud and powerful. \n\nYou raise the Necrophone to your lips, anxiety gnawing at your insides as your lyrics approach. \n*if (tough_reunited)\n\tKanibor could come out of the microphone soon, and there's no water in the middle of nowhere, unless you want to spray him with a water bottle. There has to be another way to use his weakness against him, or even more blood could be shed. \n*if (charisma_reunited)\n\tIt's guilt, you realize. Your band members have no idea about what's really going on, but you're putting them all at risk. \n*if (intelligence_reunited)\n\tYou don't feel fully real. You feel apart from reality somehow. Questions of how your life came to all of this, how any of this is possible, still grip your mind.\n*if (deception_reunited)\n\tYou suddenly feel a twinge of pity for Kanibor. He's just as alone and desperate as you are. Then you recall him tucked in his nest and smile.\nIn front of an audience of tens of thousands, \n*if (tough_growl)\n\tyou unleash the coldblooded lyrics of [i]I Kill Evil Politicians[/i] crafted by Kanibor, Baxter, and you. \n\n\t[b]I caught a pedophile politician, took him from his hive[/b]\n\t*line_break \n\t[b]Chemical castration is his consequence, then he dies[/b]\n\t*line_break \n\t[b]I rounded up every politician who ever bombed foreign children[/b]\n\t*line_break \n\t[b]Took a mallet, and with hundreds of blows, their heads were caved in[/b]\n*if (charisma_growl)\n\tyou unleash the poignant lyrics of [i]Enforced Loneliness[/i] crafted by Kanibor, Azure, and you. \n\n\t[b]Every single day is the same, existing as an automaton[/b]\n\t*line_break \n\t[b]I called my childhood best friend, but they're dead and gone[/b]\n\t*line_break \n\t[b]Breaking my back for scraps, wondering if I'll ever be free[/b]\n\t*line_break \n\t[b]See thousands of dead children on the news every day, hell is reality[/b]\n*if (intelligence_growl)\n\tyou unleash the maximally frustrated lyrics of [i]Manufactured Consent to Planetary Suicide[/i] crafted by Kanibor, Tariano, and you. \n\t\n\t[b]Bulldozers reduce ancient forests to splinters, countless species vanish[/b]\n\t*line_break \n\t[b]Incalculable amounts of sewage and pollution create a cemetery splashing[/b]\n\t*line_break \n\t[b]CAFOs continue to spread like mold, punishing ecosystems and communities with manure lagoons[/b]\n\t*line_break \n\t[b]Cops, who scramble after the immortal specter of individual civilian crime, turn a blind eye, the goons[/b]\n*if (deception_growl)\n\tyou unleash the scathingly cynical lyrics of [i]Scientist Season[/i] crafted by Kanibor, Aurora, and you. \n\t\n\t[b]Recounts of oral tales in ancient scrolls, a dozen times translated[/b]\n\t*line_break \n\t[b]Cannot be naturally believed, but must be forcibly proliferated and dictated[/b]\n\t*line_break\n\t[b]Medieval superstitions require their constant diet of sacrificial goats[/b]\n\t*line_break \n\t[b]Hateful morals cherry picked and wielded as cudgels against convenient scapegoats[/b]\n\t\nAt the end of your line, all of the pyrotechnics go off in unison. For a few, glorious moments, the bleak, gray environment is washed away with flame, and tens of thousands of ecstatic, cheering, screaming faces in the crowd glow orange. You have an army of heavy music fans under your spell. Fame, freedom, and money dangle before your eyes, but in the back of your mind, you know there's a price. \n\nMeanwhile, your unique, commanding vocals, your stage presence as frontman, are gradually overshadowing the rest of your band. Even Baxter's sinister stalker riffs; Tariano's crawling, ear-worm riffs; Azure's bone-rattling bass wizardry, and Aurora's punishing gravity blast beats, can't compete with the otherworldly dark charisma of the Necrophone. Without even trying, you control the audience the most, and the cameras seem to follow you as much as the others combined. \n*choice\n\t*selectable_if (((tough_growl) and (intimidating > 9)) or ((baxter > 54))) #Get out all your energy and aggression, and command the crowd with Baxter (Requires Aggressive Song, and 10 Intimidating or 55 Baxter)\n\t\t*goto tough_jam \n\t\t\n\t*selectable_if (((charisma_growl) and (chill > 9)) or ((azure > 54))) #Have the time of your life and hypnotize the crowd with Azure (Requires Groovy Song, and 10 Chill or 55 Azure)\n\t\t*goto charisma_jam  \n\t\t\n\t*selectable_if (((intelligence_growl) and (rebellious > 9)) or ((tariano > 54))) #Put on a performance the audience will never forget and jam your heart out with Tariano (Requires Intricate Song, and 10 Rebellious or 55 Tariano)\n\t\t*goto intelligence_jam  \n\t\t\n\t*selectable_if (((deception_growl) and (aurora > 54)) or ((mysterious > 9))) #Jam out with Aurora and marvel the crowd with your various abilities (Requires Atmospheric Song, and 10 Mysterious or 55 Aurora)\n\t\t*goto deception_jam \n\t\t\n\t*selectable_if (kanibor > 54) #You paid for this in blood, sweat, and tears, and you deserve every second of it: relish it (Requires 55 Kanibor)\n\t\t*goto spotlight_jam \n\t\t\n\t#You don't deserve this more than any of the others: allow them to share the spotlight\n\t\t*goto share_jam\n\t\t\n\t\t*label tough_jam  \n\t\t*set tough_jam true \n\t\t*set charisma +1 \n\t\t*set intimidating +2\n\t\t*set tough +1\n\t\t*set baxter +2\n\t\t(+1 Tough, +2 Intimidating, +1 Charisma, Baxter Approves)\n\t\t*line_break \n\t\tThe energy on stage is electrifying, almost explosive as the epic breakdown of your song approaches. Tariano plays his catchy descending riff at half-time and Baxter plays slow, dirty chugs as Aurora hangs onto a groovy, subdued beat. Baxter sticks his tongue out at you with a grin, his cheeks pink and his hair frizzy from the cold. You return a grin, raise your mic and go in for the kill. \n\t\t\n\t\t*label tough_lyrics \n\t\t[b]I questioned cops why they don't protect us from ecocide or genocide[/b]\n\t\t*line_break \n\t\t[b]One said they were just doing their job; I put a bullet in between their eyes[/b]\n\t\t*line_break \n\t\t[b]I sacrificed every evil politician to free their billions of ghostly victims[/b]\n\t\t*line_break \n\t\t[b]I kill...I kill...I kill...evil politicians[/b]\n\t\t*if (share_jam) \n\t\t\t*goto share_jam_return \n\t\t*if (spotlight_jam)\n\t\t\t*goto spotlight_jam_return \n\t\t\n\t\tAt the end of your breakdown, you unleash a mighty, prolonged guttural growl, and you and the entire band head bang in unison as Aurora resumes her frantic blast beats on a bed of filthy bass from Azure. In the crowd, a swirling mosh pit is growing in size and intensity by the second. \n\t\t\n\t\tBaxter stomps over to you with the beat, his face screwed up in concentration. His dark, intense eyes lock with yours, and you feel a shiver. You know he has worked to achieve this dream his entire life, and the kind of bond you create on such an adventure could be lifelong. \n\t\t\n\t\tThe two of you press your backs together, you growling into the Necrophone as he shreds his guitar with remarkable precision. He looks over his shoulder and says loudly in your ear, \"I could seriously marry you right now. And I'm not even like, into marriage. I mean, I like the union. It's just all the ceremony and pageantry and all that jazz that I find unnecessary. And don't get me started on judges and priests.\"\n\t\t\n\t\t*if not(attracted_males)\n\t\t\tYou laugh, a full belly laugh that you didn't know you needed. \"Oh, shut up and concentrate on your noodling.\"\n\t\t*if (attracted_males)\n\t\t\tYour face burns with embarrassment and butterflies flutter in your stomach. \"Well, like half of marriages end in divorces,\" you say matter of factly. \n\t\t\t\n\t\t\tYou wince. So unclever. Yet Baxter howls with laughter, and then you're both laughing like idiots, entirely in your own world even as you're playing in front of an ocean of fans. \n\t\t*goto turntable \n\t\t\n\t\t*label charisma_jam \n\t\t*set charisma_jam true \n\t\t*set charisma +1 \n\t\t*set chill +2 \n\t\t*set intelligence +1\n\t\t*set azure +2\n\t\t(+1 Charisma, +2 Chill, +1 Intelligence, Azure Approves)\n\t\t*line_break \n\t\tThe energy on stage is unmistakable and wonderfully harmonious as the epic breakdown of your song approaches. Aurora takes the beat down to a slow groove, peppering in rapid bursts of snare hits. Tariano plays his lurching riff at half time, adding in pick harmonics that give you goosebumps. \n\t\t\n\t\tAzure's grimy bass lurks just below the surface, subtly stalking the guitar riff. She beams at you, showing her dazzling, perfect teeth, and tears of happiness sparkle on her long eyelashes. Giving her an encouraging wink, you raise your mic and go in for the heart. \n\t\t\n\t\t*label charisma_lyrics \n\t\t[b]Watching the same damn movies til my eyeballs ooze out of their sockets[/b]\n\t\t*line_break \n\t\t[b]Hiding little razor blades and bottles of alcohol in my pockets[/b]\n\t\t*line_break \n\t\t[b]To drown the black hole in my chest from connections I never had[/b]\n\t\t*line_break \n\t\t[b]A social species fragmented into a trillion pieces, isn't it sad?[/b]\n\t\t*if (share_jam) \n\t\t\t*goto share_jam_return \n\t\t*if (spotlight_jam)\n\t\t\t*goto spotlight_jam_return \n\t\n\t\tAt the end of your breakdown, you let loose a bloodcurdling, vicious high scream, and you and the entire band head bang in unison as they resume playing at a full gallop. In the crowd, crowd surfers are being delivered to the swirling, growing mosh pit like doomed ships to a maelstrom. \n\t\t\n\t\tAzure spins and kicks her way over to you with athletic grace and the benefit of a petite frame. She's shivering hard, but you realize from her giddy expression that it's from excitement and not the cold. Shoulder to shoulder, you growl into the mic with a devious smile as she hangs her head back, eyes closed as her fingers dance across the bass strings. \"I'm divorcing Aurora to marry you because you're so freaking awesome,\" she says. \n\t\t\n\t\t*if (attracted_females)\n\t\t\tYou laugh heartily, but your stomach swoops like you're on a roller coaster at the same time. You shake your fists dramatically at the sky. \"I'm tearing this band apart, Azure!\"\n\t\t\t\n\t\t\tThe two of you subside into giggles, so in your own world that you're barely aware of your irritated band members or the thousands of cheering fans.\n\t\t*if not(attracted_females)\n\t\t\tYou barely have time to move your mic away before you burst into laughter. \"Oh, shut up.\"\n\t\t*goto turntable \n\t\t\n\t\t*label intelligence_jam \n\t\t*set intelligence_jam true \n\t\t*set intelligence +1\n\t\t*set rebellious +2 \n\t\t*set tough +1 \n\t\t*set tariano +2\n\t\t(+1 Intelligence, +1 Rebellious, +1 Tough, Tariano Approves)\n\t\t*line_break\n\t\tThe energy on stage is electrifying and infectious as the epic breakdown of your song approaches. Aurora switches to a stomping, groovy beat, and Baxter plays slow, syncopated, palm muted chugs, mirrored by Azure's rumbling bass. As one, your band head bangs, eliciting cheers from the crowd that give you goosebumps. Starting with a squealing dive bomb, Tariano leaps in with his brief, flashy guitar solo that gives you shivers. \n\t\t\n\t\tHe shreds the top of the fret board, sweeps down to the middle, and rapidly crawls back up again. His fingers dance across the strings to create an anxiety-inducing, shrieking lead over Baxter's riff which has morphed into a galloping, wavy tremolo. The crowd roars at the end of Tariano's solo, and he catches your gaze, his eyes wide with astonishment. You grin at him knowingly and raise your mic, going in for the kill. \n\t\t\n\t\t*label intelligence_lyrics \n\t\t[b]The planet is burning and drowning, and by endless invasive wars, millions of innocent children die[/b]\n\t\t*line_break \n\t\t[b]We are simply expected to accept ecocide, genocide and infanticide as a normal way of fucking life[/b]\n\t\t*line_break \n\t\t[b]Critical thinking smashes indoctrination, propaganda, and societal lies[/b]\n\t\t*line_break \n\t\t[b]But for now it's manufactured consent to planetary suicide[/b]\n\t\t*if (share_jam) \n\t\t\t*goto share_jam_return \n\t\t*if (spotlight_jam)\n\t\t\t*goto spotlight_jam_return \n\t\t\n\t\tAt the end of your breakdown, you let loose a brutal, dirty guttural growl as the band proceeds at a full sprint, chasing after Baxter's menacing stalker riff. In the crowd, multiple swirling mosh pits are forming, like maelstroms in a furious ocean storm. Tariano stomps his way over to you with the rhythm, his face filled with admiration. \"You really are a genius. An artist.\"\n\t\t\t\n\t\t*if (attracted_males)\n\t\t\tYou find your face is burning furiously. \"That means a lot, coming from you,\" you say.\n\t\t*if not(attracted_males)\n\t\t\tIt's impossible not to smile. \"Coming from the brains of the group, that's high praise,\" you say. \n\t\t*goto turntable \n\t\t\n\t\t*label deception_jam \n\t\t*set deception_jam true \n\t\t*set deception +1\n\t\t*set mysterious +2 \n\t\t*set charisma +1 \n\t\t*set aurora +2\n\t\t(+1 Deception, +2 Mysterious, +1 Charisma, Aurora Approves)\n\t\t*line_break \n\t\tThe energy on stage is incredible, almost hypnotizing, as the breakdown of your song approaches. All the instruments stop and Tariano plays a crunchy, isolated riff. The crowd cheers when Baxter jumps onto the riff as well and harmonizes with it, and then the song is off again as Aurora attacks the kit with a bouncy, energetic beat. \n\t\t\n\t\tYou pace over to Aurora's epic drum set, which has ${band}'s logo on the bass drum, head banging in unison with her. Her cool eyes catch yours as you approach, and she fumbles, missing the beat. Laughing at herself, she instantly corrects course and plays with renewed vigor. You give her an apologetic smile. Then you raise your mic, going in for the throat.  \n\t\t\n\t\t*label deception_lyrics \n\t\t[b]Cultural variety and scientific progress are smashed under the principle of religious homogeneity[/b]\n\t\t*line_break \n\t\t[b]Morally repugnant myths a million times disproved, I don't believe in your fucking deity[/b]\n\t\t*line_break \n\t\t[b]There's a pounding at the back of the door, glass explodes through the window[/b]\n\t\t*line_break \n\t\t[b]The mob grabs the scientist, dragging them by the hair to be hung from a willow[/b]\n\t\t*if (share_jam) \n\t\t\t*goto share_jam_return \n\t\t*if (spotlight_jam)\n\t\t\t*goto spotlight_jam_return \n\t\t\t\n\t\tAt the end of your breakdown, you belt out a lengthy, raspy growl. Tariano and Baxter return to their winding, rattle-snake like riffs, and Aurora locks onto a groovy, simple beat, but breaks away from it several times to add furious drum fills. In the crowd, practically everyone seems to be head banging, and fans at the front are hauling themselves onto the stage to launch themselves back into the crowd again. \n\t\t\t\n\t\t*if (attracted_females)\n\t\t\tYou and Aurora meet eyes, both looking equally astonished. Then her gaze seems to smolder, and she bites the corner of her lip. \"Don't judge me for saying this,\" she says, almost seeming bashful. \"But seeing you up there being so badass and free makes me want to cuddle.\"\n\t\t\t\n\t\t\tYour stomach swoops even harder than it did when you first saw the immense audience. \"It's an appointment, then,\" you say, grinning stupidly. \n\t\t*if not(attracted_females)\n\t\t\tYou and Aurora share a look and both laugh in disbelief. \"Don't ask me how any of this is happening right now,\" she shouts, shrugging as she tosses drum sticks between her hands. \"It's a mystery to me. I just hope I never wake up from this dream.\"\n\t\t\t\n\t\t\tThere's a pang of guilt in your stomach as you realize you don't know how long this dream can continue. You flash a smile, burying your nerves. \"Like a positive purgatory. Hey, that could be a new song title.\"\n\t\t*goto turntable \n\t\t\n\t\t*label spotlight_jam \n\t\t*set spotlight_jam true \n\t\t*set aurora -1 \n\t\t*set intimidating +2\n\t\t*set charisma +2 \n\t\t*set tough +1 \n\t\t*set baxter -1 \n\t\t*set kanibor +2\n\t\t*set tariano -1 \n\t\t*set azure -1 \n\t\t(+2 Charisma, +2 Intimidating, +1 Tough, Kanibor Approves, Baxter Disapproves, Aurora Disapproves, Tariano Disapproves, Azure Disapproves)\n\t\t*line_break\n\t\tYour old life was purgatory, and you went through hell to get to this destination, to this moment in time. How can you let this escape, how can you not take the world that's at your feet? Kanibor's fangs dig into the flesh of your thumb, bringing tears to your eyes, but you blink them away with a fearless, toothy grin. \n\t\t\n\t\tYou're distantly aware of a slight lull in the crowd, and the fact that you have gone still. Tariano and Azure look at you with concern, and Baxter paces over to you, his eyebrows scrunched up worriedly. \"Everything alright, ${name}? You can do this.\"\n\t\t\n\t\tBy way of answer, you give him a little smile and then run to the front of the stage just in time for your breakdown.\n\t\t\n\t\t*if (tough_growl)\n\t\t\t*goto tough_lyrics \n\t\t*if (charisma_growl)\n\t\t\t*goto charisma_lyrics \n\t\t*if (intelligence_growl)\n\t\t\t*goto intelligence_lyrics \n\t\t*if (deception_growl)\n\t\t\t*goto deception_lyrics \n\t\t\t\n\t\t*label spotlight_jam_return \n\t\tAt the end of your breakdown, you unleash a powerful, prolonged growl. The whole band head bangs in unison as the flurry of drums, swarming locust guitars, and filthy bass all coalesce perfectly behind you. The crowd roars with cheers, and ecstatic grins pass between the band members. Then you let loose another lengthy growl, even more guttural and brutal, and the audience erupts like a volcano. \n\t\t\n\t\tPeople are crawling onto the stage past security and launching themselves back into the crowd. The raging mosh pit has gouged a great hole in the center of the audience. You're bathed in a yellow circle of light as the spotlight is cast over you. Blood dribbles down your hand and past your wrist, but you have never felt better in your entire life.  \n\t\t*goto turntable  \n\t\t\n\t\t*label share_jam \n\t\t*set share_jam true \n\t\t*set intelligence +2\n\t\t*set charisma +1 \n\t\t*set rebellious +1 \n\t\t*set tariano +1\n\t\t*set baxter +1 \n\t\t*set aurora +1\t\t\n\t\t*set azure +1\n\t\t(+2 Intelligence, +1 Rebellious, +1 Charisma, Baxter Approves, Tariano Approves, Aurora Approves, Azure Approves)\n\t\t*line_break \n\t\tWithout your band members, you would be completely alone, with nothing for you and your possessed microphone to sing to. How can you possibly claim a right to all of this? You run around the stage, making sure the spotlight is following you, and then sidle up beside Baxter. He towers over you, but his fingers dance almost delicately across the guitar strings as he plays a sudden brief, mournful lead ending in a dive bomb.\n\t\t\n\t\tThe crowd roars, and pyrotechnics blast above your heads. Baxter, bathed in orange light, wears a devilish grin as you jog towards the other guitarist. Tariano grins expectantly as you approach, and pounds out syncopated, palm muted chugs so primitive yet disgusting that it's like a neanderthal crawling out of a sewer. Raising the mic to your lips, you go in for the kill. \n\t\t\n\t\t*if (tough_growl)\n\t\t\t*goto tough_lyrics \n\t\t*if (charisma_growl)\n\t\t\t*goto charisma_lyrics \n\t\t*if (intelligence_growl)\n\t\t\t*goto intelligence_lyrics \n\t\t*if (deception_growl)\n\t\t\t*goto deception_lyrics \n\t\t\n\t\t*label share_jam_return \n\t\tAt the end of your breakdown, all the pyrotechnics on stage go off simultaneously, and you and your band head bang in unison. Thousands of fans cheer, covering you in goosebumps and filling you with chills. Running over to Azure, you growl your lyrics beside her, pointing at her for the crowd. She grins and performs an isolated, funky slap bass fill that illicits ear-splitting whistles and wolf howls. \n\t\t\n\t\tAzure winks at you in appreciation as you jog back to Aurora's kit, panting for breath between lines. She's nearly hidden by her gigantic drum kit, but her vibrant green hair is impossible to miss. Grinning from ear to ear, she alternates between blindingly fast gravity blast beats that could cause necks to snap, and mid-tempo grooves with creative cymbal fills that make your shoulders move against your volition. \n\t\t\n\t\tYou compliment the last blast beat with your most ferocious guttural growl that draws more screams of approval from the audience. Looking around at the other band members, you see Tariano and Baxter laughing like children together and Azure standing on top of her amp and jamming for the crowd. \"Hey,\" Aurora shouts, giving you a little knowing smile. \"You did good, kid. Hella good.\"\n\t\t*goto turntable \n\t\t\n*label turntable \n*page_break \n\nSuddenly, a great trap door slides open in the center of the stage, and Tariano and Baxter have to meekly scramble away to safety. Slowly, a platform rises from beneath the floor. Behind his extensive set up of turntables, mixers, synthesizers, and keyboards, is a man clad in a black jumpsuit and a mask that looks like a decomposing corpse, rotten flesh and protruding worms and all. \n\nShrugging at you with a sheepish grin, Baxter lowers his instrument and backs up a bit, and the others stop playing as well. Evidently it's time for the main event, because the members of Brain Rot are starting to take over the stage. One by one, nine more of them walk silently through the curtains. All of them are wearing identical black jumpsuits and unique, disturbing masks. \n\nTheir bassist's mask looks like a face that has been charred black and disfigured with four degree burns. Their lead singer wears a mask covered in what appears to be dozens of porcupine barbs. He wordlessly paces back and forth across the stage, staring down the crowd as they thrust devil horns at him and cheer until their throats must be raw. \n\nAfter such an exhilarating experience, with your adrenaline waning, you suddenly find your mind wandering. \n*if (tough_weirdo)\n\tYou almost feel bad for arguing with Aurora, even if you may have been right. Nothing Larry could have done would have scared you away from this destiny. \n*if (charisma_weirdo)\n\tPerhaps it's because you're in a vulnerable state, but you feel strangely paranoid. You cast your wide eyes around the great venue, with its dozens of tents and thousands of people, half-expecting to see Larry coming for you. \n*if (intelligence_weirdo)\n\tYou wonder how many of the murderers in Larry's documentaries liked to stalk their victims. You wonder if Larry just might follow you halfway across the country with thoughts of violent, righteous revenge. \n*if (deception_weirdo)\n\tFor some reason, you can't shake the feeling that Larry isn't finished with you yet. His hatred and jealousy for you can only be burning even brighter now that ${band} is famous and worth a fortune.\n\t\nThe humongous animatronic monster head that was dormant above the stage for your whole show now comes to life with glowing red eyes, belching acid green flames. The cameras zoom in on Barty's heavily tattooed hands manipulating the fader and record at ridiculous speeds. The scratching, stuttering, squeaking noises playing above funky drum and bass music are really making the crowd move. Then Kanibor loses all control in an instant.\n\n*page_break \n\nTo your alarm, Kanibor lets out a horrible, guttural growl, not a musical death growl, but a feral, animalistic growl full of pain and confusion. Several members of Brain Rot all turn their heads in your direction, ghoulish in their masks. Face burning with chagrin, you stuff the painfully hot mic in your pocket and fast walk towards the back stage. \"Must be feedback or something,\" you say to no one in particular. \n\nKanibor is continuing to growl, groan, and snarl to your horror. Even under the wobbling, whirring turntable scratching and glitchy electronic sections of Barty's solo, Kanibor's tantrum is turning heads. You're going at a full sprint by the time you reach the back stage, and you burst through the thick black curtains as someone calls your name behind you. \n\n*if (tough_jam)\n\t\"${name}!\" Baxter calls out again, his baritone voice cutting through the din. \"Where are you going? You look like you've seen a monster.\"\n\t\n\tYou ignore him as the curtains fall behind you. He's the last person you want to see whatever happens next. \n*if (charisma_jam)\n\t\"${name}!\" Azure calls out again, her voice just audible above the music. \"Where are you going? Did you see Effie in the audience or something?\"\n\t\n\tYou ignore her as the curtains fall behind you. Whatever happens next, she's the last person you want to see any of it. \n*if (intelligence_jam)\n\t\"${name}?\" Tariano calls again, his soft tone nearly buried by all the noise. \"Is something wrong? You look like you've seen a ghost.\"\n\t\n\tYou ignore him as the curtains fall behind you. Out of everyone, he's the last one you want to witness what's happening. \n*if (deception_jam)\n\t\"${name}!\" Aurora calls out, her sharp tone of surprise and concern rising above the chaos. \"Where are you going? Where are the zombies?\"\n\t\n\tYou ignore her as the curtains fall behind you. She's the last person you want to know about the quagmire you're about to be in.\n*if (spotlight_jam)\n\t\"${name}!\" Baxter calls out again, his deep voice booming over the chaotic music. \"You're seriously acting weird. What's gotten into you?\"\n\t\n\tYou thrust the curtains shut behind you, frowning impatiently. Now of all times would be the perfect time for him to stop trying to micromanage others.\n*if (share_jam)\n\t\"${name}!\" Aurora calls out again in surprise. \"You look like you just saw an assassin or something. Where are you going?\"\n\t\n\tYou ignore her as the curtains fall behind you. It's impossible to tell any of them what's going on without just making things even worse.\nYou rush past the technicians, roadies, and VIP fans, trying not to look at anyone and trying and failing to ignore them looking at you. Warm, sticky blood is running down your leg and clinging to your pants as Kanibor continues to stress vomit. [b]\"Make it stop,\"[/b] he groans in obvious anguish.  \n\nNot knowing where else to go, what else to do, you make for the tour bus at a gallop, hoping for some semblance of privacy. Tiny sleet stings your eyes, and the crisp air burns your nose. By the time you get inside, blood is spilling into your shoe and dripping onto the floor. You put the blood-drenched mic into the sink, and rapidly clean yourself and throw on new clothes with shivering hands. \n\nKanibor has always seemed sensitive to the very blood he requires. Did Barty's turntables make him fall apart like that? Maybe it was the high pitched scratching noises causing him such discomfort and pain. Just when you're thinking about what to do next, there's an assertive knocking at the tour bus door that nearly makes you jump out of your skin. \n\n\"You know, Larry told me something funky was going on,\" Barty's interrogative voice says, muffled through the door. \"I didn't believe him then, but now I think I need my mind laid to rest after all,\" he says. \"Can you do that for me, your benefactor?\"\n*choice\n\t*selectable_if (intimidating > 9) #Pretend that you've been coughing up blood to try to scare him away (Requires 10 Intimidating) \n\t\t*goto tough_turntable\n\t\t\n\t*selectable_if (chill > 9) #Invite him in, acting like everything is perfectly fine, and try to weird him out into leaving (Requires 10 Chill)\n\t\t*goto charisma_turntable \n\t\t\n\t*selectable_if ((rebellious > 9) or (barty > 51)) #Ask him if you signed your rights away to privacy (Requires 10 Rebellious or 52 Barty)\n\t\t*goto intelligence_turntable \n\t\t\n\t*selectable_if (mysterious > 9) #Allow him to come in and ask him what he thinks is going on to confuse him (Requires 10 Mysterious)\n\t\t*goto deception_turntable \n\t\t\n\t#Tell him to go away\n\t\t*goto normal_turntable \n\t\t\n\t\t*label tough_turntable \n\t\t*set tough_turntable true \n\t\t*set intimidating +2 \n\t\t*set deception +1 \n\t\t*set tough +1\n\t\t*set barty +1\n\t\t*set kanibor +2\n\t\t(+1 Tough, +2 Intimidating, +1 Deception, Kanibor Approves, Barty Approves)\n\t\t*line_break \n\t\tYou have very few options, but this one just might be the most believable. Plenty of extreme metal vocalists have melted or deep fried their vocal cords and destroyed range with bad technique and self care. Thinking fast, you bury your disgust and pick up the Necrophone, hanging it over your mouth so a few droplets of blood land into your throat. \n\t\t\n\t\tThe intense metallic tang, coupled with the knowledge that it's your own blood, make you gag and nearly vomit. Barty bangs on the door again, rattling it in its hinges. Adopting a suitably furious scowl, you wrench the door open and scream in his face, \"[b]Can I help you with something?[/b]\"\n\t\t\n\t\tYou're pleased to see that the turntablist is no longer wearing his gory mask, because flecks of bloody saliva fly from your mouth and onto his shocked face. He takes a step back, blinking in increasing surprise. Wiping a drop of blood off with his finger, he observes it with wide eyes. \"You, uh, ruined my solo, and, your mic-- Are you coughing up blood?\" he blurts out, astonished.\n\t\t\n\t\tYou hack into your shoulder for a few seconds and then give him another withering glare. \"[i]No[/i], it's ketchup. Now, unless you have any other stupid questions to ask, I have some vocal care I need to do. You shouldn't be surprised: this insane recording and touring schedule was your idea.\"\n\t\t\n\t\tBarty stands there, jaw agape, as you slam the door in his face. Trembling from exhaustion, you stumble back and nearly collapse against the sink. The Necrophone looks more like a murder weapon than a musical instrument. To your surprise, Kanibor cackles approvingly. \"[b]Be gone with that bastard and his noise torture. I'm lucky to have such a swift and fierce protector.[/b]\"\n\t\t*goto free \n\t\t\n\t\t*label charisma_turntable \n\t\t*set charisma_turntable true \n\t\t*set charisma +1\n\t\t*set chill +2 \n\t\t*set tough +1\n\t\t*set barty +1\n\t\t*set kanibor +2\n\t\t(+1 Charisma, +2 Chill, +1 Tough, Barty Approves, Kanibor Approves)\n\t\t*line_break \n\t\tAnyone would think you were insane if you told them what was really happening, so it stands to reason that they might think themselves insane if they witnessed this, and you pretended like things were normal. Right? Taking a deep breath, you grab a beer from the fridge, force yourself to smile, and open the door. \"What's up, Barty?\" you say, trying not to sound as winded as if you had just ran a marathon. \n\t\t\n\t\tBarty blinks in momentary surprise but then resumes his suspicious expression. \"Well, your mic started acting like it was going to blow up, and you ran like a pack of wolves was after you. You kind of ruined my solo, if you hadn't noticed. So, what's up, ${name}?\"\n\t\t\n\t\tYou hesitate for a second and then roll your eyes, smiling wryly and gesturing for him to come in. Trying to keep your heart from beating out of your chest, you casually take a seat and start sipping on your beer. Barty follows you in, looking perplexed at the blood-saturated mic gurgling faintly in the sink. \"Just decompressing,\" you say innocently, taking another sip. \n\t\t\n\t\tBarty's eyes keep flicking nervously back and forth between the mic and you, and you can tell he's dying of morbid curiosity but has no idea what questions to ask, or if he should ask them. At last, he forces an awkward chuckle. \"Yeah, it's weird, it looks like your mic is, uh, decompressing too.\"\n\t\t\n\t\tYou chuckle back, intentionally awkward. Sweat trickles down your forehead. \"Yeahhh.\"\n\t\t\n\t\tThe two of you fall silent, magnifying the gross popping and gurgling sounds of Kanibor. Barty stares at you, scrutinizing you, and you stare back with a simple expression, still sipping your beer. You're so nervous it has no taste. Clearly starting to doubt himself, Barty pats his thighs and clears his throat. \"Well, uh, decompress however you want as long as you keep performing like that, alright?\"\n\t\t\n\t\tWith a forced chuckle and a parting pat on the shoulder, he quickly disappears from the bus. To your surprise, Kanibor laughs and wheezes in the sink. \"[b]I thought I was doomed. Are all humans so willfully blind? Good riddance to the evil ape and his noise torture.\"[/b]\n\t\t*goto free \n\t\t\n\t\t*label intelligence_turntable\n\t\t*set intelligence_turntable true \n\t\t*set intelligence +1 \n\t\t*set rebellious +2\n\t\t*set deception +1 \n\t\t*set barty +2 \n\t\t*set kanibor +2\n\t\t(+1 Intelligence, +2 Rebellious, +1 Deception, Kanibor Approves, Barty Approves)\n\t\t*line_break \n\t\tIt's like you're the only one on the planet who knows anything about privacy. Glaring daggers through the door, you say firmly, \"Did I sign my rights to privacy away with that contract? I don't care if you're the damn president. I'm having a bit of an emergency right now, and no one is coming in here, benefactor or not, understand?\"\n\t\t\n\t\tThere's a moment of silence, and then you're startled by Barty howling with laughter and clapping his hands together. \"This motherfucker said, 'I don't care if you're the president.[/i]'\" He chuckles wryly and lets out a great sigh. Then, \"You really think you can bluff me after you just ruined my solo? What the hell's really going on in there, huh?\"\n\t\t\n\t\tKanibor is still gurgling like a damaged garbage disposal, and perhaps it's this that prompts Barty to yank insistently on the door handle again. You grit your teeth. He's so persistent. \"My mic is malfunctioning and I don't feel so hot myself, alright?\" you say. \"Now, get the hell away from my bus and leave me in peace.\"\n\t\t\n\t\tAfter a few, tense seconds, Barty chuckles again. \"Sorry to bother you, kid. You may be weird as hell, but that doesn't necessarily mean you're up to anything. I should know better than to get myself in between two singers' drama. You go back to...whatever it is you're doing in there.\"\n\t\t\n\t\tPressing your ear to the door, you can faintly hear Barty's footsteps receding. Only now do you realize your fingers were shaking and you were holding your breath in aching lungs. Trudging over to the blood spattered sink, you eye the mic disdainfully. \"What the hell is wrong with you?\"\n\t\t\n\t\tYour only answer at first is the grotesque gurgling and popping noise of Kanibor's bloody laugh. [b]\"Bluffing seems to be a common tactic among primates. Good riddance to the fool and his sadistic noises.\"[/b]\n\t\t*goto free \n\t\t\n\t\t*label deception_turntable\n\t\t*set deception_turntable true \n\t\t*set deception +1\n\t\t*set mysterious +2\n\t\t*set tough +1 \n\t\t*set barty -1 \n\t\t*set kanibor +2\n\t\t(+1 Deception, +2 Mysterious, +1 Tough, Kanibor Approves, Barty Disapproves)\n\t\t*line_break \n\t\tLet Barty come inside and think he's insane; he asked for it, after all. Wearing an impatient frown, you open the door halfway. \"What exactly do you think is going on in here?\"\n\t\t\n\t\tHe tries to peek over your shoulder, his eyes narrowed suspiciously. \"Well, judging by the fact that it seemed like your mic was going to explode, and then you ran here like a swarm of hornets was after you, I'm going to assume it has something to do with your mic. And you ruined my fucking solo.\"\n\t\t\n\t\tRolling your eyes, you beckon for him to follow you inside. He blinks in surprise but eagerly enters the bus, casting his shrewd gaze around as you lean against the counter, looking bored. Kanibor's horrible snuffling draws him to the sink, and you find yourself gripping the counter painfully. \"So, what's going on that made you come pounding at the door like a government agent?\"\n\t\t\n\t\tBarty hardly seems to be listening to you, too focused on the macabre scene in the sink. The skull microphone is surrounded in a puddle of blood, shining crimson, and still gurgling faintly. Tiny bubbles of blood form and then burst on its mouthpiece and seams. \"What did you do, bash someone's head open with this?\" he says, looking at you with wide eyes. \n\t\t\n\t\tYou simply stare at him silently with a deadpan expression. Barty tries to maintain your gaze, but nervously looks away. He clears his throat, fidgeting. \"Right, well, I can see that Larry's reports of you cheating using your microphone are highly exaggerate
