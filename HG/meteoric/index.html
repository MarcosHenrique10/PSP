 me taking responsibility.\"\n\t\t\n\t\tYou open your mouth to yell, and then he pulls the trigger with a muted [i]bang[/i].\n\t\t*goto empty\n\t\t\n\t\t*label intelligence_bullet \n\t\t*set intelligence_bullet true \n\t\t*set intelligence +2 \n\t\t*set charisma +1 \n\t\t*set rebellious +1 \n\t\t*set larry +1\n\t\t*if (tough_grave)\n\t\t\t*set baxter +1\n\t\t\t(Baxter Approves)\n\t\t*if (charisma_grave)\n\t\t\t*set azure +1\n\t\t\t(Azure Approves)\n\t\t*if (intelligence_grave)\n\t\t\t*set tariano +1\n\t\t\t(Tariano Approves)\n\t\t*if (deception_grave)\n\t\t\t*set aurora +1\n\t\t\t(Aurora Approves)\n\t\t(+2 Intelligence, +1 Rebellious, +1 Charisma, Larry Approves)\n\t\t*line_break \n\t\tAt first you hang your head bitterly in resignation as you realize what must happen, but then you slowly raise it and look at Larry in solemn defiance. \"If you're going to shoot someone, Larry, shoot me. If me accidentally taking your singing role is worth taking my life, I can't stop you. Just don't punish ${helper} because of your vendetta against me.\"\n\t\t\n\t\t*if (tough_grave)\n\t\t\t\"Larry, don't do it!\" Baxter shouts desperately. \"Killing someone because they happened to sing better than you? No offense. That doesn't make any sense. We were the ones who fired you, not ${name}.\"\n\t\t*if (charisma_grave)\n\t\t\tTears are pouring down Azure's cheeks and her voice is high, constricted with desperation. \"Larry, please, you don't have to kill anyone. I know we've been horrible. Let us make it up to you.\"\n\t\t*if (intelligence_grave)\n\t\t\tTariano is waving his arms like a traffic controller signaling an incoming bus to stop. \"Wait, Larry, just wait,\" he says desperately. \"What is this going to achieve? Shooting ${name} won't fix everything in your life. It's not some panacea; it will be the worst thing that's ever happened to you.\"\n\t\t*if (deception_grave)\n\t\t\t\"Dammit, Larry, you don't have to keep escalating and escalating and escalating just because you don't get your way!\" Aurora cries in desperation. \"You won. You have all the power here. So choose to do something brave or clever, not this!\"\n\t\t\n\t\tLarry ignores ${helper} completely, fixated on you with a triumphant, gloating smile of a villain whose master plan has finally succeeded after a myriad trials and tribulations. You see the resolve in his eyes and know he's going to pull the trigger. You don't run or cower, but close your eyes and try to summon some semblance of inner peace. \n\t\t\n\t\tIf death is inevitable, standing tall and sparing a friend may not be the worst way to go. You try to remind yourself that you chose this for the right reasons. Then there are several [i]bangs[/i] of silenced gunshots, and flashes of sparks you can see through your eyelids in the gloom. You stiffen, gritting your teeth, bracing yourself for metal tearing through you.\n\t\t\n\t\t${helper} cries out in anguish. Yet when you open your eyes, staring down at yourself in disbelief, you find no bullet hole and feel no pain. Clutching at your chest, your whole body filled with pins and needles, you struggle to catch your breath. You stare at Larry in bewilderment, too shocked to say more than, \"The gun was empty all along?\"\n\t\t\n\t\tLarry grins, but the grin is strangely not as nasty as you suspected. \"Empty all along, just like my soul. Or maybe not, considering I spared your ass. I'll admit, I was hoping you would piss your pants in fear, but I admire your bravery nevertheless.\"\n\t\t*goto empty\n\t\t\n\t\t*label deception_bullet\n\t\t*set deception_bullet true \n\t\t*set deception +2\n\t\t*set intimidating +1 \n\t\t*set tough +1 \n\t\t*set larry +1\n\t\t*if (tough_grave)\n\t\t\t*set baxter -5\n\t\t\t(Baxter Disapproves)\n\t\t*if (charisma_grave)\n\t\t\t*set azure -5\n\t\t\t(Azure Disapproves)\n\t\t*if (intelligence_grave)\n\t\t\t*set tariano -5\n\t\t\t(Tariano Disapproves)\n\t\t*if (deception_grave)\n\t\t\t*set aurora -5\n\t\t\t(Aurora Disapproves)\n\t\t(+2 Deception, +1 Intimidating, +1 Tough, Larry Approves)\n\t\t*line_break \n\t\tSurely, Larry must be bluffing. He might be unhinged, but he has already used blank shots before. Yet the possibility of the gun really being loaded, of his bullet finding your heart and snuffing out your life early and brutally and so very finally, engages in you a kind of self preservation that overrides all other considerations, even for someone you care about. \n\t\t\n\t\tYou hang your head, unable to look at ${helper}. \"I don't want you to shoot anyone, but don't shoot me, dammit. I'm not to blame for all of this.\"\n\t\t\n\t\tLarry immediately, almost gleefully levels the gun back at ${helper}. \"So, ${helper}, then?\" he says, eyes glinting with anticipation, eyebrows raised high expectantly.\n\t\t\n\t\tYou can't maintain Larry's gaze now and have to look away in silence. The silence stretches on until Larry laughs acerbically in delight. You glance over at ${helper} and wish you hadn't. \n\t\t*if (tough_grave)\n\t\t\tBaxter is looking at you with a disturbed, crestfallen expression, his brow furrowed, his upper lip curled, his jaw agape. \"What the hell, ${name}?\" he practically whines like a lost puppy. \"I came back for you...\"\n\t\t*if (charisma_grave)\n\t\t\tAzure is looking at you like you might have expected her to look at Kanibor or his ghost: with abject horror and disbelief. \"I came back for you...\" she utters, shaking her head, taking a half step back. \n\t\t*if (intelligence_grave)\n\t\t\tTariano is staring at you with an expression of betrayal so distilled that it's painful to behold. His eyes are haunted, his mouth hanging open as he shakes his head. \"I came here to help you,\" he says, his voice barely a croak.\n\t\t*if (deception_grave)\n\t\t\tAurora is looking at you like you just snatched the gun from Larry and pulled the trigger on her yourself. As if reading your mind, she glares daggers at you, tears burning in her eyes, and utters breathlessly, \"Why don't you just shoot me yourself, ${name}?\"\n\t\t\n\t\tLarry laughs at you, a spiteful, hateful, maddening laugh that makes your blood boil. Yet you're powerless to stop him as he adjusts his aim at ${helper} and pulls the trigger several times with muted [i]bangs[/i] and snapping sparks. Your whole body tenses, your guts turn freezing cold as you watch in horror, expecting ${helper} to drop with screams of pain. \n\t\t\n\t\tYet ${helper} just stands there in shock, clutching at ${helper_his} chest, looking down for wounds that aren't there. You can only stare in shock for a moment before your disbelief turns to rage. You wheel on Larry, words ready to fly like daggers from your lips, but he interjects, waggling his still smoking pistol with a gloating smile. \"Lucky for the fool you just betrayed, my gun was empty all along.\"\n\t\t*goto empty \n\t\t\n*label empty \n*page_break ...\n\n*if (tough_bullet)\n\t${helper} only releases you when Larry has crawled, still giggling mockingly, away to his car. Maybe Larry was laughing because your blows, hampered by extreme fatigue, were largely ineffectual. He pulls himself to his feet, and you see that unfortunately he only has a bloody lip and some bruises and scrapes to show for torturing you and ${helper}.\n\t\n\t${helper} keeps trying to reassure you, but ${helper_his} words only assuage you mildly. If you weren't down to your last drop of energy, you would probably still be interrogating Larry with your fists. \"You shouldn't be so surprised,\" Larry pants. \"I told you I'm crazy, and you deserved what you got.\"\n*if (charisma_bullet)\n\t\"No!\" you shout.\n\t\n\tYou watch in horror, expecting gore to explode from Larry's skull as the bullet impacts. Yet he only flinches from the flash of sparks and the dampened bang. It takes you a few seconds of shock to realize that it was yet another blank. He keeps on pulling the trigger over and over, creating a repetitive, futile clicking noise. \n\t\n\tLarry collapses to his knees, sagging in defeat as a sob escapes his lips. \"I don't care anymore. My whole life has been for nothing.\" Yet when ${helper} starts to approach, he scrambles away with a paranoid visage. His voice is husky and slurred with emotion. \"Stay the hell away from me.\"\n*if (intelligence_bullet)\n\tIt almost feels like you're floating as your surging adrenaline starts to plummet, and pins and needles spread throughout your whole body. ${helper} is laughing and crying tears of happiness, and meanwhile Larry still wears a strange, almost proud sort of grin on his face that makes you want to punch him repeatedly. \"Why did you do all of this just to spare me?\" you demand.\n\t\n\tLarry is backpedaling towards his car, still wearing that condescending look of a tutor lecturing a clueless student on didactics. \"Isn't it obvious? I may hate you, but I still love [i]my[/i] dumbass. I wanted to teach you as severe of a lesson as possible without actually murdering you, as satisfying as that would have been.\" \n*if (deception_bullet)\n\tBefore you can repay the favor and strangle him to death, Larry scampers away to his car with a gloating laugh. You steal a nervous glance at ${helper} but ${helper_his} expression is stormy and cold, and ${helper_he} won't even look at you. Larry put you in an impossible situation on purpose, and now he may have destroyed your relationship with ${helper}.\n\t\n\tYou have so many things you want to explain to ${helper} and so many things you want to rage at Larry that all you can do is stay silent with impotent disgust. \"Why the long faces?\" he laughs. \"You should be happy that ${helper} is still alive after you threw ${helper_him} to the tigers. This one turned out to be a bit of a paper tiger, incidentally, but that had nothing to do with you.\"\n\nYour mind is still reeling from the realization that all of this-being kidnapped and threatened with death at gunpoint, being made to choose between your life and another's-was all some elaborate, cruel charade. Larry has now retreated halfway into the safety of his car, and he wields his pistol like a club in warning lest anyone come after him. \n\nLarry starts his car's engine with a spluttering roar and bathes the cemetery with his headlights, stinging your eyes. \"I'm going to call all of us even,\" he announces loudly. \"I got my version of justice, and you got your fame and riches and wonderful camaraderie and all of that fucking jazz.\"\n\nHe's already starting to edge the vehicle away as he shouts out the window, \"Call the police about my crimes against you if you want. I wouldn't blame you. But be prepared to explain to them and everyone else all about Kanibor and the Necrophone. I'm returning to his grave right now to perform a very early exhumation. His corpse will be my evidence.\" He flashes a rueful, almost sad sort of smile. \"I'm sorry...for everything. Maybe in another life, huh?\"\n\nThen he flips a rapid u-turn and peels off down the narrow cemetery road, swerving and burning rubber.\n\n*page_break \n\nFor several moments, you and ${helper} can only stand there as the dust and smoke settle. Kanibor watches the faded red sedan recede into the distance impassively, his tail curled around his feet and twitching nonchalantly. Larry's words rattle around in your head. Can he really get away with everything just because he thinks he has some kind of trump card? \n\nYou chase those disturbing thoughts away for now and hurry to ${helper}. You tell ${helper_him} how so relieved you were when ${helper_he} literally came back from the grave with Kanibor.\n*if (tough_bullet)\n\tThe two of you embrace at a run, clutching onto one another hard. It's so hard to believe that both of you are still okay after everything you endured. \n\t*if (tough_grave)\n\t\tBaxter laughs loudly, giving you another spine-cracking hug. \"You're my fucking hero. You were like a barbarian warrior, charging into the barrel of a gun like that.\"\n\t*if (charisma_grave)\n\t\tAzure is looking at you in marvel, a pearly white grin plastered to her dirty face. \"You're crazy. That was literally the bravest thing I have ever seen.\"\n\t*if (intelligence_grave)\n\t\tTariano looks at you with such pride and admiration that you're almost embarrassed. \"You, ${name}, because of your incredible bravery and courage have now, as they say, won life.\"\n\t*if (deception_grave)\n\t\tAurora mimes punching you several times on the arm in celebration, and you greatly appreciate her restraint. \"You were so unbelievably amazing!\" she cries. \"I literally owe you my eternal gratitude.\"\n*if (charisma_bullet)\n\tThe two of you embrace, holding onto one another and laughing with relief. You have both experienced so many hairpin turns at breakneck speeds that it's a joy just to be alive and together again. \n\t*if (tough_grave)\n\t\tBaxter ruffles up your hair affectionately. \"You're like a freaking empathetic genius or something. I honestly almost feel bad for Larry but you really saved our asses.\"\n\t*if (charisma_grave)\n\t\tAzure grabs onto your shoulders, looking up at you in marvel. \"I can't believe you did that. You were like some guardian angel for me and poor crazy Larry all at once.\"\n\t*if (intelligence_grave)\n\t\tTariano can't stop shaking his head in wonderment. \"I can't believe you managed to talk sense into [i]Larry[/i]. You were like, one with nature, your brain and soul firing on all cylinders.\"\n\t*if (deception_grave)\n\t\tAurora looks about ready to burst into tears but wears a beaming smile. \"Thank you for showing compassion to that raging idiot. I knew it was the only thing that would work on him. You may sing like a demon straight out of hell but you're honestly an angel.\"\n*if (intelligence_bullet)\n\tThe two of you embrace at a run, laughing and clutching onto one another. At one time or another, you both thought the other was dead for sure. \n\t*if (tough_grave)\n\t\tBaxter shakes his head at you like a scolding father. \"You gave me a fucking heart attack, ${name}. That was honestly the most selfless thing I have ever seen.\"\n\t*if (charisma_grave)\n\t\tAzure pats you all over as though looking for unnoticed bullet holes. \"You're literally the bravest person I have ever met. I mean, sacrificing yourself for little old [i]me?[/i] Instant sainthood.\"\n\t*if (intelligence_grave)\n\t\tTariano is looking at you like you're a whole different person, his eyes filled with such admiration and pride that you have to look away. \"That was literally the most courageous thing I've ever seen. I think you just achieved enlightenment.\"\n\t*if (deception_grave)\n\t\tAurora looks at you with eyes glimmering with tears and gratitude. \"You're seriously my hero. I still feel like this is all my fault, yet you sacrificed yourself for me? Instant sagehood.\"\n*if (deception_bullet)\n\t${helper} nods stiffly but doesn't embrace you despite your cautious invitation, still barely looking at you. \"Me too,\" ${helper_he} mutters. \"Look, let's not talk about that bullet for now, by the way. Maybe not ever.\"\n\t*if (tough_grave)\n\t\tBaxter kicks at the ground, scuffing his shoes against the dirt. \"I guess this is what I get for wishing on stars for my success.\"\n\t*if (charisma_grave)\n\t\tAzure rubs her face in exasperation. \"I just want to go back to the hotel, take a boiling hot shower, and forget this night ever happened.\"\n\t*if (intelligence_grave)\n\t\tTariano looks as weary as a two hundred year old man. \"I honestly just want to go back to the hotel and smoke until I pass out, and try to forget this night ever happened.\"\n\t*if (deception_grave)\n\t\tAurora looks as exhausted as if she had never slept. \"Maybe with enough therapy, or enough drinking, I can forget about tonight.\"\n\n\tYou nod grimly in acquiescence. You want to explain, to try to make it less of a terrible gut punch for ${helper_him}, but that will have to wait for another time. \n\t\nWith little else to do here in this grim place, you and ${helper} set off down the road. You're lost in this giant, dark graveyard, but if you can find the gate, you can follow it back to your rental. Kanibor follows you almost listlessly, drifting around scraggly trees and hanging back in the gloom, yet he follows you all the same, as you somehow knew he would. \n\nYou're so deliriously exhausted by the time you locate the vehicle that you fleetingly wish it could drive itself. As if that will ever happen. They've been promising hoverboards for decades without delivery. You drive through your bleariness and ${helper} navigates again. Your phone is still in Larry's possession and ${helper}'s is broken so the others won't know what happened until you return.\n\n${helper} is mostly silent on the road, which gives you the luxury and curse of being alone with your own thoughts. These past several weeks have been a fever dream, and this was the climax. A part of you still can't believe what happened with Larry, but you suppose in a twisted way, the signs that he would inevitably snap were littered everywhere. It's difficult to know what to think or feel, but two thoughts stick in your head. \n*label conclusions \n*if conclusions > 0\n\t\n\tWhat else are you thinking?\n*choice \n\t*hide_reuse #You feel you have grown tremendously in character over the past weeks through your perseverance \n\t\t*goto tough_empty\n\t\t\n\t*hide_reuse #It's funny how a journey so steeped in desperation, blood, and betrayal lead to so much compassion from both strangers and enemies\n\t\t*goto charisma_empty\n\t\t\n\t*hide_reuse #You have realized how much of one's quality of and direction in life is truly determined by their thoughts\n\t\t*goto intelligence_empty\n\t\t\n\t*hide_reuse #You have realized that privacy and secrets, while sometimes valuable, can also stoke bitterness and resentment \n\t\t*goto deception_empty \n\t\t\n\t\t*label tough_empty \n\t\t*set tough +2\n\t\t*set intelligence +1\n\t\t*set rebellious +1\n\t\t*set conclusions +1\n\t\t(+2 Tough, +1 Intelligence, +1 Rebellious)\n\t\t*line_break \n\t\tYou recall how much different your life was only a few weeks ago. Something about your past life now possesses a certain nostalgia perhaps associated with its quaint charm. Yet you mostly feel bitter, almost ashamed of the life you were leading, or more accurately, being dragged along on by outside forces.\n\t\t\n\t\tYou were overworked, underpaid, and underappreciated at your dead end job, yet too scared to leave for years because of the uncertainty of life. You let your fear of being judged for your malfunctioning, admittedly not pretty vehicle prevent you from getting out.  \n\t\t\n\t\tYou should have been living life, and making more friends to replace the ones you had gradually lost over the natural passage of time. You suppose it took such a cataclysmic catalyst as a meteorite crash to propel you into action, into taking control of your life no matter what disaster occurred next. \n\t\t\n\t\tIf you can handle Kanibor draining your blood; Larry meddling with you at every turn, kidnapping you and threatening you with murder; and the chaos of being a death metal singer with a possessed mic, with bravery and dignity, than the rest of life doesn't seem so daunting anymore. \n\t\t\n\t\t${helper} seems to notice that you're deep in thought and says, as if reading your mind, \"You know, we probably did about a decade of living in just a couple months.\"\n\t\t*if (tough_grave)\n\t\t\tBaxter grins, his visage brilliant despite being covered in dirt. \"Me personally, I feel like we can do anything after that.\"\n\t\t*if (charisma_grave)\n\t\t\tAzure tiredly exhales air through her lips like a horse whinnying. \"I think I'll be okay if I never see much excitement again.\" She giggles. \"I guess I'm in the wrong career field.\"\n\t\t*if (intelligence_grave)\n\t\t\tTariano leans his head back on the headrest and closes his eyes. \"Life is chaotic and cruel, but beautiful. If you can go through its trials with dignity, that's all you can ask for.\"\n\t\t*if (deception_grave)\n\t\t\tAurora giggles excitedly. \"Just think about all the wonder and beauty and living we'll have to cram in our lives to make up for this bullshit.\"\n\t\t\t\n\t\tYou smile tiredly. \"I think you're right.\"\n\t\t*if (conclusions \u003c 2)\n\t\t\t*goto conclusions \n\t\t*goto ghost \n\t\t\n\t\t*label charisma_empty \n\t\t*set charisma +2 \n\t\t*set chill +1\n\t\t*set intelligence +1\n\t\t*set conclusions +1\n\t\t(+2 Charisma, +1 Chill, +1 Intelligence)\n\t\t*line_break \n\t\tIt strikes you as amazing how you suffered so much selfishness and cruelty yet were shown so much compassion and mercy, more than you had ever experienced, more than you ever knew was possible, since this whole meteoric journey began. Your band members all showed you remarkable friendliness and openness from the beginning.\n\t\t\n\t\tThey even supported you with so much understanding when they found out you were hiding the truth for so long. Kanibor, despite luring you into a dangerous and abusive relationship and sucking your blood, lead ${helper} to you and Larry when your life was being threatened and you thought you were completely alone. \n\t\t\n\t\tYou peer in the rear view mirror to see him floating along, and you itch to ask him so many questions. Even Larry, who tried to turn you away at the door, attacked you, stole your mic, stalked you, and even drugged and kidnapped you, ultimately showed you a twisted sort of mercy by still sparing your life. \n\t\t\n\t\tYou may never be able to fully understand or forgive Larry for what he has done to you, but a part of you will always remember that. ${helper} evidently notices that you're having a reverie because ${helper_he} nudges you on the shoulder. \n\t\t\n\t\t\"Call me crazy, but I honestly feel bad for Kanibor and Larry. Even Effie.\"\n\t\t*if (tough_grave)\n\t\t\tBaxter grins. \"You may be an asshole magnet, but you have an uncanny knack for somehow still keeping your luster while also influencing assholes to be slightly less terrible.\"\n\t\t*if (charisma_grave)\n\t\t\tAzure smiles and folds her hands behind her head in a self-satisfied, relaxed position. \"But I guess at the end of the day, getting your happiness from dominating others is pretty artificial.\"\n\t\t*if (intelligence_grave)\n\t\t\tTariano smiles very brightly, his eyes twinkling. \"But there's nothing as satisfying as the inner peace you get from acting how you wanted to act, despite all the Larrys, Kanibors, and Effies out there.\"\n\t\t*if (deception_grave)\n\t\t\tAurora shrugs with a bemused sort of expression. \"Yet all the things those people put you through make you think about the kind of person you want to be, and the ways you want to look at life, don't they? You don't ever want to be like them at their worst.\"\n\t\t\t\n\t\tYou smile tiredly. \"You're definitely right about that.\"\n\t\t*if (conclusions \u003c 2)\n\t\t\t*goto conclusions \n\t\t*goto ghost \n\t\t\n\t\t*label intelligence_empty \n\t\t*set intelligence +2\n\t\t*set tough +1\n\t\t*set mysterious +1\n\t\t*set conclusions +1\n\t\t(+2 Intelligence, +1 Mysterious, +1 Tough)\n\t\t*line_break \n\t\tYou recall with chagrin how limiting your own mindset was only a few weeks ago, how it had atrophied to that state over the years. Life itself and society in general may have landed you in an unpromising position and offered little help, yet your own fear of change, of failing, of admitting and address your own faults and shortcomings, were what really trapped you in your prison of loneliness and poverty. \n\t\t\n\t\tIt took being fired from your job, your car malfunctioning beyond hope of repair, and an otherworldly microphone being practically thrust into your lap to propel you into action, into fixing your own life. Yet you also saw how bitterness, jealousy, and selfishness could also destroy the lives of the ones wielding those insidious tools. \n\t\t\n\t\tEffie, despite all worldly appearances to the contrary with her career, family, and community, may never truly be happy inside, and it shows in her treatment of others. Kanibor suffered in his short life and endured so many obstacles and setbacks that may have been easier to overcome if he had communicated and cooperated with you instead of simply using you and trying to fend for himself. \n\t\t\n\t\tMost of all, Larry traumatized an entire band and destroyed his own future and relationships because his perspective and methods were fundamentally antagonistic and distorted. Had he simply taken other, more compromising avenues, you could even have imagined him as a second singer in ${band}, complimenting your style instead of being replaced out of ugly necessity.\n\t\t\n\t\t${helper} apparently notices you pondering. \"This whole ordeal makes you think differently about everything, doesn't it?\" ${helper_he} says, peering over at you curiously. \n\t\t*if (tough_grave)\n\t\t\tBaxter whistles lowly. \"I am investing in squashing any inkling of anger issues. I'm talking anger management classes, therapy, incense, meditation, philosophy, the whole nine yards. I don't ever want to turn out like Larry.\"\n\t\t*if (charisma_grave)\n\t\t\tAzure giggles sheepishly and slaps a hand to her mouth. \"You know, I encouraged Aurora's \"recruit Larry\" idea against my better judgment because I wanted to be a good best friend. Bad idea, obviously. I'm seriously always speaking my mind now.\"\n\t\t*if (intelligence_grave)\n\t\t\tTariano smiles. \"Ironically, I think my struggling mental health will actually improve after this. I want to come out stronger and wiser, not complaining or hiding from the world because it's scary like I used to.\"\n\t\t*if (deception_grave)\n\t\t\tAurora gives you a knowing sort of smile. \"You know, I have ignored my gut so many times in life and it has always gotten me into trouble and dragged the ones I cared about along the way. I think I'm going to trust my gut more. I owe myself that much.\"\n\t\t\t\n\t\tYou smile. \"Good idea. There's a lot I'm going to change, too.\"\n\t\t*if (conclusions \u003c 2)\n\t\t\t*goto conclusions \n\t\t*goto ghost \n\t\t\n\t\t*label deception_empty \n\t\t*set deception +1\n\t\t*set charisma +2\n\t\t*set chill +1\n\t\t*set conclusions +1\n\t\t(+1 Deception, +1 Chill, +2 Charisma)\n\t\t*line_break \n\t\tIt's hard now, after everything is finally over, not to see the dishonesty, miscommunication, and general lack of communication pervading it all like a blanket of smog over a miserable city. You wish you had handled so many things differently. You wish ${band} had handled the drama better, but then again, what could you expect?\n\t\t\n\t\tIt was everyone's first time being in a real, professional band, and events were occurring at such breakneck speeds that you barely had time to orient yourselves, let alone plan out everything meticulously and harmoniously. Yet, you should have tried. The blunders that seemed so complex then seem so obvious now. \n\n\t\tYou could have informed the other band members of Larry sabotaging you; maybe they could have mediated. Perhaps if you had talked with Larry, he wouldn't have felt so threatened and territorial. Kanibor never made anything easy on you either, supplying bare minimum information for you and causing you so many struggles and crises with his feeding. \n\t\t\n\t\tYou think about how Larry may never have been able to steal the Necrophone from you if Kanibor hadn't overfed on you in the bar bathroom. It's enough to make you sigh wearily and shake your head repeatedly. You may always be a private person in some regards, but secrets are insidious, and have a tendency to fester. From now on, you want to speak your mind and be brave enough to ask for help.\n\t\t\n\t\t${helper} clearly notices you ruminating because ${helper_he} sets the map aside and pokes you very lightly on the arm. \"You know what I've been thinking about? Our communication as a band kinda sucked. To put it mildly.\"\n\t\t*if (tough_grave)\n\t\t\tBaxter rubs the back of his head guiltily. \"I was honestly a major asshole to Larry, and technically, I was the one who officially, verbally fired him. Even if he may have deserved it at that moment, I only caused more friction. I want to be more forgiving of people in the future, you know?\"\n\t\t*if (charisma_grave)\t\n\t\t\tAzure shrugs sheepishly. \"I mainly voted for Larry to support Aurora. Not exactly voting with your heart there. And I kept my mouth shut at all the red flags, hoping they would blow over. I don't want to be such a people pleaser anymore.\"\n\t\t*if (intelligence_grave)\n\t\t\tTariano massages his forehead as he continues. \"I honestly think we ought to have a band meeting to establish rules and standards to avoid future avoidable disasters. I mean, we are a democracy, after all.\"\n\t\t*if (deception_grave)\n\t\t\tAurora blows air through her lips. \"Me most of all, obviously. I kinda just stood around like a coward and let Larry fly off the rails and allowed the rest of the band to fire him without ever stepping in and trying to compromise. I don't want to be so indecisive anymore.\"\n\t\t\t\n\t\tYou nod thoughtfully. \"I think there's a lot I'm going to change, too.\"\n\t\t*if (conclusions \u003c 2)\n\t\t\t*goto conclusions \n\t\t*goto ghost \n\n*label ghost \n*page_break \n\nYou are maneuvering around the winding turns of the road hugging the river when Kanibor suddenly floats into view ahead. His ethereal, silver glow is enhanced by the tendrils of fog drifting above the asphalt. You brake gently, coming to a halt a few feet away from him. You and ${helper} exchange meaningful glances and then get out of the vehicle together. \n\nYou suddenly feel paranoid that another motorist will come along this lonely way and witness the ghostly creature. Yet does it really matter? Kanibor isn't trapped inside a microphone or a failing mortal body now; he's not your responsibility anymore, and no one can alter a ghost's path. If someone see's him, they see him.\n\nJust as these thoughts cross your mind, you realize as Kanibor floats closer that he is trailing ethereal, gossamer strands of himself that curl into tendrils and disappear. He seems to be gradually diminishing before your eyes. \n\nKanibor laughs at the shocked expressions on your faces, a distinctly joyful sound that nevertheless rattles your bones. [b]\"Why the regret? This is my decision to pass on as a ghost, one I can only make now or never. Eternal wandering or eternal rest? I'm tired and all I dream for is rest. Warmth, peace, and nothing beckon me.\"[/b]\n\n*if (tough_grave)\n\tBaxter's expression is disturbed and filled with bewilderment, his eyes wide and his mouth pulled into a grimace. \"Wait, you're never coming back? You could live forever and you're throwing that away?\"\n*if (charisma_grave)\n\tAzure gasps and slaps a hand to her mouth in horror, her eyes flitting after the fleeting spiritual energy. \"But there so many wonderful things to learn and see out there,\" she protests. \"What if you're giving up too early? I promise the world isn't as ugly as you've seen it to be.\"\n*if (intelligence_grave)\n\tTariano's eyes widen in shock, but then his expression softens, and a knowing smile crosses his lips. \"You deserve your rest, Kanibor. Thank you from the bottom of my heart for getting me out of that grave when I didn't want to get up. Feel that warmth, be at peace.\" \n*if (deception_grave)\n\tAurora's eyes are swimming with tears but she wears a beaming smile. \"I'm sorry you have to go,\" she says, sniffling. \"But I'm so happy for you. And thank you for helping me back at that grave when I couldn't find the strength to get up.\"\n\t\n*page_break \n\nKanibor acknowledges ${helper} tolerantly but doesn't reply. It's clear he only has a limited amount of time, becoming smaller and dimmer by the second. He locks his black eyes on you, and you feel drawn closer to him as though by a tractor beam. \n*if (tough_empty)\n\tYou think about how, a cruel yet effective teacher, he instructed you to become tougher. \n*if (charisma_empty)\n\tYou think about how he chose you somehow to take the Necrophone, and how he brought ${helper} to help you.\n*if (intelligence_empty)\n\tYou think about how much more free and in control you feel now that you're more intentional and productive with your thoughts; you think about how utterly in control he must be to allow himself to end tranquilly. \n*if (deception_empty)\n\tYou think about how many struggles and obstacles your partnership faced, and how differently your short time with him may have been had there been more cooperation.\n\t\n*if ((tough_comfort) or (charisma_comfort))\n\tTo your surprise, Kanibor begins to purr his landslide purr, and he blinks very slowly at you several times in an obvious display of friendship. \"[b]If you helped me as a caterpillar into my chrysalis so that I may transform into a butterfly, I have watched you blossom into a brave, caring creature when at first you were meek and hardly able to fend for yourself. What is better in the world than gentle strength?\"[/b]  \n\t\n\tYou find your throat is lodged with a peach core, that you don't want Kanibor to go. You still have so many questions you want to ask him. You never thanked him for anything. Water glistening in your eyes, you can only manage, \"Thank you for everything, Kanibor.\"\n*if ((intelligence_comfort) or (deception_comfort))\n\tYou were equally as surprised to see Kanibor's ghost as you were to see him helping you by bringing ${helper}. You expected him to haunt you and punish you for not helping him as he died. Yet he seems to be unmistakably smiling at you with those vampire fangs. \"[b]I cursed you, and you survived the curse, didn't you? I feel no ill towards you now. I feel only inner calm and warmth.\"[/b]\n\n\tYou open your mouth and then shut it again several times, unsure of what to say, knowing there's no time to say it. \"Goodbye, Kanibor,\" you finally manage. \n\nBefore your very eyes, Kanibor begins to disassemble like a computerized animation being reduced to vanishing pixels. His ghost separates painlessly, instantly into countless pieces. The pieces blur, shift, and brighten momentarily and then burst into ethereal dust, dropping and scattering and disappearing into the darkness. \n\nA second later, all traces of him are gone. \n*if (tough_grave)\n\tBaxter clutches at his head, pacing, and then suddenly takes a seat on the ground. \"I think I'm going to need a minute to process what just happened.\"\n*if (charisma_grave)\n\tAzure waves her hands in the air where he was just a moment before, her eyes haunted. \"I never knew ghosts existed. And I never knew they could die,\" she says in a hushed tone.\n*if (intelligence_grave)\n\tTariano sniffles, his eyes brimming with tears, but then brushes them away and smiles, proudly puffing out his chest. \"He had inner peace before death, ${name}. No fears, guilt, regrets, crying, pain, begging, no wondering and fearing what's next or what isn't. That's exactly how I want to go.\"\n*if (deception_grave)\n\tAurora's eyes are glistening with tears but she almost angrily brushes them away and forces herself to smile bravely. \"It's what he wanted, ${name}. And dammit, I wanted it for him, too.\"\n\t\nHeadlights on the road behind you in the distance compel you and ${helper} to get back in the car and keep driving. You drive mechanically, your thoughts a swirling torrent. \n*choice \n\t#You grip the steering wheel hard, suddenly viscerally angry at the thought of Larry defiling Kanibor's corpse\n\t\t*goto tough_ghost \n\t\t\n\t#You cry tears of happiness for Kanibor. He finally found the freedom and peace he wanted all along\n\t\t*goto charisma_ghost \n\t\t\n\t#You'll allow yourself to grieve appropriately, yet you realize now that this was all according to Kanibor's nature\n\t\t*goto intelligence_ghost \n\t\t\n\t#You do your best to focus on your physical surroundings, pushing the torrent of overwhelming emotions back for a better time\n\t\t*goto deception_ghost \n\t\t\n\t\t*label tough_ghost \n\t\t*set tough_ghost true \n\t\t*set tough +2\n\t\t*set charisma +1\n\t\t*set rebellious +1\n\t\t(+2 Tough, +1 Charisma, +1 Rebellious)\n\t\t*line_break \n\t\tThe leather steering wheel creaks and groans under your tightening grip as your anger rises, making ${helper} glance over in concern. You just spent several hours of back breaking work to give Kanibor a proper, safe place for his body to rest, only for Larry to exhume him only hours later. \n\t\t\n\t\tYou shake your head bitterly. 'Exhume' is even generous, given you didn't even have time to fill the grave with dirt. You have half a mind to whip the vehicle around and try to find Larry, but you know that's only the outrage talking. \"You okay?\" ${helper} asks.\n\t\t\n\t\tSlackening your grip on the steering wheel, you loosen your shoulders, exhaling tiredly. \"Just thinking about Larry getting a hold of Kanibor's body. What do you think he'll do with it, taxidermy?\"\n\t\t\n\t\t*if (tough_grave)\n\t\t\tBaxter guffaws before snapping his mouth shut guiltily and clearing his throat. \"Yeah, maybe. That would not be funny. But what can we do about it? He got us there.\"\n\t\t*if (charisma_grave)\n\t\t\tAzure groans and lays her forehead into her palm, shaking her head. \"Oh, I did not need that image in my head. I really hope not but you probably just jinxed it.\"\n\t\t*if (intelligence_grave)\n\t\t\tTariano cringes, pulling his lips back. \"That image is going to fuel my nightmares even more. I really hope not, although would deconstructing his skeleton be any better?\"\n\t\t*if (deception_grave)\n\t\t\tAurora snorts and shakes her head reassuringly. \"I highly doubt it. Larry may be one of those weirdos who digs taxidermy but that doesn't mean he's got the actual skills.\"\n\t\t\n\t\tSomehow ${helper}'s response makes you feel better. Your anger dies down to embers and then extinguishes, leaving you even more dead tired than before. Yet if there's anything Larry has taught you, there's little more poisonous than impotent rage. You may have a chance to do something about it later, but for now, you let it go.\n\t\t*goto epilogue \n\t\t\n\t\t*label charisma_ghost \n\t\t*set charisma_ghost true\n\t\t*set charisma +2\n\t\t*set chill +1\n\t\t*set intelligence +1\n\t\t(+2 Charisma, +1 Chill, +1 Intelligence)\n\t\t*line_break \n\t\tWarm water leaks from your eyes and down your cheeks, yet you can't stop smiling. The tears fall freely, glistening in your eyes and blurring your vision until you have to wipe them away to avoid crashing. ${helper} looks at you with concern, saying softly, \"Are you okay, ${name}?\"\n\t\t\n\t\tYou bob your head reassuringly, sniffling as you say, \"Don't worry, they're tears of happiness. I wanted him to find peace and happiness somehow, and it was obvious lingering as a ghost on a strange world that never offered anything for him would never give him that.\"\n\t\t\n\t\t*if (tough_grave)\n\t\t\tBaxter nods understandingly and pats you supportively on the shoulder, although he doesn't seem to know what to say. \"He did seem so content by the end,\" he murmurs. \n\t\t*if (charisma_grave)\n\t\t\tAzure beams at you, her chin quivering with emotion. \"Oh, gosh, you're going to make me cry too. I still don't understand not wanting to live forever but it's beautiful that he's free.\"\n\t\t*if (intelligence_grave)\n\t\t\tTariano smiles warmly and pats you reassuringly on the arm. \"He went peacefully, even blissfully. He suffered so much, yet had a perfect death. I know that sounds morbid, but I think it's beautiful.\"\n\t\t*if (deception_grave)\n\t\t\tAurora nods avidly and stretches over to give you a brief, warm hug on the shoulder. \"Oh, ${name},\" she says, voice husky with emotion. \"It's the ending I wanted for my sweet Nutmeg. And you helped give it him, you angel.\"\n\t\t\n\t\tJust talking about it with ${helper} is already making you feel better, like the flood of your emotions has somewhere to go instead of roiling inside you. Blinking the last of your tears away, you let out a great sigh and put on a brave face. Kanibor wasn't sad, so why should you be?\n\n\t\tThis whole dark, incredible journey has made you think a lot about death. From your band's lyrics  and genre revolving around death, Larry's homicidal and suicidal tendencies, your own struggles grappling with depression; and Kanibor dying, turning into a ghost, and then passing, thoughts of death in some form have been inescapable. Yet if you have learned anything from all of this, it's that it's not death that's worth fearing, but a life wasted.  \n\t\t*goto epilogue \n\t\t\n\t\t*label intelligence_ghost \n\t\t*set intelligence_ghost true \n\t\t*set intelligence +2\n\t\t*set charisma +1\n\t\t*set mysterious +1\n\t\t(+2 Intelligence, +1 Charisma, +1 Mysterious)\n\t\t*line_break \n\t\tA part of you aches with sadness over Kanibor's sudden passings, one after the other in short succession, both of them like cold splashes of water. Yet the realization, the growing understanding that the bizarre struggles and phases he went through were seemingly natural and inevitable, provide you a peace of mind.\n\n\t\tYou think you're starting to understand more and more what may have really been happening all along. The puzzle pieces seem so obvious now that they're washed of blood. Kanibor's lifespan was always very short. He likely was confined in the Necrophone for too long, Larry's meddling, and the underground nature of your genre, surely playing rolls in it taking longer than overnight as promised for you to reach stardom.\n\n\t\tYou imagine a caterpillar struggling to survive in a rotting chrysalis that wouldn't open, forcing down sustenance that became increasingly toxic and intolerable, and waiting. Memories of Kanibor regurgitating your blood onto the bathroom floor produce goosebumps all over your body, and you shiver. \n\t\t\n\t\tKanibor aging onto death's doorstep overnight was a shock, given his size, mammal characteristics, and how alert and strong underneath he seemed to be. Yet you think of the fly, destined to live for only a day or two before succumbing to old age. His adult, complete form was his ghost, and he shed that ethereal form without hesitation, with such grace and dignity that you can't pity him.\n\t\t\n\t\t${helper} notices you deep in contemplation again, glancing over at you a couple times curiously. \n\t\t*if (tough_grave)\n\t\t\tBaxter states matter of factly, \"You're thinking about Kanibor.\"\n\t\t\t\n\t\t\tYou nod. \"Yeah,\" you say quietly. \n\t\t*if (charisma_grave)\n\t\t\tAzure offers a sad smile. \"You're thinking about Kanibor, aren't you?\"\n\t\t\t\n\t\t\tYou nod. \"Yeah,\" you say softly. \n\t\t*if (intelligence_grave)\n\t\t\tTariano gives you a small, knowing sort of smile. \"Kanibor certainly was an anomaly. But my guess is, things were supposed to happen as they did.\"\n\t\t\t\n\t\t\tYou nod. \"I think you're right,\" you say quietly. \n\t\t*if (deception_grave)\n\t\t\tAurora sighs and lays her head back against the headrest, looking over at you. \"You're thinking about Kanibor too, aren't you?\"\n\t\t \n\t\t\t\"I am,\" you say, smiling softly. \n\t\t*goto epilogue \n\t\t\n\t\t*label deception_ghost \n\t\t*set deception_ghost true \n\t\t*set deception +2\n\t\t*set tough +1\n\t\t*set mysterious +1 \n\t\t(+2 Deception, +1 Tough, +1 Mysterious)\n\t\t*line_break \n\t\tYou have the distinct feeling that the human mind can only take so much stress and trauma before snapping into temporary insanity. If you try to process Larry and Kanibor now, you'll surely be overwhelmed by the tsunami of questions and implications and visceral emotions. You decide to go on autopilot for your own good; thinking can wait. \n\t\t\n\t\tWhen haunted by the past or the future, the only solution is to focus on the present. You take a deep breath, exhale slowly, and closely observe your surroundings. The windshield wipers squeak repetitively as they slide across the glass. The tires [i]swish[/i] along the wet asphalt. Tendrils of fog hang in the air, and you crank the window down an inch, enjoying the mist on your hot face.  \n\t\t\n\t\tJust sitting in this car feels like a luxury on your exhausted muscles after digging that grave. You chuckle when you realize that the interior of the vehicle is covered in dirt and mud, but you suppose rental fees are the least of your worries. The evergreen tree air freshener dangling from the rear view mirror doesn't mask you and ${helper}'s funk. \n\t\t\n\t\tYou glance over at ${helper} and realize that ${helper_he}'s asleep. You can't help but smile fondly. \n\t\t*if (tough_grave)\n\t\t\tBaxter is snoring very faintly, his head resting against the window. \n\t\t*if (charisma_grave)\n\t\t\tAzure is leaning back against the headrest, her hands folded in her lap and her expression peaceful. \n\t\t*if (intelligence_grave)\n\t\t\tTariano's hands are buried in his hoody pocket, and his hood is tightened snugly around his head as he dozes. \n\t\t*if (deception_grave)\n\t\t\tAurora is leaning back against the headrest, breathing very deeply in her sleep.\n\t\t\n\t\tYou can't wait to get back to the hotel. You're going to take a shower until the bathroom is a haze of steam. Then you're going to crawl into bed and sleep for as long as your body will allow you to. Your eyelids are starting to grow heavy. You roll the window down further, squinting through the mist. Just a little further. \n\t\t*goto epilogue \n\n*label epilogue \n*page_break A week later...\n\n[b]Epilogue[/b]\n\n${band} decided unanimously to cancel your supporting role on the Brain Rot tour to take care of personal emergencies. Barty and the fans alike were immensely disappointed, but taking the necessary time to recover in body, mind, and spirit from everything that happened seemed more important than all other obligations. Besides, for once, you've got time.\n\nTo send a message, Larry left a package each for you, Baxter, Azure, Tariano, and Aurora at your homes just two days after the event. Each package contained a single bone from a small creature. It was decided that it was too risky to call the police on Larry, despite everything he had done. \n*if (tough_ghost)\n\tYou buried the bone in a field where it would be safe. Your anger seemed to drain and seep into the soil as you deposited the last fragment of Kanibor into its resting place.\n*if (charisma_ghost)\n\tYou buried the bone in a field, unable to bear the thought of his skeleton being disgraced. Your heart was heavy that day, but your eyes were dry. Kanibor would love it here in this flowery, sunny meadow.\n*if (intelligence_ghost)\n\tYou buried the bone in a field. It would eventually degrade, enriching the soul and nourishing life. Kanibor always seemed to be a catalyst for positive change, and so he was even after death. \n*if (deception_ghost)\n\tYou didn't know what else to do with the bone except bury it in a random field. It wouldn't feel right to discard it like some fast food bone.\n\t\n*if (tough_bullet)\n\tTo your embarrassment, you're now something of a legend among your band members. ${helper} told everyone all about how you charged into Larry's gun. The memory still gives you shivers, but a sense of pride, too.\n*if (charisma_bullet)\n\tNo one could quite believe it when ${helper} told everyone how you managed to talk Larry down. Yet, looking back, it doesn't seem so surprising to you. Larry was crying out for help all along, just in all the wrong ways. \n*if (intelligence_bullet)\n\tTo your mild embarrassment, you're now something of a saint among your band members. ${helper} told everyone all about how you volunteered to be shot to spare ${helper_him}. As if any one of them would have done differently. \n*if (deception_bullet)\n\tTo your immeasurable relief, ${helper} evidently decided not to tell anyone about how you told Larry to shoot ${helper_him} instead. Despite this, ${helper_he} has been standoffish, and you wonder if your relationship will ever return to the way it was before.\n\t\nToday, you, Baxter, Azure, Tariano, and Aurora are having picnic in a park. The sky is baby blue, dotted with puffy white cumulus clouds. A large group of friends is playing volleyball in the sand with an imaginary net. A family is having a potluck at the gazebo, laughing and playing upbeat, traditional music with banjos and horns. The children chase one another around the park benches, sword fighting with sticks.\n\n*page_break \n\nThe mood at your picnic is not a somber or reserved one. After making it through such a gloomy, thorny forest, and escaping death, life itself feels precious, and your horizons feel boundless. Azure is wearing a sweater with crows that says 'Crows before bros: support your local murder'. She laughs almost too loudly as she throws grapes into Baxter's mouth. \n\nTariano lies on his back, sunbathing peacefully as Aurora teases him, having stolen his philosophy book. She reads it aloud in an obnoxious voice in between bites of her blueberry cream cheese bagel. \n*if (tough_walk)\n\tYou slip your flask from your pocket, taking a nice swig. Warmth rushes through you. But this time, it's not chasing cold away.\n*if (charisma_walk)\n\tYou brought a portable speaker, and you're playing the playlist you were listening to on your walk to the meteorite. Back then, it was a distraction, a respite; now, it's just a pleasant backdrop to perhaps the most important thing in life: the chatter and laughter of friends. \n*if (intelligence_walk)\n\tYou flip through the final page of your horror pocketbook. In the third tale, an extremist civilian gained access to military drones and bombed orphanages, hospitals, schools, neighborhoods, supply caravans, and medic convoys near a war zone. Harrowing stuff that you perhaps should have waited for a different time to read, yet you couldn't tear your eyes away. \n*if (deception_walk)\n\tYou reach into your fanny pack, taking out a chocolate chip granola bar to munch on. You savor it, thinking about how this used to be something you had to hide from Effie, or something you needed to comfort yourself during stressful times. Now, it's just a delicious granola bar.\n\n*if (barty \u003c= 50)\n\tIf Barty was already pissed off at you before, he probably wants to strangle you now for canceling your tour. Jokes on him, because you already got strangled on tour. \n*if (barty > 50)\n\tYou were pleasantly surprised when Barty sent you a few texts conveying well wishes. He even suggested you come to one of his legendary parties sometime.\n\n*if (kanibor \u003c= 50)\n\tYou hate to admit it, but you're relieved that Kanibor is gone. He was always such a source of anxiety, conflict, and pain. Now that there's no secrets to harbor, no blood to sacrifice, no mic to covet from greedy rivals, you feel much lighter. \n*if ((kanibor > 50) and (kanibor \u003c 55))\n\tYou never would have believed when you first discovered the Necrophone that you would miss the creature inside of it. Yet you find yourself thinking about singing together on stage, or the odd moments of warmth he showed. \n*if (kanibor > 54)\n\tYou think about Kanibor all the time. How incredible it was that he came from a meteor. How at first he seemed so repulsive and predatory, but showed such vulnerability, warmth, and intelligence when given a chance. \n\t\n*page_break \n\n*if (baxter \u003c= 50)\n\tA squishy grape bounces off the side of your head, and you look over at Baxter with a mild frown. He grins sheepishly and shrugs. \"Hey, you gotta keep your head in the game.\" He taps his head and then catches another grape in his mouth, saying, \"You're too in there and not out here.\"\n\t\n\tYou wipe the grape juice from your hair with a napkin. \"Duly noted.\"\n*if ((baxter > 50) and (baxter_partner = false))\n\tA big, plump purple grape bounces off the side of your head. You look over with a playful frown at Baxter, who grins. \"Daydreaming again? Come on, ${name}, enjoy the picnic. The baked beans and hot dogs are superb. I made them.\" \n\n\t\"I was [i]actually[/i] just thinking how nice of a picnic this was,\" you say playfully. \n\t\n*if (azure \u003c= 50)\n\tThankfully, Azure appears to have run out of grapes to lob into Baxter's open mouth. She looks at you, drumming her fingers on her chin thoughtfully. \"You look like you would be good at catching pineapple slices.\"\n\t\n\tYou chuckle dryly. \"Yeah, no.\"\n*if ((azure > 50) and (azure_partner = false))\n\tAzure has apparently run out of grapes to throw into Baxter's gaping mouth. She looks at you, drumming her fingers on her chin with a playful smile. \"You look like you would be really good at catching pineapple slices.\"\n\n\tYou laugh and shake your head. \"No thank you. I can already imagine the stickiness.\"\n\nTariano finally snatches his book away from Aurora with a laugh. \n*if (tariano \u003c= 50)\n\tThe two of you meet glances and share an eye roll, although you could just as easily roll your eyes at him reading philosophy in public too. \n*if ((tariano > 50) and (tariano_partner = false))\n\tHe then suddenly tosses it to you, which you barely manage to grab. \"Here,\" he says, smiling brightly. \"I've already read it five times. You may just get a couple things from it, and at worst, you can put in on your bookshelf to make people think you're smarter.\"\n\n\tYou accept it graciously, looking it over thoughtfully for a moment before setting it beside the picnic blanket. \"[i]The Cosmos Within: How We Are Made By Stardust, Not Design.[/i] With a title like that, I have to read at least a few pages.\"\n\t\nNow that she has finished teasing Tariano, Aurora resumes drinking her wine, which she is drinking in a public park, with dozens of strangers around. \n*if (aurora \u003c= 50)\n\tShe notices you looking at her and narrows her eyes, hissing at you like a territorial cat. \"If you wanted some, you should have asked. This bottle's mine.\"\n\t\n\tYou raise your hands in placation but give a wry smile. \"I didn't ask for your fermented grape juice.\"\n*if ((aurora > 50) and (aurora_partner = false))\n\tShe notices you looking at her and cocks an eyebrow, waggling the bottle at you in invitation. \"Do you wish to partake, my good ${name}?\"\n\n\tYou grin and accept the bottle, taking a nice swig of the strong, fruity wine. \"If it will make me talk like that, then indubitably.\"\n\t\n*if (baxter_partner)\n\tBaxter sits very close to you, his strong, soft body pressing nicely against yours, a tower of gentle strength. He wiggles his eyebrows up and down. \"So, what's our first date going to be? Cruising with my new motorcycle; playing mini golf and drinking; star gazing in my new truck's bed and smoking; or watching an old black and white horror movie?\" He cocks a finger gun at you, smiling knowingly. \"Go.\"\n\t*goto answer \n*if (azure_partner)\n\tAzure scoots over very close to you, throwing one leg over your lap as she rests on her elbows in the grass. She gives you that smile that makes you forget your name for a second and says in a funny cowboy accent, \"So, partner, where's our first proper date gonna be?\" She giggles and continues, \"Rescuing worms in the rain; going to an animal sanctuary; going to a chocolate factory; or laughing at bad romantic comedies?\"\n\t*goto answer \n*if (tariano_partner)\n\tTariano scoots closer to you, locking eyes with you with an excited smile that always makes your heart melt. \"You know what tonight is? Our first proper date. I hardly slept all night but it's okay because I was brainstorming. What shall we do: go to an electronica concert; make pizza at home and drink wine; smoke and watch deep sea documentaries; or get drunk and laugh at bad action movies?\"\n\t*goto answer \n*if (aurora_partner)\n\tAurora catches your eyes, her gaze burning in that way that always makes it difficult for you to think. \"So, buster, did you come up with your decision for our first date or not? Black metal concert; wine and cheese tasting tour; a professional couple's massage; or...a mystery date?\"\n\t*label answer \n\t\n\tYou smile. You already know your answer.\n\t*goto shooting_star \n\n*label shooting_star \n*page_break ...\n\nThe sky rapidly grows darker as it does this time of year, dragging the sun down and lifting up a stunning purple and orange haze on the horizon. You and your friends are gathering your belongings to leave. The group playing volleyball is starting to disperse, and the adults at the family gathering are now slow dancing under the gazebo lit by paper lanterns. \n\nYou happen to glance up at the sky. A shooting star streaks across it, burning brightly before twinkling away. Something unfathomably ancient traveling millions of miles to burn away in one beautiful second. You can't help but smile. \n\n*page_break \n\n*image meteorite.jpg \n\n\"Your life is dyed by the color of your thoughts.\" - Marcus Aurelius \n\n*goto_scene ending", "choicescript_description": "You get fired from your job. Then your car breaks down. On the walk home, you nearly get hit by a meteor. You discover a spirit possessing a skull shaped microphone inside. He wants to make you a rich, famous metal musician.\n\nMysterious magic quickly proves effective in gaining fame and fortune in the death metal music industry, but you soon discover that you must pay a tribute of blood. And when your meteoric rise inevitably creates a rival with a violent vendetta, are you prepared to face the consequences? \n\n[i]Meteoric[/i] is a chilling 125,000 word interactive horror novel by Samwise Harry Young, where your choices control the story. It's text-based, with occasional visual art, and fueled by the vast, unstoppable power of your imagination. \n\n• Play as male, female, or nonbinary; romance men, women, both, or no one at all.  \n• Romance a charismatic bassist, a tough guitarist, a thoughtful guitarist, or a mysterious drummer. \n• Reap all the benefits the influence of a magical microphone can conjure, and suffer the consequences, or try to resist the temptation. \n• Read approximately 45k words per playthrough!\n\nWhat and who will you sacrifice to achieve fame, fortune, love, and revenge? \n\n[b]Content Warning:[/b] [i]Meteoric[/i] is a horror story that explores depression and poverty with death metal as the vehicle. It contains violence, alcohol and drug use, explicit language, and references to suicide, necrophilia, and cannibalism.", "choicescript_stats": "[b]Personality:[/b]\n*stat_chart \n\ttext tough Tough  \n\ttext charisma Charisma \n\ttext intelligence Intelligence \n\ttext deception Deception \n\t\n[b]Appearance/Reputation:[/b]\n*stat_chart \n\ttext intimidating Intimidating\n\ttext chill Chill \n\ttext rebellious Rebellious \n\ttext mysterious Mysterious \n\t\n[b]Relationships:[/b]\n*stat_chart \n\tpercent kanibor Kanibor \n\tpercent azure Azure \n\tpercent aurora Aurora\n\tpercent baxter Baxter\n\tpercent tariano Tariano \n\tpercent barty Barty \n\t\n*label works \n\nDo you wish to listen to a playlist made for this story?\n\nWould you like to stay connected with the author or read his other works? \n*choice \n\t#Listen to the Meteoric playlist\n\t\tCheck out this oldschool death metal and brutal death metal \n\t\t*link \thttps://open.spotify.com/playlist/0EGkjR9NmgTqybDjArBQVH?si=4a917930e086441c playlist \n\t\tto listen to while reading Meteoric.  \n\t\t*goto works\n\n\t#Check out The Magician's Burden \n\t\tExperience everyday life as a magician in a medieval village. Balance spending time with your family with building friendships or finding romance with other villagers. Find work as a guard, scribe, farmer, or even a thief. Deal with relentless bullies one way or another. Play in chess tournaments, explore a necromancer's cave, go to the library, or practice your sword fighting in the sparring ring.\n\n\t\tThe Magician's Burden is a 210,000 word interactive slice of life novel by Samuel Young, where your choices control the story. It's text-based, with vivid character illustrations, and fueled by the vast, unstoppable power of your imagination.\n\n\t\t- Play as male, female, or nonbinary; romance whoever you like.\n\t\t*line_break \n\t\t- Cast spells with a wave of your fingertips: turn invisible, throw fireballs, heal wounds, and more.\n\t\t*line_break \n\t\t- Use demonic magic—at a price—or resist the temptation.\n\t\t*line_break \n\t\t- Read approximately 40k words per play-through! \n\n\t\tOh, yes. You also have a demon living inside your head. He talks to you and occasionally offers you his demonic powers.\n\t\t\n\t\tCheck out \n\t\t*link https://www.choiceofgames.com/user-contributed/magicians-burden/ The Magician's Burden \n\t\t*goto works \n\t\n\t#Check out The Mage's Adventures\n\t\tAs the mage of an adventuring party, you're tasked with tracking down and capturing a violent demon under any circumstances. This already daunting task is made even more difficult when you've got competition from a hostile, rival party of adventurers.\n\n\t\tWhat's more, you soon discover that your target wants to take you as her human vessel. Can you survive a demon who has her eye on you, and a party that will do anything it takes to win?\n\n\t\tThe Mage's Adventures is a thrilling 167,000 word interactive fantasy novel by Samuel Young, where your choices control the story. The tale is a companion novel to The Magician's Burden, set in an alternate timeline. It's text-based, with vivid illustrations, and fueled by the vast, unstoppable power of your imagination.\n\n\t\tOh, and there's a secret member of your party as well: the demon living in your head.\n\n\t\t- Play as male, female, or nonbinary; romance whoever you want.\n\t\t*line_break \n\t\t- Romance the cold, aloof Violet; the competitive, outgoing Mabelin; the shy, sweet Rigel; or the fun-loving, charismatic Keano.\n\t\t*line_break \n\t\t- Wield fantastical spells: turn invisible, throw fireballs, heal wounds, and more.\n\t\t*line_break \n\t\t- Make a deal with your demon and use his powerful magic at a steep price, or resist the temptation altogether.\n\t\t*line_break \n\t\t- Build bridges with your bitter rival, or exact your revenge upon him instead. \n\t\t\n\t\tCheck out \n\t\t*link https://www.choiceofgames.com/user-contributed/the-mages-adventures/ The Mage's Adventures\n\t\t*goto works \n\n\t#Check out The Nascent Necromancer \n\t\tSorcery is forbidden and punishable by death. These punishments are summarily handed out by the Witch Hunters, a powerful organization of inquisitors.\n\n\t\tWhen a group of corrupt witch hunters comes to your village, accusing your brother of sorcery and wrongly accusing you of abetting him, your life takes a violent and abrupt change for the worse. After you've suffered more than you can bear, and endured terrible tragedy, perhaps your only option left is to become the very thing that your enemies fear and despise so much.\n\n\t\tThe Nascent Necromancer is an epic, 238,000 word interactive fantasy novel by Samuel Young, where your choices control the story. It's entirely text-based, and fueled by the vast, unstoppable power of your imagination.\n\n\t\t- Play as male, female, or nonbinary. Romance males, females, both, or no one at all.\n\t\t*line_break \n\t\t- Embark on a perilous journey, facing witch hunters, trolls, and goblins as you seek to gain the terrible power that will bring you revenge on your persecutors.\n\t\t*line_break \n\t\t- Romance the cold, aloof Tozi; the sarcastic, charismatic Tanno; the shy, sweet Kenda; the kind, easygoing Meylor; or even the idealistic witch hunter, Lonnie.\n\t\t*line_break \n\t\t- Read approximately 100,000 words per play-through!\n\t\t*line_break \n\t\t- Choose between three kinds of spells; mental, physical, or conjuration. Cast torture spells; summon flying, undead hands; control the minds of your enemies, and much more.\n\t\t\n\t\tCheck out \n\t\t*link https://www.choiceofgames.com/user-contributed/nascent-necromancer/#utm_medium=web&utm_source=ourgames The Nascent Necromancer \n\t\t*goto works \n\t\n\t#Support Sam on Kofi\n\t\tCheck out Sam Young's \n\t\t*link https://ko-fi.com/samyoung64 Kofi page\n\t\twhere you can support him with donations and keep up with updates on his upcoming interactive novels. He also posts chess videos documenting his journey towards becoming a National Master.\n\t\t*goto works ", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n  \n  Unlock the rest of the game, including the thrilling conclusion!\n  \n  *purchase_discount adfree 2025-09-11 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n  \n  You've paid to unlock the rest of the game.\n", "death": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nYou have died.\n\n*goto_scene ending", "ending": "*page_break End\nWe hope you've enjoyed playing [i]${choice_title}.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*set name \"Crimson\"\n*set tough 4\n*set charisma 6\n*set intelligence 3\n*set deception 5\n*set intimidating 2\n*set chill 1\n*set rebellious 2\n*set mysterious 3\n*set barty 51\n*set kanibor 52\n*set baxter 49\n*set azure 48\n*set tariano 53\n*set aurora 55\n\nShe grabs the door and wrenches it open but then turns to look at you. \"Go on. I can see from that sneer on your lips that you have something to say.\"\t\n\nEffie wears a perpetual sneer herself, so she sees it in everyone else. Clearly, she's not even allowing you to be fired gracefully. \n*fake_choice\n\t#Get all the things you've wanted to say back to her all these years off your chest \n\n\t#Celebrate your new freedom to take her enjoyment out of it\n\t\t\n\t#Reveal to her that you joined a union, and will be demanding a severance package\n\t\n\t#Let her win this one, then slice her tires before you leave\n\n*script changeBackgroundColor(\"black\")\n*set name \"Yaler\"\n*set tough 11\n*set charisma 12\n*set intelligence 16\n*set deception 8\n*set intimidating 4\n*set chill 1\n*set rebellious 3\n*set mysterious 2\n*set barty 53\n*set kanibor 50\n*set baxter 51\n*set azure 48\n*set tariano 49\n*set aurora 57\n\nCocking a bushy eyebrow, Baxter rumbles, \"Gun to your head, which band name is the best out of these four: Dead Politicians, Dead and Dreaming, Advocate Cannibalism, or Atomic Decay?\" He cocks a finger gun at you with a giant, calloused hand. \"Go.\"\n*fake_choice \n\t#Dead Politicians  \n\t\t\n\t#Dead and Dreaming \n\t\t\n\t#Advocate Cannibalism  \n\t\t\n\t#Atomic Decay \n\n*script changeBackgroundColor(\"sepia\")\n*set name \"Varbara\"\n*set tough 15\n*set charisma 9\n*set intelligence 14\n*set deception 8\n*set intimidating 20\n*set chill 5\n*set rebellious 2\n*set mysterious 6\n*set barty 51\n*set kanibor 60\n*set baxter 62\n*set azure 49\n*set tariano 55\n*set aurora 59\n\nYou grip the Necrophone hard, its abnormally cool surface a relief on your clammy hands. This mic is why Barty has to accept you, but it's up to you to wield it. You discover that somehow you know what to say. \n*fake_choice\n\t#Tell him that once they hear your music, the fiery teenage rebels still inside them won't be able to resist  \n\t\t\n\t#Say that you enchanted hundreds of fans here and can enchant a million more if given a real chance\n\t\t\n\t#Tell him that you are guaranteed to be a pioneer with your uniquely powerful and guttural singing\n\t\t\n\t#Tell him you've put thousands of hours of work in to become the best death metal singer in the world in secret\n\n*set name \"Dustin\"\n*set tough 60\n*set charisma 49\n*set intelligence 55\n*set deception 58\n*set intimidating 15\n*set chill 2\n*set rebellious 10\n*set mysterious 4\n*set barty 55\n*set kanibor 55\n*set baxter 50\n*set azure 63\n*set tariano 49\n*set aurora 64\n\nAzure hangs back and pulls out a fat blunt, wiggling her eyebrows enticingly at anyone who might want to share. Tariano simply orders one beer and tells Azure he'll take a hit off her blunt. Aurora orders a water from an irritated bartender and sips it slowly, already looking around for something else to do. \n*fake_choice\n\t#Get drunk off rum to make your inhibitions disappear  \n\t\t\n\t#Burn a blunt to feel euphoric for a while\n\t\t\n\t#Just have a beer and a puff of weed to help settle your nerves while still allowing you to focus on Larry\n\t\t\n\t#Don't partake tonight; you still need to stop Larry and then record a song \n\t\n*set name \"Haley\"\n*set tough 61\n*set charisma 45\n*set intelligence 54\n*set deception 59\n*set intimidating 16\n*set chill 6\n*set rebellious 11\n*set mysterious 6\n*set barty 53\n*set kanibor 50\n*set baxter 57\n*set azure 60\n*set tariano 48\n*set aurora 60\n\nEveryone is staring at you now, you realize. The air suddenly feels very warm and stale. The Necrophone grins evilly at you by Larry's side, shining yellow in the overhead light. Larry snorts derisively and moves towards the door again. No one protests this time. Your mind fires on all cylinders as you decide what to do next: this is what you vigilantly prepared for all night. \n*fake_choice\n\t#Take the mic back by force \n\t\t\n\t#Kiss him to distract him, then steal the mic back \n\t\t\n\t#Allow him to embarrass himself using a mic that will only work for you (probably) \n\t\t\n\t#Sneak away and pull a fire alarm so you can steal the Necrophone back in the resulting confusion \n\t\n*finish ", "startup": "*title Meteoric \n*author Samwise Harry Young \n\n*scene_list \n\tstartup\n\tchapter1meteorite\n\tchapter2necrophone\n\tchapter3payment\n\t$ chapter4party\n\t$ chapter5road\n\t$ chapter6stardom\n\t$ chapter7dwarf \n\t$ chapter8cemetery\n\t\n*create name \"?\"\n*create nonbinary false \n*create female false \n*create male false  \n*create boy \"boy\"\n*create him \"him\"\n*create is \"is\"\n*create his \"his\"\n*create son \"son\"\n*create sibling \"brother\"\n*create he \"he\"\n*create hisplural \"his\"\n*create boyfriend \"boyfriend\" \n\n*create kanibor 50\n*create aurora 50 \n*create azure 50 \n*create tariano 50 \n*create baxter 50 \n*create barty 50\n*create larry 0\n\n*create intimidating 0 \n*create chill 0\n*create rebellious 0\n*create mysterious 0\n\n*create tough 0\n*create charisma 0 \n*create intelligence 0 \n*create deception 0\n\n*create tough_cop false \n*create charisma_cop false \n*create intelligence_cop false \n*create deception_cop false \n*create ticket false \n\n*create attracted_males false \n*create attracted_females false \n*create attracted_both false \n*create not_attracted false \n\n*create tough_effie false \n*create charisma_effie false \n*create intelligence_effie false \n*create deception_effie false \n\n*create tough_walk false \n*create charisma_walk false \n*create intelligence_walk false \n*create deception_walk false \n\n*create tough_n
