, repetitive rumbling noises emanating from the crater give you pause. Then you realize with a start that the sound is the microphone cackling gutturally at you. [b]\"The banalities of life are more terrifying than me. As I said, I'm here to save your miserable life.\"[/b]\n\t\t*goto outfit \n\t\t\n*label outfit \n*page_break ...\n\n[i]The Necrophone[/i]. Those words are engraved on the bottom of the microphone in a jagged, spidery font that's difficult to read. You study the words pensively in the back seat of a taxi for what must be the dozenth time. You're heading towards a local storage facility where, according to Kanibor, your path to fame and fortune is apparently to begin. \n\nThe leather seats of the taxi are fading and peeling apart. You snort from your nose when you notice the similarity between the Necrophone's font and the random hairline cracks on the leather. A wadded up piece of gum is stuck to the seat belt beside you. Very charming. Nervously, you check the time on your phone, which you were fortunately able to charge somewhat. You're late, but then, the band you're meeting has no idea you're coming to their singer audition. \n\nThe spirit trapped inside the microphone did not speak to you again until you returned to your modest apartment. There, he growled at you rapid-fire, giving you a list of instructions to follow that very night to put yourself on the path to stardom. You only had time to take the world's shortest shower and inhale a snack before leaving again. You were so late to the alternative apparel store that the employees nearly didn't allow you to come in, until they saw your awesome mic, which seemed to convince them to give you mercy. \n\nThere, you quickly bought a new outfit that Kanibor insisted was mandatory to be taken more seriously where you were going. Unfortunately, the new clothes and the taxi ride have left you entirely creditless. Stowing the microphone back into your pocket, you rest your forehead against the window. Beads of water cling to the outside of the window, and the cool surface soothes your burning forehead. With no job, no car, no money, and no support system to speak of, you truly have everything riding on this mysterious mic. \n\n*page_break \n\nThe taxi driver, a middle aged woman chewing voraciously on a very pungent cinnamon flavored gum, eyes you in the rear view mirror as you come to a red light. \"Going to a funeral?\" she asks, one eyebrow raised quizzically. \n\nYou glance down at yourself clad entirely in black. All you know is that you're going to audition to become the singer for a big local band, whatever that means. Kanibor has promised that with the Necrophone, you will propel your new band to stardom overnight. Obviously, you can't tell your taxi driver any of that.\n*if (tough_necrophone)\n\tA wry smile comes to your lips. You're buzzing with nervous energy that's the opposite of what you would find at a funeral. \"Not sure you would believe me.\"\n\t\n\tShe eyes you over one more time, still looking skeptical, before thankfully returning her eyes to the road. She was starting to make you nervous purely from a navigating standpoint. \n*if (charisma_necrophone)\n\tYou decide to reply with a toothy smile. \"Sure am. Wanna come?\" \n\n\tShe laughs nervously and returns her eyes to the road, shaking her head. You shrug, chuckling to yourself. \n*if (intelligence_necrophone)\n\tYou simply shake your head wordlessly, and she shrugs and returns her focus ahead. You wish you could have stopped by a camera store to have your pictures developed, but there was no time. \n*if (deception_necrophone)\n\tFeeling apprehensive about the whole thing, you finally mutter, \"Honestly, I might be going to mine.\"\n\t\n\tShe makes an uncomfortable face, an equally awkward giggle, and looks away. The car falls awkwardly silent, prompting her to turn on the radio to a rhythm and blues station.\n\nThe alternative apparel store you went to was filled with band shirts, band hoodies, trip pants covered in chains and buckles, skinny jeans of every color, spiked wrist cuffs, nail paint, eyeliner, and much more. Kanibor chose several outfits for you to decide between before you had even arrived. How an alien spirit inside a microphone has intimate knowledge of worldly underground music and fashion is a complete mystery to you. \n\nIn any case, it was clear there was a certain aesthetic you would be taking on. Even though the clothes didn't look very different from one another at first glance, Kanibor insisted that each outfit would help you capture a different vibe while simultaneously making you fit in better with the band and the wider music scene. Which outfit did you choose? \n*choice \n\t#A graphic band hoody, baggy cargo pants, spiked wrist cuffs, and combat boots\n\t\t*goto tough_outfit \n\t\t\n\t#A cool band hoody, baggy sweatpants, black nail paint, and running shoes \n\t\t*goto charisma_outfit \n\t\t\n\t#A classic band shirt, a jean vest with band patches, trip pants, and sneakers\n\t\t*goto intelligence_outfit \n\t\t\n\t#An obscure band hoody, skinny jeans, and sneakers \n\t\t*goto deception_outfit \n\t\t\n\t\t*label tough_outfit \n\t\t*set tough_outfit true \n\t\t*set tough +2\n\t\t*set intimidating +2  \n\t\t*set shoes \"boots\"\n\t\t*set shoe \"boot\"\n\t\t(+2 Tough, +2 Intimidating)\n\t\t*line_break \n\t\tThe black band hoody you picked stuck out to you immediately because of its vibrant, violent imagery. Underneath a band logo that's so intricate and jagged that it's practically impossible to decipher, a disemboweled man cringes away from an insufficiently barricaded door as many skeleton arms grope for him. \n\t\t\n\t\tYour black cargo pants are comfortable and covered in large pockets with zippers. The black cuffs on your wrist are covered in dull, one inch silver metal spikes. Already, it has become a habit for you to brush your fingertips over their tips. Your pants are tucked into your black combat boots, which have steel toes and a durable but lightweight material. \n\t\t\n\t\tAlready, you have noticed more ordinary people reacting to you differently with your new style. Before, you didn't seem to catch people's attention one way or another. Now, your shockingly gory hoody and the spiked cuffs draw the occasional wide-eyed stare or even dirty looks of disapproval from older women or men in suits.\n\n\t\tYou absentmindedly fidget with your cuffs, running your fingertips over the dull spikes as you think about how you're feeling about all of this. Truthfully, you can't help but feel tough and confident since donning your new clothes. There's something satisfying about being different and unafraid of it. Besides, the man on your hoodie feels no pain and the spikes on your cuffs can't cause any real damage. \n\t\t\n\t\tThe spirit trapped inside the microphone wanted to approve of your selection before you purchased it. When you were observing yourself in the changing room mirror, he said in muted, guttural tones, \"[i][b]You look brutal.\"[/i][/b]\n\t\t\n\t\tYou think that was a compliment. \n\t\t*goto storage \n\t\t\n\t\t*label charisma_outfit \n\t\t*set charisma_outfit true \n\t\t*set charisma +2 \n\t\t*set chill +2\n\t\t(+2 Charisma, +2 Chill)\n\t\t*line_break \n\t\tYour black band hoody shows, in startling blue and white water colors, a star being expunged as it is sucked into an orb held by a cloaked deity who reminds you of a bearded wizard. The beautiful yet haunting scene captured your attention immediately, although you still couldn't read the alien-like font of the band name for certain. \n\t\t\n\t\tYour black sweatpants are made out of a soft, stretchy fabric that's far more comfortable than the your old itchy, stiff work uniform. Your black nail paint is a little messy because you had to paint your fingers in the taxi, but you think it fits the vibe. Your black running shoes are sleek, light, and extremely comfortable. A good thing, since you don't have a car right now and will be hoofing it a lot more often.\n\t\t\n\t\tAlready, people are starting to treat you slightly differently than you're used to. Before, people didn't particularly seem to notice you. Now, your dark, epic hoody attracts the occasional curious glance, with one person asking what movie it was from. The entirely black ensemble has gotten you multiple funny looks too, ranging from the eternal, harmless stares of children to the sneering of old church ladies. \n\t\t\n\t\tYou inspect your painted fingernails absentmindedly as you think about how this new look is making you feel. Honestly, even though you felt awkward at first, it's not so bad so far. You could see all black becoming a little monotonous over time, but right now, you really like having your own style. You feel cool, yet mysterious. \n\t\t\n\t\tThe entity trapped inside the microphone insisted that he approve of your outfit before you bought it. When you were appreciating yourself in the changing room mirror, however, he remained annoyingly silent. Since he didn't protest, you took that as an affirmative. \n\t\t*goto storage \n\t\t\n\t\t*label intelligence_outfit\n\t\t*set intelligence_outfit true \n\t\t*set intelligence +1 \n\t\t*set rebellious +2\n\t\t*set tough +1 \n\t\t(+1 Intelligence, +2 rebellious, +1 Tough)\n\t\t*line_break \n\t\tYou asked an employee for an old-school extreme metal shirt, and were pleasantly surprised when he returned with a shirt for a band who was apparently the godfather of their genre. The band's logo is displayed in striking, fiery text that makes it practically indecipherable yet undeniably cool as curved, demonic horns protrude from the first and last letters.\n\t\t\n\t\tYour black, sleeveless jean vest is covered in patches for bands you've never heard of with brutal names or disturbing skeletal logos or zombie mascots. Your trip pants hang loosely around your legs and ankles, glinting with many small, sleek buckles and chains. Leaning down, you brush your pant legs aside and tighten the laces on your comfy black sneakers. \n\t\t\n\t\tIt hardly took a few seconds of you wearing your new style to attract lots of eyes. Considering you were mostly overlooked before, this still gives you some nervous flutters. Mostly, people seem interested or curious, but others have sneered at you, or even seemed nervous of you. Several excited teenagers asked if you were in a band, while a man in a pickup truck angrily yelled for you to get a job as he was driving by.\n\t\t\n\t\tYou slowly curl and uncurl a chain around one finger as you think about how all of this makes you feel. Honestly, it's strangely liberating. The judgmental stares obviously aren't pleasant, but there's something empowering about being unashamed and letting people know what you're about without having to say a word. You don't accept the world without thinking, and now, it's self-evident. \n\t\t\n\t\tThe spirit trapped inside the microphone demanded that you get his approval before purchasing your outfit. As you were observing yourself in the changing room mirror, however, he remained irritatingly silent. You took that as tacit approval, happy to have as little interaction with the alien as possible. \n\t\t*goto storage \n\t\t\n\t\t*label deception_outfit \n\t\t*set deception_outfit true \n\t\t*set deception +1 \n\t\t*set mysterious +2 \n\t\t*set charisma +1 \n\t\t(+1 Deception, +2 Mysterious, +1 Charisma)\n\t\t*line_break \n\t\tYou asked an employee to give you a hoody from the bottom of the clearance barrel. Looking disgruntled and amused at the same time, he dug out a black hoody with art that was a confusing, jumbled, yet vaguely anthropomorphic mess. The band's logo is stylized with razor blades, and therefore almost impossible to read. \n\t\t\n\t\tYour skinny jeans are skin-tight but flexible and comfortable enough. Eventually, you'll get used to the feeling of slowly losing circulation in your legs. Leaning down, you adjust the laces on your black sneakers. You considered getting eyeliner or nail paint or something like that to embellish your outfit, but decided that understated was better. \n\t\t\n\t\tAlmost immediately, you noticed subtle differences in the way people looked at you. Before, people didn't particularly seem to notice you one way or another. Usually, you prefer it that way, but it can be lonely sometimes, feeling invisible. Now, people occasionally give you curious glances or judgmental stares. \n\t\t\n\t\tYou absentmindedly pick away at the peeling leather seat as you think about how all of this makes you feel. Honestly, there's something satisfying about being able to put yourself apart from others with such little effort. People can be so shallow and predictable sometimes.\n\t\t\n\t\tThe spirit trapped inside the microphone made it very clear that he wanted to approve of your outfit before you purchased it. When you were looking at yourself in the changing room mirror, however, he didn't utter a word. You took his silence as good enough, not wanting to overthink an already overly complicated situation. \n\t\t*goto storage \n\t\t\n*label storage \n*page_break \n\nThe taxi driver drops you off at the outdoor storage facility with a skeptical look but leaves without a word, still blowing bubbles with her cinnamon gum. The facility is surrounded by a tall chain-link fence. You notice an old black van in the parking lot and wonder if it belongs to your future band. There are street lamps to light your way as you walk through the long, lonely lanes. \n\nMost of the storage units are the size of a small bedroom, but some of them are at least twice as large. The majority of the units have padlocks or combination locks on their doors, but many of them are vacant. You notice one that has a red notice on the handle saying the unit has been restricted due to delinquent payments, and wonder glumly about the penalties.   \n\nYou pass by rows and rows of storage units, and quickly realize that your destination is in the very back of the complex. The sound of your ${shoes} scuffing the dirty street echo loudly. Outside one unit is a pile of chicken bones and a crushed fountain drink. One street lamp is dead and strung with thick, gossamer yet dirty gray cobwebs. For the dozenth time, you find yourself questioning life. \n\nFinally, rubbing your arms against the cold and looking around nervously, you arrive at a large storage unit at the very end of the street. You can tell immediately from the cords running underneath the door, and the muffled rumbling noises from inside, that you're at the right location. You eye the overhead door uncertainly, wondering what you should do. They'll never hear you knock. Just when you're considering opening the door yourself, it is quickly wrenched open from the inside. \n\nThe door bounces and rattles against its track, and a man in his twenties with very long, curly blonde hair steps outside. A wall of aggressive, blistering metal music rushes out to meet you, echoing loudly in the street. The bright lights from inside the room sting your eyes, but you spot the silhouettes of four musicians, two male and two female. The man folds his arms and tips his chin at you, demanding brusquely, \"What do you want?\"\n\n*page_break \n\nA deep voice from inside bellows, \"Larry, shut the damn door!\"\n\nLarry yanks the overhead door down without taking his eyes off you. It bangs on the ground with an echo, and you wonder at what point he's going to attract security. He's wearing faded blue jeans, a disturbing horror movie hoody, worn out sneakers, and a suspicious scowl. His startling green eyes feel ice cold, and his strong jaw is jutted out defiantly as he stares at you. \"I'm here to audition for the band,\" you finally reply. \n\nHe scoffs almost before you're done speaking. \"Sorry. I nailed the audition hours ago. I'm their singer now. I sent all the other losers packing and now I'm just rehearsing for our new material.\" His cool gaze travels to your outfit, and a smirk crosses his bearded chin. \"Besides, I always know a poser when I see one.\"\n\t\t\n*if (tough_outfit)\n\tYour boots suddenly feel heavy on your feet and your wrist cuffs feel irritating on your skin. You're certain there's sweat trapped underneath your wristband but don't want to check. Frowning, you say bluntly, \"And how do you figure that?\"\n\t\n\tHe sneers at you readily. \"Want my advice? Ditch the spikes. This isn't some corny black metal band.\" He widens his eyes and laughs acerbically. \"Or worse. Do you think we're punk rock?\" \n\t\n\tYou bristle. The elitism is strong with this one. \n*if (charisma_outfit)\n\tYou bristle, feeling self-conscious without knowing exactly why. \"Always, huh?\" you say, your voice dripping with sarcasm. \n\t\n\tHe flashes a toothy, self-satisfied grin with no warmth. \"Every single time. And you, my friend...\"\n*if (intelligence_outfit)\n\tYou suddenly feel like a walking target with all of your dark, flashy clothes. Somehow you expected someone like Larry would look more interesting. Expression impassive, you arch an eyebrow. \"Who made you the arbiter?\"\n\t\n\tHe sneers at you, his cold eyes now lit up with mockery. \"Tell me, what band is that?\" he gestures flippantly at your hoody. \"I doubt you could even name three songs. Hell, name one.\"\n*if (deception_outfit)\n\tA slow smirk crosses your lips. You want him to feel embarrassed for trying to embarrass you. \"Nice to meet you too.\" You look down at your shirt. \"What band is this, then?\"\n\t\n\tMaybe you'll learn something new from him, but you doubt it. He scowls at your shirt, scratching his beard silently for several seconds. You tap your shoe on the cement impatiently. He finally shrugs and grunts, \"Honestly, I don't know and don't care.\"\n\nA breeze rolls by, whistling through the gaps in the buildings and wafting the overpowering scent of Larry's foresty body spray into your nostrils. Larry digs into his pocket and takes out a lighter and a pack of cigarettes. He lights a cigarette and takes a long drag before purposefully blowing the smoke in your direction. \"Be gone, loser. There's no reason for you to be here.\" \n*choice \n\t#Tell him that you're going to audition whether he likes it or not, and replace him\n\t\t*goto tough_larry \n\t\t\n\t#Laugh and say you're not going to get bullied into leaving by a lesser singer \n\t\t*goto charisma_larry \n\t\t\n\t#Tell him you're not falling for his bluff, and that you won't leave until you've talked with the band \n\t\t*goto intelligence_larry \n\t\t\n\t#Ask if you can bum a cigarette, but then knock on the door to get the band's attention\n\t\t*goto deception_larry \n\t\t\n\t\t*label tough_larry\n\t\t*set tough_larry true \n\t\t*set tough +2 \n\t\t*set intimidating +1 \n\t\t*set charisma +1 \n\t\t(+1 Charisma, +1 Intimidating, +2 Tough)\n\t\t*line_break \n\t\tYou take a step closer, folding your arms over your chest. Larry cocks an eyebrow dramatically but stands his ground. \"I don't think you understand,\" you say. \"I'm not leaving. I'm going to get this audition even if it means replacing you.\"\n\t\t\n\t\tLarry barks out a spiteful laugh and takes another big drag on his cigarette, killing it. He flicks it away with a flippant gesture, and it creates a brief flash as it breaks against the storage room wall. He rolls his neck, making it pop loudly. \"Oh yeah?\" he drawls. \"And what are you going to do, pick me up and move me?\"\n\t\t\n\t\tYour heart is beating madly against your chest and your face burns with increasing frustration. You almost wish this idiot would try something, but fighting their new singer would probably hurt your chances with the band. Letting your arms fall down to your sides, you stare at him expressionlessly, saying stonily, \"You can't stop me.\"\n\t\t\n\t\tYou quickly stalk past him towards the door, making him do a comical double take. He starts to protest, but you're already knocking loudly on the overhead door. The metal stings your knuckles but produces a satisfying banging noise. \"You're crazy,\" Larry says, throwing up his hands with an indignant scoff. \n\t\t\n\t\tIt's your turn to glower at him. You almost want to knock again for good measure, but that would be rude. \"You know, maybe if you hadn't tried to sabotage me, I would allow you to remain in the band as a backup singer.\"\n\t\t*goto band \n\t\t\n\t\t*label charisma_larry \n\t\t*set charisma_larry true \n\t\t*set charisma +2 \n\t\t*set tough +1 \n\t\t*set chill +1 \n\t\t(+2 Charisma, +1 Chill, +1 Tough)\n\t\t*line_break \n\t\tSomething about the aggressive ridiculousness of officer Feter, Effie, and now this guy is enough to send you into a fit of laughter. You double over laughing but quickly straighten out as a cloud of cigarette smoke drifts directly into your face. You cough, grimacing and waving the cloud away. Then, frowning, you say, \"I'm not going anywhere, Landon.\"\n\t\t\n\t\t\"Larry-\" he protests. \n\t\t\n\t\t\"Yeah, Lyle, whatever. Look, I'm sure you're a perfectly fine metal singer, but I didn't come here to lose to a perfectly fine singer.\" You gesture to the glowing stick in his hand. \"Judging by your habits, you'd probably blow your voice out in a few months anyways. Get out of my way.\"\n\t\t\n\t\tHe blinks hard at you with his jaw agape, and the cigarette tumbles from his mouth and onto his sneakers, making him jerk away with a funny little yelp. You laugh again, causing his face to turn scarlet. As you stalk forward, he awkwardly shuffles out of the way, throwing up his hands with a spiteful laugh. \"You're cocky, aren't you? Be my guest, then. It's your funeral.\"\n\t\t\n\t\tYou give him a sarcastic thumbs up before knocking politely on the overhead door. The cold metal stings your knuckles but produces loud knocks with little effort. You smirk at Larry. \"You're not nervous, are you?\"\n\t\t*goto band \n\t\t\n\t\t*label intelligence_larry \n\t\t*set intelligence_larry true \n\t\t*set intelligence +2 \n\t\t*set chill +1 \n\t\t*set charisma +1 \n\t\t*set larry +1\n\t\t(+2 Intelligence, +1 Chill, +1 Charisma)\n\t\t*line_break \n\t\tYou arch an eyebrow skeptically. \"For all I know, you could be the sound guy or a roadie or something. Besides, if you only just auditioned, I'm not sure your seniority will count for very much.\"\n\t\t\n\t\tLarry laughs at you, rolling his eyes dramatically and shaking his head so his mane of blonde hair tumbles around his shoulders and back. \"Nerd!\" he practically shouts before taking a great drag on his cigarette. He exhales a great cloud of smoke, coughs loudly, and then grunts, \"Embarrass yourself if you want. See if I care.\"\n\t\t\n\t\tYou frown suspiciously at him as you slowly move towards the door. He watches you with a strange smile on his face but doesn't interfere as you reach up and knock politely on the overhead door. You glance over at Larry who is still staring creepily at you. A shiver passes down your spine, exacerbated by the cold. \"You're the only one embarrassing yourself,\" you say stiffly. \"To me, you're just a petty, spiteful stranger.\"\n\t\t\n\t\tLarry blinks stupidly at you for a second and then sneers at you and turns his attention back to his cigarette. No one inside the storage unit seems to have heard you knocking, which you suppose doesn't surprise you. You reach up and knock harder this time, stinging your knuckles but producing rattling bangs against the metal door. \n\t\t\n\t\tThe knocks echo around the street before fading away under the low but constant rumbling from behind the door. You're starting to feel like you're making a fool out of yourself. Larry is snickering at you and trying to be obvious about it, so you make a point of ignoring him. He flicks his cigarette away and says, still chuckling obnoxiously, \"Go on, keep knocking. They're making music to [i]my[/i] lyrics in there.\"\n\t\t*goto band \n\t\t\n\t\t*label deception_larry \n\t\t*set deception_larry true \n\t\t*set deception +2\n\t\t*set mysterious +1 \n\t\t*set charisma +1 \n\t\t(+1 Charisma, +1 Mysterious, +2 Deception)\n\t\t*line_break \n\t\tSighing, you turn and start to trudge away, making a point of scuffing your ${shoes} on the street and sending pebbles tumbling. Larry snickers gloatingly and takes another long drag of his cigarette. After you have gone a few feet, you dig into your pockets and then turn around with a sheepish expression. \"Mind if I bum a cigarette? I forgot mine in the car and it's a long walk.\"\n\t\t\n\t\tLarry observes you for several seconds, jutting his jawline out and making a show of thinking your request over. You try to look innocent despite how much he's obviously lording this over you. Eventually, he shrugs and offers you his half-finished cigarette. \"Whatever. We've all been there, I guess.\"\n\t\t\n\t\tYou pivot and walk towards him casually, giving him a grateful look as you reach out to pluck the cigarette from his fingers. As he's opening his pack to get another one, you reach up and rap loudly on the overhead door three times. Larry, who was already lighting a new cigarette, nearly drops it as he splutters in protest, \"Hey, what the hell are you doing?!\"\n\t\t\n\t\tIt's almost adorable how trusting he was. You hand Larry back his half-finished cigarette, and can't help but smirk as he stands there looking very stupid. \"Sorry, I changed my mind. You've got saliva [i]all[/i] over the filter. Yuck.\"\n\t\t\n\t\tHe glowers at you and then yelps and scrambles away, shaking his hand as a burning cigarette butt falls to the ground. You shake your head, unable to stop yourself from laughing. Looking like he wants to turn invisible, Larry shoves a finger into his mouth and sucks on it grumpily, looking very much like a petulant child.  \n\t\t*goto band \n\t\t\n*label band \n*page_break \n\nThe overhead door swings open. This time, it swings gently into the track, and no loud music rushes out to greet you. Instead, a short young woman in her late teens steps outside. Her light brown skin is shiny with sweat. Her almond shaped eyes flick back and forth between you and Larry in mild surprise. Larry stands up a little straighter and clears his throat, trying to look casual. \n\nYou'd know the girl was a member of the band even if you hadn't just seen her walk out of the practice room. Her black hair falls over her shoulders in a shaggy mullet, and she wears a black hoody from a classic rock band you remember one of your uncles listening to. Her high-top basketball shoes are shiny white and her light blue skinny jeans are torn at the knees.\n\nShe gives you a brief, friendly smile and then looks at Larry. \"You're not going to take a smoke break between every song, are you? Some people might think you're stalling.\" At his offended expression, she quickly changes the subject. Pointing a thumb at you, she says, \"Who's this?\"\n\n\"${name},\" you say quickly, before Larry can tell her something ridiculous. \"I'm here for the audition.\" \n\nSomething, probably Kanibor, tells you to take out the Necrophone. Steeling your nerves, you reach into your pocket and pull the microphone out, holding it against your side. The girl stares at the microphone with obvious interest, her eyebrows going up. You notice Larry staring at it too, his face scrunched up in fascination, and perhaps envy. The girl gives you a dazzling smile with lots of dimples. \"My name's Azure. Technically you're late, but you can come inside and meet the band.\" Then, to Larry, \"What? I'm not evil.\" \n\nTrying not to look too relieved, you follow Azure inside the storage unit. Larry hurries in after you, darkly muttering protests to himself. He keeps trying to step on the back of your shoes, making you fast-walk away from him with a backwards glare. Once the door is shut and your eyes have adjusted to the light, you see that you're in a spacious storage unit that has been completely transformed into a band's practice room. \n\n*page_break  \n\nThe walls and ceiling of the entire storage unit are covered in purple sound-proof padding. There are several large amps, two microphones on stands, several guitar pedals for each guitar, and a mixer hooked up to extension cords. In the corner, there's a large blue cooler and a card table covered in cards, ashtrays, and bottles of water and cans of soda and beer. The three band mates who had been chatting and chuckling to themselves now fall silent as all eyes turn to you. \n\nThe first person your eyes are drawn to is a tall, chubby man in his late twenties holding a guitar in the center of the room. He has a bushy black beard that goes down to his chest and curly black hair that goes down to his elbows. He stares at you, his dark eyes traveling up and down your frame several times as he assesses you. \"Sup,\" he rumbles simply in a baritone, tipping his chin at you. \n\nBehind an intricate drum set with a double bass pedal and about a dozen cymbals is a tall, slender young woman, perhaps in her late twenties with pale skin and long green hair. She reaches up to scratch her long nose, observing you impassively with calculating eyes. The other guitarist who appears to be in his mid twenties is sitting in a chair with his instrument resting in his lap. He has light brown skin, and wavy dark red hair that goes past his shoulders. He brushes the hair out of his face, eyeing you curiously, and offers a friendly smile. \n\nLarry plops down into one of the seats at the card table, folding his arms and staring at you with a smug expression on his face. \t\n*if (tough_larry)\n\t\"Careful, everyone, apparently I'm going to be replaced,\" he says, rolling his eyes heavily. \"And we were all such bosom friends already.\"\n*if (charisma_larry)\n\t\"Just so you all know, you're witnessing true talent here today, ladies and gentleman,\" he says, the sarcasm positively dripping from his tone. \"Prepare yourselves for a life changing experience.\"\n*if (intelligence_larry) \n\t\"Hey, just to let you know, you have a job offer as roadie after this is over,\" he says to you loudly. \"Maybe one day you could even work up to being the sound technician.\"\n*if (deception_larry)\n\t\"Just so you all know, this random will probably bum all of you for cigarettes,\" he says, suddenly folding his arms crossly. \"Just saying.\"\n\nAzure clears her throat. \"Anyway.\" She gestures at you and says, \"Everyone, this is ${name}.\" She gestures proudly at the drummer, the seated guitarist, and tall guitarist. \"These are my best friends and underlings, Aurora, Tariano, and Baxter.\"\n\nAurora nods at you with a mysterious expression, absentmindedly twirling a drumstick between her fingers. Tariano gives you a little wave and a small smile. Baxter, however, sets his guitar down and steps closer, his big combat boots thumping loudly. He towers over you, his head nearly brushing the low ceiling. \n\nLarry edges around Tariano in clear anticipation, trying to get a better view. Cocking a bushy eyebrow, Baxter rumbles, \"Gun to your head, which band name is the best out of these four: Dead Politicians, Dead and Dreaming, Advocate Cannibalism, or Atomic Decay?\" He cocks a finger gun at you with a giant, calloused hand. \"Go.\"\n*choice \n\t#Dead Politicians \n\t\t*goto tough_band \n\t\t\n\t#Dead and Dreaming \n\t\t*goto charisma_band \n\t\t\n\t#Advocate Cannibalism \n\t\t*goto intelligence_band \n\t\t\n\t#Atomic Decay \n\t\t*goto deception_band \n\t\t\n\t\t*label tough_band \n\t\t*set tough_band true \n\t\t*set baxter +1 \n\t\t*set tough +2\n\t\t*set intimidating +1 \n\t\t*set intelligence +1 \n\t\t*set band \"Dead Politicians\"\n\t\t(+1 Intelligence, +1 Intimidating, +2 Tough, Baxter Approves)\n\t\t*line_break \n\t\tYou stare back at him, unblinking. What's the worst he can do, crush you with his giant fists if you somehow offend him or happen to pick the wrong answer? \"Dead Politicians.\"\n\t\t\n\t\tBaxter throws his head back and bellows with laughter. Larry jerks and nearly falls out of his seat. Tariano sighs and shakes his head, resting his forehead in one hand. Jabbing a giant finger at Tariano, Baxter says, \"Told you my name was more brutal! You know what? I like ${name}.\"\n\t\t\n\t\tAzure tries to hide her giggles behind her hand, and Aurora gives Tariano a sympathetic look and a shrug from behind her drum set. Tariano shrugs too and starts fidgeting with his guitar's tuning, saying nonchalantly, \"I'm sure you being a hulking gorilla had absolutely nothing to do with it.\"\n\t\t\n\t\tBaxter folds his arms, saying proudly to you, \"That name was my idea, obviously. I was talking to my buddy one day about the news. Some ancient senator had passed away, I think. This old lady who was passing by heard me say the dreaded words 'dead politicians'. She took it completely out of context and absolutely lost her mind. \n\t\t\n\t\t\"I'm talking about flipping her lid, losing her marbles, going bonkers, bat-shit. I couldn't even explain that I just thought our politicians were too damn old because she was telling me that my degeneracy was responsible for the downfall of civilization. I mean, come on, what's next, an eighty year-old president? Anyway, what made you like the name?\"\n\t\t\n\t\tYou laugh. \"Well, it sounded cool and shocking. I imagined a horde of shambling zombies wearing ruined suits, dresses, jewelry, and watches.\" You give him a conspiratorial smile. \"Or maybe a figure with a baseball bat walking up a rich politician's driveway. It's up for interpretation, right?\"\n\t\t\n\t\tAurora's green hair catches your attention out of the corner of your eye, and you notice her bobbing her head enthusiastically. She catches your gaze, and her eyes have a humorous sparkle to them. \"Cool. My brother was a city councilor, and now he's a cop, and he sucks.\"\n\t\t\n\t\tBaxter snorts and shakes his head, grinning through his bushy beard. \"Remember that time he did security at one of our shows and went full off-duty cop and tried to arrest someone for throwing a water bottle at us?\" The band lets out a chorus of groans. Clearing his throat and folding his arms, Baxter looks at you with a more serious expression. \"So, it looks like you've got taste and guts. I'm not disappointed, so far.\"\n\t\t*goto growl \n\t\t\n\t\t*label charisma_band \n\t\t*set charisma_band true \n\t\t*set band \"Dead and Dreaming\"\n\t\t*set mysterious +1\n\t\t*set charisma +2\n\t\t*set deception +1 \n\t\t*set azure +1  \n\t\t(+1 Deception, +1 Mysterious, +2 Charisma, Azure Approves)\n\t\t*line_break \n\t\tYou offer an uncertain smile. It almost feels like you're dreaming right now, but the huge man in front of you is very real. \"Dead and Dreaming? Yeah, definitely Dead and Dreaming.\"\n\t\t\n\t\tBaxter's bushy eyebrows go up, and he scratches his beard, humming thoughtfully to himself. You notice Larry sneering at you, no doubt thinking you've failed the test. Yet Azure is already swooping in, gently nudging Baxter out of the way with pokes to his side. He gasps and jumps away, shielding himself with his massive hands. \"Hey, stop. I will pick you up and put you over my shoulder, dammit,\" he half-warns, half-laughs. \n\t\t\n\t\tUnbothered, Azure does a curtsy at you with an imaginary dress and flashes a smile. Then she shrugs, saying casually, \"Baxter doesn't look very enthusiastic about your answer because that name was my idea. Trust me, the name's awesome. It was voted the most dreamy by fans.\"\n\t\t\n\t\tAurora and Tariano share a look across the room and a chuckle at Baxter's expense. Baxter rolls his eyes, smiling wryly as he flips his middle fingers and displays them to his band mates. Aurora immediately gives him two giant middle fingers in return with her drum sticks. Baxter laughs. \"Alright, alright. I fucking lost. Happy?\"\n\t\t\n\t\tAzure winks at him and then turns her attention back to you. \"If you're interested, I thought of the name one time when I was really sick with the fever. Plus my grandma gave me bad chicken soup and it made me throw up. My body felt like lead, and I couldn't move, but it felt like I was falling and falling. Then I had this funny thought: what if you died, but still dreamed one more time?\" She clears her throat, suddenly looking almost bashful. \"So, anyways. Why'd you like the name?\" \n\t\t\n\t\tYou smile slowly. \"That's pretty cool. I was thinking something similar. I was imagining being in a dream where you could do anything you wanted, but once the dream was over, you would die. You know, in your sleep.\"\n\t\t\n\t\tLarry rolls his eyes so heavily that he rolls his head with them. He makes animated gagging noises to boot, and grins at Aurora for approval. She snickers, more so at him than with him, and looks away. Meanwhile, Azure bobs her head at you and scrunches up her lips in a look of pleasant surprise. She points her finger at you and looks around at her band mates. \"I really like ${name}. Don't know why. Just do.\"\n\t\t*goto growl \n\t\t\n\t\t*label intelligence_band \n\t\t*set intelligence_band true \n\t\t*set band \"Advocate Cannibalism\"  \n\t\t*set rebellious +1\n\t\t*set tough +1 \n\t\t*set intelligence +2 \n\t\t*set tariano +1 \n\t\t(+2 Intelligence, +1 Tough, +1 Rebellious, Tariano Approves)\n\t\t*line_break \n\t\tYou consider your answer for a few seconds, trying to decide which one sounds most interesting, and the least likely to be some sort of trap. After taking a deep breath, you say, \"Advocate Cannibalism.\"\n\t\t\n\t\tYou flinch in surprise when Baxter squeezes his eyes shut and throws his head back, letting out a loud groan. Your first thought is that you fell into a trap after all. Your second is that Baxter may have lost a bet. He clenches one great fist, shaking it as he says, \"No, you weren't supposed to say that.\"\n\t\t\n\t\tAzure and Aurora share a meaningful look and a knowing laugh from across the room. Larry laughs louder than anyone, the glee evident on his face as he no doubt thinks you've failed the test. You look around, trying to gauge everyone's reaction while your mind is racing. Tariano comes to your rescue, getting up from his chair and coming over to you. \n\t\t\n\t\tHe playfully nudges Baxter out of the way with an elbow to his side. Baxter scowls and smiles at Tariano at the same time, aiming a punch at his shoulder, which he dodges. Tariano clears his throat, looking almost sheepish as he says, \"I came up with that name, which is why Baxter is acting so salty.\" He looks at you inquisitively. \"I'm curious, what made you choose it?\"\n\t\t\n\t\tYou scratch your head thoughtfully, a curious smile crossing your lips in return. \"It sounds...well, misanthropic, but with a purpose, with something to say. Maybe it's just the opposite. I want to know, whatever it is.\" \n\t\t\n\t\tTariano's brown eyes seem to brighten at your words. He nods eagerly, glancing around at the others to catch their attention. Azure winks, and Aurora gives him a little thumbs up. Looking back at you, Tariano says, \"That's actually exactly what I was going for. Don't worry, I'm not a real live cannibal or anything.\"\n\n\t\tLarry looks crestfallen, and nearly drops the beer that he was holding as he loses his focus. Something about his perfectly timed reaction makes the room howl with laughter, and it's your turn to shoot Larry a triumphant look. He looks filled with chagrin, and glares at you. Somehow, you're navigating these choppy waters alright thus far. \n\t\t*goto growl \n\t\t\n\t\t*label deception_band \n\t\t*set deception_band true \n\t\t*set band \"Atomic Decay\"\n\t\t*set deception +2 \n\t\t*set intelligence +1 \n\t\t*set mysterious +1 \n\t\t*set aurora +1 \n\t\t(+1 Mysterious, +1 Intelligence, +2 Deception, Aurora Approves)\n\t\t*line_break \n\t\tYou scratch your chin thoughtfully, trying to look more casual than you feel on the inside. \"Atomic Decay.\"\n\t\t\n\t\tBaxter rolls his eyes heavily and hangs his head forward dramatically, groaning loudly. The first thing that crosses your mind is you've somehow landed on the trick option. Shaking his head, he gesticulates in frustration as he says, \"Nerd!\"\n\t\t\n\t\tYou blink hard in surprise, stiffening as Larry cackles with mocking laughter. Tariano and Azure are laughing too, but Tariano has his palm on his forehead and Azure rolls her eyes at Baxter and gives you a sympathetic look. Aurora points at you with a drumstick. \"That one was my idea. Don't worry, Baxter just has one brain cell and it's usually busy thinking about riffs or horror movies. So, what made you choose it?\"\n\t\t\n\t\tTariano howls with laughter, and quickly has to dodge a resulting punch from Baxter. You consider Aurora's question for a few seconds. Your mind goes to the space documentaries you used to stay up watching all night. \"For a long time, I thought fewer things could be more terrifying than black holes. Well, the thought of atoms decaying...\" You shiver, wincing with a wry smile. \"It gives me existential dread just trying to wrap my head around it.\"\n\t\t\n\t\tLarry makes animated gagging noises and then grins like a fool at the others. Baxter laughs at him and Azure ignores him. Aurora simply nods slowly, a satisfied expression on her face. \"Gnarly.\"\n\t\t*goto growl  \n\t\t\n*label growl \n*page_break \n\nNow that you have had time to acclimate to your surroundings, you're able to absorb more details about the other band mates. Baxter is wearing a black hoody with gory art, baggy black cargo pants covered in large pockets, and black combat boots. His dedication as a guitar player is evident as his fingertips are covered in thick callouses, and one of them is covered with a band-aid. \n\nWhen Aurora gets up from her stool to get a soda, you see that she's wearing a baggy black crop top, a black jean jacket, black skinny jeans with rips by the knees, and black combat boots. On her side, you notice a tattoo of a pale blue ghost cat on their back, playing with a ball of yarn. \n*if (attracted_females)\n\tYou wonder if she has any more cool tattoos.\nTariano wears a black band hoody showing a ghost leaving his body behind as a man dies watching television, baggy black sweatpants, and black running shoes. His chin is clean shaven and bares a distinct scar in the shape of an X.\n\nIt's obvious your future band mates have a certain vibe, and you're now feeling grateful that Kanibor made you change your clothes and aesthetic after all. Baxter picks his guitar up and points at you with a bright red pick. \"Your final test is, obviously, a vocal performance. The drill is this: we play a song for you, and you have five minutes to come up with some scratch lyrics and singing. Also, smoke breaks don't pause the clock.\"\n\nHe says this with a pointed look at Larry, who seems oblivious. A knot appears in your stomach, twisting and turning and making you nauseous. Your throat feels tight, making it difficult to breathe, and your face suddenly feels burning hot. You have to conjure up vocals for a song in five minutes? You've never so much as sang at a middle school talent show. Swallowing hard, you take out the Necrophone. \"Where do I plug this in?\"\n\nImmediately, the atmosphere in the room changes, and all eyes gravitate towards the skull microphone. This is becoming a familiar experience. Tariano stares at the mic with wide eyes, fascinated, while Aurora gets up from her stool, craning her neck to get a better look. Once again, Azure and Larry look fixated. Baxter, face shining with marvel, looks back and forth at his band mates in a wordless dialogue. He clears his throat. \"Extremely sublime microphone. Here, I'll help.\"\n\n*page_break \n\nAs Baxter gets the Necrophone hooked into an amp and the others get their instruments ready, you realize your nerves are slowly but surely diminishing. With the mic in your hand, you feel a sudden, powerful, and almost certainly unnatural confidence in your abilities. Your mind is strangely calm, and brimming with creativity. Even though you have scarcely been in this new environment for a few minutes, you feel as though you have been living and breathing heavy music for years or even decades. \n\nYour vocals chords, peculiarly, feel relaxed and warmed up. Although you were never a musical expert before, musical theory now seems like an innate ability and talent rather than an acquired body of knowledge. More than any of that, you know, without quite knowing how, that the Necrophone has the ability to subtly enchant its listeners just as it can enchant you. You shiver uncomfortably as you remember that it's Kanibor giving the mic its powers. \n\nTariano moves his chair out of the way and stands, visibly excited by the Necrophone. He smiles eagerly at you. \"So, we're not totally barbaric. You have to create some scratch vocals for a song, but we're at least giving you the option of what vibe you want the song to have.\" He holds up four fingers and ticks them down. \"Fast and aggressive, groovy and catchy, groovy and intricate, or atmospheric and mysterious.\"\n\nYou notice him wiggling his eyebrows subtly at the words 'groovy and intricate', and you get the feeling that each band mate has their own favorite instrumental out of the selection, just like with the band names. Something tells you that regardless of the vibe of the song you choose, you're not getting country or pop. Probably not even rock. Evidently, you'll be achieving your stardom in the metal music industry. As if reading your mind, Baxter clears his throat loudly and says, \"To be clear, do whatever you want as long as you keep it death metal.\"\n\n[i]Death metal. Got it,[/i] you think, your head swimming with the sudden rush of possibilities and uncertainty. Then your thoughts switch to the new band name.\n[i]${band}.[/i]\n*if (tough_band)\n\tIt's an undeniably cool name bound to make the heads of uptight people and control freaks everywhere explode. At the absolute minimum, it's a better name than Alive Politicians. That would be boring.\n*if (charisma_band)\n\tIt's a creepy, yet strangely whimsical name that you can't help but turn over and over again in your head. At the very least, it's superior to Alive and Dreaming. That would be redundant.\n*if (intelligence_band)\n\tIt's an instantly provocative, yet somehow thoughtful name that is bound to catch people's attention and make them curious. At the absolute minimum, it's a superior name than Advocate Pescetarianism. That would be anti-climactic. \n*if (deception_band)\n\tIt's a name that immediately strikes you as grand yet mysterious at the same time, and you wonder if others will appreciate it the way it's intended. At the very minimum, it's a better name than Atomic Recovery. That would be weird.\nAurora clears her throat. \"No pressure or anything. We'll just give the gig to Larry if you choke.\" \n\nLarry gives you a gloating smile, but you can't help but notice the waxing concern behind his eyes. You wonder what kind of vocals he was able to display. You thought you heard some kind of screaming underneath all that rumbling at the storage unit before Larry came outside, but you couldn't be sure. You suppose it doesn't matter. Behind all that bravado, Larry clearly knows he's finished. What kind of song do you want to sing to? \n*choice \n\t#Fast and aggressive \n\t\t*goto tough_growl \n\t\t\n\t#Groovy and catchy  \n\t\t*goto charisma_growl \n\t\t\n\t#Groovy and intricate \n\t\t*goto intelligence_growl \n\t\t\n\t#Atmospheric and mysterious \n\t\t*goto deception_growl \n\t\t\n\t\t*label tough_growl \n\t\t*set tough_growl true \n\t\t*set tough +2\n\t\t*set intimidating +1 \n\t\t*set charisma +1\n\t\t*set baxter +2\n\t\t*comment inspired by Hammer Smashed Face \n\t\t(+2 Tough, +1 Intimidating, +1 Charisma, Baxter Approves)\n\t\t*line_break \n\t\tYou take a deep breath as excited jitters return. You can only imagine what you're getting yourself into. \"Fast and aggressive.\"\n\t\t\n\t\tBaxter grins and wiggles his eyebrows in approval, and shoots a look at Aurora, who raises an eyebrow with a slight smile. Immediately, the song begins with pummeling riffs from Baxter and Tariano, interposed with frenetic blast beats from Aurora. As Azure jumps into a sudden, early spotlight bass solo with rapidly ascending and descending bass noodles, you feel the lyrics and vocal patterns ready to burst forth from your mouth. \n\t\t*label lyrics \n\t\t\n\t\tYou don't miss the looks of pleasant surprise on the band mates' faces and the look of horror on Larry's as you ready the Necrophone with no practice or preparation needed. When you open your mouth, the voice that comes out and is projected through the microphone is not really your own. Well, not just your own. Your first thought is that whatever is inside this microphone is some kind of monster.\n\t\t\n\t\t*if (charisma_growl)\n\t\t\t*goto charisma_lyrics \n\t\t*if (intelligence_growl)\n\t\t\t*goto intelligence_lyrics\n\t\t*if (deception_growl)\n\t\t\t*goto deception_lyrics \n\t\tLyrics of intense, hyper descriptive righteous violence tumble from your lips, but in primal, powerful growls that intensify yet obscure their true meaning simultaneously.\n\t\t\n\t\tYour shock does not prevent you from continuing to 'sing'. The band launches into more driving, crunchy riffs and frantic blast beats alternated with several beats of groovy, evil guitar riffs from Tariano, highlighted by subdued, creative drumming from Aurora. At the same time, you attack the song with aggressive, guttural vocals that sound foreign and inhuman, yet filled with the universal human emotion of rage.\n\t\t*label monstrous \n\t\t\n\t\tYou stretch out the last syllable of key lines in powerful growls, making goosebumps crop up all over your body. Your mind is swirling frantically now and your heart is threatening to pound out of your chest. Yet you're enjoying it. You hardly knew a human being could create those monstrous noises, and now they're coming out of you automatically, effortlessly. And the band is [b]loving[/b] it. \n\t\t*if (charisma_growl)\n\t\t\t*goto charisma_reactions\n\t\t*if (intelligence_growl)\n\t\t\t*goto intelligence_reactions \n\t\t*if (deception_growl)\n\t\t\t*goto deception_reactions \n\t\t\t\n\t\t*page_break \n\t\t\n\t\tBaxter stomps around the storage room, headbanging and even whirling his long hair around like a windmill during your extended growls. Tariano stalks around the room, headbanging with a look of disgust and concentration on his face. He stumbles, dizzy, and balances himself with one foot on his amp as he continues to play with absolute focus. \n\t\t\n\t\tAzure keeps jamming elatedly by Aurora's drum set as Aurora drums her heart out with a grin on her flushed face. You think you even notice Azure trying to mouth your lyrics, getting half of them hilariously wrong and the other half impressively accurate. Halfway through the song, Baxter stops playing, sending the other instruments tumbling to a halt. He jabs a finger at you. \"You, my genius, crazy, scary friend, are officially a member of ${band}!\"\n\t\t*goto blood \n\t\t\n\t\t*label charisma_growl \n\t\t*set charisma_growl true \n\t\t*set charisma +2\n\t\t*set chill +1\n\t\t*set intelligence +1\n\t\t*set azure +2\n\t\t*comment inspired by Pulverized \n\t\t(+2 Charisma, +1 Chill, +1 Intelligence, Azure Approves)\n\t\t*line_break \n\t\tYou smile, trying to remember that this whole thing is supposed to be awesome, not terrifying. Although, you suppose that a little anxiety is what makes things fun. \"Groovy and catchy, obviously.\"\n\t\t\n\t\tAzure smiles brightly and bobs her head in approval, making her shaggy mullet bounce and tumble over her slender shoulders. She shoots Baxter a meaningful look, and he waggles his eyebrows and sticks out his tongue playfully past his bushy beard in obvious celebration. \n\t\tImmediately, the band launches into the song with energetic, dark riffs from Tariano and Baxter and aggressive blast beats from Aurora. Black, red, and green hair fly as the band headbangs in unison. Only Larry's blonde hair doesn't participate. \n\t\t\n\t\tThe band is supported by dirty, jangling bass riffs from Azure, who headbangs, and kicks, and spins on one foot as her tiny fingers fly over the bass guitar's thick strings. The bass rumbles the soles of your feet and travels through your body. The aggressive yet catchy guitars, bass, and drums build to a clear vocal entrance, yet you feel no panic. Instead, you feel the lyrics and vocal patterns coming to you as effortlessly and smoothly as a baseball flying from a pitcher's glove.\n\t\t*goto lyrics \n\t\t\n\t\t*label charisma_lyrics \n\t\tLyrics about societal woes that are imminently relatable, conveyed in angry and apathetic ways, flow from your lips in aggressive, raspy growls. The almost inhuman sounding voice amplifies yet muddles the lyrics' meaning all at once. Only if someone was really paying attention could they understand your harsh vocals through the music.\n\t\t\n\t\tYour initial alarm doesn't prevent you from continuing to 'sing'. The band transitions silky smoothly into groovy, squealing riffs, with more blast beats accented with cymbal fills, and that powerful, rumbling bass from Azure. Your slightly quiet vocals compliment the instruments nicely instead of overshadowing them, and you attack the song with vicious high screams at key moments. These screams bring goosebumps cropping up all over your body, and cheers of surprise from Azure and Baxter.\n\t\t*goto monstrous \n\t\t\n\t\t*label charisma_reactions \n\t\t*page_break \n\t\t\n\t\tAzure is still jamming her heart out, her face shining with sweat and joy. She fans herself with her hoody during a brief couple of seconds with a lapse in bass notes.  \n\t\t*if (attracted_females)\n\t\t\tYou can't help but appreciate her cute, flat stomach and bright yellow belly button ring.\n\t\t*if not(attracted_females)\n\t\t\tYou can't help but notice her bright yellow belly button ring. \n\t\tBaxter stomps and struts around the room, headbanging to the rhythm and sending his long hair flying in every direction. You wonder how he doesn't get dizzy, until he nearly stumbles into Tariano and shares a laugh with him.\n\t\t\n\t\tTariano headbangs rapidly, making his red hair look positively fiery as he circles around Baxter with a grin. Aurora has a big grin on her flushed face as well as she plays. You even notice her closing her eyes as she introduces random but brilliant drum fills at slower, groovier moments. Before the song is even halfway over, Azure stops playing. The others continue to play energetically, but the loss of bass immediately makes the song sound flat, and they soon stop playing too. Azure skips over to you with a dazzling smile. \"You, stranger, are now officially the singer of ${band}!\"\n\t\t*goto blood \n\t\t\n\t\t*label intelligence_growl \n\t\t*set intelligence_growl true \n\t\t*set intelligence +2 \n\t\t*set charisma +1 \n\t\t*set mysterious +1 \n\t\t*set tariano +2\n\t\t*comment inspired by Innards Decay \n\t\t(+2 Intelligence, +1 Mysterious, +1 Charisma, Tariano Approves)\n\t\t*line_break \n\t\tYou smile, but suddenly feel it takes a lot of effort as fresh nerves rush in. Still, you find yourself intensely curious about what's going to happen next. \"Definitely groovy and intricate.\"\n\t\t\n\t\tTariano smiles appreciatively in return, almost looking conspiratorial with you for picking what was evidently his song. You're sure it's his song now. He sends Azure a meaningful look from across the room, and she shakes her shoulders playfully several times as if warming up for a run. The song begins with aggressive yet simple riffs from Tariano and Baxter, rumbling bass from Azure, and rapid, cymbal-filled drums from Aurora.\n\t\t\n\t\tA few seconds into the song, Tariano and Baxter abruptly switch into more complex, energetic riffs at a lower, dirtier pitch. Aurora and Azure immediately follow them with blast beats and aggressive, high pitched bass bobbing above the surface of the choppy waters. You're surprised to find yourself bobbing your head irresistibly to the heavy and quickly evolving, yet imminently groovy music. \n\t\t\n\t\tThe third transition emerges only a handful of seconds after the second, with a new set of scaling, floating tremolo riffs building smoothly off the previous ones and driving to the obvious, epic vocal entrance. Shockingly, you feel no urgency or panic. Instead, you conjure lyrics and vocal patterns in your mind as easily as recalling a deepest, fondest memory.\n\t\t*goto lyrics \n\t\t\n\t\t*label intelligence_lyrics \n\t\tLyrics about having the knowledge necessary to end societal suffering and evils, yet no actual power to do so, are driven with harsh, guttural growls that are hardly recognizable as human. These deep growls somehow put a greater emphasis on the lyrics' meaning while simultaneously muddying them. While some words are rasped and decipherable, you release the final words of key lines in intensely low gutturals that conjure goosebumps everywhere.\n\t\t\n\t\t*page_break \n\t\t\n\t\tYour initial confusion and alarm don't stop you from continuing to 'sing', fortunately. The band escalates the aggression of the song as it continues, and you accordingly ramp up the tempo and raspy tones in your singing. Catchy but sinister stalker-riffs from Tariano and squeally-dive bombs from Baxter give the music a dark, wicked quality. At key lines, you produce alternately guttural and raspy growls that draw impressed whoops from your band mates.\n\t\t*goto monstrous \n\t\t\n\t\t*label intelligence_reactions \n\t\tTariano has his eyes closed, and is leaning so far backward as he shreds his guitar that you're almost afraid he'll collapse into his amp. When he opens his eyes, he shoots you an encouraging grin. Baxter is so busy headbanging that his face is just a tornado of black hair. \n\t\t\n\t\tAzure is moving back and forth in front of Aurora, kicking and headbanging energetically as Aurora laughs and flips her drumsticks in the air. Neither one of them seems worried about being hit with a drum stick or kicked by a stray foot. When Tariano finally comes out of the clouds, he stops the song halfway through and practically runs towards you, his face shining with perspiration and admiration alike. \"You're in. You're in ${band}, you wonderful genius!\"\n\t\t*goto blood \n\t\t\n\t\t*label deception_growl\n\t\t*set deception_growl true \n\t\t*set deception +2 \n\t\t*set mysterious +1 \n\t\t*set intelligence +1 \n\t\t*set aurora +2 \n\t\t*comment inspired by The Bleeding \n\t\t(+2 Deception, +1 Intelligence, +1 Mysterious, Aurora Approves)\n\t\t*line_break \n\t\tAll of a sudden, new anxieties creep in, and it's difficult to keep your voice from breaking and embarrassing you. Somehow, you manage. Something more moody seems like it could be less likely to end in disaster somehow. \"Atmospheric and mysterious,\" you finally say mildly. \n\t\t\n\t\tAurora smiles eagerly and bobs her head, making her wavy green hair fall over her shoulders. She uses a drumstick to point at Tariano, who is already using a finger gun at her, and they share a laugh you can already tell they've had many times before. The song begins with simple but aggressive drums from Aurora and a simple but aggressive riff from Tariano, and is quickly followed by prominent, jangly bass from Azure. \n\t\t\n\t\tAfter a few seconds of buildup, Baxter adds a mid-tempo, atmospheric riff while Tariano switches to a scaling, winding riff that conjures images of a sidewinder rattlesnake's sand prints to your mind. The rattlesnake is out hunting for prey, licking the air for the scent of blood. The vocal entrance that is begging to arrive has arrived, yet with no fears or trepidation, you find yourself ready with the perfect lyrics and vocal patterns.  \n\t\t*goto lyrics \n\t\t\n\t\t*label deception_lyrics \n\t\tLyrics of intimate knowledge of the horrors and evils of the world, and the apathy that comes with the seeming endlessness of them, are conveyed at first with a gritty, pained scream to draw attention. Then, you conjure powerful, raspy growls to emphasize yet obscure the lyrics' meaning further.\n\t\t\n\t\tYour complete surprise somehow does not prevent you from continuing to 'sing'. The band continues to escalate and evolve the song, but slowly and subtly, as if nurturing a garden full of carnivorous plants. Aurora adds creative drum and cymbal fills, and Tariano and Baxter add pedal or whammy bar effects at key moments to create wicked ascending, wavy tremolos or gnarly dive bombs.  \n\n\t\t*page_break \n\t\t\n\t\tAs all of this is happening, Azure goes wild for only two or three measures at a time between more subdued notes, shredding her bass' thick strings with her nimble fingers. Strategic lulls in the other instruments show off the filthy bass lurking in the background. At the same time, you skillfully alternate between raspy, decipherable growls and guttural growls, punctuated with more angry, vicious high screams.\n\t\t*goto monstrous \n\t\t\n\t\t*label deception_reactions \n\t\tAurora beams at you and her band mates as she creatively introduces drum fills, blast beats, and even time signature changes seemingly at her pleasure. The others seem to be used to this and adapt smoothly. Baxter headbangs rapidly and then slowly as the tempo of the song changes, making his hair fall in curtains over his face. Tariano has his eyes closed and is already murmuring along to your newly created lyrics and actually getting some of them right. \n\t\t\n\t\tAzure, laughing gleefully, snatches up a stray flying drumstick and appears to celebrate beneath the din about actually catching something. Then, right when you're in the middle of a long, low growl backed up by buzzing, descending riffs from Tariano and Baxter, Aurora practically leaps up from her drum set and moves quickly to you. She grabs you by the shoulders, shaking you with a crazed sort of grin. \"Stop, stop. Stop. You have to be the singer of ${band}. You just have to!\"\n\t\t*goto blood \n\t\t\n*label blood\n\nYou blink in surprise. You couldn't have heard that right. Yet the entire band is celebrating around you. They're fortunately oblivious while your mind suddenly starts to wander to dark places. As Baxter laughs and raves about your growls, Tariano extols the virtues of your uniquely brutal vocal abilities, and Azure and Aurora wordlessly grab and scream at each other in excitement, you try to wrap your mind around what just happened. You feel like you just experienced a visceral dream or some drug induced trip.\n\nFeeling lightheaded, you stumble backwards, trip, and land hard with your rear on Baxter's giant amp. No one notices, except Tariano, who manages to pat you once on the shoulder before yelping and dodging a headlock from a very jubilant Baxter. Dazed, you look up and see Larry still sitting at the card table, his face looking like it's going to burst with blood. His expression is screwed into stormy hatred. A beer can is crushed and leaking in his shaking, bloody fist. You suddenly feel grateful you're not alone with him again.\n\nYour own hands are trembling and clammy, and your head is swimming like a mirage in a desert. As your spotty, blurry vision gradually focuses more, your aching eyes widen in barely contained horror. In the center of your palm, fresh blood trickles liberally from a wound left by small fangs. You bring the Necrophone slowly to your eyes. It gives you a dead, bloody smile as Kanibor whispers in his inhuman, guttural tones, [b]\"I told you I would give you stardom. This is my price.\"[/b]\n\n*finish ", "chapter3payment": "*comment stat checks: 10\n\n[b]Chapter Three of Eight: Blood Payment[/b]\n\n*image moon1.jpg\n\nHaving connections is essential to succeeding quickly, even in the underground music industry. Fortunately, Baxter's father was a roadie for a legacy nu metal band, Brain Rot, for several years. Now, one of their band members is apparently here at this very bar to attend your first ever live show with your new lineup to determine if ${band} is promising enough to be signed to their record label or not. That's pretty much all you know, so, no pressure. \n\nYour band is nearly ready to play on the cramped little stage, and the small bar is quickly filling to capacity. Dozens of people of all sorts of ages create a sea of black clothes, with splashes of blood red jeans or lime green mohawks here and there. Although many of the people in the crowd look like high schoolers and stick closely together, several men with leather jackets or big beards flecked with gray stand silently in the back, arms folded or holding beers. \n\nYour band mates are visibly nervous. Aurora's hands are clenched into fists on her lap, and she stares into the crowd with a nauseous look, and Tariano's restless leg is wobbling Baxter's mic stand. You thought they were supposed to be experienced musicians with fans. \n\nThen you realize they may be nervous about unveiling your, um, unique vocal style. Whatever the case, you feel oddly calm and self-assured. Or, at least, more calm than you have any right to be. You look down at the shiny Necrophone clutched tightly in your fingers, wondering if you're already becoming dependent on it to chase away the nerves. \n\nThe show is only a few minutes away from beginning, but Larry is currently having an argument with Baxter that is barely concealed by the sounds of instruments being tuned and sound checked. Larry is red in the face and gesticulating wildly with his hands while Baxter rolls his eyes. Shaking his head, the guitarist booms loudly, \"Alternating vocalists on songs? That's not necessary. You're a fucking rad backup, man, and you can do the high screams like a maniac. Even better than ${name}.\"\n\nLarry looks as though Baxter is telling him he has to get a root canal without analgesics. \"Fuck yeah, I'm a useful backup singer and a stellar water boy. I hope I get Employee of the Month. Does it come with a plaque and a fast food coupon?\"\n\nBaxter deadpans him, saying in a voice you can hardly hear, \"Look, if you don't wanna compromise, just, seriously, make yourself useful and go fetch the cooler will you? What are we, robots? How are you not thirsty?\" \n\nLooking like his head is going to explode like a watermelon hitting the pavement from a two story window, Larry silently storms off the stage, fists clenched at his sides. Tariano tries hard to stifle his laughter while Aurora provokes him with drum stick jabs to his side. Azure almost looks sympathetic, but shrugs and says, \"He didn't want to do backing vocals. Not even the high screams. I think it's going to shatter his heart when someone finally breaks it to him that we aren't going to have co-vocalists, and ${name} definitely isn't going to be the backup.\" \n\n*page_break \n\nYou almost feel sorry for Larry. How long did he work on his craft just for you to snatch it away with an alien microphone? Well, it's your life or his career, and at this point, there can hardly be any turning back...Larry quickly returns with the blue cooler and practically dumps it at Baxter's feet. \"Can I give anyone a foot massage while I'm at it?\" he huffs, already opening the lid and reaching for a beer. \n\nEveryone ignores him, seeming either annoyed or nervous by his outbursts. The heat of dozens of bodies has made the inside of the bar sweltering and stuffy, and thick beads of condensation run down the side of the cooler. Your mouth is so dry that your tongue feels like it's covered in mud, and your throat itches dreadfully. Fortunately, your band mates made sure the cooler had everyone's favorite refreshments. What will you drink? \n*choice\n\t#A beer, because you could use one\n\t\t*goto tough_drink\n\t\t\n\t#Flavored water, because it's fun and hydrating \n\t\t*goto charisma_drink\n\t\t\n\t#Water, so you can stay properly hydrated \n\t\t*goto intelligence_drink\n\t\t\n\t#An energy drink, so you can pretend not to be exhausted\n\t\t*goto deception_drink \n\t\t\n\t\t*label tough_drink\n\t\t*set tough_drink true \n\t\t*set charisma +1 \n\t\t*set intimidating +1 \n\t\t*set tough +2\n\t\t*set baxter +1 \n\t\t(+2 Tough, +1 Charisma, +1 Intimidating, Baxter Approves)\n\t\t*line_break \n\t\tReaching into the cooler, you rifle around through the ice until you find a can of beer. You check the alcohol content out of curiosity. 7%. You didn't even know they made gas station canned beer like that. Baxter plucks a can out from the ice with one giant hand and presses it to his forehead. He smiles, closing his eyes and letting out a long, satisfied sigh. \n\t\t\n\t\tCracking open the can, Baxter guzzles half of it down in one go. He wipes the suds off his mustache and grins at you, gesturing with his can. \"Don't let Tariano see you drinking or he'll lecture you about proper vocal care. Want my opinion? Beer can make vocals sound muddier, in a good way. Makes it more brutal, in a way, in my opinion.\" \n\n\t\tTariano, who is carefully wiping off the condensation from his water bottle with his sleeve, rolls his eyes and says, \"What do I know? ${name} could probably drink peanut butter and still sound good.\" \n\n\t\tFeeling even more parched, you crack open your can and take a long drink. The beer is smooth and bubbly, with a mild but pleasant toasty flavor. You take another deep drink until your mouth aches and burns from the cold carbonation. The thought occurs to you that you're drinking on the job, and this makes you chuckle. Already, you're starting to feel more relaxed and loose, and the packed bar seems to take on a slightly more welcoming, vibrant hue. \n\n\t\tAfter you guzzle the remainder of the can, you notice that your saliva is thick and your throat is a bit stiff, and wonder if the Necrophone will somehow remedy that. Baxter crushes his can between two palms and tosses it like a frisbee towards a trash can. The can bounces loudly against the rim and clatters to the floor. Unabashed, Baxter clenches a fist in mock celebration. You smile, feeling more comfortable around these strangers than you did just yesterday. \"Alright, I guess we're both ready.\" \n\t\t*goto show \n\t\t\n\t\t*label charisma_drink\n\t\t*set charisma_drink true \n\t\t*set charisma +2 \n\t\t*set chill +1 \n\t\t*set intelligence +1\n\t\t*set azure +1 \n\t\t(+2 Charisma, +1 Chill, +1 Intelligence, Azure Approves)\n\t\t*line_break \n\t\tReaching into the cooler, you search through the ice and find a bottle of red flavored water. The ice feels soothing on your hot skin, and intrusive thoughts makes you consider plunging your face into the cooler for a hot second. Azure waits patiently and then grabs a bottle of blue flavored water for herself. She takes a big long drink, letting out a satisfied sigh. Smiling cheerfully, she says, \"Ah, blue. My favorite flavor.\" \n\n\t\tAurora, cracking open a purple energy drink, snorts. \"Good, you referred to it by its color. If someone calls it 'blueberry blizzard' or 'strawberry blast' or whatever, they're an undercover cop for sure.\" \n\n\t\tThis brings an ironic smile to your face, as you imagine that's probably the type of thing Officer Feter would do. He probably commits all the official drink names to memory. You drink from your bottle until your thirst is quenched. The sweet, cherry aftertaste lingers pleasantly in your mouth. Immediately, your dry mouth and throat feel better, and the heat and the resulting sweat trickling down your back don't bother you so much. \n\n\t\tAlthough you feel hydrated now, the sweet drink leaves your spit feeling slightly thicker than usual. You roll your eyes, chuckling dryly to yourself. With the Necrophone, you probably don't have to worry about details like viscous saliva effecting your singing voice. You have no idea how the mic actually works, but the alien magic might always remain mysterious.\n\n\t\tAzure sips her drink slowly, savoring it as she fiddles with some last minute settings on her bass pedals and amp. She glances over at you and offers an encouraging smile, sticks her tongue out playfully and gives you a thumbs up. You smile back, take another drink and say, \"Okay, looks like we're both officially ready.\" \n\t\t*goto show \n\t\t\n\t\t*label intelligence_drink\n\t\t*set intelligence_drink true \n\t\t*set intelligence +3 \n\t\t*set chill +1 \n\t\t*set tariano +1 \n\t\t(+3 Intelligence, +1 Chill, +1, Tariano Approves)\n\t\t*line_break \n\t\tYou rifle through the cans of beer, flavored water, and energy drinks until you find a lonely water bottle at the bottom. There might be more, but if so, they're hiding. Tariano has to search around for the last water bottle for several seconds and takes it with a relieved look, shaking the water droplets off a frozen hand. Smiling sheepishly, he brushes the curly red locks from out of his eyes and says, \"This is what happens when I leave Aurora and Baxter to stock up on beverages.\" \n\n\t\tAurora grins toothily and gives Tariano the middle finger. Baxter, cracking open a can of beer loudly, leans in close to Tariano and says, \"Which is why we don't let you choose, boring.\" \n\n\t\tYou take a long drink from your bottle as Tariano guzzles his. The cool, crisp water tastes wonderful in your dry mouth, and soothes your aching throat and tongue immediately. It's difficult not to chug the entire bottle, but a rapidly incoming brain freeze makes the decision easy for you. Tariano giggles, seeming to find your expression amusing, but then winces and presses fingers to his temples with a similar grimace. \n\n\t\tAlready, the refreshing drink is making the heat of dozens of bodies feel less oppressive, and a persistent itch in your dry throat has thankfully vanished. Even if you weren't taking proper care of your vocal chords before the show, something tells you a little vocal fatigue will be irrelevant when you're using the Necrophone. The skull microphone glints at you as though winking in affirmation. That's promising, and definitely not creepy.\n\n\t\tYou slowly exhale, absentmindedly tapping your condensation-slick water bottle as your mind wanders. The clarity hydration has brought you makes you wonder what you're doing for the fiftieth time. You would have never guessed a week ago you would wind up here. Azure seems to notice you ruminating and taps her bottle against yours in a toast, giving you an encouraging smile. You swallow and smile back. \"Alright, I think I'm ready.\" \n\t\t*goto show \n\t\t\n\t\t*label deception_drink\n\t\t*set deception_drink true \n\t\t*set deception +2\n\t\t*set tough +1 \n\t\t*set rebellious +1 \n\t\t*set aurora +1 \n\t\t(+2 Deception, +1 Tough, +1 Rebellious, Aurora Approves)\n\t\t*line_break \n\t\tAt the same time as you reach for a purple energy drink at the top of the cooler, Aurora's hand bumps into yours, sending ice cubes scattering across the stage. Baxter glances over and snorts. Aurora narrows her eyes at the can possessively and frowns at you playfully, but then withdraws her hand. \"Go ahead, it totally wouldn't be my third one today.\" \n\n\t\tTariano clears his throat and corrects, \"Fourth.\" \n\t\t\n\t\tChuckling, you accept the can, cracking it open and taking a long drink. The ice cold, carbonated grape flavored drink burns your mouth, and you let out a satisfied sigh. Aurora rifles around in the cooler, locates another energy drink, and proceeds to guzzle it down. Her hands seem to be shaking slightly, and you wonder if it's the nerves or the excessive caffeine. Already, you can feel the stimulant taking effect as your heart beat races and your own fingers tremble mildly. \n\n\t\tYou take another long drink, and your exhausted mind becomes a little clearer as the cobwebs gradually fall away. This delicious grape drink will help you forget for a couple hours at least that you haven't slept more than a wink since discovering the Necrophone in that meteorite. It's hard to believe it's been so long since then, yet everything has moved at a breakneck speed at the same time. \n\t\t\n\t\tAurora drains the last few drops from her can and tosses it at nearby trash can. It bounces off the rim and clatters onto the floor, and she trudges over to it, hanging her head with a prolonged sigh. Tariano catches your eyes and gives you a meaningful look, and you can't help but smile again. You're already feeling more comfortable around your band mates, even though the energy drink gives your stomach the occasional flutter. \n\n\t\tAurora returns to her drum set with a bit of a sheepish expression but gives you a [i]good[/i] sign and a small encouraging smile. \"Graceful as a swan, as ever.\" \n\t\t\n\t\tYou laugh. It's funny how drummers can be so miraculously coordinated, and then so not so. Taking a deep breath, you say, \"Okay, I'm officially ready.\" \n\t\t*goto show \n\n*label show\n*page_break \n\nFinally, the lights dim, and it's time to begin the show. Dozens of faces stare up at you expectantly. Most of them are excited, but many seem impatient or even skeptical. The energy in the room is palpable, and you can tell that they're waiting for a reason to go crazy or to heckle you. Many in the crowd murmur and point at the Necrophone, which seems to glow unnaturally in the red strobe lights. \n\nThe Necrophone. Hardly realizing what you're doing, without knowing exactly why, you bring the mic to your lips and speak loudly to the crowd. \"This is ${band}, and I'm just a nobody called ${name} who you've never heard of.\" You waggle the skull microphone, which glimmers red in the strobe lights. \"This beauty is called the Necrophone, and together, we're going to show you a whole new world...of brutal death.\"\n\nWhen Aurora sets into a groovy beat and Azure enters with dirty, rumbling bass, the crowd begins to shift, heads bobbing. When Tariano enters with a buzzing, evil guitar riff and Baxter drives in with an aggressive stalker riff, the crowd begins to writhe as individuals shove and head bang, looking like one great dancing mass in the red strobe lights. The energy is unsettling but undeniably infectious.\n\nWhen you bring the mic to your mouth and let forth a brutal, prolonged growl, the entire crowd loses its mind. Fans by the front of the stage have wide eyes or shared astonished grins at the one of a kind vocal style, and a mosh pit is rapidly forming in the center of the room. One teen with floppy hair has taken off his shoe and is waving it around. The band, which was already buzzing with energy, truly comes alive as you proceed to attack the fast, complex instrumentals with powerful, commanding guttural vocals. No one seems to care that they can't understand you. \n\nBaxter crouches as he shreds his guitar, swinging his long hair in circles like a windmill. Aurora is moving so energetically that she practically bounces on her stool. Her arms are a blur as her drum sticks fly across the drums and cymbals. Tariano's hair looks like a crackling fire around his head as he headbangs. Azure spins and kicks and dances around the small stage, wearing a jubilant expression on her face. Her bass causes the floor to vibrate, tickling the soles of your feet. \n\nAs ${band} plays, the bar continues to transform. A great circle has been cleared in the middle of the crowd, and as you snarl and growl monstrous tones and lyrics, fans shove each other back and forth, faces alive and shining with sweat. Fans. That, you can already tell you've won the honor of calling them. Burning cigarettes and blunts in the back of the bar create small points of light and fill the room with a smoky haze, and security is too busy bobbing their heads or even partaking themselves to care. \n\n*page_break \n\nYou've never attended a metal show before, let alone performed one, yet you can tell immediately that you are blowing it out of the water. The bar, with its flickering neon s
