\n\t\tAs you think about the lonely, cruel world that awaits you outside of this warm, safe room, you start to weep in earnest. You wrap your arms tight around yourself, trembling hard as sobs escape unrestrained from your lips. Vision blurred, snot running down your nose, you hang your head between your knees and cry until the hot water runs out. \n\n\t\tNo, this wasn't very sexy of you, but damn, did you need that release. After you have finally finished, you stretch out and let the water run over your aching back. Even though your eyes sting and your chest aches, your whole body feels lighter and more relaxed. With the water turning cold, you reach up and turn the faucet with a sigh. Back to the real world, and the horrors, domestic and alien, that await. \n\t\t*goto indulge \n\t\t\n\t\t*label intelligence_eviction\n\t\t*set intelligence_eviction true \n\t\t*set intelligence +2 \n\t\t*set charisma +1 \n\t\t*set rebellious +1 \n\t\t*set baxter +1 \n\t\t(+2 Intelligence, +1 Charisma, +1 Rebellious, Baxter Approves)\n\t\t*line_break \n\t\tYou don't want to seem desperate or pushy or anything like that, but the hour glass isn't just running out, it has a giant, ominous crack in it. You run a hand through your hair with a great sigh, taking out your phone and pulling up Baxter's contact. Before you can give yourself an opportunity to change your mind or start procrastinating, you dial his number and put it on speaker. \n\n\t\tThe phone only rings twice before Baxter picks up. [i]\"Shh. Shh! ${name} is calling. Tariano, I swear to god if you embarrass me, I'm going to punch you in the gooch.\"[/i] Baxter clears his throat and then says in a very deep, calm tone, \"Oh, hey ${name}, what's uh, crackalackin'?\" You can hear Tariano howling with laughter in the background followed by a thump and a groan and more laughter, this time from Aurora. \"I mean, what's up?\" Baxter says, clearly flustered. \n\n\t\tYou have to take a moment to gather your bearings. It's easy to forget that even though you were completely normal just a few days ago, to your band, you seem like some kind of genius rockstar or something. \"Hey,\" you say, thinking over your words carefully. \"I was just thinking, this music thing seems to really be happening, doesn't it? So, when do you think we'll start making real money, and how much do you think that could actually be?\" \n\n\t\tBaxter is silent for a few seconds, and the sound of shuffling and several voices murmuring drifts through your phone. Then, he says, \"It still feels like a crazy dream, right? I think it all depends on how hungry we are and how cool Barty is, honestly. Hell, maybe we'll all be able to quit our jobs and buy dirt bikes or jet skis or fancy new cars and whatnot when they sign us tomorrow.\" \n\n\t\tA gigantic weight seems to lift off your chest. You feel like you can actually breath for the first time since you opened the eviction letter. Your sigh is one of relief this time. \"That's awesome,\" is all you can think of to say. \"Okay, goodnight Baxter.\" \n\n\t\t\"Night,\" he says. \"Call me whenever you want. I never sleep. I'm like a vampire.\" \n\n\t\tYou chuckle and hang up the phone, feeling a little less dread for what the future holds. \n\t\t*goto indulge \n\t\t\n\t\t*label deception_eviction \n\t\t*set deception_eviction true \n\t\t*set deception +2\n\t\t*set tough +1 \n\t\t*set mysterious +1 \n\t\t(+2 Deception, +1 Tough, +1 Mysterious)\n\t\t*line_break \n\t\tWith a disgusted look, you crumple the eviction letter up into a ball and hurl it across the room into the waste basket. Pushing yourself up from the couch, you traipse to your tiny kitchen and open the cupboard. There are several packets of ramen stacked neatly in a pile, and nothing much else. It's a good thing you never get too tired of ramen. \n\n\t\tYou prepare a pot of water on the stove, trying to keep your mind on anything but rent. You turn on the stove fan, and the droning noise helps your mind drift as you stare into the boiling water. The roiling, churning bubbles and swirling tendrils of steam are mesmerizing to your fatigued, preoccupied mind. Soon enough, the kitchen is filled with the familiar, delicious savory smell of ramen. Your stomach grumbles painfully, demandingly. \n\n\t\tThe timer on your phone goes off, nearly making you jump. You're seriously losing it, but maybe you shouldn't blame yourself. You're so tired from the events of the past few days, and so mind blown from meeting a magical alien, that your brain feels like your noodles look. Even that pleasant thought isn't enough to ruin your appetite, so you take a bowl to the table. \n\n\t\tAs you slowly eat your noodles, barely noticing the salty, savory flavors, you stare blankly at the TV. After the things you've experienced, fictional stories don't seem very exciting anymore, and you don't think they would be able to comfort you very much, either. Eventually, you finish your meal and drink the warm broth, which feels good on your tired vocal chords. \n\n\t\tMechanically, you clear the table and wash your dishes. As you toss the empty ramen package into the trash can, bright red letters peaking out from within the crumpled up eviction letter grab your attention. With a scowl, you shove the wadded up piece of paper further down, burying it. As long as you can pull this singing career off, that thing can't hurt you. \n\t\t*goto indulge \n\n*label indulge \n*page_break ...\n\nA meteoric rise from everyday person to legend-in-waiting rockstar is as dizzying as you could have imagined. The stages that most musicians have to go through for months or years before breaking out seem to blazing by for you in a matter of days. You have hardly had time to take anything in before you and your band are at Barty's studio, Brain Rot Labs, for the pre-recording party. \n\nThe large, dimly lit room you are currently in is filled with at least two dozen goths, scenes, hipsters, emos, skaters, metal heads, and punks who were filmed as extras in a Brain Rot music video and were then invited to your signing party. Middle aged men with giant spiky mohawks, teen girls with chokers and black lipstick, and guys with long hair and denim or leather jackets all intermingle, and seem represented in almost equal measure. \n\nRed and green strobe lights flash overhead, and a machine in the corner of the room spews thick tendrils of fog across the dance floor. Behind a table covered with a turntable, mixers, and synthesizers, Barty blasts dark industrial beats through giant speakers. A blunt dangles from his mouth as he manipulates the turntables to create wobbling, rhythmic scratches to layer in with the music. \n\nThere's an impressive bar with glass chandeliers, couches lining the perimeter of the room, and even some billiard and foosball tables. Unfortunately for you, your main objective here isn't to have fun: it's to get your microphone back from Larry before the party ends. You scan the crowd anxiously, but there's no shortage of skinny pale guys with manes of blonde hair and black clothes. He doesn't appear to be here yet, which means he's definitely avoiding you. \n\nBaxter taps you on the shoulder and then catches the attention of the others as well. \"I stayed up so late last night practicing my guitar that my fingers look like they went into a garbage disposal,\" he shouts over the music. He wiggles his blistered, calloused fingertips for emphasis. \"I'm going to the bar to get drunk.\" \n\n*page_break \n\nBaxter sets off in the direction of the bar, and you and the others follow, maneuvering through the dancing crowd. Someone's bleached blonde mohawk nearly takes out your eye when you pass by, and a girl with platform, buckled boots squashes your toes as she stumbles past with a martini glass that she's probably too young to be drinking. Aurora raises a hand. \"I only like getting drunk at home. You all enjoy and I'll be the granny and make sure we can actually still play our instruments later.\" \n\nNow that you're all waiting in line together, you notice that the others all seem to have taken a little extra time with their outfits for the occasion. Azure, who is happily people watching with a cheerful smile on her face, wears faded blue jeans rolled up at the ankles, and an oversized white and gold hoodie with an oldschool rapper on the front. She winks and whispers in a conspiratorial way, \"Barty's favorite rapper. Saw it in an old Heavy Music Television interview.\" \n\nAurora is wearing black skinny jeans, a blue sports bra and a black fishnet jacket. She has black eye shadow and black lipstick, and her nails are painted a black that shimmers with rainbow, opalescent hues if caught with the right light. Tariano's red hair is even brighter than before, and the bottom of his hair is tipped with orange. He looks just as casual before with his baggy black sweatpants and hoody, but smells strongly of an expensive piney cologne. \n\nEven Baxter seems to have dressed up for tonight. His combat boots are polished, his cargo pants are even baggier with even more pockets, and he's wearing his most provocative hoodie yet: the graphic is three pregnant nuns stoning a drug addict. Also, you're pretty sure he's wearing sandalwood beard spray. \n\nPerhaps you should have thought about dressing up a little, but the eviction notice was somewhat distracting. \n*if (tough_eviction) \n\tYou didn't get much sleep, even after your music eventually lulled you off. You woke up several times throughout the night filled with anxiety or aching all over, and turning on your speaker didn't have the same charm after you were already groggy. \n*if (charisma_eviction) \n\tNot like you could afford more new outfits anyways. One of the first things you'll be buying when you have a credit to spare is a shower nozzle that actually has such luxuries as decent water pressure and multiple settings. \n*if (intelligence_eviction) \n\tYou suddenly smile and catch Baxter's attention with a raised eyebrow. \"[i]Crackalackin'?[/i]\" \n\n\tHis face goes beet red, and he smiles sheepishly. \"I was trying not to say the dorkiest thing I could think of. Nailed it.\" \n*if (deception_eviction) \n\tBesides, you probably shouldn't worry about your wardrobe until your diet consists of more than just ramen. Your stomach gives another nauseous pang, and you hope it's the nerves and not revenge of the noodles. \n\t\n*if (tough_outfit)\n\tBaxter nods at you, smiling brightly from beneath his bushy beard. \"I feel like we have the same killer vibe.\"\n*if (charisma_outfit)\n\tYou suddenly feel a tiny pressure at your elbow, and turn to see Azure tugging on the fabric with two fingers. She bats her eyelashes brightly. \"This must be your favorite outfit. It's so comfy.\"\n*if (intelligence_outfit)\n\tTariano grins at you, nodding with an impressed look at your outfit. \"I wish I could pull that off but trip pants aren't for klutzes, as the name suggests.\"\n*if (deception_outfit)\n\tAurora's eyes brighten when she notices your hoody. She leans down in front of you with a smile, squinting and tracing her fingertip along the band's logo. \"I was hoping you would wear this again. I used to love this band but could never remember who they were. Praxis Axes? [i]Cool[/i].\" \n\t\nOnce your band has finally reached the front of the line at the bar, Baxter promptly orders a glass of rum and soda. Azure hangs back and pulls out a fat blunt, wiggling her eyebrows enticingly at anyone who might want to share. Tariano simply orders one beer and tells Azure he'll take a hit off her blunt. Aurora orders a water from an irritated bartender and sips it slowly, already looking around for something else to do. \n*choice\n\t#Get drunk off rum to make your inhibitions disappear \n\t\t*goto tough_indulge \n\t\t\n\t#Burn a blunt to feel euphoric for a while\n\t\t*goto charisma_indulge \n\t\t\n\t#Just have a beer and a puff of weed to help settle your nerves while still allowing you to focus on Larry\n\t\t*goto intelligence_indulge \n\t\t\n\t#Don't partake tonight; you still need to thwart Larry and then record a song\n\t\t*goto deception_indulge \n\t\t\n\t\t*label tough_indulge \n\t\t*set tough_indulge true \n\t\t*set charisma +1 \n\t\t*set rebellious +1 \n\t\t*set tough +2\n\t\t*set baxter +1 \n\t\t(+2 Tough, +1 Charisma, +1 Rebellious, Baxter Approves)\n\t\t*line_break \n\t\tYou order a glass of rum and soda from the bartender as well. Baxter smiles and raises his glass, and you clink yours together before taking a healthy sip each. The rum stings your nose with the strong, sharp scent of vanilla, and you and Baxter make grimaces at the same time. Immediately, you feel warmer and more relaxed, and you hope this small glass doesn't catch up to you too quickly. \n\n\t\tEyeing you closely, Baxter leans his head back and drinks heavily from his glass. The rum quickly disappears, a few drops dribbling down the side of his beard as he drinks. He wipes his beard with his sleeve, grinning and giving you a look that dares you to follow. His cheeks are already flushed red, and he takes deep breaths, blinking back the water in his eyes. \"Oh, yeah, I'm gonna go crazy tonight,\" he says with a throaty laugh. \n\n\t\tNot wanting to be outdone, you raise your eyebrows and bring your glass to your lips, chugging the rum down. The intense scent of vanilla burns your nostrils as the alcohol goes down, and you let out a great sigh after you have drained the last drop. The rum makes you delightfully warm as it travels through you, and your mood is quickly brightening. \"Crazy would be drinking another round, but we probably shouldn't do that.\" \n\n\t\tThe two of you burst into laughter at the same time, and high five each other with a very satisfying slap. The rum is definitely already working or you wouldn't be acting like dinguses. You feel slightly unsteady on your feet, and you and Baxter bump shoulders as your group walks away from the bar. You may as well have bumped into a grizzly bear, and as a result stumble into Tariano, apologizing hurriedly. \n\n\t\tHe chuckles, holding his beer bottle away to avoid spilling any. Shaking his head and clicking his tongue, he says, \"Careful, I paid five credits for this and I want my whole buzz, dammit.\" \n\t\t*goto celebrate \n\t\t\n\t\t*label charisma_indulge \n\t\t*set charisma_indulge true \n\t\t*set charisma +2 \n\t\t*set intelligence +1 \n\t\t*set rebellious +1\n\t\t*set azure +1 \n\t\t(+2 Charisma, +1 Intelligence, +1 Rebellious, Azure Approves)\n\t\t*line_break \n\t\tYou move out of the line with an apologetic look to the bartender, and smile at Azure, holding out a hand for her blunt. She happily offers it over, and you take a long drag. The blunt has a woody, fruity aroma that reminds you pleasantly of breakfast cereal. As you slowly exhale the smoke through your nose, your heart thuds rapidly as though you were running. Immediately, you feel the euphoria coming on, rushing over you like a warm summer rain. \n\n\t\tThe two of you stand elbow to elbow, passing the blunt back and forth until you're surrounded with a smoky haze. An irresistible itch in the back of your throat, and a tongue so dry that it tastes like mud, send you into a coughing fit. Azure laughs at you but then subsides into a bout of coughs herself. Once you have both recovered, she pats you on the back. \"Should have warned you, there's kief packed in the middle. We'll be high like kites in a tornado.\" \n\n\t\tIndeed, you're so high already that it feels like your head is floating, and your eyes ache in a way that tells you they're completely bloodshot. Azure takes a long drag and then blows the smoke in Aurora's face. Aurora smiles and closes her eyes, inhaling the smoke. \"I almost thought you were going to forget. I would have felt so betrayed.\" \n\t\t\n\t\tAzure passes the blunt back to you, but you have to take a few more seconds to gather yourself. Your lungs and throat burn from the heat and smoke, and fresh tendrils curl into your eyes, making you wince. Still, your bodily pains have all faded to the background and your immense head high makes it feel like your head is a hot air balloon and your body is the basket. \n\n\t\tYou find yourself licking your lips, savoring the pungent, fruity aroma of the weed and its wrapper. Hands on her hips, Azure takes in a great breath and lets it out. Smiling cheerily, eyes practically closed, she says, \"Mmk, I think we're all good. Another hit and I'll end up taking a cat nap on one of those couches.\" \n\n\t\tNo resting for you, not until you have retrieved the Necrophone and recorded your song. \"Yup,\" you agree cheerfully. \"All good.\" \n\t\t*goto celebrate \n\t\t\n\t\t*label intelligence_indulge \n\t\t*set intelligence_indulge true \n\t\t*set intelligence +2 \n\t\t*set chill +1 \n\t\t*set deception +1 \n\t\t*set tariano +1 \n\t\t(+2 Intelligence, +1 Chill, +1 Deception, Tariano Approves)\n\t\t*line_break \n\t\tYou order a beer from the bartender as well, and she hands you an ice cold bottle. It's so wet with condensation that it nearly slips out of your grasp, but you manage to hang onto it by the neck. Tariano, who was sipping his own beer, raises his eyebrows with an impressed look. \"Ninja reflexes.\" \n\n\t\tAnd you'll be able to retain them if you just drink one beer, too. Smiling appreciatively, you take a long drink, closing your eyes and savoring the bubbles and the cold, toasty flavor. Tariano takes a long drag from Azure's blunt and then offers it to you as he coughs loudly into his elbow, his cheeks turning the color of his hair. Azure giggles and says helpfully, \"Careful, there's lots of kief in there.\" \n\n\t\tYou take a nice long hit and exhale slowly through your nostrils, briefly giving yourself the impression of a dragon. You're immediately struck with the delicious, strong fruity taste of the weed and the paper it's rolled in, and have to remind yourself to stick to your limit. You pass the blunt to Azure, who does a silly cackle and greedy fingers before daintily accepting it back. \n\t\t\n\t\tAs Azure happily creates a cloud of smoke around her head, you turn your attention back to your beer. The closer you get to the bottom, the more you feel buzzed, and a little cross faded. Simply looking around at the party goers and lights has become twice as interesting as everything takes on a pleasant sheen. \"Where the hell are you at?\" you mutter to yourself, scanning the undulating, pulsing crowd. \n\n\t\tApparently having overhead you, Tariano takes another sip of beer and shrugs. \"Maybe he's ghosting us.\" He's a good guesser. \"He's not too happy you took his role, even if you obviously deserve it, and he's basically being impossible.\" \n\n\t\tYou smile nervously. Yeah, that's partly what you're afraid of. \n\t\t*goto celebrate \n\t\t\n\t\t*label deception_indulge \n\t\t*set deception_indulge true \n\t\t*set deception +2\n\t\t*set intelligence +1 \n\t\t*set mysterious +1 \n\t\t*set aurora +1 \n\t\t(+2 Deception, +1 Intelligence, +1 Mysterious, Aurora Approves)\n\t\t*line_break \n\t\tYou give the bartender an apologetic look and move out of the line. You saw a miniature refrigerator full of water bottles by the entrance, and you'll have to be content with that if you want the best chance of sabotaging Larry's diabolical plan. Aurora comments sarcastically, \"Whoa, aren't we edgy?\" although she seems relieved to have some sober company. \n\n\t\tApparently she saw the mini fridge by the front as well because she walks in that direction, hands shoved in her fishnet jacket pockets. After a few steps, she cranes her neck around with a quizzical look. \"Coming or not?\" \n\n\t\tYou hurry after her, and together you navigate through the dense crowd. The red strobe lights seem to make the pale skin on her arms and back glow. You try to think of something to say. \"So, you're not feeling like a party animal tonight either, huh?\" \n\n\t\tShe shrugs. \"We're in a strange place with strangers. Not giving anyone any opportunities to spike my drink and put me in their trunk makes my brain happier.\" \n\n\t\tYou nod. You suppose you can't argue with that. The two of you make it to the mini fridge, claim your water bottles, and rejoin the band near the bar. All that maneuvering through crowds has got you parched, and you greedily gulp down your water until your thirst is quenched. You hope Larry decides to get drunk to make him easier to stop, but you don't think he's necessarily that stupid. \n\t\t*goto celebrate \n\n*label celebrate \n*page_break \n\nDark, bassy industrial music continues to pulse from the speakers. Fog swirls around your ankles even thicker than before as someone refilled the fog machine. Barty flips a vinyl over his head, catches it with the other hand, and places it onto his turntable, where he manipulates it to create a glitching noise that catches everyone's attention. \"Yo yo yo, ladies, germs, and people of other terms, is this party killer or what?\" \n\nCheers and whoops ring out from the crowd, and many people put devil horns into the air. Baxter shushes your silent group loudly, tapping on you and Tariano's shoulders excitedly to get your attention, which is a bit distracting. \n\n\"Tonight, we're here to celebrate some very crazy guests of honor, and no, it's not all of you.\" A chorus of playful jeers and groans. \"Tonight, I'm signing and producing the gnarliest, heaviest death metal band in the world, ${band}, so turn it up, motherfuckers!\" \n\nThe building erupts with cheers and shouts, and many people hoist their alcohol cups in the air. A shiver travels up your spine, and goosebumps crop up all over your skin. How much time do you have before Barty is ready to record? An hour, two, maybe? Again, you anxiously scan the crowd for Larry's lion's mane, and only spot a few that don't belong to him. \n\nBaxter claps his hands and rubs them together eagerly. \"Alright, you heard the man,\" he says. \"I don't know about you, but I'm going to go make some fools out of people in foosball.\" \n\n*page_break \n\nAs Baxter struts off unsteadily towards the foosball tables, Aurora snickers, \"He's definitely going to make a fool out of someone. No one remind him of that time he broke a window with one of his brilliant tricks.\" \n\nTariano and Azure laugh. Aurora eyes the dance floor, bobbing her head absentmindedly to the dark synth and bone rattling bass. She starts off in that direction, saying over her shoulder, \"I'm going this way. Come along if you wanna see how a goth dances.\" \n\nAzure slaps Aurora's butt playfully as she walks away, but doesn't volunteer to join her. Instead, she stretches her arms high above her head, eyeing the row of couches. \"People watching,\" she proclaims, skipping off towards the couches. She looks back at you meaningfully. \"Or people commenting, if someone wants to join me.\" \n\nThat leaves just you and Tariano. Evidently you seem surprised at everyone immediately splitting up, because he shrugs and says, \"When we all spend 24/7 together already, it's a good thing to get away from each other sometimes.\" He smiles. \"I'm going to play some pool.\" \n\nTariano gives you the peace sign and then mosies off towards the pool tables. \n*if (tough_indulge) \n\tAlthough you feel slightly unsteady, you're full of energy, and feeling much more relaxed than you probably should. You doubt Larry's doing too much   relaxing right now, whatever he's doing. \n*if (charisma_indulge) \n\tAs you look around curiously, trying to decide what to do, you realize you're very spacey. You appreciate the shiny red leather couches and admire how the felt on the pool tables seems to shine in the strobe lights. \n*if (intelligence_indulge) \n\tYou have to admit, it won't be difficult to have fun here. That's the danger. You need to stay focused and not lose track of time and sight of your true mission. \n*if (deception_indulge) \n\tYou sip the last of your water as you decide what to do. There's such thick smoke in the air that you wonder vaguely if you're going to accidentally catch a second hand high. \n*label party \n*if (party > 0)\n\n\tWhat would you like to do next?\n*choice\n\t*if (party > 0)\n\t\t#Go search for Larry by yourself \n\t\t\t*goto search_larry \n\t\t\t\n\t*hide_reuse #Play foosball with Baxter\n\t\t*goto tough_party\n\t\t\n\t*hide_reuse #Chill on a couch with Azure\n\t\t*goto charisma_party\n\t\t\n\t*hide_reuse #Play pool with Tariano \n\t\t*goto intelligence_party\n\t\t\n\t*hide_reuse #See how a goth (Aurora) dances\n\t\t*goto deception_party \n\t\t\n\t\t*label tough_party \n\t\t*set tough_party true \n\t\t*set party +1\n\t\t*if (party > 1)\n\t\t\t*set tough_party_last true \n\t\t*set charisma +1 \n\t\t*set rebellious +1 \n\t\t*set tough +2\n\t\t*set baxter +1 \n\t\t(+2 Tough, +1 Charisma, +1 Rebellious, Baxter Approves)\n\t\t*line_break \n\t\tYou can't force Larry to show himself, so until then, maybe you should try to enjoy yourself. \n\t\t*if (party \u003c= 1)\n\t\t\tHurrying after Baxter before he loses you with his lengthy strides, you fall into step beside him. \n\t\t*if (party > 1)\n\t\t\tYou manage to find Baxter talking animatedly with some strangers, but he happily excuses himself to join you when you remind him he was going to play pool.\n\t\tThe two of you arrive at several foosball tables, and fortunately one of them is still open. Baxter assumes his position with the white team, spinning the handles experimentally. \n\n\t\tYou take the black team, and roll the ball into the center of the table. The white ball glows, making it easy to follow even in the dim light. The two of you maneuver the pieces back and forth, spinning them to kick the ball towards the opposing goal. He wears a determined smile on his face. \"I should have warned you, you're facing the master. I had a foosball table in my basement growing up.\" \n\n\t\tArching an eyebrow skeptically, you aim carefully and shoot the foosball from halfway across the table. He spins the players furiously, but misses, and the ball sails into his goal.\n\t\t*if (tough_indulge)\n\t\t\tYou burst into laughter, pointing at him so animatedly that you bump hard into the foosball table. \n\t\t*if (charisma_indulge)\n\t\t\tThe white ball almost looked like a shooting star streaking across the dark table, you think, your heart beating fast. This is surprisingly fun.\n\t\t*if (intelligence_indulge)\n\t\t\tExcellent, you still have your reflexes. \n\t\t*if (deception_indulge)\n\t\t\tYou're a bit surprised at how happy you feel at that small bit of success. \n\t\tHe scrubs his sweaty hands with his shirt, showing his slightly chubby belly.\n\t\t*if (attracted_males)\n\t\t\tHis pale tummy is fuzzy with black hair, like a bear. A teddy bear. [i]Shut up.[/i]\n\t\tSnorting in disbelief, he shakes his head and scratches his beard. \"Alright, it looks like I'm going to have to resort to my secret spin attack. By hitting the ball really hard on the very edge...\" \n\n\t\tBaxter waits for the ball to come to him, and then spins the handles on his players so hard that they become a blur. The ball leaps into the air, flying straight towards your face. Eyes wide, you duck, crouching behind the table for cover. The ball bounces across the carpeted floor and stops several feet away. \"You can take out your opponents?\" you supply as you warily straighten out. \n\n\t\tBaxter is howling with laughter, clapping his hands and doubling over, oblivious to the incredulous stares and snickers of people nearby. His eyes are glazed over, and he wobbles a bit as he straightens. \"That's completely my bad,\" he says, his words a bit slurred. He hurries to fetch the ball and offers it to you, breathing heavily with his complexion rosy. \"That was supposed to be a lot cooler.\" \n\t\t*choice \n\t\t\t*selectable_if (((baxter > 52) and  (flirt = 0)) and ((attracted_males))) #He's cute. Encourage him and happily go along if he happens to flirt (Requires 53 Baxter) \n\t\t\t\t*goto tough_flirt_foosball \n\t\t\t\t\t\n\t\t\t*selectable_if (((baxter > 52) and (flirt = 0)) and ((attracted_males))) #He's really fun. Flirt with him openly (Requires 53 Baxter)\n\t\t\t\t*goto charisma_flirt_foosball \n\t\t\t\t\t\n\t\t\t#Enjoying the fact that somehow [i]you[/i] make [i]him[/i] nervous, you decide to tease him\n\t\t\t\t*goto tough_foosball\n\n\t\t\t#Laugh it off but tell him not to try any more fancy tricks\n\t\t\t\t*goto charisma_foosball \n\t\t\t\t\n\t\t\t#Reveal to him that whoever taught him that trick was obviously messing with him\n\t\t\t\t*goto intelligence_foosball\n\t\t\t\t\n\t\t\t#Act aloof to get across to him that you're starting to find him annoying \n\t\t\t\t*goto deception_foosball\n\t\t\t\t\n\t\t\t\t*label tough_foosball\n\t\t\t\t*set tough_foosball true \n\t\t\t\t*set tough +2\n\t\t\t\t*set deception +1\n\t\t\t\t*set mysterious +1 \n\t\t\t\t*set baxter +1 \n\t\t\t\t(+2 Tough, +1 Deception, +1 Mysterious, Baxter Approves)\n\t\t\t\t*line_break \n\t\t\t\t\"Oh, yeah, it was so cool when that ball was flying right for me,\" you say, bobbing your head. \"For a second, I was picturing how cool I would look with blood running down my face. You should definitely try it again.\" \n\t\t\n\t\t\t\tBaxter's face turns a deeper shade of red, making him scarlet. He clears his throat and rubs the back of his head as he moves back to his side. \"Probably shouldn't,\" he says. \"The others would strangle me if I busted your nose and ruined your voice.\n\t\t\t\t*if (attracted_males)\n\t\t\t\t\tAnd messed up your pretty face to boot.\n\t\t\t\tYou know, made you sound like a talking sock puppet or something.\" \n\n\t\t\t\tYou struggle to suppress a smile as you roll the ball onto the table and continue the game. He's irritating, yet somehow endearing. The sound of clacking fills the air as you two hit the ball back and forth with the battered players. \n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tYou miss the ball plenty of times, but hit it hard when you do connect.\n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tThe white ball streaking back and forth rapidly is almost mesmerizing.\n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tYou're really starting to enjoy yourself, and almost forget to keep an eye out for Larry. No sign of him so far.\n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tYou're really starting to enjoy yourself, but you glance around for Larry now and again to no success.\n\t\t\t\t\"What was the idea with that move of yours, anyway?\" you ask, some humor in your tone. \n\n\t\t\t\tYou seem to be distracting Baxter, and you sink another ball into his goal. Shaking his head, he says, \"Well, it was supposed to put this wicked curve on the ball that would make it ricochet off the side and into your goal. Only, I guess I had never tried it before in a real game myself.\" \n\n\t\t\t\tUnable to help yourself, you finally burst into laughter. Baxter blinks in surprise but then joins you with a deep guffaw. Sighing dramatically, he hangs his head in mock shame. \"Hey, at least I can say it's because I was drunk. I guess I'm a lightweight. [i]Me[/i]. Pathetic.\" \n\t\t\t\t*if (party \u003c 2)\n\t\t\t\t\t*goto party \n\t\t\t\t*set tough_foosball_last true \n\t\t\t\t*goto vip\n\n\t\t\t\t*label tough_flirt_foosball\n\t\t\t\t*set tough_flirt_foosball true \n\t\t\t\t*set flirt +1\n\t\t\t\t*set baxter +3 \n\t\t\t\t*set tough +2 \n\t\t\t\t*set charisma +1 \n\t\t\t\t*set rebellious +1 \n\t\t\t\t(+2 Tough, +1 Charisma, +1 Rebellious, Baxter Approves) \n\t\t\t\t*line_break \n\t\t\t\tYou wiggle your eyebrows with a coy smile. \"Well, go on and try again then. I'm not scared.\" \n\n\t\t\t\tBaxter's bushy eyebrows shoot up. \"Seriously?\" He plucks the ball from your palm with a grin and jogs back to his side. \"Okay, hold on to your underwear. I'm about to make an epic comeback.\" \n\n\t\t\t\tYou can't help but smile as you watch, but this time, you're ready to duck. Brushing the curtain of black hair out of his face, he carefully places the ball down, adjusting it with one eye shut. You feel like pointing out that he would never be able to pull this move off organically, but you don't mind watching his big hands and muscular arms. \n\n\t\t\t\tBaxter grips the handles, and then twirls them into a blur, striking the ball. It leaps up into the air once again, making him groan in disbelief, but you reach up and snatch it out of the air. \n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tYou laugh in disbelief, and realize you were never really nervous.\n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tYou can't believe you did that, but the ball almost seemed to be going in slow motion.\n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tOkay, you definitely still have your reflexes.\n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tNow you're doubly glad you decided not to indulge.\n\t\t\t\tGrinning, you triumphantly thrust the ball above your head with a laugh. \"See, nothing to be afraid of.\" You wink. \"But maybe you should stop trying to impress me before we get kicked out of our own signing party.\" \n\n\t\t\t\tHe laughs. His smile is cute, and his dark eyes linger on you just as much as yours do on him. \"Getting kicked out of your own signing party sounds like rockstar behavior to me. But, yeah, probably a little counterproductive. Plus, Aurora and Tariano would probably kill me in my sleep if I somehow managed to botch things with Barty this early. Azure and Larry too, matter of fact.\" \n\n\t\t\t\tThe two of you share another laugh. You like the sound of his laughter. It's deep and loud, the kind of laugh that might get the manager at a restaurant to ask you to quiet down or leave. You bop your knuckles against his big strong arm playfully. \"Are you kidding me? You orchestrated all this. Even drove us here in your trusty van. I'm definitely not complaining if you have a little fun with me.\" \n\t\t\t\t*if (party \u003c 2)\n\t\t\t\t\t*goto party \n\t\t\t\t*set tough_flirt_foosball_last true \n\t\t\t\t*goto vip \n\n\t\t\t\t*label charisma_foosball\n\t\t\t\t*set charisma_foosball true \n\t\t\t\t*set charisma +2\n\t\t\t\t*set chill +1 \n\t\t\t\t*set intelligence +1 \n\t\t\t\t*set baxter +1 \n\t\t\t\t(+2 Charisma, +1 Intelligence, +1 Chill, Baxter Approves)\n\t\t\t\t*line_break \n\t\t\t\tYou laugh, waving his concerns away, even though your nervous system is definitely still reacting. Clammy hands, heavily beating heart, et cetera. \"Hey, my reflexes took over and saved me, so there's nothing to be sorry for. But let's make a new house rule: no fancy tricks that might send one of us to the emergency room. Specifically me.\"\n\n\t\t\t\tBaxter looks very bashful now. He averts his gaze from yours, and knocks the ball softly against his forehead a few times. \"Yup. Totally. Got it.\" Then, to himself, \"[i]Idiot.[/i].\" \n\n\t\t\t\tYou chew on your lip as he returns to his side of the table and puts the ball into play a bit glumly. For a big guy, he's pretty sensitive, you realize. \n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tHe would probably be good at giving, or getting, bear hugs, but that seems inappropriate just now.\n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tHe's as drunk as you are high. You're like, connecting.\n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tHe's almost making you sensitive, and you only had one beer. \n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tYou might be sensitive too if you had as much alcohol as he did.\n\t\t\t\t\"If you made that, I think it would have to count for two points,\" you say, hoping to change the mood.  \n\n\t\t\t\tYou're so busy talking that you hardly notice Baxter hitting the ball towards your goal. You grab the handles, jerking them to the side and rotating the players fast. The ball whizzes right by them and sinks into your goal. You barely have time to register surprise before Baxter is whooping and spinning his pool stick over his head in celebration. \"Ooga booga, no fancy trick win game!\" he says in a husky caveman voice. \n\n\t\t\t\tYou find yourself laughing harder than you have in some time. You haven't had much reason for laughter lately, but now, you feel as though you can forget all your troubles for just a brief moment. \"It's 1-1, don't get ahead of yourself,\" you say, putting the ball into play again with a grin. \n\t\t\t\t*if (party \u003c 2)\n\t\t\t\t\t*goto party \n\t\t\t\t*set charisma_foosball_last true   \n\t\t\t\t*goto vip \n\n\t\t\t\t*label charisma_flirt_foosball \n\t\t\t\t*set charisma_flirt_foosball true \n\t\t\t\t*set flirt +1\n\t\t\t\t*set charisma +2 \n\t\t\t\t*set chill +1 \n\t\t\t\t*set tough +1 \n\t\t\t\t*set baxter +3 \n\t\t\t\t(+2 Charisma, +1 Tough, +1 Chill, Baxter Approves) \n\t\t\t\t*line_break \n\t\t\t\tGiving your best charming laugh, you put a hand on his big arm, letting your fingers linger there. \"I mean, it was accidentally cool.\" His arm is soft on the surface but you can feel the muscle and power underneath. He could probably kick Larry's ass easily. \"Why don't you give it another shot?\" \n\n\t\t\t\tA sly smirk appears beneath his shaggy beard, and his dark eyes travel to your hand still on his arm and then back to your eyes. \n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tHe has nice plump lips, you notice. Don't kiss them. You're drunk. And so is he, your brain reminds you. \n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tEven though they're probably as bloodshot as yours, his dark eyes are still pretty. \n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tYou hold his gaze easily, a warm sensation traveling through your body.\n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tYou're a mess. You've completely forgotten about Larry, but you don't want to break away from Baxter's smoldering gaze [i]now[/i].\n\t\t\t\tYou finally withdraw your hand and put the ball into play, looking around innocently. Clearing his throat, Baxter bobs his head with a determined frown. \"Yeah, totally.\" Then, eyeing you uncertainly, \"I mean, you're not afraid I'm going to give you a lump the size of a walnut on your forehead?\" \n\n\t\t\t\t\"You'd better not, or I'm quitting the band!\" you say. As if. \"No pressure though.\" \n\n\t\t\t\tBaxter's already pale complexion has gone positively pallid, and his eyes look like a doe's. He really is a giant teddy bear. And a dork. At your highly amused expression, he bursts into relieved laughter. \"Alright, alright, check this shit out.\" \n\n\t\t\t\tBiting on his tongue in concentration, he takes the ball and sets in front of one of his players. He takes a deep breath and then twirls the handles into a rattling blur. The player strikes the ball, and it leaps up into the air again, sailing across the table and directly into your goal. \n\n\t\t\t\tThe two of you share equally astonished expressions, and then he's moving towards you with a grin, holding his palms out for high fives. Definitely a dork. Laughing, you reach out and high five him, and are surprised by how gentle his giant, calloused hands touch yours. \"Miraculously my underwear didn't fly off, but I have to say, that was pretty hot.\" \n\t\t\t\t*if (party \u003c 2)\n\t\t\t\t\t*goto party \n\t\t\t\t*set charisma_flirt_foosball_last true \n\t\t\t\t*goto vip \n\t\t\t\t\n\t\t\t\t*label intelligence_foosball\n\t\t\t\t*set intelligence_foosball true \n\t\t\t\t*set intelligence +2 \n\t\t\t\t*set chill +1 \n\t\t\t\t*set charisma +1 \n\t\t\t\t*set baxter +1\n\t\t\t\t(+2 Intelligence, +1 Charisma, +1 Chill, Baxter Approves)\n\t\t\t\t*line_break \n\t\t\t\tYou give him a quizzical look. \"Who taught you this trick, exactly? Your older brothers, maybe?\"\n\t\t\t\t\n\t\t\t\tBaxter does an endearing double take. \"I never told you I had older brothers.\"\n\t\t\t\t\n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tYou bet his brothers could hold their drinks too.\n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tYou\tnotice his forehead is creased in agitation, and you wonder if his older brothers were typical brutes. \n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tYou notice a slight edge to his tone, and you wonder if he isn't incredibly fond of his older siblings.\n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tHis baritone voice carries, drawing a few curious turned heads. \n\t\t\t\tYou smile knowingly. \"You're tough, with a sense of humor. It screams that you had some older brothers who liked to tease you. Besides, that trick is more likely to take someone's eye out than produce a curve ball. More like a prank than anything.\"\n\t\t\t\t\n\t\t\t\tHe eyes the ball suspiciously, then throws his head back, bursting into laughter. \"That's totally something those jackasses would do. Anyways, it's not hard to set the move up, but pulling it off in the wild is another thing.\" He puts the ball into play with a prolonged sigh. \"Ah, well. Normal old foosball it is.\"\n\t\t\t\t\n\t\t\t\tThe air fills with the clacking of the ball and the rattling of handles as you and Baxter try to sink the ball into the opposing goal. He soon forgets about the spin move, and laughs in triumph when he scores against you and curses playfully when you score against him. You're having a lot more fun than you thought you would, and you're relieved you were able to talk him out of showing off, too. \n\n\t\t\t\tYou find yourself deep in thought as you play, Baxter's booming chatter and the haunting synths and crunchy drums pulsing from the speakers creating a constant, nice background ambiance. You think about how it might have been to have any siblings of your own. You think about how this band, and Baxter especially, are becoming your friends when you feel most alone. Baxter breaks you out of your reverie. \"Hey, you cool?\" he asks, looking concerned. \n\n\t\t\t\tYou smile reassuringly. \"Yeah. Great.\"\n\t\t\t\t*if (party \u003c 2)\n\t\t\t\t\t*goto party \n\t\t\t\t*set intelligence_foosball_last true \n\t\t\t\t*goto vip \n\t\t\t\t\n\t\t\t\t*label deception_foosball\n\t\t\t\t*set deception_foosball true \n\t\t\t\t*set deception +2 \n\t\t\t\t*set intelligence +1 \n\t\t\t\t*set mysterious +1 \n\t\t\t\t*set baxter -2\n\t\t\t\t(+2 Deception, +1 Intelligence, +1 Mysterious, Baxter Disapproves)\n\t\t\t\t*line_break \n\t\t\t\t\"Yeah, I bet it was a lot more impressive in your head,\" you say flatly. \n\n\t\t\t\tBaxter scratches his beard, looking awkward as he returns to his side of the table. You put the ball into play, and soon enough, the sound of the ball clacking and handles rattling fills the air. The noises which normally fade into the background, you now find repetitive and irritating. You usually enjoy foosball, but the unbelievable stress of the last few days is evidently souring it slightly for you. \n\n\t\t\t\tIt's that, or Baxter being drunk and trying badly to hide it. He leans on the table heavily with one hand, trying to look casual, but then yelps and stumbles when his hand slips with an uncomfortable-sounding rubbing noise. Then, spinning his handles slowly, he clears his throat and says, \"So, any idea what you'll buy with your signing money?\"\n\t\t\t\t\n\t\t\t\tThe question takes you by surprise, and you hardly realize it before the white ball is rolling swiftly towards your goal. Jerking your players to the right, you spin the handles and just manage to send the ball back in his direction. For some reason, you don't want to lose to Baxter. Not like it really matters or anything. \"Probably boring stuff like bills first,\" you say nonchalantly with a shrug. \n\t\t\t\t\n\t\t\t\tImages of the eviction letter and your clunker of a car sitting in a sketchy holding yard somewhere flash through your mind. Effie definitely would have had your car towed from Cost Slicer as soon as physically possible. The ball goes back and forth between you and Baxter several times before going into your goal. Dammit. \"Neat,\" he says, not seeming to know what else to say. \"I can't decide between a motorcycle and a flamethrower.\"\n\t\t\t\t\n\t\t\t\tMore rattling of handles, squeaking of metal bars that need to be oiled, and the repetitive clacking of the white ball, and you make another goal against him, evening up the score. \n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tEvidently you're more drunk than you realized, because you missed a few of those balls so badly that you earned a point simply because Baxter was laughing at you so hard. \n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tThe bright, reflective ball and the red haze surrounding the foosball table is hauntingly beautiful, and you find yourself playing almost mechanically as you absentmindedly enjoy the view.\n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tYou have no idea how you're managing to play so well in these conditions.\n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tYou can't believe you care this much. \n\t\t\t\tYou're having a little bit of fun, but not too much fun. \"I don't know,\" you say, unable to suppress the sarcasm in your voice. \"They both seem so practical.\"\n\t\t\t\t\n\t\t\t\tBaxter shoots you his own sarcastic, toothy grin. \"Flamethrower it is then.\"\n\t\t\t\t*if (party \u003c 2)\n\t\t\t\t\t*goto party \n\t\t\t\t*set deception_foosball_last true \n\t\t\t\t*goto vip \n\t\t\n\t\t*label charisma_party\n\t\t*set charisma_party true \n\t\t*set party +1\n\t\t*if (party > 1)\n\t\t\t*set charisma_party_last true \n\t\t*set charisma +2 \n\t\t*set deception +1 \n\t\t*set chill +1\n\t\t*set azure +1 \n\t\t(+2 Charisma, +1 Deception, +1 Chill, Azure Approves)\n\t\t*line_break \n\t\tChilling with Azure on a couch seems like it could lead to some interesting conversations. Besides, you just may spot Larry lurking around somewhere while you're chatting. \n\t\t*if (party \u003c= 1)\n\t\t\tYou hurry after Azure, and she beams at you, clearly relieved to have some company. \n\t\t*if (party > 1)\n\t\t\tYou manage to locate Azure leaving the bar and going towards the couches with an already empty martini glass. She discards it in a wastebasket, seeming delighted to have some company.\n\t\tYour company. She tugs on your sleeve with two fingers and points towards a couch in the center. \"Finest seats in the house.\"\n\t\t\n\t\tYou maneuver your way through the crowd and reach the row of couches, which are only sparsely occupied by a flirting couple and someone smoking a cigarette by himself. Azure plops down onto the center-most couch, crossing her legs and patting the cushion beside her. You sit close to her on the comfortable, deep red leather couch. Her white hoody seems to glow like the moon in contrast.\n\t\t\n\t\tShe takes out a new blunt and lights it, taking a deep puff before stowing it away again with a satisfied sigh and a whimsical smile. \n\t\t*if (tough_indulge)\n\t\t\tYou're glad she's on your level, but she's making you wish you had a few more sips of rum and soda. \n\t\t*if (charisma_indulge)\n\t\t\tThe smoke wafts into your face, and you close your eyes and inhale. It smells delightfully like cotton candy.\n\t\t*if (intelligence_indulge)\n\t\t\tYou wonder if Azure is adapting quickly to the rockstar lifestyle, or if she needs to calm her nerves because of it. \n\t\t*if (deception_indulge)\n\t\t\tThe stuffy, smoky atmosphere makes you long for more water, but you're a long way away from a bottle now.\n\t\tAzure looks at you and wiggles her eyebrows in a conspiratorial sort of way. \"To pass time, I like to people watch and make funny stories up about them.\"\n\t\t\n\t\tYou lean back into the comfy couch, making the leather creak. \"Seriously?\" you say. \n\t\t\n\t\tShe bobs her head eagerly, making her shaggy mullet dance. Leaning in closer, she points discreetly at the flirting couple. She's sitting on his lap and macking on his neck while he chuckles and tries to hold onto his beer. Azure clears her throat and then says in a funny, high-pitched whisper, [i]\"Not right now, Melinda. I had too many croissant sandwiches at that coffee shop. And, the people.\"[/i]\n\t\t\n\t\tYou snort, and she subsides into giggles herself. Then, leaning on your shoulder and pointing at the man smoking a cigarette, she says, \"Okay, okay.\" Putting on a grumpy expression, she says, \"[i]Meh. I wore black clothes and smoked a whole pack of cigarettes at the bar and not one hot goth girl asked to step on me. They'll rue this day. They'll all rue this day.\"[/i]\n\t\t\n\t\tThe man suddenly looks in your direction, a  burning cigarette dangling from his fingers and puzzled expression on his face. Azure hurriedly looks away and pretends to wave to someone across the room. Once he shrugs and looks away, she slumps into the couch with a sigh. You bury your face in one palm, snorting to hide your laughter. Giving you an almost bashful expression, Azure says, \"So, anyway. If other people were looking at us, what do you think they might think?\"\n\t\t*choice \n\t\t\t*selectable_if (((azure > 52) and (flirt = 0)) and ((attracted_females))) #Wink and tell her they probably think you're on a date (Requires 53 Azure)\n\t\t\t\t*goto charisma_flirt_couch \n\t\t\t\t\n\t\t\t*selectable_if (((azure > 52) and (flirt = 0)) and ((attracted_females))) #Admit to her that you're more worried about what she thinks of you than what strangers might think (Requires 53 Azure)\n\t\t\t\t\t*goto intelligence_flirt_couch \n\t\t\t\t\t\n\t\t\t#She's being too clingy. Bluntly tell her they would think you were coworkers\n\t\t\t\t*goto tough_couch \n\t\t\t\t\n\t\t\t#Brightly tell her you hope they would recognize you as members of ${band}\n\t\t\t\t*goto charisma_couch \n\t\t\t\t\n\t\t\t#Ask her what [i]she[/i] thinks others might say about the two of you\n\t\t\t\t*goto intelligence_couch \n\t\t\t\t\n\t\t\t#Tell her you often think others are staring at you, so this game makes you feel awkward\n\t\t\t\t*goto deception_couch \n\t\t\t\t\n\t\t\t\t*label tough_couch \n\t\t\t\t*set tough_couch true \n\t\t\t\t*set tough +2 \n\t\t\t\t*set mysterious +1 \n\t\t\t\t*set deception +1 \n\t\t\t\t*set azure -2\n\t\t\t\t(+2 Tough, +1 Mysterious, +1 Deception, Azure Disapproves)\n\t\t\t\t*line_break \n\t\t\t\tWith an impatient sigh, you scoot a couple inches away from Azure. She seems to notice, and puts her hands in her lap, eyeing you curiously. Shrugging, you look into the crowd for something else to do, vaguely hoping to spot Larry. Plenty of black clothes and long hair, none of them belonging to him. Finally, you shrug and say, \"I don't know, probably coworkers or something.\"\n\t\t\t\t\n\t\t\t\tAzure hums and leans back into her seat, crossing one leg over the other. You expected her to reply, but she stays silent, and looks at something across the room. \n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tYou find yourself intensely curious for some reason, probably the alcohol, and wish she would say something. \n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tYour head feels pleasantly like it's floating, and you wonder if she's just as spacey as you are. \n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tYou feel so mellow that you're not overly worried about her reaction, or lack thereof.\n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tYou half wonder if she's wondering where Larry is too.\n\t\t\t\tAzure suddenly giggles and looks at you. \"Technically we are coworkers. There are just no boring employee handbooks and we don't get paid.\"\n\t\t\t\t\n\t\t\t\tYour stomach does a somersault. \"Don't get paid yet,\" you correct. \n\t\t\t\t\n\t\t\t\t\"Don't get paid [i]yet[/i],\" she agrees with a wistful sort of sigh. \n\t\t\t\t\n\t\t\t\tYou suddenly find yourself thinking about your old coworkers at Cost Slicer. You never liked that tacky old place and its tyrannical management, but some of the other employees were alright. Betsy always said good morning a different way each shift, and Ronald would say the same thing, [i]\"That part[/i],\" to just about everything. You might not ever see either of them again, considering Effie bans all fired employees from the premises.\n\t\t\t\t\n\t\t\t\tWell, you suppose most of your coworkers aren't so bad now, except for a glaring exception: Larry. You scan the crowd with a frustrated scowl, but come up empty once more. Your thoughts are interrupted by Azure blowing air from between her lips. \"This party is boring,\" she laments, looking at you with a disappointed expression, as though you were responsible.\n\t\t\t\t\n\t\t\t\tIt's your turn to sigh. \"Yeah.\"\n\t\t\t\t*if (party \u003c 2)\n\t\t\t\t\t*goto party \n\t\t\t\t*set tough_couch_last true \n\t\t\t\t*goto vip \n\t\t\t\t\n\t\t\t\t*label charisma_couch \n\t\t\t\t*set charisma_couch true \n\t\t\t\t*set charisma +2 \n\t\t\t\t*set tough +1 \n\t\t\t\t*set chill +1 \n\t\t\t\t*set azure +1\n\t\t\t\t(+2 Charisma, +1 Tough, +1 Chill, Azure Approves)\n\t\t\t\t*line_break \n\t\t\t\tYou smile, feeling a bit silly, but feeling as though Azure might feel the same way as you. \"Do you think anyone might recognize us as members of ${band}?\" you ask excitedly. \"I think Barty got a lot of the extras for his music video from our show at the bar.\"\n\t\t\t\t\n\t\t\t\tAzure's deep brown eyes sparkle like a child's looking at a mound of candy or an adult's after being told they got a surprise week-long vacation. Batting her long eyelashes and nodding eagerly, she says, \"I seriously thought everyone was looking at me, but I wasn't sure if it was just because my outfit was really cute. Or maybe I was imagining things.\" She bonks the side of her head playfully with a palm and rolls her eyes. \"Stupid anxiety.\"\n\t\t\t\t\n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tYour chest suddenly swells with confidence, and you feel delightfully warm. \n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tStrangely, you haven't felt very anxious, you realize. \n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tYou've felt both more relaxed and alert, and you thought you noticed people staring at you. \n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tYou cast your eyes around the room, and notice that a few people do seem to have their eyes on you as they pass by. No Larry so far, however.\n\t\t\t\t\"So, if they did recognize us, what do you think they'd be saying?\" you ask.\n\t\t\t\t\n\t\t\t\tAzure folds one leg over the other, humming to herself as she surveys the crowd with a curious expression. She rests her elbow on her thigh and her chin on her hand as she studies the party-goers. Finally, she turns to you with scrunched eyebrows. \"I don't know, hopefully that we look nice or something.\"\n\t\t\t\t\n\t\t\t\tYou arch an eyebrow skeptically. \"That we look nice?\"\n\t\t\t\t\n\t\t\t\tShe bursts into giggles, looking flustered. \"I don't know, it's all I could think of.\" She grabs her face with her hands, pulling her features down dramatically. \"I just hope they don't think we're pathetic failures who will crash and burn,\" she says, her voice made nasally by her funny expression.\n\t\t\t\t\n\t\t\t\tYou exhale. \"Yeah, me too.\"\n\t\t\t\t*if (party \u003c 2)\n\t\t\t\t\t*goto party \n\t\t\t\t*set charisma_couch_last true \n\t\t\t\t*goto vip \n\t\t\t\t\n\t\t\t\t*label charisma_flirt_couch \n\t\t\t\t*set charisma_flirt_couch true \n\t\t\t\t*set flirt +1\n\t\t\t\t*set charisma +2\n\t\t\t\t*set azure +3\n\t\t\t\t*set chill +1\n\t\t\t\t*set tough +1 \n\t\t\t\t(+2 Charisma, +1 Tough, +1 Chill, Azure Approves)\n\t\t\t\t*line_break \n\t\t\t\tYour eyes quickly travel over Azure, taking in her petite frame and big, glowing personality. You lock eyes with her, smiling slyly. \"Maybe they would think we're on a date,\" you say, shrugging casually. \n\t\t\t\t\n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tHell yeah. Nailed it. \n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tYou sounded so serious that you almost spontaneously burst into laughter, but thankfully manage to contain yourself. \n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tYou sounded louder than you meant to, but you save it by adding a twinkle to your eyes. \n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tYou have no idea how you're managing to sound so casual when your insides feel a little like clothes spinning in a washing machine. \n\t\t\t\tTo your delight, Azure sort of wilts under your gaze rather than laughing at you. She shrinks down an inch, staring into your soul with her pretty hazel eyes as she brings her knuckles to her mouth to hide a nervous smile. \"Are we seriously that cute?\"\n\t\t\t\t\n\t\t\t\tThe flirting couple, the smoking guy, and the rest of the crowd all fade into the background. You can smell Azure's citrus perfume and the fruity shampoo in her hair. \"You are, anyway,\" you say. \"You probably make me look better.\"\n\t\t\t\t\n\t\t\t\tShe slaps your arm playfully with her fingertips, snorting cutely as she giggles. \"Oh, shush. Where did you even come from, anyway? You're so pretty, so insanely talented, and still so--\" she wiggles her fingers and scrunches up her face as she tries to think of the right word.\n\n\t\t\t\t\"Human?\" you supply, your voice more hushed than you meant for it to be. \n\t\t\t\t\n\t\t\t\tAzure's expression grows more serious. She stays silent for a few seconds and then reaches forward, taking your hand. \"Yeah, I guess.\" There's a pause where you share a warm, open look. Her slender fingers are warm and a bit clammy. \"I know it can be hard to be vulnerable,\" she says, \"but even if it's risky, it's better than being alone.\"\n\t\t\t\t\n\t\t\t\tThere's such surprising emotion in her hushed tones that you almost wonder if she's half talking to herself. Her pretty, bow lips open.\n\t\t\t\t*if (party \u003c 2)\n\t\t\t\t\t*goto party \n\t\t\t\t*set charisma_flirt_couch_last true \n\t\t\t\t*goto vip\n\t\t\t\t\n\t\t\t\t*label intelligence_flirt_couch \n\t\t\t\t*set intelligence_flirt_couch true \n\t\t\t\t*set flirt +1\n\t\t\t\t*set intelligence +2\n\t\t\t\t*set azure +3\n\t\t\t\t*set chill +1\n\t\t\t\t*set charisma +1\n\t\t\t\t(+2 Intelligence, +1 Charisma, +1 Chill, Azure Approves)\n\t\t\t\t*line_break \n\t\t\t\tYou chuckle lightly, then venture a look into her eyes, which lock with yours. \"Oh, I don't know about what other people might think. But I'm curious about what you think of me.\"\n\t\t\t\t\n\t\t\t\tAzure blinks at you in surprise, and a slow smile spreads across her lips and into her deep brown eyes. \"Really? Well...\" She bites on her lip, which arouses things inside of you. \"Well, my first thought was 'where did you come from?' You're so talented and cool, yet so down to earth at the same time. We feel lucky. I feel lucky.\"\n\t\t\t\t\n\t\t\t\tThen she suddenly bursts into laughter, hanging onto your shoulder and shaking. Her hands are warm and silky soft, you note vaguely. Straightening out, she gives you a deadpan look and says bluntly, \"No, I'm lying. I only want you for the fame and fortune.\" She rolls her eyes and smiles. \"As if that's even really a thing in death metal.\"\n\t\t\t\t\n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tHer perfume smells wonderful, and her grip is very strong despite belonging to adorable hands. You don't want her to stop touching you.\n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tHer smile is so vibrant, pearly white teeth and all, that you find yourself just staring and grinning like an idiot. \n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tOkay, you're not imagining that she likes you; she's clearly messing with you, but she's all over you too. \n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tShe's really distracting you from keeping one eye out for Larry, you realize. \n\t\t\t\tWhen you open your mouth to speak, you find that you're a bit flustered. \"Trust me, you wouldn't be impressed with my apartment,\" you finally say with a laugh. \"And what's this about no fame and fortune?\"\n\t\t\t\t\n\t\t\t\tShe rolls her eyes and tickles your sides, making you yelp with surprise. \"Oh, shush. We'll still be able to quit our jobs and hang out all day, don't worry.\"\n\t\t\t\t\n\t\t\t\t\"Oh, no, the horror,\" you say, trying to contain your happiness. \n\t\t\t\t*if (party \u003c 2)\n\t\t\t\t\t*goto party \n\t\t\t\t*set intelligence_flirt_couch_last true \n\t\t\t\t*goto vip \n\t\t\t\t\n\t\t\t\t*label intelligence_couch \n\t\t\t\t*set intelligence_couch true \n\t\t\t\t*set intelligence +2 \n\t\t\t\t*set deception +1 \n\t\t\t\t*set mysterious +1 \n\t\t\t\t*set azure +1\n\t\t\t\t(+2 Intelligence, +1 Deception, +1 Mysterious, Azure Approves)\n\t\t\t\t*line_break \n\t\t\t\tYou give her an apologetic smile and a shrug. \"I admit, I'm not very good at these games. But now I want to know what [i]you[/i] think other people would think about us.\"\n\t\t\t\t\n\t\t\t\tAzure rolls her eyes. \"Psh. That's a cop out.\" She narrows her eyes pensively, scratching her chin, and then grins brightly. \"Oh, I know. On the count of three, we'll answer at the same time.\"\n\t\t\t\t\n\t\t\t\tYou blink. \"Uh-\" you start to protest.\n\t\t\t\t\n\t\t\t\t\"One, two,-\" This is not how you imagined this going. Your mind scrambles for something not entirely stupid to say. \n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tYou can do it, homie. You got this. \n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tYou would say the first thing that popped into your mind, but your mind is a little empty right now. \n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tShould you be clever, or funny? You never know. \n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tWith your mind occupied with so many things like Kanibor, being evicted, and Larry, it's difficult to think. \n\t\t\t\t\"Three!\"\n\t\t\t\t\n\t\t\t\tAzure beats you to the punch with impressive lung capacity. \"They would be like '[/i]Oh my god they're such a vibe, we want to be them.'\"[/i]\n\t\t\t\t\n\t\t\t\tYou grin triumphantly. \"Gotcha.\"\n\t\t\t\t\n\t\t\t\tAzure clenches her fists and kicks the air comically. \n\t\t\t\t*if (attracted_females)\n\t\t\t\t\tYour eyes follow her smooth, toned legs as they kick. \n\t\t\t\t\"Dammit!\" she laments with the snap of a finger. \n\t\t\t\t*if (party \u003c 2)\n\t\t\t\t\t*goto party \n\t\t\t\t*set intelligence_couch_last true \n\t\t\t\t*goto vip \n\t\t\t\t\n\t\t\t\t*label deception_couch \n\t\t\t\t*set deception_couch true \n\t\t\t\t*set deception +2 \n\t\t\t\t*set tough +1 \n\t\t\t\t*set mysterious +1 \n\t\t\t\t*set azure +1 \n\t\t\t\t(+2 Deception, +1 Tough, +1 Mysterious, Azure Approves)\n\t\t\t\t*line_break \n\t\t\t\tFeeling increasingly awkward, you stare at your knees as you mutter, \"I don't know, this feels kind of weird.\"\n\t\t\t\t\n\t\t\t\t\"Why?\" Azure asks, surprised but not unkind. \"It's harmless. Worst case scenario, you wave and say you thought you recognized someone if they catch you staring or whispering. Trust me, I'm a pro at this.\" She scrunches up her eyebrows. \"You're making me sound way worse than I am.\"\n\t\t\t\t\n\t\t\t\tYou chuckle nervously. \"No, it's not that.\"\n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tYou're starting to wonder if you're overthinking things because of the alcohol, but you're not sure if you're at the point of caring about that part yet.\n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tYour mouth is painfully dry, and you look around longingly for some cold water to drink.\n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tA part of you is worried she won't understand, but she's still joking with you. \n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tYou wonder if someone as charming as Azure will understand your anxieties.\n\t\t\t\tYou sigh and look at her. \"It's just, I always feel like everyone is staring at me and judging me, so this feels awkward to me.\"\n\t\t\t\t\n\t\t\t\tAzure sighs dramatically. \"Oh, ${name}. You do realize you're going to be the lead singer of a band playing in front of hundreds or even thousands of people all the time, right? You're going to have to get used to people gawking at you.\" She shrugs. \"Unless you want to wear an evil clown mask or something, but I don't think Brain Rot is hiring an eleventh member.\"\n\t\t\t\t\n\t\t\t\tYou release a heavy sigh, but give her a small smile. \"Yeah, thanks for reminding me.\"\n\t\t\t\t\n\t\t\t\tShe pats your knee platonically and gives you an encouraging look. \"It gives me the heebie jeebies too sometimes. My secret? Making myself throw up before a show eliminates the possibility of me throwing up [i]during[/i] a show. Or, at least reduces the chances of it.\"\n\t\t\t\t*if (party \u003c 2)\n\t\t\t\t\t*goto party \n\t\t\t\t*set deception_couch_last true \n\t\t\t\t*goto vip \n\t\t\n\t\t*label intelligence_party \n\t\t*set intelligence_party true \n\t\t*set party +1\n\t\t*if (party > 1)\n\t\t\t*set intelligence_party_last true \n\t\t*set intelligence +2 \n\t\t*set chill +1 \n\t\t*set charisma +1 \n\t\t*set tariano +1 \n\t\t(+2 Intelligence, +1 Charisma, +1 Chill, Tariano Approves)\n\t\t*line_break \n\t\t*if (party \u003c= 1)\n\t\t\tYou hurry after Tariano, not wanting to lose him in the crowd. \n\t\t*if (party > 1)\n\t\t\tYou manage to find Tariano exiting a restroom and heading towards the pool tables.\n\t\tHe sticks out like a beacon in the sea of black clothes with his vibrant red hair. He notices you and pauses, looks back with a smile, and slows his pace to allow you to catch up. \"Hey, coming to play some billiards with me?\" He looks guiltily around. \"Baxter hates that word and I like to tease him with it, but then of course he likes to punch me.\"\n\t\t\n\t\tYou chuckle. \"Yeah, I'm coming to play billia-- I mean pool with you.\"\n\t\t\n\t\tThe two of you maneuver through the crowd and reach several pool tables. Most of them are already occupied, but fortunately, a group of friends appears to just be leaving one available. Tariano quickly claims the table and begins to set up the balls, meticulously arranging them into their arrow formation. The tables are covered in a blood red felt, making the balls blend together in the low light. \n\t\t\n\t\tTariano clears his throat. \"So,\" he begins, not looking at you as he applies chalk to the end of his pool stick. \"I wanted to ask, and I hope I don't make this awkward or anything, but.\" His voice trails off, and then his eyes flick up to you, and you crinkle your eyebrows questioningly as you match his gaze. \"Is everything okay? Is there anything you want to talk about?\"\n\t\t\n\t\tThat's all he says. No follow up questions, no context. His tone is so genuine and tender that it catches you off guard. \n\t\t*if (tough_indulge)\n\t\t\tYou wonder what to say. You usually have less of a filter when you're drunk.\n\t\t*if (charisma_indulge)\n\t\t\tYour head is comfortably warm and your thoughts are moving at a sluggish pace, causing his words to make you feel even more warm and fuzzy. \n\t\t*if (intelligence_indulge)\n\t\t\tYour comfortable buzz wrestles with fresh jitters as you wonder how to answer this calculus equation parading as simple addition.\n\t\t*if (deception_indulge)\n\t\t\tHe could be talking about so many things: Larry's obvious antagonism, adapting to your new world, and or your undoubtedly strange behavior recently.\n\t\t\"What do you mean?\" you ask ambiguously. \n\t\t\n\t\tTariano shrugs and aims his stick at the cue ball with one eye shut. He strikes the ball and it hits the formation of balls with a sharp [i]clack[/i]. The balls burst out in several directions, and a solid orange ball sinks into a corner pocket. He makes a little fist pump and then says, \"Well, I don't know. Life sucks, and I'm a pretty good listener. Plus, I have a better chance of winning if I distract you with conversation.\"\n\t\t*choice \n\t\t\t*selectable_if (((tariano > 52) and (flirt = 0)) and ((attracted_males))) #Ask him if he has ever had a secret he could never tell anyone (Requires 53 Tariano)\n\t\t\t\t*goto deception_flirt_pool\n\t\t\t\t\t\n\t\t\t*selectable_if (((tariano > 52) and (flirt = 0)) and ((attracted_males))) #Admit to him that you've been feeling very lonely in this strange new world (Requires 53 Tariano)\n\t\t\t\t*goto intelligence_flirt_pool\n\t\t\t\t\t\n\t\t\t#Confide in him that Larry's behavior towards you has been pissing you off\n\t\t\t\t*goto tough_pool\n\t\t\t\t\n\t\t\t#Tell him you just want to ignore your problems for the moment and have some mindless fun\n\t\t\t\t*goto charisma_pool \n\t\t\t\t\n\t\t\t#Confide in him that you've been preoccupied by an eviction notice\n\t\t\t\t*goto intelligence_pool \n\t\t\t\t\n\t\t\t#Tell him that he should really mind his own business\n\t\t\t\t*goto deception_pool \n\t\t\t\t\n\t\t\t\t*label tough_pool \n\t\t\t\t*set tough_pool true \n\t\t\t\t*set tough +2 \n\t\t\t\t*set intimidating +1 \n\t\t\t\t*set charisma +1 \n\t\t\t\t*set tariano +1\n\t\t\t\t(+2 Tough, +1 Charisma, +1 Intimidating, Tariano Approves)\n\t\t\t\t*line_break \n\t\t\t\tYou scan the room for Larry with a scowl, but still see no sign of him. You wouldn't mind if he overhead this. \"It's Larry,\" you say with an edge to your voice. \"Am I only the one he's so petty and obnoxious to?\"\n\t\t\t\t\n\t\t\t\tYou can't tell Tariano everything, but you have to vent a little or you'll eventually explode. Tariano takes another shot and moves a solid ball into a prime position. You select a striped ball as your first target, but hit the cue ball too hard, and the balls overshoot the pocket. A knowing smile plays across Tariano's lips. He brushes his red hair out of his eyes as he studies the table. \n\t\t\t\t\n\t\t\t\tAfter a few seconds of mulling your question over, he leans over and takes another shot, easily making another ball disappear. \"For some reason I seem to mostly be invisible to him, but I honestly prefer it that way. He creeps me out a little, but I can't exactly figure out why. Plus, he drenches himself in body spray that smells like engine coolant.\"\n\t\t\t\t\n\t\t\t\tYou laugh together, a spiteful laugh that makes you feel warm on the inside. \n\t\t\t\t*if (attracted_males)\n\t\t\t\t\tHis smile is full of adorable dimples.\n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tYou suddenly feel very toasty, and notice the volume of your voice rising as you get more animated. \n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tYou realize you're laughing a lot harder than you probably should, but dammit, come on. [i]Engine coolant.[/i]\n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tYour laugh comes easily, and you find yourself brimming to vent about Larry more.\n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tA part of you wishes you could stop thinking about Larry, but it will be so satisfying to vent about him.\n\t\t\t\t\"He tried to stop me from auditioning,\" you say bitterly. \"Refused to let me in.\" You make a snap decision to tell Tariano more. \"And he even cornered me in the restroom to try to intimidate me.\"\n\t\t\t\t\n\t\t\t\tTariano misses his shot, hitting air with his stick as he stares at you, mouth agape. \"Are you serious?\" he says, eyebrows bunched up in a concerned frown. \"I thought something weird was going on.\" He straightens out, scanning the area suspiciously. \"Next time we see him, we can confront him together.\"\n\t\t\t\t*if (party \u003c 2)\n\t\t\t\t\t*goto party \n\t\t\t\t*set tough_pool_last true \n\t\t\t\t*goto vip \n\t\t\t\t\n\t\t\t\t*label charisma_pool \n\t\t\t\t*set charisma_pool true \n\t\t\t\t*set charisma +2\n\t\t\t\t*set deception +1 \n\t\t\t\t*set mysterious +1 \n\t\t\t\t*set tariano +1\n\t\t\t\t(+2 Charisma, +1 Deception, +1 Mysterious, Tariano Approves)\n\t\t\t\t*line_break\n\t\t\t\tYou shrug and wave his concerns away with a hand. \"I've just had a lot on my mind lately. Honestly, I just want to ignore everything else right now and have a little harmless, mindless fun.\"\n\t\t\t\t\n\t\t\t\tTariano clears his throat and scratches the back of his head. \"Ah, I feel really awkward now.\" He playfully raps his knuckles on his forehead and rolls his eyes. \"Well, anyways, I guess it's my shot, isn't it?\"\n\t\t\t\t\n\t\t\t\tThe two of you share a chuckle, which seems to loosen him up again. He takes a deep breath, scrutinizing the balls carefully with narrowed eyes and a little smirk. He finally selects his target, easily knocking another ball in. He wiggles his eyebrows. \"It's all just  physics when you think about it.\" \n\t\t\t\t\n\t\t\t\tAs if on cue, the cue ball crawls after the ball he just scored, hangs on the edge of the pocket, and then falls in. He scratches his chin, looking sheepish. You laugh as you get the cue ball and set it up for your next shot. \"I guess physics has a pretty good sense of humor.\"\n\t\t\t\t\n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tAs you stare at the cue ball, it seems to shift slightly. You blink hard several times and try to focus. \n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tThe cue ball seems to take in the red strobe lights, and you can make out the individual scratches and scuffs on its surface. \n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tEven though you haven't played pool in a long time, you feel confident that you can knock some balls into some holes easily enough.\n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tYou think the last time you played pool was at a family gathering at a random bowling alley.\n\t\t\t\tYou strike the cue ball, aiming for a striped ball in the corner. The white ball travels a long distance, gradually losing momentum before finally gently making contact. Just like Tariano's ball, yours hovers over the pocket before dropping in, but the cue ball doesn't go in after. You laugh in disbelief. \"Did you see that?\"\n\t\t\t\t\n\t\t\t\tTariano mimes breaking his pool stick over one knee, laughing lightly. As you search for your next target with a grin, you realize you managed to forget about Larry and Kanibor for a brief moment there. Tariano seems much more comfortable after that brief bit of awkwardness, too. \"Want to play another game after this one?\" he asks. \"If there's time, I mean.\"\n\t\t\t\t*if (party \u003c 2)\n\t\t\t\t\t*goto party \n\t\t\t\t*set charisma_pool_last true \n\t\t\t\t*goto vip\n\t\t\t\t\n\t\t\t\t*label intelligence_flirt_pool\n\t\t\t\t*set intelligence_flirt_pool true \n\t\t\t\t*set flirt +1 \n\t\t\t\t*set intelligence +2 \n\t\t\t\t*set charisma +1 \n\t\t\t\t*set chill +1 \n\t\t\t\t*set tariano +3 \n\t\t\t\t(+2 Intelligence, +1 Charisma, +1 Chill, Tariano Approves)\n\t\t\t\t*line_break \n\t\t\t\tYou take a deep breath, letting it out slowly as you carefully think about what to say. Tariano hits the cue ball quickly, knocking one of the solid balls closer to a pocket but not scoring. He doesn't seem to care very much, and watches you closely as you say, \"Honestly, I've been feeling very lonely lately. Even with the band, and the crowds, it's hard to describe.\"\n\n\t\t\t\tYou search for a striped ball that's close enough to a pocket, and send it ricocheting off the side as it misses by an inch. Now it's further away than it was before. Tariano nods thoughtfully and considers your words as he makes another goal, but drops the cue ball in after it. \"You know, I feel lonely all the time too. Even when I'm around the band, and they're my lifelong best friends. Sometimes there's just something missing.\"\n\t\t\t\t\n\t\t\t\tSomething in Tariano's tone makes you look up at him, but he averts his gaze, preoccupying himself with the chalk again. You go through the motions of the pool game, but you're much more interested in him. You notice the gentle, deliberate way he moves and touches things. He reaches up and scratches his X scar absentmindedly. You wonder how he got it. \"Where did you get that scar?\" you suddenly decide to venture. \n\t\t\t\t\n\t\t\t\tTariano had just scored another ball, and was leaning down to make another shot, but straightens out to look at you curiously. His fingers move to the scar, tracing over the distinct X. To your surprise, he gives you a proud, toothy grin and waggles his eyebrows. \"Oh, this? A souvenir from when I was the preppy school bullies' favorite target in school for my long hair and black clothes. Naturally, I chose to scare them even more with nail paint and purple hair dye.\"\n\t\t\t\t\n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tHell yeah. Something about Tariano's story makes you swell with pride, and attraction. \n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tYou can practically feel Tariano's warmth and genuineness like an aura around him. \n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tYou can feel the beginnings of nervous flutters in your stomach, but mostly you appreciate his pretty smile. \n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tHis decidedly adorable smile gives you a jumble of flutters in your stomach. \n\t\t\t\tYou wish those bullies could see him now, on his way to living his dream, even if he seems to have mostly forgotten about them. \"You should be proud,\" you say. \"You refused to hide your real self. And by the way, I happen to like you the way you are.\"\n\t\t\t\t*if (party \u003c 2)\n\t\t\t\t\t*goto party \n\t\t\t\t*set intelligence_flirt_pool_last true \n\t\t\t\t*goto vip \n\n\t\t\t\t*label intelligence_pool \n\t\t\t\t*set intelligence +2 \n\t\t\t\t*set intimidating +1\n\t\t\t\t*set tough +1 \n\t\t\t\t*set tariano +1\n\t\t\t\t(+2 Intelligence, +1 Tough, +1 Intimidating, Tariano Approves)\n\t\t\t\t*line_break \n\t\t\t\tYou expel a breath of air, rubbing the back of your neck wearily. There's no delicate way of broaching this subject. You give him a wry smile. \"I'm not sure you would believe me.\"\n\t\t\t\t\n\t\t\t\tTariano eyes you curiously as he aims his pool stick. He concentrates for a second, strikes the cue ball, and rolls two solid balls into promising positions. \"Try me,\" he says. \"I'm really curious now.\"\n\t\t\t\t\n\t\t\t\tThe eviction letter appears in your mind's eye, and you frown and imagine burning it. \"My money pit of a car finally died,\" you say as you study the table. You go for a striped ball near a pocket, but it just rests against the edge tauntingly. \"And my apartment complex is evicting me.\"\n\t\t\t\t\n\t\t\t\tTariano stares at you with wide eyes, his jaw slightly agape. His hair falls in a velvet curtain across his face, and he shakes it away. \"Wow, I'm really sorry. You really got lucky bumping into us then, didn't you?\" He winces and leans down to make his shot. \"That sounded bad. Technically, we got lucky that you just landed in our laps. That sounds weird. You probably wouldn't want to be bumping into me or in my lap. And I wouldn't want to do that or be in yours. Lap. Not that there's anything wrong with that. Or it. Or you.\"\n\t\t\t\t\n\t\t\t\tYou stare at Tariano in silence for several seconds, and then lean back and burst into uncontrollable laughter. He starts to talk again, but you point at him, clutching at your side as you laugh even harder. You have no idea why this is [i]this[/i] unreasonably funny to you. \n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tProbably the rum. Yes, you can still taste it on your breath. \n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tIt's adorable how he's fumbling and rambling to not offend you. \n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tHe's so nervous for some reason that it makes you feel relaxed. \n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tProbably the stress.\n\t\t\t\t\t\n\t\t\t\tTariano laughs along sheepishly, rubbing the back of his head. After you have caught your breath, you wipe the tears from your eyes. \"Relax, Tariano,\" you say. \"You're the least of my problems. In fact, I think I've actually forgotten what we were even talking about.\"\n\t\t\t\t*if (party \u003c 2)\n\t\t\t\t\t*goto party \n\t\t\t\t*set intelligence_pool_last true \n\t\t\t\t*goto vip \n\t\t\t\t\n\t\t\t\t*label deception_flirt_pool \n\t\t\t\t*set deception_flirt_pool true \n\t\t\t\t*set flirt +1 \n\t\t\t\t*set deception +2\n\t\t\t\t*set intelligence +1 \n\t\t\t\t*set mysterious +1 \n\t\t\t\t*set tariano +3\n\t\t\t\t(+2 Deception, +1 Intelligence, +1 Mysterious, Tariano Approves)\n\t\t\t\t*line_break \n\t\t\t\tYour shoulders suddenly feel painfully tense. Confiding in Tariano could ease your burden, or it could backfire and make an already impossible situation even more complicated. \"Have you ev
