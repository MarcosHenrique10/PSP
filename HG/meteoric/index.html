er had to keep a secret?\" you begin cautiously. \"An actual secret that you couldn't tell anyone?\"\n\t\t\t\t\n\t\t\t\tTariano's eyes flick up from the cue ball to you, but the curious smile on his face falls when he sees your dead serious expression. He makes his shot, knocking a solid ball off a wall and redirecting it towards a corner pocket. He eyes you with a look of concern that's endearing. \"No one's holding any of your family members hostage for ransom money or anything, are they?\" he asks. \n\t\t\t\t\n\t\t\t\tYou give him a wry smile. \"I'm probably the worst person to target for a monetary ransom.\"\n\t\t\t\t\n\t\t\t\tYou take a shot at a ball a couple feet away from a center pocket, but miss by an inch, causing the ball to rebound off the wall and back to you. Tariano seems to take your meaning, and rubs his neck and jawline thoughtfully. Eventually, his eyes flick back to you, and he offers you a reassuring look. \"I did have a secret like that once. It tore me up inside, until I found someone I could trust with it.\"\n\t\t\t\t\n\t\t\t\t\"What was it?\" you press. \n\t\t\t\t\n\t\t\t\tYou wonder if you can trust Tariano, if you could come to trust him with a terrible secret. \n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tYou're careful to bite your tongue to avoid telling him too much yourself. \n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tYou feel intensely connected with Tariano right now, like you can feel his sadness, and maybe he can feel your loneliness, emanating out towards one another like ripples in two side by side ponds. \n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tYou don't feel nervous around him like you do with other people. \n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tEven sober and maximally stressed, you feel like your shoulders can relax in his company. \n\t\t\t\t\t\n\t\t\t\tTariano's light brown face turns a shade darker as he blushes. Neither of you are paying any attention to the pool table anymore. \"I'm autistic.\" Then he laughs nervously and shakes his head. \"Hold on, you're hypnotizing me or something. Diagnoses are private. [i]Intimately private.[/i] Besides, I thought we were talking about you.\"\n\t\t\t\t\n\t\t\t\tYou find your fingers searching for a microphone in your pocket that's not there. You anxiously scan the crowd for Larry for the dozenth time, to no avail. You wonder how you can possibly handle something as infuriatingly frustrating and impossible as this alone. Tariano touches your arm, a look of concern on his furrowed brow. \"${name}, what's really going on?\"\n\t\t\t\t*if (party \u003c 2)\n\t\t\t\t\t*goto party \n\t\t\t\t*set deception_flirt_pool_last true \n\t\t\t\t*goto vip \n\t\t\t\t\n\t\t\t\t*label deception_pool \n\t\t\t\t*set deception +2\n\t\t\t\t*set mysterious +1 \n\t\t\t\t*set tough +1 \n\t\t\t\t*set tariano -2\n\t\t\t\t(+2 Deception, +1 Tough, +1 Mysterious, Tariano Disapproves)\n\t\t\t\t*line_break \n\t\t\t\tYou find that you're more irritated than you thought you would be, and there's an edge to your voice when you finally make your reply. \"That's my business,\" you say flatly. \"Isn't it your turn, by the way?\"\n\t\t\t\t\n\t\t\t\tTariano blinks, taken aback, and blushes mildly, making his light brown skin turn a shade darker. He leans down, briefly studies his target, and strikes the cue ball into a ball, sending it zig-zagging very close to a central pocket. He clears his throat and looks at you, a curious expression on his face. \"I don't want to invade your privacy. But, you do realize you're basically a mystery to me, and the whole band for that matter, right?\"\n\t\t\t\t\n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tYour face suddenly grows very hot, and there's a tinge of excitement in your voice. \n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tYou're pretty sure he's trying to analyze you, but you guess you can't really blame him. \n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tHe's definitely trying to analyze you, but you suppose you can't really blame him for being curious.\n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tYou're feeling really called out right now, but Tariano is obviously inquisitive, so you probably should have seen this coming. \n\t\t\t\tYou bristle and look at him head on with a deadpan expression. \"Maybe you should get to know me better before asking personal questions,\" you suggest bluntly. \"I'm a pretty private person, if you hadn't noticed.\"\n\n\t\t\t\tTariano shrugs. \"I'm not saying you have to tell me your whole autobiography. But an elevator pitch might be nice. Who knows, I might even return the favor.\" He arches an eyebrow and smiles slightly. \"Isn't it your turn, by the way?\"\n\t\t\t\t\n\t\t\t\tYou lean down and quickly make a shot, scoring easily with a straight shot to a corner pocket. If only navigating this conversation was so simple. \"Let's just say, whatever it is you think I'm going through, I'm handling it just dandy on my own,\" you say, a hint of necessary frostiness in your tone. \n\t\t\t\t*if (party \u003c 2)\n\t\t\t\t\t*goto party \n\t\t\t\t*set deception_pool_last true \n\t\t\t\t*goto vip \n\t\t\n\t\t*label deception_party \n\t\t*set deception_party true \n\t\t*set party +1\n\t\t*if (party > 1)\n\t\t\t*set deception_party_last true \n\t\t*set deception +1\n\t\t*set charisma +2\n\t\t*set chill +1 \n\t\t*set aurora +1 \n\t\t(+2 Charisma, +1 Deception, +1 Chill, Aurora Approves)\n\t\t*line_break \n\t\tAurora isn't hard to follow with her green hair bobbing above most of the crowd, even the guys. \n\t\t*if (party = 1)\n\t\t\tYou quickly go after her, and manage to catch up with her as she reaches the dance floor. \n\t\t*if (party = 2)\n\t\t\tYou manage to locate her dancing with a couple attractive looking strangers, but she quickly ditches them and comes over to you when she notices you.\n\t\tA rough circle in the center of the room is lit with spotlights, and dozens of people undulate and shift to the dark yet intimate music. Aurora looks pleased to have a dancing partner, and takes your hand, leading you further into the dance floor. \"Alright, it's time I showed off my spooky moves.\"\n\t\t\n\t\tShe releases your hand and backs away with a sort of strut, brushing her hands smoothly through the air as though petting invisible creatures at her sides. She repeats this move several times, cool eyes locking with yours and daring you to join. Even in her big combat boots, she's surprisingly agile, but accidentally bumps into someone as she walks backward. She glares at them, snapping, \"Hey, watch it. Are you trying to get squashed?\" \n\t\t\n\t\tThe offending dancer, a young man with red tinted glasses, shakes his head with a mortified look and promptly disappears. Aurora laughs and continues to dance, now stepping in little circles while waving her hands above her head as though shooing away invisible bats. This gathers a few judgmental or interested glances, but Aurora doesn't appear to notice either. She closes her eyes as she spins, a whimsical smile playing across her lips. \n\t\t\n\t\tRealizing that you've done more watching than dancing so far, you try to relax your body and let the music move you how it will. The bass vibrates the soles of your feet and haunting synths compel you to nod your head along. \n\t\t*if (tough_indulge)\n\t\t\tYou feel a bit unsteady, and stumble into Aurora's shoulder. She snorts and playfully pushes you away. \n\t\t*if (charisma_indulge)\n\t\t\tYou can clearly distinguish all the individual instruments, and there's a pleasant sheen around everything that's not just because of the spotlights. \n\t\t*if (intelligence_indulge)\n\t\t\tYour body feels slightly sluggish, while your head feels pleasantly warm and relaxed, and you remember with a smile that you've indulged a bit tonight. \n\t\t*if (deception_indulge)\n\t\t\tYou're slightly jittery with nerves, but heat of so many dancing bodies and the spotlights above help chase away any shivers.\n\t\t\"I've never seen anyone dance quite like you,\" you say.\n\t\t\n\t\tAurora sticks out her tongue. \"I'll take that as a compliment.\" \n\t\t\n\t\tShe lifts her long, slender arms above her head, swaying her hips from side to side with the rhythm of the drum and bass track. She grasps at the air, repeating the motions as though plucking invisible cobwebs from the ceiling. \n\t\t*if (attracted_females)\n\t\t\tHer fishnet jacket hovers by her ribs, and your eyes travel over her athletic stomach once or twice.\n\t\t*if not(attracted_females)\n\t\t\tShe's thin but very fit from her drumming role, you happen to notice.\n\t\tYou can't help but notice that although a few guys and a couple girls are eyeing her up, she has her focus on you, her cool eyes boring into you from across the dance floor. Then she smiles. \"Are you going to keep staring like a weirdo or are you going to dance with me?\"\n\t\t*choice\n\t\t\t*selectable_if (((aurora > 52) and (flirt = 0)) and ((attracted_females))) #Dance and flirt with Aurora even though you have no idea what you're doing (Requires 53 Aurora)\n\t\t\t\t\t*goto tough_flirt_goth\n\n\t\t\t*selectable_if (((aurora > 52) and (flirt = 0)) and ((attracted_females))) #Do your best to dance like Aurora, and flirt smoothly with her (Requires 53 Aurora)\n\t\t\t\t\t*goto deception_flirt_goth\n\t\t\t\t\n\t\t\t#Tell her that you've never been much of a dancer and this hasn't made you feel any differently \n\t\t\t\t*goto tough_goth\n\t\t\t\t\n\t\t\t#Admit that you can't dance like her, but aren't a bad dancer yourself \n\t\t\t\t*goto charisma_goth \n\t\t\t\t\n\t\t\t#Admit that you have zero dancing skills, but have enjoyed the goth dancing education\n\t\t\t\t*goto intelligence_goth \n\t\t\t\t\n\t\t\t#Pay close attention to her and try to follow her lead so you can dance like her \n\t\t\t\t*goto deception_goth \n\t\t\t\t\n\t\t\t\t*label tough_flirt_goth \n\t\t\t\t*set tough_flirt_goth true \n\t\t\t\t*set flirt +1 \n\t\t\t\t*set tough +2\n\t\t\t\t*set intelligence +1\n\t\t\t\t*set intimidating +1 \n\t\t\t\t*set aurora +3\n\t\t\t\t(+2 Tough, +1 Intelligence, +1 Intimidating, Aurora Approves)\n\t\t\t\t*line_break \n\t\t\t\tYou break out into a grin that you hope is more nonchalant than it feels. \"Hell yeah I'm going to dance with you. I was just admiring your spooky moves.\"\n\t\t\t\t\n\t\t\t\tA determined smile still on your lips, you groove your way towards Aurora, your shoulders bouncing, your hips and head swaying gently with the beat. She moves in very close to you, stretching her arms out and waving them lightly. It's a goofy, yet strangely alluring dance, and she giggles as your eyes meet. To your surprise, she leans forward and pecks you warmly on the tip of the nose.\n\t\t\t\t\t\n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tYou give her an incredulous smile that makes her laugh, a throaty, rich tune. \n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tYou feel warm and fuzzy inside, and you must be wearing a funny expression, because she giggles adorably. \n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tYou can only blink and smile faintly, and she sticks the tip of her tongue out at you.\n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tA smile unconsciously springs to your lips, and then you're rubbing your nose with a chuckle. \n\t\t\t\t\"What was that for?\" is all you can think of to say.\n\t\t\t\t\n\t\t\t\tA combination of the loud, grimy electronic music and Aurora's tall, athletic body make it difficult to come up with anything more clever. Her skin is smooth and pale, her body slender and flexible, her lanky, muscular arms graceful. \"For being real,\" she says, speaking close to your ear to get above the din. \"And, because I think you're really cute. Especially with your dancing. You look like you're stuck in a phone booth. Aww.\"\n\t\t\t\t\n\t\t\t\tYou glance down at yourself, and suddenly wonder if your shoulders are too stiff, your arms too close together, your moves too repetitive. Or maybe she's just teasing you. The next second, your ${shoe} squashes someone's toe behind you. You hurriedly apologize to the woman behind you, but then wiggle your eyebrows at Aurora as she snorts at you. \"Obviously, I'm going to need more practice.\"\n\t\t\t\t*if (party \u003c 2)\n\t\t\t\t\t*goto party \n\t\t\t\t*set tough_flirt_goth true \n\t\t\t\t*goto vip \n\t\t\t\t\n\t\t\t\t*label tough_goth \n\t\t\t\t*set tough_goth true \n\t\t\t\t*set tough +2 \n\t\t\t\t*set deception +1 \n\t\t\t\t*set intimidating +1 \n\t\t\t\t*set aurora -2\n\t\t\t\t(+2 Tough, +1 Deception, +1 Intimidating, Aurora Disapproves)\n\t\t\t\t*line_break \n\t\t\t\tYou give her a dubious expression. \"Honestly, I've never enjoyed dancing very much, and this hasn't really changed my opinion,\" you say bluntly. \"I would just feel...\"\n\t\t\t\t\n\t\t\t\tYour voice trails off as you struggle to decipher the right word. \n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tDizzy, more than likely, if you tried spinning in circles like her. \n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tYou feel awkward and slightly discombobulated, a weird combination.\n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\t[i]Awkward[/i] is probably the right word, but there has to be a more tactful synonym. \n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tYour mind is clear, but you feel a lot more awkward than you thought you would on a dance floor. \n\t\t\t\tAurora, who is now doing funny little kicks and punches to the rhythm of the music, rolls her eyes dramatically. \"Weird?\" she supplies without much interest. \n\t\t\t\t\n\t\t\t\t\"Uncomfortable,\" you return. \n\t\t\t\t\n\t\t\t\tHer amused expression turns into a slight frown, making her look aggressive with her punching and kicking dance. Perhaps realizing this, she switches to something a little more loose and open. So open that one of her combat boots nearly hits you, which she doesn't appear to notice. \"Hey, it's a free country,\" she says dismissively. \"No one's forcing you to dance at gunpoint. Go do something else if you're not having fun instead of harshing my mellow about it.\"\n\t\t\t\t\n\t\t\t\tNow you're wondering why you attempted dancing in the first place instead of just searching for Larry, but you're not sure how much time you have left. Bristling, you say, \"If Larry happens to ask you for a dance, holler for me, will you?\"\n\t\t\t\t\n\t\t\t\tAurora eyebrows shoot up and a curious, sarcastic smile plays on her lips. \"I think he knows better than to ask me for a dance. But if he does, I'll definitely give you a holler.\" Then, curiously, \"What do you want with him, anyway? He steal your wallet or something?\"\n\t\t\t\t\n\t\t\t\tYour lips twitch wryly. \"Yeah, something like that.\"\n\t\t\t\t*if (party \u003c 2)\n\t\t\t\t\t*goto party \n\t\t\t\t*set tough_goth_last true \n\t\t\t\t*goto vip\n\n\t\t\t\t*label charisma_goth \n\t\t\t\t*set charisma_goth true \n\t\t\t\t*set charisma +2 \n\t\t\t\t*set tough +1 \n\t\t\t\t*set intimidating +1 \n\t\t\t\t*set aurora +1\n\t\t\t\t(+2 Charisma, +1 Tough, +1 Intimidating, Aurora Approves)\n\t\t\t\t*line_break \n\t\t\t\t\"I may not be able to dance like that,\" you say, smiling and waving a hand at her. \"But I'm not such a bad dancer myself.\"\n\t\t\t\t\n\t\t\t\tAurora yawns widely, covering her mouth with the back of one hand. \"You're still talking?\"\n\t\t\t\t\n\t\t\t\tYou narrow your eyes playfully at her and start to groove to the music, loosening up and letting the rhythm move you. Aurora raises her arms above her head, waving her body from side to side like a ghost, elbows and wrists held like an ancient mummy dancer. She stares at you, challenging you with a wiggle of her eyebrows. \n\t\t\t\t\n\t\t\t\tYou smile back with a shake of your head. What's she want you to do, back flip and then break dance? \n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tA stupid, extroverted part of you almost starts to entertain the idea, but then you imagine falling on your head and ending your career and life in one swift moment. \n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tBreak dancing actually sounds delightful right now, except for the distinct possibility of getting your fingers squashed by platform leather boots.\n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tYou definitely feel loose enough to, but something tells you this shouldn't be your first time trying. \n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tWith how stressed you've been lately, you probably shouldn't attempt that unless you want to pull a muscle, or several.\n\t\t\t\tYou decide the best course of action is to mess with her. Throwing self-consciousness out the window, you start to dance confidently and wildly but with no rhythm. \"Okay, you'd better watch out,\" you say. \"I'm unleashing the beast inside.\"\n\t\t\t\t\n\t\t\t\tAurora slaps a hand to her forehead and half-groans, half laughs as you heave and lurch around the dance floor, wiggling your arms and legs and randomly crouching or spinning. The whole time, you wear a serious expression and stare intently at Aurora. When you're in the middle of thrusting your hips and waving your hands above your head, she waves her hand and says through laughter, \"Okay, okay, stop before you hurt yourself, or my eyes any longer. You're like visual acid.\"\n\t\t\t\t\n\t\t\t\tYou cup a palm to your ear, scrunching up your face in confusion and shaking your head. \"What?\" you shout, pointing at your ear as you continue to gyrate your hips and wave your arms with no rhythm and no shame. \"The music's too loud. I can't-\"\n\t\t\t\t\n\t\t\t\tYou dodge a playful punch from Aurora, sharing a joyful laugh with her that you badly needed. \n\t\t\t\t*if (party \u003c 2)\n\t\t\t\t\t*goto party \n\t\t\t\t*set charisma_goth_last false \n\t\t\t\t*goto vip \n\t\t\t\t\n\t\t\t\t*label intelligence_goth \n\t\t\t\t*set intelligence_goth true \n\t\t\t\t*set intelligence +2 \n\t\t\t\t*set deception +1 \n\t\t\t\t*set mysterious +1 \n\t\t\t\t*set aurora +1\n\t\t\t\t(+2 Intelligence, +1 Deception, +1 Mysterious, Aurora Approves)\n\t\t\t\t*line_break \n\t\t\t\tYou give her a sheepish look and shrug apologetically. \"I have to admit, I have zero dancing skills. But I've really enjoyed the goth dancing education.\"\n\t\t\t\t\n\t\t\t\tAurora arches an eyebrow. \"The best education is experience, dork. Come on, come dance with me for two minutes and I'll reveal some of my secrets. It's a once in a lifetime opportunity, buddy.\"\n\t\t\t\t\n\t\t\t\tSmiling nervously, you move closer to her, trying to have some semblance of rhythm as you move your arms and legs to the driving, multi-layered synth. Aurora throws her head back and juts her arms out in front of her, hands held in claws facing downwards. You're given the distinct impression of a dancing zombie as she moonwalks backwards. \n\t\t\t\t\n\t\t\t\tAurora's peculiar dance draws a few funny looks and even some laughs, but she doesn't appear to notice. Oh, what the hell? Throwing your arms out, you hang your head back and fall into motion beside her. Together, stomping about in a little circle, the two of you look like a small pack of unliving ready to recruit through conscription for the undead army. \"So,\" you say breathlessly. \"Tell me your secrets then.\"\n\t\t\t\t\n\t\t\t\tAurora straightens out, wobbling a bit as she regains her balance. You do the same, and your aching back is grateful. She throws a sweaty arm around your shoulder, smiling as she catches her breath. \"All I do is picture something creepy or spooky. Then make friends with them, and dance. Bats flying around your head? Playfully shoo them away. Wolves running at you? Pet them and hop away. It's all about moving how your heart wants to move.\"\n\t\t\t\t\n\t\t\t\tYou [i]thought[/i] something similar when she was dancing, you realize happily. \n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tLaughing, you picture rats scurrying around your feet, and pivot and dance around with frantic feet.\n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tThe thought of scary animals makes you picture a lion glaring at you with Larry's face, and you snort with laughter.\n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tYou imagine a swarm of spiders and insects crawling all over you, and you rotate around, brushing them off your arms, legs and torso with a laugh. \n\t\t\t\t*if (deception_indulge) \n\t\t\t\t\tYou never thought of dancing so creatively before, but now dancing spiders and ogres appears in your head, creepy and hilarious. \n\t\t\t\t\"So, [i]that's[/i] how a goth dances,\" you conclude. \"This one, anyway. I have to say, Aurora, I'm impressed.\"\n\t\t\t\t*if (party \u003c 2)\n\t\t\t\t\t*goto party \n\t\t\t\t*set intelligence_goth_last true \n\t\t\t\t*goto vip \n\t\t\t\t\n\t\t\t\t*label deception_flirt_goth\n\t\t\t\t*set deception_flirt_goth true \n\t\t\t\t*set flirt +1 \n\t\t\t\t*set deception +2 \n\t\t\t\t*set charisma +1 \n\t\t\t\t*set mysterious +1 \n\t\t\t\t*set aurora +3 \n\t\t\t\t(+2 Deception, +1 Charisma, +1 Mysterious, Aurora Approves)\n\t\t\t\t*line_break \n\t\t\t\tA goth baddie wants to dance with you, and is staring into your soul with her cool eyes. There's no way in hell you're squandering this chance to flirt with her, but you should be delicate about it. A reserved smile playing on your lips, you say, \"Sorry, I think you almost hypnotized me there. Yes, let's dance.\"\n\t\t\t\t\n\t\t\t\tAurora's pale cheeks seem to flush with color, but that could be the red strobe lights playing illusions. You move in closer, locking eyes with her and allowing yourself to be set adrift in the smooth synth and her icy gaze. You move your body and arms as though underwater or in a dream as Aurora floats around you like a ghost. \n\t\t\t\t\n\t\t\t\t[i]Her skin is as pale as a ghost[/i] you think to yourself as you eye her athletic torso, smooth and lined with muscles, appreciatively. Aurora drifts in circles around you now, brushing her fingertips across your shoulders and making you shiver with electricity. \n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tOccasionally, you overbalance and lean into her, but she steadies you with warm, strong hands, seeming amused rather than annoyed. \n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tThe pleasant warmth in your head travels throughout your body like a summer rain at her touch, and you detect a playful glint in her eyes.  \n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tYou realize with a little jolt that you feel so comfortable and happy with Aurora that you haven't thought about Kanibor or Larry in several whole minutes. \n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tYou almost feel a twinge of guilt as you remember your stolen mic and your mission to retrieve it, but this is the happiest you've felt in so long. \n\t\t\t\t\n\t\t\t\tAurora lets out a long sigh, her face tinged with pink from dancing. \"You're a lovely dancer,\" she says in a way that makes it evident she had other expectations. \"We were just...\" Her voice trails off, a whimsical sort of smile on her lips. \"You know, vibing,\" she says, gesticulating with her hands for emphasis. \"Instantly. Instantly!\"\n\t\t\t\t\n\t\t\t\tThings have gone as well as they could have with Aurora. You find it cruel that these moments can't last a lot longer. Unfortunately, Larry nags at the corner of your mind, and with each passing song, recording your own song looms closer. Shoving all these thoughts aside, you smile warmly at her. \"I know. We had more chemistry than a science fair.\"\n\t\t\t\t\n\t\t\t\tAurora looks around suspiciously. \"Careful. Baxter punches anyone who uses too many or too severe dad jokes, and that bastard can sniff them out them like a bloodhound.\"\n\t\t\t\t*if (party \u003c 2)\n\t\t\t\t\t*goto party \n\t\t\t\t*set deception_flirt_goth_last true \n\t\t\t\t*goto vip \n\t\t\t\t\n\t\t\t\t*label deception_goth \n\t\t\t\t*set deception_goth true \n\t\t\t\t*set deception +2 \n\t\t\t\t*set charisma +1 \n\t\t\t\t*set chill +1 \n\t\t\t\t*set aurora +1\n\t\t\t\t(+2 Deception, +1 Charisma, +1 Chill, Aurora Approves)\n\t\t\t\t*line_break \n\t\t\t\tYou wanted to see a goth dance, and you're not disappointed. She's so damn cool and unique, and now you want to dance like that. Maybe if you pay close attention, you can pick up some moves and impress her at the same time. Smiling a bit shyly, you say, \"Just watching and learning. Here I come.\"\n\t\t\t\t\n\t\t\t\tAurora eyes you curiously, a small, encouraging smile on her face as she dances. She shakes her head from side to side, her green hair flowing around her and glowing in the strobe lights. She moves her arms and kicks her combat boots with the pulsing electronics. She looks so free and happy, shedding all her worries and extra energy all at once. \n\t\t\t\t\n\t\t\t\tAurora's energetic dance gets a few whoops and encouraging chuckles from nearby. You feel awkward just standing there watching, and you wonder if she feels awkward dancing alone. Well, time to jump in one way or another. You take a deep breath, give her a nervous smile, and then start to shake your hair and dance your ass off. \n\t\t\t\t\n\t\t\t\tThe two of you are in your own little world, too focused on dancing with one another to notice anyone else. You know you must be drawing attention to yourself as you thrash and spin (rhythmically), but Aurora laughs and bobs her head eagerly at your antics. \n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tA wave of dizziness hits you, making you stumble into her, and she playfully pushes you away with a snort. \n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tYour body feels heavy and warm, almost sluggish, while your head feels like it's floating an inch above your neck. In a pleasant way.\n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tSuddenly, a toasty, latent beer burp rumbles through your torso and out of your mouth, which fortunately no one notices. Except Aurora, who grins and gives you a thumbs up.\n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tYou're having so much fun that you'd quite forgotten about Larry, and you don't suppose you could multi-task dancing like this anyways.\n\t\t\t\t\n\t\t\t\tAfter a couple more songs of this, the two of you have thoroughly tired yourselves out. Aurora grins at you, throwing a sweaty arm around your shoulder as you try to catch your breath. \"You seriously know how to let your wild side out, huh?\" she says, panting. \"We really should be concert buddies on a more regular basis.\"\n\t\t\t\t*if (party \u003c 2)\n\t\t\t\t\t*goto party \n\t\t\t\t*set deception_goth_last true \n\t\t\t\t*goto vip \n\t\t\n\t\t*label search_larry\n\t\t*set search_larry true \n\t\t*set azure -1 \n\t\t*set aurora -1 \n\t\t*set tariano -1 \n\t\t*set baxter -1  \n\t\t*set tough +2\n\t\t*set deception +1\n\t\t*set kanibor +3\n\t\t(+2 Tough, +1 Deception, Aurora Disapproves, Azure Disapproves, Baxter Disapproves, Tariano Disapproves, Kanibor Approves)\n\t\t*line_break \n\t\tYou can't think about anything else, let alone partying, until you've recovered the Necrophone from Larry. As you set off in your own direction, it occurs to you that you'll probably be disappointing everyone equally by going off mysteriously by yourself. Right now, you can't afford to care too much. You drag in a breath until it hurts and slowly exhale. Focus. \n\t\t\n\t\tYour fingertips buzz with adrenaline and your heart beat increases as you search for your unwanted arch nemesis. Yet as you wander through the crowd of people dancing, talking, smoking and drinking, you become increasingly dismayed. No sign of him anywhere, and time is steadily running out. You rub your face vigorously with your hands, letting out a groan. Then your eyes land on the glowing red exit sign and you get an idea. \n\t\t\n\t\t...\n\t\t\n\t\tThe back entrance swings behind you, drowning out the dark electronic music and chattering voices. Gray clouds are overhead, and a crisp breeze slices through your clothes. Surprisingly, only a few vehicles occupy the parking spaces here, and only one is currently inhabited. A compact sedan with fading red paint sits beneath a street lamp, puttering gently as it idles. \n\t\t\t\n\t\tThe car's windows are obscured with clouds of gray smoke, and muffled thrash metal booms from its sub-woofers. You hurriedly duck behind the nearest car, shivering from a combination of the icy air and excitement. You peer hard through the red sedan's front windshield, and the angular face of Larry slowly takes shape behind the steering wheel. You clench a fist in silent celebration, but you know have a struggle ahead. \n\t\t\n\t\t*if (tough_indulge)\n\t\t\tYou're aware of the liquid courage you drank impacting your motor skills, but you also feel confident and strong. \n\t\t*if (charisma_indulge)\n\t\t\tYou're so aware that you can distinctly hear the droning of the street lamp, and you can see individual particles of fog swirling through the air. \n\t\t*if (intelligence_indulge)\n\t\t\tYou feel loose and warm despite the chill and your nerves, and an involuntary fruity, toasty burp reminds you why. \n\t\t*if (deception_indulge)\n\t\t\tYour thoughts feel clear, and you're thankful you declined drinking and smoking throughout the night. \n\t\tJust as you're contemplating what to do next, the booming thrash music cuts off, and the driver door creaks open. As you peer out from behind a car's back bumper, Larry climbs out of his car, a large amount of skunky weed smoke billowing out around him. He briefly scans the parking lot and then stalks towards the back door with purpose. You only have a handful of seconds to stop him from stealing your career. \n\t\t*choice\n\t\t\t#Block the entrance and get ready to fight \n\t\t\t\t*goto tough_search \n\n\t\t\t#Jump out and scare him, then snatch the mic when you have the element of surprise\n\t\t\t\t*goto charisma_search \n\n\t\t\t#Threaten to reveal to the band that he attacked you and stole your mic \n\t\t\t\t*goto intelligence_search \n\n\t\t\t#Continue to hide, then attack him from behind as he passes by \n\t\t\t\t*goto deception_search \n\n\t\t\t\t*label tough_search \n\t\t\t\t*set tough_search_last true \n\t\t\t\t*set tough +2 \n\t\t\t\t*set charisma +1 \n\t\t\t\t*set intimidating +1 \n\t\t\t\t(+2 Tough, +1 Charisma, +1 Intimidating)\n\t\t\t\t*line_break \n\t\t\t\tYou rise from your hiding place and pace in front of the entrance, blocking Larry's way. He jerks away from you in alarm, his sneakers squeaking loudly on the wet asphalt. You raise clenched fists with a scowl. \"You don't deserve a warning, Larry, but I'm giving you one anyway. Hand it over, or I start swinging.\"\n\t\t\t\t\n\t\t\t\tHis smile is mirthless and his eyes, glazed over and bloodshot from weed, are wild as he says, \"You know, I've been looking for an excuse to whoop your ass, and now I'm really going to enjoy this.\"\n\t\t\t\t\n\t\t\t\tWhat happens next occurs in a frenzied blur. Larry charges you with an angry snarl. Ready, you crouch slightly, aiming a punch at his face. Your knuckles connect with his jaw, but he just grunts, disturbingly undisturbed, and continues to barrel into you. He's onto you now, grabbing your arms and practically tackling you into the building. He clutches onto you with a vice-like grip, bruising you. \n\t\t\t\t\n\t\t\t\tYou strike Larry repeatedly in the stomach and ribs, but your arms feel like jelly. Blood leaks from his lip and he groans and clenches his jaw from your blows, but then his hands navigate to your collar. You splutter as his grip tightens and your collar constricts and burns your neck skin. Your back scrapes against the wall as you struggle, and you feel the warmth and wetness of blood clinging to your shirt. \n\t\t\t\t\n\t\t\t\tThis is not going how you planned. \n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tThe pain you're in feels distant, but your head swims, and you suddenly imagine projectile vomiting all over his smug face. \n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tThe pain you're in is in the background, but your thoughts feel maddeningly sluggish. \n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tYour scrapes and bruises can be ignored for now, but your thoughts feel frustratingly muddled. \n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tYour mind feels as clear as a pristine lake, but your aches and bruises hurt urgently despite your adrenaline flowing. \n\t\t\t\tLarry's face is inches away from yours, his expression manic. \"You think I'm afraid of you, ${name}?\" he wheezes, blowing flecks of spit and stale smoke breath into your face. \"I'm crazy, motherfucker. I don't give a fuck about anything.\"\n\n\t\t\t\tYou have barely realized it before Larry has released you, wrenched open the back entrance, and sprinted inside. Buzzing with adrenaline and indignation, you push yourself off the wall with a grunt. With a disdainful curse, you sluggishly follow him, trying to catch your breath and steel your nerves. \n\t\t\t\t*goto vip \n\n\t\t\t\t*label charisma_search \n\t\t\t\t*set charisma_search_last true \n\t\t\t\t*set charisma +2 \n\t\t\t\t*set tough +1 \n\t\t\t\t*set intimidating +1 \n\t\t\t\t*set larry +1\n\t\t\t\t(+2 Charisma, +1 Tough, +1 Intimidating) \n\t\t\t\t*line_break \n\t\t\t\tAs Larry approaches, you feel satisfyingly like an ambush predator lying in wait for their unsuspecting prey. Only, you hope your prey doesn't feel like fighting back. When he's a few steps away, you leap out from behind the car, screaming wordlessly and waving your arms above your head like you might do to try to intimidate a charging grizzly bear. Larry half jumps, half thrashes back, screaming back at you in confusion.\n\t\t\t\t\n\t\t\t\tWhile you have Larry on his back foot, you dart forward, snatching for the Necrophone. \n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tYour legs won't move as quickly as you want them to, and the ground feels unsteady beneath your feet, causing you to almost trip into him. \n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tTime seems to slow and your vision seems to sharpen as you near him, as though you were adjusting settings with a remote. \n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tYou feel energetic and nimble, until one of your shoes scrapes hard against the other, making you stumble slightly. \n\t\t\t\t*if (deception_indulge)\t\n\t\t\t\t\tThe cold air whips at your face, stinging your eyes yet seeming to grant you clarity of mind. \n\t\t\t\tYour fingers scrabble over the alien metal and plastic sticking from his pocket, but Larry yelps and scrambles back again, clutching the mic to his chest covetously. \n\n\t\t\t\tLarry glares at you, looking positively furious with his eyes bloodshot crimson. \"Psycho stalker,\" he blurts out. \"Just give up. You already failed, miserably.\"\n\t\t\t\t\n\t\t\t\t\"So [i]I'm[/i] the psycho stalker,\" you say in disbelief, shaking your head. \"I'll leave you alone just as soon as you hand over what's mine. I'm not just going to quit, you know. This is isn't over til that mic is back in my hands.\"\n\t\t\t\t\n\t\t\t\tLarry suddenly grins nastily at you, teeth and gums showing and eyes glinting like a wolf. \"Oh, yeah? Here you go, then, jackass!\" \n\t\t\t\t\n\t\t\t\tHe thrusts his hand into his jean pocket, procuring the Necrophone, and pulls his arm back to throw. You cringe, instinctively bringing your arms and a leg up to protect yourself, but then Larry is sprinting madly for the back entrance. You try to go after him, but he waves the mic at you like a club, forcing you to backpedal before getting pummeled. A second later, he vanishes inside. With a growl of frustration, you pursue him. \n\t\t\t\t*goto vip \n\n\t\t\t\t*label intelligence_search \n\t\t\t\t*set intelligence_search_last true \n\t\t\t\t*set intelligence +2 \n\t\t\t\t*set deception +1 \n\t\t\t\t*set mysterious +1 \n\t\t\t\t*set larry +1\n\t\t\t\t(+2 Intelligence, +1 Deception, +1 Mysterious)\n\t\t\t\t*line_break \n\t\t\t\tNeither of you wants the rest of the band to know about what's really going on, but at this point Larry is forcing your hand. Calmly, you step out from behind the car, blocking the rear entrance. Larry stops just short of you, his expression immediately growing stormy. \"Where the hell do you keep appearing from?\" he laughs spitefully. \"You're like an ass zit that just keeps coming back no matter how many times you pop it.\"\n\t\t\t\t\n\t\t\t\tThe irony of that statement is enough to make you want to laugh, but you content yourself with rubbing your face. \"Look, this game is over. I don't care what you think I'm hiding. The reality is, the band will fire you the moment I tell them you assaulted me and stole my mic. This is your last chance to salvage any dignity you have left.\"\n\t\t\t\t\n\t\t\t\tTo your chagrin, Larry bursts into acerbic laughter. \"If you were going to snitch, you would have done it already. Face it, you're alone, just like me. It's just you versus me, and let's face it, a soft motherfucker like you is never coming out on top.\"\n\n\t\t\t\tYour face burns with indignation, but you try to remain calm. You can't afford to bluff at this stage, which means you'll have to let Larry win this battle so you can win the war later. \n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tLarry is making you want another rum and soda. He's going to single handedly turn you into an alcoholic. \n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tThere's a part of you that can't believe that someone could smoke that much weed and still be so confrontational and unaware. \n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tYour buzz doesn't interfere with your clarity, but it's not strong enough to protect you from a new headache either. \n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tNow that you've found Larry, you almost wish you had indulged after all, but you think he would be unbearable regardless of what substance you had in your system. \n\t\t\t\tGiving him a very forced smile, you step aside and motion with a hand. \"Fine. Be my guest. It's your funeral.\"\n\t\t\t\t\n\t\t\t\tLarry gives you two thumbs up and a very exaggerated grin in return, with his face scrunched up and eyes rolled back. \"Funny you say that,\" he sneers with a knowing glint in his cool eyes. \"[i]Funeral Humor[/i] will be my band's new name after I fire your fugly ass.\"\n\t\t\t\t\n\t\t\t\tYou can only stare at Larry in stunned silence as he disappears through the rear entrance. He really is a special level of spiteful. Then you're following him with a determined scowl. You weren't bluffing, and there's no way in hell you're letting your your band's name get changed to [i]Funeral Humor[/i].\n\t\t\t\t*goto vip \n\n\t\t\t\t*label deception_search \n\t\t\t\t*set deception_search_last true \n\t\t\t\t*set deception +2 \n\t\t\t\t*set tough +1 \n\t\t\t\t*set intimidating +1 \n\t\t\t\t(+2 Deception, +1 Tough, +1 Intimidating) \n\t\t\t\t*line_break \n\t\t\t\tAs Larry lopes forward unsuspectingly, you feel an intoxicating mix of emotions: surging adrenaline, mild satisfaction, a healthy dose of fear, and even a little bit of niggling pity. His eyes are the color of wine, and his gate is mild, almost relaxed. As you shrink further behind the car, you can't help but feel that it's only right to blindside him after all. Maybe it will take him and his giant ego down a notch.\n\t\t\t\t\n\t\t\t\tLarry passes by you cluelessly, hands shoved into his hoody pocket, his mane of hair shining with beads of mist in the harsh streetlamp's glow. You take a deep breath, silently exhale, and dart out behind him. Your ${shoes} squeak against the pavement, causing Larry to start to turn with a look of wide-eyed alarm. A burst of adrenaline, and you're kicking his knees from behind, throwing your arm around his neck as he collapses backwards into you. \n\t\t\t\t\n\t\t\t\tYou almost allow yourself a triumphant smirk as you tighten your arm around his throat, but then he's thrashing like a madman, bucking and kicking off the ground. You struggle to contain him, grasping one wrist and increasing the pressure on his throat until he splutters and gasps, but then your foot is slipping on the slick pavement. Tumbling back, you briefly see scattered stars and dark clouds in a black sky, then you slam into the asphalt. \n\t\t\t\t\n\t\t\t\tYou're stunned on impact. Your grip loosens on Larry's neck, and then he's shoving your arm away and rolling away from you like he's on fire. He springs to his feet as you climb gingerly to yours. His eyes are wild and his face is flushed scarlet with exertion and anger. \"Stay the fuck away from me!\" he wheezes, jabbing a shaking finger at you as he backs away, massaging his throat. \"Or I swear I'll fucking kill you.\"\n\t\t\t\t\n\t\t\t\tYou start to go after him anyway, but then he's sprinting towards the back door, and disappears inside. The center of your back feels like it was struck by a rhino's horn, and you wonder if you struck a pebble when you were crushed by that thrashing idiot. \n\t\t\t\t*if (tough_indulge)\n\t\t\t\t\tYou're not drunk enough for this shit.\n\t\t\t\t*if (charisma_indulge)\n\t\t\t\t\tYou're not high enough for this shit.\n\t\t\t\t*if (intelligence_indulge)\n\t\t\t\t\tYou're not even cross faded enough for this shit.\n\t\t\t\t*if (deception_indulge)\n\t\t\t\t\tYou're too sober for this shit. \n\t\t\t\tWith a beleaguered sigh and a dark glower, you trudge inside. \n\t\t\t\t*goto vip \n\n*label vip \n*page_break \n\n[i]Whirwhirwirchhh[/i] \n\nSuddenly, the blaring industrial music stops as Barty's turntable grinds to a conspicuous halt. All heads turn in his direction, and you feel a jolt of excitement and anxiety as you realize that it must finally be time for you to record your single. Barty taps the mic, making it whine as he holds a cheesy yet charming toothy smile. \"Oh, ${band},\" he sing-songs. \"Get your asses to the VIP room.\"\n\n*finish ", "chapter5road": "*temp stops 0\n\n*comment stat checks: 15\n\n[b]Chapter Five of Eight: The Road to Hell Is Paved With Blood[/b]  \n\n*image moon2.jpg\n\n*if (search_larry)\n\tBy the time you reach the VIP room, everyone else is already there, including Larry. The other band members all eye you questioningly, clearly wondering where you went off to by yourself. \n*if (tough_search_last)\n\tLarry gives you a nasty smile, showing off the shiny bloody lip courtesy of you. \"Oh, look, it's my greatest pal, ${name}.\"\n*if (charisma_search_last)\n\tYou scowl at Larry, and he eyes you warily for a second, but then settles into a smug smirk. \"You aren't scared, are you?\"\n*if (intelligence_search_last)\n\tLarry eyes you mistrustfully, his eyes darting nervously between you and the other band members. \"You look like you have something you want to say,\" he challenges bluntly. \n*if (deception_search_last)\n\tLarry absentmindedly touches the agitated skin on his neck, glaring at you defensively. \"You're here,\" he drawls coldly. \"I thought you might choke.\"\n\t\n*if not(search_larry)\n\tWhen you arrive outside the VIP room, your stomach sinks as you see that everyone else, including Larry, has already arrived. He gives you an obvious look, his eyes glinting triumphantly. \n*if (tough_foosball_last)\n\tBaxter clears his throat and nudges you with his elbow. \"Hey, do me a favor,\" he whispers. \"Don't tell anyone I almost stoned you, huh?\"\n*if (charisma_foosball_last)\n\tBaxter catches your attention, makes an ugly face, and starts making neanderthal noises. Even as nervous as you are, you can't hide a smile as he grunts, \"Tariano always says I have part caveman in me. Smart ass is probably right.\"\n*if (intelligence_foosball_last)\n\tBaxter suddenly snickers and leans closer, murmuring in your ear, \"You know, I just realized why Larry irritates me so much. He reminds me of my scrawny, smart ass little brother.\"\n*if (deception_foosball_last)\n\tBaxter fidgets uncomfortably. He clears his throat and rumbles a whisper, \"Do me a favor and don't tell the others I made a jackass of myself. They'd be very smug about it.\"\n*if (tough_flirt_foosball_last)\n\tBaxter nudges you gently with an elbow, a shy sort of smile on his lips. \"It's okay, you can tell everyone how cool you were catching my ball before it hit you in the face.\"\n*if (charisma_flirt_foosball_last)\n\tBaxter leans in and nudges you playfully, almost making you overbalance. \"Feel free to brag about how awesome I was. These jackasses seem to think I'm terrible at foosball for some mysterious reason.\"\n*if (tough_pool_last)\n\tTariano gives you a pointed sideways look and frowns defensively in Larry's direction. \"Look at that smug look on his face. I've got your back, ${name}.\"\n*if (charisma_pool_last)\n\tTariano stretches his arms lightly above his head, giving you a friendly look. \"Guess we'll have to have that other game another night. I'm so nervous.\"\n*if (intelligence_pool_last)\n\tTariano takes a deep breath and gives you a reassuring yet anxious look. \"Ready to kiss that eviction notice and all our financial woes goodbye?\" he says with a conspiratorial whisper. \n*if (deception_pool_last)\n\tYou notice Tariano watching you closely, and you send a reproachful look in his direction. He returns an expression that's difficult to read. \"Ready to spill your guts out?\" he asks. \n*if (intelligence_flirt_pool_last)\n\tTariano catches your eye, giving you a nervous raise of his eyebrows and a smile. \"Don't worry, we're going to kill it.\"\n*if (deception_flirt_pool_last)\n\tTariano gives you an anxious expression, puffing his cheeks out as he exhales. He rubs his sweaty palms on his pants. \"We can do this.\"\n*if (tough_couch_last)\n\tAzure rubs her hands together anxiously, bouncing on the tips of her toes. \"My heart is racing like I just ran a mile,\" she says with a puff of air, fanning herself by rustling her oversized hoody. \n*if (charisma_couch_last)\n\tAzure elbows you playfully and gives you a charming, sparkly grin. \"Ready to crash and burn?\"\n*if (intelligence_couch_last)\n\tAzure shakes her hands as though trying to chase away pins and needles. \"I feel weird,\" she says with a pensive frown. \"As though in a few minutes, my life will never be the same again.\"\n*if (deception_couch_last)\n\tAzure takes several long, deep breaths. \"Oh, man,\" she grumbles, bringing a hand to her stomach. \"I feel queasy. Damn you, adrenaline.\"\n*if (charisma_flirt_couch_last)\n\tAzure bounces on the tips of her toes excitedly, her new basketball shoes squeaking repetitively. She grabs your arm, bunching up the sleeve. \"I'm so excited I feel like I could faint,\" she says in a hushed tone, giggling anxiously. \n*if (intelligence_flirt_couch_last)\n\tAzure taps her fingertips together repetitively, chewing nervously on her bottom lip. \"Last chance to turn around before our lives change forever and you're stuck with me all the time,\" she mutters, nudging you with a shoulder. \n*if (tough_goth_last)\n\tAurora zips up her fishnet jacket, sending a stony look in Larry's direction, and then a sideways glance at you. \"Everyone is [i]so[/i] pleasant tonight,\" she mutters. \n*if (charisma_goth_last)\n\tAurora leans up against the wall, hands shoved in her fishnet jacket pockets, toe tapping. She smiles at you. \"Hope you didn't throw your back out back there, groove master.\"\n*if (intelligence_goth_last)\n\tAurora paces around in a mini circle, her hands slid in her back pockets. \"We left the dance floor but the dance floor relocated to my stomach,\" she says with a groan. \n*if (deception_goth_last) \n\tAurora, who is still pink with exertion and shiny with sweat, looks at you with raised eyebrows and a big exhale. \"Alright, let's channel all of our rodents-on-caffeine energy from earlier and take it into the studio with us. What do you say?\"\n*if (tough_flirt_goth_last)\n\tYou notice Aurora staring at you, and when you turn to look at her, she smiles warmly and taps the tip of her long nose. You remember her little kiss on your nose fondly. \"I [i]nose[/i] we're going to nail it,\" she says cheekily. \n*if (deception_flirt_goth_last)\n\tAurora rubs her arms, which are covered in goosebumps. \"I'm suddenly feeling really nervous,\" she admits, looking at you with creased eyebrows. \"You sure you don't wanna go back to dancing?\"\n\nBarty, who smells pungently of an earthy weed mixed with an expensive smelling cologne, produces a large set of jangling keys from his jumpsuit pocket, making him resemble a janitor even more closely, and unlocks the VIP room door. Beyond the door, you can already see the jaw dropping mixing board, and the recording area behind a wall of glass. \"Into my laboratory we go,\" Barty says grandly. \"Don't touch anything or I will kill you, but be yourself and have fun. Oh, and do everything I say.\"\n\nEagerly, Larry pulls the Necrophone from his pocket and begins to stalk towards the door. Cold sweat springs to your palms as you realize you only have a matter of seconds to stop him before it's too late. Fortunately, Tariano speaks up first. \"Whoa,\" he exclaims, pointing at the shiny skull mic. \"That's ${name}'s. How did you get that?\"\n\nLarry halts halfway inside the doorway, a forced, sarcastic smile on his face as he slowly turns back to look at Tariano. The other band members are staring at him too, Baxter's bushy eyebrows bunched into a scowl and Azure and Aurora wearing looks of puzzlement or skepticism. \n*if (tough_indulge)\n\tSomeone should wipe that shit eating grin off Larry's face.\n*if (charisma_indulge)\n\tYou wonder how someone can smoke so much cannabis and be so remarkably un-self-aware. \n*if (intelligence_indulge)\n\tSomehow, you sense that giving Larry a chance to open his giant mouth will work in your favor. \n*if (deception_indulge)\n\tYou've been stressing about Larry all night, and now you wonder what he's possibly going to say for himself.\n\"${name} let me have it,\" Larry finally says dully. \n\n*page_break \n\nBarty looks back and forth between you and Larry, a bemused smile growing on his lips. He snaps his fingers and says sharply, \"Yo, Cowardly Lion, back into the hallway until I know everyone's not going to start wrestling each other for that wicked mic all over my mixing board.\" \n\nBaxter barks out a laugh before biting his tongue, and Azure slaps her forehead, laughing and groaning at the same time. Aurora looks like she'd rather be somewhere else right now. Larry hesitates but then trudges back into the hallway with a stormy expression. \"[i]Cowardly[/i]?\" he retorts defensively, bitterly. \n\nHe jabs an angry, accusing finger at you. \"I'm standing up for myself and not letting that fucking poser destroy my band. It was supposed to be called [b]Involuntary Dirt Nap[/b] or [b]Funeral Humor[/b], not [i]${band}[/i], but no one ever asked me, did they? No one cared what I thought the second that idiot barged in here barfing into this ridiculous mic.\"\n\nHe says the name [i]${band}[/i] with such disgust and disdain dripping from his tone that various protests spring out from the rest of the band members. The name has clearly already taken on a sentimental quality in a short amount of time. Barty's eyebrows shoot up in amused surprise. \"You guys are making me nostalgic,\" he says to no one in particular, looking whimsically off into the distance. \n\n\"${name}, what exactly is going on?\" Baxter says, looking back and forth between you and Larry. \n\nEveryone is staring at you now, you realize. The air suddenly feels very warm and stale. The Necrophone grins evilly at you by Larry's side, shining yellow in the overhead light. Larry snorts derisively and moves towards the door again. No one protests this time. \n*if (tough_indulge)\n\tYour first thought is to run after him, to not let him through that door. \n*if (charisma_indulge)\n\tTime almost seems to slow down, yet you know you need to [i]think[/i] and [i]act[/i] before your future vanishes with Larry going through that doorway. \n*if (intelligence_indulge)\n\tYou feel much calmer than you thought you would, yet you know things could spiral out of control in an instant. \n*if (deception_indulge)\n\tYour mind fires on all cylinders as you decide what to do next: this is what you vigilantly prepared for all night. \n*choice\n\t*selectable_if (tough > 14) #Take the mic back by force (Requires 15 Tough) \n\t\t*goto tough_reclaim\n\t\t\n\t*selectable_if ((charisma > 14) and (attracted_males)) #Kiss him to distract him, then steal the mic back (Requires 15 Charisma) \n\t\t*goto charisma_reclaim\n\t\t\n\t#Allow him to embarrass himself using a mic that will only work for you (probably) \n\t\t*goto intelligence_reclaim\n\t\t\n\t*selectable_if (deception > 14) #Sneak away and pull a fire alarm so you can steal the Necrophone back in the resulting confusion (Requires 15 Deception) \n\t\t*goto deception_reclaim\n\t\t\n\t\t*label tough_reclaim \t\t\n\t\t*set tough_reclaim true \n\t\t*set intelligence +1 \n\t\t*set intimidating +1 \n\t\t*set tough +3\n\t\t(+3 Tough, +1 Intimidating, +1 Intelligence)\n\t\t*line_break \n\t\tThe last time Larry stole the mic, you were in no position to fight back after being drained of blood by Kanibor. Now, there's nothing stopping you from backing up your threats. \"Give me back my mic, or I'm going to break something, and then take it back,\" you demand coldly.\n\t\t\n\t\tLarry pivots to face you head on and spreads his arms wide, the Necrophone held lightly in his grasp. \"Come and take it then,\" he challenges, his tone low and mocking. \n\t\t\n\t\tProtests spring out from Azure and Aurora as you charge Larry, but their words are distant in your ears. To your surprise, Larry casually tosses the mic behind him, and it bounces and rolls across the carpet. Then he's rushing in to meet you, his clenched fists raised and his bloodshot eyes glinting with excitement. That's both chilling, and infuriating. The two of you collide in a flurry of fists. \n\t\t\n\t\tSome of his blows streak past your jaw or are absorbed by well-timed blocks, but one fist boxes you in the ear. \n\t\t*if (tough_indulge)\n\t\t\tYou hardly feel the punch, yet the force of the blow sends you reeling, struggling not to overbalance.\n\t\t*if (charisma_indulge)\n\t\t\tThe pain of the blow feels oddly distant, yet it seems to rattle your already spacey concentration. \n\t\t*if (intelligence_indulge)\n\t\t\tYou know you're going to feel that punch later, and the blow makes you stagger, dizzy.\n\t\t*if (deception_indulge)\n\t\t\tYour ear burns and throbs with pain, and you shake your head to get rid of the shrill whining in your ear. \n\t\tThen your knuckles connect with Larry's concave sternum, and the air deflates from him like a balloon. \n\n\t\tLarry staggers backward and collapses under your subsequent rain of blows. He falls flat onto his back, groaning, his complexion bloody. You leap onto him, pinning him down and continuing to pound his ribs and arms as he shields himself. He has finally curled himself into a grunting, cursing ball. Knuckles buzzing with pain, you get off of him, panting hard. The hallway is silent, and everyone is staring at you. \n\t\t\n\t\tAzure is backed up against the wall, her eyes wide with surprise, while Barty still wears a grin of disbelief. Aurora is staring at Larry, who is stirring gingerly, with a forced deadpan expression. Baxter lumbers over to you, his expression very serious as he hands you the Necrophone. He regards Larry coolly. \"Larry, I think it's safe to say that your crazy ass is fired.\"\n\t\t*goto signed \n\t\t\n\t\t*label charisma_reclaim\n\t\t*set charisma_reclaim true \n\t\t*set charisma +3 \n\t\t*set deception +1 \n\t\t*set mysterious +1\n\t\t*set larry +2\n\t\t(+3 Charisma, +1 Deception, +1 Mysterious)\n\t\t*line_break \n\t\tYour heart races and your stomach swoops as adrenaline pulses through you. You can't believe you're doing this, but desperate situations call for desperate measures. \"Fine, you win, Larry,\" you say lightly, waltzing over to him. \"But before you sing, can I just wish you good luck?\"\n\t\t\n\t\tLarry pauses inside the doorway again and rotates around to look at you, his expression amusingly, almost innocently befuddled. Then his gaze hardens consciously. \"How, by breaking a leg?\" he fires back acerbically. \"I'll pass. Besides, I obviously make my own luck.\"\n\t\t\n\t\tLarry tenses up and puffs out his chest as you don't reply and instead get into his personal bubble coyly. Yet his wide eyes betray his nervousness and interest. He smells like very skunky weed covered poorly with cheap man spray. He opens his mouth to say something and then shuts it again, scowling in puzzlement at you again. \"Really want to wish me luck?\" he finally says. \"How about you kiss my ass?\"\n\t\t\n\t\tYou smirk at this and step an inch closer so your lips are hovering by his, close enough for his beard to tickle you. You can feel his breath against your face, warm and stale with cannabis. His pupils are dilated. He licks his lips nervously, and you place a hand on his shoulder and kiss him full on the lips. Gasps from Azure, Tariano, and Aurora ring out, and Baxter dog whistles loudly. Larry's lips open, accepting yours as he stares back at you with wide eyes. \n\t\t\n\t\t*if (tough_indulge)\n\t\t\tHis lips are dry but plump, and for a second you forget what you were supposed to be doing. \n\t\t*if (charisma_indulge)\n\t\t\tTo your own surprise, an image of you and Larry passing weed smoke between your mouths in his car flashes in your mind. \n\t\t*if (intelligence_indulge)\n\t\t\tAlthough very dry, his lips are nice and plump, a detail you're trying to ignore. \n\t\t*if (deception_indulge)\n\t\t\tYou can't believe you thought of this idea all on your own, with no help from weed or alcohol, yet it seems to be working. \n\t\t\"I knew you had the hots for me,\" Larry mutters slyly, clearly very satisfied with himself.\n\t\t\t\n\t\tThen your fingers close around the Necrophone, and you're pulling it effortlessly from his grasp before he has even realized it. \"I meant, [i]good luck out there[/i],\" you say, smiling triumphantly as you waggle the mic at him, dancing backwards. \n\t\t\n\t\tAs he splutters and desperately grabs for the Necrophone, you lithely skip out of the way. Baxter suddenly stands in between the two of you, folding his muscular arms over his barrel chest. \"Okay, this has honestly gotten way too weird. Larry, I think I speak for everyone when I say that you're fired.\"\n\t\t*goto signed \n\t\t\n\t\t*label intelligence_reclaim\n\t\t*set intelligence_reclaim true \n\t\t*set intelligence +2 \n\t\t*set deception +1 \n\t\t*set mysterious +1 \n\t\t*set larry +1\n\t\t(+2 Intelligence, +1 Deception, +1 Mysterious)\n\t\t*line_break \n\t\tYour mind races, but you simply can't conjure any brilliant last minute solution to the pain that is Larry. Maybe, if Kanibor has more sense than self control, he will allow Larry to embarrass himself rather than turning him into a harsh singing phenomenon too. If not...well, all of Larry's skulduggery will have paid off for him.\n\n\t\tGrimly, you follow Larry and the band into the studio. You're so anxious that you can hardly appreciate the beautiful wooden room or the humongous, intricate mixing board. Soon enough, Larry is set up with the Necrophone in a recording booth. After warming up for a few minutes with wordless, gravelly snarls and growls, Larry begins to 'sing'.\n\t\t\n\t\t[b]Maladaptive coping mechanisms[/b]\n\t\t*line_break \n\t\t[b]Inside my brain is another organism[/b]\n\t\t*line_break \n\t\t[b]Mutilation of myself were the orders given[/b] \n\t\t*line_break \n\t\t[b]Flirt with death when life's not worth living[/b] \n\t\t\n\t\tHis death growl, while unmistakably a death growl, is almost nothing like yours. It's an old-school, raspy, mid-range snarl that's more decipherable, yet also creepier somehow. Evidently he expected a much lower register with the Necrophone's assistance, because he's clearly straining himself trying to compensate. His face is contorted into a glare of concentration, flushed red and lined with veins as he continues to sing. \n\t\t\n\t\t[b]I see her face in my dreams, so dead, so pretty[/b]\n\t\t*line_break \n\t\t[b]I must bring her back to the world of the living[/b] \n\t\t*line_break \n\t\t[b]So we can be together again and I can stop slowly[/b]\n\t\t*line_break\n\t\t[b]Dying[/b]\n\t\t\n\t\tOnly a few moments after he has finished, Larry stomps out of the recording booth, breathing hard with his face shiny with perspiration. He glares at you as though he wants to commit murder, and you can only return a discreet, knowing smirk. Self checkmate. \n\t\t*if (tough_indulge)\n\t\t\tUnable to bite your tongue, you say, \"So, if I was barfing into the mic, I suppose you would be shrieking into it like a gremlin. I'm not impressed.\"\n\t\t*if (charisma_indulge)\n\t\t\tYou smack your dry lips a few times. \"Just listening to that gave me dry mouth.\"\n\t\t*if (intelligence_indulge)\n\t\t\tYou can slowly feel your muscles relaxing again as you realize Larry has finally failed. \"Seems like this was all a little unnecessary,\" you say, trying to sound bored. \n\t\t*if (deception_indulge)\n\t\t\tYou finally feel as though you can relax your shoulders for the first time since Larry stole your mic. \"Well, you got what you wanted,\" you say bluntly. \n\t\t\n\t\tBaxter, almost seeming to pity Larry, shakes his head and sighs. \"Look, man,\" he says, rubbing the back of his neck with an uncomfortable expression. \"Those vocals were good, and hell, even a little lower register than at the audition, but nowhere near as brutal or mind blowing as ${name}'s. If you're really making this an ultimatum over who's the lead vocalist between you and ${name}, it's not even a contest. Sorry to break it to you, but you're fired.\"\n\t\t*goto signed \n\t\t\n\t\t*label deception_reclaim \n\t\t*set deception_reclaim true \n\t\t*set deception +3\n\t\t*set mysterious +1 \n\t\t*set intelligence +1 \n\t\t(+3 Deception, +1 Intelligence, +1 Mysterious)\n\t\t*line_break \n\t\tYou've tried everything else up until now, but Larry is proving to be as slippery as an eel. Muttering something about the bathroom, you casually walk away and then duck out of sight around the corner. Half-jogging, half tip-toeing across the carpeted hallway, you go to the nearest pull station. You hesitate for only a second out of nerves and probably a little bit of self preservation, and then grab the handle and pull. \n\t\t\n\t\tImmediately, an ear-splitting, repetitive fire alarm starts, filling the hallway with flashing lights. Doing your best to look innocent, you walk back to the VIP room, putting on a suitably puzzled expression. The band is being ushered impatiently back into the hallway by Barty, who looks positively bewildered. \"What the hell?\" he blurts out as he sprints down the hallway. \n\t\t\n\t\tLarry looks furious, while the others mill around looking confused or mildly amused. \"I don't smell any smoke,\" Larry says, sniffing aggressively at the air. \n\t\t\n\t\tSilently, while the others aren't paying attention, you slip into the studio. \n\t\t*if (tough_indulge)\n\t\t\tYou nearly trip over a cord in your haste, and stumble about very gracefully for a moment before regaining your bearings. \n\t\t*if (charisma_indulge)\n\t\t\tIn the background of your mind, you're fascinated by the state of the art recording hardware, and the enticing sheen around them, but you know you can't get distracted now. \n\t\t*if (intelligence_indulge)\n\t\t\tYou nearly stumble into a luxurious swivel chair as the immense, glowing mixing board catches your eye, but you dance around it and carry on with an exhale of relief. \n\t\t*if (deception_indulge)\n\t\t\tWith a fresh burst of adrenaline and resolve, you dart past the great mixing board without a second glance. \n\t\tHurrying to the recording booth, you're elated to see that the Necrophone is still plugged up. Stowing it away safely in your pocket, you quickly and discreetly return to the hallway. Upon seeing you, Larry blanches and runs back into the studio, pushing Azure and Baxter out of the way, making them yelp and stumble in surprise. \n\t\t\n\t\tJust when the fire alarm is really drilling into your skull, it finally shuts off. Azure breathes a sigh of relief and uncovers her ears. A few moments later, Barty appears, breathing hard and looking very irritated. \"Damn fire alarm keeps malfunctioning,\" he grumbles. \"Which is good, because I only wanted you to light my studio on fire metaphorically.\"\n\t\t\n\t\tLarry reappears again, panting hard and looking panicked. His eyes lock on the Necrophone as you take it out, and his mouth presses into a thin, angry line. \"Larry, I'm guessing you're about to get fired after I tell everyone what's been going on here,\" you say with an air of triumph. \n\t\t*goto signed \n\t\t\n*label signed \n*page_break ...\n\nYou're sitting on your couch in your little apartment, staring at the skull microphone on your coffee table. You finished recording your single with the band, a completely new and exhilarating experience. Barty was blown away by the track -face melted, in his words- but now you have an unknown amount of time to wait before knowing how your song will sell out in the wild. \n\nUnbearably tired, you slump further into your old couch, but your racing thoughts won't allow you to fully relax. Long shadows stretch and distort across the walls as the headlights from passing cars briefly illuminate your window. The sounds of a young couple having their regular screaming match drift through the door from across the hall. Being terminally lonely is better than that, you can't help but think.\n\nAbove your head, bassy hip hop music blasts from speakers, mixed with the sound of chatter and laughter. Your neighbors, who are friendly enough, seem to party once a week, but have never invited you. Not that you have particularly involved yourself. The clock on the wall ticks monotonously, showing it's past midnight. You feel like you're trapped in purgatory, waiting to know whether your life is over or if a grand new chapter has just begun. \"Aren't you going to say something?\" you finally say to the Kanibor. \n\nKanibor has been eerily silent since you rescued him from Larry's clutches. You're realizing just how little you really know about your secret partner. What kind of creature is he really? How much more blood must you provide him before he will be set free? Will he be dangerous to you then? And how will you continue your career without the Necrophone? \n\nThere are simply too many variables for you to figure out by yourself without someone else to bounce your ideas off of. The sounds of partying from upstairs are slowly dying down, and the shouting match across the hall seems to have ended in another stalemate as usual. Gradually, your eyelids become irresistibly heavy, and you feel yourself sinking further into the couch like a bicycle fusing with a growing tree. \n\n*page_break \n\nJust as you're drifting off, Kanibor speaks in that gurgling tone that seems to rattle your very bones like a tremendous clap of thunder. [b]\"For assisting me after I was taken by that bumbling buffoon Larry, I will reward you by answering one single question.\"[/b]\n\nYou jerk upright, heart racing, suddenly not feeling tired anymore. A dozen questions swirl through your mind like the contents of a blender. Heh. Bumbling buffoon. That's funny. [i]Assisting.[/i] That's even funnier. Rising from the couch, you pace around the room, trying to gather your muddled thoughts. You dare not speak yet, lest you waste your one precious question accidentally. \n\nSo, what do you really know about Kanibor? You know his origin is extraterrestrial, yet his powers are undoubtedly supernatural. The Necrophone, his vessel, or perhaps it's better described as a prison, can only be explained by some kind of magic, or else science advanced beyond your wildest imaginings. The entity inside your mic is as much a mystery to you now as when you saw him crash land in a meteorite a lifetime ago. \n\nThe Necrophone gleams at you from the coffee table, its dead eyes seeming to follow you as you pace. Coagulated blood has crusted up the mouthpiece, which leaks intermittently with your regurgitated blood. Your repeated efforts to clean it haven't been effective. Why is it so difficult for Kanibor to consume the blood he so desperately needs from you? \n\nFor the first time, it occurs to you that you might not be Kanibor's ideal prey. That makes you wonder if he prefers animals, or particular humans, like possibly your friends. Kanibor suddenly clears his throat impatiently, a cavernous, gurgling noise. What do you decide to ask him with your solitary question?\n*choice \n\t#Ask him what his weakness is\n\t\t*goto tough_reunited \n\t\t\n\t#Ask him how you can be certain he won't harm your friends \n\t\t*goto charisma_reunited \n\t\t\n\t#Ask him what he really is \n\t\t*goto intelligence_reunited \n\t\t\n\t#Ask him if there is anything you can do for him. You want to gain his loyalty \n\t\t*goto deception_reunited \n\t\t\n\t\t*label tough_reunited \n\t\t*set tough_reunited true \n\t\t*set tough +2\n\t\t*set intimidating +1 \n\t\t*set deception +1\n\t\t*set kanibor -1\n\t\t(+2 Tough, +1 Intimidating, +1 Deception, Kanibor Disapproves)\n\t\t*line_break \n\t\tWhen the predator inside that microphone finally comes out, you don't want to be completely helpless. Indicating by his monstrous voice and sharp fangs, he's bound to be a dangerous creature, whatever he is. \"What is your weakness?\" you say bluntly, trying to stifle any nerves. \n\t\t\n\t\tKanibor doesn't respond for a long time. Silence stretches on, broken only by the ticking of the clock and the occasional burst of laughter upstairs. You suddenly feel visceral contempt for the hideous microphone and have the urge to pick it up and bash it against the table. He thinks he can control you like a puppet and feed off you like a parasite for nothing in return?\n\n\t\tThen Kanibor speaks in a low, rumbling tone, almost a whisper. [b]\"As a very private creature, you wound me. I have to ask, what do you intend to do with such sensitive information?\"[/b] His tone becomes lower, airier, almost like a hiss. \"[i][b]Kill me[/b][/i]?\"\n\t\t\n\t\tHe promised to answer one question, and he isn't outright refusing. You stop pacing to tower over the mic, which grins fearlessly back at you. \"It's just a precaution. It might come in handy if you decide to kill me quickly rather than day by day. So far you've sucked my blood until you threw it up, but I'm still sitting in my apartment waiting to be evicted. Some bargain.\"\n\t\t\n\t\tAfter another laborious pause, Kanibor lets out a gruff, rattling sigh. [b]\"If you must be so cruel, I'll reveal to you that I despise water. You should be thankful I'm telling you that. I've already said enough.\"[/b]\n\t\t*goto car \n\t\t\n\t\t*label charisma_reunited \n\t\t*set charisma_reunited true \n\t\t*set charisma +2\n\t\t*set tough +1\n\t\t*set intimidating +1\n\t\t(+2 Charisma, +1 Tough, +1 Intimidating, Kanibor Approves)\n\t\t*line_break \n\t\tKanibor has already drained you of an unsettling amount of blood and left you with numerous scars, but there's no telling what will happen when you free him from the Necrophone. You can't risk him mauling or even killing one of your friends. Nothing, no amount of money or security is worth that. You stop pacing to stare at the mic. \"How can I trust you not to hurt my friends? You've already proven you have no self control.\"\n\t\t\n\t\tThere's a maddeningly long pause that doesn't make you feel any better. Finally, when almost a minute has crawled by, Kanibor utters bluntly, [b]\"I have no interest in your friends. Currently, I have exactly two interests: making you rich and famous, and becoming free again. The other humans are irrelevant to me.\"[/b]\n\t\t\n\t\tSomething about his dismissive, callous tone doesn't convince you. \"Will you promise me you won't do the same thing you've done to me to them, or worse? That you won't make me regret ever trying to get you out of that infernal thing?\" You half-sit, half-collapse onto your couch. \"How else can I go through with this?\"\n\t\t\n\t\tThere's another painfully long pause that grates at your nerves and makes your imagination run wild. Maybe it's useless trying to bargain over complex moral matters with a bloodthirsty predator, but you're not hopeless yet. \n\t\t\n\t\tKanibor finally sighs, almost sounding amused. [b]\"As a solitary creature, I admit, I don't fully understand your attachments. But be rest assured, I will honor your request if you honor our bargain and set me free.\"[/b]\n\t\t\n\t\tYour shoulders relax as you feel a great burden roll off of them. Yet something in the back of your mind makes you wonder if there was an implicit threat in his words. Would he go after them if you didn't let him out? \"We're both putting our fates in each other's hands like baby birds, Kanibor,\" you say gravely. \"Our only choice is to trust each other now.\"\n\t\t*goto car \n\t\t\n\t\t*label intelligence_reunited\n\t\t*set intelligence_reunited true \n\t\t*set intelligence +2\n\t\t*set charisma +1\n\t\t*set rebellious +1\n\t\t*set kanibor +1\n\t\t(+2 Intelligence, +1 Charisma, +1 Rebellious, Kanibor Approves)\n\t\t*line_break \n\t\tA question that has been burning in your mind ever since that meteorite nearly hit you leaps off your tongue. \"[i]What are you?\"[/i] \n\n\t\tTo your surprise, a gurgling, raspy chuckle emanates from the microphone. You scowl at it in confusion, wondering why you're being mocked for such a reasonable question. Kanibor is definitely smirking at you as he growls mysteriously, [b]\"An anomaly.\"[/b]\n\t\t\n\t\tYour scowl grows larger until the muscles on your face ache, and you have to massage your forehead and temples. \"Is this my reward for being your blood host? What kind of answer is that?\"\n\t\t\n\t\tKanibor is still chuckling quietly, but there's something sinister about his tone now. [b]\"Truthfully, human, I woke up for the first time inside of this microphone shortly before the meteorite crashed. Every scrap of knowledge I have, I can only conjure instinctively in order to get out of this soulless prison. I was born singularly to get out of this microphone. That's all I know.\"[/b]\n\t\t\n\t\tHis next words surprise you with their volume and vehemence. [b]\"So what are you? Why has a blood-sucking monster come from outer space to transform you into a heavy metal star? Why have I been ripped from oblivion, or jettisoned from a black hole to serve you as you bumble and complain about not being gifted fame and fortune with the wave of a magic wand? Maybe I'm cursed to rot away in here.\"[/b]\n\n\t\tYou can only stare, eyes wide and jaw agape. Then, without quite knowing why, you're saying, \"Sorry,\" at the same time as Kanibor rumbles, [b]\"Sorry.\"[/b]\n\t\t\n\t\tIt seems you and Kanibor both face existential dread. Somehow, even though you're even more confused than before, you feel as though you simultaneously understand him a little bit better. You think you're starting to understand yourself a little bit better too because of all of this shoving your problems into your face.\n\t\t*goto car \n\t\t\n\t\t*label deception_reunited \n\t\t*set deception_reunited true \n\t\t*set deception +2\n\t\t*set charisma +1\n\t\t*set chill +1 \n\t\t*set kanibor +3\n\t\t(+2 Deception, +1 Charisma, +1 Chill, Kanibor Approves)\n\t\t*line_break \n\t\tYou have to contain a smile as you formulate the words in your head, but nerves cause a shiver to travel up your spine. Kanibor won't be expecting this, you're certain of it. \"Is there anything I can do for you? You're trapped in that prison and you've had a hell of a time of it so far.\"\n\t\t\n\t\tThe Necrophone stares up at you silently with its dead eyes. As the seconds stretch on, counted by the ticking clock on the wall, you feel like something is going to happen, like a rubber band is being stretched until it will violently snap. Glumly, you resign yourself to the possibility that he will simply, cruelly ask for more blood.\n\t\t\n\t\tA strange, gurgling, popping noise coming from the microphone makes your eyes widen. After a few seconds, you realize that it almost sounds like purring. Kanibor's voice, although still guttural and gravelly, somehow has a hint of contentment, or perhaps even warmness to it that you've never heard before. \"[b]Make me a nest.[/b]\"\n\t\t\n\t\t...\n\t\t\n\t\tSeveral minutes later, you have prepared an unlikely makeshift nest for Kanibor. It consists of several blankets woven together in a conical construction that you recalled seeing mice or rabbits make with foliage and fur in fields. You situated it by the vent on the floor, creating a nice, toasty haven for the Necrophone.\n\t\t\n\t\tIt feels peculiar, almost creepy to perform such a delicate gesture for a bloody skull microphone, but the creature inside has only gurgle-purred even louder over time. It's a slightly disgusting, yet somehow endearing trait. Kanibor appears to have fallen fast asleep, but you hope that he will remember this when he wakes up. You sigh, saying to an empty apartment, \"I'm glad you're back, Kanibor. Now we can both rest soundly.\"\n\t\t*goto car \n\n*label car \n*page_break Days later...\n\nYou're wedged in between Aurora and Azure in the back seat of Baxter's van. You're on the way to your old workplace, Cost Slicer, to retrieve your car, but you can't help but feel uneasy. Even if your car is still there, you'll have to go through Effie to get it. And Larry still weighs heavily on your mind. \"[i]You're all dead to me,[/i]\" were his departing words after he was fired from ${band}.\n\nA combination of Larry trying to sabotage you and simply not being as good of a vocalist made it a rather straightforward decision for the other band members. \n*if (tough_reclaim) \n\tYour ear is still bruised from where Larry struck you, but your knuckles remember pummeling him too. Baxter seemed to have a newfound respect for you after witnessing that encounter, and the others were adamant that Larry was too much of a loose cannon to be allowed to remain in the band. \n*if (charisma_reclaim) \n\tYou still recall your kiss with Larry, and judging by the other band members' expressions, it's on their minds too. No doubt it was a bizarre spectacle for everyone, but they seemed to understand that if you had to go to those lengths just to get your mic back, Larry simply had to be shown the exit. \n*if (intelligence_reclaim) \n\tYou almost feel bad for Larry; he succeeded in pulling off his master plan despite all your efforts at sabotaging him, yet still ultimately failed anyway. You even have to admit that his vocals and lyrics were surprisingly impressive, but the decision to ax him was a unanimous one regardless. \n*if (deception_reclaim) \n\tIt wasn't difficult to implicate Larry, but he didn't do himself any favors by accusing you of pulling a file alarm to sabotage [i]him[/i]. Yet from the conspiratorial glint in Aurora's eyes, you got the idea that she, approvingly, suspected you of being the culprit there as well.\n\nIt still feels like a dream, recording with ${band} in Barty's studio, and officially being signed by Brain Rot Studios. Your single performed better than any of you could have imagined, selling over 100,000 copies in its first week. The studio was so eager to have ${band} aboard that they offered ${band} a three album record deal. \n\nYou have had to admit that Kanibor has garnered you your promised stardom after all. On top of a personal \n*if (barty > 50)\n\t180,000 \n*if (barty \u003c= 50) \n\t150,000\ncredit advance on the albums, your band also has the right to 10% royalties on your music sales and 90% of the revenue earned from live shows. Even split between several members, those earnings will be significant. Your gigantic advance is sitting nicely in your bank
