l +1 \n\t\t\t\t*if (hotel > 1)\n\t\t\t\t\t*set deception_azure_last true \n\t\t\t\t*set deception +2\n\t\t\t\t*set mysterious +1\n\t\t\t\t*set intelligence +1\n\t\t\t\t*set azure +1\n\t\t\t\t*set talk_azure +1\n\t\t\t\t(+2 Deception, +1 Mysterious, +1 Intelligence, Azure Approves)\n\t\t\t\t*line_break \n\t\t\t\tYou glance over curiously at Azure. You hope your question doesn't come off awkward, but you suspect she'll understand your curiosity, since she's a curious person herself. \"I've been meaning to ask,\" you begin. \"Why do you like to people watch so much?\"\n\t\t\t\t\n\t\t\t\tAzure blinks at you, looking surprised but not offended by the question. She hums and absentmindedly twirls a lock of hair in one finger, looking off into the distance thoughtfully. Eventually, she just shrugs and laughs. \"I honestly don't know. I guess I'm just fucking weird.\"\n\t\t\t\t\n\t\t\t\tYou laugh but give her a friendly nudge. \"Oh, come on. You can do better than that. Maybe it will give you a little more motivation if I tell you my current hypothesis is that you're an alien conducting research on human behavior.\"\n\t\t\t\t\n\t\t\t\tHer eyes light up and she grins, bobbing her head sarcastically. \"Oh, yeah. after all, I've got the perfect specimen right here.\"\n\t\t\t\t\n\t\t\t\tYou sigh, shaking your head ruefully with a wry smile on your lips. You're beginning to think you've embarassed Azure a smidgen, or perhaps you've simply given this a little more thought than she has. \"Oh, fine, keep your secrets then.\"\n\t\t\t\t*if (talk_azure \u003c 2)\n\t\t\t\t\t*goto talk_azure\n\t\t\t\t*goto sleep\n\t\t\n\t\t*label intelligence_hotel\n\t\t*set intelligence_hotel true \n\t\t*set intelligence +2 \n\t\t*set charisma +1 \n\t\t*set chill +1 \n\t\t*set tariano +1\n\t\t(+2 Intelligence, +1 Charisma, +1 Chill, Tariano Approves)\n\t\t*line_break \n\t\tWhen you tell Tariano you want to talk with him alone, he smiles and proposes that you talk on the balcony. The two of you go outside, and the balcony is so cramped that you barely fit. A mother possum with several babies clinging to her back waddles cautiously across the parking lot. \n\t\t\n\t\tTariano leans casually against the wall, seeming not nervous but not overly comfortable with the height of the balcony, which is three stories up. Gazing up at the sky dotted with silver stars, he lets out a big sigh. \"You know, I've often felt like I don't really belong on this planet, like I might be happier someplace else.\" He looks at you, making a mysterious sort of smile. \"Lately, I've felt different somehow.\"\n\t\t\n\t\tYou blink in surprise, remaining silent for a few seconds as you consider this. It's a terribly painful thing, being lonely, feeling like you don't belong anywhere. Finally, you say, \"I think living the lives that we envision for ourselves, instead of the lives dictated to us by others, makes everyday life not so pointless and difficult.\"\n\t\t\n\t\tTariano smiles a little and nods thoughtfully. You start to think about how your perspective on life has changed since that meteor struck the planet a few feet away from you. Your entire life is different, your prospects are unrecognizably different and more positive, and people you had never met before are now integral parts of your everyday life. There's so much to wrap your head around, and only so much time and brain power available. \n\t\t\n\t\tTariano, who appears similarly deep in thought, doesn't seem to mind your silence. Stuffing his hands into his hoodie pocket, he kicks some stray twigs on the floor, sending them tumbling off the balcony. \"So, what did you want to talk about, ${name}?\" he says. \"This is a good place to have a private conversation, but I do fear heights slightly.\"\n\t\t*label talk_tariano\n\t\t*if (talk_tariano > 0)\n\t\t\n\t\t\tWhat would you like to talk about with Tariano next?\n\t\t*choice \n\t\t\t*if (talk_tariano > 0)\n\t\t\t\t*selectable_if ((attracted_males) and (tariano > 59)) #Ask Tariano to be your boyfriend by telling him how you feel (Requires 60 Tariano)\n\t\t\t\t\t*goto intelligence_flirt_tariano\n\t\t\t\n\t\t\t*if (talk_tariano > 0)\n\t\t\t\t*selectable_if ((attracted_males) and (tariano > 59)) #Ask Tariano to be your boyfriend with a slow kiss (Requires 60 Tariano)\n\t\t\t\t\t*goto charisma_flirt_tariano\n\t\t\t\n\t\t\t*hide_reuse #Complain about Larry since Tariano is a good listener\n\t\t\t\t*goto tough_tariano\n\t\t\t\t\n\t\t\t*hide_reuse #Suggest that you smoke a blunt together\n\t\t\t\t*goto charisma_tariano\n\t\t\t\t\n\t\t\t*hide_reuse #Tell him you know he's dying of curiosity about Kanibor and you can indulge him\n\t\t\t\t*goto intelligence_tariano\n\t\t\t\t\n\t\t\t*hide_reuse #Ask about Tariano's other interests outside of music \n\t\t\t\t*goto deception_tariano \n\t\t\t\t\n\t\t\t\t*label intelligence_flirt_tariano\n\t\t\t\t*set intelligence_flirt_tariano true\n\t\t\t\t*set tariano_partner true \n\t\t\t\t*set intelligence +2\n\t\t\t\t*set charisma +1\n\t\t\t\t*set intimidating +1 \n\t\t\t\t*set tariano +3\n\t\t\t\t*set talk_tariano +1\n\t\t\t\t(+2 Intelligence, +1 Intimidating, +1 Charisma, Tariano Approves)\n\t\t\t\t*line_break \n\t\t\t\tYou take a deep breath, considering your words carefully. Yet something about Tariano makes you feel so comfortable, and you find yourself speaking before you fully realize it. \"Tariano, I just have to say that I'm so glad we somehow found each other. I've never met anyone like you. Will you be my boyfriend?\"\n\t\t\t\t\n\t\t\t\tTariano's face turns a shade darker, the color burning bright on his high cheekbones. At first, he turns away timidly, hiding behind his velvety curtain of hair, but then turns to catch your eyes with an almost fiercely determined gaze. \"Hell yes,\" he utters, a nervous smile on his lips, his breath heavy. He giggles. \"I mean, yes.\"\n\t\t\t\t\n\t\t\t\tYou tip your chin towards his, opening your lips in silent invitation. His slender fingers find yours, covered in callouses from his guitar playing but simultaneously as delicate as an elf's. Then your lips are pressing against his, your free fingers running through his curly locks. His lips, which are deliciously soft, are covered lightly in minty lip balm. \n\t\t\t\t\n\t\t\t\tYour kiss only lasts a few blissful seconds, but then you and Tariano hold one another there on the balcony, arms warmly wrapped around each other like pretzels, heads resting against the other's. Tariano inhales deeply and then exhales in a slow, contented sigh. \"I'm not going to let anything happen to you,\" he says suddenly. \"One thing you'll learn about me is I take care of my favorite people, and especially my favorite person.\"\n\t\t\t\t\n\t\t\t\tYour face burns despite yourself and your stomach does a swoop as though you were on a roller coaster. You really did nab someone special in this boy. Kissing him on the cheek, you tease, \"So, you're telling me you're clingy?\"\n\t\t\t\t\n\t\t\t\tHe giggles that adorable giggle. \"I can either be annoyingly clingy and want to spend 24/7 with you, or I can happily leave you be for hours at a time to hyper fixate on chess or space. I'm a pretty low maintenance boyfriend, but I do need [i]some[/i] attention or I will wither away like a little flower.\"\n\t\t\t\t\n\t\t\t\tYou laugh and kiss him again. \n\t\t\t\t*goto sleep \n\n\t\t\t\t*label charisma_flirt_tariano \n\t\t\t\t*set charisma_flirt_tariano true\n\t\t\t\t*set tariano_partner true \n\t\t\t\t*set charisma +2\n\t\t\t\t*set intelligence +1\n\t\t\t\t*set chill +1\n\t\t\t\t*set tariano +3\n\t\t\t\t*set talk_tariano +1\n\t\t\t\t(+2 Charisma, +1 Chill, +1 Intelligence, Tariano Approves)\n\t\t\t\t*line_break \n\t\t\t\tYou're certain Tariano likes you as much as you like him, but he's too shy to admit it in a timely fashion. You could tell him exactly how you feel yourself, but you're a little nervous too, and somehow simply kissing him seems easier. Leaning in closer, you part your lips and catch his warm eyes in a silent question. \n\t\t\t\t\n\t\t\t\tTariano's pupils dilate with attraction and his mouth opens in a little gasp of longing. You're not imagining it. Then your lips are meeting, your noses nuzzling gently against one another's, your hands exploring each other's backs and hair. He tastes like minty lip balm, kisses like he's in slow motion, trying to savor you. \n\t\t\t\t\n\t\t\t\tA little nip on your lower lip sends shivers down your spine. The two of you pause your kiss, holding each other close, warm breath on one another's faces. \"So, does this mean we're in a relationship together?\" he asks hopefully, his warm brown eyes boring into yours as he waits for your answer. \"I want to be serious with you.\"\n\t\t\t\t\n\t\t\t\tYou giggle uncontrollably and peck him happily on his cute nose. He can be so perceptive and intelligent at times, yet so oblivious at others. \"Yes, we're in a relationship together,\" you say. \"I was trying to make it obvious. Aren't I supposed to be the nervous one, being the new one of the group? You would have taken our band's whole three album contract cycle to ask me out.\"\n\t\t\t\t\n\t\t\t\tTariano blushes furiously at his and frowns stubbornly, shaking his head. \"No!\" he protests, almost whines. \"I would have asked you soon. Maybe on this balcony, if you hadn't first.\"\n\t\t\t\t\n\t\t\t\tHe's so serious that you burst into laughter again, causing him to roll his eyes and join in with you. \"You make it sound like I'm complaining. I could never complain about being your boyfriend! In fact, I'm probably going to annoy the others. Unintentionally. I'm not, like, weirdly into public displays of affection or anything.\" He clears his throat. \"No sarcasm intended, by the way.\"\n\t\t\t\t\n\t\t\t\tYou keep on laughing to his increasing confusion. You're going to have fun teasing his cute butt.\n\t\t\t\t*goto sleep \n\t\t\t\t\n\t\t\t\t*label tough_tariano\n\t\t\t\t*set tough_tariano true \n\t\t\t\t*set hotel +1 \n\t\t\t\t*if (hotel > 1)\n\t\t\t\t\t*set tough_tariano_last true \n\t\t\t\t*set tariano -1\n\t\t\t\t*set tough +2\n\t\t\t\t*set talk_tariano +1\n\t\t\t\t*set intimidating +1\n\t\t\t\t*set deception +1\n\t\t\t\t(+2 Tough, +1 Intimidating, +1 Deception, Tariano Disapproves)\n\t\t\t\t*line_break\n\t\t\t\tYou have barely been able to talk about Larry at all since the start of his vendetta. If you don't vent sooner or later, you feel like you might explode. Tariano says, \"You seem tense. Which is understandable. By the way you're balling your fists, I'm guessing you wanted to talk about our favorite person in the world, Larry.\"\n\t\t\t\t\n\t\t\t\tLooking down, you realize you were making fists absentmindedly. You laugh wryly and flash an appreciative smile. \"I guess I need to get something out of my system.\" You think for what exactly to say for a second, rolling your eyes and shaking your head at the absurdity of it all. \"And that something is, indeed, the cancerous Larry.\"  \n\t\t\t\t\n\t\t\t\tYou proceed to unload everything you've wanted to say about that lowlife for all these weeks but couldn't because of your own secrets. Tariano listens with tolerant nods or hums as you complain about Larry's cigarette smoke, his lack of boundaries that more than constitutes stalking, his obsessive jealousy, and his arrogant and obnoxious personality.\n\t\t\t\t\n\t\t\t\tBy the end of your rant, Tariano is looking very serious and shaking his head repeatedly. \"Honestly, he was a lot worse than even I imagined. But did you seriously bring me out here [i]just[/i] to talk my ear off about Larry?\" He shrugs. \"Not that I mind a little venting every now and again, but Baxter or Azure are probably better suited for this.\"\n\t\t\t\t\n\t\t\t\tFeeling a bit embarrassed, you apologize and suggest you change the subject to something a little more pleasant. Yet you can't help but silently feel like complaining for a few minutes about a human catastrophe following you around is more than warranted. \"Thanks,\" Tariano says. Then he smiles. \"Hey, maybe Larry's an alien. It would certainly explain a lot.\"\n\t\t\t\t\n\t\t\t\tYou both laugh, a spiteful, heartwarming sound. \n\t\t\t\t*if (talk_tariano \u003c 2)\n\t\t\t\t\t*goto talk_tariano\n\t\t\t\t*goto sleep \n\t\t\t\t\n\t\t\t\t*label charisma_tariano\n\t\t\t\t*set charisma_tariano true \n\t\t\t\t*set hotel +1 \n\t\t\t\t*if (hotel > 1)\n\t\t\t\t\t*set charisma_tariano_last true \n\t\t\t\t*set charisma +2\n\t\t\t\t*set intelligence +1\n\t\t\t\t*set rebellious +1\n\t\t\t\t*set talk_tariano +1\n\t\t\t\t*set tariano +1\n\t\t\t\t(+2 Charisma, +1 Rebellious, +1 Intelligence, Tariano Approves)\n\t\t\t\t*line_break \n\t\t\t\tWhen you suggest that you smoke a blunt, Tariano nods eagerly and excuses himself inside. He quickly returns to the balcony with a lighter and a fat blunt courtesy of Azure. He takes a drag until ashes fall off the tip and then offers it to you, exhaling a billowing cloud of citrus, gassy smoke overhead. \"I just realized we'll never have to run out of weed again,\" he says with a satisfied sigh.\n\n\t\t\t\tYou were already mid-hit, and have to suppress a chuckle to avoid hacking your lungs out. You have to admit, with the fruity taste on your lips, the cannabis traveling through your body like a healing summer rain, that is a comforting thought. \"Or worry about transportation, housing, or basic necessities,\" you say, taking another drag.\n\t\t\t\t\n\t\t\t\tTariano looks at you closely as you return the burning blunt to him. The two of you pass it back and forth for a few minutes, briefly creating aromatic hazes that are, fortunately for legality purposes, swept away with the wind. When the weed is gone, you feel unusually optimistic and like you're floating, and Tariano has a funny smile plastered to his face.\n\t\t\t\t\n\t\t\t\tHe inhales deeply and then exhales in a slow, satisfied sigh. Then he gives you a friendly look. \"You know, before my dad became a successful painter, we were always broke. I remember my early childhood being pretty bleak.\" He shrugs. \"I guess I'm just saying that I know how it is. The good news is we finally escaped from all that, through our own hard work and gumption to boot.\"\n\t\t\t\t\n\t\t\t\tYou ask if his father is some famous artist you didn't know about, but Tariano laughs and explains that he's a residential and commercial painter, like the people who climb ladders with paint brushes and white overalls. Maybe everything feels so peaceful when you're high, but you think the present company has a little something to do with it. \n\t\t\t\t*if (talk_tariano \u003c 2)\n\t\t\t\t\t*goto talk_tariano\n\t\t\t\t*goto sleep \n\t\t\t\t\n\t\t\t\t*label intelligence_tariano \n\t\t\t\t*set intelligence_tariano true \n\t\t\t\t*set hotel +1\n\t\t\t\t*if (hotel > 1)\n\t\t\t\t\t*set intelligence_tariano_last true \n\t\t\t\t*set intelligence +2\n\t\t\t\t*set tough +1\n\t\t\t\t*set intimidating +1\n\t\t\t\t*set tariano +1\n\t\t\t\t*set talk_tariano +1\n\t\t\t\t(+2 Intelligence, +1 Tough, +1 Intimidating, Tariano Approves)\n\t\t\t\t*line_break \n\t\t\t\tAlthough you aren't exactly thrilled to recount your macabre and bizarre experiences, you understand that anyone, especially someone as inquisitive as Tariano, would be itching with curiosity about them. When you offer to answer a few questions about Kanibor, Tariano's eyes widen like satellite dishes. \"Wait, seriously? I thought you might not feel like jogging those memories.\"\n\n\t\t\t\tYou're mildly nonplussed as Tariano nevertheless procures a pocket spiral notebook and pen, rifling excitedly through the pages. You can't help but laugh when he looks up, a question already on his lips. \"What?\" he asks a little bashfully, shrugging. \"I was just going to ask about Kanibor's active and resting patterns.\"\n\t\t\t\t\n\t\t\t\tYou shake your head, still chuckling. His curios mind really is endearing. You explain to Tariano in a more serious tone that Kanibor was not very active inside the Necrophone aside from the rare dialogue or, more commonly, when it was time to feed. \"Lethargic or dormant unless feeding,\" Tariano mutters as he scribbles into his notebook. \n\t\t\t\t\n\t\t\t\tNext, he asks you how Kanibor reacted to feeding, which you don't find so amusing. You solemnly tell him that he would struggle with digesting your blood, regularly regurgitating it. He would become almost deliriously happy briefly after eating but would later grow irritable and uncomfortable. \"Regularly rejects sustenance,\" Tariano mutters, scribbling. \n\t\t\t\t\n\t\t\t\tYou're getting a sinking feeling in your stomach that's difficult to place. Tariano finishes writing and looks up at you, concern etched onto his furrowed brow. \"${name}, I'm no biology expert or anything, but I think Kanibor is dying. I think, maybe, he was always dying.\" He winces. \"Or, you know, badly, chronically sick.\"\n\t\t\t\t\n\t\t\t\tYour heart is beating fast, your mind is racing like blurs of color in a train window, but all you can think of to say is, \"Oh.\"\n\t\t\t\t*if (talk_tariano \u003c 2)\n\t\t\t\t\t*goto talk_tariano\n\t\t\t\t*goto sleep \n\t\t\t\t\n\t\t\t\t*label deception_tariano\n\t\t\t\t*set deception_tariano true \n\t\t\t\t*set hotel +1\n\t\t\t\t*if (hotel > 1)\n\t\t\t\t\t*set deception_tariano_last true \n\t\t\t\t*set deception +2\n\t\t\t\t*set mysterious +1\n\t\t\t\t*set intelligence +1\n\t\t\t\t*set tariano +2\n\t\t\t\t*set talk_tariano +1\n\t\t\t\t(+2 Deception, +1 Mysterious, +1 Intelligence, Tariano Approves)\n\t\t\t\t*line_break \n\t\t\t\tTariano has always struck you as a very unique and interesting individual, and you want to know more about him. When you ask him to tell you about his interests and hobbies, he seems surprised, but his eyes light up with a bright, youthful sort of eagerness. You get the impression others don't often indulge him, but you're happy to. \n\t\t\t\t\n\t\t\t\tHe starts off talking almost shyly at first, but grows more comfortable when you nod and hum here and there in interest. He tells you about his love and fascination of chess; its  practically infinite complexity,  its intense competition, and even its extensive and rich culture. \"We should play a game on your magnetic set. Or are you too nervous?\" you joke, knowing full well he would likely throttle you but left his board on the tour bus.\n\t\t\t\t\n\t\t\t\tTariano laughs and tries to stutter an explanation, but you're already asking to hear about something else. He tells you about his love of space, and especially of the history of your own humble planet. He gushes about the mind boggling planetary history involving the first inklings of life, the completely alien conditions, and several mass extinctions that life still overcame to become something entirely new. \n\t\t\t\t\n\t\t\t\t\"Let's watch a space documentary together sometime,\" you say eagerly. His passion is infectious, and you find yourself wanting to see these things for yourself, and more importantly, to spend more time with Tariano. Then, a hint of irony in your tone, \"Ever seen any on asteroid belts?\"\n\t\t\t\t\n\t\t\t\tTariano giggles. \"I've personally watched a couple. Asteroids are some of space's most fascinating bodies. They can contain elements from halfway across the universe, and some even have pockets of ice.\" He sighs, suddenly looking almost melancholy. \"I didn't really have friends in school. But I think we would have been friends if we somehow knew each other back then.\"\n\t\t\t\t\n\t\t\t\tThere's a pang in your chest. You smile. \"Yeah, me too.\"\n\t\t\t\t*if (talk_tariano \u003c 2)\n\t\t\t\t\t*goto talk_tariano\n\t\t\t\t*goto sleep\n\t\t\n\t\t*label deception_hotel \n\t\t*set deception_hotel true \n\t\t*set deception +2\n\t\t*set intelligence +1 \n\t\t*set mysterious +1 \n\t\t*set aurora +1\n\t\t(+2 Deception, +1 Intelligence, +1 Mysterious, Aurora Approves)\n\t\t*line_break \n\t\tWhen you ask Aurora if you can speak with her privately, she wiggles her eyebrows in a conspiratorial way and motions to the balcony. The two of you go outside together, standing close with the very limited space. An empty alcohol bottle, propelled by a cold breeze, clinks and clanks its way across the parking lot. \n\t\t\n\t\tAurora lifts her long, slender arms above her head, interlacing her fingers. She closes her eyes and groans softly as she stretches. \"This has been the adventure of a lifetime, huh?\" she says with a big sigh, letting her arms plop down against her sides. \"I think we'll remember these days for the rest of our lives.\"\n\t\t\n\t\tYou immediately suspect that she's right. It feels like these last few weeks separate your old life and your current one in two distinct sections that are now drifting apart like icebergs in a warming climate. \"There are some things I'd rather forget,\" you say, recalling your intense fights with Larry and your struggles with Kanibor. Your eyes land on her. \"And others I'd prefer to remember. But I don't think I could ever really forget any of it.\"\n\t\t\n\t\tAurora nods understandingly and gives you a couple supportive pats on the back. Silence falls over the balcony, but it isn't an awkward silence. Aurora bounces on her toes absentmindedly, looking into the distance with a thoughtful expression on her face. You wonder what she's thinking about, but she mostly looks exhausted, with heavy bags under her eyes. You realize she's probably running on fumes after performing the concert and then taking care of you. \n\t\t\n\t\tNot for the first time, you're reminded of how fortunate you are to have someone as loyal as Aurora as a friend. She glances at you curiously. \"So, what did you want to talk about, ${name}? The fresh air is nice and all but I assumed you had something in mind when you dragged me out here all alone. Or are you waiting for a good opportunity to push me off the balcony?\"\n\n\t\tYou chuckle nervously and shake your head. \"No, nothing like that.\"\n\t\t*label talk_aurora\n\t\t*if (talk_aurora > 0)\n\t\t\n\t\t\tWhat would you like to talk about with Aurora next?\n\t\t*choice \n\t\t\t*if (talk_aurora > 0)\n\t\t\t\t*selectable_if ((attracted_females) and (aurora > 59)) #Boldly tell Aurora how you feel about her and ask her to be your girlfriend (Requires 60 Aurora)\n\t\t\t\t\t*goto intelligence_flirt_aurora\n\t\t\t\t\n\t\t\t*if (talk_aurora > 0)\n\t\t\t\t*selectable_if ((attracted_females) and (aurora > 59)) #Casually ask Aurora to be your girlfriend (Requires 60 Aurora)\n\t\t\t\t\t*goto deception_flirt_aurora\n\t\t\t\n\t\t\t*hide_reuse *selectable_if (aurora > 54) #Ask Aurora why she will usually only drink at home (Requires 55 Aurora)\n\t\t\t\t*goto tough_aurora\n\t\t\t\t\n\t\t\t*hide_reuse #Ask Aurora about her pet cats \n\t\t\t\t*goto charisma_aurora\n\t\t\t\t\n\t\t\t*hide_reuse #Ask Aurora about her ghost cat tattoo\n\t\t\t\t*goto intelligence_aurora\n\t\t\t\t\n\t\t\t*hide_reuse #Ask Aurora what she ever saw in a creep like Larry and subtly dig for more info on him\n\t\t\t\t*goto deception_aurora\n\t\t\t\t\n\t\t\t\t*label deception_flirt_aurora\n\t\t\t\t*set deception_flirt_aurora true   \n\t\t\t\t*set aurora_partner true \n\t\t\t\t*set deception +2\n\t\t\t\t*set mysterious +1\n\t\t\t\t*set intelligence +1 \n\t\t\t\t*set aurora +3\n\t\t\t\t*set talk_aurora +1\n\t\t\t\t(+2 Deception, +1 Intelligence, +1 Mysterious, Aurora Approves)\n\t\t\t\t*line_break \n\t\t\t\tSomething about making a bold declaration of your feelings to Aurora doesn't seem quite right, and the idea makes you nervous. Trying to think of something more subtle, but not wanting to let this moment slip away, you venture, \"I've been wondering something. Why aren't we dating yet?\"\n\t\t\t\t\n\t\t\t\tYour intrusive thoughts convince you for a second that she's going to burst out into hysterical laughter. Then, to your abject horror, she actually does start laughing. She leans onto the railing, slapping the wood with her palms. Then her nose is suddenly against yours, her eyes shining with mirth, and, is that lust? \"That's a really good question.\"\n\t\t\t\t\n\t\t\t\tYour faces are nuzzled so closely together that you can feel her long eyelashes fluttering against yours. Your heart is fluttering a little too. Either that's Aurora tugging at your heartstrings, or you may have a medical condition like heart palpitations or perhaps early signs of a premature stress induced heart attack. \"Then I guess it's official,\" you breath. \n\t\t\t\t\n\t\t\t\tHer warm breath washes over your lips, and then you're kissing. She tastes alluringly of cherry, and there's a definite spice to her as she kisses you hard and even nibbles on your lower lip. You break away in mild surprise, chuckling breathlessly. \"Too much?\" she says, giving you simultaneously guilty and feisty eyes. \n\t\t\t\t\n\t\t\t\tYou shake your head that it's not, and you share another lovely kiss. You feel a mutual longing there, almost a hunger as you embrace. You have longed for companionship, and Aurora has similarly longed to be seen by a companion, not looked through or simply existed around like a ghost. \"I highly doubt you'll ever be too much for me,\" you finally say. \n\t\t\t\t*goto sleep \n\n\t\t\t\t*label intelligence_flirt_aurora \n\t\t\t\t*set intelligence_flirt_aurora true \n\t\t\t\t*set aurora_partner true \n\t\t\t\t*set intelligence +2\n\t\t\t\t*set charisma +1\n\t\t\t\t*set chill +1\n\t\t\t\t*set aurora +3\n\t\t\t\t*set talk_aurora +1\n\t\t\t\t(+2 Intelligence, +1 Charisma, +1 Chill, Aurora Approves)\n\t\t\t\t*line_break \n\t\t\t\tThere's no sense in tap dancing around the issue. For one thing, you and Aurora have excellent chemistry. For another, she probably wouldn't find that very attractive. You take a deep breath and then look her directly in the eyes. \"Aurora, I really like you. The reason I brought you out here was to ask you to be my girlfriend.\"\n\t\t\t\t\n\t\t\t\tAurora looks like a deer in front of headlights for a second, and you're suddenly worried you've managed to traumatize her. Then her face turns pink and she looks away, biting onto her lower lip. She ventures a glance your way, looking adorably shy. \"That's honestly really romantic. Yes, I'll be your girlfriend.\"\n\n\t\t\t\tShe leans in to kiss you, her little bow lips covered in black lipstick opening for you. Feeling drawn to her as though by a tractor beam, you touch her waist, encouraging her closer until your lips are softly mashing together. Her lipstick tastes deliciously of cherry, and when she nibbles on your lower lip, you shiver and gasp. \n\t\t\t\t\n\t\t\t\tAurora gently breaks away from the kiss with a warm hand on your chest, a breathless, merry giggle on her lips. She grips you with her deceptively powerful hands, sort of running in place like she has ants in her pants with excitement. \"I'm so fucking happy,\" she squeaks. \"Sorry, I'm probably embarrassing myself already.\"\n\t\t\t\t\n\t\t\t\tTo the contrary, you find her excitement cute and infectious. You kiss her again, a little harder this time, and she flings an arm around your neck, playing with your hair. You can't help but feel like the two of you may be escaping your pasts together. Soon, your old dreary life and her toxic ex may be in the rear view mirror. \"Embarrassed?\" you protest. \"I thought you would be embarrassed of me.\"\n\t\t\t\t\n\t\t\t\tShe repeatedly jabs you in the stomach and sides with her pointer fingers with a playful frown on her face, making you laugh and wiggle away. Yes, there is definitely chemistry. \n\t\t\t\t*goto sleep \n\t\t\t\t\n\t\t\t\t*label tough_aurora\n\t\t\t\t*set tough_aurora true \n\t\t\t\t*set hotel +1\n\t\t\t\t*if (hotel > 1)\n\t\t\t\t\t*set tough_aurora_last true \n\t\t\t\t*set aurora +2\n\t\t\t\t*set tough +2\n\t\t\t\t*set intelligence +1\n\t\t\t\t*set chill +1\n\t\t\t\t*set talk_aurora +1\n\t\t\t\t(+2 Tough, +1 Intelligence, +1 Chill, Aurora Approves)\n\t\t\t\t*line_break\n\t\t\t\tYou have a distinct feeling it's a private and potentially sensitive topic you're going to broach here. You should consider your words carefully, yet you are burning to know more for some reason. Maybe it's because you care about her. \"Aurora, can I ask you why you prefer to drink only at home, or in our tour bus with us?\" you venture. \"It's alright if you want to tell me to shut up.\"\n\t\t\t\t\n\t\t\t\tAurora looks sharply at you, her eyes wide in surprise. You're momentarily worried you've managed to make her angry, but you're equally as surprised when the words tumble out of her lips very plainly. \"Oh, one time I was at this high school house party with some friends and someone spiked my drink with a date rape drug. I was halfway into some guy's trunk before my friends found me and rescued me.\"\n\t\t\t\t\n\t\t\t\tYou must have a mortified expression on your face because Aurora smiles tolerantly and pushes you playfully on the arm. Though something in her expression tells you she appreciates your concern. \"Oh, I'm alright. \n\t\t\t\t\n\t\t\t\t\"That was ages ago, and besides, the idiot actually got arrested a couple days later. My friends got his license plate. But ever since then, I decided I would only ever get drunk around people I really trusted.\" She hums in realization. \"You know, the only other person I've told that is Azure. I haven't even told Tariano or Baxter.\"\n\t\t\t\t\n\t\t\t\t\"I totally understand now,\" you say, shaking your head ruefully. You simultaneously feel disturbed for Aurora, proud of her bravery, and honored that she would indulge such private information to you. \"Thanks for telling me. I hope I didn't stir up any unpleasant memories.\"\n\n\t\t\t\tShe gives you a curious expression, wearing a small, sad sort of smile. \"It's always painful to think about, but honestly, I feel a little better, having finally told another soul.\"\n\t\t\t\t*if (talk_aurora \u003c 2)\n\t\t\t\t\t*goto talk_aurora\n\t\t\t\t*goto sleep \n\t\t\t\t\n\t\t\t\t*label charisma_aurora\n\t\t\t\t*set charisma_aurora true \n\t\t\t\t*set hotel +1\n\t\t\t\t*if (hotel > 1)\n\t\t\t\t\t*set charisma_aurora_last true \n\t\t\t\t*set charisma +2\n\t\t\t\t*set chill +1\n\t\t\t\t*set intelligence +1\n\t\t\t\t*set aurora +1\n\t\t\t\t*set talk_aurora +1\n\t\t\t\t(+2 Charisma, +1 Chill, +1 Intelligence, Aurora Approves)\n\t\t\t\t*line_break \n\t\t\t\tYou recall Aurora talking about spoiling her pet cats with her signing money, and ask her about them. Her face shines like a beacon at their mention, and she quickly produces an envelope full of polaroid pictures from her backpack. \"I miss those dorks every second,\" she says emotionally. \"I almost wanted to take them with me in some carriers but I knew it was basically impossible.\"\n\t\t\t\t\n\t\t\t\tAurora shows you several pictures of her cats lounging on fuzzy cat beds, sunbathing in front of windows, cuddling one another, playing with extravagant toys on cat towers, or sitting like majestic gargoyles on couch armrests. She points each of them out for you. \"Toast, the brown boy, loves to vocalize and head bonk. Ping Pong, the swirly white and tan boy, has one brain cell.\" \n\t\t\t\t\n\t\t\t\tYou laugh, and she grins brightly, continuing, \"Caramel, the tubby orange boy, has two brain cells. Lilly Pad, the black long hair girl, is a senior and she loves solar charging and tummy rubs. Obelisk, the long black girl, loves to cuddle and supervise all human tasks. Basilisk, the fuzzy black girl, likes to play fetch and sometimes be a bully to Caramel if she hasn't played enough of said fetch.\" \n\t\t\t\t\n\t\t\t\tJust by the way Aurora talks about her cats, and from those few photos, you can tell how much she cherishes them and pampers and enriches them. It makes your heart long for your own childhood pets and future pets alike, and gives you a whole nother level of appreciation for Aurora as a person. \"I would love to meet them all sometime,\" you say. Then, \"I can't believe you really have six cats.\"\n\t\t\t\t\n\t\t\t\tIt takes you a moment to realize Aurora has tears misting her eyes. You realize how much she must be sacrificing going on tour. You thank her for sharing about her fuzzy family with you. She cheers up immediately when you ask her to tell you about all the new beds, towers, toys, and treats she got for them. \n\t\t\t\t*if (talk_aurora \u003c 2)\n\t\t\t\t\t*goto talk_aurora\n\t\t\t\t*goto sleep \n\t\t\t\t\n\t\t\t\t*label intelligence_aurora \n\t\t\t\t*set intelligence_aurora true \n\t\t\t\t*set hotel +1\n\t\t\t\t*if (hotel > 1)\n\t\t\t\t\t*set intelligence_aurora_last true \n\t\t\t\t*set intelligence +2\n\t\t\t\t*set chill +1\n\t\t\t\t*set charisma +1\n\t\t\t\t*set aurora +1\n\t\t\t\t*set talk_aurora +1\n\t\t\t\t(+2 Intelligence, +1 Charisma, +1 Chill, Aurora Approves)\n\t\t\t\t*line_break \n\t\t\t\tYou noticed Aurora's unique ghost cat tattoo when you first met her, but haven't had a chance to ask her about it. You wonder if it's for one of her pets who passed. \"I like the cat tattoo on your side,\" you say, trying not to sound too random. \"What does it mean to you?\" \n\t\t\t\t\n\t\t\t\tAurora smiles sadly, reaching up to touch the spot on her ribs where her tattoo is beneath her sweater and jacket. \"Random, but thanks. It's for my grandma's cat, Nutmeg, who I loved visiting when I was little.\" She sighs deeply. \"I got a ball of string for her to play with like in the cartoons. She loved it. Only, she swallowed some and it sliced up her insides like ribbons.\"\n\t\t\t\t\n\t\t\t\tYour expression must be horrified, because Aurora nods grimly. \"Strings can knot around the intestines and cut into them as they squeeze tighter. Poor Nutmeg never stood a chance even with emergency surgery.\" She gestures to where her tattoo is. \"I got this tattoo on my ribs to make it hurt extra bad  and remind me to never let anything like that happen again.\" She blinks and then winces guiltily. \"Are you sorry you asked yet?\"\n\t\t\t\t\n\t\t\t\tYour eyes are still wide, but you shake your head. \"No, thanks for telling me,\" you say. \"I'm really sorry you lost your cat like that. But you shouldn't let the guilt eat you up inside like that for all this time, Aurora. You were only what, five or six years old? It wasn't your fault.\"\n\n\t\t\t\tAurora's expression becomes very serious. She shrugs and looks away without reply, but after a moment, you think you detect a smile creeping up on the corner of her lips. She sighs deeply and then gives you a little squeeze on the shoulder. \"Thanks, ${name}. I tend to beat myself up a lot in general. But maybe you're right. I was just a dumb kid who didn't know anything.\"\n\t\t\t\t*if (talk_aurora \u003c 2)\n\t\t\t\t\t*goto talk_aurora\n\t\t\t\t*goto sleep \n\t\t\t\t\n\t\t\t\t*label deception_aurora\n\t\t\t\t*set deception_aurora true \n\t\t\t\t*set hotel +1\n\t\t\t\t*if (hotel > 1)\n\t\t\t\t\t*set deception_aurora_last true \n\t\t\t\t*set deception +2\n\t\t\t\t*set intelligence +1\n\t\t\t\t*set rebellious +1\n\t\t\t\t*set aurora -1 \n\t\t\t\t*set talk_aurora +1\n\t\t\t\t(+2 Deception, +1 Rebellious, +1 Intelligence, Aurora Disapproves)\n\t\t\t\t*line_break \n\t\t\t\tThere's been a question that's been nagging at you ever since Aurora revealed that she dated Larry. Trying to approach the subject delicately, you say, \"I've been meaning to ask, what did you see in Larry to begin with? Not trying to be awkward, it's just that he's like a parasite that won't go away. Like a tick that can regenerate heads.\"\n\t\t\t\t\n\t\t\t\tAurora lets out a beleaguered sigh. \"You know what, ${name}? I've asked that question I few times myself.\" She shrugs and scoffs. \"At the beginning, I found him kinda cute. He could be really funny, he had a sweet taste in music, and he just did his own thing. I just never felt like he really cared about me. That's not a good feeling, and I don't like wasting any time on dead ends in my life.\"\n\t\t\t\t\n\t\t\t\tYou nod understandingly. A few seconds pass by, punctuated by a car alarm going off before being shut off again after several shrill honks. When you ask Aurora if Larry ever did anything that suggested he could be violent, she frowns in thought. \"There was this one time,\" she begins finally. \n\t\t\t\t\n\t\t\t\t\"We were just out going to get some lunch at a fast food restaurant or something. Larry was driving, and some idiot cut us off without using a turn signal. Larry went apoplectic, hitting the steering wheel and riding the guy's bumper for miles. He even said he had a gun under his seat with one bullet loaded and wanted to shoot the guy. I thought he was just road raging, and I never saw any gun. But ${name}, it was freaky. And now, I'm not so sure.\"\n\t\t\t\t\n\t\t\t\tSeeming a little frustrated, Aurora asks to change the subject, and you oblige. Yet as the two of you start talking about the car alarm in the parking lot going off a second time, your mind wanders. The thought of a very disturbed, enraged Larry with a deadly weapon is a harrowing one. You'd better keep your guard up. \n\t\t\t\t*if (talk_aurora \u003c 2)\n\t\t\t\t\t*goto talk_aurora\n\t\t\t\t*goto sleep\n\t\t\t\t\n\t\t*label general_hotel \n\t\t*set general_hotel true \n\t\t*set baxter +1\n\t\t*set azure +1 \n\t\t*set tariano +1\n\t\t*set aurora +1\n\t\t*set charisma +2\n\t\t*set chill +1\n\t\t*set intelligence +1\n\t\t(+2 Charisma, +1 Chill, +1 Intelligence, Baxter Approves, Azure Approves, Tariano Approves, Aurora Approves)\n\t\t*line_break\n\t\tWhen you decide that you're up to hanging out with the whole group, everyone looks pleased. It's obvious the band is one group of best friends, and you feel as though you're gradually becoming one of them in more ways than just being a mutual member of ${band}. Unbeknownst to Larry, he has been pushing you and the band closer instead of driving you apart with all of his schemes. \n\t\t\n\t\tEveryone has a different suggestion for what to do. They bicker playfully with each other over whose idea is best, although you should have time for multiple options. Baxter suggests that you rent a classic horror movie to distract yourselves from reality for an hour or two with some good scares. \"Obviously, not a monster horror.\" \n\t\t\n\t\tAzure suggests that you've all already starred in your own horror movie, and should instead enjoy and reward yourselves with the entire room service dessert menu. \"What's the point of having all this money if we don't splurge every once in a while?\" she argues. \"Besides, all this stress has to be passively burning energy and we can recharge with calories and sugar.\"\n\n\t\tTariano recommends watching a new documentary about deep sea life that he has been interested in. \"They're some of the most mind boggling, unique, alien creatures on the planet,\" he says eagerly. \"Much weirder and more interesting than any science fiction or mythical creatures, if you ask my opinion.\"\n\t\t\n\t\tAurora jibes that you've seen enough deep sea creatures like Effie and Larry lately. Then she procures a small black box with a dramatic flourish. She says there's a spirit board inside and dares all of you to use it with her. Azure shivers and shakes her head suspiciously at the black box. \"No one else has ever been brave enough to use a spirit board with me, but I figure you bad asses might!\" Aurora says with a hopeful shrug. \n\t\t\n\t\tWhat would you like to do with the group first? \n\t\t*label group\n\t\t*if (group > 0)\n\t\t\n\t\t\tWhat would you like to do with the group next?\n\t\t*choice \n\t\t\t*hide_reuse #Watch a classic horror movie\n\t\t\t\t*goto tough_group \n\t\t\t\n\t\t\t*hide_reuse #Try out several desserts on the room service menu\n\t\t\t\t*goto charisma_group\n\t\t\t\n\t\t\t*hide_reuse #Watch a deep sea documentary \n\t\t\t\t*goto intelligence_group \n\t\t\t\t\n\t\t\t*hide_reuse #Experiment with Aurora's spirit board \n\t\t\t\t*goto deception_group \n\t\t\t\t\n\t\t\t\t*label tough_group\n\t\t\t\t*set tough_group true \n\t\t\t\t*set hotel +1\n\t\t\t\t*if (hotel > 1)\n\t\t\t\t\t*set tough_group_last true \n\t\t\t\t*set group +1 \n\t\t\t\t*set tough +2\n\t\t\t\t*set intimidating +1\n\t\t\t\t*set deception +1 \n\t\t\t\t*set baxter +2\n\t\t\t\t*set aurora +1\n\t\t\t\t(+2 Tough, +1 Intimidating, +1 Deception, Baxter Approves, Aurora Approves)\n\t\t\t\t*line_break \n\t\t\t\tA horror movie sounds like a perfect distraction. Besides, how scary can it be after everything you've experienced in real life? When you make your decision, Baxter rubs his hands together, grinning evilly. As he runs to the bus, presumably to get the movie disc, Azure orders drinks and snacks from room service.\n\t\t\t\t\n\t\t\t\tBaxter returns with the disc, and soon enough the room is dark except for the glowing light of the television. The movie, Dummy Doll, portrays a high school boy finding a cursed dummy doll buried in his backyard and using it to get revenge on his hated bully. \"If only I had a dummy doll in school,\" Tariano muses. He taps the X scar on his chin. \"Then those neanderthals might have a few of these instead of me.\"\n\t\t\t\t\n\t\t\t\tAzure screams at all the jump scares, and even screams a couple times at nothing in particular, like sudden transitions to dialogue scenes. She repeatedly yells warnings to the movie characters much to Baxter's amusement, and is so invested in the movie that she almost forgets her popcorn and chocolate. You're amazed by one extremely dizzying scene where the bully is spun around like a top via the dummy doll. \n\t\t\t\t\n\t\t\t\tWhile Baxter howls with laughter at the disturbing yet cathartic scene, Aurora nudges you on the arm. \"I love the cinematography here,\" she whispers. \"Did you know they actually filmed the actor on a spinning merry go round while walking in the opposite direction with the cameras? That's why it's so freaking vertigo inducing.\"\n\t\t\t\t\n\t\t\t\tRight on cue, the antagonist vomits, spraying yellow liquid across the walls. Groans and cheers fill the hotel room. You realize you haven't had this much fun watching a movie with friends in a long time. This beats anything nostalgia could muster. Baxter appears to notice how happy you are and winks. \"Horror is a secret salve for emotional pain. Any time you wanna watch one, I'm your man.\"\n\t\t\t\t*if (group \u003c 2)\n\t\t\t\t\t*goto group \n\t\t\t\t*goto sleep \n\t\t\t\t\n\t\t\t\t*label charisma_group\n\t\t\t\t*set charisma_group true \n\t\t\t\t*set hotel +1\n\t\t\t\t*if (hotel > 1)\n\t\t\t\t\t*set charisma_group_last true \n\t\t\t\t*set group +1 \n\t\t\t\t*set charisma +2\n\t\t\t\t*set rebellious +1\n\t\t\t\t*set tough +1\n\t\t\t\t*set tariano +1\n\t\t\t\t*set azure +2\n\t\t\t\t(+2 Charisma, +1 Rebellious, +1 Tough, Azure Approves, Tariano Approves)\n\t\t\t\t*line_break \n\t\t\t\tYou have never felt fully secure when it came to food in your life until now. The idea of spending dozens of credits on expensive desserts before would seem like self sabotage, but now it seems more like a harmless, well deserved treat. When you make your decision, Azure licks her lips eagerly and immediately grabs the hotel telephone and a room service menu. \n\t\t\t\t\n\t\t\t\tBefore long, hotel employees are carting in silver platters covered in all kinds of desserts. Tariano simply ordered three cups of dirt and worms: chocolate pudding that is protruding with gummy worms and covered in crushed chocolate cookies. He smiles sheepishly at you. \"Don't judge. This is scientifically proven to be the superior dessert.\"\n\t\t\t\t\n\t\t\t\tAurora admits to not having much of a sweet tooth after having a lot of dental work as a kid. However, she can't seem to resist munching on a few chocolate covered pretzels. Baxter happily gorges on cheesy fries washed down with vanilla, strawberry, and chocolate milkshakes. \"I'm going to hate myself in the morning,\" he says with a groan. Then he smirks, adds, \"Too bad I already hate myself anyways,\" and continues to eat.\n\t\t\t\t\n\t\t\t\tAs for you, it's difficult to know where to begin. Just looking at the wide array of colorful ice creams, decadent cakes, giant muffins, sweet scones, chocolate covered fruits, and jelly filled donuts makes your mouth water. You eventually choose a couple at random, much to your taste-buds' delight. \n\t\t\t\t\n\t\t\t\tYou soon discover that, despite her petite size, Azure is a veritable black hole when it comes to desserts. She easily, gradually consumes a brownie topped with vanilla icecream, a piece of apple cobbler, and a gooey cinnamon strudel. She closes her eyes and groans in satisfaction. \"Ohhh my, these desserts are orgasmic.\" She winces as Aurora and Tariano laugh. \"Dammit, I can't believe I said that out loud.\"\n\t\t\t\t*if (group \u003c 2)\n\t\t\t\t\t*goto group \n\t\t\t\t*goto sleep \n\t\t\t\t\n\t\t\t\t*label intelligence_group \n\t\t\t\t*set intelligence_group true \n\t\t\t\t*set hotel +1\n\t\t\t\t*if (hotel > 1)\n\t\t\t\t\t*set intelligence_group_last true \n\t\t\t\t*set group +1\n\t\t\t\t*set intelligence +2\n\t\t\t\t*set deception +1\n\t\t\t\t*set mysterious +1\n\t\t\t\t*set azure +1\n\t\t\t\t*set tariano +2\n\t\t\t\t(+2 Intelligence, +1 Mysterious, +1 Deception, Tariano Approves, Azure Approves)\n\t\t\t\t*line_break \n\t\t\t\tWhen you make your decision, Tariano's eyes light up and he eagerly runs to the tour bus to retrieve his movie disc. Azure orders drinks and snacks from food service while you wait. She clears her throat politely. \"Notice I didn't order any caviar or fish sticks or anything.\"\n\t\t\t\t\n\t\t\t\tTariano returns with the documentary, and soon enough the hotel room is dim aside from the glowing light of the television. The movie, The Wonders of the Abyss, portrays stunning footage of deep sea environments and creatures, with expert commentary from very enthusiastic scientists. \"These fish are freakier than any mythical monster,\" Baxter says with wide eyes. \"Cool.\"\n\t\t\t\t\n\t\t\t\tYou observe the fish in the depths with brimming curiosity. Many of them have sightless eyes, pale white scales, and generally small and strange shapes and sizes. Many of the creatures possess bioluminescence, glowing naturally with dots of green or blue in order to communicate with one another in their secret languages. \"Did I every tell you that the blob fish is my spirit animal?\" Aurora asks randomly. \n\t\t\t\t\n\t\t\t\tWith an excited grin and sparkling eyes, as if he had been waiting for his opportunity, Tariano tells you all about how amazing blob fish actually are.  \"Despite the [i]smooth-head fish's[/i] incorrect and rather unflattering reputations as, well, ugly, ineffective blobs, they are originally these cool gray fish. Sudden decompression can destroy their tissues and cause them to look like the infamous said blobs. I think the documentary delves into that later.\"\n\t\t\t\t\n\t\t\t\tYou suddenly realize just how much you have learned from your new friends, and especially Tariano, in such a short amount of time, and how much they have gotten you to broaden your horizons. The rest of the documentary somehow manages to be even more eye opening and fascinating. Azure can't stop gushing at all the \"adorably ugly little monsters\" until Tariano and Baxter finally politely tell her to shut up.\n\t\t\t\t*if (group \u003c 2)\n\t\t\t\t\t*goto group \n\t\t\t\t*goto sleep \n\t\t\t\t\n\t\t\t\t*label deception_group\n\t\t\t\t*set deception_group true \n\t\t\t\t*set hotel +1\n\t\t\t\t*if (hotel > 1)\n\t\t\t\t\t*set deception_group_last true \n\t\t\t\t*set group +1\n\t\t\t\t*set deception +2\n\t\t\t\t*set intimidating +1\n\t\t\t\t*set tough +1\n\t\t\t\t*set baxter +1\n\t\t\t\t*set aurora +2\n\t\t\t\t(+2 Deception, +1 Intimidating, +1 Tough, Aurora Approves, Baxter Approves)\n\t\t\t\t*line_break \n\t\t\t\tYou have always been vaguely curious about dark, mysterious things like spirit boards, although you have never had the opportunity to use one before. When you make your decision, Aurora does a little celebratory jig and cackles happily, waving the board above her head. She really does look the picture of a happy witch. \"Hell, yeah!\" she says. \"You all are amazing. You won't regret it, trust me.\"\n\t\t\t\t\n\t\t\t\tAlthough Tariano appears skeptical, and Azure seems skittish, everyone eventually agrees to participate. Baxter, practically giddy with excitement, makes to punch Aurora on the arm, but then seems to think better of it at her withering glare. \"I can't believe you never told me you had a spirit board,\" he says, shrugging dramatically.\n\t\t\t\t\n\t\t\t\tAurora insists she did and he was too scared and made excuses. Then, without preamble or ceremony, she takes the spirit board out from its black case and lays it out on her bed. The room fills with nerves and anticipation and everyone crowds around as she unfolds the board and places the accompanying planchette into the center. The board, a dark, bumpy-textured black and red, is covered in shimmering gold letters displaying the alphabet, numbers, 'yes/no', and 'hello' and 'goodbye'.\n\t\t\t\t\n\t\t\t\tFor several minutes, Aurora experiments with the planchette and board. She speaks in low tones to the board as though it could hear and understand her while moving the planchette over 'hello' and spelling out 'I'm Aurora.' When nothing happens, you and Baxter try as well, introducing yourselves by sliding the planchette over the bloody gold alphabet.\n\n\t\t\t\tThe minutes crawl by, and again, nothing interesting happens. Azure and even Tariano start to become visibly impatient. Aurora sighs, the disappointment etched on her face as she grabs the case and reaches for the spirit board to put it away. Before her fingers touch it, the planchette suddenly moves slightly, just touching the word 'goodbye'. She looks at everyone with wide eyes and then locks eyes with you. \"Did you see that?\"\n\t\t\t\t\n\t\t\t\tYou nod, heart pounding, thoughts swirling. \"Yeah.\"\n\t\t\t\t*if (group \u003c 2)\n\t\t\t\t\t*goto group \n\t\t\t\t*goto sleep \n\t\t\t\n*label sleep\n*page_break ...\n\nEarly that evening, sleep captures you suddenly and easily. You crash hard after a day of recuperation that nevertheless felt busy and full somehow. Intermittently throughout the evening, perhaps every hour, you would wake up to find everyone else still up, only to quickly fall asleep again a minute later. Your body is begging for sleep yet your mind still buzzes with kinetic energy.\n\n*if (tough_flirt_baxter)\n\tAt one point, Baxter gave you a warm kiss on the forehead before you drifted back to sleep, which made Tariano snort and shake his head with a smile. \"Get some good rest. You seriously kicked ass,\" Baxter muttered, his tone low, and rich like chocolate to your tired ears. \n*if (charisma_flirt_baxter)\n\tBaxter gave you a fuzzy kiss on the cheek before you nodded back off, making Tariano roll his eyes with a smirk. \"I'm really proud of you, ${name},\" Baxter murmured softly in his husky baritone. \"Get some beauty sleep. You deserve it.\"\n*if (tough_baxter_last)\n\tUnnerving thoughts about whether or not the other band members will end up hating you if you fail resurfaced as you began to drift back off. As if sensing your inner turmoil somehow, Baxter said, \"You know what? Call me crazy, but I think we're all even closer after this whole debacle.\" Then, cheerily, \"Night, ${name}.\" \n*if (charisma_baxter_last)\n\tYou felt warm and extra sleepy from the beer, although you were dimly anticipating the aching bladder and headache you'd have in the morning. As if reading your mind, Baxter set a cold bottle of water on your nightstand. \n*if (intelligence_baxter_last)\n\tAt one point, while half asleep, you overhead Baxter discussing his ideas for ${band}'s future with the others, hushed but brimming with excitement. The others responded in low tones and whispers, seeming optimistic and repeatedly mentioning your name. \n*if (deception_baxter_last)\n\tYou felt very warm and comfortable from your high, although dry mouth made falling asleep surprisingly vexing. Even after being a bit miffed, however, Baxter seemed to read your mind, and left a cold water bottle on your bedside table. \n*if ((charisma_flirt_azure) or (deception_flirt_azure))\n\tOn one occasion when you were falling back asleep, Azure left a warm, wet kiss on your cheek. She breathed, \"Goodnight, ${boyfriend},\" into your ear, producing goosebumps all over your body and making it difficult to quiet your mind for several minutes.\n*if (tough_azure_last)\n\tYou were cozy and toasty from your beer, although your tongue felt like mud. Despite seeming a little irritated earlier, Azure left a steaming mug of tea on your nightstand.    \n*if (charisma_azure_last)\n\tYou felt unusually serene, and remembered with an internal chuckle that you were high. Dry eyes made it difficult to sleep at times, but Azure was thoughtful enough to leave a bottle of eye drops on your bedside table. \n*if (intelligence_azure_last)\n\tYou had an intriguing, yet disturbing dream of being transformed into a cricket and eaten by leopard geckos. Azure told you to your chagrin that you were mumbling 'Alfred' in your sleep. Maybe it was the stress giving your unconscious mind an overactive imagination. \n*if (deception_azure_last)\n\tFor some reason, the idea that Azure thought of herself as weird kept bouncing around in your tired mind. If someone as pretty and charming as her views herself as strange, maybe self doubt is universal. \n*if ((intelligence_flirt_tariano) or (charisma_flirt_tariano))\n\tAt one time, when you were falling back asleep, Tariano planted an affectionate kiss on your head and murmured, \"Sleep tight, don't let the bed bugs bite...Not that there are any here. This hotel is actually pretty nice. I'm going to shut up now.\"\n*if (tough_tariano_last)\n\tOne time, when you were going back to sleep after getting a glass of water, Tariano told you, \"I'll watch for Larry's creepy ass like a hawk. Trust me, I always have mini binoculars on me,\" which gave you a tired chuckle. \n*if (charisma_tariano_last)\n\tAt one point, after you got a fresh glass of water, you felt as though you were floating on clouds when you drifted off. You only recalled fondly that you were high just before melting into the warm clouds and falling into unconsciousness with the falling summer rain.\n*if (intelligence_tariano_last)\n\tBetween waking and sleeping, your mind was preoccupied with the idea of Kanibor slowly dying. You wondered how you felt about it. You wondered grimly until your mind tired and you were pulled under again.\n*if (deception_tariano_last)\n\tBetween waking and sleeping, you found yourself thinking vaguely of chess and outer space. You dreamed of playing chess with astronauts on the moon, and hoped you wouldn't forget before you could tell Tariano.\n*if ((deception_flirt_aurora) or (intelligence_flirt_aurora))\n\tSometime in the late evening, when you were falling back asleep for the second time, Aurora planted a kiss on your forehead. \"Don't tell anyone,\" she whispered. \"I'm stealing all your brain power one forehead kiss at a time.\"\n\t\n\tHow lovely that was.\n*if (tough_aurora_last)\n\tThat night, after waking up for drinks of water or restroom breaks, you found it difficult to sleep. Grim thoughts swirled around in your head like a thick gray fog. Did Larry ever think of drugging Aurora? Would he ever think of drugging anyone else, like you, for example?\n*if (charisma_aurora_last)\n\tYou dreamed of your childhood pets running around the yard with boundless energy or lounging in sunbeams in the den. Aurora has stirred in you a sort of animal companion fever. For perhaps the first time since reaching adulthood, you feel financially stable enough to adequately care for another living being aside from yourself. \n*if (intelligence_aurora_last)\n\tAfter eating a snack to sate mild hunger pangs and before drifting back off to sleep again, your mind clung to the idea of tattoos. With Tariano getting his new tattoo sleeves, and Aurora telling you of the sentimental significance of her tattoo, you couldn't help but itch for one of your own. You could certainly afford it.\n*if (deception_aurora_last)\n\tThat night, you had a disturbingly realistic nightmare of Larry road raging behind your old clunker in his weather beaten red sedan. You imagined him brandishing a pistol with one hand, banging the steering wheel with the other, face redder than his vehicle. Then your eyelids flew open. You were bathed in cold sweat. \n*if (tough_group_last)\n\tAt one point during the middle of the night, you had a bout of vertigo that surely contributed to your nightmare involving Larry spinning you around above a corn field with a dummy doll. You suspected blood loss was responsible for your restlessness. \n*if (charisma_group_last)\n\tThat night, your stomach was upset to the point of becoming a distraction. You suspected a combination of stress and overindulging in desserts was the culprit, but you couldn't avoid the former and didn't regret the latter despite the consequences.\n*if (intelligence_group_last)\n\tBetween sleeping and waking, you found your thoughts wandering to the deep see trenches and the wondrous, yet strange creatures there. You had a disturbing nightmare about the Necrophone opening up to reveal Kanibor to be a decompressed smooth-head corpse.\n*if (deception_group_last)\n\tDespite your exhaustion, your mind was preoccupied with the spirit board between waking and resting, and it didn't help that you could hear the others whispering about it here and there. Was the spirit board communicating, or was it some kind of optical illusion or simple physics? Are you just doubting yourself? You can't decide before falling under again. \n\n*page_break ...\n\nYou're woken up in the middle of the night by a hand gently yet urgently shaking your shoulder. \"${name}, don't freak out,\" Aurora whispers in the darkness, her voice strangely high. \"But Kanibor is here. In the hotel room. I just discovered him a minute ago. Don't worry, he's not dangerous right now. He's sick or-\" She falls silent, seeming to struggle to find the words. Then she continues, \"I don't know. Just come and see for yourself, ${name}.\"\n\nBlearily, you climb out of bed, your heart pounding, your thoughts swirling with possibilities, the overwhelming majority of them negative. \"I'm going to turn on the light,\" Baxter says, panting. \"Nobody move. I'm armed with this nice wooden rolling pin from the kitchen.\"\n\nHe says this loud and clear despite his breathlessness, and likely for Kanibor's benefit more than anything else, yet you find yourself freezing with anticipation. When the light comes on, you shield your eyes from the brilliant artificial yellow glare for as long as your patience can stand before peeking painfully through slitted fingers. Fuzzily, the scene comes into view. In the center of Aurora's otherwise empty bed sits Kanibor, looking blatantly sick and very different. \n\n*page_break \n\nWith the lights on, Tariano and Azure communicate with Baxter through eye contact and then scramble closer to  you and Aurora. Baxter separates all of you from Kanibor, a wooden rolling pin balanced on his shoulder like a lumberjack's ax. \"Kanibor woke me up saying he got in through the vent and needs your help. He's says he's dying,\" Aurora explains, her voice almost catching on the final word. \n\nSilence falls over the room except for the dull ticking of a large clock on the wall. Kanibor is hunched in on himself, appearing more like a shivering mop head than the robust creature you witnessed before. His previously black fur is now heavily peppered with gray and white. Patches of fur are missing, exposing irritated pink skin and jutting hips and vertebrae. He wheezes faintly, occasionally making painful sneezes.\n\nHis white hair is a gossamer, cobweb white, looking so wispy that it might come out at the lightest pressure or pluck. His great eyes which were formerly as dark as black holes are now filled with murky gray clouds of cataracts. The green crown of fur on his forehead has been replaced with a sickly yellow scraggle. A faint stench of blood and illness emanates from him, itching your nostrils. \n\nYou realize grimly that Kanibor has aged to death's doorstep practically overnight. Even his tail, as flexible as liquid just yesterday, looks rigid and arthritic now. Baxter lowers his rolling pin, eyes mortified as he slowly backs away. \"${name}, what the [i]fuck[/i] is going on?\" he asks, his eyes never leaving the creature on the bed. \"Is this another alien? Who is this, Kanibor's grandpa?\"\n\t\t\nKanibor croaks out a raspy, guttural laugh, making Azure squeak and clutch Aurora's arm and causing Tariano to flinch hard. Kanibor seems to locate you by rotating his conical ears and sniffing at the air with his pointed nose. \n\nKanibor levels his glassy, unseeing eyes on you and speaks in a voice that is undoubtedly Kanibor's, yet very old and frail. [b]\"I hope you've been enjoying your fame and fortune and freedom, ${name}. If only I were so lucky. It turns out my freedom was only the freedom to die painfully.\"[/b]\n*label aged\n*if (aged > 0)\n\n\tWhat do you do next? \n*choice\n\t*hide_reuse #Tell Kanibor bluntly that your pact had been a disaster from the very beginning \n\t\t*goto tough_aged\n\t\t\n\t*hide_reuse #Make Kanibor a nest to make him more comfortable \n\t\t*goto charisma_aged\n\t\t\n\t*hide_reuse #Ask Kanibor with concern what happened to him \n\t\t*goto intelligence_aged \n\t\t\n\t*hide_reuse #Ask Kanibor why you should help him after everything he did to you \n\t\t*goto deception_aged \n\t\t\n\t\t*label tough_aged\n\t\t*set tough_aged true \n\t\t*set aged +1 \n\t\t*set intimidating +1 \n\t\t*set charisma +1 \n\t\t*set tough +2\n\t\t*set kanibor -2\n\t\t(+2 Tough, +1 Charisma, +1 Intimidating, Kanibor Disapproves)\n\t\t*line_break \n\t\t\"This whole pact never really worked out for either of us, did it?\" you ask, unable to keep an icy edge of resentment from  creeping into your tone. \"I collected a [i]small, tenuous[/i] fortune after being drained of blood and sabotaged at every turn. You suffered in that microphone, and now it looks like you're already half dead.\" You scoff with disbelief. \"Some freedom.\"\n\t\t\n\t\tYou're vaguely aware of the stillness in the room, the slight slowing of time as your adrenaline flows, how all of your band members are staring at you and Kanibor intently. [b]\"It almost sounds like you're blaming me for my condition,\"[/b] he says disdainfully. [b]\"For my own suffering. Even though it's plain to see that you of all people suffer from the human condition.\"[/b]\n\t\t\n\t\tShaking your head in disbelief, you say, \"You're the one who came to me in a meteor.\"\n\t\t\n\t\t[b]\"You're the one who picked me up,\"[/b] Kanibor growls back automatically. \n\t\t\n\t\t\"You offered me the pact,\" you insist. \n\t\t\n\t\t[b]\"And you accepted it,\"[/b] he counters. \n\t\t\n\t\tYou're fully conscious of everyone's eyes going back and forth between you and Kanibor like they're watching a tennis match. Eyes rapt, Aurora looks like she's dying to say something yet holding it in. Feeling increasingly frustrated, you say, \"If we're both being honest, it has been a nightmare from the very beginning. It's been a cruel joke. Just look at you, Kanibor.\"\n\t\t\n\t\tAn uncomfortable silence descends over the room, punctuated by Kanibor's ragged breathing that is almost painful to listen to. At last, Kanibor simply takes in a great breath, inflating like a furry balloon before letting out a rattling, popping exhale. [b]\"Maybe I have always been cursed. Maybe I am the curse, being extinguished after I have performed my function. Who am I to say? I know exactly nothing about almost everything.\"[/b] \n\t\t\n\t\tYou swallow, remaining silent. That's a very sobering thought. \n\t\t*if (aged \u003c 2)\n\t\t\t*goto aged \n\t\t*goto comfort \n\t\t\n\t\t*label charisma_aged \n\t\t*set charisma_aged true \n\t\t*set charisma +2 \n\t\t*set aged +1 \n\t\t*set rebellious +1 \n\t\t*set intelligence +1\n\t\t*set kanibor +3\n\t\t(+2 Charisma, +1 Intelligence, +1 Rebellious, Kanibor Approves)\n\t\t*line_break \n\t\tKanibor looks so miserable and sickly that you can't help but pity him. \"I'll make a nest for you,\" you declare, already searching the room with your eyes for items to use. \"You're old and obviously in pain. Maybe it will bring you some comfort. It's honestly the least I can do.\"\n\t\t\n\t\tKanibor doesn't reply at first, but then his tail flicks and a rumbling purr like a distant stampede emanates from him. [b]\"I've had little peace since breaking free from the Necrophone,\"[/b] he says wearily. [b]\"Everywhere was hostile, everything I ate, I rejected. A warm, comfortable nest does sound like such a relief.\"[/b]\n\t\t\n\t\tBaxter is taken aback and stammers wordlessly as you jump into action. You gather several pillows and blankets from around the room, ignoring Tariano and Azure as they protest in confusion. You start to construct a conical nest out of the pillows and blankets, and you're pleased when Aurora appears, handing you a pillow with a defiant sort of smile. \"I think it's a perfect idea. I'll help.\"\n\t\t\n\t\tTogether, the two of you quickly finish the makeshift nest, building it near the heater so it becomes warm and toasty. No sooner have you adjusted the last pillow than does Kanibor appear in the middle of the nest. Gurgle-purring loudly, his rigid tail swishing happily, he practically melts into the cushions. Then, to your surprise, he begins to emit faint, whistling snores. \n\t\t\n\t\tYou and Aurora exchange looks of astonishment and adoration mixed. She even has tears sparkling in your eyes, and you must admit that there's something that feels so obviously right about helping this poor creature. Baxter shakes his head in perplexity while Tariano and Azure come closer to observe Kanibor sleeping peacefully. \n\t\t\n\t\tKanibor suddenly wakes himself with a bout of violent coughing, making Tariano yelp and scramble back. Hacking blood onto the white pillow sheets, Kanibor growls tiredly, [b]\"Even in sleep, peace eludes me. This has been the sweetest rest I have ever had the pleasure of being taken by, but it's not why I'm here. I need something else before I rest a final time.\"[/b]\n\t\t*if (aged \u003c 2)\n\t\t\t*goto aged \n\t\t*goto comfort \n\t\t\n\t\t*label intelligence_aged \n\t\t*set intelligence_aged true \n\t\t*set intelligence +2 \n\t\t*set aged +1 \n\t\t*set charisma +1 \n\t\t*set chill +1 \n\t\t*set kanibor +1\n\t\t(+2 Intelligence, +1 Charisma, +1 Chill, Kanibor Approves)\n\t\t*line_break \n\t\tYou surprise yourself with how much concern is in your tone when you ask Kanibor what happened to him. Tariano looks extremely curious as well, despite keeping a healthy distance. Kanibor chuckles mirthlessly at your question, a sound that raises the hair on your neck and spreads goosebumps across your body. [b]\"Have you ever heard of the ability [i]negligible senescence[/i]?\"[/b]\n\n\t\tYou shake your head from side to side in a negative at the same time as Tariano does his best impression of a bobble head. \"Very minimal aging after maturity,\" Tariano explains, his voice higher and quieter than usual. \"Like in jelly fish, tortoises, or alligators.\"\n\t\t\n\t\tKanibor continues with dark irony in his guttural tones that he has the extreme opposite. [b]\"I was barely able to find somewhere safe before I was dragged into a deep sleep. When I woke up, I was starving, in excruciating soreness, and my wonderful vision had vanished. I thought I was dying. It seems I'm aging into the grave.\"[/b]\n\t\t\n\t\tA heavy silence falls over the room. Azure, looking mortified, comforts a sniffling Aurora. Baxter now looks awkward, almost guilty, holding his rolling pin, and clears his throat, looking at a wall across the room. You and Tariano exchange grim expressions.\n\t\t*if not(intelligence_tariano)\n\t\t\tThis would explain so much of Kanibor's strange and unsettling behavior.\n\t\t*if (intelligence_tariano)\n\t\t\tYou both seem to be recalling your discussion on the balcony about Kanibor's illness, and a silent understanding passes between you that you were, unfortunately, correct.\n\t\t\t\n\t\tIt seems you must be the one to break the uncomfortable quiet. \"I'm sorry this is happening to you, Kanibor,\" you finally say, unsure of what else there is to say. \"Can you at least still drink water, even if you can't eat?\"\n\t\t\n\t\tKanibor shakes his head bitterly, scowling in your general direction. [b]\"I'm terribly thirsty, but drinking water is like drowning in my condition. I reject everything. Almost everything.\"[/b]\n\t\t*if (aged \u003c 2)\n\t\t\t*goto aged \n\t\t*goto comfort\n\t\t\n\t\t*label deception_aged\n\t\t*set deception_aged true \n\t\t*set deception +2\n\t\t*set intimidating +1 \n\t\t*set tough +1 \n\t\t*set aged +1 \n\t\t*set kanibor -1\n\t\t(+2 Deception, +1 Intimidating, +1 Tough, Kanibor Disapproves)\n\t\t*line_break \n\t\t\"I must admit, I'm surprised to see you here,\" you begin. \"After everything you've done to me, why should I help you?\"\n\t\t\n\t\tKanibor bristles at your question, scowling intensely in your direction. [b]\"We were in a symbiotic relationship,\"[/b] he says bluntly. \n\t\t\n\t\tYou can't contain a hollow, sarcastic laugh. \"You manipulated me into using you. You took too much blood from me. I don't even know how much. You left me unconscious on a bathroom floor for Larry to...\" You're breathing hard, you realize. \"This was never a real partnership, Kanibor. You just used me. But what am I supposed to do for you now?\"\n\t\t\n\t\tThere's a pang of regret as you notice Kanibor's scraggly, wilted ears, his already pathetic form shrinking further into the bed. [b]\"Yes, I used you,\"[/b] Kanibor admits to your surprise. [b]\"I used you desperately to get out of that infernal microphone.[/b]\n\t\t\n\t\t[b]\"And now I'm decaying like a cut flower. I wish I had enough time, enough opportunities, to have made different choices.\"[/b] He shrugs his tiny shoulders, twitches his tail. [b]\"Maybe in another life, we could have been trustworthy friends. But we were always clients transacting in a grisly pact I'm sure neither of us wanted. And now I'm already dead.\"[/b]\n\t\t\n\t\tYou open your mouth, then shut it again. Baxter seems to sag under the weight of his rolling pin, face looking very glum. Tariano is staring dead at the floor, and Azure appears to be consoling a teary-eyed Aurora. [b]\"So, why?\"[/b] Kanibor rasps. [b]\"Moral impetus? Perhaps a sense of closure or responsibility after you picked me up, not to just cast me aside like rubbish? Who knows? Only you have the answer.\"[/b]\n\t\t*if (aged \u003c 2)\n\t\t\t*goto aged \n\t\t*goto comfort\n\t\t\n*label comfort \n*page_break \n\nPerhaps because he finally realizes that Kanibor is not an imminent threat, or maybe just because his arms were growing tired, Baxter sets his rolling pin on the kitchen counter. Aurora goes and sits close to Kanibor, who doesn't move or protest. Azure and Tariano sit hesitantly at the end of the bed. \"So, why are you really here, then? How are we supposed to help?\" Baxter asks. \n\nKanibor subsides into rattling, throaty coughs that are painful to listen to. This carries on for several seconds until he finally recovers. Thick saliva dangles from his chin, and he licks it away, showing yellowed fangs. [b]\"I'm going to die any moment now. Believe me, I feel it taking me.\"[/b] He looks at you and shuffles a bit closer. [b]\"All I ask is for a few more drops of your blood to ease my suffering.\"[/b]\n\nThe numerous scars on your arms seem to itch at the thought. You can't help but imagine those yellow fangs plunging deep into your flesh one final time, gulping greedily at your blood as it relieves the screaming pain in Kanibor's dying body at the cost of your own vitality. Would he be able to control himself now of all times when he couldn't before?\n\nEveryone springs to your defense at once. Baxter steps in front of you, folding his muscled arms over his chest with a glower. \"You're crazy if you think you're spilling another drop of ${name}'s blood.\"\n\nAzure recoils from Kanibor slightly, but her jaw is set and her eyes are defiant. \"You don't have to do this, ${name}. Whatever pact you made is over.\"\n\n\"Does it have to be ${name}'s blood?\" Tariano asks, his eyebrows bunched together with concern. \"I mean, if it's just a few drops of blood, what if someone else volunteered?\"\n\n*page_break \n\nKanibor snorts impatiently and shakes his head. [b]\"No, no. It can only be ${name}.\"[/b] He looks at you again with cloudy eyes that make your own eyes water involuntarily. [b]\"Just allow me to sate my burning thirst for just a moment before I slip away.\"[/b] He appears increasingly desperate, his breath ragged. [b]\"I gave you everything. You owe this to me.\"[/b]\n\nProtests spring out from Baxter, Azure, and Tariano, yet Aurora remains silent. She catches your eyes, giving you a hopeless sort of shrug. Swallowing hard, seeming to fight tears, she says, \"I don't know, ${name}. He could have attacked us in our sleep but he came to us for help instead. I can see he's suffering. But no one can tell you to make that sacrifice.\"\n\n*if (tough_aged)\n\tYou have regretted making a pact with Kanibor on multiple occasions, but in this moment, the regret is intense. You never wanted all the drama and conflict, and now you have an unavoidable death on your hands. [b]\"Don't punish me now for what I did trying to survive,\"[/b] Kanibor wheezes.\n*if (charisma_aged)\n\tKanibor suddenly stretches his long, prehensile tail out to its full extent. To your surprise, he wraps it gently around your ankle in a tiny embrace. [b]\"The nest was comforting. But not enough,\"[/b] he rasps. \n*if (intelligence_aged)\n\tKanibor stretches out his small legs until they shiver, and then curls back in on himself with a snuffled grunt. [b]\"Sleep is calling me, ${name}. Remember what happened last time I slept.\"[/b] He yawns widely, showing aging yellow teeth and a patchy chin. [b]\"I won't wake up again.\"[/b]\n*if (deception_aged)\n\tKanibor inhales deeply and exhales wearily, like a deflating, furry balloon. [b]\"You asked me why you should help me. Where would you be now if I hadn't landed in front of you like a miracle? Homeless on the streets? Perhaps begging to a geographically and emotionally distant family for help they couldn't and wouldn't give?\"[/b]\n\t\nNone of this has gone how you envisioned it. You now probably have an unwanted enemy for life in Larry, a host of experiences you'll have to deal with in therapy someday, and an alien dying in your hotel room. Yet where would you be if that meteorite didn't almost hit you? Baxter, Azure, Tariano, and Aurora wouldn't even know you existed. Kanibor inches closer. You know you must decide.\n*choice\n\t#Swallow your discomfort and allow him to ingest a few drops of your blood\n\t\t*goto tough_comfort \n\t\t\n\t#Give him permission to drink your blood; you can't stand to watch him suffer\n\t\t*goto charisma_comfort  \n\t\t\n\t#Tell him you're sorry you can't save him\n\t\t*goto intelligence_comfort \n\t\t\n\t#Tell him you want him to go away\n\t\t*goto deception_comfort \n\t\t\n\t\t*label tough_comfort \n\t\t*set tough_comfort true \n\t\t*set charisma +1 \n\t\t*set rebellious +1 \n\t\t*set tough +2\n\t\t*set kanibor +3\n\t\t(+2 Tough, +1 Rebellious, +1 Charisma, Kanibor Approves)\n\t\t*line_break \n\t\tIt's draining, painful, and humiliating, having your blood drunk. Yet to simply watch Kanibor suffer and fade before your eyes is even worse when you know only you have the power to do something about it. Steeling your nerves, you clench your jaws and puff your chest out bravely. \"You can drink a few drops, Kanibor. I owe you that much.\"\n\t\t\n\t\tAzure gasps in shock and Baxter watches with his jaw agape as you roll your sleeve up and sit beside Kanibor, offering him your arm. He doesn't waste any time in shuffling closer, yet his fangs are quite gentle as they pierce your flesh. He snuffles and grunts, slurping up your blood for only a few seconds before withdrawing with obvious reluctance and impressive discipline.\n\t\t\n \n\t\t[b]\"Yes,\"[/b] Kanibor sighs with relief. [b]\"For just a moment, my throat isn't burning. I feel a warmth traveling through my old body. My thoughts aren't moving through sludge.\"[/b] He rests his warm, fuzzy chin against your arm, vibrating gently, his eyes closed. [b]\"And maybe just before I go, I can arrogantly claim a friend.\"[/b]\n\t\t\n\t\tKanibor takes in a slow, deep, breath, and exhales one last time. He goes stiff in your arms, his ancient features content and peaceful. You're surprised when your own tears plop onto your hands, and you swallow to find a great lump clogging your throat. You flinch when Aurora rubs your back supportively. Her own eyes are red with tears. \"Thank you for helping him, ${name},\" she whispers. \n\t\t*goto grave\n\t\t\n\t\t*label charisma_comfort\n\t\t*set charisma_comfort true \n\t\t*set charisma +2 \n\t\t*set rebellious +1 \n\t\t*set tough +1\n\t\t*set kanibor +5\n\t\t(+2 Charisma, +1 Rebellious, +1 Tough, Kanibor Approves)\n\t\t*line_break \n\t\tEven if you and Kanibor never had the healthiest of relationships, it would be barbaric to let him suffer to death in front of you. He never asked for any of this. \"Drink as much as you need,\" you say, half hoping you won't regret those words as you pull up your sleeve. \"I'm not just going to let you die alone.\"\n\t\t\n\t\tTariano blanches and Azure catches your eyes, shaking her head repeatedly with wide, warning eyes. But you're already sitting beside Kanibor on the bed, offering him your naked arm. He sidles up to you with almost alarming speed, yet his fangs are quite delicate as they sink into your flesh. You close your eyes and try to regulate your breathing as he begins to feed. \n\t\t\n\t\tThe biting pain in your arm soon grows to an intense searing as Kanibor sucks the blood from your veins. You grit your teeth until his painkilling venom takes effect, making you more docile. He snuffles and grunts, feeding for several more seconds before finally withdrawing. You open your eyes and immediately wish you hadn't, swaying with dizziness. Aurora steadies you with a supportive hand on your shoulder. \"Are you okay?\" she says, her eyes filled with worry and admiration simultaneously. \n\t\t\n\t\tYou nod wordlessly. You feel a little nauseous and lightheaded, but Kanibor has fed on you much more ravenously before. He noisily licks his fur clean of arterial red, purring happily like a rumbling landslide. To your surprise, he suddenly curls up into a ball in your lap. He's light, solid, warm, and unbelievably fuzzy. [b]\"For my last moments, I can forget about the muscle tearing, bone grinding pain. And I can say I have a friend.\"[/b]\n\t\t\n\t\tKanibor lets out a deep, contented sigh, and then falls very still in your lap. He suddenly feels very heavy. Dead weight, you reflect humorlessly. He's still warm, his malnourished fur still so logic defyingly soft. You find yourself clutching at his small, stiff body, crying burning tears. Aurora, eyes red with her own tears, puts a supportive arm around you. \"Thank you for helping him, ${name},\" she whispers.\n\t\t*goto grave \n\t\t\n\t\t*label intelligence_comfort \n\t\t*set intelligence_comfort true \n\t\t*set intelligence +2 \n\t\t*set tough +1 \n\t\t*set mysterious +1 \n\t\t*set kanibor -3\n\t\t(+2 Intelligence, +1 Mysterious, +1 Tough, Kanibor Disapproves)\n\t\t*line_break \n\t\tYou shake your head grimly and look away. It's difficult to look at him in this dreadful state. \"I'm sorry about what's happening to you,\" you say. \"I'm so
