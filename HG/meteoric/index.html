ign, chipping paint, and permanent smell of cigarette smoke, seemed drab before, but now, it thrives with life as you sing about death. The bar was already at capacity, yet new fans seem to trickle in from the street every few minutes, packing it tighter and tighter. Maybe someone paid off the fire marshal, or maybe they're a metal head. \n\nThe fans cram themselves into the packed crowd to watch as your band shreds their instruments and you kill the guttural tones and complex vocal patterns effortlessly. In the mosh pit, some smaller or inexperienced moshers are sent flying, but are quickly picked back up and encouraged back into the pit or helped off into the crowd. One teenage boy's nose is dripping with blood, but he grins from ear to ear and dives back in. The idiot with the shoe has been summarily ejected from the pit by a couple burly men with thrash battle vests.\n\nSweat drips down your forehead and makes your hair cling to your neck and forehead. As Tariano and Baxter dive into alternating winding, rattlesnake like guitar solos, you're given several beats to take a break. Even with Kanibor doing half the work, singing, especially like this, is ridiculously tiring.\n*if (tough_drink) \n\tYou take a quick drink of beer, which has become warm and sweeter. You feel the pleasant lightheadedness of being buzzed, and find it's nothing compared to the roaring of the crowd. \n*if (charisma_drink) \n\tYou take a quick drink of your flavored water, which is so warm and sour that you pucker your lips, making Azure laugh. You feel ready to sing again, and find the cheering and yelling of the crowd to be intoxicating.\n*if (intelligence_drink) \n\tYou drink more of your water, which is now warm. One of the fans screams for you to spray them with the water. Unable to contain a grin, you squeeze the water bottle and wave it around, splattering the crowd with water and making them cheer even louder while giving you the middle finger.\n*if (deception_drink) \n\tYou drink the last of your energy drink, the rush of cold carbonation making you wince. The caffeine causes your heart rate to spike again, but you discover it pales compared to the screaming of the crowd. \n\nOnce you have finished the first song, it's obvious that you have the crowd in the palm of your hand. If you can nail it here with the single and get a record deal, all of your problems like getting fired and your car dying will be miraculously solved. The thought makes your insides squirm. It hardly seems possible, but then, your accomplice is an alien. No pressure or anything. You suddenly notice Larry giving you evil eyes from the back stage, and this only strengthens your resolve. \n\n*if (tough_growl)\n\tAurora's frantic blast beats and Tariano's and Baxter's pummeling riffs get the crowd moshing and headbanging like mad. When Azure's early, finger shredding bass solo comes in, cheers fill the air. You have a wicked smile on your face between growls as you stalk around the stage, headbanging and punching your first in the air. No one told you this would be this fun. You almost feel like a cult leader riling up ${his} followers for something big.\n*if (charisma_growl)\n\tAurora's catchy, mid tempo beats interposed with blast beats, and Tariano's and Baxter's energetic, harmonized guitar riffs get the crowd headbanging hard. One teenager hauls herself onto the stage to dive back into the crowd, squealing with laughter. Grinning from ear to ear between growls, you confidently pace around the stage, commanding the audience. They roar when you point at them, and scream back when you thrust the mic in their direction.  \n*if (intelligence_growl)\n\tAurora's punishing beats and Tariano's and Baxter's driving, harmonized riffs continue to pump up the crowd, and the pit becomes even more hectic as the guitar riffs evolve in complexity and speed. Azure's jangling bass is prominent even over the din and the vibrations seem to travel into your chest. You revel in the beautiful chaos, stalking around the stage as you utter deep growls and high pitched screams. Some fans head bang uncontrollably at the lows and then throw their fists in the airs at the highs. It's impossible not to smile. \n*if (deception_growl)\n\tThe infectious groove of Aurora's subdued yet creative beats and smooth drum fills, Azure's energetic and prominent bass, and Baxter's and Tariano's wicked, winding guitar riffs keep the crowd moshing and headbanging excellently. You pace around the stage, staring into the crowd as you deliver your raspy, guttural growls. Several fans catch your eyes and point excitedly or put up the devil horns. You know you'll never forget this night, and you wonder if they will either. \n\nBaxter moves close to you, his face plastered with his long black hair. You're reminded of a horror movie villain you had nightmares of as a kid who always had her hair in front of her face. He gestures to the crowd with his chin. \"You're murdering this crowd like a vet. Now finish it off in style!\" \n*choice\n\t#Join the mosh pit \n\t\t*goto tough_show\n\t\t\n\t#Start crowd surfing\n\t\t*goto charisma_show\n\t\t\n\t#Get the crowd to chant ${band}'s name \n\t\t*goto intelligence_show\n\t\t\n\t#Pretend to start ending the show but then sing an acapella of your single  \n\t\t*goto deception_show\n\t\t\n\t\t*label tough_show\n\t\t*set tough_show true \n\t\t*set charisma +1 \n\t\t*set intimidating +1 \n\t\t*set tough +2\n\t\t*set barty +1 \n\t\t(+2 Tough, +1 Charisma, +1 Intimidating, Barty Approves)\n\t\t*line_break \n\t\tBefore you have time to reconsider, you jump from the small stage and into the front of the crowd. Bringing the mic to your lips, you growl, [b]\"Make way,\"[/b] and the fans obediently and hurriedly separate, eagerly watching as you move towards the mosh pit. \n\n\t\tA delightful shiver goes up your spine. You feel like a cool monster, like a werewolf or vampire or something. Down here, the air is filled with the smell of sweat and alcohol, and the red strobe lights create an ominous atmosphere. The fans moshing immediately recognize you holding the Necrophone, and this makes you an obvious target. A large man with long blonde hair and a jean vest covered in punk patches pushes you as hard as he can for some reason, sending you flying into the edge of the ring, but you're quickly launched back in. \n\n\t\tAllowing yourself to lose yourself in the chaotic, face-melting music of your own awesome band, you push and elbow your way into the center of the pit and resume singing in guttural tones just on time after a flashy, tremolo guitar lead. Fans run in dizzying circles around you, shoving one another in every direction, wearing manic grins or scowls of concentration. You struggle to sing as you're jostled with elbows and shoulders, but the Necrophone masks any imperfections. This is crazy. And [i]fun[/i].\n\t\t\n\t\tThe floor vibrates with Azure's bass, and your ears ring from the avalanche of sound coming from the speakers on stage. Several feet away, a man in a baggy black jumpsuit is clearing several feet around him by spinning in circles, kicking and punching blindly as he headbangs like a cartoon character. It's almost comical to watch, yet even the most experienced or tough looking moshers don't seem to want to go anywhere near him. \n\n\t\tThe strange man catches your eyes, sticks out his tongue, and thrusts devil horns at you with both hands, but then puts a hand to his head, stumbles, and is lost in the mosh again. Funnily enough, he's sent flying back into the crowd like anyone else by a shoulder check from a grizzly bear with a face tattoo. \n\t\t\n\t\tThe song is almost over now. You manage to extricate yourself from the crowd and climb back onto the stage, panting and exhausted, and greeted with raucous cheers from your band. You have to admit, that was epic. \n\t\t*goto dj \n\t\t\n\t\t*label charisma_show\n\t\t*set charisma_show true \n\t\t*set charisma +2 \n\t\t*set tough +1 \n\t\t*set rebellious +1\n\t\t*set barty +1 \n\t\t(+2 Charisma, +1 Tough, +1 Rebellious, Barty Approves)\n\t\t*line_break \n\t\tBefore you can make yourself reconsider, you give Baxter a nervous grin, wiggle your eyebrows, and then dive into the crowd like you're doing a belly flop into a swimming pool. Your stomach does a great [i]swoop[/i] as you plummet towards the dark floor, and you imagine what your face hitting it will feel like. Then several people eagerly, almost obediently reach out to catch you. Quickly, you flip over onto your back, laughing anxiously as you nearly topple over. \n\n\t\tBringing the mic to your mouth, you continue to growl the lyrics as you float above the crowd, many hands pressing into your legs, back, and rear. It's exhilarating, singing with a wall of music blasting you and the strobe lights bathing the crowd in an eerie arterial glow. You surf the crowd all the way to the back of the venue, never knowing exactly where you're going or which direction you'll tip next. You realize with surprise that you have no desire to get out of this storm. \n\t\t\n\t\tYou're so busy riding the wave that it takes you a few seconds to realize that Tariano is repeating a flashy, but brief guitar solo to buy you some time to return. You hurriedly wave for the crowd to push you in the opposite direction, and a second later, you're bobbing and shifting towards the stage where the band is headbanging in unison beautifully. It nearly brings a tear to your eye, and you sincerely hope someone is recording this show with a good camera. \n\t\t\n\t\tAs you're nearing the stage, another crowd surfer suddenly appears beside you, his arms and legs stretched out wide, wearing a manic grin. He almost looks like a janitor with his black jumpsuit, if janitors had face tattoos and eyebrow piercings. The man suddenly gestures frantically for the crowd to push him in your direction. All you can do is watch in surprise as he practically crab walks on people's hands. When he comes within a couple feet of you, he sticks out a hand, grinning. \"High five!\" \n\n\t\tAh, what the hell. Grinning back, you reach out. He slaps your hand as hard as he can, producing a sound that you can hear even over the roaring music. You withdraw your hand with a confused scowl, shaking it as it goes numb. A second later, the man drops into the crowd with a maniacal laugh and disappears. Finally, you reach the stage and clamber onto it, still wincing from your stinging hand. That was awesome, and weird. \n\t\t*goto dj \n\t\t\n\t\t*label intelligence_show \n\t\t*set intelligence_show true \n\t\t*set intelligence +2 \n\t\t*set chill +1 \n\t\t*set charisma +1 \n\t\t(+2 Intelligence, +1 Charisma, +1 Chill)\n\t\t*line_break \n\t\tYou give him a knowing look and then bring your mouth to the mic, speaking directly to the crowd in guttural tones. You channel all the live shows you watched on television, and the charisma emanating from the Necrophone through you. [b]\"Look at this crazy crowd. You all are blowing my mind tonight! We couldn't have asked for a better crowd at our first ever show.\"[/b] \n\n\t\tTo your relief and delight, the crowd lets forth a tremendous cheer that you wouldn't believe possible coming from only a few dozen people. Many of the fans pump their fists or give devil horns, and a weird drunken cheer from the back gets the crowd laughing. You find you're shaking with nerves, and are suddenly grateful for the red strobe lights. What should you say? Something not stupid, something simple. [b]\"Who wants more from ${band}? Who wants a bloody album?\"[/b] \n\n\t\tThe screaming of the crowd is deafening. The expressions of the fans near the stage are filled with excitement, and many of them turn to talk animatedly to one another. Snatches of conversation drift up from the front row, and you distinctly hear one girl yelling for vinyls and cassettes. You turn to look at your band members. Baxter makes an impressed face, raising his eyebrows and pushing his lips down in happy surprise. \n\n\t\tAzure gives you an enthusiastic double thumbs up and gestures encouragingly for you to continue. Catching on, Aurora and Tariano keep the music going with a tense beat and a buzzing tremolo riff. You lift a fist in the air and begin to chant. You really hope this works, or you might have to crawl in a hole somewhere. [b]\"${band}! ${band}! ${band}!\"[/b] \n\n\t\tThe chant is taken over immediately by the crowd, with even some of the surly men folding their arms in the back now participating. Dozens of people, ranging from teenagers to older men with salt and pepper beards, bring the chant to a thunderous roar that sends a shiver up your spine and even makes your eyes glisten with tears. This feels like you've conquered the whole world, not just some little bar. [b]\"${band}! ${band}! ${band}!\"[/b]\n\t\t*goto dj \n\t\t\n\t\t*label deception_show\n\t\t*set deception_show true \n\t\t*set deception +2\n\t\t*set mysterious +1 \n\t\t*set tough +1 \n\t\t(+2 Deception, +1 Tough, +1 Mysterious) \n\t\t*line_break \n\t\tIf this doesn't work, you might just have to crawl into a hole and hope to disappear. If it works, well...You might be figuring out this whole stardom thing early. You simply offer Baxter a small, conspiratorial smile and say, \"I think I have something in mind.\"\n\t\t\n\t\tTurning back to the crowd, you let the mic hang by your leg, missing your next verse and causing the rest of the band to falter slightly. Like seasoned professionals, they resume playing, but Azure shoots you a befuddled look and throws up one hand. Shaking your head wordlessly, you repeatedly cut your other hand through the air until the band grinds their instruments to a halt. Tariano looks at you in confusion, while Aurora throws her hands, still clutching their drumsticks, up in the air impatiently.\n\t\t\n\t\tMurmurs and grumbles ripple through the crowd, followed quickly by rumbles of confusion and loud groans of impatience. One of the bearded men in the back hurls his bottle onto the floor, creating an explosion of glass and foamy beer. As he is quickly ushered away by security while exasperated employees swarm in with towels, he roars, \"Play the god damn show!\" and is met with scattered applause and some laughter at his expense.\n\t\t\n\t\t[i]So far, so good,[/i] you think with some chagrin. You're jittery with nerves, but are relieved and empowered at once by being shrouded with low ambient light and red strobe lights. Bringing the Necrophone to your mouth again, you begin to sing your new single acapella. Your powerful, guttural growls travel throughout the bar, drowning out the chattering crowd. Out of the corners of your eyes, you notice the band staring at you with their instruments limp. \n\t\t\n\t\tInstead of moshing or headbanging, most of the fans go silent to watch, transfixed, as you sing your song in all its brutality without any instrumentals. Now, the lyrics become slightly clearer to the ear, and Kanibor's pain and anger -or is it your own?- becomes even more evident in the primal growls. Your naked vocals sound even more like a monster than before, yet they beg for rhythm, and even a touch of melody. When you have finally finished, you realize that you have slowly backed up into the shadows at the back of the stage. \n\t\t\n\t\tPanting and covered in sweat, you lower your mic. You hope that you weren't imagining things and that you won't suddenly hear laughter and jeering or worse, dead silence. There are a couple seconds said dead silence that causes your stomach to swoop nauseatingly, but then the bar erupts with screams and cheers of applause. Blinking hard, a small smile comes to your lips as your band mates laugh and cheer around you. This is weird, and undeniably amazing.\n\t\t*goto dj \n\n*label dj \n*page_break ...\n\nAfter the show, you and the band are waiting anxiously backstage for your potential benefactor, Brain Rot's DJ. Aurora sits on an amp, twirling a drum stick between her fingers while chewing on her bottom lip. Tariano is trying to quiz Azure on trivia about Brain Rot, much to his amusement and her frustration. Azure scowls incredulously at him, her hands on her hips. \"You're trolling me. There's no way they have one member who just samples horror movies and another who just plays electronic bagpipes?\"\n\nTariano can't contain his laughter as he says, \"You know I can't lie to save my life. Those two are founding members. All I'm saying is, their DJ is far from their most random or unnecessary member, believe me. His turntable scratching adds some cool texture to their songs and his solos can be killer, in my opinion.\"\n\nAurora shrugs and says, \"See, Larry? Maybe backing vocals isn't so useless.\" She shoots Azure an evil grin and then says, \"Plus, you're such a visionary lyricist. That concept album, um, concept, about violating and then butchering your ex girlfriends? Truly groundbreaking, thought provoking stuff.\" \n\nAzure bursts into a fit of nervous giggles, slapping a hand over her mouth and peeking over at Larry. He gives Aurora a sarcastic smile that's not at all pleasant. \"Excuse me, I resent that. It's butchering and [i]then[/i] violating. That way, you know, it's less insensitive. Don't be inappropriate.\" \n\nAurora gives him the middle finger using her drum stick, causing Azure to burst into another fit of snorts and giggles. Baxter, who has been pacing around anxiously since the show ended, snaps, \"Yeah, uhuh, and that random unnecessary DJ just might get us signed to his major record label! And guess what?  He may be cool, but he's sort of crazy, so you don't wanna trigger his temper. Have you seen their music videos? He bit off his own fingers once.\"\n\nThe sound of raucous laughter catches all of your attention. A slender, pale man with a buzz cut and a black janitor jumpsuit saunters through the door to the back room. He wears a name tag in a jagged metal font, and a giant grin. As he walks towards your band, he gesticulates wildly and yells, \"That was beyond filthy. I had a permanent stank face on the whole show.\"\n\nHe points at the band and says, \"You were all like, [i]weedly weedly weedly, noodly noodly noodly, pshh pashh pshh, dun don dun don dun don, brr brr brr brr[/i]!\" He energetically mimes the guitars, drums, and bass as he creates their sound effects with his mouth. Then he points at you. \"And this absolute freak of nature was like,\" he covers his mouth with both hands and starts to shout gibberish in husky tones.\n\nAzure giggles in delight, all of her apprehensiveness about the turntablist from before seeming to vanish. Tariano gives her a knowing wink, but he fiddles with his hands, seeming nervous himself now. Baxter smiles eagerly and elbows Larry out of the way. Larry groans, clutching at his ribs with a scowl. \"You don't know how stoked we are to hear that, Mr. Barty,\" Baxter says. \"So, uh, do you want to sign us then?\" \n\n*page_break \n\nBarty's intense gaze travels over the band as he considers them carefully. His hands and neck are covered in eclectic and colorful tattoos, and his hair has the shape of a pentagram buzzed into it. Aurora meets his eyes unflinchingly, while Larry makes a funny face that you expect is intended to look cool or serious but instead makes it look like he has a toothache. The DJ scratches his chin and hums to himself before finally landing his gaze on you. \n\nSweat trickles down your back and your heart rate increases alarmingly as you feel all eyes on you. Somehow, even though you just experienced hundreds of eyeballs staring at you, this feels different. You had no idea who this man was before today, and now your fate is in the palm of his heavily tattooed hand. Barty stays silent, seeming to enjoy watching you squirm, so you decide you'd better say something first. \n\n*if (tough_show) \n\tMeeting his eyes, you say, \"I saw you clearing a whole area code for yourself in the pit. I was asking myself what monster I created but now it all makes sense.\" \n\n\tBarty holds your gaze for a long time, but his eyes inevitably flick to the Necrophone. They linger there for a few seconds, glinting in curiosity. He finally shrugs nonchalantly, rubbing his undoubtedly sore neck. \"The noises you made with your mouth possessed me back there, alright?\" \n*if (charisma_show) \n\tSmiling, you say in mock-exaggeration, \"Oh, come on. We crowd surfed together.\" You hold up your hand, which is still a bit sore. \"Don't tell me that meant nothing to you?\" \n\n\tBarty snorts, makes a dismissive hand gesture and says, \"I try to crowd surf at every show, even when it's inappropriate for the genre or the energy sucks. Word of advice, never try crowd surfing at a blue grass show. That crowd had no sense of humor.\" \n*if (intelligence_show) \n\tTrying to sound more casual than you feel on the inside, you say, \"It seemed like they wanted an encore out there. Their chanting  was even louder than we were.\" \n\n\tBarty's eyes suddenly light up, and an excited grin comes to his lips as he recalls the show. \"That was epic. Reminded me of when I was in a cult a few years back.\" He scratches his chin. \"Weird times.\"  \n*if (deception_show)\n\tNot shying away from his gaze, you ask bluntly, \"Be honest, have you ever heard anyone else sing like that?\" \n\n\tBarty blinks, then narrows his eyes seriously as he studies you. After several seconds, he shakes his head and utters, \"Sing, like that? Hell no.\" \n\nAurora shrugs and says casually, \"If you liked us so much, maybe you should sign us. Just saying.\" \n\nThe turntablist looks at Aurora, giving her a charming smile that shows off one golden tooth and another silver one. \"Look, Sunshine, I thought your music was amazing, intricate, dark, and face-melting and all that. I love crazy. But lately Brain Rot's head-honchos, which ain't me, have become increasingly greedy and, for lack of a better term, a little bit neutered and safe. \n\n\"And let's be honest, quality or lucky butt rock or nu metal bands can sell more records with one big album than a death metal band could in an entire dream career. They sell out arenas and festivals, not bars and theaters.\" He looks directly at you. \"Why should those jaded legacy rock stars give a damn about you like I do?\" \n\nYou grip the Necrophone hard, its abnormally cool surface a relief on your clammy hands. This mic is why Barty has to accept you, but it's up to you to wield it. You discover that somehow you know what to say. \n*choice\n\t#Tell him that once they hear your music, the fiery teenage rebels still inside them won't be able to resist \n\t\t*goto tough_dj \n\t\t\n\t#Say that you enchanted hundreds of fans here and can enchant a million more if given a real chance\n\t\t*goto charisma_dj \n\t\t\n\t#Tell him that you are guaranteed to be a pioneer with your uniquely powerful and guttural singing\n\t\t*goto intelligence_dj \n\t\t \n\t#Tell him you've put thousands of hours of work in to become the best death metal singer in the world in secret\n\t\t*goto deception_dj \n\t\t\n\t\t*label tough_dj \n\t\t*set tough_dj true \n\t\t*set intimidating +1 \n\t\t*set charisma +1 \n\t\t*set tough +2\n\t\t(+2 Tough, +1 Charisma, +1 Intimidating)\n\t\t*line_break \n\t\tYou take a long, deep breath, trying to sound braver than you feel. \"Thirty years ago, when you were making music in your friends' basements, did they only care about money or did they just want to get every ounce of anger out of their system? Did they only care about sales, or were they standing up and saying [i]fuck you[/i] to a world that didn't care about them?\" \n\n\t\tBarty rolls his eyes dramatically and lights up a cigarette. \"Legends always die, baby. That's just how it is. We thought we could change the world and then realized that you can't change hell unless you're the devil, and even then, it's only for the worse, or for some different version of the same damn thing.\" He laughs cheerfully. \"I hate it, but it is what it is, man.\" \n\n\t\tBaxter scratches his beard, frowning thoughtfully. \"What better music than ours to unleash on the world if we really live in hell already?\" he muses, looking at Barty out of the corner of his eye. \n\n\t\tAzure bobs her head eagerly, an innocent smile on her face that you notice keeps Barty's eyes lingering. The turntablist makes a [i]touche[/i] sort of expression as he takes a long drag off his cigarette. \"The world is getting nastier every day,\" he mutters almost to himself, his eyes now distant. \"These little punks could be what us freaks and nobodies need. Angrier, more brutal and honest music than ever before to shove a mirror in our world's fugly face.\" \n\n\t\tYou can feel Barty's halfhearted defenses crumbling, almost sense that another insistent nudge could encourage him to do what he really wants, not what the head-honchos might want. \"They might scoff if you try to sign us, but they also might try to strangle you if you let us slip away and then they realize what we're capable of,\" you say.  \n\n\t\tTariano is literally hanging off the edge of his seat as he listens, and he slips and scrambles not to fall. Barty notices, and grins widely at him, then you. \"I want to send you freaky birds out of your nest, and I also don't mind getting strangled every now and again, so I guess I win either way. It looks like I'm going to make your dreams come true.\" \n\t\t*goto collapse \n\t\t\n\t\t*label charisma_dj \n\t\t*set charisma_dj true \n\t\t*set charisma +2 \n\t\t*set rebellious +1 \n\t\t*set tough +1\n\t\t(+2 Charisma, +1 Tough, +1 Rebellious)\n\t\t*line_break \n\t\tYou close your eyes briefly, calling upon the euphoric high of being in front of a screaming crowd. When you open them again, Barty is arching an eyebrow with a skeptical expression. \"I was controlling that crowd,\" you say quickly and confidently, before you lose steam. \"They had never seen us before or heard our unique style. They could have hated us, jeered at us, even thrown things at us, or worst of all, not cared and all and forgotten about us. Yet we enchanted them instead. Let us enchant a million more.\" \n\t\t\n\t\tBarty shrugs and lights up a cigarette, but he wears an indulgent smile. \"Brain Rot invented nu metal around the time you were born, and we hypnotized crowds and brought them flocking like insects to floodlights right from the beginning too.\" He snickers. \"Of course, nu metal has no problem drawing in women, so. No offense, and not to break any bubbles here, but death metal is a bit of a sausage fest, present company notwithstanding.\"\n\n\t\tAzure stretches her arms over her head, causing her crop top to lift higher up on her athletic belly, and drawing Barty's eager gaze. \n\t\t*if (attracted_females) \n\t\t\tHer stomach is shiny with sweat, and her abs are tight from all that running around. Maybe she'll wear another cute crop top tomorrow.\n\t\tShe sighs and moans as she lets her arms fall down to her sides. \"I think you'd be surprised at who thinks the world sucks and is mad about it.\" \n\n\t\tBaxter bobs his head eagerly, and gives Azure a knowing wink. The DJ nods thoughtfully as he slowly puffs on his cigarette. \"The world is getting more miserable every day, no one can deny that,\" he murmurs almost to himself, his expression becoming distant. \"Maybe these little punks are what the freaks and weirdos like us need. Something to match the anger and pain inside when the toothless, corporate music or soulless party songs of today just don't cut it.\" \n\n\t\tCovert smiles pass around the band as you all seem to get the same idea that Barty is practically on your side by now. A little more convincing, and he just might follow his heart after all. \"They might be skeptical if you try to sign us,\" you say carefully. \"Or, maybe they'll think you're a mad genius.\" \n\n\t\tTariano, who had been anxiously picking at a hangnail as he watched the conversation, winces and sucks on a resulting bloody finger, but his eyes hardly leave you or Barty. The turntablist suddenly smiles widely and lets out a goofy yet endearing giggle. \"They never take me too seriously anyways, and I am indeed a certified mad genius, so what the hell? It looks like I'm making all of your dreams come true.\" \n\t\t*goto collapse \n\t\t\n\t\t*label intelligence_dj \n\t\t*set intelligence_dj true \n\t\t*set intelligence +2 \n\t\t*set charisma +1 \n\t\t*set rebellious +1 \n\t\t(+2 Intelligence, +1 Charisma, +1 Rebellious)\n\t\t*line_break \n\t\tYou swallow your nerves and then say, \"You would be capturing lightning in a bottle, just like your band did with nu metal a lifetime ago. We're pioneers, Barty. You've never heard vocals so guttural or instrumentals so brutal and technical. Anywhere, not even in death metal.\" \n\t\t\n\t\tBarty arches an eyebrow and makes a heavily skeptical expression as he lights a cigarette. He takes a long drag, rolling his neck to look up at the ceiling. After blowing a few smoke rings into the rafters, he sighs gruffly and finally admits, \"Nope, no bands come to mind with vocals quite like yours.\" He laughs. \"At first I was like what is that, a giant bull frog? A grizzly bear snoring? Then before I knew what was happening, I was headbanging uncontrollably.\"\n\t\t\n\t\tBaxter howls with laughter, throwing his head back and clapping his hands. \"[i]A grizzly snoring. A bull frog,[/i]\" He wheezes. \"No, no. Liquid going down a drain. No, someone slurping on a smoothie through a straw!\" \n\t\t\n\t\tTariano and Azure are in a fit of giggles now, holding onto each other's arms for support so they don't fall over. Aurora cackles loudly before slapping a hand to her mouth, shooting you a guilty expression. \"An old giant burping?\" she supplies helpfully with an apologetic shrug. \n\t\t\n\t\tYou feel heat rising in your cheeks, yet you also get the feeling that remarks like those could be taken as compliments in your new world. Barty is doubled over in a fit of laughter, his face beet red as he nearly hacks out a lung. Rising with a groan, he chucks his cigarette. Seeming to notice your chagrin, he sighs and says, \"Look, kid, the instrumentals are punishing, and wicked, and so damn creative. They need the vocal intensity to match, or you're left with something lackluster and corny. But, that's where you come in.\"\n\t\t\n\t\tYou almost want to punch Baxter, who is still chortling to himself and making it difficult for you to concentrate. Smiling, you say, \"Even though I'm in a band of comedians, I still created a new sub-genre. This isn't just pushing death metal's limits, this is its limit. This is as brutal and groovy and cathartic as it gets. Brutal death metal, let's call it.\"\n\t\t\n\t\tTariano watches the conversation with rapt attention, shaking his leg so hard that his chair rattles. Grinning, Barty says, \"You guys are like a hideous, genius mutant family or something. Who am I to hide you from the world? It looks like I'll be making all of your dreams come true, for better or worse.\"\n\t\t*goto collapse \n\t\t\n\t\t*label deception_dj \n\t\t*set deception_dj true \n\t\t*set deception +2\n\t\t*set intelligence +1 \n\t\t*set mysterious +1  \n\t\t(+2 Deception, +1 Intelligence, +1 Mysterious)\n\t\t*line_break \n\t\tLooking him dead in the eyes, you say bluntly, \"I practiced for thousands of hours alone to become the best death metal singer in the world in secret. No one else in the world can sing like me, yet you never even heard of me before tonight.\"\n\n\t\tBarty blinks hard a couple times and then rifles into his jumpsuit's giant pockets. He takes out a cigarette package, lighting one up and taking a long drag. He studies you carefully, his eyes narrowed. After mulling it over for a few more seconds, he snorts, shrugs, and admits, \"I can't even say anything, that's just pure, stone cold killer instinct.\"\n\n\t\tAurora shoots you a look and wiggles her eyebrows excitedly. She clears her throat to get the DJ's attention. \"Then again, not getting signed wouldn't be such a big deal. Wallowing in obscurity for another couple years would add to our mysterious aura, I guess.\" \n\n\t\tThis causes Tariano and Baxter alike to send Aurora an angry warning glare. She smiles innocently at them. Barty seems to be deep in thought now, blowing smoke rings into the rafters with each puff of his cigarette. \"This world is getting more brutal all the time and music isn't catching up to it,\" he mutters almost to himself, his expression far away. \"Hell, it's getting more preppy and glitzy as the world grows more crazy. These little punks could be exactly what us outcasts and weirdos need without us even knowing it.\" \n\n\t\tBarty doesn't notice as excited expressions spread around the band like wildfire. You can sense that he's practically already convinced, and all you have to do now is not mess up. Choosing your words very carefully, you say, \"Maybe if you try to sign us, they'll reject us and we'll be forgotten, or stay local for years. Or maybe you'll be discovering a new alien species that will change the world.\" \n\n\t\tThe turntablist grins widely as he flicks his finished cigarette into a nearby trash can. \"Everyone gets forgotten someday, but no one says it has to be today. Who am I to alienate you genius little extra terrestrials? It looks like I'll be making all of your wildest fantasies come to life.\" \n\t\t*goto collapse \n\n*label collapse \n*page_break \n\nAs your band is whooping and cheering and fist pumping around you, a sharp burning pain in your palm nearly makes you scream in surprise. Looking down in alarm, you try to put the Necrophone down, but Kanibor has a firm grip on your flesh with his fangs. A horrible, throbbing pain goes through you as you feel him draining your blood greedily, an alien vampire. Hurriedly excusing yourself to no one in particular, you stagger towards the nearest restroom.  \n\nShoving the door open, you hurry towards the sink, nearly slipping on a wadded up paper towel on the floor in your haste. The harsh light above flickers constantly, and the mirror is covered in painted and scratched graffiti. You shakily bring a hand to your face, feeling a rush of dizziness that the flickering lights exacerbates. Blood trickles down your hand from where two white fangs protrude from the Necrophone. \n\nYour breath comes out in ragged gasps and your vision swims like a mirage in a desert as you look at your haggard reflection in the mirror. Obnoxious slurs and primitive drawings of genitalia performing inappropriate actions obscure your reflection, but it's obvious you don't look too good. Gritting your teeth, you try to gently extricate the mic from your hand, but are rewarded with a searing, ripping pain and more blood, which now dots the tiles at your feet. \n\nYou knew this was coming, but didn't expect Kanibor's feeding to be so sudden or so aggressive. Your knees wobble dangerously, forcing you to steady yourself against the sink. Black dots appear in your vision, and when you try to blink them away, they simply scatter about and reappear like a swarm of gnats biting you in the summer. Between labored breaths, you gasp angrily, \"When are you going to stop? You never said you were going to mummify me.\" \n\nNo reply as Kanibor continues to suck your blood voraciously. Your hand is entirely numb now, but searing pain travels through your arm, and your body is growing weak and cold. Your knees buckle, and you stumble hard, supporting yourself against the sink as your knees hit the floor. Gasping and panting, you gingerly tug at the mic again. More lightning pain and arterial spurting. \"That's enough,\" you croak in increasing horror. \n\n*page_break \n\nStill, Kanibor ignores you. As your vision blurs and your heart beat flutters ominously, you begin to panic. This spirit has obviously lost control, and you wonder why you ever trusted a talking microphone from a meteorite. Your mind spins as you try to think of a way to save yourself without hurting yourself even more, or perhaps even worse, attracting the attention of anyone else. \n\nThen again, you guess they would find out your secret if you were a corpse, too. Just as this delightful thought enters your mind, a knock at the door startles you. \n*if (tough_dj) \n\tThe knock comes again, harder this time. \"You okay in there?\" Baxter's voice booms. \"We were going to parade you around on our shoulders!\" \n\n\tSweat trickles into your eyes, blinding you, and saliva catches in your throat when you try to speak. \"Go parade Barty around,\" you manage to gasp out. \"I'm sure he'll love it.\" \n*if (charisma_dj) \n\tThe knock comes again, soft and polite. \"You okay, ${name}?\" Azure asks, her voice muffled. \"You didn't faint, did you? It's fine if you did. I almost fainted too, to be honest.\" \n\n\tYour head swims nauseatingly, and sweat trickles into your eyes, making you wince. \"I just need a second or two,\" you manage to gasp. \n*if (intelligence_dj) \n\tThe knock repeats softly but a bit more insistently. Tariano clears his throat and then says, \"Just checking if everything is okay in there. It's cool if you need a minute.\" \n\n\tYour head pounds and throbs with every flicker of the ugly yellow lights. Your voice catches in your throat first, but then you utter, \"How about two?\" \n*if (deception_dj)\n\tThe knock comes again after several seconds, more hesitant this time. \"Not trying to be awkward or anything, just checking you didn't accidentally fall and crack your skull or something,\" Aurora says. Then, \"Not that anyone purposefully does that.\"\n\n\tYour head pounds with every sluggish heart beat, and your eyelids feel impossibly heavy. \"I did just slip on a paper towel, but I'm alright,\" you manage to grunt.  \n\nFootsteps recede from the bathroom door, at least two people by the sounds of it. Simultaneously, you feel intense relief, and like you want to scream for them to come back. Blood speckles the tiles, appearing almost black in the flickering lights. Groaning, you force yourself to your feet with wobbling elbows and knees. Kanibor is slowing his feeding slightly, but he's still not talking or showing any signs of stopping. How much blood can a spirit in a microphone drain? You shudder and decide you never want to know. \n\nYou can hear your heart beat thudding and rushing in your ears, and your whole body is trembling like you were caught in a blizzard. Hurriedly, you look around the restroom for anything you can use to your advantage, but doubt a plunger would be very useful. You only have a few seconds to decide what to do before the blood loss becomes extremely dangerous. If you die on this restroom floor, Effie and Larry will probably feel very smug reading your obituary. \n*choice\n\t*selectable_if (tough > 9) #Ignore the pain and carefully pry him off your hand (Requires 10 Tough) \n\t\t*gosub trial_end\n\t\t*goto tough_collapse \n\t\t\n\t#Remind him that if he kills you now, you won't be able to free him\n\t\t*gosub trial_end\n\t\t*goto charisma_collapse \n\t\t\n\t*selectable_if (intelligence > 9) #Try to drown him under the faucet (Requires 10 Intelligence) \n\t\t*gosub trial_end\n\t\t*goto intelligence_collapse \n\t\t\n\t*selectable_if (deception > 9) #Make a phone call and bluff that you're revealing him to get him to stop (Requires 10 Deception) \n\t\t*gosub trial_end\n\t\t*goto deception_collapse  \n\t\t\n\t\t*label tough_collapse \n\t\t*set tough_collapse true \n\t\t*set intimidating +1 \n\t\t*set intelligence +1 \n\t\t*set tough +3\n\t\t*set kanibor +3\n\t\t(+3 Tough, +1 Intelligence, +1 Intimidating, Kanibor Approves)\n\t\t*line_break \n\t\tGritting your teeth, you grasp the handle of the Necrophone as firmly as you can with your slippery, shaking hand. You take a deep, shuddering breath and then slowly start to pull. You thought your hand was numb before, but the white hot ripping pain in your palm confirms otherwise and nearly makes you black out. Kanibor holds on tightly with his fangs, grumbling and snuffling disturbingly like a giant beast trapped within a tiny body. \n\n\t\tTaking long, deep breaths, you sit down on the floor and brace yourself against the wall. You feel incredibly woozy, and your hand is like lead as you wrap your fingers around the mic's handle again. Grimacing and fighting through the tears burning your eyes, you slowly but surely pull Kanibor until his teeth come out with a stomach-turning [i]shluck[/i]. With an angry shout, you bash the Necrophone onto the sink. It scratches and then chips the porcelain but remains unharmed itself. With disgust, you hurl it across the room. \n\n\t\tYou expected your hand to be gushing with blood, but are astonished to see that the wound is quickly sealing before your eyes. The burning, biting pain is gradually dulled by a warm, strangely pleasant sensation. Forcing yourself to your feet on clacking knees, you stagger to the sink, splashing your face with cold water and taking several gulps to sate the intense thirst you only just noticed. \n\n\t\tYou splutter and choke when Kanibor says, [b]\"Something came over me,\"[/b] half out of surprise and half out of indignation. You spin towards him and immediately wish you hadn't. Intense vertigo threatens to take your knees out again, and you have to support yourself against the wall. [b]\"I had ignored my thirst too long, and the sweetness of your blood...Your strength saved us both, and I will not forget.\"[/b] \n\t\t\n\t\tA fresh wave of adrenaline gives you a rush of energy you didn't know you still possessed. So he was cognizant all along and just ignored you after all? \"You're a glutton and a liar,\" you protest with venom. \"You tried to kill me!\" \n\t\t*goto robbed\n\t\t\n\t\t*label charisma_collapse \n\t\t*set charisma_collapse true \n\t\t*set charisma +2 \n\t\t*set chill +1 \n\t\t*set intelligence +1\n\t\t*set kanibor -1\n\t\t(+2 Charisma, +1 Intelligence, +1 Chill, Kanibor Disapproves)\n\t\t*line_break \n\t\tYou swallow hard, stinging your parched throat as you try to gather your muddled thoughts. You can feel them swirling away like soap suds down a drain. Holding the Necrophone up to your face, you speak to where his fangs are buried in your flesh. \"So this was your plan all along, to get blood drunk and then waste away in a microphone forever? Who's going to get you out if I become a mummy, dumbass?\" \n\n\t\tMaddeningly, Kanibor continues to ignore you, gulping greedily. Your face is bathed in sweat and your entire body is racked with shivers. Sinking into the floor, you crawl to the wall and lean against it, panting for air that feels so thin and stale. You're surprised when tears of pain tumble down your cheeks, and you find that you're terrified. \"I said stop,\" you groan weakly, struggling to keep your head upright. \n\n\t\tPanicking, you tug at the mic again, and have to clamp your mouth shut not to scream. Or, maybe you should scream. Death has to be worse than being found bloody on the bathroom floor. It's only then that Kanibor finally speaks. \"[b]You're not going to die, human,\"[/b] he says, his voice repulsively husky and sloppy with blood. \"[b]I need you. I need you. Just a few more sips and you will feel very tired and fall asleep, and wake up right as rain.\"[/b] \n\n\t\tDarkness is rushing in now like the night in winter. Shaking uncontrollably, you slump onto the floor, muttering unintelligible protests to Kanibor. You struggle to keep your eyelids open, and your body feels more cold and distant by the second. \"The deal is off,\" you rasp, using all of the energy you can muster to push the slurred words past your lips. \"We're done, you vampire.\" \n\n\t\tJust as you can feel yourself slipping into unconsciousness, the spirit withdraws his fangs, causing you to jolt and whimper sluggishly with temporary relief. [b]\"No,\"[/b] he says, panting like a drooling dog. \"[b]You're not rich and famous, and I am not free. We're not done until I say we're done, you simple, weak primate.\"[/b] \n\n\t\tThen everything becomes fuzzy and melts into darkness. \n\t\t*goto robbed\n\t\t\n\t\t*label intelligence_collapse\n\t\t*set intelligence_collapse true \n\t\t*set intelligence +3 \n\t\t*set tough +1 \n\t\t*set intimidating +1 \n\t\t*set kanibor +3 \n\t\t(+3 Intelligence, +1 Tough, +1 Intimidating, Kanibor Approves)\n\t\t*line_break \n\t\tHolding your injured hand under the faucet, you crank both of the handles with shaky movements, causing them to screech gratingly. Water gushes out of the faucet in a messy stream, covering the skull microphone like a waterfall. The shock of the lukewarm water on your wound is like lava, and you have to bite your tongue not to scream. You hate how this is becoming a thing. Your eyes widen in alarm as your blood turns the water flamingo pink. \n\t\t\n\t\tYet to your immense relief, your plan seems to be working. Snuffling, spluttering noises come from the microphone, and Kanibor slows his feeding drastically. Sharp, ripping pains travel from your hand up through your arm as his teeth quiver and shift stubbornly in your flesh. Gritting your teeth, you carefully pry Kanibor off, and his fangs easily come free despite his sluggish struggles. Disturbed, you watch the fangs recede into the mic.\n\t\t\n\t\tWhatever monster is inside this microphone obviously hates water like a cat. Maybe you've figured out a secret weapon against him. With a disgusted grunt, you hurl the microphone across the room. It spirals through the air, spraying water and blood in a prism, before bouncing hard off the wall. Gasping for breath, you turn the water off and slump against the wall, slowly sliding to the floor. \n\t\t\n\t\tGrimacing, you cradle your hand against your chest, and then slowly bring it your eyes, afraid of what you'll see. You're stunned to see that the bleeding has stopped, and the wounds have already healed over. Even in the flickering light, you can make out the crusted blood and fresh, sensitive skin. More dark magic, or alien technology, you wonder, your thoughts racing.  Kanibor's rumbling voice nearly gives you a heart attack. [b]\"I gave in to my urges,\"[/b] he rasps. [b]\"Your resourcefulness saved us both, and I will never forget it.\"[/b]\n\t\t\n\t\tYou make to stand and are rewarded with intense vertigo. Swaying hard, you clap your good hand on the floor to steady yourself. You scowl at the skull microphone which glimmers ominously in the haphazard light. \"Are you insane? Why should I free you from that mic now? You would have left me a husk on the floor!\" you say with contempt. \n\t\t*goto robbed \n\t\t\n\t\t*label deception_collapse \n\t\t*set deception_collapse true \n\t\t*set deception +3\n\t\t*set charisma +1 \n\t\t*set intimidating +1 \n\t\t*set kanibor +3\n\t\t(+3 Deception, +1 Charisma, +1 Intimidating, Kanibor Approves)\n\t\t*line_break \n\t\tStuffing your hand into your pocket, you yank your phone out so quickly that your weak grasp nearly sends it flying. Even with Kanibor draining your blood, you force yourself to take deep breaths to regulate. You're all alone here, and if you panic, you could die. Leaning against the wall, you slide to a sitting position and dial Baxter's number. Just as you expected, you can't get any reception in here: zero reception bars, flashing. \n\t\t\n\t\tYou curse aloud, causing your voice to echo around the small restroom, but you were secretly counting on having no service. You hope aliens understand ancient human technology as well as they do death metal. Shoving your phone in front of the skull microphone's dead eyes, you say angrily, \"If you're going to drain me into a husk, I'm telling everyone about the evil microphone I found in a meteorite. I'm calling Baxter now.\"\n\t\t\n\t\tYou check your phone's display one last time before jamming it to your ear. Still no service. You don't have to pretend to sound panicked with the nightmarish flickering lights and the searing pain in your arm. \"Baxter, you have to get in here. I know I've been acting strange, and I'm finally telling you why. But I need your help before it's too late. [i]Hurry.[/i]\"\n\t\t\n\t\tYour head swims, and the sink seems to rock side to side like a boat in a storm. Yet Kanibor's feeding seems to be slowing. [b]\"You're betraying me?\"[/b] the spirit snarls thickly, his guttural voice popping grotesquely with blood. [b]\"I told you this was my price and you're dooming us both?\"[/b]\n\t\t\n\t\tYou're being victim blamed by a vampire microphone. Now the throbbing in your head feels like you're being pounded with a mallet. Your eyes are squeezed shut as you gasp, \"Baxter, hurry. You're never going to believe me, but this microphone is sucking my blood. It contains a spirit named Ka-\"\n\t\t\n\t\tYou jolt and cry out from sharp pains in your palm, and are flooded with relief as Kanibor releases his fangs with a disgusted, contemptuous grunt. You can barely believe it when you see that the wounds on your palm are healing before your very eyes, turning into fresh, sensitive skin. You jolt again when Baxter finally picks up. \"This isn't weird. What's-\"\n\t\t\n\t\tSnapping your phone shut, you clumsily stuff it into your pocket. Another mini heart attack. You have to close your eyes to fight the intense vertigo from the flickering lights and lightheadedness. \"It was all a bluff, you idiotic bastard. At least one of us knows how to pull their punches, because you would have killed me!\"\n\t\t*goto robbed \n\n*label robbed\n*page_break \n\n*if not(charisma_collapse)\n\tThe bathroom door suddenly creaks open. You can only watch in horror as Larry sneakily steps inside, locking the door behind him. You must have forgotten to lock the bloody door in your haste. Never again, you vow silently to yourself. He looks around the room with wide eyes and a puzzled expression, taking everything in silently, shrewdly. \n\t\n\tThe Necrophone lies on the floor by Larry's feet, and this hasn't escaped his notice. He casually leans down and picks it up. This causes a visceral reaction inside of you. Not him, of all people. Under the malfunctioning light, he almost looks like a lion grinning at his prey. \"Has your secret weapon become too much to handle?\" he gloats darkly. \"How does it work, anyway?\"\n\t\n\t*if (tough_collapse)\n\t\tYou scowl at him, tucking your injured hand against your thigh as you step away from the sink and a bit closer to the mic. \"I don't know what you think you're talking about. Give that back, now. And then get out of here, you creep.\"\n\t*if (intelligence_collapse)\n\t\tYou glare at him, wiping your hands dry against your pants as you move slightly closer to him. You can't believe you're thinking this, but he's almost as bad as Kanibor. \"You're obviously very confused, talking gibberish and barging into private places. Give that back, and then get the hell out of here.\"\n\t*if (deception_collapse)\n\t\tYou glower at him, suddenly wishing that you had stayed on the phone with Baxter for a couple seconds longer. You'd love to see him pick Larry up with his giant hands and give him shaken baby syndrome. You edge closer to Larry, demanding, \"What are you doing in here you psycho? Give that back, and then get out.\"\n*if (charisma_collapse)\n\tA loud, prolonged squeaking noise pulls you out of the fog. Forcing your eyelids open, you shield your eyes from the abrasive light, and see a figure creeping through the bathroom door. You already know who it is, you realize with increasing dread. Larry locks the door behind him -why didn't you remember to lock the damn door?- and observes you on the floor with a mixture of surprise and excitement on his angular face. He immediately notices the Necrophone by his feet, and casually scoops it up. \"What'd you do, blow a lung out?\" he cackles cruelly. \n\t\n\tYou shake your head, trying to rid your mind of its cobwebs quickly. Evidently Larry takes this as your rebuttal, because he laughs mockingly. His laugh makes your insides squirm. Who knows what a creep like Larry will do to you when you're in such a vulnerable state? As you force yourself to your feet with shaky, aching limbs, Larry kneels down and picks up the Necrophone, observing it with marvel. \"You shouldn't be in here,\" you gasp. \"And that's mine.\"\n\t\nLarry appears more interested in the stolen mic than you. He turns it over slowly in his hands, seeming almost transfixed at the grimacing skull staring back up at him. You edge a bit closer, but your shoes squeak on the tiles, breaking him out of his reverie. He grins nastily at you and puts the Necrophone in his jean's belt loop. \"I don't know if this thing is like foreign technology or your own invention or alien technology or whatever, but it's mine now! Let's see how good of a death growler you are without cupping a fancy mic, you fucking prick.\"\n\nPanic is starting to set in again. You're still reeling from Kanibor's attack, and the loss of blood makes it feel as though your thoughts are moving through mud. All you know is if you lose that microphone, your life could be in shambles all over again times two. You can't sing like that with a normal mic or you'd blow your vocal chords out. Keeping his cold eyes trained on you, Larry backs up, making to leave. \"I'm beginning to think you don't like me very much,\" you blurt out sarcastically, trying to stall. \n\n*page_break \n\nLarry's hand rests on the doorknob. It seems to be quivering, but it could be the hellish yellow lights that won't stop flickering. His smile is wide and toothy, but his eyes are baleful and ablaze and his voice is laced with deep spite. \"Don't like you?\" he scoffs. He leans forward, gesticulating aggressively and emphasizing each insult. \"Why would I [i]dislike[/i] the [i]lucky ass, cheating poser[/i] who swooped in and ruined my life? I don't [i]dislike[/i] you. You're nothing to me. And without this mic, that's all you'll be to anyone else.\"\n\nYour stomach drops into your ${shoes} as you inch closer under cover of the haphazard lights. Larry has obviously had a vendetta against you ever since you met outside that storage unit and accidentally stole his career from him. Now you're seeing the kind of person you're really up against. He pushes himself away from the wall and reaches for the door handle again, but you pace closer to keep him distracted. \"I promise, you [i]really[/i] don't want that mic,\" you say. \"I thought I did, and look at me.\"\n\nAs if on cue, a horrendous gurgling, retching noise suddenly emanates from the Necrophone. Your eyes widen, and Larry jerks in alarm as chunky, coagulated blood seeps from between his fingers. [i]Your[/i] chunky, coagulated blood, you realize, spitting up acid a bit in your mouth. Larry yelps and nearly drops the mic, but then clutches it covetously to his chest, scrambling to press his back up against the wall. He glares at you as though you were responsible. \"What did you [i]do[/i] to this thing, you freak?\" he snarls at you in his death metal growl. \n\nThat was the first time you've heard his 'singing' voice. Those raspy growls aren't a patch on your bestial gutturals and feral highs. Anyway. That's an irrelevant detail if he manages to steal the Necrophone. This could be your only chance to try to get it back while he's off balance. You make a split second decision on how subtly you want to try to deal with such an impossible person. \n*choice\n\t#Threaten to break his leg if he takes your microphone\n\t\t*goto tough_robbed \n\t\t\n\t#Tell him that you will have nothing without that microphone\n\t\t*goto normal_robbed \n\t\t\n\t*selectable_if (charisma > 9) #Make up an elaborate story about how you perform cultist rituals on the microphone to try to scare him (Requires 10 Charisma)\n\t\t*goto charisma_robbed  \n\t\t\n\t*selectable_if (intelligence > 9) #Tell him that the microphone is designed to only work for you because you invented it (Requires 10 Intelligence)\n\t\t*goto intelligence_robbed  \n\t\t\n\t*selectable_if (deception > 9) #Tell him that you put barbs on the handle to elicit actual screams of pain, and therefore more brutal and authentic vocals for your performances (Requires 10 Deception)\n\t\t*goto deception_robbed  \n\t\t\n\t\t*label tough_robbed \n\t\t*set tough_robbed true \n\t\t*set deception +1 \n\t\t*set intimidating +1 \n\t\t*set tough +2\n\t\t(+2 Tough, +1 Deception, +1 Intimidating)\n\t\t*line_break \n\t\tYou pace closer to Larry, no longer being subtle. Your voice hard and cold and barely over a whisper, you say, \"Give me back that mic, or I'm going to break your scrawny, blue jean wearing leg and take it from you.\"\n\t\t\n\t\tLarry's eyes flash, and a mocking grin spreads across his lips. He lifts the mic over his head like a club and slowly, deliberately advances. \"You mean this mic I'm going to whoop your little ass with?\" he sneers with exaggerated glee. \n\t\t\n\t\tYour stomach twists with nerves, and anger at yourself. For some reason, probably the blood loss, that neanderthalish idea hadn't occurred to you. The next several seconds go by in a frenzied blur. Larry charges you suddenly, swinging the mic towards your head. Lights flash overhead and the squeaking of ${shoes} echoes around the bathroom as you dodge the blow and wrap your arms around him, tackling him against an air dryer. \n\t\t\n\t\tLarry is deceptively strong for someone so skinny, and you find yourself struggling with all your might just to keep him shoved against the air dryer. Your limbs feel heavy and slow, and your stamina is draining fast, but you have a moment of satisfaction when he grimaces from a corner digging into his back. You hope he gets a pretty bruise there to remember you by. With a wordless snarl, he elbows you hard in the ribs and then bashes you in the chest with his shoulder. \n\t\t\n\t\tTaken completely off balance, you stumble and fall hard against the wall, nearly knocking over the thick plastic trash can as your arm bangs into it. You despise this restroom. A second later, Larry is towering over you, panting hard and holding the Necrophone above his head. Instead of hitting you, however, he instead lowers the mic and spits on you, hitting you on the arm with gross, foamy saliva. \"You're weak, and pathetic,\" he rasps. \"And now you're back to being nothing.\"\n\t\t\n\t\tStill panting, Larry trudges across the room, opens the door, and is gone. You lie there on the floor for several seconds, too exhausted and sore to move, aside from wiping his nasty spit off your arm with a paper towel. Eventually, you force yourself to your feet. \"And you're an opportunistic low-life,\" you mutter at the door, a few minutes too late. \n\t\t*finish \n\t\t\n\t\t*label normal_robbed\n\t\t*set normal_robbed true \n\t\t*set chill +1\n\t\t*set charisma +2 \n\t\t*set intelligence +1 \n\t\t*set larry +1\n\t\t(+1 Chill, +2 Charisma, +1 Intelligence)\n\t\t*line_break \n\t\tIt's a long shot, but you're completely vulnerable, and not in any kind of position to be making demands. Even if you end up humiliating yourself, you have to take a chance that Larry has a conscience somewhere in that greedy little heart of his. At the very least, he can't be worse than Kanibor, or Effie. \"Larry, wait,\" you plead.\n\t\t\n\t\tHe was turning to the door, but pivots sharply back to look at you. Frowning in surprise, he snaps impatiently, \"What? What could you possibly have to say that I would care about?\"\n\t\t\n\t\tHe was waiting for you, despite appearances to the contrary. He wants to argue, which gives you a chance. You swallow, trying to catch your breath. \"Before we first met outside of that storage container, I was already walking a tightrope above a cliff. I was fired from my job because I was late after a cop pulled me over. Then my car died in the parking lot. Without this band, without that mic, I'm going to be homeless. Don't let me become invisible, Larry.\" \n\n\t\tLarry rolls his eyes dramatically, rolling his head with them. \"Let me get my tiny violin and I'll play a really melancholy song for you,\" he sneers. \"Where do you think I'd end up after you kicked me out of my own band, on a sandy beach vacation? No way in hell am I working at a failing music store selling bubble gum pop shit to normies till I blow my brains out.\" \n\n\t\tFor good measure, he gives you the middle finger and a spiteful laugh before wrenching the door open and disappearing. Crestfallen, you can only watch him go hopelessly. Maybe you were foolish to try to appeal to his compassion, but at least you know exactly who you're up against now. An obnoxious, dangerous asshole. \n\t\t*finish \n\t\t\n\t\t*label charisma_robbed\n\t\t*set charisma_robbed true \n\t\t*set charisma +3 \n\t\t*set intimidating +1 \n\t\t*set deception +1\n\t\t(+3 Charisma, +1 Intimidating, +1 Deception)\n\t\t*line_break \n\t\tYou laugh acerbically. \"You call yourself a death metal singer and you get the heebie jeebies from a little blood? Why don't you just hand that mic back before you embarrass yourself?\" \n\n\t\tLarry sneers at you but eyes the Necrophone with obvious disgust. \"That's like a bio hazard. You could have AIDS or Ebola or something for all I know. And you don't seriously believe in that cult stuff do you? It's all part of the entertainment business, obviously. No one actually believes in magical rituals and demons, dumbass.\" \n\n\t\tCreeping closer to him under cover of the flashing light, you widen your eyes and say in a mysterious voice, \"Whether you believe in the arcane or not, I performed the rituals on that mic. You know, just the standard stuff.\" You wiggle your fingers dramatically. \"Taking mushrooms, and making potions under the moon with my blood to be used on nights where I'm going to perform, et cetera.\" \n\n\t\tYou notice Larry eyeing the sink and paper towel dispenser longingly, and feel a bit of satisfaction when you see that the dispenser is actually empty. He scoffs angrily at you and clutches the Necrophone even tighter to his chest, moving closer to the door. \"So, what, you're telling me it's cursed? Do your worst, psycho; you already tried to get me kicked out of my own band! But we'll see who's getting kicked out now when your poser ass doesn't have this mic.\" \n\n\t\tScowling, you run towards him, arms outstretched, and he scrambles out of the restroom with a look of sheer alarm. Your satisfaction is short-lived as he slams the door shut behind him. Before you have even reached the door, an intense head rush sends you keeling against the wall, clutching at your forehead. \"Gullible idiot,\" you mutter sourly, though it does little to make you feel better. \n\t\t*finish\n\t\t\n\t\t*label intelligence_robbed\n\t\t*set intelligence_robbed true \n\t\t*set intelligence +3\n\t\t*set deception +1 \n\t\t*set mysterious +1 \n\t\t(+3 Intelligence, +1 Deception, +1 Mysterious)\n\t\t*line_break \n\t\t\"A bloody handle should be the least of your worries when it comes to [i]my[/i] microphone,\" you say coldly. \"You have no idea how to use it, and you never will, because I invented it. To you, it will be nothing more than a cool prop, or maybe a Halloween decoration.\" \n\n\t\tLarry's expression is full of condescending doubt. \"Yeah, I'm sure,\" he drawls. \"Let me guess, you need a fingerprint to use it. Or don't tell me it's DNA activated only? Where did you create this technology, the secret lab in your mom's basement?\" \n\n\t\tHe forces a spiteful laugh at his own joke but flinches and almost chokes when you pace closer. \"Don't believe me, then,\" you say bluntly. \"You'll look like a fool when you try to use a mic that doesn't work. Besides, everyone knows the Necrophone is mine. Do you seriously think no one is going to notice?\" \n\n\t\tLarry scrunches his nose up and sneers, \"[i]Necrophone?[/i]\" Then he gives you a maddening, toothy grin. \"Snitch all you want. If this mic does turn out to be a glorified toy, then you'll be just as useless without it as I will be with it. Tell me, why do you need a specially invented mic to death growl? What happens when you use a normal mic like any other chump?\" \n\n\t\tOkay, now Larry is just making your head feel like it's going to explode with frustration. You lunge at him, arms outstretched, and he jerks away, eyes wide, and smacks into the door with a grunt. Your satisfaction is short lived as he quickly wrenches the door open and disappears. Before you can reach the door, you stagger and fall against the wall, clutching your head. \"Dammit,\" you grunt, hanging your head. \n\t\t*finish\n\t\t\n\t\t*label deception_robbed \n\t\t*set deception_robbed true \n\t\t*set deception +3\n\t\t*set tough +1 \n\t\t*set intimidating +1 \n\t\t(+3 Deception, +1 Tough, +1 Intimidating)\n\t\t*line_break \n\t\tYou creep forward, wearing a wry smile as you say, \"Barbs on the handle. I use them to elicit real screams of pain when I'm performing. It's more authentic and brutal that way, but the cleaning afterwards is torture. No pun intended.\"\n\t\t\n\t\tLarry edges away from you warily, his jaw clenched. His eyes flick to the Necrophone and then back up to you. \"I'll admit, that's metal as hell, but you're still certifiably insane. Why mutilate your own hands when growling hurts like lava half the time anyways? The first thing I'm doing to this mic is adding red eyes. The second thing I'm doing is smoothing over those masochistic barbs.\"\n\t\t\n\t\tYou roll your eyes heavily but wish you hadn't a second later when the trippy lights seer your retinas. Blinking away the water in your eyes, you inch closer and say coldly, \"You're not going to destroy my mic trying to water it down and bastardize it. A special mic isn't going to save you if your singing is hopeless against mine. And by the way, your voice shouldn't hurt like lava when you growl, dumbass.\" \n\n\t\tLarry's face contorts in anger. He glares at you and bears his teeth, looking more like a lion than ever as he snarls, \"It's my mic now so I'll do whatever I want with it. You may be a masochist but I've always preferred sadism myself because I'm not a fucking weirdo like you.\" \n\n\t\tClenching the air in front of you and groaning in frustration, you stomp towards Larry. He scrambles away so fast that the restroom is filled with the infernal shrieks of sneakers on tile. Just before you can grab onto him, a head rush sends you crumpling against the wall for support. A second later, Larry is gone. You let out a great, prolonged sigh that can't possibly express the frustration you feel. \"Dammit.\" \n\t\t*finish \n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\n*page_break\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*return\nRemember earlier how we told you that the first three chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n\t*subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2025-09-11 $4.99 $2.99 purchased\n*abort", "chapter4party": "*temp party 0\n*temp flirt 0\n\n[b]Chapter Four of Eight: The Eviction Notice[/b]\n\nYou didn't tell the band that Larry stole your microphone. How could you, when that could jeopardize everything? With any other mic, you would only embarrass yourself trying to sing in an extreme metal band. Even if you eventually learned how to do it yourself, you could surely never match up to Kanibor's otherworldly abilities, at least not long after getting fired. Right now, that mic is the only thing that might salvage your crumbling life.\n \nWhen Baxter drops you off at your apartment in his big black van, you're so impossibly tired that you barely notice everyone's cheerful farewells. No one could stop talking during the drive. Baxter and Tariano were debating on how quickly and how dramatically they would quit their day jobs, and Azure and Aurora were day dreaming about all the cool things they would get for their pets with their signing money.\n\nYou weren't doing any of that, unfortunately. You were ruminating on how to reclaim your stolen microphone from Larry instead. Obviously, he found his own way home to avoid you. As far as you can tell, the next good opportunity you'll have is tomorrow at Barty's music studio where you're going to party, and then record your first single. Tomorrow. That seems like it's coming at you like a heart attack. You climb out of the van in a bit of a daze and trudge down the uneven sidewalk to your apartment building. \n\n*if (((baxter > tariano) and (baxter > azure)) and ((baxter > aurora)))\n\tA van door opens and shuts, and then Baxter is jogging towards you. He flashes you an uncertain smile through his bushy beard. \"Hey,\" he says, clearing his throat and resting his hands on his hips. \"Look, I feel sorta bad because I was the one who dragged you into all of this and I can tell it's a lot. So if you wanna like smoke some weed or chat about stuff sometime or whatever, I owe you.\" He blushes mildly and looks around. \"I just mean you've got support.\" \n*if (((aurora > tariano) and (aurora > azure)) and ((aurora > baxter)))\n\tA van door slides open, and then Aurora is jogging around the van to you, her combat boots clopping loudly on the ground. She stuffs her hands into her jean pockets as she approaches you, looking almost apologetic. \"Hey. I wanna say, I know all of this is unreal and I can tell you're sorta struggling.\" She clears her throat and kicks a pebble. \"I just mean, I'm a good listener if you ever need it or whatever.\" \n*if (((azure > tariano) and (azure > baxter)) and ((azure > aurora)))\n\tA van door slides open, and then Azure is running towards you, waving a hand over her head. She tugs her crop top down a little as she approaches, shivering from the cold. \"You look like a zombie,\" she says, eyebrows creased in worry. Making claws at you, she says, \"Arrgh.\" She clears her throats and scuffs her shoes in the dirt. \"I just mean, I can see you're kinda struggling, and I'm here if you need someone to talk to.\" \n*if (((tariano > baxter) and (tariano > azure)) and ((tariano > aurora)))\n\tThe passenger door of the van opens, and then Tariano is jogging after you. He smiles uncertainly as he approaches. \"Hey, ${name}, you look like your batteries are completely drained.\" He runs a hand through his long curly hair, looking up at the silver moon. \"I just mean, this has to be hard for anyone, right, all this change? I'm here if you need someone to listen.\" \n\nYou blink, taken aback by the sudden warmth. Too exhausted to formulate a better reply, you smile, murmur a thanks, and continue on your way. You continue along the sagging sidewalk, past the droning street lamp, and through your shabby apartment building to your tiny unit. The second you reach your front door, your heart plummets as you see an ominous envelope taped to the door. Home sweet home. \n\n*page_break \n\nTrudging inside your modest, lightly furnished apartment, you sink  into the couch with a growing feeling of dread. Mechanically, you rip open the envelope and read the letter inside. Bold red letters at the top give you a miniature heart attack. \n\n[b]Eviction notice.[/b] You read the subsequent paragraphs several times, but it doesn't get any better. [i]Failure to comply to rental payment agreements.[/i] [i]Must vacate premises within thirty days.[/i] They may as well have said '[i]go invent a cloning machine, make a clone, and go fuck yourself!'[/i]\n\nWith a beleaguered sigh, you set the paper down on your coffee table, rubbing your eyes with the palms of your hands until you can only see kaleidoscopes. This is what has been giving you existential dread for weeks, what has been making all of your other problems seem like disasters culminating towards something terrible and inevitable. \n\nRight now, the only money you have to your name is the 100 credits you got for playing the show at the bar. It would have been even less, but Larry insisted on sabotaging his own career and not playing. Still, it's not like you're complaining; that's more than you made at Cost Slicer, for less hours. Anyhow, those credits will allow you to scrape by for a few more days, but they won't save your car from the junkyard or you from the streets for long. \n\nWithout your secret weapon, your future looks all but impossible. Bitterly, your mind travels back to your encounter with Larry in the bar restroom. \n*if (tough_robbed)\n\tThe top of your chest just below your neck, and the ribs on your left side are tender to the touch, and they ache when you breathe too deeply. You want to get your hands on that bastard when you aren't woozy from being Kanibor's dinner and dessert. \n*if (normal_robbed) \n\tIt's obvious you could have told him you were trying to save your dying mother from cancer and he wouldn't have cared. Well, if it's his desire to escape his miserable job over your fight for survival, he's going to be sorely disappointed. \n*if (charisma_robbed)\n\tA sarcastic smile comes to your lips as you remember how much your cultist tale got under his skin. There has to be a way to use that to your advantage later: perhaps somehow getting Kanibor to play along somehow? \n*if (intelligence_robbed)\n\tEven though you're itching with anxiety, in the back of your mind, you're comforted by the fact that the Necrophone should only work for you. Surely Kanibor has to be just as careful as you are, or he could remain imprisoned in that mic. Surely. \n*if (deception_robbed)\n\tYou roll your eyes and grumble to yourself. He'll quickly discover that there are no barbs on the Necrophone, but it was such a brilliant, creative lie that it's a shame it didn't work. \n\n*if (ticket) \n\tUnfortunately, most of the money you earned playing at the bar will have to be sacrificed to pay for your traffic ticket. The thought of having to burn all your credits on frivolous, imaginary things is almost unbearable, but you don't need disasters culminating any more than they already have with a warrant for delinquent fines. \n*if not(ticket) \n\tEven though you artfully evaded a ticket from that overzealous cop, it's not much solace when you still have a mountain of bills to pay. Still, maybe you can afford some smaller comforts in the meantime while your world is teetering on the edge of a cliff. \n*if (intelligence_effie) \n\tTaking out your phone, you curiously check your email, and are elated to see that your union representative has already replied to you. The good news: they are confident they'll be able to secure you a severance package of at least a week's pay. The bad news: it could take weeks to arrive since Effie and Cost Slicer predictably aren't being very cooperative. Small victories. \n*if not(intelligence_effie) \n\tAbsentmindedly, you take out your phone and check your email. Just the usual junk: openly corrupt political parties you have no affiliation with groveling for donations, obvious scammers telling you your bank account has been jeopardized, and multiple loan agencies trying to convince you to take out obviously predatory yet undeniably enticing monetary loans. \n\nYour weary eyes flick to the eviction notice with its bright red ink at the top of the page. You realize glumly that the letter is two days old, so you don't even have a full thirty days before the might of the government comes to the poor apartment's defense. You've been so busy with ${band} that you've hardly been home to change clothes and grab an overnight backpack since finding the Necrophone. Well, you guess there's only one thing to do now. \n*choice\n\t#Lie in bed and listen to music until you fall asleep\n\t\t*goto tough_eviction \n\t\t\n\t#Cry in the shower\n\t\t*goto charisma_eviction\n\t\t\n\t#Call Baxter and ask him how quickly your band can make serious money\n\t\t*goto intelligence_eviction\n\t\t\n\t#Throw the letter away and make some ramen\n\t\t*goto deception_eviction\n\t\t\n\t\t*label tough_eviction \n\t\t*set tough_eviction true \n\t\t*set chill +1 \n\t\t*set charisma +1 \n\t\t*set tough +2\n\t\t(+2 Tough, +1 Charisma, +1 Chill)\n\t\t*line_break \n\t\tYou're surprised at your own desire to blast more music after just playing in a skull-rattling show yourself. Yet as unbelievable as that experience was, there's nothing so cathartic as getting lost in your favorite songs in private. Pushing yourself up from the couch, you trudge down the narrow hallway to your bedroom. You turn your old speaker on, sluggishly change into pajamas, and collapse into bed. \n\n\t\tStaring at the ceiling, arm dangling off the side of the bed so you can press the speaker's buttons, you flip through your playlists until you find something that fits the occasion. No one has ever written any songs about bloodsucking alien microphones as far as you're aware, but there are plenty of songs about the crushing weight of modern existence. \n\n\t\tYou turn the volume all the way up, filling your small room and making the window rattle and hum gently in its pane. Your temples and forehead throb with a headache, but at this point there's no point in trying to avoid it. It occurs to you that you'll probably get a noise complaint or two, but what are they gonna do, evict you? With a throaty chuckle at your own wit, you close your eyes, allowing the music to wash away your worries for a few minutes. \n\n\t\tFor a while, you're transported to another world that exists solely on your little bed. You tap your fingers and wiggle your shoulders to the rhythm, seeing the melodies in abstract shapes and colors. Slowly, you feel yourself sinking deeper into the mattress, your body growing heavy and pleasantly warm. For a few precious moments, you forget where you are, and about all the problems snapping at your heels like a pack of wolves. \n\n\t\tAs you start to drift off to sleep, you have the presence of mind to turn the speaker down to a low volume. Only then do you notice the faint scratching of a branch swaying in the wind against your window. The branch creates jagged, spidery shadows that play across the ceiling as car headlights pass by. Even dead tired, it seems you won't be able to escape into the bliss of sleep that easily. \n\t\t*goto indulge \n\t\t\n\t\t*label charisma_eviction\n\t\t*set charisma_eviction true \n\t\t*set charisma +2 \n\t\t*set intelligence +1 \n\t\t*set chill +1\n\t\t(+2 Charisma, +1 Intelligence, +1 Chill)\n\t\t*line_break \n\t\tIn a sort of a daze, you push the letter away and trudge to the bathroom. You peel off your sweaty clothes and discard them as you go, leaving a trail of laundry behind you like a snake shedding their skin. When you turn on the ceiling fan, it whines and then shrieks like a banshee, so you quickly turn it back off. Maintenance hasn't fixed that bloody fan properly since you've been living here, and you guess they're off the hook now. What are you going to do, report them?\n\n\t\tAs you get into the shower and turn the faucets on, you can already feel the emotional barriers that you've kept in check for days starting to crumble. A painful lump grows in your throat, and hot tears well in the corners of your eyes. The shower's water pressure is lackluster, coming out in a short, irregular stream, but it feels wonderful nevertheless on your aching body. \n\n\t\tFor several minutes at least, you stand there in silence, tears flowing down your cheeks. Steam gradually fills the room, fogging up the mirror and creating a haze. Distinctly aware that hot water never lasts very long in your apartment, you sit in the tub, hugging yourself and letting the water rush over your head like you were a  giant standing under a hot waterfall. \n
