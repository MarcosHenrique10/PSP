squeal again and look back at Jay pulling the swinging gate open.\n\nA flash of lightning reveals something else hidden well within the mist for only a split second. Just beyond the gate, rests an entity so daunting your mind can't fully fathom what it saw in so short a time. Just the brief glimpse, the inconceivable fraction of a second that your eyes bore witness to its bewildering husk, was enough to poison your heart with an inexplicable sense of overwhelming dread.\n\nLight flashes again, but this time, it isn't lightning. Images of stone, iron, and wood fused together, eclipsed by shadows dancing around you, invade your mind. Your perspective switches to that of the girl running for her life down a long unlit corridor. Her heart fueled by the fear of something chasing her. She stumbles repeatedly over fractured wood and rubble. Then, like with all visions, you're transported back into reality and stumble to your knees by the shock of suddenly being thrust back into your body.\n*page_break\n*set Battery 31\n“${Name}!” Jay shouts. He rushes over and helps you up. “Another one?” he asks.\n\n“Just a- Just a flashback.”\n\n“Anything useful?” He pulls you up, but you immediately slip on the wet clay and nearly hit the ground again. Luckily, his body weight against yours keeps you on your feet. Before you can reply, he tugs on your arm, “I think I see something up ahead. We can probably find shelter there!”\n\nHe pulls open the gate again and the rusted hinges shriek. Inside, the trees thin and the muddy road becomes overgrown with tall wild grass. Neatly placed rocks line the edges of the roadway up to a clearing. At the center are the remnants of a large fountain. The spout has collapsed and the basin is shattered into three separate pieces. The grass that envelops the roadway has grown throughout the many crevasses of the mossy cement.\n\nJay runs his hands across the broken stone, admiring its patterns, but your attention is elsewhere. Like a magnet, you are drawn past the fountain and to the antiquated marble steps at the end of the meadow. \n\nThrough the rain, four tall columns rocket upward from a solid porch to some old wooden rafters. Behind that, cold gray brick and ashlar form a great wall that stretches into oblivion. At the center, a large metal door sits with unimaginable ornamental detail. Big shuttered windows reside on either side and repeat on a story above before reaching the ceiling.\n\nJay rushes passed you, up the stairs, and onto the porch. “Come on, ${Name}, get out o' the rain!”\n\nYou hesitate. The steps, the whole building, emit an aura that makes you nervous. Lightning flashes and is almost immediately followed by a clash of thunder. You jump and the scare is enough to force you onto the portico. You stand beside Jay speechless. Every hair on your body is on end.\n*page_break\nHe glares at you, “Try to warm up, maybe sit down.” He flashes the light from his cellphone against the walls and ceiling. “Well, this place looks a little big to be a serial killer's hideout and too old to be a secret government base.”\n\nThe exposed wooden beams creek as the rain relentlessly pounds against the roof.\n\n“${Name},” Jay calls out, “Look, the door.” \n\nHe shines the light on the entryway. A tall double doorway stands watch over the barren porch. Looking closer, you can see that it is slightly ajar. \n\n“Think the kids might've snuck in here?” \n\nA cold breeze rushes out of the crack and burns against your wet and frozen skin. Jay puts his phone away and wraps his fingers around the frame. You step to the side, as if expecting something to jump out. Hands gripped tightly, Jay leans his whole body away from the door and pulls. The metal hinges moan under the strain. The door only moves a few inches before his grip slips. \n\n“Damn this thing is heavy!” \n\nHe grabs the door again and heaves, panting as his arms struggle to move the huge mounted slab of metal. Finally, the rusted shackles give and the door howls as it slowly inches open.\n\n*finish", "chapter6": "You pull out your own phone and shine its flashlight inside. You step through the doorway and reveal a massive open room. It spans a width of at least forty feet and four or five times further back. At the center, a fallen chandelier glistens against your bright light. The ancient masterpiece lies rusting on an old crumbling floor.\n\nSuddenly, Jay shouts your name from behind, \"${Name}!\" \n\nYou turn around, to see Jay yank his arm out of the doorway just in time as it unexpectedly slams shut. His face vanishes on the other side.\n*page_break\n*set Battery 28\n\"Jay?\" You dash back to the door only a few paces away and slam your body against it, but it doesn’t budge. Again, you heave with all your might, but the door refuses to emit even a creak. \"Jay, can you hear me!?\"\n\n\"Yeah,\" you hear him reply hysterically from the outside.\n\nYour breathing hastens as adrenaline surges through your body. \"What-what happened?\"\n\n\"I don't know! It just-it just shut! It-just-shut, ${Name}.\"\n\n\"Well, can you open it?\" you ask impatiently.\n\n\"No, it won't move! The windows, try the windows!\"\n\nYou both rush to the left window. Iron rods run horizontally all the way up the aperture, blocking anyone from getting in or out. You tug on the bars as hard as you can until the skin on your fingers tears. Jay tries to kick them in, but the old metal is unbreakable.\n*page_break\n\"What do we do?\" Jay inquires, staring in from the other side.\n\nSuddenly, you hear movement from behind and spin around to face the dark chamber. You shine the light on your phone around to reveal a large foyer. Water streams down from shattered windows along the ceiling above and showers most of the ground floor. Two wide staircases flank either side of the room and run up to long mezzanines.\n\nAt the far end, another, much wider staircase proceeds up to a large landing that presents a massive gilded gate. Then, the steps turn and meet the mezzanines a little further up the back wall.\n\nBeneath layers of grime and muck you can see the remnants of a once beautiful tile floor. An arcade of marble piers support the balconies down the length of the room, concealing shadowy underbellies beneath them. Near to the front of the hall, two separate hallways on your left and right lead in opposite directions, just before the mezzanine stairs.\n\nYou stand dumbfounded when a faint voice calls out from deep within the structure, so muffled it sounds like a soft whisper. “Do you hear that?” you ask Jay.\n*page_break\n*set Battery 26\nThe voice continues to intensify, but the message is unintelligible. Suddenly, a sharp stabbing pain penetrates your skull, followed by a high-pitched ringing in your ears. You grab your temples and press firmly against them, desperately trying to relieve the pain. You can feel yourself drop to the floor again, hitting your shoulder and knuckles against the solid tile. A voice screams in your ears, grinding against your teeth like a drill. You lay on the cold ground, paralyzed. The room spins in circles before fading to black.\n\nAmidst the loud cacophony, a discernible voice finally emerges. It's a man’s voice. At first, you think it to be Jay, hopelessly trying to revive your comatose self, but the man’s dialect is completely off. The voice is deep, both gentle and firm. It may just be your delusion, but it's somehow soothing. Choppy and gritty, like a radio with bad reception, but comprehensible. The man whispers in your ear, “It knows you're here. Find the sanctum.”\n\nYour eyes flare to life. The trance ends as abruptly as most. The ringing dissipates and your head returns mostly to normal, save for a slight residual throbbing in your forehead. You find yourself on the ground where you fell, the dreary Main Hall still outstretched before you. \n*page_break\nYou pull yourself up and dust the dirt from your clothes. Your left shoulder aches from a piece of wood that must’ve jabbed you when you fell.\n\nThe visions are getting worse, you think to yourself. After taking a few moments to breathe, you walk back to the window.\n\n\"Jay, where are you?\" you whisper.\n\nYou look around the opening. The rain has stopped, but water still drips from the portico roof. The meadow is blanketed in a dense fog. You rush to the other window, but Jay's nowhere to be found.\n\n\"Jay!\" you whisper a little louder, but there's no reply.\n*page_break\nYou turn around and face the long dark room again. Almost immediately, you spot your phone and satchel on the ground near where you collapsed, still on and illuminating the limestone ceiling. The screen is cracked, but still works. With some dim light still pouring in from the broken windows above, you quickly shut it off to conserve what little battery is left.\n\nThe two flanking hallways are parallel with you, each leading to an opposite wing of the building. Peering down them, the structure seems to have been built symmetrically, at least this portion. They travel about fifty yards or so and then turn.\n\nYou peer forward into the dark maw of the foyer. Nothing is well lit by the dismal lighting. However, the dingy mezzanine is better lit than the ground floor beneath it. You walk quietly toward the fallen chandelier at the center of the room. Cracks protrude outward from the impact crater that's now filled with water. The chandelier’s chassis is coated in orange rust. Whatever gems were once housed in its intricate sockets have long since been pilfered.\n\nPerhaps the eeriest part of this place is the noticeable lack of noise. Just like the forest, there are no birds chirping outside or even the squeaking of scavenging rodents, only the white noise of wind rushing from one hallway to the next. It makes every drop of water, every creak of wood and kicked pebble that much more noticeable.\n*page_break\nYou meander your way towards the grand door at the end of the room, the obvious focal point. Silhouettes of archaic wooden doors hide in the deep recesses of the hall and must occlude the remaining wings of the manor. Carefully, you navigate the crumbling stairway. The relatively smooth but cold railing helps guide you in the dark. \n\nThe end door towers over the rest of the foyer, stretching above the second story and falling just short of the ceiling by a few feet. It’s composed of a remarkably well preserved black wood. In it, beautiful swirls and geometric patterns have been engraved. You run your palm along the coarse grain. You can both see and feel chippings at the apexes of the chisel marks where looters must’ve pried off ancient decorative gildings.\n\nYou give the door a light push, but it doesn't budge, then, a firm shove. This time, it wavers, but remains tightly shut, as if something were barring it from the other side. You clench your right shoulder, still sore from the debris you fell on earlier.\n*fake_choice\n\t#Try to kick the door open.\n\t\tYou lift your leg and push-kick the door. The wood kicks back and you’re sent reeling. On the other side of the door you hear something tumble, like an object falling down stairs or perhaps the pattering of heavy feet. \n\n\t\t\"Jay, is that you?\" you whisper. \n\n\t\tAfter a third firm shove, the door is still jammed. You’re certain something must be blocking it from the other side.\n\t#Leave it be.\n\t\tThe Main Hall continues to stay silent. Traces of fog start rolling in from the windows above and cascade down from the mezzanines to the ground floor. The light becomes so dim that the thickening mist almost acts as a smoke-screen, quickly concealing the entranceway now on the other side of the room. A single wooden door resides inconspicuously atop each balcony. With the amassing fog, it’s impossible now to see the ground floor.\n\n\t\tYou proceed further up the steps of the internal balcony, firmly gripping the granite balustrade. Staring through the gaps in the rail, a figure abruptly appears standing at the top, staring in your direction. Their body is colorless. The only detail you can make out are the dark pits in place of the phantom's eyes. Quickly, you skip up the remainder of the steps. \n\t\t\n\t\t“Hello?” you cry out, but no one is there. \n\t\t\n\t\tThe sole door sits quietly about halfway down the walkway. The gray haze has begun to overtake the upper level as the fog fills the room.\n\nAmidst the silence, you hear someone whispering. It sounds like it's coming from behind the walls. You stop and listen closely. \n\n“In here,” it says.\n\nSlowly, you proceed to the isolated door. Your hand hovers inches above the old copper knob.\n\n*fake_choice\n\t#Open the door.\n\t\tYou place your hand on the knob. It’s cold and rough. You twist your wrist and the door clicks open. The room is pitch black. Suddenly, a crash erupts from the ground below you, muffled by layers of rock and debris. Your body freezes. You stand paralyzed and blinded by the encroaching haze, listening. A clicking sound slowly and quietly arises from the fog. The pitch is low, an odd clacking with a few seconds of pause between each snap.\n\n\t\tQuickly, you whip out your phone and shine its flashlight inside the newly revealed room. A couple of old metal desks and chairs are pushed up against the walls. In the far right corner is an odd architectural feature that somewhat resembled a fireplace with a metal rod sticking up through the stone floor. But, aside from the furniture, the room is empty. \n\n\t\t[i]Click, click.[/i]\n\n\t\tThe noise comes from behind you, just down the steps now. Frantically, you spin around and shut the door as quietly and gently as you can. \n\t\t\n\t\tInside, you place your head against the cold wood. The clicking continues, growing louder and louder. A tightness grows in your chest, like a cinder block resting on your rib cage. Something brushes up against the other side of the door.\n\t\t*finish\n\t#Leave the door shut.\n\t\tYou back away from the door. Suddenly, a crash erupts from the ground below you, muffled by layers of rock and debris. Your body freezes. You stand paralyzed and blinded by the encroaching haze, listening. A clicking sound slowly and quietly arises from the fog. The pitch is low, an odd clacking with a few seconds of pause between each snap. You peer over the railing, but your vision is totally obscured. The balcony gradually fades into the mist until it reaches the first step of the frontward staircase.\n\n\t\t[i]Click, click.[/i]\n\n\t\tThe disturbing sound gets closer. Then, suddenly, movement grabs your eyes near the steps. A black shadow lurches back and forth up the stairs. \n\n\t\t[i]Click, click.[/i] \n\n\t\tYou shuffle back against the door. Then, an impossibly long and thin arm reaches up from below and presses four equally ghastly fingers, each a foot long, onto the edge of the stone balcony.\n\n\t\tWithout hesitation, almost instinctively, you fling the lone door open and stumble into the foreign room. Frantically, you spin around and shut it as quietly and gently as you can.\n\n\t\tYou whip out your phone and shine the light around the space. A couple of old metal desks and chairs are pushed up against the walls. In the far right corner is an odd architectural feature that somewhat resembled a fireplace with a metal rod sticking up through the stone floor. But, aside from the furniture, the room is empty. \n\n\t\tYou press up against the back of the door, trying to stay quiet as you struggle to fill your lungs with oxygen. A tightness grows in your chest, like a cinder block resting on your rib cage. You clutch your bag tightly. You can feel something brushing up against the other side of the door. \n\t\t*finish", "chapter7": "The laces of your shoes look like faint tangled worms in the dark. Something breaks the dim curtain of light radiating from beneath the door. The shadow slowly creeps from left to right on the floor. The door rattles and shakes gently as something rough scrapes along it. The noise stops, but the light remains obstructed for several long seconds.\n\nAfter what feels like an eternity, a sliver of light finally reappears and the figure vanishes from the doorway. Slowly, you loosen your death grip on the bag. Your heart is still racing and head pounding. You're pretty sure the room would be spinning if it weren’t pitch black.\n\nYou undo the buckles on your bag and rummage through the contents. The pen and notebook, audio recorder, the vial of holy water, and ibuprofen are all still there. You pop a few painkillers and rebuckle the top.\n\nThoughts race through your mind. \"What the hell is this place?\" Jay is missing and your memory is foggy. You rub your temples trying to relieve the tension. The voice, you recall, someone, or something, spoke to me. “Find the sanctum,” it said. With that thought, you pull yourself up from the floor and toss the bag over your shoulder.\n\nYou turn on the beam of light from your phone once again and reveal the small cluttered room in more detail. Papers, chairs, metal waste bins, century old lamps, and desks are strewn all across the floor. At the far corner, the conspicuous pipe protrudes from a vent amidst the floorboards and is surrounded by brick.\n*page_break\n*set Battery 26\nYou walk over to the nearest desk. The floor squeaks relentlessly with every step. The desk is covered in shallow scratches. Beneath it lies an old and broken typewriter, the keys bent and mangled. You slide open the top drawer, the rusting metal screeches loudly. You cringe and pray that whatever's outside is hard of hearing. An unaddressed and unsealed envelope falls out. In it, you find a letter. Carefully, you unfold the note and the frail paper splits in three along the folded axes. At the very top, an obvious and telling red eagle ensigns the page. The document is typed up entirely in German. You pick up the fallen thirds and align the fragments on the desk. Most of the ink has faded beyond recognition, but you try to decipher what remains.\n\n[i]Reichsleiter Hess,[/i]\n\n[i]It is with pride that I inform you... successful. February 24th, 1940, the fortified front door was blasted open with no incident. ...appears abandoned as expected, however, recent events have... suspect rebel forces may occupy… two soldiers have been missing for two days. In their possession was the key to the West Wing. ...men are unable to gain access beyond the study. If not found, force... Guards have been stationed... It is expected that we will occupy the remainder of the structure by the end of the week.[/i]\n\nA few handwritten notes were scribbled onto the bottom of the page, but they're too obscured to read. You gather the three pieces and place them in your pack. \n\nYou make a note of the battery on your phone: 26%\n*page_break\nYou keep the light on and look around the rest of the room. Another desk sits at the far end but has been stripped of its drawers. You notice the strange metal pipe protruding from the ground in the corner. Running your hand over it, it’s cold and lifeless. It sticks up from a black vent that is nailed into the wooden floor. The pipe is hollow and rises less than a foot off the ground. Aside from that, the room is barren and empty.\n\t\nYou walk back over to the door and press your head against it. The room is silent. The knob turns and you open it quietly.\n\nThe mist has slowly settled to the ground floor. Though the tiles are still hidden from view, the room is no longer enveloped in an opaque haze. A small amount of light still pervades the foyer so you turn your light off and conserve the battery. The sound of water dripping from the windows above rings in your ears. The front door is still shut and the rest of the building falls ominously quiet. Two signs are barely visible above each flanking corridor on the ground level, “Study” and “Stables”. Dim ambient light emanates from each pathway. The mixture of the ever waning sunlight and dense fog makes navigating the area beneath the mezzanine impossible, forcing you to choose between the two ambiguous hallways.\n\n*fake_choice\n\t#Investigate the study.\n\t\t*gosub trial_end\n\t\t*gosub_scene chapter7_study\n\t#Head toward the stables.\n\t\t*gosub_scene chapter7_stable\n\t\t*gosub trial_end\n\n*finish\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first seven chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n\t*subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2021-10-14 $2.99 $1.99 purchased\n*abort\n", "chapter7_stable": "You push through the mist. The room is still silent save for the occasional drops that splash into the pooling rainwater and the cracking of rocks on the dirty floor.\n\nA few seconds pass and your palm presses against the far wall. You follow it until meandering into the eerie hallway. Boarded windows on your right and moss-covered stone on the left, moonlight shines in through the boarded windows. \n\nAdditional corridors verge off and lead deeper into the fortress-like structure. You swear you see something shifting in the shadows down one of the branching hallways and you quickly skip passed it. Thin floating particles glisten in the rays of light that poke through splintered and rotting wooden boards that bar the outside world. Ahead, fallen beams and gray blocks make traversing the hallway difficult. You climb and crouch through the debris. Black marks reach out and scar the walls like smoky tendrils. Eventually, the stone is entirely replaced by scorched wooden frames until the ruined hallway becomes impassable. Two large beams cross diagonally through the path and superficially uphold tons of collapsed material that must've, at one point, made up the remainder of the building. You press your fingers through several gaps, trying to squeeze your way through, but only manage to splinter your fingertips.\n*page_break\nWith the path blocked, you lay your back against one of the toppled boards and contemplate your next move. Just then, amidst the silence, a shrill squeal pierces the walls of the abandoned citadel. The sound of a crying baby resonates from a nearby corridor.\n\nYou step softly, dirt still crunching under your feet, and peer around the corner. The divergent hallway recedes deep into the building. Some thirty or forty feet, the walls meld with the darkness from which the whines originate. \n\n*fake_choice\n\t#Double back to the study.\n\t\tYou know a bad omen when you hear one. It could be a real child or it could be a trick from whatever haunts this place trying to lure you somewhere it feels more comfortable. It's not worth the risk, you decide, and walk back to the Main Hall where you cross into the Study. The eerie cries of the child slowly fade from ear shot.\n\t\t*gosub_scene chapter7_study\n\n\t#Investigate the noise.\n\t\tYou hug the wall and head into the abyss. Digging through your bag, you pull out your phone and flip its light on again.\n\n*set Battery 22\n22% Battery\n\nThe beam reveals a damp, dreary hallway. Moss creeps up the brittle walls. You pass by several empty chambers, each with a crumbled wooden doorway either collapsed or missing entirely. In each, the same iron piping protrudes from the alternation of ruined cobble and wooden flooring. Finally, you reach the room from which the cries originate. Loud and unnerving, the noise scrapes against your eardrums. The room is completely barren, other than a white bassinet at the center. You step closer, hesitantly. The young infant's dismay doesn't yield. You peer over the edge of the crib. Luxurious white sheets are sprawled out from end to end, crumpled up and in disarray from something moving beneath them. You raise your hand above the cradle from which the cries emanate and, suddenly, silence falls over the room. The resounding shrieks abruptly end and the sheets cease their squirming. The room is quiet. Your arm hovers inches above the white covers.\n\n*fake_choice\n\t#Remove the sheets.\n\t\t*achieve madness\n\t\tYou grip the sheets and rip them away! Red splotches splatter up your arm. The interior of the sheets are coated in bright red blood. A deep pool of the thick crimson fluid drains from the center of the uncovered blanket and stains the elegant white satin. Your knees give out as you pull away in shock. Your elbow slams against the floor and punctures a hole in the rotting timber. You scramble backwards on the ground, your butt dragging against soggy moss, until your back runs into the wall near the door.\n\n\t\tThen, you hear it.\n\n\t#Step away. \n\t\tYou pull your hand back and step away. The room remains silent. Nothing happens for several seconds until another, more familiar sound, accosts your ears.\n\n[i]Click, click- click[/i]\n\nFrom the hallway, the ghastly, otherworldly cracking echoes off the rigid walls just like the child's cries. Your heart races. Slowly, you poke your head out from the doorway and struggle to your feet. Phone in hand, you shine the light down the passageway. Curling around the corner from which you came, a series of long skeletal fingers stretch outward from the darkness and clutch the wall. Then, several more appear on the ground, inhumanly long and attached to a bony arm emerging from behind the bend. Long strands of black silk dangle from a ghoulish torso and drag along the ground as the fingers creep forward.\n*page_break\nYou hesitate, unsure if you should run or hide, unsure if it is even aware of your presence. But then, the creature's full body emerges. Horrific and hunched over like a starving dog with spines protruding from its back. Its face is completely veiled in black and gray hair that drapes from the monstrosity's shoulders and back. Its eyes are non-existent, but you can somehow feel it staring right at you. It moves unnervingly slow, like a predator stalking its prey.\n\nBefore you miss your chance, you push off the doorway and sprint down the hallway in the opposite direction. The corridor is long and dark, you pass by several other nooks, running too fast and panicked to see inside any of them. You turn around and see what look like two orange eyes following behind you. You nearly trip reaching into your satchel and searching for the vial of holy water. Ahead, you can see the end of the hallway, blocked by a closed iron door. After a brief second of searching, the vial rests firmly in your grip. You stop at the door and spin around, slinging the open vial from wall to wall and recite a short incantation. The eyes stop encroaching and just stare from afar for what seems like two or three minutes until disappearing.\n*page_break\nYou exhale and rest on your knees. Your legs burn. Thoughts race through your mind. You've never seen anything quite that disturbing. You cast the now empty vial aside and fumble your recorder out of the bag. Still having not fully caught your breath, you press the button and relay recent events. \n\n\"I've been suffering frequent and more vivid visions than usual. Some kind of clear demonic manifestation seems to be haunting this place, gruesome in appearance...\" your heavy breathing forces you to pause. \"Silent, seemingly malicious intent...\" As you talk, you notice the door behind you is unlocked. Undoing the latch, you swing the bulky iron open. It squeals with reluctance. \"The presence of the apparitions suggests some kind of horrific event that the entity has attached itself to. This place, maybe an object or person?\"\n*gosub_scene chapter8_baths\n*return", "chapter7_study": "You stumble into a long hallway. Boarded windows on the left and moss-covered stone on the right. The dripping water behind you echoes through the corridor. Iridescent moonlight seeps through the cracks between the boards. You walk softly, the still silence further fueling your paranoia. Something or someone is wandering these halls with you and could be around any corner or now stalking you from behind.\n\t\nYou make it to the end of the barren hallway. A stone archway greets you to a much larger space. A few wooden chairs lie scattered across the floor just like the room earlier. However, at the center, rests a peculiarly undisturbed coffee table and early century couch. A lonely bookshelf is built into the far wall and houses only a few cobwebs. You step inside and your eyes adjust to the new darkness. An eerie wooden door emerges on the right side of the room. As you approach, a distant wail cries from beyond the wall. Another ominous chill travels up your spine. The light from the windows barely reaches this end of the room. An old, surprisingly clean, wrought-iron handle sticks out from the wooden frame. You pull, but the door doesn’t budge. Even after you step back, a chill still lingers in the air.\n*page_break\nYou look around for a few minutes. The couch is slightly angled from the coffee table. The leather cushions are covered in cobwebs like everything else, but still untattered. As for the table, a large scratch runs from the center all the way to a splintered edge.\n\nSeveral large bookshelves are built into the stone walls around the room, picked clean of whatever ancient knowledge they might’ve once possessed. As your eyes scan the racks draped in shadow, they come across an old candle sconce mounted to a column between two shelves. Several more just like it dot the walls around the room. Each holds a mold riddled white candle atop its pedestal, but not this one. Dry wax has given the metal a glossy sheen, but its mount is empty. On the ground directly below it, rests a peculiar horse statue. Surprisingly clean, the metal still glistens against rays of light from the nearby windows. It looks like it might've fallen from above. \n\nSomething ome only a few square feet, almost has you convinced to turn back. But finally, after at least ten minutes of maneuvering through pitch black and cramped hovels, you wander back into what resembles a formal hallway. Elegant patterns have been etched into the bottom half of the stone walls. It travels in two separate directions with wooden signs anchored into the rockface before you. Carved intricately, a sign reads \"Library\" and below it is an arrow pointing left. Similarly, another loose sign dangles to the right. A long curved staircase descends into the ground very gradually. \"Cistern,\" the sign reads. A cool breeze rushes up the steps and flees down the long corridor.\n\nYou can't help but glance at the battery life remaining on your phone: 17%\n\n*fake_choice\n\t#Investigate the Cistern\n\t\t*gosub_scene chapter9_cistern\n\t#Go to the Library\n\t\t*gosub_scene chapter8_library", "chapter8_dr": "*set Battery 21\nThe study's grown dark. Only a thin beam of light still shines through the boarded windows. The door rests quietly at the end of the room. Cobwebs run from the ground up its reinforced wooden frame.\n\nGently you raise the key to its iron lock. The shaft scrapes against the rusty metal. You twist your wrist and a strong gust of cold air thrusts the door slightly open from the other side. You wrap your fingers around the corner and pull it the rest of the way, revealing a larger and even more somber room.\n\nYour eyes are drawn back to the mechanical bookshelf that once again bars the underground passageway. A sickening knot forms in the pit of your stomach. Nothing can fool your clairvoyance. There is, without doubt, something malicious about this place. You spin your head back to the new room and take your first step inside.\n*page_break\nA long and narrow table greets you at the chamber's center. The walls reach high and stretch far to the right, where a suspicious pyramid of furniture is piled up, to the left, where three colossal stained-glass wi
