<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Horror Behind the Walls — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "horrorbehindthewalls", "title": "The Horror Behind the Walls", "scenes": {"chapter1": "Rough, porous walls scrape the palms of your hands as you frantically sprint through hallway after hallway. As they pass by, you knock over rotting tables, shelves, and tall standing candelabras, anything you can to block the path. The pitter-pattering of light footsteps scuttle not too far behind. It's dark, almost pitch black. Only thin curtains of moonlight, occasionally seeping in from the crumbling ceilings, light the way.\n\nYour legs slip out from under you on the final bend and you slide into one of the many rigid and unforgiving stone walls. Further down the hallway is the open window you climbed in through. You look back and see a dark figure rapidly approaching from the shadows of the preceding corridor. Only a few feet away, however, is a small inconspicuous room with a heavy door still firmly anchored to its hinges.\n\n*fake_choice\n\t#Lock yourself in the room.\n\t\tWithout hesitation, you stumble into the nearby room and slam the old wooden door shut behind you. It's iron lock, however, is rusted in place and refuses to budge. You struggle with the latch for several seconds, desperately trying to slide the old bar across the door. Your bloody fingers fumble with the iron, but are too frail to break it free. The footsteps get closer. Finally, the rusty bonds shatter and the rod slides into the adjacent socket just as something bashes against the door from the other side.\n\n\t\tYou try to catch your breath as you examine the room. The open ceiling above exposes several crumbling rafters. On the opposite wall is a small frameless window. Desperately, you dash to the aperture and stare down at the meadow far below. The opening is only a few inches wide and impossible squeeze through.\n\n\t\t\"Help!\" you repeatedly scream at the top of your lungs, waving an arm outside. But, no one responds. Your shrill cries for rescue are heard only by the callous mountains.\n\n\t\tSuddenly, the creaking of wood breaks the silence. Slowly, you turn to see thin strands of dark hair lowering from the rafters above.\n\t\t*page_break\n\n\t#Make a break for the window.\n\t\tYou stumble back to your feet and sprint toward the aperture at the end of the hall. Your feet pound against the creaky floorboards as quickly as they can carry you. You struggle to breathe in the confined, dust-filled air even though your heart furiously demands it. Something brushes against your back, but your mind refuses to look out of fear of what it might see. \n\n\t\tAs soon as your feet reach the window sill, you hop onto the ledge and peer down. There, on the ground several yards below, lies the fallen ladder in the meadow below. You turn your head back and see two spindly arms reaching out of the dark. Without hesitation, you jump, but it's too late. The last thing you remember is a large spindly hand dragging you back inside.\n\t\t*page_break\n\nYour eyes jolt open and dart around the room in a panic. Your heart races. A bright light fills the room and then vanishes in an instant. The roar of thunder follows a few seconds later. Your mind comes to and you realize you're lying in your bedroom. A ray of moonlight gleams through the nearby curtains and rain batters against the window. You lay silently, paralyzed, until the pattering of the rain against the glass slowly calms your nerves.\n\nYou glance at the clock on your dresser, 3:07am. You close your eyes for a few minutes trying to fall back asleep, but the horrific nightmares still plague your thoughts. You reach up and slide your phone from the nightstand and unplug the charger. You tap on the screen repeatedly, only to recall that it had died the evening before, as it does every evening. You press the power button and stare blankly at the swirling loading screen. Maybe this weekend you'll finally take the time to replace it. After a minute or so, the screen finally lights up.\n*page_break\nAmidst scrolling through funny posts and pictures, a familiar news article grabs your attention, \"Psychic Reveals New Evidence Against Husband in Death of Child.\" The headline rekindles the bitter sweetness that too often resides. You recall the young girl, short blond hair with light hazel eyes, only eight years old. She told you what he did, led you straight to her body. But, it always feels too little too late. It takes a lot of discipline to remind yourself that your work saves others. But, by the cruel irony of your gift, you often only meet the ones you couldn't. It's the rare opportunities when you see the survivors that your work truly satisfies you.\n\nMuffled thunder erupts again outside. You scroll down the article and continue reading details about the upcoming trial when something strange catches your eye. Not in the news article, but the page itself. Between the words you can make out a shape behind them. For a moment, but a split second, it looked as though there's a face staring back at you from the screen. Two distinct eyes and a scrawny nose. But, as soon as you notice it, the shape, the contrast, all vanish. You look closer, but nothing. Suddenly, a deafening scream pierces your ears and you hurl your phone across the bed in terror. As quickly as it came, the blood curdling shriek fades, like a burst of thunder, and is drowned out by the high pitched ringing of your phone. You sit there silently, trembling, as heavy rain continually patters against the window and your phone rings at the foot of the bed.\n\nA few seconds pass and you start to regain your senses and the adrenaline dies down. You scramble for your phone and must've caught it on the last ring. You take a deep breath and try to calm your nerves, but your voice still shakes. \"Hel-lo?\"\n\n\"Sorry to call you at this hour, but I think I've got a lead.\"\n\nYou recognize the voice on the other line as your longtime friend, and often investigative partner, \"Jay?\" you inquire. You utter a few more incoherent sounds until you're forced to take a deep breath. Other voices surface in the background, followed by the sound of objects being tossed around hastily on the other line. \"What is it?\"\n\n\"I found the girl, but still no I.D. They're taking her to some place called Saint Adelaide's!\"\n\n\"Adelaide's? I've never heard of that,\" you mumble.\n\n\"Listen, they're moving her fast and putting her in ICU on lock-down, no visitors.\" The racket continues on the other line.\n\n\"What-what about her family?\"\n\n\"I don't know. I'm heading there now. I've got connections in the area and I'll get something worked out. I'm booking you a plane ticket, it leaves at 7:12am your time. It's the only flight to Stuttgart or Munich for the next two days. You have to be on that plane!\"\n\nYou release an exhaustive sigh and climb out of bed. \"Alright, I'll be there.\"\n\n\"I'll text you the details.\"\n\nYou're abruptly met by the three consecutive beeps that mark the end of the call. The next hour is spent tossing your best travel clothes into a suitcase and searching for your carry-on bag. It's too bad your skillset doesn't include finding small misplaced items. Finally, after the anxiety of missing your flight has fully set in, you find the satchel buried under an old heavy jacket in the back of your closet. You recognize the jacket from a case in North Dakota, though, you can't recall if it's the coat you wore or the coat you used to track the victim's body. Either way, you decide it's probably best to leave it behind.\n\nHastily, you stuff your usual instruments into the pouch: a small notebook and pen, a simple audio recorder, a vial of anointing oil, and, of course, ibuprofen. By 5:00, you're out the door.\n*finish", "chapter10_furnace": "*set Battery 6\nYou approach the central gate in the room. The door is crafted from the familiar ebony wood as the blocked entryway in the foyer. Intricate stonework lines the outer edges of the coarse grain. You rest a palm on the beautiful wood and, to your surprise, the door budges slightly. You push and the hulking door swings open with a daunting rumble. Stretching the light out in front of you, you take a cautious step inside.\n\nThe room is pitch black, as dark as anywhere you've ever seen. It's as if this place has been inhabited by shadow for so long that the light now struggles to penetrate its dark aura.\n*page_break\nA solid flagstone floor gradually reveals itself as you take your second and third steps into the room. As you draw your arm away from the gate, the door slowly swings shut again. The surrounding floor and walls are coated in a black ashy film. Something shimmers a few feet ahead. As you approach, a black iron palisade materializes from the dark. Small rocks and dust crunch under your feet as you near the black fence. The metal is undoubtedly old, but not quite as rusted as the metal doors above. It isn't until peering over the edge of the railing, into the black abyss, that you realize the room isn't as empty as it first appeared. In the dark gorge, lies not empty space, but a gargantuan black machine. Riveted plates encompass the exterior. It bends parallel with the fence and stretches into the darkness in both directions. It reaches high above you until the top, too, vanishes into the tenebrous cavern above. You stand in awe of the unbelievable monument sleeping silently beneath this ancient structure.\n\nYou travel in one direction around the room, trying to map out the strange floor scheme. The mezzanine circles the entirety of the machine which must rest on an unseeable ground floor below. On one side, just right of the entrance, you find a small narrow stairway that delves into the void below. It wraps uncomfortably close to the exterior of the large contraption as the stone steps fade into the dark. On the other side, roughly fifty paces around, you find a chute that leads into the body of the machine. Large piles of coal line the walls surrounding the maw.\n\nNearby, a tall lever protrudes from the ground. The mechanism is lodged into a slot on the floor and would've otherwise appeared as a simple iron rod. Out of curiosity, you can't help but wiggle the lever arm to see if it would budge. Surprisingly, it gives quite a bit more than you would've expected.\n\n*fake_choice\n\t#Pull the lever\n\t\tYou can't help yourself. You give the lever a firm tug and it swings to the left and then immediately back to the right. A repeated clunking noise erupts inside the machine. The floor rumbles with each clank. The ground quakes four or five times, every other second, until the enigmatic machine abruptly dies again.\n\n\t#Leave it\n\t\tYou step away from the peculiar switch. This place is undoubtedly centuries old. Whatever this machine was built for, it's unlikely it still works. Even so, it's probably best not to invoke something you know nothing about.\n\nSuddenly, a light tapping sound tingles against your eardrums. At first, slow, but rapidly escalates into a loud metallic scraping from inside the chute just a few feet away. You peer around the corner and witness a dimly lit, horrific amalgamation of faces staring back at you from the dark. You jump back as many zombified arms grow out of the opening and latch onto the outside of the shaft. The human-like fingers frantically claw at the metal surface, attempting to haul the grotesque remainder of its carcass out of the machine. Your heart sinks. You're so tired, having been running for hours, but can't seem to get away. \n\nAbove the aperture, you notice a hatch precariously resting against the metal wall. You swallow your fear and dash towards the creature as it sluggishly crawls out of the slide. One of the many undead faces sewn into the flesh bites at your neck only inches away. In one swift motion, you grab the hatch and pull it towards you. The door resists at first, but its own weight is too much for the ancient rust to withhold. The metal squeals with a thousand years of age and crashes onto the decrepit body below just as it lunges for you. Several of the creature's arms instantly snap off as the heavy iron hatch slams shut. The severed skeletal arms fall to the ground. Monstrous cries poison your ears as it loudly tumbles back down the shaft and presumably to the bottom floor.\n\n*if went_cistern = true\n\t*achieve hatred\n\tYou can still hear the creature moving around inside the metal contraption. You glare at the burning torch in your hand. Without a second thought, as if someone were guiding your actions, you lift the hatch door and toss the torch inside. The room falls pitch black, but you shuffle your way back to the strange lever just to the right. Your fingers grip around the cold staff and tighten. Heaving with your body weight, you pull the lever back. The metal clanking erupts again and shakes the room. A few seconds later, a second tick just as loud almost knocks you to your knees. Then, on the third, tick, the machine suddenly roars to life behind you. A fiery orange glow illuminates the room from several orifices on each side of the machine. The screams of the creature are drowned out by a tumultuous hum.\n*page_break\n*set Battery 2\nYou step back to catch your breath again. However, the victory is short lived. You gain only a brief repose before another ominous bang pierces the stale chasm air. A second bash knocks black ash off of the encompassing walls nearby. Chills race up and down your spine and you dash back to the entryway to see the ebony wood shattered and splintered across the stone floor. Through the aperture, a long skeletal arm, not too unlike those dangling from the grotesque amalgam, but three to four times longer, reaches in through the old doorway several yards away. Four long fingers extend outward from the palm and wrap around the fractured frame. It tightens its grip and pulls. The ancient wood cracks only twice before shattering in a splintery explosion. You shield your face from the flying fragments bouncing against your skin. Now, a second arm reaches in slowly and, together, the two arms crush the remainder of the gate to the ground.\n\nSmoke and ash rise from the floor and fill the room. You continue to cover your face and sprint for the stairway on the other side. The incessant clicking, like cracking bones, follows not far behind. You fly down the narrow steps, nearly tripping over your own feet, and delve into the dark void. Your right hand trails along the cold brick as you descend deeper and deeper into the earth.\n\nYour feet stop at the bottom. A metal wall blocks the path on the left and you're met only by an infinite tunnel on the right. Web riddled beams uphold the natural ceiling of what looks like an old mining shaft. The sound of pebbles tumbling down the preceding steps forces you into the newly discovered cave. A thick black cloud of soot hovers just above your feet and creates the illusion of the floor moving and swirling in random directions. The ground is crudely cut and it proves difficult to maintain balance without seeing it. A continuous sting gnaws at the back of your neck and has gradually grown into a dull ringing that clouds your ears.\n\n*if went_cistern = false\n\tSuddenly, and without warning, your phone flickers. The light dims before the radiant beam, the only dependable source of light that's guided you amidst this labyrinth of horrors, dies.\n\t\n*page_break\n*set Battery 0\nThe tunnel grows dark. You begin to panic, unable to see your own arms out in front of you. You walk blindly and search for the wall to guide you. Dirt crunches beneath your feet. At least, that's what you thought it was until it gets louder.\n\n[i]Click, click, click.[/i]\n\nThe continual snapping resonates on all sides and rings throughout the tunnel. You run into a support beam and then into the hard wall. The noise grows louder as the creature encroaches. You whisper a silent prayer to yourself, sure there is no way out.\n\nThen, miraculously, a saving grace appears. A faint blue glow emerges from the haze up ahead. You don't waste a second rushing toward it. As you near, a small orb materializes at the center of the glow. It hovers a few feet above the ground. Slowly, the wisp drifts off to one side and disappears into the cave wall.\n\nYour legs wearily hobble over, your body aches and your limbs are tired. Where the apparition seemed to vanish, a narrow cleft branches off from the main tunnel and leads into a small cranny that ventures in a separate direction. The ground inside seems untraversable. Stalagmites spear forth from the earth like rows of shark teeth. Between them, deep veins flow through the crystalline stone where water has eroded the rock over millions of years. Suddenly, a new silhouette grabs your attention thirty or so feet up the grotto. A woman in a long blue dress stands at the top of the shaft and emits the same dim aura. Dark and luscious hair hangs just below her shoulders. She motions with her right index finger to follow and somehow graciously traverses the rigid cavity.\n\nYou take one look back before squeezing through the narrow crevasse. The back of your shoulders scrape the rock and struggle to maneuver through the tight space, but you manage to fit just barely. The cranny is claustrophobic, but also comforting in that it offers some amount of pseudo-shelter against the nightmares outside. \n*page_break\nWrapping a hand around a nearby stalagmite, you follow the woman up the circuitous chasm. As you follow, the woman laughs and chuckles, as if it were some flirtatious game. All around, beautiful crystals shimmer against her faint light; it almost makes you forget where you are. However, he mood does not last. The ceiling gradually lowers until it meets your head. You're forced to hunch over and twist your feet at awkward angles trying to navigate the sloped surfaces. The woman turns one final bend and you reach the hook only seconds later. A knot wrenches your gut as you turn the corner. On the other side of the wall, you're met not with a mysterious young woman, but a withered skeleton.\n\nThe bones are clean, whatever flesh clung to them has long since rotted away. It probably happened quickly too, given the humid environment. Just behind her, still illuminated by a small amount of blue light, are stone steps carved into a dead end. They lead to what looks like the bottom of a manhole cover. The light quickly starts to dim as darkness begins to swallow the cave again. Rushing to escape, you charge up the steps and throw open the hatch.\n*finish", "chapter11_library": "You never thought you'd be so thankful to see pale moonlight again. The room above is lit by several gaps in the ceiling. Four solid walls form a large barren enclosure accessible by only the trap door and a single unbarred doorway. The walls are charcoal black, just like the ones earlier, and scorched timber riddles the floor.\n\nYou haul yourself out of the hole and kick aside various debris as you limp your way toward the exit. Small shards of metal scrape against the ground as your toes crash against them. Mostly small pieces, colored black by ash, but every once in a while a large melted shoe-shaped chunk rings against your shoes.\n\nThe next room is a sight to behold. Shattered walls tower over a massive floorspace, two or three times higher than the grand foyer at the entrance. Scorch marks scar the lower halves that still stand. The top half, along with the roof, seem to have met the floor centuries ago. Huge slabs of stone constitute archaic mounds of concrete across the chamber. Both wooden and stone shelves scale the walls where they're able and still house the ashes of whatever contents they once held.\n\nEven exposed to the night air the room is still surprisingly warm. Rays of moonlight shine down through the ubiquitous fog which looms almost picturesque in the sky above. A beam of light pours over an object at the heart of the athenaeum. There, a pike protrudes from the rubble. Tied to it, arms stretched outward, human remains hang crucified to a black cross. Somehow, remnants of charred flesh still cling to the skeleton.\n*page_break\nYou crawl over fallen pillars and broken bookshelves as you approach. Your hands cover your mouth in shock and disgust, as if the air were still filled with the toxic fumes of the ancient inferno. The body is black with the bronze undertones of blood stained tissues. All discerning features of the victim have been singed away. The lower jaw is missing, but jagged teeth still eerily cling to the upper rim. The head faces a grand doorway in the corner of the room which somehow survived the all-consuming blaze.\n\n\"Hello?\" you ask, probing for a spirit that may still linger.\n\nThe room is unnervingly quiet. The entity doesn't respond, which isn't out of the ordinary. You try to imagine what Jay would think of all this. For the first time in a long time, you miss having living company.\n*page_break\nA gentle breeze whips around the room from the exposed back half. You turn and examine the grand doorway behind you. It's impractically immense, like the one in the foyer and underground. Each of the double doors is wide enough for three people to pass through at once. It's hard to tell if the wood is black from the fire or if it was made from the same dark wood as the others. What functionality could these massive doors have possibly served? You push, but there's no give. Whoever lived here last had this place locked down. \n\nYou turn back around and jump at the realization that the corpse has shifted. The body now twists unnaturally. The arms are slightly bent, as if trying to pull away from the cross, but now frozen in place by rigor mortis. The head stares into another corner, opposite from where you entered. A second and third story mezzanine still rise above the rest of the room, upheld by only two standing columns. \n\nThe body remains motionless even after you approach again. You align your sight with theirs and notice a cranny on the third story that's been revealed by the collapsing wall. Indiscernible voices whisper from the other side. \"${Name},\" they whisper, \"here.\" The man's voice, the one from the foyer, quickly hushes the rest, \"${Name}, this way.\"\n\nFrom a pile of toppled stone, a long pillar protrudes diagonally and conveniently rests against the top balcony. \n\n*fake_choice\n\t#Follow the voice.\n\t\t*gosub_scene chapter12_follow\n\t#Look for another way out.\n\t\t*gosub_scene chapter12_ignore\n*finish", "chapter12_follow": "Loose chunks break off of the crumbling column and tumble to the ground as you climb up to the walkway. As you take your first step onto the balcony, cracking noises erupt from the cobble floor. Swiftly and carefully, you sidestep your way to the collapsed opening, consciously keeping your feet three or four feet apart the whole time. You glance at the mounted corpse staring up at you from the ground floor before hesitantly slipping into the hidden room.\n\nA glassless window emits light from one side. The chamber is elegant. Wooden furnishing, though decayed and slightly burnt from the nearby heat, is neatly placed around the small room and were mostly spared from the blaze that consumed the adjacent library. Oddly, there seems to be no other way in or out of the room and, at the center, sits a large wooden desk.\n\nYou walk around and peer inside the many cabinets. Beautiful broken glass of all colors, casted figurines, and a few wooden models too badly decomposed to recognize litter the corners. The surrounding tabletops are covered with blank parchment and all manner of small crude tools: old drills, small hammers, knives, compasses, pliers, and things you can't even fathom a use for.\n*page_break\nLastly, you inspect the central desk. It's bulky and not nearly as eccentric as the rest of the building. Small scratch marks riddle the surface, more so from years of wear than struggle. The desk only has one drawer and a hinged cabinet beneath it. You pull and the drawer practically falls apart. The frail sides crumble and the several sheets of paper inside fall onto the ground. You cringe at the loud thuds as the small pieces of wood hit the hard floor. You can't help but panic a little inside, worried someone, or something, is going to catch you snooping. \n\nAfter a few seconds, you bend down and pick the papers up off the ground. They're very fragile, but still holding together thanks to the thick fibers in the linen parchment. Notes are scribbled down the pages, but unfortunately the ink is faded and leached by the flax. The words you can make out, however, are odd. You recognize the dialect in which they're written as a very old form of German that's been obsolete for centuries. You read through the few notes that are legible.\n\n[i]\"It is with great joy that I write to inform you of our victory. The Emperor will hear of this triumph that is in no small part thanks to you. ...the craftsmanship from your province is unmatched... crossbows pierced many hearts...\"[/i] The rest of the letter is difficult to understand but mentions money and a slurry of royal titles.\n\nAnother, shorter, letter bears an elegant seal on the top left that resembles two keys crossed. However, the ink is just as badly smeared and you're only able to decipher about a quarter of the contents. [i]\"You are against God... wicked and evil... No child can be born from a soulless woman... may God have mercy.\"[/i]\n\nThe final letter bears penmanship very different from the others. The words are slanted, as if hastily written. Much of the ink has completely evaporated from the page. [i]\"These are likely my final days,\"[/i] it reads. [i]\"...besieged... Let it be known that Odo is a liar and a coward. The Crusade...attack me while the world...East... Never find what he is looking for. \n*line_break\n-Ercan Thomasius\"[/i]\n*page_break\nYou lay the papers down. Almost immediately, an incessant humming sound rings in your ears. Not unlike that you experienced in the cave, but more of a nuisance and less intense. You massage the lobes on either side of your skull, but it doesn't stop. No matter how you turn, the voice only gets closer. It's almost maddening. Suddenly, out of the corner of your eye, a white object glows from inside the desk. The pale colors escape through the wide gaps in the wood. Peering in, it appears to be a small statuette. The cabinet is locked, but you're able to reach your arm in from one of the splintered crevasses and pull the object out from the side.\n\nYou hold the figurine in your hands. Beautiful white marble with black veins opposes the dreary atmosphere. The elegantly carved statuette depicts a catholic nun, or someone similar, and is about as tall as your forearm. Her dress is chipped in a few places, but, miraculously, the head and body are still intact. You stare mesmerized by the statuette's small white eyes. The figurine lies motionless in your palms, but you swear you can hear it speaking to you. Warm air rushes down the back of your neck. A faint exhalation of breath tingles your ears. You shut your eyes tightly and force your head away from the idol.\n\n*fake_choice\n\t#Open your eyes.\n\nAs you draw back your eyelids, inches from your face now stands the horrible jawless corpse, free from its crucifix. Blood pulsates from its charred porous flesh like water on a sponge. Your body is paralyzed. You're unable to move or scream as zombified arms slowly raise and smother your face. The bronze flesh blocks out what little light illuminates the room. And then, it's gone. The moonlight permeates the space again and your eyes soak it in. You feel light-headed and a bit dizzy. You grab onto the desk and stumble back into the library.\n\nYou crash against the railing on the mezzanine, gripping it tightly with one hand and the idol in the other. Your legs steadily melt into jelly. Quickly, you rush down a nearby set of steps to escape. One story and then two, you finally reach the bottom of the library again before collapsing onto the ground.\n*page_break\n*gosub_scene chapter13_gallery", "chapter12_ignore": "You ignore the voices and step away. The air suddenly grows noticeably colder and falls silent, other than the breeze still flowing in and out of the room. Your eyes fall back on the dark enclave leading to the mine, wondering if the creature could slither forth from the trap door at any moment.\n\nWithout any leads and unsure of what to fear, you wander to the back of the library. All the furnishings that were once here have been reduced to ash and cinders. Your feet kick aside scorched rubble. You can see, built into the standing masonry, cut-outs where tall windows once stood guard over the great room and offered an abundance of natural light. Notches are scored into the stone along the back wall where a staircase might've once existed.\n\nAfter a few minutes of wandering through the ruin, your mind starts to waver. You barely recall how you ended up here. Suddenly, you stumble onto a large pillar that's fallen over onto an overhead balcony. There, a gap in the partially collapsed wall leads to another, unknown room. It looks like it could be a way out. It seems familiar, but you can't recall why you might've not taken the escape before. \n*page_break\n*gosub_scene chapter12_follow", "chapter13_gallery": "Some time later, your eyes flutter open. Your face lies pressed against the shattered floor. Your head pounds and something cold is tickling your feet. Your eyes spin as they try to focus. A barrage of rain pours in from dark clouds engulfing the back end of the library. Though the mezzanine shelters you from the droplets, a large puddle has gradually consumed your shoes at the base of a suspiciously well-kempt stairway. How you might've missed the staircase earlier boggles you. The clouds seem to have invaded your mind and hindered any coherent thought. With both arms, one bearing a hand still tightly clasping the mysterious statuette, you push off the ground. \n\nOne of the giant entryway doors has somehow swung open and reveals an antechamber on the other side. Without a second guess, you hobble back into the castle.\n\n*if went_servantsquarter = true\n\tYou stumble into the junction and immediately recognize it as the entryway to the Servants Quarters. The long dark stairway still stands despite the earthquake. The conjoined hallways spin counterclockwise and your legs struggle to keep you up. You pick a passage at random and wander down it, hoping it will lead you somewhere.\n\n*if went_servantsquarter = false\n\tYou stumble into the junction utterly disoriented. Multiple hallways branch-off as well as a stairwell that descends back down. Invoking a sense of fear, you back away. The conjoined hallways spin counterclockwise and your legs struggle to keep you up. You pick a passage at random and wander down it, hoping it will lead you somewhere.\n*page_break\nThe vertigo only gets worse and is quickly accompanied by intensifying hallucinations. The second another corridor appears, you can't help but turn down it. Your heart soars as you uncontrollably stumble from hallway to hallway, as if your legs were not your own. In the periphery of your eyes, faces emerge from the walls and whisper to one another as you pass by. They snicker and stare. You can feel their eyes burning a hole in the back of your head as you helplessly stride down the dreadful corridors.\n\nA barrage of conversations assault your mind. Some lasting seconds and others playing over and over again. Some incoherent and others perfectly intelligible. The dialogue grows louder and more intense as you grow increasingly lost.\n\n\"The chapel - What is this?\" a voice cries out from the walls.\n\n\"They will come around,\" a man furiously proclaims again and again.\n\nA few seconds later another voice emerges from the darkness and echoes through the hall, \"There is no turning back.\" \n\nOne line continues to eclipse the others and repeatedly asks the same question, \"Is it safe?\" But the mysterious speaker never receives an answer.\n*page_break\nAfter some unknowable amount of time, the torment finally subsides when you find yourself in what appears to be a long art gallery. The voices and faces fade from the walls as you step through a squat doorway. Great dilapidated works hang on all sides while some less fortunate pieces rot on the floor. You appear to be flanking the newly revealed room, having entered through a side door. It runs from left to right, longer than it is wide. At either end, the great hallway terminates with hulking black gates just like the foyer and the library. Statues, made of a similar marble as the figurine still held in your hand, line the long room on both sides, separated by a tattered rug. You walk down the palatial gallery inquisitively. The surrounding paintings depict various unknown individuals, some appearing as dignified royals and others as evangelical religious figures.\n\nYou find yourself facing one of the great ebony doorways at the end of the carpet. Violently, you lunge at it, fiercely bashing it with both hands, commanding it to open, but it does not yield. The walls start to tremble. The high pitched rattling of glass reveals a large chandelier above you, still intact. Its ornate architecture reminds you of the fallen one in the foyer. Suddenly, a deep bellow explodes from the room beyond and transforms into a high pitched mechanical scream. The howl is sustained for several seconds until a great gust of wind bursts from the door and beautiful pneumatic music fills the gallery. \n*page_break\nAfter recovering from the blast, you stare through the now open doors and witness yet another grandiose chamber. Like the Entrance Hall, two balconies run down either side of the room and stretch the length of a football field. Arcades rise from the ground floor and reach thirty or forty feet until they form a magnificent vaulted ceiling. At the back of the room, the mezzanines stop just short of a massive golden organ elevated on a small stage-like platform. Hundreds of brilliant pipes protrude upward and stop at seemingly random heights. Elaborate gildings fall over the conduits like beautiful golden willow branches. The metal glistens against rays of light which shine in through tall stained glass windows on the back wall, behind the organ, and many other apertures along the upper walls. They appear as rays of actual sunlight, a sight you thought you'd never see again.\n\nRadiant trails appear and dance across a barren tile floor laid out in front of you. Gradually, they spin around one another until, amidst their amorphic hue, bodies materialize from the lights. You stand and watch from the entryway, mouth agape, as phantoms dance to cheerie, carnival like music resonating from the ethereal organ. Right, then back, left, and spin. Forward, right, then left, and repeat. The spirits spin and twirl, unaware that anything could be amiss in the world. The finesse with which they move is mesmerizing. You watch for a few minutes and feel your mind miraculously recovering from its delirious state.\n\nSuddenly, the trance is broken by the approach of a man down the steps on your left. \"Ah, my friend, you've arrived at last.\" His voice tears distant memories from the back of your mind and places them at the forefront of your thoughts. His voice has followed you throughout every nook and cranny of this horrid place. \"I was beginning to worry,\" he grins. \n\nA familiar looking woman tails not far behind him. They appear surprisingly normal. No ghostly aura or chromatic hue, just light fleshy skin and ornate clothing. Hazel eyes offer some relief from the man's dark brown hair and the almost black beard that envelops the lower half of his face. He outstretches a hand and waits for you to reciprocate.\n\n*fake_choice\n\t#Shake his hand\n\t\tYou extend your hand and you grab each other's forearms as a gesture of good faith. He seems glad to have your assurance.\n\t#Withdrawal\n\t\tHe frowns and, after a few seconds, lowers his hand. \"Alright...\"\n\nThe man turns to face the room and marvels at the illustrious device that towers over the ballroom. \"Do you like it?\" he asks casually. \"Built by the finest craftsmen in the world, some from even beyond the Silk Road.\" He pauses for a moment, watching the dancers at the center of the room, before turning back to you. His voice stutters, as if hesitant to speak his next few words. \"I've summoned you here because I need to ask you for a favor.\"\n\n\"My lord!\" a man shouts from the balcony above. His appearance is corporeal as well, but not quite as clear as the man and woman standing before you. \"It's urgent,\" he interrupts.\n\nThe gentleman beside you, who you can only assume to be the lord of this castle based on his eccentric attire, scowls at the man on the balcony before apologizing to you, \"Please excuse me, I must tend to something. We will continue this conversation momentarily.\"\n\nThe woman behind him swaps places, her elegant blue dress brushes against the tile floor. She extends her hand to you, \"Shall we dance?\" She offers a warm smile.\n\nNot wanting to offend, you take her hand and proceed to the ballroom floor with the other guests. Music still sings from the organ as the ghostly apparitions wistfully caper to the whimsical rhythm. \n\n\"You know this one don't you? Don't be shy.\" The woman offers a recognizable chuckle as she waits for you to lead, one hand in yours and the other at her side.\n\nThe music starts from the beginning again and the guests move predictably as they did before.\n*temp dance_score 0\n*fake_choice\n\t#Left, right, spin, and back.\n\t\tShe cocks an eyebrow and snickers as the music transitions into its second chorus.\n\t#Back, right, left, and spin.\n\t\tShe cocks an eyebrow and snickers as the music transitions into its second chorus.\n\t#Right, back, left, and spin.\n\t\tShe smiles and a bright halo radiates around her as the music transitions into its second chorus.\n\t\t*set dance_score +1\n\n*fake_choice\n\t\t#Left, forward, right, and repeat.\n\t\t#Forward, right, left, and repeat.\n\t\t\t*set dance_score +1\n\t\t#Right, left, forward, and repeat.\n\t\t\n*if dance_score = 2\n\t*achieve revelry\n\t\"You dance well.\" The woman offers a nervous looking grin. \"Do you know who I am?\" she inquires.\n\n\tYou think back to all the apparitions you've encountered and all the vision you've seen. The woman seems so familiar, but you've started questioning reality. You can no longer discern between what is real and what your mind has fabricated.\n\n\tHer expression changes from a joyful grin to a stoic glare. \"${Name}, you must listen carefully. We don't have much time. I can feel him growing near. Odo has been corrupted by power and greed. You must never allow it to fall into his hands. And my husband,\" she continues, \"...he has been possessed by hatred. It feeds on their souls.\" Her pleas quickly transform into deranged ramblings spoken in a tongue you can't understand, \"Natus in arcanum ignis habet potestas ad imperium cordibus. Esse delendam in cor de ignis ipsum. You must end the cycle!\"\n\t*goto endof13\n*else\n\tThe woman seems disappointed. She offers a troubled grin, as if she were harboring some imminent knowledge, but is to afraid to share. She turns her head. \"I hear him coming, you should find somewhere safe. Perhaps we will dance again?\"\n\t*goto endof13\n*label endof13\n*finish\n", "chapter14_sanctum": "The music dies and the dancing revelers slowly evanesce into nothing. The mystic blue aura spinning around the room transitions to a dismal gray. You watch as the woman's hair turns into a faint mist and evaporates, spreading to her face and then body.\n\n\"Go!\" a voice erupts. You turn toward the front of the ballroom and see his lordship striding toward you, away from the now closed doorway. \"We must move quickly!\" He motions for you to follow as he passes by. You turn, but in the brief moment before your eyes refocus, he vanishes. \n\nYou stand, alone, in the wide and massive nave. The castle falls deathly quiet again, but only for a brief moment. Whispers, again, begin emanating from the figurine you realize is still tightly clutched in your hand. It doesn't seem to be saying anything coherent, but commands start popping into your mind.\n\nYou walk up to the great organ, now resting dormant, at the end of the room and gaze up at its imposing stature. Some of its golden pipes are as wide as your torso. The windows behind the tubes still glow with the fiery warmth of the sun, but weaker than before, like its hidden behind a thick blanket of clouds.\n*page_break\nOn a narrow platform above the keyboard is a circular indent. Your arm raises on its own and places the ornate statue in the groove. It fits perfectly. A distinct mechanical noise erupts beneath your feet and the short staircase leading up the instrument drops into the floor. The steps invert and now descend, leading to a newly revealed doorway beneath the stage. \n\nA shadowy figure emerges on the right mezzanine. It lingers where the light can no longer reach and moves toward the staircase now on the other side of the room. Long gaunt fingers grasp the balustrade and curl along as it moves slowly.\n\nYou drop onto the stairs below and push open the hidden doorway. The heavy stone scrapes against the hard floor. On the other side, is a narrow tunnel crudely cut from the surrounding limestone, just like the mine shaft, but much smaller. The passage is faintly illuminated by a light source just out of sight. As you close the slab door behind yourself, a spiny arched hunchback hobbles onto the far end of the dance floor. Grayish-black hair dangles from the bony spine and drapes over its head and ghoulish fingers. It stops and stares as the slab door seals shut.\n*page_break\nStep by step, you venture down the passageway. Something about this place is calming. Perhaps it's the warm air and the light ahead; or, maybe it's the hard rock walls offering some sense of protection; or, it could simply be the lack of trash and debris that permeate the rest of the castle. Regardless, you have no qualms about venturing deeper into the crypt-like chamber.\n\nUpon traversing the final few feet, your eyes are greeted by a bright light emanating from the center of a large rounded room. As they adjust, a pedestal appears. Resting atop the white marble stand is a glowing orb of solid gold. You're forced to squint your eyes as you approach. As you near, however, the orb's radiance seems to grow dimmer and dimmer.\n\nHalfway into the chamber, the dwindling light unveils vibrant painted walls. Intricate hieroglyphics surround the rotunda, like something one would expect to discover in an ancient Egyptian tomb. The beautiful colors have withstood the test of time and meet your eyes with astonishing vibrancy. The walls harbor a plethora of puzzling depictions of people possessing human bodies with the heads of animals: dogs, birds, reptiles, and even a man with a lion's mane. A few feet in front of you sits the pedestal and, on either side, are two separate depictions of rulers seated on their own elegant thrones. Each dawns an identical circular crown above their skull with several individuals bowing before them.\n\nYou can't help but continue to navigate the fascinating illustrations, but you’re unable to decipher the text that covers most of the walls. On one side of the room is an image depicting three men atop what appear to be flying horses, casting spears onto citizens below. On the other side is a carving of crude vertical rectangles. Behind them is another, partially obscured, circular object. The image may depict a sunrise or sunset, but you can't determine decisively.\n*page_break\nAs your eyes continue to scan the hieroglyphics, they're met by an unpleasant surprise. In the doorway, the horrific creature looms. It's mangled spine extends two feet above its head and about three above your own. Its slender arms rest on the floor, it's fingers so unnaturally long they almost reach your toes. Two soulless black eyes look down at you from beneath long stringy hair. It's head twitches, emitting the eerie clicking noise. It stares with its head slanted, almost like an animal studying you. Slowly, it drags a hand toward you.\n\nYou jump back and bump the pedestal. The golden orb falls off its rounded mount and plummets to the floor. With extraordinary speed which you can't explain, you manage to snatch it from the air just before it hits the ground. The orb is heavy and hums with energy in the palm of your hand. The glow is faint enough to admire its flawless surface and still illuminate the cryptic walls several feet away.\n\nThe creature unleashes a guttural wail, revealing a set of jagged yellow fangs. It continues to hobble forward until you're backed against the far wall. One of its back legs, long and bony like its arms, smashes the pedestal as it walks over it. Then, only a few feet from you, the creature extends an open hand, revealing its skeletal palm.\n\nYou glare at the golden orb once more. Its surface is unimaginably smooth. Inside, you see a spectacular chromatic light that sucks you in. Time falls away, and you feel suspended in a space beyond life and death. Softly, you hear your name being whispered in your ears, \"${Name}...\"\n\nThen, the horror's growl breaks the trance. You're force back into your body and face the horrific monstrosity standing before you. Its long finger nails hover an inch from your gut.\n*fake_choice\n\t#Surrender the orb.\n\t\t*gosub_scene givetheorb\n\t#Keep the orb.\n\t\t*gosub_scene keeptheorb\n\t*selectable_if (went_cistern) #Destroy the orb.\n\t\t*gosub_scene destroytheorb\n*goto_scene ending", "chapter2": "*set Battery 14\nYour plane finally lands just a few minutes before midnight. The flight was long and grueling, but you managed at least a few hours of sleep. The first few are always the worst until the kids pass out.\n\nThe airport is eerily quiet when you enter. The gates stretch from east to west and are almost completely deserted save for the two or three late night passengers sleeping in chairs. A janitor casually sweeps debris out of the main walkway. You quickly grab a temporary cell and dial Jay's number. It rings a few times before you're greeted by his signature Philly accent, \"You've reached James Martin. Sorry I missed your call. Leave your name and message and I'll get back to you as soon as I can.\" \n\n[i]Beep[/i]\n\n*fake_choice\n\t#\"Jay, it's me. I just landed...\"\n\t#\"Hey, asshole, you better not leave me stranded here...\"\n\"...I'll find a hotel for the night and send you the address. Call me back when you get this.\"\nYou rent a car and drive just across the highway to a quaint three story inn. The receptionist spouts some warm German greeting as you walk in. \n\n\"Sorry,\" you respond and continue in what little German you know, \"Sprechen Sie English?\"\n\nShe smiles courteously and glances at the bags you've just set on the floor. \"How long will you be staying?\"\n\n\"Just the night, please.\" You hand her your credit card while trying to balance the tumbling luggage behind you.\n\nShe motions down the hallway. \"The room is number two on the left, floor one.\"\n\nYou nod politely in response, \"Danke.\"\n\nThe room is extremely small, but cozy. A window on the far wall looks out onto the bright city. A queen-sized bed dominates a majority of the floor space, leaving only a small gap by the wall to squeeze through. A small sink has been stuffed into the corner, just to the right of the entrance, with a door to a bathroom too tight to outstretch both arms. It may not be luxurious, but it'll suffice for the night. You toss your phone on the bed and your head soon ures emerge from the smoke and drag you away. You scream for them to save those trapped in the burning building, begging for their rescue, but they ignore your pleas. They turn you on your stomach and fasten tight cuffs around your wrists.\n\n\"No, don't do this!\" you cry. \"Get them out, get them out!\"\n\nThey throw you into the back of a car and slam the door before vanishing into the all-enveloping black smoke. You lay in agony as you twist your wrists trying to escape the bonds, but the extent of your injuries become increasingly apparent.\n\nSomething rubs against the outside of the car. The window is open, and you see five distinct fingers slowly reach up from outside and clasp the metal frame. The fingers are charred black with cracks that reveal bloody untouched flesh beneath. The hand releases its grip on the door and slowly reaches inside. The roof of the car suddenly implodes and pins you against the seat, but forces the arm to withdraw. You lay in the back seat of the car, unable to move until the smoke suffocates you.\n\nA deafening scream once again pierces your ears, shrill and blood-curdling. You snap awake and fling up from the bed. As your eyes adjust they are greeted by the small hotel room. The sun peeks through the drapes and projects a glowing streak across the bed. It's then that you realize your phone's been ringing. You reach for the nightstand, but it's not there. Frantically, you search through the sheets until your fingers brush against it. You snatch it up and answer.\n*page_break\n\"Hello?\" you croak.\n\nJay's voice comes over the phone, \"Hey, sorry I missed you. You find a hotel alright?\" he inquires.\n\n\"Y-yeah,\" you stutter, rubbing your face.\n\nBefore you can say anything else he abruptly changes the subject, \"Well, I had to call in a few favors, but I got us a meeting with the girl.\"\n\n\"Thank God!\" you exclaim. \"Still no ID?\"\n\n\"No,\" he responds bluntly. \"She's so beat up the police can't even get a good fingerprint.\" You hear the sound of a car door shutting on his end. \"Can you meet me there at ten?\"\n\nYou switch over to speaker, pull up the browser, and start typing in the name. The screen flickers and the hospital pops up as the top suggestion, ‘Saint Adelaide's, 2 hours and 23 minutes away.'\n\n\"Yeah, I can make that.\"\n\n\"Alright, see you there.\"\n*finish\n", "chapter3": "*set Battery 92\nYour route takes you through the foothills of southern Germany. In the distance, great mountains peer over the dense treeline. Dark green pines surround you both left and right, looming over a black, impenetrable undergrowth. Your bag of spirit goodies rests in the passenger seat. After so many years of work and your affinity for the supernatural, you've learned what works and what doesn't. You snicker to yourself thinking about those goons on ghost hunting shows that lug around pounds of equipment and trying to interpret microphone scuffs. If there is a spirit present, finding them is usually the easy part.\n\nEventually, amidst the endless span of forest, a small steeple emerges above the horizon, followed by numerous old cottages and a few out of place, more modernized, amenities. A quaint isolated village residing peacefully in a valley surrounded by ancient giants. You're forced to veer right at an intersection just before the village center. The neglected road hugs the forest's edge until an obvious hospital emerges from behind the final bend. There, on the other side of a large roundabout, sits a multistory, new-looking complex composed mostly of white concrete and marble. The front atrium is rounded and surrounded by silvery glass windows, but leads to much larger, more traditional, rectangular buildings behind it. The whole complex is raised a few feet off of the slanted terrain by a limestone brick foundation. In the front, an elaborate porte-cochère jettisons outward from the rotunda and is crowned by a large glossy red cross.\n*page_break\nYou take the roundabout pon reaching the end of the corridor the doctor hails the elevator. You glance at the Inspektor and see the disturbed expression on his face.\n\n*fake_choice\n\t#\"Has anything strange happened since she arrived?\"\n\n\t\tThe doctor looks at you sideways, \"Like what?\"\n\n\t\tYou purse your lips, contemplating how to ask your question in a way that they would understand. \"Unexplainable things, maybe seemingly supernatural? It could be something simple like sudden electrical problems, or…\" You hesitate again, hoping they understand English well enough to comprehend your babbling. \"Something more obvious like gravitational anomalies or nonsensical speech?\"\n\n\t\t\"Oh,\" the doctor scoffs, \"uh, no, nothing that I know of.\"\n\n\t#\"Has she been psychiatrically evaluated yet?\"\n\t\t\"No,\" the doctor remarks. \"The girl has been in critical condition since arrival. After an initial outburst at another facility she has been provided sedatives until she can recover, for our safety and her own.\"\n\n\t\tYou and Jay exchange a curious glance.\n\n\t\t\"Did she receive any form of drug screening?\"\n\n\t\t\"No,\" the doctor remarks. \"Our efforts have been focused on keeping her alive. The cause of her condition is a matter for the police and now you, I've been told.\"\n\n[i]Ding[/i]\n\t\nThe elevator doors slide open and reveal a padded interior. The walls behind the royal blue cushions are made of sleek stainless steel. The party steps inside and the doctor takes you to the third floor.\n\n\"There have been no missing person reports and not a soul has come looking for her. Several fractures to her ribs and forearms, her right ankle, and pelvis. From her violent outbursts and disorientation, we suspect possible brain damage as well.\" He stutters a bit as he attempts to translate his thoughts, \"She will have surgery on her right hand this evening, which has been completely crushed. She will likely never regain full use.\"\n\n[i]Ding[/i]\n\nThe doors open up to a small, empty waiting room. The four of you proceed left and down another series of hallways until, finally, you reach a closed door numbered \"327.\" In front of it, a guard sits stationed in a cheap four-legged metal chair. He looks up from the book resting in his lap when he hears you approaching. Doctor Zimmerman only nods at the man and he goes back to reading. The doctor leads the four of you inside.\n*page_break\n*set Battery 71\nThe room is fairly large for a hospital room. On the other side, about twenty feet away, a large window overlooks the mountains. Several medical devices are pushed up against the walls, two chairs reside near the door, and two others along the window. In the center of the room, a young woman lies motionless in a hospital bed. Her body is almost completely concealed by white gauze. It's only the beeping of the ECG beside her bed that reassures you she's even alive.\n\nYou quietly walk into the room. There's an immediate and unnerving aura about it. The rhythm of the heart monitor is the only thing that breaks the silence. Jay takes a seat near the door, trying to stay out of sight, while both you and Coven take the seats by the window and closer to the bed. Once inside, Zimmerman shuts the door and flicks on the lights. With the click of the door, the girl's eyes flare open.\n\nShe remains frozen. Her eyes stare upward at the ceiling. Then, after a few long seconds, they turn to you, completely disregarding everyone else in the room. Coven glances at the doctor and Jay, as if seeking reassurance that he isn't invisible. Before you're able to utter a sound, the girl whispers something nonsensical in a shrill, eerie voice. Her croaky vocal cords send chills down your spine. You stare into her eyes. Her pupils are normal. What little of her face is revealed is completely devoid of emotion. Her gaze is broken only by an occasional blink. She lays motionless like a paralysis victim.\n\n*page_break\nYou calmly introduce yourself. \"Hello, my name is ${Name}. I'm here to ask you some questions about what happened to you.\"\n\nThe girl stares blankly, completely despondent, except for a subtle twitch of her left eye.\n\n\"Do you know where you are?\"\n\nShe watches you for a moment and then her eyes suddenly grow wide. You're certain she'd have an expression of shock or awe if her face wasn't mostly wrapped. \"No, lauf!\" she shouts.\n\nThen, without warning, her neck seizes up and forces her head back. She starts gasping for air before hysterically shouting, \"Nein, nein, nein!\" The ECG explodes with activity as her body seizes. \"Nein, geh...!\" she cries.\n\nDoctor Zimmerman jumps out of his chair and grabs something from a nearby tray. He injects a mysterious liquid from a long syringe into her IV and her heart slows back to normal. She gasps for air, like she had just run a marathon, choking on her own saliva. She stares at the wall across from her. Almost two minutes pass until she starts glancing around the room and eyes each one of you, then the ceiling, and then the door.\n\n\"Wo bin ich?\" she remarks exhaustedly, her face white as snow.\n\n\"Saint Adelaide's Krankenhaus,\" Doctor Zimmerman replies, then saying something else in German you can't make out. His voice and expression both remain emotionless. He looks at you, eyebrows furled, but rather than asking you to leave he flicks his head towards the girl, gesturing to continue.\n\n*disable_reuse\n*temp questiones 0\n\n*label questiones\n*if questiones = 2\n\t*goto questionsdone\n*fake_choice\n\t#\"Do you know your name?\"\n\t\t\"Deine name?\" You reiterate the question in your broken German.\n\n\t\t\"I…\" she stutters, still catching her breath. \"Anna, my name ist Anna Köhler.\"\n\t\t\t\n\t\tYou glance at Detective Coven and he shrugs.\n\t\t*set questiones +1\n\t\t*goto questiones\n\t#\"What is the last thing you remember?\"\n\t\tCoven translates your question into German and she responds with short winded sentences. \"She says she remembers
