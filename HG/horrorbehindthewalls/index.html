ts it, you realize the zombified face is only one of many. Rotting skulls bulge out of the creature's sides and simultaneously emit a dreadful wail. Arms and legs extend contorted in unnatural ways and dangle from the center of the horrific amalgamation of corpses. It lunges at you and you jump back just in time to evade its nearest arm. The forearm is decomposed to the bone and what little flesh remains is a grotesque green and purple.\n\nYou swing around and grab the nearest shelf, launching off of it and bringing the decrepit frame down behind you. The horror continues to wail from the dark as you sprint down the narrow aisle. As you dash past the many cabinets and shelves, glimpses of vibrant orange, green, and red manifest in your periphery. Suddenly, your bag snags on something and the strap snaps under the force of your momentum. You tumble, but manage to catch yourself before hitting the ground. With the sound of shelves breaking and numerous legs stampeding towards you, you're forced to leave it behind. Not much further down, an open door appears out of the corner. You don't think twice before bolting through it and slamming the latch shut behind you.\n*page_break\nThe air grows silent as you back into a newly revealed passageway. The clamor from beyond the door ceases almost immediately. You take a moment to catch your breath and, after a few seconds, you turn away from the locked door and rest your eyes on a faint blue light shimmering at the distant end of a long skewed tunnel. Timber supports line the walls every few feet like an old mining shaft and uphold several suspicious metal pipes against the ceiling. They travel the length of the tunnel and disappear into the wall just above the preceding doorway. Something whispers in your ear, ushering you deeper into the cave. With no way but forward, you start your trek down the grim passage.\n\nAs you walk, the light seems to be moving as well, always illuminating the distant end of the tunnel. The voices of the men then begin to reemerge.\n\n\"There is no doubt that Odo suspects your involvement in the kidnapping of Pope Gregory...\" the coherence of the conversation comes and goes.\n\n\"We swore an oath Cencio. Let the swine come.\" Finally, the voices fade out for good.\n\nThe air turns warmer and the light grows dimmer. As you turn one final corner, your flashlight reveals an open room that the tunnel feeds into. The chamber is rounded with stone walls similar to the architecture found in the rest of the structure. The ceiling stretches only a foot or two above your head. Two other passageways venture off in different directions and a large arched gate is built into the wall on the right. Above the door, a dozen rusty pipes shoot out of the stone and flee down the three separate hallways. The metal is so corroded that they almost blend in with the natural rock. A few turn directly upward and tunnel through the ceiling. The remaining, you count six, split down one of the other two passages. An ominous hum pervades the small rotunda.\n*page_break Next Chapter\n*gosub_scene chapter10_furnace\n*return", "chapter9_sq": "*set went_servantsquarter true\nWithout a second thought, you bypass the ominous stairwell and stride towards the final hallway. Something in the back of your mind reassures you that this is the right way to go.\n\nAs you turn the corner and leave the great room, you're greeted by an open, narrow walkway overlooking the now dark mountainside. The left wall is almost entirely collapsed. You hug the right side, careful to avoid the bricks that crumble under the fallen weight of the collapsed exterior wall. Fog rolls over the fir trees below and then tumbles down the mountainside in a beautiful waterfall of mist. As you gaze in awe, your eyes are gradually drawn to a tall ruined tower looming over the cliffs on the right. The fog crawls up the side as if it's trying to get in. The structure looks like it could be attached to the rest of this structure, but the back half is just out of sight.\n*page_break\nAs you near the end of the walkway, you feel the floor slip out from under you. The frail ground gives way and you fall sideways. You stretch your arms outward and the tips of your fingers just barely grasp a jettisoning ledge. Your body slams against the side of the foundation. Bricks tumble to the ground behind you. The stone is wet and your fingers slip repeatedly as you try to pull yourself up. Your legs flail wildly, desperately searching from somewhere to stand. You chip away at the rocky cliffside with your toes and slowly push yourself up just enough to grip on the rugged and damp flooring. After a few minutes of struggle, you manage to pull yourself to safety. You roll over on flat ground, soaked and gasping for air. Everything is muffled by your hysterical panting. Your muscles burn. The whole side of the building collapses down the eroding mountainside, taking what little remained of the old walkway with it.\n\nYour vision is fuzzy for a few minutes until your adrenaline starts to die down. The sound of your breathing finally succumbs to the silent air. You roll back onto your side and push off with your feet. The riled dust and dirt make it difficult to breathe, compelling you down the remainder of the hallway and further into the structure's dark recesses. The light quickly dies, forcing you to dig for your phone once again.\n\n*set battery 16\n16% Battery\n*page_break\nThe air becomes cold and thin, but breathable at least. Your footsteps echo down the wide corridor and delay just enough to sound like someone else's. Finally, a room emerges. A wooden door lies fallen and beaten just within. The stones around the doorway are in disarray, zigging and zagging in an unnatural way. The mortar is fragmented and splayed across the room further than if they had just fallen. As you inspect the damage, a squeal erupts from the black hallway, like a rusty hinge. You shine your light back in that direction, but it's only bright enough to see a few feet. You stand frozen, listening. A few seconds pass and you hear the noise again, but this time closer.\n\nLight in hand, you take a step down the corridor. The air is still. You take another step and continue toward the noise. Suddenly, your foot lands in a shallow pool of water. The splash is nearly inaudible, but amidst silence, it sounds like an explosion. Your shoulders tighten and fists clench. You stare into the dark until everything is silent again. You relax, confident the noise was nothing. You move to take your next step when a face appears out of the dark. It's hideous face looks partially melted. An arm reaches out and grabs at you viciously. In a swift movement, you narrowly evade the claw's grasp. The face lunges forward and you stumble backward, pushing off the ground and into a sprint back towards the side room.\n*page_break\nYou fly into the open room and flash the light around wildly. An old wardrobe appears out of the corner and, with the sound of the monster stampeding closer, you swing its feeble doors closed behind you.\n\nThe creature storms into the room. You fumble the phone in your hands as you desperately try to turn off the flashlight at the last second. But, as the monster looms dangerously close, you resort to smothering the light with your palm.\n\nYou can only faintly make out the creature's silhouette in the dark. It's unlike anything you've ever encountered. It takes every ounce of courage you can muster not to gasp in horror as the grotesque monstrosity hobbles into view. It walks on at least four legs, maybe five or six. Arm like limbs hang from its blood red body all across its back, broken, mangled, and twisted at gruesome angles. Jagged spikes stab outward from its belly like fractured ribs. And most horrifying of all, human heads sewn into the beast's fleshy skin, jaws broken and agape, screaming in horror.\n\nYou press your back against the hard wall of the cabinet as the monstrosity slowly paces around the room. Stringy flesh dangles from bones and drags against the ground. You try to control your breathing, but your heart beats out of your chest. Finally, the horror stops just outside the wardrobe. Moans pour from the deformed maws of the trapped souls. The floor creaks under the weight of the amalgam's many spidery legs. Bones crack like splintering wood. Lifeless eyes peer through the crack in the door. You grip the vial of holy water that you've saved in your satchel.\n\n*fake_choice\n\t#Use the holy water.\n\t\tYou take a deep breath and burst through the doors. The creature rears back in surprise, revealing the infusion of corpses that comprise its body. The many lifeless faces that protrude from the amalgamation jointly emit a deafening scream that shakes the brittle stone walls. Carried by the moment of your swing, water spews forth from the vial and splashes against the undead monstrosity's skin. Immediately, the water hisses against its flesh and vaporizes. The bloody skin where the water had touched turns white and bubbles. The abomination turns and stumbles out the doorway in a panic. The cries of the damned souls fade away as it disappears into the dark. Thoughts race through your head as you try to deduce what in the hell that could've been.\n\n\t#Stay silent.\n\t\tYou continue to hold your breath until your head dizzies, daring not to make a single sound. The creature lingers for what feels like an eternity until, finally, it foolishly turns and stumbles back through the doorway. The creature's ignorance baffles you. Any being of intelligence, even a spirit, would've discovered you. Why did it retreat? Thoughts race through your mind as you place your hands on your knees and catch your breath.\n\nYou peer around the room which is mostly lackluster, other than a fireplace with a familiar odd feature. The unit is shared by a room on the opposite side, which you can see through the iron grates that would've held the firewood in place. But, like the room in the Entrance Hall, a mysterious metal pipe protrudes from the ground below the chimney. The pipe is hollow, perforated, and cut off at the top. Brownish and heavily corroded, it doesn't look like the iron grate that surrounds it. As you lean in closer to inspect it, faint wails ascend from the hollow extrusion. You place an ear just an inch from the cold metal and are assailed by what sounds like low pitched white noise traveling up the duct.\n\nWith the battery on your light dying, you slide away from the fireplace and poke your head back into the hallway. With no other direction to go and the coast looking clear, you cautiously proceed down the path like before.\n*page_break\n*label skip\nThe dark grows increasingly haunting. Noises shift to the left and right but are gone by the time your narrow beam of light can reveal them. The small sliver of light the emits from your device is the only thing that protects you from being lost in total blackness. Something moves again to your left. Probably just a tumbling rock, you tell yourself. Then, behind you, something scrapes along the rocky floor. You shuffle forward quickly as you shine the beam down the long indiscernible hallway behind you.\n\nFinally, a faint blue hue emerges from around the corner. What little light it gives is still infinitely more than the unending void from which you just emerged. Above you, probably two or three stories high, a thin curtain of light sneaks through a crumbling hole in the roof. Rotting timber beams protrude from the old masonry. The moonlight faintly reveals a large rotunda, but specifically, points to another large doorway at one end. It looks just like the black door in the Entrance Hall. Gray wispy ash marks scar the black wood. Whatever intricate etchings were once carved into its coarse grain seem to have been burned and chiseled away. Yet, the door still stands. \n*page_break\nYou analyze the curious gate for some time, cobwebs riddle the corners and scraps of wood litter the floor, when you suddenly realize you're being watched. Behind you, at the center of the room, the almost grayish-blue silhouette of a person faces you. Their appearance is too obscure to make out any details other than their height, which seems less than 6 feet. The figure doesn't move and a light halo around them courses like water sloshing in an endless circle.\n\n\"Hello?\" you call out, assuming phantom must not mean you harm.\n\nThe silhouette steps back, their halo revealing a grand stairway descending at the dark end of the foyer. The width of each step is as wide perpendicularly as the rotunda itself. Pipes, just like the ones you've seen protruding in the private chambers, ascend the stairway and hug the walls around the rotunda before disappearing into the gritty facade in all directions. Superfluous pillars stand on either side of the stairs as if upholding the grandiose ceiling above.\n\nThe wisp quickly vanishes down the steps, relinquishing the chamber back to the clutches of darkness. You get the sense that it wants you to follow. Compelled, you hover at the top of the staircase and glare down. The steep decline descends easily a hundred steps. The faint flow still emanates from the bottom. With a deep breath, you descend the staircase.\n*page_break\n*set Battery 11\nThe stone is cold and wet. Green moss emerges from the cracks where the steps meet the overarching walls. It creeps up to the ceiling and dangles like slimy tendrils that grab your hair. At last, your toes reach flat ground, but you find no relief when only darkness greets you. Again, the entity has vanished. You shine your phone light around a wide outstretched chamber. Colonnades run down the room and disappear into the black room. Near the steps, an old iron sign still clings to the crumbling wall, \"Servant's Quarters,\" it reads.\n\nAs you take your second step onto the new subterranean floor, you're instantly struck by an overwhelming chill up your spine. The room remains quiet and you continue down the corridor, the sensation only acting as reassurance that you're heading the right way. \n*page_break\nSmall chambers branch off from the hall, accessible only by pitiful doorways barely wide enough for an average man to squeeze through. Shadows seem to exude from the slits and your light does little to penetrate inside. You pass them, only feet away, but an overwhelming sense of fear seizes your body and holds you back from peering inside the many ominous rooms. It doesn't take long before the chills travel into your skull and morph into an auditory sensation. The tapping of footsteps bounce around the room. Light and airy voices start to fill the air. At first, they sound like inaudible shouts and yelling, but slowly, words materialize amidst the faint screams.\n\n\"We must hurry!\" A male voice cries. You recognize it as the man who spoke to you earlier. \"There is no time!\" He sounds hysterical and his words are barely discernible.\n\nSuddenly, the ground quakes beneath your feet and debris tumble from the earthen ceiling above. Dust quickly envelops the room. \n\nYou freeze, unsure if you should continue blindly. The dense particles make it difficult to even breathe. Then, the familiar blue light reemerges obscured in the distance. It appears as a small shimmer amidst a light brown haze. It pulls you forward. Something hard slams against a nearby wall.\n\n\"Ercan!\" A woman shouts. Her voice is muffled behind something dense and impenetrable to anything less than truly desperate screams.\n*page_break\nYou continue pushing through the cloud sediment. Voices call you toward the light at the end of the tunnel. Rocks explode as they hit the ground at your feet. It sounds like the building is collapsing around you. Frantically, you shuffle across the rough surface and begin to sprint through the blanket of dirt and rock. Finally, you break through the thick veil and tumble onto the ground in a wide open room.\n\nYou cough dirt out of your lungs and gasp for air. Looking around, the room is peculiarly devoid of debris. The air is clear and the ground has ceased its shaking. Rising to your feet, you glance around and find yourself in some kind of underground crossroad. To your left and right, branching tunnels diverge in opposing directions. Ahead, a gargantuan gate blocks the way. Above it, a dozen strange pipes protrude from the stone and diverge. The metal is so corroded that the pipes almost blend in with the natural rock walls. A few turn directly upward and tunnel through the ceiling only a foot or two above your head. The remaining, you count six, split and travel down one of the other two passageways.\n*page_break Next Chapter\n*gosub_scene chapter10_furnace\n*return", "choicescript_description": "The sun had set across the mountain tops, save for a single flicker that still glistened from a single peak. The locals know not to investigate. Not only because the German government has forbidden it, but also because those who do never return the same, if at all. The few known survivors, in-between their lapses of madness, speak of great stone walls that uphold a structure more imposing than any known today. Little does the world know, however, that these walls no longer serve their intended purpose of keeping intruders out, but rather, to now keep something in.\n\n[i]The Horror Behind the Walls[/i] is an immersive 34,000-word interactive horror novel intended to provide phenomenal imagery in every scene. From the author of The Aether: Life as a God, Alex Ryan, your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\nAll you know is that someone, or something, has been calling to you. With hundreds of cases solved and thousands of spirits laid to rest, your name has become synonymous with the paranormal. Renowned as one of the world’s greatest private investigators, you are about to uncover a secret far more disturbing than any case you’ve worked on in the past. Night after night, nightmares have been sent across the world to plague your dreams. Something that’s been hidden away from a time long forgotten now beckons to be remembered. \n\n• Play as a male, female, or nonbinary.[n/]\n• Track down the source of the nightmares that have haunted you.[n/]\n• Explore an ancient castle and traverse its labyrinth.[n/]\n• It is up to you to piece together the clues and discover what happened.[n/]\n• Uncover an ancient secret and determine how the story ends. [n/]\n• Survive the horrors and find a way to rid them from the world forever.[n/]\n\nUncover the truth and witness The Horrors Behind the Walls.\n\n[b]Content Warning:[/b] This game contains language or imagery that may be harmful to some audiences, especially related to household fires.", "choicescript_stats": "\n*stat_chart\n\ttext FullName Name\n\tpercent Battery Phone Battery\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 8 through 14[/b]\n  \n  Unlock chapters 8 through 14, including the thrilling conclusion!\n  \n  *purchase_discount adfree 2021-10-14 $2.99 $1.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 8 through 14[/b]\n  \n  You've paid to unlock chapters 8 through 14.\n", "death": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nYou have died.\n\n*goto_scene ending", "destroytheorb": "*achieve destroyorb\nWith nowhere left to go, you turn and smash the golden orb against the hard wall. The flawless surface of the sphere suffers not a scratch. The creature roars with anger and its bones crack as it raises a claw to strike you down. Desperately, you bash the orb against the wall once more and an ineffable sensation of power washes over you. A white light fills the room and the creature releases a shrill scream. It pounds the floor repeatedly and the earth shakes with every brutal blow made against it.\n\nAfter a few seconds, the blinding light dissipates. When your sight fully recovers, the creature is gone. You pat your body down to ensure you're still in one piece. The pedestal at the center of the room is now just a pile of rubble. You glance down at your cupped hands and stare in awe at the still glimmering orb. It seems like such a simple object, but it fills you with both wonder and dread. \n\nYour body suddenly succumbs to an overwhelming surge of fatigue again. Whatever energy, adrenaline, or fear was fueling you has utterly depleted and you struggle to stay on your feet. You fall against the wall and hobble your way out of the room and back through the tunnel. The orb still emits a gentle white light. In your hand, it's neither too strong nor too dim.\n\nYou emerge back in the large organ hall. The dance floor and mezzanines are deserted, but glorious rays of sunlight shine in from above. You stare back into the ominous orb. Something about it, besides its beauty, captivates you. It hums with a lively energy and calls your name, \"${Name}.\"\n\nIt takes every ounce of the willpower you still have to smash the seductive object against the floor, but it remains unscathed. Again, you hit it against the hard floor, but no amount of force seems to harm it. Perhaps you weren't meant to destroy it; or, perhaps there is another way.\n*page_break\nYour body starts sweating and you realize how hot the room's become. The floor vibrates and a single thought races into your mind, \"ignis- fire.\" Orb in hand, you lurch your way out of the grand hall. The organ looms silently behind you, ever guarding the defiled sanctum below.\n\nYou wander back through the ancient halls. Something about the castle seems different, feels different. As you traverse the maze like structure, making turns based on faint memory, the walls are silent. The dark aura that permeated every rocky crevasse is lighter. Signs guide you back to the cistern, the only way you know how to get back to the depths of the burning furnace.\n\nThe air is still wet and humid. Water drips from the high ceiling into the black pool where hundreds of victims were chained and drowned. You stare into the murky water, but the faint light of the orb doesn't penetrate any deeper than the surface. Slowly, you cross the bridge once more, one firmly planted step at a time. The air is as putrid as ever and burns your nostrils. The door on the far side remains open and, as you clear the end of the bridge, a wave of heat hits you. A smoky heat escapes from the many pipes protruding from the forward tunnel. You pay no mind and press on, but the cramped space grows hotter. Beads of sweat drip down your forehead. Finally, you make it back to the toppled gateway. On the other side, the colossal machine still rages on. Seeping smoke from the many crudely hammered plates that encompass its outer shell worsen the black smog that cloaks the room.\n\nYou stare once more at the golden orb. Its ethereal hum is like a melody that pervades every fiber of your being. Just looking at it offers a surge of unexplainable satisfaction. Suddenly, you find yourself hovering over the machine's open coal chute where you cast down the fleshy monstrosity just hours ago. Flames reach up from deep within the metal vent futilely trying to escape. You hesitate, but you've already made your choice. Against every irrational thought demanding that you keep the alien relic, you release your grip. The orb plummets into the orange flames below and, just like that, it's gone.\n*page_break\nSeveral seconds pass and nothing happens. Then, suddenly, the machine begins to vibrate and quickly escalates into a violent shaking. The room grows brighter and brighter and the pervasive black smoke spins around the room uncontrollably. A small wisp of light breaks through one of the many metal plates and joins the vortex of smoke now clinging to the outer walls of the cavern. A second wisp, no bigger than your hand, escapes the metal prison. Flames shoot out from the punctured hull. Then, another breaks through and another until a swarm of lights abruptly burst from the strange contraption. Thousands of white shimmering particles meld with the surrounding black maelstrom and dilute its dark hue. The metal emits a deafening screech as the power of the reaction overwhelms what little strength remains and the colossal furnace explodes.\n\nOnce again you're blinded by a bright white light, unsure if you're dead or alive. The adrenaline flooding your veins dies and is replaced by a sense of tranquility.\n\n\"Thank you,\" a thousand voices utter at once and, somehow, you hear each individual one.\n*page_break\nYou wake up in the hospital some time later. Your room looks identical to the one the girl was in just a day ago. A wave of relief washes over you. Not just from knowing you're alive, but because an overwhelming burden that has haunted you for months now has finally been lifted. They are free.\n\n\"You're awake!\" Jay exclaims.\n\nYou glance over to see your old partner sitting in a chair by the window. His suit is shredded and his face is covered in dirt.\n\n\"J-Jay?\" you mutter. \"W-what…?\"\n\n\"Just relax. We're at the hospital.\"\n\n\"How did we get here?\"\n\nHe looks down. \"Coven,\" he remarks. \"When you got sealed in- I ran around that place for hours, but there was no way in. I had no choice but to run back down the mountain until I could call for help.\"\n\n\"Damn,\" you remark, \"we're in some deep shit aren't we?\"\n\nJay chuckles, \"yeah, they're pretty pissed. You should rest.\"\n\nSuddenly, a serious looking man enters the room. His hair is short and he dawns a familiar looking suit. He smiles on approach, completely disregarding Jay. \"Hello Detective, are you feeling alright?\"\n\n\"Better than I have in months,\" you respond.\n\n\"My name is Sam,\" he continues. His accent is thick, but his English is good enough. \"I represent a group of people who are very interested in the site you stumbled into. We've had our eyes on the site for a- long- time in fact. Taking your line of work into consideration, no doubt you attribute what happened to you there to something supernatural.\" He pauses for a moment. \"Trespassing on government property without authorization is a serious offense, Detective, but I think we can help eachother out. I'd like you to tell me, ${Name}, what you found there and what you did with it.\"\n\n[b]The End[/b]\n\n*goto_scene ending", "ending": "*page_break End\nWe hope you've enjoyed playing [i]The Horror Behind the Walls.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "givetheorb": "*achieve giveorb\nYou hold up the golden sphere in front of you. Its warm glow illuminates the creature's ragged, decrepit mane and a colorless skull lurking beneath it. You place the bright orb in the creature's outstretched hand. Quickly, it snaps the object from your grasp and nearly tears your hand off in one swift motion.\n\nAs the abomination's foul skin brushes against yours, obscure visions pop into your head. Images of red and white velvet invade your mind. A magnificent golden throne towers over you, its grandeur matches only that of the illustrious organ outside. Your fear is replaced by a sense of intense anger. You lust for what you feel was robbed from you. Then, the opulence, the entitlement, is all ripped away in an instant as the horrifying creature pulls away.\n\nNow in its possession, the monstrosity holds the orb high in the air, revealing its hollow ribbed stomach. It emits an almost cat-like purr. After a moment of admiration, it hides the arm wielding the orb beneath its sunken head and limps back into the dark hallway, stealing the light with it.\n*page_break\nThe room quickly becomes pitch black. For a moment, the thought crosses your mind that you may be dead, but the rapid beating of your heart reassures you otherwise. Your legs throb and grow increasingly tired. Whatever energy, adrenaline, or fear was fueling you is gone. Your knees wobble and almost give out, but you lean against the rough wall and feel your way back through the tunnel in the dark.\n\nYou emerge back in the large organ hall after a few minutes. The dance floor and mezzanines are deserted, but glorious rays of sunlight still shine in from above. \n\n*if went_cistern = false \n\t*if went_pantry = false\n\t\tIt's just now you notice your satchel is long gone. It must've fallen somewhere in the labyrinth over the past few hours. An exhausted sigh escapes your lips as you climb up the steps.\n\nThe organ rests silently behind you, eternally guarding that sanctum below. Though sunlight now pervades the room, a familiar chill still lingers in the air. With a single push the grand door swings open and reveals the gallery. Far on the other end is the final black gate.\n\nYou pass by the rotting timbers and many marble plinths until reaching the far doorway. Though all the black gates have been intricate in their design, this one stands out to you the most. The engravings match those you discovered on the door you first came across. Broken pieces of furniture that had obviously once barricaded the doorway are now strewn across the floor. You pull open the hulking behemoth and once more, you are greeted by the great Entrance Hall that trapped you here seemingly so long ago.\n*page_break\nSuddenly, a quiet voice emerges. It's muffled, but you swear you hear your name. \"${Name},\" it calls. At first, you think it could be the spirit again, but this one is distinctly different. \"${Name}!\" it cries out a little louder.\n\nYou traipse into the foyer and down the steps to the central chandelier, still splayed in its damp crater. Without warning, you're unexpectedly tossed back by a powerful explosion. You managed to fold your arms over your head in a way that spares your skull from the impact. The landing, however, reignites the pain in your left shoulder. Your ears ring, but still someone calls out your name. You squirm your way upright, pins and needles stabbing your sides, and see a dozen armed individuals charging towards you.\n\n\"Are you alright?\" one of them asks.\n\nYour eyes struggle to regain focus. A bright beam of light blinds you from outside. Several soldiers surround the room with large swat shields and small rifles, but they aren't pointed at you. Then, as quickly as it came, the light vanishes. \n\nA black smoke rapidly envelops you and the other men. You can hear them speaking to one another in German, but can no longer understand what they're saying. All at once, gunshots ring out and reverberate throughout the Hall. Dim flashes of light are suppressed by the dark smoke. Crimson blood splatters against the floor inches from where you lay. The floor vibrates over and over against as plastic and metal hit the ground. The heavy equipment scrapes against the tile as if they were being dragged against it. The dark fog violently whisks around you until, after only a few brief seconds, it dissipates.\n\nYou move your hands away from your face. The men are gone and a beam of sunlight reemerges from a gaping hole where the metal entrance door once stood. With the warmth of the sun shining on your face, you collapse.\n*page_break\nYou wake up some time later in a hospital bed. Your room looks identical to the one the girl was in just a day ago. You look down to find your shoulder in a splint and your body concealed by a layer of soft bed sheets. The warmth of the sun shines in through a nearby window. Outside, the sleeping giants rest in the distance, watching you.\n\n\"You're awake!\" Jay exclaims. \n\nYou glance over to see your old partner sitting in a chair by the window. His suit is shredded and his face is covered in dirt.\n\n\"J-Jay?\" you mutter. \"W-what…?\"\n\n\"Just relax. We're at the hospital.\"\n\n\"How did we get here?\"\n\nHe looks down. \"Coven,\" he remarks. \"When you got sealed in- I ran around that place for hours, but there was no way in. I had no choice but to run back down the mountain until I could call for help.\"\n\n\"Damn,\" you remark, \"we're in some deep shit aren't we?\"\n\nJay sighs and starts whispering solemnly, \"while they were trying to pull you out of the building, something happened.\"\n\nA man, as if on cue, enters the room with another following behind him. In his left arm is a simple clipboard. He smiles and walks up to you, completely disregarding Jay. \"Hello Detective, are you feeling alright?\" His hair is short and he dawns a familiar looking suit.\n\n\"I've been better,\" you respond sardonically.\n\n\"You can call me Sam. I represent a group of people who are very interested in the site you stumbled into. What happened to you is a tragedy and we'd like to prevent it from happening to anyone else again.\" His accent is thick, but his English is good enough.\n\nYou catch a nervous look on Jay's face as the man grabs a seat at your bedside.\n\n\"Do you speak German, Detective?\" Sam continues.\n\n\"I- no, no...\" you mutter, \"just a little bit.\"\n\n\"I see,\" he remarks before pausing to look up at his companion and then back to you. \"You were trapped for nearly twelve hours. During that time you received very serious injuries. The place you came from- these injuries are very common there. In fact- several officers died while trying to extract you.\" He pauses for a moment again. \"It wasn't until backup arrived that we discovered you were the only survivor. As you can probably understand, the families of the officers will want to know what happened to them. So- Detective- I would like you tell me exactly what you saw during those twelve hours and who killed those men.\"\n\n[b]The \"End\"[/b]\n\n*goto_scene ending", "keeptheorb": "*achieve keeporb\nWith nowhere left to go, you turn away from the creature and protect the strange artifact with your own body. The monstrosity roars and you can hear its bones crack as it raises its claws to strike you. Just then, an ineffable sensation of power washes over you and a white light fills the small room. The creature screams and pounds the earth repeatedly, nearly knocking you to the ground. \n\nAfter a few seconds, the blinding light dissipates. When your sight fully recovers, the creature is gone. You pat your body down to ensure you're still in one piece. The pedestal at the center of the room is now a pile of rubble. You glance down at your cupped hands and stare in awe at the still glimmering orb. It seems like such a simple object, but it fills you with both wonder and dread.\n\nYour body suddenly succumbs to an overwhelming surge of fatigue again. Whatever energy, adrenaline, or fear was fueling you has utterly depleted and you struggle to stay on your feet. You fall against the wall and hobble your way out of the room and back through the tunnel. The orb still emits a gentle white light. In your hand, it's neither too strong nor too dim.\n*page_break\nYou emerge back in the large organ hall. The dance floor and mezzanines are deserted, but glorious rays of sunlight shine in from above. You stare back into the ominous orb. Something about it, besides its beauty, captivates you.\n\n*if went_cistern = false\n        You go to place the orb in your bag, but immediately realize that your satchel is long gone. It must've fallen somewhere in the labyrinth. Orb in hand, you continue on your way out of the grand hall.\n\nThe organ looms silently behind you, eternally guarding the defiled sanctum below. The castle feels different as if the walls had been watching your every step and their prying eyes have finally been ripped out. Your body quickly recovers from its fatigue and you're presented with an unprecedented, new-found stamina. You push and the grand door easily swings open, revealing the gallery. On the other side is a similar open door.\n\nYou pass by the rotting frames of artwork and the many marble plinths until reaching the far doorway. Though all the black gates of this place are intricate in design, this one stands out the most as the first you ever came across. Broken pieces of furniture that had obviously once barricaded the doorway are now strewn across the floor. Once more, you're greeted by the great Entrance Hall that trapped you here seemingly so long ago.\n*page_break\nSuddenly, a quiet voice emerges. It's muffled, but you swear you hear your name. \"${Name}\", it calls. At first, you think it could be the spirit again, but this one is distinctly different. \"${Name}!\" it continues.\n\nYou walk into the Hall and down the steps to the central chandelier, still splayed in its damp crater. Without warning, you're unexpectedly tossed back by a powerful explosion. Luckily, you managed to twist your body in a way that spares your head, but landing on the hard floor reignites the pain in your left shoulder.\n\nYour ears ring, but you can still hear shouting erupt. You squirm your way upright, pins and needles stabbing your sides, and see a dozen armed people charging toward you.\n\n\"Are you alright?\" one of them asks.\n\nYour eyes are still struggling to regain focus from the explosion. You raise an arm and try to block a bright beam still shining on you. The old metal door that once trapped you lies contorted like a piece of paper on the distant staircase. \n\nFour soldiers emerge from the white light and surround you with large swat shields and small rifles. You go to pull the orb closer to you, but suddenly realize it's gone\n\n\"Where?\" you cry out, completely disregarding the men around you.\n\nHysterically, you spin around and claw at the ground desperately seeking the artifact.\n\n\"Where is it?\" you scream. The men back away as you your head swings back and forth scanning the room. Then, suddenly, everything goes black.\n*page_break\nYou wake up in the hospital some time later. Your room looks identical to the one the girl was in just a day ago. The warmth of the sun shines in from a nearby window. Frantically, you pat your body checking to make sure you too aren't wrapped in the same full-body cast. Then, your heart stops. The orb is gone. \n\n\"You're awake!\" Jay exclaims.\n\nYou glance over to see him sitting in a chair by the window. All around the room are foreign signs plastered on the walls. You infer they must be written in German, but the strange arrangement of characters makes no sense to you. You flutter your eyes and shake your head, but still the letters do not form any coherent words.\n\n\"Just relax, you're safe,\" Jay reassures. \"They sent in helicopters, a whole swat team when I told them what happened.\"\n\nYou turn to Jay who has his hands resting on his lap. So many questions race through your mind. You want to ask him what happened. How long were you trapped? Where did he go? How did he get off the mountain? But, only one question leaves your lips... \n\n\"Where is my orb?\"\n\n[b]The \"End\"[/b]\n*goto_scene ending", "screenshots": "*set battery 52\n*set Name \"Delon\"\n*set FullName \"Delon Lafosse\"\n*script changeBackgroundColor(\"sepia\")\n\n\nWithout hesitation, you stumble into the nearby room and slam the old wooden door shut behind you. It's iron lock, however, is rusted in place and refuses to budge. You struggle with the latch for several seconds, desperately trying to slide the old bar across the door. Your bloody fingers fumble with the iron, but are too frail to break it free. The footsteps get closer. Finally, the rusty bonds shatter and the rod slides into the adjacent socket just as something bashes against the door from the other side.\n\nYou try to catch your breath as you examine the room. The open ceiling above exposes several crumbling rafters. On the opposite wall is a small frameless window. Desperately, you dash to the aperture and stare down at the meadow far below. The opening is only a few inches wide and impossible squeeze through.\n\n\"Help!\" you repeatedly scream at the top of your lungs, waving an arm outside. But, no one responds. Your shrill cries for rescue are heard only by the callous mountains.\n\nSuddenly, the creaking of wood breaks the silence. Slowly, you turn to see thin strands of dark hair lowering from the rafters above.\n\n*page_break\n\n*set battery 26\n*set Name \"Leon\"\n*set FullName \"Leon Lafosse\"\n*script changeBackgroundColor(\"black\")\n\nYou back away from the door. Suddenly, a crash erupts from the ground below you, muffled by layers of rock and debris. Your body freezes. You stand paralyzed and blinded by the encroaching haze, listening. A clicking sound slowly and quietly arises from the fog. The pitch is low, an odd clacking with a few seconds of pause between each snap. You peer over the railing, but your vision is totally obscured. The balcony gradually fades into the mist until it reaches the first step of the frontward staircase.\n\n[i]Click, click.[/i]\n\nThe disturbing sound gets closer. Then, suddenly, movement grabs your eyes near the steps. A black shadow lurches back and forth up the stairs. \n\n[i]Click, click.[/i] \n\nYou shuffle back against the door. Then, an impossibly long and thin arm reaches up from below and presses four equally ghastly fingers, each a foot long, onto the edge of the stone balcony.\n\nWithout hesitation, almost instinctively, you fling the lone door open and stumble into the foreign room. Frantically, you spin around and shut it as quietly and gently as you can.\n\nYou press up against the back of the door, trying to stay quiet as you struggle to fill your lungs with oxygen. A tightness grows in your chest, like a cinder block resting on your rib cage. You clutch your bag tightly. You can feel something brushing up against the other side of the door.\n\n*page_break\n*set battery 46\n*set Name \"Amir\"\n*set FullName \"Amir Lafosse\"\n*script changeBackgroundColor(\"sepia\")\n\n\"Someone was standing there, in the trees,\" he remarks. \"Like, one second they were right there, on the edge of the forest, and the next they were gone.\" His eyes stay locked on the point as you drive past. The spot is overgrown with shrubbery and a small creek follows the road, just beyond the tree line, but there's no one there.\n\nJust then, almost too perfectly timed to be coincidental, you pull up on an old green car abandoned on the side of the dirt road. It looks like an old Volkswagen. You stop parallel with the vehicle and both you and Jay stare silently. Just several feet further down the road, a wide cast iron gate blocks the way.\n\n\"Well, looks like you got us to the right place.\" \n\nYou both open your doors and step outside. The overbrush shades the area so much that you can't see beyond the gate or just five feet into the forest on either side of you.\n \n\"Engine's ice cold...\" Jay remarks, tapping the back of his hand against the tailpipe, \"and the tire tracks are starting to fade. It's definitely been here at least a day.\"\n\t\n*fake_choice\n\t#Peek inside the windows.\n\t#Try to open the door.\n\t#Examine the gate.\n\t\n*set Battery 26\n*set Name \"Leanne\"\n*set FullName \"Leanne Lafosse\"\n\nYou step closer to inspect the body. A putrid smell hits you where you were somehow oblivious to it before. The air is ripe with mold and rot with a hint of sulfur. The boy's jaw hangs agape and both hands peacefully rest between his legs. In front of him, a black char ring stains the mossy stone. Beside his left leg is a rusty old key lying on the ground so inconspicuously that a less observant eye might've missed it. Quickly, you bend down and snatch it up. Your eyes come level with the dead boy's. A white glaze fogs the pale pupils. You can feel him staring back at you, but his body rests silently.\n\nThe way forward is blocked by the collapsed shaft. You have no choice but to backtrack through the cave. You turn around and stare down the eerie underchamber. It seems - different. It looks the same, but something indiscernible has changed.\n\nYour footsteps continue to rebound against the harsh tunnel walls. Your trek back is accompanied by dripping water still ringing throughout the passageway. The cool air chills your skin. Amidst the falling groundwater, the patters of your footsteps slowly grow out of sync until you realize someone is following close behind you.\n\n*fake_choice\n\t#Turn around.\n\t#Keep walking forward.\n\t\n*set Battery 26\n*set Name \"Taylor\"\n*set FullName \"Taylor Lafosse\"\n\nYou turn back around and jump at the realization that the corpse has shifted. The body now twists unnaturally. The arms are slightly bent, as if trying to pull away from the cross, but now frozen in place by rigor mortis. The head stares into another corner, opposite from where you entered. A second and third story mezzanine still rise above the rest of the room, upheld by only two standing columns. \n\nThe body remains motionless even after you approach again. You align your sight with theirs and notice a cranny on the third story that's been revealed by the collapsing wall. Indiscernible voices whisper from the other side. \"${Name},\" they whisper, \"here.\" The man's voice, the one from the foyer, quickly hushes the rest, \"${Name}, this way.\"\n\nFrom a pile of toppled stone, a long pillar protrudes diagonally and conveniently rests against the top balcony. \n\n*fake_choice\n\t#Follow the voice.\n\t#Look for another way out.\n\t\n\t", "startup": "*title The Horror Behind the Walls\n*author Alex Ryan\n*scene_list\n\tstartup\n\tchapter1\n\tchapter2\n\tchapter3\n\tchapter4\n\tchapter5\n\tchapter6\n\tchapter7\n\t$ chapter7_stable\n\t$ chapter8_dr\n\t$ chapter8_baths\n\t$ chapter8_library\n\t$ chapter9_pantry\n\t$ chapter9_cistern\n\t$ chapter9_sq\n\t$ chapter10_furnace\n\t$ chapter11_library\n\t$ chapter12_follow\n\t$ chapter12_ignore\n\t$ chapter13_gallery\n\t$ chapter14_sanctum\n\t$ keeptheorb\n\t$ destroytheorb\n\t$ givetheorb\n\tending\n\n*create battery 100\n*create Name \"Lafosse\"\n*create FullName \"Lafosse\"\n*create told_coven false\n*create went_servantsquarter false\n*create went_cistern false\n*create went_pantry false\n\n*achievement madness visible 50 Madness\n\tWhy would you ever do this?\n*achievement insanity visible 50 Insanity\n\tWhy would you go there?\n*achievement hatred visible 50 Hatred\n\tFire burns, but it can also heal.\n*achievement revelry visible 50 Revelry\n\tGain The Lady's trust.\n*achievement giveorb visible 100 Ending 1\n\tFind the first ending.\n\tYou gave the orb to the horror and freed the evil.\n*achievement keeporb visible 100 Ending 2\n\tFind the second ending.\n\tYou gave in to the lure of the orb and tried to keep it for yourself.\n*achievement destroyorb visible 100 Ending 3\n\tFind the third ending.\n\tYou found a way to destroy the orb and lift the curse held over the horrors behind the walls.\n\n*if choice_is_omnibus_app\n\t*comment skip description\n\n\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tThe sun had set across the mountain tops, save for a single flicker that still glistened from a single peak. The locals know not to investigate. Not only because the German government has forbidden it, but also because those who do never return the same, if at all. The few known survivors, in-between their lapses of madness, speak of great stone walls that uphold a structure more imposing than any known today. Little does the world know, however, that these walls no longer serve their intended purpose of keeping intruders out, but rather, to now keep something in.\n\n\t[i]The Horror Behind the Walls[/i] is an immersive 34,000-word interactive horror novel intended to provide phenomenal imagery in every scene. From the author of The Aether: Life as a God, Alex Ryan, your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n\tAll you know is that someone, or something, has been calling to you. With hundreds of cases solved and thousands of spirits laid to rest, your name has become synonymous with the paranormal. Renowned as one of the world’s greatest private investigators, you are about to uncover a secret far more disturbing than any case you’ve worked on in the past. Night after night, nightmares have been sent across the world to plague your dreams. Something that’s been hidden away from a time long forgotten now beckons to be remembered. \n\n\t• Play as a male, female, or nonbinary.[n/]\n\t• Track down the source of the nightmares that have haunted you.[n/]\n\t• Explore an ancient castle and traverse its labyrinth.[n/]\n\t• It is up to you to piece together the clues and discover what happened.[n/]\n\t• Uncover an ancient secret and determine how the story ends. [n/]\n\t• Survive the horrors and find a way to rid them from the world forever.[n/]\n\n\tUncover the truth and witness The Horrors Behind the Walls.\n\n\t[b]Content Warning:[/b] This game contains language or imagery that may be harmful to some audiences, especially related to household fires.\n\n\t*if choice_prerelease and not(choice_is_ios_app)\n\t\t[i]You can
