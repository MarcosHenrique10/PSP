gain just before\n\t\t\t\the begins knocking on the door and calling Cerberion. Tortures are over for you. But now, when you admited it's sure that\n\t\t\t\tthe Royal Judge will punish you with death. That's of course unless you manage to escape.\n\t\t\t\t\n\t\t\t\t*set tortures 0\n\t\t\t\t*goto cell_first_tortures_end\n\t\t\t#No.\n\t\t\t\tHe seems relieved with your answer. The tortures begin. \n\t\t\t\t\n\t\t\t\tIt doesn't matter if you're tough or fragile. There are methods of giving pain so horrible that it's unbelievable. What's\n\t\t\t\tmore, he uses some of them on you. So don't be surprised that after some, very long from your perspective, time you just\n\t\t\t\tfaint.\n\t\t\t\t*set health -1\n\t\t\t\t*set health %-20\n\t\t\t\t*set endurance %-20\n\t\t\t\t*set will %-20\n\t\t\t\t*goto cell_first_tortures_end\n\t*label cell_first_tortures_end\n\t\n\t*if tortures=1\n\t\t*set next_tortures (cell_next_event+24)\n\t*set next_breakfast (cell_next_event+15)\n\t*set cell_next_event next_breakfast\n\t\n\t*page_break Act VI: Back In The Cell\n\t*goto cell_act_VI\n\n*if cell_next_event=36\n\t*set next_breakfast (cell_next_event+24)\n\t*set cell_next_event next_breakfast\n\t*if tortures=1\n\t\t*set cell_next_event next_tortures\n\tCerberion brings some food. It's quality didn't improved much since yesterday.\n\t*set food true\n\t*page_break\n\t*goto cell_act_VI\n\n*if cell_next_event=next_tortures\n\t*page_break Interlude: Tortures\n\t\n\tYou're tortured again.\n\t\n\t*if master_meter>0\n\t\tAs soon as Goliath closes the door. Reffus approach you and unbutton belts pinning you to the table. He doesn't \n\t\teven bother to ask you if you want to 'fulfill his desires' again. But maybe he doesn't have to?\n\t\t*choice\n\t\t\t#It's better to give a massage than to be tortured.\n\t\t\t\t*set master_meter +2\n\t\t\t\t*label cell_master_massage\n\t\t\t\tSeeing all the tools of torture around you can easily imagine much\n\t\t\t\tworse ways of spending three hours with that elf, than making a massage.\n\t\t\t\t\n\t\t\t\tBut massaging for three hours, even with short breaks, is very tiring.\n\t\t\t\t*set fatigue max_fatigue\n\t\t\t\t\n\t\t\t\tFinally it comes to the least pleasant moment, when he must make you faint.\n\t\t\t\tWell... it's still a little price for freedom. \n\t\t\t\t*set health %-5\n\t\t\t\t\n\t\t\t\tThe session ends and Master calls the Cerberion once again. You're \n\t\t\t\tput to your cell. \n\t\t\t\t*goto next_tortures_needed\n\t\t\t#I won't touch him again.\n\t\t\t\t*set sanity +5\n\t\t\t\tAre you sure? This may be embarrasing but think about all the pain\n\t\t\t\tthat you're avoiding.\n\t\t\t\t*if intelligence>50\n\t\t\t\t\tOn the other hand, now when you're free, you can fight back.\n\t\t\t\t*choice\n\t\t\t\t\t#I won't give up. I'll fight.\n\t\t\t\t\t\tFirstly he takes your refusal as a some sort of game, but when you push him back \n\t\t\t\t\t\tseveral feets away, he realizes that you're serious and gets really angry and attacks you. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou're sure; if you're not able to fight him, your life will turn into a nightmare.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if intelligence>50\n\t\t\t\t\t\t\tHe's a sadist so he'll probably underestimate you, so you can pretend you're weak and\n\t\t\t\t\t\t\thit him at the right moment instead risking a fight.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t*if luck>30\n\t\t\t\t\t\t\tLooking around you spot a set of knives. You should be able to reach one of them.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*if skill_weapon = \"knife\"\n\t\t\t\t\t\t\t\t#Take the knife and show this pervert what 'pain' really means...\n\t\t\t\t\t\t\t\t\t*label cell_win_with_torture_master\n\t\t\t\t\t\t\t\t\tWhen you hit him for the first time, he seems to think it was lucky,\n\t\t\t\t\t\t\t\t\twhen you do it again, he looks furious, after the third hit he probably\n\t\t\t\t\t\t\t\t\tstarts to believe that something's wrong. \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tBut he's not a thug, so the wounds\n\t\t\t\t\t\t\t\t\tyou inflict aren't deadly... yet. \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tStill it's probably the first time since he's\n\t\t\t\t\t\t\t\t\ta Master of Tortures when he sees so much of his own blood, so when he attacks\n\t\t\t\t\t\t\t\t\tagain he's just too reckless... \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou may be satisfied with a moment of disbelief that you see in the glare of his eyes, when 5\"\n\t\t\t\t\t\t\t\t\tof cold steel enters his chest and hit the heart. Or you may not, because it was just\n\t\t\t\t\t\t\t\t\tanother cockroach not even worth a spit.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tAnyway, the Master of Tortues is laying dead on the floor under your feet.\n\t\t\t\t\t\t\t\t\t*set master_state \"dead\"\n\t\t\t\t\t\t\t\t\t*set master_location \"torture\"\n\t\t\t\t\t\t\t\t\t*set back_act \"dungeon_act_II\"\n\t\t\t\t\t\t\t\t\t*page_break Interlude: The Torture Chamber\n\t\t\t\t\t\t\t\t\t*goto_scene dungeon\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#It's the time of revange. I grab the knife and kill that bastard.\n\t\t\t\t\t\t\t\tYou jump at him with a knife with your hand, fire in your eyes and\n\t\t\t\t\t\t\t\tstrong wish to put his life to the end.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if(((strength+dexterity)+reflex)+luck)>180\n\t\t\t\t\t\t\t\t\t*set skill_weapon \"knife\"\n\t\t\t\t\t\t\t\t\t*goto cell_win_with_torture_master\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tYou've tried your best but... maybe you underestimated him. It wasn't\n\t\t\t\t\t\t\t\t\tthat bad at the beginning, you slash him once or twice with the knife, but\n\t\t\t\t\t\t\t\t\tbefore the third attempt he managed to grab your hand and disarm you. After\n\t\t\t\t\t\t\t\t\tthat it was only worse... finally something hard hit your head and fainted.\n\t\t\t\t\t\t\t\t\t*goto cell_torture_tragic_finale\n\t\t\t\t\t\t\t*if intelligence>65 \n\t\t\t\t\t\t\t\t#I'll pretend that I beg him for mercy and then... I'm gonna get medieval on his ass!\n\t\t\t\t\t\t\t\t\t*goto cell_win_with_torture_master\n\t\t\t\t\t\t\t#I'll beg him for mercy.\n\t\t\t\t\t\t\t\tProbably it's the worst what you could've done. He's a heartless sick, pervert,\n\t\t\t\t\t\t\t\tso he doesn't care for your cries. He hits your head with something heavy and you\n\t\t\t\t\t\t\t\tlose consciousness...\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*label cell_torture_tragic_finale\n\t\t\t\t\t\t\t\tWhen you wake up, except of the terrible headache, you can feel that you're lying\n\t\t\t\t\t\t\t\tnaked on the cold stone table. You're unable to move with any of your limbs. Your\n\t\t\t\t\t\t\t\twhole body is in pain...\n\t\t\t\t\t\t\t\t*page_break Epilogue\n\t\t\t\t\t\t\t\t*set ending_scene \"tortured\"\n\t\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t#It's embarrasing but it's better than tortures. I'll do a massage.\n\t\t\t\t\t\t*goto cell_master_massage\n\t\t*goto next_tortures_needed\n\t\t\n\t*if master_meter=0\n\t\t*label cell_being_tortured\n\t\tMaster of Tortures do his best to make you suffer... You can make him stop, all you need is to admit, that you're guilty.\n\t\n\t\tDo you admit to the charges?\n\t\t*choice\n\t\t\t*if ((will>30) or (endurance>30)) and (health>10)\n\t\t\t\t#No. I can resist his tortures.\n\t\t\t\t\t*set health -1\n\t\t\t\t\t*set health %-20\n\t\t\t\t\t*set endurance %-20\n\t\t\t\t\t*set will %-20\n\t\t\t\t\t*goto next_tortures_needed\n\t\t\t#Yes I admit to everything. I can't bear it anymore.\n\t\t\t\t*set tortures 0\n\t\t\t\t*goto next_tortures_needed\n\t*label next_tortures_needed\n\t*comment Next event should be a meal\n\t*set next_tortures 999\n\t*if tortures=1\n\t\t*set next_tortures (cell_next_event+24)\n\t*set next_breakfast (cell_next_event+15)\n\t*set cell_next_event next_breakfast\n\t*page_break Act VI: Back In The Cell\n\t*goto cell_act_VI\n\t\n*if cell_next_event=next_breakfast\n\t*set next_breakfast +24\n\t*set cell_next_event next_breakfast\n\t*if tortures=1\n\t\t*set cell_next_event next_tortures\n\t*temp breakfast_rand\n\t*rand breakfast_rand 1 3\n\t*if breakfast_rand=1\n\t\tCerberion brings food and pours it into your bowl. You begin to suspect that guards have confiscated\n\t\tsome big transport of bean.\n\t*if breakfast_rand=2\n\t\tGuess what? Bean-eating time!\n\t*if breakfast_rand=3\n\t\tYou are given some food. You're far from being surprised with what it is.\n\t*set food true\n\t*goto cell_act_VI\n\t\n*if cell_next_event=time_given\n\t*goto cell_judgment_time\n*else\n\t*bug Something should have happened but what?\n\t", "choicescript_description": "Use your incredible wits, fantastic skills and/or magnificent strength to choose your way out of a heavily guarded prison! Reveal the secrets of the dungeon, meet the mysterious co-prisoner and determine who's responsible for your arrest. Grab your gear and prepare yourself for a hard fantasy quest. Remember, escaping from a prison is not a task for kids or grannies!\n\n[i]Imprisoned[/i] is a 40,000-word interactive novel by Myth Thrazz. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.", "choicescript_stats": "*label stats\n*comment Copyright 2010 by Myth Thrazz (http://mythgames.pl)\n\nYou are \n*if (player_name = \"Unnamed\")\n  anonymous\n${player_sex} ${player_race} ${player_perk} \n*if (player_name != \"Unnamed\")\n  named $!{player_name}\n*if (player_called != \"\")\n  *line_break\n  And you're called ${player_called}\n\n*line_break\n\n*stat_chart\n  percent Strength Strength\n    Physical power\n  percent Endurance\n    General toughness\n  percent Dexterity\n    Agility and flexibility\n  percent Reflex\n    Reaction speed\n  percent Intelligence\n    Learning speed\n  percent Look\n    External beauty\n  percent Charisma\n    Influence on others\n  percent Will\n    Bravery and discipline\n  percent Wisdom\n    General knowledge\n  percent Magic\n    Magic force\n  percent Luck\n    Success helper\n  opposed_pair Sanity\n    Sanity\n      Mental stability\n    Insanity\n      Mental disorder\n  percent Health\n    0 means death\n\n*choice\n  #Equipment\n    *goto equipment\n  #Skills\n    *goto skills\n\n*label equipment\n*comment Copyright 2010 by Myth Thrazz (http://mythgames.pl)\n\n*line_break\n$!{main_hand} hand:\n*line_Break\n*if (torch=true) and (weapon=\"bare fists\")\n  torch\n  \n*if (torch=false) and (weapon=\"bare fists\")\n  nothing\n  \n*if weapon!=\"bare fists\"\n  ${weapon}\n  \n\n$!{second_hand} hand: \n*line_Break\n*if torch=true\n  torch\n  \n*if torch=false\n  nothing\n  \n\nYour basic equipment:\n\n*if head=\"unknown\"\n  is unknown yet\n  \n*if head!=\"unknown\"\n  Head: ${head}\n  *line_break\n  Hands: ${hands}\n  *line_break\n  Arms: ${arms}\n  *line_break\n  Torso: ${torso}\n  *line_break\n  Pelvis: ${pelvis}\n  *line_break\n  Legs: ${legs}\n  *line_break\n  Feet: ${feet}\n\n*if head!=\"unknown\"\n  Total encumbrance: ${encumbrance}\n\nOther equipment:\n*if ((equip_lockpick != true) and (equip_needle != true)) and ((equip_karcher_keys != true) and (equip_prison_keys != true))\n  you have nothing\n*if equip_lockpick = true\n  \n  Lockpick - useful when one need to open some locks\n  \n*if equip_needle = true\n\n  A significantly large needle - it was in a haystick, you could've hurt yourself!\n  \n*if equip_karcher_keys = true\n\n  Common house keys - if you'll ever need to visit your interrogator\n  \n*if equip_prison_keys = true\n\n  Prison keys - fugitive best friends\n\n*choice\n  #Stats\n    *goto stats\n  #Skills\n    *goto skills\n\n*label skills\n*comment Copyright 2010 by Myth Thrazz (http://mythgames.pl)\n\n*if player_skillcount = 0\n  \n  You have no skills yet.\n  *goto end_skills\n*else\n\n  Your special skills are:\n  \n  *if skill_infravision = true\n    Infravision - you're able to see in the dark\n  \n  *if skill_know_time = true\n    Know Time - an ancient skill allowing to always know what time it is\n    \n  *if skill_pickpocketing = true\n    Pickpocketing - you're able to steal from pockets of others\n    \n  *if skill_climbing = true\n    Climbing - you can climb like a spider\n    \n  *if skill_lockpicking = true\n    Lockpicking - you can open locks using a lockpick\n    \n  *if (skill_weapon != \"\") and (skill_weapon != \"ninja\")\n    $!{skill_weapon} fighting - you know how to fight with ${skill_weapon}\n    \n  *if skill_weapon = \"ninja\"\n    Shuriken and katana fighting - you're a NINJA!\n  \n  *if skill_mental_knock = true\n    Mental Knock - ability to make others faint at your will\n  \n*label end_skills\n\n*choice\n  #Stats\n    *goto stats\n  #Equipment\n    *goto equipment", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements and delay timers.\n\n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements and delay timers.\n", "corridor": "*comment Copyright 2010 by Myth Thrazz (http://mythgames.pl)\n\n*comment **************\n*comment TEMP VARIABLES\n\n\n*comment **************\n\n*gotoref back_act\n\n*label cell_act_I\n*comment QUICKTEST ONLY\n*if false\n\t*goto corridor_act_I\n*bug QUICKTEST REDIRECT TEST END\n\n*comment Scene 3: Corridor, Act I\n*comment Player enters the main corridor\n*label corridor_act_I\n\nYou're in the corridor.\n\nOn the far left, there is a door leading to the guard post which has a door leading outside.\n\nOn the far right, the corridor turns right. \n\nThere are three more doors in this corridor. When you enter this corridor from the guard post,\nthe closest door is the one on your right, leading to interrogation room. Then there's another\ndoor on the left side, from this perspective, just in the middle of the corridor. Some delicate\nscent of food can be felt from there. Then there's the third door, on the right wall. Furthest from\nthis point.\n*if wisdom>=50\n\t*set know_living true\n\tIt must be guard's living room.\n\nWhere will you go?\n*choice\n\t*if tied=true\n\t\t#I try to get outside. Knocking anyone who'll stand in my way.\n\t\t\t*label corridor_act_I.1\n\t\t\tYou've decided to leave your life to the fate...\n\t\t\t*set sanity %+20\n\t\t\t*if luck>=65\n\t\t\t\t*page_break Epilogue\n\t\t\t\t*set ending_scene \"more_luck_than_reason\"\n\t\t\t\t*goto_scene ending\n\t\t\t*else\n\t\t\t\t*page_break Epilogue\n\t\t\t\t*set ending_scene \"it_was_so_close\"\n\t\t\t\t*goto_scene ending\n\t*if know_kitchen= true\n\t\t#To the kitchen I go.\n\t\t\t*goto corridor_act_I.2\n\t*if know_kitchen= false\n\t\t#I'll go to the door in the middle of the corridor.\n\t\t\t*label corridor_act_I.2\n\t\t\t*if alarm>0\n\t\t\t\t*set alarm -1\n\t\t\tYou turn right and silently move through the empty corridor to the chosen door.\n\t\t\tAs you approach them the smell of food improves. Do you enter?\n\t\t\t*choice\n\t\t\t\t#No I don't need to visit the kitchen.\n\t\t\t\t\t*goto corridor_act_I\n\t\t\t\t#Yes.\n\t\t\t\t\t*if tied=true\n\t\t\t\t\t\tAs quiet as possible you push the door with your body to open them and close them behind you the same way.\n\t\t\t\t\t\t*set back_act \"kitchen_act_I\"\n\t\t\t\t\t\t*page_break Final Act: The Kitchen\n\t\t\t\t\t\t*goto_scene kitchen\n\t\t\t\t\t*if tied=false\n\t\t\t\t\t\tAs quiet as possible you push the door to open it and close them behind you.\n\t\t\t\t\t\t*set back_act \"kitchen_act_I\"\n\t\t\t\t\t\t*page_break Final Act: The Kitchen\n\t\t\t\t\t\t*goto_scene kitchen\n\t\t\t\t\t*bug\n\t*if (know_living = true)\n\t\t#I go to the guard's living room.\n\t\t\t*goto corridor_act_I.3\n\t*if (twin_state != \"dead\") and (know_living = false)\n\t\t#Let's see what's behind the farthest door on the right.\n\t\t\t*label corridor_act_I.3\n\t\t\t*if alarm>0\n\t\t\t\t*set alarm -1\n\t\t\tYou turn right and silently move through the empty corridor to the chosen door.\n\t\t\tAs you approach them you begin to hear two male voices talking. Do you enter?\n\t\t\t*choice\n\t\t\t\t#You think I'm an idiot? I walk back as quiet as possible.\n\t\t\t\t\t*label corridor_act_I.3.1\n\t\t\t\t\t*goto corridor_act_I\n\t\t\t\t*if sanity>=40\n\t\t\t\t\t#Yes.\n\t\t\t\t\t\t*label corridor_act_I.3.2\n\t\t\t\t\t\t*if tied=true\n\t\t\t\t\t\t\tYou try to push the door but they're closed. The voices inside went quiet.\n\t\t\t\t\t\t\t*set sanity %+25\n\t\t\t\t\t\t\tAre you sure you want to give it another try? \n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t*if sanity\u003c=80\n\t\t\t\t\t\t\t\t\t#No! There are guards inside!\n\t\t\t\t\t\t\t\t\t\t*set sanity %-20\n\t\t\t\t\t\t\t\t\t\tYou're probably right. As quiet as possible you step back from the door.\n\t\t\t\t\t\t\t\t\t\tAfter a while you can hear a laugh inside and the talk is continued.\n\t\t\t\t\t\t\t\t\t\t*goto corridor_act_I\n\t\t\t\t\t\t\t\t*if sanity>80\n\t\t\t\t\t\t\t\t\t#Yes! I'll make a running start this time.\n\t\t\t\t\t\t\t\t\t\tYou do what you said you'll do. After a few steps of running start you bang\n\t\t\t\t\t\t\t\t\t\tthe door with your head. \n\t\t\t\t\t\t\t\t\t\t*page_break Epilogue\n\t\t\t\t\t\t\t\t\t\t*set ending_scene \"nuts\"\n\t\t\t\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*set know_living true\n\t\t\t\t\t\t\tYou pull the door and see two man, obviously twins. Sitting around the table, playing\n\t\t\t\t\t\t\tcards and talking. They haven't seen you yet but they'll be very surprised when it happens.\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t*if weapon=skill_weapon\n\t\t\t\t\t\t\t\t\t#I kill them both while they're shocked.\n\t\t\t\t\t\t\t\t\t\tYou rush in and kill them both with your ${weapon} before they even\n\t\t\t\t\t\t\t\t\t\thave a chance to draw their weapons. You quickly search the room but you find nothing useful.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tThe room is some kind of living room. The guards have to rest and eat here. So probably\n\t\t\t\t\t\t\t\t\t\tnobody will find those two until a next meal. You have nothing to do here, so you go back to\n\t\t\t\t\t\t\t\t\t\tthe corridor.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*page_break Interlude: The Main Corridor\n\t\t\t\t\t\t\t\t\t\t*set twin_state \"dead\"\n\t\t\t\t\t\t\t\t\t\t*goto corridor_act_I\n\t\t\t\t\t\t\t\t#I close the door before they can spot me.\n\t\t\t\t\t\t\t\t\tYou cannot risk another fight with a guard in the interrogation room. \n\t\t\t\t\t\t\t\t\t*goto corridor_act_I\n\t#I wonder where this corridor leads...\n\t\t*if alarm>0\n\t\t\t*set alarm -1\n\t\t*label corridor_act_I.4\n\t\t*set back_act \"inner_act_III\"\n\t\t*page_break Interlude: The Inner Corridor\n\t\t*goto_scene inner\n\t#Get back to the interrogation room.\n\t\t*if alarm>0\n\t\t\t*set alarm -1\n\t\t*label corridor_act_I.5\n\t\t*if (bigguy_state = \"examining\") and (bigguy_location = \"interrogation\")\n\t\t\t*set back_act \"fight_in_arrest_1.1.1.2_1\"\n\t\t\t*page_break Final Act: Escape\n\t\t\t*goto_scene fights\n\t\t*if (karcher_state != \"dead\") and (karcher_state != \"faint\")\n\t\t\tThe interrogator is probably there. Are you sure you want to come in?\n\t\t\t*choice\n\t\t\t\t#No, he would raise an alarm.\n\t\t\t\t\tI thought so.\n\t\t\t\t\t\n\t\t\t\t\t*goto corridor_act_I\n\t\t\t\t*comment TODO: #Yes.\n\n\t\t*else\n\t\t\tYou re-enter the interrogation room.\n\t\t\t*set back_act \"fight_in_arrest_1\"\n\t\t\t*page_break Interlude: Interrogation Room\n\t\t\t*goto_scene fights\n\t*if (tied=false)\n\t\t#There's no need to stay here any longer. I'm leaving.\n\t\t\t*label corridor_act_I.6\n\t\t\t*page_break Final Act: Escape\n\t\t\tThat sounds reasonable. You're not tied anymore and you've not rised an alarm.\n\t\t\t*if (skill_weapon = weapon)\n\t\t\t\tWhat's more, if there's someone who can try to stop you in the guard post, you have\n\t\t\t\tyour weapon of choice.\n\t\t\t*if (weapon != skill_weapon) and (weapon != \"bare_fists\")\n\t\t\t\tWhat's more, if there's someone who can try to stop you in the guard post, you have\n\t\t\t\tsome weapon, although you've never fought with it.\n\t\t\t\t\n\t\t\tYou stand right next to the door to the guard office.\n\t\t\t*if (skill_weapon = weapon)\n\t\t\t\tYou can surely enter there kill anyone and then just run out. \n\t\t\t*if (weapon != skill_weapon) and (weapon != \"bare_fists\")\n\t\t\t\tYou can probably enter there, and try to kill anyone and then just run out. \n\t\t\t*if ((food_poisoned = \"deadly\") or (food_poisoned = \"sleeping\")) and (cell_next_event>12)\n\t\t\t\tSince you've poisoned the food and it worked so great on Cerberion there shouldn't be anybody\n\t\t\t\tto stand on your way out.\n\t\t\tBut do you really want to open the door?\n\t\t\t*choice\n\t\t\t\t#Yes. I must leave that way.\n\t\t\t\t\t*label corridor_act_I.6.1\n\t\t\t\t\tIf you say so.\n\t\t\t\t\t\n\t\t\t\t\tBeing ready to possible fight, you push the door open and fall inside the room.\n\t\t\t\t\t\n\t\t\t\t\t*if ((food_poisoned = \"deadly\") or (food_poisoned = \"sleeping\")) and (cell_next_event>12)\n\t\t\t\t\t\tIt's almost impossible that nobody from outside didn't notice yet that the guard post went\n\t\t\t\t\t\tso quiet. \n\t\t\t\t\t\t\n\t\t\t\t\t\tAfter entering the room you almost stumble on the body of young guard and easily notice\n\t\t\t\t\t\tanother body next to the door leading outside. Without wasting time, anyone who enters\n\t\t\t\t\t\tthe post will notice that something's wrong, you leave the place and enter the new chapter\n\t\t\t\t\t\tof your life, being a fugitive...\n\t\t\t\t\t\t\n\t\t\t\t\t\t*page_break Epilogue\n\t\t\t\t\t\t*set ending_scene \"poisoner\"\n\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t*if ((food_poisoned = false) or (food_poisoned = \"wc\"))\n\t\t\t\t\t\tThat lad who unluckily was standing right behind didn't have any\n\t\t\t\t\t\tchance to react. He couldn't imagine that someone ever passed through Goliath.\n\t\t\t\t\t\tBut you didn't even leave him enough time to wonder how did you do that, well in\n\t\t\t\t\t\tfact you couldn't be too sure about an afterlife...\n\t\t\t\t\t\n\t\t\t\t\t*page_break Epilogue\n\t\t\t\t\t*set ending_scene \"cut_your_way_through\"\n\t\t\t\t\t*goto_scene ending\n\t\t\t\t#No, there must be another way to get out.\n\t\t\t\t\t*label corridor_act_I.6.2\n\t\t\t\t\t*if alarm>0\n\t\t\t\t\t\t*set alarm -1\n\t\t\t\t\tThere's always some another way...\n\t\t\t\t\t*page_break Interlude: The Main Corridor\n\t\t\t\t\t*goto corridor_act_I\n\t*if (magic>=95) or (skill_mental_knock = true)\n\t\t#Nothing can stop me and my Mental Power!\n\t\t\t*page_break Epilogue\n\t\t\t*set ending_scene \"mental_master\"\n\t\t\t*goto_scene ending\n\t\t\t\t\t\n\t\t\t\t\t*goto corridor_act_I", "dungeon": "*comment Copyright 2010 by Myth Thrazz (http://mythgames.pl)\n\n*comment **************\n*comment TEMP VARIABLES\n\n*comment **************\n\n*gotoref back_act\n*comment We want to be able to get back to this scene, that's why this reference\n\n*label cell_act_I\n*comment QUICKTEST ONLY\n*if false\n\t*goto dungeon_act_I\n*if false\n\t*goto dungeon_act_II\n*bug QUICKTEST REDIRECT TEST END\n\n*label dungeon_act_I\n*comment Scene 6: Dungeon, Act I\n*comment Player enters the dungeon through the massive door. There's a small cantine nearby.\n\nYou're in the dungeon corridor. From here you can go to the small warden's guard-post. \n*if cerberion_state != \"dead\"\n\tCerberion is snoring loudly out there.\n\n*if ever_was_in_cell = true\n\tYou can also get back to your cell if you like for some reason. \nThe corridor is closed from both sides with massive door. One of them can lead you outside while the second one is\nclosing the torture chamber.\n\n*choice\n\t#Go outside.\n\t\tYou open the massive door and get out of the dungeon.\n\t\t*set back_act \"inner_act_I\"\n\t\t*page_break Interlude: The Staircase Bottom\n\t\t*goto_scene inner\n\t*if ever_was_in_cell\n\t\t#Get back to your cell.\n\t\t\tYou went back to your cell.\n\t\t\t*set back_act \"cell_act_VI\"\n\t\t\t*page_break Act VI: In The Cell\n\t\t\t*goto_scene cell\n\t#Go to the torture chamber.\n\t\t*if torture_door = \"locked\"\n\t\t\tThe door is locked.\n\t\t\t*choice\n\t\t\t\t*if (equip_lockpick=true) or (equip_prison_keys=true)\n\t\t\t\t\t#Unlock the door and get inside.\n\t\t\t\t\t\t*if (equip_prison_keys=true)\n\t\t\t\t\t\t\tUsing the prison keys you unlock the door and slip inside.\n\t\t\t\t\t\t\t*set torture_door \"unlocked\"\n\t\t\t\t\t\t\t*page_break Interlude: The Torture Chamber\n\t\t\t\t\t\t\t*goto dungeon_act_II\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tUsing the lockpick you unlock the door and slip inside.\n\t\t\t\t\t\t\t*set torture_door \"unlocked\"\n\t\t\t\t\t\t\t*page_break Interlude: The Torture Chamber\n\t\t\t\t\t\t\t*goto dungeon_act_II\n\t\t\t\t#Go somewhere else.\n\t\t\t\t\t*goto dungeon_act_I\n\t\t*else\n\t\t\tYou open the door and get inside the chamber.\n\t\t\t*set back_act \"dungeon_act_II\"\n\t\t\t*page_break Interlude: The Torture Chamber\n\t\t\t*goto_scene dungeon\n\t#Enter the guard-post.\n\t\tYou take a look inside a really small guard-post.\n\t\t\n\t\t*if cerberion_location = \"guard-post\"\n\t\t\tThe Cerberion sleeps sitting on a wooden chair, with his helmet covering eyes, and snores loudly.\n\t\t\t*if cerberion_keys = true\n\t\t\t\tHis keys lie on a tiny shelf with some of his personal things.\n\t\t\n\t\t*if guard_post_sword = true\n\t\t\tThe only thing here that may be useful is an old rusty sword in the corner.\n\t\t*if guard_post_sword = false\n\t\t\tThere's nothing worth mentioning around here.\n\t\t\t\n\t\t*choice\n\t\t\t#Get back to the corridor.\n\t\t\t\t*page_break Interlude: The Dungeon\n\t\t\t\t*goto dungeon_act_I\n\t\t\t*if guard_post_sword = true\n\t\t\t\t#Grab the sword.\n\t\t\t\t\t*set guard_post_sword false\n\t\t\t\t\tIf you take this sword because you're a thief and you just want to sell it you have to know\n\t\t\t\t\tthat you won't get a good price for this piece of rust.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Oh... I'll leave it then.\n\t\t\t\t\t\t\tYou decide to leave the thing that used to be a weapon and leave the tiny room.\n\t\t\t\t\t\t\t*page_break Interlude: The Dungeon\n\t\t\t\t\t\t\t*goto dungeon_act_I\n\t\t\t\t\t\t*if (skill_weapon = \"\") and (player_skillpoints>1)\n\t\t\t\t\t\t\t#Rusty sword is better then none if you know how to use it.\n\t\t\t\t\t\t\t\tTrue. Then you quietly grab the sword and sneak back to the corridor.\n\t\t\t\t\t\t\t\t*set skill_weapon \"sword\"\n\t\t\t\t\t\t\t\t*set player_skillpoints -1\n\t\t\t\t\t\t\t\t*set player_skillcount +1\n\t\t\t\t\t\t\t\t*set weapon \"sword\"\n\t\t\t\t\t\t\t\t*page_break Interlude: The Dungeon\n\t\t\t\t\t\t\t\t*goto dungeon_act_I\n\t\t\t*if cerberion_keys = true\n\t\t\t\t#Grab the keys.\n\t\t\t\t\tYou easily take the keys from the shelf and withdraw from the guard-post.\n\t\t\t\t\t*set cerberion_keys false\n\t\t\t\t\t*set equip_prison_keys true\n\t\t\t\t\t*page_break Interlude: The Dungeon\n\t\t\t\t\t*goto dungeon_act_I\n*label dungeon_act_II\n*comment Scene 6: Dungeon, Act II\n*comment Player 'visits' the torture chamber.\n\nYour're in a common torture chamber. 'Common' means that it's full of sharp things that have to help people to confess their sins.\nIt's not very pleasant place, so you just look for whatever may help you leave this horrible place.\n\n*if master_state = \"dead\"\n\tThe corpse of ex-Master of Tortures lies in the large pond of blood.\n\n*choice\n\t#Get out of here.\n\t\tIt's a bit odd. Since the Master called for Cerberion to open the door you were sure that it's impossible to open them\n\t\tfrom inside. But it's not true. Probably due to the sleeping habit of the guard there's an alternative way of opening the door.\n\t\t\n\t\tYou shrug and leave the torture chamber.\n\t\t*set back_act \"dungeon_act_I\"\n\t\t*page_break Interlude: The Dungeon\n\t\t*goto_scene dungeon\n\t*if weapon = \"\"\n\t\t#Take one of the knives.\n\t\t\t*set weapon \"knife\"\n\t\t\tFrom the large collection of knives you take one. The biggest, the sharpest and the longest.\n\t\t\tBut a weapon doesn't make one a fighter. The fighting with a knife requires some skill. Are you\n\t\t\tskilled with knife?\n\t\t\t*choice\n\t\t\t\t*if (skill_weapon = \"\") and (player_skillpoints>1)\n\t\t\t\t\t#Sure I am.\n\t\t\t\t\t\tYou do some amazing tricks including juggling to accustom with your new 'friend' and\n\t\t\t\t\t\tprove that you're cool. But it's not the best time to play. You have still have a prison\n\t\t\t\t\t\tto escape from.\n\t\t\t\t\t\t*set skill_weapon \"knife\"\n\t\t\t\t\t\t*set player_skillpoints -1\n\t\t\t\t\t\t*set player_skillcount +1\n\t\t\t\t\t\t*page_break Interlude: The Torture Chamber\n\t\t\t\t\t\t*goto dungeon_act_II\n\t\t\t\t#Erm... no I'm not.\n\t\t\t\t\tEven not knowing how to fight with a knife, helps your morale. You're sure that with this cold\n\t\t\t\t\tsteel and some determination you still can win in a fight.\n\t\t\t\t\t*page_break Interlude: The Torture Chamber\n\t\t\t\t\t*goto dungeon_act_II\n\nIt's THE END(for now)\n*goto_scene ending end", "ending": "*comment Copyright 2010 by Myth Thrazz (http://mythgames.pl)\n\n*if ending_scene = \"game_over\"\n\t*goto final_stats\n\n*if ending_scene = \"give_up\"\n\n\tENDING 1/23 \"Hopeless\"\n\t\n\t*set health 0\n\t*set will 1\n\t\n\tYou're laying on the cold stone floor of your cell. Soon shivers come to warmth your cooling body.\n\tBut it's pointless your body lose temperature and without any hope left in your mind, your body surrenders too.\n\tYou fall asleep. But you never wake up.\n\t\n\t\"Cerberion\" finds your body the next day. You're buried in a big hole with many common criminals but without any respect.\n\tYour friends or family (assuming you have had any) even if they find out that you were held here will never be able to find out\n\twhere does your body rot.\n\t\n\tIt's rather a pathetic end to a hero. Don't you think?\n\t*page_break Final Stats\n\t*goto final_stats\n\t\n*if ending_scene = \"more_luck_than_reason\"\n\n\tENDING 2/23 \"More luck than reason\"\n\t\n\tYour story sounds much like a fairy tale but your life is a proof that things that shouldn't have happened... Happen more\n\toften than expected.\n\t\n\tNo one, except you of course, have ever tried to run from the prison using such a unique technique. With your arms still tied\n\tat your back you defeated the guard behind the door. It didn't even make you sweat. You passed him and reached the next door. You\n\tknocked... the door at the beginning and two astonished guards next. They didn't even imagine someone with hands tied at ${his} back\n\tcould be a fugitive. \n\t\n\tThe last door was the outer one. But you didn't even have to knock. They were open. You crossed them and was free. There were nobody\n\toutside who cared about you. At least for now. It's sure that they'll start to chase you in a couple of minutes and you'll have to run,\n\thide or... fight back. But it's not a part of this story.\n\t\n\tFor now you live and you're free. You've reached the goal. And because of your awesome escape you'll soon become very famous and bards\n\twill sing the songs about \"$!{player_name} who run from the prison with ${his} arms tied\"...\n\t*page_break Final Stats\n\t*goto final_stats\n\n*if ending_scene = \"it_was_so_close\"\n\n\tENDING 3/23 \"It was so close...\"\n\t\n\t*set health 0\n\t\n\tIt may have worked... but unfortunately it didn't. \n\t\n\tTo knock down the guard behind the door you successfully used the same technique which you've used to knock the interrogator.\n\tYou passed over his unconscious body and reached the next door. You knocked the door expecting that technique which worked twice\n\talready will make you free. \n\t\n\tYou were very excited, you kicked the door... once... twice... nobody opened. But you've made so much noise that attracted attention\n\tof the guards which suddenly appeared behind you. \n\t\n\tThey stood right next to the door of the room where you're questioned, and they had\n\tswords in their hands. You've striked at them with fury but you couldn't take two armed guards at the same time. You managed to get one\n\tbut then... you felt terrible pain... pain of the sword piercing the flash. You fell on the floor very tired, you closed your eyes.\n\t\n\tLast thought of yours was...\n\t\"It was so close...\"\n\t\n\t*page_break Final Stats\n\t*goto final_stats\n\t\n*if ending_scene = \"officer_assault\"\n\n\tENDING 4/23 \"Officer Assault\"\n\t\n\tThe worst thing possible happens next. Big guy leaves, closes the door and calls for help. You can hear there's a lot of movement on the corridor.\n\tFinally after a long minute the door opens again and dwarf who must be a doctor in assist of four armoured guards including the big one rushes in. \n\tTwo of them point their swords at you. While the faint is being examined. You know that's over. Sooner or later either the doctor will find out\n\tthat he didn't pass out naturally or he'll regain his consciousness.\n\t\n\tAnyway you're soon proven guilty of assaulting the officer which is punished with death by hanging. This case is so obvious that they don't\n\teven need to wait for Royal Judge. \n\t\n\tThe next day at noon you end up your life at gallows.\n\t\n\t*page_break Final Stats\n\t*goto final_stats\n\t\n*if ending_scene = \"nuts\"\n\t*label nuts\n\tENDING 5/23 \"Nuts\"\n\t\n\t*set sanity 100\n\t\n\tI have two informations for you. One is good and the other one isn't.\n\t\n\tThe good one is that you didn't end up in the prison you weren't killed too. The bad one however is that instead of that you went completely\n\tcrazy and your mind disappeared in the abyss of madness. \n\t\n\tYou're not aware of this but you've been caught, undressed to the underwear and then bond with enough belts for a dozen of men. Then put\n\tto the cell where you spend the rest of your not-very-long life screaming and howling wildly: \"I'VE KILLED HIM!\", \"HE'S DEAD!\" and so on.\n\tEven if you had any friends they never came to visit you but it's not important you'll not be able to recognize them anyway.\n\t\n\t*page_break Final Stats\n\t*goto final_stats\n\t\n*if ending_scene = \"busted\"\n\n\tENDING 6/23 \"Busted\"\n\t\n\t*set health 0\n\t\n\tBig one gets back in to check what's going on. The old guard regains his focus and shouts: \"Prisoner is escaping!\".\n\tTwo other guards soon appear in the door you've just passed. That makes 4-1 against you... (You've managed to exclude\n\tthe young one who caught you)\n\t\n\tBut that only made the rest more angry. \n\t*if (will\u003c50) or (sanity\u003c50)\n\t\tYou cannot run, you cannot fight them. It's over. You give up asking them to spare your life. This saves you life.\n\t\t\n\t\tNot for long anyway. In the following week you're hang for assaulting the officer and attempt to escape.\n\t*if (will>=50) or (sanity>=50)\n\t\tHaving the wall behind you and four enemies in front, like a hunted animal you decide not to give up... \n\t\tScreaming wildly, kicking and biting you rush toward the exit door. You hit the weakest of the surrounding enemies,\n\t\tthe old guard knocking him down. \n\t\t\n\t\tAdrenaline rings in your ears, your heart is about to explode, you barely feel the blade cutting your arm badly. You've\n\t\tbreached the cordon and you're only 10 steps to the door... 9... 8... 7... *twang* you are not able to hear the deadly sound\n\t\tof the shoot from the crossbow but you cannot ignore the bolt sticking out of your chest. You take one last look at the door\n\t\tbefore you fall and everything fades to black... \n\t\t\n\tIt seems that the distraction didn't worked... you ought to remember that the guard should always be behind the prisoner. \n\t\n\t*page_break Final Stats\n\t*goto final_stats\n\t\n*if ending_scene = \"beaten\"\n\n\tENDING 7/23 \"Beaten\"\n\t\n\t*set health 5\n\t\n\tYou try to fight with your enemy with everything you've got. But to fight somebody, it's good to be strong, dexterous and tough. Rage\n\tcan be helpful too. Anyway, you're not any kind of a fighter. \n\t\n\t*if player_sex = \"female\"\n\t\tHe doesn't even seem to care that you're female.\n\tHe just beats your hard. You have your nose broken and many of your teeth lost. He beats you until you barely move. Being injured\n\tso much you'll probably didn't live to the court.\n\t\n\tYou shouldn't fight when you're not sure that you'll win.\n\t\n\t*page_break Final Stats\n\t*goto final_stats\n\t\n*if ending_scene = \"sword_vs_feather\"\n\n\tENDING 8/23 \"Sword more powerful than feather\"\n\t\n\t*set health 1\n\t\n\tYour enemy's dead... but so are you, well, not yet of course. For now you still have some time to think what went wrong\n\twhile lying in the pool of your own blood. \n\t\n\tIt makes me think that you probably were guilty if you decided to fight so desperately instead of proving your innocence.\n\t\n\t*page_break Final Stats\n\t*goto final_stats\n\n*if ending_scene = \"heroic_but_stupid\"\n\n\tENDING 9/23 \"Heroic but... stupid\"\n\t\n\t*set health 0\n\t\n\tWhat did you expected? He pierce you with his sword without any problem and you're dead. \n\t\n\tNever, ever attack an angry guard armed with sword while having your arms tied. Unless of course you're a magican of some sort.\n\t\n\t*page_break Final Stats\n\t*goto final_stats\n\t\n*if ending_scene = \"underestimated_giant\"\n\n\tENDING 10/23 \"Underestimated giant\"\n\t\n\t*set health 10\n\t\n\tIt hits your \n\t*if player_race = \"dwarf\"\n\t\thead\n\t\t*goto underestimated_giant_1\n\t*else\n\t\tsolar plexus \n\t*label underestimated_giant_1\n\tand it feels like a battering ram. You lose your breath and \n\t*if bigguy_location = \"dungeon\"\n\t\tyou fly away back to the bottom of the staircase. Dropping both a knife and a torch.\n\t\t*set weapon \"bare fists\"\n\t\t*set torch false\n\t*if bigguy_location = \"corridor\"\n\t\tyou fly inside the room that you've wanted to leave.\n\t\t\n\t\tGigantic guard walks in and now you can see that he's angry.\n\t*if bigguy_location = \"dungeon\"\n\t\tGigantic guard turns around and walks towards you. In the light of a torch you can see that he's angry.\n\t*if strength>=78\n\t\tYou were hit but you hasn't yet told your last word. You get up and fight back. You aim your right uppercut at his \n\t\tjaw but he catches your fist. You try it with the second hand with the same result. You both begin to wrestle but\n\t\tsoon it becomes obvious to you that even if you're very strong he's even stronger then you. \n\tAfter a couple of minutes he grabs you and painfully twists your arms. You have to give up.\n\t\n\tExtremely beaten you're thrown to the cell and soon proven guilty of\n\t*if bigguy_location = \"dungeon\"\n\t\tassaulting the guard on duty,\n\t*if (karcher_state = \"faint\") or (karcher_state = \"dead\")\n\t\tassaulting the officer,\n\twhich is punished with death by hanging. \n\tThis case is so obvious that they don't even need to wait for Royal Judge. \n\t\n\tThe next day at noon you end up your life at gallows.\n\t\n\t*page_break Final Stats\n\t*goto final_stats\n\t\n*if ending_scene = \"beheaded_by_young\"\n\n\tENDING 11/23 \"Beheaded\"\n\t\n\t*set health 0\n\t\n\tHe could just make you stumble, but unfortunately for you, he didn't. Instead of that he cut with his sword at the height of your neck\n\tjust when you were running through the doorway causing your decapitation. You lost your head to this young man. Literally. \n\t\n\t*page_break Final Stats\n\t*goto final_stats\n\n*if ending_scene = \"cut_your_way_through\"\n\n\tENDING 12/23 \"Fight your way out!\"\n\t\n\t*if strength!=0\n\t\t*set strength %+10\n\t*if will!=0\n\t\t*set will %+10\n\t*if dexterity!=0\n\t\t*set dexterity %+10\n\t\n\tAfter killing the young guard you rush into the last room of the post dividing you from the freedom. What's good\n\tthere are no more than an old guard near the door outside. There are still those two behind you, so you quickly\n\tshut the door behind you and barricade it with a wooden chair. \n\t\n\tThe knees of an old man tremble as you close to him. You can see a voiceless ask for life in his grey, wise eyes.\n\tHe has no weapon and he slowly walks away from the door. His life lies at your hands, what do you do?\n\t*choice\n\t\t#This man is not my enemy. I let him live and run away.\n\t\t\t*if will!=0\n\t\t\t\t*set will %+10\n\t\t\t*set sanity %-30\n\t\t\tYou've made a righteous decision. Maybe not right, cause he may describe you to his colleagues and let them\n\t\t\tchase you. But at least you've kept some humanity after this bloody event.\n\t\t\t\n\t\t\t*goto cut_your_way_through\n\t\t#I wish I could spare his life but he's the last one who've seen my face clearly. I must kill him.\n\t\t\tYou say you're sorry while you end his life a little faster that it should end but you can see some sort\n\t\t\tof understanding on his face. After his death there's no one here who can describe you and begin a effective pursuit.\n\t\t\t\n\t\t\t*goto cut_your_way_through\n\t\t#I kill him without mercy.\n\t\t\tYou close to the man and stab him with ${weapon} like you did with the previous one and you begin to walk away but...\n\t\t\tsomething's wrong. Rather than die the old man begins to laugh. First thought of yours is that you've missed so you\n\t\t\tget back to him and hit him again aiming heart. It's impossible to live after that blow.\n\t\t\t\n\t\t\tSo the man goes silent for a while and falls on the floor. But as soon as you turn around to the door again, his laugh\n\t\t\tstarts back much louder this time.\n\t\t\t\n\t\t\t*set sanity %+40\n\t\t\t\n\t\t\tThe chill walks down your spine, but you jump to him and begin to stab him one time after another. But it doesn't help.\n\t\t\tHis laugh is louder and louder as you torment his flesh. Suddenly he grabs your leg and you scream...\n\t\t\t*page_break\n\t\t\tYou wake up terrified in your own room in your own bed... Monster.\n\t\t\t*page_break Final Stats\n\t\t\t*goto final_stats\n\t*label cut_your_way_through\n\tYou open the door and run outside. Armed with a ${weapon}, with the sound of your ${feet} hitting the street, wearing the ${torso} and ${legs} you\n\trun down the street in your ${pelvis}.\n\t*page_break Final Stats\n\t*goto final_stats\n\n*if ending_scene = \"backstabbed\"\n\n\tENDING 13/23 \"Backstabbed\"\n\t\n\t*set health 0\n\t\n\tYou manage to tighten your jaws before the hit. The blade pierce through your body like it was a butter. \n\tYou fall on your knees feeling the salty taste of your own blood. Then you just die.\n\t\n\tHaving an enemy behind your back is never a good decision. It's even worse when this enemy is armed with a long sword. \n\t\n\t*page_break Final Stats\n\t*goto final_stats\n\t\n*if ending_scene = \"mental_master\"\n\n\tENDING 14/23 \"Mental Master\"\n\t\n\tYou're a Mental Master. The force is so strong in you, that you just knock everyone who stands at your way to the freedom\n\twith the absolute power of your mind.\n\t\n\tIt's sure that all this \"interrogation\" for you was, honestly, just a pure fun. Even the strongest man can't hold a being with such a supreme\n\tmagical power.\n\t\n\t*page_break Final Stats\n\t*goto final_stats\n\t\n*if ending_scene = \"innocent\"\n\t*set sanity %-15\n\t*label innocent\n\tENDING 15/23 \"Innocent\"\n\t\n\tThere are no evidence of your crimes except of the testimony of one person... Can you guess who?\n\t*if adversary=\"\"\n\t\t*input_text adversary\n\t\t*goto innocent\n\t*if (adversary!=player_name) and (adversary != \"Karcher\")\n\t\t\n\t\tOf course you're right. This $!{adversary}, your greatest enemy, is fully responsible for your arrest.\n\t\tBut soon you'll have a chance to take your revenge...\n\t\n\t*if adversary=player_name\n\t\tIt's you... you're the one who testified against yourself! But why? Are you crazy? Did your conscience was so uneasy with your\n\t\tdeeds that you had to punish yourself?\n\t\t*set sanity %+30\n\t\t\n\t*if (adversary = \"Karcher\")\n\t\tKarcher! You knew it was this bastard! And know you're enlightened...\n\t\t\n\t\tA couple of weeks ago you've heard from your uncle, when you met him nearby, that there will be a knight tournament in the city and that the \n\t\tBlack Knight is the sure winner. You've bet some money on him, when there's an opportunity to earn some, why let it pass?\n\t\t\n\t\tUnfortunately the Black Knight died for a heart attack before the final round. You've lost some, it happens sometimes, but\n\t\twhat's more important, you can remember that you've seen this guy, Karcher, when you've talking with your uncle and when you placed your bet.\n\t\t\n\t\tHe must've overheard your talk and then bet the same as you. Suddenly it became all clear why he tried so hard to punish you!\n\t\n\tThe Royal Judge is not a moron. Without any evidence, without your admission even during tortures he had to call for the only witness,\n\tthat is \n\t*if adversary=player_name\n\t\tyou and ask to publicly repeat the testimony against yourself.\n\t\t*if sanity>80\n\t\t\tThat's the time you've waited for so long. You have an opportunity to shout out your sins! You claim that you're guilty,\n\t\t\tbut the Royal Judge is no moron. It's obvious that you've lost your mind. So instead of hanging...\n\t\t\t*page_break\n\t\t\t*goto nuts\n\t\t*else\n\n\t\t\tHowever you do nothing but stay quiet with your head down. You've suffered enough.\n\t\t\t\n\t\t\tYou're found innocent and set free. You've redeem your sins...\n\t\t\t*goto innocent_1\n\t\t\t\n\t$!{adversary} and ask to publicly repeat the testimony against you. You're not surprised that no one answers. The Royal Judge\n\tin that case is obliged to set you free in the name of the Law and publicly announce that from now on $!{adversary} is found guilty of\n\tslander.\n\t\n\tYou're found innocent and set free and granted a right to seek a Vendetta... If you'll find it, that's a different story.\n\t\n\t*label innocent_1\n\t*page_break Final Stats\n\t*goto final_stats\n\t\n*if ending_scene = \"sentenced_to_death\"\n\n\tENDING 16/23 \"Sentenced to Death\"\n\t\n\t*set health 0\n\t\n\tYou have been arrested due to the testimony of one person... Can you guess who?\n\t*if adversary=\"\"\n\t\t*input_text adversary\n\t*if (adversary!=\"\") and (adversary != \"Karcher\")\n\t\tOf course you're right. This $!{adversary} your greatest enemy, is fully responsible for your arrest.\n\t\t\n\t*if adversary=player_name\n\t\tIt's you... you're the one who testified against yourself! But why? Are you crazy? Did your conscience was so uneasy with your\n\t\tdeeds that you had to punish yourself?\n\t\t*set sanity %+30\n\t\t\n\t*if (adversary = \"Karcher\")\n\t\tKarcher! You knew it was this bastard! And know you're enlightened...\n\t\t\n\t\tA couple of weeks ago you've heard from your uncle, when you met him nearby, that there will be a knight tournament in the city and that the \n\t\tBlack Knight is the sure winner. You've bet some money on him, when there's an opportunity to earn some, why let it pass?\n\t\t\n\t\tUnfortunately the Black Knight died for a heart attack before the final round. You've lost some, it happens sometimes, but\n\t\twhat's more important, you can remember that you've seen this guy, Karcher, when you've talking with your uncle and when you placed your bet.\n\t\t\n\t\tHe must've overheard your talk and then bet the same as you. Suddenly it became all clear why he tried so hard to punish you!\n\t\t\n\tThis testimony was found true because of your admission. In that case The Royal Judge says:\n\t\"For a murder and theft in the name of the Law you're sentenced to death by hanging\" to delight of the mob.\n\t\n\tSoon you're end up your life at gallows.\n\t\n\t*page_break Final Stats\n\t*goto final_stats\n\n*if ending_scene = \"overdrive\"\n\n\tENDING 17/23 \"Overdrive\"\n\t\n\t*set health 0\n\t\n\tYou shouldn't have worked so hard. I mean... of course it's good that you've worked hard but it's a good idea to sleep sometimes too.\n\t\n\tAnyway, your body couldn't stand your orders and in the protest it just... stopped working. \n\t\n\tIt's a punishment for not sleeping enough! \n\t\n\t*page_break Final Stats\n\t*goto final_stats\n\n*if ending_scene = \"like_a_santa\"\n\n\tENDING 18/23 \"Like a Santa\"\n\t\n\tWhen you get yourself on the roof you don't even know which of your feelings is now the strongest:\n\t*line_break \n\tHappiness, that you've manage to leave this puny prison,\n\t*line_break \n\tdisappointment, that it was so easy (there was no bars in the chimney),\n\t*line_break  \n\tanger that someone dared to set you up in all this situation,\n\t*line_break \n\tor excitement because you know that soon the pursuit will begin...\n\t\n\tThat however you must judge on your own...\n\t\n\t*page_break Final Stats\n\t*goto final_stats\n\n*if ending_scene = \"rat_kiss\"\n\n\tENDING 19/23 \"Fairy tale\"\n\t\n\tIt's impossible to keep your eyes open when doing such a thing like kissing a rat. That's why you had to open them a while later.\n\tAnd that's why you haven't seen (probably quite disgusting) change from a rat to a knight. \n\t\n\tI assume that you've believed him, so you're not very shocked that a rat really changed into man. Someone could ask if he was handsome\n\tor not, so just for them let's say the knight may be considered handsome. And for those seriously interested, he's not naked.\n\t\n\tAnyway, you're now in a cell with a knight in a shiny armor.\n\t\n\t*if rat_name !=\"John III Sobieski\"\n\t\tHe presents himself as a Royal Knight Sir John III Sobieski.\n\t\n\tWhat's more, he's thankful, so as soon as he finishes thanking you he calls\n\tfor a guard. Astonished Cerberion can't refuse the demand of a knight, so you're both free in a couple of minutes. You stand in the \n\tdungeons corridor and look at the place which used to be your cell, you turn back to see the reaction of Sir McLeon but... he's gone,\n\tdisappeared, his cell is just empty. You try to ask about it, but the only answer is a strange look of Cerberion. \n\t\n\tSir John III Sobieski asks you politely to accompany him upstairs to properly finish your release. You have no choice but to follow your\n\trescuer. Soon you're again in the room where you've been interrogated in. This time however you're not bond. The Law here is so strange\n\tthat the knight may really come to an arrest and claim that he wants to release a prisoner.\n\t\n\tBefore the documents of your case are officially destroyed you are said that the one and only person responsible for your arrest is...\n\t*if adversary = \"\"\n\t\t*set adversary \"Carmen Quest\"\n\t${adversary}.\n\t\n\tFinally you leave the building. The usual stench of a city feels like a fresh breeze when you take your first deep breath at freedom.\n\tYou can see that Sir John does the same. He asks you about your plans, but do you know what will you do next? Will you follow a romance\n\twith a noble knight? Will you search for ${adversary}? Or maybe just leave it all behind and get back to your life?\n\t\n\tAll in all, regardless of your choice, it's not a part of this story anymore...\n\t\n\t*page_break Final Stats\n\t*goto final_stats\n\n*if ending_scene = \"tortured\"\n\n\tENDING 20/23 \"Tortured\"\n\t\n\t*set health 0\n\t\n\tI think the rest of this story shouldn't be revealed. For the sake of good taste. The most important is that\n\tyou didn't make it to the court. \n\t\n\t*page_break Final Stats\n\t*goto final_stats\n\t\n*if ending_scene = \"fatal_accident\"\n\n\tENDING 21/23 \"Fatal Accident\"\n\t\n\t*set health 0\n\t\n\tHiding your weapon under your clothes you couldn't know that this will happen... When you were thrown, well, your weapon\n\tliterally turned itself against you. The big guard who entered the cell afterwards to untie you was surprised by the pond\n\tof blood that you're lying in. He called for Cerberion who ordered to turn you on your back. Try to imagine their surprise\n\twhen they discovered a big knife pounded into your stomach to the handle...\n\t\n\t*page_break Final Stats\n\t*goto final_stats\n\t\n*if ending_scene = \"magic_portal\"\n\n\tENDING 22/23 \"Magic Portal\"\n\t\n\t*temp mcleon\n\tWith the body of a rat in your hand you come to the portal. You have already killed it so you've no problem with ripping his\n\thead off; you must somehow get his blood. Thinking about the place where you want to be after you pass through the portal,\n\tyou finish the ritual. The carving begins to glow with magic at first and just a moment later, instead of the cold stone, there\n\tis a glowing fog. The portal is finally opened. Are you ready to go through?\n\t*choice\n\t\t#No I have to speak with Sir McLeon first!\n\t\t\t*set mcleon true\n\t\t\tAbsorbed with the ritual you couldn't see what's happening behind you, so when you turned around you were a bit surprised\n\t\t\tseeing him just behind your back. Before you ask, he replies that you have to hurry, because portal wouldn't be open forever.\n\t\t\tHe's right, it seems that he's going with you, so there will be enough time to ask. With that thought you enter the portal...\n\t\t\t\n\t\t\t*goto magic_portal_1\n\t\t#Yes.\n\t\t\t*set mcleon false\n\t\t\tYou enter the portal without turning back.\n\t\t\t\n\t\t\t*goto magic_portal_1\n\t*label magic_portal_1\n\tTraveling through the magic portals is always an interesting experience, but it's also hard to describe. In one moment you're in the\n\tcell deep underground, in another you're nowhere and then... you're where you've wanted to be and you feel like you've been here for\n\ta long time. \n\t\n\t*if mcleon = true\n\t\t\"You did it. Bravo.\" says McLeon \"And thanks too you I'm free again. I hope that someday we'll meet each other once again, and that\n\t\tyou'll not regret it...\" you turn around to speak with him, but he's already gone.\n\t*if mcleon = false\n\t\tYou're free, and hopefully, far enough from the kingdom which imprisoned you. You're leading your life and the memories about this\n\t\ttime begin to fade, when something reminds you of this time. It's McLeon. It doesn't matter where you hear this name but, what's important\n\t\tit's said that a powerful wizard named McLeon came back after a century...\n\t\t\n\tWill you meet him once more? I don't know, it's not a part of this story...\n\t*page_break Final Stats\n\t*goto final_stats\n\t\n*if ending_scene = \"poisoner\"\n\n\tENDING 23/23 \"Poisoner\"\n\t\n\tYou open the door and run outside. Armed with a ${weapon}, with the sound of your ${feet} hitting the street, wearing the ${torso} and ${legs} you\n\trun down the street in your ${pelvis}.\n\t\n\tSoon a trembling news hit the city. A gossip about a prisoner who somehow managed to poison the whole garrison of a guard post and flee spread\n\twith the speed of lightning. Of course like all gossip it varies much. Some people say that the fugitive is a powerful mage. Others\n\tsay that ${he} is a demon. Finally some say that nobody really escaped and guards just poisoned themselves with this awful beans...\n\t\n\tAll in all, you're probably the only one who knows the truth, and it's easy to conclude that this situation suits you. But the idyll\n\tdoesn't last forever and soon the pursuit begins and you have to run. But meanwhile you may already be very, very far away from the\n\tunfortunate guard post...\n\t\n\t*page_break Final Stats\n\t*goto final_stats\n\t\n*if ending_scene = \"cursed\"\n\n\tENDING 24/24 \"Cursed\"\n\t\n\tYou're trapped here. You shoudln't have messed with the rat...\n\t\n\t*page_break Final Stats\n\t*goto final_stats\n\n*label final_stats\n\n*temp potential\n*set potential player_skillpoints*2\n\nYour final stats:\n\n*if strength!=0\n\tStrength: ${strength}%\n\t*line_break\n*if endurance!=0\n\tEndurance: ${endurance}%\n\t*line_break\n*if dexterity!=0\n\tDexterity: ${dexterity}%\n\t*line_break\n*if reflex!=0\n\tReflex: ${reflex}%\n\t*line_break\n*if intelligence!=0\n\tIntelligence: ${intelligence}%\n\t*line_break\n*if look!=0\n\tLook: ${look}%\n\t*line_break\n*if charisma!=0\n\tCharisma: ${charisma}%\n\t*line_break\n*if will!=0\n\tWill: ${will}%\n\t*line_break\n*if wisdom!=0\n\tWisdom: ${wisdom}%\n\t*line_break\n*if magic!=0\n\tMagic: ${magic}%\n\t*line_break\n*if luck!=0\n\tLuck: ${luck}%\n\t*line_break\n*if sanity!=0\n\tSanity: ${sanity}%\n\t*line_break\nHealth: ${health}%\n*line_break\n*line_break\n*stat_chart\n\tpercent potential Unused Potential \n\t\t% of potential left\nYour story stops here. Are you glad with your achievements? I hope that you are and that you've liked the story.\n\nBut in the case you're for some reason not satisfied, why don't you give it another try? There are many ways that\nImprisoned may follow. Also there are many ways how it may end.\n\nI would be really honored if you found them all. Either way... Thank you very much for playing! I would be very pleased\nwith any reviews. With your help I'll do anything what's possible to make better games.\n\nMyth Thrazz\n\n*label end\n*page_break End\nWe hope you've enjoyed playing [i]Imprisoned.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99", "equip": "*comment Copyright 2010 by Myth Thrazz (http://mythgames.pl)\n\n*line_break\n$!{main_hand} hand:\n*line_Break\n*if (torch=true) and (weapon=\"bare fists\")\n\ttorch\n\t\n*if (torch=false) and (weapon=\"bare fists\")\n\tnothing\n\t\n*if weapon!=\"bare fists\"\n\t${weapon}\n\t\n\n$!{second_hand} hand: \n*line_Break\n*if torch=true\n\ttorch\n\t\n*if torch=false\n\tnothing\n\t\n\nYour basic equipment:\n\n*if head=\"unknown\"\n\tis unknown yet\n\t\n*if head!=\"unknown\"\n\tHead: ${head}\n\t*line_break\n\tHands: ${hands}\n\t*line_break\n\tArms: ${arms}\n\t*line_break\n\tTorso: ${torso}\n\t*line_break\n\tPelvis: ${pelvis}\n\t*line_break\n\tLegs: ${legs}\n\t*line_break\n\tFeet: ${feet}\n\n*if head!=\"unknown\"\n\tTotal encumbrance: ${encumbrance}\n\nOther equipment:\n*if ((equip_lockpick != true) and (equip_needle != true)) and ((equip_karcher_keys != true) and (equip_prison_keys != true))\n\tyou have nothing\n*if equip_lockpick = true\n\t\n\tLockpick - useful when one need to open some locks\n\t\n*if equip_needle = true\n\n\tA significantly large needle - it was in a haystick, you could've hurt yourself!\n\t\n*if equip_karcher_keys = true\n\n\tCommon house keys - if you'll ever need to visit your interrogator\n\t\n*if equip_prison_keys = true\n\n\tPrison keys - fugitive best friends\n\t\t\n*label finish2\n*finish Back to Story", "equipment": "*comment Copyright 2010 by Myth Thrazz (http://mythgames.pl)\n\n*gotoref next_act\n\n*label cell_act_I\n*comment QUICKTEST ONLY\n*if false\n\t*goto set_equipment\n*bug QUICKTEST REDIRECT TEST END\n\n*comment ********************************************************\n*label get_back_to_proper_scene\n\n*if back_scene = \"cell\"\n\t*goto_scene cell\n*if back_scene = \"arrest\"\n\t*goto_scene arrest\n*comment ***************************\n\n*comment ********************************************************\n*label set_equipment\n\n*comment **************\n*comment TEMP VARIABLES\n*temp pelvis_check\n*set pelvis_check 0\n\n*temp leggings\n*set leggings 0\n*comment **************\n\nDo you actually know what are you wearing?\n*choice\n\t#Of course!\n\t\tOkay then...\n\t\t*goto look_feet\n\t#No actually I don't.\n\t\tWhy so?\n\t\t*choice\n\t\t\t#If I'm in prison they could've take away my clothes, right?\n\t\t\t\tYup, but they didn't. Don't ask why. I don't know.\n\t\t\t\t*choice\n\t\t\t\t\t#Then I must have my Crystal Battle Axe of Void +6, my Invisible Weightless Plate Armour of Power +4, my...\n\t\t\t\t\t\tYou don't. All you have is your normal, non-overpowered stuff. You know what I mean?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Yes. May I then just choose what I want?\n\t\t\t\t\t\t\t\tIndeed. Let's start then.\n\t\t\t\t\t\t\t\t*goto look_feet\n\t\t\t\t\t\t\t#Yeah, boring. Can I just skip it?\n\t\t\t\t\t\t\t\tSure, you can be naked if you wish so.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Come on! Just give me some common clothes and go on!\n\t\t\t\t\t\t\t\t\t\t*label look_most_funny_part\n\t\t\t\t\t\t\t\t\t\tOk. If you don't want to play the most funny part of the game...\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#I don't. Just skip it.\n\t\t\t\t\t\t\t\t\t\t\t\tAs you wish.\n\t\t\t\t\t\t\t\t\t\t\t\t*set arms \"shirt sleeves\"\n\t\t\t\t\t\t\t\t\t\t\t\t*set hands \"nothing\"\n\t\t\t\t\t\t\t\t\t\t\t\t*set head \"nothing\"\n\t\t\t\t\t\t\t\t\t\t\t\t*set torso \"common shirt\"\n\t\t\t\t\t\t\t\t\t\t\t\t*set pelvis \"nothing\"\n\t\t\t\t\t\t\t\t\t\t\t\t*set legs \"common trousers\"\n\t\t\t\t\t\t\t\t\t\t\t\t*set feet \"common shoes\"\n\t\t\t\t\t\t\t\t\t\t\t\t*set encumbrance 3\n\t\t\t\t\t\t\t\t\t\t\t\t*goto looks_end\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t#Most funny you say? Well then I'll check it out.\n\t\t\t\t\t\t\t\t\t\t\t\tGood choice.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto look_feet\n\t\t\t\t\t\t\t\t\t#Screw it. I may be naked.\n\t\t\t\t\t\t\t\t\t\tAre you a naturist?\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Exactly.\n\t\t\t\t\t\t\t\t\t\t\t\tRoger that.\n\t\t\t\t\t\t\t\t\t\t\t\t*set player_perk player_perk&\" naturist\"\n\t\t\t\t\t\t\t\t\t\t\t\t*set arms \"nothing\"\n\t\t\t\t\t\t\t\t\t\t\t\t*set hands \"nothing\"\n\t\t\t\t\t\t\t\t\t\t\t\t*set head \"nothing\"\n\t\t\t\t\t\t\t\t\t\t\t\t*set torso \"nothing\"\n\t\t\t\t\t\t\t\t\t\t\t\t*set pelvis \"nothing\"\n\t\t\t\t\t\t\t\t\t\t\t\t*set legs \"nothing\"\n\t\t\t\t\t\t\t\t\t\t\t\t*set feet \"nothing\"\n\t\t\t\t\t\t\t\t\t\t\t\t*goto looks_end\n\t\t\t\t\t\t\t\t\t\t\t#No.\n\t\t\t\t\t\t\t\t\t\t\t\tThen there's no reason for you to be naked.\n\t\t\t\t\t\t\t\t\t\t\t\tEven if you were naked, they gave you some rags.\n\t\t\t\t\t\t\t\t\t\t\t\t*set arms \"rags\"\n\t\t\t\t\t\t\t\t\t\t\t\t*set hands \"nothing\"\n\t\t\t\t\t\t\t\t\t\t\t\t*set head \"nothing\"\n\t\t\t\t\t\t\t\t\t\t\t\t*set torso \"rags\"\n\t\t\t\t\t\t\t\t\t\t\t\t*set pelvis \"rags\"\n\t\t\t\t\t\t\t\t\t\t\t\t* looks_end\n\n*label looks_end\nNow you're fully equipped with the things of your choice. I hope they'll serve you well in the future.\n*set equiped true\n*goto get_back_to_proper_scene", "fights": "*comment Copyright 2010 by Myth Thrazz (http://mythgames.pl)\n\n*comment **************\n*comment TEMP VARIABLES\n\n*temp karcher_morale\n*set karcher_morale 50\n\n*temp karcher_health\n*set karcher_health 100\n\n*temp candle\n*set candle true\n\n*temp rand\n*rand rand 1 10\n*comment **************\n\n*gotoref back_act\n\n*label cell_act_I\n*comment QUICKTEST ONLY\n*if false\n\t*goto fight_in_arrest\n*if false\n\t*goto fight_in_arrest_0\n*if false\n\t*goto fight_in_arrest_1.1.1.2_1\n*if false\n\t*goto fight_in_arrest_1\n*bug QUICKTEST REDIRECT TEST END\n\n*comment ********************************************************\n*label get_back_to_proper_scene\n\n*if back_scene = \"cell\"\n\t*goto_scene cell\n*if back_scene = \"arrest\"\n\t*goto_scene arrest\n*comment ***************************\n\n*comment ********************************************************\n\n*label fight_in_arrest_0\n*set karcher_morale -10\n*page_break Final Act: Interrogation Room Fight\nYour opponent is shocked with your sudden offensive and you're the attacker so you have the initiative. \nYou better not waste it.\n*set round 0\n*goto fight_in_arrest_1\n\n*label fight_in_arrest\n*page_break Final Act: Interrogation Room Fight\nYou're about to fight but maybe you wish to remind your situation to better suit your moves?\n*choice\n\t#No, I know what's the situation.\n\t\tOkay, let's proceed then.\n\t\t*goto fight_in_arrest_1\n\t\t\n\t#Yes, please I'm a bit confused.\n\t\tSorry to hear that but I serve with help. You are in a small room with a desk and an armchair. Next to the armchair there's\n\t\ta big, armored guy who was made quite mad. It's yours fault so don't even try to argue. \n\t\t\n\t\tHe has no weapon (at least if you don't believe that the feather may be mightier than sword). He'll get you in a couple of seconds.\n\t\t\n\t\tJust behind of you there's door behind which another, even bigger, guy stands. He'll probably enter if the guard in the room calls him\n\t\tor when any of you'll make a lot of noise.\n\t\t*goto fight_in_arrest_1\n\n*label fight_in_arrest_karcher_out\nThe fight has ended and you're still alive. That's good.\n\nOn the other hand though, even if you weren't a criminal a minute before, now you ARE for sure. So you can forget\nabout being judged. If anyone knows what have you done and rises an alarm all of the guards will try to kill you at sight.\n\nSo you'll have to escape from here. And rather quick...\n\nThe big guy behind the door may enter at almost any moment now. He won't\nhear interrogation anymore so he'll probably get anxious. \n*goto fight_in_arrest_1\n\t\t\n*label fight_in_arrest_1\n*if (round > 0) and (round \u003c 5)\n\t*if (karcher_state = \"dead\") or (karcher_state = \"faint\")\n\t\tWhat's your next step?\n\t\t*choice\n\t\t\t*if tied=true\n\t\t\t\t#I try to escape as quick as possible.\n\t\t\t\t\t*label fight_in_arrest_1.1\n\t\t\t\t\tYou want to escape now? With your hands tied?\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#That is correct.\n\t\t\t\t\t\t\t*label fight_in_arrest_1.1.1\n\t\t\t\t\t\t\tIt's a strange decision but fine. Being unable to open the door you have to somehow make the guard outside\n\t\t\t\t\t\t\tto open it. It doesn't matter how will you do that. Either way you'll have to make him unable to stop you from\n\t\t\t\t\t\t\trunning away. How do yo plan to do that?\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#I'll use the same method that worked here.\n\t\t\t\t\t\t\t\t\t*label fight_in_arrest_1.1.1.1\n\t\t\t\t\t\t\t\t\tYou've decided to leave your life to the fate...\n\t\t\t\t\t\t\t\t\t*set sanity %+30\n\t\t\t\t\t\t\t\t\t*if luck>=85\n\t\t\t\t\t\t\t\t\t\t*page_break Epilogue\n\t\t\t\t\t\t\t\t\t\t*set ending_scene \"more_luck_than_reason\"\n\t\t\t\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t*page_break Epilogue\n\t\t\t\t\t\t\t\t\t\t*set ending_scene \"it_was_so_close\"\n\t\t\t\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t\t\t#I'll try to convince him that something bad happened to the interrogator and sneak out while he examines the body.\n\t\t\t\t\t\t\t\t\t*label fight_in_arrest_1.1.1.2\n\t\t\t\t\t\t\t\t\tThat's a clever plan.\n\t\t\t\t\t\t\t\t\t*set player_skillpoints +2\n\t\t\t\t\t\t\t\t\t*set intelligence %+10\n\t\t\t\t\t\t\t\t\tYou stand next to the door and shout that something's wrong with the guard and he may need help. That works\n\t\t\t\t\t\t\t\t\tand the door opens and the head of the big, stinky guard comes inside and you try to convince him that you\n\t\t\t\t\t\t\t\t\thad nothing to do with it, but the guy who questioned you needs instant help.\n\t\t\t\t\t\t\t\t\t*if 0=1\n\t\t\t\t\t\t\t\t\t\t*label fight_in_arrest_1.1.1.2_1\n\t\t\t\t\t\t\t\t\t\tThe big guard still tries to examine the body of the interrogator as you slip inside the room.\n\t\t\t\t\t\t\t\t\t\t*goto fight_in_arrest_1.1.1.2_2\n\t\t\t\t\t\t\t\t\t*if charisma>=75\n\t\t\t\t\t\t\t\t\t\t*set bigguy_location \"interrogation\"\n\t\t\t\t\t\t\t\t\t\tYou actually order the guard to examine the guy behind the desk and he just obey. He walks in leaving\n\t\t\t\t\t\t\t\t\t\tthe door opened. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tYou may leave but you must understand that if he's not VERY stupid he'll understand \n\t\t\t\t\t\t\t\t\t\tsoon that something is not wrong and then you'll have one sure enemy behind you. \n\t\t\t\t\t\t\t\t\t\t*label fight_in_arrest_1.1.1.2_2\n\t\t\t\t\t\t\t\t\t\tWhat do you do?\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#I'll wait for the right moment and knock him down too.\n\t\t\t\t\t\t\t\t\t\t\t\t*label fight_in_arrest_1.1.1.2.1\n\t\t\t\t\t\t\t\t\t\t\t\t*set bigguy_state \"faint\"\n\t\t\t\t\t\t\t\t\t\t\t\t*set player_skillpoints +2\n\t\t\t\t\t\t\t\t\t\t\t\tYou were prepared and he wasn't so it must have worked. When he leans forward to take a closer\n\t\t\t\t\t\t\t\t\t\t\t\tlook at the faint you attack using the same method as a while before and achieving the same result.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tYou're one next step closer to freedom. On the other hand even if they brought you here for some \n\t\t\t\t\t\t\t\t\t\t\t\treason, you're by now far more guilty then you were 15 minutes ago. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tThe two of guards are either dead or faint in this room, the door is open.\n\t\t\t\t\t\t\t\t\t\t\t\t*if tied = true\n\t\t\t\t\t\t\t\t\t\t\t\t\tYour hands are still tied. \n\t\t\t\t\t\t\t\t\t\t\t\tWhat's your next step?\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t*if (tied=true) and (hands!=\"no hands\")\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t#It's time to free my hands.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label fight_in_arrest_1.1.1.2.1.1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto fight_in_arrest_1.2\n\t\t\t\t\t\t\t\t\t\t\t\t\t*if sanity>=50\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Ha! I need no hands to fight my way out! Charge!\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label fight_in_arrest_1.1.1.2.1.2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if luck>=35\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break Epilogue\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set ending_scene \"more_luck_than_reason\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break Epilogue\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set ending_scene \"it_was_so_close\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t\t\t\t\t\t\t\t*if tied=false\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Search the room.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label fight_in_arrest_1.1.1.2.1.3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto fight_in_arrest_1.3\n\t\t\t\t\t\t\t\t\t\t\t#It's my last chance to sneak out.\n\t\t\t\t\t\t\t\t\t\t\t\t*set alarm 5\n\t\t\t\t\t\t\t\t\t\t\t\t*label fight_in_arrest_1.1.1.2.2\n\t\t\t\t\t\t\t\t\t\t\t\t*set back_act \"corridor_act_I\"\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break Interlude: The Main Corridor\n\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene corridor\n\t\t\t\t\t\t\t\t\t\t\t#Let's see what happens.\n\t\t\t\t\t\t\t\t\t\t\t\t*label fight_in_arrest_1.1.1.2.3\n\t\t\t\t\t\t\t\t\t\t\t\tThe big guy examines the body for a while. Then realizes that it's faint. Clever huh?\n\t\t\t\t\t\t\t\t\t\t\t\tHe orders you to stay here while he brings the doctor.\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t*if intelligence>70\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t#I musn't let him do it. I try to convince him I'm a doctor and that I can help if he frees my hands.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label fight_in_arrest_1.1.1.2.3.1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (charisma>80) or (((charisma+look)>120) and (player_sex = \"female\"))\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou say that you're a skilled doctor and if you don't help that guy\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\the'll die. You mention that in that case he'll be responsible for the death\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tof the officer on duty. You're pretty clever and this guy isn't a titan of the\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tintellect so he believes you. He untie you and asks you for help. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou have no other choice then pretending that you know what you're doing, so\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tyou close to the victim and examine him doing your best to look professional.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tIt's obvious that he's ${karcher_state} but you can't just tell him that.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if strength>=80\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Lift the body and tell the guard that he needs fresh air so you must leave immediately.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label fight_in_arrest_1.1.1.2.3.1.1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou lift the body of the officer and order the guard to open the door for you. He nods\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tand both of you leave the room. On the corridor he takes one of his keys and opens the\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tdoor. \"Make a pass!\" you yell and pass the door leaving him behind.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThere are two other guards in the room. One young near the door leading inside the building\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tand the other one much older near the outside door. \"Open the door. He needs fresh air!\" you shout\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\twalking quickly towards the exit. The old guard opens them in shock while the big one explains\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\twhat happened to the younger.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou lay him down next to the well nearby shouting loudly to make a distraction.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break Epilogue\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set ending_scene \"carry_out_officer\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Order him to take the officer out.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label fight_in_arrest_1.1.1.2.3.1.2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tHe takes the body of the officer. You tell him to pass you the right key to the exit and he gives\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tyou the right key. Not it's up to you to open the door and leave with the big guy. You'll have to\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tdecide if you'll go in front of him or behind him. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#I'll go first. Beside the situation the guards should always be behind the prisoner, so if someone is behind the door shouldn't stop me.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label fight_in_arrest_1.1.1.2.3.1.2.1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou enter the guard post. \"Make a pass!\" you yell walking towards the exit.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThere are two other guards in the room. One young near the door leading inside the building\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tand the other one much older near the outside door. \"Open the door. He needs fresh air!\" you shout\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\twalking quickly. The old guard opens them in shock while the younger probably sees nothing than big\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tone'back.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou stop next to the well nearby shouting loudly to make a distraction and order to lay the body.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break Epilogue\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set ending_scene \"carry_out_officer\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#I'll go behind him. The big guy like him entering the room should distract anyone there so I'll have an occasion to sneak out.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label fight_in_arrest_1.1.1.2.3.1.2.2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Go on quick get him outside!\" you tell the big one and let him pass the door.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThere are two other guards in the room. One young near the door leading inside the building\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tand the other one much older near the outside door. \"Open the door. He needs fresh air!\" you shout\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\twalking behind the big guard. The old guard opens them in shock while the younger grabs your arm\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tsaying that as a prisoner you cannot leave. When you try to argue or fight him he calls for his \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tcolleagues.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break Epilogue\n\t\t\t\t\t\t\t\t\t\t\t\
