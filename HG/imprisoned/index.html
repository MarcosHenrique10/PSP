\t\t*if player_sex = \"female\"\n\t\t\t\t\t\t\t\tWith your brests?\n\t\t\t\t\t\t\tYou can forget about strangling anybody without use of your hands which are still out of your use.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto fight_in_arrest_dizzy\n\t\t\t\t\t\t*label fight_in_arrest_dizzy.1.3\n\t\t\t\t\t\tIt's not so easy to strangle a man in his mid-ages.\n\t\t\t\t\t\t*if strength=0\n\t\t\t\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t\t\t\t*set next_act \"set_strength\"\n\t\t\t\t\t\t\t*set back_scene \"fights\"\n\t\t\t\t\t\t\t*set back_act \"fight_in_arrest_dizzy.1.3_aj\"\n\t\t\t\t\t\t\t*goto_scene settings\n\t\t\t\t\t\t*label fight_in_arrest_dizzy.1.3_aj\n\t\t\t\t\t\t*comment JUMP OK\n\t\t\t\t\t\t*if strength >= 65\n\t\t\t\t\t\t\n\t\t\t\t\t\t\tBut you're strong enough to accomplish this evil task.\n\t\t\t\t\t\t\tThe head of your enemy falls dead on his arms. \n\t\t\t\t\t\t\t*set karcher_state \"dead\"\n\t\t\t\t\t\t\t*set round +1\n\t\t\t\t\t\t\t*goto fight_in_arrest_1\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou try your best to strangle him but he's stronger than you and he manages to push you back.\n\t\t\t\t\t\t\t*set karcher_state \"normal\"\n\t\t\t\t\t\t\t*set karcher_health -20\n\t\t\t\t\t\t\t*goto fight_in_arrest_1\n\t\t\t\t\t#I have to find a weapon!\n\t\t\t\t\t\t*label fight_in_arrest_dizzy.1.4\n\t\t\t\t\t\tAt the first sight the only thing that may be used as a weapon is... a feather covered with ink.\n\t\t\t\t\t\tWith some imagination it's better then nothing.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Feather is good to write poems and I need something to fight!\n\t\t\t\t\t\t\t\t*label fight_in_arrest_dizzy.1.4.1\n\t\t\t\t\t\t\t\tPerhaps you're right. Anyway you've not much time to search the whole room. There are\n\t\t\t\t\t\t\t\ttwo drawers in your reach. Upper and lower. You'll have time to open only one of them\n\t\t\t\t\t\t\t\tand eventually grab something from there. The question is which one?\n\t\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t\t#Open the upper one.\n\t\t\t\t\t\t\t\t\t#Let's try lower one.\n\t\t\t\t\t\t\t\tYou open the drawer and feel relief. A big knife lies there for you to take. But... with\n\t\t\t\t\t\t\t\tthe corner of your eye you see a sword under the desk.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Why to take knife if I can have a sword!\n\t\t\t\t\t\t\t\t\t\tYou duck to grab a sword but it's a bit too late. The interrogator kicks you as you\n\t\t\t\t\t\t\t\t\t\ttry to reach the hidden weapon. The blow throws you back and you accidently close the\n\t\t\t\t\t\t\t\t\t\tdrawer.\n\t\t\t\t\t\t\t\t\t\t*set karcher_state \"normal\"\n\t\t\t\t\t\t\t\t\t\t*set health -10\n\t\t\t\t\t\t\t\t\t\t*goto fight_in_arrest_1\n\t\t\t\t\t\t\t\t\t#There is no time! I take the knife and cut his throat.\n\t\t\t\t\t\t\t\t\t\t*set weapon \"knife\"\n\t\t\t\t\t\t\t\t\t\tYou grab the knife and cut his throat with cold blood. Do you mind if I ask if you've\n\t\t\t\t\t\t\t\t\t\tdone this before? I mean are you familiar with knives?\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t*if player_skillpoints>=1\n\t\t\t\t\t\t\t\t\t\t\t\t#Yes, knife is one of my best friends.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set skill_weapon \"knife\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set player_skillcount +1\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set player_skillpoints-1\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set karcher_state \"dead\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto fight_in_arrest_1\n\t\t\t\t\t\t\t\t\t\t\t#No, I mean I've never used one to fight.\n\t\t\t\t\t\t\t\t\t\t\t\t*set karcher_state \"dead\"\n\t\t\t\t\t\t\t\t\t\t\t\t*goto fight_in_arrest_1\n\t\t\t\t\t\t\t#It will do.\n\t\t\t\t\t\t\t\t*label fight_in_arrest_dizzy.1.4.2\n\t\t\t\t\t\t\t\t*set weapon \"feather\"\n\t\t\t\t\t\t\t\tMaybe it will but have you ever fought with a feather? You must admit that it's rather extraordinary\n\t\t\t\t\t\t\t\tfor a ${player_race} to fight with a feather.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#I'm extraordinary...\n\t\t\t\t\t\t\t\t\t\t*set skill_weapon \"feather\"\n\t\t\t\t\t\t\t\t\t\t*set player_skillcount +1\n\t\t\t\t\t\t\t\t\t\tWith the well precision you hit your adversary when he just began to be able again\n\t\t\t\t\t\t\t\t\t\tto focus his eyesight at you. You know that the brain is just behind the eyeball, so\n\t\t\t\t\t\t\t\t\t\tyou do what you have to do, that is stick your weapon in his eye...\n\t\t\t\t\t\t\t\t\t\t*set player_skillpoints +2\n\t\t\t\t\t\t\t\t\t\t*set karcher_state \"dead\"\n\t\t\t\t\t\t\t\t\t\t*goto fight_in_arrest_1\n\t\t\t\t\t\t\t\t\t#I've never tried to fight with such a thing but I'll give a try.\n\t\t\t\t\t\t\t\t\t\t*if luck>=30\n\t\t\t\t\t\t\t\t\t\t\tYou were lucky. You hit your adversary when he just began to be able again\n\t\t\t\t\t\t\t\t\t\t\tto focus his eyesight at you. All that you needed is to put the sharp end\n\t\t\t\t\t\t\t\t\t\t\tof the feather in the one of the most fragile parts of human face.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tFeather fighting skill aquired!\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t*set player_skillpoints +2\n\t\t\t\t\t\t\t\t\t\t\t*set skill_weapon \"feather\"\n\t\t\t\t\t\t\t\t\t\t\t*set player_skillcount +1\n\t\t\t\t\t\t\t\t\t\t\t*set karcher_state \"dead\"\n\t\t\t\t\t\t\t\t\t\t\t*goto fight_in_arrest_1\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\tYou try to hit his face with your weapon but you do little damage. A couple of \n\t\t\t\t\t\t\t\t\t\t\tstings only help him revive. He punches you in reply. You decide that you'll do\n\t\t\t\t\t\t\t\t\t\t\tbetter if you throw that feather away.\n\t\t\t\t\t\t\t\t\t\t\t*set weapon \"bare fists\"\n\t\t\t\t\t\t\t\t\t\t\t*set karcher_state \"normal\"\n\t\t\t\t\t\t\t\t\t\t\t*set karcher_health -20\n\t\t\t\t\t\t\t\t\t\t\t*goto fight_in_arrest_1\n\t\t\t#Free your hands.\n\t\t\t\t*label fight_in_arrest_dizzy.3\n\t\t\t\t*if candle=true\n\t\t\t\t\tThe light of candle draws your attention. Somehow it didn't perish.\n\t\t\t\t\tAs fast as you can you try to burn through the rope without burning your wrists.\n\t\t\t\t\t*if dexterity>=50\n\t\t\t\t\t\tAfter a while you're free without injury.\n\t\t\t\t\t\t*goto fight_in_arrest_dizzy.3_1\n\t\t\t\t\t*else\n\t\t\t\t\t\tPityfully you're too clumsy to do it without a harm.\n\t\t\t\t\t\t*if endurance = 0\n\t\t\t\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t\t\t\t*set next_act \"set_endurance\"\n\t\t\t\t\t\t\t*set back_scene \"fights\"\n\t\t\t\t\t\t\t*set back_act \"fight_in_arrest_dizzy.3_aj\"\n\t\t\t\t\t\t\t*goto_scene settings\n\t\t\t\t\t\t*label fight_in_arrest_dizzy.3_aj\n\t\t\t\t\t\t*comment JUMP OK\n\t\t\t\t\t\t*if endurance \u003c=75\n\t\t\t\t\t\t\tBurned skin pains seriously but you won't die of it.\n\t\t\t\t\t\t\t*set health %-10\n\t\t\t\t\t\t*if endurance >75\n\t\t\t\t\t\t\tYou're aware of that you've burned yourself but you easily endure the pain.\n\t\t\t\t\t\t*goto fight_in_arrest_dizzy.3_1\n\t\t\t\t\t*label fight_in_arrest_dizzy.3_1\n\t\t\t\t\tYour hands are finally free but while you were burning the rope your enemy regained himself.\n\t\t\t\t\t*set karcher_state \"normal\"\n\t\t\t\t\t*set tied false\n\t\t\t\t\t*goto fight_in_arrest_1\n\t\t\t\t*else\n\t\t\t\t\t*if strength>90\n\t\t\t\t\t\tYou tighten your muscles for a while and rip the rope apart with your tremendous strength.\n\t\t\t\t\t\t*goto fight_in_arrest_dizzy.3_2\n\t\t\t\t\tYou quickly look around to see something that might be useful but all that might be useful is a\n\t\t\t\t\textinguished candle. Maybe if you weren't jumping over the desk you could have used it. \n\t\t\t\t\t\n\t\t\t\t\t*label fight_in_arrest_dizzy.3_2\n\t\t\t\t\tIn meantime your opponent shook off the dizziness.\n\t\t\t\t\t*set tied false\n\t\t\t\t\t*set karcher_state \"normal\"\n\t\t\t\t\t*goto fight_in_arrest_1\n\t*if (karcher_state != \"dizzy\") and (karcher_health \u003c100)\n\t\t*label karcher_unarmed_fight\n\t\tYou've hit him but he's still alive... and he's angry, and fights back.\n\t\t\n\t\tHis fist hits your face a while later...\n\t\t\n\t\t*if endurance = 0\n\t\t\t*comment JUMP TO SETTINGS\n\t\t\t*set next_act \"set_endurance\"\n\t\t\t*set back_scene \"fights\"\n\t\t\t*set back_act \"fight_in_arrest_1_aj\"\n\t\t\t*goto_scene settings\n\t\t*label fight_in_arrest_1_aj\n\t\t*comment JUMP OK\n\t\t\n\t\tThen comes another hit in your stomach. \n\t\t*if endurance \u003c= 75\n\t\t\tThat hurts!\n\t\t\t*set health -20\n\t\t\n\t\t*if tied = true\n\t\t\tYou try to avoid the third hit but it's hard without arms. You take a step backward, lose your balance and fall. \n\t\t\t*if dexterity >= 75\n\t\t\t\tYou may be very nimble but it doesn't help.\n\t\t\t\n\t\t\tYour head hit the floor and you lose your consciousness...\n\t\t\t*set health 70\n\t\t\t*set back_act \"cell_act_IV\"\n\t\t\t*page_break Act V: In The Cell\n\t\t\t*goto_scene cell\n\t\t*else\n\t\t\t*if dexterity >= 55\n\t\t\t\tYour enemy tries to kick you in the leg but you jump backward and avoid the hit.\n\t\t\t\t\n\t\t\t\tIt's your turn to react.\n\t\t\t\t*choice\n\t\t\t\t\t#I desperately fight him back.\n\t\t\t\t\t\t*if (strength+(endurance+(dexterity+sanity)))\u003c=230\n\t\t\t\t\t\t\t*page_break Epilogue\n\t\t\t\t\t\t\t*set ending_scene \"beaten\"\n\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*if endurance \u003c= 75\n\t\t\t\t\t\t\t\t*set health %-15\n\t\t\t\t\t\t\tHe fights good but you're much better. He may hit you but you always reply harder.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tAfter one of his attacks he suddenly dives under the desk. You look there and see a sword\n\t\t\t\t\t\t\twhich you've not seen till now. You musn't let him grab it, so you kick his arm hard and smash\n\t\t\t\t\t\t\this face with your knee. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThat's enough for him. Either dead or unconscious he falls on the floor.\n\t\t\t\t\t\t\t*set karcher_state \"dead\"\n\t\t\t\t\t\t\t*goto fight_in_arrest_karcher_out\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t#I grab a feather and stick it in his eye!\n\t\t\t\t\t\t*if (luck+(reflex+dexterity))\u003c150\n\t\t\t\t\t\t\tYou try to kill your opponent with one killing blow. As fast as you can you jump forward trying to grab a\n\t\t\t\t\t\t\tfeather which sharp edge is still covered with ink you already rise your armed hand and... you feel sharp steel\n\t\t\t\t\t\t\tpiercing through your body... in the same moment when with all your strength you put your weapon in his eye.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThere was a sword hidden behind the desk, and you silly thought he's unarmed...\n\t\t\t\t\t\t\t*page_break Epilogue\n\t\t\t\t\t\t\t*set ending_scene \"sword_vs_feather\"\n\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t*else \n\t\t\t\t\t\t\tYou try to kill your opponent with one killing blow. As fast as you can you jump forward trying to grab a\n\t\t\t\t\t\t\tfeather which sharp edge is still covered with ink. With the corner of your eye you see how he ducks under the\n\t\t\t\t\t\t\tdesk. He must have some weapon there!\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tLeaning right you barely dodge the sword thrust which almost pierced through your chest and with all your strength\n\t\t\t\t\t\t\tthrust your weapon in opponents eye. His death is almost instant. Sword falls out his dead hand and whole his body\n\t\t\t\t\t\t\tfalls on the floor.\n\t\t\t\t\t\t\t*set karcher_state \"dead\"\n\t\t\t\t\t\t\t*goto fight_in_arrest_karcher_out\n\t\t\t*else\n\t\t\t\tThe third hit is a powerful kick in your right leg which makes you lose your balance and fall.\n\t\t\t\tYou try to catch the desk but your fingers doesn't serve you well after a long lack of blood...\n\t\t\t\t\n\t\t\t\tYour head hit the floor hard and you lose your consciousness...\n\t\t\t\t*set health 70\n\t\t\t\t*set back_act \"cell_act_IV\"\n\t\t\t\t*page_break Act V: In The Cell\n\t\t\t\t*goto_scene cell\n\t\t\t\t\n\t*if karcher_health = 100\n\t\tYour enemy reaches under the desk and draws a long sword out of there and charges at you with fury!\n\t\t*choice\n\t\t\t*if (will>30) and (tied=true)\n\t\t\t\t#I don't care that he has a sword and I'm tied. I charge at him even harder!\n\t\t\t\t\t*set sanity %+30\n\t\t\t\t\tI hope that you didn't really expect it to be good solution...\n\t\t\t\t\t*page_break Epilogue\n\t\t\t\t\t*set ending_scene \"heroic_but_stupid\"\n\t\t\t\t\t*goto_scene ending\n\t\t\t*if (will>30) and (tied=false)\n\t\t\t\t#I don't care if he has a sword. I can handle him even unarmed.\n\t\t\t\t\tYou know that you can win this fight but you have to knock this sword out of his hand...\n\t\t\t\t\t\n\t\t\t\t\tYou get him, before he runs around the desk and fall on him like an avalanche pinning him in the armchair.\n\t\t\t\t\tHe's not an idiot and knows that sword is a great weapon, but not when you have to wrestle, so he drops his\n\t\t\t\t\tweapon to defend himself.\n\t\t\t\t\t\n\t\t\t\t\t*goto karcher_unarmed_fight\n\t\t\t\t\n\t\t\t#This guy is crazy! I go to the door and call for help!\n\t\t\t\tAlmost as soon as you begin screaming for help two things happen simultaneously, firstly guy with the sword\n\t\t\t\tregains control of his behavior and lowers the sword two steps of you, secondly the big guard opens the door wide.\n\t\t\t\t\n\t\t\t\tHe looks at you for a while, then he turns to his mate who still has a sword in his hand and\n\t\t\t\twhose face is red as a tomato. \n\t\t\t\t*set back_act \"arrest_act_VI_2\"\n\t\t\t\t*set back_scene \"arrest\"\n\t\t\t\t*goto_scene arrest\n\t\t\t\n*if round = 0\n\t*choice\n\t\t#I have to set my hands free.\n\t\t\t*label fight_in_arrest_0.1\n\t\t\tProbably that's right. And how do you plan to achieve it?\n\t\t\t*choice\n\t\t\t\t#There must be some sharp edge nearby! I'll have to find it and cut the rope.\n\t\t\t\t\t*label fight_in_arrest_0.1.1\n\t\t\t\t\t*if (luck+rand) > 50\n\t\t\t\t\t\tYou quickly take a look around and luckily find something that may work. One of the nails\n\t\t\t\t\t\tis sticking out the door almost on the right height. Still you'll need some dexterity and strength\n\t\t\t\t\t\tto use it well.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if strength = 0\n\t\t\t\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t\t\t\t*set next_act \"set_strength\"\n\t\t\t\t\t\t\t*set back_scene \"fights\"\n\t\t\t\t\t\t\t*set back_act \"fight_in_arrest_0.1.1_aj\"\n\t\t\t\t\t\t\t*goto_scene settings\n\t\t\t\t\t\t*label fight_in_arrest_0.1.1_aj\n\t\t\t\t\t\t*comment JUMP OK\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if dexterity = 0 \n\t\t\t\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t\t\t\t*set next_act \"set_dexterity\"\n\t\t\t\t\t\t\t*set back_scene \"fights\"\n\t\t\t\t\t\t\t*set back_act \"fight_in_arrest_0.1.1_aj2\"\n\t\t\t\t\t\t\t*goto_scene settings\n\t\t\t\t\t\t*label fight_in_arrest_0.1.1_aj2\n\t\t\t\t\t\t*comment JUMP OK\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if (dexterity-encumbrance) >= 40\n\t\t\t\t\t\t\t*if strength > 40\n\t\t\t\t\t\t\t\t*if (dexterity+strength) >= 150\n\t\t\t\t\t\t\t\t\t*set karcher_morale -15\n\t\t\t\t\t\t\t\t\t*set tied false\n\t\t\t\t\t\t\t\t\tYou set your hands so easily and fast that surprise on the face of your opponent changes to complete astonishment.\n\t\t\t\t\t\t\t\t\t*set round +1\n\t\t\t\t\t\t\t\t\t*goto fight_in_arrest_1\n\t\t\t\t\t\t\t\tWith your agility and strength it's not a big deal to cut through the rope. Your opponent is rather distracted.\n\t\t\t\t\t\t\t\tI think I musn't add that it's because he just lost his biggest adventage.\n\t\t\t\t\t\t\t\t*set karcher_morale -5\n\t\t\t\t\t\t\t\t*set tied false\n\t\t\t\t\t\t\t\t*set round +1\n\t\t\t\t\t\t\t\t*goto fight_in_arrest_1\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*if luck>70\n\t\t\t\t\t\t\t\t\tYou'd never cut this rope with your not-so-amazing muscle power but the nail's really sharp fair enough to\n\t\t\t\t\t\t\t\t\tdo the trick. With a few moves you are free and your opponent is rather distracted.\n\t\t\t\t\t\t\t\t\tI think I musn't add that it's because he just lost his biggest adventage.\n\t\t\t\t\t\t\t\t\t*set karcher_morale -5\n\t\t\t\t\t\t\t\t\t*set tied false\n\t\t\t\t\t\t\t\t\t*set round +1\n\t\t\t\t\t\t\t\t\t*goto fight_in_arrest_1\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tYou may be dexterous enough to reach the nail and you can even try to cut your bond with the nail but it\n\t\t\t\t\t\t\t\t\tneeds some serious strength to do it in a matter of seconds. After a while it's more than obvious that you\n\t\t\t\t\t\t\t\t\tcan't just spend the whole day trying it so you give up.\n\t\t\t\t\t\t\t\t\t*set round +1\n\t\t\t\t\t\t\t\t\t*goto fight_in_arrest_1\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tUnfortunately you're to clumsy to make a good use of this nail. You give it a try but you don't control your arms good\n\t\t\t\t\t\t\tenough to make appropriate movements without looking. During this desperate try your opponent gets up and rushes at you.\n\t\t\t\t\t\t\t*set round +1\n\t\t\t\t\t\t\t*goto fight_in_arrest_1\n\t\t\t\t\t*else\n\t\t\t\t\t\tNope, there's nothing. You've only wasted the momentum.\n\t\t\t\t\t\t*set round +1\n\t\t\t\t\t\t*goto fight_in_arrest_1\n\t\t\t\t#This binding is weak I can just rip it.\n\t\t\t\t\t*label fight_in_arrest_0.1.2\n\t\t\t\t\tNo it's surely not weak. The guy in front of you probably wouldn't since year if guards couldn't bond the common, excuse le mot, criminals...\n\t\t\t\t\t*if strength = 0\n\t\t\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t\t\t*set next_act \"set_strength\"\n\t\t\t\t\t\t*set back_scene \"fights\"\n\t\t\t\t\t\t*set back_act \"fight_in_arrest_0.1.2_aj\"\n\t\t\t\t\t\t*goto_scene settings\n\t\t\t\t\t*label fight_in_arrest_0.1.2_aj\n\t\t\t\t\t*comment JUMP OK\n\t\t\t\t\t\n\t\t\t\t\t*if (strength+rand)>90\n\t\t\t\t\t\tBut surely you're not a common criminal, in fact you don't have to be a criminal at all... Anyway you're strong enough to\n\t\t\t\t\t\trip this puny rope that you agreed to carry till now. The side effect of what you've done is that the guy in front of you\n\t\t\t\t\t\tdidn't expect you to be THAT strong. He may even realise that you're not bond anymore nor weaker than him.\n\t\t\t\t\t\t*set tied false\n\t\t\t\t\t\t*set karcher_morale -20\n\t\t\t\t\t\t*set round +1\n\t\t\t\t\t\t*goto fight_in_arrest_1\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou try with all your strength but it's not enough. You're to weak to set yourself free in that way.\n\t\t\t\t\t\t*set round +1\n\t\t\t\t\t\t*goto fight_in_arrest_1\n\t\t\t\t#It's not the first time I'm bond and I know a couple of tricks.\n\t\t\t\t\t*label fight_in_arrest_0.1.3\n\t\t\t\t\tI assume that you mean tricks like those of illusionists, which make use of great reflex and coordination of moves.\n\t\t\t\t\t\n\t\t\t\t\t*if reflex = 0\n\t\t\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t\t\t*set next_act \"set_reflex\"\n\t\t\t\t\t\t*set back_scene \"fights\"\n\t\t\t\t\t\t*set back_act \"fight_in_arrest_0.1.3_aj\"\n\t\t\t\t\t\t*goto_scene settings\n\t\t\t\t\t*label fight_in_arrest_0.1.3_aj\n\t\t\t\t\t*comment JUMP OK\n\t\t\t\t\t\n\t\t\t\t\t*if dexterity = 0\n\t\t\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t\t\t*set next_act \"set_dexterity\"\n\t\t\t\t\t\t*set back_scene \"fights\"\n\t\t\t\t\t\t*set back_act \"fight_in_arrest_0.1.3_aj2\"\n\t\t\t\t\t\t*goto_scene settings\n\t\t\t\t\t*label fight_in_arrest_0.1.3_aj2\n\t\t\t\t\t*comment JUMP OK\n\t\t\t\t\t\n\t\t\t\t\t*if (reflex+dexterity)>=150\n\t\t\t\t\t\tNeither I nor your opponent know how did you do that but the fact is that the rope that tied your hands till now\n\t\t\t\t\t\tjust fell on the floor. Your hands are free and your adversary frightened. \n\t\t\t\t\t\t*set tied false\n\t\t\t\t\t\t*set karcher_morale -20\n\t\t\t\t\t\t*set round +1\n\t\t\t\t\t\t*goto fight_in_arrest_1\n\t\t\t\t\t*else\n\t\t\t\t\t\tTo do a trick you must have first learn it and be able to make it. And you're not able. Even if you've tried it before\n\t\t\t\t\t\tit doesn't work now. Maybe you shouldn't have underestimate the bondage skills of the guards.\n\t\t\t\t\t\t*set round +1\n\t\t\t\t\t\t*goto fight_in_arrest_1\n\t\t\t\t\t\n\t\t#I make a sudden attack.\n\t\t\t*label fight_in_arrest_0.2\n\t\t\tBut your arms are still tied at your back, remember?\n\t\t\t*choice\n\t\t\t\t#I don't need my arms. I'll headbutt him.\n\t\t\t\t\t*label fight_in_arrest_0.2.1\n\t\t\t\t\tThat's a reckless tactics. You'll have to be strong and enduring to succeed. Also you'll have to reach him through the desk.\n\t\t\t\t\t\n\t\t\t\t\t*if strength = 0\n\t\t\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t\t\t*set next_act \"set_strength\"\n\t\t\t\t\t\t*set back_scene \"fights\"\n\t\t\t\t\t\t*set back_act \"fight_in_arrest_0.2.1_aj\"\n\t\t\t\t\t\t*goto_scene settings\n\t\t\t\t\t*label fight_in_arrest_0.2.1_aj\n\t\t\t\t\t*comment JUMP OK\n\t\t\t\t\t\n\t\t\t\t\t*if endurance = 0\n\t\t\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t\t\t*set next_act \"set_endurance\"\n\t\t\t\t\t\t*set back_scene \"fights\"\n\t\t\t\t\t\t*set back_act \"fight_in_arrest_0.2.1_aj2\"\n\t\t\t\t\t\t*goto_scene settings\n\t\t\t\t\t*label fight_in_arrest_0.2.1_aj2\n\t\t\t\t\t*comment JUMP OK\n\t\t\t\t\t\n\t\t\t\t\tOkay. We know your general tactics, we know your abilities but now you have to somehow reach him. How do you plan to do that?\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I'll run round the desk.\n\t\t\t\t\t\t\tYou have to be quite quick to make it while he's still sitting in the chair.  \n\t\t\t\t\t\t\t*label fight_in_arrest_0.2.1.1\n\t\t\t\t\t\t\t*if reflex = 0\n\t\t\t\t\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t\t\t\t\t*set next_act \"set_reflex\"\n\t\t\t\t\t\t\t\t*set back_scene \"fights\"\n\t\t\t\t\t\t\t\t*set back_act \"fight_in_arrest_0.2.1.1_aj\"\n\t\t\t\t\t\t\t\t*goto_scene settings\n\t\t\t\t\t\t\t*label fight_in_arrest_0.2.1.1_aj\n\t\t\t\t\t\t\t*comment JUMP OK\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*if reflex>=70\n\t\t\t\t\t\t\t\tWith the speed of light you run round the desk. You make a great use of what should be an obstacle, I mean\n\t\t\t\t\t\t\t\tyour hands at your back, using them you push yourself from the wall, you lean forward aiming the enemy and\n\t\t\t\t\t\t\t\tyou hit.\n\t\t\t\t\t\t\t\t*label headbutt_hit\n\t\t\t\t\t\t\t\t*if strength>=70\n\t\t\t\t\t\t\t\t\tYou bang him hard with your forhead. You're strong so you can thrust your head with the n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tMaybe if you're faster you'd be able to do that but with your speed you can only wait till he closes.\n\t\t\t\t\t\t\t\t*goto fight_in_arrest_0.2.1.3\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t#I'll jump over the desk.\n\t\t\t\t\t\t\t*label fight_in_arrest_0.2.1.2\n\t\t\t\t\t\t\tThat will require some dexterity if you want to jump over an obstacle of that size and hit the target. \n\t\t\t\t\t\t\t*if dexterity = 0\n\t\t\t\t\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t\t\t\t\t*set next_act \"set_dexterity\"\n\t\t\t\t\t\t\t\t*set back_scene \"fights\"\n\t\t\t\t\t\t\t\t*set back_act \"fight_in_arrest_0.2.1.2_aj\"\n\t\t\t\t\t\t\t\t*goto_scene settings\n\t\t\t\t\t\t\t*label fight_in_arrest_0.2.1.2_aj\n\t\t\t\t\t\t\t*comment JUMP OK\n\t\t\t\t\t\t\t*if (dexterity-encumbrance)>=75\n\t\t\t\t\t\t\t\t*set candle false\n\t\t\t\t\t\t\t\tBeing that swift you don't even need your hands to balance. Few steps of running start are enough to \n\t\t\t\t\t\t\t\treach desired speed then you just lean forward taking the last aim and jump. Your fly lasts less than\n\t\t\t\t\t\t\t\tsecond yet you feels like forever.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou see the panic on the face of your enemy but he can't do anything to change his fate now. You close\n\t\t\t\t\t\t\t\tyour eyes and then comes the impact.\n\t\t\t\t\t\t\t\t*goto headbutt_hit\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tJump over the desk? With the head first? It's crazy we both know that. You're not very dexterous and that\n\t\t\t\t\t\t\t\tmaneuver would require a bunch of really precise movements. Instead of risking you decide to wait till \n\t\t\t\t\t\t\t\the gets from behind this desk.\n\t\t\t\t\t\t\t\t*goto fight_in_arrest_0.2.1.3\n\t\t\t\t\t\t#I'll wait till he closes.\n\t\t\t\t\t\t\t*label fight_in_arrest_0.2.1.3\n\t\t\t\t\t\t\tWaiting makes you lose the advantage of surprise. What a pity.\n\t\t\t\t\t\t\t*set round +1\n\t\t\t\t\t\t\t*goto fight_in_arrest_1\n\t\t\t\t#But I still have my legs free, so I can j ant it can be your skill if you like it.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Yes.\n\t\t\t\t\t\t\t\t*label fight_in_arrest_0.2.3.1\n\t\t\t\t\t\t\t\t*set skill_mental_knock true\n\t\t\t\t\t\t\t\t*set player_skillpoints -4\n\t\t\t\t\t\t\t\t*goto fight_in_arrest_0.2.3_aj\n\t\t\t\t\t\t\t#No.\n\t\t\t\t\t\t\t\t*label fight_in_arrest_0.2.3.2\n\t\t\t\t\t\t\t\t*goto fight_in_arrest_0.2.3_1\n\t\t\t\t\t*label fight_in_arrest_0.2.3_1\n\t\t\t\t\tSo you must have some powerful magical abilities.\n\t\t\t\t\t*if magic = 0\n\t\t\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t\t\t*set next_act \"set_magic\"\n\t\t\t\t\t\t*set back_scene \"fights\"\n\t\t\t\t\t\t*set back_act \"fight_in_arrest_0.2.3_aj\"\n\t\t\t\t\t\t*goto_scene settings\n\t\t\t\t\t*label fight_in_arrest_0.2.3_aj\n\t\t\t\t\t*comment JUMP OK\n\t\t\t\t\t\n\t\t\t\t\t*if (magic>=85) or (skill_mental_knock = true)\n\t\t\t\t\t\tIn one moment the interrogator looks at you with his eyes round of astonishment in second, his head bangs hard on the desks\n\t\t\t\t\t\tsurface.\n\t\t\t\t\t\t*set karcher_state \"faint\"\n\t\t\t\t\t\t*set round +1\n\t\t\t\t\t\t*goto fight_in_arrest_karcher_out\n\t\t\t\t\t*else\n\t\t\t\t\t\tUnfortunately you have not enough power to bestow such a powerful spell like that. I wish it was otherwise and you probably\n\t\t\t\t\t\twish the same. Meanwhile time of attack passed. What a shame.\n\t\t\t\t\t\t*set round +1\n\t\t\t\t\t\t*if karcher_state = \"dizzy\"\n\t\t\t\t\t\t\tYour enemy isn't dizzy anymore. \n\t\t\t\t\t\t\t*set karcher_state \"normal\"\n\t\t\t\t\t\t*goto fight_in_arrest_1\n*bug", "inner": "*comment Copyright 2010 by Myth Thrazz (http://mythgames.pl)\n\n*comment **************\n*comment TEMP VARIABLES\n\n*comment **************\n\n*gotoref back_act\n*comment We want to be able to get back to this scene, that's why this reference\n\n*label cell_act_I\n*comment QUICKTEST ONLY\n*if false\n\t*goto inner_act_II\n*if false\n\t*goto inner_act_III\n*if false\n\t*goto inner_act_I\n*bug QUICKTEST REDIRECT TEST END\n\n*label inner_act_I\n*comment Scene 5: Inner, Act I\n*comment Player goes down the staircase and reaches the door of the dungeon\n\n*if bigguy_location = \"dungeon\"\n\t*if alarm>0\n\t\t*set alarm 0\n\tAs you are reaching the bottom of the staircase you have to decide how do you want to solve\n\tthe case with the big guard and the missing keys.\n\t*choice\n\t\t#Give him back the keys.\n\t\t\t*if weapon = \"knife\"\n\t\t\t\tAnd what with that knife?\n\t\t\t\t*choice\n\t\t\t\t\t#Try to hide it under your clothes and hope they don't search me again..\n\t\t\t\t\t\t*goto inner_act_I.1_1\n\t\t\t\t\t#Damn! I have to put it back first, then come here again.\n\t\t\t\t\t\t*set weapon \"bare fists\"\n\t\t\t\t\t\t*goto inner_act_I.1_1\n\t\t\t*label inner_act_I.1_1\t\t\n\t\t\tKeeping the keys in one hand and the torch in the other one you reach the bottom of the stairs.\n\t\t\tThe big guard awaits you. When he sees his keys in your hand he becomes happy like a kid...\n\t\t\t*set bigguy_location \"living\"\n\t\t\t\n\t\t\t*page_break Act IV: To The Cell\n\t\t\t*set back_act \"give_back_keys\"\n\t\t\t*goto_scene arrest\n\t\t*if (weapon = \"knife\") and (bigguy_meter\u003c6)\n\t\t\t#Attack him with the knife.\n\t\t\t\tYou get down with a knife in your hand ready to strike. The big guard stays motionless looking\n\t\t\t\tat the door. That means you can strike him on his back and win this fight quick and easily. It's\n\t\t\t\tnot very gentlemanly but you cannot be sure of the result of the possible duel. Anyway you have \n\t\t\t\tto choose your approach.\n\t\t\t\t*fake_choice\n\t\t\t\t\t#I won't risk a duel. I try to sneak up and backstab him while there's an occasion.\n\t\t\t\t\t#Honor demands that I let him defend himself. I charge at him not concealing my presence.\n\t\t\t\tYou decide to approach him in a chosen way yet there's no sign of his reaction until you lift\n\t\t\t\tyour hand to strike. His elbow is fast as a lightning...\n\t\t\t\t*page_break \"Epilogue\"\n\t\t\t\t*set ending_scene \"underestimated_giant\"\n\t\t\t\t*goto_scene ending\n\t\t#Tell him that you didn't find the keys.\n\t\t\tAre you sure that you want to just stay with him here, locked from both sides? I don't think so,\n\t\t\tbecause someone will eventually show up in this corridor and it's hard to believe that they will\n\t\t\tbe as dumb as this big guard, so it'll be obvious that you've stolen them.\n\t\t\t\n\t\t\tThat means you have to give him back the keys.\n\t\t\t*set bigguy_location \"living\"\n\t\t\t*page_break Act IV: To The Cell\n\t\t\t*set back_act \"give_back_keys\"\n\t\t\t*goto_scene arrest\n\nYou reach the bottom of the staircase and there is another massive door on your way, lit by one torch on the right side of the wall.\n\n*if dungeon_door = \"locked\"\n\tThe door's locked.\n*if dungeon_door = \"unlocked\"\n\tThe door's unlocked.\n\t\n*choice\n\t*if (dungeon_door = \"locked\")\n\t\t#I want to unlock the door.\n\t\t\t*label inner_act_I.1\n\t\t\t*if (equip_prison_keys=true)\n\t\t\t\tYou unlock it using the keys from the big guy.\n\t\t\t\t*set dungeon_door \"unlocked\"\n\t\t\t*if (equip_lockpick=true) and (equip_prison_keys=false)\n\t\t\t\tYou unlock it with your lockpick.\n\t\t\t\t*set dungeon_door \"unlocked\"\n\t\t\t*if (equip_lockpick=false) and (equip_prison_keys=false)\n\t\t\t\tYou have nothing to unlock it with.\n\t\t\t*goto inner_act_I\n\t*if (dungeon_door = \"unlocked\")\n\t\t#Lock the door.\n\t\t\t*label inner_act_I.2\n\t\t\t*if (equip_prison_keys=true)\n\t\t\t\tYou lock it using the keys from the big guy.\n\t\t\t\t\n\t\t\t\t*set dungeon_door \"locked\"\n\t\t\t*if (equip_lockpick=true) and (equip_prison_keys=false)\n\t\t\t\tYou lock it with your lockpick.\n\t\t\t\t\n\t\t\t\t*set dungeon_door \"locked\"\n\t\t\t*if (equip_lockpick=false) and (equip_prison_keys=false)\n\t\t\t\tYou have nothing to lock it with.\n\t\t\t\t\n\t\t\t*goto inner_act_I\n\t#Go through the door.\n\t\t*if alarm>0\n\t\t\t*set alarm -1\n\t\t*label inner_act_I.3\n\t\t*set back_act \"dungeon_act_I\"\n\t\t*page_break Interlude: The Dungeon\n\t\t*goto_scene dungeon\n\t#Go upstairs.\n\t\tYou begin to slowly climb up the 74 steep, stone, wet stairs.\n\t\t*page_break Interlude: The Staircase Top\n\t\t*goto inner_act_II\n*page_break\n\n*label inner_act_II\n*comment Scene 1: Inner, Act II\n*comment Player goes up on the staircase and reaches the barred doorway\n\n*if (equip_prison_keys = true) and (examine_prison_keys = false)\n\tYou quickly take a look at the keys you've stolen. You count 6 keys in total.\n\t*set examine_prison_keys true\nYou're in the corridor, there are some torches lightning lit on the walls.\nThere are some unused torches in the steel basket near one of the walls. \n\nYou have two possibilities to get out of here. The dark, steep, curly staircase\nleading down, and the barred doorway with lock, blocking the way\nto the rest of the corridor, which turns left after a few steps.\n\n*choice\n\t*if torch=false\n\t\t#A torch may be useful. I pick one.\n\t\t\tYou take one of the torches from the basket.\n\t\t\t\n\t\t\t*label inner_act_II.1\n\t\t\t*set torch true\n\t\t\t*goto inner_act_II\n\t#I go down the staircase.\n\t\t*label inner_act_II.2\n\t\tYou're on the top of the dark staircase.\n\t\t*if (torch=false) and (skill_infravision = false)\n\t\t\tYou should take a torch if you don't want to have an accident.\n\t\t\t\n\t\t*if (torch=true) and (skill_infravision = false)\n\t\t\tIt's good that you have that torch.\n\t\t\t\n\t\t*if (torch=true) or (skill_infravision = true)\n\t\t\tIt's good that you don't have to be afraid of the darkness.\t\n\t\t\t\n\t\t*if bigguy_location = \"dungeon\"\n\t\t\n\t\t\tThere's a big guard there, you remember? Are you sure you want to go there?\n\t\t\t*choice\n\t\t\t\t#Yes, I'm sure.\n\t\t\t\t\t*page_break Interlude: The Staircase Bottom\n\t\t\t\t\t*goto inner_act_I\n\t\t\t\t#I would go somewhere else.\n\t\t\t\t\t*goto inner_act_II\n\t\t*page_break\n\t\t*goto inner_act_I\n\t\t\n\t*if (corridor_crate = \"locked\")\n\t\t#I want to unlock the barred door.\n\t\t\t*label inner_act_II.3\n\t\t\t*if (equip_prison_keys=true)\n\t\t\t\tYou unlock it using the keys from the big guy.\n\t\t\t\t\n\t\t\t\t*set corridor_crate \"unlocked\"\n\t\t\t*if (equip_lockpick=true) and (equip_prison_keys=false)\n\t\t\t\tYou unlock it with your lockpick.\n\t\t\t\t\n\t\t\t\t*set corridor_crate \"unlocked\"\n\t\t\t*if (equip_lockpick=false) and (equip_prison_keys=false)\n\t\t\t\tYou have nothing to unlock it with.\n\t\t\t\t\n\t\t\t*goto inner_act_II\n\t*if (corridor_crate = \"unlocked\")\n\t\t#Lock the barred door.\n\t\t\t*label inner_act_II.4\n\t\t\t*if (equip_prison_keys=true)\n\t\t\t\tYou lock it using the keys from the big guy.\n\t\t\t\t\n\t\t\t\t*set corridor_crate \"locked\"\n\t\t\t*if (equip_lockpick=true) and (equip_prison_keys=false)\n\t\t\t\tYou lock it with your lockpick.\n\t\t\t\t\n\t\t\t\t*set corridor_crate \"locked\"\n\t\t\t*if (equip_lockpick=false) and (equip_prison_keys=false)\n\t\t\t\tYou have nothing to lock it with.\n\t\t\t\t\n\t\t\t*goto inner_act_II\n\t*if (corridor_crate = \"unlocked\")\n\t\t#Go pass the bars.\n\t\t\t*label inner_act_II.5\n\t\t\tYou go pass the barred doorway.\n\t\t\t\n\t\t\t*page_break Interlude: The Inner Corridor\n\t\t\t*goto inner_act_III\n\n*label inner_act_III\n*comment Scene 1: Inner, Act III\n*comment Player enters the inner corridor\n\nYou're behind the turn of the corridor. You can see bars with door blocking your way.\n*if corridor_crate=\"locked\"\n\tIt's locked.\n\t\n*if corridor_crate=\"unlock\"\n\tIt's unlocked.\n\t\nThrough the bars you can see dark staircase leading down.\n\n*choice\n\t#Get back to the corridor.\n\t\t*if alarm>0\n\t\t\t*set alarm -1\n\t\t*label inner_act_III.1\n\t\t*set back_act \"corridor_act_I\"\n\t\t*page_break Interlude: The Main Corridor\n\t\t*goto_scene corridor\n\t*if (corridor_crate = \"locked\")\n\t\t#I want to unlock the barred door.\n\t\t\t*label inner_act_III.2\n\t\t\t*if (equip_prison_keys=true)\n\t\t\t\tYou unlock it using the keys from the big guy.\n\t\t\t\t\n\t\t\t\t*set corridor_crate \"unlocked\"\n\t\t\t*if (equip_lockpick=true) and (equip_prison_keys=false)\n\t\t\t\tYou unlock it with your lockpick.\n\t\t\t\t\n\t\t\t\t*set corridor_crate \"unlocked\"\n\t\t\t*if (equip_lockpick=false) and (equip_prison_keys=false)\n\t\t\t\tYou have nothing to unlock it with.\n\t\t\t\t\n\t\t\t*goto inner_act_III\n\t*if (corridor_crate = \"unlocked\")\n\t\t#Lock the barred door.\n\t\t\t*label inner_act_III.3\n\t\t\t*if (equip_prison_keys=true)\n\t\t\t\tYou lock it using the keys from the big guy.\n\t\t\t\t\n\t\t\t\t*set corridor_crate \"locked\"\n\t\t\t*if (equip_lockpick=true) and (equip_prison_keys=false)\n\t\t\t\tYou lock it with your lockpick.\n\t\t\t\t\n\t\t\t\t*set corridor_crate \"locked\"\n\t\t\t*if (equip_lockpick=false) and (equip_prison_keys=false)\n\t\t\t\tYou have nothing to lock it with.\n\t\t\t\t\n\t\t\t*goto inner_act_III\n\t*if (corridor_crate = \"unlocked\")\n\t\t#Go pass the bars.\n\t\t\t*label inner_act_III.4\n\t\t\tYou go pass the barred doorway.\n\t\t\t\n\t\t\t*page_break Interlude: The Staircase Top\n\t\t\t*goto inner_act_II\n\nIt's THE END(for now)\n*goto_scene ending end", "kitchen": "*comment **************\n*comment TEMP VARIABLES\n\n*comment **************\n\n*gotoref back_act\n*comment We want to be able to get back to this scene, that's why this reference\n\n*label cell_act_I\n*comment QUICKTEST ONLY\n*if false\n\t*goto kitchen_act_I\n*bug QUICKTEST REDIRECT TEST END\n\n*label kitchen_act_I\n*set know_kitchen true\n*comment Scene 4: Kitchen, Act I\n*comment Player enters the kitchen\n\nYou're in the big room. It can't be anything but kitchen. A large table, thousands of drawers, hooks,\nsacks, and barrels, full of food (beans mostly) and spices and the very large fireplace with a big chimney couldn't make any other room.\n\nThere's also a lot of herbs drying all over the place. And if you need a knife, there's plenty of them here.\n\nFinally, near the fireplace stays a big copper cauldron... with boiled beans. It seems the guard's diet isn't very complicated.\n\nLuckily there's no sign of cook anywhere.\n*if alarm = false\n\tSo nobody will know that you were here.\n*choice\n\t*if food_poisoned = false\n\t\t#Poison the food.\n\t\t\t*label kitchen_act_I.1\n\t\t\tHow do you want to poison the food?\n\t\t\t*choice\n\t\t\t\t*if wisdom>85\n\t\t\t\t\t#Deadly.\n\t\t\t\t\t\t*label kitchen_act_I.1.1\n\t\t\t\t\t\tYou walk across the kitchen remembering the \"Deadliest herbs\" album that you've read recently, searching for something\n\t\t\t\t\t\tthat just have to be somewhere around here. You're sure that even if guards didn't use it for their cooking, they\n\t\t\t\t\t\tprobably keep here all the food-like things they confiscate.\n\t\t\t\t\t\t\n\t\t\t\t\t\tAfter a couple of minutes you finally find what you've searched for... a mangragora's root! With the highest concern\n\t\t\t\t\t\tyou put just a little piece of it into the cauldron. It's done. Everyone who eats only a spoon of this... meal will die\n\t\t\t\t\t\twithout any doubt.\n\t\t\t\t\t\t*set sanity %+20\n\t\t\t\t\t\t*set food_poisoned \"deadly\"\n\t\t\t\t\t\tI hope you know what you're doing...\n\t\t\t\t\t\t*goto kitchen_act_I\n\t\t\t\t*if wisdom>65\n\t\t\t\t\t#Sleeping.\n\t\t\t\t\t\t*label kitchen_act_I.1.2\n\t\t\t\t\t\tYour wisdom about herbs let you choose only the ones which are used by shamans and doctors to make mixtures\n\t\t\t\t\t\thelping people suffering an insomnia to fall asleep... instantly. You put a nice, big portion of those to spice\n\t\t\t\t\t\tup a meal.\n\t\t\t\t\t\t*set food_poisoned \"sleeping\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou're almost sure that whoever eats it will fall asleep at least for 8 hours. \n\t\t\t\t\t\t*goto kitchen_act_I\n\t\t\t\t#Random.\n\t\t\t\t\t*label kitchen_act_I.1.3\n\t\t\t\t\tRandom poisoning means that you just throw a little-o-this and little-o-that to the cauldron\n\t\t\t\t\tand that you pray it has any effect. Are you sure you want to poison the food?\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Yes, I do it.\n\t\t\t\t\t\t\tYou do your best to poison the food, but you have no clue about the possible effects.\n\t\t\t\t\t\t\t*temp x\n\t\t\t\t\t\t\t*rand x 1 100\n\t\t\t\t\t\t\t*if (luck+x)>=30\n\t\t\t\t\t\t\t\t*set food_poisoned \"wc\"\n\t\t\t\t\t\t\t*if (luck+x)>=60\n\t\t\t\t\t\t\t\t*set food_poisoned \"sleeping\"\n\t\t\t\t\t\t\t*if (luck+x)>=90\n\t\t\t\t\t\t\t\t*set food_poisoned \"deadly\"\n\t\t\t\t\t\t\t*goto kitchen_act_I\n\t\t\t\t\t\t#No, I won't do it.\n\t\t\t\t\t\t\t*goto kitchen_act_I\n\t#Get out through the chimney.\n\t\t*label kitchen_act_I.2\n\t\t*if skill_climbing=true\n\t\t\tYou quickly close to the chimney to examine it.\n\t\t\t\n\t\t\tAs a professional climber you can say that it couldn't be any easier to get through it,\n\t\t\tit's large, and rather clean. The ashes didn't cool down completely but it's not a big deal.\n\t\t\t\n\t\t\tYou put your hands to the large sack of flour and you're all ready to escape...\n\t\t\t\n\t\t\t*page_break Epilogue\n\t\t\t*set ending_scene \"like_a_santa\"\n\t\t\t*goto_scene ending\n\t\t*else\n\t\t\tYou have no idea how to get through it. Maybe if you had a rope with a hook... or if you knew how\n\t\t\tto climb.\n\t\t\t*goto kitchen_act_I\n\t\t\n\t#Get back to the corridor.\n\t\t*label kitchen_act_I.3\n\t\tYou get out of the kitchen.\n\t\t*set back_act \"corridor_act_I\"\n\t\t*page_break Interlude: The Main Corridor\n\t\t*goto_scene corridor\n\t\t\n\t#Grab a knife.\n\t\t*label kitchen_act_I.4\n\t\tYou look over the amazing collection of the knives and pick the one who suits you the best.\n\t\t*set weapon \"knife\"\n\t\tBy the way, have you ever fought using a knife?\n\t\t*choice\n\t\t\t#No.\n\t\t\t\tI understand that you're planning to learn it sooner or later.\n\t\t\t\t*goto kitchen_act_I\n\t\t\t*if (player_skillpoints>1) and (skill_weapon = \"\")\n\t\t\t\t#Yes.\n\t\t\t\t\tWell, that means you're far more dangerous now then a minute before.\n\t\t\t\t\t*set player_skillpoints -2\n\t\t\t\t\t*set skill_weapon \"knife\"\n\t\t\t\t\t*set player_skillcount +1\n\t\t\t\t\t*goto kitchen_act_I\n\t\t*goto kitchen_act_I\nIt's THE END(for now)\n*goto_scene ending end", "screenshots": "screenshots!\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\nYou quietly approach the bars to hear better.\n\n\"Sleeping at work again, Cerberion? Watching a half-dead prisoner is tiring work, isn't it?\" asks the unknown person cheerfully.\n\n\"I'm...ehrm... that means...\" answered the rather confused old man. \"Relax Cerberion I was just kidding. I wouldn't wake you if I could open my 'playground' myself.\" It is a little strange how the unknown voice said 'playground'. Shivers came through your back as you realized that he must refer to the torture chamber. The voice must therefore belong to the Master of Tortures. You may be brave but when you realize that this 'monster' will torture you, you're scared. \"Of course Master. I'm going.\" The old guard replies hurriedly.\n\n\"You have to know that we have a new guest here. As far as I know you'll have to make him sing, sir.\" Regardless of words it was obvious that the old man wants this to sound like a good news. \"As far as I know, his cell must be by the way, so... show me the new birdy!\" The voice of the Master sounds like he just got a present.\n\nStanding right next to the bars makes you hear every step clearly, but soon both of them will see you. Maybe for some reason you don't want them to know that you've heard their chitchat? However you have very little time to do anything.\n*set player_race \"human\"\n*set player_sex \"female\"\n*set player_name \"Jessica\"\n*set strength 12\n*set endurance 59\n*set dexterity 98\n*set reflex 23\n*set intelligence 44\n*set look 57\n*set charisma 89\n*set will 67\n*set wisdom 9\n*set magic 10\n*set luck 99\n*set sanity 29\n*set health 90\n*fake_choice\n\t#I'll stay there. I want to see this Master.\n\t#I'll pretend that I was doing something.\n\t#They should think that I'm still unconscious.\n\n*script changeBackgroundColor(\"black\")\n\nYou examine the walls for some time.\n\nIt's hard to see anything in this darkness so it's a difficult task. Examining the wall inch by inch you've already found something. It seems that there are some strange lines carved in the stone.\n\nYou're a bit tired.\n\nYou're in your cell. The barred door is closed. What do you do?\n*set player_race \"dwarf\"\n*set player_sex \"male\"\n*set player_name \"Bronzeshaper\"\n*set skill_infravision true\n*set strength 23\n*set endurance 39\n*set dexterity 12\n*set reflex 47\n*set intelligence 99\n*set look 84\n*set charisma 67\n*set will 23\n*set wisdom 89\n*set magic 56\n*set luck 21\n*set sanity 1\n*set health 54\n*fake_choice\n\t#Check the hay.\n\t#Continue examining the walls.\n\t#Do nothing.\n\t#Sleep.\n\t#Do some exercises.\n\t#Try to open the gate.\n\n*script changeBackgroundColor(\"sepia\")\nBy now you must know that what you choose determines who you really are. That's very important cause you'll be posted some *facts* and you must be sure that you decide if they're true or false.\n\n\"First of all you are charged with a murder. Do you Sir Myth admit it?\"\n*set player_race \"elf\"\n*set player_sex \"female\"\n*set player_name \"Idanexab\"\n*set skill_infravision true\n*set strength 67\n*set endurance 41\n*set dexterity 42\n*set reflex 99\n*set intelligence 15\n*set look 39\n*set charisma 23\n*set will 87\n*set wisdom 21\n*set magic 39\n*set luck 56\n*set sanity 59\n*set health 80\n*fake_choice\n\t#No I didn't kill anyone.\n\t#A murder? What murder? I've killed some creatures in my life but they're mostly bandits or monsters.\n\t#Yes I'm a walking, talking, bloody killing machine.\n\nYou take a look inside a really small guard-post.\n\nThe Cerberion sleeps sitting on a wooden chair, with his helmet covering eyes, and snores loudly. His keys lie on a tiny shelf with some of his personal things.\n\nThe only thing here that may be useful is an old rusty sword in the corner.\n*set player_race \"human\"\n*set player_sex \"male\"\n*set player_name \"Markus\"\n*set strength 98\n*set endurance 23\n*set dexterity 12\n*set reflex 57\n*set intelligence 59\n*set look 91\n*set charisma 99\n*set will 67\n*set wisdom 99\n*set magic 0\n*set luck 9\n*set sanity 14\n*set health 70\n*fake_choice\n\t#Get back to the corridor.\n\t#Grab the sword.\n\t#Grab the keys.", "settings": "*gotoref next_act\n\n*label cell_act_I\n*comment QUICKTEST ONLY\n*if false\n\t*goto set_int\n*if false\n\t*goto set_will\n*if false\n\t*goto set_charisma\n*if false\n\t*goto set_magic\n*if false\n\t*goto set_wisdom\n*if false\n\t*goto set_called\n*if false\n\t*goto set_dexterity\n*if false\n\t*goto set_reflex\n*if false\n\t*goto set_strength\n*if false\n\t*goto set_look\n*if false\n\t*goto set_luck\n*comment *if false\n*comment \t*goto set_intelligence\n*if false\n\t*goto set_endurance\n*bug QUICKTEST REDIRECT TEST END\n\n*comment ********************************************************\n*label get_back_to_proper_scene\n\n*if back_scene = \"cell\"\n\t*goto_scene cell\n*if back_scene = \"arrest\"\n\t*goto_scene arrest\n*if back_scene = \"fights\"\n\t*goto_scene fights\n*comment ***************************\n\n\n*comment ********************************************************\n*label set_look\n\n*comment **************\n*comment TEMP VARIABLES\n*temp rand\n*rand rand 1 9\n*temp t_look\n*comment **************\n\nYou're pretty or ugly? Of course in the bounds of your own race. Let's say in scale 1 to 10. \nWhere 1 means 'nightmare'.\n\n*choice\n\t#1.\n\t\t*set t_look 1\n\t\t*goto set_look_1\n\t#2.\n\t\t*set t_look 2\n\t\t*goto set_look_1\n\t#3.\n\t\t*set t_look 3\n\t\t*goto set_look_1\n\t#4.\n\t\t*set t_look 4\n\t\t*goto set_look_1\n\t#5.\n\t\t*set t_look 5\n\t\t*goto set_look_1\n\t#6.\n\t\t*set t_look 6\n\t\t*goto set_look_1\n\t#7.\n\t\t*set t_look 7\n\t\t*goto set_look_1\n\t#8.\n\t\t*set t_look 8\n\t\t*goto set_look_1\n\t#9.\n\t\t*set t_look 9\n\t\t*goto set_look_1\n\t#10.\n\t\t*set t_look 10\n\t\t*goto set_look_1\n*label set_look_1\n*set player_skillpoints player_skillpoints-t_look\n*set look ((t_look-1)*10)+(rand)\n*goto set_look_end\n\t\n*comment*input_text t_look\n*comment\n*comment*if (t_look>\"11\") and (t_look\u003c\"Zzzzzz\")\n*comment\t*goto set_look_read\n*comment\t\n*comment*elseif (t_look >=1) and (t_look\u003c=10)\n*comment\tYou can't be wrong, can you? \n*comment\t*set player_skillpoints player_skillpoints-t_look\n*comment\t*set look ((t_look-1)*10)+(rand)\n*comment\t*goto set_look_end\n*comment\t\n*comment*elseif t_look = 11\n*comment\tOver the scale? Hope you know what you're doing\n*comment\t*if(player_sex = \"female\")\n*comment\t\tO Beauty Goddess!\n*comment\t\t*goto set_look_app_11\n*comment\t*else\n*comment\t\tO Handsome One!\n*comment\t*if(player_race = \"dwarf\")\n*comment\t\tYou are possibly the most good looking dwarf in history you know?\n*comment\t*label set_look_app_11\n*comment\t*set player_skillpoints player_skillpoints-20\n*comment\t*set look 99\n*comment\t*goto set_look_end\n*comment\t\n*comment*else\n*comment\t*label set_look_read\n*comment\tThis game needs you to READ. If you can't do it you're just wasting your time you know?\n*comment\t\n*comment\t*goto set_look\n\n*label set_look_end\n*page_break You can take a Look at yourself now\n*goto get_back_to_proper_scene\n*comment ***************************\n\n\n*comment ********************************************************\n*label set_luck\n\n*comment **************\n*comment TEMP VARIABLES\n*temp my_num\n*temp guess\n*rand my_num 1 10\n*comment **************\n\nWell...\nLet's make a quick'n'simple test and we'll find out whether you're lucky or not.\n\nI think of a number from 1 to 10. Try to guess what is it.\n\n*choice\n\t#1.\n\t\t*set guess 1\n\t\t*goto set_luck_1\n\t#2.\n\t\t*set guess 2\n\t\t*goto set_luck_1\n\t#3.\n\t\t*set guess 3\n\t\t*goto set_luck_1\n\t#4.\n\t\t*set guess 4\n\t\t*goto set_luck_1\n\t#5.\n\t\t*set guess 5\n\t\t*goto set_luck_1\n\t#6.\n\t\t*set guess 6\n\t\t*goto set_luck_1\n\t#7.\n\t\t*set guess 7\n\t\t*goto set_luck_1\n\t#8.\n\t\t*set guess 8\n\t\t*goto set_luck_1\n\t#9.\n\t\t*set guess 9\n\t\t*goto set_luck_1\n\t#10.\n\t\t*set guess 10\n\t\t*goto set_luck_1\n*label set_luck_1\n*if guess = my_num\n\tIt's ${my_num} indeed. Even if it's not your most lucky day you're still a lucky one!\n\t*rand luck 95 99\n\t*goto set_luck_end\n*if ((guess - my_num) = 1) or ((my_num - guess) = 1)\n\tYou've almost guessed it! It was ${my_num}.\n\t*rand luck 80 94\n\t*goto set_luck_end\n*if ((guess - my_num) = 2) or ((my_num - guess) = 2)\n\tSo far, so close. It was ${my_num}.\n\t*rand luck 55 79\n\t*goto set_luck_end\n*if ((guess - my_num) = 3) or ((my_num - guess) = 3)\n\tWell... it wasn't a direct hit but still not so bad. It was ${my_num}.\n\t*rand luck 20 54\n\t*goto set_luck_end\n*else\n\tOh dear you're definitely not born under a lucky star. It was ${my_num}.\n\t*rand luck 1 19\n\t*goto set_luck_end\n*label set_luck_read\nThis game needs you to READ. If you can't do it you're just wasting your time you know?\n*goto set_luck\n\n*label set_luck_end\n*page_break Your Luck helps you from now on!\n*goto get_back_to_proper_scene\n*comment ***************************\n\n*comment ********************************************************\n*label set_charisma\n\n*comment **************\n*comment TEMP VARIABLES\n\n*temp t_charisma\n\n*comment **************\n\nYou must be aware that except of \"what\" you say in this case it's important \"how\" you say it too. \n\nIn fact I strongly doubt if anyone cares what you have to say if all you do is whisper.\n*choice\n\t*if player_skillpoints >= 4\n\t\t#I don't worry about it. I just say what I have to say.\n\t\t\tSure that's normal I think.\n\t\t\t*rand t_charisma 33 63\n\t\t\t*set player_skillpoints -4\n\t\t\t*goto set_charisma_end\n\t*if player_skillpoints >= 7\n\t\t#It doesn't really matter if I whisper or shout... everyone hear it either way... get it?\n\t\t\tY..yes I get it of course.\n\t\t\t*rand t_charisma 63 93\n\t\t\t*set player_skillpoints -7\n\t\t\t*goto set_charisma_end\n\t*if (player_sex = \"female\") and (player_skillpoints >= 10)\n\t\t#...Madam.\n\t\t\tI'm so sorry Madam. I beg your pardon.\n\t\t\t*rand t_charisma 93 99\n\t\t\t*set player_skillpoints -10\n\t\t\t*goto set_charisma_end\n\t*if (player_sex = \"male\") and (player_skillpoints >= 10)\n\t\t#...Sir.\n\t\t\tI'm so sorry Sir. I beg your pardon.\n\t\t\t*rand t_charisma 93 99\n\t\t\t*set player_skillpoints -10\n\t\t\t*goto set_charisma_end\n\t#You think I've said something stupid? God I hope I won't fall into trouble.\n\t\tYou better watch your tongue if you don't want to have any troubles.\n\t\t*rand t_charisma 3 33\n\t\t*goto set_charisma_end\n\n*label set_charisma_end\n*set charisma t_charisma\n*if (player_race = \"dwarf\")\n\t*set charisma %+10\n*if (player_race = \"human\")\n\t*set charisma %+5\n*page_break You can now use your Charsima\n\n*goto get_back_to_proper_scene\n*comment ***************************\n\n*comment ********************************************************\n*label set_will\n\n*comment **************\n*comment TEMP VARIABLES\n\n*temp t_will\n\n*comment **************\n\nYou're quite brave, aren't you?\n\n*choice\n\t*if player_skillpoints >= 7\n\t\t#It's not about bravery. It's just a self-confidence.\n\t\t\tWell it's still brave to me anyway.\n\t\t\t*rand t_will 63 93\n\t\t\t*set player_skillpoints -7\n\t\t\t*goto set_will_end\n\t#I brave? Hell no! I'll run as soon as possible.\n\t\tWhat a great tactic.\n\t\t*rand t_will 3 33\n\t\t*goto set_will_end\n\t*if player_skillpoints >= 4\n\t\t#Quite. I would run away from a dragon but I'm not afraid now.\n\t\t\tOkie Dokie.\n\t\t\t*rand t_will 33 63\n\t\t\t*set player_skillpoints -4\n\t\t\t*goto set_will_end\n\t*if player_skillpoints >= 10\n\t\t#I fear no enemy!\n\t\t\tFor our strength is eternal!\n\t\t\t*rand t_will 93 99\n\t\t\t*set player_skillpoints -10\n\t\t\t*goto set_will_end\n\n*label set_will_end\n*if (player_race = \"dwarf\")\n\t*set t_will %+30\n*set will t_will\n*page_break Now you can show your Will\n\n*goto get_back_to_proper_scene\n*comment ***************************\n\n*comment ********************************************************\n*label set_wisdom\n\n*comment **************\n*comment TEMP VARIABLES\n\n*temp t_wisdom\n\n*comment **************\n\nYou're situation definitely isn't pretty. \n\nI think you really could really use a lawyer. Do you know what that is?\n\n*choice\n\t#No. Should I?\n\t\tWhat you know it's your business. Don't care about lawyers anyway.\n\t\t*rand t_wisdom 3 33\n\t\t*goto set_wisdom_end\n\t*if player_skillpoints >= 10\n\t\t#Of course I do. A lawyer is a person who knows the law in general or some specific part of it and who is often paid too much. Rather useful when you're a member of the mob or when you've been accused for something you didn't commit.\n\t\t\tIt just couldn't be described better. Unfortunately you have no lawyer.\n\t\t\t*rand t_wisdom 93 99\n\t\t\t*set player_skillpoints -10\n\t\t\t*goto set_wisdom_end\n\t*if player_skillpoints >= 4\n\t\t#I've heard something about lawyers. They must be some influential individuals.\n\t\t\tMhm sort of. But you know none of them.\n\t\t\t*rand t_wisdom 33 63\n\t\t\t*set player_skillpoints -4\n\t\t\t*goto set_wisdom_end\n\t*if player_skillpoints >= 7\n\t\t#Not 'what' only 'who'. I just know I could use one.\n\t\t\tThat's more than correct. You could but you can't.\n\t\t\t*rand t_wisdom 63 93\n\t\t\t*set player_skillpoints -7\n\t\t\t*goto set_wisdom_end\n\n*label set_wisdom_end\n*if (player_race = \"elf\")\n\t*set t_wisdom %+5\n*if (player_race = \"dwarf\")\n\t*set t_wisdom %+10\n*set wisdom t_wisdom\n*page_break Use your Wisdom wisely\n\n*goto get_back_to_proper_scene\n*comment ***************************\n\n*comment ********************************************************\n*label set_magic\n\n*comment **************\n*comment TEMP VARIABLES\n\n*temp t_magic\n\n*comment **************\n\nMagic comes in many ways. It may be weak but just enough to let you do the simple tricks\nbut it may be also powerful even beyond imagination. How would you describe your magic?\n\n*choice\n\t#It's weak. But still useful when I lose my flint and tinder.\n\t\tIt's good to make use even of a smallest gifts of nature.\n\t\t*rand t_magic 3 33\n\t\t*goto set_magic_end\n\t*if player_skillpoints >= 4\n\t\t#My magic? I think it's average. I wouldn't dare to duel a skilled wizard.\n\t\t\tIt's reasonable explanation.\n\t\t\t*rand t_magic 33 63\n\t\t\t*set player_skillpoints -4\n\t\t\t*goto set_magic_end\n\t*if player_skillpoints >= 7\n\t\t#I'm not elite but still I have some serious powers. Maybe would you like to see my fireball?\n\t\t\tNO! Ekhm... No, please, maybe next time or, you know, better show it to someone else I'm not fully fireproof.\n\t\t\t*rand t_magic 63 93\n\t\t\t*set player_skillpoints -7\n\t\t\t*goto set_magic_end\n\t*if player_skillpoints >= 10\n\t\t#I'm one of the most powerful magicans ever! And The Most Powerful Magican I know!\n\t\t\tAnd that's probably because all of the ones you've known are already dead, right? You don't have to answer.\n\t\t\t*rand t_magic 93 99\n\t\t\t*set player_skillpoints -10\n\t\t\t*goto set_magic_end\n\n*label set_magic_end\n*if (player_race = \"elf\")\n\t*set t_magic %+10\n*if (player_race = \"dwarf\")\n\t*set t_magic %-10\n*set magic t_magic\n*page_break You can now feel your Magic inside\n*goto get_back_to_proper_scene\n*comment ***************************\n\n*comment ********************************************************\n*label set_dexterity\n\n*comment **************\n*comment TEMP VARIABLES\n\n*temp t_dexterity\n\n*comment **************\n\nSo how it's with your Dexterity (also known as Agility)? You're rather clumsy \nlike an elephant in a china shop or deadly nimble like a monkey with a razor?\n\n*choice\n\t*if player_skillpoints >= 4\n\t\t#It's not my best side for sure.\n\t\t\tI hope it's not. \n\t\t\t*rand t_dexterity 33 63\n\t\t\t*set player_skillpoints -4\n\t\t\t*goto set_dexterity_end\n\t#Oh I'm very clumsy! I can't even remember a day without dropping anything on my foot.\n\t\tGood that you haven't lost her yet! Muahahahhah..ahah... hmmm sorry. \n\t\t*rand t_dexterity 3 33\n\t\t*goto set_dexterity_end\n\t*if player_skillpoints >= 10\n\t\t#I can jump a Quadruple Axel... without ice and skates... if you know what I mean?\n\t\t\tWell actually I do. But let's just say you're pretty damn dexterous, OK?\n\t\t\t*rand t_dexterity 93 99\n\t\t\t*set player_skillpoints -10\n\t\t\t*goto set_dexterity_end\n\t*if player_skillpoints >= 7\n\t\t#I'm quite agile you know? In childhood I was called \"A Prince Of A Beater\".\n\t\t\tWow! That's really impressive. \n\t\t\t*rand t_dexterity 63 93\n\t\t\t*set player_skillpoints -7\n\t\t\t*goto set_dexterity_end\n\n*label set_dexterity_end\n*if (player_race = \"elf\")\n\t*set t_dexterity %+10\n*if (player_race = \"dwarf\")\n\t*set t_dexterity %-15\n*if (player_race = \"human\")\n\t*set t_dexterity %+5\n*set dexterity t_dexterity\n*page_break Now you can prove your Dexterity.\n*goto get_back_to_proper_scene\n*comment ***************************\n\n*comment ********************************************************\n*label set_reflex\n\n*comment **************\n*comment TEMP VARIABLES\n\n*temp t_reflex\n\n*comment **************\n\nAnd how quick are your movements? What's your reaction time? \n\n*choice\n\t*if player_skillpoints >= 4\n\t\t#I'm usually manage to avoid a flying chair during bar brawls.\n\t\t\tSaves life, huh? Well teeth at last. \n\t\t\t*rand t_reflex 33 63\n\t\t\t*set player_skillpoints -4\n\t\t\t*goto set_reflex_end\n\t#I never hurry. There was a guy once who poked me and then circled around for an hour till I managed to see him.\n\t\tYou liar! It musn't be THAT bad. But I know that you're far from winning a fly-catching contest.\n\t\t*rand t_reflex 3 33\n\t\t*goto set_reflex_end\n\t*if player_skillpoints >= 10\n\t\t#I'm able to dodge the raindrops.\n\t\t\tDon't screw me!... Sweet mother mercy... you ARE serious.\n\t\t\t*rand t_reflex 93 99\n\t\t\t*set player_skillpoints -10\n\t\t\t*goto set_reflex_end\n\t*if player_skillpoints >= 7\n\t\t#Hmmm...none of my co-residents ever caught me watching porn...\n\t\t\tYeah, that explains a lot.\n\t\t\t*rand t_reflex 63 93\n\t\t\t*set player_skillpoints -7\n\t\t\t*goto set_reflex_end\n*label set_reflex_end\n*if (player_race = \"elf\")\n\t*set t_reflex %+5\n*if (player_race = \"dwarf\")\n\t*set t_reflex %-10\n*if (player_race = \"human\")\n\t*set t_reflex %+15\n*set reflex t_reflex\n*page_break Show your Reflex. Dodge this!\n*goto get_back_to_proper_scene\n*comment ***************************\n\n*comment ********************************************************\n*label set_int\n\n*comment **************\n*comment TEMP VARIABLES\n\n*temp t_intelligence\n\n*comment **************\n\nHow smart are you? How clever? How many ideas per hour?\n\n*choice\n\t#Eeeeee... you're talking to me?\n\t\tYes I've talked to you, but nevermind it wasn't anything important.\n\t\t*rand t_intelligence 3 33\n\t\t*goto set_intelligence_end\n\t*if player_skillpoints >= 4\n\t\t#I'm not very clever but it's fine for me. Those 'geniuses' are boring and lazy as hell. And I'm just a decent, hardworker.\n\t\t\tAmen. \n\t\t\t*rand t_intelligence 33 63\n\t\t\t*set player_skillpoints -4\n\t\t\t*goto set_intelligence_end\n\t*if player_skillpoints >= 10\n\t\t#As a player? Or as a character?\n\t\t\tYou're right my question wasn't too strict. But your answer says enough.\n\t\t\t*rand t_intelligence 93 99\n\t\t\t*set player_skillpoints -10\n\t\t\t*goto set_intelligence_end\n\t*if player_skillpoints >= 7\n\t\t#This won't sound humble, but I'm very intelligent.  I've taken some tests lately and my IQ is an amazing 120! Impressive, isn't it?\n\t\t\tYeah, very impressive. You're surely the most intelligent person you know. \n\t\t\t*rand t_intelligence 63 93\n\t\t\t*set player_skillpoints -7\n\t\t\t*goto set_intelligence_end\n\n*label set_intelligence_end\n*if (player_race = \"elf\")\n\t*set t_intelligence %+5\n*if (player_race = \"dwarf\")\n\t*set t_intelligence %+10\n*if (player_race = \"human\")\n\t*set t_intelligence %-10\n*set intelligence t_intelligence\n*page_break Use your Intelligence smartly.\n*goto get_back_to_proper_scene\n*comment ***************************\n\n*comment ********************************************************\n*label set_strength\n\n*comment **************\n*comment TEMP VARIABLES\n\n*temp t_strength\n\n*comment **************\n\nSo? How big are your muscles?\n\n*choice\n\t#Me and muscles? Examine me and call if you find any.\n\t\tI'm afraid we don't have much time Regenezrawhs...\n\t\t*rand t_strength 3 33\n\t\t*goto set_strength_end\n\t*if player_skillpoints >= 4\n\t\t#They're medium. I'm neither strong nor weak.\n\t\t\tJust in the center.\n\t\t\t*rand t_strength 33 63\n\t\t\t*set player_skillpoints -4\n\t\t\t*goto set_strength_end\n\t*if player_skillpoints >= 10\n\t\t#On my last journey my horse lost all four shoes and I had to lift him. He was even more surprised than you're now.\n\t\t\tOh I bet he were!\n\t\t\t*rand t_strength 93 99\n\t\t\t*set player_skillpoints -10\n\t\t\t*goto set_strength_end\n\t*if player_skillpoints >= 7\n\t\t#I have no problem with twisting off even old, rusty jars of jam.\n\t\t\tWhat a great proof of a strength! Marvelous! Can you help me with that one?\n\t\t\t*rand t_strength 63 93\n\t\t\t*set player_skillpoints -7\n\t\t\t*goto set_strength_end\n\n*label set_strength_end\n*if (player_race = \"elf\")\n\t*set t_strength %-15\n*if (player_race = \"dwarf\")\n\t*set t_strength %+30\n*set strength t_strength\n*page_break You can test your Strength now.\n*goto get_back_to_proper_scene\n*comment ***************************\n\n*comment *****************************************************
