t\t\t\t\t\tThe bigguy seems delighted with your kiss.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto arrest_act_VI_2a.1.1.2.2_1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t#I've wanted to do it from the beggining. Such a big, strong man. I kiss him on lips.\n\t\t\t\t\t\t\t\t\t*label arrest_act_VI_2a.1.1.4\n\t\t\t\t\t\t\t\t\t*set bigguy_meter +5\n\t\t\t\t\t\t\t\t\t*goto arrest_act_VI_2a.1.1.2\n\t\t\t\n\t\t\t\t\t\t#Tell him to go first, so he can catch you if you fall.\n\t\t\t\t\t\t\t*label arrest_act_VI_2a.1.2\n\t\t\t\t\t\t\t*set ask \"go first\"\n\t\t\t\t\t\t\t*goto arrest_act_VI_2a.1.1\n\t\t\t\t*else\n\t\t\t\t\t\"You go and no talk!\" he replies.\n\t\t\t\t\t*goto arrest_act_VI_2a.2\n\t\t\t*else\n\t\t\t\t*if look>=80\n\t\t\t\t\tHe's a man so... you try to charm him with your beuty and sweet talk, but it's pointless. \n\t\t\t\t\tHe just stares at you strangely. \"Woman me don't like. You go down!\"\n\t\t\t\t\t*goto arrest_act_VI_2a.2\n\t\t\t\t*else\n\t\t\t\t\tYou easily notice that his sight stops at your brests for a while.\n\t\t\t\t\tYou got him! You think, but then he says \"Woman me don't like. You go down!\".\n\t\t\t\t\t*goto arrest_act_VI_2a.2\n\t#I have to go.\n\t\t*label arrest_act_VI_2a.2\n\t\tIt seems you have no option. \n\n*label arrest_act_VI_2b\nHis heavy boots echo loud in low, stone passage...\n*if (feet = \"plate boots\") or (feet = \"riding boots\")\n\tAs well as yours.\n*line_break\n...71...72...73...74... After 74 cautious steps down you reach the floor of the dungeon. \n\n*page_break\nAs soon as you go in, all you'd like is to get out...\n\nYou can't unfortunately. You'll have to stay in this dark, terrible smelling place for some time.\nIt's rather hard to imagine your future in some bright colours. But that's only the future... \n\nBut now there is another massive door in your way, lit by one torch on the right side of the wall.\n\n*if tied=false\n\t\"You need arms bound, friend. Me no want trouble.\" the big guy says and ties your arms again.\n\t*set tied true\n*if equip_prison_keys=false\n\tYour escort opens them and orders to get in. \n*if equip_prison_keys=true\n\tYour escort stands before them and checks the place where he should have his keys. He looks disturbed\n\tbeing unable to find them. \"You see my keys?\" he asks looking at you.\n\t*choice\n\t\t#Lie that you haven't seen them.\n\t\t\tHe seems really troubled. After a while he orders you to stay here and goes back to search for them.\n\t\t\t\n\t\t\tMinutes pass...\n\t\t\t\n\t\t\tHe comes back. Without keys of course. You have them. He seems depressed.\n\t\t\t*choice\n\t\t\t\t#Tell the truth that you've stolen the keys.\n\t\t\t\t\t*goto stolen_keys\n\t\t\t\t#Offer your help with the search.\n\t\t\t\t\tDue to depression or whatever, he agrees to untie you again. What next?\n\t\t\t\t\t*set tied false\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I suggest he stay here while I search for keys.\n\t\t\t\t\t\t\t*if (charisma>40) and (look>80)\n\t\t\t\t\t\t\t\tYou've managed to convince him that he should wait here while you search for the keys.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou take his torch and go upstairs. What's your plan?\n\t\t\t\t\t\t\t\t*set torch true\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t*if intelligence\u003c30\n\t\t\t\t\t\t\t\t\t\t#I pretend that I found the keys and get back to him.\n\t\t\t\t\t\t\t\t\t\t\tI don't know why didn't you just try to escape but fine.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t*set intelligence %-10\n\t\t\t\t\t\t\t\t\t\t\t*label give_back_keys\n\t\t\t\t\t\t\t\t\t\t\tYou gave him back the keys. He's so happy that he hugs you so hard that he barely\n\t\t\t\t\t\t\t\t\t\t\tbrake your ribs. Then he sadly adds that he has to tie you again.\n\t\t\t\t\t\t\t\t\t\t\t*set bigguy_meter +2\n\t\t\t\t\t\t\t\t\t\t\t*set torch false\n\t\t\t\t\t\t\t\t\t\t\t*set tied true\n\t\t\t\t\t\t\t\t\t\t\t*set equip_prison_keys false\n\t\t\t\t\t\t\t\t\t\t\t*goto dungeon_door_b4_open\n\t\t\t\t\t\t\t\t\t#I'm running away!\n\t\t\t\t\t\t\t\t\t\tWise choice!\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tYou don't even have to hurry very much. This idiotic guard seems to believe that\n\t\t\t\t\t\t\t\t\t\tyou'll really search for the keys. Anyway you reach the top of the stairs.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*set alarm 40\n\t\t\t\t\t\t\t\t\t\t*set bigguy_location \"dungeon\"\n\t\t\t\t\t\t\t\t\t\t*set back_act \"inner_act_II\"\n\t\t\t\t\t\t\t\t\t\t*page_break Interlude: The Inner Corridor\n\t\t\t\t\t\t\t\t\t\t*goto_scene inner\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYou fail to convince him to do that. Maybe he's not that stupid in the end?\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tAnyway instead of that you suggested him that he needs your help with searching\n\t\t\t\t\t\t\t\tthe keys.\n\t\t\t\t\t\t\t\t*goto search_split\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t#I suggest we split and search for keys.\n\t\t\t\t\t\t\t*label search_split\n\t\t\t\t\t\t\tHe agrees and since you have only one torch. You both must go to the top first.\n\t\t\t\t\t\t\tThen he passes you his torch and takes another one himself.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"You search down. Me search up.\" he tells you.\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Go down and pretend you've found the keys.\n\t\t\t\t\t\t\t\t\t*label pretend_found_keys\n\t\t\t\t\t\t\t\t\tYou go down and wait for a while. Then you call him and show him the keys.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto give_back_keys\n\t\t\t\t\t\t\t\t#Try to convince him that we should switch.\n\t\t\t\t\t\t\t\t\tYou try to convince him, but you can't give him any logical reasons why should\n\t\t\t\t\t\t\t\t\tyou switch so you drop the matter and do as he said.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto pretend_found_keys\n\t\t\t\t\t\t\n\t\t#Lie that you have found them on the stairs.\n\t\t\t*if charisma>=30\n\t\t\t\t*set bigguy_meter +1\n\t\t\t\t\"Me thank you. You good help.\" a true smile enters his stupid face when you show him where you've\n\t\t\t\tput his keys.\n\t\t\t\t\n\t\t\t\t*if equip_lockpick = true\n\t\t\t\t\tYou're lucky that he doesn't have to search you. Your lockpick is still safe.\n\t\t\t\t*goto dungeon_door\n\t\t\t*else\n\t\t\t\t\"Lying bad\" he doesn't seem to believe you.\n\t\t\t\t*goto stolen_keys\n\t\t#Tell the truth that you've stolen them.\n\t\t\t*label stolen_keys\n\t\t\t*set bigguy_meter -2\n\t\t\t\"Stealing bad. Me don't like thief.\" to your surprise he sounds disappointed, but that's all.\n\t\t\t\n\t\t\tOh, except that of course you have to give them back, and as you're tied he has to search you.\n\t\t\t\n\t\t\tHe finds the keys easily.\n\t\t\t*if equip_lockpick = true\n\t\t\t\tBut what's much worse he find your lockpick as well!\n\t\t\t\t*set equip_lockpick false\n\t\t\t\tHe doesn't seem to know what's this but he takes it anyway.\n\t\t\t\t\n\t\t\t\t*label dungeon_door_b4_open\n\t\t\t\tThen he opens the door and orders you to get in. \n\t\t\t*goto dungeon_door\n\n*label dungeon_door\t\t\t\nThe only light source here are two torches that smoke terribly near the door on the left, and the one held by the big guy behind you;\neven together, they give almost no light at all. \nIt is enough though for you to see an old guard snoring on the chair in the room which happens to be s tiny guardpost.\n*page_break\n\nSuddenly... a rat squeeks loudly when you accidently kick it...\n*if will=0\n\tThe sudden sound in these circumstances may be quite frightening but...\n\t*comment JUMP TO SETTINGS\n\t*set next_act \"set_will\"\n\t*set back_scene \"arrest\"\n\t*set back_act \"dungeon_door_aj\"\n\t*goto_scene settings\n*label dungeon_door_aj\n*comment JUMP OK\n\t\nThe big guard presents you as a new prisoner to the old guard, called \"Cerberion\". Cerberion looks at you for a while and\nsays that finally Alistair will have some company. Then he leads both of you to the cell. Your cell.\n\n*if intelligence>30\n\tYou count 8 cells in all, 4 on the left wall and 4 on the right. All empty.\n\nCerberion stops before the last cell on the left, opens it, and tells your 'guide' to throw\nyou in. Unfortunately for you, he's not the brightest mind at all, and does it... literally.\n\n*if weapon = \"knife\"\n\t*page_break Epilogue\n\t*set ending_scene \"fatal_accident\"\n\t*goto_scene ending\n\n*label arrest_act_VI_3\nHaving your arms bound, you hit the floor like a sack of potatoes. It's bright for a moment, too bright. Then\neverything fades to the black...\n*set health 70\n*set bigguy_location \"living\"\n*set back_act \"cell_act_IV\"\n*page_break Act V: In The Cell\n*goto_scene cell\n\n*label fight\n\n*set back_act \"fight_in_arrest\"\n*if attack_by_surprise = true\n\t*set back_act \"fight_in_arrest_0\"\n*set back_scene \"fights\"\n*goto_scene fights\n\n*comment Fight goes here. And beside the result. The interrogation is over and you are DEAD, FREE or back in the cell.\n", "cell": "*comment **************\n*comment TEMP VARIABLES\n\n*temp door_closed\n*set door_closed true\n\n*temp meet_master\n*set meet_master 0\n\n*comment **************\n\n*gotoref back_act\n*comment We want to be able to get back to this scene, that's why this reference\n\n*label cell_act_I\n*comment Scene 1: Cell, Act I\n*comment Player will choose their character's race\n\nWelcome to the story which may be funny, sad or heroic... or mix of all of these.\n\nIn fact it's not a single story... It's a hundred of tales about men and women, innocent\nand cruel, wise and stupid, living or dead... \n\nAll of these stories have one common element. Their hero is caught by the city guards \nof a certain unnamed fantasy kingdom. Are you a criminal? Maybe you're not? \n\nWhat's your story?\n*page_break Prologue\nBefore we start... You're 'right' or 'left' handed?\n*choice\n\t#Right.\n\t\t*set main_hand \"right\"\n\t\t*set second_hand \"left\"\n\t\t*goto chose_hand\n\t#Left.\n\t\t*set main_hand \"left\"\n\t\t*set second_hand \"right\"\n\t\t*goto chose_hand\n\n*label chose_hand\nThanks. Now we can proceed to the...\n*page_break Real Prologue\nIt's completely dark around you.\n\nI don't even know if you have your eyes open or closed...\n*choice\n\t#They're closed. It helps me concentrate.\n\t\t*label cell_act_I.2\n\t\tYou concentrate then and all you see is darkness...\n\t\t\n\t\t*set player_race \"human\"\n\t\t*set min_fatigue 4\n\t\t*set max_fatigue 16\n\t\t*set fatigue_step 4\n\t\t*set player_skillpoints +8\n\t\t*set skill_infravision false\n\t\t*goto cell_act_II\n\t#They're open. I need to get them used to the darkness.\n\t\t*label cell_act_I.3\n\t\tWell that's not a bad idea indeed.\n\t\t\n\t\t*set player_race \"human\"\n\t\t*set min_fatigue 4\n\t\t*set max_fatigue 16\n\t\t*set fatigue_step 4\n\t\t*set player_skillpoints +8\n\t\t*set skill_infravision false\n\t\t*goto cell_act_II\n\t#Open, I have no problem seeing in the dark.\n\t\t*label cell_act_I.1\n\t\tWhy so?\n\t\t*choice\n\t\t\t#You don't want to insult a Dwarf, do you?\n\t\t\t\t*label cell_act_I.1.1\n\t\t\t\tNo. Not really.\n\t\t\t\t*set player_race \"dwarf\"\n\t\t\t\t*set skill_infravision true\n\t\t\t\t*set min_fatigue 6\n\t\t\t\t*set max_fatigue 25\n\t\t\t\t*set fatigue_step 6\n\t\t\t\t*set player_skillcount +1\n\t\t\t\t*goto cell_act_II\n\t\t\t#I can't remember if I've heard such a stupid question in my long Elvish life...\n\t\t\t\t*label cell_act_I.1.2\n\t\t\t\tHow could I miss those ears...\n\t\t\t\t*set player_race \"elf\"\n\t\t\t\t*set skill_infravision true\n\t\t\t\t*set min_fatigue 5\n\t\t\t\t*set max_fatigue 20\n\t\t\t\t*set fatigue_step 3\n\t\t\t\t*set player_skillcount +1\n\t\t\t\t*choice\n\t\t\t\t\t#I'm sorry?\n\t\t\t\t\t\t*label cell_act_I.1.2.1\n\t\t\t\t\t\tNevermind. Sorry.\n\t\t\t\t\t\t*goto cell_act_II\n\t\t\t#How could I know? I just can. It's possible, isn't it?\n\t\t\t\t*label cell_act_I.1.3\n\t\t\t\tYeah, sure but not if you're just a common human.\n\t\t\t\t*choice\n\t\t\t\t\t#Then I'm uncommon, I born \"different\" is that alright?\n\t\t\t\t\t\t*label cell_act_I.1.3.1\n\t\t\t\t\t\tYup. I shall continue, ok?\n\t\t\t\t\t\t\n\t\t\t\t\t\t*set player_race \"human\"\n\t\t\t\t\t\t*set player_perk \"mutant\"\n\t\t\t\t\t\t*set min_fatigue 4\n\t\t\t\t\t\t*set max_fatigue 16\n\t\t\t\t\t\t*set fatigue_step 4\n\t\t\t\t\t\t*set player_skillpoints +4\n\t\t\t\t\t\t*set skill_infravision true\n\t\t\t\t\t\t*set player_skillcount +1\n\t\t\t\t\t\t*goto cell_act_II\n\t\t\t\t\t#Damn. Okay I can't see in the dark then.\n\t\t\t\t\t\t*label cell_act_I.1.3.2\n\t\t\t\t\t\tChill out. You must have some other skills. And about the dark...\n\t\t\t\t\t\t\n\t\t\t\t\t\t*set player_race \"human\"\n\t\t\t\t\t\t*set min_fatigue 4\n\t\t\t\t\t\t*set max_fatigue 16\n\t\t\t\t\t\t*set fatigue_step 4\n\t\t\t\t\t\t*set player_skillpoints +8\n\t\t\t\t\t\t*set skill_infravision false\n\t\t\t\t\t\t*goto cell_act_II\n\t\t\n*label cell_act_II\n*if skill_infravision = true\n\n\tInfravision skill aquired.\n\t\n*comment *page_break\n*comment Scene 1: Cell,  Act II\n*comment Player will choose the sex of their character\n\nIn fact it's so dark in here that I can't even figure out your sex...\n\n*if skill_infravision = true\n\tAs you probably understand it means that, unlike you, I have no Infravision. \n*choice\n\t#I'm male.\n\t\t*label cell_II.1\n\t\t*set player_sex \"male\"\n\t\tApperance is important even for ${player_sex} ${player_race} so please answer.\n\t\t\n\t\t*goto cell_act_III\n\t#I'm female.\n\t\t*label cell_II.2\n\t\tOh. Good to know. In that case it would be nice if you tell me more about your apperance.\n\t\t\n\t\t*set player_sex \"female\"\n\t\t*set him \"her\"\n\t\t*set his \"her\"\n\t\t*set he \"she\"\n\t\t*goto cell_act_III\n\t\t\n*label cell_act_III\n*comment *page_break\n*comment Scene 1: Cell, Act III\n*comment Player will choose the look of their character\n\n*comment JUMP TO SETTINGS\n*set next_act \"set_look\"\n*set back_scene \"cell\"\n*set back_act \"cell_III_aj\"\n*goto_scene settings\n*label cell_III_aj\n*comment JUMP OK\n\n*comment Oh sorry it's still too dark.\n\n*if skill_infravision = true \n\tEven being generally able to see in the darkness you can't see a thing at this moment.\n\nMoreover your hands burn badly and you barely feel your face...\nBut just enough to feel it lying on the cold stone. Seems like it's not your lucky day...\n*fake_choice\n\t#I could be dead for example...\n\t#And what if it is?\n\t#I don't believe in luck.\n\n*comment JUMP TO SETTINGS\n*set next_act \"set_luck\"\n*set back_scene \"cell\"\n*set back_act \"cell_III_aj2\"\n*goto_scene settings\n*label cell_III_aj2\n*comment JUMP OK\n\n*comment *page_break Anyway...\n\nTime passes slowly as you lie on the stone floor almost unable to move.\n\nSooner or later you gather thoughts and begin to remember what happened and how did you get here...\n*page_break Act I: The Interrogation Begins\n*set back_act \"arrest_act_I\"\n*goto_scene arrest\n\n*label cell_act_IV\n*comment *page_break\n*comment Scene 1: Cell, Act IV\n*comment Player will try to recover in the cell\n*set ever_was_in_cell true\nSo that's why you are here; lying face down on the cold, wet, \nstone floor of a dark dungeon. You know that lying like that won't be good for your health. \n*choice\n\t#I try to get up.\n\t\t*label cell_act_IV.1\n\t\tThat's a good choice.\n\t\t\n\t\t*if arms = \"no arms\"\n\t\t\tUnfortunately... it's a bit hard to get up with no arms so... \n\t\t\t*goto cell_act_IV.2\n\t\t*goto cell_act_IV_1\n\t*if will \u003c=75\n\t\t#It's hopeless. I'll die here anyway.\n\t\t\t*label cell_act_IV.2\n\t\t\t*if will>0\n\t\t\t\t*set will %-30\n\t\t\t*set health %-5\n\t\t\t*set time_show time/24\n\t\t\t*comment JUMP TO SETTINGS\n\t\t\t*set next_act \"set_called\"\n\t\t\t*set back_scene \"cell\"\n\t\t\t*set back_act \"cell_act_IV.1_aj\"\n\t\t\t*goto_scene settings\n\t\t\t*label cell_act_IV.1_aj\n\t\t\t*comment JUMP OK\n\t\t\tStill lying on the cold stones for a couple of minutes make you feel very far from comfortable.\n\t\t\t\n\t\t\tDying it's always an option, but there are often the other ones too.\n\t\t\t\n\t\t\tIf you choose to lie here you'll surely die from cold, so if you're THAT kind of hero, go on.\n\t\t\tBut you could also try to somehow get out of here or at least stay alive until the judgement day. You\n\t\t\tstill have ${time_show} days left. My advice is: \"Make a good use of this time\".\n\t\t\t\n\t\t\tIt's all up to you ${player_called}...\n\t\t\t*choice\n\t\t\t\t#Leave me alone. I just want to die...\n\t\t\t\t\t*label cell_act_IV.2.1\n\t\t\t\t\tAs you wish... Farewell then ${player_name}. \n\t\t\t\t\t*page_break Epilogue\n\t\t\t\t\t*set ending_scene \"give_up\"\n\t\t\t\t\t*goto_scene ending\n\t\t\t\t#You're right I have to find some way to get out of here. I got to get up.\n\t\t\t\t\t*label cell_act_IV.2.2\n\t\t\t\t\tThat's what I like!\n\t\t\t\t\t\n\t\t\t\t\t*if arms = \"no arms\"\n\t\t\t\t\t\tStill... you have no arms. I'm terribly sorry but it's over.\n\t\t\t\t\t\t*page_break Epilogue\n\t\t\t\t\t\t*set ending_scene \"give_up\"\n\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t*goto cell_act_IV_1\n*label cell_act_IV_1\nYou have no idea how long it took, but you finally get up. Your arms are no longer tied but they were for\nquite long and they need some time for blood to properly flow through them again. After standing up, \nyou have your first chance to look around.\n*if skill_infravision = false\n\tYour eyes are now quite used to the darkness.\n\t\nThis room surely couldn't be taken for a four star hotel room; in fact it looks terrible even compared to the\ncheapest inn room. There is no furniture, only a rather small flat haystack in one corner, a wooden bowl near the door\nand a wooden bucket in another corner.\n\nTo avoid misunderstandings it's rather obvious that hay is for sleeping, bowl for eating, and the bucket is for the\nthird (and fourth) thing that you cannot avoid doing, being a ${player_race} (at least not for days). \n*page_break\n\nBesides of these furnishings there are three walls with no windows. The fourth wall is actually all\nbars with a lock. You've already met the floor. If you raise your hand you can reach the ceiling.\n*if player_race = \"dwarf\" \n\n\tIt's not very easy to do it but at least being short you don't need to worry about banging it with your head.\n\n*if skill_infravision = true\n\t*set rat_meter +1\n\t*set rat_aware true\n\tOnly because your ability to see in the dark you are able to see a rat crouching in the corner of the room. It\n\tdoesn't seem to be very scared. Actually you rather have an impression that he(or she?) is looking at you. \n\t*if wisdom >75\n\t\t*set rat_meter +1\n\t\tYou've heard that rats are very smart creatures. They learn very fast, faster then many humans. All you need\n\t\tto teach a rat is something it can eat (and couldn't without your permission) and a little patience.\n\n*label cell_act_V\n*comment *page_break\n*comment Scene 1: Cell, Act V\n*comment Player will have a chance to meet the Master of Tortures\n\nJust after you've finished the first inspection of your new 'home' you can hear a door open.\n\n*if intelligence = 0\n\t*comment JUMP TO SETTINGS\n\t*set next_act \"set_intelligence\"\n\t*set back_scene \"cell\"\n\t*set back_act \"cell_act_V_aj\"\n\t*goto_scene settings\n*label cell_act_V_aj\n*comment JUMP OK\n\n*if intelligence >75\n\tYou're certain that's the sound of the door that leads to the surface.\nAfter a while some unknown voice shouts: \"Booo!\" and you hear the sound of a man falling off his chair once again and the unknown\nvoice laughs of loud...\n\nDo you listen carefully?\n*choice\n\t#No I have more important things to do.\n\t\t*label cell_act_V.1\n\t\tYou choose to ignore the newcomer and mind your own business. \n\t\t*goto cell_act_VI\n\t#Sure, I want to know who's the source of the noice.\n\t\t*label cell_act_V.2\n\t\tYou quietly approach the bars to hear better. \n\t\t\n\t\t\"Sleeping at work again, Cerberion? Watching a half-dead prisoner is tiring work, isn't it?\" asks the unknown person cheerfully.\n\t\t\n\t\t\"I'm...ehrm... that means...\" answered the rather confused old man.\n\t\t\"Relax Cerberion I was just kidding. I wouldn't wake you if I could open my 'playground' myself.\" It is a little strange how the unknown voice said 'playground'. \n\t\t*if intelligence >=25\n\t\t\tShivers came through your back as you realized that he must refer to the torture chamber. The voice must therefore belong to the\n\t\t\tMaster of Tortures. \n\t\t\t*if (will \u003c= 90) and (tortures = 1)\n\t\t\t\tYou may be brave but when you realize that this 'monster' will torture you, you're scared. \n\t\t\t\t*if will=0\n\t\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t\t*set next_act \"set_will\"\n\t\t\t\t\t*set back_scene \"cell\"\n\t\t\t\t\t*set back_act \"cell_act_V.2_aj\"\n\t\t\t\t\t*goto_scene settings\n\t\t\t\t*label cell_act_V.2_aj\n\t\t\t\t*comment JUMP OK\n\t\t\t\t*set will %-5\n\t\t\"Of course Master. I'm going.\" The old guard replies hurriedly. \n\t\t*if tortures = 1\n\t\t\n\t\t\t\"You have to know that we have a new guest here. As far as I know you'll have to make ${him} sing, sir.\" Regardles of words\n\t\t\tit was obvious that the old man wants this to sound like a good news. \"As far as I know, ${his} cell must be by the way, so...\n\t\t\tshow me the new birdy!\" The voice of the Master sounds like he just got a present. \n\t\t\t\n\t\tStanding right next to the bars makes you hear every step clearly, but soon both of them will see you. Maybe for some reason you\n\t\tdon't want them to know that you've heard their chitchat? However you have very little time to do anything.\n\t\t*choice\n\t\t\t#I'll stay there. I want to see this Master.\n\t\t\t\t*label cell_act_V.2.1\n\t\t\t\t*set meet_master 1\n\t\t\t\t*goto cell_act_V.2.3_1\n\t\t\t#I'll pretend that I was doing something.\n\t\t\t\t*label cell_act_V.2.2\n\t\t\t\t*set meet_master 2\n\t\t\t\t*goto cell_act_V.2.3_1\n\t\t\t#They should think that I'm still unconscious.\n\t\t\t\t*label cell_act_V.2.3\n\t\t\t\tYou try to lie down as quick and as quiet as possible.\n\t\t\t\t\n\t\t\t\t*if reflex=0\n\t\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t\t*set next_act \"set_reflex\"\n\t\t\t\t\t*set back_scene \"cell\"\n\t\t\t\t\t*set back_act \"cell_act_V.2.3_aj\"\n\t\t\t\t\t*goto_scene settings\n\t\t\t\t*label cell_act_V.2.3_aj\n\t\t\t\t*comment JUMP OK\n\t\t\t\t\n\t\t\t\t*if dexterity=0\n\t\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t\t*set next_act \"set_dexterity\"\n\t\t\t\t\t*set back_scene \"cell\"\n\t\t\t\t\t*set back_act \"cell_act_V.2.3_aj2\"\n\t\t\t\t\t*goto_scene settings\n\t\t\t\t*label cell_act_V.2.3_aj2\n\t\t\t\t*comment JUMP OK\n\t\t\t\t\n\t\t\t\t*if (reflex>75) and (dexterity>75)\n\t\t\t\t\t*set reflex %+5\n\t\t\t\t\t*set dexterity %+5\n\t\t\t\t\tYour fast and agile so when the steps finally stop you not only lie on the cold floor again, but even mimic \n\t\t\t\t\tyour original position.\n\t\t\t\t\t*set meet_master 3\n\t\t\t\t\t*goto cell_act_V.2.3_1\n\t\t\t\t*elseif (reflex>75) and (dexterity\u003c75)\n\t\t\t\t\t*set health %-5\n\t\t\t\t\t*set reflex %+5\n\t\t\t\t\t*set dexterity %+5\n\t\t\t\t\tYou're quite fast so you have with doing that but... falling down is some sort of art in which you're not\n\t\t\t\t\tmastered. You've smashed your knees a bit. It may not be very dangerous but's still painful. Moreover you make \n\t\t\t\t\ta lot more noise then you've hoped, but when the steps finally stop you not only lie on the cold floor again, \n\t\t\t\t\tbut even mimic your original position.\n\t\t\t\t\t*set meet_master 3\n\t\t\t\t\t*goto cell_act_V.2.3_1\n\t\t\t\t*elseif (reflex\u003c75) and (dexterity>75)\n\t\t\t\t\t*set reflex %+5\n\t\t\t\t\t*set dexterity %+5\n\t\t\t\t\tYou're swift enough to lie down almost without making any sound but you're too slow. \n\t\t\t\t\t*if luck>30\n\t\t\t\t\t\tLuckily for you they didn't see your last moves.\n\t\t\t\t\t\t*set meet_master 3\n\t\t\t\t\t\t*goto cell_act_V.2.3_1\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou did all you can but they must have been blind not to see that you're conscious.\n\t\t\t\t\t\t*set meet_master 4\n\t\t\t\t\t\t*goto cell_act_V.2.3_1\n\t\t\t\t*else\n\t\t\t\t\tWith your not-so-supreme reflex and dexterity you unfortunately fail your task. All that you've\n\t\t\t\t\tmanaged to achieve is that they may think that you've just woke up and try to get up.\n\t\t\t\t\t*set meet_master 4\n\t\t\t\t\t*goto cell_act_V.2.3_1\n\t\t\t\t\t\n\t\t\t\t*label cell_act_V.2.3_1\n\t\t\t\t*if meet_master = 1\n\t\t\t\t\tAfter a while you can see both of them as well as they can see you. Old guard didn't changed at all\n\t\t\t\t\tsince the last time when you've seen him. But you may be surprised that Master of Tortures isn't human.\n\t\t\t\t\tYou've probably never heard of an elven Master of Tortures and one just happen to be just in front of you.\n\t\t\t\t\tUnlike Cerberion he doesn't seem to be surprised that you're staying there completely awake. He nods you\n\t\t\t\t\tand greets with these words: \"Welcome to my little kingdom. I hope you enjoy your stay?\" he smiles.\n\t\t\t\t\t*if player_race=\"elf\"\n\t\t\t\t\t\t\"I'm thrilled to see another of my kind in such a disastrous circumstances.\"\n\t\t\t\t\t\t*set master_meter +1\n\t\t\t\t\t*if tortures = 1\n\t\t\t\t\t\t\"I can't wait till we meet each other a little more, but now my duty calls me.\" he adds.\n\t\t\t\t\tHe didn't even slow down to talk or take a closer look at you. Instead of that they both passed and reached\n\t\t\t\t\tthe door on the end of the corridor which you don't yet know. Guard opens them and elf disappears inside.\n\t\t\t\t\t\n\t\t\t\t\tThe old man tells you that you'll get some food when the Master finishes his job because he doesn't intend to go to the\n\t\t\t\t\tkitchen twice a day and goes back to his guard-post. What will you do next? \n\t\t\t\t\t*goto cell_act_VI\n\t\t\t\t\n\t\t\t\t*if meet_master = 2\n\t\t\t\t\tYou pretend that you are piling up the hay, so that when they pass your cell all that can they see is your back. The Master\n\t\t\t\t\tseems to be rather busy, because he doesn't even stop to take a look at you. Their steps don't stop till, as you suppose,\n\t\t\t\t\treach the end of the corridor.\n\t\t\t\t\t\n\t\t\t\t\tThe old man tells you that you'll get some food when the Master finishes his job because he doesn't intend to go to the\n\t\t\t\t\tkitchen twice a day and goes back to his guard-post. What will you do next? \n\t\t\t\t\t*goto cell_act_VI\n\t\t\t\t\t\n\t\t\t\t*if meet_master = 3\n\t\t\t\t\tHaving only a torch as a light source they can't judge if your eyes are fully closed so you can peek at both man and...\n\t\t\t\t\telf, passing near your cell. You've already seen the guard so the second person is by far more interesting. Firstly\n\t\t\t\t\the's an elf\n\t\t\t\t\t*if player_sex = \"elf\"\n\t\t\t\t\t\tlike you and in your long elvish life you've never seen or even heard of any of your kind who would be a Master of Tortures.\n\t\t\t\t\t... Secondly, he looks nice. I don't mean attractive. He just looks like the most trustworthy guy you've ever seen. Lastly\n\t\t\t\t\the didn't even stopped to take a look at you, just glanced while walking. You still pretend to be unconscious while guard\n\t\t\t\t\twalks back. But you can't just lie like that forever. \n\t\t\t\t\t*goto cell_act_VI\n\t\t\t\t*if meet_master = 4\n\t\t\t\t\tYour plan to pretend unconsciousness obviously failed. However you can still pretend that you've not heard what were they\n\t\t\t\t\ttalking about. And speaking about 'them' I mean the old guard and maybe even older, but it's hard to tell, male elf. That's\n\t\t\t\t\tcorrect, the Master of Tortures is an elf there's no doubt about it.\n\t\t\t\t\t*if tortures = 1\n\t\t\t\t\t\tWhat more he looks at you while passing your cell and speaks: \"I can't wait till we meet each other a little more, but now my duty calls me.\"\n\t\t\t\t\tHe didn't even slow down to talk or take a closer look at you. Instead of that they both passed and reached\n\t\t\t\t\tthe door on the end of the corridor which you don't yet know. Guard opens them and elf disappears inside.\n\t\t\t\t\t\n\t\t\t\t\tThe old man tells you that you'll get some food when the Master finishes his job because he doesn't intend to go to the\n\t\t\t\t\tkitchen twice a day and goes back to his guard-post. What will you do next? \n\t\t\t\t\t*goto cell_act_VI\n\n*label cell_act_VI\n*comment *page_break\n*comment Scene 1: Cell, Act VI\n*comment Player will have to make his first decisions\n\n*if wisdom=0\n\t*comment JUMP TO SETTINGS\n\t*set next_act \"set_wisdom\"\n\t*set back_scene \"cell\"\n\t*set back_act \"cell_act_VI_aj\"\n\t*goto_scene settings\n*label cell_act_VI_aj\n*comment JUMP OK\n\n*if endurance=0\n\tBy the way... \n\t*comment JUMP TO SETTINGS\n\t*set next_act \"set_endurance\"\n\t*set back_scene \"cell\"\n\t*set back_act \"cell_act_VI_aj2\"\n\t*goto_scene settings\n*label cell_act_VI_aj2\n*comment JUMP OK\n\n*if skill_know_time=\"unknown\"\n\t*if wisdom\u003c=65\n\t\t*set skill_know_time false\n\t\t*goto cell_act_VI_time_0\n\tYou have some time until you'll be judged. But being in the dark\n\tcell with no windows and not having any kind of watch it's hard to tell how fast\n\tthe time is passing. \n\t\t\n\tThere's an ancient technique to tell time. Do you know it?\n\t*choice\n\t\t*if player_skillpoints>=2\n\t\t\t#Yes, I have learned it in the past.\n\t\t\t\tGood for you.\n\t\t\t\t\n\t\t\t\tKnow Time skill aquired!\n\t\t\t\t\n\t\t\t\t*set skill_know_time true\n\t\t\t\t*set player_skillcount +1\n\t\t\t\t*set player_skillpoints -2\n\t\t\t\t*goto cell_act_VI_time_0\n\t\t\t\t*page_break\n\t\t#No, unfortunately I don't.\n\t\t\tWhat a pity. \n\t\t\t\n\t\t\t*set skill_know_time false\n\t\t\t*goto cell_act_VI_time_0\n\t\t\t*page_break\n*label cell_act_VI_time_0\n*set time_passed time_given-time\n\n*comment DEBUG: Ile czasu uplynelo: ${time_passed}\n\n*comment DEBUG: Nastepne wydarzenie: ${cell_next_event}\n\n*comment DEBUG: Nastepne karmienie: ${next_breakfast}\n\n*comment DEBUG: Nastepne tortury: ${next_tortures}\n\n*comment This act will contain special events\n*if (time_given-time)=cell_next_event\n\t*goto cell_act_VII\n\n*comment SPELLS section\n\n*if spell_infra=true\n\t*set fatigue +1\n\t\n*comment SPELLS section\n\n*if time\u003c=0\n\t*label cell_judgment_time\n\t*if cursed=true\n\t\tIt's the time of your judgment, but no one comes down for you...\n\t\t*page_break Epilogue\n\t\t*set ending_scene \"cursed\"\n\t\t*goto_scene ending\n\tIt's the time of your judgment. You have never admit to the charges, even during tortures.\n\tThe big guard comes down and together with Cerberion they let you out of the cell. You get\n\tback the same way as a couple days ago.\n\t\n\tFor the first time since that evening when you were arrested and brought here. You are outside.\n\tYou breath with the fresh air when being escorted through the streets to the large square where\n\tthe Royal Judge awaits.\n\t*if tortures=1\n\t\t*page_break Epilogue\n\t\t*set ending_scene \"innocent\"\n\t\t*goto_scene ending\n\t*if tortures!=1\n\t\t*page_break Epilogue\n\t\t*set ending_scene \"sentenced_to_death\"\n\t\t*goto_scene ending\n\n*label cell_act_VI_ajt\n\n*if (time!=0)\n\t*set time_show time/24\n\t*temp temp_time\n\t*set temp_time 12\n\t*label cell_act_VI_time\n\t*if time_show\u003ctemp_time\n\t\t*set temp_time -1\n\t\t*goto cell_act_VI_time\n\t*set time_show temp_time\n\t*if time_show=0\n\t\t*set time_show time\n\t\t*temp day_part\n\t\t*if (time_show=0)\n\t\t\t*set day_part \"noon\"\n\t\t*if (time_show>=1) or (time_show\u003c=6)\n\t\t\t*set day_part \"afternoon\"\n\t\t*if (time_show>=6) or (time_show\u003c=10)\n\t\t\t*set day_part \"evening\"\n\t\t*if (time_show>=10) or (time_show\u003c=18)\n\t\t\t*set day_part \"night\"\n\t\t*if (time_show>=18) or (time_show\u003c=23)\n\t\t\t*set day_part \"morning\"\n\t\t*if (skill_know_time = true)\n\t\t\tIt's ${day_part}. You still have ${time_show} hours left to the judgment.\n\t\t\n\t\t*goto cell_act_VI_time_2\n\t*else\n\t\t*if time_show>0\n\t\t\t*set temp_time time-(time_show*24)\n\t\t\t*temp day_part\n\t\t\t*if (temp_time=0)\n\t\t\t\t*set day_part \"noon\"\n\t\t\t*if (temp_time>=1) and (temp_time\u003c=6)\n\t\t\t\t*set day_part \"morning\"\n\t\t\t*if (temp_time=12)\n\t\t\t\t*set day_part \"midnight\"\n\t\t\t*if ((temp_time>6) and (temp_time\u003c=14)) and (temp_time!=12)\n\t\t\t\t*set day_part \"night\"\n\t\t\t*if (temp_time>14) and (temp_time\u003c=18)\n\t\t\t\t*set day_part \"evening\"\n\t\t\t*if (temp_time>18) and (temp_time\u003c=23)\n\t\t\t\t*set day_part \"afternoon\"\n\t\t\t*if skill_know_time = true\n\t\t\t\t*if temp_time>1\n\t\t\t\t\tIt's ${day_part}. You still have ${time_show} days and ${temp_time} hours left to the judgment.\n\t\t\t\t\t\n\t\t\t\t\t*goto cell_act_VI_time_2\n\t\t\t\t*if temp_time=1\n\t\t\t\t\tIt's ${day_part}. You still have ${time_show} days and ${temp_time} hour left to the judgment.\n\t\t\t\t\t\n\t\t\t\t\t*goto cell_act_VI_time_2\n\t\t\t\t*if temp_time=0\n\t\t\t\t\tIt's ${day_part}. You still have ${time_show} days left to the judgment.\n\t\t\t\t\t\n\t\t\t\t\t*goto cell_act_VI_time_2\n*label cell_act_VI_time_2\n\n*if fatigue\u003c=min_fatigue\n\tYou're rested.\n\t\n*if (fatigue>min_fatigue) and (fatigue\u003c=(min_fatigue+fatigue_step))\n\tYou're a bit tired.\n\t\n*if (fatigue>(min_fatigue+fatigue_step)) and (fatigue\u003c=(min_fatigue+(2*fatigue_step)))\n\tYou're very tired. You better take a rest.\n\t\n*if (fatigue>(min_fatigue+(2*fatigue_step))) and (fatigue\u003c=max_fatigue)\n\tYou're exhausted. You have to rest or you'll die.\n\t\n*if (fatigue>max_fatigue)\n\t*if endurance>=80\n\t\tOnly your extreme toughness let you still breathe.\n\t\tYou can't be sure if you can hold any longer.\n\t\t\n\t\t*temp y\n\t\t*set y fatigue-16\n\t\t*set endurance %-y\n\t\t*goto cell_act_VI_fatigue\n\t*else\n\t\tIt's a bit too much for you. You pass out.\n\t\t\n\t\t*if choice_randomtest\n\t\t\t*comment Cheat to avoid stupid overdrive\n\t\t\t*set fatigue 0\n\t\t\t*goto cell_act_VI\n\t\t\n\t\t*page_break Epilogue\n\t\t*set ending_scene \"overdrive\"\n\t\t*goto_scene ending\n\n*label cell_act_VI_fatigue\nYou're in your cell.\n*if door_closed = true\n\tThe barred door is closed.\n*if door_closed = false\n\tThe barred door is open.\n*if food = true\n\tThere's some food in the bowl.\n\t\n*if (rat_meter=0) and ((player_sex = \"female\") and (look>=70))\n\tYou sense that something's looking at you...\n\nWhat do you do?\n*choice\n\t*if (hay_meter=0) and (equip_needle = false)\n\t\t#Check the hay.\n\t\t\t*label cell_act_VI.1\n\t\t\t*if skill_know_time = false\n\t\t\t\tYou search through the haystack for some time. \n\t\t\t*if skill_know_time = true\n\t\t\t\tYou spend one hour examining the haystack.\n\t\t\t\n\t\t\t*set hay_meter +luck\n\t\t\t*if hay_meter>=90\n\t\t\t\tIt's incredible but you've found a big needle in the haystack! \n\t\t\t\t*set equip_needle true\n\t\t\t\t*set time -1\n\t\t\t\t*set fatigue +1\n\t\t\t\t*page_break\n\t\t\t\t*goto cell_act_VI\n\t\t\t*else\n\t\t\t\tBut you've found nothing but bugs and dirt. Maybe it's time to do something else?\n\t\t\t\t*set time -1\n\t\t\t\t*set fatigue +1\n\t\t\t\t*page_break\n\t\t\t\t*goto cell_act_VI\n\t*if ((hay_meter>0) and (hay_meter\u003c90)) and (equip_needle = false)\n\t\t#There must be something in this hay...\n\t\t\t*goto cell_act_VI.1\n\t\t\t\n\t*if wall_meter=0\n\t\t#Examine the walls.\n\t\t\t*label cell_act_VI.2\n\t\t\t*temp temp\n\t\t\t*set temp 2\n\t\t\t*if (time_passed+temp)>cell_next_event\n\t\t\t\t*set temp (cell_next_event-time_passed)\n\t\t\t*if skill_know_time = false\n\t\t\t\tYou examine the walls for some time.\n\t\t\t*if skill_know_time = true\n\t\t\t\t*if temp = 1\n\t\t\t\t\tYou examine the walls for one hour.\n\t\t\t\t\t*goto cell_act_VI.2_999\n\t\t\t\t*else\n\t\t\t\t\tYou examine the walls for ${temp} hours.\n\t\t\t\t\t*goto cell_act_VI.2_999\n\t\t\t\t\t\n\t\t\t*label cell_act_VI.2_999\n\t\t\t*set time -temp\n\t\t\t*set fatigue +temp\n\t\t\t\n\t\t\t*temp wall_progress\n\t\t\t*rand wall_progress 1 10\n\t\t\t*set wall_progress +(10*temp)\n\t\t\t\t\n\t\t\t*if (skill_infravision!=true)\n\t\t\t\tIt's hard to see anything in this darkness so it's a difficult task.\n\t\t\t\t*set wall_meter +wall_progress\n\t\t\t*if (skill_infravision=true)\n\t\t\t\tYou praise your ability of seeing in the dark when you examine the walls of your cell.\n\t\t\t\t*set wall_meter +(2*wall_progress)\n\t\t\t\n\t\t\t*if (wall_meter>=50) and (wall_meter\u003c100)\n\t\t\t\t\tExamining the wall inch by inch you've already found something. It seems that there\n\t\t\t\t\tare some strange lines carved in the stone.\n\t\t\t*if wall_meter>=100\n\t\t\t\t\tFinally you uncover the whole carving.\n\t\t\t*if (wall_meter\u003c50)\n\t\t\t\tYou found nothing but cold stones covered with dust.\n\t\t\t*if temp\u003c2\n\t\t\t\tSomething disturbs your examination.\n\t\t\t*page_break\n\t\t\t*goto cell_act_VI\n\t*if ((wall_meter>0) and (wall_meter\u003c100)) and (portal != \"unfinished\")\n\t\t#Continue examining the walls.\n\t\t\t*goto cell_act_VI.2\n\t*if (wall_meter>=100) and (portal=\"hidden\")\n\t\t#Look at the carving.\n\t\t\t*label cell_act_VI.2_1\n\t\t\t*set time -1\n\t\t\t*set fatigue +1\n\t\t\tYou spend some time looking at the carving. \n\t\t\t\n\t\t\tIt looks like some kind of artistic work.\n\t\t\t*if (wisdom-(3*fatigue))>=50\n\t\t\t\tSuddenly... you realized that you've seen something like that before. It's a magic portal!\n\t\t\t\t\n\t\t\t\tNow it becomes clear why you didn't recognized it at first, it's unfinished.\n\t\t\t\t\n\t\t\t\t*if (equip_needle=false) and (equip_lockpick=false)\n\t\t\t\t\tIf you only had anything hard enough to finish it up...\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto cell_act_VI\n\t\t\t\t*else\n\t\t\t\t\tBut using that \n\t\t\t\t\t*if (equip_needle=true) or (equip_lockpick=true)\n\t\t\t\t\t\tneedle\n\t\t\t\t\t*if (equip_lockpick=true) and (equip_needle=false)\n\t\t\t\t\t\tlockpick\n\t\t\t\t\tyou can finish the carving and get out of here!\n\t\t\t\t\t*set portal \"unfinished\"\n\t\t\t*if ((wisdom-(3*fatigue))\u003c50) and (fatigue=0)\n\t\t\t\tYou have no idea why is it here.\n\t\t\t*page_break\n\t\t\t*goto cell_act_VI\n\t*if portal=\"unfinished\"\n\t\t#Spend some time finishing the portal.\n\t\t\t*label cell_act_VI.2_2\n\t\t\t*if (equip_needle = true) or (equip_lockpick = true)\n\t\t\t\t*temp temp\n\t\t\t\t*comment DEBUG: Changed the amount of hours spent on single carving from 8 to 6\n\t\t\t\t*set temp 6\n\t\t\t\t*if (time_passed+temp)>cell_next_event\n\t\t\t\t\t*set temp (cell_next_event-time_passed)\n\t\t\t\t*set time -temp\n\t\t\t\t*set fatigue +temp\n\t\t\t\t*set fatigue +2\n\t\t\t\t*set portal_meter +temp\n\t\t\t\t*if skill_know_time = false\n\t\t\t\t\tYou work hard for very long to finish the portal.\n\t\t\t\t*if skill_know_time = true\n\t\t\t\t\tYou spend ${temp} hours working hard to finish the portal.\n\t\t\t\t*if portal_meter>=30\n\t\t\t\t\t\n\t\t\t\t\tYou carve the last line and finally... the portal is finished! But it\n\t\t\t\t\tdoesn't mean it's open...\n\t\t\t\t\t*set portal \"finished\"\n\t\t\t\t*if temp\u003c8\n\t\t\t\t\tYou have to stop, something's going on.\n\t\t\t*if (equip_needle != true) and (equip_lockpick != true)\n\t\t\t\tYou have nothing to finish the carving with. Your fingers surely won't do. You have to find\n\t\t\t\tsomething hard and long.\n\t\t\t*page_break\n\t\t\t*goto cell_act_VI\n\t#Do nothing.\n\t\t*label cell_act_VI.3\n\t\t*temp temp\n\t\t*set temp 4\n\t\t*if (time_passed+temp)>cell_next_event\n\t\t\t*set temp (cell_next_event-time_passed)\n\t\t*set time -temp\n\t\t*set fatigue +1\n\t\t*if time>0\n\t\t\t*if skill_know_time=true\n\t\t\t\t*temp rand_reply\n\t\t\t\t*rand rand_reply 1 4\n\t\t\t\t*if rand_reply=1\n\t\t\t\t\tYou do nothing for ${temp} hours.\n\t\t\t\t*if rand_reply=2\n\t\t\t\t\tYou've successfully wasted ${temp} hours.\n\t\t\t\t*if rand_reply=3\n\t\t\t\t\t${temp} hours pass.\n\t\t\t\t*if rand_reply=4\n\t\t\t\t\tYou walk around your cell for ${temp} hours.\n\t\t\t*if skill_know_time=false\n\t\t\t\tTime passes...\n\t\t*if temp\u003c4\n\t\t\tSomething disturbs your leisure.\n\t\t*goto cell_act_VI\n\t*if fatigue>0\n\t\t#Sleep.\n\t\t\t*label cell_act_VI.4\n\t\t\t*if fatigue\u003c=min_fatigue\n\t\t\t\tYou try to sleep but it's impossible. You're not fatigued enough.\n\t\t\t\t*page_break\n\t\t\t\t*goto cell_act_VI\n\t\t\t*if fatigue>min_fatigue\n\t\t\t\tYou lie yourself on the haystack and fall asleep to regain strength...\n\t\t\t\t*label cell_sleeping\n\t\t\t\t*page_break Sleep\n\t\t\t\t*if spell_infra = true\n\t\t\t\t\t*set spell_infra false\n\t\t\t\t\t*set skill_infravision false\n\t\t\t\t*temp temp\n\t\t\t\t*set temp (fatigue-min_fatigue)\n\t\t\t\t*if (time_passed+temp)>cell_next_event\n\t\t\t\t\t*set temp (cell_next_event-time_passed)\n\t\t\t\t*set time -temp\n\t\t\t\t*set fatigue -(temp+min_fatigue)\n\t\t\t\t*if fatigue\u003c0\n\t\t\t\t\t*set fatigue 0\n\t\t\t\t*if skill_know_time = false\n\t\t\t\t\tYou don't know how long you have slept.\n\t\t\t\t*if skill_know_time = true\n\t\t\t\t\t*if fatigue\u003c=time\n\t\t\t\t\t\tYou have slept for ${temp} hours.\n\t\t\t\t\t*if time\u003cfatigue\n\t\t\t\t\t\tYou have slept for ${temp} hours.\n\t\t\t\t\t*if health\u003c100\n\t\t\t\t\t\t*temp heal\n\t\t\t\t\t\t*set heal endurance/10\n\t\t\t\t\t\t*comment *set heal #0.\n\t\t\t\t\t\t*comment DEBUG *set heal 10\n\t\t\t\t\t\t*set health %+heal\n\t\t\t\t*if fatigue>0\n\t\t\t\t\tSomething woke you up.\n\t\t\t\t*if food=true\n\t\t\t\t\t\n\t\t\t\t\tYou get up and find that the food has disappeared.\n\t\t\t\t\t*if rat_aware = true\n\t\t\t\t\t\t*if intelligence>=30\n\t\t\t\t\t\t\tIt must be that rat.\n\t\t\t\t\t*set food false\n\t\t\t\t*goto cell_act_VI\n\t*if ((rat_meter=0) and (rat_escaped != true)) and ((player_sex = \"female\") and (look>=70))\n\t\t#Ask who's there.\n\t\t\tYou stay motionless waiting for any reply. Then you hear a familiar squeak. It's a rat. \n\t\t\t*set rat_aware true\n\t\t\tAfter it squeaks again you're able to localize it. Rat is crouching in the corner of the room. It\n\t\t\tdoesn't seem to be very scared. Actually you rather have an impression that he(or she?) is looking at you.\n\t\t\t*set rat_meter +1\n\t\t\t*page_break\n\t\t\t*goto cell_act_VI\n\t*if (rat_meter>0) and (rat_meter\u003c3)\n\t\t#Say \"hello\" to the rat.\n\t\t\t*label cell_act_VI.5\n\t\t\tYou say \"hello\" to the rat. He leans his head to the right looking at you.\n\t\t\t*if (player_sex = \"female\") and (look>=70)\n\t\t\t\tAnd it comes closer.\n\t\t\t\t*set rat_meter +2\n\t\t\t\t\n\t\t\t\t*if rat_meter>=3\n\t\t\t\t\tYou don't know why but you're pretty sure that it's a male rat. Maybe that's the way he stares at you?\n\t\t\t\t\tAnyway you think he's hungry.\n\t\t\t\t\t\n\t\t\t\t*if rat_meter\u003c3\n\t\t\t\t\tYou try to touch him, but he runs away.\n\t\t\t\t*page_break\n\t\t\t\t*goto cell_act_VI\n\t\t\t*else\n\t\t\t\tThen he runs away. He obviously didn't like you.\n\t\t\t\t*set rat_meter 0\n\t\t\t\t*page_break\n\t\t\t\t*goto cell_act_VI\n\t*if (rat_meter>=6)\n\t\t#Spend some time with the rat.\n\t\t\t*label cell_act_VI.5_1\n\t\t\t\n\t\t\t*if rat_name = \"\"\n\t\t\t\tThe rat seems to trust you and you seem to like him. It's a good point to name him somehow.\n\t\t\t\t*choice\n\t\t\t\t\t#Let's name it \"Roger\" it's so sweet.\n\t\t\t\t\t\t*set rat_name \"Roger\"\n\t\t\t\t\t\t*goto cell_act_VI.5_1_an\n\t\t\t\t\t#I'll call him \"William Shakespeare\".\n\t\t\t\t\t\t*set rat_name \"William Shakespeare\"\n\t\t\t\t\t\t*goto cell_act_VI.5_1_an\n\t\t\t\t\t#\"Plague\" sounds like a good name to a rat.\n\t\t\t\t\t\t*set rat_name \"Plague\"\n\t\t\t\t\t\t*goto cell_act_VI.5_1_an\n\t\t\t\t\t#I want to call him...\n\t\t\t\t\t\tHow do you want to call him?\n\t\t\t\t\t\t*input_text rat_name\n\t\t\t\t\t\t*goto cell_act_VI.5_1_an\n\t\t\t\t\t#I'm gonna ask about his name.\n\t\t\t\t\t\tYou decide to ask a rat about his name... Are you okay?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Of course! I always talk with the animals.\n\t\t\t\t\t\t\t\t*set sanity %+10\n\t\t\t\t\t\t\t\tThen you're not very surprised when the rat replies with a silent voice \"My name is John III Sobieski.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*set rat_name \"John III Sobieski\"\n\t\t\t\t\t\t\t\t*goto cell_act_VI.5_1_an\n\t\t\t\t\t\t\t*if (magic>0)\n\t\t\t\t\t\t\t\t#Yes I am. And I can sense magic from this rat...\n\t\t\t\t\t\t\t\t\tThen you're not very surprised when the rat replies with a silent voice \"My name is John III Sobieski.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*set rat_name \"John III Sobieski\"\n\t\t\t\t\t\t\t\t\t*goto cell_act_VI.5_1_an\n\t\t\t\t\t\t\t#N-no. I mean yes... I... I don't know. This whole situation makes me feel strange.\n\t\t\t\t\t\t\t\t*set sanity %+20\n\t\t\t\t\t\t\t\t*set rat_name \"John III Sobieski\"\n\t\t\t\t\t\t\t\tYou have an impression that when you ask him for name, the rat replies with a silent voice\n\t\t\t\t\t\t\t\twhich says \"My name is John III Sobieski.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto cell_act_VI.5_1_an\n\t\t\t\t\t\t*goto cell_act_VI.5_1_an\n\t\t\t\t*label cell_act_VI.5_1_an\n\t\t\t\t*if rat_name !=\"John III Sobieski\"\n\t\t\t\t\t*set rat_talk false\n\t\t\t\t\tHe seems to like the name you've gave him. He comes whenever you call him $!{rat_name}.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto cell_act_VI.5_1\n\t\t\t\t*if rat_name = \"John III Sobieski\"\n\t\t\t\t\t*set rat_talk true\n\t\t\t\t\t\"John III Sobieski?\" you ask and, believing it or not, see how a rat nods to confirm. \n\t\t\t\t\t\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto cell_act_VI.5_1\n\t\t\t\t*goto cell_act_VI\n\t\t\tYou decide to spend some time with ${rat_name}.\n\t\t\t*choice\n\t\t\t\t*if (rat_teach_tries \u003c20)\n\t\t\t\t\t#Teach him bringing little things.\n\t\t\t\t\t\t*set rat_teach_tries +1\n\t\t\t\t\t\t*set time -1\n\t\t\t\t\t\tYou tell ${rat_name} to bring you a straw of hay for a few times. Every time you do it,\n\t\t\t\t\t\the goes to the thing, that could be named a matterace by a Spartan,\n\t\t\t\t\t\ttakes one straw in his mouth, and brings it to you.\n\t\t\t\t\t\t*if (100-(15*rat_teach_tries))\u003cintelligence\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tIt's sure that he perfectly understands your spoken orders...\n\t\t\t\t\t\t\t*if rat_teach_tries \u003c3\n\t\t\t\t\t\t\t\tThat means he must understand your language.\n\t\t\t\t\t\t\t\t*set rat_talk \"possible\"\n\t\t\t\t\t\t\t*if rat_teach_tries >=3\n\t\t\t\t\t\t\t\tEither he's very smart or he understands your language.\n\t\t\t\t\t\t\t\t*set rat_talk \"possible\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tAnyway, you don't have to teach him anymore.\n\t\t\t\t\t\t\t*set rat_teach_tries 21\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto cell_act_VI\n\t\t\t\t*if rat_talk = true\n\t\t\t\t\t#Talk with ${rat_name}.\n\t\t\t\t\t\t*label cell_talk_with_rat\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"At last! I thought you'd never ask.\" it's probably the first time when you hear a rat talking. I mean,\n\t\t\t\t\t\tat least, when you're not drunk. \"As you can hear I can speak too.\" his voice is silent, yet high, like\n\t\t\t\t\t\tan opera heard from a very long distance. \"I'm sure you have a lot of questions, for example, why didn't\n\t\t\t\t\t\tI talked to you first... but before I answer to any of them. You have to promise that you'll never try\n\t\t\t\t\t\tto harm me. You promise?\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Yes.\n\t\t\t\t\t\t\t\tAfter you give your word that you'll never ever try to harm him. He continues... \"You've met your\n\t\t\t\t\t\t\t\tneighbour Mr. McLeon, already, right? Well... don't trust him. He's an evil sorcerer who occupied\n\t\t\t\t\t\t\t\tthis cell for quite a long time before you. He's really evil; he's powerful too... What?.. Oh-yes,\n\t\t\t\t\t\t\t\tI had to tell you why didn't I talked to you first, I know that. But you see, it's a bit complicated\n\t\t\t\t\t\t\t\tand you'll have to listen to the whole story to understand, and what's more important, to believe me.\"\n\t\t\t\t\t\t\t\the does something what must be a big inhale for a rat and continues.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"As you may know magic is generally forbidden in this country.\n\t\t\t\t\t\t\t\t*if magic>0\n\t\t\t\t\t\t\t\t\tI can sense some magic in you, so you may know it quite good, actually.\n\t\t\t\t\t\t\t\tIt means that being a sorcerer means being in fact a criminal, and knowing that, you can think about\n\t\t\t\t\t\t\t\tMr. McLeon as a recidivist. I see you don't quite understand what connects me and Mr. McLeon, do you?\"\n\t\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t\t#No, I don't, what is it?\n\t\t\t\t\t\t\t\t\t#Erm...well...\n\t\t\t\t\t\t\t\t\t#Of course I understand!\n\t\t\t\t\t\t\t\t\"Let's make it straight. I was the one who put him into the prison. I mean, when I was a human...\"\n\t\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t\t#You was who?\n\t\t\t\t\t\t\t\t\t#Oh really?\n\t\t\t\t\t\t\t\t\t#That makes sense.\n\t\t\t\t\t\t\t\t\t#I knew it from the beggining!\n\t\t\t\t\t\t\t\t\"Yes... I was a human once, years ago, frankly I don't even know how many... Jan III Sobieski was my\n\t\t\t\t\t\t\t\tname and I was a knight, a great knight - some said, but I don't want to be indecent. Anyway... my job was\n\t\t\t\t\t\t\t\tto find, fight and caputure - or kill, wizards... Hold in mind that they're criminals, so don't think of me\n\t\t\t\t\t\t\t\tas a killer. What?... Sorry I'm talking too much, but it's hard not to talk if you have the first time in ages. \n\t\t\t\t\t\t\t\tBut I'm already about to finish...\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\"So, I was a succesfull sorcerer-hunting-knight and someday I was told that there's a powerful wizard in the\n\t\t\t\t\t\t\t\tkingdom who's practicing magic for some years now and there's no one able to stop him. You're probably right\n\t\t\t\t\t\t\t\tthinking it was Mr. McLeon... I was so full of myself that I thought that I'll easily trace him\n\t\t\t\t\t\t\t\tand put him into jail easily. Unfortunately I was very, very wrong... Every time when I found him, he managed to flee.\n\t\t\t\t\t\t\t\tI've tried to catch him for years, without results. Meanwhile I found a wife and started a family... Ok, ok, it\n\t\t\t\t\t\t\t\tdoesn't matter... Anyway after many years of pursuit I finally found him. You're probably not interested in details,\n\t\t\t\t\t\t\t\tso I'll only tell that I won. He lost his spellbook, his staff, his robes, and all the magic stuff, and he was\n\t\t\t\t\t\t\t\tput into the prison... this prison. To be even more accurate, to this particular cell we are in now. Of course\n\t\t\t\t\t\t\t\the was supposed to be hanged and I had to be the witness. But after many years, it was strange, to feel that it's\n\t\t\t\t\t\t\t\talready over. That the pursuit that lasted so long...\n\t\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t\t#Ekhm...\n\t\t\t\t\t\t\t\t\t#Cut it please!\n\t\t\t\t\t\t\t\t\t#How did you become a rat?\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*set rat_known_magic true\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tGosh how impatient you are! I came here and he managed to curse me into a rat bonding me to him and this place forever. Are you happy now?!\" it seems\n\t\t\t\t\t\t\t\tit's finally the end of this speech.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Ask if there's any possibility to remove the curse.\n\t\t\t\t\t\t\t\t\t\t\"Yes, there's one. It's pretty easy. \n\t\t\t\t\t\t\t\t\t\t*label cell_rat_curse_cure\n\t\t\t\t\t\t\t\t\t\tYou have to kiss me. Then I shall return to my human form.\n\t\t\t\t\t\t\t\t\t\tOf course if you do that to me I'll take you out of here. We, knights, have a privilige to release\n\t\t\t\t\t\t\t\t\t\tone prisoner a year, of course under a word that they won't use magic again. It's not much, isn't it?\"\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t*if magic>0\n\t\t\t\t\t\t\t\t\t\t\t\t#(Lie) No, it's not.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*if intelligence>=45\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tMagic and freedom are worth more than a given word, aren't they?\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto cell_rat_will_you_kiss\n\t\t\t\t\t\t\t\t\t\t\t*if magic>0\n\t\t\t\t\t\t\t\t\t\t\t\t#It's very much for a magic user!\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"So... will you kiss me, or not?\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto cell_to_kiss_or_not_to_kiss\n\t\t\t\t\t\t\t\t\t\t\t#No it's really nothing.\n\t\t\t\t\t\t\t\t\t\t\t\t*label cell_rat_will_you_kiss\n\t\t\t\t\t\t\t\t\t\t\t\t\"I'm glad you see that. So... you'll kiss me, right?\"\n\t\t\t\t\t\t\t\t\t\t\t\t*label cell_to_kiss_or_not_to_kiss\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Yes, if it means that I leave this ugly place.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label cell_rat_promise_leave_cell\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set rat_caught true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"You will. I promise. Do it now, take me in your hand and kiss me!\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tHe's so excited that he almost jumps on your hand.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou are about to kiss a talking rat. You hold it just an inch of your face,\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tbut you can still change your mind.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Do it, kiss him.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label cell_rat_kiss\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou kiss a rat. You kiss a grey, big, old rat, with tiny black eyes\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tand yellow teeth...\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break Epilogue\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set ending_scene \"rat_kiss\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Don't kiss him.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label cell_rat_is_caught\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou're not planning to kiss him, so... what will you do?\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (portal = \"finished\") and (portal_know_rat_needed = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Kill him and use his blood to open the portal.\n\t\t\t\t\t\t n hear you as you whisper \"Do you understand\n\t\t\t\t\t\tmy words ${rat_name}?\" for a couple of seconds you and ${rat_name} watch each other in the eyes...\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto cell_talk_with_rat\n\t\t\t\t*if rat_known_magic = true\n\t\t\t\t\t#Try to catch him.\n\t\t\t\t\t\tYou try to catch ${rat_name}.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou call his name and he comes as usual. However he seems a little nervous and more careful during this\n\t\t\t\t\t\taproach as if he could sense your evil intentions. Anyway...\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto cell_rat_catching_try\n\t\t\t\t*if rat_talk = \"possible\"\n\t\t\t\t\t#Order him to stole Cerberion's keys.\n\t\t\t\t\t\tAfter making yourself sure that Cerberion is asleep, and it's not very because his snoring might be legendary,\n\t\t\t\t\t\tyou tell ${rat_name} to bring you his keys. The rat's big so you're sure that he may succeed. But suprisingly\n\t\t\t\t\t\tfor the first time, when you tell him to bring you something; he refuses. You try to repeat your order a couple\n\t\t\t\t\t\tof times but without result.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThat means you're forced to drop that matter.\n\t\t\t\t\t\t*goto cell_act_VI.5_1\n\t\t\t\t\t\t\n\t\t\t*goto cell_act_VI\n\t*if (portal_know_rat_needed = true) and (food = true)\n\t\t#Lure rat with food and try to catch him.\n\t\t\tYou take the bowl, sit on the haystack and begin eating. After a while you pretend that a large piece of bread falls\n\t\t\ton the floor and you didn't notice. After a meal you lie down on the haystack and try to sleep. At least that's how it\n\t\t\tshould look. And, in fact, you've set an ambush and now you're waiting...\n\t\t\t\n\t\t\t*if (fatigue>=(max_fatigue-fatigue_step))\n\t\t\t\tBut pretending that you're asleep is hard when you're exhausted. You don't even know when it happens, but you've fallen\n\t\t\t\tasleep...\n\t\t\t\t*goto cell_sleeping\n\t\t\t*else\n\t\t\t\tAfter ages of waiting, how you feel, your efforts are finally rewarded. Firstly you hear a squeek, then the quiet footsteps\n\t\t\t\tand finally the sound of crunching. That's the moment you've waited for. Slowly you open your eyes wider and see it. Sitting\n\t\t\t\tin your reach. It's time to act...\n\t\t\t\t*set catching_bonus 40\n\t\t\t\t*goto cell_rat_catching_try\n\t\t\t*page_break\n\t\t\t*goto cell_act_VI\n\t\t\t\t\n\t*if food=true\n\t\t#Eat.\n\t\t\t*label cell_act_VI.6\n\t\t\t*if rat_meter>=3\n\t\t\t\tWhen you close to the bowl with the food. You see your little friend sitting in the corner of your cell again.\n\t\t\t\tHe looks at you with his tiny eyes. You're sure he's very hungry.\n\t\t\t\t\n\t\t\t\tDo you want to feed him?\n\t\t\t\t*choice\n\t\t\t\t\t#Sure, why not it's a poor starving creature.\n\t\t\t\t\t\t*set rat_meter+2\n\t\t\t\t\t\tYou take a piece of bread and lure a creature with it. He comes to you and eats quickly.\n\t\t\t\t\t\t*if food_poisoned = \"deadly\"\n\t\t\t\t\t\t\tYou gave him poisoned food... but surprisingly it doesn't seem to work. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t*if food_poisoned = \"sleeping\"\n\t\t\t\t\t\t\tYou gave him poisoned food... but surprisingly it doesn't seem to work. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t*if rat_meter\u003c6\n\t\t\t\t\t\t\tWhen he finishes. He runs away.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t*if rat_meter>=6\n\t\t\t\t\t\t\tBut after finishing rather then run away; he stays.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t*goto cell_act_VI.6_1\n\t\t\t\t\t#No, he can leave and hunt and I can't.\n\t\t\t\t\t\t*comment UPDATE: Changed rat meter downgrade from -2 to -1\n\t\t\t\t\t\t*set rat_meter-1\n\t\t\t\t\t\t*goto cell_act_VI.6_1\n\t\t\t*label cell_act_VI.6_1\n\t\t\t*if food_poisoned = \"deadly\"\n\t\t\t\tYou ate poisoned food...\n\t\t\t\t*page_break Epilogue\n\t\t\t\t*set ending_scene \"poisoned_yourself\"\n\t\t\t\t*goto_scene ending\n\t\t\t*if food_poisoned = \"sleeping\"\n\t\t\t\tYou ate poisoned food. After a while you feel drowzy and fall asleep...\n\t\t\t\t*set fatigue max_fatigue\n\t\t\t\t*goto cell_sleeping\n\t\t\t*if food_poisoned = \"wc\"\n\t\t\t\tWhen you've already finished eating you've remind yourself that it was poisoned.\n\t\t\t\tWaiting for death or sleep you felt a sudden urge to use that bucket...\n\t\t\t\t\n\t\t\t\tYou've barely managed to take off your ${legs} and ${pelvis} just in time...\n\t\t\t\t\n\t\t\t\tAfter many painful, embarrasing hours, totally exhausted you could finally put your clothes\n\t\t\t\ton. Now you can feel how bad the last few hours did to the... 'climate' of your cell. Eating\n\t\t\t\tpoisoned food is never very smart.\n\t\t\t\t*set fatigue max_fatigue\n\t\t\t\t*set time -4\n\t\t\t\t*goto cell_act_VI\n\t\t\tYou eat the food although it's disgusting.\n\t\t\t*set food false\n\t\t\t*goto cell_act_VI\n\n\t#Do some exercises.\n\t\t*label cell_act_VI.7\n\t\tThere are several types of exercises possible.\n\t\t*choice\n\t\t\t#Push-ups.\n\t\t\t\t*label cell_act_VI.7.1\n\t\t\t\tPush-ups are great way to increase strength.\n\t\t\t\t\n\t\t\t\t*if strength = 0\n\t\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t\t*set next_act \"set_strength\"\n\t\t\t\t\t*set back_scene \"cell\"\n\t\t\t\t\t*set back_act \"cell_act_VI.7.1_aj\"\n\t\t\t\t\t*goto_scene settings\n\t\t\t\t*label cell_act_VI.7.1_aj\n\t\t\t\t*comment JUMP OK\n\t\t\t\t*set exercise \"push-ups\"\n\t\t\t\t*set strength %+10\n\t\t\t\t*goto cell_act_VI.7_1\n\t\t\t#Running.\n\t\t\t\t*label cell_act_VI.7.2\n\t\t\t\tRunning's great to improve endurance.\n\t\t\t\t\n\t\t\t\t*if endurance = 0\n\t\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t\t*set next_act \"set_endurance\"\n\t\t\t\t\t*set back_scene \"cell\"\n\t\t\t\t\t*set back_act \"cell_act_VI.7.2_aj\"\n\t\t\t\t\t*goto_scene settings\n\t\t\t\t*label cell_act_VI.7.2_aj\n\t\t\t\t*comment JUMP OK\n\t\t\t\t*set exercise \"running\"\n\t\t\t\t*set endurance %+10\n\t\t\t\t*goto cell_act_VI.7_1\n\t\t\t#Fitness.\n\t\t\t\t*label cell_act_VI.7.3\n\t\t\t\tFitness helps you develop your dexterity.\n\t\t\t\t\n\t\t\t\t*if dexterity = 0\n\t\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t\t*set next_act \"set_dexterity\"\n\t\t\t\t\t*set back_scene \"cell\"\n\t\t\t\t\t*set back_act \"cell_act_VI.7.3_aj\"\n\t\t\t\t\t*goto_scene settings\n\t\t\t\t*label cell_act_VI.7.3_aj\n\t\t\t\t*comment JUMP OK\n\t\t\t\t*set exercise \"fitness\"\n\t\t\t\t*set dexterity %+10\n\t\t\t\t*goto cell_act_VI.7_1\n\t\t\t#Yoga.\n\t\t\t\t*label cell_act_VI.7.4\n\t\t\t\tI have no idea how can one gain something doing Yoga...\n\t\t\t\t*goto cell_act_VI\n\t\t\t#Fly catching.\n\t\t\t\t*label cell_act_VI.7.5\n\t\t\t\tCatching flies should improve your reflex.\n\t\t\t\t\n\t\t\t\t*if reflex = 0\n\t\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t\t*set next_act \"set_reflex\"\n\t\t\t\t\t*set back_scene \"cell\"\n\t\t\t\t\t*set back_act \"cell_act_VI.7.5_aj\"\n\t\t\t\t\t*goto_scene settings\n\t\t\t\t*label cell_act_VI.7.5_aj\n\t\t\t\t*comment JUMP OK\n\t\t\t\t*set exercise \"fly catching\"\n\t\t\t\t*set reflex %+5\n\t\t\t\t*goto cell_act_VI.7_1\n\t\t*label cell_act_VI.7_1\n\t\t*temp temp\n\t\t*set temp 3\n\t\t*if (time_passed+temp)>cell_next_event\n\t\t\t*set temp (cell_next_event-time_passed)\n\t\t*set time -temp\n\t\t*set fatigue +(2*temp)\n\t\t*if skill_know_time = false\n\t\t\tYou've done some ${exercise}.\n\t\t*if skill_know_time = true\n\t\t\tYou've been\n\t\t\t*if exercise!=\"running\"\n\t\t\t\tdoing\n\t\t\t${exercise} for ${temp} hours.\n\t\t*if temp\u003c3\n\t\t\tSomething interrupts your exercises.\n\t\t*goto cell_act_VI\n\t*if (magic>30) and (torso=\"decorated hooded robe\")\n\t\t#Cast a spell.\n\t\t\t*label cell_act_VI.8\n\t\t\tWhat spell do you like to cast?\n\t\t\t*choice\n\t\t\t\t*if spell_infra!=true\n\t\t\t\t\t#Infravision.\n\t\t\t\t\t\t*label cell_act_VI.8.1\n\t\t\t\t\t\t*if skill_infravision=true\n\t\t\t\t\t\t\tCasting this spell is pointless. You already have no problem seeing in the dark.\n\t\t\t\t\t\t\t*goto cell_act_VI.8\n\t\t\t\t\t\t\n\t\t\t\t\t\t*set skill_infravision true\n\t\t\t\t\t\t*set spell_infra true\n\t\t\t\t\t\tYou close your eyes and speak the words of magic... \"K'rad eht ni... Ees ot Tnawi!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tWhen you open your eyes, you can see as well as the creatures of the night. But you must\n\t\t\t\t\t\tremember that with this spell you will tire faster and that it will fade when you'll go\n\t\t\t\t\t\tto sleep.\n\t\t\t\t\t\t*goto cell_act_VI\n\t\t\t\t*if (magic>50) and (spell_open!=true)\n\t\t\t\t\t#Open Locks.\n\t\t\t\t\t\t*label cell_act_VI.8.2\n\t\t\t\t\t\tThis spell allows caster to open any lock with ${his} touch. However it can't be cast anytime.\n\t\t\t\t\t\tThis spell will only work when cast exactly 2 hours 17 minutes and 48 seconds before noon. The effect\n\t\t\t\t\t\tlasts for exactly... 2 hours 17 minutes and 48 seconds. \n\t\t\t\t\t\t\n\t\t\t\t\t\t*if (time_show = 21) or (temp_time = 21)\n\t\t\t\t\t\t\tIt's the right time. You cast the spell saying the words of magic \"Skcole, Htgnine, Pofore wop eht tnawi!\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou feel the new power.\n\t\t\t\t\t\t\t*set spell_open true\n\t\t\t\t\t\t\t*set time-1\n\t\t\t\t\t\t\t*page_break \n\t\t\t\t\t\t\t*goto cell_act_VI\n\t\t\t\t\t\t\t\n\t\t\t\t\t\tIt's not the right time.\n\t\t\t\t\t\t*set time-1\n\t\t\t\t\t\t*page_break \n\t\t\t\t\t\t*goto cell_act_VI\n\t\t\t\t#I've changed my mind.\n\t\t\t\t\t*label cell_act_VI.8.99\n\t\t\t\t\tYou drop the idea of spellcasting for this moment.\n\t\t\t\t\t*page_break \n\t\t\t\t\t*goto cell_act_VI\n\t\t\t\t\t\n\t*if (mcleon_meter>0)\n\t\t#Talk with Sir McLeon.\n\t\t\t*label cell_act_VI.9\n\t\t\t*if (day_part != \"night\")\n\t\t\t\t*if mcleon_meter\u003c10\n\t\t\t\t\tYou spend some time talking with Mr. McLeon. The topics are irrelevant to your general situation. But you\n\t\t\t\t\tacknowledge some facts about his life what improves your relations. Maybe next time he'll open up more.\n\t\t\t\t\t\n\t\t\t\t\t*if (pelvis = \"kilt\") and (player_sex = \"male\")\n\t\t\t\t\t\tHe often says that he's happy that you both are wearing kilts. Moreover you're both man so you have no\n\t\t\t\t\t\tproblem finding a common language.\n\t\t\t\t\t\t*set mcleon_meter +3\n\t\t\t\t\t*if (pelvis = \"kilt\") and (player_sex = \"female\")\n\t\t\t\t\t\tHe often says that he's happy that you both are wearing kilts.\n\t\t\t\t\t\t*set mcleon_meter +1\n\t\t\t\t\t*set mcleon_meter +1\n\t\t\t\t\t*set time+1\n\t\t\t\t\t*set fatigue +1\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto cell_act_VI\n\t\t\t\t*if (mcleon_meter>=10) and (portal_know_rat_needed = false)\n\t\t\t\t\tMcLeon seems to trust you. When you want to talk to him a little more, he asks you if you've found anything\n\t\t\t\t\tunusual in your cell.\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t*if portal = \"unfinished\"\n\t\t\t\t\t\t\t#Tell that you've found a magic portal.\n\t\t\t\t\t\t*if equip_needle = true\n\t\t\t\t\t\t\t#Tell that you've found a needle in the haystack.\n\t\t\t\t\t\t#Tell that you've found nothing.\n\t\t\t\t\t*if portal = \"hidden\"\n\t\t\t\t\t\t*set portal \"unfinished\"\n\t\t\t\t\tHe tells you that he occupied your cell for some time and that he carved most of the magic portal\n\t\t\t\t\twhich can let anyone who passes it reach any place they want. He tells you that to open\n\t\t\t\t\tthe portal you need the blood of the magic creature. Before you ask, he explains that there is\n\t\t\t\t\ta magic creature in this dungeon, and it's a rat. \n\t\t\t\t\t*set portal_know_rat_needed true\n\t\t\t\t\t\n\t\t\t\t\tWith his instructions you know that after finishing a portal you should catch the rat, kill it and \n\t\t\t\t\tspread his blood on the portal thinking about the place where it should lead to. He adds that besides\n\t\t\t\t\tthe fact that he's old and tired, so he doesn't mind if you don't take him with you. Instead of that \n\t\t\t\t\the asks you not to listen to the rat\n\t\t\t\t\t*if rat_talk!= true\n\t\t\t\t\t\t, whatever it suppose to mean\n\t\t\t\t\t.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto cell_act_VI\n\t\t\t\t*else\n\t\t\t\t\tMcLeon doesn't want to talk with you. He only asks if you've caught the rat already.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto cell_act_VI\n\t\t\t\t\t\n\t\t\t*if (day_part = \"night\")\n\t\t\t\tYou want to talk to Mr. McLeon but when you come near the bars. You can only hear the snoring. I mean that\n\t\t\t\tthe snoring is now doubled, as Cerberion is sleeping as usual.\n\t\t\t\t*page_break\n\t\t\t\t*goto cell_act_VI\n\t\t\t\t\n\t*if cell_gate = \"locked\"\n\t\t#Try to open the gate.\n\t\t\t*label cell_act_VI.10\n\t\t\tHow?\n\t\t\t*choice\n\t\t\t\t*if equip_lockpick = true\n\t\t\t\t\t#With lockpick.\n\t\t\t\t\t\tYou take out your lockpick and begin manipulating with the lock. It doesn't take long till you hear\n\t\t\t\t\t\ta familiar *click*... The door is open.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*set cell_gate \"lockpicked\"\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto cell_act_VI\n\t\t\t\t*if equip_prison_keys = true\n\t\t\t\t\t#With keys.\n\t\t\t\t\t\tYou try the keys which you took from the body of Cerberion. It doesn't take long and the door is open.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*set cell_gate \"unlocked\"\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto cell_act_VI\n\t\t\t\t*if spell_open = true\n\t\t\t\t\t#With magic of Open Locks spell.\n\t\t\t\t\t\tWith the power of the spell you easily unlock the door.\n\t\t\t\t\t\t*set cell_gate \"unlocked\"\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto cell_act_VI\n\t\t\t\t*if strength>75\n\t\t\t\t\t#Bend the bars.\n\t\t\t\t\t\tYou catch two of the bars and begin to pull...\n\t\t\t\t\t\t*temp rand\n\t\t\t\t\t\t*rand rand 1 20\n\t\t\t\t\t\t*if (strength+rand)\u003c95\n\t\t\t\t\t\t\tYour face becomes red from the strain, you try with all your heart but it's all for nothing. You're able to bend\n\t\t\t\t\t\t\tthem a little, but then you have to give up. The change is unnoticable and you're exhausted.\n\t\t\t\t\t\t\t*set fatigue max_fatigue\n\t\t\t\t\t\t\t*set time -1\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto cell_act_VI\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYour face becomes red from the strain as you try with all your heart to bend the gates... at first it seems it's all for nothing\n\t\t\t\t\t\t\t, but something tells you that you shouldn't give up, so you find and unleash the reserve of your might...\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tAnd that's it! You can feel that metal finally gives up and slowly changes its shape. It lasts for seconds but you feel\n\t\t\t\t\t\t\tlike you were pulling these bars for eternity. You barely feel your hands and you feel like breathing with fire, but...\n\t\t\t\t\t\t\tthe gate is open. Not in the way it's designed to be, but still you can leave. I think that's the most important.\n\t\t\t\t\t\t\t*set cell_gate \"bend\"\n\t\t\t\t\t\t\t*set fatigue max_fatigue\n\t\t\t\t\t\t\t*set time -1\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto cell_act_VI\n\t\t\t\t#I have no idea...\n\t\t\t\t\tWell, try again when you will HAVE an idea.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto cell_act_VI\n\t\t\t\n\t*if cell_gate != \"locked\"\n\t\t#Leave the cell.\n\t\t\t*label cell_act_VI.11\n\t\t\tYou walk out of your cell.\n\t\t\t*if alarm>0\n\t\t\t\t*set alarm -1\n\t\t\t*set back_act \"dungeon_act_I\"\n\t\t\t*page_break Interlude: The Dungeon\n\t\t\t*goto_scene dungeon\n\t\n*label cell_act_VII\n*comment Scene 1: Cell, Act VII\n*comment Various things are happening\n\n*if cell_next_event=3\n\t*set cell_next_event 12\n\t*page_break Interlude: Meet Sir Alistair McLeon\n\tThe door at the end of the corridor opens.\n\t\n\tThe voice of the Master of Tortures breaks the silence of the dungeon, as he shouts: \"I'm finished. Let me out!\"\n\t\n\tSoon you can hear footsteps. Mumbling and yawning Cerberion passes your cell and opens the door to, what you have\n\tprobably already guessed, the torture chamber.\n\t\n\t\"Drag him out. He's done.\" says the Master of Tortures. From your cell you can easily see how the old guard drags the body\n\tof a prisoner. He's a human in his mid-fifties, his hair is snow white and he has a big beard. What's interesting,\n\the's wearing a kilt and the linen shirt. \n\t\n\tHe looks terrible but some groans of him tell you that he's still alive. Cerberion puts him in the cell\n\topposite to yours and close the lock.\n\t\n\t\"I present to you... Mr. McLeon.\" says the ever smiling elf \"He'll be your only company for some time.\"\n\t*if tortures=1\n\t\t\"And we'll meet closer tomorrow evening,\"\n\t*if (player_race=\"elf\") and (master_meter=0)\n\t\the adds. \"So rarely I see another of my kind in such a disastrous circumstances\n\t\t*set master_meter +1\n\t\t*if (player_sex=\"female\")\n\t\t\t, not to mention a female\n\t\t\t*set master_meter +1\n\t\t\t*if look>=70\n\t\t\t\tof such a beauty\n\t\t\t\t*set master_meter +1\n\t\t.\" he confess.\n\t\t\n\t*if tortures = 0\n\t\t\"It's sad that we won't meet closer. Farewell.\"\n\the adds and walks away. Cerberion looks at you, then looks at the other prisoner and says:\n\t\"You'll get something to eat in the morning. Now go to sleep,\" then he walks away too.\n\t*page_break Act VI: Back In The Cell\n\t*goto cell_act_VI\n\t\n*if cell_next_event=12\n\t*page_break Interlude: The First Meal\n\t*if tortures=1\n\t\t*set cell_next_event 21\n\t*if tortures!=1\n\t\t*set cell_next_event 36\n\t\"Get up! Breakfast time.\" Cerberion walks down the corridor carrying a pot with something that should be food. It looks\n\tlike a bean... after 12 hours of constant cooking. There's a slice of bread too, it's three days old, at most.\n\t\n\t\"Hey Alistair! Wake up and eat before this cursed rat eats your ration. You look bad even without starving...\" \n\tit sounds like the words of a best friend when Cerberion invites the second prisoner to eat. You can see how\n\the tries to get up for a good minute before succeeding. He looks somehow scary with his clothes soaked\n\twith blood.\n\t\"Don't worry I'm fine regardless of how I look.\" you have heard the warm voice of your neighbour for the first time.\n\t\n\tThen he looked at you for the first time.\n\t*if player_sex = \"female\"\n\t\t\"Good morning Mrs...?\"\n\t\t*set mcleon_meter +2\n\t*if player_sex = \"male\"\n\t\t\"Good morning Mr...?\"\n\t\t*set mcleon_meter +1\n\t*if player_name = \"Unnamed\"\n\t\tIt's a good question... what's your name?\n\t\t*input_text player_name\n\t\n\t\"$!{player_name}, nice to meet you Mr.?\" you ask in reply. \"Sir Alistair McLeon.\"\n\t*if ((player_sex = \"female\") and (player_race = \"human\")) and (look>=66)\n\t\t\n\t\t\"I'm pleased to meet such a charming lady.\" his smile confirmed the compliment.\n\t\t*set mcleon_meter +1\n\t*if pelvis=\"kilt\"\n\t\t\n\t\t\"I see you're wearing a kilt, so we're probably compatriots. That's great finally someone\n\t\tI'll have somebody to talk with.\"\n\t\t*set mcleon_meter +1\n\t\n\t\"Let's eat then.\" he finishes his speech and begins to eat. It seems you'll have to wait if you want to talk with Mr. McLeon.\n\t\n\tMeanwhile Cerberion asks you to bring your bowl closer to the bars. After you do it, he pours your ration in. \n\t*set food true\n\t*if food_poisoned != \"\"\n\t\t*line_break\n\t\tHe just started walking away from your cell when he suddenly staggered like a drunk. He tried to catch the bars of your\n\t\tcell but it's a bit hard to catch anything when you're actually\n\t\t*if food_poisoned = \"deadly\"\n\t\t\tdead.\n\t\t\t*set cerberion_location \"dungeon\"\n\t\t\t*set cerberion_state \"dead\"\n\t\t\t*set karcher_state \"dead\"\n\t\t\t*set bigguy_state \"dead\"\n\t\t\t*set bigguy_location \"living\"\n\t\t\t*set twin_state \"dead\"\n\t\t\t*set twin_location \"living\"\n\t\t*if food_poisoned = \"sleeping\"\n\t\t\tsleeping.\n\t\t\t*set cerberion_location \"dungeon\"\n\t\t\t*set cerberion_state \"asleep\"\n\t\t\t*set karcher_state \"faint\"\n\t\t\t*set bigguy_state \"faint\"\n\t\t\t*set bigguy_location \"living\"\n\t\t\t*set twin_state \"faint\"\n\t\t\t*set twin_location \"living\"\n\t\t\n\t\tThe poison worked! He must've finished eating just before he came here. So there's a big chance that all of the others\n\t\tate at the same time. Anyway through the bars you search the body of Cerberion and find the keys.\n\t\t*set equip_prison_keys true\n\t\t*set cerberion_keys false\n\t*page_break Act VI: Back In The Cell\n\t*goto cell_act_VI\n\t\n*if cell_next_event=21\n\t\t\n\t*page_break Interlude: Tortures\n\tThe sound of unlocked doors break the tranquility of the evening in the dungeon. From your cell you can easily hear the voices of\n\ttwo persons who you've already met, the Master and the big guard. The Master wakes Cerberion. He sounds very excited. All three come\n\tnext to your cell. The Master greets you with a perfect smile and asks: \"Ready to sing, birdie?\"\n\t*fake_choice\n\t\t#Smile.\n\t\t#Stay silent.\n\t\t#Tell him to go to hell.\n\tYou're next told to aproach the bars and turn back. You have no option but to obey. The big guard ties your hands.\n\t*set tied true\n\tThen Cerberion opens your cell and you're led to the torture chamber for the first time. Or maybe not?\n\t*choice\n\t\t#Yes it's my first time in the torture chamber.\n\t\t\tThe torture chambers are places designed to make even the braviest to lose their spirit.\n\t\t\t*set will %-10\n\t\t\t*goto cell_first_tortures_1\n\t\t#No, I've already been to the torture chamber, visiting.\n\t\t\tThen you know what it looks like. However this time all this stuff is there to deliever you pain and not excitement.\n\t\t\tIt's a bit... disturbing.\n\t\t\t*set will %-5\n\t\t\t*goto cell_first_tortures_1\n\t\t#No, I was questioned once in the past.\n\t\t\tDid you confess your sins then?\n\t\t\t*choice\n\t\t\t\t#No.\n\t\t\t\t\tSo probably you're not afraid also this time.\n\t\t\t\t\t*set will %+5\n\t\t\t\t\t*set look %-10\n\t\t\t\t\t*set endurance %+10\n\t\t\t\t\t*goto cell_first_tortures_1\n\t\t\t\t#Yes, it wasn't worth suffering.\n\t\t\t\t\tYou'll have to decide if it's worth this time.\n\t\t\t\t\t*set intelligence %+5\n\t\t\t\t\t*set will %-5\n\t\t\t\t\t*goto cell_first_tortures_1\n\t\t#Oh no, no, no... I may know these tools better then this 'Master'.\n\t\t\tWhat do you mean?\n\t\t\t*choice\n\t\t\t\t#I was a torture master myself, didn't I mentioned before?\n\t\t\t\t\tNo you didn't. Anyway this time you'll be the victim. Good luck.\n\t\t\t\t\t*set will %-5\n\t\t\t\t\t*set sanity %+15\n\t\t\t\t\t*goto cell_first_tortures_1\n\t\t\t\t#I've been tortured hundreds of times. Pain is my true love.\n\t\t\t\t\tOh! I didn't knew that. Well, it seems that your body's covered with many scars.\n\t\t\t\t\tBut the pain pays back for your love, hardening your body and your spirit.\n\t\t\t\t\t*set will %+30\n\t\t\t\t\t*set endurance %+30\n\t\t\t\t\t*set look %-30\n\t\t\t\t\t*set sanity %+20\n\t\t\t\t\t*goto cell_first_tortures_1\n\t*label cell_first_tortures_1\n\t*page_break\n\tYou're inside with both the Master and the big one. It's quite a big room full of equipment gathered here in one purpose:\n\tto make people admit their deeds. The most 'interesting' part of the room is the wooden table with wide leather belts,\n\tcovered with dried blood of, how you may think, hundreds of prisoners. You're ordered to lie down on it. Then you're pinned\n\twith the belts. \"Thank you Goliath. You can leave now.\" says the Master and the big one, named or nicknamed, Goliath leaves.\n\t\n\t\"Finally. I've waited for this moment for so long... I'd like to present myself... Royal Master Torturer Reffus Pian and you're...\n\t*if player_name = \"Unnamed\"\n\t\t?\"\n\t\t*choice\n\t\t\t#Tell him.\n\t\t\t\tYour name is:\n\t\t\t\t*input_text player_name\n\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t*set next_act \"set_called\"\n\t\t\t\t*set back_scene \"cell\"\n\t\t\t\t*set back_act \"cell_first_tortures_1_aj\"\n\t\t\t\t*goto_scene settings\n\t\t\t\t*label cell_first_tortures_1_aj\n\t\t\t\t*comment JUMP OK\n\t\t\t\t*goto cell_first_tortures_2\n\t\t\t#Stay silent.\n\t\t\t\tI see that you'll play tough. Best luck then.\n\t\t\t\t*goto cell_first_tortures_2\t\n\t*if player_name != \"Unnamed\"\n\t\tah yes I remember, \n\t\t*comment JUMP TO SETTINGS\n\t\t*set next_act \"set_called\"\n\t\t*set back_scene \"cell\"\n\t\t*set back_act \"cell_first_tortures_1_aj2\"\n\t\t*goto_scene settings\n\t\t*label cell_first_tortures_1_aj2\n\t\t*comment JUMP OK\n\t\t$!{player_called}.\"\n\t\t\n\t*label cell_first_tortures_2\n\t\"Pleased to meet you...\n\t*if master_meter>=2\n\t\tYou can't probably have the same impression. You must think that I'm a monster, don't you? I don't want you, a lovely elf,\n\t\tto think about me that way, so I have a proposition you can't refuse... I'll untie you and for the three hours instead of\n\t\tsuffering terrible pain you can fulfill my desires... My back really need a good massage. \n\t\tOf couse if you, for some reason, refuse me... then of course it'll be my duty to show you my worse side. So?\"\n\t\t*choice\n\t\t\t#Agree to the proposition.\n\t\t\t\tHe's very happy with your decision. He says that you won't regret it and soon he unties you and, after preparing\n\t\t\t\thimself for a massage, he takes your place on the table.\n\t\t\t\t\n\t\t\t\t*goto cell_master_massage\n\t\t\t\t\n\t\t\t#Disagree.\n\t\t\t\t*set master_meter 0\n\t\t\t\t\"What a pity... It will be a great pain for you of course, but also for me, if I must damage such a lovely body.\n\t\t\t\t*goto cell_first_tortures_3\n\t*if master_meter\u003c2\n\t\t*label cell_first_tortures_3\n\t\tBut enough of this sweet talk. We have some work to do...\" it's unbelievable but his face changed in a second. \n\t\tNow, instead of a smile, you can see a twisted grimace of true evilness. \n\t\t\n\t\tHe starts preparing the tools. Cutters,\n\t\tbonesaw, nails, scissors and... feather. You're almost sure he'll start in a moment, when his face turns back to\n\t\tnormal and he asks \"I nearly forgotten... You have a possibility to admit to all of what you're accused now. Do you admit?\"\n\t\t*choice\n\t\t\t#Yes!\n\t\t\t\t\"What did you say?\" he asks again. And when he hears your reply you can see his face turning evil once a
