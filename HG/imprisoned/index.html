<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Imprisoned — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "imprisoned", "title": "Imprisoned", "scenes": {"arrest": "*comment Copyright 2010 by Myth Thrazz (http://mythgames.pl)\n\n*comment **************\n*comment TEMP VARIABLES\n\n*temp karcher\n*set karcher \"the interrogator\"\n\n*temp anger\n*set anger 0\n*comment If this reaches 50 he loses control\n\n*temp attack_by_surprise\n*set attack_by_surprise false\n\n*temp murder\n*set murder 0\n\n*temp theft \n*set theft 0\n\n*temp use_of_magic\n*set use_of_magic 0\n\n*temp wide_specialized_thief\n*set wide_specialized_thief false\n\n*temp ask\n*set ask \"\"\n\n*temp go_first\n*set go_first true\n\n*comment **************\n\n*gotoref back_act\n*comment We want to be able to get back to this scene, that's why this reference\n\n*label cell_act_I\n*comment QUICKTEST ONLY\n*if false\n\t*goto arrest_act_I\n*if false\n\t*goto give_back_keys\n*bug QUICKTEST REDIRECT TEST END\n\n*label arrest_act_I\n*comment Scene 2: Arrest, Act I\n*comment Player's character reminds him/her the scene of interrogation.\n\nYou remember a small candlelit room with a desk.  A huge man is sitting in an armchair and reading some papers. \n\nYou're standing in front of him with your arms tied hard at your back. You assume that big, stinky guard that brought you here must be\njust behind the door.\n\nAfter a while the man behind the desk asks you with deep, commanding voice:\n\n\"Name?\"\n*page_break\n\nThat's the first time you've actually talked with anyone (I'm just the Storyteller), \nso I'd like to know one more thing about you before you reply. (namely, your Intelligence) \n*comment JUMP TO SETTINGS\n*set next_act \"set_int\"\n*set back_scene \"arrest\"\n*set back_act \"arrest_I_aj\"\n*goto_scene settings\n*label arrest_I_aj\n*comment JUMP OK\n\n\"Name?\" asks the questioning officer.\n*choice\n\t#My name?\n\t\t*label arrest_I.1\n\t\t\"Of course yours you dumb piece of shit! Give me your fuckin name!\"\n\t\t*set sanity %+5\n\t\t*choice\n\t\t\t#Fuck you!\n\t\t\t\t*label arrest_I.1.1\n\t\t\t\t*goto arrest_I.2\n\t\t\t*if intelligence > 30\n\t\t\t\t#You'll pay for calling me like that...\n\t\t\t\t\t*label arrest_I.1.2\n\t\t\t\t\t*if will=0\n\t\t\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t\t\t*set next_act \"set_will\"\n\t\t\t\t\t\t*set back_scene \"arrest\"\n\t\t\t\t\t\t*set back_act \"arrest_I.1.2_aj\"\n\t\t\t\t\t\t*goto_scene settings\n\t\t\t\t\t*label arrest_I.1.2_aj\n\t\t\t\t\t*comment JUMP OK\n\t\t\t\t\t*set will %+10\n\t\t\t\t\t\n\t\t\t\t\t*if charisma=0\n\t\t\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t\t\t*set next_act \"set_charisma\"\n\t\t\t\t\t\t*set back_scene \"arrest\"\n\t\t\t\t\t\t*set back_act \"arrest_I.1.2_aj2\"\n\t\t\t\t\t\t*goto_scene settings\n\t\t\t\t\t*label arrest_I.1.2_aj2\n\t\t\t\t\t*comment JUMP OK\n\t\t\t\t\t*set charisma %+5\n\t\t\t\t\t\n\t\t\t\t\t*if (charisma+will)>125\n\t\t\t\t\t\tEven being aware that you're tied up he looked at you with some sort of respect... or even fear?\n\t\t\t\t\t\t*comment JUMP TO EQUIPMENT\n\t\t\t\t\t\t*set next_act \"set_equipment\"\n\t\t\t\t\t\t*set back_scene \"arrest\"\n\t\t\t\t\t\t*set back_act \"arrest_I.1.2_aj3\"\n\t\t\t\t\t\t*goto_scene equipment\n\t\t\t\t\t\t*comment JUMP OK\n\t\t\t\t\t*else\n\t\t\t\t\t\tMaybe someday he somehow will pay for calling you ekhm... \"dumb piece of shit\" but now he just looks and laughs at you.\n\t\t\t\t\t\t*set sanity %+10\n\t\t\t\t\t\t*comment JUMP TO EQUIPMENT\n\t\t\t\t\t\t*set next_act \"set_equipment\"\n\t\t\t\t\t\t*set back_scene \"arrest\"\n\t\t\t\t\t\t*set back_act \"arrest_I.1.2_aj3\"\n\t\t\t\t\t\t*goto_scene equipment\n\t\t\t\t\t\t*comment JUMP OK\n\t\t\t\t\n\t\t\t\t\t*label arrest_I.1.2_aj3\n\t\t\t\t\t*if (charisma+will)\u003c125\n\t\t\t\t\t\t\"Look what we have here. Bound like a pig yet so self confident...\" He is rather amused with your self-confidence\n\t\t\t\t\t\tthen scared.\n\t\t\t\t\t\t\n\t\t\t\t\t\"May I then know why I'll pay for calling you a piece of shit?\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Cause I'm the Chosen One! ne. I know it seems a little bit\n\t\t\t\t\t\t\t\t\t\tcareless but you don't feel that they made any steps to prevent you from casting spells...\n\t\t\t\t\t\t\t\t\t\texcept of tying your hands at your back which... well it actually does the trick.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tAnyway your magic still works passively, he's a little bit startled. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"I'm sorry I shouldn't call you like that. I just want to know your name.\" \n\t\t\t\t\t\t\t\t\t\t*goto arrest_name_last_chance\n\t\t\t\t\t\t\t\t\t*set anger +5\n\t\t\t\t\t\t\t\t\t\"Yeah and I'm actually a Golden Dragon! Hahahahah...\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tHe doesn't seem to believe you. Maybe that's because\n\t\t\t\t\t\t\t\t\tyou didn't say it like you really believe it yourself or maybe it's because you're not actually dressed\n\t\t\t\t\t\t\t\t\tlike a proper magic user. \n\t\t\t\t\t\t\t\t\tHe'll be surprised if he knows the truth somehow. \n\t\t\t\t\t\t\t\t\t*if magic > 60\n\t\t\t\t\t\t\t\t\t\tI bet he'll be DEAD serious then. \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\"I give you one more chance to let me know your name. And I wouldn't advise you to lie again...\"\n\t\t\t\t\t\t\t\t\t*goto arrest_name_last_chance\n\t\t\t\t\t\t\t\t#Me and magic? No way! It's a bluff.\n\t\t\t\t\t\t\t\t\t*label arrest_I.1.2.3.2\n\t\t\t\t\t\t\t\t\t*set magic 1\n\t\t\t\t\t\t\t\t\t*if (charisma>=80) or (torso = \"decorated hooded robe\")\n\t\t\t\t\t\t\t\t\t\t*set anger-10\n\t\t\t\t\t\t\t\t\t\t*if charisma\u003c80\n\t\t\t\t\t\t\t\t\t\t\tI don't know why are you dressed in a ${torso} then but it helped you\n\t\t\t\t\t\t\t\t\t\t\tmake ${karcher} uncertain.\n\t\t\t\t\t\t\t\t\t\tYour bluff works, he's a little bit startled. Nobody warned him that\n\t\t\t\t\t\t\t\t\t\tyou're some sort of magic-gifted-one and nobody said you're definitely not.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"I'm sorry I shouldn't call you like that. I just want to know your name.\" \n\t\t\t\t\t\t\t\t t anger+5\n\t\t\"Fine smartass you'll rot in dungeon anonymously.\"\n\t\t*goto arrest_act_II\n\t\t\n\t\t\n*label arrest_bad_girl\n*label arrest_want_to_fuck\n*label arrest_silent_threat\n\n*label arrest_act_II\n*comment Scene 2: Arrest, Act II\n*comment Player's character is provided informations about there are several 'reasons' why they're inprisoned\n\n*if equiped = false\n\tAs you speak your name, the warden looks at you for the first time.\n\t*comment JUMP TO EQUIPMENT\n\t*set next_act \"set_equipment\"\n\t*set back_scene \"arrest\"\n\t*set back_act \"arrest_II_aj\"\n\t*goto_scene equipment\n\t*label arrest_II_aj\n\t*comment JUMP OK\n\n*comment JUMP TO SETTINGS\n*set next_act \"set_called\"\n*set back_scene \"arrest\"\n*set back_act \"arrest_II_aj2\"\n*goto_scene settings\n*label arrest_II_aj2\n*comment JUMP OK\n\n*page_break Act II: What Have You Done?\n\n\"Do you, ${player_called}, know what are you accused of?\"\n*choice\n\t#I'm innocent!\n\t\t*label arrest_act_II.1\n\t\t*if charisma>90\n\t\t\t\"I don't say you're not innocent but you must be aware that there must be a reson why you're here, aren't you?\"\n\t\t\t*goto arrest_act_II.1a\n\t\t*if charisma>50\n\t\t\t\"Maybe you are, maybe not. I'm not the one to judge you. The fact is that you've been arrested.\"\n\t\t\t*goto arrest_act_II.1a\n\t\t*else\n\t\t\t\"Nobody's innocent so surely you're not.\"\n\t\t\t*goto arrest_act_II.1a\n\t\t*label arrest_act_II.1a\n\t\t*choice\n\t\t\t#I'm sure it's a mistake I'm a good citizen!\n\t\t\t\t*label arrest_act_II.1.1\n\t\t\t\t\"Either you just lie or you're not as good as you think you are.\"\n\t\t\t\t\n\t\t\t\tHe looks back at the papers and says:\n\t\t\t\t\n\t\t\t\t*label arrest_act_II.1.1a\n\t\t\t\t\"There are actually several charges against you...\"\n\t\t\t\t\n\t\t\t\t*goto arrest_act_III\n\t\t\t\t\n\t\t\t#You can accuse me of anything I won't admit it anyway.\n\t\t\t\t*label arrest_act_II.1.2\n\t\t\t\t\"You won't admit now, you will do it during tortures, for me it's not a big difference.\"\n\t\t\t\t\n\t\t\t\tHe speaks looking back at something that may be your files.\n\t\t\t\t\n\t\t\t\t*goto arrest_act_II.1.1a\n\t\t\t*if wisdom>75\n\t\t\t\t#Come on, prove that I'm NOT innocent then.\n\t\t\t\t\t*label arrest_act_II.1.3\n\t\t\t\t\t\"You're a wise guy, aren't you?\"\n\t\t\t\t\t\n\t\t\t\t\tHe pauses for a short while staring at you. Then he looks back at the sheets of paper\n\t\t\t\t\tthat lay all over the desk and continues:\n\t\t\t\t\t \n\t\t\t\t\t\"But I got some bad news for you. Fact that you're here means that there probably are some evidence or \n\t\t\t\t\twitnesses of your crimes. But seriously, I don't care, I just do my job.\"\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#Crimes? You said 'crimes' not 'crime'?\n\t\t\t\t\t\t#That's impossible!\n\t\t\t\t\t\t#SOME evidence? WITNESSES ?! C R I M E S ?!?\n\t\t\t\t\tYou're not deaf nor he speaks Norwegian it was definitely plural. Seems like either you've messed real good or\n\t\t\t\t\tsomeone's trying to set you up.\n\t\t\t\t\t\n\t\t\t\t\t*goto arrest_act_II.1.1a\n\t#No. But I'm sure you gonna tell me.\n\t\t*label arrest_act_II.2\n\t\t\"I will.\"\n\t\t\n\t\tHe takes one of the papers from desks and reads it for a while then speaks:\n\t\t\n\t\t*goto arrest_act_II.1.1a\n\t#Perhaps I do.\n\t\t*label arrest_act_II.3\n\t\t*if will=0\n\t\t\t*comment JUMP TO SETTINGS\n\t\t\t*set next_act \"set_will\"\n\t\t\t*set back_scene \"arrest\"\n\t\t\t*set back_act \"arrest_act_II.3.1.1_aj2\"\n\t\t\t*goto_scene settings\n\t\t*label arrest_act_II.3.1.1_aj2\n\t\t*comment JUMP OK\n\t\t*set anger -10\n\t\t\"What a surprise!\"\n\t\t\n\t\tHe smiles. It looks like he's really surprised.\n\t\t\n\t\t\"It's not often to hear people admit they're guilty even before they see instruments of torture.\"\n\t\t*choice\n\t\t\t#I didn't admit anything.\n\t\t\t\t*label arrest_act_II.3.1\n\t\t\t\t\"Stop fooling around!\" - He shouts.\n\t\t\t\t\n\t\t\t\t\"You've said that you know what you're accused of will you deny it?\"\n\t\t\t\t*choice\n\t\t\t\t\t#There's a slight difference between having suspicions about the reason of being arrested and admitting a crime you know?\n\t\t\t\t\t\t*label arrest_act_II.3.1.1\n\t\t\t\t\t\t*if wisdom=0\n\t\t\t\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t\t\t\t*set next_act \"set_wisdom\"\n\t\t\t\t\t\t\t*set back_scene \"arrest\"\n\t\t\t\t\t\t\t*set back_act \"arrest_act_II.3.1.1_aj\"\n\t\t\t\t\t\t\t*goto_scene settings\n\t\t\t\t\t\t*label arrest_act_II.3.1.1_aj\n\t\t\t\t\t\t*comment JUMP OK\n\t\t\t\t\t\t*set wisdom %+5\n\t\t\t\t\t\t*set anger +5\n\t\t\t\t\t\t*if anger >= 50\n\t\t\t\t\t\t\t\"I have enough of your insolence it's time to learn you some respect!\"\n\t\t\t\t\t\t\tHe shouts and stands up from his armchair rapidly and begins to move towards you.\n\t\t\t\t\t\t\tHis face tells you that intentionally or not you've made him mad.\n\t\t\t\t\t\t\t*goto fight\n\t\t\t\t\t\t*if charisma \u003c 80\n\t\t\t\t\t\t\t*set will %-5\n\t\t\t\t\t\t\t\"I'm the one who asks questions here!\" - Loud shout of ${karcher} makes him a little more scarier.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"You'll have to answer sooner or later.\" \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"And you really can save yourself whole lot of suffering if you do it now ${player_called}.\" - He adds.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto arrest_act_III\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"Maybe you're right ${player_called} I'm tired so I'll go straight to my point. \n\t\t\t\t\t\tBut with all respect if you won't cooperate you'll push me to use force. Did I post myself clear ${player_called}?\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou're quite sure that he isn't joking. \n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Yes.\n\t\t\t\t\t\t\t\t*set anger -5\n\t\t\t\t\t\t\t\t\"Good. Let's get to the charges then.\"\n\t\t\t\t\t\t\t\t*goto arrest_act_III\n\t\t\t\t\t\t\t#Go to hell!\n\t\t\t\t\t\t\t\t*set anger 50\n\t\t\t\t\t\t\t\t\"You'll have to wait there for me punk!\" He shouts and rushes at you with his bare fists.\n\t\t\t\t\t\t\t\t*goto fight\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t*if (will > 50)\n\t\t\t\t\t\t#I've said \"Perhaps\"... Have your scholars missed in a process of your education?\n\t\t\t\t\t\t\t*label arrest_act_II.3.1.2\n\t\t\t\t\t\t\t*set anger +10\n\t\t\t\t\t\t\t*if (anger >= 50) and (charisma \u003c 95)\n\t\t\t\t\t\t\t\tIf your point was to provoke him to violence you did well. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tHe rushes towards you with not-so-friendly grin on his rather red face.\n\t\t\t\t\t\t\t\t*goto fight\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*if (anger > 30) and (intelligence > 40)\n\t\t\t\t\t\t\t\t\tIt doesn't need a psychologist to see that ${karcher} is really mad. His face is red and sweat\n\t\t\t\t\t\t\t\t\this hands are trembling but it seems that he recognized your authority. Nevertheless it's surely\n\t\t\t\t\t\t\t\t\tthe only that holds him back from beating your ass.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tHe mumbles something you can't hear for a longer while then he clears his throat and says:\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"The procedure says that it's my duty to acknowledge you with the act of prosecution. I'm tired\n\t\t\t\t\t\t\t\tand you'll surely have a plenty of occasions to admit to the crimes you did or did not commit.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto arrest_act_II.1.1a\n\t\t\t\t\t\t\t\n\t\t\t\t\t#No I won't. I think someone is setting me up and I think I know who...\n\t\t\t\t\t\t*label arrest_act_II.3.1.3\n\t\t\t\t\t\t*set sanity %+5\n\t\t\t\t\t\tThat sounds a bit paranoic. Anyway ${karcher} asks you:\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Who then? Tell me the name.\"\n\t\t\t\t\t\t*input_text adversary\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if (adversary!=\"Karcher\") and (adversary!=player_name)\n\t\t\t\t\t\t\tHe writes \"$!{adversary}\" on the side of the paper and assures you that they will check this out.\n\t\t\t\t\t\t\tIt's up to you to believe him or not. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto arrest_act_II.1.1a\n\t\t\t\t\t\t*if adversary=\"Karcher\"\n\t\t\t\t\t\t\tHe looks at you strangely for a while and then proceeds to the next question.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto arrest_act_II.1.1a\n\t\t\t\t\t\t*if adversary=player_name\n\t\t\t\t\t\t\t$!{karcher} raises his eyebrow as you speak your own name. And writes something down\n\t\t\t\t\t\t\ton one of the documents then proceeds to the next question.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto arrest_act_II.1.1a\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t*if will\u003c75\n\t\t\t\t#I can't even handle a thought of tortures.\n\t\t\t\t\t*label arrest_act_II.3.2\n\t\t\t\t\t*set will %-30\n\t\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t\t*set next_act \"set_called\"\n\t\t\t\t\t*set back_scene \"arrest\"\n\t\t\t\t\t*set back_act \"arrest_act_II.3.2_aj\"\n\t\t\t\t\t*goto_scene settings\n\t\t\t\t\t*label arrest_act_II.3.2_aj\n\t\t\t\t\t*comment JUMP OK\n\t\t\t\t\t\"You're not very brave, are you?\" \n\t\t\t\t\t\n\t\t\t\t\tHe said after he laughed at you. \n\t\t\t\t\t\n\t\t\t\t\t\"All in all we'll pass through this a bit quicker and who knows, maybe it will make you live a little bit longer. \n\t\t\t\t\tLet's get back to the point.\"\n\t\t\t\t\t\n\t\t\t\t\t*goto arrest_act_II.1.1a\n\n*label arrest_act_III\n*comment Scene 2: Arrest, Act III\n*comment Player's character knows the first charge \"a murder\"\n\n*page_break Act III: Charges\n\nBy now you must know that what you choose determines who you really are. That's very important cause\nyou'll be posted some *facts* and you must be sure that you decide if they're true or false.\n\n\"First of all you are charged with a murder. Do you ${player_called} admit it?\"\n*choice\n\t#No I didn't kill anyone.\n\t\t*label arrest_actIII.1\n\t\t*set murder 0\n\t\tYou see ${karcher} writes something and mumbles: \"Did not admit.\"\n\t\t\n\t\t*goto arrest_act_IV\n\t#A murder? What murder? I've killed some creatures in my life but they're mostly bandits or monsters.\n\t\t*label arrest_actIII.2\n\t\tHow can you be sure they were all bandits?  Bandits have families too, and they not be very happy\n\t\twith you killing their family members. Did you ever think of that? \n\t\t*choice\n\t\t\t#Perhaps you're right. Even if I didn't killed any saints there still are many people who might accuse me just for sake of personal revenge.\n\t\t\t\t*label arrest_actIII.2.1\n\t\t\t\tI'm glad that you can understand my point. Still the question is: \"Will you admit to a murder, or not?\"\n\t\t\t\t*choice\n\t\t\t\t\t#Yes I'll admit it.\n\t\t\t\t\t\t*label arrest_actIII.2.1.1\n\t\t\t\t\t\t*set murder 1\n\t\t\t\t\t\t*goto arrest_actIII.3\n\t\t\t\t\t#No. I won't admit to a murder.\n\t\t\t\t\t\t*label arrest_actIII.2.1.2\n\t\t\t\t\t\t*goto arrest_actIII.1\n\t\t\t#I'm sure I didn't killed anyone who didn't deserve it.\n\t\t\t\t*label arrest_actIII.2.2\n\t\t\t\tThat doesn't mean YOU do not deserve to be imprisoned. Anyway, will you admit to a murder or not?\n\t\t\t\t*choice\n\t\t\t\t\t#Yes I'll admit it though I think I'm not guilty.\n\t\t\t\t\t\t*label arrest_actIII.2.2.1\n\t\t\t\t\t\t*set murder 1\n\t\t\t\t\t\t*goto arrest_actIII.3\n\t\t\t\t\t#No. I won't admit to a murder that I didn't commit.\n\t\t\t\t\t\t*label arrest_actIII.2.2.2\n\t\t\t\t\t\t*goto arrest_actIII.1\n\t#Yes I'm a walking, talking, bloody killing machine.\n\t\t*set murder 2\n\t\t*label arrest_actIII.3\n\t\tYou say that you admit and ${karcher} nods his head and writes something down saying: \"Charged admit to a murder.\"\n\t\t*goto arrest_act_IV\n\t\t\n*label arrest_act_IV\n*comment Scene 2: Arrest, Act IV\n*comment Player's character knows about second charge \"theft\"\n\nThen you're charged with a theft and again asked for admission. What's your reaction?\n*choice\n\t#I admit it. Everyone steals this way or another.\n\t\t*label arrest_act_IV.1\n\t\tYou see that ${karcher} nods \n\t\t*if murder>0\n\t\t\tagain\n\t\twhile writing down your testimony.\n\t\t\n\t\tLet me get back to your statement though. Even if that was truth not everyone\n\t\tis charged with that and you are. It's not so important for ${karcher} cause all he'd want \n\t\tto ever hear from you now is \"Yes/No\" but I'd like to know about this theft. You're a real \n\t\tthief or you just happened to take some apples from a random stall?\n\t\t*choice\n\t\t\t#To be honest I'm a professional thief indeed.\n\t\t\t\t*label arrest_act_IV.1.1\n\t\t\t\tOh really? That's a surprise. I thought you're some sort of hero, a nice guy and you're\n\t\t\t\ta criminal. Shame on you ${player_called}! \n\t\t\t\t\n\t\t\t\tI'm kidding. Relax. As a thief you're probably agile and quick, aren't you?\n\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t*set next_act \"set_dexterity\"\n\t\t\t\t*set back_scene \"arrest\"\n\t\t\t\t*set back_act \"arrest_act_IV.1.1_aj\"\n\t\t\t\t*goto_scene settings\n\t\t\t\t*label arrest_act_IV.1.1_aj\n\t\t\t\t*comment JUMP OK\n\t\t\t\t\n\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t*set next_act \"set_reflex\"\n\t\t\t\t*set back_scene \"arrest\"\n\t\t\t\t*set back_act \"arrest_act_IV.1.1_aj2\"\n\t\t\t\t*goto_scene settings\n\t\t\t\t*label arrest_act_IV.1.1_aj2\n\t\t\t\t*comment JUMP OK\n\t\t\t\t\n\t\t\t\tAnd what type of theft exactly do you practice?\n\t\t\t\t*choice\n\t\t\t\t\t#Pickpocketing.\n\t\t\t\t\t\t*label arrest_act_IV.1.1.1\n\t\t\t\t\t\t*set theft 2\n\t\t\t\t\t\t*set skill_pickpocketing true\n\t\t\t\t\t\t*set player_skillcount +1\n\t\t\t\t\t\t*set player_skillpoints -1\n\t\t\t\t\t\t*set dexterity %+10\n\t\t\t\t\t\t*set reflex %+10\n\t\t\t\t\t\tNow I know all that I wanted.\n\t\t\t\t\t\t\n\t\t\t\t\t\tPickpocketing skill aquired.\n\t\t\t\t\t\t\n\t\t\t\t\t\tWait... where's my wallet? You...\n\t\t\t\t\t\tOh... wrong pocket, sorry. Let's proceed.\n\t\t\t\t\t\t*goto arrest_act_V\n\t\t\t\t\t*if player_skillpoints >=2\n\t\t\t\t\t\t#Armed robbery.\n\t\t\t\t\t\t\t*label arrest_act_IV.1.1.2\n\t\t\t\t\t\t\tThat means you surely have some weapon of choice. What is it?\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Good old crossbow.\n\t\t\t\t\t\t\t\t\t*label arrest_act_IV.1.1.2.1\n\t\t\t\t\t\t\t\t\t*set player_skillpoints -1\n\t\t\t\t\t\t\t\t\t*set skill_weapon \"crossbow\"\n\t\t\t\t\t\t\t\t\t*set player_skillcount +1\n\t\t\t\t\t\t\t\t\tDeath from a distance. Good choice. But it's very unlikely you can get one here in dungeon.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tCrossbow fighting skill aquired.\n\t\t\t\t\t\t\t\t\t*goto arrest_act_IV.1.1.2_1\n\t\t\t\t\t\t\t\t#Knives.\n\t\t\t\t\t\t\t\t\t*label arrest_act_IV.1.1.2.2\n\t\t\t\t\t\t\t\t\t*set player_skillpoints -1\n\t\t\t\t\t\t\t\t\t*set skill_weapon \"knife\"\n\t\t\t\t\t\t\t\t\t*set player_skillcount +1\n\t\t\t\t\t\t\t\t\tThrow, stab or cut throats? Good choice. And you still have a fair chance of getting one.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tKnife fighting skill aquired. \n\t\t\t\t\t\t\t\t\t*goto arrest_act_IV.1.1.2_1\n\t\t\t\t\t\t\t\t*if luck>90\n\t\t\t\t\t\t\t\t\t#Shuriken and katana.\n\t\t\t\t\t\t\t\t\t\t*label arrest_act_IV.1.1.2.3\n\t\t\t\t\t\t\t\t\t\t*set player_skillpoints -2\n\t\t\t\t\t\t\t\t\t\t*set skill_weapon \"ninja\"\n\t\t\t\t\t\t\t\t\t\t*set player_skillcount +2\n\t\t\t\t\t\t\t\t\t\tWOW! A real ninja! Awesome choice. If you only could get any of these here in prison...\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tNinja skills aquired.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*goto arrest_act_IV.1.1.2_1\n\t\t\t\t\t\t\t*label arrest_act_IV.1.1.2_1\n\t\t\t\t\t\t\t*comment I have no idea if there's a need to put something more here\n\t\t\t\t\t\t\t*if wide_specialized_thief = true\n\t\t\t\t\t\t\t\t*goto arrest_act_IV.1.1.4_1\n\t\t\t\t\t\t\t*goto arrest_act_V\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t#Burglary.\n\t\t\t\t\t\t*label arrest_act_IV.1.1.3\n\t\t\t\t\t\tSo you're a burglar. The further the better. \n\t\t\t\t\t\tSo you probably have to be quite strong to carry all the 'borrowed' stuff am I right?\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if strength = 0\n\t\t\t\t\t\t\t*comment JUMP TO SETTINGS\n\t\t\t\t\t\t\t*set next_act \"set_strength\"\n\t\t\t\t\t\t\t*set back_scene \"arrest\"\n\t\t\t\t\t\t\t*set back_act \"arrest_act_IV.1.1.1_aj2\"\n\t\t\t\t\t\t\t*goto_scene settings\n\t\t\t\t\t\t*label arrest_act_IV.1.1.1_aj2\n\t\t\t\t\t\t*comment JUMP OK\n\t\t\t\t\t\t\n\t\t\t\t\t\tTell me how do you get to the buildings? Through the door? Or in some other way?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*if strength>75\n\t\t\t\t\t\t\t\t#Usually I breakdown the door.\n\t\t\t\t\t\t\t\t\t*label arrest_act_IV.1.1.3.1\n\t\t\t\t\t\t\t\t\t*set strength %+20\n\t\t\t\t\t\t\t\t\tSo you're rather brute than stealth, that's ok but seems you're in trouble\n\t\t\t\t\t\t\t\t\tI bet that's because of all the mess with changing doors, keys etc. But \n\t\t\t\t\t\t\t\t\tyou must knew the risk when choosing this 'career'. \n\t\t\t\t\t\t\t\t\t*goto arrest_act_V\n\t\t\t\t\t\t\t*if (dexterity>75) and (player_skillpoints >0)\n\t\t\t\t\t\t\t\t#I climb through the roof or some window.\n\t\t\t\t\t\t\t\t\t*label arrest_act_IV.1.1.3.2\n\t\t\t\t\t\t\t\t\t*set dexterity %+10\n\t\t\t\t\t\t\t\t\t*set skill_climbing true\n\t\t\t\t\t\t\t\t\t*set player_skillpoints -1\n\t\t\t\t\t\t\t\t\t*set player_skillcount +1\n\t\t\t\t\t\t\t\t\tHmmm... so you can climb then... well I can't imagine how could you make any\n\t\t\t\t\t\t\t\t\tuse of it here in jail but who knows. \n\t\t\t\t\t\t\t\t\t*goto arrest_act_V\n\t\t\t\t\t\t\t*if (dexterity>50) and (player_skillpoints >0)\n\t\t\t\t\t\t\t\t#I lockpick the door.\n\t\t\t\t\t\t\t\t\t*label arrest_act_IV.1.1.3.3\n\t\t\t\t\t\t\t\t\t*set dexterity %+5\n\t\t\t\t\t\t\t\t\t*set skill_lockpicking true\n\t\t\t\t\t\t\t\t\t*set player_skillpoints -1\n\t\t\t\t\t\t\t\t\t*set player_skillcount +1\n\t\t\t\t\t\t\t\t\tLockpicking skill aquired.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tMaster of lockpick, huh? I hope you have yours with you?\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#No they took it away already...\n\t\t\t\t\t\t\t\t\t\t\t*label arrest_act_IV.1.1.3.3.1\n\t\t\t\t\t\t\t\t\t\t\tAwwww... what a pity. Not a big chance for a lockpick in prison as fair as I know.\n\t\t\t\t\t\t\t\t\t\t\t*goto arrest_act_V\n\t\t\t\t\t\t\t\t\t\t#Yes I have it.\n\t\t\t\t\t\t\t\t\t\t\t*label arrest_act_IV.1.1.3.3.2\n\t\t\t\t\t\t\t\t\t\t\tHow is it possible? They searched you neatly.\n\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t#So they must have discovered my secret pocket?\n\t\t\t\t\t\t\t\t\t\t\t\t\t*label arrest_act_IV.1.1.3.3.2.1\n\t\t\t\t\t\t\t\t\t\t\t\t\t*if luck \u003c= 90\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tI'm sorry, they've found it and took your lockpick.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto arrest_act_V\n\t\t\t\t\t\t\t\t\t\t\t\t\t*elseif (torso != \"rags\") and (torso != \"nothing\")\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou're really lucky you know? It seems they didn't found it so\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tit's still there. Ready for right moment to come out.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set equip_lockpick true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto arrest_act_V\n\t\t\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tThey shouldn't have find it but... you have nowhere to hide it. It's\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tprobably in your other set of clothes.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set equip_lockpick false\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto arrest_act_V\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*if intelligence>70\n\t\t\t\t\t\t\t\t\t\t\t\t\t#They've searched my clothes not ME...\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label arrest_act_IV.1.1.3.3.2.2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set intelligence %+5\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set sanity %+5\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou're a cunning one, aren't you? Although that's a little disgusting\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tanyway when I think about how you'll get it back. But better 'dirty'\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tlockpick then none, ain't I right? \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set equip_lockpick true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto arrest_act_V\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*if (charisma>75) and (intelligence>75)\n\t\t\t\t\t\t\t\t#I build a trust of the victim and they often give me the key.\n\t\t\t\t\t\t\t\t\t*label arrest_act_IV.1.1.3.4\n\t\t\t\t\t\t\t\t\t*set intelligence %+10\n\t\t\t\t\t\t\t\t\t*set charisma %+10\n\t\t\t\t\t\t\t\t\tClever and ruthless. I'm almost sorry for those you've robbed but...\n\t\t\t\t\t\t\t\t\tWhat's bad for them isn't bad for you.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tLet's get back to the story.\n\t\t\t\t\t\t\t\t\t*goto arrest_act_V\n\t\t\t\t\t\t\t#I have no favorite method I just get in by any means necessary.\n\t\t\t\t\t\t\t\t*label arrest_act_IV.1.1.3.5\n\t\t\t\t\t\t\t\t*set sanity %+5\n\t\t\t\t\t\t\t\tAny means necessary you say? So maybe I won't ask further questions.\n\t\t\t\t\t\t\t\tMeanwhile you're still in Arrest.\n\t\t\t\t\t\t\t\t*goto arrest_act_V\n\t\t\t\t\t*if (luck>50) and (player_skillpoints>=3)\n\t\t\t\t\t\t#All of above a bit.\n\t\t\t\t\t\t\t*label arrest_act_IV.1.1.4\n\t\t\t\t\t\t\t*set skill_pickpocketing true\n\t\t\t\t\t\t\t*set player_skillcount +1\n\t\t\t\t\t\t\t*set player_skillpoints -1\n\t\t\t\t\t\t\t*set dexterity %+10\n\t\t\t\t\t\t\t*set reflex %+10\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tSo you're widely specialized... You know how to pickpocket, you know how to rob using weapon...\n\t\t\t\t\t\t\t*set wide_specialized_thief true\n\t\t\t\t\t\t\t*goto arrest_act_IV.1.1.2\n\t\t\t\t\t\t\t*label arrest_act_IV.1.1.4_1\n\t\t\t\t\t\t\t...and you've done some burglary, right?\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#No, burglary are an exception.\n\t\t\t\t\t\t\t\t\t*label arrest_act_IV.1.1.4.1\n\t\t\t\t\t\t\t\t\tSo you're widely specialized in thievery but not in burglary.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tPickpocketing skill aquired.\n\t\t\t\t\t\t\t\t\t*goto arrest_act_V\n\t\t\t\t\t\t\t\t#Yes I've done some burglary too.\n\t\t\t\t\t\t\t\t\t*label arrest_act_IV.1.1.4.2\n\t\t\t\t\t\t\t\t\t*goto arrest_act_IV.1.1.3\n\t\t\t\t\t\t\n\t\t\t#It was just one apple! How could they charge me for something like this?!\n\t\t\t\t*label arrest_act_IV.1.2\n\t\t\t\t*set theft 1\n\t\t\t\tThat's the law. It can't be helped. Or maybe there's something else you try to hide?\n\t\t\t\t*choice\n\t\t\t\t\t#No! That's all I swear...\n\t\t\t\t\t\t*label arrest_act_IV.1.2.1\n\t\t\t\t\t\tOh dear... don't take it too personally but... it's rather pathetic.\n\t\t\t\t\t\t*goto arrest_act_V\n\t\t\t\t\t#Ehhh... all right it wasn't an apple... it was a ship transporting apples.\n\t\t\t\t\t\t*label arrest_act_IV.1.2.2\n\t\t\t\t\t\tWHAT? You'd stolen a ship full of... apples? Who the hell is transporting apples on ships?\n\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t#It's a long story.\n\t\t\t\t\t\t\t*if murder>0\n\t\t\t\t\t\t\t\t#You know... that may be the one I killed...\n\t\t\t\t\t\tLet's leave it for another story. I've lost interest. I hope you don't mind. \n\t\t\t\t\t\t*goto arrest_act_V\n\t\t\t#Cheating on taxes is considered a theft, isn't it?\n\t\t\t\t*label arrest_act_IV.1.3\n\t\t\t\t*set theft 1\n\t\t\t\tYeah I'm afraid so. I'm sorry that it came out. Maybe it's not a big consolation but I cheat on taxes too...\n\t\t\t\t*goto arrest_act_V\n\t\t\t\t\n\t#I would never take anything that doesn't belong to me. I deny the charge.\n\t\t*label arrest_act_IV.2\n\t\tYou see that ${karcher} nods \n\t\t*if murder=0\n\t\t\tagain\n\t\twhile writing down your testimony.\n\t\t*goto arrest_act_V\n\t\t\n*label arrest_act_V\n*comment Scene 2: Arrest, Act V\n*comment Player's character knows about third charge \"magic\" (if it is magician)\n\n*if magic=0\n\t*goto arrest_act_VI\n\nThe third charge says: \"Unlawful use of magic\". Again ${karcher} asks you for admission.\n*choice\n\t#Unlawful? That means ANY magic is forbidden? This is nuts!\n\t\t*label arrest_act_VI.1\n\t\tIt seems so. What can we do? I mean that I cannot help you. You're a magic user\n\t\tso you probably used your magic in this kingdom and someone saw it and so on. Correct?\n\t\t*choice\n\t\t\t#Dammit... I admit.\n\t\t\t\t*label arrest_act_VI.1.1\n\t\t\t\t*set use_of_magic 1\n\t\t\t\t*goto arrest_act_VI\n\t\t\t#Even if I did use magic. I won't admit it.\n\t\t\t\t*label arrest_act_VI.1.2\n\t\t\t\t*set use_of_magic 0\n\t\t\t\t*goto arrest_act_VI\n\t\t\t*if (murder = 0) and (theft = 0)\n\t\t\t\t#I'm really innocent!\n\t\t\t\t\t*label arrest_act_VI.1.3\n\t\t\t\t\t*set use_of_magic 0\n\t\t\t\t\tI can't believe it myself but it seems you really are. That would mean that\n\t\t\t\t\tsomeone's trying to frame you.\n\t\t\t\t\t*if adversary = \"\"\n\t\t\t\t\t\tDo you have any idea who might it be?\n\t\t\t\t\t\t*input_text adversary\n\t\t\t\t\t\n\t\t\t\t\t$!{adversary}...Maybe you're right, it sounds like a name of a real scum.\n\t\t\t\t\t\n\t\t\t\t\tYou'll have to check it after you leave this place...\n\t\t\t\t\tor maybe should I say \"if you leave this place\"...\n\t\t\t\t\t*goto arrest_act_VI\n\t#Admit.\n\t\t*label arrest_act_VI.2\n\t\t*set use_of_magic 1\n\t\t*goto arrest_act_VI\n\t\t\n*label arrest_act_VI\n*comment Scene 2: Arrest, Act VI\n*comment Player's character at lasts gets back to the cell\n\n*page_break Act IV: To The Cell\n\n*page_break\n\"That's all, finally...\" sighs ${karcher}.\n\n\"Now you're aware of what you are charged with. \nYour responses have been recorded. You'll wait for a Royal Judge to come to the town. Until then\nyou'll be held in our lovely, deep, dark dungeon.\" he declares it like it was really a lovely \nplace where you'd like to spend your holidays with your family.\n*if murder = 0\n\t*set tortures 1\n*if theft = 0\n\t*set tortures 1\n*if (magic>0) and (use_of_magic = 0)\n\t*set tortures 1\n\t\n*if tortures = 1\n\n\t\"Before that, you'll meet our Master of Tortures; he will make you sing sooner or later...\"\n\n\"His Eminence Royal Judge Dredd will come to town in \n*comment *if luck\u003c30\n*comment \tthree\n*comment \t*set time 66\n*comment \t*goto arrest_act_VI_1\n*comment *elseif luck\u003c50\n*comment \tfive\n*comment \t*set time 114\n*comment \t*goto arrest_act_VI_1\n*comment *elseif luck\u003c70\n*comment \tseven\n*comment \t*set time 162\n*comment \t*goto arrest_act_VI_1\n*comment *else\nten\n*set time 234\n*label arrest_act_VI_1\n*set time_given time\ndays. You'll be judged at noon. That's all.\"\n*if karcher!=\"Karcher\"\n\tThe \n${karcher} finishes his speech.\n*comment choice ?\n\n*label arrest_act_VI_2\n*page_break\n*if time=0\n\t*if luck\u003c30\n\t\t*set time 72\n\t\t*goto arrest_act_VI_2a\n\t*elseif luck\u003c50\n\t\t*set time 120\n\t\t*goto arrest_act_VI_2a\n\t*elseif luck\u003c70\n\t\t*set time 168\n\t\t*goto arrest_act_VI_2a\n\t*else\n\t\t*set time 240\n*label arrest_act_VI_2a\n\"GUARD! Throw the prisoner in ${his} cell.\"\n\nA stinky guard comes in, puts his huge hands on your shoulders and pushes you out through the door.\n\nYou're in a corridor. There are massive doors on your left.  That door lead to the freedom of the outside world; \nbut you may not see it again because the guard tells you to go right.  \n\nAs you are led down the corridor, you can smell food from behind the door on the left. There is also a door\non the right; you pass it and you are led down a turn to the right.\n\nSoon you reach a barred doorway; locked of course. The guard that walked behind you tells you to\nstand facing the wall.\n*page_break\nYou peek through his right arm as he takes some keys from his left pocket and opens the door. \nHe orders you to get in and then locks the door.  There are stairs leading down in the distance.  \nThe guard takes one of the torches from the wall and, still behind your back, orders you to move. \n*choice\n\t*if (will\u003c=30) or (intelligence >=60)\n\t\t#I tell him that I'm afraid to go.\n\t\t\t*label arrest_act_VI_2a.1\n\t\t\tHe looks at you for a while, judging what can he do in that case.\n\t\t\t\n\t\t\t*if (player_sex = \"male\") and ((player_race = \"human\") or (player_race = \"elf\"))\n\t\t\t\t*if (look>70) and (charisma>30)\n\t\t\t\t\t\"What now?\" he asks confused.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Tell him to free your hands and you'll go.\n\t\t\t\t\t\t\t*set ask \"hands\"\n\t\t\t\t\t\t\t*label arrest_a
