 What seems to unite everybody, however, is a shared nostalgia for Earth.  It's a bit of a time warp, actually, since it takes so long for things to travel across space.  The locals have these old-fashioned accents and most of them dress like your grandparents.  They've tried hard to replicate their old home out here.  While the planet itself is foreign, the stuff people have built all looks very familiar.\n\n  As an officer from Earth you've already been able to appreciate the benefits of that sentiment.  People seem to respect you.  They're happy to see you out here flying the proverbial flag of civilization.  It's nice to start your new life with a built-in advantage like that.\n  *goto news\n\n*elseif sentimental \u003c 40\n  Perhaps it's not surprising that this eclectic mix of people has developed an entirely new culture to match.  It takes a special breed of person to turn one's back on humanity's home world, fly across interstellar space, and start an entirely new life forty years into the future.  Earth?  What's Earth?  It's not that people are ignorant of the past; rather, they're simply looking to the future.  There's an attitude prevalent on Niah that Earth is old-fashioned.  It's passe.  It's what they've left behind.  And certainly, whatever goes on back on old Earth has little or no relevance to the new world out here on the interstellar frontier.  It also means that the people themselves are unusually eccentric.  There's something about being so far from mainstream civilization that seems to make people act weirder than normal.\n\n  For you that means having to earn respect over and over and over again.  Nobody seems to care that you're fresh from Earth.  None of the people born and raised on Niah seem interested in your terran background.\n  *goto news\n\n*else\n  How all those people relate to Earth is likewise haphazard.  Some are out here by choice, others by necessity.  Some clearly miss humanity's home while others can't wait to see what's out here.  It'll be up to you to figure out where you fit in all of this.\n  *goto news\n\n*label news\n\nIn one respect, however, Niah is obviously a decade ahead of you.  Light travels faster than starships, after all, meaning ten years of Earth transmissions got here ahead of you.  You're able to catch up on everything that went on back home in the first decade after you left.\n*choice\n  #Oh good.  Fill me in.\n    *goto options\n\n  #Wait, isn't there supposed to be some kind of quarantine?\n\n    A fair question -- why bother screening people in person if you can just transmit anything you want?  The answer has to do with bandwidth, distance, time and resources.  Obviously tangible objects can't be transmitted, only information.  And the distances are so great, and the medium so choppy, that the signal degrades dramatically across interstellar space -- much more than was anticipated before humans got to the far end of the signal.  Plus something big has to receive and process it.  So anything powerful and focused enough to send a coherent message to a particular planet in another solar system is so big and cumbersome it can easily be monitored.  When you catch up on old Earth news you're seeing pretty clean stuff.\n\n    *goto options\n\n*label options\n*rand newz 1 3\n*if newz = 1\n  It really does look like you left Earth at the right time.  Two years after the Jessica took off, they allocated your entire former neighborhood to a competing property claimant and everyone was evicted.  Your favorite neighbor spent three years trying to find something worth living in.  Bummer.\n  *goto survey\n\n*elseif newz = 2\n  Other than watching the people you knew all get ten years older (or, in one person's case, die), you're surprised how little actually happened.  Sure there were big news events and the like, but they all came and went.  The big story du jour would explode onto the scene, occupy everyone's attention, then peter out before being replaced by the next one.  And so on.  Seeing it all condensed into a decade's worth of reports makes it all seem so trivial.  \n  *goto survey\n\n*else\n  You get updates on the people important to you, you see how close your predictions came to reality (not so much, especially in sports), and then you pay a bit of attention to the one big story that catches your eye -- the starship that exploded off Saturn only four years after the Jessica left the solar system.  Titan's normally murky surface was lit so bright it looked like the Sahara on a sunny day.  Your ship was committed to the voyage, however, and never found out.  But apparently the cause was a defect in the drive system's thrust distributors that could, in theory, have manifested on the Jessica as well.  \n\n  Three starships unknowingly left Earth with this same flaw.  At the time of transmission Earth didn't yet know what would happen.  Obviously the Jessica made it, but whether those other two starships did or not you have no idea.  They were going in the opposite direction.  If a bright light suddenly appears in the northeast part of the sky a few years from now then you'll know things ended in disaster.  \n  *goto survey\n\n*label survey\n*page_break\n*comment this is rediscovering Mustafa and some potential problems with the screening process\nThis morning you're on your way to work.  Niah's main town is walkable, situated on the edge of a deep freshwater lake framed by steep hills rising on either side.  A flat expanse of land stretches away from the lake the other direction.  On that land sits the town, built first with discarded material from the early starships and later with homegrown products constructed from scratch.  The original \"buildings\" are almost all still there, carefully preserved, like the historic old quarter of a European city on Earth.\n\nAs you walk down one of the prettier sidestreets you notice something across the way -- a large poster with a message that should never have cleared quarantine.  The poster covers the wall next to the entrance to what looks like a small house.  You pause, unsure at first whether to investigate further.  What do you think?\n*choice\n  #Definitely find out what the story is.\n\n    You cross over for a closer look, careful to avoid a group of absent-minded cyclists following a guide drone.  From the looks of it the poster has been there a long time; certainly long before you or your team arrived.\n    *if enlightened \u003c 40\n      There's a message on it that essentially boils down to \"every man for himself, and the winners eat the losers for breakfast.\"  This is not the type of healthy attitude that Earth wanted its progeny to take with them to the stars.\n      *goto poster\n\n    *elseif egalitarian \u003c 40\n      The poster's basic message is that anyone moving on from Niah to another nearby moon or planet is a traitor.  That sort of tribalism was supposed to stay back on Earth.\n      *goto poster\n\n    *else\n      The poster's central image changes every time you look at it.  It's a form of reactionary visualization that was common back home a century ago.  But the recurring theme throughout is of violent rebellion against an unknown master.  Standing up, breaking the chains, smashing down the walls, and so on.  Lots of violence.\n      *goto poster\n\n  #Make a note to look into it later.  It could be important, but right now I've got other things to worry about.\n\n    You do that.  After all, you're new here and you're seeing surprising and unusual things every five minutes.  If you stopped and personally handled every questionable item that caught your eye you'd never leave your front door.  But the team is still here and they're always in need of something else to do.\n    *goto exemplary\n\n  #Forget it.  Not my problem anymore.\n    True, you're new here and you're seeing surprising and unusual things every five minutes.  If you looked into everything that caught your eye you'd never get past your front door.\n    *if diligent > 60\n      But this isn't near your front door, and it's caught your eye, and it seems like a big deal.  You're well within your rights to ignore it.  But are you sure that's a good idea?\n      *choice\n        #Yes, yes I am.  My job was to screen the Jessica's passengers and cargo.  \n\n          What's on an entire planet is an entirely different can of worms.\n          *goto exemplary\n\n        #Perhaps not.  Let's find out more.\n\n          The poster's central image changes every time you look at it.  It's a form of reactionary visualization that was common back home a century ago.  But the recurring theme throughout is of violent rebellion against an unknown master.  Standing up, breaking the chains, smashing down the walls, and so on.  Lots of violence.\n          *goto poster\n\n    *elseif investigation > 60\n      You're focusing only on the issues that have come with you from the Jessica.  There's been enough going on with a starship full of Earth people to worry about anything new on this planet as well.\n      *goto exemplary\n\n    *else\n      Certainly not.  But that reminds you, you'll need to find something new that is your problem pretty soon.\n      *set investigation %-10\n      *goto exemplary\n\n*label poster\n\nA couple swipes of the finger across your wrist and the city grid tells you that someone named Mustafa lives here, no image available.  You know that name.  Two minutes later a young woman appears in the adjacent doorway.  She looks at you, as if waiting for you to speak.\n\nYou've seen this woman before.\n\n\"Let me guess,\" the woman abruptly says, in an accent you don't recognize.  \"You're a quarantine agent.  You just arrived on that new starship, the Jessica.  You're an officer, not one of the juniors, and since you're not Krissa Mackenzie that would make you . . . Capt. ${lastname}.  ${firstname} ${lastname}.\"  \n\nHoly crap.  \"That's right,\" you say.  \"How do you know who I am?\"\n\n\"Everybody knows who you are,\" she answers.  \n\nYou fire back:  \"Can you tell me who you are?\"\n\n\"No, not yet,\" she says with a smile.  \"Let me enjoy this power imbalance for a little bit first.  I love the irony of a screener asking me for information.\"  She stands there not saying anything.  But only for a few seconds.  The she starts talking again:  \"Okay, just kidding.  I'm Ruth.\"\n\nWhen we first met, you think, you were Karina Mustafa.  Or at least we were told you were.  And you were frozen in coldsleep.  And then we fixed you.\n\n*page_break Maybe we didn't fix her so well\nNo matter who she is, \"Ruth\" shouldn't know you.  That she so casually talks about you as a quarantine agent is troubling.  Yet here she is, tucked away in a corner of Niah city, her mind filled with information that shouldn't be there.  Something's gone wrong.\n\nYou start circling around the issue.  \"You said I'm a quarantine agent,\" you say to Ruth, \"who told you that?\"\n\nHer answer stuns you.  \"My friend Karina,\" she says.  \"Karina Mustafa.  This is actually her place, I'm just staying with her.\"\n\n\"Where's Karina now?\"\n\n\"Getting a checkup,\" Ruth says.  \"The gravity kills her.  She was born in space, you know, on a station orbiting Earth.  Her parents were real ideologues or something, and they wanted to send society a message that their daughter's life was literally going to start outside any heavenly body's control.  Weird, huh?  I guess it was an interesting theory but in reality she's had trouble living on planets.  The gravity gets too strong for her.\"\n\nShe is, of course, describing your junior agent Heddes' upbringing.\n\n\"Where exactly did Karina go to get her checkup,\" you ask.  \"I actually need to talk to her.  It's important.\"  There's an understatement.\n\nNot surprisingly, Ruth can't say where her friend is.  \"Karina never said.  But when she gets back,\" Ruth offers, \"maybe she can give you a call.  I'll tell her you came.\"  And with that she smiles, begs your leave, and closes the door.  You're not authorized to follow her inside so for the immediate moment that's the end of that.\n\n*page_break\nBut a closed door doesn't close the problem.  Far from it.  You've discovered a passenger from the Jessica whose screening appears to have gone profoundly wrong.  She seems to have memories of at least three separate people -- including, most worryingly, one of your agents.\n\nClearly you have to do something.  But you're on the surface, past quarantine, and you no longer have jurisdiction.  You're not the lord-of-all you were even a few days ago.  Officially you can't just go around detaining people and scrubbing their brains.  Especially when you don't want to bring attention to the screening process.  So your team can check out Ruth/Karina on the sly, hoping that the investigation doesn't trip any alarms.  Or you can try to have the Niah authorities detain her under whatever cover story your team can come up -- hardly an unprecedented approach.  That would make your investigation easier but it risks disclosing too much.  Either way you should decide quickly.\n*choice\n  #Have our team investigate by ourselves\n\n    *if diligent > 50\n\n      Smart move.  There are risks here that need to be avoided, and the best way to do that is by keeping things on the proverbial down low.  Your team, after all, are professionals.  They're well trained.  You need to figure out what's gone wrong but without disclosing even more information to the outside world.  There's still time to discretely do that.\n\n      Bryson and Heddes get to work tapping into local databases.  Dallas reconnoiters.  Mackenzie sweet-talks a few people in the know.  Together they accumulate all the information you need to piece together how Ruth has spent pretty much every minute of her three days here on Niah.\n      *set ruth 1\n      *goto karinaruth\n\n    *else\n\n      Almost immediately your decision backfires.  Still outside the closed doorway, you call up Mackenzie and begin briefing her on what's just happened.  \"Ruth,\" of course, can still hear you since she's just on the other side.  She listens to every word of your conversation before making some calls of her own.  \n\n      A few minutes later the police arrive to arrest you.  They let you go when they find out you're an agent from the Jessica.  But your behavior was so suspicious the police have registered you in their database.  If you approach the home again you'll be in real trouble.  So you've blown any realistic chance of getting close to Ruth.  Well played.\n      *set investigation - 10\n      *goto noruth\n\n  #Ask the police to help\n\n    *if diligent > 60\n\n      You make the perfectly reasonable decision to do this as above-board as possible.  You'll just have to be careful not to let anyone find out more than they have to.  It's a delicate balancing act but you're confident you can pull it off.\n\n      The local authorities are helpful.  Ruth was on the Jessica, after all, so she's only been downstairs a couple days herself.  That gives your team a genuine credibility in asking for law enforcement help.  You're able to make up a perfectly plausible cover story about a passenger who came on board under possibly false circumstances -- much of it actually true, depending on how you look at it.  When you ask the authorities to get you any information they can possibly gather about this woman and what she's been up to, they come back with quite an impressive download.  \n      *set ruth 1\n      *goto karinaruth\n\n    *else\n\n      The local authorities are of course receptive to a request from the Jessica's agents about a passenger from the Jessica.  But in your case \"receptive\" and \"helpful\" are two different things.  They keep wanting to know why you're asking.  They keep asking why you want to know.  It quickly becomes impossible to get anywhere without divulging more information on the quarantine screen than you can.  \n      *goto noruth  \n\n  #Screw it - just bust down the door and grab her!\n\n    *if diligent \u003c 50\n\n      Sadly for you, the civilization that has invented starships has also invented doors that can, you know, stay locked.  Ruth shuts her door, you sit there for a few moments thinking what to do, and then when you try to push the door open it simply stays shut.  Then you spend another minute or two vainly trying to break into the house.  Finally somebody notices what you're doing and calls the cops.  So the local authorities got involved after all.  \n\n      They let you go when they find out you're an agent from the Jessica.  But your behavior was so suspicious the police have registered you in their database.  If you approach the home again you'll be in real trouble.  So you've blown any realistic chance of getting close to Ruth.  Well played.\n      *set investigation - 10\n      *goto noruth\n\n    *elseif corruptible > 60\n\n      You're inside the house in a flash.  They stopped making doors like this on Earth years ago, so getting it open wasn't difficult.  \n\n      And once you get in things move quickly.  The entryway is small and dark.  There's no artificial light, just a soft glow from distant windows and possibly an atrium beyond, and the room extends away down a narrow hallway that looks like it gently rises.  \n      *page_break\n\n      At first it's silent.  Ruth could be anywhere.  You stand there motionless, listening, and sure enough a \"clank\" soon comes from nearby.  The hunt is on.  You send a few diversionary sounds throughout the house.  The clatter makes it sound like you're coming from a different direction, and Ruth rushes out from her hiding space and right into your arms.  \n\n      \"I'm sorry,\" you say to your surprised captive, \"but I can't let you simply walk away.\"\n      *goto deadruth\n\n    *else\n\n      Seriously, what were you dithering for?!?  Ruth shuts the door and you just push it open again.  (Would have helped if she'd remembered to lock it.)  \n\n      Ruth is startled and, for a moment, frightened.  But you try to calm her down.  \"I'm sorry to barge in like this,\" you say, \"but I can't let you simply walk away.  You're . . . ill.  We're not sure you made it through coldsleep as cleanly as it first looked.\"  You're not exactly lying to her.\n\n      She's not buying it.  Defensively, she tries to throw you off:  \"I don't care what you say, get out of here.  You have no right to barge in like this!\"  Her voice rises and what sounded before like fright has now changed entirely to anger.  \"Get out!\"  She's yelling at you now, her fists balled into tight little stumps of rage.  \"Get out or I'll kick you out!\"  \n\n      Please, you think to yourself, as if this --\n\n      *page_break Pop!\n\n      -- fifteen seconds later you come to.  Ruth just punched you, hard, right between the eyes.  You fell back and smacked your head on the wall.  She knocked you out.  That's going to be embarrassing.  \n\n      You stand up, woozily, before twin spasms of pain overwhelm the front and back of your head.  You don't know which knock hurts worse, the one from Ruth's fist or the one from the wall, but combined they're making it almost impossible to concentrate.  \n\n      Ruth slips away while you're staggering around this unfamiliar house.  You're now alone, which in a twisted sense is actually a good thing.  Ruth fled the house and left behind quite a bit of useful information about her.  So once you finally clear the cobwebs from your bruised brain, you quickly go through what's here and try to put together a fuller picture of whoever this person is.  Who knows whether it'll be enough.  This did not play out the way you had hoped.\n      \n      *set ruth 1\n      *set diligent - 15\n      *set investigation - 5\n      *goto karinaruth\n\n*label karinaruth\n*comment this is where your team starts looking into things, and use diligent\nHalf an hour later you're with your assembled team once again.\n\n\"Don't tell me somebody else died,\" Dallas jokes, referring to your passenger Augustine.  \"Every time you call us together it's for something bad.\"  \n\nNot wrong, you think.  \"I've just had a very disturbing encounter,\" you say, and you summarize your little rendezvous with Karina Mustafa and/or Ruth as helpfully as you can.\n\nNaturally Heddes looks concerned.  Nor do you blame him.  This could be an enormous problem.  You're about to say something to calm Heddes down when Bryson speaks up.\n\nIt's to interrupt, however, not contribute.  \"I'm getting a notification from the Jessica,\" she says.  \"Do you want to talk to them?  It might be about Augustine.\"  If the ship is calling you it's probably important.\n\nBefore you can answer Mackenzie steps up:  \"I can take the call,\" she offers.  \"You don't need to waste any more time on that stuff.  This --\" she says, referring to Ruth -- \"is more important.  Stay focused on that.\"\n*choice\n  #Have my deputy take the call\n\n    \"Thanks, Krissa,\" you say, \"see what they want.  The rest of us will start working on a plan of attack.\"\n\n    Mackenzie nods agreement and heads off out of the room to talk to the Jessica.  She saunters back a short time later, a smile widening across her face.  \"That was Debussy, the Jessica's owner.  He was calling just to make sure you knew about his soiree -- really, he called it a 'soiree' -- tonight.  So consider yourself reminded.\"  Then she shakes her head.  \"That man is adorable,\" she adds, \"but half the time I have no idea what he's talking about.\"\n\n    Debussy's invite reached you yesterday.  It's sort of a farewell and welcome all wrapped into one, and everyone important will be there.  Funny that Debussy didn't demand to speak to you directly, but perhaps you're not as important as you thought.  Or Mackenzie is better known than you realize.\n\n    In any event, the party is tonight.  Right now, however, it's back to the more pressing matter at hand.  \n    *set image 0\n    *set investigation - 15\n    *goto karinaruth2\n\n  #Take the call myself\n\n    \"I've got it,\" you say.  You set up a privacy wall then connect with the Jessica.  \n\n    *if image = true\n\n      \"Captain ${lastname},\" a medic says, \"we got a report back on that freezer pod of Mr. Augustine's.  Our techs had missed it the first time out but turns out the pod was programmed to display more than one image.\"\n\n      Jackpot Mr. Debussy.  \"What else could it show?\" you ask.\n\n      \"There were three images total.  One obviously was the old wounded man in rags that we saw.  The other two were a sleeping angel and a man in chains with a black hood over his head.  No identifying marks and no other files to accompany them.  Just the three images.\"\n\n      A few further minutes of conversation reveal that Debussy himself was unaware of these images.  The Jessica's tech continues:  \"Everyone seems to agree that Augustine himself would have been the person to ask who those images were.  And we haven't yet figured out how the pod knew which image to show, or even whether there's a method behind it at all.  They're not randomized.  We keep seeing signs of spillover contamination from the body to the pod.\"\n\n      Well that's interesting.  Certainly it can't be a coincidence that the only passenger to die also was in a pod secretly set up to show different bizarre images of death.  \n\n      Oh, and you also get a reminder about a big party Debussy is throwing tonight.\n      *set investigation + 10\n      *page_break\n      *goto karinaruth2\n\n    *else\n\n      A beautiful woman appears before you.  She speaks so deliberately you're not sure whether she is actually a living person talking to you in real time, or simply an automated message.  \"Greetings Capt. ${lastname},\" she says, \"I apologize for the interruption, but I am calling to confirm your attendance at Mr. Debussy's event this evening.\"  She smiles, pauses for a second, then disappears without ever giving you the option to decline.\n\n      Debussy's invite reached you yesterday.  It's sort of a farewell and welcome all wrapped into one, and it sounds like everyone important will be there.  In any event, the party is later tonight.  There will be time for that.  Right now it's back to the more pressing matter at hand.  \n      *goto karinaruth2\n\n*label karinaruth2\n*comment this is where you go to quickly finish the ruth issue\nThe team looks anxious.  It's easy to screen frozen people, since they're just lying there with no place to go.  Hunting living people on an unfamiliar planet, on the other hand, is tough.  Suddenly the magnitude of what you're doing has dawned on your team.  \n\n\"Okay,\" you say, \"no more interruptions.  Ruth is on the loose and we need to find her immediately.\"    \n\nYou're interrupted immediately.  \n\n*if diligent \u003c 50\n  \"She's dead.\"  It's Dallas, processing a report from the local authorities streaming through his uplink.  \"They found a body out in the street.  Suicide with witnesses.  Her prints match Karina Mustafa's from the Jessica's passenger manifest.  They're not seeing any reason to investigate further.\"\n\n  Everybody looks at each other for a long moment.  On the one hand you're all stunned.  But it's also a relief, really -- your work has pretty much been done for you.  Somebody nobody knows comes out from Earth and kills herself a few days after arrival.  Niah isn't going to push it and your hands are tied on pushing it yourself.  Discretion, as they say, can be the better part of valor.  Best let it go.  \n\n  \"Well,\" you say, sheepishly, \"okay then.  Good job everyone.  Let's just make sure she didn't do anything before she died and then we can close this out.  And don't forget about the party tonight.  See you then.\"\n  *set sentimental - 10\n  *finish\n\n*else\n  The interruption, however, actually brings the matter to a close -- tragically.  Ruth/Karina has killed herself.  The grid picked it up almost immediately and your team were notified right away.  Apparently it was in a public place with lots of witnesses and there's nothing debatable about how she died.   \n\n  Your team look shocked.  Frankly, you're happy to see them get emotional over such a bad ending.  It's good to see they've retained their humanity.  You see Bryson sympathetically caressing Heddes' hand, silently assuring him he's not to blame for whatever has just happened.\n\n  You make a few comments to your team and then get them busy trying to figure out what actually did just happen.\n  *page_break\n  Surprisingly, the answers come quickly.  Ruth's fatal behavior triggers some hits in the database.  Now that she's a post-interstellar spaceflight suicide, rather than simply a screened passenger with behavioral problems, she takes you down different paths on the investigation tree.  \n\n  Heddes, ironically, is the agent who first puts it all together.  Her problems all arose because she'd had behavioral modification work back on Earth.  It was work your team didn't know about.  Some therapist or somebody had tried to refashion her personality long before she'd come onto the starship.  Sort of like plastic surgery for the brain.  Of course whoever did that work knew nothing of quarantine screening so when Karina Mustafa got to you she showed these odd brainwave patterns that were really just artifices from her earlier therapy.  You tried to \"fix\" her apparent problem but unknowingly made it worse.  Once she awoke her problems compounded quickly.  She must have heard something about Heddes' unusual birth story and her mind took it from there.  The poster was a manifestation of her conflicted, screened mind.  So was her suicide.  \n\n  Then Bryson chimes in:  \"So the quarantine screen is not fail-safe,\" she says, with a knowing hint of dread in her voice.\n\n  She's right, as usual.  Above and beyond Karina Mustafa's personal tragedy, this is the real lesson you need to take away from this.  The screening process is not perfect.  You are not entirely in control.  You obviously don't know everything you should and you are doing things that may or may not have the results you expect.  Things can go wrong.\n\n  Perhaps it's not so easy to control a world?\n  *finish\n\n*label noruth\n*comment this is where you've messed up the ruth/karina issue\n\nSoon you're sitting together with your officers.  Everybody except Heddes is nursing a cold one.  Dallas looks up from his drink.  \"Well, boss,\" he says, \"we're in an awkward spot, don't you think?\"\n*page_break\n\"You can say that again,\" you respond, before quickly adding \"but don't say it again.\"  This is Dallas, after all.  Always a comic.\n\nWhat happens next takes you all by surprise.  As you're going over the day's events and trying to figure out your next steps, the local network gives you a major shock.  Ruth/Karina has disappeared.  Not just gone back underground, but removed entirely from the system's registry of living people.  \n\nThis almost certainly means she's dead.  There's always a chance of locator malfunction, but that doesn't really happen anymore, even out here on the new planets.  \n\nSoon afterwards her death is confirmed.  Apparent suicide.  And interestingly enough, the local authorities are happy to close the case.  Heddes is terrified that they'll come after him in particular, and the whole team in general, but within a few hours you get the official all clear from the Niah police.  They see the victim as damaged goods from a starship that's just arrived at their world.  Nobody knows her and she leaves nothing behind.  The only people who've shown any interest in her were the Jessica's own officers, so obviously they're not up to anything.  (Right?)  Such interest only confirms that there was something wrong with her.  \n*page_break\nIt's a shame she died, Niah's people seem to be saying, but let's just forget about it and move on.\n\nMackenzie speaks up.  \"They're right.  Let's call it a day, ${firstname}.  Debussy's party is tonight and we need a break.\"  She gazes at you dully, her mind seemingly slowing down more by the minute.  The junior agents focus on Krissa for an instant before turning to you as well.  You're sympathetic to her request.  Though you've also got this nagging feeling things have wrapped up way too neatly and quickly.  (Well, except for the dead passenger, that is.)  Shouldn't you be trying twice as hard to figure out what happened and why?\n*choice\n  #No.  Krissa's right.  We've done enough for one day.  We're not going to accomplish anything else right now.\n\n    You agree with your deputy and wrap things up.  Nobody really dissents, especially since Niah has made it clear you're not getting any help right now with this issue.  Instead you're going to switch gears and take some time to attend what's being billed as the biggest party of the year.  What you do there is up to you.  If you want to keep digging on this stuff you probably can; if you want to party away the night you'll have that option, too.\n    *set ruth 0\n    *finish\n\n  #Yes.  A screened passenger just killed herself.  I can't take even a moment's break from that.  \n\n    \"Look,\" you respond, \"I know what you're saying.  But this is important and the longer we wait the colder the trail will get.\"  You give all four of your agents specific tasks, with Bryson and Dallas charged with trying to get whatever information they can from the local authorities about Ruth's death; Heddes trying to recreate the screen \"fix\" you agreed to implement; and Mackenzie trying to look over the database for anything that might be out of order either on Earth, the Jessica or here.  \n\n    *page_break\n    Two hours later the results come in.  \n    *if investigation \u003c 31\n      \"It really depends,\" Heddes says, \"on who you ask.  We don't have a lot to go on.  Nobody on the surface seems to think much of Ruth's case at all.  A couple of us\" -- he waves around the team -- \"disagree, me especially, but we can't really explain why and we don't have any way to research it further.  And Deputy Mackenzie still says it's nothing.\"\n\n      \"All in all,\" says Mackenzie, \"it's a dead end.  The team have done a great job but it's asking the impossible to prove something that doesn't exist.\"  \n\n      You take one last stab at uncovering some hidden answer.  Pointedly you challenge your junior officer:  \"You agree with that, Heddes?\" \n\n      Heddes sighs.  He looks a little defeated.  \"Yeah, yeah I do I guess.  Let it go, boss.  There's nothing.\"\n\n      \"Fair enough,\" you respond.  \"Let's get ready for the party tonight.\"\n      *set ruth 0\n      *finish\n\n    *elseif sentimental > 60\n      Ruth's fatal behavior triggers some hits in the database.  Now that she's a post-interstellar spaceflight suicide, rather than simply a screened passenger with behavioral problems, she takes you down different paths on the investigation tree.  \n\n      Heddes, ironically, is the agent who first puts it all together.  Ruth's problems all arose because she'd had behavioral modification work back on Earth.  It was work your team didn't know about.  Some therapist or somebody had tried to refashion her personality long before she'd come onto the starship.  Sort of like plastic surgery for the brain.  Of course whoever did that work knew nothing of quarantine screening so when Karina Mustafa got to you she showed these odd brainwave patterns that were really just artifices from her earlier therapy.  You tried to \"fix\" her apparent problem but unknowingly made it worse.  Once she awoke her problems compounded quickly.  She must have heard something about Heddes' unusual birth story and her mind took it from there.  The poster was a manifestation of her conflicted, screened mind.  So was her suicide.  \n\n      Then Bryson chimes in:  \"So the quarantine screen is not fail-safe,\" she says, with a knowing hint of dread in her voice.\n\n      She's right, as usual.  Above and beyond Karina Mustafa's personal tragedy, this is the real lesson you need to take away from this.  The screening process is not perfect.  You are not entirely in control.  You obviously don't know everything you should and you are doing things that may or may not have the results you expect.  Things can go wrong.\n\n      Perhaps it's not so easy to control a world?\n\n      Anyway, now it's definitely time to call it a day's work.  You try to put Ruth out of your mind, for the moment at least.  Go get ready for a party.  Who knows what you'll find there.  Perhaps you can even get some answers about what's been happening since the Jessica got to Niah.\n      *finish\n\n    *else\n      Turns out it's a bit tough to get complete answers without the cooperation of the planetary agencies.  But the juniors still manage to hammer out a good working theory.  Somehow the screening process, rather than causing Ruth's problems, actually uncovered them.  Something had happened to her back on Earth that made her susceptible to problems on the voyage out here.  You unwittingly set her down the path to death.\n\n      It's disconcerting but it's as far as you can go.  You try to put it out of your mind, for the moment at least, and get ready for the party tonight.  Who knows what you'll find there.  Perhaps you can even get some answers about what's been happening since the Jessica got to Niah.\n      *set ruth 0\n      *finish\n\n*label deadruth\n*comment this is where you've broken into her house and grabbed her, so it ends without any further information since you keep it on the down low\nRuth starts to scream.  Panicking, she begins flailing her arms in your direction like she's brushing a fire off her body.  She has no idea why you've just broken into this house.\n\nYou do everything you can to calm her down.  Nothing works at first.  Eventually she begins to tire.  Finally she just slumps down onto the floor.  \n\n\"I'm sorry,\" you say, almost honestly.  \"I'm sorry.\"\n\nAn hour later you're leaving the building by yourself, thinking about a party Debussy's going to throw tonight.  Everyone from Niah will be there.\n*set investigation %- 10\n*set ambitious %+ 10\n*set diligent %- 10\n*set corruptible %+ 10\n*set ruth 2\n\n*page_break\n*if image = true\n\n  As you return home to wash up, a message comes through about Augustine.  It turns out his pod was programmed to display more than one image.\n\n  Jackpot, you think to yourself.  The report is brief:  There were three images total.  One obviously was the old wounded man in rags that you saw.  The other two were a sleeping angel and a man in chains with a black hood over his head.  No identifying marks and no other files to accompany them.  It appears that the pod might have been programmed to display one or the other of these images depending on the condition of the body within it.\n\n  Funny how news comes in waves.  One distraction ended for you quickly just as another picks up steam.  \n  *finish\n\n*else\n\n  You return home to wash up.\n  *finish\n\n*label exemplary\n*page_break\nYou eventually get to your office after a further few minutes' stroll.  It's sort of an annex to the local law enforcement setup in town, where you and your screening team gather to review your outstanding issues and to monitor developments in the area.  There are a surprising number of directives coming not only from Earth but a few of the other worlds as well.  All of them need to be processed, interpreted and applied.\n\nEverybody's there except for Dallas.  Mackenzie tells you Dallas is enjoying his day off by hiking up one of the nearby mountains.  There's a particular trail the locals claim is too tough for anyone not used to Niah's high-grav environment to handle.  The gravity has much the same effect on people as the thin air does at high altitude.  \"I guess,\" you say, \"if Dallas comes in tomorrow we'll know he didn't die.\"\n\n\"I'll keep an eye out,\" Mackenzie says with a smirk.  \n\n*if image = true\n  Just then Heddes waves at you.  \"Captain ${lastname}, we got a report back on that freezer pod of Mr. Augustine's.  The Jessica's techs had missed it the first time out but turns out the pod was programmed to display more than one image.\"\n\n  Jackpot Mr. Debussy.  \"What else could it show, Heddes?\"\n\n  \"There were three images total.  One obviously was the old wounded man in rags that we saw.  The other two were a sleeping angel and a man in chains with a black hood over his head.  No identifying marks and no other files to accompany them.  Just the three images.\"\n  *fake_choice\n    #\"How did the pod know what to show?\"\n\n    #\"Great, thanks.  Did you let Debussy know?\"\n\n    #\"Do everything you can to try to find out who those images are.\"\n\n  \"Everyone seems to agree that Augustine himself would have been the person to ask who those images were.  We talked to Mr. Debussy briefly -- he was busy getting ready for some gala something or another tonight when we finally got hold of him -- and he didn't know.  Nobody knows.  And we haven't yet figured out how the pod knew which image to show, or even whether there's a method behind it at all.  Bryson thought it might be randomized but I keep seeing signs of spillover contamination from the body to the pod.  It's too coincidental for my taste to have these three mystery images on the only pod holding a dead passenger.\"\n\n  \"Okay,\" you say, \"keep looking.\"  You actually know what Debussy's gala something or another is because you've been invited to it.  Depending on how the day goes maybe you'll try to bring the whole team along.\n  *set investigation + 10\n  *page_break\n  *goto exemplary2\n\n*else\n  Just then Heddes waves at you.  \"Captain ${lastname}, that Debussy guy from the Jessica wanted to make sure you knew about his soiree -- really, he called it a 'soiree' -- tonight.  So consider yourself reminded.\"\n\n  Yeah, you knew.  Debussy's invite reached you yesterday.  \"Thanks Heddes.  It's some coming out thing for him and he wants it to be a big deal.  Any of you who want to come are of course welcome to join me.  I don't leave my team behind.\"\n\n  They shrug but look secretly excited.\n  *page_break\n  *goto exemplary2\n\n*label exemplary2\nFrivolity aside, you do have one big issue you've been meaning to address today.  Your ongoing work requires a pretty close coordination with, and understanding of, the local authorities.  And no matter what the rules state there's still the wildcard of personal interaction.  You've got local Niah officers assigned to your team.  They're very different people compared to you and your Earth-born associates.  They're also surprisingly difficult to figure out, since they seem to have grown up under a strange mish-mash of familiar and exotic cultural strains warped by the time and distance separating Niah from the rest of humanity.\n\nIt shows - you don't know your way around, you don't know anyone important, and you don't yet have their trust.  Technically you're in charge.  But you suspect they're eager to teach the Terrans a thing or two about life on the frontier.  How do you approach this issue? \n*choice\n  #Crack the whip.  If people have time to grumble about their boss then they have time to work harder.\n    You increase everybody's workload.\n    *if diligent >55\n      It has the desired effect.  The team actually meshes well, both local and offworld, and you notice the results are steady and impressive.\n      *set investigation + 10\n      *finish\n\n    *elseif egalitarian > 55\n      Unfortunately it simply seems to annoy people.  Perhaps that will change.\n      *set investigation - 8\n      *set sentimental - 8\n      *finish\n\n    *else\n      The work rate goes up but you're not sure whether people are working harder out of respect for you or simply because they don't feel like resisting.  This may or may not be a viable situation in the long term.  You'll have to see.\n      *set investigation + 8\n      *set sentimental - 8\n      *finish\n\n  #Start a PR campaign.  I immerse myself in the local community.\n    A good choice.  It never hurts to put on a happy public face.  You make a point to start appearing at local functions, building local relationships and trying to develop a strong rapport with the people you see around you every day.\n    *if ambitious > 55\n      You're good at this sort of thing and the effort comes easily.  The more you interact with this colony of humans bravely building a new world the more you like them.\n      *set ambitious + 8\n      *set sentimental + 8\n      *set enlightened + 8\n      *finish\n\n    *elseif corruptible > 55\n      Unfortunately more often than not you seem to rub people the wrong way.  You continue having trouble getting the locals to trust you.\n      *set investigation - 10\n      *finish\n\n    *else\n      *set investigation + 8\n      *finish\n\n  #I bring on a co-leader from Niah for the local expertise.\n    \"They're right,\" you say to yourself, \"there's something inherently odd about a group of officers appearing on the scene and simply working amongst themselves on projects that they brought with them.  We're not doing espionage here.\"\n\n    Going forward you try to better integrate your work with that of the authorities around you.  It's obviously easier said than done -- some things, like turf wars, never change no matter how many scrubbings you do of peoples' minds -- but it never hurts to try.\n    *set investigation + 8\n    *set diligent + 8\n    *finish  ", "cleancowv7": "*comment Choice of Worlds Vignette 7\n*comment Copyright 2013 Andrew J. Schaefer\n*comment establishing your personal life, with some intrigue advancing the story thrown in\n\n\nA busy day of work finally ends.  Yet your day is just beginning.\n\nDebussy's soiree begins right on time.  You show up in what passes for a uniform -- a tailored suit with a few discrete service medals -- and with your team in tow.  Like all the guests, you and your team are impressed at the lengths Debussy has gone to throw a party.  \n\n\"Wow,\" Mackenzie says behind you, \"this looks fantastic.\"\n\nIt is a fantastic scene.  You are at the city's most prominent banquet space, which is perched on an outcrop looking across town and onto the lake beyond.  There are no visible walls or ceilings.  So to the untrained eye it looks like you're simply standing on a giant open air platform.  But while there's clearly a storm approaching outside, you're standing in warm, temperate air -- some impressive environmental controls must be in place.  \n\nTurning back to the floor, you see it doubles as a giant visual projector.  On it is a realtime view of Niah's surface at 1/1000th scale as viewed from the Jessica.  Every 30 seconds the floor briefly switches to show either the Jessica itself, a stock view of Earth, or the local starscape.  The party is enveloped in imagery of your past, present and future.  \n\n*page_break\nEnjoying all this -- if they're not distracted by myriad other pleasures -- are the party's thousand guests, themselves being waited on by a hustling phalanx of highly efficient staff.  Colors, sounds and scents waft throughout the throngs.  A pulsating vibe, a mellow aura or mind-focusing silence envelop various groups of guests depending on their needs at the moment.  Everybody seems to be enjoying themselves.  There's a mix here of locals, recent arrivals and in-betweens.  Debussy is making himself visible to Niah's elite.  Nothing this man does, it seems, is merely for show.  \n\nBut enough about him.  Now that you're here, what do you feel like doing tonight?\n*choice\n  #Work the room.  Debussy's not the only one who should be getting to know Niah's movers and shakers.\n    *if ambitious > 60\n      With a quick nod to your team you break off and wade into the sea of guests.  No sooner do you reach the nearest grouping than you realize Debussy himself is at the center of it.  You can't escape this guy.  He is making the rounds, greeting his guests with debonair gusto.  His eyes flash warm recognition when he sees you but he continues his conversation without missing a beat.\n      *goto greet1\n\n    *else\n      Oh man, where to start?  Your team is with you but they're itching to branch off on their own.  That's fine with you, and you nod and they head off.  As you look back into the room you see a couple of clear groupings anchored among the wandering partygoers.  Dignitaries, entrepreneurs, officers and the like are all arrayed before you.\n      *goto greet2 \n\n  #Have some fun.  I haven't been to a party in 40 years and this one looks awesome.\n    *if corruptible > 60\n      It doesn't take long for you to figure out that there are layers upon layers of things going on here.  People are showing up because they were invited to a shipowner's party.  It's the place to see and be seen.  But they're also taking care of their own business.  People are cutting deals, making new friends, getting up to all sorts of dubious good fun.  It's like a duty free zone or something -- the normal rules and restrictions have been temporarily suspended.\n\n      You see this and realize you can get a little for yourself.  After all, as the Jessica's chief quarantine officer and a ranking dignitary newly arrived from Earth, you do have some status here.  \n\n      Within an hour you've managed, simply using innuendo, to get yourself some future perks at a couple of Niah's trendiest establishments.  You'll be having a fine meal on the house at a restaurant that hovers over a waterfall.  You're getting your home professionally refurbished by one of the contractors currently working on a housing colony on a nearby island development.  And you've got a pocket full of stimulants whose precise effect you have yet to figure out.  \n\n      Then it's time for a quick chat with a few more wealthy people.\n      *set corruptible + 10\n      *goto fancy      \n\n    *else\n      Screw everything else.  Your life has been an absolute whirlwind recently.  Eighteen days ago you were frozen asleep on board a starship entering the Niah system.  Everything that's gone on since has left you turned around so many ways you barely know what your name is anymore.  (Ever wake up in a hotel room somewhere and you can't remember for a second where you are?  Try doing that on a different planet.)  If you can't party here then you're not alive.  There's something for everyone.\n\n      You wade right in.  The music is great, the food is sublime, the mood is fantastic.  Energy pulses through you.  You feel not just alive, but powerful.  Vibrant.  Possessed.\n      *set ambitious - 5\n      *goto fancy\n\n  #Keep digging on quarantine issues.  \n    *if investigation \u003c 40\n      Maybe you should be ready.  You make conversation with a few people here and there but nothing helpful comes up.  There was a death on board, and a few mysterious things here and there since then, but nobody's got anything new to say.\n\n      You do run into some local politicians, however.\n      *goto politicos  \n\n    *elseif ruth > 0\n      It's hard to pivot into party mode when you just spent the day dealing with a rogue passenger.  Nor is it easy to canvass a festive group of locals about something they technically shouldn't know anything about, never mind what happened on board ship.  \n\n      So you think about things for a second.  Then you decide on a strategy for the evening.\n      *choice\n        #Have all five of us work the room, searching for any information that might seem useful.\n\n          Of course this means the partying will have to wait.  You tell your team that they're still on the clock and, for a moment, they look deflated.  Then they bounce back and sweep out into the crowd.  They'll still get to mix with the other partygoers so it's not like you've taken all the fun away.  Plus five people, independently investigating, can probably come up with a lot more information than just one, or even five people working as one group.\n\n          Heddes gets back to you first.  He tells you that Debussy is preparing to give a big speech.  \"Looks like the man's going to want everyone's attention,\" your junior agent tells you, \"so perhaps we'd better compare notes right now.\"  You agree and, with a few waves of your fingers, link everyone into a secure conference.  \n\n          *page_break\n          \"Not much to report,\" Dallas says, \"especially so soon after we started.  I talked about Ruth to a few people and it didn't seem to ring any bells.\"  Mackenzie and Bryson nod in agreement while Dallas continues talking: \"Nor did anyone really have anything to say about the ship.  The Jessica passengers seem happy to be back on dry land and the Niah folks are much more interested in the latest tech from Earth than in any social stuff.\"  \n\n          \"My thoughts exactly,\" Heddes says.  \"I wish I had another chance to pack my cargo allotment.  I would have brought some different things with me if I'd known.  But anyway, there's one other thing I noticed.  People seem to know a lot about us.  I think a couple people might actually know there's a quarantine screen.  Maybe not,\" he says a moment later, \"but at least there's the sense they know about something.\"  Then Heddes pauses, as if to say something else, but looks unsure.\n\n          Debussy reappears before this can go any further.  He's front and center of the room, essentially demanding everyone's attention.\n          *set diligent + 5\n          *goto storm\n\n        #Talk to people myself; going in as a team would attract too much attention.\n\n          \"Listen,\" you say to your team by way of pep talk, \"it's been a tough day.  Have some fun.  I'll check back in if there's anything to discuss.  Otherwise see you tomorrow.\"\n\n          They're almost out of sight before you've stopped talking.  The mass of people swallows them right up.\n\n          So you spend the next hour by yourself doing your best to pick the brains of these masses of people.  It doesn't get you very far.  After all you're trying to be discreet.  You talk to some fascinating people -- virtually all the guests are flitting from one new friend to the next -- and get a better feel for life here.  (Niah locals are almost always a trip back in time, since the Earth they grew up knowing is two or three generations older than yours.)  But on the question at hand -- Ruth and what happened to her -- you don't really learn much of anything.  She was too new and there's no history of any type of similar behavior.  At least as far as the people you talked to know.  So the mystery continues.\n\n          You also have a laugh with a few locals who apparently thought you were trying to find yourself some quick sex.  Apparently on Niah that sort of thing is referred to as 'looking for a new arrival.'  Troubling, perhaps, that these supposedly screened people associate anonymous starship passengers with sex, but you can't solve everything.  \n\n          One important thing that does become apparent, however, even in just this short time is that some of Niah's elite seem more familiar with the concept of a quarantine screen than they should.  It's nothing specific you can put your finger on.  Instead it's a feeling you get, sort of just a generalized vibe, that this secret might not be so secret.  Sort of like how most people aren't good at feigning surprise when they're told something they're not supposed to know but actually already do.\n\n          Debussy reappears before this can go any further.  He's front and center of the room, essentially demanding everyone's attention.\n          *set diligent + 5\n          *goto storm\n\n        #Make a public announcement about Ruth, asking for information about her.\n\n          Don't worry, it's not like you have to grab the microphone and interrupt the party.  Your status comes with a few privileges.  One of them is the ability to link in to the grid and override firewalls.  So you send a message out that just discretely asks that anyone at the party who has information to please see you at their earliest convenience.  The message transmits to the agents, drones, receptors, and whatever else each person has in place to handle incoming messages.  \n\n          Then you quietly move amongst the guests and hope for some feedback.  You would never send a message like this to the entire planet, or even to a group any bigger than the one here tonight, because it would do more harm than good.  All you'd get back would be gossip, rumor and outright fiction.  But a time-sensitive message to a limited group of people in your presence is something that might pay off.\n          *goto public\n\n    *else\n      This really is the perfect place.  Virtually everybody you'd ever need to see is here.  You've found over the years that people are actually a lot easier to talk to in party settings -- they're relaxed, they're unguarded, they're eager to please.\n\n      People know who you are and they seem to take your questions sincerely.  But the more you dig the more you get the distinct impression that there's something you're supposed to know about but don't.  On more than one occasion you find yourself talking to a member of Niah's elite who clearly understands the quarantine process and, more importantly, thinks it's not infallible.  Almost as though the quarantine is a test, or a hurdle, and that the challenge for society's leaders is to figure out how to best it.\n\n      You're about to pursue this further when Debussy's booming voice interrupts everything . . . .\n      *set diligent + 5\n      *goto storm\n\n*label public\n\nWhat happens next surprises you.\n*page_break\n*if diligent \u003c 40\n  A man walks towards you.  He's tall, with the unmistakeable look of somebody who's been on a lot of starships.  \"Captain ${lastname}, I presume,\" he says, stiffly, in an accent that you cannot place.  \"My name is Gillard.  I'm sorry to say that your bulletin might not get you the response you expected.\"\n\n  Quickly he explains the problem.  In your effort to be discrete you'd posted a message that simply said you were interested in a certain woman recently arrived from Earth.  Apparently the way you'd phrased it, the locals all assumed you were looking for a prostitute.\n\n  Oops.  That would explain the hysterical laughing you'd heard a minute earlier from one corner of the room.  \"Presumably that was not your intention,\" Gillard says, \"though it is probably too late to proffer a correction.\"  You and Gillard chat for a few minutes longer before things run out of steam.  \"Don't worry,\" he says by way of farewell, \"this sort of thing happens all the time here.\"  While that's small consolation to you, fortunately there's something vastly more exciting about to happen.  Debussy is up front and getting ready for a speech of some kind.  His booming voice suddenly interrupts everything else going on.\n  *set ambitious - 8\n  *set sentimental - 8\n  *set investigation - 8\n  *goto storm\n\n*elseif diligent > 59\n  A man walks towards you.  He's tall, with the unmistakeable look of somebody who's been on a lot of starships.  \"Captain ${lastname}, I presume,\" he says, amiably, in an accent that you cannot place.  \"My name is Gillard.  I'm with local services\" -- a euphemism, you've learned, for the security apparatus -- \"and I might have some information that would help you.\"\n\n  Alright, you think to yourself.  You give Gillard a little bit of background.\n\n  \"She is not in our records,\" he answers.  \"However, it would appear that this issue has arisen several times before.  Nine starships have come out from Earth in the last 50 years.\"\n\n  \"That you know of,\" you respond.\n\n  Gillard shakes his head.  \"Nine for certain.  It's impossible to hide a decelerating starship, especially one coming all the way from Earth.  There are children on Niah who've never known a night sky without your bright Jessica in it.  Well, until last week, anyway.  But to the issue at hand, it seems that on three of the last four ships the same personality defect manifested.\"\n  *page_break\n  He continues:  \"Each time it had something to do with the way the individual's mind had been modified back on Earth.  There's something about the method used to revive coldsleep passengers\" -- and here he gives you a knowing look -- \"that seems to upset whatever artificial equilibrium their mental state was in.\"  Then he tells you that each case ended quickly, just as yours apparently has.  \"It's doubtful there's any lingering contamination,\" he says.\n\n  Gillard also tells you, though you hadn't asked, that the most recent starship before yours was the Artemis.  Her screening crew were only three people.  One now lives on Hadley's World, three light years away; the second's whereabouts are unknown; and the third died two years ago.\n\n  \"This just seems to happen from time to time,\" he says.  Whether that's entirely true or not, you get the clear sense that Ruth didn't leave a lasting impression on anyone here.  Your concerns about her presence being a contaminant of some sort appear unfounded.\n\n  Regardless, Debussy himself interrupts before this discussion goes any further.  Well, not your conversation specifically, but everyone's.  He's up at the front of the room about to give a speech.\n  *set investigation + 5\n  *set egalitarian + 10\n  *goto storm\n\n*else\n  A man walks towards you.  He's tall, with the unmistakeable look of somebody who's been on a lot of starships.  \"Captain ${lastname}, I presume,\" he says, amiably, in an accent that you cannot place.  \"My name is Gillard.  I'm with local services\" -- a euphemism, you've learned, for the people who do background checks for property owners -- \"and I might have some information that would help you.\"\n\n  You discuss the case a little more.  Gillard explains what he knows about how Ruth got to be living in the place where you found her.  There were some unusual aspects to her application.  \"It's like she was having trouble being honest about herself,\" he says.  \n\n  This is interesting but also more or less what your team had already deduced.  And when you press Gillard, he admits there isn't much more to the story.  Your concerns about her presence being a contaminant of some sort appear unfounded.\n\n  Just as you start to think about heading back into the crowd to mingle further, Debussy cuts your investigation short.  He's up at the center of the room and it looks like he's getting ready to make a speech.\n  *goto storm\n\n*label greet1\n*if newz = 1\n  \"Fascinating, it was simply fascinating,\" Debussy is saying, to three tall, beautiful women to his right.  \"The way Earth handles its housing needs is positively barbaric compared to your progressive approach.  In fact -- why, everyone, it's Captain ${lastname}, my favorite quarantine officer.\"\n\n  A handful of groans are unmistakeable next to the smiles in the group as Debussy introduces you to the regional habitation coordinators.\n  *goto greetmore\n\n*elseif newz = 2\n  \"You see, colonel,\" Debussy is saying to one old man, \"Earth believes it has already done and seen it all.  There is nothing new.  There is nothing original.  No matter what happens, no matter what new invention or development or crisis may appear, the people will simply sigh, feign disinterest, then claim that this new event is nothing new at all.  That it merely reminds them of some other, more significant past event they can now bore you with by discussing in endless detail.  How contemptible!  I say, why should one bother living at all if one merely views one's own life as but a pale reenactment of grander histories?  That is why people like myself and our good Capt. ${lastname} --\" here he takes you by the shoulder -- \"have made our little trip to your planet.  We hope you will be patient with us as we try to live up to your accomplishments.\" \n\n  The colonel looks impressed.  His uniform suggests he is a member of the Niah Home Guards.  Every colony starts out with one.  Here on Niah it's hard to understand what they can possibly do since there are no aliens (hostile or friendly) and nobody's planning an invasion.  It would take too long and cost infinitely too much.  Perhaps the colonel and his Home Guards serve as de facto ambassadors at parties.\n  *goto greetmore\n\n*else\n  \"Never, Mr. Andersson, the ship was never in any danger.\"  Debussy is thick in discussion with the former passenger from the Jessica.\n\n  \"But sir, the reports suggest that every starship in that class, including the Jessica, had the same technical flaw.\"\n\n  Then a second passenger cuts in:  \"It could have exploded.  It absolutely could have.  We're lucky we weren't killed!  How can you --\"\n\n  \"-- now please, gentlemen,\" Debussy says with a smile, \"let's not argue over events that did not happen.  I own that ship, I was aboard that ship, and I am here with you safe and sound just as I expected to be.  I assure you we were never in any danger, above and beyond the normal hazards one accepts in conjunction with spaceflight of course.  But my engineers continue to go over our ship with a fine-toothed comb and if they learn of anything, anything at all, I will be sure to notify you promptly.\"\n  *goto greetmore\n\n*label greetmore\n\n*page_break\nAnd with that, Debussy takes his leave.  He says a few more nice things about you before using your arrival as an obvious opportunity to move on to the next group of guests.  Almost as though he's using you as his stand-in.\n\nFor a few moments you actually pull it off.  You break the ice by doing your best Debussy impersonation -- complete with a dramatic wave of the hand and a turn of your imaginary cape -- and everybody laughs in benign approval.  Inevitably, however, the group breaks up so the guests can move on with their own mingling.  Finally it's just you and one other person, somebody from a Niah banking family, talking about how the planet is progressing.  \n*if investigation > 60\n\n  It's an interesting conversation.  But the longer it lasts the more you get the distinct impression that there's something you're supposed to know about but don't.  You're talking to somebody who clearly understands the quarantine process and, more importantly, thinks it's not infallible.  Almost as though the quarantine is a test, or a hurdle, and that the challenge for society's leaders is to figure out how to best it.\n\n  You're about to pursue this further when Debussy's booming voice interrupts everything . . . .\n  *set diligent + 5\n  *goto storm \n\n*else\n\n  You learn a bit more about the place and about how things work here.  None of this is time wasted on your behalf, though whether the same can be said about the people who have to talk to you you're not so sure.  In any event, just as the conversation hits a silent spot, none other than Debussy himself breaks the silence.\n  *set ambitious + 10  \n  *goto storm\n\n*label greet2\n\nYou need to pick a target.  Where do you start mingling?\n*choice\n  #With that group of people I think are Niah politicians.\n\n    Yep, they're clearly politicos because they're busy making themselves visible.\n    *goto politicos\n\n  #With the officers from the Jessica.\n\n    You recognized the ship's crew immediately, of course.  And even now they seem to be sticking together.\n    *goto officers\n\n  #With those people who look super rich.\n\n    Some of the locals have done fantastically well for themselves, of course, regardless of the path humanity is taking.  There are wealthy people scattered all over the party but you decide to start with a small group that looks particularly comfortable with one another, figuring a happy group will be easier to approach than an individual possibly on the defensive.  \n    *goto fancy\n\n  #Doesn't matter - let's just go wherever they look friendly and take it from there.\n\n    Eeeny, meeny, miney, moe . . . .\n    *if newz = 1\n\n      You quickly settle on a group of people busy making themselves visible.  They must be politicians, you think to yourself.\n      *goto politicos\n\n    *elseif newz = 2\n\n      You quickly catch sight of the Jessica's senior officers, and you head over to catch up.\n      *goto officers\n\n    *else \n\n      There are wealthy people scattered all over the party but you decide to start with a small group that looks particularly comfortable with one another, figuring a happy group will be easier to approach than an individual possibly on the defensive.\n      *goto fancy\n\n*label politicos\n\nYou may be 31 light years from Earth but some things never change.  There's always a government of some sort, staffed by people of varying degrees of ambition and corruption, who think they're very important.  It could be the local school board, the stellar mining consortium, or the Niah city council and the same predictable patterns would appear.  \n*if sentimental > 50\n\n  You walk up to this group and a young woman in an old-fashioned outfit stops speaking mid-sentence.  \"Why hello, Capt. ${lastname},\" she happily exclaims, \"this is a real pleasure!\"\n\n  You don't know who she is.  You don't know any of them.  But sure, you think to yourself, this is a pleasure for me, too.  \n  \n  \"Well it's my pleasure to please you,\" you respond, and as the words leave your mouth you realize, to your horror, how pervy you sound.  Mercifully the woman is unfazed.  \n\n  \"Oh ${firstname}, if I may call you that, I just love that Earth humor.  I wish we had more of that around here.\"  Clearly she's got a thing for Earth people.  \n\n  Just then the lights change and the music stops.  Debussy is at the front of the room and he is beginning to speak.\n  *goto storm\n\n*elseif egalitarian \u003c 50\n\n  As you approach you see the group grow quiet, as if waiting for you to engage.  The first thing they want to know is whether you're still on Jessica duty or whether you're moving on.\n  *gosub purpose\n  *goto storm\n      \n*else\n  Oddly, you try to mingle and get rebuffed.  Apparently there's a protocol here.  Random newcomers don't simply walk up to an ongoing conversations between VIPs and insert themselves as though they belong.  Your social faux pas bewilders you but is apparently obvious to everyone who lives here.\n\n  So you spend a few more awkward minutes standing on the edge of this insular group before Debussy comes to your rescue.  He brings the party's opening act to a close when he steps up to a podium and begins to speak.\n  *goto storm\n\n*label purpose\n\n*if case = 1\n  Since you're following up on the issue of Augustine's potential killer, then yes you're still actively involved in starship issues, and you tell them that.  Which on this world means you matter.\n\n  \"It's interesting,\" begins the man to your left, \"something similar actually happened on another starship as well.  A passenger who made it all the way out here only to pass away just before thawing.  The Minerva, right, Jenkins?\"\n\n  Yes, nods Jenkins.  \"Six years ago.\"\n\n  The first man continues:  \"I'm the current prefect for the region but my predecessor was in office back then.  So I wasn't consulted on the final resolution of the matter.  But if I understood clearly, and I don't have all the requisite information immediately at my disposal, then any potential foul play must have taken place entirely aboard ship.  The passenger was confirmed dead at least a day before the Minerva reached port.\"\n\n  Jenkins interrupts:  \"Only somebody who had woken before the general passengers could have done it.\"  He gives a knowing glance to the medals on your lapel as he says this.  Starship agents, of course, get up before everyone else, though the ease with which this group talks about such things is oddly disconcerting.\n\n  This is the kind of story starship travelers have to deal with all the time.  Despite all the new technology at your disposal, the time and distance involved in spaceflight have made quick communication across worlds impossible.  It's like returning to the days of sailing ships and stage coaches, when battles would be fought in wars that had ended months earlier only nobody knew about it yet.  You shake your head at information you should have known about from the start.\n\n  Before this goes any further, however, Debussy breaks things up.  He's at the podium beginning to speak.\n  *set investigation + 10\n  *return\n\n*elseif DNA = true\n  And since you are, there appears to be lots to talk about.  As a ranking officer of some continuing importance, you matter to these people.  \n\n  It's an interesting conversation.  But the longer it lasts the more you get the distinct impression that there's something you're supposed to know about but don't.  You're talking to somebody who clearly understands the quarantine process and, more importantly, thinks it's not infallible.  Almost as though the quarantine is a test, or a hurdle, and that the challenge for society's leaders is to figure out how to best it.\n\n  You're about to pursue this further when Debussy's booming voice interrupts everything . . . .\n  *set investigation + 5\n  *return\n\n*else\n  To be honest, you're putting the ship behind you.  And once that comes across, this group of Niah's political elite quickly loses interest in you.  You get in a few chitchats and a couple nice turns of phrase but that's about it.  \n\n  Fortunately, just as things are looking bleak Debussy of all people comes to your rescue.  He's up front beginning a speech or something.\n  *return\n\n*label officers\n*if image = true\n\n  As soon as you walk towards them, you see a tech officer's face brighten.  It's the guy who showed you the image on Augustine's freezer pod.  \"Captain ${lastname}, glad you're here.  We found two other images on the pod.\"\n\n  \"I know,\" you reply, \"I got the news this morning.  A sleeping angel and a man in chains.  But we don't know who they are, right?\"\n\n  \"That's the thing,\" he says.  \"We don't think they're anyone.  It's impossible to say for sure because we only have the ship's database to go by, and it's not perfectly comprehensive.\"\n\n  If it was, you think to yourself, then you wouldn't be here.\n\n  But the tech continues:  \"But we did every search we could and nothing came up.  No specific hits.  In fact, we think Augustine himself might have created the three images some time between 150 and 200 years ago, when he did a couple spells in an immersion pod.\"\n\n  *page_break\n  Immersion pods are single-person capsules that sit in high-Earth orbit.  They're fully self-sufficient.  Once they were perfected and no longer so dangerous, some of Earth's most accomplished creative types loved using them for the isolation.  You could float by yourself out in space, cut off from all civilization, with views of Earth, the stars, and the cosmos before you.  People found it incredibly stimulating.  After a few weeks they could reach an almost transcendental state.  They wrote, sang, drew and composed works of incredible complexity and originality.  \n\n  Augustine did this a few times and it's how he did some of his signature work.  The flipside, of course, is that what makes perfect sense to somebody who's been in an immersion pod for a while may be unintelligible to anyone else, like when somebody incredibly drunk or on drugs tries to write a novel in three hours.\n\n  The tech is still talking.  \". . . . so they're most likely symbolic.  Representations not of a specific person's death but rather a specific type of death.\"\n\n  Now that's interesting, because the image on Augustine's freezer pod was of an ancient man who'd apparently been killed.  Presumably the sleeping angel could have shown up.  It didn't, of course.  You raise that point:  \"So you think the image is his way of saying he was killed?\"\n\n  \"Yep.\"\n\n  Just then the lights go up and the music stops.  Debussy is front and center and he's starting a speech.\n  *set investigation + 15\n  *goto storm\n\n*else\n\n  \". . . .efficiency by at least another half a percent.\"  One of the chief engineers is talking as you approach.  \"Oh hi, Capt. ${lastname}, good to see you here.\"\n\n  Another one looks at you and says, \"I'd joke about what you wiped from my brain but since I don't know what it is I don't know what to say.  But I still want to take that smoking hot socialite over there to bed so thanks for not messing that up.\"\n\n  \"You're welcome,\" you say, as you think to yourself that all this particular engineer had was porn so if you'd gone after his sex drive you might as well have killed him.  \"But don't talk about it ever again.  They're --\" as you say that you glance around at the Niah locals -- \"not supposed to know.\"\n\n  Just then the lights go up and the music stops.  Debussy is front and center and he's starting a speech.\n  *goto storm\n\n*label fancy\n  \nNow this is where the party is.  You've only just gotten here, you don't know anyone, and already you're feeling awesome.  You don't make any new business connections, you don't help crack any outstanding cases, yet you feel like you're actually accomplishing something incredibly important -- getting your own mind and body back on an even keel after everything that's happened.  \n\nSuddenly it hits you just how lonely you are.  You left Earth behind -- you left humanity's birthplace behind -- and ever since you've been either frozen in a virtual coffin or skimming over people's deepest thoughts or doing lord knows what else for your job.  \n\nMaybe now it's your turn.  Perhaps what you really need, what you've really been missing, is companionship.  The mood tonight is light, festive -- promising.  It seems to be in the air.  (You can see one of the Jessica's engineers practically drooling over a sexy young socialite just beyond his reach.)  Are you feeling lucky?\n\n*choice\n  #I'm scared, gimme another drink first.\n    Hang on, you think, let me get fortified.  You head back to one of the bars and order yourself a stiff drink.  As you wait you glance around and see a few people catching your eye -- including somebody you're surprised to discover, once they turn around, is on your team.\n\n    Anyway, after a short wait your drink arrives.  The first sip is smooth and satisfying.  Exactly what you wanted.  \n\n    Just then, however, the music stops and the lights go up.  Debussy's at the head of the room and it looks like he's going to give a speech.\n    *goto storm\n\n  #No -- I don't go to social events for cheap, meaningless sex.\n\n    Whoa, you think, tone it down.  I just got here.  I've waited 40 years to meet somebody, I don't need to embarrass myself the first chance I get.\n\n    So you get back to what you came here for, which was schmoozing with people who look fun.  It doesn't amount to much because you're new and these people don't really seem to know who you are.  But you do get some interesting tidbits about life here on Niah.  The trendy parts of town, the areas of countryside attracting attention, the more distant parts of this planet that are on peoples' radar screens.  \n\n    Somebody starts telling you about an unusual light that Niah's moons cast over the ocean twice a year, when everything lines up just right.  It's apparently something of an aphrodisiac.  With your interest piqued, you're about to dive into this topic when suddenly the music stops and the lights go up.  Debussy's at the head of the room and it looks like he's ready to give a speech.\n    *goto storm \n\n  #You bet.  Let's start playing the room.\n\n    Giddyup.  Are you interested in people you already know, or are you looking to hook up with somebody you've never met before?\n    *choice\n      #Totally new.  \n\n        You wade into the crowd and quickly set your sights on a few people glancing your way.  \n        *goto hookup\n\n      #Somebody I know.\n\n        An interesting choice, given that you only know a few people here.  Your team.  But with all you've been through together, it's fair to say you've gotten to know one another quite well.\n        *goto teamhookup\n\n*label hookup\nChecking them out, what are you thinking?\n*choice\n  #I need to meet that cute guy right now.\n    And apparently he needed to meet you, too.  His name is Paolo, he's from an Italian hill town called Pienza, and he got here 8 years ago.\n    *set love_interest 1\n    *goto paolo  \n\n  #Who is that woman looking my way?\n    It takes you all of about three minutes to work out that her name is Livia, she's from Orvieto in Italy, and she got here 8 years ago.\n    *set love_interest 2\n    *goto livia\n\n  #Aw, forget it.\n    Suit yourself.  Fortunately, just as you back down Debussy saves you any awkward silence by beginning a speech.\n    *goto storm\n\n*label paolo\n\nIt doesn't hurt that Paolo gets better looking with every drink you take from the waitstaff.  He's exactly your type.  And he's from one of the small hill towns in Tuscany that people have been loving for centuries.  You spend the next hour getting to know one another better.  What starts out as something simple quickly gets more serious.  This could have the makings of something longer term, if that's what you're interested in.\n\nAnd that's when the party suddenly stops.  Debussy is up at the front of the room and it looks like he's getting ready to give a speech.  Talk about timing!\n\n*page_break What's it going to be?\nPaolo looks over in Debussy's direction and frowns.  \"I don't need to listen to another of his speeches,\" he says.  \
