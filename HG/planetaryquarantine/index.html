"Come on, ${firstname}, let's get out of here.\"  Suddenly you've got a decision to make.  \n*choice\n  #I'm with Paolo.  Time to find somebody to share my life with.  \n\n    \"Let's go,\" you say, \"before anyone notices.\"  And with that you head for the door.  You glimpse a few people here and there taking note of your departure, but by and large everybody's looking towards Debussy at the far end of the room and they're not worrying about the goings on down the back.  Especially since the lights are going off.\n\n    There's one man who is moving to intercept, however.  Just as you're about to reach the door he catches up to you.  \"Excuse me, Capt. ${lastname},\" he says, deferentially, \"I was wondering if I could have a word with you before you leave.  My name's Bastian and it's about some issues I had on the Jessica.  You were on that ship too, correct?\"\n\n    Bad timing.  \"I was, Mr. Bastian,\" you reply, \"and I'd love to talk to you but right now's a terrible time.  Come to my office tomorrow and I'll make sure to give you all the time you need.\"  Even if that's not technically true, you always like to sound magnanimous when you're blowing somebody off.  \n\n    And with that you're out the door and into the real night.\n    *set ambitious - 10\n    *set investigation - 10\n    *set diligent - 10\n    *set partner \"Paolo\"  \n    *finish\n\n  #No, I should probably stay and listen to this.\n\n    \"This could be important,\" you say.  \"I don't think it's a good idea to leave the party just as we're finding out why it's happening.\"\n\n    Paolo smiles.  \"You're right, of course.  But you forget, you've only been here for 4 days.  I've been here for 8 years.  None of this is new to me.\"\n\n    \"I'm new to you,\" you respond, slightly hurt.\n \n    Paolo smiles again, but this time the smile says something slightly different.  \"Again, you're right.  I'm sorry.  But it's still clear that there's something very different between us.  You're new to me, true, but everything on this world is new to you.  You're just discovering all of it.  I can't possibly compete with an entire civilization, not right now.  I'm looking for something a lot more mundane.  You stay here, enjoy whatever bells and whistles Debussy has to offer, and look me up in a couple days.\"\n\n    And with that he's gone.  \n    *set love_interest 0\n\n    You turn back towards Debussy, who is already nearing the end of his speech.  Something about drinks with ice cubes made from Earth water or something.  A waiter hands you a glass and you drink it eagerly, momentarily feeling buzzed before settling back down again with a fully cleared head.  On the one hand you're upset that Paolo left so suddenly but on the other hand you're wondering if perhaps it was for the best.  \n    *goto storm2\n\n*label livia\n\nIt doesn't hurt that Livia gets better looking with every drink you take from the waitstaff.  She's exactly your type.  And she's from one of the small hill towns in Tuscany that people have been loving for centuries.  You spend the next hour getting to know one another better.  What starts out as something simple quickly gets more serious.  This could have the makings of something longer term, if that's what you're interested in.\n\nAnd that's when the party suddenly stops.  Debussy is up at the front of the room and it looks like he's getting ready to give a speech.  Talk about timing!\n\n*page_break What's it going to be?\nLivia looks over in Debussy's direction and frowns.  \"I don't need to listen to another of his speeches,\" she says.  \"Come on, ${firstname}, let's get out of here.\"  Suddenly you've got a decision to make.  \n*choice\n  #I'm with Livia.  Time to find somebody to share my life with.  \n\n    \"Let's go,\" you say, \"before anyone notices.\"  And with that you head for the door.  You glimpse a few people here and there taking note of your departure, but by and large everybody's looking towards Debussy at the far end of the room and they're not worrying about the goings on down the back.  Especially since the lights are going off.\n\n    There's one man who is moving to intercept, however.  Just as you're about to reach the door he catches up to you.  \"Excuse me, Capt. ${lastname},\" he says, deferentially, \"I was wondering if I could have a word with you before you leave.  My name's Bastian and it's about some issues I had on the Jessica.  You were on that ship too, correct?\"\n\n    Bad timing.  \"I was, Mr. Bastian,\" you reply, \"and I'd love to talk to you but right now's a terrible time.  Come to my office tomorrow and I'll make sure to give you all the time you need.\"  Even if that's not technically true, you always like to sound magnanimous when you're blowing somebody off.  \n\n    And with that you're out the door and into the real night.\n    *set ambitious - 10\n    *set investigation - 10\n    *set diligent - 10\n    *set partner \"Livia\"\n    *finish\n\n  #No, I should probably stay and listen to this.\n\n    \"This could be important,\" you say.  \"I don't think it's a good idea to leave the party just as we're finding out why it's happening.\"\n\n    Livia smiles.  \"You're right, of course.  But you forget, you've only been here for 4 days.  I've been here for 8 years.  None of this is new to me.\"\n\n    \"I'm new to you,\" you respond, slightly hurt.\n \n    Livia smiles again, but this time the smile says something slightly different.  \"Again, you're right.  I'm sorry.  But it's still clear that there's something very different between us.  You're new to me, true, but everything on this world is new to you.  You're just discovering all of it.  I can't possibly compete with an entire civilization, not right now.  I'm looking for something a lot more mundane.  You stay here, enjoy whatever trinkets Debussy has to offer, and look me up in a couple days.\"\n\n    And with that she's gone.  \n    *set love_interest 0\n\n    You turn your attention back to Debussy, who is already nearing the end of his speech.  Something about drinks with ice cubes made from Earth water or something.  A waiter hands you one of these drinks and you down it in one gulp, Livia's image still looming large in your mind.  You feel a wave of drunkenness pass over you before you settle back down again.  Your mind is cleared.\n    *goto storm2\n\n*label teamhookup\n*comment this is where you think about hitting on somebody on your team; if your traits are low then it backfires\n*page_break\nIt takes a minute to locate your team again.  They'd wandered off when you all first arrived at the party.  Right now they're surrounding a local bartender, laughing and shouting, working up the courage to drink something new and strong. \n\nActually it's just the juniors; Mackenzie isn't with them.  You take a moment to watch your three assistants from afar.  They look happy.  They're on a new planet, decades from home, yet they look completely comfortable with their surroundings and with each other.  It's like they came out here without a care in the world.  \n\nBryson sees you first.  \"Oh, sir,\" she says, straightening, \"we didn't see you there.\"  The others stop also and look your way expectantly.  You can see Dallas getting ready to make some comment before Heddes gently, almost imperceptibly, restrains him with a touch to his arm.  \n\n\"I've been looking for the life of the party,\" you reply with a grin.  \"But I seem to have found you three instead.\"\n*page_break\n\"Don't forget Marcus here,\" Dallas says, motioning to the bartender, who nods at you sternly.  \"He's just getting us all shots of something called a cesium.  Sounds pretty deadly, if you ask me, but who am I to question how the locals enjoy their beverages?  You in?\"\n\nEverybody looks excited, even almost bartender Marcus.\n\n\"Come on, ${lastname}, it's a rite of passage.  Are you in for a cesium shot?\"\n\nHow do you answer?\n*choice\n  #\"You bet -- that's why I'm here!\"\n\n    Dallas cheers.  Bryson and Heddes laugh.  Marcus the bartender pulls up another glass and fills it with some kind of thick bluish-white liquid that seems to glow slightly.  You and your three officers raise your glasses together.  You're apparently going to get plastered with these people, no questions asked, and the thought suddenly amuses you.  \"Here's to acting without getting any necessary information,\" you say, in contrast to how you all normally do your jobs.  Then you drink.\n\n    Oh christ, you think a moment later, what was that?!?  Your glass was cold but the liquid was oddly warm going down.  You can feel it coat your throat and enter your stomach.  Then you can feel it start to course through your bloodstream.  out to your fingertips and down to your toes, before heading up your neck and into your head.  Once it reaches your brain your head starts to gently vibrate, like someone's put a tuning fork to your temple.  At the same time your whole mood shifts, until you just want to smile and hug anyone close to you.  Even Marcus the bartender.\n\n    \"I love all of you,\" you hear yourself saying, just as the others start to say more or less the same things.  It's a great big love-fest.\n    *page_break\n    *goto shot\n\n  #\"'Cesium?'  Seriously?  What's actually in it?\"\n\n    They frown, like you're something of a party-pooper.  \"How do we know?\" Dallas asks.  \"That's the whole point!\"\n\n    Marcus the bartender interjects.  \"I won't go into the whole ingredient list, sir,\" he says to you, \"nor do I want to spoil the fun for your friends here.\"  Then he tilts his head and smirks a bit before speaking again:  \"But I will say that the drink comes from the starships themselves.  A byproduct of interstellar propulsion.  Not just a literal chemical substance, but a concoction that would not exist but for the relativistic effects of near-light travel.  In our age, and our age alone.\"\n\n    Everyone's suitably impressed.  You're still not sure what you're drinking, of course, and you're not sure that calling something 'a byproduct of interstellar propulsion' makes it any more appetizing.  But when in Rome, as they used to say . . . .\n    *page_break\n    Dallas cheers.  Bryson and Heddes laugh.  Marcus the bartender pulls up another glass and fills it with some kind of thick bluish-white liquid that seems to glow slightly.  You and your three officers raise your glasses together.  You're apparently going to get plastered with these people, no questions asked, and the thought suddenly amuses you.  \"Here's to acting without getting any necessary information,\" you say, in contrast to how you all normally do your jobs.  Then you drink.\n\n    Oh christ, you think a moment later, what was that?!?  Your glass was cold but the liquid was oddly warm going down.  You can feel it coat your throat and enter your stomach.  Then you can feel it start to course through your bloodstream.  out to your fingertips and down to your toes, before heading up your neck and into your head.  Once it reaches your brain your head starts to gently vibrate, like someone's put a low-frequency tuning fork to your temple.  At the same time your whole mood shifts, until you just want to smile and hug anyone close to you.  Even Marcus the bartender.\n\n    \"I love all of you,\" you hear yourself saying, just as the others start to say more or less the same things.  It's a great big love-fest.\n    *page_break\n    *goto shot\n\n  #\"You guys go ahead, I'll sit this one out.\"\n    \"If you say so,\" Bryson answers, \"but I think you're missing out.\"  She tilts her head in a way that suggests she's talking about more than just a shot.  But it's too late for that.\n\n    Marcus the bartender lays the drinks out for your team.  You watch them each take a small glass full of some kind of glowing, bluish-white substance you've never seen before.  They smile at you and then raise their glasses before quickly downing what's in them.  \n\n    Whatever they just drank it's no ordinary shot.  Something sweeps over each of them, something you swear you can almost see, like an unseen illustrator is slowly coloring in their features.  Pretty soon their minds are in a different place.  Heddes, then Dallas, then Bryson hug you affectionately.  But it's nothing personal -- Marcus the bartender gets a hug next, followed by a couple of in-system navigators standing nearby, followed by whoever else is unlucky enough to be within hugging distance.  You're left watching your teammates from afar.\n\n    Fortunately this awkward arrangement comes to a swift end.  The junior officers wander away just as the house music stops and the lights all come on.  Your attention is drawn to the front of this monstrously large room, where it appears Debussy is about to give a(nother) speech.  \n    *goto storm \n\n*label shot\n*comment run with trait options, either group or pairing off\nNow, it's worth noting that this is all alcohol-induced.  \n*if corruptible > 60\n\n  When you wake up the next morning you have a magnificent hangover but not much else to show for it.  \n\n  \"Good morning,\" Bryson says, smiling.  She's standing at the foot of the bed you're in.  As she talks she gently pulls back the window shades to let in the light of a spectacular sunrise.  Niah's orbit is more elliptical than Earth's, meaning that summer doesn't have the longest days of the year.  \n\n  \"How'd you sleep?\"  This time it's Dallas talking, not Bryson, and he's walking over to his fellow officer to hand her a mug of coffee.  Dallas smirks.  \"You, uh, got pretty sleepy pretty fast last night.  Hope you don't mind but we put you here.\"\n\n  As you come to your senses you realize where \"here\" is.  You're not actually in a bed at all.  You're in an inflatable heat shield -- pretty comfortable, actually -- wrapped in catering blankets and sleeping in one of the side rooms to the banquet space itself.  You've traveled all of about 50 meters from where Marcus the bartender was working.\n  *page_break  \n  \"I slept like the dead,\" you finally answer, groggily.  \"Coldsleep all over again.  I never even dreamed.  Just opened my eyes and here I was.  Come to think of it, I don't even remember how I got here.\"\n\n  \"Probably for the best,\" Bryson says, giggling.  \"I don't think any of us remember everything, and --\"\n\n  \"--and there's some stuff we'd probably want to forget,\" Dallas interrupts.\n\n  It's clear that as far as the juniors are concerned, last night's events are best left forgotten.  You instinctively check your data uploads with a few waves of your fingers, on the assumption that you were still recording whatever you did.  But to your surprise there's almost nothing there.  Which stops surprising you once you remember that you'd switched it to personal confidential mode once you decided to move in on the fun last night.\n\n  There is, however, one nugget of information available.  In between a few images of Heddes swinging his leg supports over Dallas' head, you see a report that your personal security perimeter alarm was briefly activated.  That means a weapon of some kind was pointed at you without your knowledge.  You don't know when or by whom.  All you do know is that in all likelihood somebody outside your group thought about shooting you -- while you were staggering around drunk -- and then decided against it.  \n  *set ambitious - 10\n  *set diligent - 10\n  *finish\n\n*elseif ambitious > 60\n\n  It's fun while it lasts, but getting drunk and acting like a fool is not really what you're after.  You didn't come all this way just to become the proverbial beachcomber castaway.  \n\n  Marcus the bartender, to his credit, senses this and helps you out.  \"I don't want my customers going home unsatisfied,\" he says to you.  \"Here's something to sober you up.\"  He hands you an ornate porcelain cup containing a grey-brown liquid.  You drink it down.\n\n  For the next couple minutes you continue partying with your team.  Bryson finally opens up and calls you ${firstname} not once but twice.  Heddes tells a hilarious story about the time a drydock custodian thought Heddes' leg supports were stolen bulkhead trusses.  And Dallas, counter to type, starts plotting out some life goals for not only himself but everyone on the team.  \"You,\" he happily slurs, in your general direction, \"you need to start farming.  You're organized, you'd be good at it, and I don't want to starve to death.\"  Who knew you were all that was standing between Niah and famine?\n\n  *page_break\n  But you start to notice that the room is getting a lot louder.  At first you think it's some new sound.  But then you realize that no, it's actually just all the ambient noise from the people and things around you.  You're hearing them again.  That must be the effect of whatever it was Marcus just gave you -- no longer is your mind focused solely on the small group of quarantine officers near you.  It's like a curtain has been raised.  \n\n  Soon your attention gets divided.  You start keeping one eye on another group of people not far away, once you overhear them say a few things about starships and transports and what, for lack of a better word, sounds like smuggling.  But before that goes any further Debussy himself intervenes.  Not with you directly, but with the entire party.  He waves off the music and lights and gets ready to give a speech.\n  *goto storm\n\n*else \n\n  That means your fun doesn't last long.  You're all really just letting off steam.  Nobody's going to remember anything from it.  Nothing's going to come from it.  But before that happens you really do have a great time.  The setting is fantastic -- under an otherworldly sky -- and the mix of familiar people in unfamiliar situations makes for a truly intoxicating experience.  All the shocks to your system, including the distance you've traveled from a home world you no longer know, finally catch up to you.  \n  *set ambitious - 10\n  *set investigation - 10\n  *set diligent - 10\n  *finish\n\n*label storm\n*page_break\nEven though you've already seen him tonight, the man has somehow managed already to completely change his appearance.  Now he's wearing a sort of tight-fitting kimono with a laurel wreath around his head, as though he were a victorious Roman with a geisha fetish.  You have to admit, though, he pulls it off.\n\nWhen he begins speaking his voice is clear and deep.  He sounds as though he is right next to you even though he is halfway across this giant, crowded room.  \"My friends,\" he says, his arms outstretched, \"I am humbled that you could join me for this soiree.  They say that great things are few and far between because the great people who do them are themselves a rarity.  It is therefore an especial honor to have so many great humans here in this one room.  We celebrate not only each other but, even more importantly, the fantastic experiment we are together undertaking.\"\n\nAs Debussy speaks, you notice that it is slowly getting darker.  Whatever lighting system was keeping the room bright has been gradually dimming.  Meanwhile the staff move quickly to distribute a glass to every guest, the glasses filled with an amber liquid and ice cubes.\n\n\"I will cut my remarks short,\" Debussy says, \"because we are fortunate to have one of Niah's famous lightning storms approaching, and who can compete with the charisma of Mother Nature?  Let us therefore raise our glasses in toast.  These glasses, so you know, are filled with the local specialty.  But they also contain an added specialty of a more, shall we say, distant variety -- each glass contains ice made from water brought directly by my starship from Earth.\"  The murmurs from the crowd suggest that people are suitably impressed, though you do catch sight of one woman sniffing her glass with a look like she was eating something that had been in the back of the freezer too long.  Debussy, however, continues:  \"And encased inside one of your ice cubes you will see there is a vial.  It contains pure Earth air.  Yours to have - a memento of the birthplace of us all.\"\n\n*label storm2\n*page_break\nBy now the room is dark.  The only light comes from the nighttime outside, which is virtually nothing since a storm is approaching.  Just then the first lightning strikes flash off in the distance, momentarily illuminating the room like a heavenly strobe light.  \n\nThe thunder that follows is unlike anything you have ever heard before.  Because Niah is larger than Earth and covered even more by ocean, it develops storms of incredible intensity.  Niah city is near the coast and bracketed by steep mountains, so storms thunder across from the ocean and charge up the narrow alpine passageway, sort of the way a gentle tsunami wave becomes a devastating cataclysm when the water shallows near shore.  Those same mountains also channel and magnify the acoustics.  The result is a deep, lasting boom for each thunderclap that rumbles up towards you and then continues beyond, changing to an even deeper pitch as it moves past, like an artillery shell fired through a ten-mile long metal tube.  It's electrifying.  You can feel it in your chest and your hair stands on end.\n\nFlash!  The world lights up for a second before going dark again.  Booooom!  The sound that follows rattles your sternum.  Each time this repeats you get a glimpse of the other guests, and you can see people moving about under cover of darkness.  In fact, for a second you see Mackenzie, your trusted deputy, deep in conversation with a handful of executives from Niah and the Jessica.  When the next flash hits they're gone.\n*page_break\n*if investigation \u003c 31\n\n  This has been a fantastic evening, all things considered.  A phenomenal way to memorialize your arrival here on Niah.  You nod your head towards the still-talking Debussy in a show of appreciation for what he's given you here.  Debussy doesn't notice, of course, since you're standing amidst a throng of people all doing much the same thing.  But he's got that look that suggests he knows, as he speaks, that his audience is under his spell.\n  *finish\n  \n*else\n\n  You are both alone and also part of a huge group of people.  Most everyone is ooh'ing and ahh'ing, save a fewlocals trying to act like they've seen this all before.  You begin to focus as much on the people before you as on the awesome spectacle outside.  And as you do that your mind begins to review what you've been seeing here on Niah the past few days.\n  *goto storm3\n\n*label storm3\n\nAs you stand there observing them, you keep coming back to the same observation of your own.  For a world that is supposed to be populated by people who have cleared quarantine, there are a surprising number of apparent exceptions running around.\n\nIt's not because of any proverbial smoking guns or anything.  Rather there's just a sense that keeps coming back to your mind that things have played out differently for different people.  Snippets of conversations, glances at certain people, memories of earlier interactions all flood back into your mind.\n\nFlash!  Just as the room lights up your mind does, too.  Booooom!  The deep, rolling thunder washes ashore before continuing on inland, as everything rattles slightly in the wake of its sonic boom.\n*if case = 1\n  A twinge of excitement runs through your scalp and down your spine, and whether it's from the thunder or from your imagination you're not entirely sure.  But suddenly the coincidences are becoming clearer to you.  Things do not seem to happen here by accident.  For Augustine, of all passengers on your ship, to be the only one to die speaks volumes.  And here on Niah there is unquestionably a ruling elite that should not have developed as easily as it did, if the quarantine worked as it was supposed to.  \n\n  As the storm begins to subside, and the party starts to wind down, you resolve to redouble your efforts in the morning.\n  *finish\n\n*elseif investigation > 50\n  A twinge of excitement runs through your scalp and down your spine, and whether it's from the thunder or from your imagination you're not entirely sure.  But suddenly the coincidences are becoming clearer to you.  Things do not seem to happen here by accident.  For Augustine, of all passengers on your ship, to be the only one to die speaks volumes.  And here on Niah there is unquestionably a ruling elite that should not have developed as easily as it did, if the quarantine worked as it was supposed to.\n\n  As the storm begins to subside, and the party starts to wind down, you resolve to redouble your efforts in the morning.\n  *finish\n\n*else \n  Just as your mind starts to wander, however, you're brought back to the present when Mackenzie walks past, arm in arm with someone who is clearly a Niah local but whom you have never seen before.\n\n  \"Oh!\"  She seems slightly surprised to catch you.  \"'Night, Cap'n, hope you had a pleasant evening.  We, uh, have to be off.\"  And with that she and her mystery chaperone leave you alone to your thoughts.\n  *finish\n\n", "cleancowv8": "*comment Choice of Worlds Vignette 8\n*comment Copyright 2013 Andrew J. Schaefer\n*comment bringing the case to fruition or otherwise moving on with your life\n\n*temp suspicion\n*set suspicion 0\nYou start the next day seated at a conference table with your team assembled around you.  It looks like you're on the shore of Niah's globe-straddling ocean but that's actually just the wall image.  The people, however, are real.  Back to work.  Everyone looks a little worse for wear after last night's big event.  Especially, you think to yourself, Mackenzie.  But just as you're about to say something Bryson speaks up.\n\n\"You look like you had a rough night, sir.\"  She's talking to you.  She's also smiling, and everyone else is, too, though whether they're smiling at you or in contemplation of their own adventures you're not sure.\n\n*if love_interest = 0\n  You make it about yourself.  \"A rough night but a worthwhile one as well, Bryson.  That party really brought some things into focus.\"\n\n  \"I can barely focus,\" Dallas says.  \"I did that hike beforehand which almost killed me.  Niah's higher gravity and thinner high-altitude air just about knocks a Terran out.  Then that party to top it off -- oh man, it was wild.  I kept seeing Debussy in my dreams last night, and the freaky thing is I'm not convinced he didn't somehow get inside my head for real.\"\n\n  It's ironic, you think, that a quarantine officer would be joking about having imagery planted inside his head.  And yet, it's no longer quite so farfetched . . . .\n\n  \"Alright everyone,\" you begin, in your listen-to-me voice, \n  *goto chitchat\n\n*else\n  You smile back.  \"I don't know what you're talking about, Bryson.\"\n\n  \"She's talking,\" Dallas cuts in, \"about a certain somebody who got some action last night.\"\n\n  You play dumb.  \"You guys are paranoid.  ${partner} and I were having a delightful conversation about the local economic and political environment.  It was very enlightening.\"\n\n  \"Oh,\" says Bryson, \"${partner} -- we didn't have a name.  Did ${partner} enlighten you economically and politically at the same time, or one after the other?\"\n\n  What the hell does that even mean?!?  Perhaps it's time to get the real meeting started.  \"Alright everyone,\" you begin, in your I'm-bringing-this-meeting-to-order voice, \n  *goto chitchat\n\n*label chitchat\n*if investigation > 60\n  \"I have something important to say.\"\n  *choice\n    #\"I want to talk with each of you individually.\"\n\n      From your tone it's clear this is important.  Your words hang in the air a second, and as you sit there silently you glance quickly at the team to see how they are reacting.  For the first time on Niah you've sounded . . . suspicious?  Skeptical?  Heddes, Bryson and Dallas are wide-eyed.  Nobody from Niah is here.  Mackenzie is the only other person present and she looks oddly subdued.  It's not her normal appearance at all.\n      *set investigation + 5\n\n      You need to start with somebody who can give you the information you need.  Who do you want to talk to first?\n      *choice\n        #Dallas\n\n          A couple waves of your fingers and suddenly you and Dallas are alone in a separate room.  Nobody else can hear you.  \n\n          He speaks quickly:  \"This is about Mackenzie, right?\"\n\n          Not necessarily, you think to yourself, and I didn't say anything about her.  But since the subject has been raised let's run with it.  You simply ask back:  \"What do you know?\"  \n\n          Dallas fidgets a bit in his seat.  His eyes flit back and forth.  Then he points to the new privacy wall you've created.  \"This thing's secure?\"\n\n          \"Yep.\"  And even if it isn't, you think, it doesn't matter.\n\n          So Dallas runs through a few things he's been concerned about.  It turns out he's been watching Mackenzie since the day you were all unfrozen on the Jessica.  She hasn't done anything wrong, per se, but it's always seemed like she was following a script in her mind.  She was interested in screening particular people.  She seemed to already know more about certain people on Niah than she should have.  Things like that.  \n\n          Before you can take this any further you get an urgent notification.\n          *goto denouement1\n\n        #Bryson\n\n          A couple waves of your fingers and suddenly you and Bryson are alone in a separate room.  Nobody else can hear you.  \n\n          *gosub invest\n\n          Before you can take this any further you get an urgent notification.\n          *goto denouement1\n\n        #Heddes\n\n          A couple waves of your fingers and suddenly you and Heddes are alone in a separate room.  Nobody else can hear you.  \n\n          He speaks quickly:  \"This is about Mackenzie, right?\"\n\n          Not necessarily, you think to yourself, and I didn't even mention her.  But since the subject has been raised let's run with it.  You simply ask back:  \"What do you know?\"  \n\n          Heddes fidgets a bit in his seat.  His eyes flit back and forth.  Then he points to the new privacy wall you've created.  \"This thing's secure?\"\n\n          \"Yep.\"  And even if it isn't, you think, it doesn't matter.\n\n          So Heddes runs through a few things he's been concerned about.  It turns out he's been watching Mackenzie since the day you were all unfrozen on the Jessica.  She hasn't done anything wrong, per se, but it's always seemed like she was following a script in her mind.  She was interested in screening particular people.  She seemed to already know more about specific people on Niah than you'd expect from somebody who'd just been frozen for 40 years.  \n\n          Before you can take this any further you get an urgent notification.\n          *goto denouement1\n\n        #Mackenzie\n\n          \"Everyone give us a minute,\" you say to the team.  \"My deputy and I are going to have a chat.\"  \n\n          With a few quick commands from you the room's appearance completely changes.  You and Mackenzie are now alone in a small, windowless cell.  Like a dungeon confessional, you think to yourself.\n\n          \"Krissa,\" you say.\n\n          \"${firstname},\" she answers.\n          *goto mackenziechat\n\n    #\"Let's get answers on the Augustine death.\"\n      What happened on the Jessica has been gnawing at you, no matter what you keep telling yourself, and what you've seen and heard since then down on the surface has only compounded it.\n\n      For the next several minutes the team creates a master file on Augustine's death.  It's populated by whatever data is available from whatever sources are accessible.  Starships in orbit, databanks throughout the city, and personal files in the office combine to build a master template.  \n\n      As if on cue y think this is strange.  \n\n      \"Okay,\" you say, hesitantly, \"if you say so.\"  You excuse yourselves from your confused junior officers and have a private conversation for a minute.\n      *set ambitious - 10\n      *goto mackenzietheory\n\n    #\"Start planning your future here.\"\n\n      People look momentarily confused.  \"Why,\" Bryson asks, \"is there something we don't know?\"\n\n      Mackenzie chimes in:  \"What do you think we've been doing, ${firstname}, since we got here?\"\n\n      Maybe you misspoke.  \"I know, Krissa, that's not what I mean.  What I'm trying to say is, let's officially put Earth and the Jessica and the quarantine work behind us and move on to the next stage in our lives.  There's a whole new universe out here.  New planets, new moons, new cultures, new worlds --\"\n\n      \"-- new lovers,\" Bryson interjects, apparently thinking of somebody specific.  People laugh.  \n      *set ambitious + 10\n      *goto chitchat2\n\n*else\n  \"I've got something important to say.\"\n  *choice\n    #\"Did anybody else think last night's party was weird?\"\n\n      This seems a sudden transition from the smalltalk of a minute ago, and your team's faces reflect that.  Everybody looks confused for a second.  \n      *if krissa = 2\n\n        Mackenzie speaks first.  \"Not me.  I thought it was great.\"  She looks past you to the other team members.  \"Didn't you guys?\"\n\n        Not everybody, apparently.  The other team members look a little puzzled.  Certainly they weren't going to be so quick to disagree with you.  Which gets you thinking.  Perhaps it's time for you and your deputy to have a chat.\n\n        \"Guys,\" you say to the team, \"give us a minute.  Krissa and I need to talk in private.\"  With a couple waves of your fingers the room takes on an entirely new shape, and you and your deputy are alone.\n        *goto mackenziechat\n\n      *else\n        Though it turns out that yeah, come to think of it, there were a few strange things here and there.  Maybe you're not the only person who noticed.\n\n        The other thing you notice, however, is the urgent notification buzzing in your ear.\n        *goto denouement1\n\n    #\"Let's start planning for our future here.\"\n\n      People look momentarily confused.  \"Why,\" Bryson asks, \"is there something we don't know?\"\n\n      Mackenzie chimes in:  \"What do you think we've been doing, ${firstname}, since we got here?\"\n\n      Maybe you misspoke.  \"I know, Krissa, that's not what I mean.  What I'm trying to say is, let's officially put Earth and the Jessica and the quarantine work behind us and move on to the next stage in our lives.  There's a whole new universe out here.  New planets, new moons, new cultures, new worlds --\"\n\n      \"-- new lovers,\" Bryson interjects, apparently thinking of somebody specific.  People laugh.  \n      *if DNA = true\n        Their laughing is soon interrupted, however, by an urgent notification. \n        *goto denouement1\n\n      *elseif investigation > 50\n        Their laughing is soon interrupted, however, by an urgent notification. \n        *goto denouement1\n\n      *else\n        In any event, there's alot to be done.  Best get started.\n        *finish\n\n    #\"Why do I keep seeing things on Niah that shouldn't have cleared quarantine?\"\n\n      What happened on the Jessica has been gnawing at you, no matter what you keep telling yourself, and what you've seen and heard since then down on the surface has only compounded it.  For the next couple minutes you chat about the situation down here on Niah.  Mackenzie eventually suggests trying to suppress some of the more troublesome thoughts that might have made their way into Niah society.\n\n      \"I'm not sure we could,\" Dallas interjects, \"given the deference we're supposed to be showing to the indigenous culture.  We screen what comes from Earth; we don't cull what develops here.\"\n \n      Bryson jumps in and then Dallas responds, before Mackenzie and Heddes add their two cents as well.  As the conversation drifts you find yourself losing the central point.  Just as you're about to say that you get an urgent notification.\n      *goto denouement1  \n\n*label invest\n*comment this is an insert in case you'd asked Bryson to check things in v4\n*if brysoninvest = 0\n\n  She speaks quickly:  \"Sorry, was I out of line saying you had a rough night last night?\"\n\n  Huh?  Oh yeah.  \"No,\" you assure her, \"no, it's not that at all.  It's about how complete a job we've done out here.  I'm not comfortable.\"  \n\n  It turns out Bryson's not, either.  It turns out she's been watching Mackenzie since the day you were all unfrozen on the Jessica.  Bryson hasn't seen her do anything wrong, per se, but it's always seemed like she was following a script in her mind.  She was interested in screening particular people.  She seemed to already know more about certain people on Niah than she should have.  Things like that.\n  *return\n\n*else\n\n  \"Can they hear us?\" she asks, wide-eyed and eager.  \n\n  \"No,\" you say, \"not a chance.  Tell me what you've got.\"\n\n  It turns out Bryson was starting to worry.  She'd offered to pursue a side investigation and you'd accepted.  But then it hadn't been mentioned again.  \"I didn't want to bring it up,\" she says, \"because I was waiting for you.  All the while all this other stuff is going on and here I am thinking you don't trust me anymore or something.  This cloak and pen stuff really makes me nervous.\"\n\n  You smile at the misused phrase.  \"You mean 'cloak and dagger'?\"  \n\n  \"Whatever,\" she shrugs.  \"Don't patronize me.\"  You smile again, this time at how quickly she's shifted from nervous subordinate to pushy colleague.  Anyway, it turns out that her little side-snooping paid some dividends.\n  *page_break  \n  \"Obviously I don't have any rock-solid determinations,\" she says, \"and since I didn't know whether or when you were going to debrief me I don't have anything formally prepared.  But I can tell you that there's something funny going on here.  Krissa's been talking to people.  I don't know who exactly, and I don't know for sure what they're talking about, but she's definitely got something going on.  I mean, we're all new here.  It took us 40 years to get here, so when we left Earth half the people we're dealing with were in diapers.  Me and the other juniors, we've all been talking about how hard it's going to be to get comfortable with everyone.\"\n\n  She's starting to wander, you think.  But she probably has the same thought because she suddenly cuts to the chase.  With a quick cough Bryson says \"What I'm getting at is, Mackenzie's spent more time talking to people here than the rest of us combined.  And the other thing that's interesting, what I maybe should have said at the start, is that I heard her yesterday talking about a system with a 'passive defense mechanism.'  I don't know what system it is or who was telling her about it -- and believe me, I tried to check -- but there's something important that apparently defends itself by getting you to use your weapons against it.  Does that mean anything to you?\n\n  No, not really, you think.  You're obviously familiar with the concept generally -- I mean, half the martial arts codes are based on defenders using the attacker's kinetic energy against them.  But as far as Deputy Mackenzie on Niah is concerned it doesn't mean anything.\n  *gosub detective\n  *set brysoninvest 2\n  *return\n\n*label mackenziechat\n\nEven now you realize you don't exactly know what you're doing.  Questioning?  Accusing?  Chatting?  Which is it?  You better think fast.\n*choice\n  #Questioning\n\n    And in a flash your mind is made up.  You're going to quiz Mackenzie about what's been going on this past week.  Perhaps she's got something important to say.\n    *if diligent > 70\n\n      But oddly, you feel you're learning as much from what she doesn't say as what she does.  You ask her about a few different things that have happened the past four days.  Each time there's a noticeable pause, sometimes even only for a fraction of a second, as though Mackenzie's thinking through her answer before responding.  Your experience is with passengers in coldsleep, so you're not used to interrogating them when they're awake and responsive.  But you're also used to interacting with people and this particular interaction doesn't feel right.\n\n      Things are cut short, however, when an urgent message comes up.\n      *goto denouement1\n\n    *elseif corruptible > 70 \n\n      The conversation moves slowly because, to your surprise, both you and Mackenzie seem to be feeling the other out.  You're probing for information.  But Mackenzie seems to be probing you, too.  At first you're not sure for what, but as the back-and-forth continues it starts to become clear that she's debating whether to let you in on something secret.  It reminds you of the time an friend back on Earth asked you, in a very roundabout way, to join a black market natural food scheme.  Mackenzie's slowly broaching a topic while all the while testing whether you'll take it the wrong way.\n\n      You have to admit, you're curious.\n      *goto buyoff  \n\n    *else\n\n      You cut to the chase.  \"I need to pick my deputy's brain for a minute.\"\n      *goto mackenzietheory\n\n  #Accusing\n\n    No sooner do you think through your intentions than you decide to push Mackenzie's buttons.  The best way to get information out of somebody is to accuse them of hiding something.  You read that somewhere once.  It seemed like good advice at the time.\n    *if ambitious > 69\n\n      \"I'm not happy,\" you say, \"with some of the things I've been seeing on this planet.\"\n\n      Mackenzie sits in her chair.  She's looking at you but not saying anything.\n\n      You resume talking.  \"There was a dead passenger on the Jessica.  There are public displays of information we would never have cleared.  I spoke to people at that party last night who acted like the quarantine was a big joke.\"\n\n      Mackenzie is still staring at you, impassively.\n\n      \"But these aren't isolated things,\" you explain.  \"There's a connection.  Something, or someone, keeps breaking quarantine.  Somehow information is getting through from Earth and it clearly has to be coming from the inside.\"\n\n      Silence.  You've stopped talking; she's not saying anything.  The two of you sit there in silence, listening to the soft hum of the holography maintaining your \"private\" room.  But in a sense you're learning something anyway -- people with nothing to hide don't react this way when their boss insinuates that they're corrupt.  \n\n      Then something else breaks the silence.  An urgent notification for your attention.\n      *set investigation + 10\n      *goto denouement1\n\n    *elseif diligent > 60\n\n      \"This is a serious issue,\" you say.  \"We might be looking at something that threatens to compromise the integrity of the very society we have built out here.\"  Listening to yourself, however, it's hard to see this through.  Are you really going to accuse your deputy of some kind of malfeasance in the name of protecting an entire planetary civilization?  Isn't that cat out of the proverbial bag?\n\n      You want to think about this some more.  So you backtrack a bit.  \"Krissa, I need you to stay on top of everything going on here.  Next to me you're the most senior, most recent vestige of Earth authority.  Do whatever you can to ensure that our presence here is not in vain.\"\n\n      She's clearly a little confused by what you're telling her.  \"Of course, ${firstname}.  You know you can count on me.  Right?\"\n\n      Before you can answer you get an urgent notification.\n      *goto denouement1\n \n    *else\n\n      So you go after Mackenzie a little bit.  \"Listen,\" you say, \"this is not easy for me to do.  But I need to know whether I can trust you.\"\n\n      She's incredulous.  \"What?  Why?  What are you talking about?\"\n\n      \"I'm talking about the discrepancy between our job description and reality.  I'm talking about the Jessica's only dead passenger who just happened to be personally involved in every major intellectual movement of the past 200 years.  I'm talking about people on this planet who seem to think the quarantine is some kind of cute game.  I'm talking --\"\n\n      \"--what does any of that have to do with me?\"  She's not exactly friendly right now.\n\n      \"With you?  For all I know it might have everything to do with you, Deputy Mackenzie.  You think all these discrepancies are happening by coincidence?  You think it's beyond comprehension that there are actual real life people behind it?  People who know enough about quarantine to circumvent it?\"\n\n      \"You're insane,\" she responds.  \"You're crazy.\"  But she doesn't immediately say more.  It's almost like she's reluctant to talk too fast for fear of locking herself into a story that won't hold up.\n\n      Instead the next thing you hear is an urgent notification.\n      *set investigation + 8\n      *goto denouement1  \n  \n  #Chatting\n\n    When in doubt, stall.  \n    *if diligent > 70\n      \"I'm not happy,\" you say, \"with some of the things I've been seeing on this planet.\"\n\n      Mackenzie sits in her chair.  She's looking at you but not saying anything.\n\n      You resume talking.  \"There was a dead passenger on the Jessica.  There are public displays of information we would never have cleared.  I spoke to people at that party last night who acted like the quarantine was a big joke.\"\n\n      Mackenzie is still staring at you, impassively.\n\n      \"But these aren't isolated things,\" you explain.  \"There's a connection.  Something, or someone, keeps breaking quarantine.  Somehow information is getting through from Earth and it clearly has to be coming from the inside.\"\n\n      Silence.  You've stopped talking; she's not saying anything.  The two of you sit there in silence, listening to the soft hum of the holography maintaining your \"private\" room.  But in a sense you're learning something anyway -- people with nothing to hide don't react this way when their boss insinuates that they're corrupt.  \n\n      Then something else breaks the silence.  An urgent notification for your attention.\n      *set investigation + 10\n      *goto denouement1\n\n    *elseif corruptible > 60\n\n      The conversation moves slowly because, to your surprise, both you and Mackenzie seem to be feeling the other out.  You're probing for information.  But Mackenzie seems to be probing you, too.  At first you're not sure for what, but as the back-and-forth continues it starts to become clear that she's debating whether to let you in on something secret.  It reminds you of the time an friend back on Earth asked you, in a very roundabout way, to join a black market natural food scheme.  Mackenzie's slowly broaching a topic while all the while testing whether you'll take it the wrong way.\n\n      You have to admit, you're curious.\n      *goto buyoff  \n\n    *else\n\n      Mackenzie breaks the ice.  \"So what's up?  What's so important all of a sudden?\"\n\n      \"I'm not sure,\" you reply, honestly.  \"But I have this nagging feeling that something's not right here.  I can't exactly put my finger on it.\"\n\n      She looks genuinely confused.  \"What's not right?  And what does it have to do with me?\"\n\n      \"Well, Krissa, you and I and a handful of other people are the only ones in the entire world to have seen Augustine alive in the last 41 years.\"\n      *goto mackenzietheory\n\n*label mackenzietheory\n\n\"I think Debussy killed Augustine.\"  Mackenzie sits back, silently, with a slight upturn to her lips that says \"How's that for cutting to the chase?\"\n\nShe explains her theory.  It's his ship, of course, and nobody else had anything like the access he did.  He seemed very interested in the quarantine team members; she heard he'd even given out some kind of projection globe which itself included references to the quarantine process.  And he seemed to know a lot about Augustine's freezer pod, even mentioning something about different images to be displayed in case Augustine died.  Plus, Mackenzie says, he's weird.\n\nThere's one obvious gap in this theory, however.  \"But why would he kill Augustine?\" you ask.  \n\nShe sighs and gently shakes her head.  \"That I don't know.  We may never know.  But I can make an educated guess that Debussy didn't want Augustine to make it to Niah alive.  Maybe he knew something, or was carrying something, or simply by his presence on Niah was going to undermine what Debussy is trying to do.  It cannot possibly be a coincidence that the only passenger they lose just happens to be the most knowledgeable and independently opinionated person on the ship.  I can't think of a bigger threat to what Debussy's trying to make of himself out here than to have a distinguished ambassador from Earth constantly presenting his own image of what Earth and our civilization are about.  I mean, imagine that party last night.  Here's Debussy constantly trying to pass himself off as the living link between the old world and the new.  You think people would have cared half as much if Augustine had been standing off to one side, shaking his head or looking bored?\" \n      \n*page_break Does this make any sense at all?\nWhat do you think?\n*choice\n  #This is absurd.\n\n    Before Mackenzie even finishes talking you're already making a face.  \"I don't buy it.\"  Mackenzie's theory lacks any coherent motive.  And it really doesn't logically follow that just because Augustine was well-known and opinionated, that Debussy (as opposed to anyone else) would therefore want to kill him.  Mackenzie's trying to fit the square pegs that are the facts of the case into the round hole that is this theory.\n    \n    So you dismiss this from your mind.  You're about to explain it to your deputy when you get an urgent notification.\n    *set investigation + 10\n    *goto denouement1  \n\n  #Maybe.  Did Augustine and Debussy have any problems between them?\n\n    You raise this issue and Mackenzie pulls up a search window.  \"Hang on, she says, let me cross check a few things.\"  She scans a readout and huhs and hmms a few times before looking back at you.  \"Looks like they might have,\" she reports.  \"Apparently Debussy fancies himself something of an amateur historian and cultural anthropologist.  Augustine called him a crackpot, and the two had some kind of public feud over it.  Maybe Augustine found out the hard way not to offend his majestic regalness.\"\n\n    This is all news to you.  Nobody had ever even suggested it before.  You're about to ask Mackenzie to identify precisely where she's getting this information from when an urgent notification interrupts.  Do you take it?\n    *choice\n      #Yes.\n        \"I'm getting a call,\" you tell Mackenzie, \"and it's something I need to take myself.\"\n        *gosub chatA\n        *gosub chatB\n        *if chatster = 0\n\n          You've spent enough time on this for the moment.  There are other people out there who need your time and they may have equally important things to say.  \n          *goto denouement1\n        \n        *elseif chatster = 1\n          It's almost as though she's feeling you out about something.  You decide to say as much to see where it takes you.  \n          *goto buyoff2\n          \n        *else\n\n          \"Then,\" Mackenzie says, excitedly, \"let's get going.\"  The urgent call can wait.  If it's important they'll call back, so you go with the knowledge that you might get called again.\n          *set investigation - 20\n          *set ambitious - 10\n          *set suspicion 1\n          *goto debussyconfront\n\n      #No.\n        \"Then, Mackenzie says, excitedly, \"let's get going.\"  The urgent call can wait.  If it's important they'll call back, so you go with the knowledge that you might get called again.\n        *set investigation - 20\n        *set ambitious - 10\n        *set suspicion 1\n        *goto debussyconfront\n\n  #I'm sold.  It explains everything.  \n\n    Mackenzie's theory makes alot of sense.  \n    *if ambitious > 70\n      On the other hand, it's just that -- a theory.  From your deputy, without any real evidence to support it.  You're not about to accuse Debussy of murder simply based on that.  Maybe for now just keep the idea in the back of your mind and see how it plays out.  Debussy's not going anywhere.\n\n      And, as if on cue, you get an urgent notification.\n      *goto denouement1\n\n    *else\n    \n      \"Then, Mackenzie says, excitedly, \"let's get going.\"\n      *set investigation - 20\n      *set ambitious - 10\n      *set suspicion 1\n      *goto debussyconfront        \n\n*label chatA\nThen, thinking about what your deputy has just been telling you, you say one more thing.\n*choice\n  #\"But when I'm done with the call let's talk about this some more.  It's the best theory we have.\"\n    *return\n  \n  #\"I'm skeptical.  If you can find more, let me know.  Otherwise let's shelve it for now.\"\n    *return\n    \n*label chatB\n*temp chatster\nMackenzie is firm.  \"I'm going to do everything I can,\" she says, \"to prove this is what happened.  There's no doubt in my mind Debussy is responsible, and the longer we wait the stronger he becomes.  Who knows whether anyone else is at risk?  We need to focus on stopping Debussy right now.\"\n\nAs she's talking you get a reminder about your call.  Mackenzie, however, says one more thing:  \"Don't trust any evidence from the Jessica.  Anything Debussy controls could be corrupted.\"\n\nYou answer quickly:\n*choice\n  #\"You know, you've built a case against Debussy, but you haven't said anything to rule out anybody else.\"\n    You just can't shake this nagging feeling that Mackenzie's theory is designed to build a case against a specific person, rather than to explain why that one person is more likely than anyone else to have been responsible for Augustine's death.  You decide to back away from her approach.\n    *set chatster 0\n    *return\n  \n  #\"Why are you trying so hard to steer me in one direction, Krissa?  What's going on?\"\n    Mackenzie has been trying so hard to get you to focus on one suspect, at the expense of everyone else, that it's starting to make you suspicious.  \n    *set chatster 1\n    *return\n  \n  #\"You're right.  I'm not going to waste my time with any information his people get me.  Let's go see him right now.\"\n    You brought your deputy out here for a reason.  There's no sense ignoring her now, when her work is at its most valuable.\n    *set chatster 2\n    *return\n  \n*label chitchat2\n*comment this is where non-investigation stuff goes\n*if velvet > 0\n\n  \"By the way,\" you say, holding up the velvet box Debussy gave you, \"I've been meaning to ask -- did anyone else get one of these?\"\n\n  \"Not me,\" Mackenzie answers, \"what is it?\"  Even as she's asking, however, you notice Bryson's eyes light up.  \"Oh I know what that is,\" she says excitedly, \"or at least I think I do.  It's a memory cube, right?  How did you get it?  How did you pay for it?\"\n\n  Bryson knows more about this thing than you do.  She runs through some of the basic features while the team ooohs and ahhhs.  It's a snapshot of the entire planet.  The bigger the room the bigger the projection.  You can explore virtually anywhere you want and it can be customized to add easter eggs and goodies throughout.  It's literally the kind of thing you could spend the rest of your life wandering through.  Assuming, that is, you have nothing else to do.\n  \n  By now you have firmly gone down the path of the civilian settler.  Whatever job brought you out to Niah, you are now focused primarily on building a life for yourself on this new planet.  Which is fine -- this is a diverse world meant to be explored -- but just know that there are other options you could have selected.  \n  *set velvet 2\n  *set path 0\n  *finish\n\n*else\n\n  Everybody's having a good time.  Yet as you sit there shooting the breeze you sadly come to see that it's all soon going to end; your little pocket of Earth is breaking up.  Everybody's got their own life to lead.  Including you.\n  \n  By now you have firmly gone down the path of the civilian settler.  Whatever job brought you out to Niah, you are now focused primarily on building a life for yourself on this new planet.  Which is fine -- this is a diverse world meant to be explored -- but just know that there are other options you could have selected.\n  *set path 0  \n  *finish\n\n*label debussyconfront\n*comment this is a brief blurb where you try to confront debussy and everything gets messed up\nYou subtly switch off the notice and turn your attention back to Mackenzie.  Whatever they wanted will have to wait.  Mackenzie shows you a detailed synopsis of her cross-checked, annotated search for Debussy and Augustine interactions.  It looks on the level.  \n\n\"I guess,\" you sigh, \"we need to talk to the man himself about this.  We should bring the whole team to show we're not just fooling around.\"\n*page_break\n*label debussyconfrontA\n\nDebussy's offices are (fortunately for you) only a short stroll down one of the city's nicer streets.  You're not going to arrest him or anything, not yet, but you are going to approach him from this new angle of suspicion.\n\nDebussy has set up camp in a surprisingly nondescript building.  Well, from the outside, anyway.  Once you walk through a doorway wide enough for only one person at a time the scene changes dramatically.  It is as though you are floating in space, looking down on the known habitable universe from a zero-g point beyond.  Superimposed are Debussy's holdings in as close to real time as he can achieve -- his ships, his mines, his business interests.  They overlay the image like labels on a 3-D map.  \n\nAs soon as you stop to get your bearings you are greeted by perhaps the most beautiful woman you have ever seen.  She materializes in front of you in the blink of an eye.  Even though her lips remain firmly together her voice fills your head, and her lilting, melodious words come straight to the point:  \"Welcome, Captain ${lastname}; Deputy Mackenzie; Officers Bryson, Dallas and Heddes.  Mr. Debussy can see you in six minutes.  Please make yourselves comfortable in the meantime.  He will give you five minutes of his time.\"\n\nShe disappears as suddenly as she appeared, and in her stead you find yourself presented with a set of plush chairs facing a small table, upon which an iced fruit drink sits for each of you.  Bemused, you all sit down and wait.\n*page_break\nSix minutes later Debussy sweeps past, trailed by three functionaries taking dictation.  You exchange pleasantries before following him into his adjacent office.  Like the building's exterior, his office is surprisingly spartan in appearance.  Debussy takes a seat behind a simple mahogany desk while you sit across from him.  There are no seats for anyone else and none are offered.\n\nThe normally charismatic man is more businesslike today.  \"I apologize if I cannot give you more of my time, Capt. ${lastname}, but we are in the middle of some delicate business.  There is a freighter upstairs, carrying goods of certain value, that is being captained by a man who fancies himself a hardened negotiator.  I am teaching him a lesson.  In any event, how may I help you?\" \n\n\"We're here about Augustine,\" you say, matching tone for tone.  \"I don't think five minutes will do it justice, but there are . . . questions about his time aboard your ship that we would like to resolve.\"\n\nDebussy looks at you intently.  He scans the room, letting his eyes linger on each member of your team before moving on to the next.  His gaze lingers on Mackenzie for an extra beat.  \n\nYour team look awkward just standing there with their hands behind their backs.  You suddenly realize it was a mistake to bring everyone -- they're used to screening frozen starship passengers, not interrogating master merchants, and they have not had the experience of speaking personally with Debussy before.  He reads them like an open book.  You need to say something fast.\n\n*if ambitious > 60\n\n  Debussy beats you to it.  \"Captain ${lastname}, I expect better of you.  I have to date been impressed with your diligence and resourcefulness.  And I cannot reasonably expect perfection from any of my acquaintances.  Nevertheless you have unquestionably made a tactical error in this instance.  Whatever theory you may have developed is fatally flawed if it directs suspicion towards my person.  I, of all people here, have the most to lose from any foul play regarding one of my passengers.  Has it not occurred to you that I am in the business of safely transporting human beings from one world to the next?\"\n  *page_break\n  The wealthy shipowner gets up from behind his mahogany desk and walks slowly around it.  Dallas begins to walk towards him, as if to protect you and the group, before you motion to him to stand down.  \n\n  As Debussy approaches he waves his arms gently towards the walls and ceilings.  The projections you saw in the waiting room -- his ships, his assets, his name -- reappear around you.  Debussy motions to them.  \"It beggars belief that I would throw all this away in order to terminate an old man I had just spent 40 years flying across interstellar space.\"  Then he lowers his voice slightly before continuing:  \"Do not overthink this, ${firstname}.  Do not outsmart yourself.  I am no more responsible for Mr. Augustine's death than you are.\"\n\n  Then he looks back at his desk.  \"I must attend to this call,\" he says.  You notice that it has been precisely five minutes since you first came into his office.  \"Our merchant upstairs is waiting for a reply.  Please redouble your efforts to find the real cause of Mr. Augustine's death.  If it were so simple and obvious as you apparently thought when you came here, it would not have happened.\"\n\n  And with that he bids you farewell.  \n  *goto debussyconfront2\n\n*else\n  Too late.  \"I see,\" he says, coldly.  \"You suspect me of being responsible for Augustine's death.  A shame -- I had expected better of you.  It should be obvious that my involvement would be impossible.  Has it not occurred to you that I am in the business of safely transporting human beings from one world to the next?  I, of all people here, have the most to lose from any foul play regarding one of my passengers.  One does not become as successful I have by doing the things you insinuate.  You are overthinking this, as they say.  Nevertheless, I am a man of honor and I will provide my full cooperation.  Only not now.  I must take leave of you -- that freighter awaits me -- but you may arrange a further interrogation at a suitable time.  My assistant will see to it.  Adieu.\"\n  *set ambitious 25\n  *set investigation 35\n  *page_break Well, that went well.\n  *goto debussyconfront2\n\n*label debussyconfront2  \n\nAnd with that you are escorted back into the galactic map waiting room.  There is no point protesting, since you came without a warrant of any kind.  And Debussy has offered more than enough to escape any official inference of obstruction.  \n\nDallas breaks the silence.  \"Was that what you had in mind, boss?\"  \n\n\"Shut up,\" you say.\n*page_break\nHe's undeterred.  Whispering, he continues:  \"No, seriously, what do you make of that?  I mean, it's not like he showed us some slam-dunk evidence proving his innocence.  But while I don't know about you guys\" -- he's glancing across the rest of the team -- \"I also got the sense he was right.  Why would a guy with that much to lose come all the way out here only to kill off a high-profile passenger on his own starship?  It makes no sense.  But then, it's your theory, and you're the boss.  You must have your reasons.\"\n*if suspicion = 1\n\n  \"Of course,\" you say, even as you're thinking to yourself that this was actually not your theory, \"I know what I'm doing.\"\n\n  \"I don't know,\" Heddes counters, \"he could be bluffing.\"\n\n  You cut this off before it starts.  There's not much else to say.  Certainly there isn't much to say here in Debussy's own headquarters.  As you walk past Debussy's assistant, the beautiful woman tells your entire team that Mr. Debussy is available for thirty minutes next Thursday \"in the event the Captain still deems any such encounter necessary or desirable.\"\n\n  This is all rather awkward.  Fortunately just then you receive another urgent notification.\n  *goto denouement1\n\n*else\n\n  You're honest.  \"I don't know how good those reasons are, Dallas.\"  Then, shaking your head, you speak up again:  \"But that also means the other theories might be stronger.  There's an answer out there, an answer that can only come from one of a few different plausible scenarios.  Everything we do helps narrow down our search.\"  \n  *goto otherend\n  \n*label otherend\n*if investigation > 40\n  \n  You continue processing the disparate facts and events of this case.  Of course as this is all coalescing in your mind there's one other thought forcing its way in:  your team might be compromised.  It's entirely possible that one or more of them are involved.  Honestly, you've been suspecting it for awhile now.  So you decide to keep all this information to yourself for the time being.  Nobody else received the report and you ensure that it will stay that way unless and until you decide otherwise.\n  *gosub invest2\n  *gosub summary\n  *gosub summary2\n  *gosub summary3\n  *finish\n  \n*else\n\n  \"No it doesn't,\" Dallas says.  \"It sends us around in circles.\"\n\n  He's right, you think.  This is all getting bizarre.  Is Debussy involved?  Mackenzie?  Neither?  Both?  Somebody else?  Nobody at all?  Every question begets more questions; every answer does, too.  Half of them make no sense at all.  You grudgingly accept that you're not any closer to figuring this out than you were four days ago, no matter what everyone else seems to think.\n\n  \"You know what,\" you say out loud, to nobody in particular and to everyone at once, \"screw it.  We're done.  Unless and until we can figure out a reason why any of this matters anymore, I don't think it's worth our time to spend another minute worrying about it.\"\n  *page_break\n  You are going firmly down the path of the civilian settler.  Whatever job brought you out to Niah, you are now focused primarily on building a life for yourself on this new planet.  Which is fine -- this is a diverse world meant to be explored -- but just know that there are other options you could have selected.\n  *set path 0\n  *finish\n\n*label denouement1\n*comment this is where you start the investigation day and should move quickly since the vignette is already getting long\n*page_break\nYou set the message to confidential and then send it through.  The image projects in front of you but, thanks to the encryption, is invisible to everyone else.  The medical examiner has sent you the final report on Augustine's body.  It only takes a few seconds for you to skim over the first conclusion, which is that Augustine's cause of death cannot definitely be determined, and get to the important part -- \n*if DNA = true\n\n  -- which is the shocking news that his hair had been genetically modified.  The examiner explains:  \"We picked up the discrepancy fairly quickly, actually, but took so long getting the final report together because we wanted to run it against a few other registries and out here that takes longer than you're probably used to on Earth.  But as you can see\" -- and as he's speaking the image shows contrasting snippets of magnified \"normal\" hair follicles and Augustine's -- \"there were hairs on his head that bore certain distinguishing marks of controlled replication.\"  Here he's using the fancy term for 'manufactured.'  \n\n  After only a few more minutes you learn the whole point:  These modified hairs were designed to transmit encoded information.  The amount of data one can store in scripted DNA on a couple hundred strands of hair is almost limitless.  And it was only a fraction of the total hair still left on this 350-year old man's head.  So odds were any given hair you took off his head would have been real.  If you didn't know to look you would never have had any idea.\n\n  Which means, you quickly realize, that somebody must have known to look.\n  \n  *page_break\n  \"We only noticed it by chance,\" the examiner is saying.  \"My assistant plucked a hair at random for the genetic database and it came back encoded.  Lucky break, huh?  Once we knew what to look for we were able to isolate all the iterations.  It's like an entire library seeded within his real hair.  Whoever did this did a great job.  Niah doesn't have the tech to scan all of it.  It's new Earth stuff.  You should figure out what's on them -- we've got them in storage until you say otherwise.\"\n  *goto denouement2\n\n*else\n\n  -- well, that was the important part.  Augustine's cause of death cannot be definitively established.  He was 350 years old actual.  He was encased in a freezer pod and under normal coldsleep conditions when he died.  The report has taken this long to get back to you because they have been methodically running down every possible cause.  Nothing, however, has been a match.  His death will officially be categorized as \"unexplained.\"\n  *goto finale\n\n*label denouement2\n*comment this is concluding there's a killer\n*if case = 1\n\n  The next realization hits you in a flash:  Augustine must have been murdered.  Must have been.  If somebody knew where to look, and if Augustine arrived at Niah dead, then the idea that his death was accidental is simply impossible to believe.  Did he even know that he was carrying genetically inscripted information?  Was he an unwitting mule?\n\n  You're going to need to not only isolate whatever information is in that manufactured DNA, but find the killer (or killers) who knew it was there.  \n  *gosub augustinecoffin\n  *goto finale\n\n*elseif investigation \u003c 40\n\n  You pass it on to the team.\n  *goto finale\n\n*else\n\n  You're going to need to isolate that manufactured DNA and find out what information it contains.  You may not be the sharpest tool in the proverbial shed, but you are still a quarantine officer and if there's one thing you know, it's that people don't smuggle encrypted data on genetically modified hair strands aboard an information-exotic passenger flying 30 light years across interstellar space if all they're sharing are photos of their kids.  \n  *goto finale\n\n*label augustinecoffin\n*if image = true\n\n  Which, you also realize, explains the image on Augustine's freezer pod.  It could have shown a sleeping angel, or a hooded man in chains, but instead it displayed a wounded old man -- somebody who had been intentionally harmed.  The chains might suggest a punishment.  The sleeping angel might suggest a natural death.  But the wounds suggest a death by violence -- though in an image so vague as to be almost unrecognizable to anyone out here in the screened universe.  Somebody from Earth, on the other hand, would more quickly see the implications of these deaths and put the pieces together.  Once he or she knew what to look for, that is.  But there's no way whoever's smuggling encrypted information through quarantine wanted that image to be there.  Somehow Augustine got the last laugh.\n\n  Fortunately for you it now all adds up.  \n  *return\n\n*else\n\n  It's all coming together.\n  *return\n\n*label buyoff\n*comment this is a brief setup to the notion that Mackenzie is going to try to buy you off - the final is in the next vignette \n*page_break\nYou're about to cut to the chase and try to find out what the mystery is when you get notice of a message from the medical examiner.  It could be important; on the other hand, if you break off now you might not get another chance to see what Mackenzie is up to.  What do you want to do?\n*choice\n  #Find out what the medical examiner wants to tell me.\n    *set corruptible - 10\n    *goto denouement1\n\n  #Find out what Mackenzie wants to tell me.  \n    You subtly switch off the notice and turn your attention back to Mackenzie.  Whatever the medical examiner has to say can wait.  \n    *goto buyoff2\n    \n*label buyoff2\n\n\"Listen,\" you say, your voice flat and your face expressionless, \"let's cut to the chase.  I can tell you're feeling me out about something.  Whatever it is, I want in.\"\n\nShe sits back in her chair.  \"Are you sure?  You don't even know what we're talking about.\"\n\n\"Doesn't matter.  Let's hear it.\"\n\nShe sighs and then starts talking:  \"Augustine was smuggling information through quarantine.  He wasn't even supposed to know -- they'd inserted some artificial DNA into him back on Earth and then they were going to extract it out here.  Somehow he figured it out.\"\n\nYou jump to the obvious conclusion:  \"So it's not coincidental that he died, then?\"\n\nMackenzie is evasive.  \"This is really big, ${firstname}.  They're building an entire new civilization out here based only on what clears quarantine.  Imagine having the power to bypass that -- to have information at your disposal that nobody else can have.\"  \n*gosub whoscreened\n\nShe continues:  \"This is your chance to be on the inside.  You don't even have to do anything, but you don't get to find out about something like this without giving a commitment on where you stand.\"\n*finish\n\n*label whoscreened\n*if krissa = 2\n\n  You realize Mackenzie screened Augustine herself.  That must have been how she wanted it.  She's still explaining how the frozen body was to be treated:  \"You can get what you want, then scrub his mind and scrub the minds of anyone else aboard ship who might be in the way.\"  Not a bad plan, actually.\n  *set path 2\n  *return\n\n*elseif corruptible \u003c 30\n\n  This basically blows your mind.  You were open to the idea that something strange was going on.  You were even open to the idea that Augustine had been murdered, or that somebody on your team was up to no good, or that Debussy was a bad guy.  But this is too much.\n\n  The basic rules of civilization are a fraud.  Not only have you not been keeping the universe clean, you have been personally responsible for making it dirty.  All your hard work, and the hard work of screeners before you, has been in vain.  You have simply pacified the sheep so that the wolves can have an easier time eating them.  You sort of stop caring after that.  Whatever Mackenzie says you'll go along with her.\n  *set path 0\n  *set investigation %- 50\n  *set corruptible + 50\n  *return\n\n*else\n\n  \"You can get what you want,\" she's explaining, \"then scrub his mind and scrub the minds of anyone else aboard ship who might be in the way.\"  Not a bad plan, actually.\n  *set path 2\n  *return\n\n*label finale\n*comment this is the end scene for anyone who gets the notification\n*set path 1\n*page_break\n*if investigation > 30\n  You think everything through for a minute.  According to the report Augustine's death cannot, and never will, be conclusively determined.  In this day and age that's simply impossible to accept.  Which means it is suspicious.\n\n  Someone must have needed him dead.  Do you know who?\n\n  *if suspicion = 0\n    One possibility is, of course, Debussy.  He's been involved in this from the start.  Heck, half the time he seems to know more about the case than you do.  Perhaps it's time to pay him a visit in your official capacity.  \n    *choice\n      #He's a suspect.  Let's go talk to him.\n        \n        \"I think it's time,\" you say to your team, \"that we pay Mr. Debussy a visit.\"\n        *set suspicion 2\n        *goto debussyconfrontA\n      \n      #No, he's too obvious a choice.  There's nothing to be gained from accusing him.\n      \n        The thought comes into your mind only to leave it almost as quickly.  You continue processing the disparate facts and events of this case.  Of course as this is all coalescing in your mind there's one other thought forcing its way in:  your team might be compromised.  It's entirely possible that one or more of them are involved.  Honestly, you've been suspecting it for awhile now.  So you decide to keep all this information to yourself for the time being.  Nobody else received the report and you ensure that it will stay that way unless and until you decide otherwise.\n        *goto finale2\n\n  *else\n    As you start running through the facts, one thought keeps resurfacing:  your team might be compromised.  It's not guaranteed, but it's not impossible, either, and there are only so many ways for a passenger on the Jessica to mysteriously die when nobody but your team members were awake at the time.  So you decide to keep all this information to yourself for the time being.  Nobody else received the report and you ensure that it will stay that way unless and until you decide otherwise.\n    *goto finale2\n    \n*else\n  This is all getting bizarre.  It's not at all clear to you that these results are even consistent, let alone proof of anything.  Is Debussy involved?  Somebody else?  Nobody at all?  Heck, maybe Mackenzie herself really is behind the mystery of Augustine's death.  You haven't really been going out of your way to investigate Augustine's death and it's not surprising that at this point whatever information you've gotten on the matter is hard to understand.\n\n  \"You know what,\" you say out loud, to nobody in particular and to everyone at once, \"screw it.  I'm not accepting any more information about Augustine or the Jessica or anything else that happened on that ship.  Unless and until we can figure out a reason why any of this matters anymore, I don't think it's worth our time to spend another minute worrying about it.\"\n  \n  You are going firmly down the path of the civilian settler.  Whatever job brought you out to Niah, you are now focused primarily on building a life for yourself on this new planet.  Which is fine -- this is a diverse world meant to be explored -- but just know that there are other options you could have selected.\n  *set path 0\n  *finish\n\n*label finale2\n*gosub invest2\n*if investigation \u003c 50\n\n  All this creates some serious pressure for you.  You'd been hoping to make an easy and trouble-free arrival here on your new home world.  Instead events keep having a way of catching up to you.  \n  *gosub summary\n  *gosub summary2\n  *gosub summary3\n  *finish  \n\n*else\n\n  Just then a second message comes through to you.  It's Debussy, of all people.\n\n  \"I am sorry if this is awkward timing, Capt. ${lastname},\" he concedes, \"but I would be grateful if you could give me some brief measure of comfort that you are bringing your investigation to a close.  I am always concerned about passengers entrusted to my care.  Have you reached any conclusions about that man Augustine?\"\n\n  How do you answer?\n  *choice\n    #I tell him we've figured out why Augustine was special and why he might be dead.\n      \"I knew it!\"  His face lights up.  \"Good luck, I suppose you will have work to do.  When you have completed your efforts I would like to have a chance to speak with you further.\" \n      *gosub debster\n      *gosub detective\n      \n      You are well on your way to solving this mystery.  \n      *gosub summary\n      *gosub summary2\n      *gosub summary3\n      *finish\n\n    #I don't give anything away right now, but I ask him if he has time to review our findings for himself.\n      \"No I do not,\" he declaims, \"but I
