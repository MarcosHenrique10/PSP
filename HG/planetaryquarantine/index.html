 appreciate your asking.  I am the man who sees to it there are people like you to do these jobs.\"  He looks bemused, like he knows a little more than he's letting on.  \"But when you have completed your efforts I would like to have a chance to speak with you further.\" \n      *set ambitious + 5\n      *gosub detective\n      \n      You are well on your way to solving this mystery.  \n      *gosub summary\n      *gosub summary2\n      *gosub summary3\n      *finish\n\n    #I don't tell him anything.  He's a suspect.\n      \"We're not at liberty to say,\" you tell Debussy.  \"If and when we are able to make a public announcement you'll be the first to know.\"  \n\n      Debussy looks at you for a minute before shrugging.  \"That is unfortunate.  I had hoped you would be further along by now.  Perhaps I should see what some other individuals might think happened.\"  With that he ends the call.  \n      *set ambitious - 10\n      *set investigation - 5\n      \n      You are on your way to solving this mystery, but your choices continue to take you in a haphazard direction.  \n      *gosub summary\n      *gosub summary2\n      *gosub summary3\n      *finish\n\n*label invest2\n*if brysoninvest = 1\n\n  As you work through your theories, Bryson tracks you down.  She needs a moment of your time to debrief you on what she's discovered during her side work.  \n  *page_break\n  You're not sure whether her findings are important or not.  \"There's something with a 'passive defense mechanism,' Bryson says.  \"We don't have anything like that, so I don't know what system it is or where it comes from -- and believe me, I tried to check -- but there's something important that apparently defends itself by getting you to use your weapons.  Does that mean anything to you?\"\n  \n  Not really, you say, but you file the information away in the back of your mind.  This could come in handy.\n  *set brysoninvest 2\n  *return\n\n*else\n\n  This is becoming a big deal.\n  *return\n  \n*label summary\n*comment need a marker for DNA, case and image, all meant to display in one paragraph, and the focus variable to assess whether you're far enough along to be on the right track\n*if DNA = true\n  You have discovered how the contraband information is being smuggled through encrypted DNA strands.\n  *set focus 1  \n  *return\n*else\n  There are methods being used to try to break through the quarantine screen that you have not yet identified.  \n  *set focus 0\n  *return\n  \n*label summary2\n*if case = 1\n  You did well to treat Augustine's death as a criminal matter, rather than simply some inevitable accident.  \n  *set focus + 1\n  *return\n*else\n  There's more to Augustine's death than you so far realize.  \n  *return\n  \n*label summary3\n*if image = true\n  Good job unlocking the meaning behind the images on Augustine's coldsleep pod.\n  *set focus + 1\n  *return\n*else\n  There are hints Augustine left about his death that your investigation has missed.  \n  *return\n  \n*label detective\n*if investigation > 90\n  *return\n  \n*else\n  *set investigation %+ 5\n  *return\n  \n*label debster\n*if ambitious \u003c 90\n  *set ambitious %+10\n  *return\n  \n*else\n  *return", "cleancowv9": "*comment Choice of Worlds Vignette 9\n*comment Copyright 2013 Andrew J. Schaefer\n*comment final vignette from the opening storyline\n\n*if path = 0\n  Six months have passed and you're at home with a cold.  (Some things never change.)  Snowflakes fall gently outside, floating in easy patterns, disturbed only by the occasional gust of wind.  If you squint your eyes it could almost be Earth.  Well, where everything's colored differently and the snow is piled eight times as high as you.  \n  *goto domestic\n\n*elseif path = 1\n  By the end of the next day you're standing with Heddes, Dallas and Bryson, as well as several officers from Niah, looking at the principal results of your investigation.  \n  *goto break\n\n*else\n  Mackenzie is firm.  \"I need to know where you stand.  Immediately.  Are you with us or against us?\"\n  *choice\n    #I'm in.\n\n      \"Sign me up,\" you say, \"it's about time I got to benefit from something around here.\"\n\n      \"Good,\" she says, \"that's real good.  You need to make this\" -- and by \"this,\" she means the investigation -- \"go away immediately.\"\n\n      \"What about everybody else,\" you ask, thinking of the team.  \"I can't just tell them to forget about it.\"\n\n      \"It's your call, boss, but whatever you do it needs to be fast.  We can't bring anyone else in and we can't let this case go on any longer.\"  \n      *gosub badciv\n      *gosub badciv2\n      *set diligent - 20\n      *set corruptible %+20\n      *goto break2\n\n    #I don't want anything to do with this but I won't stand in their way. \n\n      \"Good,\" she says, before repeating herself.  \"Good.  I'll get the message out that you're aware of what's happening and have no objections.  If I were you I'd forget any of this ever happened.\"\n\n      Done deal.  \n\n      The investigation quickly dies of its own inertia.  Without either you or your deputy on board there's nobody influential enough to sustain it.  Bizarrely enough you find yourself walking away from the whole quarantine screen just as you discover that it is, in effect, a charade.  There must be something in your mind that wants to deal with this whole situation by pretending that it isn't happening at all.\n\n      So instead you go an entirely different route.  You find yourself working close to home.  After a few months you open a little shop, just like how they did it in the old days, selling local stuff to local people.  Your idea is to start farming on some land just outside town and then bring the produce in for sale.  Neat and tidy, you hope your little corner of the world will in its own way help solidify the social fabric of this place.  Even if you probably did much, much more to weaken it.\n      *gosub badciv\n      *gosub badciv2\n      *set diligent - 20\n      *set corruptible %+20\n      *set path 0\n      *goto civ\n\n    #I'm out.  This is horrible.\n\n      \"Krissa,\" you plead, \"this is insane.  We took an oath.  We made an agreement.  We can't come out here and do this -- think of all the honest people whose lives would suddenly have no meaning.  How can you possibly sell them out like this?\"\n\n      She doesn't answer you directly.  Instead she starts to walk away.  \"It's a shame you see it like that.  I'd gotten the impression you'd already moved past that.  I guess I misread you.\"\n      *if ambitious \u003c 60\n        \n        Suddenly you feel a blade behind your right ear.  Where did that come from?!?  Its sharp point presses uncomfortably into the spot where your skull meets your neck.\n\n        \"That's enough,\" you hear a disguised voice mutter, \"you're done.\"  For a second you think this is a joke but when you start to turn your head to see who's behind you the blade pushes a little deeper, breaking the skin and sending a small trickle of blood down onto your shoulder.  The blood is surprisingly warm.  The pain you're feeling is very real. \n\n        Then everything goes black.\n        *set enlightened 50\n        *goto dead\n\n      *elseif investigation > 60\n        \n        Suddenly you feel a blade behind your right ear.  Where did that come from?!?  Its sharp point presses uncomfortably into the spot where your skull meets your neck.\n\n        \"That's enough,\" you hear a disguised voice mutter, \"you're done.\"  For a second you think this is a joke but when you start to turn your head to see who's behind you the blade pushes a little deeper, breaking the skin and sending a small trickle of blood down onto your shoulder.  The pain you're feeling is very real. \n\n        Then everything goes black.\n        *set ambitious 50\n        *set enlightened 50\n        *goto dead\n\n      *else\n\n        You've made sure this conversation is being monitored and as soon as Mackenize begins walking away you let her see that for herself.  Don't try anything, your actions tell her.  So she walks.\n\n        After that you dive into this investigation with renewed vigor.  Your confrontation with Mackenize oddly serves to answer a lot of questions that had been cluttering the back of your mind.  Now that you know the motive it all makes a lot more sense.  \n\n        By the end of the next day you're standing with Heddes, Dallas and Bryson, as well as several officers from Niah, looking at the principal results of your investigation.  Everybody's helped fill in the gaps.\n        *set ambitious + 10\n        *set path 1\n        *goto break \n\n*label domestic\n*comment this is where you retire to a farm or something; traits are love_interest, ambitious, and the civilization traits\nYou've been taking some time off.  The day after Debussy's party was the last day anyone brought up Augustine.  Even the Jessica recently left orbit, its engines refueled and its cargo holds restocked.  According to the local media it was headed to the next star system, a collection of several habitable planets and moons three light years away rich in heavy minerals but light on water.  Watching from your home on Niah you saw the ship's engines light up as it gathered speed -- with more than a twinge of sadness you realized that you might never see the Jessica again.  It was your home for decades, literally your entire world throughout the trip across interstellar space.  The kind of thing you took for granted then immediately missed once it was gone.  You'd been happy to finally get downstairs when the Jessica first arrived at Niah, but when the majestic ship departed you'd felt like you were losing a dear old friend.   \n*set enlightened 35\n*set egalitarian 35\n\nSnap out of it - starships are not your friend.  \n*if love_interest = 0\n\n  That's happened to you a couple times now.  The team dispersed soon after arrival, you haven't really developed much of a personal life, and you're frankly feeling a little down.  But chin up, as they say, things could always change.  \n\n  You start to marvel at the snowfall.  These snowstorms off the planet-wide ocean are unlike anything you've known before.  Even if all the snow you'd ever seen in your life was combined into one big snowdrift it still wouldn't be a fraction of the massive snow cliff now outside your window.  \n\n  *page_break\n  Whatever, time to get going.  Today's the day.  You pull yourself up, graze your finger over the small medicinal regulator on your temple, and head for the door.\n  *goto domestic2\n\n*else\n\n  Lucky for you the sadness did not last very long.  Whatever emptiness the Jessica left was more than filled by ${partner}, the new love of your life.  You've come all this way and it looks at the end of the day like you're going to settle down to start a family, just as people have been doing for thousands of years.  Humanity marches on.  Your children will be born on another planet, so in that sense they will be pioneers.  But they will also be doing what pioneers have done countless times before and will no doubt be doing in generations to come.  \n\n  You have to admit, it gives you some small measure of satisfaction to know that your genes will perpetuate out here.  You've been very lucky to have so many opportunities to help shape the society still being created.\n\n  *page_break\n  \"Honey, you can't watch the snow all day.  Today's the day.\"  It's ${partner} calling from the next room.\n\n  \"But I've never seen so much.  These snowstorms off the ocean are just so unbelievable.\"  It's true.  Even if all the snow you'd ever seen in your life was combined into one big snowdrift it still wouldn't be a fraction of the massive snow cliff outside your window.  Still, ${partner}'s right.  You pull yourself up, graze your finger over the small medicinal regulator on your temple, and head for the door.\n  *goto domestic2\n\n*label domestic2\n*comment either bucolic or office work depending on ambitious level, then end with generic statements about what the world is like under current civ traits (goto form language insertable for every path)\n\nEverybody knew who you were when you arrived, but Niah knows virtually nothing of your quarantine agent work and that's how it should be.  Your life, however, goes on.  Where is it headed?\n*choice\n  #I find the next best thing on Niah to quarantine work.\n\n    Niah's closest equivalent is internal intelligence.  \n    *if diligent > 60\n      \n      The work is exactly what it sounds like.  Your background makes you an easy fit.  May the seditious beware!\n\n      As for whether there are any seditious people out here, well, the world hasn't quite developed the way you'd expected it would.\n      *set path 3\n      *goto civ\n\n    *elseif ambitious \u003c 40\n\n      It's not really your thing, though.  You talk to a few people in the field and quickly come to see that they have a different focus than you do.  You're not really about suppressing things anymore.  Instead you want to expand -- people's minds, society, your own outlook, whatever.  So you start your new career as a writer and consultant, spending your days offering thoughts about how the world should work.\n      *set path 0\n      *goto civ\n\n    *else\n\n      You make some inquiries but, to your surprise, there aren't any openings.  As one of the officers there puts it, the fact that you were surprised is all the reason they need not to bring you aboard.  A little harsh, yes, but a fair point nonetheless.\n\n      So instead you find yourself working closer to home.  You open a little shop, just like how they did it in the old days, selling local stuff to local people.  Your idea is to start farming on some land just outside town and then bring the produce in for sale.  Neat and tidy, your little corner of the world will in its own way help solidify the social fabric of this place.  Maybe you can also take advantage of your new business to better exchange ideas with the locals.  After all, you find you have this urge to help shape the way people out here think.\n      *set path 0\n      *goto civ\n\n  #I don't care.  I just want to see the universe.\n\n    It turns out there's a starship that's hiring.  It's the Artemis -- the pulverized liner you saw from the Jessica's window when you first arrived in orbit.  The shipowner has managed to scrape together some investors willing to support an overhaul and new voyage.  Artemis is in drydock right now and should be ready to leave for the next star system within the year.  \n    *if love_interest > 0\n\n      Of course that's complicated by the fact that ${partner} is now in your life.  But you're in luck, because you raise the idea only to learn that both of you have been yearning to get back into space.  There's something about coming so far, and getting so tantalizingly close to so many worlds, that makes you want to see as many of them as possible.  So you join the Artemis team together.  Which gives the ship a ready-made family.  That's always a good thing to have in space travel.\n      *set path 5\n      *finish\n\n    *else\n\n      So it looks like you're going to be on the move once again.  You'll have been on Niah less than two years before you pack up and move on to the next world.  It's only a 4-year trip, meaning that between coldsleep and relativity you'll barely age at all.  And then you'll be on an entirely new planet yet again.  Perhaps you could get used to this.  You might be able to do it for centuries.  \n      *set path 5\n      *finish\n\n  #Is Debussy hiring?\n\n    He's always on the lookout for valuable human resources.\n    *if ambitious > 60\n\n      So you're working for Debussy now.  Who knew, right?  Well, it turns out he'd always assumed you would join his enterprise once your official duties came to an end.  So when the quarantine issues were put to rest Debussy wasted little time snatching you up.  It looks like you've got a career ahead of you helping to pick the best people to fill the company's various tactical teams.  \"You've seen inside the mind of every newcomer on this planet,\" Debussy had said, \"and I always prefer to have the inside information if I can get it.\"\n\n      An orientation packet arrives shortly afterwards.  Opening it, you're taken on a short, narrated tour of Debussy's holdings.  As a cascading symphony of sound envelops you, images march past of majestic waterfalls, towering mountains and soaring skyscrapers.  Charts show the progression of various conquests:  The Roman Empire slowly spreads across a map of Europe.  Then computer literacy -- the measure of an advanced society -- fills in a map of Earth.  Finally a third map shows the spread of known habitable worlds, connected by a web of charted, navigable starship routes.  \n\n      The man is a legend in his own mind.  Whether he's anywhere near as powerful as he appears to be, however, is anyone's guess.  You've never really been able to figure out exactly who does or owns what in this place.  But you're slowly getting more comfortable.  With your fortune tied (for the moment) to Debussy's, you have no choice but to hope the theatrical man succeeds. \n      *set path 4\n      *finish\n\n    *else\n\n      You make some inquiries but, to your surprise, there aren't any openings.  As one of the officers there puts it, the fact that you were surprised is all the reason they need not to bring you aboard.  A little harsh, yes, but a fair point nonetheless.\n\n      So instead you find yourself working closer to home.  You open a little shop, just like how they did it in the old days, selling local stuff to local people.  Your idea is to start farming on some land just outside town and then bring the produce in for sale.  Neat and tidy, your little corner of the world will in its own way help solidify the social fabric of this place.  Maybe you can also take advantage of your new business to better exchange ideas with the locals.  After all, you find you have this urge to help shape the way people out here think.\n      *set path 0\n      *goto civ\n      \n*label break\n*comment this is where you go after the conspirators and succeed or fail; low diligent and ambitious kills you off\n*if focus \u003c 2\n  Mackenzie is out of the room, but you don't see the need to wait for her.  \"We can catch her up,\" you say to the others, \"and besides, it might be good to get other perspectives.\"  You've been noticing that your deputy tends to insist on certain points of view.  \n  \n  With Augustine's death on board the Jessica, and the odd things you've learned subsequently, you're all convinced that something went wrong.  More than that, you're convinced that whatever went wrong was intentional.  So now you're preparing to take action.  You've identified the conspirators -- a handful of low-level officers from the Jessica who worked around Augustine's coldsleep pod -- and you're going to try to grab them before too much more time is lost.  It's just a matter of ironing out the kinks in your plan.\n  *page_break\n  \"Never overthink things,\" you say.  \"The most likely suspects are usually the right ones.\"  The Jessica officers had the motive, the means and the opportunity.  Clearly they were going to be well compensated for their actions, and they must have been able to manipulate the pod either before departure or near the end of the starship's voyage.  Then once the ship settled into orbit they could have taken full advantage of the near chaos of an entire shipload of passengers awake and trying to depart.  Who knows what they did to Augustine or his possessions.  They could have removed and replaced things before anyone had any idea they were there.\n  \n  By now Mackenzie's back in the room.  \"Sounds good,\" she says.  \"I think we've nailed it.\"\n  \n  So at your direction the team spends the rest of the day working out logistics.  Then you have the team spend the next day working out the administrative issues.  When you're finally satisfied that everything's been done the way you want it, you tell the team to move out.  \n  *if investigation > 79\n  \n    Almost as soon as things are set in motion, however, they come to a halt.  Once the official green light was given it flushed out people and facts you previously didn't know about.  You probably should have done that sooner, in fact, to confirm your theory.  In any event, you quickly realize that your theory about low-level Jessica officers is wrong.  It just doesn't work.  \n    *page_break\n    Most appallingly, however, it's Mackenzie who winds up being one of the new suspects.  She jumped the gun, giving away her involvement in the conspiracy by acting a little too fast once you announced you were moving in another direction.  Quickly she was found out, and once that happened a few other tidbits came to light as well.  Much as you want to claim the credit for this yourself, it more properly belongs with your team.  \n    \n    It turns out that Heddes, Bryson and Dallas have been working even while you were distracted with other things.  Sort of picking up your slack, so to speak.  Of course you're a little chastened.  But you also realize that this is a good thing.  It means you chose your team well.  It's a measure of the group's collective professionalism that it got results thanks in part to the junior members' initiative.\n    \n    The next day you're sitting with the rest of your team.  You're ready to move, for real, because now you've confirmed that what you're seeing is legit.  Augustine was carrying genetically modified hair that carried vast amounts of data.  Mackenzie was somehow aware of, or otherwise willing to facilitate, this effort.  \n    *page_break\n    *goto breakprime\n\n  *else  \n    They spread out quickly to several points across the city.  It's definitely a rush -- even with so much advanced technology at your disposal, there's still something exciting and unpredictable about good old-fashioned police work.\n    \n    Everything goes smoothly.  None of the suspects, it turns out, had any idea you were coming to get them.  One of them was even fast asleep!  You gather up the suspects for processing and then collect whatever suspicious evidence you can find.  You find a few small items that clearly do not belong with these people, including some materials from the Jessica that, for lack of a better word, were clearly swiped on the way downstairs.  (Sort of like a cruise ship employee stealing a bunch of beach towels.)  You never do find any proverbial smoking guns, but then again you would have been surprised if you had.  This isn't some movie.  There's no file labeled \"secret evidence\" sitting out there somewhere.\n\n    Eventually your team regroups.  Their faces are flush with the knowledge they have done their job well.  \"Great job everyone,\" you say.  \"Mission accomplished.\"\n    *page_break\n    The funny thing, of course, is that even though you've done a great deed there's nothing much you can actually do about it.  The quarantine screen is meant to be secret.  It's something only a privileged few even know about.  So when you take steps to preserve the screen's integrity, you have to keep quiet about it.  You can't tell anyone what you did.  Instead you just melt back into the welcoming embrace of Niah society.\n    \n    In your case, that means working close to home.  After a few months you open a little shop, just like how they did it in the old days, selling local stuff to local people.  Your idea is to start farming on some land just outside town and then bring the produce in for sale.  Neat and tidy, you hope your little corner of the world will in its own way help solidify the social fabric of this place.\n    *set enlightened 40\n    *set egalitarian 40\n    *set path 0\n    *goto civ\n  \n*else\n  *gosub sudden\n\n  The display in front of you lists the following items:\n\n  Dead starship passenger\n\n  Body used to smuggle encrypted contraband data\n\n  Homicide cannot be ruled out\n\n  Recipient network on Niah\n\n  Pattern of potential discrepancies\n\n  Quarantine Team ${lastname} compromised\n\n  Ouch, you think, looking at your own name up there in that context.  That hurts.  But no matter -- you're not here to talk about your feelings.  You're here to try to clean up this mess.  And the \"compromised\" term is a euphemism.\n  *page_break Whose mess is it?\n  You see, one person is conspicuously absent from the room.  Mackenzie.  Your supposedly trusted deputy.  You and the team finally concluded there was something going on with her that could no longer be ignored.  Once it became clear there was something wrong with her the protocols actually moved with incredible speed -- she was stripped of all access, denied any links to external nets, and isolated from all ongoing work.  The quarantine agent was, in effect, herself physically quarantined.  She will be dealt with.  \n\n  This was of course a staggering surprise to all of you.  The diligence the rest of the team has shown is a testament to where their loyalties seem to lie.  \"I didn't go into this,\" Heddes had said, while massaging his legs, \"to let people down.\"\n  *page_break\n  *goto breakprime\n  \n*label breakprime\nFrom Mackenzie it was a relatively simple effort to locate her \"handlers\" on Niah.  Once you knew what the contraband was and how to identify it, you were able to cross-check that knowledge against residual information in Mackenzie's logs to uncover where the genetic data on Augustine's body was supposed to have gone.  It appears there were people planetside waiting to receive this information.  \n\nWhat they would do with it you're not entirely sure, but from the review of the data it appears that the contraband was specifically meant to bypass quarantine.  Long story short, somebody on Earth went to enormous trouble to send to Niah information that nobody else on Niah could have.  It was like sending cheat codes, or a secret password, to this emerging civilization.  Whoever was going to get that information out here would be able to game the system.    \n\nSo now you're about to go after those people, whoever they are.  At first you thought about trying some kind of undercover effort, but with Mackenzie already outed you figured there's no way to guarantee the secrecy you need.  Who knows how much time you have?  Anything you do might be enough to tip these people off.  Heck, they might already be on to you.  You need to act fast.  So you'll just go in through the front door and hope for the best -- how it's always been done.\n\nThis is it.  \n*page_break Good luck\nWithin minutes you're standing, with what's left of your team, near Niah's only horse farm.  White wooden fences mark off one pasture after another, in a stretch of territory that was rural countryside when it was built 80 years ago but now forms the city's edge.  Grey and tan buildings from the city stare off against rolling green fields.  \n\nYou're doing much the same thing.  From those buildings you're looking across the field to the stables at their far end.  Augustine, or some part of him, was supposed to end up there.  It would be ironic, you think to yourself, if you never make it in there alive, either.  \n\nOf course you've scanned every type of surveillance you have.  You're not going in blind.  But there's nothing in the records about this horse farm that suggests anything to do with an interstellar conspiracy.  For all anyone out here knows, this is just one Earth family's attempt to recreate some of the finer country pursuits from back home.  You're taking a small leap of faith in believing it's being used for anything more sinister.\n\nDallas is making one final scan while receiving updates from the other sentries.  \"All clear.  Ready boss?\"\n\nFor an instant you feel queasy.  Your pulse is quickening and your stomach tightening.  \"Let's go.\"  \n\nSuddenly half a dozen highly trained officers take up position throughout the area.  One is practically inside the main stable already.  You begin a quick walk across the grass and up to the main door but before you get there, the door opens and a smiling young girl steps out, maybe 8 or 9 years old, her hair in pigtails and a balloon in her hand.  Your mind quickly scans the data -- there should not be any children here.\n*page_break Friend or foe?\nShe stands still and stares at you, her mouth slowly forming a wry smile that makes your skin crawl.  She looks like she's debating whether to kill you first before she starts eating you or make you experience the agony first hand.  \"Hello,\" she says.  \"I am your future.  Julian Augustine was your past.  Krissa Mackenzie is your present.\"\n\nWhat the hell is this?!?  Apart from the fact that her past/present/future is in descending order of age, you can make neither heads nor tails of her statement.\n\nBut before you can think any more the little girl continues:  \"You know exactly what this is.  This is you finding out that your life is either about to end, like your past; continue hopelessly, like your present; or thrive into your future.\"\n\nMy future is a little girl with pigtails and a balloon?  \n\n\"Your future can be life.  Hope.  Birth.  Your past is dead.  Augustine died before your ship even arrived here.  Your present is doomed.  Krissa Mackenzie's lamentation will be her eulogy.  You do not make your own life, but you do get to choose which path your life will follow.\"\n\nOdd comments, you think, to say to a quarantine officer.  My whole reason for being here was to make new lives.\n\nHer strange commentary continues.  \"You have made nothing,\" the girl says.  \"You have merely discovered that which already existed.  You are like the slave who covets his master's gold that he can never have.  Such greed cannot make you rich but it can cost you your life if you are not careful.  And now, to continue that fate, you are being confronted with the choice you must make.  Accept what you have discovered and live.  Reject it and die.\"\n*page_break Foe, definitely\nJust then you feel a tap on your shoulder.  \"You alright, ${firstname}?\"  It's Dallas.  He doesn't know what you've seen and heard.  Nobody seems to.  Apparently that little girl was speaking only to you.\n\nYou're a little shaken but you come to your senses quickly.  \"Yeah,\" you say, trying to downplay things for your team, \"I'm fine.  Just thinking for a second.\"  \n\nAn invisible girl appeared before you and gave you a choice with life-or-death consequences.  How do you react?\n*choice\n  #I do what I came to do.\n\n    *if investigation \u003c 50\n\n      \"Let's go.\"\n\n      You power ahead, ignoring this invisible little girl and whatever unbelievable threat she might have just lobbed at you.  It was an illusion, you think to yourself, and not something I should take seriously.\n\n      Unfortunately for you it is serious.  Deadly serious.  No sooner do you begin walking towards the door than the little girl reappears and speaks.  \"I'm sorry you have chosen this path,\" she says in a genuinely melancholy voice, \"but you were warned.\"  And with that she changes her appearance completely.  You are stunned by what you see next -- a mortally wounded old man in rags.  This was the image on Augustine's freezer pod after he died.  Only this time he's not dead yet, like he was on Augustine's pod.  Instead he is sitting on the floor with his arms wrapped around his shoulders.  He holds his left arm out to you, with his withered, bony fingers balled in a fist.  Slowly he lets his hand go limp, and as his fingers gently separate something small and metallic falls out from his grip and onto the floor.  A pulse grenade.  You know that by the time you see it you are doomed.\n      *goto dead\n\n    *else\n\n      This is idiotic, you think to yourself.  I didn't come out here to be smack-talked by an imaginary little girl. \n      *goto break1\n\n  #I take the threat seriously and back off.\n\n    \"Stand down,\" you order, \"we're making a mistake.  We don't know what we're looking for or who we think is behind it.  We need to step back and figure that out.\"\n\n    The team looks slightly incredulous.  You catch one of the Niah guys mouthing something unflattering about your apparent lack of courage.  They can mouth whatever they want, you think, they didn't just have their lives threatened so explicitly.  That's not supposed to happen out here -- assuming the screening worked as planned, the reconnaissance is accurate, and your team's integrity is secure.  There aren't supposed to be shadowy assassins roaming around using deadly force to get their way.  Since there apparently are, all bets are off.\n    *gosub badciv\n    *gosub badciv2\n    *goto break2\n\n  #I tell everyone what she just said and ask for input.\n\n    \"Whoever's waiting for us just sent me a message.  If we move on them I'm dead.\"\n\n    Bryson scoffs:  \"I would have been more surprised if they hadn't said that.\"\n\n    \"I'm willing to get you killed to shut this thing down,\" Dallas jokes.  \"But seriously, there's nothing there.  We've checked it.  You probably just tripped a proximity detector.  The technology here is surprisingly good for how far behind Earth it is.\"  (There's a general assumption among terrans that the farther away from Earth you get, the more backward everything becomes.)\n\n    The consensus appears to be to go ahead.  Fine with you?\n    *choice\n      #No - they're too eager to move.  Let's stand down.\n\n        The team looks slightly incredulous.  You catch one of the Niah guys mouthing something unflattering about your apparent lack of courage.  They can mouth whatever they want, you think, they didn't just have their lives threatened so explicitly.  \n\n        Well, keep telling yourself that.\n        *gosub badciv\n        *gosub badciv2\n        *goto break2\n\n      #Yep.  Let's go in.\n\n        This is idiotic, you think to yourself.  I didn't come out here to be smack-talked by an imaginary little girl.  If I stopped every time something weird happened out here I'd never get across the damn street.\n        *goto break1\n\n*label sudden\n*comment this is for low investigation values to explain why the plot just took a 90 degree turn\n*if DNA = false \n\n  Let's step back for a second.  You might be wondering how you got to this point.  \n\n  It turns out that your team have been working even while you were distracted with other things.  Sort of picking up your slack, so to speak.  Of course you're a little chastened.  But you also realize that this is a good thing.  It means you chose your team well.  It's a measure of the group's collective professionalism that it got results thanks in part to the junior members' initiative.  In fairly short order the team made some significant breakthroughs -- including the discovery that Augustine's own body had been genetically modified to carry contraband information.  \n  \n  Now you're assembled to see the fruits of your team's labor.  \n  *return\n\n*elseif investigation \u003c 61\n\n  Let's step back for a second.  You might be wondering how you got to this point.  \n\n  It turns out that your team have been working even while you were distracted with other things.  Sort of picking up your slack, so to speak.  Of course you're a little chastened.  But you also realize that this is a good thing.  It means you chose your team well.  It's a measure of the group's collective professionalism that it got results thanks in part to the junior members' initiative.  In fairly short order the team made some significant breakthroughs.  Now you're assembled to see the fruits of that labor.  Some of it is quite surprising.    \n  *return\n\n*else\n  None of it brings you happy thoughts.\n  *return\n\n*label break1\n*comment this is where you move in on the conspirators\nThe front door is wide open and you walk through.  It's initially dark.  You can hear chatter between various team members as they identify and deactivate the building's controls.\n*if diligent \u003c 55\n\n  Suddenly you feel a blade behind your right ear.  Its sharp point presses uncomfortably into the spot where your skull meets your neck.\n\n  \"That's enough,\" you hear a disguised voice mutter, \"you're done.\"  For a second you think this is just another private image like the little girl but when you start to turn your head to see who's behind you the blade pushes a little deeper, breaking the skin and sending a small trickle of blood down onto your shoulder.  This is no visual implant.  The pain you're feeling is very real. \n\n  Then everything goes black.\n  *gosub badciv\n  *gosub badciv2\n  *goto break2  \n\n*else\n  Neither your imaginary little girl nor any of her friends are anywhere to be seen.  \n\n  Inside, you take a look around.  It quickly becomes clear that this building is about more than just horses.  An entire network of genetic sequencing equipment, supported by its own off-the-grid power source, populates one part of the building.  Interestingly, it doesn't look like it has ever been used.  It might have been built just to receive the information Augustine was transporting.  It looks like you're going to accomplish your objective and shut this down.\n\n  Just then the little girl reappears.  \"Whoa,\" exclaims Bryson, \"where'd she come from?!?\"  \n\n  Apparently everyone can see her this time.\n\n  Dallas is scanning his monitor.  \"It says she's real.\"\n\n  *page_break\n  She looks at you innocently this time, with no sense of malice whatsoever.  \"I warned you.  If you are serious about your objective, Captain ${lastname}, you have to show it.  You will have to kill me.  Because otherwise you will all die.\"  The balloon is back in her right hand.  \"This is not actually a balloon,\" she says, \"even though you think it is.  It's a pulse grenade.\"  A pulse grenade is a little souvenir from Earth that could liquefy you and your team within seconds.  They're scary.  \"Kill me,\" she says again, \"before I kill all of you.\"\n\n  One of two things is happening here, you think to yourself. Either we're really being threatened, or somebody's messing with me to see what I'm willing to do to shut this down.  Either way they seem to want me to shoot this kid to save my team's lives and protect our interests.  Even though she's apparently a real little girl and all I can see in her hand is a harmless balloon.\n  *goto break3\n \n*label break2\n*comment this is where you wuss out\n*comment if ambitious sufficiently high then debussy impliedly bails you out, otherwise low diligent kills you\n*if ambitious > 75\n\n  Six months later and you're working for Debussy.  Nothing more ever happened with the Augustine case -- that was the one chance to act and after it fell through people seemed to lose interest quickly.  Leads dried up (or were erased) and windows closed.  You never found out who was behind any of it.\n\n  Apparently Debussy saw something in you he liked, and once you came back from a short trip out on the global ocean he asked you to come work for his company.  You've got a career ahead of you helping to pick the best people to fill his company's various tactical teams.  \"You've seen inside the mind of every newcomer on this planet,\" Debussy had said, \"and I always prefer to have the inside information if I can get it.\"\n\n  The man is a legend in his own mind.  Whether he's anywhere near as powerful as he appears to be, however, is anyone's guess.  You've never really been able to figure out exactly who does or owns what in this place.  But you're slowly getting more comfortable.  With your fortune tied (for the moment) to Debussy's, you have no choice but to hope the theatrical man succeeds. \n  *set path 4\n  *goto civ\n\n*elseif diligent \u003c 50\n\n  That was the last time you ever saw any of these people.  Something happened to you as soon as you let your guard down.  Whether you were attacked, or poisoned, or what you don't actually know.  But everything came to an end.\n  *goto dead\n\n*else\n\n  Whatever happened you're not the same person afterwards.  Nor is the team the same.  The whole dyanmic quickly soured and the elements of the case, so painstakingly put together, started to unravel.  Your appearance at the horse farm put Niah on notice of how close you had come to uncovering this clandestine conspiracy.  So when you got that close, only to back off, you inadvertently gave the conspirators time to make themselves disappear.  \n  \n  The investigation quickly dies of its own inertia.  Without either you or your deputy on board there's nobody influential enough to sustain it.\n\n  There must be something in your mind that wants to deal with this whole situation by pretending that it isn't happening at all.  It's actually a perfect example, you think to yourself, of the whole quarantine screen process itself.  You've dealt with a piece of negative information by wiping it from your mind.  \n\n  So instead you go an entirely different route.  You find yourself working close to home.  After a few months you open a little shop, just like how they did it in the old days, selling local stuff to local people.  Your idea is to start farming on some land just outside town and then bring the produce in for sale.  Neat and tidy, you hope your little corner of the world will in its own way help solidify the social fabric of this place.  Even if you probably did much, much more to weaken it.\n  *set path 0\n  *goto civ\n\n*label break3\n*comment this is where you act\n\nYou've got a gun in your holster.  Assessing the situation, processing all you know, you need to act fast.  If you feel confident using force to overpower an adversary, you might be better trying to shoot your way out of this problem.  On the other hand, if you think you might do better reasoning with this entity, or you're unsure how well you could control a violent confrontation, then you might be better off using nonviolent means here.  \n\nAre you willing to fire your gun?\n*choice\n  #Yes.\n    You raise your weapon and point it in her direction.  What do you shoot at?\n    *choice\n      #The girl -- she's a direct threat.\n\n        In an instant you raise your sidearm, point it directly at the little girl's chest, and pull the trigger.  \n        *goto shootkill\n\n      #The balloon -- it's really a deadly grenade.\n\n        You're not about to shoot a child.  But you can certainly justify shooting a threatening weapon in that child's hand.  You raise your sidearm, point it at the little girl's balloon, and pull the trigger.\n        *goto shootballoon\n\n      #The air -- I miss her on purpose.\n\n        I don't care what this system is trying to do, you think to yourself, I'm not taking a chance of hitting a kid.  \n\n        But you decide to fire nonetheless, just to see what happens.  \n\n        You hit the wall at the far end of the room, blowing a hole in it and sending dust and debris flying out in every direction.  The sound alone is immense, and the damage is surprisingly widespread.  As the air clears you catch sight of Bryson, crouched behind a table, nervously checking you out.  \"You planning to do that again, boss?\" she asks.\n\n        \"I don't think he has to,\" Dallas answers, \"because our little friend is gone.\"  Indeed, the little girl he's referring to has disappeared.  \"If she's real,\" Dallas continues, \"she moves awfully fast.  Did anyone see where she went?\"\n\n        \"Not me,\" says Heddes, \"I was too busy getting out of the way.\"  \n        *page_break\n        Not to worry, she's back within seconds.  This time she appears behind Heddes, practically walking out from under his shadow and into the center of the room.  \"If you were trying to get out of the way,\" she says to him, \"you didn't do a very good job.\"\n\n        Needless to say this startles your junior officer and he looks to you to do something.  After all, you're not only in charge, you're also the guy who decided to shoot the wall for the hell of it.  \"Maybe,\" Heddes adds, for good measure, \"you can shoot something besides a wall, you know?\"\n\n        At the same time Heddes suggests this, the girl's balloon changes form.  Now it really is a pulse grenade.  It isn't active -- you're not dead -- but it's live.  \"It's live,\" Dallas says from his monitor, just in case you were wondering.  \n\n        \"I'm going to kill you,\" the little girl taunts.  Her thumb moves slowly towards the grenade's trigger switch.  How are you going to stop her?\n        *choice\n          #I shoot to kill.\n            In an instant you raise your sidearm, point it directly at the little girl's chest, and pull the trigger.  \n            *goto shootkill\n\n          #I shoot the grenade.\n            You're not about to shoot a child.  But you can certainly justify shooting a threatening weapon in that child's hand.  You raise your sidearm, point it at the little girl's balloon, and pull the trigger.\n            *goto shootballoon\n\n          #I put down my gun and ask her to stop.\n\n            \"I don't want to kill you,\" you say.  \"I'm not going to shoot you or anyone, or anything, else here.\"\n            *gosub ruthdead\n            *goto reason\n\n  #No.\n    Briefly you place your hand on your holstered weapon, long enough for everyone to see, then relax again and let your hand fall to your side.  But if you're not going to shoot anyone, how are you going to proceed?\n    *choice\n      #I tell everyone to grab her.\n\n        Your decision to rush a nonexistent person doesn't end well.  The little girl runs away with surprising speed, ducking behind an alcove wall and out of your line of sight.  But as she does a panel from the sequencing equipment drops down to reveal a high-caliber weapon pointed directly at your team.  You're still processing the situation when a series of rapid shots ring out from behind you.  Dallas, gun in hand, has fired.\n\n        Unfortunately his instinctive reaction was the wrong one.\n\n        Dallas has shot the irreplaceable equipment you all came to seize.  It explodes in a violent flash.  Concussive waves of pressure beat down on your chest and knock you back onto your heels.  You realize that the system wanted you to do that all along.  You've just been suckered by an unarmed self-destruct protocol.  Having no weapons of its own meant the equipment never triggered any screening hits, since there was nothing dangerous for your systems to detect.  No screening hits made the equipment much easier to hide.  It relied on you to bring the weaponry.  All it needed was a cowboy with a gun.\n\n        \"Whoops,\" Dallas says.\n        *page_break\n        *gosub goodciv\n        *gosub goodciv2\n        *set diligent - 10\n        *goto break4\n\n      #I try to reason with this image -- or with the intelligence controlling it.\n\n        You open your hands and slowly stretch out your arms, palms up.  You're channeling the legacy of generations of social progress.  \"We're not here to kill anyone,\" you say.  \"We don't just shoot our guns off at the slightest provocation.\"  \n\n        Instead you emphasize the purpose behind your mission.  You gesture at each of your team members, explaining their roles and talking up their strengths.  Heddes' very existence, you say, is a testament to how humans strive for a more perfect world.  Bryson and Dallas have likewise given up their futures back home to come out here to a new world in a new part of the galaxy.  \n\n        \"They are not here for murder,\" you say.  \"They are here for honorable purposes.\"\n        *gosub ruthdead\n        *goto reason\n\n      #I ignore this image and proceed with the search\n\n        \"This isn't real,\" you say to your team.  \"Dallas, I don't know what you're looking at but the readouts can't be right.  And I'm not interested in being jerked around by an imaginary little girl with a balloon.\"\n\n        Dallas looks annoyed, like you've unfairly called him out in front of his fellow officers.  \"Look,\" he responds, \"I'm just telling you what it says.  If there's no threat then something's got the ability to alter our readouts.  Our own screening tech is compromised.\"\n\n        *if brysoninvest = 2\n          Immediately you realize this must be what Bryson warned you about.  You order everyone to stand down.  \"Whatever you do,\" you say, \"do not discharge your weapon.  It's trying to goad us into firing at it.\"  You exchange a knowing glance with Bryson and she returns the favor.  \n\n          Then you continue, talking as much to the room as to any specific people in it:  \"We're not going to resist.  We're not going to fight.  We're going to do our jobs and complete our mission and we're going to do it peacefully.\"\n          *set diligent + 5\n          *set corruptible %+ 10\n          *goto reason\n\n        *else\n          \"If that's the case,\" you respond, \"then we can't rely on our equipment either way.  Maybe none of this is real.\"  You wave your arms theatrically around the room for emphasis.  \"So let's just get on with our jobs and worry about the things we can control.\"\n\n          Dallas shrugs but reluctantly agrees.  The others seem to see it this way, too.  Bryson takes a breath and begins to speak but then, just as abruptly, stops herself.  When you ask whether she had something she wanted to say she simply says \"no, not anymore.  I'm good.\"\n\n          \"Then let's go,\" you say.  And with that you and the team walk past where the girl had been and begin opening up whatever equipment and machinery you can find.  Quickly you see signs of an overwrite protocol spreading through the system.  You also see nanotechnology systematically compromising the integrity of the actual physical components.  The whole thing is trying to self-destruct.  Frantically your officers attempt to inhibit the sequence but to no avail.  By the time the self-destruct powers down the system is a shell of its former self.\n          *set ambitious %+ 10\n          *goto break4\n        \n*label ruthdead\n*if ruth = 2\n\n  \"You lie.\"  The girl is stern, a contemptuous look on her face.  \"You have killed in the name of the quarantine screen and you are capable of doing it again.  Do not pretend to be any more honorable than you are.\"\n\n  This takes you back.  How did she know about Ruth?  You might quibble with the insinuation that you murdered her -- it was a desperate act in the name of the greater good -- but you have to admit she's called your bluff nonetheless.  Clearly whatever's in charge has learned a lot about your team.  Perhaps with Mackenzie that's not surprising.  \n\n  \"I don't agree with your premise,\" you answer, \"but the result speaks for itself.  There was no good ending in that situation.\"\n  *set velvet 0\n  *return\n\n*else\n\n  You gather your thoughts for a moment.\n  *return\n\n*label reason\n\nThen you point out the obvious:  \"Besides, we're here in numbers.  Any resistance merely delays the inevitable.  We know what's here and we know it shouldn't be.\"\n\nYou pause for a second.  Everyone stands there silently.  But you catch Heddes and Dallas exchanging looks that seem to say \"Are we really trying to talk an imaginary girl out of killing us?\"\n\n*if corruptible > 60\n  Fortunately it seems to work.  There's a pause while the girl/machine/image goes through what are obviously some pretty large calculations.  Running all the hypotheticals and permutations and possibilities through its analytical processors.  Looking, as it does so, like a dog being rubbed on its tummy who's unable to focus on anything else.  It's funny, you think as you stand there, that artificial intelligence still behaves in such a characteristic manner when it's trying really hard to focus on something.  \n\n  Finally the girl turns away from your team and rolls the balloon -- now heavy enough to roll -- towards the rest of the room.  Towards the equipment.\n\n  \"She's blowing it up!\"  It's Dallas, yelling, one eye on the balloon and the other on his handheld.  \"Get down!\"\n\n  *page_break\n  You all hit the deck and wait for the inevitable explosion.  It never comes.  Instead the balloon hits with a thud and then just stops.  Then it disappears entirely.  Once again Dallas' equipment has been fooled -- there's no grenade, no girl, no weapon of any kind threatening you.  But as you breathe a sigh of relief you see the machinery start to smoke.  The grenade may not have been real but the activated self-destruct mechanism certainly is.  \n\n  Frantically, you and your team try to stop the self-destruct or, if that doesn't work, salvage whatever can be rescued.  Unfortunately the system is entirely foreign.  It's not supposed to exist, after all.  It was built in the shadows, meant for contraband uses, and designed to be hidden.  Its architecture simply bewilders you, particularly under the pressure of an active self-destruct.  \n  *goto break4\n\n*elseif velvet > 1\n  Funny enough it seems to work, at least for the moment.  The little girl squares up to face you, takes two steps forward, and holds out her arm.  Suddenly the balloon is no longer there.  Instead in her hand is a velvet box, exactly like the one Debussy gave you in appreciation for your work on the Jessica.  Only this box is empty.  \n\n  \"You have something that goes here,\" she says.  Although she's smiling, her voice is deep and, frankly, intimidating.  She sounds less like a child than an army officer or an off-world mining prospector.  \n\n  Let's run with this, you think to yourself.  It's good you have your cube with you.  You take it out and gently place it in the custom slot, watching it snugly click into place.  Then the box starts to glow for a moment.  Even though you're still not too familiar with the design, you can tell some sort of massive data transfer is going on.  This little girl, or whatever she is, is doing something dramatic to the gift Debussy gave you.  \n  *page_break\n  And as quickly as it started the process ends, and ends in dramatic fashion.  Your velvet cube falls to the ground just as everything else in the room disappears.  The girl, the equipment -- it's all gone in a flash.  What's left is you, your team, and a faint scent of incinerated machinery.  Plus, of course, a small velvet-lined cube, sitting there at your feet.  \n  \n  You open up the familiar velvet box and are stunned to see a new image -- Niah.  The watery world bathed in orange sunlight.  Quickly you run through the database only to confirm that the Earth that was there has been wiped out.  No more bookmarks, no more messages, no more familiar people and places that had brought you some measure of comfort here in your new world.  You're momentarily anguished.  It's all gone.\n  \n  What's Niah doing there?  You gather your team around you and, together, the four of you take a quick tour around the planet you're on.  What you see is remarkable.  The Earth on file was static; it had embedded messages, of course, but was otherwise a snapshot of the planet from around the time you left.  This Niah seems to have, at least in some places, a realtime update feature.  You zero in on your present location and find yourselves looking down on ... yourselves.  \"Holy crap,\" Dallas exclaims, \"that's us!\"\n  *goto reason2\n\n*else  \n  Funny enough it seems to work, at least for the moment.  The little girl squares up to face you, takes two steps forward, and holds out her arm.  Suddenly the balloon is no longer there.  Instead in her hand is a velvet box.  \n  \n  \"It's a memory cube,\" Bryson says, excitedly.\n  \n  Quickly she fills you in.  Memory cubes are livable images containing vast amounts of data.  \"Some of the best can project a snapshot of an entire city around you almost as though you're there.\"  She activates the cube and, to your surprise, you see yourselves.  This cube has Niah, and your team, and it all operates under some kind of realtime update feature.  \n  *goto reason2\n  \n*label reason2\nOnly it's not just you.  There's a fifth figure directly behind you, cloaked in black and unrecognizable, but when you turn around there's nobody there.  Then you look back at the cube's image and the figure is there, behind you, leering over your shoulders.  A rattled Bryson is the first to speak:  \"Okay that scares me,\" she says.  \"Suddenly I'm having flashbacks to walking out of dark rooms when I was a kid.\"  \n\n*page_break\nYou test this simulation further.  You wave and your image waves.  You stretch your arm out to where the black clad figure is apparently standing, and the black clad figure steps out of your way.  Then the four of you try to corner it but it never works.  Somehow the figure always winds up on your other side, away from your grasp and out of your reach.  It doesn't threaten you in any way, but it never leaves, either.  It seems to be yet another projection that isn't actually real.\n\nQuickly you check a few other places -- where you work, where you live, where you've been -- and the figure is there, too.  There and nowhere else.  You activate a few remote systems and the cube shows those systems coming online.  Then it shows the figure reacting to them.  Heddes, as usual, puts it together neatly:  \"It's monitoring everything we do.  Somehow it's got active sensors everywhere we go.\"\n\n\"Is that a threat,\" Bryson asks, \"or maybe a warning?\"\n \nYou don't know.  Clearly it's a message of some sort, since whatever was at work here made the specific point of showing you that you're being monitored.  You can't find any evidence of any sensors, nor are there any people nearby who might be harboring the equipment necessary to produce this unsettling show.  \n\nHeddes, however, hits on an idea.  \"Obviously the data is getting back to the cube,\" he says.  \"So we need to see where the transmissions are coming from.  You can't hide that.\"\n\nWhat you find stuns you.  \n\n*page_break\nAfter some trial and error, including Dallas comically managing to punch himself in the face while trying to catch the black-clad figure, you and the team get an answer.  The transmissions are coming from you.  Specifically, the cube is picking up stray data transmissions from modified DNA in your hair.  Whatever was done to Augustine appears to have been done to all of you as well.  \"There's a subroutine,\" Dallas says, \"in the planetary systems that pick up our DNA and capture their profiles.  Of course we've left behind a hair or two at the office and in our homes.  That's why this thing --\" and here he's pointing at the cube --\"seems to know where we go.  We've left a trail of bread crumbs all over this place.  Now that we're standing next to the machinery, we're close enough it can download everything we're carrying.\"\n\nOf course none of you have any memory of something like this being done.  You're left momentarily speechless as the full import of what has happened starts to dawn on you.  In quick follow-up tests, using the same procedures already perfected for Augustine, you confirm that yes, indeed, you and the rest of your team carry modified DNA embedded with contraband information that would never, ever, have cleared quarantine.  Even, most likely, Mackenzie.\n\nWhoever did this obviously did it before you awoke near Niah.  And since you're quarantine screeners, whoever did this must have been extremely powerful.  Or foolhardy.  Or both.\n\n\"Effing brilliant,\" Dallas says.  \"You have to admit.  It's fucking brilliant.  We're the contraband.  This whole thing has been a ruse to get us to come here and deliver our contraband DNA.  Why didn't we ever check ourselves?  Augustine's death merely set us up.  We follow this trail, we jettison a deputy along the way to ensure we're not all together in one room in case it blows up or something, and then we walk right into the very place our DNA needs to be and deliver it on a goddamn platter.\"  He's really not respecting the language rules any more, you think.  \"All the while having absolutely no idea we're doing it or who we're doing it for.  Who better to break quarantine than the quarantine screeners themselves?  This is the biggest con in history!  Jesus, somebody must be laughing their ass off at us right now.\"\n\n*page_break\nNo sooner does Dallas say this, however, than the room changes.  One second you're surrounded by your team thinking over a list of likely suspects.\n\nThe next you're standing there alone, your team off in other parts of the building.  They're fine but they're in the same condition as you.  You look down at the notes you were taking and see that they've been fundamentally altered.  Where before there were detailed conclusions and objectives, now there are merely tidy stacks of blank input screens.  At first you frantically search for the override, thinking that you've merely tripped a data safeguard, but you find nothing.  It has been irrevocably altered.  You begin to make a note of this finding, only to forget halfway through what it is you were writing.  Your note merely trails off into an absent-minded sigh.  You can't focus and you can't keep your train of thought and there's something you were trying to say but you can no longer figure out what that was and the more you think about it the harder it is to remember.\n\nOnce this happens your mind shocks itself back to reality.  You've never lost your train of thought like that before, but you've seen the telltale sign a thousand times -- whether in sleeping or awake subjects, the quarantine screening process produces exactly that effect on the mind.  You've been scrubbed, and the cube has been scrubbed, and somebody's done it to you, and you don't know how or why.  You don't even know anymore what you don't know anymore. \n\n*page_break \nA few days later you decide to retire.  You open a little shop, just like how they did it in the old days, selling local stuff to local people.  Your idea is to start farming on some land just outside town and then bring the produce in for sale.  Neat and tidy, your little corner of the world will in its own way help solidify the social fabric of this place.  Maybe you can also take advantage of your new business to better exchange ideas with the locals.  After all, you find you have this urge to help shape the way people out here think.\n*set enlightened - 25\n*set egalitarian - 25\n*set path 0\n*set velvet 0\n*finish  \n\n*label shootkill\n\nBut you don't hit her -- she isn't there anymore.  She's gone for good.  There was no little girl, no balloon or grenade, no threat.  Since you really did discharge your weapon, however, and since the girl didn't exist you wind up blasting what was behind her: the central processor for the genetic sequencing equipment.  Your shot vaporized exactly what you needed to search.  By firing at the girl's image you fire directly at the most important part of the equipment.  \n\nThe team gasps.  Dallas, who only a moment earlier had told you the girl was real, looks shocked.  For once he doesn't have a smartass comment to share.\n\nQuickly you realize that the system wanted you to do that all along.  You've just been suckered by an unarmed self-destruct protocol.  Having no weapons of its own meant the equipment never triggered any screening hits, since there was nothing dangerous to detect, so it was a lot easier to hide.  It relied on you to bring the weaponry.  All it needed was a cowboy with a gun willing to shoot a kid.  By aiming at the girl you actually aimed directly at the most vulnerable part of the system.  Nicely done, jackass.\n*page_break  \n*gosub goodciv\n*gosub goodciv2\n*set diligent - 10\n*gosub badciv3\n*goto break4\n\n*label shootballoon\n\nThe blast cuts through the flimsy balloon like a knife through butter.  Then it continues, unabated, towards what's behind it.  \n\nWhich, of course, is the genetic sequencing equipment you're here to search.  It explodes in a violent flash.  Concussive waves of pressure beat down on your chest and knock you back onto your heels.\n\nYou realize that the system wanted you to do that all along.  You've just been suckered by an unarmed self-destruct protocol.  Having no weapons of its own meant the equipment never triggered any screening hits, since there was nothing dangerous to detect, so it was a lot easier to hide.  It relied on you to bring the weaponry.  All it needed was a cowboy with a gun.  Nicely done, jackass.  \n\n*page_break\nWith the equipment destroyed the little girl disappears, too.  You and your team are left standing there, arms empty, wondering what you could have done differently.  Then Heddes, who had been picking through the destruction, shouts in excitement:  \"I think I've found something!\"  He's holding some paper -- actual paper! -- in his hands.  \n\n\"If you'd fired slightly down and to the left,\" Heddes says, \"this never would have survived.\"  You realize that that would have meant pointing directly at the image of the girl.  Heddes continues:  \"There's not much in what survived, but it looks like these pages are part of a larger volume that was locked away in this thing.\"  You and the team crowd around your junior officer and examine what he's found.\n\n\"It's for Krissa,\" Dallas says.  \"It's some kind of instruction book.  Like a protocol to follow or something.  Son of a bitch . . . .\"  \n\nNot enough survives, it seems, to give you any useful information beyond the apparent purpose itself.  And with the equipment destroyed there's nothing to do with it, anyway.  But you're still stunned to see such a simple, technologically-backward tool sitting here for your deputy to use.  Somebody (most likely) must have prepared it and put it there.  Somebody must have known exactly how best to circumvent the system put in place to prevent things like this from ever happening.  On the one hand that's self-evident, since after all you're here precisely to try to crack an apparent conspiracy to exploit the interstellar quarantine screen.  But to see the simplicity of the methods -- using pieces of paper, for example -- just brings it home in an altogether more powerful fashion.  For a moment your mind is consumed with images of archaic underdogs battling apparently mighty foes, like David versus Goliath or a bomb-carrying dockworker devastating a starship.\n\nSomething written on paper can just completely bypass any high-tech quarantine screen you throw at it.  \n*page_break\n*set enlightened 70\n*set egalitarian 70\n*goto break4\n\n\n*label break4\n*if investigation \u003c 90\n\n  In the end it's a good news-bad news situation.  On the good news side, you managed to isolate the quarantine threat and remove it from society.  There does not appear to be any threat of further contamination.  That includes from other Jessica passengers -- once Augustine's modified DNA was identified, you were able to search the passenger scan records and determine that nobody else seemed to have been smuggling any such material.\n\n  On the other hand, of course, you failed to identify who was actually behind all of this.  Mackenzie didn't know.  Augustine is dead.  Nobody on the horse farm seemed to have been involved in any way.  Whoever was behind all this merely slipped back into whatever shadows they came from.  They may not even be on this planet anymore.  For all you know there's another Augustine out there sleeping coldly in his or her pod right now, waiting to arrive at a new world somewhere and infect it.  You've sent messages to the handful of starships out there you can locate, but whether anything comes of it you won't know for years or decades to come.  \n\n  Still, in the here and now, you've accomplished something incredible.  Congratulations!  There's only so much you and a handful of other people can be expected to accomplish.  Rome wasn't built in a day, as they used to say.  You throw yourselves a big old party and celebrate through the night.  Occasionally you pause to remember your missing colleague Mackenzie.  But it's her fault she's not there and you're not about to let her ruin anything else.  Hopefully one day you'll find out why she did what she did.  Another day, perhaps.\n  *page_break Time to finally move on\n  *goto finalend\n\n*else\n\n  Just when all looks lost, events take a staggering turn for the better.  Dallas emerges from the rubble.  He's smiling and shouting, and holding a small cube triumphantly in his hand.  \"I think I've found something,\" he yells with excitement.  \"I think it's intact!\"\n  \n  You all gather round for a closer look.  Heddes immediately recognizes what's in Dallas' hand.  \"It's an older model memory cube,\" he says.  \"Much less capacity than anything we would have brought out with us.  It can hold maybe a scene, or a single location, rather than an entire planet like they make today.\"  Then he corrects himself:  \"I mean, like they made when we left.\"\n  \n  Quickly you turn it on.  Immediately you know you've stumbled onto something big.  An image opens around you, enveloping the space you're in, and a series of people appear at desks at the edge of a room.  They're sitting there, silently, with looks on their faces that suggest they're waiting for you to speak.\n  \n  \"It's some kind of welcome reception,\" Bryson says.  While her description seems odd, she's not off the mark.  \n  *page_break\n  None of you recognize any of the people.  Dallas doublechecks his database and comes up empty.  \"Not surprising,\" says Heddes, \"since they're probably just agents.  The way this is set up, each of the people that we see probably stands in for somebody real, somebody who's still in the shadows somewhere.  Bryson's little welcome committee here must receive information from us and then distribute it via these agents to whomever's controlling them.  Or vice versa.\"\n  \n  Bryson asks the obvious question:  \"What do we do?\"\n  \n  It's an obvious question but the answer's a bit more complex.  You can't just crack the cube and find the hidden code any more than you can cut into somebody's brain to find out what they dreamt last night.  The way these cubes are created, there aren't any component parts you can peel back and remove.  Everything fuses into one finished product much the way yeast catalyzes flour and other ingredients into bread.  The result is an image database that you explore on its terms.  These days, people unlock things not by cracking their codes, but by figuring out how they think.  You don't want to engage until you know what you're doing.  That takes a lot of hard work and research.\n  *page_break That's what got you here\n  \"What do we do?  We figure it out,\" you say.  \"And quickly.  There's a timer.  Ideas, people.\"  As you say this you nod over to the hourglass that has appeared at one of the desks.  At the rate the sands are falling, you figure you have about 10 minutes, give or take.\n  *goto victory\n  \n*label victory\n\nSoon the brainstorming is going full speed.  Your team starts figuring out what this cube does.  It's important to nail this down because how you approach the cube -- what attitude you take and what statements you make -- will immediately signal whether you're supposed to be there or not.  Get it wrong and you risk closing the cube down for good.\n*temp solve\n*set solve 0\n*gosub victoryA\n*gosub victoryB\n*gosub victoryC\n\n*if solve > 1\n\n  All your hard work pays off in the next sixty seconds.  The cube turns out to be the ground rules for what you get to do with the contraband information.  All these people at their desks represent the various individuals and other entities who were out here when the Jessica arrived, who've benefited from this scheme.  So the cube is telling you what's allowed and what's already been claimed.  Think of it a bit like a prospectors' claim map in a gold field somewhere, showing you where you could dig and where somebody else was already working.  \n  \n  You therefore have before you a (surprisingly short) list of all the people supposedly involved.  Debussy, you note, does not appear to be among them.\n  \n  \"It's a goddamn ledger sheet,\" you say to yourself, as a wide grin expands across your face.\n  \n  Bryson asks you what you're talking about.\n  \n  \"A ledger sheet,\" you answer.  \"A list of names.  It's how they used to get the gangsters back in the old days.  What do you think was easier -- catching one of them shooting somebody, or finding where their accountants kept lists of their receipts and customers?\"  \n  *page_break\n  In almost no time you cross-check the information in the cube against the Niah network records and put your own ledger sheet together.  You're quickly able to shut things down.  These people are powerful, yes, but they're not omnipotent and your jurisdiction as quarantine officer makes you more powerful than you might otherwise be.  In a matter of a few days you've broken this conspiracy for good, as best you can tell.\n  \n  Excellent work, Capt. ${lastname}!\n  \n  Oddly enough, your triumph is rather anticlimactic.  You send a message to Earth, of course, but as for Niah there's nothing publicly you can do.  The quarantine screen is not public knowledge, after all, and your efforts have just been in the service of keeping it that way.  You can't very well say \"hey everyone I'm a hero for catching these people who were cheating a screening system you're not supposed to know about!\"  \n  \n  So after some private celebrations, you and your team melt back into society.  You'll sort of have to pretend none of this ever happened.  In a sense, that's a reward unto itself.  Time to finally move on.\n  *set sentimental 80\n  *set enlightened 80\n  *set egalitarian 80\n  *goto finalend\n  \n*else\n  \n  Tragically it all backfires.  At first the conversation goes well, but soon the figures in the image start getting up from their desks and walking away into the darkness behind them.  Eventually you're alone.  Then the lights go out and the whole thing is left pitch black.  It's gone.\n  \n  \"Dammit,\" you yell loudly, and as you do you punch the wall next to you.\n  \n  Nevertheless what's done is done.  You'll never know what was on that cube.  Hopefully it wasn't too important.  \"Maybe it was somebody's family photos,\" Dallas offers.\n  \n  On the good news side, you managed to isolate the quarantine threat and remove it from society.  There does not appear to be any threat of further contamination.  That includes from other Jessica passengers -- once Augustine's modified DNA was identified, you were able to search the passenger scan records and determine that nobody else seemed to have been smuggling any such material.\n\n  On the other hand, of course, you failed to identify who was actually behind all of this.  Mackenzie didn't know.  Augustine is dead.  Nobody on the horse farm seemed to have been involved in any way.  Whoever was behind all this merely slipped back into whatever shadows they came from.  They may not even be on this planet anymore.  For all you know there's another Augustine out there sleeping coldly in his or her pod right now, waiting to arrive at a new world somewhere and infect it.  You've sent messages to the handful of starships out there you can locate, but whether anything comes of it you won't know for years or decades to come.  \n\n  Still, in the here and now, you've accomplished something incredible.  Congratulations!  There's only so much you and a handful of other people can be expected to accomplish.  You eventually get over the bittersweet way this operation ended and throw yourselves a big old party.  Your thoughts occasionally turn to Mackenzie, but it's her fault she's not there and, in any event, you're not about to let her ruin anything else.  Hopefully one day you'll find out why she did what she did.  Another day, perhaps.\n  *page_break Time to finally move on\n  *goto finalend\n\n*label victoryA\n\n\"This isn't for downloading the encoded DNA,\" Heddes says, \"because cubes have these fixed image libraries and this one only has enough capacity for a single scene.  So it's got to be for something else.\"  Sound good to you?\n*choice\n  #Yes - the DNA upload was the machine we destroyed\n    \"Right,\" you respond, \"so what else would somebody uploading this information need to know?\"\n    *set solve 1\n    *return\n  \n  #No - this could be how you get the encoded DNA to the system\n    \"I don't know,\" you answer, \"I don't think we can assume that.  Let's keep an open mind about how the DNA was to be transmitted.\"\n    *return\n\n*label victoryB\n\n\"Is it an instruction manual?  To tell you what to do?\"  It's Bryson talking.  Earlier she called it a \"welcome reception.\"  Not quite the same thing, and one comes near the start of whatever process took place here and the other potentially at any stage.  Hearing those two concepts together, you look back at the image of the strangers sitting patiently at their desks and evaluate.  What's the more likely purpose?\n*choice\n  #\"There are too many people for it to be an instruction manual.  Too confusing a format.\"\n    \"More likely,\" you continue, \"it's a welcome reception of some sort.\"\n    *set solve + 1\n    *return\n  \n  #\"An instruction manual makes sense - perhaps each person handles a different topic.\"\n    This, you realize, puts you on the path of assuming the cube is the first thing you open when you get here.\n    *return\n    \n*label victoryC\n\nDallas makes the final point.  \"Nobody in the image is talking,\" he says.  \"They're waiting for the user to start the conversation.  If this isn't meant to be the first thing you open, then it's got to be at the end.\"\n\nHeddes and Bryson both catch on to what Dallas is saying.  \"It's when you tell them mission accomplished.\"  \n*choice\n  #\"Maybe they're waiting for you to ask them what to do?\"\n    You remind them of the other option, that perhaps whatever conversation takes place in the cube is meant to happen at the outset.  Not an instruction manual, necessarily, but something more akin to an overview.  You take a deep breath, gather your thoughts, and engage the cube's image.\n    \n    \"We're ready to proceed,\" you say.\n    *return\n  \n  #\"Agreed.  They're waiting to debrief you.\"\n    You're all becoming a little more confident about your choice.  You take a deep breath, nod to each team member as if to say \"wish me well,\" and begin talking to the cube's images.\n    \n    \"It's done,\" you say.\n    *set solve + 1\n    *return\n\n*label finalend\n*if ambitious > 50\n\n  Six months later and you're working for Debussy.  It turns out he'd always assumed you would join his enterprise once your official duties came to an end.  You've got a career ahead of you helping to pick the best people to fill his company's various tactical teams.  \"You've seen inside the mind of every newcomer on this planet,\" Debussy had said, \"and I always prefer to have the inside information if I can get it.\"\n\n  The man is a legend in his own mind.  Whether he's anywhere near as powerful as he appears to be, however, is anyone's guess.  You've never really been able to figure out exactly who does or owns what in this place.  But you're slowly getting more comfortable.  With your fortune tied (for the moment) to Debussy's, you have no choice but to hope the theatrical man succeeds. \n  *set path 4\n  *goto civ\n\n*else\n\n  Six months later your life is much, much quieter.  You've opened a little shop, just like how they did it in the old days
