ed skeleton playing cards you and Dallas had tried to destroy during quarantine screening on the Jessica.  You turn the card over a few times and see the familiar skeletal picture and the odd markings.\n\n  \"So there were more sets!\"  You exclaim this out loud, to nobody in particular.\n\n  She looks surprised.  \"There were what?\"\n\n  \"Oh nothing,\" you say, \"just talking out loud to myself.  Thanks for this.\"  And as you talk you gently fold the card into your sleeve pocket and walk away.  You make a note to check up on the passenger list and a few other items of data, but somehow you get the sense you won't find anything.  \n  *return\n\n*elseif exotic = 2\n  Printed on it, in bold, black letters, are the words \"Edwin Luther, Lifestyle Coach.\"  Below that is his contact information along with his full professional and educational qualifications.  Finally, the readout boasts that Mr. Luther \"comes recommended from the highest levels of terran society.\"  You and Dallas screened this man.  You remember Dallas having some issues with Mr. Luther's somewhat risque career, in addition to his somewhat embellished credentials.  \n\n  Perhaps, you smile to yourself, you should give Dallas his card.  But more seriously you're disappointed to see that Mr. Luther isn't as modest as he should be.  You gently fold the card into your sleeve pocket and think about whether to look into this.  You can, of course, but something tells you it won't lead to anything.\n  *return\n\n*else\n  On it is a short biography of a man named Fabrice Detongo.  Of course you know that name -- his daughter Claire was the woman Dallas talked to you about during the quarantine screen process on the Jessica.  Fabrice was a Verdunite.  He was one of the instigators of a radical movement to destabilize the interstellar finance system.  For a few hours he'd been one of the most powerful people within eyesight of Earth.  Claire had been allowed to come out here to Niah, but that had been under the assumption that she was too far removed from her father's conduct to represent much of any threat.  If criminal guilt was made hereditary, after all, then pretty much everyone you know would be prohibited from doing pretty much anything.\n\n  So it's an unpleasant surprise to see Mr. Detongo's accomplishments so neatly summarized on a handy card.  You're unable to get much information about it from the woman who gave it to you, because she really doesn't seem to know anything.  You also make a note to check the data and the history of this card -- perhaps it's come up in other circumstances -- but somehow you get the sense you won't find anything.  \n  *return", "cleancowv11": "*comment Choice of Worlds Vignette 11\n*comment Copyright 2014 Andrew J. Schaefer\n*comment ending\n\n*if path = 0\n  Epilogue (or, a look back on your life)\n  *goto epilogue\n\n*elseif goal = 0\n  Epilogue (or, a look back on your life)\n  *goto epilogue\n\n*else\n  \"ETA -0.6\"\n\n  The gentle green readout tells you that Hadley's World is sixth-tenths of a day away.  Similar readouts can be seen throughout the room.  Which is helpful since you're in a bright white bulkhead containing several dozen coldsleep pods.  Inside every one of them is a miserable human being who was blissfully asleep ten minutes ago.\n\n  Ugh, you think to yourself as the full effects of four years of coldsleep start to hit you, not this again.  \n  *goto hadley\n\n*label hadley\nSoon you're up and assembled with your shipmates.  (Nobody had to get up early this time, since there's no quarantine screen between outer system planets.  That will change if direct flights from Earth ever start up.)  An officer is briefing you on the updates received while in transit.  There's information both about Hadley's World the planet, and about the Persephone specifically -- the ship whose distress call brought you out here in the first place.\n*comment this is a falling world\n*if goal = 1\n\n  The news isn't good.  \"We knew there was a serious problem,\" the officer is saying, \"as soon as we were within Hadley's World's gravity well.\"  He brings up a view of the planet as seen from space and begins pointing to a specific area of the image.  \"First we located the Persephone here, slightly beyond its predicted orbital path but still within an easy reach of our entry point.  But no sooner had we plotted a course than the Persephone appeared here, here, and here as well.\"  He's pointing at different spots scattered across a much wider field of space.  \"As you might have guessed, these are all the same ship.  It's no longer in one piece.\"\n\n  There's a gasp from the room.\n  *page_break\n  \"It happened pretty recently,\" the officer explains.  \"But it had obviously been a long time coming.  Apparently the distress call we got was near the start of something that just snowballed after we left.  The past couple of years things have gone totally to hell downstairs.  It looks like two factions tried to escape Hadley's World on the same starship, but they fought over who got to use it and wound up destroying the ship instead.\"\n\n  You ask the obvious question:  \"Does that mean we're in danger?\"\n\n  \"We'll have to assume so, ${lastname}, until we conclude otherwise.  We're keeping the Artemis in very high orbit.  We'll see anyone coming long before they can get to us.  The Persephone's debris field is just way too cluttered for us to get any closer to any parts of that ship -- we can't afford so much as a scratch right now.  Who knows what the people downstairs are capable of if they've already blown a starship to pieces.\"\n\n  You think back to Debussy's boast before you left that it was \"surprisingly easy\" to reverse this type of downfall.  I wonder how easy he thinks it is now, you say to yourself.  This is not some sci-fi adventure where you just drop a couple bombs on the place and magically make the bad guys disappear.  The Artemis is not a warship.  Really, there's no such thing anymore.\n  *page_break\n  True to form, Debussy answers your thoughts.  After all, probably half the room was thinking the same thing.  \"I humbly acknowledge that this will not be easy,\" he says.  \"What seems to have happened is far worse than anything intimated by the messages we received before our departure.  To destroy a starship!  Oh that they did not tear at the heart of civilization itself!  Those poor souls below have by all accounts come ensnared in a vicious circle of attack and retribution.  Our best hope is that the arrival of unblemished society will help them to see the light.  We can offer a reprieve from their conflict through physical and societal separation.  We can offer law and order unhindered by any attachment to whatever tribal animosities are now driving them.  We must inject our values into their reality.\"\n\n  Until they turn on us, too, you think.  \n\n  Debussy continues:  \"As of our last transmission from Niah we are the only ship coming.  There are no other scheduled voyages.  That may change once we report back but, of course, even an immediate affirmative decision by Niah authorities will still mean years without any further arrivals.  No-one is coming to help us and we cannot leave any time soon.\"\n  *goto hadley2\n\n  \n*elseif goal = 2\n  *comment this is a paranoid closed world\n  The news is mixed.  \"We're going to need some diplomacy,\" the officer is saying, \"because right now we're getting the cold shoulder from downstairs.  The good news is the Persephone appears unscathed.  Status nominal.  It was moved to a higher orbit apparently to keep it away from any low-level traffic.\"\n\n  \"The real story,\" a second officer adds, \"is why it was moved.  At first we thought there was something wrong with the ship and they just wanted to get it someplace where it couldn't damage anything else if there was an incident.  That was actually the cover story the Hadley's World authorities used when they first changed its orbit.  It sure left us confused while we were reviewing their transmissions.  But what we quickly figured out was it was a power play.  Their society has begun closing in on itself.  It's much more authoritarian now than it used to be.  Somebody's even floated changing the planet's name.  And the people in charge have been methodically locking down any important asset that can either help or hurt them.\"\n\n  \"Obviously,\" the first officer says, \"whoever controls the starships controls access in and out.  It's an extremely powerful lever to have.  So they moved the Persephone beyond everyone else's reach.\"\n\n  You glance quickly over to Debussy, who is sitting off to one side watching intently.  Does he differ from them in anything except degree?  Aren't these shipowners all cut from the same cloth?  \n  *page_break\n  As if anticipating your thought, Debussy himself says a few words.  \"As with anything, it is less about the possession of an item than about the sentiment one attaches to it.  A hammer can build or destroy.  The man wielding that hammer can be a lowly carpenter or a ravaging vandal.  Starships, in the right hands, are extraordinary tools of discovery and propserity.  They are the steamship or the jetplane of our age.  We would not condemn the aeroplane merely because malevolent individuals have chosen to crash theirs into ships and soldiers.  We condemn the individuals committing those acts.  Our task now is to make every effort to ensure that the sentiments here on Hadley's World remain constructive and not destructive.\" \n\n  Somebody asks from the back of the room:  \"How are we actually going to do that?\"\n\n  Debussy's answer is at once encouraging and evasive.  Drawing heavily on his stock theme of the uplifting power of civilization, Debussy sort of more or less gets around to suggesting that the Artemis and its crew can appear on the scene and convince the people down on Hadley's World to stop screwing around.  The way a single police officer with a gun can stop a fistfight, even one involving a large number of people.  \"I do not suggest it will be easy,\" he says, \"but under the circumstances it is our only option.  We have traveled three light years to get here and there are no relief ships following close behind.  That may change once we report back but, of course, even an immediate affirmative decision by Niah authorities will still mean years without any further arrivals.  No-one is coming to help us and we cannot leave any time soon.\"\n  *goto hadley2  \n  \n  \n*else\n  *comment this is a functional world\n  The news is good.  The planet is doing fine -- there's nothing wrong with Hadley's World and the people down there seem to be doing pretty much as expected.  Yet another thriving Earthlike world.\n\n  The Persephone itself is exactly where it should be.  \"The distress call turned out to be fixable,\" the officer is saying.  \"There was nothing technically wrong with the ship.  There was just a financial dispute between the owner and some of his backers.  Somebody went to court and got an injunction and then somebody else declared bankruptcy and before you know it the ship was impounded.  Everybody kept demanding that somebody else pay for the Persephone's maintenance while nobody actually did any of it themselves.  That's about when the distress calls went out.  Then one of the creditors took over and got things back on schedule . . . the ship actually did a short run to one of the moons while we were in transit . . . and now it's back here again.\"\n\n  \"And apparently,\" a second officer adds, \"straight back into financial trouble again.  They're still fighting in court and there's still some huge debts.  That last trip didn't fix things for the company.  Wouldn't you know it, they may need some new investors with technical expertise.  So we might have shown up right at the perfect time.\"\n  *page_break\n  You glance over at Debussy, who's sitting off to one side of the room, and catch an unmistakeable glean in his eye.  Even though he surely already knew all this if the general crew is being briefed, he's still loving every minute of this presentation.  You start to wonder whether the man just heads back to his quarters once in a while to lie down on a bed of money.\n\n  Then he says something.  \"My friends, it seems the fates have cast their eyes upon us favorably.  I have already made contact with the custodians of that ship, and now that we are here and in position to have conversations in real time, I believe we may reach an amicable and mutually beneficial understanding quite quickly.  Nothing is yet guaranteed, of course, but for the moment our prospects appear encouraging.\"\n\n  Somebody else in the room asks what exactly that means -- what precisely are you going to be doing?  That leads to a short discussion of what Debussy has in mind for everyone, finishing up with a little pep talk from the wealthy shipowner and merchant.  \"We are not aware of any other ships incoming.  For the forseeable future we are in the proverbial driver's seat.\"\n  *goto hadley2\n\n*label hadley2\n*page_break\nAfter about a week things become much clearer.  \"Negotiations with my contacts have reached a suitable outcome,\" Debussy says to all of you, \"and the time has come to act.\"    \n*gosub hadley2setting\n\nThe plan of action is drawn up.  Everybody gets their choice of assignments.  \"I am never eager to dictate tasks,\" Debussy announces, \"because in my experience volunteers are more motivated and dedicated to their objective.  So you will each have the opportunity to choose one of three tasks for yourself.  On the assumption that we have staffed this mission correctly, the choices you make should generate the optimum arrangement for us.\"  In other words, Debussy predicts you won't all volunteer to do the same thing.  \n*page_break\nYour personalized options appear before you.  They're intriguing, to say the least.  \"${lastname} ${firstname},\" says the readout.  \"Your qualifications and expertise render you particularly well suited for any of the following tasks:\n*gosub firstchoice\n*gosub secondchoice\n*gosub thirdchoice\n\nThree options taking you down three very different paths.  You take your allotted time to think them over before coming to a decision.  Whichever you pick it will make for some significant changes to your life.\n*page_break Time to make a decision\n*choice\n  #Option 1 - I want to settle down here\n\n    Well, you think to yourself, hopefully this will work out for all interested parties.  In many respects you've chosen the least predictable and most hazardous path.  It's one with a strong purpose, however, and adds even more significance to your life.\n    *set sentimental + 15\n    *set egalitarian + 15\n    *set enlightened + 15\n    *goto firstending\n\n  #Option 2 - I want to stay on the Artemis\n\n    You decide, quite sensibly, to stick with the relative security of your starship.  There's too much uncertainty in the other choices.  \"Dance with the date that brung you,\" you say out loud to yourself.  The system misunderstands you and responds:  \"The option you have chosen does not include dancing.\"  You smile and get to work.\n    *set sentimental - 10\n    *set enlightened + 10\n    *goto secondending\n\n  #Option 3 - I want the excitement of the mission; I don't care where that takes me\n\n    Full circle, you think.  Back to what brought you to Niah in the first place.  You'll be in the field, taking charge, engaged in action against friend and foe alike.  If you think about it for a second you're almost like a Viking or a pirate -- shipping out on the best vessel available to swoop down on unsuspecting people, then having your way with them.  There's really no going back now.  You're not going to be settling down on a farm or a veranda anytime soon.\n    *set sentimental - 10\n    *set egalitarian - 10\n    *set enlightened - 10\n    *goto thirdending\n\n*label hadley2setting\n*if goal = 3\n\n  Debussy explains that he's spent the past few days deep in negotiations with the people currently responsible for the Persephone.  Those people control the starship but don't seem to know how to make profitable use of it.  Debussy knows exactly what he wants to do with the ship but, until now, doesn't control it.  So he's reached an agreement to effectively lease the Persephone from its owners for as long as he can make good use of it.  (Or until they revoke the lease.)  There will be a face-to-face meeting with the various interested parties to make everything official.\n  *return\n\n*else\n  \n  Debussy explains that he has identified numerous \"persons of integrity\" among the various groups on Hadley's World, and has invited them to a summit.  The hope is that the Artemis will be seen as a civilizational lifeboat.  Anyone who wants to continue enjoying a high standard of living will recognize the Artemis as their best chance to keep it and will therefore cooperate.  The holdouts will wither and die.  Or be defeated.\n  *return\n\n*label firstchoice\n*comment this is to stay downstairs in a domestic role\n*if love_interest > 0\n\n  1. To represent humanity's hopeful side through the positive lifestyle of domestic tranquility.  You are here with a partner and your decision to begin a family here would send a powerful message to this world about our intentions and our values.  If either of you choose this option you will both be selected for it.\n  *return \n*else\n\n  1. To bolster our standing among the local society by agreeing to live among the most promising elements of the Hadley's World population.  Your presence will provide invaluable local insight and intelligence.  \n  *return\n\n*label secondchoice\n*comment this is staying aboard ship in an intelligence role\n*if path = 3\n\n  2. To generate confidential dossiers on all personnel critical to our Hadley's World/Persephone mission.  Drawing on your background in Niah intelligence specifically, you will monitor and evaluate targeted individuals from station aboard the Artemis.\n  *return\n*else\n\n  2. To replicate your duties aboard the Jessica as closely as possible with respect to individuals here at Hadley's World.  This will entail monitoring and evaluating targeted individuals from station aboard the Artemis.\n  *return\n\n*label thirdchoice\n*comment this is being an agent either here or anywhere\n*if investigation > 65\n\n  3. To have a leadership role on a team responsible for investigating potential threats to the mission and devising solutions to them.  This draws on your work at Niah and will mean that your base of operations cannot be guaranteed; you may find yourself staying in the Hadley's World system, moving on to other worlds, or even returning to Niah.\n  *return\n*else\n\n  3. To be part of a team responsible for responding to potential threats to the mission.  This draws on your work at Niah and will mean that your base of operations cannot be guaranteed; you may find yourself staying in the Hadley's World system, moving on to other worlds, or even returning to Niah.\n  *return\n\n*label epilogue\n\nSchoolchildren walk in pairs along a garden path.  \n*if egalitarian \u003c 40\n  High walls protect this oasis of green from the gritty streets outside.  \n  *goto end1\n\n*elseif enlightened \u003c 50\n  It's one of the few green spaces left in the center of the city.  \n  *goto end1\n\n*else\n  The sun is out for the first time in a month.  The garden is finally coming alive again.  \n  *goto end1\n\n*label end1\nAs the children head towards another day of school, only a few of Niah's youngest generation notice the weathered gravestone sitting amongst the jacarandas to their right.  \n\nIt is a simple marker with a simple message across its face:  \"Here lies ${firstname} ${lastname}.\"  \n*gosub grave\n*gosub grave1\n*gosub grave2\n*goto end2\n\n*label grave\n*if ruth = 2\n  On your deathbed you'd finally come clean about what you did to \"Ruth.\"  You'd tried to make amends during your life but doing so was difficult.  She was without family or friends out here, after all, so once she disappeared nobody really missed her.  But just thinking about that situation -- somebody alone away from home, unloved and unmissed -- put you into an even greater depression.  You began to be tormented with the notion that you'd done something truly, unspeakably horrible to a person who had been entirely innocent of any guilt.  You genuinely agonized about it. \n\n  You didn't tell the truth about why you'd done it.  Instead you made up a cover story involving something to do with the Jessica.  So even on your deathbed you hadn't genuinely come entirely clean.  But you'd done the best you could under the circumstances.  \n  *return\n\n*elseif sentimental > 50\n  Then underneath is a longer statement:  \"Born on Earth, birthplace to us all; may these remains nurture the soil of a new Earth, bringing life from death to a new world.\"\n  *return\n\n*else\n  Of course, it's one of dozens of markers scattered amongst the trees.  People seem to like spending their eternity within something that looks like an urban forest.  There's a serenity, and a permanence, to the scene that they often found hard to experience during life.  \n  *return\n\n*label grave1\n*if love_interest > 0\n\n  ${partner} is not buried with you.  No sooner did you die than ${partner} received one of those offers you can't refuse, in this case to head up a new design firm working on cutting edge buildings across the Hadley's World system.  \n  *return\n\n*elseif corruptible > 50\n  In your case it's almost ironic that you're buried here because this was the prison graveyard.  Funny that they should have such things out here but it worked out that way.  Your bad habits caught up with you, as they did for a whole host of people.  Over time the space set aside for their burials turned into the park it is today.\n  *return\n\n*else\n  Hardly anyone came to your funeral.  It's just too difficult for people to remain physically close enough to one another to do things like that.  Nowadays the gravestone itself is covered in a thin veneer of grime.  The weeds cluttering its base leave no doubt that the grave is often neglected.  \n  *return\n\n*label grave2\n*if ambitious > 60\n\n  You made out pretty well in life, though.  Profitable ventures gave you a high standard of living and a visible presence throughout the system.  When you died you left behind some land on Niah, two mining shares on the moon Beta Prime and an interest in one of Debussy's shipping ventures.  In fact your final shipping investment was still two years' out on its return voyage to Niah when you passed.  So your estate was still in flux when your own life ended.\n  *return\n\n*elseif corruptible \u003c 40\n\n  One final tidbit about you:  Despite whatever else took place, you always strove to make a difference.  You were pretty successful, all things being equal, though as society grew ever larger and more complex you inevitably became a smaller piece in the puzzle.\n  *return\n\n*else\n\n  One final tidbit about you:  In your later years you desperately wanted to tell people about the quarantine screen, but could never find a way.  It became harder than you first realized to tell people about something they, by definition, not only shouldn't know about but don't necessarily have the vocabulary to understand.  So instead you let things run their course.\n  *return\n\n*label end2\n*comment finish it up with perhaps a random entry and something else about civilizations, maybe an accounting of worlds, and a choice? \n*page_break\nAs the children approach the garden's gate, one of the kids glances back over her shoulder.  Like all Niah children she looks very different from children back on Earth.  Her body is short and stocky, thanks to the planet's higher gravity.  More jarring, however, is her skin.  Niah's sunlight, soil and air are all different than on Earth, and over the centuries those differences have actually altered the natives' appearances.  The girl looking back into the garden is still completely human, true, but her skin is grayish-violet.\n*if newz = 1\n \n  The girl is a seventh-generation Niahan.  Her name is Krissa Mackenzie.\n  *goto_scene ending\n\n*elseif newz = 2\n\n  Just then the teacher calls back to the straggling girl.  The rest of the group has already passed through to the street beyond.  The girl, still in the garden, hurries to catch up but, before she can reach them, something terrible happens.  A series of bright flashes a block or two away stop everyone in their tracks.  A powerful shock wave follows almost immediately.  The schoolchildren and their teacher are pulverized by countless shards of debris hurled their way at immense speed, then incinerated by the fire following closely behind.  Separatists have struck again.  \n  *goto_scene ending\n\n*else\n\n  \"I like it here,\" she says, to no one in particular.  \"I hope I'm buried here one day.\"  She thinks for a second about that idea before nodding her head in agreement with herself.  \"After all this is the best planet in the system and the best system in this sector.\"\n  *goto_scene ending\n\n*label firstending\n*if goal = 1\n\n  At the summit meeting Debussy presents you, along with a few others, as the seed families for a new effort to stabilize Hadley's World society.  You're one small part of a multi-pronged effort but everyone's role is crucial.  The hope is that your presence downstairs will act much the way families used to stabilize wild frontier regions back on Earth.  It will not be easy, however.\n  *goto finalending\n\n*elseif goal = 2\n\n  Quickly Debussy aligns you and the other pioneers with the sympathetic factions down on Hadley's World.  A very public show will be made of your arrival on the surface.  The idea being that you and your side are the ones who can offer continued enlightened access to civilization.  There is some concern, of course, that you are simply being played for pawns in a continuing game of chess going on among the contestants downstairs.\n\n  \"That is a risk we must take,\" Debussy had said.  Easy for him, you thought.  Yet you are nevertheless encouraged not only by your chosen role but by the reaction you've so far received from the allied locals.  This will be interesting.\n  *goto finalending\n\n*else\n\n  Godspeed, Debussy had said.  You are my flag planted on this world's soil.  \n\n  Adjusting to this new planet turns out to be much more difficult than you expected, for one very simple reason -- it's a different planet.  It doesn't have the same sun, same gravity, or same orbit as either Niah or Earth.  Your body had only just adjusted to Niah's characteristics after a lifetime on Earth.  Now Niah's orange sun is gone, replaced by something more blue-white.  The gravity is less and the days, and years, are shorter.  It makes you physically ill.  The human body is not designed for this.  But you'll cope with it.  Everyone else out here has.\n\n  What happens next is best left for another story.  We've come to the end of this chapter, and your life is still ahead of you.  You've been given a rare and historically exceptional opportunity to live on different worlds amidst different civilizations, spread out over multiple lifetimes.  Make the most of it.\n  *goto_scene ending\n\n*label secondending\n\nThe bluish-white sun rises and sets a hundred times over Hadley's World before your first objective is completed.  You stay removed from events on the ground, monitoring situations from on high while only occasionally coming into direct contact with individuals of interest brought onto the ship.  \n*if goal = 1\n  Those individuals, of course, are as often as not hostile to your group.  Things remain tense.  This is not something you can work out in a mere matter of days or weeks.  \n  *goto finalending\n\n*elseif goal = 2\n  Those individuals, of course, are not always on your side.  Mistrust and intrigue continue to rule the day.  This world remains a tough nut to crack.\n  *goto finalending  \n\n*else\n  But eventually everything settles down.  Debussy indeed gained control of the Persephone and quickly set about pulling together a full complement of crew for its first voyage under new management.  Your skills proved valuable in that regard.  \"I like to know,\" Debussy had said, \"what my people are thinking.\"\n\n  So now here you are, two earthlike worlds removed from Earth, sitting again at a crossroads in your life.  You have friends and contacts back on Niah and you have already built up yet another network here at Hadley's World (even if you've barely seen the surface).  What happens next is best left for another story.  We've come to the end of this chapter, and your life is still ahead of you.  You've been given a rare and historically exceptional opportunity to live on different worlds amidst different civilizations, spread out over multiple lifetimes.  Make the most of it.\n  *goto_scene ending\n\n*label thirdending\n\nSure enough you're off the Artemis within days to pursue a lead on the surface.  But it's not so simple to arrive at a new world and fit right in.  It had taken you weeks to get used to living on Niah, with its orange sun and heavy gravity and long days.  Now after a coldsleep voyage you're downstairs on Hadley's World, where the sun is bluish-white, the gravity is weaker, and the days are shorter.  It wreaks havoc on your body and mind.  It's like jetlag, vertigo and seasickness all rolled into one.\n\n*if goal = 1\n  Nevertheless you quickly get to work.  You're not here on a social call.  You're trying to rescue a failing civilization.  It's going to take time, which fortunately you have in abundance.\n  *goto finalending\n\n*elseif goal = 2\n  At first the locals find this amusing -- a shipload of self-described saviors appearing uninvited from Niah to bring the good life to the savages of Hadley's World.  Their take changes somewhat once your efforts begin to have an effect.  It does not go quickly, however.\n  *goto finalending\n\n*else\n  But eventually everything settles down.  Debussy indeed gained control of the Persephone and quickly set about pulling together a full complement of crew for its first voyage under new management.  Your skills proved valuable in that regard.  \"I like to know,\" Debussy had said, \"what my people are thinking.\"\n\n  So now here you are, two earthlike worlds removed from Earth, sitting again at a crossroads in your life.  You have friends and contacts back on Niah and you have already built up yet another network here at Hadley's World (even if you've barely seen the surface).  What happens next is best left for another story.  We've come to the end of this chapter, and your life is still ahead of you.  You've been given a rare and historically exceptional opportunity to live on different worlds amidst different civilizations, spread out over multiple lifetimes.  Make the most of it.\n  *goto_scene ending\n\n*label finalending\n*comment have a blurb about planetlag, you're on the surface in each instance, and have a civ trait-based end segment then finish - the end line from each segment jumping to this was that it was going to take time\n\nOnce again you find yourself adapting to a new world under challenging circumstances.  But you're in the thick of it, making a difference, and that's what matters.\n*page_break\n*if goal = 1\n  This next chapter of your life is best left for another story.  We've come to the end here.  Your decisions, however, have helped set certain things in motion.  Hadley's World was threatened with all-out conflict.  Based on your choices, it's likely that civilization out here will develop in the following ways:\n  *gosub adieu1\n  *gosub adieu2\n  *gosub adieu3\n\n  Thank you for playing.  It's a complex world out there -- give it another try and see what you can find!\n  *goto_scene ending\n\n*else\n  This next chapter of your life is best left for another story.  We've come to the end here.  Your decisions, however, have helped set certain things in motion.  Hadley's World was becoming insular and dictatorial.  Based on your choices, it's likely that civilization out here will develop in the following ways:  \n  *gosub adieu4\n  *gosub adieu5\n  *gosub adieu6\n\n  Thank you for playing.  It's a complex world out there -- give it another try and see what you can find!\n  *goto_scene ending\n\n*label adieu1\n*comment these first three are the falling world\n*if sentimental \u003c 40\n\n  The Artemis mission merely increased the resentment among many Hadley's World inhabitants towards Earth.  And towards outsiders.  And really towards any society that was better functioning than their own.  The next time anyone tries what you did, they're going to receive an even frostier reception.  \n  *return\n\n*elseif sentimental > 60\n\n  You helped strike a chord among the people on Hadley's World.  Folks definitely appreciated seeing outsiders arrive and make an effort to help them, even if it was for their own benefit too.  It was good to see a reminder, however perfunctory, of the larger heritage everyone still shares.  \n  *return\n\n*else\n\n  Well, right now you can't tell whether the people out here still want to maintain their links to Earth or not.\n  *return\n\n*label adieu2\n*if egalitarian > 60\n  Politically, there's a decent chance that Hadley's World is going to check its descent towards violent dysfunction.  The events that happened during your flight out here are probably not going to happen again.  \n  *return\n\n*elseif egalitarian \u003c 40\n  Politically, Hadley's World looks like it may remain a terribly segregated and contested place for awhile.  People have begun reading about other chaotic times throughout history, like the one year there were four Roman emperors.  Of course on a broken world in a screened quadrant of space not everyone has access to the right information.  Which, also, is kind of the point -- it looks like they might be coming up with the same ideas for quarantine screens that you implemented on your way out from Earth.\n  *return\n\n*else\n  Internally, this society will continue to face problems.  Those problems are not insurmountable, however.  \n  *return\n\n*label adieu3\n*if enlightened > 60\n  Hadley's World will most likely be okay.  Things may be tough for a while, but the system looks like it will develop peacefully.  In fact it looks like the name \"Debussy\" is going to go down in local history as a word meaning great man and potential savior.  You can't help but smile (and groan).\n  *return\n\n*elseif enlightened \u003c 40\n  You're thinking quite seriously about getting on the next flight out of this place, assuming there ever is a next flight.  And the name \"Debussy\" is likely to go down in local history as a synonym for \"useless meddler.\"\n  *return\n\n*else\n  Overall the future is murky.  On an unrelated note, you still send messages back and forth with your friends on Niah.  And one time you even received (via Niah relay) a message from Earth.  It came out of the blue.\n\n  You had a five year old niece when you left Earth.  She was just a little kid and, because of your work, you'd never really gotten to know her.  But a few years after you left this child sent you a message, calculated to reach you at Niah in precisely the right year.  \"Happy Birthday ${firstname},\" the girl heered.  \"When you see this we'll be the same age!\"\n\n  You saved it of course.  Then you forwarded it on to everyone you knew until you used up your allotted bandwidth.  \"This is what binds us together,\" you'd added in your cover note.  \n  *return\n\n*label adieu4\n*comment these last three are the closed world\n*if sentimental \u003c 40\n\n  Part of the reason Hadley's World ran into problems was because so many people out here felt no loyalty to the larger community.  That doesn't look likely to change.  The fact that Earth, or even Niah, are out there and watching means very little.  \n  *return\n\n*elseif sentimental > 60\n\n  Whatever caused society out here to forget about its roots seems to have gone away.  It looks like there will be a renewed interest in Hadley's World's place in the larger civilization.  \n  *return\n\n*else\n\n  Well, you can't really say what will happen to sentimentality.  Some seem to care about maintaining close connections to the larger fabric of worlds; others clearly don't.  It's the mentality that helped get Hadley's World into this mess in the first place.  It's deeply ingrained, and persistent, and its future is uncertain.  \n  *return\n\n*label adieu5\n*if egalitarian > 60\n  The government seems to be taking a dramatic turn for the better.  Future generations out here can probably look forward to at least an opportunity of prosperity.  \n  *return\n\n*elseif egalitarian \u003c 40\n  What passes for the government out here is probably not going to change.  You arrived at Hadley's World during a time of ruthless contraction and consolidation, and there's no evidence those in power (and those who hope to replace them) will do things any differently any time soon.  So that's depressing.  \n  *return\n\n*else\n  Internally, this society will continue to face problems.  Those problems are not insurmountable, however.  \n  *return\n\n*label adieu6\n*if enlightened > 60\n  Hadley's World will most likely be okay.  Things may be tough for a while, but the system looks like it will develop peacefully.  In fact it looks like the name \"Debussy\" is going to go down in local history as a word meaning great man and potential savior.  You can't help but smile (and groan).\n  *return\n\n*elseif enlightened \u003c 40\n  You're thinking quite seriously about getting on the next flight out of this place, assuming there ever is a next flight.  And the name \"Debussy\" is likely to go down in local history as a synonym for \"useless meddler.\"\n  *return\n\n*else\n\n  Overall it's a mixed bag.  Things will continue to evolve long after you're gone.  \n  \n  As an aside, somebody gave you a teddy bear the other day.  It was small, brown and very cute.  But what was interesting was what this person said about it.  Her family had been out here for several generations, so between the distance and the time-lag her connections to Earth were fragile at best, putting her in a very insular world.  \"Isn't this neat,\" she asked, as she showed you an example of a toy that children have been loving for centuries.  \"My friend invented them!\"\n  \n  You've still got some work to do.  Unless, of course, you like the idea of even the simplest cultural markers starting over from scratch.\n  *return", "cleancowv2": "*comment Choice of Worlds Vignette 2.1\n*comment Copyright 2013 Andrew J. Schaefer\n*comment This is introducing Julian Augustine and establishing the path the search takes\n\nThe meeting with Mackenzie and the juniors carries on a bit but wraps up before too long.  You're a small group clustered together on a starship.  Everybody knows now to keep the smalltalk to a relative minimum.    \n\n*page_break Time to get to work\n\nFor the first time in 40 years you're going to have a 'routine' day.\n\nAmong the ship's passengers, you expect most of the hard work to come from just a small group of travelers.  Many of the Jessica's passengers are ordinary people looking for a new life in a new world, just as folk have been doing for thousands of years.  They were given the once-over when their transit papers came through -- nobody's interested in seeding these new planets with riffraff.   \n\n*page_break But back to the issue at hand\n\nThe tougher cases are the handful of exotics - people who aren't immigrants traveling by starship to their new home so much as moving their particular ideologies from Earth to a new forum.  You want to make sure they don't open a new front in the war of thought.  \n\nYou might wonder why this wasn't handled back on Earth.  Why not simply screen everyone before boarding, like they do in airports?  The answer, of course, is that the screening isn't public knowledge.  Imagine the chaos that would ensue if people's thoughts and valuables were being destroyed while their home cultures could watch.  Imagine how people might try to play favorites.  Imagine the lengths people would go to try to cheat.\n\nSo instead the decision was made to act like nothing was going on.  Let people get on board their starship without a care in the world.  Let them put whatever they wanted into their (admittedly very small) allotted baggage space.  And then, when they're frozen in sleep light years and decades from home and there's nothing anybody can do about it, go through all that stuff and throw out whatever you don't want.  It's not like much is actually destroyed.  \n\n*comment This is just a small fork in the road to keep the text varied.  \n*if diligent > 60\n  You get right to work.\n  *goto screen1\n*elseif diligent \u003c 40\n  You also want to get this over with ASAP.  However dedicated to your job you might be, there's something slightly unnerving about scrubbing people's minds and possessions of information that society has decided they can't have.  It makes you unsettled.\n  *goto screen1\n*else \n  You tell the team a few final jokes before getting everybody up to speed on the day's routine and then starting things up.\n  *goto screen1\n\n*label screen1\n\nSo.  More than fourteen hundred people, 15 days, five agents.  You're calling the shots.  How do you want to proceed?\n*choice\n  #Go down the list alphabetically.\n\n    You decide to take a straightforward approach.  \n    *goto screenalpha\n\n  #If most of the passengers will be easy, then get them out of the way first and devote the remaining time to the exotics.\n\n    You adopt a strategy centered on leaving as much time as possible for you and your team to assess the passengers considered most likely to be troublesome.\n    *goto screentime\n\n  #Have the three juniors do the easy cases while Mackenzie and I handle the tougher ones.\n    A good division of labor.  This means you and your deputy will focus on the exotics while the juniors will be off doing their own thing.\n    *goto screendivision\n\n*label screenalpha\n\nThe work comes quickly but relatively painlessly.  Going alphabetically, there are only a few \"A's\" because a lot of the names are the same.  The Jessica's passengers largely come from just a few enclaves on Earth.  Each of you takes a name off the list in turn.  \n\nYou start with a skilled metallurgist named Anders Andersson who came out from the mining colony on Ceres (the largest of the asteroids orbiting between Mars and Jupiter).  Andersson's purpose is pretty clear -- he's one of the technical guys heading out to the new planets to help sustain the standard of living that most colonists expect to receive.  There's nothing more to his freight than his technical database, some tools, and a few pounds of personal gear.  \n\n*page_break\n\nYou figure this out through a screening process that is more than a little sneaky.  Like all passengers, Andersson sleeps in a freeze pod specially designed for deep space voyages while his gear has been stowed in a drawer at the end of his row of pods.\n\nYou can look over the gear with relative ease and clear it once a few scans have been done of its contents.  As to Andersson himself, here's where it gets sneaky.  Years ago somebody at the freezer pod company figured out that the human brain is particularly malleable when it's in coldsleep.  With the right combination of sound, vibration and electrical impulse you can manipulate a frozen person sleeping in their pod to reveal just about anything on (or in) their minds.\n\nIt's like truth serum.  Of course even with a foolproof truth serum it would take forever to run through every conceivable issue or idea that the screeners might be looking for.  \n\nThe shortcut, however, is the second part of the screen -- a series of messages transmitted subconsciously into the subject's mind that simulates an official interrogation.  Someone with something to hide will give off the telltale signs of guilt, evasion and defensiveness.  The screeners therefore don't have to look for evidence of every conceivable type of mental contraband.  Instead they can simply monitor the passenger for responses consistent with wrongdoing.  If there's a hit, then it's a simple process to zero in on the specific problem and eliminate it.\n\n*page_break\n\nNot much needs eliminating in the first day.  At the same time you take Andersson, you assign the next four passengers to the other team members.  After Andersson is a family of three named Aslantes, and they go to Mackenzie, Bryson and the final junior, Heddes.\n\nAgain, there's not much there.  Which doesn't surprise any of you, since the Aslantes family are on the ship in the first place because they won their parish's resettlement lottery.  Anyone entering those lotteries, let alone winning, has to prequalify for transport.  So by definition, the Aslantes family was good to go.  They're not about to jeopardize their trip by doing anything stupid like smuggling onto the Jessica something that will get them in trouble.\n\nThe other junior officer, Dallas, gets the next person, an expected exotic named Julian Augustine.  Just as you glance at the status board -- \"Passenger Revive -13.6\" it says -- Dallas reports back that Augustine is indeed somebody who's going to take a little extra time.\n*set alive 2\n*set investigation +5\n\nQuickly you review who this man is.  Julian Augustine is a well-known archivist, collector and merchant.  He's traveling to Niah with artifacts from throughout Earth's history, including ancient weapons, books, paintings, programs, and other treasures.  These objects are not only priceless originals, they are also symbols of cultural, political, religious and nationalistic movements that meant great things to the individuals who made them and sometimes terrible things to others.\n  \nAnd that's a problem.  Earth has collectively decided that the worst aspects of its past should be quarantined on the home world.\n\n*goto screenaugustine\n\n*label screentime\n*set alive 10\n\nStarting with the expected easy passengers also means saving the hard work for the end.  You figure that by then you'll be more efficient through repetition rather than more tired through work.  \n\nThere's nothing surprising about the easy ones.  They take about as long as expected, and are about as complicated as expected.\n\nThe screening process is quick, painless, but more than a little sneaky.  The passengers sleep in a freeze pod specially designed for deep space voyages while their gear is stowed in a drawer at the end of their row of pods.  You can look over the gear with relative ease and clear it once a few scans have been done of its contents.  Looking over the people is a bit more complicated.  Years ago somebody at the freezer pod company figured out that the human brain is particularly malleable when it's in coldsleep.  With the right combination of sound, vibration and electrical impulse you can manipulate a frozen person sleeping in their pod to reveal just about anything on (or in) their minds.  It's like truth serum.  Of course even with a foolproof truth serum it would take forever to run through every conceivable issue or idea that the screeners might be looking for.  \n\nThe shortcut, however, is the second part of the screen -- a series of messages transmitted subconsciously into the subject's mind that simulates an official interrogation.  Someone with something to hide will give off the telltale signs of guilt, evasion and defensiveness.  The screeners therefore don't have to look for evidence of every conceivable type of mental contraband.  Instead they can simply monitor the passenger for responses consistent with wrongdoing.  If there's a hit, then it's a simple process to zero in on the specific problem and eliminate it.\n\n*page_break Now for the tougher cases\n\nAfter 10 days of this you get to the tougher cases.  You're actually ahead of schedule.  \"Passenger Revive - 4.7\" it says on the status board.  \n\nAlphabetically, the first name that comes up is an older man named Julian Augustine.  Dallas does a quick once-over of his cargo and reports back that, yes, Augustine is going to require a bit more personalized attention.\n\nQuickly you review who this man is.  Julian Augustine is a well-known archivist, collector and merchant.  He's traveling to Niah with artifacts from throughout Earth's history, including ancient weapons, books, paintings, programs, and other treasures.  These objects are not only priceless originals, they are also symbols of cultural, political, religious and nationalistic movements that meant great things to the individuals who made them and sometimes terrible things to others.  And that's a problem.  Earth has collectively decided that the worst aspects of its past should be quarantined on the home world.\n\n*goto screenaugustine\n\n*label screendivision\n\n\"Bryson, Dallas, Heddes,\" you say to the three of them, \"take the long list.  Mackenzie and I will take the short one.\"\n\nThe juniors suddenly look crestfallen.  You've given them the easier work and kept the challenging work for yourself.  They exchange glances before one of them finally looks at you and clears her throat.\n\n\"Sir,\" Bryson begins, \"we all just took the same one-way trip.  We're probably not going to do this again.\"  You notice Heddes fidget a bit at the mention of that but let it go.  Bryson continues:  \"If we're going to spend two weeks doing this work, does it really, uh, optimize the team's assets to have 60% of us doing nothing but routine screenings?\"\n\nShe's being diplomatic, you think to yourself, but she also has a point.  Is it really fair to make these three come all this way just to dump on them the routine and unrewarding half of the job while you and Mackenzie do the interesting stuff?  Perhaps you've just created your first leadership crisis.\n\nHow do you want to respond?\n*choice\n  #I want them to do what I said.  I'm the team leader and this is how we're doing it.\n\n    \"I'm sorry Bryson,\" you respond, \"I see your point of view but I'm looking at the bigger picture.  I want the best experience level assigned to each passenger, which means you, Dallas and Heddes concentrate on the routine cases.  But don't worry.  There will be plenty of opportunities to help with the exotics.  Mackenzie and I will see to that.\"  Always throw them a bone.\n\n    Mackenzie looks impressed.  The juniors look pissed but resigned.  Maybe they'll regroup and come at you again in a day or two, but for now everyone's ready to go.\n    \n    They head off to start screening the mainstream cargo while you and Mackenzie get ready to start with the people your preview suggests will be more complicated.  \n    \n    Going down the list alphabetically, the first person you come to is a man named Julian Augustine.\n    *set diligent +5\n    *set seniors 1\n    *set alive 1\n\n    Quickly you review who this man is.  Julian Augustine is a well-known archivist, collector and merchant.  He's traveling to Niah with artifacts from throughout Earth's history, including ancient weapons, books, paintings, programs, and other treasures.  These objects are not only priceless originals, they are also symbols of cultural, political, religious and nationalistic movements that meant great things to the individuals who made them and sometimes terrible things to others.  \n\n    And that's a problem.  Earth has collectively decided that the worst aspects of its past should be quarantined on the home world.\n\n    *goto screenaugustine\n\n  #Bryson's right.  I overreached.  Let's give everyone a chance to get involved.\n\n    \"You've got a point.  I didn't think of it that way.\"\n    Everybody looks around with a vague sense of surprise on their faces.  The boss backed down easily.  \n    You continue.  \"Let's just go down the list alphabetically and we'll all get an equal shot at whoever comes up.\"\n\n    Hopefully, you think to yourself, that will be the end of that.  And if it isn't, perhaps you'll be a little more assertive next time.  Though locked in a starship out in space is not the best location to start getting confrontational.\n\n    So maybe you did the right thing after all.\n    *set ambitious -5\n    *goto screenalpha\n\n  #I ask Mackenzie for her input.  She's got one foot in each camp and she's the only one who hasn't expressed an opinion yet.\n\n    \"Krissa,\" you begin, \"I'd appreciate your perspective.\"  \n\n    She straightens up and pauses for a moment before responding.  But when she does talk it comes all at once, measured and assertive, almost like a rehearsed speech.\n\n    \"Well, ${firstname}, we need to balance a few things here.  The guys --\" she nods over to the juniors -- \"have a point, of course.  But we also have a responsibility to our duty.  And you've already made the call that that responsibility comes through seniority.  We all need to respect that.  This is not supposed to be fun, it's supposed to be work.  And it's supposed to be important because it keeps our culture the way we want it, and the way we want it to be in the future.  \n    \n    \"So here's what I would propose, ${firstname}, if it makes sense to you.  We obviously keep your plan in place, but with one wrinkle -- let the juniors collectively do every third exotic and we'll do a couple routine cases to pick up the slack.  They get some more experience, there's safety in numbers, and the team's objectives don't suffer.  Make sense to you?\"\n\n    Does it?\n    *choice\n      #Yes.  Let's just get started already.\n\n        \"I like it,\" you say, \"thanks.  Let's get going.\"\n\n        Everybody looks satisfied and you all start doing your thing.  The juniors trundle off to start their screenings while you and Mackenzie divvy up the first two exotics.  First on the list is an elderly historian named Julian Augustine.\n        \n        The second name is somebody called Henrik Bastian, with a \"(c)\" next to his name.  That means he's a clone.  They carry all sorts of baggage.  The juniors will then collectively take the third person, a preacher named Etienne Douglass.  \n\n        You and Mackenzie are standing alone together.  She says a few conciliatory things about how she hoped she didn't make you look bad or anything, and how she appreciated your public show of confidence in her reasoning ability.\n        \n        Then she offers to take the first exotic, Augustine, so you'll get Bastian, the clone.\n\n        *choice\n          #Sounds good.  \n            You assign Augustine to Mackenzie, take Bastian for yourself, and send a quick note to the juniors that they can start on Douglass once they get the green light from you.\n            *set krissa 2\n            *set investigation -10\n            *set alive 15\n            *goto screenaugustine\n\n          #No, I'll take Augustine.  He comes first and so do I.\n            \"No, let me take Augustine.  Let's go down the list just as we go down rank.  Easier to remember that way.  Nothing personal.  You take Bastian.\"\n\n            Mackenzie looks momentarily surprised before her face flattens out and she shrugs.  \"Whatever you say, boss.  I'll let you know how it goes.\"\n        \n            With that she heads off to Bastian's pod, leaving you alone.  You figure out how to get to Augustine's pod and head off to begin your work.\n            *set krissa 1\n            *set investigation +10\n            *set alive 1\n\n            Quickly you review who this man is.  Julian Augustine is a well-known archivist, collector and merchant.  He's traveling to Niah with artifacts from throughout Earth's history, including ancient weapons, books, paintings, programs, and other treasures.  These objects are not only priceless originals, they are also symbols of cultural, political, religious and nationalistic movements that meant great things to the individuals who made them and sometimes terrible things to others.  \n            \n            And that's a problem.  Earth has collectively decided that the worst aspects of its past should be quarantined on the home world.\n\n            *goto screenaugustine\n\n      #No.  I want to keep the juniors away from the cases we might think will be tough.\n\n        No sooner do you ask Mackenzie for her input than you publicly disregard it.  You tell the team that while you appreciate their perspectives, the more you've thought about it the more you think it makes sense to line the tougher cases up with the more senior members of the team.  You'll try to find ways to keep everyone involved in the sexier stuff, of course, but for now you want to proceed as you originally ordered.\n\n        Mackenzie looks irritated.  The juniors look pissed but resigned.  Maybe they'll regroup and come at you again in a day or two, but for now everyone's ready to go.  They head off to start screening the mainstream cargo while you and Mackenzie get ready to start with the people your preview suggests will be more complicated.  Going down the list alphabetically, the first person you come to is a man named Julian Augustine.\n        *set seniors 1\n        *set investigation -5\n        *set alive 1\n\n        Quickly you review who this man is.  Julian Augustine is a well-known archivist, collector and merchant.  He's traveling to Niah with artifacts from throughout Earth's history, including ancient weapons, books, paintings, programs, and other treasures.  These objects are not only priceless originals, they are also symbols of cultural, political, religious and nationalistic movements that meant great things to the individuals who made them and sometimes terrible things to others.  \n        \n        And that's a problem.  Earth has collectively decided that the worst aspects of its past should be quarantined on the home world.\n\n        *goto screenaugustine\n\n*label screenaugustine\n\n*page_break\n\n*if krissa = 2\n\n  Deputy Mackenzie will take the first pass at Augustine's cargo.  Assuming she finds something -- a very safe bet -- she'll then notify you.\n\n  Sure enough, within an hour Mackenzie reports back that there are some artifacts that she just can't quite classify either way.  Some of the stuff, like weapons and torture imagery, are clearly no-go.  But other items are much more vague.  She's found three that are in that category.  You look them over, draw on your training, and decide that only one needs to be vaporized for the benefit of interstellar humanity.\n  *gosub krissaaugustine\n  *goto screenending\n\n*elseif seniors = 1\n\n  You and Mackenzie stand before Augustine's sleeping body.  You've arrayed his cargo in front of him so body and luggage are all together.  \n  \n  Looking at his pod, you can't help but be impressed.  According to the biodata chart, the man is 350 years old.  Of course he hasn't been awake all that time, but even if he's been in deep sleep half a dozen times he's still an ancient human being by anyone's standards.  How the world has changed during his lifetime! \n  *goto screenaugustinebeta\n\n*else\n\n  Augustine is in his pod and his cargo is arrayed before him.  Pretty soon the whole team is here.  You work through the rest of the afternoon culling imagery and artifacts from his manifest, careful not to be overzealous in your work.\n  \n  You have a surprisingly wide latitude given your job, never mind the updated orders Earth might have sent during the trip.  After all, you're out here on your own, despite what the ship's programming might suggest, and it was long ago recognized that any attempt at screening that got too heavyhanded would likely backfire and create precisely the kind of animosity you were trying to prevent.  There's an ancient saying that one of your friends back home used to like, though you can't remember exactly what it was.  Something about the benefits of power wielded with a velvet glove . . . .\n  *goto screenaugustinebeta\n\n*label krissaaugustine\n\nWhich is it?\n\n*choice\n  #The gold coin.\n\n    *if corruptible > 60\n\n      Such a sign of ostentatious wealth!  An object that produces nothing of value and has been the scourge of civilization for eons!  \n  \n      But it's also something people have always coveted.  So you slyly slip it into your pocket when nobody's looking.  Who knows - it might come in handy down the road.\n      *comment my thinking here is simply that you might try to buy your way out of a jam sometime if you go the corrupt route\n      *set goldcoin 1\n      *set egalitarian +5\n      *set enlightened +5\n      *return\n\n    *else\n\n      Such a sign of ostentatious wealth!  An object that produces nothing of value and has been the scourge of civilization for eons!  \n      *set egalitarian +5\n      *set enlightened +5\n      *return\n\n  #The slave manacles.\n\n    Such an obvious symbol of humanity's capacity for oppression, exploitation and abuse!  The mere sight of these restraints begs questions about what slavery was and why it persisted.  Better not to have the trigger at all.\n    *set egalitarian +10\n    *set enlightened +10\n    *return\n\n  #The painting of defeated soldiers resting under a tree.  \n\n    On the one hand it's a unique painting.  Of an obviously historical event.  The soldiers look so foreign to modern eyes that they may as well be aliens from Niah waiting to meet you.  And there is no actual violence in the image at all.\n  \n    Yet on the other hand it's pretty clearly disturbing.  And unlike the gold coin or the slave gear, this painting is unambiguously acknowledging violent behavior that society no longer tolerates.\n  \n    So it's verboten.  \n    *set sentimental -5\n    *set egalitarian +5\n    *return \n\n  *hide_reuse #How do I know?  What's the criteria again?\n\n    You just know.  That's your job.\n    *goto krissaaugustine    \n\n*label screenaugustinebeta\n\n*page_break\n\nThere are some artifacts that you just can't easily classify either way.  Some of the stuff, like weapons and torture imagery, are clearly no-go.  But other items are much more vague.  You've found three that are in that shadowy category.  You look them over, draw on your training, and decide that only one needs to be vaporized for the benefit of interstellar humanity.\n\nWhich one of these has to go?\n\n*choice\n  #The gold coin.\n\n    *if corruptible > 65\n\n      Such a sign of ostentatious wealth!  An object that produces nothing of value and has been the scourge of civilization for eons!  \n      \n      But it's also something people have always coveted.  So you slyly slip it into your pocket when nobody's looking.  Who knows - it might come in handy down the road.\n      *comment my thinking here is simply that you might try to buy your way out of a jam sometime if you go the corrupt route\n      *set goldcoin 1\n      *set egalitarian +5\n      *set enlightened +5\n      *goto screenending\n\n    *else\n\n      Such a sign of ostentatious wealth!  An object that produces nothing of value and has been the scourge of civilization for eons!  \n      *set egalitarian +5\n      *set enlightened +5\n      *goto screenending\n\n  #The slave manacles.\n\n    Such an obvious symbol of humanity's capacity for oppression, exploitation and abuse!  The mere sight of these restraints begs questions about what slavery was and why it persisted.  Better not to have the trigger at all.\n    *set egalitarian +10\n    *set enlightened +10\n    *goto screenending\n\n  #The painting of defeated soldiers resting under a tree.  \n\n    On the one hand it's a unique painting.  Of an obviously historical event.  The soldiers look so foreign to modern eyes that they may as well be aliens from Niah waiting to meet you.  And there is no actual violence in the image at all.\n\n    Yet on the other hand it's pretty clearly disturbing.  And unlike the gold coin or the slave gear, this painting is unambiguously acknowledging violent behavior that society no longer tolerates.\n\n    So it's verboten.  \n    *set sentimental -5\n    *set egalitarian +5\n    *goto screenending \n\n  *hide_reuse #How do I know?  What's the criteria again?\n\n    You just know.  That's your job.\n    *goto screenaugustinebeta\n\n*label screenending\n\nAugustine and his fellow passengers remain blissfully unaware of the goings-on even as you and your team continue to scour their baggage and their minds.  It reminds you how farmers used to round up cattle for the butchers -- everybody's a lot easier to handle if they have no idea what's going to happen to them.  \n\nMeanwhile the team presses on.  By now all five of you are sharing the same work.  Hopefully you're getting more efficient at it as you go along.  Almost every exotic brings with them at least one judgment call.  So your decisions are going to have some real influence on what happens on this young planet of yours.\n*page_break  \n\n*rand exotic 1 3\n*if exotic = 1\n  It's Dallas who brings the next issue to your attention.  \"Sir,\" the big man says, motioning to a sleeping man at his feet, \"I've just noticed something with Mr. Liu here.  He's got the same playing cards as one of the other passengers we screened yesterday.\"\n\n  That hardly sounds like a big deal, you think to yourself, and you say so.\n\n  Dallas holds up his hands.  \"There's a bit more to it than that.  They're the exact same set, down to the skeletons on the face cards.\"  He holds up the jack of hearts to show you.  Instead of the usual medieval prince you see a ghostly spectre, its bony fingers cradling a skull that grins at you menacingly.  \"And,\" Dallas continues, \"the cards have got the same markings.  A bunch of formulas or something that I don't recognize.\"  You don't know what they are, either.  They look like mathematical equations of some sort but they don't register.  You guys have a lot of information at your fingertips but you're not omniscient.\n\n  \"What's so strange,\" Dallas concludes, \"is that these two passengers don't have anything in common.  They're not traveling together.  Yet they're both carrying these cards that obviously came from the same place.  And the cards are weird. What should we do about it?\"\n  *choice\n    #Nothing.  If we can't identify the problem then we shouldn't act.  Let these two, and anyone else on board, have their skeleton playing cards.\n\n      Indeed.  If you start screening anything that might be a problem, even if you can't explain it, then by the time the passengers are ready to go down to the surface they'll be naked and brainless.  (Which might cause the people already on Niah quite a shock.)  \"Don't worry about it, Dallas,\" you say.  \"But good job identifying the issue.\"\n      *set sentimental + 10\n      *set egalitarian - 10\n      *goto intermission\n\n    #Destroy every set of these cards we find.  Multiple exotics carrying the same undefined information is a red flag.\n\n      \"I don't like those formulas, Dallas, especially when they're not supposed to be there.  It's just icing on the cake that they appear on playing cards that seem to glorify death.\"\n\n      Dallas nods approvingly.  He'd already made up his mind the same way.  \"Consider it done,\" he says.\n      *set sentimental - 10\n      *set egalitarian + 10\n      *goto intermission\n\n*elseif exotic = 2\n  \"Chief, you need to see this.\"  It's Dallas, calling from three rows down, and his readout is flashing red.\n\n  \"What's the problem?\"\n\n  \"Serious discrepancy,\" he says.  \"Passenger Luther, Edwin M. -- a lifestyle coach out of Calcutta.  It sure looks like he's faking his resume.\"\n\n  You smile to yourself at Dallas' use of the term \"lifestyle coach,\" which is just a polite way of saying that Mr. Luther here is a pervert.  He makes a living advising people how to get as much carnal pleasure as possible out of as many things as possible.  The best in the business can make a fortune keeping their clients in hours-long orgasmic states.  So \"lifestyle coach\" is a bit misleading.  It's like calling a prostitute an \"exotic dancer.\"  Perhaps Dallas is a bit more prudish than you thought?\n\n  Anyway, Dallas explains that Mr. Luther's memories and documents don't match.  Like all \"lifestyle coaches,\" Mr. Luther is accredited by the government.  His registration number is 8676653-R.  And he has framed diplomas and licenses to prove it.  \"But there's nothing in his mind about it,\" Dallas says.  \"When we probe the classes, and the exams, and the licensing procedures, his mind comes up blank.\"  So he's almost certainly a fraud.  \n\n  The question for you is what to do about it.  Everybody aboard ship gets to go down to the surface.  Do you try to wash Mr. Luther's background to eliminate the fraud?  Or since he's sort of pervy to begin with, do you just let it go?\n\n  *choice\n    #He can keep his registration number but lose the fake diplomas and such.  We don't need con artists here.\n\n      You tell Dallas to destroy the paperwork and clean up the memories.  Niah may get its lifestyle coach but at least it should get an honest one.\n      *set sentimental - 10\n      *set egalitarian - 10\n      *goto intermission\n\n    #What's the big deal?  So a guy who trades in sexual pleasure . . . embellished his qualifications.  Isn't that what sex is all about?\n\n      \"I see what you mean,\" you say, \"but let it go.  Who knows, maybe he'll have to requalify out here anyway.\"  Dallas looks a little uncomfortable but doesn't put up a fight.  You make a mental note not to use Mr. Luther's services.\n      *set sentimental + 10\n      *set egalitarian + 10\n      *goto intermission\n  \n*else\n  No sooner do you think about taking a break than Dallas calls you with a problem.  He looks concerned.\n\n  \"I think you need to get somebody else to help with this passenger,\" he says.  \"It took me a couple minutes but I just realized I know her.  Her dad was a Verdunite and I worked on their removal.\"\n\n  Oooh, you think, that's tough.  Verdun was the site of a radical anti-government movement that briefly threatened to destabilize a hefty chunk of the interstellar finance system.  Verdunites were highly skilled professionals who decided they'd had enough.  The movement rapidly hit critical mass.  The whole thing lasted more than a day.  For a couple of hours things had been touch and go.  Ever since, the name \"Verdun\" has been synonymous with anti-establishment uprisings.  \n\n  So Dallas was on the team that identified and removed these people from society.  Which to most people makes him a hero.  All in a day's work for Dallas.  But one of the Verdunites was a man named Fabrice Detongo.  And his youngest daughter Claire, by amazing coincidence, is on board, as vulnerable as an open book.  She was far too young to have had any involvement in her father's conduct -- which was likely why she made it on board at all -- but screening her might mean a conflict of interest for Dallas here.\n\n  \"She might have some pretty strong opinions about the authorities,\" Dallas says, \"and I don't know if I can be objective about them.\"\n\n  You have a decision to make.  On the one hand you can pull Dallas from the screen and keep things more objective.  On the other you could use this opportunity to give him a show of support.  Thoughts?\n  *choice\n    #Tell Dallas I have full confidence in his ability to screen any passenger, even one who might hold a grudge against him.\n\n      You tell him this and he smiles.  \"But don't forget to double-check whether she's got any information at all about the Verdun Movement.\"\n      *set enlightened - 10\n      *set sentimental - 10\n      *goto intermission\n\n    #Agree with Dallas that it's best to get somebody else to screen Claire Detongo.\n\n      \"Let's not take any chances,\" you say.  \"Get Heddes or Bryson to take over and work on somebody else.\"\n\n      Dallas looks relieved.  He heads off and quickly takes care of things.  You look down at Ms. Detongo, sleeping peacefully in her freezer pod.  She's none the wiser for any of this.  Who knows how different her memories would be if you'd made a different decision.\n      *set enlightened + 10\n      *set sentimental + 10\n      *goto intermission\n\n*label intermission\n*comment this is where she asks about the work and asks how you want to be remembered\n\nMackenzie swings by soon after.  You're in full troubleshoot mode -- these questions hit you one after the other -- and you immediately assume she's come to you with another problem.  You glance at the status board.  It says \"Passenger Revive -1.3.\"  You're running out of time.\n\n*page_break\n\n\"What?  No, I'm just taking a break for a second,\" your deputy says.  \"I figured you might need one, too.\"  She offers you a cold refreshment which you grudgingly accept.  \"Just a minute,\" you say.  \"We're not getting any younger.\"\n\nThe two of you sit back for a second and reflect on where you are.  Then you compare notes on the juniors -- Mackenzie's a tough person to work for -- before coming back to your own thoughts about this trip.  Maybe you can spare a couple more minutes.\n\n\"You know,\" she says, \"it's funny just how powerful we are right now.  Two weeks ago we were barely alive.  Two weeks from now we'll be strangers in a strange land, the bottom of the totem pole, struggling to establish ourselves in our brand new lives.  But right now we're the top of the food chain.  We're not only scrubbing people's minds but scrubbing an entire civilization.  What we do could now could have effects for generations.\"  \n\nYou look carefully at your deputy.  She's really taken this to heart, you think to yourself.  And she looks a little overwhelmed by it.  Maybe it's a good thing this came up so late in the process, since if she's starting to freak out she's thankfully almost done with the job.  Not much harm can come at this late stage.\n*page_break\nWhatever you're thinking, Mackenzie's mind is clearly working, too.  She starts talking again, once more focusing on your place in the big picture.  \"You know those ancient cultures that worshipped a bunch of different gods?\"  She's sort of asking you directly but also just talking out loud.  \"I've got a theory I've always wondered about.  Everybody assumes those gods were just made up.  But what if they were actual people?  Not actual gods, of course, but just a bunch of stand-out people from the early years.  Like the guy who was the best hunter, and his wife who was super good looking, and the wise old guy who figured out how to save everyone from the killer wolf, and the mean lady who killed her neighbor's kid.  The pioneers are usually the most famous -- we know the first Roman emperors, and the first American presidents, and the first TV shows, and the first astronauts, and so on.  Heck I even know the name 'Babe Ruth' even though I can't tell you anything about him.  Nobody remembers the 47th person to walk on the Moon.  I think those old gods actually started out the same way.  They were the stand-out people from the early years who got mentioned in the stories and just kept getting talked about, year after year, until they became these larger than life figures.  They became immortal.\"\n\n*page_break \n\nYou take a sip from your drink.\n\n\"Pretty heavy, huh?\"  She's asking you directly.  But before you can answer, she asks another question of her own.  \"${firstname}, you may not realize it, but you've been thinking about this, too.  We all have.  And no matter how we try to do our jobs it's there.  Our legacy.  Our impact.  We all know that this job gives us an almost superhuman role to play in what happens down there.\"  As she says this she waves her hand at the real-time image of a sunlit Niah that's projected on the room's far wall.  The image is so realistic if you didn't know better you'd think you were looking at the real thing through a hole in the ship.  \n\nThen she turns back to you and asks you a final question.  \"${firstname}, how do you wish they would remember you?  Let's say you could make all this public.  Would you be a god?  A servant?  Or a prophet?\"\n\nThis is all coming a little quick for you.  I mean, who's \"they\"?  You're not even sure you know what she's talking about.  Yet you feel compelled to give a straight answer.  If you had your choice, how would you want to be remembered?\n*choice\n  #As a god.  That's really what I am, after all.\n\n    The very thought excites you.  If only for a few seconds, anyway, before you realize it's not happening in the real world and you get back to work.  Time to put this discussion to bed.  \"That's enough philosophizing for today, Krissa.  Let's finish this screen once and for all.\"\n    *set enlightened - 10\n    *set egalitarian - 10\n    *set ambitious + 10\n    *set corruptible + 10\n    *goto screenending2\n\n  #As a servant.  Keep it humble.  \n\n    Some of the best leaders were also the most modest.  It seems like delusions of grandeur always backfire.  So while you don't think you've ever contemplated this precise issue before, as you sit here right now thinking about Mackenzie's posit you realize you'd want what's best for humanity over what might be best for you.  Then you thank Mackenzie for the drink and tell her to get back to work.\n    *set enlightened + 10\n    *set egalitarian + 10\n    *set ambitious - 10\n    *goto screenending2\n\n  #As a prophet.  I'd be known for the ideas I promoted, and for my ability to let the people use them as they pleased.\n\n    Now you're getting mystical.  Do you have any disciples?  Followers?  Perhaps you were meant to sit under a tree for awhile and contemplate life.  In any event, you thank Mackenzie for the thought-provoking conversation but tell her it's time to get back to the work at hand.\n    *set enlightened + 20\n    *set ambitious - 10\n    *goto screenending2\n\n  #None of the above.  This is crazy talk.  Remember me as a diligent quarantine officer, no more and no less.\n\n    Hypotheticals like these always made you uncomfortable.  As does speculating about how you could abuse your authority.  It's not your job to bolster your own image in the minds of these sleeping passengers.  \"Thanks for the drink, Krissa,\" you say, \"but perhaps it's time to ratchet down the daydreaming a bit and focus on finishing our work instead.\"  Mackenzie looks momentarily disappointed -- like she was expecting you to buy into this hypothetical more than you did -- before thanking you for your time and wandering back to her station.\n    *set diligent + 15\n    *set investigation + 10\n    *goto screenending2\n\n*label screenending2\n*comment this is the second choice - don't make it random\n*comment that way the exotic value tells you what the first randomized selection was\n\nMackenzie leaves for her next passenger just as you realize you never asked her what she would have chosen.  Given that she's the one who brought it up she should probably be the one explaining herself, not you.  But before you have a chance to find Mackenzie another issue comes to your attention.\n\n*page_break\n\nIt's Heddes, the other junior officer.  \"Sorry to bother you Captain ${lastname},\" he says, almost apologetically.  \"I saw you were in with Deputy Mackenzie and I didn't want to intrude.  But we're short on time and I'd like your help.\"\n\n\"Sure,\" you answer, as you make a mental note to follow up with Mackenzie some other time, \"what's on your mind?\"
