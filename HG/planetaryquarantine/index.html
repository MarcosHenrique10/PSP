<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Planetary Quarantine — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "planetaryquarantine", "title": "Planetary Quarantine", "scenes": {"choicescript_description": "You’re a quarantine agent – an extrajudicial lawman who lets only approved people and products leave Earth – and in a few days your starship will be arriving at your new home world.  A dead passenger, a mysterious society, and a potential threat to interstellar civilization all await you.\n\n[i]Planetary Quarantine[/i] is an interactive science-fiction novel where your choices control the story. The game is entirely text-based--without graphics or sound effects--and powered by the vast, unstoppable power of your imagination.\n\nSolve the case and save the world.  Build your life while building society.  Explore this richly intricate game where new surprises await you each time you play!\n", "choicescript_stats": "\n*stat_chart\n  percent Diligent\n  percent Ambitious\n  percent Corruptible\n  percent Investigation\n  percent Sentimental\n  percent Enlightened\n  percent Egalitarian\n\n*comment this is the original stat_chart\n*comment   percent Leadership\n*comment   opposed_pair Strength\n*comment     Weakness\n*comment   text Leadership\n*comment   text Strength\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game.\n\n  *purchase adfree $3.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n\n", "cleancowv10": "*comment Choice of Worlds Vignette 10\n*comment Copyright 2014 Andrew J. Schaefer\n*comment responding to the planetary distress call or otherwise just chilling\n\n*if path = 0\n  Things work out pretty well for you in your new low-key life.  There's a small network developing on Niah of people who appreciate what you're doing.  And there's a broader network developing among the habitation zones on Niah and the nearby worlds.  Everybody's sharing information.  In your mind's eye you always picture a big red web connecting a bunch of different planets and moons, the web twisting around as those bodies go through their orbits.  Granted the time lag has a dulling effect on quick communication, but you've also found that with so many different worlds everybody wants to keep in contact and they all bring rapidly evolving perspectives to the table. \n  *gosub local\n  *page_break\n  *goto distress\n\n*elseif path = 3\n  Drip.  Drip.  Drip.\n\n  You're at a desk, reviewing a file, while drops fall slowly from the ceiling onto the floor behind you.  It's raining outside, again, and your offices are not watertight.  You think about proper roofs that can actually keep out the weather, which briefly brings you back to Debussy's party when you first arrived on Niah.\n\n  That was a year ago.\n  *goto intel\n\n*else\n  We're now going to fast-forward a bit further in your life, because that's when the next big issue occurs.  \n\n  You've just celebrated your one-year anniversary on Niah.  In many ways you're a completely different person.  Physically, of course, thanks to the high gravity you've got muscles you never knew you had back on Earth.  Mentally, you're coming along, getting used to things like the different length days and the fact that the vast majority of this planet is empty of people.  \n  *gosub honey\n  *goto artemisone\n\n*label artemisone\n*if path = 5\n\n  Professionally, the Artemis overhaul has come along smoothly.  In fact, it's a good thing you're part of the starship's crew because suddenly there's an important need for the ship.  A distress call has been received from the Persephone, a starship supposedly in stable orbit above Hadley's World, the earthlike planet three light years away.  According to the distress call the ship's orbit is no longer stable.  If left uncorrected the ship will eventually drift away from the planet entirely.  \n\n  The alarm worries everyone.  Starships are the most valuable pieces of machinery in the universe.  The big shipyards in Earth's solar system can make them but they still cannot be built from scratch out here.  So for the new worlds a starship is literally a priceless otherworldly inheritance.  Lose it and you lose your link to civilization.\n\n  So what's going on?  It's not easy to put these ships back in the proper orbital position.  It also becomes harder to protect them the farther out into space they drift.  If nobody's paying attention to this ship's orbit, then something bad might have happened at Hadley's World.  Are they able to maintain the ship?  Have they lost the interest?  The ability?  Niah waits for an update, all the while monitoring the other transmissions that continue to come from that area of space.\n  *page_break\n  It soon becomes clear that this distress signal is the real deal.  Followup messages confirm its authenticity.  Weeks pass with no improvement in the ship's orbital status.  Meanwhile Debussy, of all people, assumes financial control of the Artemis and completes the process of fitting the ship out for what increasingly looks to be some kind of rescue voyage.  A dramatic situation calls for a drama queen, you think to yourself.  But he's pulled things off so far so who are you to (even jokingly) criticize?\n  *goto distress1\n\n*else\n\n  Debussy invested in the Artemis and asked you to be a part of the ship's management, an offer you gladly accepted.  For most of the past year the company has been refitting the Artemis, repairing its spaceflight damage and replacing the systems that were stripped out for use on other ships.  A couple things are tough to rebuild but nobody seems too worried about their improvised replacements. \n  *page_break \n  Getting a starship ready for an interstellar trip is no easy feat, however.  There are a million things to do, a million risks to anticipate, and a million problems that flare up along the way.  You're helping keep everyone on the same page, as much as that's possible.  You're doing your job well when nobody knows what you're doing.\n  *goto distress\n\n*label honey\n*if love_interest > 0\n\n  Personally, you're still going strong.  ${partner} and you are a good team.  You crazy kids make each other happy.  Some people might find you slightly irritating but you don't care.\n  *return\n\n*else\n\n  Emotionally, you're on an even keel, happily looking back on your early days out here as a good learning experience for what's to come.  \n  *return\n\n*label local\n*comment this is the domestic path, with a couple different text inserts pretty much randomly, then finish with a second-hand reference to the distress call and maybe a fake choice about a tatoo or something\n*set filler 0\n*rand filler 1 3\n\nFor example, \n*if filler = 1\n  there's a settlement near the other end of the continent.  It's basically a floating town, built on some old starship containers, anchored in the water just offshore from some particularly beautiful landscape.  They're all alone out there.  Within a couple years they'd started speaking almost a separate dialect.  Once it occurred to them they'd have trouble understanding the technology they so heavily relied on, however, they got nervous and started communicating with the outside world a lot more.  If you can't understand the common tongue then it's a lot harder to enjoy the standard of living that comes with it, especially in this day and age.\n  *return\n\n*elseif filler = 2\n  people are still figuring out the planet's climate.  Models built from centuries of technical analysis of Earth's climate are only marginally useful here.  Sometimes they're downright misleading.  And Niah's climate changes whenever humans do anything significant, anyway.  Somebody came out a generation ago and tried to establish a vineyard in what seemed like the perfect hillside.  All that new vegetation, the water use, the various gases that were exhausted into the atmosphere, and so on, all changed the microclimate immediately.  Now it's an evergreen forest.   \n  *return\n\n*else\n  you're in a poetry club with people on three other worlds.  Realtime conversation across the entire group is obviously impossible.  Instead everybody just shares what they have in crisscrossing transmissions.  Some people you don't hear from for months.  Others compose constantly.  Your favorite is this lonely archivist, living on a moon with very light gravity and a perpetual aurora overhead, who tries to capture just precisely what it's like to live in that ephemeral environment.  You love to go to sleep reading these floating, mesmerizing works.\n  *return\n\n*label intel\n*comment this is internal intelligence, with a quick meaningless choice about something, but it should quickly dovetail back into the distress story\n\nA year later and you're helping Niah authorities keep tabs on some of the more, shall we say, colorful characters who pass through town.  The running joke at work is that if you'd done your job better when you first got here you wouldn't have a job now.  But the funny thing about quarantine screening is that it's never perfect.  And strangely enough, out here amongst these new societies people have begun reinventing the very same conflicts they left behind on Earth.  It's like the saying about how if the devil didn't exist they'd have to invent him.  On Niah people have been competing for resources, arguing over opportunities, scheming to get ahead . . . and the learned misbehavior follows.  \n*page_break\nYou like to stay in the background.  You're used to working that way and you find you're good at it.  As you watch others do their thing you often get a feel for how they operate and, by extension, what they're doing wrong.  Your desk, for example, is a real-time map of Niah city.  The people you're following are all marked, their movements tracked and their system usages recorded in small color-coded pop-up balloons over their heads.\n\nHowever, sometimes outside events have a way of intruding.  \n*goto distress\n\n*label distress\n\nCommunication comes to the fore one day when Niah receives a starship's distress call.  It's an automated alert from a liner, the Persephone, that's supposed to be parked in stationary orbit over Hadley's World -- the earthlike planet in the next star system three light years away.  According to the distress call the ship's orbit is no longer stable.  If left uncorrected the ship will eventually drift away from the planet entirely.  \n\nThe alarm worries everyone.  Starships are the most valuable pieces of machinery in the universe.  The big shipyards in Earth's solar system can make them but they still cannot be built from scratch out here.  So for the new worlds a starship is literally a priceless otherworldly inheritance.  Lose it and you lose your link to civilization.\n\nThen what's going on?  It's not easy to put these ships back in the proper orbital position.  It also becomes harder to protect them the farther out into space they drift.  If nobody's paying attention to this ship's orbit, then something bad might have happened at Hadley's World.  Are they able to maintain the ship?  Have they lost the interest?  The ability?  Niah waits for an update, all the while monitoring the other transmissions that continue to come from that area of space.  \n*page_break\n*if path = 0\n\n  Funny enough, a couple weeks later an embarrassed \"never mind\" arrives from the ship custodians over at Hadley's World.  There was a power surge that tripped the Persephone's internal monitoring systems.  Automated signals were sent out to every nearby world by mistake.  They only noticed after a full systems review, and the follow up messages finally went out a few weeks later.  Oops.\n\n  For you, of course, it's all just an amusing distraction.  \n  *goto bland\n\n*elseif path = 3\n\n  It soon becomes clear that this distress signal is the real deal.  Followup messages confirm its authenticity.  Weeks pass by with no improvement in the Persephone's orbital status. \n\n  As an agent in internal intelligence, of course, you're not really on the front lines for this one.  But there's been some interest among Niah's merchant class in going after that Hadley's World starship.  The call goes out for expressions of interest.  Interested?\n  *choice\n    #No.  I already chose to stay here.\n\n      True that.  You keep an eye on things from a distance.  Another month passes before a ship can be sent -- they're not exactly a dime a dozen -- and it'll be at least another seven years before word gets back to Niah of what it found.  Hopefully, for the ship's sake, the issue isn't resolved while the Niah vessel is mid-voyage.  A starship at full velocity cannot turn around.  They're like speeding bullets or falling rocks.  So the relief ship would have to continue on for a few more years and then hope there was something to do once it arrived.  You'd hate to waste so many years on a false alarm.\n      *gosub adios\n      *goto happyend\n\n    #Sure, sign me up.  \n\n      Perhaps it's the thought of spending the next week following somebody around the back alleys of Niah, but for whatever reason you send your name on to the organizers.  Things are coming full circle, because one of the organizers is Debussy and the ship being used is the Artemis.  That damaged liner you saw when you first arrived in orbit is being refitted and will leave once it's ready.  \n      *goto distress1\n\n*else\n\n  It soon becomes clear that this distress signal is the real deal.  Followup messages confirm its authenticity.  Weeks pass with no improvement in the ship's orbital status. \n  *goto distress1\n\n*label bland\n*if velvet > 0\n  Your other distraction is that little velvet cube that Debussy gave you.  It's becoming addictive.  (Maybe that was Debussy's plan all along?)  The detail is astonishing and the number of hidden treasures seemingly limitless.  You're starting to think that the cube updates itself, perhaps through a living simulation, because it seems as though places sometimes change from one visit to the next.  You weren't sure that was possible but who knows.\n\n  Today you found Augustine's library.  Not the public one that would have been easy to locate, but a private one hidden beneath a warren of ancient ruined buildings.  You hadn't thought about this man in months and suddenly you're face to face with the simulated reproduction of his personal archive.  Funny that the cube makers should know about it, assuming this is actually authentic.  Perhaps, you think to yourself, none of this actually exists back on Earth.  After all, how would I be able to check?  Send a message and then hope for a reply at least 62 years from now?\n\n  Anyway, do you feel like browsing through Augustine's library?\n  *choice\n    #No freaking way.  What a buzzkill.\n\n      No sooner do you stumble upon this archive than you stumble right back out of it.  In fact it's a good time to turn this thing off for awhile and stretch your legs.  There's a real planet out here that you're still getting to know.  \n      *goto happyend\n\n    #Sure.  Let's browse through it.\n\n      How could you not?  \n      *goto bland1\n\n    #Not only do I look at it, I want a team to come in and scour it.  This could change everything.\n\n      Who knows what's here, or what it might tell you about Augustine, Debussy, and who knows who else.  Just thinking about whether a simulated world that Debussy gave you could include reliable information that might incriminate Debussy himself, or explain Augustine's death, makes your head hurt.  \n      *if diligent \u003c 50\n\n        No sooner do you think this, however, than the room changes.  You've been wondering for a while whether the cube's simulation is not static.  Now for the first time you've witnessed it in action.  Unfortunately, and by amazing coincidence, it happens just as you think you've found something useful out here on Niah.\n\n        Where before there were huge piles of materials that seemed to violate the quarantine screen, now there are merely tidy stacks of blank notepaper.  At first you frantically search for the override, thinking that you've merely tripped a data safeguard, but you find nothing.  It has been irrevocably altered.  You begin to make a note of this finding, only to forget halfway through what it is you were writing.  Your note merely trails off into an absent-minded sigh.\n\n        Once this happens your mind shocks itself back to reality.  You've never lost your train of thought like that before, but you've seen the telltale sign a thousand times -- whether in sleeping or awake subjects, the quarantine screening process produces exactly that effect on the mind.  You've been scrubbed, and the cube has been scrubbed, and somebody's done it to you, and you don't know how or why.  You don't even know anymore what you don't know anymore.\n        *set enlightened - 15\n        *set egalitarian - 15\n        *finish\n\n      *else\n\n        Unfortunately not everyone's available.  Mackenzie is otherwise engaged.  Bryson, it turns out, is prepping for a starship flight.  (Who knew?)  Dallas and Heddes arrive in reasonable time, and together the three of you stumble through the cube's projections before getting back to where Augustine's library was located.  By the time you're all there again the place looks slightly different to you -- you're no longer sure everything is in exactly the same state it was when you first found it.  But there's too much there for you to remember for certain.  It's more just a general sense that things aren't the same.\n\n        \"Maybe I'm just imagining things,\" you say out loud to your two juniors.\n\n        Dallas smiles.  \"Nice to see you're still talking to yourself,\" he says.  Heddes laughs.  It's good to be around these guys.\n        *page_break\n\n        \"It's only because you two drive me crazy,\" you joke in reply.  \"But seriously, let's get this checked out.  I'm not sure what this is and I don't know why it's here.  And I'm not convinced this isn't all just set up to mess with us somehow.\"\n\n        You catch sight of Heddes lost in deep thought.  He's no longer really listening to you.  Just as you're about to get his attention he snaps out of it.  \"There's a problem,\" he says, \"and I'm not sure how to deal with it.  This --\" he's waving his hands around the room --\"is obviously just a simulation.  We can't exactly box this stuff up and take it to the lab.  It's a fixed data point embedded in the image.  The way these memory cubes work you can't dissect their component parts even if you want to.\"\n\n        This doesn't sound right to you.  There were messages from Earth in here telling you the cube was approved to go through quarantine.  Debussy showed them to you.  If you can insert customized nuggets, why can't you take them out?\n\n        \"They would have been put in when the cube was initialized,\" Heddes explains.  \"You can build these things using as many elements as you want.  But once you've created it they all fuse into a single entity.  The elements are catalysts.  It's almost a living organism -- it's how you can create something that uses up so much memory.  You can't take out parts of it any more than you can take the yeast out of a bread after you've baked it.\"\n\n        You all understand immediately what Heddes is talking about because fresh-baked bread has become a big thing here on Niah.  The high gravity and humid atmosphere are apparently wonderful for it.  But enough about food.  This is a pain in the rear end.  Heddes finishes:  \"So all we can do is sit here and look through everything and see what we see.\"\n        *page_break\n        \"But I've been getting this nagging feeling that things in here have been changing,\" you reply.  \"It seems to respond to what I'm doing.\"\n        \n        Heddes shrugs.  \"I don't know about that, but even if that's the case there's nothing in the system architecture that suggests this cube operates any differently than any other.  And we don't have the ability to comb through component images, like I said.  All we can do is look through the finished product as it apepars before us.\" \n\n        Which is what you start doing.  If you close your eyes you can almost tell yourself you're sitting in an actual ancient cellar tucked away under a warren of old rooms.  At one point you even think you hear the clank of a horse-drawn carriage.  \"Just my leg,\" Heddes says, once he sees you looking around.  Then he continues:  \"But it says something that my leg noises are the only things creating interest.  I'm not seeing anything useful.\"\n        *page_break\n        \"Me neither,\" Dallas yells from across the room.  Both juniors give you a look that essentially says \"this isn't going anywhere.\"  So rather than use up all your favors with them, you send Heddes and Dallas home.  \"I'll finish up,\" you say, \"and let you guys know when I need you.\"  Dallas makes sure you're still on for drinks next Thursday and then they leave.  \n        \n        Once they step out of the cube's visual field Augustine's library alters itself.  Suddenly everything's a little bit more accessible to you.  Moreover, there are new alcoves and side passages surrounding the main room that you didn't previously see.  You call Heddes and Dallas back and the room changes back to what they saw.  They leave again and the new version reappears.  \n\n        \"What the hell,\" you say to yourself.  \"I'll just look through this stuff on my own.\"\n        *goto bland1\n\n*else\n  You're on Niah, after all, and you have your own life to worry about.  \n  *goto happyend\n\n*label bland1\n\nMost of it is unintelligible to you.  Literally.  Piles and piles of handwritten notes are strewn throughout the available space and they're written in a scrawl that you simply cannot decipher.  Between them are books, data cubes and artifacts -- including a few things you remember neutralizing during the quarantine screen.  Augustine collected anything written by people who were killed for enjoyment, for example.  Or at least in this simulated library he did.\n\nYou continue browsing until you reach the far end of the room.  Something very unusual stops you in your tracks.  Floating against what looks like an ancient brick wall are three lifelike figures.  Their appearances are macabre.  To the left is a decrepit old man in rags, his body displaying numerous serious wounds.  Next to him is an angel, his wings folded behind his back as he sleeps peacefully.  Finally there's a man bound in chains with a black noose over his head, as though he's about to be hanged.  \n\nThere's no identification for any of them.  You've never seen these particular people before and have no idea who they are or why they're here.  As if on cue, however, a sentence suddenly appears beneath them.\n\n\"Pick your poison,\" it says.  There's a lever under each one.  Which do you pull?\n*choice\n  #Are you serious?  I'm not touching anything called \"poison.\"\n    Smart move.  You raise your hands, palms out, and back away from the sign.  Grains of sand and plaster grind loudly under your feet.  At first the sign follows your movement and glides slowly towards you -- this is one persistent sign, you think -- but as you continue your evasion the sign eventually gives up and dissolves back into the wall from whence it came.  Now it's just you and a warren of rooms and hallways.  The books and artifacts of Augustine's library that greeted you when you arrived are no longer visible.  Your little sign friend seems to have taken them with it.  \n    *goto velvetend \n\n  #The sleeping angel.  What's the harm?\n    *if ambitious \u003c 50\n      You never find out, because as soon as you pull the lever you fall asleep.  That's what you assume happens, anyway, because the next thing you know it's eight hours later and you've got dried drool sticking your face to your desk.  \n\n      Maybe it's time to eat.  Next time to visit this archive hopefully you'll explore some other corners of the library, because there are things here you didn't see this time.\n      *set enlightened - 10\n      *finish\n\n    *else\n      \"The modern world seeks me out,\" the angel says, \"hoping for the peace that I provide.  My peace is fleeting, however, and comes at a price.\"  \n\n      Just as you're about to ask the angel what it's talking about, it continues.  \"To meet death in relaxed comfort often means avoiding difficult choices during one's life.  It is easier to find me when you have shirked challenges when given the chance.  Sometimes the easy route is the wrong route.\"\n\n      And with that the angel bids you farewell.  Augustine's library closes down and your access dries up.  After fiddling with it a moment you realize it's not opening up again anytime soon.  So you power down the velvet cube and go see what's for lunch.  Perhaps the next time you visit you will find more, since there are other aspects of this library you failed to see this time.  \n        \n      You're on Niah, and right now you have your own life to worry about.  It won't be written here -- we're coming to the end of our story -- but it will be worth living.  Best get started.\n      *set enlightened - 10\n      *goto bland2\n\n  #The hooded, chained prisoner.  \n    *if corruptible > 50\n      No sooner do you pull the lever than the nearby angel wakes up and begins speaking to you.  \"That is you,\" the angel says, gesturing at the prisoner.  \"Not figuratively, but literally.  As you wallow in a computer simulation, ignorant of the real world's goings on, you are being charged with crimes against this planet.  Your conduct has caught up with you.\"\n\n      Things move slowly out here until they need to move fast.  Then they happen in an instant.  Suddenly the cube goes dark and you are alone in your room at home.  Three plainclothes agents are there waiting for you.  They have been investigating you ever since the night of Debussy's big soiree right after you arrived.  You made some statements, did some things, and offered some services, that were not well received.  You protest that lots of people were doing this.  Irrelevant, they say.  You were the quarantine agent and you're new to Niah.  Goodbye.\n      *set enlightened - 15\n      *set egalitarian - 15\n      *finish\n\n    *else\n      A weathered marble slab appears underneath the prisoner.  It looks like it's been there for eons.  Carved into the marble are these words:  \"Those who threaten the greater good forfeit their right to life.\"  You recognize the statement from Earth's own past.  It's one of the many rallying cries used to justify state-sanctioned violence.\n\n      Then you notice a question underneath the statement:  \"Do you agree?\"\n      *choice\n        #Yes.\n          Unsure how to respond, you simply say it out loud.  \"Sure,\" you say, \"that makes sense.\"  \n\n          You hear a quick scream.  Blood begins to drip from underneath the prisoner's hood.  Oh dear.  Alarmed, your immediate instinct is to try to help.  Then the simulation comes to an end.  \n          \n          After fiddling with the cube for a few moments you realize it's not opening up again any time soon.  So you power it down.  Perhaps the next time you visit you will find more, since there are other aspects of this library you failed to see this time.\n\n          Now you're alone in your room, the familiar Niah scenery outside and the orange sun overhead.  Time for lunch.  You're on Niah, after all, and you have your own life to worry about.  It won't be written here -- we're coming to the end of our story -- but it will be worth living.  Best get started.\n          *set enlightened - 10\n          *finish\n\n        #No.\n          Who could agree to that?  \"Threatening the greater good\" could mean anything.  I didn't come out here, you think to yourself, to get people executed for falling out of favor with the majority.  Nothing threatens the greater good more than the notion that civilization has the right to kill people for vague reasons only the killer gets to define.\n\n          Quickly you hear a creaking sound.  The prisoner is slowly standing up straight.  Then he raises his hands to his head and deliberately pulls back the hood, revealing not a weathered or injured face but a skull.  The skull turns towards you, its teeth fixed in that menacing smile skulls do so well.  At the same time a chill sweeps over your body.     \n\n          Then the simulation comes to an end.  After fiddling with the cube for a few moments you realize it's not opening up again any time soon.  So you power it down.  Perhaps the next time you visit you will find more, since there are other aspects of this library you failed to see this time.\n\n          Now you're alone in your room, the familiar Niah scenery outside and the orange sun overhead.  Time for lunch.  You're on Niah, after all, and you have your own life to worry about.  It won't be written here -- we're coming to the end of our story -- but it will be worth living.  Best get started.\n          *set enlightened + 10\n          *finish\n\n        #It's not a simple yes or no question.\n          No, it never is.  There are rules and exceptions for pretty much everything -- even a quarantine screener would have to agree with that.  So you say that out loud.\n\n          A pair of dice suddenly appear in the prisoner's outstretched hand.  Still cloaked, he shakes the dice and then throws them down on the floor.  They rattle a few yards before coming to a stop at your feet.\n\n          You look down.\n          *comment using the seniors variable simply because it has two possible values  \n          *if seniors = 1\n            It's a 7 -- the first die shows a 5 and the other one a 2.  Nothing happens for a minute.  You stand there in silence, waiting to find out what this throw of the dice means to anything.  As you're about to speak, however, a trap door suddenly opens under the prisoner and he drops.  Just as quickly his fall is \"broken\" by the loud, cracking snap of his neck.  A noose, which you hadn't noticed before, snaps his neck and kills him instantly.  Whoa, you think, random chance just killed somebody.  It occurs to you this is an apt metaphor -- back on Earth, at least -- for the arbitrary nature of punishment.  \n\n            Then the simulation comes to an end.  After fiddling with the cube for a few moments you realize it's not opening up again anytime soon.  So you power it down.  Perhaps the next time you visit you will find more, since there are other aspects of this library you failed to see this time.\n\n            Now you're alone in your room, the familiar Niah scenery outside and the orange sun overhead.  Time for lunch.  You're on Niah, after all, and you have your own life to worry about.  It won't be written here -- we're coming to the end of our story -- but it will be worth living.  Best get started.\n            *finish\n\n          *else\n            Snake eyes.  You look down to see four little black dots side-by-side.  Nothing happens for a minute.  Finally, just as you're about to speak up, the hooded prisoner falls to the ground in a soft thud.  At first you think he's dead but when you check you find he's sleeping soundly.  He looks entirely at peace.  Funny, you think for a moment, how a simple comfort can mean everything in such a context.  Was that really all thanks to a random roll of the dice?  Is that what punishment means?\n            *goto bland2  \n\n  #The wounded old man in rags.\n    *if corruptible > 60\n      You walk towards the lifelike image, the broken figure before you clearly displaying the mortal effects of prolonged abuse and maltreatment.  \n\n      \"Humanity is spreading across space,\" he says, weakly, \"yet knows not where it is going or what it carries.  A body can die of its wounds even if those wounds are self-inflicted.\"\n\n      You're seriously not understanding what this dying old man is talking about.  You suspect a more thoughtful person might get the symbolism.  In any event what the man does next is crystal clear.  He pulls a modern handgun out of, well, somewhere in his rags, stands up and puts it behind his back.  From the angle of his arm you can tell he's pointing the gun at himself.  Since he's facing you, that means the gun he's holding is pointed at you, too.  You hear the \"click\" of the safety coming off and then, instantly, the man's stomach explodes.  At almost the same time you feel your own chest cave in -- you have actually been shot.  Whatever projectile came out of that gun exploded through the man and hit you, too.\n\n      You do not see the real gunman standing in your living room.  You do not notice the real gun pointing at you. \n\n      Your past has caught up to you.  You are dead.\n      *goto_scene ending \n\n    *else\n      The mortally wounded old man begins to speak.  You're pretty sure it's Augustine's own voice you're hearing.  It's coming from nowhere in particular but it fills the room.  \"I will be killed,\" Augustine says.  \"But that is fine with me.  The purpose of life is to make the world a better place.  My life no longer serves that purpose.  Hopefully my pending death will serve the greater good.\"\n\n      He has a flair for the theatrical, you give him that.  Especially since he then seems to stop doing anything.  Just a long pause as you sit there, waiting.  Just as you're about to power down the cube, Augustine says one more thing:  \"All information eventually comes to light.  Nothing can be suppressed forever.  To think that civilization can survive through deceit or denial is like trying to hold off the ocean's tide with a broom.\"\n\n      Is he talking about his work?  The reason why he died?  The quarantine screen itself?  Or all of it?\n\n      You never find out.\n      *page_break\n      *set corruptible + 10\n      *goto bland2\n\n*label bland2\nIt occurs to you, as you look at these images, that this little cube has a lot more in it that violates the quarantine screen than you were lead to believe.  Maybe you should put your money where your mouth is and get rid of it.  What do you think?\n*choice\n  #Destroy the cube.\n\n    Reluctantly you conclude that, however fun it is to play with, the cube can't exist out here.  Not with some of this stuff you're finding.  So you wipe it clean and turn the velvet box into a paperweight.\n\n    For a second you start to panic that you've destroyed your last real link to Earth.  Then you get over it.  You're on Niah, after all, and you have your own life to worry about.  Between the memories of your old home and your possible investigations here, you might never get past this opening mystery.  You don't want to become one of those people stuck always living the same crisis over and over again.  You used to know somebody who'd been in a serious earthquake, and the way she talked about it you figured it had happened right before you met.  Eventually you found out that this disaster had taken place twenty years earlier.  She had simply never been able to get past it -- it had come to define her.  \n\n    I want to expand my horizons, you think to yourself, literally.  I'm on a bigger planet with a bigger horizon.\n\n    Right now you have your new life to worry about.  It won't be written here -- we're coming to the end of our story -- but it will be worth living.  Best get started.\n    *set ambitious - 10\n    *set enlightened + 10\n    *set velvet 0\n    *finish\n\n  #Whoa, let's not do anything stupid.  This cube is awesome.  \n\n    Yeah, that idea doesn't last long.  This isn't just a toy; it's a priceless repository of Earth civilization.  You owe it to society to keep it safe.  (That's what you tell yourself, anyway.  Really it's your favorite way to entertain yourself.)\n\n    Besides, you're keeping it safe.  What are the odds, you think to yourself, that anybody who isn't supposed to look at it will ever find this thing?  So you stay engaged with the library.  The figures, to your surprise, vanish -- they seemed to activate only upon arrival and once you picked something the rest dissolved away.  Along with the sign that was inviting you to make a choice.  You're left standing there in a decaying old tunnel under a simulated pile of ancient ruins.\n    *set corruptible + 10\n    *set enlightened - 10\n    *goto velvetend\n    \n*label velvetend\n*comment short exploration that ends with hint that your team were the DNA mules and Augustine the bait\n\nYou are alone at the end of a narrow hallway.  \n\nThere is a lamp at your feet.  Do you pick it up?\n*fake_choice\n  #Yes.\n    You have picked up the lamp.  But the light's good enough here that you don't need it right now.\n\n  #No.\n     You leave the lamp where it is.  The light's already good enough here that you don't need it.\n\nThis sure seems familiar, you think, but as you start racking your brain you hear a soft noise coming from farther down the hallway.  You head towards the sound.  \n\n*page_break\nBefore long you're in a small room.  Several plush chairs are arranged around a small wooden table.  Soft lights illuminate the brick walls -- with no light source you can see -- and the noise is much louder.  And it's not just a single noise.  It's a cacophany of sound coming, by all appearances, from outside the room.  You instantly recognize what you're hearing as the typical sounds of a city street on Earth.  Vehicles, people, machinery -- all the things that were going day and night back home that you just don't hear out here on Niah.  If you close your eyes you could be in the bedroom you haven't slept in in 40 years.  \n\nSoon you hear something else.  Footsteps.  They're not part of the noise from outside but instead are coming from the same hallway you just walked through.  After another moment two people enter the room.  One is a person you've never seen before.\n\nThe other you recognize immediately -- one of the people who interviewed you for the quarantine officer position.\n\nThey're in the middle of a conversation as they walk over to the table and chairs.  To your surprise they don't seem to notice you.  It's as though you're not even there.  Whatever this is it's not interactive.  You seem to be a witness to some kind of fixed recording.  \n\nThe person you don't know is talking.  \". . . . confirmed they'll all have the same modification,\" he says.  \"In fact it's already been done.\"\n\n\"I have the perfect decoy,\" your interviewer answers.  \"One of the exotics.  I won't say who, but it needed to be someone whose demise generates instant suspicion but doesn't provoke any meddling from outside the team.\"\n*page_break\nThe mystery man smiles.  \"I'm pretty sure I know who you're talking about.  I've seen the passenger manifest.\"  Both of them are nodding.  \"If it's who I think it is then good choice.\"\n\n\"Of course,\" she says.  \"Either he'll deliver it or they will.\"\n\n\"And that's all I need to know,\" the man says.\n\nThey get up and leave together, walking past you like you're not even there.  Which in a sense, you think, is true.  Why are you here?\n\nThis is something for you to think about.  You don't find anything else noteworthy in Augustine's library.  This conversation appears to have been a time-triggered recording from back on Earth, half a lifetime ago, only to be viewed by you (or someone in your place) a certain number of days into your possession of the cube.  Too late, it seems, to do anything about whatever information it is you've just been given.  Nevertheless, you walk away with a newfound desire to make a proactive difference.\n*set enlightened + 10\n*set egalitarian + 10\n*set sentimental - 10\n*finish\n\n*label distress1\n*comment this is a quick blurb describing what Hadley's World seems like\n*if sentimental \u003c 40\n\n  Meanwhile the other transmissions from Hadley's World -- admittedly also three years old -- paint the picture of a planet quickly losing interest in Earth.  It's even farther away from the homeworld than Niah.  And it's another voyage removed.  That combination, plus the local culture taking shape, mean the people out there simply don't care much about what's back in a far-off system most of them have never seen.  There's a theory running through Niah that just as the English colonists burned their galleys when they landed at Plymouth Rock, so too the Hadley's World folks might have let their starship simply drift away.\n  *set goal 1\n  *goto distress2\n\n*elseif egalitarian \u003c 50\n\n  Meanwhile the other transmissions from Hadley's World -- admittedly also three years old -- suggest the planet is becoming more insular.  For a variety of reasons the political culture there is growing oppressive.  And, from the looks of it, paranoid.  It's entirely possible that those in control of Hadley's World have tried to limit access to things like starships.  It's easier to control a planet when you control the means to leave it.  That also makes any potential salvage mission from Niah a lot riskier -- Hadley's World might not be willing to give the ship up.  And it might not welcome meddlesome visitors from another planet.\n  *set goal 2\n  *goto distress2\n\n*else\n\n  It's unusual to organize this kind of voyage, however.  It's especially odd in this instance since Hadley's World otherwise comes across like a reasonable place.  It's a cousin world, or maybe even a brother or sister world, with the same basic cultural framework as your own.  You're all on the same team out here, and your tenuous links are all that you have keeping you connected to the larger human civilization.  All the more reason, it seems, to be concerned about what's happening to that starship and, potentially, the planet that's supposed to be maintaining it.  \n  *set goal 3\n  *goto distress2\n\n*label distress2\n*comment this is the exemplary choice about what to do\n*page_break\nSo that's what you're looking at when the time comes to decide about going to Hadley's World.  You're on the eligible list and now it's time to decide for good.  Now that you know everything there is to know, what do you want to do -- stay here on the planet you've come to know or move on to yet another new world?\n*choice\n  #Yay adventure!  I go with the Artemis.\n\n    \"Good to have you on board . . . again, ${lastname}.\"  Debussy holds out his hand as you board the ship through the primary starboard airlock.  Then he turns back to business at hand, which is explaining to the ship's crew what exactly the Artemis is doing.\n    *goto distress3\n\n  #Nah, I'm good right here.  I don't need this kind of trip.\n\n    That's the last choice you'll make in this story.  What happens with the rest of your life is another story for another day.  The Artemis and its crew will leave Niah orbit only a week after you opt out of joining them.  What awaits them nobody on Niah is entirely certain, and in a sense you're jealous of the possibilities you won't be experiencing first-hand. \n\n    *gosub adios\n    *set sentimental - 5\n    *set egalitarian - 5\n    *set enlightened - 5\n    *set corruptible - 5\n    *set ambitious - 5\n    *set goal 0\n    *finish\n\n*label distress3\n*if goal = 1\n\n  \"As I was saying,\" he continues, \"we are likely dealing with a falling world.  They have either lost, or abandoned, the ability to maintain starflight.  I have seen this once before, in fact, and it is surprisingly easy to happen.  No worry, though, because it is surprisingly easy to reverse as well.  All it takes are the necessary assets.  In any culture there are always ambitious individuals looking for an advantage, and with the right incentives they will eagerly renew whatever greatness their compatriots tossed aside.\"\n\n  This is all a bit grand, you think to yourself, since there's no evidence yet that the entire world is failing like their starship's orbit.  But perhaps Debussy knows more than is commonly realized.  Perhaps what is happening on Hadley's World is worse than is generally thought.\n\n  Debussy is still talking:  \"This also gives us an opportunity.  By law an abandoned ship belongs to whomever can salvage it.  It has been thus since the days of the old sailing ships on Earth's inland seas.\"  There's a gleam in Debussy's eyes as he says this.  The possibility of arriving at Hadley's World with a starship, itself the most valuable asset known to humanity, and then doubling that asset right away, is almost too good to be true.  \"This is what one needs,\" Debussy says, \"to establish a profitable trade route.\"\n  \n  Definitely grandiose, you think, but when has he not been?  We'll see what happens . . . .\n  *finish\n\n*elseif goal = 2\n\n  \"As I was saying,\" he continues, \"we are likely dealing with a closed world.  They have somehow failed to maintain the openness necessary to perpetuate enlightened society.  Humanity has of course seen this effect countless times throughout its history.  Yet history also teaches us the ways to best combat it.  Hadley's World may have its troubles at the moment, but do not let that dissuade you from the ultimate success of our mission.\"\n\n  He almost sounds like a missionary or a general, you think to yourself as he speaks.  In any event he's continuing:  \"There is no reason to expect hostility.  When we arrive we will, most likely, be able to correct whatever minor flaw has arisen in their operations within a brief time.  So long as there are interested parties willing to make the required effort, it really is rather difficult in this day and age to isolate one's society from the larger spread of human civilization.\"\n    \n  Definitely grandiose, you think, but when has he not been?  We'll see what happens . . . .\n  *finish\n  \n*else\n\n  \"As I was saying,\" he continues, \"we honestly have little understanding of the predicate acts that have necessitated this relief mission.  We know that Hadley's World's sentry ship is in an unstable orbit.  We know that the planet otherwise appears untroubled.  Those two facts do not complement one another.  Indeed their pairing is, by any rational measure, logically incoherent.\n\n  \"There is no benefit to be had from further delay, however.  We are therefore setting sail to this sister world, three light years distant, to offer whatever assistance our brethren may require.  In this I can merely offer you my renewed appreciation and admiration.  We will arrive safely -- of that I have no doubt -- and will then address whatever unknown happenings have brought us there.  I look forward to it.  It is an exquisite mystery that calls on our unique talents to resolve.\"\n\n  *page_break\n  Oddly, this speech puts the whole trip in a new and comparatively less appealing light.  It's an unexpected mix of pomposity and ignorance.  You're giving up years of your life for a logical incoherence?  But it's obviously too late to back out now, and in any event your concern quickly passes.  There's just something so intoxicating about a trip like this.  After all, if interstellar travel were always entirely predictable, safe and bland, people would be a lot less interested in doing it. \n  \n  We'll see what happens . . . .\n  *finish\n\n*label adios\n*comment this is if you stay then bryson goes to hadley's world \nYou get a surprising call from the Artemis on the day it departs.  It's Bryson.  She's standing in a crowded hallway.  She's got her back up against the wall, trying to make space while teams of people shuffle past her on their way to the freezer pods.  It's a bit awkward for a voice call but it's the only option.  There are very few empty spaces on a starship at the best of times and on the day of embarkation there are none at all.\n*if brysoninvest = 1  \n\n  Bryson looks good, you think.  She looks healthy and upbeat and she's smiling warmly at you.  \"Hey there,\" she says, \"I'm glad I caught you.  Obviously you know where I am so you know what I'm up to.  I just --\"\n\n  The message cuts off for a minute.  A gentle voice chimes in that the signal has deteriorated due to propulsion interference, which you immediately understand to mean the Artemis' engines.  Starship engines emit all sorts of waves of various frequencies that sometimes disrupt communication, especially when there's a large planet in the right place nearby off which they can bounce right back to you.\n\n  Eventually the interference passes, but not without consequence.  \"Sorry,\" Bryson grimaces, \"that used up most of my time allotment.  Listen, I just wanted to thank you for your trust in me.  It meant a lot.  I'd say more but I'm out of bandwidth.  I hope you and Dallas and Heddes can --\"\n\n  But that's when the transmission ends.  There are hundreds of people on that ship trying to send departure day messages and they all get a turn.\n  *page_break\n  Damn, you think to yourself.  You didn't realize how happy you felt seeing your trusted junior officer again until her face showed up.  No sooner does that happen, however, than she's gone again -- this time for 7 years at least.  And she didn't even get to say everything she'd called to say.  Though Bryson's words of appreciation hit their mark; for once you feel satisfied.  Then you think about what she wanted regarding Heddes and Dallas.  Like you, they're both still here on Niah.  Bryson hoped the three of you would . . . what?  Keep in touch?  Work together?  Follow her out to Hadley's World?\n\n  You realize you need to work on that.  You make a note of it and then get back to what you were doing.  A few hours later, when you're sitting down for a pleasant dinner, you make sure to have a clear view of the southwest sky.  Right on schedule a bright new star suddenly appears.  It begins as a sharp white dot against the steadily darkening sky.  But unlike the stars that gradually appear around it, this white dot not only grows larger and brighter, it also starts to stretch out.  As the Artemis pulls away from the planet its propulsion tail just gets bigger and bigger.  Within a few hours it's a glowing oval as wide in the sky as your outstretched hand.\n\n  You'd only been planning to watch it for a little bit during dinner.  But you find you're so captivated by what you're watching you stay up most of the night.  Humans leaving one planet for another, neither of which is Earth.\n\n  \"God, what a beautiful sight,\" you whisper softly to yourself.\n  *set filler 1\n  *return\n\n*elseif ruth = 2\n  *comment she scolds you because her guilt had been weighing on her\n  She looks good, you think to yourself.  She's matured a bit, seems more assertive, acts like a real pro.  What you also notice, though, is that Bryson doesn't seem happy to see you.\n\n  Yet she's the one who called.  \n\n  \"Hi there ${firstname},\" she says, flatly.  \"Obviously you can see I'm aboard the Artemis.  We're shipping out in a couple hours so I'm about to go under the ice.\"  You chit chat for another minute or two about the voyage and what you had for lunch and a few other things.  Yet throughout the smalltalk it's clear Bryson has something else on her mind.  Finally she cuts to the chase.\n\n  *page_break\n  \"Look I'm running out of time, ${firstname}, and I need to get this off my chest.  That passenger, Ruth, I know what happened to her.  We never talked about it but we all know it wasn't right.  Heddes actually wanted to go to the local authorities at one point but Krissa talked him out of it.\"\n\n  Dread had been slowly seeping into your throat as Bryson talked.  But that news about Mackenzie blindsides you.  You never had any idea.  You never had any idea that your team had discussed turning you in, of course, but you also had no idea your deputy was the one who saved you.  You start to wonder why.\n\n  \"It is what it is,\" Bryson continues.  \"And we don't have time to talk about it anymore.  But I wanted you to know.  There but for the grace of god, as they say . . . .\"\n\n  The call terminates.  All that's left is a three-dimensional image of the Artemis floating before you, with the phrase \"thank you for your interest\" superimposed over it in bright red letters.  She's got some anger left.  Hopefully it doesn't cloud her experience in spaceflight.  \n  *set enlightened %-10\n  *set corruptible %-10\n  *set filler 2\n  *return\n\n*else\n  *comment she says you could have been bigger\n  Bryson looks good, you think.  It's good to see her.\n\n  \"Good to see you again,\" she says, while dodging crowds of busy passengers shuffling past.  \"Obviously you can see where I am.  We've just been going over final preflight briefings.  I won't lie; this is pretty exciting stuff.  No matter what happens I'm looking forward to it.\"\n\n  Bryson goes on for another minute or two like this, telling you -- as if you'd asked -- about the more interesting and important aspects of the mission.  It soon becomes clear what she's doing.  \"You know, Bryson,\" you say, \"if I didn't know better I'd say you were trying to make me jealous.\"\n\n  \"I am.\"  Suddenly she's serious.  \"You should be.  You know why?  Because you should be here with me.  You should be up here, on the front lines, keeping the fabric intact.\"\n\n  *page_break\n  The \"fabric\" is the term serious people have started using to refer to humanity's ever-widening web of interstellar civilization.  Something that can stretch and cover but can also tear.  Something that needs to be maintained, patched up, cleaned.  If it's what's keeping the rain off your head, or the cold from your bones, then a tear in the fabric renders it useless.  \n\n  \"It's why you're here,\" she's saying, referring to this area of space.  \"It's why you were on the Jessica in the first place.  You arrived in such a privileged position and now . . . .\"  She sighs as her voice trails off.  \"Anyway, please keep doing your best.  Please keep striving.  You're here for a reason, and it's got to be important.\"\n\n  Before you've even said anything in response, Bryson ends the call.  \"We only get a little bit of time,\" she explains, \"and everybody's waiting their turn.  I hope you'll appreciate that I used up my allotment talking to you.\"  Then she smiles again and waves goodbye.  The call terminates.  All that's left is a three-dimensional image of the Artemis floating before you, with the phrase \"thank you for your interest\" superimposed over it in bright red letters.\n\n  Well, you think, that was a bit of a splash in the face.  But you always liked Bryson and even if she wasn't very nice just now, she also had a point.  Perhaps her experience will be something to tell the world about.  \n  *set filler 3\n  *return\n\n*label happyend\n*comment this is where you don't want to check augustine's cube library so throw in some other little narrative that takes place outside\n*page_break\nA few days later and you're sitting dockside at the Niah city waterfront.  Throngs of people mill about -- it's a rare pleasant and sunny day and everyone's trying to enjoy it.  Behind you the cafes are gradually filling up with a lunchtime crowd.  In front of you the water stretches away down the narrow, mountainous passage towards the sea.  You can see the banquet hall where Debussy's party took place.  The building is quiet now.  How different it was, you think, that night you were there.\n\nThere's a large squadron of sailboats not far from shore, gathering for what looks like a race.  Even on what passes for a calm day the winds can be pretty strong here so sailing has really taken root.  Out on the ocean the winds can be fierce.  Somebody apparently tried to sail around the planet a few months before you arrived, thinking that a modern boat with the latest technology could harness Niah's tempestuous winds to zip speedily around the globe.  He only got a third of the way before an evac mission had to come get him.  But no sooner had he dried off than he vowed to try again.  A couple other adventurers are planning voyages of their own, too.  Everyone wants to be this world's Charles Lindbergh, or Ferdinand Magellan, and this is the kind of feat that's captured peoples' imaginations.  Sailing on an alien planet.  Ancient technology wedded to futuristic fantasy.\n*page_break\nAs your mind starts to wander you're brought back to the here and now by a conversation right behind you.  \n*gosub chatter\n*gosub chatter1\n*page_break\n*comment here's an opportunity for debussy to damn with faint praise by saying about time you found this and this is why im happy you were in charge (and not somebody better)\nAs you stand there contemplating what's just happened, the situation takes a turn for the bizarre.  Debussy, of all people, wanders past you.  The man looks resplendent as usual.  He's trailed by a half dozen functionaries tending to his myriad tasks, including one person whose primary duty seems to be ensuring that nobody gets too close to him.  Suddenly Debussy catches a glimpse of you and halts.  Smirking slightly, he walks slowly over to you.  \"My dear ${firstname},\" he says, his suntanned arms outstretched in a show of affection, \"how delightful to find you here.\"\n\nThe two of you exchange pleasantries and smalltalk for a few moments while Debussy's assistants look on curiously.  Then Debussy cuts to the apparent chase.  \"Let me guess,\" Debussy inquires, \"have you by any chance just come into possession of an unexpected item?  Something one might even consider to be, say, disconcerting?\"\n\nYour mind immediately turns to the card in your sleeve pocket.  \n\nClearly he's up to something, you think.  It can't be a coincidence that you were sitting here twenty minutes ago minding your own business and now you're being interrogated by one of the more powerful men in this region of space.  \n\n\"And assuming you have,\" Debussy continues, \"what do you make of it?  Or better yet, what does it tell you about you?\"\n*choice\n  #\"What are you talking about?\"\n\n    \"What indeed,\" Debussy answers.  \"What indeed.  And that is precisely why I appreciated having you as the commanding officer of our voyage's quarantine screen.\"\n\n    Wait, you think, is he insulting me?  \n\n    Debussy anticipates your reaction and responds before you do.  \"Please do not take that as an insult,\" he soothes.  \"I merely mean to remark that you have stayed true to your endearing habit of being as much an observer as a participant in life's events.  After all, it is a beautiful day and you seem to have found a splendid location to enjoy it.\"  Then he moves to end to conversation.  \"My obligations await,\" he says, motioning to the squadron of people behind him, \"and unfortunately I cannot spare any more time.  I will leave you to your sightseeing.  Those sailboats make a beautfiful sight on the water.  Should you wish you try sailing one of them, I have a few interests in some of the more modest vessels.  I would be happy to facilitate an arrangement between one of their captains and yourself.  Adieu, Captain ${lastname}, until the next we meet.\"\n\n    You're caught off-guard a bit by all of this.  Only after Debussy leaves do you realize what he'd just said about the quarantine screen and your involvement in it.\n    *finish\n\n  #\"It doesn't tell me anything.\"\n\n    \"Perhaps not to you,\" Debussy responds, \"but rest assured if that is really the manner in which you see things, then it tells me everything.  I am reminded, once again, why I was so pleased to have you commanding the quarantine screen on my ship.\"\n\n    Wait, you think, is he insulting me?\n\n    Debussy anticipates your reaction and responds before you do.  \"Please do not take that as an insult,\" he soothes.  \"I merely mean to remark that you have stayed true to your endearing habit of being as much an observer as a participant in life's events.  After all, it is a beautiful day and you seem to have found a splendid location to enjoy it.\"  \n\n    \"And I am merely observing,\" you say, \"that the relationship between my being here on this sunny day and a curious card that was just given to me is not readily apparent.\"  Even as you say these words your brain starts telling you not to be so wordy.  You're caught up in trying to rhetorically out-flourish Debussy, which is like trying to be taller than a giraffe.  \n\n    \"I understand,\" the man says.  \"And of course you are right.  But that is also my point.\"\n\n    You answer quickly.  \"I'm afraid I don't see your point.  Nor do I appreciate the insinuation that there was some deficiency in the way we screened passengers aboard ship.\"\n\n    Debussy smiles.  \"Captain ${lastname}, please do not take offense.  You were an excellent officer.  You should be very proud of your accomplishments.  It is a measure of my appreciation for your service that I have taken this time to see you today.\"  Then he moves to end to conversation.  \"My obligations await,\" he says, motioning to the squadron of people behind him, \"and unfortunately I cannot spare any more time.  I will leave you to your sightseeing.  Those sailboats make a beautfiful sight on the water.  But you already know that.  Adieu, Captain ${lastname}, until the next we meet.\"\n    *finish\n\n  #\"That I don't know all there is to know.\"\n\n    Debussy grins.  He looks oddly satisfied, like he's just eaten an unexpectedly good donut or something.  \"Captain ${lastname}, I congratulate you on your self-awareness.  It is not often that a man of your pedigree can acknowledge deficiencies in his own knowledge base.  Would that we showed such modesty of thought more often.\"\n\n    Wait, you think, is he insulting me?  \"Modesty of thought?\"  \n\n    Debussy anticipates your reaction and responds before you do.  \"Please do not take that as an insult,\" he soothes.  \"I merely mean to remark that you have stayed true to your endearing habit of living within your own limitations.\"  You start to think that that's not much better before Debussy continues:  \"There is indeed more going on out there --\" he's waving his arms in a broad circle to encompass the world around him --\"than we often realize.  It takes an exceptional quality of inquisition to fully peel back every layer encapsulating our society.  Even though, as we know, the results of such effort are often not worth the expenditure.  So it is with admiration that I acknowledge the manner in which you have tried to find a balance.\"  He looks out onto the water, taking in the scenery.  \"It is breathtaking in its beauty,\" he says.  \"It is truly something to behold.\"\n\n    This all sounds pretty patronizing.  You're really not sure where he's going with this and say as much to him.\n\n    \"Well,\" Debussy responds, \"in a manner of speaking I suppose that is my point.  I regret that I do not have more time to continue our repartee, but as I take my leave I hope I can at least plant a seed in your consciousness -- that there are additional layers of complexity beneath any surface.\"  He's looking out on the water now, following the sailboats with his gaze.  \"Those small ripples can become crashing waves in a simple matter of minutes.  We have seen the storms that can roil this landscape.  In the proper circumstance we might even depend on them.  I speak both literally and metaphorically, of course, when I say that we must always assume there is more out there than meets the eye, as you might say.\"\n\n    With a nod of the head he bids you adieu and walks away, his attentive lieutenants following in his footsteps.\n    *finish\n\n*label chatter\n\n*comment this is the far-off settlement with the funny dialect\n*if filler = 1\n  A group of people are speaking loudly in a dialect you don't recognize.  Intrigued, you start listening more closely.  The accent is odd and the vocabulary just doesn't seem right.  One man keeps saying \"praygue,\" which rhymes with \"vague\" but isn't a word you've ever heard before.  A woman he's with insists that everyone else \"ship it.\"  It doesn't take long for you to figure out they're visiting from the far end of the continent.  \n\n  Soon they move on -- they're sightseeing, it seems.  But before they're out of sight you notice one of them is handing out what looks like a leaflet or a card.  She's offering them to anyone nearby.  Then she walks towards you.\n  *return\n\n*elseif filler = 2\n  *comment this is learning the climate models don't work\n  It seems there are other people here at the waterfront thinking about sailing adventures.  \n  *page_break\n  \"What we really need,\" one man is saying, \"is the climate data the Artemis and Persephone collected.\"  He's referring to the last two starships to spend time orbiting Niah.  \"They monitored the system for years on end.  Saw ocean currents that we can still only guess at from our vantage point.  Yet these damn shipping companies treat that stuff like it came from some top secret military reconnaissance.\"\n\n  \"And nobody down here can be bothered sending up the satellites we need when so much of the planet is uninhabited,\" a second man answers.\n\n  \"Not just uninhabited but under-freaking-water,\" the first man says.  \"All anybody wants to know is where the minerals are.  Or where the pretty water is.  Fat lot of good that'll do to a sailboat circumnavigating the globe.\"\n\n  A woman with them speaks up:  \"Although,\" she drawls out slowly, \"maybe we can cage two birds with one stone as they say.  A boat over the ocean can collect a lot of data.  That might be valuable.\"  She and her two companions continue talking in this vein for a few more minutes all while you sit there trying not to look like you're listening.  Finally the woman says it's time for them to leave.  The men start to walk off but the woman straggles behind for a moment before, to your great surprise, she turns to you.  \"If you're who I think you are,\" she says, \"then you should probably have this.  I found it the other day.\"  \n  *return\n\n*else\n  *comment this is the intersystem poetry club\n  Two people are having a conversation about their poetry club.  They're talking about the latest offerings from one of the members on Niah's main moon.  You immediately know who and what they're talking about.  This is your club!\n\n  It's the first time since you joined up that you've actually talked to other members in person.  The three of you catch up and compare notes.  One of them is a local but the other is a woman who normally lives on the moon (but it wasn't her poetry).  She's here for some kind of medical procedure that the lunar colony doesn't provide.  Between the three of you -- the local, the recent arrival, and the off-world visitor -- there are all sorts of perspectives you have about where you are.\n\n  Eventually they have to leave.  But before they do the woman takes you by the arm, lowers her voice somewhat and speaks to you in a gentle tone.  \"It's actually a good thing you're here.  It's a two-day flight from home down here, and on the trip you really start to see the same stuff from people over and over.  It becomes kind of hard to tell what's what.  But I found this.  I didn't recognize it and nobody else had anything like it.  For all I know it had been there for weeks.\" \n  *return\n\n*label chatter1\n*comment this is what she gives you based on the v2 exotic variable\n\nShe smiles and hands you a card.  \n*comment this is the skeleton playing card with markings\n*if exotic = 1\n  It takes you a second, but when you recognize it you're instantly taken aback.  She's given you one of the mark
