\n\n*if exotic = 1\n\n  \"Well,\" he says, \"Officer Dallas was telling me about those skeleton playing cards he'd found and it got me thinking about this issue I have with a passenger here.  Her name is Karina Mustafa.  She's got family out on Niah already and they're expecting her.  But I think she might be the wrong person.\"\n  *goto screenending3\n\n*elseif exotic = 2\n\n  \"Well,\" he says, \"Officer Dallas was laughing about the bogus lifestyle coach he found.  And it got me thinking maybe I had something a little similar on my hands with this passenger named Karina Mustafa.  I think she's the wrong person.\"\n  *goto screenending3\n\n*else\n\n  \"Well,\" he says, \"Officer Dallas was telling me about the Verdunite whose daughter is on board.  And I started wondering whether I had something similar on my hands.\"  He points to a sleeping passenger in front of him.  \"This here is Karina Mustafa.  I think she's the wrong person.\"\n  *goto screenending3\n\n*comment you're going to work Mustafa's mind but no matter what you choose she winds up with memories that sound like Heddes' and she has this gnawing desire to find somebody (that she was) -- that explains the later interaction and why it's new, so just make sure to keep it consistent\n\n*label screenending3\n\n\"Okay,\" you say, \"the wrong person.  What the hell does that mean?\"\n\nHeddes looks pained.  \"Well that's the thing, sir.  I'm not actually sure.\"\n\n\"Then back up, Heddes, and tell me what you're talking about.\"\n\nHe still looks pained.  Heddes shuffles a bit and you can hear his external supports quietly clinking.  Even though they're not necessary in the Jessica's environment he's started wearing them to prepare for Niah.  \"It's weird,\" he says, \"There's a Karina Mustafa in the manifest.  And there was a Karina Mustafa on Earth.  And the person frozen in this pod is labeled Karina Mustafa and she fits the description.\"\n\n\"But,\" you say.\n\n\"But,\" a nodding Heddes adds, \"I think she's somebody else.\"  He points to a series of images on the status board that came from this passenger's screen.  \"There, there and there -- you can see the anomalies for yourself.  Whoever this person is, she reacts to 'Karina Mustafa' like it's a different person.\"\n\n\"Then who is this,\" you ask, \"and what happened to the 'real' Karina Mustafa?\"  Even as you ask these obvious questions you dread the answers you know are coming.\n\n\"I don't know, sir.\"  Yep, thought so.  \"Since we're only seeing this problem now, we obviously can't ask Earth.  It would be 80 years before anyone got back to us.  And there's no other information on file.  She could be a stowaway, or just a mixed-up name, or maybe her friend, I don't know.\"\n\n*page_break\n\nThis is a new problem and it's frustrating that it came so close to the end of the process.  There's so little time left.  You can't really investigate much and you can't wait for further instructions.  All you can do, since you'll be letting this person loose on a new world, is to make this passenger as harmless as possible.  You've got a couple of options on how to do that, and what you choose will definitely impact how she lives on Niah in the future.\n*choice\n  #Make her think she's the 'real' Karina Mustafa.\n    *gosub end_trial\n\n    You decide that since she's apparently pretending to be Karina Mustafa, go all the way and make her the real one.  You order Heddes to alter her neural pathways so that she no longer reacts to the thought of 'Karina Mustafa' as though that were a stranger.  Instead she'll think she's who she is apparently pretending to be, if that makes sense.  Whoever else this person might have been will simply fade away and a new identity will replace it.  Any gaps in her memory will simply be shrugged off as the aftereffects of interstellar spaceflight (a delightfully convenient excuse quarantine screeners have been using for years).  \n\n    With only a few hours to go Heddes heads off and gets to work.  This time tomorrow a woman named Karina Mustafa will be heading down to the surface of an alien world.  She'll never have known herself as anyone else.\n\n    Meanwhile you and the team will be able to relax for a few hours and congratulate yourselves on a job well done.\n    *set sentimental %+10\n    *finish\n\n  #Eliminate any reference to Karina Mustafa whatsoever.\n    *gosub end_trial\n\n    You err on the side of caution.  You don't know for certain who this person is but she's apparently not who she's supposed to be.  So you eliminate those references entirely.  Let this person emerge on the surface of Niah with a little 'freezer burn,' as they call it -- the amnesia that sometimes comes with deep interstellar spaceflight and coldsleep.  The fact that quarantine screeners, not coldsleep, are usually responsible for freezer burn is your little secret.    \n\n    With only a few hours to go Heddes heads off and gets to work.  This time tomorrow a woman will be heading down to the surface of an alien world.  She'll have an opportunity to invent a new identity for herself.\n\n    Meanwhile you and the team will be able to relax for a few hours and congratulate yourselves on a job well done.\n    *set sentimental %-10\n    *finish\n\n*label end_trial\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n  *return\nRemember earlier how we told you that the first two chapters are available for free? This is the end of the free content.\n\n[b]To find out what happens next, please purchase the remaining chapters.[/b]\n*purchase adfree $3.99 purchased\n*abort\n*label purchased\n*return", "cleancowv3": "*comment Choice of Worlds Vignette 3\n*comment Copyright 2013 Andrew J. Schaefer\n*comment The starship Jessica arrives at Niah and you get an opportunity to make a few choices about civilization's path\n\nArrival!  \n\nThe strangest sensation envelops you as the Jessica finally settles into orbit around Niah.  Until now the ship had been going through the final stages of deceleration, first increasing the engines' reverse thrust and then dropping into a temporary orbit around Niah's sun for help in finally slowing down.  \n\nNow, for the first time since you awoke, the Jessica's engines are off.  Which means the artificial gravity their propulsion created has also disappeared.  You no longer weigh anything.  Instead you're being held in place by the ship's artificial grav system.  It's an energized field running through all the floors that weakly attracts these pads and rings built into your starship suit.  So while your body still feels weightless, your clothes are pulling on you, almost like you've been tied down by a hundred little strings.  It's a strange substitute for actually being on a planet somewhere and takes some time getting (re)used to.\n\n*page_break Is there a window somewhere?\n\nAlso for the first time you have a clear view of your new home world.  Not a computer image from an observation post but the actual planet itself through the window.  You've seen Earth a million times, and you've also seen Venus and Mars in person and the other planets in Earth's solar system in simulation.  But never before have you looked with your own eyes upon an Earthlike world that isn't actually Earth.\n  \nIt's a bizarre experience, something you knew was coming but which still leaves you deeply moved.  Here before you is another planet where humanity, where life of any kind, can thrive.\n\nWhen you look at Niah you see clouds swirling across broad oceans.  You spot landmasses rising up from the waters, including the planet's one main continent slightly south of the equator that so far is the focus of settlement.  Niah has even more ocean than Earth.  \n\nThe added water isn't the biggest difference to your eyes, however.  What really stands out is the planet's odd color.  Niah's sun is more orange than Earth's yellow Sun and slightly fainter, too.  The combination makes Niah look like Earth through a mild orange filter.  Your mind keeps trying to tell you there's something wrong with what you're looking at.  It's yet another jarring characteristic you'll have to get used to out here in a new sector of the galaxy.  \n\nThen Niah's bag of tricks reveals one more surprise.  As the Jessica continues around the planet it eventually moves into the night side.  And instead of the bright latticework of lights on Earth, here you see almost nothing but dark.  There's a large thunderstorm near the equator and a scattering of isolated lights elsewhere, but otherwise Niah's night side is a looming mass of darkness.  It's eerie, almost upsetting -- like looking at an entire city with nobody in it, or at a black hole floating among the stars.\n\n*page_break\n\nBut you know that just means this planet is still being populated.  Your vantage point is from the Jessica's parking spot in high orbit above the planet.  From here you can not only look down on Niah, you can also pick up the handful of other starships that are here.  One of them recently arrived from another nearby planet, while a second hasn't left Niah since it arrived from Earth eight years ago.  \n\nYour telescopic gaze fixes on that second ship, the Artemis.  It's another Earth-based starship, but unlike the Jessica it spots only a handful of safety lights and a trio of warning beacons.  There is no other evidence of activity on board.\n\n*if krissa = 2\n\n  \"Jesus, look at that ship.\"  It's Mackenzie.  You didn't hear her approach, but she's now standing just behind you and to one side, staring through the viewport at the same battered hull that you are.\n  *goto Artemis\n\n*elseif seniors = 0\n\n  The entire team is there with you.  Dallas is the first to speak.  \"That ship was absolutely pulverized.  How is it still in one piece?\"\n  *goto Artemis\n\n*else\n\n  As you stand there beholding the Artemis' mangled shape your junior quarantine officers wander up beside you.\n\n  \"Captain ${lastname},\" Heddes says, and you know it's Heddes because nobody else still calls you by your formal name, \"we had a few final checklist items to finish up and now we're -- damn, what the hell happened to that thing?\"\n  *goto Artemis\n\n*label Artemis\n*comment this ship might come up later in the story, when you're looking for new things to do, which is one reason it is mentioned here\n\nThe Artemis is an earlier version of the Jessica, built by the same dock and for the same purpose.  Like the Jessica it flew its maiden voyage out to Niah.  But unlike the Jessica it punched through a cosmic dust cloud along the way while going 1/4th the speed of light.  Fortunately the ship's displacement field saved it from any fatal damage.  Still, it came out of the encounter looking like a sandblasted cucumber.\n\nWhile the outside damage is spectacular, the real harm was caused inside the ship.  The cosmic sandblasting heated up the exterior hull so much, and for so long, that some of the life support systems malfunctioned due to faulty heat readings.  Three dozen people died.  Their deaths were only discovered once the ship arrived two years later and the remaining passengers awoke.  The Artemis straggled into orbit above Niah and into mothballs.  Nobody wanted to fly it anywhere.  Its innards have been occasionally cannibalized for service on other ships.\n\nSince the Artemis was eight years ahead of the Jessica, this encounter happened while the Jessica was itself midvoyage, so you had no idea about it until you got here.  (Just as well, you think to yourself.)\n\n*page_break \n\n*if wander = false\n  Ugh.  Forget about that.  Back to the Jessica for a moment.  Your ship is in great shape.  It missed whatever uncharted dust clouds were out there, together with whatever other unseen hazards may have lain en route.\n  \n  Do you want to wander the ship for a minute and find out a little more about it?\n  *choice\n    #Sure\n\n      If you've ever seen the John Hancock Tower in Chicago, you've pretty much seen the Jessica.  The two look fairly similar all things being equal, except the Jessica has alot fewer windows and a massive propulsion system down the back.\n\n      Like all starships, the Jessica left Earth pointing forward, with its engines pushing until the ship reached something close to 3/4 c.  Then it coasted along for light year after light year until it was time to slow down, at which point the ship rotated 180 degrees and the engines fired again.  (Fortunately they still worked!)  Reposed in frozen sleep during virtually all of this were the ship's passengers and crew.\n\n      *page_break\n      On the inside, the ship most resembles a ballistic missile submarine.  Lots of narrow passageways, a couple big rooms holding lots of large tanks and a warren of computer equipment, service areas and access points.  It's not built like a cruise ship.  There is no wasted space here.  Every pound has to be accelerated and then decelerated, so there's a premium on building efficient, tightly-packed vessels that will still work long enough to reach their destination and be able to stop.\n\n      This modern marvel has done something incredible -- move over a thousand human beings, including you, some 40 light years to a tiny bullseye of a planet.  \n      *set wander true\n      *goto worldchoice\n\n    #No, I'm good.\n\n      Good to hear.\n      *goto worldchoice\n\n*else\n\n  Nobody said interstellar travel would be easy.  And even on the Artemis most of the passengers made it to Niah safely.  They're now either down on the surface or moving on to even other moons and planets in this neighborhood.  There's actually a habitable moon on the next planet out in Niah's solar system, and there are (at least as far as you'd last heard, 40 years ago) two other habitable planets in star systems less than 5 light years away.\n\n  *goto worldchoice\n\n*label worldchoice\n\nNow your attention turns, once again, to Niah.  This Earthlike planet that jarringly isn't Earth is fast becoming a new home for humanity.  Niah itself has the capacity to be many things to many people.  As you behold Niah's sunlit northern ocean you take stock of what's so special about this world.  \n\nYou wanted Niah to be your likely new home because it:\n*choice\n  #seemed like it was colonized by freethinkers\n\n    Something of an ironic position for a quarantine agent to take, don't you think?  Perhaps your search for openminded people is your conscience's way of making up for the changes you make to other people's knowledge.\n    *set egalitarian +15\n    *set enlightened +15\n    *set sentimental -5\n    *set ambitious %+10\n    *goto world1 \n\n  #was the best place to make a quick buck\n\n    *set sentimental -15\n    *set enlightened -10\n    *set ambitious %+10\n    Like all frontier settlements, Niah is full of opportunities to make a small fortune -- if you know what you're doing and don't fall prey to someone stronger than you.\n    *if corruptible > 60\n      You've got some talents that will help you go a long way towards your goal.  Good luck, though.  You'll need it.\n      *goto world2\n\n    *elseif diligent \u003c 40\n      To be honest with you, this might be harder than you think.\n      *goto world2\n\n    *else\n      It's an exciting time on an exciting world.  You can't wait to see how it turns out.    \n      *goto world2\n\n  #was where the Jessica was going\n\n    True.  Hard to tell if you're being really, really deep or just incredibly literal.\n    *finish\n  \n  #was reported to be a beautiful planet\n\n    And now that you're in orbit above it you can confirm that it is.  The Jessica is already streaming various feeds from the planet, so you've also been able to watch what's going on down on Niah.  \n\n    It's larger than Earth and with only a fraction of the people, so the natural landscape is still largely unspoiled.  A deepwater ship could cruise for weeks without seeing any evidence of people, save perhaps the light show that the Jessica or some other starship might create when it moves.  \n\n    There are no aliens here.  In fact, there are no aliens anywhere in the universe as far as Earth is aware.  Of course Niah has its own indigenous vegetation, however, and some of it even looks vaguely like it could have come from a jungle on Earth somewhere.  You can tell from the newsfeed that the issue of preserving the local flora has already become contentious.  But animal life has so far been limited to small, simpleminded things.  Especially insects.  \n    *set sentimental +15\n    *set ambitious %-10\n    *goto world1\n\n  #was set up nicely to be the regional superpower in its stellar neighborhood\n\n    *set sentimental -10\n    *set enlightened -10\n    *set egalitarian -10\n    *set ambitious %+10\n    *goto world2\n\n*label world1\n*comment this section focuses on Niah's quality of life\n\nIs it fair to say that you expect Niah to be a place where life is enriching and meaningful?\n*choice\n  #You bet.\n    *if ambitious \u003c 40\n      You might have a hard time fitting in.\n      *finish\n\n    *else\n      Good to see that humanity is trying to put its best foot forward.    \n      *set enlightened +8\n      *finish\n\n  #Whatever.\n    Okay then.\n    *finish\n\n*label world2\n*comment this section focuses on Niah's strategic and commercial qualities\nNiah is one of five habitable planets and moons in this little corner of the galaxy.  Since it's where Earthships first arrive it's become the regional center, though one of the other planets has more resources.  That one, strangely named Hadley's World, could pass Niah in importance in a couple hundred years if Niah lets it.  Who's to tell, though, what future discoveries will change all that. \n\nFor now Niah offers an unprecedented opportunity to capitalize on the creation of an interstellar civilization.\n\nAs that civilization develops, do you expect it to be democratic or colonial?  That is, will Niah (or its rival) merely be one part of a cooperative system of worlds, or will it be competing with those other worlds to see who can rise to the top and exert control?\n\n*choice\n  #Democratic and cooperative.  \n  \n    Let's at least try not to repeat the mistaken approaches people took with the exploration and settlement of new lands.  There has to be a better way.\n    *set egalitarian +8\n    *finish\n\n  #Colonial and competitive.  \n  \n    It's all well and good to talk about lofty ideals, but the real world never has, and probably never will, work like that.  Somebody always covets power.  Somebody always gets it.  You can do what you can to make a difference, but don't we all know that sooner or later humanity's baser instincts always return? \n    *set egalitarian -8\n    *finish", "cleancowv4": "*comment Choice of Worlds Vignette 4\n*comment Copyright 2013 Andrew J. Schaefer\n*comment Augustine is dead and you have to figure out what to do about it\n\n\n*label deadaugustine\n\nThe next day everything changes.  \n\nThe ship is suddenly bustling.  The passengers are awake and preparing to disembark.  The Jessica's narrow gangways and cramped collection points are crammed to the gills with a shuffling mass of humanity.  You're amazed how quickly the ship went from a silent, frozen sarcophagus to this noisy place.  It's disorienting.  And with your work behind the scenes finished, you'll be joining these passengers soon enough.\n\nYet one person aboard ship won't be coming along.  \n\n*page_break Who?\n\nYou're near one of the main airlocks, discretely watching passengers board ferries down to Niah's surface, when Bryson comes up to you.  She looks concerned.\n\n\"Bad news ${firstname},\" she says in a hushed tone.  \"Passenger Julian Augustine's dead.\"  She's making sure nobody else can hear her.  It's never a good idea to let people on a starship overhear that one of their mates didn't survive the process.  Tends to freak people out.\n\n\"When?  How?\"\n\nOddly, she's not sure.  \"They don't know.  He's so old the medicomp couldn't immediately place it.  Could have been half a dozen things to cause the condition he was found in.  But the weird thing is there's no clear cause of death, either.  He's just dead.\"\n\nYou ask the time of death a second time:  \"When?\"\n\n\"He was already dead when we got to Niah.  Never woke up.\"  Though he was obviously still alive when you screened him.\n*if alive = 1\n  Of course, you screened him the first day, so there was still another two weeks to go.\n  *goto question\n*elseif alive = 2\n  Of course, you screened him the second day, so there was still plenty of time for Augustine to die before arrival.\n  *goto question\n*else\n  Since you didn't screen Augustine, you're not sure offhand when the last time was anyone saw him alive.  \n  *goto question\n\n*label question\n\nThen you step back for a second.  Worryingly, an \"exotic\" is dead of unknown causes, which brings up a host of possible issues.  Then again, it's actually pretty remarkable that only one passenger died, given all the variables.  Things could have been vastly worse.  Just ask the Artemis survivors.\n*page_break\n(By the way, the Artemis is another good example of something most interstellar passengers don't realize:  you can never be woken up during the voyage, even if something awful is happening to you.  There's no life support available.  The ship obviously can't turn around and there's nowhere near enough food, water and breathable air to keep you alive once you're awake.  So the only way to find out whether anyone has died is to wait until the end of the trip when everyone else wakes up and you don't.)\n\nIf you want, you can push to stay involved in investigating Augustine's death -- after all, your team were the last to see him \"alive\" and his death is still mysterious.  Or you can hand your dead passenger over to the authorities, let them investigate however they want, and move on with your new life on a new planet.  Nobody will begrudge you for following standard protocol and waiting for them to call you if they need you.  \n\nYou're under no mandatory obligation either way.  It's the first fork in your life's road since you left Earth.  Stay in quarantine officer mode or become another interstellar immigrant.  What you decide will obviously have a profound influence on how you spend the next few years of your life.  But it will also influence what kind of life that will be. \n\nWhat do you want to do?\n*choice\n  #Let the relevant authorities investigate Augustine's death.  \n\n    If they need me, you think to yourself, they'll find me, but otherwise it's not my problem.  I want to get on with my life.\n\n    \"Well,\" you say, \"that's bad news.\"  A disoriented family of four shuffle past and you wait in silence for a few beats before continuing to talk.  \"Thanks, Bryson, for letting me know.  Sounds like it's none of our business right now.\"\n\n    \"I understand, sir.  I'm assuming we'll be kept in the loop as to their findings?\"\n\n    Yes, yes, of course, you tell her, but your mind is already halfway towards the airlock that the disoriented family of four just shuffled through.  If anything comes up that requires screener input then by all means you'll do your part, but until then you're not inclined to butt in to somebody else's business.\n    *set investigation %-50\n    *set case 0\n    *finish\n\n  #Have the quarantine team handle the Augustine death investigation ourselves.\n\n    You decide to keep Augustine close to the proverbial vest.  The Jessica has only just arrived and of course Augustine died while en route; your team were the last to see him alive.  And since the cause of death is still unknown it's necessarily suspicious.  With a passenger like that, who was traveling with so many noteworthy objects, the threats to the quarantine are obvious.  \n\n    You tell Bryson your decision.  Her face lights up.  \"I don't think they'll object,\" she says.  \"It's not like anyone out here knew him better than we do.\"\n\n    You institute a quarantine hold on Augustine's body and possessions.  It's a technical restriction that essentially says to anyone interested \"we're not done looking through his papers yet.\"  For hundreds of years this has been happening at points of arrival so no-one's going to raise the alarm if you do it now.\n    *set investigation + 15\n    *goto investigate\n\n*label investigate\n*comment the objective is to get you to examine Augustine's body to discover the manipulation which in turn leads to the plot to circumvent the quarantine screen, while keeping mackenzie from covering the tracks\n\nA few minutes later your team has reassembled in the familiar room.  One more time back where you started.  \n\n\"I thought we were done,\" Heddes exclaims.  \"Is this about the dinner cruise?\"\n\n*page_break  \n\nSounds like somebody hasn't gotten the memo yet.  In order not to arouse suspicion among the wider public, quarantine teams are expected to finish their screening and then quietly integrate into the existing community however each team member sees best.  Clearly Heddes is well on his way.  That might have to wait.  \n\nYou fill everyone in on what you know.  Bryson -- who told you about it to begin with -- nods along, while Dallas and Mackenzie knew at least that Augustine was dead.  \n\n\"Huh,\" Heddes says, as you finish your briefing, \"that's weird.  You'd think with a guy that old the death would be obvious.  Have any 350-year olds ever been frozen that long before?  Or screened?\"\n\nThey're fair questions.\n\n\"He was cleared for spaceflight,\" Mackenzie answers.  \"Obviously these issues were raised before embark but he was given the green light.  He's so old he must have just died -- maybe he'd collected so many different medical issues the ship's medics can't weed through them all.  He's probably been exposed to bugs that don't even exist anymore.\"\n\nMore fair points, you think, even if they're just speculation.  You see two of the juniors about to speak when Mackenzie starts up again:  \n\n*page_break\n\n\"Everybody dies eventually.  Frankly he's lucky to have lived as long as he did.  And of course there's no record of the screening process ever killing anyone.  I can't imagine how it would, since it doesn't even implicate core life support functions.\"  She's earnest.  \n\nHeddes counters:  \"But a natural cause of death should still show up,\" he pleads.  Wherever his mind was before this meeting started it's now focused on the issue at hand.  \"The lack of a clear cause only makes an unnatural death more likely.\"  \n\nMackenzie is shaking her head as he talks.  This argument can really get going.  But you don't need to hear more, either way, because it's all just speculation at this point.  \n\nYou can order a diagnostic on Augustine's screening process if you think it will help.  There's always a chance it will yield useful information.  But it would have to be done before any further autopsy on the body itself and take some time to complete.  If you think the real problem is with Augustine's body, not the screening process, then you should move on that instead.\n*choice\n  #Run the screening diagnostic first.\n\n    \"I understand what you're saying, Mackenzie,\" you say to your deputy, \"but Heddes has a point.  Let's make absolutely certain that the screen didn't play a role in his death.\"\n    *goto screen\n\n  #Focus on other causes of death.\n\n    \"You're right, Krissa, but we still need to find out how he died.  It's suspicious until we can prove it isn't.\"\n    *goto cause\n\n  #Oh who are we kidding?  Mackenzie's right.  Let's stop this investigation before we waste any more time.\n\n    Worrying about why a 350-year-old man died is absurd.  HE'S THREE HUNDRED AND FIFTY YEARS OLD!  Sure alot of that was in coldsleep, but a human body can only go through so much.  It's hardly suspicious that a man that old failed to make it out of a 40-year freeze.  Even some of your own team members don't even see anything to worry about.  You might as well be investigating why it hurts when you shove a sharp stick in your eye.\n\n    You announce your decision:  \"I'm sorry to change my mind so fast but I've got to agree with Krissa.  We're just chasing shadows.  There's nothing here to warrant keeping us involved.  Let's hand him back to the local authorities and declare our mission accomplished.\"\n\n    With the quarantine hold released, Augustine's body is free to go through the normal procedures for examination and disposal.  If anything unusual comes up they'll let you know.  Otherwise, this was your last task in your official capacity as quarantine screener.  \n    *set case 0\n    *set investigation %-50\n    *finish\n\n*label screen\n*comment this is actually an inferior path to take, investigation-wise, since the screen diagnostic is a red herring and you really need to be checking his body, and if mackenzie can separate you from the body then she can fudge the results a bit leading to lower investigation value\n\nIt's all well and good to evaluate how Augustine was screened, but of course you can't ask anyone besides yourselves to do the evaluation.  So you'll be checking your own work.  That's an inherent weakness in the process.  \n\nIt's also not the only weakness.  Since Augustine is now dead you can't just redo the screen.  All you can hope is to review the record and possibly identify some flaw that, in turn, somehow caused this old frozen man to die so inconspicuously that nobody noticed it was happening.  But the body has to be present during the retest -- the screening system only works if the body is there to act as a control.  That's why you can't review your screening process and examine the dead body at the same time.\n\n*if krissa = 2\n  How you handle the exam depends on how suspicious you are.  Mackenzie screened Augustine the first time.  Do you want to have the entire team go over her procedure, for a collective review, or do you want to exclude Mackenzie from the process?  If there's anything wrong your team will likely find it, and having Mackenzie herself involved in the analysis will only make it tougher for the other team members to critique her work.  On the other hand, cutting Mackenzie out of the loop will send everyone a message, however subtly, that she might have done something wrong.  Or that you don't entirely trust her.  How do you want to proceed?\n  *choice\n    #Let's all do this together.\n\n      \"Okay team,\" you say, \"the sooner we start the sooner we can finish.  Leave no stone unturned.\"  Everybody gets working on their assigned tasks.  It's refreshingly uncomplicated.  \n\n      By the end of the day you've done everything you can.  You've left no proverbial stone unturned.  (Bryson didn't even get the saying.  Twice you heard her ask \"what stone?\" to nobody in particular.  The second time Dallas, seizing the opportunity, responded \"They didn't tell you?\" before refusing to say anything else.  You had to suppress a laugh.)  \n\n      Not surprisingly, you didn't find anything.  There was no perceptible difference in the way Augustine was screened versus anyone else.  No perceptible impact on his mental or physical condition.  If the screening process did kill Augustine, there is no longer any evidence whatsoever that it happened.\n\n      It was a wild goose chase.  \"I guess if we hadn't done it,\" you tell your team by way of consolation, \"we'd always be left wondering.\"\n\n      \"I wonder what's for dinner,\" Dallas says.  Everybody laughs.  \n      *set investigation - 10\n      *goto screenall\n\n    #Exclude Mackenzie from the re-review.\n\n      \"Okay team,\" you say, \"the sooner we start the sooner we can finish.  Leave no stone unturned.\"  \n\n      Just as everybody starts figuring out what to do, you speak up again:  \"Krissa, sorry but why don't you sit this one out.\"\n\n      Your deputy looks confused.  You act quickly to put her at ease.  \"Nothing personal, but I've been thinking about how to handle this.\"  You're standing near a main cabin window, and as you talk Niah comes into view behind you.  There are huge storms swirling across the southern ocean, their rising clouds illuminated by sunlight from above and lightning from underneath.  \"We're in uncharted waters here,\" you say, \"and I want to make sure we do everything possible to ensure a fair and objective analysis of our screening work.  So it makes sense to keep the initial screener out of the re-review.  I don't want even a whiff of a conflict of interest.\"\n\n      \"Oh,\" she says, \"okay then.  Since there's not much else for me to do right now, maybe I'll just go take a nap.  Wake me when you're done.\"  And with that she turns and leaves.\n\n      You catch a glimpse of Heddes shooting Bryson a look.\n\n      *page_break\n\n      In any event, by the end of the day you've done everything you can.  You've left no proverbial stone unturned.  (Bryson didn't even get the saying.  Twice you heard her ask \"what stone?\" to nobody in particular.  The second time Dallas, seizing the opportunity, responded \"They didn't tell you?\" before refusing to say anything else.  You had to suppress a laugh.)  \n\n      Not surprisingly, you didn't find anything.  There was no perceptible difference in the way Augustine was screened versus anyone else.  And no perceptible impact on his mental or physical condition.  If the screening process did kill Augustine, there is no longer any evidence whatsoever that it happened.\n\n      It was a wild goose chase.  \"I guess if we hadn't done it,\" you tell your team by way of consolation, \"we'd always be left wondering.\"\n\n      \"I wonder what's for dinner,\" Dallas says.  Everybody laughs.  \n      *goto screenall\n\n*elseif krissa = 1\n  You screened Augustine yourself the first time.  So in a sense you're now asking the team to review your own work.  What if you screwed up?  Can you be objective about your own evaluation?  Would the team do this task more effectively if you weren't involved?\n\n  So you have a choice.  Do you want to have the entire team go over the procedure, yourself included, for a collective review, or do you want to recuse yourself from the post mortem and let the other team members handle it?\n  *choice\n    #Let's all do this together.\n\n      \"Okay team,\" you say, \"the sooner we start the sooner we can finish.  Leave no stone unturned.\"  Everybody gets to work.\n\n      By the end of the day you've done everything you can.  You've left no proverbial stone unturned.  (Bryson didn't even get the saying.  Twice you heard her ask \"what stone?\" to nobody in particular.  The second time Dallas, seizing the opportunity, responded \"They didn't tell you?\" before refusing to say anything else.  You had to suppress a laugh.)  \n\n      Not surprisingly, you didn't find anything.  There was no perceptible difference in the way Augustine was screened versus anyone else.  And no perceptible impact on his mental or physical condition.  If the screening process did kill Augustine, there is no longer any evidence whatsoever that it happened.\n\n      It was a wild goose chase.  \"I guess if we hadn't done it,\" you tell your team by way of consolation, \"we'd always be left wondering.\"\n\n      \"I wonder what's for dinner,\" Dallas says.  Everybody laughs.  \n      *goto screenall\n\n    #I should sit this one out.\n\n      You give your deputy the news.  \"Krissa, you're in charge.  Augustine was my case.  If I did anything wrong you'll find it.  Having me leading the review will only make it weird.  I better sit this one out.\"  \n\n      Her face brightens perceptibly.  The three juniors shrug -- none of them seem to think there's much to this.  You wander off to take a much-needed nap before catching up on some extra reading.\n\n      A few hours later the team is ready to report.  Not surprisingly, they didn't find anything.  There was no perceptible difference in the way Augustine was screened versus anyone else.  And no perceptible impact on his mental or physical condition.  If the screening process did kill Augustine, there is no longer any evidence whatsoever that it happened.\n\n      It was a wild goose chase.  \"Told you,\" Mackenzie says.  \n\n      \"I guess if we hadn't done it,\" you answer, by way of consolation, \"we'd always be left wondering.\"\n\n      \"I wonder what's for dinner,\" Dallas says.  Everybody laughs.  \n      *set investigation - 10\n      *goto screenall\n\n*else\n  \"Okay team,\" you say, \"the sooner we start the sooner we can finish.  Leave no stone unturned.\"  \n\n  Everybody gets to work.  By the end of the day you've done everything you can.  You've left no proverbial stone unturned. (Bryson didn't even get the saying.  Twice you heard her ask \"what stone?\" to nobody in particular.  The second time Dallas, seizing the opportunity, responded \"They didn't tell you?\" before refusing to say anything else.  You had to suppress a laugh.)  \n\n  Not surprisingly, you didn't find anything.  There was no perceptible difference in the way Augustine was screened versus anyone else.  And no perceptible impact on his mental or physical condition.  If the screening process did kill Augustine, there is no longer any evidence whatsoever that it happened.\n\n  It was a wild goose chase.  \"Told you,\" Mackenzie says.  \n\n  \"I guess if we hadn't done it,\" you answer, by way of consolation, \"we'd always be left wondering.\"\n\n  \"I wonder what's for dinner,\" Dallas says.  Everybody laughs.  \n  *goto screenall\n\n*label screenall\n*comment this is then giving you the option to do the body exam after having tested the screening process\nJoke or not, Dallas has a point.  You're all hungry.  So you quickly eat something and as you chew your bland starship food Heddes cuts to the chase:  \"Of course, none of this has helped us figure out why he's dead.  We still have to answer that question, don't we?\"\n\n\"Absolutely,\" Dallas quips, \"or else this dinner was a waste.  I could have had much better to eat off-ship.\"\n\n*page_break\nEnough with the wisecracks, you think.  \"Okay,\" you say, \"we've ruled out the screening process.\"\n\n\"Which simply narrows down the possible causes of death,\" Heddes says, just as he had a few hours earlier when you were first discussing this issue.  \"What's the old saying?  'Rule out the impossible and whatever remains, however implausible, must be the cause?'\"\n\n\"Which leaves us,\" you say, \"with a thorough examination of his body and his freezer pod.  We should get the Jessica's medical systems up and running as quickly as possible so they can go over him like a fine-toothed comb.\"  You smile inwardly at that comment.  Nobody's used a comb in probably 300 years.  \n\nBryson cuts in:  \"Boss, I had another idea.  Maybe we should send Augustine down to the surface instead?  Heddes keeps mentioning the mysterious causes, and it got me thinking -- maybe there's something wrong with the ship?  Maybe we should move Augustine to a new environment and get him checked out by an entirely different group of people?\"\n\n\"Can't hurt,\" Heddes agrees.  \"One more way to eliminate a possible corruption.\"\n\nMackenzie is shaking her head, however.  She doesn't agree with the juniors at all.  \"Too risky,\" she says, \"and not necessary.  Not only could something happen in transit, we might also be introducing something dangerous onto Niah's surface.  If we don't know what killed Augustine we sure as hell shouldn't be sending his body down to an unsuspecting planet.  What if it's a virus?  Let's check him here, and if nothing comes up then maybe we could reconsider.\"\n\nBryson responds:  \"Yesterday you thought Augustine died of old age, now you think he's Typhoid Mary?  As long as he's aboard ship he's still in the same environment that killed him.\"  She's surprisingly animated in her defense.  She has definitely become more assertive over the past two weeks.\n\nOnce again, you nip the discussion in the bud before things get too heated.  You've heard the arguments for either side; which route do you want to take?\n*choice\n  #Have the Jessica's people examine Augustine and his pod.  Too little benefit and too much risk with sending him down to the planet below.\n\n    Let's take a little more time, you think, to nail down what happened here.  The initial review may not have found the answer but surely a further analysis will get to the bottom of this.  Until then it makes no sense to send a possible contagion down to an unprotected planet.\n    *gosub augustinejessica\n    *goto screen2\n\n  #Send Augustine to Niah for an independent examination.  We need to eliminate every corruption in our investigation.\n\n    Best to have an independent exam, you think.  The Jessica has only just arrived at Niah and nobody has come on board the ship yet.  Therefore if someone or some thing killed this man, by definition it's from the Jessica - and possibly still on the Jessica.  Yet the ship couldn't say why he died.  Who's to say a shipboard autopsy would be honest?\n    *gosub augustineniah\n    *goto screen2\n\n*label cause\n\nYou remind yourself that this man was born 350 years ago.  That's still an eternity in an age when most people can expect to live a third that time, tops, if all goes right.  He had to die eventually.  But he also had an unusually large and varied cargo in his possession, many of which were things that you saw fit either to quarantine or at least review.  \n\nInteresting that he should be the only passenger to die.  And so close to arrival, too.\n\nYou're thinking death investigation, first and foremost.  And in a death investigation the most important thing is to figure out how the dead person died.  Your first instinct is to order the ship's medical team to conduct a more thorough re-review.  But then Bryson suggests sending Augustine and his pod down to the planet's surface for an independent, objective analysis of the dead body and his surroundings.  It makes sense -- after all, the Jessica should have identified the cause of death right from the start -- but Mackenzie cautions that with an unknown cause of death there's a real risk in sending Augustine into a new world.  What if he was carrying a virus?\n\nHow do you want to handle that?  Do you want to keep the examination aboard ship, with the latest technology, or get a medical team on Niah to look at Augustine from their outside-but-untested perspective?\n*choice\n\n  #Send Augustine's body down to the morgue on the planet's surface.\n  \n    Best to have an independent exam, you think.  The Jessica has only just arrived at Niah and nobody has come on board the ship yet.  Therefore if someone or some thing killed this man, by definition it's from the Jessica - and possibly still on the Jessica.  The ship should have figured out the cause of death.  Who's to say a shipboard autopsy would be honest?\n    *gosub augustineniah\n    *goto screen2\n\n  #Release Augustine back to the ship's doctor so the Jessica's medical people can figure out exactly why their passenger died on board.  \n\n    Let's take a little more time, you think, to nail down what happened here.  The initial review may not have found the answer but surely a further analysis will get to the bottom of this.\n    *gosub augustinejessica\n    *goto screen2\n\n*label augustineniah\n\nYou set up a transfer with the Niah authorities once you find out who they are.  Getting Augustine's body to the Niah transport ferry turns out to be surprisingly easy.  There's a customs officer always on standby, and he escorts the body -- still in its pod -- from the Jessica to the transport.  He does a quick exam of the pod and finds no sign of foreign contamination.  \n\nAs you watch the transfer take place you look carefully at Augustine's body.  There's no discernible sign of distress.  Indeed, he looks exactly the same as everyone else looked when they were in coldsleep.  Which might just be a reflection on how close to dead you look when you're in interstellar coldsleep.\n\nBut if you didn't know he was dead you probably wouldn't have guessed it.  The guy looks pretty good for his extreme age, all things considered.  \n\n*page_break\n\nWhen you look at the pod, however, the death becomes unmistakeable.  There are red lines where the bio readouts should be.  And there's a small image of a skull where the age should be.  Who designs these things?\n\nNo sooner do you grimace at the skull on Augustine's pod than the Jessica's medic catches your glance.  \"You think that's weird,\" he says, \"check this out.\"  He gently waves a few fingers over the main screen and the entire surface of the pod changes.  It goes from white with a clear window to solid grey.\n\nThen, almost imperceptibly at first, a new image appears across the entire pod's surface.  It takes a few minutes for you to pick it out, but eventually you find yourself looking at the lifesize three dimensional image of an emaciated old man clad in nothing but tattered rags, his wrinkled skin showing multiple wounds across his body.  \n\nThis is not Augustine.  It's not anyone you recognize.\n\n\"Pretty strange, huh?\"  The medic is speaking to you again.  \"Looks like he programmed his pod to display this image if he died.  I don't know what it is.  We were hoping maybe you did.\"\n\nHow do you respond?\n*choice\n  #\"I have no idea what this is.\"  \n\n    You tell the truth.  \"No idea,\" you say.  \"I've never seen this person before in my life.\"  Then you ask a question of your own: \"There's nothing identifying it?\"\n\n    The medic shakes his head.  \"No, nothing.  We looked the image over and this\"  -- he's pointing to the image -- \"is it.\"\n\n    You shrug at each other and move on.  Another mystery.  Before you can ask him any more questions the medic leaves.  \"Too many people having post-coldsleep problems,\" he explains as he hurries away.  \"Sometimes your body doesn't work exactly right, especially after 40 years.  But don't worry,\" he adds, smiling, \"we can usually fix it.\"\n    \n    Any other questions you had will have to wait.  Don't worry, though, you'll likely get the information you need eventually.    \n    *set image true\n    *set DNA true\n    *set case 1\n    *set investigation %+10\n    *return\n\n  #\"If he programmed it himself, does that mean he committed suicide?\"\n  \n    It seems a fair inference.  Coldsleep pods aren't normally modified like this, so the fact that this pod carried not only these images, but also the only dead passenger from the trip, makes for a pretty compelling coincidence.  \n    \n    The medic is doubtful, however.  \"He was never awake.  He was also checked before we left, and there was no sign of anything untoward.  It's impossible to commit suicide by doing something 40 years before your death, coldsleep or not.  I'll eat my own hand if it turns out to be self-inflicted.  There's simply no way it could have happened.  He died of natural causes, unless . . . .\"  \n    \n    As he speaks the medic's voice trails off.  But you know what he's getting at.  He doesn't want to say any more, however, and when you try to raise the idea again the medic begs off.  \"I've got to run,\" he says, with apparent honesty.  He shows you his task list.  Eight patients are waiting for him and the number looks likely to increase.  \"Whenever you thaw people out of coldsleep,\" he says, \"there's always a bunch whose bodies don't quite work right anymore.  Usually nothing I can't handle,\" he adds, by way of assurance.  \n    \n    Any other questions you had will have to wait.  Don't worry, though, you'll likely get the information you need eventually.\n    *set image true\n    *set DNA true\n    *set case 1\n    *set investigation %+10\n    *return\n\n  #\"Were there any other modifications made to this pod?\"\n    \n    \"No,\" the medic says.  \"None.  We had it checked out as soon as we saw this but there were no other changes.  It's a perfectly typical coldsleep pod except for the image programming.\"  Before you can ask him any more questions the medic leaves.  \"Too many people having post-coldsleep problems,\" he explains as he hurries away.  \"Sometimes your body doesn't work exactly right, especially after 40 years.  But don't worry,\" he adds, smiling, \"we can usually fix it.\"  That \"usually\" gets your imagination racing, and not in a good way.\n    \n    Any other questions you had will have to wait.  Don't worry, though, you'll likely get the information you need eventually.\n    *set image true\n    *set DNA true\n    *set case 1\n    *set investigation %+10\n    *return\n\n*label augustinejessica\n\nYou follow standard shipboard procedure and consent to Augustine's body being taken care of here.  As you return to your monitoring you wonder to yourself what will eventually become of Augustine.  Presumably they do a funeral onboard?  If so, perhaps you should attend.\n*set investigation %-10\n\nRegardless, you put in a standing order to be notified of the exam results.  They should come pretty quickly, especially since Augustine was the only in-transit death for this voyage.  The only problem will be if there's no definitive result to report.  But you'll cross that proverbial bridge when you come to it.  \n\n*comment get another chance to get the image/DNA if traits are high enough\n*if diligent > 55\n  Since you're essentially waiting around for any word on Augustine's death, you can check in on the process if you want.  You're not qualified to examine the body, of course, and so far nobody's contacted you with any results.  So you might be interrupting things.  But on the other hand your unannounced visit might spur the medics to refocus.  What do you want to do?\n  *choice\n    #Go check up on things.\n\n      You ask to see Augustine's coldsleep pod again.  Until now every pod you've seen has carried a living person inside.  The readouts on those pods were all in green.  You realize you got used to that because Augustine's pod is jarringly different.\n\n      There are red lines where the bio readouts should be.  And there's a small image of a skull where the age should be.  Who designs these things?\n\n      No sooner do you grimace at the skull on Augustine's pod than the Jessica's medic, who escorted you to the pod, catches your glance.  \"You think that's weird,\" he says, \"check this out.\"  He gently waves a few fingers over the main screen and the entire surface of the pod changes.  It goes from white with a clear window to solid grey.\n\n      Then, almost imperceptibly at first, a new image appears across the entire pod's surface.  It takes a few minutes for you to pick it out, but eventually you find yourself looking at the lifesize three dimensional image of an emaciated old man clad in nothing but tattered rags, his wrinkled skin showing multiple wounds across his body.  \n\n      This is not Augustine.  It's not anyone you recognize.\n\n      \"Pretty strange, huh?\"  The medic is speaking to you again.  \"He programmed his pod to display this image if he died.  I don't know what it is.\"\n      *set image true\n      *set case 1\n      *return\n\n    #Leave the experts to it.  \n\n      You decide not to bother them.  They'll find you soon enough.  After all, this is a starship.  Nobody's going anywhere. \n      *return \n\n*else\n  Until then you take advantage of your free time to admire the view.  Niah looms large outside your window because the ship is currently angled downwards to the surface.  There is no 'up,' after all, in space.  You trace the coastline of the main continent and then start to look more carefully at the oceans beyond.  You can make out changes in water depth, shadows playing across the waves, and even the wake of what looks like a rather large seaship.  You're amazed at the clarity until you remember that, human-wise, this is a virtually new planet.  The air is so clear it's almost unreal.  It's like putting on eyeglasses for the first time.  \n  *return\n\n*label screen2\n*set brysoninvest 0\nA few minutes later Bryson calls you.  You hope that whatever she wants it doesn't take long.  It's been a long day.\n\n\"Sir,\" she says, \"do you have a minute?\"  You're about to answer when she starts talking again.  She looks uncomfortable.  \"What do you think is going on?\"  \n\nYou try to put her at ease even though you're not sure what she's talking about.  \"What's going on, Agent Bryson, is that we're doing our jobs.  Why is that something you're worried about?\"\n\n\"I don't know if I'm worried,\" she says, \"so much as confused.  In training we went over all the likely scenarios for when we got here.  Obviously some things they got wrong,\" and at that you both laugh, since your training on Earth was based on information 40 years out of date.  \"But this is different.  There were over a thousand people on this ship and only one died, and they can't even say why?  They should be able to pinpoint the cause of death right away.\"\n\nNow you see what she's getting at.  She's just too professional to come out and say it.  Your training focused on accidental deaths -- malfunctioning pods, sick passengers, mistakes in the thawing process, things like that.  With no such easy explanation for Augustine's death, it makes it impossible to rule out the alternative -- that his death was actually not accidental.  \n\n*page_break\nBryson speaks up again:  \"With your permission, sir, I'd like to keep looking into this.  At least until the official explanation is handed down.  You can count on me to be discrete.\"  You note that she never actually comes out and says what you both are now thinking.\n\n\"Isn't the team already doing that?\"  \n\n\"Sure,\" she says, \"I guess.  But even in our group there are still too many differences of opinion.  You need somebody dedicated to this line of inquiry.  Somebody who can do their work without anybody trying to talk them out of it every half hour.\"\n\n\"But why bother asking for different opinions,\" you ask Bryson, \"if I'm just going to ignore them?\"\n\n\"You're not,\" she responds.  \"The team still does what the team decides.  I'm just saying that if there's something more to the case, then you need somebody on it regardless.  Let me be that person.\"\n\n*choice\n  #\"Fair enough.  Go to work and tell me what you find.\"\n\n    *if diligent > 50\n      You now have an understanding with one of your junior officers that she will be independently looking into the cause of Augustine's death.  It makes you nervous that you've set this up, but Bryson has impressed you with her diligence and you feel you can count on her to be discrete.  Hopefully she'll either crack the case wide open or do nothing to upset it.\n      *set investigation %+10\n      *set brysoninvest 1\n      *finish\n\n    *else\n      You send Bryson off on her pet project with the assumption that you and she are both on the same page.  You never went over the ground rules, of course, but she seems responsible enough.\n      *set brysoninvest 1\n      *finish\n\n  #\"I appreciate the suggestion, Bryson, but we work as a team.\"\n\n    *if diligent > 50\n      You're not in the business of having your officers work against one another.  Nor do you necessarily trust Bryson any more than anyone else.\n      *finish\n\n    *else\n      Bryson looks momentarily alarmed, like she's said too much to the wrong person, before taking her leave and walking out.  \n      *set investigation %-10\n      *finish\n\n  #\"Tell you what -- go over Augustine's inventory and make extra-double certain nothing's missing or out of place.\"\n\n    She looks a little disappointed -- clearly Bryson was hoping for more than just a baggage check -- but she says \"sure thing, sir,\" and then heads off to go through Augustine's possessions.\n    *goto baggagesearch\n\n*label baggagesearch\n*comment this is a wild goose chase\n*rand baggage 1 3\n*if baggage = 1\n\n  A few hours later Bryson reports back -- everything is exactly as it should be.  Nothing is missing, nothing is out of place.  You're relieved to hear that.  \n  *finish\n\n*elseif baggage = 2\n\n  No sooner do you assign these tasks than Mackenize calls you.  \"Hey ${firstname}, what's up?  I thought we were done?  Anything you want to let your deputy in on?\"\n\n  \"Oh, sorry, I had Bryson check his inventory.  Wanted to make sure everything's where it's supposed to be.\"\n\n  Mackenzie is concerned for a second.  \"You think there's a reason something might be out of place?  Yeah he's dead, but I sure hadn't heard about any problems with his inventory.\"  You ponder that for a second and then respond.\n\n  *fake_choice\n    #\"I hadn't heard anything either.  Guess I was just being overly cautious.\"  \n\n    #\"Maybe not a reason, but we won't know whether his cargo is where it's supposed to be until we check.\"\n\n    #\"You know what?  Stop asking so many questions.\"\n\n  Mackenzie nods her head and moves to end the call.  \"I'll let you know if anything else comes up,\" she says, before waving her left hand over her right wrist, causing her lifelike image to quickly evaporate into the ship's stale air.\n  *finish\n\n*else\n\n  Before you hear back from your junior officer, the ship's medic calls you.  They're thinking ahead to disposal.  Augustine was traveling alone, without next of kin, to a planet 31 light years from Earth.  Nobody here has any need for him.  \n\n  \"If you don't mind,\" the medic says, \"we're planning to give him a proper burial at sea once he's ready to go.\"  By \"sea,\" of course, he means \"space,\" but interestingly enough they still use the old term.  \"Will you want to attend?\"\n\n  It's a tough question because, depending on how things go, you might not be letting the ship bury Augustine at all.  Though you weren't planning to talk about that yet.\n  *choice\n    #Tell the medics to hold off on burial plans.\n      \n      \"It's premature,\" you say.  \"Once the body is no longer under our authority you can start to make the necessary arrangements.  At present, however, he's still our concern.\"\n\n      \"Whatever,\" the medic says.  \n      *finish\n\n    #Tell them you'll attend the funeral if and when it happens.  \n\n      \"A burial at sea\" aboard a starship orbiting a planet sounds fascinating.  Plus Augustine seemed like a pretty interesting guy.  It's a shame you'll never meet him alive.  \n\n      Soon after Bryson checks in.  Nothing in Augustine's inventory was out of order.  Everything is accounted for.  It all checks out.\n      *finish", "cleancowv5": "*comment Choice of Worlds Vignette 5\n*comment Copyright 2013 Andrew J. Schaefer\n*comment Meeting shipowner Gilles Debussy\n\nA few hours later all is becoming quiet again.  The Jessica is emptying out.\n\nNiah is there for anyone aboard ship to see -- its welcoming visage is an irresistible draw for people cooped up for so long on a starship.  Nobody wants to be left behind.  Nobody wants to be the last one into port.  \n\nYour work is done for the moment, but you're not quite ready to join these people \"downstairs.\"\n\n*page_break\n\nYou have an appointment with Gilles Debussy, the Jessica's owner and perhaps the wealthiest person you have ever met.  He joins you in one of the now-cavernous living spaces, sweeping into the room with an embroidered silk cape flowing from his shoulders and jeweled bracelets dangling from his tan arms.  \n\nHe's the only person to have made the voyage who doesn't look like he just made the voyage.  As you take stock of his confident air you think back to his screen -- it was brief and unremarkable.  \n\nDebussy smiles as he holds out his arms and then he grasps you gently by the shoulders.  \"Hello there Capt. ${lastname}.\"  He has a slight accent but could be from anywhere.  \"I hope I'm looking better than the last time we met.  I'm sorry I wasn't more, shall we say, 'exotic' for you and your team of agents.  A shame for you the process was without incident, no?\"\n\nThis takes you aback.  He's not supposed to know the details of his screen.\n\n\"I'm sorry, ${firstname},\" he continues, \"you are probably wondering how I knew the details of my screen.  The truth is I didn't, of course.  Don't worry yourself -- I haven't infiltrated your team.  But I wanted to test something and the look on your face told me everything I needed to know.\"\n\nThis is an odd comment to make, you think to yourself.  How do you respond?\n*fake_choice\n  #\"What were you testing?\"\n    Debussy smiles, then gently wags his index finger back and forth.  \"Nothing important, ${firstname}.\"\n \n  #\"What was the look on my face?\"\n    \"It was fleeting, but for an instant there I could see genuine shock on your face.  As though I was spilling some state secret right before your eyes.\"\n\n    You make a note to yourself to be a bit more careful with your facial expressions from now on.  \n\n  #\"What did you just learn?\"\n    \"I guess you could say that my time preparing for this voyage was well spent.  This is my ship after all.\"\n\nAnd with that Debussy raises his right arm and cuts the air with his hand.  \"Enough of our games,\" he says, smiling, \"there's a beautiful new planet downstairs and we shouldn't keep it waiting.\"  \n*if case = 1\n\n  He looks directly at you and begins speaking in a low monotone.  \"As you know we lost one passenger along the way.  A terrible tragedy.  And I am to understand you suspect that tragedy might not have been accidental?\"\n\n  His little stunt with your face is still fresh in your mind, so you aren't immediately sure how to respond.  Does he actually know about your theory of the case, or is he bluffing you to find out?\n  *choice\n    #He's bluffing.\n\n      \"I'm sorry Mr. Debussy,\" you say, apologetically, \"I don't know what you're talking about.\"\n\n      *if ambitious >60\n        Debussy looks momentarily taken aback.  He clearly was not expecting you to respond that way.  \"Is that so, Capt. ${lastname}?  Then my information was incorrect.  I will reevaluate.\"\n        *set ambitious %-10\n        *goto debussy1\n\n      *else\n        Debussy clears his throat and speaks again.  \"${firstname}, do not play at my game if you do not know all the rules.  I am not asking you about anything I do not already know.  Try to fool me and you only look foolish.\"\n\n        You are about to reply when he begins speaking again.  \"As I said, I understand you consider Mr. Augustine's death to be less than entirely accidental.  Do you have any leads?\"\n\n        For a second you think to tell this man off then decide the better of it.  \"Not yet,\" you answer, \"the case is still in its infancy.  We expect to know more soon.\"\n\n        You're slightly out of your element but you've followed enough procedurals in your time that the next thing you say comes naturally:  \"Of course, if you know anything now's the time to tell me.\"\n\n        \"I'm sorry Capt. ${lastname}, I do not.  But I do thank you for diligently pursuing this matter.  It is a stain on the reputation not only of my ship, and my house, but of my person as well.  I trust you will keep me informed as your investigation progresses.\"\n        *set investigation %-10\n        *goto debussy1\n\n    #He knows.  \n\n      \"You understand correctly, Mr. Debussy.  We are still awaiting further results, but --\"\n\n      \"-- please,\" Debussy interrupts, \"you may call me Gilles.  What makes you think this death was suspicious?  He was an extremely old man, after all.  In fact I once met him when I myself was not yet a schoolchild, and even then he was an ancient, ancient man.\"\n\n      You take a minute to explain to \"Gilles\" why you haven't yet written off Augustine's death as merely an extremely old man's natural passing.  He listens to you intently.  There's no reason to think Debussy himself was involved, but you also learn nothing new to aid in narrowing the scope of your investigation.  Nevertheless, Debussy assures you of his full cooperation in all matters pertaining to Augustine's untimely death.  That may come in handy.\n      *set investigation %+10\n      *set ambitious %+10\n      *goto debussy1\n\n*else\n  Then, continuing, he says \"Let me address a few matters with you firstly, however.\"\n  *gosub dna\n\n  Stepping closer, Debussy pulls a small velvet box from his pocket and hands it to you.  \"A token, Capt. ${lastname}, of our appreciation for your hard work.  Now that your duties as quarantine agent have come to an end there is nothing more for you or your team to do onboard.  The process went so smoothly and I am grateful for that.  Perhaps this will assist you in your new life in this new world of ours.\"\n  *set velvet 1\n\n  You take the velvet box in your hand and are surprised by its weight.  You're not sure what you've got here.  Do you open the box or keep it closed?\n  *choice\n    #He's given me a gift - open it.\n      \"Thank you Mr. Debussy, that's very kind of you.\"  Raising the box you suddenly realize it has no opening mechanism.  It's simply a cube, covered on all sides by a smooth, velvety deep purple material.  You'd assumed there was a paperweight or something inside but now you don't know what you're holding.\n\n      Debussy catches your surprised expression -- again -- and offers his assistance.  \"Here,\" he says, reaching out to your hand, \"let me show you what you have.\"  As he does so you notice that the jewelry on his arms klinks like it would on Earth -- there is no sign of weightlessness there.  Or in his cape, for that matter.  His whole body and appearance show no signs of being in orbit aboard a stationary vessel.  Owning a starship clearly has its privileges.  \n\n      Anyway, Debussy is speaking again.  \"This little contraption isn't simply the packagings for a gift; it's the gift itself.  I've had it tailored for your personal use.  When you shake it slightly -- go ahead,\" he says to you, \"shake it . . . .\"\n\n      Confused, you grudgingly comply and gently shake this small velvet box you are holding at arm's length from your head.  Instantly it becomes weightless.  A few seconds later the room changes and you find yourself staring at the Earth across your entire field of vision.  Clouds wisp over familiar continents as the lights of the night side emerge past the terminator.  What the?!?  You've experienced simulations before, of course, but never through something so small and unassuming as this gift Debussy has just given you.\n\n      *page_break\n      \"A token reminder of the mother to all of us,\" he tells you.  \"It is far from complete, and the power source is hardly unlimited, but we have endeavored to record some of the best aspects of our home world now that we will not be seeing it again.  Think of this as a searchable map.\"\n\n      Indeed, you quickly come to see that this is not merely one image.  You can zoom in to anywhere you want.  And not just to a location, but inside a location.  You can zoom to a library and read the books on the shelf, or zoom to a treasury and assess its unreported balance sheets.  The only thing missing from the images is people.  Still, this is remarkable.\n      *if diligent >50\n\n        And illegal.  You are a quarantine agent, after all, charged with ensuring that no contraband information contaminates the interstellar colonies.  Who knows what's contained in here?  How many copies are there?  Where are they?  Why is this the first you're hearing of it?  You start to shake your head as the full import of this \"gift\" becomes apparent to you but Debussy, once again, has an answer.\n\n        \"Check your office, Capt. ${lastname}.  There is something there for you.\"\n\n        You zoom to your own workspace back on Earth and are stunned to see it exactly as you remember before you left.  But instead of the usual work files there is a single item on your desk.  It's an authenticated statement from your commanding officer telling you that this cube is clean and the images contained therein are permissible.  \"Relax ${firstname},\" your smiling C.O. says to you through the cube's projection, \"this is your reward for making it to the ass-end of the universe in one piece.  Go enjoy your life.\"  The image ends and you find yourself staring at the Earth again.\n        *set velvet 2\n        *set ambitious %+10\n        *goto debussy2\n\n      *else\n\n        It occurs to you this database might contain information that you as a quarantine agent would want to know about.  Debussy puts you at ease, however, by explaining that he had it created with your commander's approval back on Earth.  He even shows you the necessary authorization.  So you're good.\n        *set velvet 2\n        *set ambitious %+5\n        *goto debussy2\n      \n    #Keep it closed.  \n      \"Thank you Mr. Debussy, that's very kind of you.\"  Grasping the box tightly you begin to put it in one of your suit pockets, when Debussy looks surprised.  \"Now wait,\" he says, \"don't just save it for later.  Let me show you what you have there.  Shake it gently.\"\n\n      You comply.  Instantly the velvet box becomes weightless.  A few seconds later the room itself changes and you find yourself staring at the Earth across your entire field of vision.  Clouds wisp over familiar continents as the lights of the night side emerge past the terminator.  What the?!?  You've experienced simulations before, of course, but never through something so small and unassuming as this gift Debussy has just given you.\n\n      *page_break\n      \"A token reminder of the mother to all of us,\" he tells you.  \"It is far from complete, and the power source is hardly unlimited, but we have endeavored to record some of the best aspects of our home world now that we will not be seeing it again.  Think of this as a searchable map.\"\n\n      Indeed, you quickly come to see that this is not merely one image.  You can zoom in to anywhere you want.  And not just to a location, but inside a location.  You can zoom to a library and read the books on the shelf, or zoom to a treasury and assess its unreported balance sheets.  The only thing missing from the images is people.  Still, this is remarkable.\n      *if diligent >50\n\n        And illegal.  You are a quarantine agent, after all, charged with ensuring that no contraband information contaminates the interstellar colonies.  Who knows what's contained in here?  How many copies are there?  Where are they?  Why is this the first you're hearing of it?  You start to shake your head as the full import of this \"gift\" becomes apparent to you but Debussy, once again, has an answer.\n\n        \"Check your office, Capt. ${lastname}.  There is something there for you.\"\n\n        You zoom to your own workspace back on Earth and are stunned to see it exactly as you remember before you left.  But instead of the usual work files there is a single item on your desk.  It's an authenticated statement from your commanding officer telling you that this cube is clean and the images contained therein are permissible.  \"Relax ${firstname},\" your smiling C.O. says to you through the cube's projection, \"this is your reward for making it to the ass-end of the universe in one piece.  Go enjoy your life.\"  The image ends and you find yourself staring at the Earth again.\n        *set velvet 2\n        *goto debussy2\n\n      *else\n\n        It occurs to you this database might contain information that you as a quarantine agent would want to know about.  Debussy puts you at ease, however, by explaining that he had it created with your commander's approval back on Earth.  He even shows you the necessary authorization.  So you're good.\n        *set velvet 2\n        *goto debussy2\n  \n*label dna\n*if DNA = true\n\n  He looks directly at you and begins speaking in a low monotone.  \"As you know we lost one passenger along the way.  A terrible tragedy.  Have you learned anything about the cause of this tragedy that would interest me?\"\n\n  I have no idea what interests you, you think to yourself.  But no, there's not much yet to share.  You've given primarily responsibility to the local authorities, though there are matters you've also kept for yourself.  As you explain this to the shipowner, he seems to understand the preliminary status of your investigation.  Debussy assures you of his full cooperation in all matters pertaining to Augustine's untimely death.  That may come in handy.\n  *set investigation %+10\n  *return\n  \n*else \n\n  The shipowner runs through a few clerical items needing clearing up.  Then he changes posture.  \n  *return\n\n*label debussy1\n*if image = true\n\n  Just as you are about to wrap things up you remember one more very important thing.  The image Augustine programmed his pod to display if he died.  Not surprisingly Debussy has already heard all about it.  \"Yes,\" he says, shaking his head, \"a strange thing indeed.  I did not recognize the image myself, though he certainly seemed the type of person our dear departed historian would familiarize himself with.  I suspect he is the likeness of someone from history.  Perhaps there is some symbolism in his image.  Frankly, however, I'm weary of discussing it.\"\n\n  Do you want to continue quizzing Debussy about the image or let it go?\n  *choice\n    #Continue.\n      *comment the idea is that the image isn't a specific person, like St. Somebody or Another, but instead is merely the visual representation of the type of death.  There's also a sleeping angel, representing peaceful death, and someone in chains, representing execution\n      \"I'm weary too,\" you respond, \"but we might not get this chance again.  Is there anything else we might look at to try to figure out who that image is?\"  \n\n      Debussy lets out a long, dramatic sigh before finally speaking again.  \"I doubt it, Capt. ${lastname}, though one thought does occur to me.  True, Augustine's vessel projected a particular image upon his death.  But I am curious as to whether his vessel was equipped to project more than one image.  Perhaps the choice of image reflects somehow upon the nature or timing of his death.  Intriguing, no?\"\n\n      Intriguing yes, you think to yourself.  \n      *if DNA = true\n        Since the pod is now down on Niah's surface you'll have to make sure that either they or your team check up on the pod's programming.\n        *goto debussy2\n\n      *else \n        Debussy has no problem asking the Jessica's people, still examining Augustine, to check the pod's programming for other potential images.\n        *goto debussy2\n\n    #Drop it.\n      \"No problem, Mr. Debussy.  Perhaps another time.\"\n      *set image false\n      *goto debussy2\n\n*else\n  *goto debussy2\n\n*label debussy2\n*page_break\nJust as you're about to make further conversation Debussy speaks again.  \"Truthfully, I am quite weary.  If you don't mind, ${firstname}, I will take my leave of you for now.  I am only here at all because of our home planet's quaint belief that these majestic starships would explode mid-voyage unless the owner was aboard, and now I need a nap.  As the embodiment of our civilization's lust for lucrative safety, I feel I should look my best before showing my face downstairs.  Adieu.\"  With that he sweeps past you and gracefully exits the room.\n\nFor a moment it feels as though the air in the room has thinned.  Then things return to their calm state.  You are alone, accompanied only by your thoughts.  Those thoughts are centered on this shipowner who is out here with you.\n\nNow that you have had a chance to meet Debussy, what do you make of him?\n*choice\n  #Just another offensively wealthy and tiresome person.\n    *if ambitious \u003c 50\n      You didn't come all the way out here simply to be reminded of the ostentatious wealth of the elites you left behind.  Good for him that he's successful, but you measure success somewhat differently.\n      *finish\n\n    *else\n      True, but as you've learned those people never go away.  You just have to get used to them.\n      *set ambitious %+8\n      *finish\n\n  #Suspicious.  It's odd how he seemed to know so much more than he was supposed to.\n    *if diligent > 50\n      Already you're going back over the events of the past two weeks.  Has everything on the Jessica been as it seemed?\n      *set ambitious %-8\n      *finish\n\n    *else\n      And yet, perhaps not surprisingly, he had an answer for everything.  That, coupled with the lack of anything actually inappropriate, means you're probably just being paranoid.\n      *finish\n\n  #Ka-ching -- getting in with a guy like this could really help me get ahead out here.\n    *if corruptible > 50\n      Clearly this man pulled strings not only to get where he is but to stay there.  You'd love to learn some of the tricks of the trade.  Hopefully you'll have a chance soon.\n      *set corruptible %+8\n      *set ambitious %+8\n      *finish \n\n    *else\n      Not to mention he strikes a rather handsome pose.  All around he's your kind of guy.\n      *set corruptible %+8\n      *finish\n\n  #Somebody worth spending more time around; his success might inspire me.\n    *if ambitious > 50\n      You resolve to get to better know this shipowner and investor, not so much for what he can directly give you as for how he can help you.\n      *set ambitious %+10\n      *finish\n\n    *else\n      Which is all very nice, but now that you've finished screening his ship's cargo you're not sure where to begin.  Niah's a big planet.  Even if the population is still small, how easy will it be simply to run into a guy like that?\n      *set ambitious %+8\n      *finish ", "cleancowv6": "*comment Choice of Worlds Vignette 6\n*comment Copyright 2013 Andrew J. Schaefer\n*comment arriving at the surface and getting up to speed\n\nIt's now three days later.  You're only just getting used to the planet's 27-hour days.  But you will never fully adapt.   They say an Earth-born body cannot reset like that.  The influence of millions of years of evolution does not simply disappear overnight, to pardon the pun, no matter what technological advances humans may develop.  Heddes, not surprisingly, seems more comfortable than the other officers.  \"I've been trying to adapt to a foreign environment all my life,\" your space-born agent said the first night.  Then he smiles.  \"It's nice to have a leg up on everyone for once.\"\n\nThe day's length is just one of a hundred differences between this world and Earth.  Each one is as profound in its own way as the next.  The year is shorter.  The gravity is stronger.  The air is thicker, slightly greener than the blue of Earth, and smells altogether different than anything you've experienced at home.  And on clear nights you're blessed with something nobody on Earth has seen for centuries -- a brilliant sea of stars and nebulae enveloping the sky in every direction.  It's a glorious nighttime sky that technology long ago eradicated from Earth.  Niah's surface, anyway, is absolutely empty by comparison.\n\nUnfortunately perhaps not forever.  Human settlement is going full steam ahead.  Though still tiny by old world standards, Niah's population is now in the tens of thousands.  It's an exotic mix of new arrivals, travelers passing through, and fourth- or fifth-generation colonists.  Once again spaceflight's relativistic effects have wreaked havoc with the normal timespan of things; two apparent 30-year olds on Niah might have been born half a century apart.    \n*page_break How do I fit in?\n*if sentimental > 60\n
