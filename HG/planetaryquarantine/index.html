, selling local stuff to local people.  Your idea is to start farming on some land just outside town and then bring the produce in for sale.  Neat and tidy, your little corner of the world will in its own way help solidify the social fabric of this place.  \n\n  Maybe you can also take advantage of your new business to better exchange ideas with the locals.  After all, you find you have this urge to help shape the way people out here think.  No matter what you do in the future, you will always carry the knowledge that you made a difference, a helpful difference, even if it's through a process that you can't discuss with the public.  Hopefully Augustine and his stable of images would appreciate that.\n  *set path 0\n  *goto civ\n\n*label civ\n*page_break\nAs an aside, are you curious what Niah's like these days?  Events, including your choices, have had an influence on how this world continues to develop.  If you're not interested, of course, you can just go on to the next chapter.\n*choice\n  #No thanks, I don't need to read up on Niah's development\n\n    Fair enough.  \n    *finish\n\n  #Tell me how things are developing\n\n    Sounds good.  Here's an overview:\n\n    *goto summary\n\n*label summary  \n*gosub pa\n*gosub en\n*gosub eg\n*gosub se\n\nThis is where you live now.  All these issues will influence how successful you are out here.  It's going to be an interesting place to navigate.  \n*finish\n\n*label pa\n*if path = 0\n  At the outset, your quarantine work was, shall we say, less than ideal.  In theory this society should be able to withstand downward pressure.  \n  *return\n\n*else\n  First and foremost, your efforts to solve the mystery of the quarantine screen contraband have left their mark.  \n  *return\n\n*label en\n*if enlightened \u003c 40\n  Nevertheless, you have to admit there are some troubling qualities bubbling up to the surface.  The purpose of the quarantine screen was, in essence, to build a better human society.  That was the theory, anyway.  In practice, you're sad to see that out here it's increasingly becoming about how to get rich quick.  The noble aspirations of the earliest colonists have slowly given way to a more craven, short-sighted and materialistic approach.  You're in a system that was obviously pristine only a few centuries ago; yet already there are parts of Niah and some of the other satellites that have been despoiled.  Resources have been scraped out of the ground (or from under the surface).  The civic fabric, similarly, has been frayed more than bolstered.  There's a palpable sense, especially among the oldtimers, that the same attitudes that ruined so much of the New World back on Earth are out here ruining these new worlds once again.  \n  *return\n\n*elseif enlightened > 70\n  When the Interstellar Consortium first proposed a quarantine screen, the theory behind it was that the easiest way to create a better human society out among the stars was to carefully process those humans going out and creating it.  The best cake comes from the finest ingredients, and all that.  You're happy to see that the theory has worked fairly well in reality.  There is a palpable sense of cohesion out here; a notion that the worlds (note the plural) exist to improve everyone's quality of life.  And that those worlds are themselves treasures to be carefully maintained.  Humanity has left its indelible mark on Niah.  But the original Niah will never disappear.  With luck it appears that humanity is making the most of its second chance.  \n  *return\n\n*else\n  Frankly, Niah's taking on a familiar look.  When the Interstellar Consortium first proposed a quarantine screen, the theory behind it was that the easiest way to create a better human society out among the stars was to carefully process those humans going out and creating it.  Perhaps it's not surprising that the theory isn't working out all that well in practice.  Rather than an idealised society you get the impression, especially from the oldtimers, that things are becoming more and more like how they were back on Earth.  More mundane, more craven, more corrupt.  \n  *return\n\n*label eg\n*if egalitarian \u003c 40\n\n  Politically, there is a new aristocracy developing.  Somebody even tried to establish a duchy on the back side of one of the moons in this system.  That didn't work -- but only because the elite already had their own designs for the land, not because the duchy necessarily offended anyone's sensibilities.  It is with an increasing sense of frustration that the population out here watches as their ruling elite centralizes and cements their authority.  \n  *return\n\n*elseif egalitarian > 70\n\n  Society's formal structure increasingly reflects an egalitarian approach.  You're happy to see that the quarantine screen has successfully minimized humanity's worst instincts.  The jealousy, backwardness and greed that have characterized so many emerging governments seems lacking here.  People are genuinely happy with their return on investment.  It takes a huge amount of effort to get out here and it would have been a shame if it was all simply to replicate the worst repressive regimes of Earth.   \n  *return\n\n*else\n\n  On the political front, there have been efforts made to consolidate power among a handful of oligarchs but to date those efforts have failed.  A few shipping families tried to corner the market on heavy metals.  The backlash was immediate -- there continues to be this sense, almost unacknowledged, that there really is the right way and the wrong way to do things.  Nobody can quite put a finger on it, but the sense of fair play is palpable.  (Whenever it's brought up you tend to smile to yourself.)  Humanity will need to remain vigilant, of course, but it could have been worse.  \n  *return\n\n*label se\n*if sentimental \u003c 40\n\n  What's interesting and, perhaps, to be expected is that Earth is quickly being left behind.  You can barely see the Sun with the naked eye, and you have to know precisely where to look (few do anymore).  Even then it is merely one of thousands of white dots illuminating Niah's brilliant night sky.  What's orbiting the Sun, likewise, doesn't really mean much out here anymore.  Even since you got here the attitude has hardened, though again the oldtimers tell you it's been slowly going that way for a few decades now at least.  Earth is too far away to exert any tangible control.  There will be no interstellar empire in your lifetime.  \n  *return\n\n*elseif sentimental > 70\n\n  Through all of this there remains a strong emotional attachment to Earth, the cradle of humanity.  Everyone's from there in a manner of speaking.  Virtually every animal is from there.  Every belief system, cultural code or societal standard is Earth-based.  The farther humans have traveled from their birth world the more their tenuous links with that planet become important to them.  \n  *return\n\n*else\n\n  Driving all this is a sense that the civilization out here is maturing.  It's still a product of Earth, of course, and there are colonists coming out from Earth on a regular basis.  But just as the New World colonies during Earth's first age of exploration reached a tipping point where they started to think of themselves as equal to their mother countries, so too Niah and the other worlds out here seem to be developing a healthy sense of their own maturity.  \n  *return\n\n*label dead\nThe next thing you know you're awake in an unfamiliar place.  It takes you a few moments to come to your senses -- you've clearly been asleep (or unconscious), but you have no idea for how long.  Your mind is a haze and your body aches all over.  Gradually everything starts to come into focus as your mind clears and you sense you are somewhere small and tight.  There's actually something very familiar about the whole experience.  It's like having a word sit tantalizingly on the tip of your tongue.  Anxiously you wait for your mind to finally put everything together.\n\nOnce that happens, however, terror strikes you.  You know where you are because you've been here before.  You're inside a freezer pod aboard a starship.  A freezer pod that you cannot open.  You cannot get out.  Your heart starts to race and your breathing picks up so much you almost hyperventilate.  A profound sense of suffocation sweeps over you as you try to scream and you frantically press your hands against the pod.  It's incredibly loud to you, inside, but you know from first-hand experience that no sound can escape a sealed pod.  \n*page_break\n*if ambitious > 69\n  Then you stop what you're doing.  Training takes over.  Calm down, you think to yourself.  Assess the situation and figure out a solution.  \n  *goto notreallydead  \n\n*elseif enlightened > 64\n  Then you stop what you're doing.  Training takes over.  Calm down, you think to yourself.  Assess the situation and figure out a solution.  \n  *goto notreallydead\n\n*else\n  It gets worse.  As you desperately look around the room you see that the other pods are all occupied but still unfrozen.  At first you think this means you are about to be put to sleep.  I'm being sent somewhere, you think, which is awful but at least I'm alive.  Only when the freezing process starts, and the other pods go through their routines as the ship's systems power down for the voyage, do you realize (in hysterical anguish) that you're able to watch what's happening around you.  It's like being awake for an operation and unable to tell anyone.  Or buried alive in a coffin and left to die.  \n\n  You are trapped in this pod but you are not going to sleep.  Thanks to your pod's modified life support systems you're about to experience the entire voyage of whatever starship you're on.  Neither death nor coldsleep will save you.  You don't know what ship you're on or where you're going so you have no idea how long your entombment will last.  It could be years or it could be decades.  Whoever your enemies are have not bothered to kill you because by the time you finally reach your destination and get let out you'll be a babbling mess of virtually mindless incoherency.\n  *goto_scene ending\n\n*label notreallydead\n\nHow to get out?!?  There's nothing on your wrist or in your pockets.  The pod is otherwise clean.  So you need to use your mind.  Fortunately you've just spent two weeks screening passengers inside these very same coldsleep pods, so you close your eyes, take a few deep breaths, and start recreating in your mind every nook and cranny of every coldsleep pod you worked on.  You put your mind's eye above, around, and outside this pod.  Then you go over every aspect of the pod like you're building one from scratch.  \n\nYou don't know how much time you have, so you work as quickly as humanly possible.  Who knows when the life support might cut out, or if the freezing process is about to start, or -- heaven forbid -- the freezing process isn't about to start and you've simply been left to die in here. \n\nPretty soon, however, you have it figured out.  A couple strong kicks here, and some strong pressure on a handful of sensors there, and the pod malfunctions.  Once that happens it automatically opens.  You breathe a gigantic sigh of relief and jump out of the pod like you're on fire, almost twisting your ankle and dislocating your shoulder as you do so.  (Turns out the pods are actually fairly easy to open from the inside since, by definition, nobody inside them is ever meant to be awake.)  This is especially impressive since there doesn't seem to be much gravity here.  You hop on your good ankle and almost launch yourself into the ceiling.\n\nWhere the hell are you?  And how did you get here?  And what are you going to do about it?  \n*page_break\nStumbling out of the pod room and through the nearest door you quickly find some answers.  \n\n\"Holy crap,\" a startled starship officer shrieks, \"you're awake?!?  They said you were in a coma!\"  Quickly you look around and see that you're in a hallway.  The starship officer was in the middle of some checklists when you stumbled out in front of him.  Clearly he was not expecting to have to talk to you.  \n\nWeakly you respond:  \"Where am I?\"  More strongly:  \"What's our status?\"  Then, before the officer can even answer, you shoot a third and more pointed question at him:  \"And WHO said I was in a coma?\"  Even as you ask these questions you begin to regain your strength, as the full realization of what's happened to you becomes apparent.\n\n\"You're on board the Artemis,\" the officer answers.  He looks unsure of what to make of you.  \"In geosync over Niah.  We're getting the ship back up to flight condition.\"  He looks you up and down.  \"They put you here because of your condition.  I mean, holy crap, what's going on?\"  By now the officer seems more confused about you than you are.\n\n\"My condition?  What are you talking about?\"\n\n\"They said you'd picked up something from Earth or one of our moons,\" he answers.  \"Really rare.  They said it did a real number on you, but that you wanted to be kept up here in orbit under controlled low-g conditions while they worked on a cure.  So they brought you up in a pod and put you in the room.  We weren't supposed to touch you.  So we've just been ignoring you.\"  He says that last part sheepishly.\n\n\"Who's 'they'?\"\n\nThe officer looks confused.  \"Everybody,\" he says.  \"You're not exactly a secret.  Look, we've got to report this.  I don't know if you're supposed to be walking around.  I'm not a medical officer.  I don't even know if you're contagious.\"  As he says this he starts to back away a bit, and you notice that as he said the word \"contagious\" he instinctively put his hand over his mouth, as if that would keep whatever disease you supposedly have at bay.\n*page_break\nThis is ridiculous, you think to yourself.  Somebody put me here.  Somebody who didn't want us figuring out what was going on.\n\nMore crew arrive before you can ask this officer any more questions.  They whisk you away for a checkup and some new clothes.  Everybody on board seems sincerely concerned about your condition.  They're clearly the product of a good quarantine screen, since they apparently take all this completely at face value.  You can at least take some small comfort in that.  \n\nA few hours later you're in a recovery room talking with some of the crew.  You were in coldsleep for three months.  It turns out that the officer you'd encountered had inadvertently woken you up.  Only he didn't realize it at the time.  He'd been running a test that simulated what would happen if the ship was about to leave orbit.  The test had apparently triggered something in your coldsleep pod, which then woke you up.  \n\n\"Your pod didn't know it was just a simulation,\" he says, ominously.  \"It thought it was waking you up at the start of a real 10-year spaceflight somewhere, just as everyone else was being frozen.\"  And because you were already a medical patient with a dedicated life support system, you would have stayed alive the whole time.  \"Like being buried alive,\" the officer tells you, \"only with the knowledge you're not going to die.  Good thing we saved you -- you would have been a hot mess by the time we'd gotten anywhere.\"\n\nThen you find out the rest of the bad news, and it hits you like a ton of bricks.  Dallas, Heddes and Bryson are all dead.  \"They were killed,\" another officer tells you, \"during some kind of accident on the outskirts of Niah city.  They were out riding horses at a farm and some old generator exploded.  It was all in the news.\"  \n*page_break \nEverything else becomes background noise.  A minute ago you were bewildered and confused; now you're despondent.  In fact, you're no longer sure that it really was an accident that you woke up when you did.  The Artemis officer might have just assumed it happened that way.  Perhaps, you think to yourself, the real intention was for me to wake up after a couple months, too late to do anything about it but soon enough that anyone I met would know that my team had been killed.  That my friends are dead.  \n\nYou barely hear the medical officer telling you that you're sick.  Apparently you really do have some kind of fatal disorder that can be managed but not (presently) cured.  Which is news to you, since you had a clean bill of health on the flight out on the Jessica, but you almost don't care.  They must have given it to you.  At least that makes the cover story believable.\n\n\"I'd say you've got six months, a year tops,\" the medical officer says, \"unless somebody figures out how to cure you.  I know that's in the pipeline -- there've been some cases on Hadley's World, three light years away -- but any cure looks like it's at least five or ten years away.\"\n\nWhich puts you at a real crossroads.  Stay awake now and you'll die before a cure is developed.  Go into coldsleep to wait for a cure, and you'll lose any chance of solving the Augustine case, or of bringing your team's killer(s) to justice.  It's already been three months.  It might almost be too late regardless.  Or, you can concede defeat and give up.  Just go live out your life somewhere and let the rest of humanity worry about the big picture.  They got to you, they killed your colleagues, and nobody seems to be any wiser for it.  Who are you kidding?  Is there really anything you can do about it?\n*choice\n  #Stay on the case -- my life only has meaning if I hunt down my team's killers and solve the case\n\n    Quickly you realize that no matter what it means for your own life, you simply cannot turn your back on your team.  They -- and you -- were out here to do a job.  Even if you're only still alive thanks to an accident, you've been given a second chance.  \n\n    It's a noble sentiment.  Certainly your anger and frustration are very real.  There's just one problem, however.  You're only in this fix because you and your team failed to get it right the first time.  Now you're even weaker than you were before, with fewer resources, while downstairs the world has moved on without you.  Almost as soon as you vow revenge, you slump back down in your chair, despondent over the fact that it's going to be impossible to achieve.  \n\n    So instead you follow the suggestion of the people who put you in this awful situation in the first place.  Finding a fully functioning coldsleep pod this time, you agree to go back under the ice.  This is something, after all, that people have been doing since back on the early days of Earth.  Those efforts never worked out, of course, but nowadays coldsleep technology is fairly well perfected.  You just spent 40 years in one, after all.  \n\n    Thanks to a sympathetic crew you agree to go back to sleep.  The coldsleep stasis will protect your body from the effects of disease, slowing down (but not eliminating) the risks to your life.  Hopefully when you next wake up, it'll be to the happy news that you're about to be cured.  Maybe then you'll be able to piece together what happened here.  You might even find those responsible and expose them.  Hey, it's possible, right?  And that chance, however small, is what you're giving yourself.  And since you're doing it on board the Artemis, who knows if you'll even still be at Niah when you wake up.\n\n    All that is for another story and another day.  Thanks for playing and try again -- there's a lot more out there to be discovered.\n    *goto_scene ending\n\n  #Live to fight another day -- do what I can to get cured of whatever disease I have\n\n    There's really nothing you can do about what's already happened.  It's too far removed in time and you're simply too powerless to make a difference.  So instead you follow the suggestion of the people who put you in this awful situation in the first place.  Finding a fully functioning coldsleep pod this time, you agree to go back under the ice.  This is something, after all, that people have been doing since back on the early days of Earth.  Those efforts never worked out, of course, but nowadays coldsleep technology is fairly well perfected.  You just spent 40 years in one, after all.  \n\n    So thanks in part to a sympathetic crew, you agree to go back to sleep.  The coldsleep stasis will protect your body from the effects of disease, slowing down (but not eliminating) the risks to your life.  Maybe then you'll be able to piece together what happened here.  You might even find those responsible and expose them.  Hey, it's possible, right?  And that chance, however small, is what you're giving yourself.  And since you're doing it on board the Artemis, who knows if you'll even still be at Niah when you wake up.\n\n    All that is for another story and another day.  Thanks for playing and try again -- there's a lot more out there to be discovered.\n    *goto_scene ending\n\n  #Give up and retire\n\n    Even the proudest warriors sometimes know when to call it quits.  As a quarantine officer you had access to all sorts of contraband information, and one morsel of it suddenly pops into your head.  \"I will fight no more forever,\" you say out loud to nobody in particular.\n\n    The Artemis officers with you have no idea what you're talking about.  But behind them an image of Niah floats effortlessly on a screen.  It looks beautiful, you think.  Time to get down there and live out my days quietly, peacefully, meekly.  \n    *if love_interest > 0\n      Fortunately ${partner} is still safe and sound.  But this whole incident, coming as it did so soon after the two of you met, had pretty much killed your relationship.  You catch up but agree to part ways, amicably.  Just one more thing they managed to kill. \n      *goto_scene ending\n    *else\n\n      You get no resistance from anyone.  So long as you live in the shadows, it seems, you are free to go about your days unimpeded and unharassed.  There aren't too many of them left anyway.  Though who knows, you might get a reprieve.  \n\n      *goto krissareunion\n\n  #Wait, how do I know these people aren't lying to me?!?\n\n    Actually you don't.  You're sitting in a room with a bunch of people you don't know, and they're telling you all sorts of terrible things about yourself and your friends, and you're just taking it at face value?  Maybe these are the people who put you here in the first place!\n\n    You suddenly get a lot more confrontational.  You demand some answers, some explanations, some proof that what they're telling you is actually the truth.  It's a familiar scene -- you jumping up and retreating to the corner, them raising their hands and telling you to calm down and take it easy.  The news you've just received is a lot to process, after all, so the Artemis crew aren't exactly surprised you're starting to freak out a bit.  \n\n    By now the whole ship knows you're awake.  More than that, the whole consortium handling the Artemis rehab knows about you.  Some dude woke up inside a mothballed coldsleep pod; that's pretty big news even on a planet 30 light years from Earth.  You're like a mummy coming back to life in a museum somewhere.  It affords you some measure of protection as you try to maneuver your way back into society.  You're able to get off this starship and back downstairs.  The local Niah medics give you a thorough once-over and, to your great surprise and relief, tell you that you're \"as healthy as a gift horse in the mouth.\"  (Apparently they were trying to reassure their Terran patient by using what they thought was a common old Earth saying.  Points for trying, you guess.)\n    *page_break Second chance?\n    It's all good news for you, but bad news for the mission.  You've been out for three months.  That turns out to have been more than enough time to wipe clean whatever leads you'd been able to develop.  People have disappeared, physical evidence has been obliterated, and resources have dried up.  Without your team or your office you have no chance of doing anything about whatever it was that got you in this mess in the first place.  \n\n    You've got to concede defeat.\n\n    Instead you start rebuilding your life.  This isn't some medieval world, of course; you're not living in a cardboard box by the side of the road or anything.  You have a comfortable standard of living and an entire planet available for you to explore and embrace.  \n    *goto krissareunion\n\n*label krissareunion\n\nThere's now only one person left on Niah from the old days.  It's your disgraced deputy, Krissa Mackenzie.  You last saw her right before the horse farm assault.  Of course you assumed at the time you'd never see her again.  Little did you know, in the wake of these events, that three months later she would be the only one left.  You look her up and see, to your astonishment, that she's living alone in the hills outside of town.  From all appearances she's in pretty much the exact same situation as you are.  Suddenly you think about confronting her.  Do you want to pay her a visit, or let bygones be bygones?\n*choice\n  #Absolutely go see her\n\n    You head out there for some answers.  Coming up the road to her home, you feel an ever-increasing sense of dread.  Dread coupled with anger.  This person, after all, betrayed you.  Your team are very likely dead because of her.  If you can't bring them back, if you can't bring justice to Dallas, Heddes and Bryson, then at the very least you can take it out on Mackenzie.\n\n    The meeting, however, is anticlimactic.  Like you, your former deputy is a broken, defeated person.  You'd built up in your mind this image of Mackenzie as some kind of evil mastermind.  Reality instead turns out to be much more banal.  Mackenzie gives you her mea culpa:  She had no idea anybody was ever going to get hurt -- they'd flat-out lied to her about what was happening -- and she'd only been involved at all because of some family pressures back on Earth.  Somebody else had made some mistakes and, to try to cure them, Mackenzie had agreed to carry some information out to Niah for the authorities.  When the Jessica left Earth she'd understood that what she was doing was basically no big deal.  Only when you all awoke did she discover that her family had been put into coldsleep pods and were being held hostage back on Earth.  Even children.  They would be revived only when word reached the home world that things were carried out acceptably.  \n    *page_break\n    This hardly lets her off the hook, of course.  There are a million things Mackenzie could have done differently.  Like trust you to help her, for starters.  But as the two of you discuss the situation you come to see Krissa as just another imperfect human being trying to do the right thing.  She'd found herself way over her head, under pressure from people much, much stronger than her, and she'd tried to protect herself and her friends.  It had backfired horribly, of course, but then again isn't that usually what happens?  How many well-intentioned people have wound up destroying exactly what they thought they were trying to save?  As you think of this you look her over.  She's aged, you think.  She's aged a lot.  Almost as though the lost years from your voyage out to Niah have caught up to her.\n\n    Eventually the conversation turns back to that moment on the Jessica, during the screening process, when Mackenzie had started talking to you about your legacy.  Do you want to be remembered as a god, a servant or a prophet? she'd asked.  \"They'd promised me I would be a god,\" she tells you, \"even though I didn't want that.  It sounded horrible.  That was when I knew something wasn't right.  So I was wrestling with that when I was talking to you, and I tried to get a sense of where you were with my questions.  I should have said more,\" she laments. \"I don't know why I didn't.\"\n\n    You almost try to console her, before you decide that her angst is well-deserved.  So you let things be.  But you also think about how you'd answered her question, and how you would have answered if you knew then all that you know today.  Everybody thinks about their place in the world, you say to yourself.  We all want to be right.  \n\n    So this is how this story ends -- you and Krissa Mackenzie, sitting side by side on a hilltop over town, gazing down on a growing city thirty light-years from Earth.  The next chapter is for another story and another day.  Thanks for playing and try again -- there's a lot more out there to be discovered.\n    *goto_scene ending\n\n  #No, she's dead to me\n\n    Let it go, you think.  In fact, it's better that way.  Let her live with whatever she's done.  I'm done fighting these battles.  I want to look ahead for once, and try to make something better for myself.  Krissa's the last person I need to see.\n\n    Instead you start working on your new life.  Nobody knows your background, nor does it really matter.  In a sense you have a chance at yet another fresh start.  It's maddeningly frustrating, of course, to get that fresh start under these circumstances, but you can still make the most of it.  Maybe you'll open a pet store (they have cats out here).  Maybe you'll be a farmer.  Maybe you'll run for office.  Who knows?\n\n    All that is for another story and another day.  Thanks for playing and try again -- there's a lot more out there to be discovered.\n    *goto_scene ending\n    \n*label badciv\n*if enlightened > 50\n  *set enlightened - 40\n  *return\n  \n*else\n  *set enlightened 20\n  *return\n\n*label badciv2\n*if egalitarian > 50\n  *set egalitarian - 40\n  *return\n  \n*else\n  *set egalitarian 20\n  *return\n\n*label badciv3\n*if sentimental > 50\n  *set sentimental - 20\n  *return\n  \n*else\n  *set sentimental 30\n  *return\n  \n*label goodciv\n*if enlightened \u003c 70\n  *set enlightened + 25\n  *return\n  \n*else\n  *set enlightened 85\n  *return\n  \n*label goodciv2\n*if egalitarian \u003c 70\n  *set egalitarian + 25\n  *return\n  \n*else\n  *set egalitarian 85\n  *return", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Planetary Quarantine.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "screenshots": "*comment Planetary Quarantine screenshot\nscreenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*set diligent 40\n*set ambitious 60\n*set corruptible 70\n*set investigation 40\n*set sentimental 80\n*set enlightened 80\n*set egalitarian 80\n*set love_interest false\n*set freezerburn 0\n*set wander false\n*set timekill 1\n*set seniors 0\n*set krissa 0\n*set exotic 0\n*set goldcoin 0\n*set alive 1\n*set image false\n*set brysoninvest 0\n*set DNA false\n*set case 0\n*set baggage 0\n*set velvet 0\n*set ruth 0\n*set newz 0\n*set path 0\n*set goal 0\n*set filler 0\n*set focus 0\n*set firstname \"Rod\"\n*set lastname \"Shaftwell\"\n*set partner \"Fred\"\n\n\"Maybe,\" Heddes says, \"you can shoot something besides a wall, you know?\"  At the same time your junior officer suggests this, the girl's balloon changes form.  Now it really is a pulse grenade.  It isn't active -- you're not dead -- but it's live.  \n\n\"I'm going to kill you,\" the imaginary little girl taunts.  Her thumb moves slowly towards the grenade's trigger switch.  How are you going to stop her?\n*fake_choice\n  #I shoot to kill.\n  #I shoot the grenade.\n  #I put down my gun and ask her to stop.\n\n*script changeBackgroundColor(\"black\")\n*set diligent 75\n*set ambitious 60\n*set corruptible 40\n*set investigation 60\n*set sentimental 50\n*set enlightened 30\n*set egalitarian 20\n*set love_interest false\n*set freezerburn 0\n*set wander true\n*set timekill 1\n*set seniors 0\n*set krissa 1\n*set exotic 0\n*set goldcoin 0\n*set alive 1\n*set image false\n*set brysoninvest 1\n*set DNA true\n*set case 0\n*set baggage 0\n*set velvet 0\n*set ruth 0\n*set newz 3\n*set path 1\n*set goal 2\n*set filler 1\n*set focus 0\n*set firstname \"Maxwell\"\n*set lastname \"Dumb\"\n*set partner \"Billy\"\n\nEnjoying all this -- if they're not distracted by myriad other pleasures -- are the party's thousand guests, themselves being waited on by a hustling phalanx of highly efficient staff.  Colors, sounds and scents waft throughout the throngs.  There's a mix here of locals, recent arrivals and in-betweens.  Debussy is making himself visible to Niah's elite.  Nothing this man does, it seems, is merely for show.  But enough about him.  Now that you're here, what do you feel like doing tonight?\n*fake_choice\n  #Work the room.  Let's get to know Niah's movers and shakers.\n  #Have some fun.  I haven't been to a party in 40 years and this one looks awesome.\n  #Keep digging on quarantine issues.\n\n*script changeBackgroundColor(\"sepia\")\n*set diligent 28\n*set ambitious 38\n*set corruptible 50\n*set investigation 40\n*set sentimental 40\n*set enlightened 30\n*set egalitarian 50\n*set love_interest false\n*set freezerburn 0\n*set wander false\n*set timekill 1\n*set seniors 0\n*set krissa 0\n*set exotic 0\n*set goldcoin 0\n*set alive 1\n*set image false\n*set brysoninvest 0\n*set DNA false\n*set case 1\n*set baggage 0\n*set velvet 0\n*set ruth 1\n*set newz 2\n*set path 2\n*set goal 0\n*set filler 0\n*set focus 0\n*set firstname \"Madame\"\n*set lastname \"Bovary\"\n*set partner \"Barney\"\n\nClearly you have to do something.  But you're on the surface, past quarantine, and you no longer have jurisdiction.  Your team can check out Ruth/Karina on the sly, hoping that the investigation doesn't trip any alarms.  Or you can try to have the Niah authorities detain her under whatever cover story your team can come up.  That would make your investigation easier but it risks disclosing too much.  Either way you should decide quickly.\n*fake_choice\n  #Have our team investigate by ourselves\n  #Ask the police to help\n  #Screw it - just bust down the door and grab her!\n\n*set diligent 80\n*set ambitious 70\n*set corruptible 30\n*set investigation 70\n*set sentimental 45\n*set enlightened 55\n*set egalitarian 65\n*set love_interest true\n*set freezerburn 0\n*set wander true\n*set timekill 1\n*set seniors 0\n*set krissa 0\n*set exotic 0\n*set goldcoin 1\n*set alive 1\n*set image false\n*set brysoninvest 0\n*set DNA false\n*set case 1\n*set baggage 1\n*set velvet 1\n*set ruth 2\n*set newz 3\n*set path 0\n*set goal 0\n*set filler 0\n*set focus 0\n*set firstname \"El Biggo\"\n*set lastname \"Grande\"\n*set partner \"Ethel\"\n  \nShe explains her theory.  It's his starship, of course, and nobody else had anything like the access he did.  He seemed very interested in the quarantine team members; she heard he'd even given out some kind of projection globe which itself included references to the quarantine process.  And he seemed to know a lot about Augustine's freezer pod, even mentioning something about different images to be displayed in case Augustine died.  Plus, Mackenzie says, he's weird.\n\nDoes this make any sense to you?\n*fake_choice\n  #This is absurd.\n  #Maybe.  Did Augustine and Debussy have any problems between them?\n  #I'm sold.  It explains everything.\n\n*set diligent 20\n*set ambitious 80\n*set corruptible 70\n*set investigation 30\n*set sentimental 30\n*set enlightened 30\n*set egalitarian 40\n*set love_interest false\n*set freezerburn 0\n*set wander true\n*set timekill 1\n*set seniors 0\n*set krissa 0\n*set exotic 0\n*set goldcoin 1\n*set alive 1\n*set image false\n*set brysoninvest 0\n*set DNA true\n*set case 0\n*set baggage 0\n*set velvet 0\n*set ruth 0\n*set newz 1\n*set path 5\n*set goal 2\n*set filler 1\n*set focus 0\n*set firstname \"Roy\"\n*set lastname \"Batty\"\n*set partner \"Susie\"\n\nSomething very unusual stops you in your tracks.  Floating against what looks like an ancient brick wall are three lifelike figures.  Their appearances are macabre.  To the left is a decrepit old man in rags, his body displaying numerous serious wounds.  Next to him is an angel, his wings folded behind his back as he sleeps peacefully.  Finally there's a man bound in chains with a black noose over his head, as though he's about to be hanged.  \n\nYou've never seen these particular people before and have no idea who they are or why they're here.  As if on cue, however, a sentence suddenly appears beneath them.  \"Pick your poison,\" it says.  There's a lever under each one.  Which do you pull?\n*fake_choice\n    #Are you serious?  I ain't touching no \"poison.\"\n    #The sleeping angel.  What's the harm?\n    #The hooded, chained prisoner.  \n    #The wounded old man in rags.\n\n*set diligent 57\n*set ambitious 63\n*set corruptible 38\n*set investigation 60\n*set sentimental 50\n*set enlightened 50\n*set egalitarian 60\n*set love_interest false\n*set freezerburn 0\n*set wander false\n*set timekill 1\n*set seniors 0\n*set krissa 0\n*set exotic 0\n*set goldcoin 0\n*set alive 1\n*set image false\n*set brysoninvest 0\n*set DNA false\n*set case 0\n*set baggage 0\n*set velvet 0\n*set ruth 0\n*set newz 2\n*set path 2\n*set goal 1\n*set filler 0\n*set focus 1\n*set firstname \"Mary\"\n*set lastname \"Scots\"\n*set partner \"Louis\" \n\nThis is all coming a little quick for you.  I mean, who's \"they\"?  You're not even sure you know what she's talking about.  Yet you feel compelled to give a straight answer.  If you had your choice, how would you want to be remembered?\n*fake_choice\n  #As a god.  That's really what I am, after all.\n  #As a servant.  Keep it humble.  \n  #As a prophet.  I'd be known for the ideas I promoted, and for my ability to let the people use them as they pleased.\n  #None of the above.  This is crazy talk.  Remember me as a diligent quarantine officer, no more and no less.\n  \n*set diligent 57\n*set ambitious 63\n*set corruptible 38\n*set investigation 60\n*set sentimental 50\n*set enlightened 50\n*set egalitarian 60\n*set love_interest false\n*set freezerburn 0\n*set wander false\n*set timekill 1\n*set seniors 0\n*set krissa 0\n*set exotic 0\n*set goldcoin 0\n*set alive 1\n*set image false\n*set brysoninvest 0\n*set DNA false\n*set case 0\n*set baggage 0\n*set velvet 0\n*set ruth 0\n*set newz 2\n*set path 2\n*set goal 1\n*set filler 0\n*set focus 1\n*set firstname \"Mary\"\n*set lastname \"Scots\"\n*set partner \"Louis\"", "startup": "*comment Choice of Worlds Vignette 1.1\n*comment Copyright 2013 Andrew J. Schaefer\n*comment Thanks for playing!\n\n*title Planetary Quarantine\n*author Andrew J. Schaefer\n*scene_list\n  startup\n  cleanCoWv2\n  $ cleanCoWv3\n  $ cleanCoWv4\n  $ cleanCoWv5\n  $ cleanCoWv6\n  $ cleanCoWv7\n  $ cleanCoWv8\n  $ cleanCoWv9\n  $ cleanCoWv10\n  $ cleanCoWv11\n  \n*create ambitious 50\n*create corruptible 50\n*create diligent 50\n*create investigation 50\n*create sentimental 50\n*create egalitarian 50\n*create enlightened 50 \n*create love_interest 0\n*create freezerburn 0\n*create wander false\n*create timekill 1\n*create seniors 0\n*create krissa 0\n*create exotic 0\n*create goldcoin 0\n*create alive 1\n*create image false\n*create brysoninvest 0\n*create DNA false\n*create case 0\n*create baggage 0\n*create velvet 0\n*create ruth 0\n*create newz 0\n*create path 0\n*create goal 0\n*create filler 0\n*create focus 0\n*create firstname \"j\"\n*create lastname \"doe\"\n*create partner \"mom\"\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  You’re a quarantine agent – an extrajudicial lawman who lets only approved people and products leave Earth – and in a few days your starship will be arriving at your new home world.  A dead passenger, a mysterious society, and a potential threat to interstellar civilization all await you.\n\n  [i]Planetary Quarantine[/i] is an interactive science-fiction novel where your choices control the story. The game is entirely text-based--without graphics or sound effects--and powered by the vast, unstoppable power of your imagination.\n\n  Solve the case and save the world.  Build your life while building society.  Explore this richly intricate game where new surprises await you each time you play!\n\n  [i]You can play the first two chapters of the game for free. Purchase the rest of the game below.[/i]\n  *if choice_is_advertising_supported\n    [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n  *purchase adfree $3.99 purchased  \n  *if choice_is_advertising_supported\n    *page_break_advertisement\n  *if not(choice_is_advertising_supported)\n    *page_break Play Now for Free\n\n\n*label purchased\n\nYou've been hurtling through space at almost unimaginable speed.  So fast, in fact, that your ship's been braking for a year.  Ahead of you lies the planet Niah, a watery world with an oxygen-rich atmosphere bathed in the light of its orange star.  If all goes to plan then in a couple of weeks you'll be standing on Niah's surface, feeling its high gravity and breathing its unfamiliar air, as you and a few hundred other Earthlings start your lives again.\n\nYou are thirty-one light years from Earth.  Thirty-one light years from the only habitable planet humanity ever knew until recently.  Earth could have blown up decades ago and you still wouldn't know it.\n\nIt's taken you just over forty years to get here.  That's an eternity by your standards, but then you've grown up in an age when Earth is just one of dozens of worlds where civilization has planted its flag.  You know that even a few centuries ago the trip you're taking would have seemed like pure fiction.  Modern starships, like the jet planes or sailing ships of eons past, really have changed everything.\n\n*page_break Forty years?  How old am I?\n\nDon't worry, you were frozen in coldsleep almost the entire trip.  Even a skeleton crew would require so much food and water there'd be no room on the ship for anything else.  So while the ship's engines restarted a year ago to begin braking, you and the crew only began waking up a few hours ago.  Between coldsleep and spaceflight's relativistic effects, you've hardly aged.  Even now the pressure on your body is strengthening, as the ship relentlessly decelerates like a fast-falling skyscraper elevator as it begins to approach the lobby.\n\nThe passengers are still in deep sleep.  Aside from the hum of the engines and the beeps from machinery, this space skyscraper you're on is still very quiet.  Two lines on the ship's status board flesh out the situation.  They count down the remaining days to the tenth.  The first reads  \"Passenger Revive -14.7.\"  Underneath it the second line states: \"ETA -15.5.\"  They're pretty self-explanatory.  In 14.7 days the passengers will finally wake up and the ship will become an instant cacophany of living, breathing, bewildered humanity.  Less than a day after that the ship's long voyage will finally end.  You'll be at Niah.  You'll be in stationary orbit over an earthlike world.  \n\nYou woke up two weeks early for one very good reason.  You're what's known as a quarantine officer -- somebody who actually travels out with a starship to ensure that when it arrives at its destination it isn't bringing any prohibited materials.  That can include anything from a banned treatise on religious hatred to the formulas for genetic poisoning.  There's an idea afoot that when humans colonize the stars, they should try to do a little better than they did colonizing the distant shores of their own home world.  If you can control who and what gets out beyond Earth, you can create a better humanity.  It's an idea, anyway.  How well it works in reality will help decide what happens to you, to these colonists, and potentially to the entire course of human civilization as it spreads throughout the stars.  \n\n*page_break\n\nSo you're the captain of your quarantine team.  That's your job in a nutshell.\n\nYour personal life is a bit more murky at the moment.  As you get started with your job you'll have a chance to flesh out your own background and interests.  \n\nFirst things first -- you've got to get your bearings on this ship before you can screen anyone.  People don't exactly hop out of bed after 40 years of coldsleep.  When you woke up you felt like you'd been dropped from the top of a cliff into a pile of frozen slush.  Now you just feel like somebody's punched you in the head.  \n\nAs it is, you're standing outside your office, blankly staring at the input screen as it patiently waits to identify you.  A couple questions to begin your day.  \n\nFor starters, what's your first name?\n*input_text firstname\n\nWell hello, ${firstname}, glad you're awake.  And what's your last name?\n*input_text lastname\n\nThank you, Captain ${lastname}.  Welcome.  Help yourself to a drink.\n*fake_choice\n  #Coffee.\n    Mmm, hot and chalky, like a cup of black tar on a Mississippi summer day.  \n  #Flavored electrolytes.\n    No idea what flavored electrolytes are but they smell better than the coffee, that's for sure.\n  #Water\n    Always a safe choice, though this water has a definite freezer burn taste to it.\n  #No thanks, I'm not thirsty.\n    Suit yourself.\n\n*comment I'm still debating whether to ask about gender.  I'm inclined not to.  People can just assume whatever they want.  \nSince you're still shaking off the effects of coldsleep, nobody's going to criticize you if you start the day slowly, though your team will be ready soon.  \n\n*label liftoff\n*if timekill \u003c2\n  You've got a couple options available if you want to kill a few minutes before meeting with the team.\n  *goto liftoffprime\n*elseif timekill = 2\n  You probably still have time for one more thing if you want.\n  *goto liftoffprime\n*else\n  You're probably running out of time.   \n  *goto team\n\n*label liftoffprime  \nWhat makes sense to you?\n*choice\n  *hide_reuse #Check for any updated orders from Earth.\n\n    Good thinking.  You'd hate to start work only to find out that your plan is obsolete.\n    *gosub update\n    *goto liftoff\n  *hide_reuse #Wander the ship a bit and figure out what's what.  I need to stretch my legs anyway.\n\n    Makes perfect sense.  You're on the Jessica, by the way, an interstellar starship making its maiden voyage.\n    *gosub Jessica\n    *goto liftoff\n  *hide_reuse #Read up on Niah.\n\n    The name \"Niah\" actually started as an acronym -- it stands for Needle In A Haystack.\n    *gosub niahbackground  \n    *goto liftoff\n  #I'm good.  \n    *goto team\n\n*label update\n\nThere are updated orders from Earth waiting to be downloaded -- anything beamed during the first 10 years of your trip will already be here -- and once you process that you'll be able to get on with things.  \n\nNo sooner do you sit down than the display starts revising your quarantine protocol.  Text dissolves and reappears, images change, and bullet point conclusions rewrite themselves.  Wow that's fast, you think to yourself.\n\nMost of it is straightforward -- updates to existing thought lines and the like -- but in a couple instances the new orders are distressingly vague.  On questions regarding religion and violence, there used to be hard and fast rules.  Now you're learning that those rules have been slightly modified to give you, the ranking quarantine officer, some discretion.  As of the date these orders were sent, Earth was no longer sure it could effectively manage all aspects of the screen from so far away in space and time.  Which is flattering, on the one hand, but also troubling.  \n\nThinking about it right now, do you want to encourage exceptions at your discretion or just stick to the hard and fast rules as they were when you left?  Your decision could very well impact how the Jessica's passengers influence Niah once they get down to the planet's surface.\n*choice\n  #I'll let in exceptions as I see fit.  They gave me the discretion.\n\n    As you wish.  Like you said, that's your right.  Best be careful, however, not to appear to play favorites.\n    *set sentimental +20\n    *set enlightened -20\n    *return\n\n  #No way, I don't want to poke those hornet's nests.  Better to defer to the rules as they existed when I left.  \n\n    Err on the side of caution.  Good thinking.\n    *set sentimental -20\n    *set enlightened +20\n    *return\n\n*label Jessica\n\nIf you've ever seen the John Hancock Tower in Chicago -- a tapering modernist black steel skyscraper -- you've pretty much seen the Jessica.  The two look fairly similar all things being equal, except the Jessica has a lot fewer windows and a massive propulsion system at what would be the Hancock building's bottom floors.\n\nLike all starships, the Jessica left Earth pointing forward, with its engines pushing until the ship reached something close to the speed of light.  Then it coasted along for light year after light year until it was time to slow down, at which point the ship rotated 180 degrees and the engines fired again to start slowing down.  (Fortunately they still worked!)  Reposed in frozen sleep during virtually all of this were the hundreds of people making up the ship's passengers and crew.\n\n*page_break\n\nOn the inside, the ship most resembles a ballistic missile submarine.  Lots of narrow passageways, a couple big rooms holding lots of large tanks and a warren of computer equipment, service areas and access points.  It's not built like a cruise ship.  There is no wasted space here.  Every pound has to be accelerated and then decelerated, so there's a premium on building efficient, tightly-packed vessels that will still work long enough to reach their destination and be able to stop.\n\nYou wander a bit down a few of the empty main gangways, listening to the soothing hum of the engines while testing the ship's light artificial gravity against your muscles' memory of the stronger force back on Earth.  You ball up a glove and start tossing it ahead of you to watch how it flies through the air.  After doing this a couple times you find yourself back where you started.  That didn't take long.  \n\nThere's only the one area of the ship for you and your team to live in.  Your bed is essentially just another retractable drawer wedged into the side of a small living area set up for you and the handful of other people who need to be awake right now.  \n    \n*page_break \n\nYou'll have more opportunity to explore once the screening process starts.  And of course once the Jessica reaches Niah and everyone wakes up, the ship will be wide open for all to see.  Perhaps then you'll get to see more of the ship's inner workings.  Until then you decide it's best to focus on the issues at hand.\n*set timekill +1\n*set wander true\n*comment The timekill variable exists simply to remove options from later in the game, since the option to wander around or read up on the team will reappear.\n*set ambitious +5\n*return\n\n*label niahbackground\n\nBy chance it so happened that the Earth found itself oddly distant from any other habitable world in the neighborhood.  It was as if humans first appeared on the Hawaiian Islands and developed their civilization utterly ignorant of, and unable to reach, the vast continents straddling the seemingly limitless ocean that stretched away from them in every direction.  That first step, as they say, would be the doozy.  So too with humanity's spread outward from Earth to the stars.  Of course there are plenty of stars within twenty light years of Earth.  None of them, however, have truly habitable planets or moons.  Nor did terraforming ever work out.  If life hadn't taken hold on a planet after a few billion years there was a really good reason behind it that humans weren't going to change.  Lifeless planets might have magnetic fields too weak to protect the atmosphere, or their stars flared too much, or they didn't have a big-enough moon to keep the rotational axis stable, or any of a million other variables.  Indeed, the one time somebody had tried to turn an asteroid into a lifeless planet's moon the project ended in disaster . . . .\n\nSo to find -- and confirm -- this earthlike world you're traveling to was like finding a needle in a haystack.  Even then it took a little bit of time to get people out here, Niah being so far from Earth.  There are some habitable worlds closer to Earth but they're in other directions.  Out this way Niah is the first world you reach.  Eventually civilization got here, as it eventually gets everywhere.  And the planet is very hospitable.  Niah's even more watery than Earth, with only one sizeable continent.  The oceans are largely untouched and the land boasts some staggering beauty.  There are no large animals of any kind and no evidence of anything approaching intelligent life.  \n\nAnd from Niah there are a few more habitable worlds not far away.  Niah has become not only the receiving point for outbound Earth settlers but also the jumping off point for transport beyond.  In time a bustling interstellar empire might form here.\n\nThanks to the distance the first settlements on Niah were large and orderly.  There were no free agents here first.  Nobody has the resources to travel 31 light years to live off the grid.  Managed, large-scale starship endeavors arrived containing people screened for shipment and approved for off-world habitation.  They collected in one capital city and that is where you'll first go.\n*set timekill + 1\n*return\n\n*label team\n*comment This first meeting with the quarantine team is actually your opportunity to set most of your personal traits, including the exemplary choice from the pitch.\n\nAlright, you think to yourself, time to start thinking about quarantine screening.\n\n*page_break\n\nYou have a team working under you.  A deputy and three junior officers.  You know your deputy, Krissa Mackenzie, fairly well but the other agents are new.  You didn't have much time to work together before you left Earth -- and there's no quarantine screening done Earthside -- so you're doing this together for the first time.\n\nIt will be important to work together as a team.  There is obviously no communication possible with Earth and the screeners who have come before you are intentionally kept anonymous.  Since the entire concept of the screen is meant to be confidential, each team to come out on a starship is treated like the first ever to do so.\n\nSo before you meet with your officers you take a moment to read up on them again, just to refresh your memory so you know who you're working with.  It would not help your image if you called somebody by the wrong name, for example.  \n\nYou pull out a handful of small files, one for each of the quarantine officers on board.  \n\n*label dossier\n*comment I might want to add some variables, depending on how the game goes, enabling some other options or results for these questions.  Perhaps as you play the game and boost your traits more information in the dossiers becomes available.  \n\nPick an available file. \n*choice\n  *hide_reuse #Deputy Mackenzie\n\n    Perhaps the only person on the Jessica you actually know.  Her name is Krissa Mackenzie.  She's a few years younger than you, cut from roughly the same cloth, and you've been working together for most of the last year.  (No sooner do you think that than you remember that 'the last year' was actually over 40 years ago.)  You were working together in special law enforcement on Earth, doing your part to keep society running smoothly.  Often that meant filling out paperwork and completing data fields, but occasionally it extended to field operations in which actual targets were located and subdued.  \n    \n    Deputy Mackenzie volunteered for this mission following a death in her family.  The dossier does not specify the precise nature of the tragedy but you know it was her mother.  Once her mother died Mackenzie become much more willing to take this big leap out into space.  Such a push is typical -- it's not easy to agree to a job that almost certainly takes you away from the planet Earth for the rest of your natural life.  \n\n    One of the junior officers came with Mackenzie from her department.  You've started to assume that they're going to be an item.  But that's neither here nor there when it comes to the work, since Mackenzie's work is always top notch.  You were impressed with her ability to categorize the manifest at embarkation and you're sure you'll be impressed with everything she'll do going forward.\n    *goto dossier\n\n  *hide_reuse #Any of the junior officers\n    Do you care which one?\n    *fake_choice\n      #You know, my mind is still half-frozen.  I can't remember who those people were.\n        So you go through them one at a time.\n      #No.\n        So start with the one on top.\n      #Yeah - the middle guy.  No, wait, the other one.  No, the first guy.\n        Okay then.  Why don't you just look through the files one at a time.\n\n    Your three junior agents are named Dallas, Bryson and Heddes.  Dallas is the one who came with Mackenzie.  He's a big, strapping guy who has the look of somebody who just spent two hours lifting really heavy things from one place to another.  You get the sense he's been an outstanding athlete his entire life.  Certainly he's a good-looking guy.  And Mackenzie vouched for his work so professionally he's good to go.  Even though you don't know him personally you expect him to be easy to work with.  \n\n    Heddes is the only one on your team not from Earth.  Legally he's a terran because his parents were, but he was born aboard drydock in outer space thousands of miles from Earth.  That was a very unusual thing to happen.  Humans have established colonies throughout the solar system -- on the moon, Mars, space stations, and a couple of the satellites orbiting the gas giants.  But all those places have much lower gravity than Earth.  As Earth learned the hard way, a low-g pregnancy produces a baby that cannot live comfortably in Earth's heavier gravity.  You can simulate the necessary gravity on most moons or other planets, but space stations often can't.  So nobody has babies in orbit.  Except Heddes' parents, that is, and their decision was a calculated protest against Earth imperialism.  They wanted their son's birth in zero gravity to represent a literal breaking away from Earth control.  Ironically, their son grew up to resent his parents' actions so much that he became a crusader for Earth orthodoxy.  Which, you thought, made him an ideal quarantine officer.  (So long as he remembers his external grav supports once he gets down to Niah.)\n\n    *page_break\n\n    Bryson is the other female on your team.  Not that you categorize people by gender, but everybody knows that when a small team goes out into space it needs two things -- an odd number of people to prevent deadlocks, and only one more of one gender than the other to prevent too many jealousies.  Regardless of her contributions on that front, Bryson is diligent and loyal.  She's reliable almost to the point of being taken for granted.\n\n*label selfdossier\nThere's actually a third file.  Yours.  You can read it if you want.  \n*choice\n  #No thanks.  I'm not narcissistic enough to read about myself.\n    Fair enough.  It's time to meet the team.\n    *set ambitious -10\n    *goto teammeeting\n\n  #Sure why not.\n    It's surprisingly brief.  There's a mention of your birthdate and your hometown, plus a couple of salient facts about your education and professional development.  \n    You've seen it all a million times before.  You're not sure whether to be surprised or relieved that there's nothing secret there.  Even if your job is to screen everybody else for contraband information . . . .\n\n    But you also notice that you have edit authority.  Must be a privilege of rank, you think to yourself.  You've got a couple of minutes; is there anything you want to add?\n    *choice\n      #The education section ignores my most recent test results for aptitude, problem-solving and critical thinking.  Let's put that in there.\n\n        You beef up that section of your dossier and suddenly the ship's computer treats you like a slightly smarter version of the schlub you were a second ago.\n\n        By the time you finish you realize it's time to meet the team.\n        *set diligent +5\n        *goto teammeeting\n      #Add something about the fact that I was promoted quickly.\n\n        So added.  \n\n        By the time you finish you realize it's time to meet the team.\n        *set ambitious +5\n        *goto teammeeting\n      #I want to add something about my personal life.  This dossier reads too much like an employment application, and I'm actually a much more balanced person than that.\n\n        You insert a bit about how well-rounded you are, what you do on the side, what you're good at, why you're fun to be with, and whether you like long walks on the beach.\n\n        By the time you finish you realize it's time to meet the team.\n        *set ambitious -5\n        *set diligent -5\n        *goto teammeeting\n      #Hell yeah.  I disable the log and then, uh, 'embellish' my qualifications and, hopefully, my pay grade.\n\n        Good luck with that.\n\n        By the time you finish you realize it's time to meet the team.\n        *set corruptible +10\n        *set ambitious +5\n        *goto teammeeting\n      #No way - this is my official file.  I can't go around editing it!\n\n        You make a note to ask somebody why you can edit and revise your own file and then close it up and move on.\n\n        By the time you finish you realize it's time to meet the team.\n        *set corruptible -5\n        *goto teammeeting\n\n*label teammeeting\nYou walk back into the living area and call a meeting.  Deputy Mackenzie is there with junior officer Dallas.  Bryson and Heddes appear remotely.  One of them looks like she's down in engineering and the other looks like he's in the middle of a run somewhere.  (How'd they get there? you think to yourself.)\n\n*page_break\n\nYou start things informally.  You are not a space marine drill sergeant getting your drop team ready for a hostile insert.\n\n\"Morning folks,\" you say in your cheery voice, \"how's everyone doing on the first day of their second life?\"  You are referring, of course, to the fact that the five of you have just slept through the last four decades.\n\n\"My head still hurts, ${firstname},\" Mackenzie groggily replies.  Next to her, Dallas is nodding his head in agreement.\n\n\"Well I've got just the remedy,\" you reply, \"to dull the pain.  There are one thousand, four hundred and thirty eight people on this ship.  Fifteen days from now they're going to be awake and in orbit above Niah and if we haven't cleared them all they'll eat us alive.  So we've got between now and then to make sure that those fine people can go down to the surface and help spread civilization without humanity as we know it coming to a crashing end.\"\n\nThe junior down in engineering -- Bryson -- cuts in.  \"Did you know that 'Niah' actually stands for 'Needle In A Haystack?'  Man, I hope these pilots got their stellar navigation correct.  If we miss this bullseye of a planet by even a fraction of a fraction of an arcsecond we'll shoot right past Niah and never be heard from again.  We've flown so far that hitting our target is the equivalent --\"\n\nMackenzie finally cuts her off.  \"-- we get it, Bryson, thanks.  Let the Captain finish.\"  Ahem. \n\n*page_break \n\nYou make a slight change to your tone of voice.  A minute ago you were cheery and folksy.  Now you are gently assertive.  \"These people have left Earth.  They have literally put the world as they know it behind them.  Barring exceptional circumstances they are never going to see their home world again.  That means that whatever they have brought with them, whatever they are planning to take with them to Niah or beyond, is incredibly valuable to them, whether or not you or I or anyone else agrees.  Whatever they've brought they wanted to have it out here in the colonies.\"  \n\nYou pause for a second.  Everybody knows where you're going with this but it's important to stress it nonetheless.  \"We have a job to do but we have to do it right.  When these people wake up and leave this ship and join that growing outpost of civilization down on the surface below, they need to believe that their valuables are right there with them.  Which means we have the next 15 days to go through everything on this ship and in those passengers' heads.  We have the next 15 days to scrub things down and disinfect the place until everything, every last nook and cranny, is crystal clear and sparkling clean.  No exceptions, no excuses.\"\n\nThis all hardly comes as a surprise to your team.  Every quarantine officer knows the 15-day window for the big interstellar liners.  It's the result of some beancounter in a backoffice somewhere figuring out that 15 days was the optimal time period to do this work.  Any less than that and a team might get rushed and miss stuff.  But any longer and you're using up too many resources to keep people awake and active on board a starship, you're allowing enough time for jealousies and inefficiencies to take hold, and you're encouraging procrastination and performance decay.  Fifteen days, apparently, was the perfect length of time.  And besides, it's a tough formula to challenge because everybody being held to it has been launched light years away from that backoffice beancounter.  \n\n*page_break\n\nYou look around.  Your officers have left Earth behind just like the passengers and crew.  You'll be scrubbing the cargo of verboten images and ideas just as you'll be getting yourself ready for your new life somewhere in a new world.  \n\nYour mind quickly returns to that now-long-ago interview on Earth, when you first began your application to be a quarantine officer.  From a large waiting room you were sent down a nondescript corridor to a nondescript room.  Three people you didn't know sat behind a nondescript table and quietly asked you questions.  They never talked directly about what they wanted.  Instead they probed your personality.  It happened over forty years ago but it feels like last week.  For whatever reason you start thinking again about that very first question they asked:\n\n\"Officer ${lastname}, are you a leader, an organizer, a pragmatist or a fighter?\"\n\nNeedless to say you were taken aback.  In seconds your mind raced around this new dilemma.  You were interviewing for a confidential position so you didn't yet know enough to even guess what the best answer was.  You didn't know what they wanted to hear.  Nor did you know what you were.  Were the options even mutually exclusive?  Couldn't you be all four?  From their silence you unfortunately realized, very quickly, that your questioners weren't going to give you any help.  And the longer you froze in indecision the worse it looked.  So you answered.\n\nHow would you answer?  Obviously the choice helps decide what kind of quarantine officer you will be.\n\n*choice\n  #A leader.  From good leadership everything else follows.\n\n    An excellent choice.  You remember quickly summoning your best commanding officer voice and answering, crisply, that you were \"a leader, sir, and a good one, too.\"  From there the interview got easier.  Obviously they were happy with your answers because, 31 light years later, here you are commanding your team.  \n    *set diligent +15\n    *set ambitious +15\n    *set corruptible -15\n    *goto personaltrait\n\n  #An organizer.  Especially on a starship, organization is essential or else the whole project might collapse.  \n\n    You realized at the time that of the four choices, only \"organizer\" was an actual skill.  And it was a skill anybody aboard a starship would certainly need.  So you told these three interviewers that, and they nodded in apparent approval and moved on with their questioning.  Once the full parameters of the quarantine screen process were unveiled to you, you knew that organization would be an essential characteristic of any successful officer.  \n    *set diligent +15\n    *goto personaltrait\n\n  #A pragmatist.  My skills are self-evident.  But we'll be light-years from Earth and on our own -- adapt and survive, as they say.\n\n    When you told this to the interviewers you were afraid for a second you'd said the wrong thing.  They looked almost . . . perplexed, seemingly unsure about where your reasoning was leading you.  Oddly enough, after the first break the interviewers came back into the room and it was like a weight had been lifted from their shoulders.  They were much more at ease.  They were content and agreeable and willing to discuss with you the nuances of your job in a way they hadn't been earlier in the day.  By the time the session was over you knew you'd be leading a team charged with the responsibility of fashioning a new human civilization.\n    *set corruptible +15\n    *set ambitious -15\n    *goto personaltrait\n\n  #A fighter.  Whatever your objective, you need relentless drive or else you'll eventually be brushed aside.\n\n    Why would they want anything else?  Of all the choices they gave you, only \"fighter\" conveyed an actual passion for something.  The others were just management buzzwords.  You remember seeing one of the interviewers smirk -- just for an instant, before her face returned to a blank stare -- and you knew she admired your answer.  Who calls themself a \"fighter\" anymore?\n    *set ambitious +15\n    *goto personaltrait\n\n*label personaltrait\n\nOne thing they never did ask you, however, was why you volunteered.  Either they already knew, they didn't want to know, or they simply didn't care.  But why did you volunteer for this one-way voyage, never to see Earth again?\n*choice\n  #There was nothing for me back on Earth.  Why not start fresh on a new planet?\n    *set ambitious %-20\n    *set diligent %-20\n    *set corruptible %+20\n\n    What are you hoping to find out here?\n    *choice\n      #A family.  \n\n        Well, Niah's obviously the first port of call for anyone coming out this way, but it's still only got as many people as a small city someplace on Earth.  \n\n        It begs the question -- how did you wind up being the Jessica's chief quarantine officer if you're coming out here to start a family?\n        *set ambitious +5\n        *choice\n          #You misunderstand.  I've never stopped to smell the proverbial roses.  I'm great at my job but it's meant I've let everything else fall apart.  Once this job is over I'll make a fresh start out here.  All I need is to find somebody else to start it with.\n\n            Then let's get it started!\n\n            *set diligent +10\n            *set ambitious +10\n            *finish\n\n          #Best option available.  They were short on people willing to do this.  For me that meant it was either fly out to Niah as a Captain or stay a deputy back on Earth until they let me go.  At least this way I get a bigger pension.\n\n            Tough choice, but an understandable decision.  Do the other members of your team know how you got to be in charge?\n\n            *set diligent-5\n            *set corruptible +5\n            *choice\n              #Nope.  As far as they know I'm the captain because I'm the best.  And it'll stay that way.\n\n                Fair enough.  You should get on with the job, Captain ${lastname}.\n                *set investigation -5\n                *finish\n\n              #I don't know.  And frankly, I don't care.\n\n                Well, it might be something to keep in mind the next time you start ordering anybody around too much.\n                *set diligent -5\n                *finish\n\n              #Of course.  That's how Mackenzie made it to deputy.  It's not exactly easy to find good people willing to travel out to the stars and be the heavy in the process.\n\n                That's a good thing.  Certainly the team will work together better if they're all on the same page.\n                *set diligent +5\n                *finish \n\n      #Meaning.  Direction.  Purpose.  \n\n        You've got it in spades.  Not only are you charged with scrubbing the Jessica, but you can probably fly the flag of Earth morality long after you land on Niah, too.\n\n        *set diligent +10\n        *set ambitious +10\n        *finish\n\n  #I left just in the nick of time.  Better to stay one step ahead of your problems than to let your problems stay ahead of you.\n\n    What kind of problems are we talking about?\n    *choice\n      #Strictly professional in nature.\n\n        *if diligent > 50\n          Hard to believe.  Are you sure that's right, or are you still having a little post-starsleep freezer burn from your voyage?\n\n          *choice\n            #Maybe I am.  Forget I said anything.  Problems schmoblems.\n              *finish\n            #No, it's true.\n\n              If you say so.  But you decide, right here and now, to put that behind you and start fresh on a fresh world.\n              *set diligent %-20\n              *finish\n\n        *else\n          Well now's your chance to get that sorted out.  You and your team have had little or nothing to do for 40 years.  Consider it a blank slate.\n          *set diligent -5\n          *finish   \n\n      #Purely of a personal variety.\n\n        Then we'll keep it that way.  Everybody back on Earth is 40 years older while you've hardly aged at all.  So there's that.\n        *finish\n\n      #Nobody's business but my own.  \n\n        You're not the first person leaving Earth to say that and you won't be the last.  It's not every day, however, that somebody in your position\n        of authority has that attitude.  But perhaps it's all the best for you to keep your issues close to the vest.\n        *set diligent -5\n        *finish\n\n  #I go wherever my job takes me.  I want to be the best.\n    *set diligent %+40\n    *set ambitious %+40\n    *set corruptible %-20\n\n    With any luck that will happen.  \n    *finish\n\n  #Anything to make sure only the right people and ideas make it out into space.\n    *set diligent %+40\n    *set ambitious %+30\n    *set corruptible %-20\n\n    A noble perspective.  But who gets to decide which people and ideas are the right ones?\n    *choice\n      #I do.  That's my job.\n\n        Hopefully you're not developing a god complex.  Careful not to push people too far; they may not always listen to what the newcomer from the old world has to say.\n        *set diligent +5\n        *finish        \n      #That's something that Earth debated for decades.  I'm just following orders.\n\n        Certainly you know your place in the hierarchy.\n        *set ambitious -5\n        *finish\n      #Whoever's in control.  Might makes right.\n\n        Then for your sake let's hope the strongest people are also the most charitable.\n        *set corruptible +5\n        *set ambitious -5\n        *finish\n\n  #Is this a trick question?  Who wouldn't jump at the chance to travel to another planet?\n    *set ambitious %+30\n\n    Clearly not everyone, since virtually everyone born on Earth is still living there, but yeah your point is made.  Who can put a price on the ability to travel among the stars and live on other worlds?  And to have a role in actually making the civilizations taking shape on those different worlds?\n    *finish\n    \n  #Wait, what?!?  I'm never going back to Earth???\n    Sounds like somebody's brain still has some freezer burn.  Hate to tell you, but yeah, this is a one-way trip.  And if you've forgotten that -- or if you somehow, unbelievably, never knew it in the first place -- then who knows what else is going on with you right now.  Good luck finding out.\n    *rand corruptible 30 70\n    *rand diligent 30 70\n    *rand ambitious 30 70\n    *set freezerburn 1\n    *finish\n"}};
