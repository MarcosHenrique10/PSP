tess.\n\n\t\"Are you sure you want to fight him. He can prove to be a formidable opponent,\" she warns you.\n\t\n\t\"I hope there will be no need for this,\" you state as you hide it in your pocket.\n\t*set info_weapon 2\n\t*goto endlab4\n\t\n*label endlab4\nYou come to a vestibule and look around for signs.\n*goto endlab5\n\n*label endlab5\nWhich way will you go?\n*choice\n\t*disable_reuse #The Lab of Souls\n\t\t*goto souls\n\n\t*disable_reuse #The Mech quarters \n\t\t*goto mech\n\t\n\t*disable_reuse #The Fountain of Light\n\t\t*goto fountain\n\t\t\n\t#Finished with all the place\n\t\t*goto endlab6\n*label souls\nYou slid away the door with trembling fingers. What do 'souls' have to do in a high tech science facility like this? \n\nSister Mercy's scream startles you even further. You know why, it is just that your reaction is a bit slower.\n\nThe room is full of people dressed in white robes. Their looks are empty. Even if their bodies are here, the minds are certainly not as they \nwonder aimlessly in the room, or sit down, making repetative motions with their hands and heads.\n\n\"Is that Hell?\" whispers Mercy.\n\nYou are pretty sure it must be quite close.\n\n\"Looking for someone?\" The female voice is gentle and... kind of robotic. It belongs to a pretty woman with Asian features dressed as a nurse. Her skin appears to be\nmuch too white and looks almost plastic.\n\nYou fail to answer, still in shock.\n\n\"My name is Shikishi. Let me guess, you look so much like Amanda. She will be so happy to see you. Follow me.\n\nYou do so, trying to dodge the chaotic movements of the occasional patients you walk by, wondering what kind of a creature Shikishi could be. Her figure\nis much too perfect to be real.\n\n\"Here she is,\" the nurse smiles.\n\nA few tears make it hard for you to see her. She has changed a lot since you met her last time, but there is no doubt this is her - not only \nbecause of her appearance, you also feel it in your heart. Amanda looks well taken care of. Her long hair is split into braids, the robe is clean. She\neven has some light make up.\n\nBut, she is not really here, just like the others.\n\n\"Do you... take care of her?\" you ask Shikishi.\n\n\"I take care of all but she is my favourite. Look at her, she is so beautiful. With her, I feel like I have a big sweet doll.\" The nurse explains\nenthusiastically.\n\n[i] What kind of a creature can take care of... say 40 mindless people? [/i]\n\n\"But, she is a human being, not a doll.\" You state.\n\n\"Yes, and I can't wait for you to return her soul back into that body. I want to get to know her better. I've spent so much time just looking \ninto her eyes, wondering what her story is.\"\n\n\"Her soul?\"\n\n\"Yes, this is just a storage room for all the humans whose souls were extracted in order to perform experiments on them. I presume you have it. Why\nelse would you come here?\"\n*page_break\n*if (soul=1)\n\t\"Yes, I do,\" you take the sphere the mistress gave you in your hands.\"\n\t\n\t\"That is very nice.\" Shikishi beams. \"Would you like me to install it?\"\n\t\n\tYou don't like the term, but you realize you don't really know how to bring back her soul.So, you give it to her.\n\t\n\tShikishi scratches the sphere with her manicure and squashes it. She takes it to her nose and breathes in. Then, she bends over Amanda and breathes out \n\tin her face.\n\t*goto amanda\n\t\n*else\n\t\"No, I am sorry, I don't have it.\n\t\n\tShikishi frowns. \"I am sorry, I really wanted to set her free.\"\n\t\n\t\"There must be another way,\" Sister Mercy insists. \"There is no darkness the Light can't penetrate. Maybe if I pray, I will be able to return her soul \n\tto her body, no matter where it is locked.\n\t\n\t\"And I am a demon. Maybe my summoning skills will be able to do the trick as well.\n\t*choice\n\t\t#Ask the priestess to call for the Light\n\t\t\tSister Mercy falls on her knees and crosses her hands, whispering the holy words. She does so for a few minutes, but nothing in Amanda's blank expression\n\t\t\tchanges.\n\t\t\t\n\t\t\t\"Maybe you should participate in the prayer as well. It... just doesn't feel the usual way. Maybe it is because of the realm.\"\n\t\t\t\n\t\t\tWould you do so?\n\t\t\t*choice\n\t\t\t\t#Yes\n\t\t\t\t\t\"I may need instructions for that.\" You say as you fall down to your knees.\n\t\t\t\t\t\n\t\t\t\t\tShe smiles.\n\t\t\t\t\t\n\t\t\t\t\t\"Sometimes the Light sends us tests in order to bring is back to it. You will see that everything will be fine. Just repeat the words I say.\"\n\t\t\t\t\t*set light +3\n\t\t\t\t\t*set rel_mercy +1\n\t\t\t\t\t\n\t\t\t\t\t(Light increases)\n\t\t\t\t\t*if light>57\n\t\t\t\t\t\tYou are about to give up when you see a change in Amanda's condition.\n\t\t\t\t\t\t*goto amanda\n\t\t\t\t\t\t\n\t\t\t\t\t*else\n\t\t\t\t\t\tNo matter how hard you try, you don't manage to connect with the Light. Finally, you are forced to give up.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I am sorry,\" says Mercy.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"It is alright. You gave your best,\" you reply sadly.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou are surprised, but Shikishi seems to be saddest of all. She cries out a copious amount of tears. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I wanted it to happen so badly. Once, I dreamt of her coming back to herself. It was so beautiful. We were dancing among flowers. \n\t\t\t\t\t\tIt was the most beautiful dream for the last 40 years.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tWhat creature is she?\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I want to take her with me,\" you declare through your own tears. \"She is my Sister.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I am afraid it can't happen. She won't survive without my services.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"What services?\" you shout. \"What are you talking about? And what the hell are you?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"There is no need to be rude. I... I took care of her all these years. I deserve a bouquet, or a golden necklace... or all the things women dream of.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I thank you, Shikishi, you are a marvellous woman and I thank you for all you did.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I am not a woman... I am just a biological android.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I have the feeling she is right.\" Sister Mercy touches your hand. \"Sometimes the Light gives me answers.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"But I can't just leave her here!\" you argue.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"She is not really here, however.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou hate it, but you are forced to agree... and go back to the vestibule.\n\t\t\t\t\t\t*goto endlab5\n\t\t\t\t\t\t\n\t\t\t\t\n\t\t\t\t#No\n\t\t\t\t\t\"This is your sister? And you are not going to help?\"\n\t\t\t\t\t\n\t\t\t\t\t\"I am sorry, Mercy, I am not good at praying.\"\n\t\t\t\t\t\n\t\t\t\t\t\"I am sorry too,\" says Mercy.\n\t\t\t\t\t\t\n\t\t\t\t\t\"It is alright. You gave your best,\" you reply sadly.\n\t\t\t\t\t\n\t\t\t\t\t\"I can't say the same for you,\" remarks the priestess.\n\t\t\t\t\t\t\n\t\t\t\t\tYou are surprised, but Shikishi seems to be saddest of all. She cries out a copious amount of tears. \n\t\t\t\t\t\t\n\t\t\t\t\t\"I wanted it to happen so badly. Once, I dreamt of her coming back to herself. It was so beautiful. We were dancing among flowers. \n\t\t\t\t\tIt was the most beautiful dream for the last 40 years.\"\n\t\t\t\t\t\t\n\t\t\t\t\tWhat creature is she?\n\t\t\t\t\t\t\n\t\t\t\t\t\"I want to take her with me,\" you declare through your own tears. \"She is my Sister.\"\n\t\t\t\t\t\n\t\t\t\t\t\"I am afraid it can't happen. She won't survive without my services.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\"What services?\" you shout. \"What are you talking about? And what the hell are you?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\"There is no need to be rude. I... I took care of her all these years. I deserve a bouquet, or a golden necklace... or all the things women dream of.\"\n\t\t\t\t\t\n\t\t\t\t\t\"I thank you, Shikishi, you are a marvellous woman and I thank you for all you did.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\"I am not a woman... I am just a biological android.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\"I have the feeling she is right.\" Sister Mercy touches your hand. \"Sometimes the Light gives me answers.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\"But I can't just leave her here!\" you argue.\n\t\t\t\t\t\t\n\t\t\t\t\t\"She is not really here, however.\"\n\t\t\t\t\t\t\n\t\t\t\t\tYou hate it, but you are forced to agree... and go back to the vestibule.\n\t\t\t\t\t*goto endlab5\n\t\t\t\t\t\n\t\t#Try to summon her soul back into her body\n\t\t\t*set summoning +1\n\t\t\t(Summoning increases)\n\t\t\t\n\t\t\tYou prepare the ritual under the confused watch of Sister Mercy. You know that she must not be feeling very comfortable seeing a ritual of darkness\n\t\t\thappen in front of her.\n\t\t\t\n\t\t\t\"You know the means may be corrupt but the goal is one the Light would actually approve.\"\n\t\t\t\n\t\t\tShe nods. \"Do what you must.\"\n\t\t\t\n\t\t\tAnd so you start chanting.\n\t\t\t*if (summoning>2)\n\t\t\t\tYou are about to give up when you see a change in Amanda's condition.\n\t\t\t\t*goto amanda\n\t\t\t\t\n\t\t\t*else\n\t\t\t\tHowever, no matter how many times you repeat the ritual or how much energy you put into it, nothing happens. You are forced to give up.\n\t\t\t\t\n\t\t\t\t\"Maybe it is my turn to try?\" Sister Mercy suggests.\n\t\t\t\t\n\t\t\t\tYou shake your head. \"There is no point. I brought so much of the Dark in that it would be impossible.\"\n\t\t\t\t\n\t\t\t\t\"Nothing is impossible when you have the Light by your side.\"\n\t\t\t\t\n\t\t\t\tYou don't want to argue with her, mainly because you don't want to accept that you just severely reduced the chance of Sister Mercy bring Amanda\n\t\t\t\tback.\n\t\t\t\t\n\t\t\t\tYou just watch as the priestess falls down on her knees and starts uttering the holy words, her hands crossed in front of her chest. Minutes go by but Amanda's condition does not change.\n\t\t\t\t\n\t\t\t\tYou tap the priestess on the shoulder. \"I think it is enough.\"\n\t\t\t\t\n\t\t\t\t\"Maybe if you join me in my prayers? This is a demonic world and maybe it will take more efforts for the contact with the Light to work.\"\n\t\t\t\t\n\t\t\t\t\"You wouldn't want me to do that right after performing a dark ritual,\" you sigh.\n\t\t\t\t\"I am sorry,\" says Mercy.\n\t\t\t\t\t\t\n\t\t\t\t\"It is alright. You gave your best,\" you reply sadly.\n\t\t\t\t\t\t\n\t\t\t\tYou are surprised, but Shikishi seems to be saddest of all. She cries out a copyous amount of tears. \n\t\t\t\t\t\t\n\t\t\t\t\"I wanted it to happen so badly. Once, I dreamt of her coming back to herself. It was so beautiful. We were dancing among flowers. \n\t\t\t\tIt was the most beautiful dream for the last 40 years.\"\n\t\t\t\t\t\t\n\t\t\t\tWhat creature is she?\n\t\t\t\t\t\t\n\t\t\t\t\"I want to take her with me,\" you declare through your own tears. \"She is my Sister.\"\n\t\t\t\t\t\t\n\t\t\t\t\"I am afraid it can't happen. She won't survive without my services.\"\n\t\t\t\t\t\t\n\t\t\t\t\"What services?\" you shout. \"What are you talking about? And what the hell are you?\"\n\t\t\t\t\t\t\n\t\t\t\t\"There is no need to be rude. I... I took care of her all these years. I deserve a bouquet, or a golden necklace... or all the things women dream of.\"\n\t\t\t\t\t\t\n\t\t\t\t\"I thank you, Shikishi, you are a marvellous woman and I thank you for all you did.\"\n\t\t\t\t\t\t\n\t\t\t\t\"I am not a woman... I am just a biological android.\"\n\t\t\t\t\t\t\n\t\t\t\t\"I have the feeling she is right.\" Sister Mercy touches your hand. \"Sometimes the Light gives me answers.\"\n\t\t\t\t\t\t\n\t\t\t\t\"But I can't just leave her here!\" you argue.\n\t\t\t\t\t\t\n\t\t\t\t\"She is not really here, however.\"\n\t\t\t\t\t\t\n\t\t\t\tYou hate it, but you are forced to agree... and go back to the vestibule.\n\t\t\t\t*goto endlab5\n\t\t\t\t\n*label amanda\n\"Where am I\" she ask, yawning as if waking from a deep slumber. \"${name}, I am so happy to see you again.\" You hug her tightly, tears flowing down your cheek.\n\n\"Amanda, dearest, all those years... I thought I'd lost you forever. It's like a dream come true. Are you okay? Did they do anything to you?\n\n\"Yes, I am feeling fine. I don't really remember anything.\"\n\n\"I am afraid she will, but I will be by her side to help her get through it,\" Shikishi says.\n\n\"Oh my dear, Shikishi I am so glad to see you.\" Amanda break your embrace and hugs the Asian woman. You are quite surprised when they kiss... passionately.\n\n\"Thank you for taking care of me,\" your sister says. \"I've never felt so loved.\"\n\n\"My only desire is to continue doing so until the end of time.\" Shikishi gently caressing her hair.\n\n\"Alright, ladies, I don't want to spoil the moment, but I guess it is better, Amanda, to return you to our world.\"\n\n\"Our world?\" she can't understand. \"Oh... I know Shikishi is not really a woman, so it should not come as a surprise we are not in our world.\"\n\n\"I am coming with you,\" says the Asian-looking.\n\n\"Who will take care of the other... patients?\" you ask.\n\n\"A new caretaker is being produced. As soon as I leave, it will be automatically switched on. I've done my duty, now it is the time to enjoy my \nexistence with Amanda.\n\n\"Alright, let me then escort you to the portal we came from. Sister Mercy and me have a job to do here,\" you say.\n\n\"Nice to meet you,\" Amanda shakes Mercy's hand.\n\nAnd so, you make sure, Amanda and Shikishi reach the portal safely and see them disappear.\n\n\"Are you comfortable with Shikishi being with Amanda?\" asks the priestess.\n\n\"I am much more comfortable now that I pretty much know where she is. Besides, Shikishi seems to be very fond of her and she will make sure \nno harm comes to her. Of course, I have no idea what kind of a creature she really is but she appears to be really benign.\"\n\n\"That is my feeling too. I was getting at something else, however,\" Mercy smiles. \"How do you feel about your sister being with another woman?\"\n\n\"Come on, dear, I am ${a} ${succubus}. Gender is just a spice, not the main course.\"\n\nThe priestess seems satisfied with your answer. \"I like women too. If I really need to make a confession, I think your sister is really hot too.\"\n\n\"Thank you, holy one.\"\n*achieve amanda\n*goto endlab5\n\n*label fountain\nThe sight takes your breath away, being the last thing you could expect in such a place. It looks like a peace of heaven. There is green grass and \ntrees. You hear birds singing. A couple of rabbits gets on their rear paws to get a better view of you. In the distance, there is a pond with swans\nin it, their necks in a perfect S.\n\n\"This place is a lie, isn't it?\" you ask the priestess.\n\nShe shakes her head. \"No. This is a place made especially for the angels. They would start losing their sanity in a while. This served as a \ntemporary sanctuary that helped them recuperate so that... they could continue with the experiments. Every now and then, we would also be able to \nuse this facility to play. That was wonderful.\"\n\n\"Nice. I really enjoy the sunshine... wait what kind of sunshine is it? Some battery?\"\n\n\"Yes, they are able to store both light and darkness in batteries and then bring it where they want.\"\n\nYou don't understand the concept of storing darkness, but decide to ask her some other time. Instead, you inquire: \"Do you think we can find something\nuseful here. No matter how lovely this place is, we are still in a hostile environment.\"\n\n\"I think that if there is a gem of light, it should be somewhere near here.\"\n\n\"Of course there is!\" a childish voice assures you. Well, she does not look like a child, more like a late teen but she is unlike anyone you've met \nso far. Your first association is with an angel, but her elegant body is covered with snow white feathers. The only place where the skin is visible is the face. Her hair is \nshort and dark blue. \"In the core of the fountain. Most of the energy of this place comes from it. Is there anything else I could do for you?\"\n\nShe smiles widely, showing teeth whose colour perfectly matches the feathers.\n*goto fountain2\n\n*label fountain2\n*page_break\nWhat would you say to her?\n*choice\n\t*hide_reuse #Are you an angel?\n\t\tShe laughs.\n\t\t\n\t\t\"No, I am just an artificial being made of flesh that is designed to understand the needs of the angels that come here. You may have met  someone like me,\n\t\tthe caretaker Shikishi. We were made using the same technology.\"\n\t\t*goto fountain2\n\t\n\t\n\t*hide_reuse #Who are you?\n\t\t\"My name is Lima. I am happy to see someone here again, even though you are not angels. There is nothing that compares to the feeling of being in \n\t\ttheir company, the stream of pure light that bathes you. Unfortunately, they don't come here any more, and all I am left with here are the rabbits and swans.\n\t\t\n\t\tI mean, they are sweet and they need me, but I am an angel confessor, not a wildlife caretaker.\n\t\t*goto fountain2\n\t\t\n\t*hide_reuse #So you are just going to let us take it?\n\t\t\"Well, of course. My secondary mission is to assist anyone who comes here. I can feel your intentions are pure. I definitely can sense the Light in\n\t\tthe beautiful lady with you. I don't know what you will use the gem for, but I must warn you that it could cause the end of this sanctuary, so make the decision wisely.\"\n\t\t\n\t\t\"I am afraid we must do it in order to...\" says the priestess.\n\t\t\n\t\tDo you think you should interrupt her? Or meybe you should trust this creature?\n\t\t*choice\n\t\t\t#Interrupt her\n\t\t\t\t\"Excuse me, Mercy, maybe it is not a good idea to inform her about the prophecy.\"\n\t\t\t\t\n\t\t\t\t\"I guess you are right,\" the priestess blushes. \"I tend to be naive sometimes.\"\n\t\t\t\t\n\t\t\t\t\"Oh, I would love to hear about a prophecy. Prophecies contain words of the Light, am I right? But I also understand that patience is\n\t\t\t\ta virtue and I must exhibit it now. The demons would not give me much information either,\" she sighs. \"I guess some things are just not meant to be. I am\n\t\t\t\thappy that al least the angels were talkative. They told me a few prophecies themselves.\"\n\t\t\t\t\n\t\t\t\t\"Would you like to share them?\" you ask.\n\t\t\t\t\n\t\t\t\tShe shakes her head. \"Even if I want, I can't. Even if I want. I am an instrument for making angels relax, not for obtaining and disseminating information.\"\n\t\t\t\t*goto fountain2\n\t\t\t\t\n\t\t\t#Don't\n\t\t\t\t*set lima +1\n\t\t\t\t\"... construct a weapon that could defeat an evil demoness threatening our world.\"\n\t\t\t\t\n\t\t\t\t\"Oh, that is great. I mean, the fact that you want to destroy a demoness. The angels wanted to do that too, and sharing the ambitions\n\t\t\t\tof angels is a good thing. I wish you the best of luck with it. I know the demons are the ones that created me, but I don't really like them.\"\n\t\t\t\t*goto fountain3\n\t\n\t#Finished with the questions\n\t\t*goto fountain3\n\t\t\t\n*label fountain3\t\t\n*page_break\t\n\"Can you show us the fountain?\" you ask.\n\t\t\t\n\"Of course, just follow me,\" says Lima. You can't help but marvel at the grace with which she walks. It is as if she is lighter than \nyou would expect. She leads you down a pathway. A squirrel drops a hazelnut on your head and then jumps on the next branch.\n\t\t\t\n\"Please, excuse the local wildlife. They can sometimes be mischievous, but this is their way to say they are happy to see you.\"\n\t\t\t\n\"I understand,\" you say as you pick the hazelnut up. It looks real. \"Are they also biological robots like you, Lima?\"\n\t\t\t\n\"Yes. The demons have the technology to recreate all of that and I guess much more. Here it is!.\" She points.\n\t\t\t\nThe structure resembles a stairway leading nowhere. The water falls freely down, disappearing into small holes only to emerge again on top.\nAnd there in the middle is the shining gem of light.\n\n\"Demons don't go there. If there is something to fix, they usually ask me. One time, however, I bathed there with an angel. It was fun to see the \ncreature of the Light experience so much joy, but I really hate the feeling of damp feathers.\"\n\nWho do you think  should go and pick the gem?\n*set gem 1\n*choice\n\t#You\n\t\t\tYou step forward and waddle through the cool water. \n\t\t\t*if (light>50)\n\t\t\t\tDespite your momentary fear that the holy waters could be dangerous for you, you go on and take the gem. The whole hands of yours\n\t\t\t\tstarts glowing.\n\t\t\t\t\n\t\t\t\t\"Well done,\" congratulates you Sister Mercy.\n\t\t\t\t*goto endgem\n\t\t\t\n\t\t\t*else\n\t\t\t\t*set blood -1\n\t\t\t\tAs soon as you enter the holy waters, your skin starts burning as if the holy waters suddenly turned into acid. You jump out of the fountain,\n\t\t\t\tscreaming. Lima starts soaking the water from your skin with her feathers. Sister Mercy hesitates for a moment, then she removes her cassock to do the same.\n\n\t\t\t\t(Health decreases)\n\t\t\t\t\n\t\t\t\t\"This happened to one cheeky demon who thought he could resist the holy waters. I am sorry for the pain you had to experience.\" Lima turns\n\t\t\t\ttowards Mercy. \"You have a beautiful body. It is a shame you are hiding it wearing those unrevealing clothes.\"\n\t\t\t\t\n\t\t\t\tThe Sister blushes, putting her cassock back on. You must admit that Lima is right. Mercy is an eye candy. You are starting to believe that seeing her dressed in bikini was \n\t\t\t\treally worth the pain you went through.\n\t\t\t\t\n\t\t\t\t\"I am a priestess of the Light. I am not supposed to attract attention to my physical features,\" she explains with a hint of annoyance.\n\t\t\t\t\n\t\t\t\t\"Thank you for sharing that with me. It would never occur to me,\" says Lima.\n\n\t\t\t\t\"Who will get the gem, then?\" asks Mercy, changing the subject.\n\t\t\t\t\n\t\t\t\tIt seems that neither of the females is eager to do it. Lima already stated resenting getting wet and Sister Mercy would definitely not\n\t\t\t\tlike being naked again.\n\t\t\t\t\n\t\t\t\tWho would you suggest?\n\t\t\t\t*choice\n\t\t\t\t\t#The priestess\n\t\t\t\t\t\t*goto mercy_picks\n\t\t\t\t\t\n\t\t\t\t\t#Lima\n\t\t\t\t\t\t*goto lima_picks\n\t\t\t\t\t\t\n\t\n\t#Sister Mercy\n\t\t*goto mercy_picks\n\t\t\t\n\t#Lima\n\t\t*goto lima_picks\n\t\t\t\n*label mercy_picks\n\"Okay, so be it. You two, please, turn around?\" Sister Mercy waves with her hand.\n\n\"Why?\" Lima fails to understand.\n\n\"Because I am not going in that water wearing my cassock and I don't want you to watch me almost naked unless it is really necessary.\"\n\nLima shrugs and does so. You are forced to follow her example even though you don't really want to do so. You hear splashes of water for a couple of minutes.\n\n\"You may now watch,\" says the priestess. Water still soaks down her hair as she hands you the shining gem.\n*goto endgem\n\n*label lima_picks\n*set lima -1\n\n\"All right, if I really must.\" Expression of annoyance appears on her angelic face. You watch as she enters the fountain and gets the shining gem and returns to you.\n\n\"I hope I get dry soon,\" she says as she hands you the precious stone.\n*goto endgem\n\n*label endgem\n\"We need to go now,\" you say to Lima. There are tears in her eyes.\n\n\"I know... I knew that the day would come when this paradise would end. I know I have to be strong but I can't.\"\n*choice\n\t#Comfort her\n\t\t*set light +1\n\t\t(Light increases)\n\t\t\n\t\tYou embrace her and whisper kind words in her ear. You don't know if you managed to reach her.\n\t\t*if (lima=2)\n\t\t\t\"Please, take me with you! I don't want to see this place in ruins. It has been my home for so long. I am not sure if I will be able to take it.\"\n\t\t\t\n\t\t\tYou look at Sister Mercy, trying to get her opinion on the subject. The priestess nods.\n\t\t\t\n\t\t\t\"Okay, Lima, we can't take you with us since we have an important mission here, but you can go to the world we came from. There is a portal to it\n\t\t\tat the end of the corridor. Just go through it. You will find yourself in a church. Just wait for us there.\"\n\t\t\t\n\t\t\tLima smiles.\n\t\t\t*goto endlab5\n\t\t\t\n\t\t*else\n\t\t\tShe doesn't react in any way, so you decide to go back to your mission.\n\t\t\t*goto endlab5\n\n\t#You don't have time to deal with such emotions, you have enough problems to deal with\n\t\t\t*set light -1\n\t\t\t(Light decreases)\n\t\t\t\n\t\t\tDeciding not to waste any more time, you go back to the vestibule.\n\t\t\t*goto endlab5\n\t\t\t\n*label mech\nYou enter the mech quarters, glancing at the various robots and other devices whose purpose you can't immediately identify.\nRazor is there, repairing a machine.\n\nSuddenly, you hear a shriek of pain behind you. At the door, there is something like a force field. It seems that it activated right after you entered\nthe room and Sister Mercy run into it. \n\n\"Mercy, are you okay?\" The priestess nods. \n\n\"Why did you have to do this?\" You shout at Razor. His imps rush in, ready to defend their master.\nHe just rolls his eyes.\n\n\"Of course she is fine. If I wanted to do harm to her, I would have already done so. I just don't want to make a crowd here, that's it?\"\n\nYou see one of the imps carrying something that looks like a handle.\n\n\"What is it?\" you ask remembering the words of the prophecy.\n\n\"Oh, it is just a trinket. You can take it and go, if you want. You fail to amuse me anyway.\"\n\nYour jaw drops, not expecting him to allow you to have what you need that easily. Or is it one of his traps?\n\n\"Don't worry, nobody will hurt you. Just tell me and Arzh will give you the handle.\"\n\nYou look at him, failing not to admire at his masculine features. With his ripped muscles, he reminds you of a god from the ancient Greek\nmythology.\n\nWhat do you do?\n*choice\n\t#Just take the handle\n\t\t*set handle 1\n\t\t\"Yes, I want to have it, please,\" you say.\n\t\t\n\t\tRazor just waves and the imp approaches you extending his arm towards you. The handle doesn't feel special in any way, so you just hope it is\n\t\twhat you are looking for.\n\t\t\n\t\tThe force field disappears and you go out and back to the priestess.\n\t\t*goto endlab5\n\t\n\t#Seduce him\n\t\t*set handle 1\n\t\tYou unbutton your shirt and approach him, shaking your hips.\n\t\t\n\t\t\"Are you sure I can't be amusing? Maybe you need to think again?\"\n\t\t\n\t\tThe imp master seems stunned by your implied proposal. It seems that he is not used to being under ${succubus} siege.\n\t\t*if (protection\u003c50)\n\t\t\t\"I certainly appreciate your desire to bring punishment to those who deserve it\n\t\t\t*if (seduction>0)\n\t\t\t\tand I would really enjoy getting a taste of you.\"\n\t\t\t\t*achieve romance_razor\n\t\t\t\t*set romance +1\n\t\t\t\t\n\t\t\t\tHe rushes towards you, embracing you with his big arms, pressing his hard body towards you, taking your breath away. Your clothes \n\t\t\t\tstart to disappear and you wonder whether the imps are taking them. You appear to be naked in front of them and you are sure Sister\n\t\t\t\tMercy can see you too. Is she watching? What is she feeling? The fantasy seems to turn you off even more.\n\t\t\t\t\n\t\t\t\t*set blood +1\n\t\t\t\t\n\t\t\t\tAs the waves of pleasure rip through your body, you feel that you have taken some of Razor's energy. You are sure a big hunk like him\n\t\t\t\twouldn't even notice it.\n\t\t\t\t\n\t\t\t\t(Health increases)\n\t\t\t\t\n\t\t\t\tWhen it is all over, Razor just waves and the imp approaches you extending his arm towards you. The handle doesn't feel special in any way, so you just hope it is\n\t\t\t\twhat you are looking for.\n\t\t\n\t\t\t\tThe force field disappears and you go out and back to the priestess.\n\t\t\t\t*goto endlab5\n\t\t\t\n\t\t\t*else\n\t\t\t\t, but I find you immature. I don't find affairs with the ones like you entertaining. You may take what you want and leave now.\"\n\t\t\t\t\n\t\t\t\tRazor just waves and the imp approaches you extending his arm towards you. The handle doesn't feel special in any way, so you just hope it is\n\t\t\t\twhat you are looking for.\n\t\t\n\t\t\t\tThe force field disappears and you go out and back to the priestess.\n\t\t\t\t*goto endlab5\n\n\n\t\t*else\n\t\t\t\"You are pathetic,\" he says. \"Just take the trinket and get out of my sight.\" Razor just waves and the imp approaches you extending his arm towards you. The handle doesn't feel special in any way, so you just hope it is\n\t\t\twhat you are looking for.\n\t\t\n\t\t\tThe force field disappears and you go out and back to the priestess.\n\t\t\t*goto endlab5\t\t\t\t\t\t\n\t#Fight him\n\t\t*if (info_weapon=2)\n\t\t\t*set handle 1\n\t\t\tYou reach for the weapon and in an instant you find yourself in the middle of an explosion. All the devices emit black smoke and sparkles.\n\t\t\tThe imps fly in the air. You can almost feel them passing away and getting back to hell.\n\t\t\t*set cl +2\n\t\t\t\n\t\t\t(Clues increase)\n\t\t\t\n\t\t\tThe imp master lies motionless on the ground. Now that he is dead, you feel pity on him, but you guess the world will be a better place\n\t\t\twithout him.\n\t\t\t\n\t\t\tYou find the handle and return to the vestibule and Sister Mercy.\n\t\t\t*goto endlab5 \n\n\t\t*else\n\t\t\tBefore you could even think about it, you find yourself flying towards the vestibule and hitting hard the wall. The door closes and you hear\n\t\t\ta locking mechanism. \n\t\t\t\n\t\t\t\"Are you okay?\" Sister Mercy helps you get up.\n\t\t\t\n\t\t\t\"Sure.\" You wipe the blood off your face. \"But I couldn't get the handle. Hey, how are you? Did you get injured too?\n\t\t\t\n\t\t\t\"No, I am fine, thank you.\" She assures you.\n\t\t\t*goto endlab5\n\t\t\t\n*label endlab6\n\"It is so good to be back to our world,\" you say to the priestess after you go back through the portal.\n\n\"Yes,\" she looks into your eyes and smiles.\n\n\"Have I told you you are beautiful?\"\n*page_break\n*if (light>57)\n\t\"Thank you, ${name}. I've been trying to lie to myself, but I have feelings for you\n\t*if (romance>0)\n\t\tbut I can sense that there is another in your heart. I would stay away from your embrace until you sort your feelings out. Right now, I\n\t\twouldn't like to risk my priesthood. \n\t\t*goto final\n\t\t\n\t*else\n\t\t.\" She presses her body towards you and you breath in a hint of her energy. You gently kiss her, your lips meeting for just a fraction of a second.\n\t\t\n\t\tWould you like to proceed?\n\t\t*choice\n\t\t\t#No\n\t\t\t\t\"The time is not now, Mercy.\" You close your eyes, trying to divert your attention.\n\t\t\t\t\n\t\t\t\t\"I understand. Thank you for holding me close. I feel the warmth of the Light but I seldom sense a heart beating so close to mine,\" whispers the priestess.\n\t\t\t\t*goto final\n\t\t\t\n\t\t\t#Yes\n\t\t\t\t*achieve mercy\n\t\t\t\t*set romance_mercy 1\n\t\t\t\t*set romance +1\n\t\t\t\t\n\t\t\t\tYou kiss her again, taking her breath away.\n\t\t\t\t\n\t\t\t\t\"You can drink my life force. The Light will replenish me.\" She says as she removes her cassock.\n\t\t\t\t\n\t\t\t\t\"Don't you think it would be inappropriate to do that in a church?\"\n\t\t\t\t\n\t\t\t\t\"There is no place hidden from the Light. It will know my sin,\" she gives you another wet kiss.\n\t\t\t\t\n\t\t\t\tYou put her gentle body on the floor where she is entirely at the mercy of your desire.\n\t\t\t\t\n\t\t\t\t\"I can't drink from your life force. I am a demon and you are touched by the Light.\"\n\t\t\t\t\n\t\t\t\t\"All right, then just remain silent and go back to what you are doing. It feels so good!\" Sister Mercy pants.\n\t\t\t\t*goto final\n\t\t\t\t\n*label final\n*page_break\nSomething makes you go out of the church. The demoness is right next to the fence.\n\n\"I've been waiting for you. Come with me, we need to talk.\"\n\nHow do you reply?\n*choice\n\t#\"Okay\"\n\t\t*goto parking\n\n\t#\"Thy will be done\"\n\t\t*set humanity -1\n\t\t*goto parking\n\t\t\n\t#\"I am my own master, I will come if I choose to do so.\"\n\t\t*set humanity +1\n\t\t\"Of course. Should I say please, then?\" The demoness asks.\n\t\t\n\t\t\"This more like it.\"\n\t\t*goto parking\n\t\t\n*label parking\nThe demoness leads you to the park nearby. It is sunny and there are a lot of people. You wonder what the passers-by think about the two of you. The mother\nof all demons is wearing a long flower pattern dress and flat heel boots, looking as gorgeous as ever. The wind plays with her jet black hair, occasionally\nputting it on top of her lips or temporarily blinding her. You guess you could pass for a couple making a relaxing walk, enjoying yourselves.\n\nIs it how you feel inside?\n*choice\n\t#Yes, you feel comfortable around your progenitor\n\t\t*set humanity -1\n\t\t*goto parking2\n\t\t\n\t#No, she is a vicious demon and she can't be trusted\n\t\t*set humanity +1\n\t\t*goto parking2\n\t\t\n*label parking2\n\"Tell me, ${name}, you've seen a lot during the last couple of days. You beheld the destitute state of your best girlfriend. You participated in the demonic\ninvasion of a pocket parallel world. Then, you raided a demonic science facility, finding biological robotic entities and even your long-lost sister.\nAnd now, you stand before... me. I want to find out how you react to those events. I want to find out who you really are.\"\n*choice\n\t#\"I doubt your intentions.\"\n\t\t\"Usually, when someone asks you such private questions, it is a sign of caring. But I don't trust you.\"\n\t\t\n\t\t\"You don't trust the one who created you?\" She raises her eye brow. \n\t\t\n\t\t\"It is true that I am partly ${a} ${succubus} but I am human too.\" You remind her.\n\t\t\n\t\t\"Anyway, you are bound to answer me. If not, I can use other methods that are not so pleasant.\"\n\t\t*set humanity +1\n\t\t*goto parking3\n\t\n\t#\"I will answer your questions.\"\n\t\tShe nods.\n\t\t*goto parking3\n\t\n\t#\"I hope my answers satisfy you.\n\t\t*set humanity -1\n\t\t\"I will be satisfied if you speak your heart out.\" She says.\n\t\t*goto parking3\n\t\t\n*label parking3\n*page_break\n\"In the beginning, when you saw the vampiric version of Lauren, you were shocked. Now, after some time has passed, do you still feel negative about her choice? Or\ndo you now appreciate it?\"\n*choice\n\t#\"I hate what she became\"\n\t\t\"I remember her from before that. She was kind and compassionate. These assets were erased from her personality. It was a real pain to see her as a bloodthirsty\n\t\tbeast. No amount of time could change the way I feel about it.\"\n\t\t*set humanity +1\n\t\t*goto parking4\n\t\t\n\t#\"At the end of the day, I think it was a blessing for her.\n\t\t\"I know she paid a price by changing, but she made a step towards immortality and definitely gained the power of darkness she craved for. So, \n\t\twhen I think about it again, I feel she should be thankful for what she gained as it is more than what she lost.\"\n\t\t*goto parking4\n\t\t\n*label parking4\n*page_break\n\"About the invasion, can you summarise your recollections with a single sentence?\"\n*choice\n\t#\"I saw the destruction of a peaceful world. I am ashamed I had to participate.\"\n\t\t*set humanity +1\n\t\t\n\t\t\"Did you forget the fact that I ordered only military and police officers to be attacked and that most of the damage to civilians was inflicted\n\t\tby the humans themselves?\"\n\t\t\n\t\t\"That is true, but the casualties wouldn't have occurred had you not initiated the invasion.\"\n\t\t\n\t\tThe demoness sighs. \"If that is what you want to believe in, so be it.\n\t\t*goto parking5\n\t\t\n\t#\"I saw a sick society receive what it deserved.\"\n\t\t*set humanity -1\n\t\t*set protection -3\n\t\t(Retribution increases)\n\t\t\n\t\t\"Wow, even I couldn't have put it into words so bluntly,\" says the demoness.\n\t\t*goto parking5\n\t\t\n\t#\"I was amazed by the fact that you ordered the demonic army not to attack civilians.\"\n\t\t\n\t\t\"My children are generally more compassionate than the sons and daughters of the humans,\" says the demoness.\n\t\t\n\t\tYou guess it would be hard for you to claim otherwise.\n\t\t*goto parking5\n\t\t\n*label parking5\n\"Back in the science facility, you discovered a subject of painful experiments. How do you feel about it? Is it justifiable to bring suffering\nto an individual if it could, let's say, save many more?\"\n*choice\n\t#\"One must die so that dozens be saved. Sounds logical.\"\n\t\t*set humanity -1\n\n\t\t\"This is my belief as well,\" comments the demoness.\n\t\t*goto parking6\n\t\t\n\t#\"One needn't suffer, all they need to do is open their hearts to the Light.\"\n\t\t*set light +3\n\t\t(Light increases)\n\t\t*set humanity +1\n\n\t\t\"You are oversimplifying things. Very few have the strong link with the Light,\" says the demoness.\"\n\t\t*goto parking6\n\t\t\n\t#\"I believe there should be a way for no creature to be harmed.\"\n\t\t*set humanity +1\n\t\t*set protection +3\n\t\t(Protection increases)\n\t\t\n\t\t\"There should be, but is there one?\" The demoness smirks.\n\t\t*goto parking6\n\t\t\n*label parking6\n*if (obedience>2)\n\t*set humanity -1\n\t*goto parking7\n\t\n*else\n\t*goto parking7\n\t\n*label parking7\n\"Let me tell you something about myself and my intentions. I have a mission here which is related to mingling with the human species so that our race\nbecomes more resilient. You are one of the most successful experiments. In order for me to be successful, I need you. I either need to enslave you or \ndestroy you.\n*if humanity>1\n\tBased on the conversation we had, I can't really rely on you to join my cause willingly. I will have to kill you and consume your DNA.\"\n\t*goto battle\n\t\n*else \n\tBased on the conversation we had, I guess all I need for you to join is just make a proposition. Would you let me in your soul?\" She steps closer to you.\n\t*choice\n\t\t#Yes\n\t\t\t*achieve slave\n\t\t\tYou shiver with pleasure as you feel the presence of the mother demon inside you. At the same time, you know you are losing yourself, you\n\t\t\tare sacrificing yourself for the good of her majesty. However, you can't stop now, because it feels so good.\n\t\t\t\n\t\t\tUnder her guidance, you commit acts of attritions. You wash your hands in a sea of blood.\n\t\t\tHowever, the demoness allows you bring her pleasure during the long nights. \n\n\t\t\tFinally, you find a place you belong.\n\t\t\t*goto ending\n\n\t\t#No\n\t\t\t\"Are you sure?\" she asks.\n\t\t\t\n\t\t\tYou repeat the same answer.\n\t\t\t\n\t\t\t\"As you wish.\" \n\t\t\t\n\t\t\tYou feel her hands wrap around your neck... and break it.\n\t\t\t\n\t\t\tThis is a sad end of the story.\n\t\t\t*goto ending\n\t\t\t\n*label battle\n*page_break\n*if (bound=1)\n\t\"Resistance is futile,\" she says calmly. \"Your soul belongs to me.\"\n\n\t\"But... our arrangement was different...\" you spatter as your blood runs cold.\n\n\t\"Well, I told you the truth. No demon can have your soul. But I didn't tell you the whole truth. After thirteen years, I can have it for myself.\"\n\t*if (darkhealing>2)\n\t\tYou know that she is wrong. With your ability to heal creatures of the darkness, you managed to cure your soul of the taints the agreement.\n\t\t*set battle 1\n\t\t*goto battle2\n\t\t\n\t*elseif (summoning>2)\n\t\tYour skills in summoning make you understand the nature of the binding and successfully cancel it.\n\t\t*set battle 1\n\t\t*goto battle2\n\t\t\n\t*elseif (runemastery>2)\n\t\tWhat the demoness doesn't know yet is that a rune you encountered earlier enabled you to cancel the binding of the agreement.\n\t\t*set battle 1\n\t\t*goto battle2\n\t\t\n\t*else\n\t\t\"Unless I destroy you?\" you enquire.\n\n\t\tThe demoness laughs. \"That would be fun watching.\"\n\t\t*set battle 0\n\t\t*goto battle2\n\n*else\n\t\"It was wise of you not to bind your soul to me. However, that will not save you,\" she says. \"Too bad I plan to feast on your soul anyway.\"\n\t\n\t\"I won't let you do this!\" you whisper.\n\t\n\t\"You wish.\"\n\t*set battle 1\n\t*goto battle2\n\t\n*label battle2\n*page_break\n\"The funny think is that you actually attracted the attention of an agent of the Light. Did you uncover her message? Did you manage to assemble the dagger? It \nwould have been a real waste. I crushed such a beautiful angel. You are not going to tell me her sacrifice was in vain, will you?\"\n*page_break\n*if (gem=1) and (handle=1)\n\tYou realize that you have no idea where these parts are. Suddenly, your pockets feel rather full. You check in and find Mercy's dagger, the gem of light and the handle\n\tyou took from Razor. The demoness freezes. \n\t\n\t\"I don't want to underestimate you, but you are not going to bind those artefacts.\"\n\t*page_break\n\t*if (cl>4)\n\t\t*page_break\n\t\tYou concentrate, trying to think of all the clues you found during the last few days, making connections between your discoveries and all of a sudden\n\t\tit all starts making sense. The words come one after another. The enchanted dagger assembles itself under a fountain of Light and darts at the demoness.\n\t\tShe tries to dodge but fails. It sinks in her chest.\n\t\t*if (battle=1)\n\t\t\t*goto win\n\t\t\t\n\t\t*else \n\t\t\t*goto battle3\n\t\t\t\n\t*else\n\t\tYou try to do your best to think of a spell that would make the dagger assemble, but fail.\n\t\t\n\t\t\"You are a good ${succubus}. I am sure you will manage to do it... in your next life.\n\t\t*if (battle=1)\n\t\t\t*goto battle3\n\t\t\t\n\t\t*else\n\t\t\tShe produces a whip out of nowhere.\n\t\t\t*goto lose\n\t\t\t\n*label battle3\n*page_break\nThe demoness produces a long whip, her facial expression changing to one of pure malice. \n\n\"I have no time for games any more. I will have your soul... now.\"\n*if (blood\u003c1)\n\tYou try to fight back, but your body feels weak from all of the wounds it suffered. The whip makes a couple of long bloody traces on your skin and \n\tthe pain forces you to give in.\n\t*goto lose\n\t\t\n*else\n\t*goto battle4\n\n*label battle4\n*page_break\nHow would you attack the demoness?\n*choice\n\t#Shoot her with your pistol\n\t\t*if (marksmanship)>2\n\t\t\tYou don't even have the pistol with you, but it doesn't really matter. As soon as you extend your arms, it materializes and you pull the trigger. The bullet\n\t\t\tmeets her forehead, causing an explosion of blood and brain.\n\t\t\t*goto win\n\t\t\t\n\t\t*else\n\t\t\t*goto lose\n\t\n\t#Attack with the whip she gave you\n\t\t*if (whip>1)\n\t\t\tYou don't even have the whip on you, but it really doesn't matter. As soon as you think about it, it materializes in your hands.\n\t\t\t\n\t\t\t\"You learn from the best,\" hisses the demoness.\n\t\t\t\n\t\t\tThe weapon she gave you proves able to bring devastation. A series of precise hits virtually tears the flesh down her face. spraying blood\n\t\t\teverywhere, the demoness falls on the ground.\n\t\t\t*goto win\n\t\t\t\n\t\t*else\n\t\t\t*goto lose\n\t\n\t#Throw a fireball at her\n\t\t*if (fireball>2)\n\t\t\tYou extent your fingers towards the demoness and the fire launches at the speed of light. The demoness tries to escape but the flame licks the edge of her\n\t\t\tsleeve and in a second she burns down to the bones.\n\t\t\t*goto win\n\t\n\t\t*else\n\t\t\t*goto lose\n\t\n\t#Transform\n\t\t*if (transformation>2)\n\t\t\tYou summon forth the image of the fire demon hiding inside you. You sprint towards the demoness, turning into an entity made of pure fire. She tries to escape but the flame licks the edge of her\n\t\t\tsleeve and in a second she burns down to the bones.\n\t\t\t*goto win\n\t\t\t\n\t\t*else\n\t\t\t*goto lose\n\t\t\t\n\t#Attempt to control her mind \n\t\t*if (mind_control>2)\n\t\t\tYour initial contact with the abyssal mind of the demoness reminds you of delving deep into the ocean during winter, but at least you manage to \n\t\t\tstun her for a heartbeat.\n\t\t\t*if (wit>1)\n\t\t\t\tRealising you managed to confuse her perception of yourself when you first met, you manage to use that loophole in your favour, extending\n\t\t\t\tthe period of disorientation, making it long enough to reach her... and break her neck.\n\t\t\t\t*goto win\n\n\t\t\t*else\n\t\t\t\tUnfortunately, the time is not enough for you to do anything.\n\t\t\t\t*goto lose\n\t\t\t\t\n*label lose\nThe whip of the demoness coils around your neck. She pulls you towards her, not letting you breath. She looks into your eyes and you sink deeply. \n\nAs soon as your soul leaves your body, she breathes it in, her body shivering with pleasure.\n\nThis is a sad end of the story.\n*goto ending\n\n*label win\nYou crouch over the remains of the demoness. It seems that this was the end of her. Looking around, you find that the battle did not ettract any attention. It is true that\nyou are in a secluded area of the park, but you guess that it was a trick she used in order to be able to... kill without being disturbed.\n\nYour head still dizzy, you return to the campus, not being able to remember your trip to there, until you head hits the pillow.\n*if (protection>55) and (humanity>1)\n\tA knock on the door startles you.\n\t\n\t\"${name}, it is me.\" you hear the voice of the Goatfather. \"I was worried about you.\"\n\t\n\t\"Come in,\" you say, too weak to get up.\n\t\n\tThe Goatfather sits beside your bed, gently petting your hair as he would do when you were a little child, when you were sick. He knows how much\n\tyou treasure silence in these moments when you've run out of energy, so he doesn't speak.\n\t\n\tHe kisses your forehead, something he's never done.\n\t\n\tWould you encourage him to continue?\n\t*choice\n\t\t#Yes\n\t\t\t*set romance 1\n\t\t\t*achieve romance_goat\n\t\t\t*set romance_goat 1\n\t\t\tYou grab his hand and kiss it, enjoying the smile of his bearded face. Next time he bends over you, his lips find yours in a tender.\n\t\t\t\n\t\t\tYou gesture him to come and lie next to you. \n\t\t\t\n\t\t\tThat night, you find out how gentle demons can make love.\n\t\t\t*goto epilogue\n\t\t\t\n\t\t#No\n\t\t\tHe spends about half an hour in your room, making sure you are okay, then, he leaves.\n\t\t\t*goto epilogue\n\t\t\t\n*label epilogue\n*achieve epilogue\nThe demoness crawls in your sleep, dressed as a bride in a gorgeous white dress.\n\n\"I want to thank you. You freed me...\"\n\nFreed her of what? \n\nShe looks away and your eyes behold it. Pitch darkness surrounds her, as if she is the only thing (other than you) in this world. \n\nThe only thing that matters.\n\n\"I don't understand, mother,\" you say, your voice no more than a whisper.\n\nShe cracks a smile. Her expression bears no trace of the wickedness it possessed. \"My demons were designed to be a great race, full of power and creativity. But we were\nenslaved by something dark, something that changed me into the monster you know. My only way out was to be killed.\"\n\nYou blink trying to assimilate her words. \"Then why didn't you kill yourself?\"\n\nThe mother demon laughs sending ripples of joy in the abyss. \"I gave you a hard time, didn't I? That power was taken from me. All I could do was find someone\nstrong enough to defeat me and I did. But it was risky. I could have conquered you and then you would have to obey the will of the Dark One.\"\n\n\"Who is the...\" you ask, but the demoness interrupts you.\n\n\"Don't even mention him! He is someone you'd better not know.\"\n\nYou nod. The power of her voice makes you tremble for a second. \"What will happen now, mother? Will I see you again?\"\n\nHer big eyes engulf you and you feel as if she embraces you. \"I am not a prophet. I may need you again, but until the time comes, carry my love with you and know\nthat you laid the foundation of the freedom of the entire demonic race.\"\n\nThe dream ends.\n*goto ending\n\n*label end_trial\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first part of the game is available for free? This is the end of the free content.\n\n[b]To find out what happens next, please purchase the remaining chapters.[/b]\n\n*purchase adfree $2.99 purchased\n*abort\n\n*label ending\n*page_break End\nWe hope you've enjoyed playing [i]Dancing with Demons.[/i]\n\n*feedback\n\nWe release new games on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "death": "Your journey ended prematurely. Please, start from the beginning.\n*ending", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*set name \"Deathrose\"\n*set gender \"female\"\n*set blood 4\n*set cl 2\n*set marksmanship 1\n*set intuition 2\n*set fireball 1\n*set mind_control 0\n*set darkhealing 1\n*set summoning 0\n*set runemastery 1\n*set transformation 2\n*set whip 1\n*set light 57\n*set protection 43\n\t\t\nWhen you go outside, it is slightly past midnight. Most of the crowd is gone, probably searching for a better spot to continue partying. You walk along\nthe main street still feeling the adrenaline in your veins.\n\nA few miles down, you swerve into a narrow street and suddenly your sixth sense makes you cease. It is dark and there are pieces of rubbish but you \nnotice nothing that could be a source of danger.\n\nWhat do you do?\n*fake_choice\n\t#Enter boldly. Even if there is someone dangerous inside, very few could resist the negotiation skills of a ${succubus}\n\t\t\t\n\t#Enter cautiously. Your premonition clearly indicated a danger but your curiosity is stronger.\n\t\t\n\t#Wait.\n\t\t\n\t#Blast a fireball in the street, trying to eliminate the source of danger.\n\t\n\t#Turn around and look for another route.\n\t\t\n\n*script changeBackgroundColor(\"black\")\n*set name \"Deathrose\"\n*set gender \"female\"\n*set blood 3\n*set cl 3\n*set marksmanship 1\n*set intuition 2\n*set fireball 1\n*set mind_control 0\n*set darkhealing 3\n*set summoning 1\n*set runemastery 1\n*set transformation 2\n*set whip 1\n*set light 55\n*set protection 45\n\nAmanda seems unable to respond. She seemed so confident, so full of power. Now she looks as helpless as a puppy.\n\nThe demon blows towards the pentagram and deletes one of the corners. A sick laughter echoes in the cave as the creature leaves its prison. Its shady\neyes engulf you, then Amanda.\n\nWhat do you do?\n\n*fake_choice\n\t#say a prayer\n\t\t\n\t#take control of the demon\t\n\t\t\n\t#shield her with your body\n\t\t\n\t\t\n\t#attack the demon\n\t\t\n\n*script changeBackgroundColor(\"sepia\")\n*set name \"Deathrose\"\n*set gender \"female\"\n*set blood 4\n*set cl 4\n*set marksmanship 1\n*set intuition 2\n*set fireball 2\n*set mind_control 0\n*set darkhealing 3\n*set summoning 2\n*set runemastery 1\n*set transformation 2\n*set whip 1\n*set light 52\n*set protection 44\t\t\nExcept for the eyes - they are like two pieces of an the abyss. Other than that, her facial\nfeatures are soft and innocent.\n\n\"Don't you know that you are supposed to kiss the hand of the mother demon?\" she asks you with a tempting smile and offers you her hand covered with a velvet glove. You get a sudden urge\nto obey.\n*fake_choice\n\t#Get up and kiss her hand.\n\t\t\n\t#Kneel before her and kiss her hand.\n\t\t\n\t#Say that you are not supposed to kiss a gloved hand.\n\t\t\n\t#Ask her who the hell she is and what she wants from you.\n\t\t\n\t#Politely refuse.\n\t\t\n*set name \"Deathrose\"\n*set gender \"female\"\n*set blood 2\n*set cl 6\n*set marksmanship 1\n*set intuition 2\n*set fireball 2\n*set mind_control 1\n*set darkhealing 3\n*set summoning 2\n*set runemastery 1\n*set transformation 2\n*set whip 1\n*set light 53\n*set protection 42\n\"Mom... you must help mom. She is over there,\" cries the little girl.\n\nYou try your best to make her calm down but you simply can't. The humane part of you wants you to rush head over heels to help. Your more rational one, however, wishes to\nat least think it over. Going over there might be fatal in this feud currently going on.\n*fake_choice\n\t#Follow the girl\n\t\t\t\n\t#Continue on your way\n\t\t\n*set name \"Deathrose\"\n*set gender \"female\"\n*set blood 2\n*set cl 7\n*set marksmanship 1\n*set intuition 2\n*set fireball 2\n*set mind_control 1\n*set darkhealing 3\n*set summoning 2\n*set runemastery 2\n*set transformation 2\n*set whip 2\n*set light 56\n*set protection 46\n\"Back in the science facility, you discovered a subject of painful experiments. How do you feel about it? Is it justifiable to bring suffering\nto an individual if it could, let's say, save many more?\n*fake_choice\n\t#\"One must die so that dozens be saved. Sounds logical.\"\n\t\t\n\t#\"One needn't suffer, all he others need to do is open their hearts to the Light.\"\n\t\t\n\t#\"I believe there should be a way for no creature to be harmed.\"\n\t\t\n*ending", "startup": "*title Dancing with Demons\n*author Ivailo Daskalov\n\n*scene_list\n\tstartup\n\tdancing\n\tdeath\n\t\n\n*create name \"?\"\n*create cp_name \"?\"\n\n*create light 50\n*create gender \"\"\n\n*create protection 50\n\n*create rel_goat 0\n*create rel_mercy 0\n*create rel_lauren 0\n*create rel_imp 0\n\n*create succubus \"succubus\"\n*create succubi \"succubi\"\n\n*create blood 3\n*create mind 3\n\n*create skill_one \"Not available yet\"\n*create skill_two \"Not available yet\"\n\n*create cl 0\n*create cp_cl 0\n\n*create a \"a\"\n\n*create marksmanship 0\n\n*create intuition 0\n\n*create fireball 0\n\n*create mind_control 0\n\n*create darkhealing 0\n\n*create summoning 0\n\n*create runemastery 0\n\n*create transformation 0\n\n*create obedience 0\n\n*create whip 0\n\n*achievement romance_lauren visible 1 The ritualist\n\tRomance Lauren.\n\tYou romanced Lauren! \n\n*achievement mercy visible 25 Sinmaker  \n\tSeduce a holy one.\n\tYou romanced Sister Mercy!\n\n*achievement romance_razor visible 25 Love of the master\n\tGive yourself to someone who doesn't deserve it.\n\tYou romanced Razor the imp master!\n\n*achievement romance_goat visible 25 Fatherly love\n\tEnjoy the love of the exhiled from hell.\n\tYou romanced the Goatfather!\n\n*achievement amanda visible 50 Sister saver\n\tSave Amanda\n\tYou saved Amanda!\n\n*achievement mother visible 25 Enjoy the mother\n\tTake advantage of a beautiful mom.\n\tYou had an affair with a beautiful mom.\n\n*achievement epilogue visible 3 Well played\t\n\tReach the epilogue\n\tYou reached the epilogue!  \n\n*achievement save_one visible 50 Save one, doom zillions\n\tPut the life of one before the fate of the world\n\tYou put the life of one before the fate of the world\n\n*achievement slave visible 100 Thy will be done\n\tBecome a slave of the mother demon\n\tYou became a slave of the mother demon\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tFollow your demonic heart and its dark wishes! Play as a contemporary succubus (or incubus) and have fun while saving the world from its doom. Participate in an invasion of a parallel world. Discover the dangers of an abandoned lab. Win the affection of your chosen, or have a one-night affair. It is all up to you.\n\n\t[i]You can play the first part of the game for free. Purchase the rest of the game below.[/i]\n\t*if choice_is_advertising_supported\n\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n\t*purchase adfree $2.99 purchased\n\t*if choice_is_advertising_supported\n\t\t*page_break_advertisement\n\t*if not(choice_is_advertising_supported)\n\t\t*page_break Play Now for Free\n\n\n*label purchased\n\n\n\n\n\n\n\n\n\n\n\n*finish\n"}};

(function (root) {

  // ---- errors ----------------------------------------------------------- //

  class CSError extends Error {
    constructor(message, scene, line) {
      super(formatLoc(scene, line) + message);
      this.raw_message = message;
      this.scene = scene === undefined ? null : scene;
      this.line = line === undefined ? null : line;
