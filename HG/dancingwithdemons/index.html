<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dancing with Demons — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "dancingwithdemons", "title": "Dancing with Demons", "scenes": {"choicescript_description": "Follow your demonic heart and its dark wishes! Play as a contemporary succubus (or incubus) and have fun while saving the world from its doom. Participate in an invasion of a parallel world. Discover the dangers of an abandoned lab. Win the affection of your chosen, or have a one-night affair. It is all up to you.\n\n[i]Dancing with Demons[/i] is a 47,000-word interactive novel by Ivailo Daskalov. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.", "choicescript_stats": "*stat_chart\n\ttext name Name\n\ttext gender Sex\n\ttext blood Health\n\n\ttext cl Clues\n\t\n\ttext marksmanship Marksmanship\n\n\ttext intuition Intuition\n\n\ttext fireball Fireballs\n\n\ttext mind_control Mind Control\n\n\ttext darkhealing Dark Healing\n\n\ttext summoning Summoning\n\n\ttext runemastery Runecraft\n\n\ttext transformation Transformation\n\t\n\ttext whip Whip Mastery\n\t\n*line_break\n*stat_chart\n\topposed_pair Light\n\t\tDarkness\n\n\topposed_pair Protection\n\t\tRetribution\n\t\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game.\n\n  *purchase adfree $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n\n", "dancing": "*temp mercy false\n*temp goat false\n*temp pistol_available true\n*temp know false\n*temp rottie 0\n*temp rottie_alive 0\n*temp rasmoth 0\n*temp honesty 0\n*temp wit 0\n*temp imp 0\n*temp soul 0\n*temp bound 0\n*temp daughter 0\n*temp mom 0\n*temp note 0\n*temp feather 0\n*temp burnt 0\n*temp church 0\n*temp police 0\n*temp mercy_alive 1\n*temp warning 0\n*temp lauren_reptilian 0\n*temp info_weapon 0\n*temp armory 0\n*temp romance_lauren 0\n*temp romance_mercy 0\n*temp romance_razor 0\n*temp lima 0\n*temp gem 0\n*temp handle 0\n*temp battle 0\n*temp seduction 0\n*temp romance 0\n*temp humanity 0\n*temp romance_goat 0\n*temp girl_room 0\n*temp healed false\n*temp hurt false\n\nWould you like to receive background information about demons?\n*choice\n\t#Yes\n\t\tThe term 'demons' applies to a group of creatures from other worlds that tend to appear in ours. Sometimes they are summoned by talented individuals who\n\t\twant their power. Other times the demons just tear the boundaries of our world, hunting for what they love most - human souls. In order to do be able to do so,\n\t\tthey need to bind with someone from our world. When that happens, the poor victim becomes... something else.\n\t\t\n\t\tIn your case - a succubus (or incubus, if you are male). These kind of demons are referred to as sexual vampires as they absorb the energies of their victims while\n\t\tbeing intimate with them. However, that is not a strict requirement. It is just that humans tend to unleash a lot of energy in such occasions. And, a succubus (incubus)\n\t\teasily gets close to a victim, sometimes relying on charm... or sheer mind controlling abilities.\n\t\t*goto 101\n\t#No\n\t\t*goto 101\n\t\t\n*label 101\n*page_break\nYou wait patiently behind the scene for the announcer to say your name. The public sounds excited and you guess it should be. Cardstone is the hot new\nnumber one mobile device adaptation of a trading card game. It is casual, addictive and lots of fun to play. And, you are about to participate in \nthe final of the annual tournament which (for the first time) is set in your own hometown. You've secured a big cash reward but a bigger prize awaits you\nin case you triumph in the final. As a professional player, having financial security for a few months is important. You could delve into the other kind of\nactivities.\n\nThe announcer screams your name\n*input_text name\n*goto 2\n\n*label 2\nAs you go on stage, the public explodes. You see a few familiar faces. It is really intoxicating to know that you've been an inspiration for so many gamers. How do \nyou greet the fans?\n*choice\n\t#Blow them a kiss, careful not to remove your lipstick.\n\t\tAs you do so, you are pretty sure dozens of eyes are virtually trying to burn a hole in your little black dress... or maybe your scarlet knee-high leather boots. \n\t\tBeing a succubus, you are used to this kind of attention.\n\t\t*set gender \"female\"\n\t\t*goto 3\n\t\t\n\t#Raise your masculine fist and flex your muscles.\n\t\t*set gender \"male\"\n\t\t*set succubus \"incubus\"\n\t\t*set succubi \"incubi\"\n\t\t*set a \"an\"\n\t\tAs you do so, you are pretty sure dozens of eyes are virtually trying to burn a hole in your skin tight white T-shirt displaying ripped muscles. Being an incubus\n\t\tyou are used to this kind of attention.\n\t\t*goto 3\n\t\t\n*label 3\nYou shake hands with your opponent - a youngish looking Asian guy who seems uneasy being so close to you. Prey can sometimes be so sweet when timid. You give him a wink and purse your lips, which is enough\nto make him blush all over and try to hide his discomfort by heading immediately to his cabin. You wave to the audience and enter your cubicle. Closing the door makes all the noises\ndisappear and all of a sudden you can hear your own heart beat.\n\t\nYou carefully pick the tablet. It is a beauty, fresh out of the production facilities. You know there are people who would give an arm and leg to have it. Maybe you should \nbuy one too.\n\t\nAs you enter your account name and password, you contemplate on your tactics.\n*choice\n\t#It has been a long tournament. Be aggressive and try to finish the match quickly.\n\t\t*set blood +1\n\t\tYour strategy might appear to be a bit risky but the result is impressive. You win three games in a row. As some say, success favours the brave.\n\t\t(Because you managed to conclude the match early, there is enough time for you to have a rest and a drink a bit later. Health increases by 1.)\n\t\t*goto 4\n\t\t\n\t#Be reactive but use every opportunity to taunt and insult your opponent.\n\t\t*set light -2\n\t\t(Darkness increases by 2)\n\t\t\t\n\t\tYou know that psychological attacks can be an important part of the game and you give your best to bluff and tease, making your opponent lose control\n\t\tover his gameplay and succumb to emotions. The crown cheers every time you pull one of your tricks.\n\t\t\t\n\t\tThe first two games are pretty one-sided. You lose the third due to terrible luck but manage to easily nail the fourth.\n\t\t*goto 4\n\t\t\n\t#Be reactive and compliment your opponent on his good moves\n\t\t*set light +2\n\t\t(Light increases by 2)\n\t\t\t\n\t\tOne of the reasons you are so popular among both players and fans is the respect you display. Very few would have the nerves to type \"well played\"\n\t\twhen after a brilliant move by the rival you lose board control.\n\t\t\t\n\t\tIt seems that your comments give your opponent wings and he wins the the first two games. You ask for a time out to go to the bathroom, desperate\n\t\tto get yourself together. When you return, you manage to get in the zone and before you know it, you set the score even. The last game proves\n\t\tto be quite dramatic. On a couple of occasions you are on the verge of defeat but you draw lucky cards and win!\n\t\t*goto 4\n\t\t\t\n*label 4\n*page_break\nThe audience explodes in shouts and applauses and you contribute to the cacophony of noises yourself. You are the champion! Your dream has come true! After all of the training, you are\nfinally the champion. The award is to be presented by the smoking hot hostess Rachel Valeriama. As your eyes lock with hers you could almost feel her heart\nbeat as quickly as yours and when she tries to kiss you to congratulate you, her lips land on the side on your mouth. Deciding to play along, you put your arm\naround her waist and almost make her forget her questions.\n\n\"Thank you all for coming here and supporting the tournament. Big thanks to the developers of Cardstone... and to you as well, Rachel.\" You give her a kiss\non the cheek, which makes her blush all the way to her crimson hair.\n*page_break\nYou spend half an hour signing autographs and letting fans get a selfie with you. Around the end, you are beginning to get slightly annoyed. As ${a} ${succubus}, you are used\nto making a powerful impression, but this appears to be a bit too much.\n*page_break\nWhen you go outside, it is slightly past midnight. Most of the crowd is gone, probably searching for a better spot to continue partying. You walk along\nthe main street still feeling the adrenaline in your veins.\n\nA few miles down, you swerve into a narrow street and suddenly your sixth sense makes you cease. It is dark and there are pieces of rubbish but you \nnotice nothing that could be a source of danger.\n\nWhat do you do?\n*choice\n\t#Enter boldly. Even if there is someone dangerous inside, very few could resist the negotiation skills of a ${succubus}\n\t\t*set cl  +2\n\t\t*set protection -2\n\t\t\n\t\t(Protection decreases)\n\t\t\n\t\tTonight, you feel unstoppable, being given wings by the euphoria. Without thinking too much, you walk down the narrow street. \n\t\t*goto battlez\n\t\t\n\t\t\t\n\t#Enter cautiously. Your premonition clearly indicated a danger but your curiosity is stronger.\n\t\t*set protection +2\n\t\t(Protection increases)\n\t\t*goto battlez\n\t\t\n\t#Wait.\n\t\tSuddenly, something pulls you into the street.\n\t\t*goto battlez \n\t\t\n\t#Blast a fireball in the street, trying to eliminate the source of danger.\n\t\t*set fireball +1\n\t\t\n\t\t(Fireballs increase by 1)\n\n\t\tYou look around, making sure there are no witnesses and send a fire blast into the street.For a split second, the street is set ablaze and you see a humanoid shadow, but it vanishes before being\n\t\thit by the fire.\n\n\t\t*goto decide\n\t\n\t#Turn around and look for another route.\n\t\t*goto decide\n\t\t\n*label battlez\n*page_break\nA humanoid shadow rises from the ground just before you and stabs you just below your breasts. You wail in pain and lean onto the wall. The wound feels icy cold.\nThe demon comes closer to you, his tusky mouth just inches from your face.\n\t\t\n\"Lassst warning. Surrendder...\"\n\t\t\n(Health decreases by 2)\n*page_break\n*set blood -2\n*set hurt true\n*if blood\u003c1\n\tThe world spins around and your body collapses on the dirty ground.\n\t\t\t\n\t\"No, you're not dying tonight,\" says the demon and spits something on you.\n\t*set blood 1\n\t*set cl +3\n\t\n\t(Clues increase by 3. Health is 1 now)\n\n\tThen, he vanishes. You need a few minutes before being able to stand up.\n\t*goto decide\n\t\t\n*else\n\tYou know that you are at the mercy of the demon and the fear that your life will end here overwhelms you, but he just vanishes into thin air. You leave the street as quickly as the wound allows you.\n\t*set cl +3\n\t\n\t(Clues increase by 3)\n\t*goto decide\n\n*label decide\n*page_break\nThe peril in the street makes you decide not to head home immediately. It seems wiser to seek some help.\n\nThe most obvious alternative seems to be the Goatfather. He is a devil who willingly left hell and founded an orphanage in order to repay humanity for \nall the atrocities he committed while serving the Darkness. After your parents perished, it was him who took the role of your father and helped you control your ${succubus}\nabilities and come to accept your nature. Apart from him, there are a few other devils living in the orphanage. Maybe at least some of them could provide you with more \ninformation about what is after you.\n\nThe second person that comes to your mind is Sister Mercy. She is a young human priestess, a specialist in exorcism. When you first met her, you were stunned by her charisma. You \ncould have easily mistaken her for a succubus. Instead of hunting you (like some of her Brothers and Sisters did), she decided to try to help you love yourself and gently push you \ntowards the Light. At times, when you feel lonely, she offers you shelter.\n\nWhom do you approach?\n*choice\n\t#The Goatfather\n\t\t*set light -1\n\t\t(Darkness increases by 1)\n\t\t*goto goat\n\t\t\n\t#Sister Mercy\n\t\t*set light +1\n\t\t(Light increases by 1)\n\t\t*goto mercy\n\t\t\n*label mercy\n*set mercy true\n*page_break\nAs you enter the church, you get a strange feeling. Nobody of your kind is supposed to be here. It is the home of your hunters. And yet, as soon as you see the smile of the \npriestess, you feel at home too.\n\nThere is nobody else in the chapel. Sister Mercy is arranging flowers near the altar. She is not wearing her hood and her long auburn curls fall freely on her cassock. As she sees you, she gives you a \nwarm smile and her dark eyes sparkle. She may very well be the prettiest woman to wear a cassock, you think.\n\nThe priestess offers her hands and you readily extend yours. Her skin is so gentle and warm.\n\n\"${name}, I missed you. Where have you been lately?\" she asks.\n\nYou tell her about the video game tournament and having to prepare for it.\n\n\"You really have to teach me to play that game. The last time you talked about it, you really got me interested.\"\n\n\"If you appear on a tournament with that uniform, you will make quite an impression,\" you joke.\n\nHer laughter reminds you of a spring ripple. \"Did you come to see me, or is something that ails you?\"\n*goto mercy1\n\n*label mercy1\n*page_break\nWhat would you ask Sister Mercy?\n*choice\n\t*disable_reuse #Ask her for a blessing\n\t\t\"Nothing easier than that,\" replies the Sister and starts talking in what seems to be Latin and drawing crosses in the air. You suddenly feel warmer.\n\t\t*set light +3\n\t\t\n\t\t(Light increases by 3)\n\t\t*goto mercy1\n\t\n\t*disable_reuse #Ask her why she is so kind to you\n\t\t\"Because, you are ${a} ${succubus}.\" She looks around as if to check if there is really nobody in the church. \"You are one of the greatest beings the Light\n\t\tcreated. Even though your kind tends to fall from grace, you still can become one of the Light's greatest weapons, ${name}. The choice is yours. I... I really see the Light\n\t\twhen I look into your eyes and... it is beautiful!\"\n\t\t\n\t\tHer big eyes get wet. Without thinking, you embrace her.\n\t\t\n\t\t\"Thank you for being so kind to me, Sister. I appreciate it. But why is it that your brethren would rather kill me... what makes you so different. Aren't you supposed to share a common\n\t\tviewpoint on ${succubi}?\"\n\t\t\n\t\tSister Mercy slowly breaks from your hug.\n\t\t\n\t\t\"One of the things I learned while being a priestess is to deal with contradictions and hypocrisy. I've decided to follow my heart. I let the Light in and it guides my footsteps.\"\n\t\t*goto mercy1\n\t\t\n\t*disable_reuse #Ask her to allow you to feed on her\n\t\t*set light -1\n\t\t(Darkness increases by 1)\n\t\t\n\t\t\"I don't think it is a good idea. I understand your need to consume the life energies of people, but I am a priestess and I can't let you do that. Actually, many of my\n\t\tbrethren would say yes, because our energies might be a bit too holy and therefore poisonous to you.\"\n\t\t\n\t\t\"I understand,\" you say confused. \"I really shouldn't have brought the topic up.\"\n\t\t\n\t\t\"There is really no problem.\"\n\t\t*goto mercy1\n\t\t\n\t*disable_reuse #Ask her to heal you \n\t\t*set blood +1\n\t\t*set healed true\n\t\t\"I am not sure if I will be able to make it happen. I don't usually try to heal demonspawn. If you feel pain just let me know and I will stop.\"\n\t\tShe starts reciting the prayer\n\t\t*if light>50\n\t\t\tand you feel a soothing warm go throughout your body. It is so pleasant that your head gets dizzy and suddenly you find yourself on the floor. Sister Mercy is on her knees, her gentle palms caressing your cheeks\n\t\t\t\"Are you alright? You scared me!\" she whispers.\n\n\t\t\t\"I am better than you could imagine,\" you smile as you get up.\n\t\t\t*set blood +1\n\t\t\t\n\t\t\t(Health increases by 1)\n\t\t\t*goto mercy1\n\t\t\n\t\t*else\n\t\t\t*set blood -1\n\t\t\tand at first you feel a soothing warm go throughout your body. Then, it changes into pain so sharp that it makes you shriek and fall to the ground. When you regain your senses, you see Sister Mercy on her knees, her gentle palms caressing your cheeks\n\t\t\t\"Are you alright? You scared me!\" she whispers.\n\t\t\t*if blood\u003c1\n\t\t\t\tYou try to answer but your mind drifts away.\n\t\t\t\t*goto_scene death\n\t\t\t\t\t\n\t\t\t*else\t\n\t\t\t\t*page_break\n\t\t\t\t\"I am better than you might think,\" you try not to show how damaged your body really feels.\n\t\t\n\t\t\t\t(health decreases by 1)\n\t\t\t\t*goto mercy1\n\t\n\t#Waste no more time and tell her about the peril in the street\n\t\t*goto mercy2\n\t\t\n*label mercy2\n*page_break\n\"My first thought would be about any of the exorcists we have in the church. However, as far as I know, they are all out of town now. And, I can feel no lightspawns.\"\n\n\"Lightspawns?\" you inquire.\n\n\"They are semi intelligent soulless creatures made of pure Light that are sent to hunt creatures of the Darkness.\"\n\nYou make a funny grimace.\n\n\"I am sorry, I can't help you with that. Maybe you should talk to your mentor, the godfather?\" she suggests.\n\n\"The Goatfather. You know he is demonic as well, don't you?\"\n\nSister Mercy nods.\n\n\"He is a good guy too. I am starting to wonder whether there are more bad ones in the church than good demons around.\"\n\nYou shrug.\n\n\"It could be.\n*if goat\n\tI spoke to him earlier tonight. He told me all he knew.\"\n\t*goto mercy3\n\t\n*else\n\tYou are right, I should talk to him later.\"\n\t*goto mercy3\n\t\n*label mercy3\n\"Good. I feel bad about not being able to aid you. I guess it may not be the right time, but you've been delaying it for so long. Would you like me to help you remember your past?\"\n\nYou feel your heart beating faster at the thought. You don't recall much of your childhood before you were sent to the Goatfather's orphanage. You recall you had a sister called Amanda but this is just about it. It is possible that your consciousness is trying to protect itself by shielding you from certain events of the past, but on the other hand, you really need to know. That would lift a big burden off your shoulders.\n\nHow would you answer?\n*choice\n\t#\"Okay.\"\n\n\t\t\"Follow me into the confessions area, please,\" she says and takes your hand. You bet this is not the usual practice, but her touch is very pleasant so you really don't mind.\n\t\tAs you enter, you begin to feel a bit claustrophobic, but Sister Mercy's voice soothes you.\n\t\t\n\t\t\"$!{name}, listen to me carefully. Close your eyes and try to recollect the image of your sister. I will bring you back to the time before it started.\"\n\t\t*goto two\n\t\n\t#\"Maybe some other time.\"\n\t\t*gosub end_trial\n\t\t\"I understand,\" the priestess nods. \"Any time you need me to do that, or just to talk, I will be by your side.\"\n\t\tYou thank her and bid her farewell\n\t\t*goto mercyexit\n\n*label two\n\"${name}, come on, don't chicken out.\" \n\nYou turn to see your sister Amanda. She is just a couple of years older than you and just started first grade. Now knowing what would happen, the image\nof her makes you cry.\n\n\"Are you sure there are no spiders there?\" you ask as you cautiously follow her lead into a cave. \n\nAmanda laughs.\n\n\"Spiders should be the least of your concerns. We are after something much bigger.\"\n\n\"That doesn't sound very good, sister,\" you muttered under your nose but continued. You didn't want to be left behind. \"You know that daddy won't like\nus being here.\"\n\n\"This is why no one is going to tell him, right?\" The look that she gave you commanded compliance, so you just nod.\n\nYour sister took a torch out of her back and illuminated the way as your footsteps echo deeper into the cave. Something startles you and pulls a cry\nout of you. The walls repeat it and make it reach deep...\n\n\"Shht, it is just a bat, chicken heart.\" Amanda grasps your forearm.\n\nAfter a few minutes walk, your sister stops.\n\n\"I guess we are deep enough. Let's prepare.\" She leaves her sack on the ground and takes out a piece of chalk, a mirror and a scroll.\"\n\n\"I don't think we should do this,\" you whisper.\n\n\"Oh, we should!\" Her eyes glisten in the torchlight, showing a hint of madness.\"My girlfriend Caroline said she managed to summon the Queen of\nSpades but just caught a glimpse of her and ran away. If she can do it, so can I! I will have a trophy to show up!\"\n\nYou gulp. [i]It is just like in the cartoons[/i], you try to calm yourself.\n\n\"To show up to... whom?\" you ask with trembling lips.\n\n\"To her boyfriend, of course! I will prove that I am braver than her. Okay, let's get it over and away with. I will need your help.\"\nWhat would you do?\n*choice\n\t#Cross your heart\n\t\t*gosub end_trial\n\t\t*set light +3\n\t\t\n\t\t(Light increases)\n\t\t\n\t\tAmanda sees you and makes a funny noise.\n\t\t\n\t\t\"You really are a chicken, aren't you? Oh, I am sorry, I needn't be that rude to you dear but I am just getting nervous\"\n\t\t*goto 3x\n\t\n\t#Examine the scroll to make sure nothing bad will happen\n\t\t*gosub end_trial\n\t\t*set protection +3\n\t\t\n\t\t(Protection increases) \n\t\t\n\t\t\n\t\tYour knowledge of the dark stuff was limited to a few gamebooks. There was no way for you to know if anything was wrong with the writings on the scroll\n\t\tbut going through the text made you feel better.\n\t\t*goto 3x\n\t\t\n\t#Offer to read the scroll\n\t\t*gosub end_trial\n\t\t*set light -3\n\t\t*set summoning +1\n\t\t\n\t\t(Light and summoning increase)\n\t\t\n\t\t\"Now this is something I didn't expect to hear from you, little sister.\" She gives you the scroll. \"Let's see if you've got what it takes.\" \n\t\tYou take the parchment with trembling hands. Your mouth feels dry as you pronounce the words and you suddenly feel very hot.\n\t\t*goto 3x\n\t\t\n\t#Remark that Caroline will get what she asked for..\n\t\t*gosub end_trial\n\t\t*set protection -3\n\t\t\n\t\t(Retribution increases)\n\t\t\n\t\t\"You've got the main idea, ${name}.\"\n\t\tAmanda starts reading the scroll.\n\t\t*goto 3x\n\t\t\n*label 3x\nA burning shadow appears in the pentagram, a silhouette only barely resembling a human. As it twists and turns, it fails to provide you with an ample\nopportunity to see its face.\n\nAmanda seems unable to respond. She seemed so confident, so full of power. Now she looks as helpless as a puppy.\n\nThe demon blows towards the pentagram and deletes one of the corners. A sick laughter echoes in the cave as the creature leaves its prison. Its shady\neyes engulf you, then Amanda.\n\nWhat do you do?\n\n*choice\n\t#say a prayer\n\t\t*set light +3\n\t\t(Light increases)\n\t\t\n\t\tYou know that the most powerful weapon against demons is a prayer. You say one you learned during your Sunday school lessons at the church.\n\t\t\n\t\tIt seemed that you made the right decision as just before it reaches Amanda, the demon disappears.\n\t\t*goto 4x\n\n\t#take control of the demon\t\n\t\t*set light -3\n\t\t*set mind_control +1\n\t\t\n\t\t(Darkness and Mind Control increase)\n\n\t\tYour instincts take control of you, seeing an unleashed powerful demon. It is a terrifying sight, but a part of you feels that this iss the moment\n\t\tyou have been waiting for. You open your soul to it, luring it into a trap. It's touch is as cold as a gravestone but you devour it with the \n\t\treadiness of a desert refugee. The contact lasts only a few second that were more memorable than your first kiss. Then, the demon manages to \n\t\tbreak free. It runs towards Amanda, then vanishes.\n\t\t*goto 4x\n\t\t\n\t#shield her with your body\n\t\t*set protection +3\n\n\t\t(Protection increases) \n\t\t\n\t\tYou have only one thought at that moment and that is protecting your sister from the demon. As stupid as it may seem, you rush towards\n\t\tAmanda, putting your body between the demon and hers. You even close your eyes, waiting for the final blow. \n\t\t\n\t\t\"Run, sister!\" you whisper as tears fall down your cheeks.\n\t\t\n\t\tIt never comes. Overwhelmed with fear,\n\t\tyou open your eyes to see the demon just a meter away from Amanda. You let out a scream as you imagine what would come next (a bloody massacre) but \n\t\tnothing happens. The demon just disappears.\n\t\t*goto 4x\n\t\t\n\t#attack the demon\n\t\t*set protection -3\n\t\t\n\t\t(Retribution increases)\n\t\t\n\t\tIt is a moment in which your feeling of hatred towards the creature takes control of you, dominating over your common sense. Despite the lack \n\t\tof any chance of you defeating the demon with your bare hands, you rush towards it with raised fists.\n\t\t\n\t\tLucky for you, it ignores you and approached your sister. She screams and puts her hands over her face in an attempt to at least spare herself\n\t\ther final vision of horror. And then... the demon disappears.\n\t\t*goto 4x\n\t\t\n*label 4x\nThe dream is over, leaving you panting and sweating.\n\nHe may have concluded that your sister's resistance \nwould be easier to crush, so he disappeared in her. The poor girl lost her sanity.\n\nEvery time you went to see her at hospital, she spoke to you in a voice that did not belong to her. He, The Hoofed One, wanted your soul in exchange of hers. He promised you a lot. You didn't believe him. It is never a good \nidea to trust a demon, at least not a hoofed one. Of all the demons you came to know later on, they appear to be the most violent, manipulating and... outright cruel.\n\nSo, you started looking for a way to defeat the demon, your quest sending you further on the path of darkness, but you failed. Before you reached a solution, she disappeared from the hospital and was never found again.\nWhen you return to those events, you feel that...\n*choice\n\t#you shouldn't have played with fire.\n\t\t*set light +3\n\t\t(Light increases)\n\t\t\n\t\t*goto 5x\n\t\t\n\t#you should have managed to control the demon.\n\t\t*set light -3\n\t\t(Light increases)\n\t\t\n\t\t*goto 5x\n\t\t\n\t#you feel guilty for not stopping Amanda from summoning the demon.\n\t\t*set protection +3\n\t\t\n\t\t(Protection increases)\n\t\t*goto 5x\n\t\t\n\t#the demon should be punished for what it did.\n\t\t*set protection -3\n\t\t(Retribution increases)\n\t\t*goto 5x \n\t\t\n*label 5x\n*page_break\n*set know true\n\"Now, wake up!\" Sister Mercy's voice leads you out of the trance. It takes a few moments for its veil to vanish, and its leftovers leave you with a bit of a headache.\"\n\n\"Did you see my vision too?\" you ask the priestess.\n\nShe nods.\n\n\"I... I am amazed by what happened to you.\" She looks down, trying to hide her confusion. \"I think I should be able to help you further on your journey but I really need to \nthink what I saw over.\"\n\n\"Thank you for what you did, Sister Mercy.\"\n\n\"It is my duty. Any time you need me, I will be by your side.\"\n\nYou bid her farewell.\n*goto mercyexit\n\n*label mercyexit\n*if goat\n\t*goto 8\n\t\n*else\n\t*goto goat\n\t\n*label goat\n*set goat true \n\nThe orphanage campus is just a few minutes walk from the city centre. Now it is much bigger than the time when you joined. Two more compulsories were build after that and there is also a hospital, probably employing the \nbest paediatricians in town. The Goatfather was really good at managing the orphanage and government subsidies were piling year after year.\n\nAs you pass through the portal, the night shift guard greets you.\n\n\"I am looking for Nale Gates,\" you say the name of the Goatfather.\n\n\"I think he is in the board room.\"\n\nYou head for the administrations building. The bark of a large dog makes you smile. This must be one of the Hellweilers the Goatfather brought with him when he escaped hell.\nThey are really nice puppies.\n\nEntering the room, you find the ageless tall man facing the door, as if expecting you. He is tall, his athletic build partially hidden below a black mackintosh, its colour perfectly matching the one of his\nskin and well trimmed beard.\n\n\"Greetings, father! Were you expecting me?\"\n\n\"Blessings, ${name}. Yes, I knew you would come. It is one of those hellish feelings. I sensed you were in some kind of a danger, however, I don't know what. Can you tell me more?\"\n*if (hurt)\n\t*page_break\n\t\"A shadowy demon ambushed me in a dark alley. It stabbed me and said it was giving me a final warning but didn't bring any more meaning to the phrase.\"\n\t\n\t\"Can you show me the wound?\" he asks and draws closer to you.\n\t\n\tYou pull your shirt up.\n\t*if (healed)\n\t\t*page_break\n\t\t\"I see nothing, child.\"\n\t\t\"Oh, I went to Sister Mercy and she healed me. Damn it, I should have come here before that.\"\n\t\t*goto goat2\n\t\t\n\t*else\n\t\t*page_break\n\t\t\"These are the marks of a shadowy blade. Someone or something has summoned an infernal assassin. Don't forget to heal properly before you leave campus.\"\n\t\t*set cl +1\n\t\t\n\t\t(Clues increase)\n\t\t*goto goat2 \n\n\n*else\n\t*page_break\n\t\"I don't know, father. There was something waiting for me in a dark alley.\"\n\t*goto goat2\n\n\n\n*label goat2\n*page_break\n\"I would love to be able to tell you more, but my... vocation while I was in hell had nothing to do with what you experienced. I suggest speaking to Lauren.\" The Goatfather sighs. \n\"Actually, she disappeared three days ago and I am really worried. I was about to ask you too look for her.\"\n\nYour heart skips a bit. Lauren is a couple of years older than you and she was like your big sister during your childhood here. She is a talented dark ritualist and psychologist.\nIf there is someone who can help you control your inner demons, that is her.\n\nWhat would you tell the Goatfather?\n*choice\t\n\t#\"Of course I will do my best to protect her.\"\n\t\t*gosub end_trial\n\t\t*set protection +3\n\t\t(Protection increases by 3)\n\t\t\n\t\t\"I expected no less from you.\n\t\t*goto goat3\n\t\t\n\t#\"If anything happens to her, I am holding you personally responsible. Why didn't you tell me earlier?\"\n\t\t*gosub end_trial\n\t\t*set protection -3\n\t\t(Retribution increases by 3)\n\t\t\n\t\t\"I knew you were busy with that tournament of yours...\"\n\t\t\n\t\t\"That does not justify you, old man. You should have told me,\" you interrupt him.\n\t\t\n\t\t\"I understand your anger. Whatever I say now will have no meaning.\"\n\t\t*goto goat3\n\t\t\n*label goat3\nBefore she left, she told me she was going to investigate the graveyard, looking for some clues. She took a Hellweiler with her.\"\n\nThat is good news. These dogs serve as excellent bodyguard.\n\n\"I should be going, then,\" you say.\n\n\"No, don't do that yet. Take some rest, grab a cookie.\" He points at a plate on the table. \"You should also heal.\"\n\nYou sigh. The Goatfather is right, as usual.\n*goto goat4\n\n*label goat4\n*page_break\nWould you like to say something to the Goatfather?\n*choice\n\t*disable_reuse #Ask him about his life before he left hell\n\t\t\"I really don't want to talk about it because there is nothing I am proud of. But... I can hide the truth from you, but not from me. I used to kidnap \n\t\tchildren for experiments in hell. One day, I took a girl. She was so sweet, so serene. She held my hand tightly, asking me if I was a big teddy bear. I... couldn't take it any more\n\t\tI left hell and vowed to spend the rest of my days taking care of human children.\"\n\t\t\n\t\t\"You know me for a long time. Do you think my sins are repaid?\n\t\t*choice\n\t\t\t#\"I believe so. Many kids, including me, blossomed in an environment full of love.\"\n\t\t\t\t\"I hope you are right,\" says the Goatfather. \n\t\t\t\t*set protection +3\n\t\t\t\t\n\t\t\t\t(Protection increases by 3)\n\t\t\t\t*goto goat4\n\n\t\t\t#\"You can't repay your victims, right?\"\t\n\t\t\t\t\"Yeah, unfortunately I can't.\"\n\t\t\t\t*set protection -3\n\t\t\t\t\n\t\t\t\t(Retribution increases by 3)\n\t\t\t\t*goto goat4\n\n\t*selectable_if (mercy) #Tell him about visiting Sister Mercy\n\t\t\n\t\t\"I don't really like priests. Did she tell you anything about the thing in the dark alley?\" asks the Goatfather.\n\t\t\n\t\tYou shake your head.\n\t\t\n\t\t\"She calls herself an exorcists, but she probably knows two types of demons and is able to only chase them away. Both Lauren and I were in hell.\"\n\t\t\n\t\t\"I didn't know about Lauren.\"\n\t\t\n\t\t\"It is a long story. We don't have much time and besides, I'd really appreciate if she is the one telling you about it.\"\n\t\t*goto goat4\n\t\n\t*selectable_if (know) #Tell him about the vision Sister Mercy induced\n\t\t\"You are telling me something I always knew. I just didn't think it was the time to talk about it. Maybe when you return from your journey.\"\n\t\t*goto goat4\n\n\t*disable_reuse #Ask for healing\n\t\tThe Goatfather gives you a small sphere.\n\t\t\n\t\t\"These are a few children's nightmares. Just put them in the adaptor in the cupboard over there and you will get healing potions.\"\n\t\t\n\t\t\"Do you get a good harvest these days?\" you ask as you approach the cupboard.\n\t\t\n\t\t\"Not really, which makes me happy. The kids feel fine. We actually had to remove a couple of nightmare absorbers lest they die of hunger. We sent them to the prison.\"\n\t\t\n\t\tYou put the sphere in the cupboard without looking. Adaptors tend to be particularly ugly, so you are not keen on spotting one.\n\t\t\n\t\tAfter a few seconds of buzzing, you check the result. There are two crimson coloured potions.\n\t\t\n\t\t\"If you don't need both, you can leave one here. We have a child with a broken leg that would need a potion too. They have a very short shelf life, so you either drink now, or else the effect will be gone.\"\n\t\t*choice\n\t\t\t#Take both\n\t\t\t\t*set blood +2\n\t\t\t\t*set light -2\n\t\t\t\t(Health and darkness increase by 2.)\n\t\t\t\t*goto goat4\n\t\t\n\t\t\t#Take one\n\t\t\t\t*set blood +1\n\t\t\t\t*set light +2\n\t\t\t\t\n\t\t\t\t(Health increases by 1. Light increases by 2.)\t\n\t\t\t\t*goto goat4\n\t\t\t\t\t\n\t\t\t#Leave both \n\t\t\t\t*set light +6\n\t\t\t\t(Light increases by 6)\n\t\t\t\t*goto goat4\n\n\t\t\t#Set off for the graveyard\n\t\t\t\t\"I should be going,\" you say to the Goatfather.\n\t\t\t\t\n\t\t\t\tHe nods and take a gun out of his mackintosh . \"Take it. Using fire blast is not always the most convenient way to deal with enemies.\"\n\t\t\t\t\n\t\t\t\tYou take the cold iron and examine it, feeling nothing supernatural about it.\n\t\t\t\t\n\t\t\t\t\"Thanks. I hope I won't be using it.\"\n\t\t\t\t\n\t\t\t\tYou leave for the graveyard.\n\t\t\t\t*goto 8\n\t\n\t#Just leave\n\t\t*if mercy\n\t\t\t*goto 8\n\t\t*else\n\t\t\tYou want to go to the graveyard as soon as possible, but something inside you tells you that you should visit Sister Mercy before that.\n\t\t\t*goto mercy\n\t\t\t\n*label 8\n[i]Dear reader, now is the perfect time to choose two skill you specialize in. You may have already managed to improve a couple of them and will certainly have the chance to do so even more as the adventures goes on.[/i]\n\nLearn more about...\n*choice\n\t#Transformation\n\t\t*goto transformation\n\n\t#Mind control\n\t\t*goto mind\n\n\t#Intuition\n\t\t*goto intuition\n\n\t#Dark healing\n\t\t*goto darkhealing\n\n\t#Rune mastery\n\t\t*goto runemastery\n\t\n\t#Summoning\n\t\t*goto summoning\n\t\t\n\t#Marksmanship\n\t\t*goto marksmanship\n\n*label transformation\nThe first time you summoned a demon, things almost got out of control. It tried to escape into you, hoping to corrupt your soul. Little did it know that you were prepared. When it comes to demonology, it is not a question if \nthe demon you called uses a loophole to break free. The question is when. Luckily, your mentor trained you well. Up until this day. That demon lives within you, your mind and soul serving as a living prison (unlike the first demon, who blended with your soul and changed forever who you are). When you want, however, you can set it free,\nmaking use of its rage. When unleashed, you turn into a living tornado on fire. Controlling yourself... or rather your demon form is a challenge but it is very effective in battle.\nDo you want to take up transformations?\n*choice\n\t#Yes\n\t\t*set skill_one \"Transformation\"\n\t\t*set transformation +2\n\t\t*goto five\n\n\t#No\n\t\t*goto 8\n\n*label mind\nThe total enslavement of one's soul and mind is the ultimate triumph of a demon. You wish that you could do it as well, however, your skills in demonology are not that great. You can succeed with such a task, but for a limited amount of time. Despite it being \ntemporary, this is a skill that can be useful in a variety of situations when your unnatural charm is simply not enough.\nDo you want to take up mind control (enslavement)?\n*choice\n\t#Yes\n\t\t*set skill_one \"Enslavement\"\n\t\t*set mind_control +2\n\t\t*goto five\n\n\t#No\n\t\t*goto 8\n\n*label intuition\nBeing able to look into the twisted nether of the abyss, you are able to see much more with your mind's eye than a mere mortal. Your sixth sense is keen and sometimes you are able to obtain crucial knowledge just when you need it.\nDo you want to take up intuition?\n*choice\n\t#Yes\n\t\t*set skill_one \"Intuition\"\n\t\t*set intuition +2\n\t\t*goto five\n\n\t#No\n\t\t*goto 8\n\n*label darkhealing\nOnece, you and your mentor summoned an injured demon. You never found out what actually happened to the poor imp, maybe he had a fight with a predator, but the poor thing was basically dying inside the pentagram, one of its arms missing. You followed a voice inside of you, a gentle whisper who wanted you to swipe one of the corners of the \npentagram and take the wailing creature into your cradle. You put your arms on it and it started to heal. Even the thump on its torso became a beautiful... by impish standards arm. It was hard to tell who was happier with what happenened - your mentor or the imp. Or maybe you, because the joy of being able to make someone, or something feel better is amazing, even if that\nsomeone is among the ones humanity fears and hates - a demon.\nDo you want to take up dark healing?\n*choice\n\t#Yes\n\t\t*set skill_one \"Healing\"\n\t\t*set darkhealing +2\n\t\t*goto five\n\n\t#No\n\t\t*goto 8\n\n*label runemastery\nYour approach to demonology has always been a scholastic one. You spent countless nights, fighting the needs of your body, studying the ancient texts provided to you by your mentor. When your body went numb from sitting in one place, you would go in surch of \nother sources of knowledge about the abyss. You discovered that your photographic memory is very strong, allowing you to remember nearly all of what your eyes behold on the wrinkled pages. In a couple of years, you area able to surpass the knowledge of your mentor in particular areas of the craft, more specifically\nthe runes - the alphabet of demonic in which, to the untrained eye, no two symbols are the same.\nDo you want to take up rune mastery (runecraft)?\n*choice\n\t#Yes\n\t\t*set skill_one \"Runecraft\"\n\t\t*set runemastery +2\n\t\t\n\t\t*goto five\n\n\t#No\n\t\t*goto 8\n\n*label summoning\nSummoning has always been the pinnacle of demonology, the power to scream into the abyss and to make it answer, sending you the minion you called for. One of the reasons demonology can't be regarded as a science is the fact that two people may perform the \nsame set of actions, possess the same equipment and achieve fundamentally different results. The variable that makes the difference is said to be something congenital, something you either carry inside... or not.\nDo you?\n*choice\n\t#Yes\n\t\t*set skill_one \"Summoning\"\n\t\t*set summoning +2\n\t\t*goto five\n\n\t#No\n\t\t*goto 8\n\t\t\n*label marksmanship\nAt first glance, there seems to be nothing supernatural about the sharpshooting. However, being able to do that without preparation (or without even clear visibility) is something only a few demons\ncan achieve.\t\t\n\nIs that your choice?\n*choice\n\t#Yes\n\t\t*set skill_one \"Marksmanship\"\n\t\t*set marksmanship +2\n\t\t*goto five\n\n\t#No\n\t\t*goto 8\n\n*label five\nWhat is the second skill you want to specialize?\n*choice\n\t*selectable_if (skill_one !=\"Transformation\") #Transformation\n\t\t*goto transformation2\n\n\t*selectable_if (skill_one !=\"Enslavement\") #Mind control\n\t\t*goto mind2\n\n\t*selectable_if (skill_one !=\"Intuition\") #Intuition\n\t\t*goto intuition2\n\n\t*selectable_if (skill_one !=\"Healing\") #Dark healing\n\t\t*goto darkhealing2\n\n\t*selectable_if (skill_one !=\"Runecraft\") #Rune mastery\n\t\t*goto runemastery2\n\t\n\t*selectable_if (skill_one !=\"Summoning\") #Summoning\n\t\t*goto summoning2\n\t\t\n\t*selectable_if (skill_one !=\"Marksmanship\") #Marksmanship\n\t\t*goto marksmanship2\n\n*label transformation2\nThe first time you summoned a demon, things almost got out of control. It tried to escape into you, hoping to corrupt your soul. Little did it know that you were prepared. When it comes to demonology, it is not a question if \nthe demon you called uses a loophole to break free. The question is when. Luckily, your mentor trained you well. Up until this day. That demon lives within you, your mind and soul serving as a living prison (unlike the first demon, who blended with your soul and changed forever who you are). When you want, however, you can set it free,\nmaking use of its rage. When unleashed, you turn into a living tornado on fire. Controlling yourself... or rather your demon form is a challenge but it is very effective in battle.\nDo you want to take up transformations?\n*choice\n\t#Yes\n\t\t*set skill_two \"Transformation\"\n\t\t*set transformation +2\n\t\t*goto 9\n\n\t#No\n\t\t*goto five\n\n*label mind2\nThe total enslavement of one's soul and mind is the ultimate triumph of a demon. You wish that you could do it as well, however, your skills in demonology are not that great. You can succeed with such a task, but for a limited amount of time. Despite it being \ntemporary, this is a skill that can be useful in a variety of situations when your unnatural charm is simply not enough.\nDo you want to take up mind control (enslavement)?\n*choice\n\t#Yes\n\t\t*set skill_two \"Enslavement\"\n\t\t*set mind_control +2\n\t\t*goto 9\n\n\t#No\n\t\t*goto five\n\n*label intuition2\nBeing able to look into the twisted nether of the abyss, you are able to see much more with your mind's eye than a mere mortal. Your sixth sense is keen and sometimes you are able to obtain crucial knowledge just when you need it.\nDo you want to take up intuition?\n*choice\n\t#Yes\n\t\t*set skill_two \"Intuition\"\n\t\t*set intuition +2\n\t\t*goto 9\n\n\t#No\n\t\t*goto five\n\n*label darkhealing2\nOnece, you and your mentor summoned an injured demon. You never found out what actually happened to the poor imp, maybe he had a fight with a predator, but the poor thing was basically dying inside the pentagram, one of its arms missing. You followed a voice inside of you, a gentle whisper who wanted you to swipe one of the corners of the \npentagram and take the wailing creature into your cradle. You put your arms on it and it started to heal. Even the thump on its torso became a beautiful... by impish standards arm. It was hard to tell who was happier with what happenened - your mentor or the imp. Or maybe you, because the joy of being able to make someone, or something feel better is amazing, even if that\nsomeone is among the ones humanity fears and hates - a demon.\nDo you want to take up dark healing?\n*choice\n\t#Yes\n\t\t*set skill_two \"Healing\"\n\t\t*set darkhealing +2\n\t\t*goto 9\n\n\t#No\n\t\t*goto five\n\n*label runemastery2\nYour approach to demonology has always been a scholastic one. You spent countless nights, fighting the needs of your body, studying the ancient texts provided to you by your mentor. When your body went numb from sitting in one place, you would go in surch of \nother sources of knowledge about the abyss. You discovered that your photographic memory is very strong, allowing you to remember nearly all of what your eyes behold on the wrinkled pages. In a couple of years, you area able to surpass the knowledge of your mentor in particular areas of the craft, more specifically\nthe runes - the alphabet of demonic in which, to the untrained eye, no two symbols are the same.\nDo you want to take up rune mastery (runecraft)?\n*choice\n\t#Yes\n\t\t*set skill_two \"Runecraft\"\n\t\t*set runemastery +2\n\t\t*goto 9\n\n\t#No\n\t\t*goto five\n\n*label summoning2\nSummoning has always been the pinnacle of demonology, the power to scream into the abyss and to make it answer, sending you the minion you called for. One of the reasons demonology can't be regarded as a science is the fact that two people may perform the \nsame set of actions, possess the same equipment and achieve fundamentally different results. The variable that makes the difference is said to be something congenital, something you either carry inside... or not.\nDo you?\n*choice\n\t#Yes\n\t\t*set skill_two \"Summoning\"\n\t\t*set summoning +2\n\t\t*goto 9\n\n\t#No\n\t\t*goto five\n\t\t\n*label marksmanship2\nAt first glance, there seems to be nothing supernatural about the sharpshooting. However, being able to do that without preparation (or without even clear visibility) is something only a few demons\ncan achieve.\t\t\n\nIs that your choice?\n*choice\n\t#Yes\n\t\t*set skill_two \"Marksmanship\"\n\t\t*set marksmanship +2\n\t\t*goto 9\n\n\t#No\n\t\t*goto five\n\t\t\n*label 9\nYou tremble as you enter the old cemetery, but the cold air is not the reason. In fact, you are sweating under your black trench coat. It is already dark, but what really handicaps your vision is the mist.\nYou are also afraid that if a human sees you, the glowing eyes of yours may let out your supernatural origin.\nThe gun feels cold and heavy to the touch and you can't tell whether it makes you more or less comfortable.\n\nYou don't sense Lauren nor the Hellweiler, which is understandable. If the Goatfather was right and they headed for the crypt, there would be no way for you to feel \ntheir presence from here.\n\nWhat do you do now?\n*choice\n\t#Head for the crypt \n\t\t*goto crypt\n\t\t\n\t#Look around the tombstones\n\t\t*goto tombstones\n\t\t\n\t#Check the undertaker's cabin.\n\t\t*goto undertaker\n\t\t\n*label tombstones\nYou are not sure what you are looking for, but decide to spend some time among the graves. The names say nothing to you, they are just nonsense letters\ncarved in the stone. But on one of them, you find a red mark. Putting your hand next to it, you realize it is nail polisher and it seems it is the same \ncolour as yours! You examine the mark more closely. It looks as it made with a nail and if the tombstone was maid of soap, it could very well have been\ndone this way.\n*set cl +1\n\n(Clues increase by 1)\n\nWhere do you go now?\n*choice\n\t#To the crypt\t\n\t\t*goto crypt\n\t\n\t*disable_reuse #To the undertaker's cabin\n\t\t*goto undertaker\n\t\t\n*label undertaker\nYou approach the cabin with extreme caution. If the undertaker sees you, you will have to prepare a decent explanation. Maybe your charm wouldn't be enough,\nespecially if he shoots you before engaging in a conversation.\n\nThe lights are out and you hear a strange noise from inside. At first, you take it for snoring, then you cast away the option. It is much too squeaky.\nWould you like to take a peek?\n*choice\n\t#Yes\n\t\t*goto undertaker2\n\t\t\n\t*disable_reuse #No, examine the tombstones\n\t\t*goto tombstones\n\t\n\t#No, approach the crypt\n\t\t*goto crypt\n\t\t\n*label undertaker2\nThe closer you get, the more the sound resembles grunting and munching. You look through the window and freeze. The undertaker is a man with unnaturally long arms and feet...\nand is currently hunched over a corpse, nibbling a rib.\n\nThe undertaker turns around and engulfs you with his dark red eyes, his teeth looking razor sharp and covered with coagulating blood.\nWhat do you do?\n*choice\n\t#Run\n\t\tFear is a bad advisor. You hardly stand a chance to run away from this long-legged horror, especially when he knows the terrain far better\n\t\tthan you. You've run only a couple of meters when something hits the back of your head and knocks you down. You put your hand at the throbbing place of impact.\n\t\timpact. There is blood on it, but thankfully (or not) it is not yours. The weapon lies next to you - a bloody stinky thigh bone covered with \n\t\trotting remains of human flesh with a few non-human teeth marks.\n\n\t\t*set blood -1\n\t\t*set pistol_available false\n\t\t(Health decreases by 1)\n\t\tWhat could be even worse is that you dropped your weapon and can't use it in the battle with the incoming undertaker.\n\t\t*goto undertakerfight\n\t#Fight\n\t\t*goto undertakerfight\n\t\t\n*label undertakerfight\nHow would you attack the undertaker?\n*choice\n\t*selectable_if (pistol_available) #Shoot him \n\t\t*if (marksmanship>0)\n\t\t\t*set marksmanship +1\n\t\t\t\n\t\t\t(Marksmanship increases)\n\t\t\t\n\t\t\tThe bullet lands in his forehead! The monster falls to the ground and a pool of green blood forms around his hideous body.\n\t\t\t*goto undertaker3\n\t\t\t\n\t\t*else\n\t\t\t*set marksmanship +1\n\t\t\t\n\t\t\t(Marksmanship increases)\n\t\t\t\n\t\t\tEven though the distance is small, you miss. Before you can fire again, the undertaker jumps at you and with a lighting quick swipe claws\n\t\t\tthe weapon away from you, sending burning pain to your arms.\n\t\t\t*set blood -1\n\t\t\t\n\t\t\t(Health decreases by 1)\n\t\t\t*set pistol_available false\n\t\t\t*goto undertakerfight\n\t\t\t\n\t*selectable_if (transformation>0) #Use transformation\n\t\t(Transformation increases)\n\t\t*set transformation +1\n\t\t\n\t\t\"You are toast!\" The voice coming from your mouth is no longer yours. The demon of fire has been unleashed and now it is hungry for suffering.\n\t\t\"A ghoul? I expected something fresh, not some trash bin!\" It shows its disapproval.\n\t\tThe fire demon grabs the undertaker by the arm and starts to slowly bake him, relentless to the howls of the cannibal. When it is finished and thr demon retreats inside you, you give your best\n\t\tnot to vomit as the smell is awful.\n\t\t\n\t\tOf course, the one trapped inside you took a piece of you as it always does.\n\t\t\n\t\t*set mind -1\n\t\t*goto undertaker3 \n\t\t\n\t*disable_reuse #Attempt to charm him\n\t\t*set mind_control +1\n\t\t\n\t\t(Mind Control increases by 1)\n\t\tDespite being as nervous as hell, you put on your best disarming smile. If there is anything human in that monsters, he should respond. However, this does not\n\t\tseem to be the case. He just swipes at you with his long arms, slapping your face.\n\t\t\n\t\t(Health decreases by 1.)\n\t\t*set blood -1\n\t\t*if pistol_available\n\t\t\tYou also drop your pistol and won't be able to use it by the end of the battle.\n\t\t\t*set pistol_available false\n\t\t\t*goto undertakerfight\n\t\t\n\t\t*else\n\t\t\t*goto undertakerfight\n\t#Fight him\n\t\t*if pistol_available\n\t\t\tThe brutish strength of the monster is not enough to stop you from teaching him a lesson. A couple of times, you manage to throw him, then, your\n\t\t\tfoot literary caves his skull in.\n\t\t\t\n\t\t\tIt is only when he stops moving that you realize you are wounded too - there are teeth marks on your left hand.\n\t\t\t(Health decreases by 1)\n\t\t\t*set blood -1\n\t\t\t*goto undertaker3\n\t\t\t\n\t\t*else \n\t\t\tYou are usually very fast and agile, however, the blow you received earlier has its toll on you. The attacks of yours are pathetically slow. Fighting the pain \n\t\t\tinside and the monster outside simultaneously proves to be a horrendous task.\n\t\t\t\n\t\t\tA blow knocks you down semi-conscious, and a second later your neck is broken.\n\t\t\tIt is a sad end to the story.\n\t\t\t*goto_scene death\n\t\t\t\n*label undertaker3\nThe undertaker is dead.\n*if not (pistol_available) \n\tYou take back your pistol, relieved to have it again.\n\t*set pistol_available true\n\t*goto undertaker4 \n\t\n*else\n\t*goto undertaker4 \n\t\n*label undertaker4 \nYou are still trying to catch your breath after the battle with the unexpected adversary. Maybe it is worth checking the \ngore stained cabin for information, even though you don't really want to get in there.\nWhat do you do?\n*choice\t\n\t#Search the cabin\n\t\tYou win the internal struggle and manage to convince yourself to get inside. Ignoring the corpse uses most of your will. Your search seems to be in vain\n\t\tbut just as you leave, you step on something that sticks to your boots.\n\t\tYou pick it up. It is bloodstained and part of the text is not readable, but the writing is very beautiful and you can smell traces of a perfume.\n\t\t\n\t\t[i]Bonegnawer, how many times have I told you not to devour my minions. Firewhisper reported seeing you hunt imps again. If I hear about any other\n\t\ttransgression, I will have you skinned alive! [/i]\n\t\t\n\t\tYou tremble at the thought of the evilness and strength that woman must possess.\n\t\tThe other part of the letter is unreadable due to the blood on the writing but you can see some runes in the end.\n\t\t*set cl +3\n\t\t*if (skill_one=\"Runecraft\") or (skill_two=\"Runecraft\")\n\t\t\tEven with your knowledge of runes, you can't make out anything sensible out of them. It seems that they are more ancient than the ones you\n\t\t\thave had the chance to work with. Could the writer be that ancient?\n\t\t\t*set cl +1\n\t\t\t(Clues increase by 1)\n\t\t\t\n\t\t\tYou throw the note away and leave the cabin.\n\t\t\tWhat do you do now?\n\t\t\t*choice\n\t\t\t\t*disable_reuse # Examine the tombstones\n\t\t\t\t\t*goto tombstones\n\t\t\n\t\t\t\t#Enter the crypt\n\t\t\t\t\t*goto crypt\n\t\t\t\n\t\t*else\n\t\t\tYour knowledge of runes is limited and you are not surprised when you fail to make out anything sensible out of them.\n\t\t\tYou throw the note away and leave the cabin.\n\t\t\tWhat do you do now?\n\t\t\t*choice\n\t\t\t\t*disable_reuse # Examine the tombstones\n\t\t\t\t\t*goto tombstones\n\t\t\n\t\t\t\t#Enter the crypt\n\t\t\t\t\t*goto crypt\n\t\n\t*disable_reuse # Examine the tombstones\n\t\t*goto tombstones\n\t\t\n\t#Enter the crypt\n\t\t*goto crypt\n\t\t\n*label crypt\nYou feel strange when approaching the crypt. It is too quiet, the only sound that reaches your ears being that of your footsteps.\n*if (skill_one=\"Intuition\") or (skill_two=\"Intuition\")\n\t*if (light\u003c50) and (protection>50)\n\t\tYour intuition tells you that something unpleasant may happen if you use the main entrance. Looking around, you see a vent that appears to be\n\t\tbig enough for you to enter. \n\t\tWould you like to use it?\n\t\t*choice\n\t\t\t#Yes\n\t\t\t\tYou ruin your trench coat but manage to get underground safe and sound.\n\t\t\t\t*goto cryptinside\n\t\t\t\n\t\t\t#No - continue towards the entrance\n\t\t\t\t*goto cryptentrance\n\t\t\n\t*else\n\t\tYour intuition tells you to be calm. Knowing that nothing bad will happen to you (at least at the entrance), you walk on with an air of confidence.\n\t\t*goto cryptentrance\n\t\t\n*else\n\t*goto cryptentrance\n\t\n*label cryptentrance\nYou are just in front of the entrance when you realize there is a ghost just in front of you - a bearded man in plate armour wearing a crusader's tabard.\nYou freeze, waiting to see what the apparition wants.\n\n\"Your presence here is not acceptable. Nobody will desecrate this tomb again as long I as I stand,\" he whispers. \"What is your business here?\"\n\"I am just looking for a couple of friends. Have you seen a beautiful blonde and a dog?\" You try to hide your nervousness but so far fail.\n\n\"Yes, they rushed downstairs before I could stop them.\" The paladin makes a pause, realizing he just said something he shouldn't have.\n\n[i] Yeah, you could do that too if necessary. [/i] You are much slower that Roam but definitely faster than Lauren.\n\n\"I need to get in and let them out. As simple as that,\" you state and point towards the entrance.\n\nThe ghost looks at you tentatively.\n\n\"I need to know what kind of a person you are. Let me touch your soul!\" He raises his armoured gauntlet.\n\nIf a demon made that proposal, you would certainly turn it down. This guy, however, seems dedicated to the Light. Maybe you shouldn't worry if you \nare pure enough.\n*choice\n\t#Allow him\n\t\tThe spectre approaches you. He hesitates for a second.\n\t\t*if (light>50) or (protection\u003c50) \n\t\t\t\"I like you. You remind me of myself when I was young. There is the seed of justice in you. You can pass.\"\n\t\t\t\n\t\t\tYou nod and enter the crypt.\n\t\t\t*goto cryptinside\n\t\t\t\n\t\t*else\n\t\t\t\"Your soul is corrupt!\" He cries and hits you hard. The pain makes you shriek in agony as you fly away from him.\n\t\t\t\n\t\t\t(Health decreases by 1)\n\t\t\t*set blood -1\n\t\t\t*if blood >0\n\t\t\t\tLuckily, the hit actually sends you towards the entrance. You waste no time and get in.\n\t\t\t\t*goto cryptinside\n\t\t\t\n\t\t\t*else\n\t\t\t\tYou faint and never open your eyes again.\n\t\t\t\t*goto_scene death\n\t\t\n\t#Rush past him\n\t\tJust before you reach the entrance, you feel sharp pain in your back.\n\t\t\n\t\t(Health decreases by 1)\n\t\t*set blood -1\n\t\t*if blood >0\n\t\t\t*goto cryptinside\n\t\t\t\n\t\t*else\n\t\t\tYou faint and never open your eyes again.\n\t\t\t*goto_scene death\n\n*label cryptinside\n*page_break\nYour footsteps echo in the stone building, breaking the silence and making you feel uncomfortable. You imagine how awful it would have been for a human to be here, practically\nblind in the dark surrounding. Your eyes, however, are able to spot all the details of the inside of the corridor - starting from the carvings and finishing with the rat dropplings. \n\nThe corridor comes to a small vestibule. There are four rooms there.\n\nA blood trace leads to the first one. The door is slightly ajar.\n\nA strange glow comes from the second one a whiff of sulphur compliment the notion that there is something hellish there.\n\nThe third room doesn't give out any clues regarding what awaits you there.\n\nYou believe you could hear some movement coming from the fourth. It is slow and almost rhythmical. \n*goto cryptinside2\n\n*label cryptinside2\nWhich room will you investigate?\n*choice\n\t*disable_reuse #The first door\n\t\t*goto first\n\t\t\n\t*disable_reuse #The second door\n\t\t*goto second\n\t\t\n\t*disable_reuse #The third door\n\t\t*goto third\n\n\t#The fourth one\n\t\t*goto fourth\n\t\t\n*label first\nAs you step towards it, the blood trail becomes thicker. You find it less and less likely for it to belong to a human as it looks much darker. The door opens with a \nscreech and you see the hellweiler lying motionlessly on the floor in a pool of his own blood.\n*set rottie 1\n\n\"Roam, can you hear me?\" You rush towards him and put your arms around his neck. It takes supernatural senses to realize his heart is still beating, but\nhardly.\n\nWhat would you do?\n*choice\n\t*selectable_if (darkhealing>0) #Heal him\n\t\tYou close your eyes and allow the healing energy to focus on your palms and then you gently push it towards the injured dog.\n\t\t*set light +3\n\n\t\t(Light increases by 3)\n\t\t*goto heal\n\t\t\n\t#Give him some of your health\n\t\tYou close your eyes and take control of your chi. Tears run down your cheeks as you sever some of it and push it towards the injured dog.\n\t\t*set light +4\n\t\t*set blood -1\n\t\t\n\t\t(Health decreases)\n\t\t*goto heal\n\t\t\n\t#Leave him to his fate\n\t\t*set light -3\n\t\t(Light decreases by 3)\n\t\t\n\t\tYou believe there is little you could do for the beast, so you decide to concentrate on finding Lauren.\n\t\t*goto cryptinside2\n\t\t\n\t#Show mercy\n\t\t*set light +2\n\t\t(Light increases by 2)\n\t\t\n\t\tYou say a little prayer in demonic as you put the muzzle of the pistol near his eyeball. You guess that it is not the best idea to shoots\n\t\tbut you can't think of an easy way to kill the hellweiler. Looking away, you pull the trigger. An explosion of blood and brain stains your clothes\n\t\tbut you don't bother to wipe it away.\n\t\t*goto cryptinside2\n\t\n\t#Feed on him\n\t\t*set light -5\n\t\t(Darkness increases by 5)\n\n\t\tYou don't know what dangers may lurk in the crypt. Obviously, Roam is not going to make it anyway, so why not increase your chances of\n\t\tsurviving?\n\t\t\n\t\tYou close the distance and your chi grasp to mingle with his so that you could easily devour him.\n\n\t\tSadly, there is too little to suck and by the time his life is over, your appetite is not sated. On the contrary, you feel your hunger building up.\n\t\tCursing, you return to the vestibule\n\t\t*goto cryptinside2\n\t\t\n*label heal\n*page_break\n*set rottie_alive 1\n*set rottie 2\n\nThe hellweiler jumps on his feet and bobs his tail.\n\n\"${name}, what are you doing here,\" Roam says with a coarse voice. You bend down and pet his head.\n\n\"Who did it to you?\"\n\n\"I couldn't see...\"\n\n\"Hellweilers are the worst liars of all the creatures of the Darkness,\" you recall.\n\n\"All right, it was Lauren. I don't know what happened to her, she stabbed me and drank my blood until I passed out. Be careful, she is dangerous.\"\n\nYou can't believe it. There has to be some explanation. Sweet Lauren, how could she do it? Then again, hellweilers never lie.\n\n\"I need to find her,\" you say.\n\nHe nods.\n\n\"Do you want me to come with you?\" Roam asks.\n*choice\n\t#\"No, I want you to return to the orphanage as soon as possible.\"\n\t\t\n\t\t\"Will you be able to make it back without help?\n\t\t\n\t\t\n\t\t\"Sure, don't worry about me. But... I can't leave you here,\" the dog looks at you with his hazel eyes.\n\t\t\n\t\t\"That is an order. I am not coming out without you and Lauren and I want to be sure I have fulfilled at least half of the mission.\"\n\t\t\n\t\tRoam gives out a whine and leaves the room. You do that too.\n\t\t*goto cryptinside2\n\t\t\n*label second\nThere is a big summoning circle in the room. It sparkles, as if reflecting the flames of hell. It seems that whoever drew the circle was very close to summoning a \nparticular entity.\n*if summoning>1\n\tYou can almost smell a rasmoth. They are sepia like demons quite unlike the ones you are used to. Being intuitive, they don't speak a language. The dark books\n\tdescribe them as powerful but very jealous.\n\t\n\tWould you like to summon the rasmoth?\n\t*choice\t\n\t\t#Yes\n\t\t\t*goto rasmoth\n\n\t\t#No - return to the vestibule\n\t\t\t*goto cryptinside2\n\t\t\t\n*else\n\tYour knowledge of summoning, however, is not enough to allow you to comprehend more, so you return to the vestibule.\n\t*goto cryptinside2\n\t\n*label rasmoth\n*set rasmoth 1\nYou say the spell and the rasmoth appear in the circle in all of its glory. Even the mere sight of the amphibian-looking monster should be enough\nto strike fear into the hearts of most enemies.\n\n\t \nAs the rasmoth approaches you, you wonder why it is necessary for some demons to be that ugly. Just to be on the safe side, you raise the gun towards it. His eight\neyes, however, show no menace, only loyalty. Ans yet, the binding with such an alien mind leaves you confused... You feel exhausted, almost desperate to lie on the floor and take some rest.\n\t\n*set blood -1\n\t\n(Health decreases by 1)\n\t\n*if blood\u003c1\n\tThe fatigue overcomes you. As soon as you hit the floor, you fall into a deep trance and never open your eyes again.\n\t*goto_scene death\n\t\n*else\n\tYou remind yourself that you have to find Lauren, so you head back to the vestibule, peeking over your shoulder to see what the rasmoth is doing. It is just sliding its tentacles, following you.\n\t*goto cryptinside2\n\t\n*label third\nYou push the door open. Silence greets you from inside. The room is as empty as it can possibly be and you wonder when it was the last time someone stepped in. You are about\nto go back when you see the runes on the walls. A  closer examination reveals that they are in ancient demonic.\n*if runemastery>1\n\tYour heart starts beating faster as you realize you've found a treasure! Your fingers slide over the carved runes, allowing you to better feel it. You know that one and the same\n\trune can have different meanings depending on the writers feeling at the moment of inscription.\n\t\n\t*set cl +2\n\t(Clues increase by 2)\n\n\tThe writing tells you about a powerful mistress, probably as old as humanity whose powers are maintained by the belief of the chosen people. She is supposed\n\tto be the arch succubus, the mother of all of your kind. She is supposed to rise from her prison and to look for someone to take her place.\n\t\n\tYou can't quite figure out what 'her place' should mean, though.\n\t\n\tYou go over the text a few more times, then, you go back to the vestibule.\n\t*goto cryptinside2\n\t\n*else\n\tAs much as you want to find out what is written on the wall, your knowledge of runes turns out to be inadequate. You sigh and go back to the vestibule.\n\t*goto cryptinside2\n\t\n*label fourth\nYou open the door and sigh with relief.\n\n\"Wow, Lauren, I am glad I found you!\"\n\nHer perfect straight hair spills on the floor as she is bent over something. She lays her eyes on you. You don't quite remember them being that colour. She smiles, blood\nstaining her teeth. A crimson streak makes its way down her chin.\n\n\"You are bleeding!\"\n\nYour concern makes her chuckle. It is only then that you realize what she was bent over. A young man in a bloody tuxedo.\n\n\"Have you seen Roam?\" She gets up.\n\nYou murmur something under your nose and change the subject.\"Can you explain what you are doing to that man?\" you inquire. \n\n\"You know me, ${name}, I like playing with fire. I've burned myself a few times but not as badly. I wanted power, I wanted eternity, immortality.\" She runs her painted nails through her beautiful mane.\n\n\"You have become a vampire, Lauren? Look at me.\"\n\nHer eyes feel as hypnotic as ever, however, they are violet as bloody hue taints the navy blue you are used to. You wipe the blood off her face and gently push her lower lip down so you can see her teeth. Her canines don't appear longer.\n\n\"Forget about the fiction crap. The full transformation takes years but the uncontrollable bloodlust is burning me from within. ${name}, maybe you understand, being ${a} ${succubus}.\n\nYou shake your head.\n\n\"I can feed on others if I want, but I don't have the urge to do so.\"\n\n\"I know, I expected it to be the same way with me. But I can't reverse it.\" She weeps.\n\nWhat do you tell her?\n*choice\n\t#\"You just need to learn to accept who you are now. I will be next to you if you need me.\"\n\t\t*set rel_lauren +1\n\t\tLauren looks at you in awe.\n\t\t\n\t\t\"Hey what, remember what you've been telling me these years? You helped me become who I am. If there is way to pay you back, I will be more than happy to do so.\"\n\t\t\n\t\tShe opens her arms and you accept her invitation for a quick embrace.\n\t\t\n\t\t\"Would you like to share the pie with me?\" She makes a foxy grimace as she pulls back.\n\t\t*choice\n\t\t\t#\"Gladly\"\n\t\t\t\t*goto share\n\t\t\t\t\n\t\t\t#\"Do what you need, but I am not participating.\"\n\t\t\t\tShe nods.\n\t\t\t\t\n\t\t\t\t\"I will be waiting for you outside.\"\n\t\t\t\t\n\t\t\t\tWhile you do so, you battle the storm inside your soul, trying to sort out what you saw in the crypt. And then she comes out, looking as delicate as a porcelain \n\t\t\t\tstatuette... so deceivingly innocent. You take her hand and you start your way back to th
