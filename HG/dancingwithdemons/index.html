e orphanage campus.\n\t\t\t\t*goto campus\n\t\t\t\t\n\t\t\t#\"I can't do that. Enjoy yourself but make sure he survives.\"\n\t\t\t\t*set protection +3\n\t\t\t\t(Protection increases)\n\t\t\t\t\n\t\t\t\tShe nods.\n\t\t\t\t\n\t\t\t\t\"I will be waiting for you outside.\"\n\t\t\t\t\n\t\t\t\tWhile you do so, you battle the storm inside your soul, trying to sort out what you saw in the crypt. And then she comes out, looking as delicate as a porcelain \n\t\t\t\tstatuette... so deceivingly innocent, carrying the body of the young man.\n\n\t\t\t\t\"He will survive. Just call the ambulance, please,\" she whispers.\n\t\t\t\t\n\t\t\t\tYou fulfil her request. She gently puts the man next to the entrance of the graveyard. Then you take her hand and you start your way back to the orphanage campus.\n\t\t\t\t*goto campus\n\t\t\t\t\n\t#\"I will help you change back. There's got to be a way!\"\n\t\t*set rel_lauren +1\n\t\t\n\t\t\"There is no way,\" she says coldly.\n\t\t\n\t\t\"I will find it. I promise.\"\n\t\t\n\t\t\"Is that what I've been telling you these years?\"\n\t\t\n\t\tYour jaw drops and you can't meet her gaze this time.\n\t\t\n\t\t\"No, Lauren, you kept saying that I should accept who I am. But... this is different. I can see you suffering.\"\n\t\t\n\t\tShe just nods.\n\t\t\n\t\t\"Come on, we should get back to the orphanage. He is not dead, is he?\" you ask.\n\t\t\n\t\t\"No. I never wanted to kill him.\" She puts her hand on her mouth.\n\t\t\n\t\t\"I know it. I will call the ambulance.\"\n\t\t\n\t\tYou take her hand and you start your way back to the orphanage campus.\n\t\t*goto campus\n\t\t\n\t#\"You are a monster, Lauren, you need to be ashamed of yourself.\"\n\t\t*set protection -3\n\t\t\n\t\t(Retribution increases)\n\t\t\n\t\t\"Is that what I've been telling you these years?\"\n\t\t\n\t\tYour jaw drops and you can't meet her gaze this time.\n\t\t\n\t\t\"It is different. I've never killed anyone.\"\n\t\t\n\t\t\"Neither did I,\" she says coldly. \"He is still alive. You can call the ambulance. Let's go back to the orphanage campus. I don't like this place.\"\n\t\t\n\t\tYou search for your phone as she leaves the chamber.\n\t\t*goto campus\n\t\t\n*label campus\n*page_break\nYou arrive on campus after an uneventful half-an-hour walk. As soon as the porter sees you, he calls the Goatfather and he is quick to come to see you. He hugs Lauren and\ngives her a fatherly kiss. She says she is not feeling well and retreats to her room. \n*if (rottie_alive=1)\n\tRoam is exhilarated and starts running around like mad.\n\t*goto campus2\n\t\n*elseif (rasmoth=1)\n\tThe Goatfather asks a demon keeper to take care of the rasmoth.\n\t*goto campus2\n\n*else\n\t*goto campus2\n\n*label campus2\n\"I think we need to talk,\" you say to the Goatfather.\n\n\"Sure.Let's go to the board room.\"\n*page_break\n*if (rottie_alive=1)  \n\t*set rel_goat +2\n\t\"I am very happy that you returned not only with Lauren, but with Roam as well. I had a bad feeling about him. I couldn't believe my eyes when I say him \n\twobbling his tail again.\" The Goatfather gives you a warm smile.\n\t\n\t\"I am glad you appreciate it.\" You smile back. Then, you think of what he told you about Lauren trying to kill him. \n\n\tWould you tell him about it?\n\t*choice\n\t\t#No \n\t\t\t*goto campus3\n\t\t\t\n\t\t#Yes\n\t\t\t*set honesty 1\n\t\t\t\"I am sorry, father but I think you should know it. Roam said Lauren tried to injure him.\"\n\t\t\t\n\t\t\tHe sighs.\n\t\t\t\n\t\t\t\"I can see what she is going through. Thank you for letting me know.\"\n\t\t\t*set protection +3\n\t\t\t\n\t\t\t(Protection increases)\n\n\t\t\t*set rel_goat +1\n\t\t\t*goto campus3\n\n*else\n\t\"I am afraid to ask you, but what is Roam's fate?\n\t*if (rottie=0)\n\t\tYou shrug.\n\t\t\n\t\t\"I am sorry, father, we couldn't find him.\"\n\t\t\n\t\tThe Goatfather sighs. \"I had a bad feeling. Anyway, maybe I should ask Lauren later.\"\n\t\t*goto campus3\n\t\t\n\t*elseif (rottie=1)\n\t\t\"I am sorry, father, I found him in the crypt but it was too late to help him.\n\t\t\n\t\tThe Goatfather sighs. \"I had a bad feeling. Anyway, maybe I should ask Lauren later.\"\n\t\t*goto campus3\n\t\t\n\t*else \n\t\tYou pause, contemplating whether to tell him that you managed to bring him back to life only to have him devoured by the rasmoth.\n\t\t*choice\n\t\t\t#Tell him \n\t\t\t\t*set rel_goat +1\n\t\t\t\t\"I am saddened by the loss but I have to accept it. It is the way demons sometimes act. The rasmoth is not to be blamed, it is just that jealousy is in their nature.\n\t\t\t\t\n\t\t\t\tYou also remember what Roam told you about Lauren almost killing him. Would you tell him?\n\t\t\t\t*choice\n\t\t\t\t\t#Yes \n\t\t\t\t\t\t*set honesty 1\n\t\t\t\t\t\t\"I am sorry, father but I think you should know it. Roam said Lauren tried to injure him.\"\n\t\t\t\n\t\t\t\t\t\tHe sighs.\n\t\t\t\n\t\t\t\t\t\t\"I can see what she is going through. Thank you for letting me know.\"\n\t\t\t\t\t\t*set protection +3\n\t\t\t\n\t\t\t\t\t\t(Protection increases)\n\t\t\t\t\t\t*goto campus3\n\t\t\t\t\t\n\t\t\t\t\t#No\n\t\t\t\t\t\t*goto campus3\n\t\t\t\n\t\t\t#Don't\n\t\t\t\tYou murmur something under your nose. The Goatfather decides not to make you elaborate.\n\t\t\t\t*goto campus3\n\t\t\t\t\n*label campus3\n*page_break\n\"I want to talk to you about Lauren,\" you say to the Goatfather.\n\nHe listens attentively as you describe every detail of your meeting with her.\n\n\"I understand her decision to seek power and I am really sorry that it she is going through such a hard time. I hope I will be able to help her. Now, you really need to rest.\"\n\nYou can't deny that he is right. Your are barely able to stand on your feet.\n\n\"You can use your former room. It is currently free.\"\n*goto campus4\n\n*label share\n*set rel_lauren 2\nYour hands entangle her waist as you step forward to the victim. In that moment, you don't regard him as a human being. He is just a piece of energy, the main \ncoarse of a feast.\n\n\"I am ${a} ${succubus}, our mode of feeding is... a bit more sensual.\"\n\n\"I know very well what you are. Just relax and trust me. You may experience sensory overload.\" Her sweet warm breath already has you struggling for breath.\n\nShe bites the neck of the man and takes a noisy gulp, then turns towards you and gives you a kiss. You moan, a wave of intense pleasure ripples throughout your body. Somewhere\nin the back of your mind, you feel disgusted by the sticky metallic taste of blood, but it doesn't bother you too much.\n\nYou don't know how many times she repeats the procedure, but when you are finished, the man is cold. You don't have the capacity to experience \nregret for what you did, your brain swimming in pleasure hormones. Judging by the look on Lauren's face, she feels no different.\n\nYou try to clean yourself as much as you can, then tightly embraced, you head back to the orphanage campus.\n\n*set blood +1\n*set light -6\n(Health and Darkness increase)\n*goto campus\n\t\n*label campus4\n*page_break\nAs soon as your head hits the pillow, you fall asleep. You dream of shapeless horrors that try to capture you in their immense bulks. \n\nA gentle kiss on the cheek cuts the veil of the nightmare. An aroma of lilac mixed with acacia fills your lungs.\n\n\"Awaken, my child,\" you hear a soft female voice.\n\nYou open your eyes and behold a charismatic woman you don't know. The way she addressed you is hardly appropriate as she looks slightly younger than you. And, she is strikingly beautiful.\nShe might very well be the model of every Goth girl with her long raven hair, short black dress and pale complexion. Except for the eyes - they are like two pieces of an the abyss. Other than that, her facial\nfeatures are soft and innocent.\n\n\"Don't you know that you are supposed to kiss the hand of the mother demon?\" she asks you with a tempting smile and offers you her hand covered with a velvet glove. You get a sudden urge\nto obey.\n*choice\n\t#Get up and kiss her hand.\n\t\t*set obedience +1\n\t\tThe fabric feels gentle on your lips, although it smells slightly of sulphur.\n\t\t*goto campus5\n\t\n\t#Kneel before her and kiss her hand.\n\t\t*set obedience +1\n\t\tThe fabric feels gentle on your lips, although it smells slightly of sulphur.\n\t\t\"Well, there was no need for such a display, but I appreciate that,\" she says.\n\t\t*goto campus5\n\t\n\t#Say that you are not supposed to kiss a gloved hand.\n\t\tYour remark makes her chuckle.\n\t\t\n\t\t\"You are a smart ass. I guess I can forgive you for not conforming to the protocol.\"\n\t\t*set wit +1\n\t\t*goto campus5\n\t\t\n\t#Ask her who the hell she is and what she wants from you.\n\t\t*set obedience -1\n\t\t\"There is no need to be rude, ${succubus}!\" She gives you a look that could kill\n\t\t*goto campus5\n\t\t\n\t#Politely refuse.\n\t\t\"I am sorry, I am not used to kissing the hand of a lady I haven't been introduced to.\"\n\t\t\n\t\tShe receives you comment with a blank look on her face.\n\t\t*goto campus5\n\t\t\n*label campus5\n*page_break\n\"Excuse my manners. Being the mother of all succubi sometimes makes me forget that not all of my children know about my existence.\"\n\n\"I wasn't born ${a} ${succubus}, you know.\"\n\n\"I do. But I am the one who created that type of demon. If you have the faintest interest in Hebrew mythology, you may happen to know my name.\"\n\n\"You mean you are...\n\n\"That is right, my child, but there is no need to pronounce my name.\"\n\nHow do you respond?\n*choice\n\t#Bow before her.\n\t\t*set obedience +1\n\t\t\"Oh, I am flattered, ${name}.\"\n\t\t*goto campus6\n\t\t\n\t#Hug her and kiss her on the cheek.\n\t\t*set wit +1\n\t\t\"I am so happy to finally get to know you, mother!\" you say as you embrace her and peck her cheek, ignoring the embarrassed look on her face.\n\n\t\t\"Well, I would usually take that as a sign of disrespect, but... it is still a kind of a gesture of affection. Now, hands off me!\"\n\t\t\n\t\tShe pushes you away and gives you a look that can not only kill you, but also tear you apart and bury you.\n\t\t*goto campus6\n\t\t\n\t#Tell her that you have a real mother.\n\t\n\t\t\"Oh, really? And where is she? Maybe I would like to meet her.\" She gives you a look that says [i] Don't play games with me, I control the situation now [/i].\n\t\t\n\t\tYour heart bleeds.\n\t\t\n\t\t\"You know I lost her quite a long time ago, don't you?\" \n\t\t\n\t\tShe lets out a satisfied smirk.\n\t\t*goto campus6\n\n\t#Tell her that you don't care\n\t\t*set obedience -1\n\t\t\"You have no idea how many times I've heard that before. Smart ${succubi} learn to respect me before it is too late.\"\n\t\t*goto campus6\n\t\t\n*label campus6\n\"I have a bunch of presents for you, but let me explain you the rules, shall I? The first one is for free. The second one, you have to pay for it. The third one, your soul shall be mine.\"\n\nShe produces a whip out of thin air and gives it to you.\n\n\"Examine it carefully,\" she commands as she shows it to you.\n\nYou take it, astonished by how light it is. Letting your fingers slide over it, you are careful not to get cut by the numerous small barbs.\n\n\"Enough! Now, give it back to me!\" she shouts.\n\nWhat do you do?\n*choice\n\t#Obey.\n\t\t\"Thank you.\" She squints her eyes and lashes at you with it. The whip entangles your ankle painfully and when she pulls it, it leaves a bloody mess. \n\t\t\n\t\tYou shriek. It is really just a scratch, but it is very painful.\n\t\t\n\t\t*choice\n\t\t\t#Remain silent\n\t\t\t\t*set obedience +1\n\t\t\t\tYour lack of reaction seems to satisfy her.\n\t\t\t\t\n\t\t\t\t\"You passed the test excellently. Here is your reward.\" The demoness blows you a kiss and in an instant your ankle is anew. Then, she gives you back the weapon.\n\t\t\t\t*goto campus7\n\t\t\t\t\n\t\t\t#Insult her\n\t\t\t\tYour remark makes her roar with laughter.\n\t\t\t\t\n\t\t\t\t\"Yes, I am! Your pain threshold seems too low, but we can work on it some other time, if you wish.\"\n\t\t\t\t\n\t\t\t\tThe demoness blows you a kiss and in an instant your ankle is anew. Then, she gives you back the weapon.\n\t\t\t\t*goto campus7\n\t\t\t\t\n\t#Refuse - it is yours now.\n\t\tHer eyes open wide.\n\t\t\"Well, technically yes, but... I wanted to give you a lesson. You seem to have missed the opportunity, however. I hope you are wise enough to regret that.\"\n\t\t*set wit +1\n\t\t*goto campus7\n\t\t\n\t#Attack her with it.\n\t\tYou lash at her. The whip cuts her beautiful thigh, leaving a deep mark. She remains silent, the only noise in the room being the tap of drops of blood on the laminated floor.\n\t\t\n\t\t\"That was a bold move. I should thank you for that. You know, pain and pleasure are perfectly interchangeable for me. Talking about changes...\"\n\t\t\n\t\tA sharp pain cuts through your leg and you feel a sticky liquid crawling down.\n\t\t\n\t\t\"That is an ability I should teach you one day if you are a good ${succubus}. The wound on my leg just transferred to you.\"\n\t\t\n\t\tYou are too pain-stunned to reply coherently\n\t\t\n\t\t(Health decreases)\n\t\t*if blood>1\n\t\t\t*set blood -1\n\t\t\t*goto campus7\n\t\t\n\t\t*else\n\t\t\t*goto campus7\n\t#Throw it away - you don't need it.\n\t\t*set obedience -1\n\t\t\"I have high tolerance for the rebellious kind, but you should reconsider your decision. That whip can save your life one day, believe me.\"\n\t\t\n\t\tYou make an angry face, then go to the corner of the room and pick up the weapon.\n\t\t*goto campus7\n\t\t\n*label campus7\n*page_break\n\"Now, let's talk about for the benefits I can provide to you... for a price.\"\n\n\"I guess you will want my soul, demoness?\"\n\n\"That will happen when you receive the third one. As for the second, you will need to become bound to me.\"\n\n\"To become bound? What does it mean?\"\n\nShe sighs. \"I fear your knowledge may not be sufficient to understand it. Suffice to say that no other demon can have your soul.\"\n\n\"What is your offer?\" you ask while your eyes cruise all over her body.\n\n\"I give you three options. I can teach you to regenerate so quickly that wounds bind as soon as they are inflicted. You can still die from fatal blow, though. Or\nI can boost your ${succubi} skills - runecraft, summoning, dark healing... you name it.\"\n\n\"All of them?\" You raise your brow.\n\n\"Yes. But I would put my tongue on you choosing the third one - your sister's soul!\"\n\n\"What?\" You jump with surprise. \n\n\"I won it at a game of poker. You would still need to find her body.\" A bluish crystal appears in her hands. You swear you can see her image in the sparkling stone.\n\n\"She must be still alive, otherwise the crystal would have been black.\"\n\n\"Is the suffering... May I touch it for a moment?\" you ask hopefully.\n\n\"She is in a state resembling hibernation, so I don't think she is experience too much of discomfort. And no, you can't. The bond between you is so strong that it may be enough for you\nto pull her out. What is your choice?\"\n*choice\n\t#Regeneration\n\t\t*set blood 100\n\t\t*set bound 1\n\t\t\n\t\t\"That is a wise choice!\" The demoness blows you a kiss. You feel nothing.\n\t\t\n\t\t\"Well, you don't seem to be impressed, do you?\" She teases you.\n\t\t\n\t\tWhat do you answer?\n\t\t*choice\n\t\t\t#\"Excuse me, I didn't feel anything.\"\n\t\t\t\t*set obedience -1\n\t\t\t\t\n\t\t\t\t\"You don't trust your mistress? Fine.\"\n\t\t\t\t\n\t\t\t\tShe jumps at you and slaps you, her nails digging deep into your cheek. Anger fills you instantly, put the pain lasts\n\t\t\t\tonly for a couple of seconds, then it vanishes. You touch the spot and find no marks.\n\t\t\t\t\n\t\t\t\t\"Maybe I should have use a better spot to demonstrate your new ability, but I doubt you deserve it.\"\n\t\t\t\t*set bound 1\n\t\t\t\t*goto campus8 \n\t\t\t\t\n\t\t\t#\"That is not true, mistress.\"\n\t\t\t\t*set obedience +1\n\t\t\t\t*set bound 1\n\t\t\t\tHer eyes sparkle as you call her 'mistress'.\n\t\t\t\t*goto campus8\n\t\t\t\t\n\t\t\t#\"You just blew me a kiss. How can I not be impress?\"\n\t\t\t\t*set wit +1\n\t\t\t\t\n\t\t\t\t\"You are quite a charmer, dear. I think you are a proud specimen of the race you belong to,\" says the demoness.\n\t\t\t\t*goto campus8\n\t\t\t\t\n\t#Skill boost\n\t\t*set bound 1\n\t\t*set marksmanship +1\n\t\t*set intuition +1\n\t\t*set fireball +1\n\t\t*set mind_control +1\n\t\t*set darkhealing +1\n\t\t*set summoning +1\n\t\t*set runemastery +1\n\t\t*set transformation +1\n\t\t\n\t\t\"That is a wise choice!\" The demoness blows you a kiss. You feel nothing.\n\t\t\n\t\t\"Well, you don't seem to be impressed, do you?\" She teases you.\n\t\t\n\t\tWhat do you answer?\n\t\t*choice\n\t\t\t#\"Excuse me, I didn't feel anything.\"\n\t\t\t\t*set obedience -1\n\t\t\t\t\n\t\t\t\t\"Then you need sharper senses. It will be very hard and inappropriate to demonstrate you the advance of each of your skills, so let's just focus on one.\n\t\t\t\tWhat would it be? Intuition, runemastery or summoning.\n\t\t\t\t*choice\n\t\t\t\t\t#Intuition\n\t\t\t\t\t\t*set intuition +1\n\t\t\t\t\t\t(Intuition increases)\n\t\t\t\t\t\n\t\t\t\t\t\t\"So be it.\" She hides her hand behind her back. \"Can you guess what object just appeared right behind me?\"\n\t\t\t\t\t\n\t\t\t\t\t\tYou close your eyes in order to concentrate better.\n\t\t\t\t\t\n\t\t\t\t\t\t\"A statuette of an unicorn... made of marble?\" you wonder.\n\t\t\t\t\t\n\t\t\t\t\t\t\"That is right.\" She shows you the masterpiece. \"Do you trust me now?\"\n\n\t\t\t\t\t\t\"You gave me no choice, really.\"\t\n\t\t\t\t\t\n\t\t\t\t\t\t\"I am glad to hear that,\" she smirks.\n\t\t\t\t\t\t*goto campus8\n\t\t\t\t\t\n\t\t\t\t\t#Runemastery\n\t\t\t\t\t\t*set runemastery +1\n\t\t\t\t\t\t(Rune mastery increases)\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"So be it. Can you please give me a piece of paper and a pencil while I wonder what to write.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou fulfil her request and she starts scratching.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"See, these are ancient runes, I highly doubt you have seen any like them before.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou take the paper. \"No, I haven't.\" Ass of a sudden, however, the symbols make sense. \"You have a hot a**.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe demoness laughs. \"It is nice that you noticed. \"Do you trust me now?\"\n\n\t\t\t\t\t\t\"You gave me no choice, really.\"\t\n\t\t\t\t\t\n\t\t\t\t\t\t\"I am glad to hear that,\" she smirks.\n\t\t\t\t\t\t*goto campus8\n\t\t\t\t\t\t\n\t\t\t\t\t#Summoning \n\t\t\t\t\t\t*set summoning +1\n\t\t\t\t\t\t\n\t\t\t\t\t\t(Summoning increases)\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"So be it. You can now summon something exotic. What about an ice imp.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou raise your eyebrows.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"How is that possible? Imps are creatures of fire?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"It is generally not possible, but ancient summoners were able to call creatures that didn't exists. I believe you could do that as well. Just concentrate \n\t\t\t\t\t\ton the image of a small imp that is... well made of ice.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I would require a pentagram.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Don't you see the one behind you?\" \n\t\t\t\t\t\t\n\t\t\t\t\t\tIt certainly wasn't there, but you are getting used to the ability of the mother demon to make things appear out of thin air.\n\t\t\n\t\t\t\t\t\tYou start the ritual of summoning as you know it, projecting the image of the creature. All of a sudden, it gets very cold in the room and... the icy imp appears in the pentacle. It\n\t\t\t\t\t\tstarts to squeal and shriek, throwing snowballs towards the lines of the pentacle.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Dismissed!\" yells the demoness, making him vanish instantly. \"A few seconds more and the lines would have been wiped off. You really need to be careful when summoning water\n\t\t\t\t\t\tspawn demons. They tend to be rare, but tricky.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I will remember that,\" you say humbly.\n\t\t\t\t\t\t*goto campus8\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t#\"That is not true, mistress.\"\n\t\t\t\t*set obedience +1\n\t\t\t\tHer eyes sparkle as you call her 'mistress'.\n\t\t\t\t*goto campus8\n\t\t\t\t\n\t\t\t#\"You just blew me a kiss. How can I not be impressed?\"\n\t\t\t\t*set wit +1\n\t\t\t\t\n\t\t\t\t\"You are quite a charmer, dear. I think you are a proud specimen of the race you belong to,\" says the demoness.\n\t\t\t\t*goto campus8\n\t\t\t\n\t#Your sister's soul\n\t\t*set soul 1\n\t\t*set bound 1\n\t\t\n\t\t\"I knew you couldn't resist that offer. Catch!\" The demoness throws you the ball and you catch it with trembling fingers. \"Nervous? Even if you\n\t\tdrop it, nothing bad will happen.\"\n\t\n\t\tYou ignore her comment. All that matters now is the little crystal sphere. You see her face. Or at least you think so. So many years passed since you last saw her. She's grown to become \n\t\tquite beautiful. Too bad what you see now is just a shade of herself.\n\t\n\t\t\"How can I free her?\" you ask.\n\t\n\t\t\"Well, obviously my fears of her soul being released when you touch the sphere were in vain. Maybe you don't love her enough.\"\n\t\n\t\tYou greet your teeth. \"Then why did I choose her soul instead of the power you offered me? Why did I decide to bind mine to you?\"\n\t\n\t\tShe gives you a cold smile. \"I don't know. Everyone has their private motives. Back to the main topic, as I said, you need to find her body.\"\n\t\n\t\tYou fear to ask but you decide you really have to. \"What state do you expect her to be in?\"\n\t\n\t\t\"Mentally ill.\"\n\t\t*goto campus8\n\t\n\t#Refuse her offer directly\n\t\t*set obedience -1\n\t\t\"Are you sure? You don't receive an offer from such a high rank demon twice in a lifetime.\"\n\t\n\t\tYou nod. \"Yes, madam. One of the most important lessons I learned when I started my education of demonology is not to accept any offers by demons, especially ones\n\t\tI don't understand completely.\"\n\t\n\t\t\"As you wish. I hope to spend long hours regretting that decision!\"\n\t\t*goto campus8\n\n\t#Joke that your bond with you is strong enough\n\t\t\"Let me see if I understand. You are the mother of all ${succubi}. We basically exist because of you. And now, you are telling me that you need to strengthen the bond\n\t\teven further. You've gotta be joking me!\" you say.\n\t\t\n\t\tHer succulent lips part, but she decides not to comment. After a few seconds, she finally decides what to say.\n\t\t\n\t\t\"Very well! I don't know what game you are trying to play... but you are sweet.\"\n\t\t*goto campus8\n\t\t\n*label campus8\n*page_break\nAfter the demoness leaves you, you find yourself unable to sleep for the next couple of hours. After you finally you manage to do so, you spend the better\npart of the morning in bed.\n\t\t\nYou wake up hungry, so you dress up quickly and immediately head for the canteen. You always enjoyed the food here. A couple of scrambled eggs later you are ready to start the day.\n*page_break\nYou are worried about Lauren and you head for her quarters. \n\t\t\nFeeling kind of nervous, you knock on the door. After a few moments, she opens the door looking kind of sleepy but definitely better than yesterday.\n\t\t\n\"Hi, Lauren. May I come in?\" you ask.\n\t\t\n\"Sure.\" She invites you.\n*page_break\n*if (rel_lauren=2)\n\tShe hugs you tightly and and you feel her warm cheek touching yours. \"I missed you, ${name}, I am so happy to see you again.\"\n\t\t\t\n\t\"The pleasure is mine, dear.\"\n\t*goto campus9\n\t\t\t\n*elseif (rel_lauren=1)\n\tShe give you a radiant smile. She reminds you of an angel.\n\n\t\"I missed you, ${name}, I am so happy to see you again,\" she says.\n\t\t\t\n\t\"The pleasure is mine, dear.\"\n\t*goto campus9\t\t\t\n\t\t\n*else\n\t\"I didn't expect to see you here, ${name}. I can't say I enjoy your presence after you were so rude yesterday,\" she says coldly.\n\n\t\"I really need to apologize. What I did was not acceptable. It was totally out of the line of how I feel about you. I mean, you have been one of my \n\tbest friends for so long.\"\n\t\t\t\n\t\"I guess I should forgive you, but never talk to me that way again!\"\n\t\t\t\n\tYou nod.\n\t*goto campus9\n\t\t\t\n*label campus9\n*page_break\n\"How are you, Lauren?\" you ask. \"I mean the vampiric thing.\"\n\n\"It is hard to say, I guess I am in a remission right now.\"\n\n\"Would you like to tell me how it started?\" you ask.\n\n\"Sure. Let me show you something.\" She goes to her room and comes back with a bottle full of some sparkling liquid.\n\n\"What is it?\"\n\n\"It is a pocket world. According to the Goatfather, it was created by fel magic that captured the day a demonic invasion happened in a parallel world.\nThe Goatfather warned me about the dangers of being there. But, he also told me that it was an opportunity to learn more about myself.\"\n\n\"That sounds very much like him. Did you really go there?\"\n\n\"Yes. It was there that it all began. I want to ask you to go there as well. Maybe this way you can understand. Or maybe help me.\"\n\nThat may sound crazy, but you really owe that to Lauren. She helped you so much when you were young.\n\n\"Okay, let's do this. What do I need to do?\"\n\n\"Just take a gulp right from the bottle. Thank you, ${name}.\"\n\nYou remove the cap and smell the liquid. Contrary to your expectations, it smells of fresh fruit. Without thinking much, you take a big gulp.\n\n[i] Do you want to receive more information about parallel worlds?\n*choice\n\t#Yes\n\t\t*goto about\n\n\t#No\n\t\t*goto invasion\n\n*label invasion\n*page_break\nThe world swirls around you, turning into an abyss of shooting stars and distant rainbows. Then, all of a sudden, you are thrown away into a cacophony of action and noises. You hear gunshots and instinctively duck. Quickly looking around, you spot policemen taking fire at... A band of imps. The demons jump around in their usual fashion, using their tiny wings to extend each leap, making them very difficult targets. Cursing in demonic, the imps retaliate with fireballs. One of the policemen turns into a living pyre. Just as you look back at the imp pack, one of the younger ones gets shot, the bullet tearing him apart.\n\nDeciding that taking part in the battle would ensure your demise, you crawl away. You recognize the place as the city centre. You don't know whether the pocket parallel world is a perfect copy of the one you live in, but it seems damn close.\n\nApart from the swarms of imps, you see a few larger demons. There are bulky humanoid brutes whose external skeleton seems impervious to any attack wield big axes and crossbows that resemble mini guns. Also, infernal gargoyles bring swift death from above by stalking on their prey and disentangling them with their stone claws. In the distance, you spot a beautiful succubus. Your heart skips a beat as you examine her irresistible features. She walks towards a soldier without any sign of fear. A delicate gesture makes him put down the gun, a sway of her raven hair seems to be enough to make him drop it. Then, the succubus embraces him and it seems that her lips lock with his. The pair is surrounded by cloud of green energy for just a second, then the soldier falls to the ground, motionless. Then, the succubus looks straight at you, hypnotizing you with her purple eyes. You feel as if your own soul could drown into them if the eye contact continues for just a few seconds more, but she mercifully breaks it and walks away, probably looking for another target.\n\nHow do you feel about what you just saw?\n*choice\n\t#You like that she killed him without making him suffer.\n\t\t*set light +3\n\t\t(Light increases)\n\n\t\tThis is one thing you always enjoyed about being a succubus. Everybody needs to die one day, but it is the way you die that can make the big difference. Most often, it is painful. A succubus kiss is prong the very few to end ones life with pleasure.\n\t\t*goto invasion2\n\n\t#She should have been more cruel to him\n\t\t*set light -3\n\t\t*set protection -3\n\t\t(Darkness and retribution increase)\n\n\t\tYou understand that in times of war efficiency is the main issue but you feel that the succubus could enjoy herself a little more, like she could have dug her nails into his heart while feeding on him. That guy was a professional sounder, he probably killed a lot of people in a painful way. You doubt he deserved such a swift and enjoyable death.\n\t\t*goto invasion2\n\t\t\n\t#She should have mind controlled him to attack other soldiers.\n\t\t*set mind_control +1\n\t\t(Mind control increases)\n\n\t\tYou admire the style with which that sister of yours took his life, but you believe that she should have taken her racial skills to better use. Making him drop his weapon is a fine example of the ability to influence others, but you don't understand why she didn't make him kill a few of his own. Did she need to suck his chi? Maybe you should ask her if you meet her again.\n\t\t*goto invasion2\n\n\t#She should have blasted him\n\n\t\tYou appreciate the very succubine way in which that sister of yours approached him. But, maybe she should have been more careful. That soldier was armed with a gun that could have killed her in a second. Maybe she should have used her pyro blast ability.\n\t\t*set fireball +1\n\n\t\t(Fireball increases)\n\t\t*goto invasion2\n\n\t#You listen to your intuition.\n\t\t*set intuition +1\n\t\t(Intuition increases)\n\n\n\t\tYou wonder why she risked approaching the soldier instead of fire blasting him from a distance. He could have killed her in an instant just before her seduction could take effect. You are also not sure why she didn't torture him to have more fun or extract more energy out of him. But, your intuition tells you that she knew him from before and liked him. What you just saw was an execution as much as it was a gesture of mercy. Being so close to the battlefield would ensure his death and none of the other demons would show mercy.\n\n\t\t*goto invasion2\n\n*label about\nThe Goatfather, being an inter dimensional traveller, told you a lot about parallel worlds, worlds in a bottle and the effects associated with them.\n\nParallel world are ones with a large degree of similarities between one another. Travelling to such a world, you will arrive in a surrounding somewhat similar to the one in your mother world. You will probably encounter people you know who may or may not possess the same characteristics. It is not known what happens to your equivalent. It is largely believed that they are destroyed and the inter dimensional traveller takes the place of their corresponding self. But, it is also very possible that the latter be stored in the abyss, ready to return the moment the inter dimensional traveller jumps to his home (or other) parallel reality.\n\nA pocket parallel world is just an artificially created parallel world that serves a particular purpose. In your case, the one Lauren invited you to try represents a demonic invasion of your world and is a kind of a training simulation for the ones of your kind and other wielders of demonic energies. The efficiency of the training method is based on the so-called loading effect.\n\nWhen an inter dimensional traveller arrives in a parallel world, the latter does not receive the full information about the subject and tries to update their skills and abilities based on the first several actions to the traveller. This ensures a quick boost in powers that seems to be permanent. There is supposed to be some loss of personality (including skills and abilities) during each inter dimensional travel, but for some unexplained reason, it is negligible.\n\nThe loading effect suffers from diminishing marginal returns after the first time it appears. In practice, it can appear only once for a inter dimensional traveller.\t\n*goto invasion\t\n\n*label invasion2\nYou take some time to look at yourself an you must admit that your outfit is pretty hot too. \n\nYou are wearing leather pants that perfectly outline your toned legs. Then, you have a black T-shirt that leaves little to imagination. The stylish trench coat you have on is unbuttoned and perfectly matches your high boots.\n\nWhile you would be perfectly dresses for a fashion show, you remind yourself that you are on a battlefield. You remind yourself of your weapons.\n*choice\n\t#You reach for your gun\n\t\t*set marksmanship +1\n\t\t(Marksmanship increases)\n\n\t\tThe gun lies in a holster on your thigh. You take it out. It seems to fit your hand better than ever - like a natural extension of your hand. Maybe it is the loading effect the Goatfather told you about. You check the clip - there seem to be 6 bullets in - almost a full clip. Seeing no immediate danger, you take your weapon back into the holster but you keep a hand on it just to be on the safe side.\n\n\t\tYou also have the whip the demoness gave you as a present. It is coiled and attached to the back of your trench coat.\n\t\t*goto invasion3\n\n\t#You search for the whip\n\t\t*set whip +1\n\t\t(Melee combat increases)\n\n\t\tSomething tells you to check the back of your trench coat. The present from the demoness is attached to it, coiled and die fly waiting to unleash its power. It feels like a perfect extension of your hand. You are either unlocking more of your ${succubus} self or it is the loading effect the Goatfather told you about.\n\n\t\tYou lash in the air and actually enjoy the sound of it cutting through the air and when it's tip meets the ground, you feel that too.\n\n\t\tSensing no immediate danger, you gently coil the weapon and return it to your back.\n\n\t\tYou also have the pistol - attached to a holster on your thigh.\n\t\t*goto invasion3\n\n\t#You don't need weapons - you have your fireballs\n\t\t(Fireballs increase)\n\t\t*set fireball +1\n\n\t\tJust thinking about the flame waves you can produce makes your fingers feel hot. Maybe it is the loading effect the Goatfather told you about. It is tremendous power to be able to toast your enemy into a pile of charred bones and flesh.\n\n\t\tYou find the pistol in a holster on your thigh and the whip the demoness gave you attached  to the back of your trench coat. For a brief moment, you consider throwing the weapons away. Then, you decide against it. They could come handy.\n\t\t*goto invasion3\n\n*label invasion3\nLooking around, you see quite a few corpses wearing distinctive marks that speak about the ways of demise. Most often they are either burns or claw marks. What you also observe is that the majority of the dead are in uniforms - most of them military, but also a few police ones. It seems that the demons are not aiming at harming civilians.\n*choice\n\t#You find that stupid.\n\t\t(Darkness increases)\n\t\t*set light -3\n\n\t\tWhoever leads this raid is obviously incompetent. The underestimate the effect of fear and shock of that could easily be achieved by slaughtering civilians.\n\t\t*goto invasion4\n\n\t#You find that noble\n\t\t(Light increases)\n\t\t*set light +3\n\n\t\tWhoever leads the raid already managed to earn your respect. You know it must be very hard to discipline demons into channelling their natural malice on particular targets.\n\t\t*goto invasion4\n\n*label invasion4\n*page_break\nYou decide you need to move on, even though you are not sure where to go. The monument of freedom is just a block away. It is situated in a big square, which could make you a potential shooting target, but you hope that your appearance makes both sides regard you as not belonging to the enemy faction.\n\nThe monument is situated on top of a pillar that is at least five meters high. If you climb it, you will be able to examine a large area.\n\nGoing around the corner you run into another pack of imps and you see a little girl. She is probably five or six years old with curly blond hair. Her flowery dress is dirty. Despite her face being covered by tears and dirt, she still looks like a perfectly beautiful human doll.\n\nWould you take a moment to guess her story.\n*choice\n\t#Yes\n\t\t*set intuition +1\n\t\t*set blood -1\n\n\t\tYou close your eyes and concentrate. You immediately get a vision. A beautiful woman with facial features similar to the girl's, holding her by the hand. The little one is licking an ice cream cone, smiling, looking at the elder.\n\n\t\tThe image fast forwards, you see the two have almost reached the square. The demonic invasion has began, people are running out of the square. There is the roar of a brute in the distance. The mob is crazed, people bump into each other into a stampede that threatens to smash the ladies.\n\n\t\tThe mother catches the girl by the waist and pulls her away and they start running for their lives. It is too noisy. The don't hear the motorcycle as the cross the street. Another roar makes the woman turn her head to the side.\n\t\tThe bike hits her. She is thrown up in the air, then she falls heavily on the pavement on the other side of the street. The girl rushes towards her crying. Mommy is not moving. The girl sees the imps. She has seen daddy play a game with imps, she knows they are good guys.\n\t\t\n\t\tThe girl runs towards the imps, who are busy throwing fireballs at a police squadron. One of the firy devils sees the girl but ignores her, regarding her as harmless.\n\t\t\n\t\tSuddenly, you feel burning pain in your arm. You have been hit by a bullet. The wound is superficial. You take the child by her hand and take cover.\n\n\t\t(Intuition increases, health decreases)\n\t\t*goto invasion5\n\t\t\n\t#No\n\t\tThe gunshots intensify. You grab the child by her hand and take cover.\n\t\t*goto invasion5\n\t\t\n*label invasion5\n*page_break\n\"Mom... you must help mom. She is over there,\" cries the little girl.\n\nYou try your best to make her calm down but you simply can't. The humane part of you wants you to rush head over heels to help. Your more rational one, however, wishes to\nat least think it over. Going over there might be fatal in this feud currently going on.\n*choice\n\t#Follow the girl\n\t\t\"Okay, just be careful... what is your name?\" you ask her.\n\t\t\n\t\t\"Madeline.\"\n\t\t\n\t\tAs soon as you get out of the corner, you see a grenade rolling towards the band of imps. Acting on instinct, you hug the girl and throw yourself on the pavement. The explosion deafens you and you are sure that there is some damage to your back but you manage\n\t\tto get back on your feet.\n\t\t\n\t\t\"Are you alright?\" you ask Madeline. You are not sure you are actually saying that since you are still unable to hear yourself.\n\t\t\n\t\tShe is probably also unable to hear you, but seems eager to make you continue towards her mother.\n\t\t*page_break\n\t\t\n\t\tShe is lying on the pavement in a very unnatural way. It is a pity that even as you see her now - bloodied and dirty, she is quite a beautiful sight to see. But, now the most \n\t\timportant thing is to bring her back to life, which at first glance seems to be a daunting task. You crouch next to her and try to find her pulse. Her heart is still beating\n\t\teven though very slowly.\n\t\t\n\t\tThat could have been a perfect opportunity to use your dark healing skill.... if only she was at least a little bit demonic. You could possibly summon a weak possessive shadow into her.\n\t\tThe effect on her would be permanent, but at least she will be alive.\n\t\t\n\t\tWhat do you decide?\n\t\t*choice\n\t\t\t#Turn her into a demonic being and then heal her.\n\t\t\t\tYou are not confident in turning a woman into a demon in front of her very daughter. You turn to Madeline and ask her.\n\t\t\t\t\n\t\t\t\t\"You want me to heal your mom? I need to do something...\"\n\t\t\t\t\n\t\t\t\t\"Yes, please, I want her to be fine again, please, do it now.\" She cries.\n\t\t\t\t\n\t\t\t\tYou nod. She is right, you really need to be quick or else she might die. And after that you would not be able to heal her. The only available option would\n\t\t\t\tbe to resurrect her, but you can't do that anyway.\n\n\t\t\t\tTrying to make yourself distant from the chaos around, you start chanting the ritual. The woman shivers as the dark entity enters her soul. You wait for a few\n\t\t\t\tseconds to make sure the demon installs itself into her and then you touch her temple and syphon the healing energy towards her. The woman stands up and hugs Madeline. The spontaneous display\n\t\t\t\tof affection makes you smile.\n\t\t\t\t\n\t\t\t\t\"Mom, look who saved you.\" The gorgeous woman looks you in the eye. It is electrifying. Before she starts asking you questions, you explain that you need to find a safe place.\n\t\t\t\t*set summoning +1\n\t\t\t\t*set darkhealing +1\n\t\t\t\t*set mom 1\n\t\t\t\t*set daughter 1\n\t\t\t\t*goto invasion6\n\t\t\t\t\n\t\t\t#Decide against it.\n\t\t\t\t\"Madeline, I am sorry, I can't help your mom. She is gone,\" you lie.\n\t\t\t\t\n\t\t\t\tThe little girl starts weeping and collapses on the floor. You pick her up and walk away.\n\t\t\t\t*goto invasion6\n\t\n\t#Continue on your way\n\t\tThe girl cries like a dying animal, but you are relentless.\n\t\t*set light -7\n\t\t\n\t\t(Darkness increases)\n\t\t*goto invasion6\n\t\n*label invasion6\n*page_break\nYou walk on through the madness of bullets and fire, still not sure where to go. Suddenly, you find yourself surrounded by four gargoyles.\n*if (mom=1)\n\tThe mother screams and hugs Madeline tightly. You gesture her to calm down and remain silent.\n\t*goto invasion7\n\t\t\n*elseif (daughter=1)\n\tMadeline grabs your leg and holds it tightly. You pet her hair, trying to calm him down.\n\t*goto invasion7\n\t\t\n*else\n\t*goto invasion7\n\t\t\n*label invasion7\n*page_break\n\"You must be the one the Dark Lady is expecting,\" says the largest. He has a powerful beak on his head and enormous wings.\n\n\"I don't know what you are talking about,\" you say and mentally prepare for a difficult fight.\n\nThe gargoyle senses your tension. \"There is no need to worry about your safety. The Dark Lady instructed us to look for a demon who is not part \nof the current invasion. Our task was to deliver you to her with utmost care for your safety. Please, enter the house over there.\"\n*if (daughter=1)\n\t*page_break\n\t\"You won't leave me to them, will you?\" cries the little girl.\n\t\n\t\"I am not leaving this child,\" you snarl at the gargoyle.\n\t\n\t\"There is no need. We were told to invite anyone travelling with you.\"\n\t\n\tYou nod and enter the house.\n\t*goto invasion8\n\t\n*if (mom=1)\n\t*page_break\n\tThe woman presses her body towards you. You can sense her shivers. Despite her new demonic self, she is still very much afraid of her new brethren.\n\t\n\t\"You won't leave us here... to them, will you?\" she says with shaking (yet beautiful) lips.\n\t\n\t\"No way,\" you snarl at the gargoyles.\n\t\n\t\"I will be honoured to invite such a fine demonic lady into the Dark Lady's quarters,\" says the gargoyle and bows.\n\t\n\tThe woman frowns but shows no other sign of disapproval. You guess that you have no other choice but head for the house.\n\t\n\t\"Why did that... thing call me a demon?\" whispers the woman.\n\t\n\t\"I will explain that to you later.\"\n\t*goto invasion8\n\t\n*else\n\tYou nod and head for the house.\n\t*goto invasion8\n\t\n*label invasion8\n*page_break\nYou meet a few other demons, most of them imps. Passing through the winding corridor, you reach the room of the so called Dark Lady. You immediately recognize her.\nShe is the mother of all ${succubi}.\n\n\"I am glad that you joined us, ${name}. I was beginning to think you would not turn up... this time.\"\n\n\"The pleasure is mine, milady,\" you bow. \"Why are we here?\"\n\nThe lady laughs.\n\n\"Because of you and Lauren... and all of the other demons who need to find who they really are. It so happens that nothing is as effective to wake up the true\ndemon inside as a good, all-in invasion.\"\n\nHow would you comment?\n*choice\n\t#\"If that is the way of the demons.\"\n\t\t*set light -3\n\t\t(Darkness increases)\n\t\t\n\t\t\"Do you really think what you see here is the nature of demons?\" she asks.\n\t\t\n\t\t\"Yes, why?\"\n\t\t\n\t\t\"Because you are all wrong.\"\n\t\t*goto invasion9\n\t\t\n\t#\"It is not worth the suffering.\"\n\t\t*set light +3\n\t\t(Light increases)\n\t\t\n\t\t\"You surprise me. I didn't believe you would manage to see through all the lies about our kind.\"\n\t\t*goto invasion9\n\t\t\n*label invasion9\nThe lady moves her hands with predatory guile as she asks. \"Do you know what is the difference between angels and demons?\"\n*choice\n\t#\"Angels serve the light, demons - the darkness.\"\n\t\t\"That is what they teach you, isn't it?\" she remarks with theatrical boredom.\n\t\t*goto invasion10\n\t\t\n\t#\"You know better than me.\"\n\t\tThe demoness seems flattered by your answer.\n\t\t*set obedience +1\n\t\t\n\t\t\"That is right, dear ${name}, and this is why I am going to tell you.\"\n\t\t*goto invasion10\n\t\t\n\t#\"There is no difference.\"\n\t\t\"You really are a smart ass,\" says the demoness. \n\t\t*set wit +1\n\t\t*goto invasion10\n\t\t\n*label invasion10\n\"There is really no difference. But I guess I will save my lecturing on the subject. You will see for yourself or probably not. It all comes down to your choices.\nNow, I want you to take part in the invasion.\"\n\n\"But I...\"\n\n\"No buts! You knew what was going on here and you decided to come anyway.\"\n\n\"I am here because Lauren asked me to,\" you explain.\n\n\"You will be sent out there with her and a guy you will meet shortly.\"\n\n\"It makes no sense... This nightmare... It can not be set up only because of me and the others. There might be thousand of people out there,\" you mutter under your nose.\n\n\"It always makes sense to punish those pathetic humans!\"\n\n\"Why do you hate them so much?\" you wonder.\n\nThe demoness sighs.\n\n\"You were out there. You saw the panic-striken crowd. They were stampeding one over another in their greed to increase their chance of survival. Most \nof the casualties over there did not happen because of my troops. You have no idea how many humans were killed by army officers who aimed at imps and ignored anyone \naround them. Have you seen this? If not, you will when you go out. There, you will need to make hard choices. I am pretty sure you will come out a different person.\nNow, you can go to your room and rest. Or visit Lauren, or maybe the imp master that will going to accompany you tomorrow.\n*if (daughter=1)\n\tI guess the ones you brought here would need your attendance.\"\n\t*goto invasion11\n\n*else\n\t\"\n\t*goto invasion11\n\t\n*label invasion11\n*page_break\t\nAn imp approaches you as soon as you leave the room.\n\n\"Where would you like to go?\" it asks you.\n*choice\n\t*hide_reuse #Lauren's room\n\t\t*goto lauren_room\n\t\n\t*hide_reuse #The imp master's room\n\t\t*goto razor_room\n\t\n\t*selectable_if (daughter=1) #The room of the little girl\n\t\t*goto girl_room\n\t\n\t#Your room\n\t\t*goto your_room\n\t\t\n*label lauren_room\nAs soon as you enter her room, Lauren jumps from the bed she was resting on. The sight of her makes you lose your breath. She has her usual white dress on, but the \nexpression on her face is so pure that it could hide the Darkness in her heart. The transformation has not taken place, she still not have chosen to become a vampire.\nCould you change that, you ask yourself? If you stop her in this pocket world, would that change her in yours?\n\n\"${name}, is that really you?\" her eyes open wide. Cool blue lakes. \"The mistress told me you were send here because of me... in order to protect me. Is that true?\"\n\nA flurry of emotions hits you. That is the woman who was your guiding light during your childhood. She helped you become who you are and made you live \ncomfortable in your skin. She was also the main reason for quite a few wet dreams.\n\n\"Is it true, ${name}?\" she repeats her question.\n\nHow would you answer?\n*choice\n\t#\"No, I am here because of me.\"\n\t\t*set rel_lauren -2\n\t\t\"Oh, okay.\" She turn her back on you. For almost a minute, nobody says anything, then she wipes her tears away. \"I am sorry, all this invasion \n\t\tthing is making me sick. The mistress explained that it was some kind of a test to bring up the potential of demons. I fear that I may fail, that\n\t\tI may not be strong enough. And, I feel I can't count on anyone here.\n\t\t*goto lauren_room2\n\t\t\n\t#\"Yes, I am here because you requested it.\"\n\t\t*set rel_lauren +2\n\t\t\"In another dimension, your version there asked me to come here.\"\n\t\t\n\t\t\"And you did it because I asked you?\" She smiles and you note that her teeth are normal. Of course, you are now in a time before she decides to \n\t\tsell her soul.\n\t\t\n\t\t\"Thank you, ${name}. All this invasion \n\t\tthing is making me sick. The mistress explained that it was some kind of a test to bring up the potential of demons. I fear that I may fail, that\n\t\tI may not be strong enough. I felt I couldn't count on anyone here. I think it is not the case any more.\"\n\t\t*goto lauren_room2\n\n*label lauren_room2\n*page_break\n\"Could you tell me what was the reason why I... the other I wanted you to come here?\"\n*choice\n\t#\"It doesn't really matter\"\n\t\t*set rel_lauren -1\n\t\t\"How could you say that? If it doesn't matter, why am I bothering to ask?\"\n\t\t\n\t\tYou remain silent.\n\t\t\n\t\tI think you'd better go. Tomorrow is going to be a hectic day. Good night.\"\n\t\t\n\t\tWithout waiting for you to get out, she lies in bed and closes her eyes. You admire her beauty for a while, then leave.\n\t\t*goto invasion11\n\t\t\n\t#\"You didn't say specifically, but I guess you wanted to prevent you from making a big mistake.\"\n\t\t*set rel_lauren +1\n\t\t*set protection +3\n\t\t(Protection increases)\n\t\t\n\t\t\"So you came here to save me? I do appreciate it. Maybe I should ask you about it but I am feeling tired. Tomorrow is a day too.\"\n\t\t*goto lauren_room3\n\t\t\n\t#\"You didn't say specifically, but I guess you wanted to justify a decision you will take.\"\n\t\t*set rel_lauren +2\n\t\t\"You mean that you won't want to change me. You accept me of what I am and what I will become? Oh, that is so sweet.\"\n\t\t\n\t\tShe gives you a quick hug that makes your heart race.\n\t\t\n\t\t\"Maybe I should ask you about it but I am feeling tired. Tomorrow is a day too.\"\n\t\t*goto lauren_room3\n\t\t\n*label lauren_room3\nLauren yawns and you feel that it would be most appropriate to leave her alone to rest. However, a part of you wants to confess the feelings you've harboured \nfor quite a long time. Would you do so?\n*choice\n\t#No\n\t\tYou wish her good night and leave the room.\n\t\t*goto invasion11\n\t\t\n\t#Yes\n\t\t\"Oh, dear, do you think you are telling me something I don't already know?\n\t\t*if rel_lauren\u003c1\n\t\t\tHowever, you are doing a poor job of showing it lately. I wonder if that is true, why do you have to be so rude to me. If that is love, it must be\n\t\t\tof a very twisted nature. Now, if you please, I need to have some rest.\"\n\t\t\t\n\t\t\tWithout waiting for you to get out, she lies in bed and closes her eyes. You admire her beauty for a while, then leave.\n\t\t\t*goto invasion11\n\t\t\t\n\t\t*elseif (light>50)\n\t\t\tShe comes closer to you. You can sense her breath tickling your face.\n\t\t\t\n\t\t\t\"I have been thinking about it too. Many times I just wanted to throw myself in your arms, or better grab you our collar and kiss the \n\t\t\thell out of you until you struggle for breath. But then, it will be useless. The moment will be gone. I am evil. My soul is corrupted till its core.\n\t\t\tAnd I just can't spoil you like they did to me in hell. I simply can't. Forgive me, because it is hard for me to forgive myself. Or, better, leave\n\t\t\tme alone. Tomorrow is going to be a big day and I want you let me rest. I am getting too emotional.\"\n\t\t\t\n\t\t\tYou wish her good night and leave the room.\n\t\t\t*goto invasion11\n\n\t\t*else\n\t\t\tShe comes closer to you. You can sense her breath tickling your face.\n\t\t\t\n\t\t\t\"I have been thinking about it too. Many times I just wanted to throw myself in your arms, or better grab you our collar and kiss the \n\t\t\thell out of you until you struggle for breath. And I will burn in the hottest layer of hell if I don't do that tomorrow, after the invasion is over.\n\t\t\tYou have no idea how excited I get just after my bloodlust is sated. What I always loved about you, ${name}, is that your soul is as black as mine. You know what,\n\t\t\tI can't be with someone pure. Gentle-hearters are for nerds like that Sister who is into you. You need to be a bad ass to get a real women like me.\"\n\t\t\t\n\t\t\tShe gives you an open mouth kiss and it triggers every muscle in you tremble. Immediately, you sense her life force come into you. You push back.\n\t\t\t\n\t\t\t\"What? Don't you like my kissing style?\" asks the stunning blonde.\n\t\t\t\n\t\t\t\"Of course I do. But I am a succubus and I usually inhale the chi of my partner while we are in the heat of the moment.\"\n\t\t\t\n\t\t\t\"That doesn't bother me at all. But let's prolong the longing until tomorrow. Fruits are sweeter when they get ripe.\"\n\t\t\t\n\t\t\t\"I don't know,\" you say, your head still dizzy.\n\t\t\t\n\t\t\t\"You look like you need some rest. Have a nice night, sweetheart,\" she blows you a kiss.\n\t\t\tYou wish her good night and leave the room.\n\t\t\t*goto invasion11\n\t\t\t\n*label razor_room\nYou knock on the door, feeling a little bit nervous. You don't know the demon and have a bad feeling about him.\n\n\"Yes? Come in,\" you hear a masculine voice.\n\nYou do so and your jaw drops. There is a handsome guy sitting on a bed. His torso is naked and ripped with muscles. Damn it, even if he was a masterpiece \nsculpture, he wouldn't look nearly as gorgeous.\n\nA pair of inquisitive amber eyes engulfs you and you suddenly want to disappear.\n\n\"Hey, you must be ${name}. The mistress told me that tomorrow we would fight together. I hope that you are worthy. By the way, my name is Razor, and you'd better not mess with me!\"\n\nYou gasp again, not being used to such hostility by someone you just met.\n\nHow do you respond?\n*choice\n\t#\"I don't need to prove myself.\"\n\t\t\"No, you do. Maybe you need a little time to learn to show more respect. You are lucky that I am patient.\n\t\t*goto invasion11\n\t\n\t#\"I will have enough time to do so.\"\n\t\tYour calm reply makes him smile.\n\t\t\"I like assertive people. I believe we are going to get along just fine.\n\t\t*goto invasion11\n\t\t\n\t#\"The question is are you worthy of fighting by my side.\"\n\t\tHis face obtains a menacing expression. \"While I was younger, I used to beat the hell out of anyone being so cocky. You are lucky that I changed. But \n\t\tremember, I regard patience as a virtue, but mine has its limits.\"\n\n\t\tThree imps roll out from behind the bed and examine you with unhindered interest. You fear they can attack you any moment, especially the poison green one with big red\n\t\teyes.\n\t\t\n\t\t\"Excuse my minions, sometimes they get aggressively defensive. Calm down, boys.\" The small demons retreat.\n\t\t\n\t\t\"I've never seen somebody master three imps,\" you remark.\n\t\t\n\t\t\"I know you haven't seen a warlock of my rank. I had more than a dozen, but the others died. Terribly.\" \n\t\t\n\t\t\"Why do you need so many?\" you ask.\n\t\t\n\t\t\"Because I can not feed. It is a curse I never managed to lift. But I easily absorb the energy of the suffering they cause.\"\n\t\t\n\t\t\"Oh...\"\n\t\t\n\t\t\"My advise is to go back to your room and rest. Tomorrow will be a hard day.\"\n\t\n\t\t*goto invasion11\n\t\t\n \n*label girl_room\n*if (girl_room=1)\n\t[i]You already was here, please, go back to the corridor and make another choice.[/i]\n\t*goto invasion11\n\t\n*else\n\t*set girl_room 1\n\t*goto girl_room2\n\t\n*label girl_room2\n*if (mom=0)\n\tAs you open the door, you hear the little girl's laughter. A couple of imps are with her, playing, trying to catch each other. The imps have a natural advantage, being smaller and more nimble but it seems they are not using their full potential, giving the human girl a chance to be competitive and enjoy the game. Some of the acrobatics of the small demons make her laugh her heart out.\n\n\tYou decide not to interrupt their fun. Thinking that these demons were able to somehow distract her from the thought of her mother's loss makes you shed a tear. It is becoming increasingly difficult to differentiate between the Light and Dark. The demons try to do their best not to hurt civilians, the humans that are supposed to revere the Light don't really care who they harm in their zeal to escape from the invasions.\n\n\tAnd now, the so called demons remind this little girl that she is not alone, that she has kindred souls to let her carry the burden.\n\n\tTotally confused, you go back to the corridor.\n\t*goto invasion11\n\n*else\n\tYou enter the room and behold a touching sight. The mother is sitting on the floor, her child in her lap, cuddling into her. You marvel at the strength of love. Even in this chaos in which the humans are causing more trouble to themselves than the demonic invaders, there is still room for being gentle.\n\n\t\"Mommy, can I go play with the imps? they are good, I saw them on TV. They jump a lot and make funny noises all the time.\" You see her smile.\n\n\t\"I don't know, dear, they can be dangerous. I don't want you to get hurt. And what if they don't want to play with you. What if you make them angry?\"\n\n\tIt is only then that she realizes you are there, her tired but warm eyes falling upon you.\n\n\t\"Is it safe, sir? My daughter just loves imps. I bought her an action figure for her last birthday...\"\n\n\tWell, imps have so far shown no hint of aggression towards civilians, let alone the small child. It would be reasonable to say yes, especially if you want to be alone with the beautiful mother of hers. On the other hand, one can never be too safe in a house haunted by demons of all sorts.\n\n\tWhat would you answer?\n\t*choice\n\t\t#Yes\n\t\t\t\"I can guarantee you she will be safe with the imps.\"\n\n\t\t\tThe mother is not very sure but it seems you've managed to gain her trust by this point and she reluctantly agrees.\n\n\t\t\tWhat do you do now?\n\t\t\t*choice\n\t\t\t\t#Just chat with her,\n\t\t\t\t\tShe appears to be a very intelligent woman and talking to her is fun even though she is shocked by the current events. At one point, however, you start feeling very tired. You think about sucking in some of her energy, but decide not to take a free ride on her. You wish her good night. When you walk outside, you see the girl and ask her to return to her mother as it is getting late.\n\t\t\t\t\t*goto invasion11\n\n\t\t\t\t#Seduce her\n\t\t\t\t\t*achieve mother\n\t\t\t\t\tYou use your charm and her current emotional instability to break her defence and make her allow you to kiss her. From that point on, you follow your instincts, leaving her no choice to deny your lust. You rarely have such a beautiful victim, so you are taking extraordinary pleasure in doing so. It seems that she hasn't had this kind of pleasure for a long time and is having the fun of her life too. Poor woman, being a lone mother takes its toll on you.\n\t\n\t\t\t\t\tYou try not to take too much of her life force, but it seems the chemistry between you multiplies it before you receive it.\n\t\t\t\t\t*set blood +1\n\n\t\t\t\t\t(Health increases)\n\n\t\t\t\t\tThe little girl returns to the room soon after you finish. You decide to retreat. The woman's face is tired, but there is an evident expression of bliss on it.\n\t\t\t\t\t*set seduction +1\n\t\t\t\t\t*goto invasion11\n\n\t\t#No\n\t\t\t*set protection +3\n\t\t\t(Protection increases)\n\n\t\t\t\"I can't be completely sure, madam. I believe it will be better if you stay here.\"\n\n\t\t\tYou spend about a quarter of an hour with the lovely ladies, hoping to reassure them that everything is going to be fine, making sure they have everything they need. Then, you promise to come to see them tomorrow.\n\n\t\t\t*goto invasion11\n\t\t\n*label your_room\nYou enter the room the imp referred to as your own and your jaw drops. It looks like the perfect replica of yours in the Goatfather's campus. \nMaybe it makes sense, this is a parallel world after all.\n\nFeeling more tired than you ever felt in your life, you jump into bed without even removing your clothes and you seen fall into deep slumber.\n*set blood +1\n\n(Health increases)\n\n\"Wake up, gorgeous.\" A whisper wakes you up. It seems to you that it was only a quick nap, but you can see the first sun rays seethe through the shades.\nTrying to focus, you see Lauren sitting next to you. She has a black neoprene suit that leaves you breathless. The ritualist did not skip\napplying make up. Wow, she is really dressed to kill.\n\n\"Babe, I told you the demoness is joking with us. This ${succubus} was supposed to be our secret weapon but somehow can't even leave bed,\" the imp master\nenters too, followed by his minions.\n\n\"I need just a minute, if you would excuse me,\" you ask while you massage your temples.\n\n\"You have it, but no more.\" Her breath carries away the cherry aroma of her lipstick. You could swear it gets to your veins.\n\nLauren jokingly pushes the imp master out of the room and closes the door behind her.\n*page_break\n\"Okay, what is the plan?\" you ask when you get out of the house and join Lauren and the imp master.\n\n\"We need to destroy the last police station in town and the church.\"\n\n\"The church? Why would we?\" Your eyes open wide.\n\n\"Isn't it obvious? Priests specialize in dealing with our kind? The church is their fortress. It is dangerous to leave it intact.\" Lauren glares at you.\n\n\"But... at least in my world a priestess lives there. She is friendly and I really respect her. I don't want anything bad to happen to her.\n\n\"Are you sure the mistress seriously expects us to be stronger when this guy is around? That is pathetic,\" the imp master murmurs. His minions hum, supporting him while giving you an angry look.\n\n\"Oh, shut up. The ${succubus} will prove useful.\" Lauren scolds him.\n\n\"Where do we go first?\" You try to change the topic, fearing that those two can start fighting each other.\n\nLauren shrugs. \"It really doesn't matter. You choose.\" \n*choice\n\t#The church\n\t\t*goto church\n\t\t\n\t#The police station\n\t\t*goto police\n\t\t\n*label church\n*set church 1\n*page_break\nOn your way to the church, you encounter heavy resistance from the human's military forces. There seem to be troops everywhere. Lauren uses her special ability, which she calls \n[i]confusion storm[/i], which can virtually stun a whole group of enemies. At times, she actually manages to make them start firing at each other.\n\nThe imp master moves along, his hands tucked in his jeans, like a shy pupil on his first date... except for being much more attractive and athletic\nthan the average one. His minions shoot fireballs and wreck havoc in the enemy lines. You get the feeling that their master has more powers than he\ncurrently shows, but they remain dormant for the time being.\n\nHow do you contribute to the fight?\n*choice\n\t#Mind control enemies \n\t\t*set mind_control +1\n\t\t(Mind control increases)\n\t\t\n\t\tUnfortunately, you don't manage to coordinate your actions with the other two members of the crew. Often times, as soon as you pick a soldier that seems \n\t\tto be more menacing than the others, the imps would just toast them, or Lauren would confuse them. In both cases, your interference is plain useless.\n\t\t\n\t\tLauren's nerves seem to let go at one time and she starts shouting at you. The momentary distraction has its price - a bullet pecks your forearm.\n\t\tNothing serious, but you lose some blood.\n\t\t*goto church2\n\t\n\t#Shoot fireballs \n\t\t*set fireball +1\n\t\t*set cl +1\n\t\t(Fireballs and clues increase)\n\t\t\n\t\tYour firepower proves to be more than a match for the imps'. You keep roasting soldiers and instilling fear in their mates. You realize, however,\n\t\tthat your kind of fire is different. It produces a smell of sulphur, while the imps' has a hint of burning sandal wood.\n\t\t*goto church2\n\t#Heal \n\t\t*set darkhealing +1\t\n\t\t*set rel_lauren +1\n\t\t(Dark healing increases)\n\t\t\n\t\tYou don't contribute to the offensive actions of the pair, which makes them give you questioning looks from time to time.\n\t\t\n\t\tUnfortunately, there comes a time to give your contribution. Lauren gets shot under her ribs. She wails in agony and crouches. You take a couple\n\t\tof seconds to make sure the bullet is actually out of her body before you touch her abdomen and heal her.\n\t\t\n\t\t\"Remind me to thank you properly when it is finished,\" she says.\n\t\t\n\t\t\"For what? For just standing around while we fight?\" the imp master snaps.\n\t\t\n\t\tNeither you nor Lauren take the effort to reply.\n\t\t*goto church2\n\t\t\n\t#Transform \n\t\t*set transformation +1\n\t\t*set cl +1\n\t\t(Transformation and clues increase)\n\t\t\n\t\tYou turn into a living pyre and just jump on the confused solders, keeping roasting soldiers and instilling fear in their mates. You realize, however,\n\t\tthat your kind of fire is different. It produces a smell of sulphur, while the imps' has a hint of burns sandal wood.\n\t\t*goto church2\n\t\n\t#Shoot with your pistol\n\t\t*set marksmanship +1\n\t\t\n\t\tUsing your weapon, you end the resistance of many soldiers, the majority of which were confused by Lauren.\n\t\t*goto church2\n\t\t\n\t#Use your whip \n\t\t*set whip +1\n\t\t*set blood -1\n\t\t\n\t\tThe choice of a melee weapon makes you vulnerable to the ranged attacks of the soldiers. On your way to the church, you end the lives of many of them, but you take\n\t\ta superficial wound.\n\t\t\n\t\t(Health decreases)\n\t\t*goto church2\n\t\t\n*label church2\n*page_break\n*if (intuition>1)\n\tAs you approach the colossal building and stare at the cross on top of its spire, the world around you blurs and you see a piece of the future that \n\tprobably awaits you there.\n\n\t[i] \"Make your choice!\" A tall reptilian figure grabs the petite body of Lauren and lifts it up so that their lives are equal.\n\n\t\"Lauren no!\" you scream, but you are too far away. With your peripheral vision, you see the imp master and his minions.\n\n\t\"Don't worry, child. She will be fine. In fact, she will be even better.\"\n\n\tYou stare at him, unable to comprehend. Lauren's panting shifts your attention back to her.\n\n\t\"You want power, right?\" the reptilian hisses, its twisted tongue touching her face.\n\n\t\"This is what I came for.\" The ritualist whispers, her struggling for each breath making her unable to talk.\n\n\t\"And so power will be given to you. Bathe in your blood and seek the one of others!\" The reptilian puts her on the ground, then sticks the bony\n\tfingers of his arm into her chest. Crimson streaks run towards the floor.\n\n\tYou take your whip out and go berserk, all of your essence craving to deliver swift justice to the one that harmed your beloved friend. But he just disappears.\n\n\t\"I like your zeal, ${name}, but you can't harm my master. And, there is no need. He simply remade me as I requested.\"\n\n\tLauren amazes you. Her ability to ignore such a grave wound is... unnatural. And her eyes. That thing changed her into the version of hers you met in the crypt!\n\tThat realization stuns you and you can only observe as she slowly walks towards the altar, where you can see Sister Mercy muttering a prayer. Lauren\n\tjust takes a bite at her neck and hungrily licks the blood. [/i]\n\t\n\tYour vision ends.\n\t*page_break\n\t\"What is up with you, you look so pale?\" Lauren's voice cuts the vial of your dream.\n\n\t\"Lauren, we must not go there. Did I tell you in my reality you are a vampire? Someone doomed by constant bloodlust. You are going to lose yourself\n\tin a demonic entity,\" you scream in her face.\n\t*if (rel_lauren>2)\n\t\t\"When I look at you, I see a friend. I believe you want to protect me.\" She muses for a second. \"Okay, what if we get in and bring destruction to \n\t\tthat sacred place and just be extra careful?\" She gives you a foxy wink.\n\t\n\t\tHow do you reply?\n\t\t*choice\n\t\t\t#\"No way! I won't take any risks when it comes to you.\"\n\t\t\t\t*set rel_lauren +1\n\t\t\t\t\"You are such a sweetie! It is usually me taking care of you and you are now trying to give me back the favour.\"\n\t\t\t\t\n\t\t\t\t\"This is why I came to this realm, dear. If it was because of power, I would have stayed there.\n\t\t\t\t\n\t\t\t\t\"Hey, what are you two doing. My imps are hungry,\" shouts the imp master.\n\t\t\t\t\n\t\t\t\t\"We are moving along,\" Lauren orders.\n\t\t\t\t\n\t\t\t\t\"What?!\"\n\t\t\t\t*goto crossroads\n\t\t\t\t\n\t\t\t#\"Okay, just let me describe my vision better.\"\n\t\t\t\tYou tell her all the details. She nods and proceeds towards the church.\n\t\t\t\t*set warning 1\n\t\t\t\t*goto church3\n\t\t\t\n\t*else\n\t\tOne look in her eyes is enough to freeze you. You read so much alienation there.\n\t\n\t\t\"You don't care about me. What are those lies you are trying to tell me? Can't you just obey the commands of the mistress in silence?\"\n\t\n\t\t\"Lauren, dear? I don't know about this world, but in mine we are close...\"\n\t\n\t\t\"Another of your lies. It is the echo of your world that makes me distrust you.\"\n\t\n\t\tYou think of a reply, but you understand she is right. You were too rude to her back in the crypt. Now, she just won't listen to you.\n\t\t*goto church3\n\n*else\n\t*goto church3\t\n\n*label church3\nAs soon as you approach the church, Sister Mercy comes out. She walks slowly towards you with the usual grace. You can see that she's been crying.\n\n\"I come to you as a lamb to the slaughter,\" she says with her parched lips. \"My only request is that you end my misery before you commit the acts\nof atrocity you plan.\"\n\nWould you like to comfort her?\n*choice\n\t#Yes\n\t\t*set rel_mercy +1\n\t\t*set light +1\n\t\t\n\t\t(Light increases)\n\t\t\n\t\tYou embrace the priestess, feeling each of her shivers, her tears wetting your neck.\n\t\t\n\t\t\"The Light has not abandoned you, blessed one. It is just a test we all need to go through,\" you whisper in her ear.\n\t\t\n\t\tShe does not respond, but you know that deep inside of her, you filled a little bit of the abyss.\n\t\t*goto church4\n\t\t\n\t#No\n\t\tYou stare at her blankly, not knowing how to respond.\n\t\t*goto church4\n\n*label church4\n\"Is there anybody else in?\" Lauren asks.\n\n\"A dozen of children. You...won't...\" the priestess spatters.\n\n\"No, we won't hurt them. Our instructions are not to harm any civilians.\" The ritualist explains.\n\n\"Then, maybe you are not as bad as I expected.\" A sparkle of hope shines in Mercy's eyes.\n\n\"You wish,\" Lauren replies.\n\n\"What do we do now?\" you ask.\n\n\"Well, we won't harm the little ones but that does not mean that we won't desecrate the place. And, I don't think this woman qualifies as a \ncivilian. I think we should kill her. She is a servant of the Light.\"\n\n\"If that is the case, I will embrace my fate.\" The priestess looks in Lauren's eyes with determination. To your surprise, it is the blonde who is \nforced to break the eye contact. She even loses her balance and struggles to remain on her feet.\n\nHow would you reply?\n*choice\n\t#\"We are here to fight, not to carry out executions.\"\n\t\t*set rel_mercy +2\n\t\t*set light +4\n\t\t\n\t\t(Light increases)\n\t\t\n\t\tLauren's expression shows disapproval, but she says nothing.\n\t\t\n\t\t\"May the Light bless you, ${name}. You may be stepping on the wrong path, but deep inside, you have the seed of Light.\" Sister Mercy touches\n\t\tyour cheek.\n\t\t\n\t\t\"I hope you regain your peace after it is all over,\" you reply.\n\t\t\n\t\t\"Now, if you two doves have finished your singing, can we already enter the chapel?\" The imp master seems to be losing patience.\n\t\t\n\t\t\"May the Light forgive you, as you don't know what you are doing,\" Sister Mercy mutters under her nose.\n\t\t*goto church5\n\t\n\t#\"Let's get it over and away with.\"\n\t\t*set rel_mercy -2\n\t\t*set light -4\n\t\t*set mercy_alive 0\n\t\t\n\t\t(Darkness increases)\n\t\t\n\t\t\"It will be quick,\" says Lauren and steps forward the brunette. Sister Mercy lets out a sigh as the ritualist puts a dagger between her ribs.\n\t\t\n\t\tYou watch in shock as the body of the priestess hits the ground. Her eyes remain silent, staring at the sky. Did the Light betray her? Or were you the one who did it?\n\t\tAs an act of last homage to her, you kneel down and close her beautiful eyes.\n\t\t*goto church5\n\t\t\n*label church5\nYou enter the church and you feel that something is not right. The serenity is gone. There is some presence that is almost tangible in the air.\nIt is not even Darkness, the essence of the demons like you. It is worse.\n\n\"Come here, Lauren, I've been waiting for you.\" You hear a hissing voice. It belongs to a tall reptilian humanoid. The coldness and pure malice in \nhis eyes frightens you more than the thought of the deepest layer of hell.\n\n\"My child, are you ready?\" The creature points at Lauren and she approaches him, as if in trance. \"I have been waiting for so long to find someone powerful enough\nto carry the burden.\"\n\n\"Make your choice!\" A tall reptilian figure grabs the petite body of Lauren and lifts it up so that their lives are equal.\n*if (warning=1)\n\t\"I've made it just before I entered here,\" she says and jabs the throat of the reptilian with a ritual dagger. The giant screams and falls to the ground. There\n\tis no blood, but as soon as its head touches the ground, the ugly monster vanishes into thin air.\n\t\n\t\"Thanks for the warning, bro. I owe you one.\" Lauren blows you a kiss. \"Now, let's just write a few runes here and leave.\"\n\t*set rel_lauren +1\n\t*goto crossroads\n\n*else\n\t*set lauren_reptilian 1\n\t\"Lauren no!\" you scream, but you are too far away. With your peripheral vision, you see the imp master and his minions.\n\n\t\"Don't worry, child. She will be fine. In fact, she will be even better.\"\t\n\n\tYou stare at him, unable to comprehend. Lauren's panting shifts your attention back to her.\n\n\t\"You want power, right?\" the reptilian hisses, its twisted tongue touching her face.\n\n\t\"This is what I came for,\" the ritualist whispers, her struggling for each breath making her unable to talk.\n\n\t\"And so power will be given to you. Bathe in your own blood and seek the blood of others!\" The reptilian puts her on the ground, then sticks the bony\n\tfingers of his arm into her chest. Crimson streaks run towards the floor.\n\n\tYou take your whip put and go berserk, all of your essence craving to deliver swift justice to the one that harmed your beloved friend. But he just disappears.\n\n\t\"I like your zeal, ${name}, but you can't harm my master. And, there is no need. He simply remade me as I requested.\"\n\n\tLauren amazes you. Her ability to ignore such a grave would is... unnatural. And her eyes. That thing changed her into the version of hers you met in the crypt!\n\t*if (mercy_alive=1)\n\t\tThat realization stuns you and you can only observe as she slowly walks towards the altar, where you can see Sister Mercy, who somehow managed to get into the church without you paying attention to it, muttering a prayer. Lauren\n\t\tjust takes a bite at her neck and hungrily licks the blood.\n\t\t\n\t\t\"Now, let's write a few demonic ruins here and there and move away.\"\n\t\t\n\t\tIt seems that Lauren shifts back to her normal form but you know that it is temporary. Sister Mercy's wound closes by itself, leaving her intact but \n\t\tfrightened. You doubt she will turn into a vampire as well. She is probably much too holy for it to happen.\n\t\t*goto crossroads\n\t\t\n\t*else\n\t\tLauren approaches you.\n\t\t\n\t\t\"Am I scaring you?\" she asks as she closes the distance even further.\n\t\t\n\t\tYou nod. \n\t\t\n\t\t\"Don't be afraid, I need just a little gulp. My lips are so dry. Remember when I made you orange juice every morning when you were sick? It will be just like that.\"\n\t\t\n\t\tHer fingers run over your neck, then she takes a bite and then hungrily licks the blood. You don't feel any pain, just the warm liquid pouring down.\n\t\tBut when you check with your hand, there is nothing wrong with your neck. Was it just an illusion? Anyway, you feel quite exhausted.\n\t\t*set blood -1\n\t\t\n\t\t(Health decreases)\n\t\t\n\t\t\"Now, let's write a few demonic ruins here and there and move away.\"\n\t\t*goto crossroads\n\t\t\n*label crossroads\n*if (church=1) and (police=1)\n\t*goto end_invasion\n\t\n*elseif (church=1)\n\t*goto police\n\t\n*else\n\t*goto church\n\n*label police\n*set police 1\n*page_break\nThe raid of the police station runs like a dream through your mind and after it finished you don't remember much of it other that...\n*choice\n\t#You took pains to reduce the collateral damage\n\t\t*set protection +3\n\n\t\t(Protection increases)\n\t\t*goto crossroads\n\t\t\n\t#You gave your best to destroy as much of the police station as possible\n\t\t*set protection -3\n\n\t\t(Retribution increases)\n\t\t*goto crossroads\n\t\t\n\t#You went into a berserker rage, killing everyone in your path\n\t\t*set light -3\n\n\t\t(Darkness increases)\n\t\t*goto crossroads\n\t\t\n*label end_invasion\nIt is getting dark and you return to the headquarters.\n\n\"It was such a nice days,\" says Lauren, visibly tired but with a big smile on her face.\n\n\"I barely managed to break a sweat,\" remarks the imp master.\n\n\"Of course. You just walked around while your guys did the job for you,\" Lauren snaps back. \n\n\"Do you have even a vague idea how hard it is to control all three of them?\"\n\nYou consider trying to calm them down before they engage into a fight, but suddenly the world around you spin again...\n*page_break\n...and you find yourself back to your home world with Lauren sitting in front of you, just the way she was before you left for the pocket realm.\nShe looks you with her big inquisitive eyes.\n*if (lauren_reptilian=1)\n\tThey look the same to you - with the reptilian vertical pupil. Well, at least now you know where they came from.\n\t\n\t\"So, you didn't change me back to normal?\" Her voice carries out so much pain and desperation. \"You used your time there for personal development only?\"\n\t\n\t\"Lauren... I can't tell you how much I am sorry.\"\n\t\n\t\"I am sorry even more. Maybe I should have asked you to do so more explicitly. What a fool I am. Anyway, maybe it is my fate to be like that. It is me who \n\tactually wanted that as you saw.\"\n\t\n\tThe ritualist leaves the room. Being alone with yourself hardly ever felt that awkward.\n\t*goto after_invasion\n\t\n*else\n\tYou almost jump to the floor when you see they are back to normal. \n\t\n\t\"Yes! Lauren I managed to stop you from becoming a monster in the pocket world and that changed our reality.\" \n\t\n\t\"I can't believe it, ${name}. I couldn't even dare ask you to do so..\" Lauren falls lost for words and  her tears of joy are left to show\n\ther emotions.\n\t*if (rel_lauren\u003c3)\n\t\tAfter a while, you feel tired and ask her to be excused.\n\t\t*goto after_invasion\n\t\t\n\t*else\n\t\tShe hugs you and kisses your cheek and you think it is just the usual gesture of friendship, but then you feel her lips on your neck and the tip of her\n\t\ttongue. It feels amazing.\n\t\t\n\t\t\"Lauren...\" you sigh.\n\t\t\n\t\t\"What is it, ${name}? Am I making you uncomfortable?\" she asks with a hus
