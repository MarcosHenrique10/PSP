hed voice.\n\t\t*choice\n\t\t\t#Ask her to stop\n\t\t\t\t\"No, I am enjoying every contact with you,\" you explain as you move away from her. \"But I fear to get any closer to you. You know how \n\t\t\t\tquickly those feelings turn into hatred. I don't want to lose you, Lauren. I don't want to ruin what we have.\"\n\t\t\t\t\n\t\t\t\tLauren pauses for a second, then bursts into laughter.\n\t\t\t\t\n\t\t\t\t\"You had the balls to go to another world and face its dangers and save me from the vampire I'd had the foolishness to become. But, you fear my passion.\"\n\t\t\t\t\n\t\t\t\tYou nod. \n\t\t\t\t\n\t\t\t\t\"Feel free to come to me as soon as the feeling of regret becomes unbearable,\" she smiles.\n\t\t\t\t\n\t\t\t\t\"You know me, don't you?\"\n\t\t\t\t\n\t\t\t\t\"Plus I am a psychologist. Okay, I am sure you need to rest.\"\n\t\t\t\t\n\t\t\t\tYou nod again.\n\t\t\t\t*goto after_invasion\n\t\t\t\n\t\t\t#Tell her you dreamed for it for so long\n\t\t\t\tShe laughs. \"Tell me something I don't know.\" \n\t\t\t\t\n\t\t\t\t\"You were aware of my... feelings?\" Words don't come easy when you have her kissing your shoulder.\n\t\t\t\t\n\t\t\t\t\"Of course. I've known you for so long. I am a psychologist and a dark ritualist. I know you were thinking about me so often \n\t\t\t\tduring those moments you were alone.\"\n\t\t\t\t\n\t\t\t\tYou can take the teasing no more. You grab her and kiss her passionately. The beast inside you is unleashed after so long and you \n\t\t\t\tlose control over yourself. You are aware you are actually tearing her clothes away, which makes her laugh her heart out. And then... the \n\t\t\t\tsequence of events seems to be much too pleasurable for you to believe it is real. But it is.\n\t\t\t\t*set romance 1\n\t\t\t\t*achieve romance_lauren\n\t\t\t\t*goto after_invasion\n\t\n*label after_invasion\n*set blood +2\n*page_break\n(Health increases)\n\nThe phone wakes you up next morning. It takes a few seconds to realize what is going on. As you pick it up, you see the clock. It is almost noon. All \nthese adventures you are having these days seem to tax you.\n\n\"Hello,\" you barely recognize your own voice. It is coarse, like the screamo vocal of your favourite metal band.\n\n\"Hey, ${name},\" you hear the sweet voice of Sister Mercy. \"Did I wake you up?\"\n\n\"Kind of.\" You massage your temples as you try to get over the sleepiness.\n\n\"I am sorry. God, I wanted to call you yesterday, but it was too late. I waited until now because I didn't want to interrupt your sleep.\"\n\nYou can feel her embarrassment.\n\n\"There is really no problem, Mercy. What ails you? Is everything ok?\"\n\n\"Yes I just... need to see you, that is all.\"\n\nYou don't want to say no. What do you answer?\n*choice\n\t#\"Sure, just give me a few minutes to get ready.\"\n\t\t*set rel_mercy +1\n\t\t\"Take your time, there is really no need to rush,\" says Mercy.\n\t\t*goto weep2\n\t\t\n\t#\"I'll come, but first let me finish my sleep.\"\n\t\t\"Of course, whenever you are ready. I will be waiting.\"\n\t\t*goto weep2\n\n*label weep2\n*page_break\n\"You will be in the church, won't you?\" you inquire.\n\n\"No, I want you to come to my private quarters in the building next to it.\"\n\n\"Okay, see you!\"\n*page_break\nWhen you drop in at Sister Mercy's later, you fail to recognize the woman who opens the door. You have never seen her dressed like that. Her hair falls loosely\non her naked shoulders, next to the strips of her dress. It is quite a short one and it perfectly outlines her body. Only its black colour reminds you of the clothes you are used to seeing her wear.\n\n\"Wow, is that really you, Mercy?\" you fail to hide your surprise.\n\n\"Hi, ${name}. I sometimes get tired of wearing a cassock.\" She blushes slightly as she invites you in. \"Just like ordinary women, I sometimes need to dress up. Of course,\nI can't go up in public like that or in the church, though.\"\n\nThe place is tidy and there are flowers in a couple of places.\n\n\"Are these from admirers?\" You joke as you get to the living room and sit on the sofa. There are cookies, so you treat yourself.\n\n\"That would be sweet.\"\n\n\"What it is you wanted to tell me?\" You ask as you finish your second cookie and reach for the third.\n\n\"As I told you, I wanted you to teach me to play Cardstone.\" She takes a tablet and shows it to you. \"I've installed it and spent a couple of nights playing but I can't get the knack of it.\"\n\nHow do you respond?\n*choice\n\t#\"With pleasure!\"\n\t\t*set rel_mercy +1\n\t\t*goto play\n\t\t\n\t#\"I need to train, so that will come handy.\"\n\t\t*goto play\n\t\t\n\t#\"Is it the reason you asked me to come in?\n\t\t\"I am sorry, ${name}, I know it seems stupid when seen from outside. Anyway, I guess it was egoistic of me to take out of your time when you could really do something useful.\"\n\t\t\n\t\t\"What do you mean?\" you ask her.\n\t\t*goto reason\n\t\t\n*label play\nYou start the application and Sister Mercy comes very close to you, almost cuddling into you. Her perfume overwhelms your senses. You have a really hard time concentrating.\nLuckily, you have such a great experience playing Cardstone that play by instinct.\n\n\"First, you need to choose the class you want to play with. There are twelve options. Which would you select?\"\n\n\"I don't know, ${name}. Maybe you would recommend me one?\" She raises her eyebrow in a mimic that seems weirdly seductive.\n\nThe most natural choice would be the angel. It is a reactive class and it really needs the opponent to summon aggressive monsters or attack with spells so that the angel can turn \nthe damage (or minions) against the caster. It is an attempt by the designers to include pacifistic elements into a very competitive warlike game. The angel is one of the more popular control classes. You guess that\nMercy will like it because of the associations she could have with herself.\n\nAnother option you consider viable is the demon. Unlike its antagonist, demons could play aggro, but they also have tricks up their sleeves. This is your personal favourite, even though you play very well with more than half of the\navailable classes. If Sister Mercy wants to receive a thorough analysis of a class, the demon is the one if she counts on you for instructions.\n\nFinally, there is the hot new number one - the thief. Staying in the shadows, a thief would use every opportunity to slice an dice at every opportunity before returning to the dark.\nYou have the feeling, however, that the priestess would not like to play with a bloodthirsty criminal character. \n\nWhat would you recommend her?\n*choice\n\t#The angel\n\t\tYou can tell Mercy fell in love with the hero the moment her eyes met the art of the handsome image of the winged guardian. You help her build her deck. Then, she needs just two games before starting to play like a pro. She then wins five of the six next matches against real life opponends \n\t\t\n\t\t\"Wow, this game is awesome but my eyes are getting tired.\"\n\t\t\n\t\t\"Maybe you are not used to playing that much. OK, let's call it a day.\" You put the tablet on the table.\n\t\t*set rel_mercy +2\n\t\t*goto reason\n\t\t\n\t#The demon\n\t\tIn the beginning, Sister Mercy seems hesitant but she decides to try it. You show her a couple of combos and she laughs.\n\t\t\n\t\t\"What is so funny?\" you ask amused.\n\t\t\n\t\t\"I'm sorry but you explain it with so much zeal that you are really a sight to see.\"\n\t\t\n\t\tYou realize you didn't pick the class that is cut out for someone like Sister Mercy but she enjoys seeing you in action.\n\t\t\n\t\t\"See, the battery is getting low. Maybe we should take a break.\" You say as you put the tablet on the table.\"\n\t\t*set rel_mercy +1\n\t\t*goto reason\n\t\t\n*label reason\n*page_break\n\"${name}, I didn't bring you here to play that game, even though it has been a fantasy of mine for some time now. I had one of my visions. I saw the statue of the marble angel in the church come to life and speak to me.\nShe told me something about the doom of humanity, about a woman that is not a woman and about you - the one who can either make doom happen or stop her.\nUnfortunately, I don't remember much more of the trance but when it was over, the statue's wings were in a different posture and there were bloody tears on her cheeks. Does what I am telling you make any sense?\"\n*choice\n\t#\"Yes, I know what you are talking about.\"\n\t\t*set rel_mercy +1\n\t\t*set note 1\n\t\t\"That demoness I believe you are talking about, she came to speak with me a couple of days ago. She claims to be the mother of all succubi...\"\n\t\t\n\t\t\"Oh my dear...\" The priestess gets as white as a ghost. \"Sometimes even I don't believe in the prophecies, may the Lord forgive me. Let me show you something. \"She gets a \n\t\tcrumpled piece of paper and gives it to you. It feels electrifying to the touch - there seems to be some ancient energy stored in it.\n\t\t\n\t\t\"It is a trophy I took from the library of the Vatican when I was there last summer. As I was walking between the shelves, a book fell down in my feet. This page actually came out. I don't know what \n\t\thappened to me, but I took it into my pocket. Now I see the reason.\"\n\t\t\n\t\tYou examine it carefully. It says something about a spell that was used to enthral what seems to be the very same demoness.\n\n\t\t\"That is a very important piece of information. Too bad the spell itself is not here.\"\n\t\t\n\t\tSister Mercy shrugs.\n\t\t\n\t\t\"Sometimes the blessing of knowledge comes piece by piece. This could be the beginning of something much deeper than what we could expect.\n\t\t\n\t\t*goto reason2\n\t\n\t#No, I have no idea.\n\t\t*set rel_mercy -1\n\t\t\n\t\tSister Mercy squints her eyes. \"This is one of those feelings when you hear a sentence that sounds perfectly frank but actually contains lies.Maybe that feeling comes from confessing tens of people. Anyway, maybe I shouldn't it, but yoy are not completely true when you tell me that.\n\t\t\n\t\t*goto reason2\n*label reason2\n*page_break\n\"I think you should show me the statue,\" you propose.\n\n\"Sure. Just let me change my clothes.\"\n\n\"Is it really necessary?\" you ask.\n\n\"Of course, don't be ridiculous. I am a priestess, did you forget?\"\n\nHow do you reply?\n*choice\n\t#\"A true priestess would never dress like that.\"\n\t\t*set protection -3\n\t\t(Retribution increases)\n\t\t\n\t\tSister Mercy gives you a look full of pain. Her dark eyes get damp.\n\t\t\n\t\t\"You are right, ${name}. I really shouldn't have done that. I serve the light, I just wanted to be like the other women for a while.\"\n\t\t\n\t\tAs she goes to the other room, you are pretty sure you hear her say [i]I also wanted to like me.[/i]\n\t\t*set rel_mercy -1\n\t\t*goto reason3\n\t\t\n\t#\"You look so beautiful that it would be a sin to change into your cassock.\"\n\t\t*set rel_mercy +1\n\t\tYour remark makes her laugh.\n\t\t\n\t\t\"It was a sin to wear this dress to start with.\" She plays with her hair.\n\t\t\n\t\t\"Okay, then maybe the two sins will negate each other and you will reach salvation again?\" you contemplate.\n\t\t*goto reason3\n\t\t\n*label reason3\n*page_break\nThe statue is located in the backyard of the church. You don't recall ever spending too much time in front of it, but now you can sense the power radiating from it.\nRight now you can't really tell the nature of the supernatural power that resides in it.\n\nSister Mercy is right. The left wing of the angel is very far above the other and quite to the side. No sane sculpturer would build a statue with such a weirdly \nplaced centre of gravity. Plus, the angel looks like she is defending form something unseen.\n\nMore confusing are the bloodstains on the cheeks of the statue. You've only heard of stories about weeping statues but you are not sure about the reason such phenomena exist.\n*goto reason4\n\n*label reason4\nWhat would you do?\n*choice\n\t*hide_reuse #Touch the bloodstains.\n\t\t*set blood -1\n\t\tAs soon as your fingers touch the cold stone, you shriek in pain. There are all the nuances of the unpleasant feeling. At first it is like touching something \n\t\tlava hot, then you think you are cut and finally your hand becomes numb as if you smashed your fingers against the face of the statue.\n\t\t\n\t\t\"Are you okay?\"asks the priestess.\n\t\t\n\t\t\"I have been better,\" you mutter under your nose.\n\t\t\n\t\t\"Oh, you really should be more careful when touching sacred objects.\"\n\t\t\n\t\t\"Yeah, that's right,\" you murmur.\n\t\t*goto reason4\n\t\t\n\t*hide_reuse #Look around the statue \n\t\tYou go behind the statue and look at its back. You must admit whoever the sculptor was, they did an excellent job. The statue looks so lifelike that you could expect it to come to life any moment. Well,\n\t\ta more thorough examination reveals that a feather on the right wing is missing... and then you see one of the floor. This one, however, is a real one, not a stone representation. You point it to Sister Mercy and she picks it up.\n\t\t\t\n\t\t\"What do you think?\" you ask her.\n\t\t\n\t\t\"Could that really be an angel feather?\" she answers you with a question.\n\t\t*goto reason4\n\t\t\n\t#Use your abilities on the statue.\n\t\t*goto abilities\n\t\t\n*label abilities\n\"So, the idea is somehow to bring the statue back to life so that she can give you the message again.\"\n\nSister Mercy nods. \"Could you really do that?\" she asks hopefully.\n\n\"I could try. Let me think.\" You scratch your chin, taking another look at the statue. \"I see some runes on the belt. Unfortunately, the robe hides some of them, so I am not sure about the message\n\nThe priestess bends and squints her eyes. \"I am sorry, those symbols mean nothing to me.\"\n\n\"Runes are special symbols. They are not like the writing we know. Each symbol can have completely different meaning depending on the other around it and sometimes even\nthe emotion the rune smith brings in while writing. I've heard that those knowledgeable of rune craft can decipher a whole message even if they can see only a few symbols. But it takes some \npain.\"\n\n\"This seems strange to me but I guess how weird my prophetic dreams could seem to a normal person.\"\n\nYou look into her dark eyes and for a moment you feel as if you fall into the abyss.\n\n\"We aren't normal are we?\" you ask her with a voice that you have never heard. You suddenly feel cold ants crawling up your spine. Your demon ancestors scream warnings, this\nthis woman is a warrior of the faith, she is charismatic and... dangerous.\n\nThe creepy feeling lasts only a couple of seconds, then she puts on her radiant smile. No, the demons inside of you are not right, all the differences between you and her\nare superficial, she is a friend who wishes only good things for you.\n\n\"I guess it is boring to be normal. We are more than that. We are special.\" You both laugh and the pressure seems to be gone. \"Are there any other options you could try?\"\n\n\"I could use my summoning skills, even though I find that alternative to be a little bit dangerous. I have been taught to summon demons, not angels. But I guess I could use the statue itself as a summoning portal and\nforce its true self to appear.\"\n\nMercy sighs. \"I don't like the idea of forcing an angel to do... anything, but if it is necessary, so be it. If only my head was not so stupid.\"\n\nYou open your eyes wide. \"That could be a good idea. If you allow me to control your mind, I may be able to... make you remember what happened. But the question is if that is the best thing to do\nand whether you will trust me. You know, some of your memories may not be the correct representation of what happened. And, if I am malicious, I could do some terrible things with your mind.\nI may scar your soul forever.\"\n\n\"You wouldn't do that, would you?\" The two pieces of abyss threaten to engulf you again. You feel desperate to look away.\n\n\"Another less radical option would be to use my demonic intuition. Demons see the world from a different perspective. Sometimes they see the future, other times they stare in the past.\nI may try to do so.\"\n*if (feather=1)\n\t\"Or, the easiest approach we could take is put the feather back into the statue and see what happens.\"\n\n\t\"But I guess we will lose it, right?\" asks the priestess.\n\t\n\t\"That is a possibility but we can ask the angel for it later on, if that wakes her up.\"\n\t\n\t\"Yeah, that is an option.\"\n\t*goto waking\n\t\n*else\n\t*goto waking\n\t\n*label waking\nHow would you try to make the statue come to life?\n*choice\n\t*disable_reuse #Summon the angel\n\t\tYou take your black chalk and draw a circle around the statue. Then, you add a pentagram.\n\t\t\n\t\t\"Are you sure you have to use black chalk. You are trying to summon a holy being,\" reasons Sister Mercy.\n\t\t\n\t\tYou think about it and shrug.\n\t\t\n\t\t\"You could be right but I've always done it with white chalk,\" you answer.\n\t\t\n\t\t\"Okay.\" The priestess raises her hands. \"I am sorry for interrupting you. I am not quite familiar with what you are doing and so should just shut up and leave you do your work.\"\n\t\t\n\t\t\"That is not exactly true. You can really help me.\"\n\t\t\n\t\t\"And how can I do that? My goodness, I shouldn't allow this to happen, let alone help.\"\n\t\t\n\t\t\"Come on, Sister Mercy, you know you are doing it for the good. And I am doing it for you.\"\n\t\t\n\t\t\"But this only makes my sin griever.\"\n\t\t\n\t\t\"Can you possibly do that by actually praying?\" You ask amused and continue the ritual.\n\t\t*set summoning +1\n\t\t*if (summoning>1)\n\t\t\tYou try as you might, but the ritual simply has no effect. You will need to find another way to deal with the situation.\n\t\t\t*goto waking\n\t\t\t\n\t\t*else\n\t\t\tAfter the ritual is complete, you stare at the statue, desperate to see any sign that it worked.\n\t\t\t*goto awaken\n\t\t\t\n\t*disable_reuse #Use intuition \n\t\t\"Do you believe in the so-called sixth sense?\" You ask the priestess.\n\t\t\n\t\t\"I believe in the Light. I know that there are individuals blessed by it in various way. I guess it is one of them.\"\n\t\t\n\t\t\"I am not sure I've been blessed by it,\" you remark.\n\t\t\n\t\t\"Trust me, I know the Light when I see it.\"\n\t\t\n\t\tYou concentrate on the statue.\n\t\t*set intuition +1\n\t\t*if intuition>1\n\t\t\t*goto intuiting\n\t\t\t\n\t\t*else\n\t\t\tUnfortunately, no matter how hard you try, you can't evoke a vision. You will need to find another way to deal with the situation.\n\t\t\t*goto waking\n\t\n\t*disable_reuse #Mind control Sister Mercy\n\t\t\"Are you sure you want to do thus?\"\n\t\t\n\t\t\"Didn't I say I trust you completely?\" She has a serious composition on her face.\n\t\t\n\t\tYou just nod and stare in her eyes.\n\t\t*set mind_control +1\n\t\t*if mind_control>1\n\t\t\t*goto minded\n\t\t\t\n\t\t*else\n\t\t\tApart from getting sweaty from the beautiful view, your attempts achieve nothing. You will need to find another way to deal with the situation.\n\t\t\t*goto waking\n\t\t\t\n\t*disable_reuse #Attempt to read the runes\n\t\tYou carefully examine the runes, helping yourself by actually touching them.\n\t\t*set runemastery +1\n\t\t*if (runemastery>1)\n\t\t\tThe runes speak about the mother demon, who tried her best to shape the world of her fashion and give it to her child... you blood runs cold as you see your own name there. But,\n\t\t\t, the text continues, you are supposed to kill her with a special dagger enchanted by a glowing gem. You could change the doom of this world. The crypt under the church, go should go there and find the gem of \n\t\t\tlight, the blade of the revelation and the handle of desire. You need to assemble them with the ritual of binding and commit matricide. And, you will be aided by a woman with black wings.\n\t\t\t\n\t\t\tYou explain what you read to Sister Mercy.\n\t\t\t\n\t\t\t\"The black-winged creature... could that be you, Sister?\" you ask the priestess and a radiant smile appears on her face.\n\t\t\t\n\t\t\t\"Yes, ${name}. This is the part of the dream I actually recall. The angel and I were flying to a city. She wanted to show me the world as the mother demon would shape it in order to warn me about its doom.\n\t\t\tI had wings like hers, the only difference being that mine were black. It felt so real. After that, I've been having peculiar sensations on my back - as if I have wings.\"\n\t\t\t*goto after\n\t\t\n\t\t*else\n\t\t\tUnfortunately, there are too many runes that are not familiar to you. You will need to find another way to deal with the situation.\n\t\t\t*goto waking\n\t\n\t*selectable_if (feather=1) #Put the feather back into its place.\n\t\t*set feather 0\n\t\tThe feather matches the slot perfectly.\n\t\t*goto awaken\n\t\n\t#You give up, you can't do that\n\t\tWithout being able to receive the message of the angel, you are unable to change the impending doom.\n\t\t*goto_scene death\n\t\n*label awaken\n*page_break\nWhite dust falls from the statue and melts like snow when it reaches the ground. The angel comes to life again. You realize you can't take your eyes off her. She looks so immaculate with her \nporcelain skin, ocean blue eyes and curly red hair. She tries to step out of the pentacle but she, of course, can't. For a brief moment, there is panic one her face and you try to put yourself\nin her shoes. Angels are known not to be used to being confined. They, the books say, are made to soar heaven and travel between worlds. It is very possible that this beautiful creature\nin front of you is confined for the first time since the beginning of her existence.\n\n\"${name}, set her free, please,\" says the priestess and gives you a look in which you could read anger. Is it jealousy or does she really dislike your failure to act sooner?\nYou quickly wipe out a part of the pentacle and the angel comes out.\n\t\n\"I am happy to see you again, Sister Mercy. I didn't expect to see you so soon. Why was I abducted and who is your friend?\" The heavenly creature gives appraises you without giving out any clue about what she senses.\nShe must already know that you are a demon, right?\n\t\n\"I fear I don't remember much of our meeting. All that was left of it is a sentence about a woman who is not a woman and the name of my friend, who is going to take an important part in stopping her from doing something very bad.\n\n\"Oh, this the one I heard about. I am sorry, ${name}, I don't really know you. I am just a messenger who is not fully acquainted with everything \nabout the prophecy I deliver. It is my fault that you don't remember. We call it a prayer of forgiveness. With it, we ask the Light to make it so that the one not remember an event. I really cast that prayer by mistake.\"\n\t\nThe angel blushes. She looks even sweeter that way.\n\t\n\"Would you mind delivering the prophecy again?\"\n\t\n\"Of course.  Mind the visuals.\" A thick mist surrounds you. In the corner, you see a silhouette that wasn't there. It moves closer to you and you recognize the demoness. She has blood on her chin. There is a dagger with a shiny stone on the handle. The blade rests in her heart.\nThe demoness falls on her knees, unable to support herself. Her eyes rest on your, an expression of dismay.\n\n\"Why did you betray me, my child. I wanted to help you become what you are designed to be. I wished to give you the world, to make your life a never ending dream.\"\n\nYou come to the mother demon crouch, so your face is level with yours.\n\n\"What kind of a dreamy world is it?\"\n*page_break\n\"I will have to show you.\" Says the angel. \"You are not afraid of heights, are you?\"\n\nBefore you can answer, you feel the angelic hands lock on your chest and you are up in the air. The wing buffet carries an enticing aroma that, combined with the speed of flight,\nmakes you dizzy. You look around, wondering where Sister Mercy is. She appears to be a few dozens of meters behind you, having wings of her own. Hers, however are shiny raven-coloured.\n\n\"Wait for me, holy one. I am not skilled at using my wings yet,\" the priestess says panting as she catches up with you.\n\n\"I am sorry for having to show this to you, ${name}, but it is the only way I can make you change what will otherwise happen.\"\n\nYou feel a warm drop on you neck. You put your hand on the spot and realize it is blood.\n\n\"Are you okay?\" You ask the angel and try to look at her face. Its perfection is marred by a single streak of blood.\n\n\"As much as you will probably be after the vision is over.\"\n\nYou can see that you are approaching a big city. The angels descends to about two meters of height then drops you without a warning. You curse loudly, but then you \nrealize it is not her fault. She lies a few meters in front of you, one wing dislocated. She tries to get up, but fails.\n\nSuddenly, the vision is over and you are back to the church yard.\n*page_break\n\"I failed to deliver the message, may the Light forgive me,\" whispers the angel. \"You could change it, ${name}. The crypt under the church, go there and find the gem of \nlight, the blade of the revelation and the handle of desire. You need to assemble them with the ritual of binding and commit matricide.\" The last words echo in your mind\nas the angel convulses and melts into thin air.\n*goto after\t\n\n*label intuiting\nYour mind drifts away, invoking a vision of the events Sister Mercy fails to remember. You see her with the angel, the holy being in her flesh form, looking breathtakingly beautiful.\nThey are concentrated on the image of you and the mother demoness.\n\nShe has blood on her chin. There is a dagger with a shiny stone on the handle. The blade rest in her heart.\nThe demoness falls on her knees, unable to support herself. Her eyes rest on the image of yours, an expression of dismay.\n\n\"Why did you betray me, my child. I wanted to help you become what you are designed to be. I wished to give you the world, to make your life a never ending dream.\"\n\nYour other self comes to the mother demon and crouches.\n\n\"What kind of a dreamy world is it?\n*page_break\nYou sense you are losing control of the vision. After a brief pause, you are able to summon it again. You see the angel flying towards a city. The priestess is \nby her side, having magnificent black wings of her own. You can sense their discomfort as they descend over the city. It is their emotion that disrupts your senses.\nYou know you can't stop now, so you force yourself to the limit. All you could get are the last words of the angel to Sister Mercy.\n\n\"Only ${name} can change the fate of this world. The crypt under the church, tell the ${succubus} to go there and find the gem of \nlight, the blade of the revelation and the handle of desire, assemble them with the ritual of binding and commit matricide.\" \n\nThe vision is finally over.\n\n\"Did you succeed?\" asks the priestess. You nod and tell her what you saw.\n*goto after\n\n*label minded\nYour mind drifts away, invoking a vision of the events Sister Mercy fails to remember. You see her the angel through her eyes, the holy being in her flesh form, looking breathtakingly beautiful.\nThey are concentrated on the image of you and the mother demoness.\n\nShe has blood on her chin. There is a dagger with a shiny stone on the handle. The blade rest in her heart.\nThe demoness falls on her knees, unable to support herself. Her eyes rest on the image of yours, an expression of dismay.\n\n\"Why did you betray me, my child. I wanted to help you become what you are designed to be. I wished to give you the world, to make your life a never ending dream.\"\n\nYour other self comes to the mother demon and crouches.\n\n\"What kind of a dreamy world is it?\n*page_break\nYou sense you are losing control of the vision. After a brief pause, you are able to summon it again. You see the angel flying towards a city. The priestess is \nby her side, having magnificent black wings of her own. You can sense their discomfort as they descend over the city. It is their emotion that disrupts your senses.\nYou know you can't stop now, so you force yourself to the limit. All you could get are the last words of the angel to Sister Mercy.\n\n\"Only ${name} can change the fate of this world. The crypt under the church, tell the ${succubus} to go there and find the gem of \nlight, the blade of the revelation and the handle of desire, assemble them with the ritual of binding and commit matricide.\" \n\nThe vision is finally over.\n\n\"Wow, it felt so intimate. I don't think I've ever allowed anyone to be so close to my soul.\" She remarks, panting.\n*goto after\n\n*label after \n*page_break\n\"I think I need some coffee after what I've just learned,\" says the priestess. \"My treat. The vending machine just opposite the church makes excellent cappuccino.\"\n\n\"Are you sure it is coffee you actually need. You know, people usually need other type of drinks when life gives them more than they can take at one time.\" You joke.\n\n\"Oh, I don't use high spirit ones, if that is what you are getting at. They are too demonic for my tastes.\"\n*page_break\nSister Mercy returns to church with two streaming cupboard cups and gives you one.\n\n\"Thank you, priestess.\" Electricity passes between your hands.\n*goto about2\n\n*label about2\n*page_break\nWhat would you like to ask her?\n*choice\n\t*hide_reuse #About her black wings.\n\t\t\"I am still fascinated about that. Maybe I am not completely human. Or maybe the wings were given to me as a kind of a blessing. This may explain why the colour is black.\"\n\t\t\n\t\t\"What about the half angels?\" you ask.\n\t\t\n\t\t\"The nephilim? I don't know. There are so many conflicting theories about them that I... really don't know.\"\n\t\t\n\t\tThe priestess takes a sip of her coffee.\n\t\t*goto about2\n\t\t\n\t*hide_reuse #About the town\n\t\t\"One thing we couldn't figure out is what this town is and what exactly the angel wanted to show you... to show us.\"\n\t\t\n\t\t\"It is really a pity that we couldn't fathom that part of the prophecy. But hey, that could actually be good. We can infer that it was something truly horrible and we were spared \n\t\tfrom actually seeing it.\"\n\t\t\n\t\t\"That is a good point.\"\n\t\t*goto about2\n\t\t\n\t*hide_reuse #About the crypt\n\t\t\"That is one of the mysteries that I honestly find amazing. When this church was built, it had a crypt but a couple of generations after that, the abbot ordered that the entrance be sealed and \n\t\tperformed a strange ritual. Theologians still wonder what the aim was and whether it was purely spiritual or occult. The strange thing is that last year an archaeologist tried to locate the entrance using a device but failed.\n\t\tHis conclusion was that the crypt never existed in the first place.\"\n\t\t\n\t\t\"Oh, great, we are going... nowhere then.\"\n\t\t*goto about2\n\t\t\n\t\n\t#Finished with your questions\n\t\t*goto about3\n\t\t\n*label about3\n\"Very well, let's get on with it,\" you say to the priestess. She nods.\n\n\"Aren't you afraid?\" she asks you.\n\n\"Fear is just a feeling demons created to torment humans?\" you reply.\n\nSister Mercy laughs. \"If only all the demons were that sweet.\"\n\n\"Have you met others?\"\n\nThe question seems to make her uneasy. \n\n\"Maybe we will see other down there.\"\n\n\"Have you been there?\" You try to get eye contact with her but she wouldn't allow you.\n\n\"${name}, I want you to promise me something. Promise me that you when we come out, you will like me as much as you like me now. I... know I may die down there but\nI fear something else even more. You may learn terrible secrets of mine... you may see me from another perspective... you may see a hideous monster.\"\n\nHow do you reply?\n*choice\n\t#\"I promise.\"\n\t\t*set rel_mercy +1\n\t\t\"Thank you, dear. I hope you will live up to your promise.\"\n\t\t\n\t\t\"You can count on me.\"\n\t\t*goto about4\n\t\n\t#\"We are all monsters.\"\n\t\tThe priestess seems offended by your reaction. Then, she thinks over it.\n\t\t\n\t\t\"I am not used to someone calling me a monster, but I think I can see through your words and I think you have a positive idea behind.\"\n\t\t\n\t\t\"Yeah, I didn't want to offend you in any way. I myself, as a demon, could easily be qualified as a monster. And, monster is the word you just used.\"\n\t\t\n\t\t\"Right.\"\n\t\t\n\t\tSomething in her expression, however, tells you that she is not completely ok with what you said.\n\t\t*goto about4\n\t\t\n\t#\"I don't think anything that happens down there will make me change the way I feel you.\"\n\t\t*set rel_mercy +2\n\t\t\"Oh, that is sweet, thank you.\" The priestess gives you a hug. You can't deny you are actually enjoying being so close to that beautiful woman.\"\n\t\t*goto about4\n\t\t\n\t#\"I can't promise anything.\"\n\t\tShe gives you the saddest expression you have seen on her face.\n\t\t\n\t\t\"As much as I feel hurt by your answer, I know it is a logical one. I know I will be judged by the Light and if I need to be judged by you, so be it!:\n\t\t\n\t\t\"Sister Mercy, what are you talking about?\"\n\t\t\n\t\tShe refuses to say more.\n\t\t*goto about4\n\t\n\t#\"You give me the creeps, Sister.\"\n\t\t\"I am sorry, about that, ${name}. No priestess should scare anyone, let alone a friend.\"\n\t\t*goto about4\n\n*label about4\n*page_break\n\"I think we should go now,\"  says the priestess.\n\n\"Okay. It is a crypt, right? We will need a torch.\"\n\nSister Mercy shakes her head. \"No, there is plenty of light there. Just no Light with capital L,\" she explains as she leads you down a winding staircase.\n\n\"The entrance to the crypt was said to be here - she shows you what looks like an ordinary wall.\n\n\"How do we get there?\", you ask.\n\n\"By making a sacrifice,\" she says coldly.\n\n\"What? The church does not practice sacrifices, right?\"\n\n\"It doesn't, but I do,\" she says and takes out a small dagger and puts her left hand in front of her. It seems that she is about to cut herself.\n\nWhat do you do?\n*choice\n\t\t#Stop her\n\t\t\t*set rel_mercy +1\n\t\t\t\n\t\t\t\"Mercy, you are not doing this, are you?\"\n\t\t\t\n\t\t\t\"Why are you trying to stop me. We need to get there, I know how. Just let me do it.\"\n\t\t\t\n\t\t\t\n\t\t\tWill you?\n\t\t\t*choice\n\t\t\t\t#Yes\n\t\t\t\t\tYou watch in amazement as the blade kisses the gentle skin of her hand and slides along, leaving a bloody trail along the way. In fact,\n\t\t\t\t\ther bleeding is so abundant that it is hard for you to believe that there is nothing magical about the ritual dagger. She also seems to be in quite a lot of\n\t\t\t\t\tpain that is not correspondent to the small superficial cut that she made to herself. She waves and a splash of her blood touches the wall. It\n\t\t\t\t\tcuts through the stone like acid through metal. The edges of the whole, however glisten, which makes you think that it is more than a simple hole.\"\n\t\t\t\t\t*goto portal\n\t\t\n\t\t\t\t#No\n\t\t\t\t\t*set rel_mercy +1\n\t\t\t\t\t*set protection +1\n\t\t\t\t\t*set light +1\n\t\t\t\t\t\n\t\t\t\t\t(Light and protection increases)\n\n\t\t\t\t\t\"Mercy, what are you doing? Remember, you are a priestess, not a warlock. Your are supposed to be good at prayers, not bloody rituals.\"\n\n\t\t\t\t\tThe Sister puts her knife down. Her eyes fill with tears.\n\t\t\t\t\t\n\t\t\t\t\t\"I prayed... over and over again. It did not work. All the time I prayed for someone else, my words would be heard. But not in this case. The Light headed to my call\n\t\t\t\t\twhen I asked her to heal a patient dying of cancer. It helped a homeless man find a job and sleep in a cosy bed for the first time in a decade. It brought back the will of a teen who \n\t\t\t\t\tattempted to commit a suicide. But not when I had to deal with a personal problem of mine. I decided to stray from the Light and I don't regret it. I got to know what stays beyond it reach and \n\t\t\t\t\tthat knowledge made me return to it. I am only sorry that you will inevitably learn about my dark past. This is a sort of an intimacy I am not ready to share with you... or anyone else.\"\n\t\t\t\t\t\n\t\t\t\t\t\"Are you sure you don't want to tell me more about it right now?\"\n\t\t\t\t\t\n\t\t\t\t\tShe shakes her head. \"No, ${name}, I can't do this. You will see for yourself. Do you want to try to open the gates again or shall I procede?\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Do as you must\n\t\t\t\t\t\t\tYou watch in amazement as the blade kisses the gentle skin of her hand and slides along, leaving a bloody trail along the way. In fact,\n\t\t\t\t\t\t\ther bleeding is so abundant that it is hard for you to believe that there is nothing magical about the ritual dagger. She also seems to be in quite a lot of\n\t\t\t\t\t\t\tpain that is not correspondent to the small superficial cut that she made to herself. She waves and a splash of her blood touches the wall. It\n\t\t\t\t\t\t\tcuts through the stone like acid through metal. The edges of the whole, however glisten, which makes you think that it is more than a simple hole.\"\n\t\t\t\t\t\t\t*goto portal\n\t\t\t\t\t\n\t\t\t\t\t\t#\"You can cut my hand.\"\n\t\t\t\t\t\t\t*set protection +4\n\t\t\t\t\t\t\t*set rel_mercy +2\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t(Protection increases)\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"I can't believe what I am hearing. Why would you do that?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Cause I am a demon. Our kind specializes in both inflicting and receiving punishments.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"I would believe that for other demons, but not you.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Say no more.\" You take the dagger out of her hand. The blade kisses the gentle skin of your hand and slides along, leaving a bloody trail along the way. In fact,\n\t\t\t\t\t\t\ther bleeding is so abundant that it is hard for you to believe that there is nothing magical about the ritual dagger. The pain also burns too much for the superficial cut. The priestess grasps your hand and waves it. A splash of your blood touches the wall. It\n\t\t\t\t\t\t\tcuts through the stone like acid through metal. The edges of the whole, however glisten, which makes you think that it is more than a simple hole.\"\n\t\t\t\t\t\t\t*goto portal\n\t\t\t\t\t\n\t\t\t\t\t\t#Use your intuition\n\t\t\t\t\t\t\tYou touch the wall, trying to provoke your 6th sense into hinting you how to deal with the impasse, resulting in a storm of words that just\n\t\t\t\t\t\t\tpop up in your mind. You try to make them into something coherent. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"The wall was made by demons... It would only allow their kind to go through unless some blood is spilled.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"So the abbot who built it...\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Yes, he could have been a demon too. Or, alternatively, he could have been forced to do that like you. Or maybe he was deceived. There are numerous reasons to do that.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Okay, you are a demon, so maybe you can open it without having to slice myself again. You know, the pain is so great when you cut yourself that it makes you want to die instantly.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"I apparently can't. At least in this form. However, I don't want you to see me in my transformed self. It is kind of gross.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"You don't want to be vulnerable in my eyes,\" she laughs. \"That is sweet. It seems like we are kind of in the same shoes. I would actually appreciate it if you could allow me to do that.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tWhat is your choice?\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Allow her\n\t\t\t\t\t\t\t\t\t*set rel_mercy +1\n\t\t\t\t\t\t\t\t\t*set transformation +1\n\t\t\t\t\t\t\t\t\t(Transformation increases)\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\"Thank you,\" she says. \"This means so much to me.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\"You can thank me later if you really want to do that afterwards.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou let your mind reach for the other demon inside of it. You feel him dormant inside, as if existing in the eternal emptiness of the abyss. Yet, all you need\n\t\t\t\t\t\t\t\t\tis a little poke for it to come back to like. It reaches the boundary you spent so much time creating and stops, waiting for you to scratch it and unleash it. You are hesitant for a moment, \n\t\t\t\t\t\t\t\t\tneeding self assurance that you can control.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tThe fire demon comes to the surface taking control of your being, temporarily changing you... or at least you hope it is temporary. Deep inside of you you know that every time you summon it, it eats away a part of your soul.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tIt looks at the priestess and you can see the reflection of dancing flames in her olive eyes. To your surprise, her expression shows no disgust, but curousity.., or something more. You feel sudden hunger, a \n\t\t\t\t\t\t\t\t\tstrange feeling inherited to you by the demon of fire. You know he wants to devour her soul. It knows you wouldn't let it happen, so it doesn't dare.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou try to force his attention on the portal and get it to come closer to it. Suddenly, a small hole appears in the wall, the effect reminding you of a splash of acid making its way into metal. The edges of the whole, however glisten, which makes you think that it is more than a simple hole.\n\t\t\t\t\t\t\t\t\tNow that the work is done, you push the fire demon back inside of your soul and return to your previous form.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\"I still want to thank you,\" Sister Mercy smiles and touches your hand.\n\t\t\t\t\t\t\t\t\t*goto portal\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t#Refuse her\n\t\t\t\t\t\t\t\t\t*set transformation +1\n\t\t\t\t\t\t\t\t\t(Transformation increases)\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\"I really can't do that,\" you tell her. \"Would you mind going upstairs while I finish.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tThe priestess frowns but fulfils your request.\n\t\t\t\t\t\t\t\t\tYou let your mind reach for the other demon inside of it. You feel him dormant inside, as if existing in the eternal emptiness of the abyss. Yet, all you need\n\t\t\t\t\t\t\t\t\tis a little poke for it to come back to like. It reaches the boundary you spent so much time creating and stops, waiting for you to scratch it and unleash it. You are hesitant for a moment, \n\t\t\t\t\t\t\t\t\tneeding self assurance that you can control.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tThe fire demon comes to the surface taking control of your being, temporarily changing you... or at least you hope it is temporary. Deep inside of you you know that every time you summon it, it eats away a part of your soul.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou try to force his attention on the portal and get it to come closer to it. Suddenly, a small hole appears in the wall, the effect reminding you of a splash of acid making its way into metal. The edges of the whole, however glisten, which makes you think that it is more than a simple hole.\n\t\t\t\t\t\t\t\t\tNow that the work is done, you push the fire demon back inside of your soul and return to your previous form.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\"You can come now.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou hear her footsteps coming closer.\n\t\t\t\t\t\t\t\t\t*goto portal\n\t\t\t\t\t\t\t\t\t\n*label portal\n\"You have been there. What should we expect?\" you ask the priestess.\n\nShe looks around, musing. \"Every nightmare your mind can produce. Urban folklore legends. Bloodthirsty stuff. I hope the Light protects us.\"\n\n\"Do you think we should go at all?\"\n\nShe laughs nervously.\n\n\"Of course. It is my duty. The angel came to me for a reason.\"\n\n\"She had a message for me. Maybe she couldn't approach me directly since I am a demon.\"\n\n\"${name}, believe me, your chances for survival alone are slim there.\"\n*choice\n\t#Insist that she stays\n\t\t*set protection +3\n\t\t*set rel_mercy +1\n\t\t(Protection increases)\n\t\t\n\t\t\"I can't risk your life. I am going alone,\" you declare.\n\t\t\n\t\t\"Don't be stupid. I am not letting you go there alone.\" She gives you look that can kill. You guess you need to concede.\n\t\t*goto portal2\n\t\t\n\t#Just go together\n\t\t*goto portal2\n\t\t\n*label portal2\n*page_break\nAs soon as you go to the other side, you get the familiar feeling of being to another dimension. The air feels colder and smells of machine oil. The priestess is fallen on her knees.\n\n\"Are you okay, Mercy,\" you ask and help her get up.\n\n\"I will be fine, don't worry. I felt nausea last time I was here. This time it was no better but I will be fine.\"\n\n\"Your nose is bleeding!\" \n\n\"Just give me a minute.\"\n\nShe sits on the floor and tries to stop the bleeding, meanwhile she recites a prayer.\n\nFeeling that you can hardly help with anything, you decide to look around. You are in a sort of a small underground parking lot. The three cars you see there are quite unlike any you've seen so far.\n\nYou somehow manage to activate a trap. You hear a click and feel a demonic energy release a few meters away from you. A fireball approaches. \n\nYou can dodge, but you fear that if you do so, the fireball will fly directly towards Sister Mercy and in this condition, she would be unable to do so.\nFinally, you can try to control the fireball, if you believe you have mastered it. Your hand falls instinctively on the handle of the whip. Maybe your bosy is trying to tell you something?\nWhat do you do? You have just a second to decide.\n*choice\n\t#Allow the fireball to hit you. You can take it.\n\t\t*set blood -1\n\t\t*set burnt 1\n\t\tThe fire engulfs you and you scream in pain as you burn like a torch fuelled with gasoline. Just when you think you can't take it any more, the fire douses.\n\t\tAt least the priestess is safe and sound.\n\t\t*goto portal3\n\t\t\n\t#Dodge. The priestess may still be able to respond.\n\t\tYou jump out of the way of the fireball, feeling the intensity of the heat as it flies past you. Then, you hear the priestess scream as the fireball hits her.\n\t\t*set protection -3\n\t\t\n\t\t(Protection decreases)\n\t\t\n\t\tYou rush to her, hoping that she is not fatally injured.\n\t\t*goto injured\n\t\t\n\t#Attempt to control the fireball\n\t\t*set fireball +1\n\t\t*if fireball>1\n\t\t\tYou feel the fireball with your soul, it warms you inside. For a moment, it becomes a natural extension of yours, so you gently push it away from you into the wall next to you. A flame ricochets off the wall and licks the back of your hand, giving you just a taste of the pain you were likely to go through if your\n\t\t\tfireball controlling exercise failed.\n\t\t\t*goto portal3\n\t\t\t\n\t\t*else\n\t\t\tYou feel the fireball with your soul, it warms you inside. For a moment, it becomes a natural extension of yours and you need just a fraction of a second more to be able to take control of it and push it away. But, you don't have this time.\n\t\t\t*set blood -1\n\t\t\t*set burnt 1\n\t\t\tThe fire engulfs you and you scream in pain as you burn like a torch fuelled with gasoline. Just when you think you can't take it any more, the fire douses.\n\t\t\tAt least the priestess is safe and sound.\n\t\t\t*goto portal3\n\t\t\t\n\t\n\t#Use the whip to entangle the pipe above you and pull yourself up\n\t\t*set whip +1\n\t\tThe whip cuts the air with a hiss. It its the pipe and coils around it. You strain your muscles and lift yourself off the ground. You push your legs up, feeling the warmth of the fireball.\n\t\t*if whip>1\n\t\t\tYou manage to get out of the way of the fireball just in time. A flame licks your neck, giving you just a taste of what you would have experienced had you not been able to move out of its way. \n\t\t\then, you hear the priestess scream as the fireball hits her.\n\t\t\t*set protection -3\n\t\t\n\t\t\t(Protection decreases)\n\t\t\n\t\t\tYou rush to her, hoping that she is not fatally injured.\n\t\t\t*goto injured\n\t\t\t\n\t\t*else\n\t\t\t*set blood -1\n\t\t\t*set burnt 1\n\t\t\tBut, you are not quick enough.The fire engulfs you and you scream in pain as you burn like a torch fuelled with gasoline. Just when you think you can't take it any more, the fire douses.\n\t\t\tAt least the priestess is safe and sound.\n\t\t\t*goto portal3\n\t\t\t\n*label injured\nYou approach the priestess with an aching heart. She looks like a charred statuette. The damage the fireball did to her is evident, yet her beauty manages to permeate through the devastation\nshe had to go through. Her cassock now exposes areas of her body that would normally thrill you beyond the point where you can control your emotions, but now the flesh looks fire bitten. You fear that she could have permanent scars.\n\n\"What... in the name of the Light happened?\" she whispers with trembling lips.\n\n\"I am sorry, Mercy, I think I triggered a trap. Are you okay?\"\n\nThe priestess coughs, trying to cough out some of the dust from the fireball she must have inhaled. You try to comfort her by puttung your hand on her shoulder, even though you fear you may touch an injured spot.\n\n\"Thanks the Light, I survived but I fear this body may not take much more. Heal me, please!\"\n\n\"I can't dear. You are not a creature of the Dark.\"\n\n\"Maybe I should tell you more about this place.\" She touches her cheek. You know you need to stop her as it is badly damaged, but you are not quick enough to warn her. When her nail touches the sore\nspot, she wriggles in agony, but continues to talk. \"This is not an ordinary place, ${name}. While we are here, our very beings are changed. Well, I guess I should speak about myself... or humans in general.\nYou can regard me as a demon as long as we are in this realm.\"\n\n\"Does that mean the Light can't reach here?\" you ask.\n\n\"You mean if I can receive its blessings? Yes, I can. My bond with the Light is too strong to be severed in any way. However, the moment the Light starts flowing through me, I will start burning as if my blood boils.\"\nSo, would you heal me already?\n*choice\n\t#\"No, what you say has no meaning. I've tried using my dark healing ability on a human. That may kill you in the condition you are now.\"\n\t\t*set rel_mercy -3\n\t\t\"I don't know which hurts more - the burns or the insult from your words,\" she tries to walk, limping. \"May the Light gives this body strength to continue its path... and\n\t\tput up with your stubbornness.\n\t\t*goto portal4\n\t\t\n\t#\"With pleasure.\"\n\t\t*set rel_mercy +1\n\t\t\"Please, inform me if you experience pain. I've tried using my dark healing ability on a human. That may kill you in the condition you are now.\"\n\t\t\n\t\t\"Trust me, there is no risk. As I told you, I am as demonic as you are.\"\n\t\t\n\t\tYou call for the energies of the twisting abyss to reach for the priestess, to calm her pain an restore what the infernal flames of the fireball did to her.\n\t\tYou see the darkness intensify around her, embracing her so tightly that even your demonic eyes can't permeate it. Fearing for her safety, you break the dark funnel.\n\t\t\n\t\tThe priestess looks healed. Her eyes glisten in a way you haven't seen before. She gives you a predatory smile. Her skin looks healthy through the rags that used to be her cassock.\n\t\tsurprisingly for you, you feel the blood rushing to your cheeks.\n\t\t\n\t\t\"Why did you stop. It felt so good.\"\n\t\t\n\t\t\"You no longer hurt, right?\"\n\t\t\n\t\t\"Yes, but I really enjoyed the cool soothing touch of the dark.\" She puts her palm on her neck, trying to recall the moment.\n\t\t\n\t\tYou are confused. \"I don't know what to say, dear. I've never though I'd hear a servant of the Light like you praise the darkness.\"\n\t\t\n\t\t\"Many don't understand, especially the other priests. The Light created everything. Even the Darkness. If it can serve it, so be it. In the end of the day, it only matters if you are good or bad, not which faction you belong to.\"\n\t\t\n\t\tYou scratch your head.\n\t\t*goto portal4\n\t\t\n*label portal3\n*if (burnt=0)\n\t*goto portal4\n\n*else \n\tIt seems that you lost consciousness for a while. When you come back, the priestess is with you, holding your head in her lap, gently petting your forehead\n\tYou try to move but your body aches.\n\t\n\t\"Stands still and rest. I will fix it.\" She whispers a prayer and you feel a soothing wave caress the whole of your body. It is intoxicating. You can't help but moan. \n\tYou stand up, beaming, but the sight of hers shocks you. She is bleeding, again, the stream from her nose is so excessive that you fear for her life.\n\t\n\t\"I am okay, really. Oh, Gosh, how could I forget it. You looked so helpless, I just couldn't resist laying my hands over you.\"\n\t\n\t\"Be quiet!\" You remove your shirt and press it on her face. It takes a few minutes for the bleeding to cease.\n\t\n\t\"Maybe I should tell you more about this place,\" she says while examining your shirt. \"You look cute without it.\" She winks at you. \"Okay, back to \n\tthe serious stuff. While we are here, our very beings are changed. Well, I guess I should speak about myself... or humans in general.\n\tYou can regard me as a demon as long as we are in this realm.\"\n\n\t\"Does that mean the Light can't reach here? Or that it is bend in a way?\" you ask.\n\n\t\"You mean if I can receive its blessings? Yes, I can. My bond with the Light is too strong to be severed in any way. However, the moment the Light starts flowing through me, I will start burning as if my blood boils. Actually this happened with me.\"\n\t\n\t\"Oh, dear. But why did you try to heal me then?\"\n\t\n\t\"I don't know, seriously what went through my mind. Maybe my mind doesn't function well enough here. When I saw you injured, my instinct told me to take care of you. I interrupted the flow of the \n\tLight as soon as it started damaging me.\"\n\t\n\t\"Wait, if you are demonic, then probably I can heal you?\n\t\n\t\"I would expect that you could do it, but right now it is not necessary. I am fine.\" She says and tossess your shirt away. \"I guess you are not using it any more. Sorry for ruining it.\"\n\t\n\t\"Don't even mention it.\"\n\t*goto portal4\n\n*label portal4\n\"What is this place?\" You ask as you walk down the corridor. It seems that this building was abandoned years ago.\n\n\"It used to be a sort of a science facility for bio-demonic research.\"\n\n\"Bio-demonic research?\"\n\n\"Yes, this is what happens when demons try to combine their DNA with the one of other species. The hybrids adapt better to the correspondent realms. Some of them are real nightmares.\"\n\n\"It might be really awful to be the result of such experiments,\" you murmur while trying not to get entangled in a big spider web.\n\n\"I guess one can live with it.\" Her reply makes a series of questions pop up, but they need to wait.\n\n\"Oh my dear, what the hell is that,\" you can't suppress your reaction. The corridor comes to an end. Just before you is a big chamber. The wall is made of glass that is covered with ooze.\nInside, there are all kinds of lab instruments and devices. On the table, there is a half of a woman. She has a black vest that prolongs down the line where the body must have been cut, saving you an ugly scene...\neven though you can pretty well imagine what lies there. And there is blood, so much blood. It is actually a trail that starts from the adjacent room and continues all the way to the table.\n\nThat creature then must have climbed using her hands, leaving even more blood, desperate to end up on the table.\n\nLast but not least, the woman looks like Sister Mercy as much as even a twin of hers could not.\n\n\"Holy Light, it is another of them,\" swears the priestess and opens the door. \"Be careful with the ooze, it is poisonous to some.\"\n\nYou take utmost care not to touch the door and enter the room even though you don't really want to.\n*page_break\n\"You mean that you know... what this means?\"\n\nShe sighs.\n\n\"I do. I guess I should have told you earlier, but... it is a hard topic.\"\n\n\"Is it the secret you were worried that would be exposed when we come here?\"\n\nThe priestess shakes her head.\n\n\"No, this is only the beginning of a journey that will shake your understandings of not only me, but the world as well.\"\n*page_break\nYou feel your stomach unsettled as you approach the table.\n\n\"It is amazing... the resemblance.\"\n\n\"This is one of my eleven sisters. We are genetically the same. We are clones of the first creature to have both angelic and human DNA.\"\n\n\"What... that would explain the wings in the dream and the fact that the angel approached you. And you being such a devoted priestess.\"\n\n\"Yes, dear. As we say, blood is thicker than water.\"\n*page_break\n\"And there is a lot of blood in here,\" you remark. \"What kind of a creature would be able to do that. In fact, I can hardly comprehend what happened here.\"\n\n\"I can't tell you with any amount of certainty. I've heard that some of my sisters were left here for genetic boosting while I was sent to the world we know.\"\n\nDo you want to ask anything the priestess?\n*goto what\n\n*label what\nWhat would it be?\n*choice\n\t*hide_reuse #Where did they find an angel from\n\t\t\"The rumour is that they captured one. The poor creature was dragged here, cut away from the Light. I personally spoke with one of the jailors. I wanted to learn more about the my \n\t\tprogenitor. He assured me that the celestial being was treated with due respect but I guess that the isolation from his kind alone must have brought a lot of\n\t\tsuffering to that creature. I saw him once. He was very handsome. He had long curly hair and heavenly blue eyes.\"\n\t\t\n\t\t\"You don't look like that,\" you remark.\n\t\t\n\t\t\"That is right.\" She laughs. \"I guess I am the spitting image of my mother. She was dark. Inside and outside.\"\n\t\t*goto what\n\t\n\t#Ask her about her sisters\n\t\t\"We were brought up together in a pen, at least before each of us received our own mission. I was explained that the demons feared that the solitude was likely to cause\n\t\tproblems with our psychology, based on the reactions of our progenitor. It was fun, I really cherish those moments.\"\n\t\t\n\t\tThe priestess starts crying, puts her hands on her face. She can't control her shivers. \n\t\t\n\t\t\"Come here.\" You embrace her and kiss her forehead. You realize she was trying to act cool at the sight of the remains of her, trying to detach from the bond they shared. The\n\t\tmemory of their childhood was the trigger that brought her in the state of mental collapse. You are beginning to worry about her. You don't know how much more suffering she can take.\n\t\t\n\t\t\"That is Kyla, she was the best gymnast and dancer. We all  envied her body... now she is in pieces...\"\n\t\t\n\t\tYou guess it really takes exceptional fitness to be able to climb on the table... without using any legs.\n\t\t\n\t\tIt takes some time before the priestess can speak again.\n\t\t*goto what\n\t\n\t#Ask her how she came back\n\t\t\"It... I guess I will need to speak about it sooner or later. I... got pregnant. The doctors were taken aback by the foetus. It's parameters were unlike any, yet it was\n\t\thealthy. They couldn't explain the projections at the back, the overall bone structure was too thin. And, it was completely translucent. One of the nurses said she knew where I could receive help.\n\t\t\n\t\t\"I felt awful at the time. A priestess is not supposed to be pregnant at all, yet... it was my child. It was one with me. I feared what the nurse told me to do. I didn't want to come here but I felt I had to be brave...\n\t\tfor the sake of me and my unborn child. I had forgotten everything about this place, but the memories came back. At that time, the science facility was already almost abandoned. There were only\n\t\ta few scientists, most of them working on the hybrids project.\"\n\t\t\n\t\t\"What did they do to you?\" you ask unsure if you want to hear the answer.\n\t\t\n\t\t\"Actually, nothing bad. In fact, they helped me. This is when I understood that not all of the demons are malevolent. They helped me through my pregnancy, then assisted the birth.\"\n\t\t\n\t\t\"What happened to the child?\" you ask, beginning to lose patience. Her story is interesting but she could have told it before your arrival here. That place gives you the creeps.\n\t\t\n\t\t\"Little Maria is in heaven.\"\n\t\t\n\t\tAt first you think that she means the child is dead, but the beaming smile on her face says otherwise. \"I brought her up in our world. When she was six, a group of angels visited me and asked to take her. I knew I would be sorry, but\n\t\tI wanted her to be happy. An angel is supposed to be in heaven, not on the world of sinners. She often visits me in my sleep or while I am daydreaming. I know I made the right choice. Meanwhile,\n\t\tthe canon changed and I was able to get back to the church, which I did gladly.\"\n\t\t\n\t\t\"If the child is an angel, then the father is...\" you infer.\n\t\t\n\t\t\"A nephilim. That race is even more charming than yours.\"\n\t\t\n\t\t\"And as sexually active,\" you joke.\n\t\t\n\t\t\"I will leave the details. I will just say that it was worth it.\"\n\t\t*goto what\n\t\n\t#Finish with the questions\n\t\t*goto what2\n\n*label what2\n\"Oh em gee, she moved!\" you cry and step back.\n\nSister Mercy just turns towards the table and steps towards it. She gently puts her hand on the cheek of her sibling.\n\n\"Kyla, what did they do to you?\" A few tears fell down next to the half body.\n\nKyla just smiles.\n\n\"Mercy, I am so happy to see you, but move out. I don't want you to end up like this or worse. Move out.\"\n\n\"What did they do to you, dear? Why?\n\n\"They wanted to create something that would kill by simply looking at it. I was the strongest, they knew I had the biggest chance of surviving.\"\n\n\"They are monsters, that is insane, how could they do it? They were so kind to us?\" Mercy wipes her face.\n\n\"We were just lab pigs. I am glad the lab is shut down. But, hey, that is not that bad. You should have seen me in action. I am so light, gravity is just a joke. \nThe problem is that they could not stop the pain. I virtually can't live without pain killers and they couldn't stop the occasional bleeding.\" Kyla grabs Mercy's hand and \nsqueezes it gently.\n\n\"I was left alone. My time is running out. Please, put an end of this madness. I used all of the painkillers. When their effect is over, the pain will consume me. I know it is hard because you love me, but do it exactly for that reason.\"\n\n\"No... I can't!\" The priestess hugs her.\n\n\"I could have been the greatest living weapon all worlds have seen, if only those sick bastards could make it work. Now, live up to your name. Remember the lesson in\ntheology I mocked you about? It was about the mercy blades monks used in order to end the suffering of the mortally wounded. Please.\"\n\nYou can see the hands of the priestess shake. She can't do it. You wonder whether she actually could.\n*choice\n\t#Urge her to do so\n\t\t*goto urge\n\t\n\t#Offer her to get Kyla back to your world in order to heal her\n\t\t*goto notto\n\t\t\n\t#Offer her to do it\n\t\t*goto offer \n\t\t\n*label urge\nYou go to her and grab your hand. Even that can't stop the trembling. You embrace her bloodshot eyes.\n\n\"You know you have to do it, right. It would be the best for her.\"\n\nShe nods. \n\n\"It will only take a few seconds and then it will be over.\"\n\nThe priestess takes out her dagger and in a moment of deliberation runs its blade through her sister's throat. You pull the priestess towards you, saving her the horrific sight.\n\n\"You are a hero, dear,\" you whisper in her ear and kiss her cheek.\n*set protection +3\n\n(Protection increases)\n\nYou hear clapping from behind. Turning around you see the imp master. In this world, he looks different. His left arm is a metal implant and he also\nhas a pair of wings on his back.\n\n\"What are you doing here Razor?\" you snap.\n\n\"Are you not happy to see me?\" he waves his hand in a theatrical gesture. You really are unsure about the way he makes you feel inside. He is charming and his body is apolonic\nbut his arrogance is annoying.\n\n\"I asked first.\"\n\n\"Oh, let me see, what did I do. Well, I single handedly shut down this facility. I really can't wait to go back to heaven to receive my reward. I think the angels \nshould be thankful that I am on their side.\"\n\nHis entourage of three imps surrounds him. You've never seen those type of infernal creature exhibit loyalty to this extend.\n\n\"Why didn't you help... my sister?\" asks the priestess, barely able to stand on her feet.\n\nRazor laughs.\n\n\"What a negligible display of arrogance. I am an angel of retribution, not one of those petty guardian angels whose goal of life is to prolong the suffering of \nthe miserable. My destiny is to hunt the creatures of the Dark and I am one of the best.\"\n\nHow would you reply?\n*choice\n\t#Tell Razor that his way of thinking is sick\n\t\t*set protection +3\n\t\t(Protection increases)\n\t\t\n\t\t\"I know you have your role in the battle between the Light and Dark, but your way of thinking is just sick and has nothing to do with the Light's teachings.\"\n\t\tSister Mercy touches your forearm. \"I couldn't put it down in a better way.\"\n\t\t*set rel_mercy +1\n\t\t\n\t\t\"I should really spend more time with you, you are so entertaining. Did I ever tell you I am not sick. I am powerful and deadly and it is just\n\t\tabout everything  I want. I've decided that the Light is worthy of me, so I play along.\n\t\t\n\t\t\"Oh, yeah, after the demoness kicked your butt and the imp lord cursed you for stealing his best minions.\"\n\t\t\n\t\t\"I think your analysis went too far, bitch. I am going to be in the mech quarter in case you need me.\"\n\t\t*goto endlab\n\t\t\n\t#Tell the priestess that her sister deserved her fate\n\t\t*set protection -3\n\t\t(Retribution increases)\n\t\t*set rel_mercy -2\n\t\t\n\t\t\"Mercy, you must understand... Kyla was just a war machine and as such it is natural for her to fall victim.\"\n\t\t\n\t\tThe priestess squints her eyes, not able to take what you say.\n\t\t\n\t\t\"I mean, it may be hard for you to accept to it but maybe she deserves her fate.\"\n\t\t\n\t\tA gurgling noise from the table breaks the heavy silence. It seems that death took Kyla to a better place.\n\t\t\n\t\t\"Be as kind as to take care of the corpses you leave one the way. I will be in the mech quarters.\"\n\t\t\n\t\tThe priestess hugs her sister and and gives her a final hug.\n\t\t*goto endlab\n\t\n\t#Tell Razor that looking down on the other servants of the Lights is against its virtues\n\t\t*set light +2\n\t\t(Light increases)\n\t\t\n\t\tRazor rolls his eyes. \"Do you really think I care at all. I just had to choose a side so that my powers don't get wasted. You may not \n\t\tconsider me worthy of the Light but it may also be true that the Light is not worthy of me.\" He roars with laughter and you wonder whether he is sane.\n\t\t\n\t\tYou almost fail to hear the gurgling noise from the table breaks the heavy silence. It seems that death took Kyla to a better place.\n\t\t\n\t\t\"Be as kind as to take care of the corpses you leave one the way. I will be in the mech quarters.\"\n\t\t\n\t\tThe priestess hugs her sister and and gives her a final hug.\n\t\t*goto endlab\n\t\n\t#Tell Razor to burn in hell\n\t\t*set light -2\n\t\t(Darkness increases)\n\t\t\n\t\tRazor laughs hysterically.\n\t\t\n\t\t\"I can see that your wish is genuine. I must admit I am flattered. I truly believe I belong there. You can see my regards for the Dark scattered around me,\" he points at\n\t\tthe imps. \"The truth is, however, that, mind my language, it sucks. It is pathetic. Demons were cut out to be nothing more than slaves who long for a conqueror like me.\n\t\t\n\t\t\"You have not seen what a true demon can achieve.\" You snap back.\n\t\t\n\t\t\"Indeed. Now, if you'd excuse me, this conversation is getting boring. If you need to talk to me again, I will be in the mech quarter.\"\n\t\t\n\t\tYou almost fail to hear the gurgling noise from the table breaks the heavy silence. It seems that death took Kyla to a better place.\n\t\t\n\t\t\"Be as kind as to take care of the corpses you leave one the way. I will be in the mech quarters.\"\n\t\t\n\t\tThe priestess hugs her sister and and gives her a final hug.\n\t\t*goto endlab\n\t\n*label offer\n*set rel_mercy +3\nYou hug the priestess and whisper in her ear. \"If somebody should do it, let it be me.\" She looks at you, her bloodshot eyes full of tears and you almost\nwant to cry as well. No, not because of how tragic the situation is, but because of how amazingly beautiful she manages to be.\n\n\"Would you really do that for me?\" she asks for reassurance.\n\nYou just nod. Words fail to come as you realize it may not be that easy to cold bloodedly take away the life of a helpless... almost human.\n\nMercy puts her hands on your face and gives you a quick but passionate kiss. Then, she passes you the dagger.\n\n\"Do it quickly\", she asks you and turns away. \n\nYou take one last time at the woman on the table, while trying not to embrace her eyes, then you swipe. The\nblade sinks deep in the shapely deck, making a bloody fontain. Kyla's last noise is a gurgle. You may be imagining, but your overloaded mind makes you believe\nyou caught a distorted 'thank you'.\n\nYou pass the dagger the dagger to the priestess and she wipes the blood on her cassock, next to her heart, a twisted gesture of paying last homage to her sibling.\n*goto endlab\n\n*label notto \n\"There is another option,\" you tell the priestess. \"We can bring you back to our world where she can receive medical treatment.\"\n\n\"That friend of yours is supper funny... and cute too. Your doctors will have no clue how to deal with a creature like me. Most humans would be dead by know. On the other hand,\nI would expect some of their medicines to be lethal for me.\n\n\"There is a guy who will know how to help you. He used to inhabit hell...\"\n\n\"The Goatfather? You know him?\" Kyla interrupts you. \"We studied about him in parallel history.\"\n\n\"What about the angel's prophecy? We were sent here to do something more important that... saving my sister's soul.\"\n\n\"Look in your heart, Sister Mercy, would you be able to ever forgive yourself for letting her die in terrible pain... no matter what.\"\n\nThe priestess looks at her sibling and you know you are right. She tries to take her sibling but the weight seems too much.\n\n\"Let me help you,\" you take Kyla in your hands, amazed by how heavy she seems for being a half woman. Having her in your arms seems quite pleasant.\n*page_break\nYou hear clapping from behind. Turning around you see the imp master. In this world, he looks different. His left arm is a metal implant and he also\nhas a pair of wings on his back.\n\n\"What are you doing here, Razor?\" you snap.\n\n\"Are you not happy to see me?\" he waves his hand in a theatrical gesture. You really are unsure about the way he makes you feel inside. He is charming and his body is apolonic\nbut his arrogance is annoying.\n\n\"I asked first.\"\n\n\"Oh, let me see, what did I do. Well, I single handedly shut down this facility. I really can't wait to go back to heaven to receive my reward. I think the angels \nshould be thankful that I am on their side.\"\n\nHis entourage of three imps surrounds him. You've never seen those type of infernal creature exhibit loyalty to this extend.\n\n\"I've been watching this heartening scene from the mech quarters and I just couldn't help but congratulate you on your decision to doom your own world for the sake of \nsaving one, excuse me, half woman. I won't even need to mention the fact that there are nine other just like her, even if you don't count the one glaring at me right now.\nYou must be the spiritual one, may the Light have Mercy on our souls. If looks could kill, I would not only be slaughtered but buried by yours too.\n\n\"We don't have time to talk with you, bro, but we'll be back soon.\"\n\n\"No, you want.\" The tone of the imp master is suddenly serious.\n\n\"What do you mean?\" You are startled.\n\n\"You can only come here the way you did once. The portal won't open. It just won't.\"\n\n\"Why should we believe you?\" you enquire, even though your intuition tells you he is right. But, you can't let Mercy down, you already promised her. \n*page_break\nYou go back to your world and somehow manage to get Kyla to the orphanage campus without drawing too much attention to you. The Goatfather\ntakes her situation seriously and his medical team manages to stabilize her. She even gets implants resembling spider legs that actually help her walk on walls.\n\nSeeing her training sessions give you a thrill. She must be the most amazing gymnast in your world.\n\nYour relationship with Sister Marcy blossoms. She is more than thankful for what you did for her sibling and you are happy to have the best friend you can\npossibly get.\n\nWhat really worries you that the imp master bastard was right. The portal to his world just won't open. If the prophecy of the weeping angel is true, well\nthere is no way to stop the impending doom. So, you just try not to focus on it.\n*achieve save_one\n*goto ending\n\n*label endlab\nDown the corridor, you find a computer terminal. You check it out and it seems to be working.\n\n\"Did you find anything interesting?\" Sister Mercy ask you.\n\n\"Well, there is no Cardstone installed.\" Your attempt to joke does not succeed.\n\nWhat would you like to search for specifically?\n*choice\n\t#Mechano - demonic hybrids (like Razor)\n\t\tMost of the information you find is either facts you already know or too technically specific that is proves useless. You learn however, that \n\t\tthey became so powerful that a new kind of weapon was introduced in order to provide for a decent means of quickly disabling them. This section,\n\t\thowever, does not state where you can find any of those.\n\t\t*set info_weapon 1\n\t\t*goto endlab2\n\t\n\t#Black-winged angels\n\t\tSister Mercy cuddles into you as you read the story of the powerful angels that were enslaved and the various experiments conducted on them and the various\n\t\ttypes of hybrids that the demons here tried to develop.\n\t\t\n\t\t\"So it wasn't just my progenitor,\" she remarks. \"I can't even imagine what it would be like to be in their shoes. Well, thanks for finding this information, ${name}.\n\t\t*set rel_mercy +1\n\t\t*goto endlab2\n\t\n\t#A map of the complex\n\t\tYou are under the impression that the signs around can tell you a lot. There are also fire emergency evacuation plans that can serve you well. However,\n\t\twhat you manage to dig out is the location of an armoury down along the corridor. It is probably not meant to be secret, however, it seems concealed for\n\t\taesthetic reasons. Anyway, you would have missed it if you didn't know what to look for.\n\t\t*set armory 1\n\t\t*goto endlab2\n\t\n\t#Your sister\n\t\tThere is a room called Lab of Souls that is supposed to be there. Your sister's name appears in the list of 'patients'. Your heart races wildly.\n\t\t\n\t\t\"I am not sure what the name of the chamber is supposed to imply, but if she is there, the Light will be able to save her.\" The priestess holds your hand.\n\t\t*goto endlab2\n\t\t\n\t#The mistress\n\t\t*set cl +2\n\t\t(Clues increase)\n\t\t\n\t\tYou read about several reincarnations of the mistress. You are amazed at the whole spectrum of female characters she manages to embody. Some\n\t\tof them actually appear to be Sisters of the cassock.\n\t\t\n\t\t\"Why are you so amazed?\" asks Mercy. \"There are so many people treading the dark path in this world. It is only natural that some of them end up in \n\t\tthe clergy.\"\n\t\t\n\t\tYou are not entirely sure she is right but decide that it is not the time to object.\n\t\t*goto endlab2\n\t\t\n*label endlab2\nWhat other topic would you like to research? [i]Please, don't pick the one you just did\t[/i]\t\n*choice\n\t#Mechano - demonic hybrids (like Razor)\n\t\tMost of the information you find is either facts you already know or too technically specific that is proves usless. You learn however, that \n\t\tthey became so powerful that a new kind of weapon was introduced in order to provide for a decent means of quickly disabling them. This section,\n\t\thowever, does not state where you can find any of those.\n\t\t*set info_weapon 1\n\t\t*goto endlab3\n\t\n\t#Black-winged angels\n\t\tSister Mercy cuddles into you as you read the story of the powerful angels that were enslaved and the various experiments conducted on them and the various\n\t\ttypes of hybrids that the demons here tried to develop.\n\t\t\n\t\t\"So it wasn't just my progenitor,\" she remarks. \"I can't even imagine what it would be like to be in their shoes. Well, thanks for finding this information, ${name}.\n\t\t*set rel_mercy +1\n\t\t*goto endlab3\n\t\n\t#A map of the complex\n\t\tYou are under the impression that the signs around can tell you a lot. There are also fire emergency evacuation plans that can serve you well. However,\n\t\twhat you manage to dig out is the location of an armory down along the corridor. It is probably not meant to be secret, however, it seems concealed for\n\t\taesthetic reasons. Anyway, you would have missed it if you didn't know what to look for.\n\t\t*set armory 1\n\t\t*goto endlab3\n\t\n\t#Your sister\n\t\tThere is a room called Lab of Souls that is supposed to be there. Your sister's name appears in the list of 'patients'. Your heart races wildly.\n\t\t\n\t\t\"I am not sure what the name of the chamber is supposed to imply, but if she is there, the Light will be able to save her.\" The priestess holds your hand.\n\t\t*goto endlab3\n\t\t\n\t#The mistress\n\t\t*set cl +2\n\t\t(Clues increase)\n\t\t\n\t\tYou read about several reincarnations of the mistress. You are amazed at the whole spectrum of female characters she manages to embody. Some\n\t\tof them actually appear to be Sisters of the cassock.\n\t\t\n\t\t\"Why are you so amazed?\" asks Mercy. \"There are so many people treading the dark path in this world. It is only natural that some of them end up in \n\t\tthe clergy.\"\n\t\t\n\t\tYou are not entirely sure she is right but decide that it is not the time to object.\n\t\t*goto endlab3\n\t\t\n*label endlab3\nSuddenly, the terminal goes black.\n\n\"Damn it!\" you curse.\n\n\"Don't be angry. It is good that we managed to learn something from it,\" says the priestess. \n\nYou nod and continue down the corridor.\n*if (armory=1)\n\t\"The armory should be here.\" You point at a panel that looks identical to the ones next to it.\n\n\t\"Are you sure?\"\n\t\n\tYou kick it and it slides away.\n\t\n\t\"Now I am,\" you smile as you enter the small room before you.\n\t*goto armory\n\t\n*elseif (intuition>1)\n\tYou get the feeling that one of the panels on the wall is not like the others.\n\t\n\t\"What is it?\" asks the priestess.\n\t\n\t\"I don't know.\" You press it and it slides away. \"It looks like some kind of an armory to me.\n\t*goto armory\n\t\n*else\n\t*goto endlab4\n\n*label armory\nIt is full of all kinds of devices and hand weapons. Unfortunately, you don't find anything familiar to you.\n*if (info_weapon=1)\n\tHowever, you manage to find the weapon you read about. It looks like a small remote control.\n\t\n\t\"This is the weapon that could defeat the imp master,\" you say to the pries
