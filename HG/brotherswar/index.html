ah, he's not the teacher for me\n        Very well, then,\n        *goto 8\n    #Not at all, at least he's honest\n        An interesting take on his teaching… fair enough\n        *goto 33\n    #A little, but I really need to learn...\n        Indeed, if it will someday save your life, the person who teaches it is of little significance.\n        *goto 33\n*label 33\nHe turns to you after a few moments, \"So are you just here to stare or do you plan on picking op a few hints in the art of combat? Mind you, my knowledge comes at a cost\"\n*choice\n    \n    #Never mind\n        \"Very well, cheapskate\", he taunts as you walk away.\n        *goto 8\n    *if sc >9 \n        #Tell me how to improve(-10 silver pieces, +5 combat)\n            \"Good, now listen up…\" he tells you things you would never have guessed, and demonstrates fighting techniques that seem almost alien to you but makes them feel easy to do. \"Now\", he continues, \"Would you like to learn a little more?\" \n            *set Combat +5\n            *set sc -10\n            *choice\n                #Yes please!(-20 silver pieces, +10 combat)\n                    What he tells you next about the weaker points in the human body and the best angles to attack from is all new news for you, and you feel very much enriched by the knowledge he has shared.\n                    *set Combat +10\n                    *set sc -20\n                    *goto 8\n                #No thanks...\n                     \"Very well\", he nods, \"Come back anytime if you've changed your mind.\"\n                     *goto 8\n            \n       \n    \n*label 23\nIt isn't hard to find the weapon stall, it is the one surrounded by onlookers at the center of the square. You hear sounds of awe as you near the stall and have to push through the crowd of people to see why. There is a man in a bright purple tunic doing demonstrations with his various weapons, he displays how one uses a Saber, it's heavy, curved blade allowing for powerful slashes. He then shows off his skills with a Gaelic Broadsword, it's length nearly matches the man's height, he shows off long, extremely powerful slashes, and jabs not unlike those of a spear, and finally, a short sword, with lightning fast(although very weak) jabs and slashes. He then notifies the crowd that all the weapons he had just displayed are \"up for grabs\". He lays out the swords with the prices attached,\nBroadsword = 80 silver pieces\nShort Sword = 35 silver pieces\nSaber = 60 silver pieces        \nThe people look with awe at the beautifully crafted, if extremely expensive, pieces of metalwork. As the crowd continues to disperse, you find yourself one of the last onlookers remaining. Do you plan on buying one of these weapons to give you the upper hand, or sword, in a fight. You have ${sc} silver coins left. You begin, I'll have the…\n*choice\n    *if sc >79\n        #Broadsword\n            *set sc -80\n            *set weapon \"broadsword\"\n            *set Combat +10\n            *goto 6\n    *if sc >59\n        #Saber\n            *set sc -60\n            *set weapon \"saber\"\n            *set Combat +7\n            *goto 6\n    *if sc >34\n        #Shortsword\n            *set sc -35\n            *set weapon \"shortsword\"\n            *set Combat +4\n            *goto 6\n    #Actually, I'll have a think about it...\n        *goto 7\n    \n           \n    \n*label 9\n*choice\n    #Talk to General Alaster \n        *gosub trial_end\n        By the time you shove your way the crowd to speak to him, he is in tears and exclaims between vigorous sobs that if the Breitheamh doesn't do justice to his son, he'll kill them both. You try to speak to him, but before you get a whole word out he's grabbed you by your collar and gives you an almost menacing stare, his teeth gritted and a steady flow of tears rolling down his cheeks. \"I've nothing more to say, but be warned, if justice isn't served this day, each ${man} who votes against me I shall have drowned and dismembered at the river's edge!\"\n        *goto 9\n    #Talk to the Peasant\n        *gosub trial_end\n        \"I spend day and night slaving in the fields for that king of his, my back's in tatters and my face weather beaten by howling winds. All this so I can be assaulted by a spoilt brat who decided he was above the law of the land.\" He shakes his head solemnly to the ground. \"There is no justice for men like me, and the lucky in this land have grown cowardly and dead-headed. The days of the great Cormac Ulfada, high king of Éire, have given way to the fat, loathsome men you see in power today….\" You can see his eyebrows turning inwards in into a furious, but hopeful, gaze.\" If I had my way, I'd bring us back to the glory days of this Island, in fact, WHEN I have my way I WILL bring US, the people, into a new era of prosperity a military success.\" Some of the onlookers laugh at him, but most stare back in stunned silence. \"That sort of talk will have you killed in times like this, we all know the rules of the Brehon. We have the right to elect a new king, but he will kill anyone who speaks out\", a woman whispers urgently to him.\n        \n        \"He's right, though, change in this land after many years of stagnancy is what we all need!\", another argues. All but a few in the crowd murmur in agreement, it is clear he has the support of the perhaps fifty, almost all, of the onlookers. \"If you have the courage to speak these words of blatant truth, Cathal, then I wouldn't half the man you are if I did not voice my support, but what you speak of has been tried too many times to count, and the results are always crushing. The Ferghus has forsaken the Brehon laws, and does what he likes to the people of the land. There isn't the manpower in all the peasants combined to contend with Fergus', we would need support from other clans for a coup of this scale, and sadly, Ferghal's relations with most of the neighboring are too strong to twist or break.\"\n        *goto 9\n    #I'm ready to make a decision\n        *gosub trial_end                          \n        As you come to your conclusion, the Breitheamh jently taps his winding wooden staff, somehow still with leaves growing from it, down on the table in front of him. The noise of the hall fades almost instantly in responce, and the voting commences. \"Raise your right hand if you believe the defendant is guilty…\" Do you raise your hand?\n        *choice \n             #Yes\n                 Along with what is only barely the majority of the people present, you raise your hand.\n                 *goto 10\n             #No\n                 Along with what appears to be, only barely, the minority of the people present, you keep your hand at your side.\n                 *achieve farmer\n                 *goto 10\n*label 10\n*if sc \u003c0\n    *set sc 0\nAfter glancing his eyes across the room, the Breitheamh gives a sober nod and declares, \"The court finds you guilty of murder, and so you shall hang on a noose by sunset, as compensation to General Alastar, your lands and property will be transferred to the hands of Alastar and his kin. This decision with you, the people, as my witnesses, is final.\" He slams his hammer down and three of his guards rush forward, chains in hand. The entire hall seems to fill with sadness and guilt from those that voted against him, it is clear they voted in  favour of the General as a way to stay out of trouble, rather than genuinely believing he was in the right. Many of the older townspeople break into sobs, while some of those that voted in his defence raise their voices in protest. The guards shove their way through the crowd to the peasant.\n\nThe situation appears to be diffusing…. until a rock is brought down on the head of a guard, the guard collapses and the attacker drops the bloodied rock, his face pale in surprise, an aura of sheer terror descends on his face. After a split second of silence, the crowd scatters, along with the farmer. The town maintains a solemn atmosphere for the rest of the day, most people decide to stay inside after the attack. There are whispers of fears of retaliation by Ferghus' men, and even more prominent are the rumours  of an uprising, led by the escaped farmer, Cathal. The guards of lord Ferghus' castle have refused your entry, saying after the vents of the day Ferghus may be in danger and they seem to be too scared to wake him from his early slumber for permission for you to enter. They recommend to you the local inn and you seem to have precious little choice in the matter. You spend the night quizzing yourself on what the next day shall bring. \n*finish\n\n*label 21\n*choice\n    #Yes, but thanks\n        \"Of course, no problem, $!{name}\", he walks off briskly to the other room, \"I better let you change in privacy\", he says.\n        *goto 24\n        \n    #Nah, these rich clothes aren't really my style anyway\n        He gives you a wide smile and passes the clothes he was carrying to you, he turns to walk to the other room, \"I better let you change in privacy\", he says.\n        *set chang +1\n        *goto 24\n*label 24\n*choice\n             #Thanks\n                He continues into the next room as you get changed into\n                *if chang =1\n                    the plain outfit Carrick had kindly given you.\n                    *goto 5\n                *else\n                    the fancy outfit Ferghus had given you.\n                    *goto 5\n                    \n             #That's not necessary(flirting) \n                     He turns, a little reddened, with a raised eyebrow, \"Perhaps it isn't \", he responds, sitting on the bed beside you. You have a feeling you know where this is going, what do you do?\n                     \n                     *choice\n                         \n                         #Go through with it\n                             *goto_scene romance\n                        \n                         \n                         #No thanks...  \n                             He sees your sudden lack of enthusiasm, and stands up looking quite disappointed. \"Sorry\", he mutters, \"I thought you were……suggesting something else.\" He walks briskly to the other room, you can see the red embarrassment creeping to his neck as he walks away. You get changed and bid her goodbye to the other room. He replies with a hasty \"Bye now\" as he gets to work brewing medicines and doing gods know what.      \n                             *goto 5\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n    *label purchased\n    *return\nRemember earlier how we told you that the first three chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n    *subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2021-01-07 $3.99 $2.99 purchased\n*abort\n", "chapter4": "*Page_Break Chapter 4\n*image Chap4.png\n[i]\"The uncivil kerns of Ireland are in arms,\n\nAnd temper clay with blood\"[/i]\n\n-William Shakespeare, Macbeth\n\nYou awake to an urgent banging on your door, you recognise the man as one of those who had been standing alongside Cathal when the violence broke out last night, he hands you a note, glancing at you in the dim light  before whispering \"the winds are changing\". He then pulls his hood up and briskly marches away. The letter is written well, using the language of a reasonably literate man, while basic skill in reading is fairly common, writing is certainly a rare skill and only the highest born of men can afford the time and tutoring it takes to master it. \n\nIt requests your presence beside the hunters cabin in the woods. Outside the sun has yet to rise, and moon seems to be shielding its eyes with clouds. It seems this proposed meeting is not the legal kind, but it is clear you are not alone. Outside you hear the scutterring of footsteps towards the forest, outside the cobblestone street is dotted with men and women, with the appearances of people who do not wish to be seen. The note almost definitely wasn't for you, the room numbers painted on the doors have faded and in the dim candlelight of the inn you could be mistaken for anyone. Do you wish to accept this invite?\n*choice\n    #I need to find out what's going on!\n        This town is getting stranger and stranger, and wise men know when trouble starts to brew it is useful to know its source.\n        *goto 12\n        \n        \n    #\"The winds are changing?\" I like the sound of that.\n        Life beyond your fathers castle has been far more than you could ever have imagined, the world is a place of mystery and intrigue, and what better way to see what this life can truly offer than to be part of it's excitement!\n        *goto 12\n    #Definitely not, these folk are stirring up trouble!\n        You wake up with a start, one man lashes a rope around your wrists while talking quietly to a man who presumably is keeping a lookout outside the door in the hall. It takes a few muffled screams to realise you have been firmly gagged, the man glares down at you as you lie in bed and gives you a firm punch in the gut, threatening to do worse if you continue to struggle.\n        *choice\n            #Submit and don't panic\n                *goto 17\n            #Kick and yell\n                He seems only mildly irritated by your pathetically weak kicks on his bear-like body. He holds one of your legs in both arms, threatening to break it with one short snap, it's difficult not to take the threat seriously, as your arm seems like a twig in between his gauntlets. You are so tightly gagged your screams are barely audible.\n                *goto 17\n*label 17\nWith big burly arms he lifts you onto his shoulder and half limp-runs out of the sleeping inn, the floorboards creek and candles flicker as you make your way downs and into the dark but seemingly alive street. Around thirty townsfolk creep under the cover of the shadows, past watchtowers and guard posts, toward the outer raised banks of the town. You see the people ahead of you using ropes to abseil down the steep banks, like escapees from a prison. When the half-giant of a man who is carrying you makes it to the banks, he chucks you down, as if you weighed as much as a baby, to two smaller men awaiting you below. You are roughly thrown on the back of a mule, and briskly hauled deep into the thick pine forest.\n\nYou arrive in a small clearing beside a huntsman's cabin, when you are lifted from the back of the mule, you see there are around fifteen townsfolk, some of whom you recognise, listening intently to a speaker with huge wolfhounds circling his legs protectively. A long dagger hangs at his belt and his arms are held firmly together at his back as he strides forwards and back.\n\n\"The winds are changing\", he says as he stops and turns towards the listeners, \"the norse attacks on our neighbours grow more frequent with each passing week, how long, do you think, before they move to us? And when they do, what chance will we have with an incompetent, glutonous oaf as our leader? We have fewer guards than we have merchants, and, as of last night, a general whom his people detest. Only if we take these matters into our own hands, will our lives be preserved!\" The people murmur eagerly in agreement. \"The bandits that roam our streets and roads have been left untamed and they grow bolder, Ailbhe's ${son} will stand testament to that!\" he says as he turns to you. The people turn around and most, based on the surprised looks on their faces, recognise you. \"${he} comes here with more warriors than Ferghus' entire garrison, perhaps your grace would like to explain ${his} presence and ${his} business here in Kanturk? Perhaps you are here in support of our cause? Were that the case, m' liege, you'd be most welcome.\" \n\nHe stares into your eyes, somewhat accusingly. \"Though your cozying up to Ferghus, a man who time and time again has neglected the Brehon laws, would make me question the rationality of my hopes…  Our people have tried to hold an election for a new King once, and said king was assiasinated that very night, don't pretend you don't know by whom. The man is as ambitious as he is rich. A handsome ransom from your father would serve our cause well, I would say. Several of the people nod in agreement, while others just stare from him to you in disbelief at the idea of a kidnapping of the ${son} of the widely feared Ailbhe of chlann Scrufa.\n\nHe glances at you, then to his listeners, before saying with his eyes closed and face to the moonlit sky, \"The winds are changing\", the people, some of whom are a little shaken, all in unison repeat, \"the winds are changing\". The crowd then disperses into the forest, all taking different routes back to Kanturk to avoid being spotted by guards. Once the crowd is gone, and all that are left are the speaker and a few of his crudely armed 'soldiers', if you could call them that. You are thrown back onto the mule mule and taken deeper into the pine forest, along with a small convoy of some of the 'soldiers' who appeared to be leading the meeting. Do you try to talk your way out of this?\n*goto 20\n                \n        \n        \n       \n*label 12\nYou nestle your hooded cloak around your bare shoulders and, just in case, tuck a knife into your leather shoes. You head outside and walk in tandem with the other attendees, even though the darkness is harsh and the group dispersed, you count some thirty silhouettes as they carefully make their way to the outer walls of the town. Along with the other walkers you slip between wooden stakes and use the shadows of the buildings around you to stay out of sight from the rickety wooden watchtowers that can be seen dotted through the town, for the first time since you arrive, you can see through the jolly facade of Ferghus and see him for what he truly is, a warden in a city of prisoners. some of the villagers further ahead have leashed ropes around he spiked but low down walls that surround the raised banks that coil around the town, one by one you abseil down the wooden wall and make your way into the forest.\n\nThe wind whistles through the lean, bristly pine trees and bites at your face. You find your way to a clearing where around 15 people sit and are listening intently to a man who is walking back and forth, his arms together at his back and a long dagger at his belt. You sit down in the group as a steady stream of people are arriving into the clearing, and listen to the man as he speaks. \"The winds are changing\", he says as he stops and turns towards the listeners, \"the norse attacks on our neighbours grow more frequent with each passing week, how long, do you think, before they move to us? And when they do, what chance will we have with an incompetent, glutonous oaf as our leader? \n\nWe have fewer guards than we have merchants, and, as of last night, a general whom his people detest. Only if we take these matters into our own hands, will our lives be preserved!\" The people murmur eagerly in agreement. \"The bandits that roam our streets and roads have been left untamed and they grow bolder, Ailbhe's ${son} will stand testament to that!\" he says as he turns to you, those sitting around you gasp in surprise, you had taken great care to being unnoticed but the speaker must have gotten a tip from someone, \"${he} comes here with more warriors than Ferghus' entire garrison, and ${he} attends our meeting, perhaps your grace would like to explain ${his} presence and ${his} business here in Kanturk? Perhaps you are here in support of our cause? Were that the case, m' liege, you'd be most welcome.\" He stares into your eyes, somewhat accusingly. \"Though your cozying up to Ferghus would make me question the rationality of my hopes…\" \n\nHe gives off a short, high pitched whistle and his wolfhounds spring to his side, they stand at half the height of your fathers best stallion and weigh the same as a full grown man. They circle his waist protectively and allow their tongues to loll out of their mouths as they pant gently. Three men who seem to appear out of nowhere hold your arms to your side and bring you to your knees. They bind your hands painfully with thin rope behind your back and push your chest to the ground.\n\nYou see the townsfolk out of the corner of your eye, some look on nervously while others grin wide, zealous smiles. \"A lordling's ransom would serve our cause well, your father will be quick to pay it if he is as honourable as the filís are so eager to claim, if not…… we can show how highly we think of the lords of the land to  Ferghus, with your head on his doorstep.\" He says these words coldly, it does not seem, despite his cruel threats, that he is a man of violence, but rather, a man looking for true change for his people and will do anything to achieve it. He glances around to the townspeople attending, \"A word of this meeting to any guard or worker of Ferghus and we all know the consequences, in light of this most interesting development, our meeting has come to an early close.\"\n\nAs quickly as the party had arrived, it scattered, with people taking separate routes to avoid being spotted by guards on their way in. You are thrown on the back of a mule and taken deeper into the pine forest, along with a small convoy of some of the crudely armed men who appeared to be leading the meeting. Do you try to talk your way out of this?\n*goto 20\n*label 20\n*choice\n    #No, I better keep my mouth shut\n        Indeed, it probably wouldn't be wise to agitate your aggressors any more.\n        *goto 15\n        \n    #It's worth a try\n            The speaker looks back at you as you begin…\n            *goto 14\n*label 14\n*choice\n    #I have enough money at the inn to pay my ransom!\n        \"Is that so? Young ${boy}, that wasn't very smart of you to tell us that, was it? I'll have someone search your room for it…but you remain with us until your father coughs it up.\" You have a feeling you won't be seeing that money again.\n        *set sc 0\n        *goto 13\n    #You have no chance against Ferghus or my father!\n        He smiles optimistically back, \"I won't disagree with you there, ${boy}, but our numbers are growing, and neither Ferghus not your Father have the faintest idea where we camp.\"\n        *goto 13\n    #I will bring my warriors in support of your cause\n        *if Persuasion =30\n            He looks at you quizzically, \"What a godsend that would be, 'tis a shame we simply can't trust you. One of our guards on the inside informed us Ferghus had hoped to marry you off to his ${daughter}.\"\n            *goto 13\n        *else\n            \n            \"I'll not have you lying through your teeth, trying to shame me! Silence, runt\" He calmly takes out his sword and hits the flat of it on the back of your head. You can tell by the way he moved it he put barely any of his strength behind the blow, but nonetheless it sends a pounding ache shooting across the inside of your head.\n            *set health -10\n            *goto 13                        \n*label 13\nQuite a success that was… What will you do now?\n*choice\n    #I'll give it another go\n        *goto 14\n        \n    #It's probably best just to zip it\n        *goto 15\n*label 15\nNo one really says much as morning begins to break, the trek continues for(based on the position of the sun) around two hours. It is only when the sun has fully surfaced from the horizon that the men give their mules some rest, you see the 'Yellow Hills' in the distance, although they are more like jagged cliffs than hills. The soldiers drink their bread and milk but decide against giving any to you, after just a ten minute rest you set off again, the half a mile long valley under the Yellow Hills had filled up in the a great flood many centuries ago and had formed a vast swamp, surrounded by sickly thin trees. As you travel along its wide banks, nearing the Yellow hills, a wooden fort comes into view, tents and cattle surround it's low outer walls. You recognise the banner that flies above its walls, an image of an Irish elk, a proud and, if threatened, fearsome beast. \n\nIt's antlers splay out like the branches of great oaks, twice the length of a man from tip to tip. Its lordly head is supported by a long, muscular neck. There is no questioning whose banner it is, Aonghus, your uncle, high chief of Chlann fia ollmhór, clan of the clan of the Irish elk. One of the soldiers looks back at your surprise curiously, but then gives a toothy, knowing grin. He speaks croakily in a thick, southern accent barely comprehensible to your ears, \"Your uncle's seen sense in what we're working for. In fact, he's the one who sent our boys after you!\"\n\nHe turns to the man who had led the meeting last night, \"Fionn, check it out, the look on Ailbhe's ${boy}'s face is precious\", he chuckles. Despite the shock you feel, almost as surprising is the sight of men, not unlike those guarding you, feeding the malnourished and the poor who are being slowly but steadily carted into the tents outside the walls. They appear to have come from the same direction as you, and are holding on to the ragged soldiers for dear life as they ladle soup into their eager, quivering mouths.\n\nAnother short, scruffy guard in your convoy states glumly as you arrive at the stout wooden gates, \"We have good reason for what we're doing when we kidnap you, ${name}, Ferghus is a greedy pig and needs to be stopped by any means necessary or the long line of the starving people Ferghus has neglected, looking for our help, will only grow.\" Closer up the tents look more like slums. \"The laws of the Brehon have been corrupted and changed by him in his lands, the man has decided to play god.\" Starving babies lie still against their mothers breasts, men and women hunch over their all too visible ribs in agony. \"We have turned to your father for help time and time again, but our words fall on deaf ears\", he says, looking at a woman in rags clutching her suckling baby. \n*choice\n    #Liar!\n        \"You truly believe your father cares more for these people than he does for the pheasant on his plate? Young as you are, ${name}, I did not think you naive.\"\n        *goto 25\n    #Stay silent...\n        He looks up at you, \"You know my words to be true, don't you?\"\n        *choice\n            #Nod\n                \"Of that, I am glad, but if we are to get the money we need for the uprising, ransom you we must.\"\n                *goto 25\n            #Shake your head\n                He looks up at you sullenly, \"A lords innocent pup to the last.\"\n                *goto 25\n    #Agree\n         \"Of that, I am glad, but if we are to get the money we need for the uprising, ransom you we must.\"\n         *goto 25\n*label 25\nYou are ushered through the gates by awaiting guards, and brought past what appear to be training grounds, with men duelling with wooden staffs, swords and axes. Others to your right are hammering red hot bronze and some iron into weapons under the cover of weather beaten tents. You are helped down from the mule and the binding around your wrists is undone. \n\nStill massaging your wrists and with saddle chafing from the long trek on the mule, two cold faced men, with armour and helmets you vaguely recognise from somewhere, urgently bring you to the inner wall. Although it is still wooden, it towers twice as high as the outer walls and has platforms all the way along from where several guards are pointing down and presumably mocking you in a language you have never heard. You are brought to a fairly lavishly decorated tent, with two guards in very fine lamellar armour and full face bascinets, a stark contrast to the hastily crafted leather armour of the guards on the outer walls. \n\nYou are brought in and sat down an an oak chair with feather pillows, and almost immediately you feel your aches and pains starting to heal. Your uncle sits across from you, a courteous smile on his face. Over his shoulder hangs a heavy woollen chequered cloak. His outfit offers little signs of wealth, aside from a jewel encrusted golden brooch that holds his cloak tight to his chest, and a gold nose ring. His ginger-grey hair stands up on his head, adding to his already imposing size. At the side of his throne-like wooden seat is a wolfhound gnawing on a bone the size of your arm, by the looks of it, the dog weighs more than you do. \"My apologies for the manner you have been brought here, ${name}, but your journey to me was taking far too long. I had hoped you would spend only a few hours in Kanturk before coming to me, but things rarely go to plan, do they?\" He looks at you expectantly...\n*goto 26\n\n*label 26\n*choice\n    #Did you have to kidnap me?\n        He looks at you somewhat apologetically, \"Regrettable as it was, it was more than necessary, young ${name}. The viking mercenaries we hired don't come cheap, a ransom from your father would give us a few more weeks of security… and of course some leverage if Ferghus or my brother, Ailbhe, find the true location of this half-hazardly built camp\", gestures to the walls through the entrance of the tent with an expression of distaste.\n        *goto 27\n\n*label 27\n*choice\n    #Vikings?\n        He nods impatiently,\"Indeed, unruly as they are, they make rather good warriors. When the time for battle comes, we will need every blade and helm we can muster.\" Suddenly the strangely armoured men and foreign language makes sense.\n        *goto 28\n    #How do refugees know where you are but my father or Ferghus doesn't?\n         \"A very good question\", he says with a smile, tapping on his wrinkled forehead with a grin. \"We have men on the inside, I guess you could say. Take Fionn, for example, the man who usually leads the forest meetings, I believe you two have been acquainted? Our men on the inside go there to reconvene, for inside the town of Kanturk, the walls have ears. Men like Fionn occasionally bring other promising townsfolk to the forest to recruit them, as you may have witnessed at the meeting. We use the men on the inside to help locate tenants who are to be evicted, and those who are being abused or enslaved by Ferghus' men, so we can bring them here at the dead of night to avoid being found. I am no fool, though, ${name}, we will make mistakes eventually, we will certainly be found at some point, but we hope to have time to prepare before that day comes.\" \n        *goto 27\n           \n*label 28               \n*choice\n    #But you are supposed to be fighting them off!\n        He grimaces a little, \"Aye, and you with me, but seeing the way in which the poor under Ferghus, and indeed your father, have faired has left me wondering what I am truly defending. So I decided I would negotiate with the norse clans to give me time to claim land from my brother and your would-be father in law. It turns out they could offer far more than time, they have sent near eighty odd men to aid me, requesting one third of all the newly conquered land from my brothers kingdom, I still needed, however, more elite mercenary vikings to thicken out my ranks for the war that is soon to come.\"\n        *goto 29\n    #But my father sent men to aid you against the vikings\n        \"You think it an act of kindness, truly, ${boy}? When a true king sends men to die, he fights at their side, rather than using lesser lords to do his dirty work. Now, with the support of the vikings and the backing of the people, I am no longer a lesser lord, and as the norsemen say, 'the winds are changing'.\"\n        *goto 29\n    #You betrayed my father!\n        \"I betrayed no one, your father betrayed his people with insurmountable debts and tithes, leaving them to rot. The land of Munster will be a far better place with me at its head, even if certain parts must be left in viking control. My brother was never fit to rule, he lacks both the empathy and wisdom necessary to be a successful leader. His people are starving, and he can only sit and watch, it is for these reasons tens of people every day flee from your fathers village in search of food and a lord who will fairly tax and protect his people\"\n        *set Aonghus -5\n        *set Ailbhe +5\n        *goto 28\n    #How do refugees know where you are but my father or Ferghus doesn't?\n         \"A very good question\", he says with a smile, tapping on his wrinkled forehead with a grin. \"We have men on the inside, I guess you could say. Take Fionn, for example, the man who usually leads the forest meetings, I believe you two have been acquainted? Our men on the inside go there to reconvene, for inside the town of Kanturk, the walls have ears. Men like Fionn occasionally bring other promising townsfolk to the forest to recruit them, as you may have witnessed at the meeting. We use the men on the inside to help locate tenants who are to be evicted, and those who are being abused or enslaved by Ferghus' men, so we can bring them here at the dead of night to avoid being found. I am no fool, though, ${name}, we will make mistakes eventually, we will certainly be found at some point, but we hope to have time to prepare before that day comes.\"\n         *goto 29\n            \n      \n*label 29\nHe clears his throat as he finishes, \"The people under both your father's rule and that of Ferghus have attempted to hold elections for new rule. Needless to say, the candidates always died, or went missing, before the elections. Now, ${name}, will that be all or do you have more questions you wish answered? I warn you I am a busy man and you may not get this chance again.\"\n*choice\n    #I need more answers, Aonghus\n        \"Very well, ask away.\"\n        *goto 26\n    #You bastard! My father will make short work of you\n        He stares at you with a narrow, furious glare, but does not raise his voice in the slightest, \"though a ${boy} of my own blood you may be, you will never be more than a fragment of a ${man} if you do not soon learn from the grave mistakes of your father.\" He moves his head so it points slightly diagonally towards the exit of the tent. \"Cathal\" he says grumpily, \"Take my ${nephew} to the tent, ${he} is in need of rest.\"\n        *set Aonghus -10\n        *set Ailbhe +10\n        *goto 30\n        \n    #How could my father have done this to his people? Perhaps you are in the right...\n        He looks back at you, his eyes betray a hint of pride, \"Green as you are, your words speak volumes of the ${man} you will one day be. I am glad that in the face of as grave a truth as this, you stand proud, like an elk, rather than cower like a boar. Although technically you are my hostage, and this may sound strange, but you are a ${boy} of my own blood. As such I want you to know that I am your uncle, and if you need anything, aside from, of course, your freedom,\" he chuckles as he continues, \"You may have it. Cathal\" He beckons a man behind you, \"show our hostage, or guest if you like, to the tent. My ${nephew} is in need of rest.\"\n        Perhaps you would like to call your uncle up on that favour he had offered?\n        *set Aonghus +5\n        *set Ailbhe -5\n        *choice\n            #Nah, too soon\n                You're probably right, you only just got here!\n                *goto 30\n            #I've never been one to miss an opportunity\n                Your uncle laughs loudly as you speak, \"As I said, you're definitely my own blood, you remind me of a younger me, but no, for now you must rest, child\".\n                *set Aonghus +5\n                *set Ailbhe -5\n                *goto 30\n        \n*label 30\nCathal, whom you recognise almost immediately as the farmer from the trial, who was, supposedly, to be put to death. He shows you to the smaller but almost as finely dyed and decorated structure not four tents from your uncle's. He brings you in, giving you a distracted, hurried smile. He then walks from the tent briskly and a little nervously.  Do you have anything to ask? \n*goto 31\n*label 31\n*choice\n    #What's the rush?\n        \"No disrespect, ${name}, but as far as I can tell your father is no better than General Alaster or Lord Ferghus, so don't expect me to feel to kindly towards you. Anyway, I have cattle to tend to, to feed the new round of refugees from your father's own village. That all?\"\n        *goto 31\n    #How did you end up here?\n        \"After me and some of the other men on the wrong side of the law escaped the town hall where the trial was, we wasn't sure where to go, so we hid out in the forest until Fionn and some of his lads rescued us, been here e'er since. Something else you got to ask?\"\n        *goto 31\n    #What do you think of my uncle?\n        \"'Far as I'm concerned he's a godsend, I owe my life to him for rescuing me. I pray to all the gods I e'er heard of, christian and ancient alike, that he succeeds in doing the same for the people under the rule of Ferghus and, pardon me, your father.\"\n        *goto 31\n    #I could use some rest, thanks (end conversation)\n        *goto 32\n*label 32\nAs you sit down your eyes almost immediately feel like led, you lay down and feel your tense muscles finally relax as you start to drift off. You wake up late into the afternoon the same day, startled from very strange dreams. One of them, however, is as vivid in your mind as it was while you slept. An elk and boar circle each other, the elk is swaying it's great antlers back and forth in defence as the boar looks for an opening. The ground is a vast swamp blanketed with human skulls which the two animals use as stepping stones as they  circle. The boar feints a retreat right, but doubles back and manages to get under the great antlers and rips at the elk's neck with it's tusks. The elk screams in pain, it staggers in the swamp, before clumsily collapsing onto the boar. The boar, unable to move with the weight, sinks slowly into the marsh, drowning as it tries to squirm away. What do you think this dream means?\n*choice\n    #The war between my uncle and father will end in mutual annihilation\n        If the dream truly stands for that, then let's hope the war doesn't happen.\n        *goto 33\n    #The war will end with my uncle on top\n        Interesting reading of the dream… and how would that make you feel?\n        *choice\n            #Disgusted, I remain loyal to my Father\n                The boar clan has always been proud and loyal to it's own blood.\n                *goto 33\n            #It is the only just ending\n                Indeed, if what your uncle's men and allies say can be believed, your father deserves no place on the thrown.\n                *goto 33\n    #I take little interest in superstition\n        Of course, you never really took to the ancient ways.\n        *goto 33\n*label 33\nYou step outside of your tent to a scene bustling with people, similar to the marketplace in Kanturk. The chatter of people is largely drowned out by the hammering and sharpening of blades, and the clunking sound of wooden staff on staff as men hone their skills in the ring across the board walk path from your tent. There are rabbits and cattle thighs roasting on spits, men in almost full armour briskly walk by, weaving their way through carts that are bursting with food and weaponry.\n\nA small cluster of servants follow behind Aonghus as he talks to the meeting leader, Fionn. Fionn holds a finely decorated half helm under his shoulder, while fingering the ringed pommel of his longsword. It hangs in a violet scabbard at his waist. A thin navy-purple cape hangs from his shoulders, woven silver forms deer-like silhouettes against the deep hue. He was clearly only wearing the ragged-looking tunic at the meeting to seem less conspicuous if caught by guards. If anything, he appears to be a small lord or highly successful general.  Aonghus stands a few inches above Fionn, with heavy chain mail and chequered green and red cloak only half concealing his bloated stomach. He nods to Fionn, handing him a parchment, without another word spoken, Fionn leaps atop a shining black stallion and gallops under the stout inner gate, through the outer walls and around the banks of the marshlands towards the deep birch forest.\n\nSeeing you from across the street, Aonghus walks over, giving you a warm smile. \"I trust you are well rested, my ${nephew}? I have a few moments free time and had hoped we would catch up.\"\n*goto 34\n*label 34\n*choice\n    #Sounds great\n        His eyes beam back at you, \"Excellent, ${lad}, follow me, then.\" He walks on with you rather excitedly, after giving you an almost winding pat on the back.\n        *set Aonghus +10\n        *set Ailbhe -10 \n        *goto 35\n    #If I must...\n        He gives you a somewhat disappointed nod, his cracked lips twisted in a frown. \"Follow along then…\", he says as he walks off. \n        *set Aonghus -5\n        *set Ailbhe +5 \n        *goto 35\n    #A catch up with my kidnapper? No thanks!\n        \"Are you sure, ${name}? If that is your wish then we shall go our separate ways… Although with you still as my prisoner…\"\n        *choice\n            #Yes\n                 He looks down on you with disappointment in his eyes, \"Very well then, ${name}, he looks to one of the servants behind him, you recognise him as Cathal. \"See to it my ${nephew} has everything ${he} needs.\" Cathal looks at you somewhat sulkily, \"'Course, m' lord.\" Aonghus heads off to the the outer walls, shouting orders at guards and servants as he leaves your view. You are taken to your tent and your hands are tied together once more, when you protest, Cathal just scowls at you, and continues to tie, muttering \"Ailbhe's bastard son…… runt of Chlann Scrufa……\"\n                 *set Aonghus -20\n                 *set Ailbhe +20 \n                 *goto_scene chapter51\n            #No\n                *goto 34\n               \n    #What is Fionn doing?\n        \"Aah\", he begins, \"I understand this may be quite awkward for you, ${lad}, but he is bringing to your father the notice of your capture… and of course the requested ransom\", he looks down at you sympathetically.\n        *goto 34\n*label 35\nHe strides alongside you, \"My… err… ${nephew}\", he says without looking at you, \"I hope you do not think the less of me for your capture,  wars are very expensive, and I think you can understand my reasons for going to war, whether or not you truly agree with them. The main reason I had you captured, is so you can be brought to my side and I could show you the truth about your fathers rule, in the hopes that, should you one day rise to your father's throne, you will make a just ${king}, and redeem the disgrace my brother has put on our family name. You are nearly a ${man} grown now, you will give me your decision and be done with it. Do you or do you not see that the war I wage is just?\", he asks sternly. He turns his head to you, raising a bushy eyebrow, he is awaiting a response from you. \n*goto 36\n*label 36\n*choice\n    #Actually, I'm not fully sure why you are going to war\n        \"I see, then of course all of this must be difficult to comprehend? Ferghus has always been a poor leader, his men are like untamed dogs, they plunder and damage the property of the people they are there to protect. Ferghus imposes higher taxes than his poorer people could dream of paying. Your father is almost identical in his rule, though in terms of taxes his tyranny is to a lesser extent, his people only remain better off than Ferghus' because he pillages the lands of the lesser lords in Leinster and uses cattle raids to meet his people's demand for food. It is, as you can probably tell, an unsustainable way to rule. Now that you are more informed, what do you think?\"\n        *goto 36\n    #Your war is just, I stand with you\n        \"And you are certain of this, ${name}?\", he asks seriously.\n        *choice\n            #I am\n                \"Well, I'm glad\", he says. Although he is refusing to look you in the eye, you can tell he is beaming.\n                *set Aonghus +20\n                *set Ailbhe -20 \n                *goto_scene chapter4part2\n            #Of course!(Lie)\n                \"Well, I'm glad\", he says. Although he is refusing to look you in the eye, you can tell he is beaming.\n                *set Aonghus +10\n                *set Ailbhe -10 \n                *goto_scene chapter4part2\n            #Actually...\n                *goto 36\n    #What you have done cannot be forgiven, I remain on my father's side\n         \"And you are certain of this, ${name}?\", he asks seriously.\n         *choice\n            #I am\n                \"I see, very well, then our conversation ends here, my ${nephew}. I trust you and your… Father will be reunited shortly. Let us hope he pays up soon, lest I be stuck with you\", he says with forced jest, but if ever a man had been heartbroken, it was him at that moment.\n                *goto 38\n                \n            #Actually...\n                *goto 36\n*label 38\nHe looks down on you with disappointment in his eyes, \"Very well then, ${name}, he looks to one of the servants behind him, you recognise him as Cathal. \"See to it my ${nephew} has everything ${he} needs.\" Cathal looks at you somewhat sulkily, \"'Course, m' lord.\" Aonghus heads off to the the outer walls, shouting orders at guards and servants as he leaves your view. You are taken to your tent and your hands are tied together once more, when you protest, Cathal just scowls at you, and continues to tie, muttering \"Ailbhe's bastard son…… runt of Chlann Scrufa……\"\n*set Aonghus -30\n*set Ailbhe +30 \n*goto_scene chapter51\n\n        \n    \n    \n    \n        \n        \n    \n\n        \n        \n        \n        \n\n\n    \n            \n        \n   \n                \n\n\n        \n\n               \n", "chapter4part2": "He ushers you his own tent, ordering all of his guards and servants to leave so that you are both out of earshot from anyone but each other. He rests his hand protectively on your shoulder, \"My ${lad}, I have some things that need to be said, and we may not have an opportunity like this for much longer. War is looming over us, my spies tell me Ailbhe has set up a camp not unlike ours just outside Kanturk. Ferghus has reported your… rescuing, if you would be so forgiving, and Ailbhe has assembled an army. He has intimidated the lesser lords of Tipperary and Limerick into lending him troops. He has always known of my criticism of his… methods in ruling. It is for this reason that I was banished from Chlann Scrufa almost a decade ago, but the Gods had given me a task. In my dreams, they sent to me a deer like no other, an Irish Elk. Beautiful, stubborn and proud. \n\nThey said that when the time is right for me to take my brother's tyrannical throne, they would send it to me again. In honour of the gods, I began a new  clan, Chlann Fia. With the silver my Father had left me, I had built Caiseal i bPort Láirge, Waterford Castle. I bought land and brought in tenants to create a sustainable income. \n\nI knew I would need every silver piece I could get, wars are expensive things, ${name}. So I waited and waited, year after year. I even started to question whether I had had the dream after all. Not four months ago, another Irish Elk appeared in my dreams. It was older and weaker than the one that had been sent before, but protected under its stomach was a young fawn. It hid beneath it's fathers legs timidly, but his father nudged ${him} forward. As the dear stepped out from under it's father's crumpling frame, it began to sprout beautiful antlers, larger than any I had seen\", Ailbhe looks at you, though he doesn't appear to be present in mind, but still in his dream, \"I pondered and tried to decipher what it meant, it was only when you arrived that it finally dawned on me what the Gods had asked of me. To bring my heir to power, so that he may rule rightfully in the place of my menace of a brother…\"\n*set sig +1\n*choice\n    #But you have no sons or daughters\n        \"That is what I had thought too, until one of my guards had heard you whispering in your sleep of an Elk and Boar. My dreams had told me the part I had to play in this new beginning, for you, my ${son}, just as your dreams have told you.\"\n        *goto 1\n    #You have an Heir?\n        \"Indeed, and I had no idea of it, until one of my guards had heard you whispering in your sleep of an Elk and Boar. My dreams had told me the part I had to play in this new beginning, for you, my ${son}, just as your dreams have told you.\"\n        *goto 1\n*label 1\n*achieve father\n*choice\n    #Wait a second...\n        \"Of course you are surprised, my ${lad}, I myself was, in truth, terrified to even speak to you after I had learnt the truth, to properly see what my Brother had made of you. I was as proud as I was relieved, to have you sprout into the ${man} you are from my own seed\", Aonghus takes his hand from your shoulder, perhaps apologetically. \"You must believe me, ${name}, when I say I had no idea until you arrived that you were my own. For the many lost years I owe you, I am sorry.\"\n        *goto 2\n        \n    #But how?\n        \"Of course you are surprised, my ${lad}, I myself was, in truth, terrified to even speak to you after I had learnt the truth, to properly see what my Brother had made of you. I was as proud as I was relieved, to have you sprout into the ${man} you are from my own seed\", Aonghus takes his hand from your shoulder, perhaps apologetically. \"You must believe me, ${name}, when I say I had no idea until you arrived that you were my own. For the many lost years I owe you, I am sorry.\"\n        *goto 2\n*label 2\nHe looks at you solemnly, \"The reason I had to question you outside, was because it would be too cruel to tell you the truth if you were a ${man} like Ailbhe\", he holds your wrist gently an his huge hands, facing your palm upwards and running his index finger along a blue vein, \"but I see now that although you have had his upbringing, my blood, as well as morals, run through your veins. Just so you know, now that you are my ${son}, I have no intention of trading you in for coin. I sent Fionn only to spread fears among the lords that follow under the Boar's banner. If you can be captured, then next?\", he asks rhetorically.\n*choice\n    #How is it possible for you to be my Father?\n        His face reddens in embarrassment, \"Well, ${son}, although you never met her, your mother was beautiful beyond reason. It was not a proud moment in my life, your mother and Ailbhe were to be married the next day. We had been in love since we had met many years before, but of course Ailbhe was heir to the throne of Chlann Scrufa, so her father had insisted it be him she marries. We spent the night together, a farewell of sorts, and not too long after news had reached me that she was with\n        child. I didn't believe it could be mine, but now that I look into your eyes, my ${son}, I truly know.\" \n        *goto 3\n*label 3\nAlmost as shocking as this revelation, were his watery eyes of emotion, that contrasted so starkly with his muscular, rugged appearance. How do you feel about all this?\n*choice\n    #It all makes sense now\n        Indeed, you and Ailbhe, aside from your looks, had little in common and never really did get along. You're not really sure whether you are happy or not about this, but your world as you knew it, twisted and strange as it was already, has been turned upside down.\n        *goto 4\n    #I refuse to believe him, and I tell him so\n        Aonghus gives you a sad nod, \"Like it or not, we are father and ${son}, you will need to come to terms with this, hopefully sooner rather than later\".\n        *goto 4\n    #I am glad to be your ${son}, Aonghus\n        He smiles broadly at you, pulling you in for a tight, but quick, hug. \"My ${son}, welcome home\".\n        *goto 4\n*label 4\nWell, it doesnt get much stranger than that, your uncle is your father… so your father is your uncle? That'll take a while to get used to. \n\nYou are both interrupted by Cathal, who walks in, bowing to Aonghus. \"My lord, the viking king Sigfrid and his lady Gunheld await your council, they are impatient so if I may be so bold they are best not left waiting.\" Aonghus eyes him irritatedly, \"Let the norsemen wait a minute so I may prepare, a lesson in patience would serve them well\", he says, waving Cathal away. \"Join me in this meeting, ${name}.\n\nYou know Ailbhe better than anyone, myself included, after many years apart, I can barely picture his face. I would appreciate it greatly if you would advise us on how you think Ailbhe will respond to our uprising, what move he will make next.\" You follow him from the tent as he hurriedly strides towards the large pavilion tent that lies at the back of the camp, the most protected side. The banners of Aonghus' Elk and Sigfrid's Crow fly parallel to one another on top of it.\n\nYou walk into the pavilion alongside Aonghus, you notice he has his chest puffed unnaturally outwards and his head holds high above his perfectly groomed beard. Awaiting you is a man and woman chatting bitterly, their wrinkled faces twisted into a scowl. Dividing you from the viking King is a thin but very long wooden table, it stretches almost the length of the massive tent and is lined with large throne-like oak chairs. At his side, Sigfrid holds an ornately one sided axe, the pommel sits on the floor while his hands grip just under the head of the axe which he pounds into the ground repeatedly while Gunheld snaps at him furiously in a foreign language. They turn to Aonghus, just now noticing you both had arrived, and give what is presumably an attempt at a warm smile through wrinkled lips. He gestures for Aonghus to come closer with long, bony fingers.\n\n\"Aonghus, I thank you for coming so urgently. I had asked my men to leave so we may speak in private. My lady wife and I are just a little unsure how fair our original deal of the third of newly conquered land really is. It would appear my forces nearly match your own, and are largely better armoured. We have decided we would settle for half of your brother's lands, and no less.\" Aonghus' cheeks puff red in anger, but before he says anything, Gunheld interrupts with a somewhat mocking tone, \"I would have you remember, Aonghus, that we fight for the side that offers the best deal, your lands in Waterford are no less tempting. I do wonder what your brother would offer to ensure a tipping of the scales?\" Aonghus looks at you almost pleadingly, hoping you can think of a way out of this.\n*goto 5\n*label 5\n*choice\n    #I can convince them Ailbhe would never side with them\n        *if Persuasion > 19\n            You walk up to Sigfrid as he eyes you up and down tauntingly, you speak to him with as much confidence and persuasiveness as you can muster. You emphasize to him Ailbhe's disgust for the Norse settlers and their traditions. Sigfrid looks at you with much widened eyes, then turns his head to Aonghus. \"This is true, Aonghus, the words your ${nephew} speaks?\" \"They are, brother, Ailbhe has little tolerance for foreigners, his ways are outdated yet unmoveable\", Aonghus replies, sending a subtle nod your direction in thanks. \"Perhaps I can lower my price, I did not realise to what extent you and I had shared interests, Aonghus. A third will be quite acceptable. Gunheld is about to speak out in protest of her husbands words, but he only waves a hand at her, \"Quiet woman! These Gaels are to be thanked for their hospitality, not bartered with.\"\n            *achieve interpretor\n            *goto 6\n        *else\n            You walk up to Sigfrid as he eyes you up and down tauntingly, you speak to him with as much confidence and persuasiveness as you can muster. You try to emphasize to him Ailbhe's disgust for the Norse settlers and their traditions. \"I find your words to be little more than idle threats, ${name}, do not waste my time like this or I will only want more land.\" Aonghus looks at you irritatedly.\n            *set third \"half\"\n            *goto 6\n    #I will demand they show more respect to Aonghus!\n         \"I see you've trained your puppy well\", Gunheld says, her cracked lips forming a joyless smile. \"An army can not be formed from trained pups, you are in need of hounds, Aonghus, and hounds we can provide if we are compensated properly\", Sigfrid explains, waving his hand nonchalantly.\n         *goto 5\n    #There is nothing we can do, accept the terms\n         You give Aonghus a nod, and grudgingly, he accepts.\n         *set third \"half\"\n         *goto 6\n*label 6\n\"Well\", Sigfrid begins with narrowed, serious eyes, \"Now that we can put these matters to rest, I believe it's time that we make ready for war. He calls out \"Daragh! Bring me my scroll!\" A man in coal black dyed leather armour walks in from the entrance behind where the viking couple sits, at his belt are an assortment of finely made throwing daggers, he wears silver-lined iron shoulder plates, and is carrying a scroll that stands almost as tall as he does, and is thicker than his muscular arms. He comes to the end of the long table, and sits the scroll on it.\n\nWith one great push it unfurls out across the long table, displaying a map that through detailed drawings describes Ailbhe's castle, Ferghus' town, the Yellow Hills where the camp lies. It also displays the great swamp that curls through the great pine forest, splaying around Kanturk and forming a natural moat around the camp. Gunheld calls in the norse commanders and lead warriors who sit around her. Aonghus, like an echo, calls for his chief druids and commanders. You, Aonghus and the highest ranked of the Irish Elk clan take your place at the opposite side of the table.\n\nA young chain mail enveloped woman whom Gunheld calls Brenda is the only one left standing amongst you, she places a wooden carvings the size of chess pieces in the shape of crows along with carvings of antlers, in the valley of the yellow hills. \"The bulk of our allied forces lie here in this camp\", says Brenda, \"We had hoped to mount a surprise invasion of Kanturk less than a week from now, but king Ailbhe has, through spies or perhaps informers, foreseen what would happen and has prepared a strongly defended wooden fort just outside the town. Almost his entire army rests here\", she points a finger in the swamp closest to Kanturk, \"We know they are planning something big, we cannot be sure whether they know the location of our camp but it would be unreasonable to assume they are that ignorant. A few hours trek through the forests and they would be upon us. Our forces simply aren't equipped to deal with a threat of this size, especially one so well disciplined. \n\nThe shield walls of Ailbhe's army are said to be impregnable. They cannot simply be run down by cavalry as their formations bristle with spears, they are masters of manoeuvring so a fully committed infantry charge would spell certain defeat. We will have to tip the scales in our favour somehow…\", she says, looking around the room. \"We will need cunning and patience. Does anyone have an idea they would like to bring forward?\" The room sits in silence for a moment as men and women either ponder for ideas or look around at others, dumbfounded. Aonghus steps up, ${name} here has lived with Ailbhe near his entire life, he now sits next to me as one of us. He looks down on you hopefully, \"${he} knows lord Ailbhe better than anyone, and despite ${his} age holds a wealth of knowledge in regards to the workings of his forces\". You feel yourself redden as the sceptical eyes of the meeting attendees are raised to you. Aonghus lifts you to his side and then sits down, Sigfrid looks to you curiously,  \"Please, ${boy}, let us hear what you have to say\".\n*set sig +1\n*goto 7\n*label 7\n*choice\n    #We must destroy their weapons!\n        \"Indeed, especially their shields on which the traditional military strategy of the boar clan depends on. For that, we would need to sneak into the camp, a pretty dangerous task in of itself. Assuming we make it to the weapon stores, how do you propose we destroy them without getting caught and killed?\" Before you can answer, one of Aonghus' chief druids blurts out \"white rot…\", Sigfrid turns his head to the druid, giving him an assuring nod. The druid's chin supports a long, wiry grey beard that falls below his waist. His lanky frame is mostly concealed by a thin, silky cream-coloured robe. It is adorned by embroidered spirals and knots, displaying the sacred golden 'Cauldron of nourishment' and the 'Harp of the seasons' which are said to be in the possession of god of gods, Dagda.\n        \n        The druid raises his voice, \"White rot, if poured over any wood overnight, will make it feel waterlogged in the hands of whoever holds said wood. It will weaken it so that it crumples under impact like a snail's shell. It need only be poured onto the surface and left for three hours, and it will do it's work.\" He bows to Aonghus and gives a grudging nod to Sigfrid, the druids have never been fond of the Norse settlers, and Sigfrid appears to be no exception. \"How are we to find this 'White Rot'?\", Sigfrid asks, ignoring the druid's subtle dislike of him. \"The druid turns to Aonghus, pulling several small jars concealed under his cloak and handing them to him. Aonghus eyes the jars suspiciously, swishing the whitish, gunky fluid around the inside of the jar. \"Then the only question that remains\", he says, looking around him, \"is who will carry out this task?\" Daragh steps forward tentatively, his eyes resting on the map and his hands behind his back. He bows to Sigfrid, and says solemnly, \"I would be honoured to carry out this deed, my chief.\" \n        \n        Sigfrid nods to him, but his eyes turn to you, \"it would seem a certain attendee of this meeting has yet to earn ${his} stripes, perhaps the young ${lad} could assist Daragh on this venture?\" Aonghus gives you an almost winding pat on the back, \"Young ${name} is brave as ${he} is swift.\" Once the meeting has concluded, Sigfrid leaves the camp for Waterford on a small expedition to find more mercenaries willing to join the cause. Meanwhile, it would seem you have been given very little choice in the matter, the rest of the day slips by like water cupped between your fingers, and by nightfall you find yourself outside your father's camp, crouched in hiding alongside Daragh.\n        *goto 100\n    #We must assassinate Ailbhe\n        Sigfrid rolls his eyes patronisingly, \"Ailbhe is not the type to go ten feet away from a small army of guards, I'm surprised that despite your 'wealth of knowledge', as Aonghus has so boldly put it, you still do not see the implications of such a venture. Even if we were to send someone to almost certainly get caught, tortured for information as well as hung, who would we send? You?\", he asks incredulously, \"No, I think not, even a traitorous ${boy} like yourself would not have the courage to kill you own father\", Aonghus is about to speak up against that last \"father\" part, but then decides against it. It was not an idea the attendees exactly welcomed, but you can only really think of one other option…\n        *goto 7\n    \n*label 100\n*goto_scene chapter52\n        \n    \n\n\n            \n\n\n    \n        \n", "chapter51": "*Page_Break Chapter 5\n*image Chap5.png\nAfter a day of sitting alone, tied up in the tent, as the hustle and bustle of the army camp continues, you finally drift from consciousness. In this dream, you stand under the shadow of a huge elk that towers over you, it's antlers span the length of two tall man lying horizontally across. They sway at you like vast oak trees. Despite the massive beast's lunges towards you, you are without fear, in fact, you feel a rush of furious confidence. \n\nYou circle the beast, your eyes wildly searching for a way around… or under the great antlers. You, without even thinking, lunge to the right of the elk. As it twists it's heavy antlers to answer, you dig what appear to be hooves into the swampy ground, and like an agile hen harrier, you twist back before the elk has time to swing it's clumsy shield.\n\nWith all the might you can muster, you rip at the elk's tall, muscular neck with your tusks. The elk screams in panic, it loses it's footing in the slippery swamp and comes tumbling down on you. Your knees crumple beneath you as you succumb to the weight of the beast on your back. The muddy soil of the swamp rises around you, and your eyes widen in panic as you realise what is happening… the swamp is swallowing you alive. You scream and shout as you wriggle and squirm in the mud, but your loudest shouts are like the frightened squeal of a pig, and you're squirming like a foal under ${his} mothers protective grip.\n*Page_Break\nYour squeals become muffled as your mouth and snout are swallowed up in the mud, and as you open your mouth to breathe you inhale thick muck and swampy water. It fills your lungs as you struggle for breath, and you regurgitate it after several seconds of agony, only for your lungs to be refilled with it as you squirm and grapple against the elk for dear life.\n\nIt is only when you are shaken violently that you awake, and see Bruce, the Scottish mercenary your father had appointed to be your right hand man. His fingers are slippery against your sweat plastered body as he shakes you, \"We must get out now, my liege, before they see us\". He whispers these words in a fearful, urgent tone as he pulls a knife from his belt and cuts through the bindings on your wrists. You still feel the shadows of the pains that had felt so real in the dream, the burning sensation in your lungs, the feeling of weight on your back, it all, though much weaker now, remains.\n\nHe takes you, still only half concious, outside the tent. \"I scaled both walls with ropes, but the patrols are numerous, you know this place much better than I do, ${name}, I barely escaped the eyes of the guards on my way in and I doubt the two of us would make it through the lot of them unawares. How do we get out?\" His face is tense, his eyes are perpetually searching, even in the cool night air, his brow shines with sweat. \n*goto 39\n*label 39\n*choice\n    #Get away from me, I stand on the side of my Uncle!\n        \"You would betray your own father so cruelly? I have risked my life to rescue you yet you cosy up to your captor? Curse you, insolent ${boy}.\" \n        *choice\n            #Never mind\n                \"This is no time for jokes, ${name}, though I am glad you would not leave a knife in my back like that\"\n                *goto 39\n            #Guards! Help me!\n                \"His eyes open in a mix of tearful fear and rage. He grabs for your neck and begins to strangle you. You struggle but he is far too strong, you feel the blood get trapped in your head, sending a fiery sensation to envelope your skin. The world starts to fade and Bruce only stares into your blurry eyes. Soon the guards have arrived, and Bruce is given a battering to the head with iron-tipped clubs. He lies feebly squirming on the ground as five or maybe more guards beat him to death with kicks and blows. \n                \n                You keel over, coughing and spluttering between gasps for air, you can feel Bruce's finger marks on your neck. His body is dragged outside the camp, as you are binded once more your tent. You hear from the whispers of guards outside that his head is to be put on a pole.\n                \n                The next morning you are awoken by Cathal, who brings you to a large, glamorous tent where Aonghus is waiting.\n                *goto_scene chapter4part2\n                \n            #Get out before I call the guards\n                \"You would dare, would you? I think not!\" He spits in your face in spite, before sneaking out of the tent in silence. It is not long before alarm is raised in the camp and Bruce, by the sound of it, is put to rest with his head on a pole at the outer gates of the camp.\n                \n                The next morning you are awoken by Cathal, who brings you to a large, glamorous tent where Aonghus is waiting.\n                *goto_scene chapter4part2\n    #Between the two of us we could get rid of the watchmen without making a sound....\n        *goto 1001\n    #We should sneak as far as the inner gate, after that there will be too many guards to hide so we'll just have to run for it.\n        Bruce looks at you, his eyes wide, \"you are sure of this? Even if we do make it out of the outer gate, they will likely run us down with their hounds and horsemen!\"\n        *choice\n            #We can start a fire to distract the watchmen!\n                *goto 1000\n                \n            #Not if we get a horse ourselves.....\n               His dark brow furrows, then his lips twist into a grin, \"Good idea, the stables in the outer bailey are seldom patrolled, though it would be near impossible to get out without being spotted, it's a risky move. I wouldn't be surprised if we were shot full of arrows on our way out, but if we have our wits about us we might just be able to pull it off. I'm willing if you are, ${name}\"\n               *choice\n                   #On second thought...\n                       *goto 39\n                   #Then let's make haste!\n                       You head out from the tent, Bruce is clutching the wide selection of throwing daggers at his belt, his head twisting left and right nervously. You both sneak in between tents, sticking to the shadowy areas that seem to have the least guard traffic. Just as you are about to leave your cover and make a run for the stables, you see through the tent walls the silhouette of a man in candlelight.\n                       \n                       The silhouette gets larger and more defined as he nears the walls of his tent. \"Hello?\", he asks suspiciously. You see through the walls of the tent him picking up what appears to be a pole of some kind, he puts his other hand up against the walls of the tent, and pushes it towards you. You and Bruce both glance at each other in panic. A sudden movement would confirm the man's suspicion, but if he persists and touches you, his suspicions would be confirmed anyway, what do you do?\n                       *choice\n                           #Stay still\n                               His hand searches and searches until it touches your chest, you hear the man gasp, and before you can move he has gripped onto you firmly, Bruce raises a knife above his hand, ready to sever it. However, it's too late, the man in the tent pushes his spear through the thin fabric of the tent, plunging is deep into your stomach. You feel blood begin to seep into your mouth as you collapse on the ground, still deeply impaled by the spear. The man shouts an alarm but it all seems muffled to your ears. The blood stains your lips and dribbles out of the side of your mouth, you can feel the stomach acid burning your skin as it seeps out of your only partly clogged wound. \n                               \n                               You feel Bruce's arms under your shoulders and the back of your knees as he picks you up, your vision begins to fade, and so too does the feeling in your toes, then ankles, then thighs. The feeling is also fleeing your fingers and retreating back towards your shoulders, leaving desolate, alien objects hang from your torso. Bruce tries to run with you in his arms, but is struck in the back by a war dart with a 'thunk', and he topples over you. Even though the ground is solid, it feels like it's swallowing you up. The world around you fades and is replaced, by the dream that had left you in shivers this very night, almost like a prophecy, the Irish Elk and Boar, destined to die as one.\n                               *goto_scene death\n                           #Run!\n                               Together, you bolt towards the exit of the inner gate, the guard in the tent hears the sudden scuffling of footsteps and raises the alarm, \"Hey!\", he yells, \"Who's that?\" Several guards on the wall hear the calls, two rush to meet you while another three start closing the heavy wooden gates. Bruce stops to throw three daggers, one after the other, into the thigh and torso of one of them. The other man rushes at you, thrusting and slicing his axe excitedly at you. You have no weapon with you, so you're going to have to improvise…\n                               *choice\n                                   #Grab for the shaft of the axe\n                                       You hold onto it tightly, with both of you wrestling for power in both hands. He gives you a growl in frustration and kicks you hard in the stomach, you collapse onto the ground and he raises his axe above you, grinning in relief. His gleaming smile disappears when the 'thunk' sound of one of Bruce's daggers comes from behind him, he crumples over and collapses at your feet. Bruce grabs you by the wrist, hoists you up and, still winded by the guard's knee, you both run as fast as your legs will carry you towards the thin gap between the steadily closing gates.\n                                       *set health -10\n                                       *goto 50\n                                       \n                                   #Throw a rock at him\n                                       You lean down to pick up a rock, but before you can even get your fingers around it, the guard knees you in the stomach and knock you into the ground hard. His gleaming smile disappears when the 'thunk' sound of one of Bruce's daggers comes from behind him, he crumples over and collapses at your feet. Bruce grabs you by the wrist, hoists you up and, still winded by the guard's knee, you both run as fast as your legs will carry you towards the thin gap between the steadily closing gates.\n                                       *set health -10\n                                       *goto 50\n                                   *if combat >19\n                                       \n                                      #Barge right into him(requires combat 20)\n                                          *goto 2000\n*label 2000\nYou catch him off guard and he topples into the dust, sidestepping him, you and Bruce make your way as fast as your legs will carry you to the very narrow gap between the slowly and steadily closing gates.\n*goto 50\n                               \n*label 1000 \n\"Yes….\", he says impatiently, \"Those tents would go up in flames in seconds, but the only flames I've seen are on the torches of guards or under tomorrows breakfast. Neither would be easy to get hold of.\"\n*choice\n    *if Knowledge >10\n        #We could make our own(requires knowledge 10)\n            \n            \"But how, ${name}? I have not flint and I am not a druid nor a banshee. I don't suppose you would know anything of witchcraft?\" He asks with slightly patronising tone. \"Not witchcraft\", you answer, \"But the men of old had little need for flint or steal\". You hurriedly sharpen a stick and twist it between your palms, over a piece of fabric you had ripped from your bed. After a few short minutes, flickers of smoke begin to rise. You blow softly as flames begin to consume the cloth. Together, with Bruce a little startled from your quick thinking, you sneak from the tent and just as the flame is about to reach your fingers, you place it at the base of a tent some twenty footsteps from your own.\n                       \n            The flames start to lick their way up the sides of the tent as you retreat back from it. You hear the frightened noise of men drowsy from a sudden end to their slumber and screaming as the heat fills the tent. The poles holding the tent up, weakened by the flames, collapse inwards and the black, cinder-stained cloth of the tent wraps up the men inside as they scream in agony. As the timber snaps, sparks spray outward, and in seconds the sparks on the adjacent tents have evolved into great monstrous flames. Soon the whole inner camp is aglow, and the smell of burning fabric and, you suspect, human flesh makes you feel like doubling over and in a fit of coughing, but you know the longer you wait, the less chance you will have of making it out.  \n                       \n            The confused noises of nearby guards, the ringing of bells and sounding of horns in alarm fills the camp. Amidst all the confusion, you and Bruce seem to manage to slip away unawares. However as you run through smouldering walls and panicking hounds and horses, you lose Bruce, you strain your eyes in search of him in the thick clouds of smoke. You crouch down in hiding as you walk, hands feeling forward as you squint in the opaque, dusty air. You hear an alarming 'thunk' behind you, accompanied by the 'thump' sound of a bag of turnips falling hard to the floor. It is only as you near the sound that you recognise the smell of manure in the smoke. \n                       \n            You walk towards the smell, and you see an obscured silhouette of a horse, struggling against the rope that has tied it to the stable fence. As you become nearly close enough to touch it, you trip over a flat, log-like object. You peer closely to it, a human head rendered unrecognisable by a hoof print to the face. The realisation dawns on you, in the thick smoke Bruce must have brushed past the rear of the struggling mare in front of you, causing it to inflict a protective, deadly kick. You feel like screaming, though you know when the smoke starts to clear, someone will be bound to recognise you. \n                       \n            Tears stream from your eyes as you run through the outer gate, whether they are for Bruce or a result of the smoke in your eyes, you're not quite sure. You trod haggardly past men as they run with buckets in their hand towards the swamp, coughing from lungs full of soot as you go. The sound of leather boots squelching through thick mud reverberates outside the camp as men and women alike race back to the camp, weighed down by heavy buckets of water hoping to quench the now all-consuming flames. You don't stop until you both collapse together in a heap, deep in the woods.\n            *set Daragh \"Bruce\"\n            *set elk \"boar\"\n            *set sig +1\n            *achieve daddy\n            *goto_scene chapter6\n            \n \n    #The food is probably surrounded by guards, we'll take a torch from an isolated watchman.\n        \"As you say, ${name}\". His fingers rest on the selection of throwing daggers at his belt as you both creep from the tent. He pulls a cross necklace that hangs tucked under his dark leather armour. He kisses it hurriedly before tucking it back in. You make your way to the ladder of the inner wall, Bruce hides under it, waiting for a guard to climb down it from patrol on the wall. They say it's bad luck to lie beneath the rungs of a ladder, it's where Cromm's children hide, or so your father had told you. Do you join him?\n        *choice \n            #Yes\n                You hear the footsteps of a guard on the wall, the wall is barely twice the height of a cottage
