s loose the arrow, it whistles through the sky furiously. The Boar clan warriors raise their oval wicker shields above their heads, expecting a barrage of arrows. Only Ailbhe understands their costly mistake. \"Nooooo!\", he cries, \"Fall baaaack!\" He waves his sword above his head, backoning his men's retreat.\n           \n           The command only seems to register to his warriors when the arroe lands in on the groud, and as if Dagda himself had released death into the land, the ground goes up in a mighty fire. Men wail in agony as they are set alight, their faces redden and char in seconds as they perform a demented dance in the all-consuming heat. Many of those in the danger area collapse and burn in the fire, while some manage to escape, but leave with burn marks and blackened, unrecogniseable faces. Those men collapse soon after, rolling around as they moan in pain.\n           \n           The enemy has been completely caught off guard, and the men untouched by the flames stand stunned. The men of your camp cheer and taunt the army across the bailey.\n           *set boars -35\n           *goto 3008\n            \n*else\n    They soon reach the walls and find that a large chunk of your forces are there awaiting them in the weaker sections of the wall. Men are lost on both sides as they scale the wall with their ladders and send javelining upwards, but because of your height advantage, far more are lost on the enemy side. \n    \n    Their men start to establish gaps in the ranks of your defenders as the battle for possession of the wall begins to come to a close. Your men have fought well and hard, but the sheer size of their forces has overwhelmed your men. They are eventually slaughtered, as their exits are cut off and the relentlessness of the enemy leaves their morale in tatters.\n    \n    The enemy make their way down from the walls, and start to regroup within those walls, forming up as a solid unit once more. The outer gates are broken down to make way for Ailbhe and General Alastar, who holds the banner of the ferocious boar high for all to see. They are both on horseback and are shouting inaudible commands to their men. \n    *set boars -54\n    *set kern -12\n    *set gallowglass -6\n    *set peasant -18\n    *goto 3008\n\n*label 3007\nShe dismounts her horse in a bit of a huff, and decides to ignore Ultan's smug grin at her. Together, you all make your way to the open gates, with a clear view of the vast, swampy battlefield as well as the inner bailey. \n\nTheir ranks are steadfast with shields and bristle ferociously with spears, descending on your camp like death's own servants. \n*goto 3010\n\n\n\n\n\n\n*label 3008\n*if kern \u003c0\n    *set kern 0\n*if peasant \u003c0\n    *set peasant 0\nYou have ${gallowglass} gallowglass, ${kern} kerns and ${peasant} peasants against their ${boars} boar warriors.\nIrritatedly surprised at how much his force has already been depleated, Ailbhe shouts out, \"Advance, men! Don't be fearful of the frightened doe!\" The march forward once more, and are nearly at the inner gates. What is your command?\n*choice\n    #Sally out! Meet them in front of the walls!\n        Your men on the ground charge out, while some of the lesser troops stay on the wall so they can rain their darts and slingshots on the enemy from above. Your men run with their shields like a battering rams into the enemy ranks, and the enemy shields splinter apart on impact! Shouts of surprise rings out amongst the boar warriors, their very much perfected combat style is now null and void. They are cut to pieces by your gallowglass as they begin to lose heart, Ultan, excited by the show, rushes in on his horse, swinging downwards with his longsword and lopping the heads off his confused foe as he rides.\n        \n        Seeing his men on the verge of routing, Ailbhe and general Alastar charge in on horseback, holding a sword in each hand and laying out devastating damage. Ailbhe slices the arms off two of your gallowglass almost immediately. As Ultan is busy hacking away at the boar warriors from abcve, the heat of battle giving him an uncharacteristic fury, General Alastar rides up behind him, his longsword raised above his head and his body in a state of pure composure.\n        *choice\n            #Ultan! Look out!\n                He turns just in time to see the General thrust his sword into her stomach, plunging it deeply and letting it go. He falls off his horse, the sword still impaling him, and lies still on the ground.\n                *goto 3012\n            \n            \n                \n            #I'll stay silent\n                With Ultan oblivious to the galloping behind him, the General thrusts his sword into his back, plunging it deeply and letting it go. He falls off her horse, the sword still impaling him, and lies still on the ground.\n                *goto 3012\n\n     \n    #Close the gates!\n        The gates are hurriedly shut, cutting off your view of outside of the walls. You and your advisors rush up to the walls to get a good view of what's going on down below. Ailbhe's men are bringing forth tall siege ladders, with Ailbhe pointing them to their positions. Your men rain down rocks and arrows while they move their ladders into place, and soon they begin scaling the walls.\n        \n        Medb helps a few of the servants as they carry to the wall large copper pots of boiling water. As they brush past you to pour it over the ladders, the steam hits you and makes your eyes water. It's scalding! Four boar warriors are climbing the ladders when a pot is emptied over their heads, sending them crashing down to the ground, howling with the agonising pain. One by one the pots are emptied in a similar fashion, sending men crumpling to their knees and shrieking like newborns. Only when the pots have run out does Ailbhe's forces start to make progress, and your men do their best to hack them down as they climb. \n        \n        All at once, the shield bearers, the more elite units, raise their bronze plated oval shields and begin to scale the ladders. They manage to fight their way onto certain sections of the wall and fight furiously… until one by one, their shields crumble and splinter into several pieces under the impact of the gallowglass greatswords. \n        \n        Spirits are quickly raised in your ranks in seeing that the druid's serum has done it's job. The shield bearers panic as the combat style they are well trained in and have more or less perfected, becomes null and void. It seems like the battle may be turning in your favour, however with their superior numbers, they manage to take control of the wall, and begin pouring down into the inner fort. The men on the wall open up the gates to allow the rest of the army in. \n        \n        Your men on the ground charge to meet them, running with their shields like a battering rams into the enemy ranks, the enemy front lines, without strong shields of their own to answer with, are bashed into the ground. Shouts of surprise rings out amongst the boar warriors. They are cut to pieces by your gallowglass as they begin to lose heart, Brenda, excited by the show, rushes in on her horse, swinging downwards with her longsword and lopping the heads off her disheartened foe as she rides.\n        \n        Seeing his men on the verge of routing, Ailbhe and general Alastar charge in on horseback, holding a sword in each hand and laying out devastating damage. Ailbhe slices the arms off two of your gallowglass almost immediately. As Ultan is busy excitedly hacking away at the boar warriors from abcve, with the heat of battle lending him an uncharacteristic fury, General Alastar rides up behind him, with his longsword raised above his head and his body in a state of pure composure.\n        *set boars -96\n        *set kern -30\n        *set gallowglass -9\n        *set peasant -34\n        *if peasant \u003c0 \n            *set peasant 0\n        *choice\n            #Ultan! Look out!\n                He turns just in time to see the General thrust his sword into his stomach, plunging it deeply and letting it go. He falls off her horse, the sword still impaling him, and lies still on the ground.\n                *goto 3011\n            \n            \n                \n            #I'll stay silent\n                With Ultan oblivious to the galloping behind him, the General thrusts his sword into his back, plunging it deeply and letting it go. He falls off her horse, the sword still impaling him, and lies still on the ground.\n                *goto 3011\n            \n*label 3012\nAlthough the battle seemed to be turning in your favour, the relentlessness and sheer numbers of the enemy force manage to push your force back, and they retreat to the closing gates. Most of them manage to make it in, but those that don't are quickly slaughtered.\n\nYou and your advisors rush up to the walls to get a good view of what's going on down below. Ailbhe's men are bringing forth tall siege ladders, with Ailbhe pointing them to their positions. Your men rain down rocks and arrows while they move their ladders into place, and soon they begin scaling the walls.\n        \nMedb helps a few of the servants as they carry to the wall large copper pots of boiling water. As they brush past you to pour it over the ladders, the steam hits you and makes your eyes water. It's absolutely scalding! Four boar warriors are climbing the ladders when a pot is emptied over their heads, sending them crashing down to the ground, holwling with the agonising pain. One by one the pots are emptied in a similar fashion, sending men crumpling to their knees and shrieking like newborns. Only when the pots have run out does Ailbhe's forces start to make progress, and your men do their best to hack them down as they climb. It is only a matter of time, however, before the relentless boar warriors manage to secure footholds on the wall and take control of the gates, opening them to allow the rest of the army to surge in.\n*set boars -56\n*set kern -30\n*set gallowglass -9\n*set peasant -34\n*if gallowglass \u003c3\n    *set gallowglass 0\n*if kern \u003c0\n    *set kern 0\n*if peasant \u003c0\n    *set peasant 0\n*if boars \u003c10\n    *set boars 10\n*if gallowglass \u003c6\n    *goto 4291\n\n*else\n*goto 3011\n*label 3011\nYour men are becoming increasingly clumsy as the battle wears on and fatigue begins to grip them like a bag of coal strapped to their backs, some slip in the mud and are slashed and trampled where they lie. Others miss easy strikes with their javelins or react too sluggishly to block stabbing attacks. Many are killed far too easily in this way, and marale in your ranks is at an all time low as fresh boar warriors rush through the gates. Ultan, looking almost petrified, though trying to look strong, says \"${name}, Your men need you, they have all but lost heart.\" You rush down to the ground so that you may be closer to your men and the battle. How  do you raise their spirits?\n\nYou have ${gallowglass} gallowglass, ${kern} kerns and ${peasant} peasants against their ${boars} boar warriors.\n*goto 3013\n*label 3013\n*choice\n    #I give them a powerful speech, convincing them that the battle shall be won!\n        *if Persuasion \u003c40\n            The men seem to barely notice your heartfelt, though badly placed, words. They will need something much more powerful if the tide of battle is to change!\n            *goto 3013\n        *else\n            The men are truly uplifted by your words, and fight on harder than ever, their sluggishness becomes swift, their weakness becomes powerful. They chant passionately as they thrust and slash, \"Long live ${king} ${name} of the elks!\",  \"For ${king} ${name}, the slayer of Boars!\" The battle finalluy begins to turn in your favour as warrior after warrior is chopped down by your men.\n            *set boars -51\n            *goto 3014\n    #I charge in and join them on the battlefield, I shall set an example and embolden them!\n        *if Combat \u003c40\n            You fight as well as you can, giving out cries of fury and swinging your ${weapon} around you madly, however, one of the boar warriors shoves you to the ground, and you have to be saved by Ultan, who stabs him from behind. The men will need far more than this for their spirits to truly be raised!\n            *goto 3013\n        *else\n            With each deadly blow you strike against the enemy, your men grow bolder and more agile, their sluggishness becomes swift, their weakness becomes powerful. They chant passionately as they thrust and slash, \"Long live ${king} ${name} of the elks!\",  \"For ${king} ${name}, the slayer of Boars!\" The battle finalluy begins to turn in your favour as warrior after warrior is chopped down by your men.\n            *set boars -51\n            *goto 3014\n    #I shout to them about old tales of great warriors, and that they will one day take their place among them!\n        *if Knowledge \u003c40\n            Your words are jumbled and fall on deaf ears, you find it difficult to recall the heroic warrior's names. That seems to have done little to raise their spirits, you will have too try something else!\n            *goto 3013\n        *else \n            Your words have inspired them to no end, the tales and accompishment of their ancestors have allowed your men grow bolder and more agile, their sluggishness becomes swift, their weakness becomes powerful. They chant passionately as they thrust and slash, \"Long live ${king} ${name} of the elks!\", \"For ${king} ${name}, the slayer of Boars!\" The battle finalluy begins to turn in your favour as warrior after warrior is chopped down by your men.\n            *set boars -51\n            *goto 3014\n    #I have nothing to offer them...\n        Your men are battered further and further back, taking loss after loss against the emboldened boar warriors.\n        *set gallowglass -15\n        *set peasant -15\n        *set kern -32\n        *if gallowglass \u003c3\n            *set gallowglass 0\n        *if kern \u003c0\n            *set kern 0\n        *if peasant \u003c0\n            *set peasant 0\n        *if boars \u003c10\n            *set boars 10\n        *if gallowglass \u003c1\n            *goto 4291\n        *else\n            *goto 3014\n    \n*label 3014\nOut of the corner of your eye, you see a man riding bareback, his cloak flapping wildly in the wind as he nears you, his longsword held like a single wing spreading out to his right. His body shifting up and down in rythme with his horse's hooves as they gallop towards you. You turn to face him, unsheathing your ${weapon} from it's scabbard and hold it in front of you.\n\n\"You scumbag worthless ${son}!\" Ailbhe screeches at you as he nears you, it may be a cruel trick of the light, but it looks as if there are tears streaming in torrents from his face. He raises his swors to strike you, and shouts with a wavering, shaky voice, \"Bastard, I'll kill you! I will!\" The horse is seconds from trampling you, what do you do\n*choice\n    #Slash at the horse's legs\n        As the horse is about to knock you into the ground and Ailbhe is ready to send your head rolling into the mud, you jump to the side of their path, slicing your sword at the knees of the great stallion. It shrieks in pain, rearing up and sending Ailbhe toppling into the mud. His head smacks against a rock as his body sinks deep into the watery mud.\n        \n        The horse trots away, a slight limp on it's right side. As you run up to him, you can see he is still alive, but barely. You kneel at his side, and his feeble, wrinkled hand holds onto your arm weakly. \"${name}, come closer…\" He croaks. You lean your head down slightly to hear him. \"Why?\" he asks, tears rolling from his eyes, \"How could you… my own ${son}… \"\n        *choice\n            #I am not your ${son}\n                His eyes slowly shut as you explain what Aonghus had told you to him, but the tears continue to stream down his cheeks. \"I AM your father… I raised you… loved you…\" he whispers with the last of his energy. His hand falls, and his breathing ceases.\n                *goto 3015\n            #I'm sorry, father\n                His eyes shut slowly, but the tears continue to stream downwards. \"I raised you… loved you…\" he whispers with the last of his energy. His hand falls, and his breathing ceases.\n                *goto 3015\n            #How could you?\n                  You about the people who had suffered and starved because of him, but he only shakes his head. His eyes shut slowly, but the tears continue to stream downwards. \"I raised you… loved you…\" he whispers with the last of his energy. His hand falls, and his breathing ceases.\n                *goto 3015\n            \n    #Throw your sword at him\n        It's no easy task to throw a ${weapon} straight and true, but you manage to do it, and it soars through the sky and lodges itself deep into Ailbhe's stomach. He yells out in pain, and his horse rears up and sends Ailbhe toppling into the mud. His head smacks against a rock as his body sinks deep into the watery mud.\n        \n        As you run up to him, you can see he is still alive, but barely. You kneel at his side, and his feeble, wrinkled hand holds onto your arm weakly. \"${name}, come closer…\" He croaks. You lean your head down slightly to hear him. \"Why?\" he asks, tears rolling from his eyes, \"How could you… my own ${son}… \"\n        *choice\n            #I am not your ${son}\n                His eyes slowly shut as you explain what Aonghus had told you to him, but the tears continue to stream down his cheeks. \"I AM your father… I raised you… loved you…\" he whispers with the last of his energy. His hand falls, and his breathing ceases.\n                *goto 3015\n            #I'm sorry, father\n                His eyes shut slowly, but the tears continue to stream downwards. \"I raised you… loved you…\" he whispers with the last of his energy. His hand falls, and his breathing ceases.\n                *goto 3015\n            #How could you?\n                  You about the people who had suffered and starved because of him, but he only shakes his head. His eyes shut slowly, but the tears continue to stream downwards. \"I raised you… loved you…\" he whispers with the last of his energy. His hand falls, and his breathing ceases.\n                *goto 3015\n    #Charge at him headlong!\n        You swing your ${weapon} at the horse, but with too much momentum to stop, the horse bashes you into the ground. You can see as you raise your head from the mud you have gashed the horse badly. It shrieks in pain, rearing up and sending Ailbhe toppling into the mud. His head smacks against a rock as his body sinks deep into the watery mud.\n        \n        The horse trots away, a slight limp on it's right side. As you run up to him, you can see he is still alive, but barely. You kneel at his side, and his feeble, wrinkled hand holds onto your arm weakly. \"${name}, come closer…\" He croaks. You lean your head down slightly to hear him. \"Why?\" he asks, tears rolling from his eyes, \"How could you… my own ${son}… \"\n        *choice\n            #I am not your ${son}\n                His eyes slowly shut as you explain what Aonghus had told you to him, but the tears continue to stream down his cheeks. \"I AM your father… I raised you… loved you…\" he whispers with the last of his energy. His hand falls, and his breathing ceases.\n                *goto 3015\n            #I'm sorry, father\n                His eyes shut slowly, but the tears continue to stream downwards. \"I raised you… loved you…\" he whispers with the last of his energy. His hand falls, and his breathing ceases.\n                *goto 3015\n            #How could you?\n                 You about the people who had suffered and starved because of him, but he only shakes his head. His eyes shut slowly, but the tears continue to stream downwards. \"I raised you… loved you…\" he whispers with the last of his energy. His hand falls, and his breathing ceases.\n                *goto 3015\n*label 4291\nYour forces are simply too depleated to fight on, and though Medb screams at them to keep up the fight, her words fall on deaf ears, and they fall to their knees. In retribution for the death of their leader, one of the boar warriors marches up to you without a second thought, and stabs you deep in the gut. You fall back, lying in a puddle of your own blood and stomach acid, and die in agony with your own men looking on in sympathy, but not one raising a voice of protest.\n*goto_scene death\n\n*label 3015\n*set boars -52\n*if gallowglass \u003c3\n    *set gallowglass 0\n*if kern \u003c0\n    *set kern 0\n*if peasant \u003c0\n    *set peasant 0\n*if boars \u003c10\n    *set boars 10\nOne of the Boar warriors sees Ailbhe's body in the mud, \"The king is dead! The king is dead!\" Shock reverberates amongst his soldiers, and many of them surrender almost immediately in hearing this. The rest of the men are still ready to fight 'till the bitter end. They form a tight circle of spears not unlike those you had encountered during the struggle with the vikings as a desperate last stand. This leaves ${boars} warriors against your ${gallowglass} gallowglass, ${kern} kerns, and ${peasant} peasants.\n\n*if gallowglass \u003c2\n    However, your forces are simply too depleated to fight on, and though Medb screams at them to keep up the fight, her words fall on deaf ears, and they fall to their knees. In retribution for the death of their leader, one of the boar warriors marches up to you without a second thought, and stabs you deep in the gut. You fall back, lying in a puddle of your own blood and stomach acid, and die in agony whith your own men looking on in sympathy, butnot one raising a voice of protest.\n    *goto_scene death\n*else\n    Your men eventually, after one final push, defeat them, and most collapse in exhaustion, giving to you their greatest gratitude as they lie down. Those not too injured or exhausted to stand, raise their weapons in the air in salute, their admiration to you is palpable.\n    \n    The many corpses that litter the ground will have to be put somewhere, likely in great stacks outside the camp, but for now, you rest. Breccan walks to you from behind the wagon-makeshift fort. He kneels down beside you, \"My ${king}, you have served your people truly like one of the greats. Your castle in Waterford awaits you, along with the town you inherited. Sigfrid will soon be back with his army, so we should, if you'll heed my advise, leave on the morrow. Winter is setting in and the land between here and your castle is already carpeted with snow, it will be many a moon's walk. But for now, my ${king}, rest knowing your name will be forever kept alive in manuscript after manuscript, poem after poem and heroic tale after heroic tale, as defender of the poor, and protector of what is just in this land.\" Exhaustion engulfs you as he says this, and you drift into a deep, peaceful sleep.\n    \n*if hard =1\n    *achieve level\n    *goto 36568\n*if vh =1\n    *achieve vhlevel\n    *goto 36568\n*else\n    *goto 36568\n    \n*label 36568\nComing soon:   \n\n[b]A Throne of Glass[/b]\n\n[i]A Clans of Éire Saga[/i]\n*Page_Break Acknowledgments\nThis project has been a wonderful escape for me during these strange times and hopefully it has helped you escape for a little bit too. As well as writing, art and illustration is a wonderful escape and hobby for me, if you would like to see more art like the illustrations in this book, you can check out fionn_graham_creates on instagram.\n\nI was really excited to put in the spotlight some of the little-known places, names and cultural aspects of ancient Ireland, including a little bit of Irish language. \nI would like to thank the many people from the Choice of Games Forum who helped me work through the coding and who's help made the polishing off and bug fixing of this book possible, particularly Cool165, James Martin and staff member Kai Deleon. I'd like to thank the many of the members of my own family and friends, especially my grandparents, Rosaleen, Eileen and Dennis who were some of the first to ever read it, as well as my mum, cousins, and aunts and uncles who gave me great encouragement and support, so thanks everybody. \n\n\n[i]This book is dedicated to Donal Graham, my grandad, who was always curious about my art projects and is dearly missed by everyone lucky enough to have known him.[/i]\n*goto_scene ending\n      \n                \n            \n                \n        \n\n\n\n", "theraid2": "You wake up with a start to the blaring of horns and shouting of panicked men. Breccan rushes into your tent, \"My liege, the armies of Aonghus are upon us! He pulls you, still in your night clothing, out of the tent. \"Servants!\" he cries out, \"Bring your ${king} ${his} armour and ${weapon}!\" The servants rush about hastily, tying a grey tunic over  your chest with twine and loose breeches around your waste. Over the tunic they wrap a vest of finely made chainmail, which hangs down halfway to your knees like a short cloak. Next comes a bull hide corset, dyed velvet and made to be as tough as iron and chequered with bronze plates. Bronze plates wrap around your knees, with your shins covered by tanned wolf hide. Ailbhe' great cloak is wrapped snugly though heavily over your shoulders and hangs so that it covers most of your left side. A heavy golden brooch embroidered with gemstones holds the cloak in place, and finally, Ultan arrives to you, kneels down with his arms reaching forward and your ${weapon} lying across his palms, still in it's delicately embroidered scabbard. \n\nYou take it from him, feeling a shiver run through you as the light hits it beautifully, almost blinding you with it's shine as you pull it from it's scabbard. \"May the gods look fondly on you, your men need a strong leader now more dearly than ever\", Breccan says. \"Now go, ${name}, son of Ailbhe, your advisors await you at the inner gates…\" As you hurriedly make your way to the awaiting assembly of your advisors, the clanging of bells and thunking of scabbards against breeches as warriors rush hastily to their stations fills the air. Horns blow eerily in the forest across the swamp from you, and the distant sloshing of hooves through swamps and shouts of men only builds the mounting tension in the camp. The flag of the Irish elk seems to flutter sheepishly as the rain heavies it's drizzle down.\n*Page_Break\nSeveral men get to work supporting the wooden gates to the camp, sticking timber logs deep into the mud, with their other end pressed against the gates. Others pull wagons and carts to create a small, inner ring fortification within the inner walls as a last resort, should the iminent battle turn so harshly against you. With a relatively small allied force to speak of, the outer walls would be too much to defend properly, so the entire force has retreated to the inner walls.\n\nUltan looks quite frustrated at this. \"A tragic waste, it would be, to let these attackers take the outer walls without any resistence, we may as well hand it to them on a platter of silver. It's true, our force would have difficulty defending it all, but we shouldn't have to. The Elks will most likely attack the eastward gate or the lower wall segment around it, if we focus our troops there and Aongus acts as predicted, we shouldn't have much trouble holding them off…\" \"Nonsense!\" Medb blurts out, \"To assume the mistakes of your enemy is to toss a coin of defeat or victory! What if they don't attack those points? We shall be overrrun! My ${king}, the gods seldom look kindly on those who play their life like a game of cards, with unreasonable and unnecessary risk.\"\n\n\"So what is it you propose then, how would you play a game of little risk?\", Ultan asks accusingly, but, Medb just smiles patronisingly back. \"My proposal is simple, cut the fat from the meat that fills our stores, blanket the land within the outer walls in all the hay and cloth at our disposal. Then we simply lather it in the fat from the meat, waiting until the enemy is upon us, and then set them alight! Even in rain fat never fails to catch alight\" she states gleefully. \"That would take time\", Ultan says, shaking his head, \"Time we clearly do not have\". \n\n\"Aonghus is a man of honour\", Medb says, \"in the face of two armies, I have no doubt he will obey the Brehon Laws. We must negotiate before the battle, discuss terms of a truce and so forth. That would buy us ample time.\" \"And what of the risk in that offer, Medb? What if the fire goes out of control? What if the woolen tents surrounded by wooden walls burns to ash with the entire army trapped within it?\" The rest of your small troop of advisors turn to you, you have proven your skills in battle before, so they seem keenly trusting of your judgement. You can go with Ultan's plan, or Medb's, though it might be a good idea to get a deal with Aonghus beforehand either way, that is if you think Aonghus won't try to pull something. What do you think? \n\n*choice\n    #Ultan is right, but we shall negotiate anyway\n        \"As you wish\", Utan says solemnly, \"It will be expected that you lead the negotiations, though. Who shall join you?\"\n        *set Medb -8\n        *set Ultan +8\n        *choice\n            #Medb\n                \"Good decision, my liege\", she says as she pulls herself surprisingly easily atop an old mare, with seemingly frail, wrinkled arms.\n                *set Medb +7\n                *set Ultan -7\n                *set nego \"Medb\"\n                *set their \"her\"\n                *set they \"she\"\n                *goto 3000\n            #Ultan\n                \"Wisely chosen, ${name}\", he says, pulling himself atop a broad, muscular stallion.\n                *set Medb -7\n                *set Ultan +7\n                *set nego \"Ultan\"\n                *set their \"his\"\n                *set trick +1\n                *set they \"he\"\n                *goto 3000\n    #We shall take Medb's course of action\n         \"As you wish\", Utan says solemnly, \"It will be expected that you lead the negotiations, though. Who shall join you?\"\n        *set Medb +8\n        *set Ultan -8\n        *choice\n            #Medb\n                \"Good decision, my liege\", she says as she pulls herself surprisingly easily atop an old mare, with seemingly frail, wrinkled arms.\n                *set Medb +7\n                *set Ultan -7\n                *set nego \"Medb\"\n                *set their \"her\"\n                *set they \"she\"\n                *goto 3000\n            #Ultan\n                \"Wisely chosen, ${name}\", he says, pulling himself atop a broad, muscular stallion.\n                *set Medb -7\n                *set Ultan +7\n                *set they \"he\"\n                *set nego \"Ultan\"\n                *set their \"his\"\n                *set trick +1\n                *goto 3000\n    #We will go with Ultan's idea, without negotiating\n        Medb shakes her head worriedly, \"This is a decision that puts too much in the hands of the gods. May they look kindly on you, ${name}, we shall be leaving this life to the next all too soon otherwise.\"\n        *goto 3003\n        \n        \n*label 3000\nYou mount a similar steed, and together you ride out to the swamp that forms a barrier between the camp and the forest. ${nego} holds high a large white banner, leaning it's staff against the muscular back of the horse. Fastened securely to ${their} back sits a keen quick spear, with a narrow shaft and a round based, broad-bladed grey blade at it's head. From ${their} shoulders hangs a blotted, yellow robe held to ${their} chest. ${nego} looks to the forest suspiciously, squinting to try and make out the Boar army as it's sloshing footsteps grow closer. As your horse, who seems to feel the tension in the air, meekly trods to the side of ${nego}'s ride.\n\nThe rain is starting to halt, leaving a swamp with broken, flooded banks and many of the tents of the camp collapsed under the weight of the water. Even many metres from the swamp where you sit, your horse is up to her ankles in mud. She stomps and shakes her head irritatedly as the mud creeps it's way up her shins. Distracted momentarily, you nearly fail to notice Aonghus in his golden ornated helm. He rides bare-back atop a wild-looking stallion with a ragged mane and overgrown hair forming natural boots at it's legs.\n\nAt either side of Aonghus ride two warriors, one wrapped in wolf skin, the other with the fur of the Boar wrapped suggestively around his horse's hide. From one of the guard's shoulders hangs a boulder shaped leather sack. It gives you an impression of where they stand in terms of your new throne. They take the long route around, making sure to keep a safe distance from the now deep, murky swamp. As Aonghus is halfway towards you, the rest of his army emerge from the forest. The vast majority of the opposing army, some 220 in all, hold large, oval shields. The army quickly forms up so that the javelinmen rush to the front, with the shield bearers forming up an interlocking wall behind them. \n\nYou are well out of range of them, and with a vast swamp taking up much of the center of the would-be battlefield, this is clearly a show of force and organisation, as oppose to actual readying. Their shield wall looks sturdy and well-rehearsed. Let's hope your druid's gunk does it's job. According to Breccan, their shields should break like rotted, lice infested softwood against any real impact. Otherwise, truth be told, this battle holds little hops of success. The men clatter their light axes and shortswords against their shields in a frenzy of bloodlust and fervour. They chant ferociously in an unsettling, almost demented tone.\n\nAonghus pulls gently on the mane of his horse as he reaches you and ${nego}, \"The peasants of the land call you the wolf ${king}, upholder and keeper of the power of the Boar, we'll see how long that lasts.\" He pulls his axe from the harness that hangs from his horse's back. Your hands subconciously grab for your ${weapon}, and he smirks as he sees this. He hushes you down, \"Little wolf cub, you have disappointed me deeply, I didn't think it possible to hurt me as much as you had.\" He throw his axe expertly so that the blade hits the muddy ground, sinking deep and standing on end. \n\n${nego} throws ${their} spear to the mud, followed by the thunking of the swords of the warriors at Aonghus' side in the waterlogged soil. Do you follow suit? \n*set peasant +38\n*choice\n    #Yes\n        ${nego} gives an affirmative nod, Aonghus glances to the men at his side, then speaks, \"Now, then, little wolf cub, let us begin.\"\n        *goto 3001\n    #No, I will not lay down my ${weapon}\n        ${nego} looks at you, waiting for you to follow suit, but seeing your unmoving disposition, stares at you agast, \"My ${king}, I would very strongly advise that you retain your honour. The gods themseves are watching! He has respected the laws of the land, what will our warriors think if their own leader does not?\"  and the men at his side glare at you, \"Listen well to your advisor, ${name}, or this negotiation ends here!\", he demands.\n        *choice\n            #Fine, I will lay down my arms\n                ${nego} lets out a short sigh of relief, seeing your compliance. \"Good, little wolf cub, now let us begin…\"\n                *goto 3001\n                \n            #Very well, our talks have finished\n                \"What a waste of my good time\", Aonghus spits. \"We'll see you on the battlefield, then, little wolf cub.\" One of his warriors dismounts, and, squelching in the mud, he hands up their weapons. \"I had hoped you could redeem yourself from your earlier treachery, but now I see otherwise.\" He glances to the warrior at his right, who hands him the leather sack. He holds it in both hands and as if it were a generous gift, hands it to ${nego}. You feel your eyes widen in alarm when you see the trickles of crimson seeping out of the bag. ${nego}, not seeming to notice, holds the bag upside down for the contents to pour into ${their} hand. ${They} let out a gasp as the distinct head of the healer who was sent to request your ransom, rolls into his arms.\n                \n                ${they} drops it in ${their} moment of panic, and the head falls with an undignified squelch into the mud. The crimson blood quickly spreads outward from the jagged slice at Fionn's neck, forming a muddy-red frame for his pale, lifeless head. Before either of you can react, they turn back and head back to their awaiting and slowly growing army, with stragglers from their march catching up. You and ${nego} turn, somewhat in a daze, and make haste to the camp, where your ${gallowglass} heavy gallowglass and ${kern} light kerns are taking their positions. The few peasant refugees that aren't too malnourished or weakened to fight have taken up their scythes and pitchforks, mixed among them are the recruits from Kanturk and your father's village. There are around ${peasant} at the inner gates of the camp.\n                *goto 3003\n*label 3001\n${nego} speaks first, \"How can we avoid the bloodletting of our armies? What can we do to quell your bloodlust?\" Aonghus grimaces. His beard fails to hide the view of his yellow teeth forming a threatening snarl. \"Swear allegiance to me as your king, leave the control of your armies to me. And you shall pay your duties to me thrice a month. To the tone of, shall we say, ten heads of cattle whom I may choose each time.\" ${nego} urges ${their} horse to your side and whispers in your ear, \"What Aonghus demands would equate to an equivalent loss of some 2,500 silver pieces a month. I strongly urge you to push for a better offer, my ${king}. However, giving up your armies is not a decision to take lightly, you will forever be at his mercy if you do.\"\n*goto 3002\n*label 3002\n*choice\n    #Perhaps, if your price is brought lower...\n        Aonghus shakes his head disappointedly, \"You grow too bold for your own good, ${name}, I had hoped you could redeem yourself from your earlier disappointment, but now I see otherwise.\"  He glances to the warrior at his right, who hands him the leather sack. He holds it in both hands and as if it were a generous gift, hands it to ${nego}. Your eyes widen in alarm when you notice the trickles of crimson seeping out of the bag. ${nego}, not seeming to notice, holds the bag upside down for the contents to pour into ${their} hand. ${They} lets out a gasp as the distinct head of ${Saoirse}, the healer from Kanturk, rolls onto ${their} arms. ${they} drops it in ${their} moment of panic, and the head falls with an undignified squelch into the mud. The crimson blood quickly spreads outward from the jagged slice at ${Saoirse}'s neck, forming a muddy-red frame for ${their} pale, lifeless head.\n        \n        \"I had heard you were quite fond of this one, ${name}.\" Aonghus says menacingly. Before either of you can react, they turn back and head back to their awaiting and slowly growing army, with stragglers from their march catching up. You and ${nego} turn, somewhat in a daze, and head back to their awaiting and slowly growing army, with stragglers from their march catching up.You and ${nego} turn and make haste to the camp, where your ${gallowglass} heavy gallowglass and ${kern} light kerns are taking their positions. The few peasant refugees that aren't too malnourished or weakened to fight have taken up their scythes and pitchforks, mixed among them are the recruits from Kanturk and your father's village. There are around ${peasant} lowly trained men at the inner gates of the camp.\n        *goto 3003 \n       \n       \n    #No, our negotiation has ended\n        \"Are you sure?\", ${nego} ask.\n        *choice\n            #Yes\n                \"What a waste of my good time\", Aonghus spits. \"We'll see you on the battlefield, then, little wolf cub.\" One of his warriors dismounts, and, squelching in the mud, he hands up their weapons. \"I had hoped you could redeem yourself from your earlier treachery, but now I see otherwise.\"  He glances to the warrior at his right, who hands him the leather sack. He holds it in both hands and as if it were a generous gift, hands it to ${nego}. Your eyes widen in alarm when you notice the trickles of crimson seeping out of the bag. ${nego}, not seeming to notice, holds the bag upside down for the contents to pour into ${their} hand. ${They} let out a gasp as the distinct head of ${Saoirse}, the healer from Kanturk, rolls onto ${their} arms. ${they} drops it in ${their} moment of panic, and the head falls with an undignified squelch into the mud.\n                \n                The crimson blood quickly spreads outward from the jagged slice at ${Saoirse}'s neck, forming a muddy-red frame for ${their} pale, lifeless head. \"I had heard you were quite fond of this one, ${name}.\". Before either of you can react, they turn back and head back to their awaiting and slowly growing army, with stragglers from their march catching up. You and ${nego} turn, somewhat in a daze, and head back to their awaiting and slowly growing army, with stragglers from their march catching up. You and ${nego} turn and make haste to the camp, where your ${gallowglass} heavy gallowglass and ${kern} light kerns are taking their positions. The few peasant refugees that aren't too malnourished or weakened to fight have taken up their scythes and pitchforks, mixed among them are the recruits from Kanturk and your father's village. There are around ${peasant} lowly trained men at the inner gates of the camp.\n                *goto 3003\n            #No\n                *goto 3002\n\n*label 3003\nAs you arrive at the inner gates, you can feel expectation on your warrior's faces looking down on you. When you give them a shake of the head, they know there will be no truce, no white flag and no pleading. The prospects of peace have flown away with the swallow, the mood in the camp is somber, with the fear from the peasants and new recruits palpable in the air, 38 new peasants been enlisted from the camp workers and servants. Nevertheless, your men stand strong.\n*if trick =0\n    *goto 3004\n\n*else\n    *goto 3005\n\n*label 3004\nBrenda, who seems to have voluntarily taken charge of the weaker refugees, says, \"The work has been carried out as ordered, my ${king}, the fat has been stripped from the meat and strewn across the inner walls along with the tent cloths. It'll be a cold few days if we manage to survive this, our people are sick enough as it is, this rain is just what they need.\", she says somberly. Her face is pale, though her expression and demeanor very much that of a Woman trying furiously to stay strong.\n\nHer face then shifts back to looking cold, hard and solemn. \"When the enemy arrive, we'll await your orders to light it. The rain has left the flammables fierce soggy, let us hope the fat does it's job.\" He marches briskly to the peasants at the inner gate, and takes from one of them a great banner, of a boar like no other. The day's dampness has done little to take away from the grandeur of the embroidery, in truth, the slick wetness only emphasises the strength of the colours displayed on the banner. The Boar is embroidered in golden thread, with eyes dyed expensively in a deep blue hue. The background is an ominous black. The banner hangs vertically from a cross at the top of a slender 12 foot staff. Brenda grips the staff firmly in his hands, keeping his feet partly imbedded in the soggy soil and retaining a solid, wide legged stance for fear of the tall banner overbalancing him.\n\nWithin the makeshift inner-wagon fort stands Breccan, who peers around in calm complacancy at the troops manning the defences. His wiry beard flaps delicately as his lips move inaudibly, perhaps speaking words of prayer. With him in the fort of overturned wagons and carts are the mages, three of whom have their thumbs pressed to their lips and their eyes rigidly shut, the other mage, whom you had spoken earlier to, just stares to the sky in silent glee. Around them are a few choice gallowglass, acting as a small boyguard unit. The peasants are still finishing up the laying out of all the flammable materials they can find, when one of the men at your wooden walls calls out in alarm, signalling to you and your advisors that have gathered around you, that the enemy have begun their advance. Ultan, Medb and Oscar all seem, despite their sureness and boisterousness prior to now, are all quiet and thoughtful. Although it can't be denied, they have expressions more of nervous excitement than fear. Brenda, pulling the bridle of a chestnut mare, rides over to you on a similar mount. \"My ${king}, ${name}, surely you'd rather sit proudly atop a fine steed such as her, and watch your warriors as they fight for you? Rather than cower amongst these witless wisemen?\" She gestures with a smirk to Medb, Oscar and Ultan who just glare back at her. Do you take her offer?\n*choice\n    #Yes\n        *goto 3006\n    #No\n        *goto 3007\n        \n\n\n*label 3005\nThe men have taken their positions on the outer wall, holding only the weaker areas and the main wooden gate. Brenda, who seems to have voluntarily taken charge of the weaker refugees, says \"My lord, we have the weaker areas of the outer wall defended, let us hope Aonghus does not see our weakness.\" His face is pale, though his expression and demeanor very much that of a man trying furiously to stay strong.\n\nHis face then shifts back to looking cold, hard and solemn. \"When the enemy arrive, we'll await your orders to light it. The rain has left the flammables fierce soggy, let us hope the fat does it's job.\" He marches briskly to the peasants at the inner gate, and takes from one of them a great banner, of a boar like no other. The day's dampness has done little to take away from the grandeur of the embroidery, in truth, the slick wetness only emphasises the strength of the colours disblayed on the banner. The Irish Elk is embroidered in golden thread, with eyes dyed expensively in a deep blue hugh. The background is an ominous black. The banner hangs vertically from a cross at the top of a slender 12 foot staff. Brenda grips the staff firmly in her hands, keeping his feet partly imbedded in the soggy soil and retaining a solid, wide legged stance for fear of the tall banner overbalancing him.\n\nWithin the makeshift inner-wagon fort stands Breccan, who peers around in calm complacancy at the troops manning the defences. His wiry beard flaps delicately as his lips move inaudibly, perhaps speaking words of prayer. With him in the fort of overturned wagons and carts are the mages, three of whom have their thumbs pressed to their lips and their eyes rigidly shut, the other mage, whom you had spoken earlier to, just stares to the sky in silent glee. Around them are a few choice gallowglass, acting as a small boyguard unit. The peasants are still finishing up the laying out of all the flammable materials they can find, when one of the men at your wooden walls calls out in alarm, signalling to you and your advisors that have gathered around you, that the enemy have begun their advance. \n\nUltan, Medb and Oscar all seem, despite their sureness and boisterousness prior to now, are all quiet and thoughtful. Although it can't be denied, they have expressions more of nervous excitement than fear. Brenda, pulling the bridle of a chestnut mare, rides over to you on a similar mount. \"My ${king}, ${name}, surely you'd rather sit proudly atop a fine steed such as her, and watch your warriors as they fight for you? Rather than cower amongst these witless wisemen?\" She gestures with a smirk to Medb, Oscar and Ultan who just glare back at her. Do you take her offer?\n*choice\n    #Yes\n        *goto 3006\n    #No\n        *goto 3007\n        \n\n\n*label 3006\nThe advisors look irritatedly at you as you take her offer, she seems to take a sort of enjoyment from Ultan's furious eyer boaring into the back of her head. You mount a similar steed, and as you do, one of your guards on the wall shouts out, \"the armies of Aonghus march forth. The assault is beginning!\" Together, you and Brenda make your way to the open gates, with a clear view of the vast, swampy battlefield as well as the outer bailey. \n\nTheir ranks are steadfast with shields and bristle ferociously with spears, descending on your camp like death's own servants.\nYou have ${gallowglass} gallowglass, ${kern} kerns and ${peasant} peasants against their ${boars} elk warriors.\n*goto 3010\n*label 3010\n*if trick =0\n    With little, if any, resistance to meet them at the wall, they rapidly scale the walls with their ladders, and start to regroup within those walls, forming up as a solid unit once more. The outer gates are broken down to make way for Aonghus, who holds the banner of the ferocious boar high for all to see. They are both on horseback and are shouting inaudible commands to their men.\n    \n    Not noticing the trap that awaits them, they march steadily forward… The front ranks of the enemy are now in the area that has been covered in flammables. The rain has cleared off, and the time may be right. Ultan has just nocked a flaming arrow onto his bowstring, pulling the arrow back, and awaiting your command.\n    *choice\n        #Wait...\n            He holds it still, and Aonghus' men continue to march forward. Now the majority of his forces lie exposed in the trap.\n            *choice\n egin to lose heart, Brenda, excited by the show, rushes in on her horse, swinging downwards with her longsword and lopping the heads off her confused foe as she rides.\n        \n        Seeing his men on the verge of routing, Aonghus charges in on horseback, holding a sword in each hand and laying out devastating damage. Aonghus slices the arms off two of your gallowglass almost immediately. As Brenda is busy excitedly hacking away at the boar warriors from abcve, Aonghus rides up behind her, his longsword raised above his head and his body in a state of pure composure.\n        *choice\n            #Brenda! Look out!\n                She turns just in time to see the General thrust his sword into her stomach, plunging it deeply and letting it go. She falls off her horse, the sword still impaling her, and lies still on the ground.\n                *goto 3012\n            \n            \n                \n            #I'll stay silent\n                Oblivious to the galloping behind her, Aonghus thrusts his sword into her back, plunging it deeply and letting it go. She falls off her horse, the sword still impaling her, and lies still on the ground.\n                *goto 3012\n\n     \n    #Close the gates!\n        The gates are hurriedly shut, cutting off your view of outside of the walls. You and your advisors rush up to the walls to get a good view of what's going on down below. Aonghus's men are bringing forth tall siege ladders, with Aonghus pointing them to their positions. Your men rain down rocks and arrows while they move their ladders into place, and soon they begin scaling the walls.\n        \n        Brenda helps a few of the servants as they carry to the wall large copper pots of boiling water. As they brush past you to pour it over the ladders, the steam hits you and makes your eyes water. This water is absolutely scalding! Four boar warriors are climbing the ladders when a pot is emptied over their heads, sending them crashing down to the ground,            #I'll stay silent\n                Oblivious to the galloping behind her, Aonghus thrusts his sword into her back, plunging it deeply and letting it go. She falls off her horse, the sword still impaling her, and lies still on the ground.\n                *goto 3011\n            \n*label 3012\nAlthough the battle seemed to be turning in your favour, the relentlessness and sheer numbers of the enemy force manages to push your force back, and they retreat to the closing gates. Most of them manage to make it in, but those that don't are quickly slaughtered.\n\nYou and your advisors rush up to the walls to get a good view of what's going on down below. Aonghus' men are bringing forth tall siege ladders, with Aonghus pointing them to their positions. Your men rain down rocks and arrows while they move their ladders into place, and soon they begin scaling the walls.\n        \nBrenda helps a few of the servants as they carry to the wall large copper pots of boiling water. As they brush past you to pour it over the ladders, the steam hits you and makes your eyes water. This water is absolutely scalding! Four boar warriors are climbing the ladders when a pot is emptied over their heads, sending them crashing down to the ground, holwling with the agonising pain. One by one the pots are emptied in a similar fashion, sending men crumpling to their knees and shrieking like newborns. Only when the pots have run out does Aonghus' forces start to make progress, and your men do their best to hack them down as they climb. It is only a matter of time, however, before the relentless boar warriors manage to secure footholds on the wall and take control of the gates, opening them to allow the rest of the army to surge in.\n*set boars -96\n*set kern -30\n*set gallowglass -9\n*set peasant -34\n*if kern \u003c0\n    *set kern 0\n*if peasant \u003c0\n    *set peasant 0\n*if gallowglass \u003c6\n    Your forces are simply too depleated to fight on, and though Medb screams at them to keep up the fight, her words fall on deaf ears, and they fall to their knees. In retribution for the death of their leader, one of the boar warriors marches up to you without a second thought, and stabs you deep in the gut. You fall back, lying in a puddle of your own blood and stomach acid, and die in agony with your own men looking on in sympathy, but not one raising a voice of protest.\n    *goto_scene death\n*else\n*goto 3011\n*label 3011\nYour men are becoming increasingly clumsy as the battle wears on and fatigue begins to grip them like a bag of coal strapped to their backs, some slip in the mud and are slashed and trampled where they lie. Others miss easy strikes with their javelins or react too sluggishly to block stabbing attacks. Many are killed far too easily in this way, and marale in your ranks is at an all time low as fresh boar warriors rush through the gates. Ultan, looking almost petrified, though trying to look strong, says \"${name}, Your men need you, they have all but lost heart.\" You rush down to the ground so that you may be closer to your men and the battle. How  do you raise their spirits?\n\nYou have ${gallowglass} gallowglass, ${kern} kerns and ${peasant} peasants against their ${boars} elk warriors.\n*goto 3013\n*label 3013\n*choice\n    #I give them a powerful speech, convincing them that the battle shall be won!\n        *if Persuasion \u003c60\n            The men seem to barely notice your heartfelt, though badly placed, words. They will need something much more powerful if the tide of battle is to change!\n            *goto 3013\n        *else\n            The men are truly uplifted by your words, and fight on harder than ever, their sluggishness becomes swift, their weakness becomes powerful. They chant passionately as they thrust and slash, \"Long live ${king} ${name} of the boars!\",  \"For ${king} ${name}, the slayer of Elks!\" The battle finalluy begins to turn in your favour as warrior after warrior is chopped down by your , taking loss after loss against the emboldened boar warriors.\n        *set gallowglass -25\n        *set peasant -15\n        *set kern -32\n        *set boars -23\n        *goto 3014\n    \n*label 3014\nOut of the corner of your eye, you see a man riding bareback, his cloak flapping wildly in the wind as he nears you, his longsword held like a single wing spreading out to his right. His body shifting up and down in rythme with his horse's hooves as they gallop towards you. You turn to face him, unsheathing your ${weapon} from it's scabbard and hold it in front of you.\n\n\"You scumbag!\" Aonghus screeches at you as he nears you, it may be a cruel trick of the light, but it looks as if there are tears streaming in torrents from his face. He raises his sword to strike you, and shouts with a wavering, shaky voice, \"Bastard, I'll kill you!\" The horse is seconds from trampling you, what do you do\n*choice\n    #Slash at the horse's legs\n        As the horse is about to knock you into the ground and Ailbhe is ready to send your head rolling into the mud, you jump to the side of their path, slicing your sword at the knees of the great stallion. It shrieks in pain, rearing up and sending Aonghus toppling into the mud. His head smacks against a rock as his body sinks deep into the watery mud.\n        *goto 3015\n            \n    #Throw your sword at him\n        It's no easy task to throw a ${weapon} straight and true, but you manage to do it, and it soars through the sky and lodges itself deep into Ailbhe's stomach. He yells out in pain, and his horse rears up and sends Ailbhe toppling into the mud. His head smacks against a rock as his body sinks deep into the watery mud.\n        *goto 3015\n    #Charge at him headlong!\n        You swing your ${weapon} at the horse, but with too much momentum to stop, the horse bashes you into the ground. You can see as you raise your head from the mud you have gashed the horse badly. It shrieks in pain, rearing up and sending Ailbhe toppling into the mud. His head smacks against a rock as his body sinks deep into the watery mud.\n        *goto 3015\n*label 3015\n*set boars -52\n*if (peasant \u003c1) \n    *set peasant 0\nOne of the elk warriors sees Aonghus' body in the mud, \"The king is dead! The king is dead!\" Shock reverberates amongst his soldiers, and many of them surrender almost immediately in hearing this. The rest of the men are still ready to fight 'till the bitter end. They form a tight circle of spears not unlike those you had encountered during the struggle with the vikings as a desperate last stand. This leaves ${boars} warriors against your ${gallowglass} gallowglass, ${kern} kerns, and ${peasant} peasants.\n\n*if gallowglass \u003c5\n    However, your forces are simply too depleated to fight on, and though Medb screams at them to keep up the fight, her words fall on deaf ears, and they fall to their knees. In retribution for the death of their leader, one of the elk warriors marches up to you without a second thought, and stabs you deep in the gut. You fall back, lying in a puddle of your own blood and stomach acid, and die in agony whith your own men looking on in sympathy, butnot one raising a voice of protest.\n    *goto_scene death\n*else\n    Your men eventually, after one final push, defeat their ferocious foe, and most of your men collapse in exhaustion when they see the last warrior die. They give to you their greatest gratitude as they lie down to rest. Those not too injured or exhausted to stand, raise their weapons in the air in salute, their admiration for you is palpable. Your wits and strengths have managed to lead your army to victory against the odds, but only barely. \n    \n    The many corpses that litter the ground will have to be put somewhere, likely in great stacks outside the camp, but for now, you rest. Breccan walks to you from behind the makeshift wagon fort. He kneels down beside you, \"My ${king}, you have served your people truly like one of <script>
/* ChoiceScript runtime — vanilla-JS port of the Python engine in cs/.
 *
 * Faithful reimplementation of parser + expr + interpolate + engine. The
 * engine is I/O-agnostic: it talks to an `io` object exposing text(), choose(),
 * page_break(), input_text(), input_number(), achievement(), stat_chart().
 *
 * Exposed as a global `CS` object (no modules, no build step).
 */
(function (root) {
  "use strict";

  // ---- errors ----------------------------------------------------------- //

  class CSError extends Error {
    constructor(message, scene, line) {
      super(formatLoc(scene, line) + message);
      this.raw_message = message;
      this.scene = scene === undefined ? null : scene;
      this.line = line === undefined ? null : line;
      this.name = "CSError";
    }
  }
  function formatLoc(scene, line) {
    if (scene == null && line == null) return "";
    return (scene == null ? "?" : scene) + " line " + (line == null ? "?" : line) + ": ";
  }
  class ExprError extends CSError { constructor(m, s, l) { super(m, s, l); this.name = "ExprError"; } }
  class GameOver extends Error { constructor(label) { super(label || ""); this.label = label || ""; this.name = "GameOver"; } }
  class QuitGame extends Error { constructor() { super("quit"); this.name = "QuitGame"; } }
  class LoadGame extends Error { constructor(state) { super("load game"); this.state = state; this.name = "LoadGame"; } }
  class RestartGame extends Error { constructor() { super("restart"); this.name = "RestartGame"; } }

  // ---- parser ----------------------------------------------------------- //

  const COMMAND_RE = /^\s*\*(\w+)\b[ \t]?([\s\S]*)$/;
  const INDENT_RE = /^([ \t]*)/;

  class Line {
    constructor(num, indent, command, arg, text) {
      this.num = num;
      this.indent = indent;
      this.command = command; // null for plain text
      this.arg = arg;
      this.text = text;
    }
    get is_blank() {
      return this.command == null && this.text.trim() === "";
    }
  }

  function getIndent(raw) {
    const m = INDENT_RE.exec(raw);
    const ws = m ? m[1] : "";
    if (ws.indexOf("\t") !== -1 && ws.indexOf(" ") !== -1) {
      throw new CSError("mixed tabs and spaces in indentation");
    }
    return ws.length;
  }

  function parseScene(text) {
    const lines = [];
    const rawLines = text.split("\n");
    for (let i = 0; i < rawLines.length; i++) {
      let raw = rawLines[i].replace(/\r$/, "");
      const num = i + 1;
      if (raw.trim() === "") {
        lines.push(new Line(num, 0, null, "", ""));
        continue;
      }
      const indent = getIndent(raw);
      const m = COMMAND_RE.exec(raw);
      if (m) {
        lines.push(new Line(num, indent, m[1], m[2], raw.trim()));
      } else {
        lines.push(new Line(num, indent, null, "", raw.trim()));
      }
    }
    return lines;
  }

  // ---- value coercion --------------------------------------------------- //

  function isNum(v) { return typeof v === "number"; }
  function isBool(v) { return typeof v === "boolean"; }
  function isStr(v) { return typeof v === "string"; }

  function toNum(value) {
    if (isBool(value)) throw new ExprError("Expected number, got boolean: " + value);
    if (isNum(value)) return value;
    const s = String(value).trim();
    if (/^-?\d+$/.test(s)) return parseInt(s, 10);
    // Match Python float(): the whole string must be a valid float literal.
    if (/^[+-]?(\d+\.?\d*|\.\d+)([eE][+-]?\d+)?$/.test(s)) {
      const f = Number(s);
      if (!isNaN(f)) return f;
    }
    throw new ExprError('Expected number, but got string: "' + value + '"');
  }

  function toBool(value) {
    if (isBool(value)) return value;
    if (isNum(value)) throw new ExprError("Expected boolean, got number: " + value);
    const s = String(value).trim().toLowerCase();
    if (s === "true") return true;
    if (s === "false") return false;
    throw new ExprError('Expected boolean, but got string: "' + value + '"');
  }

  function csStr(value) {
    if (isBool(value)) return value ? "true" : "false";
    if (isNum(value)) {
      // integers render without a decimal point
      if (Number.isInteger(value)) return String(value);
      return String(value);
    }
    return String(value);
  }

  // ---- expression tokenizer --------------------------------------------- //

  const TOKEN_SPECS = [
    ["OPEN_PARENTHESIS", /^\(/],
    ["CLOSE_PARENTHESIS", /^\)/],
    ["OPEN_CURLY", /^\{/],
    ["CLOSE_CURLY", /^\}/],
    ["OPEN_SQUARE", /^\[/],
    ["CLOSE_SQUARE", /^\]/],
    ["FUNCTION", /^(not|round|timestamp|log|length|auto)\s*\(/],
    ["NUMBER", /^\d+(\.\d+)?\b/],
    ["CURLY_QUOTE", /^[“”]/],
    ["WHITESPACE", /^\s+/],
    ["NAMED_OPERATOR", /^(and|or|modulo)\b/],
    ["VAR", /^\w+/],
    ["FAIRMATH", /^%[+\-]/],
    ["OPERATOR", /^[+\-*/&%^#]/],
    ["INEQUALITY", /^[!<>]=?/],
    ["EQUALITY", /^=/],
    ["COMMA", /^,/],
  ];

    constructor(name, value, pos, func) {

      this.value = value;
      this.pos = pos;
      this.func = func || null;
    }

    let pos = 0;
    const tokens = [];
    while (s) {

        let found = false;

          else if (c === '"') { found = true; break; }
          i += 1;
        }

        s = s.slice(matched.length);
        continue;
      }

      }
