, but luckily in the dark the guard doesn't seem to have noticed you. The guard steps down slowly, yawning as he goes, it is only when he is at eye level with you that his eyes widen in alarm. Bruce is too quick for him, however, he stabs the guard in the neck through the rungs of the ladder, precisely between his chain mail coating and his Gallowglass bascinet. Bruce tells you to grab his torch as he gurgles in his own blood, finally collapsing onto the ground. You make your way back towards the tent as quietly as you can, you hear the crunching of grass behind you, and turn around just in time to see a tall guard with his bow aimed at your chest. Bruce manages to send a dagger deep into the guards stomach just in time, the man staggers, but looses an arrow as he collapses, sending it into your shoulder.\n                \n                *set health -40\n                *goto 41\n                           \n            #No\n                \"Damn you, ${boy}\", he growls in frustration. You hear the footsteps of a guard on the wall, the inner wall is barely twice the height of a cottage, but luckily the guard still hasn't noticed you. Bruce pulls you roughly by the arm to come under with him. The guard steps down slowly, yawning as he goes, it is only when he is at eye level with you that his eyes widen in alarm. Bruce is too quick for him, however, he stabs the guard in the neck through the rungs of the ladder, precisely between his chain mail coating and his Gallowglass bascinet. Bruce tells you to grab his torch as he gurgles in his own blood, finally collapsing onto the ground. You make your way back towards the tent as quietly as you can, you hear the crunching of grass behind you, and turn around just in time to see a tall guard with his bow aimed at your chest. Bruce manages to send a dagger deep into the guards stomach just in time, the man staggers, but looses an arrow as he collapses, sending it into your shoulder.\n                *set health -40\n                *goto 41\n                               \n                              \n                  \n                       \n*label 1001\n\"Maybe, I've been a mercenary for several years now and have had plenty of blood on my hands, but you are still young and I doubt you've killed anyone before. A ${man}'s first kill is never easy. Are you sure you're ready?\"\n*choice\n    #On second thought...\n        *goto 39\n    #I'm going to enjoy this!\n        He gives you a firm nod  with a slightly worried look on his face. His fingers resting on the selection of throwing daggers at his belt. He pulls a cross necklace that hangs tucked under his dark leather armour. He kisses it, whispering, \"may God forgive us\"., \"Then let's make haste, ${name}\".\n        *goto 43\n    #I'm ready, I think\n        \"Well then, ${name}, let our words become actions\", he says, his fingers resting on the selection of throwing daggers at his belt. He pulls a cross necklace that hangs tucked under his dark leather armour. He kisses it, whispering, \"May God forgive us\".\n        *goto 43\n*label 41\n\"Gah!\" ,you grunt, the force of the arrow knocks you back onto the hard, stony ground. You lie winded for several seconds, the red shadow of the arrow spreading across your torso. You try to twist yourself up, but the pain that shoots through you makes you gasp, and unable to bear it, you lie back down. You can see from the corner of your eye Bruce running over to the struggling guard and giving him a decisive, imploding blow with his foot on the guard's head. A sickening crunch fills the silent but chilly night air. Bruce lifts you on his shoulders after taking the torch from your hand, you hadn't even realised you were still holding it. \n\nDespite the added weight of you, he still manages to sneak back to the tents as graceful and silent as a fox. He comes to a tent not far  from where your own is situated, and places the torch at it's base. The flames start to lick their way up the sides of the tent as Bruce retreats back from it before putting you down gently, \"Your going to have to run if they see us, no way I could outrun them with you on me\".. You hear the frightened noise of men drowsy from a sudden end to their slumber and screaming as the heat fills the tent. The poles holding the tent up, weakened by the flames, collapse inwards and the black, cinder-stained cloth of the tent wraps up the men inside as they scream in agony. As the timber snaps, sparks spray outward, and in seconds the sparks on the adjacent tents have evolved into great monstrous flames. Soon the whole inner camp is aglow, and the smell of burning fabric and, you suspect, human flesh makes you feel like doubling over and in a fit of coughing, but you know the longer you wait, the less chance you will have of making it out.\n\nThe confused noises of nearby guards, the ringing of bells and sounding of horns in alarm fills the camp. Amidst all the confusion, you and Bruce seem to manage to slip away unawares. However as you run through smouldering walls and panicking hounds and horses, you lose Bruce, you strain your eyes in search of him in the thick clouds of smoke. \n\nYou crouch down in hiding as you walk, hands feeling forward as you squint in the opaque, dusty air. You hear an alarming 'thunk' behind you, accompanied by the 'thump' sound of a bag of turnips falling hard to the floor. It is only as you near the sound that you recognise the smell of manure in the smoke. You walk towards the smell, and you see an obscured silhouette of a horse, struggling against the rope that has tied it to the stable fence. As you become nearly close enough to touch it, you trip over a flat, log-like object. \n\nYou peer closely to it, a human head rendered unrecognisable by a hoof print to the face. The realisation dawns on you, in the thick smoke Bruce must have brushed past the rear of the struggling mare in front of you, causing it to inflict a protective, deadly kick. You feel like screaming, though you know when the smoke starts to clear, someone will be bound to recognise you. Tears stream from your eyes as you run through the outer gate, whether they are for Bruce or a result of the smoke in your eyes, you're not quite sure. You trod haggardly past men as they run with buckets in their hand towards the swamp, coughing from lungs full of soot as you go. \n\nThe sound of leather boots squelching through thick mud reverberates outside the camp as men and women alike race back to the camp, weighed down by heavy buckets of water hoping to quench the now all-consuming flames. You don't stop until you both collapse together in a heap, deep in the woods.\n*achieve daddy\n*set elk \"boar\"\n*set sig +1\n*goto_scene chapter6\n\n*label 43\nYou creep together from the tent, silent as foxes. You try to stay in the shadows as you peer around for any unlucky watchman to come patrolling your way, you slowly move towards the wooden walls. In the dark you can scarcely see the outline of the men on the wall, but by the flickering torches they hold, you know where each man is. You make your way to the ladder of the inner wall, Bruce hides under it, waiting for a guard to climb down it from patrol on the wall. They say it's bad luck to lie beneath the rungs of a ladder, it's where the devil's children hide, or so your father had told you. Do you join him?\n*choice\n    #Yes\n        You hear the footsteps of a guard on the wall, the wall is barely twice the height of a cottage, but luckily in the dark the guard doesn't seem to have noticed you. The guard steps down slowly, yawning as he goes, it is only when he is at eye level with you that his eyes widen in alarm. \n                              \n        Bruce is too quick for him, however, he stabs the guard in the neck through the rungs of the ladder, precisely between his chain mail coating and his Gallowglass bascinet. The sound of a man gurgling in his own blood is like nothing you have ever heard before, the man's eyes convulse in their sockets, his hands desperately grab to pull the dagger from him, holding now onto Bruce's wrists.\n                              \n        His fingers twitch pleadingly on Bruce's, but Bruce only pushes the dagger in deeper. The man gasps silently, before finally collapsing onto the ground.\n        *goto 44\n                         \n     #No\n        \"Damn you, ${boy}\", he growls in frustration. You hear the footsteps of a guard on the wall, the inner wall is barely twice the height of a cottage, but luckily the guard still hasn't noticed you. Bruce pulls you roughly by the arm to come under with him. \n                               \n        The guard steps down slowly, yawning as he goes, it is only when he is at eye level with you that his eyes widen in alarm. Bruce is too quick for him, however, he stabs the guard in the neck through the rungs of the ladder, precisely between his chain mail coating and his Gallowglass bascinet.\n                               \n        The sound of a man gurgling in his own blood is like nothing you have ever heard before, the man's eyes convulse in their sockets, his hands desperately grab to pull the dagger from him, holding now onto Bruce's wrists. His fingers twitch pleadingly on Bruce's, but Bruce only pushes the dagger in deeper. The man gasps silently, before finally collapsing onto the ground.\n        *goto 44\n*label 44\nYou tuck the body under the ladder, but you both turn your heads as you hear what sounds like the the footsteps of around eight guards. \"This was a very bad idea\", he says, looking around him. He quickly crouch-runs back towards the tents, beckoning you to follow. You duck between two tents and crouch in silence, waiting for the patrol to pass. \"We must get to the stables\", he says in a determined voice, \"otherwise we are both good as dead.\" Just as you are about to leave your cover and make a run for the stables, you see through the tent walls *label 41\n\"Gah!\" ,you grunt, the force of the arrow knocks you back onto the hard, stony ground. You lie winded for several seconds, the red shadow of the arrow spreading across your torso. You try to twist yourself up, but the pain that shoots through you makes you gasp, and unable to bear it, you lie back down. You can see from the corner of your eye Daragh running over to the struggling guard and giving him a decisive, imploding blow with his foot on the guard's head. A sickening crunch fills the silent but chilly night air. Daragh lifts you on his shoulders after taking the torch from your hand, you hadn't even realised you were still holding it. Despite the added weight of you, he still manages to sneak back to the tents as graceful and silent as a fox. He comes to a tent not far from the garrison, and places the torch at it's base.\n\nThe flames start to lick their way up the sides of the tent as Daragh retreats back from it before putting you down gently, \"Your going to have to run if they see us, no way I could outrun them with you on me\". You hear the frightened noise of men drowsy from a sudden end to their slumber and screaming as the heat fills the tent. The poles holding the tent up, weakened by the flames, collapse inwards and the black, cinder-stained cloth of the tent wraps up the men inside as they scream in agony. As the timber snaps, sparks spray outward, and in seconds the sparks on the adjacent tents have evolved into great monstrous flames.\n\nSoon the whole inner camp is aglow, and the smell of burning fabric and, you suspect, human flesh makes you feel like doubling over and in a fit of coughing, but you know the longer you wait, the less chance you will have of making it out.  The confused noises of nearby guards, the ringing of bells and sounding of horns in alarm fills the camp. Amidst all the confusion, you and Daragh seem to manage to slip away unawares. \n\nHowever as you run through smouldering walls and panicking hounds and horses, you lose Daragh, you strain your eyes in search of him in the thick clouds of smoke. You crouch down in hiding as you walk, hands feeling forward as you squint in the opaque, dusty air. You hear an alarming 'thunk' behind you, accompanied by the 'thump' sound of a bag of turnips falling hard to the floor. It is only as you near the sound that you recognise the smell of manure in the smoke. You walk towards the smell, and you see an obscured silhouette of a horse, struggling against the rope that has tied it to the stable fence. As you become nearly close enough to touch it, you trip over a flat, log-like object. You peer closely to it, a human head rendered unrecognisable by a hoof print to the face. The realisation dawns on you, in the thick smoke Daragh must have brushed past the rear of the struggling mare in front of you, causing it to inflict a protective, deadly kick. \n\nYou feel as though your eyes are screaming in the thick smoke, though you know when the smoke starts to clear, someone will be bound to recognise you. Tears stream from your eyes as you run through the outer gate, whether they are for Daragh or a result of the smoke in your eyes, you're not quite sure. You trod haggardly past men as they run with buckets in their hand towards the swamp, coughing from lungs full of soot as you go. The sound of leather boots squelching through thick mud reverberates outside the camp as men and women alike race back to the camp, weighed down by heavy buckets of water hoping to quench the now all-consuming flames. You don't stop until you collapse in a heap, deep in the woods.\n*set Daragh \"Bruce\"\n*set rot +1\n*goto_scene chapter6\n\n*label 43\nYou creep together from the tent, silent as foxes. You try to stay in the shadows as you peer around for any unlucky watchman to come patrolling your way, you slowly move towards the wooden walls. In the dark you can scarcely see the outline of the men on the wall, but by the flickering torches they hold, you know where each man is. You make your way to the ladder of the inner wall, Daragh hides under it, waiting for a guard to climb down it from patrol on the wall. They say it's bad luck to lie beneath the rungs of a ladder, it's where the devil's children hide, or so Ailbhe had told you. Do you join him?\n*choice\n    #Yes\n        You hear the footsteps of a guard on the wall, the wall is barely twice the height of a cottage, but luckily in the dark the guard doesn't seem to have noticed you. The guard steps down slowly, yawning as he goes, it is only when he is at eye level with you that his eyes widen in alarm. Bruce is too quick for him, however, he stabs the guard in the neck through the rungs of the ladder, precisely between his chain mail coating and his Gallowglass bascinet.\n                              \n        The sound of a man gurgling in his own blood is like nothing you have ever heard before, the man's eyes convulse in their sockets, his hands desperately grab to pull the dagger from him, holding now onto Daragh's wrists. His fingers twitch pleadingly on Daragh's, but Daragh only pushes the dagger in deeper. The man gasps silently, before finally collapsing onto the ground.\n        *goto 44\n                         \n    #No\n        \"Damn you, ${boy}\", he growls in frustration. You hear the footsteps of a guard on the wall, the inner wall is barely twice the height of a cottage, but luckily the guard still hasn't noticed you. Daragh pulls you roughly by the arm to come under with him. The guard steps down slowly, yawning as he goes, it is only when he is at eye level with you that his eyes widen in alarm. Daragh is too quick for him, however, he stabs the guard in the neck through the rungs of the ladder, precisely between his chain mail coating and his Gallowglass bascinet. \n                               \n        The sound of a man gurgling in his own blood is like nothing you have ever heard before, the man's eyes convulse in their sockets, his hands desperately grab to pull the dagger from him, holding now onto Daragh's wrists. His fingers twitch pleadingly on Bruce's, but Daragh only pushes the dagger in deeper. The man gasps silently, before finally collapsing onto the ground.\n        *goto 44\n*label 44\nYou tuck the body under the ladder, but you both turn your heads as you hear what sounds like the the footsteps of around eight guards. \"This was a very bad idea\", he says, looking around him. He quickly crouch-runs back towards the tents, beckoning you to follow. You duck between two tents and crouch in silence, waiting for the patrol to pass. \"We must get to the stables\", he says in a determined voice, \"otherwise we are both good as dead.\" Just as you are about to leave your cover and make a run for the stables, you see through the tent walls the silhouette of a man in candlelight. The silhouette gets larger and more defined as he nears the walls of his tent.\n\n\"Hello?\", he asks suspiciously. You see through the walls of the tent him picking up what appears to be a pole of some kind, he puts his other hand up against the walls of the tent, and pushes it towards you. You and Daragh both glance at each other in panic. A sudden movement would confirm the man's suspicion, but if he persists and touches you, his suspicions would be confirmed anyway, what do you do?\n*choice\n    #Stay still\n        \n        His hand searches and searches until it touches your chest, you hear the man gasp, and before you can move he has gripped onto you firmly, Bruce raises a knife above his hand, ready to sever it. However, it's too late, the man in the tent pushes his spear through the thin fabric of the tent, plunging is deep into your stomach. You feel blood begin to seep into your mouth as you collapse on the ground, still deeply impaled by the spear. The man shouts an alarm but it all seems muffled to your ears.\n                               \n        The blood stains your lips and dribbles out of the side of your mouth, you can feel the stomach acid burning your skin as it seeps out of your only partly clogged wound. You feel Daragh's arms under your shoulders and the back of your knees as he picks you up, your vision begins to fade, and so too does the feeling in your toes, then ankles, then thighs. The feeling is also fleeing your fingers and retreating back towards your shoulders, leaving desolate, alien objects hang from your torso. Daragh tries to run with you in his arms, but is struck in the back by a war dart with a 'thunk', and he topples over you. \n                               \n       Even though the ground is solid, it feels like it's swallowing you up. The world around you fades and is replaced, by the dream that had left you in shivers this very night, almost like a prophecy, the Irish Elk and Boar, destined to die as one.\n       \n       *goto_scene death\n    #Run!\n       Together, you bolt towards the exit of the inner gate, the guard in the tent hears the sudden scuffling of footsteps and raises the alarm, \"Hey!\", he yells, \"Who's that?\" Several guards on the wall hear the calls, two rush to meet you while another three start closing the heavy wooden gates. Daragh stops to throw three daggers, one after the other, into the thigh and torso of one of them. The other man rushes at you, thrusting and slicing his axe excitedly at you. You have no weapon with you, so you're going to have to improvise…\n       *choice\n          #Grab for the shaft of the axe\n              You hold onto it tightly, with both of you wrestling for power in both hands. He gives you a growl in frustration and kicks you hard in the stomach, you collapse onto the ground and he raises his axe above you, grinning in relief. His gleaming smile disappears when the 'thunk' sound of one of Daragh's daggers comes from behind him, he crumples over and collapses at your feet. Bruce grabs you by the wrist, hoists you up and, still winded by the guard's knee, you both run as fast as your legs will carry you towards the thin gap between the steadily closing gates.\n              *set health -10\n              *goto 50\n                                       \n          #Throw a rock at him\n              You lean down to pick up a rock, but before you can even get your fingers around it, the guard knees you in the stomach and knock you into the ground hard. His gleaming smile disappears when the 'thunk' sound of one of Bruce's daggers comes from behind him, he crumples over and collapses at your feet. Daragh grabs you by the wrist, hoists you up and, still winded by the guard's knee, you both run as fast as your legs will carry you towards the thin gap between the steadily closing gates.\n              *set health -10\n              *goto 50\n          *if combat >19\n              #Barge right into him(requires combat 20)\n                  You catch him off guard and he topples into the dust, sidestepping him, you and Daragh make your way as fast as your legs will carry you to the very narrow gap between the slowly and steadily closing gates.\n                  *goto 50\n*label 50\nYou manage to slip past the gates, looking behind as you run, you see with horror that Daragh didn't make it, you hear the sound of a few desperate clashes of swordplay, but soon the sound of metal slashing through flesh fills the night air. Then all is quiet, except for the sound of your leather boots on the uneven, grassy ground of the outer camp as you run for the stables. Knocking a stable boy into the mud, you leap atop a beautiful, glossy brown mare. She rears up as you hold tightly onto her unbridled neck, doing all you can not to fall off. \n\nYou try to soothe her with whispers of comfort, but still she shakes her sturdy neck back and forth, her long mane almost slapping your face as she moves. Finally you manage to calm her but already several are opening the gates that had ensured an end to Daragh's life, and further uphill a small pack of hunting dogs are bolting towards you. Seeing this the mare panics once more, but this time she pays little heed to you and instead digs her hooves into the hay-littered mud and leaps over the stable gates, she turns to the forest and bolts so fast it is all you can do to grab hold of her flowing mane as you bounce up and down on her bare back. You see some of the guards behind you mounting the remaining horses into the stable. \n\nOne of them blows a cow horn, it somehow aggravates the hunting dogs even further, they snap and froth at the mouth as they begin to pick up more speed. Yet the gap between you and them only widens as your mare accelerates through the open outer gates and into the swamp. You try to redirect her to the path of solid ground, but she is as determined as she is fast, and she pushes onward. The sloshing of hooves thick in mud begins to drown the now distant snapping of dogs. The swamp water splashes up at you as the mare struggles through it, her steps now becoming more strenuous and heavy.\n\nThe mare cries out as the mud crawls up to her knees, she wades through it, and soon her legs are completely submerged. She continues cautiously, seeming to know that in mud this thick, if she trips she may never be able to resurface. You begin to near the side of the swamp and the mud begins to sink around her, revealing the tops of her legs once more. You feel a sense of relief wash over you, but it is then that the 'twok' sound of an arrow embedding itself in flesh behind you is answered by another desperate cry by your steed. \n\nShe rears up to the sound of roaring dogs further down the swamp, they are accompanied by mounted archers, though their stallions dare go no further. Another arrow 'thunk's into her muscular neck and she, now on only her hind legs, falls back into the mud by her side with a squelch, you push away from her as she begins to slowly sink, and pull yourself up to the banks of the swamp. You run, your clothes heavy with mud, into the densely wooded forest. Until finally out of pure exhaustion, you collapse.\n\n*set Daragh \"Bruce\"\n*set rot +1\n*goto_scene chapter6\n\n                         \n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "chapter6": "*Page_Break Chapter 6\n*image Chap6.png\n*if Health \u003c2\n    After several minutes of lying blood-clod in the mossy forest floor, you try to pull yourself upwards to continue your travel. After a few failed attempts, you force what little energy you have left into your arms and push your clumsy torso upwards. You find your feet but need to cling to a tree feebly for balance. You try to walk from it, letting go of your natural wood support and almost immediately collapse into the hard, cold ground. The injuries you have sustained so far on this journey have simply been to much for your body to handle. You lie with too little energy to shiver, in the damp foliage, awaiting Dagda's messengers.\n    *goto_scene death\n*else\n    *goto 3\n*label 3\n\n[i]\"The merciless Macdonwald,[/i]\n\n[i]Worthy to be a rebel, for to that[/i]\n\n[i]The multiplying villainies of\nnature[/i]\n\n[i]Do swarm upon him, from the[/i]\n\n[i]Western isles[/i]\n\n[i]Of kerns and gallowglasses is supplied[/i]\n\n-William Shakespeare, Macbeth\n\nAfter a few seconds lying down on the damp, root riddled forest floor, you find the strength to slowly make your way deeper into it. The morning sun has almost completely risen, though there is little evidence of that here under the dense, shadowing canopy. \n\nYou hear the barking of hounds and the horn blowing of men, but it is far enough away know that you can allow yourself to feel relieved. After half an hour of navigating through bristly thorn bushes tearing at your clothes and the morning dew on the mossy barks of trees sending you into a wet, shivery state, you arrive at the clearing against a stream, where your father had told you to wait with your now fallen companion.\n\nA red X had been painted in calf blood to mark the point of meeting, most disturbing as you near it, is the sight of a wild bull, presumably lost from or evicted by it's heard, licking the blood from the bark. You sit down to rest once more by the stream that runs like an artery into the depths of the wood, keeping a safe distance from the lone bull, you hear the crunching of feet on fallen leaves. You manage to stand up, your feet wobbling as you find your balance, your body tenses up as the noise grows louder. What do you do?\n*choice\n    #Mimic the call of the wolfhound through cupped hands to scare her off\n        You do it as best you can, but it sounds somewhat desperate rather than fierce. Through the trees, cutting down vines and thorn bushes as she goes, appears Brenda. She looks around for a moment before her steady gaze lands on you.\n        *goto 1\n    #Hide in the undergrowth\n        You dive behind the thickest appearing bush you can see, and land painfully in a bed of nettles. You stay down low, however, as the noise comes closer and grows louder.  Through the trees, cutting down vines and thorn bushes as she goes, appears Brenda. She looks around for a moment before her steady gaze lands on you.\n        *goto 1\n    #Stay put\n        Through the trees, cutting down vines and thorn bushes as she goes, appears Brenda. She looks around for a moment before her steady gaze lands on you.\n        *goto 1\n*label 1\n\"${name}, we have little time to lose. The guards are sure to come looking this way, especially after all the unnecessary mayhem you caused over there\", she shakes her head but seems to have an approving look in her eyes. Her eyes narrow in confusion for a second, \"Was ${Daragh} not supposed to meet us here? Is he scouting ahead?\" You tell her what happened, and how he was beyond saving, she nods solemnly and turns away, putting a hand to the tree marked with calf blood. She bows her head to the bark in a moment's silence, before pulling a thin, needle-like dagger and cuts a shallow line in her palm. She lets the blood dribble down the tree and in between the roots.\n*choice\n    #What on earth are you doing?\n        She pays little heed to your rude tone, and explains calmly without taking her hand from the tree. \"${Daragh} was a good man, he deserves a true burial wherever he may now be. The trees of the land connect us all, as they are connected to each other, ${name}. His body will, one way or another, return to the earth and the roots of the trees will absorb him, as they are right now absorbing my blood. I cared for him\", she states coldly and quietly. \" My blood will be connected to him when his body decomposes. This is the only possible way for him to be honoured right now as he should be.\"\n        *goto 2\n    #May I ask why you are doing this?\n        She opens her mouth and explains, without lifting her head or taking her hand from the tree.\"${Daragh} was a good man, he deserves a true burial wherever he may now be. The trees of the land connect us all, as they are connected to each other, ${name}. His body will, one way or another, return to the earth and the roots of the trees will absorb him, as they are right now absorbing my blood. I cared for him\", she states coldly and quietly. \" My blood will be connected to him when his body decomposes. This is the only possible way for him to be honoured right now as he should be.\" \n        *goto 2\n    #Meh, best leave the madwoman to her ways\n        *goto 2\n*label 2\nShe pulls you to her roughly when she has finished her ritual and tells you to stay by her side as you both venture further into the forest, through the path she had cut out by the long cleaver that hangs loosely from her belt. She does not say a word for at least twenty minutes, coming into of the swampy clearings that are found scattered like the scars on a warriors back throughout the vast wood. You both come to a stop at yet another fairly disturbing sight, close to the banks of the swamp lies a giant elk lying dead and rotting atop the carcass of a half submerged boar. It is almost identical to the scenes that played out in your vivid dreams… or prophecies? The final positions of the carcasses and scenery remain the same as the dream, but what has changed is the thick aroma of death that hangs in the air. Strips of skin and outer flesh has begun to peel from it, and the bodies are being ravaged by crows that cover the exposed flesh like flies. Does this mean anything, in your opinion?\n*choice\n    #It's nothing more than a scene of nature taking it's course\n        Perhaps you're right, ${name}, perhaps.\n        *goto 23\n    #The clans Scrufa and Fia Ollmhór will destroy each other, leaving them exposed to the viking hoards!\n        A sign from the gods could not be clearer, then that leaves you with a task that to most people would be insurmountable: Stop the war between brothers Ailbhe and Aonghus, or the lands of Éire will be overrun by the Norsemen.\n        *goto 23\n*label 23\nShe takes you to a jagged, weather-beaten tree where three young mares are pulling at the ropes that tie them to it, one for Brenda, one that was meant for ${Daragh}, and a third for you. Brenda unties the steeds, mounting one while holding the reigns of ${Daragh}'s horse and together you trot in silence back to your father's camp\n*if bob =0\n    that he has set up right beside Ferghus' town of Kanturk.\n    *goto 10\n*else\n    *goto 10\n*label 10\nAs you near the camp, towers of coal-black smoke appear from inside it…\n*choice\n    #The camp's on fire!        \n        Brenda looks at you patronisingly, \"Don't be a fool, ${name}, war is coming and your Gaelic gods must choose a side. Doubtless your uncle is doing the same thing himself.\" She sees that you don't quite follow, and explains, \" The druids have decided on human sacrifice to plead your god Dagda and the likes\", she says distastefully. \n        \n        Together you ride forward to the camp, and are welcomed by the scent of burning charcoal and deeply cooked meat.\n        *goto 4\n\n    #They must be lighting fires to please the gods?\n        \"Indeed she says, your gods have a taste for carrion..\" She sees that you don't quite follow, and explains, \" The druids have decided on human sacrifice to plead your god Dagda and the likes\", she says distastefully. Together you ride forward to the camp, and are welcomed by the scent of burning charcoal and deeply cooked meat.\n        *goto 4\n*label 4\nYou come to a huge bonfire around which all the tents form a winding spiral. The air is filled with music and laughter. The scent of fermented honey with which the mead is flavoured is pleasantly thick in the air. Drowned out by the festive spirit and noise is the loud, desperate sobbing of women and children draped\nin rags. You look at them and see two dozen of them crammed together within a massive Irish ${elk}-shaped structure made from branches and sticks and tied with reeds. Sitting on his throne adjacent to the towering flames is your father, pheasant stew dribbling down his beard and, unlike seemingly everyone but the people inside the wooden ${elk}, he does not bear a wide grin or joyful eyes, but instead a look of worry and guilt. When he sees you his spirit seems to lift slightly, but only slightly. He ushers you over while Brenda heads off in search of a \"real drink\", as she puts it.\n\nAs you reach him you see his face is pale,  he is feeling queasy. He gives you a meek hug, \"I am so glad to have you safely back\", he says before telling you to take a seat beside him. You do as he says, and he whispers in your ear \"Our enemies have presented a much larger force than we had expected, we must ask that the gods intervene in our favour, or we will have little chance of stopping him. It is for that reason that… that we must do this\", he gestures a feeble hand to the folk in the Irish ${elk} that are now screaming hysterically. The chief druid, recognizable by his ornately decorated robe, steps towards the fire.\n*Page_Break\nThe chatter and festivities halt as he is handed by his assistant a clay pot heavily filled with oil. He drops it into the flames as his head lifts to the sky and the fire shoots up furiously, and the camp comes alive in it's glowing heat. The man's white cloak glows brightly against the flames that are now reaching several feet high.\n\nThe bright cloak is adorned by embroidered spirals and knots, displaying the sacred golden 'Cauldron of nourishment' and the 'Harp of the seasons' which are said to be in the possession of god of gods, Dagda. He yells in the ancient Gaelic tongue of the first men for the gods to bring strength to our warriors and sickness to our foe. \"Dagda! God of gods, king of men! Accept our fine gifts for you and show mercy to your loyal children!\" He yells as he points to the people gathered around.\n\nIt is then that the great wooden ${elk} structure is brought forward by several men, the people within it pulling at the reeds in a frenzy of fear. The priest pours a second bottle of oil over the townsfolk, appearing oblivious to their cries for mercy. The people of the camp come towards the ${elk}, some brushing past you as they go, and begin to circle it, throwing gold and jewelry and fine perfume over it delightedly. The ${elk} is inches away from the great flames and appears almost alive with the glow of the fire and the radiating heat creating the illusion of movement. \n*choice\n    #Stop! Leave them alone\n        The druid gives you a furious sidewards glare but chooses to ignore your pleas. You try to stand up to do something, but your father pulls you back to your seat, \"I know, ${son}, I know\", he whispers sadly. You sit still as the grim scene in front of you unfolds.\n        *goto 5\n    #We require otherworldly assistance, it can't be helped\n        Grim as this ritual may be, it is probably for the best, you can't risk disgracing him.\n        *goto 5\n    #I don't want to get into trouble\n        You can't disgrace your father like you had all those days ago when you had drunkenly killed one of your father's elders, so you sit still as the grim scene in front of you unfolds.\n        *goto 5\n*label 5\nAs the legs of the wooden ${elk} are pushed to stand atop the burning embers, and the flames begin to lick the screaming people within it, you see two figures within the curling black smoke. A tall giant of a man, his wiry beard flowing in the direction of the rising smoke, floats gracefully to the people within the Giant ${elk}, and  enters them through their mouths and noses and eyes.\n\nHis smoke fills them up and immediately their tears and cries cease. He resembled the man you had been taught to pray for by the druids all through your childhood, Dagda. In unison their skin flakes from their bodies, their limbs ,starting at their fingers and slowly rising up their arms, turn to dust. Their mouths, though lifeless, turn drowsy smiles to the heavens, and they are carried by the rising smoke into the skies as specks of dust and skin, and soul. The priests together blow their long, curling trumpets and the eerie call of the oileann pipes fill the air.\n\nThe wooden statue, though covered in soot and blackened by heat, stands proudly against the retreating flames. No sign that there were once people within it remains. Your men have the approval of god of gods, Dagda, but at what cost?\n*Page_Break Chapter 7\n*image Chap7.png\nLater that day, in the evening, your father asks for your presence in his tent. You arrive and he sits in his large wooden throne-like chair, slamming his fist down on the map that stretches across the table in front of him. When he notices your arrival he gives an embarrassed nod and tells you to come over. At a closer look at the map you can see that through detailed drawings it describes Ailbhe's castle, Ferghus' town, the Yellow Hills where Aonghus' camp lies. It also displays the great swamp that curls through the great pine forest, splaying around Kanturk and forming a natural moat around the camp. \"I am in deep need of your assistance, ${name}.\"\n*if sig =0\n    *goto_scene extrasig\n*else\n    *goto_scene finito\n\n\n\n\n   \n        \n        \n", "choicescript_description": "In pre-Christian Ireland, where family bonds and the honour of one's tribe are worth dying for, and where the old gods are forever watching, you must be as guarded as the hound, as cunning as the fox, or as brutal as the boar to survive. You have fallen out of your father's favor and are being sent along with a dispatch of hardened warriors to help your uncle quell the ever-frequent viking raids to the east. You must impress your father to reinstate your right to the throne of the Boar Clan... or you can seize it for yourself. Your father's numerous enemies are conspiring against him, the peasants are rising in revolt, his own guard outposts are deserting him and even his most trusted may be tempted to rip his throne from under him. \n\nThe Brothers' War, a Clans of Éire Saga, is a 60,000 word historical-fantasy interactive fiction written by Fionn Graham, where your choices and decisions control the world around you, including characters you meet, your possible romances as well as the enemies you make. It is text-based without sound or special effects, supported by occasional celtic la-Tène style art and fuelled by the vast, unstoppable power of your imagination. The people of Éire whisper of a time when your father's time on land has ended, and when, or whether, you will take his place. Through politics, persuasion, battles and knowledge, you must secure your future throne… or die trying. \n\n• Play as male, female or transgender, gay, bisexual, straight, aromantic or asexual.[n/]\n• Explore a unique land rich in culture, religion and tradition.[n/]\n• Take part in military plannings, court cases and more.[n/]\n• Fight and negotiate with Bandit hoards, Peasant rebels, Viking settlers and more.[n/]\n• Discover the lighter -and darker- sides of your clan's traditions and policies.[n/]\n• Select a variety of distinctive physical traits, as well as starting skills and abilities.[n/]\n• Conspire for or against the chieftain of the Boar Clan, your father.[n/]\n• Learn and improve your skills through teachers, instructors and elders.[n/]\n• Hire mercenaries and buy better combat equipment to gain the upper hand.[n/]\n\nAs your father’s influence trickles through his fingers, which side shall you choose?\n\n", "choicescript_stats": "*stat_chart\n    text name\n    text weapon\n    percent Knowledge\n    percent Combat\n    percent Persuasion\n    percent health\n    text gallowglass\n    text kern\n    text peasant\n    text sc (silver coins)\n    opposed_pair Aonghus\n     Ailbhe\n    opposed_pair Medb\n     Ultan\n\n[b]The Brehon Law[/b]\n[i]When you think for a moment, you can remember well your childhood teachings on the laws of the land, known as the Brehon laws;[/i]\n\nThe Brehon laws are the laws that envelope all of the inhabited lands in Éire. The very gods themselves, Dagda and Éiriú and indeed others, have commanded that they be strictly obeyed. The Brehon laws are the laws of the people, and rest not with King nor Queen, nor can be changed by them, but only by the people of the land. They include the 'Law of Fair Fight' and of 'Honour in negotiation'. Divorce is permitted, and men of all status and background whilst standing within the shores of Éire, are expected to obey them and are liable to their punishments. Everyone, from the smallest herdsman to the wealthiest king has a right to own land, although not all can afford it.\n\nThe laws are held so highly in regard because they create community amongst the warring tribes, and they maintain the reputation of each individual clan. The law is taught and guided, though not enforced, by wise scholars known as the Breitheamh, who interpret the laws and overlook trials. The laws hold not man nor women in higher regard, and focus on the strengthening of community and family bonds. The perpetrator, after commiting a crime, will be made to duly compensate those effected. Only in very extreme cases, are punishments of death and the like carried out. Although Kingship is often hereditary, the people have the right to elect a new king if needs be.\n\n\n    \n    \n\n                \n           \n        \n    \n                \n    \n    \n    \n    \n    \n    \n    \n    \n    \n    \n    \n    \n    \n    \n    \n    \n        \n        \n   \n   \n   \n   \n  \n\n                \n                \n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 4 through 12[/b]\n  \n  Unlock chapters 4 through 12, including the thrilling conclusion!\n  \n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 4 through 12[/b]\n  \n  You've paid to unlock chapters 4 through 12.\n", "death": "[i]\"Oh, would God it were for Ireland\"[/i]\n\n-The bitter last words of Irish Gallowglass commander, Patrick Sarsfield, as he died in the Battle of Neerwinder 1693 for French King Louis XIV\n\nYour time in Éire has ended, from dust you came and to dust you have returned. You have inhaled the cool embrace of death and felt it wrap comfortingly around you, the people will whisper of your time on this Island, and how your end came all too soon…\n*goto_scene ending\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Brothers' War.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending", "extrasig": "Brenda walks in as you are about to speak,, bowing to your father. \"My lord, the viking king Sigfrid and his lady Gunheld await your council, they are impatient so if I may be so bold they are best not left waiting.\" He eyes her irritatedly, \"Let the norsemen wait a minute so I may prepare, a lesson in patience would serve them well\", he says, waving Brenda away. \"Join me in this meeting, ${name}, the gods have put our path parallel to that of the Norse settlers.\" He grimaces at those words.\n*choice\n    #How could you?\n        *goto 80\n    #Vikings are the enemy!\n        *goto 80\n    #But why, father?\n        *goto 80\n    #You are working with Vikings?\n        *goto 80\n*label 80\n\"I can understand your surprise, my ${son}, seeing as the original purpose for your expedition was to rid this island of them. I was left with no choice, however, when your uncle and the peasants turned on me. If I did not have them on my side, I could lose everything. In return for their services, I am giving them a third of your uncle's lands when we have ended his uprising, as well as 1,500 silver pieces.\" He says this last part with a defeated look on his face.\n*choice\n    #This is madness!\n        *goto 81\n    #GIVING land to Vikings?!\n        *goto 81\n    #The cost is too great!\n        *goto 81\n    #But why?(I can't believe it)\n        *goto 81\n    \n*label 81\nHis face takes on a firmer, more serious expression, \"You will respect your father's judgment, and keep in your head that your throne relies on my success! I ask you to work with me now, ${son}. You know your uncle better than anyone, myself included, after many years apart, I can barely picture his face. I would appreciate it greatly if you would advise us on how you think Aonghus will respond to our uprising, what move he will make next.\" You follow him from the tent as he hurriedly strides towards the large pavilion tent that lies at the back of the camp, the most protected side. The banners of Ailbhe's Boar and Sigfrid's Crow fly parallel to one another on top of it.\n\nYou walk into the pavilion alongside your father, you notice he has his chest puffed unnaturally outwards and his head holds high above his perfectly groomed beard. Awaiting you is a man and woman chatting bitterly, their wrinkled faces twisted into a scowl. Dividing you from the viking King is a thin but very long wooden table, it stretches almost the length of the massive tent and is lined with large throne-like oak chairs. At his side, Sigfrid holds an ornately one sided axe, the pommel sits on the floor while his hands grip just under the head of the axe which he pounds into the ground repeatedly while Gunheld snaps at him furiously in a foreign language. They turn to your father, just now noticing you both had arrived, and give what is presumably an attempt at a warm smile through wrinkled lips. He gestures for him to come closer with long, bony fingers.\n\n\"I thank you for coming so urgently. I had asked my men to leave so we may speak in private. My lady wife and I are just a little unsure how fair our original deal of the third of newly conquered land really is. It would appear my forces nearly match your own, and are largely better armoured. We have decided we would settle for half of your brother's lands, and no less.\" Your fathers cheeks puff red in anger, but before he says anything, Gunheld interrupts with a somewhat mocking tone, \"I would have you remember that we fight for the side that offers the best deal, your lands are no less tempting. I do wonder what your brother would offer to ensure a tipping of the scales?\" He looks at you almost pleadingly, hoping you can think of a way out of this.\n*goto 5\n*label 5\n*choice\n    #I can convince them Aonghus would never side with them\n        *if Persuasion > 19\n            You walk up to Sigfrid as he eyes you up and down tauntingly, you speak to him with as much confidence and persuasiveness as you can muster. You emphasize to him Aonghus's disgust for the Norse settlers and their traditions. Sigfrid looks at you with much widened eyes, then turns his head to Ailbhe. \"This is true, Ailbhe, the words your ${nephew} speaks?\" \"They are, brother, Aonghus has little tolerance for foreigners, his ways are outdated yet unmoveable\", Ailbhe replies, sending a subtle nod your direction in thanks.\n            \n            \"Perhaps I can lower my price, I did not realise to what extent you and I had shared interests, Ailbhe. A third will be quite acceptable.\" Gunheld is about to speak out in protest of her husbands words, but he only waves a hand at her, \"Quiet woman! These Gaels are to be thanked for their hospitality, not bartered with.\"\n            *achieve interpretor\n            *goto 6\n        *else\n            You walk up to Sigfrid as he eyes you up and down tauntingly, you speak to him with as much confidence and persuasiveness as you can muster. You try to emphasize to him Aonghus's disgust for the Norse settlers and their traditions. \"I find your words to be little more than idle threats, ${name}, do not waste my time like this or I will only want more land.\" Ailbhe looks at you irritatedly.\n            *set third \"half\"\n            *goto 6\n    #I will demand they show more respect to Ailbhe!\n         \"I see you've trained your puppy well\", Gunheld says, her cracked lips forming a joyless smile. \"An army can not be formed from trained pups, you are in need of Ailbhe, Aonghus, and hounds we can provide if we are compensated properly\", Sigfrid explains, waving his hand nonchalantly.\n         *set Ailbhe +6\n         *set Aonghus -6\n         *goto 5\n    #There is nothing we can do, accept the terms\n         You give Ailbhe a nod, and grudgingly, he accepts.\n         *set third \"half\"\n         *goto 6\n*label 6\n\"Well\", Sigfrid begins with narrowed, serious eyes, \"Now that we can put these matters to rest, I believe it's time that we make ready for war. He calls out \"Brenda! Bring me my scroll!\" A woman in coal black dyed leather armour walks in from the entrance behind where the viking couple sits, at his belt are an assortment of finely made throwing daggers, she wears silver-lined iron shoulder plates, and is carrying a scroll that stands almost as tall as he does, and is thicker than his muscular arms. She comes to the end of the long table, and sits the scroll on it.\n\nWith one great push it unfurls out across the long table, displaying a map that through detailed drawings describes Ailbhe's castle, Ferghus' town, and the Yellow Hills where the enemy camp lies. It also displays the great swamp that curls through the great pine forest, splaying around Kanturk and forming a natural moat around the camp. Gunheld calls in the norse commanders and lead warriors who sit around her. Ailbhe, like an echo, calls for his chief druids and commanders. You, Ailbhe and the highest ranked of the Boar clan take your place at the opposite side of the table. \n\nSigfrid smirks arrogantly and begins, \"We are having more mercenaries brought in, our scouts had found some sword-for-hire minor clans and they should be no more than a three days ride from here by now. With them to support our ranks, we shouldn't have any problem with Aonghus\", he fiddles with a silver piece between his bony-grey fingers fondly. \"That then leaves the question, Ailbhe, how do you intend to pay them?\" Ailbhe looks quite flustered and protests, \"I knew nothing of this mercenary arrangement, it was your plan so you can pay them yourself!\" Gunheld tut-tuts to herself before interjecting, \"Now, now, Ailbhe, you are indebted to us, you need us. I advise you don't forget that.\" Sigfrid looks fondly to his wife, and then turns back to Ailbhe.\n\n\"I trust you have more money than what you owe us? A good king always has silver to spare.\" A man who sits at the right hand of your father steps forward, \"We have 300 silver pieces with us, plus the 1,500 we owe you.\" Sigfrid nods to the man, who calls himself Ultan, \"Well, that should be just about enough. I believe that is all there is to discuss? Very well, I shall take my leave.\" He gets up and strides out of the room, followed by Gunhheld and his Norsemen court. Ailbhe then turns to you, these mercenaries will be useful, but I fear the Viking underestimates the power of the many Gallowglass Aonghus has in his ranks.\" His eyes betray anxiety and frustration as he speaks,\n*goto_scene finito\n\n", "finito": "\n\"Our scouts have seen that my brother has brought in several dozen pirates and mercenary men from the Isle of Man to thicken out his ranks. We may have had a fair chance before but now, if we attack, there will surely be a massacre. That is why I must ask this of you, do you have any men at your disposal? I had heard of your run in with bandits and rumours of desertion from the ranks of the crew under your command, so I would understand if they could not be brought to our side.\"\nYou have ${kern} kerns and ${gallowglass} gallowglass resting in Kanturk.\n*goto 1\n*label 1\n*choice\n    #I'm afraid they all deserted(lie)\n        \"I see\", he says gravely, \"this is dire news indeed… You are sure there are none left?\"\n        *choice\n            #I am(lie)\n                \"Then may the gods give us inhuman strength and cunning, it is our only hope\", he waves you away, looking defeated and helpless.\n                *goto 2\n            #Actually...\n                *goto 1\n    #They are currently staying in the inn at Kanturk\n        His spirits lift almost instantly, \"Excellent, I will have Brenda retrieve them under your orders. They may be what adjusts the scales of fate in our favour, my ${son}!\"        \n        *goto 3\n*label 2\nThe next few days pass without much action or news, though the preparation of arms and honing of skills continues in the camp as urgently as ever. The mood in the camp is a solemn one with little hope for victory the soldiers have begun to dessert and stories of the opposing armies strength poisons the already fading morale of the camp.  One morning you head to your father's tent to ask when he plans to make a move against your uncle, you find him lying in bed and rest a hand tentatively on his muscular arms.\n\nYou pull your hand back suddenly in shock of how cold he is, you call the healers and druids to come. They can only confirm what your were sure to be true, ${Aonghus} is dead. When the chief druid hears of the news, he comes to inspect the body himself, he turns to you and, to your shock, kneels. \n\nYou are the first born ${son} of ${Aonghus}, and so are his heir to both his lands and his clan. The healers and lesser druids around him kneel to you as well, and the nearby guards follow suit. The high druid then calls out in as loud a voice as he can muster, \"Dagda bless ${king} ${name} of the ${elk} clan!\" The guards and servants and slaves and advisors of the camp all rush to the tent where you stand, falling to their knees around it. You are brought outside to the gathering crowd and the high druid takes the heavy golden brooch and cloak from ${Aonghus} and fastens both around your shoulders. He bows to you with index and middle finger resting on the brooch, whispering a short prayer before retreating to his knees once more. \n*goto 100\n\n*label 3\nThe next few days pass without much action or news, though the preparation of arms and honing of skills continues in the camp as urgently as ever. The mood in the camp is a solemn one with the little hope for victory hanging on the arrival of Brenda with your mercenary crew, the soldiers have begun to dessert and stories of the opposing armies strength poisons the already fading morale of the camp. It is four days since Brenda left and it seems few people think she will return, and only when the hope has started to fade from you that she does arrive, with some ${kern} lightly armored kerns and ${gallowglass} heavy gallowglass at her back. \n\nThe camp becomes once again alive with chatter and excitement. You rush to your father's tent to relieve to him the good news, you find him lying in bed, you rest a hand tentatively on his muscular arms. You pull your hand back suddenly in shock of how cold he is, you call the healers and druids to come. They can only confirm what your were sure to be true, father is dead. However, they each have another detail to add to their confirmation… this was no natural death.  When the chief druid hears of the news of his death, he comes to inspect the body himself, he turns to you and, to your shock, kneels. You are the first and only born and so are his heir to both his lands and his clan. The healers and lesser druids around him kneel to you as well, and the nearby guards follow suit. The high druid then calls out in as loud a voice as he can muster, \"Dagda be praised, give wisdom and courage to ${king} ${name} of the ${elk} clan!\" \n\nThe guards, servants, slaves and captains of the camp all rush to the tent where you stand, falling to their knees around it. You are brought outside to the gathering crowd and the high druid takes the heavy golden brooch and cloak from your father and fastens both around your shoulders. He bows to you with index and middle finger resting on the brooch, whispering a short prayer before retreating to his knees once more.\n*goto 100\n\n*label 100\n*if sig =1\n    *achieve boar\n    *goto 3000\n*else\n    *achieve elk\n    *goto 3000\n*label 3000\nYour shoulders are weighed down by the thickly woven woolen cloak, though it rests not nearly as heavily on your shoulders as the responsibility of leading a clan in the midst of a war. Once the rituals have ceased, and the cogs of the camp are turning once more, the chief druid requests an audience with you. \n\nHe finds you sitting in your father' throne. \"My ${king}…\", the druid begins, \"The quarrels of your father and uncle are not your own, there is no shame in ending the war. Negotiation is the route that will cause the least bloodshed, your father's castle and armies are now yours so you may do as you like.\n\nIt is expected that you find a spouse and produce a healthy heir, the vikings still need to be dealt with, as well as the bandits whom I hear you were acquainted to not long ago, and few heirs have ever taken to the throne without fighting off fierce competition from the past lord's advisors and generals, and children born out of wedlock are seldom recognised as legitimate heirs… not that I would accuse you of being one, but others might. Most concerning, my chieftain, is the matter of the death of your father. Some will claim it was the viking scum under the command of Sigfrid, although others might look to who, it would appear, stood to gain the most\", he pauses and looks at you questioningly for a fleeting moment. \"So here is my question to you, ${name}, heir to ,and now ${king} of the ${elk} clan, what will you do next?\"\n*set gallowglass +42\n*set kern +105\n*set peasant +43\n*Page_Break\n\n\nSigfrid barges into the tent as you are about to come up with an answer for the druid, ripping the flaps at the entrance to the side and with a look of fury on his face. He's back early from his journey to gather more recruits, and his travels certainly haven't done much to lighten his mood. \"${name}! You did this, didn't you? You poisoned him so you could take his throne!\" Before you can protest he growls in frustration loudly and continues, \"The cheap shit still hasn't paid me for my mercenaries, and I haven't gained my ${third} of the conquered land, because the war has barely even started! You think you have it all sorted here with your new lands and men, but it's payday, ${lad}. I want my 2,000 silver pieces and I'll be taking the ${third} of your new lands, since you killing him was a conquest in it's own right.\"\n*choice\n    #Stay silent(he is clearly out of his mind)\n        \"Well? Give me my coin and we'll have a calfskin document for you to sign over the lands in just a few minutes.\"\n        *goto 10\n \n    #I would never!\n        \"The voice of a doe, the ambition and heart of a wolf. I've heard it all before, now give me what I'm owed, or I'll have my armies turn their might AGAINST you. Do not test me, ${name}, if you do you will quickly learn why the Norse clans are feared so far beyond the Irish sea.\"\n        *goto 11\n    \n    #How could you accuse me of this?\n        \"The voice of a doe, the ambition and heart of a wolf. I've heard it all before, now give me what I'm owed, or I'll have my armies turn their might AGAINST you. Do not test me, ${name}, if you do you will quickly learn why the Norse clans are feared so far beyond the Irish sea.\"\n        *goto 11\n*label 11\n*choice\n    \n    \n    #I need to speak with my advisors! \n        \"Well\", he says with suspicion, \"You are indeed young and without much-if any-experience. Go now and speak with them, if you must, but do not keep me waiting long.\"\n        *goto 12\n\n*label 10\n*choice  \n    #But I didn't!\n         \"The voice of a doe, the ambition and heart of a wolf. I've heard it all before, now give me what I'm owed, or I'll have my armies turn their might AGAINST you. Do not test me, ${name}, if you do you will quickly learn why the Norse clans are feared so far beyond the Irish sea.\"\n         *goto 10\n\n    #I need to speak with my advisors!\n         \"Well\", he says with suspicion, \"You are indeed young and without much-if any-experience. Go now and speak with them, if you must, but do not keep me waiting long.\"\n         *goto 12\n\n*label 12\nYou head out of the tent, the head druid following along behind you, unsure as to who your father's advisors really were and who of them you can rely on for support. You tell the druid to gather them in the large pavillion-tent in the back of the camp. The day is still out though the sky betrays no hint of blue sky nore beaming sun, which it hides protectively from the eyes of mortals behind thick, grey-tinted clouds. \n\nYour father's funeral will be held tonight, and several craftsmen accompanied by around twenty slaves are preparing the grave. A line of logs runs from the rocky hills half a mile away to just outside the camp, it is on these that the massive boulders for his portal dolmen tomb are to be rolled. Dolmens are structures that are supposed to be saved to honour only the noblest or fiercest of men, and your father was indeed both. That does bring about the question, about how you truly feel about your father's sudden passing...\n*choice\n    #A real shame... at least I'm the head of the ${elk} clan now!\n        Not the empathetic sort? Well, that might make keeping the throne by lower means a little less heavy on your conscience... \n        *goto 13\n\n    #Meh, I'm ok as long as I'm in charge\n        Not the empathetic sort? Well, that might make keeping the throne by lower means a little less heavy on your conscience...\n        *goto 13\n\n    #How could this have happened?\n        There, there, look on the bright side, the throne is yours... for now...\n        *goto 13\n\n    #I'm really going to miss him\n        There, there, look on the bright side, the throne is yours, for now...\n        *goto 13\n\n*label 13\nYou hear the crunching of footsteps in muck and stones coming closer, you turn to see the druid, followed by seven men and women you recognise from the meeting with Sigfrid, your father's, and now your, advisors. The first four behind the druid are looking solemnly to you, while the last three are huddling together as they walk.\n\nYou notice from the corner of your eye one of them glancing at you accusingly, his head appears weighed down by the wiry white beard that hangs like vines down to his knees. The threesome avoid eye contact as they near you, while the other four give short bows, and the head druid takes his place at your side, telling you to address him as Breccan, \"As it pleases you, my lord\". As is traditional in most Southern clans, it is the men that have given their lives to the gods that assume the right-hand man position. One of the four steps forward, stating his name as Ultan, a descendant of Chlann Iolar, the Eagle clan that withered from internal disagreements and conflicts, and in time, ceased to exist. He is a young, reasonably handsome man with short-cut brown hair that trails into braids at each side burn, a signature style of the now-lost Eagle clan. \n\n\"My lord ${name}, accept my humble loyalty under the eyes of Dagda and with Éire as my witness…\" \nThe next three follow after him, an elderly woman named Medb, cousin of Aonghus and Ailbhe, is next. Then follows a past bandit, regarded by the druid to be as cunning as a man can be. The once-bandit named Oscar smirks delightedly through the remarkably thin strands of hair that dangle in front of his wildly twitching eyes.\n\nHe can't be much over thirty, but already streaks of grey are showing through in his hair. The hair that doesn't hang over his weather-beaten face is tied back raggedly in a ponytail. It is no common practice in a clan as proud as the ${elk} to have a criminal in their employ, he must have had quite the set of skills for the clan to overlook a past as dishonest as his. \n\nAfter each of them have made their vows to you, it is time for the three lagging behind to follow suit. The shorter and older of the three, the one you had noticed giving you dirty looks, is the only one that makes eye contact with you, the other two look from their leather shoes to each other and back again. The man who faces you unblinking speaks in a horse voice, his white beard flapping against his deep purple cloak in the gathering winds. The head druid, Breccan, whispers in your ear as they step forward, \"Mages, my lord. While since ancient times the druids have learned their magics from the children of Dagda, the mages follow the practices of the banshee. I had begged your father not to allow them to join him as advisors, but Dagda forgive him, he would not listen.\" He looks at the three \"mages\" ,as he calls them, and seeing their impatient looks, turns hurriedly to you, \"We must speak more of this later, they are NOT to be trusted… No true human can learn the banshee arts…\"\n\nThe old man looks to you, seeing that Breccan has finished, and begins, \"${name}, I must congratulate you on your… Victory. Seeing you, a ${boy} with little success to speak of and barely the guts to talk clearly to an elderly Viking foreigner, I could have laughed. Now, after the steps you have taken to… quicken your father's passing from this life to the next, I must say I see you in a whole new light…\" He has the look of a man unsure of what to make of what stands in front of him, judging you cautiously. One thing is clear however, when it comes to the death of , most, if not all, fingers point to you. \"We would be content to serve you, young ${King}, may your reign be long and fruitful.\" He says these last words with a hint of cynicism betrayed behind his joyless… almost lifeless, smile. \"Well, m'lord, now that these tedious formalities are finished, why is it that we have been summoned?\" You notice him and Breccan exchanging narrow-eyed, disgusted glances with each other.\n*set sc +1800\n*goto 69\n*label 69\n*choice\n    #How much money do we have?\n        Ultan thinks for a moment, before stepping forward, \"My lord, we have in the region of 1,800 silver pieces with us in our stores, and another 4,000 that your father had had us leave at the castle when we came here, your castle, now, of course. We spent most of what we had brought here on feeding the camp over the last few weeks and bribing officials in your treacherous uncle's court. We could have some in the castle stores brought here, but it would take a week, assuming the weather is reasonably good.\"\n        *goto 69\n    #Sigfrid is looking for the silver we owe him...\n        The old woman named Medb steps forward, \"And how much is that? I would question whether he is trying to fetch more than was agreed with your father, the norse folk are opportunists…\"\n        *choice\n            #And how much have we?\n                 Ultan thinks for a moment, before stepping forward, \"My lord, we have in the region of 1,800 silver pieces with us in our stores, and another 4,000 that your father had had us leave at the castle when we came here, your castle, now, of course. We spent most of what we had brought here on feeding the camp over the last few weeks and bribing officials in your treacherous uncle's court. We could have some in the castle stores brought here, but it would take a week, assuming the weather is reasonably good.\"\n                 *goto 69\n            #You're right, he must be trying to con us!\n                 Breccan looks at you a little surprised, but the others except for Oscar, the bandit who seems almost amused, are taken aback in surprise and anger. \"A thief who thinks himself a king, Sigfrid has gone too far!\" Medb insists, her face flushed red with shock. Ultan fingers the hilt of his sword as he says, \"He would disrespect you in your own lands? I would have his head for you in moments, if you wish, my ${king}…\"\n                 *goto 70\n    #Sigfrid is looking for more silver than we truly owe!\n         Breccan looks at you a little surprised, but the others except for Oscar, the bandit who seems almost amused, are taken aback in surprise and anger. \"A thief who thinks himself a king, Sigfrid has gone too far!\" Medb insists, her face flushed red with shock. Ultan fingers the hilt of his sword as he says, \"He would disrespect you in your own lands? I would have his head for you in moments, if you wish, my ${king}…\"\n         *goto 70\n\n    #Sigfrid is trying to threaten silver from us!\n        Breccan looks at you a little surprised, but the others except for Oscar, the bandit who seems almost amused, are taken aback in surprise and anger. \"A thief who thinks himself a king, Sigfrid has gone too far!\" Medb insists, her face flushed red with shock. Ultan fingers the hilt of his sword as he says, \"He would disrespect you in your own lands? I would have his head for you in moments, if you wish, my ${king}…\"\n        *goto 70\n\n*label 70\nYou see out of the corner of your eye a woman in fine, black clothes break from her cover in a nearby bush and sprint as fast as a person can to the stables. You call out to her but her movement is only quickened. Ultan is the first to give chase, but is only halfway to the stables when she has leapt on a muscular brown mare. She gallops to Sigfrid's tent, blasting a bull horn as she rides. She calls out in Norse toungue and in seconds Sigfrid has joined her on her horse, and together they ride to the exit of the camp, trampling tents and knocking aside servants as they go. She must have heard what Ultan had said, what do you do?\n*goto 71\n*label 71\n*choice\n    #Guards! Seize them!\n        Guards rush from their tents, strapping on their leather armor or  wrapping themselves in chain mail as they go. Others run from their stations on the walls or patrols. Sigfrid pulls his bow from his side and before the mare has reached the gates, he has loosed two arrows into the guards chasing him. Sigfrid calls as he is out the other side, \"I'll be back! Hear me well, ${name}, I'll be back!\"\n        *goto 72\n          \n    #Close the gates!\n        Several guards rush to the gates and begin to close them, as others rush from their tents, strapping on their leather armor or wrapping themselves in chain mail as they go. Sigfrid pulls his bow from his side and before the mare has reached the gates, he has loosed two arrows into the guards closing them. They make it through the gap as it is seconds from being two thin to escape through. Sigfrid calls as he is out the other side, \"I'll be back! Hear me well, ${name}, I'll be back!\"\n        *goto 72\n    \n    #Let them go\n        Are you sure?\n        *choice\n            #Yes\n                *goto 73\n            #No\n                *goto 71\n*label 73\nThe guards wait expectantly for your orders, and give frustrated glares as the call of Sigfrid from outside the walls rings through the camp, \"I'll be back! Hear me well, ${name}, I'll be back!\" Many of his cavalry have escaped with him as a result of your inaction, hopefully that mistake won't effect you too badly in the future.\n*goto 72\n*label 72\nThe few Viking warriors that have horses attempt to flee after Sigfrid, only two of them making it out after as the gates close. Then, the world seems to stand still. Gallowglass and Viking, men and women who had been allies, and lived together for weeks, stare at each other in fairly even numbers, weapons out. Friend facing friend, comrade facing comrade. Around 8 viking men drop to their knees, claiming to have found brothers for life within your ranks, and hurriedly swear allegiance to you, but the others rigidly have their weapons raised. Almost everyone in the camp appears conflicted and torn about the bitter, ruthless slaughter that appears to be moments from taking place…\n*Page_Break\nYou have ${gallowglass} heavy gallowglass, ${kern} light kerns, and some ${peasant} lowly trained peasants and craftsmen who have taken up arms on your side. Standing surrounded, but armed to the teeth, are ${viking} Norse mercenaries turned against you.\n\nThe norse warriors are tightly packed together, forming a circle bristling with blades and dotted by shields. Your men circle them, the gallowglass that are bearing shields are out in front, while the kerns armed with fletched javelins and sling shots hanging back, ready to let fly their missiles of war. They await your orders…\n*goto 76\n*label 76\nYou have ${peasant} peasants, ${kern} kerns and ${gallowglass} gallowglass against their ${viking} norsemen.\n\n*if viking \u003c1\n    *goto 80\n*else\n    *if kern \u003c0\n        *set kern 0\n    *if peasant \u003c0\n        *set peasant 0\n    \n    *goto 77\n*label 77\n*choice\n    #Everyone, CHARGE!\n        Oftentimes the best tactic is the simplest, overwhelm them with sheer numbers! Your men do as you say, fighting furiously and attacking the viking formation from all angles. The vikigs take several losses, retreating into a yet tighter formation. It is only when the gap between the two sides is made, that you see the many bodies of your lesser armoured men, kerns and peasants lie strewn across each other as piles of corpses. Their bodies form a makeshift cover for the viking horde.\n        *set kern -11\n        *set peasant -3\n        *set viking -15\n        *set gallowglass -2\n        *goto 76\n        \n    \n   *if kern >3\n       #Kerns, let loose your javelins!\n           Your ${kern} kerns advance in front of the gallowglass and rain down volley after volley of war darts and stones from slingshots. The Norse warriors do their best to sheld themselves, but several are struck down under the barrage of missiles. They return by hurtling their spears back at the kerns, however most of them retreat behind the shields of the gallowglass before they can be hit.  \n           *if kern >70\n               *set kern -6\n               *set viking -9\n           *if kern >30\n               *set kern -5\n               *set viking -8\n           *if kern >10\n               *set kern -2\n               *set viking -4\n           *goto 76\n    *if peasant >4\n        #Send the Peasants in!\n            They charge headlong into the viking formation, hacking at the wall of spears and blades with scythes and stabbing with pitchforks. Few of the vikings are actually killed, though some take heavy gashes. The peasants are quickly defeated, despite their valiant effort. The few survivors, bloodied and wounded, scramble back to the safety of the gallowglass shield wall.\n            *if peasant >10\n                *set peasant -14\n                *set viking -5\n                *goto 76\n            *else\n                *set peasant -3\n                *set viking -1\n                *goto 76\n    *if gallowglass >9\n        #Gallowglass, ADVANCE!\n            They march forward as a unit, keeping a shield wall between them and the vikings as they move. The vikings let loose what war darts and javelins they have, and it is only when their barrage of missiles has ended, that the gallowglass descend on them. They charge in without fear like mighty beasts, slashing rapidly yet accurately with their great two handed swords. They chop and batter down the viking shields with their axes. Their chainmail clinks and their warrior beards blow in the wind as the viking men begin to waver. They fight heroically, and only cease their relentless onslaught to carry their relatively few wounded back to safety.\n            *set gallowglass -10\n            *set viking - 21\n            *goto 76\n\n*label 80\nThe last viking collapses onto the ground, though few men celebrate, this battle was a brutal one. Your losses have been heavy, and several of the men are distraught after killing who to them, were comrades. Others had taken the events personally, looking at the wounds of themselves and their fallen brethren. The eight vikings that had surrendered prior to the battle are now surrounded by those still bitter after the fight. They are being dragged by a small mob of the surviving soldiers around the swamp, towards the great oak that stands at the border of the forest. One of the men leading the crew is getting to work, tying several nooses. Breccan, who had been at the back lines, observing the battle from affar, walks to your side. \n\n\"My liege, stop this madness, I beg of you!\" He says, \"Those men swore allegiance, if your honour as a king or the will of the gods mean anything to you, you'll put an end to this horrid display\" A few of the men agree, but the majority of the camp is zealously urging the mob on, \"Let them die slow! Let them beg for air in agony!\", \"Impale their heads on spikes and let the flies lay their young in their eyes!\" What do you do?\n*choice\n    #They deserve it, I cheer the men on!\n        They respond to your encouragement delightedly, and together with the mob, you bring the prisoners to the base of the great oak. The ropes are flung up over eight of the branches and the nooses are pulled over and tightened around the prisoners heads. They squirm and yell, but their cries of protest are cut short as the ropes are hoisted upwards.\n        \n        With two men pulling each rope, the viking feet are brought to their toes, and then brought off the ground. \"Death to the Noremen!\" The mob shouted as the squirming of the prisoners began to weaken, and their faces began to bleed from bright red to deathly pale. The crowd cheers with delight, and begins to shout, \"Dagda praise ${name} the wolf ${king}!\" as they continue pelting stones at the corpses as they dangle feebly from the branches. Breccan looks at you in disgust when you return to your camps, \"I pray you change your ways soon, ${name}, I shall follow no ${king} who advocates anarchy over justice.\"\n        *goto 81\n    #Those men swore allegience, it is my duty to defend them!\n        The mob hears your demands, and grudgingly lets the men go. Not before they have spat on the viking men, however. Once the mob has dispersed, the Norsemen crawl to your feet. \"Thank you, my ${king}\", one says. They promise to serve you well, and swear you shall hold their loyalty 'till death has claimed their souls.\n        *set gallowglass +8\n        *goto 81\n    #Wait and see what happens\n        Seeing your complacency, the mob is emboldened further,the prisoners are brought to the base of the great oak. The ropes are flung up over eight of the branches and the nooses are pulled over and tightened around the prisoners heads. They squirm and yell, but their cries of protest are cut short as the ropes are hoisted upwards. With two men pulling each rope, the viking feet are brought to their toes, and then brought off the ground. \"Death to the Noremen!\" The mob shoute
