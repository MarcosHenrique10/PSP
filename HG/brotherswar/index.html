<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Brothers' War — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "brotherswar", "title": "The Brothers' War", "scenes": {"chapter1": "*image IconArt.png\n[b]The Brothers' War[/b]\n\n[i]A Clans of Éire Saga[/i]\n\n[i]Written and illustrated by Fionn Graham[/i]\n\n\n[i]\"To Ireland will you lead a band of men,[/i]\n\n[i]Collected choicely, from each country some,[/i]\n\n[i]And try your hap against the Irishmen\"[/i]\n\n-William Shakespeare, Macbeth\n\nOn this mystical but divided Island, where family bonds, the ancient Brehon laws and the many gods hold more influence than the kings themselves, even as a noble you must fight to survive. Your actions will have consequences on the people around you and will determine the span of your life, as well as possible romances or conflicts. What difficulty would you like to play in?\n*choice\n    #Fionn Mac Cumhaill (Easy)\n        *goto 389\n    #Medb of Connaucht (Hard)\n        *set hard 1\n        *set boars +100\n        *goto 389\n    #Cú Chulainn (Very Hard)\n        *goto 389\n        *set vh 1\n        *set boars +240\n        \n*label 389\nCompleting tasks will gain you new skills (they, as well as information on the Brehon laws, can be viewed on the stats bar above) which in turn will open new corridors through the world around you, choose your skills carefully, and use them as best you can to your advantage. In this world there may be ways to die suddenly, however losing health over time through small mistakes is the main killer, so you must be wary throughout, danger lurks in even the most innocent of places. Your character will be unique, and can be male, female, transgender, straight, bisexual, lesbian or gay. May the gods show you mercy and guide you on the obscure, jagged path ahead…\n*Page_Break Chapter 1\n*image Chap1.png\nYour hand grips your chalice of ale with desperation and frustration, the great hall the feast is taking place in is lined with great oak tables and covered in the richest of berries and slow cooked fallow deer. The deliciously warm smell seems to rise up and wrap around the banners of the nine strongest clans of Munster, your father's guests for the evening. The oilean pipes at the far end of the hall play a joyous tune and your father, at the head table is tucking into a thick stew, trying to make alliances and ties with his guests. Despite the fine occasion, you feel only a confusing rage at every man and woman in the room.\n\nYou lean your head back and gulp down the the rest of your silver chalice, wanting to be filled with the bitter taste. You feel a cautious arm hold gently onto your wrist, you turn to see your fathers chief advisor, a skinny yet proud and intelligent elder named Aodh. The man is far past his best years, his face weather beaten and his hair greying, \"Don't shame your father so, put down your ale and sober up\". A sudden rush of anger fills you, and clumsily, you bring down the chalice on his head. It surprises you how easily he crumples, the music and chatter stops and the sound of Aodh's head cracking against the boarded oak floor echoes off the stone walls and fills the room.\n*Page_Break Next\nAfter several seconds of silence, your father charges across the hall, you've never seen him more furious, he pulls out his flanged mace and the guests watch in stunned, fearful silence. He wrestles you to the floor with ease and leans down on you, \"You'll soon learn respect you little shit!\" \nWhat will you do in the face of his rage?\n \n*choice\n    #Crawl away and escape towards the doors of the great hall.\n       As you turn on your hands and knees he gives you a winding kick in the side, you look up and you see a hint of shame in his face, of disappointment,  \"Look at you, a drunkard and a coward\", he whispers sadly. He beckons his guards over with a finger, \"What use is a little whimpering drunk for an heir? Take that brat away, to the moat, 'till I decide what to do with the disgrace\" \n     *goto 1\n    #Punch him in the jaw, then run for it! \n      One of his teeth go flying under the surprisingly powerful       strike of your right arm. You lift yourself back onto           your feet and head for the doors of the great hall, sadly       the ale has taken its toll on your coordination, one of the        guards shoulders you,sending you toppling  into a dizzy,     helpless state. Your father marches over, wiping blood from     his face. \"I've no use for a violent drunkard as an heir,       throw that brat into the moat, I'll decide what to do with the fool       come the morning.\"    \n      *goto 1\n    #Beg for forgiveness for what you have done.\n       \"You insolent fool! You kill my chief advisor and have the      gall to ask me to forgive you? You're an embarrassment to \n       your clan and this province.\" He beckons the guards to him      and commands, \"I'll not have a blubbering drunkard as an      heir, throw him into the moat, I'll decide what to do          with the disgraceful child at sunrise.\"\n       *goto 1\n        \n      *label 1\nYou spend the night shivering in the muddy, waterlogged confines of the outer moat. The walls of the moat are far too steep to climb, you can only wait and wonder what your father, Ailbhe, has in store for you.After an almost sleepless night, it is the sound of the wolfhounds barking and sneering at you that wakes you from your slumber. The guards throw a rope down to you, and grudgingly, you take it. They hoist you up and half carry back to the dining hall, and the events of the last night come back to you like a smack in the face.\n\nYour father, accompanied by his best wolfhound, stride into the hall, surprisingly without visible anger. You begin to ease a little more at the sight of your father's composure, he sits down on his throne across from you with a sigh. \n\nThe solid gold torc around his neck frames his broad chin and deep burnt brown beard. His thick bronze plated helmet rests on his knee as he clears his throat to speak, \"This fief no longer has want for your antics, it is high time the red deer left for greener pastures. Your uncle, Aonghus has offered that you stay with him at his southern barracks, he's been having trouble with Northern sea raiders and says he wouldn't mind some family company to cheer him up….and serve him his meals\", your father chuckles,\"Your carriage is outside, I've had your things packed for you.\"\n\nHe gets up and puts his arm on your shoulder.\"You will have difficulties on the path ahead of you, but please child, let your actions honour you, your family and Chlann Scrufa, The Boar Clan. Remember what I've taught you. If you make a good impression on your uncle, I will reinstate your right to the throne of Chlann Scrufa, now go, do me proud.\" What was your father mainly referring to when he told you to remember what he had taught you?\n*choice\n     #I have always been a talented warrior, javelins, axes, broadswords, I am confident in them all, since I was a child people have always known to stay on my good side or face the consequences.\n      *set Combat +40\n      *goto 2\n     #I have been studying scriptures of tales of old since I could walk, I'm an avid reader and have even tried my hand in engineering.\n         As the elders used to say, \"Is treise gliocas ná neart.\" Cunning is more powerful than strength.\n      *set Knowledge +40\n      *goto 2\n     #I have a tongue of woven silver, my late mother once said, I can charming if I choose, and make others empathise with my side of any situation. I have been known to be good at the odd fib, as well.\n         As the druids used to say, \"An té nach bhfuil láidir, ní foláir dó bheith glic.\" He who is not strong must be clever.\n         *set Persuasion +40\n         *goto 2\n     \n         \n  \n\n*label 2 \nOf course! People have always admired the talents of Ailbhe's……\nWhat are you again?\n*choice\n    #I'm his first born son, people have noted that my father and I look quite similar.\n       *goto 42\n \n    \n    #I'm his first and only daughter, they say I look just like my mother did.\n        *set he \"she\"\n        *set his \"her\"\n        *set him \"her\"\n        *set son \"daughter\"\n        *set man \"woman\"\n        *set boy \"girl\"\n        *set King \"Queen\"\n        *set lad \"lass\"\n        *set nephew \"niece\"\n        *goto 42\n    #I was born his son, but I am his daughter\n        *set he \"she\"\n        *set his \"her\"\n        *set him \"her\"\n        *set son \"daughter\"\n        *set man \"woman\"\n        *set boy \"girl\"\n        *set King \"Queen\"\n        *set lad \"lass\"\n        *set nephew \"niece\"\n        *goto 42\n    #I was born his daughter, but I am his son\n        *goto 42\n        \n*label 42\nAnd what significant visible features do you have?\n*goto 237\n*label 237\n*choice\n    #A long, wispy beard\n        Some, if you weren't quite so young, would almost mistake you for a druid! Anything else?\n        *goto 237\n    #An impressively muscular frame\n        Yes, even some of the castle guards are a little intimidated by your form. Anything else?\n        *goto 237\n    #Long, braided hair\n        Of course, it's a respected style favoured by both warriors and lords. Anything else?\n        *goto 237\n    #A fairly skinny frame\n        Both a blessing and a curse, some think you are more attractive as a result, others just laugh at your apparent weakness. Anything else?\n        *goto 237\n    #Short, straight hair\n        It's an unusual style amongst adults, and usually spared only for children, but you own it! Anything else?\n        *goto 237\n    #That's all\n        *goto 236        \n        \n*label 236\nIndeed, they were certainly what made you stand out from the crowd, weren't they? That reminds me, a ${boy} as high born as yourself must have had a secondary talent, didn't you?\n*choice\n  \n    #I am fairly charming and well spoken, I know how to tell a fib and can usually get away with it.\n        *set Persuasion +30\n        *goto 3\n    #I am quite competent in fighting as well, but still have a long way to go if I am to reach mastery.\n        *set Combat +30\n        *goto 3\n    #I am a pretty good learner, I read on occasion and even study my people's history if the urge hits me.\n        *set Knowledge +30\n        *goto 3\n    \n*label 3\nIndeed, although it is one thing to be a great ${man}, and quite another to be a great ${king}, the people of your village ponder about a time  when you, Ailbhe's ${son} takes your father's place on the throne of Chlann Scrufa. What kind of leader do you plan to be?\n*choice\n    #I will rule with a firm but caring hand, I will expand the territories of this great clan and mount raids on the land and cattle of my enemies!\n         Indeed, like your father you are a  ${man} who favours strength and might above diplomacy, the lesser lords of Chlann Scrufa have favoured this approach for decades, it is how you makes a name for yourself. Unfortunately, the peasants and common folk are sick of their cattle being killed and their crops burnt to ash, it seems going through with this approach when the time comes would not make you a ${man} of the people…. but you will earn the respect and loyalty of the younger lords.\n       *goto 4\n        \n        \n        \n    \n    #I will bring to my people a new era of art and culture, people will come from far and wide to see our sculptures and trade our crafts, I will make literature and fine music accessible to all!\n        The middle class craftsmen, bronze smiths  and musicians will support you all the way through  this approach of leadership, the lands of Munster have been plagued by crop failures and  tit for tat violence between clans for far too long. \n        \n        A new era of prosperity and celebration of the arts would indeed lift the spirit of the crafts people and artists, but the poor peasants would consider this a horrendous waste of resources when they have barely enough income to get by. The lords, too, would prefer a less long term get rich quick plan, the shortest route ,of course, being to take what you want from the lesser clans of the region.\n     *goto 4    \n   \n   #The wealth of this clan has for too long been been concentrated to the lucky few, I will redistribute it to those that need it most!\n       The peasants for so long have suffered from your fathers harsh taxes and binding laws as they struggle to leech from the land enough nutrients to grow turnips that they would sell for a fraction of the market value elsewhere. It is time to cut your taxes in half, and tax only those who can actually afford to pay. This method was brought up by a previous lord at a great hall not unlike your father's, the lord's cup was poisoned that night as he came back from the toilet.\n       \n       This idea will make you many powerful enemies, should you choose to continue on it's path, but it will make you many more friends in the common folk of the land. When the time comes, should you choose to proceed, there is little doubt that they will rise up in arms and rally to your support.\n    *goto 4\n\n\n*label 4\nWhat'll they call you?\n\n${King}…\n*choice\n       #Cu \"the hound\"\n           *set Name \"Cu\"\n           *goto 4999        \n       #Flann \"the bloody\"\n           *set Name \"Flann\"\n           *goto 4999\n       #Fiadh \"the wild\"\n           *set Name \"Fiadh\"\n           *goto 4999\n       \n       #Mairead \"the pearl\"\n           *set Name \"Mairead\"\n           *goto 4999\n        \n       #Cian \"the enduring\"\n           *set Name \"Cian\"\n           *goto 4999\n        \n       #Shay \"the hawk-like\"\n           *set Name \"Shay\"\n           *goto 4999\n        \n       #Tadhg \"the poet\"\n           *set Name \"Tadhg\"\n           *goto 4999\n       #Sadhb \"the wise\"\n           *set Name \"Sadhb\"\n           *goto 4999\n           \n       #Actually, my name is...\n           *goto 4998\n*label 4998\n*input_text name\n*set Name\"$!{name}\"\n*goto 4999\n\n*label 4999\nExcellent, the legacy of ${king} $!{name} will live on long after your flesh has returned to dust. Is that definitely the name you want?\n*choice\n    #Yes\n        *goto 4000\n    #No\n        *goto 4\n    \n*label 4000\nThis whole lordship business certainly appears to be a daunting task, but first things first, you will have to do your Uncle proud so that you can regain your right to the throne…..or have to take it from your father, if your lust for power outweighs your loyalty to your own blood.\n\nYour father walks you outside, the weather is calm but chilly, you walk along the rope bridge suspended across the outer moat and towards the carriage that awaits you. The driver gives you a filthy look and commands you to \"Hurry along, ${boy}.\" How do you respond?\n*choice\n    #Ignore him \n        He's just a cranky old man, not worth the effort it would take to scorn him.\n        *goto 5\n        \n    #Put the driver in his place  \n        The man chuckles at your threats, \"A noble spoilt brat gone out\n        of Daddy's favour? I've been more scared,\" his head shakes.\n        *goto 5\n    \n*label 5\nHe gives the horse a gentle pat on the backside with his rod and the carriage heads off shakily down the cobblestone road to southern Waterford, and your Uncle's barracks. You look out the back of the carriage and see a large convoy of carts full of weapons, food and you guess around 40 Kerns, lightly armoured\nskirmisher warriors armed with war darts, and 10 Gallowglass, heavy infantry armed with broadswords.\n\nAlongside them, mounted on a huge shaggy stallion, sits one of the the most feared of your fathers riders, Brenda. She was a viking mercenary who had proved her usefulness in battle and so had found a place amongst your Father's personal guard. It is unlike him to send in his best unless the situation with the vikings has grown dire, in which case your father clearly hasn't given you the full story as to why you are needed further South. The driver nods to a man on horseback who is issuing commands and appears to be leading the convoy, \"That's Bruce MacMurragh, a Scottish mercenary your father hired to lead the mission.\n\nNow he's a man who knows what he's doing, been in more battles than years he was born, I reckon.\"  The driver looks back and seeing your curiosity says \"The Norsemen raids on our monasteries and villages have gone on  quite enough, your father has decided to push the filthy rats back into the sea!\", he says with a wide grin. \n\nYou see several scouts on horseback ride on ahead, \"One of our garrison outpost's guards have deserted us,\" he says,\"They obviously hadn't figured out what to do when they did, so without food or supplies they started carrying out raid on trading caravans and travellers, your father wouldn't want 'em near his precious ${son},\"he sneers. You travel another 4 hours through valleys and rocky hills until you feel the cart come to a stop. You look to the driver and see his permanently arrogant sneer turned to a pale look somewhere between a deadly sickness and petrified fear.\n*Page_Break Next\nYou look out of the carriage to see three of the scout's bodies hanging upside down from a branch overhanging the cobblestone track, their bodies smeared in thick mud and plastered with feathers. Across the road from the hanging corpses stands a flag with the image of three sword silhouettes, and blood dripping from their hilts and blades. You ask around the convoy but no one recognises the coat of arms, however the message is clear, we'll have a lot more to worry about than the Danes.\n\nYou hear a horn blowing in the distance, the sound getting closer. The hills surrounding the valley your convoy stands in seem to be alive with the trotting of hooves and the shrieks of men succumbing to their inner blood lust. The men appear across the hills above you, with excited, fearsome glares on their faces. Their hair is spiked up and dyed blood red, the few swords that they have are badly rusted and chipped.\n\nMost have slingshots, makeshift javelins or farming scythes or picks. The painted men, mostof whom are completely naked, line across the left flank of the convoy, 30 in all, they rain down slingshot rocks, javelins and war darts. Three of your kerns are struck down in the first volley, but your warriors are quick to find cover.\n\nBruce is struck down from his horse by a javelin that pierces his shoulder, the kern that runs to help him, too, is pierced. From the flanks of the attacking footmen emerge 15 horse backed attackers with poleaxes and long maces which they brandish and wave around with zeal. They are clearly riding to your flanks to cut off a retreat. Your warriors look on nervously as the onslaught begins….. with Bruce down it is clear the warriors expect you to take charge. What are your orders? \n*goto 9\n*label 9\nYou have ${gallowglass} Gallowglass and ${kern} Kerns against their ${Horsebandit} Mounted warriors and ${Nakedbandit} footmen.\n*choice\n\n       #Let your forces take cover, wait to see the enemy response\n           They do as you command, finding cover behind wagons and carts. The bamdits are content to let you hang back and send a shower of missiles hurtling at your men. Javelins, arrows and rocks are exchanged from both sides. Despite your cover, your forces appear to be coming out the worse than the bandits as a result of their high ground advantage. Two of your gallowglass and six kerns are struck down, likely never to rise again.\n           *set gallowglass -2\n           *set kern -6\n           *set HorseBandit -1\n           *set NakedBandit -4\n           You now have ${gallowglass} gallowglass and ${kern} kerns left against their ${HorseBandit} mounted bandits and ${NakedBandit} footmen.\n           *if kern \u003c1 \n               *goto 11\n           *if NakedBandit \u003c1\n               *goto 10\n           *else\n               *goto 12\n       \n    \n       #Charge up the hill! Your men are well trained and have superior armor\n            You rally them around you with your broadsword and give out a battle cry!\n        They charge up the hill with their shields raised, maces, axes and swords swinging above their heads. A volley of missiles, darts, arrows and javelins cut deeply through your ranks, 3 of your gallowglass collapse under the barrage of missiles, followed by 8 more kerns. When the two sides meet, there is no contest as to who are the finer warriors, your men cut through the enemy lines and cause confusion, the only question is whether your numbers are enough to keep up the assault.\n        *set gallowglass -3\n        *set kern -8\n        *set HorseBandit -4\n        *set NakedBandit -10\n        You now have ${gallowglass} gallowglass and ${kern} kerns left against their ${HorseBandit} mounted bandits and ${NakedBandit} footmen.\n        *if kern \u003c1\n            *goto 11\n        *if NakedBandit \u003c1\n            *goto 10\n        *else\n            *goto 12\n          \n           \n      \n    \n    *if Knowledge = 30\n        #We must form a defensive square with our wagons! Otherwise we'll be cut down by their horsemen!(requires Knowledge 30)\n             You're troops are surprised by your resourcefulness….you hope it will be enough. They work quickly to form the defensive position, using it as cover while they hurl back their javelins and cut down the armour-less footmen. The enemy cavalry realises their mistake and turns back to retreat, but not before six of them are struck down by your kerns.\n             *set NakedBandit -8\n             *set HorseBandit -6\n             *if kern \u003c1\n                 *goto 11\n             *if NakedBandit \u003c1\n                 *goto 10\n             *else\n             You now have ${gallowglass} gallowglass and ${kern} kerns left against their ${HorseBandit} mounted bandits and ${NakedBandit} footmen.             \n             *goto 12\n            \n        \n             \n       \n       \n        \n\n\n       \n*label 8      \nYou signal with a white garment for the attackers to cease, one of them, carrying the same flag that stands on the road, gallops down to meet you. \"Which one of you leads this convoy?\" He looks you up and down and snarls,\"You? Young ${boy}? Surely not!\n*choice\n            #You hardly come across as the leading type yourself(nodding to the scar running from his lips to his chin)\n                \"The man who gave me this, young one, was far greater a warrior than you'll ever be.\" He moves a finger across his scar thoughtfully, \"And even he ended up with his dismembered body parts spread across a bog\", he says confidently.\n             *goto 6 \n            #Well I'm sorry to disappoint you(sarcastic)\n                Clearly irritated by your nonchalance, he responds in a similar tone, \"And so you should.\"\n             *goto 6\n            #I am ${son} of Ailbhe, chief of chlann Scrufa, you'd do well to hold your tongue.\n                He gives you a smile of wild arrogance,\"Well now I know how pretty a price I'd fetch for you as a hostage.\"\n             *goto 6\n         \n    \n        \n        \n            \n      \n*label 12 \n*choice\n            #Continue the attack\n                *set gallowglass -2\n                *set kern -5\n                *set HorseBandit -3\n                *set NakedBandit -7\n                *if kern \u003c 1   \n                    *goto 11\n                *if NakedBandit \u003c 1\n                    *goto 10\n                *if HorseBandit \u003c 1\n                    *goto 10\n                *else            \n                   *goto 9\n             \n            #I will attempt to negotiate with these attackers, surely they must have a reasonable leader                \n                *goto 8\n           \n                 \n            \n             \n             \n*label 6\n\"Time to cut to the chase, you lay down your weapons, I'll keep a few of them, maybe a little food for my hungry lads up there, and you can go on your merry way?\" He pauses for effect, \"Or I think I've got a few feathers left over from your bird buddies\", he gestures to the scouts corpses hanging from the tree.\nThe warriors at your side murmur in dismay, a few of them even suggest agreeing with the terms, from what you can hear.\nHow do you respond?\n\n*label 7\n*choice\n     #Convince him of another larger force less than half a mile away\n         *if Persuasion >29\n             \"Is that so? You better be careful what you say, ${boy}, I don't take too kindly to liars\", you have to hide a grin when you see the flicker of belief in his eyes, he's bought it. \"Young ${lad}, it's time for me and my boys to move out, no hard feelings about earlier, though, right?\" You give him a solemn nod, but can't help give a releaved sigh at your success when he's out of earshot.\n             *goto 10 \n         *else\n             \"Ha\", he bellows, \"Do you think me a fool? I'd sooner believe in Banshees than that pathetic little fib! Although, my offer to you remains, deal or no deal?\"\n             *goto 7\n    #Dismount and kill him\n            You snatch a poleaxe from the Gallowglass beside you and before the bandit leader has time to react, you swing it round, knocking him off his horse, you give your men a yell of triumph and they surround him in seconds, cursing him and kicking him as he roles around in the mud, pathetically attempting to cover his face with feable arms, it is only when a kern decides to stomp his bootless foot on his skull, and a sickening crunch echoes across the valley, does his movements stop. Horrified at seeing their leader dead, the bandits break and run.\n            *goto 10\n    #Deal, but you better stick to the terms!\n        You signal for the men to lay down their arms, some refuse, but in seeing most of your troops do as you say, they follow suit. \"Yes, good job little puppy\", he smirks at his surprising success. His soldiers swagger down the hill, joking and laughing at how easy this encounter turned out to be. One of the gallowglass mutters as a bandit takes his weapon from him, that if he'd had the chance, \"I'd have left you screaming like a sow as you rolled around in your own blood.\" The bandit, hearing this, pauses in reddened silence… before inflicting a furious backhand smack across his face. \n        \n        The gallowglass, his head turned by the impact, gives a satisfied grin through bloody teeth. With huge, muscular arms, he shoves four fingers under the ribcage of the bandit, whose eyes scramble around wildly in panic, and pulls back. The bandit howls in agony, two of his lower ribs snapped out of place by the gallowglass' meaty fingers. In seconds the valley has descended into chaos, with men jumping for their weapons back or attempting to fight back unnarmed. Many of your own men are slashed to pieces before they get the chance, the bandits retreat back up the hillto the high ground, caught off guard in the face of such fierce resistence.\n        *set gallowglass -3\n        *set kern -8\n        *goto 12\n        \n        \n      \n        \n             \n*label 11\nYour army couldn't compete with the onrush of attackers, the few survivors break and run, your corpses litter the field and the blood of you and your fallen comrades washes downriver to the castle of your father……\n*goto_scene death\n   \n*label 10\n*if gallowglass \u003c1\n    *set gallowglass 0\n    *goto 299\n*else\n    *goto 299\n*label 299\n\nYour small remaining force of troops cry out in celebration and taunt the retreating army, their admiration for you and your quick thinking is clear, probably higher than their admiration for your father, you can't help but note. \n\n*finish\n", "chapter2": "*Page_Break Chapter 2\n*image Chap2.png\n[i]\"Picked and selected men of great and mighty bodies,\n\nthe greatest force of the battle consisteth of them,\n\nchoosing rather to die than to yield\"\n\n[/i]-17th century account on the Gallowglass\n\n\"Let's move!\" you call, there is an air of triumph in your ranks and despite the bodies of the fallen strewn around the valley, you feel giddily proud of your first military success. Your carts line up and the convoy is on the move once more, your driver seem quite embarrassed, \"Sorry about my earlier comments, or if you feel disrespected by me, boss.\" \n\nYou have proven yourself to be a force to be reckoned with, from the spoilt ${son} of Ailbhe to, in many of your troops view, a competent captain. How do you respond to his apology?\n*choice\n    #All is forgiven, I'm sure it was just a misunderstanding\n        \"Indeed, I m-meant nothing by any of it, boss.\" You give him a silent nod and he seems relieved by your reaction. He turns back to his horse with a short sigh of relief. The events of the morning have really taken it out of you, you lean back and relax to the meditative clip clop of the horses hooves.\n        *goto 1\n    #Well at least now we have a better understanding of my position as the commander here, right?\n        He gives you a reddened look of desperate agreement, \"'course boss, I do hope you'll forgive me in time, he turns to face forward to his horse, not seeming very comfortable with your response.\n        *goto 1\n    #Oh there won't be any further disrespect on your part...(kill him)\n        You command him to stop and get out of the carriage, there are murmurs across the convoy as the troops wonder what you intend to do. \"Get me a rope! Now!\" You gesture for one of your gallowglass to hold him down, seeing what is about to unfold the driver gives out a terrified cry and breaks into tears, he collapses onto the ground and crawls to you, kissing your shoes and whimpering, \"I'm sorry, have mercy, mercy!\" \n        *choice \n            #Too late now, I better go through with this or lose the respect of my men\n                The soldier yanks him back and the driver, seeing your unmoving, cold expression screams in desperate anger, \"Filthy noble runt, I meant every word of it!\", he spits in your face. \"Your mother was a shameful snake and your father remains a fat pig!\" The soldier gives him a thorough beating into the ground and pulls a noose over his neck. \n                \n                You are suddenly filled with rage, and decide to take this into your own hands, you throw the other end of the rope over the branch of a nearby tree. Single-handedly you hoist the man by his neck two meters above the ground, he struggles and twists in mid air for a few moments, 'till his weight gets the better of him and you hear the satisfying crack of his neck. The air of triumph in the camp has faded significantly, but at least your men know not to cross you……\n                *goto 1\n               \n            #I can't do it... but I'll save face\n                In an effort to save face, your kick him in the back with a downward stomp and the man breaks into tears. \"You will not die today, but you must now know that you live because I say you can, and you have what you have only because I allow you to have it, now get back in the carriage.\" \"Yes, boss\", he replies meekly and with relief.\n                *goto 1\n\n*label 1\nYou continue on your journey until you arrive at a small fortified village, it is surrounded by wooden stakes and spiked fences, with the occasional watchtower dotting the perimeter well as a relatively shallow ditch around the gate .\n\nYou see a sign with the message; 'Welcome to the village of Kanturk'. As you approach the small gate two half-armoured guards clumsily run out to meet you, both yielding broadswords and looking as if they were too heavy. \"Stop right there!\" the shorter one shouts at the top of his voice, despite you standing less than five meters away.\n\nYou tell him about your journey so far, gesturing to the sinking sun, and ask whether you and your men could take refuge here for the night. \"Certainly not! we're on lockdown ever since them deserters, well, deserted. Nobody on the coast to watch out for the Dane folk, they call themselves 'vikings', so we can't be havin' any unknown peoples like yerselves messing up our system of security\", he gives you a shooing movement with his fingers while the taller guard nods in solemn agreement.\n\n\n\"Men!\" a man behind them bellows, \"these are our honoured guests!\" \"Oh, my apologies\", the short one mutters, like a child caught stealing sweets. The owner of the commanding voice pushes between the guards and gives you a forced smile. \"Young $!{name}, welcome to my humble abode.\" You notice that the man is wearing extremely expensive clothes, fine linen held up by a brooch encrusted in precious stones. His hairline is receding and he has a stout, round body shape.\" I hadn't expected your arrival so soon,  Oh, and I'm Ferghus of Chlann Tarbh, the bull clan, I'm sure your father has mentioned me?\", he asks hopefully.\n*choice\n    #Y-yes, of course(lie)\n        *if Persuasion = 30\n            The man gives you a satisfied grin, \"All good things I hope?\", He chuckles, \"certainly\", you reply, relieved he's fallen for your little white lie.\n            *goto 2\n        *else\n            \"He hasn't, has he?\", he gives you a slightly disappointed nod and carries on,\n            *goto 2\n\n\n    #No, sorry\n        \"Oh I see\", his face has reddened with embarrassment or anger, you're not sure. He carries on,\n        *goto 2\n    \n*label 2\n\"I was told I'd hear word from your scouts an hour or two before you'd arrive, perhaps they got missing?\"\n\"Not missing, they were killed right before our run in with these bandits\", you reply coldly, \"sorry to rush through like this but one of our men was struck in the shoulder and needs medical help, now\" you blurt, pointing to Bruce as he lies moaning in pain in the wagon beside you. \"Of course\", he says, beckoning you with a quick\nwave of his hand.\n\nYou and your men walk through a small cobblestone street where a small market is concluding, the people eye you suspiciously. \"The people are fearful of the band of deserters in the south\", he explains, \"rumour has it they've made ties with a group of bandits that hang around a forest a couple of miles down the road you were travelling through.\" He calls over a a healer in an apron, and you are taken aback by…\n*choice\n    #His handsome face\n        *set healer +1\n        *set Saoirse \"Carrick\"\n        *goto 83\n    #Her beautiful smile\n        *goto 83\n    #Actually, I don't really notice her good looks\n        *goto 83\n\n*label 83\n\"${Saoirse} will take care of Bruce, \n*if healer =0\n    she is by far  the best healer in Éire, mark my words.\" The woman he's referring to is just an inch under your height, with mischievous blue eyes and deep black hair, she is a remarkably beautiful woman. She is accompanied by two younger lads in shaggy leather clothes. Ferghus explains to her the situation and she gives you a firm, knowing nod. \"I'll do my very best\", she says before getting her two assistants to carry Bruce across the street to a small wattle and daub apothecary. Ferghus clears his throat,\"Your men are welcome to stay at the inn over there, their visit is on the house, and there are some pressing matters for you and I to discuss….\"\n    *goto 3\n*else\n    he is by far  the best healer in Éire, mark my words.\" The man he's referring to is just an inch above your height, with mischievous brown eyes and deep black hair, he is a remarkably handsome man. He is accompanied by two younger lads in shaggy leather clothes. Ferghus explains to her the situation and he gives you a firm, knowing nod. \"I'll do my very best\", he says before getting his two assistants to carry Bruce across the street to a small wattle and daub apothecary. Ferghus clears his throat,\"Your men are welcome to stay at the inn over there, their visit is on the house, and there are some pressing matters for you and I to discuss….\"\n    *goto 3\n\n*label 3\nHe Walks you to his small but grandly decorated castle, it has several banners and flags flying over the entrance, as well as stone carvings of great beasts and warriors, you think you can even recognize some of the legends yourself. On the large oak door at the entrance is beautifully crafted bronze image of enormous bull, reared up onto its hind legs, horns pointed forward and large, almost tusk-like teeth lining powerful jaws. \"Beautiful, isn't it? My father had it commissioned by an artist from the Isle of Man many years ago\", he states with pride. \n\n\"It took the artist six months to complete, he said it was the most amazing piece he had ever produced, Anyway…\" he opens the door and beckons you in. \"What I want to discuss with you…well, I warn you it's something your father disapproves of, apparently he has his own plans for you… My daughter is of marrying age and I was wondering whether you would have any interest in an alliance of this nature?\"\n*choice\n    #Why does my father disapprove?\n        \"Well, $!{name}, your father is a stubborn man and will only take what he believes is the best deal\", he explains, \"he said he would only agree if I were to give him thirty of my fattest heads of cattle as a dowry, something I'm sure you can imagine would be very damaging to this village, especially coming up to winter. If only you could could change his mind and show him that this alliance would only benefit both our clans, you see, the population of this village is small but quite well off and skilled, we have fine crafts and goods but, alas, a small army not half as strong as it should be in times of unrest such as this. If you were to go ahead with this he'd soon come around, so, what do you say? Indeed, the Brehon laws state that a 'test' marriage, so to speak, could be had for a year and a day without any legal binding, this may be the route you would like to take, ${name}, if you were unsure…\"\n        *goto 4\n*label 4\n*choice\n    #I'd be happy to meet her and get to know her first\n        \"Excellent, he smiles, I'll arrange for the two of you to get together in the morning, thank you very much for agreeing\", he says, shaking your hand passionately.\n        *goto 5\n        \n    #Sure! (I can hardly believe I am being given such an honour)\n        Surprised at your eagerness, he says \"Good, but of course the two of you should get to know each other first, I'll arrange for the two of you to meet in the morning.\"\n        *goto 5\n        \n    #Well, you see, I'm not really into girls...\n        \"Oh, I see\" he says, a little embarrassed, please pardon my presumption, $!{name}.\"\n        He looks at you thoughtfully, a light wrinkling on his forehead, \"well\", he begins, \"I do also have a son, if you would be interested?\"\n        *set woman \"man\"\n        *set girl \"boy\"\n        *set her \"him\"\n        *set she \"he\"\n        *set daughter \"son\"\n        \n        \n        *choice \n            #I'd be happy to meet him and get to know him first\n                \"Perfect, my ${lad}, I'm so glad you're open to it, I'll arrange for you to meet him in the morning!\"\n                *goto 5\n                  \n                  \n            #Sure! (I can hardly believe my luck)\n                \"Of course, I knew you'd want to\", he gives you a wink, \"I'll arrange for you two to meet up in the morning.\"\n                *goto 5\n*label 5\nYou are shown to the castles glamorous guest room and lay down on the beautifully soft linen and stare at the ceiling, just yesterday you had been a drunken mess, now you are the unofficial but unquestionable captain of a small army, headed to deal with the Viking raids in the South. Funny how much a person can change in the time it takes the sun to rise and fall. You close your eyes and allow yourself to drift off…\n\nYour eyes open hesitantly what feels like only a couple of hours later, you hear the creaking of floorboards outside your room  and  jump up out of bed, you grab your short sword and tiptoe to the door. The creaking slows but doesn't stop, you open the door by just a crack and you see a ${girl} around your age with a large bag on ${her} shoulder walking towards the window, a long rope in the other hand. You watch as ${she} ties the rope to the leg of a small writing desk in the hallway, and gripping the rope firmly in both hands, as well as the sack, ${she} backs away to the window and begins to climb out…\n*choice\n    #Hey, what are you doing?\n        ${she} lets out a gasp, surprised ${she} had not gone unobserved, and hastily descends the two stories to the ground, ${she} jumps up onto the large blond stallion that was awaiting ${her} and galloped off to the nearby forest, not looking back.\n        *goto 6\n        \n    #Watch as ${she} attempts to make a descent\n        Not noticing you, ${she} abseils down two stories to the ground, and mounts the large blond stallion that awaits ${her} below, before galloping off towards the nearby forest, not looking back.\n        *goto 6\n*label 6\n*choice                       \n            #Follow this mystery ${girl}\n                You run up to the window, grab the rope and descend to the ground. You run off towards the forest, checking back occasionally to see if you were being followed. Ducking into the thick forest, you can't shake the feeling you are being watched. After several minutes of navigating through thick, thorn bushes and trees twisted and deformed by years of heavy winds, you arrive at a small clearing. Ahead of where you're crouched stands the ${girl} you had followed, standing beside ${her} is a man who seems to be comforting ${her}, \"don't worry\", you hear the man say, \"I'll deal with it…\". \n                \n                The ${girl} you followed hands him a small glass vial, the man takes it, looking around, and puts it in his inside coat pocket. The mystery ${girl} kisses him and tells him to \"meet me here tomorrow, my love\", before mounting ${her} horse and heading back in the direction of the castle. You decide to go back too, making sure to stay out of sight.\n                *achieve lover\n                *set ching +1\n                *goto 7\n            #Leave ${her} be\n                *goto 7\n*label 7\nYou head back to bed, a little confused, and spend the next few hours of the night pondering who the ${girl} was, and what was ${she} up to?\nYou wake up to see a man dressed almost entirely in black, leaning over you as you lie there. He has two of his fingers closing your nose and in his other hand he holds an open vial of a sapphire blue liquid held over your lips.\n*if ching = 1\n    Your eyes widen in horrified shock as his hood falls to his shoulder, and you see that he is the man from the clearing whom you had seen that very night! The man who was comforting the mystery ${girl}.\n    *goto 8\n*else\n*label 8\n\"I'm sorry\", he whispers as he puts a knee on your stomach to hold you down and tilts the vial so the liquid may poor out. \"Please don't make this any harder than it has to be, on either of us\", he says as a tear rolls down his cheek, \"${she} is my true love, ${she} can't be made marry you if you're dead\", he says with a weak finality, \"now ssshhhhhhhh\".You try to stop but you must open your mouth to breath, now that he has covered your nose……\n*choice       \n     #Scream for help!\n         \"Damn you!\", he curses in a furious whisper, he shoves the tiny vial into your mouth and slams your jaw shut, your teeth clink together so hard it feels as if he has broken them. The adjacent rooms come alive with curious or worried chatter, within seconds guards have stormed in and the man's eyes twist wildly in their sockets, out of pure panic he charges at your bedroom window, crashing straight through it and falling to his death. As the guards walk over to you you feel the liquid dribble from the vial and slip under your tongue and down your throat.\n         \n         You sense the feeling in your limbs slipping away as your eyes roll back in your head, the numbness has crawled up to your chest to breath, you feel your heart convulse inside you as you devote all energy left in you to breathing. The guards quickly realise what has happened and one of them, without a word of warning, shoves his sweaty hand in your mouth and grabs you by the uvula. He refuses to let go even as you retch and puke out all over him, holding until it feels as though your stomach has been violently, but thoroughly, emptied. The convulsions have eased somewhat, and as a result of perhaps the shock or the poison, you pass out. That poison, though your body is almost completely rid of it, seems like a strong one. Though you have a feeling you'll survive this, you know you may never fully recover.\n         *set health -32\n         *set Combat -10\n         *finish\n     #Kick out and punch him  \n         *if Combat >10\n             He is caught off guard by your strength and the vial spills onto the ground as he stumbles back. You are quick to your feet and give him a winding kick in the stomach before tackling him to the ground. He reaches for a knife under his coat and pushes himself up.\n             *goto 40\n         *else\n             *goto 50\n   \n*label 50\nYou shove him back weakly but he shrugs your arms to the side. \"We are meant to be! Just let me finish this\", he says desperately, he grabs your jaw and tries to pull it back, but you have it clamped shut, \"You won't feel a thing….\", he pleads. Seeing your determination he brings his fists down repeatedly onto your skull, you are sent into a daze and you know that whether you survive this, you will probably never fully mentally recover.\n*set health -20\n*set Knowledge -10\n*set Persuasion -10\n*goto 9\n            \n\n*label 40\n*choice\n    #Kick it out of his hand\n        He growls in frustration as his knife clatters to the ground across the room and leaps at you, grabbing you by the throat and toppling you back onto your bed, he slams down hard on you with his clenched fists and you feel yourself begin to slip out of consciousness.\n        *set Persuasion -2\n        *set Knowledge -2\n        *set health -20\n        *goto 9 \n\n    #Reach for your sword on the other side of the bed\n        As you turn to grab the sword, he jumps onto your back, stabbing deeply into your shoulder blade and shoving you back onto your bed for a second stab, you can feel the effects of your blood loss ripping what little energy you had left, you are seconds from slipping out of consciousness, you know that if you do survive this, you may never fully physically recover.   \n        *set Combat -10\n        *set health -20\n        *goto 9                      \n*label 9\nJust as he is about to deliver a final killing blow, several guards burst through the door, weapons reflecting the dull candlelight, in a fit of pure panic, the man charges at the window, smashing through it and falling to his death. Ferghal storms in, demanding an explanation, but freezes at the sight of your blood smeared body. \"Dear God! What happened to you?\" You attempt an answer but collapse into unconsciousness on the bed, the metallic taste of blood lying stagnant in your mouth.\n*finish\n        \n", "chapter3": "*Page_Break Chapter 3\n*image Chap3.png\n*if romance =0\n    *goto 115\n*else\n    *goto 5\n*label 623\nYou wake up in the apothecary, looking around you can see shelves and shelves full of bottles and jars of strange mixtures and solutions. You sit up in the creaky wooden bed and take a moment to observe your reflection in the glass bottle of what you can only assume is urine. Not bad, a couple of bruises and a scratch across your cheek that's been stitched up. You hear footsteps coming from the next room and, unsure why, you lay down, pretending to be asleep. You see through the corner of your eye Carrick's handsome but weary face, as if he'd barely slept in days.\n\nHe sits on the corner of your bed and rests his face in his hands for a few moments. Somehow, he notices you watching and stands up, rather startled, \"Pardon me, ${name}, I believe?\" You give him an affirmative nod, and he takes a short breath before quickly walking to your side, \"You were in quite a fight it seems, ${name}, but you should be fine after a little rest\", if you need help sleeping or if you are feeling too much pain, just holler\", he says before walking off. Although he seems very busy, you feel the urge to ask a few questions.\n*goto 2\n*label 115\n*if healer =0\n    *goto 623\n*else\nYou wake up in the apothecary, looking around you can see shelves and shelves full of bottles and jars of strange mixtures and solutions. You sit up in the creaky wooden bed and take a moment to observe your reflection in the glass bottle of what you can only assume is urine. Not bad, a couple of bruises and a scratch across your cheek that's been stitched up. You hear footsteps coming from the next room and, unsure why, you lay down, pretending to be asleep. You see through the corner of your eye Saoirse's beautiful but weary face, as if she'd barely slept in days.\n\nShe sits on the corner of your bed and rests her face in her hands for a few moments. Somehow, she notices you watching and stands up, rather startled, \"Pardon me, ${name}, I believe?\" You give her an affirmative nod, and she takes a short breath before quickly walking to your side, \"You were in quite a fight it seems, ${name}, but you should be fine after a little rest\", if you need help sleeping or if you are feeling too much pain, just holler\", she says before walking off. Although she seems very busy, you feel the urge to ask a few questions.\n*goto 2\n\n*label 2\n*choice\n    \n     #What is this village like?\n         \"Hmmm, well it was quite a prosperous village until half the more prosperous farmers got pissed off with the high taxes and just left\", she says with a joyless smile, then all the fancy lords and landowners, without enough food to fill their greedy stomachs, just decided to leave as well. Then we were left with a load of fancy craftsmen but no one rich enough to buy their goods and no one to feed them, so there's pretty much been a slow but steady population decline since then, so since around six months ago. Ferghus has only been raising his blanket tax, and the poor who can't pay for it are evicted. Most of them have either frozen in the night, starved to death… or have simply disappeared. Anything else?\"\n         *goto 2\n     \n    \n     #What do the people think of Lord Fergus?\n         \"Well since he was the reason half the farmers left, the village folk aren't happy, the price of food has trebled and he's pretty much just sat on his ass up there in that castle of his while we're struggling to get by. The poorer people despise him, he raised a blanket tax over everyone and he cares very little for their accommodation, the people who complain have slowly been disappearing . That's why you see so many homeless folk and beggars, those who can't pay for the ridiculous food prices and shelter… well, they are pretty much left to die.\n         \n         Apparently, your uncle is stirring up hate against Ferghus and has been very vocal about his disapproval of Ferghus' lassez-faire attitude, but this town is full of gossip, so no need to really worry.  Ferghus' is quite fond of me after I saved his daughters life a while back, but that doesn't mean I admire him as a leader, certainly not. Was there something else on your mind?\"\n         *goto 2\n       \n     #What does one do here for entertainment?\n         \"Well, the one good thing we've got going on in the village is the weekly market, It'll be on tomorrow. The craftsmen are pretty desperate for some money, and ever since the rich folk left, the craftspeople have had to cut down their prices big time and the fancy wares that used to be way out of reach of people like myself are pretty cheap, anything else?\"\n         *goto 2\n         \n         \n     #Tell me about the deserters\n         ${Saoirse} grimaces,\"The people of this village are very nervous about them, rumour has it they've joined up with a group of bandits, possibly the ones I hear you ran into. If that's true then we're in big trouble, the deserters were well trained and equipped. There were some 60 men in that outpost, guess they realised they could make more money on the wrong side of the law than defending it. If they did join with those bandits, many of whom have some beef with Ferghus, then I fear this village would not be able to repel an attack, but hey, rumours are just rumours, right? Any other questions you'd like to ask?\"\n         *goto 2\n                 \n     #I'd like some medicine to help me sleep(end today)\n         \"Sure\", ${Saoirse} says, kneeling down beside your bed with a small sort of fern, ${Saoirse} lays it down in a clay cup of red hot embers, allowing it to smoulder and release a reddish-grey smoke. \"Breathe this in\". You do as ${Saoirse} says and feel your eyes grow heavy almost immediately, you lay your head down on the pillow and in seconds you have drifted off……\n         *goto 1    \n*label 1\nYou wake up in your bed to a joyous chatter outside the clay walls of the apothecary, you get up out of bed, most of your ailments seem to be healed, most of them have been stitched up or smeared in rubbing oil. \n\nYou see a pile of lavishly decorated clothes at the foot of your bed and a small letter on top of them. 'My sincerest apologies, $!{name}, last night was a horrendous failure on my guards part, they will be punished and replaced by the end of the week. Here is a change of clothes as I'm sure your old ones are a little torn up. Enclosed in this letter is a small gift. I do hope you are still considering the marriage I had offered you yesterday, perhaps you could meet me later today after you enjoy one of this village's famous markets?'\nSigned Lord Ferghus.\n\nJust as you finish reading the letter ${Saoirse} walks in, holding a rather plain tunic and leather trousers, \"Oh, pardon me, $!{name}, you already seem to have a spare change\", ${Saoirse} says, a little embarrassed.\n*set sc 200\n*choice\n    #Yes, but thanks\n        \"Of course, no problem, $!{name}\", the walks off briskly to the other room, \"I better let you change in privacy\", ${Saoirse} says.\n        *goto 3\n        \n    #Nah, these rich clothes aren't really my style anyway\n        ${Saoirse} gives you a wide smile and passes the clothes over to you. ${Saoirse} turns to walk to the other room, \"I better let you change in privacy\"\n        *set chang +1\n        *goto 3\n*label 3\n*choice\n             #Thanks\n                ${Saoirse} continues into the next room as you get changed into\n                *if chang =1\n                    the plain outfit ${Saoirse} had kindly given you.\n                    *goto 5\n                *else\n                    the fancy outfit Ferghus had given you.\n                    *goto 5\n                    \n             #That's not necessary(flirting) \n                     ${Saoirse} turns, a little reddened, with a raised eyebrow, \"Perhaps it isn't \". You have a feeling you know where this is going, what do you do?\n                     \n                     *choice\n                         \n                         #Go through with it\n                             *gosub trial_end\n                             *goto_scene romance\n                        \n                         \n                         #No thanks...  \n                            ${Saoirse} sees your sudden lack of enthusiasm, and stands up looking quite disappointed. \"Sorry\", I thought you were……suggesting something else.\" ${Saoirse} walks briskly to the other room, you can see the red embarrassment creeping to the healer's as they walks away. You get changed and bid the healer goodbye. ${Saoirse} replies with a hasty \"Bye now\" as they gets to work brewing medicines and doing gods know what.      \n                            *goto 5\n                 \n*label 6\nYou hand the man the money, and he responds with a smile, handing you your sword, \"A fine weapon for an even finer warrior!\"\n*goto 8\n*label 7\nHe gives you a friendly nod as you leave.\n*goto 8\n\n\n\n*label 5\nAs you step out the doorway you are taken aback by the hustle and bustle of the street, the village centre is lined with stalls and merchants, calling out their best deals and haggling with the locals, you even see a woman in armour whom you can only presume is a mercenary, offering her 'services'. There are street games being played, jesters, archery tournaments and you overhear about a trial being held in the town hall all afternoon, a large thatched building beside Ferghus' castle. With the 200 silver pieces Ferghus had sent, you shouldn't have trouble buying some of the finer goods the market has to offer, or maybe try your hand in some of the fun games taking place, or perhaps you'd like to hone some of your skills with a tutor, on market day, the village of Kanturk certainly has a lot to offer. \n*label 8\nWhat do you feel like doing?\n*choice \n     #See the combat tutor\n         *goto 32\n     #Go to the potions stall\n         *goto 40\n     #Talk to the mercenary woman\n         *goto 22\n     #Try to find a weapons merchant\n         *goto 23\n     #Go watch the trial in the town hall(leave the market for the day)\n         *goto 521\n*label 521\nYou go to the town hall, and as you walk through the doors of the hall, you are taken aback by the booming echoes being fired across the room during an obviously very heated debate, a Breitheamh sitting at the top of the room. As you arrive you remember well your childhood teachings on the laws of the land, known as the Brehon laws;\n\n[i]The Brehon laws are the laws that envelope all of the inhabited lands in Éire. The very gods themselves, Dagda and Éiriú and indeed others, have commanded that they be strictly obeyed. The Brehon laws are the laws of the people, and rest not with King nor Queen, nor can be changed by them, but only by the people of the land. They include the 'Law of Fair Fight' and of 'Honour in negotiation'. The laws are held so highly in regard because they create community amongst the warring tribes, and they maintain the reputation of each individual clan. The law is taught and guided, though not enforced, by wise scholars known as the Breitheamh, who interpret the laws and overlook trials. They hold not man nor women in higher regard, and focus on the strengthening of community and family bonds. The perpetrator, after commiting a crime, will be made to duly compensate those effected. Only in very extreme cases, are punishments of death and the like carried out. Although Kingship is often hereditary, the people have the right to elect a new king if needs be.\n[/i]\n\nThe Breitheamh is wearing a spotless white robe not unlike the kind worn by the druids, and as is customary for the Breitheamh, a copper torc. The torc is a handsomely decorated piece of jewelery that wraps around one's neck. It is said that if a Breitheamh gives an unjust judgement, or misinterprets the Brehon Law, the torc will tighten, choking the false Breitheamh 'till the coolness of death embraces him. Among the noisy commotion in the room, the Breitheamh speaks out; \"Silence!\", he bellows, \"General Alastar, please refrain from profanity and be respectful to the participants of the tria-\" \"If I could, I'd throw that dirty mongrel in a coffin and have him buried alive!\", the general cuts across, face almost purple with fury. The other man, seemingly much poorer and very skinny, spits back, \"Your son deserved it, the pompous brat just barged into my house unannounced and hit me across the face for failing to pay my rent for the  week\", he slams his fist down on the wooden podium, \"The man was a drunken fool and deserved everything he had coming to him\".\n\n\"He KILLED MY SON, the scrawny bastard hacked him down mercilessly with his hoe, he was only 17, just a boy…\", General Alaster exclaims, tears running down his cheeks. \"Hmmmm\", the Breitheamh ponders, I think the only fair way to decide this is with a vote. You\", he says, pointing at both the general and the peasant, have a few minutes to share your side with the onlookers before the vote commences, to decide whether Cathal[presumably the peasant] shall be prosecuted.\" The defendant and accuser give each other a glare before turning to the audience, they walk into the clusters of people and all but disappear into the crowd, you can hear their passionate voices echoing across the room. Who do you listen to first?\n*goto 9           \n*label 40\nYou find a rather barren looking wooden stall outside which an elderly woman sits on a stool, humming to herself softly through a toothless mouth. Judging by the way she stares into the abyss and the crooked cane she taps at her feet, she is blind.\n*choice\n    #Where are all the potions?\n        \"My ointments and potions are the best in Kanturk, they sold out an hour ago or so. And who might be the one asking said question? A young ${lad}? I think so, tell me your name, young one\", she asks warmly.\n        *choice\n            #That's none of your business, hag!\n                \"Much fire, have you, but ofttimes to appreciate the beauty of the flames, one must quench them…\"\n                *choice\n                    #I have no time for this(leave)\n                        Once she hears your footsteps walking away from her, her whistling begins once more.\n                        *goto 8\n                    #Please, answer me plainly\n                        \"A straightforward character I see you have, but like a young river, in the changing waters you must soon learn to twist and bend…\"\n                        *choice\n                            #I have no time for this(leave)\n                                Once she hears your footsteps walking away from her, her whistling begins once more.\n                                *goto 8\n                            #Then teach me your wisdom, wise one\n                                \"Although my potions have run out, my wisdom is indeed ever-flowing. Wise you are, child, and for the sake of 20 silver pieces, many times wiser you will be…\"       \n                                *goto 60\n            #I would rather not answer\n                \"A ${boy} of careful planning and wariness, I see you are, but like the rivers, come the storms, you must learn to flow with speed and haste…\"\n                *choice \n                    #I have no time for this(leave)\n                        Once she hears your footsteps walking away from her, her whistling begins once more.\n                        *goto 8\n                    #Please, answer me plainly\n                        \"A straightforward character I see you have, but like a young river, in the changing waters you must soon learn to twist and bend…\"\n                        *choice\n                            #Then teach me your wisdom, wise one  \n                                \"Although my potions have run out, my wisdom is indeed ever-flowing. Wise you are, child, and for the sake of 20 silver pieces, many times wiser you will be…\"  \n                                *goto 60\n                            #I have no time for this(leave)\n                                Once she hears your footsteps walking away from her, her whistling begins once more.\n                                *goto 8 \n            #My name is ${name}, son of Ailbhe\n                \"An honest one you are, you are a character of trusting and complacency, but like the fox, when the hunters are near, you must learn to be cunning…\"\n                *choice\n                    #I have no time for this(leave)  \n                        Once she hears your footsteps walking away from her, her whistling begins once more.\n                        *goto 8 \n                    #Then teach me your wisdom, wise one\n                        \"Wise you are, child, and for the sake of 20 silver pieces, many times wiser you will be…\"\n                        *goto 60                        \n                           \n*label 60\n*choice\n    #I can't afford that\n        \"A pity, my child, if you change your mind, and purse, then I shall be waiting.\"\n        *goto 8\n    *if sc >19\n        #I accept(-20 silver pieces, +10 knowledge)\n            What she tells you changes your view of the world somewhat, and opens passages of thinking within your mind that you didn't even know were there.\n            *set sc -20\n            *set Knowledge +10\n            *goto 50\n*label 50\n\"Now, perhaps a little more silver for my memory and you can be enriched even further?\"\n*choice\n    #I can't afford that\n        \"A pity, my child, if you change your mind, and purse, then I shall be waiting.\"\n        *goto 8\n    *if sc >39    \n        #I accept(-40 silver pieces, +20 knowledge)\n            What she tells you changes your view of the world even further, and opens up to you a whole new way of thinking. \n            *set sc -40\n            *set Knowledge +20\n            *goto 8\n\n            \n*label 22\nAs you approach her you can't help but notice the heavy golden brooch that holds her gown in place, it is adorned with crystals and on her belt hangs six thick-bladed throwing blades. She holds herself in a confident but respectable manner. She's clearly a woman of wealth, presumably from being successful in what she does. She says she has decided to go solo, not really interested in commanding such a large crew. She says her men are anxious for a strong leader, not the kind, though, that sits behind a bailey wall, \"They want someone with a lust for battle\", she grins. \"So, ye can take these lads off my hands, but for a price…\"\n*choice\n    *if sc >179\n        #\"I'll take the lot of them!\"(-180 silver coins, +10 gallowglass, +15 kerns)\n            *set sc -180\n            *set gallowglass +10\n            *set kern +15\n            *goto 8\n    *if sc >89\n        #\"I'll hire half of them\"(-90 silver coins, +5 gallowglass, +7 kerns)\n            *set sc -90\n            *set gallowglass +5 \n            *set kern +7\n            *goto 8\n    #\"Nope, I'm not interested\"\n        *goto 8\n*label 32\nYou walk over to a makeshift raised fighting ring with a not-so-sturdy looking rope perimeter where two men are fighting aggressively with clumsy-looking wooden swords. Standing at the entrance to the ring is a clean-shaven man in finely stretched leather and a thin layer of chain mail around the base of his neck and shoulders. There is little question that this man is a wealthy one judging not only by his tailored garments but also the silver-lined hilt of the longsword that hangs delicately from his waist, and his silky-red feathered beret-style hat. \n\nYou notice him muttering to himself between frustrated shouts at the men in the ring, \"Damn it, Oisín, Parry his strikes you fool!\" It is then that the overweight man, presumably Oisín, falls clunkily to the ground after taking a decisive whack to the side of his balding head. The finely dressed man, who is obviously the teacher, shakes his head and unsympathetically asks Oisín as he sits half dazed and the arm that he had fallen on throbbing with agony, \"When will you learn? If your fee didn't pay for my housing, I would have given up on you weeks ago!\" Does this attitude towards his students somewhat put you off?\n*choice\n    #Ye
