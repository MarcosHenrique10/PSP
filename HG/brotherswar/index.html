d as the squirming of the prisoners began to weaken, and their faces began to bleed from bright red to deathly pale.\n        \n        The crowd cheers with delight, and begins to shout, \"Dagda praise ${name} the wolf ${king}!\" as they continue pelting stones at the corpses as they dangle feebly from the branches. Breccan looks at you in disgust when you return to your camps, \"I pray you change your ways soon, ${name}, I shall follow no ${king} who advocates anarchy over justice.\"\n        *goto 81\n*label 81\nDarkness falls like a starry blanket that night, though you can't seem to drift off into a sleep, you toss and turn for many hours. With your forces depleted and bitterness in your ranks, as well as an ongoing war with ${Ailbhe}'s far supperior force, one can only pray that you will have time to regain a respectable force before ${Ailbhe}, or Sigfrid, comes knocking. If they do, you will have to be a leader like no other. You can hear Breccan whispering his prayers for hours in the tent beside you, cursing the vikings who left your army in this state of mourning and loss. \n*Page_Break Chapter 8\n*image Chap8.png\n*if rot =1\n    *goto_scene theraid\n*else\n    *goto_scene theraid2\n    \n\n\n\n\n", "romance": "*set romance +1\n*achieve romance\n*if healer =0\n    *goto 1\n*else\n    *goto 2\n    \n*label 1\nShe leans in to kiss you, and you follow suit. Together you start off slowly, and build in urgency as the heat in the room rises. After a minute or so of the passionate exchange,she pushes herself back from you. You feel a sudden disappointment… until you see her lie down on her back, pulling her loose, woolen top off. She seems expectant of you taking control, and you are more than happy to oblige. The morning that follows is one you won't soon forget. At some stage during your time together, you both fall asleep.\n*Page_Break\nYou are awoken with a start by an impatient banging on the door of the apothecary, someone outside is muttering about the \"ridiculously bad service\" and \"opening time was at least an hour ago…\". Saoirse gives a satisfied giggle \"I, guess you better go then, ${name}\", she whispers as she wraps herself in a robe hurriedly. You bid each other fairwell, receiving some pretty suspicious looks from the people waiting outside.\n*goto_scene chapter3\n*label 2\nHe leans in to kiss you, and you follow suit. Together you start off slowly, and build in urgency as the heat in the room rises. You feel a sudden disappointment as he pushes away from you and lies down, until you see him lie down, until you see him pulling his loose, woolen top off. He seems expectant of you taking control, and you are more than happy to oblige. The morning that follows is one you won't soon forget. At some stage during your time together, you both fall asleep.\n*Page_Break\nYou are awoken with a start by an impatient banging on the door of the apothecary, someone outside is muttering about the \"ridiculously bad service\" and \"opening time was at least an hour ago…\". Carrick gives a satisfied smile. \"I, guess you better go then, ${name}\", he whispers as he wraps herself in a robe hurriedly. You bid each other fairwell, receiving some pretty suspicious looks from the people waiting outside.\n*goto_scene chapter3\n", "screenshots": "\n*set HorseBandit 15\n*set lad \"lad\"\n*set uncle 10\n*set kern 36\n*set gallowglass 10\n*set woman \"woman\"\n*set girl \"girl\"\n*set she \"she\"\n*set her \"her\"\n*set daughter \"daughter\"\n*set ching 0\n*set chang 0\n*set thing 0\n*set sc 200\n*set weapon \"sword(basic)\"\n*set health 100\n*set third \"third\"\n*set chapter 5\n*set bob 0\n*set sig 0\n*set Aonghus 50\n*set Ailbhe 50\n*set gender 0\n*set elk \"elk\"\n*set Daragh \"Daragh\"\n*set Knowledge 10\n*set Persuasion 10\n*set Combat 10\n*set Magic 0\n*set he \"he\"\n*set him \"him\"\n*set his \"his\"\n*set son \"son\"\n*set man \"man\"\n*set boy \"boy\"\n*set King \"King\"\n*set nephew \"nephew\"\n*set Name \"anonymous\"\n*set NakedBandit 30\n\n*set sc 115\n*set Knowledge 8\n*set Combat 65\n*set Persuasion 32\n*set name \"Bruce\"\n*set health 26\n*set kern 85\n*set gallowglass 23\n*set Ailbhe 42\n*set Aonghus 58\n*set weapon \"two-handed longsword\"\nIt is then that the great wooden elk-shaped cage is brought forward by several men, the people within it are pulling at the reeds in a frenzy of fear. The priest steps forward and pours a second bottle of oil over the people within it, appearing oblivious to their cries for mercy. The people of the camp come towards the structure, some brushing past you as they go, and begin to circle it, throwing gold and jewelry and fine perfume over it delightedly, as the flames begin to lick their way into the cage…\n*fake_choice\n    #Stop! Leave them alone!\n        \n    #We require otherworldly assistance, it can't be helped\n        \n    #I don't want any trouble...\n        \n*set sc 23\n*set Knowledge 92\n*set Combat 16\n*set Persuasion 67\n*set name \"Aoife\"\n*set health 79\n*set kern 32\n*set gallowglass 12\n*set Ailbhe 72\n*set Aonghus 28\n*set weapon \"saber\"\n*script changeBackgroundColor(\"black\")\nYou are about to head back to the wall you had entered via, but to your horror, you see men inspecting the rope curiously through their smoky torchlight. Daragh sees it as well, and tugs you by the elbow behind the back of the garrison, you crouch together in the eerie darkness. \"There goes our way out!\", he whispers furiously, \"What the hell are we going to do now?\"\n*fake_choice\n    #Between the two of us we could get rid of the watchmen without making a sound....\n        \n    #We should sneak as far as we can to the gate, after that there will be too many guards to hide so we'll just have to run for it.\n        \n    #We can start a fire to distract the watchmen!\n\n*set sc 162\n*set Knowledge 56\n*set Combat 91\n*set Persuasion 11\n*set name \"Sarah\"\n*set health 91\n*set kern 32\n*set gallowglass 13\n*set Ailbhe 52\n*set Aonghus 48\n*set weapon \"shortsword\"\n*script changeBackgroundColor(\"sepia\")\n\"Let's move!\" you call, there is an air of triumph in your ranks, and despite the bodies of the fallen strewn around the valley, you feel giddily proud of your first military success. Your carts line up and the convoy is on the move once more. Your driver seem quite embarrassed, \"Sorry about my earlier comments, or if you feel disrespected by me, boss.\" You have proven yourself to be a force to be reckoned with, from the spoilt daughter of Ailbhe to a competent captain. How do you respond to his apology?\n*fake_choice\n    #All is forgiven, I'm sure it was just a misunderstanding\n    #Well at least now we have a better understanding of my position as the commander here, right?\n    #Oh there won't be any further disrespect on your part...(kill him)\n*set sc 56\n*set Knowledge 23\n*set Combat 97\n*set Persuasion 13\n*set name \"Oscar\"\n*set health 79\n*set kern 12\n*set gallowglass 5\n*set Ailbhe 18\n*set Aonghus 82\n*set weapon \"sword(basic)\"\nA red X had been painted in calf blood to mark the point of meeting, most disturbing as you near it, is the sight of a wild bull, presumably lost from or evicted by it's heard, licking the blood from the bark. You sit down to rest once more by the stream that runs like an artery into the depths of the wood, while you are making sure to keep a safe distance from the lone bull, you hear the crunching of feet on fallen leaves. You manage to stand up, your feet wobbling as you find your balance, your body tenses up as the noise grows louder. What do you do?\n*fake_choice\n    #Mimic the call of the wolfhound through cupped hands to scare her off\n    #Hide in the undergrowth\n    #Stay put\n*set sc 18\n*set Knowledge 43\n*set Combat 32\n*set Persuasion 89\n*set name \"Brian\"\n*set health 3\n*set kern 56\n*set gallowglass 32\n*set Ailbhe 26\n*set Aonghus 64\n*set weapon \"saber\"\nHe walks you to his small but grandly decorated castle, it has several banners and flags flying over the entrance, as well as stone carvings of great beasts and warriors, you think you can even recognize some of the legends yourself. On the large oak door at the entrance is beautifully crafted bronze image of enormous bull, reared up onto its hind legs, horns pointed forward and large, almost tusk-like teeth lining powerful jaws. \"Beautiful, isn't it? My father had it commissioned by an artist from the Isle of Man many years ago\", he states with pride. \"It took the artist six months to complete, he said it was the most amazing piece he had ever produced, Anyway…\" he opens the door and beckons you in. \"What I want to discuss with you …well, I warn you it's something your father disapproves of, apparently he has his own plans for you… My daughter is of marrying age and I was wondering whether you would have any interest in an alliance of this nature?\"\n*fake_choice\n    #Why does my father disapprove\n    #I'd be happy to meet her and get to know her first\n    #Sure! (I can hardly believe I am being given such an honour)\n    #Well, you see, I'm not really into girls...", "startup": "*title The Brothers' War\n*author Fionn Graham\n\n*scene_list\n    startup\n    chapter1\n    chapter2\n    chapter3\n    $ chapter4\n    $ chapter4part2\n    $ chapter51\n    $ chapter52\n    $ chapter6\n    $ extrasig\n    $ theraid\n    $ theraid2\n    $ finito\n    $ romance    \n    ending\n\n*create vh 0\n*create boars 223\n*create Medb 50\n*create Ultan 50\n*create nego \"nego\"\n*create their \"their\"\n*create viking 83\n*create rot 0\n*create they \"they\"\n*create peasant 0\n*create trick 0\n*create sig 0\n*create Aonghus 50\n*create Ailbhe 50\n*create gender 0\n*create elk \"elk\"\n*create Daragh \"Daragh\"\n*create Knowledge 10\n*create Persuasion 10\n*create Combat 10\n*create Magic 0\n*create he \"he\"\n*create him \"him\"\n*create his \"his\"\n*create son \"son\"\n*create man \"man\"\n*create boy \"boy\"\n*create King \"King\"\n*create nephew \"nephew\"\n*create Name \"anonymous\"\n*create NakedBandit 30\n*create HorseBandit 15\n*create lad \"lad\"\n*create uncle 10\n*create kern 36\n*create gallowglass 10\n*create woman \"woman\"\n*create girl \"girl\"\n*create she \"she\"\n*create her \"her\"\n*create daughter \"daughter\"\n*create ching 0\n*create chang 0\n*create thing 0\n*create sc 0\n*create weapon \"sword\"\n*create health 100\n*create third \"third\"\n*create chapter 5\n*create bob 0\n*create healer 0\n*create romance 0\n*create Saoirse \"Saoirse\"\n*create hard 0\n\n*achievement level visible 30 Champion\n    Become the ruler of your clan in 'Medb of Connaucht' mode.\n*achievement vhlevel visible 60 Godlike\n    Become the ruler of you clan in 'Cú Chulainn' mode.\n\n*achievement romance visible 5 A Fleeting Romance with the Healer\n    That healer is quite a catch! You can find her, or him, in Kanturk\n*achievement combat visible 20 A master of blades\n    Become a warrior with skills worthy of the gods\n*achievement lover visible 10 Curiosity Killed the Suitor\n    With betrothals come abundant rivals\n    Some marriages involve more poison than others…\n*achievement father hidden 20 Find your True Father\n    hidden\n    Aonghus is your true father, or so he says…\n*achievement daddy visible 10 Like Father like Son\n    Stand by your Father through it all\n*achievement interpretor visible 25 The Voice of Reason\n    Put your eloquent lips to good use\n    Secure a better deal from the vikings\n*achievement farmer visible 5 True to Your Heart\n    In these dark times, we have nothing if not our morals\n*achievement elk hidden 30 Ruler of the Elks\n    hidden\n    You have taken your place as ruler of the Elk clan, may she prosper and her people be safe under your command\n*achievement boar hidden 30 Ruler of the Boars\n    hidden\n    You have taken your place as ruler of the Boar clan, may she prosper and her people be safe under your command\n\n*if choice_is_omnibus_app\n    *comment skip description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n    In pre-christian Ireland, where family bonds and the honour of one's tribe are worth dying for, and where the old gods are forever watching, you must be as guarded as the hound, as cunning as the fox, or as brutal as the boar to survive. You have fallen out of your father's favor and are being sent along with a dispatch of hardened warriors to help your uncle quell the ever-frequent viking raids to the east. You must impress your father to reinstate your right to the throne of the Boar Clan... or you can seize it for yourself. Your father's numerous enemies are conspiring against him, the peasants are rising in revolt, his own guard outposts are deserting him and even his most trusted may be tempted to rip his throne from under him. As his influence trickles through his fingers, which side shall you choose?\n\n    The Brothers' War, a Clans of Éire Saga, is a 60,000 word historical-fantasy interactive fiction, where your choices and decisions control the world around you, including characters you meet, your possible romances as well as the enemies you make. It is text-based without sound or special effects, supported by occasional celtic la-Tène style art and fuelled by the vast, unstoppable power of your imagination. The people of Éire whisper of a time when your father's time on land has ended, and when, or whether, you will take his place. Through politics, persuasion, battles and knowledge, you must secure your future throne… or die trying. Coming soon and currently in production is the sequel to this book.\n\n    • Play as male, female or transgender, gay, bisexual, straight, aromantic or asexual.[/n]\n    • Explore a unique land rich in culture, religion and tradition.[/n]\n    • Take part in military plannings, court cases and more.[/n]\n    • Fight and negotiate with Bandit hoards, Peasant rebels, Viking settlers and more.[/n]\n    • Discover the lighter -and darker- sides of your clan's traditions and policies.[/n]\n    • Select a variety of distinctive physical traits, as well as starting skills and abilities.[/n]\n    • Conspire for or against the chieftain of the Boar Clan, your father.[/n]\n    • Learn and improve your skills through teachers, instructors and elders.[/n]\n    • Hire mercenaries and buy better combat equipment to gain the upper hand.[/n]\n\n\n    *if choice_prerelease and not(choice_is_ios_app)\n        [i]You can play the first three chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n        *choice\n            #Sign up to be notified when the game is available.\n                *subscribe {\"now\": true}\n                *restart\n            #Play the first three chapters now for free.\n                *goto purchased\n\n    [i]You can play the first three chapters of the game for free. Purchase the rest of the game below.[/i]\n    *if choice_is_advertising_supported\n        [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n    *purchase_discount adfree 2021-01-07 $3.99 $2.99 purchased\n    *if choice_is_advertising_supported\n      *page_break_advertisement\n    *if not(choice_is_advertising_supported)\n      *page_break Play Now for Free\n\n\n*label purchased\n", "theraid": "You wake up with a start to the blaring of horns and shouting of panicked men. Breccan rushes into your tent, \"My liege, the armies of Ailbhe are upon us! He pulls you, still in your night clothing, out of the tent. \"Servants!\" he cries out, \"Bring your ${king} ${his} armour and ${weapon}!\" The servants rush about hastily, tying a grey tunic over  your chest with twine and loose breeches around your waste. Over the tunic they wrap a vest of finely made chainmail, which hangs down halfway to your knees like a short cloak. Next comes a bull hide corset, dyed velvet and made to be as tough as iron and chequered with bronze plates. Bronze plates wrap around your knees, with your shins covered by tanned wolf hide. Aonghus' great cloak is wrapped snugly though heavily over your shoulders and hangs so that it covers most of your left side. A heavy golden brooch embroidered with gemstones holds the cloak in place, and finally, Ultan arrives to you, kneels down with his arms reaching forward and your ${weapon} lying across his palms, still in it's delicately embroidered scabbard. \n\nYou take it from him, feeling a shiver run through you as the light hits it beautifully, almost blinding you with it's shine as you pull it from it's scabbard. \"May the gods look fondly on you, your men need a strong leader now more dearly than ever\", Breccan says. \"Now go, ${name}, son of Aonghus, your advisors await you at the inner gates…\" As you hurriedly make your way to the awaiting assembly of your advisors, the clanging of bells and thunking of scabbards against breeches as warriors rush hastily to their stations fills the air. Horns blow eerily in the forest across the swamp from you, and the distant sloshing of hooves through swamps and shouts of men only builds the mounting tension in the camp. The flag of the Irish elk seems to flutter sheepishly as the rain heavies it's drizzle down.\n*Page_Break\nSeveral men get to work supporting the wooden gates to the camp, sticking timber logs deep into the mud, with their other end pressed against the gates. Others pull wagons and carts to create a small, inner ring fortification within the inner walls as a last resort, should the iminent battle turn so harshly against you. With a relatively small allied force to speak of, the outer walls would be too much to defend properly, so the entire force has retreated to the inner walls.\n\nUltan looks quite frustrated at this. \"A tragic waste, it would be, to let these attackers take the outer walls without any resistence, we may as well hand it to them on a platter of silver. It's true, our force would have difficulty defending it all, but we shouldn't have to. The Boars will most likely attack the eastward gate or the lower wall segment around it, if we focus our troops there and Ailbhe acts as predicted, we shouldn't have much trouble holding them off…\" \"Nonsense!\" Medb blurts out, \"To assume the mistakes of your enemy is to toss a coin of defeat or victory! What if they don't attack those points? We shall be overrrun! My ${king}, the gods seldom look kindly on those who play their life like a game of cards, with unreasonable and unnecessary risk.\"\n\n\"So what is it you propose then, how would you play a game of little risk?\", Ultan asks accusingly, but, Medb just smiles patronisingly back. \"My proposal is simple, cut the fat from the meat that fills our stores, blanket the land within the outer walls in all the hay and cloth at our disposal. Then we simply lather it in the fat from the meat, waiting until the enemy is upon us, and then set them alight! Even in rain fat never fails to catch alight\" she states gleefully. \"That would take time\", Ultan says, shaking his head, \"Time we clearly do not have\". \n\n\"Ailbhe may be corrupted behind closed doors\", Medb says, \"but in the face of two armies, he must obey the Brehon Laws like ourselves. We must negotiate before the battle, discuss terms of a truce and so forth. That would buy us ample time.\" \"And what of the risk in that offer, Medb? What if the fire goes out of control? What if the woolen tents surrounded by wooden walls burns to ash with the entire army trapped within it?\" The rest of your small troop of advisors turn to you, you have proven your skills in battle before, so they seem keenly trusting of your judgement. You can go with Ultans plan, or Medb's, though it might be a good idea to find a solution with Ailbhe beforehand either way, that is if you think Ailbhe won't try to pull something. What do you think? \n\n*choice\n    #Ultan is right, but we shall negotiate anyway\n        \"As you wish\", Utan says solemnly, \"It will be expected that you lead the negotiations, though. Who shall join you?\"\n        *set Medb -8\n        *set Ultan +8\n        *choice\n            #Medb\n                \"Good decision, my liege\", she says as she pulls herself surprisingly easily atop an old mare, with seemingly frail, wrinkled arms.\n                *set Medb +7\n                *set Ultan -7\n                *set nego \"Medb\"\n                *set their \"her\"\n                *set they \"she\"\n                *goto 3000\n            #Ultan\n                \"Wisely chosen, ${name}\", he says, pulling himself atop a broad, muscular stallion.\n                *set Medb -7\n                *set Ultan +7\n                *set nego \"Ultan\"\n                *set their \"his\"\n                *set trick +1\n                *set they \"he\"\n                *goto 3000\n    #We shall take Medb's course of action\n         \"As you wish\", Utan says solemnly, \"It will be expected that you lead the negotiations, though. Who shall join you?\"\n        *set Medb +8\n        *set Ultan -8\n        *choice\n            #Medb\n                \"Good decision, my liege\", she says as she pulls herself surprisingly easily atop an old mare, with seemingly frail, wrinkled arms.\n                *set Medb +7\n                *set Ultan -7\n                *set nego \"Medb\"\n                *set their \"her\"\n                *set they \"she\"\n                *goto 3000\n            #Ultan\n                \"Wisely chosen, ${name}\", he says, pulling himself atop a broad, muscular stallion.\n                *set Medb -7\n                *set Ultan +7\n                *set they \"he\"\n                *set nego \"Ultan\"\n                *set their \"his\"\n                *set trick +1\n                *goto 3000\n    #We will go with Ultan's idea, without negotiating\n        Medb shakes her head worriedly, \"This is a decision that puts too much in the hands of the gods. May they look kindly on you, ${name}, we shall be leaving this life to the next all too soon otherwise.\"\n        *goto 3003\n        \n        \n*label 3000\nYou mount a similar steed, and together you ride out to the swamp that forms a barrier between the camp and the forest. ${nego} holds high a large white banner, leaning it's staff against the muscular back of the horse. Fastened securely to ${their} back sits a keen quick spear, with a narrow shaft and a round based, broad-bladed grey blade at it's head. From ${their} shoulders hangs a blotted, yellow robe held to ${their} chest. ${nego} looks to the forest suspiciously, squinting to try and make out the Boar army as it's sloshing footsteps grow closer. As your horse, who seems to feel the tension in the air, meekly trods to the side of ${nego}'s ride.\n\nThe rain is starting to halt, leaving a swamp with broken, flooded banks and many of the tents of the camp collapsed under the weight of the water. Even many metres from the swamp where you sit, your horse is up to her ankles in mud. She stomps and shakes her head irritatedly as the mud creeps it's way up her shins. Distracted momentarily, you nearly fail to notice Ailbhe in his golden ornated helm. He rides bare-back atop a wild-looking stallion with a ragged mane and overgrown hair forming natural boots at it's legs.\n\nAt either side of Ailbhe ride two warriors, one wrapped in wolf skin, the other with the fur of the Irish Elk wrapped suggestively around his horse's hide. From one of the guard's shoulders hangs a boulder shaped leather sack. It gives you an impression of where they stand in terms of your new throne. They take the long route around, making sure to keep a safe distance from the now deep, murky swamp. As Ailbhe is halfway towards you, the rest of his army emerge from the forest. The vast majority of the opposing army, some 220 in all, hold large, oval shields. The army quickly forms up so that the javelinmen rush to the front, with the shield bearers forming up an interlocking wall behind them. \n\nYou are well out of range of them, and with a vast swamp taking up much of the center of the would-be battlefield, this is clearly a show of force and organisation, as oppose to actual readying. Their shield wall looks sturdy and well-rehearsed. Let's hope your druid's gunk does it's job. According to Breccan, their shields should break like rotted, lice infested softwood against any real impact. Otherwise, truth be told, this battle holds little hopes of success. The men clatter their light axes and shortswords against their shields in a frenzy of bloodlust and fervour. They chant ferociously in an unsettling, almost demented tone.\n\nAilbhe pulls gently on the mane of his horse as he reaches you and ${nego}, \"The peasants of the land call you the wolf ${king}, upholder and keeper of the Brehon, we'll see how long that lasts. They will turn on you like they did against me as soon as you need tax them to pay your armies wages. They will choose to elect a new ${king}, and you will be faced with an ultimatum; kill or be overthrown. \" He pulls his axe from the harness that hangs from his horse's back. Your hands subconciously grab for your ${weapon}, and he smirks as he sees this. He hushes you down, \"Little wolf cub, you are as meek as you are traitorous, I didn't think it possible.\" He throw his axe expertly so that the blade hits the muddy ground, sinking deep and standing on end. \"I may not be known for my abidance with the Brehon laws, but seeing as they are so important to you, like the loving father I am, I shall abide by them.\" So it's true, he has no idea of Aonghus' revelation.\n\n${nego} throws ${their} spear to the mud, followed by the thunking of the swords of the warriors at Ailbhe's side in the waterlogged soil. Do you follow suit? \n*set peasant +38\n*choice\n    #Yes\n        ${nego} gives an affirmative nod, Ailbhe glances to the men at his side, then speaks, \"Now, then, little wolf cub, let us begin.\"\n        *goto 3001\n    #No, I will not lay down my ${weapon}\n        ${nego} looks at you, waiting for you to follow suit, but seeing your unmoving disposition, stares at you agast, \"My ${king}, I would very strongly advise that you retain your honour. The gods themseves are watching! Ailbhe has respected the laws of the land, what will our warriors think if their own leader does not?\" Sigfrid and the men at his side glare at you, \"Listen well to your advisor, ${name}, or this negotiation ends here!\", he demands.\n        *choice\n            #Fine, I will lay down my arms\n                ${nego} lets out a short sigh of relief, seeing your compliance. \"Good, little wolf cub, now let us begin…\"\n                *goto 3001\n                \n            #Very well, our talks have finished\n                \"What a waste of my good time\", Ailbhe spits. \"We'll see you on the battlefield, then, little wolf cub.\" One of his warriors dismounts, and, squelching in the mud, he hands up their weapons. \"I had hoped you could redeem yourself from your earlier treachery, but now I see otherwise.\" \n                \n                He glances to the warrior at his right, who hands him the leather sack. He holds it in both hands and as if it were a generous gift, hands it to ${nego}. Your eyes open in alarm hit you when you see the trickles of crimson seeping out of the bag. ${nego}, not seeming to notice, holds the bag upside down for the contents to pour into ${their} hand. ${They} let out a gasp as the distinct head of Fionn, who was sent to request your ransom, rolls into his arms. ${they} drops it in ${their} moment of panic, and the head falls with an undignified squelch into the mud. The crimson blood quickly spreads outward from the jagged slice at Fionn's neck, forming a muddy-red frame for his pale, lifeless head. \n                \n                Before either of you can react, they turn back and head back to their awaiting and slowly growing army, with stragglers from their march catching up. You and ${nego} turn, somewhat in a daze, and make haste to the camp, where your ${gallowglass} heavy gallowglass and ${kern} light kerns are taking their positions. The few peasant refugees that aren't too malnourished or weakened to fight have taken up their scythes and pitchforks, mixed among them are the recruits from Kanturk and your father's village. There are around ${peasant} at the inner gates of the camp.\n                *goto 3003\n*label 3001\n${nego} speaks first, \"How can we avoid the bloodletting of our armies? What can we do to quell your bloodlust?\" Ailbhe grimaces, \"A ${son} who would turn from me at the whim of an uncle ${he} has scarcely met deserves a severe chasticing.\" His beard fails to hide the view of his yellow teeth forming a threatening snarl. \"Swear allegiance to me as your king, leave the control of your armies to my general Alastar.\"\n\nOne of the men at his side off a silver ornated helm, and reveal himself to be the general from the town hall trial, he gives you a glare through squinted eyes, before re-donning his helm. Ailbhe continues, \"And you shall pay your duties to me thrice a month. To the tone of, shall we say, ten heads of cattle whom I may choose each time.\" ${nego} urges ${their} horse to your side and whispers in your ear, \"What Ailbhe demands would equate to an equivalent loss of some 2,500 silver pieces a month. I strongly urge you to push for a better offer, my ${king}. However, giving up your armies is not a decision to take lightly, you will forever be at his mercy if you do.\"\n*goto 3002\n*label 3002\n*choice\n    #Perhaps, if your price is brought lower...\n        Ailbhe shakes his head disappointedly, \"You grow too bold for your own good, ${name}, I had hoped you could redeem yourself from your earlier treachery, but now I see otherwise.\"  He glances to the warrior at his right, who hands him the leather sack. He holds it in both hands and as if it were a generous gift, hands it to ${nego}. Your eyes widen in alarm when you notice the trickles of crimson seeping out of the bag. ${nego}, not seeming to notice, holds the bag upside down for the contents to pour into ${their} hand. ${They} let out a gasp as the distinct head of Fionn, who was sent to request your ransom, rolls into his arms. ${they} drops it in ${their} moment of panic, and the head falls with an undignified squelch into the mud. The crimson blood quickly spreads outward from the jagged slice at Fionn's neck, forming a muddy-red frame for his pale, lifeless head. Before either of you can react, they turn back and head back to their awaiting and slowly growing army, with stragglers from their march catching up. \n        \n        You and ${nego} turn, somewhat in a daze, and head back to their awaiting and slowly growing army, with stragglers from their march catching up.You and ${nego} turn and make haste to the camp, where your ${gallowglass} heavy gallowglass and ${kern} light kerns are taking their positions. The few peasant refugees that aren't too malnourished or weakened to fight have taken up their scythes and pitchforks, mixed among them are the recruits from Kanturk and your father's village. There are around ${peasant} lowly trained men at the inner gates of the camp.\n        *goto 3003 \n       \n       \n    #No, our negotiation has ended\n        \"Are you sure?\", ${nego} ask.\n        *choice\n            #Yes\n                \"What a waste of my good time\", Ailbhe spits. \"We'll see you on the battlefield, then, little wolf cub.\" One of his warriors dismounts, and, squelching in the mud, he hands up their weapons. \"I had hoped you could redeem yourself from your earlier treachery, but now I see otherwise.\"  He glances to the warrior at his right, who hands him the leather sack. He holds it in both hands and as if it were a generous gift, hands it to ${nego}. Your eyes widen in alarm when you notice the trickles of crimson seeping out of the bag. ${nego}, not seeming to notice, holds the bag upside down for the contents to pour into ${their} hand. ${They} let out a gasp as the distinct head of Fionn, who was sent to request your ransom, rolls into his arms. ${they} drops it in ${their} moment of panic, and the head falls with an undignified squelch into the mud.\n                \n                The crimson blood quickly spreads outward from the jagged slice at Fionn's neck, forming a muddy-red frame for his pale, lifeless head. Before either of you can react, they turn back and head back to their awaiting and slowly growing army, with stragglers from their march catching up. You and ${nego} turn, somewhat in a daze, and head back to their awaiting and slowly growing army, with stragglers from their march catching up.You and ${nego} turn and make haste to the camp, where your ${gallowglass} heavy gallowglass and ${kern} light kerns are taking their positions. The few peasant refugees that aren't too malnourished or weakened to fight have taken up their scythes and pitchforks, mixed among them are the recruits from Kanturk and your father's village. There are around ${peasant} lowly trained men at the inner gates of the camp.\n                *goto 3003\n            #No\n                *goto 3002\n\n*label 3003\nAs you arrive at the inner gates, you can feel expectation on your warrior's faces looking down on you. When you give them a shake of the head, they know there will be no truce, no white flag and no pleading. The prospects of peace have flown away with the swallow, the mood in the camp is somber, with the fear from the peasants and new recruits palpable in the air, 38 new peasants been enlisted from the camp workers and servants. Nevertheless, your men stand strong.\n*if trick =0\n    *goto 3004\n\n*else\n    *goto 3005\n\n*label 3004\nCathal, who seems to have voluntarily taken charge of the weaker refugees, says, \"The work has been carried out as ordered, my ${king}, the fat has been stripped from the meat and strewn across the inner walls along with the tent cloths. It'll be a cold few days if we manage to survive this, our people are sick enough as it is, this rain is just what they need.\", he says somberly. His face is pale, though his expression and demeanor very much that of a man trying furiously to stay strong.\n\nHe looks to you pleadingly, \"Aonghus was a good man, a man I would have died for. If we survive this, be a just ${king}, don't make this bitter bloodshed be for nothing…\" His face then shifts back to looking cold, hard and solemn. When the enemy arrive, we'll await your orders to light it. The rain has left the flammables fierce soggy, let us hope the fat does it's job.\" He marches briskly to the peasants at the inner gate, and takes from one of them a great banner, of an elk like no other. \n\nThe day's dampness has done little to take away from the grandeur of the embroidery, in truth, the slick wetness only emphasises the strength of the colours disblayed on the banner. The Irish elk is embroidered in golden thread, with eyes dyed expensively in a deep blue hugh. The background is an ominous black. The banner hangs vertically from a cross at the top of a slender 12 foot staff. Cathal grips the staff firmly in his hands, keeping his feet partly imbedded in the soggy soil and retaining a solid, wide legged stance for fear of the tall banner overbalancing him.\n\nWithin the makeshift inner-wagon fort stands Breccan, who peers around in calm complacancy at the troops manning the defences. His wiry beard flaps delicately as his lips move inaudibly, perhaps speaking words of prayer. With him in the fort of overturned wagons and carts are the mages, three of whom have their thumbs pressed to their lips and their eyes rigidly shut, the other mage, whom you had spoken earlier to, just stares to the sky in silent glee. Around them are a few choice gallowglass, acting as a small boyguard unit. The peasants are still finishing up the laying out of all the flammable materials they can find, when one of the men at your wooden walls calls out in alarm, signalling to you and your advisors that have gathered around you, that the enemy have begun their advance. Ultan, Medb and Oscar all seem, despite their sureness and boisterousness prior to now, are all quiet and thoughtful.\n\nAlthough it can't be denied, they have expressions more of nervous excitement than fear. Brenda, pulling the bridle of a chestnut mare, rides over to you on a similar mount. \"My ${king}, ${name}, surely you'd rather sit proudly atop a fine steed such as her, and watch your warriors as they fight for you? Rather than cower amongst these witless wisemen?\" She gestures with a smirk to Medb, Oscar and Ultan who just glare back at her. Do you take her offer?\n*choice\n    #Yes\n        *goto 3006\n    #No\n        *goto 3007\n        \n\n\n*label 3005\nThe men have taken their positions on the outer wall, holding only the weaker areas and the main wooden gate. Cathal, who seems to have voluntarily taken charge of the weaker refugees, says \"My lord, we have the weaker areas of the outer wall defended, let us hope Ailbhe does not see our weakness.\" His face is pale, though his expression and demeanor very much that of a man trying furiously to stay strong.\n\nHe looks to you pleadingly, \"Aonghus was a good man, a man I would have died for. If we survive this, be a just ${king}, don't make this bitter bloodshed be for nothing…\" His face then shifts back to looking cold, hard and solemn. He walks back to the peasants at the inner gate. When the enemy arrive, we'll await your orders to light it. The rain has left the flammables fierce soggy, let us hope the fat does it's job.\" \n\nHe marches briskly to the peasants at the inner gate, and takes from one of them a great banner, of an elk like no other. The day's dampness has done little to take away from the grandeur of the embroidery, in truth, the slick wetness only emphasises the strength of the colours disblayed on the banner. The Irish elk is embroidered in golden thread, with eyes dyed expensively in a deep blue hugh. The background is an ominous black. The banner hangs vertically from a cross at the top of a slender 12 foot staff. Cathal grips the staff firmly in his hands, keeping his feet partly imbedded in the soggy soil and retaining a solid, wide legged stance for fear of the tall banner overbalancing him.\n\nWithin the makeshift inner-wagon fort stands Breccan, who peers around in calm complacancy at the troops manning the defences. His wiry beard flaps delicately as his lips move inaudibly, perhaps speaking words of prayer. With him in the fort of overturned wagons and carts are the mages, three of whom have their thumbs pressed to their lips and their eyes rigidly shut, the other mage, whom you had spoken earlier to, just stares to the sky in silent glee. Around them are a few choice gallowglass, acting as a small boyguard unit. The peasants are still finishing up the laying out of all the flammable materials they can find, when one of the men at your wooden walls calls out in alarm, signalling to you and your advisors that have gathered around you, that the enemy have begun their advance. \n\nUltan and Oscar seem, despite their sureness and boisterousness prior to now, are all quiet and thoughtful. Although it can't be denied, they have expressions more of nervous excitement than fear. Medb, pulling the bridle of a chestnut mare, rides over to you on a similar mount. \"My ${king}, ${name}, surely you'd rather sit proudly atop a fine steed such as her, and watch your warriors as they fight for you? Rather than cower amongst these witless wisemen?\" She gestures with a smirk to Oscar and Ultan who just glare back at her. Do you take her offer?\n*choice\n    #Yes\n        *goto 3006\n    #No\n        *goto 3007\n        \n\n\n*label 3006\nThe advisors look irritatedly at you as you take her offer, she seems to take a sort of enjoyment from Ultan's furious eyer boaring into the back of her head. You mount a similar steed, and as you do, one of your guards on the wall shouts out, \"the armies of Ailbhe march forth. The assault is beginning!\" Together, you and Brenda Medb your way to the open gates, with a clear view of the vast, swampy battlefield as well as the outer bailey. \n\nTheir ranks are steadfast with shields and bristle ferociously with spears, descending on your camp like death's own servants.\nYou have ${gallowglass} gallowglass, ${kern} kerns and ${peasant} peasants against their ${boars} boar warriors.\n*goto 3010\n*label 3010\n*if trick =0\n    With little, if any, resistance to meet them at the wall, they rapidly scale the walls with their ladders, and start to regroup within those walls, forming up as a solid unit once more. The outer gates are broken down to make way for Ailbhe and General Alastar, who holds the banner of the ferocious boar high for all to see. They are both on horseback and are shouting inaudible commands to their men.\n    \n    Not noticing the trap that awaits them, they march steadily forward… The front ranks of the enemy are now in the area that has been covered in flammables. The rain has cleared off, and the time may be right. Ultan has just nocked a flaming arrow onto his bowstring, pulling the arrow back, and awaiting your command.\n    *choice\n        #Wait...\n            He holds it still, and Ailbhe's men continue to march forward. Now the majority of his forces lie exposed in the trap.\n            *choice\n                #Wait...\n                    He does as you say. The enemy army is not amost completely within the trap, though some appear to be out the other side of it. \"We  must strike now, ${name}, or they will be out the other side!\"\n                    *choice\n                        #Just a little more...\n                            Medb grabs the bow and flaming arrow from Ultan, shoving him to the side. \"We will not have this battle lost because of your poor judgement, ${name}.\" She lets loose the arrow, it whistles through the sky furiously. The Boar clan warriors raise their oval wicker shields above their heads, expecting a barrage of arrows. Only Ailbhe understands their costly mistake. \"Nooooo!\", he cries, \"Fall baaaack!\" He waves his sword above his head, backoning his men's retreat.\n           \n                            The command only seems to register to his warriors when the arrow lands in on the groud, and as if Dagda himself had released death into the land, the ground goes up in a mighty flame. Men wail in agony as they are set alight, their faces redden and char in seconds as they perform a demented dance in the all-consuming heat. Many of those in the danger area collapse and burn in the fire, while some manage to escape, but leave with burn marks and blackened, unrecogniseable faces. Those men collapse soon after, rolling around as they moan in pain.\n           \n                            The enemy has been completely caught off guard, and the men untouched by the flames stand stunned. The men of your camp cheer and taunt the army across the bailey.      \n                            *set boars -57\n                            *goto 3008\n                        #Now, Shoot Now!\n                            He lets loose the arrow, it whistles through the sky furiously. The Boar clan warriors raise their oval wicker shields above their heads, expecting a barrage of arrows. Only Ailbhe understands their costly mistake. \"Nooooo!\", he cries, \"Fall baaaack!\" He waves his sword above his head, backoning his men's retreat.\n           \n                            The command only seems to register to his warriors when the arroe lands in on the groud, and as if Dagda himself had released death into the land, the ground goes up in a mighty fire. Men wail in agony as they are set alight, their
