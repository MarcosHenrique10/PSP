has passed since that day, and you haven't been able to set foot outside of the wall. But today is a slightly different day. You wake up with a weird feeling.\n*page_break\n*if (loverstatus)\n You sit up in bed and glance back at ${lover}. $!{heshe2} is sleeping peacefully, hugging the dirty grey cover tightly. You give $!{himher2} a kiss on the cheek. $!{heshe2} smiles in ${hisher2} sleep, which draws a smile to your face as well. You stand up,and stretch. With tired eyes, you walk out of the room and head towards the dining room.\n *goto dinr\n\n*else\n You open your eyes and stretch your limbs on the bed occupied by you and you alone. The grey sheet sticks to your back from the dirt. You take it off and get out of bed. Rubbing your tired eyes, you head out of the room, into the dining room.\n *goto dinr\n\n\n*label dinr\n\n\n\nYou open its creaking, sticky door and step into the dark dining room filled with the stench of various low-quality food. Could it be this early? Your wound burns as it twists slowly. Your vision fails every now and then. You have to blink hard to remain awake. You sit at the dining table closest to you and rest your tired, heavy head on your arm.\n*page_break\n*set Age +1\n*achieve birthday\n\n\n\"What a weird day, isn't it?\" ${capturer1} walks inside, letting the door close behind him. \"Happy Birthday, kiddo.\" You rub your eyes and look up at him leaning against the door. \"Special day, isn't it…amazing how time flies by. The great many things that happened in these years…I remember just a while ago…you looking at me with the same scared eyes. Well, those eyes have changed. Now they're filled with determination and confidence. When you look at someone else.\" He grins and sits down in front of you. \n\n\"But when you look at me, your eyes are just the same. They're the eyes of a scared little boy. You've encountered so many people. And you'll probably encounter many more. But where are they now? Where is everyone you have ever called your ally? They're gone, or will be gone. All of them. Except for one.\" He winks. \n\n\"Well…nevertheless, kiddo, I'll try to surprise you. Maybe with a cake? Oh no, no no…you deserve a real surprise. I'll make sure you get one accordingly.\" He stands up and walks past you, out of the dining room. After sitting for a couple of minutes with your eyes closed, you get up and head out of the living chambers.\n\n*page_break\nThe decontamination chamber's doors close behind you. The town is darker than it usually is around this time. A cold feeling runs through the back of your head for a moment. You put your hand on it, smearing water all over. You look up at the light rain. The last time you saw rain was before everything started. The sky is dark purple, and heavy clouds are forming in the distance. Purple lightning is visible from a distance. You walk down the stairs in the drizzle, getting ready to patrol the suburb once again. The town looks weirdly empty. Out of the corner of your eye, you spot the General.\n\n\"${firstname}…\" ${general} steps closer. A couple of soldiers in their leather uniforms stand behind him, holding submachine guns. \"You have to come with me…\" he says with a slight sadness in his voice. \"I'll also need you to turn around.\" He pulls a thick rope out. \"It would be best for everyone if you cooperated.\"\n\nHaving no other option, you turn around, and he ties your arms together behind your back tightly. He runs his hands down your body, taking away your weapons. With your own knife, he cuts the backpack off your back.\n*set knife false\n*set pistol false\n*set maskfilters 0\n*set bullet false\n*set Idcard false\n*set Diary false\n\nHe steps back and nods at the guards. They put their SMG's on their backs and grip you under your arms. They drag you through the back streets, then underneath the citadel. They walk through the cold, dark hallways. Rotting corpses and a couple of skeletons lie in the cages hanging from the ceiling. You reach a prison cell with bent bars at the end of a stone corridor. They unlock the door and push you inside. \"You'll be here until we prepare the trial,\" ${General} says before he turns around to walk out.\n\n*page_break\nFor the first two days, the slight sound of rain comes through. Then, you slightly begin to lose track of time. Creatures and long-dead decomposing people appear in front of your cage. They just keep watching you. Sometimes for hours. The darkness tricks your mind and morphs your surroundings. Every time you open your eyes, you're sitting in a different place. The classroom, ${base}, your own house. You start to question your sanity.\n\nThe bed you're sitting on feels soggy underneath you. The concrete chunk in front of you is what's left of the room. Your face is buried in your hands. The cold wind shakes your whole body. In the darkness, the everlasting screams and growls surround you. Whispers come closer in the darkness. You keep your eyes shut, waiting for them to disappear. Desperate for a bite of food and a couple hours of sleep, you recall how you ended up like this in the vain hope of reclaiming what's left of your sanity.\n\n\"Having fun, kiddo?\" ${capturer1} stands in front of you, his body blown away by the wind. \"Tell old ${capturer1}, how did you end up here? How did the people you called friends betray you, once again?\" ${capturer1} chuckles. His blown-apart head wiggles. Blood flows through his face down to his ripped chin.\n\n\"You seem to be losing your sanity, kiddo. Hold onto it, that might be the only thing you'll have in the end. I hear footsteps. Are they coming for you already?\" You bury your face in your spiky palms as his voice fades.\n\n*page_break\n\"It's time.\" ${General} puts his hand on your shoulder. You look up at the guards already dragging you up to your feet by your arms. They grunt and hold their SMG's. They proceed to drag you out of your cell, onto the street. The brightness hurts your eyes for a minute, but you can hear and feel that it's still raining. \n\nYou walk with them through the town's streets, towards the city center. ${General} walks behind you, arms crossed behind his back. Citizens come out of the buildings and stop behind the wall formed from guards. You walk through the path between them. People talk to each other loudly and point at you. When you reach the city center, the guards stop you in front of the statue and tie your hands against the pole freshly put down in front of it.\n\n${general} stops in front of you for a moment, then walks in front of the guards holding back the biggest crowd of people, leading up to the gates. Soon, ${assassin} and the ${leader} are standing beside him. The ${leader} puts his arm up in the air, and the crowd goes silent. Hundreds of eyes keep staring at you in complete silence.\n*page_break\n\nThe ${leader} looks at ${general} and nods once. Then, he crosses his arms behind his back and stands proud.\n\n${General} steps forward and unfolds a piece of paper from his pocket. \"Gather around. Gather around, and see the fall of a traitor. An enemy of the town stands in front of you.\" He lowers his voice, and the crowd shouts and boos at you. When they become silent, ${general} continues.\n\n\"This is what happens with anyone standing between us. Between the development and the future of our town. Because every enemy will be found and will be eliminated. Both on the inside, and on the outside. ${name}. Due to our recent investigations, you have been found guilty of…\" ${general} turns the paper around and clears his throat.\n\n\"Battery, mass murder, conspiracy, forbidden experiments, and the desecration of corpses. For those, you stand before us. We are the judge, jury, and executioner. ${name}, do you confess to these crimes? Do you plead guilty?\" ${general} folds the paper and puts it back in his pocket. He looks at you along with the crowd, in complete silence. You look around the crowd of citizens. Citizens judging you out of nothing. The crowd of gas masks keep watching you, awaiting your answer.\n*fake_choice\n\n #\"No.\"\n  \"No. I don't,\" you reply as the tightly knotted rope keeps your wrist in a slightly twisted, uncomfortable position. Right now, that's the last thing you care about.\n\n  \"Thought so…\" ${General} looks down. He rubs the back of his head and glances back at the ${leader}.\n\n #\"Yes.\"\n  \"Yes. I do,\" you reply, watching the crowd filling with anger as the tightly knotted rope keeps your wrist in an uncomfortable, twisted position.\n\n  \"You…do?\" ${general} mumbles.\n\n\n\"It's time to carry out the orders. I, the ${leader} of ${base2}, find you guilty of your charges. Therefore, for your crimes against our developing community, I sentence you to death. Let this be a lesson to anyone plotting against us,\" the ${leader} says, and the crowd cheers loudly. \"${general}, carry out the order.\"\n\nThe General steps forward and pulls your own pistol out. In his other hand, he holds your backpack. He grips your pistol, staring at it. \n\n\"General…carry out the orders. You're already standing on thin ice,\" the ${leader} says, raising his voice. ${General} nods, and walks closer to you. When he reaches you, he raises the pistol. You stare down the barrel of the pistol once again.\n\n\"History does repeat itself.\" The General sighs. \"I'm sorry. I have no other choice.\" The General tightens his finger on the trigger. The rain intensifies. You look up and let the rain wash away the dirt from your body. Behind the dark clouds, purple lightning strikes somewhere near ${base2}.\n\nIt explodes loudly, and purple light shines through the sky from the suburbs. You look back at ${general} again and hold your breath. Behind the crowd, an explosion can be heard. Growling, screaming, and gunshots come from the main gates. Guards fire and shout at the mutants storming through the gates. Body parts fly past the crowd, and blood splatters around. The crowd begins to panic, and all hell breaks loose.\n*page_break\n*set knife true\n*set pistol true\n*set bullet true\n\nThe crowd tries to run towards safety, stomping over others who have fallen down. Guards surround the ${leader} and escort him towards the citadel, shooting anyone who gets in their way. ${Assassin} turns around and disappears into the distance. The General looks from you to the gate, still aiming the pistol at your head. The gate's wooden door shatters in half and flies over you, slamming into a building. The building collapses. ${General} jumps back and looks at you. You try to break free as the chaos around you emerges. Gunfire surround you. Mutants, guards, and citizens fight each other. ${General} flips your knife out and cuts the rope. You rub your wrists. \"Fight with us. Please.\" ${General} hands you your pistol and knife. He flips his submachine gun into his arms and makes a run for the gate.\n\nYou sheathe your knife and check the ammunition in your pistol. When you're done, you walk towards the gate, through the town filled with corpses. Corpses hang from the building's windows. Decontamination chambers squeeze gas into the open. You follow the river of blood on the streets. The gate is destroyed, along with most of the wall. The watchtowers are destroyed, exploded under huge chunks of concrete blocks. Mutants fly and run around inside, and everyone with a weapon begins to defend the town. You ready your ${weapon} and walk towards the guards fighting off the mutants storming in. On your way there, you kill a couple of aviatrixes. They shriek and splatter on the ground. Citizens still scream and run around you, trying to reach their own homes. You reach the city gate to find soldiers fighting with all kinds of mutants. Along with the wacks jumping inside, the slimers corroding everything they touch, and the ones you already know, unknown types are also storming in. \n\nThousands of the black creatures with white eyes stand on the nearby hill, watching the events. The deceased around you rise up and fight with slow but inhuman strength. You glance through the enormous hole serving as the entrance. Mist slowly flows down the hill. The creature with its spine stuck out, holding two sharp, long knives comes ever closer with the mist. You open fire at the skinless creatures and the rabid, mutated creatures around you. Their black blood mixes with the red blood of the fallen soldiers. Mutants ooze in from the breach. You dive next to the ripped-apart corpses and pick up a submachine gun. The ground trembles as you stand in a line with the others, spraying bullets at the entrance.\n\nA big pack of slimers and wacks crash through the gate. They growl loudly and make their way towards the center. You stand your ground with the soldiers firing at them. You keep walking backwards as they just keep coming. One of the wacks from the huge pack above you dives down and picks one of you up. You put down many of them, but eventually, you get cornered in a half-destroyed house, with very little ammunition left. A couple of skinless creatures jump inside and slam their blunt and sharp weapons around. Some of the soldiers panic, and some of them even try to fight with their bare hands. They smash them around like rag dolls until the house trembles and collapses. You try to react fast, but the quickly falling wreck buries you.\n\n*page_break\n[i]\"The chance has never been closer.\"[/i] Darkness flows through the air in the nothingness. The man with the purple eyes slowly walks around. [i]\"You will be asked. By many. I must say goodbye for a while now. We both will be quite busy.\"[/i] He turns around. His dark purple eyes stare into yours.\n*page_break\n\n\"Come on…get up.\" You open your eyes to ${General}'s voice. He helps you sit up. You grip your head. It hurts like never before, and you look around. The war around you between the citizens, guards, and mutants has only intensified. A man in a white coat runs up to ${General}.\n\n\"Sir! The Oracle, it's close! It's best to leave through the suburbs somehow…then just follow the path! I can see it shining from the labs. Hurry!\" The man takes a few steps backwards, obviously scared for his life. The General looks at you and offers his hand. You grab it, and he pulls you up to your feet. \"Just know that…I didn't want to kill you. I just…I had no other choice. I had my orders.\" He pats your shoulder. \n\n\"Let's go. We have an Oracle to visit.\" He runs towards the suburb's gate, with you after him. At the gate, ${assassin} is sitting on top of a pack of skinless creatures. He wipes the blood on his pants and looks up at you. \"I'm ready,\" he says, then kicks the gate open. You run through the suburb. Dark purple lightning strikes around the area. People run around, pushing each other over as the mutants ravage the area.\n\n\"No time to stop!\" the General shouts back at you.\n\nThe sky gets darker and more purple as you get further into the suburbs. You reach the junkyard through the chaos and walk through the fence's open door. The wall which had a small hole in the bottom of it has been destroyed. You climb through the huge concrete block and stand at the bottom of a hill. The purple light shines between the trees. The wind blows heavily and stirs up the sand. It whistles as it passes through the trees. You run up the hill with creatures running past you, towards ${base2}. The closer you get to the top of the hill, the darker it gets. When you reach the top, you take a moment to glance down. Below you stands a huge crater. In the middle, a cave stands with black spikes twisting around it.\n\nDeeper inside, a dark purple ball swirls and spits lightning. Hundreds of creatures run and fly around it. They head past you, up the hill. Your wound throbs faster and swirls, along with the dark purple clouds. Lightning strikes down every now and then, exploding loudly. The rain is pouring now, and you slide down the hill. \n\nYou arrive on the ground, which is very muddy from the rain. \n*page_break\n\n\"That's where the Oracle is…this is what we've all been waiting for!\" General ${General} shouts in the noise surrounding you and points towards the cave. You set off towards it, avoiding the creatures. You're about halfway through when gunshots come from your left. A dozen people in military uniforms and hazmat suits slide down into the crater and open fire at the creatures. You stop for a second to watch them, then keep pushing forward. The heavy wind has turned into a sandstorm. It gets harder and harder to continue with every step. You can barely see your surroundings in the thick sandstorm. The black sun on you beats faster with every step you take forward in the mud. When you're about halfway there, the General stops. He falls on one knee and pants. \n\n\"I can't take more radiation…I'm sorry…I'm weak.\" ${General} looks up as an explosion shakes the air. Glancing back, the thick smoke flying up from somewhere around ${base2} comes into view. \"The best I can do now…is to get back and fight. I'm sorry…\" He stands up and walks backwards. \"Good luck…\" He glances back one more time before he marches through the mud and disappears in the sandstorm.\n\nYou push forward, glancing over at the military closing in on the purple ball as well. The mud turns black and gooey near the ball, and pushes your feet deeper underground. ${Assassin} stops and grabs your wrist.\n\n*if (rmdead)\n\n\n \"${firstname}…I can't go any further. We both knew this will be the end of it. You will be the one able to reach it. The only reason I didn't kill you is because I want to ask something of you. Reach the Oracle, and wish for my permanent death. I have nothing else to live for. And don't worry, you're safe. Because I hate you, I despise you. More than anything. If there's any humanity and dignity left inside of that rotting soul of yours, ask for that.\" He holds your wrist tightly for a few seconds after he finishes his sentence, then lets go of your hand. He pulls his knife and pistol out, then begins to walk back through the horde of mutants towards ${base2}.\n *goto orasta\n\n*else\n\n\n \"${firstname}…I'm extremely sorry…but I can't go any further. But…let's not lie to ourselves. We both knew you'd be the only one able to reach it. I was greedy once again, thinking about all the things I could ask for. But I won't be able to reach him, and it's for the best. But…I have to warn you…the Oracle is tricky. Whatever you ask for will probably be turned against you. Good luck, ${firstname}. I'm going back for ${Roommate}.\" He tightens his grip on your wrist, then releases you. He turns around and walks back through the horde of mutants with his knife and pistol in his hands.\n *goto orasta\n \n*label orasta\n*page_break\nYou set one foot after the other in the heavy sandstorm. Creatures storm towards ${base2} and the military. The huge cave gets closer. The spikes growing out of it twist around. The black sun on you beats faster with every step you take, and quiet whispering echoes in your ears. The entrance becomes visible, it's very close. The sound of bullets flying and the growling of the creatures surround you. Your stomach shakes from the radiation level. The black tar pulls your feet down, but you manage to get closer.\n\n*if (deadend)\n \"Halt! Put your hands up!\" a familiar voice shouts to your left. You cock the submachine gun, beginning to feel dizzy, and aim at the voice.\n \n \"I wouldn't do that,\" another familiar voice says. One taller and one younger person in dark-orange hazmat suits step forward. The see-through plastic covering their faces is dirty from the mixture of blood and sand. They're aiming their rifles at you. \"Last warning, drop your weapon or you'll get shot,\" the taller person says.\n \n \"Not going to happen,\" you say, taking a step closer to the entrance. Your wound burns, and the beating intensifies. You lower your weapon and rub the wound with one hand when the pain becomes almost unbearable. It burns as if someone was rubbing it with spikes dipped into acid. The taller man steps closer to take your submachine gun. When he reaches it, he stops and frowns. \"${firstname}?!\" he says with awe in his voice. You glance up, but your vision throbs with every beat of the wound. The younger person steps closer as well, then lowers the rifle. \"Oh my god…\" $!{heshe} shakes his head. You release your wound and look at them, still holding your weapon.\n \n \"${firstname}…it's us…${leftsurvivor} and ${currentbf}…\" ${leftsurvivor} places his hand on your weapon and pushes it down.\n \n \"We saw you die!\" ${currentbf}\twraps you in a hug. $!{heshe}'s almost taller than you. When ${hisher} arms squeeze you tight, you hiss in pain. $!{heshe} steps back and looks at you. \"You look…horrible.\"\n \n \"Look, I'm really happy to have found you, but we have to go. We can't go inside this cave. Even our suit can't withstand the radiation. No wonder you're feeling the way you are…you could die from this radiation in minutes. Come with us…we've placed explosives around the cave, and they'll go off soon.\" ${leftsurvivor} pats your shoulder.\n \n \"Yes, we've been with the military for a while now. They'll surely accept you. I'll vouch for you. Oh my god, we missed so much time, I still can't believe you're alive. We have so much to talk about. Come with us! What do you say?\" ${currentbf} smiles. They look at you, and ${leftsurvivor} offers a hand.\n *fake_choice\n  \n  #Go with them.\n   *set Reunend true\n   \"All right…\" You take a few dizzy steps forward. When you reach them in the thick sandstorm, they wrap their arms around you. You drag the end of your weapon on the ground. The black sun sends a sharp pain through your body the further you get from the cave's entrance. It begins to feel harder to keep your eyes open. ${leftsurvivor} and ${currentbf} aim at the mutants with their rifles with one hand and drag you with the other.\n   \n   An explosion shakes the ground. You stumble and glance back at the cave collapsing, leaving a black cloud after itself. \n   \n   *if (loverstatus)\n    \"I have to go back for ${lover}…\" you say several times as you tug on their clothes. The whispering intensifies, then you let your eyes close.\n    *goto gocont\n   \n   \n   *if not (loverstatus)\n    The whispering in your ears intensifies as the darkness from the sun crawls underneath your skin. You close your eyes in pain, then pass out.\n    *goto gocont\n    \n  \n  #Head into the cave.\n   \"I can't do that. Sorry,\" you reply and rush towards the cave.\n   \n   \"But it'll explode soon! ${firstname}! Don't be stupid!\" ${currentbf} shouts at you as ${leftsurvivor} drags ${himher} away. \n   *goto staycont\n\n \n \n \n \n \n*if (lizzieend)\n\n You feel an arm suddenly wrapping around your neck. You raise the submachine gun, but the person behind you twists your arm. Your weapon falls on the ground, and the edge of a cold military knife presses against your neck. You rip your own knife out and stab backwards. The person jumps back, and you turn around.\n \n \"Good job, the years have only made you better. Though you have to be aware of your surroundings. I could have killed you,\" a familiar voice says. The person in a dark-orange hazmat suit steps closer. The see-through plastic cover is dirty from the mixture of blood and dust. You pick up your submachine gun and cock it, despite the burning pain that your wound is sending through your body.\n \n \"I'm not your enemy, you can put the weapon down, ${firstname}. In fact, I told you I'd keep you safe.\" ${fsurv} steps closer, and you can finally see ${fhisher} face. She smiles and wraps you in a hug. The whispering in your ears intensifies, and the black sun strikes a sharp pain into you. You hiss, and she steps backwards.\n \n \"Are you out of your mind? Even the hazmat suit can't withstand the radiation that surrounds this place.\" She shakes her head, and you give your wound a small rub. \"Don't believe the legends, it's not worth dying over something like the myth of the Oracle. That's why we set up explosives. This cave is going down. Come with me, ${firstname}. I've got a plan. A really good plan. We'll leave everything behind. And no one will ever be able to hurt us again. For real this time…\" She extends her arm towards you.\n *fake_choice\n \n  #Go with her.\n   *set Liend true\n   \"All right…\" You take a few steps forward with your head spinning. She wraps an arm around you, and you head towards the military at the edge of the crater. You drag the end of your weapon on the ground. The black sun sends a sharp pain through your body the further you get from the cave's entrance. It begins to feel harder to keep your eyes open.\n   \n   \"Hold on, ${firstname}…please…I'm not sure I can carry you anymore…\" she says, pulling her brown pistol out to shoot the creatures getting close. An explosion shakes the ground. You stumble and glance back at the cave collapsing, leaving a black cloud after itself. \n   \n   *if (loverstatus)\n    \"I have to go back for ${lover}…\" you say several times as you tug on her clothes.\n\t\n    \"For who?\" She drags you up on your feet.\n\t\n    \"${lover}…in ${base2},\" you mumble as the whispering intensifies and your eyes close.\n    *goto gocont\n   \n   *else\n    The whispering in your ears intensifies as the darkness from the sun crawls underneath your skin. You close your eyes in pain, then pass out.\n    *goto gocont\n  \n  #Head into the cave.\n   \"I can't do that. Sorry,\" you reply and rush towards the cave.\n   \n   \"But it will explode soon! And the radiation! ${firstname}! You'll die! Please don't!\" ${fsurv} shouts at you. She takes a few steps forward, then stops. She lowers her hands and shakes her head.\n   *goto staycont\n  \n  \n  \n\n*else\n The military slowly surrounds the area in their dark orange hazmat suits. The see-through plastic covering their faces is dirty from the mixture of blood and sand. You quicken your pace, despite the sharp pain the black sun sends through your whole body with every beat. They can't seem to bear getting closer to the cave. Some of them notice and point at you. Creatures storm them, and they open fire. Corpses of creatures and humans fall, their blood and parts flying near you, along with some bullets. Some of them shout at you and throw something at the cave. They take aim at you. You run as fast as you can with the black tar swallowing your legs. Your lungs burn, and your head feels dizzy from the whispering that echoes in your ears.\n *goto staycont\n\n\n\n\n\n\n*label staycont \n\n\nYou reach the cave's entrance and rush down its black, shiny glass stairs towards the ball. An explosion pushes you off balance. The cave shakes as dark spikes and huge chunks of it begin to fall. It starts to collapse on you. You jump up and launch yourself towards the purple ball.\n*page_break\n*label gocont\n\n[i]\"But Mom! I hate school. I don't want to go, I won't go!\"[/i] You're sitting on the blue double bed with your knees pulled up and your arms resting on them.\n\n[i]\"School only started exactly one week ago. How can you hate it this fast?\"[/i] Your mother sits down on the bed next to you and gives your head a small rub.\n\n[i]\"It's boring, and I have no friends.\"[/i] You rest your forehead on your arms.\n\n[i]\"You'll make friends. And it'll get harder as time passes, believe me honey.\"[/i] She runs her hand down your back.\n\n[i]\"I'll never have friends. The others are weird, and they don't even like me anyway. ${currentbf} makes fun of me because I don't want to do what they do and because I understand everything we study. And the others like it when ${heshe} does that.\"[/i]\n\n[i]\"It's okay, sweetie. You think different, that's all. Try to involve yourself when they're playing or talking. I'm sure you'll make some friends, you just have to try. Hey, how about I make your favorite food for you and your dad when you get home?\"[/i] She lifts your head up. [i]\"Promise me you'll try to make some friends. You're smart, you can achieve big things.\"[/i] She smiles and gives your cheek a kiss.\n\n[i]\"I promise…\"[/i] You nod and hug her. [i]\"I love you, Mom,\"[/i] you say in a trembling voice.\n\n[i]\"I love you too, honey…you'll always be safe in my arms. Wherever, and whenever. Never forget that.\"[/i] She tightens her embrace.\n*page_break\n\nThe fresh snow underneath you makes your whole body shake. You open your eyes, and light blinds you for a couple of seconds. The snow underneath you freezes your palms. You sit up and look around. Thick fog surrounds you on top of the mountain. Snow is everywhere you look. You look down, and the district comes into view. People are walking around, and a couple of vehicles drive by in the distance.\n\n\"Good morning, kiddo. Thought you'd never wake up…\" ${capturer1} walks in front of you and offers his hand. You take it, and he pulls you up to your feet. Past the trees, a black car stands with a couple of men with black suits.\n\n\"I'm sure you have many questions, but save them. I'm not in the mood. A simple 'thank you' will be enough. In fact, you owe me several 'thank you's.' You better start being grateful real soon.\" He grins and crosses his arms. He leans against a pine tree. \"The things I had to go through to get your dying body to safety back then…\" He shakes his head. You peek underneath your shirt at the grey black sun. It's burned into your skin, but doesn't move. \n\n\"Yes, I had to cure you. Again. And what do you do? You just keep sleeping like the most useless, laziest person in the world while I grab the opportunity to build an empire from nothing. How ungrateful.\" He chuckles and walks over to the edge of the mountain. You follow him, taking a closer look at the district below. Citizens walk out of buildings and children storm out of schools. A couple of cars drive by, and guards patrol the area.\n\n\"Imagine the time you've been asleep for…and best of all, the ruler of both districts is standing next to you. So show some respect. Also, the wall separating the two is gone. I didn't try to rebuild the third district. I never liked the Dives anyway.\" He shrugs. \n\n\"The true reason I brought you out here is to put you underground. I was getting tired of having a zombie in my place. But hey! You're awake! How about you repay my kindness? I can't organize two districts. I barely have time for the most important person in my life. Me! Take the Paupers, and lead them.\" He turns towards you and puts his hands in his pockets. \"This is what we've always wanted. We'll have everything we ever set our sights on. Let's go, kiddo. Our bright future awaits.\" He grins and brushes his hair back. You look from the district to him.\n*choice\n\n #Go with him.\n  *set Liend false\n  *set Reunend false\n  *set Ivend true\n  You turn around and follow him to the black car behind the pine trees. \"Excellent. But let's make this clear, you're leading on my behalf. Don't mess up what I've already built, and my orders stand above yours. Follow these simple rules and this place remains clear of your corpse.\" He laughs as the men open the passenger door for him and the back seat for you. You sit inside, and they begin to drive down the small mountain road. \"This is the start of something great, kiddo.\" ${capturer1} turns around and winks at you.\n  *goto_scene ivend\n \n #Jump down.\n  You turn your head from him towards the district. After taking a deep breath, you push yourself off the edge of the mountain. Panic appears on ${capturer1}'s face, and he runs towards the edge. You keep falling. The district and its people get closer. When you're about to land in the middle of a crowded street, the ground before you opens up. Swirling darkness spirals downwards and swallows you. You land in complete darkness, with a single door standing at the far end of the darkness. You stand up and walk towards the door. You should be getting closer, but the door just keeps appearing further away.\n  \n  \"You can't leave me here!\" ${capturer1} shouts from behind as he runs after you. His red eyes glow in the darkness. You reach the handle of the door. His dark, bony, and veiny arms extend towards you and pull you back by your leg. You fall onto the cold darkness, and he kneels over you. He wraps his cold arms around your neck and squeezes your throat as hard as he can.\n  \n  \"Don't you understand that we are the same?! I need you, and you need me! We'll have everything we've ever wanted here! I've been waiting for this for so long!\" he shouts angrily. His face slowly turns dry and rotten. The long hair falls off of his head. You gasp for air beneath him. You reach around and pull the knife out of his belt. With your last remaining strength, you sink it into his neck. His bones crack, and you kick him off. He rolls away, then stands up with the knife sticking out of his neck. \n  \n  \"You…can't leave me here…after all I've done for you. I'll be doomed here! We're meant to do this together! Please, I'm begging you, kiddo! Don't do this!\" he shouts as he rips the knife out of his neck. Blood squirts out, but he keeps walking towards you. His whole body slowly turns dry, black, and rotten. \"${firstname}, it's not too late to change your mind,\" he says as he keeps stumbling towards you. You push the handle down and step through the door. He falls onto his knees, reaches towards you with both of his hands, and keeps shouting your name behind you as you just keep falling. The darkness slowly swallows his rotting body.\n  *page_break\n  *if (liend)\n   *goto licont\n   \n  *if (reunend)\n   *goto reuncont\n   \n  *else\n  *goto staycont2\n  \n\n\n\n  \n*label reuncont\nGunshots surround the area. Bullets swish around you in the heavy sandstorm. You sit up from the dirty hide with a still-dizzy head and watch ${currentbf} killing a tall, skinless creature near you. A handful of military soldiers surround you at the edge of the crater. Boxes of weapons and ammo lie around. Black smoke still emerges from the cave. ${currentbf} rushes to you and hands you a submachine gun with a handful of ammunition. $!{heshe}'s changed ${hisher} clothes and now stands in front of you in a tight military uniform, showing ${hisher} muscles.\n \n\"Take this. I still can't believe you're alive. You'd think the districts are huge for two lost friends.\" $!{heshe} chuckles and reloads ${hisher} submachine gun.\n \n\"I couldn't be happier to see you alive, ${firstname}. We would love to sit back and talk about the long years that have passed, but our work isn't done here. The cave is destroyed, the mutants' numbers should be reduced. But we don't have time to spare. Our mission has reached its time. We will take down the Sons of Tomorrow today.\" ${leftsurvivor} turns to you in a dark-green military uniform. \"${firstname}. Come with us. They're weakened. We'll destroy them and unite the district under military command. It's about time to rebuild this place for humans. I can only imagine how much stronger you've become. After all, you're alive.\" He rests his hand on your shoulder. You load the submachine gun and nod once.\n*page_break\n \nYou walk in line between ${leftsurvivor} and ${currentbf}. Around a dozen soldiers follow you in the sandstorm that seems to be calming down, unlike the heavy rain. The dark purple sky swirling above you still sends its darkness down on the district. You march past the crater and through the forest between the few remaining creatures. The ones getting close are eliminated quickly. You get past the forest and arrive at the broken wall of the suburb.\n \n\"Okay, Squad A comes with me, Squad B goes with Major ${currentbf}. ${firstname}, you're in Squad B. We'll meet in the tallest building, called the citadel. That's where their leader is. At least, that's what our informant said. Only kill if you feel threatened. Let's roll.\" ${leftsurvivor} follows the wall to the right, leading half of the soldiers towards the main entrance.\n \nYou ready your weapon and follow ${currentbf} walking through the hole in the wall. The suburb is filled with the sound of dying citizens and creatures. Bodies twitch and moan in pain. The blood and chunks of flesh squish underneath your feet. You pass the destroyed gate separating the suburb from the rest of the city. The streets are muddy from the mixture of heavy rain and blood. Guards sit outside of the living chambers' stairs. Some of them are crying, some of them rocking back and forth. They don't intend to fight. \n\nSome of them reach for their weapons when they see you. They get shot immediately. Most of them, though, just put their hands up or walk away. You meet up with ${leftsurvivor} at the entrance to the citadel and get ready for action. To your surprise, dead soldiers line the halls all the way up. At the ${leader}'s office, the two guards struggle as they hold their hands against their necks. Blood pours out of their freshly cut throats. You line up at the office door, then kick it in.\n*page_break\n\nA couple of soldiers storm the room with you by their side. The rest of them stay outside. Inside, General ${General} stands, holding a pistol to the ${leader}'s forehead. He's sobbing with his hands up and begging for mercy on the ripped couch.\n\n\"I believe our goals align. We're not your enemies, then. Lower the weapon.\" ${firstname} walks inside.\n\n\"I think so as well.\" The General looks at you. \"I almost let history repeat itself. I won't let someone evil like him get away again.\" He turns his head back towards the ${leader} and pulls the trigger. Blood splatters onto the wall behind him, and his head snaps back. ${General} drops the weapon and turns towards the soldiers pushing him down on the ground. They tie him up and drag him out of the citadel. You stand in front of the entrance with ${currentbf} to your left and ${leftsurvivor} to your right.\n\n*if (loverstatus) and (rmdead = false)\n\n\n \"You kept repeating the name of someone called ${lover}, I think. Feel free to find ${himher2}. Seems like ${heshe2} was important to you. Don't worry, we'll have plenty of time to catch up. I won't let you go anywhere without us this time.\" ${currentbf} looks at you, and it draws a smile to your face. You walk down the stairs and head towards the living chambers. The guards in front have disappeared. You walk inside. The living chambers and the dining room is filled with survivors. ${assassin} stands at the entrance, aiming down the sight. When he sees you, he lowers his weapon. \n \n \"Is the threat eliminated?\" he asks, glancing into the dining room.\n \n \"Kind of…\" you reply, then tell him the situation. He doesn't seem to care about the details or who will sit on the chair in the citadel. He just wants to know that ${Roommate} is safe. You promise she will be, and he begins to lead the citizens out. The last person in line is ${lover}. $!{heshe2} rips the gas mask off ${hisher2} head and does the same with yours. $!{hisher2} arms wrap around your body, squeezing you close. $!{hisher2} lips on yours warms your insides. Your heart beats faster than the black sun ever had with ${himher2} in your arms. You take each other's hand and walk out of the chambers. \n \n ${currentbf} and ${leftsurvivor} are standing outside, giving out orders to the soldiers to round up everyone in the city center for a speech. You stand next to them, and ${lover} rests ${hisher2} head on your shoulder. You watch the destroyed ${base2} standing in ruins as rain pours down from the dark sky onto the hundreds of dead bodies lying everywhere. More of the military's soldiers seem to arrive, and ${leftsurvivor} takes a deep breath. \n \n \"It's time to give the speech. We'll rebuild this town. It will be the first step towards ensuring safety in the district. It won't be easy. No part of the plan will be. But we can do it. And I'm glad I can do it with someone like you, ${firstname}. I'll never forget how you sacrificed yourself for us. You'll have to tell us how you survived that. Later. But for now, we have a speech to give.\" ${leftsurvivor} chuckles and walks down the stairs.\n \n ${currentbf} looks at the two of you, then follows him quietly. You walk after them, wrapping your arms around ${lover}.\n *goto_scene reunend\n\n*elseif (rmdead) and (loverstatus)\n \"You kept repeating the name of someone called ${lover}, I think. Feel free to find ${himher2}. Seems like ${heshe2} was important to you. Don't worry, we'll have plenty of time to catch up. I won't let you go anywhere without us this time.\" ${currentbf} looks at you, and it draws a smile to your face. You put your weapon on your back and take a step forward. ${assassin} appears on the streets in front of you. He raises his pistol and aims at you. You reach for your weapon in the split second you have to think the situation through. ${currentbf} pushes you aside and opens fire with ${leftsurvivor}. ${assassin} pulls the trigger several times before he falls back on the ground. ${currentbf} screams and falls on ${hisher} knees. $!{heshe} holds ${hisher} shoulder, and blood pours through ${hisher} fingers. \"Just go…I'll be fine,\" ${heshe} mumbles and looks away. Black blood slowly oozes from the several holes in ${assassin}'s body.\n \n \"Tie him up! He will return!\" you shout, stepping over him. ${Leftsurvivor} looks at you, tying up the wound of ${currentbf}.\n \n \"He will return! I'm not kidding! Tie him up and lock him away!\" you say and head towards the living chambers. The guards in front of it are lying dead, along with a couple of military soldiers. You walk inside. The living chambers and the dining room is filled with survivors.\n\n \"The threat has been eliminated, and you're free to go out. The town will be taken over by the military. They won't hurt you,\" you say, and the crowd begins to head out. The last person in line is ${lover}. $!{heshe2} rips the gas mask off ${hisher2} head, then does the same with yours. $!{hisher2} arms wrap around your body, squeezing you tight. $!{hisher2} lips on yours warms your insides. Your heart beats faster than the black sun ever had with ${himher2} in your arms. You take each other's hand and walk out of the chambers. \n \n *page_break \n ${currentbf} and ${leftsurvivor} are standing outside, giving out orders to the soldiers to round up everyone in the city center for a speech. You stand next to them, and ${lover} rests ${hisher2} head on your shoulder. You watch the destroyed ${base2} standing in ruins as rain pours down from the dark sky onto the hundreds of dead bodies lying everywhere. More of the military's soldiers seem to arrive, and ${leftsurvivor} takes a deep breath. \n \n \"It's time to give the speech. We'll rebuild this town. It will be the first step towards ensuring safety in the district. It won't be easy. No part of the plan will be. But we can do it. And I'm glad I can do it with someone like you, ${firstname}. I'll never forget how you sacrificed yourself for us. You'll have to tell us how you survived that. Later. But for now, we have a speech to give.\" ${leftsurvivor} chuckles and walks down the stairs.\n \n ${currentbf} rubs ${hisher} fresh wound lightly. $!{heshe} grunts quietly in pain. After looking at the two of you, ${heshe} follows him quietly. You walk after them, wrapping your arms around ${lover}.\n *goto_scene reunend\n \n\n*elseif (rmdead) and (loverstatus = false)\n \"Do you think he was our inside man?\" ${currentbf} looks at ${leftsurvivor} and points at ${general} being taken away.\n \n \"I have no idea. Could be,\" he replies. \n \n \"By the way, ${firstname}. I won't let you go anywhere without us this time.\" ${currentbf} looks at you, and it draws a smile to your face. You put your weapon on your back and take a step forward. ${assassin} appears on the streets in front of you. He raises his pistol and aims at you. You reach for your weapon in the split second you have to think the situation through. ${currentbf} pushes you aside and opens fire, along with ${leftsurvivor}. ${assassin} pulls the trigger several times before he falls back on the ground. ${currentbf} screams and falls to ${hisher} knees. $!{heshe}'s holding ${hisher} shoulder, and blood pours through ${hisher} fingers. \"I'll be fine. It's just a scratch,\" ${heshe} mumbles and looks away. Black blood slowly oozes from the several holes in ${assassin}'s body.\n \n \"Tie him up! He will return!\" you shout, stepping over him. ${Leftsurvivor} looks at you, tying up the wound of ${currentbf}.\n \n \"He will return! I'm not kidding! Tie him up and lock him away!\" you repeat, and ${leftsurvivor} throws a pair of rusty old handcuffs at you. You put them around ${assassin}'s wrists. As military soldiers walk past you with a crowd from the living chambers, heading towards the city center, you kneel next to ${assassin}, and his eyes snap open. Before he has a chance to do anything, you slam your knife into both of his thighs. He growls in pain, and you kick his pistol away as well.\n \n \"Enjoy this moment while you can. You can't hold me a prisoner forever. I will make sure to kill you and everyone you have ever loved when my time comes. Sleep with the thought that any night, I could be slitting your throat. And you won't come back,\" he says with pure anger in his deep, scratchy voice. You walk over to ${currentbf} and ${leftsurvivor}. More of the military's soldiers seem to arrive, and ${leftsurvivor} takes a deep breath. \n \n *page_break\n \"It's time to give the speech. We will rebuild this town. It will be the first step towards ensuring safety in the district. It won't be easy. No part of the plan will be. But we can do it. And I'm glad I can do it with someone like you, ${firstname}. I'll never forget how you sacrificed yourself for us. You'll have to tell us how you survived that. Later. But for now, we have a speech to give.\" ${leftsurvivor} chuckles and walks down the stairs.\n \n ${currentbf} rubs ${hisher} fresh wound lightly. $!{heshe} grunts quietly in pain. \"I've repaid my dept. Kinda,\" ${heshe} mumbles and wraps an arm around you. \"Help me a bit. I might be strong, but this hurts a lot…\" ${heshe} says as you wrap your arms around ${himher}. You walk down the stairs and tell the soldiers passing by to lock ${assassin} away. After that, you head towards the city center.\n *goto_scene reunend\n\n*elseif (rmdead = false) and (loverstatus = false)\n \"Do you think he was our inside man?\" ${currentbf} looks at ${leftsurvivor} and points at ${general} being taken away.\n \n \"I have no idea. Could be,\" he replies. \n \n \"By the way, ${firstname}. I won't let you go anywhere without us this time.\" ${currentbf} looks at you, and it draws a smile to your face. You put your weapon on your back as ${heshe} hugs you. ${assassin} walks down the street, leading a crowd of citizens from the living chambers. They hold their hands up, and military soldiers stand at each end of the group. He looks at you and shakes his head slightly. More of the military soldiers seem to arrive, and ${leftsurvivor} takes a deep breath. \n \n \"It's time to give the speech. We will rebuild this town. It will be the first step towards ensuring safety in the district. It won't be easy. No part of the plan will be. But we can do it. And I'm glad I can do it with someone like you, ${firstname}. I'll never forget how you sacrificed yourself for us. You'll have to tell us how you survived that. Later. But for now, we have a speech to give.\" ${leftsurvivor} chuckles and walks down the stairs.\n \n ${currentbf} holsters ${hisher} weapon and sighs. $!{heshe} punches you in the arm several times, and you look at ${himher} with confusion. \"I've missed you…so many years have passed, and we've all grown up. I thought you were dead. I even cried at night…don't do that again.\" $!{heshe} laughs. You rub your arm and do the same. \"Come…we don't want to be late.\" ${currentbf} wraps an arm around your shoulder, and you walk down the stairs to head towards the city center.\n \n \"Oh, by the way…Happy Birthday, ${firstname}.\"\n *goto_scene reunend\n\n*else\n *bug\n\n \n*label licont\nGunshots surround the area, and bullets swish around you as you open your eyes. ${fsurv} pants next to a couple of dead, skinless creatures in the rainy sandstorm. She has changed her clothes and looks at you in a military uniform. You sit up from the ragged hide on the ground and watch the military soldiers firing around you.\n\n\"Thank God you're awake…I wasn't sure I could drag you any further…you've grown. A lot.\" ${fsurv} laughs and looks around. She keels down and pulls your head closer to hers. \"So, long story short. I have no time to explain it all…the military has a functioning chopper. Well, almost functioning. They can't figure out why it isn't working. Being with the scientists has helped a lot. I know how to get it working. I was just waiting for a day like this to bail. That I found you is even better.\" She stands up and helps you to your feet. Your head still feels dizzy, and the whispering hasn't stopped.\n\n*if (loverstatus)\n \"You kept saying the name of someone called…um…${lover}? Do I remember it right?\" She tilts her head at you. \"$!{heshe2} sounded important. I mean, you kept saying ${hisher2} name as you passed out. Where is ${heshe2}?\" She picks up a pistol with a handful of ammunition and hands it to you.\n \n \"${base2},\" you reply, and ${fsurv} loads her own pistol. \n \n \"I see…I'll tell you what's going to happen. We'll sneak back inside when the military takes it over and rescue ${himher2}. I guess an extra member in the chopper won't change anything. Apart from seeing you happy, probably.\" She giggles and wraps you in a hug. \"You wouldn't believe how happy I am to have found you…\" She holds you tight until the soldiers around you stop firing. Thick black smoke flies up from the cave. The creatures lessen in numbers, and the sandstorm begins to calm down. Unlike the rain. \n \n You load the ammunition into the pistol and pocket the rest. The soldiers stand and round up everyone for the attack on ${base2}. You stand in line with ${fsurv} and march towards ${base2} through the forest with around a dozen of soldiers. The dark purple sky swirling above you still sends its darkness down on the district. You march past the crater and through the forest between the few remaining creatures.\n \n You arrive at the wall with the huge hole in it, opening into the suburbs. The soldiers climb through, and you do the same with ${fsurv}. The suburb is filled with the sound of dying citizens and creatures. Bodies twitch and moan in pain. Blood and chunks of flesh squish underneath your feet. You pass the destroyed gate separating the suburb from the rest of the city. The streets are muddy from the mixture of heavy rain and blood. Guards are sitting outside of the living chambers. Some of them are crying, some of them rocking back and forth. \n \n They don't intend to fight. Some of them reach for their weapons when they see you. They get shot immediately. Most of them, though, just put their hands up or walk away. The soldiers spread out and storm every vital building from the citadel to the laboratory. You follow the soldier walking into the living chambers. He rounds up the residents and the citizens who have hidden there into the dining room. ${lover} stands in line in the dining room. ${fsurv} looks at you, and you nod. She holsters her pistol and walks closer to the soldier guarding them with her hands behind her back.\n \n *page_break\n \"I'll need to replace you. You're needed at the outpost immediately,\" ${fsurv} says to the soldier holding a submachine gun. \n \n \"What? Why?\" The soldier shrugs.\n \n \"Explicit orders. I have no idea…\" ${fsurv} puts her hand on the soldier's shoulder.\n \n \"I don't think so. I was just told to do this a couple of minutes ago.\" The soldier pushes her hand off his shoulder.\n \n \"Oh, well…I'll take the easier way, then.\" ${fsurv} chuckles, then flips her pistol out and sends a bullet through the man's head. He falls back into the dining room, and his blood flows through the people. \"One more body doesn't make a difference. ${lover}, step forward,\" she says, then walks to the decontamination chamber. ${lover} pushes through the crowd and steps out with a scared look. When ${heshe2} sees you, a smile appears on ${hisher2} face. $!{heshe2} rips the gas mask off your head, then wraps ${hisher2} arms around your body to squeeze you closer. $!{hisher2} lips on yours warms your insides. Your heart beats faster than the black sun ever had with ${himher2} in your arms. You put your gas masks on and walk out of the chambers hand in hand.\n \n \"Okay…we'll have to hurry, let's go.\" ${fsurv} turns to you as you step outside, then starts to run through the suburbs. You do the same, and follow her. You run through the forest in the heavy rain and slide down the hill. By the time you reach the broken wall separating Ignobilis from the Pauper district, your lungs are burning badly, and ${lover} is panting as well. You rush through the district and only stop near the military outpost. It stands by the side of the wall, where the gate to the Dives stood. Now, huge chunks of concrete stand at its feet. The huge outpost is surrounded by a fence. Barbed wire runs along the top. Watchtowers line the inside, along with hangars and various buildings. The amount of soldiers seems light on the inside compared to the size of the outpost.\n \n \"Okay…I'll need you to wrap these around your arms and behind your back.\" ${fsurv} pulls out a rope, then cuts it in half. You wrap it around ${lover}'s hands, and tie them loosely. ${fsurv} ties your arms behind your back. When you're done, you walk behind her towards the gates. The flashlight from the watchtowers on each side follow you reaching the gate.\n \n \"What are you doing here? We almost shot you.\" A soldier with the same dark-green military uniform spreads his arms wide.\t\n \n \"I've brought back important hostages. They hold valuable information,\" ${fsurv} says. After a second of silence, he opens the gate. ${fsurv} grabs you by your gas mask and drags you behind her. She leads you deep into the outpost and shoves both of you into a cell in a dark, moldy building. Without a word, she locks the door on you. You sit on the cold ground with your back against ${lover}. $!{heshe2} clutches your hand, and you wait.\n *page_break\n \n After a while, the door swings open. ${fsurv} walks inside and opens the cell. After untying your arms, you rush out and run behind the hangar. A big, green helicopter stands there. You walk towards it and sit inside next to ${fsurv}. ${lover} sits on the back seat, in between the two of you. ${fsurv} presses a button, and the engine starts. After flicking a couple of switches, the roar of the engine gets louder.\n \n $!{fsurv} takes the controls and slowly begins to pull the helicopter off the ground, laughing as you get further up into the air. As you fly above the outpost, the soldiers in the watchtowers open fire at you. ${fsurv} maneuvers as much as she can while increasing your height and speed. A bullet crashes through the windshield. ${lover} screams as you get above the wall and slowly reach the Dives' district.\n \n You look back, and ${heshe2}'s holding ${hisher2} shoulder. $!{heshe2} leans forward, and the bullet gets stuck in the seat ${heshe2}'s sitting on. Blood runs down ${hisher2} arms. \"${firstname}, there should be a first aid kit under your seat. Use it!\" ${fsurv} glances over to you as you fly above the district. You take the first aid kit and open it. You take the top off the brown liquid, and pour it over the wound. $!{heshe2} hisses and lies down on the seat with ${hisher2} legs pulled up. You wrap the bandage around ${hisher2} wound and caress ${hisher2} cheek through the gas mask. You sit back in your seat and buckle the seatbelt as you get past the enormous wall surrounding the district. You hold ${hisher2} hand and keep glancing back at ${lover} even after ${heshe2} falls asleep, just to make sure.\n *goto lizcont\n \n\n*else  \n \"It would be best if we left right now.\" She grabs your hand and pulls you aside, then wraps you in a hug. \"You wouldn't believe how happy I am to have found you…\" She holds you tight until the soldiers around you stop firing. Thick black smoke flies up from the cave. The creatures lessen in numbers, and the sandstorm begins to calm down. Unlike the rain. You load the ammunition into the pistol and pocket the rest. The soldiers stand and round up everyone for the attack on ${base2}. You stand in line with ${fsurv} and march towards ${base2} through the forest with around a dozen soldiers. The dark purple sky swirling above you still sends its darkness down on the district. You march past the crater and through the forest between the few remaining creatures.\n \n You arrive at the wall with the huge hole in it, opening into the suburbs. The soldiers climb through, and you do the same with ${fsurv}. The suburb is filled with the sound of dying citizens and creatures. Bodies twitch and moan in pain. Blood and chunks of flesh squish underneath your feet. She stops in front of you, then motions you to back out while the soldiers aren't looking. You climb through the hole, and she follows you. \n \n \"Okay…we'll have to hurry. They'll find out that I'm missing sooner or later. Let's go.\" ${fsurv} turns to you as you step outside and starts to run through the suburbs. You do the same, following her. You run through the forest in the heavy rain and slide down the hill. By the time you reach the broken wall separating Ignobilis from the Pauper district, your lungs are burning badly. You rush through the distric, and only stop near the military outpost. It stands by the side of the wall, where the gate to the Dives stood. Now, huge chunks of concrete stand at its feet. The huge outpost is surrounded by a fence. Barbed wire runs along the top. Watchtowers line the inside, along with hangars and various buildings. The amount of soldiers seems light on the inside when compared to the size of the outpost.\n \n \"Okay…I'll need to tie your arms with this.\" ${fsurv} pulls out a rope and ties your arms behind your back. When you're done, you walk behind her towards the gates. The flashlight from the watchtowers on each side follow you reaching the gate.\n \n \"What are you doing here? We almost shot you.\" A soldier with the same dark-green military uniform crosses his arms.\n \n \"I've brought back an important hostage. He holds valuable information,\" ${fsurv} says. After a second of silence, he opens the gate. ${fsurv} grabs you by your gas mask and drags you behind her. She leads you deep into the outpost, then shoves you into a cell in a dark, moldy building. Without a word, she locks the door on you. You sit on the cold ground for a while. After you've waited long enough, you try to break free of your restraints. After a while, you manage to take the rope off your wrists. When you're done, you pull your knife out to open the cell door with it.\n *page_break\n \n The door swings open, and ${fsurv} walks inside. She crosses her arms and shakes her head. \"Did you think I'd just leave you here? After I found you?\" She laughs. \"Don't be silly…\" After she opens the cell door, you rush out and run behind the hangar. A big, green helicopter stands there.\n *if (rmdead)\n \n \n  When you're about halfway there, you hear a loud gunshot echo through the area. You freeze, and it's followed by another one. You rush towards the helicopter and jump inside next to ${fsurv}. She presses a button, and the engine starts. After flicking a couple of switches, the roar of the engine gets louder. ${fsurv} takes the controls and slowly begins to pull the helicopter off the ground, laughing as you get further up into the air. From the wall of the hangar, ${assassin} steps out, holding a pistol. He's shouting your name and empties a clip at the helicopter. \n  \n  They ricochet off the metal parts of the helicopter. As you fly further above the outpost, he pulls his sniper rifle from his back. ${fsurv} maneuvers as much as she can while increasing your height and speed. A bullet crashes through the windshield, and ${fsurv} screams in pain. She squeezes her shoulder with one hand and grips the controls with the other. \"${firstname}, there should be a first aid kit under your seat. Do me a favor, and patch me up…please!\" ${fsurv} keeps hissing as you take the first aid kit out. You take the top off the brown liquid and pour it over the wound. She grunts. You put it away, then roll a bandage around her wound tightly. You sit back in your seat and buckle the seatbelt as you get past the enormous wall surrounding the district.\n  \n  \"I guess he didn't like you…\" She giggles with pain in her voice.\n  \n  \"No…not really.\" You look out the window.\n  *goto lizcont\n \n *else\n \n  You walk towards it and sit inside next to ${fsurv}. She presses a button, and the engine starts. After flicking a couple of switches, the volume of the engine gets louder. ${fsurv} takes the controls and slowly begins to pull the helicopter off the ground, laughing as you get further up into the air. As you fly above the outpost, the soldiers on the watchtowers open fire at you. ${fsurv} maneuvers as much as she can while increasing your height and speed. A bullet crashes through the windshield. ${fsurv} screams as you get above the wall and slowly reach the Dives' district.\n \n  She squeezes her shoulder with one hand and grips the controls with the other. \"${firstname}, there should be a first aid kit under your seat. Do me a favor, and patch me up…please!\" ${fsurv} keeps hissing as you take the first aid kit out. You take the top off the brown liquid and pour it over the wound. She grunts. You put it away, then roll a bandage around her wound tightly. You sit back in your seat and buckle the seatbelt as you get past the enormous wall surrounding the district.\n  \n  \"I guess they weren't happy we took the chopper…\" She giggles with pain in her voice.\n  \n  \"No, I guess not…\" you reply and look out the window.\n  *goto lizcont\n  \n \n\n*label lizcont\n*page_break\n\nAfter applying tape on the bullet hole in the windshield, you fly above the seemingly endless forest for hours, in complete silence.\n\n\"${firstname}…I have no idea if this will work…I'm not sure where we're going. In fact, I'm not sure there's anywhere we can go,\" she says as you keep going above the thick forest, without any life in sight. \"I'm doing this again…I'm bringing you towards uncertainty, and not safety.\" She sighs, and you just keep staring out of the window.\n\n\"Hey…don't think I've forgotten it, though…Happy Birthday…I can't believe you're already ${age} years old.\" She reaches over and rubs your head through the gas mask. Underneath you, the thick forest ends, and a destroyed city opens before you for a while. The buildings have been demolished, and craters stand deep in the ground here and there. After you get past the city, a forest opens up again. You let out a sigh and fly for a long while again. Your eyes are beginning to get heavy when something buzzes inside the chopper.\n\n[i]\"Unidentified military helicopter, indentify yourself.\"[/i] The radio in the middle buzzes. You look at each other.\n\n\"Yes…this is…the military from Ignobilis,\" ${fsurv} replies.\n\n[i]\"I repeat once again, identify yourself. Ignobilis is destroyed.\"[/i]\n\n\"We are from Ignobilis…I'm telling the truth.\" She holds the radio. The other end goes silent, and she puts the radio back in the middle. After flying past a mountain, your jaw drops from the sight. A huge coastal city stands between the mountain and the sea.\n\n[i]\"Land on the red-and-green light.\"[/i] The radio buzzes once again. As ${fsurv} lowers the helicopter, more of the city comes into view. The buildings seem to be intact. Vehicles go around, and citizens walk by. \n\n\"Hey, whatever happens…just know that I'll always love you. I want the best for you. Even after so long, I still feel like you're my little brother,\" ${fsurv} says as she puts the helicopter down at the edge of the airport in a circle surrounded by red-and-green lights. \n*page_break\nCars with red-and-blue sirens on top line up at the runway, along with a few green trucks. ${fsurv} stops the helicopter's engine and jumps out, along with you. By the cars, a couple of men dressed in black aim their weapons at you, while another group of them stands in front of the helicopter with a man in a nice, clean red suit. His long hair is nicely combed, and he's freshly shaved.\n\n\"You really are from one of the dead districts…\" The man in front of you frowns. \"Nice to meet you, I'm Lukas…I own this airport.\" He offers a handshake, then pulls his hand back. \"By the way…you don't need to wear that gas mask around here. The air is fresh. However…I can't say the same about you.\" He turns his head away in disgust. \"I suppose taking a shower regularly wasn't an option where you came from.\" He fakes a smile for a second.\n\n\"No…it wasn't,\" you reply, taking the gas mask off your head.\n\n\"Well, welcome to our great city, Salutis. I have no idea what the process should be for something like this…we've never had an outsider come to this place. Never hoped to, or expected to either…hence, we're short on military. The military you see here resides somewhere else, keeping the barbaric outside world from overrunning us. For a great price, I must add.\" He looks at the two of you as ${fsurv} takes her gas mask off as well. \n\n\"My best guess is, you'll be taken to quarantine. You'll be examined, checked, questioned, and all that. Then, if you're found worthy, you can join our community. But this is only my imagination running wild again. Please be so kind and put your hands up, then follow these gentlemen into the car. Without any resistance,\" the man says and steps aside. The men with the black suits raise their weapons. They storm the helicopter and surround you. They slowly walk closer to you, handcuffs in their hands.\n*goto_scene liend \n\n\n\n\n\n\n*label staycont2\nYou open your eyes on the warm, gooey, squishy ground. It pulsates underneath your hands. The poorly lit inside of a cave surrounds you. Its walls are made out of flesh with black veins running around it, throbbing every so often. The black sun beats calmly on your body as you stand up. The slightly moving ground underneath your feet feels like and looks like a long, blackening tongue as you walk further down it. Arms extend out of the walls. They try to reach you as calm but painful moaning comes from the other side of the wall. \n\nBlood drips down from the ceiling. Hundreds of quiet, whispering voices echo deep inside your ears. As you reach further into the cave, arms lay out in front of you, forming a staircase. More of the black vein seems to be running around, blackening more of the area around you. The arms roll back when you walk down the long stairs, making it almost impossible to leave the area. The black veins run up to the middle of the room, the darkest place in the whole area. The man with the purple eyes appears on a black, heart-shaped throne. Pure darkness surrounds everything behind him, and it flows through the air. It swirls around him as he stands up. The pitch-black mist follows him as he takes a few steps closer. With an emotionless face, he tugs on his fancy suit and stretches out his bony, black wings.\n*page_break\n\n[i]\"${firstname}. About time to see you in person. I'd say it's a surprise, if it truly were a surprise. I've known for a very long time now that if anyone, you would be able to reach me.\"[/i] He paces around the room slowly, his footsteps echoing in the room along with his dark, deep voice. Darkness follows him wherever he goes. [i]\"Did you think about how you'll leave this very room once you're here? I know you haven't,\"[/i] he says as a black snake comes out of the darkness and begins to slither around you. \n\n[i]\"I have watched your life from its start up until this point. I know everything about you. But you know nothing of me, and I do know that your head is full of questions.\"[/i] He stops and turns towards you. [i]\"You refer to me as the Oracle. I don't have a name, though. I don't remember my past; I cannot recall it. I'm not what you'd call good, nor evil. I'm not human, nor any other type of creature. I am the biggest mystery, even to myself. That name was given to me by the people who preceded you, and have reached me. A small town's desperate leader, who just wanted his town to be left alone by everyone else. That's the origin of the name Oracle. I have reached out to him many times.\"[/i] Dark purple smoke emerges from his eyes.\n*page_break\n\n[i]\"A saddened limping boy who would give anything to bring his brother back. In his head, the image of another person in a gas mask. A confident man who wanted all the power and wealth he could muster in a time like this. What comes easy, goes easy. A broken elder who just wanted peace. Doubting his own sanity, standing before me. A hitman who wanted to protect his family. Who thought he was the king of the world, had to push everything dear to him away. And now you stand in line, as well. But your story is different from theirs. They all found me while they were on the verge of death. Unlike them, your case is not fatal. Also, unlike them, I can't look into your feelings. Nothing and nobody stood as a secret before me. Until you came. I can only present you a handful of options based on the deepest thoughts and desires I was able to catch. Yet again, your case does not call for a miracle. Choose the one which will satisfy your needs.\"[/i] His purple eyes turn darker. The throne throbs in harmony with your black sun.\n\n[i]\"I know that ${assassin} wants to die, but I doubt that's a secret anymore. That's one option, if you fancy doing him a favour. I also know that like most of you, you'd like to leave the district behind and start your lives over in the rumored safe city.\"[/i] He snaps his fingers, and a portal emitting a dim light forms from the darkness. \n\n[i]\"Most of you play with the thought of seeing me dead, for I am the cause of your suffering. But I will not kill myself. Alternatively, if you have what it takes, you can become one of the most powerful creatures known to mankind. Now, make your decision. This is all I can give you.\"[/i] He crosses his arms.\n*choice\n\n #Wish for ${assassin}'s death.\n  *set Kideath true\n  \"I wish for ${assassin}'s permanent death,\" you say as your own shadow on the ground begins to walk around you.\n\n  [i]\"I see. And that you shall have.\"[/i] The man in front of you snaps his long, dark fingers.\n\n  *if (rmdead)\n   [i]\"Your wish has been granted. I agreed with ${assassin} whenever he would die, someone else takes his place amongst the dead. The person must like him, or he must like the person. Hate towards the other person from either side will neutralize the effect. That's the basic rule of balance. If something is given, something of equal value has to be taken as well. The tragedy of a man who had so much to lose. Now, he doesn't like anyone anymore. Furthermore, he even hates the whole world. But there are still people who like him. Not you, though. Your feelings towards him are not strong enough. One must wonder why you would take the necessary steps to do him a favor.\"[/i] He raises his hand, then clenches his fist as he whispers something. \n   \n   A ball of pure darkness forms in front of you, opening upon a vision of ${assassin}. He reaches for his neck as he begins to suffocate in his own room. In his other hand, another ball of pure darkness forms. The apprentices he was training appear as they hold off the waves of creatures storming the cities. One by one, they struggle and gasp for air. They fall down, suffering on the ground as they struggle to fight back. Soon, they get overrun by the creatures.\n\n   [i]\"Now that's done. I believe you have no further business here, then. You have relieved a broken man of all of his pain. I'm sure we'll see each other sometime in the future. I'll be keeping my eye on you.[/i]\" He snaps his fingers. A black cloud leaves his hands. It floats above his palm for a second, then flies towards your head rapidly. It disappears in your gas mask's filter and up into your nostrils. Your eyes become heavy, and you close them as you fall down on the warm flesh.\n   *goto oraccont\n\n  *else\n   [i]\"I agreed with ${assassin} that whenever he would die, someone else takes his place amongst the dead. The person must like him, or he must like the person. Hate towards the other person from either side will neutralize the effect. That's the basic rule of balance. If something is given, something of equal value has to be taken as well. The tragedy of a man who had so much to lose. Now, there's only one person left that he truly likes. Who also feels mutual, more or less.\"[/i] He extends his long, black arms. Darkness flows around his hand. He whispers something, then clenches his fist slowly. \n   \n   Through the darkness, ${assassin} choking in his own room appears before your eyes. A lump appears in your throat, and it just grows until you can barely breathe. You gasp for air, but your throat keeps tightening. The black sun on your body tingles and twists around as you fall on your knees. The tiny veins in your eyes swell and pop. The man with the purple eyes keeps watching you as you slowly fall forward on the ground. The last thing you feel as you slowly choke is the warm, gooey ground and the black sun throbbing faster on your body.\n\n   [i]\"Your mortal body has passed. But it would be a shame to just let it rot away.\"[/i] His voice echoing in your ears is the last thing you hear.\n   *goto_scene deadend\n\n\n\n\n #Wish to leave this place.\n\n  \"I simply wish to leave this place. I want no business with you,\" you reply, taking a step back.\n \n  [i]\"I see. No one else has ever come in to have this so-called potential wasted. Let alone taken from others seeking it ever so desperately. After all, my existence caused the military's utmost interest in me. Something you refer to as powerful. For that, you can never return to this place. You can never talk about your visit here, and you can never mention me, in any form. \n  \n  \"If you do so, an organ inside your body will shut down at random. Take that for granted. This has not been the last time we'll see each other, though. I'm sure of that. I'll be keeping an eye on you. Be gone now.\"[/i] He raises his hand, and darkness surrounds it. He points towards the fleshy ground, and the darkness from his hands shoots underneath you. The ground opens up. Hundreds of black hands emerge from the black mist beneath you, dragging you down into the darkness. As the black mist surrounds you, your eyes close.\n  *goto oraccont\n\n\n #Walk through the portal.\n  \"I want to leave the district behind and start over,\" you say, taking a step towards the portal. The man with the purple eyes blinks between you and the portal.\n \n  [i]\"Very well. But no one you have ever known can follow you. You will leave the district behind, along with its population. You will forget everything that has happened here. You will forget your life here. On the other side, you cannot mention me, or our deal in any form, even if you remember. I'm sure this isn't the last time we'll see each other. I'll be keeping my eyes on you. Have fun with your new life.\"[/i] The man places his hand on the black sun on your body, then steps aside. The black sun stops beating. After a moment of silence, you walk through the portal. Immediate pain strikes your whole body, and you become paralyzed. Darkness surrounds you. After what feels like a long fall through the nothingness, you pass out.\n  \n  *page_break\n  \"I think we should just a put a bullet through its head and bring the corpse back,\" a voice says as you open your eyes. The sun shines on your back and warms your whole body on the comfortable grass. You look up to see a man in a black suit and a woman in a blue police uniform standing next to him. Behind them on the field stand a couple of black cars and white police cars. Many more people are standing there with weapons in their hands. None of them wear gas masks. Behind them in the distance, tall buildings stand with the noise of a living city finding its way to you. At the edge of the city, endless blue ocean spreads out as far as you can see. You stand up carefully and put your hands in the air.\n \n  \"Okay, where did you come from?\" The woman keeps her finger on the trigger.\n \n  \"The districts…Ignobilis,\" you mumble with a dizzy head. They look at each other, then aim their weapons at you. The man with the suit in front of you steps closer. \"Take the gas mask off. It's not needed here.\" He waves his hands. \"If what you say is true, how did you get here? We pay the military an awful lot to keep everything behind that mountain,\" he continues as you take the gas mask off and glance behind yourself. Mountains stand as far as you can see to the left and right.\n \n  \"I…climbed,\" you reply, having no better response in your head. They look at each other, and the man in the suit and the black sunglasses steps in front of you. \"I'll tell you what's going to happen. We'll take you…somewhere. You'll undergo questioning, then some tests. You're probably contaminated, and we don't want to have whatever you've got there spread. After that? I don't know what's going to happen. I'd like you to cooperate, and turn around. Make this easier for everyone,\" he says, and the woman hands him her handcuffs. \n  \n  You turn around and put your wrists behind your back. He puts the cuffs around your wrists carefully, so as not to touch you. They escort you to the black car and stuff you into the trunk. The engine turns on, and they set off. The road feels long, and you wonder if you've made the right choice as you lie in the trunk with your legs pulled up and your arms cuffed.\n  *goto_scene portalend\n\n\n #Kill him.\n\n  Without saying anything, you pull your knife and pistol out.\n \n  [i]\"I'm not sure I understand your motives. But it is the choice you've made. So be it.\"[/i] He opens his palm, and the darkness flows into his hands. A long, barbed sword forms out of the dark mist. He lowers it and points at you with his other hand. A black snake jumps out of the darkness, flying towards you. You step aside and cut it in half with the blade of your knife. The snake falls to the ground and turns to ash. The black sun on your body beats harder. You close your eyes for a second, and black veins run up your hands.\n \n  [i]\"Interesting,\"[/i] he says, then dashes towards you with incredible speed. You can barely roll away from the edge of his shadowy blade. You take aim and pull the trigger. He disappears, leaving a cloud of dark smoke in his place. The bullet squeezes into the fleshy wall. Blood runs down, and muffled crying comes from the other side of it. From nowhere, he appears behind you from the dark mist. He swings the black sword. You turn around and parry it with your knife. He jumps back and extends the length of his sword from the darkness. \n  \n  You ready yourself, and he blinks in front of you. For long minutes, you keep avoiding and dodging each other's attacks. The darkness thickens wherever he blinks. You become exhausted as time goes by. He keeps blinking around you, trying to sink his long
