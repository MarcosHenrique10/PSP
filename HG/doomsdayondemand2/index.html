es from the distance. The buildings become intact with every blink you take, and the district becomes restored, crowded. \n  \n  The dying sun warms your skin. As you walk deeper into the district, a graveyard's entrance comes into view. You look around in the increasing noise. Men and women walk around the tall buildings and fixate their eyes upon you. Children turn the corner and cycle past you with a serious face, their dead eyes focusing on you. You look back as they go past you, but they keep their heads turned towards you. You grip your weapon tight and take a few long blinks.\n  \n  A crowd of people run past you screaming, pushing each other on the ground. They keep their eyes on you as they stumble and step over each other to reach the end of the district. Officers run after them, and keep firing in the crowd, as they turn their dead eyes towards you. When you cross the road to the graveyard, a military car packed with soldiers rushes by, inches away from you. To your left, a man with a fancy suit walks towards you with a knife in his hand. You walk backwards and immediately fire at him. The bullet goes through him, and he walks through you. \n  \n  Your heart stops for a second, along with your breath. He doesn't get his dead eyes off you, even as he's walking forward. You reach the graveyard's gate and look around. The whole district is looking at you with cold, dead eyes. You push the iron gate of the graveyard open and look down the long street to your right. Citizens run towards you and scream. In the distance, a bomb is slowly falling from the sky. Your hand freezes on the gate as it reaches the ground. The light almost blinds you, then the sound reaches you, along with the shockwave. You close your eyes as pure cold runs through your body. You open them to find yourself in the same empty, dark, and destroyed district. \n  \n  *page_break  \n  At the end of the long road where the bomb fell, there lies a huge crater. You push the gate open and head through the graveyard. The tombstones are destroyed, and the graveyard is covered in holes. Half-eaten remains of corpses lie around. The small brick crematorium building stands at the far side of the graveyard. Its concrete doors are wide open. The right side of the building has been destroyed by a crashed military helicopter. You walk over the concrete doors and right into the lobby. Dust and quiet whispers fill the building.\n  \n  The light shining through the doorframe disappears, as if the doors have closed behind you. You turn around, but the entry is wide open. You walk deeper into the crematorium. Its long, dark corridor leads to the main room. Cobwebs and dust fill the shelves and the small, rotten, black cremation chambers. The whispering intensifies and surrounds you. The cremation chamber in the middle is the only one that's closed. You open its black, creaking metal door. The knob falls off. The half-rotten remains of a corpse lie inside, with a note resting next to it. You pick up the note and read it.\n  \n  [i]\"Welcome to Old Pauper. The District within the District that never forgets! Where I am right now has long abandoned hope, and sanity. What you will do as well, if you stay there.\"[/i]\n\n  You let the paper fall out of your hands and leave the building of everlasting whispers. You walk down the street as fast as you can, with increasing footsteps behind you. When you reach the end of the small district, you look around and decide where you would like to go.\n  *goto tiktok\n \n *disable_reuse #Go with ${assassin}'s guess. The mad village.\n  You head down to the deserted area, and the thick, concrete wall surrounding the small town comes into view. The steamy black tar surrounding it is slowly swallowing corpses. You jump over it. As soon as you set foot inside, a depressing feeling takes hold of you. Darkness surrounds you and flows around you. The streets are filled with bloodstains and both human and mutant remains rotting away. A young girl without a gas mask hums quietly in an alley and keeps stabbing a body over and over again.\n\n  The houses, stores, and other buildings that were once intact have now either fallen apart or are on the verge of falling. The broken buildings and windows allow you to see into them, where they act like nothing has happened. A woman with a chunk of hair sits on the couch and keeps pressing the remote's buttons. She points it at an empty wall and murmurs to herself.\n  \n  You walk deeper into the thick darkness. It fills your lungs through the gas mask and burns your eyes. A man with his skin dried to his bones walks in front of you. He crunches with his teeth furiously and holds a head in his arms. You walk past a well in the city center. A woman drags the bucket up and chugs the dark red blood. She screams and pours it over her black, severely wounded body.\n  \n  \"Adopt your baby today, get one, fresh one, anyone!\" A man with a beard reaching to the ground points at the children in the cages. Their eyes are blindfolded. Their whispers find your ears. They send a calm but sad feeling into your heart. Your ears begin to ring, but you shake it off. With every blink, the darkness flowing in front of you only becomes thicker. An old man is sitting in brown leather clothes, holding an empty, torn-apart hat. His eyes are covered with a rag, and his long grey hair reaches the ground. When you walk past him, he follows your movement.\n  *page_break  \n  \n  \"Welcome to our town, ${firstname}. Enjoy your stay. It will be a long one. You won't enjoy it. But you might come back one day. Your father misses you.\" His white, cloudy eyes stay on you. You stop for a moment when a figure that looks like your father forms from the darkness, but you frown and keep walking.  \n  \n  You reach the end of the main street. To your right awaits the exit of the town, and a tall church stands in front of you. Its stairs are made out of corpses. A man keeps running up the stairs, just to roll down with hysterical laughter. His body is covered with dark blue-and-green bruises. \n  \n  The corpses feel squishy underneath your feet. You reach the top of the stairs, where a woman in torn black clothes is tied to the cross at the right side of the entrance. Her muscles are very large and thick, along with her average size. A black sun is twisting away in the middle of her stomach. Her body is covered with spikes, and her spine has pushed out of her back. Her head is lowered, but it snaps up as you reach the church's entrance. \n  \n  \"You too! Another one with the mark. You will serve him. You can't avoid your fate,\" she says quietly. Her black tongue shines in her mouth. Her left eye is red, but her right eye is black. Her teeth are slowly growing out of her mouth and becoming fangs. You blink a couple of times and feel your wound twisting and burning. You hold your breath and push the brown door open. Bloody fingernails are stuck in the scratch marks. You walk in and let it slam behind you.\n  \n  Tall, dark, red candles line the church on each side. The windows are barricaded. You wait a moment for your eyes to adjust to the darkness, then you step forward. You walk down the church's aisle, between the broken benches. Blood is smeared all over the floor, leading towards the altar. On the altar lays a note with fresh blood on it.\n\n  [i]\"You have arrived, I welcome you. This is the final rush. Where I am, you still wonder? Where we will all end up.\"[/i]\n\n  You read it and step back from the altar.\n  *goto chuf\n  \n \n *disable_reuse #Go with the preacher's idea. The church in Ignobilis.\n  *set Time -100\n  You walk deep into the district, through the road leading past the offices and the police station. On the road, a skinless creature appears behind you. You quicken your pace, but so does the creature. You run and take a turn onto a smaller street. As you rush through an alley, the creature loses you. You're still trying to catch your breath  the church's interior. The balcony's tired wood cracks underneath your feet. It's covered with large holes, and the other half of it has already collapsed.\n  \n  You walk back and forth, and the creature does the same. You want to save your ammunition whenever it's possible and not a life-or-death situation, so you holster it. You walk as close as you can to the edge of the balcony in order to get a clear view of the robed people below you, but you can't see anything. You slide down next to the wall and pull your knees up. How are you going to escape this time? Thoughts cross your mind, and you rest your head on your legs. You're just wasting time, trapped in here.\n  *page_break\n  \n  You look up to see all of them watching you. All of the masks are facing you. They hold their equipment and wait for you. You stand up, and intense shrieking and shouting comes from the altar behind them. A creature on the altar breaks its bonds and jumps up. Its spine is sticking out of its back, ending in sharp spears. Its muscles grow, and most of its body turns black. It begins to rip apart the robed people. They stab the creature as much as they can, but most of them rush towards the door to the left, then run down the stairs.\n  \n  The skinless creature runs towards the black, spiky creature, and they begin to fight. You watch them for a couple of seconds, but then you notice the small envelope sticking out of one of the dead's pockets. You jump down and land in a somersault. It hurts your knees, but you crawl towards the dead person quietly. You take the envelope out and lean against a bench. \n  \n  [i]\"They worship something. They create new species from radiation. Fascinating. What do they worship? Not God, but the Oracle. Is he the almighty, or is he the evil? Do they praise a false god?\"[/i] the note reads in dried blood. You put it down and sneak behind the benches towards the exit. You push the wooden doors open as much as you can while the creatures are destroying the inside of the church. The wooden door slams behind you, and you run down the stairs. The ray-like creature shrieks once again and flies off of the cross. As you get as far away as you can from the church, you decide where to go.\n  *goto tiktok\n  \n  \n \n\n\n*label chuf\n*page_break\n*if (Time = 300)\n *achieve detective\n *goto chuf2\n*else\n *goto chuf2\n\n*label chuf2\nThe door slowly creaks open. With a couple of footsteps echoing behind you, the door slams shut, blowing out a couple of the already dying candles. You peek back to find ${capturer1} leaning against the door in front of you. He looks down and crosses his arms.\n \n\"Well, this is rather awkward. He has a grip on you. Even if you don't have anyone you care for, there are people who care for you. When something happens to them, you feel obliged to avenge them. Just because they liked you, despite everything you are. This is yet another difference between you and me. I never give people reason to like me. No one could have a grip on me. Even if they thought someone was important to me, I'd rather let them die than risk my own life. I've been called insane for that. Yet I led ${base} to victory.\" ${capturer1} chuckles. \n\n\"Until you destroyed it. Well, that was the only thing people could get a grip on, that mattered to me. But now that's gone as well. Anyway, I know you're not like that. And usually, I would tell you not to go. But this time, I won't. Go, I know you will anyway. But you won't manage on your own. Because you're walking into a trap. Do you think anyone would let one of you go? What would you do if you got to leave the building serving as your prison? What would you do as a victim? Go home and just forget about it? Obviously not.\" He shakes his head slowly. \n \n\"Let me tell you what I would do. Should I, though? You know the answer yourself. And you know what an ordinary victim would do as well.\" He chuckles. \"If you need my help, you only have to ask. I won't be seen until it's too late for him. You just have to ask. What's it gonna be, ${firstname}? Get a taste of what we could do together if we team up. No rest for the wicked, kiddo.\" His red eyes shine in the darkness as he lifts his head.\n*temp Ivanchoice false\n\n*fake_choice \n #Accept his offer.\n  *set Ivan %+20\n  *set Ivanchoice true\n  \"Let's go as a team. Once again.\" You lean back against the altar.\n   \n  \"That's the spirit, kiddo. They won't stand a chance. It'll be good practice for how we'll operate in the future.\" He winks. \"Now, let's get going.\" He walks towards you. His red shoes echo in the church. The candles extinguish on their own with every step he takes. He reads the note. He looks around and grins at you. \n  \n  \"Where we'll all go. Help me out here.\" He places his hands against the altar. You do the same. He counts to three, and you begin to push it away. His muscles tighten inside his black shirt. You push with all your strength, and the altar falls over. It cracks in half, and a passage opens downstairs. \"After you. I'll be here until my time comes.\" He brushes his hair aside and steps back.\n  \n  \n #Refuse his offer.\n  \"No, thank you. I'll go alone.\" You lower your hands and rest them on your knees.\n  \n  \"Heh, I tried real hard to squeeze this much of kindness out of me. It was exhausting, believe me. But don't worry…it won't happen again. That's not me. Have fun. I'll be there to laugh in your face when you fail desperately. See you, kiddo.\" He chuckles and walks out of the church. You try to understand the last piece of the note. After searching everywhere for him, and for secret ways, you end up at the altar again. In your anger, you kick it, and it slides back slightly. You push against it with all your strength. You have to stop several times, but eventually, a passage opens downstairs.\n  \n  \n  \nYou take the dark, stone stairs downstairs. A long, grey, concrete passageway stands in front of you, with holes in the walls. [i]Oracle[/i] is written on the wall many times, along with weird shapes and drawings of creatures. You walk down the hallway, glancing into the holes. Dark figures walk and sit around. Their white eyes glow in the darkness. At the end of the hallway, a note with a smiley face is placed above the doorway.\n\nYou step into the pitch-black room, which is filled with medical and torture equipment, tables, and walls with drawings of creatures in all shapes and sizes.\n*page_break\n\n[i]\"Welcome. Was your journey here pleasant?\"[/i] The doctor walks out from the shadows of the room and crosses his hands behind his back. His laboratory coat is covered in dried blood. \"This town is where everything started. For Evil, for madness. The church was holy, though. The Sane holed up here for so long. Something otherworldly must have watched over them. Something Godly.\" He paces around the room. \n\n\"Then they all fell victim to madness. Were they left by everything protective? Or is it just the fact that the longer you stay here, the longer you'll get influenced by it?\" He laughs in a creepy, slow way. Arms extend from the other half of the room covered in shadow. You step backwards and stumble over the disemboweled bodies by the wall. The bodies are black as coal, but their white eyes shine in their heads.\n\n[i]\"You see, young ${firstname}, this is the root of the most severe and interesting mutations. Fascinating how the world as we have knew it is slowly turning around, over and over again. Soon, it will be the time of the creatures, and not humans. These people…they were the first ones to have seen and praised the Oracle. No matter what you have seen or been through, there's always something that can surprise you. Also, someone smarter. That would be me, of the two of us. I planted the thought in your friends' head. I wanted them to give you that advice. I wanted everything that has happened to happen. I know everything about you. Your past, your present, and I can take guesses about your near future as well. I suspect you know whom I have taken. And what I want in return.\"[/i] He steps back into the shadows. You take a step forward in the dark room. \n\nDust hovers in the air. You glance out of the room. White eyes meet yours on an entirely black, small body. You ignore it and walk after the doctor. You grip your pistol tight. Voices in all tones ring inside your ear, calling your name as you cross into another room. Your head feels heavy from all the screaming inside it. The room is small, and a single cage lies between you and the doctor.\n\n\"So, this is exactly what I want. I want you. Submit to me. We all have a beast inside of us. And yours can be brought out. The infection kills or turns everyone within weeks. You have not turned, nor died. You must be immune. But I guess you've figured that much out as well. I just want to bring out your real personality. And this is the best place for it,\" he says, stepping away from the cage.\n*page_break\n\nA young girl lies in the cage behind him. Her eyes are wide open, just looking at the ceiling. The girl looks like ${Roommate}. An older woman that looks like your mother is carefully feasting upon her arm. She looks at you with dark red eyes, but doesn't stop stuffing the remains into her face. Your stomach rumbles, and the doctor just keeps laughing next to you.\n\n[i]\"What are you going to do now, ${firstname}? Someone in your and ${assassin}'s life is gone. Horribly. You owed him. And all you could do is get his daughter killed? Silly, silly boy. You have no place left to go.\"[/i] He takes a few steps backwards, towards the piles of wooden boxes on the other side of the room.\n*if (turning)\n *set deadcount +1\n \n \n Anger like you have never felt before fills every inch of your body. You keep looking from what has become of them to the doctor. Your vision falters with every blink, and you bury your head in your hands. The black sun on your body burns and expands its darkness rapidly, blackening your skin. The spikes around your wound grow and spread over your entire side, running down your arm. Your fingernails grow and sharpen, along with your fangs. Whispers echo inside your head. \n \n The gas mask on your head tightens, and the straps snap open. It falls off and rolls away. You lower your hands, not even fully aware of yourself. From instinct, you launch yourself at the doctor. He takes a pistol out, but you smash it out of his hand as you land on a wooden box with him underneath you. The box shatters. With a foggy mindset and unclear vision, you strike down at him with your sharp nails. Chunks of meat and flesh splatter around you from the forearm that he put in front of his face.\n \n [i]\"Yes, yes! This is what you are! Let it out, empower the feeling! Give in to your true self!\"[/i] He laughs hystericallyas you open your mouth wide and scream. Your fangs sink deep into his forearm, ripping it in half. He keeps laughing as you rip him apart. He only stops when you sink your fangs into his gas mask. Air squeezes out of the ripped leather mask. The glass at the eye part explodes, and his laughter mixes with his own scream of pain. His blood splatters around the walls and boxes as you take chunks out of his body. \n \n You kneel over his remains, breathing heavily. Your fangs and fingernails retract, along with most of the spikes on your body, except around the still-twisting black sun. Your limbs return to their original size. Your head and vision slowly clears. It all feels like a dream. A dream you can barely remember. But inside, you know it was not a dream. The bloody mess of what's left of the doctor enhances the thought, along with your hands covered in fresh blood. You wipe the blood off of your mouth and gasp for air. You stumble as you pick up your gas mask. You put it back on and stand by a pile of boxes with trembling legs.\n \n Under your shirt, the black sun twists slowly. You run your fingertips on top of it. The bony spikes are very sharp, and the wound burns under your touch. You sit down on one of the wooden boxes and close your eyes.\n \n \n*if not (turning)\n Anger takes control of your whole body. He keeps laughing as you tighten your grip on your knife. After taking a few deep breaths, you launch yourself at him. You push him over and land on a nearby wooden box. It shatters, with him stuck underneath you. Your vision is clouded from anger. You raise the knife high and try to slam it into his chest. He blocks your arms and pushes them up. Both of your hands are shaking.\n \n [i]\"Yes…yes, that's you! Release the beast! Go wild, break your chains!\"[/i] His hands shake, and he laughs hysterically. You gather all your strength from the pure anger filling your body. It makes your black sun twist and burn. You frown and keep pushing the blade towards him. Its tip slowly reaches the middle of his chest. He keeps laughing like a maniac as it cuts through his lab coat and slowly spreads his ribcage.\n \n [i]\"You're a fool! They turn to the image of your fears and regrets. I've studied them…I've studied you…every creature can be studied!\"[/i] His voice shakes. \n \n [i]\"This is you! Take a look at yourself!\"[/i] He laughs like a maniac as his ribcage snaps in half. You give the knife a twist, then pull it out. With a swift move, you cut a hole into his gas mask, then slam the knife back into him again. His laugh mixes with his own scream, filled with pain, until he stops moving. You wipe the knife on his lab coat and stand up with shaking legs. Blood pours towards the wooden boxes. You sheathe the knife and sit down on one of the boxes. It takes a while before you realize that you aren't dreaming. You close your eyes and try to calm yourself.\n \n*page_break\nAs the adrenaline slowly leaves your body, you begin to feel nauseous. You slide down the side of the box and rub your head. Several white pairs of eyes peek in from the other room. In the silence, all you can hear is your own breath. Until something moves in one of the boxes. At first, you disregard the noise, but it just intensifies. You turn around and try to locate the source of the noise. The noise intensifies the more you dig through the piles of boxes.\n\nDust has filled the room from moving the piles of wooden boxes that surround you by the time you locate the right box. It differs from the rest. It's wrapped in a black blanket, and a red bow is attached to the top of it. Heavy breathing comes from inside. You take the wrapping and the bow off, but still can't see through the black box. You give it a few light kicks, and it breaks in half. ${Roommate} rolls out of it, her arms and legs tied together behind her back. Dirty rags are stuffed into her mouth.\n*page_break\n\n\n*if (Time >= 1)\n She blinks at the sight of you, her cheeks shiny with tears. You frown and glance back at the cage. The creatures inside are now skinny, with enlarged heads and claws. She sits up, and a note is left underneath her. You pick it up as she sobs quietly.\n \n [i]\"If you're reading this, then everything went the way I wanted it to, ${firstname}. I have injected a mixture of what I think will mutate her body in the most dangerous possible way. If you're fast enough, you should find the cure inside my pocket. It will only work on her type of disease. Happy struggling,\"[/i] the note reads in dried blood. You rush to his body and sink your hand into the pocket of his white lab coat. \n \n You find a very small syringe and rush back to her. A black spot sits in the middle of her arm, darkening the area around it. You grip the syringe skeptically and inject it into the middle of the wound. She screams, the rags slightly muffling the sound. You pull the needle out, and black blood drips from its end. The black blood from the throbbing veins surrounding the wound are slowly retracting. You untie her and take the rag out of her mouth. She pulls the sleeve down and falls into your embrace, crying heavily. \n \n You try to comfort her as much as you can. Shortly after, you stand up and wrap your arms around her. She does the same, and you walk towards the door. A crowd of pitch-black bodies with shining white eyes surrounds you as you walk through the cellar. You walk up the stairs and stand in front of the altar in the darkness.\n \n *if (Ivanchoice)\n  *set rmdead true\n  \n  \n  \"I told you I'd only come when the time is right.\" You turn around to see ${capturer1} grinning behind you, a silver pistol in his hands. He raises it and pulls the trigger. You have no time to react or understand what happened. Only the falling body of ${Roommate} and the bullet hole in her chest makes you realize what happened as she reaches the ground. You reach for your weapon, but he kicks you hard in the stomach. You grab your stomach, then punch him in the face. He steps back and holsters his weapon. \"That was a mistake, kiddo.\" He chuckles and cracks his knuckles. You fight for several long minutes until he manages to pin you against the door. \n  \n  \"Don't you understand, kiddo? Your so-called friends are just holding you back! See how tough you are when something's on the line…why don't you understand that I'm the one, the only one, who just wants what's best for you?!\" He sighs heavily, then releases you. He steps back while you stand in front of the wooden door, panting with shaking legs.\n  \n  \"You have become stronger, gotta give you that. Still, I don't take defeats too well. Nor a draw.\" He winks, then jumps forward with his leg in the air. The only thing you have time for is to put your arms in front of your chest. The door gives in when you smash against it. You fall through and roll down the stairs. For a second, you see ${capturer1} coming down the stairs, whistling away with his hands in his pockets, but then your eyes close.\n  *goto madtowncont\n \n *else\n  \n  She's sniffling, not being able to speak from shock. You walk through the dark church, your footsteps echoing inside. You push the wooden doors open and step outside. Darkness flows through the air. Your power slowly leaves you, and it becomes harder to walk. You walk down the stairs, one leg after the other. The whispers in your ears intensify, and images of your torn legs flash before your eyes as you make your way down. At the last step, you collapse, and you can't find the strength to get back up again.\n  \n  \"No…no…please, just not now!\" ${Roommate} kneels down next to you and bursts out crying. She keeps shaking you, but your eyelids close.\n  *goto madtowncont\n  \n\n\n*if (Time \u003c= 0)\n *set rmdead true\n \n \n She growls quietly. Her cheeks are still shiny from the tears. You reach towards her, but step back when she looks at you with blood-red eyes. She struggles to reach you. In the cage behind you, the creatures have turned skinny, with enlarged heads and claws. She struggles until the note underneath her becomes visible. You wait for the right time, then swiftly pick it up.\n \n [i]\"If you're reading this, then everything went the way I wanted it to, ${firstname}. I have injected a mixture of what I think will mutate her body in the most dangerous possible ways. If you're fast enough, you should find the cure in my pocket. It will only work on her type of disease, while she doesn't turn. Happy struggling,\"[/i] the note reads in dried blood.\n\n You rush to his body and sink your hand into the pocket of his white lab coat. You find a very small syringe and rush back to her. A black spot sits in the middle of her arm, darkening the area around it. The darkness expands in front of your eyes, slowly taking over her whole body. You grip the syringe and inject it into the middle of the wound. She screams in a deep voice, the rags slightly muffling the sound. You pull the needle out, and black blood drips from its end. It doesn't seem to work. She sits up and rapidly tries to reach you. He body slowly becomes pitch black. When the last clear spot on her body turns dark, she closes her eyes. When she opens them again, she just keeps staring at you. \n \n You can't bear to look. You stand up and turn around to leave. She grunts quietly as you leave the room. A crowd of pitch-black bodies with shining white eyes surrounds you as you walk through the cellar. You walk up the stairs and stand in front of the altar in the darkness, still in shock.\n *page_break\n \n *if (Ivanchoice)\n \n \n  \"I told you I'd only come when the time is right.\" You turn around to see ${capturer1} grinning behind you. You begin to walk down to the church, and he walks along with you. Your head feels dizzy, and the thought has not yet sunk in fully. \"I had nothing to do, everything resolved itself! Your so-called friends are just holding you back anyway.\" He sinks his hands into his pockets. You push the wooden doors open and step outside. Darkness still flows through the streets.\n  \n  [i]\"It's your fault!\"[/i]\n  \n  [i]\"You killed her!\"[/i]\n  \n  [i]\"You abandoned her!\"[/i]\n  \n  [i]\"All hope is lost with you.\"[/i]\n  \n  [i]\"She should have never trusted the cause of her own death!\"[/i]\n  \n  The whispers inside your head keep intensifying. \"Well, that doctor though, hats off, really. He created a mutation and then cured it! He did both, how awesome is that? And you killed him…how lame is that, huh?\" ${capturer1} shakes his head as you begin to walk down the stairs, one leg after the other.\n  \n  Images of ${Roommate} turning and suffering flash before your eyes as you make your way down. At the last step, you collapse and can't find the strength to get back up again. \"Aw, kiddo! That's utterly rude. I was speaking to you!\" He kneels down next to you and spreads his arms. That's the only thing you can see as your eyes close.\n  *goto madtowncont\n\n\n *else\n  You begin to walk down to the church, trying to process what happened. It feels surreal, almost impossible to believe. Your head feels dizzy, and the thought has not yet sunk in fully. You push the wooden doors open and step out into the open. Darkness still flows through the streets.\n  \n  [i]\"It's your fault!\"[/i]\n  \n  [i]\"You killed her!\"[/i]\n  \n  [i]\"You abandoned her!\"[/i]\n  \n  [i]\"All hope is lost with you.\"[/i]\n  \n  [i]\"She should have never trusted the cause of her own death!\"[/i]\n  \n  The whispers inside your head keep intensifying. You grip your head as you walk down the stairs made out of human corpses. The squishy feeling underneath you sends shivers down your spine. Images of ${Roommate} suffering, getting tortured, and the painful process of turning flash before your eyes. \n  \n  At the last step, you collapse and can't find the strength to get back up again. Your father walks next to you and keeps staring at you. That's the only thing you can see as your eyes close.\n  *goto madtowncont\n  \n  \n*label madtowncont\n*page_break\n[i]\"Your soul weakens. Your body betrays you, along with your mind. How many more times will you fall victim to yourself? You're capable of protecting yourself, but who will protect you from yourself when it's required?\"[/i] In the darkness, the deep voice echoes again. His purple eyes shine deeply. Footsteps surround you. \n\nFrom ${Roommate} to ${currentbf}, everyone you've ever met circle around you very slowly in the deep darkness. They keep their eyes on you. Someone in a black hoodie steps forward and stops in front of you. He takes his hoodie off and looks into your eyes.\n \nYour vision falters for a moment when you look into your own eyes. The left eye is red, while the right one is purple. He grins, revealing his sharp fangs. Glancing down, you watch his enlarged black fingers ending in sharp nails twitching. He just keeps grinning at you. \n\nYou can't resist, but keep staring into his eyes. Pain and suffering is all you can feel when you look into his eyes, before a feeling of nothingness fills you.\n*page_break\n\n\"Wakey wakey, marked one.\" A black body with red tattoos crouches in front of you when your eyelids open. You jump slightly and search for your weapon.\n\n\"I knew that would be your initial action. I took your weapons. I'll give them back when you leave.\" His strong, muscular voice rings in your dizzy head. The leather you're lying on doesn't warm your body and feels uncomfortable. The rest of the house is destroyed; you're lying in the last remaining intact room of it. A clear view opens through the window frames, onto a dark street filled with madness. \n\nThe man in front of you crouches down. His dirty blue jeans cover most of his legs, which are lined with black spots. His shirtless, entirely black body has red tattoos carved into the skin. His eyes are deep red. From his back, bony wings reach high up. You just keep watching each other in silence, then he takes a deep breath.\n*page_break\n\n\"Can't fly with those. They just get in the way.\" He eyes you up and down. \"I've seen your mark. Mine was similar to yours before bones began to grow out of my body.\" He grins and combs his long black hair back with his fingers. \"I'm not like the others out here, but I prefer being here. I bumped into this place when I began to crave human meat. It's so delicious, though. It's sweet, but maybe you'll find that out on your own in the future.\" He stares out of the window by a wooden table. \n\n\"I like being here because I get to eat whenever I want, and no one bothers me. No one dares to try. I couldn't fit into any of the groups. They would either kill or dissect me in the long run. It's good for me here. If I didn't go insane and have to bear with this, I might as well live a calm life. Sometimes, I wander off to nearby hills and sit there peacefully as long as I can. I find it harder every day to remember back to the life I had.\" He reaches into the rotten table's drawer and throws your weapon and knife at you. \n\n\"I only wanted to talk with someone for a while, while I'm aware of myself. You can go now. In fact, you should. Staying here for too long infects the mind.\" He pushes a wooden bookcase aside, revealing the empty doorframe leading out of the house. You holster your pistol and knife, then head out. \"Best of luck to you.\" He pats you on the back and walks in the opposite direction.\n\nThe house is close to the gate. You walk past the fountain spewing out blood and head towards the wooden gate with oversized ravens sitting on top of it. Whispers of the worst kinds of thoughts. Images form from the darkness in front of your eyes. The ravens keep looking at you with red eyes. They caw wildly as you walk through the gate. When you step through, the darkness slowly disappears. The dim moonlight lights the deserted path in front of you. As tired and hurt as you are, you grip your pistol and head towards the hill.\n*page_break\n\nThe way back goes relatively smooth. Despite your poor condition, you manage to avoid most of the mutants in your way. You drag yourself up to the gate and signal to the guards. They open the gate, and you walk through. They close it behind you, and you take a second to grasp the reality of being alive, being behind the safe gates of ${base2}.\n\nThe dark, peaceful streets of ${base2} guide your way towards the chambers, where ${assassin} is sitting on the stairs. He's looking down, staring at something in his hands. One leg after the other, you walk up to him, whispers still stirring in your head. Your eyes burn, and your head feels dizzy. When you reach the small set of stairs, you stop in front of him. He's holding the note from the chamber, and he just keeps staring at it.\n\n*if not (rmdead)\n *achieve savior\n \"After all I've done for you, you lied to me. You looked into my eyes and said you weren't hiding anything.\" He looks up, into your eyes. \"She told me everything, though. What you did was brave, bold. But also very stupid and careless.\" He stands up and hands the ripped note to you. You pocket it and keep looking at him. \"Thank you, ${firstname}. You saved her. She'll be with me for a couple of days. It's understandable that she doesn't want to return to the place where she got kidnapped. This town and its security is a joke. I will not bow and turn a blind eye to the fact that my daughter almost got killed.\" He sighs. \n \n \"Anyway, just hold on, and we'll find a better place. Recent events made me realize what's important and what's not. Whether you want to join or not will be up to you to decide.\" He walks past you, giving the top of your head a small rub as he does so. \"Take a long rest. You deserve it.\" The sound of his footsteps slowly disappear in the streets. You stand in front of the chamber for a minute, then walk inside.\n *goto chambercont\n \n\n\n\n*if (rmdead)\n\n \"After all I've done for you…you lied to me. You looked into my eyes and straight-up said you're not hiding anything.\" He looks at you. His eyes are wet, along with his cheeks. \"I don't care how you came home. What matters is, you're alone. I know exactly what that means, you don't have to say a word. You know…one half of me wants to kill you right where you stand in the most brutal way possible, and the other half wants to do the same with myself. You knew more about her and tried more than I have in a while. But now it's too late for me to change anything.\" He becomes silent and punches the stair he's sitting on. \n \n \"Get out of my sight, while you can.\" He keeps sitting on the stairs. You walk past him, but he stands up and grabs your arm. \"Don't think for a second that I'll turn a blind eye to this. Who has to be punished will be punished.\" His breath quickens, and he lets go of your arm. You stand still for a second, then walk past the man who could bring down whole groups on his own. But he just sits back down on the stairs as you walk inside.\n *goto chambercont\n\n\n\n*label chambercont\n\nYou close the chamber door behind you and collapse on the bed. The ceiling is spinning. Thoughts cross your uneasy mind as you close your eyes and feel your head spinning.\n*page_break\n\n[i]\"How long can you bear the pressure for? Everyone snaps once. What will you do when you snap? Or maybe you've snapped already? Your own worst enemy is yourself when it comes to the topic of threat.\"[/i] The tall, muscular creature with the purple eyes walks closer in the thick darkness, revealing himself. He can barely be seen. \n\nThe black mist flows around him wildly as he walks closer. His long, ripped wings open widely behind him. His purple eyes only become darker. With every step, he sends a shockwave through the place, until your bones and insides can't bear the pain.\n[i]\"We'll see sooner than you'd expect.\"[/i]\n*if (rmdead) and (Lover = \"Lily\")\n *set loverstatus false\n *finish\n*else\n *finish\n ", "chapter7": "[b] Chapter 7 - Minds Collide [/b]\n\n*if (rmdead) and (lover = \"Matt\")\n Your eyes snap open when ${hisher2} lips press on yours. $!{heshe2} cups your cheeks with ${hisher2} palms and just keeps kissing you. When you realize what's going on, a smile appears on your face. You wrap your arms around ${himher2} and kiss back. \n \n \"You were gone for so long yesterday…but I'm glad you're alive. Don't scare me again like that, please.\" $!{heshe2} smiles and caresses your cheek. Before you have time to answer, ${assassin} kicks the door in. He's breathing fast and walks up to you with a pistol in his hands. He grips ${lover} by ${hisher2} clothes and drags ${himher2} off you. \"Get out,\" he says with his scratchy voice. ${lover} looks at you and walks out of the room. ${Assassin} turns to you and swiftly puts the barrel against your forehead. His eyes are redder than they usually are. \n \n The blood freezes in your veins, but you grip your own pistol under the covers. You bring the barrel of it out and push it against his thigh firmly. He glances down, and his hand shakes.\n *goto dcont\n \n*if (rmdead) and (loverstatus = false)\n *goto keang\n*if (Rmdead) and (lover = \"Lily\")\n *label keang\n Something pressed against your forehead wakes you up. After blinking a couple of times, ${assassin} holding the barrel of his pistol against your forehead appears in front of your eyes. His eyes are redder than they usually are, and he's breathing fast. The blood freezes in your veins, but you grip your own pistol under the covers. You bring the barrel of it out and push it against his thigh firmly. He glances down, and his hand shakes.\n *label dcont\n \n \"Go ahead. Do it. Worst case, I'll bleed out. Then I'll wake up again. Same can't be said for you. Your useless head will explode, and you'll go right where you belong. Where you won't be able to hurt anyone.\" He sniffles and pushes the barrel harder against your forehead. The door slowly swings open, and ${general} steps inside. He opens his mouth to speak, then freezes.\n \n \"What are you doing?!\" The General rolls his rifle into his hands and aims it at ${assassin}. He just keeps holding the gun against your forehead, while you slowly pull the pistol back under the cover. \"${assassin}, I don't want to hurt you. You need to put your weapon down, and explain yourself. I'm sure you have your reasons, they might even be valid, though you were risking my position just a couple days ago. I can't allow you to do this. Not here, not now. I'm not warning you again, I'll kill you if I have to.\" The General cocks his rifle. \n \n ${assassin} lowers the pistol and chuckles with wide eyes. \"You don't know the half of it. I'm a man with nothing to lose now. But you're right, he's not the one to be punished.\" He continues to laugh in a creepy way, as if he's come to the realization of his own power. He holsters his weapon, and ${General} opens the door for him.\n \n \"Wait for me outside,\" he says before closing the door, leaving the two of you in the room. \"We need to talk.\"\n *goto talktime\n \n*if (Rmdead = false) and (lover = \"Lily\")\n Your eyes snap open when ${hisher2} lips press on yours. $!{heshe2} cups your cheeks with ${hisher2} palms and just keeps kissing you. When you realize what's going on, a huge smile appears on your face. You wrap your arms around her and roll her onto the bed next to you. You keep hugging and kissing, happy just to be next to each other.\n \n \"Ahem.\" ${assassin} stands in the doorframe, but you keep hugging her. \"She didn't want to stay any longer. Tough like her father. Come, though. Life goes on. There's work to be done.\" He turns around and walks out of the room.\n \n ${lover} kisses you one more time, then looks deep into your eyes with the biggest smile you've ever seen on her face. \"I love you…and I'm glad you're alive.\" $!{heshe2} smiles and climbs out of the bed.\n \n \"I love you too…and the feeling is mutual,\" you reply, letting a small laugh out. She rubs your chest and walks towards the door. \"Take care, love. Nothing life-threatening today!\" She smiles and walks out of the room. You sit up in bed just as General ${General} walks inside. \"${firstname}, we need to talk.\" He stands in front of you.\n *goto talktime\n\n \n*if (Rmdead = false) and (lover = \"Matt\")\n Your eyes snap open when ${hisher2} lips press on yours. $!{heshe2} cups your cheeks with ${hisher2} palms and just keeps kissing you. When you realize what's going on, a smile appears on your face. You wrap your arms around ${himher2} and kiss back. \n \n \"You were gone for so long yesterday…but I'm glad you're alive. Don't scare me again like that, please.\" $!{heshe2} smiles and caresses your cheek. \"The amount of excitement we've had the last couple of weeks is enough for a lifetime…\" $!{heshe2} looks deep into your eyes and keeps rubbing your chest. \"I love you, and I'm glad you're alive. I don't want to lose you.\" $!{heshe2} gives your nose a smooch.\n \n \"I love you too…and the feeling is mutual,\" you reply and kiss ${hisher2} cheek just as General ${General} walks into the room.\n \n \"I…didn't want to disturb. ${lover}, could you leave us alone for a moment?\" the General says with his arms crossed behind his back.\n \n \"I wanted to go anyway. Work doesn't wait.\" $!{heshe2} smiles and hops out of the bed. $!{heshe2} winks at you and walks out of the room. General ${General} turns towards you with a serious look on his face. \"${firstname}, we have to talk.\"\n *goto talktime\n\n\n\n*if (Rmdead = false) and (loverstatus = false)\n You wake up to hear the loud laughter of ${roommate} and ${Roommate2}. You sit up in bed and watch them hugging and kissing in ${Roommate2}'s bed. ${assassin} stands in the doorframe with his arms crossed. \"I couldn't tell her to stay. She's tough, like her father,\" he says, then turns around. \"Come though, ${Roommate}. Life goes on, and work has to be done,\" he says and heads down the hallway.\n  \n ${Roommate} gives ${Roommate2} a set of kisses. They tell each other how much they love one another before she gets out of bed and walks towards the door. She stops when she gets there and turns towards you.\n  \n \"${firstname}…thank you. I wouldn't be here if you didn't come. You saved my life, and I just…left you there.\" Her smile fades. \"But I was scared to death…so…thanks again.\" She smiles and blows a kiss at ${Roommate2} before she leaves the room.\n  \n \"I…what? I don't know what happened. You saved her?\" ${Roommate2} sits on the edge of his bed with his arms spread wide. Before you have a chance to explain what happened, General ${General} walks into the room. He looks at ${Roommate2} and crosses his arms. \"${Roommate2}, could you leave us alone for a moment?\" he says, and ${Roommate2} stands up. \"Sure, I…I have to go to work anyway.\" He stands up and gives you a weird look before he leaves the room.\n  \n The General steps closer and looks at you. \"${firstname}, we need to talk.\"\n *goto talktime\n  \n*else\n *bug\n  \n*label talktime\n*page_break\n*set rads false\n  \n\"There are quite a few issues that I have to address here. The recent events in the laboratory, and the Professor's note he left behind…I didn't think you would be capable of such monstrosities. That combined with your disappearance…all of it points to a common enemy, wreaking havoc on the inside.\" General ${General} paces around the room. \n\n*if (hurtem)\n \"One of the guards has also been assaulted. They claim it was a younger-looking boy who's been roaming around with me and ${assassin}. Sounds familiar.\"\n \n*if (hurtem = false)\n\n\n He stands in front of you with an angry look on his face. \"While these claims and accusations are being invetigated, you are not to leave the gates of ${base2}. You will patrol the suburbs. Am I clear? I want to hear a simple yes or no.\" He runs his palm over his bald head.\n\n \"Yes,\" you mumble as you stand up.\n\n \"Good. Your duty starts today. I really hope the accusations are false. You should do the same. It's all you can do. Hope.\" He shakes his head and walks out of the room. He glances back one more time, then lets the door close behind him. You stand up and let out a small sigh. After having the worst breakfast of your life, you head out of the chambers. You make a small detour towards headquarters to change the filter in your gas mask. You sign the chart, then head towards the suburb. The guards grunt at the gate and let you in. The gate slams behind you, and you begin to head down the path you already know. \n\n*page_break\nFor a month, your days look the same. You wake up in the morning and patrol the suburbs. Except when unexpected sandstorms break loose. It looks like it only stops to become worse every time. Those days, you get to stay inside the chambers.\n\n*if (loverstatus)\n\n Those days feel like you're in heaven with ${lover}. $!{heshe2} is always by your side. The way ${heshe2} greets you every morning and eagerly awaits you when you get home brightens your days. You're glad ${heshe2}'s by your side, and you can tell ${heshe2} feels the same when ${heshe2} whispers the words 'I love you' into your ears.\n *goto s1\n \n*else\n\n Your afternoons are usually based on avoiding contact with others. ${roommate2} has made some new friends, and many nights they hole up in your chambers to chat. On the days you're stuck inside, you usually head out into the dining room. When you're not entangled in your own thoughts, you can be convinced to play card games with other residents of the chamber.\n *goto s1\n\n\n \n*label s1\n \n*if (lungscar) and (turning = false)\n\n\n Every time you try to do something slightly exhausting, you have to stop to catch your breath, and your lungs burn. Sometimes even the basic things, like tying your shoes, proves to be challenging. The condition of your lungs is without a doubt becoming worse every week.\n *goto s2\n \n \n*if (lungscar) and (turning)\n\n\n Every time you try to do something slightly exhausting, you have to stop to catch your breath, and your lungs burn. Sometimes even the basic things, like tying your shoes, proves to be challenging. The condition of your lungs is without a doubt becoming worse every week.\n  \n There are days when the black sun burns and twists away at your skin. Sweating all day and not feeling quite like yourself becomes a usual thing. When that happens, you're more irritable than ever. You crave the taste of meat, and your senses enhance.\n *goto s2\n \n*if (lungscar = false) and (turning)\n\n\n There are days when the black sun burns and twists away at your skin. Sweating all day and not feeling quite like yourself becomes a usual thing. When that happens, you're more irritable than ever. You crave the taste of meat, and your senses enhance.\n *goto s2\n \n\n*label s2\n*page_break\n*if (gavefilter)\n\n Sometimes you stay over at your mother's place. She seems to be very happy with your reunion, and you can't keep ${sis} away from you. She bombards you with questions and requests throughout your time there. ${newguy} mostly talks about work-related things with you.\n \n One day, they invite you inside. After having a fine lunch, your mother invites you to speak privately with her. ${sis} heads upstairs with ${newguy}, and waves at you on her way up. You sit at the dining table and wait for her to start speaking.\n\n \"${firstname}…this is very hard for me, and we've had several big arguments with ${newguy} about this. He doesn't want me to share this with you, but I feel like it's the least I can do…\" She looks away and closes her eyes. \"We're leaving this place. It's not safe, and I have a feeling it will only become worse. ${base2} has had its time. It was good while it lasted, but like everything, its time is limited. And it seems to be up. The glass shield is broken. Rations and the quality of food is poor. And most importantly, I don't feel safe here anymore. The point is…\" She leans back in the chair, and tears roll down her cheeks.\n\n \"We'll leave. ${newguy} knows a couple of military figures. They discussed it on a couple of field missions. We'll be taken care of, for his services. A couple of others are joining us. We'll leave tomorrow morning. I just…didn't want to leave you in the dark. I want you to know that I'll always love you, and never forget you. But…we can't take you with us. I can only take ${sis} with me. I know you can take care of yourself, ${firstname}. You'll always be my son. My big, brave son. But I just can't take you with me. This is the hardest choice of my life. I'm…really sorry.\" She stands up. You stare in front of yourself, processing what she just told you. She kisses your forehead and gives your head a small rub before she walks towards the stairs. \"You should leave…we have to pack and get ready.\" She heads upstairs, holding her tears back.\n \n You stand up and leave the house.\n *goto s3\n \n \n*else\n\n\n Sometimes, you see your mother and ${newguy} making their way here and there. They try to avoid looking at you as much as they can, while others still whisper to each other and point at you.\n \n One early morning, a small crowd with stuffed backpacks and bags heads down the road, led by your mother and ${newguy}. You walk after them. They're heading towards the junkyard. They cut through the fence and begin to climb through the junk and scrap, towards the wall. The hole has been fixed and covered with iron sheets. More of them glance back as you reach closer. They whisper to each other, then some of them turn around and point their small, handmade guns and bent, rusty knives at you.\n \n \"Get back, dog, or this junkyard will be your grave.\"\n \n \"He's the one who killed that little girl!\"\n \n \"This is where you belong. The military will come for you.\"\n \n \"Run while you can…\"\n \n \"You haven't seen anything. Got it?\"\n \n They threaten you, and some of them come closer. Realizing you can't take on all of them, you begin to walk backwards, but keep your eyes on them. Around an hour later, you wander back to find the iron sheet lying in the corner. The wall has a huge hole around the same spot it was before, only bigger. After reporting it to ${General} and receiving disgraceful comments, you head home.\n *goto s3\n \n*label s3\n*page_break\nThat night, you can barely fall asleep. Thoughts swirl inside your head. \n\n\"She already buried you.\" ${capturer1} leans against the doorframe. \"In fact, I'm sure she buried you the moment she found ${newguy}.\" ${capturer1} pushes himself off the doorframe and walks around the room. \"She wanted to forget, and that she did. Until you came. But no, she didn't want anything to do with you anymore. To her, you were dead. You just stirred up her feelings. So they had to leave. In the end, maybe it's all your fault.\" ${capturer1} stops with his back to you, and he barely turns his head back to look at you. \n\n\"Just like many things…thinking about it, I'm better than your mother. I'm here, even though all you have done.\" He chuckles and walks out of the room. You roll from side to side for many hours before you finally manage to fall asleep.\n*page_break\n\n[i]\"Do you know what makes someone powerful? What people are referring to when they call someone powerful?\"[/i] The dark figure walks closer, revealing his suit. His purple eyes shine in the thick darkness. The bottom of his nice, grey suit with moving black lines hovers behind him, disintegrating and reforming again from darkness. His black shoes echo on the ground. He stops in the distance and puts his hands into the pockets of his grey trousers, with darkness running up on it. \n\n[i]\"People usually refer to strength or skill when they call someone powerful. But real power is knowledge.\"[/i] He disappears, then a second later he reappears in front of you. His purple eyes stare deep into yours. His face looks ordinary, apart from his fangs and the darkness running up his face. He continues, emotionless. \n\n[i]\"I know everything. Past, present, nothing can be hidden from me. Future, though. I can only take very close guesses. Like so many of us, I can change the future. But not as a regular living being. I can change the future of an individual, let them find me.\"[/i] He puts his long, sharp, blackened finger on your wound. The black sun throbs like a heart desperately trying to return to its host. It begins to twist around when the man disappears, leaving a cloud of darkness in his place.\n\nYou step back as he appears to your left. [i]\"I will let you take a sip from the fountain of my knowledge.\"[/i] He flicks his finger with the same emotionless expression. A red door made out of flesh grows out of the ground, with an eye at the peephole. [i]\"Behind this door lies the sacrifice of ${General}.\"[/i] He turns around and takes a step. Before his foot reaches the ground, he blinks a great distance, and moves a door up from the ground with the movements of his fingers. \n\nA door made out of broken glass and fading pictures emerges. [i]\"Here lies the truth about ${assassin}.\"[/i] He points to your left, and the ground opens. He turns into darkness, and flows towards the new door rising from the ground. \n\nThe door is made out of severed and stitched limbs. Blood drips from the still-moving limbs. [i]\"If you cross this door, the truth about ${capturer1}'s turning point will be revealed to you. Choose wisely, you can only pick one door. Cross one, whenever you're ready.\"[/i] He crosses his arms behind his back and blinks into the middle.\n*fake_choice\n\n\n #Choose the door to my left, General ${General}'s sacrifice.\n  *achieve generalspast\n  You take a few steps to the left, leaving your footsteps in the ground. You push a handle made out of sticky, gooey flash down. It pulses under your hands as you walk through the door.\n  *page_break\n  \n  \"All right, it's almost our turn in line. It'll just be a basic check-up to see if we're healthy. We are, so it'll be okay.\" ${General} stands in a green military uniform, boots, and a hat on top of his gas mask. Next to him is a woman in a nice dress and a small boy in nice brown clothing. People are standing in line behind them, as far as the eye can see, past the military fences. They're surrounded by military guards and huge hangars. In front of them stands a couple of people, with another military personnel holding a pen and a set of papers.\n  \n  \"How did you get us on the list?\" the woman asks, rubbing the boy's head.\n  \n  \"It wasn't that hard. Actually, I only had to ask the General.\" ${General} shrugs.\n  \n  \"I don't like him. There's something about him that gives me the chills.\" The woman shakes her head.\n  \n  \"I know…I feel the same way. But he was nice for once. Come on, it's our turn,\" ${General} says as the people in front of you walk into the hangar behind the military guard with the paper.\n  \n  \"Lieutenant ${General}, what a pleasant surprise. What brings you here?\" a tall but rather slim man asks.\n  \n  \"We're here for the evacuation, General Sir. But you already know that.\" ${General} chuckles.\n  \n  \"Yes, of course I do!\" The man in front of him laughs and keeps looking at the papers. \"What's your name again?\"\n  \n  \"You know my name. I'm ${General} Myers,\" he replies, crossing his arms.\n  \n  \"Oh, yes, yes. The Myers family. Weird, I don't see your names here. Please step out of the line, ${General}, and head back to your quarters.\" The man points away.\n  \n  \"What? But you promised we would be on the list! Doesn't that mean anything?\" ${general} steps closer.\n\n  \"I don't remember doing such a thing. Now, please leave. The people behind you are getting upset and impatient.\" The General pats the shoulder of ${General}.\n  \n  \"Why…why are you doing this? At least let my family go…I'll do anything, please!\" ${General} shakes his head.\n  \n  \"Anything…I see…all right, I'm not an animal or something. I mean, we worked together and all that. Come, you three.\" He turns around and walks closer to a guard. \"Tell the rest of the people we're closed for today, they should come back tomorrow for the last round of evacuation.\" He crosses his arms behind his back and walks with ${General} and his family towards a smaller building, next to the hangar.\n  \n  *page_break \n  \"Silly citizens. Today's is the last evacuation group.\" He shakes his head and opens the metal door of the building when they arrive. They walk inside a small, empty armory. In the middle sits a young boy, tied to a chair. Four guards step out from the corners and aim their rifles at ${General}. He's about to speak when the man puts his fingers to his lips.\n  \n  \"I'm already fed up with your voice. Please don't speak. Or you'll get killed. So, the scene is the following. There's only one place left on the chopper. That's a shame. But how, oh how could I let the son escape on their own? Without mom or dad by his side. Your choice is simple, ${General}. Kill this boy here, and your wife and son will have a safe, guaranteed place on the last chopper. Or kill your son, and your wife will enjoy a peaceful life on her own. You have one minute. I suppose you could use your weapon. A wrong move though, and the guards will pop all of you. Be wise.\" He laughs and leans against the wall. The boy and the woman begin to cry and keep speaking in a panicked voice.\n  \n  \"Why…why are you doing this?\" ${General} hugs his family and pulls them closer to him.\n  \n  \"Why? You've always spoken so lowly of anyone outside of the military. They are people, after all. After all this, you'll join them. Join their survival. Apart from that, I don't like you. And you don't like me either. But the main reason is, I know you want my place. Don't bite off more than you can chew, Lieutenant. Clock is ticking, though. Act now, or all of you will die.\" The man laughs and cocks his pistol.\n  \n  ${General} shakes his head and rubs his own forehead. He slowly raises the pistol from his belt with shaking hands. The woman holds the boy close to himself, and steps back. Both of them keep crying, and shouting at ${General}. He raises the weapon, and points it against his own son. \n  \n  \"Five… Four…\" The man at the wall says, and raises the pistol. ${General} swiftly aims towards the other boy tied against the chair. His scream is muffled by the bandage stuffed into his mouth. ${General} pulls the trigger, and the young boy's head snaps back. ${General} freezes, then drops the weapon and falls on his knees. He bursts out crying. The door swings open behind them, and more guards storm in.\n  *page_break\n  \n  \"What's going on here?!\" They ask in a threatening tone, then raise their weapons.\n  \n  \"Everything is under control. The Lieutenant has just murdered this boy. We tried to stop him. I guess he's snapped. Take the woman and the boy on the chopper. Their names are on the list. They are innocent. As for ${General}. For his crimes against our society, and for bringing shame on the insignia, I ban him from military grounds for life. Take his clothes and weapons away, then throw him out of the base. He doesn't deserve to wear this uniform. If he comes close to the base ever again, kill him. Pass this to every other outpost. For now, you are forbidden to kill him though. This is the order. Dismissed.\" The man says, and walks out of the room. \n  \n  He whispers quietly as the guards grab ${General} under his arms and begin to drag him out of the room. The woman and the boy scream after him as they're being taken to the hangars. ${General} keeps staring in front of himself. The heels of his boot bounce on the ground as they drag him. At the storage room, near the exit, shouting comes from behind him.\n  \n  The guards turn around with him, and a strong man in a red striped shirt jump on him. He raises his fists and begins to pummel ${General}'s face. Through his screaming, it becomes clear that he is the boy's father. When the filter breaks out of his gas mask and rolls away, the guards hold the man back. \n  \n  They push him into the arms of another set of guards, and they take him away. ${General} breathes slowly. Tears roll down his cheeks, mixing with the blood on his face. The guard walks into the storage room and brings out some thin duct tape. He grips the filter and screws it in as much as he can, then wraps it with the duct tape.\n  \n  \"Good enough. You won't die here, that's enough for us,\" the guard says and throws the remains of the tape back into the storage room. \"Good luck out there, psycho,\" the other guard says and sinks the bottom of his thick military boot into his chest. ${General} gasps for air as he rolls down the small hill. The gate slams shut, and he lands on top of a heap of rotting bodies. He climbs off the bodies and keeps lying on his stomach on the deserted ground. He turns his head and looks at the peaceful forest to his right. He keeps crying quietly, then closes his eyes.\n  \n  [i]\"Let's fast-forward to a more interesting part. Perhaps to the present?\"[/i] The voice shatters the image before you and replaces it with a new one.\n  *page_break\n  \n  \"You've done a great many things to have ${base2} be where it is. That's why I promoted you to General. Do you think that the boy murdered the professor? Do you really think he's the one causing madness from the inside?\" the ${leader} asks, leaning closer to ${general}.\n  \n  \"I'm not sure…I'd like to say no. I will investigate the issue though, and you'll get a full report.\" General ${General} nods.\n  \n  \"Sure…but perhaps there's no need for that. Hell begins to break loose, and you're failing with so many things. Demonstrating power, demonstrating what would happen to those rebelling against me. Also, you keep promising the Oracle's appearance. When? I can only ask this, when? Also, needless to say, I want you to reach him. You will know what to ask for. The rise of ${base2}. Are we clear?\" The ${leader} stands up and places his palms on the brown desk.\n  \n  \"Yes…\" General ${General} mumbles.\n  \n  \"Good. Dismissed then.\" The ${leader} sits back down as ${general} walks out of the office.\n  *page_break\n  \n  \n  \n  \n  \n \n #Choose the door in front of me, the truth about ${Assassin}.\n  *achieve keithspast\n  You take a few steps forward, leaving your footprints in the ground. You can't see your own reflection in the glass shards. You push the broken glass handle down and walk through the door.\n  *page_break\n  \n  \"I won't say it again. Hand me the backpack. I know you have food in there,\" ${assassin} says in the middle of a green room. He's wearing brown jeans, a red button-up shirt, and a nice black suit. He holds a pistol with a long barrel. The woman cries in front of him on the couch. A man stands to their right by the campfire, holding a backpack in one hand and a knife in the other.\n  \n  \"I'll count to three…then I'll take it from your cold, dead body. One ay.\n  \n  *page_break\n  By the time he makes it a couple of streets into the district, the sun has already begun to go down. The trail of blood he leaves behind shines under the moonlight. He's sweating heavily, and drops on his back to pant. The bleeding has stopped, but his palm has turned black from the blood. He rips the shirt off his shoulder and keeps staring at his wound. The long cut separating his shoulder from his arm is black, with a black sun forming around it. It twists and bends. Spikes slowly grow out of it and surround the wound. \n\t\n  He clearly panics and climbs down the dirt road as fast as he can. When a huge light flashes and explodes in the distance, he falls on the ground. He stumbles up to his feet and walks towards the purple light coming between the trees. The black sun throbs faster as he gets closer. A black, twisting spike grows out of his shoulder. He grunts in pain and rolls down the hill, into a small crater. In the middle stands a huge cave with spikes lining the entrance. Deeper inside the cave, a purple ball swirls around, emitting lightning in all directions. Mutants of all kinds run and fly around wildly, but ${assassin} walks through them. They don't mind him, apart from a couple of them taking a closer look. The black sun throbs rapidly. \n\t\n  His gas mask shatters to pieces when he's about to reach the purple ball. He screams and rips it off his head. His face is covered in glass shards, one of them in his left eye, which he keeps shut. He grunts in pain with tears rolling down his cheeks. He reaches the purple ball and puts his finger on it. \n  \n  He closes his right eye and walks through it.\n  \n  [i]\"Let's fast-forward to the interesting part.\"[/i] The voice fills the darkness.\n  *page_break\n  \n  ${Assassin} kneels in front of a huge black throne made out of darkness. It flows towards him as the man with the purple eyes and the nice suit stands up.\n  \n  [i]\"So…what is it that you wish for? I can give you immortality, I can make you resistant to the harsh elements of the radiation, I can-\"[/i] He taps his fingertips as ${assassin} cuts into his sentence.\n  \n  \"I…I want to be immortal. I want to survive this and be immortal. I need to protect my family. They need me!\" ${Assassin} grunts in pain as a black snake rolls up his hand.\n  \n  [i]\"Do they, now. What does a hired gun, a hitman, a cold-blooded killer want to do with immortality? I doubt it's to protect his family.\"[/i] The man flaps his wings, bending the darkness.\n  \n  \"I'm not like that anymore!\" ${Assassin} shouts, then grips the spike on his shoulder. He screams and breaks it off.\n  \n  [i]\"You just murdered a family. The woman was hiding something you didn't know was there. Anyway…you wish to have immortality. So be it…\"[/i] The man flicks his finger, and the snake slides up to his throat. ${Assassin} struggles as hard as he can, but the snake chokes the air out of him in a minute. After that, it retreats, leaving ${assassin} on the ground, just staring into the darkness. His eyes turn dark red, and tiny fangs replace his teeth. The black sun burns into his shoulder, and the spikes slowly retract. He blinks a couple of times and gasps for air.\n  \n  [i]\"From this moment forward, you are immortal. But…whenever you take a fatal blow, someone else will die. When something is taken, something of equal value has to be given as well. Balance dictates that. Our very existence depends on balance. The subject will die instead of you if their like towards you is mutual; if they like you, but you are neutral towards them, or when you like them, but they are neutral towards you. Someone who hates you, or someone you hate cannot die. No matter how the other person feels. You died not long ago. And you're here now. Thus, your wish was already granted by then. Someone died for you. Someone who feels the mutual liking, or love towards you.\"[/i] The man in the suit stands tall with an emotionless face.\n  \n  \"You…you tricked me! Who died?! And what have you done with me?\" ${Assassin} jumps up and rushes towards the man.\n  \n  [i]\"Begone.\"[/i] The man holds his palms out, and ${assassin} falls onto the ground in front of the purple ball just as it disappears. He stands up and clenches his fists. He screams, then makes a run for it. Most of the mutants chase him. His breath quickens without having a gas mask on.\n  \n  [i]\"Fast-forwarding…\"[/i]\n  *page_break\n  \n  ${assassin} breathes hard in the decontamination chamber and pushes the doors open when it's finished. He jumps out into the white room, where a younger version of ${Roommate} is on the ground, crying next to a woman. ${Assassin} kneels down next to her body. Her neck is red and blue, as if someone had strangled her.\n  \n  \"She…she just collapsed and…and her chest didn't move, and no air was coming out of her mouth, and…\" ${Roommate} weeps. ${Assassin} wraps her in a hug and pushes her head into his own chest. \"I will protect you…no matter what…you're all I have left,\" he mumbles. Tears roll down his cheeks. The image freezes before your eyes.\n  \n  [i]\"He was the first one to reach me. What could he be doing right now, I wonder?\"[/i] The voice rings in your ears as the image shatters and burns away before your eyes, and the next one is revealed from the shadows.\n  \n  ${assassin} is sitting on the edge of his bed, holding the old picture of ${Roommate} in his hands. \"If only you'd known how much I worked to save you. I went as far as to work on your hatred towards me. I do everything I'm told. But that will come to an end soon. Why did I even ask for anything from that thing…\" He puts the picture down and slams his fist into the wall a couple of times, then buries his head in his hands.\n  *page_break\n \n \n \n \n \n \n #Choose the door to my right, ${capturer1}'s turning point.\n  *achieve ivanspast\n  You take a few steps right, towards the door. You grip the gently twitching wrist that serves as the handle of the door, then push it down. The door swings open, and the stitched skins pulse together as you walk through the door.\n\n  \"Was about time to set off, bro. I think they were about to come back.\" ${capturer1} walks on the freshly demolished streets of Ignobilis. His loose, thin, brown hoodie swings behind him. His red V-neck shirt is pressed against his body from the wind. His skinny jeans disappear into his boots. Next to him walks a man of about the same size, wearing the same clothes. Only the colors of his clothes are the opposite. They both wear huge, stuffed, red backpacks on their backs.\n  \n  \"Probably. I'm pretty sure we had an hour left, though. We studied them for days. We could've taken more of their stuff. That woman chained up was pretty scary, though. Her flesh was just sliding off her weird body.\" The man next to him laughs. \n  \n  \"Yeah. Did you see her hands, too? They were weirdly big. I wonder what was up with her. Say, how about we sit down somewhere peaceful and have a proper lunch?\" ${capturer1} chuckles as they walk through an alley.\n  \n  \"Peaceful…come on…I thought twins have most things in common. I'm certain our brain is not the same size.\" He laughs and punches him on the arm. ${capturer1} laughs and tugs on his gas mask. \"Okay, Renat, how about that? We might even find something interesting inside.\" He points towards a big chimney behind the buildings.\n  \n  \"Sure thing…\" He shrugs, and they set off towards the small factory in the distance. The fences are chained together, and a padlock keeps the gate shut tight. Renat tugs on the fence and glances up at the barbed wire running along the top. ${Capturer1} kicks the fence a couple of times, but it only releases a loud rattling noise. \n  \n  \"Yes. Now I'm pretty sure our brains are not the same size.\" Renat shakes his head. They turn around and take a few steps down the street to their right. At the end of the street by a broken white van, a group of men and women stop and stare at them. They hold sharp and blunt objects, and they begin to run towards them while they shout at them. Renat turns around to run, but a couple of them appear at the other side of the street as well. He curses, then begins to climb up the fence. \n  \n  *page_break\n  \"We would have an easier time running!\" ${capturer1} jumps on the fence and begins to climb up next to him.\n  \n  \"Not with that many of them,\" Renat says as he places his hoodie over the barbed wire. As he jumps over, he grips it tight and pulls it down with him. ${capturer1} does the same, and they rush to the entrance through the tall weeds. The entrance is locked with another padlock. Renat pulls his small brown pistol out and aims it at the padlock. \n  \n  \"No…no, don't!\" ${Capturer1} pulls a thick, sharp knife out from the back of his belt and starts smashing the padlock with the hilt. The padlock falls off, and they rip the door open. They jump inside and shut the door.\n\n  The dark factory is filled with machines. The stairway at the end of the room leads up to the offices, and the corridor on the right seems lead further into the factory, with small chambers for workers on the right side of it.\n  \n  \"What's gonna happen if they find us here? We'll die…they'll surely kill us. We shouldn't have robbed them.\" ${capturer1} paces, rolling the knife in his hands.\n  \n  \"We'll fight, or escape somehow before that can happen. Would you stop that?\" Renat puts his hands in his pockets and walks further into the building, down the corridor.\n  \n  \"How can you be that calm? Have you seen the size of their group?\" ${capturer1} walks after him and puts a hand on his shoulder. Renat stops. He turns around and gives him a slight hug. \"Because I'm confident in our skills. And what good would panicking do? Clear your mind, think straight. Now, let's find a way out, dumbo.\" He laughs and heads further down the corridor.\n  \n  [i]\"Let's fast-forward to ps ${capturer1}'s head with one hand and slaps his cheeks gently with the other one. He grins and sinks the spoon down into the stew, then lifts a big spoonful up to ${capturer1}'s mouth. \n\n  \"Open up. You need the nutrition. You don't want to die after all, now do you?\" The man chuckles. ${capturer1} frowns and spits between his eyes. He tries to throw a couple of punches at him, but the chains carve into his wrists. Blood runs down his dirty forearm.\n\n  \"Now, now…open up and eat. We don't want you dead, just like that. I'll cut off your lips and kick out your teeth otherwise,\" the man says in a very quiet tone of voice. ${capturer1} opens his mouth. The sticky goo made from his tears and blood stretch over his cheeks.\n\n  \"Well, I haven't thanked you for your kindness yet,\" the man says as he puts one spoonful after another into ${capturer1}'s mouth. \"That factory you found. It'll be a perfect base for us. I have yet to come up with a name for it. You should give credit to yourselves. Your attempt to rob a bunker packed with ex-military soldiers was pretty brave. Opened our eyes as well. We were careless,\" he says as he stuffs the last bits of stew into his mouth. \"I hope the stew was fine. It was cooked from a very prime piece of meat.\" He stands up, then disappears for a minute, then the door opens again. He walks back in, dragging Renat's body. He throws him on the ground. Chunks of meat have been cut out of his back.\n  \n  *page_break\n  \"You filthy cannibal.\" The man laughs heavily, then suddenly grabs ${capturer1}'s head and squeezes it so tight he bites his own tongue. \"Look, you filth. Look at what your actions have done to you. You, and only you, are the one to blame. Your actions have consequences. In this case, fatal ones. When you walk the streets again, think about this. And spread the word that we are not to be messed with.\" He releases him, but he just keeps watching the body with red, wet eyes. \"But that won't be just now. I've  in the lobby, and they walk up the stairs and stop by the rusty railing.\n \n  \"Thanks for gathering around.\" ${capturer1} places his hands against the railing. \"You might be wondering what's going on. Change of leadership, is what's going on. Your beloved leader was weak and careless. I will change this place. I will make it bloom. This place will be the start of an empire. We will build and expand. We will conquer. You won't have any problem with food, and the quality of your lifestyle will improve too. In return, I only require hard work and honesty. Join me, ${capturer1}, and be part of…${base}. Or…leave. You have the chance to leave right now, if you want to doom your own future,\" he says, and a handful of people walk out of the factory. \"Those of you who stayed…are you with us or against us?\" ${capturer1} puts his hands up, and the crowd cheers.\n \n  \"Nice speech. Hope it's not just sugarcoating our real source of doom.\" ${capturer2} crosses his arms and shakes his head slowly.\n \n  \"I am capable of reaching what I have in mind. And you'll help me. I'll make you my right hand. In fact, I have your first mission. Find the most loyal people worthy of fighting for me. Also, get rid of those who just walked out. They're a threat, holding valuable information. Who is not with us, is against us. We can't allow that, right?\" ${capturer1} chuckles, then heads towards the office. \"Also, clear up the bodies before they begin to rot away here.\" He laughs as he steps over the two guards at the door and walks into the office. ${capturer2} nods and walks down the stairs.\n  *page_break\n\n  \n\n  \nThe image before you freezes and turns grey before it gets swallowed by darkness. From the darkness, the man steps out.\n\n[i]\"I have shown you a fragment of what I can see. Whenever I want to. Understand that knowledge is the real power.\"[/i] The doors around you shatter to pieces, and he disappears, leaving only a black cloud behind.\n*page_break\n\n \nA month
