<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Doomsday on Demand 2 — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "doomsdayondemand2", "title": "Doomsday on Demand 2", "scenes": {"chapter1": "[b] Chapter 1 - Resurrection [/b]\n\n\n*set Clothing 55\n*set Age 15\n*set Evil 50\nAfter a long while, you set foot in the half of the district you have left. Ignobilis. You're almost out of food, and the industrial area is empty. You walk through the streets in the dawn light. The small street is paved with buildings, corpses, and remains of vehicles, just like you remembered. You search for loot, but you can't find anything useful. You reach the end of the street. \n\nA small dirt road leads through a red cornfield. It's taller than you, but you keep walking down the road aimlessly. When you step out of the cornfield, a huge, green base comes into view.  It's surrounded by watchtowers and a spiky fence. You can see trucks, a few tanks, and a helicopter inside, along with several buildings and tents. People patrol behind the fence. You take a left turn and carefully make your way towards the back, which faces a thick, dark forest. You hide in the bush and keep watching. The fence is in good shape, along with the spikes on top.\n\nOn each side, a watchtower stands with guards. You keep waiting for a while, thinking about a way to get inside the military base, but it seems impossible. You're about to give up when the guards signal to each other and climb down the watchtower. You wait until their vision is blocked by the long building on each side, then rush towards the fence. You climb until you reach the top of it, but the spikes prove to be challenging. You manage to fight the jacket off of yourself, then fold it and place it on a couple of spikes. As you push yourself over the thick fence, the spikes sink into the jacket. You land on the other side and run behind the building. You peek out, but only see a couple of others patrolling in the distance.\n\nYou walk over to the entrance of the building, sticking to the wall. You slowly open the green metal door and walk inside. After the quick decontamination process, you step out into a brown room. Lockers stand on each side, with sets of benches in the middle. You try most of the lockers on the left, but they're closed and locked. The last one on the right appears to be open, however, and you find some clothes inside. You take black leather gloves out first and put them on. You hear the door opening, and your heart stops for a moment, but you keep changing quietly.\n*page_break\n\n\"You've missed the shower. Again. While everyone starts with that, you're here stinking,\" a deep voice says as they open the lockers to your right.\n\n\"Like you showered,\" someone replies.\n\n\"Yeah…didn't feel like it. Anyway, what do you think about the Sons of Tomorrow? I heard they're expanding pretty fast. They've broken down parts of the walls separating the districts. And destroyed the dives, sort of. Ignobilis…I've heard the other gangs are pretty scared. Also, the individuals disappeared from the streets. They had to join a gang. Or they are just simply dead? Do you think they could be a threat someday?\" You peek out from behind the door of your locker and see two strong-looking soldiers switching to military clothes. You take your trousers off and put your pistol in the locker while you change into the camouflage pants.\n\n\"No…just a bunch of Pauper losers. They always wanted to bite off more than they could chew. Of course they destroyed the Dives. Bunch of losers as well. Regarding the walls…it's easy to break down a wall with no one guarding it. They should try breaking down the main wall. Our Command Centers are blocking every potential way out. They should try though, it would be as easy as taking candy from a little kid. Speaking of kids…are you new? I haven't seen you around before.\" You peek out to see a bald guy looking at you.\n\n\"Yeah…got transferred this morning,\" you reply confidently, but your heart is beating faster than ever. \n\n\"Cool…which Center did you come from?\" the tall, bearded guy next to him says as he buttons up his green shirt.\n\n\"Where we come from doesn't matter here.\" You take your shirt off and grab the black one from the locker.\n\n\"Looks like you've been through a lot. A man's amount of scars tell you how good of a soldier he is. Your scars say you're an awful one.\" The bald guy laughs, and you force a laugh as well before he continues. \"Did Lieutenant Sully give you a hard time? He likes to mess with the newcomers.\" He puts his green cap on.\n\n\"No…he was quite nice.\" You fix the sleeve of your new shirt. The bald guy crosses his arms and frowns.\n\n\"That's cool. Because I'm Sully. And I'm no Lieutenant. But I'll get the Lieutenant, and we'll sort this out. Watch him.\" He heads out of the building.\n\n\"Don't make this harder than it has to be, boy. I'd recommend that you close that locker and sit down. Or I'll be forced to shoot you. And it will hurt.\" The bearded guy steps closer and puts his hand on his holstered pistol. \"Sit.\"\n\n\"Okay, but this is all just a misunderstanding! I can explain everything!\" you say, gently taking hold of your pistol in the locker. \n*page_break\n\"So…I was supposed to come with others, but we got attacked on the way…I barely survived, and…\" You rip the pistol out of the locker and pull the trigger twice. He falls back with bullet holes in his chest and between his eyes. He stares at the ceiling as his blood flows under the lockers. \n\nYou quickly put the filters in your pocket and take the ammo from his pistol. You take his slightly bloody green cap and put it on your head. You finish with the decontamination process and head towards the main entrance. Before the huge fence, there also stands a barrier. The base is filled with soldiers. As you walk past the buildings and fields, you see them doing target practice, running, and fixing vehicles. As you reach the barrier, a guard flips his rifle into his hands and steps closer to you.\n\n\"State your business, soldier.\" He looks into your eyes.\n\n\"The Lieutenant told me to head out. It's confidential.\" You cross your arms behind your back, resting it on the pistol in the back of your trousers. The guard stays silent for a second, then nods once. He walks inside the tent next to you, and the barrier opens up. The guards from the watchtower look at you, and the fence opens up. You walk through it and casually begin to make your way towards the cornfield. When you're halfway through, you hear sirens coming from behind you. You peek back, then begin to run. You run through the corn as fast as you can. The sounds of vehicles and people shouting to each other come from behind you. You run through the city and enter a tall building that used to be an apartment complex. You run up to the top floor and enter a room. \n\nYou walk over the destroyed remains and stand between the wall and the wardrobe at the window. Their voices surround the area, and you peek out sometimes. Throughout the day, they patrol the area. When the sun begins to go down, their voices get distant. When you're certain they're gone, you push the wardrobe against the front door and collapse onto the dirty, ruined mattress.\n*set clothing 0\n*page_break\n\n*if (deadend)\n *set Deadcount + 1\n\n \"Clear this mess up,\" a distant voice says as your vision fades into nothingness.\n\n You open your eyes to find yourself standing in a dark room. Fog surrounds you, and wind stirs up the mist. On the other side of the room sits a dark figure on a black, shadow-like chair, looking down. Mutants you have and have not seen yet run around. Thousands of them run past you, circling around the both of you.\n\n [i]\"I cannot let you die just yet. You are far too interesting a creature to just let you die. There's a great chance that we'll meet one day, anyway. Use your second chance well, there won't be any more like these…after all, you're becoming one of us now.\"[/i] The figure looks up slowly. As you meet his dark, purple, glowing eyes, your wound begins to burn so much that you drop to your knees and close your eyes.\n *page_break\n \n The whole room. It's so cold. Every muscle and joint in your body shivers from the cold breeze running through it. Your lungs burn as you take a couple of small breaths. Opening your eyes feels impossible. It feels as if something is taped over them. Chains seem to hold your wrists against whatever you're lying on. Your ears ring slightly, and it feels as if your head's been pummeled for several hours, along with your body.\n\n \"Ah, Professor. Patient #285 is reacting well to the antibiotics. It's…unlike anything I've ever seen. That wound, it seems he survived an attack. From one of them. I wonder how the infection stopped…this is truly remarkable.\" The tape from your eyes gets ripped off, and you hear a small clanging sound. Your wrists are free. As much as the harsh light blinds you, you can see a man in a white lab coat walking around you, talking to another man through the open door to the hallway. \"Let's take him to the testing chambers. Imagine the possibilities if we experimented a li—\" The room shakes as loud explosions and gunshots replace the sound of the conversation.\n\n \"It's the Sons of Tomorrow!\" The man in the lab coat shouts and pulls out a small pistol from the back of his trousers. As much as you try to resist it, your eyelids shut down for a couple of seconds. You catch moments of shouting and guns firing. When you next open your eyes, the man in the lab coat and the professor from the hallway stand by your feet, both holding a small gun in their shaking hands. Blood flows towards them from the fresh corpses in the doorway. After a couple seconds of silence, two soldiers blind you with the flashlights on their rifles. They pull their triggers repeatedly. The men by your feet shout as their blood splatters on you. They fall back onto your bed, pushing you to the ground along with the mattress you're lying on.\n *page_break\n\n \"He-e-ey, kiddo. Comfy enough?\" ${capturer1} laughs as you lie on the cold floor, blood soaking through your clothes. \"Gah, the fighting spirit in this one! I killed you, kiddo, remember? I was like, bang bang, and you went all eeee and waaaa and your blood splattered all around. Then you closed your eyes. I mean, technically, they were wide open. Like a guppy!\" He bursts out laughing. \"But you get what I mean…I left you for dead. So be a good boy, and die!\"\n\n His laugh fades, and he pulls out a big silver pistol. You stare down the barrel, paralyzed, and then he pulls the trigger.\n *page_break\n\n When you open your eyes, you find yourself coughing heavily as some thick liquid drips into your mouth. When your eyes get used to the flickering but harsh light hanging from the ceiling, you realize that the man with the lab coat is lying on top of you, his blood dripping onto your face. Despite the pain, you push him off as quickly as you can. With disgust, you spit the blood out of your mouth. Your limbs feel weak, as if you haven't used them for at least a couple of months. \n\n Your insides hurt so much that your vision blurs every now and then. You manage to get up on your shaking feet and walk through a hallway filled with dozens of dead scientists. By the time you reach the decontamination chamber, blood has soaked through your socks. The only gas mask you dare to take off the rusty hanger is the one with a slight crack in its glass. It all feels as if you're having a very bad dream. You step into the decontamination chamber and put on your gas mask with shaking hands.\n *goto cont\n\n   \n*if (Ivanend)\n *set Evil 70\n \"We could've changed the goddamn world, kiddo. The whole goddamn world! We were this close to ruling the entire district!\" ${capturer1} shouts as he runs up the hill alongside you, both of you panting heavily. Loud growling and shouting noises come from behind you through the thick trees. You reach the top of the hill and stop suddenly as you look down the steep slope, seeing the thick, burning forest below.\n\n \"Well, it's only a matter of time before the Sons of Tomorrow catch up. It's been a pleasure, but this is the end of the line. At least, for one of us.\" He grins and gives your back a firm push. For a couple of seconds, the burning trees get closer and closer, until everything goes quiet and dark around you.\n *goto cont\n  \n  \n*if (malcolmend)\n \"I'm sorry, kid. I'm so sorry…me and my stupid plans again. It worked for a while, though. It was nice to rest for a bit.\" ${survivor1} forces a smile as he ties the end of a long rope to the feet of the huge bed in your room. The rope seems to be crafted and knotted together from several ropes, and it shines brown and yellow from the dirt. He jumps up and hurls the other side out of the window. Shouting and banging sounds come from the other side of the closed and barricaded door.\n \n \"It was good while it lasted, right?\" He pats you on the head and gives you a slight push towards the window. He either saw a questioning look on your face or is simply just unsure about his plan. \"Come on, you can't expect me to go with you. Who will hold them back, huh? We both know they're monsters under their fancy clothes. Especially now, with the Sons of Tomorrow expanding. And with our secret spilled…just go, okay? I know you can fend for yourself. You're a smart kid. You always have been. But even you will need some time to get ahead of them. And I'll help with that. Besides, someone my age would just hold you back.\" He fakes a smile and keeps pushing you gently towards the window with one hand.\n *fake_choice\n \n  #Hug him.\n   *set Malcolm %+20\n   You quickly wrap your arms around him and bury your head in his chest. He hesitates for a moment, but then you feel his arms tightening around you. After a couple of seconds, he slowly pushes you away. He takes a deep breath and wipes his tears. \"It was nice knowing you, kid. You're truly one of a kind. Take care, okay? I mean it.\" He forces a smile and gives your gas mask a small tug. He takes a few steps back, and you climb up to the window frame.\n   *goto malcolm\n  \n  #Just go.\n   You climb up to the window frame and glance back at ${survivor1}. He holds his tears back and continues faking a smile. \"Take care of yourself, kid. I mean it. And learn from the mistakes. Let them make you stronger.\"\n   *goto malcolm\n   \n   \n*if (ryanend)\n \"More days off?! Please do ask for one more thing!\" ${survivor2} reaches into his drawer. \"What should I do now? Huh?\" He looks at you. You sit in the chair in front of him. Just as you're about to reply, he hits the table with his fist. \"You know what? I know exactly what to do.\" He smashes the drawer shut and cocks his pistol. He bursts out of the office, pushing you aside as he does so. You follow him down the stairs and stop at the lobby as he marches towards the chambers. You glance to your right and notice a couple of guards entering the decontamination chambers wearing stuffed backpacks. One of them motions you to come with them. You glance from ${survivor2} to them, then fix your eyes upon your backpack under the same old rusty table.\n *fake_choice\n \n  #Follow the guards.\n   You jog towards them, picking up your backpack from under the table before you squeeze into the decontamination chamber next to them.\n   \n   [i]\"I'm tough, but I won't just stand and watch as another supreme leader goes through his mental breakdown. Screw them all,\"[/i] one of the guards mumbles and fixes his gas mask, so you put yours on. You step out of the decontamination chamber and into the dim moonlight. Surprisingly, the gates are wide open. You glance from the left watchtower to the right one, but you don't see the guards anywhere.\n   \n   [i]\"Hmm. So we're not the only deserters.\"[/i] The guard chuckles. There's a moment of silence, then a small grenade rolls in front of your feet. You glance down at it, right before the soldier next to you pushes you to the ground. The grenade explodes, blinding you and leaving a constant ringing sound in your ears.\n   \n   [i]\"The Sons of Tomorrow!\"[/i] a soldier shouts as the ringing sound slowly disappears. You roll onto your back and see heavily armored soldiers marching towards you. You and the guards shoot at them, but they just seem to keep coming. After a couple of seconds, it's clear that you're outnumbered. The guard next to you gives a firm push on your back, towards the fence to your left. When you reach the fence, he kneels down and snaps the wire at a couple of places. He kicks the small piece out of its place and pushes you to the ground. [i]\"Go, and hold it when you've gone through. It's not big enough for me to fit through like this!\"[/i] he shouts as you crawl through the tight hole. Once you've gotten through, you pull it up from the other side.\n   \n   He drops to the ground and begins to crawl through. He's almost squeezed through when his blood splatters onto your gas mask. You glance behind him and see a couple of soldiers running towards you. After taking another look at the guard bleeding out, you release the fence and turn on your heels to run. For a very long time, you hear them running after you, and sometimes bullets fly by very close to you. You run through the thick forest, your lungs burning with pain and your legs trembling. Your only hope is that you'll lose them in there.\n   *goto ivan\n   \n  \n  \n  \n  #Go after ${survivor2}.\n   You glance at the soldiers, then turn the other way and walk after ${survivor2}. [i]\"Fool…\"[/i] One of the guards shakes his head from the decontamination chamber. Walking towards the living chambers, you find ${survivor2} aiming his pistol at the screaming and shouting crowd. They point and shout at the two of you as they hold their handmade weapons. They walk closer and closer as ${survivor2} aims his pistol at them. They keep walking and threatening the both of you until you see ${survivor2}'s finger tightening on the trigger. A loud gunshot echoes at the same time as the electricity goes off. There's a moment of silence in the pure darkness, then screaming and shouting can be heard all around, along with footsteps and gunshots from the right.\n   \n   \"It's the Sons of Tomorrow!\" you hear people shouting between the gunshots. You take your pistol into your hand and cock it, then someone pulls you to the side by your arm. You keep getting dragged through the building, stopping every now and then. A couple of minutes later, a door slams shut behind you. A small candle appears, barely lighting the room. The small room looks all too familiar, with its white hospital bed and the same white surroundings.\n   \n   \"This is our only way to escape,\" ${survivor2} says from behind you. He pushes you aside and kicks the table over, revealing a small trap door. \"I only found this recently. It was hidden under these white tiles all along. ${capturer1} was…clever, after all. Anyway, I don't know where it leads, as I haven't had time to try it out yet. But it should get you out of here.\" He leans against the door as the noise from the other side of it intensifies.\n   \n   \"Come on, don't give me that look. You heard me right, I'm not coming. I'm longing for a good fight now, with all this stress and frustration. And besides, they'll catch up to you quicker if there isn't a badass here trying to stop them. I mean, if there isn't a badass here to stop them.\" He forces a laugh and kicks the trapdoor open. \"Go. I'm serious. I won't change my mind.\"\n   \n   *fake_choice\n   \n    #Hug him.\n     *set Ryan %+20\n     You wrap your arms around him and give him a tight squeeze. He stands motionless for a couple of seconds, then wraps an arm around you and rubs your head with the other. \"Go now. And don't let anyone get the best of you, understood?\" He lifts your head up by your chin and forces a smile with wet eyes. He lets go of you and rubs your back as he pushes you gently towards the hole. \"Take care. I'll see you after I'm done with them.\" He walks slowly towards the door as you slide into the hole and begin to climb down.\n     *goto hole\n\t \n    #Just go.\n     You turn away and begin to climb into the hole. \"Take care…I'll see you around, surely.\" He walks slowly towards the door as you begin to climb down the hole. He takes a deep breath and turns around, just as you disappear into the hole.\n     *label hole\n\t \n     You keep climbing for a while, until the path begins to tighten around you. It proves to be harder and harder to squeeze through. When you push through a tight spot, the ground shakes a little. It stops as you begin to climb through, then you feel dirt and mud falling onto your back, burying you underneath. It's getting harder and harder to breathe. Soon, your eyelids close.\n     *goto ivan\n\t \n*if (lizzieend)\n\n The wind is blowing so hard that your ears are ringing and burning from the cold. It sends shivers all through your body. You keep pushing through the heavy snowstorm. Growling and screaming can be heard all around you, and you try to move faster. \"Keep going! We're almost there!\" ${survivor3} shouts, but you can barely hear it through the snowstorm. You have to look down, as the snowstorm is almost unbearable. After a while, you arrive at the top of a steep hill. \n \n \"No! This isn't right! This isn't where we were going!\" ${survivor3} shouts as she keeps glancing back towards the growling and the gunshots. She takes a look down the hill, then at you. \"Well, this is the end of the line.\" She sighs and keeps looking into your eyes. \"I'm so…sorry, ${name}.\" She looks down, then looks back at you with wet eyes. She wraps you in a hug and kisses the top of your head. \n \n \"Take care, and don't let anyone mess with you. Ever. You're better than anyone who could ever come your way. And…\" She looks down to wipe her tears, then looks back at you. She takes a deep breath and continues. \"And do you know why? Because they underestimate you.\" She sniffles and rubs your head as she looks into your eyes. She glances back as the noise intensifies behind you, then puts her palms on your shoulders. \"I'll never forget you…little brother.\" She forces a smile as tears roll down her bright red cheeks, then gives you a firm push.\n \n Your eyes widen as you slide down the hill in the freezing cold. You feel betrayed as she reaches for her weapon, then disappears. It feels like you're sliding forever, then arrive in a pile of snow. Every inch of your body hurts as you keep looking up the hill on your back. Eventually you can't help but close your eyes.\n *goto ivan\n\n*if (aloneend)\n You put on your gas mask and step out of the decontamination chamber. You climb the ladder from under the stairs and close the hidden panel before making your way up the stairs towards the window, as usual. You put the wooden cover away and step on the window frame in the dim sunlight. A couple of armed people with thick black armor walk below, and you freeze as they look up at you.\n \n They immediately raise their weapons, and you jump back inside.\n \n \"In the name of the Sons of Tomorrow, open fire!\" one of them shouts, and you hear bullets flying into your surroundings. When there's a moment of silence, you jump up and spin your pistol out. After firing a couple of times at them, you run through the hall into the other bedroom and hurl yourself out the window. You arrive in a somersault and start running towards the thick, dark forest.\n \n You keep running through the thick forest as your lungs burn in pain and your legs tremble. Bullets fly past you and dig deep into the trees. Quite soon, you begin to feel exhausted. Your only hope is to lose them in there before they catch up.\n *goto ivan\n   \n*label malcolm\n*page_break\nThe sight below sends a shiver up your spine. It feels as if you're hundreds of miles high up in the building. You grip the rope and give it a small pull. It seems to be able to hold your weight. You glance back one more time at ${survivor1}. He walks calmly towards the door, holding a small pistol in his hands. \n\nThe shouting intensifies, and the door seems to fall apart. You take a deep breath and begin to climb down the rope. You're halfway down when the rope begins to shake wildly. You look up and see a body falling towards you, followed by a trail of blood. Your heart stops for a second before the body hits you and sends you falling fast down the rope. For a couple of seconds, you try desperately to take hold of the rope. Your insides hurt heavily when you hit the ground, replacing your vision with darkness.\n*goto ivan\n\n*label ivan\n*page_break\n[i]\"You are weak. Your only relief is death. Your life is a pure suffering,\"[/i] a voice echoes in the pure darkness. The dark, deep, and overly calm voice fills the area. It gives you the chills. You stand in the dakness for seconds, hearing only your own heartbeat. \n\n*page_break\nYour eyes snap open on the layer of dirty mattress serving as your bed. They're soaked with sweat, and it takes a second to snap back into reality. Two years have passed, and the nightmares still haven't entirely stopped. They've even intensified, if nothing else.\n\n\"He-e-ey there, kiddo! You seem a little…tired, don't you agree?\" ${capturer1} pulls you up on your feet by your arm. \"How's my favorite scavenger doing nowadays, huh?\" He smirks and tugs on his black, leather gloves.\n \n*fake_choice\n *selectable_if (ivanend = false) #\"You're supposed to be…dead.\"\n  \"Aw, wha—come on! You're supposed to be dead, not me. I mean, just take a good look on yourself. You're half dead anyway!\" He snorts.\n  *set Ivan %-10\n  *goto ivan2\n   \n #\"You look a little…pale, though.\"\n  \"Ha! Keep up being sassy, and you can get a nice little bullet hole of your own. Or two. Or a hundred. Who knows, depends on my mood.\" He grins.\n  *set ivan %+10\n  *goto ivan2\n\n #Stay quiet.\n  \"I see you like to play the quiet game. Still. Way to be a bummer.\" He crosses his arms and lowers his eyebrows.\n  *goto ivan2\n   \n*label ivan2\n\n\t\n\"Shame, though. We could've changed the world and all that. For the better, of course. But nooo, you had to back out and side with the jerks. And you, you thought I'd let it go unpunished. For real? How dumb are you?!\" He grabs your neck and clenches his fists. The smile on his face turns into a frown. \"I trusted you. And this is what you do? Stab me in the back?!\" He clenches his fists. \"You had this coming. No offense, but you've long deserved this.\" He grins and sinks his fist into your face. Your vision fades as you fall back onto the bed.\n*goto cont\n\n*label cont\n*page_break\n*achieve welcome\n*comment Continuity\n*set Age \"16\"\n*set Filters true\n*set Magazine \"10\"\n*set evil \"50\"\n*set idcard true\n*set Inform true\n*set Inform2 true\n*set Clothing 0\n*set Gasmask true\n*set Pistol true\n*set Magazine 6\n*set Maskfilter 5\n\nYou open your eyes, then blink a few times at the ceiling. The left side of your face hurts, and your neck feels a little tight, probably from the stuffed backpack you used as your pillow. You look around, making sure you're all alone. You pick up the backpack and dig through it to check its contents one more time.\n\nIt feels good to keep track of your belongings. You've looted food and several beverages, enough for weeks, and for the first time, you don't lack ammunition or filters for your gas mask. You pull the zipper back, then put the backpack on. You push the wardrobe away from the door. It slams on the ground and breaks. The door opens, and you walk out, onto the streets. \n*page_break\n\nThe walk feels like forever between the neverending foggy streets with tall buildings everywhere in sight. A strange feeling takes hold of you, so you cock your pistol. If nothing else, you only hope you can manage with your knife. After a while, you begin to hear footsteps apart from yours. When you stop for a moment, the footsteps stop too. You walk and stop a couple of times to hear if there's anyone else around you, then continue to walk forward with caution.\n\nThe other set of footsteps begin to quicken after a while, and you sink your hand into your pocket for the knife. You tap your fingers on its handle a couple of times as the footsteps come closer, then a figure jumps in front of you. You pull your pistol out and rest it on the hand with the knife in it.\n\n\"Well, color me red and call me blood! Hey there, kiddo! Phew, fast for someone your age! Man…what have you eaten to grow this much?\" Your eyes widen as ${capturer1} stands in front of you with his arms crossed. He looks at you with his hazel eyes, the same scar leading from his chin up to his left eye. His long, dark hair looks messy, but his black, striped button-up shirt looks brand new, along with his brown jeans and red shoes.\n*if (ivanend)\n\n \"I see you're still in one piece. No hard feelings though, right? No one ever died rolling down a hill into a burning forest. Right?\" He laughs.\n *goto cont2\n\n*elseif (deadend)\n\n \"Still in one piece, I see. If I couldn't kill you, who could, huh? Next time, I'll have to go for the head.\" He laughs.\n *goto cont2\n \n*else\n\n \"Still in one piece, I see. Look, I'm in one piece too! Isn't that surprising? I mean, I almost died by the hands of some filthy traitor and his buddy. But oh well, I'm not angry or anything!\" He laughs.\n *goto cont2\n \n*label cont2\n*page_break\n\"But we're back together, isn't that right, kiddo?\" He looks into your eyes, and you only notice now that he's not wearing a gas mask. He grins and wraps his arm around your shoulder to pull you firmly to his side.\n\n\"We'll make such a team together! Unkillable ${capturer1} and…pretty much killable ${firstname}. Have to admit, your name like that doesn't have a blasting effect.\" He chuckles as you begin to walk together. \"Ah, the things I could tell you! I could talk about them for ages! So many things have happened. Two long years, kiddo. I'm sure you feel the same, though. With one exception. While you're eager to listen, I'm not. I'm really not. You know, if I didn't know you're a bad shot, I'd be afraid of you. Just kidding! I could take you out with one hand.\" He grins and grips your shoulder with such strength, you hiss in pain.\n\n\"Ah, have to get used to the new me. The things I could talk about…you know, it's been relatively hard finding you…there were a lot of…complicating factors. But I did it! And you should stick close to me, more now than ever. The things unfolding, phew!\" He chuckles as he shakes you a bit.\n\nSuddenly, footsteps can be heard all around you, closing in quickly.\n\n\"Trouble! I love it!\" ${capturer1} laughs and stops.\n*page_break\n\n\"Halt!\" A man with black heavy armor and a rifle with a laser sight jumps out from the fog and aims his weapon at you. Another second later, five more of them wearing the same suit surround you, aiming their weapons. They wear light vests, and their grey suits have designated slots for their weapons. \n\n\"Aw, great. These sons of…you know, them…\" ${capturer1} grins.\n\n\"What's a kid doing here? Military has been patrolling the area, and you're just walking around here. The only reason we didn't shoot you on sight is curiosity,\" the man in armor says in a strong, deep voice.\n\n\"Aw well, curiosity killed the cat, you know.\" ${capturer1} chuckles and crosses his arms. The rest of the soldiers look at the one pointing his rifle at you. He steps forward and takes the pistol and knife out of your hands. He waits a couple of seconds, then sinks the stock of his rifle into your stomach.\n\n\"Ow, that's…not nice. Right in the stomach! Poor tummy, give it a rub, kiddo.\" ${capturer1} laughs as you fall on your knees.\n\n\"When the General of the Sons of Tomorrow asks something, you answer. All right, you've lived longer than you're supposed to, and proved useless.\" He pushes the barrel of his rifle firmly to your forehead.\n\n\"Wait, wait, wait. Don't be too hasty. It's my job to kill or enslave others, so just hold up. Don't get all trigger happy.\" ${capturer1} grins and steps behind you.\n\n*if (slimerwound)\n \"Check out his right arm. It's fancy stuff.\" He laughs as he pulls your sleeve up.\n *goto cont2_2\n\n \n*elseif (wackwound)\n \"Check out his stomach. It's some real fancy stuff.\" He laughs as he pulls your shirt up.\n *goto cont2_2\n \n*label cont2_2\n*page_break\n\"Shirt off. Now.\" The General aims his rifle at you. You give ${capturer1} a sharp look, then force your long-sleeved shirt over your gas mask.\n\n\"God…this kid has more scars than all of us combined. Is that…what's that wound? That looks real interesting. Never seen anything like it. I wonder, what's kept you alive for this long? Probably others. So, anything to say?\"\n\n*fake_choice\n #\"I'm good with pistols.\"\n  \"So…you're like those soldiers who stayed back to guard. Exceptional.\" \n\n  \n #\"I'm good with knives.\"\n  \"So…you're someone who thinks knives are worth something at times like these. Please attack me with your knife, I'll look away.\" \n  \n #Remain silent.\n  \"Thought so.\" He crosses his arms.\n  \n  \"Yeah…he's good at that.\" ${capturer1} chuckles.\n  \n\n\n${General} shakes his head. \"Anything else you claim to be good at?\"\n*choice\n #\"I'm fast, and I can climb most things.\"\n  *set Agility true\n  \"So you're a combination of a cheetah and a monkey? Sounds…useful.\" \n  *goto cont4\n  \n #\"I'm like a shadow.\"\n  *set Stealth true\n  \"Quiet and not good for anything? Or you mean you can get by unnoticed? Either way, I'm really impressed.\"\n  *goto cont4\n\n*label cont4\n*set stats true\n*set Rep 1\n\n\nHe looks from the other soldier to you, then taps his gas mask a couple of times. \"All right, come with us. But the minute you don't prove to be useful, you're dead. We don't need anyone even a tiny bit useless in the new world.\" He turns around and begins to walk forward. You do the same, but the rest of the soldiers keep their rifles aimed at you.\n\n\"This guy! This guy right here! If only I'd met him instead of you! No offense, though.\" ${capturer1} stretches and walks closer.\n\n\"Your weird scar wasn't good enough not to shoot you between the eyes. Let's just make that clear,\" the General mumbles.\n\n\"I love this guy!\" ${capturer1} shrugs and wraps an arm around you. \"So, kiddo! I wonder how much you've improved since…you know, the last time we met.\" ${capturer1} keeps talking to you the whole way. You reach the end of the district, where a wall used to stand to separate you from the Pauper district. The wall is broken, and its remains lie at the feet of a forest. You begin to walk up it and into the forest.\n\n*page_break\nYou arrive at the top of a hill, which seems to be the end of the thick forest. You pant a little, then your eyes widen. A small town with a huge metal fence separating it from the rest of the destroyed district stands in the middle. Deserted, muddy forest is all you can see around it in the fog. Watchtowers stand in a circle, and light glows from here and there from the small buildings behind the fence. Moonlight shines brightly from the sky.\n\n\"A whole town! A whole goddamn town! I didn't even know anything else existed apart from our districts! Can you believe that?! This guy is so much like…me! You see, this is what we could've achieved if you'd only listened to me, kiddo.\" ${capturer1} grins and puts his hands on his hips.\n\n\"All right, I'm going to be blatantly honest with you. You've only come here on your own feet in order to spare us the hassle of dragging your bodies up here. We only need you for research. Your wound is fascinating.\" The General turns around and aims his rifle at you, then cocks it. \"I'm sorry, kid, but this is the end of the line for you. Any last words you'd like to share before you die?\"\n\n${capturer1} puts his hands up and grins. \"I love this guy, but I can't let him kill us. I have plans of my own. Especially now that I've seen what they have. And anyway, no one else can kill you but me.\" He flicks his fingers a couple of times. The tips of his fingers seem to light up underneath his black leather gloves, along with his right eye. A second later, the General's laser sight explodes, along with the stun grenades and tasers on his and the soldiers' belts. A horrible ringing sound echoes in your ears, and you fall on the ground with your eyes burning in pain. You can't open them, as when you try to, a horrible whiteness burns them. The minutes you lie there feel like ages. It hurts so much, you scream in pain.\n\nWhen you can finally bear to open your eyes, the General is standing over you with clenched fists. \"You've just detonated several highly modified, highly valuable, and lethal pieces of equipment. I don't know how you did it, but I'll get it out of you. Too bad your plan didn't work out.\" He kneels down and punches you in the face. His metal gloves sink into your face, and you immediately pass out.\n*finish", "chapter2": "[b] Chapter 2 - The New Order [/b]\n\n[i]\"Stay asleep. Why would you wake up? Just to suffer?\"[/i] The dark, deep voice vibrates in the pure, cold darkness. A pair of deep purple eyes snap open in front of you, staring at you. A rush of cold wind chills you to the bone as you look into the set of glowing purple eyes in the unknown darkness. Sadness and agony fill your whole shaking body. The sudden rush of emotion gives you the urge to scream and cry at the same time.\n*page_break\nWhen you next open your eyes, a sharp pain strikes into your wrists. A dark, wet, moldy, and pale brick wall surrounds you. There's no window in sight, and the whole place seems to be falling apart. Your wrists are bound by a set of chains attached to the ceiling. On your right, a rotting corpse hangs from the same kind of chains you're attached to. On your left are another set of chains. They're empty, but the blood splattered around the room doesn't feel comforting. Your shirt and trousers lie next to the strong-looking metal door. Without windows, the room feels very dark and cold.\n\n\"That was so awesome! You must wish you hadn't been so clumsy and all that. Now my stunt will get you killed. Oh well, it was good to see you for, like, fifteen minutes.\" ${capturer1} walks out from a dark corner and shrugs. \"Sorry, not sorry! But you must excuse me, I have to go. Got things to do. Good luck!\" He chuckles as he opens the metal door and lets it close behind him.\n\nAfter a long while, the metal door creaks open.\n*page_break\n*set Pistol false\n*set Knife false\n*set Maskfilter \"0\"\n*set Magazine \"0\"\n\nA strong, tall man steps in, followed by two more armed soldiers. He puts his palms on the back of his bald head, and a smile appears underneath his small moustache as he looks at you with his grey eyes. \n\n\"So, awake I see,\" says the General in the same strong, deep tone of voice. \"Let's play a game. I'll ask questions, and you'll answer them. And if I don't like your answer, I'll use this fancy taser on you, until you tell me what I want to hear. You know, the type you blew up somehow. The only difference between this and a regular taser is the modifications. The high voltage kills you rather quick.\" He's wearing black trousers, a green shirt, and a dark-green camouflage jacket. He steps closer, the footsteps echoing from his black boots. He pulls out a dark-blue taser with a long barrel and a magazine attached to it.\n\n\"First question: who are you?\"\n*fake_choice\n\n #\"I'm ${name}.\"\n  *set Question1 true\n  \"Good work, ${firstname}. You just dodged a bullet. Especially since I found your Identification Card when I searched you. Things can go smoothly. See? I'm a man of my word.\" He taps the edge of his taser.\n  *goto cont\n\n \n #\"No one important.\"\n  \"That's for me to decide.\" He aims the taser and pulls the trigger. A small bullet with a barbed end cuts into your chest. It beeps three times, then sends a sharp, shocking pain throughout your upper body and into your arms. He only stops tasing you when blood runs out of your mouth. \"I found your Identification Card. You're not that smart, are you?\"\n  *goto cont\n \n \n #Remain silent.\n  \"That's not an answer.\" He aims the taser and pulls the trigger. A small bullet with a barbed end cuts into your chest. It beeps three times, then sends a sharp, shocking pain throughout your upper body and into your arms. He only stops tasing you when blood runs from your nose to your mouth. \"I found your Identification Card. You're not that smart, are you?\"\n  *goto cont\n \n*label cont\n\n\"That was a tricky question. But here comes the second one. What's your story? How did you end up here? I want to hear it from the start and up until now. Feel free to take your time, you're not going anywhere anytime soon. And don't even bother lying, ${firstname}.\" He aims the taser at your head.\n*fake_choice\n\n #Tell him the truth.\n  *set Gannon %+8\n  *set Question2 true\n  You tell him most of your journey in a nutshell, leaving out the vast majority of the events. It still takes a lot of time. The soldiers eventually leave, and only you remain with the General in the cold chamber.\n  \n  \"${base}, huh? I was there when we took over. It was a bloodbath, even though we had an insider. Well, ${firstname}. I've seen a lot, but what you've been through…I must say, I don't envy your life. I like your style, though.\" He walks closer and flips his taser upside down. \n  \n  *if (Question1) and (Question2)  \n   *set Gannon %+5\n   \n   \"I don't know what to do with you…yet. You've answered nicely and all, but I can't take any unnecessary risks.\" He flicks a switch on the handle of his taser, and a small syringe pops out from the bottom of it. Without a word, he jams it into your neck. It doesn't hurt that much, but as he pulls it out, you can't help but close your eyes.\n   *goto hospital\n \n  *else\n  \n   \"I clearly don't know what to do with you yet. Maybe if we can get through that rebellious liar nature of yours…I'll think about it.\" He flicks a switch on the handle of his taser, and a small syringe pops out from the bottom of it. Without a word, he jams it into your neck. It doesn't hurt that much, but as he pulls it out, you can't help but close your eyes.\n   *goto hospital\n   \n   *label hospital\n   *page_break\n   You open your eyes and find yourself in a huge white room filled with neatly organized medical equipment. Your hands are tied to each side of the bed. Around you, a couple of injured people lie on hospital beds. Your limbs feel very weak, and you can't help but close your eyes again.\n   *goto cont3\n \n #Make up a fake story.\n  You take a deep breath and begin to tell him your story. Your story about surviving the attack in your parents' basemenet. You had prepared for nuclear attacks. Only your parents couldn't make it in time from their workplaces. For two years, you were on your own in the small panic room.\n  \n  When you ran out of supplies, you had to pry its doors open. You left the demolished house safe and sound. You encountered monsters with nothing but a kitchen knife, some of them wounding you badly. You had to fight bandits who tried to take your stuff. The cold nights under barely standing buildings and basements are the nights you'll never forget. Eventually, you improved, and nothing could stand between you and the loot. You stuck with a couple of people every now and then, but no one worthy of mentioning. People come and go. For the last couple of years, you've been on your own; then the Sons of Tomorrow came.\n  \n  \"That's…one hell of a story. You've been through a lot, haven't you? But fighting has become part of your life. And you're quite good at it now, aren't you?\" He walks closer and flips his taser upside down.\n  \n  *if (Question1) and (Question2)  \n   *set Gannon %+5\n  \n  \n   \"I don't know what to do with you…yet. You've answered nicely and all, but I can't take any unnecessary risks.\" He flicks a switch on the handle of his taser, and a small syringe pops out from the bottom of it. Without a word, he jams it into your neck. It doesn't hurt that much, but as he pulls it out, you can't help but close your eyes.\n   *goto hospital\n \n  *else\n \n \n   \"I clearly don't know what to do with you yet. Maybe if we can get through that rebellious liar nature of yours…I'll think about it.\" He flicks a switch on the handle of his taser, and a small syringe pops out from the bottom of it. Without a word, he jams it into your neck. It doesn't hurt that much, but as he pulls it out, you can't help but close your eyes.\n   *goto hospital\n\n\n \n \n*label cont3\n*page_break\n[i]\"This isn't the beginning. This is the end. You're lying in your grave.\"[/i] The pair of purple eyes blink, and sharp pain strikes into your left side. You look down and see darkness flowing by your feet.\n\n\n*page_break\n\nYou startle awake and sit up. \"Oh my god, they have a torture room! Why didn't I think of that! I just punished people wherever they stood. But chaining them against a wall has such…style!\" You open your eyes to find ${capturer1} standing next to you. He keeps talking as he looks around. \n\n\"Nice room. Too white for my taste, though. It could use a bit of, you know…red.\" ${capturer1} grins at the left side of your bed. He tugs on the rope a little until it unfolds and releases your wrist. \"So, be a good boy and make old ${capturer1} proud. Break free of your chains, go wild!\" He laughs and pats your arm firmly before he leaves the room. You lay back and take some deep breaths, just as the General walks in the door. \n\n\"Morning, ${firstname}. We don't appreciate when someone sleeps through a day. But it's okay, you only went over that by…roughly 8 hours. You must have had your last good night's sleep a while ago.\" He rubs his moustache and walks closer. \"Anyway, change of plans. I failed to kill you, so…they have some new plans for you…\" He glances down at your left wrist. He frowns for a moment, then looks back to you. You glance down at your wrist and notice the rope lying next to you, with your wrist freed.\n\n\"So…\" He sits down on the edge of your bed. \"You kindly told me everything I wanted to hear yesterday. So I'll do the same in brief detail. I'm General ${General}. I lead our military. I've been here since the beginning. The rest of the important folks are in the citadel. You'll probably never go there. Unless you've done something very bad, or very good for us. Anyway, this is Novos. The town built from nothing. And this, this is where everything starts, and ends. We'll bring order to this wrecked world. We'll unite districts and rule them. And those who don't obey the new order will die by the hands of the Sons of Tomorrow.\" He smacks his fist into his palm.\n*set Rep true\n*set Rep2 true\n*achieve general\n*page_break\n\n\"So, ${Firstname}, let's get to the point. I was a bit harsh back there. You've proven that you might have some skills that could be useful. There can never be enough soldiers. And besides, you're young. If you only prove to be half as useful as the rest of my soldiers, you could be trained to be an exceptional soldier when you grow up. I have this weird feeling though, that I can't trust you. So…know this. If at any time you bail, or turn against us, we'll hunt you down. It's happened in the past. Trust me, we are capable. Now more than ever.\" He clears his throat before he continues. \n\n\"Anyway…you'll accompany one of our best soldiers to determine if you're worthy of being one of the Sons. It's simple. If you fail, you die. If you bail, you die. If you survive, you succeed and might rise in our ranks. But ${Assassin} will tell you more. You'll meet him soon. He joined us a year ago, and he's one of our best soldiers.\" He snaps his fingers and leaves the room.\n\n\"You're dead meat, boy,\" a man with a stitched-up face and bandaged head spits at you from the bed to your right. \"They all start like this. They never return from the lunatic. Lot of guys have been lying here before. Take a wild guess how many of them made it back.\" He laughs and turns his head towards you. \"I know.\" He lays back in the bed just as the door swings open. \n\nA man of average height with dark, scruffy leather clothes walks in. His trousers have several pockets in them. His black shirt is covered with a ripped black hoodie and a black leather jacket. His face is covered from nose to neck with a ragged black scarf. His head is covered by a bandana and the hoodie, so you can only see his eyes. His belt is stuffed with knives and pistols, and a sniper rifle is attached to his back. He stops at your bed and unties your hand. He drops your clothes on your chest, then looks into your eyes with his red eyes and gestures for you to get up. He turns around and walks to the door. You get dressed and follow him out to the lobby.\n\nHe leans against the wall, holding a pistol with a long barrel in one hand and a sharp military knife in the other.\n\n\"Choose,\" he mumbles in a deep, quiet voice.\n*fake_choice\n #Pick the pistol.\n  *set Bullet true\n  *set Bullets \"9\"\n  *set Pistol true\n  *set Weapon \"pistol\"\n  You take the pistol and holster it, along with the two magazines he hands you.\n  \n #Pick the knife.\n  *set Knife true\n  *set Weapon \"knife\"\n  You take the knife and sheathe it.\n  \n \n*achieve keith\n*set Maskfilter 2\n\"Hmm.\" He nods and begins to walk through the huge lobby, which is filled with soldiers and other people, all sitting or standing around. You walk to the decontamination chamber's thick glass doors, and they automatically open. You step inside, and ${Assassin} leans against its walls. \"Mask.\" He points to the gas masks hanging from the wall. You pick one and put it on. You take two filters down as well, then screw them in. You glance at him, but he doesn't put on a mask. ${Assassin} nods at the chart on the wall. [i]'Handed out.'[/i] You sign your name next to the gas mask, and the door opens.\n\nYou step out onto the dirty pavement running between the houses and other taller and smaller buildings. People walk by, and soldiers stand guard here and there. The whole town looks like one from medieval times. A huge black building ending in spikes stands in the middle of the small town, surrounded by guards. Eventually, you reach the huge gate with watchtowers on both sides. ${Assassin} looks up and nods once. They roll the gate open, and you walk through it out to the devastated land. A muddy, destroyed city surrounds the rebuilt town. It's impossible to see very far, as fog surrounds everything in the distance.\n\nYou walk for a while until you arrive at a steamy field filled with tall, yellow-and-dark-blue plants. You watch your every step. The humidity becomes unbearable after a while. Suddenly, a small, thin creature emerges from the mud between you and ${assassin}. It moves its long, needle-like fingers, wiggling them around as it sneaks up behind ${assassin}.\n*set Maskfilters 2\n*temp Goodpoints \"0\"\n*fake_choice\n\n #Warn him.\n  *set Keith %+5\n  *set Goodpoints +1\n  \"Behind you!\" you say, and ${assassin} turns around. He can barely step aside from the creature's sharp fingers. He sinks his knife through its body, giving it a twist with one hand. The creature screams and falls back. Its skin is dried upon its bones. Apart from its mouth, nothing else can be seen on its face, only skin. You keep looking at each other as the mud swallows the creature.\n  \n  \"Good,\" he grunts as he sheathes his knife and walks ahead.\n\n\n\n #Don't warn him. \n  *set Keith %-3\n  You put your hands in your pocket and watch the events unfold. When the creature raises its sharp fingers, ${Assassin} steps aside and sinks his knife through its body, giving it a twist with one hand. The creature screams and falls back. Its skins is dried upon its bones. Apart from its mouth, nothing else can be seen on its face, only skin. You keep looking at each other as the mud swallows the creature.\n  \n  \"Unreliable,\" he grunts as he sheathes his knife and keeps walking forward.\n\n\n\nHe keeps walking to the end of the small hill. It's not too steep or deep, but the way down still looks scary with the sharp branches and rocks sticking out from the side of the hill. ${Assassin} looks at you and flips his long, sharp knife out. \"Follow,\" he mumbles, then he jumps down and slams the edge of the shiny, clean knife into the ground as he slides down.\n\nYou jump down and flip your knife out. Firmly, you stab it into the ground. The way down almost rips the knife out of your hand, but you manage to hold it as you slide. The knife slows your speed and helps you accelerate. When you finally reach the bottom after what feels like several long minutes of sliding, your wrist aches along with your ankles. You stand up to dust yourself off and sheathe your knife.\n\nYou walk through the empty, burnt field towards what seems to be a small hut. You see Aviatrixes circling around when you look up at the dark, foggy sky. The earth below your feet is so dry and hard, it's almost surreal, especially as it's not far from the heavily muddy area. You stop at a bush near the hut, which is surrounded by a broken fence, and ${Assassin} kneels down. He keeps looking at the hut for several minutes. Three people enter and leave the hut. As much as you can see through the thick fog, they don't seem to be armed.\n\n*page_break\n\"Follow.\" He sneaks towards the small hut, staying out of sight. Not long after, you follow him. You sneak behind him, avoiding every little branch and scrap you can to avoid being heard. ${Assassin} stops at the broken fence and pushes through without a sound. You push the bent part away and slide in quietly. You walk to the corner of the hut with him and peek inside. ${Assassin} steps away from the corner, flipping out both of his silenced pistols as he does so. You follow him, taking your ${weapon} into your hand. The hut is empty. The small wooden stairs leading downstairs are blocked by wooden laths. Dim light barely shines through them. You push them aside and begin to walk down the stairs. \n\nStrange chanting sounds hit your ears as you walk down the spiral stairs. The way down is lined with torches emitting red flames. When you reach the end of the stairs, you find yourself in an average underground bunker. Red torches and candles barely light it. To your right, chains rattle. Skinless creatures are chained against the wall. Blood runs from their wrists, and they're very thin. They grunt quietly and try to break free. The bunker is filled with the desecrated corpses of mutants. To your left are humans crying and begging in cages. In the middle, two men and a woman stand at a table. Blood drips down from it. You walk closer, and ${assassin} aims his pistols at them. \n \nThey turn towards you and put their hands up. They're holding syringes and scalpels. A woman is tied to the table. A rag is in her mouth, but she tries to scream as much as she can. A syringe sticks out of the vein in her right arm. The area around it is black. \n\n*page_break\n\"You can kill us. It makes no difference. We are eternal. Mutation is not our enemy, it's our future. It's spreading. It's the time of the Oracle, and those who won't obey will die!\" the woman in front of you says, then laughs like a maniac. One of the men launches himself towards you. ${assassin} sends a bullet through his head, and he rolls down the small stairs leading up to the table. The other two do the same. The man tries to stab you with the scalpel, but you avoid his attack and cut his throat with his own weapon. ${assassin} sticks his knife through the woman's throat, and she collapses. He sheathes his weapon and heads towards the stairs. \n\n\"We're done here.\" You're about to turn around when the woman in the middle begins to growl. You step closer to see the incision running through her body. Her organs have enlarged and blackened. Her heart is barely beating. A black sun has formed around the vein in her arm. Her body is slowly growing, and the skin melts off of it in front of your eyes. The people to your left in the cage seem to have undergone some experiments. Their hands end in claws, they have fangs, and they only have skin on their bodies in patches. You look around the twisted place, then make your decision.\n\n*fake_choice\n #Burn the place.\n \n \n  Most of the bunker is made out of wood. You run around and take the torches down, then throw them against the wooden beams. You hold the last two torches in your hand, and you throw one in the middle, onto the woman. The people shriek, and the woman screams. You let the last torch fall out of your hand, onto the stairs. You turn around and head upstairs.\n  \n  When you arrive upstairs, ${assassin} pushes himself off the wall and walks out of the hut with you. \"Good choice,\" he says as you walk further and further away from the burning hut.\n  \n \n #Just leave.\n \n \n  You look around the place serving as a home for inhuman experiments. The humans shriek in the cage, and the woman tries to break free with her growing limbs. You take a few steps back until you reach the stairs. You take one last look at the scene, then head upstairs. Muffled screams follow you up the steps. ${assassin} pushes himself off the wall and walks out of the hut with you. The screaming becomes distant as you walk further and further away from it.\n  \n  \n  \n\"They called themselves scientists once. Lunatics.\" ${Assassin} looks at you as you make your way back. As the fog begins to thicken, ${assassin} hurries you more and more to get back to ${base2}. By the time you arrive at the gate, you can barely see anything through the fog. All you can hear is the sharpening of knives.\n\n*page_break\nThe gate slams behind you as you walk through it. Small candles are placed around the road here and there. It's weak, but at least you can see where you're going. \n\nPeople barely walk the muddy streets; instead, soldiers stand around and talk. You walk through the wooden, reinforced apartments with small, rusty decontamination chambers built at their front doors. As you pass by the town center, a huge black citadel appears in the distance. Behind that, huge flats stand tall. You take a sharp left turn way before the citadel and walk into the headquarters. After the decontamination process, you step into the building. There aren't many people left awake inside. You find ${General}'s office standing next to some other offices, above the lobby. ${Assassin} knocks once, then opens the door and pushes you inside. He walks next to you, and ${General} looks at the two of you.\n\n\"So?\" he asks, breaking the silence.\n\n\"Nothing special,\" ${assassin} mumbles under his scarf, then leans on the door as he crosses his arms. The General crosses his arms and rubs his chin. \"We already knew that.\" He points towards the door. \n\n\"Escort him to the according living chamber. I'll make a report, and then they'll decide what to do with him tomorrow. And I won't tie your arms. Just to advance my trust in you.\" He leans back in his chair as you leave the room.\n\n*page_break\n${Assassin} escorts you out of the headquarters. You walk down the dark street, passing by the citadel from a distance. Light comes through its many reinforced windows you can't see through. He escorts you further behind the headquarters, where two large buildings stand. They're some of the few buildings not being guarded. You enter the one on the right through its thick metal door and walk right into a decontamination chamber. \n\nYou're so used to the process by now, you don't even notice it through your own thoughts. A dark corridor welcomes you when the decontamination chamber opens. You walk down the corridor, past a big bathroom with shower stalls on one side and toilets on the other. As you walk further down, you see a huge living room on the right and a dining room on the left. At the end of the corner, a hallway opens both left and right, with wooden double doors on both sides. He turns right and walks to the third set of doors. He opens them and pushes you inside. \"Sleep.\" With that, he closes the doors behind you.\n\nIn the small room, two bunk beds stand in front of you at the far side of the wall, each with their own wardrobe. In the middle of the room stands a big wooden table with wooden chairs around it. A small candle sits on the table, just barely lighting the room. At first, you don't know which ones are occupied, but you spot a bottom bunk which is definitely empty. Tired as you are, you fall into the bed and fall asleep immediately.\n*page_break\n\n[i]\"You have hurt your allies. You are betraying them. Are you really you?\"[/i] The voice echoes in the distance for long seconds after speaking. There's nothing else but black, foggy darkness as far as you can see. It circles around you, slowly.\n\n*page_break\nYou sit up on the bed and see ${capturer1} crouching next to you. You open your mouth to speak, but ${capturer1} covers it with his hand. It feels cold, even through his gloves.\n\n\"What a day, kiddo, what a day!\" ${capturer1} sits at the edge of your bed. \"I have no idea what they want to do. Build their own army of freaks? Sounds like a good idea, though. I'll add it to my bucket list.\" He takes his hand off your mouth. \"Hey, hey! Hush. You can ask one question, because I'm cool like that. But only one, and be quiet. So, go ahead, I'm waiting.\" He pulls his hand away.\n*fake_choice\n #\"How do you do this?\"\n  A grin appears on his face as he crosses his arms. \"Do what? You didn't honestly think you could get away from me, did you? I'll pop up whenever I feel like it's safe for me to come out of hiding. For many reasons, kiddo. I like to keep an eye on current events. And you're still part of my book that's titled [i]'Plans.'[/i]\" He chuckles and gets up from the bed.\n \n #\"Where are you now?\"\n  \"Right here, kiddo.\" He laughs and crosses his arms. \"You don't have to know where I'm residing. I'm safe, so don't worry your dumb little head about old ${capturer1}'s safety. I'm keeping an eye on current events from afar. Until it's my time to shine.\" He chuckles and gets up from the bed.\n \n #\"How did you blow up that equipment?\"\n  \"Hmm, I don't know what you're on about. According to your new buddy, ${General}, you're the reason they exploded. Aren't you just a bad, bad kid?\" He grins and combs his hair back as he gets up from the bed.\n  \n  \n${capturer1} giggles quietly as he leaves the room and closes the door behind himself.\n*page_break\n*set Roommates true\n*set nrep true\n*set nrep2 true\n\nYou keep lying in the bed, turning onto your side and facing the wall. Your eyes feel tired, and you try to fall asleep for a long while, but you can't. You turn back around to find a pair of light-blue eyes staring at you, an inch from your face. Involuntarily, you jump slightly up on the bed.\n\n\"Whoops. Don't get startled, bunk-bed partner!\" A girl about your age laughs and gets up from your bed. She combs her long black hair back and fixes her ragged leather clothes. \"I'm ${Roommate}. You?\" She smiles.\n\n\"Good idea, ${Roommate}. Let's share our names with the new guy. How about you introduce me too?\" A taller boy with spiky brown hair is putting on his shoes at the far end of the room. He's wearing leather clothes too, except they're not ragged.\n\n\"Oh, sorry, he's ${Roommate2}. What's your name, bunk partner?\" She laughs as the boy shakes his head.\n\n*fake_choice\n\n #Tell them my name.\n  *set Lily %+3\n  *set Matt %+3\n  \"I'm ${name}.\" You shrug slightly.\n  \n  \"Later then, ${firstname}.\" The boy leaves the room, letting the door close behind him.\n \n #Don't tell them my name.\n  *set Lily %-3\n  *set Matt %-3\n  \"That doesn't matter.\" You shrug.\n  \n  \"Oh, it does. But you can go ahead and be a jerk. Let's see how long you'll last. It's not that hard to find out your name, you know. Later, unnamed.\" The boy leaves the room, letting the door close behind him.\n  \n\nWhen you think about your new roommates, memories stir your feelings. The scene is just all too familiar. You're still processing the thought when the door opens and the General steps inside. \"All right, come with me.\" He motions towards you.\n\n\"Ooo, see ya!\" ${Roommate} waves as you follow the General out of the building. He keeps walking in a fast pace towards the citadel. You keep up through the narrow, dirty streets and stop when you arrive at the huge stairs leading up to the entrance. Soldiers stand on both sides, their rifles ready. You follow him through the doors of the citadel into a huge decontamination chamber. \n\nThe process is quiet and only takes a couple of seconds. You step out into a dark, green lobby. You've never seen this many soldiers in one place. People walk and run about, and you walk towards the stairs. You walk up the thousands of stairs of the citadel until you reach the top of it. After crossing a small bridge that grants you vision down to the lobby, you stop at a wooden door. The soldiers on both sides salute, and the General enters the dark-red office with you by his side.\n*page_break\n\n\n\"As I was saying…I'm sorry, but I cannot continue my work as a Lieutenant. I have to resign. I have a family now. That's why I couldn't focus yesterday…that's why we suffered greater casualties, despite our victory.\" A man stands in front of the table. On the other side of it, a man is sitting in an office chair, with his back to you.\n\n\"I see. You can go now, Lieutenant Marcus. You will stay on as a Lieutenant. At least until I find someone fitting your position. Maybe you can find enough motivation to keep going in the near future,\" the man says. The Lieutenant bows slightly and leaves the room. The man in the chair turns around and faces the two of you.\n\n\"Greetings. I'm the ${Leader} of this town.\" The man is wearing a nice black suit and a ripped top hat, and he looks out of the huge floor-to-ceiling window that surrounds his office. \"Nice little town, if I do say so myself. It took me a lot of work to get here. But it's still not enough. I'm capable of building this five, six, even seven times bigger. And still be able to maintain peace and order. Because those things are important. But why am I telling you all this, you might ask? Well…I speak with every one of my recruits. Because I have plans. Big plans. I need allies. Smart, powerful allies. And knowing what the General told me about you…you have a shady background. How old could you be now, fourteen, sixteen? Surviving on your own for a good four years now. Anyway, how did he do?\" He turns around, his arms crossed behind his back.\n\n\"${Assassin} says he's okay.\" The General shrugs slightly.\n \n\"Is that so…that's something. Well, maybe in the future you can become something…greater. I doubt it. But I've lived through bigger surprises. For now, you'll do what the General tells you to do. That's me advancing my trust in the future generation. Maybe you'll climb the ladder fast and become a worthy ally. That, or you'll end up like the rest of the worthless citizens. Or worse. I don't tolerate worthless people. They endanger my plans. If natural selection can't do its thing fast enough, I'll help. By the way, don't even try to just bounce or turn against us one day. We'll finish you sooner than you could think about the next step to take. But I'm sure the General has told you all about that already. We'll see what the future brings, huh? It's all up to you.\" He fakes
